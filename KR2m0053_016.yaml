body:
  text: 旗分志二八旗佐領二鑲黄旗滿洲佐領鑲黄旗滿洲佐領上一㕘領至三㕘領鑲黄旗滿洲都統所屬㕘領五第一㕘領下佐領十八第二㕘領下佐領十七第三叅領下佐領十七第四㕘領下佐領十七第五叅領下佐領十七第一叅領第一佐領係康熙十三年編𨽻輔國公常舒之佐領始以驍騎校漢初哈管理漢初哈故以公常舒之子鎮國将軍徳寧管理徳寧縁事革退以其弟閒散宗室海寧管理海寧故以其弟閒散宗室徳永管理徳永故以其兄松柱之子永貴管理永貴故以其子三等侍衛武徳禮管理武徳禮陞任以其叔父䕶軍㕘領順安管理順安故以其子惟珠和管理惟珠和故以徳寧之三世孫宗室惠良管理第一叅領第二佐領係康熙十三年将内大臣伯噶都䕶軍統領法噶㕘領法哈喇三佐領内滋生餘丁分出一佐領以額亦都之孫都統拉哈達管理拉哈達補駐防将軍以其子少詹事喇巴管理喇巴補開元防守尉以喇巴伯祖班席之孫安都管理安都縁事革職以安都叔祖敖徳之二世孫一等侍衛哈達管理後安都復職仍管此佐領又縁事革職以安都之叔父拉哈達之孫佛倫管理佛倫降調以安都兄之孫竒蘭管理竒蘭縁事革退以安都之子赫柱管理赫柱岀缺以其子舒敏管理舒敏出缺以其弟舒昌管理舒昌出缺以其曾祖班喜之五世孫奚通阿管理奚通阿岀缺以其子興禄管理興禄出缺以其曾祖班喜之五世孫哈豐阿管理哈豐阿出缺以其子智慶管理第一㕘領第三佐領係康熙六年将䕶軍㕘佐法哈喇佐領内滋生餘丁分立一佐領以忠義公圖爾格之孫㕘領順古圖管理順古圖故以其叔祖超哈爾之子一等侍衛查拜管理查拜故以内大臣遏必隆之子䕶軍統領法喀管理法喀縁事革職以其弟内大臣二等公殷徳管理殷徳因病辭退以户部尚書車爾格之二世孫二等侍衛連夀管理連夀以足疾辭退以法喀之子薩穆哈管理薩穆哈告退以其伯祖鄂徳之四世孫徳新管理徳新陞任以其曾叔祖綽哈爾之四世孫唐雲管理唐雲故以其髙伯祖達隆愛之四世孫興保管理興保陞任以其曾伯祖岳拜之四世孫拱照管理第一㕘領第四佐領係國初編設始以額亦都第十六子内大臣遏必隆管理遏必隆故以䕶軍㕘領法哈喇管理法哈喇故以一等侍衛延柱管理延柱故以二等伯唐保住管理唐保住補奉天将軍以延柱之子哲爾金管理哲爾金革職以其堂弟阿敏爾圖管理阿敏爾圖故以其叔祖圖爾喜之四世孫廷安布管理第一㕘領第五佐領係崇徳八年編設初令户部尚書覺羅薩璧翰管理薩璧翰故以其子吏部尚書科爾坤管理科爾坤故以其族子都統朱滿管理朱滿縁事革職以科爾坤之子都統佛倫管理佛倫縁事革職以其兄将軍蒙俄樂之子三等侍衛查克散管理查克散縁事革職以其兄查克丹之子二等侍衛齊世武管理齊世武陞任三姓地方副都統以其叔父覺羅崇武管理崇武縁事革職以其族弟舒翁阿太管理舒翁阿太故以其族弟常岱管理常岱故以其子岱成管理第一㕘領第六佐領係康熙六年将工部尚書額赫里佐領内滋生餘丁分出一佐領以其伯父伊爾登之孫内大臣二等伯噶都管理噶都故以其子䕶軍統領應赫紫管理應赫紫因病辭退以其弟郎中管理藩院侍郎事恒徳管理恒徳縁事罷退以應赫紫之子伊星阿管理伊星阿縁事革職以其曾叔祖鄂徳之四世孫同太管理同太補放逰擊以其兄増書保之子俊徳管理俊徳補放逰擊以其叔祖海拉遜之二世孫明通管理明通故以其子鐘敏管理鐘敏故以其子常福管理第一㕘領第七佐領亦係國初編設始以額亦都之子䕶軍統領超哈爾管理超哈爾故以其兄車爾格之子尚書陳泰管理陳泰為大将軍南征卒於軍以超哈爾之子工部尚書額赫里管理額赫里故以其兄之子䕶軍㕘領寛保管理寛保故以額赫里之子䕶軍㕘領敦達禮管理敦達禮以老病辭退以其子蘇柱管理蘇柱年老休致以其叔祖珠瑪拉之二世孫常亮管理常亮故以其子中和管理中和吿休以其子和倫泰管理第一㕘領第八佐領係康熙二十三年将䕶軍叅領寛保及内大臣二等伯噶都少詹事喇巴三佐領内滋生餘丁編立始以額亦都二世孫一等侍衛宜圗庫管理宜圗庫故以其子川柱管理川柱縁事發遣以二等侍衛寳色管理寳色往守泰陵以其子三等侍衛明海管理明海故以其子郭興阿管理郭興阿補放山海闗副都統以其叔祖寳色之子達福管理達福故以其子善明管理第一㕘領第九佐領係康熙二十三年以瓦岱法喀二佐領滋生餘丁分立此佐領以超哈爾之子一等侍衛敦多和管理敦多和故以其叔父内大臣公遏必隆之子領侍衛内大臣公阿靈阿管理阿靈阿故以其子三等侍衛阿爾邦阿管理阿爾邦阿因病辭退以額亦都之三世孫三等侍衛寳積管理寳積降調以車爾格之二世孫㕘領赫邦額管理赫邦額故以阿達海之三世孫舒林管理舒林揀發浙閩以遊擊用以其弟閒散富敏管理富敏病故以依爾登之三世孫三等侍衛占布管理占布革退以其堂弟䕶軍叅領瑪清阿管理瑪清阿故以其子閑㪚蘇勒通阿管理蘓勒通阿故以英赫資之二世孫永强阿管理永强阿因病告退以其子閑㪚烏爾圖那思圖管理第一叅領第十佐領係康熙六年於巴爾虎達佐領内分出一佐領以額亦都之孫二等阿達哈哈畨漢文稱輕車都尉莫洛洪管理莫洛洪故以其兄都統兼議政大臣瓦岱管理瓦岱緣事革退以其兄托岱之子二等侍衛阿永務管理阿永務故以莫洛洪之子冠軍使陸實管理陸實故以其子冠軍使申特管理申特故以額必倫之孫愛必達管理愛必達陞任布政使以阿靈阿之二世孫穆克登管理穆克登故以其子祥保管理第一叅領第十一佐領亦係國初編設始以額亦都之子侍郎敖徳管理敖徳故以其子二等侍衛托岱管理托岱故以其兄班席之子巴爾虎達管理巴爾虎達故以内大臣遏必隆之子二等侍衛福保管理福保故以其子二等侍衛額圖琿管理額圖琿陞任㤗陵總管以其兄之子恩特管理恩特陞任以其伯祖之三世孫豁什巴管理豁什巴故以其子塔清阿管理第一叅領第十二佐領亦係國初編設始以愛通噶管理愛通噶故以其弟竒喇管理竒喇故以其弟俄木索科管理順治九年改令一等公鰲拜管理續以其子那穆福管理那穆福因事革退以覺羅他達管理他達年老辭退以那穆福之子三等侍衛達禮善管理達禮善故以其叔父之子一等阿思哈尼哈畨漢文稱男蘓合管理蘓合故以達禮善之弟公達福管理達福陣亡以其子公岱屯管理岱屯故以其子徳勝管理第一叅領第十三佐領係康熙二十三年以覺羅佛倫所管半個佐領與内大臣覺羅他達所管半個佐領合為一整佐領以一等侍衛覺羅長命管理長命故以其子二等侍衛覺羅長生管理長生故以其弟三等侍衛覺羅長徳管理長徳故以長生之子覺羅長安保管理續以員外郎覺羅法海管理法海陞任以雲麾使覺羅海雲管理謹案覺羅佐領扎拉芬四保二人於乾隆四十五年八月告祭太廟獻爵貽悞未到奉将此兩個佐領下覺羅人等合併㫖革退經本旗具奏作為一覺羅公中佐領仍附入第一叅領所屬其餘兩個佐領下滿洲人等合併作為一公中佐領仍附入第五叅領所屬第一叅領第十四佐領係康熙十二年初編新滿洲四十佐領之一始以札努喀管理札努喀因授散秩大臣辭退佐領以竒紹管理竒紹故以札努喀之子多喜管理多喜緣事革退以其叔父之子賽因圖管理賽因圖出缺以其子武什忒管理武什忒告病以札努喀之孫佛林保管理佛林保故以其子阿蘭㤗管理阿蘭㤗故以其子福僧阿管理第一叅領第十五佐領亦係康熙十二年始編新滿洲四十佐領之一初以二珠管理二珠因目疾辭退以其弟瓦留管理瓦留故以其子西木圖管理西木圖故以其伯祖之子達巴爾漢管理達巴爾漢年老辭退以其子鄂通武管理鄂通武革退以其子程琳管理第一叅領第十六佐領係康熙二十三年将札努喀瓦留二佐領内滋生餘丁分出一佐領以札努喀之弟一等侍衛巴爾出喀管理巴爾出喀故復以札努喀管理札努喀故以其族人二等侍衛碩龍武管理碩龍武緣事革退以札努喀之子多喜管理多喜故以其弟之子魏三管理魏三出缺以其子札倫㤗管理札倫泰出缺以其子阿興阿管理阿興阿革退以魏三之次子五倫太管理五倫太出缺以其子阿隆阿管理第一叅領第十七佐領係雍正十三年冬奉㫖外祖凌柱之先人世敦淳樸克篤忠誠積厚流光恵及後裔爰誕育我聖母皇太后播懿徳於宫闈懋坤儀於邦國今外祖凌柱尚在公中佐領朕應推廣皇太后之恩特賜佐領俾其子孫世相承襲但伊等一支人丁不敷編集凌柱之叔祖額亦都巴圖魯軍功所得屬人甚衆故編為九佐領此九佐領内滋生人丁頗多可於此内酌編一佐領共成十佐領其新編之佐領即令凌柱之子管轄将來子孫世襲㒺替其族中子弟有願入新編佐領者聼之欽此隨将九佐領滋生人丁併公凌柱之本支及族人合編一佐領以公凌柱之子㪚秩大臣舅舅伊通阿管理伊通阿故以其子親軍觀音保管理第一叅領第十八佐領係乾隆四十年奉㫖将令懿皇貴妃之外戚人等由内務府撥出編立本旗因人丁不敷作為半分世管佐領以員外郎包衣佐領徳馨管理徳馨故以其子領催桂林管理桂林故以其子馬甲花沙布管理第二叅領第一佐領係康熙十九年編立初以内務府總管噶禄管理噶禄故以其子一等侍衛海青管理海青緣事革退以其叔父二等阿達哈哈畨兼二等侍衛色勒管理色勒緣事革退以其子一等侍衛色克圖管理色克圖緣事革退復以海青管理海青故以其子來文管理來文陞任江寧将軍以其弟之子三等侍衛札勒杭阿管理札勒杭阿陞任山西叅将仍以來文管理來文告病以其姪國興額管理國興額故以來文之子竒秀管理竒秀革退以其堂弟厄騰額管理厄騰額故以其子福勒敏管理第二叅領第二佐領係康熙七年編立初令領侍衛内大臣公倭赫管理續以其子公傅爾丹管理續以其子公兆徳管理兆徳緣事革退以其弟公哈達哈管理哈達哈緣事革退仍以其兄兆徳管理兆徳故以其子克陞額管理克陞額緣事革退以其弟復興管理復興故以其弟富鋭管理第二叅領第三佐領係國初以馬佳地方來歸人丁編立始令黒東格之孫札爾固齊漢文稱逰牧雅希禪之子拜他喇布勒哈畨漢文稱騎都尉龔衮管理龔衮陣亡以尼馬禪之子叅領温都禮管理温都禮陞任江寧協領以其弟一等侍衛譚都管理譚都故仍以温都禮管理温都禮陞任陵寢總管以其子一等侍衛濟博琿管理濟博琿故以其叔父之子一等侍衛達賴管理達賴故以雅希禪之二世孫釋迦保管理釋迦保故以其子富森管理富森陞任盛京刑部侍郎以其子長春管理長春緣事革職以其弟臺麟管理臺麟陞授貴州副将以富森之孫親軍魁成管理第二叅領第四佐領原係第三佐領内人丁康熈二十三年達賴管佐領時因人丁滋盛分出一佐領以其伯父之子一等侍衛常官保管理常官保緣事革職以其伯祖黒東格之二世孫副都統噶勒璧管理噶勒璧年老辭退以其子恩格徳管理恩格徳因病告退以常官保之子陳岱管理陳岱緣事革職以其弟清海管理清海故以其子永徳管理永徳緣事革職以其伯父成岱之子六安管理第二叅領第五佐領亦係第三佐領内人丁康熙七年濟博琿管佐領時將滋生餘丁分出一佐領與黒東格之二世孫䕶軍統領洪海管理