body:
  text: 土田志十四八旗牧場畿輔牧場奉天牧場駐防牧場畿輔牧場順治二年題準御馬場及王貝勒貝子等馬場俱各按本旗地方牧養又題準天師庵草場設場尉筆帖式及書役甲兵巡守又題準近京廢地均撥給壯丁墾種如撥給有餘方準為牧馬場六年題準順義清河漷縣沙河蘆溝橋五處荒地二萬四千四百七十四晌潞河沙河清河桑乾河兩岸各長五里濶三里俱令丈作馬場又定嗣後棄地為牧場之例永行停止如沙地不堪耕種者仍留牧馬十一年題準給親王牧場方八里郡王牧場方四里十二年覆準親王牧場方二里郡王牧場方一里額外多占者察出撥給新壯丁康熙元年題準天師庵草場歸併崇文門部員管理其原設官役甲兵俱裁十二年題準太僕寺牧場向係户部撥給入官人看守今內府並諸王貝勒等馬匹就牧場內餘丁選補看守如無可選者仍行令户部撥給鑲黃旗牧場坐落武清寶坻二縣東自唐畦西至陳林莊七十里南自張家莊北至上馬臺九十里正黃旗牧場坐落天津府西北自俞家莊東北至小稍子口三十五里西南自孫家莊東南至秋家莊四十七里正白旗牧場坐落天津府東自好字沽西至白家莊四十二里南自城兒上北至清溝六十五里正紅旗牧場在甕山者二百五十晌在蘆溝橋西髙陵者四百六十晌鑲白旗牧場坐落通州四百一十四晌鑲紅旗牧場坐落順義縣在天竺馬房村者五百八十八晌在蘆溝橋西者八十晌正藍旗牧場坐落豐臺玉蘭等莊東西三十里南北五十里鑲藍旗牧場坐落草橋十里廊房八里右俱會典以上畿輔牧場奉天牧場順治五年奏準奉天中前所前屯衛中後所三處地令八旗均分為馬場自東迤西先給兩黃旗次兩白旗次兩紅旗次兩藍旗康熙二年題準錦州大凌河牧場東至右屯衛西至鴨子厰南至海北至黃山堡仍留備牧馬之用不許民開墾乾隆十三年議準大凌河馬場長百餘里濶自二三十里至六十里不等甚屬寬廣今既裁減馬羣應於馬場西界橫截十里給官兵就近耕種以資養贍但恐伊等日後圖利私行侵占開墾耕種有礙馬場令差往大臣會同副都統並總管核明應裁牧場地址編定四至注册備考又奏準大凌河馬場東西長九十里南北長十八里至六十里不等折算約二百九十餘里計地一萬七千九百餘頃應遵照原議自西界橫截十里會同副都統牧羣總管丈量西邊自南至北長十八里有竒東邊自南至北長二十里有竒而此所截地內南界窄狹北界雖寬而有山有足截十里者有不足十里者依地勢裁給共計九百三十八頃有竒隨定界址東至杏山之北濠溝西至鴨子厰南至七里河北至金厰堡將裁截之處建築封堆以杜將來私墾右俱會典興京牧場地三千八百十晌零九分撫順界內右翼四旗牧場九百七十晌五畝一分開原八旗兵丁等牧場自城外遼河東西至朔羅阿林止遼陽城所屬八旗牧場四處在沙溝子船城單家莊小網户屯哈達霍羅牧場自開原城東墨爾根村起至商家臺止復州界內八旗牧場一萬九千四百三十六晌熊嶽城界內八旗滿洲蒙古巴里虎漢軍牧場地二百七十五頃九十畝金州界內牧場七十四頃五十八畝秀巖界內八旗官員兵丁牧場三百七十頃三十畝二分牛莊所屬新倍河馬場一處寧古塔界內左翼四旗牧場在城西北四十五里外自阿都和洛北拉哈米河口以南至厄木海蘭長五十二里東自色勒木哈連蒙阿西至恩格木阿林寬三十五里右翼四旗牧場在城南五十里外自窩楞河茶庫拉法蘭北木敦東阿爾哈河口西至烏爾虎和洛木敦長四十九里自茶庫拉法蘭北木敦南至蛟梅佛恆寬十八里渾春界內鑲黃正黃正白三旗牧場在渾春村南九十里綽庫北自竒他帕他阿林以南至朱黑俄莫長二十里綽庫東自海岸以西至達爾吉阿林寬十八里三姓地方鑲黃正黃正白正紅四旗牧場在城東南四十三里自海蘭俄莫北至翁肯河南烏魯林河長三十四里東南自達庫蘭阿林以西至你爾格墨阿林寬二十六里阿爾椘哈界內鑲黃正黃正白三旗牧場在城北七十里自德克秦東至阿爾椘哈河口長二十里德克秦西至羅進蘇蘇長五十里自德克秦北至松阿里江岸寬五里德克秦以南寬五里吉林烏喇界內牧場鑲黃旗自臥必拉北東至雅通阿必拉十里西至扎棍必拉五里北至馬哈拉阿林四十里正黃旗自依拉秦河至扎棍和吞長十二里自扎棍必拉至卧爾混寬十三里正白旗自恩皮溝源至馬哈爾圖山長三十里自恩皮溝至某哈連布占寬十五里鑲白旗自雅通阿必拉至扎棍必拉長二十里自雅通阿必拉至馬哈爾吞阿林寬十五里正紅旗自刷煙必拉口南至大路長三十里自沙倫河至刷煙必拉寬二十里鑲紅旗自卧爾渾必拉至沙倫必拉長二十五里自對鶯厄至波諾和必拉河口寬二十里正藍旗自阿克敦霍洛昻噶至扎棍必拉長二十五里自依拉秦必拉河口至雅通阿必拉寬十五里鑲藍旗自波諾和必拉河口至依爾門必拉長三十里東至扎棍必拉寬二十里白都納牧地在拉哈傅和舍庫地方長一百四十里寬三十里右俱奉天來册以上奉天牧場駐防牧場康熙三十年覆準德州駐防官兵向在滄州牧馬因越省不便將霑化縣邵家莊所有荒地令作馬場其應徴地畝銀兩準其豁除三十九年題準天津等十二州縣衛所牧場派都統等會同直撫查明東翼四旗丈出餘地一萬二百六十一頃零西翼四旗丈出餘地一十八萬八千四百六十二晌交與地方官招民墾種照開荒例起科雍正二年議準八旗存留牧場并牧場餘地差八旗都統一人率户部賢能官二人每旗賢能官一人令直督委道員一人公同察勘其有可以墾種者交與地方官招民墾種其不堪耕種之處仍交八旗作為牧場五年諭禮部並無飯食銀兩郭家莊天竺村兩處厰地著賞給禮部共地一百八十一頃零右俱會典四川滿城駐防馬厰地共六千二百八十六弓坐落沙河鋪南至大橋趙國良為界西至玉祥山山嶺為界東北以大路為界本駐防來册乾隆二十九年四川總督阿爾泰奏言川省有沙河鋪牧厰以供養馬惟是該厰係屬山坡與民田髙下夾雜年來户口日繁逐漸墾闢環厰民地盡成膏腴若任營馬放牧則有損田禾若令逺地刈草則不敷食用臣察看該地原可種植有收視産草出息何啻數倍與其以沃壤而委為荒瘠不若開墾收租以充馬兵草束之用詔從之右國史館抄摺三十二年五月大學士公傅恆奏上年十二月臣等議覆山西綏逺城右衛牧厰餘地招民墾種起科準行在案詳見駐防規制卷內但據稱此等地畝較察哈爾土性瘠薄祗可種植雜糧應照口外不分等則之例起科臣思徴賦之輕重宜視收成之厚薄今該撫請照口外之例不分等則每頃徴銀一兩四錢閏嵗加徴四分二釐每一兩加耗五分以為傾鎔解費之處此時未可懸定應令試看成熟後量其收穫多寡再定規則至此項需募佃民千餘户將來俟認種人多即令該處兩通判稽查彈壓臣等復思該處佃民聚集既多其中或不無遊匪攔入滋生事端並姦民抗租逃避各情弊宜嚴飭承辦之員時時加意稽查妥協經理奉旨依議四十年七月西安將軍傅良奏西安駐防八旗馬厰坐落興平盩厔扶風武功等縣前于乾隆四年題明每旗分地一百二十頃共地九百六十頃牧放馬匹嗣於十五年前督臣尹繼善因各厰逼近渭河水流遷徙且有漲出灘地委員勘明各照原額另立界址其厰外餘地給民耕種取租充公奏明辦理在案查八旗馬兵原有五千三百名養馬八千六百有竒自節次移駐新疆等處現在存營滿兵止一千五百名每人拴馬一匹連出征金川馬兵二千名共存馬三千五百匹實無需厰地九百六十頃之多臣與撫臣畢沅商議若以四旗厰地四百八十頃牧放現在存營及將來四川凱旋馬匹實已寬綽有餘其餘四旗厰地四百八十頃招募附近居民開墾耕種即照民種厰外餘地之例每􅒪租銀一錢令地方官解交布政司庫移送滿營以作兵丁紅白賞恤之需再有贏餘即以充八旗公用如此辦理兵丁紅白事件既得永逺經費而空間厰地亦不至棄為廢壤矣奉上諭傅良等奏八旗馬厰地內酌將餘地四百八十頃交地方官招民墾種升科以作兵丁紅白賞恤之需一摺事屬可行已批交該部議奏矣此項地畝當官兵移駐新疆之後即有空間彼時早應查辦何以直至今日始行具奏尋兵部議準駐防旗營設立馬厰自應計馬數多寡隨時籌辦庶可耕之地不至廢於無用而地租所入亦足資永逺經費應如該將軍所請準其存留四旗厰地為旗營放牧其餘四旗厰地招募居民墾種以作兵丁紅白恤賞之需如有餘剩即留充八旗公用年終造册報部查核奉旨依議十月軍機處議西安將軍傅良等疏稱前任將軍容保在馬厰地方每旗建蓋馬棚一百間共八百間又造運草厰船四隻厰地種苜蓿六十三頃其馬棚現多坍塌船隻亦已朽壞若不早為籌辦必致烏有所種苜蓿有名無實辦理殊屬未協又坍損營房六十間現在尚堪㨂用之各料物請移至現留右翼四旗厰內另蓋營房等語均應如該將軍等所奏辦理造册送部查核但查馬棚船隻二項係乾隆三十二年搭造原建房屋八百間計用銀五千一百兩有零何至現在估變僅值銀四百九十四兩從前派何員辦理應嚴查浮冒等弊據實恭奏並將原動銀四千八百餘兩著落該員名下追賠即查無侵蝕情事而辦理不能堅固致多坍塌朽壞亦應令原辦之員與容保按股分賠至所種苜蓿六十三頃用銀三千三百餘兩之多當時自應委員承辦種後是否收成該將軍亦應查核何至有名無實均須徹底根究奉上諭西安滿營原辦馬棚船隻未及十年估變竟不及十分之一浮冒情弊已所不免至栽種苜蓿一項不過墾地布種無須大費工力何竟用至三千三百餘兩之多且歸於有名無實其弊不可不徹底查究著傳諭傅良畢沅即將其中情弊秉公逐一確查務令水落石出毋得稍涉瞻徇又户部議準殺虎口外民墾王公馬厰地畝照太僕寺地畝之例每頃徴租銀一兩四錢每兩隨徴耗銀五分遇閏之年每兩徴閏月銀三分乾隆三十八年宗室訥木謹恭進厰地案內係照此辦理至四十年奉恩將軍𢎞晌恭進厰地經户部議奏即仍訥木謹之例奉旨依議此項地畝租息亦著照訥木謹之例賞給𢎞晌十分之三五十年十二月軍機處議宗室德齊奉恩將軍恆林各進厰地坐落殺虎口外阿布達里地方與將軍𢎞晌公恆祿等家地段相連原報續報共升科地六百九十九頃零內除𢎞晌恭進地畝一百七十五頃零業已劃清又恆祿原分地一百七十二頃零仍照例徴收報撥聽其自行收租外其德齊恆林共原分地三百五十一頃一十一畝此外復有續丈出民人私墾地一百四十頃八十四畝均請照數一并入官請自乾隆五十年升科起飭令寧逺廳照例按年每畝徴銀一分四釐遇閏每兩加三分每正銀一兩隨徴耗銀五分遵照口外定例開銷餘剩耗銀隨同正銀解司報撥每年八月開徴嵗內全完按期解司次年造册報銷至地户人等違例私墾本應定擬但事在本年恩詔以前應從寬免議其新墾之地均在近年所得花利僅敷墾本應請免追又厰地內民人建房築寨應聽照舊居住仍於遊牧毗連之處分别刨溝砌石為界並每村設立鄉保編查保甲以防姦匪承種民人照例給與執照填明花名頃畝四至如有不願承種者稟官退地另行召墾不得私相買賣奉旨依議此項地畝租息著照𢎞晌之例賞給德齊恆林各十分之三以上駐防牧場欽定八旗通志卷七十五
