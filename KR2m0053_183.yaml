body:
  text: 欽定四庫全書欽定八旗通志卷一百六十九人物志四十九大臣傳三十五滿洲鑲白旗三塔格斯泰希賽喀納額司泰勤岱福杭愛敏彰庫瑪竒博霽二格鄂海福格斯泰格斯泰滿洲鑲白旗人姓瓜勒佳先世居瓦爾喀父赫勒太祖髙皇帝時隨其叔祖斡珠率族來歸斡珠任佐領赫勒任驍騎校太宗文皇帝崇德三年睿親王多爾衮統師征明由青山口入邉越燕京攻獻縣赫勒樹雲梯先登克其城六年襲管佐領事七年隨饒餘貝勒阿巴泰征明自薊州南略至山東屢敗敵兵世祖章皇帝順治元年豫親王多鐸追𠞰流賊李自成破潼關二年移師平河南江南赫勒並在事有功尋從端重親王博洛征浙江敗敵於嘉興城外四年彚敘軍功豫雲騎尉職世襲罔替遇恩詔晉騎都尉尋卒長子格森襲職格斯泰赫勒次子也初為睿親王府一等護衛裁革未補尋充護軍校隨寧海大將軍伊勒德𠞰海賊於浙江署前鋒侍衛順治十三年大軍由寧波乘舟趨定海偽伯阮思偽總制陳六御等率衆三萬列二百餘艦于衡水洋格斯泰率衆擊郤之諸軍並進斬阮思陳六御等遂定舟山格斯泰得頭等功牌二聖祖仁皇帝康熙二十年隨都統瑪竒討逆孽吳世璠由廣西進征敗賊于石門坎黃草壩攻克雲南城凱旋擢前鋒參領兼管佐領二十九年七月命裕親王福全為撫逺大將軍征噶爾丹內大臣佟國綱前鋒統領邁圖等為參贊格斯泰隨征八月朔師次烏蘭布通噶爾丹于隔岸樹林中卧駝為營兵伏其後佟國綱率兵進擊中鎗殁格斯泰直入賊營左右衝擊賊莫敢當出而復入者再諸將士由山腰繞賊後擊之潰遁格斯泰乘勝窮追為河岸淖泥所阻賊衆掩至格斯泰力戰與邁圖及護軍參領赫色巴錫巴雅爾璊岱營總韓大任前鋒校珠旺勒等皆殁於陳議恤有差賜格斯泰祭葬如副都統例初大兵將出征時上賜護軍參領等人各一馬前鋒參領未預格斯泰請給命自往上駟院選擇馬有白鼻者格斯泰願得之或言此馬固雄駿然白鼻自古所忌恐不宜用格斯泰曰效命疆場吾夙願也何忌焉遂乘馬行至是裕親王奏言與賊戰時親見一將乘白鼻馬三入敵陳衆皆識為格斯泰也櫬至京遣侍衛奠茶酒部議豫雲騎尉世職上曰格斯泰效力年久勞績顯著再與一雲騎尉合併為騎都尉以其子幹珠罕襲後以襲次滿停襲今上乾隆十五年詔核八旗世職之以死事恤敘而襲次已滿者特豫恩騎尉世襲罔替復以格斯泰之曽孫英福襲賽喀納子納齊喀賽喀納滿洲鑲白旗人姓布賽初任典儀世祖章皇帝順治十四年授二等侍衛尋擢一等侍衛聖祖仁皇帝康熙九年二月授護軍參領十四年三月察哈爾布爾尼叛上命信郡王鄂扎為撫逺大將軍大學士圖海為副將軍討之賽喀納隨征師次達祿聞布爾尼以兵三千屯踞山後大兵緣山谷而進賊兵二百伏山溝突出衝犯賽喀納奮勇擊敗之遂進擊屯聚賊衆布爾尼散郤旋收集潰卒千餘排列鳥鎗接戰賽喀納擊敗其前隊賊遁據山巔大軍分路並進賽喀納領隊扼其要隘斬獲甚多布爾尼逃奔扎嚕特境之貴勒蘇台山後為科爾沁右翼總管沙津射殪斬首馳獻大軍凱旋敘功豫賽喀納雲騎尉世職二十一年十一月授鑲白旗蒙古副都統二十二年九月調鑲白旗滿洲副都統二十七年五月卒次子薩木齊喀襲職長子納齊喀初官內閣中書康熙四十五年十月隨大學士席哈納往湖廣鞫訊容美土司田舜年私鑄擅殺罪狀還京轉典籍四十九年遷刑部主事五十二年遷本部員外郎時皇太子允礽護衛德麟獲罪其父阿哈占任福陵總管上命其自行拘禁德麟詐自縊死潛逃竄奉天將軍瑭保住以奏上命選才幹司員訪緝納齊喀同主事舒琳往膠州捕獲之德麟伏誅納齊喀議敘即升尋授兵部郎中五十四年辦事密本房五十七年任揚州𣙜關監督期滿派往阿爾台養贍歸附之烏梁海厄魯特事竣回兵部任兼佐領六十一年十月授山西布政使世宗憲皇帝雍正元年正月擢湖北巡撫二年十二月疏言湖北州縣全食淮鹽近因生齒浩繁正慮食鹽不敷巴東縣與四川夔州府之巫山縣連界山峻路險商販罕至今縣北紙倍溪山中忽湧鹽泉試令煎熬日得鹽二千斤有竒計每嵗可得七十萬餘斤請敕部酌照淮鹽川鹽設引起課于國計民生均有禆益事下部議令會同兩淮巡鹽御史詳酌以行三年二月疏言康熙五十九年截留漕米六萬石分發近水州縣貯倉備賑已閲五載紅朽堪虞請于青黃不接時平糶以裕民食俟秋成後計所糶米一石可易榖二石如嵗豐榖賤尚有贏餘一并還倉積貯庶可經久疏上得旨納齊喀奏請湖北各州縣所貯米石易穀存倉以為經久之計具見實心辦事殊為可嘉尋以疾奏請解任詔總督楊宗仁暫署巡撫納齊喀給假調養俟病痊任事遣太醫診視齎賜珍藥及參四斤五月卒年六十遺疏上得旨納齊喀簡任巡撫敬慎自持實心任事忽聞溘逝朕心深為軫惻下所司議恤部議納齊喀任巡撫未滿三年以致祭一次可否給半葬請上命給全葬並豫諡勤恪額司泰額司泰滿洲鑲白旗人姓富察大學士額色赫弟也初事世祖章皇帝任一等侍衛聖祖仁皇帝康熙三年授鑲白旗蒙古副都統九年遷護軍統領十二年逆藩吳三桂反上命順承郡王勒爾錦統師征討以額司泰參贊軍務會侍衛阿爾賽自荆州還奏賊由貴州陷沅州總兵崔世祿降賊澧辰道梗湖以南半入于賊總督蔡育榮亦飛章入告因詔額司泰同護軍統領伊爾都齊簡精鋭先發十三年二月抵荆州上以常德長沙二郡為三楚要地命額司泰與前鋒統領碩岱都統珠滿移駐守禦值二郡已為賊陷仍駐荆州未幾賊將劉之復陶繼智率賊萬餘犯宜昌營于江之兩岸總兵徐治都告急額司泰乃自荆州移師赴援與徐治都等率舟師橫江逆擊戰甫接賊潛以三百人登岸擾我後我師分擊敗之得賊舟三賊遁走越三月師次嶽州界時三桂據澧州其黨吳應麒廖進忠柯鐸髙起隆據嶽州馬寶張國柱復率賊二萬自澧州水陸坌集並于陸地設鹿角阻我騎兵額司泰與貝勒察尼將軍尼雅漢定議山岡為賊門户令前鋒兵先奪之以扼其吭繼令護軍驍騎分路堵截且檄緑旗兵奪據城陵磯及七里橋使賊首尾不相顧至期聞貝勒營吹角額司泰率前隊戰艦擊賊衆軍以次並進攻燬賊船殱賊萬餘賊退踞七里橋東木柵乃收兵還營是年冬奉詔參贊貝勒尚善軍規復嶽州值賊勢披猖我軍未能進取久相持十五年三月上諭尚善曰頃安親王嶽樂已復萍鄉醴陵進取長沙逆賊吳三桂遣其黨馬寶髙起隆自嶽州赴援賊勢既分毋坐失機會于是尚善部勒水陸諸軍令額司泰統率進𠞰賊船列陳洞庭湖鐵鎖鈎連炮火矢鏃如雨額司泰自率鋭卒衝其北令副都統路什擊其南軍士皆奪船奮進大敗賊追擊三十餘里賊之據君山者皆遁獲船五十二偽印五纛仗盔甲無算擒賊百七十餘人十六年二月卒於軍先是統師王貝勒屢奏額司泰敗賊功皆得旨嘉奬俟事平日議敘至十九年大軍凱旋部議王貝勒大臣征嶽州時退縮不前罪額司泰既病殁應籍家産上原宥之塔勒岱塔勒岱滿洲鑲白旗人姓博和哩先世居黑龍江祖額徵古太宗文皇帝天聰時來歸塔勒岱初任前鋒校聖祖仁皇帝康熙元年隨定西將軍愛星阿由雲南入𬗟甸追擒明桂王朱由榔在事有功十年授前鋒侍衛十三年逆藩吳三桂之黨談宏吳之茂王屛藩等據四川塔勒岱隨前鋒統領穆占𠞰賊于野狐嶺賊以千餘衆伏林箐出步騎百餘誘戰塔勒岱先衆迎擊敗賊盡發其伏分隊撲𠞰賊俱竄走復擊敗偽總兵葉某於陽平關進征保寧偽總兵鄭歪嘴吳印龍韓天福等先後率衆水陸來犯咸擊郤之自蟠龍山還至郿嶺及龍潭驛兩遇賊衆邀截並擊之潰遁敘功豫雲騎尉世職值陜西提督王輔臣叛據秦州平涼塔勒岱隨穆占往𠞰敗偽總兵高鼎於隴州進圍秦州擊郤賊兵之自平涼保寧來援者秦州既下遂趨平涼屢擊敗迎戰賊衆十五年王輔臣降吳三桂尚據湖南穆占奉詔為征南將軍移師湖南塔勒岱率兵隨十七年駐師攸縣賊將王國佐屢率衆犯城塔勒岱戰郤之復敗偽總兵黃士彪裘萬寶于酃縣桂陽州諸處十八年敗賊將吳國貴吳應麒等于永州沅州凱旋授護軍參領二十年調前鋒參領二十三年擢前鋒統領二十四年擢鑲白旗蒙古都統彚敘陜西湖南軍功晉世職為騎都尉兼一雲騎尉二十五年七月卒賜祭葬如典禮諡勇壯子竒蘭布襲職希福希福滿洲鑲白旗人姓納喇由六品筆帖式補授刑部員外郎康熙六年京察二等輔政大臣鰲拜因與希福叔父賽音布有隙矯詔將希福並其兄户部主事紀泰革任八年鰲拜得罪紀泰始訴寃部議復紀泰及希福職九年五月補原官尋遷吏部郎中十八年四月遷內閣侍讀學士五月擢內閣學士二十年五月充經筵講官六月授兵部右侍郎二十一年調吏部右侍郎二十二年二月遷都察院左都御史四月疏言海內大定提鎮諸臣宜次第入覲以重閫寄得旨在外提鎮等官鎮守封疆關係緊要若概令來朝逺離汛地必致曠職如有應陛見者奏請候旨定奪八月授川陜總督二十三年二月疏言漢中舊有駐防滿洲兵及城守副將一員兵八百餘名所屬并要隘駐防兵又二千餘名其地嵗征糧米散給本處各營已恐不敷今又移臣標官兵七千並家口三四萬往駐兵糧不足勢必令西安州縣饋餉西安距漢中千餘里棧道轉運甚艱請撤漢中駐防兵仍駐西安臣撥標下將官馬兵五百火器營兵五百同滿洲兵輪班往駐臣每年秋後親往巡察一次兵民俱無纍下部議行又疏言前奉諭旨撥臣標官兵駐廣元廣元距秦省甚逺棧道﨑嶇所撥兵千名馬千匹應支糧草難帶本色今廣元亢旱物價騰貴恐致糜費請照秦省糧價給兵自行採買從之二十四年四月疏言洮州界接諸番舊設副將駐守前因逆賊王輔臣變亂移副將駐岷州而以守備駐洮州原為易于調遣今兩地已平岷州雖要較洮州差緩請仍舊下部議行五月疏請免追進川兵丁長支錢糧九卿兩議一請敕巡撫提督等詳察一請遣大臣嚴查得旨向年軍興之時兵丁甚屬勞苦若嚴行扣追朕心甚為不忍此項錢糧應與豁免以示朕優恤士卒至意二十五年閏四月疏言川省地廣人稀土司畨蠻雜處恐有私收軍器禁物及姦徒串賣等弊各官慮踈防範請嚴行禁止定例處分如所請行又言四川撫臣姚締虞才學優長􅊩任未久得民情上以希福徇情保薦令明白回奏尋下部議降二級調用得旨從寬留任八月疏參延綏總兵李承恩年老戀職應勒休從之九月遷刑部尚書二十六年二月因少詹事覺羅僧參被盜希福審理失實經宗人府題參革職又雲貴總督蔡育榮于任湖廣總督時坐視湖南城池失陷嗣任雲貴總督隱吳逆財物希福承審瞻徇不逐欵嚴訊從輕擬罪部議希福已于别案革職應枷號鞭責得旨希福著照部議完結後發往黑龍江披甲效力贖罪尋卒杭愛杭愛姓黃佳先世居貝琿山沁髙祖桑武于太祖高皇帝時來歸後𨽻滿洲正黃旗尋改𨽻鑲白旗父古爾嘉琿世祖章皇帝順治初年任國子監祭酒杭愛初任禮部筆帖式旋擢主事纍遷吏部郎中康熙十一年授山西布政使聖祖仁皇帝諭之曰朕以爾才能向欲內用今因外省事重特授此職督撫之下藩司職掌最要爾其克盡忠誠以副簡用十二年擢陜西巡撫十三年逆藩吳三桂反滇蜀煽動文武率叛降賊上命都統錫卜臣為鎮西將軍與副都統巴喀等駐守西安復遣都統赫葉為安西將軍率師入蜀特諭杭愛督運糧餉遣發官兵水陸防護會提督王輔臣叛降吳逆杭愛與總督哈占復奉撫綏招徠之命十四年二月賊陷皋蘭河西道梗饋餉不繼大兵進規四川又悉取道於陜杭愛因疏言大兵日需糧餉皆取給西安鳳翔諸府若僅由陸轉輸山路﨑嶇緩不及事必兼水道並運庶足濟軍食應遣員赴略陽亟營船艦以速糧運并請募商運糶兼開納粟事例以足軍需事並下部議行十九年調任四川巡撫大兵方分道進取滇黔杭愛督理軍餉以地經新復部選人員多未􅊩任且水道舟艦無多不能濟運上疏論之奉諭陜甘督撫即以略陽運艘直運敘州會叛鎮談宏據萬縣煽亂巫山雲陽間上命將軍噶爾漢等速𠞰談宏仍敕杭愛與將軍烏丹等慰撫夔州諸路以安反側明年建昌土司安泰寧招集賊衆隂蓄亂謀勇略將軍趙良棟奏請殄除之上以小醜不足煩兵力敕杭愛與將軍王進寶先往招撫不服而後移兵誅𠞰杭愛因申諭以禍福泰寧懼遂來降是時滇黔尚未靖總督哈占以大兵由永寧進征需糧甚亟請于永寧瀘州諸路採買支給杭愛奉詔籌計督趣輸運先是吳逆倡亂四川郡邑悉為賊據百姓逃亡辨兵強占民田抗賦不納至是杭愛疏言方今逆孽漸平逃亡漸歸請急行清理占種民田者令即給還違者論罪若開墾年久無原業主憑契領歸者仍聽佃種輸賦得旨允行二十一年又以從逆巡撫羅森任內揑報墾荒四百餘畝升科無出未便纍民疏請豁免部議不準詔如所請二十二年七月杭愛卒于官賜祭葬如例諡勤襄祀四川名宦祠彰庫彰庫滿洲鑲白旗人姓瓜勒佳父多克索哩于太宗文皇帝崇德三年從征明攻南皮縣以雲梯先登克之賜號巴圖魯豫騎都尉世襲罔替世祖章皇帝順治七年九年三遇恩詔晉二等輕車都尉既卒彰庫襲聖祖仁皇帝康熙十三年以驍騎校署參領隨定南將軍希爾根征逆藩耿精忠至江西賊已陷建昌撫州等府乃先𠞰賊撫州偽都督易明擁兵拒戰擊敗其衆賊合建昌援兵夾犯我軍復大敗之又殪偽都督楊益茂等于七里岡賊將邵連登衆號八萬今偽都督九人分領依長興山掘壕排列彰庫率兵衝擊屢有斬獲又至宜黃縣擊敗賊衆旋赴建昌敗賊將李茂珠李復勝等于城南之鎮鼓山十九年五月隨都統勒貝𠞰賊廣西栁州時逆孽吳世璠之偽將軍范齊韓詹仰等糾賊二萬列柵於栁州之陶登彰庫領隊進擊斬獲甚衆賊潰遁二十年正月隨平南大將軍賚塔進征雲南連破賊將何繼祖王宏勳等于石門坎黃草壩等處乘勝薄雲南城下擊敗迎戰賊兵七月隨都統希佛追賊將馬寶巴養元戰于烏木山大敗之馬寶等窮蹙來降是年賊平凱旋任佐領二十二年授護軍參領二十五年敘功豫騎都尉世襲罔替合所襲之職為一等輕車都尉又一雲騎尉三十六年擢正藍旗漢軍副都統四十年調鑲黃旗蒙古副都統四十四年調鑲黃旗滿洲副都統四十五年致仕四十七年十二月卒禮部以應否給與祭葬請諭曰彰庫自任副都統以來並無顯著功績副都統祭葬著停給所有世職應得恤典照例給與子海寶康熙三十三年進士官翰林院檢討襲世職瑪竒子常賚瑪竒滿洲鑲白旗人姓納喇國初有哈達萬汗之族素巴海率二百人來歸為世管佐領瑪竒其曽孫也初由顯親王府護衛遷長史旋擢護軍統領康熙十八年十二月遷鑲白旗滿洲都統列議政大臣十九年三月上念廣西進征大兵勞苦日久宜令畨休命瑪竒偕都統趙璉副都統宏世祿統兵赴廣西更代師次栁州降偽將王宗孝等三千餘人十月征南大將軍賚塔由南寧進取雲貴命瑪竒率兵急進十二月隨賚塔至西隆州率前隊兵進抵石門坎偽將軍何繼祖王宏勳等糾衆萬餘據險固守二十年正月瑪竒同都統勒貝等率前鋒急奪隘口後軍繼進合擊自午至酉前隊緑旗兵炮矢盡引退賊四路伏發犯我軍前鋒護軍分隊立俟賊近夾擊大敗之盡得其險隘分兵固守次早率勝兵疾馳安籠所復其城復領右翼兵擊繼祖及偽將詹養等于黃草壩破之奪營二十二進軍曲靖連復馬龍州易龍所及楊林城賊據渾水塘立營與嵩明州遙應分遣兵趨嵩明州乘賊不備攻破東門賊逸出西門追斬偽遊擊守備等渾水塘賊盡遁于是會貝子彰泰大軍直趨雲南省城營歸化寺吳世璠遣其黨胡國柄劉圮龍等出犯瑪竒率頭隊同諸將奮擊陳斬國柄圮龍遂圍城十月偕勒貝等奪城西北銀錠山賊列炮抵拒瑪竒等挺立當炮衝督兵掘壕築壘壘成俯瞰城中縱炮賊不能支內亂世璠自殺克雲南城瑪竒同都統穆占先入城撫民籍賊黨屬尋授鎮安將軍駐防雲南瑪竒偕彰泰等奏留每佐領兵十名駐省時希佛追𠞰叛黨胡國柱于建川州所率兵有年久者應于駐省兵內派换瑪竒疏言滇省初平土司猓猓甚多性情無定又新降官兵散處各地皆須防範若派换則需撥每佐領四名餘所留僅五名有竒未免單弱建川州距省千里山髙路險遣换兵刻期難到即到後馬力疲乏亦難追冦若再需休養又恐坐失事機希佛現帶之兵足以辦賊事竣即率回京請將駐省兵停其往换以固守禦下議政王大臣議從之二十三年八月甄别八旗大臣瑪竒以才力不及革職尋諭曰雲南兵丁屯駐日久今地方底定可乘此冬撤回十月瑪竒統滿兵回京三十五年卒子常賚雍正元年授工部員外郎遷郎中二年調户部郎中三年正月任通州坐糧廳十月授廣東布政使四年十二月擢福建巡撫時廣東巡撫楊文乾請假葬親命常賚署理五年七月疏言廣東近水田畝每苦夏秋潦漲廣州肇慶二府所屬受衝為最請以廣州通判兼管南海三水隄工肇慶通判兼管髙要髙明四會隄工冬間督率隄長按户派工務期修築堅固定賞罰法保固至三四年者紀録加級五年者即升衝決者鐫秩有差至搶修物料請仍徵魚􅀢鴨埠等稅以充公用詔允所請八月赴閩十一月疏言直𨽻河南山東山西陜西廣東六省流犯例發福建安插臣抵閩三月各屬流犯脫逃接踵皆因立法不嚴是以獲逃補配者什無二三請嗣後流犯配後脫逃地方官逾限不獲該管同兼轄官罰俸一年主守之保甲杖革如逃回原籍族鄰容隱按不應重律擬杖獲犯補配日先枷責以正逃罪再加徒役三年庶流犯畏法不敢逃地方官畏處分不敢不嚴緝矣部議兼轄官罰俸六個月餘如所奏六年正月調雲南巡撫先是常賚署廣東撫篆盜失摺匣鑰匙令匠役私造將軍標兵窩盜獲贓徇庇不究龍門汛盜劫兵械電白山賊劫人割耳從化山賊劫人勒贖並匿不奏又與將軍石禮哈署督阿克敦布政使官達訐奏楊文乾六月諭曰常賚本朕藩邸微員因其平日謹慎安靜是以擢至巡撫望其不忍欺隱也乃署撫任內盜失鑰匙潛匿不奏尚得謂無欺隱乎且與石禮哈等黨同伐異其罪不容貸著革職赴廣東質訊命通政使留保工部郎中喀爾吉善往粵偕總督孔育珣會鞫各案常賚坐私造摺匣鑰匙擬斬七年十一月諭曰原任都統瑪竒征𠞰吳逆著有勞績伊子常賚居官尚無贓欵祗因與石禮哈阿克敦官達等傾陷楊文乾又奏事不實以致罹於重譴今朕念伊父之功特赦其罪候另用尋命隨兵部尚書查弼納往陜總查軍需諸務八年五月擢刑部右侍郎十二月署寧夏將軍九年二月特授鎮安將軍統領肅甘涼兵五千自為一隊備應援五月率兵駐安西八月授西路副將軍十年正月凖噶爾賊兵侵逼哈密常賚偕都統艮敦總兵張存孝率滿漢兵三千二百名前赴烏克克嶺備禦三月授內大臣仍留軍營七月隨大將軍嶽鍾琪統兵萬二千移駐木壘九月自木壘移駐巴里坤十一年十月署大將軍查郎阿奏冬雪深積請分派大臣駐劄以慎防守副將軍張廣泗統兵一萬二百五十駐北山常賚統兵九千駐南山十三年閏四月命統緑旗兵一萬留駐巴里坤提督顔清如尚書馬會伯為副嗣凖噶爾乞和乾隆元年六月撤巴里坤兵與留駐哈密之提督樊廷總兵米國正管轄還京任內大臣五年九月因疾乞罷命以原官致仕豫半俸十一年八月卒賜祭葬如例博霽博霽滿洲鑲白旗人姓巴雅拉康熙十九年由護衛授長史二十二年擢鑲白旗蒙古副都統二十三年八月遷鑲白旗蒙古都統九月調鑲白旗滿洲都統二十四年授江寧將軍三十一年調西安將軍三十五年二月撫逺大將軍費揚古奉命由西路𠞰噶爾丹上命博霽統滿洲兵自寧夏往會費揚古軍五月大敗噶爾丹于昭莫多敘功授雲騎尉世職準襲一次十一月上以噶爾丹窘迫必走哈密命博霽擇西安兵未出征人材強壯者與將軍孫思克同偵禦三十九年七月上諭大學士等曰聞博霽自江寧赴西安時軍民哭送直至浦口彼若不善何能如此誠可謂將軍矣四十二年聖駕西巡閲西安官兵上以博霽訓練有方賜御用櫜鞬及弓矢諭曰朕巡幸江南浙江盛京烏喇等處未有能及爾西安兵丁者爾處官兵俱嫻禮節重和睦尚亷耻且人材壯健騎射精練深可嘉尚慎勿令其變易四十三年正月授四川陜西總督先是上西巡時以河南府居各省之中水路四達應截留豫省漕糧儲其地間遇山陜歉收即可由黃河挽運恐經三門底柱舟不能逆上至是命博霽偕陜西巡撫鄂海河南巡撫徐潮山西巡撫噶禮會勘三門底柱四月合疏言臣等會勘三門中流為神門水勢甚溜南為鬼門更洶湧北為人門勢稍緩三門之下為底柱再下二里卧虎灘臣等用船載糧三十石從卧虎灘挽上人門溜急灘多行舟艱難不如陸運便豫省漕糧截留于河南備貯陸運至陜州西門外太陽渡上船計三百餘里費較河路減下九卿議如所請四十五年疏言去嵗秋特奉諭旨念民間所用升斗大小不同令部臣較鑄平凖頒行臣已照式鑄造轉發各屬但陜甘收糧舊用永豐倉斗駐防兵糧亦以此支放相沿已久今以部頒新斗較量一石計短少三斗如以新斗收受即以新斗放給則十分之中已減三分兵馬糧料不無艱窘况陜甘兵馬較他省最多倘有行走全賴士飽馬騰查收受民糧時尚有多收耗糧一項未革請將此項耗糧永行禁革百姓交糧令照舊斗之數以新斗交收支給兵糧亦照舊斗之數以新斗量給則耗糧革絶民已樂輸恐後而陜甘滿漢十餘萬兵丁俱仰沐格外之恩矣下部議如所請其永豐倉斗永行停止四十七年閏三月卒遺疏入諭曰博霽久任將軍簡授總督效力有年巖疆重寄正資料理忽聞病逝朕心深為軫惻應得恤典察例具奏尋賜祭如例嗣子寶山襲雲騎尉寶山卒停襲二格二格滿洲鑲白旗人姓富察康熙二十六年由筆帖式授內閣中書厯遷理藩院郎中詹事府少詹事四十四年遷詹事尋擢內閣學士四十五年五月教習庶吉士先是湖廣總督石文晟劾奏容美土司田舜年私造宫殿暴虐姦淫種種不法舜年參革伊子田昞如假揑昞如幼子田翼南年嵗希圖承襲並劾桑植土司向長庚容匿昞如抗不解審六月上命二格偕左都御史梅鋗赴楚會同文晟等鞫之時舜年赴武昌申訴文晟拘之尋病卒長庚亦解昞如聽勘九月會鞫梅鋗石文晟各執一議具奏二格以證佐未集獄辭未定不便立議疏言昞如長庚巳到案取供至田舜年各欵僅取族侄田瑛如供詞梅鋗等俱欲以現取口供完結臣以為瑛如與舜年同被獲之人非舜年子弟伊親子及案內證佐二十餘名無一到者未經質審處甚多舜年治病之醫及檢尸之知縣洪國輔俱未到案舜年死未明白倘草率完結無以服衆土司心得旨總督石文晟原參田舜年建造宫殿行凶作惡是以羈留武昌今田舜年已故又具奏欲息其事如土司抗拒不法則當發兵征𠞰若無罪當反坐原參之人朕意以二格所奏為是此事不便令督撫提督會審當再遣大臣前往尋命大學士席哈納侍郎張廷樞蕭永藻察審田舜年僣越淫縱各欵俱虛其希圖承襲等事屬實應治罪已死無庸議田昞如暴戾虐民抗不赴審已革職仍枷責安插內地向長庚隱匿田昞如降四級留任並以草率具奏革梅鋗職總督石文晟及湖北巡撫劉殿衡偏沅巡撫趙申喬提督俞益謨各降級罰俸有差四十六年六月陜西盜犯朱璽魏學吾行劫商州雒南等處拒捕傷兵逃匿山澤千總趙璉招降之詔二格偕左都御史巢可托往勘朱璽等實因官兵四靣圍困計窮出降與自首不同論斬決從犯流徙寧古塔被脅百餘人俱免罪承審官未能得實各分别降革四十七年正月充經筵講官初湖廣鎮筸紅苗劫靖疆營民為官兵捕獲守備王應瑞訪知營民所在遣兵入寨欲援以出苗民拘留之戕一卒總兵雷如私釋所獲苗民易兵以歸事聞二月特命二格往訊得實苗犯廖老宰等俱梟示雷如照故縱罪囚律革職枷責王應瑞擅動軍馬發邉充軍十月遷禮部右侍郎五十年八月轉左雍正元年三月卒鄂海鄂海滿洲鑲白旗人姓溫都由筆帖式授內閣中書洊陟宗人府郎中兼佐領康熙三十六年聖祖仁皇帝親征噶爾丹鄂海先赴寧夏儲備牲畜駕至寧夏會陜西按察使缺命於軍營辦事之科道部郎內開列具奏特簡鄂海任之諭曰初任外官者每於朕前奏言潔清其身以圖報恩及􅊩任後輒背其言朕于從官二十餘員內簡爾為按察使爾當益勵素行也三十七年遷陜西布政使四十年擢陜西巡撫四十二年十一月上幸西安閲兵以滿洲及緑旗兵皆善射鄂海與將軍博霽總督華顯並賜櫜鞬弓矢及御書匾額貂皮冠服加一級十二月詔於河南府儲積米榖預備山西陜西賑貸並命督撫等會勘由黃河挽運事宜明年三月會勘三門底柱溜急灘多舟行甚險應自河南府陸運至陜州西太陽渡乃以舟運四月鄂海又奏勘閲渭河惟自寶雞至郿縣一百四十餘里水落時重載難行郿縣以東河深水平重船可以挽運疏下部議渭河與山西之汾河河南之賈魯河並令巡撫設法挑濬四十九年十月擢湖廣總督五十一年五月疏言臣前赴鎮筸閲視邉界聞邉外紅苗恃強滋事雖經永順土司招撫並未納糧乃令總兵張谷貞辰州知府遲煓鳳凰營通判黃澍傳集苗目宣布聖主威德令其改過輸誠于是毛都塘等五十二寨頭目開具八百餘户丁口赴武昌投順八月又報盤塘窩等八十三寨投順頭目續至得旨鎮筸生苗居深山之中自古以來並未向化鄂海等宣示朝廷德澤布揚聲威盡行招撫殊屬可嘉在事官兵交部議敘今紅苗等已輸誠削髮宜安插得所從容化導教之禮義文武官辨其各仰體朕無分內外咸俾同享升平宇內無不樂業之意五十二年四月上以鄂海曽任陜西才具素優兵民性情俱所熟悉調為四川陜西總督十月疏言甘肅洮岷邉外大山生畨歸順得旨洮岷邉外向無生畨或係與外藩蒙古王貝勒貝子公台吉等納糧之人不可止以投順為美名其事甚有關係當再行詳察尋奏大山在洮州東南近土司楊汝松界外非蒙古納進畨人今既率屬歸化請即以楊汝松管理又疏言四川建昌鎮屬會川營界外涼山畨目阿木咱率屬歸順願每嵗貢馬四匹請給職銜其所屬三千餘户仍令管理五十三年正月疏言去嵗甘肅所屬靖逺固原會寧諸處夏田少雨秋禾失收疊奉恩諭全免五十三年錢糧又經撫臣嶽拜請動倉糧賑恤亦奉旨允行已遵照籌辦外惟是甘肅山髙地冷嵗止一收民無儲蓄其被災户口或賑或借或糶三法並行災民方得安堵且春夏間青黃不接小民謀食無由宜乘春和時耕種若無籽粒牛具田畝坐荒秋收又復無望請於被災等處乏食窮民自二月至六月止日給糧大口三合小口二合以資養贍其有田地而無力耕作者每畝給糧五升每頃給銀三兩以為籽本令所在道府等官確察妥辦諭令竭力耕種至流移未歸者臣與撫臣捐資齎送回籍後如屋宇傾壞令地方官捐修安插十一月以朝邑縣與山西蒲州接壤疏請將同州州同及潼關營千總移駐以資彈壓事並下部議行五十六年十月四川巡撫年羮堯𠞰撫越嶲衛阿羊叛畨奏繳土百户印劄並奏把總皮登榜被射身死部臣以所繳印劄未聲明西糾土百户阿卡何往又皮登榜被射情節前後所奏不符令鄂海確察尋奏土百户阿卡因大兵進𠞰畏懼潛逃已經招回西糾至年羮堯前奏皮登榜督造浮橋中箭身死今據提臣康泰等咨稱實係身先渡河奮擊叛畨被賊射斃乞敕部議恤賞疏下部議令川撫酌行給賞五十七年大兵征策旺喇布坦撫逺大將軍貝子允禵等率兵分駐西寧甘州涼州莊浪豫備進𠞰鄂海奏撥西安藩庫銀四十萬兩解赴甘省協濟糧芻又奏撥平涼鞏昌寧夏貯倉米豆十萬石運赴蘭州充餉又府谷山丹等州縣衛以軍行所過奉旨免徵錢糧草束并請豁免一體運送軍需之陜屬葭州甘屬寧夏等二十八處丁糧以紓民力五十八年四月又言皇上軫念西陲百姓轉運急公特恩蠲免五十八年地丁銀兩以軍務未竣不及米豆草束第各省額徵類多折色惟甘省邉地銀數少而糧草多至平涼慶陽西寧涼州等府且有全徵本色者是沿邉軍需用力最多之地轉不得共沾實惠請將甘屬五十三四五六等年未完民欠銀糧草束一例蠲免使民盡力輸納本年額徵糧草以佐軍需則皇仁溥而民氣裕疏下户部寢其議奉特旨盡豫豁免五十九年五月固原提督金國政疏奏陜西兩年歉收百姓有流離狀諭曰總督鄂海平昔居官亦優今因年老聲名漸不如前陜西兩年歉收之處並未詳悉上聞其令明白回奏鄂海尋奏西安等四府一州比嵗豐稔惟延安沿邉堡所及甘肅涼州諸處歉收俱經題報所有五十七八兩年借給災黎銀米謹彚列實數陳奏疏入報聞六十年五月命鄂海辦理軍前糧餉而以四川巡撫年羮堯代為總督十月疏言遵旨至甘州料理糧餉甘州等處山多田少所産糧草有限宜豫為籌備請于河南湖廣運至陜西糧餉內撥米六萬石豌豆四萬石半送甘州半送涼州從之十二月諭議政大臣曰吐魯畨現駐官兵其可種之地甚多總督鄂海在軍營無事可即往彼效力六十一年六月靖逆將軍富寧安請派大臣専司吐魯畨種地積糧上命鄂海同副都統克什圖管理遇有軍務一體調遣世宗憲皇帝雍正元年十月以原品休致仍在吐魯畨種地效力三年四月卒福敏福敏滿洲鑲白旗人姓富察康熙三十六年進士改庶吉士散館歸班世宗憲皇帝在藩邸時今上初就外傅福敏侍讀康熙六十一年十一月世宗憲皇帝御極擢授內閣學士兼禮部侍郎尋充經筵講官雍正二年八月充會試副考官十一月充翻譯鄉試副考官十二月教習庶吉士三年四月遷吏部右侍郎六月疏言漢官升任級非隨帶者例改紀録滿官則一槩銷去請照漢官例畫一下部議行八月署浙江巡撫十二月疏言海塘工程原議皆用條石後因限迫遂用條石托外亂石填中恐日久坍塌請寬限照原議改築得旨交新任巡撫李衛查勘修理時命都統拉錫至浙查抄年羮堯財産羮堯先已自燬書札福敏於拉錫回程後復查出西征隨筆逆書二册係錢塘舉人汪景祺撰上嘉其細心論景祺罪如律四年二月擢都察院左都御史四月管翰林院掌院學士九月署湖廣總督十月奏沔陽潛江等十州縣水災請暫借常平倉榖六萬石發賑續將贏餘銀買補又奏被水各州縣現遵旨煮賑但老幼頗難就食丁壯亦覺路逺時當種麥恐妨生業請查丁口一體給米均得旨嘉奬十二月諭曰朕原命爾暫署督篆若一得人即命往替近日廊廟中頗乏卿二滿臣皇子左右亦需爾來輔翼留爾在楚乃出於不得已宜體朕意勉力為之五年正月疏言湖廣苗猺地方不産硝磺而多鎗炮傷人案明係私販轉入查革職藩司張聖弼濫給硝磺牌照甚多前任藩司鄭任鑰亦縱戚林西周販賣射利應嚴禁得旨硝磺乃違禁之物湖廣苗猺雜處例禁更嚴鄭任鑰縱其私人犯禁取利著革職在楚修理江岸工程處效力贖罪二月奏請以耗羡銀兩築江陵松滋等縣堤岸奉旨著動帑金委員監修成後仍算民堤百姓加意保護俾永受其益四月謬沖花苗叛福敏檄黔兵截後路以楚兵搗巢平之下部議敘加二級七月疏言安陸荆州各府被水堤塍冬初水退正可興工除被災老幼婦女照常賑濟外丁壯悉令修築優給賑米俾飢民得食而堤亦完固上善其議如所請九月奏請增設湖北糧道庫大使一裁蒲圻縣羊樓司巡檢從之先是閏三月召福敏回至是得代進京授吏部尚書六年四月以前巡撫浙江時瞻徇布政使佟吉圖擅動庫銀事革職八年四月命協理兵部侍郎五月兼户部侍郎九年擢左都御史仍兼户兵二部事十年七月署工部尚書特命協辦大學士事十一年十一月署刑部尚書十二年五月以審理户部尚書彭維新一案朦混徇隱奉旨申飭又議福建武平縣民藍厚正毆死胞兄擬斬留養一案糊塗姑息降三級留任乾隆元年五月命同左都御史孫嘉淦辦廢員案嘉淦劾福敏偏執上以福敏既拘執嘉淦亦沽名另派大臣辦理八月充順天鄉試正考官二年三月充會試正考官六月教習庶吉士三年正月擢武英殿大學士兼工部尚書二月充翻譯鄉試正考官十一月兼翰林院掌院學士四年五月加太保六月八旗通志告竣加二級六年七月上初幸木蘭行圍福敏奏事宜六條一行圍邉外內外奏章按期馳送較宫廷清穆勞逸懸殊尤宜朝乾夕惕清明在躬從容應之一留京百官道在隨事警察因人懲戒不使偷惰者得行其私一巡行之日言路不可不闢然有大姦惡大利害宜參奏不當瑣細瀆陳傷政體一聖祖仁皇帝于獵地之平易險阻莫不了然故周旋中度馳射如神願皇上籌度于馳射之先一辨兵布圍未必無參差乞少加從容使未習後生得黽勉從事一辨兵從行日久必致資斧不濟量加恩澤費無多而受惠無窮得旨覽大學士所奏具見老成忠懇補衮陳善之意朕皆嘉納七年福敏年七十御製詩賜之曰前世文昌宿當朝王者師典型鵷鷺序標凖鳳凰池有問鳴鐘應方瞻霽月披耆年緣令德初度值良時堂敞槐隂茂筵開日影遲春風坐綺席仙酒介龐眉允賴經綸手猶踈弟子儀夀身兼夀世長佐太平基八年七月奏時政三條一河防事宜動關呼吸難容濡遲江南石林口等處新工初就愈宜保護懇照災民請賑例一靣辦理一靣奏聞一災民勢必流移自謀生活若有司不善拊循但禁越境致輾轉溝壑宜加以玩視罪一江南湖廣等處偏災請留六省南漕賑濟懇宸斷數目截留庶上不虧儲下足濟食奏入報聞十年十二月以疾請解任諭曰卿才品優長老成端諒內廷講誦多年恪慎小心實有禆益特簡綸扉正加眷倚覽奏情詞懇切朕勉從所請著解任調理加銜太傅以示篤念舊學之意卿善自頤養以承恩澤遇精神康健風日晴和仍舊詣宫門請安並到內廷書房看視十二年上以詩存問曰經時未到禁門邉食履多宜心泰然月霽風清煩暑逺忽教重憶講帷前十七年福敏年八十御製詩賜之曰光霽由來衆式觀絳帷黃閣領儒冠身名應擬濟南伏年德原同沛下桓松鶴作朋還侑酒孫曽繞膝合加餐還丹益算何須藉兩字傳經永不刋二十一年十月卒諭曰致仕大學士福敏品行端嚴學問醇正老成耆碩宣力年深久侍講帷清勤懋著豫告以來朕時加存問前嵗抱疴曾經親往看視賜以醫藥調養就痊方謂精神康健期頤可望今聞溘逝實深軫悼即日朕親行致奠著賞內庫銀一千兩經理喪事所有應得恤典著該部察例具奏尋賜祭葬諡文端入祀賢良祠四十四年御製懷舊詩稱為龍翰福先生詩曰今古既殊宜其教亦異施古方教數年今為出閣時憶半舞勺嵗皇考掄賢師即從師授經詎惟習少儀循循既善誘嚴若秋霜披背誦自幼敏匪曰詡徇齊日課每速畢師留為之辭以此倍多讀胥益平生資誰知童時怨翻引老日悲不失赤子心能無繾綣思嗚呼於先生吾得學之基欽定八旗通志卷一百六十九
