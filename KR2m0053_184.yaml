body:
  text: 欽定四庫全書欽定八旗通志卷一百七十人物志五十大臣傳三十六滿洲鑲白旗四文綬珠魯訥查郎阿莽三和五福喀察查郎阿查郎阿滿洲鑲白旗人姓納喇曽祖章泰以軍功授雲騎尉祖查爾海復以軍功晉襲一等輕車都尉父色思特由護軍從征噶爾丹於烏蘭布通陳歿入祀昭忠祠查郎阿初襲世職兼佐領康熙六十年授參領雍正元年授吏部郎中二年特擢吏部左侍郎三年二月署鑲黃旗滿洲都統七月疏言直𨽻州州同州判向用捐納貢監恐不足統所屬科甲出身之知縣請將舉人及恩拔副貢補用下部議行五年四月遷左都御史仍辦吏部事十一月西藏噶卜倫阿爾布巴等戕總理藏務貝子康濟鼐扎薩克台吉頗羅鼐以聞命查郎阿偕副都統邁祿率兵進藏六年四月授吏部尚書九月奏言臣等五月自西寧出口八月抵藏駐藏副都統瑪喇學士僧格及頗羅鼐已擒阿爾布巴即會同鞫實誅之餘黨悉抵法十一月又奏藏事已定逹賴喇嘛移居裏塘臣遵旨留陜西四川兵各千交駐藏大臣調遣報聞十二月奏言頗羅鼐為唐古忒衆信服請令總理後藏事務其前藏據頗羅鼐舉二人一色珠特色布騰一䇿凌旺扎爾俱授噶卜倫但新任恐未妥協前後藏不逺暫令頗羅鼐兼管俟逹賴喇嘛移居畢詔地兵撤頗羅鼐仍専管後藏允之七年二月奉旨查郎阿自藏回到西安協同川陜總督嶽鍾琪辦理軍需不必來京四月署川陜總督八月奏改西安管糧通判為水利通判移駐涇陽縣之王橋鎮専管涇陽醴泉三原髙陵臨潼五縣隄渠從之十月兼理西安將軍印務加太子少保尋奏安西沙州等處屯民豐收恐口內囤户乘機興販射利宜嚴查禁並諭屯民存一年所需餘即糶諸本地以濟兵民食用諭曰禁止姦徒射利辦理甚是但民户餘榖只許在本地糶賣尚未妥協朕思民户盈餘之榖原期糶賣以為日用之資若本地糴榖者少則出糶未免艱難不可不為計及著該地方官酌量情形動支官銀照時價糴儲備用毋得勒賣滋擾十二月奏言肅州近嘉峪關兵馬出口頓宿米豆草價俱昻肅鎮兵餉本色少折色多不敷糴買請量增從之八年十月命往肅州辦理軍需仍兼川陜總督九年二月增設四川總督查郎阿改署陜西總督四月奏言大學士瑪爾賽等因嶽鍾琪撥駐肅兵四千出口恐肅州兵單議將撥到甘涼之滿洲蒙古兵暫移駐肅俟山西緑旗兵千五百並附近肅州之提鎮標兵三千五百派調到肅再將滿洲蒙古兵移駐安西業奉俞旨臣查肅州附近標營止有甘涼二州甘州提標兵除派撥外止存千五百其餘新募軍裝馬匹未齊涼州鎮標兵除派撥外僅足以供汛守不便再撥肅州現駐寧夏涼州固原兵千五百又調山西兵千五百合鎮標兵六千餘又寧夏滿洲兵一千統計萬餘足資彈壓不必移應駐安西之滿洲蒙古兵亦無庸再派五月又奏言奉旨於湖廣買米循舊道運貯商州以備轉運臣查大學士等原議自襄陽至龍駒寨運價及造船濬河每石費銀一兩龍駒寨至安西每石二兩較安西米價已逾數倍商州處萬山中丹江環之地氣潮濕商南雒南等縣環山濵河亦難久貯陜西各屬存糧百二十餘萬石更有扣存五分社倉銀經督臣嶽鍾琪奏明存庫未糴請動此項於新榖豐收時酌量採買分貯州縣可省運費而散貯各處每年出陳易新亦易均如所請十月凖噶爾賊犯阿濟卡倫蒙古遊牧被掠敕查郎阿安輯之十年七月諭曰西路軍營事務嶽鍾琪辦理總不妥協著回京署陜西總督查郎阿年來辦理軍務事事合宜克勝大將軍之任著署寧逺大將軍印務但肅州路逺未便來京請訓今特命大學士鄂爾泰馳驛前往肅州傳朕訓諭並賞銀一萬兩十一年四月疏劾駐防庾集副將紀成斌駐防烏克克嶺總兵張元佐漫無偵察致賊劫糧車逃得旨紀成斌在軍營正法張元佐降三級調用八月奏報庫爾墨圖山賊五十餘來犯我兵擊斬二十餘人餘俱生擒無一脫者上諭奬之九月條奏禁止逃兵四事一律載官軍從征私逃初犯再犯及知情藏匿俱分别治罪誠恐蠢愚誤罹重典請令該管大臣飭將領頭目等明白曉喻俾知凛遵一自將領至什長旗俱有管兵之責嗣後兵逃什長旗即日報明查緝逾限及徇隱者罪之如一營內一月報逃二名以上逾限不獲該管分别治罪一逃兵自悔投到無論初犯再犯俱免罪入伍總以文到一月為期許於所在赴官投首轉押回營逾限自首者減二等治罪仍準入伍自首復逃獲即正法一逃兵必經汛卡汛兵能查獲者視離營逺近酌賞官辨記功如别經拿獲各汛卡失察辨兵分别議處治罪軍機大臣議如所請尋疏劾總兵曺勷奉派駐防哈密縱賊揑報奉旨即在軍營正法十月奏言冬令雪深應分大兵駐守臣酌令副將軍張廣泗駐北山常賚駐南山臣與參贊穆克登等留駐大營仍不時親往南北兩路巡察並派總兵張朝良等分防要隘允之先是查郎阿疏劾副都統阿克山觀音保所管馬倒斃走失有心玩誤部議即在軍營正法十二年三月查郎阿奏阿克山觀音保所屬兵久居南方不知牧法較退縮竊換者微别請暫停正法在軍營通衢枷號詔遍諭軍營將士示警五月諭同北路定邉副將軍䇿凌來京會議軍務九月張廣泗奏大敗賊於鄂隆吉大坂俘斬甚衆命議敘在事將辨並諭曰署大將軍查郎阿雖奉調遣來京然自統兵以來與張廣泗同心協力整飭戎行鼓勵士氣此畨克捷亦由平日訓練整頓之所致著一併從優議敘十三年五月噶爾丹䇿凌乞和查郎阿遵旨以次撤大兵還六月奏西路駐防事宜一邉界定後廷議留兵於巴里坤二千哈密二千查巴里坤隘口處處可行二千兵盡數撥防亦不足用至哈密二千屯田則不敷巡防則難遍且兩處中隔南山大坂呼應未便與其分駐兩地不若合駐山南請增兵一千合為五千哈密實駐三千其西三堡沙棗泉東北塔勒納沁並有城堡各駐一千聨絡方嚴密一哈密夏熟軍營馬駝應每年草肥之時撥兵二千携至山北呼濟爾台沙山子鹿心山等處牧放增斥堠防守秋深仍回山南一南山大坂為哈密北面屏藩烏克克嶺為三堡沙棗泉要隘塔勒納沁河源為塔勒納沁要口應分設斥堠撥兵瞭望一哈密貯糧充足且有蔡巴什逹里雅屯田可供三處兵糧無庸挽運一留駐巴里坤兵已閲七載應悉撤預選安西瓜州兵四千俟巴里坤兵撤回即令大員領赴哈密駐防以均勞逸得旨允行又條奏六事一巴里坤兵撤後廷議於安西增提鎮各一兵萬携眷駐防聲援哈密查兵萬需糧十萬安西屯糧不敷城堡營房事事須籌不若於甘省提督肅州涼州西寧安西四鎮各撥兵一千更畨迭戍無庸於安西增兵一撥陜西督標兵千固原提標及各協千五百延綏千寧夏千河州五百合五千在赤金靖逆栁溝布隆吉爾橋灣五處駐防附近俱有牧場一赤金等五處兵期以二年全行更代哈密兵年更一半其半熟練即可教習一半新兵一哈密及赤金等處兵五千應以總兵二員副將二員統領分轄赤金等處總兵副將於兵丁更代時俱更哈密總兵副將令一年更代庶屯田斥堠有新舊大員相間管領一哈密兵屯種收穫足供口糧其各衛所官屯田畝應悉與安西鎮標營兵丁屯種如再不敷照例折給一肅鎮臨邉請增城守一營設都司千總各一把總二撥步兵二百専司城守汛防廷議如所請行並議再令提督一員駐哈密節制兩鎮居中調度從之先是上軫念從征將辨敕陜西等省現出各缺十中分三升補出征之員至是西路兵撤凡升補他省者應各赴新任查郎阿奏言升補中陜甘人員隨征年久今甫回籍又逺赴新任或無力携眷同往留又無人養贍請將現在軍營升補直𨽻等省之千把總留陜甘各營遇缺挨補上以候缺需時令現任千把總未出征者開缺以留陜人員補用七月授大學士仍管總督諭曰西路官兵前因嶽鍾琪調度失宜諸事廢弛遂致軍氣不揚士心不振自雍正十年查郎阿統兵以來與張廣泗同心協力事事整頓時時訓練凡行間將士俱知奮勇效力營伍為之改觀所以十一年十二年賊人兩次侵犯卡倫俱為我兵擒勦未令兔脫且賊人因我軍嚴整畏憚懼服從前狡獪伎倆不敢復逞此皆查郎阿辦理妥協之所致今大兵撤回查郎阿張廣泗俱著交部從優議敘尋議加三級八月命為文華殿大學士兼兵部尚書是年仍改陜西總督為川陜總督乾隆元年三月奏言巴里坤兵現遵旨撤還內有勇健營千一百名係新設别無營汛撤回難於部署且係十五省所選伎勇離家日久聚處恐不相宜請各歸本省發督撫提鎮隨標入伍效力不願者聼上報可初查郎阿以甘肅地瘠請酌撥陜西倉儲預籌協濟以裕民食詔會同陜西巡撫劉於義確議五月會奏協濟六事一原奏撥陜糧六萬石以四萬濟平涼二萬濟慶陽今固原等處缺雨請增撥二萬石俟麥秋後陸續撥運照軍需例給價一撥糧原按西安十二州縣倉貯多寡勻派咸寧長安各三千石涇陽醴泉興平各六千石乾州七千石咸陽五千石永夀四千石富平三原各六千五百石髙陵藍田各三千五百石合六萬石今增撥二萬應於附近各屬酌撥一糧由北路運往若逐站轉運則富平等縣止數十里總滙於乾州永夀等處接運勞逸不均應令各州縣直送各處交收一原奏所運糧分駐涇州長武查長武屬陜西涇州距慶陽各屬尚逺今議以二萬石由涇陽九條溝直運慶陽其餘六萬石仍運至涇州分别接運勻貯再會寧安定靜逺三縣山田歉收附近無可協濟應於運涇糧內在靜寧固原二州多貯數千石以備三縣不時之需一口袋舊存十四萬五千條或雙套或修補即可備用至慶陽涇州即留備接濟分運仍按數收貯一甘民素無蓋藏平慶尤甚豐年盡糶所有則價頓減稍歉則價頓昻請嗣後遇豐年隨時採買積貯民免熟荒之纍得旨妥協之至著照所議行六月疏劾原任甘肅巡撫許容匿災殃民營私樹黨各欵命革職拿解來京部擬杖徒援免八月奏陜甘標營生息銀兩五事一營運之宜變通也各營兵借債輸利貧無底止欲除私借須開官借之條凡兵丁急需許呈明該管千把總轉報查實係無力即以生息銀會同地方官借給每兵不得過五兩一分起息於應領餉銀內分五季扣除扣完仍準借給一生息之宜因地也地方有豐嗇生息亦應有重輕延綏鎮協地處極邉當商領運應照例一分起息此外量為輕減一本銀之宜畫一也生息銀兩原係惠濟兵丁向止議及督撫提鎮各標營而各協營路未及應照雲貴例每兵一名給銀二兩營運生息以乾隆二年為始按各標營協路兵數均給一收放之宜慎重也營中收貯經理恐不免私弊請交地方官貯庫聨銜動支該管大員不時盤查如通同徇隱及失於覺察照例議處賠補一賞恤之宜酌量也各營生息既難賞銀宜量入為出應先儘現派駐防哈密赤靖等處兵萬名酌定其家遇喪事賞銀六兩吉事賞銀四兩存營兵照防兵減半又奏言口外大通地方既設營汛流移蒙古不便容留原有該管之扎薩克即交收管否即查附近各部落分别安置如已立産地方官估價給令另置無則查按户口給半再違例容留者兵民治罪衛營官失察議處詔均如所請行九月來京陛見諭速回西安十一月奏言陜省屯更之賦重於民田昔年糧從地起丁由人出故屯更賦重而丁銀稍輕經前督臣嶽鍾琪奏將通省丁銀攤入地糧屯更地每畝一石折銀一兩均載丁銀一錢五分糧輕丁重民户減除甚多糧重丁輕者有增無減請照前奉恩旨豁除俟下屆編審將通省新增應完之丁銀均攤於民户地糧漸補足原額即行停止永不加賦則以糧載丁之案不必紛更而屯纍稍紓再查陜省馬步俱係招兵食餉獨督標火器營兵一千於咸長等州縣屯丁內拔補每名月給餉銀七錢餘皆屯民津貼或本人當兵合衛代完錢糧或出銀雇人其人稍不遂意逃避勒掯又向本衛拔補滋擾無已請照鎮標步兵例招募差操不在屯衛拔補庶各縣屯民永免幫貼之纍又言屯衛地丁久歸州縣初時恐公務浩繁應役需人將屯丁留用二千每丁受旱地一頃將額徴米二石二斗豆一石八斗布銀四錢二分留為應役工食近來差務漸減各衙門皆有經制人役且一丁受地一頃終嵗服役不遑盡力農畝俯仰何賴更有本身不能應役雇人代替亦有各衙門不用供役勒折軍錢弊難枚舉請將屯丁二千裁留一千各衙門少一千屯軍即州縣多一千農夫錢糧歸於有用屯困亦稍蘇其留丁一千工食外再給銀二兩計共銀二千兩在司庫按季支領均從之先是查郎阿奏銷軍營節年倒斃及竊失馬駝過多經户部駁令賠補二年十月奏言軍營調度在大將軍果指示得宜何至牲畜被竊所有雍正八九十等年巴里坤被竊馬駝應責嶽鍾琪賠補十一年五月柏楊溝被竊馬駝責臣賠補惟雍正九年鄂爾多斯牧厰走失馬駝仰祈聖主念該部落隨征數年尚屬奉公副將馬順暨滿洲驍勇等營官兵亦頗著勤勞均準免賠至節年倒斃馬駝因從內地出口跋涉數千里軍營氣寒耕作馳驟筋骨俱傷是以更多懇恩軫末辨窮兵免其賠補上特允之三年三月疏參肅州道黃文煒軍需道沈青崖庫官石曰璉營私侵帑請革審劉於義總理軍需縱容徇庇併附參上命左都御史馬爾泰等會鞫得實治罪如律五月奏言涼州莊浪建滿城並衙署營房原估銀五十二萬八千六百餘兩緣募附近畨土民人用工少而得力多節省銀二十二萬三千有竒臣查閲邉地見肅州涼州城垣坍塌平畨大通河橋梁被衝請撥三萬六七千兩興修從之又言章嘉呼圖克圖奏請以裏塘巴塘等地方賞給逹賴喇嘛經議政大臣等令臣悉心籌畫咨商雲貴總督慶復妥議臣查逹賴喇嘛為畨夷各部落所尊崇聖祖仁皇帝時克西藏設床加封駐兵戍守洵安邉至計然由滇蜀至西藏途逺勢隔是以將裏塘巴塘等處收歸內地以利糧運雍正三年將察木多以內各處頭人給土司職銜為打箭爐保障察木多以外給逹賴喇嘛每年又賞逹賴喇嘛茶五千斤班禪額爾德尼茶二千五百斤加恩已渥今若再賞裏塘巴塘令畨衆赴藏納差將來駐藏兵撤倘有叵測打箭爐外沿途不無阻梗惟是藏中大小寺廟千餘所常住喇嘛四十餘萬用度浩繁今章嘉呼圖克圖亦止因日用不敷起見請照裏塘巴塘等處每嵗所納數目在打箭爐商稅銀內按數賞給於每年逹賴喇嘛差人領茶之便給令帶回其地仍隸內地奏入上嘉納之十二月奏言寧夏地震臣聞報即携銀馳往撫綏被災兵民又撥固原兵六百協勘巡防得旨嘉奬四年三月奏言督標四圍空地及收回將材等項地畝計十八頃有竒前督臣嶽鍾琪奏準招佃收租借給乏食兵丁照社倉例加二起息還倉以備補造器械比年因雨澤愆期積欠二千餘石請準豁免並請嗣後查實在乏食兵丁準將所借照市價於月餉內陸續扣還免其加息報聞五年四月命還京入閣辦事五月加太子太保七月御製詩賜之詩曰玉陛資調燮西陲運計籌持鈞推舊德補衮著嘉猷可繼蕭曺業還同韓范儔江湖與廊廟莫釋一心憂六年奉命偕侍郎阿里衮清查黑龍江吉林烏喇等處開墾地畝事竣還京十二年三月因衰病乞休命以原官致仕九月卒子邁拉遜襲世職三和三和滿洲鑲白旗人姓納喇雍正二年由護軍校授三等侍衛初三和曽叔祖拜庫逹以軍功授二等輕車都尉卒兄子瑪察襲卒子瑪爾泰襲四年三和降襲騎都尉乾隆元年四月授二等侍衛五年晉一等侍衛六年三月授總管內務府大臣六月署户部侍郎七年實授八年十月管理奉宸苑事十二月疏言親蠶典禮與親耕並重前代制度未備皇上敕建先蠶壇為曠世巨儀請將建造壇址宫殿規制及興工告成日期宣付史館以光盛典從之十年正月命赴甘肅會同巡撫黃廷桂勘估應修城堡邉墻六月疏言自寧夏抵甘涼肅沿邉二千九百餘里土墻多坍損我皇上保乂邉氓原不惜百萬帑金為鞏固藩籬計但一時並舉工費實屬不資且城垣為兵民依賴現所議修邉牆似可稍緩至通省應修城垣須先其所急後其所緩查肅州鎮屬金塔協在極邉外甘州府為五涼扼塞蘭州府屬之河州狄道州或控制邉口或水患衝刷請即動項興修至平涼府固原州古浪縣三城應次急其餘殘缺城堡需工料千兩以內者飭地方官動公項按年修理千兩以外委道府確估報部修補部議如所請尋諭就近會勘陜西各屬城工奏言榆林府屬之榆林府谷神木三縣延安府屬之定邉縣逼近邉牆鄜州安塞縣二城為水所衝均應急修靖邉延川米脂華隂咸陽等二十州縣陸續遞修從之十一月調工部侍郎十三年五月因辦理孝賢皇后册寶不慎議革職得旨從寬留任十月調户部侍郎十四年四月晉工部尚書兼議政大臣十二月諭曰三和自補授尚書以來事事周章不能妥協今御門聽政伊又遲誤不到乃器小易盈不足勝任著以工部侍郎用衆佛保不識漢字不必辦理部務其員缺即著三和補授十五年九月以私伐木植一案掩飾回護部議革任得旨從寬留任注册十月工科給事中珠章阿疏參工部承修天壇內外圍牆銷册與原奏不符且多碎磚包砌詔下工部堂官明白回奏三和等奏言壇內三座門東西舊墻明嘉靖年所造俱三順一丁成砌今所修圍墻與舊相連是以內圍四面外圍東西南三面照舊成造其外圍北面去內圍逺不見舊式隨一順一丁成砌查城磚一塊之長與二塊之濶相等圍墻止二進則三順一丁與一順一丁工料相同再圍墻共三千二百餘丈包砌二層奏準裏用舊磚砌完再用新磚並非私用舊磚冒銷新磚價值諭曰此奏珠屬支吾三和委辦工務尤其専責乃既已蹈過又復飾非著交部嚴加議處部議革任得旨從寬留任十七年二月調户部侍郎四月與海望等遵旨查奏兩郊壇宇工程所發物料銀過多自請議處革任注册十八年仍調工部侍郎時銅山河堤決尚書舒赫德等奏開引河命三和率通曉測量之員馳赴工次測視二十三年以承辦塔工拆裂部議革任得旨永逺停俸三十二年上以三和行走多年年已七旬授內大臣尋命紫禁城內騎馬三十八年卒諭曰內大臣工部侍郎三和宣力有年恪勤匪懈昨冬因患病請假隨命御醫診視時復遣使存問今夏特賞給人參俾得從容調攝以兾就痊忽聞溘逝深為軫惜著賞銀五百兩料理喪事其任內革職降級之案準其開復凡有一切應賠應繳各項著加恩概行寬免應得恤典該部察例具奏尋賜祭葬如例諡誠毅子蘇第察襲世職文綬文綬滿洲鑲白旗人姓富察雍正十三年由監生授內閣中書乾隆七年遷禮部主事十年遷員外郎尋改內閣侍讀十一年授甘肅涼州府知府十四年遷安西道十五年調西寧道十六年調肅州道十八年仍授安西道二十五年遷甘肅按察使二十七年擢山西布政使三十一年以迎合巡撫和其𠂻容隱陽曲知縣假成功虧空革職發軍臺效力三十二年六月給道員銜往哈密辦事三十三年十二月授河南巡撫未抵任調陜西巡撫三十五年二月奏洛川縣每年額徴民糧米麥豆三色共二千六百餘石以供兵糈除每年額支兵糧千四百餘石尚餘千二百餘石積至乾隆三十四年現餘糧萬八千餘石縣倉不敷存貯請以一萬五千餘石為額餘糧隨時出糶報部充餉得旨允行五月吏部奏前奉諭令督撫查奏學政有無置備食用州縣繳價之事文綬推諉不奏應革職詔從寬留任三十六年五月署陜甘總督七月命赴齋爾賞賚投誠之土爾扈特九月授四川總督十月調陜甘總督十二月奏官兵進剿金川陜甘共派兵三千延綏鎮總兵書明阿現帶一千徑赴維州其西寧兵一千陜西兵一千請以興漢總兵張大經統領赴川興漢毗連川省進征尤便臣親往鞏昌安定照料起程上嘉之三十七年正月疏言巴里坤烏魯木齊年來買易傭工民人甚多富者可雇工承墾地畝貧者每户給三十畝並農具籽種照新疆例六年升科並指明地名往墾瑪納斯城南可墾二萬餘畝瑚圖壁城西北可墾六千餘畝巴里坤城外及西大墩大泉并東西石人子沙子奎蘇可墾五千九百餘畝玉門淵泉敦煌三縣雖土性鹻鬆近得渠水灌溉可添墾田五千餘畝舊例嘉峪關口常閉經過者驗照放行不免守候稽延今關外久成內地請飭文武官將嘉峪關辰開酉閉進者仍行盤詰出者聼其前往兼於烏魯木齊城南七逹色巴山梁開寬大路以便前行赴墾户口日增行旅亦為有益部議從之五月酌定收捐監糧章程一肅州髙臺縣每監一名捐糧五十石淵泉玉門敦煌三縣每監一名捐糧四十石哈密巴里坤烏魯木齊特納格爾吉木薩竒台昌吉木罍八處悉照安西糧數報捐一收捐俱以豌豆小麥交納一令經收之員印給實收一修造監倉應借項酌建俟收捐費歸欵一收糧數多應出易以免紅朽一報捐應具結以本色交倉一交倉應隨時申報以杜包收折色一造厫口册應申報盤查以防虧欠挪移奏入軍機大臣議行又籌備巴里坤移駐滿洲兵糧料事宜一古城可墾地三千畝泉水足用請撥肅州鎮兵百五十以千把總一員統往耕作一古城吉布庫竒台嵗收及陳存糧籌給巴里坤滿洲兵餉應將甘肅提標西寧涼州鎮標孳生駝挑至吉布庫古城竒台擇厰牧放再派滿洲兵護送一巴里坤竒台存糧十餘萬石每年僅用舊糧萬石未免壅滯應將巴里坤滿洲嵗支糧料四萬餘石先就舊糧支給其新收歸倉者許遞年出陳易新一馬草應支給價銀聼官兵自辦上奬其所奏詳妥六月奏西安滿洲兵移駐巴里坤例將所領製裝銀兩扣留一半與兵丁置貨帶往出售以資生計查巴里坤水草豐美可以放牧及天氣嚴寒老幼非皮衣無以禦冬請於巴里坤山灣設孳生牧厰將滿洲兵扣存製裝銀兩給令多買羊隻雇人收放并令旗下間散子弟一同學習取乳剪毛以廣生計并使熟於口外情形各歸儉朴得旨嘉奬十一月奏暫開捐納以裕軍需上切責之四川前任總督阿爾泰縱子明德布勒索屬員命文綬密行查訪尋奏言明德布因在署辦事與屬員漸熟往往進見於是人言嘖嘖雖勒索等事尚無指實而阿爾泰縱子干預公事情弊顯然時軍機大臣等鞫明德布具服諭曰文綬係棄瑕録用之人其在陜西巡撫任內辦事尚屬認真加恩擢授總督又於軍需向所諳習特調為四川總督令其整頓經理乃伊聞命之初尚似勇往及到任以後一切軍營事宜未見其實心妥辦甚至借軍需名目妄請開捐竟為屬員冒銷地步初不意其乖張若此至聞阿爾泰在川聲名平常並有縱伊長子明德布向屬員勒索之事因傳諭密訪文綬覆奏不過就旨敷衍事無指實若僅以人言嘖嘖為慿何足以服阿爾泰父子之心朕從不肯以風聞無據之言輕治臣下之罪復諭文綬於該省屬員內設法查訪不得仍事含糊乃閲數月之久並未查明續奏明德布現在京候訊即命軍機大臣會同內務府大臣詳加研鞫據明德布親供俱已直認不諱文綬身為總督奉旨密查應實力訪察據實覆奏方不失為大臣秉公持正之道乃竟意存袒徇輒敢蹈官官相護之惡習實出情理之外後任督撫訪查前任之事無難水落石出似此肆行欺罔於吏治人心大有關係若皆從而效尤朕將何以任人是文綬之罪斷難復逭著革職發往伊犁令其自備資斧效力贖罪三十八年六月諭曰文綬去年獲罪之由係沾染外省袒護惡習尚無大罪在當時不得不加以創懲念其向來頗能辦事尚可棄瑕録用著加恩補授湖廣總督仍署理四川總督八月偕富勒渾疏言現在添兵進勦需糧倍增於昔請照乾隆十三年范育馪王堂助餉加銜之例令各省商民有願赴川運糧者均準赴川報到準其辦運咨明該省其所辦之糧軍需局查明應運何路即指定給照定限運交仍飭知該站隨到隨收并給實收聼自行賫部請敘九月又奏酌定納粟章程請每榖一石價銀九錢俊秀捐監例捐銀一百八兩應納榖一百二十石其捐貢及捐各項職銜應納榖數準計核收使捐榖之費與捐銀之數相當並議行四十一年二月實授四川總督四十三年十二月偕特成額明亮合奏兩金川新收屯糧請照打箭爐舊例凡存貯及本屯支放每石準耗五合如撥運别屯準耗一升不準按年加耗從之四十四年十一月入覲上以其子山東巡撫國泰暌隔多年諭令來京相見四十五年二月京察加一級六月奏稱四川素産井鹽界連滇省自雍正七年至乾隆三年以滇鹽不敷民食先後題定令昭定東川鎮雄宣威霑益平彛南寧等屬改食川鹽川商承領邉引撥配犍為厰鹽由興文長寧屏山髙珙等縣運至交界並以道險費重經滇省開修河道令辦銅回船接運川鹽乃得暢行滇民始免食淡逮後水路開通商民情熟或以川地計口之鹽攙雜混銷或於行滇引鹽之內夾帶偷賣因利乘便積少成多原非如連車盈艦梟販公行查拿轉易從前屢經兩省咨會在川滇交界之張灘及洪縣之羅星渡興文之梅嶺鎮為行鹽入滇總滙又於滇省昭通之富官村小腦塘大關廳之鹽井渡鎮雄州之落垓塘羅坎關等處按數核對接銷立法非不周備然地方官稍不經心仍不免偷漏影射之弊誠所謂有治人無治法也兹悉心籌酌専委幹員於川滇交界各隘口會同該地方文武設立卡隘分路稽查務使私販絶迹引運肅清如各委員及地方官怠玩因循虛應故事即行分别撤回參處其川滇連界者一併加意稽查上是之並諭雲貴總督福康安曰文綬所辦甚是川滇地界毗連宜一律嚴防方有禆益四十六年三月詔停打箭爐收稅部員由總督委員管理文綬條奏裁改事宜一徴收稅務即委打箭爐同知專管一報稅簿由布政使印發按月登記備查照簿造銷核題一兼管稅務費用較繁除同知本任應得養亷再增給三百兩為管稅養亷其紙張公費及額設通事譯字書巡等役均仍舊解部飯銀應由司庫搭解下部議行閏五月以題銷商運軍糧腳費前後矛盾不自引咎户部奏請降二級調用詔改為革職留任先是四川無籍遊民糾衆劫掠土人呼為嘓匪漸闌入湖廣貴州界湖廣總督舒常湖南巡撫劉墉貴州巡撫李本俱以捕獲嘓匪入奏七月文綬疏言合州界連太平東鄉開縣等處聞有嘓匪三十餘人持仗拒捕即飭令鎮道等督營員州縣嚴捕有百餘人聞捕先竄分路追獲五十人提省嚴辦得旨舒常等已陸續具奏文綬係本省總督直至今始奏何遲緩若此旋奏嘓匪之竄入湖南貴州界者經二省官兵截拿仍復逃回現分路追捕續獲二十一人又追至廣安擒斬八人生擒十七人餘黨俱即逃散諭曰匪徒聚集川省該督果能隨時嚴飭文武各員實力擒捕四處派員堵截於邉界有防何至逃逸别省乃文綬平日漫不經心一任地方官疏縱釀成致該匪蹤迹往來如入無人之境其所為邉防者何在及匪徒竄入湖廣貴州等省結黨成羣搶掠滋事該督仍復安坐省城並不於要隘處親往督率此次摺內尚腆顔稱經楚黔官兵截拿仍復竄回一似置身局外者然文綬種種錯謬不可枚舉著嚴行申飭八月文綬奏親往川東督捕餘匪得旨文綬始終玩縱貽誤著降三品頂帶從寬留任尚書周煌奏川省嘓匪近年每邑多至百十餘人並有朋頭帶頂坐轎乘馬白晝搶奪淫凶通省官吏罔聞兵役不問甚至州縣吏胥身充嘓匪恣行搔擾諭曰嘓匪肆行不法已非一日文綬身為總督乃竟漫不經心以致養癰貽患甚至白晝搶劫拒捕傷差公然無忌若不及早嚴辦將來黨羽日多安知不釀成蘇四十三之事現須痛加懲創盡絶根株以戢凶暴而靖地方此皆文綬因循貽誤所致斷難復膺總督之任著革任發往伊犁效力贖罪四十八年命回京四十九年三月卒珠魯訥珠魯訥滿洲鑲白旗人姓那爾乾隆二十年翻譯舉人二十一年以筆帖式在軍機處行走遷吏部主事二十四年遷員外郎二十七年調户部顔料庫三十一年正月擢湖廣荆州右翼副都統尋授禮部侍郎五月調工部兼正黃旗滿洲副都統十月署户部侍郎三十二年五月兼署兵部八月命為參贊大臣駐雅爾尋赴雲南軍營統緑營兵四千駐木邦土司甕團自莾什率七百餘人來降請於清水河招商復業珠魯訥派辨兵彈壓十二月擺夷狷歇等五十人突出竹木林前鋒瑚什布把總姚俊擊之遂棄械降珠魯訥鞫得狷歇等為緬賊守城狀盡斬以徇已而賊伏千家寨劫我偵事兵珠魯訥派巴圖魯侍衛色布騰效力總兵索柱等乘夜搜捕賊潛遁派色布騰渡大疊江錫箔城抵將軍明瑞營復令巴圖魯茂漢探錫箔城抵松塞路得旨嘉奬將軍明瑞建橋大疊江兵得濟珠魯訥防賊潛毁令參將王棟領前鋒護軍兵千五百駐守三十三年正月疏言自木邦至阿瓦城呼橋錫箔結工宋賽順貴應設五台錫箔鄰江險要派滿洲兵四緑營兵三百餘四台派滿洲兵二緑營兵二百每台撥馬六十以壯聲援上嘉之時珠魯訥派索柱帶兵千人駐天生橋錫箔江等處賊奄至參將王棟等連戰兩日賊驅象運木造橋我兵衝擊賊乘勢毁錫箔橋索柱等退守葫蘆口賊肆擾木邦珠魯訥派總兵胡大猷領兵五百迎擊西山賊守備龔田守領兵二百迎擊東山賊珠魯訥率兵晝夜攻擊賊詭言退木邦緩我兵未幾賊焚遊擊福珠營緑營兵潰賊夜圍中營珠魯訥手書奏交筆帖式福祿突圍出旋自盡事聞諭曰侍郎珠魯訥以參贊大臣駐劄木邦䇿應軍營因索柱領兵赴天生橋遇賊退回並棄錫箔橋梁不守以致賊匪尾入滋擾木邦珠魯訥悉力拒守禦戰相持經十餘日尋以所統兵丁俱係緑營怯懦成習見旁近小營失火紛紛潰散珠魯訥獨力不支即於營內自盡雖與臨陳捐軀者相去一間其情亦屬可憫所有應行優恤之處該部察例具奏賜祭葬如例命入祀昭忠祠五福五福滿洲鑲白旗人姓富察由世襲佐領兼鳥鎗章京乾隆二十年發四川以遊擊用二十一年補建昌營遊擊二十七年遷城守營參將三十二年遷維州協副將三十五年四月小金川土司澤旺與鄂克什土司色逹克拉搆釁五福詳請發兵援鄂克什總督阿爾泰檄責小金川澤旺服罪三十六年六月澤旺子僧格桑復與搆釁漸侵明正土司大兵議進攻十二月五福領官兵土練五百駐防梭磨界之朴頭三十七年九月授松潘總兵十二月回營彈壓新附畨人三十八年正月赴美諾駐守糧運小金川平同松茂道查禮辦理别斯滿新改屯練並漢牛十四寨新附畨人事宜時僧格桑竄入金川與土司索諾木為逆上慮兩酋由丹壩軼出逃往郭羅克命五福防範六月賊襲取底木逹及大板昭營大兵由登春進勦五福由後路往會夾攻七月奏赴梭磨察閲諭曰五福奏先令副將西德布等領兵速回丹壩分防五福仍前赴梭磨一帶察閲糧站並駕馭土婦卓爾瑪及大小頭人百姓安靜駐牧並飭將通金川卡隘加意防範所辦甚好前諭賞卓爾瑪名號綵縀傳諭奬勵五福到彼正可辦理此事畢後仍回丹壩駐守實力嚴防三十九年三月同副將李天佑領土兵夜毁穆爾津岡賊寨二生擒德爾日嘉等七人五月由作固頂赴兜烏當噶進攻播丘賊出碉抵拒敗之六月潛攻穆爾津岡賊碉克之燬其碉賊以死來援五福奮勇接戰斃其衆七月大兵進攻五福率漢土兵三百六十為應援令官兵作攻撲狀以綴賊勢土兵伏作固頂水卡左右賊畨五十餘衝水卡伏發鎗斃頭人餘賊負傷竄土兵進攻穆爾津山半賊碉賊於碉頂施鎗石五福督土兵斬碉門施火彈斃賊十一月諭曰朕閲戰圖凱立葉東北即逹克扎爾其下即作固頂革什戎岡又下即穆爾津岡與丹壩甚近今凱立葉既經攻克進取羅卜克鄂博再進取格魯克古格爾提尤與丹壩相距咫尺五福正當乘此勝勢激勵土司選派土兵進勦五福即親帶官兵由丹壩一路進攻阿桂等並可與之預約為合力夾擊之計現當大軍罙入復添此一路官兵賊衆難於支禦成功更可迅速著阿桂速飭五福協力進勦奮勇自勵以期立功受賞大兵尋攻克格魯克古了口接通丹壩五福隔山瞭大兵至即督兵將普籠籠瑪讓戰碉數座同時攻燬於作固頂以下沿河設營卡防範十二月大兵進攻勒烏圍五福由兜烏當噶夾攻賊傷斃無算四十年六月進攻榮噶爾博攻燬賊碉一七月大兵攻據巴克圖仰木山頂五福克其薩木卡爾山下各碉卡與大兵合九月大兵分七隊由逹烏逹圍進攻五福同總兵常祿保等接應閏十月大兵由黃草坪突上截賊碉五福同副都統普爾普在溝底樹柵前進大兵既克黃草坪賊糾黨從山包後下拒五福與大兵內外夾擊賊敗竄十一月官兵三隊由奔布魯木進攻五福同副都統烏什哈逹夜率第三隊兵圍賊碉賊越碉竄復與第一第二隊兵合至西里正寨賊潰遁獲賊鎗矛等械分攻瓦爾占舍勒固租魯夜移炮轟推賊碉尋議敘功加一等紀録二次十二月官兵分中左右路進攻薩爾歪賊寨同都統海蘭察由中路自上壓下賊棄寨竄復繞出賊寨後殱賊甚衆同時克三處賊寨四十一年凱旋命圖形紫光閣儒臣擬贊曰斫門殺賊於滅金嶺焚碉燬巢作固山頂馭畨土兵越嶮踰幽丹壩突入獲其鎗矛大軍既撤以兩金川地勢寥闊檄五福領兵三千駐防美諾要地四十四年擢廣西提督四十八年卒莾喀察莾喀察滿洲鑲白旗索倫人姓納喀塔由馬甲從征凖噶爾授藍翎侍衛乾隆二十三年正月隨領隊大臣努三等偵叛賊哈薩克錫喇擒其黨摩羅逹什扎卜等於拜塔克授三等侍衛十月隨將軍兆惠勦回酋霍集占於葉爾羌二十四年二月授二等侍衛閏六月隨參贊大臣明瑞追霍集占至霍斯庫魯克賊六千餘據嶺以拒我兵先至者九百莾喀察奮勇陷陳鏖戰三時賊潰斬五百餘級捷聞得旨嘉奬擢頭等侍衛賜丹巴巴圖魯號二十五年命在乾清門行走上以西域既定頒賞論功特詔圖諸功臣像於紫光閣掄其功尤赫者五十人親製題贊次則斬將搴旗建一績致一命者亦圖其形而令儒臣系之以詞又五十人莾喀察預焉贊曰控弦疆場橫槊沙磧還經黑水中流投䇿蜂屯蟻聚跳蕩隻身捉生燒寨勇著索倫二十七年敘功授騎都尉又一雲騎尉世職三十二年派往雲南軍營賜銀百兩並給副都統銜三十三年命為御前侍衛三十六年九月隨將軍溫福赴金川軍營授領隊大臣十二月大軍由向陽坪進勦巴朗拉賊碉莾喀察偕巴圖魯委署翼長占闢納等以兵四百五十自山右奮攻奪碉及木卡六肘被創回卧龍關調治溫福以聞詔來京授蒙古副都統遇缺坐補三十七年二月以創卒諭曰莾喀察打仗奮勉傷發身故殊堪軫惜著加恩交該部照陳亡例議恤尋議給騎都尉併前世職為二等輕車都尉賜祭葬入祀昭忠祠金川平復命圖形紫光閣御製贊曰索倫善射其中稱最西師建勳紫閣形繪逞其猿臂搜彼蟻封不虞創重歎惜何窮嗣子綽爾岱襲世職欽定八旗通志卷一百七十
