body:
  text: 旗分志六八旗佐領六正白旗滿洲佐領正白旗滿洲佐領上一參領至三參領正白旗滿洲都統所屬參領五第一參領下佐領十八第二參領下佐領十七第三參領下佐領十七第四參領下佐領十七第五參領下佐領十七第一參領第一佐領係國初以查昆漠地方來歸人丁編立始令達音布管理達音布出征陳亡以其子阿達哈哈畨漢文稱輕車都尉阿哈尼堪管理阿哈尼堪故以其弟議政大臣固山額真後改固山按班漢文稱都統三等伯阿積格尼堪管理阿積格尼堪軍前病故以其長子議政大臣都統三等伯伊里布管理伊里布出征陳亡以其弟之子散秩大臣一等伯阿錫坦管理阿錫坦故以伊里布之次子一等侍衛一等伯馬爾遜管理馬爾遜緣事革退以親軍校阿勒金布管理阿勒金布故以其堂弟瑪靈阿管理瑪靈阿故以伯祖之曾孫德保管理德保故以其弟德福管理德福故以其子扎拉芬管理第一參領第二佐領係康熙二十三年以第一第三兩佐領滋生人丁編立始以伊里布之弟領侍衛內大臣阿密達管理阿密達年老休致以其孫鑾儀使阿爾遜管理阿爾遜緣事革退以其弟員外郎艾素管理艾素緣事革退仍以阿爾遜管理阿爾遜出征病故以拜他喇布勒哈畨漢文稱騎都尉德貴管理德貴升任都司以西爾圖之孫西昌阿管理西昌阿故以其子海昌管理謹案此佐領阿密達休致後以其姪孫西爾圖管理後放盛京兵部郎中以阿密達之孫管理第一參領第三佐領即第一佐領內滋生人丁康熙九年伊里布管佐領時分編一佐領以其弟內大臣阿密達管理阿密達緣事革退以其兄之子冠軍使伊靈額管理伊靈額故以其子散秩大臣一等伯英德管理英德緣事革退以阿密達之二世孫六十一管理六十一升任以其堂弟愛精阿管理愛精阿故以其子瑪勒琿管理第一參領第四佐領原係國初以查昆漠地方來歸人丁編為半個牛録漢文稱佐領令岱圖庫哈里之長子託波管理託波故以其弟之子戶部尚書三等公英武爾岱管理尋增五十丁為一整牛録仍以英武爾岱管理後因英武爾岱部務繁冗令其兄之子商紀圖管理商紀圖故以其叔父之子碩塔管理碩塔故以其伯父之孫畢雅竒管理畢雅竒故以其弟常在管理常在緣事革退以其叔父之子張格管理張格緣事革退以其伯父之孫牛鈕管理牛鈕緣事革退以其族弟阿林岱管理阿林岱故以其堂姪穆和藺管理穆和藺故以其孫松齡管理松齡故以其弟延齡管理第一參領第五佐領即第四佐領內滋生人丁康熙二十三年畢雅竒管佐領時分編一佐領以商紀圖之孫古爾哈管理古爾哈故以其族弟英敏管理英敏因病解退以其弟二等侍衛兼三等精竒尼哈畨漢文稱子英俊管理英俊故以其姪柏靈阿管理柏靈阿故以其叔之子保和管理保和故以其子哲臣管理第一參領第六佐領係國初以董鄂地方來歸人丁編立始以魯克蘇之子石爾泰管理石爾泰出征陳亡以其兄拜他喇布勒哈畨石漢管理石漢出征陳亡以其子前鋒統領三等伯鄂碩管理鄂碩故以其子一等侍衛鄂漢管理鄂漢故以其弟議政大臣領侍衛內大臣兼火器營大臣一等公費揚古管理費揚古故以其子二等侍衛鄂鼐管理鄂鼐故以其弟三等侍衛圖巴管理圖巴革退以其弟三等侍衛阿爾察圖管理阿爾察圖故以其兄之子三等侍衛寧福管理寧福革退以其從祖常山之子公保管理公保故以費揚古之孫圖桑阿管理圖桑阿補放江寧副都統以其伯鄂鼐之子鄂岱管理鄂岱升任盛京協領以其叔圖巴之子穆特布管理穆特布升任山西恭將以圖桑阿之子松齡管理第一參領第七佐領即第六佐領內滋生人丁康熙二十三年費揚古管佐領時分編一佐領以其伯父之孫尚書鄂爾鐸管理鄂爾鐸故以其弟護軍參領吳泰管理吳泰因病辭退以其叔父之子侍郎杜敏管理杜敏緣事革退以其弟安泰管理安泰緣事革退以參領畢薩納管理畢薩納因年老辭退以其弟參領四格管理續以西爾太之元孫多隆武管理多隆武故以其子吉升保管理吉升保升任四川知府以其叔穆騰額管理第一參領第八佐領亦係國初編立始以吳理堪管理吳理堪故以其子內大臣吳拜管理吳拜年老辭退以其弟內大臣蘇拜管理蘇拜年老辭退以其兄之子內大臣郎坦管理郎坦故以其弟郎中李沙管理李沙升任盛京理事官以其弟三等侍衛費查管理費查因病辭退以郎坦次子都統拉欣管理拉欣年老告退以其兄之子郎中棟舒管理棟舒故以其叔祖之孫尚德管理尚德升任副將以其伯父之孫文慶管理文慶升任城守尉任內參革以尚德之子保慶管理第一參領第九佐領即第八佐領內滋生人丁康熙六年內大臣郎坦管佐領時分編一佐領以內大臣蘇拜之長子一等侍衛兼一等阿思哈尼哈畨漢文稱男昻阿巴管理昻阿巴年老辭退以其弟護軍參領兼拜他喇布勒哈畨又一拖沙喇哈畨漢文稱雲騎尉和托管理和托故以其子三等侍衛巴爾泰管理巴爾泰因病辭退以其伯父之子藍翎侍衛托克托和管理托克托和革退以參領嶽謙管理嶽謙參革以其叔之孫賀紳管理賀紳休致以其子阿彌爾達管理第一參領第十佐領即第八第九二佐領內滋生人丁康熙二十三年郎坦昻阿巴管佐領時分編一佐領以郎坦之弟隨赫圖管理隨赫圖故以其叔父蘇拜之孫和山管理和山因病辭退以其叔祖詹岱之子常明管理常明緣事革退以其子明泰管理明泰故以其子永福管理永福故以郎坦之子忠順管理忠順故以其子英林管理英林故以其子保福管理第一參領第十一佐領係康熙二十三年以對親佐領內溢額人丁編立始以侍郎佛倫管理佛倫升任山東巡撫以其子一等侍衛阿爾柱管理阿爾柱緣事革