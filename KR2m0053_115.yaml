body:
  text: 欽定四庫全書欽定八旗通志卷一百一學校志八繙譯考試蒙古繙譯繙譯考試謹案此門只載生員其舉人進士入之選舉志故不複贅順治八年定滿洲䝉古考試能通漢文者繙漢文一篇未能漢文者作清字文一篇童生名冊俱由國子監造送順天府轉送内院禮部學政㑹同在貢院考取秀才十四年停止考試雍正元年奉上諭八旗滿洲除照常考試漢字秀才舉人進士外繙譯亦屬𦂳要應将滿洲另以繙滿文考試秀才舉人進士尋議定滿洲䝉古能繙譯者三年之内考取秀才二次舉人一次進士一次其額數均俟臨期視人數多寡請㫖酌定所有考試秀才舉人一應事冝所用物件由順天府辦理又議定考取繙繹秀才由吏部行文翰林院各部院衙門将滿洲翰林侍讀部院郎中等官由清漢文出身精通繙譯者咨送吏部開列具題欽㸃學政一員其考試之童生都統備造旗分佐領三代履歴年貌清冊咨送禮部考試馬歩箭送學政於貢院内考試将四書直解内限三百字為題繙滿文一篇其繙譯精通者聴考官選取之後将卷冊交送禮部又覆准繙譯考試新奉特恩惟恐學習之人尚少於本年十月考取秀才一次雍正二年五月再行考取秀才一次又議准八旗之滿洲䝉古於三年之内考取繙譯秀才二次其額數臨期奏請欽定三年覆准八旗漢軍現在部院之筆帖式及貢監生員官學生照滿洲蒙古例俱准考試繙繹其秀才舉人進士額數亦臨期梘人數多寡請㫖定奪乾隆二年十二月奉上諭從前世宗憲皇帝軫念八旗前鋒䕶軍另戸領催披甲閑散内能繙譯及繕冩清書之人例不准考無有進身之階特降恩㫖考試一次著交吏部照從前将八旗前鋒䕶軍另戸領催披甲閑散内有情願考試繙譯及繕冩清書之人查明數目具奏考試一次内有最優者揀選具奏請㫖三年三月奉上諭我朝國書義藴精㣲向来工於繙譯者能得其神理於漢文大有禆益昔聖祖仁皇帝時常将滿洲官員考試分别優劣以示鼓舞皇考世宗憲皇帝特開繙譯之科俾人人奮勉嚮學以圖進取誠為盛典朕思現任官員不在鄉㑹之列者若不特加考試則優者無以表見或至怠惰日漸荒疎著禮部通行傳諭除一二品大臣外現任職官等有通曉繙譯者在部報明該部奏聞候㫖考試是年四月奉上諭朕前降㫖滿洲現任職員通曉繙譯者准在禮部報名考試今思八旗武職人員内平時講習繙譯亦不乏人如有情願赴考者准其報名該部一體考試十二年正月議准考試繙譯舉人之年照文鄉試録送之例将舊有繙譯生員禮部先期查明造冊送欽㸃之大臣於鄉試前定期入塲分别考試列在一二三等者准其鄉試其餘不准鄉試䝉古生員亦照此例辦理十三年五月奉上諭向来直省學政嵗科兩試取進文武生童及鄉㑹試中式舉人進士俱有定額惟繙譯科未有成例若不酌定額數或致多寡不均其如何定額之處著大學士㑹同該部妥議具奏是月大學士張廷玊等議查歴年嵗科滿洲繙譯童生約計八九百名及一千二三百名不等取進生員四五十名八九十名不等通計有十一二名取進一名亦有二十三四名取進一名其䝉古繙譯童生約八九十名及一百一二十名不等取進生員或八九名或十三四名不等通計有五六名取進一名亦有十名取進一名查滿洲蒙古漢軍文童毎次約計八九百名額進九十名在考試雖事同一例然繙譯較之時藝似屬稍易據入塲人數繙譯與文童不甚懸殊若與文童一例取進恐應試之人俱趨易途滿洲繙譯生員應照文童取進之額每三名減去一名共減三十名嗣後滿洲繙譯生員額取六十名至䝉古繙譯童生較之文童應試者十分之一其取進之額亦應照文童額每十名取進一名嗣後䝉古繙譯生員額取九名再查滿洲蒙古漢軍毎科應文鄉試者約計五六百名額中四十一名滿洲繙譯自雍正年間始行開科應試者無多取中者亦屬無㡬至乾隆二年迄今五科應試舉子與應試文舉之數目不相上下而取繙譯舉人每多於文舉未免過濫應照文舉人額數毎十名減去二名共減八名滿洲繙譯舉人額中三十三名䝉古繙譯舉人額中六名以上各額如無佳文應令考官遵照定例寧缺無濫即将來人文日盛取中之數亦不得有逾定額十四年奏准凡應繙譯鄉試者除生員已遵例録科外其貢監天文生中書筆帖式等均一體錄科列在一二三等者方准鄉試又奏准繙譯錄科題目照考試童生之例恭請欽命欽㸃大臣分别等第名次交禮部出榜曉諭應用供給食物紙筆等費於大宛兩縣經費項下核銷又奏准繙譯鄉試向例定期於十一月十二月内舉行天寒晷短書冩頗難上科因天氣嚴寒改期於次年二月致新進生員不及考箭不得觀光請将繙譯科試定期於十月内舉行十九年三月大學士公傅恒等遵㫖議准查八旗繙譯鄉㑹試之設原欲令滿洲人等學習國書並非専以科名為重乃近年以来八旗應試之人多事鏤刻字句希圖中式於實在繙譯之義轉覺相去愈逺且查康熙六十餘年之間並非以繙譯取士而其時之精通繙譯者未嘗不人才輩出是繙譯鄉㑹二試轉覺有名無實况八旗通曉漢文者既可専就文闈以博科第而曉習繙譯之人原皆可考取内閣中書及筆帖式庫使等項亦不必藉鄉㑹試以為進身之階嗣後除繙譯生員應仍照舊考試留為伊等考取中書筆帖式之地其鄉㑹二試應請永行停止三十二年十二月議准工部尚書託庸等奏考試繙譯童生試卷繁多一二大員不能徧覽請照鄉試例各部院衙門揀選精通繙繹司員於請㸃閱卷大臣時隨同開列恭請欽㸃四員協同校閱三十八年十一月軍機處遵㫖将考試繙譯生童向来是否有一定月分交順天府查奏據稱繙譯考試向来不拘月分迨乾隆十四年六月經府尹胡寳瑔等奏定於十月内考試遵行在案近年因凡有考試俱歸貢院且各旗咨送文冊間有遲早是以考試繙譯有十一月十二月不等此次正擬於十月内辨考因禮部適在貢院考景山各學教習因暫停以待至十一月始行考試是年十二月山西道監察御史戈源奏繙譯童生為旗人進身之階請照學臣錄取文童例先由本旗都統嚴行考試然後奏派大臣錄取加派御史二員㸃名再派王大臣逐名搜撿圍墻以外責成歩軍統領加意巡邏嚴拏𫝊逓其作文題目亦應令考官早出俾諸生即日交卷不准給燭庶場規肅而弊竇清奉㫖著照所請行四十一年十一月議覆御史玉麟等條奏考試八旗繙譯童生事宜一摺與順天府所奏詳加閲對其所稱考試繙譯童生例在不應鄉試之年今定於十月未免日短天寒請嗣後改期於八月考試照例不准給燭之處業經順天府具奏奉㫖允行毋庸另議外至試期既改於八月日晷較長諸生可以從容繕冩應将該御史所奏前一日㸃名入塲之處毋庸議又該御史等稱八旗造送考冊並未開明諸生年貎㸃名時各旗雖派一佐領到塲人數衆多豈能遍認恐不無頂冒之弊請嗣後遇考試日期各旗専派正㕘領一員率各佐領下領催到塲如童生中有不識認查係頂名冒替者即時回明㸃名御史照例辨理等語亦為杜弊起見事屬可行應如所請辦理四十三年奏准繙譯童生向照文生之例三年兩試惟乾隆四十一年順天府奏准繙譯童生定於八月考試今鄉試定於八月舉行並今嵗鄉試奉㫖定於七月初間舉行所有繙譯童生請改於五月考試庶與鄉試兩不相礙四十九年八月軍機處奏言查考試八旗繙譯生員三年兩考係屬舊例並非由於臣工條奏此次考試已定於八月二十六日舉行各事均已預偹考試題目現經發下臣等嚴宻加封仍由本日報上發回届期交各該衙門遵辦其從前因何定以三年兩考之處亦由報交查俟禮部順天府覆到日臣等再将酌量減省章程另行請㫖尋禮部順天府查覆軍機處覆奏查考試滿洲繙譯舉人係順治八年所定十四年停止雍正元年奉上諭著總理事務王大臣㑹同該部将滿洲另繙滿文考試秀才舉人進士之處定議具奏欽此經王大臣等議定滿洲䝉古能繙譯者三年之内考秀才二次舉人一次進士一次乾隆十九年大學士傅恒等遵㫖議将繙譯鄉㑹二試停止嗣於四十一年奉上諭繙譯鄉㑹試停止已久著加恩於戊戌己亥兩年舉行鄉㑹試嗣後每届三年由部具奏其准考與否候㫖定奪欽此欽遵在案至繙譯生員因留為伊等考取中書筆帖式之地是以乾隆十九年𫝊恒等定議時未經裁減臣等悉心酌議中書筆帖式既准生員考取自可留此一途使八旗人等知進身有階庶各留心學習繙譯但三年兩考未免為期太近應請嗣後改作三年考試滿洲蒙古生童一次奉㫖知道了附禮部則例一繙譯生員三年一考滿洲額進六十名蒙古額進九名寧缺毋濫逢應考之年各都統備造童生履厯清冊送順天府備卷届期收考一考試日作清字文論二篇由順天府丞先行禮部開列滿洲䝉古各部院堂官題派閱卷大臣搜撿王大臣又各衙門揀選精通繙譯之司員宻送禮部題派四員入塲協同閱卷如有應廽避之子弟宗族婣親開出扣除一考試日於貢院編號給卷都察院奏派御史滿漢各一員兵部奏派兩翼副都統各一員㕘領各二員入塲彈壓一試卷由閱卷大臣酌擬名次進呈發榜前一日提調官知㑹禮部堂官一員賫印入闈㑹同都統御史提調等至聚奎堂眼同閲卷大臣拆號填榜用印張掛其餘一切事宜由順天府承辦以上繙譯考試蒙古繙譯雍正九年奉上諭近見䝉古旗分人能蒙古語言繙譯者甚少相習日久則䝉古語言文字必漸至廢棄應照清文例考試䝉古文繙譯取中生員舉人進士以備理藩院之用如有學習漢書願就試漢文者照常准其考試於别部院補用如此則蒙古旗分之人益加鼓勵勤學䝉古文字不至廢棄而理藩院亦收得人之效矣著内閣㑹同理藩院議奏是年八月内閣㑹同理藩院議覆設科取士乃國家之盛典我皇上加意作人命将八旗䝉古内能蒙古文繙譯者另定額考取此誠造就人材禆益庶政之至意臣等請将八旗䝉古旗分内能䝉古文繙譯者照清文之例三年内考取生員二次舉人一次進士一次其考試生員派蒙古提督學政一員考試舉人進士派䝉古正主考一員䝉古同考官二員俱由該衙門行取各部院蒙古大臣官員職名奏請欽㸃其考試生員題目於清字日講四書内視漢文至三百字為准出題一道令其以蒙古文繙譯其考試舉人進士照此例以為首題再出清字奏疏一道為次題共二道令以䝉古文繙譯其應取生員舉人進士之數著考試官擇應取之卷併備卷奏請欽定奉㫖依議乾隆四十六年刑部侍郎喀寧阿奏准向来考試䝉古生童之題即係滿洲生童應繙之文雖塲分東西各編號舍不令附近闗通但考試領題俱在一日恐考滿文者有照抄謄卷之弊嗣後考取蒙古生童勅交軍機處另擬滿文題目同漢字題目一併進呈欽定頒發四十九年奏准䝉古生童三年考試一次仍照舊額取進九名寧缺無濫以上䝉古繙譯欽定八旗通志卷一百一
