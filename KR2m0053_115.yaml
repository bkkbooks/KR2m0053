body:
  text: 欽定四庫全書欽定八旗通志卷一百一學校志八翻譯考試蒙古翻譯翻譯考試謹案此門只載生員其舉人進士入之選舉志故不復贅順治八年定滿洲蒙古考試能通漢文者翻漢文一篇未能漢文者作清字文一篇童生名册俱由國子監造送順天府轉送內院禮部學政會同在貢院考取秀才十四年停止考試雍正元年奉上諭八旗滿洲除照常考試漢字秀才舉人進士外翻譯亦屬緊要應將滿洲另以翻滿文考試秀才舉人進士尋議定滿洲蒙古能翻譯者三年之內考取秀才二次舉人一次進士一次其額數均俟臨期視人數多寡請旨酌定所有考試秀才舉人一應事冝所用物件由順天府辦理又議定考取翻繹秀才由吏部行文翰林院各部院衙門將滿洲翰林侍讀部院郎中等官由清漢文出身精通翻譯者咨送吏部開列具題欽點學政一員其考試之童生都統備造旗分佐領三代履歷年貌清册咨送禮部考試馬步箭送學政於貢院內考試將四書直解內限三百字為題翻滿文一篇其翻譯精通者聽考官選取之後將卷册交送禮部又覆準翻譯考試新奉特恩惟恐學習之人尚少於本年十月考取秀才一次雍正二年五月再行考取秀才一次又議準八旗之滿洲蒙古於三年之內考取翻譯秀才二次其額數臨期奏請欽定三年覆準八旗漢軍現在部院之筆帖式及貢監生員官學生照滿洲蒙古例俱準考試翻繹其秀才舉人進士額數亦臨期梘人數多寡請旨定奪乾隆二年十二月奉上諭從前世宗憲皇帝軫念八旗前鋒護軍另戶領催披甲間散內能翻譯及繕寫清書之人例不準考無有進身之階特降恩旨考試一次著交吏部照從前將八旗前鋒護軍另戶領催披甲間散內有情願考試翻譯及繕寫清書之人查明數目具奏考試一次內有最優者揀選具奏請旨三年三月奉上諭我朝國書義藴精微向來工於翻譯者能得其神理於漢文大有禆益昔聖祖仁皇帝時常將滿洲官員考試分别優劣以示鼓舞皇考世宗憲皇帝特開翻譯之科俾人人奮勉嚮學以圖進取誠為盛典朕思現任官員不在鄉會之列者若不特加考試則優者無以表見或至怠惰日漸荒疏著禮部通行傳諭除一二品大臣外現任職官等有通曉翻譯者在部報明該部奏聞候旨考試是年四月奉上諭朕前降旨滿洲現任職員通曉翻譯者準在禮部報名考試今思八旗武職人員內平時講習翻譯亦不乏人如有情願赴考者準其報名該部一體考試十二年正月議準考試翻譯舉人之年照文鄉試録送之例將舊有翻譯生員禮部先期查明造册送欽點之大臣於鄉試前定期入場分别考試列在一二三等者準其鄉試其餘不準鄉試蒙古生員亦照此例辦理十三年五月奉上諭向來直省學政嵗科兩試取進文武生童及鄉會試中式舉人進士俱有定額惟翻譯科未有成例若不酌定額數或致多寡不均其如何定額之處著大學士會同該部妥議具奏是月大學士張廷玊等議查歷年嵗科滿洲翻譯童生約計八九百名及一千二三百名不等取進生員四五十名八九十名不等通計有十一二名取進一名亦有二十三四名取進一名其蒙古翻譯童生約八九十名及一百一二十名不等取進生員或八九名或十三四名不等通計有五六名取進一名亦有十名取進一名查滿洲蒙古漢軍文童每次約計八九百名額進九十名在考試雖事同一例然翻譯較之時藝似屬稍易據入場人數翻譯與文童不甚懸殊若與文童一例取進恐應試之人俱趨易途滿洲翻譯生員應照文童取進之額每三名減去一名共減三十名嗣後滿洲翻譯生員額取六十名至蒙古翻譯童生較之文童應試者十分之一其取進之額亦應照文童額每十名取進一名嗣後蒙古翻譯生員額取九名再查滿洲蒙古漢軍每科應文鄉試者約計五六百名額中四十一名滿洲翻譯自雍正年間始行開科應試者無多取中者亦屬無幾至乾隆二年迄今五科應試舉子與應試文舉之數目不相上下而取翻譯舉人每多於文舉未免過濫應照文舉人額數每十名減去二名共減八名滿洲翻譯舉人額中三十三名蒙古翻譯舉人額中六名以上各額如無佳文應令考官遵照定例寧缺無濫即將來人文日盛取中之數亦不得有逾定額十四年奏準凡應翻譯鄉試者除生員已遵例録科外其貢監天文生中書筆帖式等均一體録科列在一二三等者方準鄉試又奏準翻譯録科題目照考試童生之例恭請欽命欽點大臣分别等第名次交禮部出榜曉諭應用供給食物紙筆等費於大宛兩縣經費項下核銷又奏準翻譯鄉試向例定期於十一月十二月內舉行天寒晷短書寫頗難上科因天氣嚴寒改期於次年二月致新進生員不及考箭不得觀光請將翻譯科試定期於十月內舉行十九年三月大學士公傅恆等遵旨議準查八旗翻譯鄉會試之設原欲令滿洲人等學習國書並非専以科名為重乃近年以來八旗應試之人多事鏤刻字句希圖中式於實在翻譯之義轉覺相去愈逺且查康熙六十餘年之間並非以翻譯取士而其時之精通翻譯者未嘗不人才輩出是翻譯鄉會二試轉覺有名無實况八旗通曉漢文者既可専就文闈以博科第而曉習翻譯之人原皆可考取內閣中書及筆帖式庫使等項亦不必藉鄉會試以為進身之階嗣後除翻譯生員應仍照舊考試留為伊等考取中書筆帖式之地其鄉會二試應請永行停止三十二年十二月議準工部尚書託庸等奏考試翻譯童生試卷繁多一二大員不能遍覽請照鄉試例各部院衙門揀選精通翻繹司員於請點閲卷大臣時隨同開列恭請欽點四員協同校閲三十八年十一月軍機處遵旨將考試翻譯生童向來是否有一定月分交順天府查奏據稱翻譯考試向來不拘月分逮乾隆十四年六月經府尹胡寶瑔等奏定於十月內考試遵行在案近年因凡有考試俱歸貢院且各旗咨送文册間有遲早是以考試翻譯有十一月十二月不等此次正擬於十月內辨考因禮部適在貢院考景山各學教習因暫停以待至十一月始行考試是年十二月山西道監察御史戈源奏翻譯童生為旗人進身之階請照學臣録取文童例先由本旗都統嚴行考試然後奏派大臣録取加派御史二員點名再派王大臣逐名搜撿圍墻以外責成步軍統領加意巡邏嚴拏傳遞其作文題目亦應令考官早出俾諸生即日交卷不準給燭庶場規肅而弊竇清奉旨著照所請行四十一年十一月議覆御史玉麟等條奏考試八旗翻譯童生事宜一摺與順天府所奏詳加閲對其所稱考試翻譯童生例在不應鄉試之年今定於十月未免日短天寒請嗣後改期於八月考試照例不準給燭之處業經順天府具奏奉旨允行毋庸另議外至試期既改於八月日晷較長諸生可以從容繕寫應將該御史所奏前一日點名入場之處毋庸議又該御史等稱八旗造送考册並未開明諸生年貌點名時各旗雖派一佐領到場人數衆多豈能遍認恐不無頂冒之弊請嗣後遇考試日期各旗専派正參領一員率各佐領下領催到場如童生中有不識認查係頂名冒替者即時回明點名御史照例辨理等語亦為杜弊起見事屬可行應如所請辦理四十三年奏準翻譯童生向照文生之例三年兩試惟乾隆四十一年順天府奏準翻譯童生定於八月考試今鄉試定於八月舉行並今嵗鄉試奉旨定於七月初間舉行所有翻譯童生請改於五月考試庶與鄉試兩不相礙四十九年八月軍機處奏言查考試八旗翻譯生員三年兩考係屬舊例並非由於臣工條奏此次考試已定於八月二十六日舉行各事均已預偹考試題目現經發下臣等嚴密加封仍由本日報上發回屆期交各該衙門遵辦其從前因何定以三年兩考之處亦由報交查俟禮部順天府覆到日臣等再將酌量減省章程另行請旨尋禮部順天府查覆軍機處覆奏查考試滿洲翻譯舉人係順治八年所定十四年停止雍正元年奉上諭著總理事務王大臣會同該部將滿洲另翻滿文考試秀才舉人進士之處定議具奏欽此經王大臣等議定滿洲蒙古能翻譯者三年之內考秀才二次舉人一次進士一次乾隆十九年大學士傅恆等遵旨議將翻譯鄉會二試停止嗣於四十一年奉上諭翻譯鄉會試停止已久著加恩於戊戌己亥兩年舉行鄉會試嗣後每屆三年由部具奏其準考與否候旨定奪欽此欽遵在案至翻譯生員因留為伊等考取中書筆帖式之地是以乾隆十九年傳恆等定議時未經裁減臣等悉心酌議中書筆帖式既準生員考取自可留此一途使八旗人等知進身有階庶各留心學習翻譯但三年兩考未免為期太近應請嗣後改作三年考試滿洲蒙古生童一次奉旨知道了附禮部則例一翻譯生員三年一考滿洲額進六十名蒙古額進九名寧缺毋濫逢應考之年各都統備造童生履厯清册送順天府備卷屆期收考一考試日作清字文論二篇由順天府丞先行禮部開列滿洲蒙古各部院堂官題派閲卷大臣搜撿王大臣又各衙門揀選精通翻譯之司員密送禮部題派四員入場協同閲卷如有應廽避之子弟宗族姻親開出扣除一考試日於貢院編號給卷都察院奏派御史滿漢各一員兵部奏派兩翼副都統各一員參領各二員入場彈壓一試卷由閲卷大臣酌擬名次進呈發榜前一日提調官知會禮部堂官一員賫印入闈會同都統御史提調等至聚奎堂眼同閲卷大臣拆號填榜用印張挂其餘一切事宜由順天府承辦以上翻譯考試蒙古翻譯雍正九年奉上諭近見蒙古旗分人能蒙古語言翻譯者甚少相習日久則蒙古語言文字必漸至廢棄應照清文例考試蒙古文翻譯取中生員舉人進士以備理藩院之用如有學習漢書願就試漢文者照常準其考試於别部院補用如此則蒙古旗分之人益加鼓勵勤學蒙古文字不至廢棄而理藩院亦收得人之效矣著內閣會同理藩院議奏是年八月內閣會同理藩院議覆設科取士乃國家之盛典我皇上加意作人命將八旗蒙古內能蒙古文翻譯者另定額考取此誠造就人材禆益庶政之至意臣等請將八旗蒙古旗分內能蒙古文翻譯者照清文之例三年內考取生員二次舉人一次進士一次其考試生員派蒙古提督學政一員考試舉人進士派蒙古正主考一員蒙古同考官二員俱由該衙門行取各部院蒙古大臣官員職名奏請欽點其考試生員題目於清字日講四書內視漢文至三百字為準出題一道令其以蒙古文翻譯其考試舉人進士照此例以為首題再出清字奏疏一道為次題共二道令以蒙古文翻譯其應取生員舉人進士之數著考試官擇應取之卷併備卷奏請欽定奉旨依議乾隆四十六年刑部侍郎喀寧阿奏準向來考試蒙古生童之題即係滿洲生童應翻之文雖場分東西各編號舍不令附近關通但考試領題俱在一日恐考滿文者有照抄謄卷之弊嗣後考取蒙古生童敕交軍機處另擬滿文題目同漢字題目一併進呈欽定頒發四十九年奏準蒙古生童三年考試一次仍照舊額取進九名寧缺無濫以上蒙古翻譯欽定八旗通志卷一百一
