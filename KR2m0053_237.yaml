body:
  text: 人物志一百三忠義𫝊十五滿洲八旗十五五十四年共六十五人乾隆四十年至兆珠兆珠滿洲鑲黄旗人姓富察氏乾隆三十八年由前鋒隨征金川授前鋒校四十年四月擊賊於甲索陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表羅羅羅羅滿洲鑲黄旗人姓烏哩斯氏乾隆三十八年由親軍出征金川三十九年授親軍校四十年陞三等侍衛是年五月擊賊於榮噶爾博陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表平保平保滿洲鑲黄旗人姓富察氏乾隆二十五年由前鋒委前鋒㕘領三十一年授副前鋒㕘領三十九年隨征金川四十年六月擊賊於榮噶爾博陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表占闢納占闢納滿洲鑲黄旗人姓罕察氏乾隆十三年由前鋒授前鋒翎長出征金川二十年出征囘部二十一年陞三等侍衛厯陞頭等侍衛二十三年賞克爾徹赫巴圗魯號陞翼長隨征金川屢著勞績四十年八月擊賊於得爾烏陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表三星保三星保滿洲鑲黄旗人姓𤓰勒佳氏乾隆二十七年由前鋒授前鋒校三十六年擢藍翎侍衛三十九年隨征金川四十年十月擊賊於達烏陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表禄福禄福滿洲鑲黄旗人姓鴻實爾氏乾隆三十一年由䕶軍校隨征緬甸擊賊於小猛育得二等功牌一三十八年調征金川四十年十二月擊賊於噶喇依陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表納嵩額納嵩額滿洲鑲黄旗人姓托科羅氏乾隆三十二年由司轡授藍翎侍衛三十四年擢三等侍衛三十九年隨征金川四十一年正月擊賊於格隆古陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表瑪圗那瑪圗那滿洲鑲黄旗人姓舒穆禄氏乾隆四十六年由粘杆拜唐阿授藍翎侍衛五月派𠞰撒拉爾逆囘在華林寺力戰左腿中鎗傷囘旗後傷發遂歿賞卹如陣亡例恩賜雲騎尉世職承襲詳見世職表福克精額福克精額滿洲鑲黄旗人姓額諾氏乾隆三十七年由黒龍江打牲人補䕶軍住京四十三年陞藍翎侍衛四十四年陞三等侍衛四十九年隨大兵至甘肅剿滅小山逆囘得頭等功牌一三等功牌一賞奇誠額巴圗魯名號五十二年派剿臺灣逆匪於鹽水港擊賊陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表明柱明柱滿洲鑲黄旗人姓𤓰勒佳氏由䕶軍乾隆三十三年随征𬗟甸三十五年囘京三十六年復隨將軍温福出師身閲百三十五戰斬賊八功列超等者八頭等者九二等者八三等者八得功牌三十有三賞銀四十有八兩事蕆回京三十七年十二月恩賜藍翎四十年七月授䕶軍校五十一年十月署副䕶軍㕘領尋授副䕶軍㕘領五十二年十月以廣東遊擊用五十三年三月署提標後營遊擊八月署右營遊擊九月隨征安南五十四年正月於市球江撃賊陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表富桑阿富桑阿滿洲鑲黄旗人姓𤓰勒佳氏由健鋭營藍翎長授䕶軍校委署䕶軍㕘領乾隆五十二年十月發廣東以都司用五十三年十二月補龍門協右營水師都司是年隨征安南五十四年正月於黎城擊賊陣亡賞卹如例恩賞雲騎尉世職無嗣承襲給其妻半俸阿拉哩阿拉哩滿洲正黄旗人姓伊爾根覺羅氏由前鋒授藍翎侍衛厯三等侍衛乾隆二十三年解馬赴伊犂願留軍營効力屢著勞績陞二等侍衛恩賞銀兩緞疋二十七年叙功賞雲騎尉世職洊陞鳥鎗䕶軍㕘領正白旗鳥鎗營總委署翼長三十三年隨征𬗟甸三十八年調征金川進攻阿克木雅得頭等三等功牌各一四十年三月擊賊於勒烏圍中鳥鎗傷尋歿賞卹如陣亡例恩賜雲騎尉併前世職為騎都尉世職承襲詳見世職表五達色五達色滿洲正黄旗人姓沙喇圗嚕騰氏由鳥鎗䕶軍補驍騎校厯陞四川瀘寜營守備湖南辰州協中軍都司乾隆三十八年隨征金川攻取沙壩得功牌頭等二等各一四十年三月擊賊於達佳布陣亡賞卹如例恩賜其子伊凌阿為驍騎校科瑪科瑪滿洲正黄旗人姓敖拉氏由藍翎侍衛陞三等侍衛乾隆三十七年七月出征金川十一月攻克邦拉宗得頭等三等功牌各二又攻克僧格宗得頭等功牌二十二月攻克池木得得頭等功牌二三十八年五月陞二等侍衛賞納親巴圗魯號十月克復美諾得頭等三等功牌各一三十九年二月領兵由沙壩山潜行為賊所阻即分兵據色格洛喀爾都等䖏抛入火彈焚賊寨二百餘間七月進攻達爾圗一帶山梁得頭等三等功牌各一十月擢頭等侍衛旋授領隊大臣十一月賞副都統銜四十年四月撃賊於基木斯丹當噶陣亡賞卹如例詔圗像紫光閣御製贊曰堂堂之陣亦藉出奇潛行僻路附葛踔􅀈直越峯頂火攻石碉破二百寨色格功髙恩賜騎都尉世職承襲詳見世職表富寜阿富寜阿滿洲正黄旗人姓沃色氏由前鋒厯陞防禦乾隆三十三年隨征𬗟甸三十六年調征金川屢著勞績得功牌頭等者二三等者一四十年四月擊賊於得楞陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表富里善富里善滿洲正黄旗人姓𤓰勒佳氏乾隆二十四年由前鋒出征囘部得功牌頭等者四二等者三三等者一三十四年隨征𬗟甸得功牌頭等二等各一三十八年陞前鋒藍翎長隨征金川進攻巴朗功列超等得頭等功牌一補前鋒校四十年四月擊賊於甲索陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表達崇阿達崇阿滿洲正黄旗人姓呼色哩氏乾隆三十九年由健鋭營前鋒隨征金川四十年授前鋒校是年六月擊賊於達佳布身受重傷逾月歿賞卹如例恩賜雲騎尉世職承襲詳見世職表諾亨保諾亨保滿洲正黄旗人姓敖拉氏由司轡授藍翎侍衛擢三等侍衛乾隆三十年襲騎都尉三十六年隨征金川三十九年陞副䕶軍㕘領四十年九月擊賊於達撒谷陣亡賞卹如例恩賜雲騎尉併前世職為騎都尉又一雲騎尉世職承襲詳見世職表拜靈阿拜靈阿滿洲正黄旗人姓赫舍哩氏乾隆十三年由前鋒出征金川得功牌一十六年授藍翎侍衛二十五年授直𨽻黄花路守備二十七年調石塘路守備三十五年擢湖北鄖陽協中軍都司三十八年復隨征金川擊賊於科布曲有功三十九年擢湖南長沙營遊擊四十年閏十月病歿賞卹如例恩賜其子清㤗為監生愛星阿愛星阿滿洲正黄旗人姓西克特里氏乾隆二十年由䕶軍隨征額爾奇斯得二等功牌一二十二年補驍騎校三十年擢南苑防禦三十六年調南苑四品總管章京四十六年奉㫖發往陜甘以遊擊用厯署延綏鎮黄浦營遊擊及波羅協副將四十六年復署延綏鎮遊擊派剿撒拉爾逆囘奮勇馳擊被創而歿賞卹如例恩廕守備孫五十四襲英林英林滿洲正黄旗人姓烏雅氏由䕶軍校授副䕶軍㕘領乾隆五十二年十月以廣東㕘將用五十三年二月署兩廣督標前營㕘將九月隨征安南於市球江擊賊陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表永泰永泰滿洲正黄旗人姓和舍里氏由委署鳥鎗䕶軍㕘領乾隆五十二年十月發廣東以都司用五十三年九月隨征安南五十四年正月於黎城擊賊陣亡賞卹如例恩賞雲騎尉世職承襲詳見世職表佛倫泰佛倫泰滿洲正白旗人姓庫雅拉氏乾隆二十九年由粘竿拜唐阿授藍翎侍衛三十三年陞三等侍衛三十六年五月出征𬗟甸十月調赴金川三十七年正月賞札爾丹巴圗魯號七月陞二等侍衛三十九年擢頭等侍衛旋授領隊大臣四十年正月賞副都統銜四月隨大軍進攻榮噶爾博山梁第八大碉直抵碉下中鎗陣亡賞卹如例詔圗像紫光閣御製贊曰功成一將那邦無虞爭前恥後舊風未渝當噶之戰直進身殞使我心惻優䘏惟允恩賜騎都尉世職承襲詳見世職表神保神保滿洲正白旗人姓𤓰勒佳氏乾隆二十年由健鋭營前鋒出征伊犁得頭等功牌三厯陞前鋒翎長副前鋒校二十四年出征囘部得功牌頭等二等各三三等者二三十年出征烏什得功牌超等頭等二等各三陞前鋒校三十二年隨征𬗟甸得超等功牌三陞委前鋒叅領尋授陜西臨洮營都司陞黄浦營遊擊三十八年調征金川得超等功牌五陞湖北興國營叅將計屢嵗隨征先後臨陣凡八十八次勞績頗著四十年四月擊賊於達爾圗身受重傷尋歿賞卹如陣亡例恩賜其子奇成額為守備葉布肯葉布肯滿洲正白旗人姓伊爾根覺羅氏乾隆三十三年由健鋭營前鋒隨征𬗟甸三十四年進攻老官屯得三等功牌一三十八年調征金川得功牌頭等三等各一三十九年八月進攻達爾圗身受重傷四十年授額外翎長陞額外前鋒校本年七月擊賊於扎烏古陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表沙爾呼達沙爾呼達滿洲正白旗人姓𤓰勒佳氏乾隆二十一年由領催出征伊犁二十四年議功給雲騎尉世職三十六年隨征金川四十年八月擊賊於勒烏圍陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表芬普恩芬普恩滿洲正白旗人姓郭佳氏乾隆三十八年由䕶軍授親軍校三十九年隨征金川進攻格布木雅山羅博瓦遜克爾宗等處所至奮勉得頭等二等功牌各三三等功牌一四十年十月擊賊於科布曲陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表濟勒泰濟勒泰滿洲正白旗人姓果本爾氏乾隆四十年由打牲拜唐阿隨將軍阿桂出征金川以功授藍翎侍衛賞戴花翎四十一年凱旋擢三等侍衛四十六年派𠞰撒拉爾逆囘在蘭州城力戰陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表全海全海滿洲正白旗人姓納喇氏乾隆三十三年由前鋒十五善射授藍翎侍衛四十年擢三等侍衛派往烏什卡倫換班四十六年差回至蘭州留𠞰撒拉爾逆囘在華林寺力戰陣亡事聞諭曰全海奮勇剿賊臨陣捐軀殊為可憫著交該部照例優卹恩賜雲騎尉世職承襲詳見世職表吉爾坦保吉爾坦保滿洲正白旗人姓果爾敏氏乾隆三十二年由打牲拜唐阿襲父徳倫保雲騎尉世職四十一年派隨哨圍挑入材技駐京四十四年授三等侍衛四十六年派剿撒拉爾逆囘在華林山力戰陣亡賞卹如例恩賜雲騎尉併前雲騎尉為騎都尉世職承襲詳見世職表富亮富亮滿洲正白旗人姓温達氏乾隆三十八年由前鋒隨征金川在宜喜沙壩山奪占碉卡功列頭等三十九年攻喇穆喇穆連戰七次得頭等三等功牌各一又戰該布達什挪功列二等四十年奪取科布曲格隆古索隆古碉卡四十六年部委前鋒校隨西安將軍誠毅伯伍彌泰剿滅撒拉爾逆囘在水磨溝進戰奮勇殺賊被傷尋歿賞卹如例恩賜雲騎尉世職承襲詳見世職表瑚圗靈阿瑚圗靈阿滿洲正白旗人姓他塔喇氏由䕶軍校隨征金川屢經打仗有功得頭等功牌六解金川賊匪進京恩賞縀五疋乾隆五十二年十月發廣東以守備用五十三年署新㑹營守備是年九月隨征安南五十四年正月於黎城擊賊陣歿賞卹如例恩賜雲騎尉世職承襲詳見世職表邁拉遜邁拉遜滿洲正紅旗人姓舒穆禄氏乾隆二十七年由䕶軍派戍伊犁三十二年陞授藍翎長三十三年隨征緬甸三十四年授鳥鎗䕶軍校厯攻猛麻老官屯等處得頭二三等功牌各一三十八年隨征金川進攻阿克木雅得頭等功牌一四十年正月擊賊於遜克爾宗陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表官㤗官泰滿洲正紅旗人姓伊爾根覺羅氏乾隆二十八年由䕶軍授藍翎長三十一年隨征𬗟甸三十七年調征金川四十年四月擊賊於遜克爾宗身受重傷尋殁賞卹如例恩賜雲騎尉世職承襲詳見世職表七十八七十八滿洲正紅旗人姓伊爾根覺羅氏乾隆三十一年由鳥鎗䕶軍出征𬗟甸得頭等三等功牌各一三十