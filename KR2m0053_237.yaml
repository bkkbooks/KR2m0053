軍校隨征𬗟甸擊賊於蠻結得功牌一三十六年調征金川進攻巴朗及路頂宗明郭宗諸處共得功牌超等者二頭等者六二等者三三等者一四十年四月擊賊於甲索陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表濟住濟住滿洲正藍旗人姓𤓰勒佳氏乾隆三十六年由䕶軍隨征𬗟甸三十七年調征金川進攻巴朗等處厯著勞績共得功牌二十六三十八年陞前鋒校四十年四月擊賊於遜克爾宗陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表庫勒徳庫勒德滿洲正藍旗人姓沃埒氏乾隆三十七年由親軍授空銜藍翎旋補藍翎侍衛陞三等侍衛三十八年陞二等侍衛三十九年隨征金川進攻明郭宗路頂宗等處得功牌五㑹賊聚邁過爾山梁林箐叢宻庫勒徳乘夜撲碉盡殱其衆賞朗沁巴圗魯號四十年六月擊賊於木斯工噶陣亡賞卹如例詔列次五十功臣圗像紫光閣贊曰邁過爾山林深夜黒騰躍而上竟殲羣賊乗勢克取越險踰梁木斯工噶嗟哉陣亡恩賜雲騎尉世職承襲詳見世職表托津托津滿洲正藍旗人姓巴爾氏乾隆三十五年由前鋒補前鋒校三十八年隨征金川三十九年授錦州佐領四十年九月擊賊於達撒谷陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表多隆武多隆武滿洲正藍旗人姓伊爾根覺羅氏乾隆三十三年由鳥鎗䕶軍隨征𬗟甸得頭等功牌二三十八年調征金川進攻阿克木雅得二等功牌一授藍翎長四十年十月擊賊於達烏陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表寜住布寜住布滿洲正藍旗人姓闗佳氏乾隆三十三年由前鋒授藍翎長三十四年陞鳥鎗䕶軍校厯三等侍衛三十七年隨征金川陞二等侍衛屢著勞績得超等功牌二頭等功牌四三等功牌一四十年閏十月擊賊於西里陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表秀林秀林滿洲正藍旗人姓索徹哩氏乾隆三十三年由鳥鎗䕶軍隨征𬗟甸自新街至老官屯監守木柵晝夜迎擊左膝受鎗傷三十五年回京三十六年五月復挑赴雲南十一月調征金川三十七年授䕶軍校四十年三月委署䕶軍㕘領前後百餘戰受傷四處共保列出衆超羣二次頭等六次二等四次三等一次得功牌十一十一月擊賊於科布曲陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表唐泰唐泰滿洲鑲藍旗人姓他塔喇氏乾隆三十年由鳥鎗䕶軍授䕶軍校三十五年署鳥鎗䕶軍㕘領三十七年授副鳥鎗䕶軍㕘領隨征金川四十年二月擊賊於遜克爾宗臂受鳥鎗傷越日傷發歿賞卹如陣亡例恩賜雲騎尉世職承襲詳見世職表達蘭泰達蘭泰滿洲鑲藍旗人姓薩克達氏乾隆三十四年由䕶軍隨征𬗟甸是年十月擊賊於新街老官屯多所斬獲功列超等十一月拔柵渡河轉戰益奮得頭等功牌一三十七年隨征金川是年五月攻克明郭宗得超等功一次頭等三等功牌各一授親軍校十月攻克路頂宗得超等功一次頭等三等功牌各一三十八年授藍翎侍衛擢二等侍衛賞額依巴爾巴圗魯號四十年五月擊賊於達撒谷身受重傷尋歿賞卹如陣亡例詔圗像紫光閣御製贊曰或仰而攻或俯而壓仰似鷹抄俯如馬蹋么䯢迹遁鬼蜮魂消追奔逐北處處功髙恩賜雲騎尉世職承襲詳見世職表科靈阿科靈阿滿洲鑲藍旗人姓西特爾氏由前鋒委署七品官乾隆三十八年隨征金川四十年閏十月擊賊於科布曲陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表瑚爾棟阿瑚爾棟阿滿洲鑲藍旗人姓瑚爾色氏乾隆二十七年由前鋒派戍伊犁三十年出征烏什三十三年授前鋒校三十六年隨征𬗟甸尋調征金川三十七年署前鋒㕘領三十八年授副䕶軍㕘領四十年十二月擊賊於科布曲陣亡賞卹如例恩賜雲騎尉世職承襲詳見世職表烏爾訥烏爾訥滿洲鑲藍旗人姓納喇氏乾隆二十年由鳥鎗䕶軍出征伊犁得二等功牌一二十九年授䕶軍校三十年出征烏什凡得功牌頭等者四二等者一三等者四三十四年擢委䕶軍㕘領三十五年七月授副䕶軍㕘領隨征金川擢甘肅蘭州城守營㕘將三十九年二月隨大軍攻克沙壩山賞戴花翎四月授廣東廣州協副將六月進攻色淜普七月攻該布達什挪十月攻邁過爾山梁十一月攻格魯古了口四十年四月擢陜西延綏鎮總兵攻木斯工噶了口俱以功最予優叙四十一年二月大軍進攻噶喇依時喇嘛寺不戒於火延及官寨烏爾訥率衆馳救火藥轟起身被石傷歿賞卹如例詔圗像於紫光閣御製贊曰平生若懦戰則倍勇雖屢受傷進不旋踵功成事定賊寨火延歿於弗值實可嗟焉恩廕其子三雲保為都司欽定八旗通志卷二百二十三
