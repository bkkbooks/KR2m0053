body:
  text: 旗分志二十八旗佐領二十鑲白旗蒙古佐領佐領鑲紅旗蒙古鑲白旗蒙古佐領鑲白旗蒙古都統所屬左右恭領各一右參領下佐領十二左參領下佐領十二察哈爾恭領下佐領十三右參領第一佐領原係第三佐領內丁壯康熙二十三年達拉扎管佐領時人丁滋盛分編一佐領以護軍統領索諾木管理索諾木故以副都統尚圖管理尚圖故以三等阿思哈尼哈畨漢文稱男護軍參領彀色管理彀色故以郎中黑色管理黑色告退以護軍參領薩竒爾圖管理續以護軍參領明德管理明德故以巴丹管理巴丹告休以德常管理德常告病以吉蘭泰管理謹案旗册此佐領係康熙二十三年將達拉扎佐領內滋生人丁與文布塔布囊所屬蒙古合編一佐領右參領第二佐領原係崇德七年將錦州一百三名壯丁編為牛録漢文稱佐領初以安他哈管理安他哈故以滿韜管理滿韜故以其子那木僧格諦管理那木僧格諦因病辭退以其子關保管理關保故以其弟二等阿達哈哈畨漢文稱輕車都尉兼恭領署副都統八十管理八十故以關保之子三達色管理三達色故以其子達桑阿管理達桑阿故以什賈保管理續以伍台管理續以蘇爾方阿管理謹案此佐領原係綽克圖台吉率人户來歸時編立令其從人安他哈管理襲至七次安他哈絶嗣於乾隆三十年改為公中佐領右參領第三佐領原係喀喇沁地方蒙古以其人編為牛録初以噶爾圖管理噶爾圖故以其子博特管理博特故以其弟阿玉石管理阿玉石陳亡以其子塞類管理塞類故以噶爾圖弟之子道圖管理道圖故以其叔父明海之孫達拉扎管理達拉扎因病辭退以其叔祖哈喇之孫巴達禮管理巴達禮故以道圖之子章賽管理章賽殁於軍以其子福夀管理福夀革職以其子洛賁伊管理洛賁伊故以其子常福管理謹案此佐領係喀喇沁老河地方蒙古噶爾圖塔布囊與文布塔布囊喜拉齊塔特塔布囊率人户國來歸立初編右參領第四佐領初編設時令阿巴圖巴圖魯管理續以艾扎哈管理續以博倫圖管理續以那穆管理續以諾滿管理續以大雅管理續以諾滿弟之子達顔布管理續以達顔布之子觀音保管理續以觀音保之弟索住克圖管理索住克圖故以三等護衛兼拖沙喇哈畨漢文稱雲騎尉六十管理六十故以員外郎明祿管理明祿故以常舒保管理續以那凱管理那凱革職以色郎圖管理色郎圖升任遊擊以羅布藏管理羅布藏故以扎隆阿管理扎隆阿出差以舒興管理國謹案此佐領原係阿巴圖巴圖魯等五姓巴圖魯初率人户三百來歸編為佐領因阿巴圖無嗣康熙五十九年作為公中佐領右參領第五佐領原係第四佐領內人丁康熙二十三年觀音保管佐領時人丁滋盛分編一佐領以畢里克管理續以畢里克之子伍訥圖管理續以伍訥圖之族子巴亮管理巴亮故以額賁額管理額賁額升任遊擊以富德管理富德出差以明太管理明太升任以哈拉爾岱管理謹案畢里克係阿巴圖巴圖魯之孫後因伍訥圖無子作為公中佐領右參領第六佐領原係順治元年正白旗國德所管之佐領國德升任盛京以巴扎爾管理巴扎爾故以阿齊圖管理阿齊圖緣事革退以巴扎爾之子塔喇圖管理塔喇圖故以僧格管理僧格故以阿齊圖之子趙那思圖管理趙那思圖緣事革退以巴扎爾之孫三雅圖管理三雅圖故以喇都祜管理喇都祜故以其族弟布蘭太管理布蘭太撥入正白旗以金良管理金良故以御史常祿管理常祿故以木爾太管理木爾太休致以本智管理右參領第七佐領崇德四年編設初以喀喇沁間散塔布囊布燕管理布燕年老辭退以其子塞勒木素管理塞勒木素因病辭退以其子和尚管理和尚故以其子索諾木他爾布管理索諾木他爾布緣事革退以其叔父之子合爾庫管理合爾庫緣事革退以其叔父之子班第管理班第故以其子拉布丹管理拉布丹故以其伯祖之二世孫達爾扎管理右參領第八佐領原係天聰四年將喀喇沁地方蒙古編為半箇牛録初令白賽管理順治六年白賽故將其五十丁合并圖默特之五十丁編為整牛録以達賚管理達賚故以其子達布管理達布故以其子瓦岔爾管理瓦岔爾故以其叔父之孫薩克伸管理薩克伸緣事降調以其兄之子福尼雅漢管理福尼雅漢故以瓦岔爾之子圖拉管理圖拉故以白賽之弟巴爾噶遜之三世孫召那蘇圖管理召那蘇圖升任遊擊以達賴之四世孫艾星阿管理艾星阿故以巴爾噶遜之四世孫富寧管理富寧故以達賴之五世孫關福管理謹案此佐領原係鄂齊爾烏巴什與喀喇沁之白賽率衆來歸編半分牛録令白賽管理合圖默特人丁改作為白賽圖默特二族遞管佐領右參領第九佐領原係天聰五年以後來歸附之蒙古編立牛録令都統綽貝管理綽貝故以其弟布達西理管理布達西理故以其兄之孫長保管理長保故以長保之族叔鄂爾追管理鄂爾追故以長保族叔馬尼管理馬尼故以長保之子頭等阿思哈尼哈畨兼步軍副尉巴圖管理巴圖故以其子貢楚克達爾管理貢楚克達爾故以其子德寧額管理右恭領第十佐領原係太宗文皇帝以蒙古投誠人分編為五牛録時令孟格管其一孟格故以喜佛管理喜佛故以孟格之弟孟格圖管理孟格圖因病辭退以孟格之子班達拉管理班達拉故以其子必里克圖管理必里克圖故以其弟恩克管理恩克故仍以喜佛之孫博濟管理博濟因病辭退以其子海夀管理海夀緣事革職以其堂弟福格管理福格告病以喜佛管理喜佛故以步軍校英保管理英保故以合明阿管理謹案此佐領乾隆三十二年喜佛之孫福格缺出經本旗照無根源佐領之例將福格之子及旗員見奉帶領引旨福格之祖喜佛並非原編佐領之人因孟格絶嗣始令喜佛管理又令孟格之弟孟格圖管理孟格圖之子孫管理數輩又絶嗣始令喜佛之孫管理此佐領即作為公中佐領右恭領第十一佐領原係國初編立之半箇牛録令額思庫塔布囊管理順治八年始益以外牛録人為一整牛録額思庫塔布囊故以其子寨僧管理寨僧歿於軍以其子丹巴管理丹巴因病辭退以其子永夀管理永夀故以其子七十管理七十恭革以其子法永管理法永故以其子郭興阿管理謹案額思庫由喀喇沁地方率三十二户來歸初編時為半分牛録右恭領第十二佐領原係第九佐領內丁壯康熙十三年布達西理管佐領時因人丁滋盛分編一佐領以布達西理之子長鼐管理長鼐故以其子察里琿管理察里琿從征陳亡以其子善福管理善福故以其子善太管理善太故以其曾祖之三世孫鄂齊爾管理鄂齊爾故以七十五管理續以三達色管理續以額爾克圖管理額爾克圖革職以花尚阿管理謹案此佐領由長鼐後至鄂齊爾襲過五次無嗣乾隆五十四年奉旨作為公中佐領左參領第一佐領原係天聰年間編立之牛録初以三等甲喇章京諾木琿管理諾木琿故以合色管理合色故以畢定管理畢定故仍以初管佐領諾木琿之子齊那圖管理齊那圖故以額爾和圖管理額爾和圖故以齊那圖弟之子同保管理同保故以都統喀爾馬管理喀爾馬故以同保之子阿齊圖管理阿齊圖故以其弟薩爾泰管理薩爾泰故以巴特馬管理巴特馬故以同保之弟伍爾圖那蘇圖管理伍爾圖那蘇圖故以薩爾泰之子伊桑阿管理伊桑阿故以扎什管理扎什故以貢額拉什管理貢額拉什故以瑚圖禮管理瑚圖禮故以垂多爾吉管理左參領第二佐領原係在盛京初編牛録時以各處歸附之蒙古編立牛録命巴顔布庫牛録下驍騎校蒙格圖管理蒙格圖故以達賴野管理續以原任副都統瑪都護管理瑪都護故以其弟莫都護之子瑚什布管理瑚什布升察哈爾總管以其子八十管理八十故以其弟多永鄂管理多永鄂故以其子蘇克阿管理蘇克阿故以其弟蘇章阿管理蘇章阿故以諾木圖之三世孫圖明阿管理圖明阿故以其伯髙祖之三世孫哈克散管理哈克散故以其叔髙祖之三世孫圖桑阿管理謹案此原係無根源佐領乾隆四十三年作為族中承襲佐領左參領第三佐領原係喀喇沁地方蒙古於天聰八年以其人丁編為牛録令拜琿代管理拜琿代故以其子昻格參管理昻格參緣事革退以和尚管理和尚故以拜琿代之孫巴圖孟柯管理巴圖孟柯故以其子額爾德木圖管理額爾德木圖故以巴達拉之二世孫玉保管理玉保革職以佐領法太管理法太升任寧夏協尉以蘇章阿管理蘇章阿故以富寧管理富寧故以扎拉翰管理扎拉翰故以阿爾薩郎管理謹案此佐領原以拜琿代等所率五十一丁合伊族瑚巴克泰等五十八丁又别姓竒塔特十四丁編成佐領拜琿代之子孫承襲七次無嗣奏改為公中佐領左恭領第四佐領原係第三佐領內丁壯康熙二十三年昻格參管佐領時人丁滋盛六十名與多爾濟佐領下人丁四十二名合編為一佐領令原任都統班達爾善管理班達爾善故以其子頭等侍衛多爾濟管理多爾濟故以其子富山管理富山故以瑚巴克泰之三世孫玉保管理玉保革職以二達色管理二達色故以圖桑阿管理圖桑阿故以衆神保管理謹案班達爾善即係竒塔特之于乾隆二年作為瑚巴克泰竒塔特兩姓互管佐領乾隆二十五年作為公中佐領左恭領第五佐領原係喀喇沁地方蒙古六十九户人丁合錦州伊爾開等蒙古編一牛録初以門都管理門都故以其子索諾穆管理索諾穆故以蘇白特管理蘇白特緣事革退以其子阿木古朗管理阿木古朗緣事革退以其族弟巴查爾管理巴查爾故以其弟巴十六管理巴十六緣事革退仍以索諾穆之孫多爾濟管理多爾濟故以其子克什克特管理克什克特緣事降調以其族叔署參領祜必圖管理祜必圖故以其子敦住管理敦住故以其子德好管理德好故以其伯父之四世孫巴雅爾管理巴雅爾故以其子西郎阿管理謹案此佐領係鍾齊岱率六十九户人丁來歸順治八年合錦州蒙古編立以鍾齊岱之子門都管理左參領第六佐領原係天聰年問編設之牛録初令溫篤爾祜管理溫篤爾祜故以濟蘭圖管理濟蘭圖緣事革退以愛圖管理愛圖緣事革退以溫篤爾祜之弟莽鼐管理莽鼐故以巴顔管理巴顔年老解退以托畢泰管理托畢泰殁於陳以溫篤爾祜之孫克什特管理克什特緣事革退以白起管理白起故以托畢泰之孫花色管理花色故以拖沙喇哈畨察哈爾總管德夀管理德夀故以玉保管理玉保革職以鼐滿管理鼐滿故以德寧管理續以薩音查昆管理左恭領第七佐領原係額爾和圖佐領內人丁康熙十一年因户口滋盛分編一佐領以親軍校古英管理古英殁於軍以其兄之子賽齊克管理賽齊克故以其弟依達木管理依達木故以其弟拜他喇布勒哈畨漢文稱騎都尉阿爾濟薩管理阿爾濟薩故以其子綽爾門管理綽爾門故以伊達瑪之子扎什管理扎什故以其子伍爾圖那蘇圖管理伍爾圖那蘇圖故以其子烏靈阿管理謹案此佐領原係古英之父朝蔡由察哈爾率一百六十人丁於國初乙亥年來歸併入第一佐領下至康熙十一年第一佐領人丁滋盛另編佐領古英將伊父率衆來歸原由呈明因令古英承襲左恭領第八佐領原係崇德七年將前屯衛四十八户人丁編為半箇牛録初以多爾濟管理多爾濟故以巴雅爾管理至順治八年始編為整牛録仍以巴雅爾管理續以察漢台吉管理察漢台吉故以驍騎校布延圖管理續以爾吉圖管理爾吉圖卒於軍以其叔父石達之子黑雅圖管理黑雅圖緣事革退以爾吉圖之子布彥管理布彥故以其子六十五管理六十五故以步軍副尉毛竒堂管理毛竒堂因病辭退以頭等護衛托克托