body:
  text: 欽定四庫全書欽定八旗通志卷四十二職官志國家亮功熙績自古為昭我朝創立八旗因章辨色定職列官實有合於軒轅氏以青雲縉雲建官命師聨為營衛之制和萬國而開淳化所為合撰同符也太祖高皇帝設固山額真今稱都統梅勒額真今稱副都統甲喇額真今稱參領牛録額真今稱佐領以相統轄太宗文皇帝闢文館為內三院設承政參政啓心郎諸官整飭庶務世祖章皇帝統一區宇亰秩則悉增滿缺直省則滿漢參用一視同仁辨章昭晰樹閎逺之規模六合向化垂緒於億萬斯年我皇上澄敘官方釐定規制優賚豫以廣慈重職司以核實申明舊制增立新模於設官分職之良法美意益昭明備矣八旗舊志所載職官分八旗官職八旗部院官為兩門區條别目復沓參差頗失聨事彚疇互相經緯之意又其志八旗官職則以王府官列於陵寢官之前其志八旗部院官則以宗人府列於內閣之後編排次第未能整齊至其沿革增併之踈舛更不可枚舉臣等奉命增修謹據大清會典欽定職官表以次甄録庶幾於經邦治府統官諧民之典秩然有敘首載宗人府宗支錫爵肇瓜瓞之綿長文爵則伸明職掌武職則釐分品秩廉法同昭裁成盡善與夫增置官師因時定制設延閣之校司列香山之健鋭經緯並宣敷揚盛治德威逺被闢地安屯新疆各官星羅碁布實惟大聖人以守兼創光前烈而鞏丕基鴻規式廓即職官之增載亦非舊志之體例所可拘也惟舊志於部院各官止載滿缺不及漢人員額兹仍其例焉職官志一職官宗人府部內閣部軍機處府吏戶翰林院詹事宗人府宗令一人左右宗正各一人左右宗人各一人初制宗令以親王郡王統理宗正以貝勒貝子兼攝宗人以鎮國輔國公及將軍兼攝後擇賢任使不復以封爵為限乾隆元年以來間以親王總理事務無常員左右司理事官宗室各二人初制三品康熙二十二年定為正五品副理事官宗室各二人初制從四品康熙二十二年定為從五品初設郎中六員員外郎四員主事四員康熙十二年始分𨽻左右兩司三十八年兩司各裁郎中一員雍正二年改郎中為理事官改員外郎為副理事官初制皆以覺羅為之後以覺羅滿洲𠫭用雍正二年定以宗室滿洲𠫭用乾隆二十九年定制悉以宗室為之主事宗室各二人正六品經厯宗室二人正六品順治九年制𠫭用宗室滿洲乾隆二十九年定制以宗室為之堂主事宗室二人初制四品康熙九年定為正六品初制以宗室滿洲𠫭用乾隆二十九年定制以宗室為之委署主事四人乾隆五十三年四月奏明由筆帖式內升署仍食七品俸筆帖式宗室二十四人並支七品俸初制以宗室滿洲參用乾隆二十九年定制以宗室為之內閣大學士滿洲二人初定一品順治十五年改為正二品雍正八年升為正一品國初置文館天聰十年改為內三院曰內國史院曰內祕書院曰內宏文院各設大學士一人分其事為職掌順治元年增設學士二年定為正二品衙門以翰林院官分𨽻內三院稱內翰林國史院內翰林祕書院內翰林宏文院增設侍讀學士侍讀等官九年設典籍十五年改內三院為內閣其大學士俱改內閣銜仍分設翰林院十六年裁學士侍讀等官十八年復改內閣為內國史院內祕書院內宏文院裁翰林院康熙九年仍改為內閣另設翰林院如舊制十年仍補學士以下等官滿漢大學士順治元年設六員不備官康熙年間率用四員雍正年間多用至六員乾隆十三年定制滿漢各二員協辦大學士滿洲一人從一品簡充以六部尚書來初置自雍正年以學士兼禮部侍郎銜滿洲六人初定二品順治十五年改為正五品尋以兼禮部侍郎銜改為正三品雍正八年升為從二品初制滿洲學士三員漢軍三員自順治元年以後增減不一康熙九年定滿洲二員十年增四員又定漢軍二員十二年以漢軍併於漢缺兼禮部侍郎銜侍讀學士滿洲四人蒙古二人初制三品後改為從五品雍正三年定為從四品順治二年置初兼太常寺銜後停兼銜八年設滿洲侍讀學士三員漢軍侍讀學士三員十八年增滿洲侍讀學士三員蒙古侍讀學士三員康熙九年定制滿洲侍讀學士滿文二員漢文二員共四員蒙古侍讀學士二員漢軍侍讀學士二員乾隆十四年改定滿洲四人蒙古二人漢軍侍讀學士缺以漢軍漢人通行銓補侍讀滿洲十人蒙古二人漢軍二人初制四品後改為正六品順治二年置初兼太常寺少卿光祿寺少卿銜尋停兼銜滿洲侍讀初設滿文五員滿漢文六員共十一員康熙三十八年省滿文一員滿漢文二員共八員旋復增二員為十員典籍滿洲二人漢軍二人正七品內閣為典掌絲綸之地自大學士以下皆不置印惟典籍給印順治九年置初各設三員康熙九年定各設二員中書滿洲七十人蒙古十六人漢軍八人貼寫中書滿洲四十人蒙古六人從七品順治十六年置滿洲中書初設滿文撰文二十員辦事二十員滿漢文撰文十七員辦事十八員共七十五員康熙三十八年省滿文撰文辦事各一員滿漢文撰文一員辦事二員共七十員蒙古中書初設撰文九員辦事十員共十九員康熙三十八年省撰文一員辦事二員共十六員漢軍中書初設撰文五員辦事八員共十三員康熙三十八年省撰文一員辦事四員共八員中書科中書舍人滿洲二人從七品初設一員乾隆十四年增一員共二員筆帖式滿洲十人軍機處軍機大臣無定員由大學士及尚書侍郎奉特旨召入自雍正十年三月大學士等遵旨議奏辦理軍機處密行事件所需鈐封印信謹擬用辦理軍機印信字樣移咨禮部鑄造貯辦理軍機處派員管理並行知各省及西北兩路軍營至乾隆初年停止改設總理乾隆二年十一月奉諭莊親王等奏辭總理事務朕勉從所請但目前兩路軍務尚未全竣且朕日理萬幾亦間有特旨交出之事皇考當日原設有辦理軍機大臣今仍著大學士鄂爾泰張廷玉公訥親尚書海望侍郎納延泰班第辦理嗣後永以為制至軍機章京以內閣滿漢侍讀中書及各部郎中員外郎主事簡其賢能者奏充無定額謹案軍機為機務要地不設専署即附載內閣之後翰林院掌院學士滿洲一人順治十五年置康熙二十八年五月以大學士徐元文兼管翰林院掌院學士事始用重臣兼領自特簡乾隆元年以來多以重臣兼攝以重其任侍讀學士滿洲二人初制從五品雍正三年定為從四品侍講學士同侍講學士滿洲二人康熙九年置侍讀侍講學士各三人乾隆五十年二月裁侍讀侍講學士各一人侍讀滿洲二人初制正六品雍正三年定為從五品侍講同侍講滿洲二人康熙九年置侍讀侍講各三人乾隆五十年二月裁侍讀侍講各一人謹案順治九年壬辰科十二年乙未科俱分滿漢進士為二榜壬辰科滿洲一甲進士麻勒吉折庫納巴海乙未科一甲進士圖爾宸查漢索泰俱分授修撰編修以後滿漢進士合為一榜編修檢討係庶吉士散館授職庶常館教習大臣滿洲一人小教習無額缺國初教習多以內院學士為之侍讀等亦間有預者自康熙九年後皆以掌院學士領其事而內閣學士時𠫭用焉六十一年辛丑科始以工部尚書陳元龍領教習事嗣後大學士尚書侍郎均得為之特簡皆由制小教習始置於康熙三十三年雍正八年無常停乾隆十年復置皆由教習大臣會同掌院學士掄選奏充無額缺九年壬辰科始選滿洲進士六人漢軍謹案順治進士四人改庶吉士乙未科選滿洲進士六人與壬辰科同後滿漢合為一榜新進士引見選庶吉士滿漢無定員典簿廳典簿滿洲一人從八品典簿廳孔目滿洲一人從九品待詔廳待詔滿洲二人從九品俱順治十五年置筆帖式滿洲四十人漢軍四人初制滿洲四十八人漢軍八人康熙三十四年省滿洲八人漢軍四人謹案翰林院不設司屬凡有陳奏及往來文牒舊例以典簿筆帖式具稿呈堂雍正元年以官輕滋弊令掌院學士於俸淺編修檢討內擇才守優長者充作司官名曰辦院事後復增置協辦院事由掌院學士掄充有缺遞補辦院事滿洲二人協辦院事滿洲一人以非院官正額謹附識於此經筵講官滿洲八人以內閣學士掌院學士讀講學士詹事少詹事及尚書侍郎左都御史副都御史通政使大理寺卿之由內閣翰林升任者列名以原銜兼充日講起居注官滿洲八人起康熙九年置居注館於太和門西廊設記注官滿洲四人以官一人十六年日講官兼攝十二年增設滿洲記注又增設滿洲記注官一人五十七年三月省記注官令翰林官於理事日侍班記注之事併歸內閣詔復設雍正元年注官如康熙五十六年以前故事乾隆日講起居元年增設滿洲記注官二人凡記注官均以翰林詹事坊局官以原銜兼充惟掌院學士例各兼一缺均兼日講繫銜起居注館主事滿洲二人初制滿洲三人漢軍一人康熙三十八年省滿洲漢軍各一人五十七年俱省雍正元年復置滿洲主事二人筆帖式滿洲十四人漢軍二人順治初置滿洲八人漢軍二人十一年增設滿洲六人康熙五十七年俱省雍正元年復設如今額文淵閣領閣事滿洲一人國初定制大學士以未建我文淵閣繫銜而閣制皇上右文稽古修明典籍乾隆三十七年藏弆逸文墜特詔直省守吏購訪海內遺書以廣石渠允廷簡竒祕響臻復散見永樂大典者重加釐訂成編臣議採古書之敕館爰排校繕録彚為四庫全書凡三萬六千册而贏臣命於華殿後鼎建文上文淵閣以貯之四十一年祕書官品頗詳以宋程俱麟臺故事所載詔大學士等集議參仿其制創置閣職領閣事以大學士協辦大學士掌院學士兼充直閣以下咸定額有差用資典守蘭臺東觀永昭美備焉文淵閣提舉閣事滿洲一人上諭乾隆五十三年奉一員係由總管內務府大臣兼文淵閣提舉閣事充其司員以下皆所管轄著交提舉閣事一人專為管理其領閣直閣校理檢閲等俱著兼充虛銜不必辦理本閣事務文淵閣辦理事務內務府司員四人筆帖式四人奏俱由提舉閣事大臣掄選充詹事府詹事府詹事滿洲一人正三品少詹事滿洲一人正四品順治元年初設少詹事一人掌府事是年十一月省九年設詹事一人以掌府印十五年復省康熙詔復設十四年奉洲置詹事一人少詹事二人三十七年詹事府滿省少詹事一人左春坊左庶子滿洲一人以四品冠𢃄食五品俸右春坊同左中允滿洲一人以五品冠帶食六品俸右中允同左贊善滿洲一人從六品右贊善同右春坊右庶子滿洲一人右中允滿洲一人右贊善滿洲一人國初設左右春坊皆漢人員缺以內三院官兼攝順治十五年省康熙十四年復置左右春坊官左右庶子滿洲各一人左右諭德滿洲各一人左右中允贊善滿洲各二人三十七年省滿洲右諭德一人左右中允贊善各一人乾隆十三年省滿洲左諭德一人司經局洗馬滿洲一人從五品康熙十四年置所屬有正字初置滿洲正字二人康熙三十七年裁省主簿滿洲一人從七品康熙十四年定額又初置滿洲録事二人康熙三十七年以後次第裁省筆帖式滿洲六人康熙十四年初置十人三十八年省四人朝謹案詹事府本東宫官屬我家法相承盡祛厯代之弊良法美意具載儲二金鑑書中而預教至為嚴慎皇子皆在書各選翰林官分侍讀講日有課程擇大尚書房讀臣二三人為總師傳以綜理之凡詹事坊局各官但存其員額以備翰林敘進之階云吏部吏部尚書滿洲一人從一品天聰五年十月議定官制建六部每部各一貝勒主之吏部設滿洲承政一員蒙古承政一員參政八員啓心郎一員崇德三年更定吏部設滿洲承政一員左參政二員右參政三員啓心郎一員順治元年停貝勒總