body:
  text: 人物志一百忠義𫝊十二滿洲八旗十二二十四年共一百二乾隆十三年至十二人徳克濟徳克濟滿洲鑲黄旗人姓葉母氏世居葉佳村由筆帖式厯陞郎中乾隆十九年出師北路二十年五月隨將軍班第駐守伊犂八月阿睦爾撒納叛逃逆黨克什木巴朗等先後煽附刼掠軍臺徳克濟死之賞卹如例恩賜雲騎尉世職承襲詳見世職表彰薩彰薩滿洲鑲黄旗人姓扎庫他氏世居諾敏地方由前鋒授藍翎侍衛乾隆十九年出師北路二十年八月隨將軍班第等駐伊犂為逆黨克什木巴朗等所害賞卹如例恩賜雲騎尉世職承襲詳見世職表塞蒙阿塞䝉阿滿洲鑲黄旗人姓牛克特氏世居三姓地方由䕶軍授驍騎校乾隆十九年三月出兵北路二十年隨將軍班第駐守伊犂八月為逆黨克什木巴朗等所害賞卹如例恩賜雲騎尉世職承襲詳見世職表納森圖納森圖滿洲鑲黄旗人姓阿爾拉氏世居黒龍江由䕶軍授空翎侍衛乾隆二十年隨將軍班第等駐守伊犂遇亂死之賞卹如例恩賜雲騎尉世職承襲詳見世職表貝多爾貝多爾滿洲鑲黄旗人姓阿爾拉氏世居黒龍江由䕶軍補空翎侍衛旋授三等侍衛乾隆二十年出師北路在哈拉塔勒追𠞰盗馬賊衆戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表海福海福滿洲鑲黄旗人姓富察氏世居訥音地方由前鋒授前鋒校乾隆二十年出師西路往北路軍營解糧歸途遇賊奮勇衝擊至巴里坤創發而歿賞卹如例恩賜雲騎尉世職承襲詳見世職表布雲布布雲布滿洲鑲黄旗人姓烏喇氏世居齊齊哈爾地方由前鋒放藍翎侍衛乾隆十八年出師西路二十一年因解送策楞玉保遇厄勒特賊衆力戰歿於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表杭吉爾圖杭吉爾圖滿洲鑲黄旗人姓鄂諾氏世居黒龍江由䕶軍授䕶軍校乾隆十九年出師北路二十一年七月在伊犂遇亂死之賞卹如例恩賜雲騎尉世職承襲詳見世職表富明安富明安滿洲鑲黄旗人姓薩克達氏世居寜古塔由前鋒授空翎侍衛乾隆二十年出師西路二十一年解送策楞玉保遇厄勒特賊衆被害賞卹如例恩賜雲騎尉世職承襲詳見世職表和濟圖和濟圖滿洲鑲黄旗人姓阿爾拉氏世居黒龍江由藍翎侍衛洊厯頭等侍衛乾隆二十一年出師北路解送策楞玉保在途遇厄勒特賊衆被害賞卹如例恩賜雲騎尉世職承襲詳見世職表阿里遜阿里遜滿洲鑲黄旗人姓薩瑪爾吉氏世居黒龍江由䕶軍授空翎侍衛乾隆二十一年在鄂羅扎拉圖地方與賊戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表珠爾庫珠爾庫滿洲鑲黄旗人姓莫爾哲勒氏世居黒龍江由副長委署營總乾隆十九年出征伊犂有功二十二年隨都統滿福追𠞰沙拉斯嗎唬斯行次哈拉和落與都統滿福同為賊人誘害賞卹如例海林泰海林泰滿洲鑲黄旗人姓牛克特氏世居吉林由空翎補藍翎侍衛授三等侍衛乾隆二十年出師西路二十二年隨都統滿福追𠞰沙拉斯嗎唬斯賊衆戰歿於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表善徳善徳滿洲鑲黄旗人姓𤓰勒佳氏世居酸泥地方由前鋒委署筆帖式承襲佐領兼騎都尉乾隆二十二年厄魯特賊衆刼掠臺站善徳被害賞卹如例明徳明徳滿洲鑲黄旗人姓𤓰勒佳氏世居東海窪爾凱瓢地方由前鋒補藍翎授前鋒校隨征金川得功牌一於乾隆二十二年出師西路在科什圖軍臺遇賊戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表雅濟保雅濟保滿洲鑲黄旗人姓白佳氏由前鋒委署筆帖式乾隆二十二年厄魯特賊衆刼掠臺站雅濟保被害賞卹如例素齡阿素齡阿滿洲鑲黄旗人姓伊塔拉氏任健鋭營副䕶軍校隨㕘賛大臣明瑞於乾隆二十二年六月在哈什地方與賊阿布噶斯哈坦等戰歿賞卹如例徳芬徳芬滿洲鑲黄旗人姓𤓰勒佳氏世居酸泥地方由健鋭營前鋒委署筆帖式乾隆二十二年厄魯特賊衆刼掠臺站徳芬被害照陣亡例減半議卹賞銀一百兩佛爾慶額佛爾慶額滿洲鑲黄旗人姓郭固爾氏世居黒龍江由親軍補藍翎侍衛陞三等侍衛乾隆十九年出兵西路二十三年四月二十一日在布空郭爾地方與厄魯特賊衆力戰歿於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表寧古里寜古里滿洲鑲黄旗人姓富察氏世居吉林由䕶軍三等侍衛陞二等侍衛乾隆二十年派徃軍營二十三年十月隨將軍兆恵往𠞰葉爾羗與波羅泥都霍集占力戰歿於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表福錫爾福錫爾滿洲鑲黄旗人姓富察氏世居黑龍江由空翎補三等侍衛乾隆十九年十二月十四日前往軍營二十三年四月二十一日隨副都統唐喀禄在布空郭爾地方遇賊力戰殁於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表伊靈阿伊靈阿滿洲鑲黄旗人姓莫爾哲勒氏世居黒龍江由副長委署營總乾隆十九年隨副都統三格隊出師伊犂著有勞績二十三年十月十三日隨總兵髙天喜督修喀拉烏蘇河突遇回衆蟻集偕總兵等戰殁於陣賞卹如例璊綽爾圖璊綽爾圖滿洲鑲黄旗人姓薩瑪爾吉氏世居黒龍江由護軍授空翎侍衛洊厯二等侍衛出征金川奏凱有功乾隆二十三年隨將軍兆恵征𠞰波羅泥都霍集占於十月十三日進取沙拉斯逰牧途遇回衆截戰歿於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表特通額特通額滿洲鑲黄旗人姓鈕祜禄氏世居長白山襲子爵授三等侍衛乾隆二十二年出師西路二十三年在葉爾羗與霍集占戰歿奉特㫖照頭等侍衛議叙恩賜雲騎尉世職承襲詳見世職表體竒圖體竒圖滿洲鑲黄旗人姓郭固爾氏世居黒龍江由䕶軍授藍翎侍衛陞三等侍衛乾隆二十年出兵西路二十四年奉㫖撤回四月初六日途次為逆回賊衆所害賞卹如例恩賜雲騎尉世職承襲詳見世職表薩哈禪薩哈禪滿洲鑲黄旗人姓竒他拉氏世居吉林由前鋒授前鋒校署前鋒㕘領乾隆二十二年出師西路二十四年閏六月二十八日隨㕘賛大臣明瑞追𠞰波羅泥都霍集占於霍斯庫魯克山戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表阿南保阿南保滿洲鑲黄旗人姓尼瑪察氏世居吉林地方由前鋒授空翎乾隆二十二年出師西路二十四年五月二十四日隨㕘賛大臣明瑞追波羅泥都霍集占於霍斯庫魯克山戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表布特訥布特訥滿洲鑲黄旗人姓布佳氏世居黒龍江由前鋒授前鋒校乾隆二十二年出師西路二十四年閏六月二十八日隨㕘贊大臣明瑞追𠞰波羅泥都霍集占至霍斯庫魯克山戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表科凌阿科凌阿滿洲鑲黄旗人姓張佳氏世居長白山漳河地方由䕶軍授護軍校署前鋒㕘領乾隆二十二年出師西路二十四年正月在呼爾璊地方與逆回霍集占力戰歿於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表伊三泰伊三泰滿洲鑲黄旗人姓富察氏世居沙吉地方任前鋒藍翎長乾隆二十二年出師北路二十四年閏六月二十八日隨㕘賛大臣明瑞追𠞰逆回至霍斯庫魯克山戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表圖秉阿圖秉阿滿洲鑲黄旗人姓薩克達氏世居薩克達地方由䕶軍補藍翎頭目陞驍騎校乾隆二十三年出師北路二十四年閏六月二十八日隨㕘賛大臣明瑞追𠞰逆回至霍斯庫魯克山戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表丹泰丹泰滿洲正黄旗人官三等侍衛乾隆十三年出師金川隨提督岳鍾琪進攻塔髙山梁時賊於石城之外竪立木城週遭深塹匿賊其中潛放鳥鎗敗則從地道遁復時出其不意憑城以禦我師十一月二十一日夜半官兵分五路並攻火器齊發斃賊數十人於壕餘賊遁入木城丹泰督兵踰壕直逼木城射賊三人矢盡揮刀力戰中鎗死賞卹如例恩賜雲騎尉世職承襲詳見世職表七保住七保住滿洲正黄旗人姓武扎氏世居盛京任前鋒校乾隆二十年隨定北將軍班第駐守伊犂八月阿睦爾撒納叛七保住與逆黨力戰重傷病殁賞卹如例恩廕八品監生達永達永滿洲正黄旗人姓完顔氏世居吉林地方在尚虞處行走授空翎乾隆二十年隨征西路於伊犂地方戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表誥里善誥里善滿洲正黄旗人世居黒龍江補護軍空翎乾隆二十年隨將軍班第進𠞰伊犂追躡達瓦齊戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表阿濟布阿濟布滿洲正黄旗人姓董鄂氏世居黒龍江補前鋒空翎乾隆二十年隨將軍班第進𠞰伊犂追躡達瓦齊歿於陣賞卹如例達永阿達永阿滿洲正黄旗人由䕶軍奨賞藍翎乾隆二十年隨將軍班第等駐守伊犂八月二十四日為逆黨克什木巴朗所害賞卹如例鄂隆阿鄂隆阿滿洲正黄旗人授前鋒校乾隆二十年阿睦爾撒納叛逃逆黨刼掠臺站鄂隆阿力戰歿於陣賞卹如例岱青阿岱青阿滿洲正黄旗人姓納拉氏世居徳爾吉霍屯業和地方乾隆元年由䕶軍授護軍校十五年轉健鋭營前鋒校十六年陞副前鋒㕘領十九年派往西路軍營在巴里坤伊犂等處委署管理臺站翼長二十一年十一月於布爾哈齊遇賊被害賞卹如例木克木克滿洲正黄旗人姓納喇氏前鋒校署防禦乾隆二十一年九月隨副都統阿敏道招降逆回為霍集占計誘被害賞卹如例恩賜雲騎尉世職承襲詳見世職表布英克布英克滿洲正黄旗人姓那拉氏以前鋒校委署防禦乾隆二十一年隨副都統阿敏道往回部議事遂為所害賞卹如例恩賜雲騎尉世職承襲詳見世職表老格老格滿洲正黄旗人姓伊爾根覺羅氏世居佛阿拉地方授右衛駐防驍騎校乾隆二十一年從征北路於和爾滚地方擊賊歿於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表成明成明滿洲正黄旗人姓聶格氏世居輝發地方由䕶軍放健鋭營前鋒委署筆帖式派往西路出征乾隆二十一年二月在烏塔穆庫爾地方與賊接戰歿於陣賞卹如例恩賜雲騎尉世職無子給伊妻半俸嘉虎嘉虎滿洲正黄旗人委署驍騎校乾隆二十一年將軍兆恵駐伊犂令隨副都統阿敏道往葉爾羗喀什噶爾招降逆回霍集占計誘拘之抵庫車被害賞卹如例羅查羅查滿洲正黄旗人由前鋒委署筆帖式乾隆二十一年隨征西路奉令駐防軍臺遇賊刼掠戰歿賞卹如例佟保佟保滿洲正黄旗人由前鋒授筆帖式乾隆二十一年奉差解送策楞玉保中途遇賊截戰被害賞卹如例徳七保徳七保滿洲正黄旗人姓烏蘇氏世居吉林地方任藍翎侍衛乾隆二十年隨定邊右副將軍成衮扎布出師西路二十二年六月二十三日奉差往霍通地方遇賊被擄死之賞卹如例恩賜雲騎尉世職承襲詳見世職表素靈阿素靈阿滿洲正黄旗人姓伊拉里氏世居哈拉岷地方任健鋭營前鋒校乾隆二十二年六月隨㕘賛大臣眀瑞於阿巴雅達巴罕擊賊殁於陣賞卹如例巴寧阿巴寧阿滿洲正黄旗人姓覺爾察氏世居長白山由親軍校洊厯三等侍衛轉二等侍衛尋授察哈爾㳺牧處總管隨征西路乾隆二十二年八月十八日於博羅齊地方征𠞰厄魯特賊衆戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表富爾泰富爾泰滿洲正黄旗人充空翎什長派往西路軍營乾隆二十三年四月隨巴圖魯侍衛馬昌於濟爾瑪塔戰歿賞卹如例恩賜雲騎尉世職承襲詳見世職表卓隆阿卓隆阿滿洲正黄旗人姓巴雅拉氏任前鋒校派往西路軍營乾隆二十三年四月隨巴圖魯侍衛馬昌與賊戰於濟爾瑪塔歿於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表策臣策臣滿洲正黄旗人世居活克圖吉地方由䕶軍授前鋒校隨征西路乾隆二