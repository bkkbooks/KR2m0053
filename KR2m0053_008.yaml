front:
  text: 欽定四庫全書欽定八旗通志卷首之六天章六皇上御製文
  hash: sha256:e94c5c78d33cd41272042d35e81a75329bcf5fc91673a58f42553aea9ab3ae86
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_008-1a, image: WYG0664/WYG0664-0113c.png}
body:
  text: 八旗姓氏通譜序我祖宗誕膺天命勃興東土德綏威讋奄甸萬姓維時龍從鳯附之衆雲合響應輻輳鱗集強者率屬歸誠弱者舉屬內附我祖宗建師設長以蒞之分旗𨽻屬以别之厥有熊羆之士不二心之臣效命疆場建謀帷幄親以肺腑重以婚姻酬以爵命逮入關定鼎或聚居遼左或散處燕畿錫之土田爰及苗裔至於今百五六十年生聚蕃衍時萬時億纍朝休養煦植鞠保胥勤越我嘉師咸能永世以滋大朕惟祖宗德澤之深不可不繼修令緒益綿延惇固於無疆重慮物阜且博代序日逺族姓日繁不為之明章統系俾知世德所自將罔克念先人之勤無以光昭前烈爰發金匱石室之藏徴載籍稽圗譜考其入我朝來得姓所始表之以地系之以名官階勳績綴為小傳勳舊戚畹以及庶姓釐然備具秩然有條與國史相為表裏昔周小史定繫世辨昭穆左氏內外傳言天子建德因生賜姓胙土命氏而司商吹律以定姓名蓋萬物本乎天人本乎祖木有根而枝附焉水有源而流出焉譜牒者所以聫人情之渙而維舊俗之漓不可忽也相昔先民遺風敦朴不徒以俗望相髙是書之作非如魏晉隋唐譜牒之學炫博聞而廣附會以膏粱閥閲為尚也書曰古我先王暨乃祖乃父胥及逸勤又曰惟乃祖乃父世篤忠貞服勞王家纘乃舊服無忝祖考前之人既以忠實勤勞覆幬其後嗣凡兹食舊德而服先疇者其何以無隳厥緒書亦曰率乃祖考之攸行昭乃辟之有義是則朕所厚望也夫新刻稽古齋文集序吾弟和碩和親王所著序論詩賦雜文曰稽古齋文集者凡若干卷編次於雍正八年秋越今年夏將以授梓來請豫書舊所為序辨諸卷首蓋去作序時忽忽十有七年矣豫與王幼同學同課習為詩古文詞當是時侍奉皇考膝下優遊書府日寢饋於經史文字中世網塵務毫髮不以嬰其心吾兩人者相觀以善交相勉相得無間如是者垂二十年天倫之樂無過於是集中所載大都至性所呈流溢豪素之表讀其辭可想見其為人也顧豫與王同時訂定詩文豫以乾隆元年勉從內廷諸臣之請刋布樂善堂文集迄今十有一年王始出是編命梓其遲回慎重不自滿假謙德雅懷足為師法是則豫之所深愧而嘉歎為不可及者夫抑豫重有感者豫自踐阼以來萬幾在御惟日兢兢馭朽臨淵未足為喻雖結習未忘時亦寄懷翰墨求如曩時之暢情專意上下古今流連陶泳其為樂既不可復得而王亦典旗務領內府亮采有邦非復書齋稽古之舊娛意斯文者蓋亦希矣豫每循覽舊作俯仰疇昔未嘗不為之撫卷三歎故於王之來請非僅僅重録原序所可盡其意輒復為序之如此王之年日增德日進文日多異時有二集三集者出豫當以是為例一一為王序之惇敘殿柏梁體聫句詩序乾隆丙寅秋八月式宴王公宗室於瀛臺之惇敘殿法皇祖也惟時朕諸叔父列王爵者四人皇弟封王者二人皇子三人宗室王公有爵者三十二人念我羣從子姪孫姓之同出自皇祖者或俟封或爵不至與宴之列十年以來未舉和會之典親親之誼踈焉則亦命入今日之座凡六十有二人其以事故是日未至者復五十餘人於戲自黃虞以來有大德者之得其位得其祿得其名夀如我皇祖者其誰耶即子姪之繁衍雖文王不得尚之使目前之振振揖揖我皇祖皇考式臨式憑豫與諸弟兄子姪孫姓稱觴獻夀於其間其愈悅鼓舞又當何如歡極而戚固情之所必至也然今日之宴會我皇祖皇考實式臨之實式憑之諸伯叔父自當以豫言為不謬也則又灑然以怡焉昔漢武帝柏梁之宴同姓者惟梁王武及宗正安國而已其餘皆羣臣然尚以此留詩唐明皇改集仙殿為集賢籲俊之義尚矣而周親未與亦闕典也朕今易崇雅為惇敘以紀今日之事復倡為首句以俟衆作之成凡今兹之掞藻得句者皆我皇祖皇考遺教之所垂也又何必舉金谷之例乎紫光閣五十功臣像贊有序西師之役賴天佑乘時運資衆力拮挶擘畫幸底厥績固非豫一人所敢逆料敢期必也然稍可以謝衆論愜深衷者無他則以賞罰信而應機速耳語云日中必熭操刀必割言應機宜速也書曰罪疑惟輕功疑惟重言賞罰宜信也機之來發於無窮之源而應以萬變之極蓋難言之若夫信賞罰似非難事而亦有所難者則以不能因物付物有所容心於其間耳且罪疑而後從輕若不疑而亦從輕則偷生者何懼焉功不疑而從重其理固當然涉疑而屢從重則冒賞者生心而真功反有向隅者矣是知疑不可也夫不疑而功惟真功賞斯重焉罪惟真罪罰斯必焉則捨命灰軀冒矢石投鋒鏑之倫孰不勸以懲乎兹者事定功成寫諸功臣像於紫光閣朕親御丹鉛各系以贊不過譽不尚藻惟就諸臣實事録之並闡其義如右雲臺二十有八凌煙閣二十有四而此五十人者則以國家中外一統宣力者衆然此猶舉其尤赫者若夫斬將搴旗建一績致一命者亦不忍其泯滅無聞將亦圖其形而命儒臣綴辭焉大學士一等忠勇公傅恆世胄元臣與國休戚早年金川亦建殊績定䇿西師惟汝豫同鄼侯不戰宜居首功定邉將軍一等武毅謀勇公户部尚書兆惠濟爾哈朗喀喇烏蘇兩畨襲迫均保無虞以智濟險以誠感衆卓哉崇勳闢我提封原定北將軍一等誠勇公兵部尚書班第元戎率師平定伊犁而何阿逆叛亂乘危變出不期投軀西漠故里櫬歸痛哉酹酌原靖逆將軍三等義烈公工部尚書納木扎爾我懷賢勞命將往代正值黑水猖獗鼠輩以二百衆陷萬賊中因緣徇節勇濟以忠定邉右副將軍一等靖逺成勇侯理藩院尚書富德古云福將信有其言所遇均吉勇冠軍門不寧一勇兼善於謀吉林拔萃特賜封侯原大學士三等忠勤伯陕甘總督黃廷桂外任封疆內司綸綍俾理儲胥經權弗詘殫誠盡智事協豫心未同凱宴痛惜曷任參贊大臣工部尚書舒赫德屢授重寄亦屢左遷厲厥意懦䇿厥材賢白衣白水聞黑水信安衆進援爵秩重晉參贊大臣一等果毅公兵部尚書阿里衮富德入援次呼爾璊趲行戈壁馬不進焉以馬濟軍敵營夜襲同事建績曰鄂博什原參贊大臣三等襄勤伯總督鄂容安世臣知書料善論兵惜弗通語遂弗燭情變起倉卒力戰命畢用違其材實豫之失參贊大臣一等承恩毅勇公户部侍郎副都統明瑞椒室懿親年少志雄謂可造就俾學從戎獨出獨入既忠且壯屢立宏勳愜豫所望參贊大臣工部侍郎副都統阿桂阿克敦子性頗捷敏力請從戎宜哉惟允身不勝衣心可干城楚材繼出為國之楨原參贊大臣三等子戶部侍郎副都統三泰率二百人共詣軍營臨敵而退寧謂忠誠如早聞信何致殞身不前不後失二賢臣原參贊大臣前鋒統領騎都尉又雲騎尉鄂實其兄徇節其弟忍使欲報兄讐固請不已黑水之挫復以捐身超雪前罪賞延後昆領隊大臣內大臣博爾奔察矍鑠請行索倫巨擘挽五石弓尚能殺賊如鷙之擊不留飛鳥馬援來歸殊恩榮老領隊大臣副都統塔什巴圖魯端濟布將軍黑水先衆徑渡固營待軍實端濟布衆寡稍挫倉卒周防奪回人馬勇且謀長領隊大臣護軍統領愛隆阿將門傑種拍張撫髀受將軍檄力戰全歸整師再進賈勇陷堅弟巴靈阿盡節軀捐領隊大臣前鋒統領墨爾根巴圖魯瑪瑺侍衛從征竒功屢立雖賊萬衆單騎直入陷陳馬仆距躍彎弓賊人咋舌稱天上雄領隊大臣內大臣副都統巴圖濟爾噶爾都爾伯特部中傑驍嘉其心直授職本朝凡與交戰義弗返顧師濟和闐不孤恩遇散秩大臣穆爾德木圖巴圖魯齊凌扎布旗籍蒙古偏校從軍殺賊則奮鶻入鴉羣與噶布舒分守和闐保衆集事且有謀焉散秩大臣哈坦巴圖魯噶布舒躍馬抨弧先鋒鏖陳入俄羅斯得阿逆信和闐既定論功䇿勳衣錦歸籍散秩大臣副都統噶畢雅圖巴圖魯額爾登額軍門統事諸務勤宣亦能力戰突將無前入拔達山索逆􅉰馘曉諭殊方是其偉績內大臣鄂齊爾前無堅對後無返思持矟一呼千賊披靡揚揚英氣洸洸偉身與薩拉爾蓋同部人副都統鄂博什索倫營總乙亥出師老而益壯頗識戎機厄魯回部胥聞其名聳身馬上如擊兔鷹副都統圖布巴圖魯溫布生不知懼戰不知退亦不受傷銅額鐵背弓可擔水箭如鍬鏵溫侯名布是耶非耶副都統克特爾克巴圖魯由屯本射生手狼不暇走以之殺賊如探囊取竒功屢建亦因閲厯世職崇階酬其勞績原副都統騎都尉又一雲騎尉三格渾齊潛遁疏防降謫從軍贖罪每戰必力黑水殞命豁罪論功圖像紫光表忠無窮原頭等侍衛舒布圖鎧巴圖魯竒徹布包沁之叛千賊一身賜巴圖魯昉乎斯人後復屢戰喪哈薩克始終於是曷勝悼惜頭等侍衛博克巴圖魯老格哈薩錫拉呌詉稱亂趨羊適過以計解難後復從軍屢戰屢進單馬衝突獅子奮迅頭等侍衛墨爾根巴圖魯達克塔納庫車圍攻命守要害偵賊來援周防以待賊却乃前賊前乃却引至大隊是鞣是膊頭等侍衛薩穆坦厄魯劫運構釁互戕識時拔出致力疆場首被掄選往拔達山譯語曉譬共索馘還原二等侍衛固濟爾巴圖魯雲騎尉璊綽爾圖捉生以出被回所遮衆寡不敵矢盡堪嗟罵賊以死雖死猶生時共事者達什䇿凌二等侍衛哈朗圭巴圖魯塔瑪鼐聞戰則喜無生有死五易馬進終弗却視身不及膽心則乏謀用以衝陳勝五百牛原二等侍衛哈布台巴圖魯富錫爾三巴圖魯於中之一要遮色楞忽墮其術不及彎弓白刃揮霍猶斬數人之死弗却二等侍衛額爾克巴圖魯海蘭察烈風掃枯迅其奚難亦賴衆傑摧敵攻堅於塔巴台射巴雅爾是其偉績勇鮮倫比原二等侍衛雲騎尉富紹黑水築柵未畢賊侵蜂屯蟻雜攘攘林林持將軍令意氣昻藏來往慰衆銃殞堪傷三等侍衛賽音博勒克巴圖魯扎竒圖狗盜雞鳴孟嘗不棄竊馬何害用人之際間道達檄首遴斯人雙雄比肩衝出萬軍三等侍衛什倫哈什哈巴圖魯阿爾丹察騎二駿馬縱兩神鶻回如瓦雀伏不敢發共扎竒圖左旋右抽卒致軍信效力獨優三等侍衛卓里克圖巴圖魯五十保軍檄再發更掄五英馳驛逾月迅至北京捨身報國不可數算舉其尤者圖形作贊謹案五十功臣贊內䇿布登扎布色布騰巴爾珠爾扎拉豐阿羅卜藏多爾濟係外藩豆斌髙天喜係漢人薩拉爾阿玉錫達什䇿凌係額魯特額敏和卓霍集斯鄂對係回部故惟恭録傅恆等三十八首命追復睿親王封爵及復開國有功諸王原號並豫配享諭睦親彰善王政宜先繼絶昭屈聖經所重朕自臨御以來間日恭閲列祖列宗實録一册因得備知祖宗創業艱難及爾時懿親藎臣勤勞佐命底定中原偉伐殊功實為從古所未有而當時䇿勛錫爵榮號崇封所以酬答者本從優厚逮其後或有及身緣事旋被降削者或有子孫承襲更易封號者迄今平情凖理若不為之溯述闡揚追復舊恩於心實有所未愜因念睿親王多爾衮當開國時首先統衆入關掃蕩賊氛肅清宫禁分遣諸王追殱流冦撫定疆陲一切創制規模皆所經畫尋即奉迎世祖車駕入都定國開基以成一統之業厥功最著顧以攝政有年威福不無専擅諸王大臣未免畏而忌之遂致殁後為蘇克薩哈等所搆授欵於其屬人首告誣以謀逆經諸王定罪除封其時我世祖章皇帝實尚在沖齡未嘗親政也夫睿王果萌異志則方兵權在握何事不可為且吳三桂之所迎勝國舊臣之所奉止知有攝政王耳其勢更無難號召即我滿洲大臣心存忠篤者自必不肯順從然彼誠圖為不軌無難潛鋤異已以逞逆謀乃不於彼時因利乘便直至身後以斂服僭用明黃龍衮指為覬覦之證有是情理乎况英親王阿濟格其同母兄也於追捕流賊回京時誆報李自成身死且不候旨班師睿王即遣員斥責其非並免王公等往迎之禮又因阿濟格出征時脅令巡撫李鑑釋免逮問道員及擅至鄂爾多斯土默特取馬令議其罪降為郡王平日辦理政務秉公持正若此是果有叛志無叛志乎又實録載睿王集諸王貝勒貝子公大臣等遣人傳語曰今觀諸王貝勒大臣但知諂媚於豫未見有尊崇皇上者豫豈能容此昔太宗升遐嗣君未立英王豫王跪請豫即尊位豫曰爾等若如此言豫當自刎誓死不從遂奉皇上纘承大統似此危疑之時以豫為君豫尚不可今乃不敬皇上而媚豫豫何能容自今以後有盡忠皇上者豫用之愛之其不盡忠不敬事皇上者雖媚豫豫不爾宥也且云太宗恩育豫躬所以特異於諸子弟者蓋深信諸子之成立惟豫能成立之每覽實録至此未嘗不為之墮淚則王之立心行事實能篤忠藎感厚恩深明君臣大義尤為史册所罕覯使王彼時如宋太宗之處心積慮則豈肯復以死固辭而不為邪説搖惑耶乃令王之身後久抱不白之寃於泉壤心甚憫焉假令當時王之逆迹稍有左驗削除之罪果出於我世祖聖裁朕亦寧敢復翻成案乃實由宵小姦謀搆成寃獄而王之政績載在實録者皆有大功而無叛逆之迹又豈可不為之昭雪乎昨於乾隆三十八年因其塋域久荒特敕量為繕葺並準其近支以時祭掃然以王之生平盡心王室尚不足以慰彼成勞朕以為應加恩復還睿親王封號追諡曰忠補入玉牒並令補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭其原傳尚有未經詳細者並交國史館恭照實録所載敬謹輯録添補宗室王公功績傳用昭彰闡宗勛至意又如豫親王多鐸從睿親王入關肅清京輦即率師西平流寇南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勳績超邁等倫自應世胙原封以彰殊眷豈可以風影微眚輒加貶易乎朕以為應復其原封又諸王中披堅執鋭拓土開疆共成一統之業者如禮親王代善後改封康親王鄭親王濟爾哈朗後改封簡親王肅親王豪格後改封顯親王克勤郡王嶽託後改封平郡王當時俱懋著壯猷克昭駿烈載在宗盟今其子孫所襲均非始封之名外人不知妄疑宗藩當國家締造時有大勳勞而後裔均不得長延帶礪似為闕典即其本支承家襲慶以去祖漸逺幾忘其先世錫封之由弗克顧名奮效所係於宗室子孫者甚重况功臣世封內如揚古利之英誠公費英東之信勇公額亦都之果毅公俱以本號相傳其子孫承襲者各能溯勛閥以宣偉績不失故家喬木之遺今以親賢世胄竟改其初封嘉號何以垂詒奕祀示酬庸追本之義乎朕以為應復其原號著交軍機大臣會同宗人府悉心妥議具奏其餘宗室諸王貝勒等如有顯著功績其封爵後經降奪者除本人身罹重愆自不當復邀優典若係承襲之子孫獲咎議處者僅當斥其本身而不當追貶其祖宗世爵方為平允亦著一併會查議奏再配享太廟諸王僅有通達武功慧哲宣獻四郡王其太祖太宗世祖時戮力行間櫛風沐雨之親藩如向所舉數人皆未之及蓋由當時議禮諸王各懷私意遂爾沒其勛伐不得同侑馨香豈足以彰公道所有睿親王禮親王鄭親王豫親王肅親王克勤郡王俱著補置牌位配享太廟用以妥功宗而昭渥典至通達郡王係顯祖之子武功慧哲宣獻三郡王係景祖之子當時雖身與配享第以三郡王宗支已在覺羅宗室王公表傳內亦未立通達郡王傳國史傳又以屬在宗潢令此四王無所附麗亦覺缺典著交內閣國史館補為立傳通達郡王入於宗室武功等三郡王列於國史諸大臣傳之前或當時紀載簡少功績無由稽核不拘詳略各立一傳以徴信實增訂清文鑑序稽古語言文字之傳不能不隨方隨時代為變易將欲觀其會通惟音義兩端為之樞管獨是施之於翻譯則以字之不得其音而舛者亦以字之強索其義而逾舛嚮評通鑑輯覽糾前史譯本失真則有校正金元國語解之命及製西域同文志序諸作復連類而引伸之兹增訂清文鑑告竣並為鬯厥指以詔來者夫字之不得其音者如明安之為猛安穆昆之為謀克猶云對字未叶耳甚者乃因字法以寓褒譏如金史書烏珠為兀术貝勒為勃極烈或為孛厪者是也且同一蒙古人名於膺世爵者則書羅卜藏於隸讞牘者則書羅卜贓沿流至今未改不綦誕乎至以字文強索其義者如蒙古語鄂博特堆砌之統詞而曲説者以鄂為嵯峩之峩博為軷祭之軷自翊語出經傳究之求其義而不得遂并其音而失之不愈盩乎蓋對音本無義也即如國語稱天曰阿卜喀蒙古語則曰騰格里西畨語則曰那木喀回語則曰阿思滿以漢文求之皆無義之可索且以漢文天字設用國書合音則字當云梯煙夫梯煙寧有義乎豈梯必梯磴之梯而煙必煙霄之煙乎穿鑿者又將謬解為梯煙而上為天之義可乎蓋嘗推而論之前代之主其不暇兼治漢文者既一任夫承訛襲謬而莫之正而兼治漢文者乃轉為漢文所牽掣而不克博訂方言之異精研聲律之元譬諸以水濟水誰能食之非虛語也洪惟皇祖聖祖仁皇帝神靈天亶制度考文於列祖創垂國書廣大精微貫串賅洽御定清文鑑全函折衷大備惟當時編纂諸臣依國語分類排纂未列三合切音漢字注中間採經傳成語以佐訓詁日久易啓傅會穿鑿之習朕志切紹聞指授館臣詳加𣙜核每門首著國語旁附漢字對音或一字或二合或三合切音俾等量者不爽苗髮而字之淆於不得其音者鮮矣詮釋具以日用常言期人共曉其俗解托拾陳編章句及以之乎者也為文者悉汰之而字之汨於強索其義者抑又鮮矣綜計續入新定國語五千餘句若古官名冠服器用鳥獸花果等有禆參考者别為補編系之卷末庶幾嘉與我子孫臣民可以同文可以傳世而行逺是為序滿珠蒙古漢字三合切音清文鑑序向既增訂清文鑑序而行之與夫穿鑿字法謬寓褒譏曲解方言傅會漢語一切務竒求勝亦既辨之詳矣兹三合切音清文鑑書成司事者以序為請夫既有前序則此可以不必重為然前書祇載國語漢語而未及蒙古此書乃並載蒙古語所為異於前書者是不可以不闡其義我國家自太祖太宗以來近邉諸蒙古部落久為世臣而至今則喀爾喀青海及準噶爾之四衛拉特前後歸順蓋無一蒙古之非我臣矣諸部語言音韻剛柔雖略殊而大段則一即國語雖與蒙古語異而亦有一二相同者朕即位初以為諸外藩嵗來朝不可不通其語遂習之不數年而畢能之至今則曲盡其道矣侵尋而至於唐古特語又侵尋而至於回語亦既習之亦既能之既可以為餘暇之消遣復足以聨中外之性情因悟天下之語萬殊天下之理則一無不戴天而履地無不是是而非非無不尊君上而孝父母無不賢賢人而惡小人彼其於語言文字中謬存我是彼非入者主之出者奴之不亦仰而唾空終於自汚其面哉故向有校正金元國語解之命及製西域同文志一是義也雖然豫以為亦無足深怪作金元史者之讕文何則彼一類之人尚有越人視秦人肥瘠之言而况非其類者乎又况彼實不解其語言音義乎則又安能保千秋萬世後不解此書者之不又將如作金元國史者之其人乎前書之序並命載於後庶幾並觀以互相發明也平定金川五十功臣像贊有序金川既平定圖功臣像於紫光閣序而贊之一依伊犂回部之例其故其義前序言之詳矣兹復何言而不能無言者誠以諸臣宣力攄猷或定策於樽俎之間或衝堅於石矢之隊且捐軀盡節者指不勝屈寧忍令泯沒無聞而弗夀厥儀表彰厥名聲者哉夫用兵蓋難言之矣無應機之謀乏識人之鑒而徒俾推轂是藉冦兵而齎盜糧也溫福之僨車朕深引以為愧而阿桂終能集事朕又略因解嘲至於午夜廢寢當食忘餐吁亦勞矣夫無此勞而徒曰有兵有將汝其為我征伐則真窮兵黷武而付其天下之成敗於不問者朕弗為也觀此序者或諒朕非窮兵黷武之為幸何如之冀何如之而朕之子孫當凛佳兵之誡茍不得已而用之必深體此序之意弗以冒昧行焉則我大清億萬年無疆之休基於是矣前圖逮今甫十六載事故過去者即十分之九為之愴然而後生疊奮繼前人之光為國家之用林林源源以出因又為之慶矣其兩被圖形如阿桂之倫豈非德業之光輝人臣之厚幸而較衛霍英鄂之流更為榮遇超越乎定西將軍一等誠謀英勇公協辦大學士吏部尚書阿桂西師參贊經厯多年兹為巨擘掄掌兵權西師之役阿桂為參贊大臣著有勞績因其嫻習軍務特授為定西將軍統兵𠞰兩金川阿桂承命以來籌畫盡心不憚艱險用能掃蕩賊巢俘擒逆黨大勳克集實為首功錫爵圖形優加章服懋昭酬庸之典誠而有謀英弗恃勇集衆出竒成勳克鞏定邊右副將軍一等果毅繼勇公加一等子户部尚書豐升額宜喜弗動癸巳夏因促浸賊人勾通趲拉降番潛出滋擾時豐升額駐兵宜喜諭令就近赴大板昭堵勦豐升額得旨時已知有木果木之事又未得阿桂軍營信息恐將綽斯甲布一路兵力分單徒去無益竟未移兵前往奏至嘉其有識特降旨奬勵之定見識機後副西路親勵戎衣遜克爾宗督兵進取國之藎臣勇繼乃祖遜克爾宗地最險要且在我軍之後豐升額督兵進攻或斫寨而入或梯牆而進遂爾得碉殱賊嘉其勇敢無愧乃祖巴圖魯公額亦都之風因於所襲公爵加繼勇二字以旌之定邊右副將軍一等襄勇伯成都將軍明亮獨統一路頗有斬獲姻戚少年世承恩澤明亮為親孝賢皇后姪察其少年誠篤俾習軍旅命為副將軍在南路統兵隨即攻取馬尼繼復移兵襲取宜喜山梁遂于北路進勦尋克日旁沙爾尼一𢃄亦屢著功績建績抒忱是用褒嘉俾司將印永靖筰巴兩金川既平於其地設鎮安營駐守因授明亮為成都將軍以控馭之大學士舒赫德土爾扈特安集邊城辛卯夏土爾扈特汗渥巴錫等率全部歸順特調舒赫德為伊犂將軍經理其事安措極為妥協旋授為大學士甲午秋命統兵勦捕山東逆匪王倫甫六日而藏事命入綸閣速定臨清金川之役未悉端委書旨承行時亦贊理兵部尚書一等忠勇公和碩額駙福隆安父定復叛子嘗愧之戊辰金川之役大學士傅恆前往經略時以莎羅奔郎卡畏罪投誠遂奏聞受降未十年郎卡即滋擾鄰封其子索諾木益偝恩反噬實深悔前此之姑息非一舉而殄滅之不能永除後患福隆安因此屢懇赴軍營自效皆未允所請留之禁近俾習贊軍務是用稽首躬請出師留於左右俾習規畫頗有嘉謀協豫廣益原參贊大臣固倫額駙贈和碩親王色布騰巴爾珠爾伊犂宣力屢立戰功金川參贊仍勵勇忠抱病軍營弗令奏聞惜竟不起未觀成勳參贊大臣一等超勇侯都統海蘭察射巴雅爾超授侍衛洊至都統參畫軍計堅碉險寨無不先登勇而有謀封侯實應參贊大臣一等嫻勇男護軍統領副都統額森特虎鎗隨圍覺與衆殊命往勦賊攘臂以愈閲厯既多遂參謀議獨當一靣亦復集事參贊大臣護軍統領舒常八旗子弟總屬世臣菁莪造就命以從軍勇弗搴旗智堪入幕北路贊機時資其略領隊大臣一等承恩武勇公加一等男都統奎林兄終王事至今為恨奎林乃毅勇公明瑞親弟皆兵孝賢皇后親姪明瑞為將軍督征勦緬匪陳亡朕每以為恨不忍更命從軍乃奎林力請不已因許之奮勇屢著功績屢請效力披堅斫陳心源落落膽氣堂堂世家英器是豫所臧領隊大臣三等果勇侯都統和隆武襲父恤職和隆武之父將軍和起征勦凖噶爾時在闢展為莽噶里克等所害議恤豫以世襲子爵和隆武襲之此次征勦金川不意其勇敢超衆若此因晉封侯爵少年老成囊錐脫頴竟善用兵略日旁寨獨擅偉勳楚材繼出既憐以欣領隊大臣內大臣都統户部侍郎三等嘉勇男福康安代兄以往繼父而奮福康安福隆安之弟也矜許厪勵王臣之藎登碉奪寨那須蒙甲嘉勇錫名世傳勳業領隊大臣副都統三等奮勇男普爾普父是日磾子非弄兒普爾普之父巴圖濟爾噶爾以都爾伯特部宰桑來降隨征回部於和闐立功仕至都統普爾普臨陳奮勇頗能繼其父志因特賜男爵命往勦賊盡力無遺金戈鐵衣氷山雪窖能入能出敵不敢校領隊大臣荆州將軍輔國公興兆憶當國初創業開基宗室王公宣力率師承平襲慶安享榮華董軍建勳斯為可嘉領隊大臣廣西提督書麟本非習戰遇戰即奮恐孤父名書麟乃大學士髙晉之子偉哉後進功成事定提督鬱林攻則壯志守則小心領隊大臣副都統綽克托巴圖魯三保本射生手獸無跳走以之射賊探囊物取冒險屢進志篤且純受創獨重祿養終身三保在軍營每戰勇往不避矢石因攻甲槖賊寨右臂受鳥鎗傷甚劇久治不瘥憐其臂已殘廢免令入直當差仍留副都統之任俾得祿以贍領隊大臣副都統法福里巴圖魯烏什哈達有足如鑷有手如翼削壁尖峯行無難色領隊奮勇屢克碉堅羌兒畏之若雀遇鸇領隊大臣副都統多布坦巴圖魯瑚尼爾圖木思工噶躍入賊碉督衆鞣膊勇不目逃巴占牽敵俾無遮􅓈畨人望之弗戰辟易領隊大臣副都統扎克博巴圖魯珠爾格德奎林深入賊刃將及發矢斃之險中救急同心合力共集大勳寫圖旌壯惇史流芬領隊大臣副都統咱爾親巴圖魯阿爾都喀咱奎林及和隆武絶地被遮餘勇猶賈曰阿爾都據險牽賊二人乃出其功允特領隊大臣副都統阿爾杭阿巴圖魯阿爾薩朗跬步皆山面前萬仞無著足處攀騰奮迅遂破扎古扎古即扎烏古急呼之則為兩字既翹且英人中獅子實稱其名阿爾薩朗國語謂獅子也領隊大臣副都統穆騰額巴圖魯舒亮率健鋭營訓練有素節制之師五步六步礌䃧叢中鼓勇身先勞而不伐是用稱賢原領隊大臣副都統銜納親巴圖魯科瑪堂堂之陳亦藉出竒潛行僻路附葛踔巇直越峯頂火攻石碉破二百寨色格功髙科瑪于沙壩山率兵潛行攀陟山頂為賊所阻即分兵搶拈色格落喀爾都等處拋入火彈燒賊寨二百餘間領隊大臣副都統銜扎濟克巴圖魯伊蘭保有賊必戰有戰必先率我徑旅攻其中堅志不顧身勇能知義噶占進棧丹格建幟原領隊大臣副都統銜扎爾丹巴圖魯佛倫泰功成一將那保無虞爭前恥後舊風未渝當噶之戰直進身殞使我心惻優恤惟允領隊大臣副都統三等信勇公富興信勇世家志不愧祖富興為信勇公費英東之曽孫以有足疾不能登陟攻戰而駐守要隘則甚得力徒以窳痿艱于步武蠶叢鳥道登進則遲據險守要千軍不移領隊大臣副都統德赫布賊之所恃據碉堅守我之所利拏柵進取知彼知己正以出竒邀隙攢射善手是資原領隊大臣副都統莽喀察索倫善射其中稱最西師建勳紫閣形繪逞其猿臂搜彼蟻封不虞創重歎惜何窮領隊大臣直𨽻天津鎮總兵噶布什海巴圖魯海祿資哩美諾皆樹竒績奪昆色爾攀枝援壁固資衆力率先必親事定酬庸命鎮天津領隊大臣貴州鎮逺鎮總兵僧格巴圖魯敖成甘涼宿將屢立戰功以其驍習俾伐蠻賨于巴布里攻其恃固乘雪拔之有如李訴領隊大臣山西大同鎮總兵巴爾丹巴圖魯官達色連環火攻國之雄器率領得人無往不利及至近碉斫門穴孔大呼直入嘉乃獨勇領隊大臣四川川北鎮總兵賽尚阿巴圖魯成德沈舟側畔鼓棹為難受創復進其心審丹似若而人不勝屈指養育八旗報非虛飾叶領隊大臣陜西固原鎮總兵法福里巴圖魯圖欽保承平日久敢恃內安永憶文子厥有名言嘉我諸臣遇兵則奮竭力敵愾世承家訓原甘肅肅州鎮總兵札親巴圖魯曹順始由偏裨洊至總戎騎牆殺賊受傷捐躬賞延于世為之惜悼季世朱門歌舞以笑領隊大臣陜西興漢鎮總兵三等義烈公保寧父殁王事保寧之父納木札爾以靖逆將軍征剿回部於黑水陳亡恤贈義烈公保寧襲爵因其力請出師遂允之在軍營屢著功績襲爵為公不忘忠藎力請從戎雖屬少年乃如宿將持重戒輕心精膽壯領隊大臣山西太原鎮總兵特成額誰謂世家而多䊵褲後生可畏不忘祖父叶原特成額為果毅公策楞之子其髙祖即巴圖魯公額亦都也是豫所嘉是豫所憐願豫世臣綿此萬年原領隊大臣陜西延綏鎮總兵烏爾納平生若懦戰則倍勇雖屢受傷進不旋踵功成事定賊寨火延沒于弗值實可嗟焉將軍等既平促浸賊巢掃蕩數日後噶喇依寨內忽火起延及火藥局烏爾納督兵往救不意藥轟石飛傷腦而殁為之悼惜因敕部照陳亡例議恤原署福建建寧鎮總兵敦柱披堅破鋭突將無前衆志成城而各力宣威震卭筰拉朽摧枯宜喜已克惜哉捐軀頭等侍衛札卓穆巴巴圖魯額爾特七校護衛無殊衆人及至臨敵其膽包身地道深入木城超躍遂克勒圍厥功允卓頭等侍衛揚達克巴圖魯托爾托保每戰俱前三遇三克勝彼忠嗣王耀武漠北漠北可馬此步而攀氷巘萬仭所以為難二等侍衛拉布凱巴圖魯泰斐英阿一木曷支衆擎易舉嘉我諸臣心同力努人自為戰各有所成攻康薩爾直進賊營二等侍衛崇籛巴圖魯柏凌于戰可觀人之立志或挺而前或退而避受傷雖多其節弗渝如柏凌冬壯矣丈夫原二等侍衛額依巴爾巴圖魯達蘭泰或仰而攻或俯而壓仰以鷹抄俯如馬踏么髍迹遁鬼蜮魂銷追奔逐北處處功髙原二等侍衛善巴巴圖魯薩爾吉岱賊之長技在於善守反而用之拏柵進取滴博蓬婆威名逺服惜哉陳亡於阿穰曲索倫佐領舒克丹巴圖魯特爾惇徹賊之所懼徑弓長箭飛鋒蝟集對則色變索倫捷手射番最多每據要害其功弗磨貴州副將奢特陳巴圖魯興奎黷武豈願詰戎敢忘因弗得已曉夜傍徨良材總總為國宣猷寫圖表績永示千秋謹案金川功臣五十人內于敏中哈國興馬彪馬全均係漢人故惟恭録阿桂等四十六首平定臺灣二十功臣像贊有序近著𠞰滅臺灣逆賊生擒林爽文紀事語以為伊犂回部金川三大事各有専文王倫蘇四十三田五次三事不足薌其功若兹林爽文之𠞰滅介於六者間雖弗稱大事而亦不為小矣故其次三訖未紀勳圖像而兹福康安海蘭察等渡海搜山竟成偉勳靖海疆吁亦勞矣不可湮其功而弗識故於紫光閣紀勳圖像一如向三大事之為然究以一區海濵數月底績故減其百者為五十而朕親製贊五十者為二十餘命文臣擬撰一如上次之式夫用兵豈易事哉昔漢光武有云每一發兵頭鬚為白況豫古稀望八之年鬚鬢早半白而拓土開疆過光武逺甚更有何冀而為佳兵之舉誠以海疆民命不得不發師安靖所為乃應兵非佳兵也然亦因應兵非佳兵幸邀天助順而成功速此豫以感謝鴻貺不可以言語形容而又不能已於言者也昔人有言滿洲兵至萬橫行天下無敵今朕所發巴圖魯侍衛章京等才百人已足以當數千人之勇緑營兵雖多怯而無用兹精選屯練及貴州廣東湖廣兵得近萬人統而用之遂以掃巢穴縳逆首是緑營果無用哉亦在率而行之者為之埋根倡首有以鼓勵之耳若福康安未渡海以前臺灣緑營已共有四萬餘兵何以不能成功則無以率而行之者豈不然哉且臺灣一嵗三收蔗薯更富朕若微有量田加賦之意以致民變天必罪之不能如是成功速也後世子孫當知此意毋信浮論富國之言愛民薄斂明慎用兵庶其恆承天眷耳近日以宫商三百逐章饜飫其義竟如幼年書室學詩之時然彼時但知讀其章句而今則究其義味因思采薇出車諸章乃上之勞下其義正斯為正雅祈父北山諸什乃下之怨上其義變斯為變雅夫上勞下可也下怨上不可也何則下之怨上固在下者不知忠義然亦必在上者又有以致之斯則大不可也我滿洲舊風以不得捐軀國事死於牖下為恥其抱忠知義較祈父北山之怨上為何如是則緑營之多恇怯思家伊古有之無足多怪矣然為上者不可不存采薇出車之意更不可不知祈父北山之苦如其一概不知而但欲開疆擴土是誠佳兵黷武之為望其有成豈非北轅而適越乎故因為功臣圖贊而申其説如此以戒奕葉子孫並戒萬世之用兵者大學士一等誠謀英勇公阿桂戡外守中未恆亮功馳咨軍務志每豫同歸朝襄贊翦逆除凶三登紫閣福厚功崇去嵗在山莊籌辦臺灣軍務其時阿桂留京辦事七月間又命往河上會辦堵築事宜是此次軍務阿桂並未辦理惟間有指示方略諭令閲看覆奏每多意見相同及後報捷之時阿桂甫得差竣回京是一體豫以議敘且以班次在前故列為功臣之首云大學士三等忠襄伯和珅承訓書諭兼通清漢旁午軍書惟明且斷平薩拉爾亦曽督戰賜爵勵忠竟成國幹協辦大學士吏部尚書陜甘總督一等嘉勇公福康安金川領兵已著偉名幾處封疆吏肅政成解圍擒逆能人不能崇封殊錫嘉爾忠誠領侍衛內大臣三等超勇公海蘭察勇弗知書謀勝智士匹馬彎弓賊不敢視欲致活口射勿令死進爵錫服言難盡美工部尚書福長安父兄及已胥國勳親英年習政其心孔純承旨參議有見敬申忠良之報並得圖麟閩浙總督李侍堯川疆入覲命往閩疆戰固老矣謀猷允長渡兵濟餉井井有方不誤軍儲其績孔臧成都將軍法什尚阿巴圖魯雲騎尉鄂輝無前出力屯練之兵將軍鄂輝實率以行覆穴摧壘到處功成勇而有謀覃國之英護軍統領穆騰額巴圖魯雲騎尉舒亮金川之役已為領隊事定功成統軍歸內搜捕逸賊不遺醜輩生致逆渠其能弗昧護軍統領沙爾瑪海巴圖魯三等奮勇男雲騎尉普爾普隨父入都甫十餘嵗既長上聲能勇曉兵有制同救諸羅通路府際先登拔柵圖容兩逮四川松潘鎮總兵奮圖禮巴圖魯穆克登阿斗六里杙排竹為城直斫而入大敗賊兵隴種鹿埵內山遁形搜擒首惡林林衆英四川建昌鎮總兵札敦巴巴圖魯張芝元金川隨征超熊羆旅兹領畨兵以通畨語賊屬生傳賊路嚴禦卒獲生俘厥功允巨臺灣鎮總兵沖傑巴圖魯普吉保攻克笨港本有微功未解諸羅賊衆難通賈勇贖過奮不顧躬扼科仔坑逸賊路窮謹案臺灣二十功臣贊內王杰董誥蔡攀龍梁朝桂許世亨均係漢人穆塔爾係四川土司故惟恭録阿桂等十三首平定廓爾喀十五功臣圖贊有序廓爾喀畏威乞降歸順武成平定功臣效力宜有圖贊例應論爵以軍機大臣為首而大學士阿桂以此畨絶域厯險實異常之勞當以大將軍福康安為首因嘉許之為之序曰武成圖功逮此凡四紫光閣圖功臣像各為之贊自平定西域兩金川臺灣逮此凡四次夫用兵豈易言哉必出於不得已而不出於貪得恃強審時應機既明且斷信賞必罰仍總賴天貺助順捨斯數者未有不見其敗而資窮黷之譏者也伊犂回部金川既受俘蕆事余已不復萌用武之心無何而臺灣叛福康安等渡海𠞰賊不久生擒賊首故此戰圖仍依例以阿桂為首今之廓爾喀又在西藏數千里外絶壁衝天急湍臨峽捨馬單步非福康安海蘭察二人同心鼓勇身先士卒斷不能成此七戰七勝之功首圖其像允合豫心而符衆望也西師金川功臣各百豫親為贊者各五十餘命儒臣為贊各五十以成百數臺灣功臣豫親贊者二十餘命儒臣為贊者三十以成五十數今平定廓爾喀之功臣豫親贊者十五餘命儒臣為贊者十五以成三十數蓋以西師及金川厯年久而擴地廣故人數多臺灣成功速而地非廣故人數次之若廓爾喀則又速於臺灣地雖險而實弗廣也故豫親為贊者不過十五儒臣為贊者亦祗十五然以總數較仍勝凌煙雲臺之所表也此實昊蒼護佑國家祖宗教養所貽賢材接踵為邦家光豫藐躬欽承惟謹盛滿是懼且歸政年近老而畏事遑敢復有他圖哉大學士一等忠鋭嘉勇公兩廣總督福康安百戰久經兩功近成近之險絶前聞未曾七戰七勝度索乘桴舊勳新讓此番聲討廓爾喀福康安身先將士履險臨深無戰不捷大功克蕆其忠貞實邁等倫若以爵論阿桂本應居首而阿桂自以此次未臨行陳奏讓福康安為首功實為公允可嘉遂俞其請嘉許首圖大學士一等誠謀英勇公阿桂七旬以上身體康強從不言功黃圖贊襄威克安久此次用師必大彰國威而後允降庶幾可以久安不致再生事端唐太宗所謂示之必克其和乃固正合朕意福康安固能仰體此意力蕆殊勛而阿桂原有協謀之功亦不可掩曾亦協謀亶一個臣有容休休大學士三等忠襄伯和珅國家用武帷幄絲綸事殊四朝謂漢唐宋明清文漢文蒙古西番頗通大意去嵗用兵之際所有指示機宜每兼用清漢文此外頒給達賴喇嘛及傳諭廓爾喀敕書並兼用蒙古西畨字臣工中通曉西畨字者殊難其人惟和珅承旨書諭俱能辦理秩如勤勞書旨允稱能事原任領侍衛內大臣一等超勇公海蘭察勇而有謀侍衛洊公乙亥征討準噶爾時海蘭察方以索倫馬兵從軍先是輝特台吉巴雅爾率屬來降已封為汗及阿睦爾撒納復叛後巴雅爾旋亦從逆以大兵追急遁入塔爾巴哈台山中海蘭察奮力窮追射之墜馬遂生擒以歸以此立擢為侍衛嗣後每派出兵無不奮勉爭先而料敵策應宛若素嫻韜略者然屢以戰功洊封公爵此次為參贊功成復晉封一等超勇公實為索倫之傑出者矣索倫巨擘黼衣錫龍圖形四畨福祿鮮比旋終於家矜惜無已户部尚書福長安戚畹閥門家國一體兄勤逺征弟贊近理鴻邱之隔樽俎之間無不同心弗稱已上聲人已之已關征廓爾喀之役豫與軍機大臣等籌畫機宜福長安盡心襄贊悉合豫意伊本以國事為重詎稱關己而已哉兵部尚書慶桂所謂故國賴有世臣量去聲材授職非卑逾尊用孟子語本兵習政明代最重本兵之職凡遇軍興悉以委之自中葉以後其君不親政事又無知人之明而肩斯任者率多庸懦腐儒動皆掣肘更恣苞苴此其國事寧復可問近作凱旋兵丁各歸營伍紀事文曾指其失以昭懲戒至我朝用兵惟任將軍參贊相機攻取是以所向無敵而兵部所司不過設驛安頓送往迎回諸事而已元長上聲之子慶桂為尹繼善之子繼善字元長跨灶是乎從前西域用兵惟傅恆與豫一心主必辦之説其時尹繼善為陜甘總督頗不欲用兵此亦習於書生拘守之常談不足以識事機彼時並慮辦理機務非其所長因令黃廷桂調任陜甘專司其事是以西師蕆功伊雖為世臣未得列入戰圖今慶桂以軍機大臣邀恩得此榮遇轉覺跨灶矣圖形始爾工部尚書和琳二庸駐藏諸務推諉俘習渾雅滿泰二人同為駐藏大臣乃平時於廓爾喀之事置若罔聞藏中一切委之噶布倫等任其妄為逮廓爾喀侵擾藏地又不能帶兵征勦轉欲將達賴喇嘛班禪額爾德尼移至內地竟甘心棄置藏地不知是何肺腑因令將伊二人于藏地枷責以為推諉國事者戒選良代之條條有理和珅之弟責難觀成和琳先為御史屢命巡漕於河道漕運頗能認真挑濬督催因悉其才具優長並知為和珅之弟去嵗令往代俘習渾等為駐藏大臣沿途據奏催儧烏拉立定期限嚴申賞罰軍裝火藥源源運送不致遲誤及到藏後辦理糧餉事宜整頓藏中諸務一切井井有條初不料其竟能副朕委任而國家得一良材尤堪慰悅嘉得世臣為國之楨四川總督惠齡和琳督催至藏之西濟嚨以內糧運烏拉専任和琳往來督催可以無誤然亦僅至藏之西界其大兵所到地方之後路亦難兼顧師進賊境繼運留資初命惠齡為四川總督即令同至軍營授為參贊大臣既念大兵深入賊境師行糧隨最關緊要而惠齡於調度既不能如福康安戰陳亦更不如海蘭察用其所長莫若竟以後路糧運専責其成其在拉子地方設法趕運糧石軍械及雇覔商民長運諸務悉為周安並不貪得戰功希冀懋賞此意亦為可嘉餉戒不匱用濟武成功亦懋哉初被圖形原任都統銜護軍統領喇布凱巴圖魯台斐英阿首攻察木既克濟嚨身先士卒奮勇成功遂至帕朗逼甲爾古台斐英阿自察木進兵以後無不身先士卒往來截殺最為奮勇及攻東覺山梁尚用炮轟斃紅衣緑衣賊目其後進攻甲爾古拉復直前射斃紅衣賊目不意中鎗殞軀深為痛惜直進殞身痛惜心楚護軍統領和隆武巴圖魯額勒登保石碉木柵鱗疊賊防勢如捲籜捷似頺牆將軍所示無不領略額勒登保時為翼長司軍前各隊營務及調遣諸事故能領略將軍意指此畨前後七戰率領精兵攻碉奪柵所至無不克捷率領精兵埋根卓鑠原任副都統扎弩巴圖魯阿滿泰遇有絶險莫弗身先詎惟力勇實以忠堅攻堆補木奪橋命殞馬革未能官兵攻奪濟嚨官寨及搶奪熱索橋由峩緑大山繞至上遊扎筏渡河又攻克協布魯賊寨阿滿泰無不身先鼓勇痛殱賊衆忠悃實屬超羣乃至攻噶勒拉堆補木過河時見賊匪將撤橋板直前搶奪兵丁乘勢競進而伊適以在前中鎗落河水深溜急當爭先進擊之際不及撈覔並不得裹馬革以歸益堪憫惻更切哀憫副都統銜駐劄西藏協辦事務大臣賽尚阿巴圖魯成德曽爭巴忠前次廓爾喀侵擾藏邉巴忠授意噶布倫丹津班珠爾許銀贖地成德未嘗不知然聞彼時曾力詆其非而巴忠恃在御前行走諸事擅専雖爭之不得而心尚雄壯尚有雄心克聶拉木賊人占據聶拉木官寨成德與穆克登阿率兵乘夜前進距寨里許穆克登阿由西南伊由西北進攻拋入火彈燒斃賊匪甚衆其逃出者復被官兵殱戮二百餘名寨中尚屯聚賊匪令我兵四靣圍困無一漏網者頗見勇略亦見韜襟重進剿賊别分一路繼而大兵由色達木一路深入賊境福康安分派成德由哈那衮木山一路進攻既同阿尼雅布等將扎木攻克又聞前途有鐵索橋即潛行樹林內奪據大河東岸賊卡乘夜奪橋並將西岸賊卡攻克沿途殺獲甚衆復由江各波邁山梁直趨隴岡與彥吉保會合兩面夾擊占住隴岡所有賊卡悉被焚燬此次成德分路攻剿功亦可録頗有所先圖形表故謹案廓爾喀十五功臣贊內王杰孫士毅董誥均保漢人故惟恭録福康安等十二首欽定八旗通志卷首之六
