body:
  text: 旗分志三八旗佐領三鑲黃旗滿洲佐領鑲黃旗滿洲佐領下四參領至五參領第四參領第一佐領國初將哈達地方來歸人丁編立初以額爾克圖管理額爾克圖年老辭退以其子阿哈多管理阿哈多緣事革退以木圖管理木圖故以法爾哈管理法爾哈故以永愛管理永愛升任盛京侍郎以覺羅孟果洛管理孟果洛升任盛京將軍以白勒和管理白勒和年老辭退以溫普管理溫普緣事革退以林住管理林住緣事革退以顧晏管理顧晏緣事革退以德新管理續以郎中佛文管理佛文故以正卿海寧管理海寧故以副都統達明阿管理達明阿升任以印務參領德成管理旨作為謹案此佐領于康熙二十七年奉公中佐領第四參領第二佐領即第一佐領內滋生餘丁阿哈多管佐領時分出一佐領以其子多諾管理多諾緣事革退以黃海管理黃海緣事革退以班第管理班第緣事革退以覺羅舒書管理舒書年老辭退以查思泰管理查思泰緣事革退以噶西圖管理噶西圖緣事革退以四格管理四格故以哲爾衮管理哲爾衮故以凖提保管理續以滿色管理滿色升任以博爾賁察管理博爾賁察故以都統伯富亮管理富亮升任以興德管理興德故以副都統圖桑阿管理圖桑阿升任以侍郎髙朴管理髙朴升任以護軍統領靜海管理靜海故以內大臣海蘭察管理海蘭察故以都統善德管理善德升任以刑部郎中佛永管理旨作為謹案此佐領于康熙十九年奉公中佐領第四參領第三佐領係國初以打虎兒薩哈爾察胡雅爾察等處人丁編立始以尚書兼一等阿思哈尼哈畨阿哈尼堪管理阿哈尼堪故以其子侍郎一等阿達哈哈畨噶拉哈圖管理噶拉哈圖故以其弟精竒尼哈畨丹代管理丹代故以其弟那海管理那海陳亡以其弟參領達鼐管理達鼐緣事革職以覺羅查哈拉管理康熙十六年復以達鼐之弟一等阿思哈尼哈畨大賚管理大賚緣事革退以其兄達鼐之子達爾札管理達爾札故以其弟副都統一等阿思哈尼哈畨大成管理大成故以其兄之子敦住管理敦住故以其兄之子增夀管理增夀故以阿哈尼堪之孫六格管理六格故以其子富喜管理富喜故以其子富明阿管理富明阿故以其子富升管理富升故以其叔富寧阿管理第四參領第四佐領係康熙九年將顔布祿佐領內滋生餘丁分編此佐領始以副都統拉哈管理拉哈故以呼穆布管理呼穆布因病辭退以其弟喇哈管理喇哈因病辭退以其子賚穆布管理賚穆布緣事革退以呼穆布兄之子色爾特管理色爾特故以呼穆布弟之子拜善管理拜善故以呼穆布之子盛安管理盛安緣事革退以其弟三等阿達哈哈畨寧安管理寧安故以其子三等阿達哈哈畨福夀管理福夀故以其伯盛安管理盛安緣事革退以其族孫富爾遜管理富爾遜故以其子富僧額管理第四參領第五佐領係國初以訥音地方人丁編立始以巴希管理巴希故以其子俄內管理俄內故以其叔父之子來遜管理來遜故以其伯父之子札哈拉管理札哈拉故以其兄之子恩格管理恩格因病辭退以其子牛倫管理牛倫緣事革退以其子二等阿達哈哈畨阿濟圖管理阿濟圖故以其子福蘭泰管理第四參領第六佐領原係國初以輝發地方人丁編立始令蘇爾東阿管理蘇爾東阿故以其子舒舒管理舒舒故以其弟杭愛管理杭愛故以其弟副都統哈什瑪管理哈什瑪故以其弟碩色管理碩色故以哈什瑪之子額勒濟圖管理額勒濟圖緣事革職以其兄之子托倫管理托倫緣事革退以其弟佛寧管理佛寧故以其子嘛呢管理嘛呢故以其子富永管理富永故以其伯羅克多之子富惠管理第四參領第七佐領初係半個牛録以胡密塞管理順治二年胡密塞陳亡以其族弟郎中巴哈他管理巴哈他年老辭退以胡密塞之子薩弼圖管理至康熙八年人丁足額始定為整牛録薩弼圖故以其子二等侍衛薩克三管理薩克三緣事革退以其弟一等阿達哈哈畨桑格管理桑格因人才不及革退以其子舒寅管理舒寅故以其伯父薩克素之子舒德管理舒德故以其弟舒懿管理舒懿故以其姪德竒管理德竒故以其子存林管理第四參領第八佐領係國初以卦勒察地方來歸人丁編立始以唐阿里管理唐阿里隨征瓦爾喀班師時為熊傷身故以其子喀喀木管理喀喀木升任江寧將軍以其第二子衛色管理衛色故以其兄福爾諾管理福爾諾年老辭退以其子德保管理德保往守陵寢以其第三子托倫岱管理托倫岱故以其子英和管理英和告病以其子國勒敏管理第四參領第九佐領即第八佐領內滋生餘丁康熙二十三年福爾諾管佐領時分編一佐領以其弟拉揚阿管理拉揚阿緣事革職以其兄之子石寶管理石寶故以福爾諾之孫鄂倫達管理鄂倫達往守陵寢以其弟莫倫岱管理莫倫岱故以其子國興管理國興故以其子伊精阿管理第四參領第十佐領係國初以喀爾喀地方來歸人丁編立始以其人拜虎賚管理拜虎賚升任蒙古寨桑以薩虎管理薩虎因人不及革退以其子桑賽管理桑賽故以額駙顧爾布什之孫二等侍衛禪保管理禪保因病辭退以顧爾布什之子三等侍衛松江管理松江因病辭退以顧爾布什之孫阿達哈哈畨赫姿管理赫姿因病辭退以顧爾布什之孫阿達哈哈畨訥圖管理訥圖故以顧爾布什之孫精竒尼哈畨阿什坦管理阿什坦因病辭退以顧爾布什之二世孫二等侍衛兌親管理兌親升任哈達地方總領以其子國柱管理國柱故以其子文亮管理文亮故以其子阿竒蘭管理第四參領第十一佐領係康熙十三年分編八旗佐領時將公主門上行走之顧爾布什額駙半個佐領人丁併英親王門上行走之察哈爾地方來歸人丁增以顧爾布什之孫禪保佐領內滋生餘丁二十七名共足百丁之數編為一佐領以三等阿思