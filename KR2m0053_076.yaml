body:
  text: 欽定四庫全書欽定八旗通志卷六十二土田志昔者成周以穡事開基自公劉徹田為糧著三單之美古公疆理宣畝自西徂東以周於執事武王周公本之為體國經野之略從古帝王之興未有不敦崇本計者欽惟我太祖高皇帝定八旗軍制先令國人屯田曠土設職官十有六専司其事太祖文皇帝嗣位之初即申嚴屯莊禁令屢飭八旗備禦官劭農播榖禁濫役妨農者猗歟偉哉創造之勤與周家比烈而規模宏逺又逺過之世祖章皇帝既大一統籍近京州縣間田賜東來將士遂畫定旗地有民田錯互者以官田易之視所易近逺免其稅有差經界正矣榖祿均矣聖祖仁皇帝命展邉開墾得膏腴地數百萬頃由是八旗人士內有間田可以資生外有草地可以墾種不假閭閻尺寸而舊壤新畬咸得我所世宗憲皇帝慮畿輔莊屯雜處有司督察為艱特置八路官分司董率𨗳迎其善念振作其怠心睿慮益為周摯逮我皇上之御極也念旗人生齒日繁宜籌經逺既給還入官之産又查贖民典之田且以公産租銀遞年普賞其沙水荒鹻地畝則必命大臣履勘豁除賦租凡所以為旗人裕恆産謀久長者尤無微不至矣臣竊惟周家世有哲王而制作至元公而止詎若我大清聖聖相繼訏謨善政次第舉行即土田為萬幾之一端乃經列祖之經營宸𠂻之規畫宏綱細目美備周詳如此然則旗人食舊德服先疇含哺擊壤其深思樂利所由來乎謹博稽册籍採其有關地畝者為土田志分八子目曰土田規制曰給地數目曰守陵人員地畝曰直省駐防地畝曰塋地曰牧場曰土田教令曰土田蠲恤而各子目之下又有部分以便尋檢焉土田志一土田規制肇基規制畿輔規制肇基規制太祖髙皇帝乙卯年夏六月令國人屯田曠土諭曰我國儲積未充惟及是時撫輯吾國固疆圉修邉備重農積榖為先務耳因命各牛彔下出十人牛四頭於曠土屯田積貯倉廪復設官十六員筆帖式八員會計出入謹案乙卯之次年為天命元年丙辰天命四年夏四月諭沿邉之地宜設兵以衛農人我太宗文皇帝初即位之年謹案是年為天命十一年明年改元天聰秋九月定屯莊禁令先是編歸降戶口每十三壯丁為一莊分隸滿洲大臣家至是命按滿洲官品級每一備禦即今佐領止給壯丁八名以供使令其餘分屯别居編為民户擇漢官清正者轄之禁貝勒大臣屬下需索器物及恣意行逰者復諭曰工築之興有妨農務前因城郭邉墻事關守禦有勞民力良非得已朕深用憫念今修葺已竣嗣後有頽壞者止令修補不復興築用恤民力専勤南畝以重本務其屯莊田土八旗移居已定今後無事再移可使各安其業無荒耕種滿洲漢人毋得異視凡訟獄差徭須畫一均平諸貝勒大臣并在外駐防之人及貝勒下牧馬管屯人有事往屯莊各宜自備行糧若擅取民間牛羊雞豚者罪之天聰三年二月申科斂民財之禁時有正黃旗千總因本管官至屯斂取民物以為供應者上察知之諭貝勒大臣曰出使之人各自備餱糧毋許科取於民近聞有違法妄行者不可不嚴為懲治諸臣皆受朕恩身居民上衣食亦已豐裕乃攫取貧民辛勤孳養之牲牢以供口腹貧民被此擾纍何所恃以為生乎嗣後除凡人照常處分外若係管糧官筆帖式及巡臺人虐民妄行定行處死天聰七年春正月庚子集八旗備禦官諭曰田疇廬舍民生攸賴勸農講武國之大經方今疆土日闢舊所給田地若有不堪耕種者察明換給沃壤即於附近建造房屋俾遷居之如貧民之牛具耔種赴有力之家代耕一切徭役専派有力者不得濫及代耕貧户九年春三月禁濫役妨農諭曰朕昨出見民間耕種愆期蓋因章京等有事城工欲先時告竣故額外派夫致誤耕作築城固為正務然田地荒蕪民食何賴嗣後有濫役民夫致妨農務者該管章京以下俱治罪崇德元年冬十月禁屯積米榖並令及時耕種二年春二月令各屯堡及時劭農夏四月辛卯諭羣臣貸粟貧民及時播種五年春三月命鄭親王濟爾哈朗帥右翼貝勒多鐸帥左翼官兵往修義州城駐軍屯田尋奏義州東西四十里田地皆已開墾夏五月諭理藩院曰爾等可令索倫來歸之衆同郭爾羅斯部衆於烏庫瑪勒格稜額勒蘇昂阿察喀地方駐劄耕種六年十一月都察院參政祖可法等奏言今嵗禾榖未收秋霜早隕恐收穫之時米糧未能豐足價漸騰涌市糶日稀所宜預為籌畫者凡四事一請嚴沽酒之禁本京及大小城堡計造酒米數每日不下數百石停止一年可省米數十萬石一請杜囤積之弊有糧之家或賣或借賣則從市平糶借則從時起息俾得有無相通不許居竒長價一請疏河渠之路東土以遼瀋為肥饒夾河六屯尤為沃壤年久不濬故河壅而水不流雨澤偶多遂致泛溢沿河一帶良田悉委棄矣及時挑修用力不多為益最大即民間夫役亦所樂從一請開納粟之例或論罪之大小限以糧數納贖或無罪平人有急公輸粟者量加奬録俟秋成豐稔即行停止疏入得旨所奏俱是我國人民當此飢饉之年著停止沽酒待年豐仍許沽賣獲罪之人無銀納贖願輸糧者準以時價折收有餘糧之家願助者許助願賣者許賣又新開河修濬一事該部俟可以興工之時奏聞七年六月癸卯上諭大學士范文程等曰昔我太祖時凡遇行兵巡幸軍士有踐踏田禾者重則射之輕則鞭之法律嚴明所以重農事也近來諸王貝勒行兵出獵見有踐踏田禾者亦曾察出定罪否朕前往牧馬之所見內大臣塔瞻等踐踏田禾已奪取其矢交與兵部究治矣出兵官員應在京候定功罪其餘間散官員即當令其各往本牛録屯莊查看田土鋤墾與否如有棄而未鋤者可撥工助之五榖係萬民之命何得兀然間坐略不介意也范文程等遵諭集諸王貝勒大臣於篤恭殿宣示畢王貝勒奏曰臣等遇有踐踏田禾之人應鞭責者鞭責應罰懲者罰懲不敢疏縱也以上肇基規制畿輔規制一順治元年至康熙五十三年順治元年十二月諭户部曰今我朝定都燕京期於久逺凡近京各州縣民人無主荒田及明朝皇親駙馬公侯伯太監等凡歿於寇亂者無主田地甚多爾部槩行清查若本主尚存或本主已過而子弟存者量口給與其餘田地盡行分給東來諸王勳臣兵丁人等蓋非利其地土良以東來諸王勳臣兵丁人等無處安置故不得已而取之然所取之地若滿漢錯處必爭奪不止可令各府州縣鄉村滿漢分居各理疆界以杜異日爭端今年從東先來諸王各官兵丁及現在京各部院衙門官員俱著先撥給田園其後到者再酌量照前與之是月順天巡按柳寅東疏言清查無主之地安置滿洲莊頭誠開創宏規苐無主地與有主地犬牙相錯勢必與漢民雜處不惟今日履畝之難恐日後爭端易生臣以為莫若先將州縣大小定用地多寡使滿洲自住一方而後以察出無主地與有主地互相兑換務使滿洲界限分明疆理各别而後可蓋旗人共聚一處阡陌在於斯廬舍在於斯耕作牧放各相友助其便一也滿漢疆理無相侵奪爭端不生其便二也里役田賦各自承辦滿漢各官無相干涉且亦無可委缷其便三也處分當經界明人無竄避驚疑得以保業安生耕耘如故賦役不缺其便四也可仍者仍可換者換漢人樂從且其中有主者既歸併其餘自不容無主者隱匿其便五也疏入奉旨戶部詳議速覆是年定民間無主田地撥給八旗壯丁每人三十畝二年正月户部以圈撥地土事奏聞報曰凡圈丈地方須令滿漢分處至於故明賞賚勳戚莊地及民間無主荒田悉令輸官酌行分撥謹案會典順治十一年覆準凡丈量州縣地用步弓各旗莊屯用繩用步弓曰大用繩曰圈二月諭户部傳諭各州縣有司凡民間房産有為滿洲圈占兑換他處者俱視其田産美惡速行補給務令均平倘瞻顧徇庇不從公速撥耽延時日爾部察出從重處分十二月户部尚書英俄爾岱等言臣等奉命圈給旗下地畝查得易州安肅等州縣軍衛共三十六處無主田地盡數撥給旗下猶若不足其未察地方如滿城望都等二十四州縣尚有無主荒地若撥給旗下則去京漸逺兵民雜處多有未便議將易州等處有主田地酌量給旗而以滿城等處無主田地就近給民庶幾兩利至於清查事緒繁多應差廉幹官員前往從公撥給務令滿漢兵民各有寧宇疏入命遣給事中四員御史四員同戶部司官八員前往撥給是年題準給諸王貝勒貝子公等大莊每所地一百三十晌或一百二十晌至七十晌不等半莊每所地六十五晌或六十晌至四十晌不等園每所地三十晌或二十五晌至十晌不等謹案舊例六畝為一晌自乾隆四十六年十一月始奉實旨嗣後按畝核算不寫若干晌而此志原文有係欽依録與聖祖御製文集者所書晌數今敬遵其舊惟自乾隆元年以後則遵旨概用畝數核改謹聲明於此又題準分給園地內府總管八晌親王府管領六晌郡王以下府管領五晌各府給事人員俱給地有差又題準王以下各官所屬壯丁計口給地六晌停支口糧又題準民間墳墓有在旗人地內者許其子孫隨時祭掃三年題準京師內外無主園地酌量撥給諸王府又題準副都統以上官員各撥給園地三十晌併二名壯丁地謹案每名壯丁地三十畝是年三月户部言民間田地撥給滿洲已經於鄰近地方補還但廬舍田園頓非其故遷徙流離深為可念應照被撥地數一應錢糧全免一年其地土房舍雖未經撥給滿洲而與近村被撥之民同居分種亦應照分出地數將一應錢糧量免一半凡故明公侯外戚屯地既經撥出其錢糧自應照數永免如有被撥之民將他處未撥之産混開冒免者察出重究詔從所請四年正月戶部言去年八旗圈地止圈一靣內薄地甚多以致秋成無望况今年東來滿洲又無地耕種若以逺處府州縣屯衛故明勳戚等地撥給又恐孤貧者無力運送應於近京府州縣內撥換去年薄地並給今年東來滿洲其被圈之民於滿洲未圈州縣內查屯衛撥補仍照遷移逺近豁免錢糧四百里者準免二年三百里者準免一年以後無復再動民地庶滿漢兩便疏入詔從其議於是圈順義懷柔密雲平谷四縣地六萬七百五晌以延慶州永寧縣新保安永寧衛延慶左衛右衛懷來衛無主屯地撥補圈雄縣大城新城三縣地四萬九千一百一十五晌以東鹿阜城二縣無主屯地撥補圈容城任邱二縣地三萬五千五十一晌以武邑縣無主屯地撥補圈河間府地二十萬一千五百三十九晌以博野安平肅寧饒陽四縣先圈薄地撥補圈昌平良鄉房山易州四州縣地五萬九千八百六十晌以定州晉州無極縣舊保安深井堡桃花堡遞鶚堡雞鳴驛龍門所無主屯地撥補圈安肅滿城二縣地三萬五千九百晌以武強藁城二縣無主屯地撥補圈完縣清苑二縣地四萬五千一百晌以真定縣無主田地撥補圈通州三河薊州遵化四州縣地十一萬二百二十八晌以玉田豐潤二縣圈剩無主屯地及遷安縣無主屯地撥補圈霸州新城漷縣武清東安髙陽望都固安安州永清滄州十一州縣地十九萬二千五百一十九晌以南皮靜海樂陵慶雲交河蠡縣靈夀行唐深州深澤曲陽新樂祁州故城德州各州縣無主屯地撥補圈涿州淶水定興保定文安五州縣地十萬一千四百九十晌以獻縣先圈薄地撥補圈寶坻香河灤州樂亭四州縣地十萬二千二百晌以武城昌黎撫寧各縣無主屯地撥補是年題準恭領以下官員各給二名壯丁地又題準撥給甲兵地畝有告稱不能耕種者不準又題準圈撥地內如有集場仍留給民以資貿易又題準嗣後民間田産永停圈撥又題準撥給地畝以現在為凖嗣後雖增丁不添給減丁不退出各官雖升遷不添給亡故降革不退出五年題準親王給圈十所郡王給圈七所每所地三十晌又題準南苑海户每户給地三晌又題準各官帶來壯丁給地不敷每佐領下再給十名壯丁地六年題準襲封王貝勒貝子公等伊祖父所遺圈地除撥給應得之數外其餘地畝不必撤出仍留本家又題準凡加封王貝勒貝子公等各照本爵撥給園地又題準撥給官員園地公侯伯子各三十晌男二十晌輕車都尉十五晌騎都尉十晌雖升至超品公亦不踰三十晌又題準凡官員致仕者督撫布按總兵各給園地六晌道員副將參將各四晌府州縣遊守等官各三晌又題準改撥官員園地公侯伯各五十晌子四十晌男三十晌都統尚書輕車都尉各二十晌副都統侍郎騎都尉各十晌一等侍衛護衛參領各七晌二等侍衛護衛各五晌三等侍衛護衛雲騎尉各四晌又題準新來壯丁每名給地五晌七年題準撥給親王園八所郡王五所貝勒四所貝子三所公二所每所地三十晌嗣後凡初封王貝勒貝子公等俱照此例撥給鎮國將軍園地四十晌輔國將軍三十晌奉國將軍二十晌奉恩將軍十晌凡給過園地者停給家口糧米又題準給公主園地六十晌郡主三十晌縣主郡君各二十五晌又題準八旗舊壯丁每名撤出地一晌撥給新壯丁九年題準八旗壯丁退出地並首告清出地及各省駐防遺下地照墾荒例招墾三年起科十年題準嗣後圈占民間房地永行停止十一年正月都察院言滿洲兵丁雖分土田每年並未收成窮兵出征必需隨帶之人致失耕種之業往往地土空間一遇旱潦又需部給口糧且以地瘠難耕復多陳告而民地又不便再圈請查壯丁四名以下地土盡數退出量加錢糧月米其馬匹則於冬春二季酌與喂養價銀其退出之地擇其腴者許令原得瘠地之人更換餘則盡還民間在滿洲有錢糧可望樂於披甲而又無瘠地之苦至民間素知地利復不至於荒蕪是兵民共仰皇仁於無盡矣下該部確議十五年題準舊例勳戚莊屯糧石在部報收嗣後交各本主報納多寡聽其自便十七年覆準八旗撤出壯丁地畝向交各佐領收存以致荒蕪令地方官招民墾種照例三年後起科十八年九月户部言民間地土房屋禁止滿洲置買已於順治七年三月內定例遵行後順治十三年奉有順治七年未禁以前所買地土房屋入官戶部給發原價其錢糧行文地方官除免之旨臣等看得未禁之前所置地土房屋發覺者請不給原價免其入官七年禁止以後所買地土房屋仍照定議盡行入官買者賣者一併治罪詔從所請康熙元年工部議遣官發帑修築近京八旗護莊堤岸其取土刨挖地畝户部另撥補給地主詔從所議二年題準新來佐領給地五晌領催給地三晌三年正月先是正黃旗副都統穆占奏稱伊佐領下四百四十名壯丁地畝不堪祈給地更換奉有各旗村莊有地畝不好者壯丁一百名以下仍令留住一百名以上應遷移之旨至是户部查明鑲黃正白正紅鑲藍各旗壯丁一百名以上地畝不堪者共二萬六千四百五十名應將順天保定河間永平等府屬州縣圈出地畝十三萬二千二百五十晌分給各旗每壯丁一名給地五晌準令遷移並請差部員旗員會同地方官酌量換給議上得旨右翼著尚書去左翼著侍郎一員去其更換不堪地畝各旗著副都統去餘依議五年正月和碩康親王傑書等遵旨議沙壓水淹地十五萬四千晌有竒該佐領未經踏勘難以懸議應差部臣前往踏勘明白造册再議疏入輔臣等稱旨踏勘地畝事情重大著八旗滿洲蒙古漢軍等都統户部滿漢尚書及滿侍郎一員都察院左都御史及滿左副都御史一員六科給事中或滿或漢每科各一員往看具奏三月都統貝子溫齊等奉差查勘八旗沙壓水淹不堪耕種之地內鑲黃旗地尤不堪其餘各旗有一半可耕者亦間有過半不堪與全不堪者各别具疏覆奏輔臣等稱旨太祖太宗時原將八旗分左右翼莊田房屋俱從頭挨次分給後因睿親王到京欲住永平府留剩周圍地土未圈且欲令伊本旗切近故將鑲黃旗應住地方與正白旗而給鑲黃旗於右翼之末今各旗以地土不堪具控據都統等踏勘回奏鑲黃旗不堪尤甚如換給地畝别旗分已立界截圈不便更易惟永平府周圍地畝未經圈出應令鑲黃旗移住且世祖章皇帝旨亦云凡事宜遵太祖太宗例行今思莊田房屋應照翼給與將鑲黃旗移於左翼仍從頭挨次撥給至各旗不堪地畝作何分别圈撥之地作何補還鑲黃旗移出舊地作何料理著户部一併酌議四月户部議覆八旗圈換地畝事鑲黃旗近圈順義密雲懷柔平谷四縣之地毋庸撥換外其左右翼之涿州雄縣大城新安河間任邱肅寧容城等處地應照舊例從頭挨次撥換將正白旗通州三河迤東大路北邉至豐潤縣永平府周圍留剩地撥給鑲黃旗如不敷將遵化至永平路北夾空民地撥給其正白旗所撤通州迤東之地亦應於永平周圍地內撥補不敷將路北夾空民地灤州樂亭縣民地撥給至二旗包衣佐領下壯丁應否遷移伏候聖裁再六旗地畝內除一半可耕一半不堪者不準撥換外其過半不堪與全不堪者應將各旗圈內空地或滿洲退回地酌量撥換俱俟秋成後差員丈量分撥又一議鑲黃旗既有順義等四縣地應將所移涿洲壯丁即於順義等處民地撥給其河間等處七縣所移壯丁應將正白旗薊州遵化地撥給不敷將夾空民地撥給其通州三河玉田豐潤等處地仍留正白旗餘照前議奏入奉旨鑲黃旗涿州壯丁移於順義等縣依後議其前議將正白旗通州迤東大路北邉給與鑲黃旗南邉留與正白旗之處俟秋後差員將正白旗滿洲地投充人地皇莊地丈量明白取具實數酌議分撥餘俱俟鑲黃旗遷移事竣具題請旨十二月户部覆準侍郎巴格等疏鑲黃旗遷移壯丁共四萬六百名該地二十萬三千晌將薊州遵化遷安三處正白旗壯丁分內地民地開墾地多出地投充漢人地派給不敷將延慶州民地撥補其正白旗遷移壯丁二萬二千三百六十一名該地十一萬一千八百五晌將玉田豐潤二處民地多出地開墾地投充漢人地并永平等處投充漢人地派給不敷將永平灤州樂亭開平民地酌量取撥詔從所議六年題準八旗地有坍塌成河者準與換給其出鹻或被潦地不準換給是年二月户部言各旗撥換地畝將完餘剩房地應交地方官辦糧此後各旗有具呈請撥換者概行禁止詔從所請八年六月諭户部曰朕纘承祖宗丕基撫育羣生滿漢軍民原無異視務俾各得其所乃愜朕心比年以來復將民間房地圈給旗下所以致民生失業衣食無資流離困苦深為可憫嗣後永行停止其今年所圈房地悉力給還民間爾部速行曉諭昭朕嘉惠生民至意至於旗人無地亦難資生應否以古北等口邉外空地撥給耕種其令貝勒大臣確議以聞是年題準圈撥民間田房屢經停止邇來有因旗下退出荒地復行圈撥者有逰牧等處投來人丁復行圈撥者有因圈補時復圈接壤民地者百姓失業堪憫今張家口喜峯口殺虎口古北口獨石口山海關外各有曠土如宗室官員及甲兵有願將壯丁地畝退出取口外間地耕種者該都統副都統給印文咨送按丁撥給九年二月户部議古北等口外間空之地分撥八旗查喜峯口獨石口外既無間地正紅旗又無赴邉外領地之人不必撥給今以古北口外地撥與鑲黃旗正黃旗羅文峪外地撥與正白旗冷口外地撥與鑲白旗正藍旗張家口外地撥與鑲紅旗鑲藍旗詔從所議是年題準官員甲兵地畝不許越旗交易其甲兵本身種地不許全賣又題準官員撥補地畝不遵部文擅撥給别項地畝者罰俸一年十年覆準八旗莊屯每屯原設屯領催一名不必更設里長十五年覆準官員不對閲部册支給口糧地畝者罰俸兩個月筆帖式等罰俸一個月其察對册籍係司官職掌堂官不必議處二十年題準滿洲新歸旗者停給園地二十二年八月議政王大臣等會議八旗貧丁賙給房地諭曰朕軫念八旗貧丁特令會議使之得所今覽所議無房産貧丁令於城外空地造房居住犬以單身貧丁離本旗佐領地方逺居城外既難應差又或有不肖之徒肆意為非亦難稽察八旗官員房屋田地雖皆係從前分占亦有額外置買者可令有房四五十間之人量撥一間與無房者居住其正丁所分田地外有旗下莊頭將窪下之地已經開墾耕種者著該部明白丈量有多餘者注册仍暫留與原主俟現在收存地畝撥給不敷之時將此地補撥如此庶於貧丁少有禆益令議政王貝勒大臣八旗佐領以上議奏是月議政大臣等議旗下兵丁貧無妻室者官給資婚娶無房屋者令八旗王以下官員人等以上有房屋四十間者分撥一間給與居住無田土者以户部所存未分撥田土撥給并丈量王以下官員人等以上户內田土有較原數浮溢者令存留撥給奉旨所議尚未盡善每四十間撥給一間如在住室墻垣之內恐有未便或别所房屋或空地築室撥給庶不涉於強派其皇莊地土未經議及亦非公私一體之誼應令一併丈量若親王以下富户以上有空間園地房屋情願捐納入官者著部奏聞分别議敘二十三年五月户部題丈量過旗下大臣官員及投充民人溢額地畝暫留原主名下需用時再行撥給奉旨田地為民恆産已經給與者不便復取其旗下大臣官員既有溢額之地理宜注册俟需用時再行撥給民地不可輕動是月諭户部曰民間田地久已有旨永停圈撥其部存地畝分撥時或不肖人員借端擾害百姓圈占民人良田以不堪地畝抵換或地方豪強隱占存部良田妄指民人地畝撥給殊為可惡直𨽻巡撫可嚴察此等情弊指名糾參從重治罪二十四年四月順天府府尹張吉午疏請自康熙二十四年始凡民間開墾田畝永免圈取奉旨民間自開墾田畝若圈與旗下恐致病民嗣後永不許圈如旗下有當撥給者其以户部現存旗下餘田給之是月户部詳議直𨽻州縣百姓墾荒田地停止圈撥如有各處壯丁及新滿洲將皇莊并上三旗內務府及八旗禮部光祿寺丈量所餘地畝撥給俟此項地畝撥完時另行請旨又議準撥給地畝不論多少停其遣筆帖式俱差司官撥給如不照旗員退出之地取撥另將别項地撥給者降三級隨旗行走四十年八月直𨽻巡撫李光地疏奏青縣等處西翼四旗馬厰餘地原十八萬八千四百六十二晌零今民認墾者止三萬二千十六晌零其外有民偷墾鄰畝暫充已業者有偷墾之田現為水淹不可耕者會勘之時民人懼罪莫敢出名承認乞免已往之罪招民承種於康熙四十年為始照則起科詔從之四十五年議準撥給地畝自康熙十三年後均係將八旗退出地方官收存地畝撥給至今遵行但春間二三月內已經耕種應停撥給俟九月間秋成後始行撥地五十三年七月直𨽻巡撫趙宏燮疏言直屬旗人退還田地原有二項一係退還民人當差納糧永行停圈者一係退還民人承種輸租應圈之時例令圈撥者滄州旗人退還田地係奉旨永行停圈之地今莊頭李必逹等具呈內務府指圈滄州旗人退還地六百餘頃查此田地滄州民人耕種當差納糧已久若聽圈撥必致失所請各屬旗人於退還輸租地內均勻撥給詔從其請欽定八旗通志卷六十二
