body:
  text: 兵制志三禁衛二八旗步軍營官内府三旗園内府前鋒營南苑守衛兵圓明内府三旗盛京内府三旗衛火器營王健鋭營官三旗虎槍營陵寢守官兵公府屬兵八旗步軍營提督九門巡捕五營步軍統領一人左右翼步軍翼尉每翼各一人順治元年設步軍總尉乾隆十九年改名翼尉八旗步軍協尉每旗各三人順治五年設步軍副尉乾隆十九年改名協尉毎旗滿洲䝉古漢軍兼用共二十四人步軍副尉每旗各三人雍正四年設步軍㕘尉乾隆十九年改名副尉步軍校每旗滿洲二十四人蒙古漢軍各八人捕盜步軍尉每旗滿洲三人䝉古漢軍各一人康熙三十四年設步軍委署步軍校每旗滿洲五人䝉古漢軍各二人康熙三十四年設領催共二千三十一名步軍共一萬七千八百四十七名内捕盜步軍三百二十名步軍統領所屬文武員外郎二人初制設一人康熙六十一年増一人主事二人司務一人雍正十三年増設筆帖式十二人初制設四人康熙三十年増四人雍正十三年又増四人内城九門每門城門領各二人初名城門尉乾隆十九年改名城門領外七門同城門吏各二人初名城門校乾隆十九年改名城門吏外七門同外城七門每門城門領各一人城門吏各一人内外城門千總每門各二人初設指揮千户順治四年改為門千總城門驍騎共三百名門軍共六百四十名門軍初制召募民人充補雍正二年改用八旗養育兵乾隆四年定於步軍内撥補礮手每門各二名初制惟内九門設礮手乾隆七年外七門増置中南北左右巡捕五營順治元年置南北二營十四年増置中營乾隆四十六年増定五營中軍副將兼管中營㕘將一人原設中營㕘將乾隆四十六年改設副將南北左右四營㕘將各一人原設南北營二人乾隆四十六年増左右營二人五營遊擊各一人原設中南北三營各一人乾隆四十六年增左右營二人都司各一人乾隆四十六年增設守備共十八人康熙三十年初設守備十七人五十一年増一人雍正元年又増一人乾隆四十六年裁一人凡中營四人南營五人北營左營右營各三人千總共四十六人康熙三十年初設千總七人雍正元年増一人十二年増七人乾隆四十六年増三十一人凡中營十人南營十二人北營左營右營各八人把總共九十二人初制設十人順治十四年増五人康熙三十年増六人五十一年增二人雍正元年増一人十二年増六人乾隆四十六年増六十二人凡中營二十人南營二十四人北營左營右營各十六人外委千總共四十六人外委把總共九十二人馬兵共四千名戰兵共三千名守兵共三千名原設馬兵一千五百名步兵三千六百名共五千一百名乾隆四十六年増設兵四千九百名共一萬名凡城守之制内九門城門領城門吏以八旗滿洲外七門以漢軍内外城門千總並以漢軍内九門城門驍騎門軍以八旗滿洲蒙古外七門以漢軍康熙三十八年增定正陽門城門領城門吏驍騎等由八旗充補毋庸議調其崇文等八門官向係各按本翼旗分管轄或致瞻徇應對調看守崇文門以鑲黄旗宣武門以正黄旗朝陽門以正白旗東直門以鑲白旗阜成門以正紅旗西直門以鑲紅旗安定門以正藍旗徳勝門以鑲藍旗其兵丁等仍各按旗守門凡内外城門啟閉城門領司之轄以步軍統領其非時啟閉者順治初年定每月逢五常朝日由禮部咨兵部轉行步軍統領於黎明啟正陽門遇御門聴政日外城居住官員應早入者由兵部行文於曉鐘後啟正陽門遇壇廟祭祀日内外城陪祀官有應早入城出城者由太常寺先期咨兵部轉行於五鼓後啟門内務府遇有祭祀出城取水預期行文或早啟或遲閉其餘各部院八旗有應早出入者均預具印文移咨兵部核明應行者轉行啟門如無兵部印文概不准啟康熙三十一年定遇駐蹕暢春園雍正元年以後凡遇有駐蹕圓明園制同城内各衙門按日前赴奏事傳知西直門徳勝門西便門遇駐蹕南苑傳知正陽門永定門均酌量早啟遲閉其尋常行人仍於黎明放行雍正四年於正陽門西直門各頒隂文合符一扇傳諭步軍統領如遇夜有奉㫖差遣及𦂳急軍務應即時啟門者俟大内持出陽文合符該城門領即取隂文合符騐明啟鑰仍報知統領其餘各門遇陽文合符至門即報統領親齎隂文合符至門與陽文合符照騐啟門均於次日具奏平時啟門仍遵例行凡門禁順治初年定午門外朝㑹坐班行禮處一應閒人交步軍尉等驅逐雍正年間増定凡遇朝㑹之期委步軍協尉四人副尉四人步軍尉十六人步軍酌量差撥於午門外大清門内御道兩旁巡警禁止諠譁又於長安左右門外每門委捕盜步軍尉二人阻逐閒人其内九門外七門官兵各按分管之處晝稽出入夜守扃鑰以為常越城者有禁依城搭葢席棚及閒雜人等近門歇宿者均有禁凡步軍營汛守之制皇城内各汛專𨽻八旗滿洲共分汛九十列柵一百十六鑲黄旗滿洲界在紫禁城北東自地安門箭亭城牆起西至地安門甬路分中接正黄旗界北自火藥局城牆起南至三眼井接正白旗界中設步軍尉二人後各旗同分汛十每汛設步軍十二人後各旗同柵欄十八每座設步軍三人後各旗同近汛者或即以汛兵兼管於景山後設步軍尉一人管理街道洒水兼管河道後各旗步軍尉職掌同步軍百二十人後各旗步軍人數同正白旗滿洲界在紫禁城東北東自内府庫東口東牆起西至景山東牆止北自三眼井起南至銀牐風神廟接鑲白旗界分汛十一柵欄十於景山東門設步軍尉步軍如前鑲白旗滿洲界在紫禁城東東自騎河樓東牆起西至北池子止北自宣仁廟起南至北池子南口並望恩橋北接正藍旗界分汛十柵欄十三於北池子街設步軍尉步軍如前正藍旗滿洲界在紫禁城東南東自東安門東城牆起西至南池子街止北自北池子街並望恩橋起南至菖蒲河城牆止分汛十一柵欄九於南池子口設步軍尉步軍如前正黄旗滿洲界在紫禁城北東自地安門甬路分中起西至西什庫止北自侍衛教場城牆起南至宏仁寺分中接正紅旗界分汛十二柵欄十六於地安門設步軍尉步軍如前正紅旗滿洲界在紫禁城西北東自景山西門起西至西安門城牆止北自宏仁寺分中起南至西安門甬路接鑲紅旗界分汛十二柵欄十七於景山西門設步軍尉步軍如前鑲紅旗滿洲界在紫禁城西東自大髙殿門分中起西至西安門城牆止北自西安門甬路分中起南至大石槽城牆止分汛十二柵欄二十四於光明殿後設步軍尉步軍如前鑲藍旗滿洲界在紫禁城西南東自西華門起西至西苑門止北自慎刑司起南至南府城牆止分汛十二柵欄九於西華門外設步軍尉步軍如前皇城外各汛分𨽻八旗滿洲䝉古漢軍内九門城上設汛八十七所遇四十駐蹕圓明園増八旗驍騎汛七所與步軍相間看守遇大街巡幸方岳將步軍撤下分防巷口城上汛守悉易以驍騎大城内共分汛六百二十五列柵一千一百九十九鑲黄旗滿洲界在大城北䝉古旗同東自新橋起西至舊鼓樓大街接正黄旗界北自安定門城根起南至紅廟後接正白旗界中設步軍尉五人後滿洲各旗同分汛五十三毎汛設步軍十二人後各旗步軍人數同柵欄九十四每座設步軍三人後名旗同蒙古旗界東自東直門北小街口接本旗漢軍界起西至新橋西接本旗滿洲界北自北城根接本旗滿洲界起南至汪家衚衕西口接正白旗界中設步軍尉二人後䝉古漢軍各旗同分汛二十二柵欄二十九漢軍旗界在大城東北東自東直門城根起西至新橋東接本旗䝉古界北自角樓迤西接本旗滿洲界起南至南水闗接正白旗界分汛十七柵欄二十七正白旗滿洲界在大城東蒙古漢軍旗同東自朝陽門北城根起西至地安門大街分中接正黄旗界北自汪家衚衕西口起南至大市街接本旗蒙古界分汛五十一柵欄九十䝉古旗界東自拐棒衚衕東口接鑲白旗界起西至皇城牆止北自兵馬司衚衕接本旗滿洲界起南至豹房衚衕接鑲白旗界分汛二十柵欄三十五漢軍旗界東自朝陽門城根起西至鷄鵞市接本旗滿洲界南自南小街口接鑲白旗界起北至何家口接本旗滿洲界分汛十四柵欄三十一鑲白旗滿洲界在大城東䝉古旗同東自東城根起西至皇城牆止北自炒麫衚衕西口接正白旗界起南至金魚衚衕東口接本旗漢軍界分汛四十六柵欄八十蒙古旗界東自城根中心臺起西至東安門止北自小石槽衚衕接本旗滿洲界起南至小街口接本旗漢軍界分汛十三柵欄三十五漢軍旗界在大城東南東自東城根起西至王府大街阮府衚衕口止北自金魚衚衕東口起南至就日坊三條衚衕接正藍旗界分汛十二柵欄十八正藍旗滿洲界在大城南䝉古漢軍旗同東自城根起西自皇城牆轉西至長安左門止北自三條衚衕起南至小豹房衚衕西口接本旗䝉古界分汛四十五柵欄八十七䝉古旗界東自城根起西至敷文坊東口接本旗漢軍界北自小豹房衚衕起南至城根止分汛十九柵欄四十五漢軍旗界東自敷文坊東口起西至棊盤街分中接鑲紅旗界北自兵部街北口接本旗滿洲界起南至城根止分汛十五柵欄十五正黄旗滿洲界在大城北北自徳勝門城根起南至皇城牆西北角止東自地安門分中接鑲黄旗界起西至水闗橋止分汛五十五内一汛止設步軍五人柵欄九十一䝉古旗界在大城西北漢軍旗同北自北城根起南至官園口止東自横橋起西至西直門止分汛十八柵欄三十漢軍旗界北自北城根起南至臭皮衚衕接正紅旗界東自水闗接本旗滿洲界起西至横橋接本旗䝉古界分汛十八柵欄四十一正紅旗滿洲界在大城西蒙古漢軍旗同北自臭皮衚衕起南至丁字街止東自大市街分中起西至馬石橋接本旗䝉古界分汛三十八柵欄七十九䝉古旗界北自朝天宫前起南至武衣庫衚衕止東自馬石橋起西至阜成門止分汛十四柵欄三十六漢軍旗界北自倉夾道北起南至西安門分中止東自皇城牆起西至大市街分中接本旗滿洲界分汛十柵欄十四鑲紅旗滿洲界在大城西南北自按院衚衕起南至南城根止東自瞻雲坊分中起西至西城根止分汛四十八柵欄九十六蒙古旗界在大城西漢軍旗同北自絨線衚衕接本旗滿洲界起南至宣武門止東自六部口起西至大濠止分汛十二柵欄二十三漢軍旗界北自刑部門分中起南至南城根止東自棊盤街分中起西至六部口接本旗䝉古界分汛十柵欄三十九鑲藍旗滿洲界在大城西䝉古旗同北自丁字街接正紅旗界起南至瞻雲坊接鑲紅旗界止東自皇城牆起西至河漕沿止分汛五十栅欄九十七蒙古旗界北自武衣庫衚衕接正紅旗界起南至按院衚衕止東自河漕沿起西至西城根止分汛十五柵欄二十四漢軍旗界在大城南北自灰厰接本旗滿洲界起南至刑部門分中接鑲紅旗界止東自長安右門起西至瞻雲坊接本旗滿洲界分汛十柵欄三十四以上各汛均按分轄地界防守稽察夜則巡更擊柝每汛設更籌自初更起上下汛往來傳送至黎明乃止圓明園附近處汛守雍正元年定制設八旗步軍汛五十以步軍協尉四人步軍尉十二人分轄之每汛設領催三名步軍十名晝夜巡警凡巡捕營汛守之制圓明園為車駕駐蹕之地其營汛列於巡捕營之首定為中營分五汛副將駐海甸遊擊駐四王府以資統轄圓明園汛都司一人千總二人把總四人分哨巡查暢春園樹村静宜園樂善園四汛各駐以守備一人千總二人把總四人南營轄京城前三門外南城之内分六汛㕘將駐崇文門外遊擊駐菜市口其西珠市口汛為都司一人分駐東珠市口東河