body:
  text: 欽定四庫全書欽定八旗通志卷一百四十三人物志二十三大臣傳九滿洲鑲黃旗九晉尹繼善託庸髙尹繼善尹繼善滿洲鑲黃旗人大學士尹泰子雍正元年進士改庶吉士散館授編修充日講起居注官五年三月遷侍講兼户部郎中九月命往廣東察審布政使官達按察使方願瑛受賄徇庇案得實即署按察使六年四月授內閣侍讀學士協理江南河務八月署江蘇巡撫七年二月實授尋署河道總督十二月疏禁收漕上司陋規及官吏浮費每石定為加費六分半給旗丁半給州縣常平社倉捐榖聽民樂輸不得隨漕勒徵詔如議行八年奏言崇明屹峙重洋為江南屏障知縣不足彈壓請增設巡道駐之兼轄太倉通州至縣屬沙地遼濶鎮標四營駐城內巡察難周應撥左營駐永興沙增巡檢一駐半洋沙移縣城巡檢駐大安沙並撥左營千把總二協同分防其戲台等沙各設哨船巡緝福山營為江防門户應撥蘇鎮沙船四𨽻之與京口狼山等汛按期會哨又江蘇按察使駐江寧距巡撫治所遠請移駐蘇州蘇松道責在巡防應移駐上海下部議行九年署兩江總督奏請析淮安府屬之山陽縣為二增知縣縣丞典史各一治廟灣鎮移廟灣司巡檢駐草偃口鹽城清溝司巡檢駐上岡撥鹽城縣訓導歸新縣析揚州府屬之江都縣為二增知縣典史各一撥主簿訓導及邵伯上官二巡司并邵伯驛歸新縣又如臯縣增設主簿一駐掘港場均議行定山陽分縣曰阜寧江都分縣曰甘泉十年正月協辦江寧將軍兼理兩淮鹽政疏言京口為江淮鎖鑰南北咽喉向設沙船五十六艍犂船三十二水兵千四百餘實水師重鎮乃𨽻將軍標陸路兩營陸路將辨不諳水性船隻水手又遠駐距鎮江數十里之髙資港春秋兩􅍾外將不知兵兵不知伍請於髙資港設水師都司千把總各一歸江隂水師副將轄􅍾暇教以技藝資防禦江寧為省會重地襟帶長江居京口狼山上遊駐防兵學習水師向撥將軍標沙船二十水兵三百餘春秋􅍾演但􅍾期止選鎮江千把總四員至江寧分配教習事竣仍回本任無論暫時𣲖撥並無責成難收實效其實鎮江將辨初不能教習水師至今三百餘兵技藝未習且家在鎮江僕僕往來經管旗員素不熟識請撥隙地建營房令挈眷駐扎設水師守偹一把總二専司其事歸將軍轄狼山為長江尾閭大海門户鎮標三營向設戰船二十二春秋出洋􅍾練江汛每月會哨近年來僅駕船數隻兵數名往來江口並不出洋至會哨更屬空文尤可異者趕繒大船原為出洋而設近竟髙擱沙灘臣飭交署總兵王廷梅整理期復舊觀再京口江寧𣲖佐領協領二員每月巡查江面狼山鎮標右營將辨巡查海汛中左二營亦輪派遊巡如此庶長江數千里外聲援聫絡奏入上嘉之先是尹繼善疏請清查江蘇積欠錢糧命侍郎彭維新等會同辦理二月合奏言自康熙五十一年至雍正四年官侵吏蝕四百七十二萬餘民欠五百三十九萬餘疏入詔侵蝕自首者免罪尹繼善等下部議敘九月奏請改直𨽻徐州為府設知府一附郭增置一縣設知縣一改直𨽻邳州為屬州並所屬之睢寧宿遷二縣歸徐州府轄改分駐徐州之淮安府同知為徐州府同知增設通判經厯各一改州同為縣丞吏目為典史南北岸州判為主簿學正為府教授訓導管縣學巡檢驛丞閘官歸縣轄又請分夀州置一縣設知縣典史各一改夀州訓導管縣學又增設定遠縣池河驛巡檢一均議行定徐州附郭縣曰銅山夀州分縣曰鳯台十二月條奏鹽政巡緝事宜請于儀徴縣之青山頭增一營設守偹把總各一兵百巡船四江都縣之馬家橋甘泉縣之邵伯鎮北壩僧道橋各設把總一兵三十揚州府搜鹽廳委佐雜一員同武辨監查新設之三江營同知改為鹽務道淮所選府佐監掣淮南之泰壩淮北之場關大伊關永豐壩烏沙河湖口及泗州天長俱揀員管理淮北埧所埸關事歸淮揚道轄督緝事歸淮揚準徐二道分轄部議從之十一年正月調雲貴廣西總督先是雲南思茅土把總刁興國等滋事前督髙其倬擒興國餘黨尚未解六月尹繼善奏言元江臨安賊勢猖獗臣調鶴麗鎮總兵楊國華領兵往兀江與臨元鎮總兵董芳協剿賊潰匿臘縱我軍遣諜入賊寨舉火奮勇衝入斬賊酋三從賊百餘生擒六十九十一月又奏言元臨內地現平定而攸樂思茅餘孽未清臣謂兵𠞰捕念地方遼濶兵到勢必奔竄酌出東西兩路東路兵分三支一由紅藤箐黨戞黨别出慢岔河底一由思茅糯龍那列慢蚌等處至茄色猓所及磨胖三達一由孔明山莽通莽瓦及小猛崙等處分布堵𠞰事竣會合攸樂清理三十六寨西路兵分二支一由關鋪板角一帶一由白馬山圈羅一帶搜𠞰事竣會𠞰六困再分遣土練沿江堵禦防奔軼令投誠賊酋刁輔國等隨軍效力今已攻破賊柵十五寨五招降夷民八十餘寨其遁匿餘黨分路圍𠞰務在廓清臣惟攸思一帶非元臨內地可比非兵不足示威恃兵又無善後所期恩威並濟操縱得宜庶邉圉永寧疏入諭曰𠞰撫名雖二事恩威用豈兩端當撫者未妨明示優容當𠞰者亦宜顯施斬馘俾其知順則利而逆則害方可期近者悅而遠者來今此目前攻心之師即寓將來善後之舉是乃仁術非關詐謀寧止綏靖普思將見信孚莽緬也識之十二年三月奏貴州新闢苗疆八事一台拱舊營改建於歐家寨一升台拱營為鎮移清江鎮總兵駐之置中左右三營設逰擊守備各三千總六把總十二降清江鎮為協設副將統原設左右二營一移清江同知駐台拱增鎮遠府理苗通判駐清江裁天柱縣縣丞增施秉縣主簿駐台拱一歐家寨河可達下秉疏浚以通台拱糧運一台拱增兵擇各鎮協營精練撥補一各寨荒田諭復業一清查九股苗寨界址擇舊頭目之良善者按寨大小酌定鄉約保長甲長管束稽查一古州清江界之朗硐地方分設塘汛令文武官辨巡行化諭部議從之七月奏雲南濬土黃河工竣起土黃經西隆西林土富州土田州過剝隘至百色袤七百四十餘里得旨嘉奬十二月奏貴州台拱改鎮增兵請令本標右營逰擊帶兵五百駐下秉撥把總一兵八十分防施秉外委一兵二十分防新城原防施秉之黃施營兵改防黃平州改黃施營為黃平營仍𨽻台拱鎮撥黃平營外委一兵三十分防岩門原防岩門之平越營兵撤回再撥鎮標守備把總各一兵二百駐防稿貢汛從之是月詔廣西省仍歸廣東總督轄十三年閏四月奏請於安籠鎮增兵三百定廣協增百四十思南營增設逰擊一兵百五十守備改為中軍守備歸銅仁協轄石阡營增兵百遵義黔西二協各裁都司守備左營改為中軍都司右營改為守偹留遵義協右營千總一兵百駐防桐梓縣原防之把總撤回又請撤黔西協原防安平汛兵另撥千總一兵百二十駐沙土調安順營分防灞陽汛千總一兵八十移駐安平灞陽汛改歸長寨營調安順營分防石頭寨把總一兵五十移駐平逺沙之白老虎汛石頭寨撥歸化營千總一兵五十防守又安順營之黎兒哨於提標城守後營內撥兵防守均議行七月奏貴州頑苗聚衆倡亂臣檄調雲南兵四千餘並湖廣廣西兵策應嗣雲南副將紀龍勦破清平賊穴恭將哈尚德收復新舊黃平二城與紀龍合兵至重安渡江副將周儀參將崔傑都司陳思儀等收復餘慶縣獲賊酋羅萬象等廣西總兵王無黨帥兵二千五百與古州總兵韓勳援勦八寨髙州總兵談行義帥兵四千九百協剿鎮遠一路臣又委無黨帥廣西兵八百並前調至之湖南兵三千至鎮遠總統襄陽總兵焦應林帥兵二千已起程大兵雲集分路會勦破逆巢數十斬首千餘生擒賊酋阿九清平黃平餘慶平越現俱平定鎮遠施秉偏橋都勻黎平俱無疏失疏入命停派往駐常德之熱河保定浙江湖廣兵乾隆元年設貴州總督以尹繼善為雲南總督二年閏九月奏豁雲南軍丁銀萬二千二百有竒允之是月來京陛見以父尹泰年老乞留京命為刑部尚書兼管兵部事議政處行走十二月充經筵講官三年丁父憂四年正月疏言臣兄尹立善素不安分臣父尹泰奏請發黑龍江經今五年洗心改過乞恩赦回令于錦州看守臣祖父墳墓許之五月晉太子少保教習庶吉士七月充翻譯鄉試正考官八月充三禮綱目兩館副總裁五年授川陜總督時松潘鎮總兵潘紹周以郭羅克畨滋事疏請勦之敕與總督提督會商尹繼善檄諭畨目擒獻夾壩畨衆畏服六年奏善後四事一分設土目擇上中郭羅克副土目給外委土百户委牌分管各寨再設副土目數名協理一頒給打牲號紙按畨寨大小酌印號片出口人給一紙無者擒治一寬從前積案畨人所劫牲畜年遠根究為難夾壩既經痛懲均免追問一撤駐防兵前督查郎阿奏準每年撥兵二百駐防畨地千餘里兵力不足控制恐日久玩生應撤回以省遠戍諭曰所辦甚妥仍因時制宜為之先是御史李㥳參奏甘肅有司諱災不報命㥳與尹繼善會勘得實尹繼善因請將巡撫元展成等分别治罪併自請議處尋部議銷加一級七年丁母憂八年二月署兩江總督協理河務命馳驛赴任賜以詩曰淮沛今何似災餘不忍言邇來闕二釜誰與辦三餐敢靳司農帑還祈大造恩當春應舉趾積􅕙尚留痕民瘼遐觀在心憂夢想存勉伊經畫策為我活黎元五月疏言臣欽承恩命同任河防夙夜靡寧寢食幾廢伏以久離江南情形各異詳勘博考體察民情咸以舊制宜循萬口如一凡三事一毛城鋪宜仍舊也黃河至徐州北係山嘴南逼郡城以千支萬派之水納之數十丈之中下流不暢則上遊必壅前河臣靳輔於上遊南岸毛城鋪立減水壩下流引河以泄盛漲北岸自李道華家樓至蘇家山不設堤工聼其漫入微山湖由荆山口入運少殺其洶湧之勢近則因毛城鋪進水過多圈堤築壩層層堵閉致南岸淤髙大溜側注北岸石林一帶處處受險欽差大臣議於壩口水底用亂石填髙臣按此處泄水之路止有倒勾三河其餘支港俱已淤平若再填髙壩口水底是有遵照舊制之名仍與舊制不同有隨時啓閉之名實與緊閉無異不惟北岸無堤處受全黃水勢堪虞而上遊山東之滕嶧金魚等縣下流徐沛一帶城社更為可慮請仍舊制相機啓閉開通倒勾河使之順直壩堰有礙宣泄者量為撤平兩岸分流減泄勢緩水平北岸之險工可保沿河上下永享太平且減下之水歸入洪澤湖濁沙停淤黃澄為清更可助清敵黃轉害為利一天然壩宜仍舊也淮水接七十二河之水滙入洪澤湖僅恃髙堰一線孤堤為淮揚保障夏秋黃淮並漲拍岸盈堤勢難容受前河臣靳輔建三滚水壩又設天然南北二壩酌量啓閉以泄異漲思慮至為深遠新議以洪湖之水宜蓄而不宜泄欲將天然壩改建滚水石壩臣思河南疏濬賈魯河以後淮水勢大伏秋盛漲若不將天然壩開放則尾閭不暢必病中滿且舊天然土壩相水勢大小酌量蓄泄􅍾縱在人改建石壩則一定不昜無可增減當蓄而不能蓄當泄而不能泄利未見而害隨之矣請將天然壩仍照舊制其估建滚壩及南北石工無庸建築不惟節省數十萬帑金且洪湖異漲之水有所宣泄髙堰全堤可以保固一髙郵三壩宜仍舊也髙寶諸湖周圍數百里上受天長七十餘河及洪澤湖減下之水滙入運河其勢甚盛是以於髙郵迤下設立南關五里車邏昭關各壩分注下河歸海遇水漲次第開泄制最精詳新議以南關等壩開放下河必致難受議永閉髙郵三壩另建石閘七座抽板開放臣按從前各壩寬一百九十餘丈今議建石閘合計八丈四尺較舊制寬狹懸殊况髙郵等壩原與天然滚壩上下相應天然等壩寬至三百餘丈上遊來水甚多勢必仍然壅積雖於邵伯迤南疏浚入江之路亦是減水之意但其地距江甚遠江潮朝夕往來與水相抵泄出無多而迤上髙寶一帶為諸湖頂衝之區首當其險設遇水勢驟漲自必直趨附近就下之捷徑豈能紆回流遠以入江倘宣泄不及深為可慮况髙寶不能容納勢必仍掘壩以注下河洶湧驟至較之循序漸至者受患更猛請將髙郵三壩仍照舊制所議石閘七座無庸增建至下遊宣泄再行詳勘疏浚深通近水民田修築堤堰有餘之水導之入海可免瀰漫臣悉心籌酌至再至三不敢少存成見好為更張不敢狃於前議草率從事總期合舊制而順水性孚公論以洽輿情得旨應斟酌者須因時制宜九年尚書公訥親查閲江南營伍劾蘇松水師廢弛總督統轄全省咎難辭下部議降三級準抵是年江南生蝻延及山東河南上以江南有司捕治不力貽害鄰封尹繼善等徇隱不𠫭下部議銷紀録十二次十年實授兩江總督十二年三月疏言臣等前奏請於海州宿遷桃源清河安東阜寧照髙寶等處修築墟岸臣相其緩急分年修治髙厚丈尺俱為酌定修治之法務于墟外取土挑濬成溝墟身量留㴠洞使蓄泄有資旱潦足備無力者量借帑項再上江鳯潁泗三屬頻遭水患現在河渠次第開濬而田間水道墟塍實與水利相為表裏亦照例陸續興修俟著有成效遠近推行於水利善後之圗似多禆益諭曰此誠務本之圗妥協實力為之五月疏劾狼山鎮總兵黃錫申廢弛營伍詔革職十三年正月陛見將回任賜詩曰熙績匪獨能亮工資群彥詞林擅卓犖封疆推老練簡畀淮海區奏成佇底奠保障財賦地繭絲非所羡去嵗吳淞災波臣勢方扇每念幸活民玉食不能咽賑濟救燃眉其何籌久晏安民首察吏疸惡亦彰善設誠物乃孚逞明終必眩閏七月以徇庇南河總督周學健部議革職命從寬留任九月調兩廣總督十月授户部尚書協辦大學士充國史館總裁十一月軍機處行走兼正藍旗滿洲都統命署川陕總督嗣設四川總督以尹繼善為陜甘總督時大學士傅恆經略金川大兵出陜西上以尹繼善于一切安台馬匹事宜星速趕辦調度得宜詔加恩開復其從前革職留任十四年正月詔尹繼善與內大臣傅爾丹尚書達勒黨阿舒赫德參贊軍務二月晉太子太保十五年二月疏請修文武成康周公太公陵墓享殿下部知之十一月西藏羅卜藏扎什不靖四川總督策楞統兵入藏敇尹繼善管川陜總督事十六年復調兩江總督十七年四月尹繼善以上江頻被水疏請濬宿州之濉河彭家溝泗州之謝家溝虹縣之汴河上遊又修築宿州符離橋靈璧縣新馬橋砂礓河尾黃疃橋翟家橋詔如所請行是月湖北羅田姦民馬朝柱聚衆於天堂寨圗不軌界連江南尹繼善檄夀春鎮總兵解光宗統兵搜捕並親往擒獲朝柱家屬黨羽甚衆疏聞得旨嘉奬下部議敘十月召來京十八年正月署陜甘總督二月以前兩江任內承審江西千總盧魯生等傳抄偽稿一案不能究出實情部議革職命從寬留任八月又以徇縱南河劣員虧帑誤工議革任命寬免仍注册九月授江南河道總督先是哈密蔡伯什湖屯田萬畝於雍正十三年屯兵承種乾隆七年改回民承種嗣貝子玉素富以收成歉薄請罷事下尹繼善及安西提督王進泰議至是尹繼善奏言從前開渠引水幾費經營近日歉收實由回民不諳耕作所致即使水澤偶有不敷亦斷無舉萬畝屯田概行廢棄之理伏思開墾此田原為接濟兵食請選安西兵丁子弟或招各衛户民承種既於兵食有益且有此壯丁二百餘依安西屯户團練之法又可寓兵于農協同防守臣已調任南河謹就所見陳之上韙其言十九年二月疏言黃河之水挾沙而行停滯積久成灘灘之所在則水射對岸而堤工受險聖祖仁皇帝諭於曲處挑直使得暢流誠萬世治河之良法臣按銅沛邳睢宿虹河道多曲折大灘日淤日積急宜切去灘嘴開濬引河導溜歸中央借水刷沙既省兩岸堤掃費並免逼溜偏趨奔突沖激之患其土堤不甚險要者每年加髙五寸險要者及時修理庶河防穩固而青黃不接時亦可寓賑于工詔如議行八月署兩江總督十二月兼署江蘇巡撫二十年正月上以尹繼善前任兩江有沽名要譽之習諭誡之四月奏言臣長子户部員外郎慶雲性情暴戾請革職發往錦州看守墳墓詔如所請並諭曰尹繼善自行覺察據實直陳無所徇隱著加恩令於諸子中擇可承廕者以聞尋請以苐四子慶桂承廕許之十二月奏請於江西湖南湖北三省各撥米十萬石運至江蘇偹來春平糶上報可二十一年二月疏言洪澤湖有入海入江二路入海之路甚遠興鹽一帶形如釡底海灘髙於內地潮大時內外相抵不能暢流入海惟入江之路宣泄盛漲最便然淺阻處多如東西灣兩壩減下之水由石羊溝入江河身僅寬三四丈又有兩岸灘嘴阻抑應開金灣六閘並金灣滚壩減下之水由芒稻閘河達董家溝入江引河淺阻應疏又璧虎鳯凰二橋減下之水由廖家溝入江河口淺阻灣曲應加寬芒稻迤上石羊溝並廖家溝董家溝歸江水道阻塞應濬又興鹽等邑之天妃閘青龍閘及白駒南閘為下河衆水滙聚磯心閘牆之損壞者應修允之三月奉旨覆審浙江按察使富勒渾劾巡撫鄂樂舜勒𣲖商銀案所劾實仍坐富勒渾以誣告加等罪上責尹繼善所擬悖謬詔革職留任十月實授兩江總督命紫禁城內騎馬二十二年正月解南河總督事務二月上南巡賜詩曰幕府山邉開幕府風規得似茂𢎞無保釐務布兆民福清蹕寧求一已娛靜柝久曾歷數省建牙今復鎮全吳吏民相習休云易朂爾思艱莫漫圖初丁憂江蘇巡撫莊有恭奏捐職州同朱𣆀主使斃命律應絞罰贖外結命尹繼善同新任巡撫愛必達查審四月奏有恭罪在專擅贓非入已詔免有恭死發往軍台效力諭曰莊有恭辦理朱𣆀贖罪外結一案尹繼善既經莊有恭告知即應據實恭奏否則正言阻止莊有恭自不敢視為泛常致干重辟及奉到朕旨尹繼善亦當備述前情速為辦理乃遲回觀望希圗模􅏢了事經朕屢行飭催并將莊有恭革職拏問始稱原曾與聞是縱莊有恭之情罪而釀成其事始終皆由於尹繼善也尹繼善交部嚴加議處尋議革任命寬免仍注册七月疏言沛縣地勢本低昭陽微山諸湖環之山東濟泗汶滕山水奔注滙歸來源多而去路少不能驟消臣按湖水去路自荆山橋外尚有湖口閘與韓莊閘相近為泄水尾閭閘僅丈餘不足宣泄臣商之山東撫河諸臣或建滚壩或建閘座使湖水暢流入運又山東沂河自北而南入駱馬湖近因水大於邳州之盧口散漫入運與荆山橋泄下之水相阻皆為沛縣受病之由臣飭員相度堵修上以所言中形勢俾通盤勘辦十二月同侍郎夢麟等會奏淮揚徐海支幹各河暨髙寶各河工竣下部議敘二十三年疏𠫭夀春鎮總兵納漢泰不勝任詔奬所奏得大臣體二十五年上以江蘇錢榖殷繁令增設布政司分理敕下督撫酌議尹繼善等奏請分江寧淮安揚州徐州通州海州為一布政司駐江寧蘇州松江常州鎮江太倉為一布政使駐蘇州安徽布政使移駐安慶從之二十七年上南巡賜詩曰保障資三省忠勤著兩朝節樓無過久幕府獨稱超善得軍民服兼能上下調暇還工作誦吉甫可同條尋命為御前大臣二十九年晉文華殿大學士仍留總督任三十年二月上南巡賜詩曰綸扉昨已命和羮江國仍資扈蹕行明代稱賢必王石漢家推盛則韋平封疆幾處皆時望旌節三年獨老成亦識心殷依北闕待宣入閣贊樞衡四月上以尹繼善年屆七十恩賞韋平介祉匾九月召來京入閣辦事兼管兵部事務充國史館總裁十月充尚書房總師傅教習庶吉士三十一年充會試正考官三十三年充經筵講官三十四年兼翰林院掌院學士三十六年正月上東巡命留京辦事四月卒遺疏入諭曰大學士尹繼善學識優通老成端謹歷封疆者三十餘載綏輯協宜洎入贊綸扉兼直禁近恪勤奉職倚畀方殷今春東巡啓蹕前見其精力就衰時嬰微疾因令留京安攝兾得速痊每于閣章郵便詢悉病勢漸增特𣲖御醫診視諭其服藥調理以起沈疴并令在家靜飬不必力疾趨覲回鑾後時遣侍衛存問知其日漸委頓厪念有加今聞溘逝深為軫悼著加贈太保入祀賢良祠賞給內帑銀五千兩辦理喪務并派皇八子前往奠醊應得恤典仍著該部察例具奏尋賜祭葬諡文端四十四年御製懷舊詩列之五督臣中詩曰八旗讀書人假藉詞林授然以染漢習率多忘世舊問以弓馬事曰我讀書秀及至問文章曰我旗人胄兩岐失進退故鮮大成就自開國至今任事奏績茂若輩一二耳其餘率貿貿繼善為巨擘亦賴訓迪誘八年至總督異數誰能遘政事既明練性情復溫厚所至皆妥帖自是福量輳能詩略如白唱和亦頗富獨愛馳驛喻知寓意不留子慶桂現官兵部尚書慶霖現官青州副都統託庸託庸滿洲鑲黃旗人姓富察雍正四年由筆帖式授户部主事纍遷郎中初託庸曾祖吉勒塔巴以軍功授雲騎尉遞加至三等輕車都尉八年託庸降襲雲騎尉乾隆五年擢署安徽布政使六年調署廣東布政使七年實授九年署廣西巡撫疏言桞州慶遠二府逼近苗寨不肖之徒包攬詞訟勒謝或冒稱兵役入寨滋擾臣飭屬嚴拏究懲諭奬其留心尋疏劾布政使唐綏祖擅動庫帑假公漁利詔革綏祖職尋命總督策楞察審十一年正月審明所參全虛惟託屬購人參屬實已革職毋庸議事詳綏祖傳先是廣西銅礦二八抽課餘銅官買供鑄每百斤給價六兩八錢綏祖為布政使時請增價十三兩零部議準增至九兩三錢託庸既劾綏祖因請將增價官買事停止改為三七抽課餘銅聼商自售閏三月奏言試辦已八閲月商本尚屬不敷請仍加二抽課官買餘銅每百斤應增價十六兩二錢諭曰從前託庸奏稱唐綏祖收買銅斤增價十三兩有零之處應行停止請將二八抽課之例量加一成作為三七抽課餘銅聼啇自賣啇民自必爭先認採出銅日多可得源源鼓鑄朕交大學士等面詢楊錫紱據稱將來銅厰果旺每年出銅七八十萬或百萬斤方可抽課二三十萬斤若如數年以來抽課不及十萬斤則于官銅轉絀交部一併定議部議若照三七抽課恐不敷鼓鑄之用應令該署撫妥議具題嗣據託庸議稱商人趨利如鶩有利可圗孰不踴躍從事請將三七抽課之處試行一年再定今則奏稱商本不敷試辦八月不能有濟仍應加二抽課并請加增至十六兩二錢方敷收買之價此案經朕往復致詢託庸堅執已見以為事屬可行今試行八月不能有效仍請照前辦理不但與唐綏祖所請之意相同而價值更為增多此又何説可見託庸彼時不過因𠫭劾唐綏祖之後有意將此事更張以顯唐綏祖之過耳朕又聞得粵西辦理此事自託庸奏準以來各處搜查民間藏銅定限比役甚為擾纍而伊奏摺中并不自知辦理未善引過認咎巧於回護掩飾前非著交部察議尋議革職八月授山西兾寧道十二年調河東道十三年閏七月巡撫凖泰疏𠫭託庸承勘山陕沿河灘地偏執市恩得旨革職八月命以郎中銜補杭州織造兼管闋務十五年廣西巡撫舒輅疏𠫭託庸前任應賠銀兩屢催不完諭曰託庸由部員擢任藩司簡署巡撫乃乖張任性於𠫭劾唐綏祖一案經該督等查明俱屬誣罔因薄示懲警旋復授為山西道員又因承勘所屬雞心灘一案偏執已見經巡撫凖泰𠫭奏朕因其意見偏謬不宜有司之任但久歷部曺特授為浙江織造豫以報效自新而伊全無感激黽勉之意召見時仍支吾取巧因敕山陕巡撫覆勘適大學士忠勇公傅恆歸途之便亦令其公同閲看仍照巡撫所議觀此則託庸之妄誕殊屬無恥著革職該旗查明家産抵補賠項二十年授安徽布政使兼𬋩江寧織造二十五年調江寧布政使二十六年遷廣西巡撫尋調安徽二十七年上南巡賜詩曰連疆來接駕咨政引同舟共濟義應繹勤宣業可修老看身益壯人實食無浮虹宿被災地欽哉善恤賙八月疏言安省應修懷寧桐城等處城垣三十四處需銀八十萬有竒若僅動匣費三萬兩興修告竣無期請照減二五捐監之例於安省勸輸報捐為城工費軍機大臣議如所請二十九年三月奏捐項足用命即停止十二月疏言沿河各屬墟田堤壩向皆民修本年夏江漲漫缺處多無為州尤甚計二百五十餘處民力一時不能修築請於廬鳯道水利餘銀內借銀三萬兩三年歸欵得旨允行三十年上南巡賜詩曰又下大江來舟行許扈陪率因咨衆隱遂以訪羣材莭操古松似精神秋水哉恐妨誤程吏數日便教回尋擢兵部尚書兼議政大臣三十一年命紫禁城內騎馬三十二年調工部三十三年四月調刑部六月授鑲紅旗滿洲都統尋調正黃旗七月復調兵部尚書晉太子少保三十四年遷吏部尚書三十八年九月以病乞解任遣醫診視命以原官致仕晉太子太保十月卒諭曰吏部尚書託庸練達老成恪誠匪懈敡歷中外盡職宣勤比年以來雖齒逾八旬而精力尚未衰邁昨據奏病後步履漸艱懇請解任因準其所請晉太子太保以原官致仕俾得安居頥飬以葆大年兹聞溘逝深為軫悼著派散秩大臣一員帶侍衛十員往奠茶酒應得恤典仍著該部察例具奏尋賜祭葬如例諡誠慤子富察善襲雲騎尉世職官至盛京工部侍郎兼奉天府府尹髙晉高晉滿洲鑲黃旗人大學士高斌從子父述明官涼州總兵雍正十年九月高晉由監生授山東泗水縣知縣調任海陽恩縣乾隆四年遷陕西邠州知州八年擢知榆林府十年遷榆葭道十一年調江南淮徐道十二年丁憂十三年授山東運河道十四年三月遷山東按察使四月署兩淮鹽政六月回任十五年三月遷安徽布政使兼管江寧織造二十年擢安徽巡撫二十二年春上南巡親蒞河工相度命髙晉與張師載合辦徐州黃河兩岸堤工十月奏言宿州靈虹等處浚河夫多鳯潁一帶災區諸工並舉米價日昂臣動工程銀三萬兩購米運工尚虞不敷潁屬河道將次興修更須多方接濟皇上念淮徐海工截漕二十萬石平糶懇酌撥五萬分濟上江各工從之十一月會奏浚安河淤淺以通尾閭分林子河入鮑家河使安河進水之地有所分更免壅遏上嘉之詳裘曰修傳御賜詩曰江分上下各撫治簡劇因之寄任殊以汝慎勤應勝此鳯廬共念洊災區二十三年三月協理江南河工四月上江河工告竣下部議敘七月加太子少傅二十五年奏言興修水利存銀十三萬餘兩貯廬鳯道庫備續辦工程又水利善後章程案內嵗撥司庫匣費銀三千兩交道庫偹嵗修用查府州縣倉庫錢糧交代例由道府加結咨部嗣後廬鳯道到任請照府州縣例限兩月交代藩司按限移催接任員具册由司加結轉詳咨部如逾限及交代不清照例𠫭處並責成藩司每年將廬鳯道庫委員盤查結報如所議行二十六年三月授江南河道總督五月奏髙寶興泰積年被水恩允將髙郵之南關車邏等壩封土三尺於金灣壩下挑新河泄水歸江洪湖運河之水不致漫壩東注髙寶興泰可免西來水患惟是下河州縣支河汊港及田間積水俱滙入串場河北至鹽城縣石䃮天妃等閘歸海驟難消涸是下遊被淹應杜其來源而本地積潦亦當籌其去路查范公堤綿亘六百餘里串埸河自南而北向建石閘十八均有引河泄水歸海嗣因洪湖水由髙郵各堤東注下河形如釡底水未到閘地已被淹是以不暇計及閘下之引河今南關等壩既已封土金灣又開引河經始既有成模善後必歸全局現在鹽城之石䃮天妃閘引河由新洋港歸海泄水甚暢興化之白駒青龍八社大團等閘引河由鬭龍港歸海頗資宣泄迤南之丁溪小梅迤北之上岡北草堰陳家沖等五閘未及挑浚請將丁溪小梅二閘引河浚通再開一引河滙入王家港歸海上岡草堰陳家沖三閘引河浚深再開一引河滙入射陽湖歸海俾散漫之水裁灣取直滙歸海口數州縣積水節節流通小民見水消涸必合力挑溝築墟蓄泄兼資沮洳漸成沃壤詔妥協辦理二十七年二月授內大臣三月疏言湖河之水以五壩為來源以江海為去路運河歸江自邵伯以下向設灣頭閘壁虎橋鳯凰橋西灣壩東灣壩金灣滚壩金灣六閘宣泄湖水由鹽河歸廖家溝董家溝石洋溝芒稻閘分流下注查金灣壩引河緊接六閘地居上遊由董家溝下注最捷惟滚壩寬五十丈河身寬十五丈河底八丈未能暢達金灣六閘舊有鹽河由􅉭稻閘滙金灣壩水入江去路甚暢今金灣滚壩既挑新河六閘金門應量為展寬又東灣滚壩於乾隆二十二年落低三尺西壩應一體落低挑深河頭以導水勢六閘鹽河舊為歸江水道設南北中各二閘河頭築堤分三路滙歸一處應留北二閘以濟鹽運南中二閘之底稍髙滚壩過水遲滯應添建石壩三十丈接長閘下土壩酌挑引河則髙寶湖水歸江宣泄益暢上是之御賜詩曰撫皖昔𠫭爼督淮今建旌簡賢我為切盡職爾應誠兩世司河務一心如水清朂哉為國幹便是繼家聲十月疏言山陽海州沿海設葦蕩左右二營嵗徴蕩柴二百二十五萬束𠫭將一守備二船務守偹一督辨兵採運各廳濟工法誠善也秋冬開採新正裝運額設採割兵一千四百名浚桞石船五百七十船兵一千三百餘名五六兩月載左右營蕩柴陸續交工該管武辨於額料欵項册不能稽查細密兵目沿途盜賣淮揚徐二道各經管黃運湖河工程未能兼顧河庫道駐清江與葦營運柴之河相近請就近改歸兼管如所議行二十八年十月加太子太傅二十九年四月疏言清口以上桃宿等廳專受黃水清口東壩以下淮黃合流至雲梯關迤東歸海仰遵聖訓將清口東西壩展寬俾湖水暢注不致由五壩旁泄惟山安海防二廳北岸之五套南岸之陳家浦􅘇勢坐灣將成頂沖入袖之勢廳營請幫築舊堤接添魚麟越堤臣查雲梯關外近海與其築堤束水致添新工不如于舊堤上首作斜長子堰約漫灘水滙正河入海尾閭寬濶於就下之勢益暢諭曰髙晉奏籌辦雲梯關黃河下遊情形一摺所見甚是雲梯關一帶為黃河入海尾閭平沙漫衍原不應設立堤岸與水爭地而無識者好循浮言或以上流清口泄水分數較多遇海潮盛時或不免意存顧慮因有子埝堤防之議殊不知清口暢泄其收利在下河州縣者不可數計至雲梯關附近不過阜寧安東二邑所轄地面以此衡彼其輕重大小不待智者而知即令一時偶值盛漲所漫溢者不敵百分之一二耳髙晉當守其定見既知下遊之制防一切毋庸置議益可信清口之展放無難永遠力持於水利民生交有禆益二十年三月授兩江總督仍統理南河事務三十一年正月奏審蘇州府同知段成功縱容滋擾案諭曰髙晉具題審擬段成功縱容家人書役詐擾纍民一本內稱該員因患瘧昏迷不能檢點案牘家人龔玉等婪贓各欵該員均未知覺等語所辦甚屬錯謬明係承審之員有意開脫兾圗從輕完結耳髙晉自擢任總督以來甫經審辦𠫭案即意存曕徇巧為嘗試此等伎倆豈能逃朕洞鑒江南吏治廢弛已久現在督撫正當更換之時髙晉尤宜加意整頓力矯積習何意竟敢於姑息朦混若此看來案必出自朱奎掦之意朕知朱奎掦素非善類髙晉遂墮其術中漫無覺察耳本應將該督交部嚴加議處第念髙晉新任總督初次獲咎且在總河任內尚能實心任事姑從寬宥此後若再不知改悔必不能為之曲貸也髙晉此事實屬昏憒糊塗負朕恩矣著傳旨嚴行申飭此本已交內閣擲還該督另委賢員秉公確審務得實情以成信􅀈若尚回護希圗了事朕必有另辦之法可惜朕造就髙晉之恩矣命侍郎四達會同審訊尋究出成功實有染指弊上以髙晉初審辦時聼屬員袒庇開脫交部嚴加議處成功復以前任陽曲縣虧帑案上司代為彌補鞫實抵罪十月奏督撫文移請槩用紫花印停止布政使用得旨俞允三十二年五月奏揚州府教場向設城內基址狹隘操演僅容騎射另在城外打靶一營兩處演習與制不符臣飭移建西門外其城內舊基商衆呈建神祠按年納租銀除移建支用餘備軍裝公需疏入報聞三十三年正月奏言江南武鄉試上下江巡撫輪赴江寧主考但駐劄較遠請歸總督就近考試從之十月奏河工未備事宜一河庫錢糧應盤查河庫道於工料準銷後嵗報具題庫存銀數河臣盤查並不保題請每年四月奏銷後及新舊道員交代河臣赴庫盤查督臣核實保題一洪澤湖救生樁銀宜核減湖遇風濤虞致覆溺嵗支上下江耗羡銀各五百兩購樁簽釘湖邉以廣救濟近年全湖歸清口湖邉多淺灘汊港入裴家場太平河皆可泊請查勘停修其必須留存者核估詳辦詔如所議行十二月署湖廣總督兼攝荆州將軍事三十四年二月仍回兩江總督任三月兼署江蘇巡撫十月疏陳採辦滇銅上以江南通洋甚便敇籌辦洋銅鼓鑄髙晉奏言臣遵旨折中定價收買小錢改鑄制錢請即以應發洋商銅本銀收買查寶蘇局嵗用銅鉛點錫共九十二萬一千六百斤今收買廢錢既多應即以抵補額用銅鉛之數小錢質粗性脆以銅鉛點錫均勻搭配再加配黑鉛試鑄即可以一律光潤除銅鉛錫入爐鎔化準折耗統計廢錢一百萬斤較専用洋銅節省盈餘錢萬一千餘串再查寶蘇局每年應鑄二十八卯額需銅四十六萬八百斤現有商人應交銅斤收存廢錢及在途滇銅三十萬斤共銅一百四十萬斤每年配用二十萬餘斤足供七年之用民間未盡小錢又展限三月收買非特滇銅可停即加辦洋銅亦可緩上善之三十五年兼署漕運總督三十六年春上巡幸山東髙晉自江南趨覲行在賜詩曰壤接因來輦路迎六年一日此丹誠防河積榖胥籌度察吏安民屬老成省嵗稔多原致喜任官賢少輒為怦俞哉回任勤諸政豈在劬勞扈蹕行五月晉文華殿大學士兼禮部尚書仍留兩江總督任八月上以髙晉明練河防詔會同侍郎裘曰修總督楊廷璋籌勘永定河蕆事後詣闕恭祝皇太后萬夀十一月賜青狐端罩在紫禁城內騎馬是月回總督任四十年七月河東總河姚立德奏請蜀山湖收蓄伏秋汛水工部以向例於十一月煞壩收蓄汶河清水議駁上以十一月水落歸槽汶水漸微不足備來年濟運命髙晉會同立德山東巡撫楊景素確勘議奏九月會奏蜀山湖周六十五里在汶河南運河東素名水匱濟南北運臨汶有永定永安永泰三斗門臨運有金線利運二草閘用資蓄泄乾隆二十八年運河道李清時詳請酌定伏秋汛內收水以九尺八寸為度緣湖東北只馬莊一泉入湖全賴收蓄汶水始敷全漕應用此歷年籌辦濟漕之章程也必俟十一月始收清水誠如聖諭不足存瀦濟運查蜀山湖為苐一水匱向定九尺七八寸不無過拘請以一丈一尺為率從之四十一年總河吳嗣爵奏黃河兩腮􅌎髙中間溝槽窄狹洪湖運河􅌎墊現在清口開挑引河帶水潦挖恐於事無濟命髙晉同薩載籌酌奏覆五月奏言康熙初年黃河海口積沙橫亘二十餘里黃河從東北紆回入海河臣董安國創築攔黃大壩另闢馬家港口去路不暢轉致上遊易潰康熙三十八年拆攔黃大壩仍由故道入海即今之大通口是也查該處海水黃水交接兩岸接生淤灘南岸遂有新淤尖尖頭洋之名北岸有二浤三浤四浤之名現今海口距從前王家港地方四十餘里灘勢愈長海口愈遠近年黃水倒灌致通湖引河淤墊清水不能暢出清江淮安一帶運道停沙清口以外黃河兩腮勢髙上年秋間豐碭南岸丁家集外灘民堰刷塌溜向南趨黃水從毛城鋪滾壩旁流徐州以下銅沛邳睢宿虹桃源黃河水緩沙停惟有浚清口以內通湖引河停淤使清水暢出與黃水滙流東注并力刷沙則黃河不濬自深海口不疏自治查向年通湖引河五道暢注禦黃鮮有倒灌今年湖水未能暢出遇黃水盛漲力不相抵必致倒灌一經倒灌則引河復淤非特不能刷沙黃運兩河又不免淤墊須于冬春湖水消時依各引河寬長丈尺兩頭煞壩挑深并將清口東西壩址移下一百六十丈在平城臺建築使清水源遠流長出口之勢有力於陶莊迤上積土之北開引河一道使黃水繞北下注清水暢行至周家莊會黃東注不獨可免倒灌而二瀆并流攻刷黃河兩腮浮􅌎及海口積沙均可漸次刷深下遊深通則黃河上流可免停􅌎且洪湖無壅堰墟磚石工程常資穩固惠濟祠掃工更可化險為平得旨此奏皆合機宜形勢是治淮黃一大關鍵屆時妥為之是年冬入覲髙晉年七十御書鈞莭延禧額賜之四十二年八月奏豐碭廳屬唐家灣倒勾引河泄黃河盛漲由毛城鋪石壩下注歷洪河濉河滙歸洪澤湖每年伏秋大汛徐城水志長至一丈一尺五寸始開放減泄查倒勾引河居徐城上遊距徐城二百里徐城水志長至一丈一尺五寸上遊水已逾志逮輾轉開放徐城水志已不止一丈一尺五寸矣奔騰下注流行不及致洪濉二河壅遏臨河之蕭縣宿州靈壁每致被淹與其減于既漲之後莫若泄其未漲之先應請嗣後水志以唐家灣為凖俟長至九尺五寸即將倒勾引河草壩啓放殺其盛漲由毛城鋪及時分泄上善之四十三年四月赴浙會同巡撫王亶望相度海塘詳見亶望傳七月命赴豫堵築儀封漫口時舊河已淤成陸髙晉籌於漫水口門分東西壩堵築就舊有順堤河淤十八堡外灘起至翟家莊開引河達入舊河並浚舊河淤以暢水勢堵築十八堡缺口攔順堤河水歸新開引河切去十六堡口門對岸灘嘴奏入報聞九月時和驛漫口風暴刷深全河溜注口門髙晉請交部議處得旨寬免十月以徇隱髙朴盜賣官玉部議革任詔免革任注册十二月時和驛八堡漫口合龍後儀封新修掃工蟄陷請交部嚴加議處諭曰時和儀封兩處本應同時合龍前此髙晉等因時和驛水深沙活施工稍艱而儀封溜勢平緩辦理較易即先將儀封堵閉亦屬乘便巧辦先完一工之意如果經理得宜俾無後患未為不可今新收掃工復因溜勢湍激致有蟄塌之事則工作原未穩固可知髙晉等督辦何事責無可辭著交部嚴加議處部議革任詔免革任注册尋會奏儀封漫水由順堤河奪路直達考城其儀封十五堡以上堤外尚有淤灘至十六堡漫口逼近河身土性鬆浮口門上下刷深河身北髙南下引河在北非將河水湧髙不能掣溜北趨注正河但河水一經湧髙壩工難免蟄裂須將引河再深三四尺正河底接挖深溝六百餘丈將兩壩進掃築實金門兩旁邉掃加寬三四丈口門收至二三丈時多壓厚土俟引河挑深水勢湧髙開放掣溜後再將壩工堵築則合龍時水勢平穩可期鞏固得旨宜即妥速為之是月卒四十四年正月諭曰髙晉品行端醇材猷練達老成敦朴體用兼優由州縣洊陟封疆宣勤奉職敡歷多年自簡畀綸扉仍管兩江總督秉公持正董率有方其兼管南河事務亦能經理得宜深資倚任昨以豫省漫口工程緊要特令騎赴工次督辦堵築事宜近據袁守侗等奏其染患痰咯之症不能眠食即𣲖乾清門侍衛布彥達賚帶同太醫院堂官陳世倌馳往診視並諭安心調養以兾速痊兹聞溘逝深為軫惜著仍𣲖乾清門侍衛布彥達賚馳驛前往奠醊並加恩入祀賢良祠其任內革職降級注册之案俱著開復應得恤典該部察例具奏豫祭葬如例諡文端復賜挽辭曰本以修堤藉碩謨詎虞病不起中都祗緣下楗虧工屢更值僨轅敗事殊漠不關心豈卿也愁因致疾究忠乎考終入祀夫何恨寧識懷賢痛惜吾三月上製懷舊詩列入五督臣詩曰從來擢督撫德才量並重以此下僚中百無一二中自知縣起者􅀈斯必超衆晉也實其人故悉下情洞更兼習河務要任久倚用乃以治河決來豫屢稽功憤悶因致疾不起誠堪痛歷歷懷舊臣中外資經綜而豫未歇肩籲俊期與共子書麟官至兩江總督欽定八旗通志卷一百四十三
