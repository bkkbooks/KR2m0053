body:
  text: 欽定四庫全書欽定八旗通志卷一百四十三人物志二十三大臣傳九滿洲鑲黄旗九晉尹繼善託庸髙尹繼善尹繼善滿洲鑲黄旗人大學士尹泰子雍正元年進士改庶吉士散館授編修充日講起居注官五年三月遷侍講兼户部郎中九月命往廣東察審布政使官達按察使方願瑛受賄徇庇案得實即署按察使六年四月授内閣侍讀學士協理江南河務八月署江蘇巡撫七年二月實授尋署河道總督十二月疏禁收漕上司陋規及官吏浮費每石定為加費六分半給旗丁半給州縣常平社倉捐榖聴民樂輸不得隨漕勒徵詔如議行八年奏言崇明屹峙重洋為江南屏障知縣不足彈壓請増設巡道駐之兼轄太倉通州至縣属沙地遼濶鎮標四營駐城内廵察難周應撥左營駐永興沙増廵檢一駐半洋沙移縣城廵檢駐大安沙並撥左營千把總二恊同分防其戱台等沙各設哨舡廵緝福山營為江防門户應撥蘇鎮沙舡四𨽻之與京口狼山等汛按期㑹哨又江蘇按察使駐江寕距廵撫治所遠請移駐蘇州蘇松道責在廵防應移駐上海下部議行九年署兩江總督奏請析淮安府属之山陽縣為二増知縣縣丞典史各一治廟灣鎮移廟灣司廵檢駐草偃口塩城清溝司廵檢駐上岡撥塩城縣訓導歸新縣析揚州府属之江都縣為二増知縣典史各一撥主簿訓導及邵伯上官二廵司并邵伯驛歸新縣又如臯縣増設主簿一駐掘港場均議行定山陽分縣曰阜寕江都分縣曰甘泉十年正月恊辦江寕将軍兼理兩淮塩政疏言京口為江淮鎻鑰南北咽喉向設沙舡五十六艍犂舡三十二水兵千四百餘寔水師重鎮乃𨽻将軍標陸路兩營陸路将弁不諳水性船隻水手又遠駐距鎮江数十里之髙資港春秋兩􅍾外将不知兵兵不知伍請於髙資港設水師都司千把總各一歸江隂水師副將轄􅍾暇教以技藝資防禦江寕為省㑹重地襟帶長江居京口狼山上㳺駐防兵學習水師向撥将軍標沙舡二十水兵三百餘春秋􅍾演但􅍾期止選鎮江千把總四員至江寕分配教習事竣仍回本任無論暫時𣲖撥並無責成難収寔效其實鎮江将弁初不能教習水師至今三百餘兵技藝未習且家在鎮江僕僕往来經管旂員素不熟識請撥隙地建營房令挈眷駐扎設水師守偹一把總二専司其事歸将軍轄狼山為長江尾閭大海門户鎮標三營向設戰船二十二春秋出洋􅍾練江汛每月㑹哨近年来僅駕舡数隻兵数名往来江口並不出洋至㑹哨更属空文尤可異者赶繒大船原為出洋而設近竟髙擱沙灘臣飭交署總兵王廷梅整理期復舊觀再京口江寕𣲖佐領協領二員每月巡查江面狼山鎮標右營将弁巡查海汛中左二營亦輪派㳺巡如此庶長江數千里外聲援聫絡奏入上嘉之先是尹繼善疏請清查江蘇積欠錢粮命侍郎彭維新等㑹同辦理二月合奏言自康熙五十一年至雍正四年官侵吏蝕四百七十二萬餘民欠五百三十九萬餘疏入詔侵蝕自首者免罪尹繼善等下部議敘九月奏請改直𨽻徐州為府設知府一附郭増置一縣設知縣一改直𨽻邳州為属州並所属之睢寧宿遷二縣歸徐州府轄改分駐徐州之淮安府同知為徐州府同知増設通判經厯各一改州同為縣丞吏目為典史南北岸州判為主簿學正為府教授訓導管縣學巡檢驛丞閘官歸縣轄又請分夀州置一縣設知縣典史各一改夀州訓導管縣學又増設定遠縣池河驛廵檢一均議行定徐州附郭縣曰銅山夀州分縣曰鳯台十二月條奏塩政廵緝事宜請于儀徴縣之青山頭増一營設守偹把總各一兵百廵船四江都縣之馬家橋甘泉縣之邵伯鎮北壩僧道橋各設把總一兵三十揚州府搜塩㕔委佐雜一員同武弁監查新設之三江營同知改為塩務道淮所選府佐監掣淮南之泰壩淮北之場闗大伊闗永豊壩烏沙河湖口及泗州天長俱揀員管理淮北埧所埸闗事歸淮揚道轄督緝事歸淮揚准徐二道分轄部議從之十一年正月調雲貴廣西摠督先是雲南思茅土把摠刁興國等滋事前督髙其倬擒興國餘黨尚未解六月尹繼善奏言元江臨安賊勢猖獗臣調鶴麗鎮總兵楊國華領兵往兀江與臨元鎮搃兵董芳恊剿賊潰匿腊縱我軍遣諜入賊寨舉火奮勇衝入斬賊酋三從賊百餘生擒六十九十一月又奏言元臨内地現平定而攸樂思茅餘孽未清臣謂兵𠞰捕念地方遼濶兵到勢必奔竄酌出東西兩路東路兵分三支一由紅藤箐黨戞黨别出慢岔河底一由思茅糯竜那列慢蚌等處至茄色猓所及磨胖三達一由孔明山莽通莽瓦及小猛崙等處分布堵𠞰事竣㑹合攸樂清理三十六寨西路兵分二支一由闗舖板角一帶一由白馬山圈羅一帶搜𠞰事竣㑹𠞰六困再分遣土練沿江堵禦防奔軼令投誠賊酋刁輔國等隨軍効力今已攻破賊柵十五寨五招降夷民八十餘寨其遁匿餘黨分路圍𠞰務在廓清臣惟攸思一帶非元臨内地可比非兵不足示威恃兵又無善後所期恩威並濟操縱得宜庶邉圉永寧疏入諭曰𠞰撫名雖二事恩威用豈兩端當撫者未妨明示優容當𠞰者亦宜顯施斬馘俾其知順則利而逆則害方可期近者悦而遠者来今此目前攻心之師即寓将来善後之舉是乃仁術非關詐謀寕止綏靖普思将見信孚莽緬也識之十二年三月奏貴州新闢苗疆八事一台拱舊營改建於歐家寨一升台拱營為鎮移清江鎮摠兵駐之置中左右三營設逰擊守備各三千縂六把總十二䧏清江鎮為恊設副将統原設左右二營一移清江同知駐台拱增鎮遠府理苗通判駐清江裁天柱縣縣丞増施秉縣主簿駐台拱一歐家寨河可達下秉疏浚以通台拱糧運一台拱増兵擇各鎮恊營精練撥補一各寨荒田諭復業一清查九股苗寨界址擇舊頭目之良善者按寨大小酌定鄉約保長甲長管束稽查一古州清江界之朗硐地方分設塘汛令文武官弁廵行化諭部議從之七月奏雲南濬土黄河工竣起土黄經西隆西林土富州土田州過剥隘至百色袤七百四十餘里得㫖嘉奬十二月奏貴州台拱改鎮増兵請令本標右營逰擊帶兵五百駐下秉撥把總一兵八十分防施秉外委一兵二十分防新城原防施秉之黄施營兵改防黄平州改黄施營為黄平營仍𨽻台拱鎮撥黄平營外委一兵三十分防岩門原防岩門之平越營兵撤回再撥鎮標守備把總各一兵二百駐防稿貢汛從之是月詔廣西省仍歸廣東總督轄十三年閏四月奏請於安籠鎮増兵三百定廣協増百四十思南營増設逰擊一兵百五十守備改為中軍守備歸銅仁協轄石阡營増兵百遵義黔西二協各裁都司守備左營改為中軍都司右營改為守偹㽞遵義協右營千總一兵百駐防桐梓縣原防之把總撤囘又請撤黔西協原防安平汛兵另撥千總一兵百二十駐沙土調安順營分防㶚陽汛千總一兵八十移駐安平㶚陽汛改歸長寨營調安順營分防石頭寨把總一兵五十移駐平逺沙之白老虎汛石頭寨撥歸化營千總一兵五十防守又安順營之黎兒哨於提標城守後營内撥兵防守均議行七月奏貴州頑苗聚衆倡亂臣檄調雲南兵四千餘並湖廣廣西兵策應嗣雲南副将紀龍勦破清平賊穴恭将哈尚徳收復新舊黄平二城與紀龍合兵至重安渡江副将周儀叅将崔傑都司陳思儀等収復餘慶縣獲賊酋羅萬象等廣西總兵王無黨帥兵二千五百與古州總兵韓勲援勦八寨髙州總兵譚行義帥兵四千九百恊剿鎮遠一路臣又委無黨帥廣西兵八百並前調至之湖南兵三千至鎮遠摠統㐮陽總兵焦應林帥兵二千已起程大兵雲集分路㑹勦破逆巢数十斬首千餘生擒賊酋阿九清平黄平餘慶平越現俱平定鎮遠施秉偏橋都匀黎平俱無疎失疏入命停派徃駐常徳之熱河保定浙江湖廣兵乾隆元年設貴州摠督以尹繼善為雲南摠督二年閏九月奏豁雲南軍丁銀萬二千二百有竒允之是月來京陛見以父尹㤗年老乞留京命為刑部尚書兼管兵部事議政處行走十二月充經筵講官三年丁父憂四年正月疏言臣兄尹立善素不安分臣父尹㤗奏請發黒龍江經今五年洗心改過乞恩赦回令于錦州看守臣祖父墳墓許之五月晉太子少保教習庻吉士七月充繙譯鄉試正考官八月充三禮綱目兩館副總裁五年授川陜摠督時松潘鎮縂兵潘紹周以郭羅克畨滋事疏請勦之勅與摠督提督㑹商尹繼善檄諭畨目擒獻夾壩畨衆畏服六年奏善後四事一分設土目擇上中郭羅克副土目給外委土百户委牌分管各寨再設副土目数名協理一頒給打牲號帋按畨寨大小酌印號片出口人給一紙無者擒治一寛從前積案畨人所刦牲畜年遠根究為難夹壩既經痛懲均免追問一撤駐防兵前督查郎阿奏准每年撥兵二百駐防畨地千餘里兵力不足控制恐日久玩生應撤回以省遠戍諭曰所辦甚妥仍因時制宜為之先是御史李㥳叅奏甘肅有司諱災不報命㥳與尹繼善㑹勘得寔尹繼善因請将廵撫元展成等分别治罪併自請議處尋部議銷加一級七年丁母憂八年二月署兩江總督協理河務命馳驛赴任賜以詩曰淮沛今何似災餘不忍言邇来闕二鬴誰與辦三餐敢靳司農帑還祈大造恩當春應舉趾積􅕙尚留痕民瘼遐觀在心憂夢想存勉伊經畫策為我活黎元五月疏言臣欽承恩命同任河防夙夜靡寕寢食㡬廢伏以久離江南情形各異詳勘博考體察民情咸以舊制宜循萬口如一凡三事一毛城舖宜仍舊也黄河至徐州北係山嘴南偪郡城以千支萬派之水納之数十丈之中下流不暢則上㳺必壅前河臣靳輔於上㳺南岸毛城舖立减水壩下流引河以洩盛漲北岸自李道華家楼至蘇家山不設堤工聼其漫入㣲山湖由荆山口入運少殺其洶湧之勢近則因毛城舖進水過多圈堤築壩層層堵閉致南岸淤髙大溜側注北岸石林一帶處處受險欽差大臣議於壩口水底用亂石填髙臣按此處洩水之路止有倒勾三河其餘支港俱已淤平若再填髙壩口水底是有遵照舊制之名仍與舊制不同有隨時啟閉之名寔與𦂳閉無異不惟北岸無堤處受全黄水勢堪虞而上㳺山東之滕嶧金魚等縣下流徐沛一帶城社更為可慮請仍舊制相機啟閉開通倒勾河使之順直壩堰有礙宣洩者量為撤平兩岸分流减洩勢緩水平北岸之險工可保沿河上下永享太平且减下之水歸入洪澤湖濁沙停淤黄澄為清更可助清敵黄轉害為利一天然壩宜仍舊也淮水接七十二河之水滙入洪澤湖僅恃髙堰一線孤堤為淮揚保障夏秋黄淮並漲拍岸盈堤勢難容受前河臣靳輔建三滚水壩又設天然南北二壩酌量啟閉以洩異漲思慮至為深遠新議以洪湖之水宜蓄而不宜洩欲将天然壩改建滚水石壩臣思河南疏濬賈魯河以後淮水勢大伏秋盛漲若不将天然壩開放則尾閭不暢必病中滿且舊天然土壩相水勢大小酌量蓄洩􅍾縱在人改建石壩則一定不昜無可増减當蓄而不能蓄當洩而不能洩利未見而害隨之矣請将天然壩仍照舊制其估建滚壩及南北石工無庸建築不惟節省数十萬帑金且洪湖異漲之水有所宣洩髙堰全堤可以保固一髙郵三壩宜仍舊也髙寳諸湖周圍数百里上受天長七十餘河及洪澤湖减下之水滙入運河其勢甚盛是以於髙郵迤下設立南關五里車邏昭関各壩分注下河歸海遇水漲次第開洩制最精詳新議以南闗等壩開放下河必致難受議永閉髙郵三壩另建石閘七座抽板開放臣按從前各壩寛一百九十餘丈今議建石閘合計八丈四尺較舊制寛狭懸殊况髙郵等壩原與天然滚壩上下相應天然䓁壩寛至三百餘丈上㳺来水甚多勢必仍然壅積雖於邵伯迤南疏浚入江之路亦是减水之意但其地距江甚遠江潮朝夕徃来與水相抵洩出無多而迤上髙寳一帶為諸湖頂衝之區首當其險設遇水勢驟漲自必直趨附近就下之㨗徑豈能紆廻流遠以入江倘宣洩不及深為可慮况髙寳不能容納勢必仍掘壩以注下河洶湧驟至較之循序漸至者受患更猛請将髙郵三壩仍照舊制所議石閘七座無庸增建至下㳺宣洩再行詳勘疏浚深通近水民田修築堤堰有餘之水導之入海可免瀰漫臣悉心籌酌至再至三不敢少存成見好為更張不敢狃於前議草率從事搃期合舊制而順水性孚公論以洽輿情得㫖應斟酌者湏因時制宜九年尚書公訥親查閲江南營伍劾蘇松水師廢弛摠督統轄全省咎難辭下部議降三級准抵是年江南生蝻延及山東河南上以江南有司捕治不力貽害鄰封尹繼善等徇隠不𠫭下部議銷紀録十二次十年寔授兩江摠督十二年三月疏言臣等前奏請於海州宿遷桃源清河安東阜寕照髙寳等處修築圩岸臣相其緩急分年修治髙厚丈尺俱為酌定修治之法務于圩外取土挑濬成溝圩身量留㴠洞使蓄洩有資旱澇足備無力者量借帑項再上江鳯潁泗三属頻遭水患現在河渠次第開濬而田間水道圩塍寔與水利相為表裏亦照例陸續興修俟著有成效遠近推行於水利善後之圗似多禆益諭曰此誠務本之圗妥恊寔力為之五月疏劾狼山鎮摠兵黄錫申廢弛營伍詔革職十三年正月陛見将回任賜詩曰熙績匪獨能亮工資群彦詞林擅卓犖封疆推老練簡畀淮海區奏成佇底奠保障財賦地繭絲非所羨去嵗吳淞災波臣勢方扇每念幸活民玉食不能嚥賑濟救燃眉其何籌久晏安民首察吏癉惡亦彰善設誠物乃孚逞明終必眩閏七月以徇庇南河摠督周學健部議革職命從寛㽞任九月調兩廣摠督十月授户部尚書協辦大學士充國史館總裁十一月軍機處行走兼正藍旂滿洲都統命署川陕總督嗣設四川總督以尹繼善為陜甘總督時大學士傅恒經畧金川大兵出陜西上以尹繼善于一切安台馬匹事宜星速赶辦調度得宜詔加恩開復其從前革職㽞任十四年正月詔尹繼善與内大臣傅爾丹尚書達勒黨阿舒赫徳㕘賛軍務二月晉太子太保十五年二月疏請修文武成康周公太公陵墓享殿下部知之十一月西蔵羅卜蔵扎什不靖四川摠督策楞統兵入蔵敇尹繼善管川陜總督事十六年復調兩江總督十七年四月尹繼善以上江頻被水疏請濬宿州之濉河彭家溝泗州之謝家溝虹縣之汴河上游又修築宿州符離橋靈璧縣新馬橋砂礓河尾黄疃橋翟家橋詔如所請行是月湖北羅田奸民馬朝柱聚衆於天堂寨圗不軌界連江南尹繼善檄夀春鎮總兵觧光宗統兵搜捕並親徃擒獲朝柱家属黨羽甚衆疏聞得㫖嘉奨下部議叙十月召來京十八年正月署陜甘縂督二月以前兩江任内承審江西千縂盧魯生等傳抄偽稿一案不能究出實情部議革職命從寛留任八月又以徇縱南河劣員虧帑悞工議革任命寛免仍註冊九月授江南河道縂督先是哈宻蔡伯什湖屯田萬畝於雍正十三年屯兵承種乾隆七年改囘民承種嗣貝子玉素富以収成歉薄請罷事下尹繼善及安西提督王進泰議至是尹繼善奏言從前開渠引水㡬費經營近日歉收寔由回民不諳耕作所致即使水澤偶有不敷亦㫁無舉萬畝屯田概行廢棄之理伏思開墾此田原為接濟兵食請選安西兵丁子弟或招各衛户民承種既於兵食有益且有此壮丁二百餘依安西屯户團練之法又可寓兵于農協同防守臣已調任南河謹就所見陳之上韙其言十九年二月疏言黄河之水挟沙而行停滯積久成灘灘之所在則水射對岸而堤工受險聖祖仁皇帝諭於曲處挑直使得暢流誠萬世治河之良法臣按銅沛邳睢宿虹河道多曲折大灘日淤日積急宜切去灘嘴開濬引河導溜歸中央借水刷沙既省兩㟁堤埽費並免偪溜偏趨奔突冲激之患其土堤不甚險要者每年加髙五寸險要者及時修理庻河防穏固而青黄不接時亦可寓賑于工詔如議行八月署兩江縂督十二月兼署江蘇廵撫二十年正月上以尹繼善前任兩江有沽名要譽之習諭誡之四月奏言臣長子户部員外郎慶雲性情暴戾請革職發往錦州看守墳墓詔如所請並諭曰尹繼善自行覺察據寔直陳無所徇隠著加㤙令於諸子中擇可承廕者以聞尋請以苐四子慶桂承廕許之十二月奏請於江西湖南湖北三省各撥米十萬石運至江蘓偹来春平糶上報可二十一年二月疏言洪澤湖有入海入江二路入海之路甚遠興塩一帶形如釡底海灘髙於内地潮大時内外相抵不能暢流入海惟入江之路宣洩盛漲最便然淺阻處多如東西灣兩壩減下之水由石羊溝入江河身僅寛三四丈又有兩岸灘嘴阻抑應開金灣六閘並金灣滚壩减下之水由芒稲閘河達董家溝入江引河淺阻應疏又璧虎鳯凰二橋减下之水由廖家溝入江河口淺阻灣曲應加寛芒稻迤上石羊溝並廖家溝董家溝歸江水道阻塞應濬又興塩等邑之天妃閘青龍閘及白駒南閘為下河衆水滙聚磯心閘牆之損壊者應修允之三月奉㫖覆審浙江按察使富勒渾劾廵撫鄂樂舜勒𣲖商銀案所劾寔仍坐富勒渾以誣告加䓁罪上責尹繼善所擬悖謬詔革職留任十月寔授兩江摠督命紫禁城内騎馬二十二年正月觧南河摠督事務二月上南廵賜詩曰幕府山邉開幕府風規得似茂𢎞無保釐務佈兆民福清蹕寕求一已娛静柝久曾歴数省建牙今復鎮全呉吏民相習休云易朂爾思艱莫漫圖初丁憂江蘓廵撫莊有恭奏捐職州同朱𣆀主使斃命律應絞罰贖外結命尹繼善同新任廵撫愛必達查審四月奏有㳟罪在專擅贓非入已詔免有恭死發往軍台効力諭曰荘有㳟辦理朱𣆀贖罪外結一案尹繼善既經莊有㳟告知即應據寔恭奏否則正言阻止荘有㳟自不敢視為泛常致干重辟及奉到朕㫖尹繼善亦當備述前情速為辦理乃遲回觀望希圗模􅏢了事經朕屡行飭催并将荘有㳟革職拏問始稱原曾與聞是縱荘有㳟之情罪而醸成其事始終皆由於尹繼善也尹繼善交部嚴加議處尋議革任命寛免仍註冊七月疏言沛縣地勢本低昭陽㣲山諸湖環之山東濟泗汶滕山水奔注滙歸来源多而去路少不能驟消臣按湖水去路自荆山橋外尚有湖口閘與韓荘閘相近為洩水尾閭閘僅丈餘不足宣洩臣商之山東撫河諸臣或建滚壩或建閘座使湖水暢流入運又山東沂河自北而南入駱馬湖近因水大於邳州之盧口散漫入運與荆山橋洩下之水相阻皆為沛縣受病之由臣飭員相度堵修上以所言中形勢俾通盤勘辦十二月同侍郎夢麟等㑹奏淮揚徐海支幹各河暨髙寳各河工竣下部議敘二十三年疏𠫭夀春鎮總兵納漢泰不勝任詔奨所奏得大臣體二十五年上以江蘓錢榖殷繁令増設布政司分理勅下督撫酌議尹繼善等奏請分江寕淮安揚州徐州通州海州為一布政司駐江寕蘇州松江常州鎮江太倉為一布政使駐蘓州安徽布政使移駐安慶從之二十七年上南廵賜詩曰保障資三省忠勤著兩朝節樓無過久幕府獨稱超善得軍民服兼能上下調暇還工作誦吉甫可同條尋命為御前大臣二十九年晉文華殿大學士仍留摠督任三十年二月上南廵賜詩曰綸扉昨已命和羮江國仍資扈蹕行明代稱賢必王石漢家推盛則韋平封疆㡬處皆時望旌節三年獨老成亦識心殷依北闕待宣入閣贊樞衡四月上以尹繼善年届七十恩賞韋平介祉匾九月召來京入閣辦事兼管兵部事務充國史館總裁十月充尚書房總師傅教習庻吉士三十一年充㑹試正考官三十三年充經筵講官三十四年兼翰林院掌院學士三十六年正月上東廵命留京辦事四月卒遺疏入諭曰大學士尹繼善學識優通老成端謹歴封疆者三十餘載綏輯恊宜洎入贊綸扉兼直禁近恪勤奉職倚畀方殷今春東廵啟蹕前見其精力就衰時嬰㣲疾因令留京安攝兾得速痊每于閣章郵便詢悉病勢漸増特𣲖御醫診視諭其服藥調理以起沈疴并令在家静飬不必力疾趨覲回鑾後時遣侍衛存問知其日漸委頓厪念有加今聞溘逝深為軫悼著加贈太保入祀賢良祠賞給内帑銀五千兩辦理䘮務并派皇八子前往奠醊應得䘏典仍著該部察例具奏尋賜祭𦵏謚文端四十四年御製懐舊詩列之五督臣中詩曰八旂讀書人假藉詞林授然以染漢習率多㤀世舊問以弓馬事曰我讀書秀及至問文章曰我旂人胄兩岐失進退故鮮大成就自開國至今任事奏績茂若軰一二耳其餘率貿貿繼善為巨擘亦頼訓迪誘八年至總督異數誰能遘政事既明練性情復温厚所至皆妥帖自是福量輳能詩畧如白唱和亦頗富獨愛馳驛喻知寓意不㽞子慶桂現官兵部尚書慶霖現官青州副都統託庸託庸滿洲鑲黄旗人姓富察雍正四年由筆帖式授户部主事累遷郎中初託庸曾祖吉勒塔巴以軍功授雲騎尉逓加至三等輕車都尉八年託庸降襲雲騎尉乾隆五年擢署安徽布政使六年調署廣東布政使七年寔授九年署廣西廵撫疏言桞州慶遠二府逼近苗寨不肖之徒包攬詞訟勒謝或冒稱兵役入寨滋擾臣飭属嚴拏究懲諭奨其留心尋疏劾布政使唐綏祖擅動庫帑假公漁利詔革綏祖職尋命摠督策楞察審十一年正月審明所㕘全虚惟託属購人葠属寔已革職毋庸議事詳綏祖傳先是廣西銅礦二八抽課餘銅官買供鑄每百斤給價六兩八錢綏祖為布政使時請増價十三兩零部議准増至九兩三錢託庸既劾綏祖因請将増價官買事停止改為三七抽課餘銅聼商自售閏三月奏言試辦已八閲月商本尚属不敷請仍加二抽課官買餘銅每百斤應増價十六兩二錢諭曰從前託庸奏稱唐綏祖収買銅觔増價十三兩有零之處應行停止請将二八抽課之例量加一成作為三七抽課餘銅聼啇自賣啇民自必争先認採出銅日多可得源源鼓鑄朕交大學士等面詢楊錫紱據稱将来銅厰果旺每年出銅七八十萬或百萬斤方可抽課二三十萬斤若如数年以来抽課不及十萬觔則于官銅轉絀交部一併定議部議若照三七抽課恐不敷鼓鑄之用應令該署撫妥議具題嗣據託庸議稱商人趨利如鶩有利可圗孰不踴躍從事請将三七抽課之處試行一年再定今則奏稱商本不敷試辦八月不能有濟仍應加二抽課并請加増至十六兩二錢方敷収買之價此案經朕徃復致詢託庸堅執已見以為事属可行今試行八月不能有效仍請照前辦理不但與唐綏祖所請之意相同而價值更為増多此又何説可見託庸彼時不過因𠫭劾唐綏祖之後有意将此事更張以顯唐綏祖之過耳朕又聞得粤西辦理此事自託庸奏准以来各處搜查民間藏銅定限比役甚為擾累而伊奏摺中并不自知辦理未善引過認咎巧於廻䕶掩飾前非著交部察議尋議革職八月授山西兾寕道十二年調河東道十三年閏七月廵撫凖泰疏𠫭託庸承勘山陕沿河灘地偏執市恩得㫖革職八月命以郎中銜補杭州織造兼管闋務十五年廣西廵撫舒輅疏𠫭託庸前任應賠銀兩屡催不完諭曰託庸由部員擢任藩司簡署廵撫乃乖張任性於𠫭劾唐綏祖一案經該督等查明俱属誣罔因薄示惩儆旋復授為山西道員又因承勘所属雞心灘一案偏執已見經廵撫凖泰𠫭奏朕因其意見偏謬不宜有司之任但久歴部曺特授為浙江織造予以報効自新而伊全無感激黾勉之意召見時仍支吾取巧因勅山陕廵撫覆勘適大學士忠勇公傅恒歸途之便亦令其公同閲看仍照廵撫所議觀此則託庸之妄誕殊属無恥著革職該旂查明家産抵補賠項二十年授安徽布政使兼𬋩江寕織造二十五年調江寕布政使二十六年遷廣西廵撫尋調安徽二十七年上南廵賜詩曰連疆来接駕咨政