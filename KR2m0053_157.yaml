舊堤接添魚麟越堤臣查雲梯闗外近海與其築堤束水致添新工不如于舊堤上首作斜長子堰約漫灘水滙正河入海尾閭寛濶於就下之勢益暢諭曰髙晉奏籌辦雲梯闗黄河下㳺情形一摺所見甚是雲梯闗一帶為黄河入海尾閭平沙漫衍原不應設立堤岸與水争地而無識者好循浮言或以上流清口洩水分数較多遇海潮盛時或不免意存顧慮因有子埝堤防之議殊不知清口暢洩其収利在下河州縣者不可数計至雲梯闗附近不過阜寕安東二邑所轄地面以此衡彼其輕重大小不待智者而知即令一時偶值盛漲所漫溢者不敵百分之一二耳髙晉當守其定見既知下㳺之制防一切毋庸置議益可信清口之展放無難永遠力持於水利民生交有禆益二十年三月授兩江總督仍統理南河事務三十一年正月奏審蘇州府同知段成功縱容滋擾案諭曰髙晉具題審擬段成功縱容家人書役詐擾累民一本内稱該員因患瘧昏迷不能檢㸃案牘家人龔玉等婪賍各欵該員均未知覺等語所辦甚属錯謬明係承審之員有意開脱兾圗從輕完結耳髙晉自擢任搃督以来甫經審辦𠫭案即意存曕徇巧為嘗試此等伎倆豈能逃朕洞鍳江南吏治廢弛已久現在督撫正當更換之時髙晉尤宜加意整頓力矯積習何意竟敢於姑息朦混若此看来案必出自朱奎掦之意朕知朱奎掦素非善類髙晉遂墮其術中漫無覺察耳本應将該督交部嚴加議處第念髙晉新任摠督初次獲咎且在總河任内尚能實心任事姑從寛宥此後若再不知改悔必不能為之曲貸也髙晉此事寔属昏憒糊塗負朕恩矣著傳㫖嚴行申飭此本已交内閣擲還該督另委賢員秉公確審務得實情以成信􅀈若尚迴䕶希圗了事朕必有另辦之法可惜朕造就髙晉之恩矣命侍郎四達㑹同審訊尋究出成功實有染指弊上以髙晉初審辦時聼属員袒庇開脱交部嚴加議處成功復以前任陽曲縣虧帑案上司代為彌補鞫實抵罪十月奏督撫文移請槩用紫花印停止布政使用得㫖俞允三十二年五月奏揚州府教場向設城内基址狹隘操演僅容騎射另在城外打靶一營兩處演習與制不符臣飭移建西門外其城内舊基商衆呈建神祠按年納租銀除移建支用餘備軍装公需疏入報聞三十三年正月奏言江南武鄉試上下江廵撫輪赴江寕主考但駐劄較遠請歸摠督就近考試從之十月奏河工未備事宜一河庫錢糧應盤查河庫道於工料准銷後嵗報具題庫存銀数河臣盤查並不保題請每年四月奏銷後及新舊道員交代河臣赴庫盤查督臣核實保題一洪澤湖救生樁銀宜核减湖遇風濤虞致覆溺嵗支上下江耗羨銀各五百兩購樁簽釘湖邉以廣救濟近年全湖歸清口湖邉多淺灘汊港入裴家場太平河皆可泊請查勘停修其必湏㽞存者核估詳辦詔如所議行十二月署湖廣總督兼攝荆州将軍事三十四年二月仍回兩江摠督任三月兼署江蘓廵撫十月疏陳採辦滇銅上以江南通洋甚便敇籌辦洋銅鼓鑄髙晉奏言臣遵㫖折中定價収買小錢改鑄制錢請即以應發洋商銅本銀収買查寳蘓局嵗用銅鉛㸃錫共九十二萬一千六百斤今収買廢錢既多應即以抵補額用銅鉛之数小錢質粗性脆以銅鉛㸃錫均勻搭配再加配黒鉛試鑄即可以一律光潤除銅鉛錫入爐鎔化准折耗統計廢錢一百萬斤較専用洋銅節省盈餘錢萬一千餘串再查寳蘓局每年應鑄二十八夘額需銅四十六萬八百觔現有商人應交銅觔収存廢錢及在途滇銅三十萬觔共銅一百四十萬觔每年配用二十萬餘斤足供七年之用民間未盡小錢又展限三月収買非特滇銅可停即加辦洋銅亦可緩上善之三十五年兼署漕運總督三十六年春上廵幸山東髙晉自江南趨覲行在賜詩曰壌接因来輦路迎六年一日此丹誠防河積榖胥籌度察吏安民属老成省嵗稔多原致喜任官賢少輒為怦俞哉回任勤諸政豈在劬勞扈蹕行五月晉文華殿大學士兼禮部尚書仍㽞兩江總督任八月上以髙晉明練河防詔㑹同侍郎裘曰修總督楊廷璋籌勘永定河蕆事後詣闕恭祝皇太后萬夀十一月賜青狐端罩在紫禁城内騎馬是月回縂督任四十年七月河東縂河姚立徳奏請蜀山湖収蓄伏秋汛水工部以向例於十一月煞壩収蓄汶河清水議駁上以十一月水落歸槽汶水漸㣲不足備来年濟運命髙晉㑹同立徳山東廵撫楊景素確勘議奏九月㑹奏蜀山湖周六十五里在汶河南運河東素名水櫃濟南北運臨汶有永定永安永㤗三斗門臨運有金綫利運二草閘用資蓄洩乾隆二十八年運河道李清時詳請酌定伏秋汛内収水以九尺八寸為度縁湖東北只馬荘一泉入湖全頼収蓄汶水始敷全漕應用此歴年籌辦濟漕之章程也必俟十一月始収清水誠如聖諭不足存瀦濟運查蜀山湖為苐一水櫃向定九尺七八寸不無過拘請以一丈一尺為率從之四十一年總河呉嗣爵奏黄河兩腮􅌎髙中間溝槽窄狹洪湖運河􅌎墊現在清口開挑引河帶水澇挖恐於事無濟命髙晉同薩載籌酌奏覆五月奏言康熙初年黄河海口積沙横亘二十餘里黄河從東北紆廻入海河臣董安國創築攔黄大壩另闢馬家港口去路不暢轉致上㳺易潰康熙三十八年拆攔黄大壩仍由故道入海即今之大通口是也查該處海水黄水交接兩岸接生淤灘南岸遂有新淤尖尖頭洋之名北岸有二浤三浤四浤之名現今海口距從前王家港地方四十餘里灘勢愈長海口愈遠近年黄水倒灌致通湖引河淤墊清水不能暢出清江淮安一帶運道停沙清口以外黄河兩腮勢髙上年秋間豐碭南岸丁家集外灘民堰刷塌溜向南趨黄水從毛城舖滾壩旁流徐州以下銅沛邳睢宿虹桃源黄河水緩沙停惟有浚清口以内通湖引河停淤使清水暢出與黄水滙流東注并力刷沙則黄河不濬自深海口不疏自治查向年通湖引河五道暢注禦黄鮮有倒灌今年湖水未能暢出遇黄水盛漲力不相抵必致倒灌一經倒灌則引河復淤非特不能刷沙黄運兩河又不免淤墊湏于冬春湖水消時依各引河寛長丈尺兩頭煞壩挑深并将清口東西壩址移下一百六十丈在平城臺建築使清水源遠流長出口之勢有力於陶荘迤上積土之北開引河一道使黄水繞北下注清水暢行至周家荘㑹黄東注不獨可免倒灌而二凟并流攻刷黄河兩腮浮􅌎及海口積沙均可漸次刷深下㳺深通則黄河上流可免停􅌎且洪湖無壅堰圩磚石工程常資穏固惠濟祠埽工更可化險為平得㫖此奏皆合機宜形勢是治淮黄一大闗鍵屆時妥為之是年冬入覲髙晉年七十御書鈞莭延禧額賜之四十二年八月奏豐碭廳属唐家灣倒勾引河洩黄河盛漲由毛城舗石壩下注歴洪河濉河滙歸洪澤湖每年伏秋大汛徐城水誌長至一丈一尺五寸始開放減洩查倒勾引河居徐城上㳺距徐城二百里徐城水誌長至一丈一尺五寸上㳺水已逾誌迨輾轉開放徐城水誌已不止一丈一尺五寸矣奔騰下注流行不及致洪濉二河壅遏臨河之蕭縣宿州靈壁每致被淹與其減于既漲之後莫若洩其未漲之先應請嗣後水誌以唐家灣為凖俟長至九尺五寸即将倒勾引河草壩啟放殺其盛漲由毛城舖及時分洩上善之四十三年四月赴浙㑹同廵撫王亶望相度海塘詳見亶望傳七月命赴豫堵築儀封漫口時舊河已淤成陸髙晉籌於漫水口門分東西壩堵築就舊有順堤河淤十八堡外灘起至翟家荘開引河達入舊河並浚舊河淤以暢水勢堵築十八堡缺口攔順堤河水歸新開引河切去十六堡口門對㟁灘嘴奏入報聞九月時和驛漫口風暴刷深全河溜注口門髙晉請交部議處得㫖寛免十月以徇隱髙樸盗賣官玉部議革任詔免革任註冊十二月時和驛八堡漫口合龍後儀封新修埽工蟄䧟請交部嚴加議處諭曰時和儀封兩處本應同時合龍前此髙晉等因時和驛水深沙活施工稍艱而儀封溜勢平緩辦理較易即先将儀封堵閉亦属乘便巧辦先完一工之意如果經理得宜俾無後患未為不可今新収埽工復因溜勢湍激致有蟄塌之事則工作原未穏固可知髙晉等督辦何事責無可辭着交部嚴加議處部議革任詔免革任註冊尋㑹奏儀封漫水由順堤河奪路直達考城其儀封十五堡以上堤外尚有淤灘至十六堡漫口逼近河身土性鬆浮口門上下刷深河身北髙南下引河在北非将河水湧髙不能掣溜北趨注正河但河水一經湧髙壩工難免蟄裂須将引河再深三四尺正河底接挖深溝六百餘丈将兩壩進埽築實金門兩旁邉埽加寛三四丈口門収至二三丈時多壓厚土俟引河挑深水勢湧髙開放掣溜後再将壩工堵築則合龍時水勢平稳可期鞏固得㫖宜即妥速為之是月卒四十四年正月諭曰髙晉品行端醇材猷練達老成敦樸體用兼優由州縣洊陟封疆宣勤奉職敡歴多年自簡畀綸扉仍管兩江總督秉公持正董率有方其兼管南河事務亦能經理得宜深資倚任昨以豫省漫口工程緊要特令騎赴工次督辦堵築事宜近據袁守侗等奏其染患痰咯之症不能眠食即𣲖乾清門侍衛布彦達賚帶同太醫院堂官陳世倌馳往診視並諭安心調養以兾速痊兹聞溘逝深為軫惜著仍𣲖乾清門侍衛布彦達賚馳驛前徃奠醊並加恩入祀賢良祠其任内革職降級註冊之案俱著開復應得䘏典該部察例具奏予祭𦵏如例謚文端復賜輓辭曰本以修堤藉碩謨詎虞病不起中都祗縁下楗虧工屡更值僨轅敗事殊漠不闗心豈卿也愁因致疾究忠乎考終入祀夫何恨寜識懐賢痛惜吾三月上製懐舊詩列入五督臣詩曰從来擢督撫徳才量並重以此下僚中百無一二中自知縣起者􅀈斯必超衆晉也實其人故悉下情洞更兼習河務要任久倚用乃以治河决来豫屡稽功憤懣因致疾不起誠堪痛歴歴懐舊臣中外資經綜而予未歇肩籲俊期與共子書麟官至兩江總督欽定八旗通志卷一百四十三
