body:
  text: 欽定四庫全書欽定八旗通志卷一百六十四人物志四十四大臣傳三十滿洲正紅旗一碩何和哩克葉克舒多積禮和圖托推法譚渾覺善碩詹岱松阿瑚安達立褚庫里布布丹噶達何和哩何和哩姓棟鄂其先自瓦爾喀遷於棟鄂因以地為姓祖曰克徹巴顔父曰額勒吉世長其部落何和哩代其兄屯珠魯巴顔為部長嵗戊子聞太祖髙皇帝納妃哈逹身率甲士三十人䕶從以行比還遂以所部軍民來歸隸滿洲正紅旗太祖以長女妻之初設滿洲八旗隸正紅旗為總管一旗大臣戊申年從征烏拉率本旗兵破敵有功辛亥年奉命同額亦都等督兵二千征窩集部之呼爾哈路攻札庫塔城圍三日招之不下攻㧞之俘斬甚衆遂降其環近諸路取五百户以歸癸丑年從太祖再征烏拉時布占泰與葉赫期送其子為質将行我師先一日至進克郭多鄂謨二城即駐其地翼日布占泰率兵三萬越富勒哈城而軍太祖欲戒諭之冀其悔罪求和何和哩與諸貝勒大臣並以布占泰反覆難信奮然曰我軍士飽馬騰利在速戰所慮者布占泰不出耳今敵軍既出平原廣野可一鼓擒也鼓勇進擊克其城滅烏拉天命四年明經畧楊鎬率六總兵分四路來侵太祖親統師禦之明兵皆潰六年下瀋陽遼陽前後降七十餘城何和哩並身在行間厯有勞績以與費英東等綜理軍國庶務稱為五大臣叙功授三等子世襲九年八月卒年六十有四太祖聞之震悼曰天何遽奪朕股肱耶太宗文皇帝時晉世爵為三等公世祖章皇帝順治十二年追諡温順勒石紀功世宗憲皇帝雍正九年加封號曰勇勤子六人多積禮和碩圖都類别有傳葉克舒葉克舒姓輝和世為尼瑪察部長太祖髙皇帝初年隨其父泰松阿以所属來歸隸滿洲正紅旗授佐領天命六年從大兵攻遼陽敵出城嚴陣以待葉克舒衝鋒奮擊有功授二等輕車都尉世職沙嶺之役先衆殺敵晉爵三等男太宗文皇帝即位擢列十六大臣佐理正紅旗事天聰五年任兵部承政六年授都統八年八月率本旗兵隨大貝勒代善征明入得勝堡畧大同取城堡西至黄河合兵朔州十一月考滿晉二等男九年詔貝勒多爾衮征明由大同進師分遣葉克舒隨貝勒多鐸營寧逺錦州界以制明援兵斬明副将劉應選俘獲遊擊等官崇徳元年隨武英郡王阿濟格征明入延慶州克十二城凱旋以葉克舒還軍時縱兵失伍及攘獲擅殺諸罪罷都統任削爵仍管佐領事二年正月命同承政尼堪等率甲士百人㑹外藩諸部兵征瓦爾喀師出㑹寧遇朝鮮兵於吉木海我兵馳擊斬其平壤巡撫及兵二千餘敵兵繼至又敗之降其哈忙城巡撫總兵又各邉副使等官斬馘無算進畧瓦爾喀以所獲牲畜分給外藩隨征将士遣之各還所部十一月偕恭政星訥分統左右翼往征卦爾察至黒龍江俘獲甚衆明年班師特遣大臣迎勞尋任兵部右恭政四年七月授副都統十一月與刑部承政索海統右翼兵征索倫部至雅克塞城攻克之敗其部長博穆博果爾而還五年四月復任都統七月叙功授騎都尉世職得優賞部議征索倫時葉克舒督造監獄不堅致俘囚逃逸應罰鍰追奪賜物上以葉克舒功罪相抵免之是月隨睿親王多爾衮圍錦州與都統圖爾格率所部三百人設伏錦州西南烏欣河追捕城中出牧牲畜敵兵千餘逆戰葉克舒馬中矢蹶圖爾格馳救之上馬復戰殺敵數人比還敵引兵潛襲我後葉克舒收兵還擊敵衆奔潰以功復晉三等輕車都尉六年三月坐阿徇睿親王等私遣官兵歸家及離城逺駐罪罰贖九月復隨貝勒杜度圍錦州與都統譚泰阿山等掘濠環守擊明總督洪承疇兵於松山七年三月召還先是䕶軍統領噶布喇失律敗績葉克舒與都統譚泰瑪喇希承勘坐推諉支吾論應罰鍰及錦州騎兵之出犯鑲紅旗營也葉克舒以偹禦失宜調遣不當致傷士卒復議罪應罰鍰并追奪賜物償給陣亡士卒上命免其承勘所坐罪餘悉如部議十一月貝勒阿巴泰等征明師至黄崖口葉克舒與都統譚泰定議分兵兩路夾擊遂奪邉口薄長城葉克舒麾軍先登敵兵潰走進攻薊州敗明總兵白騰蛟白廣恩諸軍尋遣兵攻孟家臺三十人䧟於敵八年師還下部勘訊葉克舒辨稱敵欲歸順因遣兵招撫以致䧟敵上以葉克舒輕進失利又設詞詭辨論罪罷都統任削世職順治元年三月世祖章皇帝命為副都統駐防寧逺四月大兵入山海闗擊流賊李自成葉克舒率駐防兵與賊步戰身被三十一創戕一目戰彌厲大破賊衆二年隨肅親王豪格征山東時賊渠十餘輩悉據滿家洞憑險為巢凡二百五十一崛葉克舒與尚書車爾格合兵搜剿殱渠魁以土石湮塞諸洞口餘冦悉平叙功復予三等輕車都尉世職旋晉二等三年授總管鎮守盛京屢遇恩詔晉爵至三等男十四年以昭陵總管鐘奈有罪葉克舒坐不舉劾免官並革世爵十五年卒長子道喇别有傳次子夏穆善官侍衛屢著戰功贈世職二等輕車都尉第三子瑚葉官䕶軍恭領以軍功授世職三等輕車都尉多積禮弟都類多積禮滿洲正紅旗人姓棟鄂額駙何和哩次子也初任佐領事太宗文皇帝於藩邸從征烏拉有功天聰三年上親征明至燕京多積禮以恭領從攻奪土城闗五年從征明圍大凌河城屢敗敵兵敘功授三等輕車都尉世職崇徳元年率師征瓦爾喀部俘丁壮三百餘婦女老幼數百獲牲畜豹皮等物凱旋命禮官迎宴尋擢本旗副都統四年七月奉命同鎮國公扎喀納等統兵駐守藩城屏城間㑹内大臣多爾濟属下數人竊馬由戍所遁去多積禮追之弗及論罪革世職籍沒家産命留弓矢甲胄及三馬與之仍管副都統事五年正月率兵防禦錦州敵人稽察叛逃二月命同恭領喀珠赴寧古塔集兵三百餘征烏扎喇部俘百餘户獲馬牛及貂貉虎狐等皮無算六月師還遣官勞之即以所獲分賜将士六年大軍圍明錦州明總督洪承疇集諸鎮兵十三萬赴援據乳峯山松山列營上統師親征屢敗明兵上度明兵必夜遁分布諸将截其歸路多積禮受方畧率騎兵循海濱追擊殱敵甚衆七年十月以年老罷管副都統事順治五年卒多積禮之第五弟曰都類初任佐領天聰時擢正紅旗都統以其為固倫公主所出命轄兩佐領人户崇徳元年冬同都統譚泰等圍朝鮮國都樹雲梯登城城上兵不敢拒悉奔竄明年凱旋部議在軍中時失察所属違法亂行諸罪罰鍰奪所俘獲三年隨貝勒岳託征明踰牆子嶺至宻雲敵以步騎三千逆戰都類與譚泰指揮所属兩旗兵夾攻敗之獲馬百駝二十遂乘勝畧地至山東濟南府乃班師四年大軍征明錦州還有䕶軍囊球安朱䕶訐同行之阿蘭泰臨陣退縮都類不受首詞且召阿蘭泰告之坐徇庇又以奉命兼管外藩䝉古納其所饋獻承㫖詢問不以寔對及新附丁壮逃遁先後論罪罰鍰削一佐領人户罷都統任尋命復任都統並諭諸貝勒曰都類雖有罪念公主在仍令兼轄兩佐領人户是年九月属下䕶軍碩詹首告都類征明山東時徇隠家人盗馬等事索取降城中財賄且於濟南府私發明徳藩埋藏珍玩携歸下法司鞫寔論死籍財賄珍玩入官命免死納贖革職任所轄人户歸隸禮親王代善應入官之物以其半與碩詹八年再起為都統妻以郡主封和碩額駙同輔國公篇古等率兵鎮守錦州世祖章皇帝定鼎燕京敘入闗破流賊功授騎都尉世職命隨肅親王豪格征張獻忠道經西安分兵𠞰滅慶陽土賊㑹兵西充獻忠既殪復與都統準塔等分𠞰川北郡邑餘賊斬獲無算論功復屢遇恩詔晉爵至二等伯順治十三年卒以其孫新逹里襲和碩圖和碩圖滿洲正紅旗人姓棟鄂何和哩第四子也初襲父三等子爵太祖髙皇帝愛其才以大貝勒代善女妻焉封和碩額駙太宗文皇帝即位之初授為正紅旗都統天聰元年四月從大軍征朝鮮五月又從征明攻錦州寧逺二城著有勞績二年五月隨貝勒阿巴泰率師破錦州杏山松山諸路九月從征察哈爾克其四路軍以功加五佐領進爵三等公三年十月隨貝勒岳託征明攻大安口敗其駐防兵於馬蘭峪再敗其援兵于石門寨復從大軍攻遵化城受上方畧率本旗兵攻其城西面之北克之十二月師薄燕京結營土城闗明兵來犯擊却之復奮勇先驅敗敵於蘆溝橋同副都統阿山等陣斬明總兵滿桂孫祖夀生擒黒雲龍麻登雲以獻旋師攻克永平四年正月率旗兵駐守灤州五年三月上以御書三函分諭諸貝勒大臣等勉以殫心盡職時和碩圖已列八大臣遂陳疏自誓曰伏蒙上諭諄切臣雖駑鈍敢不自懐兢業以圖報稱若知而不言畏罪緘黙不勤理諸務以圖便安惟天鑒之八月我軍分圍大凌河城數重和碩圖以本旗軍當西面之北明兵突圍出偕都統葉臣等夾擊之追奔及城壕而還七年六月上詢征明及朝鮮察哈爾三者何先和碩圖疏言宜先固城堡然後相度明之邉界乗瑕而入若天意佑我各城納欵雖欲速歸勢必不能故必固城堡而後可無虞也其南靣六城可暫停修築仍立界屯耕恐我兵去後各處敵人窺伺鞭長不及難以救援也惟将瀋陽牛荘耀州三城修理庶邉界内外皆可長驅矣逾月病卒年三十八上親臨哭之順治十二年追諡端恪立碑紀功雍正九年賜勇勤封號子和爾本襲三等公爵尚主以祖父勲賜勅免死二次崇徳三年任䕶軍統領隨貝勒岳託征明徇山東山西敗敵十餘陣所攻城堡輒下四年二月以疾卒於軍年二十喪還命部臣奠酒㑹部議䕶軍囊球等訐告同征之阿蘭泰臨陣退縮事以前此和爾本從恭領魯克都之言袒庇徇隠應削公爵不准承襲並奪所属人户奉㫖和爾本已故免究以其弟哲爾本襲爵托克推托克推先世居呼爾哈以地為姓兄納罕泰為呼爾哈部屯長太祖髙皇帝天命四年十月納罕泰同托克推携其親属及同部百餘户來歸上遣官迎之御殿賜宴各與裘服奴僕田宅器用馬牛隸滿洲正紅旗尋授納哈泰為理事大臣托克推為佐領太宗文皇帝天聰三年托克推任䕶軍恭領從上征明由龍井闗入遇三屯營哨卒斬五人獲馬七旋䕶糧以行遇敵來刦復斬數人搴纛一遂㑹大軍攻克遵化州五年三月同叅領榜素等率兵百人赴明錦州斬其哨卒生擒間諜以獻八月上統師圍大凌河城命貝勒阿濟格移兵扼錦州松山要路駐營邀擊明兵之赴援者托克推率兵隨敵自錦州來犯托克推擊却之追至城下斬獲甚衆八年二月同都統阿山等率兵畧錦州獲馬牛而還七月從上征明大同凱旋出尚方堡遇察哈爾諸宰桑來歸上命托克推率兵䕶降人家属還盛京是年彚叙有功諸臣予騎都尉世職九年同䕶軍統領布哈等率兵畧明邉境至寧逺擒七人獲馬四十牛百餘師旋出邉六十里敵以千人追襲布哈殿後戰歿托克推同恭領阿濟拜巴圖魯哈坦等還擊敗敵䕶所獲以歸即以牲畜分賚之崇徳三年八月隨貝勒岳託征明由牆子嶺入邉越燕京趨山東圍臨邑縣城托克推督兵樹雲梯攻克其城賚良馬及白金四年六月擢正紅旗䝉古副都統崇徳六年隨睿親王多爾衮圍錦州擊却明總督洪承疇援兵猝遇敵礮身中數創七年以疾解副都統任世祖章皇帝順治元年起為陵寢總管二年九月卒年六十有三子摩和托襲職法譚法譚滿洲正紅旗人姓他塔喇初以䕶軍校從太祖髙皇帝滅葉赫取明遼陽擢任佐領天聰元年從太宗文皇帝征寧逺擊敗明兵於城北山岡七年以克副任使予騎都尉世職崇徳三年隨貝勒岳託征明自牆子嶺入敗宻雲步兵趨山東攻克郯城縣四年冬隨承政薩木什哈索海等征呼爾哈部攻克雅克薩城五年春先還奏捷六年大兵圍錦州明總督洪承疇據松山以兵犯我右翼法譚隨肅親王豪格率兵擊却之既而大兵圍松山敵復犯我前鋒汛地為我軍所敗将奔塔山法譚復偕衆追擊明兵赴海死者無算八年隨鄭親王濟爾哈朗征寧逺攻克前屯衛中後所二城世祖章皇帝順治元年任恭領隨睿親王多爾衮入山海闗以步兵擊敗流賊李自成叙功加一雲騎尉尋兼任工部理事官二年冬隨順承郡王勒克徳渾征湖廣明年春自成遺黨一隻虎犯荆州法譚直入賊營多斬獲追擊之宜昌自成弟李孜及偽磁侯田見秀偽義侯張耐等俱率衆降四年考滿晉三等輕車都尉五年擢右翼步軍總尉三遇恩詔晉世職至一等輕車都尉兼一雲騎尉康熙元年以病致仕三年卒賜祭𦵏如典禮分世職為二以其孫鄂徳襲三等輕車都尉色勒璧襲騎都尉又一雲騎尉覺善覺善姓李佳世居薩爾滸城父通果事太祖髙皇帝任佐領隸滿洲正紅旗覺善襲管佐領事從太祖滅葉赫取明瀋陽遼陽以功授騎都尉世職任恭領天聰三年從太宗文皇帝征明下遵化昌黎灤州永平諸城既班師貝勒阿敏守永平覺善佐都統納穆泰等守灤州未㡬明兵圍灤州覺善勒衆出奮矟踰塹與恭領阿爾津佐領庫爾禪直趨敵師敵潰奔旋集衆薄城下覺善擊却之敵復發礮攻城壊垜堞覺善移兵禦守敵不能登凡五敗敵衆㑹阿敏棄永平出闗灤州乏援諸将亦突圍走覺善復擊敗敵兵之阻截我衆者與諸将偕還待罪上以覺善守城力戰既出猶能殺敵釋其縳尋晉職三等輕車都尉五年上親統師圍大凌河城明兵自錦州猝至小凌河岸上遣偏師渡河迎擊軍士不滿二百覺善入敵陣陷重圍奮戰得出時我兵别與敵遇有軍校為敵所獲復援之歸明監軍道張春總兵呉襄率歩騎四萬距大凌河十五里駐軍覺善隨貝勒碩託以右翼兵突入張春營敵挫衂敘功晉二等輕車都尉崇徳五年授正紅旗副都統率兵駐防義州尋隨大軍更畨圍明錦州明年春以攻圍不力論統師王貝勒及諸将罪覺善當削職籍家産半命從寛罰鍰秋上親征駐軍松山杏山間明兵謀奪我礮猝薄營覺善率所部禦擊敵敗遁我軍圍松山掘壕立營敵乗夜來犯復戰卻之八年正月與副都統譚布等率兵駐守錦州九月隨鄭親王濟爾哈朗征寧逺敗明總兵呉三桂邀戰步騎進至前屯衛敵悉衆出拒我巴林喀喇沁䝉古兵失利覺善率右翼諸佐領下兵各二突前奮擊大敗敵城遂下世祖章皇帝順治元年大軍入山海闗擊流賊李自成賊以礮來犯覺善被傷仍奮戰敗賊二年敘前戰功晉一等輕車都尉又一雲騎尉尋隨順承郡王勒克徳渾至江寧㑹自成餘黨一隻虎等冦擾武昌襄陽荆州諸郡詔移師征之三年二月師至石首聞賊在荆州順承郡王令覺善與都統葉臣等率精鋭馳壓賊營賊方攻城悉驚潰我兵截擊俘斬畧盡復分𠞰逺安南漳宜昌賊衆次第就平十月凱旋賜黄金十兩白金三百兩時山東土賊作亂侵擾恩縣齊河平隂等邑覺善受詔率兵赴𠞰斬賊首掃地王及其黨萬餘下所司紀功五年正月江西總兵金聲桓據南昌叛覺善隨征南大将軍譚泰都統和洛輝等往討七月師至南昌賊悉步騎七萬拒戰覺善率精鋭擊却之六年正月大軍破南昌城聲桓中二矢投水死移師攻叛鎮李成棟於信豐覺善督所部樹雲梯先登㧞其城成棟亦溺水死師還贛州復分兵𠞰滅新喻安福諸賊黨先是遇恩詔晉三等男爵至是敘湖廣山東江西戰功晉二等男賜號巴圖魯七年隨睿親王多爾衮畋於中後所坐私行射獵降一等輕車都尉兼一雲騎尉明年上親政覺善訟鐫秩寃予復爵如故擢都察院左都御史尋解任仍専管副都統事兩遇恩詔晉三等子十五年以老病乞休許之康熙三年卒年六十有六賜祭𦵏諡敏勇勒碑墓道子六人次子噶爾圖長子薩爾圖先後襲爵第三子吉勒塔布别有傳岱松阿子阿納海巴漢岱松阿滿洲正紅旗人姓佟佳世居雅爾湖太祖髙皇帝時授佐領太宗文皇帝天聰二年隨貝勒岳託征明錦州獲人户牲畜復攻克十三站以東二十餘臺岱松阿同佐領巴什泰先還奏捷七年命同恭領英俄爾岱往朝鮮互市齎敕責國王李倧背約附明倧惶恐上書謝罪八年以克副任使予騎都尉世職九年隨副都統巴竒蘭等征黒龍江敘功加一雲騎尉崇徳元年隨英親王阿濟格征明昌平有俘獲二年駐防盖州躡擊明兵於旅順口獲敵船二斬二人擒七人以獻命以所獲銀布賚之六年四月卒子阿納海襲世職任佐領順治二年隨大軍𠞰流賊李自成於武昌追至富池口獲賊船三年隨肅親王豪格征流賊張獻忠師至西安聞叛鎮賀珍以馬步二千拒守鷄頭闗阿納海與䕶軍統領鰲拜等攻破賊營進征四川屢擊敗獻忠部衆五年授工部理事官尋兼任恭領六年隨征叛鎮姜瓖於大同掘壕圍城賊數犯我汛地阿納海同都統噶逹渾往來禦擊皆克捷七年九月三遇恩詔晉世職至一等輕車都尉十八年山東土賊于七作亂阿納海隨靖東将軍濟席哈往征敗賊黨喬玉季於連山賊復乗夜來犯我營阿納海奮力拒戰中創卒晉爵三等男予祭𦵏如典禮分世職為二以其子愛音布襲二等輕車都尉而以岱松阿次子巴漢襲騎都尉兼一雲騎尉巴漢初任佐領隨安南将軍明安逹理駐防荆州聞海賊犯江寧移師赴援擊敗偽都督楊文英等康熙五年愛音布卒無子即以所襲之職併於巴漢復為三等男十三年九月以恭領隨副都統碩塔穆森等征逆藩耿精忠師次安慶聞賊陷建徳巴漢率兵偵探至赤頭闗賊拒戰擊之潰導大軍進攻賊開北門遁遂復縣城十一月賊四千餘衆犯南康巴漢隨碩塔穆森等擊敗之斬級千餘獲器械無算十六年隨鎮南将軍莽依圖江寧将軍額楚等征逆藩呉三桂由廣東進攻廣西破偽總兵蒋雄於樹梓墟十八年偽将軍呉世琮犯南寧大軍往援世琮率衆渡江屯新寧州西山下列鹿角拒戰巴漢隨莽依圖等進剿斬獲無算世琮負重傷遁南寧圍解二十年隨征南大将軍賴塔規復雲南敗賊将何繼祖等於西隆州奪石門坎黄草壩諸要隘遂趨曲靖㑹湖南四川兩路兵攻克雲南城復隨都統希佛等追𠞰賊将馬寳巴養元等於楚雄之烏木山敘功晉爵一等男二十九年三月卒子巴顔圖襲爵安逹立子阿積賴安逹立滿洲正紅旗人世居葉赫姓納喇太祖髙皇帝時遣兵刈鐵嶺田禾有降明䝉古拒阻安逹立先驅擊走之太宗文皇帝時隨貝勒薩哈璘駐防牛庄追斬叛逃蒙古數人大軍攻明永平副都統阿山葉臣率二十四人冐礮矢先登安逹立與焉得㫖奨賚師旋同恭領圖魯什偵敵建昌夜遇敵邀戰我軍士有中矢墜馬者安逹立援之出尋擢前鋒恭領隨大軍入明邊攻崞縣城領所部先登繼復率四十人伏忻口擊敵騎二百搴纛三生擒六人獲馬五十餘及出邉都統圖爾格戰捷敵奔竄安逹立邀擊逐敵入壕殱殪甚衆崇徳元年敘功授騎都尉世職擢任正紅旗䝉古副都統三年冬隨貝勒岳託征明距牆子嶺數里聞敵據隘口偹甚固安逹立同都統恩格圖率所部䝉古别趨嶺右陟髙峯入邉遇敵騎七千迎戰先衆奮擊斬級無算遂越燕京畧山東明年春師旋由青山口出邉擊敗追躡敵衆攻克山巔一臺五月隨大軍圍錦州明兵自松山杏山來犯安逹立連戰皆捷六年復圍錦州明總督洪承疇集援兵駐松山安逹立率兵破其三營敵自塔山來犯安逹立奪其挨牌鏖戰至日暮敵潰走翼日松山敵犯我右翼營安逹立復戰却之七年敘功加一雲騎尉尋卒年六十有三子阿積賴襲世職任䕶軍叅領世祖章皇帝順治元年隨大軍入山海闗擊敗流賊李自成追至望都復隨都統葉臣擊敗賊黨於懐慶進攻太原屢挫拒戰賊衆又分兵敗賊於黄河渡口尋署正紅旗䝉古副都統隨英親王阿濟格攻延安城賊刦我輜重阿積賴擊之走追擊自成於武昌屢破賊壘聞自成竄入九宫山復搜𠞰之剪其黨甚衆敘功晉世職為三等輕車都尉四年兼任刑部理事官五年隨鄭親王濟爾哈朗征湖南署䕶軍統領分兵狥道州明桂王朱由榔以其衆據永安闗阿積賴破其柵壘皆潰遁獲馬二十餘七年凱旋賚白金三百遇恩詔晉世職至一等輕車都尉兼一雲騎尉十二年卒子海都襲布丹布丹姓富察世居葉赫太祖髙皇帝時來歸隸滿洲正紅旗分轄葉赫人户授佐領尋兼任前鋒恭領太宗文皇帝天聰八年從征明大同進攻萬全左衛城先登克之得優賚予雲騎尉世職九年隨貝勒多鐸征明錦州師旋敵猝追襲都統石廷柱部下兵有被困者布丹破敵陣援之出是時上别遣貝勒統師由歸化城征明山西布丹旋奉命同前鋒恭領武拜等率兵百人往駐上都城舊址偵軍事迎奏捷使偕還崇徳元年隨武英郡王阿濟格征明将入邉擊却敵騎擒其邏卒連破鵰鶚嶺長安嶺二城皆督所部先登轉戰至涿州擒斬無算既旋軍敵覬我輜重潛出居庸闗設伏邀刦布丹率兵衝擊敵皆潰竄四年同前鋒恭領沙爾瑚逹等率土黙特兵二百畧寧逺北界以數騎挑戰敵堅壁不出乃俘其採樵者以歸五年大軍圍錦州敵離城築臺布丹同前鋒恭領納海色赫蘓爾徳馳擊斬四十人復追斬出城刈草者四十二人敵以三百騎一再來犯並擊之遁尋與納海色赫往小凌河遇明總兵祖大夀遣䝉古十七人自錦州至盡斬之六年明總督洪承疇集援兵據松山我前鋒汛地布丹偕諸叅領奮戰却敵追斬十人尋又擊敗杏山後敵騎七年錦州下敘功晉世職為騎都尉是年冬隨饒餘貝勒阿巴泰征明入黄崖口趨薊州擊敗明總兵白騰蛟白廣恩等斬獲甚衆世祖章皇帝順治元年隨睿親王多爾衮征流賊李自成敗賊将唐通於一片石遂入山海闗逐賊至安肅望都屢戰皆捷敘功予騎都尉加一雲騎尉並世襲罔替遇恩詔晉一等輕車都尉九年擢任正紅旗䝉古副都統十一年十月卒賜祭𦵏如例諡毅勤子弸素理襲職噶逹渾噶逹渾姓納喇世居哈逹太祖髙皇帝時有約蘭者率其子懋巴里等來歸遂隸滿洲正紅旗噶逹渾其孫也初任䕶軍恭領天聰二年從太宗文皇帝征多羅特部有功八年從征明山西克應州城賜人户牲畜崇徳五年隨大兵畧中後所同䕶軍統領敦拜擊斬敵衆睿親王多爾衮等率師圍錦州噶逹渾領纛先進敗杏山騎兵旋往設伏松山敵至斬十餘人敵據嶺列營擊敗之復同前鋒統領勞薩等合兵追襲抵北岡乃還七年隨豫親王多鐸征寧逺敵出兵躡我後噶逹渾先衆還擊敵潰走師旋有䕶軍逹哈塔者中創仆掖之以歸順治元年擢䕶軍統領從大兵入山海闗破流賊李自成以功授騎都尉世職二年隨英親王阿濟格追擊流賊至九宫山凡三敗敵三年隨肅親王豪格征四川師至西安分兵𠞰賊邠州賊渠胡敬徳結營三水縣噶逹渾與副都統和托攻堅直入㧞其營復與䕶軍統領蘓拜哈寧阿副都統阿喇善擊敗髙汝礪武大定二賊兵於三寨山用步卒搜𠞰山谷賊據巔以拒遣其衆左右馳下迎戰噶逹渾與䕶軍統領阿爾津奮勇斬殺連敗賊衆賊兵復犯正藍旗營哈寧阿被圍噶逹渾與阿爾津蘓拜疾馳往援擊却之又破賊兵于増盖尋擢户部侍郎五年三月調吏部侍郎六月敘功晉三等輕車都尉十二月與阿拉善奉命率八旗兵赴英親王軍協討大同叛鎮姜瓖至則七戰皆捷賊黨自代州北闗遁追斬無算遂平代州復渾源州六年擢本旗蒙古都統仍任户部侍郎七年以從睿親王行圍私出射獵罷都統任降職為騎都尉又一雲騎尉世祖章皇帝親政擢户部尚書明年二月噶逹渾訟鐫職寃詔復職晉二等輕車都尉三月改都察院左都御史四月以駐防河間佐領碩爾對訐户部給餉不均事下部鞫訊坐隠匿不奏論削世職得㫖改罰鍰五月復調户部尚書九月奉命率師往征鄂爾多斯部九年擒斬叛逆䝉古多爾濟並殱其衆于賀蘭山兩遇恩詔晉三等男世襲尋調滿洲都統十年二月調兵部尚書十一月奏言京城廣濶向設礮煤山以為信今停止無憑集衆請用盛京時鳴鼓聚衆之法疏入詔白塔山及九門仍各設礮十一年三月敘功晉二等男八月以濫引赦例請貸行賄之雲騎尉吕獻忠罪飭令回奏奏復稽遲下王大臣議坐削爵得㫖改降一等輕車都尉十三年海賊鄭成功潛乗海艘攻陷閩安鎮遂犯福州命赴定逺大将軍世子濟度軍隨同征討並賜世子敕曰凡爾調遣官兵勿令噶逹渾離左右也既至與督臣李率泰等會兵𠞰撫克復海澄分遣将領水陸並進擊敗賊衆下泉州及恵安之海港衛復閩安鎮斬賊數十級獲戰艦軍械洗除賊砦成功遁入海十四年三月班師四月卒賜祭𦵏贈太子太保諡敏壮子噶爾漢襲職碩詹孫逹色碩詹滿洲正紅旗人世居訥殷姓富察父舒穆禄太祖髙皇帝時授佐領既卒碩詹仍其任尋兼叅領太宗文皇帝天聰五年同恭領杭什木沙爾瑚逹等畧明邉境斬三人擒哨長一哨卒五以歸八年以克副任使予騎都尉世職崇徳元年太宗親征朝鮮克其國都國王李倧遁南漢山城進師圍之偵倧妻子在江華島分兵攻取碩詹乗船渡海衝越朝鮮戰艦繼佐領阿哈尼堪登島岸率衆攻圍降其城敘功加一雲騎尉三年七月兼任刑部理事官八月隨貝勒岳託征明由牆子嶺毁邉墻入越燕京畧山東攻克禹城縣及平隂縣明年春旋師出邊敵襲我後營碩詹同巴圖魯尼哈里等擊却之敘功晉三等輕車都尉是年九月訐本旗都統都類征明山東時索降城中財賄又於濟南府私發明徳藩埋藏珍玩携歸下法司鞫實革都類職籍財賄入官命以其半賚碩詹尋擢户部恭政五年三月大軍将征明錦州命碩詹赴朝鮮國安州徴其糧艘及水師由旅順口至大凌河還報稱㫖秋隨大軍圍錦州我恭領禧福率甲士二十四駐守駱駝山敵以步騎四百乗夜刦掠碩詹聞警趨援同禧福斬敵二百餘獲馬十六七年管正紅旗滿洲副都統事世祖章皇帝順治元年四月隨睿親王多爾衮入山海闗擊敗流賊李自成既定燕京改叅政曰侍郎碩詹仍任户部八月上将遷都燕京命碩詹統右翼兵留守盛京十月隨豫親王多鐸由河南征陜西二年正月擊敗自成迎戰賊衆連破賊營克潼闗進取西安復隨征河南江南是年敘山海闗功晉二等輕車都尉明年敘河南陜西江南功晉一等四年考滿加一雲騎尉五年隨鄭親王濟爾哈朗征湖南時衡州府為明桂王朱由榔之将所據六年四月碩詹同都統佟圖賴伊拜等自湘潭進征距城三十里有千餘人據橋立寨碩詹督兵擊敗之進奪其寨斬其總兵陶養用遂定衡州七年凱旋賜白金三百兩兩遇恩詔晉爵一等男八年駐防河間佐領碩爾對訟户部給餉不均部臣並坐降革碩詹降世職為一等輕車都尉復遇恩詔加一雲騎尉九年以老病罷侍郎及副都統任十年上念碩詹前此因給餉事降世職處分過重仍復一等男康熙二年卒年六十有四賜祭𦵏如典禮諡明敏以其孫逹色法色分襲世職並授二等輕車都尉逹色尋任恭領十七年隨征福建𠞰海賊鄭錦屢擊敗偽将軍劉國軒呉淑等拒戰賊衆㑹國軒糾賊萬餘犯海澄縣逹色赴援身冐鎗礮力戰聞城陷自經死詔如陣亡例予䘏加一雲騎尉無子以世職予其弟法色併襲改為一等男兼一雲騎尉褚庫褚庫滿洲正紅旗人姓薩爾圖先世居扎魯特祖栢徳遷居葉赫太宗文皇帝天聰五年大兵圍明大凌河褚庫年十七從征有䝉古驍将徹濟格突陣褚庫迎擊之生擒以歸尋征明大同攻萬全左衛褚庫首先登城頸被創猶力戰破其城論功予騎都尉世職賜號巴圖魯授佐領兼恭領崇徳三年任吏部理事官世祖章皇帝順治元年隨英親王阿濟格追𠞰流賊李自成由陜西至湖廣賊将呉伯益以賊衆三千拒戰褚庫率兵擊敗之三年隨肅親王豪格征流賊張獻忠同尚書星訥敗賊将髙汝勵等於陜西進師四川復屢敗賊兵六年隨大軍征叛鎮姜瓖圍大同偽總兵楊振威糾賊犯正紅旗汛地並擾土黙特營褚庫連擊却之賊又犯鑲藍旗汛地同䕶軍恭領瑚葉赴援以步戰敗賊衆賊平還京尋以值宿失印鑰解理事官任仍管佐領兼恭領九年隨都統噶逹琿征鄂爾多斯部叛酋多爾濟於賀蘭山俘戰甚衆屡遇恩詔晉世職至二等輕車都尉十三年海賊鄭成功犯福州時鄭親王世子濟度統師駐漳州遣副都統阿克善偕褚庫率兵赴援賊以戰艦二百自烏龍江來犯褚庫率本翼兵登舟奮擊敗之追至大江口獲船十二賊又以千餘衆於江岸迎戰褚庫督兵奮擊斬級二百餘聖祖仁皇帝康熙二年擢正紅旗䝉古副都統三年敘累次隨征功晉一等輕車都尉七年以年老解副都統任十四年卒賜祭𦵏如典禮諡襄壮子海存襲世職世宗憲皇帝雍正十年入祀賢良祠瑚里布瑚里布滿洲正紅旗人姓赫舍里世居和多穆哈連父呉巴海當太祖髙皇帝討平葉赫時來歸授佐領俾分轄其衆瑚里布其少子也太宗文皇帝天聰五年由佐領擢一等侍衛旋任前鋒恭領崇徳三年隨貝勒岳託征明自宻雲東北毁牆子嶺入邉同䕶軍叅領魯克都等擊敗明步騎兵獲馬駝百餘六年隨征錦州明總督洪承疇據守松山瑚里布與前鋒統領勞薩率兵越濠誘敵出戰奮擊敗之復同叅領席特庫布爾遜屢敗杏山敵衆松山敵騎夜遁瑚里布沿海濱躡擊殱殪無算七年三月駐師杏山敵騎四千餘自寧逺來犯見我軍容盛却走瑚里布與前鋒統領弩山追蹙之連山尋遇沙河所敵兵五百欲走寧逺復擊敗之十月貝勒阿巴泰統師征明上命瑚里布與席特庫隨右翼軍入長城即以軍事還奏於是大軍自黄崖口進克長城明總兵白騰蛟白廣恩合衆數千邀戰瑚里布同諸將擊敗之於薊州遂先還奏捷八年四月上念征明大軍将出長城復遣瑚里布與努山席特庫及恭領瑚沙羅實等率兵九十赴界嶺口偵之遇明兵俘斬甚衆世祖章皇帝順治元年冬命英親王阿濟格𠞰流賊李自成於陜西瑚里布率正紅旗前鋒以隨二年春師至綏徳州賊乗我未列陣掠取馬數十瑚里布追及之山巔擊潰賊衆盡獲其所掠馬㑹自成奔湖廣大軍進征攻克安陸府瑚里布敗賊獲戰艦追𠞰至九宫山五戰皆捷師還敘功授雲騎尉世職三年隨肅親王豪格𠞰流賊張獻忠過漢中擊敗叛将賀珍兵大軍将至西充肅親王令瑚里布同叅領席卜臣率前鋒四十人持檄先行遇賊騎邀截突前衝擊斬三十餘級生擒二人進薄獻忠營斬其執纛者大軍繼進遂殪獻忠瑚里布復與都統準塔征遵義府過璧山縣擊潰賊衆數千六年隨鄭親王濟爾哈朗順承郡王勒克徳渾征湖南攻圍湘潭徇衡州道州及全州皆有斬獲七年九年兩遇恩詔晉三等輕車都尉十年擢正紅旗滿洲副都統十三年遷右翼前鋒統領十五年隨信郡王多尼征貴州十六年大軍克雲南明桂王朱由榔及其帥李定國白文選等竄遁瑚里布與左翼前鋒統領白爾黒圖率兵趨永昌渡潞江戰磨盤山克騰越州窮追至南甸皆有功還京追論戰磨盤山時都統沙里布遇伏陣歿瑚里布弗及援停止敘功仍任前鋒統領康熙十二年五月聖祖仁皇帝念瑚里布宣力有年克著勞績特加太子少師十二月逆藩呉三桂反命都統赫葉為安西将軍瑚里布以䕶軍統領為副将軍率禁旅赴西安㑹同駐防将軍瓦爾喀進討十三年正月上念四川接壤滇黔恐為賊煽動詔瑚里布與前鋒統領穆占簡精鋭疾馳相機援𠞰三月㑹師漢中賊黨已踞陽平闗瑚里布同穆占攻克之乗勝趨七盤闗及朝天闗連敗賊衆擒斬無算遂進征保寧賊将吳之茂擁衆拒抗大軍鑿壕塹與相持六月上遣貝勒洞鄂為定西大将軍征保寧以瑚里布恭贊軍務十一月提督王輔臣叛於寧羗詔撤保寧兵還守要地瑚里布同赫葉等還漢中尋隨洞鄂還西安十四年賊阻截棧道平凉秦州俱陷詔趣進𠞰瑚里布隨洞鄂征秦州圍城四月克復之移師征平凉距城數里駐營輔臣連結蜀賊阻大軍薄城十五年上以大軍乆駐平凉未能攻取命大學士圖海為撫逺大将軍收洞鄂等勅印令受圖海節制瑚里布留供調遣十六年卒於軍子剛元襲世職欽定八旗通志卷一百六十四
