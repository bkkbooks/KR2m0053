body:
  text: 選舉志三八旗科第題名謹案登科冇記始自唐時元明以來亦有進士題名碑列于太學國朝因之所以昭稽古之榮重掄才之典也其鄉舉之士則唐謂之鄉貢進士試于禮部及第則為登科不及第則次舉仍取解初不以舉人為職銜也宋因唐制而有免觧之進士漸以職銜矣至明乃㑹試中式為進士鄉試中式為舉人皆得銓選注官而舉人亦遂有品秩沿襲至今郡縣誌書載進士或始于唐載舉人則無不始明者職是故也舊志列為年表八旗以次列格或有或無或多或少既参差難辨亦空白太多今改從各省通志之例改為題名以便尋覧舊志又載貢生是用州縣志之例府志則従無載及者矣况八旗通志體更大于省志乎今併刪除以符紀載之體焉八旗科第題名一厯科進士順治九年壬辰科滿洲蒙古納冷額都爾巴賽音達里髙里郝善以上鑲黄旗五名麻勒吉何錫談邁音達阿薩里賽冲阿魏羅渾盧占色勒布穆成額波勒八達里以上正黄旗十一名賽花蟒色額庫里圗克善蘇海色達哈達吉達額哈拉塔必圗以上正白旗九名三都索濟進州以上正紅旗三名楊官何託滿洲阿顔泰佐領鼐音達哈木倫賽柱拜達兒以上鑲白旗六名馬祜宋蘇保圗克泰吳拉代沙記以上鑲紅旗五名呉爾户正藍旗一名折庫納巴海朱三舒書納布滿洲碩塔佐領雲代莽吉六門都孫以上鑲藍旗八名謹案是科滿洲䝉古進士舊志載明佐領者僅何託納布二人其餘並闕今無可考核悉仍其舊後並倣此古雖各有中額但舊志所載合滿謹案滿洲䝉洲䝉古為一但有旗分並未分註今亦無従考核謹各従其舊後並倣此漢軍范承謨郎廷弼王瑞丁思孔王彦賓以上鑲黄旗五名齊賛宸祖澤潤祖應宣佐領齊賛樞胡獻瑶劉名世以上正黄旗五名遲煌許重華祖述堯劉景榮以上正白旗四名紀振邉鑲紅旗一名閻天祐張希顔以上正藍旗二名夏世安曺爚佐領習全史髙國琇佐領陳永命王毓祥李英以上鑲藍旗五名順治十二年乙未科滿洲䝉古達舒八拜豈他他侯黒阿哈代以上鑲黄旗五名胡西圗烏大禅呉把海伊桑阿滿洲薩木哈葛色特葛爾特劉喜色冷以上正黄旗九名圗爾宸索泰能徳噶爾噶圗以上正白旗四名賈勤董色馬鼐那鼐達楊阿庫察李柱以上正紅旗七名舒書阿爾達里托必泰庫三那特者布圗爾坤占木蘇以上鑲白旗七名莫樂洪門得禮娃爾荅那爾代色黒得和尚恩克参以上鑲紅旗七名拉色滿洲永在佐領查漢以上正藍旗二名得木圗達爾布滿洲朔塔佐領阿思哈車克出恩吉圗滿洲領塔佐領朱馬禮滿洲阿倫佐領阿達布班第鄂爾介以上鑲藍旗九名漢軍洪士銘戴斌張可立陳國楨髙瑜祖之麟祖澤潜以上鑲黄旗七名楊霖裴紹宗康殿邦張本堪佐領張恩斌齊洪勲耿効忠以上正黄旗六名朱麟祥任暄猷宋國榮董常國遲炤遲煊羅文瑜楊永亨佐領鄢翼明孔𫝊斌佐領孟述緒金玉式張應瑞以上正白旗十一名寗心祖張國棟佐領劉廣譽陳年榖張宏徳佐領銀文燦臧應聘佐領名以上正紅旗四年仲隆淮清梁儒張懐徳以上鑲白旗四名喻珩姚啟盛以上鑲紅旗二名張登舉佟國鼐佐領張登選佟國鼐佐領名以上正藍旗二康熙九年庚戌科滿洲沈獨立正黄旗一名博極牛鈕鍾海佐領二以上正藍旗名徳格勒鑲藍旗一名漢軍髙璜鑲黄旗一名李玠正白旗一名李夢庚鑲白旗一名王維珍正藍旗一名康熙十二年癸丑科滿洲成徳正黄旗一名徐元夢郎探佐領名正白旗一白小子舒書佐領名鑲紅旗一花尚馬占佐領名鑲藍旗一漢軍李基和尤國才佐領鑲紅旗一名王允琳馬雲程佐領周昌陳竒謨佐領名以上鑲藍旗二康熙十五年丙辰科滿洲雷池昆長保佐領名鑲黄旗一成徳改名性徳名正黄旗一班達禮額滕以上正白旗二名石禄孫布禄佐領正紅旗一名保民拉克大佐領正藍旗一名索柱常夀佐領曲震以上鑲藍旗二名漢軍髙琯鑲黄旗一名齊體物李耀祖佐領正黄旗一名卞永寧金聲振佐領石文桂鄭朝興佐領名以上正白旗二孟纉祖孟熊飛佐領鑲紅旗一名宋繹鑲藍旗一名康熙三十年辛未科滿洲五哥馬武佐領名鑲黄旗一喀爾喀烏爾賽佐領正白旗一名阿金傅爾敏佐領巴海能格佐領二以上鑲白旗名漢軍胡麟徴郎化麟佐領鑲紅旗一名佘崧生張樞佐領名正藍旗一康熙三十三年甲戌科滿洲五哥馬武佐領拉都立阿苓佐領法海唐則堯佐領三名以上鑲黄旗覺羅滿保查蒲圗佐領正黄旗一名阿錫台黒都佐領傅森杜喀禅佐領海寳羅必達佐領三名以上鑲白旗漢軍陳夢球孫徴㴻佐領正白旗一名髙其倬髙其伸佐領鑲白旗一名呉玥趙世綸佐領鑲紅旗一名康熙三十六年丁丑科滿洲桑格達爾查佐領阿進泰常書佐領二以上鑲黄旗名常哥和尚佐領名正白旗一傅敏改名福敏圗什希佐領鑲白旗一名查賚長禄佐領阿爾賽班第佐領二以上鑲藍旗名漢軍蔡珽蔡毓茂佐領髙尚瑛陳普佐領二以上正白旗名王宏文王永成佐領正紅旗一名康熙三十九年庚辰科滿洲福夀席爾登佐領那善庸善佐領二以上鑲黄旗名覺羅逢泰查蒲圗佐領鄭興祖明珠佐領富爾敦揆叙佐領託賢索勒圖佐領名以上正黄旗四文明雅爾賽佐領朱蘭泰佛倫佐領二以上正白旗名文岱圗什希佐領瓦爾達郭色佐領二以上鑲白旗名常柱包衣胡薩那佐領鑲紅旗一名平柱綏色佐領名鑲藍旗一漢軍陳還孫徴㴻佐領正白旗一名王允猷孫元吉佐領正紅旗一名髙其偉髙其位佐領年羮堯陳繼範佐領以上鑲白旗二名李延塏張朝午佐領鑲藍旗一名康熙四十二年癸未科滿洲西庫鈕倫佐領董泰唐保佐領二以上鑲黄旗名阿進泰常保佐領名正紅旗一伊太穆賽佐領才柱包衣博思太佐領以上鑲白旗二名耿古徳黒爾金佐領鑲紅旗一名勒騰額常巴士佐領鑲藍旗一名漢軍靳治岐靳治豫佐領鑲黄旗一名楊萬程包衣佛倫管領正黄旗一名王士鑰馬世寵佐領鑲藍旗一名康熙四十五年丙戌科滿洲滿保覺羅佛倫佐領鑲黄旗一名覺羅坡岱覺羅進寳佐領正黄旗一名竒勒倫桑阿里佐領徳宏鄂什吞佐領那山千里保佐領石以上正白旗三杭禄沙喀佐領誇喀三泰佐領七十包衣阿達海佐領以上正紅旗三名索泰色爾貝佐領呉宗阿廣哥佐領二以上鑲白旗名都麥色勒佐領常生色勒佐領騷達子岳諸岱佐領名以上鑲藍旗三漢軍聶師堯盧承烈佐領鑲黄旗一名徐琳李建勲佐領趙世勲雷世俊佐領二名以上鑲白旗劉植佟銓佐領張杓張樞佐領旗二名以上正藍劉之玠劉顯位佐領鑲藍旗一名康熙四十八年己丑科滿洲樂克山花色佐領名鑲黄旗一色楞閣愛中佐領名正白旗一車松佛倫佐領名鑲白旗一阿克敦蘇巴立佐領正藍旗一名哈爾泰常夀佐領積善法参佐領二以上鑲藍旗名漢軍所柱包衣七十管領正黄旗一名張鵬翼夏益佐領名正白旗一康熙五十一年壬辰科滿洲徳齡森特佐領名鑲黄旗一覺羅名昌覺羅隆昌佐領覺羅呉拜章保住佐領以上正紅旗二名鄂爾竒鄂爾泰佐領春山談巴佐領二以上鑲藍旗名漢軍遲之金石文賢佐領三格包衣李鍈貴佐領以上正白旗二名康熙五十二年癸巳科滿洲春臺巴什佐領僧格勒那哈泰佐領二名以上正黄旗呉孝登薩爾太佐領朱天保羊都佐領旗二名以上正紅世禄六哥佐領名鑲白旗一漢軍劉嵩齡花色佐領名鑲白旗一王國棟髙宏棨佐領鑲紅旗一名康熙五十四年乙未科滿洲徳齡森特佐領徳新覺羅佛倫佐領名以上鑲黄旗二成文納延太佐領正白旗一名索柱何保住佐領正紅旗一名博山勒爾圗佐領鑲紅旗一名漢軍竇啟瑛觀音保佐領正白旗一名沈竹馮國相佐領鑲白旗一名康熙五十七年戊戌科滿洲覺羅思强覺羅永平佐領正黄旗一名郭操改名國璉黒都佐領鑲白旗一名伊爾敦費揚古佐領鑲紅旗一名童保包衣沙爾漠佐領鑲藍旗一名漢軍董自超崔澄佐領名鑲白旗一徐大枚佟世夀佐領正藍旗一名康熙六十年辛丑科滿洲留保包衣海章佐領三格包衣二達子佐領以上鑲黄旗二名何溥達爾布佐領何浩達爾布佐領二名以上正黄旗覺羅恩夀覺羅額理賀佐領鑲紅旗一名漢軍牟瀜陳普佐領孫國璽宜廷文佐領二名以上正白旗雍正元年癸夘科滿洲尹繼善申特佐領喀爾欽明通佐領慧徳慶元佐領旗三名以上鑲黄嵩夀常海佐領圗麟賴都佐領旗二名以上正黄華實著包衣関保佐領正紅旗一名七十一穆㕘佐領永世七哥佐領圗南哈達佐領昌齡堆齊佐領旗四名以上鑲白保良雅賴佐領阿成峩福泰佐領旗二名以上鑲藍䝉古牧可登拉錫佐領名正白旗一漢軍尚彬包衣佛倫佐領胡良佐包衣髙斌佐領名以上鑲黄旗二張洪謨劉紹熙佐領正紅旗一名雍正二年甲辰科滿洲查克丹保績佐領名鑲黄旗一開泰博啟佐領劉保改名旒保永乾佐領貴昌明竒佐領運泰薩爾懴佐領覺羅禄保覺羅永平佐領舒明賴都佐領趙士麟改名卓霖伊獨善佐領以上正黄旗七名恒徳伯伶哥佐領長庚馬臘佐領旗二名以上正紅車栢馬爾太佐領舒兆䕫巴爾虎達佐領岱金平􅀈佐領旗三名以上鑲白雅爾納岳索立佐領傅鼐敖米佐領旗二名以上正藍文保九錫佐領名鑲藍旗一蒙古色誠改名色臣托克屯佐領蠻子改名明善蘇英格佐領以上正白旗二名何其忠伯伶哥佐領正紅旗一名漢軍楊文桂董成英佐領正白旗一名王徳純白鈺佐領張聖訓孔𫝊斌佐領二名以上鑲白旗徐瑗趙世綸佐領鑲紅旗一名雍正五年丁未科滿洲瓦爾達江米佐領名正黄旗一世臣佟濟佐領名正白旗一常徳胡什納佐領何其恵伯伶哥佐領星徳永夀佐領常保住莫洛森佐領四名以上正紅旗呉巴泰伊克坦佐領鑲白旗一名朱宏亮額色立佐領林朝包衣僧住佐領名以上正藍旗二富魁馬爾錫佐領鑲藍旗一名䝉古柰曼厄爾徳木圖佐領鑲白旗一名漢軍周祖榮孟繼祖佐領宋文錦髙焕佐領髙顯貴周偉佐領旗三名以上鑲紅雍正八年庚戌科滿洲西泰鈕倫佐領富敏改名敷文鈕倫佐領西成鈕倫佐領成徳明通佐領旗四名以上鑲黄和深達色佐領色通額徳山佐領龍光昱包衣穆克徳布佐領以上正黄旗三名七達富徳佐領廣明包衣阿麟管領名以上正白旗二兆毅格圗肯佐領椿年宗室阿林納佐領石麟包衣西爾泰管領徳光改名徳廣包衣艾那佐領以上鑲白旗四名伊福納常明佐領名鑲紅旗一佟保富興佐領明山額爾必圗佐領傅徳阿山佐領旗三名以上正藍鄂敏鄂爾竒佐領鑲藍旗一名䝉古額爾登額托克屯佐領正白旗一名漢軍馬丙左世英佐領王宗燦王世芳佐領二名以上正黄旗黄煃沈鐸佐領名正白旗一劉宏緒董國柱佐領鑲紅旗一名徐炎佟鑛佐領名正藍旗一雍正十一年癸丑科滿洲介福佟世楹佐領博通阿覺羅長安保佐領以上鑲黄旗二名赫成峩傅拉納佐領肇敏哈爾薩佐領二名以上正黄旗闗霖薩拉佐領佟崙喀乂喀佐領二名以上正白旗富海包衣薩圗佐領正紅旗一名雙慶達漠佐領名鑲白旗一鄂容安鄂爾竒佐領鄂倫鄂爾竒佐領二名以上鑲藍旗蒙古多爾吉班第佐領名鑲黄旗一漢軍楊殿邦楊繼勲佐領王士倧祝兆龍佐領二名以上鑲紅旗李彤標李廷炤佐領鑲藍旗一名乾隆元年丙辰科滿洲烏爾登額包衣八十佐領七十四包衣八十佐領執謙包衣五十四佐領以上鑲黄旗三名壮徳博啟佐領興泰徳山佐領懐䕃布徳山佐領旗三名以上正黄雙頂包衣鄂禮管領正白旗一名呉達善納欽佐領名正紅旗一泰保喜哥佐領三格沐特恩佐領二