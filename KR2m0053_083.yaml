body:
  text: 土田志八土田數目八旗給地總數鑲黄旗滿洲初次給地十九萬三千八百六十晌二次給地四萬二千三百一十五晌三次給地二萬一千八百八十五晌鑲黄旗䝉古初次給地二萬九千九百五晌二次給地二萬八千三百三十五晌三次給地六千八百九十五晌鑲黄旗漢軍初次給地三萬三千三百四十晌二次給地一萬九千八百五晌三次給地一萬七千五百五十晌共壯丁地三十九萬三千八百九十晌坐落大興宛平良鄉固安永清東安香河通州三河武清寶坻昌平順義密雲懐柔涿州房山霸州文安大城保定薊州玉田平谷遵化豐潤永平遷安昌黎灤州樂亭清苑滿城安肅定興新城唐縣容城完縣蠡縣雄縣安州髙陽新安易州淶水河間肅寧任邱交河青縣南皮獲鹿永寧衛良牧署采育里開平沙河驛赤城宣化徳州古北口冷口張家口喜峯口羅文峪獨石口石匣等處正黄旗滿洲初次給地七萬三千四百四十晌二次給地十五萬二千九百一十五晌三次給地三萬一千二百三十晌正黄旗蒙古初次給地一萬二千六百一十五晌二次給地一萬八千七百八十五晌三次給地三萬一千四百一十晌正黄旗漢軍初次給地二萬一千二百三十七晌三畆二次給地三萬一千三百一十二晌三畆三次給地一萬九千四百五十二晌三畆共壯丁地三十九萬二千三百九十六晌九畆坐落大興宛平良鄉固安永清東安香河通州三河武清寶坻昌平順義密雲懐柔涿州房山霸州文安保定薊州玉田平谷遵化豐潤盧龍遷安灤州樂亭清苑滿城安肅定興新城唐縣望都容城完縣蠡縣雄縣安州髙陽新安易州淶水河間肅寜任邱交河青縣滄州南皮獲鹿開平赤城宣化古北口冷口張家口獨石口石匣等處正白旗滿洲初次給地九萬五千四百五十五晌二次給地五萬五千四百四十五晌三次給地七萬二千二百三十五晌正白旗蒙古初次給地二萬一千五百六十二晌半二次給地二萬七百九十二晌半三次給地一萬八千二百四十三晌正白旗漢軍初次給地一萬四千四百六十晌二次給地二萬四千四百二十晌三次給地二萬三千九百九十五晌共壯丁地三十四萬六千六百八晌坐落大興宛平良鄉固安永清東安香河通州三河武清寶坻昌平順義宻雲懐柔涿州房山霸州文安保定薊州玉田平谷遵化豐潤永平遷安撫寧昌黎灤州樂亭安肅定興新城容城完縣雄縣安州髙陽易州淶水河間肅寧任邱交河青縣滄州南皮宣化羅文峪張家口獨石口古北口等處正紅旗滿洲初次給地三萬五千四百九十八晌二次給地八萬八千五百一十四晌零三次給地三萬五千三百四十五晌正紅旗蒙古初次給地三千九百二十八晌零二次給地一萬二千七百六十晌三次給地九千二百五十五晌正紅旗漢軍初次給地四千六百三十五晌二次給地一萬六百八十晌三次給地六千一百七十晌共壯丁地二十萬六千七百八十五晌零坐落宛平良鄉固安永清東安通州武清寶坻昌平順義宻雲房山霸州文安保定灤州樂亭清苑安肅定興蠡縣雄縣任邱河西務等處鑲白旗滿洲初次給地十萬四千四百七十五晌二次給地四萬四千五百七十晌三次給地三萬八千一百七十晌鑲白旗䝉古初次給地一萬六千九百五晌二次給地一萬四千三百六十五晌三次給地一萬五千九百三十五晌鑲白旗漢軍初次給地一萬一百五十晌二次給地五千五十五晌三次給地七千七百八十晌共壯丁地二十五萬七千四百五晌坐落大興宛平良鄉固安永清東安香河通州三河武清寶坻昌平順義密雲懐柔涿州房山霸州文安大城保定薊州玉田平谷遵化豐潤永平遷安灤州樂亭滿城安肅定興新城容城雄縣新安易州淶水河間肅寧任邱交河青縣静海滄州南皮延慶張家口喜峯口冷口羅文峪開平赤城沙河驛良牧署等處鑲紅旗滿洲初次給地一萬八千三百四十五晌二次給地九萬六千四百五十二晌半三次給地四萬三千五百三十七晌半鑲紅旗蒙古初次給地五百九十晌二次給地二萬二千四百二十五晌三次給地一萬七百二十晌鑲紅旗漢軍初次給地五千一百三十晌二次給地一萬五百晌三次給地九千八百九十五晌共壯丁地二十一萬七千五百九十五晌坐落宛平良鄉固安永清東安香河通州三河武清寶坻昌平順義涿州房山霸州大城保定豐潤永平遷安灤州樂亭清苑安肅定興新城唐縣望都完縣蠡縣雄縣淶水河間肅寧任邱滄州延慶河西務天津等處正藍旗滿洲初次給地十萬三千三百一十二晌半二次給地六萬六千五百四十五晌三次給地三萬七千九百九十晌正藍旗䝉古初次給地二萬五千晌二次給地一萬二千六十五晌三次給地一萬一千八百六十晌正藍旗漢軍初次給地一萬四千七百三十二晌半二次給地一萬二千二百一十五晌三次給地六千四百八十晌共壯丁地二十八萬五千六百一十晌坐落大興宛平良鄉固安永清東安香河通州三河武清寶坻昌平順義宻雲懐柔涿州房山霸州保定薊州玉田平谷遵化豐潤遷安昌黎灤州青苑滿城安肅定興唐縣容城雄縣髙陽新安易州任邱青縣南皮良牧署延慶等處鑲藍旗滿洲初次給地十萬八千三百八十晌二次給地三萬九千一十五晌三次給地二萬四千三百四十晌鑲藍旗蒙古初次給地二萬五千八百五晌二次給地四千一十三晌三次給地五千三百七十晌鑲藍旗漢軍初次給地一萬二千六百四十五晌二次給地八千六十晌三次給地七千五百六十晌共壯丁地二十三萬五千一百八十八晌坐落大興宛平永清東安香河三河武清昌平宻雲涿州房山盧龍樂亭定興蠡縣安州髙陽易州淶水河間任邱獲鹿河西務獨石口張家口等處以上八旗給地總數目直𨽻各處八旗地畆數目一順天府順天府大興縣鑲黄旗順治二年至四年原撥給旗人民地共二百二十二頃零二畆屯地三十七頃六十八畆七分牧馬地八十四頃六十畆五分康熙三年至三十四年續撥給各項地共二百十一頃三十六畆三分厯年退出地共一百三十六頃三十畆四分康熙六年至三十九年復撥給各項地共九十九頃五十六畆一分正黄旗順治二年至四年原撥給旗人民地共一百九十九頃九十五畆屯地共五十二頃七十一畆牧馬地共八十一頃三十七畆五分康熙三年至五年續撥給馬房香火等地共二十五頃六十七畆順治七年投充旗地共七十二頃二十九畆二分厯年退出地共二十三頃六十九畆五分康熙四年至四十二年復撥給各項地共八頃三十三畆正白旗順治二年至四年原撥給旗人民地一百七十九頃八畆九分屯地共五十五頃十八畆五分牧馬地共九十一頃十五畆順治十三年至康熙二十三年續撥給各項地共三百十六頃八十八畆八分厯年退出地共八十五頃十六畆四分零康熙六年至五十一年復撥給各項地共一百十八頃零三畆一分鑲白旗順治二年至四年原撥給旗人民地共一百六頃八十六畆五分屯地共四十五頃六十四畆五分牧馬地共九十一頃十四畆順治十七年至康熙五年退給光禄寺等處地共九頃四十七畆畦地一千一百三十八箇厯年退出地共一百二十四頃二畆二分康熙五年至二十二年復撥給退地共二十一頃二畆三分内塋地十八畆三分正藍旗順治二年至四年原撥給旗人民地共九十五頃六十八畆六分屯地共四十五頃三十一畆牧馬地共八十七頃八十九畆五分康熙元年至十一年續撥給各項地共九頃九十六畆六分厯年退出地共七十三頃九十畆六分康熙十三年至三十二年復撥給退地共三頃二十五畆三分鑲藍旗順治二年至四年原撥給旗人民地共八十四頃五畆七分屯地共三十二頃九十三畆六分牧馬地共七十五頃九十三畆二分順治十七年至康熙六年退給尚膳監等處共十三頃八十六畆五分畦地一萬三千四百十五箇各王府屬下退出地共二百十七頃五十八畆三分康熙二十年至五十九年復撥給苑户莊頭馬軍等地共三百五十四頃十一畆八分謹案舊志云各府州縣原冊其撥給投充地畆間有不列旗分者如霸州來冊亦聲明原案卷未經分别葢以各王府及苑户莊頭等地畆非屬一旗故也志故將有旗分者分載於前而以無旗分者另行總載於後以存全數云云今謹仍之宛平縣鑲黄旗康熙六年至二十二年原撥給旗人地共九十七頃十一畆康熙六年至五十八年退出地共七頃四十畆正黄旗順治元年至康熙四十八年原撥給旗人地共八百四頃六十一畆零順治七年投充旗地五十五頃十三畆八分零康熙三年至雍正二年退出地共三十二頃三十五畆零康熙二十四年至雍正五年復撥給旗人地共十五頃二十四畆六分正黄鑲紅二旗康熙二十六年同退出地一頃八十畆正白旗順治八年至康熙五十七年退出地共二十四頃二十九畆雍正四年復撥給旗人地二十畆正紅旗順治三年至康熙二十三年原撥給旗人地共六百六十三頃二十三畆九分零康熙五十一年續撥給旗人地一頃四十畆零鑲白旗順治四年至康熙二十五年原撥給旗人地共一千一百五十八頃二十四畆三分零康熙四年至七年退出地共十頃三十六畆鑲紅旗康熙十三年原撥給旗人地二十八畆康熙二年至八年退出地共五十頃九十二畆康熙八年至五十五年復撥給旗人地共六頃十一畆零正藍旗康熙十四年至二十三年原撥給旗人地共十頃八十五畆康熙四年至三十九年退出地共二頃七十畆内三十五畆築渾河堤岸鑲藍旗康熙十七年原撥給旗人地二十八畆康熙三年四年退出地共十二頃四十九畆五分康熙十三年至二十二年撥給莊頭苑户馬軍等地共一百二十一頃五十六畆八分零順治三年至雍正五年退出莊頭苑户園頭等地共一百四十三頃三十三畆四分零康熙七年至雍正五年復撥給莊頭苑户各項人等地共二百二十九頃七十二畆六分零良鄉縣鑲黄旗康熙二十一年原撥給旗人地二頃三十七畆康熙四十二年退出地六頃六十畆康熙四十九年復撥給旗人地一頃六十畆正黄旗順治三年四年原撥給旗人地共二千六百九十三頃二畆零順治二年至四年投充旗地共二百二十五頃二十二畆二分零康熙二十三年至雍正二年退出地共十一頃十畆康熙四十五年至五十五年復撥給旗人地共四頃七十畆正白旗康熙二十年撥給旗人地共三十一頃二十七畆八分零康熙四十一年退出地九畆康熙三十二年至雍正二年退出地共七頃三十九畆康熙二十四年至雍正五年復撥給旗人地共七頃五十九畆五分零又康熙九年至四十六年撥給各旗人等地共三十三頃六十一畆九分零謹案舊志良鄉縣地畆止有上三旗且聲明冊内原有不列旗分地三十餘頃照册並載云云今亦仍之地又案良鄉之下為固安縣而舊志不載入此縣畆今亦無可增添至縣中原設井地則已載入屯户一門謹聲明於此永清縣鑲黄旗順治二年至康熙二十三年撥給旗人地共五十三頃五十一畆順治二年至七年投充旗地共十八頃四十二畆五分正黄旗順治二年至康熙二十四年撥給旗人地共四十五頃三十五畆又各莊頭地共三十七頃三十三畆又内務府人等地十四頃十八畆又投充旗地十六頃四十八畆九分零正白旗順治二年至六年撥給旗人地共九十七頃七十八畆五分零又莊頭地共十八頃正紅旗順治六年撥給旗人地共五頃四十畆雍正元年撥給王府莊頭地共十一頃九十六畆鑲白旗順治二年至康熙年間撥給