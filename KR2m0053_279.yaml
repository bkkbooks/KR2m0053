body:
  text: 人物志一百四十五列女傳二十五八旗漢軍列女傳三鑲黃旗漢軍間散邵景華之妻王氏鑲黃旗漢軍間散陳索之妻胡氏鑲黃旗漢軍間散韓延祚之妻紀氏鑲黃旗漢軍間散常祿之妻張氏鑲黃旗漢軍間散活尚之妻李氏鑲黃旗漢軍間散王永命之妻邵氏鑲黃旗漢軍間散楊樞之妻于氏鑲黃旗漢軍馬甲顧天雲之妻王氏鑲黃旗漢軍馬甲王玉之妻談氏正黃旗漢軍馬甲周瑛之妻夏氏正黃旗漢軍間散趙玉文之妻郭氏正黃旗漢軍間散馬應詔之妻常氏正黃旗漢軍間散劉枚臣之妻李氏正黃旗漢軍官學生時惟萃之妻佟氏正黃旗漢軍馬甲徐玉白之妻林氏正白旗漢軍間散郭義之妻竇氏正白旗漢軍蘇松道蔡永清之妾李氏正白旗漢軍領催張國典之妻隨氏正白旗漢軍間散董廷柱之妻劉氏正白旗漢軍馬甲康文舉之妻陸氏正白旗漢軍候補筆帖式黃煥之妻佟氏正白旗漢軍廣西潯州府通判于傑之妻張氏正白旗漢軍水手魯朝忠之妻馮氏正白旗漢軍壯丁徐士元之妻林氏正白旗漢軍壯丁郭登魁之妻王氏正白旗漢軍間散溫進魁之妻劉氏正白旗漢軍壯丁施進忠之妻王氏正白旗漢軍壯丁莊金之妻李氏正白旗漢軍壯丁劉西安之妻金氏正白旗漢軍台丁魯英遷之妻塔氏正白旗漢軍台丁李士文之妻王氏正白旗漢軍台丁劉貴升之妻張氏正白旗漢軍壯丁王懷仁之妻裴氏正白旗漢軍台丁王宗顔之妻陳氏正白旗漢軍台丁李文賓之妻王氏正白旗漢軍壯丁鄭為國之妻賢氏正白旗漢軍壯丁錢國正之妻王氏正白旗漢軍領催夏國柱之妻楊氏正白旗漢軍壯丁吕文甲之妻尚氏正白旗漢軍壯丁金三保之妻楊氏正白旗漢軍壯丁李雅德之妻趙氏正白旗漢軍壯丁韓國太之妻李氏正紅旗漢軍壯丁張連魁之妻陳氏正紅旗漢軍間散周大賚之妻樊氏正紅旗漢軍間散劉奉起之妻王氏正紅旗漢軍水手韓周任之妻王氏正紅旗漢軍間散邊峻之妻周氏正紅旗漢軍間散段連成之妻吕氏正紅旗漢軍間散李天寵之妻丁氏正紅旗漢軍馬甲尚彪之妻劉氏正紅旗漢軍筆帖式門鐸之妻朱氏鑲白旗漢軍沙河同知張充國之妻覺羅氏鑲白旗漢軍馬甲孟魁之妻關氏鑲白旗漢軍壯丁楊宗義之妻李氏鑲紅旗漢軍馬甲髙宏譽之妻李氏鑲紅旗漢軍間散賈國臣之妻張氏鑲紅旗漢軍馬甲遲耀龍之妻趙氏鑲紅旗漢軍領催祝國安之妻李氏鑲紅旗漢軍知州楊天行之妾景氏鑲紅旗漢軍馬甲戴起鵬之妻張氏鑲紅旗漢軍馬甲金文相之妻李氏正藍旗漢軍站丁孫雲龍之妻謝氏正藍旗漢軍間散趙四德之妻何氏正藍旗漢軍水手蕭海夀之妻劉氏正藍旗漢軍陜州州同佟世英之妻王氏正藍旗漢軍壯丁李芳貴之妻朱氏正藍旗漢軍間散髙文金之妻吳氏正藍旗漢軍間散王二各之妻佟氏正藍旗漢軍間散陸成之妻章佳氏正藍旗漢軍馬甲于紹忠之妻徐氏正藍旗漢軍馬甲周思敬之妻冷氏正藍旗漢軍馬甲秦有祿之妻段氏正藍旗漢軍間散郭占花之妻黃氏正藍旗漢軍馬甲陳萬銀之妻陳氏正藍旗漢軍馬甲邵吉貴之妻張氏正藍旗漢軍馬甲孫達哈之妻謝氏正藍旗漢軍間散唐哩之妻馬氏鑲藍旗漢軍間散朱煊之妻髙氏鑲藍旗漢軍間散張鳯耀之妻趙氏鑲藍旗漢軍馬甲王紹隆之妻李氏鑲藍旗漢軍炮手張鳴鳯之妻艾氏鑲藍旗漢軍水手楊惠恩之妻張氏鑲藍旗漢軍水手石茂勳之妻張氏鑲藍旗漢軍水手皂保之妻楊氏鑲藍旗漢軍站丁蔡自新之妻王氏鑲藍旗漢軍站丁李華之妻薛氏鑲藍旗漢軍站丁王益良之妻包氏鑲藍旗漢軍站丁孫戴先之妻宋氏鑲藍旗漢軍站丁王倫之妻雷氏鑲藍旗漢軍台丁楊自富之妻董氏鑲藍旗漢軍台丁范洪道之妻李氏鑲藍旗漢軍壯丁張善之妻李氏鑲藍旗漢軍壯丁潘振宏之妻胡氏鑲藍旗漢軍壯丁張國選之妻耿氏鑲藍旗漢軍壯丁張望天之妻田氏鑲藍旗漢軍壯丁阿福之妻耿氏鑲藍旗漢軍壯丁劉文進之妻沈氏鑲藍旗漢軍壯丁馬進忠之妻馬氏鑲藍旗漢軍壯丁劉士貴之妻尚氏鑲藍旗漢軍壯丁三舍之妻王氏鑲藍旗漢軍壯丁李文芳之妻孫氏以上俱於乾隆十一年旌表鑲黃旗漢軍馬甲蔣士俊之妻王氏鑲黃旗漢軍站丁李牌逺之妻韓氏鑲黃旗漢軍馬甲劉鳯瑞之妻沈氏鑲黃旗漢軍候選同知馬哈拉吉之妻趙氏鑲黃旗包衣漢軍馬甲常保住之妻劉氏鑲黃旗漢軍壯丁王興武之妻李氏鑲黃旗漢軍壯丁王廷樞之妻金氏鑲黃旗漢軍馬甲徐大年之妻田氏鑲黃旗漢軍馬甲李翰之妻孫氏鑲黃旗漢軍間散孔義之妻張氏鑲黃旗漢軍間散張文升之妻張氏正黃旗漢軍馬甲趙代之妻羅氏正黃旗漢軍間散范世瑾之妻陳氏正黃旗漢軍生員羅濂之妾周氏正黃旗漢軍馬甲徐國榮之妻邱氏正黃旗漢軍領催張爾玉之妻王氏正白旗漢軍馬甲韓如璞之妻李氏正白旗漢軍壯丁陳國秀之妻白氏正白旗漢軍領催王耀龍之妻佟氏正白旗漢軍馬甲馬國柱之妻王氏正白旗漢軍馬甲曹襄祖之妻馮氏正白旗漢軍壯丁王起榮之妻王氏正白旗漢軍江西布政使石成峩之妾徐氏正白旗漢軍間散劉興國之妻張氏正紅旗漢軍監生陳允恭之妻吳氏正紅旗漢軍幼丁劉起元之妻孫氏正紅旗漢軍領催王國泰之妻包氏正紅旗漢軍幼丁陳德桂之妻陳氏正紅旗漢軍馬甲陳文煌之妻楊氏正紅旗漢軍幼丁王起鳯之妻牛氏正紅旗漢軍間散蘭廷佐之妻張氏鑲紅旗漢軍候選知州王興憲之妻范氏鑲紅旗漢軍馬甲賈廷之妻袁氏鑲紅旗漢軍鎗手劉文逺之妻張氏鑲紅旗漢軍監生王䨵之妻李氏正藍旗漢軍間散佟􅀈彩之妻楊氏正藍旗漢軍壯丁王國卿之妻傅氏正藍旗漢軍壯丁張世魁之妻張氏正藍旗漢軍領催佟士林之妻王氏正