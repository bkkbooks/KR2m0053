  text: 人物志一百四十一列女傳二十一八旗蒙古列女傳四鑲黃旗蒙古前鋒逹爾扎之妻齊克騰氏鑲黃旗蒙古馬甲丹巴林泰之妻李氏鑲黃旗蒙古雲騎尉圗桑阿之妻尚氏鑲黃旗蒙古前鋒常森保之妻和佳氏鑲黃旗蒙古馬甲伊成之妻佟佳氏鑲黃旗蒙古前鋒夀元之妻裕瑚魯氏鑲黃旗蒙古馬甲長夀之妻鄂濟多克氏鑲黃旗蒙古馬甲烏爾圗那蘇圗之繼妻克什特氏鑲黃旗蒙古馬甲訥克圗之妻張佳氏鑲黃旗蒙古馬甲廣祿之妻額勒德特氏鑲黃旗蒙古馬甲頗廉之妻鄂莫多克氏鑲黃旗蒙古馬甲重陽保之妻蘇尼特氏鑲黃旗蒙古馬甲常夀之妻把嶽忒氏鑲黃旗蒙古馬甲六十七之妻佟啓氏鑲黃旗蒙古馬甲傅保之妻佟啓氏鑲黃旗蒙古馬甲多爾吉之妻莽努特氏鑲黃旗蒙古馬甲常夀之妻查庫塔氏鑲黃旗蒙古馬甲八十八之妻張氏鑲黃旗蒙古馬甲費雅納之妻烏扎拉氏正黃旗蒙古間散布嶽什之妻巴魯特氏正黃旗蒙古馬甲官家保之妻蘇密爾氏正黃旗蒙古馬甲五十之妻瓜勒佳氏正黃旗蒙古馬甲鄂莫克圗之妻圗莫特氏正黃旗蒙古馬甲沙進逹里之繼妻和齊特氏正黃旗蒙古間散逹蘭泰之妻維尼爾氏正白旗蒙古護軍伊白克圗之繼妻黃氏正白旗蒙古護軍逹崇阿之妻把嶽忒氏正白旗蒙古領催海保之繼妻王氏正白旗蒙古馬甲麻色之妻戴氏正白旗蒙古馬甲巴爾當之妻胡氏正紅旗蒙古護軍巴拉布之妻馬氏正紅旗蒙古護軍哈清阿之妻張氏正紅旗蒙古馬甲六狗兒之妻趙氏正紅旗蒙古馬甲多爾吉之妻髙氏正紅旗蒙古筆帖式騰格特之妻王氏正紅旗蒙古馬甲三保之妻曾氏正紅旗蒙古馬甲福僧格之妻索佳氏正紅旗蒙古馬甲拖金之妻朱氏正紅旗蒙古馬甲衣特根之妻富察氏正紅旗蒙古護軍五黑之妻鄧氏正紅旗蒙古馬甲楊夀之妻何佳氏正紅旗蒙古領催二雅圗之妻唐佳氏鑲白旗蒙古護軍圗莫代之妻趙氏鑲白旗蒙古護軍蘇爾泰之妻吳氏鑲白旗蒙古護軍多隆五之妻伊爾根覺羅氏鑲白旗蒙古馬甲巴雅思胡之妻金氏鑲白旗蒙古馬甲六十九之妻巴延氏鑲白旗蒙古馬甲貴倫齊之妻查拉克氏鑲白旗蒙古馬甲逹蘭泰之妻查爾和特氏鑲白旗蒙古匠役有祿之妻瓜勒佳氏鑲紅旗蒙古馬甲福倫泰之妻舒舒覺羅氏鑲紅旗蒙古馬甲留保住之妻傅佳氏鑲紅旗蒙古馬甲常魁之妻郭渾氏鑲紅旗蒙古馬甲額倫泰之妻和里清氏正藍旗蒙古馬甲塔布圗之妻富察氏正藍旗蒙古間散額勒登布之妻黃佳氏正藍旗蒙古馬甲二及圗之妻孔佳氏正藍旗蒙古馬甲泰林之妻杭阿泰氏鑲黃旗蒙古馬甲黑達色之妻金氏鑲藍旗蒙古護軍官德之妻舒穆祿氏鑲藍旗蒙古馬甲九兒之妻董氏鑲藍旗蒙古馬甲額登之妻拖羅特氏鑲藍旗蒙古馬甲拖乃之妻車莫特氏鑲藍旗蒙古馬甲玻霍勒逹之妻祿葉勒氏以上俱於乾隆三十一年旌表正黃旗蒙古驍騎校東魯之繼妻趙氏正黃旗蒙古護軍官德之妻那氏正黃旗蒙古護軍保住之妻鄂氏正黃旗蒙古馬甲七十爾之妻黃氏正白旗蒙古領催博爾圗之繼妻陳氏正白旗蒙古領催石圗之繼妻巴雅拉氏正白旗蒙古前鋒佛爾清額之繼妻瓜勒佳氏正白旗蒙古馬甲圗古都之妻富察氏正白旗蒙古馬甲陶班之妻吳氏正白旗蒙古前鋒色布清額之妻佟佳氏正紅旗蒙古前鋒維常之妻布特氏正紅旗蒙古馬甲三保之妻曾氏鑲白旗蒙古護軍多爾吉之妻富察氏鑲白旗蒙古領催明德之妻戴氏鑲白旗蒙古馬甲補眼奈之妻胡氏鑲白旗蒙古馬甲諾羅木之妻溫氏鑲白旗蒙古步甲朱立哈代之妻馮氏鑲紅旗蒙古壯丁德爾謨爾圗之妻逹布圗氏正藍旗蒙古筆帖式多爾吉之妻敖氏正藍旗蒙古護軍富保之妻楊氏正藍旗蒙古驍騎校齊起克圗之繼妻白氏正藍旗蒙古馬甲塔布圗之妻富察氏鑲藍旗蒙古護軍官德之妻舒穆祿氏鑲藍旗蒙古馬甲阿力賔之妻趙氏鑲藍旗蒙古馬甲黑逹子之妻金氏以上俱於乾隆三十二年旌表鑲黃旗蒙古護軍老格之妻侯氏鑲黃旗蒙古護軍富明之妻方氏鑲黃旗蒙古前鋒圗爾泰之妻髙氏鑲黃旗蒙古前鋒策巴之妻汪氏鑲黃旗蒙古弓匠長逹賴之妻朱氏鑲黃旗蒙古馬甲德住之妻劉氏鑲黃旗蒙古馬甲必里克圗之妻曽氏正黃旗蒙古護軍阿拉布談之妻姚氏正黃旗蒙古前鋒逹賴之妻佟啓氏正黃旗蒙古領催鄧保之妻劉氏正黃旗蒙古馬甲九格之妻包氏正黃旗蒙古馬甲劉保住之妻興氏正白旗蒙古護軍五爭額之妻把嶽忒氏正白旗蒙古筆帖式扎什敦多克之妻魏拉特氏正白旗蒙古馬甲敏生之妻蔡努忒氏正紅旗蒙古護軍明安布之妻弓氏鑲白旗蒙古護軍佛德之繼妻徐氏鑲白旗蒙古護軍訥們扎什之妻萬氏鑲白旗蒙古護軍海青之妻巴雅拉氏鑲白旗蒙古護軍阿必逹之妻敖卓氏鑲白旗蒙古護軍烏玉齊之妻郭爾羅斯氏鑲白旗蒙古前鋒八十七之妻王氏鑲白旗蒙古領催阿爾泰之妻劉氏鑲白旗蒙古馬甲必禮琨逹賴之妻趙氏正藍旗蒙古護軍巴顔之妻常氏正藍旗蒙古護軍玉保之妻趙氏正藍旗蒙古護軍噶海之妻李氏正藍旗蒙古馬甲黑達色之妻伊爾根覺羅氏以上俱於乾隆三十三年旌表鑲黃旗蒙古護軍漢社之妻楊氏鑲黃旗蒙古鳥鎗護軍照保之妻成氏鑲黃旗蒙古護軍保山之妻秦氏鑲黃旗蒙古馬甲斌逹拉之妻喬氏鑲黃旗蒙古馬甲色泰之妻王佳氏正白旗蒙古鳥鎗護軍格綳額之妻王氏正白旗蒙古護軍石德之妻陳氏正白旗蒙古馬甲富保之妻張氏正白旗蒙古護軍逹賴之妻趙氏正白旗蒙古馬甲卓多保之妻撥靈郭忒氏鑲白旗蒙古護軍常保之妻賴氏鑲白旗蒙古馬甲白逹色之妻竇氏鑲白旗蒙古領催六逹色之妻何氏鑲白旗蒙古雲騎尉七十八之妻王氏鑲藍旗蒙古領催卓里克圗之妻吳氏以上俱於乾隆三十四年旌表鑲黃旗蒙古護軍七十之妻李氏鑲黃旗蒙古護軍伊常阿之妻白氏正白旗蒙古護軍博第之妻魏氏正白旗蒙古護軍索諾木扎什之妻尤氏正白旗蒙古間散五爾衮布之妻楊伊勒氏正紅旗蒙古翻譯秀才阿拉信之妻潘氏正紅旗蒙古護軍福成額之妻楊氏鑲白旗蒙古護軍常住之妻宋氏鑲白旗蒙古護軍瑪塔里之繼妻韓氏鑲白旗蒙古馬甲七十五之妻張氏鑲紅旗蒙古馬甲六十保之妻瓜勒佳氏鑲紅旗蒙古馬甲文福之妻趙氏鑲紅旗蒙古馬甲天紹保之妻巴氏正藍旗蒙古護軍校愛任之妻張氏正藍旗蒙古護軍烏楞古之妻王氏正藍旗蒙古馬甲武拉克圗之繼妻兆佳氏正藍旗蒙古步甲法保之妻錢氏正藍旗蒙古間散衆佛保之妻王氏鑲藍旗蒙古佐領烏瑪善之妻薑氏以上俱於乾隆三十五年旌表鑲黃旗蒙古護軍八十三之妻松氏鑲黃旗蒙古護軍永保之妻巴逹克氏鑲黃旗蒙古護軍六逹色之妻納氏鑲黃旗蒙古馬甲素爾泰之繼妻薩克逹氏鑲黃旗蒙古間散阿爾泰之妻趙氏正黃旗蒙古領催阿玉喜之繼妻巴里克氏正黃旗蒙古領催馬起之妻王氏正黃旗蒙古間散七十九之妻湯氏正白旗蒙古護軍多爾濟之繼妻佟佳氏正白旗蒙古馬甲常德之妻博拉克齊忒氏正白旗蒙古馬甲圗瓦哈之妻瓜勒佳氏正紅旗蒙古護軍巴蘭布之妻吳氏正紅旗蒙古馬甲遮爾吉之妻趙氏鑲白旗蒙古護軍柏爾騰之妻李氏鑲白旗蒙古馬甲逹爾麻之妻劉氏鑲白旗蒙古馬甲年昌阿之妻韋佳氏鑲白旗蒙古馬甲豐騰額之妻趙氏鑲白旗蒙古間散福保之妻趙氏鑲紅旗蒙古領催塔賴之妻把嶽忒氏正藍旗蒙古護軍麻育理之妻黃氏正藍旗蒙古護軍黑逹色之妻布氏正藍旗蒙古馬甲二黑之妻徐氏正藍旗蒙古馬甲蘇爾泰之妻白氏正藍旗蒙古馬甲烏爾圗那蘇圗之妻張氏鑲藍旗蒙古馬甲長寧之妻何托氏鑲藍旗蒙古馬甲三格之妻趙氏鑲藍旗蒙古馬甲四十六之妻李氏以上俱於乾隆三十六年旌表鑲白旗蒙古馬甲官德之妻徐氏正白旗蒙古間散老格之妻魏氏鑲白旗蒙古間散伊倫忒之妻布爾喀起忒氏鑲白旗蒙古護軍巴爾嘎孫之繼妻克西格忒氏鑲白旗蒙古領催伍那之妻趙氏正藍旗蒙古馬甲米思巴爾之妻趙佳氏正藍旗蒙古炮手七逹色之妻林佳氏鑲藍旗蒙古護軍額爾青額之妻王氏鑲藍旗蒙古護軍啓陵阿之妻吳氏以上俱於乾隆三十七年旌表鑲黃旗蒙古護軍圗升額之妻趙氏鑲黃旗蒙古參領二黑之妻博爾濟吉特氏鑲黃旗蒙古護軍富保之妻李氏鑲黃旗蒙古馬甲查隆阿之妻什爾格特依氏正黃旗蒙古馬甲經格之妻扎爾佳氏正黃旗蒙古馬甲阿爾呼逹之妻薑氏正白旗蒙古馬甲領催黑達色之妻孫氏正紅旗蒙古馬甲喀隆阿之妻蕭氏鑲白旗蒙古馬甲蘇楞額之妻江吉氏鑲白旗蒙古前鋒三格之妻韓氏鑲白旗蒙古護軍圗敏之妻李氏鑲紅旗蒙古馬甲五十之妻關氏鑲藍旗蒙古護軍倭興額之妻王氏鑲藍旗蒙古護軍常青之妻鮑氏鑲藍旗蒙古護軍德祿之妻莽努特氏鑲藍旗蒙古護軍富明之妻陳氏以上俱於乾隆三十八年旌表鑲黃旗蒙古護軍八逹色之妻包氏鑲黃旗蒙古步甲富森布之妻白依克氏正黃旗蒙古中書佛爾慶額之妻李氏正黃旗蒙古護軍百嵗之妻車莫特氏正黃旗蒙古領催波勒和圗之妻赫舍里氏正黃旗蒙古馬甲巴揚阿之妻吳喇忒氏正黃旗蒙古馬甲二格之妻張氏正白旗蒙古馬甲孝順布之妻富察氏正白旗蒙古馬甲諾海之妻和佳氏正白旗蒙古馬甲依克談布之妻張佳氏正紅旗蒙古前鋒特柱之妻伊爾根覺羅氏正紅旗蒙古馬甲色爾圗之妻瓜勒佳氏正紅旗蒙古馬甲富隆之妻他塔喇氏正紅旗蒙古馬甲明保之妻常氏鑲白旗蒙古親軍六逹色之繼妻馮氏鑲白旗蒙古領催林柱之妻談氏鑲白旗蒙古領催阿玉璽之妻張氏鑲白旗蒙古護軍忒通額之妻龔氏鑲白旗蒙古馬甲富海之妻巴里克氏鑲白旗蒙古間散伊靈阿之妻夯阿坦氏正藍旗蒙古護軍五爾圗之妻葛氏正藍旗蒙古護軍烏爾圗之妻魏氏正藍旗蒙古前鋒僧格之繼妻王氏正藍旗蒙古馬甲福祿之妻趙氏正藍旗蒙古間散元靈之妻逹爾哈騰氏鑲藍旗蒙古護軍寧阿之妻卜氏鑲藍旗蒙古馬甲糯敏之妻果爾吉氏以上俱于乾隆三十九年旌表鑲黃旗蒙古馬甲道保之妻伊爾根覺羅氏鑲黃旗蒙古馬甲巴延泰之繼妻瓜勒佳氏正黃旗蒙古護軍官德之妻包氏正黃旗蒙古護軍䇿丹之妻卓佳氏正黃旗蒙古馬甲布逹拉之妻把嶽忒氏正黃旗蒙古養育兵七逹色之妻孫氏正黃旗蒙古養育兵柯興額之妻劉氏正白旗蒙古馬甲布占之妻把嶽忒氏正白旗蒙古馬甲格巴庫之妻禇氏正紅旗蒙古護軍校更音布之妻楊氏正紅旗蒙古護軍回子克什克之妻劉氏正紅旗蒙古護軍窩仁泰之妻布爾哈楚特氏正紅旗蒙古前鋒老格之妻李氏正紅旗蒙古步甲白亮之妻蘇氏正紅旗蒙古馬甲馬桑阿之妻蔡氏正紅旗蒙古馬甲伊逹木之妻趙氏正紅旗蒙古馬甲成圗之妻西氏鑲白旗蒙古護軍富勒混之妻杜氏鑲白旗蒙古領催格格綳額之妻巴魯特氏鑲白旗蒙古馬甲布第雅之妻那氏鑲紅旗蒙古馬甲烏林泰之繼妻鄂爾圗特氏鑲紅旗蒙古馬甲進布之妻金氏鑲紅旗蒙古間散托林保之妻陳氏正藍旗蒙古護軍烏徹勒爾圗之妻盧氏正藍旗蒙古護軍三逹色之妻富爾吉特氏正藍旗蒙古領催豐盛額之妻翁色金氏正藍旗蒙古馬甲玉柱之妻楊氏正藍旗蒙古馬甲常柱之妻他塔喇氏正藍旗蒙古馬甲托金泰之妻白氏鑲藍旗蒙古護軍巴禮瑪忒之妻張氏鑲藍旗蒙古領催蘇郎阿之妻王氏鑲藍旗蒙古親軍明福之繼妻完顔