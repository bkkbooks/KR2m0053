  text: 旗分志二十五八旗佐領二十五正紅旗漢軍佐領正紅旗漢軍佐領正紅旗漢軍都統所屬叅領五第一叅領下佐領六第二叅領下佐領六第三叅領下佐領六第四叅領下佐領五第五叅領下佐領五第一叅領第一佐領係順治元年将定南王孔有徳所屬人丁編為牛录初𨽻正黄旗以閔天俊管理閔天俊故以其子閔宏宗管理閔宏宗故以其子閔士瑾管理閔士瑾縁事革退以其弟閔士璋管理閔士璋故以其弟閔士瑞管理閔士瑞縁事革退以其兄之子閔承烈管理雍正四年此佐領始撥𨽻本旗閔承烈縁事革退以其族兄閔文輝管理閔文輝年老休致以其子閔良弼管理閔良弼故以其子閔獲春管理閔獲春故以其姪閔師賢管理第一叅領第二佐領係順治二年將隨左夢庚投誠人員編為牛录初以投誠叅將孟希舜管理孟希舜因病觧任以其子孟名世管理孟名世陞任副都統因病辭退以其子們得禮管理們得禮縁事革退以其弟伊拉齊管理伊拉齊縁事革退以們得禮之子孟以維管理孟以維縁事革退以副叅領程鋗管理程鋗故以姜國用管理姜國用調用以驍騎校陳志綱管理陳志綱故以雲麾使王林管理王林補放叅将以歩軍副尉楊繹管理楊繹故以歩軍校劉文鎬管理謹案此本係世管佐領乾隆三年孟以維縁事治罪遵雍正三年上諭作為公中佐領再們得禮旗冊作孟緯祖第一恭領第三佐領原係在盛京編設初以固山額真後改固山案班漢文稱都統呉守進兼管吴守進陞任漢中将軍以其長子吴國柄管理吴國柄故以其弟吴國正管理吴國正陞任漢中梅勒章京以郎中楊茂椿管理續以吴國極管理吴國極故以其長孫吴如譯管理吴如譯陞任直𨽻撫標右營遊擊以其叔父一等阿達哈哈番吴鍈管理吴鍈故以其兄之子吴如訥管理吴如訥因甄别革退以其弟一等阿達哈哈番吴如讓管理吴如讓降調以其姪天保管理第一叅領第四佐領係崇徳七年編設之牛录初以孫徳盛管理孫徳盛陞任西安梅勒章京以分得撥什庫寇四管理寇四陞任鎮江駐防協領以孫徳盛之子孫世俊管理孫世俊故以其弟孫世宏管理孫世宏縁事革退以其兄孫元吉管理孫元吉故以其弟孫元士管理孫元士縁事降調以其兄之子拜他喇布勒哈番孫紹祥管理孫紹祥故以其子孫寳鳴管理孫寳鳴故以其族弟孫寳岐管理第一叅領原第五佐領係雍正十一年将内務府壮丁一百二十九名自鄭安康劉顯兩佐領下撤出編為一整佐領以副叅領王國璉管理王國璉縁事革退以恭領王正管理王正縁事革退以劉文炳管理謹案此佐領原係由内務府撥出另記檔案人丁乾隆三十一年遵㫖另記檔案養子開户人等出旗為民将此佐領裁汰第一叅領第五佐領原係四叅領下第六佐領係順治三年編設之牛录初以隨左夢庚投誠都司劉國輔管理劉國輔從征湖廣陣亡以拜他喇布勒哈畨杜有才管理杜有才駐防福建以拜他喇布勒哈畨王應時管理王應時年老辭退仍以杜有才管理杜有才故以督捕司郎中鄒應仕管理鄒應仕縁事革退以二等阿思哈尼哈畨李斕管理李斕故以其子李永陞管理李永陞縁事革退以叅領李永年管理李永年縁事革退以副叅領李永安管理李永安縁事革退以户部員外郎劉宏祖管理劉宏祖縁事革退以廣寧門城門尉楊國相管理楊國相因年老告退以二等男李時敏管理李時敏縁事革退以鑾儀衛治儀正劉淇管理劉淇故以印務恭領鄭馥管理第一叅領第六佐領原係駐防廣東佐領初以金有才管理康熙二十二年進京分𨽻正黄旂以御史于三賢管理于三賢陞任雲南布政使以其子于起鳯管理于起鳯因病革退以三等侍衛金紀祖管理雍正四年此佐領撥𨽻本旗以叅領劉徳滋管理劉徳滋縁事革退以驍騎校于来鳯管理于来鳯因病告退以歩軍校鄭秉訓管理鄭秉訓故以治儀正邱兆崐管理邱兆崐故以歩軍校羅彦章管理羅彦章故以内閣侍讀盛徳昌管理盛徳昌陞任湖北徳安府知府以叅領温瑢管理第二叅領第一佐領原係駐防廣東佐領初以馬稱驥管理康熙二十二年進京分𨽻正黄旗以副都統張俊兼管張俊故以拖沙喇哈畨于良輔管理雍正四年此佐領撥𨽻本旗以副叅領毋兆瑛管理毋兆瑛故以副叅領于宗文管理于宗文縁事革退以三等侍衛王浡管理王浡陞授都司以二等男李承綸管理李承綸因事降調以副叅領姜國程管理姜國程故以吉林佐領朱詩管理朱詩故以印務章京李淨私管理李凈私故以雲麾使王模管理第二叅領第二佐領係崇徳七年編設之牛录初以甲喇章京馮文運管理馮文運故以刑部郎中王錫宇管理王錫宇年老辭退以驍騎校寗完直管理寗完直故以其子監生寗思賢管理寗思賢故以其兄候補叅議道寗思聖管理寗思聖故以其子寗輔佐管理寗輔佐縁事革退以通政司左叅議張國棟管理張國棟休致以歩軍副尉傅暄管理傅暄故以印務章京驍騎校張定邦管理張定邦故以歩軍校馬國璽管理馬國璽故以歩軍校王懐亮管理王懐亮故以雲騎尉張維剛管理第二叅領第三佐領係在盛京編設初以王一屏管理續以投誠榆林副将王世選管理王世選年老革退以分得撥什庫王有報管理王有報年老辭退以王世選之子王之弼管理王之弼縁事革退以其兄之子王毓瑞管理王毓瑞陞任陜西榆林遊擊以其兄之子三等伯王釴管理王釴陞任鎮江将軍以其伯父之子五品官王銂管理王銂故以王世選之元孫王濤管理王濤縁事革退以王一屏之元孫福山管理福山降級調用以王灝管理謹案雍正七年經王大臣議奏此佐領因何編立之處無案可稽初次王一屏管理二次始以王釴之曽祖王世選接管三次又係本佐領下驍騎非校王有報接