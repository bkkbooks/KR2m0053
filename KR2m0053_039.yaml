  text: 旗分志二十五八旗佐領二十五正紅旗漢軍佐領正紅旗漢軍佐領正紅旗漢軍都統所屬參領五第一參領下佐領六第二參領下佐領六第三參領下佐領六第四參領下佐領五第五參領下佐領五第一參領第一佐領係順治元年將定南王孔有德所屬人丁編為牛録初𨽻正黃旗以閔天俊管理閔天俊故以其子閔宏宗管理閔宏宗故以其子閔士瑾管理閔士瑾緣事革退以其弟閔士璋管理閔士璋故以其弟閔士瑞管理閔士瑞緣事革退以其兄之子閔承烈管理雍正四年此佐領始撥𨽻本旗閔承烈緣事革退以其族兄閔文輝管理閔文輝年老休致以其子閔良弼管理閔良弼故以其子閔獲春管理閔獲春故以其姪閔師賢管理第一參領第二佐領係順治二年將隨左夢庚投誠人員編為牛録初以投誠參將孟希舜管理孟希舜因病解任以其子孟名世管理孟名世升任副都統因病辭退以其子們得禮管理們得禮緣事革退以其弟伊拉齊管理伊拉齊緣事革退以們得禮之子孟以維管理孟以維緣事革退以副參領程鋗管理程鋗故以薑國用管理薑國用調用以驍騎校陳志綱管理陳志綱故以雲麾使王林管理王林補放參將以步軍副尉楊繹管理楊繹故以步軍校劉文鎬管理謹案此本係世管佐領乾隆三年孟以維緣事治罪遵雍正三年上諭作為公中佐領再們得禮旗册作孟緯祖第一恭領第三佐領原係在盛京編設初以固山額真後改固山案班漢文稱都統吳守進兼管吳守進升任漢中將軍以其長子吳國柄管理吳國柄故以其弟吳國正管理吳國正升任漢中梅勒章京以郎中楊茂椿管理續以吳國極管理吳國極故以其長孫吳如譯管理吳如譯升任直𨽻撫標右營遊擊以其叔父一等阿達哈哈番吳鍈管理吳鍈故以其兄之子吳如訥管理吳如訥因甄别革退以其弟一等阿達哈哈番吳如讓管理吳如讓降調以其姪天保管理第一參領第四佐領係崇德七年編設之牛録初以孫德盛管理孫德盛升任西安梅勒章京以分得撥什庫寇四管理寇四升任鎮江駐防協領以孫德盛之子孫世俊管理孫世俊故以其弟孫世宏管理孫世宏緣事革退以其兄孫元吉管理孫元吉故以其弟孫元士管理孫元士緣事降調以其兄之子拜他喇布勒哈番孫紹祥管理孫紹祥故以其子孫寶鳴管理孫寶鳴故以其族弟孫寶岐管理第一參領原第五佐領係雍正十一年將內務府壯丁一百二十九名自鄭安康劉顯兩佐領下撤出編為一整佐領以副參領王國璉管理王國璉緣事革退以恭領王正管理王正緣事革退以劉文炳管理謹案此佐領原係由內務府撥出另記檔案人丁乾隆三十一年遵旨另記檔案養子開户人等出旗為民將此佐領裁汰第一參領第五佐領原係四參領下第六佐領係順治三年編設之牛録初以隨左夢庚投誠都司劉國輔管理劉國輔從征湖廣陳亡以拜他喇布勒哈畨杜有才管理杜有才駐防福建以拜他喇布勒哈畨王應時管理王應時年老辭退仍以杜有才管理杜有才故以督捕司郎中鄒應仕管理鄒應仕緣事革退以二等阿思哈尼哈畨李斕管理李斕故以其子李永升管理李永升緣事革退以參領李永年管理李永年緣事革退以副參領李永安管理李永安緣事革退以户部員外郎劉宏祖管理劉宏祖緣事革退以廣寧門城門尉楊國相管理楊國相因年老告退以二等男李時敏管理李時敏緣事革退以鑾儀衛治儀正劉淇管理劉淇故以印務恭領鄭馥管理第一參領第六佐領原係駐防廣東佐領初以金有才管理康熙二十二年進京分𨽻正黃旗以御史于三賢管理于三賢升任雲南布政使以其子于起鳯管理于起鳯因病革退以三等侍衛金紀祖管理雍正四年此佐領撥𨽻本旗以參領劉德滋管理劉德滋緣事革退以驍騎校于來鳯管理于來鳯因病告退以步軍校鄭秉訓管理鄭秉訓故以治儀正邱兆昆管理邱兆昆故以步軍校羅彥章管理羅彥章故以內閣侍讀盛德昌管理盛德昌升任湖北德安府知府以參領溫瑢管理第二參領第一佐領原係駐防廣東佐領初以馬稱驥管理康熙二十二年進京分𨽻正黃旗以副都統張俊兼管張俊故以拖沙喇哈畨于良輔管理雍正四年此佐領撥𨽻本旗以副參領毋兆瑛管理毋兆瑛故以副參領于宗文管理于宗文緣事革退以三等侍衛王浡管理王浡升授都司以二等男李承綸管理李承綸因事降調以副參領薑國程管理薑國程故以吉林佐領朱詩管理朱詩故以印務章京李淨私管理李淨私故以雲麾使王模管理第二參領第二佐領係崇德七年編設之牛録初以甲喇章京馮文運管理馮文運故以刑部郎中王錫宇管理王錫宇年老辭退以驍騎校寧完直管理寧完直故以其子監生寧思賢管理寧思賢故以其兄候補參議道寧思聖管理寧思聖故以其子寧輔佐管理寧輔佐緣事革退以通政司左參議張國棟管理張國棟休致以步軍副尉傅暄管理傅暄故以印務章京驍騎校張定邦管理張定邦故以步軍校馬國璽管理馬國璽故以步軍校王懷亮管理王懷亮故以雲騎尉張維剛管理第二參領第三佐領係在盛京編設初以王一屏管理續以投誠榆林副將王世選管理王世選年老革退以分得撥什庫王有報管理王有報年老辭退以王世選之子王之弼管理王之弼緣事革退以其兄之子王育瑞管理王育瑞升任陜西榆林遊擊以其兄之子三等伯王釴管理王釴升任鎮江將軍以其伯父之子五品官王銂管理王銂故以王世選之元孫王濤管理王濤緣事革退以王一屏之元孫福山管理福山降級調用以王灝管理謹案雍正七年經王大臣議奏此佐領因何編立之處無案可稽初次王一屏管理二次始以王釴之曽祖王世選接管三次又係本佐領下驍騎非校王有報接