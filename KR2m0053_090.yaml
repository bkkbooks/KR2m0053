body:
  text: 欽定四庫全書欽定八旗通志卷七十六土田志十五土田教令崇德元年十月太宗文皇帝命户部承政英固爾岱瑪福塔傳諭曰朕惟榖甚賤傷農甚貴傷民有糧之家輒自居竒必待市價騰貴方肯出糶此何意耶今當各計爾等家口足用外有餘即以糶賣毋得仍前壅積致有榖貴之虞先令八家各出糧一百石交市糶賣以充民食至樹藝所宜各因地利卑濕者可種稗稻髙粱髙阜可種雜糧勤力培壅乘地滋潤及時耕種則秋成刈穫户慶充盈如失時不耕糧從何得耶二年二月諭户部曰昨嵗春寒耕種失時以致榖貴今嵗雖復春寒然農時不可違也宜早勤播種而加耘治焉夫耕耘及時則稼無災傷可望有秋否則或被蟲災或逢水澇榖何由登乎凡播種必相其土之燥濕而布其利該管屯堡各員有不勤加董率致廢農務者罪之四月諭羣臣曰今嵗告饑凡積粟之家宜與各牛录内困乏者賣則取值借則取息如此有無相通則民氣自裕若私埋蔵以致朽爛非我國之人也至貧民無力耕種坐使土地荒蕪食何由頼該管章京宜時加體察令有力者助之六年二月先是命户部清查各旗牛录分别貧富具奏部臣覆奏宗室拜音圖下四十八牛录俱貧太宗集衆於篤恭殿諭之曰此等貧窮各牛录豈行陣時獨禁其俘獲耶豈嘗於衆人之外加派徭役耶抑豈旱潦偏災之獨異於衆人耶皆因該管各章京等嗜酒曠職董率無方户口何從而殷富着將各該管章京解任另選才能者任之七年正月諭户部曰凡有糧貸人及無糧求貸者許家長互相稱貸勿得私向奴僕稱貸及私貸與奴僕八年六月先是盛京居民稠宻部臣議區别散處以弭火災至是都察院承政滿達海奏言時届秋禾成熟改造廬舍恐妨收穫俟禾稼登塲農功既畢來嵗春和再行修造得㫖所奏是時方收穫改建房屋着即停止其有力之家自能修葢者聴無力者不必催督俟來春農隙再行修造順治元年題准盛京地方令照舊織布仍留養蠶屯十處又定駐防錦州等城漢軍每壯丁五名撥給牛一隻以備耕種又定莊屯棉花𤼵民間紡績入八分宗室各派匠役令官員領催督課官屯人織布二年二月户部傳諭管莊撥什庫等使曉諭各處莊頭凡民間什物不許攘掠若採買芻糧定於民間開市之日着一人率領同往餘日毋得私行其貿易價值毋致短少務須兩得其平倘有違令恣行者即行處死至各莊田土尤須勤力耕種七年正月諭户部曰年來八旗止憑踏㸔澇地給米是以不勤農務嗣後踏㸔澇地永行停止自王以下官員以上准給俸米一年仍令勤修農務秋則種麥耕地春則運糞撥榖務俾以時從事八年諭諸王必俟農隙時方許放鷹勿得玩違以致蹂躪田禾康熈三十年二月諭大學士伊桑阿阿蘭泰學士邁圖西安南塔海傅繼祖盛京官屯五十所沿邉丁壯設為屯二十五所移遷於烏喇念此莊屯及沿邉丁壯居住年久已成聚落今遽令遷移如此衆多人户生業蕩然必致苦累仍留於盛京與遷移於烏喇皆公家之屯其為納賦則一也朕意此莊屯應停其遷徙於烏喇兵丁每嵗派三百名耕種或一嵗以烏喇之兵一嵗以捕牲之人輪年耕種亦可以積榖矣此事所闗綦重着學士麻爾圖馳驛往盛京烏喇令將軍副都統各部堂官悉喻朕意伊等之意若何詳議回奏是年十二月諭户部曰塞外聚榖甚属要務故耕稼土田以廣積貯為至切也達爾湖之地其田以内府莊屯之人耕之可令總管内務府於各莊屯内遣其丁壯其榖種耒耜及諸田器耕牛皆令預備於三旗内府官員新滿洲䕶軍披甲之中熟諳農事者擇而遣之呼爾湖之地其田以八旗諸王莊屯之丁壯耕之其榖種耒耜及諸田器耕牛咸令預備熟諳農事人員擇而遣之墾闢耕種之時稷與大麥油麥春麥四種榖皆可藝植稷宜多種春麥宜少種遣往耕田之人田既耕種畢則酌留耘田之人其餘人遣還榖既熟則所留耘田之人可以收穫此農人所食之米於古北口所貯米石中計口而授之西拉木倫之地其耕田悉照原議遣盛京人員前往俟農畢收成之後視豐收地方其治田人員該部議敘爾等其議以聞又諭内閣曰達爾湖呼爾湖西拉木倫地方耕田所需之牛着停其捐助於每處遣户部司官一員帶庫銀照數購買以給與之三十三年正月諭内閣曰黒龍江墨爾根波爾得之地官員兵丁與索倫達呼爾之人助其耕種亦有年矣若仍前相助力作其官員兵丁及索倫達呼爾之人皆致勞苦此數年來所種之榖倘足以備用則集衆力以耕作可以停止着將軍薩布蘓詳議具奏遣兵部筆帖式一人往乾隆元年四月上諭八旗為國家根本從前敦崇儉樸習尚敦龎風俗最為近古迨承平日乆漸即侈靡且生齒日繁不務本計但知坐耗財賕㒺思節儉如服官外省奉差收税即不守本分恣意花消虧竭國帑及至干犯法紀身罹罪戾又復貽累親戚波及朋儕牽連困頓而兵丁閒散人等惟知鮮衣美食蕩費貲財相習成風全不知悔旗人之貧乏率由於此朕即位以來軫念伊等生計艱難頻頒賞賚優卹備至其虧空錢糧已令該部查奏寛免其入官之墳塋地畝已令查明給還其因獲罪革退之世職亦令查明請㫖似此叠沛恩施者無非欲令其家給人足返樸還淳共享昇平之福也現在日與王大臣等籌畫久長生計次第舉行惟是曠典不可數邀亦不可常恃而旗人等蒙國家教養之厚澤不可不深思猛省自為家室之謀即如喜喪之事原有恩賞銀兩自應稱家有無酌量經理乃無知之人止圖粉飾虚文過為靡費或遇父母大故其意以為因父母之事即過費亦所不惜不知蕩盡家産子孫無以存活伊等父母之心其能安乎否乎他如此等陋習不可悉數在已不知節省但希冀朝廷格外之賞賚以供其揮霍濟其窮困有是理乎嗣後務期恪遵典制謹身節用勿事浮華勿耽游惰交相戒勉惟儉惟勤庻幾人人得所永逺充裕可免窘乏之虞况旗員内之老成謹慎者可望擢用外任上為國家効力辦公下亦可得俸禄養亷以贍給家口倘伊等不知痛改前非仍蹈覆轍驕奢侈靡虧帑誤公則是伊等下愚不移自取罪戾不惟恩所不施且為法所不貸朕必仍前按律懲治不少姑息且朕今日所寛者即向日虧空官帑驕泰自恣之人也若不痛自改省謹遵法紀則將來不於伊身必於伊等之子孫又復罹追比之苦矣又何樂於目前數日之花費乎凡朕之所以諄諄訓戒者總為伊等預謀久逺生計八旗大臣等可通行曉諭官兵人等其各敬聴朕言熟思審計以無負朕之期望三年三月上諭八旗之人動輒望賞望借以濟匱乏不知國家經制有常為政有體豈有無端賞借以博衆人一時感恱之理且國家之有恩施亦如上天之有雨澤若雨澤下降而播種不豫力作不勤亦不能望收穫况一時之賞借猶如一時之驟雨可蹔而不可常能給而不能足加之伊等又不知撙節愛惜隨手浪費於生計絲毫無補其禆益果安在耶朕實不忍兵民等之癡愚不悟特頒此㫖再行曉諭九年題准直𨽻天津河間各屬土性宜棗種植最多深冀亦産桃梨至於榆栁楊樹之類河窪鹻地各有所宜令民間於村頭屋角地畆四至隨宜廣植始足以資利益如有旗地可種樹木之處應令該管各官勸諭旗人亦可多為栽種以上土田教令欽定八旗通志卷七十六
