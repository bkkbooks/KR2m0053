body:
  text: 欽定四庫全書欽定八旗通志卷首之八敕諭二康熙年間康熙九年三月二十日諭户兵二部曰滿洲甲兵係國家根本雖天下平定不可不加意愛養近聞八旗甲兵喂養馬匹整辦器械費用繁多除月餉外别無生理不足養贍妻子家口朕甚憫之月餉銀米應作何增給著為永例爾二部詳議具奏康熙二十五年八月二十六日諭大學士勒德洪等曰各省駐防人員有授世職者令其來京道路遼逺生産苦於遷移此後不必令其來京官則令其仍留原任撥什庫兵丁則以品職相稱之官辨及驍騎校缺用之康熙二十六年二月初二日諭大學士勒德洪等曰京師重地所關鴻巨盜賊凶棍察緝宜嚴其在步兵尤為專責前步軍統領費揚古在任嚴於巡緝其所管轄屏絶情面今現任步軍校席特庫亦於情面能為拒絶巡緝管轄甚嚴若步軍統領總尉皆如席特庫盜賊凶棍畏罹法網自當斂迹京師庶得肅清左翼總尉穆呼達年老衰弱右翼總尉沙木布為人庸懦皆令解任二等侍衛達漢泰其人堪用可任管轄其代沙木布為總尉穆呼達缺選擇以聞似此總尉之缺既補之後可令步軍統領總尉等會同於現任步軍副尉步軍校等員中察其不克任管轄庸劣者罷之其下兵部康熙二十六年二月十二日諭大學士勒德洪等曰昨夜正陽門外失火漢官皆不事撲滅但袖手旁視今八旗都統副都統五旗護軍統領向不預直宿可於要地分班輪值若偶遇火即為撲滅倘有傳集之事亦易齊聚方今時際升平並無效力之地分班值宿以盡勤勞分所宜然令滿洲蒙古漢軍都統副都統五旗護軍統領會議以聞康熙二十六年四月二十三日諭大學士勒德洪等曰汝等可傳旨於八旗滿洲蒙古都統等令於各旗中阿思哈尼哈畨等官以下拖沙喇哈畨等官以上或微末秩員又或初為部院官後襲父兄世職𨽻旗下者果有其人正直才具優長而敬謹小心為國勤勉素行端方者一旗之中或三四人或一二人以其真知灼見保舉奏聞引見於部院用之此保舉之人既用後與其所保奏乖違不符者其保舉之都統副都統等連坐重罪之必不姑恕如各旗無可舉之人則已或恐坐舉主心懷畏懼隱其真正才賢不肯保奏甚無謂也可令各該旗都統副都統於二十五日以所舉之人引見奏聞康熙二十六年十月二十六日諭八旗都統及三品以上等官曰凡人之行莫先於孝近者漢軍居父母之喪親朋聚會演劇飲酒呼盧鬬牌儼如筵宴毫無守制之體至孝服鞍轡等類所用素白皆異常華美喪禮止當服用粗惡豈宜華美耶居喪演劇滿洲所無漢人亦未有特漢軍為然耳百行以孝為大如此所行以為孝道其他又何足觀也又漢軍外官赴任每借京債整飾行裝務極竒麗且多携僕從致債主抵任索逋復謀贍僕從衣食勢必苛斂於民以資用度且親朋債主疊往任所請託需索不可數計是官雖一人實數人為之以致脧削小民民何以堪又漢軍外官不能騎射乃自稱行獵多帶鷹犬歇宿村莊滋害於民禽獸本在山野豈在村莊耶又漢軍服用多僭越非分終日羣居以馬弔飲酒為樂此等物力從何而出有非苛取諸民者乎漢軍習尚之惡已至於極如原任總兵諾邁原任提督哈喇庫祖永烈等於任所多買良民帶歸原任總督張長庚原任巡撫張德地韓世琦等皆貪婪虐民居官甚劣今著漢軍都統副都統等凡有居喪演劇飲酒呼盧鬬牌者照賭博例嚴行禁止在外漢軍官員任所有親朋債主前往請託需索貽纍小民者亦令察訪指名題參朕此諭旨專為敦厚風俗陶淑人心而起使漢軍居官者皆似總督范承勳巡撫于成龍之善朕又何諭之有此旨令徐廷璽傳諭又諭滿洲管漢軍副都統參領等曰向因漢軍習俗不善故以爾等補授漢軍副都統參領欲訓練其騎射𨗳率以矩範一如滿洲也近見並不教以騎射凡事不能使之效法滿洲反有不肖者恐嚇漢軍指摘其短希圗索詐此朕所深悉嗣後爾等務加悛改善為教訓漢軍可耳康熙二十七年二月初九日諭宗人府曰自古帝王展親睦族列爵錫封原欲選賢建能旌别淑慝俾咸知勸勉慶流奕世此國家之常經奬勵之至意也朕篤念親親恩禮罔替年至十五即行授封但誼屬本支必皆飭躬砥行端良醇謹益自刻勵動不踰則始無忝於宗潢今親王以下奉恩將軍以上年至十五不問賢否槩豫封爵以致視為故典罔知激勸嗣後親王以下奉恩將軍以上子孫應俟其年至何嵗作何辨其賢否定其品級等第始應受封著議政王貝勒大臣及親王以下奉恩將軍以上會同確議具奏特諭康熙二十八年六月二十五日諭大學士伊桑阿等曰八旗參領佐領有職任之官多有以疾告休者此中亦有以不能騎射畏憚而求罷者夫管轄職任仍須得舊人為佳其傳諭八旗都統副都統等自是以後若此告休者詳察之果疾病不可支者允其休可也若雖不能利於騎射而能管轄者仍留用之康熙二十八年九月二十三日諭大學士伊桑阿等曰佐領所𨽻事務洞知詳察乃佐領等官専責此後凡令稽察之事佐領官所稽察若不明晰惛昧無能者户部參奏今所察貧窘人户之事倘朦混不明亦令户部參奏康熙二十九年正月十三日諭大學士伊桑阿等曰比年以來部院滿洲司官各處奉差理事頗著勤勞自郎中以下有職掌官以上可加察核以頒恩賚是察核也分一二三等以為次序其不入等次者各部院堂官繕寫摺子啓奏此內有曾經别部題參而復用者無庸序入因公罣誤而復用者仍序之康熙三十年二月初一日諭兵部曰京師為輦轂重地人民商賈四方輻輳京城內外統轄必有専責務俾稽察姦宄消弭盜賊然後商民得以安堵今城內地方既屬步軍統領管理城外巡捕三營又屬兵部督捕等衙門管轄內外責任各殊不相統攝遇有盜案反難察緝嗣後巡捕三營亦令步軍統領管理京城內外一體巡察責任既専則於芟除盜賊安輯商民庶有禆益其三營事務作何歸併管理著九卿詹事科道會同確議具奏爾部即遵諭行康熙三十年六月十六日諭大學士伊桑阿等曰黑龍江松花江接壤之地彼處附近所居根竒勒諸姓中原有可披甲之人應酌量令其披甲駐防遣滿洲兵八十人往彼教訓之齊七喀爾地方以索倫達呼里之衆酌量令其披甲駐防遣滿洲兵二百人往彼教訓之伊等居址附近亦心樂披甲如此則既無逺徙之苦亦不致需用糗糧矣可以此詢問都統巴海令理藩院集議政諸臣會議以聞康熙三十一年五月二十八日諭大學士伊桑阿等曰朕思此時正當簡閲軍旅以備調遣每佐領撥鳥鎗護軍各一人撥前鋒親軍護軍各十人漢軍火器營兵撥二千人如無須調遣朕巡厯塞外時親率以往此兵各給整理器械銀十兩使今冬竟不徵發則所給銀兩可於軍餉之內寬緩其期零星除扣之其下旨議政大臣各都統將所派禁旅器械軍裝皆令全具無缺以備一有調遣立可啓行大臣官辨併擬出焉此師不過預備而已可將是意諭軍士知之康熙三十一年七月十五日諭大學士伊桑阿等曰將軍薩布蘇奏請達呼里席白之五百兵令其學習鳥鎗夫以邊兵訓練火器所言雖是但達呼里席白之衆遷徙甫至未獲寧居盡其族類槩令學習似為未當或俟之數年安土樂業始令操練鳥鎗或應作何籌度另為訓練其密咨薩布蘇具議以覆康熙三十一年九月十五日諭大學士伊桑阿等曰今所備禁旅之內每佐領撥護軍七名其前鋒軍則簡四百名火器營兵則分其半於十月杪遣赴大同飼養馬匹預備徵調應遣大臣令兵部奏請曾隨朕之每佐領護軍一人可除出之至京師簡軍預備其事宜亦令具議以聞康熙三十二年二月初五日諭內閣諸臣曰騎射乃我國家振興要務朕深悉其由於三旗內府佐領中幼稚特命官教之皆各嫻習騎射由是以觀騎射之優劣繫於教與不教耳凡兹稚子不自幼時教習則騎射之事漸至衰替今於八旗官學生及佐領中間散稚子亦當専官教習之汝等會同八旗都統具議以聞康熙三十二年二月初十日諭內閣諸臣曰宗族之始皆一祖所生當極致親睦共相愛恤扶持以為生也今見諸王以下互相讒害樂禍幸災略無親睦之誼凡若此者朕知而不言誰復言者吾宗室中如此於我人民得無愧乎以親九族九族既睦書有之矣且或者同為宗室以他祖父之名名其子若孫者有之今吾宗室之中不定為親睦以相愛恤扶持之道長此安窮無所底止朕意此後入八分公以上諸吉凶事會集之禮依向所定者行之如未入八分公以下至於間散宗室其吉凶之事亦宜定會集儀式此皆令八旗會集則不勝其繁矣其令本翼會集焉喪事則一旗之中為之服别旗惟去其纓又間散宗室中有極貧者一有吉凶之事則稱貸而為之至有窘迫者凡若此類諸王以下間散宗室以上各以其意出助銀一兩或數星出者既不以為難而得之者良有所益庶不至苦於債負矣其會集自其身之品級以下者而會集之間散宗室無品級者則視其父之品級會集凡會集不至者有司者察參如此則皆相識而親不惟是也有為不善者遇之亦可教以正若貧宗室亦不困於為生此欲我宗室和協優遊以安處之意也又宗室中今名有犯者宗人府悉察改焉自兹以往嵗所送名亦即詳察其有犯者駁之令改焉朕此旨汝等同滿洲尚書侍郎宣示諸王及間散宗室令其會同定議以聞康熙三十二年十二月十四日諭大學士伊桑阿等曰行間被創及殘廢者雖已給身價之半而不食錢糧則貧者無以為生此等人皆奮力兵陳至於殘廢良可憫惻兹後若此殘廢中尚可支持者充南苑門甲倉庫諸地老人缺給以錢糧前為護軍校驍騎校而有可支持者諸館之首領及其副缺用之康熙三十二年十二月二十日諭兵部曰本朝滿洲官兵從來精鋭驍勇遇寇必克所向無敵前厄魯特噶爾丹之役官兵不能悉體朕意即行𠞰滅致失機會罔奏膚功朕每念及時恚於懷故比年以來簡閲官兵嵗凡兩舉朕躬臨指示訓誨頃閲武時見諸士卒行列慗齊隊伍明晰進退嫻熟嚴肅無譁所有軍令無不遵守該管官員號令約束既嚴且善此皆官兵協志同心各加奮勵所致朕心深為嘉悅八旗前鋒護軍撥什庫驍騎兵等各賞給一月錢糧間散官員照護軍給一月錢糧火器驍騎兵亦照護軍賞給有管轄職掌官員悉賞給內庫縀匹其賞賜縀匹户部會同總管內務府衙門議奏這此閲武時官員內有降級罰俸者俱準開復以示朕體恤將士申明賞罰之至意至八旗步軍官兵有察緝盜賊巡理道路等役甚多極為勞苦步軍亦各賞給一月錢糧管步軍官員亦各賞給縀匹奬勤恤勞用稱朕意爾部即遵諭行特諭康熙三十三年閏五月初三日諭內閣諸臣曰盛京挽運原有船百艘乃實有用之具也存留預備凡遇緩急為益良多盛京工部無故奏而廢棄之今年從山東天津所運之米因之轉運之船遂致遲誤盛京工部堂司官著該部嚴訊議罪具奏康熙三十三年九月二十日諭大學士伊桑阿等曰朕觀四十九旗扎克薩所設哨兵甚屬疏虞頃者厄魯特來使數百人至而哨兵全未知之是但有蒙古巡哨之名而無其實矣斥堠所關至重今天下承平無事八旗大臣無可勉效馳驅惟噶爾丹茍延旦夕之命或各旗大臣或部院大臣酌量遣往每旗派護軍十人各給官馬二匹兩人共給駱駝一隻由歸化城携米偕四十九旗設立哨兵大臣等來往巡察凡有動靜可以速達無誤良有禆益且大臣等得以諳悉邊塞情形不亦善乎此安設巡哨之大臣及護軍以幾月一次更代爾等及八旗都統副都統滿九卿官員會同議奏康熙三十六年十月十七日諭大學士伊桑阿等曰右衛屯駐禁軍原因噶爾丹之事預為之備也今噶爾丹之事已畢此兵仍令全駐則供給芻秣轉運維艱可留滿洲驍騎一千其蒙古分編佐領駐防之兵全行留駐此外護軍及驍騎火器營兵俱應調回四十九旗之貧乏蒙古有令沿邊居住者俱察出遣至右衛歸𨽻蒙古佐領下作為甲士此駐防禁軍應即撤回抑候時氣和暖後撤爾等與議政大臣會議以聞康熙三十七年五月二十一日諭內閣諸臣曰烏喇寧古塔吉林烏喇黑龍江等處新滿洲內曾授官職以老病解任者照其原官品級給俸祿以養贍之矣此等解任之官令其子弟承替則供職得人而俸祿亦不致虛糜其敕兵部逐一詳察具奏康熙四十二年十月二十九日諭散秩內大臣公傅爾丹曰今日閲射時兵丁所乘馬驚逸漸近御仗諸年少大臣俱效年老大臣旁觀不動惟爾直前勒止之可謂繼武前人矣特賜爾貂皮褂一領嗣後益加勉力勿以身為大臣而不思奮力向前也康熙四十五年六月初一日諭修國史諸臣曰開國功臣作傳當因其事迹先後以定次第若視功迹分次第或有本人功迹少而子孫功迹多者反置子孫於前列可乎今應分别太祖太宗世祖三朝功臣以何人居首請旨再定至逮仕三朝功臣各於本人傳內通行開載事迹其子孫有立功者附載於下俟作傳畢可録出分給其子孫各一通令藏於家康熙四十五年十月初一日諭內閣諸臣曰敦拜向為司官朕洊次擢用至尚書並無效力勤勞之處凡事不留心詳察聲名亦不佳廷議係國家大事前曾有事會議敦拜全不諳事理恣意妄言彼時即當黜退今既以年老乞休著解吏部尚書任彼並非有勞舊臣不必豫以優旨凡為人臣者雖當暮年宜更加意潔已勤勞王事如謂年老略不留心諸務黽勉自效豈任彼為大臣徒使之榮顯已耶如此者罷之亦何足惜尚書溫達自任工部以來聲名甚優凡事敬慎而寬著調補吏部尚書工部事務亦緊要但六部侍郎名俱不甚佳部臣之優劣外省督撫却知之甚真居官美惡豈能欺人耶户部錢糧事務弊端極多滿漢大臣名亦不佳今刑部十日彚題一次猶覺弊竇差少耳康熙四十五年十月二十三日諭大學士馬齊等曰翻譯之事大有關係向年纂修實録校對朝鮮表文滿漢文意總不相符前大學士圖海杜立德皆惶急呈朕親覽朕兩年苦心尋繹始得將文義完美作史之事殊為重大一字不可輕易增減所以朕於明史不敢自任者亦此故也近日大學士熊賜履以朱子書呈覽其中數語稍有可疑問之熊賜履以為非朱子之言殆朱子門人所記此不過託諸空言猶可矢口而談如係文案供招之事將何以解之信乎垂後之書不可忽也康熙四十七年七月二十五日諭內閣諸臣曰從前巡捕三營屬督捕管轄時營官侵蝕兵糧雖兵數具存而京城大臣官員家丁皆充兵冒餉全無實濟積弊沿流極其懈弛以致漢官所居地方盜賊疊告外城官民不能聊生因而漢官具疏陳奏朕下九卿等會議歸併前任步軍統領等令其清釐營伍選擇營辨盡力摉稽嚴緝攘劫然後盜賊漸減官民獲安此衆所共知著有明效者也並非至陶和氣任內方令統轄陶和氣一人之用舍有何關係但其人一經參劾則該部自據定例具議絶不在於扶同附和相繼續參此風亦斷不可長且巡捕三營官員或於各省營辨或於旗下武職皆經朕親選壯健人才補用若果有一二驕悍不法之人言官即當指名題參乃將百餘員之營辨三千餘名之兵丁一概溷指以為驕悍不法可乎著仍指名具奏况武職兵丁兵部皆可稽察步軍統領巡捕三營亦𨽻於兵部誠欲建言則將兵部題參未為不可高遐昌乃謂巡捕三營應歸併兵部所言大謬又街道事務司坊等官管理時畏懼顯要職官脧削里巷小民止知勒索鋪户銀錢而街道事務毫不置念因弊壞已極故亦歸併步軍統領管理今既稱受街道之纍即著高遐昌兼管一年務令商民不致纍苦街道大加肅清若果能綽然辦理誠為能言即能行之人矣下所司知之康熙四十八年十月初五日諭大學士溫達等曰朕觀八旗漢軍人等用於文職者多而用於武職者少嗣後武鄉會試亦著八旗漢軍人等考試所增額數不過數名可以收健勇人才之用於武科甚為有益康熙四十九年正月二十四日諭八旗都統副都統參領等曰朕經理國家大小事務必長計逺慮期於軍民人等實能永久奉行蓋無時不籌畫於朕懷也近見八旗茍且治生糜費極多皆因該管人員止圖利己而其族長等又不教之以忠孝為重遂爾致此頃為去冬米價騰貴今將二月應放之米於正月即行支放因而米價隨即稍減據理而論米價貴賤應與八旗人等絶不相涉今細繹其故八旗官兵將所給之米未及抵家止貪得一時小利輒行變賣在所得之利甚微而銀兩耗去米價又增於是衆皆怨悔無及將來八月之米勢必六七月間又求放給若米價仍然不減則來年之米又與今年相等矣方今天下承平日久户口滋繁南方糧米連年不到者甚多舉國中但知計利其慮及日後衆人匱乏者並無一人八旗官員猶如一身一家豈可一時不相勸諭不相訓誡乎嗣後凡所關給之米務期大加節省用至照常放米之時勿墮姦惡富豪輩收積米糧之詭計此亦八旗人等一效力之處也朕每日進膳二次此外不食别物煙酒及檳榔等物皆屬無用試觀衆人於此等無用之物輒日費幾文人人詰問當無一爽又其甚者貧而效富用必求盈且用所不當用之物中人之産不久即罄矣此皆染於惡俗無教𨗳之人所致爾等俱為大臣官員有養育管理之職今兵革不用無可效力惟亷潔自持熟練整旅並為衆人生計時時仰體朕懷多方區畫似此效力不更愈於行間致命之勞績乎朕為八旗生計慮及久逺與為天下萬民謀生計者中外一視愛養無殊故預令爾等知之特此手書敕諭康熙五十年三月初一日諭大學士溫達等曰內閣翻通本事甚緊要如不得漢文意思或一二句言語翻錯於事之輕重大有關係內院侍讀學士侍讀官員俱係按俸補授之人所翻本章不甚妥當朕閲看清文多在內行走和素徐元夢雖係革職之員現今學翻漢文者無能過之將和素徐元夢補授內閣額外侍讀學士翻改本章康熙五十一年九月二十日諭湖廣總督鄂海等曰覽鄂海奏鎮筸盤塘窩等八十三寨生苖俱各實心前赴武昌投順等語紅苖等居深山之中自古以來並未向化鄂海等宣示朝廷德澤布揚聲威盡行招撫殊屬可嘉今紅苖等已去邪輸誠削髮投順地方文武官員務仰體朕無分內外咸俾盡享升平宇內無不樂業之意將紅苖等安插得所從容化𨗳教之禮義倘有不肖官員將紅苖視為度外侵蝕擾害者該督撫即行指名題參康熙五十二年四月初七日諭吏部曰川陜總督殷泰前曾因病奏請解任調理朕念殷泰清潔自持約束屬下恩威並用陜省軍民罔不感戴朕甚愛惜令在任調攝已有諭旨今病勢未能即愈總督印務雖有巡撫署理但陜西地方遼濶最屬緊要總督員缺不可久懸殷泰著解任湖廣總督鄂海屢任陜西熟諳地方兵民情性俱可深悉且才具頗優將鄂海調補川陜總督特諭康熙五十四年四月十五日諭議政大臣曰八旗馬匹俱已出厰著照出厰馬數令佐領下殷實之家並該佐領人公派拴養照常給發錢糧目下雖稍覺煩難後來究竟有益如有行動則從此騎馬前去一到口上彼處之馬又到諸凡便宜著詳議其拴養駱駝之處一併詳議以聞康熙五十七年七月十五日諭大學士馬齊等曰發往黑龍江伊蘭哈喇三姓地方之人俱因凶惡發遣人亦日多若發在一處地方必致生事行凶此後停其發往著發喀爾喀和卜圖烏蘭古木地方彼處水土甚好著築城安插令其開墾耕種八旗每佐領派護軍披甲各一名於八月內馬匹肥壯時前去二年一換駐劄彼處看守如此則沿途臺站甚屬緊要每站應設立車輛預備毋致犯人勞苦方好著交與京城議政大臣會同九卿議奏康熙五十七年十月三十日諭議政大臣內大臣等曰每旗都統副都統或有起家微賤專意徇庇一應補放官員併佐領等事恆有遲至數年或十年不奏者或一官病故已久數年尚仍給俸者一切事件漫不稽查甚是曠廢近聞都統石文英不出門户亦不見人有事來奏每不俟事畢祇圖早歸亦不瞻仰朕容甚屬不堪正藍旗滿洲都統顔信前往出兵其滿洲蒙古漢軍三旗之事著七阿哥辦理正黃旗都統巴賽署理將軍事務其滿洲蒙古漢軍三旗之事著十阿哥辦理正白旗滿洲都統何禮差往雲南其滿洲蒙古漢軍三旗之事著十二阿哥辦理如此辦理别旗各相效法自必發憤勤事也康熙五十九年正月初五日諭領侍衛內大臣議政大臣軍前調回大臣八旗都統前鋒統領護軍統領副都統等曰太祖太宗時滿洲兵於凡征戰之所俱自備馬匹口糧行走到處所向立功並無遲誤今官兵凡有行走之處馬匹糧餉一切物件俱給自官帑且以為不足而怨咨生焉此皆我滿洲風習較之曩昔有異亦由於該管官並不嚴飭之故也朕辦理軍務閲厯甚多當日攻取嶽州時但從陸路抵禦以致許久不得朕諭在洞庭湖預備船隻以水路遏賊貝勒查尼以湖中風浪甚大船不能穩恐有礙於兵丁以請撤船兵奏聞朕諭嶽州城已被困不久即獲今將船兵撤退賊得由水道往來何能有得嶽州之期哉若兵丁於水道不利即與朕之殺害無異朕自承任不撤船兵嚴飭看守不久而嶽州下矣再征討雲南時貝子章泰將軍賴塔率領滿洲兵每佐領下撥二十七名總督哈詹蔡育榮董繼國金光祖提督桑格趙徠等標下營兵合計共三四十萬有餘離雲南城七十里安營一邊到湖一邊到山並未進兵於湖斷其水路賊冦米糧照舊運行城內並不危急後趙良棟率領寧夏兵到云我等連營四布不就近往戰何日得城逮至日久米糧不到雖滿兵無妨營兵何以存立耶章泰云兵丁俱從逺來且城亦朝夕可獲皇上恤養兵丁何可令其傷損設或營兵不能禦敵我等勢必捐軀趙良棟云貝子果領兵進戰奪城此功可邀封親王郡王何故作此等議論乎我領本標營兵徑自前往遂進戰奪取得勝橋而趙良棟之兵亦瘁甚矣章泰向趙良棟云爾兵已瘁何不將爾之兵撤回令總督蔡育榮率兵看守趙良棟云我將死戰所得之地如何交與他人看守不聼章泰之言城內賊冦始覺危急不數日而雲南下矣亦由善於計謀相機而動也再出征烏蘭布通時阿密達因天晚要撤兵云皇上必不以撤兵故遂殺我等將兵撤退索額圖明珠選勇士六七百人埋伏勇士云挑選我輩原擬或戰或追詎意止令看守彼此不無忿怨後中路出兵時三品以上大臣官員等會議進兵之處衆皆謂不可獨朕與費揚古以兵為可進遂決意進兵及至科拖地方衆皆不欲前發大臣等勸朕將兵撤回巴渾岱爾亦在其中朕諭以祭告天地太廟社稷親統兵前來並不見賊蹤如何驟行撤兵不允所請將兵前進噶爾丹聞我兵威甚是驚懼如鼠竄而去朕選兵著馬斯喀為將軍尾追噶爾丹遇西路兵攻擊大敗之朕將中路于成龍所運頭隊米遣明珠速送至費揚古軍前二隊米亦即著續送三隊米內朕但留十八天口糧餘米俱送西路軍前是以西路兵未至飢饉俱得保全而回朕是時若輕信大臣等言中道撤兵則兩路兵丁何得立功奏凱耶今看領兵大臣官員等祇為一身之計不視朕事為緊要內存私意彼此爭論不和又向兵丁沽買好名多取口糧及不能馱載至於拋棄毫無珍惜之意如此可乎不可乎朕之滿洲兵俱係精兵無可議論全在領兵者將朕之事專心辦理不求安逸賞罰精明事體如何得致錯誤進兵西藏時色楞不候衆人獨自前往不知者妄行議論額倫特因病在後隨後追至色楞皆奮不顧身如此猶可謂色楞進之過速乎今策妄諾爾布將伊兵丁善全而歸伊所領之兵甚感亦惟感伊而已朕頗不憐憫也朕祗憐憫西路身亡兵丁事定之後自然分别加恩至文武大臣官員等果能清亷自無可議但領兵大臣專務清亷將何所挾持以勸賞兵丁乎部院衙門清亷者止能自守其身辦理如此大事恐不能也朕年少時每於講武練兵等事違命者即置之於法內外大小悉知警惕由此觀之訓練之事不可疏忽也兹衆喀爾喀誠服朕之風化青海等亦如之䇿妄阿喇布坦之人霸占藏地毁其寺廟散其畨僧纍其臣僚青海等理應棄命忘身奮勇致討乃伊等口稱維持黃教却無實心效力之人䇿零敦多布領兵在藏居住彼處人以地逺我兵不能深入䇿零敦多布從伊地步行一年有餘忍飢帶餒而至招所以彼之兵衆以彼之形狀尚且能至我軍顧不能至乎今滿漢大臣咸謂不必進兵朕意此時不進兵安藏賊冦漸至收服畨子等將作何處置耶故特諭爾等安藏大兵決宜前進康熙六十一年十二月十一日上諭比見八旗官員兵丁內嗜酒沈湎以致面貌改常輕生破産肆行妄為者甚衆其中豈乏才具可用之人朕實憫之惜之著八旗都統各將該屬官兵內酗酒不肖之徒給限一年或二年令其悛改能改者留之如不能改係官員即行題參應襲者令人承襲係兵丁即行革退將本佐領間散人內揀選人材可用者充補食糧既可以養其生又可以得其力如此凡嗜飲酗酒之徒自知所懲戒矣若禁止之後仍然不改一經查出併將該管官員嚴行治罪再著行文外省將軍副都統城守尉等一體嚴加約束務令法在必行特諭欽定八旗通志卷首之八
