body:
  text: 欽定四庫全書欽定八旗通志卷二百二人物志八十二大臣傳六十八漢軍鑲白旗二馮屈盡美蕭張問政白如梅國相永藻白潢沈廷正劉輝祖屈盡美屈盡美漢軍鑲白旗人由廕生補佐領順治九年授兵部啟心郎十八年六月遷大理寺少卿七月遷宏文院學士十月授廣西巡撫康熙二年六月疏言粤西兵燹後人民稀少武藝未嫻請停癸夘科武鄉試允之十二月擢廣西總督是時平樂府猺獞流劫富川恭城修仁荔浦四縣三年六月盡美攻谷塘下井諸寨擒斬二千餘又𠞰恭城縣毛塘等猺分攻鳯頭牛尾諸寨檄湖廣兵堵截清溪源口盡美率兵由石口寨進賊敗遁擒逆首黄天貴諸寨相率降九月令監軍道黄惟鍛攻修仁縣古西猺寨誘擒賊首廖萬千移師擊永福縣六貢窠賊周晚並妖賊李太平斬之進𠞰南隘街村及八排巴山村皆捷賊悉平四年裁缺回京候補六年六月授漕運總督七月疏言現裁推官漕糧乏員監兑臣已通行各省令知府監兊以速漕務上以盡美不請㫖擅通行下部察議部議於同知通判内斟酌委用盡美降二級准抵尋疏言楚省有漕府分同知均有清軍及經收厰税責糧務乃通判職司應専責監兑從之七年江西巡撫董衛國奏嵗暮回空糧舡未到兑糧必致遲悞上令盡美明白回奏尋奏運糧河道變遷始則清口被淤繼則淮水漲發又黄家觜駱馬湖等處稽阻致糧船遲到現促即日南下八年衛國復疏報上屆尾運船隻至今仍未盡到新漕不能依限過淮部議盡美遲悞降三級調用得㫖依議解任未補官卒張問政張問政漢軍鑲白旗人順治九年由貢士授直𨽻唐縣知縣十三年行取以御史用十五年八月補河南道御史十一月命巡按廣東十六年九月疏言廣東烟瘴之域文武視為畏途致委署濫而吏治日淆查衞所守備千總屯糧責任攸闗現在部選到任者十八員未任者一員委署者十六員至香山等十五所則現缺無官請勅部將選補各員早令赴任庶委員可撤軍糈不誤又疏言兵以衛民民以養兵廣東兵驕潮州駐防為甚一年兩次戍守倐換倐更兵民日成水火鎮臣許爾顯莅任後約束嚴明兵民相帖臣抵潮郡士民懇留該鎮皆謂防兵少一畨更換民獲無窮休息是知該鎮久駐不但潮民稱便凡經過州邑並受其福現經平南王尚可喜題定一年一換請嗣後三年一換以綏靖地方均下部議行十七年四月疏言鹽餉闗係軍需分毫難容逋欠查富賀一埠餉納廣東商居廣西營商張標等倚總兵馬雄勢逋餉三年致鹽道鹽司莫可追求在張標等固法無可貸而馬雄以封疆大臣庇奸抗課祈勅部嚴追以懲積玩得㫖張標等提問馬雄降二級留任康熙二年命巡視兩淮鹽政尋奉㫖内陞以正四品銜食俸借補湖廣道御史十二年六月遷光禄寺少卿八月轉大理寺寺丞九月遷大理寺少卿十八年五月遷太僕寺卿七月遷通政使八月擢工部右侍郎疏言前因兵餉不繼開例捐納道員以上定例不准捐復獨廢黜知府許援例復職自開此例部選還職不一其人有甫經革職即納銀候選者名為急公實則馳心名利之場借此營私取償於下吏及百姓耳雖未敢必其全屬不肖然前無可取後復何效貪汚既足敗檢庸懦亦堪誤事請嗣後降調知府援例復職試其才猷量予同知等缺三年無過方予陞轉其革職知府祗許降捐同知既不没急公之義復不輕方面之任飭官方清吏治似為有益部議知府係州縣表率其因公降級者仍准捐納還級以原官用革職概不准捐從之十九年因病乞休諭解任調理二十年卒賜祭葬如例白如梅子色純白如梅漢軍鑲白旗人初任佐領順治十一年正月授督捕右理事官十月遷都察院左僉都御史十二年十二月授山西巡撫十三年四月疏言外省大吏亷訪屬員劣蹟去之惟恐不速原非先審而後劾及由按察司轉行府㕔各官逐欵研訊須證據明確乃得定案斷不能事事與原㕘相合故督㕘撫審撫㕘督審不令原㕘者究擬所以防流弊也乃在外讞牘例係通詳必待原㕘者批允方得繕疏未免强求情節符合駁而又駁請嗣後惟許承㫖究擬者核詳定案原㕘上司不得批駁果見有徇庇開脱情弊另行據實糾㕘將承問及批允之官議處則苛求絶而讞擬公矣疏下部議如所請十七年以督催協濟陜西四川兵餉加兵部尚書銜又以協濟雲南四川兵餉全行起解加太子少保十八年六月疏言陽和巨鎮僅一守備難資彈壓請以新平㕘將更調朔州為雲西極邊請以馬邑守備移駐天成陽和二衛屯糧舊多逋欠應令中路通判移駐陽和稽屯清餉又言晉省鑄錢向於太原平陽潞安汾州設爐十座大同設爐二十座多少不均請減大同爐座之半増入省城庶不致此贏彼絀矣疏並下部議行九月擢陜西總督康熙四年五月裁併山西總督於陜西即以如梅任之是年冬厄魯特台吉阿喇納所屬䝉古越定𦍑廟邊界逰牧山丹衛遊擊房玉柱理諭不從率兵驅逐衆䝉古抗鬭傷害我兵十數人我兵合擊乃遁去鎗斃及斬死者二百餘人獲馬二百餘牛羊千餘如梅疏報不言我兵陣亡及陣獲馬匹牲畜而僅云互如對敵殺傷蒙古三十餘人五年九月上察知其事勅理藩院遣官以所獲牲畜給還䝉古台吉阿喇納恩卹陣亡受傷兵丁下部察議如梅隠諱罪應革職任命留太子少保革去總督十五年九月卒子色純初任内院副理事官順治二年遷刑部啟心郎九年遷𢎞文院學士充纂修太宗文皇帝實録副總裁官十一年充順天鄉試正考官擢吏部侍郎十三年四月以員外郎朱世徳司𣙜河西務虧缺税銀吏户二部援恩赦免議部臣並坐瞻徇色純罷任六月起秘書院學士明年充經筵講官十五年遷禮部侍郎兼文華殿學士十七年六月命署河道總督色純以祖玉銘老病疏辭八月授總督倉場侍郎康熙二年考滿加工部尚書銜仍督倉場事四年至七年屢以漕糧全完予紀録八年八月上以前此鰲拜輔政時薦劾不公特詔舉行察典以色純不孚衆論命降二級隨旗行走十三年七月起為江西巡撫時逆藩吳三桂耿精忠反賊黨分道窺伺江西色純既之任疏言逆賊逼脅良民割去髮辮意謂天兵所到必以無辮加罪因而鼓惑人心負嵎死守若得明勅領兵將弁專戮抗拒賊人其愚懦之民被脅割辮者概行寛免則脱歸恐後不為賊用矣至逆賊屯聚多在城池村莊之外敗竄後所留悉是良民宜令無所驚怖被賊擄掠子女許各認領並免收繫疏下兵部議行十二月色純遣逰擊李天柱敗精忠偽將王九萬等於㑹昌又敗之湖城擒偽副將楊權又遣逰擊田振敗賊西塘擒偽都司鍾喜泰等十四年二月遣天柱敗三桂偽將陳昇於湯村復龍泉縣又遣同知顧岱宣諭興國瑞金雩都諸土賊降其魁謝吉祥曾鳳謝大全等十一月卒於官賜祭葬如例諡勤僖二十三年正月上諭大學士等曰督撫乃封疆大臣通省民命所闗世祖皇帝時所用者尚屬循良逮至輔臣時用張長庚白如梅張自徳賈漢復屈盡美韓世琦等匪人致百姓困苦已極今相沿成習尚未盡改現在浙江湖廣總督江寧巡撫員缺必擇賢能補授方於地方有濟十二月諭八旗漢軍都統等曰國家自祖宗定鼎以來委任漢軍官員與滿洲一體其中頗有宣猷効力者如孟喬芳張存仁輩朝廷亦得其用比年漢軍居官者大不如初每赴外任多㩦傔從汰侈麋費惟務黷貨累民恣肆放逸未能謹守法度如張長庚賈漢復白色純等不可勝舉屢加申飭尚多因循未見改轍兹者巡行江南衆口一辭稱江寧知府于成龍清亷愛民朕已超遷為安徽按察使又特召其父賞賜以示褒美亷吏至意凡爾八旗漢軍自今以後悉宜洗心滌慮痛除舊習或子弟官守在外宜各貽書訓勉果有潔已愛民如于成龍者朕立行擢用如猶怙非不悛國有常法不能為此輩貸也三十三年三月復諭大學士等曰從前總督張長庚屈盡美巡撫白色純韓世𤦺等居官不善不數年間子孫窮困由此觀之徒貽惡名此輩所貪取者今安在哉馮國相馮國相漢軍鑲白旗人父有功太宗文皇帝崇徳八年從征明中後所前屯衛凱旋授佐領順治元年隨都統葉臣征山西以紅衣礟攻克太原城二年隨都統金礪征湖廣撃敗偽總兵馬進忠於武昌獲賊船十有三敘功予雲騎尉世職五年授杭州協領七年九年疊遇恩詔晉世職至三等輕車都尉十八年卒國相襲職康熙十三年吳三桂叛據湖南國相隨順承郡王勒爾錦往征賊將陶繼智劉之復等犯宜昌國相領隊發礟撃郤賊衆尋隨貝勒察尼敗賊於岳州十八年正月隨都統根特敗賊虎渡口遂進征灃州常徳屢立戰功十九年凱旋授佐領尋授㕘領三十年十二月擢鑲白旗漢軍副都統三十四年調右衛左翼副都統時噶爾丹侵擾邊境國相率兵至阿爾蘇台偵賊聲息明年上親征駐蹕克嚕倫河國相運礟至軍前即隨撫逺大將軍費揚古等由西路督兵敗賊於昭莫多俘獲無算是年冬還京授鑲白旗漢軍副都統三十六年叙功予雲騎尉世職合所襲之職為二等輕車都尉尋調鑲黄旗漢軍副都統四十一年擢正藍旗漢軍都統五十七年十月卒賜祭葬如例子毅襲騎都尉六十年由㕘領授廣州副都統明年擢廣東提督雍正元年十月卒於官祭𦵏如例子瀚襲騎都尉三年四月上以八旗公庫事務惟國相辦理時綜計眀析下部議叙於現襲之騎都尉加一雲騎尉十年九月諭九卿曰原任都統馮國相謹慎小心樸誠自矢服官辦事從無過愆向來各旗公庫俱有虧空惟馮國相所管正藍旗全無欠缺此即其出納謹嚴操守潔清之明騐伊係朕藩邸之人知之有素應否入賢良祠㑹議具奏尋九卿以詳考事實洵為賢良大臣允宜入祠議行乾隆元年詔九卿核議已祀賢良諸臣之應追諡者列奏賜國相諡曰桓僖蕭永藻蕭永藻漢軍鑲白旗人父養元管佐領永藻由廕生補刑部筆帖式康熙十六年六月授内閣中書十七年四月遷禮部員外郎襲管佐領二十四年八月遷郎中二十七年監督湖口闗税務尋授御史二十八年八月遷内閣侍讀學士三十四年七月遷順天府尹三十五年十二月擢廣東巡撫三十七年三月疏言開爐鼓鑄原為便於兵民而設粤東偏在海隅用錢無多開鑄將及三年錢文倍增錢價益減現在每千市價三錢二三分不等兵丁月餉按定例而支照市價而用已屬苦累距省遥逺各營搬運需費領一兩之錢不及數錢之用民間亦因錢價日減貨物難行請暫停鼓鑄從之八月疏言鼔鑄雖停其局内存錢照舊塔放兵餉自夏徂秋錢價更賤兵丁月餉無幾請即支給全銀俾有實濟俟錢價稍昻再行搭放十一月疏言兩廣鹽政沈愷曾一年差滿請展限一年俾清理積年未完課銀五十餘萬兩未銷鹽引一百餘萬道部議並従所請三十八年十月疏言開山掘礦招集多人羣聚一方良莠混雜臣受事之初再三飭禁近有長寧縣匪徒集衆私採臣即飭恵潮道察究完結知縣尤鵬翔不先通報請勅部議處下部議革鵬翔職三十九年正月疏言廣州府屬之南海畨禺東莞新㑹四縣幅􅊷遼濶逼近海洋最為難治必須選調賢能前撫臣髙承爵選員請調南海東莞部議二縣不在欠糧難完應調之列未准行臣思在昔荒逃甫復故止就欠糧議調今遷復日久不患民賦逋欠而患盜賊未弭請以清逺乳源茂名海豐知縣張象乾姚炳坤錢以塏白章調補南海畨禺東莞新㑹四縣得㫖如所請行後不為例十二月給事巾湯右曾疏劾永藻與總督石琳于瓊州府屬擾害黎峝致黎人争鬬事遲至一載始行具題其交相徇庇可知縱貪殘之屬員朘民漁利吏治安得不敝民生安得不困民生既困遂為盜賊如在海則有電白陽江在山則有英徳翁源及普寧縣富美寨等處横行刦掠雖經𠞰滅而民間受害已多不知平日之察吏安民者奚在也上遂調廣西巡撫彭鵬至廣東永藻調廣西仍命回奏下部察議應降二級調用得㫖從寛留任四十年三月入覲諭曰彭鵬在廣西居官甚好爾可效彼所行爾在廣東時盜案甚多牽連數百人俱罹法網近復有黎人之事爾居官果善豈致如此爾所薦人亦未必賢嗣後但當擇清亷者舉之居官既亷辦事自善即錢糧稍有未完百姓自為彼勉力急公也爾其識之先是彭鵬疏請禁革廣西私派積弊上命永藻察奏十一月疏言粤西向因軍興差役浩繁費無所出從田糧加派銀兩迨承平後士民倡議照糧攤派以應公務名曰均平相沿已久是以前撫臣題請禁革臣莅任伊始即屏絶餽贈嚴飭所屬不許於正供外妄派絲毫竊恐愚民易於蠱惑不肖有司仍蹈故轍乞勅部行文勒石嚴禁以垂永乆至布政使派修衙署銀係各屬自捐惟左州知州劉正國私派民間銀八十兩應議罪其巡撫衙署所有鋪陳器具僉稱在省司道府凑集供應非出派捐臣已盡數發還謹一併題明事下部議如所請劉正國革職逮問四十一年五月疏言粤西僻處邊陲猺獞雜處而南寧太平慶逺思恩四府地接交夷兼轄土州縣司峝寨五十餘處尤為難治前經九卿議定四府屬員缺擇桂林平樂等府品級相當者調補三年俸滿陞用惟是南太慶恩四府㕔州縣共二十九員桂林平樂等五府知縣以上共五十八員當奉行之始尚有久任之員可以選擇迄今一十六年除調補𠫭劾陞任病休外多係任事日淺才守未知即有久任者亦係循分供職與選擇調補之例不符前撫臣彭鵬于調補各員恐以地方之美惡為趨避酌一掣籖之法實屬至公嗣後四府官員缺出應仍以五府内之亷能者掣簽調補如無可調之員請㫖特簡補授上是其言下部議從之四十五年四月内遷兵部右侍郎時湖廣總督石文晟疏劾容美土司田舜年違制不法各欵上命左都御史梅鋗内閣學士二格㑹審與文晟異議復命永藻與大學士席哈納侍郎張廷樞往湖南察審還奏舜年已故被控僣越各欵俱虚誣控之向久忠等擬罪如律文晟不能詳察草率題𠫭應議處從之四十六年正月擢都察院左都御史九月遷兵部部尚書四十八年十二月命同副都御史王度昭往湖南察審巡撫趙申喬提督俞益謨互訐事覆奏益謨違例抽取衡州協兵餉三十五名致兵丁缺額應革職所訐申喬貪虐各欵俱不實但申喬每事刻意苛求失大臣體亦應革職詔令益謨休致申喬從寛留任四十九年四月調吏部尚書十一月授文華殿大學士五十六年三月命在議政處行走六十一年世宗憲皇帝御極以永藻勤慎亷潔加太子太傅銜命往馬蘭峪總理陵寢事務五年十一月宗人府奏閒散宗室廣善恩給公銜在陵寢居住越分請安永藻不行攔阻應革職得㫖蕭永藻向來操守甚好每自恃其有操守驕矜偏執諸事任意朕因其年逾七旬為舊日大臣加恩優待念景陵事重特命伊總理且令就閒散之地以頥養暮年正所以善全之也乃不知感恩事事推諉瞻徇不實心辦理如請安來京不候㫖即去此等疎慢之處甚多惟知阿諛允禵以長其傲慢狂肆之罪而其特行條奏者則裁汰舊設之官員減去祭祀之乳牛以為節省錢糧之計不知大體深負委任著革職仍在陵寢地方居住効力七年正月卒年八十有六白潢白潢漢軍鑲白旗人由筆帖式授内閣中書遷侍讀康熙三十九年授福建糧驛道四十二年丁父憂四十五年補山東登萊青僉事道四十九年遷貴州分守貴東㕘議道五十三年遷貴州按察使五十五年擢湖北布政使未赴命䕶理貴州巡撫五十六年六月改江西布政使七月擢江西巡撫五十七年疏言江西湖口縣闗地形甚險兩山揷江夾峙商船候騐停泊虹橋港逼近山脚夏秋僅容小船一二百冬春水涸往來報税必由梅花洲嘴紆行十餘里過水漲則江湖二流横激港口微風即蹈不測惟闗右里許山勢開濶有武曲港可容千艘但冬春亦涸請自江岸至港口大為挑濬於港口建草壩二以阻淤沙外加排樁以固壩根可利停泊商民俱便部議如所請行五十八年疏言江西科第之盛逺勝浙楚康熙三十五年奉㫖増額江西七十五名浙江七十一名湖廣七十名是向來中額多於浙楚四十一年浙江湖廣二省以督臣郭琇撫臣趙申喬請照江南中額増至八十三名江西未經題請不增至五十年特㫖增直省中額浙楚又各增十六名江西僅增十五名近科入場士子多至一萬二千餘人而中額不得比於浙楚通省合詞請題廣額懇恩將江西鄉試中額照浙楚一例取中疏下部議從之五十九年七月疏言州縣因公挪用虧空錢糧請照霉爛倉榖例者不論在任解任及分賠之知府能於限内全完准其開復如所請行尋因病乞補京職授户部右侍郎十月擢兵部尚書六十一年十一月世宗憲皇帝御極命潢協辦大學士事務十二月晉文華殿大學士潢具疏懇辭諭曰朕素聞爾居官操守甚好巡撫江西時綏輯地方甚有禆益及任兵部尚書清勤恪慎皇考每加優奬今朕以機務重大資爾料理爾即遵㫖供職不必固辭時恭纂聖祖仁皇帝實録以潢充總裁官雍正元年賜詩一章有蓼蕭多雨露應及老成人之句三年七月以病乞解任從之先是江西南昌吉安撫州饒州四府有落地税銀千三百餘兩各以大使徵收潢以官役費浮於税不免苛徵將四處税銀停徵巡撫司道公捐銀代完假造商民名冊報部税大使已無職掌仍舊設立後任相沿辦理未奏至是江西巡撫汪漋奏其事並請裁汰大使上諭大學士等曰此項税銀不應徵收則白潢當奏請於聖祖仁皇帝施恩豁免若係應徵則令商民完納何得公捐完課曲市私恩似此沽名邀譽豈人臣事君之道至汪漋凡事不能據理而行乃將白潢所行悖理之事奏聞冀朕批示爾等同九卿詢問回奏尋奏白潢沽取虚名擅變舊例應嚴加議處汪漋妄行凟奏亦應察議部議白潢照溺職例革職汪漋降二級調用課税仍照舊例徵收税大使不得於額外勒索從之乾隆二年潢卒三年九月上諭原任大學士白潢向在巡撫任内有清廉之名告休後縁事革職今聞病故著給還大學士銜以示優待大臣之意沈廷正沈廷正漢軍鑲白旗人康熙四十一年由筆帖式授湖廣羅田知縣四十六年十二月遷陜西商州知州五十三年八月遷蘭州府同知雍正元年二月遷臨洮知府六月調延安二年七月上以廷正居官聲名甚好加道銜改西安知府未赴任即擢河南開歸河道三年十二月遷河南按察使嗣奏豫省臨河州縣應以黄河為界分管南北以便巡防其附近兑漕水次之沿河地方豫為廣貯倉糧以濟漕運至丁銀俱按地派徵以廣皇仁事下部議行四年三月遷福建布政使八月部議廷正任延安府時㑹審虧空案限滿擅挪西安貯庫銀代完應革職得㫖沈廷正在豫省開歸道按察使任内聲名俱好從前此案乃畏懼年羹堯勢力逼勒所致並非伊之本意從寛免革職五年四月奏言閩省倉庫多虧缺督臣髙其倬深知陋弊令臣委員查辦閩省捐監積榖通一百八十二萬四千二百二十二石除征臺軍需并連江水災豁免及㕘追虧空等項外餘各屬貯倉榖據稱有累年發糶尚未買補并前任流交現存榖價者有碾米給兵尚未徵補者有累任流交民欠及發價採買未補者現存貯數合之原額數未及半此倉貯之所以有名無實也平糶原以濟民秋收應照數買補無如各屬延緩概存價銀今俱令解貯司庫以杜侵挪秋成時發還買補又兵米原係地方徵收支放祗縁青黄不接時暫借倉榖碾給乃借後任民拖欠以致累年未清今飭所司照數徵補不得以完作欠又流交榖價乃累任州縣交代倉貯缺額遂折價移交近年榖價稍貴不敷買補價雖實貯榖已虚懸更有流交民欠一項據稱發價採買未交累任相沿僅存空領穀無實貯以上各項前於三年奏報案内俱皆揑造實貯此畨徹底盤查飭令各屬據實具結各道府仍照徃年概出實貯印結臣詳明駁換而限期迫屆隨將報到榖數彚造草冊呈送督撫經署撫臣毛文銓令臣將三年揑報實貯改作四年平糶臣查三年揑報實貯榖數一切流交民欠存價未買等項在内若改作四年平糶固可符揑報實貯之數然臣何敢改移年分自蹈欺妄各府縣與巡撫通同一氣紛紛具報買補將完何從前艱於採買而此時如此之易欺飾顯然臣寧受巡撫與屬員之怨不敢少有瞻顧據實上陳得㫖朕原謂毛文銓不妥髙其倬亦慮其偏於善柔爾此奏甚屬可嘉秉公正色勉力為之六月上命常賚為福建巡撫以廣東巡撫楊文乾赴閩㑹同盤查廷正即以通省各項倉榖及累年未完正襍錢糧江浙運閩米榖糶賣價銀各數按項造冊徹底清理内有虧空那移官侵吏蝕及虚開民欠者通詳題㕘仍勒限完補至存庫榖價有多寡之不同地方有産榖不産榖之分或往隣省購買或於本地採買仍立限運回收貯先後具疏以聞均䝉嘉奬十一月擢貴州巡撫六年五月部議廷正於延安府任内失察甘泉縣侵蝕給賞老民銀兩應降一級調用得㫖從寛留任又諭曰沈廷正任内處分之案甚多朕俱開恩寛宥者因伊前在福建布政使任内將通省錢糧倉榖未清之項徹底查眀據實陳奏朕遣楊文乾等前往確查始將積年虧空盡行清理實係沈廷正陳奏之力朕彼時不將沈廷正之奏宣示於衆者因沈廷正現為閩省藩司恐清查之員有所瞻顧牽制且藩司專司通省錢糧凡各屬未清之項或有干渉沈廷正之處今楊文乾等將各項清查歸結沈廷正已陞黔撫而福建藩司任内並無絲毫未清之項實屬不徇情面實心任事之員則朕屢次加恩寛宥之由理應曉諭内外知之七月疏言布政使祖秉圭與臣籌畫糶借倉糧並嚴禁地方官於秋收後派民買送米穀事臣自入境時即訪聞黔省各府州縣去嵗平糶倉糧減價太多致秋成時官民買補維艱又賣糧惟委佐襍官監糶豪棍衙蠧各揑户口争先糴買窮民終日不得顆粒及糴買時府州縣親戚家人勾同書吏將戥頭斗面任意髙下臣飭各屬親身監糶不致欺隠秋成斷無不敷買補之理所有派發民間買送之弊嚴行禁革至借給倉糧在祖秉圭謂糶不如借臣愚以為糶糧尚有價銀存庫而借糧多係豪衿地棍串通滑吏為之誘一二窮民以呈首借領内多假托姓名或秋收少薄或經手官陞遷事故藉口延挨虚懸倉儲故青黄不接時只宜平糶不得輕借若地方實係歉收窮民嗷嗷待哺無力糴買又應仰體皇仁一面酌量照例借給一面繕摺奏聞此暫時權宜非可定例與平糶並行也得㫖覽借糶二議汝所見是又奏言黔省各路生苗陸續向化惟黎平鎮逺平越都匀與楚粤接壤生苗多干法紀而八萬古州九股生苗盤踞深山現經按察使張廣泗化誨招撫清理疆界臣以張廣泗隨帶出力官兵須加賞賚即投順生苗亦應賞給花紅銀牌且張廣泗行營需費甚多請將司庫捐納公費銀一千兩以五百為豫備賞賚官兵苗民之用以五百給張廣泗為行營盤費諭速行給與毋遲是月調雲南巡撫仍署貴州巡撫十二月疏言前撫臣何世璂奉勅建龍神祠將祀明臣王守仁之陽明書院移其牌位改作神祠查王守仁謫貴州龍場驛丞時講明聖賢之學化民牖俗黔之人士始知誦習詩書臣考之記載訪之輿論王守仁實有功名教是以陽明書院素為貴州省城士子瞻仰讀書之所請仍其舊别建龍神祠宇得㫖此舉妥協之至何世璂素留心理學伊等皆各立門户互相是非若云無心之失何至錯誤若此不必究論俯順輿情改建為是七年正月赴雲南任五月疏言曲靖府属陸凉州馬厰因上流水漲淹麥臣仰體皇上恵愛邊黎至意將馬厰被淹田地應輸本年糧折銀一千餘兩免徵奉㫖當日正以地非沃壤所以作為馬厰也照汝所請料理八年六月奏言宣威州新由土司改設州治請設學正一員下部議行八月授河東河道總督九月遷都察院副都御史仍留河道總督任九年六月奏言東省運河堤岸為漕艘往來要津汶上所轄之何家壩當汶河西岸蓄水濟運衝刷流沙為南北運河闗鍵因建立年久堤岸潰缺一遇汶漲沙流入運劉老石頭二口遂致􅀈墊淺澀急須照舊整理俾蓄洩有資俟估詳題請修築臣又念黄河工程較運河更為緊要今屆伏汛親由曹縣芝麻庄一帶查勘各工俱各平稳惟豫省儀封北岸趙家寨工程當全黄頂衝現今大溜掃灣直射堤根甚為險要星夜防䕶而祥符程家寨工偪近省城最為緊要業將北岸開挖引河𨗳溜北徙正在守候開放間北風連作全河勢注南岸臣親率各員駐宿引河工所俟水勢漲發風色順利即當相機開放諭亟宜恪秉誠敬以祈神佑竭力防䕶以盡人事也九月調直𨽻河道總督十年二月以病解任回旗閏五月卒劉輝祖劉輝祖漢軍鑲白旗人乾隆二十六年武進士授藍翎侍衛三十一年授四川永寧協左營都司三十四年解馬赴雲南軍營三十六年隨征金川由西山溝攻喇嘛寺復由東山梁渡河攻卡丫三十七年三月敗賊於達烏等處得㫖優叙尋遷福建建寧鎮標中營逰擊十一月隨大軍克甲爾木山梁夜渡河攻西山賊碉輝祖復偕守備崔文傑率昭通等兵踰溝破其石卡奉㫖議叙十二月調陜西黄甫營逰擊三十八年五月遷陜西陽平闗㕘將六月賊夜窺我當噶爾拉大營知有備退擾陜兵營輝祖督兵百五十施鎗石力戰達旦殺賊八十餘額受石傷事聞賞戴孔雀翎擢湖南長沙協副將十一月署甘肅寧夏鎮總兵十二月大軍分陳抵格藏橋輝祖隨公奎林潜由深嘉卜攻斯第博堵以皮船渡奪木城二三十九年三月駐防絨布寨五月命統領陜西兵六月隨大軍進攻穆谷七月偵賊伏卡卡角山溝亟擊之賊敗入庚額特碉卡輝祖督兵分隊誘戰賊匪不出輝祖即駐守穆谷九月賊百餘乗雨擾西山梁土把總阿甲所守卡擊走之十二月攻賊碉賊潜出箐斷後援至敗遁四十年正月賊復出箐迎擊之殺傷甚衆六月攻布咱克分賊勢七月卒諭曰劉輝祖在川省軍營四載帶兵打仗尚屬出力今因病身故亦屬可憫著加恩照總兵王萬邦之例交該部議卹具奏尋賜祭葬入祀昭忠祠恩廕其子徳陞以巡捕營千總用欽定八旗通志卷二百二
