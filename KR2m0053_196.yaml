body:
  text: 人物志六十二大臣傳四十八滿洲鑲藍旗五保和起鄂容安常祿瑚爾起和起子和隆武和起滿洲鑲藍旗人姓馬佳髙祖阿音布國初以軍功授騎都尉世職康熙六十一年和起襲乾隆四年授盛京協領十二年授廣州副都統十四年調寧夏副都統十九年五月命偕侍衛海福率寧夏兵千赴北路軍營二十年正月授寧夏將軍二月定西將軍永常劾和起等所率兵不及額請議處諭曰寧夏兵一千原定於四月內前赴軍營後因歸於哨探兵隊內令和起等催儧前進伊等隨將輜重留後派兵百名守護止領九百名遄行尚屬奮勉且已具奏在前非無故遲留可比著從寬免其議處七月以達瓦齊就擒撤寧夏兵還仍令和起統之尋命偕提督豆斌為巴里坤辦事大臣十一月以逰擊王國士運糧遲誤諭曰軍營糧餉關係緊要理應加意辦理何以王國士派委運糧半月僅行六臺必係僅派緑旗兵運送以致如此遲誤和起等辦理甚屬錯謬現在滿洲及索倫察哈爾兵丁調集巴里坤若交伊等運送不但行走迅速且于運糧之便直抵軍營一舉兩得况新降達什達瓦人衆此際已應至巴里坤附近地方伊等熟悉路徑與兵丁同運更為有益此皆和起等應行籌辦之事乃並未籌及所司何事著傳諭和起豆斌等遵旨悉心辦理十二月定西將軍䇿楞奏屢檄和起等將補給兵丁及甘州肅州續到之馬速解軍前至今未到詔令明白回奏並交部議革職留軍營效力得旨從寬留任二十一年正月特豫開復和起奏言涼州寧夏等處所解馬疲斃過多臣派員在巴里坤分牧俟臕壯挑用仍先照數補解以利軍行請將委員議處部議從之二月給欽差大臣關防五月諭曰和起在巴里坤辦事甚屬黽勉著馳驛來京面聆訓示再往軍營同參贊大臣兆惠籌辦一切事宜先是達什達瓦所屬宰桑訥默庫曼集烏達瑚們都等自軍營私回逰牧奉旨鞫治六月諭曰現據和起將訥默庫等擅回遊牧之處訊明復以伊等係新降之人未諳法律陳奏殊屬謬誤達什達瓦屬人歸誠以來疊施厚恩及派往軍營效力又與內地兵丁一體賞給製裝銀兩乃敢不遵法令擅帶兵回至遊牧情罪甚屬可惡昨經和起等奏到朕即降旨令將訥默庫曼集等正法其兵丁係聽從指揮加恩寬免所以不將兵丁一併治罪者特因伊等新降姑從寬典至宰桑乃領兵之人豈得曲從寬宥和起等審訊既確復為此奏其意惟恐訥默庫等正法後致達什達瓦屬衆心懷疑二妄生事端果有此情正當使知法律森嚴不容輕犯安得茍且姑容以示怯懦料和起尚不至此此必出于錫特庫之意著傳旨申飭仍將訥默庫曼集烏達瑚們都即行正法十一月輝特台吉巴雅爾叛掠扎哈沁五百餘户定邉右副將軍兆惠令和起率索倫兵百往𠞰檄吐魯畨伯克莽阿里克及厄魯特兵集闢展而噶勒雜特宰桑哈薩克錫喇布魯古特台吉呢瑪隂應巴雅爾詭以兵千五百會和起望兵至疑之令莽阿里克往偵紿告曰我兵也逾時呢瑪等操戈前莽阿里克自後譟賊衆蜂集我兵僅百人負重創和起手刃數賊股中鎗徒步轉戰至夜力盡死之遺命索倫侍衛努古德彰金布突圍出以所戴孔雀翎為識往告巴里坤大軍兆惠以聞諭曰和起效命疆場捐軀報國忠節可嘉深為憫惻著照傅清拉布敦之例加恩贈恤上憫和起義烈御製西師詩有奮勇沙場沒之句尋追贈一等伯賜祭葬入祀賢良昭忠二祠諡武烈賞一等子爵以其子和隆武襲二十三年逆賊呢瑪及其子就擒命於和起墓前伏誅和隆武初襲子爵授三等侍衛乾隆三十六年襲佐領三十七年二月隨護軍統領明亮赴金川軍營七月隨大軍由墨壟溝攻甲爾木山梁十二月大軍分路進𠞰和隆武為領隊侍衛時明亮等攻美都喇嘛寺和隆武沿河夾𠞰賊潰復合盡戮之夜克美諾各碉寨三十八年二月分攻納圍正面山梁六月海蘭察𠞰賊于簇拉角克五岱統兵援和隆武為接應七月敗賊於鳩寨奪碉五十餘八月授鑲藍旗蒙古副都統十一月克復僧克宗三十九年正月隨富德攻克絨布寨正北之沃什山摩格孟格哩格穆爾德宗進攻卡卡角是月署古州鎮總兵三月同奎林等褁七日糧分隊取斯第賊迎拒和隆武麾衆力戰矢盡以矛槍格鬪被創事聞奉旨嘉奬賜玉韘荷囊六月調征正地九月攻木克什克第一碉賜皮馬褂十一月大軍攻日旁和隆武由周叟繞出其後突入碉寨賊驚潰鎗石不及施短刃相摶我兵沿山追𠞰克戰碉十餘平碉二百餘日旁賊殱焉諭曰此次明亮等攻克日旁碉寨探路籌畫均合機宜而越險攻碉殺賊全係和隆武功績伊父和起盡節捐軀應有是子深為嘉慰著授為都統以示優奬和隆武尋偕珠爾格德等𠞰谷爾提一帶碉寨盡克之諭曰此次攻得碉寨又係和隆武帶兵前往似此屢次出力實屬可嘉四十年正月授正藍旗蒙古都統四月分攻得楞以南碉卡復與奎林等由薩克薩谷進攻追殺無算六月攻額爾替山梁石城殺賊甚衆諭奬其奮勇出力七月賊據石真噶和隆武與奎林乘運炮聲囂分隊突攻據之賊奔潰時將軍阿桂一路兵直壓勒烏圍之頂和隆武等張兩翼亟進為聲援八月賊恃扎烏古險要於丹扎木各寨悉衆拒守我兵出其不意取路深入和隆武沿河接應夾攻十月由琅谷攻奪什扎古諭曰此次攻碉殺賊官兵均為奮勉而奎林和隆武二人出力尤多現在西路將領隨將軍阿桂屢次克捷立功建績者甚衆將來自膺茂賞而明亮北路久未能進即此次亦不過尋常小勝不能遽邀録敘眀亮奎林和隆武各宜奮勉立勳豈可専讓西路成功而不知奮勵但進攻時當度其利害籌及萬全閏十月克扎烏古及耳得谷十一月克阿爾古十二月由達撒谷進攻克荒子坪一帶碉卡復攻獨古木思滿賊望風披靡上以和隆武鼓勇先登茂著勞績賜諭嘉奬又攻甲雜官寨圍之賊遁乘勝克獨松四十一年正月金川平晉封三等果勇侯賞戴雙眼翎尋命將本佐領擡入正黃旗四月凱旋賜御用鞍轡馬一及銀幣命圖形紫光閣御製贊曰襲父恤職少年老成囊錐脫頴竟善用兵掠日旁寨獨擅偉勳楚材繼出既悵以欣四十三年四月授寧夏將軍十一月調吉林將軍四十七年卒賜祭葬諡壯毅無嗣弟和雙額襲侯爵瑚爾起瑚爾起滿洲鑲藍旗人姓瓜勒佳雍正三年由監生授八品筆帖式乾隆四年授佐領十二年授協尉十三年隨征金川賞戴孔雀翎十九年授呼倫貝爾總管二十年隨大軍𠞰凖噶爾加副都統銜二十一年正月隨參贊大臣達爾黨阿等由珠爾都斯往追叛賊阿睦爾撒納九月偵阿睦爾撒納竄哈薩克隨定邉左副將軍哈達哈等往索哈薩克汗阿布賚拒戰連擊敗之復追及其後隊及别隊斬首百餘獲馬二百餘生擒杭吉勒圖等詢知阿睦爾撒納遁呢雅斯圖山遣諭阿布賚擒獻二十二年二月杜爾伯特屬人劫侍衛佛保命瑚爾起擒治之五月偕參贊大臣唐喀祿赴察罕郭勒偵禦叛賊哈薩克錫喇七月杜爾伯特貝勒巴圖博羅特等潛通阿睦爾撒納瑚爾起擒之於輝巴朗山後𠞰其屬及阿睦爾撒納所留烏梁海五十餘户事聞得旨嘉奬交部議敘八月以兵三百接應往𠞰哈薩克錫喇之侍衛圗倫楚是時沙喇斯瑪呼斯既降復叛掠臺站而布魯古特台吉琿齊等又戕我察哈爾總管巴寧阿十月諭曰濟爾哈朗至巴里坤適中之地著哈寧阿率兵一千駐劄鄂實三格瑚爾起為副其琿齊及沙喇斯瑪呼斯賊衆有散逸在附近地方者即帶兵搜𠞰十二月偕鄂實追𠞰扎哈沁逃賊奮勇有功諭部議敘二十三年三月偕副都統巴圖濟爾噶勒由呼斯坦至尼勒喀河偵琿齊等百餘户遷牧突擊執之定邉將軍兆惠以聞詔奬之下部議敘四月隨大軍由伊犂進𠞰回部五月抵善塔斯嶺招降布魯特頭人圖魯啓拜鄂庫及所屬九月搜捕阿里瑪圖河逸賊十月上以索倫兵從征年久命瑚爾起及副都統鄂博什撤還瑚爾起等懇請隨𠞰允之時將軍兆惠𠞰回酋霍集占於葉爾羌被圍定邉右副將軍富德檄瑚爾起及巴圖濟爾噶勒率索倫兵由伊拉里克前進因馬駝未至負糧械步行戈壁中諭曰瑚爾起等所領官兵皆應撤回更換者昨因懇請前赴軍營已諭照初次出兵例頒賞今又不候馬駝步行速進奮勉可嘉瑚爾起著補授正白旗蒙古副都統巴圖濟爾噶勒現任副都統著加恩授其弟恩克阿穆爾為藍翎侍衛仍曉示官兵勉效前驅以膺恩賞二十四年正月抵巴爾楚克兆惠已與富德軍合適霍集占逆黨阿卜都克勒木等侵和闐侍衛齊凌扎卜請援兆惠令瑚爾起及巴圖濟爾噶勒以兵九百往𠞰三月偵賊騎七百餘據博羅齊乘霧突擊潰之追至皂窪勒河斬賊百餘收回人四千餘户和闐底定御製博羅齊行詩紀其事載巴圖濟爾噶勒傳瑚爾起以功授雲騎尉世職七月大軍由喀喇烏蘇追𠞰霍集占至阿爾楚爾賊設伏兩山間我軍張左右翼擊之中軍發大神炮賊敗走三十里據一山瑚爾起等自山麓橫衝大軍齊進斬阿卜都克勒木賊大敗越山而遁八月尾追至巴達克山界之伊西洱庫爾淖爾瑚爾起等各領兵百設伏東山一帶大軍夾𠞰大敗之霍集占竄入巴達克山未幾巴達克山汗素勒坦沙函獻霍集占首瑚爾起分領索倫兵還二十五年二月賚銀幣七月疏言呼倫貝爾多水泉可耕請於新降塔里雅沁回人內選百名往引水灌溉詔如所請行即命瑚爾起以副都統為呼倫貝爾總管董其事二十六年命圖形紫光閣御製贊曰突擒琿齊其氣如虹及降勃律烏幕占風解圍和闐戰鏖大食麾鍪而登威著西域二十九年調黑龍江副都統三十四年從征緬甸收服猛拱猛養等處以病卒于軍營諭照陳亡例議恤給騎都尉併前世職為一等輕車都尉賜祭葬入祀昭忠祠子富勒赫襲世職鄂容安鄂容安滿洲鑲藍旗人大學士鄂爾泰長子雍正十一年進士改庶吉士軍機處行走乾隆元年授編修在南書房行走二年遷侍講三年七月充日講起居注官十二月轉侍讀五年六月擢詹事府詹事時鄂爾泰承旨奏辭再三諭曰朕之用人悉秉至公毫無私意於其間古云非喬木之謂有世臣之謂蓋以大臣子弟果能立志向上諸事黽勉斯能不愧世臣可以為國家宣力朕觀鄂容安及大學士張廷玉之子張若靄朱軾之子朱必階皆能遵守家訓祗受國恩况鄂容安張若靄向蒙皇考命在軍機處行走原欲造就成人此次擢用乃朕量材加恩即栽者培之之道鄂爾泰不必以已意固辭八月命入尚書房隨福敏行走七年以與聞左副都御史仲永檀密奏留中事革職八年命仍在尚書房行走補國子監祭酒九年命偕刑部尚書來保往奉天同侍郎兆惠會審奉天將軍額洛圗扣餉勒派等欵得實論罪如律十年署兵部右侍郎襲父三等伯爵十二年五月授兵部左侍郎九月以與尚書彭維新等議處總兵髙琦武備廢弛一案違例邀譽奉旨訓飭部議革職得旨從寬留任十三年三月充會試副考官四月兼翰林院掌院學士尋兼管國子監事十月署河南巡撫十二月以辦送金川兵差妥協議敘賞孔雀翎十四年正月疏陳文武各員優劣上嘉之四月河臣顧琮往署總漕諭鄂容安就近料理豫省河務九月疏言豫省有伏牛山居嵩山南界連秦椘二省袤延八百餘里山多箐密臣於查閲營伍之便自郟縣汝州至伊陽縣渡汝水入伏牛山經十八盤等處至孫家店閲兵復由分水嶺等處至嵩縣出伏牛山親厯查看飭各員辨不時巡查該管道員嚴加督察再豫省各關其近秦省者陜州有硤石關靈寶縣有函谷關閿鄉縣有大谷關近椘省者淅川縣有荆子口關信陽州有平靖關桐柏縣有犂耙口俱通商大道恐姦宄藏匿現飭行保甲嚴斥堠諭奬其諸事認真實授河南巡撫時衛輝參將阮玉堂因操演鞭責兵丁過甚致譁鄂容安以玉堂失職應題參但兵丁甫經喧閙遽參營辨恐啓驕悍之漸奏請嚴拿兵丁分别首從定擬後解玉堂任上是之十月疏言豫省常平倉榖前準部咨以雍正年間額貯二百三十一萬九百九十九石為準除實存并借糶抵補外計缺額榖二十九萬七千四百石有竒應收捐補足臣思倉榖期實貯而地方繁簡不同豐歉各異宜乘此定額之際將各府州縣應貯榖數勻派開封府貯二萬石歸德陳州懷慶南陽彰德衛輝六府各貯一萬五千石河南汝寧二府各貯一萬五百石户口最多之許州等二十七州縣各貯二萬五千石其次通許等五十五州縣各貯二萬石又其次河隂等二十七縣各貯一萬五千石統計適合雍正年間定額至各府州縣原貯榖較現派額溢者糶價提解司庫撥補未足額者此次額榖補足後將來有餘另案存貯遇賑恤并平糶未買以此撥補現在溢額糶價已敷提解者全提不敷者於明嵗春糶案內補提其缺額之區所撥榖價如秋成後本地米價未平即於鄰近價平處買補既與定額相符又使緩急有備部議允行十一月賜所襲伯爵號襄勤十五年二月疏請將省會城門鎖鑰歸城守尉掌管允之四月奏言開歸陳三府地勢窪下多水患非開濬溝渠不足資宣泄臣查開封府屬泉水所歸之河曰賈魯河發源於滎陽縣聖僧池各泉惠合索須京三水成河厯開屬之河隂滎澤鄭州中牟祥符尉氏陳屬之扶溝西華至睢寧之周家口入大沙河其附以東注者則有鄭州之金水河七里河磨河欒河洧川之杜公河接入尉氏之太溝河康溝河陳屬扶溝之雙泊河蔡河西華之清流河皆挈兩屬溝渠之水而同趨於賈魯河此開屬泄水之幹河也陳州府屬衆水所歸之河曰大沙河發源於汝州屬魯山縣伏牛山之莫大嶺厯南陽府屬之舞陽許州屬之郾城而入陳屬之西華商水睢寧項城沈邱以入江南太和縣下達於淮其附以東注者則有西華商水之渚河扶溝太康西華睢寧之清水河太康睢寧之古黃河枯河睢寧沈邱之蔡河皆挈本屬溝渠之水而入於大沙河此陳屬泄水之幹河也歸德府屬下遊有渦河而惠濟一河據其上遊諸水由惠濟以入渦河者居多惠濟河自開屬中牟縣西十五里鋪分泄賈魯河之水由祥符陳留杞縣入睢州經柘城至鹿邑入渦河以達於淮其附以東注者則有儀封睢州柘城之老黃河陳留把縣之坡河接入杞縣之橫河杞縣睢州之桃河司家河太康柘城之沙河皆挈三屬溝渠之水而同趨於惠濟河以入渦河又鹿邑之清水河下接淝河由江南之太和縣以入渦河又有瀖河即黑河由茨河厯江南之蒙城縣入渦河則是渦河又為歸屬泄水之幹河也統查諸郡幹河如賈魯河大沙河渦河俱各深通惟惠濟一河上流尚須開濬資蓄泄其各支河內應行開濬者開封則有鄭州之金水河七里河中牟之欒河祥符之城東乾河蘭陽儀封之周家河李家渡口尉氏之乾河陳州則有太康之燕城河西華商水之渚河睢寧之東西蔡河枯河古黃河項城之蔡河泥河歸德則有寧陵之舊沙河考城商邱之沙河睢州之橫河桃河司家河姬家大坡河鹿邑之清水河黑河以上諸河皆為承受溝洫貫注幹河之要道此內有止須疏濬即可通流者有應擇地改挑者有應逢灣取直者有僅存河形必須另挑者有道里較長土方較多猝難竣事者酌量工程難易或分年帶桃或借給口糧酌量民力籌辦毋庸動項惟陳屬項城受汝寧屬上蔡洪河減水之害或謂搭橋攔阻水勢應拆改木橋或謂竹絡壩減水過多應另建石壩臣以為其害不在於橋身之阻水亦不在竹絡之多泄因橋之西墻過寬挑水東注所致止須將東西墻改做一律使洪河減水南歸茅河黑河之水東歸蔡河兩河分泄自無泛溢之虞至汝寧府汝陽縣亦以洪河為患查向來西南山水盡歸乾江河自鍋垜口決山水盡入汝為害臣飭令照舊堵塞使山水全歸乾江河則洪水已減自能容受至歸屬永城之巴溝河下接江南宿州砂礓灘此工關涉兩省應俟江南咨覆興工臣於各屬挑濬處每年底查核勤惰或附參或保薦使工員咸知慎重庶沮洳漸成膏壤諭曰如此留心本務方副委任之意勉之十月上巡幸河南鄂容安奏紳民感沐皇仁情願捐輸共收銀五十八萬七千餘兩充公用諭曰朕時巡方嶽一應道路橋梁等費皆準開銷正項從無絲毫纍民之事即城垣祠廟有應黝堊灑掃略為整葺者祗宜動支帑項即其間或有開銷不到之處現經賞給該省公項銀兩以資通融辦理之用曾何藉于輸將鄂容安此奏甚屬錯悮因其據實陳明尚不至蹈欺隱之咎猶可稍寬但朕省方問俗勤恤民隱尚慮休助之弗周豈容供用轉資於下鄂容安不能仰副朕意殊失政體著傳旨嚴行申飭紳民樂輸之項俱著給還鄂容安奏樂輸實出至願如復行給還非特不肯領回且頭緒紛繁難免胥吏中飽懇請聽其所願至辦理之初並未具奏實屬錯謬伏祈嚴治臣罪諭曰朕巡方問俗蠲復頻仍惟慮德意未能遍逮一切供頓絲毫不以纍民前降諭旨甚明鄂容安惟知下情踴躍輸將遽行冒昧從事本應嚴行治罪但既經據實陳奏究與有心欺隱者有間情尚可寬且以陸續輸公之項復令紛紛具領恐姦胥滑吏從中舞弊轉以飽其欲壑此語亦頗近是則給還之事實屬勢所難行然辦理失宜欵項無憑稽核以閭閻尊君親上之忱適足資其糜費侵用是又始終不能仰體朕意獲罪尤甚者矣著鄂容安將蠲輸銀兩作何辦理之處詳悉查明繕册送軍機處逐一察核毋得稍有朦混十一月諭曰朕於昨日回鑾今日見河南布政使富明奏請陛見一摺援藩臬三年期滿之例伊於行在召對數次並非三年未見者比不應糊塗至此鄂容安前奏富明辦事勇往在豫省頗稱得力朕一見即曽諭鄂容安其人小聰眀不可信汝勿為其所賣今觀其奏請陛見一摺一則見其不與巡撫扶同二則希圖於召見時缷責鄂容安其居心不可問如此鄂容安至今應服朕之早識而恨已之為所愚也然以如此之人而信任之無怪中州今嵗所辦之不能仰體朕意矣設果出自鄂容安一人之意富眀身任藩司即當勸阻如其力爭不得何妨於朕未至中州之前或行在召對時據實奏聞朕必將鄂容安治罪而擢伊為巡撫乃當時既已商同辦理及見朕責鄂容安之辦理不善於回鑾後為此巧獪伎倆何能逃朕洞鑒朕謂其人不可信果何如耶再今日方觀承具摺謝恩而鄂容安於朕回鑾至保定及進宫已請安兩次而不置一言夫直𨽻係巡幸常經之地方觀承即不具摺謝恩亦無不可至朕之加恩於鄂容安實出於格外包涵鄂容安宜如何感激沒身頂戴何以竟似無事即謂方觀承僅屬外吏虛文鄂容安身係滿洲受厚恩棄虛文積習可也豈獨無不能自已之情耶若謂其有心疏略亦未必然因責其辦理不善心懷疑懼思欲含糊了事此豈含糊所可了者耶著傳諭鄂容安令其痛加改悔據實查核逐一清晰無絲毫糜費絲毫粉飾以為補過之地十六年三月疏參歸德府鄉紳雲南布政使彭家屏原任江蘇按察使李肖筠抗糧至七千餘兩得旨罰追革職從寬留任先是湖廣總督永興與布政使嚴瑞龍先後疏參湖北巡撫唐綏祖婪贓纍萬奉旨革職拿問永興尋丁憂回京諭新任總督阿里衮嚴審至是阿里衮參奏瑞龍收受平餘等欵命鄂容安赴楚會審四月合疏參奏永興於進京時私受贐賻詔革永興職交部治罪五月審明綏祖並無婪贓情事惟縱容爐頭私買銅鉛添鑄瑞龍收平餘四千八百兩入已屬實上以鄂容安等未得辦理此案之正法命給還綏祖家産來京候旨録用並命刑部另擬永興等罪尋議瑞龍改照誣告人死罪律擬斬候永興減一等擬杖流枷責從之鄂容安尋疏言河北鎮屬九營暨臣標左右二營公費不敷查蘭陽等十縣官租積榖不過二萬餘石存銀不及四千兩各州縣既有常平社義等倉民食原不藉此接濟請撥歸營軍機大臣議行八月調山東巡撫時濟南府屬夏秋被水糧價昻而沿海之登萊青三府地僻山險轉運尤難鄂容安奏請照乾隆十三年例暫弛海禁招商前往奉天糴運以資接濟商船出入照例稽察得旨允行十二月與河臣顧琮等合疏言張秋挂劍臺漫口因豫省陽武堤工泛溢黃水穿運入海現在陽武工竣張秋一帶水勢日消但西陂來水從冰底原原下注今堵塞漫口須使有所歸宿方無壅滯查漫口迤北有減水閘壩三可由分泄入徒駭河戴灣閘以上閘壩涵洞四可由分泄入馬頰河又有戴灣閘臨清磚板二閘入衛北流俟水勢大減仍將戴灣閘下板嚴閉俾盡從徒駭馬頰二河宣泄入海漫口迤南有素東汛三空橋可由分泄入鹽河又有五空橋原係分泄運河淤漲但橋底甚髙不能過水臣等相度於其北築攔河壩一長二十餘丈並於橋南挑引河𨗳水由鹽河歸海俾西陂之水南北暢流消涸更易下部知之十七年二月奏言運河全堤自台兒莊至德州千餘里素稱卑薄每年伏秋兩汛兼風雨浸汕又漕船往來下撅施犂日漸殘塌臣與顧琮會籌應及時估修計需銀十五萬三千餘兩又運堤向無堡房應照黃河例每二里建堡房二需銀二千一十八兩至所修工程原以保固為重而犁溝橛眼及水溝浪窩尤須隨時修補並于漕船過後通查增修庶可垂久三月又言太行堤在黃河北岸大堤之北兩堤相去數十里中有河一道本以宣泄夾堤以內坡水順流而東達江南豐沛二縣入微山湖因年久淤塞堤內田廬淹沒雍正年間於太行堤建涵洞使堤南之水穿堤北行經定陶城武單縣魚臺等邑入昭陽湖以歸微山湖嗣因涵洞旁沖缺口定陶等邑俱受水患是此涵洞必應堵塞庶太行堤仍舊完固為黃河重垣保障至兩堤夾束中間之水亦應開通舊河使東注免漫溢報聞四月奏言東省庫項多不清其交代流抵之弊率以辦差墊用為辭仍飭屬作速核銷至常平社倉糶借榖石未歸補者甚多有因州縣恐榖石黴變強派民間者有希圖染指不暇詳查徒為無業之人領去者有村莊離城窵逺為胥役冒領者有因社榖並無倉厫散交地方致強半虧缺者有因積欠難催恐干督責揑報新借以淹舊欠者凡此皆宜嚴懲但操之過促恐劣員怙過飾非徒有追呼之擾究無完補之益而人情急則無賴更或别啓釁端已令藩司責成各府確查妥辦臣仍不時體察如玩徇料理不清者知府一併嚴參得旨嘉奬十月署江西巡撫十一月即命調補時上猶縣逆犯何亞四等就獲鄂容安按擬如律因親往勘地勢奏請移千總一駐上信地於營前城防兵內撥十五名鎮標二十五名往駐下信地亦於附近别營撥兵十名駐守營前留把總一兵三十名聨絡聲勢改浮龍司巡檢為上猶縣縣丞仍駐營前龍泉縣禾源司巡檢改駐龍猶接壤之左安村崇義縣上堡司巡檢改駐金坑下部議行十八年正月諭署兩江總督印務即在江西辦理九月奉旨實授十一月會同欽差侍郎嵇璜德爾敏查勘髙家堰堤工並赴下河一帶籌辦疏濬事宜十九年正月奏言江南地廣事繁胥役最多作弊臣遵旨於勘災途次留心察訪查得淮安等府屬有藉賑弊混得贓分肥者蘇州等府屬有收漕舞弊婪贓者徐州府屬有差辦工料滋弊者但作弊雖出於胥役而州縣豈皆聾聵除將各犯嚴拿審擬如本官於中染指及知情故縱者嚴參治罪即失察亦分别辦理示警至胥役原有經制名數酌設副役并載入册乃江浙胥役非冒缺頂補即永逺充辦一役在册外有無名白役數名至十數名者倚官作威因公訛詐大為吏治民生之纍現飭各屬稽查務符定額嚴禁頂補朋充俾易約束得旨嘉奬先是刑部覆準廣西等省先後條奏印官公出令佐雜相驗命案一事經江西按察使范廷楷疏請仍令鄰邑印官驗報不得濫委佐雜得旨交鄂容安酌行至是覆奏言命案惟兩邑相距窵逺印官公出而鄰邑印官正值乏員方許佐雜往驗立單仍由印官覆核毫無疑竇始填圖通報並將因事公出及尸所距鄰邑若干里各緣由聲明倘佐雜相驗不實印官扶同填報一并嚴參詔如所議行三月奏沿海塘工前經撫臣莊有恭查勘估辦俱妥惟林家嘴頂衝應於堤後幫寬培厚以資捍禦又寶山縣舊城灣月堤張家濱抄塘及劉河七浦二河原閘座俱應修築報聞四月加太子少傅時部議刪除武職空銜將江南省五逰擊缺改都司行令酌議何營應改鄂容安奏言蘇鎮右營遊擊所管汛有守偹分防改設都司足資辦理狼鎮左營遊擊兼轄城池關廂水路改設都司儘堪彈壓夀鎮左營逰擊較簡於駐防宿州之守備今將遊擊酌改都司駐宿州即以宿州守備移駐夀州廣德營逰擊兵少事簡漕標左營逰擊僅司催漕俱可酌改都司部議從之八月上以杜爾伯特台吉䇿凌輝特台吉阿睦爾撒納等先後來降諭曰年來凖噶爾內亂頻仍人心離散屢有大隊輸誠內嚮正可乘機辦理永敉邉境鄂容安年力壯盛勇敢有為一切緊要機宜尚能曉暢著速赴行在面聆指授赴軍營辦事十二月授西路參贊大臣與總督劉統勳籌辦糧馬二十年正月定邉右副將軍薩喇勒領哨探兵由西路進𠞰命鄂容安同進二月諭曰漢時西陲塞地極廣烏魯木齊及回子諸部落皆曽屯戍有為內屬者唐初都護開府擴地及西北邉今遺址久湮著傳諭鄂容安此次進兵凡凖噶爾所屬之地回子部落內有與漢唐史傳相合可援據者並漢唐所未至處一一詢之土人細為記載以資採輯四月同薩喇勒奏臣等沿途招降各部人衆並遣侍衛塔竒圖等齎檄往諭達瓦齊降奬賜荷包鼻煙壺五月大軍定伊犂諭曰凖噶爾平定兩路將軍大臣等朕俱已加恩鄂容安在參贊大臣任內行走亦應加恩但伊從前有凖噶爾不宜辦理之議伊父鄂爾泰與大逆胡中藻師生交結伊兄鄂昌又與胡中藻附和黨同鄂容安明知其事不為陳奏有負朕恩伊若不前往軍營原欲從重治罪今因此次行走免其治罪即係朕恩可傳諭鄂容安知之是月大軍渡伊犁河直抵達瓦齊所居之格登達瓦齊遁鄂容安偕喀爾喀郡王品級青滚雜卜等收其遊牧獲達瓦齊之叔及其孥並喇嘛六千餘六月達瓦齊就擒鄂容安同班第駐守伊犂時阿睦爾撒納為定邉左副將軍蓄異志謀據伊犂鄂容安同班第密疏劾之諭趣阿睦爾撒納赴覲熱河命鄂容安與薩喇勒以兵至塔爾巴哈台相機擒治會阿睦爾撒納行至烏隆古叛逆黨應之台站斷鄂容安同班第被陷力戰自盡都統䇿楞以狀聞上軫悼即令其次子鄂津襲襄勤伯爵二十一年柩至京上親臨奠醊入祀昭忠祠賜祭葬如例諡剛烈特建雙烈祠御製詩旌之並諭馘逆黨阿巴噶斯克什木耳於柩前祭奠並詳見班第傳二十六年命圖形紫光閣御製贊曰世臣知書料善論兵惜弗通語遂弗燭情變起倉卒力戰命畢用違其材實豫之失三十七年鄂津在伊犂領隊大臣任內以私派隨人種地革職其世爵以鄂容安長子鄂嶽襲現任散秩大臣常祿保常祿保滿洲鑲藍旗人姓赫舍哩雍正十三年由間散襲其逺祖德祿軍功所給騎都尉世職乾隆十八年授三等侍衛二十七年授直隸居庸路營都司三十一年調正定鎮王家坪都司三十五年遷四川提標左營逰擊三十六年從征金川三十七年遷成都城守營參將隨副都統海蘭察等進攻得拉密色欽山梁賊潛伏密林內常祿保往來衝擊之十月隨定邉將軍溫福等攻明郭宗附近山梁議敘功加一等紀録五次十一月大兵進攻路頂宗之喀木色爾寨常祿保隨海蘭察由山南大澗潛越山頂克之殱賊無算復進取博爾根山仰攻克木城受石傷溫福等上其功得旨賞戴孔雀翎三十八年六月隨副都統阿爾素納等分路進攻昔嶺大碉賊百餘從傍衝拒常祿保督兵橫擊敗之七月駐日隆要隘三十九年二月授甘肅河州副將三月定西將軍阿桂等攻克羅博瓦常祿保駐防山巔賊九百餘乘雪夜分兩隊潛劫常祿保營四面環攻勢甚逼常祿保箭射鎗刺督兵力戰禦之被鎗石傷賊竄入卡內者皆殱之副都統烏什哈達等先後援至常祿保勇氣倍增率陜甘官兵內外夾攻賊敗竄諭曰此次賊衆潛來劫營經官兵奮勇合擊痛加殱戮甚屬可嘉常祿保功績尤為出衆著賞給西爾努恩巴圖魯名號賞銀一百兩並著以總兵升用遇有缺出即行補授尋授廣東髙亷鎮總兵四十年七月分攻災則大海各碉賊掘壕排松簽鹿角偹禦甚嚴常祿保分兵出賊後併力合攻各碉卡同時克復偕總兵官達色秉勢合攻雅木則碉克之九月大兵由達烏達圍繞道分七路進攻達思里噶拉宇山梁常祿保率兵各路接應攻獲碉卡甚衆十一月大兵分五路仰攻科布曲山梁賊死拒鎗石交下常祿保被傷猶力戰歿於陳事聞賜祭葬如例命圖形紫光閣儒臣擬贊曰雪夜賊來犯羅博瓦悉力殱擊傷因兵寡災則大海賊後繞攻捐軀科布敢戰名雄尋恩廕其子瑚松阿為都司襲騎都尉世職欽定八旗通志卷一百八十二
