body:
  text: 選舉志八八旗科第題名七厯科武舉一康熙五十年辛卯科漢軍唐蕃祚唐則堯佐領張振武張振興佐領戴爾圖尚玉桓佐領李書包衣劉邦傑佐領以上鑲黃旗四名董元鎮李鑰佐領祖廷柱馬世英佐領王鈺包衣董育麟佐領以上正黃旗三名遲維墀石文賢佐領康華齡康宏義佐領高其道劉成謨佐領蔡永銓蔡瑜佐領楊世臣鄭汝林佐領王宏謨沈熊曜佐領李申金琦佐領鮑宏勳石如璧佐領李師賢卞永譽佐領崔俊崔堯臣佐領胡元龍鄭汝林佐領十一名以上正白旗朱倫瀚吳瑛佐領教允文鍾世臣佐領蔣肇基吳成龍佐領李振元包衣五哥佐領名以上正紅旗四趙世忠雷世俊佐領安俊李建勳佐領崔裕崔澄佐領何宏坦李宏佐領田五玉花色佐領朱華崔澄佐領旗六名以上鑲白蔡璋王紹瑞佐領吕國佐高宏棨佐領黃廷鋐吳淇佐領姚應豸高宏棨佐領陳文英郭朝正佐領五名以上鑲紅旗徐湛恩佛保佐領韓壇范宏林佐領田世貴李淑炳佐領三名以上正藍旗韓奭韓爽佐領徐士璜高傑佐領朱國桓朱國楷佐領金悟禮速赫佐領旗四名以上鑲藍康熙五十二年癸巳科漢軍艾質素祖良卿佐領高欽高銓佐領陳世璋楊繼勳佐領以上鑲黃旗三名耿宏道耿化祚佐領耿寅祚耿化祚佐領耿太張本琪佐領賈國炳趙襄佐領連凱李鉞佐領竒格包衣張鼎鼐佐領孫濂包衣青海佐領名以上正黃旗七王明李維新佐領馮孝崔希堯佐領羅萬育石如壁佐領馬鳴輅李維新佐領滕兆桓祖秉衡佐領張玉衡張素信佐領馬天裕金珩佐領李鐸石顯爵佐領李潮包衣李鍈貴佐領以上正白旗九名塞都劉恩儀佐領吳景昌張廷枚佐領二名以上正紅旗陳瓚蕭永藻佐領白宏文馮國相佐領郭允泰朱廷桂佐領沈竹馮國相佐領李友蘭馮國相佐領李維包衣雷世俊佐領張昌齡包衣雷世俊佐領偏武包衣雷世俊佐領王福昌包衣李建勳佐領以上鑲白旗九名佟泌年倭習禮佐領王士倬高宏棨佐領王曰鈵倭習禮佐領朱秉公包衣他孫佐領名以上鑲紅旗四李葉李淑德佐領劉宏綸佛保佐領旗二名以上正藍七十速翮佐領李育煦金以坦佐領朱國極朱國楷佐領梁光烋陳國傑佐領四名以上鑲藍旗康熙五十三年甲午科漢軍李國瑞李仙培佐領戴昌國南玉桓佐領尹君慶包衣敖爾宏佐領以上鑲黃旗三名李生芳趙國琦佐領朱允賢楊茂榮佐領趙士英耿景佐領耿易直耿景佐領連廷錫李鉞佐領王錫包衣董育麟佐領以上正黃旗六名孫國璽宜廷文佐領吳秉忠錫達禮佐領馮瑞芝觀音保佐領竇啓瑛觀音保佐領常遵訓朝秉彛佐領馬遵義崔希堯佐領六名以上正白旗余天相韓錦佐領王持衡韓錦佐領孫紹昌張廷枚佐領王宏祚包衣王宏臣佐領梁永標包衣金齊佐領名以上正紅旗五田藍玉花色佐領萬國俊花色佐領白煥樞王殿元佐領孫鎪王殿元佐領四名以上鑲白旗葉衍秩尤文佐領張文治包衣托里佐領滿雲鵲包衣郎他佐領王廷柱包衣郎他佐領朱秉直包衣郎他佐領名以上鑲紅旗五佟廷棟佟世仁佐領徐國璸佛保佐領梁鴻文佟世祺佐領佟鏞二哥佐領佟時蔭佟賦仁佐領賈國棟周炎佐領李治邦李襲貴佐領佟時芳佟賦仁佐領八名以上正藍旗金圮速翮佐領周維鼎高即佐領沐鼎清朱國極佐領徐士琳高捷佐領王汝楫栁滋洪佐領五名以上鑲藍旗康熙五十六年丁酉科漢軍戴經國尚玉桓佐領劉棨靳治豫佐領高鈺高銓佐領陳世瑛楊繼勳佐領楊國昌劉邦俊佐領劉起鵬洪奕沔佐領羅詩三包衣許嘉謨佐領石載包衣發拉薩佐領七十一包衣佛倫佐領名以上鑲黃旗九李寶德李景綱佐領孟祐楊茂榮佐領祖彩馬謙佐領張燦馬謙佐領李超李士鸞佐領五名以上正黃旗徐時春張素信佐領吳姬懋錫達禮佐領梁五格王夢熊佐領宋師原何天樞佐領卞之錡金珩佐領劉廷璋金珩佐領藺桂夏長瀛佐領蔡璠蔡瑜佐領何思義祖秉衡佐領曹焜祖秉衡佐領武格包衣那爾布佐領玉柱包衣李鍈佐領二名以上正白旗十納錫圖包衣王宏祚佐領辛雲涵包衣金齊佐領名以上正紅旗二張士適硯臺佐領高標王殿元佐領二名以上鑲白旗紀絢紀大禮佐領張振祖郎應星佐領姚宗文高宏棨佐領三名以上鑲紅旗佟時芝佟賦仁佐領徐珍改名瑛佟鑑佐領以上正藍旗二名朱國棨朱國極佐領李維霖徐士潢佐領吕維煥金以坦佐領三名以上鑲藍旗康熙五十九年庚子科漢軍孫綱崔宏義佐領張維坦高文涵佐領陸通馬世俊佐領盧燽盧承例佐領鄧懋和包衣董殿邦佐領羅朝貴包衣許嘉謨佐領六十五包衣哈達佐領寶柱包衣三哥管領名以上鑲黃旗八柏夀年柏天祐佐領楊芝梁榮世祚佐領袁朝柱李大均佐領張繹張本堪佐領耿鵬祚耿允良佐領三查哈包衣噶逺渾佐領二格包衣董育麟佐領永年包衣董育麟佐領金大鵬包衣尚志舜佐領永嵗包衣董育麟佐領以上正黃旗十名遲維壘石文賢佐領楊普包衣謝厄佐領楊晉包衣謝厄佐領張晟包衣李鍈佐領名以上正白旗四朱倫漪吳傑佐領徐化包衣馬連佐領名以上正紅旗二雷志發硯臺佐領范宏宣崔澄佐領張尚德王殿元佐領吳宗鄭聶維藩佐領鄭之輝包衣雷世俊佐領以上鑲白旗五名李文炳白起佐領張人傑孫鎬佐領旗二名以上鑲紅常綋李繩宗佐領佟廷梁七復佐領徐大經李元亮佐領榮績宏榮世祚佐領李永裕李淑德佐領徐國玘李元亮佐領六名以上正藍旗朱國林朱國極佐領李育煦金以坦佐領徐鋐徐士璜佐領三名以上鑲藍旗雍正元年癸卯科滿洲科升連夀佐領和明聖安佐領伸布敦達禮佐領林棟王仕佐領旗四名以上鑲黃德昌鳴岐佐領伯惠包衣和尚佐領尚保包衣沈瑜佐領名以上正黃旗三查勒扈渾泰佐領都爾科關住佐白領二名以上正旗薩音達禮田保佐領山圖唐凱佐領舒景傅赫德佐領白齊納馬拉佐傾旗四名以上正紅海倫梅夀佐領希桑阿鄂爾和善佐領殷德布寧圖佐領覺羅金泰覺羅納海佐領彤弓納其哈佐領五名以上鑲白旗余國棟王紹瑞佐領鑲紅旗一名闋泰伊唐阿佐領永柱孟蘭保佐領福寧阿善拜佐領旗三名以上正藍李克宏包衣花色佐領鑲藍旗一名蒙古烏麗珠占百臘佐領鑲黃旗一名漢軍王廷俊高文涵佐領管惟忠管承澤佐領王謙胡世勳佐領三名以上鑲黃旗柏宏道柏之蕃佐領王化深李士鸞佐領盛國璋李繩武佐領楊芝珽榮世祚佐領張國勳祖維新佐領佟玉儒李􅉼德佐領李叢生趙襄佐領旗七名以上正黃夏之璜夏長瀛佐領吳姬漢石文耀佐領沈之經沈熊俊佐領王則沛夏長瀛佐領名以上正白旗四周愷孫元士佐領王文敏吳如納佐領二名以上正紅旗孫鍠王殿元佐領徐麟昭孔育彥佐領李蕃高尚璋佐領三名以上鑲白旗李文炘趙世綸佐領徐璞趙士綸佐領王照柯明德佐領王景運郎應星佐領四名以上鑲紅旗姚國相張元興佐領王化興朱暄佐領李森李良輔佐領丁劒周炎佐領陳櫑李淑炳佐領朱鑣佟世豫佐領六名以上正藍旗陳國倬陳國傑佐領張偉李楠佐領李宸金以坦佐領胡天爵朱炯佐領李賓金以坦佐領朱炳朱炯佐領馬瑞圖朱炯佐領旗七名以上鑲藍雍正二年甲辰科滿洲鍾善浙爾進佐領安岱包衣噶達宏佐領以上鑲黃旗二名寬福馬爾薩佐領陶敏薩爾懴佐領達翎阿烏爾薩佐領薩哈布雅圖佐領五哥賁代佐領六格包衣沈瑜佐領禪布包衣沈瑜佐領存柱包衣本岱佐領福格包衣沈瑜佐領王永瑞包衣沈瑜佐領名以上正黃旗十夀長永德佐領福寶特痕佐領永成鄂單佐領卓林艾忠佐領胡西圖蘇章阿佐領吳格渾泰佐領武爾敦關住佐領張昻包衣朱成額佐領張昺包衣朱成佐領楊曾儒包衣杭洲佐領名以上正白旗十七達子韓世滋佐領正紅旗一名白哥富兒戶佐領張昌祀包衣雷順佐領名以上鑲白旗二四達厄滿佐領名鑲紅旗一鎖住包衣五十七佐領正藍旗一名達三滿達佐領來斯哈索珠佐領索住包衣華善佐領得楞阿包衣華善佐領名以上鑲藍旗四漢軍祖廷杲馬謙佐領鄭端光國佐領鄭昻閻光國佐領三名以上正黃旗蕭鳯翥王夢熊佐領蕭鳯翔王夢熊佐領劉廷璧金珩佐領柏彬柏之蕃佐領李泰何天樞佐領張本阿藍佐領嶽岱祖秉衡佐領七名以上正白旗臧應詔臧亮祖佐領羅廷選汪枚佐領張良弼薑永夀佐領五哥韓世滋佐領葛綸薑永夀佐領五名以上正紅旗王鏞王殿元佐領孫鍾王殿元佐領苗國琮白鈺佐領張琳包衣艾納佐領許志良包衣雷焞佐領名以上鑲白旗五王士倫高煥佐領鄭炯郎應星佐領二名以上鑲紅旗徐國璧李元亮佐領徐永春李元亮佐領佟鋡二哥佐領趙斌佟鐸佐領劉明包衣永夀佐領名以上正藍旗五金銓金以坦佐領寇寧曲弼佐領旗二名以上鑲藍雍正四年丙午科滿洲常英穆森佐領德宗額存柱佐領金保住普慶佐領金瑋金璜佐領通夀馬金泰佐領五名以上鑲黃旗巴爾善施得庫佐領永泰雙科佐領歪德六十一佐領色恆格蘇宏佐領永泰包衣常保佐領名以上正黃旗五遇道車爾圖佐領滿蒼英德佐領布爾泰馬爾遜佐領永德包衣諾蘇懇佐領王琮包衣朱成厄佐領以上正白旗五名李掄元包衣勾勒佐一領以上正紅旗名高華傅爾户佐領觀音保馬爾泰佐領九哥馬爾泰佐領瑚寶額爾成格佐領齊格改名元凱保住佐領以上鑲白旗五名胡長生包衣立柱佐領鑲藍旗一名蒙古索諾木查錫額爾登格佐領正白旗一名漢軍林標慶恆佐領馬施泰摩倫代佐領吳聖培祖應樞佐領劉洪儀靳治豫佐領法保洪德標佐領馮天祥高文涵佐領李四達子改名李士達張淑泰佐領袁朝梁商林芳佐領談五哥包衣曹頎佐領名以上鑲黃旗九李文松李士鸞佐領祖廷謨馬謙佐領鄒贊聖李景剛佐領王嵩年劉鍈佐領羅賡泰商林芳佐領保住包衣伊蘭泰佐領三哥包衣茍色佐領德福包衣茍色佐領王國興包衣沈喻佐領九格包衣沈喻佐領儍子改名張璟包衣萬住佐領以上正黃旗十一名宋友景何天樞佐領徐芳沈之仁佐領李炘金珩佐領黃甲遴朱之璉佐領倪世泰馬應祥佐領石宏琦馬應祥佐領蕭鳯翺邵瞻奭佐領德夀包衣馬維翰佐領以上正白旗八名黃金相厄勒圖佐領正紅旗一名張聖恩孔傳斌佐領劉淓馬世儒佐領二名以上鑲白旗王鏜吳宗寧佐領鑲紅旗一名陳廷瑛李淑膺佐領徐珖佟鑑佐領韓國鉞范宏林佐領鍾培基李淑忠佐領以上正藍旗四名佛保包衣阿爾發佐領藍藍旗一名雍正七年己酉科滿洲六十寶善佐領山布祿德新佐領查臘分寶吉佐領福祿覺羅諾松佐領色爾特德新佐領張廷翰包衣馬爾秦佐領額爾登布包衣八十佐領李淥包衣劉保柱管領以上鑲黃旗八名鄂金泰七勒渾佐領陸士竒包衣安布禮管領以上正黃旗二名世德陳泰佐領巴凌阿二哥佐領勵柱錫爾哈佐領德克慎艾素佐領速德白海佐領插拉泰芬佐領二格改名王瑞包衣朱成額佐領以上正白旗七名白鳯泰尚鼐佐領名正紅旗一世元馬爾泰佐領伊三泰覺羅六十寶佐領外圖庫宗室圖納佐領石英包衣色勒管領名以上鑲白旗四蒙古特格慎納勒圖佐領正藍旗一名漢軍徐世棟鄧其佐領亢永瑞包衣海六十管領穆克德布包衣馬爾泰佐領吉慶包衣郝爾特管領以上鑲黃旗四名王鎮李洞德佐領許文嵩李佩德佐領佟冕李洞德佐領許文泰李佩德佐領賽爾特包衣伊藍泰管領張四兒改名張照包衣武圖管領至善包衣沈崳佐領德升包衣廣福佐領韓士佐包衣四黑佐領富保包衣沈崳佐領名以上正黃旗十王橒宜廷文佐領