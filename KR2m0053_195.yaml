body:
  text: 欽定四庫全書欽定八旗通志卷一百八十一人物志六十一大臣傳四十七滿洲鑲藍旗四格鄂爾泰滿福額僧邁柱鄂爾泰鄂爾泰滿洲鑲藍旗人姓西林覺羅世居汪欽髙祖屯泰國初率族來歸授佐領曽祖圗捫天聰五年從征明大凌河力戰陳歿授騎都尉世職雍正三年入祀昭忠祠祖圗彥圖襲世職官户部郎中父鄂拜國子監祭酒鄂爾泰由舉人於康熙四十二年襲佐領授三等侍衛五十五年遷內務府員外郎雍正元年充雲南鄉試副考官特擢江蘇布政使三年八月授廣西巡撫十月命署雲貴總督四年五月貴州狆苖負險肆橫議撫久無成鄂爾泰分三路進𠞰一由谷隆一由焦山一由馬落孔焚其寨七進克長寨羊城􅋭等奏於長寨增駐遊擊又以鎮逺土府刀瀚霑益土州安于蕃凶詐計擒之者樂甸土司刁聨斗乞免死歸流奏給職銜示鼓勵尋奏狆苗及川販窩黨悉就擒上嘉其成功速優敘加三級又奏經理狆苖事宜十條一未獲犯中脅從者自首槩寬免一苖民失耕種期免本年正賦一歸寨者月給米鹽撫恤並給籽種逾一月未歸田土賞兵一苗多占地仇殺令契開明界址官給印信承業一同名各照祖姓造册不知本姓者為立姓一軍器悉繳隱匿及私造處決一兵不得欺凌官不約束嚴參一移貴陽府同知駐長寨化導一移長寨把總駐打壤寨控制一員辨聞劫掠即拏一面申報獲犯會審毋袒徇部議從之十月實授總督先是四川烏蒙土司祿萬鍾擾東川府與滇接鄂爾泰奏改東川𨽻滇從之命會同川督嶽鍾琪辦理烏蒙事嗣招其魁祿鼎坤為土守備萬鍾不就撫至是檄總兵劉起元整兵直入各寨投誠萬鍾遁鎮雄五年正月潛投四川被獲解鍾琪軍前其黨鎮雄土司隴慶侯亦赴川繳印獻土敘功加二級特旨給騎都尉世職三月鎮沅猓賊戕官焚掠𠞰平之獲賊首刁如珍等又廣西土府岑映宸淫虐鄂爾泰曾奏敕懲治上命廣西巡撫韓良輔赴滇面議用兵鄂爾泰以滇粵相距逺貴州安籠與泗城接即親往商六月映宸惶懼乞改流存祀奏革世職免罪安置浙江原籍給其弟映翰頂帶奉其祖岑繼祿祀七月同楚省會𠞰謬沖花苖擒其渠餘衆歸順九月擒威逺猓賊扎鐵匠降新平野賊李百疊等議敘加三級十一月招撫長寨後路生苗百八十四寨編户口定額賦得旨嘉奬加授一等輕車都尉十二月攻破雲南猓賊窩泥種其六茶山地千餘里劃界建城設員辨議敘加二級先是前任雲貴總督髙其倬查奏安南國界有內地舊境百二十里應清理於賭呪河立界國王黎維祹奏辨復命鄂爾泰清查給與八十里於鉛厰山下小河以內四十里立界頒敕曉諭至是六年正月國王具表謝鄂爾泰以聞上嘉其知禮仍賞給地四十里又奏烏蒙設鎮駐總兵改貴州威寧鎮為營置參將與鎮雄東川二營歸統轄並烏蒙設府治改鎮雄為州隸之俱議行三月𠞰擒東川謀逆之法戞伙目祿天佑則補營長祿世豪等又米貼土目祿永孝緣罪斬候妻陸氏勾猓玀反調總兵張耀祖等攻門坎山所向皆克擒陸氏米貼平時廣西㺜顔光色等不法提督田畯不能勦鄂爾泰調兵至賊殺光色等降特命總督雲貴廣西三省事務七年正月雲南卿雲見由一等輕車都尉加授三等男三月疏奏貴州丹江雞講生苖向不服化前檄按察使張廣泗相機勦撫今攻克各寨苗衆投誠其上下九股及清水江古州等處以次寧帖敘功加二級九月奏乞銷去苖疆議敘賞給曾祖圗捫封典俾昭忠祠牌位改書贈官允之其苖疆功仍議敘尋加少保十二月奏新闢苖疆立營設官事宜一八寨距都勻府九十里地方遼濶改都勻營為協設副將駐劄一丹江逼凱里素為生苖盤據增丹江營設參將一九股尤強悍移黃施營逰擊駐施秉舊縣一清水河有南北兩岸居中增清江協設副將一鎮逺協原防清水江生苖今改為營設參將歸清江協一天柱營近生苖向設參將今既分設營汛改為都司一古州為都勻黎平要隘設古州鎮駐總兵改黎平協為營聽統轄一營汛既定設文員分駐增都勻府同知一駐八寨通判一駐丹江鎮逺府同知一駐清江黎平府同知一駐古州俱加理苖字樣一所設同知通判於各駐官兵內各撥把總兵丁為親標護衛一施秉舊縣添設施秉縣縣丞分駐從之八年八月烏蒙猓賊結涼山等蠻反總兵劉起元被害祿鼎坤侄萬福與賊合鄂爾泰飭諸將進討參將韓勳大敗賊於奎鄉總兵哈元生復烏蒙同攻克大關與川兵會十二月擒萬福渠凶盡獲奏入諭曰烏蒙改設府治之初諸事尚未就緒又值劉起元不善撫馭激成事端逆黨勾連幾有猝難收拾之勢而將辨軍士奮勇爭先旬月間削平寇亂此皆鄂爾泰平時節制封疆以公忠表率官僚以義勇訓練將士而臨機應敵又復調度有方用能迅奏膚功永安苖境論功行賞當以鄂爾泰為先但念該督自聞賊變以來時時以先事疏防引過自責今軍事告竣不肯自居蕩冦之功屢次陳奏情詞懇切朕曲從其請以成其謙抑之素志九年六月疏奏烏蒙善後事宜烏蒙鎮舊設中左右三營請增設前營四營各遊擊一守備一千總二把總四中營駐府城左營駐大關右營駐永善前營駐涼山鎮雄東川二營俱增設守備一分左右軍左軍守備各駐府州城鎮雄右軍守備駐奎鄉東川右軍守備駐阿白溪又改威寧營為協設副將仍歸烏蒙鎮轄尋甸州增竒兵營設參將歸督標轄從之尋奏全滇水利事宜一濬嵩明州之楊林海周圍草塘可開墾一宜良縣開河五其四灌田惟江頭村舊河形高自胡家營北另開一道資灌溉一尋甸州尋川河有石難疏另濬沙河十五里一東川府城北漫海地肥水消令民承墾一浪穹縣羽河等處加修堤工一臨安等處修築工程暨通粵河道嵩明州河口俱查勘以時興工下部議行十年正月陛見二月授保和殿大學士兼兵部尚書辦理軍機事務諭曰大學士鄂爾泰節制雲貴廣西三省厯有嵗年于所屬苗疆悉心經理使蠻夷慕義向風咸登樂土至于古州等處生苖自昔未歸王化鄂爾泰運籌調度勦撫兼施俾苖人懷德畏威抒誠內嚮疆圉開拓邉境輯寧數年以來功績實非尋常可比鄂爾泰著授一等伯爵世襲罔替四月諭曰朕與鄂爾泰面加商酌新疆遼濶兼有內地舊汛非古州一鎮所能統轄都江清水二江地界形勢兩路劃然牽合歸一終難控禦而古州鎮處都江適中清江協處清江適中遙對雄峙各踞要區若于清江協裁去副將改設一鎮將新疆之丹江營與內地之銅仁鎮逺黃施天柱石阡平越等協營俱歸管轄其餘都勻協黎平營並新設之上江下江諸協營俱𨽻古州鎮轄則數千里苖疆可無鞭長不及之慮更屬妥協著將清江協改鎮時大軍勦凖噶爾七月命督巡陜甘經略軍務九月奏報我兵敗北路賊於額爾得尼昭賊遁必由畢濟一路中有衮塔馬哈戈壁係要隘咨行署寧逺大將軍張廣泗選將辨堵截並令廣泗繼進以壯勢援得旨嘉奬又奏屯田事宜一總理屯田大員頒給關防一客民首報地畝分别給工價其夫役等工價口糧外加賞衣帽銀一夫役在甘涼肅雇募地方官出結免逃逸沿途給口食並築土堡容居一屯田諸務令所在有司協理一各項支用銀令總理屯田大臣奏報在軍需銀內支者另行報銷十一年五月奏言明嵗大兵前進阿勒台應先將特斯台錫里二處所駐兵今秋移至科布多水草佳處并于扎卜堪察罕鄂羅木築堡守視臺站運路又于塔本托羅海額克阿喇勒默爾根西納所在各駐兵四千俟進勦時即前至科布多候調遣俱從之六月還京命仍兼兵部事十月充八旗通志館總裁兼署吏部十二年二月參奏兵部堂司造册濛混冒銷馹站錢糧上以實心任事議敘加一級七月署鑲黃旗滿洲都統十三年正月充皇清文穎館總裁五月台拱逆苖叛鄂爾泰自以從前籌畫未周請罪並陳疾乞賜罷斥削伯爵暫假調理得旨卿才品優長忠誠任事厯經簡用未負朕恩今以抱病虛羸懇請罷斥情詞皆實著解大學士之任削去伯爵俾得悉心調攝至於古州苖疆從前石禮哈等皆曾奏請用兵朕悉未允行及鄂爾泰為滇黔總督以此事必應舉行剴切陳奏朕以鄂爾泰居心誠直識見明達况親在地方悉心籌畫必有成算始允所請命其慎重辦理彼時苖民相率向化成功迅速朕心甚悅特錫伯爵以奬勳庸乃平定未久苗即數次蠢動近則直入內地煽惑熟苖焚劫黃平一帶郡邑居民受其擾害朕詢問情由鄂爾泰亦以出於意外為詞是從前經理之時本無定見布置未協所致則朕一時之輕率誤信亦無以自解國家錫命之恩有功則受無功則辭乃古今之通義今鄂爾泰請削伯爵於情理相合朕鑒其悃誠而俞允之並將前後情事宣諭中外以示吾君臣公而無私過而不飾之意尋命仍留三等男爵八月今上御極命同莊親王允祿果親王允禮及大學士張廷玉總理事務十二月詔授一等輕車都尉併前男爵為一等子乾隆元年二月充會試正考官七月充三禮義疏總裁二年五月充農書館總裁八月命查勘直𨽻河道九月奏言永定河上遊無分泄下遊不得暢達以致為患請於半截河堤北開新河即以北堤為南堤沿之東下入六道口經三角淀北至青沽西入大河更作泄潮埝數段俾沙停埝外水歸河中則下口無阻冉於上遊河身自半截河以上挑濬深通南北岸分建滚水石壩四各開引河一合清隔濁補救無難又言千里長堤為數十州縣保障𨽻霸州保定文安大城境者最險要今年風浪摧壞擬於淀河出口處至陶家營築培堤工照底濶頂突法修成坦坡形龍堂灣轉角處補築月堤以資重障疏大堤對岸支河淤淺禁攔河疊道俾得暢達又言靜海縣北之獨流內受淀水外當河道亦最險處請於東岸建滚水壩開引河注之中塘窪疏通下口逹海建閘防潮下王大臣等議行十一月命為軍機大臣兼領侍衛內大臣十二月以總理事務議敘由一等子加授騎都尉併為三等伯賜號襄勤三年兼議政大臣四年二月充經筵講官先是南河河道總督髙斌請開新運口論者以為不便至是上命鄂爾泰閲視四月奏言漕河運口因時制宜屢經改易今所建新口離黃稍逺可避倒灌不無小效臣愚以為可用惟挑水壩稍短應冉築長壩寬圍過水口如磨盤墩式俾外逼大溜抵黃內引回流入運其新運口內頭二三壩向東轉北即天妃閘舊運河路自三壩向東南灣轉而北過越閘即河臣擬改新運河路舊河直捷新河紆曲為漕運計應行舊河今新建閘壩俱未開仍取道天妃閘既屬便利永宜遵行又言陶莊引河長而稍曲旋開旋淤案引河法宜徑直乃能迅駛刷沙並須頭迎溜尾順溜放水及時臣擬定河頭於舊之東迎溜處東北直下四百六十餘丈尾對惠濟閘仍係順溜俟大溜盛時開放冉於對岸上流二壩三壩間接築挑水大壩令黃水全勢趨北倒灌之虞可免得旨如所請行又言湖河機要三事一天然二壩不宜開免湖水全泄並興化鹽城等縣水患一毛城鋪壩已經變遷宜酌復河臣靳輔舊規一治法莫善於挑引河取直兼放淤培岸省掃壩費下大學士九卿議從之時河東總河白鍾山奏請復漳河故道諭鄂爾泰於歸途勘奏尋奏言漳河故道有二由山東邱縣城西者舊迹全湮難以開通由城東者疏浚較易應自和爾寨村東承漳河北折之勢接開十餘里至漳洞村入舊河即於新河頭下東流入衛處建閘衛水弱啓以濟運足用則閉冉於青縣下另建閘壩酌水勢分泄以保萬全從之五月加太保七年三月充玉牒館總裁十二月副都御史仲永檀以密奏留中事泄于鄂容安命王大臣鞫實請將鄂爾泰革職拿問諭曰仲永檀如此不端之人鄂爾泰于朕前屢奏其端正黨庇顯然久在朕洞鑒中若欲將伊革職拿問則已於前日降旨何待爾等今日之奏請蓋以鄂爾泰乃皇考遺留之大臣於政務尚為諳練若以此事深究不但罪名重大承受不起而國家少一能辦事之大員為可惜耳但其不擇門生之賢否不訓伊子以謹飭朕亦不能為屢寬也鄂爾泰著交部議處以示薄罰尋議降二級調用奉旨抵銷留任八年管翰林院掌院事十年正月以疾請解任調理上慰留三月加太傅四月卒遺疏入得旨大學士鄂爾泰公忠體國直諒持公久任邉疆茂著惠績簡預機務思日贊襄才裕經綸學有根柢不愧國家之柱石允為文武之儀型嚮用方殷倚毗正切昨冬忽嬰痰疾朕心厪念選醫調治存問日頒今春病勢有加朕往看視加銜太傅兾其獲痊不意竟至不起朕心深為震悼親臨祭奠輟朝二日披覽遺疏具見忠君愛國之悃忱尢為追念不置昔皇考有配享太廟遺詔著該部遵奉舉行並入賢良祠加祭二次尋豫祭葬諡文端二十年甘肅巡撫鄂昌與詩詞悖逆之胡中藻倡和事覺革職治罪諭曰胡中藻係鄂爾泰門生且與其侄鄂昌敘門誼則鄂爾泰從前標榜之私適以釀成惡逆其詩中讒舌青蠅供指張廷玉張照二人即張廷玉之用人亦未必不以鄂爾泰胡中藻為匪類也鄂爾泰張廷玉亦因遇皇考及朕之君不能大有為耳不然何事不可為哉使鄂爾泰尚在必將重治其罪為大臣植黨者戒著撤出賢良祠四十四年御製懷舊詩列諸五閣臣中詩曰業師祗三人其三情向剖皇考重英賢率命書房走鄂蔣以閣臣蔡法列卿九胡顧劉梁任邵戴來先後其時學亦成云師而實友不足當絳帷姓名兹舉偶鄂其中巨擘內外勤宣久初政命總理顧問備左右具瞻鎮百僚將美惠九有好惡略失尚性陽隂則否遵詔命配享旌善垂不朽鄂爾泰弟鄂爾竒康熙五十一年進士改庶吉士散館授編修雍正元年三月充山西鄉試副考官六月遷侍讀七月擢詹事府詹事四年五月署國子監祭酒九月授工部侍郎五年教習庶吉士六年調禮部七年充順天鄉試正考官八年充會試副考官尋命總理國子監事署兵部侍郎九年升户部尚書兼管步軍統領十年充翻譯鄉試正考官十一年九月直𨽻總督李衛劾鄂爾竒提拿越控細事濫用部牌庇護私人並壞法營私紊制擾民各欵命革職交王大臣等會鞫得實請加倍治罪得旨鄂爾竒受朕深恩有玷職守大負伊兄鄂爾泰教訓理宜從重治罪朕念鄂爾泰禆益國家政務甚多以之相抵鄂爾竒加倍治罪之處著從寬免十三年卒鄂爾泰子六鄂容安鄂實鄂弼鄂寧鄂欣鄂謨鄂容安鄂實鄂弼皆自有傳邁柱邁柱滿洲鑲藍旗人姓喜塔臘康熙四十八年三月由筆帖式授國子監助教十二月遷工部主事五十一年十一月遷户部員外郎五十四年四月授監察御史五十五年九月巡視福建鹽課雍正元年巡視寧古塔三年十二月命往湖廣荆州同將軍武納哈籌議以原任將軍阿魯家産抵還扣尅兵丁銀兩事合疏覆奏令荆州就近一百五十里內有窮民情願賣地者官給時價置買或給兵丁耕種或給民種起租遇窮乏兵丁有婚事者給銀十兩喪事給銀二十兩其官員子弟及饒裕兵丁不得濫給以期永逺有益下部議從之三月擢工部右侍郎七月調吏部命往江西審理德安知縣蕭彬武寧知縣廖科齡虧空並清查通省錢糧民欠流抵諸弊尋命署江西巡撫十二月疏請以江西省額徴丁銀照直𨽻等省之例攤入地糧從之五年二月授湖廣總督命料理江西錢糧事務完畢赴任三月奏江西倉穀虧缺其弊有三一在無榖無銀揑報實貯在倉及至交代又揑報發價在民或借領在民俱以素日信用書役人等公具認領新任官按名徴追顆粒俱無一在出糶倉榖得價侵收及至交代槩以二錢一石折算交出接任者因不敷買補以致倉貯久懸一在虧空報完以銀二百兩抵榖一千石因價不敷積久不能買補併價亦侵用又揑稱民欠多方掩飾皆由前任巡撫裴􅏍度布政使陳安䇿張楷徇庇所致請察究追完詔革裴􅏍度等職質審究追又言江西公用銀兩原係提解官役俸工及節規恐州縣無可養贍或致那墊虧空亟宜裁革但通省需費甚繁惟有比照河南湖廣等省之例提解各州縣耗羡二分以充公用另提解一分五釐及六釐四釐不等斟酌均勻為各員一嵗養亷之資其餘概留州縣自行飬贍則通省之用無虧各員俱有飬亷不至私行派纍至巡撫衙門向有平餘一項為薪水之資今既議裁亦於提解一分五釐耗羡內與司道量行支用又現在被災州縣設厰煮賑米價每石已至一兩三四錢將來勢必愈昂酌定未被災州縣有産米稍多米價略賤者預發價銀委員兮買運發被災州縣貯備俟青黃不接時照原買之賤價平糶則市價自平又安南贑州為閩廣交界之區最易藏姦鄱陽湖岸址渺茫出沒難稽萬載寧州十數處又係聚集棚民流匪素好多事雖時處太平武備不可不講現已嚴整臺汛操演標兵添設藤牌挑刀等械補實空糧以充營伍得旨嘉其條畫詳晰令新任巡撫照行六月疏言南昌前衛饒撫二所屯糧屯丁屬江南之建德東流二縣徴比而督催仍在南昌饒撫三府隔越千里鞭長不及請以此項編徴改𨽻江南池州府掌管下部議行八月審奏虧空知縣蕭彬等俱論斬並請令徇庇之上司分賠一分得旨邁柱身為現任督撫若非秉公持正實能自信無一毫贍顧者不能如此甚屬可嘉交部議敘上司兮賠一分之處從前未曾定例仍照舊完結自雍正六年以後俱照所請永為例部議邁柱加三級十二月赴湖廣總督任六年正月奏堤工八事一每年修堤業户按糧均派有賣富差貧以少派多之弊應確估土方夫數及每糧一石應出夫數造册存案仍出示曉諭使業户悉知以杜浮開濫派之弊一長江大隄漫溢時多應相舊隄之勢無人行走之處修加土一尺人馬往來之地修加土一尺五寸增寬之數亦如之不如式者所司以溺職論一向來修隄諸弊非不嚴禁無如陽奉隂違應令照河工例治罪其包折夫工者照包攬閘夫溜夫之律一名杖枷二名以上附近充軍一護隄插桞以一弓一株為凖連種蘆荻如所司奉行不力以誤工論一州縣雖各有疆界田畝同一隄塍豈分彼此應定例同隄有險無分隔屬水利各官業户協力搶護推諉抗阻者治罪一支河曲港及隄內溝洫應責成水利各官于冬晴水涸時督同業户盡力深濬度其形勢或設木閘或砌瓦筒以時閉泄庶旱潦無虞一隄塍衝潰之處必積浮沙遞加土填根腳難固應刨刷至底然後層土層硪引錐鑽試灌水不漏者方為堅實草率者責令賠修一隄外沙礫不堪取用隄內取土又慮潰溢無常應于農隙時水利及印官率民預為擇地取土酌量壘積險隄髙廣之處無事可作嵗修有險可以搶救亦思患預防之一䇿諭奬辦理允當三月疏報各屬隄塍業户按糧派夫照上年水痕加髙修築支河亦自行挑濬諭曰修築江隄百姓踴躍從事可嘉宜沛特恩賜帑銀六萬兩令邁柱酌量工程多寡分給使小民均沾實惠工程氷逺堅固以副愛養楚民至意四月奏鎮筸凶苗倚恃險阻野性難馴時入內地竊劫害民雖特設重鎮多布汛防必待轉報而後遣兵凶苖已逺揚竄匿難于弋獲臣廣為咨訪聞原任雲南提督張國正先任鎮筸總兵以雕勦之法治苖甚善凡遇失事探實賊蹤為何寨何苗一面飛報一面携兵馳往圍寨搜擒出其不意如雕之捕鳥取其疾速而鳥可必得也諸苖畏憚大斂凶鋒臣今與總兵周一德循行此法但期得獲罪犯而止不敢過為殺戮以廣皇仁得旨據理而論制服凶苖自當如此但情形究難遙度全賴大吏詳審熟籌方收因地制宜之效六月疏請移漢陽府通判駐漢口鎮荆州通判駐沙市又請裁施州大田二衛所併為縣尋定縣名曰恩施九月奏請清查湖北積年舊欠銀二十萬七千餘兩湖南舊欠銀一十一萬餘兩得旨與巡撫馬會伯王國棟一同辦理十一月疏言各州縣起解錢糧例有兩文一批一文投巡撫衙門挂發一文同批投藩司衙門兑收並同錢糧交與解役解役與庫書一氣多有壓匿文批將錢糧不歸藩庫徑交庫書之家折分那用及放債圗利等弊巡撫藩司均難知覺請嗣後起解錢糧令先期三日將現解某項某數錢糧于某日起程緣由具文由鋪遞通報府道督撫各衙門併將某州縣離省路程於文內聲明如逾限不到即嚴行查拿既杜侵盜之弊亦可免中途遲滯疏失之虞下部議通行各直省一體遵行七年三月疏請以湖廣省額徴丁銀攤入田糧其續報勸墾及自首隱匿所報升科俟冉遇編審時攤入從之五月以永順保靖枽植土司改土歸流請于永順設知府府東南西北各設一縣保靖枽植地各設一縣從之尋定新設府曰永順其東南縣曰永順西北縣曰龍山保靖桑植所設縣仍其名七月奏湖南積欠十一萬已完過六萬六千兩湖北積欠二十萬七千已完過八萬四千兩又條奏苖疆事宜一湖南民人往苗土貿易者令將所買何物行户何人運往何處預報明地方官給與印照注明姓名人數知會塘汛驗照放行不得夾帶違禁之物如有官吏兵役借端需索者一併查一究一苗人至民地貿易請于苖疆分界之地設立市場一月以三日為期互相交易不得越界出入仍令各州縣派佐二官監視一苖疆州縣請選擇諸苗悅服之人立為苖長以稽捕緝之事三年無過量為奬賞其有生苖歸化者給以寨長千百户執照三年無過亦豫奬賞造册彚報兵部一請照川省之例于苖疆州縣選安分勇敢之土苖每處用一二十名充當民壯以備差遣訪緝仍行文武互相覺察之法以防勾通推諉等弊俱下部議行八年七月疏言永州府屬之道州寧逺永明江華四州縣與廣西接壤應添設官兵以資防守請改永州府同知為理猺同知移駐江華城中控制上五堡等處管理四州縣苗疆捕務仍于道州江華各設逰擊一員千總一員寧逺永明各設守備一員抽調各標營兵一千五百名每月與廣西桂臨營訂期會哨三次于地方實有禆益下部議從之八月奏沔陽錢糧自康熙五十五年至雍正四年積欠銀八萬九千二百餘兩里民一聞清查爭先完納其實在民欠乞與一年之限分作三次徴收以紓民力有官侵役蝕包攬未完者請暫緩究治一年追完逾限治罪上諭戶部曰朕之清查積欠者原以地方貪官汚吏及不法襟棍借民欠之名恣意侵蝕不得不清釐懲治今果查出沔陽州侵蝕包攬銀三萬餘兩而里民之間有拖欠者因田地近水常有潦溢力量未免不敷並非有意頑抗俟册到日酌量豁免今即停止催徴其侵蝕包攬者照所請辦理九年二月疏言黔苗不靖請停止湖南醴陵桂東等十二州縣礦山開採以絶藏姦又疏言湖南各營兵米例以六錢折給今改設永順三營係新闢苗疆産米既少商販亦稀價值昻貴請自雍正九年為始永順以一兩折給保靖枽植以八錢折給上是其言俱如所請三月邁柱遵旨將沔陽州實在民欠糧銀三萬二千餘兩分晰造册具奏諭曰朕愛養元元時下減賦蠲租之詔每思豁除舊欠則頑戶獨得蒙恩蠲免新糧則善良公同被澤此天下人所共知惟是沔陽民欠與他處不同該州近水常有潦溢之患其未完民欠從寬豁免十年十二月奏給價收繳六里鎮筸土司藏用鳥鎗其木柂機弓各色完整者撥給兵丁充用餘不合式製者改造鋤犁農具賞給力田土苖得耕作之實用至於土苖所用環刀標鎗不宜比戶藏蓄亦令逐漸給價收繳諭曰所奏深得賣刀買犢之意至環刀標鎗亦自應收繳可順其願不宜強迫又疏言收捐貢監榖石原為充裕積貯且備江浙等省緩急撥用現今川米禁販不得到楚江浙等省搬運甚多各省米價日增若本省仍收捐納榖石必甚昻貴請暫行停止從之十二年九月疏言本年楚省大稔前兩年停收捐貢監榖石應仍收捐但椘省向日議捐原以裕常平積貯兼為鄰省緩急之需今鄰省俱嫌倉榖貯久色變自赴産米地方採買不必代為豫備至椘省常平倉貯榖一百十四萬三千餘石又社倉貯榖四十五萬四千餘石現今俱屬充裕鄰省又無赴倉買運若將應行流通之榖多積于不待用之地似非隨時制宜之道况户部暨雲貴廣西甘肅江浙等省皆因軍需海塘急務現有收捐事例更當酌量緩急停止椘省收捐貢監俾願捐者赴户部雲貴等省捐收折色以濟急需上是其言下部議行十三年三月奏準改容美土司地為州其所屬五峰司地設縣治改彝陵州為府尋定新改府曰宜昌附郭縣曰東湖容美所設州曰鶴峯五峯所設縣曰長樂并原立之直𨽻歸州長揚興山巴東皆𨽻焉又于恩施縣建府治曰施南設宣恩來鳯咸豐利川四縣七月疏言前於湖南永定九溪二衛適中之地建設安福縣治人民田賦附近安福者歸安福逺在各屬者撥歸各屬惟二衛撥歸慈利永順二縣所徵屯糧疆界不清民屯參互官民多有未便永定衛四面環山一水四達人民聚居商賈輻輳請於永定衛地添設一縣以原撥永順慈利二縣所轄軍户與慈利縣分出民人并現在改土歸流之茅岡司地計周圍八百餘里建縣治設知縣一員典史訓導各一員下部議從之尋定所設縣曰永定是月諭曰邁柱簡任封疆宣力有年授為大學士來京辦事八月授武英殿大學士兼吏部尚書今上御極命暫管湖廣總督事十一月來京乾隆元年二月兼管工部二年十一月以病罷兼部務尋解任三年正月卒年六十有九賜祭葬如例諡文恭滿福滿福滿洲鑲藍旗人姓瓜勒佳康熙五十二年襲世管佐領雍正五年授三等侍衛署參領乾隆三年授護軍參領七年擢蒙古廂藍旗副都統九年轉護軍統領十三年二月授熱河副都統四月擢古北口提督七月調拉林副都統二十年授都統駐巴里坤諭率吉林兵千馳赴軍營二十二年七月命駐防吐魯畨尋授領隊大臣八月定邉將軍成衮扎布由珠勒都斯一路進𠞰請令滿福以兵三百巡查阿勒輝衮西喇及鳥納哈特十三台站搜勦嗎哈沁允之九月沙拉斯嗎唬斯既降復叛掠台站諭滿福由阿勒輝往𠞰十月偵賊竄呼魯木什烏蘭和屯由巴顔阿璊追緝詔巴里坤辦事大臣阿里衮馳往協勦兵未合滿福遇賊於肯色嶺擊之賊敗走有沙拉斯得木齊敦多克哈什哈嗎唬斯得木齊敦多克車凌者偽遣人乞降且言賊酋已就擒請除道迎滿福信之時我兵僅二百七十餘行次哈喇和落徑險林密下有深溝滿福悟為賊所紿急麾前隊返賊千餘突出林中我兵被圍滿福厲聲大呼力戰被鎗墮溝中死之事聞諭曰滿福雖為賊所愚究屬捐軀盡莭著照陳亡例議恤尋賜祭葬諡毅入祀昭忠祠命圗形紫光閣儒臣擬贊曰言率新附渠酋是擒而何汙祼鼠首狼心遇伏不撓穿齦賊輩眷彼陳雲精英不昧額僧格額僧格滿洲鑲藍旗人西安將軍尼雅哈之孫郎中額爾竒之子康熙五十七年由護軍補護軍校雍正三年襲佐領十年管本旗左司事乾隆元年襲曽祖倭和訥軍功所得雲騎尉三年授副參領九年授山西老營堡參將十四年補撫標中軍恭將十五年遷四川督標中軍副將十八年二月擢山西大同鎮總兵九月勦四川雜谷軍功議敘加一等紀録二次二十年十二月因買補營馬由臺站馳奏得旨朕令陕甘山西各督撫提鎮將買缺額營馬每月奏聞祗欲伊等上緊購辦隨時奏聞非緊急軍務刻不可緩者比原可照例齎奏不必擅動驛馬乃大同鎮總兵額僧格奏買補營馬一摺由臺站馳遞殊屬不知緩急著該部行文各督撫提鎮嗣後此等奏報仍令自行遣人齎奏不得擅由臺站馳遞二十三年四月召見賞戴孔雀翎六月署甘肅提督二十四年十二月因辦解馬匹議敘隨帶軍功加一級二十五年七月署固原提督二十六年二月奏稱陜甘兩省兵有前在軍營暨屯防處隔營挑補因所補糧缺距籍遙逺改補夲營查例載緑營辭退兵內復挑補名糧者即作為新兵所食錢糧年分俱不合算遇升用挑選不準列名臣伏思效力戎行官兵皆蒙皇上軫念無不沛施鴻恩今陜甘兩省出師兵丁隔營挑補者甚多若于改補後作為新兵遇升缺出不準列名挑選從前出力之處俱湮沒甚非皇上軫念戎行之至意仰懇皇上天恩凡軍前效力兵丁如有隔營挑補不能逺離願調夲營者即以夲營兵缺坐補仍將原食錢糧年分效力行走之處造入册內遇有自軍營隔營挑補之兵亦照此辦理得旨準行二十八年六月命駐喀什噶爾辦事三十年二月烏什逆回滋事額僧格率兵從伊犂將軍明瑞進勦八月賊平三十一年五月授寧夏將軍三十二年調補杭州將軍三十三年九月卒欽定八旗通志卷一百八十一
