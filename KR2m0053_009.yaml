body:
  text: 欽定四庫全書欽定八旗通志卷首之七敕諭一天命天聰崇德順治年間天命三年四月辛丑頒統兵貝勒諸臣訓習兵法書曰凡安居太平貴於守正用兵則以不勞已不頓兵智巧謀略為貴焉若我衆敵寡我兵潛伏幽邃之地毋令敵見少遣兵誘之誘之而來是中吾計也誘而不來即詳察其城堡逺近逺則盡力追擊近則直薄其城使壅集於門而掩擊之倘敵衆我寡勿遽近前宜預退以待大軍俟大軍既集然後求敵所在審機宜決進退此遇敵野戰之法也至於城郭當視其地之可拔則進攻之否則勿攻倘攻之不克而退反損名矣夫不勞兵力而克敵者乃稱智巧謀略之良將也若勞兵力雖勝何益蓋制敵行師之道自居於不可勝以待敵之可勝斯善之善者也每一牛録製雲梯二出甲二十以備攻城凡軍士自出兵日至班師各隨牛彔勿離如離本纛執而訊之五牛録額真不以所頒法令誡諭於衆罰五牛録額真及本牛録額真馬各一匹若諭之不聼即將梗令之人論罪五牛録額真及本牛録額真凡有委任職事自度果能勝任則受之不能則勿受如不勝任而強受之將委任之意豈為汝一人乎率百人者百人之事敗矣率千人者千人之事敗矣國家之事莫大於此至於攻取城郭不在一二人爭先競進一二人輕進必致損傷被傷賞不及縱殞身亦不為功逮列陳已定爭為先登以陷城者方録其先進之功馳告固山額真俟環攻軍士四面并進城陷然後固山額真鳴螺俾各路軍士聼螺聲一時並進又諭李永芳曰爾明發兵疆外衛助葉赫我乃興師而來汝撫順所一遊擊耳縱戰亦必不勝今諭汝降者汝降則我兵即日深入汝不降是汝誤我深入之期也汝不戰而降俾汝職守如故豢養汝汝之軍民亦不擾焉汝素多才智識時務人也毋論汝矣即無足比數者猶將舉而用之結為婚媾况汝有不更加優寵與我一等大臣並列耶汝勿戰戰則我之矢豈能識汝必衆矢交集無力制勝何益哉汝出城降我兵不入城汝之士卒皆得安全若我入城則男婦老弱必致驚潰亦大不利於汝矣勿謂朕虛聲恐嚇而不信也汝思區區一城吾不能下何用興師為哉失此弗圖悔無及矣其中城大小官吏兵民諸人獻城來降者保汝父母妻子以及親族俱無離散豈不慶幸降不降汝熟計之毋不忍一時之忿違朕言致僨失事機也天聰三年十一月庚寅諭八旗固山額真曰因克遵化自固山額真甲喇額真及登城士卒以次賞賚者非以固山額真身自登城也以其督率盡善設備堅固故行賞耳嗣後凡攻城賞賚視此為例朕與爾等經厯險逺艱苦至此已蒙天佑然此猶佑我之小者後之佑我大者尚有在也此行既承天眷凡固山額真及大小各官俱宜用心約束本旗人員明白申飭愛士卒如子弟若能申明紀律如子弟愛養則本旗士卒亦視爾等如父母自能不忘教令臨陳之際在爾等之前盡力不違紀律也果能如此本旗士卒又何至有陷於重罪者乎倘各旗大臣不勤加申飭以致妄行姦盜不誅則紀律廢弛而為惡者益熾誅之則勞瘁之卒又實可憫爾固山額真甲喇額真牛録額真當以此為念勤加教訓所部士卒至於爾大臣各官居平在家何等期望不皆曰安得於上與諸貝勒前遇敵效力以自見乎何初念頓忘而遂狃於貪得耽於怠惰各匿帳中不令人見如此偷安倘蒙天眷大業既成雖欲圖建功名其可得耶今後各宜克勤厥職天聰四年二月丙辰諭貝勒諸臣曰爾衆貝勒諸臣仰承天佑凡所行之事皆處之以義毋貪黷以利已毋偏庇以徇人在下之士卒悅則天亦嘉與之矣夫事有不知因而錯誤妄行此無可如何之事如喀克篤禮令其本旗薩木哈圖巴圖魯為本牛録人運取柵木以苦之又使往登昌黎城是不明於理矣爾衆貝勒諸臣視本旗效力勞苦之人當如身親其勞涕泣憐憫若不加憐憫雖素所親信者亦不盡忠效用也昔吳起吮其卒之癰卒之母哭之有卒問曰汝子癰而將軍吮之何以哭為其母曰此子之父被創吳將軍吮之遂亡於陳吾恐此子亦如其父也是以哭之似此等厮養之卒幸而得生當思用之以為朝廷及諸貝勒建功立業凡一次奮勇登城之人倘再遇登城縱彼欲往切不可令之往也天聰五年七月戊戌諭領兵諸臣曰蓋聞古來用兵征伐有道者蒙天佑無道者被天譴故自恃其力而恣行殺奪未有不敗者也克盡其道而力行仁義未有不興者也是以天運循環但易其君不易其民若天意所與者即其民也今日者天心所向豈能預知朕惟欲仗義而行制敵養民而已爾諸臣當申明法紀訓諭士卒士卒恪遵切識於心務期力行正事無作姦邪不然為姦為慝行諸悖亂則或責或誅皆自取之耳至俘獲之人勿離散其夫妻父子勿祼取其衣服爾諸臣以及士卒各宜戒之又諭征明領兵諸臣曰瀋陽遼東之地原非我有乃天所賜也今不事征討坐視漢人開拓疆土修建城郭繕治甲兵使得完備我等豈能安處耶朕念及此故以出兵所得漢人財帛及與朝鮮通市所得貨物盡與蒙古易馬興師征討此行倘荷天佑凡俘獲之人離散其父子夫婦祼取其衣服甚為不善似此悖亂盜賊之行爾諸臣與各軍士宜諄切曉諭乃傳諭時皆唯唯聼命及退而遂忘之此所以生事橫行干戾也今我不自暇逸日事戰爭或彼被困而來降或天垂佑而制勝則自有解甲休息之時矣自征明國以來凡攻城野戰所向必克然我何以常有懼心彼明國屢戰屢敗然常不知懼者蓋彼雖不長於騎射而於戰陳之時曉習文武法律故也昔金伐宋遇宋將名宗澤者金兵十三戰皆敗隨有宋一將率兵來援欲戰有城守將阻之曰當此六月酷暑揮扇乘涼尚不能堪豈能擐甲而戰乎諸兵聞之皆無鬬志遂潰以一言之失而城竟為金所得如阿敏貝勒駐守永平時曾以我兵為弱曰如此安能克敵彼貝勒之言若此士卒孰肯用命又如顧三台額駙革其固山非以臨陳怯懦不能稱職也昔攻昌黎時本旗一卒被傷致死以繩繫其足曳之而歸夫戰則用之而不加恤誰復效死直前耶必也傷則臨視調治之乃可為主帥固山額真如此則士卒不惜其生授命於主將之前矣我兵總計雖衆若固山額真梅勒額真甲喇額真牛録額真各分所屬之兵而誡諭之仍覺其少惟在申明法令愛惜士卒孰不願為爾等效力而前耶天聰五年八月戊申諭圍大淩河諸貝勒大臣等曰攻城恐士卒被傷不若掘壕築墻以困之彼兵若出我則與戰外援若至我則迎擊正黃旗固山額真楞額禮率本旗兵圍北靣之西鑲黃旗固山額真達爾漢額駙率本旗兵圍北面之東阿巴泰貝勒率擺牙喇兵在後䇿應正藍旗固山額真覺羅塞勒率本旗兵圍正南面莽古爾泰德格類兩貝勒率擺牙喇兵在後策應鑲藍旗固山額真宗室篇古阿格率本旗兵圍南面之西濟爾哈朗貝勒率擺牙喇兵在後策應蒙古固山額真吳內格率本旗兵圍南面之東正白旗固山額真喀克篤禮率本旗兵圍東面之北額爾克楚虎爾貝勒率擺牙喇兵在後䇿應鑲白旗固山額真伊爾登率本旗兵圍東面之南墨勒根代青貝勒率擺牙喇兵在後䇿應正紅旗固山額真和碩圖額駙率本旗兵圍西面之北大貝勒率擺牙喇兵在後䇿應蒙古固山額真鄂木兑率本旗兵圍正西面鑲紅旗固山額真葉臣率本旗兵圍西面之南嶽託貝勒率擺牙喇兵在後䇿應歸降諸部落蒙古貝勒各率所部兵圍其隙處總兵官佟養性額駙率舊漢兵載紅衣炮跨錦州大道而營諸將各固守汛地天聰八年二月乙亥諭守錦州多爾衮薩哈亷二貝勒曰爾等可率駐防巨流河四大臣兵並四路哨卒之半前往量遣數人襲取明哨卒所守屋執其人又聞敵人哨騎甚衆可乘夜越其地捉生若我兵先往者已過其在後漢人必為爾等所俘矣爾等所進之處務須左右隄防若獲其人即以書付之帶去如不獲即懸書於十三站山坡而來巨流河兵將哨卒人等從爾等北路捉生至閭陽峪會兵可也捉生之後可將人民居住之臺具數開來爾等慎勿恃兵勢不加意防備也天聰八年五月甲辰諭留守盛京濟爾哈朗貝勒曰凡有敵人來侵應詳確協議相機往援覘敵情形徐徐而進慎勿深入如深入致我兵一二人被傷則敵難再克矣敵既深入我境何必張皇若欲往援則盛京駐守將士可今大臣孟阿圖薩壁翰舒賽噶布喇統領謹守毋違旨妄動縱有敵人不過南路朝鮮於晏安無事樂於搆釁而來耳其沿海諸島漢人已盡為孔元帥攜來餘者又為尚總兵官所掠今皮島所遺止有數千彼必不來縱有敵來侵不過侵邊外蒙古非敢他侵也可令圖爾格率兵防守其地即有敵至圖爾格駐防之地亦不可輕援尤有慮者大淩河新附官員恐有潛逃宜嚴加防備朝夕詳察至兵丁勿令間居一應盔甲器械俱令修整倘荷天眷佑或得一隅來調爾等亦未可知其城頭置炮待城工完日各按汛地布列而以預備隨征小炮列於城下不時操演之天聰八年十二月諭往征瓦爾喀吳巴海荆古爾代曰兹命爾等往征瓦爾喀所至之處勿懷他念惟謹慎從事各副委任不可怠忽聞爾等往略之處有千餘人在尼滿地方築城屯駐此處宜往略之各屯户口多少吳巴海盡知可與計議其可取者量力取之其分達里所居之屯可問鄉導前往先取此屯凡此攻略各屯非有統帥哨防不過泄泄然散處各村落耳然其人雖愚昧爾等自寧古塔啓行之日即防範毋令彼知覺望其煙火所在以智取之所有俘獲當加意監守如遇天寒則給以火不可令彼凍傷若得食物必均食之前所遣達朱户以疏忽遂遇害但因其自幼效力有功方令承襲官職爾等倘亦以疏忽遇害可有如達朱户之功者乎或俘人逋逃或自被殺害皆由與彼同處日久漫無防範以及姦淫其婦女所致前者東果魁滿征瓦爾喀時每姦淫所獲婦女爾等切勿效尤毋以其物力豐足留彼無益遂行侵取秋毫不可侵犯其毋違朕命又諭往征黑龍江霸竒蘭等曰爾等此畨初經其地道路遙逺惟在不倦不怠奮力直前而已至俘獲之人須用善言撫慰凡遇飲食一體共之如此則其亂心從何而起較從前所獲各處瓦爾喀此地人民語音與我國同攜之而來可以為我用攻略時語之曰爾我本是一國之人我皇上久欲收服特未暇耳爾以不知載籍之故竟至於此爾等當如此諭之大丈夫凡受委任當圖報稱古元壇寶藏有云少壯不立名老大徒傷悲誠如此言在我若不力圖建樹歸家雖悔何益耶又入略之後或報捷或遣兵送俘必令由科爾沁國舅吳克善所屬之席北綽爾門地方經過至遣迎報捷人及運送兵糧者亦必於此處相待其應略地方有夏姓武因屯長喀拜從役二人庫魯木圖屯長郭爾敦從役三人及納屯一人俱已至今令其從軍矣爾等率此輩往略他屯若所獲已定不可犯此歸附三屯宜仍留於本處諭之曰以爾等來歸我皇上故留於此今後宜時常往來若稍間斷必復來略爾矣若略他屯不獲如願不必留此三屯當盡行㩦來來時自小刀以及一切器械皆可收之務令結隊而行不可分散又諭朱延慶等曰爾所奏之言甚善凡言事者正當如此陳奏或有奏事之人多托拾古事陳奏其言固書中之所有也凡人建言必實指曰某也賢某也不肖於任國政諸大臣必實指曰某大臣能稱厥職某大臣惟利是圖某徇庇所私之人某傾害所惡之人務直指其名以奏之再朕躬或有過失必亦實指其事以入告凡人於國之賢才皆得薦舉毋曰賢才何如此衆多朕猶以為未足也爾等知其賢而舉之彼或變其初心後為不善亦彼自為不善耳於舉者何與焉今朕將録用爾等三人併使大小臣工明知朕意天聰九年諭駐防上都吳拜等曰諸貝勒所遣人若於陽石木遇之爾等即與同來若於渾河以西遇之可令彼換馬乘來爾等可知明界沿邊巡哨而還若於遼河遇之亦當令彼換馬乘來爾等當至杜稜城探望沿邊躡蹤而來若遇使者爾等當選精馬二十名往召濟席哈海塞率之同來若不遇使者則至海塞濟席哈處即令二人速來爾等可遣人過上都往前巡哨俟諸貝勒使者至爾等即與之同來不必待諸貝勒也諸凡加意隄防駐營勿在一處日間所駐夜必遷移即火患亦宜預防之又諭征瓦爾喀諸將曰爾等到處身勿偷安心勿懈怠加意防備不可疏忽勿離人父子夫妻勿淫人婦女勿掠人家資俱收貯攜還其從人或有一二逃走者與爾無涉至於彼之首領率衆攜財物而逃者皆因離其夫妻濫行姦淫所致若然罪及上帥以下諸將勿違主帥號令主帥亦不得隱匿部將功罪必登記於册至於馬匹不可於駐營時即行牧放勿輒飲以水待其汗乾飼草方可飲水既至分進之地勿即以榖餵馬先飼以草俟馬腹稍大方可飼榖爾等諸將勿忘此律當時時申飭爾部衆也崇德三年諭征明奉命大將軍多爾衮等曰先是多羅武英郡王於丙子嵗領兵征明克昌平時爾等各官猶如漁人下水取魚擒之以手挾之以脅復以口銜之而出似此貪掠財物以致獲罪者甚多朕豈願爾等犯法樂於加罪懲前行亂之人正欲令其警於後使不為亂耳且朕見爾等有罪甚為惻然朕非誇詡以古人自擬常閲古史云夏禹道遇罪人而泣侍臣曰此犯法有罪之人王何為而泣也禹曰堯舜時政教德澤宣布於民故人無犯法今我之泣非為囚也我之政教德澤不如堯舜致有罪人故泣耳以此朕見爾等有罪亦甚為惻然也爾等互相勉勵堅執軍令以行毋或怠玩從事今蒙古漢人朝鮮諸國俱已歸附軍士甚多爾等勿徒自恃強勇以威懾人各宜申明紀律無或厭倦蓋爾等乃衆所觀瞻也若能自處以禮濟之以和則歸附各國必以為我國強而有德勇而有禮益加悅服矣凡為主帥之人於臨陳之際使徒計一已之功而不念兵之損傷軍之敗衄及國之聲名有損非主將也興師致討當思於國有益於已立功凡軍中議事遇有意見悖謬者即宜在彼勸諭毋緘默不言而還時託詞自解亦有在彼故出微詞而辨時即云我曾如是勸諭者皆不足據必在彼明言於衆而衆不從始可還時辨理也至陳獲將士聼擒獲之人收養於朕無預朕與其收養此等之人不若養我新附之人及加恩舊時窮苦士卒之為愈也崇德四年八月甲午諭出征庫爾喀主將薩爾糾等曰爾等可於喇發地方養馬前進爾等兵少宜合為一隊以行如得勝時勿貪得而輕殺勿妄取以為俘抗拒者諭之使降殺傷我兵者自當誅戮若歸附則編為户口令貢海貂皮諭以棄惡從善安輯已畢止可遣人來報一次若頻報則恐兵少力費往返不可經朝鮮擾害之順治二年二月辛酉諭定國大將軍和碩豫親王多鐸曰聞爾等破流冦於潼關遂得西安不勝嘉悅初曾指麾爾等往取南京今既攻破流寇大業已成即將彼處事宜交與靖逺大將軍和碩英親王等爾等相機即遵前命趨往南京大丈夫為國建功正及此時汝其勉之其隨英親王豫親王之烏真超哈自固山額真梅勒章京以下兵丁綿甲紅衣炮均分為二半著英親王督領半著豫親王督領若相去已逺可仍如舊至於英親王逗遛之故良因王與貝勒貝子諸臣為已事越境由土默特鄂爾多斯地方枉道取駝馬復轉入邊以致逗遛其罪非小特諭汝等知之汝等仍遵前命往征南京其流寇餘氛責令英親王追𠞰又諭靖逺大將軍和碩英親王阿濟格曰爾等自京起行在先定國大將軍和碩豫親王等起行在後今豫親王等已至潼關攻破流寇克取西安尚未知爾等兵至何處此皆枉道越境過土默特鄂爾多斯地方需索伊國轉而入邊以致逗遛故也今豫親王兵已令遵前命往定南京爾等可仍遵前所指麾將流寇餘孽務期𠞰除以贖從前逗遛之咎勿以流寇已遁西安既平不行殄滅遽爾班師其隨英親王豫親王之烏真超哈固山額真梅勒章京以下兵丁綿甲紅衣炮均分為二半著英親王督領半著豫親王督領若相去已逺可仍如舊順治四年五月諭大學士洪承疇巡撫土國寶曰順治四年四月初四日拓林逰擊陳可搜獲敕一道內云封承疇為國公國寶為侯爵又黃斌卿密書內云承疇所具本章已為轉奏國寶二次密字亦已轉奏國主訖又云內仗承疇殺巴張二將外託國寶靖除地方則江南不足定等語朕見此益知賊計真同兒戲因卿等皆我朝效力大臣故反間以圗隂陷朕豈墮此小人之計耶卿等當益勵忠勤以報國恩勿以此介意順治八年三月諭吏部曰朕自親政以來觀天下所以治安者關乎各部院雖自古無參用諸王之例然聞我太宗文皇帝曾設諸王於部院朕欲率由舊典復設諸王因嘗思之在諸王雖甚勞苦然誠各殫厥職釐剔庶務禁絶貪汚修整法令俾上下利病不致壅蔽利國家而致升平莫此為要今特設和碩巽親王於吏部和碩承澤親王於兵部多羅端重郡王於户部多羅承謹郡王於禮部多羅順承郡王於刑部多羅謙郡王於工部多羅貝勒喀爾楚渾於理藩院固山貝子吳達海於都察院諸王等其各副朕圗理治安至意爾部即傳與各王知悉順治九年十二月諭多羅貝勒以下夸蘭大以上各官曰從來行兵全我師以破敵者亦爾等所悉知爾等此畨晝夜疾趨二百三十餘里以致士馬疲勞此大失也今後諸事悉與夸蘭大等以上共相商酌敬慎而行如值渠寇應分遣衆兵者則於固山額真公韓岱宜爾德內遣一人其一人毋使離爾貝勒屯齊左右此外量有分遣者則於蒙古固山額真纛章京夸蘭大內擇可為帥者遣之其一貝勒兩貝子勿遣離爾所爾貝勒屯齊率本固山下擺牙喇居中而營貝勒巴思漢貝子查喀納穆爾祜公韓岱宜爾德當各領轄員及戈戚喀擺牙喇同貝勒屯齊軍於一處其提問章京馬爾泰轄阿進土雷等宜加詳鞫有墜馬被重創有情可原者執解來京如果情無可原棄主奔潰者即就彼處處斬順治十一年八月諭吏部曰朕惟旌賢勸能國有常典大學士范文程額色黑寧完我尚書郎邱巴哈納車克侍郎祝世廕皆我太宗時素效忠勤今始終不渝或匡贊政機勞深啓沃或經理部務力殫猷為成績已彰宜加恩晉秩范文程著加少保兼太子太保額色黑車克寧完我郎邱巴哈納祝世廕俱著加太子太保各照舊辦事赫伯昂邦巴哈邊古曩在太宗時宣勞有力兹者左右朕躬勤慎罔替益罄忠誠並宜加秩示勸巴哈邊古俱著加太子太保爾部即遵諭行順治十二年正月辛丑諭吏部曰朕惟賢才難得政事需人必舍短以取長宜計功而忘過特頒恩命圗任舊臣原任吏部尚書韓岱原任固山額真宜爾德阿拉善等俱自太祖太宗時效力或膺部務勤劬或佐戎行勞苦若以一眚終錮朕心不忍兹特復其原任用韓岱為吏部尚書宜爾德阿拉善為固山額真赦過宥罪既𢎞施雨露之恩盡職奉公宜益勵氷霜之操尚其永念勿負朕心欽定八旗通志卷首之七
