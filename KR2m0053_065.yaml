body:
  text: 欽定四庫全書欽定八旗通志卷五十一職官志十開列大學士尚書雍正五年奉旨凡補授大學士尚書時應否令其在議政處行走具奏請旨欽此乾隆五十六年奉上諭國初以來設立議政王大臣彼時因有議政是以特派王大臣承充辦理自雍正年間設立軍機處之後皆係軍機大臣每日召對承旨遵辦而滿洲大學士尚書向例俱兼議政虛銜無應辦之事殊屬有名無實朕向來辦事祗崇實政所有議政空銜著不必兼充嗣後該部亦毋庸奏請欽此四五品京堂雍正六年議準通政使司副使大理寺太常寺太僕寺少卿鴻臚寺卿等缺均不分滿洲蒙古通行論俸開列升補其郎中應升各缺除內閣侍讀學士仍按滿洲蒙古補用乾隆三年議準滿洲蒙古科道均準內升外轉遇有京堂員缺先將內升科道開列具題補用一人再有缺除科道毋庸開列外將俸深郎中論俸開列四人引見候旨簡用其出差外任者不行開列如內升科道無人仍將俸深郎中論俸升補科道不準通行論俸四年奏準內閣滿洲漢字侍讀學士員缺將漢字出身之郎中等官論俸擬出十人送內閣考取擬定正陪交部與各項記名議敘人員一同開列引見補授其內閣清字侍讀學士二員將應升各官論俸擬正陪升補五年奏準凡降級補四品京堂人員遇有缺如值內升班次即以奉旨降級日期與奉旨內升日期論先後一同開列如值俸深班次將降級應補人員列名在俸深應升人員之前一同引見若奉旨將降級之人補授無論內升俸深班次均不積算如上次用內升則下次仍用俸深不算過班其通政使左參議光祿寺鴻臚寺少卿員缺將應升之滿員外郎等官除出差外任不行開列外論俸開列四人引見如有降級應補人員列名在俸深應升人員之前一同引見候旨簡用又奏準奉旨記名各官如由科道記名者遇有應升與內升之科道論奉旨日期先後開列具題由郎中等官記名者開列在俸深郎中之前將記名之處聲明一同引見候旨簡用補授後各按本班照例積算又奏準議敘應升四品京堂之科道郎中等官均論其議敘奉旨日期先後遇有員缺入於俸深郎中等官開列四人之末依次引見候旨簡用若遇內閣侍讀學士員缺如係清字之缺其應升人員無論清漢字樣均行開列如係漢字之缺其議敘人員察其漢字出身者仍照例開列其由清字出身者停其開列乾隆五十五年六月欽奉諭旨科道內升外轉之例停止乾隆五十六年正月奏準通政使司副使大理寺少卿由四品京堂開列太常寺少卿鴻臚寺卿由內閣侍讀學士五品京堂欽天監監正及科道贊禮郎鳴贊參領引見補授太僕寺少卿由內閣侍讀學士五品京堂科道參領開列又通政使司參議光祿寺少卿鴻臚寺少卿由五品京堂及科道開列具題又內閣侍讀學士由科道與郎中分班引見補授乾隆五十五年議準內閣侍讀學士滿員四缺由五品京堂及科道各保一員帶領引見一次由部院堂官於郎中內擇其實係辦事出力者各保送一員按依部分帶領引見一次翰詹官員順治初年定翰林院侍讀學士員缺由侍講學士轉侍讀員缺由侍講轉詹事府左庶子員缺由右庶子轉左中允由右中允轉左贊善由右贊善各轉補雍正四年議準侍講學士侍講詹事府少詹事右庶子洗馬右中允等員缺將應升之翰詹官員與科甲出身之部屬應升官員分班簡用均論俸擬正陪引見請旨如部屬無科目出身人員即將翰詹官員升補十二年奉旨滿洲贊善員缺將俸深之小京官筆帖式各一人引見請旨著為定例欽此乾隆七年議準翰詹員缺凡開復降補人員亦列名於應升官之前一同引見補用十三年奏準嗣後於六部滿員外郎內每部酌定一人作為科甲人員升轉之階遇有員缺將科甲出身之主事等官升用俾翰詹衙門升轉時不致乏人又奏準內閣侍讀學士翰林院侍講學士侍講詹事府少詹事庶子洗馬員缺其論俸應升擬正人員遇有出差者或將論俸擬正之人補授或將其次論俸應升之人别擬正陪引見補授之處皆行奏聞候旨遵行十六年具奏見出有侍講一缺上次已用部員此次應用翰詹但應升編檢班內止有檢討一人既不便即將該員指補亦不便因無擬陪之人將該員扣除别將部屬人員升用相應請旨可否將此一人擬正將科甲部屬人員論俸擬陪一并引見之處恭候欽定奉旨擬陪人員一并引見五十六年奏準少詹事專以學士升任學士專以侍讀侍講洗馬司業升任將外班揀選之處查銷中允贊善免其試俸又內班無人由外班抵補俟內班有人時按次歸還翰詹兼理部務乾隆元年議準翰林院侍讀學士侍講學士詹事府少詹事庶子等員缺由科道郎中等官升補者均不令兼管部院事務其員缺别行銓選由員外郎等官升補翰林院侍讀侍講詹事府洗馬主事等官升補詹事府中允小京官升補贊善如係熟練部務之人準各該堂官奏留辦事兼兩處行走其該堂官不行奏留者照例開缺稽察宗室覺羅各學乾隆二年議準宗室覺羅各學奏點滿漢文臣稽察由部行文各衙門咨取三四品科甲出身文臣學問淵博翻譯精通者開列職名奏請欽點十二人兩翼宗學分點四人左翼四旗覺羅學分點四人右翼四旗覺羅學分點四人督率教習勤加訓迪仍同該管王公不時稽察如遇升遷外任事故等項出缺由部别行開列具奏遴選國子監司業雍正六年奏準滿司業員缺傳齊應升各官交九卿遴選四五人由部引見恭候簡用七年議準蒙古司業員缺由部傳齊各部院蒙古郎中員外郎會同理藩院遴選能翻譯蒙古文藝通曉清文蒙古字語者四五人由部引見恭候簡用科道雍正五年遵旨議準稽察宗人府御史二人由宗人府於宗室內簡選引見補授仍屬都察院統轄十二年議準滿給事中員缺由部行文都察院咨取前任宗室滿洲蒙古監察御史通行引見轉補再蒙古御史二缺每遇轉科時將所遺之缺歸於滿洲升補俟蒙古科員缺出之後如將滿御史轉補即以所出之缺歸於蒙古升補統計蒙古科道二缺十三年議準滿洲蒙古御史員缺行文咨部令該堂官於郎中員外郎等官內保送引見候旨簡用乾隆三年奏準將應行考選之各部院郎中員外郎通行引見其奉旨記名者遇有御史員缺將奉旨記名之郎中員外郎各論俸次郎中二人員外郎一人引見補授八年覆準宗室御史遇滿洲御史內升時準其一同開列各科給事中員缺亦準其與滿洲御史通行引見如將宗室御史轉補科員所遺宗室御史員缺自應别行補授但宗室御史原奉特旨設立二人令其專察宗人府事件既不便額外增設又不便令滿洲御史稽察請嗣後如宗室御史轉補科員後所遺宗室員缺將滿洲人員補授其稽察宗人府事件即令轉補之宗室科員與現任宗室御史一同稽察至宗室科員升轉滿洲御史轉補之後再將宗室御史員缺照例補授四十六年復添稽察宗人府監察御史二員俱交與宗人府於宗室內㨂選引見補授令都察院統轄又議準滿洲蒙古監察御史其各衙門司員補授之後俱不準奏留仍兼行走惟刑部有諳悉律例理藩院能習蒙古文語之員奏請留部者亦必帶領引見應否準其仍留行走之處恭候欽定戶部庫官調補乾隆三年奏準戶部三庫郎中員外郎員缺由該堂官行文各部院於郎中員外郎內遴選潔已奉公辦事勤慎之人保送該庫堂官引見調補三年期滿照例更代五年奏準戶部三庫年滿官員即以各衙門調補所遺之缺轉補其有品級不相當者以原銜暫行轉補俟在京有對品員缺不論雙單月由部即行具題坐補將所遺之缺再行開選九年奏準三庫掌籍主事一人三年期滿應照郎中員外郎之例於各部院滿主事內遴選調補仍於三年期滿照例更代又奏準司庫職司出納稽核盤驗大使亦有監收錢糧呈報批文之責請均一例令三年更代三庫司庫等五人於各部院衙門正七品從七品小京官遴選保送調補俟調庫後各準其仍以原銜辦理司庫事務其由三庫更代之司庫等亦各以原銜辦理所代官員事務均令仍食各本身原俸統俟有缺時由部各按缺底詮選三庫大使四員於各部院衙門現任滿洲筆帖式內遴選更代遇員缺行文各部院衙門各保送一人由該庫堂官每一缺遴選二人引見調補其各部院衙門調補之筆帖式準其以筆帖式辦理大使事務由三庫更代之大使等亦各以原銜在所代筆帖式上行走均令仍食各本身原俸統俟有缺時由部仍各按缺底按旗補用十四年奏準三庫員外郎員缺內閣侍讀亦準一同遴選引見如蒙恩準調補三庫即將該員授為員外郎其更代之員外郎交部即用工部庫官調補康熙十年題準工部節慎庫郎中員外郎員缺由工部郎中員外郎選擇調補製造庫員外郎員缺由部照例升選乾隆十八年諭工部製造庫郎中員缺緊要向例由吏部將六部俸深郎中擬定正陪引見多係年老平常之員往往不得其人嗣後遇有員缺著工部堂官於本部司官內遴選保題引見補用欽此步軍統領衙門員外郎等官雍正十二年奏準步軍統領衙門員外郎員缺各部院將主事等官保送該衙門遴選通曉清漢文移熟悉刑名者補授主事員缺即於該衙門司務筆帖式內遴選補授均由該統領帶領引見司務員缺由該統領於筆帖式內遴選咨部題補各部院堂主事康熙十五年題準起居注衙門滿堂主事六部理藩院漢軍堂主事員缺令各部院衙門將熟習翻譯之應升主事人員出具考語保送過部會同本部堂官遴選正陪由部引見補授內閣侍讀康熙十六年題準滿洲蒙古漢軍侍讀員缺由內閣於中書內每缺遴選二人擬定正陪出具考語咨部引見補授內閣中書雍正二年覆準滿中書員缺由內閣於貼寫中書內按旗每缺遴選二人擬定正陪咨部引見補授乾隆五年議準貼寫中書補用五人外遇有宜用各項舉人出身之筆帖式應令內閣會同本部將此項人員與貼寫中書一同考試翻譯擇其佳者引見補授十三年奏準滿洲中書共七十人酌定每旗各七人共五十六人其餘十四人定為八旗公額十五年奏準嗣後八旗額設滿中書五十六人歸貼寫中書按旗分遴選擬定正陪引見補授外其餘公額滿本房七人漢本房七人共十四人改為考取班次挨旗輪補俟有員缺行文該旗將間散文舉人翻譯舉人咨部移送內閣與該旗貼寫中書會同考試每缺考取二人擬定正陪引見補授蒙古中書乾隆五年議準遇員缺由部將應用之現任蒙古筆帖式並文舉人出身之筆帖式及間散之文舉人不論旗分一同移送內閣考試翻譯擬定正陪引見補授補用五人後將降調人員免其考試補用一人如降至從六品者以原銜借補中書仍支原俸升轉其由理藩院等衙門筆帖式考取者以理藩院等衙門升用由六部等衙門筆帖式考取者以六部等衙門升用再唐古忒中書員缺由唐古忒學出身之筆帖式升用九年議準內閣新設蒙古貼寫中書六人應照滿洲貼寫中書之例分班間用嗣後遇有蒙古中書員缺先將蒙古貼寫中書論俸擬用一人次將蒙古各項人員考補一人均分班間用漢軍中書乾隆五年議準遇有員缺由部將應用之現任漢軍筆帖式及間散舉人不論旗分一同移咨內閣遴選考試擬定正陪引見補授掌關防郎中乾隆元年奏準孝陵奉祀掌關防郎中員缺由部行文各部院於郎中內將老成謹慎之人各遴選一人出具考語保送過部與陵寢各郎中一同較俸擬定正陪引見恭候欽定盛京三陵掌關防等官乾隆十九年覆準三陵掌關防官員缺將三陵尚茶正尚膳正內管領一并遴選題補三陵尚茶正尚膳正內管領