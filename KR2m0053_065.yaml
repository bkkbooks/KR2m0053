升轉由小京官中書筆帖式補授者授為主事由本處總管補授之八旗遊牧員外郎員缺令該總管於本處散秩官筆帖式及驍騎校護軍校內遴選人去得者保送理藩院引見補授如保送之人平常將京城本旗通曉滿洲蒙古字語之護軍校驍騎校護軍內遴選辦事去得者亦由理藩院引見補授均於本處以佐領升轉不準調京乾隆二年議準由京補授遊牧員外郎八人其由小京官中書筆帖式授為主事者三年無過該總管保題實授員外郎在員外郎任五年期滿令該總管出具考語咨部注册其由六部出身之人仍俟六部蒙古員外郎員缺無論保題升選補用二人後將年滿遊牧員外郎論俸咨取一人調補由理藩院等衙門出身之人亦俟理藩院等衙門蒙古員外郎員缺無論保題升選補用二人後將年滿遊牧員外郎論俸咨取一人調補如五年內遇有應升以升銜留任仍以升銜較俸升轉驛站各官雍正十二年議準盛京五路驛站正副監督各一員由盛京五部堂官於郎中員外郎主事內公同遴選人明白能管理者各一人出具考語題請實授管理三年令盛京戶部兵部會同稽察驛站副都統察明該員果能整飭驛務錢糧不致浮冒保題到日由兵部移送到部照例議敘如有浮冒錢糧廢弛驛務等事題參治罪乾隆四年奏準驛站正副監督二人請照關口官之例三年內如遇論俸應升時以升銜留任仍以升銜較俸升轉又奏準張家口喜峯口獨石口殺虎口古北口管站員外郎員缺由理藩院於該院員外郎內遴選引見差往管理三年期滿照例更代所遺更代員缺不行開選即將換回之人頂補又議準寧古塔驛站官二員由該將軍於本處倉官筆帖式內每一缺遴選二人擬定正陪出具考語咨部引見由倉官八品筆帖式補用者授為七品由未入流筆帖式補授者授為八品六年任滿該將軍出具考語咨部注册七品官以京城主事等員缺升選八人後升用一人八品官以京城正從七品小京官員缺升選六人之後升用一人至黑龍江驛站官員缺由該將軍於本處應升之官遴選正陪咨部引見補授邊地同知通判雍正十一年奏準理事同知有管理民人辦理刑名之責必得通曉漢文律例之人方能勝任應令各部理藩院將滿洲蒙古員外郎主事內通曉漢文人明白者遴選引見補授乾隆四年議準各部院衙門遇有保送理事同知通判之時將京察一等合例人員內保送倘此等人員內如有服制未滿現患疾病及實有不能離京情莭並通曉部務而不宜於外任者均令該堂官將不便保送情由逐一聲明過部别行遴選合例人員保送五年議準各邊地理事同知員缺除員外郎不行補用外由部行文內閣並部院衙門於滿洲蒙古內京察一等之主事小京官筆帖式遴選通漢文曉蒙古語賢能之人保送過部會同理藩院並各部院遴選考試漢文及蒙古字語務期循名責實分别去取引見補授其邉地理事通判員缺除主事不行升用外止將小京官筆帖式一例考試注册補用威逺堡等關口守口官雍正十一年議準威逺堡等六關口各設守口官一人盛京兵部會同盛京將軍於五部員外郎主事小京官內每一缺遴選二人擬定正陪咨部引見補授二年期滿仍令盛京兵部會同盛京將軍察明該員果能黽勉效力者保題到日由部按該員原銜議敘如尋常供職者即咨回部以應得之官補用如有怠忽廢弛等事即行題參若二年內遇有應升以升銜留任即以升銜較俸乾隆八年議準六關口守口官以原銜管理關口事務其本任員缺毋庸别行開選二年期滿各回原任其有黽勉效力保題議敘者仍照舊例保題議敘如係在京人員補授者年滿之日仍照舊例調補京官其未經調補之先業經任滿者仍回原衙門辦事遇有在京員缺由部照例調補盛京銀庫各官雍正元年議準盛京戶部銀庫掌關防監督一員由在京部院堂官遴選郎中出具考語咨部引見恭候欽點管理三年期滿更代乾隆三年議準盛京戶部銀庫增設員外郎一人於該部司分員外郎內遴選一人管理庫務三年期滿照例調京仍於司分員外郎內遴選調補所遺司分員外郎缺再行咨部銓補壇廟守衛官順治初年定凡守衛天壇地壇社稷壇太廟堂子皇史宬官並朝鮮通事員缺由禮部及該旗開送正陪移咨過部五品以上引見補授六品以下本部堂官驗看補授盛京工部司匠康熙二年題準司匠員缺由盛京五部暨在京各部院衙門九品筆帖式令堂官各遴選一人保送過部列名引見補授如有奉旨記名者由部注册知照該部遇司匠缺挨次補授奉天等處倉官原例奉天黑龍江寧古塔等處各倉倉官員缺由將軍副都統五部堂官於各本處八九品未入流筆帖式內每一缺遴選二人擬定正陪出具考語咨部引見補授乾隆五年議準黑龍江等處倉官伊等均係本處生長之人其有無力搬移不能來京情願守候本處武職員缺者與豫行保舉之領催等一并咨送兵部引見俟奉旨記名後遇本處驍騎校員缺令該將軍酌量與記名之領催一併升補八年議準由筆帖式遴選補授倉官其筆帖式原缺不必開選三年任滿如居官好堂官保題到部歸於單月遇有本處應升之主事將本處人員升用三人後升用一人其筆帖式原缺即行開選若係尋常之人出具考語咨部注册仍回筆帖式原任以在京各項小京官員缺於雙月分推升三人之後升用一人鳳凰城迎送官乾隆五年奏準迎送官三員定為八旗公額遇員缺由禮部該旗咨部本部行文各旗將騎都尉以下驍騎校以上官員每旗遴選一人出具考語咨送過部由部驗看擬定正陪引見補授如以驍騎校補授授為五品滿官掌印順治十八年題準各部院衙門堂司悉令滿官掌印六科及京畿道河南道掌印由都察院題請欽點其餘各道以現任資深者轉補各部院屬司由各該堂官遴委郎中掌印若郎中有事故則遴委員外郎掌印升補武職世爵各官兼理部院順治年間定由郎中員外郎官補授參領佐領者均兼部院行走其由員外郎等官補授參領由主事等官補授佐領者均解部院職任康熙四十五年題準凡由參領男爵輕車都尉補授郎中等官由副參領侍衛騎都尉佐領補授員外郎等官雲騎尉補授主事護軍校驍騎校補授小京官均俟三年限滿遇有升轉將武職食俸年分以上朝之日起通行較算如原係部院主事筆帖式授為侍衛佐領復用員外郎等官者升轉時將前在部院之俸及現任之俸準其積算其在武職上行走之俸不必通理雍正八年議準由郎中等官承襲輕車都尉由員外郎等官承襲騎都尉由主事等官承襲雲騎尉者均屬班聨相等應令兼理部院其世爵品大文職品小除奉特旨兼理部務者不行開缺外餘均令世爵上行走所遺員缺即行銓補如果有才能出衆因世爵品大不行兼理者準該堂官具奏保留引見恭候欽定其循分供職者照例開缺不得奏請兼理倘有請托徇情等弊引見時其人不勝保留或保留之後辦事不能妥協即將保奏之堂官嚴加議處乾隆十三年奏準八旗世爵及武職官員改補文職者輕車都尉參領以科道郎中用騎都尉副參領佐領以員外郎用雲騎尉以主事用護軍校驍騎校等以七品小京官用其世爵均仍帶於本身侍衛有奉特旨以文職用者一等侍衛係三品應以三品京堂用二等侍衛係四品應以四品京堂用遇有員缺三品者開列於應升人員之前四品者開列於俸深人員之前請旨補授此內各員缺如有應用科甲以及考試擬正陪者仍照例不行開列至三等四等侍衛係五品應將三等侍衛以郎中用四等侍衛以員外郎用藍翎侍衛係六品應以主事用遇有員缺歸於月分照例補用宗人府題補各官並出差雍正二年議準宗室理事官由鎮國將軍輔國將軍副理官由奉恩將軍佐領經歷主事由廕生五六品官并考取一等間散宗室均由宗人府擬定正陪引見補授乾隆二年奏準宗室理事官遇有郎中應升員缺與旗員郎中一例較俸開列升轉三年議準宗人府理事官凡遇出差亦令該部行文宗人府將才能俸深者保舉一人咨送該部與各部院保送之旗員一同引見候旨簡用內務府堂郎中等官升轉乾隆五年奏準內務府官員向由內務府升轉其堂郎中總理六庫事務郎中等三缺經內務府奏準咨送過部以應升之官列名應準其與部院官一例較俸升轉此內有由漢軍郎中遴選調補者應令其以補授堂郎中等缺之日扣算食俸三年之後再行接算前任郎中之俸與漢郎中一例較俸升轉若暫時差往外省本任不行開缺者仍照現任官例論俸升轉其出差例有年限如鹽政關差等項本任員缺內務府别補有人亦應準其論俸仍俟扣滿年限再行擬升未經差滿之時如應升道府準其以升銜注册俟差滿回京照依原升補用其未經差滿之前如尚未升用俟回京之時未經補用以前仍不準算俸得官之後或仍補堂郎中等缺或補授對品官方準一例較俸推升漢軍典籍升轉乾隆三年議準以推升中書後準其與漢中書較俸以主事同知兼掣與各項應升人員一例推升漢軍年滿大使升轉乾隆四年奏準戶部三庫及戶部寶泉局工部寶源局大使均由筆帖式補授五年期滿仍照原筆帖式品級以應升之官用其由漢軍筆帖式補授大使年滿者歸於雙月如遇應升京官班次與漢軍俸深人員分缺間用如遇應升外官班次歸於即升月分與在外各項即升人員通較日期先後補用其未入流筆帖式改為九品者升轉之處仍照品級考所載以州同州判縣丞升轉京官降調候補順治年間定京堂降官三品以上者悉照品級對品别官補用降從六品者不補光䘵與署正以正七品用仍支六品俸與六品一例較俸升轉降至正九品者以九品筆帖式用滿官並無正九品故準補筆帖式升正從八品之缺蒙古官員降至七品以上者準以原銜借補中書降至八品以下者以原銜借補理藩院司務如有情願補筆帖式者準其具呈補用漢軍降至從八品者不補典籍因係中書升補之官並無應補班次以筆帖式用帶餘級食俸仍升八品官外任旗員降補京官乾隆十四年奏準各省理事同知通判遇有降調者悉照京官降調至滿洲蒙古知縣事同一例應均以京官降調嗣後凡降一級者即以七品筆帖式改補降至八品者即以八品筆帖式改補降至九品者即以九品筆帖式改補十五年奏準外任道府以下滿洲蒙古人員如由正印降調赴補者準其各按品級遇正印佐二員缺均準降補如由佐二官降調赴補者不準降補正印均以對品别官補用惟降至從六品以下除正七品之知縣一項由正印官降調者尚堪補用外其餘均係首領並無補用旗員之例考定例內理事同知通判降調者原以京官補用但京官品大外官品小若降至外任無可補之缺槩以京官對品借補未免過優嗣後凡降至從六品以下者皆降一等以京官補用如降至從六品者以正七品之小京官借補降至正七品者以從七品之小京官借補降至從七品者以正八品補用但滿洲蒙古無正八品之小京官應均以從八品之小京官降補降至從八品以及正九品者均以九品筆帖式補用不準仍帶原銜以上降調借補小京官人員有情願告降補用筆帖式者仍按品級準其以七八品筆帖式降補開列出差監督乾隆七年議準凡户部開列大小各差監督於每年十月內行文過部咨取八旗應出大差官員按旗通行論俸每旗核送五人應出小差官員較一任俸每旗亦核送五人將職名開單敘明俸次移送戶部開列卓異理事同知通判等官升轉雍正十三年議奏歸化城等處同知通判及協理各官停其三年更代若遇才守出衆者題請升擢不及者黜革供職勤謹者仍照原銜較俸推升奉旨依議乾隆五年奏準各省滿洲理事同知通判如有卓異之官經該督撫具題到部俟來京引見奉旨注册後歸於每年二四六十月分除各項不積算人員及應選班次仍照例辦理外如遇應升月分不論食俸深淺以應升之官先儘升用仍以升班積算倘有俸次已深者仍準論俸推升其卓異應升之處銷去欽定八旗通志卷五十一
