body:
  text: 人物志一百十七循吏傳二漢軍正白旗漢軍正紅旗漢軍正白旗外任官閔三元閔三元漢軍正白旗人世居奉天錦州府順治初始居京師五年以貢士選授河南鹿邑縣知縣為人亷明有才略時邑地新墾糧多詭寄力為釐正由是賦役均而國課日增官署學宫皆毁於兵燹三元創立縣堂五間曰莭愛堂後堂三間曰誠求堂堂之東曰琴堂堂之西曰贊政廳規模為之一新又興起學校建明倫堂門廡墻垣規度稍偹由是人文蔚起鹿邑自黃水泛濫之後舊溝淤壞三元於蒞任次年即遍閲境內相其髙下詢覽舊迹共開溝大小一百一十九道視舊溝增多四倍使瀦水之區悉達於河工程浩繁令鄉自為督家自為修大工成而人不知苦邑北枕渦河為衆水之滙而黃堌寺之堤尤當其衝每一衝決則漂沒百里一邑之民命係焉三元增築黃堌寺口堤俾永無衝決之患其他抑強暴扶孤弱姦猾屏息愛民如子按驛符應付以禁騷擾置義塜以葬暴骸蒞任五年百廢俱興升遷之日紳民遮道攀留羣為立碑以志不忘後崇祀本邑名宦祠羅文瑜羅文瑜字輝山漢軍正白旗人世居遼東廣寧中順治乙未科進士授山東曹縣知縣弱冠蒞任或疑未諳吏治未幾發姦摘伏姦宄潛蹤四民安堵待士和而有禮御下寬而不縱時奉旨丈量地畝所在驚惶文瑜立法詳密弊清而人不擾既去士民謳思竪德政碑於東門內嵗時父老子弟往謁其家者絡繹不絶仕至山東濟寧府知府後崇祀曹縣名宦祠梁鳳鳴梁鳯鳴漢軍正白旗人康熙元年任浙江糧儲道檢舊牘見屢年漕項積逋甚多力請題蠲以蘇民困徴收漕米禁苛索絶餽遺所屬便之又捐資瘞遺骸施醫藥士民感德崇祀名宦祠王宗聖王宗聖字象賢漢軍正白旗人康熙二年以貢士任尤溪縣知縣時土寇作亂田野弗治宗聖為剪􅍮棘芟草萊葺理城垣縣治譙樓以次修舉士民德之後崇祀名宦祠牛鳯翔牛鳯翔漢軍正白旗人任江西左協逰擊慷慨好施與士卒同甘苦平鄱陽湖寇以靖南康康熙十四年春瑞州新昌上髙諸縣為草冦竊據鳯翔提軍恢復凱旋日士民遮道泣留是嵗閠五月領兵援寧州過武寧值賊圍縣鳯翔率精鋭左右衝擊賊奔潰乘勝薄寧州遂復州城槩釋脅從矜恤殘黎地方寧輯冬十一月賊復圍寧州鳯翔守西門率前鋒出郭戰於馬洲射中渠魁賊不敢近相拒七晝夜城卒賴以全崇祀名宦祠馬光逺馬光逺漢軍正白旗人康熙十五年任袁州府同知兼管三關九圖麻棚等處時棚冦倡逆屠毒居民焚燒房屋光逺初入境遇流移數百人悉招回安輯之及受任召募鄉勇練習軍器隨大兵征剿賊首就擒羣寇悉平復遍閲鄉村搜剔餘黨盡驅回籍不許地方容隱凡陷賊百姓力為拯救生全者千百餘人時官兵駐袁米豆供應不敷光逺赴省買備軍需捐俸雇百艘親自押運赴袁不勞民力仍逐日運送行營支給軍糧民免騷擾袁民婦女多被虜掠復捐俸贖回給還本家事平後安輯強兵不得毁壞民房逐日巡查遍行營伍居民賴以保全嵗飢貸米散賑煮粥全活甚衆勸課農桑清理訟獄培養士類優恤軍丁州民無不感恩頌德因驅除棚冦溽暑奔馳得疾卒於任民皆哀號如失父母崇祀名宦祠陳運泰陳運泰漢軍正白旗人康熙十六年由監生知福建寧洋縣時逆藩耿精忠已降海寇未靖王師雲集運泰為民籌畫寬省徭役閭閻賴以蘇息明年山寇蜂擁攻城運泰親率家丁鄉壯擊走之民人咸得無害感念其德崇祀名宦祠裴振李裴振李漢軍正白旗人康熙十七年任陽山縣知縣時當逆藩吳三桂叛亂賊兵蹂躪城市荒蕪振李捐俸重建學宫設立東西義館延師教習文武生童咸感激向學縣城之南沿河居民稠集屢遭大水衝決振李為築隄堵障士民賴以安居流亡未復業者加意撫綏催科不急而民皆感奮輸將恐後二十一年在任病故士民愛戴不忘崇祀本縣名宦祠楊聲逺楊聲逺漢軍正白旗人康熙十九年任袁州府軍捕廳每逢朔望率屬宣講聖諭十六條無間寒暑字分句解使愚民皆能通曉風俗丕變每季課士品題甲乙多士奮興設立保甲稽察匪類萑符絶迹僉選運丁既公且慎不使互混纍民每聽訟必審酌情理判斷是非不事刑罰而爭端冰釋袁屬自甲寅兵燹之後田地多荒蕪聲逺設法招徠捐給牛種漸次復業二十三年升任民懷其德崇祀本府名宦祠滕天御滕天御漢軍正白旗人康熙十九年由監生任長沙府善化縣知縣時吳逆賊兵甫退民苦瘡痍天御操守清謹加意撫綏滇黔軍需多由長沙轉運天御度其緩急以應不使纍民又謙以禮士獄無留案二十二年卒於官民思其德崇祀名宦祠同旗有孫調鼎者康熙二十一年由監生任四川夾江縣知縣政平訟理治績稱最亦崇祀名宦祠董學詩董學詩漢軍正白旗人康熙二十六年知山西懷仁縣留心政事革重耗之弊免行户派纍立義倉以偹賑濟安巷柵以清盜源修學宫置犧牲齋戒亭設立義學造就生童置堂薄謹生員出入士風丕變二十八年大飢粟價騰貴勸諭富民設法賑救民無流離者蒞任三載去後民思其德崇祀名宦祠劉民瞻劉民瞻漢軍正白旗人康熙二十八年知山西沁州值嵗荒設法賑救全活無算升平陽府同知纍升至直𨽻正定府知府并著賢聲後崇祀沁州名宦祠同旗有董錦祚者康熙二十九年由廕生任湖廣竹山縣知縣修文廟設義學除浮賦多行善政以疾卒於官逺近感泣勒石紀德并崇祀名宦祠羅文現羅文現漢軍正白旗人世居奉天廣寧由廕生通籍纍任外吏康熙三十五年升分巡汝南道督飭州縣設立公所朔望宣講聖諭革除府州縣雜派差徭捐俸修葺子貢祠間以其暇備飲饌集諸生課文藝信陽州五十餘年無貢士應禮部試文現建奎星樓於學宫之左是年即有登科者又偹給牛種招民開墾荒田飭州縣嚴查保甲盜息民安聽訟詳慎鋤強除暴每於冬月捐俸施粥以恤飢民野無餓殍至今稱賢監司後崇祀名宦祠遲維城遲維城漢軍正白旗人康熙三十六年任福建福州府知府剛決善斷閩俗尚鬼多淫祠每嵗春秋之交寒暑間作蒸成疫氣愚民傳為瘟神五帝降罰行災妄以端陽日為五帝誕辰覡巫煽惑沿户科斂於所在妖宫行香設宴謂之獻夀有疾之家不延醫服藥糊舟建醮謂之祈禱鳴金擂鼓晝夜喧闐四民皆荒本業奔走若狂甚至市價騰踴資産耗竭又有所謂齊天大聖九使等廟維城痛懲其弊力請大吏禁止又親率民壯撲其像拆毁淫祠百十餘所陋俗始革而癘疫亦稀又詳分派八府公捐省獄囚米并給醫藥茶湯獄無瘦斃安插各省流犯聽其謀生免纍土著供給又捕姦匠製造假銀者除勢豪總行霸利立救火之法嚴禁匪類乘火搶奪善政甚多以勞卒官士民思之公請奉其神主與前明知府唐珣同祀於西湖書院後復崇祀名宦祠同旗有王帝臣者康熙三十六年任四川納溪縣知縣署瀘州知州纂修州志川省屢經兵燹文獻無徴帝臣殫心搜括集成一書士民德之去任後崇祀名宦祠金培生金培生漢軍正白旗人由中書升部曹外轉鶴慶府知府丁艱服闋補鳯翔府知府康熙四十年升分守潼商道振肅紀綱聽訟明決勤於公務案無積牘先是三十年大荒楚淮協濟陕西稻米屯積長安草灘年久陳朽督撫令潼關兵丁支領培生據實詳報稻米腐爛不堪給食請另行給發士卒歡呼頌德嵗旱禱雨甘霖立沛講釋聖諭崇重儒學修理城池四十二年聖祖仁皇帝西巡培生辦事明敏御賜五言詩一章四十四年升福建按察司老幼扳轅臥轍刻石記其政績尋轉布政司內升京堂未及還京卒於藩署後崇祀陜西名宦同旗有常名揚者康熙四十年任江南布政司朔望勤宣聖諭訓飭士子州縣徴解錢糧隨到隨收無稽留之纍居心愷惻鞭撲不妄加所屬有舉莭孝者即詳請題旌未合例者給匾奬之六十年士民公請祀名宦祠沈光榮沈光榮漢軍正白旗人由嵗貢考授七品筆帖式康熙四十年二月外任河南河內縣知縣在任朔望勤宣上諭諄切開導初二十六日單騎閲郊野集在鄉士民亦逐一宣掦寒暑不輟修葺學宫及名宦鄉賢各祠製樂器教樂舞生童慎重祀典催科以撫字為先不専務敲撲每逢比較設偹花紅盒酒飭令未完糧里長與完足分數里長跪而酌酒簮花披紅鼓吹導出大門減火耗革雜派口碑載道有親生父母之頌有萬北里錢糧完納分數寥寥詢知其地名李家窪所墾鹵地十數頃每年籽粒糊口不繼錢糧無所出居民日就逃亡即單騎踏勘招回逃民捐給牛種審度地勢别引溝渠開種稻田又將李家窪改名藏富村今家給人足每年錢糧限內全完又以衙胥多需索窮民一切詞訟令原告自拘隨到隨審有不得已公事必差遣胥役者按日捐給制錢不許取民一飲一食公事役民必厚給雇值驛馬草豆照市平買不纍行户每年春夏青黃不接之時百姓艱食必詳請出陳易新以濟其乏不時親詣厫房嚴飭倉書斗級勿得任手髙下多取纍民他如施藥餌施棺暑茶冬衣嵗以為常在任三載始終不衰去任後士民思之崇祀名宦祠遲維坤遲維坤漢軍正白旗人任聊城縣知縣每月三八日約諸生課文擇文行兼優者敬禮之賞賚有差士爭濯磨科名日盛每嵗三七月親詣田間賞閲隴畝見田禾茂盛者給酒食示勸荒蕪者薄懲之民爭力田野無逰惰查閲糧册積年逋欠各八百兩詢知由來知為蠧書飛灑虛糧並無田户承納每年纍及無辜代賠遂親赴省會白督撫以出首荒地補其虧空悉為改正民不受纍往時聊城有書手滚排之害臨清有挑夫滚排之害維坤具文申請每畝出錢二文雇夫應差上司是之飭各州縣俱奉為準則逃人嚴禁居停者多傾家兩鄰及地方人等亦受害株連維坤張示諭民凡逃人到日窩主出首者免罪自捐俸上解若係假逃立斃杖下於是逃人不敢入境聊城四方人民雜處多盜賊維紳凡有所獲按以定法知捕役招賊害民杖殺其尤者一人由是盜賊斂迹徴收錢糧令民自封投匱不設銀匠不拿短欠有蠧書盜封者重責枷示人心快服凡有呈告不受請託賄賂片言折獄民自無寃其勢豪土棍把持縣事及胥吏唆官罔上行私者維坤悉繩以法無少貸聊邑舊例凡衙門興作各行夫役不領工錢維坤革其弊一切匠役晝則給飯晚發現錢又官府所用器物向皆取之行户豫值僅十之三四衙蠧復中飽鬻者所得無幾維坤悉照市價頒發工啇俱感其德康熙四十七年崇祀名宦祠卞之釗卞之釗漢軍正白旗人康熙四十七年任浙江諸暨縣知縣邑漕糧多積逋之釗為設法墊解以紓民力五十一年嵗歉捐俸市米多設粥厰賑濟所全活甚衆民戴其德崇祀名宦同旗有劉宗樞字梅臣者康熙四十七年任福建尤溪縣知縣邑經兵燹多逃亡田荒糧存纍及陀人者悉為開豁又創立書院捐俸置膳田多購書以資誦讀民食其惠去任後崇祀名宦祠余三汲余三汲漢軍正白旗人初任湖廣黃州府同知持亷秉公百務具舉升本府知府未浹月改武昌知府時軍興旁午三汲才能肆應事集而民不病尋升本府驛盬道又升山東按察使廣東布政使卒崇祀湖廣名宦同旗有蔡琦者由部曹外轉江南驛鹽道正己率屬不通餽遺不受請託署理蘇松糧道定官收官兑之制禁加耗絶侵尅軍民便之康熙六十一年崇祀江寧名宦祠白璧琛白璧琛漢軍正白旗人由廕生任刑部員外郎升福建延津僉事道再升江西督糧參議道以卓異授廣東南韶道到任後澄清吏治禁科派簡徭役輯江灣盜賊安西山猺獞朔望親率僚屬及紳士耆民詣清平墟市宣講聖諭諄復詳明童叟咸知感激向善捐俸修葺學宫崇重文教季有考月有課凡品行端方學問淵深之士必加意陶成恩禮優渥一時人文蔚起多士奮興其餘修城垣減雜耗善政不可悉舉康熙六十一年崇祀名宦祠同旗有余三竒字秀臣者任湖廣攸縣知縣均賦息訟建竹林書院集士課文士民戴德亦崇祀名宦祠張素仁張素仁漢軍正白旗人任浙江海鹽縣知縣時值軍興供億甚煩素仁調度有方纎毫不擾在任十年賑恤荒歉革除陋規奬拔孤寒振興文教士民咸德之崇祀本縣名宦祠同旗有于文燦者由嵗貢任湖廣桃源縣知縣才識敏練操守潔廉清丈田畝闔邑共稱均平在任八載以才能擢守漢中府桃源人思其德公請崇祀名宦祠以上二十九人並舊志所載張國輔張國輔漢軍正白旗人由官學生任汜水縣知縣康熙三十二年正月蒞任明決果斷鋤強扶弱剔弊釐姦豪暴無不斂迹建義學置義田振興文教勤於訓士數十年來科目閴寂國輔精青烏家學於卧龍山重建魁星伏蛟山建文峰翠屏山建筆鋒以鎮之康熙戊子果雋禹生無間自後書升掄才者蟬聮繼起又革除里長修築城堤遍栽栁榆民獲安堵有古良吏風卒於官士民於廣寧書院設主祀之乾隆五年崇祀名宦祠髙士鐸髙士鐸漢軍正白旗人康熙三十年任河南桐柏縣知縣邑經兵燹土地荒蕪多方招徠給牛種勸開墾五年之中民人雲集商賈輻輳又捐修學宫雅意作人開鑿池塘以資水利增建倉厫以謀積貯至今旱潦有偹倉貯無缺士民德之秩滿升中衛同知乾隆八年崇祀名宦祠以上二人河南巡撫册報漢軍正紅旗外任官吳執中吳執中字匪公漢軍正紅旗人原籍浙江山隂國初始𨽻旗籍順治四年由貢生授官十二年纍任至福建漳南道僉事時漳州初附海寇逼近民多逃竄王師雲集而飛挽不至執中勞徠撫字握算持籌師無飢焉海濵民許茂等持首鼠兩端提督馬得功將盡屠之執中曰小民逼於寇患失身匪類茍善撫之皆吾民也且海澄厦門猶將諭其來降况近郊赤子乎得功大悟諸陷賊者聞之皆接踵至未幾海澄納欵以功遷山西副使道漳人祀之名宦祠子興祚仕至總督楊鶴齡楊鶴齡字三如漢軍正紅旗人順治七年以生員任歸化縣知縣會山寇竊發鶴齡諳韜略善騎射寇至則披甲先士卒冒矢石指麾防兵擊走之又捐資贖被掠民婦瘞埋枯骨旋調惠安縣知縣縣民戴之一如歸化焉卒後崇祀名宦祠黃龍黃龍字臥菴漢軍正紅旗人康熙元年由兵部武選司郎中授廣西梧州府知府九年升四川按察司副使分巡永寧道十年升江西按察使龍才識明敏而性慈祥職司刑名案無留牘獄無淹囚遇命盜重案必焚香告天然後出聽事至誠推鞫不事嚴刑而真情必得狡者無所藏其姦焉又嚴飭各屬毋濫刑設立循環二簿俾詳列夾訊狀按月查核闔屬遵之嚴寒酷暑優恤重囚於應給囚糧外加給日食獄卒凌虐尅減之弊不敢行又振興人才觀風課士取列優等者多給銀以資膏火其最貧乏者有加焉壬子鄉試解額五十九人而經其賞識首拔者三十餘人士子會試冬月長途風雪衣裝多不偹各贈裘價銀六兩士子德之江西素有溺女惡習龍特引律例示禁違者治以故殺子孫之條風俗一變養女者多以黃姑蘇姑名之每月朔望親至公所宣講聖諭勸誡諄切聞者感動在任與同官和𠂻共濟凡接見屬吏詢知地方利弊力為詳請興革吏民不率教者亦執法不寬假無不畏威懷德十二年四月以事去任還京士民罷市公懇督撫保留格於例不行為立碑於署前各為詩誦送行編曰江人淚二十二年八月以病卒三十九年崇祀江西名宦祠門可法門可法漢軍正紅旗人康熙三年任福建崇安縣縣丞四年署知縣事崇安苦水荒民多積逋可法力請題蠲無徴荒賦七千二百兩宿纍一清民沭其澤思之不忘卒後崇祀本縣名宦祠同旗有楊允昌者康熙二年舉人五年任陕西乾州知州在任政簡刑清輕徭薄賦繕城垣撫流民修學宫振文教十二年卒崇祀本州名宦祠王之紀王之紀漢軍正紅旗人康熙十三年逆藩耿精忠反之紀以筆帖式隨王師進剿十六年福建平定委知德化縣時海寇未平泉郡新復瘡痍滿野之紀簡靜鎮撫不事紛更平訟獄省興作民甚便之擢行人司行人去之日士民攀轅乞留不得祀之名宦祠吳延貴吳延貴字子良漢軍正紅旗人康熙十六年由廕生任福建泉州府知府十八年擢漳州知府時海寇未靖兵馬雲集流民失業延貴請設站運轉軍食因以給民巡海道陳啓泰之殉難也其子汝器陷賊中延貴重資購歸以軍功加一品服尋擢鹽運使去任後閩人祀之名宦祠朱天爵朱天爵漢軍正紅旗人康熙十八年由監生知山西稷山縣徴收一切地丁錢糧悉令花户自封投匱減火耗絶私派驛馬需用草豆向皆派民交辦天爵到任後俱發時價購買毫不纍民仍立石永禁會大兵過境人民驚惶天爵設法調停恬然無擾日用薪水俱發現價永除行户名色市㕓頌之清除幫役遵照經制留用從不濫差擾民又留心文教每於公暇傳集諸生討論典籍士子感悅奮興禁苞苴杜交際人不敢以私事干瀆嚴行保甲督捕役巡緝蒞任四年盜賊屏迹鄉城寧謐不濫淮詞訟間有情重準理或奉上批審事件隨到隨訊不令守候曲直立剖闔邑至今食德以卓異內升都察院經歷復外轉江西臨江府同知升山東兖州府知府稷山人思其德崇祀名宦祠同旗有楊竒烈者康熙二十四年由貴州按察使謫四川瀘州知州管收關稅正額外錙銖弗取商民稱亷崇祀本州名宦祠楊竒逢楊竒逢漢軍正紅旗人康熙二十四年由監生任山東滕縣知縣捐俸修理學宫季考月課士風丕振講約勸善嚴行保甲催徴有方賦無積欠吏罕侵漁遇編審親閲人丁優免老幼惠及窮獨嵗歉施粥濟飢城垣之坍闕者補之詞訟必察情實苞苴不行徴收漕糧除淋尖之弊市肆免雜派彭口河夫及河工所需栁枝舊俱灘派民間竒逢詳請豁免捐資募夫二百名應役勸民植栁於城壕以偹用後因與泇河通判滕縣典史等互訐離任民人思之奉主祀名宦祠王永名王永名漢軍正紅旗人由例監任三水縣知縣康熙二十四年初設花縣以永名調補時諸事創起鑿山填谷建城立學百務興舉招徠開墾防禦寇盜民甚德之卒於任四十一年崇祀本縣名宦祠劉德芳劉德芳漢軍正紅旗人由例監任東昌府知府勤於政事朔望必親詣公所率僚屬宣講聖諭積久不懈勸課農桑優禮齒德民情向化詳減梨棗棉靛四種額稅衆啇戴焉康熙二十九年春至四月不雨德芳步禱於顓頊廟還至中途甘霖大沛四野沾足重建聖廟及啓聖祠蓋造督學使者考棚設義學三處一在學宫一在七賢祠一在東關三義廟延師訓教各給膏火費其東關一學路苦泥水甃之以石至今便之三十年漳河暴漲遷邱縣受害尤甚買榖分運各村親往散賑三十二年水決皮家口晝夜督修隄城民慶有秋是年值飛蝗入境親詣八蠟廟虔禱蝗不為災府境西南窪下夏秋雨漲水溢為患申詳河道總督開通臨清月河以泄下流又修護城河隄增髙培濶親行按視務令堅固大堂夾道及各監厰更夫舊無工食特按名給銀六兩諸所建置皆捐俸為之不以纍民每年徴收錢糧必嚴飭州縣革除耗羡令明自封投匱一切陋規盡行禁革民樂輸將聽訟質獄平心訊鞫務得其情嚴飭保甲盜賊絶迹政事少暇即集師生論文課藝士風丕振四十三年升四川按察使讞獄平允修葺文翁石室為錦江書院擇民之秀者肄業其中課督有方廪餼無闕一時士子翕然向風是時打箭爐甫定茶鹽之政壅遏不行德芳籌畫徴收嵗無停引既卒民思其德四十四年崇祀四川名宦祠山東東昌亦祀之於名宦祠蘇昌臣蘇昌臣漢軍正紅旗人康熙三十年由廕生纍任至江西督糧道洞察江西漕政一切存倉轉厫淋尖踢斛等弊盡行革除正則之外不加顆粒凡地方緊急差徭悉設法捐銀雇覔不擾里民市㕓嵗終催趲漕糧冬兑冬開依限抵通刻期無悮其營兵食米按月給發從無愆期兵民俱霑實惠三十八年崇祀名宦祠蘇良嗣蘇良嗣漢軍正紅旗人任杭州府知府強幹有守骫法者鋤擊之不少貸益民之事悉心興舉杭民懷之勒石湖濵以志不忘康熙三十五年十二月崇祀名宦祠同旗有王育竒者康熙三十二年任四川瀘州知州革火耗嚴保甲課士撫民催科不擾民安盜息以報最內升州民思其善政四十七年亦崇祀名宦祠鮑復昌鮑復昌漢軍正紅旗人康熙四十三年任懷慶府知府以才能稱每逢朔望宣講聖諭諄諄開導五年如一日修理學宫捐己資鳩工毫無擾纍建亭立碑恭刻御製訓飭士子文會課諸生乙酉秋闈列賢書者多至十三人催科有方國賦以時完納屬邑皆邀議敘給散孤貧口糧親督六邑如數分給勸諭喪葬以時勤農桑鑿井偹旱濬城壕築河堤修理丹沁二水橋梁以便行人減定鹽價以培户口勸減當利以舒貧困凡先賢祠宇壇廟及沿途墩臺隘口柵欄并加葺治地方肅然加意撫恤貧民施棉衣施粥施藥餌棺槨六邑被澤康熙四十八年正月卒於官士民德之崇祀名宦其弟名復泰者亦有綜練才由廕生任台州府知府當兵燹後力謀生聚瘡痍滿野民賴以安亦崇祀本府名宦祠臧憲祖臧憲祖漢軍正紅旗人康熙四十五年任嘉興府知府甫下車值嵗旱勸諭富民無得閉糴又委官泛舟外郡市米平糶貧不能自食者發倉設粥厰賑之旁及湖郡飢民亦賴以活後以疾卒於官生平亷潔自矢卒之日囊槖蕭然士民哀之祀於名宦祠同旗有楊應魁者任分巡台州道布政司恭議時海寇叛擾大兵雲集台州應魁殫力搘拄乂安百姓以勞卒於官士民奉其主入名宦祠祀之門可榮門可榮字維光漢軍正紅旗人以恩廕授山東曹縣知縣下車剔除弊竇輸納錢糧皆令民自封投匱嚴革火耗雜派裁白夫陋規銀數百兩官俸役食加額給領行稅盡行革除明於聽訟事無株連集鎮鄉村終年不見差擾一薪一粒皆足價發買邑嵗苦河患蒞任之明年河南徙數里百年淪陷之地一朝變為桑田春雨雹多在城郭空地不甚傷禾既秋飛蝗蔽野皆穿田覔草食之有嘉榖一莖五穗者先是虎患甚多至是有四虎出境他徙人稱濟隂五竒曰雹不傷禾蝗不害稼虎不入境黃河逺徙榖莖五穗云後崇祀名宦祠以上二十人並舊志所載董宏毅董宏毅奉天正紅旗人康熙十六年任江西奉新縣知縣時新昌賊大至逼及縣城誓以孤身破賊隨任一子不暇顧家人携抱走匿親自督兵率戰手斬一人餘黨搜殺略盡賊失內應皆驚沮宏毅率民兵出戰發一矢先斃偽左將軍一人生擒六人斬首無算餘賊悉奔城賴以完又知山寇蔓延勢將復至捐募義勇親授陳法為戰守計賊萬餘踞邑城北獅山炮石雨下宏毅親率守兵殱其前鋒賊潰走乃呈稟分巡道李世昌領兵會剿身為前驅遇賊􅀈下搗其巢穴賊積忿怒環攻城邑大兵屯聚省會宏毅飛請協剿挺身先導與賊遇於邑之棉花池斬馘無遺賊悉平寇亂之後地方凋敝田皆荒蕪積逋纍纍請蠲恤錢糧得邀豁免百姓為之頓蘇以後漸興學校按季課藝士習一新去任之日士民號泣聲震數十里繪董公殺賊圖以獻官纍升至都察院左副都御史卒乾隆二十一年崇祀名宦祠以上一人江西巡撫册報欽定八旗通志卷二百三十七
