body:
  text: 欽定四庫全書欽定八旗通志卷首之十一勅諭五乾隆年間一乾隆元年正月二十二日上諭從前八旗世襲官員所領勅書内開載太祖髙皇帝尊諡之處尚有書寫太祖武皇帝者理應更正着該部行知八旗查明彚送内閣敬謹改正頒發又上諭易名之典古昔所重我朝賜諡尤為謹嚴亦有當時未蒙賜予而追諡於數十年之後者葢以事久論定協乎懿孝之公也皇考世宗憲皇帝風勵臣工肇舉賢良祠祀誠曠古鉅典其列祠者如一等公福善大學士魏裔介將軍佛尼勒莽伊圖都統馮國相尚書湯斌徐潮馬爾漢等其歿時皆有䘏而無諡朕思諸臣既與賢良之祀似宜邀易名之典其應否追諡之處着九卿㑹議具奏又上諭八旗䕶軍校驍騎校等多由兵丁挑補原係微末窮員遇有事故罰俸恐致養贍無資深可軫念嗣後伊等遇有罰俸案件不必即行全扣着每月扣除一半支領一半俾伊等尚得藉此半俸稍資用度以示朕體䘏旗員之至意乾隆元年二月十一日上諭八旗大臣等専任教養旗人之責理宜將該管官員兵丁不時教訓管理俾各遵循法度不可令其濫生事端任行匪惡比聞八旗人等每逢年節往往酒醉有在街道酗閙者正藍旗滿洲騎都尉徳保因酒醉見行路婦女亂行挑鬬曽經歩軍統領拿獲㕘奏已令治罪矣前此八旗有出派緝拿匪徒之章京兵丁等因於伊等親友内雖遇賭博酒醉者即瞻徇情面不行緝拿與伊等不睦之人反行搆釁誣賴捉拿此則徒有查拿之名而實無益故朕聴八旗大臣等議奏已行裁止此並非不令緝拿匪徒欲縱伊等胡為也乃旗下大臣等平日並不存心教訓而遇此等不肖匪徒又視為無與不行查拿懲治任縱伊等妄為是何道理著交八旗大臣等將此等匪徒應如何嚴加查管之處核議具奏乾隆元年二月十七日上諭北路坐臺人員朕已諭更換回京或其中尚有一二可用之才亦未可定傳諭該旗於伊等到京之日陸續帯領引見漢官著該部𢃄領引見乾隆元年二月十九日上諭諸伯叔之子嗣内應封者自按例晉封其不至晉封者若不擬與差使行走令其居閒安逸則一生不得出息徒至廢棄殊屬可惜向來近派宗室子孫有在侍衛章京等差使行走之例諸伯叔之子孫除應封者之外其餘如何令在侍衛章京等差使行走永逺為例之處着宗人府㑹同莊親王果親王分别逺近核擬議奏乾隆元年三月初九日上諭凡大臣中有引年求退奉㫖以原官致仕者均係宣力甚久素為國家優禮之人雖經觧組仍當加恩以示眷念耆舊之意現在滿洲大學士及曽為部院尚書予告在家者俱着照其品級給與全俸在京於户部支領在外該省藩司支領永着為例乾隆元年四月二十二日上諭八旗為國家根本從前敦崇儉樸習尚淳龎風俗最為近古迨承平日久漸即侈靡且生齒日繁不務本計但知坐耗財用㒺思節儉如服官外省奉差收税即不守本分恣意花消虧竭國帑及至干犯法紀身罹罪戾又復貽累親戚波及朋儕牽連困頓而兵丁閒散人等惟知鮮衣美食蕩費貲財相習成風全不知悔旗人之貧乏率由於此朕即位以來軫念伊等生計艱難頻頒賞賚優䘏備至其虧空錢糧已令該部查奏寛免其入官之坟塋地畝已令查明給還其因獲罪革退之世職亦令查明請㫖似此叠沛恩施者無非欲令其家給人足返樸還淳共享昇平之福也現在日與王大臣等籌畫久長生計次第舉行惟是曠典不可數邀亦不可常持而旗人等䝉國家教養之厚澤不可不深思猛省自為家室之謀即如喜喪之事原有恩賞銀兩自應稱家有無酌量經理乃無知之人止圖粉飾虚文過為糜費或遇父母大故其意以為因父母之事即過費亦所不惜不知蕩盡家産子孫無以存活伊等父母之心其能安乎否乎他如此等陋習不可悉數在已不知節省但希冀朝廷格外之賞賚以供其揮霍濟其窮困有是理乎嗣後務期恪遵典制謹慎節用勿事浮華勿耽㳺惰交相戒勉惟勤庶㡬人人得所永逺充裕可免窘乏之虞况旗員内之老成謹慎者可望擢用外任上為國家効力辦公下亦可得俸禄養亷以贍給家口倘伊等不知痛改前非仍蹈覆轍驕奢侈靡虧帑誤公則是伊等下愚不移自取罪戾不惟恩所不施且為法所不貸朕必仍前按律懲治不少姑息且朕今日所寛者即向日虧空官帑驕泰自恣之人也若不痛自改省謹遵法紀則将來不於伊身必於伊等之子孫又復罹追比之苦矣又何樂於目前數日之花費乎凡朕之所以諄諄訓誡者總為伊等預謀久逺生計八旗大臣等可通行曉諭官兵人等其各敬聴朕言熟思審計以無負朕之期望乾隆元年四月二十二日上諭廣儲司每年所收八旗滋生利銀俱支用不盡現今徒存庫内此項銀兩原欲滋生以接濟貧乏兵丁緩急之事今爾等将一年内所收若干兵丁每年喜喪事約計需用若干仍餘剩若干量其餘剩銀兩數目或施恩於現在應得賞銀之人加數賞給或於未食錢糧不在應得恩賞内之鰥夫及無嗣之寡婦人等喜䘮事賞給之處著内務府總管㑹同八旗都統等查明詳議具奏乾隆元年五月二十日上諭特古爾得爾係該旗所查能坐臺不能養贍䝉古奏准記名預備更換臺員之人今朕施恩俱加賜臺上蒙古錢糧各臺俱増設筆帖式令其管理臺務准給盤費是坐臺人員惟赴臺辦事並不需養贍䝉古又有何不能之處况塞爾弼奏稱特古爾得爾有房三十五間地八十畝奴僕十五口伊長子傅明係三等侍衛次子傅隆係親軍等語乃徼倖推諉不去坐臺是誠何心嗣後有並無房地奴僕而効力臺站者将如之何且坐臺亦係官差豈可推諉不去今塞爾弼等徇庇特古爾得爾伊為不能養贍䝉古又稱前任大臣等辦理糊塗請援恩詔免議将特古爾得爾不必發往坐臺等因濫行具奏此明係徇情䕶庇朦混具奏以徼倖於朕之不行察出其中不無情弊此風斷不可長特古爾得爾希圖免於坐臺妄行具呈情甚可惡著即催赴鄂爾坤軍前令在勞苦差役効力行走将伊子三等侍衛傅明革職令在粘杆上代伊父贖罪行走将塞爾弼徳敏交部嚴加議處因塞爾弼等愚昧無知是以如此治罪若爾都統等染如此習俱如此辦事朕必加重懲八旗大臣從前於一切事務俱辦理過嚴今見朕或有一事從寛又以朕為尚寛凡事瞻徇弛於辦理一切事務惟當循理折中何可狃於一偏即朕從寛之事亦理所當寛始從寛辦理並非似此瞻徇之事而亦從寛免也為此朕開導爾都統等曽屢次降㫖看來尚未能知将朕此㫖通行曉諭八旗嗣後仍如此瞻徇者朕必加倍治罪决不寛宥乾隆元年五月二十五日上諭據王大臣奏稱從前康熙二十三年舊例凡駐防各省官兵本身物故之後家口俱令來京其子弟内有披甲者亦革退發回後雖條奏以病故官兵之妻子若撤回京師贍養無資然仍不許在彼處安塟此正恐滿洲在各省安塟日久或失滿洲舊習且至與民互起争端是以定此條例阿里衮身為将軍不思滿洲舊例乃如此具奏殊屬不合著交部察議再滿洲等俱應居住京師其從前令滿洲官兵分駐外省者特為駐防耳遇有調遣之處心無牽連可即便啟行方為有益若今在彼處安設坟塋如遇調遣挪移必致永棄坟塋阿里衮身為将軍尚且如此具奏其屬下又當何論此皆依戀彼處竟忘滿洲舊習與君親之大義朕甚以為憂嗣後外省駐防官兵著照王大臣所議令送柩來京安塟如有不愿送京即在彼處安塟至日後遇有調遣情愿抛棄伊祖父坟塋者則是毫無知識之人亦聴其自便餘依議将朕此㫖通行曉諭駐防官兵知之乾隆元年五月二十八日上諭八旗生齒日漸繁庶而生計漸不及前朕日以旗人生計詳細籌畫雖欲利濟伊等生計於喜䘮事照常給與恩賞銀兩外屢次賞賜兵丁錢糧又降㫖查免欠項仍恐於旗人生計不能永逺有益今又飭查官房官地賞給以為産業但旗人甚衆雖行賞賚未能周徧從前禁止放債者特為利益旗人起見但伊等一時緩急借貸無門反出重息借用以家道艱難之人又出重息於生計尤為無益朕意逐名賞給不但國家有數之帑金未能徧及而於理亦不合再四思維從前設立公庫之時與旗人殊有禆益後因辦理不善假冒支領不能賠補以致虧空種種弊生是以停止今若仍前設立公庫於旗人是否有益及應否設立之處著總理事務王大臣確議具奏乾隆元年六月初六日上諭自雍正五年出征準噶爾以來大臣官員兵丁等俱各奮勉行間効力多年今大兵已撤軍務既定伊等内有殊勲偉績及急公効力者除已經施恩外如有復應施恩者著總理事務王大臣查明作何分别施恩之處議奏至於此次各處辦理軍需案内虧空之項因彼時正值辦理軍需不得不嚴是以俱著落追賠但此内情節輕重不一如情重應令賠補者仍行追賠外其情有可恕應行寛免者著總理事務王大臣亦查明分别詳議具奏乾隆元年六月十二日上諭從前八旗虧空著追人員荷蒙皇考格外隆恩屢頒諭㫖令各該撫查明奏請豁免嗣經臣工條奏請将欠帑人員之家産等項已經開報者不准寛免而八旗大臣及㕘領佐領等又復辦理不善種種紛擾以致恩施不能下逮此朕所深知者即位以來旗人生計時厪朕懐著将八旗應入官之房産地畝雖經報部而尚未估變及八旗已經估價而尚未交部者照前所降諭㫖分别情罪令各該處查明給還本人俾其執業特諭乾隆二年二月十九日上諭向來八旗補放司分章京俱係引見補放後因裁司遂将司分章京作為印房章京其引見與不引見之處並未聲明具奏皆從前㑹議此事之王大臣辦理錯誤嗣後印房章京著照舊引見補放餘依議又上諭向來禁止放債特為謀利之人索取重利於旗人生計無益乃不肖之徒反假以禁止恣意加増利息設法牟利而旗人愚昩者並不計其生理且不能曉其禁止本意只圗目前得使銀錢在下隱瞞偷借重利之債以至生理益加艱難朕因念其八旗世僕生計交大臣等核議已動支庫銀概行借給一年俸餉令諭一二年後再行酌量調劑今御史嫩布奏稱非止有借放重利債者又聞得有一項山東民人開鋪放債置買兵丁餉米圖取重利是旗人既不善生計且爾八旗大臣等又不将生計開示旗人明示禁止之由旗下貧窮人等因一時緩急之事是以重利借貸徒使牟利小人得計因循日久旗人生計益至窘廹甚屬無益朕意以為旗人所以情甘重利借貸者亦因困廹之所致與其令惡商徼倖何若八旗酌量每旗支給數萬銀兩以輕利借給以資接濟窮人緩急困廹即以伊等錢糧坐扣則旗人不待禁止自不以重利借貸矣但如此施行有無禆益是否得當抑或已經借給八旗人等俸餉暫看一二年情形後仍應照原議借給其如何辦理即於旗人永逺禆益之處爾等㑹同詳悉確議具奏此議若意見相同即畫一議奏若各見不同即將所見或二三人㑹同一摺或單銜具奏俱可乾隆二年二月二十日署都統事務和碩恒親王𢎞晊等議覆總理事務王大臣等所議收取地租以為貧乏兵丁恒産一案上諭從前入官旗人之地理應賞還旗人俾得生路但旗地與民地不同不便交部是以特交爾等八旗大臣辦理今爾等議稱入官地畝從前所定租額本輕徒致州縣吏胥中飽請派員前往另行秉公更定等語現在入官地畝之租較之民人佃種旗地之租為數實少而此項入官之地原屬旗地與民人交納錢糧之地不同雖經官定租額而百姓不知仍納重租以致吏胥中飽今因地定租固為允協但愚民不明事理或妄生疑意謂増添租額亦未可定夫旗人民人均吾赤子朕一視同仁並無岐待著交與直督出示曉諭若無從前弊端即令該督保題停止増添又議稱似此一定之後交與地方官按年照數收租解部等語夫年嵗之豐歉不齊如遇歉收之嵗仍照定數徵租則百姓未免受累其旱澇之年作何減收豐稔之年作何補納之處著各該州縣官隨年嵗之豐歉酌量辦理報明該旗仍報部存案以備稽察倘有藉端朦混不據實辦理者即著該旗該督查㕘又爾等議覆内稱查明京城空閒之地若可以葢造房屋即将所得租息葢造賞給無業貧人居住之處臣等詳加查勘另行具奏等語所議甚是朕為八旗無業之人不得房屋居住時為籌畫但未知京城有空閒之地今既有空地爾等可查勘明白議奏但葢造房屋若只動用今年之租則所得房屋無㡬若俟積年之租始行葢造則又致遲延現在圎明園原有優劣二營官兵居住之房爾等於查明空地議定葢造房屋之時即将此二營房屋拆用其運京脚價及葢造之費於今年租内動用賞給貧人居住之處詳悉籌畫議奏俟行之數年所有空地葢造已遍之後再將續得地租作何賞給旗人或另用於旗人有益之地臨期再行議奏至於爾等八旗選派前往查勘之㕘領等着帶領引見並傳諭總督李衛於伊所屬之同知等官内揀選八員派定旗分㑹同旗員與該地方官公同辦理餘依議乾隆二年三月二十九日上諭時值亢旱雨澤未降凡所以弭災之道俱應籌畫已屢降諭㫖矣今思婚姻以時王化所重怨女曠夫宜加優䘏現在八旗内務府兵丁閒散人等内男女有年二十八嵗以上或已經締姻力不能嫁娶或因家計貧乏并不及議姻者著每名賞銀十五兩以完其婚嫁之事其内務府壯丁有似此者著賞銀七兩其應用何項錢糧作何辦理之處著八旗大臣㑹同内務府速行詳議具奏乾隆二年四月初十日上諭前為八旗人等吉㓙事故之䘏賞銀兩一事經都統等議准如有冒領者閤族人等一概永不給賞是特因立法之初不得不嚴故如此定議今遵行已久理宜變通且一族之内有親踈之别不可一概而論因一人不肖闔族人等俱被牽連永逺不得沾恩情殊可憫嗣後如有冒領賞銀者除將該佐領驍騎校領催族長等治罪及冒領銀兩人等之子孫承辦者永不給賞之處仍照例遵行外其同居之伯叔兄弟及伯叔兄弟之子孫亦著永不給賞毋得牽連闔族乾隆二年四月十二日上諭向來包衣管領下女子不准聘與包衣佐領下人包衣佐領下女子不准聘與八旗之人葢因從前包衣佐領下户口尚少且男婦俱各當差恐人生規避之心是以定例如此今國家教養休息百有餘年生齒繁庶若嫁娶仍遵舊例則待字逾期在所不免今包衣佐領下婦人俱已免其當差並無可規避則嫁娶自毋庸分别八旗暨包衣佐領下人等俱朕之臣庶嗣後凡經選騐未記名之女子勿論包衣佐領管領暨旗下聴其互相結姻如此婚嫁以時庶不致有怨女曠夫矣著曉諭八旗内務府乾隆二年九月十五日上諭朕以八旗生齒日繁而生計不足日夜為之籌畫上年諭令總理事務王大臣悉心妥議隨經王大臣等議借官兵俸餉各一年分季扣還俟二年後再為酌量奏請朕思文官既給有雙俸武員亦給有隨甲似可敷用惟兵丁生計向來艱窘不無借貸之事上年借餉時多有償還舊欠者今若待二年後方行找借恐伊等目前艱難又復重利借貸有妨生計除在京官員及陵寢通州沙河兵丁等毋庸借給外其在京兵丁等著再借給餉銀半年通前展限二十四個月陸續坐扣俾得藉以經理度嵗之資爾兵丁等宜思國家之經費有常朝廷之賞賚有節務從儉約以仰事俯育共受國家之恩倘官銀到手快一時之意徒事花銷而不計将來之用度是既負朕恩又自取困苦矣思之思之著將此㫖通行曉諭並傳諭該部於閏九月給發乾隆二年九月二十一日上諭八旗䕶軍校驍騎校等原係食俸之員因欲令伊等用度從容故將俸項改給錢糧而遇閏之年不得與兵丁一體支領閏餉伊等於閏月用度未免拮据著於本年為始凡遇閏月照兵丁例一體支給閏餉乾隆二年閏九月初十日上諭荆州將軍衮泰因軍政屆期將年老佐領五十泰等七員照例請交部院議處查文員大計武員軍政有干八法者向來皆一體處分其中有年老一條例應休致朕思文職辦理地方事務非年齒遲暮之員所能勝任自不得不令解退若武員分防汛地操練營伍固亦需精力强壯之人但此内不無出兵數次曾經効力具有軍功者若概以年老照文員一例擯斥其情亦屬可憫況現今旗員以老告退查有軍功尚給與半俸此國家優䘏武弁之至意夫告退者猶且加恩而現任者遽行罷職朕心殊為不忍嗣後如遇出兵効力之將弁其年齒雖老而精力未至衰憊者或仍留原任或調補簡缺以保全其末路其如何定例之處著九卿㑹議具奏乾隆二年十月初二日上諭䇿楞訥親因伊母之䘮奏請守制二十七個月情詞懇切凡滿洲大臣官員遇有親䘮於百日之後即入署辦事者以旗員人少若皆守制三年則公事必致有悞亦出於勢之不得已也滿洲服制以百日為期今年朕因穆和林之奏特降諭㫖令滿洲大臣於二十七月之内不與朝㑹宴集之事而持服一節尚在交議未定但思滿洲官員及世襲等俱藉俸禄以贍其家口如皆令離任開缺無以為養贍之資其事亦屬難行雖人子之於親䘮盡哀盡禮以答劬勞之徳乃出於天性至情初不計及俸薪而朕養育旗人之意則不得不為之籌畫萬全今訥親之奏若抑令祗循舊制人子之心必有輾轉難安者其應作何斟酌分别守制俾公事私情俱兩盡之處著大學士㑹同九卿妥議具奏武職自副将以下向無丁憂之例今應如何酌量定制著一併議奏乾隆二年十一月初三日上諭今年近京地方有被水之處收成歉薄以致京師米價日漸昂貴朕心軫念多方籌畫内而八旗外而五城皆設厰平糶官米以濟民食乃近來市價仍未平減朕再四思維向來定例每逢嵗閏但増給兵丁月餉銀不給米石是以逢閏之年往往米價稍昻而今嵗尤甚者則以畿輔歉收之故夫漕糧闗係天庾出入皆有常制固難格外施恩輕為賞賚然於嵗歉米貴之時又當酌量變通俾兵丁等不致有貴價糴米之累用是特頒諭㫖將八旗兵丁借給一月米石其應於何時支領將來作何坐扣還項之處該部速行詳悉定議具奏乾隆二年十二月二十三日上諭從前恩賞兵丁生息銀兩濟其吉㓙事之用八旗原議内稱遇有䘮事之家如親祖祖母父母及妻室方准給與若子孫多者但視其應得之一人給與其餘子孫不得多領等語此並非為嫁娶而言也乃直𨽻各標錯認文意以為嫁娶之兵丁止賞長子長女其次子次女俱不在恩賞之列以致邇年以來恩澤不能普沾八旗並不如此辦理也直隸如此或他省有似此者亦未可定著通行傳諭凡兵丁娶媳嫁女無論長次均許邀恩况厯年生息已多公費諒無不足倘有不敷之處各該管大臣亦當酌量均匀料理之乾隆三年三月二十八日上諭八旗入官房産内其情節較輕者分别給還本主經朕節次降㫖其中有已經交官亦有尚未交官者不等因承辦處並未作速完結朕復降㫖諭令各該衙門查辦今八旗所有此等事件内有由户刑工等部行文將房産變價辦理者自應由該旗照例造冊咨送各部定擬辦理外其各該旗承辦入官事件若令各該旗查辦互相參差不一者著八旗大臣等概行造冊咨送刑部查明具奏如此則事有總辦之處易於完結至造冊送部因向無定限每至遲延今限期兩月如其逾限著將該管及稽查官員等一併交部議處乾隆三年六月初七日上諭從前皇祖聖祖仁皇帝時以陣亡士卒之妻孀居無所依頼曾永逺給食一半俸餉今八旗鰥寡人等内無子嗣無奴僕並無錢糧可以依頼為生者俱經加恩給與養贍錢糧但陣亡人等妻室伊等之夫為國捐軀而伊等又能貞節自矢情寔可憫理應優䘏著交與八旗將陣亡人等妻室内除有子嗣當差或有奴僕食糧尚可依頼為生者無庸飭查外其無子嗣或子嗣穉㓜又無家人並無錢糧可依頼為生者查明伊夫原係職官給食原品官一半俸禄米石如原係兵丁給食一半錢糧米石俾其終身永逺沾恩若陣亡之人並無妻室其父母别無子嗣並無錢糧可以依頼為生者亦照此例俾其終身永逺食一半俸餉以示朕優䘏為國報効不惜身命盡力疆場人等之意乾隆三年八月初三日上諭我皇考酬庸念舊特立賢良祠於京師俾我朝宣勞輔治完名全節之王大臣永享禋祀垂譽無窮寔自古未有之曠典也賢良大臣之子孫已登仕籍者固多其中或有不能自振漸就零落之人亦屬可憫朕仰體皇考厚待耆舊之盛心特加恩一次除現在入祠諸臣之子孫有文官七品以上武官五品以上者已經錄用無庸查奏外如子孫並無仕宦或有品級而甚属卑微者著該部行文各旗都統及直省督撫查係摘裔擇其品行材質可以造就者給咨送部帶領引見候朕酌量加恩乾隆三年八月初八日上諭八旗空地因令葢造房間據王大臣等原議八旗所有空地多少不等若令各按本旗居住房數不均俟全行完竣後令其就近均分擬定不過三間俾令居住等語今此項房間業經葢造成所若待全行完竣始行分住不惟將造成之房間置之空閑而於窮兵仍費價租房居住即全行葢造完竣時仍應合計間數均匀分給著八旗將現在葢成房間如何就近先行分住之處即行辦理再此項房間始有四千餘間今葢造一年有餘因何尚未全行完竣著管理工程大臣官員等作速葢造乾隆四年二月初五日上諭從前借給八旗文武官員一年俸銀資其生計原經王大臣等定議分作八季扣還以清庫項自乾隆二年春季扣起至本年春季共扣過五季尚有三季俸銀未扣目今京師諸物昂貴伊等用度未免拮据著將未扣之三季俸銀展為六季坐扣俾每季多領俸銀以資養贍該部可即傳諭八旗知之乾隆四年六月二十四日上諭從前挑取鷹狗拜唐阿選其家道殷實之人原為差使辛苦兼有喂養鷹狗之費非家道殷實之人不能當差因屢有勒索鑚營之事昨朕特降諭㫖今大臣等議以鷹狗之費既俱官為支給不拘何等人俱可充當若仍挑取家道殷實之人則藉此選擇勒索鑚營種種情弊難以禁止嗣後挑取拜唐阿著令情愿者挑取如此辦理其挑取拜唐阿之人以所得錢糧養贍家口亦可除其勒索營求之弊矣乾隆四年七月二十六日上諭旗人一切事件俱由本佐領出保原為禁止倖取冒報情弊乃有不肖領催等假此混行訛詐即如旗人一時窘廹變賣房地領催等必勒掯侵取得銀錢後方肯出保似此情弊至今未除不但於變賣房地之人無益且於人心風俗亦大有闗係夫佐領既有承管責任且於領催等相近自應將此等情弊訪察禁止不令擾累本佐領下人該旗大臣㕘領亦應不時訪查嚴行約束著八旗大臣等嚴行傳諭禁止仍不時訪查乾隆五年二月二十九日上諭八旗官員有平日指俸借支官銀以及抵買入官房地俱應指俸還項如該員遇有罰俸處分即應照數補交現銀此乃該員借用及置産之私項部旗理應按限催交無庸復從寛緩但念該員既罰本俸復措現銀併在一時未免生計拮据朕心軫念用是特降諭㫖嗣後罰俸之旗員如有應扣之襍項銀兩著照舊按數坐扣俟完項之日再行扣罰俸銀若扣還襍項之外尚有餘俸即將餘俸陸續扣足所罰之數不必勒補現銀至該員所罰之俸未經扣完之日亦不許再行支借别項銀兩如該員遇有䘮事仍准照例借四個月俸銀亦著展限扣還該部該旗可即遵諭行乾隆五年四月二十七日上諭奉恩將軍著積善承襲今見滿洲名字單寫者甚多此摺内宗室文新名字理宜聫寫而二字單寫竟似漢人名字至於宗室望瑞名字不但不可聫寫且竟成漢人名字矣宗室俱如此命名是何道理著交宗人府查察應訓飭者訓飭應更改者更改並傳諭八旗乾隆五年五月二十五日上諭今部院各將本衙門不能辦事年老官員查奏休致朕思旗人俱賴俸餉度日一經休致必致失所殊非朕愛養旗人之意武職官員因老病不能行走休致者視伊勞績或賞全俸或賞半俸以養餘年今查令休致文員俱係現在行走之人並非年老全不能行走之員雖不能在部院辦事若委以旗下看守坐堆之事尚能行走且藉此得俸養贍可以不致窮困著將此等休致文員交與各該旗大臣照伊原官品級與武職官員一例給食俸禄暫令在旗下當差行走俟伊本旗歩軍校及看守壇廟尉吏城門尉缺出即對品坐補乾隆五年閏六月十三日上諭昨據户部㑹同都統等議定條例八旗秀女年已及嵗閲看後再令出嫁若閲看時遇有事故不及閲看候下次閲看其未經閲看之秀女雖年逾二十不准擅自出嫁朕思秀女三年一次閲看若閲看時有事故遲悞及下次閲看時又有不便閲看事故則二三次候至數年有悮婚嫁之事嗣後閲看秀女時遇有事故不及閲看之秀女内年未及嵗尚可候者著候下次閲看若十八嵗以上至二十嵗之秀女閲看時遲悞不及閲看者著該旗都統等查明遲悞緣由請㫖具奏或補行閲看或即令出嫁之處另降諭㫖乾隆五年閏六月十五日上諭前曾定八旗事件及引見官員亦照六部例三月一次彚奏今各旗雖遵例具奏但無専司稽查之處仍不免有將遲延事件作為限内完結將違悮事件妄行推託等弊今稽查欽奉上諭事件處係専司稽查各部院八旗事件之處部院事件既由内閣按月稽查具奏其八旗事件著交稽查欽奉上諭事件處照内閣例詳悉稽查仍三月一次彚奏乾隆五年七月初六日上諭朕為旗人生計叠沛恩施復為伊等謀永逺之益將賞作公産地畝准令貧乏旗人承買以為恒産今聞不肖之徒承買此項地畝祗圖目前微利竟有私行典賣與旗民者朕將作為公産地畝降㫖准令無産貧乏之人承買者原欲令伊等得永逺生業之資理應仰體朕為伊等詳籌之至意各自圖維將承買地畝不致花費即作恒産以為生計若祗圖目前之利輙将地畝私行典賣與旗民則不能獲永逺之益殊違朕為旗人詳籌永逺有益之深心爾等縱不念及永逺生計亦當思朕施恩之處不應如是而忍為也外省地方官事務繁冗尚知愛養百姓保如赤子旗人無多管旗大臣所辦事務亦復甚簡惟教旗人是其専責宜如父兄之愛子弟於伊等生計留心籌畫以期永逺俾益朕為旗人等籌畫無微不至而管旗大臣反視為膜外此事朕已聞知伊等尚若㒺覺有是理乎若云並無此事朕何由得聞如将私賣地畝之人降㫖指出則必将售買者俱以違制治罪併及該管大臣官員是欲求有益而反因此以治伊等之罪非朕施恵軫念旗人之意矣著傳示八旗通行曉諭務令伊等仰體朕心各圖生計将承買地畝斷不可顧目前之利私行花費即為恒産以為生計交與該管大臣官員将此等私買地畝不肖之徒嚴加查禁若禁而不遵奏明治罪務将旗人視如子弟留心愛養不時教訓俾令各知永逺生計以至豐裕斷不可仍前漫不經心茍且怠忽特諭乾隆六年二月十五日上諭著傳諭海旺所有八旗内務府秀女挑選時大臣官員等家尚有車輛其兵丁人家秀女俱係僱車乘坐嗣後挑選秀女不論大臣官員兵丁人家秀女著每名各賞給銀一兩以為僱車之費所有本年選過秀女俱著補行賞給此項賞銀八旗著動支户部庫項内務府著動支廣儲司庫項乾隆六年十月初八日上諭八旗人等喜䘮事故賞給恩賞銀兩者原欲使旗人有益得沾實恵之意因後有冒領者始定以冒領銀兩人子孫同居之伯叔兄弟併伊等子孫俱永不給與恩賞銀兩此亦所以懲戒欺㒺之人也但此内有知情者有不知情者如果係明知冒領恩賞銀兩自當照例完結若並不知情因一二不肖者混行冒領即将伊等伯叔兄弟一併株連至於子孫俱永不得沾恩稍為過甚亦不合朕恵濟旗人之意嗣後如有冒領銀兩者將同居知情之人照例永不給與恩賞銀兩若係實不知情不必将伊等株連照常給與恩賞銀兩其如何分别辦理定例之處著交八旗大臣再行詳議具奏乾隆七年四月二十六日上諭八旗為國家根本凡有教養之處朕無時不繫於懷著各旗都統副都統等悉心籌畫或有益於生計或有益於風俗者各抒所見繕寫交與大學士彚齊之後著大學士㑹同各都統詳加斟酌擇其果有禆益者公同舉出抑或有益於目前而将來不無流弊抑或初行似屬未便而厯久可漸收其效者一併舉出彚奏候朕採擇施行乾隆十年四月二十日上諭朕前因旗員終養回旗原與漢人回籍不同是以降㫖嗣後終養之員令各該處帶領引見量與差使此朕體恤旗員之意也但前㫖内有嗣後字様則該部辦理在奉㫖以前者不得帶領引見一體邀恩著吏部查明奉㫖以前如有終養之員亦著各該處帶領引見乾隆十年六月二十一日上諭催追拖欠利銀旗人不無苦累特施恩俱從寛免其追賠如恩賞紅白事銀兩有不敷之處着動廣儲司存貯滋生銀兩應用餘依議此項滋生銀兩特為接濟八旗兵丁紅白事以偹賞賚者承辦大臣果能辦理妥協何敢拖欠遲悮今同領此銀承辦數旗内鑲黄鑲藍滿洲旗分既不拖欠利銀又不苦累旗人鑲黄漢軍等數旗辦理不善将恩賞偹用銀兩拖欠遲悞復苦累旗人著落賠補此次朕特施恩俱從寛豁免嗣後該旗大臣務湏盡心斟酌不致悞兵丁紅白事賞銀復不苦累旗人妥協辦理斷不可希兾朕之施恩仍以從前草率辦理再此摺字畫錯落數處不合承辦該旗大臣著交部察議乾隆十年十一月初八日上諭看來在京八旗官員遇有䘮事准借四個月俸銀料理甚屬有益福州駐防官員著照将軍新柱所請准其借給其坐扣之處亦照京師一體辦理至各省駐防官員亦照此施行若藩庫相隔遥逺或將該處存貯别項銀兩或將錢糧衙門存貯銀兩即先行動撥借給餘依議乾隆十年十一月二十八日上諭現新年在邇旗人用度必多繁費著將八旗包衣佐領下兵丁支借今年所闗明年正月錢糧内應扣庫銀本利一項施恩寛免至射歩把記名人等既邀朕恩賚著不必算入此内朕施此恩原欲兵等稍有禆益倘不體朕愛養之心見有此得項妄行奢侈不理生計冀邀恩賞不惟負朕施恩之意即國家錢糧俱有定數亦不能為爾等頻加賞賜也将此著交該管大臣通行曉諭兵丁等知之乾隆十一年二月初二日上諭從前将八旗承襲佐領職官房分一事特派王大臣等查辦嗣於王大臣等酌定章程辦理後餘俱降㫖令八旗都統等陸續行察隨來隨辦矣但當月旗分並不迅速辦理惟躭延至交月時奏交接月以圖塞責是以朕特降旨諭令伊等循例速辦今當月旗分雖已奏辦一二事件其餘未完者尚有京城承襲佐領職官事十二件外省佐領職官事七十四件此皆由該都統等並不實心辦理了草行察託故躭延所致當月旗分雖係彚總承辦然行察時仍由各該旗辦理即外省之事亦統之於京城八旗其當月大臣等俱係八旗都統内出派伊等如各奮勉辦理將各旗應辦者實力辦理其當月都統等又作速完結至行察外省者並趕𦂳催令完結則何至有躭延耶將此著嚴行申飭八旗都統等此等未完事件京城既已無多即作速完結至行察外省該旗亦應按照定限察有逾限者即行㕘奏交部察議斷不可仍前互相推諉以至躭延乾隆十一年閏三月初三日上諭從前将八旗試班人員定為一年内作一週引見今事簡之日該都統等亦並不帶領引見意皆積至年終始行帶領引見若於事簡時即陸續奏請引見其引見人員既不至壅滯而一年之内亦可完竣一週将此諭令該都統等知之乾隆十二年正月初七日上諭清語乃我朝根本要務近見清語中雜以漢語語熟成風遂将可以繙清者亦仍用漢語而書於奏章者往往有之朕隨所見即為改正復派大臣詳查更正即如部院名内内閣各部俱繙作清語或未經繙譯仍用漢語書寫者尚多况宗人府通政司等衙門並非不可繙譯者葢因從前未甚詳查以致因循忽畧宗人府著即繙為管理宗室衙門其餘衙門司分内或因地方省分命名不便繙清必用漢語無庸更改外其尚可取意繙清者著滿洲大學士㑹同部院滿洲大臣繙譯具奏乾隆十五年三月初九日上諭漢軍人員選補州縣舊例迴避直𨽻地方乃逺嫌避勢之意邇來直𨽻州縣間有滿員補用者揆其所由從前州縣原未補用滿員是以止定漢軍之例今既用滿員而未議及迴避自屬辦理疎漏朕思州縣親民之官五百里内旗庄地土鱗次接壤訟詞案件動相闗渉自不便用滿員嗣後漢軍仍照舊例迴避直𨽻其滿洲人員著迴避五百里以内所有現任人員著該部查明另行請旨其道府同知等官統轄之員雖非州縣可比但本員莊地有在所轄之内者亦屬未便若報明該督奏請調補盛京州縣今已概用滿員其中有莊地在本境者亦著於部内呈明另行扣補著為例乾隆十五年六月十七日諭㫖王大臣等從前因於八旗人等紅白事件有益經皇考特恩動用庫銀飭令諸王等滋生㣲利以備賞賚之用因諸王等辦理有所畏難朕交各旗大臣等辦理而各旗大臣等理應或置買賣開設當鋪或典買房地以取租息乃各旗大臣等並不深為籌畫只圖辦理簡易就其便利全行借放與八旗人等以所出利息以賞旗人不惟不能於旗人有益久之子母相權於旗人生計反覺有碍旗人但顧眼前之用指一人之俸借用數處銀兩而得全俸者少矣滿洲世僕所仗者俸禄錢糧若無俸禄何以為生乃屢因八旗人員辦理滋生銀兩於國體亦屬不合嗣後将八旗人員支借滋生銀兩概行停止所有紅白事件賞需之項着加恩由長蘆兩淮鹽課閒欵銀兩動支賞給但八旗官員等遇有紅白事件無一借貸之處又至窘廹即不免借貸重利著交宗人府於滋生銀兩如何限定數目借給及八旗已支借本銀如何展定年季陸續收納其餘剩開設當鋪典買房地所得利息租價當作何辦理之處著宗人府八旗大臣等詳議具奏至管理旗務王大臣等皆有教養旗人之責務湏仰體朕加恩體恤旗人之意各将所屬官兵善為訓勉所有一切俱以節儉為本守分安常其飲酒賭錢借放重債之徒嚴行查拿務期實效盡力辦理以副朕曲加軫念旗僕生計之意特諭乾隆十六年閏五月十五日上諭據鑲黄旗滿洲旗分奏墨爾根之副都統謨爾泰呈請将伊子帶往任所等語但各省駐防將軍副都統旗員等並非辦理地方事務之文職大臣官員等可比嗣後伊等子弟内如有已及年嵗情愿帶往隨任者皆聴其自便該旗不必奏請乾隆十六年十二月初一日上諭八旗都統等辦理事件往往遲延雖有當月大臣等承總辦理諸事率皆推諉成風一味茍且塞責一月期滿移交接管旗分即為完其伊等之事並不盡力辦理此習甚為可惡於事無益嗣後著停止八旗都統接次當月朕特派出數員一年一次輪班值年其出派時不計旗分該部都統將八旗都統副都統等職名繕寫進呈朕酌量出派伊等於各該旗章京内揀派妥員承辦八旗一切應行彚辦事件至年終時將一年之内已完若干未完若干逐件繕摺奏聞即可知其盡力辦理與否矣永著為例乾隆十八年七月二十九日上諭滿洲風氣素本純厚皆秉忠義之性向不知書籍自我國寰宇一統始習漢書皇祖聖祖仁皇帝特軫念不識漢字之人使之博古有益身心是以繙譯經文四書通鑑等書刋刻頒行兹查不肖之徒並不繙譯正書反将水滸西廂記等古詞繙出導人於不善相傳看閲甚有不通漢文者並将小説亦照漢字之音以单清字音出互相𫝊看者此等荒誕之書不惟無益而流移滿洲風氣亦皆由此如愚民惑於邪教比昵匪人大半亦因看視此等荒誕書籍之故寔有闗於滿洲舊習不可不嚴行飭禁著交八旗大臣及東三省將軍各駐防等處將軍大臣等除奉官繙譯刋刻舊有繙譯三國外其私行繙譯清字小説俱著嚴行查禁現有者搜獲焚燒並交步軍統領將租賣此等之書亦著嚴加禁止將現有板片盡數銷毁勿得存剩倘不盡心察查無知之人藏匿一經查出惟該大臣等是問乾隆十八年九月初二日上諭現在外任八旗大臣官員皆係滿洲世僕伊等身受朕恩擢用外任不能盡在内廷當差理應將伊子等著令來京挑取各項拜唐阿代為効力況伊等之子挑取拜唐阿後如果行走勤勉又可挑取侍衛補放官職且隨從朕之拜唐阿已甚榮耀伊等倘不念其大者惟以伊等之子在拜唐阿上行走視為苦差必欲避居任所閒散安居躭於逸豫遂至終身不能長進必致廢棄亦不合滿洲舊習嗣後外任大臣官員内除止有一子准其留住任所外其有二三子者只許留任一人其餘諸子年及嵗時俱遣令來京挑取拜唐阿如有四五子之人若亦只准留一人餘者俱令在拜唐阿上當差當差之人過多亦不免耗費著伊等酌量留任二三人餘令來京挑拜唐阿此特朕教養旗人之至意伊等倘不知此如遇挑選拜唐阿時又復托故規避是不知朕之恵愛滿洲臣僕之恩矣若将此軰挑取阿哥哈哈珠色此斷不可何則伊等俱係外任将伊等之子挑取哈哈珠色親隨阿哥則不免有請托營求轉生事端所有挑取阿哥哈哈珠色之處著停止餘依議乾隆十九年九月十二日上諭朕奉皇太后鑾輿由吉林前詣盛京恭謁祖陵所至地方多有年逾耄耋策杖歡迎者宜沛恩膏以彰盛典其奉天吉林所屬旗民男婦自年七十以上悉照從前恩詔之例分别賞賚用示朕引年優老至意乾隆二十年十一月二十日上諭向來滿洲名氏惟取清話之與漢字對音者書寫漢字不得依附漢姓故意牽混從前屢次曉諭上年因䝉古有以甘珠露命名者復令降㫖訓飭并諭吏兵二部旗員中凡有似此者令悉行改正乃今日兵部進呈本内有喀爾吉善題請都司之何督一員初意其為漢人及閲該員履厯則係鑲黄旗滿洲人伊既係滿洲出身或和或赫何字不可書寫乃必牽混漢姓此種陋習斷不可長著再通行曉諭嗣後倘有仍前混寫者必當重懲其罪何督著送部引見欽定八旗通志卷首之十一
