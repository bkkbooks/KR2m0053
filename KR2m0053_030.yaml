body:
  text: 旗分志十六八旗佐領十六鑲藍旗滿洲佐領鑲藍旗滿洲佐領上一㕘領至三㕘領鑲藍旗滿洲都統所屬㕘領五第一㕘領下佐領十八第二㕘領下佐領十八第三㕘領下佐領十八第四㕘領下佐領十八第五㕘領下佐領十七第一㕘領第一佐領原係國初編立之半箇牛录漢文稱佐領始以碩翁科羅巴圖魯安費揚古之長子碩爾惠管理碩爾惠故以其子孫塔管理康熙三年因人丁滋盛編為整佐領仍以孫塔管理孫塔故以其子馬世泰管理馬世泰年老辭退以其子吳爾吉管理吴爾吉年老辭退以其子徳懿管理徳懿故以其叔髙祖之三世孫富敏管理富敏故以其伯髙祖之四世孫達桑阿管理達桑阿故以其子扎爾杭阿管理第一㕘領第二佐領係第一佐領内餘丁康熙二十三年馬世泰管佐領時分編一佐領以其叔父之子法賽管理法賽故以長禄管理長禄故以其伯曾祖之孫關新保管理關新保故以三等阿達哈哈番漢文稱輕車都尉翁義管理翁義故以其叔髙祖之孫明代管理明代故以其伯祖之三世孫徳寧管理徳寧故以其伯祖之孫書錦管理書錦故以其孫徳通阿管理第一㕘領第三佐領亦係國初編立始以安費揚古管理安費揚古故以其第四子阿爾代管理阿爾代從征陣亡以其子都爾徳管理都爾徳故以其子伊圖管理伊圖陞任布政使以其兄西布管理西布故以其子常夀管理常夀故以其弟常在管理常在故以刑部員外郎額爾貝管理額爾貝縁事革退以其伯父之孫傅喇禪管理傅喇禪縁事革退以二等侍衛徳玉管理徳玉故以其伯曾祖之三世孫文格管理文格故以其子蘇成阿管理蘇成阿故以其叔髙祖之三世孫書麟管理書麟陞任以其叔髙祖之二世孫七海管理第一㕘領第四佐領係第三佐領内餘丁康熙三十三年常在管佐領時分編一佐領以其叔父之子郎中額爾徳管理額爾徳縁事革退以監察御史朱滿管理朱滿縁事革退仍以額爾徳管理額爾徳故以其子額爾格圖管理額爾格圖故以其伯祖之孫鐘音管理鐘音故以其叔髙祖之四世孫巴彦都管理巴彦都故以其孫伊立布管理第一㕘領第五佐領係國初以杭嘉地方来歸人丁編立始以託恩多巴圖魯穆克坦管理穆克坦從征陣亡以其子一等阿思哈尼哈番漢文稱男愛音他木管理愛音他木因病辭退以其兄温察管理温察故以其子翁靄管理翁靄陞任西安副都統以其子副都統薩賴管理薩賴年老休致以其子薩克新管理薩克新故以其叔父之子副都統世圖管理世圖故以其子富成管理富成故以其髙祖之孫法來管理法来故以其子萬徳管理萬徳故以其子徳盛管理第一㕘領第六佐領係第五佐領内餘丁康熙二十三年薩賴管佐領時分編一佐領以其叔祖之子偏圖管理偏圖故以其子拖沙喇哈番漢文稱雲騎尉兼䕶軍㕘領諾敏圖管理諾敏圖故以其弟二等精竒尼哈番漢文稱子永泰管理永泰故以其叔祖之二世孫寧徳管理寧徳故以其伯髙祖之二世孫富勒賀管理富勒賀故以其叔曾祖之三世孫成玉管理第一㕘領第七佐領係國初以完顔地方来歸人丁編立始以特因柱管理特因柱故以其子鐸備管理鐸備從征陣亡以其弟鄂特琿管理鄂特琿故以其子班部禮沙管理班部禮沙縁事革退以其子魯保管理魯保故以其子武徳管理武徳故以其子巴賁管理第一㕘領第八佐領係康熙二十三年以第七佐領内滋生餘丁編立始以班部禮沙之弟四十八管理四十八故以其兄之子呼郎阿管理呼郎阿故以班部禮沙管理班部禮沙故以其孫索秦管理索秦革退以其弟散平管理散平故以其兄之子六十八管理六十八故以其子富常阿管理第一㕘領第九佐領係第十二佐領内餘丁康熙二十三年色特管佐領時分編一佐領以其叔祖之孫托凱管理托凱年老辭退以其子馬喇希管理馬喇希因不勝任革退以其弟阿蘭泰管理阿蘭泰故以其曾祖之三世孫明善管理明善故以其子忠禄管理第一㕘領第十佐領原𨽻正黄旗初以一等侍衛衣都章京漢人稱侍衛班長查里哈管理查里哈故以其子侍衛查布圖管理查布圖年老告退以烏莫訥之子董國立管理雍正八年撥𨽻本旗仍以董國立管理董國立故以其伯父之三世孫博麟管理博麟故以其子延喜管理第一㕘領第十一佐領初係汪善管理汪善故以其子番察管理番察病退以其伯父之孫蘭泰管理蘭泰故以其叔父之子圖蘭管理圖蘭故以其弟圖魯管理圖魯因病辭退以其子圖丹管理圖丹故以其子華顯管理華顯陞任巡撫以其子隆昌管理隆昌縁事革退以其兄徳進管理徳進縁事革退以其族弟尼雅哈立管理尼雅哈立故以其叔祖之二世孫懐玉管理懐玉故以其子明善管理明善故以其伯父之孫恒祥管理㫖改謹案此佐領扵乾隆四十五年奉為公中佐領第一㕘領第十二佐領係第十一佐領内餘丁康熙五年圖丹管佐領時分編一佐領以汪善之孫色特管理色特故以其子烏達力管理烏達力故以汪善之弟烏巴泰之孫三等阿達哈哈番西徳琿管理西徳琿故以色特之子圖爾徳赫管理圖爾徳赫縁事革退以覺羅西平管理西平故以其伯曾祖之四世孫成禄管理成禄故以其叔髙祖之三世孫恒平管理恒平故以其髙祖之四世孫百善管理第一㕘領第十三佐領係國初以葉赫地方来歸人丁編立始令固山額真後改固山按班漢文稱都統䕶什布管理䕶什布年老致仕以其孫穆和訥管理穆和訥故以其弟巴薩里管理巴薩里故以其子巴齡管理巴齡故以其伯父之子大受管理大受故以其子格爾古朗管理格爾古朗革退以其伯祖之二世孫佛保管理佛保故以其叔父常格管理常格故以其子富興管理富興因罪發遣以其叔曾祖之二世孫那英管理第一㕘領