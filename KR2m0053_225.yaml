body:
  text: 欽定四庫全書欽定八旗通志卷二百十一人物志九十一忠義傳三滿洲八旗三八年共七十四人順治元年至昻錦昻錦滿洲鑲黃旗人姓傅察氏世居訥音天聰八年隨大兵征大同攻王家莊先登有功授雲騎尉崇德元年五月同俄屯往征瓦爾喀部落克之獲男婦並牲畜無算又同副都統阿拉善設伏擊敗明寧逺兵順治元年十月隨揚威將軍豫親王多鐸南征破流賊平定河南江南十二月至潼關流賊率兵自山上來犯昻錦奮力迎擊中箭死之三年議恤恩賜騎都尉兼一雲騎尉世職承襲詳見世職表哈爾漢哈爾漢滿洲鑲黃旗人姓佟佳氏世居佳喀地方崇德六年隨大兵圍明錦州其騎兵方來犯我紅衣炮營同參領旦代擊敗之順治元年隨大兵入山海關同葉克舒擊敗流賊馬步兵旋從靖逺大將軍和碩英親王阿濟格追至延安府率甲士四十人駐南山賊率馬步兵來犯力戰以創重死恩賜騎都尉世職承襲詳見世職表多頗羅多頗羅滿洲鑲黃旗人姓瓜勒佳氏二等輕車都尉索海之子任佐領順治元年從入山海關同𠫭領傲德步戰破流賊追至望都以功進騎都尉世職七年九年三遇恩詔加至二等輕車都尉又敘其祖費英東扎爾固齊之功加為一等輕車都尉仕至副都統陳亡覺羅登什科覺羅登什科滿洲鑲黃旗人官散秩大臣順治二年奉命統兵征流寇至天沙山遇賊衝擊厯晝夜不挫遂拔其營尋遇伏中鎗殁恩賜一等男世職承襲詳見封爵表瑚密嗇瑚密嗇滿洲鑲黃旗人姓佟佳氏世居加哈地方初任佐領駐防於天瑞山崇德三年從武英郡王阿濟格征明率四旗前鋒屢擊敗於昌平又率八旗前鋒略遵化偵蘆溝橋俱報捷焉九月從和碩睿親王多爾衮攻松山擊敗祖大夀步兵七百四年同納海等略杏山時有陷於陳者援之出以纍功恩授騎都尉七年十月從大將軍阿巴泰攻豐潤擊敗范軍門兵八年進攻青州同鄂碩為前驅擊敗趙軍門兵復擊明將司馬獻兵至渾河造橋以渡范軍門復同吳總兵率兵躡我後又敗之順治元年從和碩睿親王多爾衮率師至山海關擊流賊又從和碩英親王阿濟格由安肅至望都斬賊步兵幾殱焉瑚密嗇力戰輒為前哨功最著加授一雲騎尉愈知感激爭效前驅從和碩豫親王多鐸破流賊於潼關時我兵據山頭賊設伏連敗之三年五月從平南大將軍多羅貝勒勒克德渾征明唐王朱雲釗六月至浙江擊偽大學士馬士英於杭州生擒總兵一人復擊偽總兵方國安於錢塘中鳥鎗殁於陳議恤恩賜二等輕車都尉世職承襲詳見世職表拖紐拖紐滿洲鑲黃旗人姓富察氏世居訥殷江地方襲騎都尉世職崇德三年隨揚威大將軍多羅貝勒嶽託征明同舒恕敗馬總兵軍至渾河為橋以渡明兵來躡我後拖紐隨副都統訥爾特擊敗之後出關殿後敵兵來追復帥夲旗兵敗之順治元年從大兵入山海關擊流賊中炮陳亡恩賜雲騎尉世職承襲詳見世職表古郎阿古郎阿滿洲鑲黃旗人姓李佳氏世居李佳和羅地方順治二年以護軍校從和碩英親王阿濟格征流賊至延安府賊兵來犯隨護軍統領希爾根擊敗之進圍承天府連敗賊衆獲戰艘無算三年從靖逺大將軍和碩肅親王豪格征四川流賊十一月至三賽山隨希爾根擊敗賊將髙汝礪兵賊渠張獻忠率全師迎戰我師同胡里布擊敗其衆又遇賊兵馬三路來犯率本參領兵奮勇進擊中流矢陳亡恩賜雲騎尉世職承襲詳見世職表達蘇達蘇滿洲鑲黃旗人纍功署前鋒統領順治三年五月蘇尼特部落騰機思等叛奔喀爾喀達蘇隨定國將軍和碩豫親王多鐸往征之偵知騰機思方抵滚噶樓台地方厯三晝夜追及之大敗其衆乘勝追勦戰殁於陳賜恤如例覺羅顧納岱覺羅顧納岱滿洲鑲黃旗人父拜三自有傳顧納岱初襲父三等男職崇德三年從征明敗明兵於山海關入關又擊敗之託特退塔納哈布爾沙海及明兵戰豐潤不利顧納岱援之擊敗敵衆整衆歸至山東攻克博平縣論功加世職為一等男順治元年從和碩睿親王多爾衮入山海關同尚書鞏阿岱擊流賊敗之二年敘功加一雲騎尉十月從大兵破流賊平定河南又隨都統公圗賴進戰有功流賊每乘夜來犯我營顧納岱並擊敗之二年隨多羅貝勒博洛往征杭州同前鋒統領鄂碩追擊賊舟師於平湖獲船二十五艘至嘉興府敵兵三千餘水陸來戰同都統韓岱擊敗之獲船三十三艘又同都統韓岱恩格圗敦對擊賊兵敗之又敗賊於嘉興府又敗賊於蘇州府王岡村又同都統恩格圗馬喇希攻崑山縣克之偽總兵駐軍平湖縣顧納岱同宜爾都竒偏我霸朗破其營又擊賊舟師於蕪湖獲船三十一艘大兵攻江隂顧納岱率兵先登克之三年敘功加世職為三等子是年隨和碩豫親王多鐸征蘇尼特追騰機思擊敗土謝圗汗兵又擊敗碩羅汗兵五年從征江西叛鎮金聲桓至九江府擊賊兵三千餘敗之隨征南大將軍談泰進攻南昌府中炮陳亡加恩賜一等子世職承襲詳見封爵表陽靄陽靄滿洲鑲黃旗人姓李佳氏世居扎庫木地方順治六年七月從征西大將軍多羅謙郡王瓦克達征大同叛鎮薑瓖八月攻朔州越衆登城戰殁於陳恩賜騎都尉世職承襲詳見世職表薩哈達薩哈達滿洲鑲黃旗人姓佟佳氏世居巴爾達地方順治六年正月以護軍參領從平西大將軍和碩英親王阿濟格征大同叛鎮薑瓖三月聞賊渠郭芳劉遷攻代州薩哈逹率兵往援力戰殁於陳恩賜雲騎尉世職承襲詳見世職表費揚柱費揚柱滿洲正黃旗人世居寧古塔地方以地為姓崇德三年從貝勒杜度征明至山東用雲梯攻東昌府夏津縣城先登克之敘功授為半個前程順治初駐防東昌府統兵勦土賊中鳥鎗卒恩賜佐領世職承襲詳見旗分志阿喇穆阿喇穆滿洲正黃旗人姓瓜勒佳氏世居蘇完地方初任驍騎校升佐領往招阿蘇墨爾根降其二十人而歸又從大兵轉戰商顔哈逹松山察哈爾寧逺等處身被重傷屢瀕於死得功牌馬匹銀兩等物順治元年隨和碩睿親王多爾衮追勦流寇力戰陳亡恩賜雲騎尉世職承襲詳見世職表劄圗劄圗滿洲正黃旗人姓他嗒喇氏世居察哈爾地方初管佐領大兵圍錦州時奮擊明經略洪承疇兵敗之後圍松山掘城壕城內兵夜遁劄圗追擊克其城凡前後突圍出者四順治元年隨和碩睿親王多爾衮入山海關破流賊兵二十萬乘勝追至望都縣同宜爾格德與賊對陳奮擊又敗之以功授騎都尉順治二年病卒以子班璣襲後因無嗣於乾隆十三年奉旨入祀昭忠祠瓦顔住瓦顔住滿洲正黃旗人姓寧古塔氏世居胡爾海崇德三年從多羅貝勒杜度征明至山東攻夏津城先登克之授佐領順治二年隨副都統圗占駐防東昌府擊土賊陳亡恩賜騎都尉世職承襲詳見世職表蜚雅柱蜚雅柱滿洲正黃旗人姓寧古塔氏世居虎爾哈地方崇德三年從多羅貝勒杜度征明至山東用雲梯攻東昌府夏津縣以第二人登城克之敘功授雲騎尉順治二年駐防東昌府統兵討土賊中鎗殁恩賜騎都尉世職承襲詳見世職表偏珠偏珠滿洲正黃旗人崇德三年從多羅貝勒杜度征明至山東用雲梯攻夏津城克之四年敘功授佐領順治二年隨副都統圗占駐防東昌府擊土賊陳亡恩賜騎都尉兄渾珠襲遇恩詔加輕車都尉世職承襲詳見世職表布爾賽布爾賽滿洲正黃旗人姓伊爾根覺羅氏世居長白山地方任驍騎校順治元年隨大兵入山海關在昌平州追流寇戰亡恩賜雲騎尉世職承襲詳見世職表瑚紐瑚紐滿洲正黃旗人姓扎庫塔氏世居瓦爾喀地方崇德三年隨多羅貝勒嶽託攻定興縣城先登賜號巴圗魯授騎都尉世職順治二年流賊一隻虎圍荆州瑚紐率兵擊敗之三年隨副都統覺善平山東土寇由清河至恩縣及成安縣連敗之賊又率衆萬餘攻平隂縣力戰殁於陳恩賜騎都尉兼一雲騎尉世職承襲詳見世職表索寧索寧滿洲正黃旗人姓他塔喇氏其先係察哈爾蒙古從恩格德禮額駙來歸隨征黑龍江擊敗奔波果兒兵崇德八年從多羅貝勒阿巴泰征明至山東攻萊蕪縣先登克之賜名巴圗魯授騎都尉加一雲騎尉世職順治六年正月隨平西大將軍和碩英親王阿濟格征山西叛鎮薑瓖八月攻大同渾源州力戰陳亡恩賜三等輕車都尉世職承襲詳見世職表能額能額滿洲正黃旗人姓赫舍里氏世居葉赫地方任前鋒校順治六年正月以前鋒侍衛委署參領隨平西大將軍和碩英親王阿濟格征大同叛鎮薑瓖八月攻渾源州先衆登城戰殁恩賜雲騎尉世職承襲詳見世職表巴岱巴岱滿洲正黃旗人世居完顔以地為氏順治元年以佐領從大兵入山海關勦流寇有功六年隨定西將軍和碩敬謹親王尼堪征山西叛鎮薑瓖戰於大同陳亡恩賜騎都尉世職承襲詳見世職表那爾泰那爾泰滿洲正黃旗人本姓溫徹亨氏後賜姓為吳魯氏世居葉赫地方初從征有功任雲騎尉順治六年正月從定西大將軍和碩敬謹親王尼堪征山西叛鎮薑瓖八月攻大同戰殁二子噶達渾那什庫亦在行間見父殁奮勇力戰並殁於陳賞恤如例麥圗麥圗滿洲正黃旗人姓瓜勒佳氏世居蘇完地方任輕車都尉順治六年隨將軍談泰出征至岔路口遇賊力戰殁於陳孫揚代襲後緣事革職以其子馬兵黑格食雲騎尉半俸阿拉密阿拉密滿洲正黃旗人姓舒穆祿氏世居庫爾喀地方襲父那木泰一等輕車都尉世職順治七年偽秦王孫可望據滇黔為寇九年大兵出湖南阿拉密從征至衡州與可望遇於岔路口率所部奮勇前進可望大敗遁走貴陽阿拉密以負傷卒于軍恩贈三等男世職承襲詳見封爵表岱穆岱穆滿洲正黃旗人姓納喇氏葉赫東城貝勒之族也任二等侍衛順治八年隨征福建海賊鄭成功在厦門力戰陳亡恩賜雲騎尉世職承襲詳見世職表巴杜巴杜滿洲正白旗人姓董鄂氏世居董鄂地方順治元年由護軍𠫭領從大兵征流賊至綏德州遇賊馬步兵擊敗之抵延安府復擊敗賊衆後追殺賊首一隻虎至湖廣乘舟夜戰奪船十五隻旋同護軍統領蘇拜擊賊李自成三千餘衆又於嶽州所屬地方同大兵擊賊萬餘至江西南昌府賊率馬步兵二萬餘衆拒戰列紅衣炮屢擊敗之賊首金聲桓王得仁等統賊兵七萬拒敵進攻破之福州被圍巴杜往援有賊千餘據河岸截戰率左翼兵敗之後又擊賊於江中殺偽總兵官及偽都司等獲船二十餘隻羅源縣被圍率兵往救力戰陳亡由恩詔所加二等輕車都尉加贈一等輕車都尉又一雲騎尉世職承襲詳見世職表格布庫格布庫滿洲正白旗人姓伊爾根覺羅氏世居扎庫木地方順治元年以護軍𠫭領從和碩睿親王多爾衮入山海關擊流賊連敗之於望都縣二年敘功授佐領世職三年隨靖逺大將軍和碩肅親王豪格征四川擊賊張獻忠十一月賊悉衆困我兵格布庫隨護軍統領蘇拜阿爾津噶達渾整軍往援中箭歿五年恩賜騎都尉加一雲騎尉世職承襲詳見世職表嘉龍阿嘉龍阿滿洲正白旗人姓瓜勒佳氏世居蘇完地方順治元年十月以騎都尉世職從定逺大將軍和碩英親王阿濟格征流賊次年至陜西延安府與賊力戰陳亡恩賜三等輕車都尉世職承襲詳見世職表岱納岱納滿洲正白旗人姓巴雅拉氏世居長白山地方屢從征伐有功順治二年從定國大將軍和碩豫親王多鐸南征四月攻揚州府城奮勇先登中傷陳亡恩賜騎都尉世職承襲詳見世職表色爾敏色爾敏滿洲正白旗人順治元年以護軍校隨定國大將軍和碩豫親王多鐸平定河南江南有功三年隨平南大將軍順承郡王勒克德渾征湖廣八月攻武岡寨戰殁於陳恩賜雲騎尉世職承襲詳見世職表蘿多禮蘿多禮滿洲正白旗人姓佟佳氏世居馬察地方初以間