body:
  text: 欽定四庫全書欽定八旗通志卷一百二十三人物志三宗室王公傳一之下多羅克勤郡王岳託顯榮貝勒喀爾楚琿多羅鎮國將軍品級巴思哈多羅克勤郡王岳託子羅洛渾孫孫羅科鐸五世福彭岳託禮烈親王代善長子太祖髙皇帝孫初授台吉天命六年二月大兵畧明奉集保将還有小卒言明兵去此不逺岳託與台吉徳格類等追擊之抵其營明兵驚潰追至黄山暨武靖營乃還三月上親征明拔瀋陽城大軍方追明總兵李秉誠朱萬良姜弼等於白塔鋪岳託後至同逐北四十里途斬級三千餘初喀爾喀扎嚕特部貝勒昂安執我使者送葉赫被殺八年四月命岳託同台吉阿巴泰等討之斬昂安父子還事詳饒餘敏郡王傳十一年八月太祖龍馭上賓岳託與弟薩哈璘共至其父大貝勒代善所告曰國不可一日無君邦家大事宜早定䇿四貝勒才徳冠世深得人心衆皆悦服當速繼大位代善云此我夙心也汝等言正合我意遂與岳託及薩哈璘作議書次日詣朝出書言推戴太宗文皇帝嗣統衆貝勒皆喜議遂定上讓至再三衆議益堅乃從之十月䝉古五部落背盟岳託随父代善弟薩哈璘率兵萬人征之斬扎嚕特部之鄂爾齋圖貝勒又生擒其貝勒十四人盡俘其衆以歸是年封貝勒天聰元年正月同二貝勒阿敏貝勒濟爾哈朗等征朝鮮攻義州定州漢山三城克之渡嘉山江克安州至平壤城其守者棄城遁遂渡大同江次中和遣使諭朝鮮王李倧降時阿敏議欲直趨其都岳託知不可止宻與濟爾哈朗定議駐師平山城遣副将劉興祚諭李倧倧報願嵗貢方物岳託謀曰吾等事已成矣䝉古與眀皆敵國或有邊事當預防宜盟而班師盟成以告阿敏阿敏以己未與其事仍縱掠岳託曰盟成而縱掠非義也勸之不可復令李倧弟覺與阿敏盟乃班師五月從上親征明同三貝勒莽古爾泰等率偏師䕶塔山糧運敗明兵復從上移駐錦州圍寧逺並有功八月敗明兵于牛荘斬守備一千總二百總二兵三百二年五月同貝勒阿巴泰碩託征明錦州有功詳饒餘敏郡王傳三年八月同貝勒濟爾哈朗等略錦州寧逺焚其積聚還十月上親征明岳託同濟爾哈朗由大安口入旦見明兵營山上岳託率兵半駐以待濟爾哈朗以其半擊之復見有明騎兵自遵化来援者顧謂濟爾哈朗曰我當擊此遂進擊五戰皆㨗十一月至遵化與御營合明大同總兵滿桂宣府總兵侯世禄屯順義縣岳託同阿巴泰分路邀撃走之順義知縣率衆降師薄北京復從父代善擊敗明援兵十二月同貝勒薩哈璘等圍永平克香河縣四年正月攜明投誠副将孟喬芳楊文魁遊擊楊聲逺及兵四百還自永平上命同貝勒豪格等還守瀋陽五年七月初設六部命掌兵部事八月上征明大凌河城自白土場趨廣寧岳託同貝勒阿濟格等率兵二萬别由義州進㑹大軍都統葉臣率鑲紅旗兵圍城西南岳託軍為䇿應十月明總兵祖大夀請降以其子可法為質可法見諸貝勒欲下拜岳託曰我等戰則為仇敵和則為兄弟何以拜為命以國禮見因問爾等死守空城何意曰畏誅戮耳岳託曰遼東以久抗不降故誅之殺永平人乃貝勒阿敏所為已論罪幽禁矣我皇上即位以来敦行禮義政治一新撫養黎民愛惜士卒仁心仁政爾等豈不聞之可法曰皇上於貧者衣食之富者秋毫無擾寛仁愛民之徳實皆聞之遂辭歸越三日大夀以城降復同諸貝勒等夜襲敗錦州兵事具饒餘敏郡王傳六年正月疏言前克遼東廣寧漢人拒命者誅之後復克永平灤州漢人縱極力撫諭人多疑懼今天與我以大凌河漢人正使天下知我國善養人也臣愚以為若能善撫此衆嗣後歸順者必多當先予以家室出公帑給其需倘邀天眷奄有其地仍各給還家産彼必忻然悦服其歸誠各官宜令諸貝勒給荘一區每佐領各取漢男婦二名牛一頭編為屯人給二屯其出二口耕牛之家該佐領以官值償之至明兵棄鄉土離妻子窮年累月戍守各城一苦也畏我誅戮又一苦也今慕義歸降之漢兵須令滿漢賢能官善為撫恤毋致一人失所則人心歸附大業可成上嘉納之五月明兵棄錦州遁命同貝勒阿巴泰碩託略明地併隳錦州城旋與貝勒濟爾哈朗等率兵二萬略察哈爾於歸化城黄河一帶俘獲以千計九月同貝勒徳格類拓疆自耀州至盖州以南七年六月詔問征明及朝鮮察哈爾三者何先岳託奏言時不可失宜於山海闗通州北京三路乘時先圗其一則丕基定矣是月同貝勒徳格類率左翼楞額禮葉臣右翼伊爾登昂阿喇每旗副将一㕘領一佐領驍騎校一及漢軍都統石廷柱元帥孔有徳總兵耿仲明攻明旅順口俘獲無算八月奏言前蒙聖諭令留一都統守旅順口今留葉臣伊爾登帥兩翼每旗留官三員兵二千五百漢軍以遊擊佟圗賴主之統備禦二員兵百名駐守臣等自木場驛起行俟抵我邉界貯礮車於蓋州留俘振旅是月師還上率諸貝勒大臣郊迎十里外以金巵酌酒賜之八年二月奏定馬匹倒斃擇牛录殷實之家酌免丁徭責令償補又奏減牛录下厮養卒得㫖惟哨長許留餘悉罷三月上大閱岳託率滿洲䝉古等十一旗行營兵赴瀋陽城北郊列陣二十里許上駐蒲馬岡岳託指示紀律軍容嚴肅上嘉奨之五月上征察哈爾諭留守諸貝勒及将領畢岳託復曉於衆曰自堤岸以東巨流河以西原置十四哨爾等酌量布置晝則令軍士習射夜勿觧衣張弓開甲嚢以防不虞岳託遂隨行有疾六月上臨視命還盛京九年二月同貝勒多爾衮薩哈璘豪格往收察哈爾林丹汗子額哲六月師還諸貝勒略明山西岳託以疾分兵千留駐歸化城㑹土黙特部人来告博碩克圗汗子俄木布遣人往阿嚕喀爾喀及明使者至将謀我岳託伏兵邀之俄木布乳母之夫毛罕知之宻使人趣之還伏猝起誅毛罕擒明使者隨命土黙特捕斬阿嚕喀爾喀之謀匿馬駝者部分土黙特壮丁三千三百有竒為十隊每隊以官二員主之授條約并頒示鄂爾多斯部尋諸貝勒㑹師歸化城岳託偕還崇徳元年四月晉封和碩成親王八月以徇庇莽古爾泰碩託且有離間鄭親王濟爾哈朗及肅親王豪格事論死特㫖寛宥之降多羅貝勒罷兵部任十一月復命攝兵部事十二月從上征朝鮮朝鮮王李倧奔南漢山城岳託同豫親王進圍之敗其援兵於城下二年八月命兩翼較射奏不能執弓上曰爾徐引射之不射如他王貝勒何諭再三始引弓弓墮地者五遂擲之諸王等論岳託驕慢當死上復寛之降固山貝子罷部任罰鍰三年正月復封多羅貝勒管旗務二月從上征喀爾喀至博碩堆偵扎薩克圗汗遁乃還八月奉命為揚威大将軍貝勒杜度副之統右翼兵睿親王多爾衮為奉命大将軍統左翼分道伐明九月從宻雲東北牆子嶺口毁邊牆入明兵於保外立三寨我師攻克之獲敵哨卒知保堅且有重兵不易拔嶺東西有間道可越於是分兵攻其前以牽敵師潜從間道踰嶺入克臺十有一尋以疾薨於軍年四十有一四年三月左翼睿親王奏㨗上覽奏無岳託名驚問知病卒上慟哭久之且命勿使禮親王知四月喪還駕至沙嶺設幄遥奠還御崇政殿命親王以下及諸大臣往奠王貝勒還復命乃還宫輟朝三日詔追封為多羅克勤郡王賜馬五駝二銀萬兩𦵏盛京城南五里萬栁塘康熙二十七年十一月命立碑紀功乾隆八年駕幸盛京親詣王園寝賜酹御製詩曰開國承家日于藩夾輔資一時扶王業四海定丕基懿徳書金匱佳城奠玉巵銀潢天共逺百世篤宗支四十三年正月上追念王忠勛命配享太廟其現襲之平郡王復封號曰克勤八月命入祀盛京賢王祠是年駕幸盛京復賜酹王園寝御製詩曰每陳開國䇿均合聖人心不少赳桓衆獨嘉幹略沉佳城留故里致奠重躬臨彰善俾觀感伊予此意深四十八年駕三詣盛京賜酹如初御製疊戊戌詩韻曰讓帝之冢子首陳推戴心忘家惟為國力勇更謀沉我祖所嘉許予躬應奠臨閟宫教配享彰善意猶深岳託次子羅洛渾于崇徳四年九月襲封多羅貝勒𬋩旗務五年五月命同鄭親王濟爾哈朗等往迎䝉古多羅特部蘇班岱阿巴爾岱等降衆敗明兵事詳鄭獻親王傳九月同鄭親王圍錦州六年三月復圍之設伏敗明援兵於南山西岡六月睿親王多爾衮肅郡王豪格等来代合擊明山海闗援兵追及松山城還八月從上征克松山擒明總督洪承疇巡撫邱民仰等七年七月叙功賜蟒緞七十八年正月以怨懟非議又敏恵恭和元妃薨時絲竹不輟論罪削爵五月復多羅貝勒𬋩旗務上命濟爾哈朗多爾衮召羅洛渾諭曰爾父屢獲罪譴因皇考太祖皇妣太后撫養為子朕視之如弟没後猶追封克勤郡王並加恵於爾命為多羅貝勒管旗務爾不思率由善道以輔國政嗜酒作慝致干國法朕又追念爾父特行寛宥復爾多羅貝勒令管旗務爾當敬慎修身勤思善行若仍嗜酒妄亂不特爾禄位難保即置爾于法亦所不赦至本旗所屬諸臣俱宜戒酒仍勸勉貝勒効力贖罪羅洛渾同諸臣叩首謝罪順治元年十月以從定京師破流㓂有功晉封多羅衍禧郡王三年正月同靖逺大将軍肅親王豪格征四川八月薨於軍年二十有四五年正月喪還命貝子屯齊鎮國公拜音圗輔國公鞏阿岱等迎之輟朝二日康熙十年六月追諡曰介羅洛渾長子羅科鐸于順治五年閏四月襲封多羅衍禧郡王八年二月改封號曰平十五年正月同安逺靖冦大将軍信郡王多尼征明桂王朱由榔于雲南破其晉王李定國鞏昌王白文選兵十六年六月賜蟒衣弓刀鞍馬旌其勞康熙二十一年七月薨年四十有三諡曰比以其第四子訥爾圗襲訥爾圗于康熙二十二年襲封多羅平郡王二十六年五月以毆斃無罪人及折人手足議罪削爵以其弟訥爾福襲四十年薨諡曰悼以其長子訥爾蘇襲五十七年十一月隨撫逺大将軍允禵收西蔵尋駐博羅和碩五十九年正月移駐古木六十年十月攝大将軍事六十一年十一月復攝印如故雍正元年正月還京攝上駟院事四年七月以前在西寧軍前貪婪受賄削爵乾隆五年九月卒命仍以郡王禮𦵏訥爾蘇長子福彭于雍正四年七月襲封多羅平郡王十年正月任鑲藍旗滿洲都統四月奏言外省来京襲職旗員到日隨奏不令久候多費以仰副體恤至意從之閏五月授宗人府右宗正十一年二月充玉牒館總裁四月命軍機處行走七月命為定邊大将軍討逆賊噶爾丹䇿凌十一月師駐烏里雅蘇台十二月奏言軍中馳馬最要今喀爾喀扎薩克貝勒班第等感恩獻駞馬力請停償值伏念逺臣當軍興際不私所有况宗室王貝勒貝子公等皆有馬場滋生馬匹豈不内愧于心臣家有馬五百匹願送軍前備用並将臣奏宣示諸王貝勒等臣料諸宗臣必以臣言為當彌切踴躍急公之義得㫖允行十二年六月奏烏里雅蘇台扎克拜達里克推河並應撤京城滿洲漢軍右衛寧夏察哈爾土黙特兵三千六百所有内扎薩克及烏蘭察布兵三百七十調赴推河駐防現在烏里雅蘇台餘兵九千不敷調遣請以洪郭爾鄂隆所調滿洲兵六百再増撥四百速赴軍營從之是月王率将軍傅爾丹赴科布多總統北路軍營令内大臣薩木哈掌威逺将軍印辦理烏里雅蘇台軍務八月詔量撤北路兵王率副都統王常等領兵還十三年閏四月命總統大軍駐鄂爾坤七月於額爾徳尼昭迤北築城尋以公慶復代還京乾隆元年二月上以北路所存糧米如何令蒙古兵支領並屯穫􅓱麥出陳易新之處交王酌議尋奏言蒙古兵向不給糧臣前以坐卡兵逺臨賊境取羊未便曽折給一月米糧兹䝉皇上軫念䝉古一視同仁加恩賞米臣議将存留之喀爾喀兵及坐卡臺站蒙古兵攙米支給今王大臣等又議将派駐鄂爾坤之䝉古兵給糧在此時存米充裕不難概給倘日久米少議停轉生怨望且凖噶爾鬼蜮多端将来或仍須䝉古兵移駐又豈能一例支給北地寒冷盖蔵得宜米可經三四年不壞臣愚于駐防䝉古兵酌量賞給餘請仍給羊價為便再鄂爾坤種地兵已撤􅓱麥無従出陳易新青稞大小麥較難耐久應請恩賞䝉古米糧先給此項麥石又奏言喀爾喀所牧馬除留軍營備用外各游牧處現有馬二萬九千餘内扎薩克各游牧處馬四萬餘伏思鄂爾坤駐兵以歸化城為聲援其間距三千餘里鞭長莫及中途須有馬接換往来緩急始足恃請度適中地近臺站水草佳處設馬厰于土黙特察哈爾兵内擇有眷屬者移駐牧放令歸化城都統攝理再請撥騸馬萬兒馬二千令臺站總管撥入官馬厰牧放備用有事無難輕騎疾馳馬力足而人心可恃雖道逺無慮矣詔並下王大臣議行三月任正白旗滿洲都統十月調正黄旗滿洲都統三年七月預議政十三年十一月薨年四十有一諡曰敏十四年三月以福彭長子慶寧襲十五年薨諡曰僖以原襲平郡王訥爾蘇之孫慶恒襲慶恒乃貝子福秀長子出為福彭後是年十二月襲封多羅平郡王十九年任鑲紅旗漢軍都統二十六年授宗人府右宗正尋總理鑲紅旗覺羅學二十七年坐旗員冐借官銀降固山貝子餘任悉罷四十年復封多羅平郡王四十三年正月命復克勤郡王始封之號仍為克勤郡王四十四年二月薨諡曰良以原襲平郡王訥爾圗之孫雅朗阿襲雅朗阿乃閑㪚宗室訥清額第十子初于乾隆十六年授三等侍衛二十六年七月任鑲紅旗䝉古副都統九月授烏里雅蘇台㕘賛大臣二十七年調正紅旗滿洲副都統尋授科布多㕘賛大臣三十一年任成都副都統三十四年授荆州将軍三十五年十月以袒䕶所屬驍騎校楚徳降三級調用十一月以副都統品級往庫爾喀喇烏蘇辦事三十七年五月復以徇隠臺站屬員不法削副都統品級在伊犂印務筆帖式行走八月奉㫖在庫爾烏蘇章京處辦事十月以副都統品級赴塔爾巴哈台十一月諭奨其辦事得制仍留庫爾喀喇烏蘇辦事三十八年任三姓副都統三十九年調盛京副都統四十年調黒龍江副都統四十一年遷綏逺城将軍四十四年襲封多羅克勤郡王四十五年總理鑲藍旗覺羅學尋授宗人府右宗正四十七年任正白旗漢軍都統四十八年四月調鑲紅旗滿洲都統七月調正黄旗滿洲都統五十九年薨諡曰莊子恒謹襲多羅顯榮貝勒喀爾楚渾喀爾楚渾克勤郡王岳託第三子順治元年四月隨睿親王多爾衮入山海闗破流賊李自成追擊至望都二年二月叙功封鎮國公三年正月隨靖逺大将軍肅親王豪格征四川流賊張獻忠時賊黨據陜西同貝子滿達海進𠞰偽𠫭将石國璽等五十餘人率賊衆降賊首髙如礪遁三台山我軍掘壕圍之如礪亦率衆降十一月肅親王進征四川斬獻忠於西充喀爾楚渾在事有功五年正月班師八月任鑲紅旗滿洲都統六年正月隨敬謹親王尼堪討大同叛鎮姜瓖師至太原賊由寧武闗迎戰喀爾楚渾遣都統阿賴庫魯克達爾漢等擊敗之進圍寧武賊夜犯我鑲黄鑲紅兩旗汛地復遣䕶衛兵迎擊兩戰皆捷四月由左衛往圍大同偽總兵楊振威斬瓖降十月晉封多羅貝勒八年二月攝理藩院事八月薨年二十有四諡曰顯榮立碑紀功康熙十三年三月復立碑旌之喀爾楚渾長子克齊于順治九年襲封多羅貝勒康熙六十一年六月薨年七十有二以其長子魯賓降襲魯賓初于康熙二十三年封固山貝子三十年授宗人府左宗正三十五年上征噶爾丹同都統喀岱等統領鑲藍旗營三十八年以惰罷宗正任雍正元年改降襲固山貝子四年二月坐舉動狂悖削爵三月以魯賓無應襲貝子之人復降封輔國公乾隆八年卒以魯賓嗣子宗智之第四子訥穆金降襲奉恩将軍二十五年授三等侍衛累遷至頭等侍衛四十八年卒四十九年五月以訥穆金次子薩賓圖襲封奉恩将軍鎮國将軍品級巴思哈巴思哈克勤郡王岳託第五子崇徳四年正月封鎮國将軍順治六年十月晉封多羅貝勒九年七月奉命同定逺大将軍敬謹親王尼堪統官兵往湖南征流賊張獻忠餘黨孫可望等賜蟒衣鞍馬弓矢十一月敬謹親王戰歿於衡州命貝勒屯齊代其軍與巴思哈合營三月由永州趨寳慶敗賊兵十萬於周家坡十一年十月議隨敬謹親王出征敗績罪削爵還京師十二月三月擢任鑲紅旗滿洲都統八月復授鎮國公品級十五年正月隨安逺靖㓂大将軍信郡王多尼征明桂王朱由榔於雲南合四川廣西兩路軍期進取十一月抵貴陽趨安莊擊斬其衆十六年正月大軍薄雲南省城同貝勒尚善等克鎮南州玉龍闗永昌府騰越州六月賜蟒𫀆鞍馬勞之十七年五月師旋七月議前征雲南時撤永昌門兵致軍士入城擾民降鎮國将軍品級十八年卒以巴思哈次子固克度渾降襲三等輔國将軍品級康熙四年卒以巴思哈第三子庫布素渾降襲三等奉國将軍品級十二年晉封三等輔國将軍品級三十四年以病誤較射削爵以其長子蘭鼐降襲三等奉國将軍品級五十八年卒以蘭鼐第三子宗智降襲奉恩将軍品級雍正八年授三等侍衛尋遷二等侍衛乾隆元年授前鋒㕘領四年擢副都統八年卒以蘭鼐第六子宗熹降襲雲騎尉品級四十年十二月因軍政虚報年嵗削級爵除欽定八旗通志卷一百二十三
