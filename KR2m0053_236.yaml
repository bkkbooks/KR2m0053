body:
  text: 人物志一百二忠義傳十四滿洲八旗十四至三十九年共九十一人乾隆三十八年額爾賽額爾賽滿洲鑲黄旗人姓布雅穆竒氏乾隆二十年由健銳營前鋒出征凖噶爾二十二年授藍翎長二十三年陞前鋒校出征回部二十四年陞三等侍衛賞特斯古巴圖魯號戴花翎前後得功牌頭等者一二等者一三等者二二十六年議功給雲騎尉世職二十七年陞副䕶軍叅領三十年授廣東撫標中軍恭将三十三年擢南雄協副将三十五年内補䕶軍恭領三十六年隨征緬甸旋調金川撃賊於斯當安羙羙寨明郭宗等處共得頭等功牌五二等三等功牌各一三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉併前世職為騎都尉世職承襲詳見世職表七十一七十一滿洲鑲黄旗人姓伊拉哩氏乾隆三十一年由前鋒授䕶軍校厯委䕶軍恭領補貴州上江協左營都司三十七年隨征金川三十八年六月擊賊於木果木陣亡賞䘏如例恩賜其子佛爾青額為驍騎校圖沁圖沁滿洲鑲黄旗人姓温徹亨氏乾隆三十五年由鳥鎗䕶軍出征緬甸旋調征金川三十六年進攻巴朗山斯當安三十七年進攻董瑪寨路頂宗明郭宗等處屢著勞績共得功牌十八是年十一月授六品頂帶藍翎三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表額爾濟圖額爾濟圖滿洲鑲黄旗人姓西特爾氏乾隆二十一年由白都訥領催出征伊犁授藍翎侍衛二十六年叙平定凖噶爾及回部功給騎都尉世職厯陞前鋒恭領三十七年隨征金川三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表邁斯哈邁斯哈滿洲鑲黄旗人姓郭羅羅斯氏乾隆三十年由前鋒出征烏什得頭等功牌二二等功牌五三十四年出征緬甸得二等功牌二三十六年調征金川授驍騎校三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表富金保富金保滿洲鑲黄旗人姓富察氏乾隆二十年由前鋒出征伊犁二十六年平定喀什噶爾前後共得功牌十二擢䕶軍校委鳥鎗䕶軍恭領副鳥鎗䕶軍恭領三十八年授恭将銜隨征金川是年十二月擊賊於日旁受傷尋歿賞䘏如例恩賜其子闗聖保為守備綽爾齊喀綽爾齊喀滿洲鑲黄旗人姓阿朗氏乾隆三十七年由前鋒出征金川三十八年授藍翎侍衛三十九年進攻羅博瓦殺賊奮勉擢三等侍衛是年三月擊賊於羅博瓦陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表逹錫納逹錫納滿洲鑲黄旗人姓完顔氏乾隆三十年由前鋒出征烏什共得功牌頭等者二二等者四三十二年隨征緬甸蠻結之戰記功超等得功牌二三十四年授藍翎長三十八年陞副前鋒校三十九年陞前鋒校隨征金川是年六月擊賊於喇穆喇穆陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表闗徳闗徳滿洲鑲黄旗人姓瓜勒佳氏乾隆三十七年由前鋒隨征金川授空銜藍翎三十九年七月擊賊於木雅山陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表三官保三官保滿洲鑲黄旗人姓瓜勒佳氏乾隆三十年由前鋒授前鋒校三十五年委前鋒恭領三十八年隨征金川三十九年七月擊賊於逹爾圖陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表慶安慶安滿洲鑲黄旗人姓富察氏乾隆三十二年由䕶軍隨征緬甸擊賊於蠻結得頭等功牌一授鳥鎗藍翎長尋補鳥鎗䕶軍校三十八年隨征金川進攻阿克木雅等處得超等頭等功牌各一三十九年十二月擊賊於空薩爾陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表海福海福滿洲鑲黄旗人姓畢嚕氏乾隆三十年由前鋒出征烏什得頭等功牌二二等功牌三三十二年隨征緬甸擊賊於蠻結得頭等三等功牌各一三十六年授前鋒校三十八年隨征金川三十九年十二月擊賊於空薩爾陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表徳保徳保滿洲正黄旗人姓烏察喇氏由䕶軍補授䕶軍校厯任䕶軍恭領乾隆三十六年隨征金川得功牌六賞布林巴圖魯號三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表扎魯扎魯滿洲正黄旗人姓巴雅爾氏由䕶軍補健銳營前鋒乾隆二十四年出征回部得功牌四二十六年授驍騎校三十八年以都司發往四川軍營試用是年六月擊賊於木果木陣亡賞䘏如例恩廕衛千總羅爾占羅爾占滿洲正黄旗人姓馬佳氏乾隆三十二年由世襲雲騎尉出征緬甸授藍翎侍衛三十六年隨征金川三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表巴克唐阿巴克唐阿滿洲正黄旗人姓瓜爾佳氏乾隆二十七年由䕶軍陞䕶軍校三十三年委署䕶軍恭領三十四年授甘肅安逺營都司三十六年隨征金川三十八年六月擊賊於木果木陣亡賞䘏如例恩賜其子靠山保為千總納薩蘭納薩蘭滿洲正黄旗人姓富察氏乾隆三十八年由親軍授空銜藍翎隨征金川是年十月擊賊於布朗郭宗病歿賞䘏如陣亡例減半恩賜其子克星額七品監生瑚圖禮瑚圖禮滿洲正黄旗人姓瓜勒佳氏乾隆十九年由藍翎侍衛出征凖噶爾二十三年叙功給雲騎尉世職陞三等侍衛授四川松潘鎮左營遊擊三十三年隨征緬甸議罪削職三十七年恩賞守備銜隨征金川三十八年授甘肅寧夏鎮右營守備三十九年三月擊賊於當噶拉力戰受傷七月傷發歿賞䘏如陣亡例恩賜其孫託音太為千總玉保玉保滿洲正黄旗人姓索吉氏乾隆二十七年由前鋒出征伊犁三十年平烏什城得頭等二等功牌各二三十二年隨征緬甸擊賊於新街項受鎗傷得頭等功牌一三等功牌二三十八年隨征金川委署前鋒校所至奮勉得頭等三等功牌各一三十九年三月擊賊於思底陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表阿漢泰阿漢泰滿洲正黄旗人姓富察氏乾隆三十八年由䕶軍校隨征金川三十九年三月擊賊於思底陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表富勒富勒滿洲正黄旗人姓烏扎拉氏由鳥鎗䕶軍厯署鳥鎗䕶軍恭領隨征金川乾隆三十九年六月擊賊於色淜普陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表納逹齊納逹齊滿洲正黄旗人姓赫舍哩氏乾隆三十七年由鳥鎗䕶軍隨征金川授委䕶軍校三十九年七月擊賊於布逹什挪陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表鐵柱鐵柱滿洲正黄旗人姓他塔喇氏由䕶軍恭領隨征金川乾隆三十九年七月擊賊於色淜普陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表岱青阿岱青阿滿洲正黄旗人姓鈕祜禄氏由䕶軍授藍翎長乾隆三十八年隨征金川三十九年九月擊賊於木克什陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表和裕和裕滿洲正黄旗人姓舒穆禄氏由䕶軍授藍翎長乾隆三十八年隨征金川三十九年九月擊賊於格木勺洛陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表阿哈逹阿哈逹滿洲正黄旗人姓伊爾根覺羅氏任䕶軍恭領隨征金川乾隆三十九年九月擊賊於木克什陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表敦住敦住滿洲正黄旗人姓瓜勒佳氏乾隆元年襲騎都尉又一雲騎尉世職二十年襲佐領二十一年補鑾儀衛整儀尉二十二年陞治儀正二十五年陞雲麾使二十七年陞河南撫標中軍恭将三十四年擢頭等侍衛三十八年派往金川軍營三十九年委署福建建寧鎮總兵隨大軍進攻逹爾圖山得頭等三等功牌各一十月領兵攻木克什山碉陣亡賞䘏如例詔圖像紫光閣御製贊曰披堅破銳突将無前衆志成城而各力宣威震卭筰拉朽摧枯宜喜已克惜哉捐軀恩賜雲騎尉併前世職為三等輕車都尉世職承襲詳見世職表特音布特音布滿洲正白旗人姓完顔氏由刑部筆帖式陞本部主事乾隆三十八年隨征金川是年六月在木果木遇賊被害賞䘏如例恩賜雲騎尉世職承襲詳見世職表徳祥徳祥滿洲正白旗人姓瓜勒佳氏乾隆三十七年由䕶軍授空銜藍翎隨征緬甸旋調征金川屢著勞績共得功牌十二三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表華尚阿華尚阿滿洲正白旗人姓瓜勒佳氏乾隆三十六年由䕶軍陞䕶軍校三十七年隨征金川委署䕶軍恭領三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表訥墨庫訥墨庫滿洲正白旗人姓厄魯特氏由領催授藍翎長乾隆三十七年隨征金川三十九年正月擊賊於日旁陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表鄂羅什呼鄂羅什呼滿洲正白旗人姓厄魯特氏任藍翎侍衛乾隆三十七年隨征金川三十九年正月擊賊於日旁陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表阿哈泰阿哈泰滿洲正白旗人姓富察氏乾隆三十八年由前鋒隨征金川委署前鋒校三十九年三月擊賊於喇穆喇穆陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表富倫保富倫保滿洲正白旗人姓納喇氏乾隆三十六年由藍翎長隨征金川進攻僧格宗功列超等得頭等功牌一三十九年七月擊賊於木當噶爾受鎗石傷八月傷發歿賞䘏如例恩賜雲騎尉世職承襲詳見世職表明志明志滿洲正紅旗人姓巴雅喇氏乾隆三十三年由健銳營前鋒出征緬甸三十六年補前鋒翎長調征金川三十七年補䕶軍校屢著勞績共得功牌二十一三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表六十六六十六滿洲正紅旗人姓西特爾氏乾隆三十六年由䕶軍出征緬甸旋調征金川授空銜藍翎進攻巴朗山得功牌一三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表三音布三音布滿洲正紅旗人姓瓜勒佳氏乾隆三十一年由䕶軍隨征緬甸三十六年調征金川進攻巴朗斯當安路頂宗明郭宗等處得頭等三等功牌各三二等功牌二三十七年授藍翎長三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表六十四六十四滿洲正紅旗人姓烏扎拉氏乾隆三十七年由鳥鎗䕶軍隨征金川陞鳥鎗藍翎長三十八年六月擊賊於逹爾圖受傷尋歿賞䘏如例恩賜雲騎尉世職承襲詳見世職表富森布富森布滿洲正紅旗人姓納喇氏由健銳營前鋒授前鋒翎長乾隆三十五年補副前鋒校三十七年隨征金川三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表觀徳觀徳滿洲正紅旗人姓朗氏乾隆十二年由䕶軍挑十五善射尋授䕶軍校厯藍翎侍衛二十七年授直𨽻涿州營守偹三十七年陞湖北蘄州營都司三十九年隨征金川以偵賊急追氣絶道卒諭曰觀徳因尋覔賊踪追趕迅速行至山巔氣絶身故雖與受傷陣亡者有間但究因𠞰賊所致殊堪憫惜著交部照陣亡例減半議䘏恩賜其子普明為七品官七十三七十三滿洲正紅旗人姓瓜勒佳氏乾隆三十一年由鳥鎗䕶軍出征緬甸得功牌一三十八年調征金川得功牌二三十九年授藍翎長是年九月擊賊於遜克爾宗陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表博崇武博崇武滿洲正紅旗人姓納喇氏乾隆三十二年由鳥鎗䕶軍出征緬甸得功牌六三十八年授藍翎長調征金川得功牌五三十九年十一月擊賊於回郭洛陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表濟爾噶朗濟爾噶朗滿洲鑲白旗人姓卓勒氏乾隆三十七年由前鋒授藍翎長隨征金川三十八年二月擊賊於當噶拉陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表哈爾察海哈爾察海滿洲鑲白旗人姓厄魯特氏任藍翎