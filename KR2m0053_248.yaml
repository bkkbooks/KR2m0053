body:
  text: 人物志一百十四忠義傳二十六駐防八旗三一百十人乾隆年中共穆金保穆金保索倫鑲黄旗人姓敖拉氏世居打牲地方由驍騎校署防禦乾隆十九年出征伊犁二十一年二月初一日隨叅贊大臣富德在烏塔莫庫爾撃賊歿于陣賞卹如例濟卜竒爾圖濟卜竒爾圖索倫鑲黄旗人姓薩木呼爾氏世居打牲地方由披甲委署驍騎校乾隆十九年於副都統三格隊出征伊犁二十一年六月十三日賫奉諭㫖前往將軍達爾黨阿軍營行次阿爾輝地方遇賊戰歿賞䘏如例奈雅圖奈雅圖索倫鑲黄旗人姓敖拉氏世居打牲地方由領催委署驍騎校乾隆十九年從征伊犁二十二年八月二十日隨副都統順德納收剿凖夷餘衆于哈拉和落地方戰歿賞䘏如例阿尼雅圖阿尼雅圖索倫鑲黄旗人姓敖拉氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出征伊犁二十二年八月二十日隨副都統順德納撃賊沙拉斯嗎唬斯陣亡賞卹如例尼喀岱尼喀岱索倫鑲黄旗人姓薩滿呼氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁二十四年正月隨副將軍富德進剿逆囘戰歿賞䘏如例錦濟噶爾錦濟噶爾索倫鑲黄旗人姓敖拉氏世居打牲地方任總管乾隆十九年於副都統三格隊出師北路二十四年閏六月逆囘霍集占棄葉爾羌城西走叅贊大臣明瑞追襲之於霍斯庫魯克山賊大敗錦濟噶爾追賊力戰歿于陣賞䘏如例宻雅瑪察宻雅瑪察索倫鑲黄旗人姓鄂諾思氏乾隆三十八年由委署叅領隨征金川得功牌四三十九年六月擊賊於猛固寨陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表錫爾庫爾錫爾庫爾索倫正黄旗人姓阿拉爾氏世居黙爾根城由領催署防禦乾隆十九年隨征伊犁有功二十二年正月隨定邊將軍兆惠收𠞰凖夷餘黨力戰歿于陣賞䘏如例達爾金查達爾金查索倫正黄旗人姓達巴圖氏世居呼倫貝爾由驍騎校委署前鋒叅領乾隆十九年隨將軍達爾黨阿出征伊犁二十二年十一月十一日隨都統滿福以偏師追𠞰沙拉斯嗎唬斯行次哈拉和落與都統等同為賊人誘害賞䘏如例都倫車都倫車索倫正黄旗人姓達巴圖氏世居呼倫貝爾由領催署防禦乾隆十九年出征伊犁遇陣先登厯著勞績二十三年十月十三日隨靖逆將軍那木札爾赴定邊將軍兆惠軍營星夜遄行於葉爾羌地方猝遇逆囘蟻集偕將軍等力戰歿于陣賞䘏如例寧濟圖寧濟圖索倫正黄旗人姓郭佳氏由領催委署驍騎校乾隆十九年出征準噶爾得功牌六三十四年隨征緬甸三十八年調征金川四十年正月擊賊於空薩爾陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表阿拉海阿拉海索倫正黄旗人姓鄂羅氏乾隆三十八年由佐領奨賞花翎隨征金川四十年四月擊賊於榮噶爾博陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表桂保桂保索倫正黄旗人姓墨爾廸音氏乾隆三十八年由委署七品官隨征金川進攻馬奈等處得超等功二次四十一年七月擊賊於喇嘛寺陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表噶拉岱噶拉岱索倫正白旗人姓都拉爾氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁二十一年十一月十一日隨副將滿禄解送營馬於庫車軍台遇賊戰歿賞䘏如例扎爾善扎爾善索倫正白旗人姓都拉爾氏世居打牲地方任總管乾隆十九年隨征伊犁有功二十三年十月十三日隨定邊將軍兆惠進𠞰波羅泥都霍集占自庫車直薄葉爾羌逆囘負嵎拒戰於喀拉烏蘇河陣亡賞䘏如例喀塔木保喀塔木保索倫正白旗人姓薩木格爾氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁厯著勤勞二十四年正月隨副將軍富德追𠞰逆囘戰歿賞䘏如例額德爾圖額德爾圖索倫正白旗人姓圖克敦氏世居呼倫貝爾由領催委署前鋒㕘領乾隆二十一年隨定西將軍達爾黨阿出征哈薩克二十三年五月初八日隨副都統唐喀禄於布空郭爾地方遇賊戰殁賞䘏如例阿納查阿納查索倫正白旗人姓那喀他氏世居呼倫貝爾任奬賞藍翎乾隆十九年出征伊犁有功二十四年閏六月二十八日隨㕘贊大臣明瑞追剿波羅泥都霍集占敗逆囘於霍斯庫魯克山戰歿賞䘏如例岱隆阿岱隆阿索倫正白旗人姓都拉爾氏世居打牲地方由領催奬賞藍翎委署㕘領乾隆十九年隨征凖噶爾著有勞績二十四年閏六月二十八日隨㕘贊大臣明瑞追𠞰逆囘於霍斯庫魯克山力戰歿於陣賞䘏如例托尼保托尼保索倫正白旗人姓沃哷氏乾隆三十八年由領催委署驍騎校隨征金川得功牌四三十九年六月撃賊於猛固寨陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表雅庫雅庫索倫正白旗人姓鈕祜禄氏乾隆二十一年由防禦出征巴里坤得功牌頭等者二三等者三三十八年隨征金川屢著勞績得頭等三等功牌各三四十一年正月撃賊於噶喇依身受重傷三月傷發歿賞䘏如例恩賜雲騎尉世職承襲詳見世職表莫克庫莫克庫索倫正紅旗人姓圖克坦氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁二十一年十一月二十六日隨副都統阿敏道往葉爾羌喀什噶爾招降逆囘為霍集占計誘與都統等同時被害賞䘏如例莽喀爾莽喀爾索倫正紅旗人姓都克坦氏世居打牲地方由領催委署驍騎校乾隆十九年出師伊犁二十一年奉定邊將軍兆惠令隨副都統阿敏道往葉爾羌喀什噶爾招降逆囘為霍集占計誘與嘉虎等同被害賞䘏如例阿永果爾阿永果爾索倫正紅旗人姓阿爾奔查氏世居呼倫貝爾由領催委署驍騎校乾隆十九年隨將軍達爾黨阿出征伊犁二十一年六月十三日隨副將軍哈達哈與賊塞音白勒克戰於喀拉烏蘇河殁賞䘏如例洛竒里洛竒里索倫正紅旗人姓都拉爾氏居打牲地方任驍騎校乾隆十九年於副都統三格隊出師伊犁二十一年十二月二十二日隨營總額卜齊爾圖搜𠞰凖夷餘黨在阿里瑪圖遇賊戰歿賞䘏如例科爾竒拉科爾竒拉索倫正紅旗人姓阿拉爾氏世居格尼必拉地方由佐領委署㕘領乾隆十九年於副都統三格隊出師北路二十一年十二月二十二日隨定邊將軍兆惠搜剿凖夷餘黨在阿里瑪圖遇賊戰歿賞䘏如例五竒納五竒納索倫正紅旗人委署前鋒㕘領乾隆二十二年十一月十一日隨都統滿福追𠞰沙拉斯嗎唬斯賊衆行次哈拉和落與羅禪勤同時被害賞䘏如例德凌車德凌車索倫正紅旗人姓朱車爾氏世居嫩江由披甲奬賞藍翎兼額外驍騎校乾隆十九年於副都統三格隊出師伊犁二十二年八月十二日隨副都統額爾登額進征克勒特賊衆在博羅齊戰殁賞䘏如例拉爾齊岱拉爾齊岱索倫正紅旗人世居打牲地方由佐領委署㕘領乾隆十九年隨征伊犁有功二十二年十一月十一日隨都統滿福追𠞰沙拉斯嗎唬斯行次哈拉和落與都統等同為賊人誘害賞䘏如例濟爾瑪爾圖濟爾瑪爾圖索倫正紅旗人姓阿拉爾氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁二十三年四月二十日隨副都統唐喀禄於布空郭爾地方遇賊力戰被害賞䘏如例布爾多什布爾多什索倫正紅旗人姓都拉爾氏世居呼倫貝爾由領催委署驍騎校乾隆十九年隨將軍達爾黨阿出師伊犁二十四年閏六月二十八日隨㕘贊大臣明瑞追𠞰逆囘於霍斯庫魯克山戰歿賞䘏如例羅爾布羅爾布索倫正紅旗人姓瑪克丹查氏世居打牲地方由領催奨賞藍翎委署㕘領乾隆十九年於副都統三格隊出師伊犁二十三年十月十三日定邊將軍兆惠進𠞰葉爾𦍑逆酋波羅泥都霍集占負隅抗拒統衆迎戰羅爾布奮勇前進於喀拉烏蘇河陣亡賞䘏如例哈達遜哈達遜索倫正紅旗人姓巴約特氏乾隆三十七年由領催授藍翎長隨征金川三十八年四月擊賊於當噶拉陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表鞥格津鞥格津索倫正紅旗人姓都爾本氏乾隆三十七年由藍翎長隨征金川得功牌二三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表鞥登徹鞥登徹索倫正紅旗人姓薩木喜爾氏由領催委署㕘領乾隆十九年出征凖噶爾三十四年隨征𬗟甸三十八年調征金川記功超等得功牌十五三十九年六月擊賊於色淜普陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表巴爾琿察巴爾琿察索倫正紅旗人姓琨䝉徹氏乾隆三十八年由領催委署官隨征金川得功牌十五三十九年三月撃賊於喇穆喇穆陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表巴西薩巴西薩索倫正紅旗人姓布拉穆氏由佐領襲三等輕車都尉乾隆三十八年隨征金川進攻羅博瓦奪獲賊碉列超等功四次賞塔爾濟特巴圖魯號戴花翎四十年正月撃賊於空薩爾陣亡賞䘏如例詔列次五十功臣圖像紫光閣賛曰索倫貫射𠞰敵心雄於羅博瓦直上仰攻轉戰山腰碉卡全獲功成受賞沒陣斯惜恩賜雲騎尉世職承襲詳見世職表瑪濟瑪濟索倫正紅旗人姓温都氏由驍騎校委散騎郎乾隆二十三年出征囘部三十四年隨征緬甸三十八年調征金川得功牌二等三等各二賞沙布得克巴圖魯號戴花翎四十年五月撃賊於促浸陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表果倫察果倫察索倫正紅旗人姓果爾敏氏乾隆四十一年由黒龍江索倫領催駐京補司鞍四十六年隨𠞰撒拉爾逆囘在華林寺力戰陣亡奉㫖照藍翎侍衞之例議䘏恩賜雲騎尉世職承襲詳見世職表查翰查翰索倫鑲白旗人姓綱吉達氏世居格尼地方由佐領委署營總乾隆十九年於副都統三格隊出師伊犁二十一年七月二十日隨將軍達爾黨阿進征凖夷餘黨戰歿賞䘏如例鄂林查鄂林查索倫鑲白旗人由領催委署驍騎校乾隆二十二年八月十二日隨副都統額爾登額於博羅齊地方與克勒特賊衆戰歿賞䘏如例博定徹博定徹索倫鑲紅旗人姓都拉爾氏世居打牲地方由領催委署驍騎校乾隆十九年出師伊犁二十一年九月二十二日奉將軍令宣諭哈薩克與尼薩爾圖同時被害賞䘏如例賚三查賚三查索倫鑲白旗人姓赫音氏世居呼倫貝爾由領催委署驍騎校乾隆十九年隨將軍達爾黨阿出征伊犁二十三年十月隨靖逆將軍那木扎爾赴定邊將軍兆惠軍營星夜前行至葉爾羌地方猝遇逆囘蟻集與將軍等力戰歿於陣賞䘏如例莽喀察莽喀察索倫鑲白旗人姓納喀塔氏由馬甲於乾隆十九年出征凖噶爾旋定囘部所至奮勇前後三十二戰斬級三十八焚燒賊寨四處擒奸諜三人胸受鳥鎗傷以七次超等功授藍翎侍衞賞戴花翎厯擢至頭等侍衞賞丹巴巴圖魯號二十五年凱旋居京城詔列次五十功臣圖像紫光閣贊曰控弦疆場横槊沙磧還經黒水中流投策蠭屯蟻聚跳盪隻身捉生燒寨勇著索倫二十七年叙功恩賜騎都尉又一雲騎尉世職三十二年賞副都統銜三十三年擢御前侍衞三十六年出征金川擊賊於得爾宻受鳥鎗重傷是年十二月奉㫖授蒙古副都統遇缺坐補三十七年二月傷發歿賞䘏如陣亡例尼薩爾圖尼薩爾圖索倫鑲紅旗人姓達巴圖氏世居打牲地方由佐領委署㕘領乾隆十九年於副都統三格隊出師伊犁二十一年九月二十二日奉將軍達爾黨阿令宣諭哈薩克旋為所害賞䘏如例達薩木保達薩木保索倫鑲紅旗人由奨賞藍翎委署㕘領乾隆二十二年八月十二日隨副都統額爾登額征𠞰克勒特賊衆於博羅齊地方戰殁賞䘏如例巴衣爾圖巴衣爾圖索倫鑲紅旗人姓喀哈爾氏世居呼倫貝爾