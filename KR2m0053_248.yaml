body:
  text: 人物志一百十四忠義傳二十六駐防八旗三一百十人乾隆年中共穆金保穆金保索倫鑲黃旗人姓敖拉氏世居打牲地方由驍騎校署防禦乾隆十九年出征伊犁二十一年二月初一日隨參贊大臣富德在烏塔莫庫爾擊賊歿于陳賞恤如例濟卜竒爾圖濟卜竒爾圖索倫鑲黃旗人姓薩木呼爾氏世居打牲地方由披甲委署驍騎校乾隆十九年於副都統三格隊出征伊犁二十一年六月十三日賫奉諭旨前往將軍達爾黨阿軍營行次阿爾輝地方遇賊戰歿賞恤如例奈雅圖奈雅圖索倫鑲黃旗人姓敖拉氏世居打牲地方由領催委署驍騎校乾隆十九年從征伊犁二十二年八月二十日隨副都統順德納收剿凖夷餘衆于哈拉和落地方戰歿賞恤如例阿尼雅圖阿尼雅圖索倫鑲黃旗人姓敖拉氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出征伊犁二十二年八月二十日隨副都統順德納擊賊沙拉斯嗎唬斯陳亡賞恤如例尼喀岱尼喀岱索倫鑲黃旗人姓薩滿呼氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁二十四年正月隨副將軍富德進剿逆回戰歿賞恤如例錦濟噶爾錦濟噶爾索倫鑲黃旗人姓敖拉氏世居打牲地方任總管乾隆十九年於副都統三格隊出師北路二十四年閏六月逆回霍集占棄葉爾羌城西走參贊大臣明瑞追襲之於霍斯庫魯克山賊大敗錦濟噶爾追賊力戰歿于陳賞恤如例密雅瑪察密雅瑪察索倫鑲黃旗人姓鄂諾思氏乾隆三十八年由委署參領隨征金川得功牌四三十九年六月擊賊於猛固寨陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表錫爾庫爾錫爾庫爾索倫正黃旗人姓阿拉爾氏世居默爾根城由領催署防禦乾隆十九年隨征伊犁有功二十二年正月隨定邊將軍兆惠收𠞰凖夷餘黨力戰歿于陳賞恤如例達爾金查達爾金查索倫正黃旗人姓達巴圖氏世居呼倫貝爾由驍騎校委署前鋒參領乾隆十九年隨將軍達爾黨阿出征伊犁二十二年十一月十一日隨都統滿福以偏師追𠞰沙拉斯嗎唬斯行次哈拉和落與都統等同為賊人誘害賞恤如例都倫車都倫車索倫正黃旗人姓達巴圖氏世居呼倫貝爾由領催署防禦乾隆十九年出征伊犁遇陳先登厯著勞績二十三年十月十三日隨靖逆將軍那木札爾赴定邊將軍兆惠軍營星夜遄行於葉爾羌地方猝遇逆回蟻集偕將軍等力戰歿于陳賞恤如例寧濟圖寧濟圖索倫正黃旗人姓郭佳氏由領催委署驍騎校乾隆十九年出征準噶爾得功牌六三十四年隨征緬甸三十八年調征金川四十年正月擊賊於空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表阿拉海阿拉海索倫正黃旗人姓鄂羅氏乾隆三十八年由佐領奬賞花翎隨征金川四十年四月擊賊於榮噶爾博陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表桂保桂保索倫正黃旗人姓墨爾迪音氏乾隆三十八年由委署七品官隨征金川進攻馬奈等處得超等功二次四十一年七月擊賊於喇嘛寺陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表噶拉岱噶拉岱索倫正白旗人姓都拉爾氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁二十一年十一月十一日隨副將滿祿解送營馬於庫車軍台遇賊戰歿賞恤如例扎爾善扎爾善索倫正白旗人姓都拉爾氏世居打牲地方任總管乾隆十九年隨征伊犁有功二十三年十月十三日隨定邊將軍兆惠進𠞰波羅泥都霍集占自庫車直薄葉爾羌逆回負嵎拒戰於喀拉烏蘇河陳亡賞恤如例喀塔木保喀塔木保索倫正白旗人姓薩木格爾氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁厯著勤勞二十四年正月隨副將軍富德追𠞰逆回戰歿賞恤如例額德爾圖額德爾圖索倫正白旗人姓圖克敦氏世居呼倫貝爾由領催委署前鋒參領乾隆二十一年隨定西將軍達爾黨阿出征哈薩克二十三年五月初八日隨副都統唐喀祿於布空郭爾地方遇賊戰殁賞恤如例阿納查阿納查索倫正白旗人姓那喀他氏世居呼倫貝爾任奬賞藍翎乾隆十九年出征伊犁有功二十四年閏六月二十八日隨參贊大臣明瑞追剿波羅泥都霍集占敗逆回於霍斯庫魯克山戰歿賞恤如例岱隆阿岱隆阿索倫正白旗人姓都拉爾氏世居打牲地方由領催奬賞藍翎委署參領乾隆十九年隨征凖噶爾著有勞績二十四年閏六月二十八日隨參贊大臣明瑞追𠞰逆回於霍斯庫魯克山力戰歿於陳賞恤如例托尼保托尼保索倫正白旗人姓沃哷氏乾隆三十八年由領催委署驍騎校隨征金川得功牌四三十九年六月擊賊於猛固寨陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表雅庫雅庫索倫正白旗人姓鈕祜祿氏乾隆二十一年由防禦出征巴里坤得功牌頭等者二三等者三三十八年隨征金川屢著勞績得頭等三等功牌各三四十一年正月擊賊於噶喇依身受重傷三月傷發歿賞恤如例恩賜雲騎尉世職承襲詳見世職表莫克庫莫克庫索倫正紅旗人姓圖克坦氏世居打牲地方由領催委署驍騎校乾隆十九年於副都統三格隊出師伊犁二十一年十一月二十六日隨副都統阿敏道往葉爾羌喀什噶爾招降逆回為霍集占計誘與都統等同時被害賞恤如例莽喀爾莽喀爾索倫正紅旗人姓都克坦氏世居打牲地方由領催委署驍騎校乾隆十九年出師伊犁二十一年奉定邊將軍兆惠令隨副都統阿敏道往葉爾羌喀什噶爾招降逆回為霍集占計誘與嘉虎等同被害賞恤如例阿永果爾阿永果爾索倫正紅旗人姓阿爾奔查氏世居呼倫貝爾由領催委署驍騎校乾隆十九年隨將軍達爾黨阿出征伊犁二十一年六月十三日隨副將軍哈達哈與賊塞音白勒克戰於