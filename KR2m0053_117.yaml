body:
  text: 選舉志二八旗科第二八旗翻譯科武科緣起順治八年定考試翻譯之考官於初九日入貢院出題考試滿洲舉人止考一場十四年停止翻譯考試康熙四十八年兵部議嗣後八旗漢軍包衣無品級筆帖式庫使由官學生補授之外郎間散人等有願考試武生者該旗開列姓名移送順天府照例考取武生八十名鄉試時將所取武生并中書及部院衙門筆帖式不論上朝未上朝廕生監生以及監生之披甲護軍領催拜唐阿有願應武鄉試者該旗開列姓名移送順天府與武生一體鄉試取中武舉四十名如不中式者仍令當差會試取中武進士八名俱照文場格式另編合字號考取奉旨依議雍正元年總理事務王大臣奉上諭八旗滿洲等除照常考試漢字秀才舉人進士外在滿洲等翻譯武藝亦俱屬緊要應將滿洲另翻滿文考試秀才舉人進士武秀才舉人進士之處爾等會同該部作何考試額數多少等處定議具奏尋議覆嗣後八旗滿洲等亦照漢軍考取武秀才舉人進士之例秀才取四十名舉人取二十名進士取四名外場停其舞刀掇石俱令射馬步箭有能拉徑弓馬上熟練樣式好者令其入內場另編滿字號照漢軍例考試其殿試亦照此例是年禮部遵旨議定滿洲蒙古能翻譯者三年之內考取秀才二次舉人一次進士一次鄉試會試另立一場於子午卯酉年二月鄉試辰戊丑未年八月會試又覆準翻譯考試新奉特旨惟恐學習之人尚少應於本年十月考取秀才一次其鄉試於雍正二年十一月舉行會試於雍正三年二月舉行殿試於三月舉行又定翻譯鄉試應考之人不拘滿漢字貢監生員及現任筆帖式能翻譯者俱照例考試馬步箭咨送入場其現在文舉人能翻譯者亦準與翻譯會試二年定翻譯應試士子有滿漢字貢監生員及現任筆帖式其書寫卷面漢字生員應書寫順天府儒學八旗貢監併翻譯生員卷面俱書寫禮部現任筆帖式卷面俱書寫各該衙門四年定翻譯鄉試增添漢軍又定翻譯鄉試照順天鄉試例於初九日頭場十二日二場十五日三場是年又奉旨考試翻譯舉人即作三場考試亦無非翻譯作一次考好一日一夜量其所能奏章一道或四書或五經酌量出一題目考試其優劣便可見這考試並不做漢文字不必派漢大臣再考試舉子俱係八旗內人其翻譯好者衆所共知即字迹亦最易認伊等試卷應行謄録著六部各衙門繕書之筆帖式內酌量足用選取令其謄寫其堪中式之卷挑選呈覽時再行定其額數仍選備卷呈覽分房及看守巡察官員俱照文鄉試例派用舅舅隆科多會同禮部確議具奏又奏準本年十一月鄉試取中翻譯舉人九名並文舉人願就翻譯會試者據各該旗册送到部通共二十八名人數甚少或照原題於雍正三年二月會試或俟取中舉人及情願入翻譯會試之文舉人至五十名再行會試奉旨六十名會試七年九月都察院左副都御史管理順天府尹事陳良弼奏查本年十月初七等日武闈鄉試所有一切應行事宜臣現在照例舉行苐查武場條例內開直𨽻各省緑旗營兵有通曉文義願應武鄉試者在充伍地方令該營將辨申送巡撫同武生一體鄉試而八旗滿洲蒙古漢軍例內止開將所取武生併中書及部院衙門筆帖式不論上朝未上朝廕生監生以及監生之披甲護軍領催拜唐阿有願應武鄉試者該旗亦開列姓名移送順天府與武生一體鄉試等語並無副驍騎校前鋒馬兵準入鄉試之條是以從前均未收試現今各旗將副驍騎校前鋒馬兵人等願就鄉試者紛紛咨送前來臣仰體皇上愛惜人材至意請將八旗副驍騎校前鋒馬兵人等可否亦照護軍營兵鄉試之例準其一體應試隆恩出自聖裁奉旨護軍校前鋒準其入場驍騎校馬兵亦準其入場九年奉上諭看來蒙古旗下人能蒙古話及能以蒙古字翻譯者甚少如是相沿日久蒙古文字并蒙古話必漸至廢棄宜令蒙古旗下人亦照考試滿洲翻譯生員舉人進士之例考取蒙古翻譯生員舉人進士在理藩院補用如有讀習漢書情願考試文生員舉人進士者令照常考試著在别部院補用如此則蒙古旗下人俱各奮發勤學蒙古文字並蒙古話不至廢棄而理藩院亦收得人之效著大學士會同理藩院議奏又定八旗蒙古人等能翻譯滿洲蒙古文字者照考試滿洲翻譯之例一體考試又遵旨議準八旗蒙古人等能翻譯滿洲蒙古文字者照考試滿洲翻譯之例三年之內考取秀才二次舉人一次進士一次鄉會試與滿洲翻譯合為一場考取秀才於本年十月舉行鄉會試於考試滿洲翻譯一同舉行十年停止滿洲蒙古武科十二年四月奉上諭朕御極以來於滿漢人材廣開登進之路兾收得人之效是以雍正元年定有滿洲亦準考試武場之例今已行之十年未見有宜用緑旗之材况滿洲弓馬技勇逺勝於漢人將來行之日久必至科場前列悉為滿洲之所占而滿洲文藝不及漢人又恐考試內場時不免有傳遞代作等弊似於作養人材之道未有禆益著行停止乾隆二年奏準本年八月舉行恩科翻譯鄉試明年二月再舉行正科翻譯鄉試乾隆三年題準翻譯鄉試已厯六科現在翻譯舉人約有百餘名又原議文舉人能翻譯者亦準入場合之翻譯舉人人數實係衆多應於乾隆己未年八月舉行翻譯會試其會試事宜俱照題定則例辦理四年二月奉上諭朕從前降旨將代賠祖父虧空已奉恩免人等停選者停補者俱準歸入伊等班次銓用其應賠祖父革職之員亦準一體開復今朕念旗人有因代賠祖父虧空者力不能完治以枷責之罪此等人員與本身虧空及緣事枷責者究屬有間概行擯棄情亦可憫伊等如願考試著該旗查明除原案內載有不準考試字樣外俱準一體考試俾各奮勉自新以昭朕格外加恩之至意是年八月禮部奏準恭譯諭旨除本身虧空及緣事枷責並原案內載有不準考試字樣者俱應遵照不準考試外查代賠祖父虧空人等其中有已出仕及進士舉人貢監生員之不同而力不能完治以枷責之罪者原因虧空獲譴與奉恩豁免未經治罪者有間若不將應行準考之人與何項考試之處分晰奏明恐八旗辦理未能畫一而舉貢生員等或因諭旨有考試字樣妄兾開復以應鄉會試致啓僥幸之端臣等伏思已經出仕之人與夫進士之歸班候選舉人之挑選注册以及貢監之捐有職銜者從前既奉恩旨吏部分别辦理已多準豫開復需次銓用之人惟其中有力不能完治以枷責之罪者原不便與奉恩豁免人等同邀開復皇上格外加恩準其考試要令進身有階不致終身擯棄似非謂已革之舉人仍得以舉人應會試已革之貢監生員仍得以貢監生員應鄉試也臣等酌議旗人有因祖父虧空力不能完治以枷責之罪除查係間散人等應準其照例考試外其已經出仕及進士舉人貢監生員等如願考試者俱照間散人等準其一體考童子試並與旗下翻譯等項考試以圖上進但不得借考試之端希圖開復如查係曾經發遣並入辛者庫赦回其罪原不止於枷責者其本身應仍不準考試以杜冒濫五年奏準查向例遇有子午卯酉年二月舉行翻譯鄉試其科考翻譯童生多在前期十一月十二月間但今年因有閏月現在天氣寒冷難於書寫將翻譯科考移於明年二月內其翻譯鄉試移於明年三月內次第舉行七年七月大學士伯鄂爾泰奏準翻譯會試即於文闈會試時另編字號令其一同考試應請分為兩場其頭場人衆不必點進於二場三場點進九年三月具奏八旗新進翻譯生員因翻譯鄉試場期甚迫不及與舊案生員一同考試馬步箭可否令其一體應試之處請旨奉旨著下次再行考試十一年大學士果毅公訥親等議覆侍郎德齡等奏稱翻譯生員照文生員之例分别考試列為六等以示勸懲督課翻譯生員等亦請照文生員之例設立滿洲教官等語查本年閏三月內御史岱圖條奏八旗翻譯童生亦照文生之例於進場之前由該旗考試一次通順者準其入場考試經臣等議準在案是考試翻譯之生員以前既由該旗先將童生考試一次始準入場而進學之後鄉試時今又定例科考三等以上者準其鄉試其又添嵗考另設滿教官督課之處均毋庸議是年十一月禮部奏準查雍正元年科場條例內開翻譯鄉試應考之人不拘滿漢字貢監生員并現任筆帖式能翻譯者俱照例考試馬步箭咨送入場等語雍正七年奉上諭凡由舉人考試補用筆帖式者俱準其與舉人一體會試其由貢監考試補用筆帖式者亦準其考試翻譯舉人時一同考試皆所以廣育人才使之各有所成就也至於由貢監生員考取小京官筆帖式之員其中未必無通曉舉業文藝者若因其已經得官遂不得與於鄉試則彼平日之所學莫由表見亦屬可惜著通行八旗凡由貢監生員之考取小京官筆帖式者若願就鄉試俱準其與舉子等一同入場考試使片善寸長不致遺棄以副國家教養人材之典欽此是筆帖式必由貢監生員出身者始準翻譯鄉試雍正七年所奉諭旨甚明緣元年條例內有現任筆帖式能翻譯者俱準入場之語是以厯科以來即不由貢監出身之七八品筆帖式小京官及九品筆帖式亦援照現任之例據該旗造送一體應試相沿日久漫無分别臣等伏思鄉試大典若不詳細辦理甚非慎重科場之意查九品筆帖式祗應考生員若竟準其鄉試殊屬躐等應請嗣後九品筆帖式俟考取生員後再準鄉試至七八品筆帖式小京官不由貢監出身者其中不無留心滿漢文藝翻譯明通之員既已應考多年今若停其鄉試則伊等限於品級又不得降等考試生員平日所學莫由表見誠為可惜臣等詳譯雍正七年諭旨原為振興文學廣育人才起見請嗣後不由貢監生員出身之現任七八品筆帖式小京官有能翻譯者仍照雍正元年定例準其翻譯鄉試又是年十二月大學士果毅公訥親等議覆侍郎德齡等奏稱皇上軫念清話清文為我朝根本照考文生員之例考試翻譯生員舉人進士今滿洲等俱各奮勉學習陸續取中翻譯生員舉人甚多但舉人係即補放官員之人用在部院辦事供職無暇肄業至生員並無應辦之事正可學習若不定以考課之例則所學日漸廢棄請嗣後取中翻譯生員照文生員例交與欽點考試翻譯生員之大臣於考試生員之前分别考試列為六等以示勸懲翻譯鄉試之年亦照文鄉試録送之例將舊有翻譯生員交與欽點考試翻譯生員之大臣於考試翻譯生員之前分别考試列在三等以上者準其鄉試其餘不準鄉試再翻譯生員平日約束教𨗳不可無官亦請照文生員之例設立滿洲教官再八旗蒙古人等亦蒙皇上一視同仁準其考試蒙古翻譯生員舉人所有陸續考取蒙古生員考課董率亦請一併議奏等語查設立翻譯科原為鼓舞滿洲令諸生專意學習國語考取時必取真才然後未得考取之人方知奮勉勤學而翻譯書史亦能發揮清文精粹義理若僅照現行之例並不分别查考由該旗一概送考而主考大臣又計考試人數之多寡視其文理略通者將就取中以致多寡不符是以二十餘年考過九次殊少優等應定考試之例求取真才令生員分别考試三等以上者準其鄉試其餘不準鄉試應如所奏交與禮部嗣後翻譯科考時將舊有翻譯生員預先查明造册咨送欽點考試翻譯生員之大臣於考試生員之前定期入場分别考試列在一二三等者準其鄉試其餘不準鄉試蒙古生員亦照此例辦理十三年大學士伯張廷玉等議準查翻譯考試從前並未定有額數是以厯科童生及鄉試會試中式舉人進士多寡未免不均今奉諭旨飭令臣等酌定額數使考官得以遵循辦理不致有多寡不均仰見皇上慎重科名之至意臣等伏查厯年嵗科應考滿洲翻譯童生約計八九百名及一千二三百名不等取進生員或四五十名或八九十名不等通計十一二名取進一名亦有二十三四名取進一名應考蒙古翻譯童生約八九十名及一百一二十名不等取進生員或八九名或十三四名不等通計有五六名取進一名亦有十名取進一名各在案查滿洲蒙古漢軍每次應考文童者約計八九百名額進九十名在考試雖事同一例然翻譯較之時藝似屬稍昜據入場人數翻譯與文童不甚懸殊如與文童一例取進恐應試之人俱趨易途滿洲翻譯生員應照文童取進之額每三名減去一名共減三十名嗣後滿洲翻譯生員額取六十名至應蒙古翻譯童試之人數較之文童應試者十分之一其取進之額亦應照文童取進之額每十名取進一名嗣後蒙古翻譯生員額取九名再查厯科鄉試應考滿洲翻譯者約五百餘名或六百餘名不等取中舉人或四十餘名或五十餘名不等通計有十名取中一名亦有十一二名取中一名應考蒙古翻譯者約四十餘名或六十餘名不等取中舉人或五六名或八九名不等通計係六七八名取中一名亦在案查滿洲蒙古漢軍每科應文鄉試者約計五六百名額中四十一名滿洲翻譯自雍正年間始行開科應試者無多取中者亦屬無幾至乾隆二年迄今五科應試舉子與應試文舉之數目不相上下而取翻譯舉人每多於文舉臣等伏思八旗進身之階甚廣不止於翻譯一途如比文舉人額數較多未免過濫應照文舉人額數每十名減去二名共減八名滿洲翻譯舉人額中三十三名蒙古翻譯鄉試如照文鄉試之額每十名取中一名似覺偏枯若循厯科中式之數取中又未免太濫臣等酌請嗣後蒙古翻譯舉人額中六名以上各額如無佳文應令考官遵照定例寧缺無濫即將來人文日盛取中之數亦不得有逾定額至取中翻譯進士查直省會試中額係由禮部將會試舉人三場實在數目題請欽定中額所有翻譯進士應照文進士之例禮部將翻譯舉子兩場實在數目題請欽定中額交與閲卷大臣遵旨取中十四年六月順天府尹奏準凡應翻譯鄉試者除生員已遵例録科外其文生員貢監天文生中書筆帖式等均照文鄉試八旗貢監録科之例一體録科列在一二三等者準其鄉試其餘概不準入場則真才得以入彀薄劣難以濫等庶於考試翻譯事宜更為周密至録科題目應照考試翻譯童生之例恭請欽命欽點大臣憑文選取分等第名次同科考生員名册併交禮部出榜曉諭以昭畫一所有録科應用供給食物紙張筆墨等項應請於大宛兩縣經費項下核銷其餘一切事宜悉照考試翻譯童生之例畫一辦理是月順天府尹奏準翻譯科考向例定於十一月十二月內舉行時屆隆冬天寒晷短士子頗難書寫上科因天氣嚴寒改期於次年二月內考試科考甫竣接踵鄉試新進生員緣兵部不及辦理考箭遂致不得觀光臣等請翻譯科試定期於十月內舉行十六年奏準翻譯鄉會試請遵照文鄉會試開科恩旨一體考試除翻譯會試應照原議於壬申年八月內同文會試合為一場考試外至翻譯鄉試因主考監臨各所等官以及應試舉子人數衆多號舍房間俱不敷用未便合為考試是以向例另立一場於二月舉行今文鄉試欽定三月其翻譯鄉試應請於二月舉行十九年三月大學士公傅恆等遵旨議準查八旗翻譯鄉會試之設原欲令滿洲人等學習國書並非專以科名為重乃近年以來八旗應試之人多事鏤刻字句希圖中式於實在翻譯文義轉覺相去愈逺且查康熙六十餘年之間並非以翻譯取士而其時之精通翻譯者未嘗不人才輩出是翻譯鄉會二試轉覺有名無實况八旗通曉漢文者既可專就文闈以博科第而曉習翻譯之人原皆可考取內閣中書及筆帖式庫使等項亦不必藉鄉會試以為進身之階嗣後除翻譯生員應仍照舊考試留為伊等考取中書筆帖式之地其鄉會二試應請永行停止二十二年議準八旗另記檔案文武舉人生員貢生監生翻譯舉人生員仍照從前舊例雍正十三年並乾隆六年議定原係另户抱養民人為子者歸入民籍仍準考試如本係家奴開户另記檔案者其本身係文武舉人生員貢生監生翻譯舉人生員止準頂帶終身不準再行考試再此項人等既經出旗為民所有子孫應各照該籍民人例一體辦理四十年奉上諭御史穆隆阿請復考試翻譯舉人進士一摺所奏不可行已於摺內批示矣從前令旗人考試翻譯舉人進士原以清書為滿洲根本考試翻譯使不失滿洲本業也後因應試人員每以尋章摘句為事轉失翻譯正道殊屬無益因諭令軍機大臣等詳加定議除翻譯生員仍行考試以為考試中書筆帖式之階其翻譯舉人進士俱停考試亦欲使滿洲等屏絶浮華敦崇實學若必考試翻譯舉人進士衆人始能學習清書精通翻譯則前此未經考試翻譯舉人進士時精通翻譯者又豈乏人可見凡事惟在務淳朴收實效豈在徒事虛名滿洲等果能不失根本不尚虛文於滿漢諸書勤加肄業精通翻譯則生員筆帖式中書皆可考試若必考取舉人進士始得謂之出身徒虛名耳有何實用穆隆阿此奏與朕教養旗人勤習滿洲本業之至意不相符合不可行著將此通諭知之四十一年奉上諭翻譯鄉會試停止以來已二十餘年近日滿洲學習清文善翻譯者益少著加恩以乾隆戊戌年八月考試翻譯舉人己亥年三月考試翻譯進士既與文武科場日期兩不相礙且豫伊等一年之功俾得從容究心翻譯益臻精熟四十二年覆準考試翻譯舉人生員名册並請由各該旗徑送順天府核辦是年二月奏準翻譯鄉試應考之翻譯生員文生員貢監生天文生中書七八品筆帖式小京官等應照舊例由欽派考試翻譯生員之大臣先期考試列在一二三等者準與新進生員一體入場至會試除翻譯舉人文舉人準其考試外其筆帖式小京官係翻譯舉人文舉人出身者均準會試又查乾隆二十二年奉旨八旗童生生員遇嵗科考鄉試時停其考試騎射由舉人考試進士時仍照舊兼試馬步箭伊等若馬步箭不好即將名開除不準會試欽此嗣後翻譯會試亦應請照文場之例遵行是年二月奉上諭今日據派出監視考試翻譯進士八旗舉人馬步箭之𢎞暢等奏稱此次應考翻譯進士人員內除患病有故之外其餘步箭平常並馬箭不能者共九人請除名不準考試其馬步箭尚可者僅四十七人人數不足應否準其考試之處請旨等語滿洲等讀書學習翻譯固係當務之事而馬步箭究係滿洲根本斷不可不至精純不能射馬步箭即使翻譯尚好亦屬無用是以先遇考試必特派王大臣先看馬步箭擇其稍可者方準其應試此次步箭平常以及不能騎射之佛保等九人除名不準考試甚是其餘四十七人雖不足數並與入於貢院之例不符而馬步箭尚可但停止考試翻譯進士舉人之例業已二十餘年今朕特恩復行準考况上年初次考試翻譯舉人是應考進士者亦不能多有其人若因人數不足照例不準考試非朕教育滿洲至意此四十七人著加恩交該部仍行辦理考試但八旗都統等平日辦事無多此等事亦不能辦理乎著通行曉諭八旗此一次朕不深究嗣後凡考試進士舉人生員之人各該都統等務必嚴行察查善為教訓於未考之前揀選馬步箭可觀以及稍可者準其送名倘仍有平常之人被特派王大臣查出具奏不惟不準其人應試惟該都統等是問斷不寬恕也又多羅定郡王等奏準查八旗新滿洲烏拉齊等俱因漢仗較好特蒙聖主施恩留駐京城伊等子孫受主上養育之恩一應生計學業皆與舊滿洲一樣從前一應考試八旗並未分别新舊俱與舊滿洲一體報名考試以至考中者不少由翻譯進士升至侍郎者俱有自乾隆二十年奉旨停其新滿洲烏拉齊應試遂無論新舊移駐皆不準其考試臣等伏思停止新滿洲烏拉齊等考試者係初移駐之人俱係在本處所生素不識文字未嘗學問而充數考試反染漢習反將伊等舊業廢棄若在京城所生已過二三世者平時習學騎射讀書翻譯之人甚多原與舊滿洲蒙古無異况三十四年所降諭旨內東三省人等移駐京城在此等所生子孫已過二世於久駐京城之舊滿洲蒙古無異即照京城滿洲蒙古一樣補用外任欽此此誠舊滿洲新滿洲俱係皇上世僕一體教養之意也今準令伊等補放外任而不準其考試殊與聖主養育之意不符適因翻譯乃滿洲等舊業蒙特恩復行考試翻譯舉人進士之例凡考試之期預先考試清語騎射可觀者方準送名請嗣後除初移駐人外其在京所生已過二三世之新滿洲烏拉齊內如有能習翻譯者仍照從前與舊滿洲一體考試四十三年奉上諭今年翻譯鄉試例應於八月考試但今秋起鑾前往盛京翻譯考試甚屬緊要務於起鑾之前考試方為妥協著交該部將翻譯鄉試改為七月初旬考試欽此遵旨議奏此次翻譯鄉試於七月初四日考官等入場初六日士子入場考試翻譯鄉試應照舊例止考一場會試分為兩場又翻譯童生向照文生之例三年兩試惟是乾隆四十一年順天府奏準翻譯童生定於八月考試今鄉試定於八月舉行並今嵗鄉試奉旨定於七月初間舉行所有翻譯童生請改於五月考試庶與鄉試兩不相礙四十六年禮部具奏恭照乾隆四十一年十二月初八日奉上諭翻譯鄉會試停止以來已二十餘年近日滿洲學習清文善翻譯者益少著加恩以乾隆戊戌年八月考試翻譯舉人己亥年三月考試翻譯進士既與文武科場日期兩不相礙且豫伊等一年之功俾得從容究心翻譯益臻精熟欽此四十九年尚書和珅等奏準查考試滿洲翻譯舉人係順治八年所定十四年停止雍正元年奉上諭著總理事務王大臣會同該部將滿洲另翻滿文考試秀才舉人進士之處定議具奏欽此經王大臣等議定滿洲蒙古能翻譯者三年之內考試秀才二次舉人一次進士一次乾隆十九年大學士傅恆等遵旨議將翻譯鄉會二試停止嗣於四十年奉上諭翻譯鄉會試停止已久著加恩於戊戌己亥兩年舉行鄉會試嗣後每屆三年由部具奏其準考與否候旨定奪欽此欽遵在案至翻譯生員因留為伊等考取中書筆帖式之地是以乾隆十九年傅恆等議定時未經裁減臣等悉心酌議中書筆帖式既準生員考取自可留此一途使八旗人等知進身有階庶各留心學習翻譯但三年兩考未免為期太近應請嗣後改作三年考試滿洲蒙古生童一次奉旨知道了四十九年甲辰科翻譯鄉試之期應否照例舉行奉旨不必五十一年禮部具奏查乾隆四十六年奉旨翻譯鄉會試從前停止已久嗣於乾隆四十三四年復舉行考試原係特旨加恩今該部因屆三年復又奏請為期太近恐開幸進之門此次所請考試之處不必舉行嗣後每屆三年該部仍照例具奏其準考與否候朕降旨定奪欽此嗣於四十八年經臣部具奏四十九年三年屆期應否舉行翻譯鄉會試恭請欽定奉旨不必欽此欽遵各在案今查翻譯鄉會試自四十九年奏請之後至五十二年又屆三年之期理合遵旨預行奏聞應否舉行考試之處等因奉旨準其照例舉行五十二年禮部議準順天府呈稱查翻譯條例內開八旗滿洲蒙古漢軍翻譯生員文生員貢監生天文生中書七八品筆帖式小京官科考列在一二三等馬步箭合式者俱準鄉試與新進生員一體入場等語又查乾隆九年三月內禮部具奏八旗新進翻譯生員因翻譯鄉試場期甚迫不及與舊案生員一同考試馬步箭可否令其一體應試之處請旨奉旨著下次再行考試欽此欽遵各在案查核例意是新進翻譯生員毋庸考箭復詳譯乾隆九年旨意亦可酌量辦理今本年新進翻譯生員雖與五月內與録科人員一同考箭但究係考試童生之箭現在鄉試自應仍行考試而例內亦無考試明條如循文場鄉試之例則此時行文八旗查取旗册再送兵部奏派王大臣驗試騎射為期甚迫恐難趕辦可否援照乾隆九年旨意并遵循條例此次免其考箭與録科人員一同入場鄉試之處咨呈禮部查照劄覆以便遵照辦理等因查乾隆九年三月初八日翻譯鄉試經本部以新進翻譯生員於初一日始出試案不及與舊案生員一同考試馬步箭可否一體應試之處具奏請旨奉旨著於下次再行考試欽此又乾隆十四年因上科翻譯科試甫竣接踵鄉試新進生員緣兵部不及辦理考箭遂致不得觀光請將科試改期於十月舉行等因經該府自行奏準各在案是從前新進翻譯生員未經考箭者不準鄉試向例甚明至四十四年翻譯會試時奉旨滿洲讀書翻譯固係當務之事而馬步箭究係滿洲根本斷不可不至精純熟不能射馬步箭即使翻譯尚好亦屬無用是以凡遇考試必特派王大臣先看馬步箭擇其稍可者方準應試嗣後凡考試進士舉人生員之人各該都統於未考之前揀選馬步箭可觀以及稍可者準其送名倘仍有平常之人被特派王大臣查出具奏不惟不準其人應試唯該都統是問欽此欽遵所有此次翻譯鄉試既於四十四年欽奉諭旨先試騎射其新進生員自應遵旨辦理且查現距鄉試之期一月有餘無難趕辦非如乾隆九年新進生員出案數日即屆鄉試可比相應劄覆該府尹即行咨取新進翻譯生員等年貌履厯造具旗册速送兵部辦理考試又禮部具奏查雍正三年二月翻譯會試據各旗册送應考舉人共二十八名經臣部以人數甚少或俟取中舉人及願入翻譯之文舉人至五十名再行會試等因具奏奉旨六十名會試欽此又乾隆五十二年五月內欽奉上諭向來滿洲蒙古翻譯鄉會試每屆三年將應否舉行之處請旨辦理但旗人進身之途甚廣並不專藉翻譯且其間亦未見出真才也嗣後每屆五年舉行一次亦不必請旨可行與否矣伏查乾隆五十三年係先經臣部奏準應行翻譯會試之期惟是行據各該旗將應考舉人造册咨送到部共祗有三十八名不足六十名之額所有此次翻譯會試應請暫行停止遵旨俟五年屆期鄉試後取中舉人漸多足敷六十名之數再行奏請會試奉旨知道了以上八旗翻譯科武科緣起欽定八旗通志卷一百三
