都統副都統城守尉等官不給咨文者罰俸九個月至旗人有事來京事畢仍回原處者呈明在京該旗出咨知照該地方再具印文給與本人投交該管駐防官以憑查對如有不候給咨私行回去或領咨潛往他處及已呈明該旗而該旗官員不給咨文者均照前例議處其旗員緣事解任仍留任所者如隨任子弟有應行質問事件由接任官申報該上司咨明該部該旗仍留任所候質若無質問事件由該地方給咨歸旗倘不候給咨私自潛回者亦照前例議處家口歸旗駐防病故官兵孀婦家口準在該處置立産業毋庸來京至由京補放之員在任病故孀婦家口或願在外居住或願歸旗俱聽其自便其願來京者該管官查明實數出具保結該將軍都統副都統等咨明總督巡撫照例給車核計本省原定車價及程站里數於管驛衙門如數彚行給發令其自行雇覔經由省分亦令首站如前辦理均於照驗內填注其家口口糧仍移取糧單以便沿途支領俟到京之日該旗查明報部併將照驗糧單分繳核銷至已經歸旗人等不準借端告假復回原駐防處所違例陳奏內外旗員陳奏事件如有不係密事妄稱密奏借公行私將私事具奏者降二級調用其題奏本章有不應密而密者罰俸六個月密封事件在京八旗除傳集在京官員人等照常不用封套外凡咨行部院衙門及外省一應公文俱加封套實封如係重大事俱釘封至駐防將軍都統副都統等陳奏本章關係緊要者將副本揭帖用密封字樣封固投遞通政司其咨呈各旗各部院衙門及於所屬官員來往公文係緊要事件亦用密封以上內外都統將軍副都統等收到緊要密封事件俱親拆收貯如將應密之事並不密封以致漏泄事機重者降一級留任輕者各罰俸九個月隱匿硃批諭旨官員具摺奏事奉有硃批諭旨者在京即行恭繳在外於下次奏事之時恭繳若稽遲隱匿不繳者革職至在外各官未及恭繳之先有緣事降革休致病故者於回旗之日或本身或親屬呈明該旗都統等代為恭繳如隱匿收存從重治罪遺失引票遺失出關口引票罰俸三個月仍行補給傳事印文八旗傳事印文傳畢之日承辦官即向傳事之人取回銷燬倘不查收致人藉以夜行者將承辦官罰俸兩個月若將預備傳事印文不行嚴查被人竊去夜行者將承辦官罰俸六個月封印後用空白印信八旗衙門封印前一日於空紙及封套上用印記明數目該都統等收貯以備封印後緊要事件填用仍登記檔案開印後將未用者驗明銷燬倘有借端作弊者交刑部治罪該都統等不行詳查罰俸六個月王等行文用印諸王貝勒貝子公等有行文該旗事件該長史併辦理家務之人列名用包衣參領關防送至該旗其有行文部院衙門者用包衣參領關防送至該旗由該旗用印轉行如長史等不行鈐用包衣參領關防仍用白文及該旗將白文接受者俱罰俸一年健鋭營文移呈明該管大臣轉報健鋭營咨行各處事件該翼長呈明該管大臣查明轉報如有遺漏該管大臣與轉報官一例議處馬厰準帶印花印信空白派往馬厰副都統於起程之前向本旗都統處將鈐印封套併印紙印花酌量足用數目帶往以備送京文移及密封具奏事件之用回日將用去件數開明知照該都統存案剩存若干於都統當面銷燬倘有遺失者將馬厰副都統罰俸三個月更改姓名武官因更改名字咨送者五品以上官員兵部彚題更改六品以下官員兵部據咨更改議處副參領副尉及駐防等官通例外省駐防官員有應行議處案件如例無専條者係將軍都統副都統照在京都統副都統例定議總管副總管城守尉協領參領防守尉照在京參領例定議佐領防禦護軍校驍騎校照在京佐領驍騎校例定議其在京副參領步軍副尉有應行議處案件如例無専條者係副參領照參領例定議係步軍副尉照步軍協尉例定議謊告襲職世襲官員革職病故已將族中應襲人保送襲職後被革之人及其妻室故官妻室并伊族人復將不應承襲之人混行告請承襲者俱鞭一百係妻室折贖族人係官降二級調用承襲世職如有舛錯等弊保結官含糊具保者降一級罰俸一年遺漏承襲世職凡應承襲之世職遺漏未經承襲者承辦官罰俸一年該管大臣罰俸六個月私用開戶人為官將開户之人徇情朦混保送為官者降三級調用擬補之大臣知情者亦降三級調用不知情者罰俸一年謊送廕監將不應廕監之人揑稱應行廕監之人送為廕監或廕監生襲職復行濛混補送廕監或將年嵗未及之廕監生謊稱年嵗已及咨送者俱罰俸一年該佐領驍騎校俱罰俸六個月參領副參領俱罰俸三個月都統副都統俱罰俸兩個月如將應得廕監之人而該佐領驍騎校不行傳知結稱無人承廕者罰俸一年遺漏者罰俸兩個月告病不實內外三品以下各官及間散世職有患病者各該管大臣查驗具奏休致王等屬員長史司儀長告病王等行文該旗都統副都統等驗實咨部兵部代題休致典儀以下告病該都統副都統長史等驗實咨部休致係五品以上官兵部彚題開缺六品以下官注册開缺其各城駐防無大臣統轄之總管城守尉防守尉等官告病呈明兵部解任回旗俟到旗之日該都統等查驗咨部休致以上告休各官如有詐稱患病者革職有世職者令應襲之人承襲若係本人所得世職亦革去其徇情具報之該管官俱降二級罰俸一年王等擾纍旗下人員王等擅將旗下人員妄行擾纍未經請旨即行治罪者該都統等奏聞倘瞻徇隱匿不行奏聞者降三級調用欽定八旗通志卷五十三
