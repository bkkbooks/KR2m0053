body:
  text: 職官志十二公式加級隨帶升任各官并滿洲侍衛等官補放緑營查係升任者原任內所有軍功加級準其隨帶其曽經奉旨賞給隨帶之級并議敘及捐納所加之級原有隨帶字樣者仍準隨帶其餘一切加級俱改為紀録一次如對品補授之官所有一應加級均準帶於新任世職所得加級後經補授職任官其職任品級與世職相等或較小於世職者俱準隨帶若職任品級較大於世職者查明應隨帶者準其隨帶應改紀録者改為紀録至職任所得加級後經承襲世職無論職任兼與不兼若世職品級與職任相等或較小於職任者俱準隨帶若世職品級較大於職任者查明應隨帶者準其隨帶應改紀録者改為紀録其佐領所得加級後升參領以上等官雖仍兼佐領者亦將加級查明應隨帶者準其隨帶應改紀録者改為紀録佐領補放副參領驍騎校補放印房章京俱係揀選引見奉旨補放之員品級雖屬相當實係升任其任內尋常加級於補放後照例咨部改為紀録加級準改紀録內外旗員遇有罰俸案件除原有紀録準其抵銷外若任內有議敘加級願改為紀録抵銷罰俸者準其呈明咨部每級改為紀録四次照數抵銷其抵銷所剩紀録遇升任時查係隨帶之級所改者仍準隨帶不係隨帶之級所改者在任時抵銷過一次二次或三次者槩行注銷若所改紀録並未抵銷罰俸準其將紀録一次帶於新任其一人而加數級者如遇議處案件按伊加級年月先後次第抵銷至覃恩所加之級不準改抵軍功加級紀録抵銷官員因公詿誤遇有議處之案應降一級者以加一級或紀録四次抵銷罰俸一年者以紀録二次抵銷罰俸六個月者以紀録一次抵銷如係軍功紀録二次準其抵銷降一級紀録一次準其抵銷罰俸一年如遇有罰俸六個月之案將軍功紀録一次抵銷免其罰俸仍給還尋常紀録一次軍功加一級準其抵銷降二級如遇有降一級調用之案將軍功加一級抵銷免其降調仍給還軍功紀録二次有即升及卓異加一級者亦準抵銷降一級其例不準抵銷并因私罪議處不準抵銷之加級紀録并不敷抵銷之紀録準其隨帶先有即升卓異加級俱不準隨帶如議處官員內任內有軍功等項并隨帶加級紀録及尋常加級紀録例準抵銷者兵部於議處時查明將該員尋常之加級紀録分别先後先行抵銷至軍政處分各官雖任內先有即升卓異加級不準抵銷亦不準隨帶若軍功加級紀録及别項加級紀録不準抵銷仍準隨帶再議處拖欠錢糧官員如有軍功及錢糧全完加級紀録者準其抵銷别項加級紀録俱不準抵銷紀録抵銷內外旗員緣事罰俸一個月至五個月不至銷去紀録一次者俱準注於紀録再遇罰俸合計抵銷如任內有紀録四次又有罰俸一個月至五個月注抵者遇因公降級處分仍準其紀録四次抵銷降一級其前議罰俸注抵銀兩補行實罰如因犯私罪議處者一槩不準抵銷降級留任準抵銷雍正三年九月奉上諭朕體恤臣工凡官員辦事著有勞績者無論大小俱敕部議敘其有過誤致干吏議者亦照例處分夫一人之身有功有過一官之級有降有加舊例官員降級留任停其升轉必三年無過方準開復降後雖有恩詔加級不準抵銷殊非以功補過開人自新之義嗣後降級留任官員遇有恩詔及議敘加級俱準以加一級抵銷降一級庶人皆奮勵勉圖後效亦鼓舞吏治之一道也至降級後捐納加級者不得抵銷前案特諭欽此乾隆五十三年十一月奉上諭內務府奏請員外郎廷標等循例開復一摺又議處副關防董濬照向例將降調處分改為罰俸一摺此例因國初年間內務府人數本少職事較多是以定例遇有降調處分俱係改為罰俸免其降調今內務府生齒日繁堪以當差者本不乏人其議處各員除奉特旨留任外自應照部院衙門之例按其情節輕重分别實降抵銷以示公允嗣後議處內務府官員著查照吏部處分則例辦理其從前改為罰俸之例即行停止除廷標等五員降調之案業已四年期滿仍準開復外所有董濬一員即照此例辦理欽此親王郡王等降級乾隆五十六年五月奉上諭向來定例兼將軍副都統之宗室王公等遇有案件應與同事大臣降調者每降一級俱加倍罰該管職任俸四年抵銷苐念因一案將同事大臣等俱行實降王公等僅於兼管職任內罰俸抵銷並不降級仍行留任未免於宗室王公等稍有袒護殊未平允本日因偷盜內庫銀兩一事業經降旨將崇尚斌寧所兼職任俱行實降著交宗人府及該部嗣後凡兼職任之宗室王公等遇有案件應與同事大臣降級調用者均著照此次之例將宗室王公等所兼職任實行議降其加倍罰俸抵銷之例著即停止况所降者僅兼任之級於伊等承襲原爵殊無干涉欽此辦理陵寢事務貝子公等罰俸分别公私乾隆四十三年三月奉旨管理宗人府旗務之王公等遇有罰俸案件如係私罪均罰王公俸若係公罪俱各罰職任俸其辦理陵寢事務之貝子公等雖無兼銜亦係在大臣分上辦事理應照依管理宗人府旗務王公之例辦理嗣後辦理陵寢事務之貝子公等若因私罪罰俸仍罰伊等貝子公俸外如係公罪即照罰都統職任俸在伊等俸祿內坐扣將此著為例欽此旗員降級八旗職任官緣事應降級留任者按所降幾級即降俸幾級應降級調用者各按品級遞降內務府所屬職任官應降級調用者每一級加罰俸一年免其降調降級多者照此遞增世職官緣事應降級留任者亦按所降之級降俸應降級調用者每一級以罰世職半俸三年議抵降級多者照此遞增罰俸未完不準升轉如世職兼職任所犯在職任者不論世職大小俱就職任議處不由職任所犯世職大即就世職議處職任大即就職任議處議處侍衛乾隆元年七月奉旨嗣後侍衛等差使遇有議處事件著領侍衛內大臣即行議奏欽此議處世職父祖所得世職承襲之子孫緣事應革職者即行議革查明應襲之人奏請承襲至本身出征因公所得世職有犯賭博宿娼枷號以上之罪者將世職黜革雖有襲次不準承襲其餘所犯之罪應革職者免其黜革永停半俸俟伊身故後子孫仍按次承襲支食全俸其本身效力隨衆所得世職緣事應革職者即行議革雖有襲次不準承襲議處大小兼銜正副參領兼管佐領者因公降革離任係參領任內之事將參領議以降革仍留佐領係佐領任內之事將佐領議以降革所兼參領該管大臣出具考語另行請旨其議以降調佐領如屬世襲者按所降級數每一級罰佐領半俸三年議抵若係公中佐領即行降調再有兼銜仍留小銜副都統以上等官有兼佐領者因公降革離任係副都統等官任內之事將副都統等官議以降革仍留佐領係佐領任內之事將佐領議以降革所兼副都統等官於本內聲明請旨其議以降調佐領如屬世襲者按所降級數每一級罰佐領半俸三年議抵若係公中佐領即行降調再有兼銜仍留小銜若因私罪降革毋庸請留兼攝之任至所兼世職除例內定有専條不準存留者仍照舊遵行外其餘俱準存留世職外省協領等官有似此兼管者亦照此例行議處世職兼文武職任文武職任官如有貪汚行止不端革職者不論何任事發所兼之官俱行革退應襲官交與該旗查明應襲之人承襲若因溺職議處者將所兼之世襲公中佐領及文武職任一併革退其世襲應否存留之處該旗具奏請旨至奉特旨革退各官係由武職內獲罪革退者所兼文職應去應留該部院具奏請旨所兼世職佐領該旗具奏請旨係由文職內獲罪革退者所兼武職世職佐領并止任武職獲罪革退者所兼世職佐領應去應留該旗具奏請旨其文職兼任因公挂誤罪止降革離任者查係何任內挂誤即由何任內降革武職兼世職官罪止革職者在武職任內挂誤革其武職仍留世職革職留任者係由何任議處即停何任之俸所剩之職尚有餘俸仍行給與降級留任者係由何任議處即按何任品級扣俸因病具呈者停俸文職俟病痊補缺日給俸若兼世職俟病痊具呈日給與世職之俸武職俟病痊隨旗當差日給俸再世職佐領挑選侍衛實因家貧不能行走經領侍衛內大臣奏退侍衛者回旗仍在世職佐領上行走若因怠惰規避行止不端參革侍衛者將所兼之職俱行革退應襲官該旗將應襲之人奏請承襲議處原任降調官員升任後遇原任事發應行降調者如係營私作弊等案情罪重大者俱於原任內議以降調將升任并所有兼任一併降調係因公挂誤情罪尚輕者於現任內議以降調仍留所兼之任至內外升任官員尚未引見遇有原任內因公降革處分參案到部仍於原任內議處將升補之處扣除係在引見之後者即於升任內議處例有展參之案照離任官例議結其毋庸引見各員並換防屯田軍營出師人員以具題奉旨之日為斷分别議處至參案到部遲延將開報遲延並督催不力各官照遲延例議處如核其發覺日期在升任以前而開報在升任以後者即照規避例議處議處記過官員八旗官員承辦事件不加詳慎致有錯失其情罪不至特疏參處者該管大臣記過一次報部存案俟積至三次該管大臣即行參奏交部將該員罰俸三個月議處出師人員派往出兵屯種駐劄官員遇有議處之案應罰俸者準其注册於事竣之日補行罰俸應降級留任革職留任者仍按年限開復應降級調用者帶所降之級仍留軍營效力暫停開缺準照原缺支食俸餉等項其應行革職者即於議處本內將該員應否開缺準留軍營效力支食半俸或作為兵丁效力之處聲明請旨以上降革準留軍營效力官員均俟事竣之日該管官將該員出具考語給咨送部引見請旨其奉特旨革職留在軍營效力者亦準其支食半俸至在辦事處有犯降革並非進𠞰者不準留營效力若有錢糧等項未清亦不準回旗伊犁新疆等處由內地派往換班及屯田各員遇有降革罰俸等案仍照向例辦理至伊犁烏嚕木齊巴里坤等處駐防大臣官員遇有處分毋庸注册均照內地駐防一例定議議處軍營派守卡倫人員乾隆十七年二月奉上諭兵部議奏將違例私將地畝典與民人之卡倫侍衛佛保應否革職仍令在軍營效力等語佛保係犯罪之員非尋常派出軍營者可比理應於年滿之後多留數年效力贖罪今乃僅將卡倫侍衛佛保議以年滿時令該將軍出具考語帶領引見所議未為詳悉佛保著留軍營俟伊應屆三年期滿後再留三年效力贖罪嗣後如有似此者俱照辦理欽此伊犁官員罰俸減半坐扣伊犁駐防滿洲索倫錫伯察哈爾厄魯特部落協領等官因公罰俸照京城護軍校驍騎校例減半坐扣重欵審虛將軍都統副都統參劾屬員所參重欵全屬虛罔者照溺職例革職若係該管上司挾嫌誣報將誣報官照此例革職至審案已結事經昭雪例得於本內聲明準其開復或原參重罪審虛該員尚有輕罪例應降級罰俸者亦應於本內聲明將原參革職之案準其開復按其所犯輕罪分别議處倘拘牽斥駁不為題請準本人赴部告理經部查核得實除將本人照例題請開復外將不行題請官照偏袒不公例降二級調用係承審官不詳請開復者照此例降二級調用如所控虛揑不實將本人交刑部照例治罪其或承審之員因原參已經去任有意審虛使參員幸圖開復照故出例革職或原參重罪全屬虛罔承審官回護原參不行審雪有心煆鍊照故入例革職并有重欵雖已審虛撏扯一二輕欵以實之代原參掩飾者照徇情例降二級調用因公降革在京武職三品以下五品以上因公降革旗員若有辦事勤練人材可用任內並無錢糧不清及治罪之案者該管大臣將該員降革之案咨送都察院秉公察核如果應行帶