員以前鋒統領護軍統領八旗副都統兼任於八旗前鋒營護軍營內每旗選參領侍衛四人前鋒校護軍校前鋒護軍六人佐之凡遇時巡省方以嚮導總統一人先期率官校詣車駕經行之地周覽山川通橋梁夷險隘計程入告駕行佩櫜鞬前導每日駐蹕後以次日程途及駐蹕之所奏聞交行在兵部曉諭闔營回鑾亦如之御營及頓營看城均由嚮導總統先期指示飭所在有司修治營盤御營謹按雖無專設之員而於翊衛之中責任綦重其嚮導簡任隨時前鋒營護軍營官謹附載於兩營之後者皆圓明園八旗護軍營總統無定員以王公大臣兼任乾隆十六年定以一人掌印亦由特簡八旗營總每旗各一人乾隆十六年定以二人隨印協理事務護軍參領各一人雍正十年設乾隆十六年定以二人隨印協理事務副護軍參領各二人護軍校委署護軍參領各四人護軍校各十六人初制共八十人雍正十年增三十二人乾隆十二年增每旗各十六人十六年定以四人隨印副護軍校各十六人雍正七年初設七十二人十年增四十人乾隆十二年增每旗各十六人即於護軍內選用筆帖式共四十人雍正十年設即於護軍內選用乾隆十三年定以八人隨印護軍共三千六百七十二名初制設三千名乾隆十二年以京城護軍移駐定額每旗各四百五十九名養育兵初制設九十六名乾隆三年增三百八十四名三十六年定額一千名圓明園護軍營之制禁苑周圍建營房八所選京中八旗官軍按旗駐劄初定圓明園門汛警蹕共百處日以營總四人副護軍𠫭領八人署護軍參領十六人護軍校護軍千入入直夜傳更籌十六恭遇駕至圓明園及還宫自圓明園至紅橋以副護軍參領署護軍𠫭領四人護軍校護軍八十人於路旁兩翼清蹕駕由水路自暢春園西南門經聖化寺至長春橋以營總三人副護軍𠫭領署護軍參領十六人護軍校護軍二百四十人於長河兩岸清蹕乾隆四年改設圓明園門汛共七十六處日以營總二人護軍參領二人副護軍𠫭領署護軍𠫭領十五人護軍校護軍七百六十人守衛暢春園增設門汛十九處日以營總一人副護軍參領署護軍參領四人護軍校護軍一百九十人守衛夜傳更籌八如恭遇駕駐靜宜園設門汛五十一處日以營總二人護軍𠫭領一人副護軍𠫭領署護軍𠫭領十三人護軍校護軍五百十人守衛夜傳更籌十車駕往還均以營總三人護軍參領三人副護軍參領署護軍參領二十人護軍校護軍五百二十人於經由之路左右清蹕恭遇駕詣黑龍潭大覺寺行禮以營總三人護軍參領三人副護軍參領署護軍𠫭領十四人護軍校護軍七百人沿路清蹕十年增設長春園門汛二十處日以護軍𠫭領一人副護軍參領署護軍𠫭領四人護軍校護軍二百人守衛夜傳更籌八十八年增設清漪園門汛六處日以副護軍𠫭領或署護軍參領一人護軍六十人守衛如恭遇駕幸靜明園等處以營總三人護軍參領三人副護軍參領署護軍𠫭領九人護軍校護軍二百四十人沿路清蹕凡選補護軍於本佐領下選充順治元年定護軍亦選用領催欽定八旗通志卷三十三
