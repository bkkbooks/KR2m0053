body:
  text: 兵制志二禁衛一領侍衛府御營嚮導驍騎營護前鋒營圓明園軍營護軍營領侍衛府滿洲鑲黃正黃正白上三旗設領侍衛內大臣六人內大臣六人散秩大臣無定員凡一等侍衛六十人二等侍衛一百五十人三等侍衛二百七十人四等侍衛無定員宗室侍衛一等九人二等十八人三等六十三人康熙三十七年增設宗室侍衛無定員雍正七年定制共九十人並入三旗隨班行走藍領侍衛九十人每侍衛十人各設什長一人即於什長及兩翼班領署班領內定以十二人隨印協理事務御前侍衛乾清門侍衛于三旗侍衛內簡用漢侍衛雍正五年定例亦分一二三等及藍翎于武進士內簡用皆無定員主事一人筆帖式十二人貼寫筆帖式十五人親軍校七十五人鑲黃旗十五人又下五旗移入十人正黃旗十五人又下五旗移入十一人正白旗十五人又下五旗移入九人親軍九百九十五名三旗滿洲蒙古佐領下每親軍二名鑲黃旗二百二十四名又下五旗移入一百三十名正黃旗二百三十四名又下五旗移入一百三十五名正白旗二百三十名又下五旗移入一百十七名內以七十五人為親軍校三旗親軍每旗選六十名隨侍衛班入直餘皆隨三旗護軍營護軍校護軍一體直宿當差凡宿衛之制更番輪直三旗侍衛各分六班班分兩翼鑲黃旗為左翼正黃旗為右翼正白旗半為左翼半為右翼各設侍衛班領二人署班領二人侍衛三十人宿衛乾清門為內班晝坐門禁夜守扃鑰散秩大臣一人侍衛親軍十人宿衛中和殿侍衛什長二人侍衛親軍三十人宿衛太和殿為外班以領侍衛內大臣一人總統之內大臣散秩大臣二人隨班入直凡扈從之制後扈二人於領侍衛內大臣內簡用前引十人於內大臣散秩大臣統領副都統內簡用豹尾班侍衛于三旗侍衛內選功臣後裔六十人日以二十人直後左門每乘輿出入以十人執豹尾槍十人佩儀刀侍於乾清門階下左右駕出豹尾班侍衛殿於後以領侍衛內大臣一人侍衛班領二人統之駕還宫隨至乾清門退歸直皇帝御太和殿受朝前引侍衛二人自乾清門後左門引至殿後止後扈大臣二人自乾清門扈從如係宫內御前大臣則自隨出後並同前引大臣十人候於殿北階下駕至按翼前𨗳進殿由左右趨至寶座前北上東西面序立後扈大臣於寶座左右僉立豹尾班侍衛於寶座後左右南向序立遇御門聽政屆時直班侍衛引有事各官由後左門入日常入奏官亦均由侍衛引進豹尾班侍衛於乾清門階下左右牆角立領侍衛內大臣直班內大臣侍衛於階下立侍衛班領每翼一人于階上左右楹前立御前侍衛隨駕出同乾清門侍衛於御座兩傍立駕還宫御前侍衛隨入餘各退歸直御經筵日侍衛二人前導至文華門止後扈大臣隨至寶座左右僉立御前侍衛乾清門侍衛於寶座後兩傍豹尾班侍衛於殿外階下均左右序立如御箭亭侍衛二人前導至降輿處止遇外藩來朝及召見外藩使臣或於便殿或於駐蹕行宫前引後扈大臣皆侍班御前侍衛乾清門侍衛直日侍衛班領豹尾班侍衛均於殿內按翼序立皇帝躬祀郊壇前引侍衛二人自乾清門前𨗳至午門外止前引大臣候於太和門北階下駕至按翼前導後扈大臣隨行自午門外乘馬至壇門外下馬均佩刀引扈御輦前後執鐙侍衛四人輦前執提爐侍衛二人皆步從輦後豹尾班執槍侍衛十人佩儀刀侍衛十人佩矢弓侍衛二十人以領侍衛內大臣一人侍衛班領二人領之建黃龍大纛二司纛侍衛什長二人以領侍衛內大臣或內大臣散秩大臣一人領之及壇前引大臣在圜丘壇三成階上立方澤壇及日壇月壇於二成階下立後扈大臣隨升壇於駕後僉立豹尾班侍衛於壇內壝門外序立祀祈年殿饗太廟前引大臣由左階升駕入殿門於中門外一成階上東西面序立後扈大臣隨入於駕後僉立豹尾班侍衛于三成階下立祀社稷壇前引大臣立于內壝門外豹尾班侍衛立于拜殿南門外展拜堂子前引大臣立于甬道北豹尾班侍衛立于祭神殿兩旁祀先農壇前引大臣立于階下豹尾班侍衛立于樂懸南遇駕耕藉御具服殿前引大臣立于殿前階上駕詣藉田引至耕所三推禮成引由觀耕臺午階升于御座前左右序立遇大閲日前引後扈大臣均甲胄引扈豹尾班侍衛甲胄殿後御前大臣侍衛等均甲胄隨行其次黃龍大纛行三旗親軍甲胄按次行駕御帳殿豹尾班侍衛按翼排列左右建黃龍大纛三旗侍衛親軍按翼環衛車駕巡幸御前大臣侍衛乾清門侍衛皆從其六班輪直之侍衛以一班或二班隨往凡選補親軍于本佐領下護軍驍騎及教養兵間散壯丁內選補隨侍衛班行走之親軍由本旗親軍內遴選弓馬人材及世胄子弟拔補均由隨印協理事務侍衛班領遴選呈本旗領侍衛內大臣補授雍正三年奏準三旗親軍令侍衛班領及親軍校管束察其騎射行走該旗差務仍照常例行雍正七年定三旗各領銀二萬兩生息以資公用由各旗協理事務侍衛班領辦理乾隆十四年奏準此項銀交各該旗辦理所得之息交內務府廣儲司收貯用時陸續支領仍令協理事務侍衛班領收管凡入侍衛班之親軍在圓明園直班各班各給飯銀二錢五分在外直班之親軍校親軍每人各給飯銀一錢五分均于公用銀內動用上謹按侍衛班內有人司轡司鞍侍衛無定員𨽻駟院侍衛每旗七上駟院其兼尚虞鷹鷂房鶻房狗房十五善射善騎射善射鵠善強弓善撲等侍衛各有専管統在三旗額內均無定員又鑾儀衛亦侍從武職設有掌衛事內大臣以下等官専司乘輿鹵簿兹不具列其所屬軍尉儀刀弓矢殳戟用親軍豹尾槍仗馬用護軍蒙古畫角用蒙古鳴角軍其奉輦擎執儀杖各校尉由內府選充者為旗尉由五城選充者為民尉奉輦旗尉百六十八人民尉六十人各執事旗尉二百四十六人民尉三百二十二人左右中前後五所民尉計一千三百二十八人馴象所民尉二百六人八旗漢軍司更兵四十人均𨽻在軍數謹附載于此八旗驍騎營滿洲八旗都統每旗各一人副都統各二人驍騎𠫭領各五人副驍騎參領各五人康熙三十四年于每旗𠫭領下增設委署𠫭領雍正元年改名副𠫭領蒙古漢軍八旗並同佐領無定員隨人户編設每佐領下驍騎校一人領催五名初制滿洲及蒙古每佐領下設領催六名康熙四十三年裁一名驍騎二十名匠役二名養育兵雍正二年初設具詳八旗思恤門乾隆三十六年定額按三兵一缺滿洲共應一萬七百九十八缺蒙古八旗都統每旗各一人副都統各二人驍騎參領各二人副驍騎參領各二人佐領無定員每佐領下驍騎校一人領催五名驍騎二十名匠役二名養育兵乾隆三十六年定額按三兵一缺八旗蒙古共應三千二百七十九缺漢軍八旗都統每旗各一人副都統各二人驍騎𠫭領各五人副驍騎𠫭領各五人佐領無定員每佐領下驍騎校一人領催五名鳥槍驍騎四十二名每旗藤牌兵一百名雍正二年漢軍每佐領下設藤牌兵四名乾隆元年定漢軍每旗設藤牌兵一百名六年定藤牌兵歸并大營每旗百名于鳥槍手額內選取並簡選𠫭領一人散秩官驍騎校各二人領催五名令其管轄養育兵乾隆三十六年定額八旗漢軍仍照原額共應四千八百十三缺凡城門直班之制內城九門安定門德勝門東直門西直門朝陽門阜成門崇文門宣武門八門各按官兵居住方位以八旗滿洲蒙古漢軍分直正陽門以八旗滿洲蒙古輪直外城七門以鑲黃旗直東便門正白旗直廣渠門正黃旗直西便門正紅旗直廣寧門鑲藍旗鑲白旗直左安門鑲紅旗直右安門正藍旗直永定門均派漢軍雍正六年于八門城外增建營房仍按八旗方位每旗委滿洲蒙古漢軍官四人驍騎校四人驍騎滿洲一百二十名蒙古四十名漢軍四十名各旗均分為四班每班五日以委官一人驍騎校一人驍騎五十名令其更番居住看守十二年又定正陽門兩旁城門即于看守八門官兵內八旗共委官四人驍騎校四人每旗各委驍騎十名接翼看守十日一次更代每日按翼各委兵十名晝夜巡宿以為常凡汛守之制康熙二十二年定恭遇車駕巡幸八旗驍騎營于內九門城上每旗增設汛六所于街道每旗增設汛十所內城各門于門內各增汛一所正陽門八旗輪直其餘八門八旗分設均委官兵看守乾隆五年復定恭謁陵寢及駐蹕圓明園南苑等處並逢年節封印後照例于城上每旗設汛六所共四十八所委驍騎營官兵與城上步軍營分汛相間看守每旗于滿洲蒙古漢軍內會委參領一人約束如恭遇巡幸口外及逺省則增設汛十五所將步軍撤下分防大街巷口城上汛守悉易以驍騎營分委驍騎校領催驍騎晝夜巡宿以參領二人往來稽察凡各處看守之制户部銀庫委官二人領催二名兵十八名庫後門委官一人兵十名顔料庫委官四人驍騎校四人領催四名兵二十八名縀匹庫委官二人驍騎校二人兵五十名以鑲黃正黃正白三旗輪派工部節慎庫以鑲紅旗官一人兵十名製造庫以正紅旗官一人兵五名刑部贓罰庫以鑲藍旗官一人兵十名宗人府庫以鑲白旗官四人兵四十名理藩院庫以正藍旗官二人兵二十名光祿寺庫以正藍旗官一人兵十名太常寺庫鑲紅鑲藍二旗輪委官一人兵十名鴻臚寺龍亭以正紅旗兵八名圓明園直月今為直年衛門左右翼各輪委領催一名兵五名海運倉以鑲黃旗北新倉以正黃旗儲濟倉以鑲白旗裕豐倉以鑲紅旗各委官二人領催二名兵三十八名舊太倉以正白旗南新倉以鑲白旗興平倉以正紅旗富新倉以鑲紅旗各委官二人領催二名兵十八名萬安倉以正紅旗委官四人領催四名兵三十一名䘵米倉以正藍旗委官二人領催二名兵三十三名太平倉以鑲藍旗委官四人兵四十一名豐益倉八旗會派官二人領催五名兵四十五名皆兼用滿洲蒙古漢軍工部濯靈厰八旗漢軍輪委官四人兵二十名硝磺庫滿洲正紅旗官二人兵二十名户部內倉滿洲正白旗領催二名兵六名以上各晝夜看守喀爾喀館園牆于喀爾喀到日委正白旗官二人兵十名館門委正藍旗官一人領催一名兵九名俄羅斯館于俄羅斯到日八旗滿洲蒙古漢軍共設班房十六處每四處委𠫭領一人每處委官一人兵十五名館門輪委𠫭領一人兵二十名外館於馬匹到日八旗滿洲蒙古輪委官二人驍騎校二人兵二十名後黃寺於蒙古使臣及喇嘛來使到日八旗滿洲蒙古輪委官一人兵十名晝夜看守均於回日撤退凡防火之制順治初年設八旗火班雍正八年定於失火在東南城令正藍鑲白二旗西南城令鑲藍鑲紅二旗東北城令鑲黃正白二旗西北城令正黃正紅二旗各率官兵往救禁城之內每翼令二旗救護步軍營見每處失火即報知相近旗分乾隆六年復定八旗火班八處每處滿洲蒙古漢軍諸旗更番輪直以都統或副都統一人𠫭領二人參領以下官八人領催八名驍騎七十二名如旗界及接壤之地有不戒于火者都統等即領直班官兵之半往救其餘官兵仍留該班處備用凡選補領催不論滿洲蒙古漢軍均於本佐領下驍騎內選充順治元年定護軍亦準選用領催雍正二年覆準八旗領催缺均于本佐領下正身驍騎間散壯丁內選取如不得其人向例原有于佐領下護軍調補之例嗣後應遵照定例先儘驍騎間散壯丁選取不足于本佐領下之識字護軍內調補如應選不選及將開户人選取者察出該驍騎校以上皆分别議處凡選補驍騎於本佐領下選充康熙二十一年題準滿洲佐領下有寡婦孤子無可充驍騎者將家生子充驍騎以資贍養四十三年奉旨作為正户别載册籍人之子孫均凖拔補驍騎户下人不準拔補雍正二年議奏八旗驍騎于正户人內選補不敷方于佐領下開户户下人選取奉旨據爾等奏如有正身將正身選取驍騎如正身滿洲少時將户下滿洲選取等語倘正身滿洲最多之佐領其孤寡之人不得錢糧何以為生有似此者悉傳集曉諭其如何給與孤寡人錢糧不令匱乏之處著再行議奏嗣議準以後驍騎闕仍于正户之間散壯丁教養兵步軍內選取或該旗內有貧乏孤寡不得錢糧養贍者傳集其佐領下人遍行曉諭將孤寡之家人充補驍騎又諭凡年老護軍除應升護軍校驍騎校外其年已老邁又不在應升之列者若竟革退殊覺可憫著該統領會同都統等將伊等轉補驍騎行走其護軍缺即令人材少壯之驍騎轉補八年上諭前漢軍懇請出兵效力朕諭該都統等漢軍騎射生疏平時不肯演習而務出征效力之虛名于事無益可于每旗操演兵丁千名備用昨據都統等奏鑲黃正黃正白三旗除常行當差兵外現在輪流操演可得千人正紅鑲白鑲紅正藍鑲藍五旗除當差外不敷千人之數我朝定鼎漢軍從龍入關技勇皆可用今承平日久耽于安逸是以武藝逺不如前目今官至提鎮副參者寥寥無幾而在內簡用都統副都統時亦難其人朕思漢軍生齒日繁當籌所以教養之道而額設之兵為數又少似應酌量加增於國家營伍旗人生計均有禆益且如在外駐防漢軍子弟日漸繁衍而本身錢糧各有定數難以養贍應令餘丁回京當差又如外任官子弟往往以隨任為名遊蕩荒廢前曽有旨嚴禁悉令回京當差學習弓馬又如候缺微員一時難以銓選者若情願入伍當差到選班時仍許輪流補用又如內府人丁亦衆于充役當差外其間散人丁撥入八旗充驍騎亦可再五旗諸王之漢軍佐領仍屬本王外其貝勒貝子公等之漢軍佐領實無所用應撤歸旗下公中當差且可免掣肘之虞其如何增設漢軍佐領永逺可行著詳議具奏嗣議定漢軍鑲黃旗四十三佐領有半正黃正白二旗皆四十二佐領正紅旗二十七佐領有半鑲白旗二十八佐領鑲紅旗二十七佐領正藍鑲藍各二十八佐領通計領催槍手炮手棉甲兵教養兵銅鐵匠弓匠聽差護城守門守炮守火藥局守教場以及步軍門軍共萬七千五百二十八人今應于原有之二百六十五佐領及兩半分佐領外增設三佐領並增兩半分為兩整分上三旗每旗定為四十佐領下五旗每旗補足三十佐領共三百七十佐領其新設佐領下應增領催十五名步軍領催三名步軍四十八名每佐領增足槍手四十名棉甲兵八十名上三旗每旗補足教養兵一百八十八名下五旗補足教養兵一百四十九名共增兵二千四百七十二名以足二萬之數至增設各項兵丁應于在京間散壯丁及外省駐防漢軍餘丁外官隨任子弟願充驍騎者並候選未得之微員內選補再下五旗漢軍佐領除王等仍舊分設外貝勒貝子公等佐領悉歸各旗作為公中佐領乾隆三年諭前此自軍營撤回開户之領催驍騎內一等二等者均為正身别載册籍至和通呼爾罕諾爾烏遜珠爾等處打仗陳亡開户分户之領催驍騎轉不能沾恩實屬可憫著交與八旗將此等陳亡開户領催驍騎之子孫亦著為正户與别載册籍之人一例選取驍騎又諭向來八旗簡選驍騎皆憑騎射今聞都統等並不校閲騎射止傳赴衙門令其開弓即行選取旗人騎射甚為緊要如此選取何由長進夫教訓兵丁學習騎射乃都統専責嗣後務須痛改以期各盡厥職倘仍如是斷不姑容又覆準八旗生齒日繁而驍騎限有定額理應將正身選取不應並選開户之人其現在開户人內有既經選補驍騎者毋庸革退至步軍匠役等缺例應選取家人若開户人內有情願入選者即行選取六年覆準八旗漢軍正户間散餘丁甚多而開户家人亦復不少若驍騎缺並選開户之人正户人等轉致壅滯嗣後八旗漢軍驍騎不準開户人選補至八旗滿洲蒙古驍騎先於年壯正身內選取如不得人再於本佐領開户家人內驗其能騎射者選取七年上諭五旗王公宗室等府屬佐領下人均係盛京跟隨來京之人著交王公等將不能養贍之正身滿洲蒙古之子孫核實行知各都統於丁少無正户可選之佐領下選取驍騎及執事人仍不許離其佐領止令本身在旗當差若其本主欲選補護衛等官調用别項差使均聽其便八旗前鋒營前鋒統領左右翼鑲黃正白鑲白正藍四旗為左翼正黃正紅鑲紅鑲藍四旗為右翼各一人或以王公大臣兼領前鋒𠫭領每翼各八人每旗俱滿洲蒙古兼用前鋒侍衛各八人雍正三年定以左右翼前鋒𠫭領各一人前鋒侍衛各一人隨印協理事務委署前鋒侍衛各四人乾隆十七年增設即于前鋒校或親軍校內選委給五品虛銜仍食原餉前鋒校各四十八人雍正三年定以左右翼前鋒校各二人隨印隨印筆帖式各二人初制每翼各一人康熙四十六年裁雍正三年復增設委署前鋒校各四人乾隆十七年增設四員藍翎長每十人設長各二十人鳥槍隊長委署藍翎前鋒長各四人鳥槍隊長每十二人為一隊各二十人前鋒委署鳥槍隊長各四人前鋒八旗滿洲蒙古每佐領下各二名自委署前鋒校以下皆在兵數內凡宿衛扈從之制與八旗護軍營一體派委制詳後護軍營其行在宿衛扈從前鋒參領前鋒侍衛共八人率前鋒校前鋒共百二十人於御營前一二里外相度形勢安設卡倫立前鋒旗二以為門户左右以次列帳各於帳內巡警宿衛有於卡倫內行走者坐以軍法次日各屬櫜鞬控馬於道旁排立候黃龍大纛過各乘馬整隊扈從八旗護軍營護軍統領每旗各一人護軍參領每旗滿洲十人蒙古四人每旗設內司鑰長一人署司鑰長一人副護軍參領如參領之數初設委署𠫭領雍正元年改名副𠫭領三年定以每旗護軍參領各一人副護軍𠫭領各一