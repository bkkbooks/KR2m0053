body:
  text: 欽定四庫全書欽定八旗通志卷六十七土田志六土田規制屯户規制謹案雍正二年以內務府餘地併八旗入官地畝於霸州等處撥旗人首户試行井田故舊志立井田一目乾隆元年已停止井田改為屯戶今敬遵新例標目而仍列井田規制於前識緣起焉雍正二年閏四月諭曰朕交與怡親王查户部餘地內務府衙門餘地拖欠錢糧人員所交地畝數目俱已查明具奏朕盡行覽過爾等即照此辦理但內有民地如何辦理之處爾等議明具奏再行辦理六月怡親王等覆奏臣等查得內務府餘地共一千六百餘頃拖欠錢糧人等所交地共二千六百餘頃此二項地內挑選二百餘頃作為井田行文八旗除官員子弟現在讀書之人及有産業現可當差並後順藩下人等外將無産業滿洲五十户蒙古十户漢軍四十户共挑選一百户前往種地此撥去種地之人自十六歲以上六十嵗以下各授田百畝周圍八分為私田中間百畝為公田共力同養公田俟三年之後所種公田百畝之榖再行徴取將革職大員內誠實有年紀者揀選二員前往勸教管理三年之內果有成效著令議敘十月後農事既畢令打步圍學習射箭伊等子姪內有好者令本佐領照常挑差如果行之有效再照此例派往一次庶無産旗人各得竭力以務本業而亦可服苦矣令户部挑選賢能司官會同該州縣將拖欠錢糧人員所交之地查明收貯仍將地之腴瘠租價之實數查明分為等次造册報部再與種地人等壓蓋土房四百間設立村莊之處亦交與查地官員即將此項地內挑選設立算其人口分給每間給銀十兩共需銀四千兩仍將用過銀數造册報部俟土房蓋完之日將種地人等令其前往居住此耕種井田人每名給銀五十兩以為一年辦買口糧牛種農具之用將此銀即交與查地官員會同管理勸教二人公同監辦若有餘剩銀兩分與伊等以備來年種地之用將用過銀兩報部查核壓蓋土房辦員農具合算共約需銀一萬四千兩此二項地內除挑選井田地畝外仍有地四千餘頃約計一年可得租銀三萬餘兩立此井田所需銀兩將户部銀兩支給再拖欠錢糧人等所交之地如何作價抵補拖欠錢糧之處俟查完地畝後再行議奏現在地內有典旗人地畝者有典買民人地畝者先經內務府奏稱如典旗人地畝勒限三月準其取贖如逾限即行入官辦理此內有典買民人地畝俱關係地方錢糧應交與地方官勒限三月令原業主取贖如逾限將此地交與該撫給與本地民人收取原價解交內廣儲司等語但典賣地畝之人俱係貧窮小民勒限則不能遽得銀兩取贖請暫停勒限使民人得銀即在户部具呈驗看原契照部原折價銀交納準其取贖未贖之前照例起租解部贖後止租再查户部餘地俱係供應各處撥給備用之地仍令各處收贖備用如有撥給之處仍照舊撥給再作井田地畝內倘有旗民人等之地交雜其中者將就近存貯好地內照數換給如此八旗中無産業者各得産業以全生計均沾聖主洪恩於無既矣奉旨所議甚好照行三年正月又奏新城縣有地一百一十六頃零固安縣有地一百二十五頃八十九畝零俱係拖欠錢糧人等所交及內務府所收之地畝查固安縣地畝丘假雖屬零星然皆附近村居且去京師甚近甚可分給種地人等耕種請將固安縣所有一百二十五頃八十九畝零官地以十二頃五十畝為公田以一百頃為私田計得十二井五分其存剩一十三頃三十九畝零為種地之人室廬場圃處所至壓蓋土房需銀四千兩令直𨽻總督於雍正二年地丁錢糧內動支交地方官即行壓蓋務於二月內完工庶耕種不失農時一靣預行挑選種地人等俟土房報完之日即給與口糧牛種農具等項銀兩撥往居住其管理之員俟八旗查送到日彚齊引見恭候欽定奉旨依議耕種之期已近壓蓋土房務期堅固不可草率即速行文二月又奏井田管理之員據八旗都統咨送原任副都統保德等二十九員到部相應開列職名即帶領引見奉旨此次著厄爾德黑連宵先去將此十人爾部記檔再派往時此內派往五年奉上諭旗人枷號鞭責治罪革退官兵並無恆業在京間住倚靠親戚為生以致良善之人被纍維艱而伊等無事間遊不能不生非為惡將此等之人查出令於京城附近直隸地方耕種井田作何安置之處王大臣等會議具奏遵旨議定將八旗滿洲蒙古內拖欠錢糧及為非犯法枷責治罪革退官兵皆并其妻子發往井田各該旗查明備造細册鈐蓋印信發與管理井田之官嚴行約束令其耕種不許出入京城伊等子孫內如有長大誠實弓馬嫻熟欲來京披甲當差者該管官保送來旗於挑選披甲時仍行挑選若挑選後為非犯法者將保送之官一體治罪發往井田之人在彼處仍行怙惡不悛妄生事端者管理井田官即呈報該旗咨部加倍從重治罪巡察御史地方官員亦不時稽察若不守分飲酒生事等項地方官不申報該督或該督不咨行該地方被巡察御史察出將州縣官並該督議處若御史不行查恭將御史治罪再管理井田之員有事呈報各旗若無記識難以慿信交與該旗鑄給管理井田關防但今發往之人皆係從前已經治罪不必照先去之人安置每户給三十畝五户共給牛三隻購買牛具籽粒等物及每年口糧每户給銀十五兩交與管理井田官員於相宜地方築建土堡酌量人口多寡苫蓋土房俾其居住發往之人管理井田官員不能料理妥貼或約束不嚴致令生事擾害地方者將管理官員從重治罪嗣後每年一次查出發往再有開户之人犯法治罪退甲間住不無妄生事端嗣後給與發往井田人內效力良善之人為佃丁不許擅賣令其出力又諭井田地方止有一人管理著於彼處再補放驍騎校四員領催八名料理事務俸餉升轉照在京驍騎校領催一體以為彼處之人出身之路若升轉後仍在彼處效力者即令其帶銜在彼居住此二年在彼勤慎可用應補驍騎校之人著保送到部引見補放乾隆元年四月和碩莊親王等奏設立井田試行十年以來所有承種之一百八十户緣事咨回者已有九十餘户循環頂補大都皆不能服田力穡之人行之未見成效但此時若盡行撤回則勤謹者轉致失業若將不肖之户咨回更換勢必增添工本徒費錢糧臣等酌議應令確察實力耕種安插得所者改為屯户按畝完納屯糧於附近州縣倉內收貯備用其原設之領催改為屯長約束屯户聼該處防禦管轄原設之驍騎校撤回該旗補用不能力穡之户咨回本旗停其撥補原領田房交州縣賃耕取租解部又雍正五年將過犯革退之旗人發往固安新城二縣每户給地三十畝并給牛具耔種蓋造土堡房屋令居住耕種當經各旗發過六十二名除病故逃亡外現今只存二十七户此二十七户亦應查明將實力耕種者改為屯户其中不肖之户亦令咨回本旗奉旨依議十一月又議覆管理井田事務甘國璧等條奏屯莊七欵一井田每户原給田一百二十五畝以十二畝五分為公田十二畝五分為室廬場圃一百畝為私田公田糧石原係盡收盡報今改為屯莊未便仍循公田舊例應交與户部核定科則行令該州縣遵照徴收屯糧一堡户原止給地三十畝俾其自種自食不交公糧今既改屯若令其按畝完糧未免拮據且現在此等户數亦屬無多應聼其暫行照舊耕種一三堡旗人零星居住旗民雜處難於約束稽查應將各户原領房地交還州縣即於咨回井户所遺房地內照數撥給一改屯人户嗣後身故有子者自應頂補倘遇無子寡婦情願守節並無親屬可依者留地四十畝養贍即令本屯人代種完糧俟伊身後仍將地畝交官召種一井田原撥霸州固安永清新城四州縣之地今議改屯莊令防禦管轄而現在防禦止有霸州一員固安一員應將附近霸州者令霸州防禦管轄附近固安者令固安防禦管轄一井田各莊向設鄉長一名專供督率農務交糧并稽查逃盜賭博等事今改屯莊請仍留供役如果能勤慎遇屯長缺出準其拔補一驍騎校在外耕種多年一旦撤回未有可補之缺該員呈稱難以度日應準其暫留種地俟有缺補放之日即令回京將地畝交還州縣奉旨依議三年户部覆準從前井田每户每年交榖十二石五斗收貯縣倉今改為屯田是並無公田私田之分應照畝輸糧每畝徴屯糧一斗既不失皇上愛養旗人之至意復與原設井田良法亦不相悖所有霸州之狄家莊等四處共地三十六頃二十五畝固安之蠻子營等五處共地六十四頃十一畝零永清之喬家營等三處共地二十七頃五十畝新城之莊西宫井二村共地二十七頃十二畝零以乾隆二年為始令各州縣會同防守尉於秋收後照數徴收并照口外熱河八旗地畝之例造入地糧册內報部查核奉旨依議十一年六月奉上諭直𨽻通省今年應徴地丁錢糧已加恩全行蠲免固安霸州二防守尉所轄應徴屯糧例不在蠲免之內但朕念耕種井田之旗户按畝輸榖在縣交納與民田正賦納銀者相同著將固安霸州二防守尉本年應徴屯糧榖石一體加恩蠲免該部即行文該督知之十七年三月户部議覆直𨽻總督方觀承疏稱霸州固安永清新城四州縣共查出屯户私立年限租約三百三十五張長租地二十七頃四畝有零租市錢二千五百一十千文又銀三兩榖三百餘石甚屬不合查屯莊地畝給與無業旗人耕種輸租原為旗人立經久之業自應力勤耕作永安生計乃不肖屯户等擅將所種額地私立坐租之名違例長租實與私典無異若非嚴行懲創無以警戒將來應如該督所議將長租地二十七頃四畝有零全行撤出召種輸租其各屯長屯户得過長租錢文銀兩榖石并令勒限追出入官屯長納寧屯户張桂民人劉全忠等均應照律分别治罪但事犯在乾隆十四年四月初九日恩詔以前應豫援免又議屯長額種地畝之外復有認種空分地畝因屯户退出地畝有違欠者據屯長呈明代種帶銷其無違欠者亦準認種交租前督臣高斌酌議令屯長代種既可以帶銷舊欠又可以裕其生計詎意不肖屯長因認種地多遂爾長租私典以致積欠纍纍今既徹底查清自應將屯長認種地畝概行撤出召民承種輸租又議節年舊欠科則榖及代種帶銷穀又節年舊欠帶完銀及舊欠認種空分地租銀均應酌定年限帶徴查屯户所種額地僅交科榖舊欠尚少其撤剩地畝嵗獲租糧儘可帶銷應將所欠科穀無分多寡均以三年帶完至屯長認種額地及空分地畝兼交銀穀節年積欠較多存剩地畝及所食錢糧不敷坐扣應再行查核如為數不多三五年內可以帶完者銀則於錢糧內按季坐扣榖則於所種地內分年帶交倘所欠銀榖過多約計年限不能帶完者即將該屯長革退嚴行治罪至防守尉有管轄之責既徇情任其貪多攬種其私行立約長租又毫無覺察以致連年積欠無完應即著落防守尉名下賠補如既定分年之後復不按限清完以致逃亡拖欠者應將未完之項亦著落經催不力之防守尉按數賠補又議未完借領捐備榖二千餘石及借米八十三石各屯户前欠未清續借自宜撙節乃並不計及該户能完與否遽行申部請借移交地方官放給竟致一人名下拖欠多至數十餘石其徇庇濫借咎實難辭據該督聲明乾隆九年恩詔所有借出籽種口糧等項查明實在無力完繳者準豫豁免今前項未完原借米麥榖石是否實係無力完繳應令該督詳細查明取結具題其餘未完原借捐備榖石應如該督所請均分作三年帶完如限滿不能催完即著落防守尉名下賠補又議此項屯糧向係地方官經徴按年彚入另案奏銷防守尉雖有管轄之名並無協催之實查屯户以防守尉為專管民人以州縣為專管理事廳則旗民統轄應將屯户額徴科榖責令防守尉經徴其退出召民承種地畝應令地方官經徵統以各理事廳為督催每年另册奏報如有未完與地糧一例處分又議理事同知既有分任督催之責如有關屯户錢糧地畝事件理應分同稽查該防守尉不得徑行申部并令嗣後防守尉一面徑移道司核詳咨部一面移明理事廳查核轉報又議旗人地畝久經嚴禁不許私行典賣今固安霸州等處屯長擅將所種旗地私立坐租之名租與民人耕種實與私典無異該防守尉等漫無覺察殊屬不合應將原任固安縣防守尉海明原任霸州防守尉孫塔均應照例各罰俸一年事在恩詔以前應豫寬免奉旨依議以上屯户規制欽定八旗通志卷六十七
