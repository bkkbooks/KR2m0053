body:
  text: 欽定四庫全書欽定八旗通志卷一百二十四人物志四宗室王公傳二和碩鄭獻親王濟爾哈朗碩和碩簡純親王濟度原封和簡親王喇布贈和碩親王武襄輔國公巴爾堪和碩鄭獻親王濟爾哈朗濟爾哈朗追封和碩莊親王舒爾哈齊第六子舒爾哈齊顯祖宣皇帝第三子太祖髙皇帝同母弟初封貝勒嵗丁未東海瓦爾喀部斐悠城長䇿穆特赫苦烏拉部長之虐乞歸附太祖命舒爾哈齊同貝勒禇英代善往收其環城屯寨五百户以還賜號達爾漢巴圖魯事詳廣略貝勒禇英傳辛亥年八月薨順治十年五月追封和碩親王諡曰莊濟爾哈朗幼育太祖宮中封和碩貝勒天命十年十一月同台吉阿巴泰等援科爾沁有功事詳饒餘敏郡王傳十一年四月征喀爾喀巴林部十月征扎嚕特部並有功天聰元年正月同貝勒阿敏嶽託阿濟格等征朝鮮師屢勝次平壤城朝鮮王李倧遣使請和阿敏仍欲進攻嶽託不可濟爾哈朗謂不宜深入可駐平山城以待和議之成遂引軍往與李倧議嵗貢定盟而還事詳克勤郡王傳五月從上征明出寧逺舊邊進圍錦州同貝勒莽古爾泰等率偏師衛塔山糧運遇明兵二萬人我前軍八十人奮擊敗之尋移師寧遠與明總兵滿桂兵遇力戰被創裹創復戰大敗其衆二年五月以蒙古固特塔布囊自察哈爾移據阿拉克綽特部舊地遇來歸我者輒阻殺命同貝勒豪格往討誅之收其衆三年八月與貝勒德格類嶽託阿濟格等率師攻明錦州寧逺焚其積聚多俘獲十月上親統大兵由洪山口征明濟爾哈朗與嶽託奉命攻大安口毁其水門乘夜進擊走明馬蘭營參將援兵旦見明騎兵立二營山上濟爾哈朗先擊敗其衆追至馬蘭營殱之是日自辰至已五戰皆捷降馬蘭營馬蘭口大安口三營兵趨石門寨明兵先聞炮聲以為蒙古兵至倉皇來援悉斬之寨中官民出降遂會大兵於遵化進薄北京十二月與貝勒阿巴泰阿濟格杜度薩哈璘及總兵官楊古利等率師三千略明通州焚其船攻克張家灣四年正月從上圍永平先是劉興祚叛歸明與明巡撫袁崇煥同赴永平聞我軍將至遂趨太平寨道殺喀喇沁蒙古之以俘來獻者上命濟爾哈朗與阿巴泰往捕追及於山海關斬興祚生擒其弟興賢以獻大軍既克永平命與薩哈璘統兵一萬鎮守察倉庫閲士卒置官吏降明道員白養粹廢員孟喬芳楊文魁等以書招永平所屬州縣營汛於是臺頭營副將王維城鞍山堡千户錢竒志遷安縣知縣朱雲台灤州守備李繼全州同張文秀建昌參將馬光逺相繼降三月上班師遣貝勒阿敏碩託來代守永平濟爾哈朗因趨迤西路招降榛子鎮乃還五年七月初設六部命掌刑部事八月上圍明大凌河城鑲藍旗兵圍西南濟爾哈朗率師為䇿應旋同大貝勒代善等攻克近城臺保十一月明總兵祖大夀以城降將旋師與貝勒多鐸往塔山東沿海截隘俘百餘人六年五月從上征察哈爾林丹汗遁大軍次穆嚕哈喇克沁濟爾哈朗與嶽託德格類薩哈璘等率右翼兵二萬趨歸化城收察哈爾部衆千餘七年三月奉命築岫巖城五月明將孔有德耿仲明自登州航海來降濟爾哈朗等迎護其衆明兵及朝鮮兵來追者懾我軍威遁去事具英親王傳六月詔問征明及察哈爾朝鮮三者何先濟爾哈朗奏言朝鮮不遵約當返其貢姑與互市不必往征明乃吾敵國宜取其近京數城久駐伺隙别屯兵山海以東錦州以西擾其耕穫使不得休息復分兵半營山海關前半繞入關後內外夾攻敵必絀八年五月上復親征察哈爾濟爾哈朗奉命留守瀋陽十年四月改元崇德建號大清改瀋陽為盛京大封王公以濟爾哈朗功多晉封和碩鄭親王十二月上親征朝鮮復以王留守盛京三年十月征明王奉命率所屬自前屯衛進發十一月會大軍於中後所明兵懼不敢出乃移師攻模龍關五里保屯臺克之四年五月征明錦州及松山杏山與敵遇九戰九敗之俘二千有竒五年三月葺義州城上親臨閲有舊附明之蒙古多羅特部蘇班岱阿巴爾岱居杏山西五里臺遣托克托內籲請以三十户來歸上命王與豫親王多鐸郡王阿達禮等率師千五百往迎瀕行諭曰敵見我兵少必來拒戰可分一旗兵為前後中三隊前隊拒戰後隊應援遂奉命行夜過錦州城南至杏山令托克托內入臺潛告蘇班岱阿巴爾岱等擕户口輜重行及旦明杏山總兵劉周智沿城列兵與錦州松山守將共率兵七千分翼列陳逼我師王令駐軍待敵呼噪而來王督戰與諸王貝勒等分隊衝入身先陷陳大敗之追奔至城下斬其副將楊倫周延州參將李得位復遣兵破敵兩營於城南獻所獲馬械於御營分賚有差上加賜御廄良馬一九月同武英郡王阿濟格等圍錦州城中兵屢出犯王設伏城南俟敵敵覺而遁追斬六十餘人又遣輔國將軍務達海俘明運糧兵於杏山塔山間六年三月復圍錦州環城立八營掘壕築塹設邏卒為久困計時大夀在城中以蒙古兵守外郛蒙古台吉諾木齊吳巴什等欲降潛遣人賫書縋城約獻東關至期為大夀所覺遣兵襲之交相戰聲聞郛外王率兵至城下應之蒙古兵縋登我師合擊明兵明兵敗入內城遂據其郛遷郛內蒙古六千餘口於義州並收降明都司守備以下官八十八員使馳奏上命八門擊鼓集羣臣宣捷於篤恭殿四月明援兵自杏山移松山王遣郡王阿達禮貝勒羅洛渾等率右翼伏錦州南山西岡武英郡王阿濟格等率左翼伏松山北嶺令前鋒軍挑戰敵至伏起夾擊大敗之五月明總督洪承疇率兵六萬援錦州屯松山北岡我師擊之斬首二千六月睿親王多爾衮肅郡王豪格等率師來代聞明兵自松山趨海口我左翼兵向松山東右翼兵向松山西夾擊却之追至松山城獲馬五十餘振旅還八月承疇等率兵十三萬至松山上親統大兵征之命王留守盛京九月上將旋蹕王仍赴錦州更代圍城十二月承疇出兵六千夜犯正紅正黃二旗營汛王令我兵各依汛地沿壕射之敵敗走松山城閉不得入降二千餘敵從杏山宵遁者復為伏兵所殱七年二月肅郡王豪格等克松山城擒承疇王仍圍錦州三月大夀遣人乞降請盟誓王留其使二人遣一歸傳諭曰我圍困此城可旦夕取何與爾盟欲降則降非相強也大夀乃率衆叩營降四月與多爾衮率兵攻塔山以紅衣炮克其城進圍杏山以炮轟擊城中懼開門降乃籍俘獲數以聞奉命毁松山塔山杏山三城而還七月敘功賜鞍馬一蟒緞百八年八月世祖章皇帝嗣位王與睿親王多爾衮同輔政九月偕武英郡王阿濟格攻明寧遠拔中後所城斬逰擊吳良弼都司王國安等進攻前屯衛拔之斬總兵李輔明袁尚仁中前所總兵黃色棄城遁追敗之併取中前所遂班師順治元年正月王集內三院六部諸大臣諭以凡政事先白睿親王書銜名亦先之五月睿親王入山海關擊走流賊李自成九月王扈駕入京師十月上御皇極門加封信義輔政叔王賜金千兩銀萬兩縀千匹四年二月以造第踰制擅用銅獅銅龜銅鶴罰鍰罷輔政五年三月貝子屯齊等訐王在盛京時不舉發兩黃旗大臣謀立肅親王私議及扈駕入關擅令兩藍旗越次立營前行等事降多羅郡王閏四月復和碩鄭親王爵九月命為定逺大將軍統兵討湖廣十月道出山東𠞰曹縣土賊拔其城獲賊渠李化鯨李名讓張學允等得降鎮劉澤清逆書煽亂狀以聞叛黨並伏誅六年正月由安陸府渡江抵長沙時明桂王朱由榔之總督何騰蛟及附由榔之總兵馬進忠王進才杜允熙陶養用胡一青紏流賊餘黨一隻虎等據湖南府縣王令順承郡王勒克德渾都統阿濟格尼堪為前哨自率大軍繼進抵湘潭生擒騰蛟拔其城四月分兵趨永興擊走允熙遂至辰州一隻虎聞風遁又令尚書阿哈尼堪都統劉之源等擊進才於寶慶克其城又連破南山坡大水紅江諸路兵凡二十八營寶慶平七月分兵定靖州進衡州斬養用破一青七營於城南山進𠞰至廣西全州分兵定道州及烏撤土司貴州黎平府先後收六十餘城七年正月凱旋四月論功賜金二百兩銀二萬兩八年二月同巽親王滿達海端重親王博洛敬謹親王尼堪奏削故睿親王封爵事詳睿忠親王傳三月上以王年老一切朝賀謝恩免行禮九年二月晉封叔和碩鄭親王十二年二月疏言太祖髙皇帝開創初日與四大貝勒五大臣及衆台吉等討論政務得失咨訪兵民疾苦使上下交孚鮮壅蔽故能上合天心下洽民志掃靖羣雄肇興大業太宗文皇帝纘承大統紹述前猷亦時與諸王貝勒大臣講論不輟且崇奬忠直鼓勵英傑録微功棄小過凡下詔令必先講求其可以順民心垂久逺者然後施行又慮武備廢弛不忘騎射時駕出射獵諸王貝勒置酒宴會以優人演劇為樂太宗皇帝還自獵次克勤郡王嶽託以聞太宗皇帝勃然怒曰我國肇興治弓矢繕甲兵視將士若赤子故人爭效死每戰必克以成大業朕常恐後世子孫棄我國淳厚之風沿習漢俗即於慆淫今汝等為此荒樂欲國家興隆其可得乎遣大臣索尼再三宣諭今聖上詔大小臣工盡言無隱誠欲立綱陳紀綿國祚於無疆也臣以為平治天下莫要於信詔令順民心前降諭軫恤滿洲官兵疾苦聞者無不歡忭嗣又令修造乾清宮詔令不信何以使軍民服從伏祈效法太祖太宗不時與內外大臣詳究政務得失凡事必預為商確然後頒之詔令見諸施行庶幾法行令信可以紹二聖之休烈矣抑臣更有請者垂休典謨光昭令德莫要於設立史官聖主統一中原事事以堯舜為法但起居注官尚未設立古之聖帝明王進君子退小人順天心合民志措天下於太平垂鴻名於萬世良於史臣有賴今宜倣古制特設記注官置之左右凡聖主嘉言懿行一一記載於以垂憲萬世傳之無窮亦治道之一助也上嘉納之三月同貝勒尚善等議吏科副理事官彭長庚正白旗一等子許爾安請復睿親王舊封妄頌功勳結黨煽亂應立斬上命從寬流徙又議廣東布政使胡章誣奏平南王尚可喜靖南王耿繼茂縱兵占官廨等事與誣告凡人不同應立絞上命禠職免罪五月王疾劇駕親臨問問叔王有遺言乎王泣對曰臣蒙太祖皇帝宮中撫養太宗皇帝信任又蒙聖恩寵用受三世深恩未能仰答不勝感痛惟願以取雲貴滅桂王統一四海為念且滿洲甚少而能破流寇取京都應加撫恤上垂涕曰天何不令朕叔長年耶言已大慟駕旋命工圖其像翌日薨年五十有七詔輟朝七日賜祭葬銀萬兩置守園十户立碑紀功康熙十年六月追諡曰獻乾隆十九年九月入祀盛京賢王祠四十三年正月上追念鄭親王忠勳命配享太廟詔以現襲之簡親王復始封號曰鄭濟爾哈朗子四長富爾敦次濟度次勒度次巴爾堪富爾敦封世子蚤卒濟度襲封簡親王自有傳勒度於順治八年閏月封敏郡王九年十月擢議政王十二年八月薨年二十康熙十一年八月加諡曰簡和碩簡純親王濟度濟度鄭獻親王濟爾哈朗次子順治八年閏二月封多羅簡郡王四月其兄富爾敦薨九月濟度封世子九年十月任議政十一年十二月授定逺大將軍率貝勒巴爾楚渾貝子務達海都統噶達渾統兵征福建海寇鄭成功十二年九月師至福建聞泉州賊遁駐福州久之乃進駐泉州十三年七月投誠偽總兵黃梧副將蘇明鄭純謀殺偽總兵華棟等自海澄縣遣迎大兵偽官八十餘人兵一千七百俱降王自泉州移駐漳州俄聞成功犯福州遣副都統覺羅阿克善參領巴圖魯禇庫護軍參領伊巴格圖赴援遇賊髙齊陸路敗之斬二百級將至福州賊艘二百餘泊烏龍江阿克善等水陸齊進擊敗之追至大漳河口斬偽總兵林祖蘭等獲船十有四時惠安閩安漳浦頻告警分遣護軍統領覺羅雅布蘭副都統阿玉錫等往𠞰斬賊二千餘獲船數百先後降偽總兵一副將五參將逰擊以下五十人兵三千有竒十四年三月班師上遣議政大臣哈什屯等迎之盧溝橋令先赴鄭親王喪所上親臨其第慰之五月襲封和碩親王爵仍其原封郡王之號曰簡十七年七月薨年二十八康熙十年六月追諡曰純十八年二月以濟度第三子德塞襲封和碩簡親王康熙九年三月德塞薨諡曰惠無嗣以德塞弟喇布襲原封和碩簡親王喇布弟雅布訥從子德沛從孫豐亨喇布簡純親王濟度次子初於康熙七年正月封三等輔國將軍九年九月襲封和碩簡親王十三年九月以逆藩吳三桂耿精忠分擾江西特命為揚威大將軍鎮江寧十四年九月諭移師江西十二月遣兵斬賊朱三於東鄉縣十五年二月遣兵敗賊王用等於鄱陽縣之沙蘭粟嶺五月奏招撫南康吉安饒州偽官四百五十餘兵萬五千有竒七月奏耿逆偽都督楊益茂據金溪縣大兵破其木寨斬三千餘級復金溪十月遣兵赴萬年縣𠞰賊楊彪萬勝等破賊衆於五都馮家山十二月奏故平南王尚可喜子之信在廣州乞降以所齎密疏上陳先是三桂賊將髙大傑韓大任等陷吉安王奏調緑旗兵會𠞰又請敕總督運紅衣炮十具攻吉安並從之諭戒以勿坐守觀望因奏省會繁要不可輕離至是將軍額楚等與大任戰於吉安螺子山失利上命侍郎班迪等赴吉安察狀還奏諭令戴罪圖功王乃親圍吉安十六年三月賊夜出南門逸王入城駐軍六月奏招撫江西各屬偽官千九百餘兵三萬七千四百有竒又疏言韓大任等屯寧都樂安諸處調兵三路進𠞰大任願降請為入告詔報可既而大任自寧都出擾萬安太和等縣王請調兵禦𠞰諭曰簡親王喇布自到江西未建尺寸之功安坐會城虛糜糧餉逮赴吉安以重兵圍城逆賊韓大任奔逸不能擊滅致竊據寧都雖遣副都統布舒庫等率兵前往究未大創賊衆今韓大任自寧都竄突延及萬安泰和諸處不能撲𠞰又以兵少具奏計喇布所轄滿漢兵為數不少一韓大任未能剪除任其出入宜即嚴加處分念現在與賊相持姑俟事平日議罪十七年正月護軍統領哈克三等敗大任於老虎洞燬其營斬六十餘級大任奔福建赴康親王傑書軍降二月詔移師湖南駐茶陵八月奏三桂死衡州詔令進師十八年正月王遣前鋒統領希佛等進取衡州賊帥吳國貴夏國相等宵遁復其城二月分兵復祁陽耒陽等縣及寶慶府招降偽總兵卓英董世興偽副總兵周嘉貞等又偽將軍全鉞偽總兵馬隆興熊天章曽大捷薑繼尚偽侍郎范思徵等相繼降六月疏言隨征之烏拉寧古塔兵千二百餘人應遵旨撤還但新寧諸處賊未平請暫留𠞰從之八月疏言將軍穆占復新寧安親王嶽樂克武岡賊竄遁臣駐東安遣烏拉寧古塔兵還京令穆占駐新寧諭嚴責其不追𠞰賊於沅州靖州九月奏偽副將張朝貴等七十餘人降與偏沅巡撫張朝珍安插詔進定廣西駐桂林十九年正月奏昭義將軍伯馬承廕標下糧匱兵噪撥餉給乃定又言馬承廕奉旨設五營會𠞰雲貴今請自募兵七千增立援𠞰二營上以將軍標無七營例不允三月王率兵往柳州至永福聞承廕復叛降吳逆暫駐桂林五月奏大兵分路進𠞰總督金光祖破賊武宣復縣城將軍莽依圖破賊陶登定象州臣由雒容進取柳州馬承廕率官辨六百六十餘兵七千三百有竒來降八月諭移駐南寧十月偽將軍饒一龍等率偽官三十九兵五百餘以慶逺府降是月命選所部兵付大將軍賴塔進定雲南二十年八月詔擕柳州南寧間駐兵還京十月薨年二十有八二十一年十二月追論吉安諸處失機罪削爵二十二年三月以濟度第五子三等輔國將軍雅布襲和碩簡親王爵二十九年噶爾丹深入烏珠穆沁地雅布副安北大將軍恭親王常寧出喜峯口往征旋命趨赴撫逺大將軍裕親王福全軍參贊軍務八月敗噶爾丹於烏蘭布通噶爾丹乞宥罪旋由大磧山遁十一月師旋議不追𠞰罪削爵得旨從寬罰俸三十五年二月從上征厄魯特由中路進抵克嚕倫河聞噶爾丹遁始還三十八年十二月掌宗人府事四十年九月薨年四十有四諡曰修雅布長子雅爾江阿初於康熙三十六年封世子三十九年隨直郡王允禔分濬永定河四十一年襲封和碩簡親王四十九年掌宗人府事雍正元年充玉牒館總裁三年十月告成賜銀幣尋因編載遺漏及辦事屢誤停俸撤六佐領歸公四年二月奏請再撤佐領乞恩免停俸諭責其人甚卑鄙終日沈醉諸事漫不經心下所司議處削爵三月以雅布第十四子原封三等奉國將軍神保住襲封和碩簡親王乾隆十三年九月諭曰神保住自襲爵以來不知自愛恣意妄為致兩目成眚因辭王俸朕加恩賞給半俸贍其度日之資伊竟不知感恩守分且罔顧近派族人稍加周恤今據宗人府劾奏神保住凌虐伊兄忠保之女其行事更出情理之外著革去王爵另行請旨承襲尋以鄭獻親王濟爾哈朗之從曾孫德沛襲封和碩簡親王初鄭獻親王弟追封多羅貝勒芬古生傅喇塔封固山貝子生福存襲固山貝子德沛福存第八子也雍正十三年五月封三等鎮國將軍八月授兵部左侍郎乾隆元年七月任古北口提督二年二月授甘肅巡撫六月疏言備荒期於先籌賑恤貴乎實惠向遇歉嵗州縣必俟詳允後動支倉庫錢糧上司又必委驗核減文移輾轉至開倉散賑時而飢民已轉徙流亡矣且倉厫大率在城近者尚可匍匐支領逺者每以跋涉甘餒是徒費國家倉貯而飢民沾恩未遍甘省地處萬山風多雨少嵗常歉薄民鮮蓋藏且地方遼濶倍他省州縣所轄由百里至四五百里不等間時已覺迢遙領賑尤多狼狽雖筋力壯盛者亦不能數百里往返領一日口糧况孤寡殘弱哉今嵗雨暘時若可望有秋但有備無患不得不預為綢繆臣思散賑貴多設厰而專其責於州縣請預勘各州縣地方就鄉村連絡處分擇公廨廟宇十餘處造具地方册籍遇散賑時該州縣具詳日即將倉糧散給務使老少均霑強弱普被既無拮據之艱且免守候之纍則向苦流離之人皆得就食但運糧腳價費多甘省每嵗青黃不接時令各州縣平糶倉糧秋收買補或遇豐年除還正項價餘亦即買糧存貯此向例也嗣後賑恤運價應將此項糧價餘銀貯州縣庫停其買糧以為運費如不敷先於州縣庫不拘何項動支再於司庫舊存公用銀十八萬內還項賑畢造册核銷如有揑冒者立即參賠庶幾官易為理而民沾實惠得旨先事預防原當如此但運腳一項應用時咨部請示九月擢湖廣總督三年四月疏陳苗疆七事一苗民懶不習田請於新闢苗疆代買牛種器具令地方官親勸開墾一苗民未覩禮讓請立義館以附近生員教誨一苗居山叢林密令官辨誘買樹木數年後山中無險可恃一苗寨係茅屋畏火攻請製火器一苗疆兵駐處偶有急需無項可支請於苗疆州縣庫存銀千兩同知通判駐所亦請交貯庫銀千兩並建常平倉買貯穀二三千石庶儲蓄有備一邉地緊要官兵勢難分布查山東沿海及滇黔蜀粵俱有團練鄉勇之事應令地方官力行此法互相警護立練總什長相統率一苗民貪賄忘親凡犯罪逃匿之案請立賞格有能擒獻重犯賞銀二十兩情罪稍輕者賞銀八兩先行刋石曉諭時廷議水田未便開墾苗人不可欺誘至要犯懸購臨時酌賞餘如所請行十二月攝襄陽鎮總兵四年七月調閩浙總督八月疏言泉州府晉江縣之衙口鄉大姓肆橫械鬬事不一而足祇緣僻處海濵不解法度查永寧舊寨地勢髙敞去衙口陸行十餘里由海徑渡七八里即可直達且衙口原係陸路提標右營汛地應請即以該遊擊移駐永寧帶兵二百三十名其衙口後身空公庵設把總一兵五十名海邉石亭設汛一撥兵十名稽查彈壓又西倉處各大姓適中地查興化同知止司盜逃防海請以該管事務併歸興化通判即以該同知改𨽻泉州移駐西倉下部議如所請五年二月諭廷臣曰德沛屢任封疆操守亷潔既一介不取而因公犒賞之處又復繁多所得養廉不能敷用以致京中逋負不能清還且棄舊有之産朕心深為軫念此等清官應格外加恩以風有位著將福建藩庫銀就近賞給一萬兩示朕優奬之意六年二月命稽查滸墅北新兩關七月兼署浙江巡撫七年四月調兩江總督八月疏言揚州猝被水廬舍蕩然現在自揚州至寶應堤埂髙阜災民斷續搭篷居住將來興化泰州之無處容身者勢必移來窮民待賑人煙雜沓姦良莫辨臣於揚州城廂及髙郵寶應令遊擊等水巡以期姦匪遁迹上嘉之先是奉上諭嗣後該州縣當秋成時穀價髙昂不能買補而該處存倉穀石尚可接濟者照例詳請展限於次年買補倘穀價既屬不敷而貯倉穀石又係不足者準其詳明上司以别州縣穀價之贏餘添補採買為酌盈劑虛挹彼注此之計至是德沛奏言江南地廣人稠穀不敷食歷係取資江廣及上江棕陽運漕等處邇聞各處米價俱昂轉販者少如以别州縣贏餘添補則江蘇所屬買補止有不足並無贏餘若因籌補無項致倉貯全虛目前且無以濟用日後何賴臣請俟秋成後各屬有糶價存庫者不拘本境鄰封擇時價稍平者即為代買其不敷之價應照前撫臣徐士林所請於捐監項下補足至淮揚徐海等州縣現在被災印官賑務殷繁不能兼顧已飭藩司動支司庫銀十萬兩遴員採買俟飭提各屬糶價歸欵上是之如所請行八年二月召來京六月授吏部右侍郎十二月兼管國子監祭酒事務十年七月教習庶吉士十一年二月諭曰侍郎德沛因伊度日艱難指伊弟簡親王現食俸祿奏請借支十年以完舊逋以資生計著照所請行閏三月轉吏部左侍郎十二年三月兼署户部左侍郎五月署山西巡撫九月命尚書房行走十二月擢吏部尚書十三年七月以疾解任九月諭曰神保住已獲罪革爵德沛於此王爵既有承襲之分且在等輩中較為厚重可即令承襲王爵德沛襲王之後宜追念從前諸王將族中應行資助之人加意周恤共相和睦以期仰沐朕恩於無既是月襲封和碩簡親王十七年六月薨年六十五諡曰儀十月以鄭獻親王濟爾哈朗之曾孫竒通阿襲封和碩簡親王初鄭獻親王第四子巴爾堪生巴賽襲封輔國公竒通阿巴賽第十子也雍正四年八月封三等輔國將軍九月授頭等侍衛九年襲父輔國公爵十年授散秩大臣乾隆元年任正紅旗滿洲都統三年授領侍衛內大臣十七年襲王爵二十一年掌宗人府事二十二年充玉牒館總裁二十八年六月薨諡曰勤以其長子豐訥亨襲豐訥亨初於乾隆八年二月封三等輔國將軍二十三年七月以三等侍衛領班奉命率健鋭營兵一千𠞰凖噶爾餘孽及回部十一月至阿克蘇城十二月隨參贊大臣舒赫德進師巴爾楚克二十四年正月至呼爾璊逆回霍集占引賊五千餘來犯豐訥亨同侍衛豐安等合諸軍擊却之追潰衆十餘里翌日再進賊據塹拒復奪塹所乘馬創易馬進賊退避夜率兵取水於沁達勒河連敗賊衆於渡口遂進援大軍之與賊相持於葉爾羌者敗賊於葉爾羌河岸大軍聞鎗炮聲突圍出合擊賊衆却之乃還阿克蘇詔嘉其臨陳奮勇遷二等侍衛尋擢鑲白旗滿洲副都統十月以經理臺站至額格爾呼爾璊遇結寨出掠之布嚕特賊衆斬二十餘級得旨奬敘二十五年三月頒賚縀十二銀五百四月調阿克蘇兵赴伊犁充領隊大臣九月率兵百捕竊馬臺站之瑪哈沁賊衆過察爾圖嶺窮追十餘日擒七十餘人獲馬五十餘復得旨奬敘二十七年二月同領隊大臣伊勒圗驅越境遊牧之哈薩克部衆擒其魁五人收其馬二千餘至伊犁詔以哈薩克歸附日淺未知內地法度宥其罪諭奬豐訥亨熟悉情形令傳旨曉諭哈薩克釋還其人及馬閏五月彚敘出征以來功得三等功牌一頭等功牌四豫雲騎尉世職十二月還京賜雙眼孔雀翎遷護軍統領管健鋭營事二十八年十月襲封和碩簡親王尋授領侍衛內大臣初簡勤親王原襲之輔國公及豐訥亨之雲騎尉世職因已襲親王銷除三十年六月上以豐訥亨頻年出征頗著勞績其先世功勳所遺公爵宜仍豫襲遂以豐訥亨之弟經訥亨襲互詳武襄輔國公傳三十四年正月任正黃旗漢軍都統三十八年十月掌宗人府事四十年十二月薨年五十有三諡曰恪以其次子積哈納襲封和碩簡親王積哈納初於乾隆四十年四月授頭等侍衛四十一年五月襲封和碩簡親王尋授散秩大臣四十三年正月命復鄭獻親王始封之號仍為鄭親王四十九年五月薨年二十有七諡曰恭以子幼俟及嵗時議襲贈和碩親王武襄輔國公巴爾堪子巴賽巴爾堪鄭獻親王濟爾哈朗第四子順治十一年十二月授三等輔國將軍康熙十三年命同鎮東將軍拉哈達鎮兖州巴爾堪署副都統六月詔率蒙古兵赴江寧八月以逆藩耿精忠賊黨由饒州犯徽州命江寧將軍額楚偕巴爾堪進𠞰巴爾堪先驅九月至旌德聞賊據績溪疾進度徽嶺賊千餘迎戰敗之額楚繼至並抵績溪賊衆環逼合兵擊逐十餘里斬三千餘級復徽州𠞰賊黟縣至董亭橋賊五千餘據橋列陳擊之遁别賊千餘越山來援復敗之斬偽遊擊魏澄偽千總翁達等十一月進師婺源休寧賊據竒台嶺擊走之趨黃茅新嶺賊三千餘據木柵拒令步兵分攻嶺左右騎兵攻其中斬五百餘級賊棄甲仗遁復縣城躡之樂平縣段家村叛將陳九傑糾賊八千餘以拒旋敗竄入縣即樹梯登城攻復之餘賊據鄱陽雲吉峯下搜斬百餘級復饒州十四年四月進攻萬年縣之石頭街賊四萬餘斷渡口巴爾堪與額楚水陸並進破賊五十七營斬五千餘級擒九傑獲船二百餘進攻安仁縣賊兵八千餘乘船五百餘遁風逆泊岸巴爾堪追及賊棄炮焚船竄又分兵擊敗齊爪郎諸賊於南頓山五月至貴溪賊奔遂復縣城至弋陽偽總管蔣德􅀈率兵五萬餘為九營以木石壘斷西岡橋拒守偽總兵柯升以賊兵五千餘自廣信趨援别立六營巴爾堪同額楚分兩路進擊大破之斬溺二萬餘擒偽遊擊張二竒都司張明德等八月攻永豐賊於金石山陳斬偽都司李定等偽總兵何起先以賊兵六千據玉山巴爾堪親率兵攻復其城偽遊擊林二瞻以賊兵五百掠鉛山又浙江逆黨八千自江山常山犯玉山巴爾堪分兵擊斬無算十六年正月隨揚威大將軍簡親王喇布征吉安與吳逆偽將軍韓大任戰於螺子山失利議削爵仍戴罪圖功同額楚進征廣東九月𠞰賊韶州蓮花山首衝敵陳奮力搏擊手被箭所乘馬亦創易馬裹創力戰大破賊得頭等功牌十九年八月簡親王喇布統師征廣西上詔王進征時宜以巴爾堪總統營伍俾立功自效十月創發甚劇自度不能痊語都統額赫納副都統斡都海曰吾身為宗室不能死陳前今創發勿令家人以陳亡冒功尋卒年四十有四喪還上遣內大臣宗室輝塞往奠二十二年四月上以巴爾堪出征有年隨處奮身前進傷亡可憫下部議恤復輔國將軍雍正元年正月特恩追封輔國公世襲罔替賜諡武襄立碑紀功乾隆十七年十二月以孫竒通阿襲封和碩簡親王贈如其爵巴爾堪長子巴賽康熙二十一年四月授三等奉國將軍三十四年三月任鑲藍旗漢軍副都統三十五年二月從上征噶爾丹五月至克嚕倫河同平北大將軍瑪思喀追冦至巴顔烏蘭三十六年十月調正黃旗蒙古副都統三十八年罷任五十四年三月復授正黃旗蒙古都統五月調鑲紅旗滿洲副都統十一月遷正紅旗蒙古都統五十七年七月署黑龍江將軍六十一年十二月實授寧古塔將軍雍正元年正月陳奏父巴爾堪勞績請賜碑文得旨俞允追封輔國公即以巴賽襲二年二月召還京四年六月授振武將軍赴阿爾台軍營既至奏分遣諸將駐牧特斯扎布罕等處俟降雪後撤回從之五年十月詔遣大臣更代尋以喀爾喀郡王丹津多爾濟奏巴賽管兵整飭辦事妥協命仍留駐七年三月詔靖邉大將軍傅爾丹𠞰禦噶爾丹䇿凌以巴賽為副將軍八年五月詔傅爾丹來京籌軍務巴賽暫護大將軍印九年四月同傅爾丹進駐科布多六月噶爾丹䇿凌糾賊三萬來犯傅爾丹偕巴賽至扎克賽河獲賊二十餘人訊之詭言賊不滿千在察罕哈逹遊牧尚隔三日程傅爾丹遂進至庫列圗嶺賊據險阻我軍傅爾丹令移營和通呼爾哈諾爾賊兵二萬伏山谷伺我軍甫移突出蒙古兵俱潰散收滿洲兵四千設方營護輜重退渡哈爾哈納河登山列陳賊衆復踵至傅爾丹趨右仍回科布多巴賽同副將軍查弼納趨左越嶺至河濵力戰殁於陳年六十有九尋陷賊之正紅旗前鋒校薩明阿脫歸得巴賽與查弼納陳殁狀上諭廷臣曰凖噶爾賊衆侵犯北路將軍等急欲滅此朝食忿激迎擊倉猝失利此皆國家養育多年之人朕遴選任用冀其大樹功勳重邀爵賞伊等亦以世受國恩竭力捐軀雖誤墮狡計而矢死效忠情殊可憫賜恤如例入祀昭忠祠諡曰襄愍乾隆十七年十二月子竒通阿襲封和碩簡親王贈如其爵竒通阿初於雍正四年八月封三等輔國將軍九年十二月封輔國公三十年六月諭曰從前因竒通阿襲封簡親王銷去其原襲公爵近閲宗室王公表傳竒通阿之王爵係按派應襲而其公爵係伊祖父積有軍功相繼陳亡所遺不可泯沒且豐訥亨頻年出征頗著勞績曾給雲騎尉世職亦因已襲王爵銷去朕追念伊先世功勳又念豐訥亨近日勞績所有從前銷去公爵著宗人府帶領豐訥亨近派子弟引見請旨承襲七月命以竒通阿第二子經訥亨襲封巴賽所遺之輔國公四十年十一月經訥亨卒年三十有三四十一年五月以經訥亨之長子積拉堪襲封輔國公欽定八旗通志卷一百二十四
