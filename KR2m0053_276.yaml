  text: 人物志一百四十二列女傳二十二八旗蒙古列女傳五鑲黃旗蒙古前鋒伊靈阿之妻白氏鑲黃旗蒙古護軍善清之妻吳佳氏鑲黃旗蒙古馬甲韋陀保之妻白玉忒氏鑲黃旗蒙古馬甲額勒錦之妻巴雅拉氏鑲黃旗蒙古護軍皂保之妻管氏鑲黃旗蒙古馬甲進福之妻布爾吉賀特求克氏正黃旗蒙古馬甲富貴之妻韓氏正黃旗蒙古馬甲六十三之妻把嶽忒氏正黃旗蒙古護軍卓特巴之妻梁氏正黃旗蒙古前鋒富海之妻李氏正黃旗蒙古馬甲林安圗之妻塔喇氏正白旗蒙古馬甲七十一之妻張氏正白旗蒙古前鋒富僧額之妻鄭氏正白旗蒙古馬甲諾穆圖之繼妻黃氏正白旗蒙古馬甲烏勒興阿之妻卓啓忒氏正白旗蒙古馬甲伊昌阿之妻楊氏正白旗蒙古馬甲竒成武之妻徐氏正紅旗蒙古八品天文生永福之妻王氏正紅旗蒙古馬甲邁秋之妻蔣氏正紅旗蒙古前鋒雙保之妻張氏正紅旗蒙古護軍六十三之妻周氏正紅旗蒙古馬甲綽多波之妻額木賀奴特氏正紅旗蒙古前鋒哈拉哈之妻崔氏正紅旗蒙古壯丁倉兒之妻卜氏正紅旗蒙古壯丁七十一之妻劉氏正紅旗蒙古馬甲豐阿拉之妻富爾吉氏鑲白旗蒙古前鋒保拖之妻蔡氏鑲白旗蒙古養育兵集德之妻張氏鑲白旗蒙古馬甲德克精額之妻獻氏鑲白旗蒙古馬甲黑逹色之妻劉氏鑲白旗蒙古副參領伊桑阿之妻他塔喇氏鑲白旗蒙古馬甲德善之妻吳氏鑲白旗蒙古護軍訥清阿之妻沈氏正藍旗蒙古佐領關得祿之妻克濟勒氏正藍旗蒙古佐領關得祿之妾高氏正藍旗蒙古護軍永泰之妻李氏正藍旗蒙古護軍布占之妻劉氏正藍旗蒙古前鋒鄂齊爾圗之妻汪氏鑲藍旗蒙古前鋒薩炳阿之妻馬佳氏鑲藍旗蒙古前鋒齊爾圗之妻邱氏以上俱于乾隆四十六年旌表鑲黃旗蒙古護軍羣格之妻杭阿特氏鑲黃旗蒙古間散常德之妻陶氏正黃旗蒙古馬甲伍靈阿之妻張氏正白旗蒙古領催實德之妻烏啓忒氏正白旗蒙古護軍七十五之繼妻烏氏正紅旗蒙古馬甲塔克什之妻金佳氏正紅旗蒙古馬甲剛陵之妻納喇氏鑲白旗蒙古馬甲䇿里瑪之妻張氏鑲白旗蒙古弓匠拴住之妻吳氏鑲白旗蒙古護軍烏爾圗之妻紀氏鑲白旗蒙古馬甲彤韶之妻阿布蘇氏正藍旗蒙古領催諾木藏之妻卜氏正藍旗蒙古護軍額爾德瑪圗之妻佟氏正藍旗蒙古護軍雙德之妻詹氏正藍旗蒙古護軍薩炳阿之妻王氏正藍旗蒙古護軍德勝保之妻富察氏正藍旗蒙古護軍呢楚克之繼妻石圗里氏正藍旗蒙古前鋒校德福之妻瑪爾吉特氏正藍旗蒙古護軍扎什之妾吳氏正藍旗蒙古馬甲伊成額之妻李佳氏正藍旗蒙古馬甲兆納蘇圗之妻佟佳氏鑲藍旗蒙古馬甲明德之妻陳氏以上俱於乾隆四十七年旌表鑲黃旗蒙古護軍吉郎阿之妻瓜勒佳氏鑲黃旗蒙古親軍善保之妻必拉爾氏鑲黃旗蒙古馬甲四格之妻關氏鑲黃旗蒙古護軍伊里布之妻王氏鑲黃旗蒙古馬甲納木升額之妻吳祖氏正黃旗蒙古前鋒逹蘭泰之妻莽努特氏正黃旗蒙古護軍金格之妻張嘉特氏正黃旗蒙古馬甲佛光保之妻白氏正黃旗蒙古護軍額爾德尼之妻旺布特氏正黃旗蒙古護軍六十五之妻楊氏正黃旗蒙古護軍三逹色之妻薩爾托爾氏正黃旗蒙古白雅爾圖之妻韓氏正黃旗蒙古前鋒富得祿之妻李佳氏正白旗蒙古領催四逹色之妻王氏正白旗蒙古護軍元保之妻杭安泰氏正紅旗蒙古馬甲布蘭太之妻李氏正紅旗蒙古間散章齊之妻盧氏正紅旗蒙古馬甲德楞太之妻貴齊克氏鑲白旗蒙古馬甲都倫泰之妻公古爾氏正藍旗蒙古養育兵六十八之妻高氏正藍旗蒙古馬甲七金之妻張佳氏正藍旗蒙古領催色格京額之妻李氏正藍旗蒙古馬甲巴彥之妻姚佳氏正藍旗蒙古馬甲七林保之妻易氏正藍旗蒙古馬甲明德之妻薑氏鑲藍旗蒙古護軍明保之妻赤莫特氏鑲藍旗蒙古護軍舒圗之妻張氏鑲藍旗蒙古領催杜里之妻莫佳氏鑲藍旗蒙古馬甲八十三之妻范氏鑲藍旗蒙古馬甲冨天保之妻張佳氏以上俱於乾隆四十八年旌表鑲黃旗蒙古官學生布倫之妻朱氏鑲黃旗蒙古護軍善德之妻曽氏鑲黃旗蒙古領催朔羅之妻瓜勒佳氏鑲黃旗蒙古前鋒五十三之妻郭氏鑲黃旗蒙古馬甲武精之妻赫斯勒氏鑲黃旗蒙古弓匠逹爾瑪之妻嚴氏正黃旗蒙古護軍保善之妻金佳氏正黃旗蒙古護軍金良之妻高氏正黃旗蒙古護軍索木扎什之妻旺努特氏正黃旗蒙古養育兵伍格之妻趙氏正黃旗蒙古護軍瑪興阿之妻巴嶽忒氏正黃旗蒙古前鋒烏爾登額之妻博和羅克氏正黃旗蒙古馬甲格魯德之妻徐氏正白旗蒙古馬甲二逹色之妻伊爾根覺羅氏正白旗蒙古護軍博羅托之妻劉氏正白旗蒙古前鋒阿爾精阿之妻巴雅拉氏正白旗蒙古馬甲六十五之妻烏魯忒氏正白旗蒙古馬甲璋顧之妻冨察氏正白旗蒙古馬甲特納克之妻瑚勒住爾氏正白旗蒙古馬甲永柱之妻克里氏正紅旗蒙古前鋒伯爾瑚之妻劉氏正紅旗蒙古馬甲哈拉之妻克勒特氏鑲白旗蒙古護軍校齊里克圗之妻胡氏鑲白旗蒙古馬甲占住之妻白斯琿氏鑲紅旗蒙古護軍伊常阿之妻張氏正藍旗蒙古領催德克金額之妻把嶽忒氏正藍旗蒙古馬甲巴哈布之妻卓勒特氏正藍旗蒙古步甲邁拉遜之妻焦氏正藍旗蒙古前鋒花沙布之妻尼楚歡氏正藍旗蒙古前鋒巴彥太之妻巴玉特氏正藍旗蒙古護軍班第之妻李氏正藍旗蒙古護軍齊錦之妻喬氏正藍旗蒙古護軍六逹色之妻雷氏正藍旗蒙古護軍沙錦之妻布佳氏正藍旗蒙古馬甲嶽竒之妻方佳氏鑲藍旗蒙古領催珠爾噶岱之妻張氏以上俱於乾隆四十九年旌表鑲黃旗蒙古馬甲保興之妻冨察氏鑲黃旗蒙古護軍哈豐阿之妻墨爾吉氏鑲黃旗蒙古護軍瑚圗里之妻于氏