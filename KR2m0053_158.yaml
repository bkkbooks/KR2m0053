body:
  text: 人物志二十四大臣傳十滿洲鑲黃旗九傅恆達勒黨阿阿里衮達勒黨阿達勒黨阿滿洲鑲黃旗人乾隆二年由三等侍衛襲其祖果毅公遏必隆所立一等子爵五年授鑲黃旗蒙古副都統六年調熱河副都統命御前行走九年擢奉天將軍十年督辦錦州堤工尋奏請每年春季熊嶽副都統赴旅順操演水師屆三年奉天將軍查驗一次部議如所請十三年四月授刑部尚書兼鑲藍旗滿洲都統尋遷吏部尚書十月以從弟訥親金川軍營獲罪請往效力命隨經略大學士傅恆赴軍營授參贊大臣十四年凱旋敘功加太子少保十九年八月授黑龍江將軍九月從弟果毅公䇿楞北路軍營獲罪革爵以達勒黨阿襲二十年正月命率索倫巴爾呼兵速赴北路隨大軍𠞰準噶爾授參贊大臣在哨探兵隊前進五月大軍定伊犁上奬達勒黨阿奮勉令回京協辦大學士九月命仍赴北路軍營授定邊左副將軍偕參贊大臣哈達哈𠞰叛賊阿睦爾撒納十月命率兵千赴西路軍營掌定邊右副將軍印尋諭曰據達勒黨阿等奏稱聞西路大兵於明嵗草萌時再行進發此奏甚屬錯謬昨命達勒黨阿領兵前往西路哈達哈留駐北路達勒黨阿至西路時一切會同商酌速奏膚功方合機宜現在冬令進兵較難人人所知然愈遲緩則賊黨愈固辦理更費周章所謂兵貴神速者此也將軍大臣等倘因難退縮何以鼓士氣而振戎行達勒黨阿等所奏朕因北路已停進兵是以不行深究若伊至西路時亦出此言必至搖惑軍心所關匪細決不姑貸十一月改參贊大臣二十一年正月以索倫兵八百赴珠爾都斯迎定邊右副將軍薩喇爾命駐特訥格爾辦事二月奏言薩喇爾已抵吐魯番臣與台吉噶爾藏多爾濟等即赴西爾哈阿濟爾罕約會進𠞰詔奬其辦理合宜尋以兵千赴安集哈雅偵緝阿巴噶斯賊衆四月阿睦爾撒納竄哈薩克諭曰將軍䇿楞等擒拏阿睦爾撒納事事舛謬全無籌畫今西路專任達勒黨阿北路專任哈達哈伊二人尚屬勇往著即領兵前赴哈薩克務期擒獻五月授定邊右副將軍時䇿楞藉口糧乏駐登努勒台且令達勒黨阿撒兵還駐達勒黨阿以兵已前進糧又充裕不聽事聞奉旨嘉奬革䇿楞職即以達勒黨阿為定西將軍並諭詳察形勢并力擒𠞰八月達勒黨阿統大軍至雅爾拉偵哈薩克二千餘賊伏山谷中誘之出奮勇督擊斬五百七十餘級生擒十一人復追至努喇鏖戰斬三百四十餘級生擒十人阿睦爾撒納易服遁九月捷聞賜雙眼孔雀翎哈達哈尋亦奏捷奉旨嘉奬是時達勒黨阿等縱被擒之楚魯克昭華什還諭其汗阿布賚縛獻阿睦爾撒納而楚魯克等詭為阿睦爾撒納乞命請寬限達勒黨阿信之按兵待阿睦爾撒納得脫走閏九月諭曰阿睦爾撒納背叛䇿楞玉保帶兵追緝坐失事機經朕飭催西北兩路之兵始克稍振軍聲哈薩克汗阿布賚等望風奔潰阿睦爾撒納易服潛逃然所獲之楚魯克等兩次縱回傳諭擒獻卒以限期相誑達勒黨阿等遲徊觀望為其所愚逾月之久賊蹤愈逺朕早已料及是以於八月望前即降旨令其班師乃達勒黨阿等於未奉到此旨之先奏請暫回哈薩拉克地方過冬俟明春再進此不過強為之詞耳事斷難行仍諭令遵照前旨撤回又諭曰前因達勒黨阿哈達哈效力軍前尚知奮勉加恩賞給雙眼翎以示鼓勵乃西北兩路大員會合一處反彼此推諉各存意見殊負委任朕念伊等逺行勞苦不即重治其罪然亦無功可録所賞雙眼翎著一併繳還不準戴用十月命達勒黨阿來京十一月諭曰達勒黨阿前遣哈薩克楚魯克昭華什等往諭阿布賚而留阿喇勒拜杭吉勒圖於軍營為質乃並不加意防範致阿喇勒拜等先後脫逃續經拏獲杭吉勒圖又不即行正法仍復疏縱著交部嚴議二十二年二月詔革公爵及都統降為副都統以其從弟阿里衮襲公爵八月與哈達哈俱革職發往熱河披甲效力並申諭切責詳載哈達哈傳中二十三年十一月詔宥前罪授三等侍衛十二月率西安駐防兵千赴軍營二十四年正月搜捕沙喇斯瑪呼斯逸賊二月大軍𠞰回酋霍集占上以達勒黨阿及哈達哈厯練諭由巴里坤送馬至阿克蘇八月定邊右副將軍富德等大敗霍集占於阿爾楚爾及伊西洱庫爾淖爾達勒黨阿均在事有功詔授二等侍衛二十五年二月卒於軍營阿里衮阿里衮滿洲鑲黃旗人姓鈕祜祿父音德官領侍衛內大臣諡慤敬有傳乾隆二年阿里衮由二等侍衛授總管內務府大臣四年八月授兵部侍郎五年六月左都御史陳世倌疏劾山東巡撫碩色奏報沂州歉收失實諭阿里衮偕僉都御史朱必階詳勘疏言沂州府屬蘭山郯城二縣俱被水患蟲傷而水災尤甚地方官將被水稍輕者議以勘不成災最重者止報五六分災照例蠲免十分之一現在應徵錢糧窮黎實難措辦請將上年帶徵錢糧緩至後兩年完納其勘不成災者亦緩至次年徵收民借社倉穀石向例秋後還倉不必催追即動帑買補災民出境鄰省設法養贍咨送回籍冬月加意撫綏所賣子女力能取贖者買主不許勒掯下部議行十月調户部侍郎十一月署兩江總督楊超曾劾江西巡撫嶽濬與知府董文煒劉永錫循情納賄命同江南河道總督髙斌鞫實濬坐革職餘論如律六年七月兼管武備院事十月疏言盛京內務府三佐領下未入旗檔者六七千丁請册報內務府存案嗣後比丁年即照納差之三千八百餘名添差庶無隱漏之弊奏入如所請時户部侍郎梁詩正疏奏八旗人丁分置邊屯事命同大學士查郎阿往奉天一帶相度地勢再行定議尋合疏言寧古塔將軍所屬吉林烏喇之東北拉林阿爾楚哈及阿爾楚哈之東飛克圖等處平疇沃壤五穀皆宜江繞於外河貫於中山木取資不盡黑龍江將軍所屬齊齊哈爾之東南呼蘭地方地脈深厚五穀皆宜江河圍繞山場樹木俱便又吉林烏拉之西南黑爾蘇站周圍至一統河地脈肥饒五穀皆宜河流貫注林木尚足採取吉林烏喇之西南刷煙站及白都訥之東八家子至登額爾者庫五穀皆宜材木稍覺不便黑龍江將軍所屬呼蘭之東佛忒喜素素地方材木豐裕江河通繞但地勢髙下各異其不宜屯墾者黑龍江將軍所屬墨爾根黑龍江地寒霜早齊齊哈爾沙磧地多零星不成片落寧古塔將軍所屬吉林烏喇地方旗民耕種餘地無多三姓地方山多地窄霜雪甚早寧古塔地重山圍繞其東烏蘇綏芬洋春一帶係産參之所俱不宜移駐七年五月議政王大臣議以拉林阿爾楚哈去船厰甚近地肥饒廣濶五穀皆宜最為膏腴之地請先移駐滿兵一千名屯墾耕種將來著有成效由近及逺漸次舉行上如所請七月兼管奉宸苑事八年四月湖南巡撫許容劾糧道謝濟世狂縱各款總督孫嘉淦請革濟世職御史胡定以許容挾私誣陷入奏上命阿里衮會鞫得容寃誣鍛鍊嘉淦瞻徇扶同狀復濟世職容論罪嘉淦革職命阿里衮署湖南巡撫六月調署河南巡撫十月授山西巡撫十一月河東鹽政吉慶奏山西民間買田有擇地勒配輕糧之弊敕阿里衮妥議因言晉省富民乘貧民之急田取其上賦納其下遂至賠糧無巳嗣後將地畝數目田則糧額詳書契紙赴縣查驗核其賦之髙下輕重與實徵紅簿無差者聽其過割從前田糧有避重就輕者限二年內自首更正照則收糧免究二年後别經發覺按數計贓以枉法論田地入官賣主并知情不舉之中見人等照例杖懲庶富民知警貧民無纍詔悉心妥協為之十二年調山東巡撫十三年閏七月仍調山西九月蒲州府民與陜西朝邑縣民以爭黃河雞心灘地互控詔偕陜西巡撫陳宏謀會勘阿里衮疏言雞心灘介秦晉間本屬宜地墾種者晉省居多秦省較少請將灘中熟地並未種老灘鹹地以六分給晉民四分給秦民耕種上從之十五年擢湖廣總督先是總督永興布政使嚴瑞龍疏參巡撫唐綏祖巧詐營私纍商肥槖各款十六年四月命阿里衮同河南巡撫鄂容安會鞫尋奏綏祖無贓款惟縱容爐頭私買銅鉛添鑄屬實部議革職議上諭曰嚴瑞龍駕詞誣揑永興率入彈章自應分别反坐唐綏祖家産給還來京候旨九月阿里衮調兩廣總督十八年二月廣東東莞縣莫信豐等黨同逆首王亮臣糾黨散劄謀踞藍糞山為不軌事覺阿里衮馳赴增城搜捕逆匪二百七十餘凌遲正法如律上嘉之下部議敘旋以母憂回京九月補户部侍郎十月兼管工部事務十九年授步軍統領二十年正月署刑部尚書六月署工部尚書補鑲白旗漢軍都統十月授户部尚書二十一年五月命為領隊大臣赴西路軍營九月定西將軍達勒黨阿率師至雅爾拉賊迎拒阿里衮等領左右翼兵陳斬至五百七十餘擒十一人追至努喇復遇賊二千餘奮勇鏖戰擒宰桑扎南布戮賊三百四十餘上嘉之尋詔回京二十二年正月命為領隊大臣辦巴里坤事務二月達勒黨阿軍營獲罪詔以阿里衮襲果毅公爵諭曰逆賊阿睦爾撒納及阿布賚逃竄達勒黨阿帶領西路官兵追捕相距里許為人所紿以致逺遁參贊諸臣無所辭其咎阿里衮著降補侍郎六月授正白旗蒙古副都統九月沙喇斯瑪呼斯遊牧復叛掠臺站阿里衮帶兵二百前往同都統滿福進𠞰由阿斯罕布拉克和什特勒克取道至哈喇沙爾搜𠞰山僻賊衆進抵塔本順和爾納木噶獲男婦二百餘口諭曰前因阿里衮進兵遲延交部議處經部議革職朕諭以且觀後效今既自知罪愆奮勉行走著加恩免其革職十二月滿福為叛賊敦多克哈什哈車凌等誘害沙喇斯瑪呼斯遊牧逃庫車等處阿里衮遣熟識路徑之人取近堵截師次哈喇沙爾西南庫爾勒二十三年正月疏報沙喇斯瑪呼斯賊由呼爾塔克山逸至羅卜淖爾我兵往𠞰路擒瑪呼斯得木齊額默根等二月詔阿里衮所帶兵丁歸雅爾哈善隊諭曰前閲阿里衮所奏伊等追𠞰沙喇斯瑪呼斯等賊向呼爾塔克山前往嗣素賚瑪報稱阿里衮已回俟𠞰殺藏匿之瑪哈沁等即可撤兵伊等如果因馬匹口糧不足不妨奏明撒回既稱向前追𠞰而究未得賊人蹤迹不過於中途遷延行走即謂為追襲巧辭飾説可乎四月阿里衮自魯察赴巴里坤上以阿里衮辦理沙喇斯瑪呼斯賊衆未能奮勉詔革侍郎仍以副都統革職留任五月奏巴里坤種地人犯分屯築堡酌量安插上以阿里衮不諳事體申諭之八月疏奏雅爾哈善永貴等議於哈喇沙爾托克三闢展烏魯木齊等處屯兵三千六百名外增二千四百名酌於收獲後分駐哈密巴里坤又哈密所設卡倫兵請酌裁調往屯田查黃廷桂奏有哈密夾山路徑可至吐魯番而巴里坤糧餉均由哈密運送請將撤回屯兵俱駐哈密以節運費再哈密駐兵二千所設卡倫七十三除塔勒納沁等三十二卡倫仍須安設其一顆樹等三十九卡倫均可撤又聽差各兵內亦可裁減抽調六百名遣往屯田軍機大臣議如所請時將軍兆惠領兵薄葉爾羌城以四百餘人渡黑水衝𠞰小和卓木霍集占賊衆二萬餘道逺馬乏堅壁固守者三閲月先是上命選馬三千餘濟軍以阿里衮為參贊大臣自哈密進發尋遷吏部侍郎十二月擢兵部尚書正紅旗蒙古都統二十四年正月副將軍富德統兵至呼爾璊遇賊騎五千轉戰五日四夜會阿里衮督解馬亦至乘夜分翼斫陳賊潰戮千餘人餘悉負創遁逆酋大和卓木波羅泥都脅中鎗我兵復進屢敗賊衆將軍兆惠全軍出諭曰阿里衮前雖未著成勞今送馬濟軍如期集事且會同𠞰賊朕心深為奬許著賞給雲騎尉世職七月逆賊霍集占逃阿爾楚爾阿里衮偕參贊大臣明瑞阿桂等衝擊賊大潰八月阿里衮等領兵五百駐伊西洱庫爾淖爾西堵截拔達克山要隘復分兵守淖爾南賊據淖爾北山阿里衮等攻奪其家屬輜重逆回二千餘乞降復選兵二百踰嶺追𠞰逸賊九月命以參贊大臣留葉爾羌辦事十月賞戴雙眼翎二十五年四月命回京賜紫禁城內騎馬阿里衮行次雅木扎爾聞賊掠臺站圍城堡即回喀什噶爾時伯克邁喇木妄言阿睦爾撒納已取阿克蘇矣乃糾賊千餘由伯什克勒木來犯阿里衮率兵力戰賊入城堅守復以鎗炮攻圍邁喇木夜遁牌租阿巴特阿里衮追及之於和羅木魯克擒邁喇木及呢雅斯諭曰阿里衮聞賊搶掠臺站即回喀什噶爾擊敗賊衆撫定回人應機立辦阿里衮著交部議敘伊子拜唐阿豐升額著授為藍翎侍衛又諭曰阿里衮奏倡亂回人邁喇木呢雅斯等俱已擒獲此次辦理迅速甚屬可嘉伊子豐升額著加恩授為三等侍衛次子倭興額著授為藍翎侍衛十月授領侍衛內大臣命圖形紫光閣御製贊曰富德入援次呼爾璊趲行戈壁馬不進焉以馬濟軍敵營夜襲同事建績曰鄂博什二十六年十一月署禮部尚書十二月充經筵講官二十七年命為御前大臣兼上駟院卿二十八年兼管滿洲火器營大臣六月署陜西巡撫十月加太子太保二十九年授户部尚書協辦大學士三十年兼管禮部事務三十三年正月授參贊大臣往雲南軍營三月署雲貴總督尋授副將軍駐永昌七月疏言緬酋向來恭順內地人往來貿易以資其用今擾我土司抗我大兵則中華一切貨物不許絲毫透漏永昌普洱一帶千餘里山路叢雜恐潛行偷越嗣後姦民販貨出口拏獲即行正法隘口兵丁得財賣放罪亦如之疏防照例治罪失察文武官辨查明參革上是之又疏奏雲南省城至永昌千餘里山嶺陡險過兵運糧﨑嶇難行是以撥糧二十五萬石到永者僅一萬三千石請將藩庫報銷間款項內動支二三萬兩修理道路糧運庶免遲誤文報亦不稽延諭速行妥辦八月又言沿邊土司地廣民稀往嵗豐收賣與內地商販經緬匪蹂躪夷散田蕪蒙恩調駐重兵夷民俱已復業請於今冬借給銀兩購買耔種牛具普行耕種秋成後按照時價交米還項不敷兵糧即在各土司地方採買省內地挽運之費官兵裹帶之勞得旨嘉奬九月阿里衮會雲南巡撫明德奏滇省銅厰向例糧道專管遇有奏銷布政司雖會銜無稽查之責糧道駐省城銅厰三十餘處近者數百里逺者千餘里耳目難周查本地道府州縣鄉保是其管轄山厰設有透漏即可調撥兵役拏究至金銀鉛厰二十九處又係布政司兼管而本地道府不與焉請將金銀銅鉛各厰係州縣管理者責成本府專管道員稽查係府廳管理者責成本道專管各厰事務統歸布政司總理報銷至糧道不管銅厰止辦兵糧事務太簡驛鹽道事繁請將驛鹽道所轄之雲南武定二府改歸糧道管理如所議行三十四年二月以軍營馬匹疲瘦諭責阿里衮等不能殫心籌辦交部嚴議應革職詔留任五月疏奏騰越沿邊一帶緬匪闌入遮放隴川猛卯及户臘撒等處臣選熟習擺夷言語兵辨令向沿邊土司偵拏既可使內地情形不致透漏并可詰緬匪往來作何防備奉旨如此留心更有何可諭六月疏奏黔省古州銅仁等十餘處俱傍灘江營兵操舟利便灘江形勢與蠻暮等河同請將黔省換補習舟楫兵撥補赴滇可得數百水師之用九月偕經略大學士傅恆合疏言猛拱土司渾覺等來降令趕辦牛馬糧米接濟軍營並以猛拱人興堂札為嚮導進攻阿瓦渾覺獻象牙牛隻等物並採買早稻運送軍營上嘉之是月師至蠻暮十月至新街時傅恆偕副將軍阿桂領兵新街東岸賊三千餘船百餘迎拒阿里衮同伊勒圖據戛鳩江西岸派滿洲吉林緑營兵七百餘進𠞰賊寨藏百餘人我兵奮勇衝入賊遁又一寨藏賊三四百貴州把總姚卓殺賊一奪旗一我兵鼓勇進𠞰賊棄壘逃賊踞寨者復五百人我兵放鎗攻擊賊堅壁不出日暮不能固守潛遁擊斃二十餘人奪寨三殺賊五十餘諭曰初次接仗即能如此獲勝朕覽奏甚為欣慰十一月以疾卒於軍諭曰尚書果毅公阿里衮久侍禁廷揚厯中外公誠恪慎宣力有年前此平定西陲懋著勞績曽經圖像䇿勳是以征緬之役特命前往滇南俾膺副將軍之任去嵗因其身患瘡疾遄遣御醫馳視並賜藥餌調攝旋即得痊而精神未能全復朕心方為厪念昨自戛鳩進次猛拱所至頗稱勞瘁及在新街分兵𠞰賊奮勇奪壘純藎足嘉乃因體弱遘疾猶統舟師前進正冀其速愈以副委任遽聞溘逝深為軫惻所有應得恤典該部察例具奏禮部議上賜祭葬如例命入祀賢良祠諡襄壯三十五年諭曰尚書果毅公阿里衮宣力殫忱克彰勞勩昨嵗賜恤時曽令入祀賢良祠今思其先世額亦都遏必隆並以崇勳建有宗祠得膺祀典阿里衮亦應附食邀榮而其父領侍衛內大臣音德尚未列入著與阿里衮一併入遏必隆宗祠用奬勳藎該部即照例行四十四年御製懷舊詩列五功臣中詩曰昨嵗秋之仲盛京謁陵園三大功臣墓陪葬其間存兹阿里衮者額都四世孫勇豈匹其祖忠實一例肫兆惠阻黑水回衆如蜂屯爾時舒赫德統兵速入援又被狂狙阻進退至兩難適值阿里衮送馬繼進遄率兵亦弗多乘夜賊營掀賊駭自天降鹿埵羣逃奔兩軍俱善歸重進鴻功全後復往征緬受瘴惜隕身一再忘軀勞思之輒淚捫幸而子善繼金川建殊勳凱全以病終悲惜何忍言阿里衮子四長豐升額官户部尚書襲果毅公以軍功加繼勇號自有傳次倭興額官雲麾使次色克精額襲雲騎尉次布彥達賚現任鑲紅旗滿洲副都統傅恆子福靈安傅恆滿洲鑲黃旗人姓富察曽祖哈什屯內大臣祖米思翰户部尚書父李榮保察哈爾總管俱追封一等公傅恆李榮保第十子也乾隆五年授藍翎侍衛厯遷頭等侍衛七年授總管內務府大臣管理圓明園事務八年擢户部右侍郎十年六月軍機處行走十一年七月轉左侍郎十月授內大臣十二年二月充會典館副總裁三月晉本部尚書議政處行走兼鑾儀衛事六月充會典館正總裁十三年授領侍衛內大臣四月加太子太保協辦大學士六月充經筵講官時大兵征金川逆酋莎羅奔經略訥親總督張廣泗等久無功九月命傅恆暫管川陜總督經略事務尋晉保和殿大學士賜詩曰壯齡承廟略一矢靖天狼番部蕞爾蠢王師武必揚慰豫西顧久嘉汝赤心良撻伐敉么冦撫循集衆長斯能成偉績用幹不庭方佇看銷兵氣敷天日月光賜花翎二十藍翎五十銀十萬備犒賞軍前諸將奏章許於沿途開看上御瀛臺賜食及於諸將士製詩曰大清聲教暨遐陬豈有來王稽蜀酋黷武開邊非我志安良禁暴藉卿謀行軍吉值初陽復賜食恩同湛露流轉瞬明年擒娑虜還教凱宴侑封侯十月傅恆啓行上親詣堂子行告祭禮遣皇子及大學士來保等送至良鄉視傅恆飯十二月諭曰經略大學士傅恆自奉命以來公忠體國殫竭悃忱紀律嚴明軍行甚速途次衝風冒雪晨夕馳驅兼辦一切咨詢機務刻晷鮮暇常至徹夜無眠今日披覽來奏甫入川境馬匹遲誤減從星發竟至步行茍非一秉丹誠心堅金石安能若是將來迅奏膚功自當優議酬庸之典而目前之勞瘁實屬超倫著交部從優議敘部議晉太子太傅特命加太保仍加軍功三級傅恆疏辭不允初小金川土舍良爾吉奪其兄澤旺印蒸於嫂阿扣莎羅奔之侵沃日也良爾吉實從之後詐降為賊諜張廣泗惑於漢姦王秋言使良爾吉領蠻兵我師舉動賊輒知之是月傅恆使副將馬良柱誘良爾吉來迎至邦噶山聲其罪斬之阿扣王秋並伏誅事聞諭曰前據張廣泗力言良爾吉王秋不可輕動即軍前諸人皆明知其罪而疑畏不敢先發今經略大學士傅恆甫至軍營即取兩年逋冦如檻豚圈豕以快人心而警番衆非謀猷明斷識力堅定曷克臻此即此已當優敘但經略大學士於從前議敘之旨具摺懇辭若仍交部議敘無以善體沖挹之美其即以前日所賜雙眼孔雀翎為此番酬庸之典如仍執意謙讓是不遵朕旨也是月傅恆奏臣於二十一日抵卡撒軍營所云左右山梁不過兩坡相對地非甚廣賊所守各碉亦不甚大不知何以用兵二年不能進取及閲營地規模狹小與賊相望且雜處畨民市肆中無以示威嚴占地利臣相度移舊壘前令總兵冶大雄總理營盤以肅軍紀臣惟前此之誤在於專攻碉卡賊險碉林立大兵至守益嚴毋論攻其有備克取為難即數日克一碉亦數年不能竣事今當竒正兼施因機制勝或以竒兵繞出其後或以偏師另行取徑賊出則直挫其鋒不出則專搗其穴又各路尅期齊進使腹背皆兵寢食無暇自必內潰而酋可擒矣疏入俞旨報聞是月傅恆率總兵哈攀龍哈尚德等攻右山梁下巴朗平碉及色爾力石碉連克之上以金川水土惡劣馳賜傅恆人參三斤並及諸將帥有差十四年正月命班師召傅恆還朝諭曰金川用兵一事朕本意欲禁遏凶暴綏緝羣畨並非利其人民土地而從前納親張廣泗措置乖方屢經貽誤是以特命經略大學士傅恆前往視師傅恆自奉命以至抵營忠誠勞勩超出等倫辦事則巨細周詳鋤姦則畨蠻懾服整頓營伍則紀律嚴明鼓勵戎行則士氣踴躍且中宵督戰不避風雪擊碉奪卡大著聲威誠克仰副委任朕思蕞爾窮番何足當我王師經略大學士傅恆乃中朝第一宣力大臣顧因荒徼小醜久稽於外朕心實為不忍即使擒獲渠魁掃蕩巢穴亦不足以償勞此旨到日傅恆著即馳驛還朝尋詔封傅恆一等忠勇公賞給紅寶石帽頂四團龍補褂嗣傅恆請從卡撒一路直攻噶拉依又言攻克賊巢成功可必一簣之虧誠為可惜堅請進兵並懇辭公爵繳還原旨俱不允諭曰經略大學士忠勇公傅恆帥師進𠞰番酋忠誠奮發志期珍冦執奏再三朕揆勢度理以允降班師休兵息民為經國逺計彼胸奴未滅何以家為者乃驃姚二師輩武人鋭往立功之概大學士輔弼元臣抒誠贊化名耀旗常正不必與兜鍪閫帥爭汗馬一日之績復示以詩曰三面姑開格蜀夷來調説鼎佇期之集思廣益卿誠踐勤逺勞民我不為武豈佳兵應戒彼績惟和衆孰同斯功成萬骨枯何益壯志無須效二師又賜詩二章其一曰安邊底績本丹忠請命畨酋勢已窮上將有心期利執大君無物不包蒙那須一月聞三捷早覺千欣達兩宫晉國勤勞豫厪念速歸黃閣贊元功其二曰鷗鳥何庸盡覆巢好生天地德含包歌成宵雅八章句蓍得同人九四爻兵洗蓬婆春淡蕩首稽玁狁面顤䫜蜀民安撫勤籌畫心契元良泰陛交是月逆酋遣頭人至卡撒投稟訴乞降並畏死意傅恆令曰莎羅奔郎卡親縛來營者當待以不死逆酋復遣頭人至丹壩乞降總統提督嶽鍾琪入賊巢挈酋等由勒烏圍噶拉依至經略軍二月初四日莎羅奔郎卡除道營門外設壇翌日率衆降傅恆升帳受之莎羅奔等焚香作樂泥首請罪誓遵六事無犯鄰封歸土司侵地獻馬爾邦凶酋資送內地人納軍械供徭役傅恆傳旨赦其罪莎羅奔等獻傅恆佛像一白金萬却其金不受初六日傅恆發軍營奏至諭曰徑略大學士忠勇公傅恆奏報莎羅奔郎卡俯首就降獻捷班師朕不勝欣悅此皆上蒼孚佑宗社貽休有以默相朕躬皇太后懿訓詳明有以啓迪朕志荷兹福庇感慶實深經略大學士忠勇公傅恆丹衷壯志勇略宏猷足以懷柔異類迅奏膚功即諸葛之七縱威蠻汾陽之單騎見虜何以加兹實為國家嘉祥上瑞前已晉爵封公酬庸更無殊典所賜四團龍補褂著祇受服用再照元勳揚古里額駙之例加賜豹尾鎗二捍親軍二名優示寵章俱不必懇辭自去嵗之徵兵命將與今嵗之決䇿班師初不意畨酋畏威懷德革面革心一至於此固朕宵旰憂勤事無大小先機籌畫恰合機宜亦由經略大學士忠勇公傅恆秉心忠亮克承訓示成此殊勳可見作善者昌將來數十年贊化調元懋襄郅治實嘉賴焉其傳諭諸王滿漢文武大臣並宣諭中外知之製詩曰止戈為武信其然我澤如春經略宣共喜捷音來玉闕何殊俘虜自金川畨酋路左心傾服軍士行間氣倍鮮單騎汾陽休比擬都因忠赤格穹天嗣傅恆疏辭四團龍補服諭曰經略大學士忠勇公傅恆因朕賞給四團龍補服具摺奏謝並請於朝賀大典之日遵旨服用其尋常仍服公品級補服此固出自大學士忠勇公傅恆謙沖本意然朕此畨奬賞實出至公且具有深意不可不為明晰宣示蓋論大學士公傅恆平定金川之功自不可與揚古里額駙開國之功並論但彼當開創四征之初今屬守成無事之日以大學士公傅恆之忠誠智勇練達宣力令與同時同事亦必能懋建殊勳可信其易地皆然也夫軍旅之事國家不能保其必無大臣身係安危為社稷所倚賴如張廣泗不過封疆外吏其人亦不足論至訥親爵位既崇又任用有年朕之加恩超越儕輩上年命以視師實寄以心膂如朕親行不意辜恩貽誤一至於此為大臣者若惟是偷安自逸任意乖張國事其何賴焉朕既用以自愧更因以滋懼是以明正典刑不肯曲宥而大學士公傅恆見朕縈懷西顧欣然請行仔肩重任自奉命西征冒涉風霜均勞士卒步涉巖阻晨夕辛勤拜發封章裁決軍務常至達旦事事妥協周詳至則申明紀律誅賊腹心雪夜督師攻碉毁卡必期焚巢掃穴一舉蕩平大振聲威賊畨震懾始稽顙歸命出於至誠逮承朕旨納降班師星馳就道咨詢庶務仍係丙夜辦理奏覆此所謂誠貫金石信格豚魚是以時未七旬兵不血刃而畨酋洗心革面永矢歸誠從此邊徼敉寧閭閻樂業而中外大臣咸知所取法股肱一體休戚相關夙夜匪躬緩急足資倚任實我大清萬年無疆之慶國家酬庸盛典原非朕所得私今兹疊沛殊恩昭示風勸亦為朝廷逺大之計不僅為金川平定一時一事而然在大學士公傅恆實應欣承無愧不然則莎羅奔畨蠻小醜即迅奏膚功亦與當年嶽鍾琪之樹績青海大學士鄂爾泰之綏靖苗疆等耳朕於臣工賞罪大典悉有權衡銖黍不爽天下臣民宜所共悉所賜大學士公傅恆照宗室公式之朝帽頂及四團龍補服並於朝賀典禮之時時常服用不必懇辭其尋常入朝入部辦事應從所請隨宜即用公品級補服以成謙挹之美三月傅恆凱旋命皇長子率諸王大臣等郊勞既至上御殿受賀行飲至禮賜傅恆詩曰卡撒功成振旅歸升平凱宴麗晴暉兩階干羽欽虞典六律宫商奏采薇湛露應教頒幕殿甘膏更慶遍春畿持盈保泰咨同德偃武修文凛敕幾又諭曰朕賜大學士忠勇公傅恆四團龍補服先經大學士傅恆奏請於朝賀大慶之日遵旨服用尋常仍用公品級補服朕諭以入朝入部辦事姑從所請以成謙挹之美今日朕升殿禮畢後大學士即易補服朕思章服之榮原以旌有功而勵臣節從前勳舊大臣蒙賜者皆時常服用若僅用於朝賀典禮之時而尋常入朝又旋易本爵服色殊覺參差非禮嗣後入朝著即遵前旨時常服用其入部及在家聽其自便以終成大學士之謙吉尋敕照勳臣額亦都佟國維例建宗祠祀傅恆曾祖哈什屯祖米思翰父李榮保春秋官為致祭追諡李榮保曰莊恪賜傅恆第東安門內落成賜詩曰嫖姚賜第落成新歌凱歸來得意春上將鷹揚今奏績諸軍鳬藻久懷仁攸芋君子熊羆夢畢駭酋塗匍匐臣從此坐調熙世鼎敷豫教澤萬方均二十年六月準噶爾平諭曰兩路興師之舉人心狃於久安在廷諸臣惟大學士傅恆與朕協心贊畫斷在必行著加恩再授一等公爵以為力矯積習為國任事者勸傅恆疏辭諭曰大學士公傅恆以加賞公爵具摺奏辭情詞懇摯及召見又復面陳再四至於泣下並稱金川之役叨封公爵已為過分觀其不自滿假信出至誠實將來可以永承恩遇之道朕心轉為嘉慰俯允所請用成厥志所有平定金川及準噶爾奏捷兩次功績著併於現封忠勇公敕內以昭茂典仍從優加等議敘部議加六級後圖功臣百人像於紫光閣以傅恆冠御製贊曰世胄元臣與國休戚早年金川亦建殊績定策西師惟汝豫同酇侯不戰宜居首功七月充平定準噶爾方略正總裁三十三年命經略雲南軍務至師期前往御製言志詩曰征緬非人事竟乖重資經略重臣差待之一嵗無消息懾以三軍或畏懷中止誠難存國體邊防欲靖豈兵佳佇期指日大勳就後舞前歌振旅皆三十四年二月傅恆啓行懇辭親遣經略儀注命閣臣頒敕印於太和殿上賜傅恆及出征將士食即席製詩曰緬酋弗靖擾滇邦螳臂居然試莛撞健騎重驅厄魯部驍材兼選黑龍江弼豫中國原無二平彼今時豈有雙就事熟籌應一往於浮得挈勝千扛必能合衆成城奏莫拒牽羊袒肉降湛露和風士鳬藻佇看飲至酌金缸三月傅恆抵雲南四月至騰越上親書扇以賜曰炎徼熾煩暑軍營區畫頻大端應悉記細務不辭親世上誰知我天邊别故人朂斯風到處揚武並揚仁初上以賊據老官屯之險敕造舟並奪賊船順流直搗副將軍阿里衮等以邊外峽紆湍險舟不通沿江亦無辦工所奏止者再後特遣傅顯伍三泰往視所言與阿里衮等同傅恆至軍詢之撫夷李景朝土司線官猛等知蠻暮近地有山曰翁古多木旁有地曰野牛壩野人所居涼爽無瘴野人樂受值執役甚恭使傅顯涖事滿洲緑營兵並從行奴僕更番運料至江岸七月工竣狀聞諭曰所辦甚是他人斷不能似此滿洲兵騎射素嫻進𠞰時自宜資以馬力至於習勞之事則與緑營兵丁既同隸行間原不應區分彼此向特因緑旗惡習恇怯無能臨事每多退避是以有犯必懲若其服役辛勤當與滿洲兵一體愛惜以均勞逸前此領兵大臣惟知體惜滿洲而於奔走服役專𣲖緑營不復念其獨勩豈一視同仁之道今傅恆於運送船料令滿洲兵輪流乘騎分擡不使緑旗偏於勞瘁並以大臣官員跟隨之家奴等乘馬安行於理未協亦一例分派輪擡籌辦實為公當緑營兵稍具天良有不知感激奮勉願為國家出力者乎此實從來所未籌及自非公忠體國與朕同心之大臣豈能酌理揆情均平妥協若此凡有領兵之責者皆當奉以為法傅恆如此存心必蒙上天所垂佑迅奏膚功自可預卜朕深為嘉悅至於造船一事水陸並進實征緬最要機宜乃朕屢次詢聞而阿里衮等並以該處崖險澗窄斷難行船為詞即朕今年特派傅顯伍三泰等前往專辦此事亦以沿江一帶實無造船處所覆奏傅恆至永昌即遣人往勘則於銅壁關外野牛壩地方即係成造船隻之處樹木足供船料且氣候涼爽可以屯聚兵丁而野人又極恭順服勞無異內地編氓同此沿邊僻壤非自今日始通何以前此並無一人見及而傅恆得之便如取攜可見事無難易人果專心致力未有不成者無如諸人皆豫存畏難之見於胸中遂以為隔閡不可行以今日傅恆所辦觀之向所謂斷難籌辦者然乎不然乎將此宣諭中外知之上賦造舟行曰造舟造舟何處禡乃在銅壁關外野牛壩緬匪險據老官屯必資水軍順流下先是屢敕豫刳木率以難成中止罷經略盡心博訪咨得地得材命工價猶然邊外豈異區事在人為語非假野人效順氣爽涼頗覺炎瘴輕往夏忠誠天佑有如斯我亦為之額手謝舁至蠻暮乃入江諸事從公堪奬藉閩人使船如使馬鼓勇艨艟凌波駕水陸兼進緬豈當定知肉袒牽羊迓安民和衆武常經不為所欺不妨赦是月猛拱大頭目脫猛烏猛及所屬達羅頭目脫猛殼來降請備船濟師傅恆令脫猛烏猛齎檄諭各土司八月師發騰越渡戛鳩江據西岸遂抵允帽九月脫猛烏猛以夷目賀丙之父賀洛及擺夷四十户來降請探賊猛拱後土司渾覺亦率頭目滲籠籠滲籠朋降貢馴象四上賜傅恆詩二章奬之其一曰猛拱輸誠舟濟師朱波早是失藩籬烏梁海譬先收附準噶爾斯易掃夷身先諸軍共辛苦心嘉碩輔佛肩仔秋霖中喜瘴江渡已儹兵行兩月期其二曰伊犁耆定久戈􅌢詎緬昏狂事疥搔昔實謨猷贊帷幄今資奔走效弓刀東山那學謝安逸上蔡還過裴度勞佇待紅旗飛報捷重開紫閣勒勳高十月傅恆取道猛拱破猛養寨獲臘泥拉賽誅之設臺站留瑚爾起兵七百駐之遂至南董干攻南準寨獲頭目木波猛等三十五人師次暮臘猛養頭目扎達布棄猛養拔營而逸大兵長驅至新街賊遁傅恆夾攻於東西岸東岸射殺賊目一斬級五百餘獲纛一船一寨三糧械無算西岸奪寨三斬級五十奏至諭曰此次初與賊人接仗即射殪頭目殺賊衆多又連破賊壘奪獲纛幟軍械米糧等物軍行甚為利順且官兵俱各勇往朕心深為嘉悅應加恩示奬送部分别議敘傅恆以所獲緬纛進上賦志事詩曰師會新街可進航賊人迎拒據蘆塘數番斫陳妖鋒挫兩隊奪舟我武揚斬將搴旗嘉此衆水凶土劣慮其方老官屯得當振旅觀象玩辭易義長十一月傅恆進圍老官屯克毛西寨緬酋懵駁遣頭目諾爾塔乞降傅恆以其地氣候惡劣疏請允降諭曰緬甸僻在炎荒中朝以化外置之乃厯任總督自張允隨廢弛邊備嗣是愛必達吳達善等亦因循致滋事釁而劉藻辦理莽匪侵擾九龍江事由思茅退回普洱輒行畏罪自戕緬匪遂鴟張無忌此厯來貽誤情形也至命楊應琚前往調度乖方致賊匪入關騷擾土司其種種欺謾屢飭不悛取罪實在於此及再命明瑞前往仍令以總督經理邊情並未遽欲興師逺涉而所統八旗徑旅不過二千又分其半與額爾登額由旱塔一路取道合𠞰逮明瑞自錫箔蠻結拔寨殺賊乘勝深入轉戰至小猛育為時已久屢促額爾登額移兵往援乃敢抗延不赴又復紆道退回內地明瑞等猶沿途接仗期殿全師竟以䇿應不前捐軀以殉其事遂難中輟彼時緬酋懵駁雖曾具書軍營懇停進𠞰而所遣乃內地被留之兵丁許爾功等八人並未專派大頭目齎表乞降此則國體所關豈宜輕納是以置之不答然猶冀其悔罪輸誠尚可宥其既往非必欲勞師動衆為犂庭掃穴計也詎待一載逆酋猶頑梗怙終我國家當全盛之時豈可任小醜跳梁不示懲創況滇省緑營恇怯積習久為賊匪所輕而阿里衮等亦未能相機部署是以調遣吉林索倫等慣能殺賊之人並閩省水師同赴滇省水陸夾攻又因大學士傅恆屢請前往督辦其實心體國經畫有方體察形勢所言始為可信遂命為經略往蒞其事此朕不得已用兵之苦心也至傅恆於七月間自騰越進兵視前此師期較早兩月賊匪未及預防因得由戛鳩一路統兵直進收取猛拱猛養而其所經山徑﨑嶇江河紆阻越險濟軍備嘗勞瘁且因敵刈糧不藉內地轉餉及至新街會兵䇿勵將士無不賈勇爭先於江岸沙洲連奪賊寨殱賊五百餘並殪其頭目獲取舟航纛械賊皆望風披靡如此殫誠宣力不畏艱險實從來大臣所罕覯者及進次老官屯率衆攻𠞰而賊守拒甚固遂克毛西一寨誅戮賊衆絶其糧援復悉力圍其大寨勢可計日而取但其地水土惡劣官兵多生疾病即領隊大員亦間有染患身故者將士等不用之於戰陳而徒令其嘗試毒厲於心實有所不忍是以半月前即迭傳諭旨決計撤兵今傅恆等奏緬酋懵駁奉有蒲葉書遣老官屯大頭目諾爾塔齎詣軍門籲請貸其聲討傅恆等移檄使受約束義正詞嚴姑從所請賊衆甫經創衄諒不敢遽萌故智至傅恆請罪一摺以為力違衆議執意請行將此次出兵引為一人之罪殊為未喻朕意此次出兵非好大喜功而傅恆承命經略職分應爾設以為辦理非是朕當首任其過其次方及傅恆豈宜獨以為己責昔皇祖於吳三桂一事諭令廷臣集議而主撤藩者惟米思翰明珠數人後逆藩抗命衆皆歸罪議撤之人皇祖諭云朕自少時以三藩勢焰日熾不可不撤豈因吳三桂反叛遂委過於人大哉聖言足為萬世法守傅恆此事即可援以為例前於傅恆收服猛拱時曾賜三眼孔雀翎以示褒寵傅恆懇俟功成後再用今既未經攻克賊巢前所賜翎即著繳回仍用伊原帶之翎即此於伊請罪之意適足相當想王大臣等亦當誠心允服也上賦志事詩曰大勝新街武略張勵師進取近豺狼雖云示創蠻疆地適有相求貝葉章已自畏威而懷德底期肉袒與牽羊樊鄉悉怛非嘉畫渾覺優恩俾樂康十二月緬酋懵駁遣其大頭目十四人獻方物於軍三十五年二月班師三月傅恆還至京七月卒諭曰大學士一等忠勇公傅恆才識超倫公忠體國德心孚契襄贊深資自早齡侍值禁近即覘其器宇非常洊膺委任旋以金川建績錫爵酬庸用是擢冠綸扉綜理庶務藎誠靡懈罕有其比西師之役獨能與朕同志贊成大勳及崇爵再加堅讓不受尤足嘉焉昨嵗進𠞰緬甸傅恆堅決請行朕以萬里懸軍情難深悉而廷臣更無可當斯寄者因授為經略統率徑旅專征傅恆自戛鳩濟師以後身先士卒艱瘁備經用能收服猛拱逮會師蠻暮襲擊新街斬馘搴旗賊皆潰竄遂進攻老官屯時傅恆已身染沈疴猶力疾督勵兵衆晝夜兼攻剋期可卜逆酋畏懼具書懇請解圍而朕亦因其地水土惡劣軍中多病先期降旨撤兵並遣醫馳驛往視春問傅恆於天津行在復命見其形神頓異隱慮難以就痊猶冀其安居調理以臻勿藥詎自五月以後病勢日益加劇漸成不起每朝夕遣使存問賜以內膳羮糜俾作頤養復間數日親臨視疾見其有增無減軫念彌殷今聞溘逝深為震悼所有衾禭之屬業經從優頒賜似此鞠躬盡瘁允宜入祀賢良祠賞給內帑銀五千兩治喪並著户部侍郎英亷經理其事朕仍親臨奠醊其應得恤典著該部察例具奏上親臨其第酹酒製詩曰瘴徼方欣輿病回侵尋辰尾頓增哀鞠躬盡瘁誠已矣臨第寫悲有是哉千載不磨入南恨半途乃奪濟川材平身忠勇家聲繼汝子吾兒定教培又命喪葬儀節視宗室鎮國公例行賜祭葬有加禮諡文忠十一月諭曰大學士忠勇公傅恆曩者金川奏績時以其祖父世篤忠貞流光鍾慶曽諭令建立宗祠自其曽祖哈什屯以下官為春秋致祭傅恆令其一體入祠酬庸俎豆三十六年上巡畿輔駐蹕天津行宫傅恆前嵗復命處也追憶之詩曰去嵗滇南力疾回恰斯面晤憶生哀朴齋即景依然也前席言人何往哉自古同為閲世客祇今誰是作霖材自憐無助涓埃者後進方當竭力培三十九年上以蹕塗所經賜奠其墓詩曰佳城咫尺蹕途傍蒞止因之酹桂漿已厯草年資輔弼又驚三載隔隂陽先兹與汝應相恨後此顧豫轉自傷無忌昭陵雖有例那教賜奠痛文皇四十五年上賦懷舊詩以傅恆在綸扉二十三年日侍帷幄藎誠素著年未五十鞠躬盡瘁以喪甚傷惜之詩曰世臣更近戚丹誠素所信命之習政事幹材亦日進金川往經略旌旗改觀奮然其時其勢未宜深入迅郎卡既怖讋特許歸降順凱旋贊黃閣章服三錫晉西師兩用兵同心却衆論坐謀無不協用蕆大功建其後征緬甸力請往抒藎猛拱既收服官屯進圍困祇以水土劣兵役多病頓值彼誨罪請爰撤師旅振然因受瘴深兼悔墮功悶遂以永辭世飾終典空綣嗟我社稷臣所期寧在近年少長於余騎箕惜且恨傅恆子四人長福靈安多羅額駙乾隆二十一年允傅恆請派往西路軍營效力授乾清門三等侍衛二十四年從定邊將軍兆惠𠞰賊於葉爾羌敘功擢二等侍衛八月召來京準噶爾大功告成上以福靈安非披堅執鋭之嵗即能奮勇行陳屢著勤勞擢頭等侍衛賜緞六端銀百兩二十七年給雲騎尉世職三十二年授正白旗滿洲副都統署雲南永北鎮總兵四月赴木邦軍營守龍陵會緬匪犯猛卯檄副將哈國興馳援賊退遮罕事聞上嘉之六月卒於任諭曰副都統福靈安去冬奉命前往雲南朕因其從前征𠞰回部宣績行間諳習軍務是以暫留彼處令其察看軍務以便回京時面奏嗣以其行走奮勉勇往任事特授為副都統并令署永北鎮總兵統兵進𠞰今據明瑞奏福靈安前從永昌力疾趨赴木邦中途病勢加劇復回永昌調理不痊於六月中旬身故朕心深為軫惜著加恩交部議恤所有應得恤典該部察例具奏其靈櫬還京著官為照料辦理賜祭葬如例所遺雲騎尉世職以其姪襲傅恆次子福隆安和碩額駙封一等忠勇公官兵部尚書别有傳又次福康安現官協辦大學士封一等嘉勇公又次福長安現官工部尚書福隆安子豐伸濟倫襲一等忠勇公爵欽定八旗通志卷一百四十四
