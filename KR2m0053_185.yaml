body:
  text: 欽定四庫全書欽定八旗通志卷一百七十一人物志五十一大臣傳三十七滿洲鑲紅旗一庫西喇布洪綽和諾阿蘭珠爾禪尼雅哈蘇庫拜布葉臣薩喀顔代哈哈納巴竒蘭博爾晉勞薩西喇布子瑪拉希西喇布世居完顔以地為氏太祖髙皇帝時率所部來歸常翼衛太祖列理事十大臣癸巳年富勒佳齊之役哈逹錫特庫以兩矢射叔貝勒西喇布並奮身當之中創而歿恤贈三等輕車都尉後定八旗佐領俾其子噶祿瑪拉希𨽻滿洲鑲紅旗噶祿襲世職從征沙嶺有功加二等輕車都尉卒無嗣天聰九年太宗文皇帝命免功臣徭役瑪拉希以父功授佐領並襲其兄二等輕車都尉崇德二年隨都統葉克舒等征卦勒察有功明年七月任刑部理事官八月擢蒙古副都統又明年授都統尋隨睿親王多爾衮等圍錦州坐阿徇王貝勒等私遣官兵歸家及離城逺駐論罪罰贖復隨貝勒阿巴泰等征明奪黃崖口入長城所至克捷七年部臣奏大軍擊明總督洪承疇時瑪拉希承勘護軍統領噶布拉敗走罪狀任其狡辨不行確察應請議罪上命免之順治元年四月從破流賊李自成復追擊至望都十二月與都統阿山征陜西自蒲州渡河擊斬賊衆敘功加一等輕車都尉尋奉命移師往會豫親王多鐸南征二年五月自歸德渡河率衆奪泗北淮河橋明守泗總兵焚橋遁走大軍遂夜渡瑪拉希與都統宗室拜音圖以紅衣炮攻克武岡寨引兵而東擊敗明守將黃蜚等步兵數萬於常州下宜興進攻崑山途遇明水軍戰艦擊破之值都統恩格圖等列炮攻城瑪喇希率所部兵趨頺堞先登遂拔崑山克常熟師旋晉三等男四年八月隨肅親王豪格西征軍至漢中叛將賀珍遁走西鄉瑪拉希與都統鰲拜分兵馳擊躡及於楚湖斬獲甚衆敘功加二等男五年以失勘冒功妄爭之參領希爾根罪論罰贖得旨寬免會睿親王出獵瑪拉希坐與都統噶逹渾等私行射獵鎸秩一等八年世祖章皇帝親政瑪拉希訟削秩寃詔復職贈其父西喇布兼一騎都尉兩遇恩詔晉三等子九年九月奉敕偕護軍統領阿勒津平定廣東十月調鎮漢中十二月復調征湖廣辰常諸賊十一年以病卒賜祭葬越明年上復追念西喇布之效命于太祖也賜諡順壯視一品大臣例立碑墓道賜瑪拉希諡忠僖子瑪爾漢襲爵綽和諾綽和諾姓那木都魯世居東海窩集部父明安圖巴顔與其族人康古哩等並為部長部衆最繁嵗庚戌太祖髙皇帝命巴圖魯額亦都往招明安圖巴顔遂來朝優賜金幣以還未幾綽和諾率百人來歸上嘉其輸誠效順賚豫甚厚授綽和諾佐領𨽻滿洲鑲紅旗自是屢從上征討每臨陳服綿甲奮勇直前所向披靡嵗辛亥隨額駙何和哩征呼爾哈部攻克扎庫塔城天命四年擊明總兵馬林於尚間崖六年取瀋陽遼陽並有功豫三等輕車都尉世職嘗奉命率兵駐防科木索地寧古塔有就善者殺守吏率衆携輜重遁綽和諾追及海濵斬就善並殱其黨命以所獲輜重悉賚之太宗文皇帝嗣位綽和諾列十六大臣任鑲紅旗副都統天聰五年大軍征明圍大凌河城明監軍道張春總兵吳襄等率兵四萬餘自錦州來援綽和諾先衆迎擊冒炮矢力戰歿於陳詔優恤其家晉世職為一等輕車都尉無子以其兄翁格尼襲職仍授佐領轄綽和諾所屬人戶復益以新附呼爾哈百人八年因翁格尼不勝佐領任以其子富哈禪代之並襲世職富哈禪别有傳阿蘭珠弟布爾堪阿蘭珠先世居棟鄂以地為姓父阿格巴顔初與兄對齊巴顔並為屯長當太祖高皇帝征杭佳城時阿格巴顏適在城中守城者為阿格巴顔之妻父屬其助己拒守阿格巴顔不可曰以德誅亂宜也吾安能助亂而拒有德乎尋同對齊巴顔各率所屬來歸𨽻滿洲鑲紅旗授對齊巴顔之子噶爾瑚濟及阿蘭珠皆為佐領分轄所屬阿蘭珠旋擢理事大臣從征烏拉部直前衝擊中鎗且傷馬下馬步戰弗稍郤遂歿於陳太宗文皇帝天聰八年豫三等輕車都尉世職以其弟布爾堪襲布爾堪初任佐領尋兼參領天聰四年同參領武賚哈寧阿等奉命率精兵百人略明邉境生擒間諜三人馳獻復渡大凌河斬級四十餘俘獲百六十人八年重定各佐領所屬人戶以新附呼爾哈百人增𨽻布爾堪尋駐防牛莊追獲蒙古逃人晉世職為二等輕車都尉崇德元年卒以兄之子坦泰襲坦泰卒子圖哩襲三遇恩詔晉世職至三等男順治十二年世祖章皇帝追敘太祖朝攄忠效力著績行間諸臣視一品大臣例賜諡立碑阿蘭珠與焉諡曰順毅庫爾禪庫爾禪滿洲鑲紅旗人姓鈕祜祿世居長白山祖賚魯琿先為哈逹都督擕子索塔蘭及所屬來歸太祖髙皇帝嘉之命索塔蘭尚主生子四庫爾禪其次子也天命初年召直文館四年十一月蒙古喀爾喀五部來議和庫爾禪齎書涖盟九年二月復往科爾沁修好咸稱旨授佐領太宗文皇帝即位命諸貝勒率師征扎嚕特部庫爾禪從及凱旋上勞諸貝勒將行飲至禮以館臣逹海宣旨詢出征事庫爾禪代諸貝勒奏言蒙上天福佑聖主威靈是以所向克捷天聰元年隨諸貝勒征朝鮮朝鮮王李倧遣使請罪庫爾禪與副將劉興祚往諭倧誓降庫爾禪還請上命朝鮮外臣不知倧已降也率步騎兵千人邀諸平壤庫爾禪集從者擐甲突圍而出朝鮮兵躡擊之乃令從者前行自率十騎殿殺三人疾馳六十里朝鮮騎兵三百人接迹至庫爾禪率十騎伏諸隘擊敗之斬其四將兵五十餘級獲馬百卒達瀋陽既奏捷復賫諭還軍中申軍令定盟誓而還土謝圖額駙奧巴者以交通明國上先遺書責之三年正月奧巴至庫爾禪承旨與館臣希福等復申前書意讓之奧巴叩首服罪獻駝馬以謝四月奉命兼司國史記注事四年正月上親征明北京庫爾禪偕逰擊髙鴻中先抵灤州以計啓其城門大兵遂入二月班師庫爾禪與諸將率師駐守五月明監軍道張春等來攻城庫爾禪與佐領覺善等勒兵出戰奮矟踰塹直趨敵師明兵退走旋發炮焚城樓壞垜堞急援之敵不能登遂與覺善馳斬發炮敵兵都統圖爾格等以孤軍無援奔永平敵圍益急復率衆力戰殺敵數人歸永平隨大貝勒阿敏等棄城出關入朝待罪上以其在灤州時有摧鋒陷陳功命解其縳而貰之五年十月同副都統石廷柱往諭明總兵祖大夀降十一月復使朝鮮申約貢獻先是庫爾禪語佐領薩木哈云鑲白旗貝勒曾毁汝於上前汝宜慎之我已為汝解紛矣及薩木哈獲罪被繫遂以其言具奏其使朝鮮也私修漢字書遺朝鮮國王復與其侍即私語受餽遺獨厚事覺論死特旨免之六年六月使往明得勝堡議和庫爾襌違命逾期始至和議既成得勝堡人各以物來獻上命庫爾禪詰朝引之來見及期又不至七年二月坐逃將劉興祚事并議前罪劉興祚者明之開原人初干法開原道將撻之興祚懼遂棄父母妻子來降太祖既克遼東以興祚為副將領蓋復金三州與庫爾禪友善既而以貪婪被劾落職隂蓄叛志為上所覺加約束庫爾樿力保其忠興祚乘間遁歸明及大兵征明陳斬興祚庫爾禪又收殮焉至是論死家産藉沒上念其素著勤勞命免籍家産世祖章皇帝定鼎燕京復念其前勞詔依一等大臣例賞以房地奴僕官其子瑪拉為户部郎中尋任護軍參領洪尼雅喀弟薩穆瑭阿子武拉禪洪尼雅喀姓烏扎庫世居噶喀里太祖髙皇帝創業時呼倫諸部爭為雄長而烏拉尤橫肆聞洪尼雅喀以材武豪於鄉曲欲其臣附劫其孥以要之洪尼雅喀既偕往復念烏拉貝勒不足事中途棄走與弟薩蘇喀薩穆瑭阿携族屬四十人來歸太祖嘉之授佐領撫戢其衆𨽻滿洲鑲紅旗天命三年從征明有功擢參領天聰二年太宗文皇帝征明錦州師薄城洪尼雅喀先登毁其堞墜傷足敵乘􅓈將縳之時薩穆瑭阿以護軍校隨征馳護其兄與敵格鬪死洪尼雅喀乃免八年五月敕敘開創功臣以洪尼雅喀率衆歸附授二等輕車都尉世職尋卒子武拉禪襲順治元年七月授護軍參領十月世祖章皇帝命豫親王多鐸追𠞰流賊李自成武拉禪以右翼從十二月至潼關甫立營賊衆掩至擊却之敗其步兵於關外設伏又敗其騎兵乘勝破賊步兵二營二年從貝勒博洛下浙江趨平湖敗敵獲戰艦進平杭州明魯王朱以海據紹興遣其督師熊汝霖總兵方國安擁衆來犯武拉禪破之於赭山又破之於朱橋范村等地四年五月授鑲紅旗蒙古副都統五年正月增設滄州大名駐防命武拉禪以副都統駐防大名是年逆鎮金聲桓據江西叛武拉禪隨征南大將軍談泰攻南昌兵五合五勝聲桓以步騎七萬拒戰武拉禪率夲旗兵合擊大破之聲桓既死剿餘賊於袁州敗偽總兵朱翊鏦步卒千五百人定一府二縣六年七月奉詔率將士協同通州總兵由天津至趙北口𠞰淀賊趙鳳岡遇於良店斬之殱其衆千人别遣參領哈其哈等擊賊寶山村擒其魁田東樓楊牌子七年五月授刑部侍即先是遇恩詔晉世職為一等輕車都尉至是敘平定江西浙江功加一雲騎尉八年三月部議武拉禪曽以英親王阿濟格私藏軍器事告知巽親王滿逹海等不行奏聞削雲騎尉世職尋遇恩詔晉一等男九年正月上以前此吏部奉恩詔豫襲太濫命分别降等改武拉禪世職為二等男十二年隨寧海大將軍宜爾德攻舟山偽總兵陳六御等以三萬人拒戰武拉禪領纛前進擊敗之十四年凱旋敘功晉一等男遇恩詔加一雲騎尉十六年五月以領侍衛內大臣額爾克岱青家奴毆侍衛阿喇納於市武拉禪承勘不行詳訊枉論阿喇納罪坐削雲騎尉十七年四月自陳有疾解任康熙六年十月卒賜祭葬如例以其子呼喇禪襲爵庫拜庫拜滿洲鑲紅旗人姓鈕祜祿巴克什庫爾禪之弟也初為護軍校太祖高皇帝天命三年大軍征明取撫順凱旋明廣寧總兵張承蔭以兵躡我軍後我軍還戰庫拜領所部先入敵隊擊卻敵衆尋以隨大軍取明瀋陽遼陽有功命管佐領事太宗文皇帝天聰五年隨副都統蒙阿圖征瓦爾喀進師額赫庫倫及額勒約索庫拜與敵戰手中創仍率衆攻克一屯是年七月初設六部授吏部參政八年敘前戰功豫騎都尉世職旋以吏部考滿晉世職為三等輕車都尉是年十二月同副都統巴竒蘭參領薩穆什喀等征黑龍江諸部俘獲無算收降呼爾哈部人衆九年五月凱旋晉二等輕車都尉崇德元年冬從上征朝鮮二年春朝鮮降師還屬下護軍喀拜訟庫拜略平壤時奪取喀拜所獲婦女及馬牛征江華島時私令部兵出獵捕麅六殺而食之又縱其兄子瑪拉多携厮卒隨征法司勘議庫拜應罷任革世職論死詔從寬免罷管佐領罰鍰三年七月更定官制裁省參政改庫拜為吏部理事官五年正月卒長子哈爾丹襲職未幾卒次子尚堅襲葉臣葉臣姓完顔世居兆佳後𨽻滿洲鑲紅旗天命四年從太祖高皇帝征明有蒙古兵助明拒戰于鐵嶺奮擊敗之六年從征遼陽積功授三等輕車都尉世職太宗文皇帝即位設十六大臣葉臣與焉佐理鑲紅旗事天聰元年隨大貝勒阿敏征朝鮮過明邉境以兵八十人夜襲斥堠六所盡獲其軍士既至朝鮮攻義州城與佐領艾博先登敘功晉二等輕車都尉尋率兵戍蒙古追斬逋逃晉三等男四年太宗征明將攻永平城召入御幄授方略與副都統阿山乘夜率兵薄城下城上炮矢交發葉臣伺敵炮裂驚擾領精鋭二十四人立雲梯先登城遂破太宗嘉之稱為驍將並諭衆曰後遇攻城如彼欲先登當阻止愛惜之遂晉三等子列議政八大臣諭以政有闕失隨時陳奏葉臣對曰臣荷恩隆重願罄所知入告勉矢忠良但恐識有未逮耳五年任鑲紅旗都統從征大淩河列營城西南明總兵祖大夀守城突出襲我營葉臣與額駙和碩圖等督兵夾擊之殱敵過半七年六月詔諸貝勒大臣各陳時務時有議攻山海關者葉臣疏言今兵力聚集宜先往大同宣府偵察哈爾聲息近則往征若已逺遁即入明內地進逼北京伐木造梯牌晝夜攻圍城即不克可以震懾敵人太宗是其言是月隨貝勒嶽託攻明旅順口斬獲無算八年隨大貝勒代善自喀拉卾博入得勝堡略大同西至黃河擊敗朔州騎兵二百崇德元年五月隨武英郡王阿濟格征明既入邊分兵克安州又合攻寶坻縣拔其城十二月太宗親征朝鮮葉臣率兵入其國都二年四月率步兵助武英郡王征明皮島乘艦進攻島西北隅斬其總兵沈世魁師還晉一等子四年偕副都統八人簡諸佐領下兵各三入明邉青山口由太平寨奪青山關七年代貝勒阿巴泰駐防錦州順治元年世祖章皇帝遣諸王討流賊李自成自成敗走西安葉臣奉命率兵赴山西任招撫由饒陽至懷慶附近郡邑悉下賊黨猶據太原會師進攻克其城先後平二十七州一百四十一縣置官屬安戢居民明總兵李際遇守河南山寨定西伯唐通副將董學禮從賊擁衆邉關葉臣並招降之又徵薦明翰林朱之俊主事胡全才等十二人山西底定還至定州值土賊掃地王聚衆劫掠遣兵剿滅之比至京坐擅拆禁城墻停止敘功賜白金六百兩二年七月隨順承郡王勒克德渾代豫親王多鐸統兵江南時大學士洪承疇任招撫凡不順命者咨葉臣討之輒奏績十一月以李自成餘黨一隻虎等出沒武昌襄陽荆州諸郡詔葉臣隨勒克德渾移師剿擊三年十月凱旋賜黃金三十兩白金五百兩五年病卒年六十有三改一等子為二等子兼一雲騎尉命其子分襲長子車爾布襲二等子别有傳第五子車赫圖襲雲騎尉哈哈納子斐洋古哈哈納姓那木都魯世居東海窩集部太祖髙皇帝時從其父明安圖巴顔來歸編所屬為二佐領以哈哈納及弟綽和諾分統之𨽻滿洲鑲紅旗妻以宗室女尋從征烏拉身中數創仍力戰敗敵復奉命率本旗兵戍守賽明吉未至其人衆叛逃守將瑪爾圖追弗及哈哈納聞之兼程疾進斬三百餘級收男婦五百餘人而還上嘉其功賜以所得叛渠及鞍馬弓矢等物天命四年三月明兵四路來犯上率諸貝勒往征破明兵於界藩尚間崖及阿卜達哩岡時朝鮮遣兵助明亦為我兵所敗上遂統師取明開原鐵嶺二城哈哈納俱在事有功六年從征遼陽同副都統博爾晉偵敵於城旁敗其援兵復分攻沙嶺城敗廣寧兵之來援者太宗文皇帝即位以哈哈納列十六大臣任鑲紅旗副都統事天聰八年率兵略地錦州敗明兵於城下進征寧逺遇敵掩襲哈哈納所乘馬傷仆徒步力戰不少却仍擊敗敵往修海州城明人來爭哈哈納率所部首先迎戰敵潰走尋赴援耀州釋其圍追敵渡河敗之獲馬三十崇德元年隨武英郡王阿濟格征明入長城攻克昌平涿州二城尋以傷發病廢致仕哈哈納第三子斐洋古初任佐領聖祖仁皇帝康熙十三年隨順承郡王勒爾錦討逆藩吳三桂師至荆州賊將劉之復陶繼志犯宜昌斐洋古隨護軍統領額斯泰率舟師橫江逆擊敗之獲其戰艦十七年剿賊將胡國柱於永興鏖戰一日夜國柱敗走進攻長寧耒陽等處俱率兵前驅十九年授驍騎參領二十五年改護軍參領三十五年二月擢鑲紅旗漢軍副都統從上征噶爾丹領火器營兵出古北口五月師抵克嚕倫河噶爾丹棄廬帳遁斐洋古隨大將軍馬斯喀率兵窮追至巴顔烏闌而還三十六年二月卒豫祭葬如例博爾晉子特錦博爾晉世居完顔以地為氏太祖高皇帝時率户口來歸即使轄之任佐領𨽻滿洲鑲紅旗尋授侍衛嘗從征富勒佳齊博爾晉族弟侍衛西喇布為哈逹錫特庫所射中兩矢博爾晉拔其矢還射遂殪錫特庫天命六年命董築薩爾滸城工竣從大軍征明瀋陽敗其總兵賀世賢陳策等瀋陽既下進征遼陽明總兵李懷信侯世祿蔡國柱薑弼童仲揆等率衆五萬於城東南五里拒戰我左翼兵大敗之明兵在城中聞敗自西門出援時博爾晉奉命留城旁偵敵遂合兩紅旗兵奮擊明兵挫衄爭入城自相蹂踐死者枕籍會左翼四旗兵已登城博爾晉麾衆畢登遂取其城復分兵攻沙嶺擊敗明廣寧援軍八年扎嚕特貝勒昂安屢害我使臣肆掠牲畜博爾晉時為參領與前鋒統領逹音布參領雅希禪進征薄昂安所居寨昂安率衆拒戰逹音布被創歿博爾晉同雅希禪督兵奮擊斬昂安及其子俘獲甚衆凱旋得優賚十年任副都統率兵二千征東海呼爾哈部降其五百户以歸上郊迎於渾河宴勞之尋設理事十大臣博爾晉與焉太宗文皇帝初即位擢鑲紅旗滿洲都統天聰元年正月隨征朝鮮五月上親圍明錦州距城西二里駐營博爾晉自瀋陽率兵至擊敗明兵追至寧逺城下盡殪之嗣以招撫蒙古瓦爾喀各部並追敘前此戰功授一等男爵尋卒後因遺失敕書子孫不得襲康熙三年其子特錦為父奏請賜碑事下禮部以無證驗寢其議旋奉諭曰博爾晉於太祖朝在理事十大臣之列後授為都統勤勞素著可議加恩於是豫諡忠直立碑墓道特錦博爾晉第四子也初任佐領天聰八年授騎都尉世職崇德五年隨鄭親王濟爾哈朗率兵屯田義州先是多羅特部蒙古蘇班岱等降於明居杏山西五里臺至是願來歸遣人通欵上命鄭親王移師征迎明總兵祖大夀吳三桂劉周智合據杏山邀戰特錦分隊擊敗之六年隨大兵圍松山明總督洪承疇兵犯我汛界特錦力戰卻敵尋隨征明寧逺敗其騎兵順治元年隨睿親王多爾衮入山海關以步軍擊敗流賊李自成追至望都合副都統和託軍大敗賊衆明年敘功晉世職為三等輕車都尉任兵部理事官考滿以辦事勤慎晉二等輕車都尉三年隨肅親王豪格征四川流賊擊敗賊將胡敬德於三水縣復敗髙汝礪於禮縣進剿賊渠張獻忠於西充賊衆或踞山巔或自山旁繞截我兵後特錦俱擊走之又破賊將楊正於馬湖六年征叛鎮薑瓖於大同時賊由絳州侵及夀陽特錦率兵往剿斬級千餘賊又由阻馬路得勝路犯我兩藍旗汛地特錦連擊敗之復破其援兵移師至汾州府有賊兵七千夜犯兩紅旗營特錦禦戰多斬級又剿賊於平遙遼州榆社次第就平七年擢兵部侍即兼鑲紅旗蒙古副都統三遇恩詔晉爵至三等男九年調本旗滿洲副都統十二年擢本旗蒙古都統列議政大臣十五年隨信郡王多尼征貴州雲南攻戰招撫並有功晉二等男十八年轉本旗滿洲都統康熙十一年卒豫祭葬如典禮諡襄壯立碑墓道子特爾赫襲爵勞薩子程尼勞薩姓瓜勒佳其先世居安楚拉庫太祖髙皇帝征瓦爾喀取安楚拉庫路降其衆勞薩來歸後𨽻滿洲鑲紅旗天命六年從征明克遼陽授三等輕車都尉世職天聰二年從太宗文皇帝征多羅特部有功晉二等輕車都尉三年從征明北京敗敵於德勝門外斬級五十餘獲馬數十晉世職一等授前鋒統領四年同參領圖魯什等偵眀邉境有俘獲五年八月大軍圍大淩河城同都統阿山率精兵二百赴錦州偵敵敗松山援兵二千陳斬百餘級獲三纛明兵自錦州踵至我參領覺善被圍急又有佐領與敵交戰敵揮刃將及勞薩直前奮擊悉援出之還奏行營上親酌金巵以賜九月明監軍道張春總兵吳襄合兵四萬由小淩河移營拒戰勞薩遵上方略領纛前進破敵營十月與圖魯什往錦州松山偵軍事斬明兵執纛奔寧逺者十餘人十一月上親征察哈爾使勞薩率精兵百人偵敵所在會察哈爾引遁追躡之逾興安嶺弗及獲甲仗馬駝之委於道者六年四月大軍次博囉額爾吉勞薩率兵先進獲蒙古之流散者二百餘人以獻五月與阿山復率兵百人至喀喇莾鼐遇察哈爾哨卒四人追至益圖斬其一敵兵百人圍我偵者留哈為敵所困勞薩以七騎大呼直前援出之還奏言察哈爾汗棄地逺遁追之無及太宗遂自布龍圖旋師至庫托勞薩還與大軍會七年奉命與圖魯什等率兵三百人往略寧逺迤西路分其兵為兩翼突入沙河所斬獲無算初貝勒大臣等征明山海關既克捷遽引兵還僅留圖魯什及勞薩哨兵殿後敵軍數千追至勞薩等以寡敵衆敵兵却走於是太宗召責貝勒大臣而嘉奬勞薩等八年二月巡略錦州松山邉地俘斬甚衆尋復往錦州齎書與明總兵祖大夀懸於十三站山坡而還五月同承政圖爾格率護軍出邉渡遼河沿張武臺河駐防以衛蒙古扼敵兵敘功晉三等男賜號碩翁科囉巴圖魯十二月率將士百人迎察哈爾降衆九年隨貝勒多爾衮收降察哈爾林丹汗子額哲師還略明朔州界抵長城勞薩乘夜前進敗明羊房口及寧武關兵遂毁關入略代州欣州至黑峯口遇明哨卒四十人悉斬之獲其馬崇德元年偕參領武拜等齎書入邉諭明松棚路潘家口諸守將尋率甲士偵明邉冷口並多斬獲上親征朝鮮命同户部承政瑪福塔等率兵三百先行為賈人裝晝夜疾馳將至朝鮮國都其守將合衆禦我軍力戰盡殪之國王李倧遣使迎勞於郊外為緩兵計遂潛遁南漢山城勞薩追敗城中出戰兵復殱其援兵二百餘二年充議政大臣部議征朝鮮時勞薩不嚴設偵哨以致李倧潛遁又約束不嚴士卒離伍應削世職罰鍰得旨免削職三年二月從征喀爾喀同副都統席特庫等齎書諭明宣府各官及還因曽獲喀爾喀四十餘人收其財物牲畜縱之去法司鞫實論死特命宥之十月隨貝勒嶽託征明道燕京略山東率前鋒兵駐邉外隘口多俘斬自墻子嶺入纍敗敵兵獲其馬及炮明以馬步卒八千迎戰正紅旗蒙古阿蘭泰旁却勞薩同護軍統領圖賴等奮勇直入明兵敗北夜復犯我營勞薩擊却之並破其營又率前鋒軍追敵哨騎生擒十九人斬百七十餘級獲馬百三十有奇晉二等男五年二月同武拜率兵偵廣寧邉境由中後所入傍海而南斬二百級獲牲畜十二月以圍錦州時伏兵髙橋縱敵弗擊降世職削巴圖魯號六年七月隨鄭親王濟爾哈朗圍錦州設伏誘擊松山兵獲馬百甲九十明總督洪承疇赴援我師未集勞薩當其二隊諸貝勒軍繼至協力迎擊大敗敵衆於城壕旋往塔山東偵敵擒騎兵一明兵之退走松山也勞薩追之見援軍將至怯使騎馳問鄭親王曰敵至矣若之何至是議罪應罰請旨上以勞薩此次雖無大功而效力行間勤勞素著且身被重創不宜復懲其小過賜敕復世職及碩翁科囉巴圖魯號尋任副都統隨睿親王軍與洪承疇力戰歿於陳加贈三等子明年命其子程尼襲爵世祖章皇帝時三遇恩詔晉程尼一等伯任議政大臣尋隨敬謹親王尼堪出征湖廣陳亡恤贈加一雲騎尉十二年九月賜祭葬追諡勞薩曰忠毅諡程尼曰誠介立碑墓道以勞薩弟洛弼襲爵薩蘇喀薩蘇喀滿洲鑲紅旗人姓烏扎庫世居噶哈里太祖高皇帝時與其兄洪尼雅喀擕族屬來歸任護軍恭領天命七年從上征明廣寧至沙嶺敵列陳拒戰我軍有都爾根者馬蹶敵騎二人刃交下薩蘇喀馳入敵陳躍馬大呼斬一人排一人仆地遂翼之出無敢逼者天聰三年從太宗文皇帝征明北京先驅偵敵有俘獲五年大軍圍明大淩河城城內兵突出薩蘇喀截擊追及壕而還再出再敗之八年二月略明前屯衛與前鋒統領勞薩擊敗寧逺兵獲馬二十有二六月師至大同薩蘇喀率三十人偵明左衛有兵三百營城外十里掩擊皆潰走追至城下斬獲甚衆九年隨貝勒多爾衮招撫察哈爾林丹汗子額哲進略明邉境都統圖爾格設伏挫敵敵奔逸薩蘇喀躡其後斬戮無算敘功授雲騎尉尋任禮部參政崇德二年同恭領丹岱等率護軍驍騎各四十略明邉境次清河敵兵七百據守與戰大捷奪纛二獲馬二十餘五年圍錦州取來降蒙古蘇班岱之孥於杏山擊潰拒戰明兵旋守穆魯河再却錦州兵破其外城六年進圍松山隨肅親王豪格敗明總督洪承疇兵於郭外時敵援兵夜犯鑲黃旗營薩蘇哈以兵馳擊敵敗去八年從鄭親王濟爾哈朗征明寧逺取中後所前屯衛有功世祖章皇帝順治元年正月擢鑲紅旗滿洲副都統四月大兵入山海關討流賊李自成薩蘇喀同副都統和託突入敵陳中炮歿事聞贈三等輕車都尉長子阿素喀次子秒齊納先後襲布顔代布顔代姓博爾濟吉特初為蒙古烏魯特貝子太祖高皇帝天命七年率所屬人户自西拉塔喇來歸尚主為額駙豫二等輕車都尉世職𨽻滿洲鑲紅旗十一年大兵征明寧逺攻城未下分兵取覺華島布顔代率蒙古兵隨都統武納格破敵營殱其衆焚所積芻糧而還太宗文皇帝天聰元年隨征朝鮮凱旋分賜降户及所獲馬三年從上征明入龍井關克大安口取遵化薄燕京四遇敵衆皆擊敗之復擊敵於盧溝橋率七人先衝破敵陳明年春師還駐遵化敵犯我隨征蒙古喀喇沁營布顔代趨援郤敵尋同武訥格略地取糧遇敵山岡斬級四十餘五年授禮部承政兼右翼蒙古副都統從征大淩河圍其城明兵突出城來犯布顔代被創仍力戰卻敵斬一人六年隨大軍略明宣府大同邉外地收察喀爾部衆師還以所俘獨少又弗即遵諭歸𨽻户籍並隱匿牲畜論革世職罰鍰奪俘獲及賜物上念其前此先衆來歸免革世職八年上親統師征明大同布顔代同侍衛星訥等率蒙古護軍八十取道哈麻爾嶺收察哈爾潰散人戶進次西拉木輪招降百餘户又遇率衆來歸之察哈爾部臣俄爾塞圖等携以會大軍是年敘功晉爵三等男九年擢鑲紅旗蒙古都統崇德元年隨武英郡王阿濟格征明既克昌平安州等城旋師出邉敵襲我後隊布顔代還擊不嚴整陳伍為敵所敗又嘗擅令驍騎校等出掠被殺七人論罪罰鍰奪俘獲罷都統任降世職為一等輕車都尉世祖章皇帝順治元年復為前鋒參領隨睿親王多爾衮入山海關擊敗流賊李自成同副都統和託等追剿至望都尋隨豫親王多鐸由河南征陜西敗流賊於潼關明年正月敘功加一雲騎尉四月隨征江南渡黃河與敵接戰所乘馬被傷身受數創猶衝鋒射殪敵人尋以創發卒於軍年六十有一子卾穆布襲職巴竒蘭巴竒蘭姓納喇世居伊巴丹後𨽻滿洲鑲紅旗太祖高皇帝創業初巴竒蘭率衆來歸屢從征伐沙嶺之役率五佐領兵先衆敗敵天命十一年從征明寧逺奉命同都統武訥格率兵攻覺華島破之敘功援三等輕車都尉世職太宗文皇帝即位進列十六大臣佐理正黃旗事天聰三年從征明至京城北駐營遵上所授方略擊敗明總兵滿桂等軍於城下七年隨貝勒嶽託等征明旅順口為步軍統領偕鑲白旗大臣薩穆什喀聨舟前進敵據岸拒戰巴竒蘭身中數創冒矢石裹創奮擊獨敗敵一隊號於衆曰孰能用命先登者吾暴其功於上前於是佐領永順珠瑪喇超距而登巴竒蘭率衆繼之敵殊死戰我軍少卻巴竒蘭疾聲大呼曰敵兵敗矣士卒皆踴躍騰藉入遂克旅順口是年九月敘
