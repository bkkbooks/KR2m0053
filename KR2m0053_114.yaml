body:
  text: 欽定四庫全書欽定八旗通志卷一百學校志七奉天府學生員駐防考試八旗武生奉天府學生員天聰三年八月奉太宗文皇帝諭曰自古國家文武並用以武功戡禍亂以文教佐太平朕今欲振興文治扵生員中考取其文藝明通者優奨之以昭作人之典諸貝勒府以下及滿漢蒙古家所有生員俱令赴考扵九月初一日命諸臣公同考校各家主毋得阻撓有考中者仍以别丁償之九月初考試儒生分别優劣得二百人凡在包衣下及滿洲䝉古家為奴者盡皆㧞出一等者賞縀二疋二等三等者賞青布二疋俱免二丁差徭八年三月校取生員得二百二十二人四月合滿洲䝉古試之取中舉人十六名各免四丁崇徳三年八月考校生員凡一等十五名二等二十八名三等十八名各賜綢布授䕶軍校品級已入部者免二丁未入部者免一丁六年六月内三院大學士范文程希福剛林等奏以滿漢䝉古士人考取秀才並舉人上從容諭之曰忠經有云在官惟明􅊩事惟平立身惟清聴不可以不聰視不可以不明清則無欲平則無曲明能正俗聰則審扵事明則辨扵理爾等善體此言従公考校秋七月賜一等秀才各縀一疋青布二疋二等秀才各縀一疋青布一疋三等秀才各青布二疋康熙十二年題准盛京旗下子弟通習漢文者與盛京民童一體考試漢文滿洲䝉古編滿字號漢軍編合字號考取滿洲蒙古生員三名漢軍生員二名十五年議准停止八旗考試二十六年恩詔八旗准同漢人一體考試遵㫖議定盛京八旗滿洲䝉古取進生員三名漢軍減去二名取進生員一名鄉㑹試編入在京滿洲䝉古漢軍數内一併考試二十九年三月禮兵二部議覆兵科給事中能泰疏言奉天府滿洲蒙古漢軍考取生員及監生生員鄉試應照京師八旗之例扵未入塲之先令奉天将軍副都統等騐射馬歩箭能者准其考試不能者不准入塲至㑹試時同京師舉人一體考試馬歩箭應如所奏詔從之三十年覆准奉天滿洲䝉古増生員三名共取六名漢軍増生員二名共取三名三十四年題准盛京考取生員今添八旗内府滿洲漢軍佐領子弟考試滿洲䝉古原取進生員六名再増四名共取生員十名漢軍原取進生員三名再増二名共取生員五名三十五年題准千丁家有佐領官品級者有監生部用以年滿考職者其子弟許在盛京八旗漢軍内一同考試三十六年題准盛京八旗内府佐領子弟嗣後停其考取生員其三十四年添取滿洲䝉古生員四名漢軍生員二名額數俱行減去四十九年覆准奉天為發祥重地文風日盛各學廪増俱著加廣除府學廪増十名不必加外滿洲額設廪増一名各加三名漢軍額設廪増一名各加一名五十五年覆准昭陵千丁子弟照三十五年福陵千丁子弟例在盛京八旗漢軍内一體考試又覆准奉天府合字號童生額進三名今漢軍人數漸多又福陵昭陵千丁子弟准與漢軍一體考試應将漢軍取進之額量増一名五十七年覆准永陵千丁子弟照福陵昭陵例與奉天漢軍童生一體應試雍正元年題准盛京八旗内府佐領下子弟復同滿洲䝉古漢軍一體考試應照三十四年加額例滿洲䝉古扵原取六名外再増四名共取十名漢軍扵原取三名外再増二名共取五名合康熙五十五年所増千丁子弟入學一名共取六名二年覆准盛京八旗考試舊例滿字號入學六名其廪増額各四名合字號入學四名其廪増額各二名今添入内府佐領下子弟考試既滿號加四名共取十名合號加二名共取六名其廪増額亦著照前二名取一之例将滿號加補二名合號加補一名又覆准奉天滿合字號應試者頗衆其滿字號扵額取十名外再加一名共取十一名合字號扵額取六名外再増二名共取八名三年覆准盛京幅􅊷廣濶其滿合生員共一百十九名俱隷奉天府學實則諸生散處千里之内教官耳目所不能及即教誨所不能周既無従稽其課程又何能察其優劣嗣後移咨将軍衙門查明各該生居址撥相近之州學縣學月課季考報舉優劣責令該教官與本學民籍生員一體約束遇嵗考之年令該學申送府丞衙門考試一案發落其托故不到者遵例行學除名至出貢補廪補増按其名次准行至滿洲漢軍童生考試之前先令該将軍将各童生居址開明咨送府丞衙門以憑進學撥歸附近州縣等學永逺遵行又覆准奉天府學滿字號額設廪生六名五年一貢積三十年方能出貢實為淹滯改為三年一貢以示鼓勵雍正七年議定盛京滿合字號原額六名者加取六名四名者加取四名十三年恩詔増廣學額一次随扵乾隆元年議㝎奉天滿字號照中學例加取五名合字號照小學例加取三名乾隆四十三年奉上諭盛京為本朝根本重地兵丁皆知恪守舊風嫻騎射以裕武備現亦校閱分别賞賚其讀書之士亦漸摩文化蒸蒸日盛堪與畿甸比隆朕鑾輅所臨青衿獻詩趨迓絃誦彬彬具見膠庠樂育自宜一體加恩用彰作人盛典著将盛京滿合二號及奉天所屬各學科考廣額一次其向取進六名以上者増額三名四五名者増額二名三二名者増額一名該府丞其悉心校錄甄别殊尤副朕嘉恵士林至意四十八年九月奉上諭将盛京滿合二號及奉天所屬各學嵗考廣額一次謹案其廣額名數與四十三年同以上奉天府學生員駐防考試雍正十二年九月禮部議覆副都統塞布肯奏八旗外省駐防人等赴京考試只向該将軍城守尉告假並不携帶慿據隻身到京在本佐領下告禀咨部准考其間恐有混冒頂替之弊仰請嗣後如赴京考試者該将軍城守尉預先取具本人三代年貌造滿漢清冊聲明某旗某佐領下人出具保結咨送該旗再将該生之年貌註明出具印文給發本人親身投逓在京本旗本旗慿印文查對造冊報部考試則假冒頂替之弊自無矣奉㫖依議又議定各省駐防生監應順天鄉試禮部于正月行文各省駐防将軍副都統等處查明所屬應試人數詳細造具滿洲漢軍清冊備文分送在京各旗核實徑送順天學政及國子監錄科乾隆三年七月奉上諭昨據㕘領金珩奏稱八旗滿洲蒙古漢軍各省駐防官弁子弟離京稍逺應試維艱請嗣後科嵗兩試令該将軍考試馬歩箭即送附近府院考試酌量人數多寡以定去取等語朕思此事㫁不可行雍正十年間曽奉皇考諭㫖國家之設駐防弁兵原令其持戈荷㦸以備干城之選非令其攻習文墨與文人學士争名扵場屋也在弁兵之子弟有能讀書向學通曉文義者原聼其来京應試以廣進取之途並未嘗禁其從事文學今若悉准其在外考試則伊等各從其便競尚虚名而輕視武事必致騎射生疎操演怠忽将来更有何人充駐防之用乎况我聖祖仁皇帝臨御六十一年所有教養弁兵者至周至渥如果應行早已著為令典又何待今日之喋喋敷陳乎數年以来陳奏朕前者重見叠出不下百餘次其識見甚為庸鄙朕悉置之不論未曽降㫖申飭乃近日仍有不知而妄凟者是以特行宣諭以覺愚䝉欽此仰見我皇考睿慮周詳聖諭至為明晰朕臨御以来亦有以此陳奏者概未准行盖以滿洲䝉古漢軍在京者人數衆多就近考試原無碍于操演至各省駐防官弁子弟為數無㡬若科嵗考時不必来京就近在外應試不但事有難行且必競尚虚名荒廢騎射殊失設立駐防之本意背謬已極金珩身為㕘領乃煌煌聖諭豈竟毫無見聞而復混行凟奏著嚴行申飭並将此㫖宣諭中外臣工嗣後不得以此謬論再行妄凟以上駐防考試八旗武生康熙四十八年十月奉上諭朕觀八旗漢軍人等用扵文職者多而用扵武職者少嗣後武鄉㑹試亦著八旗漢軍人等考試所増額數不過數名可以收健勇人材之用扵武科甚為有益尋議八旗漢軍包衣素蒙聖訓嫻習弓馬者多嗣後八旗漢軍包衣無品級筆帖式烏林人由官學生補授之外郎閑散人等有願考試武生者該旗開具姓名移送順天府照例考取武生八十名鄉試時将所取武生并中書及部院衙門六品七品八品筆帖式不論已上朝未上朝廕生監生以及監生之披甲䕶軍領催拜唐阿有願應武鄉試者該旗亦開列姓名移送順天府與武生一體鄉試取中武舉四十名如不中式者仍令當差㑹試取中武進士八名俱照文場格式另編合字號奉㫖依議雍正元年正月奉㫖八旗滿洲照常考試漢文秀才舉人進士外至扵繙譯技勇亦屬𦂳要應将滿洲人等考取繙譯秀才舉人進士併武秀才舉人進士著總理事務王大臣㑹同該部将作何考試額數多少之處定議具奏尋議八旗滿洲人等亦照漢軍例考取武生四十名舉人二十名進士四名其内場另編滿字號照例考試至殿試亦照例舉行奉㫖依議四年裁汰武學漢武生屬之儒學八旗武生屬之滿洲儒學十二年四月奉㫖停止八旗滿洲考試武場以上八旗武生欽定八旗通志卷一百
