body:
  text: 欽定四庫全書欽定八旗通志卷九十九學校志六順天府學生員順治八年三月吏部言旗下子弟率多英才可備循良之選但學校未興制科未行耳先帝在盛京愛養人才開科已有成例今日正當舉行臣等酌議滿洲蒙古漢軍各旗子弟有通文藝者提學御史考試取入順天府學鄉試作文一篇會試作文二篇優者準其中式照甲第除授官職則人知向學進取有階矣詔從所請是年題準滿洲蒙古漢軍子弟歸順天府考試共取生員三百名滿洲一百二十名蒙古六十名漢軍一百二十名其滿洲蒙古子弟令內院禮部會同考試通滿漢文者翻譯漢字文一篇通滿文者作滿文字一篇漢軍子弟令順天學院考試與民童一體出題九年題準漢軍考取廩膳生員二十名增廣生員二十名不論旗分聽學院考取歸併順天府學照例每嵗出貢二名其漢軍廪生俱有圈撥地畝不給廩餼十三年題準減定考取生員名數滿洲八十名蒙古四十名漢軍一百名十四年諭停止八旗考試康熙六年題準八旗有願作漢文考試者各都統開送禮部移送順天學院以滿洲蒙古另編一號漢軍與漢人同場考試文優者即入順天府漢生員額數內九年題準八旗滿洲蒙古取生員四十名漢軍取生員四十名又題準滿洲蒙古漢軍應試者照漢童生例禮部轉劄順天府府丞先行録取移送學院考試十年議準漢軍照舊例出貢滿洲蒙古既作漢文一體考試亦照漢軍例設廪生二十名增生二十名每年出貢二名又議準八旗新舊生員內通行選拔文行兼優者滿洲蒙古起送二名漢軍起送二名入監肄業互見國子監十二年題準八旗照漢人生童嵗科兩考例一體考試十五年十月議政王大臣疏言朝廷定鼎以來雖文武並用然八旗子弟尤以武備為急恐専心習文以致武備懈弛今值用武之際若令八旗子弟仍與漢人一體考試必偏尚讀書有誤訓練現今將每佐領下一人在監肄業已自足用除現在生員舉人進士録用外嗣後請將旗人考試生員舉人進士暫令停止詔從之二十六年恩詔八旗準同漢人一體考試遵旨議定滿洲蒙古照舊例取生員四十名漢軍減二十名二十八年三月兵科給事中能泰疏請考取滿洲生員宜試騎射諭曰騎射本無礙學問考取舉人進士亦令騎射倘將不堪者取中監箭官及中式人一併治罪是年定滿洲蒙古生員設廪生二十名增生二十名每年出貢二名漢軍生員設廩生十名增生十名每年出貢一名三十三年題準八旗滿洲蒙古原額取生員四十名今將鑲黃等三旗內府滿洲佐領管領并五旗王府內滿洲佐領俱歸併八旗滿洲蒙古考試應將八旗滿洲蒙古生員量增二十名共取進六十名又八旗漢軍原額取生員二十名今將鑲黃等三旗內府漢佐領并五旗王府內漢佐領俱歸併八旗漢軍考試應將八旗漢軍生員量增十名共取進三十名六十一年奉恩詔直省儒學增廣學額一次大學加取七名中學加取五名小學加取三名隨於次年議定滿洲蒙古照兩大學加取十四名漢軍照一大學加取七名雍正元年正月奉上諭八旗舉人生員內有在護軍執事人行走者俱著退回若係生員給與二兩錢糧米石係舉人給與三兩錢糧米石令伊等得以讀書二年覆準八旗秀才特恩給與錢糧飬贍讀書若無考校恐或怠於誦讀令該旗都統於嵗考前將領錢糧秀才備造清册咨部轉送學政照考漢秀才例嚴加校閲考居前等者照常給領居四等以下者停其給發遇下次考居一等二等三等照漢廩生開復例仍給原領錢糧如四等不願再考即將學册除名聽其復歸護軍驍騎當差是年八月提督順天學政吳襄奏言滿洲蒙古漢軍生員科嵗兩試理應遵例赴考查厯年考册生員嵗考者不及十分之一其不赴科考者該教官概以考試載入册內仰請敕下八旗都統嗣後遇嵗科兩試之期交各佐領務將生員催令赴試如有患病等實情令預行呈明該教官轉為詳報無故不赴試者即行禠革其駐防别省官兵之子弟亦令造册詳報照例補考再入旗漢軍武生亦多不赴嵗考嗣後除隨往外省駐防者該教官造册報名外其在京之武生務令赴試如有患病亦令據實呈報有擅行規避不考者照例革退至生員年老有疾者照漢生員例告休給衣頂注册其武生亦照此例舉行再直省廩增額數府學四十州學三十縣學二十順天府學因兼大宛二縣廪增各八十今八旗滿蒙廩增各二十名漢軍廪增各十名八旗入學額數倍多於外府州縣而廪增額數不但少於順天並且不及外府州縣人多額少似屬不均請照漢生員例斟酌增補禮部兵部議覆俱如所請其廩增之額應於原額外滿洲蒙古各加四十名共各六十名漢軍各加二十名共各三十名奉旨依議四年六月吏部議奏八旗生員雖屬順天府教授管轄但漢教授並不將旗下生員與漢生員一例教訓考試則生員等何以知所勸懲請於順天府學添設滿教授一員訓𨗳一員禮部由滿洲進士舉人貢生內考試擇其文理優通者擬定正陪咨送臣部帶領引見補授係進士舉人以為教授係副榜貢生以為訓𨗳令其每月考試文章兼考騎射如生員內有文理不通行止不端者令教授詳學臣革退如教授等有懶惰溺職者令學臣順天府府丞題參奉旨依議謹案是年以正紅旗滿洲副榜貢生洪德元為教授鑲白旗滿洲副榜貢生海齡為訓𨗳洪德元恭國家紀本末勒石學宫文曰飭培養之法超越厯代宇建立學宫宏奬士類訓內讀書敦行之士彬彬雅雅儲才以待用者不可勝紀我皇上御極之初即拜行釋奠禮躬詣太學降輦趨命司成講學諸生圜橋門而聽者數千人蓋八旗多士半聖心於人材最重故典禮為獨優也臣竊惟出於功勳之子弟而肄業又兼騎射文章故從前秉鐸者往往不能董率然考諸周禮師氏之職凡國之貴遊子弟學焉又大胥之職春合諸學秋合諸射以考其藝而進退之王制曰習射上功習鄉尚齒射義曰諸侯歲獻貢士於天子天子試之於射宫後世教士之法寖以文重而古制不講久矣夫元老可為師中之文人侍從可為疆圉之扞禦井田可寓營陳樽俎可以折衝安在志正體直之道非學宫所當習而勳舊之裔不可以詩書羽籥造就之以成其材歟方今聖天子鼓舞作人之化視滿漢為一體文治光華遍於六合當兹特設滿洲儒學德元等首膺董教之任敢不欽承之法每睿慮殫心竭力使多士遵循砥礪乎今酌定考課月課文於貢院較射於太學文非徒操觚為立言立德之本射不惟中的有比禮比樂之方既以涵養其內復以整束其外俾學業日富品行日端異時為鹽梅立勳伐皆基於此夫聖天子興賢建學之至意千萬世率由無斁是宜勒石以垂後且使多士於藏修遊息之地肅然若有所觀法而不敢視為故事將必交相勸勉而人材輩出然則帝澤之霑被寧有涯涘哉五年三月奉上諭士子讀書應試須專心講習方可望其成就八旗舉人生員內在護軍執事行走者朕念其用度艱難恐致紛心是以於雍正元年特加殊恩令其退回仍賞給錢糧養贍俾得專心讀書勉勵上進庶國家可收得人之益今已三年有餘其中或有年力衰邁及不肖之人徒領錢糧無志上進虛糜國帑者亦未可知若不加考課分别勤惰無以鼓勵人材著查弼納查郎阿於會試後將八旗滿洲蒙古舉人生員漢軍舉人查明人數請題考試其考試官將應行開列人員請旨派出分别等第並驗其人品優劣具奏七年八月都統朱之璉奏言竊查外省考取童生定例皆從縣考府考方送院考至於旗下考取童生向來參領佐領無考取之例只據本人所具之呈轉呈都統咨送學院此內有文理不通不能完卷者或托人頂名代考或夾帶文章入場情弊多端積久難除臣請嗣後凡旗下考送童生亦照外省考試之例先於本佐領考取送本管參領該參領考取轉呈本旗都統咨送學院俟入場之日各佐領率領領催送考合同點名搜檢入場以杜頂名代考夾帶等弊或有不法之徒仍前作弊參佐領不行查出一併治罪庶積弊可以永除矣奉旨所奏甚屬可嘉著照所請行九月禮部議覆都統德成奏八旗遇考試文生員舉人進士之時俱令射馬步箭此係大典攸關既定有考試日期其咨取名册之處亦不可不定以期限請嗣後禮部於四個月以前行文該旗咨取考試人等名册該旗於部文到日即將姓名年貌清查造册於兩月以前送至禮部禮部即會同兵部將應試人等之旗分姓名年貌明白查對若該旗故意遲延逾限者禮部即據實參奏若係該旗遺漏錯誤者監箭大臣查明參奏其遺漏之人仍令考試等語應如所請施行再查科考之年學臣於六七月間始行考取生員於八月即入場鄉試為日無多不可拘定四月兩月之限應於科考後該旗作速造册送部轉送兵部考試馬步箭又奏稱內府莊頭子弟係莊屯居住者臨考之際參領不能認識恐不無代考之弊等語亦應如所請嗣後遇考箭及入場考試之時每旗添參領一員令每佐領管領下之領催等將考試之人帶往參領前認識驗看再將派出之參領領催等職名及考試人等名册同送禮部禮兵二部查對時亦將伊等傳往公同查對俾不得遺漏錯誤射畢入場之時亦令原派出之參領領催等驗看送入若派出之員有不到者該部即行題參又奏稱向例未至十五嵗之人俱不令射馬箭惟射步箭等語亦應如所請倘有嫻習馬射之人情願射馬箭者亦準考試馬箭可也奉旨依議十年七月內閣中書常鈞奏言嗣後八旗將考童生之時請令該旗先期申請本都統知會翰詹衙門派科甲出身滿洲官一員會同佐領參領面同考試既可以稽其頂冒之弊又可以别其文藝之優劣經吏部議準奉旨依議十三年六月順天府府丞周紹龍奏言伏查直省州縣嵗科考取童生例由各學廪生出具保結方準録送學臣該廪生當堂識認以杜頂冒等弊遵行已久惟八旗童生例由八旗都統考送臣接禮部劄付方準府考録送學臣每逢嵗科兩試各旗只派章京一員識認每旗童生不下百十餘名其中旗分與管領佐領所轄不一章京一員臨時倉卒安能一一詳審且因循已久八旗內章京亦有不到者臣甫經到任留心體察府試該童是否名册的身臣實無憑稽查就中讀書向上者固不乏人而希圖幸進頂替之弊恐亦難保必無以臣愚見各該童生報名旗考照漢學例取具本旗廪生認結都統將名册一齊送部臣及學臣考試時令滿學教官二員帶領各廪生當堂識認倘有頂替將廪生一體治罪現今旗考已過臣府試與學臣録科俱已屆期伏祈皇上諭令八旗都統補取各該廩生認結限十日齊備送至禮部臣接準禮部劄付考試廩生當堂識認似屬妥協是旗考時厯經各旗參佐領保送臣與學臣考試又有各旗廪生認結則弊竇可以肅清於八旗人才實有禆益矣奉旨所奏是著照所奏行乾隆九年八月奉上諭國家賓興大典原欲得品行端方文學優贍之人以為朝廷有用之材成菁莪棫朴之治無如科場中易藏弊竇我皇考加意整頓數科以來內簾之關節已覺肅清而外簾夾帶等弊一時難除近則日益加甚朕早已聞知屢行申飭至再至三並非不教而罰也今當鄉試之年又復先期告誡以為若輩自謹遵功令痛自悛改矣乃昨日頭場點名朕命親近大臣數人前往監視竟搜出懷挾二十一人或藏於衣帽或藏於器具且有藏於褻衣禈袴中者其喪心無恥至於此極朝廷之取士蓋欲用之也既欲用之朕安肯不重待之乃朕欲重待之而若輩自輕自賤若此以稱先法古之徒竟同鼠竊狗偷之輩冥頑不靈不可化誨若不立法嚴查則諸弊何由而除真才何由而見若欲擇人而施又何從預知其情弊之有無而為之區别乎滿洲原有呈身之路弓馬技藝何者不可見長而必勉強於文場以思僥幸於萬一既欲讀書取進則當潛心於學恥為穿窬至於江浙之人未必不能作文而乃存弋獲之心為茍且之計以致惡習相沿視為泛常違條觸法而不知虧體辱親而不顧士習日壞風俗日漓朕於執法之際實惻怛哀矜而深以不能化𨗳抱愧於心也查懷挾生員內同陵泰乃少詹事仙保之子生員圖敏乃原任禮部郎中穆臣之子伊等平日既不能教訓其子又復縱容犯法咎亦何辭科場懷挾原有處分父師之例兹特申明其令仙保穆臣俱著交部嚴加議處嗣後倘有犯者將父師一併查究今年懷挾如許之多而從前各科悉皆朦混了事著將乾隆元年以後監試之御史除內簾外俱交部查出議處三十二年二月奉上諭御史湯世昌參奏學政莊存與考試滿洲蒙古童生因不能傳遞擁擠閙堂一案朕以滿洲蒙古童生皆世受豢養之人乃不知遵奉教約恣效外省惡習此於八旗風俗大有關係不可不嚴行跟究始意亦不過欲究明情節將為首者發巴里坤為從者發拉林種地以示懲創乃派出查審之大臣於案內情事並未嚴行窮究而擬罪之處又不允當所審皆旗人故不能不掣肘而朕豈肯一任其意存瞻徇顢頇了事耶當經親臨覆試隨獲夾帶如許之多因復親加鞫訊務得情實而童生海成係包攬傳遞首先倡議閙場之犯一聞覆試輒將閙場時帶出之卷倩人補作揑飾投遞希圖狡脫已屬刁頑至在場放鴿傳遞包攬受賄各情業經羅保等供證確鑿乃於朕前又復挾仇誣陷和安肆其狡獪抗不吐實及加嚴訊而狂悖無禮竟有何不殺了之語滿洲世僕中有此等敗類斷不可留矣因降旨將伊正法其附和閙場之羅保和安併搜出懷挾又復強辨之納拉善俱著發往拉林種地至隨從閙場及夾帶草稿字片之烏爾希蘇等四十人本應如議發遣但既經責訓示懲俱從寬令其在旗披甲永逺不準考試滿學教授旺衍係專管伊等之人臨時既不能約束而大臣等詢問伊尚模稜含糊不肯吐實著發往熱河披甲滿洲風俗從來淳朴八旗子弟務以學習國語專精騎射為事即欲學習漢文亦當潛心誦讀量力應考若自揣不能成文而徒以傳遞懷挾妄兾僥幸功名是方其學習漢文時已視為玩法舞弊之具人品心術尚可問耶即如正黃旗童生廷瑞年甫十嵗前經朕親試觀其氣質將來未始不可當差效力乃為之祖父者不思𨗳之以正轉令入場傳卷而所延館師江寧人胡君治又代為作文託人傳進此外如海成倩作文字之莊煥等俱以南省之人在京潛住誘人子弟以飽囊槖此輩文本平庸在原籍既不能自取科第又不能為鎗手作弊而代旗童幸中則固屬遊刃有餘骩法網利蠧害人心尤屬不淺應審明按律重擬以絶根株今旗童閙場本案已經審明完結以後滿洲蒙古現任三品以上大臣之子孫及親兄弟子姪有應試者俱令自行奏聞必國語騎射皆有可觀方準入場考試並照鄉試之例請派監試御史及監場都統各員前往彈壓此次莊存與所録尚屬秉公而交卷之人非閙場之人可知著加恩仍準作生員再京城旗童考試既多沿習騖名則盛京應試亦可概見著交該將軍禮部侍郎及府丞詳悉定議具奏向有不識事體者往往以各省駐防子弟應隨地準令赴考以博樂育人才之名所見尤為乖謬斷不可行使朕亦姑息從之則其為弊將必甚於輦轂之近豈可勝言耶嗣後考試毋得濫行録送著酌量人數核實取録以昭慎重其臨試時並著遵照條例嚴立關防審擇考校從此陋習可除而各該學政亦得從容閲卷不致魚目混珠之弊其於學校甚為有益著將此通行曉諭知之二十四年七月奉上諭據禮部奏請八旗現任三品以上大臣子孫及親兄弟之子可否令其入場鄉試一摺甚屬有意朦混前因八旗童生入場滋事風尚澆漓在平日既不專務八旗淳朴舊俗而徒博取虛名且流為舞弊惡習不得不力為整頓是以令伊等自行奏明必其國語騎射皆有可觀方準考試童生如此鄉試又何待言乃立法伊始而本人並不自奏即册送禮部禮部亦即含糊具請希圖僥幸是誠何心若謂前旨專屬童生而言則生員已經考試童生且不具論其貢監一途人人可捐若不須陳奏是童生不得應小試轉可避而應鄉試矣有是理耶其中係何情由著即明白回奏仍將册內開送應考十餘人之父兄一一查明具奏併令在京總理事務王大臣傳齊伊等令看此旨皆令其自行明白面奏朕法在必行毋謂小小伎倆可以嘗試也又奉上諭上年降旨令八旗三品以上大臣有子弟應試者自行奏明方準入闈特因旗童在場喧閧滋事是以為伊父兄示之節制俾知崇實黜浮破除積習非槩從禁制遏其進取之途也乃今年鄉試屆期伊等既不遵旨自奏禮部又為含糊具請似此巧為嘗試將使故智益萌伊于胡底我八旗淳朴素風嫻國語習騎射其人果有足録均可量能擢用若科目者特備儲材一格耳今乃艷心詭遇又從而釣弋其名淵藪其弊是以國家啓迪後生之途轉為蠧壞人材之具可乎且我朝開國以來名臣碩輔莫不志秉忠忱才優韜略初非從事占畢者即仕躋大僚內而大學士尚書外而總督巡撫勳名氣節指不勝屈大約皆出於甲乙兩榜即近時大臣在科第中有名者不過如鄂爾泰尹繼善一二人而已然其見用實以其心地材幹初不以其文也其他幸列科名而名實不副者亦指不勝屈若奉寬國柱者流以滿洲本色論之皆不能至驍騎者而乃託名斯文平日又不肯潛心力學惟事希心襲取視為功名捷徑甚至懷挾夾帶無弊不作即立法嚴行搜檢而所派大臣非親即故俗稱官官相護亦復有名無實此所關於風俗人心者甚巨朕安得不力為振刷以挽頽風伊等至此尚不思痛自湔改一似竄身入闈即可僥幸萬一勢必欲朕盡停旗人鄉會試而後已乎所有禮部單開不循例自奏遽任子弟册送考試之尹繼善等著將該部及該旗曽否抄録前旨行知伊等之處令該部旗及本人明白回奏再行降旨至僧保住傅巖乃係內務府人員進身豈患無階而亦令子弟騖名科舉又顯違旨不奏尤為庸妄著將僧保住傅巖革職并將伊子弟革去生監在內務府庫使筆帖式上效力行走不準給俸俟五年無過該管官奏明另請挑差其朦混奏請之禮部堂官伍齡安等著交部嚴察議奏是月又奉上諭今嵗鄉試屆期三品以上大臣子弟有未經遵例陳奏遽行送考者經朕降旨令該旗及本人明白回奏今據鑲黃正白正紅鑲藍滿洲正藍滿洲蒙古等六旗覆奏以現在送考之人其父兄或在軍前或係外任俱未在京等語去嵗此旨雖經行文然如永貴等現在軍營辦事無論伊等子弟在京應試與否無由而知即知之亦何暇陳奏此在該旗本應奏聞若外省督撫安居無事先期自行陳奏為是然伊等並未令子弟往考則不奏亦未為過而該旗何以仍將名册咨送禮部是該旗明係瞻徇而又執例推諉均與不奏之本人無涉前已將朦混請旨之禮部堂官交部嚴議所有瞻徇推諉之管旗王大臣著一併交部嚴行察議并將此通行曉諭八旗知之三十年正月奉上諭前經降旨八旗三品以上大臣子弟果有嫻熟國語練習弓馬者遇考試之期該父兄自行奏明準其入闈原因八旗淳朴素風近來未免沾染虛浮艷心詭遇且從而釣弋其名淵藪其弊是以示之節制俾知崇實黜華非概從禁制遏其進取之途也乃邇年八旗大臣竟無奏請子弟應試者未免多生顧慮因噎廢食伊等既不潛心力學而於國語騎射又未見專功嫻習頓覺出色自不如兼收並進猶可為造就之資也我國家滿洲世臣宣力贊政者多原不藉文章一途但承平百餘年滿洲詞臣文藻黻飾亦不可少大臣子弟中果能於國語騎射之外兼習文藝在伊等延請師資擴充聞見較之寒素之家成材自易嗣後所有八旗大臣子弟仍準一體考試無庸奏明請旨倘伊等仍不以實學就考如前懷挾或進身之後仍蹈虛浮陋習托名斯文無禆實用朕又何難隨時懲治俾知所警惕乎可將此通諭知之四十年二月奉上諭據驗看舉人騎射之王大臣等奏稱應行考試者一百二十五人內報近視眼者七十三人已揀令二十人照常騎射外其餘實屬不能之五十三人俱未令其騎射等語馬步騎射係旗人根本即讀書人亦不可不學今考試者一百二十餘人內報近視眼者竟有七十餘人之多明係揑報希圖規避滿洲習氣竟至若此實堪憤恨若以近視眼不能騎射哈達哈即係近視眼此衆人之所共知伊何以隨朕畋獵打牲乎此輩因不能騎射遂藉口以圖僥幸甚屬不堪滿洲臣僕甚衆豈必賴此數人所有不能騎射之五十三人俱著停其考試豐納亨等並未奏及惟請嗣後交該旗大臣詳查報部派出大臣驗明後方準免其騎射所奏殊屬姑息嗣後考試人內若有似此不能騎射者俱著停其考試著為例以上順天府學生員欽定八旗通志卷九十九
