body:
  text: 欽定四庫全書欽定八旗通志卷一百十五營建志四京城營建規制四八旗學舍八旗學舍順治十年四月工部尚書臣劉昌等議覆工科愛惜喇庫哈畨散多題準各旗設立宗學以昭皇恩玉成宗室之至意其設立書院之處該臣等偹查會典開載親王册封外藩工部題眀遣官營造府第內有書院一所其郡王宗室以下止各給房價聽其自造今議親王以下宗室建立宗學或臣部酌量給與工價或令其自行建造統候聖裁奉諭旨建立宗學著量給工價聽其自行修造雍正二年奉上諭宗室學房左右二翼著各立一所左翼給房一百三間右翼給房九十二間是年五月工部議覆準禮部文開宗室讀書之處應於公所設立學堂二所其八旗分左右翼每翼各於公所設立學堂二所其學堂於兩翼現有官房內令該管處奏聞撥給六所交工部修理書桌椅凳等項亦交工部置辦奉旨依議行文該管處奏聞撥給學房行文到部之日有修理之處派員修理其書桌椅凳等項照依來文辦送多羅順承郡王等題稱所立宗學房屋臣等親身閲看將應修之處臣衙門派官料估領請工部錢糧修理將所用錢糧核算題銷等因奉旨依議左翼宗學坐落東四牌樓燈市口東史家胡同西口雍正二年初設房八十八間十二年果親王奏交工部修理乾隆十八年修理拆去房十九間三十六年諴親王奏明動撥宗人府年例恩賞庫銀兩交本學會同宗人府衙門司員修理添蓋房二間現共房六十四間右翼宗學於雍正三年初設在西單牌樓北口石虎胡同共房八十八間乾隆十九年移設於絨線胡同內板槗迤東共房三十六間二十八年簡勤親王奏準交內務府修理以上八旗宗學房舍雍正七年上諭八旗內覺羅佐領或有或無向未畫一今既將下五旗覺羅佐領由各該王屬下撤出作為公中佐領朕意均派八旗方為妥協前者宗人府設立宗學祗令教習宗室尚未及於覺羅覺羅人衆今若一概歸併宗學教習者勢難遍及應每旗各立一衙門管轄覺羅或王或公派委一員統理令其於各該旗覺羅內揀選老成練逹品行端方者一二人分管即於該旗衙門之旁設立一學除情願在家學習者外擇其可教之人令其讀書學射滿漢兼習所派出之管轄人員不時訓誨稽察如內有行止不端不知守法安分者即回眀宗人府王等令在該旗衙門居住學習禁止出門俟其改行遷善之後再回眀宗人府王等始許出門年底彚疏具題如此則於覺羅少年子弟大有禆益而人人皆可成就著宗人府王公等會同滿洲大學士六部尚書詳悉議奏特諭是年十二月宗人府王公滿洲大學士六部尚書等議覆我皇上御極以來睦族敦宗教飬備至俯念覺羅等雖世系稍逺亦出自天潢是以由該王屬下撤出置之公中佐領兹又特命將七旗所有之覺羅佐領均之於八旗每旗各設一學令其讀書得以成就恩德之隆實為偹至查七旗所有覺羅佐領共三十二分鑲黃旗七分正黃旗五分正白旗無有正紅旗七分鑲白旗五分鑲紅旗四分正藍旗二分鑲藍旗二分今應就便視其可移者每旗置為覺羅佐領四分將鑲黃旗七佐領內之佛保永昌阿堵鑲白旗之海蘭此四佐領移置正白旗正藍旗惟有覺羅佐領二分將鑲藍旗之永祿同保住此二佐領移置正藍旗共成四分將正黃旗之東武立正紅旗之得進圖爾得黑馬喇熙此四佐領移置鑲藍旗再八旗各擇官房一所立為衙署旁設清漢各一學八旗覺羅內自八嵗以上十八嵗以下子弟俱令入學讀書其中有情願在家讀書者聽其自便其入官學讀書者清漢隨其所願而教之如十八嵗以上已曽讀書而又願入學讀書者亦準其入學至十八嵗以上未曽讀書者不可竟無教訓於每月朔望傳集該旗公署宣􅊰聖諭廣訓總管一旗覺羅等之王公由宗人府將王公等職名開列奏請欽點每旗派覺羅二人以為督教之長即交委出之王公等會同宗人府王公等務擇其能管轄人去得者挑取由各部院現任筆帖式內擇其人老成能翻譯者㨂選八人每旗各分一人教授清書由禮部揀選教習八人每旗各分一人教授漢書再行文兵部將現在十五善射或已退之十五善射內無論官兵揀選八人每旗各分一人令其教射於學舍院內修一習射之地令覺羅等於誦讀之暇兼以習射所選督教之長十六人令其每日在學行走讀書之覺羅等有怠惰不學者各學之長即嚴加訓飭若不悛改即回明該旗管轄之王公等嚴加訓責如有甚劣者報知宗人府拘於本旗衙署內教訓不準出外行走即不讀書之覺羅內有行為妄亂者亦拘於衙署之中教訓不準出外行走俟痛加悛改之時告知宗人府始行放出由宗人府彚集奏聞再讀書之覺羅等若不時加考課則優劣不分無以懲勸令該管之王公等於每年春秋二季親身考驗分别等第報知宗人府登記檔案如所學之書及騎射俱優者奏聞引見擢用則劣者自知黽勉效法各加奮勵而學業可成矣至讀書之覺羅及督教人等每月各給公費銀二兩其米石紙筆墨氷炭等物俱照宗學之例行文各該部領取教清書之筆帖式教漢書之教習等亦照宗學之例教習三十六個月期滿行文吏部照例補用如懶惰不勤者咨送該部革其職銜如有多教三年者將其多教三年之處一併咨部議敘再各學之覺羅有進文生員及翻譯生員至四人者將教清漢書之教習等亦交該部議敘其教射之人亦照筆帖式給與公費其衙署學舍著各該旗揀擇足用之官房一所委員會同派出之覺羅學長估計領取官房租銀修理報部核銷再每旗挑馬甲各二名以為傳事之用覺羅等讀書五年如果成就多人著宗人府詳查奏聞將該管之王公議敘派出之學長等如果勤慎教導令該王公等報知宗人府另行保奏教射之人俟過五年交各該旗於伊等應升之缺即用如怠惰不勤即參奏治罪如此則教習人等各得勤於訓導而讀書之覺羅等學業可成矣奏入奉旨依議鑲黃旗覺羅學係官房一所共五十一間坐落安定門大街香兒胡同雍正十年八月建設正黃旗覺羅學係官房一所共六十一間坐落西直門內北衛胡同雍正十年八月建設正白旗覺羅學係官房一所共四十五間半坐落朝陽門內南小街新鮮胡同雍正十年八月建設鑲白旗覺羅學係官房一所共三十二間坐落東四牌樓大街路東十條胡同雍正十年八月建設正紅旗覺羅學係官房一所共五十五間坐落阜成門朝天宫內中廊下雍正十年八月建設鑲紅旗覺羅學係官房一所共四十三間坐落宣武門內象房槗西承恩寺街雍正十年八月建設正藍旗覺羅學係官房一所共五十三間坐落王府大街路西阮府胡同雍正十年八月建設鑲藍旗覺羅學係官房一所共四十五間坐落阜成門南玉帶胡同雍正十年八月建設以上八旗覺羅學舍雍正七年奉旨於咸安宫設立官學其咸安宫坐落夀康宫後長庚門內乾隆十六年恭逢皇太后六旬萬夀改建夀安宫將官學移於西華門內北邉共房二十二間其咸安宫咸安門匾額即移於官學大門懸挂乾隆二十五年復移於西華門內北邉器皿庫共房二十七間其舊官學改為衣庫其匾額仍在該處懸挂四十四年拆去房三間添蓋房七間以上咸安宫學舍康熙二十四年四月諭內務府今見內府佐領人員善射及讀書善文者甚少可専設學舍選可教之人令其學書習射優者録用劣者罷黜學舍應立於朕常見之處俾學習之人黽勉肄業二十五年奉聖諭於北上門兩傍所有官房三十間設立滿漢學房以上景山官學房舍順治元年十一月國子監祭酒李若琳疏言近奉諭旨滿洲官員子弟咸就學肄業而臣衙門僻在城東北隅諸子弟往返晷短途遙臣等議得滿洲八固山地方各覔空房一所立為書院將國學二廳六堂教官分教八旗子弟各旗下設學長四人俱就各旗書院居住朝夕誨迪臣等不時親詣稽察勤惰仍定於每月逢六日各師長率子弟同進衙門臣當堂考課以示懲勸下禮部議行二年題準滿洲子弟就學肄業分為四處康熙七年十月禮部尚書郝維訥等具題為咨請代題修理官學房事該臣等議得國子監呈稱鑲黃旗正白旗正紅旗官學房舍於今年大雨連綿俱行倒塌已經移咨工部覆稱係該旗自行修理本部無修官學房之例在案及移文該旗都統又稱應工部修理但八旗官學房原係部給肄業伏乞代題敕下該部修理以便官學生肄業等語查官學房係官學生肄業之處今據該監呈稱盡行倒塌工部雖從無動用錢糧修理之例但無學房恐於學業有悮相應請敕工部修理奉旨依議十年十一月工部尚書吳達禮等議覆國子監疏稱鑲白旗官學房三間俱被倒塌仰祈敕部照修造鑲黃旗正白旗正紅旗官學房之例修造以便官學生肄業等因查康熙七年十月內禮部具題鑲黃旗正白旗正紅旗倒塌官學房舍經臣部議準盡行倒塌房每間給錢一十五千其倒塌半邉並歪斜房每間給錢七千五百文交與該旗助教自行蓋造修理在案今鑲白旗官學房三間國子監既稱俱被倒塌應照例每間給錢一十五千共給錢四十五千交與該旗助教自行蓋造奉旨依議十一年正月工部尚書吳達禮等題準國子監鑲藍旗漢軍官學房廂房三間倒壞檩椽磚瓦等項俱已拆碎又滿洲官學房正房一間半漢軍官學房正房三間俱歪斜將塌照例給錢交與該旗助教自行修理奉旨依議十二年八月工部尚書吳達禮等具題為更换官學以便誦習事該臣等議得國子監祭酒宜昌阿等疏稱現在正白旗官學房舍倒塌查從前各旗官學俱撥在寺廟蓋造學房肄業今查正白旗地方演武場傍空廟一所可以蓋造學房將現在學房變價於空廟院內蓋造庶官學生肄業得所等因查得正白旗舊教場地方原有空廟一座臣部差官驗看正白旗官學倒塌房三間半其現在學房亦窄狹損壞難以肄業是實相應交與該旗助教等將現在學房變價在此廟內自行酌量蓋房肄業如錢糧不足臣部查核添給奉旨依議雍正五年十月康親王果郡王會同工部議覆國子監祭酒孫嘉淦條奏八旗設立官學內一條議得八旗學舍乃諸生誦習之所今每學止三四間一旗三學共十三四間不等實屬狹隘應將現今官學房交還各該旗查收每旗另給官房一所二十餘間量可容百人誦讀者著本旗修理俾諸生聚處其中則學舍寬適便於誦讀矣奉旨依議鑲黃旗官學坐落圓恩寺胡同內坐北向南共房三十七間正黃旗官學坐落西直門大街新街口公用庫地方共三十一間正白旗官學坐落東四牌樓南小街新鮮胡同內共房二十八間正紅旗官學坐落阜城門內巡捕廳胡同共房四十七間鑲白旗官學坐落東單牌樓象鼻子坑共房三十五間鑲紅旗官學坐落宣武門內頭髮胡同共房四十八間正藍旗官學坐落崇文門內單牌樓北街東新開路共房三十五間鑲藍旗官學坐落宣武門內乾石槗東口內共房四十間以上國子監八旗官學房舍世職幼官學係乾隆十八年設每翼學舍二處欽派大臣管理鑲黃旗正白旗同在安定門交道口共房二十八間鑲白旗正藍旗同在朝陽門內乾麵胡同共房三十二間鑲紅旗鑲藍旗同在宣武門內單牌樓北共房二十五間正黃旗正紅旗原設於阜城門內驢肉胡同乾隆二十六年因回子貝勒霍吉斯住房狹小將學房撥給居住移設本學於西直門內大街髙井胡同對過共房十五間以上幼官學舍雍正元年議準教場內蓋造八旗兵丁子弟學舍各五間七年正藍旗副都統正參領阿祿奏準設立各旗甲喇學舍教習本旗養育兵幼丁弓箭滿蒙話雍正十年上諭圓眀園兵丁朕從前未經細看此次朕往觀大閲細看沿途站立管道之圓眀園兵丁氣象較前甚優圓眀園之八旗及內府三旗賞給教習令伊等子弟學習漢書著果親王等議奏特諭是年四月果親王允禮等議覆八旗及內府三旗營房向因地勢建造故相隔逺近不一今蒙聖恩設立學舍當視營房之逺近建造查得鑲黃正黃正白鑲白此四旗營房相近應造學舍一所設教習二名正紅鑲紅此二旗營房相近應造學舍一所設教習一名正藍鑲藍此二旗營房相隔甚逺不便設立一學每旗各應造學舍一所各設教習一名其內府三旗既同一營房應造學舍一所設教習一名共造學舍五所挑取教習六名其教習於八旗及內府生員內擇其能訓誨者六名令為教習著四年一換每月給伊等錢糧二兩每年三季共給米二十一斛二斗其中如有善於教訓誠屬優等者咨行吏部即以茟帖式補用其平常者駁回該旗其教誨甚劣者將生員革退其缺另行挑取奏入奉旨依議鑲黃旗在安定門內共房二十五間正黃旗滿洲在十剎海北大槗北魏兒胡同羊房胡同四處共二十二間蒙古原在武王侯胡同共房七間半乾隆三十九年將馬圈四間改作學舍以舊學舍取租正白旗在朝陽門內南小街竹竿巷共房三十一間乾隆三十七年買置正紅旗滿洲蒙古在阜成門內西廊下共房二十五間漢軍在上岡地方共房十一間鑲白旗滿洲蒙古漢軍在東四牌樓構欄胡同計房十一間正藍旗在大方家胡同牛角灣西褲子胡同趙家樓五處共房十九間半鑲藍旗在西長安門草帽胡同共房九間健鋭營學舍乾隆四十年大學士忠勇公傅恆奏添派八旗官學教習八名其教習咨行吏部由翻譯生員監生內考取三年期滿教導有成咨行吏部入於議敘班以茟帖式補用五十年吏部奏準八旗官學教習現遺之缺勿用咨行吏部調取查禮部現有考取候補宗學覺羅學咸安宫學及國子監八旗官學各教習人數甚多應可調補俟三年期滿仍咨吏部入於議敘班內以筆帖式補用謹案此項官學俱未給房即由兵丁房內摘借設立雍正三年四月工部議覆禮部咨內務府文開遵奉恩詔設立八旗秀才童生學舍分為四處將安定門大街內官房十九間觀音寺胡同內官房二十間給與左翼作為學堂武定侯胡同內官房二十四間半兵部窪官房二十間給與右翼作為學堂六年十一月禮部為遵旨議奏事準鑲黃旗滿洲都統咨稱鑲紅旗滿洲都統兼理鑲藍旗三旗事務和碩果親王等謹奏該臣等會議得副都統韓光基條奏設立義學一疏欽惟我皇上敦崇文教以作養人才為重立學教誨誠造就童蒙之至意也今八旗入學讀書者每旗不過數人且有總不到學堂者皆因兩旗合立一學而兩旗之人俱在各處散居其住址甚逺之生童因遇寒天雨水是以行走維艱應如韓光基所奏將八旗現有之官房酌量足用者挑選四所添設學堂四處令八旗各立一學倘有隔旗居住情願就近入别旗學堂讀書者亦準其讀書如此則肄業諸生既無逺涉之勞而教習亦得盡心訓誨矣奉旨依議欽此欽遵行文各該旗查眀左右兩翼現在四處學堂指定某處為某旗學堂報部外再將各旗所有官房量其足用者各選擇一所添設學堂四處指明坐落分晰旗分以便移咨工部派員修理左翼四旗義學鑲黃旗義學安定門大街官房十九間正白旗義學豆腐巷官房二十一間半鑲白旗義學觀音寺胡同官房二十間正藍旗義學崇文門內小石槗官房十四間右翼四旗義學正黃旗義學西直門內毛角灣胡同官房九間半正紅旗義學武定侯胡同官房二十四間鑲紅旗義學兵部窪官房二十間鑲藍旗義學西長安門草帽胡同官房九間旨裁謹案八旗兩翼義學房舍乾隆二十七年奉汰以上八旗兵丁學舍欽定八旗通志卷一百十五
