領康熙十三年從征逆藩呉三桂陣亡恩賜雲騎尉世職承襲詳見世職表赫徳理赫徳理滿洲正藍旗人姓他塔喇氏世居扎庫木地方康熙十三年以佐領隨寧海將軍貝子富喇塔進兵台州擊偽将曾飬性於小梁山奮勇力戰殁于陣恩賜雲騎尉世職承襲詳見世職表烏納哈烏納哈滿洲正藍旗人姓馬佳氏世居寧古塔地方任䕶軍叅領署䕶軍統領康熙十三年從安西將軍都統赫業征逆藩呉三桂至四川率官兵迎餉於槐樹驛偽將呉之茂等以萬餘衆截道來刦烏納哈挺身禦戰殁於陣以孫呉爾襲職賞䘏如例艾音察艾音察滿洲正藍旗人姓呉雅氏父胡伸布禄陣亡自有傳初襲三等男世職康熙十三年從定逺平㓂大將軍安親王岳樂征逆藩呉三桂進至湖廣長沙府艾音察奮勇攻擊力戰陣亡賞䘏如例恩賜二等男世職承襲詳見封爵表巴爾喀巴爾喀滿洲正藍旂人任前鋒校康熙十三年隨大兵征逆藩呉三桂力戰陣亡賞䘏如例翰禇哈翰禇哈滿洲正藍旗人姓嵩佳氏世居董鄂地方康熙十三年以雲騎尉隨安西将軍都統赫業征逆藩呉三桂至陜西石門闗遇賊力戰陣亡恩賜騎都尉世職承襲詳見世職表鄂莫克圖鄂莫克圖滿洲正藍旗人姓𤓰勒佳氏世居哈逹國初來歸任䕶軍校康熙十三年從征福建海賊鄭成功力戰陣亡恩賜騎都尉世職承襲詳見世職表阿爾賽阿爾賽滿洲正藍旗人任雲騎尉康熙十三年八月初七日從征湖廣至香安縣飄鳯山遇賊戰歿恩賜騎都尉世職承襲詳見世職表瑚母西瑚母西滿洲正藍旗人任驍騎校駐防杭州康熙十三年隨副都統倭申巴圖魯擊偽将軍曾養性等于台州小梁山力戰歿於陣賞䘏如例托金托金滿洲正藍旗人由前鋒署䕶軍校康熙十三年七月十一日隨順承郡王勒爾錦征湖廣同多羅貝勒察鼐擊呉逆偽将呉英起廖進忠馬寳張國柱髙起龍等於岳州中礟陣亡賞䘏如例木成額木成額滿洲鑲藍旗人以恭領兼理兵部郎中事康熙十年從征湖廣至金水河遇賊力戰身負重傷卒賞䘏如例竒里布竒里布滿洲鑲藍旗人任恭領駐防西安康熙十三年十一月二十五日擊呉三桂於盤龍山陣亡賞䘏如例富和納富和納滿洲鑲藍旗人任䕶軍校康熙十三年三月初三日從征湖南擊賊於長沙陣亡賞䘏如例六八十六八十滿洲鑲藍旗人任前鋒校康熙十三年隨副都統祖良弼征四川賊将王屏藩等集衆犯保寧至蟠龍山六八十奮擊之遂以戰歿賞䘏如例回唐阿回唐阿滿洲鑲藍旗人委署䕶軍校康熙十三年從征呉逆十一月十六日由盤山回至娘娘廟遇賊力戰歿於陣賞䘏如例辛柱辛柱滿洲鑲藍旗人康熙十三年以五品官奉命遷呉三桂家口至貴州安順府三桂反提督李本深從逆為亂執辛柱脅之降不屈罵賊死賜祭塟恩賜騎都尉世職承襲詳見世職表凖退凖退滿洲鑲藍旗人姓卓佳氏世居汪欽地方于康熙十三年以防禦從安西将軍統領赫業征四川所部祇馬歩三百餘人遇賊于野狐嶺竪紅纛以誘吾師凖退知其有伏于山嶺内搜獲千餘人而賊伏兵遂四出迎戰悉敗之又破賊于平陽闗至朝天闗偽總兵石存禮領兵萬餘掘壕㫁隘口連營抗拒凖退率所部䧟陣克之進至蟠龍山偽将軍王屏藩等集兵合水陸迎戰凖退衝擊之被重創猶力戰不屈遂歿於陣恩賜騎都尉世職承襲詳見世職表禪拜禪拜滿洲鑲藍旗人以七品官委署恭領康熙十三年從寧海将軍富喇塔征耿逆至浙江擊偽将曾養性等于台州小梁山力戰歿于陣恩賜雲騎尉世職承襲詳見世職表竒里布竒里布滿洲鑲藍旗人任恭領駐防西安康熙十三年十一月二十五日擊逆藩呉三桂於盤龍山陣亡賞䘏如例薩齊渾薩齊渾滿洲鑲藍旗人姓何舍里氏世居哈逹任驍騎校康熙十三年從征逆藩呉三桂至陜西蟠龍山力戰歿恩賜雲騎尉世職承襲詳見世職表淮色淮色滿洲鑲藍旗人康熙十三年隨征逆藩呉三桂至陜西擊賊於蟠龍山力戰歿恩賜雲騎尉世職承襲詳見世職表欽定八旗通志卷二百十三
