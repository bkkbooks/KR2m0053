body:
  text: 欽定四庫全書欽定八旗通志卷二百十三人物志九十三忠義傳五滿洲八旗五十三年共一百十三人康熙二年至阿哈丹阿哈丹滿洲正黃旗人姓納蘭氏世居哈逹祖雅虎事太祖髙皇帝初設十札爾固齊雅虎其一也屢征諸部有功其長子曰滿逹爾漢天聰八年從征大同以攻王家庒功授佐領世職順治三年初設六部擢滿逹爾漢禮部承政其後加世職至二等輕車都尉卒子阿哈丹襲康熙元年隨征福建海冦二年大兵進取兩島阿哈丹於厦門力戰陳亡加恩賜三等男世職承襲詳見封爵表何特赫何特赫滿洲鑲白旗人父喀爾他喇從征湖南陳亡自有傳康熙二年正月以世職三等男隨將軍逹賽征海賊鄭成功與偽提督偽總兵凡六戰俱敗之進攻厦門追賊至蓋峙山力戰陳亡加贈騎都尉以其兄赫舍襲世職之三等男以其弟格爾德襲恩賜三等子世職承襲詳見封爵表科普蘇科普蘇滿洲鑲紅旗人姓納蘭氏世居葉赫父和托以功至一等輕車都尉加一雲騎尉病卒科普蘇襲父職覃恩加二等男康熙三年隨靖西將軍穆里瑪定西將軍圖海征湖廣茅麓山賊歿於陳賜祭葬如例議恤恩贈一等男兼一雲騎尉世職承襲詳見世職表富和申富和申滿洲鑲紅旗人委署護軍校康熙三年從征山冦李來亨於湖廣至彛陵戰歿賞恤如例特穆德特穆德滿洲鑲紅旗人委署護軍校康熙三年隨定西將軍圖海征湖廣擊賊李來亨於茅麓山陳亡賞恤如例覺羅阿鼐覺羅阿鼐滿洲鑲黃旗人康熙十二年以護軍校隨征南大將軍賴塔征逆孽吳世璠擊賊於歸化寺陳亡賞恤如例雅圖雅圖滿洲正黃旗人姓伊拉里氏世居赫石地方以筆帖式隨總督甘文焜至雲南康熙十二年十二月逆藩吳三桂反文焜赴鎮逺雅圖與何善俱偕行比至知守將江義已從賊文焜死雅圖殉焉恩賜雲騎尉世職承襲詳見世職表何善何善滿洲人旗分未詳任筆帖式康熙十二年十二月初八日逆藩吳三桂反何善隨總督甘文焜赴鎮逺比至知守將江義已從賊文焜自剄何善與雅圖同死之賞恤如例邁蘭邁蘭滿洲鑲黃旗人姓博爾濟吉特氏世居阿爾逹額爾蘇地方父巴爾巴圖魯蒙古察哈爾貝勒也邁蘭以護軍參領於康熙十三年從定西將軍圖海征湖廣賊渠李來亨據茅麓山聚衆千餘拒敵邁蘭率本旗兵隨大兵進攻敗之十三年逆藩耿精忠叛于福建邁蘭隨定南將軍希爾根由江西往征九月偽都督易天錫犯撫州府邁蘭率本旗兵擊敗之賊遁走時有賊自建昌府來助與撫州府賊兩路夾攻我師邁蘭復擊敗之偽都督楊益茂率六萬餘衆拒戰于七里岡又敗之又敗賊周福洪等三千餘人于界牌鋪之北山賊復領馬步兵萬餘據景德鎮又擊敗之至沉香山被賊首程鳯率七千餘衆拒戰邁蘭力戰陳亡恩賜雲騎尉世職承襲詳見世職表默爾庫勒默爾庫勒滿洲鑲黃旗人姓阿蘇里氏世居薩哈連烏喇地方康熙十三年以駐防江寧驍騎校隨都統尼雅哈征逆藩吳三桂七月在湖廣嶽州擊賊陳亡恩賜雲騎尉世職承襲詳見世職表多博多博滿洲鑲黃旗人姓寧古塔氏世居寧古塔地方初任佐領康熙十三年耿精忠叛犯江西破建昌多博隨定南將軍希爾根進征之九月至撫州府之鍾家嶺偽都督易天錫率馬步兵四萬餘來犯多博奮勇擊之中炮歿恩賜雲騎尉世職承襲詳見世職表舒書舒書滿洲鑲黃旗人由協領駐防江寧康熙十三年隨副都統胡圖征逆藩耿精忠至浙江衢州偽都督周烈等率衆三萬來犯舒書奮勇與戰于坑西陳亡賞恤如例薩弼薩弼滿洲鑲黃旗人姓托謨氏世居哈逹任驍騎校康熙十三年從征湖廣擊賊李來亨於茅麓山陳亡恩賜雲騎尉世職承襲詳見世職表那桑阿那桑阿滿洲鑲黃旗人姓費莫氏世居納音任筆帖式康熙十三年十二月隨經略大學士莫洛征吳逆至陕西寧羌州提督王輔臣叛與經略同時遇害恩賜雲騎尉世職承襲詳見世職表戴戴滿洲鑲黃旗人姓舒穆祿氏世居哈爾閔任江寧將軍筆帖式康熙十三年隨本駐防將軍額楚征逆藩吳三桂至江西吉安府螺子山擊賊陳亡賞恤如例牛鈕牛鈕滿洲鑲黃旗人姓瓜勒佳氏世居蘇完初襲父色勒陳亡雲騎尉世職於康熙十三年四月從定南將軍希爾根征逆藩耿精忠七月至江西撫州府之鍾家嶺有偽都督易天錫等率馬步兵四萬餘來拒牛鈕力戰陳亡恩賜騎都尉世職承襲詳見世職表桑阿布桑阿布滿洲鑲黃旗人姓索綽洛氏世居輝發地方康熙十三年以主事隨經略大學士莫洛征逆藩吳三桂至寧羌州適提督王輔臣叛力戰陳亡恩賜雲騎尉世職承襲詳見世職表氣蘭普氣蘭普滿洲鑲黃旗人姓費氏世居酸尼地方順治十三年以佐領隨將軍喀喀木征海賊戰于江寧瓜洲等地方被傷卒克之康熙十三年隨副都統綽克托征逆藩吳三桂遇賊于四川重慶府力戰復負重傷遂以戰殁恩賜雲騎尉世職承襲詳見世職表薩哈連薩哈連滿洲鑲黃旗人姓富察氏世居沙際地方康熙十三年以員外郎隨經略大學士莫洛征逆藩吳三桂至寧羌州適提督王輔臣叛與莫洛同日遇害恩賜雲騎尉世職承襲詳見世職表穆爾泰穆爾泰滿洲正黃旗人姓賴卜氏世居齊克潭和洛地方都統沙納哈巴圖魯之子也康熙十三年以筆帖式隨經略大學士莫洛征逆藩吳三桂至寧羌州適提督王輔臣叛力戰陳亡恩賜雲騎尉世職承襲詳見世職表巴朗巴朗滿洲正黃旗人姓科本氏世居兀魯特地方任護軍恭領順治十七年從征山東敗賊吕思啓等于鋸齒崖康熙十三年從安西將軍都統赫業征逆藩吳三桂至四川賊設伏野狐嶺隨前鋒統領穆占敗之進復平陽關賊將石存禮復連營三十餘拒守朝天關俱克之進至蟠龍山賊將王屏藩等率衆四萬拒戰江中諸賊復從右翼舍舟登岸夾擊我師巴朗力戰陳亡恩賜騎都尉世職承襲詳見世職表喀西泰喀西泰滿洲正黃旗人姓覺爾察氏世居長白山地方任護軍參領康熙十三年從安西將軍都統赫業征吳三桂至四川遇賊將石存禮于朝天關隨前鋒統領擊敗之賊將王屏藩鄭蛟麟吳之茂何德成等率衆四萬拒戰于蟠龍山尋以水師自江登岸合攻我軍喀西泰力戰不克殁于陳恩賜雲騎尉世職承襲詳見世職表穆魯穆魯滿洲正黃旗人姓董鄂氏世居董鄂地方康熙十三年以筆帖式隨經略大學士莫洛征逆藩吳三桂至寧羌州適提督王輔臣叛力戰陳亡恩賜雲騎尉世職承襲詳見世職表鄂里善鄂里善滿洲正黃旗人姓扎庫塔氏世居噶哈禮璧翰之鄂里噶山康熙十三年以筆帖式賫詔廣東值總兵劉進忠叛被執抗節不屈遂及於難恩賜雲騎尉世職承襲詳見世職表法特哈法特哈滿洲正黃旗人順治初年以七品官入山海關平定山東山西陜西河南追流賊於武昌九江等處俱有功賜雲騎尉康熙十三年隨寧海將軍固山貝子富喇塔擊賊曽養性於台州小梁山力戰陳亡恩賜雲騎尉世職承襲詳見世職表察渾察渾滿洲正黃旗人世居蒙古嘉叟兒地方父喀蘭圖仕至內大臣理藩院尚書加太子太保諡壯敏察渾襲騎都尉又一雲騎尉後復兼襲父喀蘭圖二等輕車都尉併為三等男康熙十三年從征逆藩耿精忠至江西吉安府螺子山與賊力戰歿于陳賜祭葬如禮倭錫訥倭錫訥滿洲正黃旗人世居庫爾喀任護軍校康熙十三年從征雲南擊逆藩吳三桂歿于陳恩賜雲騎尉世職承襲詳見世職表戴通戴通滿洲正黃旗人署護軍校康熙十三年從征逆藩吳三桂於雲南至騰越州擊賊中傷歿恩賜雲騎尉世職承襲詳見世職表泰星阿泰星阿滿洲正黃旗人任佐領康熙十三年從征逆藩吳三桂至四川賊將石存禮等據朝天關隘口連立三十餘營隨前鋒統領穆占等擊敗之旋率五十人守梅嶺賊衆大至兩路夾攻我師四戰四敗之賊復悉衆截殺斷我糧道泰星阿力戰歿于陳恩賜三等輕車都尉世職承襲詳見世職表俄內俄內滿洲正黃旗人姓瓜勒佳氏世居蘇完任輕車都尉兼管佐領事康熙十三年從征逆藩吳三桂陳亡賞恤如例額參特額參特滿洲正黃旗人康熙十三年以恭領從定南將軍希爾根征逆藩耿精忠于江西擊賊于老虎口負重傷歿恩賜雲騎尉世職承襲詳見世職表巴喀巴喀滿洲正黃旗人世居松阿里烏喇克布祿任護軍校康熙十三年從征南將軍穆占征逆藩吳三桂至湖廣長沙府力戰陳亡賞恤如例嘉爾都嘉爾都滿洲正黃旗人姓席氏世居烏龍江庫爾喀布鹿地方康熙十三年以前鋒侍衛隨大兵征逆藩吳三桂至湖廣與賊戰于髙唐陳亡恩賜騎都尉世職承襲詳見世職表森特赫森特赫滿洲正黃旗人姓吳雅氏世居烏喇地方任三等侍衛康熙十三年隨寧海將軍固山貝子富喇塔征浙江時耿逆偽將軍曽養性等率衆六萬以水陸並進破黃巖森特赫率兵往援十月初十日遇賊于台州南浮橋力戰陳亡恩賜雲騎尉世職承襲詳見世職表和吉格禮和吉格禮滿洲正黃旗人姓伊爾根覺羅氏世居葉赫地方康熙十三年隨安西將軍都統赫業征逆藩吳三桂至四川攻夏邑關力戰歿于陳恩賜騎都尉世職承襲詳見世職表業臣業臣滿洲正黃旗人姓索嘉氏世居烏爾護地方順治十五年以護軍恭領從信郡王多尼征貴州敗偽侯李成蛟于涼水井復敗偽晉王李定國于雙河口並有功十七年從征東將軍季什哈征山東土賊于七吕思啓等悉敗其衆於鋸齒崖南康熙十三年從安西將軍都統赫業征吳三桂由陜西入川至野狐嶺賊分設伏兵千人于林中使數百人立紅幟誘我軍深入業臣隨前鋒統領穆占連擊敗之乘勝追擊遂復平陽關偽將石存禮等聚賊兵一萬七千人拒守朝天關連營二十餘復隨穆占大敗之乂擊賊將王屏藩鄭蛟麟吳之茂何德成等于盤龍山賊舟師繞出我後合兵衝擊業臣力戰不能支遂歿于陳恩賜騎都尉兼一雲騎尉世職承襲詳見世職表瑚什屯瑚什屯滿洲正黃旗人姓赫舍里氏世居葉赫地方任護軍校康熙十三年從征逆藩吳三桂由陜西入四川至朝天關賊將石存禮連營阻險以拒我師隨前鋒統領穆占敗之師次蟠龍山敗賊將王屏藩吳之茂等直趨娘娘廟大兵先發瑚什屯為殿賊衆大至回兵擊之以被傷陳亡恩賜騎都尉世職承襲詳見世職表覺和託覺和託滿洲正黃旗人姓扎庫塔氏世居鄂里噶山康熙十三年由護軍校隨征逆藩耿精忠至江西攻撫州府有賊自建昌來援城內賊衆亦出覺和託力戰陳亡賞恤如例雅哈里雅哈里滿洲正黃旗人姓伊爾根覺羅氏世居烏喇康熙十三年以護軍校隨寧南靖冦大將軍順承郡王勒爾錦征逆藩吳三桂至湖廣攻嶽州中鎗斷右臂歿賞銀二百兩薩郎阿薩郎阿滿洲正黃旗人姓瑚錫哈里氏世居卦勒察康熙十三年以七品官隨寧南靖冦大將軍順承郡王勒爾錦征逆藩吳三桂至湖廣永興縣擊賊陳亡賞恤如例嶽納嶽納滿洲正黃旗人姓圖氏世居舒爾蠻任驍騎校駐防陜西西安署副參領康熙十三年將軍瓦爾喀征吳逆于四川嶽納從征至朝天關與偽總兵石存禮力戰陷陳遇害賞恤如例尼堪尼堪滿洲正白旗人順治十二年以參領隨大兵征雲南貴州等處遇賊李定國二萬餘衆列炮鎗迎拒尼堪督本恭領兵進擊敗之負重傷賞雲騎尉康熙七年六月以創發卒視陳亡例賜銀七百兩恩賜雲騎尉世職承襲詳見世職表伊成額伊成額滿洲正白旗人姓賴卜氏世居扎庫木地方康熙十三年逆藩吳三桂反以刑部郎中從大兵征四川至成都遇賊督軍進攻歿於陳恩賜雲騎尉世職承襲詳見世職表諾羅布諾羅布滿洲正白旗人姓博爾濟吉特氏世居克爾倫地方襲三等輕車都尉世