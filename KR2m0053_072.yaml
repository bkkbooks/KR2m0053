body:
  text: 氏族志五八旗滿洲譜系四何齊拉氏系出雅蘭雅佳氏系出輝發桓泰氏系出雅蘭喀爾庫氏系出烏喇福錫氏系出福山莽果氏系出烏喇孔果絡氏系出黑龍江葉禄氏系出葉赫飄佳氏系出薩木占扎克塔氏系出黑龍江綽絡氏系出黒龍江索濟雅喇氏系出大凌河瓦爾喀氏系出吉林烏喇鄂卓絡氏系出瓦爾喀瑚爾哈蘇氏系出吉林烏喇恒吉理氏系出董鄂索徹理氏系出烏喇錫强氏系出鄂爾渾申穆理氏系出朱舍里杭佳氏系出哈達巴雅爾齊氏系出諾羅阿賚氏系出翁果羅城伊爾穆氏系出哈達錫瑪拉氏系出額楚瑚爾泰氏系出輝發喀克錫理氏系出陽石木索絡恪氏系出雅爾湖沙達喇氏系出輝發范佳氏系出輝發努魯氏系出輝發額哲氏系出蘭河山蘇爾佳氏系出松花堡申佳氏系出烏喇謨岳絡氏系出舒穆禄村玉圖墨氏系出哈達洪果竒氏系出長白山周成氏系出周齊理哈巴氏系出哈達嘉穆瑚氏系出輝發良佳氏系出瀋陽舒佳氏系出黒龍江法喀堡䝉果氏謹案氏族通譜所載是派無考努爾哈拉氏謹案氏族通譜所載是派無考圖爾佳氏謹案氏族通譜所載是派無考洪滚氏系出薩哈爾察拜嘉喇氏系出虎爾哈納哈塔氏系出郭絡羅溝尼庸特氏系出法穆納哈達哈爾拉氏系出吉林烏喇瑚塔氏系出科爾沁博爾濟氏系出東城定紀理氏系出西城拉顔氏系出界凡渾達竒氏系出訥殷托和爾秦氏系出齊齊哈爾色爾傑氏系出伊蘭費爾塔哈村伊穆圖氏謹案氏族通譜所載是派無考葛佳喇氏系出長白山富蘓瑚氏系出吉林烏喇博爾卓克氏系出烏喇佛爾錫墨理氏系出舍里喀喇氏系出西巴理城周延氏系出訥殷江唐顔氏系出訥殷江陶佳氏系出伊蘇鄭佳氏系出瀋陽瑚鼎氏系出和羅山晉格爾齊氏系出尼瑪察珠嚕氏系出赫舍理河喀爾拉哈氏系出吉林烏喇玉魯氏系出吉林烏喇占尼氏系出瑪察崔穆魯氏系出瑪察梅佳氏系出綏分巴顔氏系出齊齊哈爾瞻楚渾氏系出卦爾察扎雅扎喇氏系出雅蘭石富察氏系出倭濟達普魯氏系出黑龍江多拉爾氏系出黑龍江多爾塔喇氏系出黒龍江孟克宜勒氏系出蜚悠城克勒氏系出尼雅滿洲嘉瞻氏系出黑龍江圖薩喇氏系出葉赫東阿氏系出那木都魯額宜蘇氏系出墨爾根村多秦氏系出黒龍江阿喇氏系出烏喇圖勒理氏系出索倫蓀綽爾氏系出長白山烏顔齊氏系出烏喇達呼里村楊額理氏系出白都訥瑚佳氏系出吉林烏喇雅爾薩喇氏系出黒龍江錫爾馨氏系出和托阿拉希普蘇氏系出黒龍江全佳氏系出蓋州莽佳氏系出蓋州豊佳氏系出長白山馬克丹瑚圖氏系出葉赫崔佳氏系出哈達伊蘇氏系出黒龍江雅爾庫理村鮑佳氏系出安禇拉庫喀爾佳氏系出索倫方佳氏系出瀋陽富珠理氏系出富珠理瑚圖理氏系出黒龍江濟拉喇氏系出長白山布希氏系出葉赫留濟理氏系出蘇瓦顔溝尼音圖氏系出哈達鈕圖氏系出哈達韓楚氏系出長白山農吉勒氏系出哈達阿爾巴齊氏系出扎滿和羅成尼氏系出遼陽穆達齊氏系出瓦爾納哈揚那氏系出揚察塞赫里氏系出諾羅村俞庫勒氏系出洪艾那克塔氏系出郭絡羅烏魯理氏系出沾穆佳氏系出鄂謨和索羅布薩氏系出瓦爾喀猷格氏系出寜古塔愛義氏系出愛湖徹葉勒氏系出寜古塔烏錫氏系出赫徹額諸氏系出舒舒瑚爾佳氏系出吉林烏喇瑚爾哈喇氏系出白都訥呉庫理氏系出黒龍江黑赫穆氏系出黒龍江訥勒氏系出黒龍江敷臣氏系出黒龍江秋舒理氏系出扎庫木姚佳氏系出葉赫吳爾錫氏系出長白山烏努齊氏系出蜚悠城温登額氏系出黒龍江烏努氏系出都白城村烏什拉氏系出扎庫木顔珠氏系出雅達渾村弼爾雅氏系出愛渾朱爾竒氏系出薩爾哈占邊佳氏系出輝發恭佳氏系出哈達西爾圖氏系出白都訥墨呼理氏系出吉林烏喇哈蘓理氏系出吉林烏喇哈薩喇氏系出白都訥墨爾赫氏系出哈達察漢哈思呼理氏系出白都訥伊博氏系出寜古塔瑚徳勒氏系出烏喇烏勒理氏系出葉赫程佳氏系出蘇完寜佳氏系出寜古塔布爾尼氏系出尼瑪察瑚魯氏系出烏喇文扎氏系出長白山索多理氏謹案氏族通譜所載是派無考薩穆希爾氏系出索倫通果蘇氏系出老寨子卓顯氏系出雅爾渾費顔那木圖氏系出渾都和色哈思琥氏系出吉林烏喇富思庫氏系出墨絡古赫爾蘇氏系出吉林烏喇烏宇氏系出吉林烏喇闗佳氏謹案氏族通譜所載是派無考扣岱氏系出哈達修墨理氏系出虎爾哈額穆特立氏系出黒龍江松吉氏系出汪㤗葉墨勒氏系出葉赫拜察氏系出吉林烏喇岳察氏系出瑚什塔尼珠氏系出哈達耿音氏系出黒龍江遲佳氏系出哈達石佳氏系出葉赫烏蘇河都勒氏系出額爾赫村南福禄氏系出虎爾哈郎佳氏系出遼陽仁佳氏系出司旺堡休佳氏系出烏拉瑪赫哲氏謹案氏族通譜所載是派無考唐佳氏謹案氏族通譜所載是派無考文徳氏系出塔克什城哈爾塔喇氏系出吉林烏喇欽定八旗通志卷五十八
