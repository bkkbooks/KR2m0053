body:
  text: 人物志一百八忠義傳二十蒙古八旗五九十人乾隆年中共䇿塔爾䇿塔爾蒙古鑲黃旗人姓博勒特氏世居喀爾喀由官學生考取筆帖式授理藩院主事乾隆十三年派往西藏辦事十五年冬十月藏王朱爾墨特那木扎爾潛謀不軌都統傅清左都御史拉布敦以計誘而誅之逆黨羅卜藏扎什等遂率衆數千縱火焚署在事文武官員俱被殺害䇿塔爾與通判常明偕死之賞恤如例恩賜雲騎尉世職承襲詳見世職表朔隆伍朔隆伍蒙古鑲黃旗人姓博爾濟吉特氏世居羅罕地方乾隆十三年出征金川得三等功牌任藍翎長二十年從征西路一十一年自集爾噶朗撤回為厄魯特賊衆所害賞恤如例恩賜雲騎尉世職承襲詳見世職表耨金耨金蒙古鑲黃旗人由健鋭營護軍委署驍騎校乾隆二十一年奉定邉將軍兆惠令隨副都統阿敏往葉爾羌喀什噶爾招降逆回為霍集占計誘被害賞恤如例九住九住蒙古鑲黃旗人姓烏朗漢吉爾莫吉爾敏氏世居喀喇沁地方任健鋭營副前鋒參領兼佐領隨征西路乾隆二十一年因解送䇿楞玉保來京中途為厄魯忒賊衆邀截力戰死之賞恤如例恩賜雲騎尉世職承襲詳見世職表諾海諾海蒙古鑲黃旗人由健鋭營前鋒補奬賞藍翎乾隆二十二年八月於烏魯木齊地方搜勦嗎哈沁渡河溺死賞恤如例善德善德蒙古鑲黃旗人由健鋭營前鋒委署筆帖式乾隆二十二年隨將軍成衮扎布出師令守軍臺遇賊劫掠與訥爾圖同時被害照陳亡例減半議恤賞銀一百兩訥爾圖訥爾圖蒙古鑲黃旗人由健鋭營前鋒委署筆帖式乾隆二十二年春命將軍成衮扎布恭贊大臣舒赫德等由朱爾都斯路進伊犂訥爾圖在營奮勉效力奉將軍令駐守軍臺遇賊搶劫被害賞恤如例良德良德蒙古鑲黃旗人由健鋭營前鋒委署筆帖式乾隆二十三年六月隨征庫車於軍臺遇賊戰歿賞恤如例八十一八十一蒙古鑲黃旗人由健鋭營前鋒委署筆帖式乾隆二十三年六月隨征庫車於軍臺遇賊戰歿賞恤如例啓里巴圖啓里巴圖蒙古鑲黃旗人姓巴魯特氏世居邁拉果爾地方任前鋒藍翎長乾隆二十四年派往西路軍營八月初四日追勦霍集占於阿爾楚爾地方力戰歿賞恤如例恩賜雲騎尉世職承襲詳見世職表蒙古勒蒙古勒蒙古鑲黃旗人姓厄魯特氏乾隆二十三年由拜唐阿授三等侍衛三十二年六月派往雲南征勦緬甸十二月隨將軍公明瑞擊賊於蠻結陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表富海富海蒙古鑲黃旗人姓珠爾格特氏乾隆二十九年由前鋒授鳥鎗藍翎長派往雲南征勦緬甸三十四年十月擊賊於老官屯陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表巴圖伯爾巴圖伯爾蒙古鑲黃旗人姓厄魯氏由領催授藍翎長隨征金川乾隆三十八年六月擊賊於昔嶺陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表布延圖布延圖蒙古鑲黃旗人姓厄魯特氏乾隆三十七年由藍翎長隨征金川三十八年攻克當噶旋進兵儧拉得功牌三三十九年三月擊賊於思底陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表巴善保巴善保蒙古鑲黃旗人姓布魯特氏由領催委署七品官乾隆三十八年隨征金川三十九年七月擊賊於當噶爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表烏爾璫阿烏爾璫阿蒙古鑲黃旗人姓吉爾們氏乾隆二十七年由前鋒派戍伊犂二十八年授藍翎長二十九年升副前鋒校厯前鋒校三十年出征烏什屢列超等得功牌九三十四年隨征緬甸三十五年在軍營授委署前鋒參領進攻新街老官屯得功牌二三十八年調征金川三十九年授副護軍參領調補副前鋒恭領攻克趲拉得功牌二是年六月擊賊於木克什陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表伊興阿伊興阿蒙古正黃旗人姓額魯特氏世居盛京任理藩院員外郎乾隆十九年七月隨定北將軍班第出師北路收獲烏梁海宰桑等有功二十年八月阿睦爾撒納叛二十四日逆黨克什木巴朗等進犯軍營伊興阿力戰歿於陳賞恤如例恩賜雲騎尉世職承襲詳見世職表七十三七十三蒙古正黃旗人任健鋭營前鋒藍翎乾隆十九年出師西路二十一年自集爾噶朗撤回遇賊戰歿賞恤如例恩賜雲騎尉世職承襲詳見世職表查雲阿查雲阿蒙古正黃旗人姓柏爾郭奴特氏世居薩拉木倫地方任甘肅水泉營守備乾隆二十三年六月隨征庫車與逆黨阿布都克勒木戰歿於陳賞恤如例恩廕千總子佛保住襲額勒津額勒津蒙古正黃旗人姓巴約特氏由健鋭營前鋒派往雲南征勦緬甸臨陳奮勉得旨賞戴藍翎乾隆三十二年十二月擊賊於老官屯受傷尋歿賞恤如例恩賜恩騎尉世職承襲詳見世職表克木納克克木納克蒙古正黃旗人姓額爾哲特氏乾隆三十二年由拜唐阿派往雲南征勦緬甸臨陳奮勉得旨授藍翎侍衛是年十二月隨將軍公明瑞擊賊於蠻結陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表海明海明蒙古正黃旗人姓他塔喇氏乾隆三十六年由前鋒隨征緬甸旋調征金川三十七年授空銜藍翎三十八年六月擊賊於木果木陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表智色智色蒙古正黃旗人姓巴約特氏乾隆三十七年由護軍授空銜藍翎隨征金川三十八年六月擊賊於昔嶺陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表果寧阿果寧阿蒙古正黃旗人姓徹默特氏乾隆二十七年由護軍出征伊犂三十一年回京三十四年出征緬甸旋調征金川三十七年授六品頂帶藍翎三十八年六月擊賊於木果木陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表拴珠拴珠蒙古正黃旗人姓巴約特氏乾隆三十四年由鳥鎗護軍出征緬甸三十五年回京三十六年復派往雲南軍營尋調征金川三十七年