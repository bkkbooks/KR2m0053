front:
  text: 欽定四庫全書欽定八旗通志卷九十六
  hash: sha256:89339251d68498e2d08028bbee3d5c473d219950304f0bfd376157a6d63f6698
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_110-1a, image: WYG0665/WYG0665-0710c.png}
body:
  text: 學校志三八旗官學下謹案此卷専志助教教習選補之事順治二年定酌取京省生員為八旗子弟伴讀每名月給米二斛以資贍養三年之内果教習子弟有成國子監咨行吏部叙用十二年覆准撤囘八旗教習生員令禮部㑹同國子監嚴加考試於監生中充補如在監仍能教習有成優加録用十六年題准教習既改用監生今後考選教習令該監自行取用十七年覆准考選教習止用恩㧞副榜嵗貢其准貢例監不准考取康熙三年議准八旗教習將在監恩㧞嵗副貢生齊集􅍐補四年題准恩㧞嵗副俱停止補用教習應於官廕准例監生内未經考職者考試補用六年五月御史傅感丁疏言教習冒濫請嚴遴選之法以後考取教習務將通曉經史原從文義考取出身者方許充補如將文理不通之人冒濫考取查出指名題㕘經禮部議覆應先儘恩㧞嵗副廕監生考取如無此項貢監生仍許將准例監生考取是年九月都察院左都御史王熈奏言將収滿洲之真才必先以教導之實事朝廷興學作人既以鄉㑹試収羅之國子監教養之而於八旗官學諸生復選滿漢分旗教習儲才育士之道可謂詳且備矣近者欽奉恩詔一時滿漢官廕監生入國學者倍多於前又部議各旗滿洲漢軍與漢人一體鄉㑹試業奉諭㫖則八旗廕監生應照漢官廕監之例從國子監應試其八旗官學生亦應照漢人考取應試矣查漢監生入監必分堂撥班先以月課繼以季課教法甚備其八旗廕監生習滿書者原有滿官教訓其習漢書者似應一體分派漢博士助教等官設立課程定期稽查必使各習一經兼及史鑑詳為講解俾令貫通務期成才以收實用至於八旗官學生定例每佐領各二人而考取録用之時少有學問優長者則漢教習監生誤之也查教習一項向於恩㧞嵗副中考取近年恩㧞嵗副乏人而旁及於納銀准例經御史傅感丁條議部議以恩㧞嵗副無人仍用納銀准例此等當入監之時既不由於考取及充教習之日自難責其優通巳身學業尚當在質疑問難之時為人師範豈能有成徳達材之益不過虚糜嵗月覬博一官無怪乎徒存官學之名而生徒無勤學之實也竊念納銀准例既不堪用恩㧞嵗副人數又少何若於舉人中願就教習者與恩㧞嵗副相兼考充此皆屢經考試之人較之納銀准例自不相同且舉人一項今既准其考授教授等官矣未有為漢生員師則有餘為官學生師則不足者也至於考取教習之法則應查照順治十五年以前之例禮部㑹同該監嚴加考選無止委之該監視為具文其八旗官學滿書既有滿司業助教等分旗稽查教習則習漢書者亦應派漢官不時親到官學稽查諸生之學業與教習之勤惰庶教學各有責成在國學者既善其法在官學者復得其人將見英才蔚起於朝廷儲才育士之大典或少有禆也奉㫖國子監為作養人材之地教習宜選用文理優長之人復嚴加稽查督課乃得真才以後教習應作何考試選取及分派博士等官向官學稽查勤惰之處俱著一併定議具奏尋禮部議八旗教習缺出舉人内有情願就旗下教習者取具同鄉京官印結如無同鄉在京印官即取該省藩司印結投國子監與恩㧞嵗副官廕及例監一體考試遇缺出之日限五日内𫝊集應考諸人彌封試卷封門出論題二策題一即日取定不許預取多人與文理荒疎者充數如該監徇情考取不公者查出題㕘議處其祭酒司業不時遣漢博士助教等官往官學稽查教習勤惰滿學生既有滿助教等管教不必交漢博士助教等官官學生除照常考試外一年一次嚴考將八旗分别等第送部其學生怠惰肄業甚劣者即開列該助教教習職名題㕘議處奉㫖依議十二年覆准八旗教習先因停止恩㧞嵗副故將官廕准例充補今選㧞副榜嵗貢既經議復應仍照舊例令其考充教習其舉人官廕并准例監生俱應停其考用雍正元年覆准八旗教習應將考取之新進士用一人考取之恩㧞嵗副貢生用一人如此分缺間補三年期滿新進士即照例補用恩㧞嵗副貢生仍咨部以知縣用挨年銓選至捐納嵗貢不准考充八旗教習是年奏准於八旗䝉古䕶軍領催驍騎校内有通曉經籍明白繙譯熟練國語蒙古語者選為䝉古教習共十有六人與助教一同教習䝉古官學生四年奉㫖滿助教一官有教訓士子之責若只考字則雖年少不學但工繕寫者皆可入選可𫝊諭各部院衙門将滿洲筆帖式内為人老成有行止者保舉引見其應考繙譯者仍照例考試五年奏准繙譯舉人准其與八旗文舉人副榜貢生一例考試取補助教是年十月康親王果郡王議覆國子監祭酒孫嘉淦條奏官學生習漢字者毎旗設教習貢生五人輪流更換功課難以稽查應令毎教習名下各𣲖定學生若干人日處其中専心訓導則將來成否責有攸歸查景山現有漢教習十二人毎名一月闗銀二兩米隨錢糧毎年夏秋衣服各一套二年皮衣服一套毎日隨用肉菜煤炭等項該衙門領給今八旗教習既不許其分班更換則應足其衣食除毎日薪蔬難於支給不必比照景山外其毎年銀米等項俱應均照景山之例則衣食充裕而課讀自勤矣至教習期滿議叙國子監舊例皆用貢生三年期滿咨部以知縣候選伏思三年之内若不問其勤惰槩行咨部銓選恐有草率塞責希圖僥倖之弊嗣後八旗教習入舘國子監堂官不時稽查如有懶惰者即斥退不准議叙其勤謹無過者三年期滿照例咨部以知縣候選如有善於訓誘精勤不倦者再留教習三年俟六年期滿咨部以知縣即用如此則勤惰有分而善於誨誘者亦得乆於其職矣奉㫖所議是依議六年吏部議准蒙古助教缺出於理藩院修書處䝉古筆帖式並國子監閒散巴克什内揀選皆由理藩院國子監兩衙門辦理擬定正陪咨送吏部帶領引見補用又議准䝉古教習缺出咨明理藩院挑取過監充補照例移咨原旗及䕶軍統領衙門停止差使其應得錢糧仍於原處給領十三年奉上諭助教一官専司訓迪必得老成謹慎之人方為有益嗣後年少者不准考試是年吏部議定助教一官必年過三十者方准考試乾隆八年奏准官學漢教習毎人給印冊二本該教習將三年内所教學生若干名並學業功課詳細填注俟期滿時一册交新教習收存照例填注一册呈送本監堂官察覈慎重分别如有實心訓課著有成效者列一等其訓課勤謹稍獲成效者列二等出具考語繕單引見一等者可否用為知縣並二等者或用知縣或用教職恭候欽定仍歸原班銓選其列一等者仍照原議令在學再行教習三年果實心實力始終如一再将教習成效叙入摺内再填考語引見准以知縣即用十年奏准嗣後蒙古教習酌以五年期滿由國子監詳加考覈實不能教導者斥令歸旗當差如有為人明白實心訓課者分别等第填注考語引見其奉㫖記名者以應陞之䕶軍驍騎校補用仍留在學行走由監行文該旗遇有員缺與在旗應陞人員分班間補十一年奏准滿洲助教員缺除舉人及恩抜副嵗貢生仍照舊考試外其現任筆帖式等止准舉人及恩拔副嵗貢生生員出身之筆帖式坐補至考試時於請繙譯題一道之外再請漢文論題一道欽㸃大臣嚴加考試如果清漢兼優方准録取引見充補教習十五年奏准考試滿助教准多取數人咨呈吏部一同引見俟記名後遇有員缺挨次補用十六年向來官學漢教習員缺由監臣將肄業之恩㧞副優嵗各生考取充補嗣後先期請命大臣一二人至監㑹同監臣公同考取將試卷彌封詳閱十七年奏准八旗世爵既經於兩翼設立官學将現在官學肄業之世爵子弟咨囘各旗外所有八旗官學各增設之漢教習一人相應裁汰教射教習亦咨囘本旗謹案增設世爵教習係雍正十三年侍郎鄂善所奏自乾隆十七年裁汰後至三十一年即以此八缺改設滿教習每學一人又奏准教射教習既經咨囘則毎學教射未有専員查䝉古教習每學現設二人䝉古學生止二十人内又有他處行走例不開缺者實在不過十數人無庸二人教習嗣後止以一人教習字話以一人教習騎射行文該旗遴選語音嫻熟弓馬可觀者充補十八年奏准蒙古助教現在兼用䝉古進士其滿洲進士出身之現任筆帖式一體准其考試又奏准滿洲䝉古助教所司各異蒙古助教無滿洲人員充補今考試滿洲助教其䝉古人員無庸収考三十一年奏准每旗裁去漢教習一缺添設滿教習一缺専訓繙譯照考試覺羅滿洲教習之例由國子監請㫖考試用繙譯題一道其應給公費衣服等項即以裁去漢缺之項給與其有原食錢糧及現任食俸者毋庸重給三十二年奉上諭嗣後現任陵寢筆帖式不准考試助教俟年滿囘京後准其考試附國子監現行則例一八旗官學毎學額設滿洲助教二員滿洲教習一人漢教習四人掌教滿洲漢軍學生䝉古助教一員蒙古教習一人掌教䝉古學生弓箭教習一人掌教合學學生騎射凡有闗于學務者皆助教所職掌一國子監先期行文八旗將滿洲䝉古漢軍文進士文舉人恩㧞副嵗貢生文生員繙譯進士舉人繙譯生員及廢員造具旗分佐領年貌履厯清册咨送到監行文各部院咨取筆帖式清册與此同一滿漢教習缺出需人由八旗滿洲蒙古漢軍將前項人員年逾三十嵗者咨送國子監奏請考試一滿洲教習有原食錢糧及現任食俸之筆帖式充補者已食有糧俸毋庸給與教習銀米其原未食俸及錢糧者照漢教習例給發一滿洲教習三年期滿由國子監查明平日勤惰及成就學生名數分别等第出具切實考語帶領引見後咨明吏部辦理及各旗查照一滿洲教習報滿核計三年中成就學生在四名以上者准其報滿不及四名者不准報滿一教習考取後而鄉㑹試中式者仍准充補已補而鄉㑹試中式者亦不開缺一教習丁憂病故應給賙助銀兩與肄業諸生同一八旗教習照景山教習例每年夏季應領紗袍褂各一件緯纓凉㡌一頂秋季應領縀綿袍褂各一件二年應領皮衣一套靴帽各一副由國子監咨明工部照例給發一八旗官學所有存貯書籍該助教查明新舊年月卷頁造册用堂印敬謹収貯隨時督率皂役曬晾以防蠧蝕如有缺爛呈堂領補至教習及學生領讀之時該助教隨時檢發登記簿册限日繳還遇有離任事故查明有無損失照册交代以上八旗官學欽定八旗通志卷九十六
