body:
  text: 職官志十一職制補放領侍衛內大臣以下官員領侍衛內大臣缺出由領侍衛內大臣將內大臣散秩大臣八旗滿洲蒙古都統前鋒統領護軍統領外省將軍職名開列具奏補放領侍衛內大臣內如有出兵出差者將內大臣散秩大臣等職名進呈恭候欽點署事內大臣缺出由領侍衛內大臣將散秩大臣職名開列具奏補放散秩大臣係奉特旨補放侍衛班領委署侍衛班領侍衛什長缺出俱於侍衛內揀選補放一等侍衛缺出於二等侍衛內揀選補放二等侍衛缺出於三等侍衛內揀選補放三等侍衛缺出於四等侍衛藍翎侍衛上三旗雲騎尉以上世職前鋒校親軍校護軍校驍騎校下五旗擡入公中之雲騎尉以上世職前鋒校親軍校護軍校驍騎校等揀選補放至四等侍衛於藍翎侍衛內㨂選好者補放仍入於藍翎侍衛額數藍翎侍衛缺出於領侍衛內大臣衙門筆帖式恩騎尉各項拜唐阿間散覺羅大臣子弟前鋒親軍護軍等揀選補放宗室侍衛缺出行文宗人府於所送宗室內揀選補放以上各缺俱由領侍衛內大臣揀選具奏補放上駟院侍衛缺出除藍翎侍衛外領侍衛內大臣㨂選散走侍衛出具考語咨送上駟院由上駟院帶領引見補放補放鑾儀衛官員掌鑾儀衛事內大臣缺出由領侍衛內大臣將應行補放之領侍衛內大臣內大臣職名擬送兵部開列具題至滿洲鑾儀使冠軍使雲麾使治儀正整儀尉員缺由鑾儀衛具奏補放咨送兵部如滿鑾儀使缺出於滿冠軍使及一等侍衛內揀選補放滿冠軍使缺出於滿雲麾使內揀選補放滿雲麾使缺出於滿治儀正內揀選補放滿治儀正缺出於滿整儀尉內揀選補放如本衛不得其人行文領侍衛內大臣咨取門上三等侍衛挑補雲麾使藍翎侍衛挑補治儀正滿整儀尉缺出行文管理鷹狗粘竿三處拜唐阿之大臣㨂選拜唐阿出具考語保送鑾儀衛揀選補放如無保送之拜唐阿仍於上三旗世職官員內揀選補放開列滿洲都統滿洲都統缺出由本翼蒙古都統滿洲補授漢軍都統前鋒統領護軍統領步軍統領滿洲蒙古副都統滿洲補授漢軍副都統外省滿洲將軍都統副都統滿洲補授外省提督職名開列具題補授開列蒙古都統蒙古都統缺出由本翼前鋒統領護軍統領步軍統領滿洲蒙古副都統滿洲補授漢軍副都統外省滿洲將軍都統副都統滿洲補授外省提督職名開列具題補授開列漢軍都統漢軍都統缺出由本翼前鋒統領護軍統領步軍統領滿洲蒙古漢軍副都統外省漢軍將軍副都統漢軍補授外省提督職名開列具題補授開列前鋒統領前鋒統領缺出由本翼護軍統領滿洲蒙古副都統滿洲補授漢軍副都統職名開列具題補授開列護軍統領護軍統領缺出由本翼滿洲蒙古副都統滿洲補授漢軍副都統職名開列於前參領等官開列十員於後其所開十員內先將隨同前鋒統領辦事之前鋒參領隨同護軍統領辦事之護軍參領不論俸次通行開列由前鋒參領護軍參領補放之王府長史及前鋒參領護軍參領等通行較俸合隨同辦事之參領共足十員開列具題補授開列步軍統領提督九門巡捕五營步軍統領缺出由滿洲蒙古副都統滿洲補授漢軍副都統步軍翼尉職名開列具題補授開列滿洲蒙古漢軍副都統滿洲副都統缺出由本翼蒙古副都統滿洲補放漢軍副都統職名開列具題調補并將本翼滿洲侍郎按旗開列再將應升蒙古副都統之本翼署理副都統及蒙古侍郎一等侍衛軍政卓異人員開列在前次將本翼翼尉參領等官每旗開列十員其所開十員內先將步軍翼尉前鋒營隨同辦事前鋒參領火器營翼長營總護軍營隨同辦事護軍參領健鋭營翼長圓明園營總隨同辦事護軍參領嚮𨗳處隨同辦事前鋒參領護軍參領滿洲蒙古印房參領內務府護軍統領不論俸次通行開列續將王府長史前鋒參領護軍參領驍騎參領鳥鎗護軍參領察哈爾總管健鋭營前鋒參領圓明園護軍參領論俸開列每旗各足十員之數至滿洲蒙古補授外省總兵官按旗開列於後以上應開人員俱於本內開列另將本翼滿洲蒙古散秩大臣公侯伯子男冠軍使前鋒參領護軍參領驍騎參領鳥鎗護軍參領健鋭營前鋒參領圓明園護軍參領王府長史一等護衛按旗挨次通行繕摺隨本進呈再將遵旨引見記名之應升本旗副都統人員開單進呈其本翼侍班引見記名人員另行開單一併進呈至開列滿洲副都統內有滿洲補授漢軍副都統職名即將應放漢軍副都統之本翼漢軍侍郎按旗開列本翼漢軍參領每旗將印房參領開列一員俸深參領開列一員蒙古副都統缺出由本翼署理副都統蒙古侍郎按旗開列再將一等侍衛同軍政卓異人員開列在前續將本翼翼尉參領等官每旗開列十員其所開十員內先將步軍翼尉前鋒營隨同辦事前鋒參領火器營翼長營總護軍營隨同辦事護軍參領健鋭營翼長圓明園營總隨同辦事護軍參領嚮𨗳處隨同辦事前鋒參領護軍參領滿洲蒙古印房參領內務府護軍統領不論俸次通行開列續將王府長史前鋒參領護軍參領驍騎參領鳥鎗護軍參領察哈爾總管健鋭營前鋒參領圓明園護軍參領論俸開列每旗各足十員之數至滿洲蒙古補授外省總兵官按旗開列於後以上應開人員俱於本內開列另將本翼滿洲蒙古散秩大臣公侯伯子男冠軍使前鋒參領護軍參領驍騎參領鳥鎗護軍參領健鋭營前鋒參領圓明園護軍參領王府長史一等護衛按旗挨次通行繕摺隨本進呈再將遵旨引見記名之應升本旗副都統人員開單進呈其本翼侍班引見記名人員另行開單一併進呈漢軍副都統缺出由本翼署理副都統漢軍侍郎按旗開列再將一等侍衛軍政卓異人員開列在前續將本翼翼尉參領等官每旗開列十員其所開十員內先將