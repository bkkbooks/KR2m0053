等所屬長史司儀長典儀等官降級調用者典儀有四品五品六品七品八品不同該王等照所降之級咨部擬補長史司儀長降級調用者該王等以護衛之缺按品遞降咨部擬補以上降調各員如降至無可遞降者俱行革職不得援照微員無級可降革職留任之例辦理侍衛護衛降級一等侍衛降一級調用授為二等侍衛二等侍衛降一級調用授為三等侍衛三等侍衛降一級調用授為四等侍衛四等侍衛降一級調用授為藍翎侍衛藍翎侍衛降一級調用者革職王等所屬一等護衛遇降一級調用授為二等護衛二等護衛遇降一級調用授為三等護衛三等護衛無級可降遇降一級調用者革職察哈爾降調人員補用察哈爾三品旗員降二級調用四品旗員降一級調用者遇有六品官缺出準其列名於正陪人員之後帶領引見恭候欽定患病開缺內外旗員患病該管大臣委員確驗酌量給以假期總不得過六個月之限如六個月仍未痊愈有職任者開缺如係世職將俸祿停止俟病痊之日有世職者具呈該旗都統隨旗當差行走自當差之日起支俸無世職者俱候缺補用其內外世職官因病告假如過六個月之限仍照例停俸如停俸至一年之後調養未愈不能當差令該管大臣查驗實在情形如果殘廢即應開缺將應襲之人另請承襲如無應襲之人該管大臣奏明請旨辦理至額外食俸官員亦照此例定限如逾限不痊者即行停俸俟病痊之日仍在原衙門行走倘無疾揑稱有疾呈報者將本官降一級調用驗看官罰俸一年出咨之該管官罰俸六個月陵寢官員子弟襲住在陵上居住章京之子弟仍遵旨準其襲住如額數看守章京之外不準令其居住係隨章京一同居住之子弟方準令其襲住如不係隨去同住之子弟不準襲住八旗襲職外省人等詢問願否來京乾隆四十二年十月奉上諭八旗承襲佐領世職如有分應承襲之人在外省者向俱調取來京引見嗣朕降旨有似此者著具奏請旨後再行調取但此內不無在駐防地方立有産業不願來京者著交八旗都統等嗣後凡承襲佐領世職其有分應具奏調取之人行文各該處大臣詢問本人如情願來者即調取來京帶領引見其不情願者不必咨送著為令欽此旗員廕監旗員廕監必以嫡長子如無嫡長子或雖有子而患病殘廢及有别項職事則廕嫡長孫如無嫡長孫則廕次子及次孫如無次子次孫則廕親兄弟及親兄弟子孫如無親兄弟及親兄弟子孫則廕伯叔所生兄弟及子孫俱以次承廕凡恭遇恩詔兵部題明行文各該管官轉行應廕官員取具承廕之人年齒姓名文册并親供印結一樣二套送部內有不能以次承廕者將情由聲明報部亦準承廕但不得將例載不應承襲之人混請承襲詔後所生之子孫不準承廕若本官遇詔曽經送子入監讀書後經升任又遇恩詔欲改為廕生者如未出仕監生仍準與改廕生其先送監生原缺聽本官另送别子至本官遇恩詔廕子後因本身緣事革職其所廕之子未出仕者停止已出仕者不必停止若猶稍剩微末職銜并有世職者先經所廕廕生監生不必停止若廕生監生未仕而故及患病殘廢者仍令補廕若補廕之後又故及患病殘廢者不準再補若既經準廕後得官職及中科目者俱不準補廕詔後所生之子孫亦不準補廕至革職官後經還原職者仍準還廕其革職後另行起用之官不論文武銜缺如起用時品秩相當及在原品以上者俱準還廕如革職官後經開復例止降級調用者亦準還廕凡還廕時如原廕有人别無事故仍給還原廕之人外如退廕之人殘廢病故或别經出仕中式者準其將詔前所生之子孫復還原廕詔後所生之子孫亦不準混請還廕其承繼之子孫分别詔前詔後準廕不準廕之處亦與所生之子孫同凡廕生監生必開明事故呈送到部若送廕之人有從前緣事例應永不敘用者不準廕監其叛逆牽連革職之員及雖係族中子弟𨽻於民籍併撫養民間之子弟不準廕監年老有病原品解任食全俸官員仍照伊原品準其廕監其子爵豫廕照三品例改補旗員者作為七品監生男爵豫廕照四品例改補旗員者作為八品監生該員等所得廕生監生十五嵗以上者送國子監讀書二十嵗以上者咨送吏部照例辦理有情願俱呈在武職上行走者照伊所得品級廕生隨旗行走至改補旗員隨旗行走之廕監生如果行走好者遇有應升缺出與應用人員一體揀選補放遊牧地方廕生有情願做武官者各照品級食俸其外省大臣官員廕生監生內有情願在家讀書者該衙門奏聞仍報明該部注册凡補廕時俱照承廕之例兵部題明給與盛京等處廕生準在本處行走盛京黑龍江吉林及遊牧地方廕生俱係生長本處此數處廕生除情願來京隨旗行走外如有願在本處當差行走者準其本處隨旗當差行走仍令該管各官照所屬官員例一體管轄稽察其餘各省駐防廕生概不得援照此例額駙之子授以品級乾隆四十年正月奉上諭尚主額駙等俱按公主品級授為固倫額駙和碩額駙惟公主所生之子向未定有給與品級之例其下嫁蒙古王公之公主等所生之子本各有應得品級毋庸另辦外但在京公主所生之子若不授以品級於體制未協嗣後在京公主所生之子年至十三嵗時如係固倫公主所生即給與伊父固倫額駙品級和碩公主所生即給與伊父和碩額駙品級現在豐伸濟倫年已及十三即著給與伊父福隆安和碩額駙品級著為令欽此欽定八旗通志卷五十二
