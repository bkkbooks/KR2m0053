body:
  text: 職官志十一職制補放領侍衛内大臣以下官員領侍衛内大臣缺出由領侍衛内大臣將内大臣散秩大臣八旗滿洲蒙古都統前鋒統領䕶軍統領外省將軍職名開列具奏補放領侍衛内大臣内如有出兵出差者將内大臣散秩大臣等職名進呈恭候欽㸃署事内大臣缺出由領侍衛内大臣將散秩大臣職名開列具奏補放散秩大臣係奉特㫖補放侍衛班領委署侍衛班領侍衛什長缺出俱於侍衛内揀選補放一等侍衛缺出於二等侍衛内揀選補放二等侍衛缺出於三等侍衛内揀選補放三等侍衛缺出於四等侍衛藍翎侍衛上三旗雲騎尉以上世職前鋒校親軍校䕶軍校驍騎校下五旗擡入公中之雲騎尉以上世職前鋒校親軍校䕶軍校驍騎校等揀選補放至四等侍衛於藍翎侍衛内㨂選好者補放仍入於藍翎侍衛額數藍翎侍衛缺出於領侍衛内大臣衙門筆帖式恩騎尉各項拜唐阿閒散覺羅大臣子弟前鋒親軍䕶軍等揀選補放宗室侍衛缺出行文宗人府於所送宗室内揀選補放以上各缺俱由領侍衛内大臣揀選具奏補放上駟院侍衛缺出除藍翎侍衛外領侍衛内大臣㨂選散走侍衛出具考語咨送上駟院由上駟院帶領引見補放補放鑾儀衛官員掌鑾儀衛事内大臣缺出由領侍衛内大臣將應行補放之領侍衛内大臣内大臣職名擬送兵部開列具題至滿洲鑾儀使冠軍使雲麾使治儀正整儀尉員缺由鑾儀衛具奏補放咨送兵部如滿鑾儀使缺出於滿冠軍使及一等侍衛内揀選補放滿冠軍使缺出於滿雲麾使内揀選補放滿雲麾使缺出於滿治儀正内揀選補放滿治儀正缺出於滿整儀尉内揀選補放如本衛不得其人行文領侍衛内大臣咨取門上三等侍衛挑補雲麾使藍翎侍衛挑補治儀正滿整儀尉缺出行文管理鷹狗粘竿三處拜唐阿之大臣㨂選拜唐阿出具考語保送鑾儀衛揀選補放如無保送之拜唐阿仍於上三旗世職官員内揀選補放開列滿洲都統滿洲都統缺出由本翼䝉古都統滿洲補授漢軍都統前鋒統領䕶軍統領歩軍統領滿洲䝉古副都統滿洲補授漢軍副都統外省滿洲將軍都統副都統滿洲補授外省提督職名開列具題補授開列蒙古都統䝉古都統缺出由本翼前鋒統領䕶軍統領歩軍統領滿洲䝉古副都統滿洲補授漢軍副都統外省滿洲將軍都統副都統滿洲補授外省提督職名開列具題補授開列漢軍都統漢軍都統缺出由本翼前鋒統領䕶軍統領歩軍統領滿洲䝉古漢軍副都統外省漢軍將軍副都統漢軍補授外省提督職名開列具題補授開列前鋒統領前鋒統領缺出由本翼䕶軍統領滿洲蒙古副都統滿洲補授漢軍副都統職名開列具題補授開列䕶軍統領䕶軍統領缺出由本翼滿洲蒙古副都統滿洲補授漢軍副都統職名開列於前㕘領等官開列十員於後其所開十員内先將隨同前鋒統領辦事之前鋒㕘領隨同䕶軍統領辦事之䕶軍㕘領不論俸次通行開列由前鋒㕘領䕶軍㕘領補放之王府長史及前鋒㕘領䕶軍㕘領等通行較俸合隨同辦事之㕘領共足十員開列具題補授開列步軍統領提督九門巡捕五營歩軍統領缺出由滿洲䝉古副都統滿洲補授漢軍副都統歩軍翼尉職名開列具題補授開列滿洲䝉古漢軍副都統滿洲副都統缺出由本翼䝉古副都統滿洲補放漢軍副都統職名開列具題調補并將本翼滿洲侍郎按旗開列再將應陞蒙古副都統之本翼署理副都統及蒙古侍郎一等侍衛軍政卓異人員開列在前次將本翼翼尉㕘領等官每旗開列十員其所開十員内先將歩軍翼尉前鋒營隨同辦事前鋒㕘領火器營翼長營總䕶軍營隨同辦事䕶軍㕘領健銳營翼長圓明園營總隨同辦事䕶軍㕘領嚮𨗳處隨同辦事前鋒㕘領䕶軍㕘領滿洲䝉古印房㕘領内務府䕶軍統領不論俸次通行開列續將王府長史前鋒㕘領䕶軍㕘領驍騎㕘領鳥鎗䕶軍㕘領察哈爾總管健銳營前鋒㕘領圓明園䕶軍㕘領論俸開列每旗各足十員之數至滿洲䝉古補授外省總兵官按旗開列於後以上應開人員俱於本内開列另將本翼滿洲蒙古散秩大臣公侯伯子男冠軍使前鋒㕘領䕶軍㕘領驍騎㕘領鳥鎗䕶軍㕘領健銳營前鋒㕘領圓明園䕶軍㕘領王府長史一等䕶衛按旗挨次通行繕摺隨本進呈再將遵㫖引見記名之應陞本旗副都統人員開单進呈其本翼侍班引見記名人員另行開单一併進呈至開列滿洲副都統内有滿洲補授漢軍副都統職名即將應放漢軍副都統之本翼漢軍侍郎按旗開列本翼漢軍㕘領每旗將印房㕘領開列一員俸深㕘領開列一員䝉古副都統缺出由本翼署理副都統蒙古侍郎按旗開列再將一等侍衛同軍政卓異人員開列在前續將本翼翼尉㕘領等官每旗開列十員其所開十員内先將歩軍翼尉前鋒營隨同辦事前鋒㕘領火器營翼長營總䕶軍營隨同辦事䕶軍㕘領健鋭營翼長圓明園營總隨同辦事䕶軍㕘領嚮𨗳處隨同辦事前鋒㕘領䕶軍叅領滿洲䝉古印房㕘領内務府䕶軍統領不論俸次通行開列續將王府長史前鋒㕘領䕶軍㕘領驍騎㕘領鳥鎗䕶軍㕘領察哈爾總管健鋭營前鋒㕘領圓明園䕶軍㕘領論俸開列每旗各足十員之數至滿洲䝉古補授外省總兵官按旗開列於後以上應開人員俱於本内開列另將本翼滿洲蒙古散秩大臣公侯伯子男冠軍使前鋒㕘領䕶軍㕘領驍騎㕘領鳥鎗䕶軍㕘領健鋭營前鋒㕘領圓明園䕶軍㕘領王府長史一等䕶衞按旗挨次通行繕摺隨本進呈再將遵㫖引見記名之應陞本旗副都統人員開单進呈其本翼侍班引見記名人員另行開单一併進呈漢軍副都統缺出由本翼署理副都統漢軍侍郎按旗開列再將一等侍衛軍政卓異人員開列在前續將本翼翼尉㕘領等官每旗開列十員其所開十員内先將歩軍翼尉前鋒營隨同辦事前鋒㕘領火器營翼長營總䕶軍營隨同辦事䕶軍㕘領健鋭營翼長圓明園營總隨同辦事䕶軍㕘領嚮𨗳處隨同辦事前鋒㕘領䕶軍㕘領滿洲漢軍印房㕘領内務府䕶軍統領不論俸次通行開列續將王府長史前鋒㕘領䕶軍㕘領驍騎㕘領鳥鎗䕶軍㕘領健鋭營前鋒㕘領圓明園䕶軍㕘領論俸開列每旗各足十員之數至滿洲漢軍補授外省總兵官按旗開列於後以上應開人員俱於本内開列另將本翼滿洲漢軍散秩大臣公侯伯子男冠軍使前鋒㕘領䕶軍㕘領驍騎㕘領鳥鎗䕶軍㕘領健銳營前鋒㕘領圓明園䕶軍㕘領王府長史一等䕶衛按旗挨次通行繕摺隨本進呈再將遵㫖引見記名之應陞本旗副都統人員開单進呈其侍班引見記名人員另行開单一併進呈補放火器營大臣火器營大臣缺出將領侍衛内大臣前鋒統領䕶軍統領滿洲䝉古都統副都統滿洲䝉古補授漢軍都統副都統職名開列具題兼管補放嚮𨗳大臣嚮𨗳大臣缺出由前鋒統領䕶軍統領滿洲蒙古副都統滿洲補授漢軍副都統職名繕寫緑頭牌具奏恭候欽㸃一員補放論翼調補副都統以上旗下大臣缺出不必越翼在本翼内不論旗分互相調補其左翼人現任右翼右翼人現任左翼者遇有本翼缺出將旗分註明開列題請調補協領不准兼管本旗佐領乾隆四十三年五月奉上諭福州將軍永徳等奏稱協領兼管佐領者請照京師㕘領不得管轄本甲喇另調别甲喇之例調翼兼管等語永徳等此奏是外省協領若兼管本旗佐領是伊所辦事務仍係伊自行主掌完結雖有不合無人更正若令各翼各旗更調兼管遇有不合之處經協領指駁更正多一層稽察於公事大有裨益著照所請行仍通行各省駐防嗣後協領兼管佐領務須各翼各旗更調不得兼管本旗佐領再京師八旗㕘領内有管本甲喇佐領者亦應更調著交八旗將現管本甲喇者即行調補别甲喇著永逺為例欽此署理都統等官都統前鋒統領䕶軍統領歩軍統領副都統缺出如本缺有署理之人一體開列詳註如所署之人係不應列名者仍於本内聲明具題署理副都統官員開列副都統副都統缺出如本翼現有署理副都統之員即將署理副都統職名開列於前其應陞人員職名仍照例開列具題駐藏辦事大臣不准開缺乾隆三十一年五月奉上諭嗣後駐藏辦事大臣俱著開缺欽此五十一年九月奉上諭凡遣往新疆大臣等既不開其本身京缺嗣後駐藏辦事大臣亦著不必開缺欽此都統出差奏請署理都統奉差在半月以内者如本旗現有副都統即令副都統署理在半月以外者兵部奏請派員署理如一旗都統副都統俱經奉差雖在半月以内兵部仍行奏請派員署理其半月内外日期奉差之都統於起身前報明兵部前鋒統領䕶軍統領出差奏請署理前鋒統領䕶軍統領遇有奉差事故其印信兵部將前鋒統領䕶軍統領滿洲䝉古副都統滿洲䝉古補授漢軍副都統職名繕寫緑頭牌進呈恭候欽㸃署理副都統出差奏請署理乾隆二十一年十月奉上諭向來奉差都統印信雖有署理之條而副都統奉差其員缺如何署理之處並無成例辦事殊未畫一即如一旗副都統二員俱經奉差本旗僅餘一人承辦一旗事務勢必不能周遍其副都統員缺理應派員署理嗣後八旗内一旗副都統二員若俱經奉差該部將一旗三員俱行在京之副都統職名併保舉副都統人員職名開单請㫖署理此係專指一旗大臣三員内有二員俱奉逺差不得遽行回京者而言若係隨圍及奉差在一二月之内即可回京者均非逺差其副都統員缺毋庸奏請署理將此永著為例欽此京口寧古塔三姓副都統公出委員署印京口副都統遇有公出事故其印務令江寧副都統前往署理吉林所屬各副都統内寧古塔副都統三姓副都統員缺𦂳要遇有進京等事該將軍將事簡之副都統派出一員前往署理其餘各副都統公出仍照例令本處協領署理大臣出征員缺擬補在京出征大臣員缺開列具題請㫖補授俟凱旋之日將出征大臣回京情由并其缺另補有人之處兵部奏聞署理外省大臣員缺奏請開列旗下大臣署理外省大臣事務員缺兵部將應否另行開列補放之處請㫖遵行尚書侍郎兼都統副都統都統副都統補授尚書侍郎者應否仍令兼攝都統副都統之處兵部繕摺請㫖開列察哈爾都統察哈爾都統缺出由前鋒統領䕶軍統領滿洲蒙古副都統滿洲䝉古補授漢軍副都統滿洲䝉古補授外省提督職名開列具題開列駐防將軍各省將軍缺出由八旗滿洲蒙古副都統滿洲補授漢軍副都統及本處滿洲副都統滿洲補授外省提督職名開列具題其廣州將軍缺出由内外滿洲䝉古漢軍副都統滿洲䝉古漢軍補授外省提督論俸開列具題開列駐防滿洲副都統駐防滿洲副都統缺出由滿洲驍騎㕘領本處協領各處城守尉三品總管滿洲補授外省總兵官按翼論俸開列十員具題另將在京滿洲蒙古現任副都統職名併各處滿洲䝉古記名協領城守尉三品總管等職名按翼繕寫二摺隨本進呈至西安副都統缺出將滿洲蒙古漢軍應陞人員一體開列開列歸化城副都統歸化城副都統缺出由在京上三旗滿洲前鋒㕘領䕶軍㕘領驍騎㕘領職名開列具題開列駐防漢軍副都統駐防漢軍副都統缺出由漢軍㕘領外省漢軍協領黑龍江管船礮水手總管按翼論俸開列十員外省總兵官職名一併開列具題另將在京漢軍現任副都統職名併各處漢軍記名協領總管等按翼繕寫二摺隨本進呈吉林鳥鎗營官員陞補吉林鳥鎗營㕘領新漢軍八佐領舊漢軍一佐領缺出俱毋庸由京補放㕘領缺出於新舊漢軍佐領内論其勞績能管轄者通行揀選擬定正陪送京帶領引見補放舊漢軍一佐領缺出於新舊漢軍驍騎校内論其