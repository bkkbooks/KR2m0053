body:
  text: 欽定四庫全書欽定八旗通志卷一百七十五人物志五十五大臣傳四十一滿洲正藍旗一爾達珠瑚山達海蘇嚕邁逹漢阿薩璧翰阿鄂莫克圖爾布當雅鄂羅塞臣球爾津科崑秦覺羅郎達珠瑚子翁阿岱達珠瑚姓兆嘉其先世居訥殷祖曰達爾楚國初時來歸後𨽻滿洲正藍旗達珠瑚初任佐領從太祖髙皇帝征烏拉斬級四十大兵克西林屯俘其人以歸敵衆追襲達珠瑚還擊敗之斬級五十旋率兵征葉赫斬級三百俘五十人又遇越界採葠者斬三十人俘六人敵侵我寜古塔境達珠瑚率䕶軍出戰斬敵一將兵百人獲甲百馬三百叙功授三等男天命十年率兵征東海瓦爾喀部凱旋太祖出郊宴勞之明年征卦勒察部俘人户獲馬牛無算太宗文皇帝即位擢列十六大臣佐理鑲黄旗事天聰元年大兵征朝鮮克義州留兵駐守命達珠瑚分統之後復率兵征瓦爾喀斬獲甚衆軍還為俘卒所害年六十有三八年以其子翁阿岱襲爵㑹大兵復征瓦爾喀諭諸將曰前所遣達珠瑚以疎遇害念其効力年久著有勞績方令承襲世職爾等未能如逹珠瑚之功倘不自慎欲希格外之恩不可得也世祖章皇帝順治十二年追諡襄敏視一品大臣例立碑翁阿岱初任佐領既襲父爵管㕘領事随都統巴竒蘭薩穆什喀征呼爾哈部有功加一雲騎尉崇徳三年授工部副理事官四年擢都察院㕘政兼正藍旗副都統五年正月奉命同副都統多積禮率兵防禦錦州稽察叛逃六年大軍圍錦州駐營城南山巔明總督洪承疇集衆松山以步兵来犯我左翼兵戰失利翁阿岱時守右翼營率兵突前衝擊敵乃潰走追擊之山下敗其騎兵復與㕘領鰲拜率䕶軍破敵步兵營捷聞得優賚尋合兩翼兵擊敵松山薄營力戰歿扵陣賜䘏白金千兩晉爵一等男無子以其弟之子濟木布襲達海子拉們逹海滿洲正藍旗人世居覺爾禅以地為氏祖博洛扵國初歸附父愛宻禪官至散秩大臣逹海其第三子也九嵗讀書能通清漢文義弱冠太祖髙皇帝召直文館凡國家與明及䝉古朝鮮詞命悉出其手有詔旨應兼漢文音者亦承命傳宣悉當上意旋奉命譯明會典及素書三略天聰三年十月太宗文皇帝親統大兵征明十二月破滿桂等四總兵軍上不欲究武遣達海賫書與明議和明人閉闗不啟踰日復賫書二分置德勝安定二門外旋回軍由遵化畧地而歸四年正月從大兵征明至沙河驛以漢語諭降其衆至永平乘夜攻其城克之上命達海執黄旗登城諭官軍百姓薙髮來降城中望見車駕環跪呼萬嵗時貝勒阿巴泰等率明投誠副將孟喬芳楊文魁逰擊楊聲遠自永平入見達海承㫖慰勞之先是三屯營漢兒莊俱已歸順既而明兵襲三屯營上慮漢兒莊降人復叛令達海與啟心郎穆成格副将石廷柱等率兵往偵以漢語諭之遂撫定漢兒莊四月貝勒大臣等將自永平凱旋上令從容謁見所行事宜即令來使奏聞逹海𫝊諭還奏悉稱㫖是年繙譯書成授三等輕車都尉五年七月賜號巴克什九月從攻大凌河既破明兵擒監軍道張春等文武三十三人達海宣上恩徳諭之降十月復偕石廷柱招明總兵祖大夀先遣陣獲㕘將姜新入城既而新偕大凌河遊擊韓棟至𫝊大夀意曰乞使石副將過濠將布心腹於麾下達海曰未奉上命不敢令往棟因送大夀子為質乃使廷柱往與大夀語越日遂降十一月上宴歸降各官達海𫝊諭慰勞如初十二月議定朝賀禮儀明年三月詳定國書字體初太祖指授文臣額爾徳尼及噶葢創立國書形聲規模大體略具達海繼之増為十二字頭至是上諭達海曰國書十二字頭向無圈㸃上下字雷同無别幼學習之遇書中尋常語言視其文義猶易通曉若人名地名必致錯誤爾可酌加圈㸃以分晰之則音義明曉於字學更有禆益矣逹海遵㫖尋繹酌加圈㸃又以國書與漢字對音未全者于十二字頭正字之外増添外字猶有不能盡叶者則以兩字連寫切成其切音較漢字更為精當由是國書之用益偹是年六月病逾月卒疾亟時上召侍臣垂淚諭曰朕以逹海偶爾疾病猶異其痊愈今聞病篤深軫朕懐其及身未曽寵任當優恤其子爾等以朕言告之賜蟒縀令侍臣賫往逹海聞命感愴垂淚已不能言矣時方譯通鑑六韜孟子三國志大乘經未竣而卒七年二月詔以其長子雅秦降一等襲職授騎都尉仍管佐領文臣例無世職盖異數也十年二月上以逹海通漢書習典故為國宣力注念不忘復召見其子三人賜饌賜幣并諭其次子辰徳勤習漢書賜達海諡曰文成雅秦别有傳第三子拉捫以前鋒統領從征逆藩吳三桂與賊戰衡州殁於陣贈雲騎尉達海少子常額當雅秦卒後特授學士雅秦子禪布康熙八年任秘書院學士為達海請賜立碑得㫖達海巴克什通滿漢文字於滿書字加添圈㸃令其分明又照漢字增造字樣於今賴之念其効力年久著有勤勞著仍追立石碑蘇嚕邁子蘇爾濟鄂洛順翁鄂洛蘇嚕邁滿洲正藍旗人姓嵩佳世居棟鄂部父遜扎哩太祖高皇帝時來歸授其長子蘇巴海為佐領蘇嚕邁其次子也天命三年蘇嚕邁從上征明撫順樹雲梯攻城蘇嚕邁先登克之六年授佐領上統大軍取瀋陽遼陽蘇嚕邁並從征有功太宗文皇帝天聰元年随大貝勒阿敏征朝鮮薄義州城蘇嚕邁率二十人先登諸軍繼之遂取義州俘獲無算三年從上征明攻克洪山口城予騎都尉世職四年春上統師圍永平命副都統阿山葉臣等率勇敢士二十四人乘夜攻城蘇嚕邁與焉城上鎗礮交發蘇嚕邁面中鎗不退乘敵礮裂自焚遂冒火樹雲梯登城大軍繼進取永平上遣醫診視鎗傷賜號巴圖魯賫牲畜布帛晋世職為三等輕車都尉尋征明旅順口及寜逺被重傷得優賚崇徳元年隨武英郡王阿濟格征明北京入邉時攻鵰鶚城中礮傷口因以殘疾家居順治七年九月三遇恩詔晋爵三等男康熙元年十一月卒賜祭𦵏如典禮諡勤勇次子遜塔襲爵仕至副都統長子蘓爾濟初任前鋒侍衛順治元年随睿親王多爾衮討流賊李自成同前鋒統領錫特庫擊敗賊將唐通于一片石三年随端重親王博洛征福建敗明總兵姜正希于汀州叙功予雲騎尉世職遇恩詔晉騎都尉七年卒無子以蘇嚕邁之第三子三塔哈襲第四子鄂洛順初任二等䕶衛康熙十四年随建威將軍佛尼埒討逆藩吳三桂由陜西進四川擊敗偽總兵髙定尋授䕶軍㕘領二十九年調前鋒㕘領隨裕親王福全征噶爾丹有功三十年任江寧副都統三十四年擢江寧將軍四十四年七月卒予祭葬如例第五子翁鄂洛初襲兄三塔哈騎都尉世職康熙二十年随征南大將軍賚塔討逆孽吳世璠由廣西進師偽將軍何繼祖擁衆據石門坎翁鄂洛與都統希福等擊敗之繼祖遁據黃草壩與賊將詹養王有功等合兵拒戰翁鄂洛復大敗賊衆奪其營詹養王有功俱就擒師至雲南殱賊黨胡國柄復追𠞰賊将馬寳巴養元等凱旋叙功晉三等輕車都尉世職尋卒以其子鄂竒襲騎都尉兼一雲騎尉世職達爾漢達爾漢姓郭絡羅初𨽻滿洲鑲黄旗後改𨽻正藍旗父揚舒為沾河寨長太祖高皇帝時率所部來歸尚長公主為額駙從征尼堪外蘭攻薩爾滸城以計擒其長諾密納而誅之嗣從征屢有功及卒太祖親臨其䘮逹爾漢為長公主所出初任佐領尚和碩公主為額駙從征葉赫誅其貝勒錦台什積功授一等男太宗文皇帝即位擢列八大臣任鑲黄旗都統隨大貝勒代善征扎嚕特部單騎追擒其台吉以歸復征棟䕫俘古穆楚赫爾及杜喀爾代青多爾濟三塔布囊父子晋爵三等子天聰元年隨大軍征朝鮮克義州定州安州斬其府尹李筦等朝鮮國王李倧請議和逹爾漢與都統納穆泰等涖盟師還上賜宴勞之復從上征明攻錦州有功先是貝勒阿巴泰因賜宴時不得與大貝勒並列使逹爾漢以耻與子弟列坐意代奏上諭逹爾漢曰爾宜勸諭之奏朕何為者至是察哈爾使臣昻坤等來歸設宴阿巴泰復使納穆泰申奏上以逹爾漢有啓𨗳貝勒之責前此不能勸諭而以其言入奏命觧都統任尋復之三年從攻遵化率鑲黃旗兵攻北面之西克其城四年敖漢奈曼諸䝉古兵從征明攻昌黎不克詔遣達爾漢與都統喀克篤禮等率兵千人馳赴應援達爾漢進攻又不克㑹永平灤州皆下有詔班師遂焚其近城廬舍而還五年三月上諭八大臣指陳政事闕失達爾漢奏曰臣以微賤之軀拔至大臣之列如國家果有過舉豈敢不言既無闕失指諫何從至于小民懐怨實有自來豈有政治和平而致怨者臣請自今洗心正已矢公審㫁以協羣情凡有所見盡心直告以圖報稱而已七月從攻大凌河城率本旗兵圍北面之東深溝築壘與都統楞額禮等環城固守八月明人以步騎五百出戰逹爾漢率八十人擊敗之越日敵復出兵誘戰又率本旗兵邀擊明兵堕壕死者百餘人六年從上親征察哈爾軍次哈納崖逹爾漢從者䝉古二人于軍中盗良馬六潜奔察哈爾告以大軍至林丹汗舉部西奔驅歸化城富户及牲畜盡渡黃河而去逹爾漢坐家人漏洩軍情降爵一等男七年明登州㕘將孔有徳以所部及戰艦來降逹爾漢與都統篇古駐兵江岸守其船八年復從征察哈爾遂入明上方堡毁其邉墻進畧朔州分兵直抵宣府右衛是嵗命免功臣徭役逹爾漢與焉並増給佐領下人户九年上遣諸貝勒統師征明山西命逹爾漢同都統阿山等營于要地制明寜錦兵使不得西援途遇敵兵八百共擊敗之斬錦州副将劉應選凱還得賞所俘獲崇徳元年五月都統篇古拜音圖譚泰葉臣阿山石廷柱奏劾都統伊爾登䜛謗諸王及大臣下法司勘訊逹爾漢助伊爾登訴辯以證辭先後互異坐罸鍰是月武英郡王阿濟格征明攻順義縣逹爾漢率本旗兵先登叙功晋爵一等子尋以克順義城不謀固守致敵復攻䧟且縱兵離伍為敵所殺坐罰鍰奪所俘獲十二月随征朝鮮明年部議朝鮮王李倧謁上時逹爾漢亂班釋甲又扵上前言不飲酒出輙私飲并論其失察狥情諸罪應罰鍰追奪賞賜得㫖罰鍰以懲六年隨鄭親王濟爾哈朗等征錦州師還部議逹爾漢于王召議禦敵時不即至及䕶軍統領鰲拜擊敗明步兵逹爾漢妄謂敵兵為豫親王多鐸所敗且嗾副都統翁阿岱等與諸䕶軍爭功坐革世爵并罷都統任順治元年卒年五十有五長子鄂羅塞臣别有𫝊阿山阿山姓伊爾根覺羅世居穆溪太祖高皇帝時阿山與其弟阿逹海濟爾垓噶頼從父阿爾塔什率七村户口來歸𨽻滿洲正藍旗太祖以宗室女妻阿爾塔什為額駙而以阿山與阿逹海等令大貝勒代善轄之阿山以大貝勒置之閒散觖望有異志與諸弟及其子塞嚇等逃之明太祖命収其孥遣兵往追斃其二子阿山至明界明臺軍戮其從人于是阿山惶懼與阿達海等復歸請罪上以其悔罪來也宥之而還其孥不令屬代善置諸左右備使令責立後効天命六年從征遼陽有功授二等輕車都尉世職太宗文皇帝嗣統擢居十六大臣之列佐理正白旗事扎魯特之役阿山奉命與都統楞額禮率六百人入巴林多俘獲還晋爵三等男天聰元年從征朝鮮攻克義州城三年同額駙揚古利至雅爾古偵軍事遇明故將毛文龍部下採葠者擊斬甚衆大兵征明從攻洪山口取其城趨燕京軍于城西南隅阿山同㕘領圖魯什周視敵營請速進攻上是其言命即以是夜三鼓列陣明日陣獲其總兵麻登雲等四年圍永平乘夜力戰㑹城上砲裂藥發阿山與副都統葉臣以猛士二十四人冒火登諸軍繼進大破之遂取永平太宗嘉其驍勇晋三等子五年從征大凌河率鋭騎偵錦州松山路俘獲明兵其守将來援阿山與前鋒統領勞薩以兵三百敗其衆二千斬首百餘級獲三纛上特召至酌以金巵尋授都統六年上統大軍親征察哈爾阿山與副都統布爾吉先率兵防邉聞駕臨西拉木倫河以衆來㑹遂奉命率八旗将領及精兵三百人徃助圖魯什前哨軍值察哈爾汗道遁乃還復率兵防邉捕斬逋逃蒙古五人以獻明年與布爾吉往偵鹿島俘獲甚多八年三月與圖魯什等禀受方畧至明錦州畧地貝勒岳託謂圖魯什曰軍中調遣事宜當就阿山商之勿違其言遂往畧地獲牲畜五月復從征察哈爾収集䝉古之潰亡者以歸十二月詔免功臣徭役阿山與焉並給呼爾哈俘百編属佐領九年明國聞我師征山西將調山海闗兵往援上命貝勒多鐸軍廣寧阿山與都統石廷柱領前鋒兵四百先趨錦州㑹明副將劉應選劉成功等引兵三千五百人來禦遇于大凌河未及戰貝勒兵疾馳繼至自山而下士馬騰藉軍容甚盛敵望塵驚潰阿山突入掩擊我軍分路追𠞰陣斬應選擒逰擊曺得功等四員殱其兵五百人復攻克臺堡一凱旋上率諸貝勒郊勞賜良馬鎧甲以旌異之崇徳元年隨武英郡王阿濟格征明攻下鵰鶚長安嶺二城又率本旗兵攻克東安縣師還明兵來追阿山殿後擊斬畧盡既班師迎勞如初是役也以出邉先歸不俟後軍俱至論奪所俘獲二年與葉臣率左翼舟師攻皮島西北隅先登克之斬守将沈世魁晉一等子予世襲四年部臣追論阿山于朝鮮王謁上時亂班釋甲及士卒離伍諸罪坐罰贖六年二月隨睿親王多爾衮圍廣寜先登斬敵襲其城有俘獲三月随征錦州以聴從睿親王離城逺駐私遣兵歸家論死命改輸罰鍰八月復攻錦州掘濠環守敗松山騎兵之援錦州者錦州兵突圍出犯我營松山守將潜謀奪我紅衣礮阿山連擊敗之七年三月部議錦州兵犯鑲黄旗營貝子尼堪不察舉我軍之未戰者阿山坐狥情附和應論罰有詔寛免先是阿山從武英郡王出征時欲奏其雄縣石橋㑹戰功属稿啟王王曰石橋㑹戰無殺敵俘獲功無可書取其奏稿削之既而阿山子塞赫與䕶軍洪科忿爭洪科遂訐塞赫随征雄縣石橋退縮事兵部以問武英郡王王以削阿山奏稿為證及詢阿山阿山又曰石橋未甞交戰亦未甞以疏稿啟王及察疏稿王言實于是部臣議曰阿山邀功則云我曽交戰聞訐其子退縮則云未甞對敵誕妄偏袒應革世職罷都統任尋又以私取外藩蒙古進獻財物事論罪應奪所俘獲並得㫖寛貰令罰贖十月奉命與饒餘貝勒阿巴泰復征明入牆子嶺取邉城至兖州屢敗敵兵分遣將領攻拔數城恩賞銀幣順治元年從擊流賊李自成於山海闗自成敗走阿山復偕左翼副都統阿哈尼堪右翼都統瑪喇希濟蒲津擊破之遂同諸将鎮守平陽二年叙功晉爵三等公是時西安已定豫親王多鐸移師安撫河南進取江南阿山奉詔與諸将各領所部從至泗州與瑪喇希等取淮河橋遂渡淮攻拔揚州進次揚子江明鎮海伯鄭鴻逵等以水師扼瓜洲及儀徵阿山率舟師浮運河而南與右翼舟師分列大江東西岸敵至則以礟夾擊之遂攻下江寧追擒明福王朱由菘于蕪湖江南既定同貝勒博洛及都統拜音圖招撫浙江軍次杭州明潞王朱常淓迎降嘉興湖州紹興寜波嚴州皆下凱旋賜金銀鞍馬三年正月巫者薩海以阿山佐領下雅巴海之妻與人私通事告阿山阿山信之徙雅巴海而幽其妻雅巴海妻奔逸訴于刑部部鞫訊得薩海誣告状阿山坐妄聴巫言削爵罷都統任旋復授一等子四年五月卒子塞赫襲薩璧翰子喀爾沁孫喀爾弼薩璧翰滿洲正藍旗人姓納喇先世居輝發父三檀太祖高皇帝時率屬来歸任佐領既卒薩璧翰與其兄薩珠瑚並授佐領太宗文皇帝即位以薩璧翰列十六大臣管正藍旗副都統事天聰五年設六部為户部承政是年八月從上征明圍大凌河城明總兵祖大夀遣兵出城来犯薩璧翰舍騎步戰逐敵薄壕獲馬一敵哭于城上發礮矢我軍士巴遜歿于陣薩璧翰衝入敵陣取其屍以還八年五月上親統大軍征察哈爾以貝勒濟爾哈朗留守盛京薩璧翰同副都統蒙阿圖副之十一月考滿予騎都尉世職崇徳二年大軍征朝鮮及明皮島凱旋薩璧翰同其兄薩珠瑚首貝子碩託𨼆匿貝勒岳託所獲馬又以死于皮島之厮役六人詭稱甲士冒領賞賚碩託坐罰鍰薩璧翰族属初𨽻碩託下至是奉命改籍饒餘貝勒阿巴泰㑹薩璧翰之從子侍衛烏逹禮随征朝鮮私携葢州駐防甲士為厮役事覺薩璧翰坐失察革世職三年裁六部承政各一員改薩璧翰為吏部右㕘政四年列議政大臣六年八月随大軍圍明錦州明援兵自松山誘戰薩璧翰被創卒于軍長子哈楚罕襲佐領次子喀爾沁亦任佐領康熙十三年擢䕶軍㕘領随大軍討逆藩吴三桂攻沅江縣被創賚銀五十兩先後得功牌三十六三十五年隨撫逺大將軍費揚古征噶爾丹戰于昭莫多有功予雲騎尉世職哈楚罕之子哈爾弼任一等䕶衛康熙十八年隨寜海將軍拉哈逹撃海賊鄭錦扵厦門歿扵陣亦予雲騎尉世職鄂莫克圖鄂莫克圖姓納喇世居葉赫太祖高皇帝時来歸𨽻滿洲正藍旗初任䕶軍校天聰元年正月大軍征朝鮮鄂莫克圖隨副都統阿山等攻克義州城五月太宗文皇帝統師征寧逺明總兵滿桂於城東二里列陣抗拒鄂莫克圖随諸將進擊殪敵無算三年随貝勒岳託征明大同攻保安州城先登克之賜號巴圖魯授三等輕車都尉世職任㕘領八年隨步軍統領巴竒蘭等征黑龍江呼爾哈部崇徳二年復随都統葉克舒征卦爾察並俘獲丁壯視諸㕘領獨多三年七月授兵部理事官九月随睿親王多爾衮征明由青山口毁邉牆入過燕京擊敗明太監馮永盛兵攻克臨洺闗城畧地至濟南府明年三月班師同啟心郎詹霸先還奏捷七月上遣使齎書與明議和命鄂莫克圖同前鋒㕘領努山等率兵䕶以行五年授前鋒統領随大軍圍錦州明總兵祖大夀糾衆迎戰鄂莫克圖率所部先諸將敗敵追逐至城濠六年復圍錦州明總督洪承疇自松山赴援為大軍擊敗鄂莫克圖追其潰卒至筆架山斬級甚衆獲其馬與纛承疇集兵十三萬分據杏山乳峯山上統師親征駐營松山杏山間鑿濠塹絶其糧運明兵自松山夜遁鄂莫克圖追敗之海濱敵騎自杏山遁又步兵潰奔塔山鄂莫克圖先後邀擊並多斬獲七年随軍圍杏山分兵畧寜逺獲牲畜以還明總兵吳三桂以兵六百躡我後戰郤之尋益兵來窺我營鄂莫克圖拒戰大捷窮追至連山敵騎五十自沙河所犯我牧地復往奮擊敵遁走並敗其後隊兵四百錦州既下晉世職二等輕車都尉世祖章皇帝順治元年隨睿親王多爾衮入山海闗擊流賊李自成追敗之安肅及望都尋率前鋒兵征山西殱流賊于絳州渡口二年随英親王阿濟格征陕西破賊延安自成走湖廣追𠞰至安陸連破賊營獲賊艦三十是年叙入闗戰功晉一等輕車都尉三年随肅親王豪格征張獻忠過漢中擊敗叛鎮賀珍兵進𠞰獻忠于西充同䕶軍統領徳爾得赫等連破拒戰賊衆叙功加一雲騎尉三遇恩詔晉爵一等男十一年授正藍旗滿洲副都統十三年致仕康熙十二年卒年七十有八賜祭葬如例子綽世琦襲爵布當弟色􅏢布當姓博爾濟吉特初為烏嚕特部貝子太祖高皇帝天命七年布當與其叔父台吉恩格類各率所部同貝勒明安等來歸别立烏嚕特䝉古一旗賜賚優厚授世職有差恩格類為三等輕車都尉布當為二等輕車都尉天聰三年太宗文皇帝征明布當随貝勒阿巴泰等左翼兵入龍井闗攻遵化明山海闗總兵趙率教等以步騎四千來援布當與㕘領英俄爾岱合軍奮擊大敗明兵叙功晋爵三等男六年從征察哈爾師還以俘獲數少又弗即遵諭歸𨽻户籍且所獲牲畜妄費殆盡及私行圍獵諸罪部議罸鍰奪回賜物及俘獲詔以布當與諸歸順䝉古所行多違例不令别立䝉古旗俱分𨽻諸貝勒各佐領下于是布當與恩格類並𨽻滿洲正藍旗崇徳三年布當擢刑部右㕘政四年卒子衮濟襲爵恩格類卒無子以布當弟色稜襲色稜初從太宗文皇帝征明克遵化圍錦州並有功世祖章皇帝順治元年随睿親王多爾衮入山海闗敗流賊李自成二年復随豫親王多鐸追擊流賊至潼闗師旋賊分兵躡我後色稜與都統恩格圖殿後擊敗賊衆三年随豫親王追擊叛逃䝉古騰機斯敗喀爾喀部土謝圖汗碩雷汗援兵叙功並遇恩詔晉世職至一等輕車都尉兼一雲騎尉十二年卒子扎木揚襲鄂羅塞臣鄂羅塞臣滿洲正藍旗人姓郭絡羅額駙逹爾漢長子也天聰元年從其父征明錦州有斬獲尋任䕶軍㕘領三年從征明燕京同䕶軍統領哈寜阿破明巡撫袁崇焕營太宗文皇帝嘉其善戰授騎都尉世職四年署都統事随貝勒阿巴泰等鎮守永平因取糧遇明兵自開平衛迎戰擊敗之五年從征明圍大凌河城連敗城中出戰兵八年随貝勒薩哈亷畧明山西邉境與崞縣兵遇鄂羅塞臣從第三隊先衆擊敵斬四人獲其馬累功晉二等輕車都尉崇徳元年從征朝鮮與副都統薩穆什喀等敗其援兵二年列議政大臣三年十月随豫親王多鐸征明寜逺錦州有擒斬諜卒功十一月豫親王至中後所將往㑹鄭親王濟爾哈朗軍為明總兵祖大夀所襲㕘領翁克等及随征土黙特部兵先奔鄂羅塞臣同䕶軍統領哈寜阿等且戰且退士卒有死傷者論罪罰贖革世職六年三月随征明圍錦州以聴從睿親王多爾衮等私遣兵丁歸家及離城逺駐坐罸鍰六月復随鄭親王圍錦州殱其樵採者九人連敗明總督洪承疇松山援兵是時祖大夀據錦州突糾步騎出城來犯我鑲黄旗營我左翼三旗騎兵多避敵鄂羅塞臣同㕘領阿桑喜率䕶軍直前奮擊敵挫衂乃遁肅親王豪格欲袒庇三旗之未戰者睿親王附和之皆使人謂鄂羅塞臣曰爾所敗明兵勿言皆爾䕶軍力亦勿言戰時未見騎兵也于是功罪概不論明年事聞上命罸睿親王白金五百肅親王白金千两予鄂羅塞臣以旌之復授二等輕車都尉世職擢任副都統八年同㕘政巴都禮等征黒龍江克之撫定其地順治元年凱旋世祖章皇帝遣侍郎明安逹禮往迎宴勞以所獲户口分𨽻八旗二年随大軍擊流賊李自成師抵潼闗賊嬰城固守鄂羅塞臣奮勇先登殺賊無算五年正月命統兵駐守滄洲十二月復率兵赴英親王阿濟格軍協𠞰叛鎮姜瓖六年以録叙世効勞績舊臣晉一等輕車都尉詔以鄂羅塞臣為和碩公主子特恩晋爵三等男世襲罔替是嵗七月擢正藍旗䝉古都統尋兼任刑部侍郎两遇恩詔晉二等子七年坐讞獄狥情罷侍郎任明年授都察院左都御史尋觧任専管都統事十三年以疾乞休不允十六年同安南將軍明安逹禮率兵駐防荆州㑹海賊鄭成功犯江寧鄂羅塞臣同明安逹禮等赴援戰于揚子江中海賊敗竄十七年還京仍任都統康熙三年卒贈太子太保賜祭𦵏諡果敏子鄂忒渾襲覺羅郎球覺羅郎球滿洲正藍旗人景祖翼皇帝第三兄索長阿之曾孫也初任理事官兼䕶軍㕘領天聰三年從太宗文皇帝征明燕京以中途逗遛罰鍰奪所俘獲九年大軍征明廣寜郎球同㕘領圖頼等率兵四百先趨錦州有斬獲功擢刑部承政兼䕶軍統領進列議政大臣崇徳三年睿親王多爾衮征明上親帥諸王送之豫親王多鐸不至詔禁王不得出府門是時郎球為豫親王属下上因怒曰朕屢諭郎球王若有過爾當諫諍乃竟謟媚逢迎見王怠玩如此不行規正可速執之既而上命豫親王同大軍赴山海闗制明寜逺錦州援兵諭諸王貝勒大臣曰多鐸等前罪姑俟班師後議郎球出任職如初㑹豫親王軍行失律上欲申飭其罪命郎球召王郎球違命不往詔解任下廷議并論前罪明年五月王大臣等以郎球瞻徇𨼆黙復藐視上命罪應死籍沒奏聞得㫖從寛革世職罷任六年随征錦州與副都統星訥擊敗松山援兵登山克敵又與㕘領鰲拜敗敵步兵論功扺前罪復任㕘領命率䕶軍助内大臣錫翰等設伏髙橋擊敗杏山逃兵追至塔山斬獲甚衆七年授禮部㕘政明年擢承政順治元年世祖章皇帝定鼎燕京郎球任禮部尚書賛定郊廟大典二年授騎都尉世職三年随順承郡王勒克徳渾征湖廣流賊師至石首縣偵知賊欲渡江攻荆州大軍進擊郎球先率兵趨江濵㫁賊後路取賊船千餘賊自荆州敗還不得渡悉為大軍斬獲四年六月考滿晉三等輕車都尉六年授本旗都統兼吏部尚書七年四月調刑部尚書先是五年九月鄭親王濟爾哈朗統兵之長沙郎球署副都統以隨至是凱還得優賚八年正月英親王阿濟格有罪郎球坐狥𨼆罷任削世職籍家産之半明年三月復授禮部尚書十月列議政大臣十一年加太子太保尋加少保兼太子太保調戸部尚書十三年五月以員外郎朱世徳虧缺𣙜稅户部援恩詔請豁部臣均坐狥庇郎球削少保觧任康熙五年二月卒年七十有三賜祭𦵏如例阿爾津阿爾津姓伊爾根覺羅世居穆溪父齊瑪塔太祖高皇帝時来歸𨽻滿洲正藍旗任侍衛阿爾津初與其從兄阿山屢從征伐積功授二等輕車都尉世職任㕘領太宗文皇帝天聰四年都統納穆泰等駐守灤州明兵来攻阿爾津力戰弗能却敵發巨礮擊城城將墮納穆泰等度不能支率衆走永平阿爾津隨行遇敵斬殺甚衆及永平復失守上命盡擊諸將以阿爾津於灤州城内曾力戰既出復能殺敵特貰之九年大軍征察哈爾阿爾津随貝勒岳託駐歸化城有博碩克圖汗之子結阿禄部喀爾喀部陰與明通阿爾津與㕘領吳巴海等擒其往來使者並獲馬駝及貂皮等物晉世職一等輕車都尉崇徳元年上親征朝鮮其國王李倧遁入南漢山城阿爾津率精鋭追躡敗其援兵于要隘二年率每旗親軍五人往鐵山緝明哨卒尋列議政大臣管䕶軍統領事三年随豫親王多鐸征明過中後所明總兵祖大夀以兵襲追阿爾津殿後部卒被殺及王督兵還擊阿爾津戰弗力又不收載亡卒骸骨坐革世職籍家産半仍管䕶軍統領事五年随大軍圍錦州以離城逺駐坐罸鍰六年明總督洪承疇守松山阿爾津屢擊敗其步騎兵敵走保一臺阿爾津率三旗䕶軍攻克其臺斬敵將三人盡殱其衆復破敵營三并援出前鋒之被圍者上嘉其善戰仍授三等輕車都尉世職七年從征寜逺敗城中出戰兵八年同䕶軍統領哈寜阿等往征瑚爾哈部攻克博和哩諾爾噶勒都里三屯其大噶勒達蘇小噶勒逹蘇綽康纒能吉勒四屯皆降俘獲無算師還得優賚順治元年隨大軍入山海闗擊敗流賊李自成率前鋒軍追及扵安肅縣斬殺甚衆二年晉二等輕車都尉兼一雲騎尉尋随豫親王討流冦至潼闗賊將劉方亮來窺我營阿爾津率五旗將士擊破其衆賊望風奔潰我師遂入闗賊渠李自成焚所居室挈子女奔商州阿爾津將兵往追不及别圍賊三百于途盡殺之乃還復從征江南有功晉三等男三年五月同䕶軍統領鰲拜等擊敗叛鎮賀珍兵于漢中張獻忠自四川率馬步兵來戰阿爾津與䕶軍統領蘇拜等連擊敗之時正藍旗兵為賊所困復與蘇拜等往援之出進攻叙州所至克捷五年六月晉一等男十月率兵赴宣化平赤城叛兵六年觧䕶軍統領任七年復任䕶軍統領八年與都統額克青等舉發英親王阿濟格罪狀初睿親王多爾衮薨英親王以阿爾津舊𨽻豫親王下使人召之阿爾津因睿親王甞禁諸王属下人與英親王往來謂使者曰吾弗至王所三年矣當告之睿親王属下大臣遂詢之額克青等僉曰宜往覘其言動乃往英親王責其不附已且妄為大言阿爾津還告額克青等于是共訐英親王言動悖亂諸罪鞫寔幽禁阿爾津得奨叙晋爵二等子两遇恩詔晉一等子加一雲騎尉九年授安西将軍鎮守漢中尋命為定南将軍移𠞰湖廣賊冦十一年由䕶軍統領遷都統十二年授寜南靖冦大将軍統師之荆州時歸州賊姚黄等出沒宜昌襄陽間阿爾津率兵往剿連破走之招撫兵民萬餘分置枝江松滋諸邑十三年同都統卓羅等征辰州賊聞大兵至棄城走追破之于瀘溪賊盡竄入山谷斬獲無算遂復辰州凡寳慶永順諸土司悉籍所轄人户來降先是辰州屢下縁守兵寡輙復為賊䧟至是阿爾津議移常徳鎮兵守之而别移兵駐常徳為應援否則以所部兵留守辰州咨商經畧大學士洪承疇承疇以常徳兵力難分禁旅不宜擅留覆之阿爾津復移咨曰辰州境内之民及各土司相率歸順若増兵守之則沅靖可達沅靖一得可進取滇黔今棄而不守賊必復來我士馬疲煩豈能數數踰越險阻且百姓既歸附一旦棄之去非惟失向化之心亦無以示信于後也承疇以其言疏聞上命阿爾津班師以鎮守事委承疇速籌十五年正月奉命統本旗兵随信郡王多尼進取雲南五月病劇卒于軍贈太子太保諡端果立碑如例子濟世襲爵科爾崑科爾崑滿洲正藍旗人姓阿顔覺羅世居瓦瑚木父碩色任佐領科爾崑初為貝勒阿巴泰䕶衛天聰六年從太宗文皇帝征察哈爾崇徳元年從征朝鮮皆有功授前鋒䕶衞五年随鄭親王濟爾哈朗攻明錦州明師數萬據松山科爾崑同佐領索渾前鋒㕘領瑚里布誘敵步戰敗之明總督洪承疇總兵祖大夀合兵十餘萬迎戰科爾崑同索渾等衝入敵陣俘斬無算六年随英親王阿濟格駐師杏山寜逺敵騎數千來犯科爾崑先衆馳擊敗敵追至連山馬中流矢仆科爾崑躍起斃敵甲騎奪馬而還尋随英親王閱視寜逺長壕敵騎猝至索渾䧟重圍科爾崑單騎翼以出沙河所數千騎犯我牧地科爾崑率前鋒逆擊敗敵躡追之與明援兵遇射殪一人七年随貝勒阿巴泰征明自薊州入邉次豐潤遇明總督范志完軍奮擊破之又同前鋒㕘領鄂碩敗敵援兵至河西務以數十騎偵敵敵見我軍遁走科爾崑追及一騎手搏之敵與馬俱堕水擒以歸八年授佐領兼兵部理事官世祖章皇帝順治元年四月隨睿親王多爾衮討流賊李自成擊敗賊兵于山海闗追至望都六月随都統葉臣征山西進攻太原賊兵突出城拒戰科爾崑擊敗之設伏以待夜半賊果至伏發盡殱焉又随英親王追李自成于湖廣連破賊營叙功授世職騎都尉兼一雲騎尉三年随肅親王豪格征流賊張獻忠過漢中擊敗叛鎮賀珍兵進擊獻忠于西充之鳯凰山大破之獻忠既殪復分𠞰其餘黨斬獲甚衆五年凱旋晉三等輕車都尉遇恩詔晋二等輕車都尉六年任前鋒叅領隨鄭親王濟爾哈朗征湖廣是時明桂王朱由榔以其衆據湘潭科爾崑與前鋒統領席特庫努山等先薄城破其西門遂取湘潭下寳慶武岡分兵趨沅州偕前鋒㕘領白爾赫圖以數十騎擊賊白爾嚇圖䧟圍失馬科爾崑奪敵馬掖之上並馬突圍出復縦騎奮擊大敗賊進克沅州又克道州龍虎闗復遇恩詔晉一等輕車都尉兼一雲騎尉九年随敬謹親王尼堪征衡州桂王将李定國列象陣抗拒科爾崑對陣射之貫象鼻象奔大破賊兵又敗孫可望于寳慶時敬謹親王自衡州進征遇賊伏歿于陣貝勒屯齊遣學士碩岱同科爾崑先還奏捷不言王陣殁状既而事聞下議政王貝勒大臣㑹勘科爾崑應褫職籍没上從寛僅革世職十三年擢䕶軍統領十四年孫可望與李定國相攻不勝携妻子來降定國遂與同列白文選等擁由榔據雲南詔大兵三路進取貴州寜南大将軍宗室羅託自沅州進科爾崑率兵從既取貴陽羅託駐守令科爾崑率兵五千取黄平州以副都統瑪爾賽副之科爾崑聞白文選方踞七星闗議以瑪爾賽分兵二千由大道緩進誘文選出戰且戰且却而自統兵三千由間道疾趨乘其後瑪爾賽至萬竒嶺文選果率衆迎戰瑪爾賽佯敗退走數十里文選躡追科爾崑突出其背呼噪縦擊文選後軍亂瑪爾賽還師夾攻賊潰遁遂取黄平明年還京初李自成死其黨㪚處湖廣大兵既定湖南貴州乃竄伏歸州興山間聖祖仁皇帝康熈二年命都統穆里瑪為靖西将軍都統圖海為定西将軍統八旗兵赴荆州會合湖廣陕西四川兵𠞰賊科爾崑領䕶軍以随時賊渠李來亨踞茅麓山兩將軍議分道進討圖海出歸州穆里瑪出宜昌料爾崑率兵五千與前鋒統領賴塔先驅遇賊搏戰三戰皆捷冄奪賊壘直抵茅麓山已而賊黨郝永忠黨守素來援衆且數萬來亨亦悉衆迎戰科爾崑與穆里瑪登髙以望伺賊稍怠下令縦擊大破賊衆日夕宻傳令設伏夜半来亨果率萬餘衆襲我營伏發敗之明日賊黨數千以大刀藤牌列陣我兵分两翼緩進科爾崑擣其中堅賊敗潰時賊倚譚家砦故巢屯粮為持乆計科爾崑復分兵東絶賊運道師扺石坪賊阻險拒守科爾崑偕總兵徐治都于大海鮑敬等三路攻拔其柵進至譚家砦偽侯李嗣名率衆拒戰中流矢死餘賊遁入砦科爾崑以兵扼其衝㫁賊汲道未二旬賊渠髙必正黨守素等率偽侯三人偽官属一百六十人詣軍門降科爾崑旋師與穆里瑪合而圖海亦滅劉汝魁諸賊㑹師茅麓山令緑旗兵作長圍滿洲兵分守衝要賊頻犯我軍奮擊之殱殪殆盡来亨自經死餘黨悉降乃班師叙功授雲騎尉世職八年十一月卒賜祭𦵏如典禮子莫洛洪襲雅秦雅秦滿洲正藍旗人姓覺爾禅巴克什逹海之長子也天聰七年太宗文皇帝以逹海淹通典籍宣力有年特賜騎都尉世職命雅秦承襲兼管佐領事崇徳三年随睿親王多爾衮等征明毁董家口邊墻進師過燕京趨山東所至克捷師還出青山口遇明邉兵雅秦以步戰敗之明年随大軍攻松山有功六年鄭親王濟爾哈朗同武英郡王阿濟格等統左右翼将士圍錦州城中兵突出犯我營壘雅秦率所部兵撃退其衆師旋任吏部理事官八年考滿加雲騎尉世職尋調户部理事官世祖章皇帝順治元年正月都察院承政滿逹海劾奏豫親王多鐸擅按籍集視八旗女子雅秦復以不在籍女子私與王視下部議罪王罰鍰雅秦削雲騎尉職仍罰鍰四月隨睿親王多爾衮入山海關擊敗流賊李自成二年敘功復加雲騎尉四年考滿晉職三等輕車都尉世襲罔替八年三月授吏部侍郎七月擢國史院大學士十月卒先是雅秦三遇恩詔累晉世職至三等男九年正月上以吏部前奉覃恩予襲過濫命改為一等輕車都尉兼一雲騎尉予其子禪布襲康熙二十一年聖祖仁皇帝以逆藩殄滅海宇蕩平加恩勲舊諸臣詔遣官致祭雅秦墓欽定八旗通志巻一百七十五
