body:
  text: 欽定四庫全書欽定八旗通志卷二百十九人物志九十九忠義傳十一滿洲八旗十一十人雍正十年共六福祿福祿滿洲鑲黃旗人姓伊爾根覺羅氏世居訥音地方任護軍校雍正七年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾遇賊力戰陳亡賞恤如例木爾投木爾投滿洲鑲黃旗人任雲騎尉委署參領駐防盛京雍正十年隨參贊大臣阿岱征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例武占武占滿洲鑲黃旗人任護軍校雍正十年七月從靖邊將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陳亡賞恤如例布爾哈布爾哈滿洲正黃旗人姓伊爾根覺羅氏世居寧古塔地方任城守尉雍正九年隨副都統額爾苓征凖噶爾十年隨靖邊大將軍內大臣公傅爾丹與賊戰于烏孫珠爾陳亡賞銀七百兩恩賜雲騎尉世職承襲詳見世職表夸色夸色滿洲正黃旗人姓瓜勒佳氏世居蘇完任副護軍校雍正十年隨靖邊將軍公傅爾丹征凖噶爾遇賊戰于烏孫珠爾陳亡賞恤如例如寶如寶滿洲正黃旗人姓伊爾根覺羅氏世居都甕任副護軍校雍正十年從靖邊將軍公傅爾丹征凖噶爾與賊戰于烏孫珠爾陳亡賞恤如例隆保隆保滿洲正黃旗人任副護軍校駐防阿爾泰雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例那蘭泰那蘭泰滿洲正黃旗人姓李佳氏世居薩木查任護軍副參領雍正十年從靖邊將軍公傅爾丹征凖噶爾與賊戰於烏孫珠爾陳亡賞恤如例尼雅漢尼雅漢滿洲正黃旗人姓薩克達氏世居奉天任護軍校署參領雍正十年隨靖邊將軍公傅爾丹與賊遇于烏孫珠爾力戰陳亡賞恤如例額爾青額額爾青額滿洲正白旗人由護軍署護軍校康熙五十九年隨副將軍阿爾那在吐爾畨效力屢戰得頭等功牌雍正十年七月隨靖邊將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陳亡賞恤如例六格六格滿洲正白旗人雍正六年由護軍署護軍校駐守巴里坤十年七月隨靖邊將軍公傅爾丹征凖噶爾于烏孫珠爾力戰陳亡賞恤如例四明四明滿洲正白旗人姓瓜勒佳氏世居蜚悠城地方任護軍參領雍正七年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡賞恤如例九達色九達色滿洲正白旗人由護軍署護軍校雍正七年隨靖邊將軍公傅爾丹征凖噶爾十年七月至烏孫珠爾擊賊陳亡賞恤如例瑚什巴瑚什巴滿洲正白旗人任驍騎校雍正七年隨靖邊將軍公傅爾丹征凖噶爾十年七月至烏孫珠爾擊賊陳亡賞恤如例彰保住彰保住滿洲正白旗人姓納喇氏世居葉赫地方委署護軍參領於雍正九年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表包六包六滿洲正白旗人任護軍參領雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例貴東貴東滿洲正白旗人由領催委署副驍騎校駐防盛京雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾遇賊力戰陳亡賞恤如例查爾布查爾布滿洲正白旗人姓扎庫塔氏世居瓜爾察地方任護軍校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表穆騰額穆騰額滿洲正白旗人姓舒穆祿氏世居沾地方任護軍校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表克爾吉楞克爾吉楞滿洲正白旗人由佐領委署參領雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表多奈多奈滿洲正白旗人署護軍校雍正十年七月隨靖邊將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊歿于陳賞恤如例福綬福綬滿洲正紅旗人姓伊爾根覺羅氏世居胡努渾畢郎阿地方由領催委署防禦駐防右衛雍正七年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡賞恤如例兆住兆住滿洲正紅旗人姓薩爾圖氏世居葉赫地方由驍騎校委署參領駐防右衛雍正七年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表瑚什屯瑚什屯滿洲正紅旗人姓薩爾圖氏世居葉赫地方前鋒校委署驍騎校駐防右衛雍正七年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡賞恤如例沙色沙色滿洲正紅旗人姓多羅氏世居葉赫地方任雲騎尉兼城守尉雍正九年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡賞恤如例興量興量滿洲正紅旗人姓托活絡氏世居哈達地方任副護軍校雍正九年隨靖邉大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡賞恤如例偏圖偏圖滿洲正紅旗人由領催委署驍騎校駐防盛京雍正十年隨護軍統領阿岱征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例全保全保滿洲正紅旗人姓董鄂氏世居葉赫地方任護軍校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表騷達色騷達色滿洲正紅旗人任副護軍校雍正十年七月從靖邊將軍公傅爾丹征凖噶爾至烏孫珠爾與賊力戰陳亡賞恤如例素色素色滿洲正紅旗人由雲騎尉委署參領雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾遇賊力戰陳亡恩賜騎都尉世職承襲詳見世職表富長富長滿洲正紅旗人姓納喇氏世居葉赫地方任三等輕車都尉雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例富成額富成額滿洲鑲白旗人任護軍校駐防阿爾古雍正九年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表珠理珠理滿洲鑲白旗人駐防盛京初由領催委署防禦於雍正十年隨靖邊將軍公傅爾丹擊賊於烏孫珠爾陳亡賞恤如例和倫太和倫太滿洲鑲白旗人駐防盛京雍正十年七月由驍騎校隨靖邊將軍公傅爾丹征凖噶爾在烏孫珠爾與賊力戰陳亡賞恤如例普明普明滿洲鑲紅旗人由護軍校委署護軍參領雍正六年四月隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表福德福德滿洲鑲紅旗人姓鈕祜祿氏世居英額地方任副護軍校雍正七年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡賞恤如例愛茗阿愛茗阿滿洲鑲紅旗人姓舒舒覺羅氏世居佛呵喇地方任護軍校雍正九年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表隆周隆周滿洲鑲紅旗人任驍騎校雍正九年從大兵征凖噶爾十年正月二十三日遇賊於抬爾納勒地方戰歿賞恤如例定住定住滿洲鑲紅旗人姓嵩佳氏世居瓦爾喀錫地方任護軍校雍正九年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表瑪爾圖瑪爾圖滿洲鑲紅旗人由領催部委防禦駐防黑龍江雍正十年八月初四日隨副都統塔爾岱至厄爾得尼昭遇賊力戰陳亡賞恤如例木騰額木騰額滿洲鑲紅旗人姓鄂卓氏世居葉赫地方由護軍校委署參領雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例義氣義氣滿洲鑲紅旗人姓瓜勒佳氏世居安福拉庫內阿胡芬固吉里村地方委署驍騎尉雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例那爾泰那爾泰滿洲鑲紅旗人委署驍騎校駐防盛京雍正十年隨副都統參贊大臣阿岱征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例僕明僕明滿洲鑲紅旗人姓烏齊喜特氏世居厄魯特地方由護軍委署護軍校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表七雅圖七雅圖滿洲鑲紅旗人姓瓜勒佳氏世居衣蘭窩河地方由護軍委署護軍校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例麻色麻色滿洲正藍旗人姓西林覺羅氏世居佛阿拉任副護軍校雍正七年隨靖邊將軍公傅爾丹征凖噶爾十年與賊戰於烏孫珠爾陳亡賞恤如例竒三泰竒三泰滿洲鑲藍旗人世居輝發地方任副前鋒校雍正十年隨靖邊將軍公傅爾丹征凖噶爾至烏孫珠爾與賊力戰殁於陳賞恤銀二百兩色倫泰色倫泰滿洲正藍旗人由領催委署間散章京駐防盛京雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例瑪斯哈瑪斯哈滿洲正藍旗人姓賽密勒氏世居黑龍江地方由護軍校委署𠫭領雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表隆保隆保滿洲正藍旗人任前鋒參領雍正十年隨靖邊將軍公傳爾丹征凖噶爾至烏孫珠爾遇賊力戰歿賞恤如例永泰永泰滿洲正藍旗人姓納喇氏世居葉赫地方部委署護軍校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例明山明山滿洲正藍旗人任副護軍校雍正十年隨靖邊將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陳亡恩賞銀二百五十兩鄂爾布鄂爾布滿洲正藍旗人任副護軍校雍正十年七月隨靖邊將軍公傅爾丹征凖噶爾至烏孫珠爾與賊力戰陳亡賞恤如例瑪什太瑪什太滿洲鑲藍旗人姓瓜勒佳氏世居瓦爾喀地方任三等輕車都尉兼佐領雍正六年隨靖邊大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾與賊力戰陳亡賜祭葬克爾吉楞克爾吉楞滿洲鑲藍旗人署參領駐防盛京雍正十年隨靖邊大將軍內大臣公傳爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例達四黑達四黑滿洲鑲藍旗人任副護軍校雍正十年從靖邊將軍公傅爾丹征凖噶爾在烏孫珠爾擊賊陳亡賞恤如例珠魯珠魯滿洲鑲藍旗人姓完顔氏世居敖爾渾地方任副護軍校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例成明成明滿洲鑲藍旗人姓舍瑪里氏世居董鄂地方部委護軍校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾遇賊力戰陳亡賞恤如例泰布泰布滿洲鑲藍旗人姓佟佳氏世居佟彥地方任驍騎校雍正十年隨靖邊大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例都鼐都鼐寧古塔鑲藍旗人由佐領委署參領雍正十年隨靖邊大將軍內大臣公傳爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡賞恤如例欽定八旗通志卷二百十九
