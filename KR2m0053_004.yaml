body:
  text: 欽定四庫全書欽定八旗通志卷首之二天章二世宗憲皇帝御製詩賜莊親王一本論瓜瓞連枝喜最親推恩先邇室略分講家人盡洗膏粱習須教學業醇股肱兼耳目屬望更諄諄賜裕親王朱邸連雲翼紫宸屏藩重望屬親臣銀潢𣲖接恩波近玉葉枝分湛露新善體詒謀惟愛國逺承家法在勤民同心夾輔應無忝長鞏瑶圖億萬春賜怡親王天上根盤若木枝朝陽輝映日紛披葵心北拱輸丹禁棣萼春榮護赤墀幹濟有才頻入告職司無缺亦書思忠勤佐就升平業長保勳名奕世垂賜果郡王花萼連枝夾帝京英才挺秀信維城沖和自保穰穰福恭敬無勞赫赫名同氣一堂親燕笑推恩千祀佐休明更期永矢忠勤節長看盤根應候榮賜大學士馬齊黃扉出入領朝簮宿德耆英眷注深才是濟川需作楫功同望嵗佇為霖常思國事如家事益勵臣心沃主心喜起明良傳盛烈薰風千載播瑶琴賜大學士松祝玉陛覘風度金甌卜姓名常時依紫極何以福蒼生化理資調燮訏謨屬老成公忠勤體國力為贊升平賜大學士白潢密勿黃扉重清時掌國均平成需弼亮光輔貴經綸共勉三公職無慚一個臣蓼蕭多雨露應及老成人賜大學士徐元夢位以中台峻名因主眷髙六卿推舊德百職藉薰陶報國訏謨切銜恩翊贊勞運籌稱自昔前席禮頻叨賜內大臣馬武禁籞宣勞重近臣貂蟬奕葉載恩綸入參帷幄抒丹悃出典周廬翊紫宸鎮靜實堪心膂寄老成尤見性情純天家濊澤無私厚勤恪應霑雨露頻賜尚書孫柱卿月光華燦朝廷任重臣分曹資輔國列位濟斯民正直先寮屬端嚴領縉紳所期𢎞偉略報國不謀身賜莊親王金章玉珮冠通侯班列彤階最上頭儀表宗潢髙樂善屏藩王室重宣猷桐圭分錫開朱邸棣萼聫輝映鳯樓捧日丹忱勤翼贊天家恩澤自長流賜果郡王天潢崇錫爵宗子重維城共荷屏藩寄知敦翼贊情好書傳沛獻樂善紀東平望古幾前哲相期保令名賜怡親王勤政樓頭花萼芳親賢心膂藉匡襄忠誠謹慎謨猷著公正亷明譽望彰經理度支需贊畫疇咨水土奏豐穰年年景福由天賜長秉丹衷達九閶賜總督查弼納時雍佳氣浹寰瀛繡戟牙幢制閫榮兩省風霜澄吏治三春雨露洽輿情位髙定效公忠實職巨非循亷謹名文武兼資才自裕佇期嘉績佐升平賜總督楊宗仁絳節金章制上遊雄藩兼控主恩優分疆名帥歸鈐轄繡錯方州待運籌文武和衷羣吏憲軍民一體大臣猷殷勤早夜遵天語會見酬庸第一流賜淳親王滿樹繁花應候榮蟠根奕葉託瑶京試看華萼相承意更聽塤箎迭和聲帶礪永存苗裔業豆籩有踐弟昆情天朝屏翰家庭事莫負皇心眷顧誠賜都統拉錫羽林十二應星文直宿周廬向夜分陳識風雲才自裕身依日月志彌勤鷹揚早領熊羆士虎拜常參鵷鷺羣辦得丹心捧宸極時清莫漫羡竒勳賜提督郝玉麟元戎擁節鎮巖疆特簡殊榮姓氏香閫外長城資一面胸藏武庫靖多方旌旗整暇軍容肅紀律嚴眀士氣揚盛世籌邊重頗牧楓宸應為錫龍光賜提督髙其位太和纍洽慶櫜弓専閫還推赫濯功裨益軍民資偉略劑調文武在和衷拊循正及從容日謀勇皆由訓練中元老旗常書茂績雅歌應有穆如風賜怡親王皇皇藩服惟德是榮眷言賢王謨猷光明夙夜小心以忠以誠弼豫一人庶績用成嘉兹翊贊朱邸斯營上棟下宇永安且寧有䇿其基有壯其楹奕世承之長衛帝京慶既令居式昭頌聲如意歌賜怡親王彩雲冉冉鸞鶴翩鸞鶴背馭雙神仙南極西池環珮聫雙雙同慶帝胄賢手執如意來當前篆刻蝌蚪黃金填晶熒上下星文躔瑶臺此日喜氣偏琅琅更聽仙語傳唱隨偕老如和絃既指山海為嵗年復言日月同團圓煌煌帶礪眷便便子孫永保福且綿豫因仙語嘉喜駢為爾歌雙如意篇己酉夏南甸大閲陳師鞠旅卜良朝萬里餱糧備己饒習戰自能間紀律臨戎惟在戒矜驕劍瑩鸊鵜清光閃旗繞龍蛇赤羽飄聽徹前鋒歌六月雲臺合待姓名標其二風拂榆槐曉角鳴築壇選將命専征颼颼羽箭穿楊巧獵獵雲旓耀日明萬里玉關平虜穴三秋瀚海渡天兵裹糧帶甲須珍重掃蕩塵氛逺塞清賜總督髙其倬崇牙髙建秉洪鈞逺控巖疆軼等倫兩省山河司管鑰萬民肥瘠視經綸還持綘纛開軍壘永失丹忠答禁宸操凜氷霜功帶礪匡時重鎮眷良臣哭怡賢親王二首宗室屏藩重朝端柱石崇持身惟正直應物本虛公青史經天略丹心貫日忠銜哀為作誄難與述豐功其二繐帳陳筵日雲軿載道時悲深萬民淚痛失百寮師獻替猶如昨儀容儼在斯可憐風雨急花萼損連枝怡賢親王挽詩三十韻天錫親賢篤本支惟王德業贊純熙功存廊廟寰區仰道冠宗藩百辟儀少日溫恭承帝眷髫齡孝謹荷恩慈問安每候龍樓啓扈蹕常隨豹尾馳圭璧精神昭粹質鳳麟苞彩擅英姿自然才藝該文武卓爾端凝絶黨私三紀無慚臣子道八年攸賴股肱資溯從大統祗承日厯想嘉猷翊輔時佐理萬幾安億兆綜釐庶政挈綱維度支式定邦財裕水利功興浩澤施減賦蠲逋勤布算櫛風沐雨勸鎡基淤流通處成膏壤田壠開時養稻粢九品掄才分玉石六韜訓士總熊羆霜威秋肅明條教愷澤春溫善撫綏萬里邊防襄廟算兩軍輸挽佐疇咨任兼宫府仔艱巨理析豪釐辨等差偉績固難更僕數清標更繫久長思撝謙不恃金枝貴精白匪求黼座知樂善薦賢時亹亹奉公體國日孜孜寬仁恤下孚羣望亷潔居心凛自持八字褒崇皆實行四時賜賚必晴曦慶流正喜天人合善積還期福祿宜豈意賡揚方際盛忽驚寢疾永暌離鞠躬遑恤身前計矢志空餘沒後悲猶憶懇情辭吉地竟循薄葬守遺規公卿徒步隨旌仗老稚扶觀泣路岐贈諡載光崇德典加壇還樹册勳碑明禋配享千秋重素服銜哀浹月期縱極寵榮頒禮數難酬懿美罄言詞應知靈爽歸仙籍留得鴻名萬古垂年華迅速倐值端陽箱貢氷紈案陳角􅎟於頒賜諸王大臣之際念及吾弟怡賢親王仙遊己周一載不禁淒然涕下援筆賦此韶光荏苒暗中遷開到榴花又一年節屆香蒲陳似舊貢來細葛賜誰先檢文悲覽賢臣頌搦管慵裁棣萼篇偉績殊勳無可答為營佳兆表新阡端陽前一日為吾弟怡賢親王二周之辰每一回思輒傷懷抱作五言律志感詰朝端午節再命罷稱觴嵗月如流邁容儀何日忘安邦思柱石覔句夢池塘物候頻增感情隨綵縷長壬子嵗九月七日吾弟怡賢親王定窆於水東村朕念手足至誼兼以輔弼功勤獻替忠欵撫今憶昔情不能己因親臨奠送稍伸積痛夫神遊於天魄藏於地亘古迄今理之常也但以吾弟之親賢為國家柱石幽明異路於兹永别當深秋草木黃落之際朕心曷勝悽愴爰賦此詩以寫懷西風瑟瑟草離離慘對靈筵奠酒卮荆樹凋殘驚日晚雁羣零落入雲悲邈焉不返遊仙夢行矣休歌薤露詞此際親臨無限痛九泉英爽料應知世宗憲皇帝御製文清漢文孝經序孝經者聖人所以彰明彛訓覺悟生民溯天地之性則知人為萬物之靈敘家國之倫則知孝為百行之始人能孝於其親處稱惇實之士出成忠順之臣下以此為立身之要上以此為立教之原故謂之至德要道自昔聖帝哲王宰世經物未有不以孝治為先務者也恭惟聖祖仁皇帝纘述世祖章皇帝遺緒詔命儒臣編輯孝經衍義一百卷刋行海內垂示永久顧以篇帙繁多慮讀者未能周遍朕乃命専譯經文以便誦習夫孝經一書詞簡義暢可不煩注解而自明誠使內外臣庶父以教其子師以教其徒口諷其文心知其理身踐其事為士大夫者能資孝作忠揚名顯親為庶人者能謹身節用竭力致飬家庭務敦於本行閭里胥嚮於淳風如此則親遜成化和氣薰蒸躋比户可封之俗是朕之所厚望也夫清漢文小學序古者八嵗而入小學教之以灑掃應對進退之節愛親敬長之義俾童而習之以養其德性其説散見經傳朱子採集為小學一書所以示人教學之方而有以為正心修身之本其言約其理該蓋六經四子性理諸書之階梯也皇考聖祖仁皇帝嘗特頒諭旨令有司兼以命題課士海內士子固己咸知誦法矣又命尚書顧八代一人翻譯清文日進呈覽欽定三年而後成嘉惠後學之心至深且厚當日未經刋刻頒行朕敬承皇考遺志特命校對授梓以資肄習讀者宜知綱常倫紀之當崇視聽言動之當謹與夫嘉言懿行之當遵循慕效修其職自在家庭日用之常經而充其量可以成聖賢忠孝之大節子弟之習於是而淳教化之原於是而備詩曰成人有德小子有造朕蓋深有望焉和碩怡賢親王遺稿題辭朕弟怡賢親王天資髙卓頴悟絶倫如禮樂射御書數之屬一經肄習無不精妙入神為人所莫及而其心則謙抑遜讓欿然不自足也平日所作詩篇抒寫性情和平大雅無纎毫塵腐之氣而王自謙學力不充總未存稿是以王仙逝後邸中竟無留存者因憶昔年兄弟聚首時宴集唱和王每以所作就正於朕朕扈從塞垣王亦間有寄懷之句片楮寸縑朕皆愛而藏之不令棄置今檢點篋笥中得王詩三十二首爰彚為一帙附於朕詩集之後以存其概此在王雖為餘事然自古名臣碩彥偶有吟咏著述即殘篇剩簡而當時後世之人咸寶重愛惜流傳歌誦想慕其為人初不在篇什之繁富所謂詩以人重也王以不世出之名賢而有此清新俊逸之詞翰且忠孝慈惠之意藹然流露於筆墨間吉光片羽豈惟朕心不忍湮沒亦天下後世所共珍歟賜原任總督楊宗仁像贊粵稽往代崇奬勳賢名藏太室身畫凌煙眷余良佐令德無愆逮事聖祖開府旬宣暨於朕躬制閫斯遷亷潔之守如氷在淵耿介之性如石彌堅嘉乃丕績湖湘澤延未遑三接昔用拳拳兹覽遺照儀度凝然清風亮節丹青是傳錫以宸翰煥彼瑶編朂哉後昆永紹厥先和碩怡賢親王碑文朕惟國家啓昌隆之運則誕降名臣祖宗鍾福慶之貽則篤生賢胄粵若師師虞代稷契為帝室之英濟濟周朝旦奭是姬宗之彥莫不紀諸謨典頌以聲詩前績可稽遺編具在如朕弟怡賢親王則於古有光者也王秉乾坤之清淑萃川嶽之精華爰自幼年早徴至行禁庭奉誨循禮度以持躬內殿承歡篤孝思於繞膝實超出於同氣久默識於中懷是以纘紹之初慎選親賢之寄特加恩命晉授王封正在亮隂俾膺總理當良姦之雜處以鎮靜服羣情遇綱紀之待釐以精明襄萬務成勞既著眷倚逾殷綜中外之訏謨司兵農之大計而王恪勤匪懈兢勵彌深體朕心為己心視國事如家事詳核度支之積竇府藏充盈請蠲吳越之浮糧閭閻康阜興田功於畿內粳稻連疇籌水利於江南河渠順軌至若邊形指掌瞭大勢於川原武略在胸贊成謀於帷幄壯戎容於雁磧組練鮮明裕軍實於龍沙驊騮騰躍蒼黔恬樂罔聞徴彂之煩朝省安間莫見運籌之迹是其潛思默算備竭精誠故能應變投機不形聲色者矣扶持正直公道於以昭彰薦達猷為人材由兹奮起度惟謙挹同事務協於和衷量本寬洪曺官胥歸於涵茹領周廬之環衛訓練維勤定宫府之規模施為悉當凡關於民生吏治知無不言曽經其熟計深圖言皆有效祗慎而不宣於衆退謙而恐居其名皆中禁之密陳豈外廷之能曉心迹則青天白日衾影無慚節操則瑩玉清冰垢塵不染研幾窮理得聖經賢傳之精微輔世寧民具帝佐王臣之藴負道光竹帛恢平章調燮之勳瑞叶星雲樹喜起眀良之範朕實賴王治安寰宇王實為朕翊贊升平既厯八年有如一日斯乃上天降佑烈祖垂庥賚良弼於本支作盛時之梁棟於皇考為孝子於朕躬為純臣自昔罕倫在今幸覯惠慈之性宜其克享遐年豈弟之恩足以迓承繁祉人情胥願天數難齊詎盡瘁以忘軀遂抱疴之纒體禱神祇而靡應商醫藥而弗瘳王忠愛之忱始終一致沉綿之候遷避而弗敢上聞危篤之期溘逝而慮傷永訣朕將臨視王己飄升望幻影於雲中靈竒示象蛻色身於塵界慧覺超凡生有由來理當可信王幽眀感德逺近歸仁錫命每申則日晴紫陌祖筵方徹則風藹青阡虔叩繐帷動舉朝之痛憶競隨素紼溢長路之悲號嘗賜標題略傳梗槩忠敬而兼之誠直勤慎而益以亷明禮重易名約一言而該美善義隆加諡冠八字以示寵褒朕親奠郊坰頻紆車駕時陳牲醴每遣臣僚敦儉素之風塋兆本由於自擇議推崇之典經費優給於官供吉兆既安豐碑宜勒於戲念股肱之誼重雕刻金鏞惓手足之情深鋪揚玉牒功髙德茂享亘古之鴻聲生榮死哀備生人之全福將使斯文炳煥偕星曜以流輝貞石嵯峩與峯巒而並峙云爾和碩怡親王初次祭文業成翊贊資藩翰之懿親化致升平賴股肱之良弼而况勞績獨髙於朝守德位俱隆勳庸逈越於簡編親賢備美既忘身以盡瘁深悼往而傷懷惟王為皇考聖祖仁皇帝之子朕之親弟也天與恪誠性情忠孝凛晨昏之聖訓謹奉步趨盡臣子之良規仰蒙慈愛當朕鴻基之初紹命王總理之是膺矢白日以勿欺竭恭勤而匪懈剛方卓立鎮靜於紛繁之時悃愊自將贊襄於密勿之地是用益加委任俾展謨猷理軍務之機宜管度支之出納督領周廬之環衛興修畿甸之營田而王體朕心如己心視國事如家事總宫府之巨細經畫咸周殫夙夜之公忠施為悉當至於民生吏治察利弊而極力敷陳吉士藎臣辨貞邪而多方保護是用周知旁燭幽隱得以上聞決䇿定謀膚功於焉迅奏佐治安之大計致熙皥之淳風凡厯八年有如一日忠敬而兼之誠直勤慎而加以亷眀朕嘗表之以示褒王實當兹而不愧功在社稷洵中外所共知名勒鼎鐘亘古今而罕匹斯乃迓庥列祖篤生碩輔於皇家荷慶上天誕降宗親於泰運寬厚仁慈之度宜其延享遐年和平正直之懷足以祗承多福豈期證候漸致沉綿尚力疾以入庭每思覲謁逮養疴而移地惟恐聞知朕縈繫弗忘焦憂莫釋商量醫藥恨療救之無方默禱神祗歎精虔之靡感雖流芬耀烈非關夀算之短長而一德同心寧解肝腸之悽愴豐功偉績合配享於廟廷懿德鴻聲更光垂於史牒親臨朱邸悵望繐帷方頒優恤之恩綸特薦方筵於初祭於戲眷腹心之密寄精爽長存念手足之至情音容己隔濡毫紀行書百幅以難宣釃酒抒哀淚千行而不竭王其鑒格尚克歆承和碩怡賢親王祭文嗚呼哀哉賢弟仙逝倐己閲三載矣音容儼然遂隔幽明思念纒綿與時俱積從前奠醊悉循國家之典制而為文祭告亦多授意摛詞今則葬期己屆揮淚含痛自製祭章親率宫眷及諸弟子姪輩以家人之禮致奠攢廬至情無文直抒胸臆惟賢弟聽之憶昔幼齡趨侍庭闈晨夕聚處比長遵奉皇考之命授弟算學日事討論每嵗塞外扈從形影相依賢弟克盡恭兄之道朕兄深篤友弟之情天倫至樂宛如昨日事也朕兄臨御之初實賴賢弟為腹心股肱之寄賢弟秉忠誠之至性展翊贊之嘉謨凡有關於吏治民生國政軍計者無不悉心籌畫慎密敷陳務期海宇乂安蒼生被澤即宫中府中事無巨細亦莫不措置咸宜經營悉當自古史册所傳良弼懿親一心一德者疇能與賢弟比倫乎賢弟之德備矣功宏矣不亟為表揚以傳永久朕兄之心其能安乎縱極力表揚而於賢弟之丹誠偉績又豈足云報乎嗚呼修短之不齊者數也生死之難忘者情也得賢弟而中道棄捐朕兄之德涼也賴朕兄而遺徽表著賢弟之福厚也今者朕兄以念弟之深痛弟之切大顯其勳名尊崇其典禮凡經理於身後者無不殫竭其心思而賢弟生也榮死也哀名既不朽夀且無疆賢弟之福不己全乎假令克享大年後朕而逝即朕之孝子順孫善體朕心亦未必能洞悉賢弟數十年之心迹如今日朕之經理周詳罔有遺憾然則賢弟洵有全福而朕之懷憂抱恫失所依毗其福不及賢弟逺矣朕兄數年以來追慕皇考皇妣明發有懷悽愴曷極今賢弟又舍我而仙逝矣既抱終天之恨更增同氣之悲含酸茹嘆其何能自己耶賢弟忠愛之悃朕兄所深知况萬幾在御決不肯過自悲傷以貽九京之隱痛惟有敬念皇考付託之重深體賢弟輔弼之忱於當日忠讜針規之言比時未曽見諸施行者必追憶而悉踐之力圖政治之有成以不負皇考不負賢弟庶幾在天之靈為之欣慰而默相庇佑焉嗚呼援筆寫心肆筵饋奠哀衷滿紙淚酒盈觴賢弟其領受之嗚呼哀哉和碩怡親王誄并序雍正八年五月初四日和碩怡親王以疾薨於位春秋四十有五嗚呼哀哉維我弟賢王夙承皇考聖祖仁皇帝懿訓陶鎔德器諳練謨猷以忠誠正直之心沉毅堅剛之力寬厚和平之量精眀豁達之才輔翼朕躬勤勞王事宫府一體上下同心萬幾之協贊匪輕八載之恪恭如一國尊良弼誼切懿親斯固上天之庇佑邦家皇考之保安宗社默佑我賢王以宏宣偉烈永佐升平而眉夀蕃禧自將申錫於無疆者也詎意謀猷方壯倚賴殊殷纍月沉疴一朝薨逝悼股肱之莫寄悵肺腑而難言友愛之情纒綿曷已嗚呼去嵗冬聞王有疾心焉憂之選醫視藥祝禱神祇日夕倣徨迫冀痊可乃王則時覲庭軒時移逺墅恐病狀之宣露致心緒之牽縈力疾上言多方安慰逮王言旋京邸朕以祈雨還宫聞王疾篤命駕臨視王知之脫然仙逝蓋不欲以永訣傷朕懷焉嗚呼王於生死存亡之頃惟知有君而不知有身王之心至是安矣朕將何以為情哉王之薨也王公卿尹僚吏辨卒欽王之德望佩王之教澤感王之恩施者罔不驚悼倉皇涕泗相告謂王為國柱石為世楷模失我賢王我將安仰及至發引之辰徒行而送者萬計貴賤老稚匍匐呼號嗚呼王之生也人肅然敬殁也人慘然悲非王之賢何以致此然而王之美德懿行不樂人知人亦無從而知即朕知王之深亦言之而莫能罄也雍正四年朕嘗書額賜王曰忠敬誠直勤慎亷明八字之褒無溢詞有遺美焉王純孝之性徴於髫齔凛遵慈誨謹度飭躬以故榮遇有加始終勿替朕御極之初命王總理國政屹然靜鎮衆莫能撓蓋王識力迥越仁智兼優敏決而默運小心嚴明而善持大體其領度支也賦式維均出納有節其營水利也心勞樹藝績底平成其於吏治則惠民者興曠職者去見聞所及巨細敷陳其於人才則不棄微長弗苛小過鑒别悉當培植良多至於嚴督禁旅密運軍機轉餉籌邉更徴武略王少稱神勇留意兵戎帷幄運籌計周萬里以故年來征討重賴其能嗚呼王之厚德豐功昭然天壤而王之造膝籲請大有造於國家者中外臣民無由通曉及今而不言美將湮焉朕心何忍維王誠心愛國好善施仁護端正之賢藩保忠勇之良佐蠲浮徴而永紓民力補虧帑而不事追賠宿逋子裔亦豫矜全細過羣僚􅊖還舊秩凡此皆王之一片公心平時讜論為熙朝植良善為盛世沛恩膏而密勿之請命宣忠其為功於寰宇者不誠大且逺哉稽之周禮司勳有曰凡有功者書於太常祭於大蒸然則太廟之饗配以有功固酬德報勳之彛典也如我怡親王之純孝純忠以光輔鴻業則為皇考之令子大猷大䇿以底定丕基則為列祖之功臣几筵分配永顯殊庸集議於朝僉云允協王固建不朽之盛烈稱宇宙之全人矣嗚呼儀文具備悲悼徒增加諡崇封聊申隱痛朕上念九廟付託之身下納百僚勸慰之語亦復深自節抑未敢過情惟是德心之契昆弟之親實有迥異於尋常者情極而悲時難自遏不得已仿古昔哀誄之體備述令德攬淚成篇俾千萬世子孫臣庶周知遺烈追慕賢藩其詞曰天昌鴻祚國仰元臣興朝篤慶睦族敦倫友恭之軌史牒炳麟纘承大統倚毗懿親偉矣賢宗厥惟淑弟手足相依腹心攸繫塤箎克諧鹽梅互劑愛以親生心由天契朕懷乾惕凜若氷淵樹旌振鐸飢渴求賢疑丞輔弼疏附後先顧兹上爵孰秉中權於維我王位崇德備三光麗霄五嶽鎮地緯武經文懷仁抱義總攝之司惟王弗愧王心精白如日皎然王性果決如玉彌堅精思獨運巨力能肩鞠躬盡瘁於兹八年八年星霜九重宵旰班集晨墀牘陳夕案一字無欺片言善斷不憚辛勤良勞翊贊心膂協應形影追隨時都時俞時警時咨臨軒俯聽趨殿書思雍雍式好肅肅其儀朝寧家庭千秋萬嵗骨肉深恩永懷勿替寸晷未離何堪長逝異地猶悲奚容隔世嗚呼哀哉人生不朽曰德與功德臻盛大功極穹窿氣充天表神滿寰中夀民夀國齡享奚窮維王大忠可貫金石維王深仁代宣雨澤扶翼天樞滋培國脈百鍊之金無瑕之璧其忠維何本乎至誠心在社稷屏絶私營其仁維何原於好生惠施朝野不市虛名胸有鈞衡身為屏翰邦之九賦默抒成算國之六師奬勤警玩調燮咸宜經綸兼貫明農治地率吏安民有聞必奏罄意而陳懷抱氷雪氣煦陽春化被黎庶德遍臣鄰赤誠之佐保以百口青海之師紓其掣肘衛國者心回天者手咎且弗辭功於何有朕沛大澤實允王言為王造福慶衍璿源偶與王語汗若泉奔稽首辭謝曰天子恩公忠如彼仁厚若此甫申鍾靈旦奭嫓美元化方調瑞徴旋起何意亨衢遽羈修軌茂勳赫奕顯秩崚嶒望垂惇史饗配大蒸禮因德備諡以功增廟庭禮典王克歆承峩峩賜塋神筮叶吉屹屹豐碑烺耀星日赤舄衮衣永安靈宅雲馬風車出遊象闕嗚呼哀哉德動天鑒慶象昭彰吉人舉事瑞現雲光善孚衆志仰戴難忘萬聲合慟奠醊悽愴生榮死哀於斯已極惟朕深情輾轉胸臆恭順之容依依若即忠讜之言厯厯堪憶繐帷親奠莫解幽憂素服匝月未釋深愁鶺鴒聲婉棠棣花稠交暉園近雲物先秋王有良嗣朕其訓誨王有殊勳朕其紀載仰荷皇圖寧不自愛抑情紀哀傳流億代嗚呼哀哉欽定八旗通志卷首之二
