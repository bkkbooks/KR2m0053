body:
  text: 人物志一百三十八列女傳十八八旗蒙古列女傳一正紅旗蒙古護軍鄂博恢之妻雍古爾氏順治十八年旌表鑲藍旗蒙古驍騎校布顔圖之妻蔡堪珠康熙元年旌表正白旗蒙古護軍戴達理之妻根柱正紅旗蒙古前鋒峩奔代之妻阿濟格以上俱于康熙三年旌表鑲藍旗蒙古領催錫拉代之妻那喇鼐康熙四年旌表正藍旗蒙古馬甲索吉之妻招格康熙五年旌表鑲黃旗蒙古領催多勒吉之妻蘇門德正黃旗蒙古護軍校西喇海之妻峩哲內正黃旗蒙古馬甲塞冷之妻沙穆禮正紅旗蒙古馬甲古璐之妻孫德鑲藍旗蒙古前鋒博托和之妻莾弩克鑲藍旗蒙古馬甲齊塔穆之妻巴竒克泰鑲藍旗蒙古驍騎校布漢代之妻察漢以上俱于康熙六年旌表正紅旗蒙古護軍希福之妻額哲鑲白蒙古馬甲納木之妻格墨爾鑲紅旗蒙古護軍校滿篤祜之妻阿濟格巨以上俱于康熙七年旌表鑲黃旗蒙古兵丁谷梅之妻額墨艮康熙八年旌表正藍旗蒙古護軍鄂爾圖之妻克竒克特氏鑲藍旗蒙古護軍宋峩圖之妻察哈珠杜佳氏鑲藍旗蒙古護軍校楊古岱之妻吳郎韓氏正白旗蒙古領催恩椅參之妻奔貝以上俱于康熙十年旌表鑲黃旗蒙古馬甲爾木之妻敖牛忒氏正黃旗蒙古他赤哈哈畨色冷之妻相氏正藍旗蒙古護軍傅戴之妻伊爾根覺羅氏鑲藍旗蒙古馬甲鄂羅奚之妻克什騰氏以上俱於康熙十一年旌表鑲白旗蒙古馬甲墨兑之妻馬氏鑲藍旗蒙古馬甲哲爾禮克之妻西拉諾忒氏以上俱於康熙十二旌表鑲黃旗蒙古護軍崇起爾之妻克穆純氏康熙十三年旌表鑲黃旗蒙古護軍校勞章之妻克木出忒氏鑲白旗蒙古馬甲托克托和之妻莾努特濟吉氏鑲紅旗蒙古護軍克什圖之妻巴林氏以上俱於康熙十五年旌表鑲黃旗蒙古護軍拜塞之妻哈喇諾特氏鑲黃旗蒙古馬甲蘇奔之妻鄂綽特氏以上俱于康熙十六年旌表正白旗蒙古護軍喇拜都之妻鞠特氏鑲白旗蒙古雲騎尉克什庫之妻鄂查特氏正藍旗蒙古護軍博羅啓塔特之妻克西克騰氏正藍旗蒙古護軍齊那爾之妻克西克謄氏鑲藍旗蒙古馬甲竒達尼之妻泰處特氏以上俱于康熙十八年旌表鑲黃旗蒙古馬甲巴朗之妻阿爾哈楚特氏正紅旗蒙古親軍文德之妻鄂羅特氏以上俱于康熙十九年旌表正紅旗蒙古馬甲端吉之妻巴隆武氏鑲藍旗蒙古馬甲巴圖禮之妻洪鄂禮氏以上俱於康熙二十二年旌表鑲黃旗蒙古護軍恩柯之妻薩爾屯氏康熙二十三年旌表正紅旗蒙古護軍阿玉錫之妻鞠氏正紅旗蒙古馬甲特布勒之妻烏扎氏以上俱于四康熙二十年旌表鑲藍旗蒙古馬甲鄂羅代之妻巴魯特氏鑲藍旗蒙古馬甲柯恩吉之妻額爾圖特氏鑲藍旗蒙古領催霍商之妻阿爾他斯氏以上俱于康熙二十五年旌表鑲黃旗蒙古間散卜彥圖之妻他塔喇氏鑲藍旗蒙古馬甲哈喇之妻齊穆特氏鑲藍旗蒙古馬甲諾爾米之妻克西克騰氏以上俱於康熙二十六年旌表正黃旗蒙古前鋒護軍花色之妻覺羅氏鑲藍旗蒙古護軍恩克之妻戴楚特氏以上俱于康熙二十七年旌表鑲黃旗蒙古馬甲沙里之妻巴嶽􅑯氏鑲黃旗蒙古護軍阿禹史之妻克西克騰氏以上俱于康熙二十八年旌表鑲黃旗蒙古護軍班迪之妻阿爾格綽氏鑲黃旗蒙古馬甲那哈楚賴之妻博霍羅特氏鑲黃旗蒙古馬甲巴拜之妻阿勒特氏鑲黃旗蒙古護軍校穆德之妻齊穆特氏鑲藍旗蒙古馬甲班泰之妻齊穆特氏以上俱于康熙二十九年旌表鑲黃旗蒙古馬甲馬三泰之妻克西克騰氏鑲黃旗蒙古馬甲馬尼之妻把嶽忒氏鑲黃旗蒙古領催阿禹錫之妻查拉禮氏正紅旗蒙古護軍邁蘭之妻雅蘇穆氏正紅旗蒙古馬甲額爾金之妻馬林泰氏正紅旗蒙古馬甲庫吉之妻巴林氏鑲藍旗蒙古護軍諾睦之妻朱拉特氏鑲藍旗蒙古領催色黑之妻白格屯氏以上俱于康熙三十年旌表鑲黃旗蒙古馬甲巴顔之妻博爾濟克氏鑲黃旗蒙古馬甲霍商之妻哈齊特氏正紅旗蒙古護軍朱漠之妻布爾幾穆特氏鑲藍旗蒙古領催瓦岱之妻巴嶽特氏以上俱於康熙三十一年旌表鑲黃旗蒙古護軍勾色之妻薩爾屯氏正紅旗蒙古馬甲齊他特之妻巴林氏正紅旗蒙古前鋒護軍麻色之妻杭阿達氏正紅旗蒙古前鋒護軍天保住之妻宏鄂羅特氏正紅旗蒙古護軍鄂齊禮之妻宏鄂羅特氏鑲藍旗蒙古馬甲薄羅特之妻薩布禪氏以上俱於康熙三十二年旌表正紅旗蒙古馬甲希倫圖之妻芬氏正紅旗蒙古間散巴圖禮之妻喀爾泰氏鑲紅旗蒙古領催海森岱之妻林氏鑲藍旗蒙古護軍圖門德之妻扎魯特氏鑲藍旗蒙古馬甲額登之妻多倫鄂霍圖禮氏鑲藍旗蒙古馬甲阿蘭道之妻弩偶勒特氏鑲藍旗蒙古馬甲鄂齊禮之妻齊楚特氏以上俱於康熙三十三年旌表鑲黃旗蒙古弓匠阿敏之妻齊那禮氏鑲藍旗蒙古馬甲巴扎禮之妻趙氏鑲藍旗蒙古馬甲花色之妻商氏鑲藍旗蒙古馬甲額爾吉圖之妻齊特楚氏以上俱於康熙三十四年旌表鑲黃旗蒙古領催諾黑圖之妻富察氏鑲黃旗蒙古領催班迪之妻趙佳氏正紅旗蒙古領催碩薩禮之妻阿蘇特氏正紅旗蒙古領催江吉之妻巴約特氏鑲白旗蒙古護軍巴查思虎朗之妻查羅格氏正藍旗蒙古馬甲杜格之妻尼楚昆巴林氏鑲藍旗蒙古馬甲諾爾密之妻克西克騰氏鑲藍旗蒙古領催多爾技之妻富察氏鑲藍旗蒙古護軍拉布格之妻吳爾哈氏以上俱於康熙三十五年旌表鑲黃旗蒙古護軍巴雅思胡朗之妻覺羅氏鑲黃旗蒙古護軍鄂爾齊之妻多爾山氏正紅旗蒙古護軍巴朗之妻查爾奔氏正紅旗蒙古馬甲鄂爾查圖之妻查爾奔氏正紅旗蒙古間散拜祐之妻趙氏正紅旗蒙古間散卓白爾格之妻趙氏正紅旗蒙古馬甲諾木竒之妻赫楚特氏鑲紅旗蒙古護軍克史圖之妻布爾喀金氏正藍旗蒙古護軍查穆索之妻翁吉爾特氏鑲藍旗蒙古護軍孟格之妻陳氏以上俱於康熙三十六年旌表鑲紅旗蒙古護軍柯應之妻白氏鑲紅旗蒙古吳爾逹哈之妻那氏以上俱於康熙三十七年旌表鑲藍旗蒙古領催薩爾代之妻何氏康熙四十年旌表鑲紅旗蒙古護軍雅爾格泰之妻祁理克氏康熙四十一年旌表鑲紅旗蒙古護軍巴喇海之妻薑氏鑲藍旗蒙古護軍白濟之妻張佳氏以上俱於康熙四十二年旌表正紅旗蒙古護軍恆吉之妻巴魯特氏鑲紅旗蒙古親軍僧格之妻李氏正藍旗蒙古護軍錫巴爾泰之妻胡氏以上俱於康熙四十五年旌表鑲紅旗蒙古馬甲博羅諾之妻蔣氏鑲紅旗蒙古領催薩穆哈之妻白齊特氏以上俱於康熙四十六年旌表鑲黃旗蒙古前鋒護軍敦住之妻蘇尼特氏正紅旗蒙古前鋒護軍鄂諾之妻巴魯特氏鑲紅旗蒙古護軍孟克之妻陳氏正藍旗蒙古馬甲達賴之妻趙氏正藍旗蒙古馬甲額爾吉圖之妻胡氏以上俱于康熙四十七年旌表鑲黃旗蒙古馬甲額斯虎之妻佟佳氏鑲黃旗蒙古馬甲松郭圖之妻台吉氏鑲黃旗蒙古馬甲班迪之妻額爾圖特氏鑲黃旗蒙古馬甲舍德之妻噶竒特氏鑲黃旗蒙古馬甲羅渾岱之妻都爾白特氏鑲黃旗蒙古領催克史德之妻叉特氏鑲黃旗蒙古馬甲那顔泰之妻鄂羅特氏鑲黃旗蒙古馬甲諾史內之妻克西克騰氏鑲黃旗蒙古護軍碩色之妻額爾圖特氏鑲黃旗蒙古護軍烏爾齊之妻額爾圖特氏鑲黃旗蒙古馬甲巴大禮之妻孟奴特氏鑲黃旗蒙古領催額葉圖之妻徐氏鑲黃旗蒙古護軍巴圖禮之妻博爾諾特氏鑲黃旗蒙古馬甲那哈岱之妻眀安氏鑲黃旗蒙古馬甲沙穆代之妻巴魯特氏鑲黃旗蒙古馬甲哈爾扣之妻馬哈弩特氏鑲黃旗蒙古前鋒護軍希達之妻魏氏鑲黃旗蒙古馬甲卓特巴之妻博霍羅特氏鑲黃旗蒙古護軍色楞之妻沙佳氏鑲黃旗蒙古護軍畢里格圖之妻克西克騰氏鑲黃旗蒙古間散恩格爾之妻布爾哈竒特氏鑲黃旗蒙古護軍羅密之妻薩璽特氏鑲黃旗蒙古護軍鄂穆圖之妻阿蘇格氏鑲黃旗蒙古間散佛天保之妻薩爾圖特氏鑲黃旗蒙古領催阿都賴之妻巴宇特氏鑲黃旗蒙古護軍齊桑古禮之妻吳佳氏鑲黃旗蒙古間散霍尼齊之妻額爾圖特氏鑲黃旗蒙古護軍諾木圖之妻阿蘇克氏鑲黃旗蒙古馬甲白特之妻柯阿坦氏正紅旗蒙古前鋒護軍拉穆察禮之妻巴宇特氏正紅旗蒙古領催白爾白孫之妻博爾濟克氏鑲白旗蒙古馬甲查漢泰之妻拜都氏鑲白旗蒙古前鋒護軍鄂倫泰之妻博爾濟吉特氏正藍旗蒙古馬甲格門之妻喀喇巴林氏正藍旗蒙古馬甲班達爾錫之妻莾弩特氏鑲藍旗蒙古馬甲色爾吉之妻巴宇特氏鑲藍旗蒙古八品官常夀之妻洪古禮氏以上俱于康熙四十九年旌表鑲黃旗蒙古馬甲白爾綽之妻額爾圖特氏鑲黃旗蒙古領催馬喜之妻哈魯奴特氏鑲黃旗蒙古馬甲舍德之妻額爾圖特氏鑲黃旗蒙古前鋒護軍勾色之妻哈拉氏鑲黃旗蒙古馬甲齊爾克特之妻克爾蘇氏鑲黃旗蒙古馬甲布達史之妻莾女特氏鑲黃旗蒙古前鋒護軍蒙古爾古之妻霍竒特氏鑲黃旗蒙古領催查穆素之妻蘇魯克氏鑲黃旗蒙古馬甲吳模黑之妻額爾圖特氏鑲黃旗蒙古馬甲華擅之妻博爾季特氏鑲黃旗蒙古領催季思古之妻額爾圖特氏鑲黃旗蒙古護軍多爾賽之妻額爾圖特氏鑲黃旗蒙古馬甲阿畢達之妻額爾圖特氏鑲黃旗蒙古馬甲綽世禧之妻博霍羅特氏鑲黃旗蒙古馬甲達禮之妻博爾濟克氏鑲黃旗蒙古馬甲雅圖之妻吳朗阿氏鑲黃旗蒙古弓匠趙爾彬之妻兀魯特氏鑲黃旗蒙古護軍索諾馬之妻何佳氏鑲黃旗蒙古護軍班迪之妻額爾圖特氏鑲黃旗蒙古護軍額爾吉圖之妻蘇佳氏鑲黃旗蒙古護軍齊其克之妻陳氏鑲黃旗蒙古馬甲花色之妻博爾濟克氏鑲黃旗蒙古領催顧魯之妻他塔喇氏鑲黃旗蒙古步甲劉色之妻博爾濟克氏鑲黃旗蒙古護軍馬賴之妻威古特氏鑲黃旗蒙古護軍托羅孫之妻雅圖祜氏鑲黃旗蒙古騎都尉馬竒格圖之妻模爾柯特氏鑲黃旗蒙古馬甲霍商之妻烏魯特氏鑲黃旗蒙古間散舒都之妻博爾吉特氏正黃旗蒙古領催齊尼克之妻博和羅特氏正黃旗蒙古領催秦諾克之妻博和羅特氏正黃旗蒙古護軍薄琦之妻哈爾諾特氏正黃旗蒙古布拉齊阿禹錫之妻博和羅特氏正白旗蒙古領催達爾查之妻殷舒布氏正白旗蒙古馬甲達爾穆之妻鄂衣穆特氏正白旗蒙古護軍穆色之妻伊爾根覺羅氏正白旗蒙古侍衛阿爾訥之妻喀勒沁氏正白旗蒙古馬甲達賴之妻喀勒沁氏正白旗蒙古馬甲巴布之妻李氏正白旗蒙古前鋒護軍胡祿素之妻查哈齊氏正白旗蒙古馬甲綽克圖之妻察哈爾氏正紅旗蒙古護軍花色之妻趙模圖氏正紅旗蒙古前鋒護軍季爾哈朗之妻雅格三氏正紅旗蒙古領催額爾吉圖之妻明武特氏正紅旗蒙古親軍顧史之妻翁鄂嶽格氏正紅旗蒙古護軍達爾馬希之妻阿蘇特氏正紅旗蒙古護軍齊爾格泰之妻季羅特氏正紅旗蒙古前鋒護軍達瓦色之妻阿蘇特氏鑲白旗蒙古親軍鐸史之妻巴魯特氏鑲白旗蒙古馬甲何雅圖之妻張氏鑲白旗蒙古領催畢爾格圖之妻王氏鑲白旗蒙古馬甲勾色之妻杭阿坦氏鑲白旗蒙古親軍畢爾格圖之妻寧古塔氏鑲白旗蒙古馬甲王達之妻巴魯特氏鑲白旗蒙古馬甲蕭色之妻阿拉格楚特氏鑲白旗蒙古前鋒護軍鄂欽之妻巴魯特氏鑲白旗蒙古驍騎校巴達克之妻巴延圖氏鑲白旗蒙古護軍年泰之妻巴林氏鑲白旗蒙古親軍巴朗之妻翁科特氏鑲白旗蒙古馬甲白順之妻錢氏鑲白旗蒙古護軍阿禹史之妻黃氏鑲紅旗蒙古馬甲陸式懿之妻魏氏正藍旗蒙古護軍鈎色之妻任氏正藍旗蒙古護軍那穆齊之妻渾鄂洛氏正藍旗蒙古護軍蘇模之妻邢