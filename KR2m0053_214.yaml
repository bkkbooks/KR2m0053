body:
  text: 欽定四庫全書欽定八旗通志卷二百人物志八十大臣傳六十六漢軍正紅旗焦吳世俊蘇寗完我吳守進安民宏祖劉清㤗吳王國光之鼎興祚郎賽劉秉權劉漢祚王吳世俊孫雲龍吳世俊漢軍正紅旗人先世居開原太祖高皇帝天命四年六月征明取開原城世俊隨叔父吳裕來歸裕任佐領太宗文皇帝時叙斬獲逃亡功並以所管人丁増多予三等輕車都尉世職尋卒子常山保襲未幾常山保亦卒以世俊襲職仍任佐領兼㕘領崇徳五年大軍圍明錦州世俊以紅衣礮克取馬家湖臺六年復圍錦州明兵據吕洪山口世俊同都統金礪督兵擊敗之七年攻塔山杏山毁其城八年隨鄭親王濟爾哈朗征明寧逺克前屯衛中後所二城順治元年二月叙功晉世職為二等輕車都尉五月大兵既定燕京世俊隨都統葉臣招撫山西時流賊李自成遁陜西其偽伯陳永福猶據太原世俊同諸將攻克其城山西既定還至中途值鮑家莊土賊肆掠世俊同都統阿賚率兵捕𠞰之盡殱其衆二年隨英親王阿濟格追𠞰自成於陜西屢敗賊衆自成走湖廣三年七月隨端重親王博洛征浙江時明閣部朱大典據金華世俊攻破其城大典自焚死餘黨悉平是年擢都察院左副都御史六年授正紅旗漢軍副都統三遇恩詔晉世職至三等男十年以疾解任十八年六月卒賜祭塟如例子延祚襲爵康熙八年延祚卒子雲龍襲十四年聖祖仁皇帝命貝勒洞鄂征陜西叛鎮王輔臣雲龍隨征將至平凉賊衆迎拒雲龍率本旗兵衝其陣大敗之二十年隨貝子彰泰征逆賊吳世璠敗賊將線緎於盤江西坡追至砂子哨及腊茄坡屢搴賊纛遂進征雲南距城四十里立營擊敗賊將吳國柄等偽國公馬寳偽將軍巴養元逃至烏木山盤踞林谷設鹿角扼險以守雲龍隨都統希佛提督桑額往𠞰擒斬甚衆二十五年叙功晉爵二等男四十八年十一月卒子璘改襲一等輕車都尉寗完我寗完我遼陽人天命年間來歸事貝勒薩哈亷隸漢軍正紅旗太宗文皇帝召直文館尋授㕘將天聰四年大軍破永平命同館臣達海等執黄旗登城諭士民安業尋隨貝勒阿巴泰等守永平又從征大凌河及察哈爾並招撫有功授騎都尉世職五年十二月上疏言臣蒙皇上出之奴隸登之將列不揣庸愚妄自期許初被召對輒薦五人復公疏請立六部設言官今六部已立不設言官者意以為國人皆得進言耶又或謂南朝多設言官竟致敗壊耶臣請明辨之我國未立六部之前臣不具論自六部既立之後曽見疏劾人罪者否今日秉政之人豈盡循良方正在屬下者既不敢非其官長旁人又誰敢輕議權貴古云兼聴則聰偏聴則蔽若設言官人必自斂君身尚許諫諍他人寧知忌諱此古帝王明目達聰之大用也南朝之言官壊事由伊主之鑑别不明非洪武定制之不善臣自揣無經緯之才惟忠耿之心至死不易今再行奏聞以明始終無欺不勝悚慄之至六年六月與范文程馬國柱疏陳伐明之策九年二月言頃奉聖諭各薦舉賢能以供任使孰意無知之輩反假此為倖進之階臣思自古薦舉之條功罪連坐所以杜弊端而防冒濫伏願再頒明詔自後所舉之人或効能叙功或僨事獲罪皆令舉者同之若其人砥行於厥初改節於末路許舉者隨時檢舉乃免連坐如此庶人知畏法而所得皆真才矣太宗並嘉納之十年二月罷職先是完我留守永平以好博為禮部㕘政李伯龍等所訐奉諭諄誡宥其罪至是復與大凌河歸附㕘領劉士英博為士英家人舉發論罪革世職凡恩賜莊田奴僕悉入官遂閒居數年世祖章皇帝定鼎後起用為學士順治二年五月授宏文院大學士充明史總裁官二年至六年三充㑹試主考官又充纂修太宗實錄總裁官並繙譯三國志洪武寳訓諸書告成賜賚優渥授二等輕車都尉世職八年遷國史院大學士十年四月内院以完我與洪承疇等班位禄秩應否照漢官例奏請完我獨承㫖照滿洲大學士例尋授議政大臣十一年三月疏劾大學士陳名夏曰古來奸臣賊子黨不成則計不得行欲成奸黨附已者雖惡必䕶異已者雖善必仇行之久而入黨者多矣始也借人以引已繼也納賄以引人若非確訪其鄉評輿論實察其居心行事則黨固而莫可破臣自念壯年疎慵貪博辜負先帝一廢十年皇上定鼎燕京復得隨入禁地矩趨公署凛守臣職者又復十年於此愚直性生遇事勃發雖不敢行埋輪補牘之事若附黨營私以圖目前富貴寧死不為痛思人臣貪酷犯科國家癬疥之疾不足為慮惟懐奸結黨禍闗宗社患莫大焉陳名夏奸亂日甚黨局日成臣不憚舍殘軀以報答聖主並列其罪狀請勅大臣鞫訊事詳陳名夏傳八月加太子太保十三年考滿加少傅兼太子太傅十五年九月以老乞休奉諭曰大學士寗完我効力多年勤勞素著今因年邁有疾令原銜致仕以遂頤養康熙元年聖祖仁皇帝念其贊理機務年久命以一子補用學士四年四月卒賜祭立碑諡文毅吳守進吳守進遼陽人後隸漢軍正紅旗初事太祖高皇帝以功授三等輕車都尉世職天聰五年太宗文皇帝詔定官制設六部守進任户部承政八年考滿晉一等輕車都尉時始設漢軍世管佐領守進兼任之崇德三年正月奉命與額駙英俄爾岱等察户部承政韓大勲盜取庫物坐察核疎忽論罪輸罰鍰七月更定官制改任左㕘政四年正月以勒索官商金及侵冒工值等事下部論罪應死籍没得㫖從寛革世職解部任籍家産半仍署副都統事六月授正紅旗漢軍副都統六年隨睿親王多爾衮武英郡王阿濟格征明錦州以紅衣礮攻克塔山四臺斬馘無算生擒其副將王希賢㕘將崔定國等七年六月擢本旗都統七月率兵攻明松山杏山同都統金礪擊吕洪山口所屯敵兵敗之松山兵遁入杏山附近二臺復同都統劉之源攻克之遂㧞杏山城尋奉命與副都統馬光輝等往錦州督鑄紅衣礮八年隨鄭親王濟爾哈朗征明寧逺攻取中後所前屯衛二城順治元年正月叙功復授三等輕車都尉世職五月同都統葉臣往平山西攻太原府城克之凱旋得優賚尋隨豫親王多鐸追𠞰流賊李自成明年四月移師下江南詔頒賚王貝勒大臣之宣力戎行者守進得賜蟒服五月偕都統圖賴敗明軍於揚子江獲其戰艦克揚州府及江隂縣城并下嘉興府三年五月叙功晉一等輕車都尉四年授定西將軍駐劄漢中五年八月卒年六十有二長子國柄襲隨征湖廣有功官至副都統七年遇恩詔加一雲騎尉尋卒以守進次子國正襲焦安民焦安民漢軍正紅旗人初授吏部啟心郎崇徳九年甄别各部院官安民列二等賜人户牲畜八年考滿授佐領順治元年遷山西雁平道二年四月擢寧夏巡撫疏言雁平村舍凋零㓂盜充斥守備上官清都司鄭應亨晝夜巡緝士民得安請携二人隨往寧夏委用從之十一月上諭督撫等宣力封疆功勤勞苦兹值嚴寒尤深注念賜安民錦裘貂褂各一十二月疏言臣巡厯河東諸營堡惟靈州營水灌沃壤兵多務農餉不足猶可藉農養其餘營堡兵皆鶉衣百結鵠立難支查靈營西南有民堡八向招人耕種屯糧以供兵馬需近因花馬興武等營嵗荒將此項屯糧通融分給以資接濟伏思守土在軍足食在農斯時有荒可墾苦無牛隻現存耕牛六十一隻堪給兵開墾又原任總兵南一魁取舊存馬價銀二百兩為製弓矢用應追原價貯庫寧驛久廢稽公務請將此銀買驢驘發附郭等馹稍供走逓庶齎奏無誤又言寧兵月餉現在屯課徵収者支放殆盡貧民逋欠者追比難完三軍枵腹待哺請撥秦餉三萬兩以濟饑兵下部議如所請三年三月副將王元馬徳以營兵趙鋭等罪責入獄乗釁統衆突入撫署安民遇害元德等尋伏誅安民贈右都御史廕一子賜祭塟如例蘇宏祖蘇宏祖遼陽人隸漢軍正紅旗崇德三年由舉人授户部啟心郎賜朝衣一襲免丁四名八年考滿稱職給雲騎尉順治元年授河南河北道三年遷山東布政使五年調陜西布政使九年三遇恩詔晉三等輕車都尉十年五月巡按御史高爾位劾該督等計典失實連及註考藩臬宏祖降二級調用十一年補福建布政司左㕘政分守福寧道十三年遷左僉都御史十五年六月擢南贛巡撫十七年四月山賊李玉庭糾黨雩都負固刼掠宏祖發贛城兵捐資製火器奮勇搗巢玉庭就擒事聞下部議叙尋以老病乞罷上未許時賊渠謝上逵結海㓂鄭成功并糾羅一鑑徐黄毛等賊據廣東平逺五指石界連閩贛六月宏祖㑹閩粤兵合𠞰上逵詐降潛逃紅畬宏祖授將材李宗韜以計擒斬一鑑黄毛等七人乘夜進攻賊倉皇遁走連追至柑子窩中木溪悉捕斬遂毁五指石寨進𠞰紅畬諭賊黨縳渠自首得免罪未幾縳上逵獻誅之十八年五月遣遊擊王什𠞰廣昌賊乘雨攻不備連破滴水羊石二寨斬千餘級擒賊渠幸連升蕭來信叙功加一級時地方初定學宫傾圮宏祖首倡捐修康熙元年二月甄别督撫大臣命宏祖以原官致仕三年四月卒賜祭塟如例劉清泰劉清泰遼陽人隸正紅旗漢軍初名朝卿太宗文皇帝賜今名崇徳六年由諸生試一等入内院辦事順治二年擢宏文院學士六年充纂修太宗文皇帝實錄副總裁九年充㑹試副考官教習庶吉士尋授浙閩總督時海賊鄭成功據厦門䧟漳浦海澄南靖上賜清泰勅曰鄭成功屢擾沿海郡縣本應翦除但昔年大兵下閩其父芝龍首先歸順其子弟何忍背棄父兄甘蹈叛逆此必地方官不善開導致彼疑懼反側今已命芝龍作書遣人往諭如果悔罪歸順不吝爵賞爾當宣布朕意使之悦服十年二月清泰疏劾巡撫張學聖巡道黄澍總兵馬得功前此偵成功赴粤潛襲厦門攫其家貲致成功索償修怨連䧟城邑疏下部議學聖等並罷黜三月清泰得成功自海上報芝龍書因疏言成功妄覬浙東粤東地安挿兵衆語涉浮誇與其更張於既撫之後不如詳慎於未撫之先得㫖所奏具見深識逺慮仍相機而行五月平南將軍金礪攻海澄將克之以餉不繼還軍漳浦㑹頒勅招撫成功封為海澄公遂罷兵清泰疏請於浙閩兩省調兵一千駐守浦城増設遊擊守備等官部議從之十一年清泰以成功既奉詔許給泉漳恵潮地仍不矱髪其黨逞掠如故疏言成功無歸誠實意宜勅遣八旗兵赴閩駐守要地以資策應下諸王大臣議清泰旋以病乞假成功復㓂掠漳州泉州上命定逺大將軍濟度率兵往𠞰左都御史龔鼎孳劾清泰一籌莫展當將軍金礪攻圍海澄不能同心合力及招撫未就又不控扼險要囘駐杭州藉病息肩致海疆被䧟疏下部議革任十八年聖祖仁皇帝御極起為秘書院學士尋授河南總督康熙元年築開封城清泰疏言城工浩繁未可以嵗月計官民捐輸者俟工竣議叙未免觀望不前請按季報部錄叙以觀速效部議如所請三年以報墾荒地一萬二千餘頃加銜兵部尚書四年五月以疾致仕八月卒賜祭塟如例王國光子永譽王國光漢軍正紅旗人先世為滿洲姓完顔父王一屏初為明千總太祖高皇帝天命四年征明取開原城一屏率所屬來歸賜人口馬駝銀幣授佐領太宗文皇帝天聰八年予三等輕車都尉世職國光初任佐領兼户部理事官崇徳七年襲父職擢正紅旗漢軍副都統兼户部㕘政八年隨鄭親王濟爾哈朗征明攻克前屯衛中後所二城順治元年叙功晉世職二等輕車都尉是年改六部㕘政曰侍郎國光仍任户部侍郎兼副都統三年隨定西大將軍和洛輝駐防西安有逆賊孫守法胡向宸據興安山峪出犯西安國光率兵擊却之又擊敗賊黨歐文炳等以雲梯㧞其寨獲馬騾器械無算五年考滿晉一等輕車都尉是年十月遷本旗都統六年隨英親王阿濟格征大同叛鎮姜瓖攻克左衛朔州汾州太谷四城八年正月叙功晉三等男尋遇恩詔晉一等男四月河間佐領碩爾對訐告給餉不均事户部諸臣坐降革有差國光以前任侍郎降一等輕車都尉九年遇恩詔加一雲騎尉十年正月上以前此户部諸臣處分過重令核議寛減復國光一等男二月隨定逺大將軍貝勒屯齊征湖廣擊敗李定國兵於永州又敗孫可望于岔路口多所斬獲十二年海賊鄭成功張名振等合犯浙江國光同寧海大將軍伊勒德統師往征敗賊舟山十三年二月授兩廣總督賜蟒服鞍馬並諭奨其才品優長足勝委任加太子太保十五年大兵三路分𠞰明桂王朱由榔征南將軍卓卜特由廣西栁州慶逺一路進征國光疏言大兵取道栁慶恐黔滇諸賊由南寧來犯因遣㕘將張榮周貴率兵赴梧潯協力堵禦疏入報聞六月以疾解任還京十八年聖祖仁皇帝御極授鎮海將軍統兵駐防潮州康熙三年同平南王尚可喜㑹師𠞰碣石叛鎮蘇利至海豐偵賊設伏要路欲奪我大礮隨分兵擊敗其衆遂進師燈籠山蘇利乘我軍未及成列率衆萬餘突來薄戰我軍左右夾擊賊衆潰遁追薄碣石衛城四面環攻㧞之擒斬蘇利及偽總兵陳英偽副將李慧等餘黨竄匿各寨國光督兵由惠來分𠞰連破賊寨偽總兵陳義鄭盛率衆扼險抗拒我兵奮勇掩擊鄭盛勢窮自縊死陳義中創僅以身免四年因病乞休温㫖慰留之明年詔率所属還京仍任本旗都統八年以老致仕九年正月卒賜祭塟如典禮諡襄壯子永譽襲爵康熙十三年正月授河南提督四月河北總兵蔡禄叛應逆藩吳三桂内大臣阿宻達率兵往𠞰擒斬之永譽奉詔赴懷慶拊循士卒因請暫駐其地防守九月上以安慶為兩江重地令設提督調永譽任之時逆藩耿精忠遣偽都督宋標等䧟江西饒州遂犯徽州十四年永譽督兵駐建徳令㕘將傅爾學進𠞰賊衆千餘沿山扼險我兵分隊擊之斬級無算俘宋標磔於市尋以簡親王喇布疏請増兵永譽率所属移守徽州十二月征南將軍穆占以吳逆堅守衡州乞調永譽助征上以徽州要地未便調遣不允十七年江西平裁安慶提督改永譽為江南提督移駐松江十九年遷廣東將軍二十年疏言粤東瀕海地宜修理戰艦移兵防守請改陸路兩鎮各一營為水師以供調遣部議如所請二十二年王大臣議以兩鎮官兵歸總督統攝分撥各汛地防守永譽疏言海疆重地省城尤為扼要應留兵四千駐防上允所請二十七年授本旗漢軍都統三十年命定北將軍瓦岱領兵赴張家口偵防噶爾丹永譽同都統喀岱等㕘贊軍務三十五年上親征噶爾丹分漢軍為四營永譽統領正黄正紅兩旗由中路進噶爾丹聞大兵至不戰而遁永譽同平北將軍馬斯喀督兵追躡偵賊逺竄乃還三十六年隨駕寧夏命督運軍糧留貯黄河西岸要地監守之及大將軍費揚古奏報噶爾丹竄死凱旋兵出境乃還京四十三年二月卒祀河南名宦子興武改襲一等輕車都尉兼一雲騎尉今上乾隆十八年二月王興武之子福山及族人並得㫖改𨽻滿洲正紅鑲白二旗郎賽子阿爾泰郎賽漢軍正紅旗人本姓劉世居鐵嶺初為驍騎校崇徳七年分設漢軍佐領令管壯丁二百名𨽻正紅旗八年九月隨鄭親王濟爾哈朗征明寧逺取中後所及前屯衛叙功予雲騎尉世職十二月隨征黑龍江俘獲甚衆順治元年四月睿親王多爾衮討流賊李自成郎賽率兵前驅敗偽總兵唐通于一片石十月隨豫親王多鐸追剿流賊至陜西二年隨征江南攻克揚州及崑山常熟嘉興等縣預有功晉世職騎都尉七年任兵部郎中兼㕘領三遇恩詔晉世職至一等輕車都尉是年遷正紅旗漢軍副都統十三年閏五月擢本旗漢軍都統六月以海賊鄭成功猖獗命掛寧海將軍印駐防福建十四年攻閩安鎮克其城十七年同都統索渾䕶軍統領賚塔等𠞰賊厦門官軍不習水戰失利罷任逮問革世職康熙十年六月卒子阿爾泰初由廕生授吏部員外郎順治七年遷郎中十二年授佐領尋兼㕘領康熙三年出任湖廣辰常總兵七年調浙江黄巖總兵十三年八月逆藩耿精忠叛黨曽養性祖宏勲等由温州驅賊衆陷黄巖提督塞白理時駐寧波疏言臣與黄巖總兵阿爾泰久為婚姻素以忠義相朂前聞叛賊祖宏勲陷温州議與合兵討賊彼亦以不員國恩自許故一聞黄巖内變臣謂阿爾泰必死乃九月初六日據陷賊逃囘之臣標千總高興言黄巖城破係城守𠫭將武灝先行通賊受偽總兵職致拒賊兵丁陣亡者三百總兵阿爾泰亦已割辮從賊受偽將軍職臣思阿爾泰世受國恩不能死節忍受偽職狗彘不食其餘阿爾泰之女舊與臣長子銓德為媳臣欲逐去又無家可歸去留生殺悉候聖裁疏下王大臣議以塞白理之媳係阿爾泰舊日出嫁之女應仍留塞白理家阿爾泰之長子佐領劉紹烈駐防京口現調往杭州應就近收禁十四年康親王傑書統師駐金華疏言阿爾泰不肯從逆為賊縊死兵部奏釋劉紹烈仍以佐領赴貝子傅喇塔軍前効力十五年八月署㕘領𠞰賊處州戰石塘嶺殁于陣十六年三月福建巡撫楊熙疏陳阿爾泰權宜詐降以圖恢復為賊伺知十三年十一月拘至福州十四年正月耿精忠使人縊死南門通衢部議贈右都督予卹廕詔以恩卹忠節闗係大典令再確察情節部臣奏阿爾泰先經康親王疏稱不肯從賊今巡撫楊熙復察寔被賊戕害應照例贈卹得㫖不准加贈仍賜祭塟如例二十五年賜劉紹烈卹銀予雲騎尉世職以阿爾泰之次子劉紹韜襲四十年劉紹韜因疾罷以其子伊理布襲雍正七年阿爾泰劉紹烈並入昭忠祠劉秉權劉秉權漢軍正紅旗人順治元年任兵部主事九年三月遷刑部啟心郎十五年裁缺改刑部主事十七年七月遷户部員外郎十八年詔前此由啟心郎改主事者仍以四品用康熙元年正月遷僉都御史三年十二月擢國史院學士六年十二月授廣東巡撫先是順治十八年以沿海江浙閩粤數被海賊刼掠且有奸民交通接運詔遷沿海居民于内地至是廷議展界復業上遣都統特錦等㑹勘廣東沿海邉界設兵防守安挿遷民秉權與總督周有徳疏言粤民聞展界之令相慶復歸故土而田疇久荒其墾復者應年終冊報俟三年後起科尋疏言粤東有荒棄屯地三千五百餘頃舊額每畝科米三斗較民田多數倍民不敢承墾請照民田一例起科庶屯賦不致虚懸又疏言新還故土之民耕墾無資必量給牛種助其畚􅓩粤東積榖以備賑向即賑此遷移失業者居多自康熙六年以來共存榖四萬二千餘石請量留二千石備給囚糧餘悉酌給復業之民使資牛種則民沾寔惠榖無漏巵較每嵗零支賑濟更有盈寧生聚之效三疏並下部議從之九年閏二月御史徐旭齡摘秉權履任後諸奏章劾其庸懦無能依違成習徇庇容隐舛誤遲延命秉權囘奏秉權疏辯仍下部察議劾欵俱經秉權辯釋惟屯糧奏銷由户部駁詰改正秉權難辭舛誤之咎罰俸一年六月疏報康熙八年分安揷丁口十萬二千一百有竒墾復田地一萬七百四十餘頃十年五月疏報九年分安揷丁口三萬一千四百有竒墾復田地七千八十餘頃十一年五月奏報十年分安插丁口二萬五千九百有竒墾復民屯田地七千三百八十餘頃得㫖廣東海疆要地劉秉權連年安插人民墾復地畝為數甚多具見盡心料理十三年四月聞逆藩耿精忠叛應吳三桂疏言福建巡撫劉秉政係臣同父異母親兄雖自㓜各居已久今福建有變撫臣偷生臣處嫌疑之際墾恩罷斥歸旗待罪疏入命吏兵二部㑹議時廣西將軍孫延齡亦叛平南王尚可喜疏言秉權履任以來亷静和平素為文武兵民信服自廣西告變臣與商酌機宜見其智識淵深議論慎宻信之重之當兹多事之日籌兵策餉正資熟練提督嚴自明偕總兵司道等合詞籲留謹據情入告詔秉權仍留任五月秉權疏言孫延齡黨附吳逆叛居桂林已㑹疏請㫖發兵攻𠞰但桂林城堅靠山倚水必須礮火制勝今與平南王議發紅衣大礮四十位以木馬船載之并備火藥器具送往以冀速奏㨗音又疏言潮州總兵劉進忠勾通閩逆據潮反叛各郡民心惶擾土㓂乘機竊發乞敕江西發兵一千來粤以資𠞰禦又疏言耿逆鴟張如聴其安閒布置招兵集餉來犯始應非計之得也請敕浙江兵分兩路進𠞰一由江山縣取浦城一由温州府取福寧江西兵亦分兩路一由建昌府取光澤一由瑞金縣取汀州粤東恢潮之後即進取漳州之詔安閩中文武荷朝廷豢養多年一旦脅從原非本意五路並進各郡自必聞風内應改邪歸正耿逆孤雛腐䑕屈指滅亡當在數月之内再乘此兵威移𠞰吳逆先聲所至已奪其魄若桂林叛賊大勢更在耿逆之下摧枯拉朽又不足言矣又疏報碣石衛山賊水㓂乘機竊發圭湖青子等鄉有賊徒二千餘人犯甲子所城遊擊李復竒督兵擊敗之六月疏報𠞰捕藏匿偽隆武勅印之賊首李唐宗及其子於永安縣南嶺斬之餘黨悉平八月疏言逆賊劉進忠自恃潮城險固負嵎拒敵挖溝樹柵堅守葫蘆大山以為屏障都統提鎮諸臣雖已三戰三勝而官兵冒暑勞苦仰擊甚難耿逆又發援兵將至臣有提督軍務之責現擬親率藩撫各標官兵自省往潮與都統提鎮諸臣相度形勢分布險要絶其外援斷其糧道乘機誅擒逆惡用彰天討尋疏報𠞰殺沿海水賊千餘級陣擒賊首陸老初等救囘被擄男婦五百餘名九月秉權率師至潮州城南隅有鳯凰洲河道外通大海内接城壕為糧道援兵必經之所劉進忠引逆黨六千餘人在鳯凰洲架木城二據之以耿逆所遣偽都督金漢臣等列二營于鳯凰臺下秉權與都統尚之孝定議進攻躬冒鋒鏑越塹排柵連破兩木城賊敗奔鳯凰臺下劉逆親率二千餘衆迎敵官軍乘勝破其三營賊大潰溺水死者無數劉逆以數十人遁入城陣斬金漢臣等五千二百餘人擒偽副將蘇忠等八十三人獲器械無算别遣副將何九衢等攻復澄海縣十月遣總兵苗之秀攻克揭陽南北礮臺二殱斃賊黨甚衆招撫偽官四十五員水陸營兵三千九百餘名復揭陽潮陽二縣十一月卒於軍遺疏至得㫖劉秉權撫粤有年寔心任事近以潮逆負固督兵進𠞰得獲礮臺招復三縣克奏膚功不意積勞成疾遽爾奄逝朕心深為憫惻下部從優議卹賜祭塟如例諡端勤子思儼由廕生任郎中秉政者初任直𨽻雞澤知縣順治九年行取授雲南道御史十五年遷太僕寺少卿十六年遷左通政尋任寧夏巡撫康熙四年裁缺五年補福建巡撫十三年逆藩耿精忠叛秉政從逆十五年十月康親王入閩耿精忠窮蹙乞降詔秉政來京旋病死論罪籍其家子孫没入内務府劉漢祚劉漢祚漢軍正紅旗人由生員任直隸河間知府順治三年遷寧武兵備道五年遷江南左布政十二年詔内外大小官員直陳民隐司道府各許奏職掌事宜一次漢祚疏陳五事一江南本色顔料應照各省府縣自行解部一請留州縣起運錢糧十分之一備買草豆以濟軍需一催提協餉宜按季解濟一江南驛站已題明止用本地裁省銀兩至山東直隸請免提江南協濟一有主荒田亟入興屯俾民無包糧之累有司得按寔徵收上以其言可採下所司議行十三年巡按秦世楨以漢祚轉運軍需正已率屬舉薦擢福建巡撫時海逆鄭成功襲陷閩安鎮山賊紛起漢祚入境疏奏地方彫敝情形及籌餉諸事次浦城招撫山㓂林雯魏賜等收其偽印兵器檄各路員弁㑹𠞰海㓂陳德容破其黨蔡赤潘桂等疏入報聞時廷議裁併直省各道下各督撫議漢祚言閩疆多事所恃各道聮絡堵禦分汛嚴防未可輕議裁併上從之十二月招降偽都督李鳯等一百五十餘員十四年正月疏言左都御史魏裔介請以浙閩總督移駐漳州盖因漳近海澄藉以控禦鄭逆今海澄已歸版圖漳僅閩海一隅若偏處於漳不惟不能顧浙亦不能顧全閩逆賊竊據閩安鎮等處離省城僅三四十里督臣應如舊駐衢州浙閩江西三省適中之地調度兵將規復閩安以固根本得㫖如議三月疏報賊渠偽都督何傅偽將軍林文隆播虐於侯官古田閩清建寧偽都督鄭飛熊擾害建安甌寧已非一日臣仰體皇上好生之仁同督臣遣員招諭傅及文隆繳到偽印率偽官兵四百二十二員飛熊亦率偽官兵三百七員名來降得㫖嘉奬前巡撫宜永貴奏平海㓂未及提督馬得功在侯官夾擊事部以提督逗留飭查漢祚為疏辯賊逼省㑹雖退未肯逺離自馬得功渡江夾擊賊圍始解查問官兵如出一口提臣寔有戮力之功無逗留之弊下所司知之又疏言閩省山海交訌在在防𠞰非同無事地方經制官兵未可一例裁汰又言宜永貴不行奏明動支叛産銀兩賞給將士寔因逆賊傾巢入犯省㑹兵力單薄永貴輿疾登陴高懸賞格危疆賴以保全其用項應請開銷俱下部議從之十一月疏言海逆恃海憑舟乘潮出没前盤踞閩安鎮經年築城建寨勢甚堅牢今幸皇上威靈行間文武戮力迅攻克復賊膽已寒是以盡撤賊營聚集中左廣造巨艦復圖飄忽一切沿海汛防將領臣俱星檄勤宻戒嚴無煩睿念外惟是漳泉興福以及雲霄漳浦南靖詔安等處必須増兵造船為一勞永逸之計下所司議速行先是總督佟岱劾侍郎周亮工任閩藩時貪酷四十欵下撫按勘訊刑鞫如佟岱指詔亮工住閩質訊㑹佟岱以他事解任漢祚審得各欵皆虚以案情重大承審官同犯證解部定擬亮工後得免死起用事詳本傳於是御史張所志劾漢祚才庸年邁避怨避勞於重案依違兩端請罷斥漢祚亦具疏乞休從之御史許之漸續劾漢祚賍私等欵在閩候質巡按范平訊無據之漸以妄奏議處漢祚年老休致免議後十餘年卒於家子光美由筆帖式任貴池縣知縣康熙十九年擢監察御史二十七年遷内閣侍讀學士四十一年遷内閣學士四十二年擢安徽巡撫四十八年以匿災不報降五級調用王之鼎王之鼎漢軍正紅旗人都統王世選子也順治七年襲父二等子爵九年遇恩詔晉一等十年署㕘領隨寧逺大將軍貝勒屯齊征湖南擊走孫可望兵十三年十月授正紅旗漢軍副都統十五年十二月隨安南將軍明安達禮駐防貴州十七年還京十八年聖祖仁皇帝御極授福建中路總兵康熙二年八月㑹兵進取厦門海賊鄭錦以兵萬餘來犯之鼎督兵數十戰斬殺甚多遂克厦門金門及古浪諸島三年三月同提督王進功敗賊帥黄盛林茂裴德等㧞銅山賊巢叙功晉爵三等伯八年十一月仍授本旗副都統十年授江南提督十二年擢鎮海將軍駐防京口是年冬吳三桂反明年二月耿精忠亦叛海賊乘機煽亂上以安慶為江南上游要地命之鼎遣副都統一員領兵千名防守安慶而以安南將軍華善率八旗官兵同之鼎於京口駐防五月之鼎以賊船往來無定請調江隂𤓰洲戰艦集天寧洲令右路總兵侯襲爵督率訓練以備戰守七月疏言黄浦水汛外通大海内達蘇松更有沿海馬道下抵杭州上接京口請撥崇明沙船七十令八旗及緑旗官兵駐黄浦操防設遇賊船飄突水則舟師整備以扼要隘陸則馬道飛馳共圖撲𠞰似亦防禦之一法也疏俱得㫖俞允九月勅簡親王喇布為揚威大將軍率兵駐江寧之鼎㕘贊軍務十七年十一月諭兵部曰王之鼎才畧素優鎮守京口克稱厥職著調補福建水師提督加定海將軍之鼎聞命疏言京口兵有願移福建効力者請以一千名支給行糧隨征下部議從之十八年五月改授四川提督十九年四月疏言蜀省幅員數千里川南各路接壤雲貴宻邇逆巢川西一路隘口直接西畨時虞窺伺臣既膺提督之責宜整練標兵相繼應援今以原帯京口官兵一千名改設中營而左右二營有官無兵請准召募精銳充伍以資戰守又蜀疆初復非承平無事可比一遇有警非馬不能疾馳請以步七馬三為額部議提標二營缺額之數現有隨征總兵何成徳等官兵二千餘名可暫充補而四川提標經制原係馬二步八又未令進𠞰雲貴應無庸添設寢其奏是月賊將尤廷玉等犯永寧之鼎統師進𠞰先遣總兵劉魁率精銳馳赴永寧值賊兵已據城南山箐列寨劉魁同總兵李芳述分路進戰冒矢石奮勇衝擊陣斬偽總兵毛友貴等大敗賊衆獲器械無算六月勇畧將軍趙良棟以大兵將進𠞰雲貴調李芳述等往叙州而留之鼎駐防永寧八月賊將胡國柱以逆書附䧟賊來歸之厮卒煽誘我軍之鼎具狀以聞時賊既䧟瀘州復犯永寧之鼎拒守月餘外援阻絶九月九日賊穴城城䧟總兵斐雅逹劉魁何成徳遊擊陳先鳯等並為賊困之鼎解印付家人陳善曰吾義與此城存亡爾可間道走成都歸印朝廷分遣畢遂大呼率官兵巷戰手刅數賊羣賊蜂至左腋被創為賊所執遂至貴陽逆孽吳世璠遣人說之降之鼎罵賊不屈賊以刅加項之鼎神色不變瞋目大罵曰䑕輩何不速殺我天兵不日盡誅汝等耳遂遇害事聞得㫖王之鼎兵力單弱堅守孤城衆寡不敵遂遭賊䧟乃志不屈賊盡忠殉難深可憫惻下部議卹贈太子少保廕一子四品官賜祭塟如典禮諡忠毅櫬至京遣内大臣往奠子毓秀襲三等伯三十四年祀江南名宦三十六年子毓賢官貴州布政使貴州巡撫閻興邦以士民籲建之鼎祠於貴陽毓賢自任其費請賜祠扁入奏御書忠節垂芳賜之四十六年上南巡幸松江府御書純忠遺愛賜其祠雍正七年入祀昭忠祠吳興祚吳興祚漢軍正紅旗人順治七年以貢生授江西萍鄉知縣再任山西大寧知縣十八年遷沂州知州尋以驛務遲誤降調康熙二年補江南無錫縣知縣十三年八月遷行人司仍留任十四年四月漕運總督帥顔保疏陳興祚涖任後清釐錢糧代輸前任厯年逋賦積弊一清又招徠流民復業捐給牛種陞科四千二百餘畝又立法徵漕倉塲肅清盡除折勒之弊列疏保題吏部以吳興祚有本任未完漕項停陞之例議駁奉㫖吳興祚准照該督所薦行十五年陞福建按察使時逆藩耿精忠降詔命仍留靖南王爵率所屬官兵進𠞰海㓂逆賊朱統錩先受耿精忠敉逺將軍偽印聞精忠已降遂自稱宜春藩盤踞貴溪為江浙閩三省大患興祚抵任輕騎至光澤招撫偽都督陳龍施廷宇等統錩竄入江滸山興祚計令投誠之偽總兵蔡淑佯囘賊營為内應隨遣陳龍率所部導大軍直搗賊穴獲朱統錩子朱義潛侄朱義質賊勢大蹙偽總兵馮珩等縳朱統錩以獻獲其偽敉逺將軍銀印降偽官一百八員兵九千餘十七年五月擢福建巡撫時海賊鄭錦以臺灣為窟穴厦門為門户分遣其偽帥劉國軒等窺伺漳泉興三府興祚始受事漳泉屬縣相繼告䧟泉州被困日久七月興祚率標兵由興化陸路進𠞰抵仙遊縣偽總兵黄球等擁衆數千結連沿山土賊萬餘屯據白鴿嶺興祚分兵三道自當中路與賊遇自辰至酉賊殊死戰不退我兵從旁奮擊遂奪取白鴿嶺闗口斬級六百餘墮岸溺水死者無算賊大潰復追敗於嶺頭灣克復永春縣城遂遣兵分左右翼進𠞰再復德化縣城賊帥劉國軒聞風遁去尋仍以巨艦數百出没於赤㠗黄﨑諸處興祚遣發水師總兵林賢揚颿出海遊擊王祚昌徐德濟通判陳君翼同知陳子威乘風前進千總陳春張景咸以火箭飛射三路夾攻賊大潰焚沉賊船六十餘擒斬賊衆六千餘焚溺死者不可勝計興祚謂欲絶海㓂全藉水師疏請増募水師二萬詔從所請七月興祚遣驛傳道王國泰等招降偽總兵蔡冲琱林忠等三百八十五員兵丁萬二千五百餘人招囘島民男婦一千二百人得其偽闗防劄諭印記無算獲船六十有七分撥水師營是年叙功晉秩一品十九年正月興祚疏言鄭逆盤踞厦門沿海數千里受其荼毒臣自去冬新造戰船工竣水師提督萬正色分配將士由閩安鎮駕出大洋操演惟視舊存大小船艘修理工畢江南礮手齊集即行配駕相機進𠞰若過二月風汛轉南我師反在下風難以制勝今鄭逆悉調賊兵厚集海壇距我駐師之地咫尺相對恐賊船一得順風肆出侵犯我師必抽囘内港以逆其鋒沿海各汛更滋擾累莫若乘風勢利便先攻海壇毁賊門户並水陸夾攻以分賊勢今議以水師攻取海壇臣統標兵㨗赴同安㑹同總督將軍調度陸兵配駕八槳船由海倉松嶼潯尾石潯分路進取厦門䟽下王大臣㑹議如所請行于是興祚自泉州港㑹同寧海將軍拉哈達總兵王英道同安進取厦門賊將分據􅜉州潯尾二要口興祚發紅衣礮攻克之直趨厦門斬溺無算賊大敗潰散遂克厦門復遣兵取金門餘賊悉竄臺灣興祚因請留澳民防守蠲免荒田糧減闗課提督萬正色亦疏請於海澄厦門等十四處設鎮分防上命兵部侍郎温岱前往㑹同詳閲定議温岱至閩姚啟聖與言克復海壇時正色與偽總兵朱天貴宻約投誠然後進兵並無殺賊攻取之處温岱囘京兵部據其言入奏上諭曰進𠞰海賊一事吳興祚萬正色㑹同定議志靖海氛不俟荷蘭舟師乘機進取正色水師先行出洋興祚率陸兵聲援驅除海逆迅奏膚功不得以朱天貴宻約投誠謂冒濫軍功仍即與議叙二十年四月予騎都尉又一雲騎尉世職時海逆鄭錦死奉詔乘機規定澎湖臺灣以原任右都督施琅熟悉海㓂情形充水師提督尅期進師施琅疏奏巡撫吳興祚决意進兵臣職領水師理應獨任且未奉有督撫同進之㫖奉詔吳興祚有刑名錢糧之任不必進𠞰二十一年正月擢兩廣總督興祚疏言粤民受逆藩數十年之害利盡錙銖如鹽埠一項額課一十四萬有竒此盖千百商民凑合資本行運逆藩以鹽為利藪强佔鹽田場埠鹽課無出商民並累此粤民受困之一也廣属渡税三百八十餘處逆藩兵卒羅踞津口重加税錢又不許増船分載往往人多載重渡民被溺此又粤民受困之一也粤貨至境舊有落地税名逆藩創立總店銅錫鐵木之属已納税者重加私斂下至鷄豚蔬果一概截抽此又粤民受困之一也漁課舊額通省五千四百餘兩藩役委官重斂苛征嵗入鉅萬此又粤民受困之一也至市舶一項原與民無害奸徒沈上達乘禁海之日番舶不至勾結亡命私造大船出洋為市今廷議許畨舶自來在香山澳與商民陸地貿易内地之民既不出洋仍與海禁無碍宜照舊抽税以資國用伏讀恩詔有云逆賊盤踞地方横徵税課該督撫查明悉行除免粤東一省如鹽埠渡税總店漁課四項或應豁免宜聴部議施行奉㫖悉行除免二十二年又疏請分駐廣東兩鎮官兵左鎮統陸兵一千水兵二千駐扎廣州分防要汛右鎮統陸兵三千駐劄韶州居中調度分防連陽英清各要汛事下兵部又疏奏舊例廣西南太思三府俱食亷塩欝林等府俱食高塩拆運良便後因塩田盡遷改銷梧引今高亷二府塩田既復請仍舊例改食高亷塩路近價賤有便于民部議如所請行又奏請廣州沿海地畝招民耕種上諭曰前因海㓂未靖故令遷界今若令民耕種採捕甚有益於沿海之民浙閩等省亦宜有之爾部遣大臣一員前往展界立限其詳閲確議勿誤來春耕作之期二十五年疏論潮州水師官兵向裁歸潮鎮水師統轄今開洋貿易恐宵小潜踪應以澄海協達濠營水汛官兵改歸南澳水師鎮統轄其南澳與碣石海汛相近令互相聮絡以宻巡防部議允行初兩奥錢法不行興祚疏請撥銅設爐鼓鑄二十八年六月給事中錢晉錫御史王君詔疏覈興祚鼓鑄浮冒部議降三級調用尋奉特㫖吳興祚効力行間悉知軍務著以副都統用三十一年十二月奉命以副都統鎮大同右衛三十四年六月兵部疏劾右衛將軍希佛等不収八旗撥送馬匹以致虚糜錢糧議希佛革職興祚降三級調用從之時上親征噶爾丹興祚奉㫖於沙克所坐臺三十六年正月奉㫖復原官二月以病卒孫吳奕曽襲騎都尉又一雲騎尉世職欽定八旗通志卷二百
