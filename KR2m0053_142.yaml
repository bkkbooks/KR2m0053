body:
  text: 欽定四庫全書欽定八旗通志卷一百二十八人物志八宗室王公傳六和碩承澤裕親王碩塞謹莊親王尼堪和碩敬和碩承澤裕親王碩塞嗣孫允祿碩塞太宗文皇帝第五子順治元年十月封多羅承澤郡王時流賊李自成奔潼關河南仍為賊守十二月隨定國大將軍豫親王多鐸南征破流賊平陜西安撫河南事詳豫親王傳二年二月還師河南尋隨豫親王征眀福王朱由嵩於江南四月恩賜王團龍紗衣一襲五月渡江克江寧福王就俘十月凱旋賜黃金二千白金二萬玲瓏鞍馬一三年五月蘇尼特部騰機思騰機特等叛奔喀爾喀諭集外藩諸蒙古兵於克嚕倫河以和碩德豫親王多鐸為揚威大將軍往𠞰命王隨行參贊軍務有功七月敗喀爾喀土謝圗汗碩雷汗兵五年八月同英親王阿濟格等奉命𠞰天津土寇殱之十一月喀爾喀行獵近邉復同英親王駐防大同至則總兵薑瓖已據城叛王堅守汛地賊至掩擊之六年正月賊黨劉遷攻代州王率兵往援入其郛破之賊復於助馬得勝兩路結營以拒王親督戰敗之六年三月睿親王赴大同承制晉封碩塞為親王七年八月以和碩親王下多羅郡王上無止稱親王者仍改多羅郡王八年閏二月晉封和碩承澤親王三月命管兵部事十月預議政十一年十一月掌宗人府事十二月薨年二十有七康熙十年六月追諡曰裕碩塞長子博果鐸於順治十二年襲封和碩親王改封號曰莊雍正元年正月薨年七十有四諡曰靖無嗣二月命以聖祖仁皇帝第十六子允祿為博果鐸後襲封和碩莊親王二年十月掌宗人府事七年二月任正紅旗漢軍都統十年八月調正黃旗滿洲都統今上御極命總理事務兼掌工部食親王雙俸王承聖祖仁皇帝指授精天文算法預修數理精藴至是充增修七政時憲書總裁又修律吕正義後編御製序稱其貫徹樂義乾隆二年十二月以總理事務得優敘賜一奉恩鎮國公並允王請以承澤裕親王曾孫寧赫襲三年二月任理藩院尚書尋充玉牒館總裁四年十月議王與𢎞晢往來黨私應削爵得旨寬免裁親王雙俸罷理藩院尚書任十二月復以王私扺官物應削爵詔仍免罰親王俸五年六年十二月特旨免罰俸七年六月總理樂部事二十九年六月王七十誕辰賜詩有近尊行裏無雙老闔藩衛中有數賢之句三十二年二月薨年七十有三諡曰恪以其孫永瑺襲永瑺奉恩輔國公𢎞普長子初於乾隆八年襲父爵奉恩輔國公二十一年管健鋭營事二十二年正月署鑾儀衛事七月任鑲黃旗滿洲副都統三十二年六月襲封和碩莊親王尋任鑲紅旗蒙古都統十月總理樂部事三十四年總理正藍旗覺羅學三十八年九月署領侍衛內大臣十月授盟長十一月掌宗人府事三十九年總理左右翼宗學四十一年充玉牒館總裁四十二年調正紅旗滿洲都統五十三年二月薨諡曰慎以永瑺弟奉國將軍永珂之長子綿課襲封和碩莊親王和碩敬謹莊親王尼堪尼堪原封廣略貝勒禇英第三子禇英為太祖髙皇帝長子嵗戊戌正月與台吉巴雅喇等領兵一千征安楚拉庫路夜馳往取屯寨二十餘降萬餘人賜號洪巴圖魯尋封多羅貝勒丁未年春正月東海瓦爾喀部蜚悠城長策穆特赫苦烏拉國布占泰之虐乞移家來附禇英奉命同貝勒舒爾哈齊代善率兵三千徙之乘夜行隂晦見大纛上有光衆以為異捫視無有復樹之光如初舒爾哈齊貝勒疑非吉兆欲回兵禇英與代善持不可曰吉凶兆已定吾等何所見而回兵決意進至蜚悠城盡收其屯寨五百戶令侍衛扈爾漢率兵三百衛之先行布占泰聞之以萬人邀諸路扈爾漢倚山陳與敵相持次日禇英與代善等至䇿馬奮怒曰皇父每有征伐無不破降其衆今雖未親厯行間有我等來此爾衆無憂昔擒布占泰宥歸俾主其地未幾背恩如故今豈不能再縛之衆皆曰願效力禇英遂與代善各率兵五百夾擊大敗之斬其帥生擒貝勒常住瑚里布及常住之子死者相枕藉獲馬五千甲三千上嘉奬之更賜號廣略貝勒戊申三月同貝勒阿敏征烏拉宜罕山城克之布占泰與蒙古科爾沁貝勒翁阿岱合兵出烏拉城二十里遙望我軍知不可敵相約還復以失宜罕山城大懼遣使來盟乙卯閏八月禇英以罪伏誅爵除尼堪初隨征多羅特董夔諸部有功天聰九年五月大兵征眀山西隨多鐸率偏師入寧錦界以牽制眀兵俾毋西援崇德元年封固山貝子十二月上征朝鮮李倧遁尼堪隨豫親王多鐸追至南漢山城圍之朝鮮將領兵萬八千來援我兵迎敵大敗之又擊敗其副將援兵五千二年正月倧降師還四月任議政大臣四年三月上征眀尼堪同武英郡王阿濟格貝子洛託等率四旗護軍兵環守塔山連山七年九月尼堪代公博和託屯濟哈等駐錦州順治元年四月隨睿親王多爾衮入山海關破流賊復隨武英郡王阿濟格追至望都十月晉封多羅貝勒隨定國大將軍豫親王多鐸南征十二月自孟津至陜州大破賊衆二年正月扺潼關賊將劉方亮領兵犯我營尼堪與護軍統領圖賴夾擊敗之獲馬三百餘賊又以騎兵橫衝我師復同懷順王耿仲眀固山貝子尚善擊敗之遂破潼關三月分兵趨歸德㝎河南三月進征江南諭嘉王貝勒等破流寇平陜西安撫河南勤勞日久賜尼堪弓一五月大兵克南京眀福王朱由嵩遁太平復走蕪湖尼堪同圖賴等率兵追及之福王將靖國公黃得功逆戰擊敗之奪其舟得功中流矢死田雄等縛獻福王餘衆俱降又以炮攻克江隂縣十月凱旋賜金二百銀萬五千鞍一馬三三年正月隨肅親王豪格統兵西征尼堪扺西安由棧道進賊渠賀珍自雞頭關迎拒敗之扺漢中疾躪其營賊潰走西鄉追擊於椘湖至漢隂賊二隻虎奔四川孫守法奔嶽科寨十一月入蜀張獻忠伏誅與貝子滿達海等分兵進𠞰遵義夔州茂州榮昌隆昌富順內江資陽等處斬偽王及官辨等二千三百有竒俘獲無算川寇平互見武肅親王傳五年正月凱旋九月晉封多羅敬謹郡王與英親王阿濟格𠞰平天津土寇六年正月命為定西大將軍討大同叛鎮薑瓖三月都統阿賴等屢挫賊衆敗偽巡撫薑輝兵偽參將羅英壇率所部降是月睿親王多爾衮赴大同招撫承制晉尼堪為親王四月圍大同八月偽總兵楊振威斬瓖及其兄琳弟有光來降師還七年二月命與滿達海博洛等同理六部事八月以徇隱尚書阿哈尼堪不親往迎朝鮮王弟事降郡王八年正月復晉封和碩敬謹親王二月同諸王奏削故睿親王封爵三月以英親王私藏兵器事隱不奏降郡王尋命諸王分管六部事王掌禮部五月復封親王九年六月掌宗人府事時獻忠餘孽孫可望李㝎國等皆受眀桂王朱由榔封爵分犯湖南貴州七月命王為定逺大將軍往征之瀕行賜御衣佩刀鞍馬上親送至南苑八月定國陷桂林敕王毋往貴州取湖南寶慶後入廣西𠞰賊十一月師扺湘潭由榔將馬進忠等遁還寶慶我師進擊於衡山敗其兵千八百是夜兼程趨衡州詰旦大兵方列陳定國兵四萬餘猝至王遣首隊進擊各依所向衝入賊大敗逐北二十餘里獲象四馬四百有竒方首隊兵進擊時林內賊伏發又衡州城內賊出應之師欲退王曰我兵凡臨戰陳無退者我為宗室若不斬除逆寇何面目歸乎遂奮勇直入賊環圍之王身率諸將士縱橫衝擊矢盡拔刀力戰歿于陳年四十有三十年十月喪還上輟朝三日命親王以下二品官以上出郭十里迎上欲親臨其喪諸王大臣力諌乃止諡曰莊十二月以其次子尼思哈襲封敬謹親王十六年十月追論王存日分取睿親王所遺財物及掌禮部時不劾奏尚書談泰驕縱罪應削爵詔以王係宗室陳亡仍留爵十七年十一月尼思哈薨時方十歲諡曰悼十八年六月以尼堪長子蘭布降襲多羅貝勒康熙六年二月諭宗人府曰尼堪以親王陳亡殊為可憫世祖章皇帝復嘗矜念仍留所襲爵又無不準承襲之旨蘭布著封為郡王仍與原號七年八月蘭布以父陳亡功請復舊爵得旨蘭布著襲封和碩敬謹親王八年五月議蘭布娶輔臣鰲拜孫女為妻詰鰲拜罪狀狡稱不知降鎮國公十三年六月命隨貝勒尚善討逆藩吳三桂于湖南十七年十月卒於軍年三十有七十九年追論蘭布在嶽州時退縮罪削爵蘭布第四子賴士于康熙十八年降襲輔國公三十五年正月上親征噶爾丹賴士統兵赴歸化城駐守十一月師還五十三年議賴士不安靜守分探聼消息散布流言削爵五十四年赴阿爾吉軍前效力五十九年隨征西將軍祁里德至額勒齊斯河擊殺賊衆議敘得頭等功牌一雍正八年復封輔國公十年閏五月卒初賴士削爵以蘭布孫務友之子富增襲封輔國公雍正四年二月諭宗人府曰輔國公富增人甚不及前革退賴士公爵時因無可承襲之人始令伊承襲今賴士在軍前行走數年其子伊爾登又甚勤謹竭力著將富增公爵革退與伊爾登承襲伊爾登初於雍正三年五月管武偹院事九月任鑲藍旗漢軍副都統尋遷右翼前鋒統領四年襲封輔國公六年擢正黃旗蒙古都統八年三月攝鑲紅旗護軍統領十一月復署右翼前鋒統領乾隆十四年四月卒諡簡恪以其第七子富春承襲奉恩輔國公三十五年授吉林將軍四十二年六月調杭州將軍十一月以前任吉林時不能禁止採參議革將軍得旨富春革去公爵另襲仍革職留杭州將軍任于是以富春第二子賓寧襲四十三年三月上念敬謹親王尼堪功勛頗顯且以力戰捐軀晉封賓寧為鎮國公世襲罔替四十七年八月任正紅旗蒙古副都統十月授宗人府左宗人四十八年五月任鑲藍旗護軍統領欽定八旗通志卷一百二十八
