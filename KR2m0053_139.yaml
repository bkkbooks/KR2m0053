body:
  text: 欽定四庫全書欽定八旗通志卷一百二十五人物志五宗室王公傳三和碩睿忠親王多爾衮和碩睿忠親王多爾衮多爾衮太祖髙皇帝第十四子初封貝勒天聰二年三月與同母弟多鐸随太宗文皇帝征察哈爾多羅特部大敗之敖穆掄俘獲萬餘凱旋車駕将還瀋陽宴羣臣上以多爾衮従征有功特賜號墨爾根岱青三年九月上親征明克龍井闗與三貝勒莽古爾泰等攻漢兒荘城降之十一月率兵先驅赴通州河相視渡口捕哨卒従上攻北京明寧逺巡撫袁崇煥錦州總兵祖大夀等以兵来援奉命同莽古爾泰等迎擊之崇煥兵二萬屯廣渠門外多爾衮由正路敗敵追殺至城壕随大兵視薊州遇山海闗兵五千来援擊殱之四年二月上自灤河旋蹕多爾衮與莽古爾泰先行破敵營斬級六十獲馬八五年七月初設六部特命管吏部事八月上圍大凌河明兵出誘戰多爾衮偕諸将衝陣敵堕壕死者百餘城上礮矢齊發我将士有陣歿者上切責其従官曰定例遇敵時貝勒坐鎮中軍令諸将率兵擊之今貝勒輕進戰爾䓁何不阻止倘有疎失爾䓁死不足蔽辜矣十月大夀以錦州降多爾衮與貝勒阿巴泰䓁以兵四千随大夀作潰奔狀城中兵分路迎並為我軍擊敗之事詳饒餘敏郡王傳六年五月随上親征察哈爾大兵次木魯哈喇克沁命同貝勒濟爾哈朗䓁俘其部衆千餘扵歸化城西南黄河岸七年六月詔問征明及朝鮮察哈爾三者何先多爾衮奏言今春宜整頓兵馬乘榖熟時入邊圍北京截其援兵毁其屯保為久駐計可坐待其敝也八年五月上征明由盛京統大兵西行出上榆林口至達代塔前駐營秋七月命同阿濟格貝勒䓁自巴顔珠爾格入龍門㑹大兵扵宣府沿途擊敗明兵将略保安州克其城殺守備一㑹大兵扵應州獻所獲八月略朔州城東至五臺山還随大兵視大同城九年二月命與貝勒岳託薩哈璘豪格統兵一萬往收察哈爾林丹汗子額哲四月至錫喇珠爾格降其台吉索諾木及所屬千五百户進逼托里圗恐其衆驚潰按兵不動額哲母葉赫貝勒錦台什女孫也其弟南楚及族叔祖阿什達爾漢皆為我大臣因遣其宣諭招撫額哲遂奉其母率衆宰桑台吉䓁衆迎降時鄂爾多斯部濟農来誘額哲往附盟誓而去前軍追及之多爾衮令留其使遣人諭濟農盡返所㩦察哈爾人衆不然即移兵進攻濟農懼盡送於軍六月師還渡河岳託率兵千衛降衆駐歸化城多爾衮與諸貝勒擕額哲及宰桑台吉䓁征明自平魯衛入敗明右衛兵至朔州毁寧武闗破明羊房口兵略代州忻州敗敵兵千餘至忻口敗代州哨卒追至崞縣獲馬六十餘至黒峰口斬明哨卒四十自應州赴平魯衛出邊敗明大同寧逺錦州援兵斬馘無算仍由歸化城率降衆還察哈爾有元玉璽順帝時失之沙漠越二百餘年歸元裔博碩克圗汗後為林丹汗所得至是多爾衮令額哲獻於上衆貝勒大臣以䝉古臣服且得前代璽表上尊號事具頴毅親王傳崇徳元年四月晉封和碩睿親王八月上以武英郡王阿濟格饒餘貝勒阿巴泰征明已越北京命多爾衮同豫親王多鐸䓁率師征山海闗以牽制明兵至錦州收降城中士人胡有陞張紹楨門丗文門丗科秦永福䓁聞武英郡王奏㨗乃班師十二月従上征朝鮮次沙河保東岡二年正月同肅親王豪格統左翼兵従寛甸路入長山口克昌州敗其兵於寧邊城下又以五十人追敗其黄州援兵萬五千進取江華島以紅衣礟擊潰兵舡四十我兵乘其船入島殪伏兵千餘克其城獲朝鮮王妃及其二子國王李倧窮蹙乞降上班師命王同貝勒杜度約束後軍擕朝鮮王質子李􅓭李淏及大臣子以還三年二月上親征喀爾喀命同禮親王代善䓁留守並監築遼陽都爾弼城逾月工竣改名屏城復同阿巴泰董治盛京至遼河大路廣十丈髙三尺夾以壕八月𠡠授奉命大将軍征明與揚威大将軍貝勒岳託分兵略地多爾衮領左翼兵自董家口東登山毁邊墻入掩其無備取青山營與右翼兵㑹通州河西逾北京自涿州分兵八道右沿西山麓左沿運河長驅前進厯北京迤西千里内明将卒皆潰遁略地至山西界還復至臨清州渡運河攻破濟南還略天津遷安由太平寨出青山闗二十餘戰皆㨗克城四十降者六俘户口二十五萬七千有竒我将士無一傷者四年四月凱還車駕至盛京王陳所獲扵篤恭殿按旗具冊進獻上酌納之賜馬五白金二萬五年五月同肅親王䓁赴明義州屯田諭以駐營近錦州斷敵往来路至則攻克城西九臺盡刈其禾稼又攻克小凌河西二臺七月明兵五百出錦州城夜襲我鑲藍旗營擊却之斬八人明總督洪承疇至寧逺分兵據杏山營城下擊敗其騎兵獲馬七十上遣人傳諭曰王䓁但固守營壘俟敵来犯乃擊之是月敵兵千餘出戰郤復入擊斬甚衆獲馬百餘復斬其出樵者八十六人又追斬明兵夜入義州戕我屯卒者九月敗敵杏山城北擊松山援兵獲馬匹甲仗六年二月攻廣寧山城擊斬松山援兵二百四十及出獵小凌河之錦州兵百七十餘是時圍錦州之王貝勒䓁移營去城三十里又令每旗一将校率每佐領下甲五人先歸上遣鄭親王濟爾哈朗往代傳諭王曰前令爾䓁圍錦州由逺漸近以困之今離城逺駐致敵人田獵輓運任意往来軍律何在若久駐馬疲當遍察以定去留仍嚴懲不善牧者乃均派遣還尤屬錯謬其由何人倡議各指名擬罪王覆奏臣因敵兵在錦州松山杏山三城者其馬皆牧他處若彼来犯可更畨抵禦是以遣每旗官一員率每佐領下五人還牧馬修治甲胄器械又因舊駐近城處草盡移逺就牧皆臣倡議應治臣罪上遣内大臣䓁至遼河傳諭曰朕愛爾過諸子弟賚予獨厚以爾勤勞國政恪遵朕命故也今於圍敵𦂳要之時離城逺駐遣兵還家何違命若此其自行議罪王奏臣識庸慮短背違諭㫖罪應死上命降為郡王罰銀萬兩奪兩佐領户口六月同肅親王豪格䓁往代鄭親王濟爾哈朗等圍錦州時承疇率王樸李輔明唐通白廣恩曹變蛟馬科王廷臣吴三桂八大将合兵十三萬来援錦州次松山屢迎戰王擊却之以敵兵多請濟師上親統大軍往征駕渡遼河疾馳六日至戚家保遣大學士剛林諭王䓁先駐營髙槗俟大兵合圍松山杏山王等奏聖駕親臨臣等勇氣增倍惟務進攻但明兵甚衆臣䓁屢攻戰微有損傷若冄速戰恐力不及遽立營髙槗慮敵潜約錦州松山兩處夾攻請上暫駐松山杏山間上允之自烏欣河南山至海綿亘列營明兵屢犯我鑲藍旗鑲紅旗諸汛既敗卻伺我軍歸營輒来犯上張黄盖指揮布陣明将士望見皆大驚潰遁王偕貝子洛託䓁趨塔山大路横擊之敵死者相枕藉復同武英郡王阿濟格以紅衣礮攻克塔山外四臺斬殺甚衆生擒臺内副将王希賢䓁斬守備二都司一三桂樸由杏山奔寧逺九月師還命同肅郡王豪格䓁還守盛京十一月同肅郡王豪格代貝勒杜度䓁圍錦州七年二月下松山城承疇就擒三月克錦州大夀以城降四月同鄭親王以礮攻克塔山城殱官屬及兵七千復以礮攻杏山城管糧官朱廷榭副将吕品竒降盡毁松山塔山杏山三城乃班師七月叙功復爵和碩睿親王八年八月世祖章皇帝即位禮親王集諸王貝勒議以鄭親王與王輔政王自誓曰如不秉公輔理妄自尊大天地譴之越日郡王阿達禮私語王曰王正大位我當從王貝子碩託亦言内大臣及侍衛皆従我謀欲王自立王遂與禮親王發其謀阿達禮碩託並伏誅十二月同鄭親王集衆議罷諸王貝子貝勒管理六部順治元年正月朝鮮國王李倧餽物於王王語鄭親王及諸大臣曰朝鮮王因予取江華島時全其妻子嵗以餽来較諸王獨厚曾奏聞先帝受之今我等輔政誼無私交不當受遂卻之並定議禁外國餽送諸王貝勒是月多爾衮與鄭親王濟爾哈朗同攝政鄭親王集内三院六部都察院理藩院大臣諭以凢政事皆先啟睿親王書銜名及坐立班次行禮儀注皆以睿親王為首三月都統和洛輝䓁訐肅親王怨王不立已語言狂悖迺集衆定讞削肅親王爵以議政大臣揚善等諂附謀亂誅之四月上御篤恭殿授王奉命大將軍𠡠印𠡠曰我皇祖肇造丕基皇考底定宏業重大之任付於𣺌躬今蒙古朝鮮俱已歸服漢人城郭土地漸次攻克征討之舉所闗甚重朕年幼冲未能親履戎行特命爾攝政和碩睿親王多爾衮代統大軍用加殊禮錫以御用纛葢等物及奉命大将軍印往定中原一切賞罰俱便宜従事至攻取方略爾王欽承皇考聖訓諒已素諳其諸王貝勒貝子公大臣䓁事大将軍當如事朕同心協力以圗進取庶祖考英靈為之欣慰欽哉於是王率武英郡王豫郡王及恭順王孔有徳懐順王耿仲明智順王尚可嘉䓁啟行師次翁後明山海闗總兵平西伯吴三桂遣副将楊坤逰擊郭雲龍致書請兵王得書即移錦州紅衣礮向山海闗報三桂書曰我國向欲與明修好屢次致書明君臣不計國家喪亂生民塗炭曾無一言相答是以整師三入盖示意扵明官吏軍民欲其熟籌通好也若今日則不復出此惟有底定中原與民休息而已予聞流賊攻陷京都崇禎帝慘亡不勝髪指用率仁義之師沉舟破釜誓不返旌必滅賊出民水火伯遣使致書思報主恩與流賊不共戴天誠忠臣之義勿因向守遼東與我為敵尚復懐疑昔管仲射桓公中鈎桓公用為仲父以成霸業今伯若率衆来歸必封以故土晉為藩王國仇可報身家可保世世子孫長享富貴如河山之永也師次連山三桂復遣郭雲龍孫文煥来致書請速進兵王星馳踰寧逺次沙河距山海闗十里三桂報賊已出邊立營王命諸王率精兵逆擊敗賊将唐通於一片石師至闗三桂出迎王諭三桂歸營兵各以白布繫肩為識恐與賊混致誤殺令先驅入闗時李自成率賊兵二十餘萬自北山横亘至海列陣以待我兵少對賊布陣不能横列及海王令曰流賊横行久獷且衆不可輕擊吾觀其陣太相去逺首尾必不能顧我兵可鱗次對賊陣尾伺其氣衰突之必勝努力破此則大業成矣勿違莭制越伍躁進陣既列三桂兵列右翼末悉衆搏戰是日大風揚沙塵咫尺莫辨賊力鬪良久我軍呼噪者再風随止従三桂陣右突出衝賊中堅萬馬騰躍飛矢如雨集自成登髙岡監戰知為我兵遂膽悸䇿馬下岡走我兵無不一當百追奔四十里賊大潰遁回京師王即軍前承制進三桂爵平西王賜玉帶蟒袍貂裘等物令闗内軍人各薙髪以馬步兵萬𨽻三桂先驅追賊又誓諸将曰此行除暴救民滅寇安天下勿殺無辜勿掠財物勿焚廬舎不如約者罪之仍諭官民以取殘不殺共享太平之意諭下凡百姓逃竄山谷者莫不大恱各還鄉里薙髪迎降五月朔師次通州自成已先一日焚宫闕括金幣西遁王令諸王貝勒貝子等與三桂各率所部追賊翼日王入京師明文武百官率軍民老幼焚香跪迎朝陽門外設故明鹵簿請乘輦王曰予法周公輔成王不當乘輦諸臣以周公負扆攝政固請王曰予来定天下不可不従衆意乃乘輦入武英殿下令安輯百姓飭将士入城毋入民舎有卒屠民家犬射傷犬主斬以徇民皆安堵如故為明崇禎帝發喪三日具帝禮塟歸順諸臣以明原官任事以京内外經賊蹂躪鰥寡孤獨無生計者勅所司養贍令曰養民之道莫大於省刑罰薄税斂自明季禍亂刁風日熾以越訴訐訟為常設機搆訟自今嘉與維新凢五月二日昧爽以前罪無大小悉行宥免違諭興訟者以所告罪罪之細事就有司告理重大經撫按結案非機宻毋得入京越訴訟師誣陷良民加等反坐前朝弊政莫如加派遼餉外又有剿餉練餉數倍正供逺者二十年近者十數載天下嗷嗷朝不及夕更有召買糧料諸名目巧取殃民今與民約額賦外一切加派盡予刪除如官吏仍混征暗派察實治罪初諸王大臣等追賊至望都大破之自成奔西安畿輔諸城俱納款分遣都統覺羅巴哈納石廷柱葉臣及侍郎王鰲永䓁招撫山東山西河南時明福王朱由崧自立於江寧改元𢎞光大學士史可法督師揚州又設江北四鎮沿淮徐置戍卒王欲招之降令南来副将韓拱薇㕘将陳萬春等致書可法曰予向在瀋陽即知燕京物望咸推司馬後入闗破賊得與都人士接見識介弟於清班曾託其手勒平安拳致衷緒未審以何時得達比聞道路紛紛多謂金陵有自立者夫君父之讐不共戴天春秋之義有賊不討則故君不得書塟新君不得書即位所以防亂臣賊子法至嚴也闖賊李自成稱兵犯闕手毒君親中國臣民不聞加遺一矢平西王吴三桂介在東陲獨效包胥之哭朝廷感其忠義念累丗之宿好棄近日之小嫌爰整貔貅驅除狗䑕入京之日首崇懐宗帝后諡號卜塟山陵悉如典禮親郡王将軍以下一仍故封不加改削勲戚文武諸臣咸在朝列恩禮有加耕市不驚秋毫無擾方擬秋髙氣爽遣将西征傳檄江南聯兵河朔陳師鞠旅戮力同心報乃君國之讐彰我朝廷之徳豈意南州諸君子苟安旦夕弗審事機聊慕虛名頓忘實害予甚惑之國家之撫定燕都乃得之於闖賊非取之於明朝也賊毁明朝之廟主辱及先人我國家不憚征繕之勞悉索敝賦代為雪耻孝子仁人當如何感恩圗報兹乃乘逆㓂稽誅王師暫息遂欲雄據江南坐享漁人之利揆諸情理豈可謂平将以為天塹不能飛渡投鞭不足斷流耶夫闖賊但為明朝祟耳未嘗得罪於我國家也徒以薄海同讐特伸大義今若擁號稱尊便是天有二日儼為勍敵予将簡西行之鋭轉斾東征且擬釋彼重誅命為前𨗳夫以中華全力受制潢池而欲以江左一隅兼支大國勝負之數無待蓍龜矣予聞君子之愛人也以徳細人則以姑息諸君子果識時知命篤念故主厚愛賢王宜勸令削號歸藩永綏福禄朝廷當待以虞賔統承禮物帶礪山河位在諸王侯上庶不負朝廷伸義討賊興滅繼絶之初心至南州羣彦翩然来儀則爾公爾侯列爵分土有平西之典例在惟執事實圗利之輓近士大夫好髙樹名義而不顧國家之急每有大事輙同築舎昔宋人議論未定兵已渡河可為殷鑒先生領袖名流主持至計必能深維終始寧忍随俗浮沉取舎従違應早審定兵行在即可西可東南國安危在此一舉願諸君子同以討賊為心毋貪一時瞬息之榮而重故國無窮之禍為亂臣賊子所笑予實有厚望焉記有之惟善人能受盡言敬布腹心佇聞明教江天在望延跂為勞書不宣意可法旋遣人報書曰南中向接好音法隨遣使問訊吴大将軍未敢遽通左右非委隆誼於草莽也誠以大夫無私交春秋之義今倥偬之際忽捧琬璧之章真不啻従天而降也循讀冄三殷殷致意若以逆賊尚稽天討煩貴國憂法且感且愧懼左右不察謂南中臣民媮安江左竟忘君父之怨敬為貴國一詳陳之我大行皇帝敬天法祖勤政愛民真堯舜之主也以庸臣誤國致有三月十九日之事法待罪南樞救援無及師次淮上凶問遂来地拆天崩山枯海泣嗟乎人孰無君雖肆法於市朝以為泄泄者之戒亦奚足謝先皇帝於地下哉爾時南中臣民哀慟如喪考妣無不拊膺切齒欲悉東南之甲立翦兇讐而二三老臣謂國破君亡宗社為重相與迎立今上以繫中外之心今上非他神宗之孫光宗之子而大行皇帝之兄也名正言順天與人歸五月朔日駕臨南都萬姓夾道歡呼聲聞數里羣臣勸進今上悲不自勝讓再讓三僅允監國迨臣民伏闕屢請始以十五日正位南都従前鳯集河清瑞應非一即告廟之日紫雲如盖祝文升霄萬目共瞻欣傳盛事大江湧出枏梓十萬章助修宫殿豈非天意也哉越數日遂命法視師江北刻日西征忽傳我大将吴三桂借兵貴國破走逆成為我先皇帝后發喪成禮掃清宫闕撫輯羣黎且罷薙髪之令示不忘本朝此等舉動振古鑠今凢為大明臣子無不長跽北向頂禮加額豈但如明諭所云感恩圗報已乎謹扵八月薄治筐篚遣使犒師兼欲請命鴻裁連兵西討是以王師既發復次江淮乃辱明誨引春秋大義来相詰責善哉乎推言之然此文為列國君薨世子應立有賊未討不忍死其君者立說可若夫天下共主身殉社稷青宫皇子慘變非常而猶拘牽不即位之文坐昧大一統之義中原鼎沸倉卒出師将何以維繫人心號召忠義紫陽綱目踵事春秋其間特書如莽移漢鼎光武中興丕廢山陽昭烈踐阼懐愍亡國晉元嗣基徽欽䝉塵宋高纉統是皆於國讐未翦之日亟正位號綱目未嘗斥為自立率以正統與之甚至如元宗幸蜀太子即位靈武議者疵之亦未嘗不許以行權幸其光復舊物也本朝傳世十六正統相承自治冠帶之族繼絶存亡仁恩遐被貴國昔在先朝夙膺封號載在盟府寧不聞乎今痛心本朝之難驅除亂逆可謂大義復著扵春秋矣昔契丹和宋止嵗輸以金繒回紇助唐原不利其土地况貴國篤念世好兵以義動萬代瞻仰在此一舉若乃乗我䝉難棄好崇讐規此幅􅊷為徳不卒是以義始而以利終為賊人所竊笑也貴國豈其然往先帝軫念潢池不忍盡戮剿撫互用貽誤至今今上天縦英明刻刻以復讐為念廟堂之上和衷體國介胄之士飲泣枕戈忠義民兵願為國死竊以為天亡逆闖當不越於斯時矣語曰樹徳務滋除惡務盡今逆賊未服天誅諜知捲土西秦方圗報復此不獨本朝不共戴天之恨抑亦貴國除惡未盡之憂伏乞堅同仇之誼全始終之徳合師進討問罪秦中共梟逆賊之頭以洩敷天之憤則貴國義問照燿千秋本國圗報惟力是視従此兩國世通盟好傳之無窮不亦休乎至於牛耳之盟則本朝使臣久已在道不日抵燕奉盤盂從事矣法北望陵廟無涕可揮身陷大戮罪當萬死所以不即従先帝者實惟社稷之故傳曰竭股肱之力繼之以忠貞法處今日鞠躬致命克盡臣莭所以報也惟殿下實昭鑒之書至宣付内院先是畿輔初定王遣輔國公屯齊哈和度䓁迎上駕奏言京師形勢宜建都皇上宅中圗治宇内朝宗可慰天下仰望心至是率諸王迎駕於通州十月上御皇極門賜冊寳封叔父攝政王建碑紀績復豪格肅親王爵晉阿濟格為英親王同三桂可喜由邊外趨綏徳復多鐸豫親王爵同有徳仲明由河南趨西安剿賊定都後豫親王還征江南二年五月鄭親王等議定攝政王儀制視諸王有加禮王曰上前未敢違禮他處如議行翌日入朝見諸臣皆跪遂回輿責大學士剛林等曰諸臣何故跪此皇上之朝門也他處行此禮尚可乃行之朝門豈有竟受之禮其諭衆官知之御史趙開心疏言攝政王見諸臣跪迎即回因諸臣徒知尊王而不知王之尊皇上也以叔父之親兼攝政之尊原與諸王有異然羣臣謁王當與朝見皇上禮不同宜明定儀制又稱號必先正名上諭稱攝政叔父王叔父惟皇上得稱之若臣庶皆稱則尊卑無異臣以為當於叔父上加一皇字庶上下辨而名義定疏下禮部議行六月豫親王克揚州可法死之遂下江寧擒由崧於蕪湖江南平閏六月英親王剿賊至武昌東下九江故明寧南侯左良玉之子夢庚率衆降遂班師七月王致書豫親王曰王遣貝勒博洛等招撫常州蘇州杭州紹興諸府降故明潞王朱常淓淮王朱常清已悉知之大兵日久勞苦王可率諸将士還京南京改稱江南省應天府改為江寧府王量留兵交貝勒勒克徳渾都統葉臣駐守朱氏在任者改補他職所鑄錢留充饟洪武陵設太監四名守陵兵四十名給地供祭祀投誠官或来京或彼處安置王其酌行之又致書英親王曰爾䓁先稱流賊盡滅李自成已死後又言戰敗兵凡十三次則先稱殱賊竟屬虛語今又聞自成遁江西爾䒭既稱在江西候㫖何竟啟行八月英親王還京王令停遣官出迎尋議英親王出征時罪降郡王事具本傳十月誡浙江總督張存仁曰各官之任曽屢飭盡忠勤職毋諂媚餽遺本王爾為封疆大吏宜表率僚屬乃送爾本王縀茶豈前諭未知聞耶後勿復如此是月同鄭親王肅親王入謝上賜良馬恩出諭曰凢遇朝賀大典朕受王禮若此等小莭毋與諸王同王奏上年幼冲臣不敢違禮俟上春秋鼎盛凢有寵恩自不敢辭十二月集諸王貝勒貝子公大臣等遣人傳語以尊崇皇上誡諂媚已且曰太祖太宗所貽之業予必力圖保䕶俟皇上春秋鼎盛即行歸政又曰前所以不立肅親王者非予一人意因諸王大臣皆曰若立肅親王我等皆無生理是以不立傳語畢惟豫親王不荅使者還報復遣傳語曰昔太宗賔天時予在朝門幄中坐爾與英親王跪請即尊位謂兩旗大臣屬望我者多諸親戚皆来言予時以死自誓乃已此言豈烏有耶豫親王語塞諸王請議其罪王以事在赦前且誡令自省非欲加罪免之三年正月遣肅親王征四川流賊張獻忠二月集尚書公英俄爾岱䓁語曰予為上攝政惟恐事多闕誤生民失所日夜焦思又素嬰風疾勞瘁弗勝予有過毋或瞻徇其一一指陳至國家事各有専屬户部惟英俄爾岱内院惟范文程剛林寗完我額色赫是賴皆當勉力勿憚勞又言諸王均宜優養安榮其跪拜儀文殊為可省日者肅親王出師予為祖道以金鞍良馬解贈王屈體而受予心惻至今因欲禁此禮爾䓁為我善諭之五月率諸王大臣出安定門送豫親王征蘇尼特部諭将帥皆宜躬先臨陣奮勇破敵勿退後冐虛名八月豫親王擊敗喀爾喀部土謝圗汗碩雷汗凱旋王迎之烏蘭諾爾宴賚出征王貝勒及外藩台吉䓁四年七月集各部尚書啟心郎䓁諭曰内大臣禮部僉以豫親王功懋應進封輔政叔王予初亦念及以王為予季弟猶豫未果今思黜陟為國家鉅典烏容瞻顧爾䓁與諸王議行又誡豫親王曰汝繼予輔政其益加勤勉尋罷鄭親王輔政復阿濟格親王十二月以風疾不能跪拜従諸王大臣議元旦莭上前行禮後起立以待其進酒入班行跪禮俱停止五年二月肅親王平四川凱旋王以肅親王徇隠随征䕶軍統領希爾根冒功事又欲擢用罪人揚善之弟吉賽戒飭冄三不引咎令諸王大臣論罪幽繫之七月王見三桂子應熊服黄紗衣詰之乃豫親王所與罰豫親王銀二千兩十二月大同總兵姜瓖叛遣副都統阿喇善䓁助英親王圍剿六年二月王自将征大同次固爾班口有碩雷汗部下七人来歸言碩雷汗兵馬距十日程王因出張家口趋喀爾喀行三日以馬瘠且道乏水罷仍移師討瓖三月朔次桑乾河先遣官招撫渾源州應州越數日應州従賊𠫭将張祖夀山隂従賊知縣劉永錫各詣軍前降師薄大同遣人諭瓖曰渾源負固不服已克平應州山隂皆效順予今来此速開門迎降當宥爾今不降勢迫後降亦不従與其自取死亡不如速歸順瓖抗拒如故端重郡王博洛承澤郡王碩塞復代州敬謹郡王尼堪剿賊太原率都統阿賴䓁屢戰皆㨗斬偽巡撫姜輝王即軍中晉封三郡王為親王告之曰爾䓁向不在貴寵列予以同係太祖孫加錫王爵位次俸禄不得與大藩䓁王先歸四月以貝子務達海鎮國公屯齊喀䓁征大同令英親王還京六月英親王遣人啟王以輔政徳豫親王子不當優異鄭親王不當稱叔王而自請為叔王王拒之曰豫王功多且舊封親王其子多爾博予養為子多尼應襲王爵何謂優異鄭王雖叔父子封親王亦久爾原為郡王何得妄思越分英親王復請營府第王乃數其擅加大同衆官銜級諸罪今後勿預部事接漢官并誡衆曰諸王及内大臣有干預部院政事及内外漢官升降者不論言是非即治罪予于各官應遷者遷應降者降豈如明季偏聴人言輕為進退耶至諸王於非所屬官員私傳至府者罪在諸王聽傳往者罪在衆官如遇應傳之事諸王必先啓奏方許又諭禮部曰予師行在外所出政令必闗六部都察院鑾儀衛之事原設印信不便擕行今倣古制别鑄印各一加行在二字以後差遣侍衞用鑾儀衞印七月復統師征大同行十餘日遣䕶軍統領索渾希爾根助親王滿達海勦賊寧武闗獵扵阿嚕什巴爾台等處而還八月寧武闗偽總兵劉緯偽道趙夢龍䓁降大同偽總兵楊振威等斬瓖及其兄弟首獻軍前賊黨以次削平九月一䓁輕車都尉希福自以奉使外藩勞丐王優用王以其自請諭内大臣䓁議罪應棄市令免死革職不許随朝及往来諸王大臣家十月以喀爾喀二楚呼爾嘗犯邊統師討之徵敖漢扎嚕特察哈爾烏喇特土黙特四子部落各以兵㑹至喀屯布拉克不見賊乃班師七年二月令部事不湏題奏者付親王滿達海及端重親王敬謹親王料理五月獵山海闗令親王多尼順承郡王勒克徳渾貝子務達海錫翰鎮國公漢岱並議政六月獵中後所議随獵王貝勒等不整行列罪貝勒屯齊尚善貝子扎喀納罰鍰有差宥親王滿達海罰申戒之七月王欲於邊外築城清暑令户部計額徵地畆人丁數加派直𨽻山西浙江山東江南河南湖廣江西陜西九省銀二百四十九萬兩有竒輸工用是月上幸王第視疾王以錫翰與内大臣席訥布庫䓁奏請駕臨降罰有差八月遣禮部尚書阿哈尼堪迎朝鮮王李淏之弟阿哈尼堪啟理部事諸王以理事官恩國泰自代事覺議罪革阿哈尼堪職罰親王滿達海銀三千兩降端重親王敬謹親王為郡王各罰銀二千兩十一月王以疾偕諸王貝勒獵邊外十二月薨於喀喇河屯年三十有九上聞震悼親率王貝勒大臣縞服迎奠東直門外允議政大臣請部院事仍令滿達海博洛尼堪三王理之八年正月議以王嗣子多爾博襲封親王俸禄視諸王三倍用物同御用者徹去裁䕶衞百員為六十議入得㫖朕之初心本欲於攝政王歸政後優禮酬報不意王中道捐棄未遂朕懷今多爾博應特加恩禮所議裁去䕶衞四十朕殊不忍其仍留八十員尋以王近侍蘇克薩哈詹岱為議政大臣復博洛尼堪親王詔各省輸助築城銀盡抵今年額徵錢糧二月蘇克薩哈詹岱䓁首告王薨時其侍女吴爾庫尼将殉呼從官羅什博爾恵蘇拜穆濟倫告以王曽製八補黄袍令與大東珠朝珠黒貂褂潛置棺内又欲於永平圈房以兩旗官兵移駐與都統和洛輝䓁共定逆謀因出獵稽遲未行於是鄭親王濟爾哈朗㢲親王滿達海端重親王博洛敬謹親王尼堪内大臣等疏言昔太宗文皇帝龍馭上賔諸王大臣共矢忠誠翊戴皇上因方在冲年令臣濟爾哈朗與睿親王多爾衮同輔政逮後多爾衮獨専威權不令濟爾哈朗預政遂以母弟多鐸為輔政叔王背誓肆行妄自尊大所用儀仗音樂衛従俱僣擬至尊造府與宫闕無異擅用織造緞疋糜庫貯金銀又搆陷威逼使肅親王不得其死户口財産不歸公俱以肥已凡一切政事及批票本章不奉上命概稱詔㫖擅作威福任喜怒為黜陟僣妄背理不可枚舉又不令諸王貝勒貝子公䓁入朝辦事令日候府前竟以朝廷自居顯有悖逆心臣䓁従前畏威吞聲今蘇克薩哈等首告逆謀詳鞠皆實應追治其罪削爵黜宗室籍財産入官其嗣子多爾博給信親王多尼疏入得㫖如議行十二年正月詔内外大小官直言時政吏科副理事官彭長庚疏言從古沖齡踐位致治太平者莫如成王之明躬任勞怨輔成主徳者莫如周公之忠然而流言一起衮衣居東直至風雷召變金縢感悟而周公之忠益著成王之明益彰我朝創業盛京諸王俱樹勲勞而睿親王之功為冠當太宗文皇帝上賔後堅持盟誓扶立皇上鞠躬任事此可信其忠誠者一也遇奸人煽惑離間骨肉如郡王阿達禮貝子碩託私謀擁戴乃執大義立置典刑史書載列昭若日星此可信其忠誠者二也及奉命統兵收拾明疆大權在握闗内闗外咸知有攝政王一人是時皇上沖齡逺在盛京彼若肆然自帝誰能禁之而乃先驅綏定肅整鑾輿恭迎聖駕此可信其忠誠者三也是以當其初薨固無異議乃為時無㡬論罪削爵毁滅過甚臣曽詢之故老聽之傳聞輙欷歔迷惑以為功多罪少應存議親議故之條若謂私匿帝服御用等物必由彼傳諭織造早晚齎送暫停王府未可議為不軌也方今皇上宵旰求寧而水旱頻仍似同風雷之警寃抑既久公道宜伸乞賜昭雪復舊封一以彰太祖之有子太宗之有弟皇上開創之有臣且以見太宗知人之明因以勵諸王作忠之氣則幽明交感災𤯝可弭成王周公豈得専美於前乎一等子許爾安亦疏言睿親王為宗室元勲昔太宗文皇帝任以心膂託以大事未見其不忠也我皇上定鼎初賛輔匡襄鞠躬盡瘁撫綏中外天與人歸亦未聞有不忠也乃身歿之日羣議蜂起以天潢懿親勤勞一生竟冺沒一旦其何以慰太宗在天之靈勵大小臣工之心昔成王感風雷之變而啟金縢周公心事始昭白千古睿親王罪固難辭功亦不可冺若宥其罪而錄其功修其墳墓俾得霑恩九京則大小臣工異域窮谷無不頌我皇上天地為心矣疏並下王大臣議鄭親王濟爾哈朗貝勒尚善等言長庚爾安妄頌睿王元勲比擬周公結黨煽亂應論死家産籍沒妻子為奴詔從寛並流徙寧古塔許爾安所襲父定國世爵准定國他子承襲乾隆三十八年二月諭曰睿親王多爾衮當世祖章皇帝冲齡踐阼時攝政有年威福自専不能恪盡臣莭身歿之後因其屬人首告經諸王大臣定罪除封成案俱在苐念我朝定鼎之初睿親王實先統衆入闗肅清京輦􅊾定中原前勞未可盡冺今其後嗣廢絶而塋域之在東直門外者嵗久益就榛蕪亦堪惻憫着交内務府派員往視繕葺仍為重植松楸並准其近支王公䓁以時祭掃用昭朕䔍念成勲之意四十三年正月諭曰睿親王多爾衮當開國時首先統衆入闗掃蕩賊氛肅清宫禁分遣諸王追殱流寇撫定疆陲一切創制規模皆所經畫尋即奉迎世祖車駕入都定國開基以成一統之業厥功最著顧以攝政有年威福不無専擅諸王大臣未免畏而忌之遂至歿後為蘇克薩哈等所搆授欵扵其屬人首告誣以謀逆經諸王定罪除封其時我世祖章皇帝實尚在冲齡未嘗親政也夫睿王果萌異志則方兵權在握何事不可為且吴三桂之所迎勝國舊臣之所奉止知有攝政王耳其勢更無難號召即我滿洲大臣心存忠篤者自必不肯順従然彼誠圗為不軌無難隂鋤異志以逞謀逆乃不於彼時因利乗便直至身後以斂服僣用明黄龍衮指為覬覦之證有是理乎况英親王阿濟格其同母兄也於追捕流賊回京時誆報李自成身死且不候㫖班師睿王即遣員斥責其非免王公䓁往迎之禮又因阿濟格出征時脅令巡撫李鑑釋免逮問道員及擅至鄂爾多斯土黙特取馬㑹議其罪降為郡王平日辦理政務秉公持正若此是果有叛志無叛志乎又實錄載睿王集諸王貝勒貝子公大臣䓁遣人傳語曰今觀諸王貝勒大臣䓁但知諂媚於予未見有尊崇皇上者予豈能容此昔太宗升遐嗣君未立英王豫王跪請予即尊位予曰若必如此言予即當自刎誓死不從遂奉皇上纉承大統是此危疑之日以予為君予尚不可今乃不敬皇上而媚予予何能容自今以後有盡忠皇上者予用之愛之其不盡忠不敬事皇上者雖媚予予不爾宥也且云太宗恩宥予躬所以特異於諸子弟者盖深信諸子之成立惟予能成立之每覽實錄至此未嘗不為之堕淚則王之立心行事實能篤忠藎感厚恩深眀君臣大義尤為史冊所罕覯使王彼時如宋太宗之處心積慮則豈肯復以死固辭而不為邪說摇惑耶乃王之身後久抱不白之寃於泉壤心甚憫焉假令王之逆跡稍有左騐削除之罪果出於我世祖聖裁朕亦寧敢復翻成案乃實由宵小奸謀搆成寃獄而王之政績載在實錄者皆有大功而無叛逆之跡豈可不為之昭雪乎昨於乾隆三十八年因其塋域久荒特敕量為繕輯並准其近支祭埽然以王之生平盡心王室尚不足以慰彼成勞朕以為應加恩復還睿親王封號追諡曰忠補入玉牒並令補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭其原傳有未曽詳叙者並交國史館恭照實錄所載敬謹輯錄增補宗室王公績傳用昭彰闡宗勲至意於是多爾衮追復舊封配享太廟其睿親王爵世襲罔替御製紀事詩曰流言恐懼似周公公則生前王已終無倖位心真是睿有開基業孰齊忠諡增一字非私恵論定千秋付衆同配食襲封推祖澤睦親惇叙朂宗功八月入祀盛京賢王祠初多爾衮薨後無嗣以豫親王第三子多爾博為嗣及諸王議多爾衮罪削爵多爾博歸本宗恩封多羅貝勒生蘇爾泰襲固山貝子生塞勒塞勒生功宜布皆襲輔國公功宜布生如松襲信郡王如松第三子淳頴初扵乾隆三十六年四月初襲信郡王修齡所遺之輔國公四十三年正月上既追復多爾衮舊封命以淳頴襲封和碩睿親王四十九年五月總理正紅旂覺羅學欽定八旗通志卷一百二十五
