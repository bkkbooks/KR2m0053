body:
  text: 典禮志十五滿洲祭神祭天典禮四求福儀注鐙求福祝辭魚獻雛雞背祝辭獻背鐙祝辭殿獻雉背鐙祝辭堂獻鮮背鐙祝辭神堂子亭式祭馬神儀注子亭式殿祭馬祝辭祭正日祭馬神儀注次日馬神祝辭正日祭馬神祝辭求福儀注求福祭祀前期數日司俎官司俎司香等向無事故滿洲九家內攢取棉線並綢片敬捻線索二條紉以小方戒綢各三片釀醴酒前期一日司俎官二員帶領司俎二人司俎滿洲二人前往瀛臺會同奉宸苑官員監看砍取髙九尺圍徑三寸完整栁樹一株以黃布袱包褁賫至暫置於潔淨處屆期安設栁枝石於坤寧宫户外廊下正中栁樹枝於石栁枝上懸挂鏤錢淨紙條一張三色戒綢三片神位仍如朝祭儀懸挂神幔供畢大低桌上供香碟三醴酒三盞豆擦糕九碟煠糕九碟打糕九盤炕沿下供醴酒一樽西炕南首設求福紅漆髙桌一桌上供醴酒九盞煮鯉魚二大碗稗米飯二碗水􅀈子二碗其煠糕豆擦糕打糕皆於桌上各以九數層纍擺列髙桌後西炕上設褥二以練麻一縷繫於神箭之上以九家內攢取之各色棉線捻就線索二條暫懸挂於神箭上神箭立於西炕下所設酒樽之北其捻就黃緑色棉線索繩上以各色綢片夾繫之其本則繫於西山牆所釘鐵環末則穿出户外繫於栁枝司香婦人等鋪叩頭黃花紅氊皇帝皇后親詣行禮入坤寧宫立於南首司俎首領太監司俎太監等如朝祭儀席地列坐奏三絃琵琶鳴拍扳司祝進擎神刀誦神歌禱祝三次每次禱祝則大監等歌鄂囉羅禱畢司香舉線索練麻神箭授於司祝司香及司香婦人舁西首所設求福髙桌出於户外供於栁枝前司祝左手擎神刀右手持神箭出進於桌前立司香婦人於檻內鋪黃花紅氊皇帝居中皇后在檻內東首跪司祝於桌之右首對栁枝舉揚神箭以練麻拂拭栁枝初次誦神歌禱畢司祝東向鞠躬舉神箭奉練麻於皇帝皇帝三捋而懷之鳴拍扳之太監等歌鄂囉羅司祝二次舉揚神箭誦神歌禱畢仍奉練麻於皇帝皇帝仍三捋而懷之太監等歌鄂囉羅司祝三次舉揚神箭誦神歌禱畢奉練麻於皇后皇后亦三捋而懷之太監等歌鄂囉羅皇帝皇后一叩頭興坐於西炕所鋪褥上舉桌上所供之酒灑於栁枝上以桌上所供之糕夾於栁枝所有枝義之間進求福髙桌置於原處司祝入進於神位前舉揚神箭誦神歌禱畢奉練麻於皇帝皇帝三捋而懷之如前儀司祝二次舉揚神箭誦神歌禱畢仍奉練麻於皇帝皇帝仍三捋而懷之司祝三次舉揚神箭誦神歌禱畢奉練麻於皇后皇后三捋而懷之如前儀每一捋太監等仍歌鄂囉羅司祝以神刀授於司香取神箭上所繫之線索二條其神箭亦授於司香司香以神箭置於原處皇帝皇后興皇帝進於神位前跪於常祭行禮處一司祝奉線索一條於皇帝繫挂一司祝奉線索一條於皇后繫挂一司祝於西首跪祝祝畢一叩頭興合掌致敬皇帝皇后同一叩頭興皇帝皇后仍坐於西炕所鋪褥上司祝及司香等以所供福胙盛於碟內請皇帝皇后受福受福畢皇帝皇后興還宫所餘福胙均不令出户俱分給司俎及宫中太監等食之不使稍有餘剩魚之鱗刺司俎官等持之投於潔淨河內栁枝上所夾之糕亦令衆人食之不使稍有餘剩其夕祭求福如夕祭儀繫幔於架上安奉神位炕上設二大低桌桌上供香碟五醴酒五盞豆擦糕九碟煠糕九碟打糕九盤司祝繫裙束腰鈴執手鼓如常祭儀誦神歌禱祝太監等仍擊鼓鳴拍扳禱祝畢司祝釋裙與腰鈴祝禱叩頭皇帝皇后行禮仍如夕祭儀叩頭畢所供之福胙亦不令出户即釀酒所餘糟粕俱做為糜粥分給司俎及宫中太監等食之食畢取栁枝所繫線索收貯囊內仍懸挂於西山牆其栁枝司俎官司俎及司俎滿洲等送赴堂子至除夕同神杆淨紙化之皇帝皇后所挂線索過三日後解下皇后親持入坤寧宫授於司祝司祝接受貯於囊內懸挂之皇后一叩頭還宫樹栁枝求福司祝於户外對栁枝舉揚神箭誦神歌禱辭佛立佛多鄂謨錫瑪瑪之神位某年生小子某年生小子為某人祭則呼某人本生年今敬祝者聚九家之綵線樹栁枝以牽繩舉揚神箭以祈福佑以致敬誠憫我某年生小子憫我某年生小子為某人祭則呼某人本生年綏以多福承之於首介以繁祉服之於膺千祥薈集九敘阜盈亦既孔皆福祿來成神兮貺我神兮佑我豐於首而仔於肩衛於後而護於前畀以嘉祥兮偕老而成雙兮富厚而豐穰兮如葉之茂兮如本之榮兮食則體腴兮飲則滋營兮甘旨其獻兮朱顏其鮮兮歲其增而根其固兮年其永而夀其延兮朝祭神前求福祝辭上天之子佛及菩薩大君先師三軍之帥關聖帝君佛立佛多鄂謨錫瑪瑪之神位某年生小子某年生小子為某人祭則呼某人本生年今敬祝者聚九家之綵線樹栁枝以牽繩舉揚神箭以祈福佑以致敬誠憫我某年生小子憫我某年生小子為某人祭則呼某人本生年綏以多福承之於首介以繁祉服之於膺千祥薈集九敘阜盈亦既孔皆福祿來成神兮貺我神兮佑我豐於首而仔於肩衛於後而護於前畀以嘉祥兮偕老而成雙兮富厚而豐穰兮如葉之茂兮如本之榮兮食則體腴兮飲則滋營兮甘旨其獻兮朱顏其鮮兮歲其增而根其固兮年其永而夀其延兮夕祭神前求福祝辭上天之子年錫之神安春阿雅喇穆哩穆哩哈納丹岱琿納爾琿軒初恩都哩僧固拜滿章京納丹威瑚哩恩都蒙鄂樂喀屯諾延佛立佛多鄂謨錫瑪瑪之神位某年生小子某年生小子為某人祭則呼某人本生年今敬祝者聚九家之綵線樹栁枝以牽繩舉揚神箭以祈福佑以致敬誠憫我某年生小子我某年生小子為某人祭則呼某人本生年綏以多福承之於首介以繁祉服之於膺千祥薈集九敘阜盈亦既孔皆福祿來成神兮貺我神兮佑我豐於首而仔於肩衛於後而護於前畀以嘉祥兮偕老而成雙兮富厚而豐穰兮如葉之茂兮如本之榮兮食則體腴兮飲則滋營兮甘旨其獻兮朱顏其鮮兮歲其增而根其固兮年其永而夀其延兮謹案樹栁枝為嬰孩求福祭祀司祝於户外對栁枝舉揚神箭誦神歌禱詞惟去偕老而成雙兮二句添改體其暢而身其康兮一句餘俱同上春季獻雛雞背鐙祭祀祝辭上天之子年錫之神安春阿雅喇穆哩穆哩哈納丹岱琿納爾琿軒初恩都哩僧固拜滿章京納丹威瑚哩恩都蒙鄂樂喀屯諾延某年生小子某年生小子為某人祭則呼某人本生年敬以家畜珍禽嗌頸落羽以獻於神豐於首而仔於肩衛於後而護於前畀以嘉祥兮齒其兒而髮其黃兮年其增而歲其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮謹案夏季獻子鵝背燈祭祀祝辭與春季獻雞祝辭同惟秋季獻魚則曰敬以江河所獲羞珍以獻於神冬季獻雉並獻各鮮則曰敬以山林所獲羞珍以獻於神餘俱同堂子亭式殿祭馬神儀注正日祭馬神於堂子亭式殿司俎官一員司俎一人於亭式殿內髙案下所立杉木柱上挂紙錢二十七張案上供打糕一盤醴酒一盞縛馬鬃尾緑紬條二十對又於地上所設低桌上供大碗二一盛酒一空設司香點香牧長牽白馬十匹立於亭式殿外甬路下東面向西奏三絃琵琶之太監二人於甬路上西面向東鳴拍板拊掌之看守堂子人東面向西俱坐司祝進跪司香舉臺盞授司祝司祝接受獻酒六次司俎官一員於亭式殿外階下東首立贊鳴拍板即奏三絃琵琶鳴拍板拊掌司祝每獻酒將所獻之酒注於空碗內復自盛醴酒碗內挹新酒注於二盞中獻之每獻酒司俎官贊歌鄂囉羅看守堂子人歌鄂囉羅六次獻畢以臺盞授於司香司祝一叩頭興合掌致敬司俎官贊停拍板其三絃琵琶拍板暫止司香舉神刀授司祝司祝接受神刀進司俎官贊鳴拍板即奏三絃琵琶鳴拍板拊掌司祝一叩頭興司俎官贊歌鄂囉羅則歌鄂囉羅司祝擎神刀禱祝三次誦神歌祝禱一次擎神刀禱祝時則歌鄂囉羅誦神歌祝禱三次如前儀如是九次畢司祝一叩頭興復禱祝三次以神刀授於司香司俎官贊停拍板其三絃琵琶拍板皆止司祝一叩頭興合掌致敬立於近髙案東首取案上縛馬鬃尾紬條於香爐上薰禱以縛馬鬃尾紬條授於司俎官退司俎官以縛馬鬃尾紬條授於牧長繫於馬之鬃尾所供糕酒分給牧長等正日為所乘馬祭祀堂子亭式殿祝辭上天之子紐歡台吉武篤本貝子某年生小子為某人之馬祭則呼某人本生年今為所乘馬敬祝者撫脊以起兮引鬛以興兮嘶風以奮兮噓霧以行兮食草以壯兮齧艾以騰兮溝穴其弗蹈兮盜賊其無攖兮神其貺我神其佑我正日祭馬神儀注正日為所乘馬於祭馬神室中祭朝祭神預將鑲紅片金黃緞神幔用黃棉線繩穿繫其上懸挂西山牆梁上南北所釘之二鐵環以淨紙二張各四折鏤錢四挂於神幔兩端舁供佛之髤金小亭連座奉安於神幔前東向啓亭門大炕上設紅漆大低桌二桌上供香碟三醴酒三盞打糕搓條餑餑九盤炕沿下供醴酒一樽樽前鋪紅氊設獻酒長低桌桌上列黃磁大碗二一盛醴酒一空設司俎大監等預進包錫紅漆大桌二設於中間屋內鍋旁西向分為二行擺列屆時司香點香司俎太監司俎等進豬二於祭室門外之右首皆北向奏三絃琵琶之司俎太監二司俎官司俎四首領太監一以次進三絃琵琶在前次五人排列均向上盤膝坐奏三絃琵琶鳴拍板其後司俎滿洲等屈一膝跪拊掌司祝進於獻酒桌前跪司香舉臺盞授司祝司祝接受獻酒六次每一獻將所獻之酒注於空碗內復自盛醴酒碗內挹新酒注於二盞中以獻每一獻司俎等歌鄂囉羅六次獻畢司祝以臺盞授於司香一叩頭興合掌致敬三絃琵琶拍板暫止司香及司香婦人撤盛酒之二碗並獻酒之桌設司祝叩頭小低桌司香舉神刀授司祝司祝執神刀進司俎等復奏三絃琵琶鳴拍板拊掌司祝一叩頭興司俎等歌鄂囉羅司祝擎神刀禱祝三次誦神歌一次擎神刀禱祝時司俎等復歌鄂囉羅誦神歌三次如前儀如是九次畢司祝跪一叩頭興又禱祝三次以神刀授於司香奏三絃琵琶鳴拍板人等起立避於旁司祝跪祝叩頭興合掌致敬司香婦人撤佛菩薩前供酒二盞移亭座稍後闔其門二香碟擎出户外供於祭室簷下旁西山牆所設亭內移神幔稍南關帝神像前所供酒並香碟皆移正中酒樽以淨袱羃之奏三絃琵琶鳴拍板人等進坐於原處司香婦人斂氊三折之鋪於近炕沿處司香舉臺盞授於司祝司俎太監等舁一豬入門置炕沿下首西向司俎滿洲一人屈一膝跪按其豬司俎官及司俎首領太監內監等奏三絃琵琶鳴拍板拊掌司祝跪於炕沿下三折紅氊上斜向西南舉臺盞獻酒一次司俎等照前歌鄂囉羅獻畢司祝致禱以二盞酒合注一盞中司俎滿洲執豬耳司祝灌酒於豬耳內以臺盞授司香一叩頭三絃琵琶拍板暫止司俎滿洲執豬尾移轉豬首向東司俎太監等進前舁豬暫順放於包錫大桌上司香舉臺盞授司祝司祝接受臺盞舁第二豬入門獻酒灌酒如前儀以包錫大桌上二豬俱令首西向橫放省之每桌前令司俎婦人二舉錫裏木槽盆接血司香婦人撤去氊進紅漆長桌設於西炕前以接血木槽盆列髙桌上撤去所供糕酒豬氣息後司俎等轉豬首順桌向南直放去其皮按節解開煮於大鍋內頭蹄及尾俱不去皮惟燎毛燖淨亦煮於大鍋內以臟腑置於錫裏木槽盆舁出院內整理潔淨舁進以盛血木槽盆就地安置司俎滿洲一人進於髙桌前屈一膝跪灌血於腸亦煮鍋內司俎太監等置皮於盛皮木槽盆內撤其包錫大桌二仍以膽與蹄甲貯紅漆小木碟內置於炕上所設之大低桌北首邊上俟肉熟時細切胙肉一碗設筯一雙供於大低桌正中以二豬之肉分置二錫裏木