body:
  text: 旗分志四八旗佐領四正黃旗滿洲佐領正黃旗滿洲佐領上一參領至三參領正黃旗滿洲都統所屬參領五第一參領下佐領十九第二參領下佐領十八第三參領下佐領十九第四參領下佐領十九第五參領下佐領十八第一參領第一佐領係康熙十二年以鄂莫克圖佐領內餘丁編立原以都統伊爾德之孫侯巴琿岱管理尋將巴琿岱調任圖海所管伊爾德佐領以圖海管理圖海故以其子公諾敏管理諾敏故以其子侍衛馬靈安管理馬靈安緣事革退以其弟二等侍衛馬爾屯管理馬爾屯故以其兄之子紹涵管理紹涵升任以其叔之子特通額管理特通額故以其子隆福管理第一參領第二佐領係第一佐領內滋生人丁公諾敏管佐領時分出一佐領以其子瑪爾賽管理瑪爾賽纍任大學士將軍因罪革退以其弟之子公瑪賢管理瑪賢革職以其弟瑪斌管理瑪斌告病以其伯之子瑪實管理瑪實革職以其伯之孫瑪祥管理瑪祥故以其子瑪尚阿管理瑪尚阿故以其弟瑪湯阿管理第一參領第三佐領係國初編立始以賽弼管理賽弼革退以張屯管理張屯故以其子圖勒慎管理圖勒慎故以其子羅託管理羅託故以其弟費揚古管理費揚古升任西安協領以羅託之孫佛保管理佛保年老告退以其子員外郎兼三等侍衛明竒管理明竒告病以其子阿明阿管理阿明阿革退以其叔之子阿昌阿管理阿昌阿故以其子中和管理第一參領第四佐領係第三佐領內滋生人丁費揚古管佐領時分出一佐領以其兄朔爾岱管理朔爾岱故以其弟瑪齊拜管理瑪齊拜故以其子賽音察管理賽音察故以其兄霍岱管理霍岱升任興京城守尉以其弟明德管理明德故以霍岱之子侍衛班長巴齡管理巴齡故以二等侍衛瑪尼管理瑪尼升任歸化城都統以其子永明管理永明告病以其弟舒里善管理舒里善告病以其子和英額管理和英額故以其弟和清額管理和清額故以其伯之孫常春管理第一參領第五佐領係第三第四二佐領內滋生人丁費揚古瑪齊拜管佐領時分出一佐領以瑪齊拜兄之子羅思漢管理羅思漢年老告退以羅思漢之弟蘇克濟管理蘇克濟升任陜西布政使司以其子達爾布管理達爾布緣事革退以員外郎永福管理永福緣事革職以其兄富成管理富成告病以其子廣仁管理廣仁故以其曾叔祖之孫九格管理九格故以其子嵩山管理第一參領第六佐領係順治八年編立始以公圖賴族子古蘇管理續以公圖賴之子一等公頗爾噴管理頗爾噴故以其子永泰管理永泰緣事革退以其弟一等公永謙管理永謙告病以其子景惠管理景惠革職以其弟景恆管理第一參領第七佐領係第六佐領內滋生人丁康熙二十三年一等公頗爾噴管佐領時分編一佐領以其弟之子員外郎馬哈達管理馬哈達調任盛京員外郎以馬哈達之子都統馬爾薩管理馬爾薩緣事革退以頗爾噴之孫德山管理德山緣事革退以馬爾薩之弟舉人永慶管理永慶故以其兄之子敦住管理敦住陳亡以其子格琫額管理第一參領第八佐領係第九佐領內滋生人丁希爾根管佐領時分編一佐領以其弟和拖管理和拖故以希爾根之孫商世泰管理商世泰故以其子都泰管理都泰故以其子一等阿達哈哈番漢文稱輕車都尉兼拖沙喇哈番漢文稱雲騎尉得祿管理得祿故以其子寧康管理寧康故以其子鶴齡管理第一參領第九佐領係國初編立始以雅拜管理雅拜故以其弟雅賚管理雅賚授陵寢噶喇大漢文稱翼長以其子內大臣希爾根管理希爾根年老辭退以其子護軍參領喀石泰管理喀石泰從征陳亡以其叔父雅哈喇管理雅哈喇緣事革退以喀石泰之子護軍參領陳泰管理陳泰升任黑龍江副都統以其伯祖蘇拉代之孫保住管理保住升任齊齊哈爾協領以陳泰之子烏章阿管理烏章阿緣事革退以其族弟納林管理納林革退以前鋒珠龍阿管理珠龍阿升授都司以其兄五德管理五德升任防守尉以其兄之子福保管理第一參領第十佐領係第八第九兩佐領內滋生人丁康熙二十三年陳泰商世泰管佐領時分編一佐領令雅賚之孫八十管理八十升授西安府副都統以雅賚族孫達竒納管理達竒納病退以商世泰之子兆泰管理兆泰緣事革退以雅拜五世孫三等侍衛查克賽管理查克賽升任副將以其叔髙祖之四世孫勒森泰管理勒森泰革退以富僧額管理富僧額故以艾隆阿管理艾隆阿故以其子佛爾卿額管理佛爾卿額故以其子德赫管理第一參領第十一佐領係國初編立始以吳巴海管理後改令喀開管理喀開故以其子常代管理常代故以其弟阿庫禮管理阿庫禮故以其弟賽畢漢管理賽畢漢升授荆州協領以阿庫禮之子博爾屯管理博爾屯故以其子護軍副參領兼阿達哈哈番永福管理永福故以其子烏爾卿額管理烏爾卿額告病以其子伯寧管理伯寧故以其子珠隆阿管理第一參領第十二佐領係第十一佐領內滋生人丁阿庫禮管佐領時分編一佐領以其兄侍郎富德管理富德調任盛京侍郎以其子平安管理平安故以其子賽哈管理賽哈緣事革退以其子伊三泰管理伊三泰故以其子德清管理德清革職以其伯髙祖之二世孫韋陀保管理第一參領第十三佐領係國初編立始𨽻公主屬下以邁圖管理邁圖故以塞必哈管理塞必哈故以阿繼遜管理阿繼遜故以巴丹圖管理巴丹圖故將此佐領撥出以公代夀管理代夀故以公費揚古管理費揚古故以公阿爾泰管理阿爾泰緣事革退以三等公散秩大臣噶爾薩管理噶爾薩告病以其伯曾祖之孫月亮管理月亮故以其子富廣管理富廣故以其子鍾育管理第一參領第十四佐領係第十三佐領內滋生人丁費揚古管佐領時分編一佐領以其兄色楞管理色楞因疾辭退以其子格爾圖