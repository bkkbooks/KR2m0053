body:
  text: 欽定四庫全書欽定八旗通志卷二百十人物志九十忠義傳二滿洲八旗二九十三人崇德年中共訥爾特訥爾特滿洲鑲黃旗人姓馬佳氏以騎都尉從征錦州明兵據松杏兩山旌旗壁壘甚盛訥爾特揮兵奮擊尋征大同攻小石城拔之纍遷副都統刑部侍郎崇德時從大兵南下征山東奉命攻武定州城堅不可破指揮先登尅日而下後與明吳總兵戰奮勇深入死之詔贈三等輕車都尉承襲詳見封爵表務爾格務爾格滿洲鑲黃旗人姓鈕祜祿氏世居長白山地方忠義公圖爾格之長子也崇德二年三月從奉命大將軍恭順王孔有德征皮島率舟師渡海先入戰殁於陳恩賜騎都尉世職承襲詳見世職表阿哈尼堪阿哈尼堪滿洲鑲黃旗人姓鈕祜祿氏額亦都巴圖魯之孫也太宗文皇帝時任侍衛兼護軍參領於崇德三年十一月從貝勒多鐸前往中後所助和碩鄭親王濟爾哈朗將過北京遇明總兵祖大夀率兵來拒阿哈尼堪奮勇力戰殁于陳賞恤如例朝哈爾朝哈爾姓鈕祜祿氏果毅公額亦都巴圖魯第三子少隨太祖髙皇帝征討天命六年恩賜偹禦九年同諾海等八大臣略明地師旋升護軍統領崇德三年九月從征明未入關時遇明哨兵追擊至關生擒蒙古二人獲馬四匹至北京於城北奪敵紅衣炮遇敵兵百餘人率護軍敗之又敗其步兵於蘆溝橋特授為議政大臣太宗文皇帝特諭云今特簡用爾為議政大臣者因爾一心為主盡力效忠故耳凡國家要務必抒誠辦理是年從揚武大將軍多羅貝勒嶽託征明由北京抵山東敗明內營兵至趙北口明兵壞橋拒守我兵不得渡率兵自河西襲破之又敗河間兵拔任邱縣出關時獨殿後至太平寨大敗敵人捷聞以護軍統領兼禮部參政七年從圍錦州遇城內兵出戰奮呼衝擊遂殁於陳年四十一嵗太宗聞之甚傷悼諭曰朕本欲用朝哈爾為一等大臣不意今已戰亡遣大臣迎其靈櫬進城加世職為二等輕車都尉令其長子格黑里承襲復賜葬銀五百兩遣官讀文致祭順治十二年十月世祖章皇帝念朝哈爾忠直贊勷勤勞王事殁於軍旅特加恩恤諡為果壯追贈一品勒碑墓前以昭殊勳焉巴林巴林滿洲鑲黃旗人姓瓜勒佳氏世居蘇完地方崇德三年從揚威大將軍多羅貝勒嶽託由北京征山東以雲梯攻深州城奮勇先登力戰陳亡恩賜雲騎尉世職承襲詳見世職表公衮公衮滿洲鑲黃旗人世居馬佳地方以地為姓初襲一等輕車都尉世職緣事降為騎都尉崇德四年七月從曹海沙木什哈征黑龍江擊其將杜俄臣兵力戰陳亡賞恤如例琅圖琅圖滿洲鑲黃旗人姓費莫氏世居薩齊庫地方兵部參政伊勒慎子初以驍騎校管佐領事崇德四年七月隨曺海沙木什哈征黑龍江杜俄臣率兵四百來援琅圖力戰陳亡恩賜騎都尉世職承襲詳見世職表旦岱旦岱滿洲鑲黃旗人姓伊喇理氏世居葉赫地方初任護軍參領崇德元年率護軍取安肅縣城克之論功授雲騎尉四年三月同鰲拜巴圖魯率護軍沿錦州城馳略獲馬十四匹羊一百七十隻殺二十人而還五年十月論功升騎都尉六年五月從大兵取錦州以步戰擊明經略洪承疇援兵力戰陳亡恩賜一等輕車都尉世職承襲詳見世職表喇都渾喇都渾滿洲鑲黃旗人姓馬佳氏世居馬佳地方天聰八年隨大兵征明大同敗敵有功九年大兵往收察哈爾遺民喇都渾追敵哨卒生擒一人崇德元年隨和碩英親王阿濟格征明奉命往視山海關形勢即於中後所埋伏當先擊敵生擒執纛一人敵兵來襲我後同席特庫擊敗之追錦州敵哨斬一人又於中後所同努山徼巡遇敵哨生擒一人五年大兵圍錦州隨左翼兵進擊先衆衝入先是其兄龔衮陳亡喇都渾遂承襲其騎都尉世職六年五月從大兵圍錦州同吳拜捉生遇蒙古兵十六人斬其二人力戰而殁恩賜騎都尉加一雲騎尉世職承襲詳見世職表覺羅薩哈連覺羅薩哈連滿洲鑲黃旗人崇德六年五月由間散隨大兵征明圍錦州明經略洪承疇率兵十三萬來援薩哈連奮勇進擊陳亡賞恤如例巴吉巴吉滿洲鑲黃旗人任驍騎校崇德六年五月隨大兵征明圍錦州大敗明兵明經略洪承疇率兵赴援拒敵於松山巴吉力戰殁于陳賞恤如例巴圖巴圖滿洲鑲黃旗人姓瓜勒佳氏世居哈達地方於崇德八年九月隨和碩鄭親王濟爾哈朗征寧逺奮勇力戰陳亡恩賜騎都尉兼一雲騎尉世職承襲詳見世職表固山固山滿洲正黃旗人姓哲爾德氏世居界凡地方初任佐領天聰三年從大兵征明過北京於大紅門步戰登山自上而下擊涿州援兵敗之追殺甚衆崇德元年十二月太宗文皇帝大兵征朝鮮次沙河堡東岡命和碩睿親王多爾衮等分兵從寬甸路入長白山固山從焉二年正月取江華島奮勇力戰殁於陳恩賜騎都尉世職承襲詳見世職表阿紐阿紐滿洲正黃旗人姓寧古塔氏世居和克佟吉地方以佐領鎮守寧古塔崇德元年十二月從太宗文皇帝大兵征朝鮮二年二月戰於南漢山城陳亡賞布帛恤其家達蘭達蘭滿洲正黃旗人姓瓜勒佳氏世居蘇完地方國初來歸天聰三年從大兵征明攻永平遵化城先登克之八年授佐領崇德元年從征瓦爾喀部所獲甚衆十二月從太宗文皇帝征朝鮮二年二月率二十八人乘夜用雲梯襲南漢山城奮勇前進陳亡論功恩賜騎都尉世職承襲詳見世職表巴雅爾圖巴雅爾圖滿洲正黃旗人姓舒穆祿氏英誠武勳王揚古利之從子也崇德二年二月以空銜侍衛隨奉命大將軍恭順王孔有德取皮島率兩旗兵丁進攻以後隊兵回陷於河力戰陳亡恩賜三等輕車都尉世職承襲詳見世職表書寧阿書寧阿滿洲正黃旗人姓扎庫塔氏世居噶哈禮璧翰之鄂里村一等男宜爾格德之族伯父也由驍騎校兼佐領於崇德三年從揚威大將軍多羅貝勒嶽託征明攻欒城縣值城上火藥燒發率軍士衝入克其城明軍門盧象升率兵來援我軍中特德傅喀二將退走書寧阿復衝入敵陳遂戰殁崇德五年恩賜雲騎尉世職承襲詳見世職表和圖和圖滿洲正黃旗人姓圖色里氏世居黑龍江穆塔哈崇德三年從貝勒杜度征明攻山東滕縣戰殁恩賜佐領世職承襲詳見旗分志户敏户敏滿洲正黃旗人姓賴布氏世居佛阿拉地方崇德三年隨揚威大將軍多羅貝勒嶽託征山東率本參領兵攻保應城緣堞而上克之又率衆用雲梯登膠州城復克之以功授騎都尉兼護軍參領又隨攻濟寧州城率衆持雲梯先登克之又攻取首陽縣及順德府克之凡三被重傷賜號巴圖魯加一雲騎尉旋以創潰殁傅察傅察滿洲正黃旗人姓鈕祜祿氏世居長白山地方崇德三年從揚威大將軍多羅貝勒嶽託征明至山東以雲梯攻滕縣奮勇先登因後無繼者遂戰殁於陳恩賜騎都尉世職承襲詳見世職表烏納海烏納海滿洲正黃旗人世居察哈爾崇德三年隨大兵征明戰殁于陳恩賜騎都尉世職承襲詳見世職表振特振特滿洲正黃旗人姓伊爾根覺羅氏世居巴爾達地方崇德四年隨和碩肅親王豪格征明以火炮擊松山城城堞俱毁明總兵金國鳯死守會日暮罷攻敵乘夜以繩繫木覆土塞之比明城固我師進攻先登者不能入振特挺身奮登力戰殁於陳恩賜騎都尉世職承襲詳見世職表阿爾休阿爾休滿洲正黃旗人姓那木都魯氏世居綏分地方初襲騎都尉後征北京至山東攻濟南府城克之論功加一雲騎尉崇德四年七月隨曺海沙木什哈征黑龍江進擊杜俄臣兵力戰陳亡恩賜雲騎尉世職承襲詳見世職表户穆散户穆散滿洲正黃旗人姓賴布氏世居佛阿拉地方任武備院卿崇德五年從大兵征明圍錦州攻松山城超躍而上因後無繼者遂殁於陳賞恤如例阿福尼阿福尼滿洲正黃旗人襲佐領職天聰三年同兄扎福尼從大兵征明至灤州有功授偹禦世職晉參領崇德六年隨征錦州明經略洪承疇統兵十三萬赴援阿福尼越衆衝突身負重傷猶斬將奪幟遂克明師嗣因被誣罷職越明年承疇來降上召問兩軍情勢承疇奏言惟一衣黃甲乘花馬者奮矛衝入衆莫敢攖遂命諸將各乘馬披甲如初使承疇目識之上大悅復其官尋以創發卒於家依陳亡例賞恤瓦音布瓦音布滿洲正黃旗人姓伊爾根覺羅氏世居赫門地方崇德元年從大兵征朝鮮取義州城以第二人登城克之六年五月從大兵征明圍錦州隨內大臣宜爾登往擊明經略洪承疇兵執纛陷陳被傷身亡恩賜雲騎尉世職承襲詳見世職表特穆德格特穆德格滿洲正黃旗人姓博爾濟吉特氏世居克爾倫地方國初同噶爾瑪葉爾登率兄弟及部屬來歸崇德六年五月隨大兵征明圍錦州執降明之蒙古戮於城外有訥木竒者乘馬衝入和碩睿親王多爾衮營將行刺迎而擒之相持急遂被害恩賜騎都尉世職承襲詳見世職表鄂退鄂退滿洲正黃旗人姓納喇氏世居哈達地方初襲父馬福塔一等輕車都尉兼一雲騎尉世職從征瓦爾喀所獲甚衆後同吳巴海征厄勒約鎖厄墨庫倫地方有功授騎都尉世職崇德六年五月從大兵圍錦州明經略洪承疇援兵駐山下鄂退率兵奮勇力戰陳亡承襲詳見世職表邁圖邁圖滿洲正黃旗人姓納喇氏世居布顔地方以啓心郎為公圖賴參謀崇德六年五月隨大兵征明圍錦州城明經略洪承疇率兵十三萬來援邁圖奮勇進擊力戰殁於陳賞恤如例阿什談阿什談滿洲正黃旗人姓馬佳氏世居莫旦地方崇德七年從大兵征明圍錦州我前鋒誘擊明松山兵阿什談同參領董阿賴直衝其陳八年取前屯衛我軍以紅衣炮擊其城阿什談於城破處奮勇先登被傷身死順治元年恩賜騎都尉世職承襲詳見世職表務珠克圖務珠克圖滿洲正黃旗人姓濟禮氏世居長白山地方崇德七年十月以護軍校隨奉命大將軍饒餘貝勒阿巴泰征明八年五月至山東以雲梯攻泗水縣奮勇先登後無繼者遂殁於陳恩賜騎都尉世職承襲詳見世職表赫圖赫圖滿洲正黃旗人世居黑龍江以間散從大兵征明由北京至山東有功崇德八年以雲梯攻滕縣先登力戰殁於陳恩賜騎都尉世職承襲詳見世職表特庫殷特庫殷滿洲正黃旗人姓瓜勒佳氏世居黑龍江地方崇德七年十月隨奉命大將軍饒餘貝勒阿巴泰征明八年三月以雲梯攻新安縣特庫殷繼納哈達以第二人登城因後無繼者遂殁於城上恩賜騎都尉世職承襲詳見世職表弼雅達弼雅達滿洲正白旗人姓巴雅拉氏世居長白山地方崇德元年十二月以佐領隨太宗文皇帝大兵征朝鮮二年二月戰於南漢山城陳亡賞恤如例果科果科滿洲包衣正白旗人姓郭絡羅氏居沾河地方初纍功授雲騎尉天命七年隨大兵征明廣寧至沙嶺毁其城崇德二年三月從奉命大將軍恭順王孔有德征皮島奮勇力戰陳亡恩賜騎都尉世職承襲詳見世職表珠三珠三滿洲正白旗人姓李佳氏世居扎庫木地方初任佐領屢從征伐有功崇德二年三月隨奉命大將軍孔有德攻皮島首先渡海迎敵以後軍失援力戰陳亡恩賜騎都尉世職承襲詳見世職表拜音台柱拜音台柱滿洲正白旗人姓納喇氏烏喇國貝勒滿泰之孫也初任頭等侍衛崇德二年三月從奉命大將軍恭順王孔有德征明皮島力戰陳亡議恤恩賜雲騎尉世職承襲詳見世職表宏科宏科滿洲正白旗人姓那木都魯氏世居綏分地方額駙康武禮之長子也太宗文皇帝嘉其才授前鋒參領崇德五年從大兵征明攻松山城力戰陳亡賞恤如例岱滚岱滚滿洲正白旗人姓他塔喇氏世居扎庫木地方初從征朝鮮以軍功授騎都尉世職尋隨大兵征明至山東遇馮太監兵奮擊敗之生擒一人又同蘇拜督前哨兵遇敵生擒一人殺一人復擊敗蘆溝橋兵旋遇何總兵軍生擒一人追擊敗之崇德六年五月