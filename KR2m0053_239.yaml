body:
  text: 欽定四庫全書欽定八旗通志卷二百二十五人物志一百五忠義傳十七蒙古八旗二至十四年共六十二人康熙十三年博洛博洛蒙古鑲黃旗人以護軍校管護軍參領事得巴圖魯號康熙十三年從征湖廣逆藩吳三桂與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表圖爾猛額圖爾猛額蒙古鑲黃旗人任佐領委參領駐防江寧於康熙十三年調遣隨征至江西吉安府遇敵力戰陳亡賞恤如例博喜圖博喜圖蒙古鑲黃旗人任護軍校康熙十三年十二月二十三日從征四川至朝天關偽將王屏藩等分兵環攻我軍博喜圗力戰殁恩賜雲騎尉世職承襲詳見世職表費揚武費揚武蒙古鑲黃旗人上駟院牧長墨爾根托克推之次子也任二等侍衛在鑾儀衛內行走康熙十四年隨貝子傅臘塔征海寇鄭成功至浙江將渡錢塘賊統兵四萬拒戰費揚武挺身攖敵三入而三出之大敗賊衆事聞奉諭曰費揚武猶勝於張飛可比趙子龍也進征福建至海澄被執賊百計誘降叱曰我若降異日將何顔面聖耶遂自刎賞恤如例拜海拜海蒙古鑲黃旗人姓巴林氏世居巴林地方初襲父額森三等輕車都尉世職康熙十四年隨定南將軍希爾根征逆藩耿精忠至江西遇賊將李茂珠等於建昌府南鐘鼓山力戰陳亡恩賜二等輕車都尉世職承襲詳見世職表白杜白杜蒙古鑲黃旗人康熙十四年以佐領從大兵征江西至南昌擊賊陳亡恩賜雲騎尉世職承襲詳見世職表格得德格得德蒙古鑲黃旗人任驍騎校署恭領康熙十四年隨大兵征逆藩吳三桂於雲南力戰陳亡賞恤如例羅漢羅漢蒙古鑲黃旗人姓白氏世居喀喇沁地方康熙十四年以驍騎校隨寧南靖寇大將軍順承郡王勒爾錦征逆藩吳三桂至湖廣襄陽府偽將軍張義禪王慧等率衆萬餘來犯羅漢執纛進戰於二郎岡陳亡恩賜雲騎尉世職承襲詳見世職表嵩夏嵩夏蒙古鑲黃旗人姓柯勒德氏世居科爾沁地方康熙十三年以前鋒校從征逆藩吳三桂至朝天關隨前鋒統領穆占擊敗偽將石存禮等進至保寧復敗偽將吳應龍等又擊賊于蟠龍山小梅嶺龍潭驛等處俱有功十四年進攻秦州遇賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表墨度墨度蒙古正黃旗人任七品官康熙十三年從征逆藩吳三桂至湖廣擊偽將吳應麒馬寶李之鳯偽總兵蕭輔成等於南汛江口諸處咸有功進至洞庭湖偽將巴養元等率巨艘列陳拒戰隨貝勒尚善擊却之賊復來犯被創殁恩賜雲騎尉世職承襲詳見世職表額爾陳額爾陳蒙古正黃旗人任護軍校康熙十三年從征逆藩吳三桂至湖廣攻偽將巴養元等於洞庭湖戰殁恩賜雲騎尉世職承襲詳見世職表圖武爾圖武爾蒙古正黃旗人任護軍校康熙十三年隨征逆藩吳三桂歿於陳恩賜雲騎尉世職承襲詳見世職表色爾古楞色爾古楞蒙古正黃旗人署護軍校康熙十三年隨將軍都統赫業擊吳逆偽將軍王屏藩於蟠龍山力戰陳亡恩賞銀二百兩格洛爾圖格洛爾圗蒙古正黃旗人由領催委署驍騎校駐防西安康熙十四年隨定西大將軍多羅貝勒董額征從逆提督王輔臣于秦州力戰陳亡賞恤如例蒙柯蒙柯蒙古正黃旗人由領催委署驍騎校駐防西安康熙十四年隨定西大將軍多羅貝勒董額征從逆提督王輔臣于秦州力戰陳亡賞恤如例鄂七拜鄂七拜蒙古正白旗人姓他塔喇氏世居察哈爾任驍騎校駐防江寧康熙十三年總督李之芳調集官兵赴援浙江鄂七拜隨副都統胡圖會剿偽將曽養性于台州至小梁山奮勇力戰殁於陳賞恤如例德色德色蒙古正白旗人任八品官康熙十三年從征湖廣至長沙力戰被傷殁於軍賞恤如例卓特巴卓特巴蒙古正白旗人襲其叔拜思虎郎七品官康熙十三年從大兵出征逆藩吳三桂至湖廣長沙府遇賊力戰陳亡賞恤如例布逹什布達什蒙古正白旗人姓沙賚氏世居扎魯特康熙十四年以護軍校從定西大將軍多羅貝勒董額征從逆提督王輔臣於秦州力戰陳亡恩賜雲騎尉世職承襲詳見世職表色楞色楞蒙古正紅旗人任佐領康熙十三年正月隨將軍赫業征四川至野狐嶺沿山擊敗賊三百餘衆又敗其山林伏衆千餘又賊伏二千餘衆突出迎戰奮擊敗之進至延平關有偽總兵率衆萬餘據山險立鹿角列炮鎗連數營拒戰復大敗之六月初六日抵盤龍山遇偽將軍王平範等衆四萬排設炮鎗藤牌自我右翼水路後哨登陸攻我左翼前後互擊力戰陳亡恩賜雲騎尉世職承襲詳見世職表賞銀五百兩十七年十二月初三日諭祭一壇阿納阿納蒙古正紅旗人任參領康熙十三年從征海賊鄭成功至浙江遇賊力戰殁於陳賞恤如例噶爾瑪噶爾瑪蒙古正紅旗人康熙十三年從征海賊鄭成功至浙江擊賊殁于陳恩賜雲騎尉世職承襲詳見世職表季拉泰季拉泰蒙古正紅旗人以領催署章京康熙十三年從征逆藩吳三桂於雲南至廬囤擊賊陳亡恩賜雲騎尉世職承襲詳見世職表納穆僧額納穆僧額蒙古正紅旗人姓喀出特氏世居喀喇沁地方康熙十三年以筆帖式隨經略大學士莫洛征逆藩吳三桂至寧羌州適提督王輔臣叛力戰陳亡恩賜雲騎尉世職承襲詳見世職表蘇巴什達蘇巴什達蒙古正紅旗人姓齊木克圖氏世居喀喇沁地方康熙十三年以驍騎校隨寧南靖寇大將軍順承郡王勒爾錦征逆藩吳三桂至湖廣遇賊於綏寧擊賊陳亡恩賜雲騎尉世職承襲詳見世職表竒他乃竒他乃蒙古正紅旗人任前鋒校駐防莊浪康熙十三年隨安西將軍都統赫業征逆藩吳三桂於四川至蟠龍山賊將王屏藩等合各偽將兵四萬餘水陸夾攻竒他乃力戰陳亡賞恤如例阿里瑪阿里瑪蒙古正紅旗人由空銜佐領於康熙十四年從征逆提督王輔臣子繼正戰于平涼府陳亡恩賜雲騎尉世職承襲詳見世職表克什圗克什圗蒙古正紅旗人任驍騎校駐防西安康熙十三年隨安西將軍瓦爾喀擊偽將王屏藩等于娘娘廟力戰有功十四年復隨振武將軍佛尼勒等與賊戰於秦州陳亡賞恤如例圗爾渾圗爾渾蒙古正紅旗人姓明阿氏世居科爾沁地方康熙十三年以理藩院郎中隨經略大學士莫洛征逆藩吳三桂至寧羌州適提督王輔臣叛力戰陳亡恩賜雲騎尉世職承襲詳見世職表五喇岱五喇岱蒙古正紅旗人姓博和羅特氏世居科爾沁地方任二等輕車都尉康熙十四年從征逆藩吳三桂隨前鋒統領穆占敗偽將石存禮于朝天關復隨鎮西將軍席卜臣擊偽將王屏藩等敗之賊復合遂力戰陳亡恩賜一等輕車都尉世職承襲詳見世職表波纍波纍蒙古正紅旗人姓黃氏世居依布杵德地方由領催委署恭領駐防西安康熙十四年隨定西大將軍多羅貝勒董額會剿從逆提督王輔臣于秦州西關力戰陳亡恩賜雲騎尉世職承襲詳見世職表邁拉邁拉蒙古鑲白旗人姓博爾濟吉特氏世居察哈爾任護軍參領康熙十三年從將軍安親王嶽樂征江西擊偽將邵連登於建昌陳亡恩賜雲騎尉世職承襲詳見世職表諾穆啓諾穆啓蒙古廂白旗人姓芒格努忒氏世居喀喇沁地方任佐領康熙十三年從寧海將軍富喇塔征耿逆至浙江擊賊將曽養性于台州小梁山力戰殁于陳恩賜雲騎尉世職承襲詳見世職表托畢泰托畢泰蒙古鑲白旗人姓博和羅特氏世居古爾班納里忒地方兵部郎中任佐領康熙十三年逆藩吳三桂反十二月奉敕往勞四川總督鄭蛟鱗等至成都被賊王賓懷劚刃死恩賜騎都尉世職承襲詳見世職表固魯吾固魯吾蒙古鑲白旗人以驍騎校駐防盛京康熙十三年十月耿逆偽都督周烈總兵桑明犯衢州總督李之芳平南將軍賴塔遣兵援剿固魯吾閲厯行間著有戰功至紅橋與賊力戰殁于陳賞恤如例雅圗雅圗蒙古鑲白旗人任驍騎校康熙十四年隨大兵征湖廣至巖山嶺吳逆偽將馬寶胡國柱率三萬餘衆來犯奮勇衝擊陳亡恩賜雲騎尉世職承襲詳見世職表拉布士喜拉布士喜蒙古鑲紅旗人姓烏蘭氏世居喀喇沁地方康熙十三年以佐領從㝎西將軍圖海征湖廣賊李來亨等於茅麓山力戰陳亡恩賜騎都尉兼雲騎尉世職承襲詳見世職表渾進渾進蒙古鑲紅旗人姓博洛哥氏世居喀喇沁地方康熙十三年以空銜佐領從征逆藩吳三桂至湖廣破偽都督楊文榮等戰艘百餘尋于嶽州遇偽將軍吳應騏等率兵七萬餘來拒渾進力戰陳亡恩賜雲騎尉世職承襲詳見世職表拜桑古爾拜桑古爾蒙古鑲紅旗人姓卧九忒氏世居巴林地方康熙十三年以佐領隨寧南靖寇大將軍順承郡王勒爾錦征逆藩吳三桂至湖廣南漳縣賊衆來犯率夲旗兵敗之至永興遇偽將軍馬寶胡國柱等率兵三萬餘拒戰殁于陳恩賜雲騎尉世職承襲詳見世職表查穆素查穆素蒙古鑲紅旗人初任佐領兼雲騎尉康熙十三年從揚威大將軍簡親王喇布征吳逆至江西吉安府螺子山遇偽將韓大任率衆七千來犯力戰殁於陳恩賜輕車都尉世職承襲詳見世職表阿余什阿余什蒙古鑲紅旗人姓博爾濟吉特氏世居察哈爾地方任驍騎校委署參領駐防西安康熙十三年從征逆藩吳三桂至四川隨夸蘭大費赫齊迎糧于槐樹驛遇賊吳之茂王屏藩等擁兵截殺力戰不克遂殁于陳賞恤如例華善華善蒙古鑲紅旗人姓西訥椘特氏世居科爾沁地方康熙十四年以五品官隨揚威將軍內大臣阿密達征從逆提督王輔臣輔臣遣其子偽總兵王繼正率兵犯平涼華善隨大兵擊敗之賊復集戰遂力戰陳亡恩賜雲騎尉世職承襲詳見世職表薩音圗薩音圗蒙古正藍旗人姓布爾哈齊忒氏世居愛必汗英舍堡地方順治十五年以護軍校從征貴州駐靖州偽總兵田國欽黃世貴等欲納欵為賊所阻薩音圗同護軍統領鄂納等往接應道遇賊二千餘人擊敗之十六年雲貴平由水路回軍至江南時海賊鄭成功新陷鎮江瓜州進犯江寧率衆二萬列艘江中薩音圗隨副都統葛禇哈等擊敗之又連敗江岸賊五萬餘賊乃以全軍十萬列紅衣炮鳥鎗拒戰復擊敗之授雲騎尉康熙元年隨征東將軍季什哈征山東同夸蘭大吳喇泰敗賊呂思曲楊明五喬易集張靖綱于三等於大山下及巨齒崖南等處三年從定西將軍圗海征湖廣賊季來亨等於茅麓山率夲旗兵敗其偽總兵四偽將四收其衆千餘人旋于間道遇賊力戰陳亡恩賜騎都尉世職承襲詳見世職表孟額圗孟額圗蒙古正藍旗人姓記爾必思氏世居喀喇沁地方康熙三年以一等輕車都尉隨定西將軍圗海征湖廣賊李來亨等于茅麓山同護軍統領敖艾力戰陳亡恩賜雲騎尉世職承襲詳見世職表塔爾尼塔爾尼蒙古正藍旗人姓博多忒氏世居喀喇沁地方康熙十四年以佐領從定西大將軍多羅貝勒董額征從逆提督王輔臣至漢中偽將王屏藩談洪等拒戰塔爾尼率兵擊敗之賊復合遂力戰陳亡恩賜雲騎尉世職承襲詳見世職表恩克恩克蒙古正藍旗人姓烏朗漢濟爾敏世居喀喇沁地方康熙十四年以佐領隨揚威將軍內大臣阿密達征從逆提督王輔臣於平涼力戰陳亡恩賜雲騎尉世職承襲詳見世職表布達喜布達喜蒙古正藍旗人姓薩爾圗氏世居喀喇沁地方康熙十三年以佐領從征四川總偽總兵石存禮等引重兵據朝天關隘口掘㩝塹立木城伏地炮復疊石為墻結三十餘營拒敵布達喜率所屬兵擊破之十四年隨取保寧分兵駐槐樹驛以援糧運遇偽將軍王屏藩吳之茂等兵至力戰殁于陳恩賜雲騎尉世職承襲詳見世職表肯哲肯哲蒙古正藍旗人姓布氏世居敖漢地方康熙十三年以佐領隨揚威將軍內大臣阿密逹征四川十四年至陜西擊賊于平涼力戰陳亡恩賜雲騎尉世職承襲詳見世職表伊納爾起伊納爾起蒙古正藍旗人姓克