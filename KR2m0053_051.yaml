望退阻最為惡習並應申明軍紀俾衆知悉凡有將領受傷兵丁不即時救䕶竟至潰散脱逃者立即查明按名處斬其能奮勇保䕶者立即議功優賞以示鼓勵該管將備等平日尤當愛恤士卒臨時賞罰公平庶兵將同心合力所向無敵一兵丁對敵乘勝追趕刻不容遲若兵丁等有貪搶賊人遺棄財物以致賊衆逃遁貽誤不小該將備等於領兵臨陣時務須通行曉諭違者立即依律治罪庶兵丁等各知儆畏一營卡最關緊要凡領兵將備等務須嚴飭坐卡兵丁輪班防守留心偵探毋得怠惰偷安即探察有事只須選派明幹一二人宻行飛禀餘仍嚴整坐守毋須輕動無事時不許髙聲呌喊致亂營規違者俱照軍法處治一兵丁遇有調撥自當恪守軍令即時遄行如敢騷擾地方欺壓良民蹂躪田禾搶掠財物等事即應按律從重治罪該管將備等平日加意教誡臨時又當嚴行約束無許違犯一兵丁奮勇殺賊應予奬賞但恐兵丁等希圖冒功任意朦混不可不預為防範凡軍法將他人戰功冒為己功及謊稱實在効力將無作有以輕報重者斬該管將備等應隨時曉諭親自稽查俾立功者得賞冒功者治罪以期核實一行軍馬駝最宜愛惜凡兵丁等牧放須揀擇水草弔臕須按照時候遇有疲乏加意調養夜間尤宜小心看守偶有失遺須立時尋獲至所挖井泉不許汚穢飲馬各挨次序毋許争先以致壅塞如有違犯立即重懲不貸一劄營後巡邏防守毋得疎懈夜間不許無故行走帳房内更要小心火燭遇有警報静聽將令不得輕舉妄動若逄有宻令須各自遵守毋得私相漏洩該領兵將備等尤宜申明號令隨時曉諭不得疎懈欽定八旗通志卷三十七
