body:
  text: 欽定四庫全書欽定八旗通志卷三十七兵制志六軍令天命三年太祖高皇帝興師伐明諭諸貝勒大臣俘獲之人勿去其衣服勿淫其婦妾勿離異其匹耦拒戰而死者聽之若歸順者慎勿輕加誅戮天聰三年太宗文皇帝諭朕仰承天命興師伐明拒戰者不得不誅若歸降者雖雞豚毋得侵擾俘獲之人毋離散其父子夫婦毋淫人婦女毋掠人衣服毋拆廬舍祠宇毋毁器皿毋伐果木如違令殺降淫婦女者斬毁廬舍祠宇伐果木掠衣服及離大纛入村落私掠者鞭一百又毋食明人熟食沽酒聞山海關内多有鴆毒更宜謹慎以乾糧飼馬或馬匹羸瘦可量煮豆飼之肥者止秣以草俟休息時再飼以糧凡採取柴草毋得妄行須聚集衆人以一人為首有離衆馳往者拏究如有故違軍令者將不行嚴禁之都統㕘領佐領一併治罪崇德三年諭凡和碩親王多羅郡王多羅貝勒固山貝子臨陣交鋒若七旗王貝勒貝子却走一旗王貝勒貝子拒戰七旗獲全即將七旗佐領下人丁給拒戰之一旗若七旗拒戰一旗却走即將却走人丁分與七旗若一旗内拒戰者半却走者半即以却走人丁分給本旗拒戰者有因屯劄他所未拒戰而無罪者免革人丁其拒戰之王貝勒貝子别行給賞若七旗未及整伍一旗王貝勒貝子拒戰得功者按功次大小俘獲多寡賞之野戰時本旗大臣率本旗軍下馬立王貝勒貝子等率䕶軍乘馬立於後若與敵兵對仗王貝勒貝子大臣不按隊伍輕進或見敵寡妄自衝突者奪所乘馬匹及俘獲人口凡兩軍相對必整齊隊伍各按汛地從容前進如擅離本隊隨别隊行擅離本汛由他汛入及衆軍已進獨却立觀望者或處死或籍没或鞭責或革職或罰銀酌量治罪凡整伍前進稍有先後毋得彼此争論但以按汛擊敵不致退縮為上若有以此争論者即為立心不端之人如敵人不戰而遁我軍追擊之宜選精兵驍騎合力馳擊䕶軍統領不得前進止宜領纛整伍分隊以躡其後倘遇伏兵或以追躡時遇敵旁出䕶軍統領乃親擊之凡大軍起營時各按佐領旗纛整隊而行若有一二人離隊往來尋索遺物及􅒬酒者皆貫耳自出城門務遵軍律肅静行伍毋得喧譁都統副都統㕘領䕶軍統領佐領以次各有統束統束嚴明則該管隊伍豈有喧譁之理今後有喧譁者該管官坐以應得之罪喧譁者責懲軍行時如有一二人離旗行走者許同行人即報送本都統執送者賞銀三兩下營時凡取薪水務集衆同行妄致失火者斬軍士甲胄均書號記胄兩旁皆用圓鐵葉無甲者衣帽後亦書號記一切軍器自馬絆以上均書姓名馬必繫牌印烙不印烙者罰銀二兩箭無姓名者罰銀二十兩如得他人箭隱匿不出者亦罰銀二十兩軍行時若見禽獸馳馬追射者兵丁射以骲箭貝子大臣坐以應得之罪夜行時每佐領人等有别吹竹為號者執治貫耳若不執治議𠫭領罪盜鞍䩞及轡絡羈絆者按法治罪若馬上行李偏墜應整理者本旗人均站立待整乃行兵入敵境時若有一二人離營私掠被殺者妻子入官仍治本管官罪勿毁寺廟勿妄殺平人抗者戮之順者養之俘獲之人勿褫其衣服勿離散人夫婦雖不為俘獲者亦不許褫衣侵害其俘獲之人勿令看守馬匹如有一二人妄取糧草被殺者罪與離伍擒掠者同勿食熟食勿飲酒前此我兵飲食不慎以不知敵人置毒於中耳今特曉諭宜加謹慎有不遵者依律治罪順治八年定發兵之時或在家或在外違限者該管𠫭領佐領等官每兵一名罰銀五兩若至革職等重罪候㫖定奪兵丁不遵約束抗違者酌量罪犯責懲該管官仍行議處十三年定隨征前鋒䕶軍領催驍騎厮養卒等私自逃囘初次鞭一百遞發軍前二次正法康熙十一年題准官員出征在家規避不起身者革職在外違約者革職提問䕶軍及領催驍騎等在家規避不起身者鞭一百仍發軍前在外違約者鞭一百所獲人口入官若係差遣之處不遵號令違誤者鞭一百出兵之處不遵號令妄行者為首人正法餘各枷三月鞭一百該管官罰俸一年十八年聖祖仁皇帝諭領兵諸王將軍等藉捕賊為名燒民房舍擄掠子女搶奪財物或分兵所往之處私自擄掠者令督撫題𠫭治罪如督撫隱匿事發者督撫革職十九年題准或攻城或野戰如將陣亡屍骸不能救出者同戰之㕘領散秩官䕶軍校驍騎校降二級調用領戰之該營總降一級調用領戰之大員罰俸一年二十三年議准官兵被傷退囘者若係一二等傷㾗免議三等以下傷㾗仍與失利者同罪如未經被傷冒作傷㾗退囘者照規避例治罪若係官員重傷止許親隨人等送出無親隨人令驍騎一二名䕶送兵丁重傷亦止令驍騎一二名䕶送多差者將差撥各官治罪多送之驍騎亦同議處二十九年諭本朝自列聖用兵以來戰必勝攻必克所向無敵者皆以賞罰明法律嚴兵卒精鋭器械堅利人思報國殫心奮勇之所致也今軍行其令各該都統以下察覈軍實凡甲胄弓矢諸軍器務令犀利堅好盔甲均繫號帶並書旗分佐領姓名繫於馬尾其行也視大纛整隊齊發有零星前後亂行及􅒬酒者該管官立拏懲責其止也各按旗分隊伍分别屯劄有前後錯亂者罪及該管大員馬無印矢無名各罰以銀給拏獲者竊取鞍轡什物馬匹者視其多寡之數治罪失火從重究懲官兵厮役所過地方無騷擾毋搶掠毋踐踏有擅離營伍入村落山谷奪人財物者軍法從事並罪本主及該管官軍士厮役逃亡在汛界内立行察拏治罪如出汛界外該管大員即選官兵窮追務獲立斬以徇如不能獲則將往追官兵從重治罪其逃人之主及該管官一并嚴行究懲既出我境哨探斥堠務期嚴宻如曠野列陣交兵王貝勒貝子公大臣有不按次序攙越前進及見賊兵寡弱不復請令冐昩前進有功不叙仍治以罪其進也須齊列緩轡按隊前行如自離其隊而附人後或自棄其伍而入别行或他人已入而獨留不進者其應斬應籍没及懲責革罰分别治罪如整旅而進擊敗賊兵厥功維均勿以畧分先後致生争競至敵兵不戰而潰則選精騎進逐之後隊躡踪而進如遇伏兵或賊兵有旁出者則後隊接戰夫兵者所以討逆而安順也領軍大臣果能嚴束其下不使良民受害膺上賞違者罰無赦凱旋之日有以兵器私售䝉古者本人治罪並及該管官馬乃大軍急需須視水草佳處小心牧養起行時則留將卒察遺失之馬轡騣尾所繫字樣交還原主如係疲馬則開明馬匹數目交所在官司人民蒙古善為牧養報知兵部如有隱匿私乘及殺之棄之者治以罪其遺失馬匹之人亦開明馬色報兵部存案恐官兵未能徧知爾部其刋布曉諭之雍正元年世宗憲皇帝諭自古用兵之道首以申明號令為務周易曰師出以律周書曰不愆於六歩七歩不愆於四伐五伐乃止齊焉可知進退歩驟之間尺寸不可違越方為節制之師必須平日申明號令使三軍之士無不熟知深曉倘其中或有不遵者則按軍律置之於法是其獲罪乃本人之自取無所歸咎雖領兵將帥不能以已意一毫輕重於其間此大公之道也我國家武備精强超越往古從來軍行之際紀律嚴明信賞必罰是以天戈所指迅奏膚功此中外臣民所共知者今承平日久新進少壯之人未曾親履戎行則於從前規制未必一一諳練若不詳細申明宣諭以致官弁兵丁等或因䧟於不知而遽罹罪譴朕心實為不忍今特令大臣等酌議軍令條約經朕親加覽定凡太端細務莫不備載其中者蓋以軍機關繫至重必使事事合於紀律人人祇奉章程勿犯重罰而妄冀從輕勿因事小而不遵成法將來荷天眷佑奏凱言旋凡我弁兵等數十萬人有大功而無小過此則朕心所厚望者也著即刋刻交與兩路大將軍通行頒布咸使凛遵旋議准凡戰陣之際聽掌號擊鼓鳴金為進止聞鼓不進聞金不止者斬遇敵進戰有囘顧畏縮交頭接額私語者斬專司掌號擊鼔鳴金之人聞令即掌號擊鼓鳴金令止即止違者八旗兵鞭責四十綠旗兵棍責三十臨陣違令者斬大將軍宻傳軍令轉傳之人增減要言者斬大將軍授𦂳宻軍令私告他人以致宣揚誤事者斬官兵殺傷良人冐功者斬掠取他人戰功及詭稱功績以無為有以輕報重者斬沿途欺壓民番恃强買賣掠財物毁房屋姦婦女者皆斬指稱夢見鬼怪造言惑衆者斬兵丁中途染病該管委署䕶軍校領催紅旗管隊即同䕶軍校驍騎校千總把總一同驗確禀明該管官令醫調治如不驗看醫治該管委署䕶軍校領催鞭五十紅旗管隊棍責四十䕶軍校驍騎校千總把總插箭如兵丁詐病偷安者斬大將軍與同官宻議軍情有私行竊聽者斬差往探聽賊人形勢畏縮不往詭稱已去妄報虚實及探聽不實貽誤軍機者斬獲逸馬隱匿私乘不給馬主者八旗兵鞭五十綠旗兵棍責四十仍插箭遊營有獲馬私宰或售與别人者皆斬臨陣竊馬潜逃者斬傳首示衆如在劄營地方犯者八旗兵鞭一百綠旗兵棍責八十劄營地方輪班守卡嚴肅訪察夜遇警急即宻禀申報設備以俟有驚怖喧譁擾動散走以致亂營者斬私語嗟怨長嘘短嘆者八旗兵鞭七十綠營兵棍責六十責後復犯並臨陣時故違者斬黑夜無故驚呼疾走致亂營伍者斬白晝犯者八旗兵鞭五十綠旗兵棍責四十面承該管官諭令辭色傲慢者八旗兵鞭五十綠旗兵棍責四十有意抗違致誤軍機者斬疎防失火燒燬草厰八旗兵鞭一百綠旗兵棍責八十若臨敵境失火致燒草厰者斬失火致燒衣服器械八旗兵鞭五十綠旗兵棍責四十如在存貯火藥地方失火者八旗兵鞭一百綠旗兵棍責八十該管䕶軍校驍騎校委署䕶軍校領催千總把總紅旗管隊皆插箭遊營臨陣時軍營失火致誤大事者兵丁及該管委署䕶軍校領催紅旗管隊悉斬以徇兵丁夤夜夢魘旁人即行喚醒如有隨聲應和擾及營伍者八旗兵鞭七十綠旗兵棍責六十該管委署䕶軍校領催紅旗管隊插箭遊營臨敵營犯者皆斬管守營門縱人擅入者八旗兵鞭七十綠旗兵棍責六十對敵時犯者斬差往偵探之人遇賊投誠不禀報者八旗兵鞭七十綠旗兵棍責六十如有投誠之人不即解送以致逃散者八旗兵鞭一百綠旗兵棍責八十因而洩漏軍中虚實者照洩漏軍機例治罪大兵進𠞰敗賊後不奉大將軍令擅奪車馬輜重者挿箭遊營因而擾亂營伍者斬倚强欺弱􅒬酒為非不遵約束輕者鞭責重者插箭汚穢水泉飲不以次者八旗兵鞭一百綠旗兵棍責八十支領口糧肆行抛棄狼籍者八旗兵鞭一百綠旗兵棍責八十該管委署䕶軍校領催紅旗管隊等不即呈報者插箭兵行不按隊伍踐踏草地者八旗兵鞭一百綠旗兵棍責八十劄營時牧放馬駝牛羊縱令蹂躪者八旗兵鞭一百綠旗兵棍責八十仍插箭遊營該管官插箭兵丁押運軍糧在途私竊升合或竊同營兵丁口糧及損傷盛米囊槖致多虧折者八旗兵鞭一百綠旗兵棍責八十弓箭撒袋腰刀皮索一切軍器不加收管致有遺失並應攜器械擅自離身八旗兵鞭一百綠旗兵棍責八十該管委署䕶軍校領催鞭四十紅旗管隊棍責三十䕶軍校驍騎校千總把總等插箭在途見遺失刀箭等物拾取不禀報給還者八旗兵鞭四十綠旗兵棍責三十均插箭遊營無𦂳急事私行馳馬者八旗兵鞭五十綠旗兵棍責四十追奪馬匹令其歩行兵行各按隊伍以次而前無論道路險夷寛窄有先後離隊攙越者八旗兵鞭五十綠旗兵棍責四十均插箭遊營結營之後各帳房出一人見藍旗則取柴見黑旗則取水有便溺者守門官兵驗明照牌准其出入起更後不准出營違者八旗兵鞭四十綠旗兵棍責三十該管委署䕶軍校領催紅旗管隊等不嚴行約束者插箭夜傳軍令怠慢不遵巡察坐堆偷安寢睡誤更曠班者八旗兵鞭一百綠旗