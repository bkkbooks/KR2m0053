body:
  text: 欽定四庫全書欽定八旗通志卷八十一典禮志四八旗祀典一王太廟配享功王公祀堂子祀典典府廟祀臣廟昭忠祀太廟配享東廡配位自北起多羅通達郡王順治十一年設位配享武功郡王武功郡王妃崇德元年設位配享多羅惠哲郡王多羅惠哲郡王妃順治十一年設位配享多羅宣獻郡王多羅宣獻郡王妃順治十一年設位配享禮親王乾隆四十三年設位配享睿親王乾隆四十三年設位配享鄭親王乾隆四十三年設位配享豫親王乾隆四十三年設位配享肅親王乾隆四十三年設位配享克勤郡王乾隆四十三年設位配享怡賢親王雍正八年設位配享西廡配位自北起直義公費英東崇德元年設位配享宏毅公額亦都崇德元年設位配享武勳王揚古利順治元年設位配享忠義公圖爾格順治九年設位配享昭勳公圖賴順治九年設位配享文襄公圖海雍正二年設位配享超勇親王策凌乾隆十五年設位配享大學士鄂爾泰乾隆十年設位配享功臣配享入廟儀禮部承旨具疏行工部製神主龕座祭案具製成擇吉鎸字如式恭遇四時大饗前期遣官一人祗告太廟如常儀是日太常寺官入廟設龕座於配享之次陳俎豆鑾儀衛設采亭於工部堂露臺上奉神主遣官一人諸王以郡王功臣以大臣詣工部奉主置采亭內民校舁行前列御杖王吾杖功臣引杖自工部中門出鴻臚寺官二人乘馬前引遣官從至東長安門王至門天安御仗采亭止遣官自亭奉主鴻臚寺官二人導引由東長安左門入端門左門至太廟戟門右門自街門入皆由右出鴻臚寺官止太常寺官引至甬道右拜位王階上功臣階下北面立遣官置主於拜位代行三跪九叩禮畢奉神主興奉安於配享之次行三叩禮退王公堂子祀典凡月朔致祭崇德元年定每月初一日親王以下貝子以上每府派一人齋戒一日詣堂子供獻今自郡王以上供獻凡堂子春秋二季立竿致祭崇德元年定親王郡王貝勒每家各祭三竿貝子鎮國公輔國公每家祭二竿鎮國輔國奉國將軍每家各祭一竿不祭者聼無爵宗室不得祭其每月致祭日期初一日大內致祭初二日以後親王郡王貝勒各以次輪一日致祭各府應祭之日若遇大內致祭則應祭之家停祭貝子公等依次致祭凡祭三竿之家於定期內各祭一竿過十一日後再各祭二竿或致祭日有兩三家同祀神者仍依次俟應先祭之家祭畢次祭之家方祭如諸王貝勒於定期致祭之日有事不得祭預期知會禮部令次祭之家致祭其有事者隨便補祭凡為馬羣致祭者親王以下輔國公以上許祭鎮國將軍以下不許祭有違例多祭併爭祀神者議處凡官員庶民等設立堂子致祭者永行停止康熙二年定親王立竿致祭之期第一康親王府第二顯親王府第三莊親王府第四安親王府第五裕親王府第六簡親王府四年定郡王立竿致祭之期第一溫郡王府第二惠郡王府第三信郡王府第四平郡王府第五順承郡王府乾隆十九年諭王公等建立神竿應按爵秩設立整齊以肅觀瞻嗣後著每翼作為六行每行六分以未分封皇子等列於前其次則親王郡王貝勒貝子公等分為六層設立神杆皇子內已受封爵者其神杆視所封爵立於應立之處所有石座不必移動神杆各按爵秩更换每年修整一次著禮部會同內務府總管察看繪圖進呈著為例欽此遵旨議凖神杆石座每翼作為六行每行列六座皇子神杆列前一行其次親王郡王貝勒貝子公各按行排列見在左翼親王七人郡王三人貝勒三人貝子一人公二人應將第七親王神杆石座列于次行郡王之首餘皆按次排列右翼親王四人郡王六人貝勒二人貝子一人公十有七人人數多寡不齊應將親王列於前其次郡王貝勒貝子公按一行六座之數通融序列嗣後遇有應那移神杆宗人府豫期行文禮部注册至年終禮部堂官會同內務府總管赴堂子敬閲將神杆石座修整一次凡挂錢崇德六年定每年元旦早親王以下貝勒以上赴堂子挂紙錢貝子以下不挂今郡王以上挂紙錢貝勒以下不挂王府廟祀崇德元年定宗室封王者立家廟致祭順治五年定宗室封王無嗣者太廟祔祭有嗣者令其子孫立家廟致祭十年定郡王以上祀追封祖父於家廟貝勒以下祀追封祖父於墳墓一建廟莊親王立一廟禮親王巽親王謙郡王共立一廟肅親王立一廟饒餘郡王端重親王共立一廟頴親王順承郡王共立一廟豫郡王案乾隆四十三年奉王封旨復親號立一廟克勤郡王衍禧郡王共立一廟雍正九年定怡賢親王立一廟乾隆四十四年奉旨特建睿忠親王祠一祭期定於正月四月七月十月嵗暮日前期三日齋戒候皇帝祭太廟諸王陪祭禮畢各回府致祭凡有薦新品物如太廟未獻之先不許家廟供獻一廟制立廟七間中五間為堂左右二間隔以牆為夾室堂後楣以北五室中奉始封之王世世不祧髙曽祖禰依世次為二昭二穆昭東穆西親盡則祧由昭祧者藏主於東夾室升昭之二位於一室以二室奉升祔之主由穆祧者藏主於西夾室升祔亦如之庭繚以垣南為中門又南為廟門左右各設側門庭東西廡各三間東藏遺衣冠西藏祭器樂器廟重簷丹楹采桷緑瓦紅堊壁階戺三出陛門繪五色花草出陛如之焚帛爐在中門之內東南隅封牲房在中門之外西向一牌位髙二尺寬四寸朱紅色上刻追封諡號墨書設於紅油漆龕內設紅片金帳幔其廟中王位以居中為尊餘分列左右如止一王正設中間一供品每位前設紅案一銅香爐一銅燭臺二銅花瓶二供湯飯果品紅案一盛帛紅漆匣一供牲槽一白磁爵六銀鑲象筯二雙銀匙二香盒一酒尊一銀壺一銀杓一白色帛二端無妃者止用帛一爵三匙一筯一雙獻帛紅案一祭文案一每王一位用豕一羊一果品八盤麵餅四盤飯二碗湯二碗所用樂器與王府樂器同一致祭前三日王及子弟護衛所屬官員執事人等妃及隨從婦女俱各齋戒前一日備辦祭品宰牲祭日於神位前供祭品大門兩旁設鼓樂畢主率子弟護衛所屬官員俱朝服從廟大門東旁門進至廟東簷下向西立子弟在階上向西立護衛及所屬官員在階下分班對立執香盒人詣香案旁立引禮人引王從廟左門進至香案前立子弟護衛所屬官員各依本位向上排立引禮人贊跪王跪贊上香執香盒人跪進香王接炷香拱舉上爐內又三上瓣香如左右有王位者先詣左位次至右位次第上香畢復位立引禮人贊跪叩興門外作樂王行二跪六叩頭禮興子弟護衛所屬官員俱隨行禮畢樂止引禮人贊奠帛初獻樂作執帛爵官捧帛爵在王左跪接帛爵官在王右跪引禮人贊跪王跪受帛拱舉授右接帛官王又受爵拱舉授右接爵官王又受妃位前爵拱舉授右接爵官各官捧帛在前爵在後至位前捧帛官跪獻三叩頭捧爵官立獻各退樂止如兩旁有王位護衛捧帛酒分獻引禮人贊興王興讀祝人於祝文案前一跪三叩頭捧祝文在案東立引禮人贊跪王及子弟護衛所屬官員并讀祝人皆跪引禮人贊讀祝讀畢讀祝人捧祝文送至中位前跪獻於帛匣內三叩頭退引禮人贊叩興王等俱行三叩頭禮興引禮人贊亞獻樂作獻爵如初獻儀樂止引禮人贊終獻樂作獻爵如亞獻儀樂止引禮人贊跪叩興樂作王率子弟護衛及所屬官員行二跪六叩頭禮畢興樂止引禮人贊捧祝帛詣燎爐前樂作捧祝帛官進前一跪三叩頭各捧祝帛興捧香官跪取香置盒內興王率子弟等俱退在西旁立各官捧祝文在前次帛次香俱從中道行至爐前焚祝帛贊禮畢王等皆出樂止妃率隨從婦女俱朝服從西旁門入由廟右門進排立行禮畢撤祭物回如王有事不得親祭令子弟代祭如無子弟令護衛代祭其奠帛祭品該王自行備辦引禮人於所屬官員內選充其祝文內院撰給體式功臣廟祀孔武壯王祠順治十一年敕建定南武壯王祠建祠于廣寧門外中設一案以妃白氏李氏配每年二月八月致祭遣太常寺堂官行禮致祭禮儀一祝版白紙墨書前一日太常寺堂官捧送至祠堂安設紅案上上香一跪三叩頭退一陳設供品素帛三白色白錫爵九羊一豕一果品五核桃荔枝圓眼棗栗各一盤酒一樽一正祭日遣祭官行二跪六叩頭禮祭文維年嵗次月日皇帝遣某官某諭祭於定南武壯王孔有德之靈曰人臣盡忠仗節矢天日而不渝朝廷恤死酬勳撫嵗時而增感爾定南武壯王孔有德膚功早著偉烈長存兹當仲春秋之辰益念忠良之績特頒祭典用慰幽靈王如有知尚克歆饗鈕祜祿氏恪僖公祠康熙十九年敕建恪僖公祠建祠于安定門外中設一案以縣主一品夫人舒舒覺羅氏配每年二月八月致祭遣太常寺堂官行禮致祭禮儀與武壯王同祭文維年嵗次月日皇帝遣某官某諭祭於恪僖公遏必隆之靈曰沛隆恩於勳舊國有彛章展時祭于春秋禮逾常格爾恪僖公遏必隆名垂青簡績著豐碑矧追椒寢于所生宜薦専祠以有永兹當春秋仲申侑几筵靈如有知尚克歆饗佟氏勤襄公忠勇公端純公祠雍正二年敕建勤襄公忠勇公端純公祠建祠於朝陽門外祠內設三案勤襄公居中以一品夫人覺羅氏配忠勇公左以一品夫人他塔喇氏溫都氏配端純公右以一品夫人赫舍哩氏配每年二月八月致祭遣太常寺堂官行禮致祭禮儀俱與武壯王同祭文維年嵗次月日皇帝遣某官某諭祭于勤襄公佟圗賴忠勇公佟國綱端純公佟國維之靈曰崇功報德禮首逮于元臣錫類推恩誼尤敦于懿戚考彛章而立廟因時序以薦觴惟爾一門宣猷纍葉效忠貞而體國名著旗常秉孝義以型家芳傳國史望髙閥閲蔚為勳舊之宗慶衍庭幃光啓聖慈之範兹當春秋仲特遣專官設奠几筵靈其歆饗圖文襄公祠雍正二年敕建文襄公祠建祠于德勝門外中設一案以一品夫人覺爾禪氏鈕祜祿氏配每年二月八月致祭遣太常寺堂官行禮致祭禮儀俱與武壯王同祭文維年嵗次月日皇帝遣某官某諭祭于文襄公圖海之靈曰義重酬勳眷鈞衡之舊德禮隆秩祀因節序以申恩爾文襄公圗海望髙國器功贊王猷表世德于戟門生膺茀祿贈崇階于鼎爵歿被榮名焕新綍而建祠遣專官而致祭時當春秋仲式布几筵靈其有知尚能歆格宏毅公祠乾隆二年敕建宏毅公祠建祠于安定門外每年二月八月致祭遣太常寺堂官行禮致祭禮儀與武壯王同祭文維年嵗次月日皇帝遣某官某諭祭于宏毅公額亦都巴圗魯之靈曰誼重酬庸茂典聿加于勳舊禮隆展祀嵗時宜備于馨香爾宏毅公額亦都巴圗魯開國名臣從龍上佐表成勞于鐘鼎青史揚芬紀偉績于旗常豐碑示寵既叨恩于廟食更賜祭於専祠式賁新綸允符彛憲時當春秋仲用布几筵靈而有知尚克歆格恪僖公敏果公莊慤公祠乾隆十四年敕建恪僖公敏果公莊慤公祠建祠於東安門內祠內設三案恪僖公居中以一品夫人覺羅氏配敏果公左以一品夫人穆溪覺羅氏博爾濟吉特氏配莊慤公右以一品夫人覺羅氏配每年二月八月致祭遣太常寺堂官行禮致祭禮儀與勤襄公同祭文維年嵗次月日皇帝遣某官某諭祭於恪僖公哈世屯敏果公米思翰莊慤公李榮保之靈曰禮隆念舊千秋之俎豆攸光義重酬庸奕代之馨香勿替考彛章而秩祀因時序以申恩惟爾一門夙稱望族忠誠體國數傳紀績于旗常端敬型家纍葉垂芳于圖史祥開坤極早錫榮封佑啓勳賢復新廟貌命祀官而陳芬苾落成已賁恩綸隨節候而展几筵嵗薦彌昭懿典兹當春秋仲常祀聿修靈如有知尚其歆格表奬忠勳祠雍正二年諭朕惟周禮有司勳之官凡有功者書銘太常祭于大蒸祭法曰以死勤事則祀之所以崇德報功風勵忠節也我太祖髙皇帝肇造鴻圖太宗文皇帝式廓區夏世祖章皇帝奄有萬邦自創業以至定鼎將帥之臣致命立功者不少聖祖仁皇帝臨御六十一年中間殱滅三逆永清沙漠以及平定西藏臺灣雖天戈所指如疾風振稿而師旅臣之捐軀馬革及守土官之見危授命者所在多有邇者青海蕩平西域效順然自用兵以來將士奮勇前驅亦有殁於行陳者此皆盡忠報國之臣朕甚嘉之亦甚憫之當於京城建廟立祠春秋妥侑世世血食其偏禆士卒力戰敵愾捨生取義者亦附列左右以褒崇大節揚表芳徽俾逺近觀德勃然生忠義之心於治道亦有禆益遵旨議準兵部詳查檔案行文八旗直省巡撫凡臨陳捐軀守土授命之文武諸臣及偏禆士卒赤心報國奮不顧身者詳繕籍貫事績具奏交工部於京城內建立祠宇製造牌位恭請欽定匾額懸挂將文武諸臣牌位安設正祀偏禆士卒牌位安設兩廡入祠之日太常寺前期奏請遣大臣一員致祭祭文由翰林院撰擬每年春秋二季交太常寺備辦仍交翰林院分派各員詳查實録國史方略各館檔案移取兵部清册各為立傳彚成一編垂諸永久是年欽定祠名表奬忠勳御書匾額給賜御製昭忠祠碑文朕惟疆場用命因敵愾以效忠行陳爭先值臨危而殉節追尋壯槩殊切軫懷載建豐碑用光崇祀爾和碩敬謹親王尼堪等賦資雄毅秉性堅貞均際會於從龍各圖功於汗馬我國家蕩平區宇命上將以專征綏靖邉陲張王師而撻伐戈鋋所向旋見廓清貔虎前驅一惟奮勇或氣凌徑敵縱橫萬衆之中或志鋭先登出入重圍之內王公將帥既赴義以如歸禆校卒徒亦銜恩而自矢勵致身之素志蹈創何辭耿報國之丹誠嬰鋒不顧芳名常著摛文宜付於史官英爽猶生勤事允符於祀典乃者搆成棟宇羅設几筵考厥官資定其位次握麾擁節並肹蠁於一堂擐甲荷殳得從班於兩廡懸之巨榜表厥忠勳錫以綸章昭兹節烈於戲華楹敞朗長回日月之輝雕簷嵯峨永壯風雲之色聿傳久逺式載寵榮昭忠祠典昭忠祠之禮凡親王郡王貝勒貝子公侯伯大學士內大臣尚書都統將軍總督一品子爵前鋒統領護軍統領侍郎巡撫副都統二品男爵三品京卿提督總兵官及武職加贈至正從一品等官各奉安於前室位均南向凡四品卿翰林學士布政使按察使一等侍衛參領輕車都尉及武二品之副將等官奉安于後正室凡五品少卿二等侍衛道府佐領騎都尉及武三品之參將遊擊等官奉安于後左室凡侍講侍讀御史郎中員外郎主事三等侍衛雲騎尉及武四品之都司等官奉安于後右室位均南向凡同知知州通判驍騎校及武五品之守備等官奉安于前東配室凡知縣筆帖式州同縣佐以下及武六品之千把總等官奉安于前西配室東位西向西位東向配室左右及前廡東西羣房凡陳亡士卒以其名祔嵗春秋仲月諏吉遣大臣一人詣前室致祭太常寺官十有三人各分獻所祀王公子孫暨諸臣子孫在京師者咸與行禮祭之日太常寺官入祠供具前室七案中室羊一豕一果實五盤左三案各果實五盤共羊一豕一右如之中左右各香案一爐一鐙二後正室五案後左右室各三案每案果實五盤共羊一豕一爵三中案奠獻餘爵實酒豫設配室及房廡同每室統香案一爐鐙具東西配室各五案陳設如之前廡及後東西羣房每案果實二盤豕肉一爵三爐鐙具前室中設一案少東北向供祝版東西序設案分陳香帛尊虛爵後室及前配室左右房廡分陳香帛房廡不設帛尊虛爵如儀漏未盡與祭者各服其服畢集祠門內太常寺典儀立室東簷下司祝立祝案東司香司帛司爵各以其職為位掌燎率燎人立燎爐前質明承祭官暨分獻官朝服詣祠贊禮郎引承祭官由中門入至東階下盥手畢升階就拜位前立引後室分獻官各于中檻外序立引前配室及房廡各分獻官于甬道上東西序立鴻臚寺官引陪祀宗室王公及大臣官辨後裔見任一品二品者于階上東西三品以下五品以上于階下東西六品以下及有職者在大門內階下東西按班序立典儀贊執事官各共乃職贊禮郎贊就位承祭官就位贊禮郎引由前室中門入詣香案前立贊上香司香跪奉香承祭官上炷香三上瓣香以次詣左右香案前上香如儀贊復位承祭官復位贊叩興承祭官分獻官暨與祭者均行二跪六叩禮興典儀贊奠帛爵行初獻禮前室司帛奉篚各奠于案三叩興司爵奉爵各奠于正中皆退同時後室東西配室房廡分獻官分詣各香案前上香如儀執事生獻帛于案司爵獻爵中案正中退司祝詣祝案前跪三叩興奉祝版立案右典儀贊讀祝司祝北面宣讀承祭官及分獻官立聽與祭者跪聽詞曰維某年月日皇帝遣某官某諭祭八旗直省盡節立功王大臣等之靈曰周禮有司勳之職名勒旗常祭法載勤事之文光生俎豆蓋舍生取義臣子抒報國之忱而報德酬庸朝廷示作忠之典英標如在渥澤宜頒爾王大臣等丹心自勵正氣挺生果敢本於性成見危授命忠誠矢于敵愾視死如歸生當開創之年執鋭披堅實賴干城之佐運際承平之日安邉除暴亦資禦侮之材或陷陳以爭先或守土而盡職或被誘不辱乃授首以從容或深入無援遂致身于倉卒雖天戈所指如振稿而摧枯乃大義為昭可凌霄而貫日我皇考軫念曩烈誕賁殊榮命立専祠俾膺特典王公將帥躋正宇之輝煌士卒偏禆列兩廡而陪侍蓋所以表忠貞于既往昭節義于無窮朕洪紹丕基遵行常祀恭書竹帛既掦久逺之芳徽禮薦牲牢勿替春秋之血食苾芬在列靈爽歆承讀訖以祝版奉安于中案篚內跪叩如初興退與祭者咸三叩興亞獻終獻均如初儀贊禮郎贊跪叩興承祭官分獻官及與祭者均行二跪六叩禮典儀贊奉祝帛送燎有司奉祝帛香以次送燎承祭官視燎贊禮畢仍由中門出各退欽定八旗通志卷八十一
