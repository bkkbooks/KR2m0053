  text: 人物志一百四十九列女傳二十九八旗漢軍列女傳七鑲黃旗漢軍馬甲丁得雲之妻魏氏鑲黃旗漢軍馬甲唐瑞仁之妻孔氏鑲黃旗漢軍間散丁國棟之妻張氏鑲黃旗漢軍間散傅自信之妻王氏鑲黃旗漢軍台丁張文亮之妻張氏鑲黃旗漢軍拜唐阿李慶蕃之妻陳佳氏鑲黃旗漢軍副都統崔承書之繼妻梅佳氏正黃旗漢軍間散李世俊之妻關氏正黃旗漢軍莊頭佟學禮之妻金氏正白旗漢軍敖爾布羅頊齡之妻吳氏正白旗漢軍馬甲江玉柱之妻張氏正白旗漢軍馬甲田震之妻沈氏正白旗漢軍養育兵張漢功之妻屈氏正白旗漢軍養育兵于世泰之妻戴氏正白旗漢軍馬甲毛緒之妻劉氏正白旗漢軍馬甲許養正之妻于氏正白旗漢軍兵部他庫拉什觀音保之妻王氏正白旗漢軍間散李五八之妻楊氏正白旗漢軍間散趙強之妻楊氏正紅旗漢軍馬甲馬國英之繼妻韓氏正紅旗漢軍馬甲李紹龍之妻王氏正紅旗漢軍馬甲保住之妻崔氏正紅旗漢軍間散張化桐之妻趙氏正紅旗漢軍馬甲王文鳯之妻張氏鑲白旗漢軍司之樂之繼妻陳氏鑲白旗漢軍馬甲宋文銘之妻陳佳氏鑲白旗漢軍敖爾布談志剛之妻郎氏鑲白旗漢軍馬甲朱維魁之妻胡氏鑲白旗漢軍間散楊海山之妻蔣氏鑲紅旗漢軍養育兵吕天望之妻楊氏鑲紅旗漢軍間散四達色之妻尚氏鑲紅旗漢軍間散髙斌全之妻朴氏正藍旗漢軍間散佟源之妻李氏正藍旗漢軍間散佟鍟之妻李氏正藍旗漢軍間散白之眉之妻劉氏鑲藍旗漢軍馬甲楊培興之妻胡氏鑲藍旗漢軍間散張潮之妻劉氏鑲藍旗漢軍間散徐汝枚之妻張氏鑲藍旗漢軍匠役馬述德之妻國氏鑲藍旗漢軍馬甲劉建勳之妻丁氏以上俱於乾隆五十一年旌表鑲黃旗漢軍馬甲朱家泰之妻王氏鑲黃旗漢軍馬甲閻支明之妻王氏鑲黃旗漢軍馬甲趙知之妻牛氏鑲黃旗漢軍馬甲鄒雲成之妻張氏鑲黃旗漢軍間散石宣之妻聶氏正黃旗漢軍拜唐阿赫達子之妻冀氏正黃旗漢軍拜唐阿趕嘴之妻邱氏正黃旗漢軍馬甲王嘉義之妻劉氏正白旗漢軍間散宣秉泰之妻髙氏正白旗漢軍水手王世英之妻白氏正白旗漢軍壯丁王瑞之妻孫氏正紅旗漢軍馬甲朱孝祥之妻崔氏正紅旗漢軍間散溫琮之妻羅氏正紅旗漢軍生員汪桐之妻關佳氏正紅旗漢軍馬甲張秉正之妻趙氏正紅旗漢軍馬甲夀保之妻劉氏鑲白旗漢軍馬甲胡士旺之妻何氏鑲白旗漢軍馬甲楊文坤之妻許氏鑲白旗漢軍間散紀雲龍之妻鄭氏鑲白旗漢軍間散馬士達之妻劉氏鑲紅旗漢軍佐領趙燦緯之妻繆氏鑲紅旗漢軍馬甲二達色之妻張氏鑲紅旗漢軍領催陳宗極之妻李氏鑲紅旗漢軍馬甲宋宏謨之妻王氏鑲紅旗漢軍馬甲余進禮之妻張氏鑲紅旗漢軍馬甲朱兆炳之妻陳氏正藍旗漢軍領催佟育德之妻朱氏正藍旗漢軍馬甲于清之妻張氏正藍旗漢軍馬甲曹洪祥之妻王氏正藍旗漢軍間散常文學之妻王氏正藍旗漢軍間散劉養夀之妻袁氏正藍旗漢軍馬甲黃悅廣之妻鍾氏正藍旗漢軍馬甲莫興隆之妻陳氏鑲藍旗漢軍炮手徐士成之妻張氏鑲藍旗漢軍馬甲王智之妻佟氏鑲藍旗漢軍馬甲傅英之妻沐氏鑲藍旗漢軍馬甲韓延基之妻金氏鑲藍旗漢軍炮手王國彥之妻李氏鑲藍旗漢軍間散王得義之妻袁氏鑲藍旗漢軍間散張林之妻劉氏鑲藍旗漢軍馬甲馬林太之妻竇氏鑲藍旗漢軍馬甲周作祥之妻黃氏以上俱於乾隆五十二年旌表鑲黃旗漢軍間散范樹琪之妻常氏鑲黃旗漢軍間散于寬之妻陳氏鑲黃旗漢軍馬甲崔禮之妻汪氏正黃旗漢軍間散劉文魁之妻王氏正黃旗漢軍馬甲李崇馨之妻宋氏正黃旗漢軍馬甲伍成瑞之妻劉氏正白旗漢軍間散蘇煥之妻張氏正白旗漢軍馬甲薑佩之妻張氏正白旗漢軍間散栁鵬之妻李氏正白旗漢軍馬甲王錦之妻諾氏正白旗漢軍馬甲王瑜之妻康氏正白旗漢軍間散李朝俊之繼妻劉氏正白旗漢軍馬甲五格之妻戴氏正紅旗漢軍領催莊世祿之妻徐氏鑲白旗漢軍馬甲雷英之妻朱氏鑲白旗漢軍馬甲盧炎之妻髙氏鑲白旗漢軍馬甲徐文彬之妻楊氏鑲白旗漢軍馬甲蘇邦翰之妻紀氏鑲白旗漢軍領催李世元之妻關氏鑲紅旗漢軍馬甲閻士玉之妻張氏鑲紅旗漢軍馬甲郭文光之妻張氏鑲紅旗漢軍間散傅天保之妻寧氏鑲紅旗漢軍馬甲管九棄之妻侯氏鑲紅旗漢軍馬甲姚士能之妻朱氏正藍旗漢軍領催羅仲儀之妻田氏正藍旗漢軍馬甲甘運澤之妻吳氏正藍旗漢軍馬甲孫成德之妻周氏正藍旗漢軍領催鍾瀚澤之繼妻陳氏鑲藍旗漢軍護軍豐盛額之妻顧氏鑲藍旗漢軍馬甲蕭莊之妻王氏鑲藍旗漢軍馬甲劉涵之妻金氏鑲藍旗漢軍馬甲波爾泰之妻王氏以上俱於乾隆五十三年旌表鑲黃旗漢軍馬甲倉兒之妻陸氏鑲黃旗漢軍馬甲李坤之妻孟氏鑲黃旗漢軍水手髙懷智之妻于氏鑲黃旗漢軍馬甲安定邦之妻王氏正黃旗漢軍馬甲談祺之妻曲氏正黃旗漢軍壯丁張玉麟之妻髙氏正黃旗漢軍馬甲那丹珠之妻趙佳氏正黃旗漢軍馬甲楊連之妻畢氏正黃旗漢軍監生滚布之妻梁氏正黃旗漢軍馬甲朱延齡之妻胡氏正白旗漢軍馬甲何國璽之妻孟氏正白旗漢軍馬甲黃朝新之妻張氏正白旗漢軍間散張名著之妻李氏正白旗漢軍馬甲墨爾根之妻孫氏正白旗漢軍間散老格之妻瓜勒佳氏正白旗漢軍間散三小兒之妻王氏正白旗漢軍間散魏大有之妻李氏正紅旗漢軍養育兵李文亮之妻吳氏正紅旗漢軍馬甲余德裕之妻聞氏正紅旗漢軍馬甲劉天保之妻張氏鑲白旗漢軍領催陳鎧之妻髙氏鑲白旗漢軍間散王老格之妻李氏鑲白旗漢軍間散佛保之妻王氏鑲紅旗漢軍馬甲劉士義之妻鄭氏鑲紅旗漢軍馬甲陳芳之妻陳氏正藍旗