body:
  text: 欽定四庫全書欽定八旗通志卷一百二十六人物志六宗室王公傳四和碩德豫通親王多鐸貝多羅信郡王多尼原封多羅勒察尼和碩德豫通親王多鐸多鐸太祖髙皇帝第十五子初封貝勒天聰二年二月與同母兄多爾衮從太宗文皇帝征察哈爾多羅特部大捷俘獲萬餘車駕將還瀋陽途中宴從征將士賜多鐸號額爾克楚呼爾三年十月復從征明由龍井關入同貝勒莽古爾泰多爾衮以偏師圍漢兒莊城降之遂會大兵克遵化進薄京師明寧逺巡撫袁崇焕錦州總兵祖大夀以兵二萬來援屯廣渠門外諸貝勒敗之多鐸以年幼留後明潰卒來犯擊却之十二月從上閲視薊州形勢明山海關援兵五千距城二里許列陳多鐸同諸貝勒擊敗之五年七月上征明大軍抵大凌河夜圍其城正白旗都統喀克篤禮率本旗兵圍東南之北多鐸率護軍兵為䇿應又與大貝勒代善等率兵三千以炮攻克明近城臺保九月明援兵七千出錦州拒我前鋒於小凌河岸上以兵二百馳擊敵潰遁多鐸追至錦州墜馬馬逸入敵陳乃乘小校扎福塔之馬而還越十日明援兵四萬距大凌河十五里列營多鐸從上擊敗之十一月與貝勒濟爾哈朗等率兵三千五百往塔山東阻截邉海隘口俘百餘人六年四月從征察哈爾林丹汗遁大兵分路前進多鐸與濟爾哈朗多爾衮等率兵略歸化城西南黃河一帶俘衆千餘八年五月復從征明七月與阿濟格貝勒等率兵自巴顔珠爾格入龍門遇明兵敗之又奉命率兩黃旗每佐領兵五名往略保安州攻克其城殺其守備會大兵於應州謁上籍俘獲數以獻八月往略朔州東至五臺山還從上擊敗明兵於大同城南九年二月上命貝勒多爾衮等征明山西五月諭諸貝勒大臣曰出師諸貝勒此時想已入明境明必調寧逺錦州兵往援我兵今當入寧錦界立營使彼望見我軍以牽其救援之兵遂於每佐領選護軍二人以多鐸為帥艾度禮阿格等輔之入廣寧境遣副都統阿山石廷柱參領圗賴吳拜郎邱察哈爾等率兵四百先驅多鐸率大兵繼進逾十三山站立營明錦州總兵祖大夀令副將劉應選穆祿吳三桂等率兵三千五百迎探大夀駐營錦州城外五里時明將劉成功趙國志率兵八百與應選等合兵至大凌河西與我兵遇阿山等以敵數馳報多鐸多鐸遂率所部馳赴飛塵蔽天明諸將見我勢鋭大驚奔潰阿山等四百兵突入掩殺兩路追擊斬應選殱敵兵五百擒逰擊曹得功及守備三員獲馬匹甲胄無算距錦州松山城五里收軍還翼日復攻克一臺回駐廣寧邉境旬餘乃還駕出懷逺門五里外迎勞多鐸獻陳獲官將及所得軍器馬匹上以多鐸初専閫外能出竒制勝嘉奬之賜良馬五甲五崇德元年四月晉封和碩豫親王六月命掌禮部事八月與睿親王多爾衮等征明分兩翼王率左翼兵由錦州入降胡有升等由義州還十二月上親征朝鮮遣戶部承政馬福塔等率兵三百為前鋒多鐸等由沙河保領兵千繼之至其都國王李倧棄國遁我兵踰城入城中軍士奔竄追之四十里至南漢山城環圍之朝鮮臣在外者聞其主被圍率兵二萬餘先後來援屢擊敗之迎上駐城西獻所獲馬械命分賚有差二年正月大兵北渡漢江營江岸距王都城東二十里許朝鮮全羅忠清兩道兵來援列營南漢山命多鐸率兵往視天方雪隂晦敵營依山而陳我兵進擊敗之追至山巔還詰旦復率兵進朝鮮兵已拔營夜遁收其馬千餘二月朝鮮降乃班師三年二月從上征喀爾喀多鐸率本旗護軍兵及土默特兵從寧逺錦州間進發大兵從義州一路進發多鐸將入邉俘斬哨卒十餘攻克桑阿爾齋舊居之大興堡斬守備一及壯丁二百俘其戶口道擒大夀所遣二諜以歸九月上至演武場送睿親王征明王以目疾甫愈不至詔俟睿親王班師議罪旋命率所部兵往中後所助鄭親王濟爾哈朗十一月將過中後所大夀以兵來襲傷我兵九人掠馬三十王且戰且退殺敵三十人夜達鄭親王營翼日合兵至中後所上統兵至敵不敢出四年五月議前不送出師及中後所失士馬罪降多羅貝勒八月命掌兵部事十月同肅親王豪格征明錦州寧逺敗敵於城北山岡斬總兵金國鳳及其二子五年三月奉命與鄭親王分統左右翼兵往義州葺城屯田逾月畢工墾田東西四十里五月蒙古多羅特部蘇班岱等駐杏山西五里臺密乞內附上命多鐸與鄭親王等率護軍兵千五百往迎之夜過錦州城南至杏山携其資畜以行黎明松山總兵劉周智列兵環松山錦州兵續至與周智合逼我軍多鐸與鄭親王等進擊敗之追𠞰至城下斬副將楊倫周參將李得位等獲旗纛馬匹盔甲還賜多鐸御廏良馬一十一月圍錦州夜伏兵桑阿爾齋保旦敵至敗之追至塔山斬八十餘級獲馬二十六年三月復同鄭親王圍錦州收其守郛蒙古將諾木齊等屢敗明兵松山杏山間事俱詳鄭獻親王傳八月明總督洪承疇會八總兵以兵十三萬援錦州上親統大軍臨之自盛京馳六日環松山而營明兵大驚八總兵等宵遁上命多鐸設伏明總兵吳三桂王朴率兵從杏山奔寧逺我前鋒兵自杏山西追擊至髙橋伏兵起夾攻之斬殺無算三桂朴僅以身免九月上旋蹕命多鐸與諸王更畨圍松山城內兵夜出犯我鑲黃旗營我兵擊敗之斬級千餘獲炮五十七十一月承疇自松山城出兵六千夜犯我正紅正黃二旗營我兵依汛沿濠射郤之殪四百餘人七年二月明松山副將夏承德密約內應以其子夏舒為質夜半梯登南城生擒承疇及巡撫邱民仰總兵王廷臣曹變蛟等七月敘功晉封多羅豫郡王十月以貝勒阿巴泰為奉命大將軍由黃崖口征明薊州命王與郡王阿達禮等屯寧逺邉境牽制明寧逺援兵至則遣人入略俘百餘人敵出戰敗之多獲牲械八年四月因聖躬違和有事祈禱疏言兵者不得已而用今日之勢宜暫息兵至國中興作俟規模既定後舉行但當以農務為急農務克勤則庶民衣食豐足衣食豐足則舉國慶豫舉國慶豫則朝廷膺無疆之福而聖躬永享安和此後舉行未晚也順治元年四月從睿親王多爾衮入山海關破流賊李自成定燕京十月晉封和碩豫親王時明福王朱由嵩自立於江寧設江北四鎮扼淮徐為割據計十一月命多鐸為定國大將軍統師南征值河南奏流賊肆掠詔先𠞰賊河南十二月至孟津遣護軍統領圗賴先渡黃河流賊偽都司黃士欣果毅將軍張有聲潰遁沿河十五寨保望風歸附睢州明總兵許定國玉寨首領李際遇等率衆來降大兵至陜州賊將張有曽屯靈寶城外我軍夜襲敗之師距潼關二十里立營俟紅衣炮至進攻賊將偽汝侯劉宗敏據山為陳我前鋒統領努山鄂碩等趨破之圖賴復率騎掩殺甚多宗敏遁二年正月賊將劉方亮犯我營被我兵擊敗自成親率兵迎戰我軍協力並進殱其步卒賊騎奔復連夜來犯俱敗之既而紅衣炮至進逼潼關賊鑿重壕立堅壁以拒遂發巨炮攻之我師相繼衝入殺賊無算賊又以騎兵三百橫衝我師貝勒尼堪懷順王耿仲明貝子尚善等躍馬夾擊敗之賊又分兵躡我後蒙古都統恩格圖領殿後軍破之諸軍連勝殱賊營精鋭殆盡自成喪魄走西安偽守關吳山伯馬世堯率所部七千餘降獲馬千餘匹輜重兵甲無算師入潼關獲世堯所遣致書自成者三人併世堯斬以徇越二日至西安自成已先五日焚宫室挈子女輜重出藍田竄商州南走湖廣遣護軍統領阿爾津等追之不及而還二月捷聞諭曰聞爾等破流寇于潼關遂得西安不勝嘉悅初曾命爾等取南京今既破流冦大業已成即將陕西事宜交與靖逺大將軍和碩英親王等爾等即遵前命趨南京大丈夫為國建功正在此時汝其勉之三月王率兵抵河南偽平南伯劉忠迎降兵出虎牢關分遣都統拜音圖等出龍門關尚書漢岱副都統伊爾德侍郎尼堪等統外藩蒙古兵出南陽三路同趨歸德州縣望風投順所至撫兵民設官屬疏請速鑄給印信以防詐偽從之諭奬其方收關陜旋定中原𠞰寇安民勳庸茂著賜寶飾刀鋄金鞓帶四月自歸德趨泗州明守將焚橋遁我兵夜渡淮遣漢岱伊爾德阿濟格尼堪杜爾德等先驅趨揚州獲船百餘距揚州城二十里列營復遣署護軍統領固納岱伊爾都齊費揚古烏達禪副都統阿哈尼堪署副都統格霸庫等軍城南護船二百餘翼日薄城下招諭明大學士史可法翰林學士衛允文等降不從遣拜音圖圖賴阿山等攻之七日克其城可法等死焉五月師至揚子江明鎮海伯鄭鴻逵等以水師分守瓜州儀徵我軍陳北岸列營相持三日會日暮遣拜音圖圖賴阿山等率舟師由運河潛渡其夜五鼓復令副都統李率泰率舟師渡江留左翼兵泊北岸以備夾擊福王聞揚州失守率馬士英及諸太監遁太平大軍至南京明欣城伯趙之龍魏國公徐州爵保國公朱國弼隆平侯張拱日臨淮侯李祖述懷寧侯孫維城靈璧侯湯國祚安逺侯栁祚昌永康侯徐宏爵定遠侯鄧文囿項城伯常應俊大興伯鄒順益寧晉伯劉允基南和伯方一元東寧伯焦夢熊安城伯張國才洛中伯黃周鼎成安伯柯祚永駙馬齊贊元大學士王鐸翰林程正揆張居禮部尚書錢謙益兵部侍郎朱之臣梁雲構李綽給事中林有本陸朗王之晉徐方來莊則敬及都督十六員巡捕提督一員副將五十五員迎降其沿途來歸者興平伯髙傑子髙元照庸昌伯劉良佐提督李本深總兵胡茂正張士元郭護楊承祖李中星何應昌翟鳴鳳王之剛李遇春張天祿張天福李成棟李棲鳳等二十三人監軍道張健柯起鳳副將四十七人參將遊擊共八十六人馬步兵二十三萬八千三百捷聞諭曰皇天眷佑宗廟式靈王公將士分猷宣力方平河朔旋定江南覽王奏報朕深嘉悅王躬履戎行指授方略克奏膚功特遣侍臣前赴軍中慰勞一應有功將帥官兵作速察敘以憑封賞時王入駐城中安撫居民令投誠軍士歸伍遣貝勒尼堪貝子屯齊等追福王于太平福王復走蕪湖登舟欲渡江圖賴等邀之江口明靖國公黃得功迎戰敗之敵兵皆墮水盡奪其舟得功中流矢死總兵田雄馬得功縛福王及其妃歸我軍初福王走太平其大學士馬士英挾福王母走杭州議奉潞王朱常淓拒守六月貝勒博洛等趨杭州士英迎戰大敗夜渡錢塘江逃潞王率衆降浙東西皆歸順明淮王朱常清亦自紹興來降王承制改南京為江南省疏授江寧安慶巡撫以下官三百七十三人復遣人至湖州移周王眷屬于杭州安置收總兵王之仁屬下兵將二萬五千人有偽稱杜楊王煽亂廬州和州間者遣總兵吳勝兆等𠞰平之七月詔多羅貝勒勒克德渾為平南大將軍至江寧命王等俘福王還京十月凱旋上行郊勞禮于南苑晉封和碩德豫親王賜黑狐帽紫貂朝服黃金五千白金五萬馬十玲瓏鞍二三年五月以蘇尼特部騰機思騰機特等叛奔喀爾喀詔集外藩諸蒙古兵於克嚕倫河以多鐸為揚威大將軍同承澤郡王碩塞等統師追𠞰七月師至盈阿爾察克山聞騰機思在衮噶嚕台星夜前進三日及之敗賊于諤特克山斬台吉茂海渡圖拉河追至布爾哈圖山斬騰機特子二人孫三人及喀爾喀台吉十三人盡獲其家口輜重師次扎濟布喇克喀爾喀土謝圖汗兩子以兵二萬碩雷汗子以兵三萬兩路迎戰我師奮擊大捷追奔三十餘里先後斬級數千俘千餘人獲駝千九百馬二萬一千一百牛萬六千九百羊十三萬五千三百有竒十月凱旋上出安定門迎勞錫宴所獲牲畜詔頒賚將士加賜王鞍馬一四年七月晉封輔政叔德豫親王賜黃金千兩白金萬兩鞍馬二册文稱其定鼎中原以來所建功勳卓越等倫云六年三月薨年三十六以其子多尼襲七年三月立碑紀功九年鄭親王濟爾哈朗等會議豫王係多爾衮母弟應盡削王爵上念其功止追降為郡王康熙十年五月追諡曰通乾隆四十三年正月上諭廷臣曰豫親王多鐸從睿親王入關肅清京輦即率師西平流寇南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勳績超邁等倫自應世胙原封以彰殊眷豈可以風影微眚輒加貶易命追封親王復其封號並配享太廟八月入祀盛京賢王祠多羅信郡王多尼子鄂扎多尼弟洞鄂多尼豫通親王多鐸次子崇德七年七月封多羅郡王順治六年十月襲父和碩親王爵七年五月預議政八年二月加封號曰信九年三月追降多鐸為郡王多尼亦降多羅信郡王罷議政十月復議政十五年正月上命多尼為安逺靖冦大將軍偕平郡王羅科鐸貝勒尚善杜蘭等征明桂王朱由榔與征西大將軍平西王吳三桂征南將軍都統卓布泰會於平越府之楊老堡定議分兵進取王自貴陽入吳三桂自遵義入卓布泰自都勻入約以十二月會雲南省城十一月王由貴陽趨安莊衛由榔將晉王李定國焚磨盤江鐵索橋遁十二月我兵以浮橋濟遂自交水至松嶺衛鞏昌王白文選率兵二萬拒我軍擊走之十六年正月薄雲南省城時吳三桂卓布泰亦至定國文選挾由榔奔永昌王入城駐守遣貝勒尚善等由鎮南州克永昌府及騰越州六月上以王跋涉險阻經厯寒暑傳諭慰勞賜御用衣一蟒袍一及鞍馬弓矢等物十七年五月凱旋遣內大臣迎勞十八年正月薨年二十六諡曰宣和六月以其子鄂扎襲封多羅信郡王康熙十四年三月察哈爾布爾尼叛上命鄂扎為撫逺大將軍往討以大學士都統圖海副之護軍統領哈克山副都統吳丹洪世祿為參贊瀕行諭之曰大兵出山海關當宣布纍朝待布爾尼厚恩及朕不忍加誅之意彼若悔罪來歸則已否則以敕書付縱還蒙古持往諭之即布爾尼等臨陳來降亦當保全恩養今值蒙古馬瘦爾等速往毋違四月師次岐爾哈台偵賊屯達祿王留輜重以輕騎進布爾尼設伏山谷間列陳而待王與圖海等分布滿洲蒙古兵進擊厯山澗賊伏發撓我土默特兵我軍擊破之布爾尼領大隊列火器以拒我兵奮擊賊大敗復收潰卒戰我軍乘勝連敗之布爾尼偕其弟羅卜藏以三十騎遁至扎嚕特境貴勒蘇台為科爾沁赴調之部長沙津射殪察哈爾平王招撫餘黨編為一千三百餘户閏五月師還上迎勞于南苑諭嘉其逺行征討建立大功賜黃金百兩白金千兩二十四年掌宗人府事二十九年噶爾丹深入烏珠穆沁上命恭親王常寧為安北大將軍鄂扎副之三十五年二月上親征噶爾丹以王統領正白旗營三十八年以惰解宗人府任四十一年十月薨以其叔洞鄂襲多羅信郡王洞鄂豫郡王多鐸第七子順治十八年正月封多羅貝勒康熙十二年冬逆藩吳三桂反于雲南四川文武官叛應之十三年六月洞鄂奉命為定西大將軍同貝子溫齊輔國公綽克托率貝子凖達所領驍騎之半由陜西進討將抵略陽陜西提督王輔臣叛于寧羌州洞鄂以道阻退次漢中留將軍錫卜臣等駐守自引兵出棧道由鳯縣至鳯翔復留副都統赫業等駐守自率餘兵回西安十四年正月上諭廷臣曰蘭州近邊要地應速遣兵駐守今保寧大兵已回西安達禮善巴圖魯兵亦將至西安其餘西安現在兵每佐領下四五名赴蘭州𠞰禦逸賊洞鄂疏言蘭州固宜遣防但保寧還卒鎧甲未備達禮善巴圖魯兵兼程來恐難驟遣若以西安兵往恐輔臣由陳倉諸路斷我棧道自秦州平涼來逼深為可虞又疏言興安兵變殺總兵王懷忠臣等出示安撫仍止前往興安之副都統穆舒渾兵上敕撫慰興安又諭洞鄂曰陜西重地棧道關係尤急沔州秦州乃通漢中要路其若何據守保固與總督等會議務期萬全時鳯縣賊毁偏橋守隘阻運輔臣所部王好文等復斷棧道二月諭責洞鄂等退縮遲延致狡寇阻截仍嚴飭往定平涼秦州諸路于是將軍阿密達署副都統鄂克濟哈等率所調興京兵西安兵往平涼洞鄂與溫齊綽克托等率回自保寧及達禮善巴圖魯兵往秦州是月賊陷蘭州敕兩路兵速進洞鄂至隴州經仙逸關偽總兵髙鼎等聚衆四千據關山河岸立營拒守洞鄂與署前鋒統領穆占西安將軍佛尼勒副都統達禮善巴圖魯分布八旗官兵令驍騎兵俱步行為前隊前鋒及護軍兵為後隊又預撥都統赫業為竒兵就近應援比接戰自己至午賊力拒赫業已援兵合力衝擊賊敗遁斬殺甚多因乘勝追擊復關山關三月大軍次渭河奪其橋圍秦州四月王輔臣遣賊兵萬餘自平涼來援屯南山城內賊兵八千餘突出我兵分擊大敗之克東西兩關屢敗賊陳斬偽總兵何隆李國棟招撫偽文武官二百二十餘兵八千四百餘安輯民人九萬有竒遂復秦州又遣振武將軍佛尼勒內大臣坤巴圖魯總兵官孫思克追𠞰至閻關賊迎戰破之復禮縣追賊至西和殺千餘人陳斬偽官三十清水伏羌俱平捷聞得旨嘉奬又遣西安將軍穆占率兵援鞏昌復郡城七月上諭洞鄂曰國家仰荷天眷秦州鞏昌蘭州等處漸次恢復朕甚嘉悅此係保寧還斾之兵間關跋涉努力效命所致須不時存念恤其勞苦非緊要必節其勞無大過則寬其罰爾等將兵在外事情經練頗多必能同寅協恭折衷而行但相隔遼逺意慮所及不得不為告誡秦地實為形勝要區今將軍總督總兵及投誠兵衆雲屯一處將軍張勇勞績甚多恐貝勒等藐忽視之生彼憤悶時厪朕懷貝勒等既效勤勞底定秦省務期克奏全功以慰朕望八月偽總兵趙士升以蘭州降歸川十二保及偽參將普國祥兵千餘人皆就撫遂與平逆將軍畢力克圖揚威將軍阿密達會于平涼賊出城迎戰我軍合擊屢敗之斬偽總兵郝天祥餘擒斬無算九月遣副都統鄂泰阿爾琥敗賊于寶雞縣羊添池山焚其營十二月疏言大兵攻平涼克取第一關廂距城三里許對南山屯營欲進薄城因溝深地險難下壘故未能即下諭宜斷餉道以困之十五年二月諭兵部曰大將軍貝勒洞鄂等屯兵平涼日久賊冦尚未剿滅城池尚未恢復夫秦省不能即定川賊尚在窺伺者皆由王輔臣未剿滅平涼未克取故也其以都統大學士圖海為撫逺大將軍率每佐領護軍二名亟赴陜西總轄全省滿漢大兵斷賊餉道剿滅逆孽速靖地方大將軍抵平涼時盡收各將軍敕印遇有分遣酌量給付其貝勒洞鄂以下悉聽大將軍節制是月疏言聞逆賊將斷關山擬遣兵往守現在兵少難分至鞏昌雖有副都統翁愛率兵前赴而賊逼可虞命將軍錫卜臣等調兵守關山張勇等堵剿出犯秦鞏之賊十六年二月部議陜西軍前功罪以洞鄂在軍前無功革貝勒爵三十一年九月任正藍旗滿洲都統四十二年三月兄子信郡王鄂扎薨以洞鄂襲多羅信郡王爵四十五年六月薨王薨後禮部請恤上諭廷臣曰洞鄂補授都統襲王爵以來並無戴恩效力之處且係軍政問罪之人不準賜恤其王爵亦當論嫡長所生以信郡王鄂扎之子德昭襲德昭既襲封多羅信郡王雍正二年十一月授宗人府左宗正四年八月管正白旗事務五年十一月轉左宗正乾隆二十七年二月薨年六十有三諡曰慤以豫通親王多鐸六世孫如松襲初多鐸第三子多爾博出為睿親王後睿親王被罪未及襲還本宗封多羅貝勒多爾博生蘇爾發襲固山貝子生塞勒塞勒生功宜布皆襲輔國公如松功宜布第三子也乾隆十一年六月襲父爵輔國公十七年七月任乾清門散秩大臣二十一年四月管健鋭營事六月署鑲黃旗滿洲副都統二十二年正月署領侍衛內大臣尋授宗人府右宗人二月授兵部侍郎四月授鑲紅旗滿洲副都統二十三年二月調正黃旗滿洲副都統九月遷正黃旗漢軍都統二十四年六月轉左宗人九月署兵部尚書十二月授領侍衛內大臣二十五年十月授綏逺城將軍二十六年十一月調西安將軍二十七年閏五月命襲封多羅信郡王八月授正藍旗蒙古都統九月署領侍衛內大臣二十八年七月授右宗正十月管理宗人府銀庫事三十年十一月以縱輿夫開博場應革爵得旨寬免在間散王上行走如松請嵗繳王俸五千兩贖罪宗人府議不足蔽辜應革爵命照如松請仍免革爵三十五年十一月薨年三十有四諡曰恪三十六年以慤郡王德昭第十五子修齡襲修齡初于乾隆二十七年六月襲如松所遺之輔國公三十年十二月授散秩大臣三十四年十月授宗人府右宗人十二月任正白旗滿洲副都統三十五年正月調鑲紅旗滿洲副都統五月轉左宗人閏五月調正紅旗漢軍副都統三十六年四月命襲封多羅信郡王旋授左宗正三十七年三月總理鑲白旗覺羅學四十三年正月特命復豫通親王始封爵號晉襲和碩豫親王四月任正白旗蒙古都統四十八年十月授盟長十一月掌宗人府事四十九年閏三月調鑲藍旗滿洲都統五十一年三月薨年三十有八諡曰良十月以其長子豫豐襲封和碩豫親王原封多羅貝勒察尼察尼豫通親王多鐸第四子順治十三年正月封多羅貝勒康熙七年正月授宗人府左宗正七月預議政九年三月充玊牒館副總裁十二年十二月逆藩吳三桂反命寧南靖寇大將軍順承郡王勒爾錦由湖廣進勦以察尼恭贊軍務十三年三月至荆州時賊已陷嶽州七月察尼與鎮南將軍尼雅翰水陸齊進偽將軍吳應麒以賊七萬餘由陸路來拒察尼等督兵奮擊大敗之斬首萬級舟師抵七里山以炮攻沉賊船十餘六月命貝勒尚善為安逺靖寇大將軍赴嶽州察尼回荆州駐守十四年五月賊陷榖城察尼佩靖寇將軍印往援都統伊里布等先至賊棄城遁時賊陷南漳興山又增兵犯彞陵據城外鎮荆山掘壕結寨八月察尼至彛陵以賊寨難進攻其糧由江運議增舟師斷賊運道困之十月遣兵敗賊牛皮了口進攻黃連坪焚其積聚興山賊遁十五年二月吳逆移南漳彞陵賊兵向長沙順承郡王令察尼回荆州渡江剿賊同都統伊里布等趨石首賊據虎渡口迎戰敗之追至太平街斬級三百餘泊江南岸翼日再登岸擊賊過太平街遇賊伏失利退荆州詔責勒爾錦老師糜餉察尼恭贊無能令立功贖罪十七年八月貝勒尚善薨於嶽州軍中上命察尼代為安逺靖寇大將軍規復嶽州九月疏言舟師入湖已久雖未大挫賊鋒賊亦不能出戰近聞賊餉將絶將軍林興珠獻䇿謂宜于湖水涸後圍以木筏立木樁列火炮俾小船巡警以困之然湖水之涸為期尚遲兩三月間賊中安知無變今乘水勢未退立一營于南津港俟水涸酌撥舟師營於君山髙家廟絶其糧道賊勢窮蹙不難撲滅上善其言令副都統關保率兵赴嶽州軍聽調遣是月遣提督桑額攝撫逺將軍彰泰率師至南津港大敗賊衆十一月偽將軍杜輝巴養元薑義等賊舟犯陸石口將軍鄂納敗之斬千餘級遣署副都統葉儲赫進攻嶽州破賊萬餘時賊糧已匱屢乘舟出意在疏通餉道每出鏖戰移時偽帥率衆五千自髙家廟渡江來犯我營察尼遣署前鋒統領杭竒助禦却之先是察尼以舟師屢出戰疏請發江南子母等炮一千又請調荆州水師總兵張忠并標兵營君山髙家廟上皆允之至是又疏言湖水漸涸陸地漸出我兵營伍隔絶恐賊潛通糧饋請增發滿漢兵議政王大臣議不允上以圍取嶽州關係緊要賊糧將絶宜益兵遂命安親王嶽樂量調長沙間駐兵赴嶽州十八年正月疏請調兵六千圍嶽州城並請設隨征左右前後四營總兵官分轄詔如所請是月偽總兵王度沖偽將軍陳珀等各以其舟師降吳應麒等棄城遁復嶽州計招撫偽官六百餘兵五千餘獲船六十五炮六百四十餘二月安親王自長沙進取衡州察尼發緑旗兵沙船助其軍尋遣都統珠滿追擊賊于湘隂斬獲無算復其城提督桑額克安鄉降偽官三員四月命察尼由常德進征辰龍關軍務在澧州以南者聽調度十九年三月同都統鄂訥等攻克辰龍關抵辰州賊潰遁偽知府傳祖祿以成降並招撫偽將軍楊有祿周楨楊寶蔭祖述舜等五月疏言自常德進辰沅沿途雨濘馬乏詔暫屯沅州酌量進發六月疏言在軍前鋒四百有竒護軍驍騎每佐領二十餘人應簡前鋒三百每佐領護軍六驍騎九進取雲貴上命彰泰統師進征察尼領久征勞苦之滿洲兵還京十一月議察尼出師湖廣不速扼要害退縮不前老師糜餉坐失事機幾至悮國應削貝勒及議政宗人府職籍家屬財産仍拘禁得旨察尼應如議處分但既克嶽州且從前有效力之請著從寬免其羈禁籍沒僅削爵為間散宗室二十四年十二月特授奉天將軍二十七年九月卒年四十有八喪還遣領侍衛內大臣公費揚古往奠賜祭葬如輔國公例諡曰恪僖爵除欽定八旗通志卷一百二十六
