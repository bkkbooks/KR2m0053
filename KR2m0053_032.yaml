body:
  text: 旗分志十八八旗佐領十八蒙古佐領緣起古鑲黃旗蒙古佐領正黃旗蒙佐領蒙古佐領緣起天聰八年六月以和碩貝勒德格類公吳訥格所獲察哈爾國千餘户分給八旗九年正月以察哈爾國來歸各官並壯丁三千二百十有一人均𨽻各旗是年二月編審喀喇沁蒙古壯丁令舊蒙古固山兼轄正黃旗津扎多爾濟布顔阿玉石拜都塔拜巴布泰渾齊吳巴什等之壯丁及在內舊喀喇沁之壯丁共一千二百五十六名合舊蒙古為一固山以阿代為固山額真其下設梅勒章京甲喇章京各二員鑲黃旗吳思庫拜渾岱等之壯丁及在內舊喀喇沁壯丁共一千四十五名合舊蒙古為一固山以達賴為固山額真其下設梅勒章京甲喇章京各二員正紅旗昻阿甘濟泰喇嘛斯希庫魯格巴特瑪海塞蘇班達禮卜達禮等之壯丁及在內舊喀喇沁壯丁共八百七十名合舊蒙古為一固山以恩格圖為固山額真其下設梅勒章京甲喇章京各二員鑲紅旗蘇木爾賴瑚爾噶爾圗綽思熙等之壯丁及在內舊喀喇沁壯丁共一千十六名合舊蒙古為一固山以額駙布顔代為固山額真其下設梅勒章京甲喇章京各二員正白旗布爾哈圖阿玉石蘇班齊古喇海莾古爾代塞內克什魯克等之壯丁及在內舊喀喇沁壯丁共八百九十名合舊蒙古為一固山以伊拜為固山額真其下設梅勒章京甲喇章京各二員鑲白旗喇木布里諾雲達喇阿蘭圖什里得克桑噶爾寨等之壯丁及在內舊喀喇沁壯丁共九百八十名合舊蒙古為一固山以額駙蘇納為固山額真其下設梅勒章京甲喇章京各二員正藍旗什喇祁他特喀喇祁他特靠祁他特等之壯丁及在內舊喀喇沁壯丁共八百六十名合舊蒙古為一固山以吳賴為固山額真其下設梅勒章京甲喇章京各二員鑲藍旗納木齊石喇圖納勒圗桑奈張素綽克圗諾密弩木賽阿衮等之壯丁及在內舊喀喇沁壯丁共九百十三名合舊蒙古為一固山以扈什布為固山額真其下設梅勒章京甲喇章京各二員是年九月以鄂爾多斯濟農處所得察哈爾壯丁八百名補各旗之缺少者崇德六年三月以錦州來降諾木齊塔布囊吳巴什台吉擕來蒙古男子一千五百七十三名漢人一百三十九名婦女幼稚二千六百五十五口編為九牛録每三丁一人披甲諾木齊及部下蒙古二百四人分入正黃旗吳巴什及部下蒙古七百二人分入鑲藍旗阿邦伊木圗文都爾户滿桃及其部下蒙古五百五十三人分補各旗之缺額者八年六月諭户兵二部曰各固山下所有伊蘇忒喀喇車里克部落之間散蒙古無得令其隱漏户部宜清察人丁編入牛録兵部再加察核俱令披甲其現在滿洲固山下察哈爾喀爾喀等部落蒙古亦當察其壯丁增減勿令隱匿至於諸王貝勒貝子公等家下間散蒙古亦編為小旗設壯大漢文稱護軍校管轄之順治二年十一月平西王吳三桂奏進所屬蒙古壯丁男婦共二千五百八名口康熙五十四年九月議政大臣等覆準西安將軍席柱吏部尚書富寧安疏報䇿妄阿喇布坦屬下特木爾白克木忒等首先投誠應賞賚袍帽等物歸併入八旗蒙古佐領下為兵給與糧餉産業妻室乾隆四十年正月奉諭旨據阿桂等奏此次攻取康薩爾山梁賊人碉卡之額魯特家奴賽音察克巴圖俱奮勉殺賊可否編入京城旗分佐領內令其披甲等語著照所請賽音察克巴圖俱編入京城旗分佐領內令其披甲以上蒙古佐領緣起鑲黃旗蒙古佐領鑲黃旗蒙古都統所屬左右參領各一右參領下佐領十四左參領下佐領十四右參領第一佐領原係國初編立初令松愛管理松愛故以其子阿南達管理阿南達故以其子七十八管理七十八故以其子佛保管理佛保因病革退以其弟勒圖管理勒圖升任山東濟寧州副將以伊常阿管理伊常阿故仍以勒圗管理勒圗告病以定德管理右參領第二佐領原係第一佐領內丁壯康熙九年阿南達管佐領時人丁滋盛分編一佐領以散秩大臣夀實德管理夀實德因病辭退以阿南達之子護軍伊賴管理伊賴因病革退以其子四格管理四格故以其弟富德管理富德升任城守尉以那爾善管理那爾善故以德存管理右𠫭領第三佐領原係古北口外蒙古於順治三年經理藩院奏請編立佐領初以古祿管理古祿故以其子柯勒德管理柯勒德故以柯勒德之弟色楞管理色楞故以色楞兄之子碧禮格圖管理碧禮格圖緣事革退以色楞弟之子單達利管理單達利故以單達利之弟渣穆素管理渣穆素緣事革退以碧禮格圗之子黑雅圗管理黑雅圗升任山海關協領以端住管理端住故以瑚圗理管理右參領第四佐領原係喀喇沁地方蒙古於天聰六年編為半箇牛録漢文稱佐領初令衮楚斯管理衮楚斯故以其子塞默管理塞默故以其子希拉管理康熙二年人丁滿額遂編為整佐領希拉故以其弟大青管理大青故以其子敦柱克管理敦柱克因病告退以其伯父希拉之曾孫納藍圗管理納藍圗升授察哈爾遊牧總管以那彥管理那彥故以那亮管理那亮故以鳳太管理右參領第五佐領原係天聰六年編立之牛録初令多多扈管理多多扈故以其兄昻古奈之子八十管理八十故以其叔父之子吳達管理吳達故仍以多多扈之孫薦良管理薦良故以其子常祿管理常祿陳亡以其弟郎中七十管理七十告休以永敏管理永敏革退以明福管理右𠫭領第六佐領原係第五佐領內丁壯康熙十一年於八十管佐領時因人丁滋盛又分編一佐領給散秩大臣篤爾瑪管理篤爾瑪故以頭等侍衛噶布喇管理續以頭等侍衛巴什管理續以護軍𠫭領布搭管理續以郎中桑格管理桑格升歸化城副都統以三等阿思哈尼哈番漢文稱男西喇爾代管理續以護軍參領黑達色管理黑達色故以𠫭領莫岱管理莫岱故以巴祿管理巴祿升任涼州將軍