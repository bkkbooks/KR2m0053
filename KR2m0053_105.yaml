body:
  text: 欽定四庫全書欽定八旗通志卷九十一典禮志十四滿洲祭神祭天典禮三四季獻神儀注儀四季獻神祝辭浴佛注浴佛祝辭祭堂子立杆大祭儀注祭坤寧宫大祭祝辭大翌日祭天儀注大翌日祭天贊辭每嵗春夏秋冬四季獻神儀注每嵗四季獻神是日先照常祭儀懸挂朝祭夕祭神幔朝祭夕祭神位俱照常安奉朝祭夕祭香碟內點香上駟院以白馬二侍衛牽之慶豐司以牛二廄長牽之金二錠銀二錠廣儲司銀庫官員舉之蟒縀龍縀片金倭縀閃縀以及各色縀十毛青三梭布四十置於紅漆低桌上縀匹庫庫使舁之掌儀司官員司爼官前引內務府總管暨上駟院大臣帶領乾清右門入自乾清宫西楹經交泰殿至坤寧宫門外陳馬於西陳牛於東首俱向上司爼太監等恭捧金錠銀錠並舁縀布桌入坤寧宫司香接受於朝祭神位前就地安設縀布之桌置金銀其上鋪黃花紅氊司祝進跪祝叩頭畢司香等舁桌於夕祭神位前就地安設移鋪紅氊司祝進跪祝叩頭畢將所供之金銀縀布收貯於供朝祭神位之繪花紅漆抽屜桌內其大臣侍衛官員以牛馬出越三日後總管太監以金銀縀布出留銀之外金縀布馬牛俱交會計司除不售於同姓滿洲外估價以售所得價銀購豬以祭皇帝親詣行禮如常祭儀或適遇祭神之日俟食肉畢皮骨撤出恭請佛菩薩安奉後始行祭獻每嵗春夏秋冬四季獻神朝祭神前祝辭上天之子佛及菩薩大君先師三軍之帥關聖帝君某年生小子某年生小子為某人祭則呼某人本生年今敬祝者謹以黃金白銀蟒縀龍縀片金倭縀閃縀各色縀布良馬健牛獻於神靈豐於首而仔於肩衛於後而護於前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮夕祭神前祝辭上天之子年錫之神安春阿雅喇穆哩穆哩哈納丹岱琿納爾琿軒初恩都哩僧固拜滿章京納丹威瑚哩恩都蒙鄂樂喀屯諾延某年生小子某年生小子為某人祭則呼某人本生年今敬祝者謹以黃白金銀蟒縀龍縀片金倭縀閃縀各色縀布良馬健牛獻於神靈豐於首而仔於肩衛於後而護於前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮浴佛儀注四月初八日佛誕祭祀是日先於堂子內饗殿中間懸挂神幔屆時衣金黃縀衣內監八人舁黃縀神輿進內左門近光左門景和門預備於坤寧宫門外衣黃縀衣司爼滿洲二人恭請佛亭並貯菩薩像木筒貯關帝神像木筒安奉輿內衣金黃縀衣內監八人舁行由宫殿正門出前引仗二對羊角燈二對亦用衣金黃縀衣內監執之司爼官二員司爼二人司爼滿洲二人由宫內前引至乾清門外侍衛十員前導掌儀司官一員司爼首領太監一員內監八人扈行應供之椵葉餑餑醴酒樽紅蜜棉花俱置於架上及食盒之內領催蘇拉隨後舁送至堂子時衣黃縀衣司爼滿洲等恭請神位供佛亭於西首之座次於神幔上懸菩薩像又次懸關帝神像供奉畢收諸王呈送所供之餑餑酒蜜棉花謹將大內備去之紅蜜及諸王呈送之蜜各取少許貯於黃磁浴池內以淨水攪勻司香啓亭門司祝請佛於黃磁浴池內浴畢復以新棉墊座仍安奉原位又將諸王呈送之椵葉餑餑俱供於二大黃漆低桌之上大內之九盤餑餑供於上面醴酒三盞香碟三仍供原處司香點香炕沿下小桌上設大黃磁碗二盛大內備去之酒及諸王呈送之酒其亭式殿內以椵木葉餑餑及諸王呈送之餑餑貯於銀盤供之呈送之酒貯於低桌上所設二大藍花磁碗內供之仍先於髙案下所立杉木柱上挂紙錢二十七張諸王遣來之人俱挂紙錢大內之奏三絃琵琶太監二人在饗殿外丹陛之西首諸王之護衛官員在丹陛兩旁對坐鳴拍板拊掌衣朝服之二司祝進跪司香二人舉臺盞二分授於二司祝二司祝接受臺盞同獻酒九次司爼官一員於饗殿階下東首立贊鳴拍板即奏三絃琵琶鳴拍板拊掌二司祝每一獻將所獻之酒注於兩旁所設紅花磁缸內復自盛醴酒碗內挹新酒各注於二盞中獻之每一獻司爼官贊歌鄂囉羅則歌鄂囉羅九次獻畢二司祝以臺盞授於司香等同叩頭興合掌致敬司爼官贊停拍板其三絃琵琶拍板暫止二司祝進亭式殿內跪司香等舉授臺盞二司祝同獻酒九次奏三絃琵琶鳴拍板拊掌歌鄂囉羅均如饗殿獻酒儀獻畢以臺盞授於司香等一叩頭興合掌致敬一司祝預備於亭式殿內一司祝進饗殿正中立司香舉授神刀司祝接受神刀前進司爼官贊鳴拍板即奏三絃琵琶鳴拍板拊掌司祝一叩頭興司爼官贊歌鄂囉羅即歌鄂囉羅司祝擎神刀禱祝三次誦神歌一次擎神刀禱祝時則歌鄂囉羅如是誦神歌三次禱祝九次畢仍奏三絃琵琶鳴拍板拊掌司祝進亭式殿內一叩頭興誦神歌擎神刀禱祝以及歌鄂囉羅俱如祭饗殿儀禱祝畢復進饗殿內一叩頭興又禱祝三次司祝官贊歌鄂囉羅則歌鄂囉羅一次禱祝畢授神刀於司香司爼官贊停拍板其三絃琵琶拍板皆止興退司爼復跪祝叩頭興合掌致敬退其亭式殿內預備之司祝亦跪祝叩頭興合掌致敬退司香閣佛亭門撤菩薩像關帝神像恭貯於木筒內仍用衣黃縀衣司爼滿洲等恭請安奉輿內鐙仗排列前導恭請入宫所供酒與餑餑分給隨去之侍衛官員司爼等四月初八日浴佛於堂子饗殿內祝辭上天之子佛及菩薩大君先師三軍之帥關聖帝君某年生小子等為某人祭則呼某人本生年今敬祝者遇佛誕辰偕我諸王敬獻於神祈鑒敬獻之心俾我小子豐於首而仔於肩衛於後而護於前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮堂子亭式殿內祝辭上天之子紐歡台吉武篤本貝子某年生小子等為某人祭則呼某人本生年今敬祝者遇佛誕辰偕我諸王敬獻於神祈鑒敬獻之心俾我小子豐於首而仔於肩衛於後而護於前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮坤謹案報祭儀注與常祭同祝辭亦同惟今敬祝者寧宫句下豐於首而仔於肩句上添貫九以盈具八以呈前期一二日虔備粢盛以祭於神靈五句堂子立杆大祭儀注每嵗春秋二季堂子立杆大祭所用之松木神杆前期一月派副管領一員帶領領催三人披甲二十人前往直𨽻延慶州會同地方官於潔淨山內砍取松樹一株長二丈圍徑五寸樹梢留枝葉九節餘盡削去製為神杆用黃布袱包褁賫至堂子內暫於近南墻所設之紅漆木架中間斜倚安置立杆大祭前期一日立杆於亭式殿前中間石上祭期預於饗殿中間將鑲紅片金黃縀神幔用黃棉線繩穿繫其上懸挂東西山牆所釘之鐡環北炕中間西首設供佛亭之座炕上設黃漆大低桌二桌上供香碟三炕沿下設楠木低桌桌上列藍花大磁碗二桌之西旁地上設紅花小磁缸二桌前鋪黃花紅氊一方亭式殿內楠木髙桌上供銅香爐髙桌前楠木低桌上列藍花大磁碗二桌之兩旁地上設暗龍碧磁小缸二饗殿內設黃紗矗鐙二對亭式殿內設黃紗矗鐙二對中道甬路皆設涼席並設紅紙矗鐙三十有二屇時衣金黃縀衣內監八人舁黃縀神輿進內左門近光左門景和門預備於坤寧宫門外衣黃縀衣司爼滿洲二人恭請佛亭並貯菩薩像黃漆木筒貯關帝神像紅漆木筒安奉輿內衣金黃縀衣內監八人舁行由宫殿正門出前引仗二對羊角鐙二對亦用衣金黃縀衣內監執之司爼官二員司爼二人司爼滿洲二人由宫內前引至乾清門外侍衛十員前導掌儀司官一員司俎首領太監一員內監八人扈行祭祀所用之清酒樽打糕索繩淨紙神杆頂俱置於架上及盛於食盒之內領催蘇拉舁之隨後而行至堂子時衣黃縀衣司爼滿洲等恭請神位供佛亭於西首之座次於神幔上懸菩薩像又次懸關帝神像後前索繩三條一端合而為一繫於北山牆中間所釘環上一端由饗殿隔扇頂橫忩中孔內穿出牽至甬路所立繫索繩紅漆二木架中間分穿於神杆頂之三孔內將黃緑白三色髙麗紙所鏤錢二十七張合為九張挂於神杆頂三孔所繫三條索繩之上又合而為一由亭式殿之南北隔扇頂之橫忩孔中穿出繫於神杆將黃髙麗布神幡懸於神杆之上其亭式殿內髙案下所立杉木柱上挂黃緑白三色髙麗紙所鏤錢二十七張饗殿內供打糕搓條餑餑九盤清酒三盞於炕沿上所設二大低桌上司香啓亭門點香注清酒於炕沿下所設低桌上二藍花大磁碗中亭式殿內供打糕搓條餑餑三盤清酒一盞於髙桌上其低桌上所設二藍花大磁碗內亦注清酒奏三絃琵琶之太監二人在饗殿外丹陛之西鳴拍板之侍衛二十員在丹陛兩旁對坐鳴拍板拊掌衣朝服之二司祝進跪司香二人舉臺盞二分授於二司祝二司祝接受臺盞同獻酒九次司爼官一員於饗殿階下東首立贊鳴拍板即奏三絃琵琶鳴拍板拊掌二司祝每一獻將所獻之酒注於兩旁所設紅花磁缸內復自盛清酒碗內挹新酒各注於二盞中獻之每一獻司爼官贊歌鄂囉羅侍衛等歌鄂囉羅九次獻畢二司祝以臺盞授於司香等同叩頭興合掌致敬司爼官贊停拍板其三絃琵琶拍板暫止二司祝進亭式殿內跪司香等舉授臺盞二司祝同獻酒九次奏三絃琵琶鳴拍板拊掌歌鄂囉羅均如饗殿獻酒儀獻畢以臺盞授於司香等一叩頭興合掌致敬一司祝預備於亭式殿內一司祝進饗殿正中立司香舉授神刀司祝接受神刀前進司爼官贊鳴拍板即奏三絃琵琶鳴拍板拊掌司祝一叩頭興司爼官贊歌鄂囉羅侍衛等歌鄂囉羅司祝擎神刀禱祝三次誦神歌一次擎神刀禱祝時侍衛等歌鄂囉羅如是誦神歌三次禱祝九次畢仍奏三弦琵琶鳴拍板拊掌司祝進亭式殿內一叩頭興誦神歌擎神刀禱祝以及侍衛等歌鄂囉羅俱如祭饗殿儀禱祝畢復進饗殿內一叩頭興又禱祝三次司爼官贊歌鄂囉羅侍衛等歌鄂囉羅一次禱祝畢授神刀於司香司爼官贊停拍板其三絃琵琶拍板皆止興退司祝復跪祝叩頭興合掌致敬退其亭式殿內預備之司祝亦跪祝叩頭興合掌致敬退司香闔佛亭門撤菩薩像關帝神像恭貯於木筒內仍用衣黃縀衣司爼滿洲等恭請安奉輿內鐙伏排列前導請入宫中如遇皇帝親詣行禮掌儀司官員鋪皇帝拜褥於饗殿及亭式殿內武備院卿先鋪皇帝坐褥於饗殿隔扇外西首皇帝向東坐於饗殿簷下西間所設之褥內務府大臣恭進拍板奏三絃琵琶之司俎太監二人前進在丹陛上西首鳴拍板之司爼官司爼十人在丹陛兩旁次王貝勒在丹陛之上貝子公在丹陛之下按左右翼對坐掌儀司官員以拍板授王貝勒等一司爼官立於饗殿階下東首司祝獻酒擎神刀禱祝贊鳴拍板歌鄂囉羅則奏三絃琵琶鳴拍板拊掌歌鄂囉羅皇帝進饗殿內行禮又進亭式殿內行禮行禮畢武備院卿鋪皇帝坐褥於西間正中皇帝南向坐尚膳正司爼官以小桌列胙糕恭進尚茶正捧獻福酒皇帝受胙畢分賜各王公禮成皇帝還宫所餘糕酒分賜扈從之侍衛官員司爼等每嵗春秋二季堂子立杆大祭饗殿內祝辭上天之子佛及菩薩大君先師三軍之帥關聖帝君某年生小子某年生小子為某人祭則呼某人本生年今敬祝者貫九以盈具八以呈九期屆滿立杆禮行爰繫索繩爰備粢盛以祭於神靈豐於首而仔於肩衛於後而護於前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮堂子亭式殿內祝辭上天之子紐歡台吉武篤本貝子某年生小子某年生小子為某人祭