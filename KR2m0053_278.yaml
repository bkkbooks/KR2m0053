  text: 人物志一百四十四列女傳二十四八旗漢軍列女傳二鑲黃旗漢軍間散張雲祥之妻盧氏鑲黃旗漢軍間散周聨第之妻于氏鑲黃旗漢軍間散趙得福之妻張氏鑲黃旗漢軍間散李芬之妻苑氏鑲黃旗漢軍知府趙光貴之妻羅氏鑲黃旗漢軍副都統穆維雍之妻羅氏鑲黃旗漢軍間散藺佳遇之妻周氏鑲黃旗漢軍馬甲于澤洪之妻佟氏鑲黃旗漢軍馬甲孫加瑞之妻盧氏鑲黃旗漢軍輕車都尉盧承恭之妻紀氏鑲黃旗漢軍間散孫加會之妻武氏鑲黃旗漢軍西安副都統鄧其璋之未婚妻吳氏鑲黃旗漢軍間散王興元之妻李氏正黃旗漢軍間散髙拱極之妻秦氏正黃旗漢軍協領柏成梁之妾程氏正黃旗漢軍領催趙四之妻趙氏正黃旗漢軍馬甲李七鳯之妻于氏正黃旗漢軍間散李天柱之妻萬氏正白旗漢軍間散黃元吉之妻孫氏正白旗漢軍間散受文魁之妻花氏正白旗漢軍間散梁永棋之妻高氏正白旗漢軍壯丁楊汝連之妻董氏正白旗漢軍雲南曲靖府同知石文會之妻赫氏正紅旗漢軍間散馬榮官之妻徐氏正紅旗漢軍馬甲王進孝之妻楊氏正紅旗漢軍監生王鋭之妻李氏正紅旗漢軍筆帖式王勳之妻張氏正紅旗漢軍間散張琳之未婚妻金氏鑲白旗漢軍間散陳廷璯之妻倪氏鑲白旗漢軍鎗手陳廷炎之妻閻氏鑲白旗漢軍鎗手陳廷玿之妻王氏鑲白旗漢軍間散白如珩之妻候氏鑲白旗漢軍間散周望熊之妻藍氏鑲白旗漢軍湖廣鄖縣知縣王養琇之妻周氏鑲紅旗漢軍江西撫州府知府祝鍾哲之妻楊氏鑲紅旗漢軍男孟熊弼之妻閻氏鑲紅旗漢軍同知孟緝祖之妻吳氏鑲紅旗漢軍間散梁世績之妻王氏鑲紅旗漢軍直𨽻安州吏目王國勳之妾孫氏鑲紅旗漢軍福建巡撫張仲舉之妾吕氏鑲紅旗漢軍副都統趙世芳之妾賈氏鑲紅旗漢軍馬甲朱國印之妻恩氏鑲紅旗漢軍廣東肇慶府知府張至隆之妾金氏鑲紅旗漢軍間散李元機之妻梁氏鑲紅旗漢軍佐領金鎮之妻許氏鑲紅旗漢軍福建長樂縣縣丞張星輝之妻陳氏鑲紅旗漢軍監生張璇之妻王氏鑲紅旗漢軍馬甲李如琳之妻鄭氏鑲紅旗漢軍兵部郎中黃執中之妾李氏鑲紅旗漢軍知縣佟寧年之妾田氏鑲紅旗漢軍間散佟銘之妻張氏鑲紅旗漢軍馬甲國朝鳯之妻富氏鑲紅旗漢軍間散李見龍之妻魯氏正藍旗漢軍馬甲風順之妻苗氏正藍旗漢軍佐領李綵之妻于氏正藍旗漢軍監生甘國坊之妻張氏正藍旗漢軍間散張雲成之妻陳氏正藍旗漢軍候選知縣李之琳之妻王氏正藍旗漢軍知縣鍾英之妻張氏正藍旗漢軍間散路子貴之妻李氏正藍旗漢軍間散劉文善之妻齊氏鑲藍旗漢軍間散王國禎之妻朱氏鑲藍旗漢軍廣東督標參將魯邦俊之妾盧氏鑲藍旗漢軍鎗手林宏謨之妻鄭氏鑲藍旗漢軍間散趙士倫之妻周氏鑲藍旗漢軍鎗手范朝卿之妻戴氏鑲藍旗漢軍間散尚崇賢之妻顧氏鑲藍旗漢軍新寧州知州金聰之妻李氏鑲藍旗漢軍間散尚崇圻之妻孟氏以上俱於乾隆元年旌表鑲黃旗漢軍間散王儀鵬之妻張氏鑲黃旗漢軍間散黃廷印之妻陳氏鑲黃旗漢軍間散黃廷輔之妻張氏鑲黃旗漢軍馬甲馬雲之妻王氏鑲黃旗漢軍領催周天正之妻金氏鑲黃旗漢軍領催李宏祚之妻戴氏鑲黃旗漢軍壯丁商繼祥之妻蔡氏鑲黃旗漢軍馬甲曹宏達之妻孫氏鑲黃旗漢軍壯丁黃忠武之妻賈氏鑲黃旗漢軍馬甲范廷蘭之妻舒氏鑲黃旗漢軍馬甲高尚信之妻裴氏鑲黃旗漢軍馬甲錢有仁之妻張氏鑲黃旗漢軍馬甲周芝翰之妻金氏鑲黃旗漢軍壯丁劉國昌之妻尹氏鑲黃旗漢軍壯丁金鳯瑜之妻張氏鑲黃旗漢軍間散王廷瑞之妻齊氏鑲黃旗漢軍間散趙璉之妻盧氏鑲黃旗漢軍間散范宏霖之妻劉氏鑲黃旗漢軍文生員高鈊之妻王氏鑲黃旗漢軍馬甲孫邦彥之妻池氏鑲黃旗漢軍間散楊鳯之妻康氏鑲黃旗漢軍庫使高士傑之妻敖氏鑲黃旗漢軍馬甲馬朝雲之妻佟氏鑲黃旗漢軍間散蘇朝臣之妻潘氏鑲黃旗漢軍間散興邦之妻董氏鑲黃旗漢軍間散范玉之妻顧氏鑲黃旗漢軍間散顧光玉之妻張氏鑲黃旗漢軍間散薛良卿之妻王氏鑲黃旗漢軍間散程起雲之妻閻氏鑲黃旗漢軍間散范彥凌之妻孫氏正黃旗漢軍四川東川府知府王永璽之妾林氏正黃旗漢軍馬甲王明臣之妻牛氏正黃旗漢軍間散何文明之妻楊氏正黃旗漢軍監生房嵩之未婚妻劉氏正黃旗漢軍江南長洲縣知縣李敬修之妾何氏正黃旗漢軍候選知縣劉珏光之妻郭氏正黃旗漢軍間散侯之輔之妻楊氏正黃旗漢軍馬甲王六之妻薑氏正黃旗漢軍監生劉廷智之妻羅氏正黃旗漢軍馬甲白登周之妻王氏正黃旗漢軍間散胡忠順之妻宋氏正黃旗漢軍馬甲李國琳之妻陳氏正黃旗漢軍馬甲徐國弼之妻李氏正黃旗漢軍馬甲秋鳯任之妻王氏正黃旗漢軍間散李登孝之妻蕭氏正黃旗漢軍間散姚進龍之妻吳氏正黃旗漢軍馬甲馬墩之妻田氏正白旗漢軍知府遲淳之妻王氏正白旗漢軍間散鄧有本之妻張氏正白旗漢軍馬甲董其猷之妻林氏正白旗漢軍馬甲張孔容之妻李氏正白旗漢軍馬甲周士進之妻李氏正白旗漢軍壯丁曹孟達之妻劉氏正白旗漢軍壯丁石定勳之妻陳氏正白旗漢軍馬甲應冨榮之妻楊氏正白旗漢軍馬甲王朝選之妻佟氏正白旗漢軍馬甲劉國幹之妻王氏正白旗漢軍壯丁馬開選之妻赫氏正白旗漢軍壯丁韓永言之妻李氏正白旗漢軍間散徐廷聘之妻佟氏正白旗漢軍間散張國英之妻李氏正白旗漢軍同知張良標之妻韓氏正白旗漢軍間散解光先之妻李氏正白旗漢軍馬甲黃文魁之妻郭氏正白旗漢軍間散吳時霑之妻劉氏正白旗漢軍間散王繗之妻曹氏正白旗漢軍間散于正琨之妻吳氏正白旗漢軍生員金景鳯之妻