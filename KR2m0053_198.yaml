body:
  text: 欽定四庫全書欽定八旗通志卷一百八十四人物志六十四大臣傳五十蒙古鑲黃旗爾罕翁愛都爾瑪雅多爾濟達西喇巴爾班第塔巴祿徵蒙古正黃旗上持偉伊勒都齊鄂本岱阿岱竒都爾瑪都爾瑪姓西納明安先世居喀喇沁太祖髙皇帝時來歸𨽻蒙古鑲黃旗太宗文皇帝天聰二年五月隨貝勒嶽託征明錦州有俘獲五年八月大軍圍大凌河城城內敵兵突出都爾瑪隨本旗都統圖爾格奮勇迎擊敗之八年八月隨內大臣額駙多爾濟等征明大同擊敗明總兵曹文詔追至城下俘獲甚衆賜號巴圖魯尋授佐領崇德六年大兵圍錦州明總督洪承疇率衆赴援列營松山我師分左右翼截擊都爾瑪先衆破敵營屢追擊其潰衆於杏山塔山間斬級數十復隨內大臣錫翰設伏髙橋襲擊明總兵吳三桂王朴等斬獲無算遂圍松山城城中兵有突圍出者衝入我營都爾瑪同錫翰於壕邉力戰敗之敘功豫三等輕車都尉世職順治二年二月世祖章皇帝以都爾瑪素荷太宗眷顧晉爵三等男七年九年疊遇恩詔晉爵至二等子尋授內大臣康熙三年三月卒賜祭葬如典禮諡忠直子沙濟仕至內大臣孫齊什襲職多爾濟達爾罕多爾濟達爾罕姓博爾濟錦世居翁牛特為察哈爾部大臣天聰八年太宗文皇帝征明大同凱旋出尚方堡二十里駐營多爾濟達爾罕與察哈爾大臣噶爾瑪濟農多尼庫魯克等遣三十人至奏言林丹汗已死其子及餘衆不能守願率衆六千人歸附上遣使迎之遂各携族屬來歸分𨽻八旗多爾濟達爾罕𨽻蒙古鑲黃旗賜賚優厚崇德元年封一等男任都察院承政三年更定官制裁部院承政各一員多爾濟達爾罕改都察院參政六年上統師征明松山授方略於都統阿賚伊拜等截擊敵兵之奔入杏山者命多爾濟達爾罕同承政阿什達爾罕往度善地以駐軍並察核斬敵多寡還報稱旨尋擢內大臣仍兼任參政七年七月上幸牧馬所命內大臣侍衛與新降之明總兵祖大夀等校射奬賞有差多爾濟達爾罕得賜駝一十月隨饒餘貝勒阿巴泰征明薊州至山東八年六月凱旋奏言自兖州班師之日右翼諸都統不遵貝勒期約離左翼軍先行逮出邉後乃會合幸賴聖主威福敵人驚怖我軍縱橫衝突如入無人之境雖前後不齊皆得全軍以還萬有一失悔之何及請論罰以警違令妄行者疏入詔停右翼軍賞賚世祖章皇帝順治二年以多爾濟逹爾罕素荷太宗眷顧加一雲騎尉四年考滿晉爵三等子復擢都察院承政七年三月解院任仍為內大臣尋列議政大臣三遇恩詔晉一等子兼一雲騎尉九年解議政大臣任十七年四月卒賜祭葬如典禮諡順禧子博第襲爵翁愛翁愛姓卓爾古特世居科爾沁太宗文皇帝時來歸𨽻蒙古鑲黃旗授佐領崇德二年命同佐領喀凱舒書等征瓦爾喀俘獲甚衆四年隨鎮國公扎喀納等率兵駐防藩城屏城間會內大臣多爾濟屬下數人竊馬以逃翁愛追之不及論罪罷佐領任時大軍屯田義州翁愛率所屬耕種穫糧獨多尋復佐領七年隨貝勒阿巴泰征明越燕京至山東先衆攻克莒州城八年凱旋賚白金世祖章皇帝順治元年四月大軍入山海關討流賊李自成翁愛署副都統督後隊兵有功七月追𠞰自成於山西自成遁西安其偽伯陳永福據太原翁愛率兵薄城環度進攻處賊衆突出犯奮擊郤之二年隨英親王阿濟格征陜西敗賊於綏德州自成遁湖廣復躡追之同副都統阿喇善等斬獲賊黨無算三年授禮部理事官兼任前鋒參領隨肅親王豪格征流賊張獻忠過陜西擊敗叛鎮賀珍于雞頭關進征四川三與賊戰皆捷先是敘入關功豫雲騎尉世職考滿晉騎都尉及獻忠滅敘功晉三等輕車都尉七年八年兩遇恩詔晉一等輕車都尉九年擢鑲黃旗蒙古副都統十五年十月卒賜祭葬如例弟特澤襲職西喇巴雅爾西喇巴雅爾蒙古鑲黃旗人姓布庫特世居扎嚕特太宗文皇帝崇德三年西喇巴雅爾任佐領隨貝勒嶽託征明入墻子嶺趨山東明太監馮永盛以兵邀戰西喇巴雅爾與都統烏賚合兵擊敗之明年春出邉遇三屯營步騎三千扼山路拒守我軍與相持七晝夜西喇巴雅爾乘其懈率衆擊之皆潰遁獲軍械巨炮敘功豫騎都尉世職世祖章皇帝順治元年任參領隨睿親王多爾衮入山海關以步戰擊敗流賊李自成加世職雲騎尉二年隨饒餘郡王阿巴泰鎮守山東旋與都統凖塔副都統談布等進征淮安連敗明兵其潰衆竄據海中雲臺山復窺城邑西喇巴雅爾率兵𠞰平之三年隨肅親王豪格征流賊張獻忠至西安聞賊將髙汝礪等嘯聚秦州階州間據山為寨西喇巴雅爾先衆趨擊屢挫賊鋒大軍繼至圍其山寨汝礪降遂進征四川西喇巴雅爾與都統烏賚兩擊敗獻忠拒戰兵五年凱旋擢鑲黃旗蒙古副都統敘功晉三等輕車都尉世職三遇恩詔洊晉三等子九年上以吏部援恩詔加世職過濫命王大臣甄别降西喇巴雅爾一等輕車都尉兼一雲騎尉是年八月以老疾致仕十八年卒孫卓特博襲職班第班第蒙古鑲黃旗人姓博爾濟吉特康熙五十六年由官學生授內閣中書五十七年二月遷欽天監五官正十二月遷理藩院堂主事五十八年遷內閣侍讀六十一年授內閣侍讀學士雍正二年擢內閣學士三年四川打箭爐外裏塘巴塘乍了察木多及雲南之中甸畫歸內地魯隆宗諸部落歸逹賴喇嘛轄詔班第偕副都統宗室鄂齊赴西藏宣諭五年遷理藩院侍郎尋因辦事未協命仍在學士上行走九年五月賜孔雀翎十二月補公中佐領十年充翻譯鄉試正考官十一年軍機處行走十三年九月署工部侍郎時恭纂世宗憲皇帝實録充副總裁乾隆元年十一月署兵部侍郎十二月充經筵講官三年授兵部侍郎四年六月兼理藩院侍郎尋擢湖廣總督十月奏修堤塘補倉貯各事諭曰不必欲速但實心竭力為之十一月奏言臣察閲營伍立賞格勤訓練期兵強餉實又詞訟案嚴禁積蠧把持得旨嘉奬十二月以湖南鎮筸永綏苗人不法偕巡撫馮光裕等籌𠞰閲兩月軍務告竣諭奬其成功速交部議敘五年丁母憂六年正月仍在軍機處行走三月授兵部尚書兼議政大臣八年兼管理藩院事十一年九月署山西巡撫十二月諭曰凖噶爾現遣使進貢班第有應辦事件著來京供職尋兼正藍旗滿洲都統十二年充會典館正總裁十三年正月授內大臣赴金川軍營辦糧餉四月加太子少保班第奏糧運四事一兵役分别支折銀米省運費一內地運夫口糧量加給一口外最險糧站增賞銀一臺員間設丞倅州縣稽察軍機大臣議行六月赴軍前督攻昔嶺一路七月上聞四川巡撫紀山聽州縣派徵纍民命班第回川查察閏七月解紀山任班第署巡撫八月復赴軍前十月諭曰朕命班第前往四川雖為辦理糧運用兵非其専責但伊身為本兵且係軍機大臣於軍中攻𠞰事宜及將辨功罪皆伊職掌所在不得以専辦糧餉遂一切置之膜外乃伊覘軍務未能速竣既不肯身任其事惟請另派大臣經理而於訥親張廣泗之乖張退縮老師糜餉初未據實入告及降旨詢問伊於張廣泗之罪直陳無隱而一字不及訥親為大臣者固宜如是乎在伊自謂辦餉無悮即為克盡己職其他自有任其咎者惟欲脫身事外為自全計而無吉凶同患之心居心若此國事其何賴焉班第不稱兵部尚書之任但辦理糧運尚屬妥協著從寬降為侍郎十四年賞副都統銜由四川赴青海辦事十五年四月調赴西藏辦事未至西藏郡王珠爾默特那木扎勒謀叛駐藏都統傅清左都御史拉布敦設計誅之旋為逆黨羅卜藏扎什所害十二月班第抵藏羅卜藏扎什等伏誅十六年授都統銜諭防凖噶爾窺藏十七年回京仍在軍機處行走補正紅旗漢軍都統兼管理藩院事十八年正月署兩廣總督三月緝獲增城東莞姦民王亮臣等置之法十月奏言廣東庫貯炮械甚多皆前蕩平藩逆及海寇時所繳日就壞可惜請將完好者修整餘悉鎔鐵備用上嘉之十九年閏四月召回京七月授兵部尚書赴北路軍營署定邉左副將軍是時凖噶爾內亂杜爾伯特台吉䇿凌䇿凌烏巴什䇿凌蒙克輝特台吉阿睦爾撒納和碩特台吉班珠爾等相繼降陳凖噶爾台吉達瓦齊昏暴狀詔定於明嵗進勦諭班第籌辦軍務九月奏言軍營所需駝馬牛羊解到時宜妥牧備用扎布堪崆圭等處冬令暖饒水草臣檄喀爾喀親王額琳沁多爾濟等赴彼督牧又言凖噶爾屬之烏梁海居阿爾台以內今春誑言投順同扎哈沁宰桑禡木特掠阿睦爾撒納妻孥阻歸順路應懲創示威臣檄參贊大臣薩喇勒努三等往勦報聞十月奏擒烏梁海宰桑車根赤倫等收户口千餘復遣兵擒禡木特及通禡木特盡收其屬諭曰班第自到軍營以來奮勇果斷調遣合宜深屬可嘉著賞給世襲子爵補授正黃旗領侍衛內大臣仍賞銀一千兩十二月授定北將軍來京陛見奏言臣自烏里雅蘇台軍營啓行至推河見阿睦爾撒納示以軍營應辦事宜並與商明年二月間赴額爾齊斯屯田應遣兵一萬據形勢後隊兵二萬整頓繼進凖噶爾衆心已叛大軍一到易於成功又額爾齊斯為杜爾伯特原屯地臣令䇿凌䇿凌蒙克派員協往督耕又言出征滿洲蒙古及索倫巴爾呼喀爾喀厄魯特各兵應照例均給廪食携炒米麵牛羊乾肉並鹽菜銀初到軍營時亦照例資給又原議進兵口糧給兩月現議二月內哨探兵先進應改帶四月軍機大臣議如所請二十年正月詔定西北兩路軍營大臣名次北路班第為帥定邉左副將軍阿穆爾撒納為副領哨探兵先進額駙色布騰巴勒珠爾郡王品級青滚雜卜內大臣禡木特奉天將軍阿蘭泰為參贊西路定西將軍永常為帥定邉右副將軍薩喇勒為副領哨探兵先進郡王班珠爾貝勒品級扎拉豐阿內大臣鄂容安為參贊兩路軍至博羅塔拉會合時奏事首班第尋奏言收獲包沁扎哈沁等衆諜哈薩克掠達瓦齊牧凖噶爾生計蹙臣與阿睦爾撒納等議於二月內先後進𠞰諭曰從前原議於四月內進兵且未深知達瓦齊情形故令於額爾齊斯留兵屯田今進兵甚早而達瓦齊之力已窮兵到即可成功其額爾齊斯仍需留兵屯田與否著班第等另行籌辦此次進兵特為平定凖噶爾將阿睦爾撒納等四衛喇特封為四汗俾所部咸登袵席大兵奏凱後阿睦爾撒納策凌等帶領新降人衆前赴熱河朝覲所屬人等即留居原遊牧處俾無往返之勞二月奏言平定凖噶爾後額爾齊斯亦需駐兵管新降人衆請仍照原議屯田諭曰額爾齊斯仍須屯田著照班第所請行至大功告成後伊犁已留重兵兼有大臣駐劄額爾齊斯距阿爾台甚近何必更設兵駐防著諭班第知之尋奏言臣前在京與軍機大臣會奏哨探兵及續進大兵需馬七萬餘今陸續解到除以二萬六百餘匹應付六千哨探兵已於二月十二日起程臣俟察哈爾等兵到即將糧馬妥辦帶領前進其續到兵令喀爾喀親王成衮扎布等監辦事畢成衮扎布赴屯田地方辦事又奏哨探兵起程後臣即派屯田兵二千起程報聞三月奏領察哈爾兵于二月二十日起程令永貴將後隊官兵口糧辦理支給餘駝酌帶糧餉繼進諭曰此奏殊未明晰現在大兵鼓勇直入成功指日可期官兵已携帶口糧四個月又何須額外帶往此或預備賞賚之用或從前議帶兩月口糧後復定為四個月而于官兵起程時未及滿支今特為之補運均未聲明如係帶往預備賞賚之用尚屬可行若官兵已携帶四個月口糧今復多行裹帶接續前進萬餘兵丁應偹口糧若干需用駝隻若干中途保護既分兵丁之力且防意外之虞殊未妥協著傳諭班第查奏尋覆奏言前隊哨探兵六千俱帶四個月口糧臣所領察哈爾兵二千亦帶三個月口糧並無減半留存須俟續運者特備賞之項前未携帶現計衆兵進發後馬駝尚屬有餘臣意酌帶軍餉不特可以接濟大兵而平定凖噶爾後一切賞項亦可動支且此次解餉兵即繼大兵前進似可無虞又言臣於三月初六日至齊齊克淖爾查現存馬四千餘尚有未到者前隊兵已出卡倫三日若俟馬全到後始出卡恐相距逺難以䇿應即將現馬支給千五百兵乘騎初八日帶領起程出巴顔珠爾克卡倫其餘五百兵俟馬到以次續進又言三月十九日至郭勒阿里克台據阿睦爾撒納文稱將新投誠宰桑阿巴噶斯哈丹等奏明帶往額爾齊斯屯田現留貝勒齊木庫爾候護軍統領塔勒馬善到時指示耕種再現在赴察罕呼濟爾後隊續進大兵速行方有益臣即行催塔勒瑪善等速往會辦屯務將現領察哈爾千五百兵內選馬力健者六百與喀爾喀郡王桑齋多爾濟等減裝馳進報聞未幾奏至額爾濟斯之西喇托輝已與阿睦爾撒納前隊會合諭曰大兵前進自宜略分先後經朕屢降諭旨令班第與阿睦爾撒納行程約離數日相繼前進一則阿睦爾撒納係凖噶爾人衆知名之人今伊帶哨探兵前行人多認識收服較易再前隊既有哨探兵復有將軍隨後繼進聲勢聨絡軍威益振如合併一處則衆人但知有將軍不復更知有副將軍轉置阿睦爾撒納於無用之地殊於軍行無益前因永常急遽進兵其意惟恐薩喇勒首先成功伊不得同膺爵賞朕已降旨訓飭班第若亦存此意即屬器量狹小豈朕委任之意即使阿睦爾撒納先抵伊犁克奏膚功朕於班第亦必加恩若先存急於赴功之意恐反不能承受朕恩矣伊二人務須酌量相離數日陸續進發不得同在一隊行走又諭曰大兵兩路前進抵博羅塔拉指日即可蕩平伊犁平定後班第帶領官兵駐伊犁大臣官員兵丁等需用口糧若照永常所奏由內地運送則挽輸勞費斷不可行如向該處夷衆責令供應又未免滋擾朕意平定伊犁後加封投誠各台吉令其自行管束屬衆至達瓦齊乃凖噶爾大台吉其牧養牲畜及伊屬下輸納必多非諸台吉所應分用應即以辦給官兵用資口糧再有不敷將帶往銀兩向厄魯特回人等酌量購買毋得滋擾班第豫為籌辦四月奏言臣等會合後於三月三十日至額爾得里克阿睦爾撒納先進臣等繼發約至察罕呼濟爾會軍四月初六日臣至彼詢知阿睦爾撒納等未得達瓦齊信已赴額米爾等處臣以大兵既深入亟選兵八百令禡木特阿蘭泰先行往會阿睦爾撒納餘兵八百臣隨往接應報聞是月班第等既至博羅塔拉行文西路副將軍薩喇勒會勦而是時達瓦齊在伊犁日縱酒為樂不設備比聞大軍至乃調兵潛竄特克斯我軍獲其調兵者曰巴朗察罕及鄂勒錐圗盡知之於是班第等謀徑渡伊犁河協力追擒北路軍由固勒扎渡口越推墨爾里克嶺進西路軍由喀塔克渡口越克特滿嶺進疏陳方略諭曰辦理深屬允協達瓦齊若能去逆效順朕自當另有加恩之處今既潛身逺竄一經擒獲即當獻俘京師以彰國法五月大軍入伊犁凖噶爾屬衆盡降偵達瓦齊據格登我喀喇巴圗魯阿玉錫等以二十餘騎突擊之驚遁捷聞上奬班第首功封一等誠勇公賜寶石頂四團龍服金黃縧朝珠尋奏言伊犁厄魯特生計拮據不足供應大兵諭曰凖噶爾地方數年來屢被兵革又為哈薩克所掠生計自屬拮據若於伊犁多駐大兵深屬未便從前薩喇勒奏請停止伊犁駐兵經朕傳諭班第等令其酌留兵丁一二百名為駐劄大臣差遣委用今功已告成大兵即宜陸續撤回班第等自當即為辦理若尚未議撤即遵旨妥協籌辦其應酌留兵丁一併議奏六月奏言伊犁既令大臣駐劄辦事不可不留兵駐守備差遣應照原議駐五百兵派察哈爾三百喀爾喀二百逹瓦齊雖未就擒諸事業大定伊犁毋庸大兵久駐應遵旨撤回臣等亦遷移伊犁河北尼楚衮地方駐劄辦事凱旋兵分三隊撤還上報可是月奏獲達瓦齊命獻俘京師先是大軍之初進也阿睦爾撒納妄請給印文招降彼輝特屬上察其蓄異志密諭班第嚴約束至是伊犁既定阿睦爾撒納覬據伊犁誘各屬人衆附已遣人赴哈薩克揚言自領兵平定伊犁而不云天朝大兵又詭稱哈薩克將犯邉謂非令伊為總台吉不可私調兵九千置副將軍印不用用凖噶爾舊台吉噶爾丹䇿凌小紅圗記班第及鄂容安薩喇勒以其叛迹已著密疏劾之諭曰阿睦爾撒納圗據凖噶爾僣越妄行情迹顯著前班第等初奏時朕尚以為防微杜漸之意傳諭公同體察如阿睦爾撒納果有實迹明白具奏嗣復降旨阿睦爾撒納受恩至重未必即萌悖叛之心使伊罪未彰而治之以法朕心不忍且使新降之人俱生疑懼是以未即傳旨令伊等辦理今據班第等詳細奏聞阿睦爾撒納種種不法圗據凖噶爾已無可疑豈必待其生變始為實據由此觀之伊未必即遵旨入覲即使前來若令仍往凖噶爾斷不能安分靜守必至妄行滋事與其俟交結煽惑變遲而力費何如及今乘機辦理之為得也朕意已決此事即宜速行辦理著密諭班第等如阿睦爾撒納尚未起程班第等即密商擒治數其罪惡於軍前正法如伊勉強行至中途逗遛不前或經伊遊牧處托故遷延即著烏里雅蘇台辦事大臣阿蘭泰等領兵赴伊遊牧將伊妻子及任用宰桑等一併拿解來京七月奏言臣等察看阿睦爾撒納甫至伊犁即不願他往詢其何日起程入覲輒推托支吾臣等據理開𨗳雖勉強聽從而遲疑瞻顧之情時時流露數日內其辭又復變遷自云俟拿解達瓦齊至尼楚衮並凱旋兵起程訖即速行入覲伊性極狡詐臣等議令喀爾喀親王額琳沁多爾濟監同起程俟期近再示彼知抵熱河後皇上訓諭開𨗳伊背逆之意自必潛消諭曰前班第屢次密奏阿睦爾撒納負恩狂悖斷難姑容是以特降諭旨令其密行擒治今阿睦爾撒納復欲速來入覲語屬可疑未必出於至誠特因所行非理懼班第等擒治因而多方逞其狡獪是其言雖可聽實無欲來之心或行至中途托病遷延或至塔爾巴哈台遊牧依戀久居均未可定夫以阿睦爾撒納如此姦宄狂悖豈僅為降旨開𨗳所能了事若不將伊擒治又何如置之不問今伊惡迹已顯著如此班第等不思密為辦理但稱朕面加訓諭以折其心是全不知事理之輕重矣著速諭班第等如此際奉到前月二十八日所降之旨已將阿睦爾撒納擒治甚善若未及辦理而伊已起程前來班第等接到此旨約計阿睦爾撒納行程未逺即遣人將伊追回擒治如已逾旬日之外亦須沿途密偵消息再行辦理總之阿睦爾撒納逆迹已著不可姑容以致貽害將來然路途遙逺班第等須盡心籌畫乘時決斷毋得稍自委靡致失機宜再額琳沁多爾濟不過一小有才之人未經更事一切密要之語且勿令與聞班第等又劾奏阿睦爾撒納置上賜孔雀翎不戴用且諱言已內附受爵不肯實告厄魯特及臣等趣之啓行復令納噶察告稱阿巴噶斯烏克圗與喇嘛等議若不令阿睦爾撒納統領凖噶爾伊等寧剖腹而死種種煽脅諭班第等速擒治八月奏阿睦爾撒納已于七月初十日自尼楚衮軍營與額琳沁多爾濟同行又撤回大軍在後似必前來入覲諭曰阿睦爾撒納果至熱河辧理自易且將伊罪惡令暴白于新來投誠人等亦可以快衆心而彰國法但伊甫經起程即有人指其罪狀紛紛告訐伊豈不聞風畏懼且伊自揣所為必不敢前來入覲雖已起程或沿途托故戀住遊牧事所必至伊現在已抵何處摺內未經聲明前曽諭及起程若尚在十日以內即行擒治此時曾否辦理當加意慎密至阿巴噶斯等皆受其籠絡今但將阿睦爾撒納擒治釁端即可永弭宜斟酌辦理既而班第等遵前旨遣追阿睦爾撒納適哈薩克使者至願隨入覲恐其驚疑不果追是月十九日阿睦爾撒納行至烏隆古忽以印授額琳沁多爾濟徑由額爾齊斯遁潛遣心腹人至扎卜堪取其孥約日揚去會烏里雅蘇台大臣阿蘭泰豫奉旨遣兵往收其孥無脫者阿睦爾撒納既叛阿巴噶斯哈丹等掠台站伊犁道梗逆黨克什木巴朗敦多克曼集烏克圗等糾喇嘛回人作亂班第與鄂容安陷賊中由固勒扎赴空格斯轉戰至烏蘭庫圗勒賊蜂集力不支遂各自盡上初聞班第等陷賊信諭曰昨據䇿楞奏從伊犁脫出之索諾木告知班第等陷賊朕心深為憫惻已傳諭䇿楞令其派侍衛滿楚等前往偵探並著從優賞賚期速得實在情形蓋進𠞰烏合之衆原屬無難惟伊等因國事為賊所困每一思之不勝憤悶然亦未知虛實著䇿楞等設法通信傳諭班第等以朕初意凖噶爾危亂之餘甫經平定若屯駐大兵恐多驚擾是以但命伊等駐劄辦事兵少力弱為賊所困非失守封疆可比伊等或相機脫出或忍死以待大兵方為大臣舉止若謂事勢至此惟以一身殉之則所見反小矣鄂容安素稱讀書人漢蘇武為胸奴拘繫十九年全節而歸阿睦爾撒納固不足比胸奴我大清又豈漢時可及自當愛惜此身以圗後效恐伊等以失守罹罪不識大義遽爾輕生夫為人臣子若君父欲加之罪亦惟順受豈可預料而以一死為賢於生於心安乎朕今命定西將軍扎拉豐阿等會合各路大兵竭力𠞰捕務體朕憫惻伊等之心俾逆惡知所懲創不得少存姑息十月䇿楞奏班第等引決自裁狀上軫悼即以班第子巴祿襲誠勇公爵二十一年三月大軍復定伊犁逆黨次第就縳後阿睦爾撒納竄死俄羅斯七月諭曰班第鄂容安靈櫬將次到京前已降旨親臨祭奠並令三品以上大臣齊集用昭優恤二臣臨危致命義烈所著可嘉可憫其靈櫬著準其入城各于本家停設並加恩入祀昭忠祠應得恤典該部察例具奏尋賜祭葬如例諡義烈諭曰班第鄂容安捐軀殉節今靈櫬已到即將逆黨阿巴噶斯克什木先行馘耳于柩前祭奠特建雙烈祠祀之御製詩曰昔有傅介子手斬樓蘭頭通權建殊績芳名播千秋况乎統三軍既悉彼逆酋一武夫之力何事仍夷猶逡巡大軍撤偏師五百留彼梟有密約入覲中逗遛八月草五日三處共一謀阿睦爾撒納來阿爾台陬將合其部衆挈妻孥以逃是則豫有旨其妻孥盡收厥阿巴噶斯斷我軍書郵克什木巴朗伊犁逞劫偷兩路如期發猖狂肆呌詉蜂屯更蟻雜不可爬與梳二臣知不敵全軍將內投而彼截歸路加以聚蚍蜉巴朗諜致辭權假為我逑徐當偹馬駝送之返皇州二臣怒唾罵天朝無此偷效死視如歸背義生肯求奮旅更前進氣髮衝兜鍪終知事不濟畢命飲屬鏤問罪重整師豈辭雪載途旋復定伊犁脅從寬厥尤一二助惡者繫虜皆虔劉渠魁竄異域王師奮遐搜亦聞哈薩克縛獻深同讐命求二臣骨靈輿返首邱臨奠例雙忠惜哉淚湧流初若聽我言寧有今日不忠於國有濟烈惟已不渝究匪偷生比使我悲心悠朱門歌舞輩青史文章儔我豈為彼哉長歌旌乃休二十六年命圗形紫光閣御製贊曰元戎率師平定伊犁而何阿逆叛亂乘危變出不期投軀西漠故里櫬歸痛哉酹酌子巴祿官至都統别有傳巴祿巴祿蒙古鑲黃旗人定北將軍一等誠勇公班第之子初授三等待衛洊擢頭等侍衛乾隆十九年授察哈爾總管命赴西路軍營二十年五月管理博羅塔拉臺站七月偕喀爾喀貝勒品級車木楚克扎布等率西路第二隊凱旋兵還十月襲一等誠勇公授鑲紅旗蒙古都統仍赴軍營二十一年三月由珠勒都斯會將軍䇿楞定伊犁五月隨將軍達勒黨阿進兵哈薩克六月偵叛黨阿巴噶斯哈丹匿博羅和里雅山中馳獲之諭曰巴祿一聞阿巴噶斯等藏匿地方信息即能率兵往拏俾無漏網甚屬奮勉可嘉著賞給荷包鼻煙壺以示奬勵二十二年四月諭曰現在都統巴祿副都統哈寧阿俱赴行在面聆指示著仍回軍營授為參贊大臣協同定邉右副將軍雅爾哈善辧事二十三年正月管理巴里坤臺站三月隨定邉將軍兆惠由博羅布爾噶蘇進伊犁𠞰捕昂吉岱等賊四月襲擒喀喇沁宰桑恩克圗等于庫隴癸山尋又擒叛賊鄂哲特上以賊酋哈薩克錫喇布庫察罕未就擒訓飭將軍參贊等六月偕定邉右副將軍車布登扎布等協緝土爾扈特逃賊舍楞至古爾班察爾諜其入俄羅斯乃還諭曰從前達禮善敏珠爾多爾濟等追𠞰阿巴噶斯哈丹等遊牧日久未見奏報巴祿著在額琳哈畢爾噶等處偵達禮善等所在協力𠞰除餘賊毋徒以搜捕嗎哈沁為事八月奏達禮善等至庫爾河源阻水却回諭速往會𠞰十一月兆惠𠞰回酋霍集占於葉爾羌巴祿奉命赴援二十四年正月至巴爾楚克副將軍富德已敗賊于呼爾璊諭移兵往援和闐尋命駐和闐辦事五月懇隨大軍進𠞰允之六月以兵三千餘由巴爾楚克䇿應兆惠富德兩軍八月同富德等追擊霍集占于伊西洱庫爾淖爾大敗之師旋敘功授雲騎尉世職二十五年遷正藍旗蒙古都統上以西域既定頒賞論功特照圗諸功臣形於紫光閣掄其尤著者五十人親製題贊次則斬將搴旗建績致命有一事可見者亦圖其形令儒臣各製贊又五十人巴祿居首贊曰凖部回城咸懾將種慟父殞賊殺賊逾勇兩世濟美同上凌煙古稱定逺其何有焉二十六年兼公中佐領二十七年授涼州將軍二十八年駐防涼州莊浪滿洲蒙古兵移駐伊犁巴祿請查應移兵內老疾孤寡之户酌留五百駐涼州每兵額設馬裁二匹省供支改協領為城守尉歸寧夏將軍轄庶移駐兵悉精鋭而帑項亦不致縻費詔如所請三十一年十月遷正白旗漢軍都統十二月授綏逺城將軍三十三年遷察哈爾都統三十五年卒子慶林襲誠勇公又一雲騎尉授散秩大臣四十年授伊犁領隊大臣四十五年調京口副都統四十八年命赴西藏辦事五十三年巴勒布賊擾後藏邉界慶林措置乖方詔革職治罪以其從弟官惠襲公爵五十五年復授藍翎侍衛鄂本岱鄂本岱蒙古正黃旗人姓曼靖初為明守偹太祖髙皇帝天命六年征明取遼陽鄂本岱率三十五人以馬六十來歸七年從征明廣寧有功授三等輕車都尉世職天聰元年太宗文皇帝征明錦州距城二里駐營命額駙蘇納選蒙古將士禦敵於塔山西鄂本岱與焉遇敵兵二千奮擊敗之分賜所俘獲上移師寧逺明總兵滿桂列陳城東上督諸將進擊鄂本岱率五佐領甲士敗敵晉二等輕車都尉二年從上征多羅特部分兵二百先驅遇敵百人三戰遂北敵復糾驍健死戰我兵稍郤鄂本岱躍騎突前敵敗遁上率諸貝勒並進殺其台吉固嚕俘獲無算晉鄂本岱一等輕車都尉擢右翼蒙古都統三年從上征明遵化明邉將五路迎戰鄂本岱率右翼蒙古兵挫敵斬其參將一獲馬及纛入大安口拔其城大軍既取遵化進薄燕京鄂本岱敗敵援兵明年師還取永平灤州上命貝勒阿敏等守永平都統納穆泰等守灤州鄂本岱同都統察哈喇副都統蒙阿圖守遵化未幾灤州被敵攻圍納穆泰引衆入永平阿敏度弗能禦敵檄遵化將士棄城偕歸敵軍已逼遵化鄂本岱率五十人出禦斬敵哨騎七人奪其馬趨察哈喇蒙阿圖遄行自勒兵對敵列陳一敵將持鎗來犯鄂本岱迎斬之敵不敢前我軍盡行乃居殿防衛全師而還晉爵三等男五年復從上征明圍大凌河城率所部列營城西敵出城奪我已取臺堡甫樹梯鄂本岱與都統和碩圗整軍並進敵大敗入城追蹙之壕殱殪甚衆自是敵坐困弗復出犯凱旋得優賚九年正月卒兄瓦色襲爵阿岱孫巴朗托班阿岱姓鄂爾果諾特世居喀爾喀太祖高皇帝時來歸𨽻蒙古正黃旗豫三等輕車都尉世職太宗文皇帝天聰元年正月授參領同佐領恩格圖等駐伊蘭布哩瑚防遊牧蒙古率部卒巡徼海濵猝遇明兵擊斬千人擒一遊擊以歸明水師千餘犯海州復率兵三百馳擊多斬馘十月率駐防兵還上親賜酒勞之敘功晉世職二等輕車都尉纍遷至右翼蒙古都統八年五月上征明阿岱率右翼以從七月隨貝勒代善自喀喇鄂博攻得勝堡同兩紅旗都統尼哈里葉臣等力戰殪明守卒殆盡進略大同會大軍於朔州閏八月師還遇蒙古逃者四百七十人携以歸命分給八旗是月喀爾喀部長族屬有為察哈爾衆邀殺于路者惟一人得脫入奏上遣阿岱與都統武訥格率兵二百人往緝誅二十餘人崇德元年五月隨武英郡王阿濟格征明攻克定興寶坻等城又設伏邀擊三屯營援兵盡殱之九月凱旋籍所獲以獻得旨優奬尋部議初入明邉攻昌平時阿岱所部退縮及還師不收後隊猝遇敵敗走坐罰鍰奪俘獲十二月上親征朝鮮阿岱同都統談泰樹雲梯攻城先登朝鮮王李倧棄城遁三年隨貝勒嶽托征明攻密雲東北墻子嶺明總督吳阿衡以六千人來援負嶺立寨分步騎為三隊我師克臺堡十一座阿岱與都統恩格圖等潛率竒兵踰嶺突入分兵夾擊大敗敵衆四年卒孫色布德襲順治七年遇恩詔晉一等輕車都尉卒以阿岱次子善丹襲九年卒無子以色布德弟巴朗襲兩遇恩詔晉爵至三等男十一年巴朗任參領隨靖南將軍珠瑪喇討李定國於廣東時定國攻新會巴朗隨大軍自三水馳擊敗其衆萬餘定國復糾步騎四萬分據山峪拒戰巴朗涉險薄其營鏖戰定國潰走凱旋敘功晉二等男十三年卒以其弟托班襲聖祖仁皇帝康熙十二年逆藩吳三桂反四川郡邑叛應之托班以參領隨前鋒統領穆占由漢中入川討賊十三年三月擊敗叛鎮談洪于陽平關乘勝抵朝天關敗賊將石存禮萬餘衆連破其木城十一月進征保寧叛鎮吳之茂立寨斷我餉道托班射郤賊渠隨穆占率衆奪其寨又擊賊將王屏藩等屢敗之于郿嶺龍潭驛諸處敘功晉一等男三十三年卒子錦保襲竒塔特偉徵弟額爾格勒珠爾從子錫喇布托克托會竒塔特偉徵姓博爾濟吉特本鄂爾多斯哈爾濟農族人也居克魯倫當太宗文皇帝時同其弟額爾格勒珠爾等率屬來歸𨽻蒙古正黃旗天聰八年正月上遣蒙古軍往錫爾哈錫伯圖地收取察哈爾流散部衆竒塔特偉徵同岱青塔布囊等斬七十三人招降百餘人獲馬駝數十五月上統大軍征明次固爾班圖勒噶命蒙古軍由間道進會大軍於西喇烏蘇河竒塔特偉徵遇察哈爾五人將逃往阿嚕部擒以獻九年五月隨貝勒多鐸征明錦州師至寧逺竒塔特偉徵為前鋒統領行抵大凌河西遇明錦州副將劉應選松山副將趙國志等合兵七千來戰我前鋒兵少竒塔特偉徵奮勇力戰歿於陳議恤豫三等男爵子和尼齊襲額爾格勒珠爾於崇德三年隨大軍征明至山東敵犯前鋒參領席特庫營率衆擊郤之六年圍錦州敗其城守兵及松山援師順治元年隨睿親王多爾衮入山海關擊敗流賊李自成敘功豫騎都尉世職遇恩詔加一雲騎尉卒無子弟哈蘭圖之子察琿襲竒塔特偉徵復有弟托克托會天聰九年授正黃旗蒙古副都統崇德二年隨征朝鮮所部戰艦不至汛地坐解任三年追敘來歸功豫三等輕車都尉世職後遇恩詔晉一等輕車都尉又一雲騎尉旋以弟喀蘭圖有功與和尼齊等並改𨽻正黃旗滿洲卒子錫喇布襲順治十一年明桂王朱由榔據廣西其晉王李定國犯廣東錫喇布隨靖南將軍珠瑪喇往征定國據新會山峪列象炮拒戰錫喇布奮勇衝擊大破之敘功豫一雲騎尉合所襲之職為三等男卒子格鈕遜襲伊勒都齊伊勒都齊姓莽努特世居察哈爾太宗文皇帝時來歸𨽻蒙古正黃旗尋授護軍參領天聰八年七月上親統大兵征明由宣府入邉伊勒都齊從率所部攻下十二堡八月班師齎敕先還以入邉功諭留守諸貝勒崇德五年六月隨睿親王多爾衮屯田義州敗明騎兵於寧逺九月鄭親王濟爾哈朗統師圍明錦州令伊勒都齊與前鋒統領勞薩等率兵三百設伏髙橋北以縱敵弗擊議罪籍家財半六年復隨鄭親王圍錦州敵兵自松山來犯鑲黃旗汛地伊勒都齊同護軍統領濟什哈擊郤之八年鄭親王征明前屯衛以炮攻毁城堞伊勒都齊率本旗護軍先登取其城敘功豫雲騎尉世職順治元年隨大兵入關敗流賊李自成追至望都是年冬署護軍統領隨豫親王多鐸𠞰賊至陜州距潼關立營自成遣賊衆迎戰賊將劉方亮乘夜劫營伊勒都齊與護軍統領圖賚奮擊破賊遂克潼關二年四月豫親王移師定江南至揚州伊勒都齊同護軍統領固納岱率兵攻城南獲敵船二百餘尋隨端重親王博洛征浙江敗明總兵王之仁等於平湖縣追𠞰至太湖獲船數十大兵既定杭州伊勒都齊與前鋒參領鄂碩勞罕往偵錢塘江渡口擊敗敵兵三百先是敘入關破流賊功晉世職為騎都尉兼一雲騎尉至是敘平江南功晉三等輕車都尉三年隨豫親王征叛逃蒙古騰機斯等將追及賊衆還戰伊勒都齊與都統阿賚先率兵繞出其後俟賊潰遁截擊擒斬甚衆我兵自圗喇河西行喀爾喀部土謝圖汗之子及碩雷汗之子各率衆邀戰伊勒都齊列陳分擊敗之獲馬駝無算敘功晉世職二等輕車都尉六年隨鄭親王征湖南時明桂王朱由榔將王進才袁宗第郝永忠等據沅州靖州伊勒都齊同前鋒統領努三護軍統領都爾德副都統金維城率兵由武岡進征破王進才寨寨九袁宗第列十寨於洪江南岸伊勒都齊先衆破其五餘皆潰遁復分兵追𠞰郝永忠攻克黎平府永忠竄去躡擊至永從縣斬級百餘獲馬數百七年四月凱旋得優賚八年擢正黃旗滿洲副都統九年兼任刑部侍郎三遇恩詔晉爵至二等男十年十一月以勘鞫佐領敦達哩岱敏互訐事論敦達哩削職罰鍰敦達哩寃訟得釋伊勒都齊坐偏徇降爵一等罷侍郎任十七年以疾解副都統任康熙十二年諭奬久著勞績諸大臣加伊勒都齊太子少師是年冬逆藩吳三桂反上命順承郡王勒爾錦率師赴湖南征討以伊勒都齊為護軍統領參贊軍務同前鋒統領碩岱簡精鋭先發十三年二月至荆州賊陷常德窺武昌伊勒都齊奉詔防守武昌十四年冬諭責順承郡王駐師踰年未復湖南郡邑罷伊勒都齊參贊十六年四月卒於軍十九年追論伊勒都齊守武昌時不𠞰滅虎渡口賊冦致太平街失陷降世職為雲騎尉以其弟之子瑪哈襲欽定八旗通志卷一百八十四
