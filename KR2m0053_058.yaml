  text: 職官志三職官理藩院太常寺都察院通政使司大理寺理藩院理藩院尚書一人從一品以滿洲䝉古補授國初設䝉古衙門有承政㕘政啟心郎等官崇德三年六月定䝉古衙門為理藩院七月定置承政一員順治元年改承政為尚書十五年以禮部尚書銜掌理藩院事省啟心郎十八年仍為理藩院尚特簡書雍正元年以來以王公大學士兼理院事皆由無常員左右侍郎各一人正二品均以滿洲䝉古補授額外侍郎一人崇德三年七月定置左右㕘政各一員順治元年改左右㕘政為侍郎十五年以禮部侍郎銜協理特簡理藩院事十八年仍為理藩院侍郎其額外侍郎䝉古貝勒貝子之賢能者任之旗籍清吏司郎中滿洲一人䝉古二人正五品員外郎滿洲三人䝉古二人從五品主事滿洲一人正六品王㑹清吏司郎中滿洲一人蒙古二人員外郎滿洲二人䝉古三人主事䝉古二人典屬清吏司郎中滿洲一人蒙古一人員外郎滿洲三人䝉古六人主事滿洲一人䝉古一人柔逺清吏司郎中滿洲一人員外郎滿洲一人蒙古五人主事䝉古一人徠逺清吏司郎中䝉古一人員外郎滿洲二人蒙古三人主事䝉古二人理刑清吏司郎中䝉古二人員外郎滿洲一人蒙古四人主事䝉古一人初順治十八年理藩院設四清吏司曰録勲賔客柔遠理刑置滿洲䝉古郎中十有一人員外郎二十七人滿洲主事四人其後増省不一康熈三十八年析柔逺司為二曰前司後司乾隆二十二年改録勲司為典屬賓客司為王㑹柔遠後司為旗籍柔逺前司仍為柔逺二十六年併旗籍柔逺為一司増設徠逺司二十七年旗籍柔逺仍分為二司二十九年後改典屬司為旗籍司其舊旗籍司仍改為典屬司今定各司滿洲䝉古郎中十二人員外郎三十有五人主事九人堂主事滿洲二人䝉古三人漢軍一人順治元年置額校正漢文官二人於翰林院侍讀學士侍讀等官内奏委三年而代司務㕔司務滿洲一人蒙古一人正八品順治元年置康熈三十八年省雍正十年復設題署主事滿洲二人䝉古六人乾隆三十六年置由筆帖式内倫選題補筆帖式滿洲三十六人䝉古五十五人漢軍六人貼寫筆帖式蒙古十六人初順治元年置滿洲筆帖式十一人䝉古筆帖式四十一人漢軍筆帖式二人康熈二十八年増設滿洲漢文筆帖式毎旗各一人漢軍筆帖式毎翼各増二人雍正十一年復増滿洲筆帖式十七人䝉古筆帖式十四人分𨽻各司視事之繁簡以為額銀庫郎中一人員外郎一人俱於本院司官内奏委司庫滿洲一人正七品各部完寺同筆帖式滿洲一人庫使滿洲二人康熈四十六年始剏立銀庫設官如今額惟庫使初置四人雍正元年省二人蒙古繙譯房員外郎一人主事一人俱於本院司屬内掄選奏委唐古忒學司業一人助教一人筆帖式䝉古二人順治十四年初立唐古忒學給教習人六品俸後改為司業其助教本以他官兼乾隆五年始定為額設之官稽察内館外館監督二人由科道及各部司官内掄選奏委烏蘭哈達駐劄司官一人三座塔駐劄司官一人八溝駐劄司官一人分駐塔子溝筆帖式一人察哈爾游牧處理事員外郎䝉古十六人以在京蒙古各旗與察哈爾各旗官内掄選由院引見除授自䕶軍校驍騎校選用者即授員外郎自中書筆帖式選用者先授主事三年稱職乃授員外郎又雍正七年置巡察㳺牧御史或部院司官一人每嵗更替今改定五年掄選一次張家口管理驛站員外郎一人筆帖式二人喜峯口管理驛站員外郎一人筆帖式一人獨石口管理驛站員外郎一人筆帖式一人殺虎口管理驛站員外郎一人筆帖式一人古北口管理驛站員外郎一人筆帖式一人俱由本院司官内奏委以筆帖式一人佐之三嵗而代圍場總管一人初制四品乾隆十八年陞為三品左右翼長各一人正四品章京八人初制六品乾隆十八年陞為五品驍騎校八人正六品木蘭圍場在䝉古各部落中周一千四百餘里國語謂哨鹿為木蘭故以得名聖祖仁皇帝因喀喇沁敖漢翁牛特䓁諸部落所獻牧地置嵗行秋獮康熈四十五年設圍場總管一員六皇上品官八員率官兵駐守圍肄武凡内扎薩克䝉古仍照前制毎以八月行覲之王公台吉及喀爾喀青海厄魯特並輪年入都爾伯特土爾扈特回部伯克等咸㑹朝行在所櫜鞬執役嵗以為常乾隆十四年始以圍場總管屬理藩院統轄十八年陞總管等品秩増設翼長二人驍騎校毎旗各二人朝謹案我被其内扎薩克諸蒙古乆受疆索比於内威德廣聖武臣而無思不服北踰瀚海西越流沙亦莫不碁布所昭星羅咸歸版籍設官置吏多因其俗以治之臂指相維不殊郡縣如䝉古諸旗之扎薩克官及新疆回城之伯克等官皆領属於理藩院今以其本由各部落選置與内地注授者不同故别繋之藩屬諸官篇内云都察院都察院左都御史滿洲一人初置一品順治十六年改為二品康熈六年改為一品九年定為正二品雍正八年陞為從一品左副都御史滿洲二人正三品國初都察院置承政一員左右㕘政各二員順治九年改承政為左都御史㕘政為左副都御史員數増減不一三年定設左副都御史滿洲二人五年定設左都御史滿洲一人舊有滿洲啟心郎一員漢軍啟心郎二員順治十五年省其右都御史為總督坐銜右副都御史為廵撫坐銜俱無亰員故都察院長官皆以左繫銜焉吏科掌印給事中滿洲一人初置四品康熈二年改為七品六年復為四品九年定為正七品雍正七年陞為正五品各科同給事中滿洲一人初制從七品雍正七年陞為正五品各科同户科掌印給事中滿洲一人給事中滿洲一人禮科掌印給事中滿洲一人給事中滿洲一人兵科掌印給事中滿洲一人給事中滿洲一人刑科掌印給事中滿洲一人給事中滿洲一人工科掌印給事