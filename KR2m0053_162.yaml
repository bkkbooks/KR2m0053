body:
  text: 欽定四庫全書欽定八旗通志卷一百四十八人物志二十八大臣傳十四滿洲正黄旗二伊圖賴布延譚布爾徳馬福塔漢滿達爾席舒里琿哈努山覺羅阿克善賚圖庫濟圖賴圖賴姓瓜勒佳費英東第七子也先𨽻鑲黄旗後與兄納盖弟蘇完顔改撥正黄旗天聰初隨征棟夔追擊察哈爾及攻明寜逺所至有功三年從太宗文皇帝伐明進兵燕京其大同總兵滿桂以師赴援圖賴直前衝擊斬殺甚衆授騎都尉世職四年隨大貝勒阿敏等鎮守永平明監軍道張春等圍灤州圖賴與副都統阿山等率䕶軍自永平馳至乘夜襲擊敗之師還貝勒阿敏棄永平出邉明將率歩卒百人邀擊圖賴率十六人還戰盡殱其衆尋授三等輕車都尉五年八月從征大凌河圍其城太宗指授方畧令與䕶軍統領南褚立兩旗之間遇逐我樵採者邀擊之及明兵誘戰圗賴先馳入陣諸軍各進戰圖賴被創上以其違命輕進切責之九月明發援兵四萬餘來戰圗賴統右翼兵躍馬衝陣敵兵潰走遂擒張春旋征大同攻拔靈邱縣及小石城叙功晉二等六年大軍破走察哈爾遂移師征明次於布里渡圗賴奉命同恭領蘇喇達賫敕諭明沙河堡守將明人遣官賫牛酒幣帛以獻七年隨貝勒岳託等攻取旅順口其統兵守旅順者為漢軍遊擊佟圗賴明年從攻朔州以越界出畧又不至期㑹地盡奪所獲物入官九年任䕶軍統領隨貝勒多鐸入廣寜同都統阿山等率兵四百先趨錦州明總兵祖大壽遣其將合松山兵三千餘人來禦未及戰明兵驚潰我兵分路𠞰翦俘獲無算軍還叙功得優賞崇徳二年授為議政大臣明年復隨貝勒岳託征明率師先驅踰墻子嶺攻克十一臺進兵山東明將合步騎八千來禦正紅旗隨營䝉古阿藍泰旁却圗賴方營部馳擊敵以百騎突至圗賴摶戰陷堅大敗之旋與都統譚㤗敗明閣部劉宇亮兵於通州河上攻拔二城又分兵畧地取二城累功晉爵三等男六年圍錦州明兵自杏山赴援擊敗之先是䝉古有降明者曰諾木齊在圍中遣人約獻東闗以降至是明兵覺圍諾木齊家圗賴登城力戰殺敵出諾木齊以歸復破松山騎兵指揮漢軍拔塔山杏山二城晉一等男部議錦州之役諸貝勒所屬三旗䕶軍有退怯不戰者貝勒大臣未經察治圗賴坐附和徇隱論罰贖得㫖寛免八年攻拔中後所及前屯衛晉三等子順治元年大軍至山海闗流賊李自成遣兵拒戰圗賴率前鋒軍破賊將唐通於一片石既入闗破自成兵復㑹大軍追敗之於望都縣超授三等公是年十月豫親王多鐸帥師下河南自成走陜州圗賴自孟津率精兵先渡河明守將黄士欣等各遁去瀕河十五寨堡兵民望風歸附睢州總兵許定國等率衆來降進薄潼闗賊遣偽侯劉宗閔沿山列陣以拒圗賴以騎兵百四十人進戰一以當百設伏掩擊盡殪之明年賊將劉方亮整兵千餘來窺我營圗賴與䕶軍統領阿濟格尼堪等率正黄鑲白正紅鑲紅鑲藍五旗将領迎擊賊懼而奔俘斬甚衆自成聞敗集兵拒敵圗賴復合鑲黄正藍正白三旗兵力戰殱其步卒餘騎奔竄賊糾衆又至連戰敗之遂破潼闗賊衆大潰遁走陜西既定移兵収江南攻克揚州獲明閣部史可法斬之追福王朱由崧於蕪湖據江口截其路擊靖南伯黄得功兵敗之得功中流矢死遂獲由崧餘衆悉降師旋進爵一等公圗賴嘗謂睿親王多爾衮曰圗賴自誓於天効忠主上不避諸王貝勒大臣嫌怨久矣圗賴有過王若不言將恐不免於罪戾我欲改過自新王幸毋姑息不我教誡也㑹睿親王於午門集議譚泰擅隠諭㫖罪三日議未定圗賴面詰之曰何為遲久不結耶聲色俱厲王怒曰爾曩追流賊至望都分兵前進諸将争先爾於肅豫諸王前誚讓且唾逞威自恣今又以言詞逼我我固不能堪此怒色疾聲也遂去諸王執圗賴将罪之王曰雖然此非退有後言比且為國効勤矢忠無他咎也解其縳而釋之三年任本旗滿洲都統隨端重親王博洛進師浙閩軍次杭州時明魯王朱以海據紹興其總兵方國安等營於錢塘江東岸艤舟以拒圗賴率諸将士從上流浮渡江廣十餘里人馬無溺者分兵縱擊之國安驚以為神盡棄戰艦擕魯王遁保台州圗賴奮力追𠞰拔金華衢州各城㑹端重親王令與都統漢岱分兵進師福建圗賴自衢州統所部兵擊敗明閣部黄鳴駿於仙霞闗攻克浦城漢岱亦自廣信破分水闗入崇安明唐王朱聿鍵遁走汀州諸将乘勝追擊擒斬聿鍵等五人及其總兵等官盡降其衆閩海悉平回次金華病卒年四十七子輝塞襲爵圗賴既卒之後二年貝子吞齊等誣告圗賴黨徇肅親王鄭親王又與譚泰等私相盟誓睿親王追論之奪輝塞爵並沒其家世祖章皇帝親政知圗賴無辜且念舊功追諡昭勲配享太廟賜文勒石復輝塞一等公還其貲産雍正九年加號曰雄勇馬福塔馬福塔滿洲正黄旗人姓納喇初任佐領與兄滿達爾漢分轄所属人户太宗文皇帝天聰五年授户部恭政八年三月命同户部承政英俄爾岱責朝鮮國王李倧罪李倧引咎報謝五月太宗親統師征明大同馬福塔隨貝勒濟爾哈朗等留守盛京九月賫奏行營道出明鐵山路遇明兵邀拒者斬五人俘一人又馘一人誡諭縱還邉人憚之尋擢户部承政九年偕恭政博爾惠賫諭朝鮮自是通使朝鮮馬福塔輙奉命往崇徳元年復同英俄爾岱等使朝鮮明皮島兵遮於途盡擊走之還奏得賜賚是年七月部議額駙佟養性嫁女與貝勒岳託子以六十人為媵户部諸臣弗阻止馬福塔應革任罰鍰得㫖免革任九月以互市往朝鮮義州擒獲明哨卒知明兵入鹻塲因率百人躡其後明兵遁值武英郡王阿濟格等征明凱旋偕諸恭領渡遼河備舟艦十二月太宗以朝鮮背盟逆命将統師親征先遣馬福塔同前鋒統領勞薩等将兵三百為賈人装晝夜疾馳将至國都其守将率兵拒戰我兵奮擊盡殱之李倧為緩兵計遣其臣至郊外迎問馬福塔答以有事欲議其臣曰為議事而來當啟知吾王以禮相迎請少待遂閉門不納明日李倧遁往南漢山城追至城下還奏行營明年正月大軍破其國都進圍南漢山城馬福塔兩奉勅入城數李倧罪𨗳以輸誠納欵倧先使其臣請罪隨率羣寮出城乞䧏具表稱臣二月大軍凱旋李倧跪送於十里外馬福塔復奉命與英俄爾岱送李倧還李倧餽以金却之奏聞四月隨武英郡王阿濟格征明皮島自北隅督戰大㨗六月法司議前征朝鮮時馬福塔擅擕其子隨往以俘獲諸物先衆賫歸又奪取降民鷹與貝子碩託索易婦人私令朝鮮將臣與碩託交結應奪俘獲論死得㫖免死罰贖十月復同英俄爾岱賫勅封李倧為朝鮮國王三年正月户部承政韓大勲盗取貯庫金銀珍珠馬福塔以同官弗舉坐罰鍰七月更定官制改授馬福塔為户部左叅政四年正月部議馬福塔購買官商胡有徴黄金負價未償應革佐領降副理事官得㫖宥之六月同刑部叅政巴哈納賫勅往朝鮮封李倧妻趙氏為王妃八月其兄恭領福爾丹出征退縮伏法以所籍家産賜馬福塔九月擢户部承政十一月朝鮮頌上恩徳立碑三田渡具表以聞命與禮部恭政超哈爾等同往騐視五年二月卒子馬希納襲管佐領布延布延姓郭爾羅特原籍蒙古居察哈爾部為塔布嚢天聰元年同昻坤社稜來歸𨽻滿洲正黄旗初從征棟䕫為貝勒岳託嚮導率先進擊又征克什克騰部擊索諾木諾木齊兵首衝陣破之四年偕恭領圗魯什畧明邉敗其哨卒有俘獲八年正月偕圗魯什畧錦州松山斬百餘級獲樵車百餘牛驘驢百四十命以所獲賞將士十月畧十三站斬十級擒明把總一獲馬三十二月遣迎察哈爾降衆是年叙來歸功授騎都尉世職九年同布哈塔布囊畧寕逺俘獲歸比出邉明兵千餘來追布哈䧟於陣哈談巴圗魯前行還戰馬中矢仆布延亟進援與之馬復同奮擊大敗敵兵論功賜人一馬二牛三授三等輕車都尉崇徳元年二月命齎書諭明松棚路潘家口董家口喜峰口守將責明偏助葉赫搆起兵端及致書不答之罪五月隨武英郡王阿濟格征明燕京遇敵盧溝橋敗之三年二月從征喀爾喀前鋒將領勞薩違上命得䝉古漢人収其財物牲畜縦之去論死布延議削職鞭百贖身上宥之七月擢議政大臣兼䕶軍統領九月隨岳託征明由宻雲東北墻子嶺毁邉墻入明馬步兵三隊俱敗走布延追擊獲馬八十七四年率兵防守烏欣河口偕侍衞阿爾薩蘭圍松山布延設伏擊斬二十一級偵錦州斬哨卒八獲馬十二五年隨睿親王多爾衮圍錦州同左翼軍衝敵步營斬殺盈壕六年三月以多爾衮違諭離城逺駐又私遣軍士還布延不諫阻議削職籍其家之半特㫖降罰未幾鄭親王濟爾哈朗克錦州外城布延同内大臣伊爾登奮擊有功賜百金晉二等輕車都尉時錦州之役多爾衮濟爾哈朗更畨相代明總督洪承疇率兵十三萬來援八月上親統大軍征之明兵遁移蹕松山環城浚壕夜明總兵曹變蛟衝圍突犯御營尋中創奔回布延以内大臣不嚴防守論罰鍰七年二月我軍擊擒洪承疇布延以援兵後至論死命贖免十一月大兵自黄崖口征明分三隊布延率䕶軍居次進圍薊州順治二年世祖章皇帝念太宗眷頋舊臣加布延一等輕車都尉五年從子烏納海先時出征陣亡贈騎都尉其叔父桑阿爾齋襲職至是卒併授布延襲晉三等男八年布延卒長子莽塞襲踰年卒無嗣以布延兄阿拉克泰襲又卒仍以布延次子茂竒塔特襲康熙三十五年從征噶爾丹至昭莫多奮勇破賊有功加一雲騎尉授二等男卒子成保孫松凌逓襲乾隆二十八年松凌卒雲騎尉銷除子永泰現襲三等男譚布譚布滿洲正黄旗人姓舒穆祿揚古利從弟也初任佐領天聰五年太宗文皇帝統師征明圍大凌河城明兵出城樵採譚布時為䕶軍恭領率先邀擊斬三人生擒二人復同佐領希福等擊敗明錦州援兵崇徳二年列議政大臣四年十一月奉命隨承政薩穆什喀索海等征索倫部取道虎爾哈部同諸将攻克雅克薩城獲丁壯三百餘索倫部長博穆博果爾迎戰擊卻之䕶所獲以歸五年三月奏凱分賜貂皮人户授騎都尉世職尋擢副都統時我兵屯田義州譚布同副都統覺善等奉命駐防其地值明兵突出山寨肆掠屯丁有被害者論駐防諸將罪罰如例六年隨大軍圍明錦州掘長壕駐守明總兵祖大夀遣步兵出城來犯䕶軍統領噶布喇戰失利譚布衝入敵陣戰卻其衆復擊敗敵騎斬其材官一明總督洪承疇集衆松山援錦州譚布隨其兄都統譚泰迎擊破其步兵三營既而敵騎屢犯我右翼營譚布皆奮戰挫敵明年叙功加一雲騎尉上幸牧馬所命諸大臣與降将祖大夀等較射奨賞有差譚布得賜駝一八年正月命同覺善率兵駐守錦州九月隨鄭親王濟爾哈朗征明寜逺敗其拒戰兵世祖章皇帝順治元年隨大軍入山海闗擊敗流賊李自成追至望都晉世職為二等輕車都尉二年隨饒餘郡王阿巴泰鎮守山東𠞰平滿家洞賊巢同都統凖塔進征徐州連敗明兵獲船五百餘紅衣礮五十有七時豫親王多鐸統師自河南進征由泗州渡河趨揚州下江寕而明總兵劉澤清總漕田仰等尚距淮安譚布同凖塔率兵至清江浦澤清及仰俱遁遂定淮安招䧏附近城邑分兵𠞰平如臯通州賊衆叙功晉一等輕車都尉加一雲騎尉三年隨肅親王豪格征流賊張獻忠屢擊敗拒戰賊衆五年凱旋以在軍中時不勘决恭領希爾根爭功狀議罰上命寛免六年隨端重親王博洛討叛鎮姜瓖圍大同城瓖潜結賊黨外援倚北山逼我軍自糾衆出城來犯譚布同䕶軍統領鰲拜車爾布等先破賊援還擊卻瓖入城斬殪甚衆又分兵𠞰滅賊黨於太原平陽汾州先是譚布以不禁其妻信魘魅術削雲騎尉遇恩詔復之及大同平叙功晉三等男世襲復兩遇恩詔晉一等男八年三月擢工部尚書時譚泰任吏部尚書專擅是年八月伏誅詔免其兄弟連坐罷譚布尚書任尋甄别譚泰任吏部時援恩詔優加世職譚布仍降三等男康熙四年卒子喀岱襲爵伊爾徳伊爾徳滿洲正黄旗人姓舒穆祿揚古利族侄也天聰三年太宗文皇帝命揚古利率師畧明錦州寕逺諸邉境伊爾徳従軍有功復從大軍征明北京奮勇攻擊斬殺甚衆又敗山海闗援兵於薊州師還出邉先至木城擒斬明兵之守隘者五年上帥諸貝勒大臣攻圍大凌河城中兵突出伊爾徳衝鋒入陣殺敵二人都統和碩圗等合師夾擊追奔至壕而還又擊明監軍道張春兵遇敵騎挾弓矢将犯御營伊爾徳馳斬之是秋往畧前屯衛率十五人偵緝明哨卒值我軍将領噶思哈為敵兵所困伊爾徳奮擊援出之積功授騎都尉世職尋擢䕶軍統領崇徳二年隨貝勒阿巴泰往築都爾弼城率䕶軍四百人防䕶築城工役五年五月大兵圍錦州敵兵出戰伊爾徳領纛追擊至壕敗之七月隨王貝勒等至錦州松山屯田明人縱牧於野伊爾徳設伏於烏欣河驅其牲畜以歸敵兵潜襲我後伊爾徳率後隊還擊斬獲無算特晉爵三等男十一月以擅離營汛私往貝子尼堪家又向王貝勒及䕶軍校索馬擅遣其子額爾畢黒隨叅領希爾根往錦州部議應降職明年奉命往睿親王軍營傳諭通察各旗将領事不即奏報部議削爵籍家財之半均得㫖罰贖七年復從圍錦州敗松山兵之來奪我礮者叙功晉一等男順治元年駐防錦州二年加一雲騎尉世祖章皇帝命伊爾徳隨豫親王多鐸南征同尚書宗室漢岱等統䝉古兵由南陽趨歸徳招撫甚衆至揚州城北獲戰艦百餘渡江先八旗都統進破南京福王遁走蕪湖復同都統阿哈尼堪等追擊之敗明靖南伯黄得功軍三年叙功晉二等子六年與都統譚㤗征江西叛鎮金聲桓平之進𠞰廣東叛鎮李成棟於信豐拔其城成棟夜遁馬蹶溺水死隨分兵定撫州建昌破偽總兵楊竒盛兵二千餘江西悉平師旋復奉命統領将士往𠞰保定土冦叙功晉一等子八年八月䕶軍統領鰲拜訐伊爾徳罪状以上幸南苑時伊爾徳擅令内直員役更畨及私减守門䕶軍額數又嫉忌鰲拜等為上効力鞫實論死籍其家上貸之命削世職一級留任罰贖十一月擢本旗都統明年三遇恩詔晉一等伯兼一雲騎尉隨敬謹親王尼堪征湖南敗績十一年師旋論罪革職籍沒是時明魯王朱以海為鄭成功所殺其餘黨竊據浙江舟山為冦十二年上命伊爾徳為寕海大将軍統兵往𠞰至則偽總兵王長樹毛光祚沈爾序等糾賊登岸肆掠大嵐山伊爾徳遣副都統碩祿古總兵張承恩引兵趨夏闗抵斗門連擊敗之斬長樹等三人殱賊兵無算而自率師攻寕波乘舟趨定海分三路進發賊将陳六御阮思等於海島望江口山下列戰艦以待伊爾徳揮衆進擊敗之追至衡水洋斬六御等遂取舟山十四年凱旋命貝勒杜蘭等郊勞復世爵叙功晉一等侯兼一雲騎尉十五年隨信郡王多尼征明桂王朱由榔自貴陽至盤江斬其將領進克雲南省城十八年卒於軍年五十六予祭𦵏如典禮諡襄敏子陀和齊早卒孫巴渾岱襲滿達爾漢子阿哈丹滿達爾漢姓納喇先世居哈達父雅虎率十八户來歸太祖髙皇帝命為佐領𨽻滿洲正黄旗列理事十大臣甞同大臣哈穆達尼征東海卦爾察部俘二千人以歸命設宴郊勞之又以克舒桑哈達功賜俘獲人百既乞休滿達爾漢襲管佐領事從太宗文皇帝征虎爾哈部招降五百餘户天聰五年五月命賫勅往朝鮮諭以征明海島令供備舟艦時朝鮮初附懐反覆滿達爾漢既至國王李倧遣兵守其舘弗與見越三日滿達爾漢謂守者曰我奉命賫諭至此何慢我不相見我歸矣遂偕諸使臣控騎行李倧使侍臣追及以願見請乃致書而還七月授禮部恭政閏十一月復同文臣庫爾禪等責朝鮮縱匪越境隐匿逃人諸罪李倧乃引咎願輸忱入貢八年太宗親征明至大同滿達爾漢分兵克四堡一臺又攻王家荘拔其城叙功授騎都尉世職尋擢禮部承政復奉使朝鮮崇徳二年隨武英郡王阿濟格征明攻克皮島賜白金裘馬三年更定官制六部承政各留一員餘皆改為恭政滿達爾漢任承政如故七年五月命同大學士范文程等宴明國和議使臣順治元年世祖章皇帝定鼎京師滿達爾漢以年老觧部務專任佐領二年晉世職三等輕車都尉遇恩詔晉二等尋卒賜祭𦵏如典禮諡敬敏立碑墓道第十子阿哈丹襲職兩遇恩詔晉一等輕車都尉兼一雲騎尉以一等侍衛從征福建擊海冦於厦門陣亡康熙二年卹贈三等男以其子武格襲舒里琿舒里琿滿洲正黄旗人姓棟鄂先世居瓦爾喀祖喀喇當太祖髙皇帝時率族來歸以從征有功授佐領賜號巴圗魯天命四年與明總兵劉綎戰身被七創後以創發卒父札福尼太宗文皇帝天聰四年隨大兵征明灤州我兵三人被執札福尼衝陣力援之出叙功予騎都尉世職八年十二月隨步軍統領巴竒蘭等征黒龍江有功加一雲騎尉崇徳八年卒舒里琿襲職舒里琿初任䕶軍校天聰五年從征大凌河城内蒙古兵出戰舒里琿擊卻之世祖章皇帝順治二年隨英親王阿濟格征流賊李自成至延安府七戰皆㨗自成遁湖廣追躡至安陸府獲賊船十有四三年蘇尼特部騰機斯叛舒里琿隨豫親王多鐸往征斬獲無算並擊敗喀爾喀土謝圗汗及碩類汗兵師還授佐領六年隨端重親王博洛征大同叛鎮姜瓖擊敗偽巡撫姜建勲等十一年擢䕶軍恭領十五年任正黄旗滿洲副都統隨信郡王多尼征雲南擊李成蛟於凉水井追至雙河口敗李定國兵凱旋晉三等男十八年八月卒子穆里琿襲爵舒里琿之弟洛多歡天聰七年隨貝勒岳託征明旅順口克其城崇徳六年圍錦州敗明總督洪承疇兵七年隨貝勒阿巴泰征明攻順徳府城先登取之賜號巴圗魯予三等輕車都尉世職後遇恩詔晉至一等輕車都尉兼一雲騎尉順治十七年卒以札福尼第四子崆古圗襲職崆古圗初隨靖南將軍辰泰征福建先登克興化城由䕶軍校洊擢叅領聖祖仁皇帝康熙十三年隨副都統雅賚阿喀尼等征逆藩耿精忠由安慶進江西敗賊於小孤山復彭澤宜黄崇仁樂安等縣十五年移師征逆藩吳三桂擊敗賊将夏國相於萍鄉進征湖南十八年敗賊将吳國貴於楓木嶺復武岡州尋還京二十四年卒子多博海襲職舒里琿之孫特爾勤穆里琿之次子也任佐領康熙二十年隨征南大将軍賚塔征逆孽吳世璠敗賊将何繼祖等奪石門坎黄草壩乘勝拔嵩明州城直抵雲南省復隨都統希佛擊敗賊将馬寳於烏木山又追蹙賊将胡國柱於雲龍州叙功予騎都尉世職四十一年卒子素爾禪襲帑山努山滿洲正黄旗人姓札庫塔世居鄂里父塔克都當太祖髙皇帝時率衆來歸後命其長子瑚什屯轄其衆為佐領積功授三等輕車都尉世職無子以努山之子渾岱為子瑚什屯既卒渾岱襲職努山代理其事每從征伐輙先驅覘敵有斬獲授前鋒叅領天聰八年五月太宗文皇帝嘉其能事諭羣臣曰姪不如弟親以渾岱所襲職改命努山襲之八月太宗親征明大同努山同恭領席特庫納海擒明哨卒以獻崇徳元年六月率甲士偵明邉境至冷口遇哨卒十四人斬三人生擒一人獲馬十餘三年隨貝勒岳託征明将入邉斬首四十級俘三人發敵所伏火藥五處至宻雲東北墻子嶺明薊遼總督吳阿衡率步騎六千拒戰既擊敗之復與前鋒統領勞薩等乘勝追擊潰卒獲馬數十及軍械礮具進薄燕京明以騎兵五百設伏謀襲我軍太監髙起潜又率兵躡我軍後努山與勞薩擊走伏兵旋自設伏道側以少卒誘起潜戰夾擊之斬獲甚衆是夜起潜復襲我前鋒營努山與叅領鄂兊席特庫合兵奮擊大破敵衆追扺㑹通河溺死者無算遂次涿州分路畧地並隨睿親王多爾衮至山東克濟南府振旅出邉同勞薩擊谷口步軍敗之六年七月與侍衛穆章等率兵偵敵董家口喜峰口斬級百餘生擒四人是年從大兵圍錦州明援兵踵至太宗自将擊之陳師松山杏山間敵騎兵犯我前鋒努山力擊斬首五十有二獲馬三十明總督洪承疇悉衆來戰努山與勞薩等陣而前戰良久㑹王貝勒等各率所屬兵至合擊之大破其衆追至城塹而還十月擢前鋒統領尋奉命馳赴杏山是時武英郡王阿濟格駐兵杏山河岸敵以千騎自寕逺來窺猝遇努山驚潰努山追敗之於連山斬級三十獲馬三十二七年三月略明寕逺有中後所敵騎五十犯我牧地即率前鋒兵縱擊並敗其援兵四百寕逺守将背城而陣努山與前鋒統領吳拜破其陣生擒二十三人是年叙功晉二等輕車都尉八年四月太宗以貝勒阿巴泰等征明山東未還命努山偕恭領四侍衛四率兵九十至界嶺口偵大軍距邉逺近遇明兵邀戰斬其守備及步騎三百餘生擒數十人獲馬驘牛二百餘還奏命以所俘獲分賚從征将士八月同䕶軍統領阿濟格尼堪率兵駐防錦州順治元年世祖章皇帝定鼎燕京命努山統左翼前鋒隨豫親王多鐸追𠞰流賊李自成至陜州距潼闗二十五里賊據山為陣謀拒我師帑山率兵由間道趨賊營斬獲過半賊潰竄二年移師定河南下揚州進克江寕明福王朱由崧遁走努山與諸将追擊於蕪湖殱敵甚衆由崧為其總兵田雄等執以獻三年隨貝勒博洛征浙江明總兵方國安列營錢塘江東岸分布舟艦來犯努山與都統圗賴徑渡上流悉精鋭擊之國安望風驚潰盡獲其舟艦遂進征福建斬其巡撫揚廷清李暄芬時䕶軍統領都爾徳等攻下建寕延平明唐王朱聿鍵走汀州努山馳七晝夜追及則已閉門堅守乃令鋭卒用巨木撞之門闗壞大軍並進遂擒聿鍵五年隨鄭親王濟爾哈朗征湖廣時明桂王朱由榔據廣西其總督何騰蛟總兵王進才馬進忠袁宗第等猶踞湖南郡邑六年正月努山至長沙同右翼前鋒統領席特庫簡精鋭趨湘潭遇迎戰者輒擊敗之與都統阿濟格尼堪等破北門入騰蛟就擒四月同兵部尚書阿哈尼堪等㣘寳慶距城七十里進才進忠糾衆抗拒努山令軍士舍騎步行連戰皆㨗直薄城東門進才等潜遁追𠞰至武岡殱進忠所屬步卒三千連破進才宗第等十餘寨分克沅州靖州進定全州擒斬其閣部楊鰲及副将恭将等官四十餘人俘獲無算七年九年三遇恩詔晉爵二等男世襲十三年擢内大臣十五年九月卒賜卹如典禮立碑墓道子托岱襲爵覺羅阿克善覺羅阿克善滿洲正黄旗人景祖翼皇帝兄索長阿之三世孫也崇徳六年以恭領隨大軍征錦州敗明總兵吳三桂及松山杏山援軍師還副都統索海為敵所襲阿克善同䕶軍統領伊爾徳往援奮擊卻之又隨大軍連敗明總督洪承疇兵授雲騎尉世職八年鄭親王濟爾哈朗征明寕逺分兵攻前屯衛阿克善先登克其城晉騎都尉世祖章皇帝順治元年隨睿親王多爾衮入山海闗擊敗流賊李自成叙功加一雲騎尉遇恩詔晉三等輕車都尉七年三月擢正黄旗滿洲副都統七月兼任工部侍郎八年調兵部再遇恩詔晉世職至一等輕車都尉九年同都統噶達渾征𠞰鄂爾多斯部叛逃䝉古多爾濟等殱其衆於賀蘭山初興安總兵任珍以家属淫亂擅殺多人賄嘱部臣寝議十年春事覺降阿克善世職為騎都尉兼一雲騎尉觧兵部任管副都統事如故十一年七月署都察院左都御史尋仍專任副都統隨征湖廣敗賊兵於湘潭常徳龍陽十三年鄭親王世子濟度征海賊鄭成功阿克善率兵從大軍至烏龍江以水險難渡乃潜取道山間徑趨福州未至聞鄭成功在髙齊即分兵令佐領褚庫等先往迎戰擊走賊衆千餘又分遣署䕶軍統領伊巴克圗率兵往侯官征𠞰水路賊衆敗之遂至福州偵知賊船三百餘尚泊烏龍江阿克善自由水路約營總星鼐等由陸路合擊追至江口擒偽都督總兵等俘獲甚衆明年賊犯羅源縣我駐防兵被圍阿克善率兵赴援遇賊力戰陣亡十六年三月晉三等輕車都尉世職子塞克森襲賚圗庫賚圗庫姓顔扎世居葉赫父安達哩於太祖髙皇帝時來歸予騎都尉世職𨽻滿洲正黄旗屢從太宗文皇帝征明積功至三等輕車都尉及太宗升遐安達哩號呼累日以殉世祖章皇帝特予三等男爵世襲罔替以其子賚圗庫襲賚圗庫初任侍衛天聰五年從太宗征明圍大凌河城同佐領尼塔哈畧錦州城内突出兵五千餘摶戰賚圗庫擊敗之復同尼塔哈破明監軍道張春兵崇徳元年從征朝鮮途遇朝鮮騎兵千餘偕衆擊卻之三年隨貝勒岳託征明至通州遇明兵臨河列營同佐領瑚彌色擊敗其衆進兵山東至濟南府敵兵五百迎戰賚圗庫率䕶軍奮擊斬二十餘級獲馬十六師旋復破敵營於臨清城西六年從征松山明總督洪承疇引兵十餘萬拒戰我兵既擊敗之其總兵曹變蛟使潰卒乘夜突犯御營賚圗庫奮力捍禦手斬一人餘衆悉遁竄尋隨鄭親王濟爾哈朗敗明杏山兵斬馘甚衆又設伏於髙橋敵乘夜來犯擊却之斬騎兵二人射殪五人生擒二人順治元年隨大軍入山海闗擊敗流賊李自成叙功並屢遇恩詔晉爵至一等子九年正月世祖追念賚圗庫之父安達哩忠悃久著特命立碑墓道三月以賚圗庫列議政大臣尋擢内大臣兼佐領聖祖仁皇帝康熙十二年諭奨久著勞績諸大臣加賚圗庫太子少保二十二年十月卒賜祭𦵏如例孫錫喇襲濟席哈濟席哈滿洲正黄旗人姓富察佐領本科里之次子也初任佐領太宗文皇帝崇徳四年擢授䕶軍統領五年隨鄭親王濟爾哈朗征明錦州遇松山兵邀戰同恭領布丹希爾根囊古等擊却之尋駐義州衞我兵屯田上誡諭諸将勿與敵迎戰惟固守營壘俟敵近乃禦擊㑹敵猝犯鑲藍旗營濟席哈越鑲紅旗營助戰以擅離汛地論罪籍家財三之一罷䕶軍統領旋奉命同副都統席特庫率䕶軍並外藩䝉古兵征索倫部擒部長博穆博果爾並獲其家属人衆及馬牛數百六年正月凱旋遣官迎於北驛館賜宴勞之是年復隨鄭親王圍錦州屢擊敗松山敵兵七年授正紅旗蒙古副都統八年兼任户部恭政世祖章皇帝順治元年大兵入山海闗濟席哈同都統恩格圗擊敗流賊李自成追至望都叙功授騎都尉世職二年隨端重親王博洛征浙江既下杭州以副都統駐守時明福王朱由崧已滅其大學士馬士英總兵方國安據嚴州糾衆二萬餘屢犯杭州濟席哈督兵禦擊五戰皆㨗尋還京仍任工部侍郎四年考滿加一雲騎尉五年三月命率兵駐防東昌府尋以海賊鄭彩等㓂掠福建移兵隨靖南将軍辰泰征𠞰賊據長樂連江同安平和等縣並合兵攻復之叙功晉二等輕車都尉七年四月調刑部侍郎十二月遷本部尚書兩遇恩詔晉爵三等男九年授正紅旗䝉古都統仍兼刑部尚書列議政大臣十年三月觧尚書任九月膠州總兵海時行叛濟席哈奉命與副都統瑚沙率兵往𠞰師未至時行奔宿州漕運總督沈文奎與山東總督馬光輝合兵𠞰擊時行窮蹙降伏誅詔濟席哈移兵鎮守湖南十一年召還復署刑部尚書尋仍命專管都統事十四年四月調滿洲都統十二月命率副都統四員䕶軍𠫭領八員赴寕南大将軍宗室羅託軍前征明桂王朱由榔十五年大兵三路並進上以征南将軍卓布泰自廣西征貴州所部兵較少命濟席哈率領将士助之遂進次都勻連敗其晉王李定國之兵合湖南四川兩路師攻克雲南城逐由榔入緬甸十六年頒賚有功諸将濟席哈得賜蟒服鞍馬十七年以勘鞫隨征将士功罪不實降世職為一等輕車都尉停其叙功十八年山東土賊于七糾黨據棲霞縣之岠嵎山出掠郡邑聖祖仁皇帝命濟席哈為靖東将軍率兵圍其山寨斬賊無算于七竄入海賊平康熙元年五月班師八月卒賜祭𦵏如例子阿禄襲職六十年阿祿任西安副都統上疏為濟席哈請諡允之追諡勇壮欽定八旗通志卷一百四十八
