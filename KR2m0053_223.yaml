body:
  text: 人物志八十九忠義傳一滿洲八旗一八年共九十一人開國至天聰謹按昭忠祠列傳乆有成編凡仗節死綏之臣得預馨香均登簡牘故自敬謹親王以下凡大臣殁聖朝於王事者無不備書以見偏禆茍能効命疆場無褒崇之典上至親貴下至不流芳百世惟是史家之例凡名臣貴秩别有事跡可徴功業可傳者雖縶馬埋輪捐身鋒鏑皆自為列傳不入忠義傳中盖執干戈以衛社稷特其大節之一端不足以盡其生平故轉不以忠義標目也今從其例凡昭忠祠列傳所載已見于宗室王公傳大臣傳者悉不複登惟行事不甚表見名位又非通顯者乃彚列此門以昭闡微顯幽之大義又昭忠祠列傳皆以時代為後先今既為八旗通志全書皆以八旗分編此一門未可互異故今亦以八旗為序以符體例焉業中額業中額滿洲鑲黄旗人姓𤓰勒佳氏世居訥殷地方其父山燕於國初率八十人來歸業中額授貝勒䕶衞癸巳年九月烏喇國貝勒布占泰復行背盟太祖髙皇帝親統大兵往征之布占泰率兵三萬越伏爾哈城業中額奮勇進撃之殁於陣賞卹如例阿達海阿達海滿洲鑲黄旗人姓鈕祜禄氏果毅公額亦都巴圖魯第五子也初管佐領太祖髙皇帝時任二等侍衞兼班領辛亥年冬十二月從大兵征渥集部之虎爾哈路克扎庫塔城有功旋隨碩翁科洛巴圖魯費揚古征哈達力戰殁於陣賞卹如例納爾察納爾察滿洲鑲黄旗人姓鈕祜禄氏以軍功賜備禦世職歴任副都統國初從征烏喇有登城克敵功尋攻沙嶺遇賊來犯時大兵未集納爾察奮戈獨進遂殁於陣順治元年追諡果壯貝和貝和滿洲鑲黄旗人姓墨爾哲勒氏世居松花江地方任三等侍衞國初從大兵征西路撃賊於克爾倫力戰陣亡恩賜雲騎尉世職承襲詳見世職表巴希巴希滿洲鑲黄旗人姓富察氏世居納殷地方天聰元年五月以騎都尉隨多羅大貝勒代善等征明攻錦州城中敵兵出戰我兵迎撃之復驅入城巴希與覺羅拜山不待大兵至奮勇先登戰殁於陣恩賜二等輕車都尉世職承襲詳見世職表覺羅阿賴覺羅阿賴滿洲鑲黄旗人景祖翼皇帝之曾孫也天聰三年十二月太宗文皇帝征明阿賴率兵五百名往視薊州遇明山海關步兵五千來援奮勇力戰陣亡恩賜騎都尉世職承襲詳見世職表尼馬禪尼馬禪滿洲鑲黄旗人世居馬佳地方即以地名氏國初來歸初襲兄赫東額一等男縁事革爵後復授騎都尉天聰五年七月從太宗文皇帝征明大凌河明監軍道張春率兵來援尼馬禪奮勇衝撃被傷身亡賞䘏如例和托諾和托諾滿洲鑲黄旗人姓烏爾古宸氏世居木楞地方天聰初来歸以招阿庫里尼滿地方有功賜丁壯十户即將阿庫里尼滿人丁編佐領使統之八年八月從太宗文皇帝征大同至沙城力戰陣亡恩賜騎都尉世職承襲詳見世職表都敏都敏滿洲正黄旗人姓伊爾根覺羅氏世居董鄂地方以叅領兼佐領事國初從大兵征索爾和力戰陣亡恩賜備禦世職納海納海滿洲正黄旗人姓𤓰勒佳氏直義公費英東之子昭勲公圖賴之兄也初任叅領駐防千山累功加騎都尉世職以從征旅順口擊賊陣亡進世職為三等輕車都尉其子古爾漢襲卒其次子古蘇襲積軍功進三等男贈納海如其官貴三貴三滿洲正黄旗人姓哲爾徳氏世居烏喇國初以佐領從大兵征索爾和戰歿恩賜三等輕車都尉世職承襲詳見世職表延都延都滿洲正黄旗人姓錫克特理氏世居松花江地方任佐領於天命六年三月隨太祖高皇帝大兵征明瀋陽城奉集堡遇明總兵李秉誠等援兵力戰歿於陣賞䘏如例五岱五岱滿洲正黄旗人任烏喇佐領於天命六年隨大兵攻輝發戰遼東奪嗒思哈橋掌纛士中礮仆地五岱代舉纛前至城下為飛石所中遂歿於陣孫胡什塔兒任七品官代䝉阿代䝉阿滿洲正黄旗人姓賴布氏世居佛阿拉地方國初來歸任佐領管理糧餉天命六年隨大兵征遼東力戰陣亡賞䘏如例滿達禮滿達禮滿洲正黄旗人姓納拉氏世居布顔舒䕶魯任佐領世職天命六年隨額駙揚古利取瀋陽克之乘勝進攻遼陽力戰歿於陣子舒書襲書穆魯書穆魯滿洲正黄旗人姓𤓰勒佳氏世居蘇完地方任筆帖式天命七年隨太祖高皇帝征明廣寧至沙嶺力戰歿於陣賞䘏如例巴雅爾圖巴雅爾圖滿洲正黄旗人姓伊爾根覺羅氏世居葉赫地方初以戰功授雲騎尉天命六年從大兵征明克遼東奪嗒思哈橋論功授騎都尉世職十一年正月從太祖高皇帝征明寧逺力戰陣亡賞䘏如例松阿里松阿里滿洲正黄旗人姓興嘉氏世居貝坤沙秦地方國初從征歴有戰功後隨大兵攻查庫塔豁屯力戰中傷歿賞䘏如例台弼善台弼善滿洲正黄旗人姓扎庫塔氏世居噶哈禮璧翰之鄂里噶山初監逰牧天命三年從大兵征明攻撫順馬哈達村有功賞給牛馬四年攻界凡執纛人乘馬被創仆台弼善代執其纛見一人來犯直入生擒之又從征哈達及豐濟堡有功我兵遇明兵于哈爾土滸衆皆奔潰台弼善獨冒矢石翼納冷格以出進取平樂堡以第二人登城克之復賞給馬匹天聰三年隨大兵征明北京與明經畧袁崇煥力戰陣亡恩賜騎都尉世職承襲詳見世職表視其秩賜以金阿海阿海滿洲正黄旗人姓博爾濟吉特氏世居烏魯特地方天聰四年二月隨大兵征明攻遵化城越衆先登力戰歿於陣恩賜騎都尉世職承襲詳見世職表瓦爾喀瓦爾喀滿洲正黄旗人姓薩克達氏世居布爾哈天聰五年隨太宗文皇帝征明圍大凌河明監軍道張春率兵來援瓦爾喀力戰陣亡恩賜雲騎尉世職承襲詳見世職表額爾機根額爾機根滿洲正黄旗人姓舒穆禄氏英誠武勲王揚古利之族孫也初以軍功授雲騎尉天聰二年從大兵征明克錦州城論功加授騎都尉三年十二月從太宗文皇帝率兵五百名往視薊州遇明山海關步兵五千來援額爾機根力戰陣亡八年恩賜一等輕車都尉兼一雲騎尉世職承襲詳見世職表覺羅喇達覺羅喇達滿洲正黄旗人天聰三年從太宗文皇帝征明大敗明兵於都城進攻薊州力戰陣亡八年恩賜佐領世職承襲詳見旗分志阿巴泰阿巴泰滿洲正白旗人姓覺羅氏世居覺爾察地方太祖高皇帝時任扎爾固齊兼佐領庚戌年冬十一月隨額亦都巴圖魯招撫東海渥集部之那木都魯綏分寧古塔尼馬察四路降其長康果里等十九人令其家口前行既回兵復撃取雅攬路阿巴泰力戰陣亡以其子新泰襲騎都尉世職新泰歴陞至䕶軍統領亦戰歿自有傳耶陳耶陳滿洲正白旗人姓舒穆禄氏世居朱社禮堡國初來歸太祖高皇帝遇之甚厚賜馬三十匹甲三十副裘三十襲及御服等物甚備又以其居處甚逺賜角勒地方田百頃令携家口作樓以居焉辛亥年從征哈達攻其城奮勇先登力戰歿於陣恩賜輕車都尉世職承襲詳見世職表托栢托栢滿洲正白旗人姓他塔喇氏世居東安地方太祖高皇帝時額駙也奉命守禦東安㑹賊來犯率兵奮撃敗之追逐餘衆中礮陣亡賞䘏如例席爾泰席爾泰滿洲正白旗人世居董鄂以地為氏國初隨父綸布率所屬來歸賜名魯克素編佐領使統之積功晉十六大臣之列授逰撃世職天命六年從大兵征瀋陽明總兵陳策統四川兵三萬由黄山渡渾河來援與我軍鏖戰不退席爾泰隨後軍助戰大敗之追至渾河歿於陣子拉都襲職後亦陣亡自有傳西佛西佛滿洲正白旗人姓他塔喇氏世居查庫木地方初任叅領於天命六年三月隨太祖高皇帝大兵征明瀋陽攻其城於正藍旗所轄汛守遇明兵力戰陣亡恩賜騎都尉世職承襲詳見世職表翁克翁克滿洲包衣正白旗人任䕶軍叅領兼佐領於天命六年從大兵征明錦州奮勇力戰陣亡賞䘏如例西漢西漢滿洲正白旗人姓董鄂氏父倫布率四百人來歸太祖高皇帝賜名魯克素編其屬為佐領西漢襲父職以功加騎都尉天聰中卓農額駙屬下䝉古有逃去者西漢追獲盡殱之又從征朝鮮攻靉陽城西漢偕二十人先登克之進攻三塔力戰歿于陣恩賜三等輕車都尉以其子鄂碩襲其後鄂碩子費揚古為寧逺大將軍征噶爾丹有功封一等公追贈西漢公爵卓爾糾卓爾糾滿洲正白旗人姓托科羅氏世居虎爾哈天命六年太祖高皇帝統兵往征虎爾哈卓爾糾率衆來歸授備禦世職天聰三年從大兵征明派運草束遇明兵力戰陣亡子圖那襲職後亦陣亡自有傳音達䕶齊音達䕶齊滿洲正白旗人姓伊爾根覺羅氏世居窪洪萼漠地方初以戰功得騎都尉世職縁事革職天聰四年二月由廢員從大兵征明攻遵化城時第二隊雲梯未至即率三隊雲梯奮勇登城中傷而歿恩賜原官以其兄安塔慕承襲代音布代音布滿洲正白旗人姓他塔喇氏世居扎昆木地方太祖高皇帝時率子弟及族屬來歸編其衆為佐領即令統之每出征輙有功所獲馬匹生畜無算累功加世職至三等子天聰八年以蒙古喀爾喀扎魯特部落昻安貝勒殺我使者命阿巴泰台吉等統兵三千征之代音布為前鋒率精鋭五十人馳百餘里遇昂安兵奮撃敗之昂安復引衆拒戰代音布持矛格鬪身中數十箭仍督兵衝突卒斬昂安貝勒及其子代音布以傷重遂歿恩賜一等子世職承襲詳見封爵表巴都里巴都里滿洲正白旗人姓佟佳氏世居馬察地方初率五百丁來歸太祖高皇帝以其衆編為佐領令巴都里管理並授為扎爾固齊旋擢都統兼禮部承政以勞績加三等輕車都尉天聰八年五月出征大同攻王家荘城巴都里奮勇督戰遂亡於陣恩賜三等男以其子卓羅襲後卓羅以功加二等伯追贈巴都里如其爵多禮善多禮善滿洲正白旗人姓吳扎庫氏世居綏分地方初攻北京時分路攻遵化以第三人登城克之論功授雲騎尉天聰八年八月從太宗文皇帝征明大同奮勇力戰陣亡恩賜騎都尉世職承襲詳見世職表新泰新泰滿洲正白旗人姓覺羅察氏父阿巴泰在十扎爾固齊之列兼管佐領事太祖時巴雅喇部將圖勒申圍寧古塔阿巴泰奉命攝本翼統領給兵符救之撃敗圖勒申阿巴泰亦被創卒新泰其長子也從征累功賜備禦世職天命六年從大兵攻遼陽新泰力戰㧞之以功加授世職為輕車都尉任䕶軍統領十一年攻寧逺力戰歿于陣子噶思海襲職喀爾哈那喀爾哈那滿洲正白旗人天聰八年八月以驍騎校隨太宗文皇帝征明大同戰歿于陣恩賜雲騎尉世職承襲詳見世職表瑚什布瑚什布滿洲正白旗人姓𤓰勒佳氏世居葉赫地方天聰八年八月以䕶軍校隨太宗文皇帝征明大同克其關廂復奮勇進取大城中礮身亡恩賜騎都尉世職承襲詳見世職表額爾碧赫額爾碧赫滿洲正白旗人姓𤓰勒佳氏世居瓦爾喀地方天聰八年由閑散隨貝勒阿巴泰征大同攻左衞首先登城歿于陣恩賜騎都尉世職承襲詳見世職表努三努三滿洲正白旗人姓李佳氏世居李佳和羅地方初任佐領天聰八年從征大同隨睿親王多爾衮畧地至五臺山攻上壘不下王令再攻之努三使人立雲梯越衆先登被殺王給衣馬收葬之賞䘏銀三百兩賽音達理賽音達理滿洲正紅旗人姓鄂托氏世居赫圖阿拉國初來歸授佐領隨太祖高皇帝征羅察克烏喇進至江濵遇敵力戰歿恩賜雲騎尉世職承襲詳見世職表岳樂順岳樂順滿洲正紅旗人任叅領天聰七年六月從貝勒岳托等征明攻旅順口乘船進撃至城下先登戰歿恩賜佐領世職承襲詳見旗分志和託和託滿洲鑲白旗人姓索綽羅氏世居吉林地方初襲兄納宻達陣亡雲騎尉世職國初隨大兵征烏龍江戰歿于陣其世職以兄羅薩襲和羅和羅滿洲鑲白旗人姓伊爾根覺羅氏世居佳渾以佐領隨太祖高皇帝屢著戰功尋從額駙揚古利克烏喇進征輝發力戰歿恩賜雲騎尉世職承襲