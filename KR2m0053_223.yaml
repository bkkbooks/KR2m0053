早從征伐積功授遊擊世職甞從攻沙嶺城領五佐領纛越衆先至敗敵有攻天命十一年從太祖高皇帝征明寧逺未下命以本旗兵攻覺華島賞白金百兩太宗文皇帝即位八旗設十六大臣拜蘭為正黄旗大臣天聰三年從征明至北京城下奮擊明滿桂黒雲龍等四總兵軍大敗之七年隨征旅順口與薩穆什喀並舟先入奮擊岸上兵面及肩脇俱被創復前進敗其一隊乃大呼孰能超躍先登者吾必以奏上并啟之貝勒於是雍舜朱瑪喇超躍登拜蘭率兵繼之兵少動拜蘭又大呼曰殺敵人整而復入遂克之乃以破敵有方晋三等男八年十二月奉命管步兵副都統事率章京四十一兵二千五百往征黒龍江太宗諭之曰爾等兹行道逺務直前慎毋惮勞少怠也俘獲者用善言撫慰飲食甘苦一體共之則無所疑畏而歸者必益衆且其地人民語音與我國同携之來皆可為我用攻略時宜語之曰爾我之先世本一國版籍甚明爾向未之知以是甘於自外我皇上乆欲遣人開示特時有未暇耳今日之舉盖為爾計也如此諭之有不翻然歸者乎爾等其勉體朕意大丈夫受委任當輙圖報稱語云少壯不努力老大徒傷悲若此時不力圖建竪異日雖悔何益耶隨賜食又諭曰入略之後或送俘必經由席北綽爾門地為便將來遣人迎及餽糧亦必相待於此處其應略地須鄉導有夏姓武因屯長喀拜從役二人庫魯木圖屯長郭爾敦從役三人及納屯一人適已偕至今俱令其從軍矣爾等可率以往所經路詢即知若彼處已略定此三屯者不可稍侵擾宜令留本處仍諭以爾等輸誠來歸乃使復還故土後宜益恭順倘往來稍間譴責立至矣若所略弗如願則不必留此三屯當盡携來凡器用之屬有資軍實者亦無使遺棄軍還務結隊而行不可分散爾等其凛遵焉乃命貝勒薩哈亷杜度都統納穆泰等送至二里外拜蘭按旗分列簡士卒閲器械集諸將宣勅諭畢遂啟行九年四月拜蘭遣兵部啟心郎額色黒伊木布等疏報收服編户二千四百八十有三丁口七千三百有二又俘獲婦人子女一百十有六並牲畜皮物無算五月盡克其地携其氓户而還獻所俘獲太宗嘉其出征勞苦即以所俘獲者分賜之叙功進一等男十年二月以前征旅順口時所被創復潰卒恩賜三等子世職承襲詳見封爵表布哈布哈滿洲正藍旗人姓舒穆禄氏世居訥殷江地方國初來歸拜常阿等四村人叛布哈率兵定之以所獲俘來獻論功授輕車都尉世職天命六年三月隨太祖高皇帝征明瀋陽攻其城明奉集堡總兵李秉誠等引兵來援掩襲猝至布哈奮勇争先力戰歿於陣以子花山襲職布噶布噶滿洲正藍旗人姓舒穆魯氏世居訥音江以拜常阿等叛統兵平定之俘獲無算叙功授二等㕘將世職天命六年隨大兵取瀋陽奮勇争先戰殁于陣賞䘏如例富克察富克察滿洲正藍旗人姓扎拉理氏世居瓦爾喀地方初授佐領於天命六年從大兵征明北京至昌黎縣遇敵奮勇衝擊殁於陣恩賜三等輕車都尉世職承襲詳見世職表勞漢勞漢滿洲正藍旗人姓他塔喇氏世居扎庫木地方天命時從大兵攻撫順城以第一人先登克其城天聰元年從大貝勒濟爾哈朗阿敏征朝鮮攻義州潜夜登城戰殁恩賜騎都尉世職承襲詳見世職表名葢名葢滿洲正藍旗人姓𤓰勒佳氏世居哈達天聰三年為䕶軍從征大同攻朔州繼額爾畢赫以第二人登城戰殁於城上恩賜雲騎尉世職子商吉圖承襲以孫查克覃官贈光禄大夫布爾機布爾機滿洲正藍旗人天聰四年從太宗文皇帝征明圍永平冐火登城克之遂駐永平明山海闗援兵來犯布爾機越衆陷陣力戰殁恩賜備禦世職子梭爾敏襲達穆布達穆布滿洲正藍旗人姓覺爾禪氏大海巴克什之兄也初管武備院事天聰五年七月從太宗文皇帝征明大凌河與明監軍道張春兵力戰陣亡恩賜雲騎尉世職承襲詳見世職表丹布丹布滿洲正藍旗人任武備院卿天聰五年從太宗文皇帝征明圍大凌河丹布越衆先登戰殁于陣恩賜雲騎尉世職承襲詳見世職表邁格邁格滿洲正藍旗人姓𤓰勒佳氏世居囊武地方天聰八年八月從貝勒阿巴泰征大同攻左衞城奮勇先登戰殁恩賜雲騎尉世職承襲詳見世職表特音珠特音珠滿洲鑲藍旗人姓完顔氏國初率衆來歸太祖高皇帝初編佐領特命兼管六佐領事授備禦世職厯官副將隨大兵進戰每著竒功創痕遍體尋以創發卒子多貝襲彦布禮彦布禮滿洲鑲藍旗人姓𤓰勒佳氏世居瓦爾喀地方初任佐領兼一騎都尉隨太祖高皇帝出征屢立戰功授三等輕車都尉天命六年三月從大兵征明瀋陽力戰陣亡太祖高皇帝悼之親視殮執其手降㫖優䘏其子孫恩賜二等輕車都尉世職承襲詳見世職表圖捫圖捫滿洲鑲藍旗人姓西林覺羅氏世居汪秦村父屯泰國初率其属來歸太祖高皇帝以其衆編佐領使統之屯泰卒圖捫襲父職天聰五年從征明隨五大臣進戰敗明兵於大凌河明監軍道張春率衆數萬來援圖捫復争先迎撃足中火礮不退我師繼進遂破明兵太宗文皇帝聞其傷足親臨撫問圖捫奏言臣無妨觀敵勢已怯易於破滅勿以臣為念是夕卒太宗深悼惜之特賜備禦世職子圖顔圖襲雍正二年勅建昭忠祠祀陣亡殉莭諸臣圖捫以庶官當旁列適其曾孫鄂爾泰任雲南貴州總督以平苗功議叙因請以議叙之官貤封圖捫得㫖加圖捫内大臣兵部尚書銜給與一品誥封昭忠祠牌位改書新銜入於大臣之列愛賽愛賽滿洲鑲藍旗人姓納喇氏世居葉赫地方天聰五年七月以䕶軍校從太宗文皇帝征明大凌河明監軍道張春率兵來援愛賽力戰陣亡恩賜騎都尉世職承襲詳見世職表卓納卓納滿洲鑲藍旗人姓納喇氏哈達國貝勒萬之孫也國初來歸太祖高皇帝以十五户人編為佐領使統焉賜姓覺羅氏天聰五年七月從太宗文皇帝征明大凌河明監軍道張春率兵來援卓納身先士卒力戰陣亡六年恩賜騎都尉世職承襲詳見世職表多貝多貝滿洲鑲藍旗人姓完顔氏世居完顔地方初襲騎都尉世職管佐領事天聰五年七月隨太宗文皇帝征明大凌河明監軍道張春率兵來援多貝身先士卒力戰陣亡恩賜三等輕車都尉世職承襲詳見世職表懋海懋海滿洲鑲藍旗人姓通顔覺羅氏世居雅爾湖地方國初來歸初從征烏喇摧敵有功天命六年從大兵征明破明兵於耀州累官授騎都尉兼佐領天聰六年從征錦州力戰陣亡恩賜二等輕車都尉世職承襲詳見世職表阿爾岱阿爾岱滿洲鑲藍旗人姓覺爾察氏世居瑚濟寨地方碩翁科洛巴圖魯安費揚武第四子也初任佐領天命六年駐防耀州明兵來犯列陣敗之累從征伐以功授備禦世職天聰五年攻大凌河城敵兵突出身先冒矢石衝敵兵遂歿於陣從優賜䘏加世職為三等輕車都尉承襲詳見世職表後以子杜爾德官贈䕶軍統領愛門愛門滿洲鑲藍旗人任佐領天聰七年六月隨貝勒岳託等征明取旅順口伏兵突出抵戰殁於陣恩賜佐領世職承襲詳見旗分志賽必漢賽必漢滿洲鑲藍旗人姓吕氏世居葉克舒窪拉國初來歸從征朝鮮有功授驍騎校天聰八年五月從大兵攻遼東力戰殁於陣賞䘏如例欽定八旗通志卷二百九
