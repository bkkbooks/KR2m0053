正黄旗一名殷輅何天樞佐領王理王琳佐領竇霨觀音保佐領王熙泰胡昌禧佐領名以上正白旗四臧應桐臧亮祖佐領正紅旗一名張聖教孔𫝊斌佐領鑲白旗一名宋文錦高煥佐領張星煥金芝洪佐領周祖榮孟經祖佐領名以上鑲紅旗三高顯貴周偉佐領正藍旗一名劉之珏劉之璉佐領鑲藍旗一名雍正七年己酉科滿洲西成鈕倫佐領成德明通佐領薩穆哈端柱佐領富敏改名敷文鈕倫佐領博通阿覺羅長安保佐領海成包衣闗六十佐領七十四包衣八十佐領上鑲黄旗七名以興泰徳山佐領唐明恩都佐領那善額楞額佐領四哥三達色佐領海屾覺羅八十佐領龍光昱包衣穆克德布佐領以上正黄旗六名白壽白海佐領哥爾泰馬爾遜佐領廣明包衣阿麟佐領上正白旗三名以智亮萬德渾佐領福海包衣薩圖佐領上正紅旗二名以那瞻齊格佐領石麟包衣色勒管領上鑲白旗二名以佛爾清格富海佐領舒禄關禄佐領栢壽包衣林保佐領常生包衣陶色佐領上鑲紅旗四名以傅德阿山佐領明山鄂爾必圖佐領上正藍旗二名以䝉古孟保安甕武圖管領正黄旗一名傅常拉錫佐領正白旗一名漢軍王宗洛胡世勲佐領李林范時統佐領名以上鑲黄旗二王陳慶耿治佐領正黄旗一名黄煃劉漢傑佐領王鈺沈熊耀佐領張鳳詔董成英佐領名以上正白旗三劉増王佐佐領周祖壽孟經祖佐領周祖科孟經祖佐領劉宏緒郭朝愷佐領吕國光高煥佐領五以上鑲紅旗名張宏璽柳楠佐領李彤標李廷炤佐領名以上鑲藍旗二雍正十年壬子科滿洲福隆阿馬輪岱佐領實格哲爾金佐領介福佟世楹佐領把璠包衣寶寜管領烏爾登額包衣八十佐領英亷包衣佛倫佐領上鑲黄旗六名以傅成格伍章阿佐領岳岱常保佐領何明五十佐領舒起博啓佐領天保包衣和尚管領上正黄旗五名以舒善明泰佐領名安圖佛兒托合佐領白壽三保佐領來寳明泰佐領李溥包衣尚志舜佐領以上正白旗五名申圖沙來佐領蘇德包衣色勒管領上正紅旗二名以雙慶達漢佐領佟岱包衣艾納佐領王瀚包衣艾納佐領上鑲白旗三名以薩哈納博爾昆佐領伍章阿博爾昆佐領名以上鑲紅旗二拖穆什鄂金佐領正藍旗一名鄂容安鄂爾竒佐領福宏胡林佐領鶴年春山佐領三以上鑲藍旗名蒙古觀光巴爾泰佐領鑲黄旗一名陸士儀色克慎佐領常平包衣常春管領上正白旗二名以伊貴壽伊勒爾圖佐領正藍旗一名漢軍趙瓉郎應角佐領李輅張正德佐領馬元亮馬元熙佐領李瀚劉保住佐領名以上鑲黄旗四李景晟李景唐佐領正黄旗一名黄煊劉漢傑佐領彭繹祖董成謨佐領邱仰麟包衣李彬佐領以上正白旗三名王繼祖孫紹祥佐領正紅旗一名白炯王殿臣佐領鑲白旗一名王士倧高煥佐領宋文鑑高煥佐領二以上鑲紅旗名田珙包衣六哥佐領正藍旗一名張足法柳德増佐領鑲藍旗一名雍正十三年乙卯科滿洲興寶増壽佐領李繼祖趕生管領趙天爵劉保住管領沐龍阿包衣海六十管領以上鑲黄旗四名文俊納蘭佐領富昌烏爾太佐領懷䕃布德山佐領索柱侯五格佐領納國棟五十佐領五以上正黄旗名良卿六格佐領滿岱三保佐領經聞六格佐領雙頂包衣鄂禮管領上正白旗四名以永禄福寧佐領明英齊軾佐領吳達善納欽佐領圖藏阿恩特赫佐領名以上正紅旗四泰保喜哥佐領仲璉喜哥佐領二以上鑲白旗名福臻蘓章阿佐領伊興阿永在佐領二以上正藍旗名覺羅福欽柱覺羅董國立佐領鐘音額爾圖佐領名以上鑲藍旗二蒙古巴金泰明智佐領鑲黄旗一名諾敏孟六格管領永明白雅思胡朗佐領兆麟白雅思胡朗佐領以上正白旗二名阿林額爾登額佐領鑲白旗一名亢保安太佐領正藍旗一名漢軍徐文瑛齊斌佐領高穎高琦佐領二以上鑲黄旗名同保和尚管領圖爾兵阿包衣馬文煥管領以上正黄旗二名李質頴尚琳佐領蕭欽祖秉基佐領歐靜李月槎佐領曹炳祖魯佐領羅晋蔣普忠佐領富穡克包衣王保住管領以上正白旗六名李蕙蓀包衣鈎勒佐領正紅旗一名劉汝巽趙宏佐領鑲紅旗一名陳居易尚維邦佐領鑲藍旗一名欽定八旗通志卷一百五
