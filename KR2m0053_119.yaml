body:
  text: 選舉志四八旗科第題名二厯科舉人一順治八年辛卯科滿洲䝉古納冷額都爾巴賽音達里高里郝善以上鑲黄旗五名麻勒吉何錫談邁音達阿薩里賽冲阿魏羅渾盧占色勒布穆成額波勒八達里以上正黄旗十一名賽花蟒色額庫里圖克善蘓海色達哈塔吉達額哈拉塔必圖以上正白旗九名三都索濟進州以上正紅旗三名楊官何託滿洲阿顔泰佐領鼐音達哈木倫賽柱拜達兒以上鑲白旗六名馬祜宋蘓保圖克泰吳拉代沙記以上鑲紅旗五名吳爾户正藍旗一名折庫納巴海朱三舒書納布滿洲碩塔佐領雲代莽吉六門都孫以上鑲藍旗八名謹案順治八年議開八旗科舉舊志所載榜文朽爛今恭查順治九年進士題名補載其未經中式進士者則無從考補姑仍原闕謹附識於此漢軍丁思孔林進舉李善范承謨王瑞楊逄泰李祥陳愚陳丹王永昇王彦賔張文學以上鑲黄旗十二名師化民胡獻瑶齊賛宸劉名世張文學王承緒祖澤潤祖應宣佐領齊賛樞以上正黄旗八名許重華任暄猷梁繼祖祖述堯杜千秋陳作楫以上正白旗六名祁登第張懷德劉繼祥以上鑲白旗三名翟元紀振邊黄承運周天建紀振邦紀大禮佐領名以上鑲紅旗五紀世勲張希顔王印昌閻天祐連沛佟彭年張鵬翔于睿明任青雲劉永清以上正藍旗十名李英習全史髙國琇佐領陳永命夏世安曹爚佐領王毓祥郭竒勲以上鑲藍旗六名順治十一年甲午科滿洲蒙古拉色滿洲永在佐領正藍旗一名戴明安滿洲顧塔佐領鑲藍旗一名謹案是科滿洲䝉古舉人舊志所載僅存二人案牘不完之故今仍其舊後仿此漢軍楊應鶚楊繼勲佐領鑲黄旗一名康殿邦張本堪佐領正黄旗一名羅文瑜楊永亨佐領遲炤達淳佐領遲煊達淳佐領梁述祖蔡永文佐領名以上正白旗四銀文燦臧應聘佐領正紅旗一名張大本王之錦佐領鄢翼明孔𫝊斌佐領蔡廷輔何宏愷佐領名以上鑲白旗三張登選佟國鼐佐領張登舉佟國鼐佐領名以上正藍旗二康熙二年癸卯科滿洲齊蘭寶撥爾盆佐領阿蘓本占佐領蘇黒博濟佐領三以上正黄旗名温達道拉佐領葛木倍道拉佐領蘇木布魏大善佐領名以上正紅旗三阿山柱伊爾申佐領鑲白旗一名按都百散佐領馬胡科爾坤佐領撒噶萬進佐領三以上鑲紅旗名那爾布羅堪佐領哇世藍噶錫泰佐領名以上正藍旗二者庫納都爾巴佐領邁圖龍世庫佐領烏納哈都爾巴佐領阿哈達龍世庫佐領伍庫達我特虎恩佐領上鑲藍旗五名以䝉古布寄吉兒卓爾賔佐領鑲黄旗一名沙利色勒木蘓佐領正黄旗一名戴屯阿齊圖佐領布達利二吉圖佐領馬尼姑魯顧佐領常書光泰佐領四以上正白旗名白爾格克什圖佐領正紅旗一名顧凛其布達什里佐領八爾答虎八圖佐領二以上鑲白旗名薄爾對朔北海佐領鑲紅旗一名胡什八圖累佐領克什圖馬錫佐領二以上正藍旗名莫代拜松五佐領鑲藍旗一名漢軍李呈芳崔世榮佐領王之卿盧崇耀佐領潘士學劉邦相佐領朱旭張忠佐領孫汝謀范時芳佐領楊應鳳劉光佐領徐炳德𫝊魁佐領祖澤溶趙雲龍佐領金聲遠盧崇耀佐領閻興邦管應祖佐領文謨唐坊佐領周起龍劉光佐領蔡興鎬張昌國佐領王履泰王光宗佐領唐佩唐坊佐領文又新趙雲琦佐領何朝宗劉光佐領金國柱趙雲龍佐領高爾瞻髙進忠佐領孟一桂王光宗佐領黒迎皖范時芳佐領一以上鑲黄旗二十名湯應聘祖植栢佐領徐秉仁熊映斗佐領孫以敬馬承勲佐領王裔李耀祖佐領潘廷侯祖永熙佐領于國柱李耀祖佐領師凛祖澤深佐領李天然尚廷弼佐領連國柱李耀祖佐領謝龍左元尹佐領温興仁馬承勲佐領孫振元尚廷弼佐領齊宗孔張文陽佐領裴國樟張文陽佐領孟鋐張文陽佐領李郁蠻熊映斗佐領王元弼祖澤淳佐領劉毓䕃李朝顯佐領徐必進祖永熙佐領侯應封祖澤深佐領連國棟李輝祖佐領鄧國輔吕朝顯佐領李國維楊文魁佐領三以上正黄旗二十名遲燝額金圖佐領王國泰張素義佐領孫國柱董振國佐領張九經額金圖佐領張三俊陳嘉善佐領蔣國卿陳嘉善佐領陳大典額金圖佐領馬見龍馬元龍佐領王有能陳嘉善佐領楊應春愛音達里佐領白起明王國登佐領一以上正白旗十名劉應魁王鈛佐領李景明吳國極佐領黄殿黄應仕佐領劉希舜臧延鳳佐領熊天寵孫世俊佐領盧士傑王永慶佐領趙鼎實孫世俊佐領趙光裕汪世舉佐領名以上正紅旗八金鏞王之錦佐領白啓明王之璟佐領湯生才李希清佐領郭維垣朱延禧佐領黄家遴沈志仁佐領王業昇李延祚佐領王業昌李延祚佐領郭肇基李延祚佐領佟文耀佟宏器佐領周從禮夏景和佐領張得科祖植檜佐領孟遇時朱延禧佐領熊元珠馬斯良佐領李長庚李延祚佐領孫鴻業鄭延禧佐領李實頴王安邦佐領張秉節盧揚祖佐領卞三益金忠佐領八以上鑲白旗十名姚啓聖柯森佐領王秉誠王秉仁佐領吳游龍趙璉佐領郎秉中申宏諝佐領劉登科柯彛佐領田恩逺陳啟泰佐領田騰龍陳啟泰佐領卞三畏陳啓泰佐領喻良申宏諝佐領蔣維藩郭洪臣佐領高元爵孟熊飛佐領張大成孫應聘佐領盧豫柯彛佐領凃應選王秉仁佐領魯可變羅世清佐領潘士瑞吳國鼎佐領劉文燦郎化麟佐領黄傑王秉仁佐領柯永新尤國才佐領九以上鑲紅旗十名徐萬詵李芳英佐領劉際昌佟國儀佐領梁延年佟壯年佐領何世竒馮天保佐領朱衣貴佟國瑁佐領姜文周六佐領許可榮馬郎阿佐領佟吉年佟壯年佐領曹興隆佟國儀佐領劉宗基周禄佐領李之裕佟壯年佐領一以上正藍旗十名張銘哈爾圖佐領裴國章周儀佐領王汝欽金璽佐領王敷政韓佐周佐領張永茂馬雲程佐領李安國張安恭佐領王永禄許嗣榮佐領名以上鑲藍旗七康熙八年己酉