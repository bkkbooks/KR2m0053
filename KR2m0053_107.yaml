body:
  text: 欽定四庫全書欽定八旗通志卷九十三典禮志十六滿洲祭神祭天典禮五堂子陳設供器皿供獻物品祭神器必用之項造坤寧宫陳設供器做類成造器皿祭神器皿必用之項供獻物品馬神室內陳設供器祭祀器皿必用之項堂子陳設供器饗殿內鑲紅片金黃縀神幔一銅香碟三黃漆大低桌二盛七里香鑲嵌螺鈿漆匣一盛器皿黑漆𥪡匱一挂拍板紅漆木架二黃紗矗燈四紅紙矗鐙三十二亭式殿內供楠木髙案一銅香爐一案下設挂紙錢杉木柱一黃紗矗鐙四亭式殿前中間設立神杆石一兩邉設王貝勒貝子入八分公等立神杆石各一尚錫神亭內供楠木髙案一銅香爐一案下設挂淨紙杉木柱一祭神器皿饗殿內獻酒楠木低桌一盛酒大藍花磁碗二盛酒紅花磁缸二浴佛黃大磁浴池一盛酒大黃磁碗二鐵神刀一三絃一連黃三梭布套琵琶一連黃三梭布套花梨木拍板十亭式殿內獻酒楠木低桌一盛酒大藍花磁碗二盛酒暗龍豆緑磁缸二尚錫神亭內盛酒大藍花磁碗一饗殿內鋪地涼席八方鋪甬路涼席十六方黃縀拜褥二盛拜褥硃漆箱一甬路中路鋪棕毯十八方供獻物品每月初一日堂子供糕酒俱照坤寧宫所供糕酒供獻外四月初八日浴佛供椵葉餑餑醴酒祭馬神正日供打糕醴酒春秋二祭立杆大祭索繩上挂黃緑白三色髙麗紙錢各二十七張亭式殿內挂黃緑白三色髙麗紙錢各二十七張挂紙錢用三色棉線各五錢正月初三日每月初一日四月初八日每逢祭馬神正日亭式殿內挂紙錢各二十七張挂紙錢用三色棉線各五錢每月初一日尚錫神亭內挂淨紙各二十七張不鏤錢文用整髙麗紙必用之項正月初一日亭式殿內點鐙用五兩重黃蠟燭三枝春秋二季大祭用索繩各三條索繩上夾九色綢條每色各九尺楠木神杆木頂各一分松木神杆各一神杆上懸長二丈染黃色髙麗布神幡各一捻索繩棉線各三斤八兩春秋二季染索繩紙錢髙麗布神幡用紫花各五斤槐子各五斤礬各一斤五兩重黃蠟燭各七枝浴佛用紅蜜八兩棉八兩五兩重黃蠟燭七枝十二月二十六日恭請神位供於堂子正月初二日由堂子請神位進宫點鐙籠用五兩重黃蠟燭各四枝坤寧宫陳設供器供朝祭神繪花紅漆抽屉桌一供佛髤金小亭一座一鋪黃青紅三色蟒褥三髤金小亭一連座鋪黃青紅三色蟒褥三恭貯菩薩像黃漆木筒一恭貯關帝神像紅漆木桶一神位前遮蔽黃綢袱一方包褁佛亭菩薩像關帝神像木筒黃縀袱四方請神位用大髙麗紙四張雕龍頭髹金紅漆三角架一對鑲紅片金黃縀神幔一穿繫神幔黃棉線繩一條盛索繩髙麗布囊一繫練麻神箭一枝連黃綢套供夕祭神繪花黑漆抽屉桌一恭貯神位紅漆匣一黑漆架一鑲紅片金青縀神幔一繫神幔黃棉線繩一條供蒙古神有靠黑漆座一連紅片金褥黑貂褥一不鋪設置於匣內包褁夕祭神位黃紡絲袱四方大小鈴七枚穿黃色皮條連樺木桿小鐵腰鈴一分背鐙青表白裏夾綢幕二連黃絲繩鐵環置放腰鈴有靠黑漆小杌一盛銀器花梨木雕龍大匱二小匱十二朝祭夕祭鏤花鍍金銀香碟八西楹設供佛菩薩大亭一連黃片金褥楠木祭天神杆一連楠木圓斗立神杆楠木倚柱一立神杆石一栁樹枝石一盛七里香鑲嵌螺鈿漆匣一祭神器皿供糕酒紅漆大低桌四供肉紅漆長髙桌一獻酒紅漆長低桌一司祝叩頭紅漆小低桌一省豬包錫紅漆大髙桌二供肉銀裏楠木大槽盆二盛血銀裏楠木小槽盆二獻神擺列縀匹紅漆低桌一獻神盛金銀錠繪畫金龍紅漆木碟一三弦一連黃三梭布套琵琶一連黃三梭布套繫三弦琵琶套縧各一條花梨木拍板十一鐵神刀一點香銀筯一雙司祝祝禱時所坐黑漆杌一點香銀瓦壠一點香銀匙一司祝所繫大腰鈴一分閃縀裙一鐡篐鼓一連紅漆架鼓槌手鼓一連包獺皮鼓槌偹用手鼓一連槌包褁手鼓與裙藍三梭布袱一方供糕銀盤十一獻酒銀臺二供酒銀盞十一供獻果品銀碟二十盛酒銀壺一供胙肉銀碗五烏木筯五雙灌血腸銀溜子一盛糕中等銀盤十三盛淨水磁缸二連架蓋打糕石一打糕木榔頭十分肉銅盤六十一灌血腸銅勺一添湯銅海一挹水紅銅勺一盛蜜紅銅壺一盛清酒藍花磁樽十煮肉接口廣鍋二包錫蓋二蒸糕廣鍋一盛胙肉銀鈷子二遮蔽神幔黃粗布袱二遮蔽炕沿褁柱子黃三梭布袱四遮蔽整理腸臟木槽盆白粗布袱二遮蔽盛麵有柄木槽盆三梭布袱九遮蔽盛搓條餑餑方盤三梭布袱十五遮蔽盛肉大盤白三梭布袱六遮蔽盛糕方盤三梭布袱三遮蔽設祭肉大桌黃粗布袱一遮蔽整理腸臟熱水三梭布袱六鋪地油厚髙麗紙三張遮蔽盛肉木槽盆油三梭布袱二鋪地油三梭布袱一遮蔽糕油紡絲袱八遮蔽肉湯油三梭布袱三擡酒樽黃漆架二紅漆竹槓九洗米盛麵擡肉大小有柄木槽盆八盛搓條餑餑方盤二十大小木槽盆二十遮蔽隔扇黃粗布袱二包淨紙索繩黃三梭布袱四遮蔽盛糕食盒畫龍黃三梭布袱二漉酒與湯髙麗布小方七十二塊挹湯亮鐵勺二挹水鐵勺四整理腸臟錫裏杉木槽盆四盛酒藍花磁樽四盛糕黃漆食盒五叩頭所鋪黃花紅氊二方黃縀圍頂八人輿二鋪輿黃紅蟒褥二黃翎氊帽黃縀駕衣帶四十八分黃縀衣帶四分引仗四對連黃綢套遮蓋紅氊紅漆架一偹用架一紅氊一方遮蔽供小肉稗米飯銀碗錫蓋四銀匙二銀三鑲烏木筯二雙祭天紅漆髙桌一切肉絲花梨木方盤桌一紅漆大方盤二切肉絲案板十煮祭天肉紅銅鍋一連紅銅蓋大銅海一擡銅海鈎四連繩擡鍋鈎四連木柄遮蔽雨雪油紙大繖二鐵鐙二祭天遮蔽桌張白三梭布袱二遮蔽方盤白三梭布袱三遮蔽祭天肉腸贓白三梭布袱四求福紅漆大髙桌一大藍花磁碗二黃磁盞九揩抹地白粗布三十方抹布一丈六尺供獻物品正月初三日供饊子三月九月初一日供打糕搓條餑餑四月初八日五月初一日供椵葉餑餑六月初一日供蘇葉餑餑七月初一日供淋漿糕八月初一日供煠餃子常日俱供灑糕求福供打糕煠糕豆擦糕水􅀈子鯉魚稗米飯醴酒三月初一日九月初一日供清酒每月初一日供醴酒常日供淨水正月初三日每月初一日供時鮮果品祭天供稗米飯並灑米立杆大祭次日祭天並祭馬神俱用大豬外每日祭神每月祭天用中等豬每日祭神神幔上挂連四淨紙二張供七里香八碟每次祭天於神杆上夾淨紙一張造做類正月供饊子以紅白稷米各磨麵搓為細條繞挽做成以蘇油煠熟盛於盤內供獻三月春季立杆大祭供打糕搓條餑餑以稷米蒸飯置於石用木榔頭打爛又以炒黃豆磨麵攙合拉成長條另於荍麥麵內攙以稷米麵攪合搓微長條繞攙煠以蘇油與打糕相間層纍擺列朝祭則纍以九層糕之上以做搓條餑餑之麵做成鹿與松塔列於其上盛於盤內供獻夕祭則纍以五層以炒豆麵各一撮置于其上盛於盤內供獻五月供椵葉餑餑以稷米為麵以小豆為饀用椵葉裹包蒸之盛於盤內供獻六月供蘇葉餑餑以稷米為麵以小豆為饀用蘇葉包褁蒸之盛於盤內供獻七月供淋漿糕以蒸稷米為麵入水攪勻盛於布袋內用布袱鋪於蒸篾箆置於其上澄汁下鋪鈴鐺麥外以氊裹蒸熟方切四角分為十分盛於盤內供獻八月供餃子以稷米蒸飯置於石上以木榔頭打之以小豆為饀形式微長用蘇油煠熟盛於盤內供獻九月秋季立杆大祭供打糕搓條餑餑一切造做悉如三月儀惟不用炒豆麵仍以蘇油合做糕上置小豆各一撮常月俱供灑糕以稷米麵層層撒於蒸箆之上下鋪小豆上灑小豆蒸熟方切四角分為十分盛於盤內供獻又名蒸糕四月初八日供椵葉餑餑成造如五月椵葉餑餑法求福供打糕仍以木榔頭打做攙入炒豆麵層纍擺列水􅀈子亦如打糕法豆擦糕則以稷米為麵做為水􅀈子粘以小豆蒸之煠糕亦用稷米為麵做為水􅀈子以蘇油煠之碗內所盛之水􅀈子則以稷米為麵做為小水􅀈子煠熟以水研小豆為末拌以供獻每嵗春秋二季立杆大祭釀所用清酒於四十日前在坤寧宫內西炕前安置釀清酒有臍眼缸之架下放錫接盤接盤下放木板一塊接盤上設缸先將稷米淘洗不留些微渣滓純如淨水後蒸為飯晾涼入於缸內另將麴研為細末以玉泉水沸湯􅭒勻俟稍溫盛於籠屉上所淋麴水亦傾入缸內以拐木攪勻缸之上以有隔眼紅銅絲蓋蓋之其上以布袱遮蔽之若遇天寒以氊遮蔽之自釀酒之日起以神刀壓置缸上十日後仍如前法添入涼稷米飯麴水用拐木攪勻以布袱遮蔽之又過十日不入麴水以蒸稷米熱飯入於缸內仍用拐木攪勻以布袱遮蔽之得酒後以玉泉水滿貯於缸仍用長拐木攪勻次日榨之榨酒將畢稍留酒根復添入玉泉水攪勻二次榨之榨畢出糟粕於缸付之神厨另將稗米磨為細末攙入糟粕內蒸之各為塊或褁以榖草或褁以稻草遮以氊塊俟發二十一日成麴後穿其中為眼以繩貫之挂於竈前每日燒柴百斤燻麴以得其色每月祭神所用醴酒於神厨內釀之預於三日前蒸稷米為飯攪以麴水即貯於樽內亦以小拐木攪勻以布袱遮蔽之若遇冬令置於暖處成造器皿蒸稷米飯整木刳做接口籠屉二蒸糕托蒸箆子椵木撑六蒸稷米飯添水溜子二遮蔽籠屉白布套三遮蔽汲泉水桶黃三梭布袱三遮蔽盛淨水桶白粗布袱十二遮蔽稷米麵白三梭布袱二鋪籠屉白三梭布袱十二盛稷米白粗布夾袋二十做淋漿糕擠水髙麗布夾袋四做淋漿糕遮蓋籠屉蓋油三梭布袱一做淋漿糕遮蔽籠屉白氊一遮蔽做淋漿糕之麵白硬紗袱三紗篩籮底十二遮蔽淋漿糕髙麗布袱六遮蔽酒麴黑氊一盛稷米缸九收貯器皿黑漆竪匱二盛淨水紅漆杉木桶二十鐵篐杉木水桶二連扁擔盛肉絲鐵漏勺一蒸糕鐵鏟二燎頭蹄鐵義五鈎肉鐵鈎四遮蔽竈內火鐵門三分盛骨用包豬皮安鐵篐柱筒二釀清酒有臍眼大缸一連架遮蔽缸有隔眼紅銅絲蓋一安放酒缸松木板一接釀酒缸錫接盤一做蒸箆用線麻半斤做蒸箆秫秸六十束做遮麴水篐用稻草八十捆盛肉鐵漏笊籬四烙鐵一烙鐵板二剪子五碓房內安設碾子二拐磨子一木碓一分金斗一板斗一磨一碗一汲泉水桶十二整理肉松木桌二蒸糕用椵木鏟二做搓條餑餑松木低桌二十盛綢條棉線紅漆盒四盛麵大箥籮四栁斗四大小栁條筐七簸箕八瓢四打糕石一大小栁罐八連繩笤帚六蒸稷米飯廣鍋一炒豆廣鍋一必用之項正月初三日供饊子祭祀做饊子用白稷米四金斗紅稷米四金斗釀醴酒用稷米一金斗五升取煠饊子油蘇子七金斗煮肉蒸糕釀醴酒用柴一千三百斤煮肉盛盤整理腸臟用白鹽五斤時鮮果品十八碟中等豬四二月初一日供灑糕祭祀做灑糕用紅稷米四金斗釀醴酒用稷米一金斗五升白豇豆一板斗二升煮肉蒸糕釀醴酒用柴一千三百斤煮肉盛盤整理腸臟用白鹽五斤時鮮果品十八碟中等豬四三月初一日供打糕大祭做打糕用紅稷米金斗四石釀清酒用稷米金斗一石做搓條餑餑用稷米金斗一石六斗荍麥金斗二石取煠搓條餑餑油蘇子金斗二石黃豆四金斗造麴用稗子米金斗一石煮肉蒸糕釀清酒炒豆煠搓條餑餑用柴五千斤煮肉盛盤整理腸臟用白鹽五斤蒸稷米飯用五兩重黃蠟燭九枝一兩五錢重黃蠟燭八枝黃土二十筐時鮮果品十八碟大豬五四月初一日供灑糕祭祀做灑糕用紅稷米四金斗釀醴酒用稷米一金斗五升白豇豆一板斗二升煮肉蒸糕釀醴酒用柴一千二百斤煮肉盛盤整理腸臟用白鹽五斤時鮮果品十八碟中等豬四五月初一日供椵葉餑餑祭祀做椵葉餑餑用紅稷