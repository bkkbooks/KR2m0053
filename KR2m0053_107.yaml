body:
  text: 欽定四庫全書欽定八旗通志卷九十三典禮志十六滿洲祭神祭天典禮五堂子陳設供噐皿供獻物品祭神噐必用之項造坤寧宫陳設供噐做類成造噐皿祭神噐皿必用之項供獻物品馬神室内陳設供噐祭祀噐皿必用之項堂子陳設供噐饗殿内鑲紅片金黄縀神幔一銅香碟三黄漆大低桌二盛七里香鑲嵌螺鈿漆匣一盛噐皿黒漆𥪡櫃一掛拍板紅漆木架二黄紗矗燈四紅紙矗鐙三十二亭式殿内供楠木髙案一銅香鑪一案下設掛紙錢杉木柱一黄紗矗鐙四亭式殿前中間設立神杆石一兩邉設王貝勒貝子入八分公等立神杆石各一尚錫神亭内供楠木髙案一銅香鑪一案下設掛浄紙杉木柱一祭神器皿饗殿内獻酒楠木低桌一盛酒大藍花磁椀二盛酒紅花磁缸二浴佛黄大磁浴池一盛酒大黄磁椀二鐵神刀一三絃一連黄三梭布套琵琶一連黄三梭布套花梨木拍板十亭式殿内獻酒楠木低桌一盛酒大藍花磁椀二盛酒暗龍豆緑磁缸二尚錫神亭内盛酒大藍花磁椀一饗殿内鋪地凉席八方鋪甬路凉席十六方黄縀拜褥二盛拜褥硃漆箱一甬路中路鋪棕毯十八方供獻物品每月初一日堂子供餻酒俱照坤寧宫所供餻酒供獻外四月初八日浴佛供椵葉餑餑醴酒祭馬神正日供打餻醴酒春秋二祭立杆大祭索繩上掛黄緑白三色髙麗紙錢各二十七張亭式殿内掛黄緑白三色髙麗紙錢各二十七張掛紙錢用三色棉線各五錢正月初三日每月初一日四月初八日每逢祭馬神正日亭式殿内掛紙錢各二十七張掛紙錢用三色棉線各五錢每月初一日尚錫神亭内掛淨紙各二十七張不鏤錢文用整髙麗紙必用之項正月初一日亭式殿内㸃鐙用五兩重黄蠟燭三枝春秋二季大祭用索繩各三條索繩上夹九色綢條每色各九尺楠木神杆木頂各一分松木神杆各一神杆上懸長二丈染黄色髙麗布神旛各一捻索繩棉線各三觔八兩春秋二季染索繩紙錢髙麗布神旛用紫花各五觔槐子各五觔礬各一觔五兩重黄蠟燭各七枝浴佛用紅蜜八兩棉八兩五兩重黄蠟燭七枝十二月二十六日恭請神位供於堂子正月初二日由堂子請神位進宫㸃鐙籠用五兩重黄蠟燭各四枝坤寧宫陳設供噐供朝祭神繪花紅漆抽屉桌一供佛髤金小亭一座一鋪黄青紅三色蟒褥三髤金小亭一連座鋪黄青紅三色蟒褥三恭貯菩薩像黄漆木筒一恭貯闗帝神像紅漆木桶一神位前遮蔽黄綢袱一方包褁佛亭菩薩像闗帝神像木筒黄縀袱四方請神位用大髙麗紙四張雕龍頭髹金紅漆三角架一對鑲紅片金黄縀神幔一穿繫神幔黄棉線䋲一條盛索繩髙麗布囊一繫練麻神箭一枝連黄綢套供夕祭神繪花黒漆抽屉桌一恭貯神位紅漆匣一黒漆架一鑲紅片金青縀神幔一繫神幔黄棉線䋲一條供䝉古神有靠黒漆座一連紅片金褥黒貂褥一不鋪設置於匣内包褁夕祭神位黄紡絲袱四方大小鈴七枚穿黄色皮條連樺木桿小鐵腰鈴一分背鐙青表白裏夹綢幙二連黄絲䋲鐵環置放腰鈴有靠黒漆小杌一盛銀噐花梨木雕龍大櫃二小櫃十二朝祭夕祭鏤花鍍金銀香碟八西楹設供佛菩薩大亭一連黄片金褥楠木祭天神杆一連楠木圓斗立神杆楠木倚柱一立神杆石一栁樹枝石一盛七里香鑲嵌螺鈿漆匣一祭神噐皿供餻酒紅漆大低桌四供肉紅漆長髙桌一獻酒紅漆長低桌一司祝叩頭紅漆小低桌一省猪包錫紅漆大髙桌二供肉銀裏楠木大槽盆二盛血銀裏楠木小槽盆二獻神擺列縀疋紅漆低桌一獻神盛金銀錠繪畫金龍紅漆木碟一三弦一連黄三梭布套琵琶一連黄三梭布套繫三弦琵琶套縧各一條花梨木拍板十一鐵神刀一㸃香銀筯一雙司祝祝禱時所坐黒漆杌一㸃香銀瓦壠一㸃香銀匙一司祝所繫大腰鈴一分閃縀裙一鐡篐鼓一連紅漆架鼓槌手鼔一連包獺皮鼓槌偹用手鼓一連槌包褁手鼓與裙藍三梭布袱一方供餻銀盤十一獻酒銀臺二供酒銀琖十一供獻果品銀碟二十盛酒銀壺一供胙肉銀椀五烏木筯五雙灌血腸銀溜子一盛餻中等銀盤十三盛淨水磁缸二連架盖打餻石一打餻木榔頭十分肉銅盤六十一灌血腸銅勺一添湯銅海一挹水紅銅勺一盛蜜紅銅壺一盛清酒藍花磁罇十煮肉接口廣鍋二包錫盖二蒸餻廣鍋一盛胙肉銀鈷子二遮蔽神幔黄粗布袱二遮蔽炕沿褁柱子黄三梭布袱四遮蔽整理腸臓木槽盆白粗布袱二遮蔽盛麫有柄木槽盆三梭布袱九遮蔽盛搓條餑餑方盤三梭布袱十五遮蔽盛肉大盤白三梭布袱六遮蔽盛餻方盤三梭布袱三遮蔽設祭肉大桌黄粗布袱一遮蔽整理腸臓熱水三梭布袱六鋪地油厚髙麗紙三張遮蔽盛肉木槽盆油三梭布袱二鋪地油三梭布袱一遮蔽餻油紡絲袱八遮蔽肉湯油三梭布袱三擡酒罇黄漆架二紅漆竹槓九洗米盛麫擡肉大小有柄木槽盆八盛搓條餑餑方盤二十大小木槽盆二十遮蔽隔扇黄粗布袱二包淨紙索繩黄三梭布袱四遮蔽盛餻食盒畫龍黄三梭布袱二漉酒與湯髙麗布小方七十二塊挹湯亮鐵勺二挹水鐵勺四整理腸臓錫裏杉木槽盆四盛酒藍花磁罇四盛餻黄漆食盒五叩頭所鋪黄花紅氊二方黄縀圍頂八人輿二鋪輿黄紅蟒褥二黄翎氊帽黄縀駕衣帶四十八分黄縀衣帶四分引仗四對連黄綢套遮盖紅氊紅漆架一偹用架一紅氊一方遮蔽供小肉稗米飯銀椀錫盖四銀匙二銀三鑲烏木筯二雙祭天紅漆髙桌一切肉絲花梨木方盤桌一紅漆大方盤二切肉絲案板十煮祭天肉紅銅鍋一連紅銅盖大銅海一擡銅海鈎四連䋲擡鍋鈎四連木柄遮蔽雨雪油紙大繖二鐵鐙二祭天遮蔽桌張白三梭布袱二遮蔽方盤白三梭布袱三遮蔽祭天肉腸贜白三梭布袱四求福紅漆大髙桌一大藍花磁椀二黄磁琖九揩抺地白粗布三十方抺布一丈六尺供献物品正月初三日供饊子三月九月初一日供打餻搓條餑餑四月初八日五月初一日供椵葉餑餑六月初一日供蘇葉餑餑七月初一日供淋漿餻八月初一日供煠餃子常日俱供灑餻求福供打餻煠餻豆擦餻水􅀈子鯉魚稗米飯醴酒三月初一日九月初一日供清酒每月初一日供醴酒常日供淨水正月初三日每月初一日供時鮮果品祭天供稗米飯並灑米立杆大祭次日祭天並祭馬神俱用大猪外每日祭神每月祭天用中等猪每日祭神神幔上掛連四淨紙二張供七里香八碟每次祭天於神杆上夹淨紙一張造做類正月供饊子以紅白稷米各磨麫搓為細條繞挽做成以蘇油煠熟盛於盤内供獻三月春季立杆大祭供打餻搓條餑餑以稷米蒸飯置於石用木榔頭打爛又以炒黄豆磨麫攙合拉成長條另於荍麥麫内攙以稷米麫攪合搓微長條繞攙煠以蘇油與打餻相間層累擺列朝祭則纍以九層餻之上以做搓條餑餑之麫做成鹿與松塔列於其上盛於盤内供獻夕祭則纍以五層以炒豆麫各一撮置扵其上盛於盤内供獻五月供椵葉餑餑以稷米為麫以小豆為饀用椵葉裹包蒸之盛於盤内供獻六月供蘇葉餑餑以稷米為麫以小豆為饀用蘇葉包褁蒸之盛於盤内供獻七月供淋漿餻以蒸稷米為麫入水攪匀盛於布袋内用布袱鋪於蒸篾箆置於其上澄汁下鋪鈴鐺麥外以氊裹蒸熟方切四角分為十分盛於盤内供献八月供餃子以稷米蒸飯置於石上以木榔頭打之以小豆為饀形式微長用蘇油煠熟盛於盤内供獻九月秋季立杆大祭供打餻搓條餑餑一切造做悉如三月儀惟不用炒豆麫仍以蘓油合做餻上置小豆各一撮常月俱供灑餻以稷米麫層層撒於蒸箆之上下鋪小豆上灑小豆蒸熟方切四角分為十分盛於盤内供獻又名蒸餻四月初八日供椵葉餑餑成造如五月椵葉餑餑法求福供打餻仍以木榔頭打做攙入炒豆麫層纍擺列水􅀈子亦如打餻法豆擦餻則以稷米為麫做為水􅀈子粘以小豆蒸之煠餻亦用稷米為麫做為水􅀈子以蘓油煠之椀内所盛之水􅀈子則以稷米為麫做為小水􅀈子煠熟以水研小豆為末拌以供獻毎嵗春秋二季立杆大祭釀所用清酒於四十日前在坤寕宫内西炕前安置釀清酒有臍眼缸之架下放錫接盤接盤下放木板一塊接盤上設缸先将稷米淘洗不留些㣲渣滓純如淨水後蒸為飯晾凉入於缸内另将麹硏為細末以玉泉水沸湯􅭒匀俟稍温盛於籠屉上所淋麹水亦傾入缸内以拐木攪匀缸之上以有隔眼紅銅絲葢葢之其上以布袱遮蔽之若遇天寒以氊遮蔽之自釀酒之日起以神刀壓置缸上十日後仍如前法添入凉稷米飯麴水用拐木攪匀以布袱遮蔽之又過十日不入麴水以蒸稷米熱飯入於缸内仍用拐木攪匀以布袱遮蔽之得酒後以玉泉水滿貯於缸仍用長拐木攪匀次日榨之榨酒将畢稍留酒根復添入玉泉水攪匀二次榨之榨畢出糟粕於缸付之神厨另将稗米磨為細末攙入糟粕内蒸之各為塊或褁以榖草或褁以稲草遮以氊塊俟發二十一日成麴後穿其中為眼以䋲貫之掛於竈前每日燒柴百觔燻麹以得其色每月祭神所用醴酒於神厨内釀之預於三日前蒸稷米為飯攪以麹水即貯於罇内亦以小拐木攪匀以布袱遮蔽之若遇冬令置於煖處成造噐皿蒸稷米飯整木刳做接口籠屉二蒸餻托蒸箆子椵木撑六蒸稷米飯添水溜子二遮蔽籠屉白布套三遮蔽汲泉水桶黄三梭布袱三遮蔽盛淨水桶白粗布袱十二遮蔽稷米麫白三梭布袱二鋪籠屉白三梭布袱十二盛稷米白粗布夾袋二十做淋漿餻擠水髙麗布夾袋四做淋漿餻遮盖籠屉盖油三梭布袱一做淋漿餻遮蔽籠屉白氊一遮蔽做淋漿餻之麫白硬紗袱三紗篩籮底十二遮蔽淋漿餻髙麗布袱六遮蔽酒麹黑氊一盛稷米缸九收貯噐皿黒漆竪櫃二盛淨水紅漆杉木桶二十鐵篐杉木水桶二連扁擔盛肉絲鐵漏勺一蒸餻鐵鏟二燎頭蹄鐵义五鈎肉鐵鈎四遮蔽竈内火鐵門三分盛骨用包猪皮安鐵篐柱筒二釀清酒有臍眼大缸一連架遮蔽缸有隔眼紅銅絲盖一安放酒缸松木板一接醸酒缸錫接盤一做蒸箆用線麻半觔做蒸箆秫稭六十束做遮麹水篐用稲草八十捆盛肉鐵漏笊籬四烙鐵一烙鐵板二剪子五碓房内安設碾子二拐磨子一木碓一分金斗一板斗一磨一椀一汲泉水桶十二整理肉松木桌二蒸餻用椵木鏟二做搓條餑餑松木低桌二十盛綢條棉線紅漆盒四盛麫大箥籮四栁斗四大小栁條筐七簸箕八瓢四打餻石一大小栁罐八連䋲笤箒六蒸稷米飯廣鍋一炒豆廣鍋一必用之項正月初三日供饊子祭祀做饊子用白稷米四金斗紅稷米四金斗釀醴酒用稷米一金斗五升取煠饊子油蘇子七金斗煮肉蒸餻釀醴酒用柴一千三百觔煮肉盛盤整理腸臓用白塩五觔時鮮果品十八碟中等猪四二月初一日供灑餻祭祀做灑餻用紅稷米四金斗釀醴酒用稷米一金斗五升白豇豆一板斗二升煮肉蒸餻釀醴酒用柴一千三百觔煮肉盛盤整理腸臓用白塩五觔時鮮果品十八碟中等猪四三月初一日供打餻大祭做打餻用紅稷米金斗四石釀清酒用稷米金斗一石做搓條餑餑用稷米金斗一石六斗荍麥金斗二石取煠搓條餑餑油蘇子金斗二石黄豆四金斗造麹用稗子米金斗一石煮肉蒸餻釀清酒炒豆煠搓條餑餑用柴五千觔煮肉盛盤整理腸臓用白塩五觔蒸稷米飯用五兩重黄蠟燭九枝一兩五錢重黄蠟燭八枝黄土二十筐時鮮果品十八碟大猪五四月初一日供灑餻祭祀做灑餻用紅稷米四金斗釀醴酒用稷米一金斗五升白豇豆一板斗二升煮肉蒸餻釀醴酒用柴一千二百觔煮肉盛盤整理腸臓用白塩五觔時鮮果品十八碟中等猪四五月初一日供椵葉餑餑祭祀做椵葉餑餑用紅稷