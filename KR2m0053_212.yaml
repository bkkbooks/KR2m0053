body:
  text: 欽定四庫全書欽定八旗通志卷一百九十八人物志七十八大臣傳六十四漢軍正白旗三偏徐治都國王國昌費雅逹圗黃材宜兆熊石文焯徐治都徐治都漢軍正白旗人二等男徐大貴子初任佐領兼參領康熙七年擢直𨽻天津總兵八年調湖廣彛陵總兵十三年正月逆藩吳三桂陷湖南沅州治都率兵赴援旋以四川巡撫羅森總兵談宏叛應吳逆治都奉詔自常德回守彛陵三月叛鎮楊來嘉劉之復等擁衆數萬乘舟犯彛陵治都率兵撲剿賊衆登岸誘戰驟以飛棹薄我城治都先已布置嚴密水陸相犄角擊却賊衆八月楊來嘉糾黨據南漳各寨分路出犯治都同襄陽總兵劉成龍率兵征剿斬殺過半上嘉治都久守衝要下部議敘加左都督銜初治都赴援常德其妻許氏聞鄰境兵民多從逆權以治都令約鎮標將辨撫慰士卒曉以大義并脫簮珥服飾以資犒勞彛陵右瀕江總兵官廨在江濵十五年四月賊衆駕船數百來犯治都沿江堵截賊突逼官廨鎗炮齊發許氏中炮死湖廣總督蔡育榮提督桑額合疏以聞具述治都矢志忠貞奮不顧家狀十八年三月擢湖廣提督四月偽將軍王鳯岐擁賊衆據巫山上慮江水泛漲時賊乘虛突犯彛陵荆州命治都嚴行堵禦七月疏言彛陵一隅為楚蜀咽喉今賊據巫夔上遊呼吸可至宜速修五板戰艦一百並招募土著水手操練嫻熟令彛陵鎮臣胡世英統領以備水路防勦臣同襄陽總兵劉成龍前赴歸州興安巴東形勢之地相機進剿事下所司議行詔治都同四川總督楊茂勳統舟師征夔州重慶十九年正月師至巫山楊來嘉王鳯岐與偽總兵王存仁集賊衆萬餘負險自固我師奮勇奪山隘賊衆奔潰復以數騎突犯治都揮刀力戰敗之楊來嘉棄馬越山而遁王鳯岐就擒陳斬三千餘級復巫山縣城乘勝規取夔州偽將軍劉之衛偽總兵瞿洪升開關納欵遂復夔州府城叛鎮談宏遣子偽將軍談天祕率偽總兵談地晉談地升繳敕印詣軍門降治都奉詔還守彛陵荆州諸處九月談宏談天祕等復叛瀘州敘州俱陷夔州震動治都同鎮安將軍噶爾漢統兵溯江而上分軍三隊擊賊陳擒偽總兵易文竒進抵下關城賊衆望風膽落棄關而遁斬殺甚衆餘賊奔入雲陽二十年進征雲陽屢挫賊鋒擒偽總兵向旭暉時談宏死談天祕勢窮竄遁萬縣梁山忠州悉平敘功晉階四等二十七年湖廣督標裁兵夏逢龍糾衆倡亂據武昌城治都赴剿至應城縣遇賊衆擊却之隨駐軍應城賊衆環逼治都分兵內外夾擊賊大潰奔德安逢龍聚賊衆齊赴金口以偽總兵楊兆先潛襲我軍後路治都偵知賊情水陸嚴戒既而蒲圻兵縳楊兆先赴軍前降餘賊鼓噪來犯復乘北風列巨艦二十順流而下見我水師嚴整不敢近遂泊龍州磯下登岸衝我營壘我軍奮勇掩擊晝夜鏖戰斬殺殆盡逢龍勢窮合賊衆駕船泊鯉魚潦欲紿我軍出敵乘虛犯我陸營治都遣參將鄭興都司楊明錦協力防禦自統戰艦沿江施鎗炮焚毁賊船賊旋犯我陸營復戰却之斬七百餘級溺水死者無算偽總兵胡耀乾率偽文武官以城降治都入武昌安撫軍民逢龍竄黃州會振武將軍瓦岱統八旗兵至聞武昌賊潰追至廣州偽總兵趙得等至軍前投誠黃岡生員宜畏生擒逢龍以獻磔於市武昌黃州悉平治軍報捷得旨嘉奬賜戴孔雀翎敘功豫雲騎尉世職三十二年入覲賜御用冠服三十三年詔嘉其勞績茂著視提督孫思克施琅之例特授為鎮平將軍仍管提督事三十六年閏三月卒年六十有七贈太子少保賜祭葬如典禮諡襄毅長子永泰先於康熙十九年襲徐大貴二等男爵次子永年襲雲騎尉職王國昌王國昌漢軍正白旗人康熙七年由官學生補內閣筆帖式尋改辦事中書遷侍讀厯遷刑部郎中監察御史內閣侍讀學士二十八年隨內大臣索額圗等赴尼布楚與俄羅斯議定界事竣遷擢內閣學士三十一年授兵部督捕右侍郎三十四年丁繼母憂時廷議三路征噶爾丹中路以左都御史于成龍督運軍糧命國昌以原銜偕大理寺卿喻成龍赴西路督運三十五年正月授敇印二月西路大將軍費揚古裹五十日糧進剿約國昌等挽運以濟屆期未至五月大軍自昭莫多凱旋國昌等運米四千一百餘石還屯烏喇特部界請旨詔就近分給喀爾喀親王善巴等七旗兵十月敕國昌同于成龍等由呼坦和朔運米至喀喇穆掄軍營贖前遲誤罪並坐塘效力三十六年正月大軍由寧夏肅州兩路追勦噶爾丹國昌復同于成龍等請自備駝馬運糧允之會噶爾丹竄斃軍還停運十一月部臣請追議國昌前罪有旨寬免仍著議敘加四級三十七年擢山東巡撫三十八年上南巡國昌迎駕御書圭璋特達額並淵鑒齋法帖賜之又賜御用夏冠袍服四十年二月吏科給事中馬士芳劾國昌於大計重典濫薦厯城令管承寵又徇庇溺職之長清令崔錫榮不行題參諭令明白回奏尋諭大學士等曰朕聼政四十餘年凡條奏之事稍有私意斷不能欺朕馬士芳特不喜漢軍居督撫之任故將王國昌參奏朕所知漢人數員已盡置外任果如張鵬翮李光地郭琇者能有幾人朕曽問李光地云山東巡撫王國昌雖無過人之才但心性和平地方尚受其益果在地方安靜即百姓之福矣五月國昌疏辨部議管承寵為巡撫私人並無實據應免議其溺職之崔錫榮該撫不於大計題參應降一級準抵從之四十一年六月疏陳東省便民事宜一倉榖遵例存七糶三於青黃不接時減價平糶秋收糴榖還倉一德州倉米支放各營兵糧向係四季徴收春夏農忙時輸將難猝辦應動司庫價銀米支放其額徴米石俟秋後徴一額徵班匠銀四千餘兩均入地丁項下徴解一魯藩舊基地聼民墾種輸租即於開墾之年升科給印帖俾為恆業下部議行閏六月疏報萊蕪新泰東平沂州蒙隂沂水六州縣被水請開倉賑部議如所請國昌又自捐俸三千三百兩補賑十月上南巡回鑾賜御書法理寬平清慎勤二額及表裏常交正動靜自弗違聨四十二年七月疏報新泰等州縣復被水災請將倉榖百二十餘萬石並應運漕米十餘萬石平糶但倉榖不便久懸仰祈聖慈暫開事例以實倉貯至動用漕米擬將康熙四十三年以後俸工捐補部議平糶銀於次年秋收後買榖還倉所捐俸工令地方官發買籽粒牛隻助民耕種其請開事例無庸議先是上以巡視河工過濟南軫念東省去嵗被災降旨蠲免錢糧並命總督桑額以漕米二萬石交總河張鵬翮選員運赴濟寧兖州等屬平糶加賑桑額另運米二萬石於泰安一路協濟至是國昌疏報桑額所運米遵旨散給河臣張鵬翮亦委員運米到東隨即酌撥各屬並動用常平倉榖二十八萬石請於俸工分年捐還奉旨朕前諭桑額張鵬翮各將漕糧二萬運東賑糶此扈從諸臣所共聞者今觀王國昌所奏將常平倉收貯米榖俱行糶賣散給與朕原諭不符王國昌又稱捐康熙四十二三年官員俸資衙門工食賠補似此何時方能完結此項米榖應令速行賠補貯倉是月特命遣官截留漕米五十萬石並派八旗官員各領帑銀三千兩馳赴山東會同地方官賑養飢民以侍郎穆和倫辛保卞永譽分三路巡察九月上諭大學士九卿等曰朕因山左災荒勞心殫思屢行咨訪嵗歉非止今嵗為然地方官厯年隱匿不報今春朕閲視河工親見災黎情形始行籌畫賑濟今嵗田禾尚有薄收之處巡撫布政使為伊等素有欠缺欲巧圗完補故甚其詞以奏報又夤緣科道紛紛急奏言人民相食私兾或開事例或撥銀兩因于其中侵蝕託言賑濟而實欲完補虧空以施鬼蜮之謀今京師遣往三路人員惟視巡撫等所指地方賑濟應將此事交三路大臣加意稽察時布政使劉暟內升國昌疏留御史顧素因劾國昌匿災又同劉暟覬開事例補虧空請賜罷斥諭曰王國昌不過一謹願人朕曽詢問李光地張鵬翮伊等亦言國昌在任並無劣迹惟劉暟乃一能巧匪人將國昌任意驅使甚易事耳此事著同前諭九卿之旨一併議奏會議國昌應革職得旨姑留任十月部臣以國昌等擅動常平倉榖請催令賠補詔傳詢擅動之由同張鵬翮分賠尋諭大學士等曰朕聞山東巡撫將賑濟飢民官員齎去銀兩俱收藩庫迄今猶未散給如此則賑濟飢民之事不致遲誤乎此銀俱自京師發往並非伊等庫內之項且前往賑濟人員係八旗佐領公舉殷實才能之人王國昌等僅可查其養飢民之優劣其錢糧耗費與否係賑濟官員之事與伊等何涉而將此銀兩收貯至今仍不散給此係何心朕所不解是又劉暟之詭計也况派去三百餘人俱留濟南必致米價騰貴人皆受困可將朕旨交該部移問王國昌等十一月國昌回奏巡察大臣辛保等先後開賑因查極次貧民分别賑養稍稽時日疏下部議以國昌於被災時不即令州縣官查明極次貧造册逮巡察大臣到日藉此推諉應即行議罪奉旨革任四十三年以新任布政使趙宏燮揭報劉暟虧庫項七萬餘兩命侍郎舒輅傳作楫往勘得實舒輅等劾國昌藉捐俸補賑為名將存貯沂州庫銀擅用一萬三千餘兩又徇隱劉暟於宏燮揭報後補參塞責部議依律擬流併令照數賠補得旨限兩月內賠完免其罪五十二年以萬夀覃恩給還原職雍正六年卒費雅達費雅逹漢軍正白旗人由鑾儀衛整儀尉纍遷潼關副將康熙十四年陜西提督王輔臣叛應逆藩吳三桂附賊日衆費雅達遵旨招撫郃陽縣神道嶺偽把總雷成金等四百餘名得旨嘉奬時漢中尚未恢復十五年二月總督哈占提督張勇奏設漢中鎮總兵剿賊以費雅達才能練逹謀略邁衆請升補暫駐秦州得旨費雅達著升署都督僉事充陕西漢中總兵官十月費雅達遣官招撫偽總兵賀天祥副將黃啓遊擊李芳春朱彪臣等兵三千九百餘收偽劄關防馬騾器械無算十七年大兵進取漢中十八年六月賊衆萬餘結營於彛門鎮之髙山堡費雅達偕將軍佛尼勒為頭隊督兵先登賊敗遁九月隨奮威將軍王進寶入棧道費雅達自馬峪河進道險分兵越左右山梁自統兵由溝底為中路更撥一軍為後應賊伐樹塞路我兵開通直抵秦嶺攻拔北木城賊棄南木城遁斬級四百餘生擒四十左右後應兵皆會追至靖寇關復分三路進賊倚蜈蚣嶺拒守我兵自下仰攻進寶遣兵山後夾攻賊驚潰追殺五百餘墜崖澗者無算時進寶復鳯縣城合兵至武關費雅達由左攻擊斬關入賊大敗追至雞頭關生擒偽總兵羅朝興斬獲千餘賊首王屏藩走廣元遂復漢中敘功加都督同知十九年六月同提督王之鼎防守永寧八月賊來犯拒守月餘援絶城陷死之二十年追贈左都督太子少保賜祭葬諡忠勇豫騎都尉世職子維翰襲雍正七年費雅逹入祀昭忠祠偏圖偏圖漢軍正白旗人本姓李𨽻內務府康熙十三年八月由奉宸苑催長應詔揀選授都司銜赴陕西剿吳三桂叛黨署督標右營遊擊十四年二月叛賊李長腿引賊千餘犯淳化三水焚劫三原縣之杜寨偏圖與遊擊繳應善率兵六百自涇陽進剿至紅水溝擊斬李長腿等生擒四十餘人獲旗械馬騾又隨揚威將軍阿密逹軍長武率緑旗前鋒兵由南路抵瓦雲驛擒偽守備二遂與副都統鄂克濟哈合兵趨涇州賊衆扼險隘迎戰數四俱擊敗之進薄城下賊出城抵拒復斬三百餘級克其城偽總兵衛民譽等逃出南門據寨拒守偏圖率兵圍寨斬民譽降其餘衆三月同護軍統領舒淑擊敗賊首馬瑞軒於靈臺賊退守陶家堡攻克之斬級百餘四月同鄂克濟哈赴慶陽進援寧州沿途招降二十餘寨入州城偽總兵魏虎山馮嘉德等領賊兵八千倚山城出拒偏圖率緑旗為前隊進攻自辰至未攻克山梁擒斬甚衆賊遁蕭家山斷壕而守翼日偏圖分兵兩路夾攻斬殪過半餘賊逺竄乃旋軍涇州六月同副都統穆舒琿敗賊於鎮原縣八月隨貝勒洞鄂剿王輔臣於平涼偏圖率兵二百五十同護軍統領阿哈多等仰攻髙山賊壘破之十二月實授右營遊擊十五年二月同副都統吳國正援商州復山陽縣旋師擊敗偽總兵李茂榮於寬平里斬級百餘四月賊陷三原之西陽鎮偏圗馳救賊潰遁追至鳯凰山收撫陷掠男婦百餘五月隨大將軍圗海圍平涼偏圗駐軍虎山墩斷賊糧道輔臣降圗海以偏圗屢著戰功題升潼關副將得旨偏圗曽經效力行間今正剿滅賊寇之時仍留軍前征剿遇缺另補十六年六月授陜西督標副將十七年閏三月進剿興安偵賊二千餘據小山嶺掘壕樹柵偏圗由窑兒溝繞出嶺旁攻毁賊巢追逐至香泉殪賊無算十八年十月攻梁河關破賊營七遂復興安及漢隂石泉等縣偽將軍謝泗偽總兵王永實等各率衆降十九年三月諭奬偏圗屢著戰功令隨勇略將軍趙良棟恢復四川進征雲貴二十年正月詔設雲南總兵七以偏圗與副將馬山等即補時賊黨胡國柱王緒擁衆二萬餘屯馬湖趙良棟檄偏圗堅守雅州整飭官兵相機由間道規取象嶺大渡河曬經關擒偽守偹楊名聲於榮經縣斬賊一百二十餘五月隨大軍克關山關沿途屢敗賊衆陳斬及墮崖死者無算復黎州奪大渡河隘口沿河追賊至火場壩偽總兵蔡國明戴聖恩于登明楊泗等窮蹙乞降六月復越嶲衛及建昌乘勝入雲南八月渡金沙江駐兵石虎關十月領兵奪取玉皇閣及土橋東寺西寺三市街進薄城下賊平二十一年實授永順總兵敘功加左都督三十三年正月入覲擢雲南提督四十五年復入覲賜孔雀翎良馬五十年內遷鑲白旗漢軍都統五十五年九月卒年七十有七得旨偏圗才技優長久著勞績簡任都統謹慎持身實心盡職忽聞溘逝深為軫惻下部議恤賜祭葬如例諡襄敬又諭部曰偏圗前在軍前立功同緑旗官員一體議敘加左都督今可照八旗例議給世職尋允部議豫騎都尉世職以其第三子李棟襲黃國材黃國材漢軍正白旗人祖廷柏由生員授江南靈璧縣知縣調順天大興縣遷山西汾州府知府順治六年大同總兵薑瓖叛攻汾州城陷廷柏死之贈太僕寺卿國材於康熙十八年由監生考補內閣中書二十二年遷都察院都事三十六年遷湖廣漢陽府知府四十年授廣東雷瓊道蒞任三年總督郭世隆巡撫彭鵬以卓異薦格於部議特命引見擢廣東按察使四十八年遷廣東布政使五十六年以粵西山多田少需米湖南而衡湘米船由永州姦民藉禁糶阻索致商販不前米價多昻請於上官禁止總督楊琳巡撫陳元龍疏奏準行尋擢貴州巡撫鎮逺至常德灘河多溺患雲貴湖南三省官修縴道國材率先捐助併捐修城垣及演武廳捐衣四千襲給撫標兵捐榖萬石分貯安籠威寧大定三鎮駐劄地方置旗幟弓矢服給各營五十八年雲貴總督蔣廷錫疏參國材有辦事才但每事任性處死苖子阿容及王阿么等十六名以龍里縣民薛有凌貴定縣民辜瑶平伐營民徐跳等親生女嫁與楚人者指為掠販處以重刑將薛氏等賞兵其進京陛見各府屬指俸工借藩庫銀二萬五千二百兩餽送國材疏入時國材在京命九卿傳訊國材供與原參互異九卿請旨派員令國材赴黔面質上遣刑部郎中齊克坦户部主事謝檜齡往審國材實受屬員餽送銀萬四千兩雖供充公究屬不合應降三級調用餘案俱虛免議得旨黃國材著解任尋奉命解餉西寧二次六十一年十月授鴻臚寺卿督理子牙河務逾月擢福建巡撫雍正元年四月疏稱聖朝定例自順治八年奉有熱審減等之條遵行甚久康熙四十三年停止熱審蓋恐罪人希兾減等挨延時日不無夤緣賄縱之弊但近年來夏月必特沛恩綸暫釋刑具臣見閩廣下濕監犯之苦更甚伏思皇上慎重民命直𨽻􅀈案必親加詳察多豫矜全臣以為似宜復熱審舊例準減等如慮延挨幸免則嚴飭各官按限完結毋任胥吏作弊遲延庶囹圄悉蒙寬恤之仁矣上嘉納之下部議行八月疏言章服為等威所繫况物力艱難尤當愛惜臣厯任外吏目睹地方淳朴者頗多殷實奢靡者必至貧寒邇年八旗風俗奢靡衣服貴賤相同請嚴禁僣越杜絶奢華白丁下賤人等止許服黑色布匹不得用綾羅錦縀及各種細毛違者重治上曰此奏切中時病爾等姑且徐徐勸𨗳倘仍不改革然後嚴為定制以法繩之耳九月疏言浙江雨水缺少寧波等處民食艱難臣與督臣滿保撥福建省倉米五千石臺灣府倉米五千石由海運往減價平糶以濟民食又言浙江象山定海溫台等處缺米撥閩省米接濟上深嘉之十一月以年老乞休得旨黃國材自撫閩以來操守亷潔辦事明白軍民共相愛戴今雖年老身尚強健著照舊供職二年九月疏言福建鄉試額中八十五名今人文日盛請照浙江湖廣解額中九十九名上命增四名尋以頒賜御筆詩扇具疏謝恩諭曰爾之才情朕所素悉但於亷隅二字當加砥礪撫閩以來聲名原居滿保之右近日滿保聲名頓然改觀爾少不逮矣及其老也戒之在得宜於此語時繹之以自警焉十二月疏報臺灣鳯山縣南路山前生畨厯厯等五社北路山後生畨八里岡等六十五社諸羅縣北路山前生畨本祿等四社男婦五千七百九十九名口歸化三年二月疏報臺灣彰化縣內山巴萊逺麻著獅子頭等社生畨男婦八百五十一名口歸化諭曰生畨野性難馴全在地方文武官辨安戢得法封疆大吏當嚴飭屬員施恩布教令其心悅誠服永無變更方不愧柔逺之道是時廣西巡撫李紱上墾荒六欵請將廣西積榖酌借貧民為牛種農器資得旨李紱條陳墾荒請動支監榖為開荒之費不過為開銷廣西昔年捐納榖石之計此項原係陳元龍王沛憻經手其間有名無實首尾不清之處甚多可著陳元龍王沛憻前往廣西將此項徹底清楚倘有不清著李紱查明據實參奏三月李紱奏通政使臣王沛憻到粵咨稱康熙五十三年前任廣西巡撫今升禮部尚書陳元龍奏明廣西捐納榖石至五十五年停止沛憻於五十七年七月到廣西布政使任距停捐將及三年其收捐榖石係陳元龍與前任布政使黃國材任內之事當日經管官係桂林知府吳元臣栁州知府趙世勳南寧知府沈元佐梧州知府李世孝桂林同知黃之孝通判慕國琠六人每榖一石折收銀一兩一二錢不等解交藩司通計捐榖百十七萬八千餘石應收銀百三十餘萬兩其發價買榖約計銀四十餘萬國材交四府知府給屬採買餘銀幾及百萬並無著落請將從前經手之督撫司道等官質訊得旨閲李紱奏疏當日收捐榖價數倍於正項著黃國材將收捐始末情弊奏聞如敢欺隱必從重治罪國材疏稱廣西捐納一事撫臣陳元龍與督臣趙宏燦委桂林府知府吳元臣等在省城收捐委梧州栁州南寧三府知府李世孝趙世勳沈元佐等在府收捐因捐納人買榖需時議定每榖一石折銀一兩一錢每石各府自存六錢以為買榖蓋倉等項使用內有羡餘係管捐府廳各官分得其餘銀五錢內部費一錢督撫及布政使各一錢按察使及本道各四分院司衙門書辦紙筆造册人工飯食等費各一分至部費一錢內臣動用三分湊修桂林平樂梧州三府灘河及縴路營房等項業經奏明其餘七分交撫臣作部科之費通計督撫司道共得羡餘銀四十四萬七千七百三十五兩其四府所得羡餘臣未經手未知其詳尋國材解任抵廣西與各員對質督撫藩司每石得銀一錢屬實國材扣留部科費內銀兩並藩司書辦人等飯食紙筆銀兩應令賠補共銀二十四萬九百八十兩有竒餘人各按數追賠分限五年完納四年八月命以巡撫職銜署正藍旗漢軍都統事十月協理兵部侍郎未幾授正黃旗漢軍都統五年閏三月署兵部尚書五月署刑部尚書七月授工部尚書七年四月湖廣總督邁柱疏參國材子湖北布政使黃焜令家人開當逐利買房賃租國材有廣西捐納案內應賠銀未完雍正四年又用銀六百兩買屋一區恣行欺罔並不變産完帑得旨令國材回奏國材疏稱臣自奉文追銀已交銀十五萬九千兩又有商人領去紬縀皮貨變價銀三萬兩在本年完交其餘房屋一時難售奏入以國材巧辨欺詐革任九年十一月卒宜兆熊宜兆熊漢軍正白旗人曽祖永貴安徽巡撫以軍功授三等男祖思孝副都統父廷輔襲世爵並見永貴傳兆熊初襲三等男康熙二十五年追敘廷輔征雲南功晉二等男仍以兆熊襲四十年補佐領四十一年授參領五十七年正月遷鑲白旗漢軍副都統十月授正藍旗漢軍都統六十一年調鑲白旗漢軍都統尋命署福州將軍雍正元年二月實授兆熊疏言臣抵任年餘練兵整械查駐防四旗及臣標兩營所用盤槍皆係三假續成久必壞又子母炮祗十八位現捐造盤槍千九百六十一桿子母炮二位以資操演上以捐資過多諭曰向後四旗兩營若有應行增造軍器不必捐資宜動公項為之二年疏言駐防滿洲漢軍協領與在京八旗參領均三品俟後在京副都統缺出請將協領與參領一體較俸開列得旨此奏甚為公當朕即位以來外省副都統缺出多用駐防協領等補授內外皆朕臣工惟拔其優者用之耳尋御書世有令德額賜之諭曰福州駐防兵丁風俗甚劣自爾到任後頗覺更易朕實嘉之其益加約束務令全善三年七月命署閩浙總督四年正月疏言臺灣南北兩路畨社甚多其為害於鳯山諸羅者則山豬毛等社於彰化則水沙連等社山豬毛社前獲凶犯四名稍知畏至水沙連社半載間焚殺疊見撫之不可勢不得不示以兵威但宜以畨攻畨擇各社通事土官勇壯者數人為𨗳率畨社直掃巢穴而以汛兵駐山口壯聲勢疏入報可尋因春雨漲請俟冬進𠞰九月授湖廣總督嗣繼任閩浙總督髙其倬檄臺厦道吳昌祚協同參將何勉等率辨兵畨壯分路褁糧剿捕首惡骨宗等二十名就擒分别正法各社相繼歸誠兆熊陛見諭曰昨見宜兆熊精神力量甚覺勉強楚督莭制兩省文武任巨事繁統轄匪易且又一字不識但操守尚優心術亦正藹然有忠愛之誠為可取耳十二月調署直𨽻總督五年正月疏言直𨽻各營兵餉經前任臣李紱奏準將下年春季餉銀於上年冬借司庫銀先行支給俟部撥徴解到日扣還蓋恐撥銀到遲兵未免守候洵良法可行而直屬陋弊於預支春餉外復借領銀於本年夏秋冬三季分扣兵或事故不一借後除名其銀或於新補兵坐扣或於闔營朋扣均非情理况庫帑豈可市恩私借致令虛懸請將現借出者於本年內照扣嗣後永停借給得旨此奏酌中之論如所請行閏三月擢吏部尚書仍署總督事九月疏言磁州駐防千總一官微兵寡請令大名協右營守備領兵百九名移駐並令右營千總領兵百二十五名駐元城縣右營把總領兵六十一名駐小灘鎮從之十月又言霸雄等二十四州縣被水已蒙恩散賑其地丁錢糧暫請緩徴得旨朕念直𨽻濵河之地易於被水用沛特恩遣官賑恤至被水之處仍應勘明分數題請照例蠲恤不得因已遣官發帑遂不照例遵行也時大名府知府曾逢聖因虧缺庫帑被劾上以逢聖任畿輔有年贓欵必多命總督藩臬等轉諭所屬被屈受害者許據實控告於是吳橋縣生員竇相可控逢聖任吳橋時貪劣各欵而布政使張適袒逢聖杖斃相可與按察使魏定國詐稱監斃兆熊及協理總督劉師恕徇匿不奏上察知之命尚書傅敏侍郎史貽直往鞫六年正月諭大學士等曰宜兆熊乃平常無能之人因其尚忠厚謹慎蒙聖祖仁皇帝用至福州將軍伊並未出力報效及朕即位伊亦不過尋常供職前因直𨽻總督一時不得其人令伊署理畀以畿輔節制重任教𨗳訓誨至再至三乃伊于此事若罔聞知負朕任用之恩甘蹈徇隱之咎尚得謂事君以誠無欺無隱者乎二月傅敏等勘得實逢聖擬絞監候適定國斬監候師恕降三級調用兆熊銷加一級仍降二級調用得旨宜兆熊著降調仍暫署直𨽻總督尋疏言宣化府屬之保安延慶二州旗民雜處向無武辨防禦文職遇調城池倉庫門禁鎖鑰乏員防護應撥張家口協標兩營把總二員移駐改歸懷來永寧兩路參將都司轄從之五月諭曰人臣和衷共濟始于公事有益朕視宜兆熊與劉師恕意見不合諸事參差若仍令同辦總督事務必致貽誤宜兆熊原係庸碌之人朕因其操守可取故試用之自署福建直𨽻兩任觀之全不曉事著回旗照部議所降之級補用先是兆熊署直𨽻總督有南宫縣民杜枚擲傷無服族祖母劉氏身死兆熊審擬以枚係獨子請留養至是刑部議駁言枚母范氏年未七十與例不符兆熊所擬失當上敕部嚴加議處尋議革職九年卒子成祚降襲一等輕車都尉卒子宗孔降襲騎都尉兼一雲騎尉卒子榮祖襲石文焯石文焯漢軍正白旗人康熙三十二年由監生授江南松江府同知三十八年遷蘇州府知府四十三年遷甘肅洮岷道五十三年調貴州貴東道五十五年丁母憂五十八年補江西饒九南道五十九年擢江西按察使六十一年五月署福州將軍六月署福建巡撫十一月授安徽布政使雍正元年三月擢河南巡撫六月疏報沁黃並漲黃河北岸馬營口等處隄壩多有塌陷桃園口支河三道引溜北趨南岸蔣家寨水逼大隄工俱危險各飭河員搶修無虞得旨南北岸隄工捍禦有方殊屬可嘉九月疏言黃河經行豫省千餘里自滎澤以下南北隄工均應加謹防守查江南臨河州縣有同知通判専司河務河南所設同知通判管轄數縣隄工而辦料募夫皆責之州縣必得勤幹之員經理查祥符滎澤中牟鄭州陳留蘭陽儀封商邱考城虞城武陟陽武原武封邱十四州縣皆有隄工請定調補之例於本省現任官員內擇亷能調補三年內能盡心辦理工程平穩者題升以示鼓勵下部議行二年正月疏言豫省各案虧空追比年久無可變賠者自今年為始將臣衙門所有司道規禮府州縣節禮及上下各衙門一切節夀規禮盡行革除以杜州縣藉口之端以塞上司勒索之路遵例令各知府遴委賢員將州縣銀匱封驗眼同拆封將正項即行起解使經徴官絲毫不能侵挪所有耗羡每兩約一錢三分通計全省耗羡銀四十萬兩有竒除各官酌量給以養廉及各項雜用公費悉於此支給外每年約餘耗羡銀十五六萬兩解貯司庫彌補虧空及辦公之用至各官俱有養廉足資上司不至苛求屬吏州縣不至挪移庫項勒索之弊除而公帑亦長無缺矣疏入上嘉納之七月疏言開封府轄四州三十縣河南府轄一州十三縣汝寧府轄二州十二縣地方遼濶請改設直𨽻州分轄將開封府屬之西華商水項城沈邱分𨽻陳州臨潁襄城郾城長葛分𨽻許州密縣新鄭分𨽻禹州滎澤滎陽河隂泛水分𨽻鄭州其原武延津均在河北原武就近歸懷慶府管轄延津就近歸衛輝府管轄河南府屬之靈寶閿鄉分𨽻陕州汝寧府屬之光山息縣固始商城分𨽻光州從之是時浙江海潮泛溢仁和等十六縣田廬被淹命文焯署浙江巡撫撫恤災民九月疏言臣抵浙確勘災民户口委員監賑查煮賑浮費甚多弊端不一且小民日赴厰食粥路有逺近扶老携幼更多不便臣與布政使佟吉圖細加商酌每大口日給榖四合小口二合人給三月口糧無榖之處照時價折給各委大員以次賑完其平湖奉化定海嵊縣永嘉五縣海寧二衛所雖被災分數不符蠲賑之例然水淹之苦同一情形酌給兩月口糧以廣皇仁至衝決塘隄已飭各地方官修築以禦鹹潮所有舊築土塘應請改建石工其一切修砌善後事宜現在確查估計奉旨此事當再三斟酌若修砌石隄一勞即可永逸則速議改建假如勢小土隄亦可堵遏勢大雖石隄亦不能抵敵何必曠日持久多為糜費也文焯又疏言臣親厯海塘查勘今年風潮原屬僅見是以塘工不能捍禦隨分委大員將應修處丈估詳議土石塘工俱仍舊制興修至原係土塘請改石工之處海潮勢大難保無虞不敢輕議舉行上以文焯前後奏互異毫無定見交新任巡撫法海議奏十一月調西安巡撫三年調甘肅巡撫四年二月疏言茶法原以裕課裕課必先便商臣查商人赴楚買茶之船票必開載該商等引目茶數以為沿途照驗俾無留難再查舊例每引一道運茶百斤以五十斤交官貯庫易馬五十斤給商變賣償本外有附茶二三十斤以為運費今商人運茶至潼關廳官盤驗每引祗許過茶百斤附茶不準入陕應請照會典每茶千斤準帶附茶四十斤又陕西向設洮州河州西寧等五司賣茶每年衆商䦰定司分以杜避難就易之弊其地僻茶多不能盡售者請準呈改别司發賣接濟新引庶茶法得以疏通議如所請又言各省軍犯俱發河西及平慶臨鞏四府各衛充伍今各衛俱為州縣祗有赤金靖逆大通三衛若充發太多恐致疏縱請照河東各衛歸併各府管轄之例令該州縣専管庶無疏虞從之尋疏請裁平涼固原慶陽臨洮河州蘭州岷州七衛西固一所各千總歸州縣管理下所司議行五月以不能拘留參員噶爾圖追帑完項部議革文焯職又追議文焯前署浙江巡撫時蠲賑平湖五縣海寧二衛所雖經奏明未具本題報應請革任奉旨從寬革職留任尋因文焯子禮哈為貴州總兵勦平狆苗有功上推恩文焯賜還原職五年六月以承審四川夔州府知府程如絲販私傷人一案錯誤命永停給俸十月疏言平涼府屬西路同知及鹽捕通判俱駐劄寧夏從前寧夏未經改設郡縣是以挂平涼府銜今寧夏已改衛設府其同知所管驛站錢糧通判所掌鹽務俱由寧夏道考核應請改𨽻寧夏道府下以専考成從之是月以柔懦耳聾召回京六年正月授禮部右侍郎三月調吏部左侍郎五月授兵部尚書十月調禮部尚書八年六月諭曰石文焯原係無知庸材自內升以來諸凡退縮毫無踴躍奮勉之心著革職以原品在八旗井田督率效力行走九年署直𨽻馬蘭鎮總兵十年總理三陵事務十三年正月卒欽定八旗通志卷一百九十八
