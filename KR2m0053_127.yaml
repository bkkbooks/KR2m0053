body:
  text: 欽定四庫全書欽定八旗通志卷一百十三營建志二京城營建規制二在京官兵房屋廂守路官兵房屋關道陵在京官兵房屋順治五年八月諭户部等衙門曰京城漢官漢民原與滿洲共處近聞劫殺搶奪滿漢人等彼此推諉竟無已時似此光景何日清寧此實參居雜處之所致也朕反覆思維遷移雖勞一時然滿漢皆安不相擾害實為永便除八固山投充漢人不動外凡漢官及商民人等盡徙城南居住其原房或拆去另蓋或貿賣取償各從其便朕重念此遷移之苦今特命户工二部詳察房屋間數每間給銀四兩此銀不可發與該管官員人等給散令各親身於户部衙門當堂領取務使遷徙之人得蒙實惠其六部都察院翰林院順天府及各大小衙門書辦吏役人等若係看守倉庫原住衙門內者勿動另住者盡行搬移寺院廟宇中居住僧道勿動寺廟外居住的盡行搬移若俗人焚㕿往來日間不禁不許留宿過夜如有違犯其該寺廟僧道量事輕重問罪著禮部仔細稽察凡應遷徙之人先給賞勞銀兩聽其徐為搬移限以來年終搬盡著該部傳諭通知凡搬房額數順治五年題準一品官給房二十間二品官給房十五間三品官給房十二間四品官給房十間五品官給房七間六品七品官給房四間八品官給房三間護軍領催甲兵給房二間十六年正月工部議準各處取到旗下官員撥給房屋各照舊例酌減精竒尼哈番品級各十四間阿思罕尼哈番品級各十二間阿逹哈哈番各十間拜他喇布勒哈番品級各八間拖沙喇哈番品級各六間六品七品官各四間八品九品官各三間撥什庫擺牙喇各二間披甲人各一間凡屋價則例順治五年題準頭等房每間銀一百二十兩二等房每間銀一百兩三等房每間銀八十兩四等房每間銀六十兩五等房每間銀四十兩末等房每間銀二十兩九年題準末等房每間給銀三十兩凡旗分房屋順治十一年議準八旗官員兵丁俱照分定地方居住若遇調旗更地仍準住原處有情願買房搬移者聽從其便都統副都統不許強令遷移如欲自蓋房者聽都統副都統查明本旗空地令其自蓋至外來歸附人員應住房屋工部照所撥旗分買房安插若無房屋工部於本旗空地蓋給康熙五年三月工部尚書葉成格等題請正白旗蒙古都統塞爾格佐領下三等轄阿逹哈哈番那穆兒先往口外襲伊父阿逹哈哈番今取進內為三等轄户部因其初來給與地畝臣等應照定例給房十間奉旨從前此等來自口外之人已有旨不給房屋那穆兒不必給房以後此等人給房著永行停止七年題準盛京後來甲兵餘丁未得房屋者該都統副都統移咨本部照每人屋一間例折價三十兩自行置造八年題準每等房各減銀十兩嗣後各處投誠人員給與官地蓋房照例給價十四年八月工部尚書吳逹禮等題為請旨事户部等衙門具題內開陳前投誠一品官金進等官及披甲間散人應給與房屋之處交與工部等因具題奉旨金進著授為散秩大臣餘依議欽遵在案查臣部現無空房存貯各照伊等品級定例於城內正白旗教場東邉空地蓋給散秩大臣一品官金進房十四間內正房三間通面濶三丈七尺進深二丈七尺簷柱髙一丈零五寸七檩釘望板前後出廊成造兩邉廂房六間每座三間通面濶三丈零五寸進深一丈八尺簷柱髙九尺五檩鋪葦箔成造門面房五間通面濶五丈一尺進深一丈四尺簷柱髙八尺五檩鋪葦箔成造共需用銀九百五十一兩八錢蓋給二品官昂阿海房十二間內正房三間通面濶三丈二尺進深二丈三尺簷柱髙一丈七檩釘望板成造兩邉廂房六間每座三間通面濶三丈進深一丈六尺簷柱髙八尺五寸五檩鋪葦箔成造門面房三間通面濶三丈零五寸進深一丈三尺五寸簷柱髙八尺五檩鋪葦箔成造共需銀七百九十二兩一錢蓋給三品官阿地薩房十間內正房三間通面濶三丈一尺進深二丈二尺簷柱髙九尺五寸七檩釘望板成造兩邉廂房六間每座三間通面濶二丈九尺進深一丈五尺簷柱髙八尺五檩鋪葦箔成造門面房一間面濶一丈進深一丈三尺簷柱髙七尺五寸五檩鋪葦箔成造共需用銀六百五十四兩六錢蓋給五品官阿津逹房六間內正房三間通面濶三丈一尺進深一丈八尺簷柱髙九尺五檩釘望板成造門面房三間通面濶三丈零五寸進深一丈三尺五寸簷柱髙八尺五檩鋪葦箔成造共需用銀三百零八兩六錢蓋給六品官色爾濟護軍校馬濟驍騎校西當共三員每員蓋房各四間共十二間每正房三間通面濶三丈零五寸進深一丈八尺簷柱髙九尺五檩鋪葦箔成造門面房一間面濶一丈進深一丈三尺簷柱髙七尺五寸五檩鋪葦箔成造此房十二間共需用銀六百九十二兩八錢前鋒護軍撥什庫共二十八名每名蓋給房二間披甲用役間散人共七十四名每名蓋給房一間共計房一百三十間每間面濶一丈進深一丈五尺簷柱髙七尺八寸五檩鋪葦箔成造每間需用銀二十兩零二分七釐三毫共需用銀二千七百零三兩五錢以上蓋給大小官兵房屋共一百八十四間其磚瓦灰石料工繩斤鐵釘匠工家伙運價等項約估共銀六千零三兩應於户部支取至築造伊等房院土牆之處俟蓋房工竣再行估計等因奉旨依議二十二年七月工部題請將駐防外省官兵在京房屋令户部給發房價其房屋給本佐領內無屋窮兵居住詔從所請三十四年五月諭大學士伊桑阿阿蘭泰爾等傳諭八旗滿洲蒙古都統官員子弟及諸有房舍者與家僕披甲者勿察若實無房舍之前鋒護軍披甲兵都統身自確察於此月初十日保奏是年五月又諭大學士等曰朕覽八旗都統所察無房舍者七千有餘人未為甚多京師內城之地大臣庶官富家每造房舍輒兼數十貧人之産是以地漸狹隘若復斂取房舍以給無者譬如剜肉補瘡何益之有貧乏兵丁僦屋以居節省所食錢糧以償房租度日必至艱難今可於城之外按各旗方位每旗各造屋二千間無屋兵丁每名給以二間於生計良有所益此屋令無得擅鬻兵丁亡退者則收入官大略計之約費三十餘萬金譬之國家建一大宫室耳勑下欽天監相視汝等及八旗都統身往驗看宜建造之處奏聞是年五月諭大學士伊桑阿阿蘭泰城垣之下而外各旗空隙之地有可營建房屋者察看奏聞八旗都統可速看本旗之地再會同驗看其令工部遍傳八旗悉此是年七月工部尚書薩穆哈等覆奏蓋造八旗教場等處兵丁住房一萬六千間每間計用銀二十二兩八錢八分七釐九毫共銀三十六萬六千二百零六兩四錢又周圍築造大圈土牆二千九百五十九丈安放柵欄門三十二座需用物料銀七百九十三兩二錢七分八釐匠夫工價錢一千一百二十四串四百二十文至蓋造此房臣部官員筆帖式不足相應於六部都察院督捕等衙門各選取賢能官二員筆帖式二人每處𣲖部院章京二員及每旗𣲖賢能章京二員公同部員料理本旗房屋堅固蓋造奉旨依議雍正二年四月步軍統領會同八旗都統等奏準內城九門每門門軍四十名缺出將滿洲蒙古教養兵丁挑補外城七門每門門軍四十名缺出將漢軍教養兵丁挑補其門軍居住房屋內九門舊設緑旗門軍原各有官房一間應即給與居住外七門門軍舊無房屋交與工部於各門相近之處每門蓋給房屋四十間東便門內東邉空地五假蓋房四十間計九座內二座每六間二座每五間三座每四間二座每三間廣渠門內東邉空地三假蓋房四十間計十一座內七座每四間四座每三間左安門內東西兩邉空地四假蓋房四十間計十座內三座每六間二座每五間二座每三間三座每二間永定門內東西空地四假蓋房四十間計十座內四座每五間三座每四間二座每三間一座二間右安門內東西空地七假蓋房四十間計十座內四座每五間二座每四間四座每三間廣寧門內南邉空地二假蓋房四十間計八座每五間西便門內南邉空地四假蓋房四十間計九座內三座每六間四座每四間二座每三間三年諭今年雨水過多人家屋漏墻垣倒塌貧乏兵丁不能修葺朕心加憐念所宜特沛恩施務令咸得安居著發户部庫帑九萬兩賞與八旗每旗一萬兩上三旗之內務府佐領一萬兩俾貧乏兵丁修理房屋得有禆益五年諭邇來頻雨想八旗之兵丁房屋墻垣必有倒壞者將户部庫銀賞給滿洲旗下每佐領一百兩蒙古漢軍人數較少蒙古旗下每佐領七十兩漢軍旗下每佐領五十兩上三旗內府佐領內管領及五旗諸王之府佐領俱照滿洲旗下賞給諸王之管領下人等不必賞給將所賞銀兩交與各該佐領查屋垣倒壞應賞者賞之如該佐領下無屋垣倒壞者即均勻賞給乾隆三年八月奉諭旨八旗空間處所建造房屋一事據王大臣原議八旗所有空間處所多寡不一若令各按旗分居住則房屋間數不均應俟建造完時著就近每人不過三間均勻分給居住等語今此項房屋已經造成若干處所若俟全完方分給居住不惟已成房屋棄置無用且令窮苦兵丁照常出租賃房居住建造完時既按間數分給居住著交與八旗將現在造成房屋作何就近先給居住之處即行辦理至於此項房屋僅四千餘間今興工已一年有餘何以尚未造完著該管工大臣官員速行建造二十一年六月副都統廣成奏稱一八旗世僕生齒日繁荷蒙聖恩動支國帑京城內外空地建立房屋分給兵丁居住誠可謂均沾天髙地厚之恩但旗人居住之後大臣官員不甚留心巡查將來日久難保不無倒壞典買等弊是以年終於各旗並無典賣之處由值年旗彚奏但此項房屋係動用國帑之所建立而兵丁之老幼子婦若不實心為事不時照料難保其久堅永固并無倒壞情弊請將此項房屋著交現在查旗御史將各所查之旗分官房內有應行嵗修者即交現在駐防兵之佐領每年及時修理仍行按營查對若非另户名姓不對者即將該管官𠫭奏外該都統等亦應留心辦事専𣲖官員管查至年終都統御史等將並無典賣倒壞之處公同具結移咨值年旗彚奏外仍交提督衙門稽查如此専𣲖辦理八旗兵丁多有禆益而官房亦可保其久逺矣一城外八旗每旗舊營房二千間新營房四百四十八間此皆從前因無房居住之旗人在城外周圍各按旗分並看守城門兵丁仰蒙特恩建立官房令其居住但此二項營房有康熙年建立者有雍正年建立者迄今日久不無坍塌倒壞灰瓦脫落席箔朽爛滲漏現皆無房之兵丁等接連居住查昨據鑲黃旗具奏八旗現在所存之地租銀照依護軍數目均賞另户領催馬甲八旗大臣議將八旗每佐領一名馬甲二名領催各賞銀四兩馬甲各賞銀三兩等語但旗人衆多地租寡少若照依此數賞給一時不能均齊必須數年後方能均齊請將此項租銀將城外營房修理實與住房兵丁各得禆益其修理之處著交工部𣲖員會同八旗旗員按照現存地租銀兩估計造册由各旗出𣲖妥員照式修理此二項營房修理完竣後給與無房之另户兵丁居住所有用過銀兩著各都統詳細核查移咨值年旗彚奏嗣後都統仍須不時留心查察稍有應行修理之處即行修理若不時行嵗修以致塌壞即著落該旗都統等賠修外仍將該管章京驍騎校及現住房之兵丁一併交部議罪奏入本日召見八旗都統奉旨爾等議奏鑲黃旗滿洲具奏一摺將廣成條陳案件核議具奏經和碩莊親王等會議八旗現存地租銀一萬四千八百餘兩若賞給兵丁實不敷用今廣成條陳奏請修理營房臣等查得現在應修房共計七千九十九間似應需銀五萬四千餘兩現有地租銀一萬四千八百餘兩若動用此項銀兩修理亦不過浮面修飾枉費銀兩不能堅固況新舊營房並無不可居人遂至坍塌者甚可遲逾二三年臣等請將此項銀兩暫交户部存貯今嵗冬季又可得銀四五萬兩臣等再行具奏會同工部即行修理其陸續收到租銀俟越十餘年後即可動用此項銀兩補修如此辦理方足仰副聖主愛恤滿洲世僕之至意而兵丁亦可得整齊房屋居住再廣成所奏城內建立之營房恐兵丁並不自行居住租典與他姓者著交該管官查察等語查此項房屋向來俱係該旗並提督衙門不時詳查今該副都統已經奏請著交該都統提督衙門添𣲖查旗御史查察可保無典賣情弊即著該旗將住房之兵丁花名造具清册咨送各查旗御史以便詳查臣等及提督衙門不時巡查伏惟聖上指示遵行奉旨依議鑲黃旗滿洲共撥房七百七十九間蒙古共撥房二百四十五間又取租房七十二間漢軍乾隆三年九月撥給房六十七間十二月撥給房三十一間四年五月撥給房五十九間二十年三月撥給房四十二間二十年六月撥給房二十六間二十一年撥給房二十二間共計二百四十七間五十五年安南黎維祁及其屬人歸附來京奉旨附入鑲黃旗漢軍黎維祁編為世管佐領撥給安定門內國子監西口房屋五十六間其屬人在東直門內羊管胡同蓋給房屋二百五十間正黃旗滿洲共撥房九百六十五間蒙古共撥房二百二十五間漢軍乾隆三年撥房三十五間五年撥房七十三間二十七年撥房二百零四間共計三百十二間又取租房自乾隆元年撥給三百八十三間歷有增減至乾隆五十八年共計房十七所一百七十三間正白旗滿洲撥房五百五十六間蒙古撥房一百五十七間漢軍撥房二百九十四間又取租房三十五間正紅旗滿洲撥房六百二十七間蒙古撥房九十間漢軍乾隆三四五等年撥房一百三十九間又取租房雍正十三年以前撥給二十九間半乾隆元年以後撥給一百十六間零五半間共一百四十五間零五半間鑲白旗滿洲撥房七百十二間蒙古取租房共四十六間乾隆二年撥給房九十四間二十一年撥給房一百二十四間漢軍取租房十四所共一百八十三間乾隆三年撥給房七十五間四年撥給房四十三間二十年撥給房三十五間二十一年撥給房十二間鑲紅旗滿洲取租房三百三十四間半乾隆三年四年二十年二十一年共撥給七百九十八間蒙古乾隆三年四年二十年二十一年共撥給一百八十二間漢軍取租房乾隆元年共一百九十三間半二年又共撥出九十一間連前二百八十四間半內官兵認買一百四十七間半又變價二十二間又撥給大學士傅寧安十四間又二十二年拆蓋二間半內去一間現存一百零半間其官兵住房乾隆三年四年二十年共撥二百七十六間內二十五年拆去二間正藍旗滿洲乾隆三年四年二十年二十一年二十三年共撥房六百四十五間蒙古撥房一百五十五間又取租房二十一間漢軍撥房乾隆三年四年二十年二十三年共一百四十五間鑲藍旗滿洲乾隆三年四年二十一年二十四年共撥房五百九十四間蒙古乾隆三年四年二十一年共撥房二百三十四間漢軍乾隆三年四年二十年二十一年共撥房二百九十七間又按內外城門門軍有無增損之處據工部文稱乾隆四十六年工部失火册籍被焚無憑查核守陵官兵房屋凡守護陵寢官兵及有執事人員所住房屋皆動支錢糧蓋造撥給順治十四年議準三陵官員兵丁匠役所住房屋有礙風水者俱令其遷移康熙六年十一月禮部等衙門會題本月初八日奉聖諭看守昭陵章京兵丁所用人役居住近陵以致牲隻汚穢伊等因離逺遷居爾等會同工部選擇遷移年月日期定議具奏欽此該臣等議得看守昭陵章京兵丁所用人役居住房屋離逺陵寢遷移之處不便懸議應差禮部工部郎中各一員筆帖式各一員併欽天監滿官一員看風水漢官二員馳驛前往同盛京禮部侍郎工部侍郎公同看定遷移處所回日將遷移年月日期選擇議奏奉旨依議二十二年六月工部尚書薩穆哈等題請增給看守福陵昭陵披甲人房屋各一間奉旨這披甲房屋不必由部蓋造給與應照定價給銀著再議具奏欽此隨照定例每間銀三十兩計房一百六十間共需銀四千八百兩於户部移取分給本人照欽天監原相度指示之處自行蓋房居住二十七年題準看守暫安奉殿披甲八十名各添給房一間折銀三十五兩其內廷執事人役七十人亦添給房屋折銀五十五兩乾隆五十九年現查東陵工部郎中一員官房三間泰陵總管衙門官員房九十五間兵丁房一百六十間係乾隆元年建昭西陵總管衙門官員兵丁房自康熙二十七年蓋給并無增損奉祀禮部屬官員房三十四間執事役人房一百四十六間孝陵工部屬官員房五間奉祀禮部屬官員房三間執事役人房一百三十七間其總管衙門官員兵丁房屋并無增損俱自康熙二年蓋給孝東陵工部屬官員房三間其總管衙門官員房自康熙五十七年蓋給後并無增損兵丁俱未給房景陵工部屬官員房五間禮部屬官員房三十四間執事役人房一百四十六間其總管衙門官員兵丁房屋自康熙十九年蓋給并無增損景陵皇貴妃園寢總管衙門官員房十九間兵丁房八十間關防衙門官員房四間執事役人房四十四間太監房八間禮部屬官員房十五間役人房一百二十八間俱係乾隆八年建景陵妃園寢奉祀禮部屬官員房十五間執事役人房四十四間其總管衙門官員兵丁房自康熙二十年蓋給並無增損泰東陵官員房七十間兵丁房一百六十間係乾隆四十二年建泰陵皇貴妃園寢官員房三十五間兵丁房八十間係乾隆三年建孝賢皇后陵寢工部屬官員房二間總管衙門官員房九十一間兵丁房一百六十間關防衙門官員房三十二間執事役人房二百零二間太監房十間奉祀禮部官員房三十四間執事役人房一百四十四間俱係乾隆十七年建純慧皇貴妃園寢總管衙門官員房三十五間兵丁房八十間奉祀禮部官員房十五間執事役人房四十間端慧皇太子園寢關防衙門官員房三問兵丁房四十間係乾隆八年建其奉祀禮部官員役人俱未給房關廂道路康熙三年二月奉旨蘆溝橋大水衝壞泥陷車騎不能行走俱繞小道而行應修處所爾堂官親身踏看仍從大道修理城後關廂道路甚窪各門不堪處所亦著踏看應令旗下𣲖工修理或令五城修理爾部定議於次年春興工欽此工部尚書喇哈逹等題稱查得八旗關廂道路路溝坍塌不能行走舊道者多除正陽門崇文門宣武門起至永定等七門止行令五城修理外其鑲黃旗正黃旗正白旗鑲白旗正藍旗此五旗各該門起至土城關止各該旗出夫修理正紅旗鑲紅旗無關廂自城門起至民住莊村止亦各該旗出夫修理其鑲藍旗關廂廣寧門至栁巷村關帝廟止該旗𣲖夫修理自此迤前大井村髙廟止村內舊路俱出泉眼不能修理將村後小道酌量修寬其工程錢糧臣差官估用奉旨修理關廂道路八旗人夫爾部照定例給與工價餘依議是年閏六月工部尚書喇哈逹等題稱修理八旗關廂道路工完之日臣部同該旗都統副都統查驗此後若有衝壞應責令各旗將該旗所對道路巡看修理奉旨依議乾隆十七年四月大學士公傅恆等具奏廣寧朝陽左安右安永定等五門土道係各城坊官每年查明修墊一次並不拘定一年一次嗣後如有必應修墊之時令巡城御史查勘報明都察院堂官轉咨工部領項修理奉旨依議乾隆十九年二月工部覆準都察院文開據東城吏目劉成蛟將朝陽門外新橋起至定福莊石道兩旁土道造册呈請修墊移咨工部照例核算計折見方一丈厚一尺土方一千三百二十五方五分五釐每土一方給壯夫二名計需壯夫二千六百五十一名一分每名照例給銀七分五釐共銀一百九十八兩八錢三分二釐五毫牌行大興縣在於行當雜稅銀內照數給發東城吏目劉成蛟支領報明直𨽻總督造入該年長墊册內題銷仍令該吏目於十日內如式修墊完工并行文都察院轉行東城御史前往驗看俟工完之日將果否照依原報丈尺堅固修理緣由逐一查明咨部二十一年十月都察院據南城吏目盛朝臣呈請修墊左安門外自飲馬井起至東管道口十六假移咨工部照例辦理計土方一千三百二十一方照例給銀一百九十八兩一錢九分五釐是年十一月都察院據西城吏目張位呈請修墊廣寧門外石道北邉土道經巡視西城給事中鎖住等丈量具册移咨工部照例辦理計土方一千一百六十九方一分六釐照例給銀一百七十五兩三錢七分四釐欽定八旗通志卷一百十三
