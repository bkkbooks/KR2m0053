body:
  text: 人物志二十五大臣傳十一滿洲鑲黃旗十一端濟布額明瑞博清額福隆安豐升端濟布端濟布滿洲鑲黃旗人姓瓜勒佳乾隆八年由前鋒授藍翎侍衛洊授二等侍衛二十年台吉巴雅爾等投誠命端濟布齎衣物往賜之還授頭等侍衛遷鑲黃旗察哈爾總管二十一年命選兵千赴西路軍營𠞰賊二十二年三月隨將軍兆惠由朱爾圖斯進兵四月至瑪納斯擒得木齊鄂羅斯獲其屬三百馬駝牛羊二千餘六月扎哈沁叛賊巴哈曼集遁端濟布偕侍衛奎瑪岱追𠞰至小衛和勒津遇前掠台站賊扎木布擒之招降巴哈曼集屬二百餘户九月擒叛賊噶爾藏多爾濟宰桑羅卜扎尼瑪得木濟敦多克於羅克倫孟古圖領送巴里坤先是布魯古特台吉琿齊呼爾璊台吉達瓦斬叛賊扎那噶爾布詣端濟布營詐降並請招叛黨額林沁達瓦端濟布信之遽撤兵還琿齊等尋遁上命靖逆將軍雅爾哈善查明治罪至是諭曰端濟布此次所辦尚合機宜從前招降惟事姑息已命查明治罪今功過相扺著加恩寬免十月扎哈沁得木齊哈勒拜等謀掠台站參贊大臣哈寧阿檄端濟布往𠞰至瑪納斯擒諜十餘渡河至美羅托山賊遁收其遊牧牲畜詔相機速𠞰二十三年正月敘功列一等六月分領吉林厄魯特兵圍庫車賊三千自賽里木來援據高阜端濟布同侍衛順德訥等分翼奮擊斬首二千餘獲畜械甚衆七月復同侍衛齊凌扎卜等𠞰賊之逃往蘇巴什山者三百餘八月邀擊城內逃賊於鄂根河十月大兵分三路攻葉爾羌回酋霍集占築臺城東北端濟布以右翼後隊攻之賊拒戰我兵擊斃賊二十餘賊退入城時將軍兆惠被圍於黑水端濟布轉戰十餘至呼爾璊合兆惠軍二十四年二月敕部優敘給三等輕車都尉世職四月授鑲紅旗滿洲副都統七月隨大軍追賦至阿爾楚爾及伊西洱庫爾淖爾端濟布以兵二百截其逃路偵賊寨山巔越嶺攻之被創事聞下部議敘凱旋賜塔什巴圖魯號命圖形紫光閣御製贊曰將軍黑水先衆徑渡固營待軍實端濟布衆寡稍挫倉卒周防奪回人馬勇且謀長二十六年卒贈都統銜諭曰端濟布前在軍營頗著勞績且打仗受傷得有殘疾回京身故定例惟陳亡人員始入昭忠祠端濟布雖非陳亡但念其久在軍營效力打仗得傷回京身故與陳亡者無異著加恩準入昭忠祠尋賜祭葬諡壯節子伊逹禮襲世職明瑞明瑞滿洲鑲黃旗人姓富察一等承恩公富文子乾隆十四年由官學生襲世爵授二等侍衛二十一年四月管理健鋭營五月命以副都統銜赴西路軍營充領隊大臣時阿睦爾撒納叛竄哈薩克明瑞隨定西將軍逹勒黨阿追之再與哈薩克戰多斬獲上嘉其奮勇行陳授副都統二十三年四月追擊推素隆集賽逃人八十餘户降之殱其拒戰者收駝馬軍器得旨嘉奬十一月授户部右侍郎二十四年三月授參贊大臣御前侍衛尋諭曰明瑞自到軍營凡遇陳戰領兵奮勇行走可嘉加恩於現襲公爵加賞毅勇字號授為承恩毅勇公五月隨將軍兆惠𠞰逆回霍集占於葉爾羌敘功賞雲騎尉世職八月追賊於和斯庫魯克山賊衆六千餘負嵎固守我兵九百奮勇鏖戰賊大敗尋復恃其馬力來拒陳斬賊五百餘級生擒及傷竄者無算諭曰覽奏我師以寡敵衆力戰敗賊實屬奮勇效力朕心甚為嘉悅著交部從優議敘復賜御筆詩扇曰世胄更勳戚少年能老成從軍俾習事屢戰得英聲適以狂狙遁因將徑旅征欲遮先信漏不捨竟蹤橫地利彼雖擅人和我實勍騎惟九百到賊乃數千迎少卒勝其衆勇還濟以誠勗哉俘二竪衛霍遜功名十月賞戴雙眼翎二十五年四月奉旨明瑞所得之雲騎尉與伊弟奎林承襲明瑞仍承襲一等承恩毅勇公世襲罔替二十六年伊犂回部功成命圖形紫光閣御製贊曰椒室懿親年少志雄謂可造就俾學從戎獨出獨入既忠且壯屢立宏勳愜豫所望五月授正白旗漢軍都統尋轉户部左侍郎二十七年三月詔赴伊犂九月授領侍衛內大臣十月授伊犂將軍二十八年三月敘平定準噶爾及回部功給騎都尉時哈薩克汗阿布勒比斯來索逃回伊犂之厄魯特明瑞以凖噶爾已平厄魯特等投回伊犂乃其故土斥責之并請敕下烏里雅蘇台將軍一體辦理諭曰明瑞所辦其為得體從前雖無彼此不留逃人之言但成衮扎布曽將自哈薩克逃出之厄魯特給回阿布勒比斯遂欲援以為例著傳諭成衮扎布等嗣後遇此等事俱照明瑞等所辦駁之先是明瑞面奉諭旨籌辦塔爾巴哈臺駐兵事宜至是奏言屯田兵應駐雅爾城留馬兵三百照管貿易餘馬兵千二百交領隊大臣於周圍巡查雅爾與伊犂多往返文移請自額敏河沿至巴爾楚克沁逹蘭設大卡倫三各駐兵三十其庫克托木嶺等處酌安卡倫則塔爾巴哈臺一帶聲勢相接現今烏嚕木齊駐兵較多於巴里坤請將二處辦事大臣撤回巴里坤提督移駐烏嚕木齊烏嚕木齊兵移駐巴里坤奏入詔以烏嚕木齊大臣移駐雅爾餘如所請二十九年四月奏請伊犂添設理事同知從之十二月疏言雅爾等處駐兵屯田所需器具於緑旗兵內挑選匠作購辦物料以備臨時添補挽車輛之馬俱於牧羣撥用報聞三十年二月烏什小伯克賴黑木圖拉等聚衆五百餘乘夜縱火焚掠據城為變明瑞派副都統觀音保往援旋聞駐烏什副都統素誠自戕即親統兵進時恭贊納世通先帶兵至烏什之鄂托巴什觀音保至納世通派守隘不令進剿復行文止明瑞兵明瑞慮觀音保兵既撥防其進剿兵半係回人及布魯特不可恃仍統兵進奏入上以所辦甚哈嘉之三月抵烏什賊衆二千餘來犯明瑞與觀音保等擊之奪臺七殺賊二百餘俱傷入城山險城堅明瑞設防困之復遵旨查奏素誠狂縱激變及納世通凌辱回衆副都統辨塔哈掩飾兵敗狀命尚書阿桂赴烏什傳旨將納世通辨塔哈正法賊困守既久謀夜襲大營我軍偵知之預設備賴黑木圖拉中箭死賊復推其父額色木圖拉為阿竒木悉衆死守不敢出明瑞簡巴圖魯六百餘中夜携雲梯分道潛往薄其城先登東北隅賊未覺梃刃交下守陴賊驚竄即舉火招繼進者循城北至東南毁其堞天明收軍仍逼城築壘斷其樵汲賊城糧盡遂內潰八月疏報克復烏什城上以所奏簡略敕明瑞阿桂將入城擒賊情形逐一奏聞尋會奏領兵築垜圍城原充烏什商伯克沙布勒縛首逆額色木圖拉及助逆要犯四十二人以獻磔首逆有名賊犯分别正法其被賊拘及匠作婦孺萬餘口分起解送伊犂諭曰賊人戕我大臣官兵以死拒守及長圍久迫始縛獻首惡希冀茍免誅戮凖以天理人情豈復可赦惟盡以軍法從事始足申國憲而警愚頑今伊等既從事姑息著將送往伊犂人等即交伊二人飬贍交部嚴加議處又諭曰素誠等苦纍回人各情節從前得之俘囚之口今額色木圖拉等正犯既經就獲理應嚴訊起釁緣由及素誠所犯是否屬實使情罪確鑿以成信讞乃伊等一概置之不問輒將賊黨正法有是理乎明瑞阿桂此次辦理錯謬不得不交部議處以示懲創其在事將辨兵丁仍交部分别議敘部議革職詔從寬留任旋命寫戰圖奬其奮勇克復御製詩曰勳戚伊犂董重兵早年回部得威名變聞遂率雄師援途逺仍教兼驛行可笑無能還妬阻幸因未聼遂遄征逆回始相倉皇守壁壘新知紀律明明瑞尋奏酌留兵五百駐守留原協領伊昌阿侍衛舒明阿理工作原御史忠德理糧餉調巴里坤遊擊陳堯典理屯田得旨烏什事竣滿洲索倫兵無須多駐著留滿洲兵一百名索倫兵一百名十月會奏回部事宜一阿竒木之權宜分一格納坦之私派宜革一回人之差役宜均一都官伯克之補用宜公一伯克等之親隨宜節一賦役之定額宜明一民人之居處宜别一伯克等與大臣官員相見之儀宜定廷議允行三十二年緬甸滋擾總督楊應琚以措置乖方獲罪三月命明瑞為雲貴總督兼兵部尚書議政大臣經理軍務六月奏言永昌騰越至順寧威逺普洱沿邉土境延袤二千餘里傍途側出處處駐兵即二三萬衆不敷分派臣等酌議土境扼要總區如迤東之九龍江迤西之隴川適中之黑山門應各酌留一營派土練固守委妥員統領選勇幹馬兵土練不時逺偵遇賊隨時勦逐其小路令總區將辨派人時往逰巡庶防兵大減而聲勢不分至分路進勦臣由龍江一帶出口至阿瓦賊巢係由東轉南折而西隔越滚弄江下遊倍逺新街水路為緬匪要地必竭力守禦新街以東俱石墈小澗舟不能逹擬於新街上遊伐木造船使木片沿江下先聲牽綴大兵自永昌騰越出口以宛頂木邦一路為正兵餘臨期相機或分兩路由猛密等處尅期並進叢雜僻徑隨時出竒設疑使賊疲於奔救無暇他出窺伺我軍裹糧前進較遞運多節省至奏摺文報黑山門遮放以內仍設臺站即於進剿官兵內選妥幹勇壯者數十賫交黑山門轉遞如經過外夷部有誠心向化者再於其部落留兵設站遞送上嘉之十月授將軍管總督事務十一月由宛頂木邦進抵臼小破賊寨前渡打疊江過錫箔至蒲卡以西擊敗賊伏兵至蠻結四山環繞賊立十六寨防守用濕木交排實以土環浚深溝外密竪木柵內列象陳伏兵明瑞統兵居中令領隊大臣扎拉豐阿李全踞其東觀音保長青踞其西賊突出犯西隊觀音保長青奮力勦擊明瑞督本隊兵並進斬級二百餘賊退保柵乃留兵二千令副都統伍三泰音濟圖逹興阿張兩翼以壯聲勢分滿洲緑旗兵為十二隊明瑞首先進擊賊驅羣象以拒明瑞目鎗傷䇿馬指揮不少挫官兵奮擊羣象反奔我兵毁柵進無不一當百逼第二柵貴州藤牌兵王連攀柵上飛身躍入縱橫賊隊中擊殺十餘人我兵遂擁入鼓勇勦殺自申至戍賊棄寨竄斬級二千餘生擒三十四人獲軍械糧畜無算捷聞諭曰明瑞秉性純誠才優幹濟前者西陲之役每身先士卒效績宣猷昨嵗自伊犁來京陛見方值緬酋滋事前督臣調度失宜因令節制雲貴並授為將軍領兵進勦自任事以來凡辦理軍營諸事均能悉心籌畫動合機宜近自木邦整隊冞入於臼小地方統衆毁柵今行次蠻結復親冒矢石殱賊因糧摧堅陷鋭以致目受鎗傷猶鼓勇直前克掦我武自此酋衆望風驚潰刻日直搗賊巢佇聞捷奏朕心深為嘉慰明瑞現在所襲之公係承恩世爵今既屢著殊績自應特沛恩施用示優異著授為一等誠嘉毅勇公賞給黃帶紅寶石頂四團龍補服所有原襲承恩公著伊弟奎林承襲十二月師次革龍地近天生橋渡口賊預毁兩旁所植大木於山頂立柵明瑞令逹興阿率兵二千仍由大路進佯為奪取渡口之勢自督兵從間道繞至天生橋河上流乘霧畢渡進據山梁賊衆驚潰我兵進至象孔取道猛籠土司境就糧遇賊擊敗之土司逃避搜得窖氷二萬餘石駐兵三日趨猛密躪賊境數千里屢戰皆捷旋由大山移駐小猛育連攻賊營時恭贊大臣額爾登額頓兵旱塔退回虎踞關避賊繞從內地小隴川緩行巡撫鄂寧檄援不應賊偵知孤軍併力攻圍我兵火藥糧餉俱匱以疲馬騾作三日糧三十三年二月明瑞令將領分隊以次衝出自冒矢石殿後胸臂被鎗陳亡都統扎拉豐阿護軍統領觀音保亦殁於陳事聞上軫悼特旨照班第例從優議恤御製挽詩曰蠻結之捷鼓勇進孤軍深入心牽縈屢催繼援竟弗援僨轅駑馬誠堪驚然猶因糧勦猛密計當兩路兵合并誰料援師竟避賊強弩末被魯縞輕蜂屯蟻雜截歸路將軍體恤諸孱兵携數勇士獨殿後不虞中要害命傾嗟哉捐軀因為國痛惜如失股與肱雙忠雙烈及雙義三逄斯四何為情要當専祠表勳績俾爾千古存如生恨緬事益難中止雪讎大舉期功成四月柩至京扎拉豐阿觀音保柩亦至上親臨奠酹磔額爾登額於柩前以正逗遛失援罪御製詩曰全師原是出蠻陬何事三臣命獨休被阻稜稜恥生返捐軀赫赫永名留殿軍無愧孟之反隕節同如趙慶州故里櫬歸臨奠酹酒杯釃盡淚還流賜祭葬如例諡果烈諭曰將軍公明瑞夙秉忠誠厯著勳績昨命統兵進勦緬匪身先士卒屢挫賊鋒乃以懸軍深入而額爾登額等有心逗遛後援不繼困於猛臘地方保護諸軍身留殿後衝冒矢石以受傷身殞已降旨加恩優恤並入祀昭忠祠以酬忠藎從前駐藏大臣傅清拉布敦鋤凶死事曽敕建雙忠祠秩在祀典兹明瑞勤事捐軀義烈尤堪嘉尚著循前例於京師特建専祠舉行嵗祀其先後陳亡之都統扎拉豐阿護軍統領觀音保總兵李全王玉廷均豫入祠從祀用慰忠魂並御書賜額曰折衝抒藎四十四年御製懷舊詩列五功臣中詩曰凡經百餘戰戰必先衆軍不謂世胄家而有如此人讀書知大義挽徑鮮與倫短身既精悍謀略兼出羣功難僂指數嘉賚匪因親征緬次猛臘獨入克捷頻恨遇忌功者逍遙河上陳力戰絶後繼終焉捐其身於爾無悔怨於我增悲辛不須讀杜牧謂過趙使君子惠倫襲一等誠嘉毅勇公世爵博清額博清額滿洲鑲黃旗人姓富察乾隆十七年翻譯進士授兵部主事遷户部員外郎軍機章京行走三十四年隨經略大學士公傅恆赴緬甸軍營十月大軍敗賊於新街博清額在事有功議敘加一級三十五年三月回京授正藍旗滿洲副都統七月署兵部侍郎兼理刑部侍郎事詔偕户部侍郎索琳赴土默特鞫諴親王壻納遜特固斯謀鴆格格案三十六年正月因不能究出實情反將案犯交納遜特固斯看守又不候旨徑同索琳回京交部察議降二級留任三月改授內閣學士七月命察視永定河不速往傳旨嚴飭令還京三十八年四月命赴四川軍營會鞫提督李煦副都統常保住諱賊事五月博清額據防卡兵丁供詞劾煦等諱賊屬實命再詳鞫六月木果木大營失利李煦常保住隨參贊海蘭察防駐免治罪時賊勢鴟張博清額偕總督富勒渾馳守蒙古橋復帶兵三百赴美諾與海蘭察相機䇿應上嘉之授領隊大臣諭曰博清額以派往審事之人即同富勒渾帶兵馳守蒙古橋旋往美諾與海蘭察督兵聲援連日海蘭察奏到諸摺俱有條理必係博清額為軍機章京辦事年久熟習機宜故能周到若此著賞戴孔雀翎八月同海蘭察奏整理軍器俟將軍阿桂至日嚨時擬辦進兵事宜十月得旨博清額辦事不及阿桂其攻勦亦不及海蘭察不必在軍營領隊即著回京仍在軍機章京上行走三十九年署理藩院侍郎四十年授正黃旗蒙古副都統四十二年七月署刑部侍郎四十三年閏六月命往庫倫辦事四十四年授兵部侍郎四十五年十月遷理藩院尚書署都察院左都御史十一月命往西藏辦事四十九年授正白旗蒙古都統五十年詔還京未至卒諭曰博清額前在軍機章京上行走旋擢卿二宣力年久此次前往西藏駐劄辦事已閲數載因念其年力未衰特命回京供職以資倚任兹聞溘逝殊堪憫惻除已由藏賞銀三百兩料理喪事外所有應得恤典該部察例具奏尋賜祭葬如例諡恭勤福隆安福隆安滿洲鑲黃旗人大學士忠勇公傅恆次子尚和嘉公主授和碩額駙乾隆二十三年授御前侍衛二十六年三月兼管光祿寺四月兼管奉宸苑七月掌鑾儀衛事三十三年二月擢兵部尚書軍機處行走三月兼議政大臣四月調工部尚書三十四年正月授御前大臣署總管內務府大臣九月署理藩院尚書賜紫禁城內騎馬三十五年三月兼步軍統領七月管理藩院事十月授領侍衛內大臣襲忠勇公爵三十六年疏言馬兵例準鄉試又可在營升拔是一人而兼兩途請將籍𨽻大宛兩縣兵丁與武童一體應試取中武生再準鄉試部議從之三十七年四月署鑲黃旗滿洲都統五月散秩大臣銜阿爾泰總兵宋元俊恭奏四川總督桂林在卡了軍營約令參將薛琮間道夾擊金川賊桂林略一進攻即退並將護軍統領明亮副都統鐡保撤回薛琮以糧盡救不至戰歿軍盡覆桂林揑飾具奏與鐵保終日酣飲將偹罕得見在軍營修房居住勒取供應令提督汪騰龍交銀總兵王萬邦贖取金川所遮官兵命福隆安往審六月奏審無酣飲勒𣲖事桂林所居有預備貯米板屋三間無不見者薛琮告急即令宋元俊往援惟官兵傷損不即查奏屬實至贖取官兵係户部司員汪承霈聞有巴旺布拉克底土兵送出迷失官兵信告知桂林取銀五百交汪騰龍備賞後未見送出仍將銀取回其王萬邦給宋元俊札揑寫收銀贖人係為宋元俊所愚請分别治罪諭曰宋元俊汪承霈均著革職拿問同桂林一併解赴行在候訊至王萬邦初為宋元俊所愚一經詰訊即吐實情此案得以明確情尚可原且領兵打仗頗為勇往免其革職治罪明亮鐵保汪騰龍已降旨革職鐵保仍遵前旨留軍營效力未幾元俊議革職仍留軍營桂林得旨發伊犂效力贖罪是月福隆安又奏言賊畨踞守碉樓木寨時出伺我兵舉動軍營事應謹密方可乘其不備已申明紀律整肅軍容以杜賊畨窺伺又言臣沿途查看山險路遙挽運維艱打箭爐等處雖貯糧萬餘而軍營存糧無幾不能克期趕運阿爾泰年邁請令陕甘總督文綬往章谷等處督運得旨調文綬四川總督三十八年閠三月充四庫館正總裁四月加太子太保十月授正白旗滿洲都統三十九年四月御史李潄芳劾福隆安家人藍大在金陵館酗酒滋事鞫實擬罪部議革福隆安職諭留任十月疏言鳥鎗為行軍利器八旗専操會操演習九進十連環所向無前各省緑營鳥鎗請照火器健鋭二營進步連環式一體演習下部議行四十一年正月調兵部尚書仍管工部事二月金川平敘功加三級命圖形紫光閣御製贊曰父定復叛子嘗愧之是用稽首躬請出師留於左右俾習規畫頗有嘉謀協豫廣益七月兼文淵閣提舉閣事十一月充國史館正總裁四十二年四月暫署吏部尚書四十三年錦州副都統德福劾協領福神保藉差斂銀命福隆安查辦尋奏訊福神保斂借商銀交將軍𢎞晌所設差局幫貼差費公用𢎞晌並未入已但以宗室大臣見小滋弊請交宗人府會同刑部治罪福神保等發烏嚕木齊效力餘分别枷責得旨𢎞晌訊無染指亦未授意派斂著加恩以散秩大臣效力贖罪四十四年三月直𨽻總督周元理奏審辦井陘縣民李馥等斂錢告官梁進文抗官毆差案步軍統領衙門緝獲案內逸犯供知縣周尚親有科斂侵肥各欵命福隆安同刑部侍郎喀寧阿錢汝誠會鞫尚親派纍屬實抵罪周元理以徇庇劣員革職四十七年四月上躬詣雩壇行禮諭曰常雩大典朕親詣行禮壇內一切禮器均宜敬謹安設乃本日行禮時見壇內懸挂天燈僅止二盞又更衣幄次所設坐褥亦不整齊郊壇典禮朕親詣行禮尚如此草率不敬若遣官恭代更不可問矣其罪甚大非尋常錯誤僅止交部議者可比工部堂官羅源漢等近因福隆安患病精神不能周到遂各委蛇袖手而派出司員等亦俱怠忽從事以致種種玩誤不可不嚴示懲警福隆安若照常辦事時遇有此等錯誤其處分必較諸人加倍姑念患病屬實著加恩免其革職仍罰其公俸十年四十八年五月留京辦事十二月上閲朝審招册疑趙文逹毆斃夫役張二案命覆訊諭曰前閲本年朝審情實招册內趙文逹毆死夫役張二一案忽疑其或有頂凶情節因詢之和珅福康安福長安俱不能深悉其中情偽至朝審勾到之晨大學士阿桂奏此案情節頗有疑竇請旨再行研審確情因派阿桂和珅福康安劉墉會同刑部堂官覆訊該犯等始猶堅執前供及研鞫再三據供實係福隆安管事家人富禮善主使責打趙文逹聼從動手屬實此案既據審明可見從前刑部堂司官不能盡心推鞫復令查檢原案初供係福隆安署步軍統領時移送刑部其原咨內本有家人富禮善喝打之語乃形部定案時趙文逹挺身直認證佐匠役等亦隨同指供司官既不嚴鞫而堂官等意在觀望不肯深求顢頇了事以致富禮善脫然事外福隆安病體至今未愈被家人始終瞞哄竟無見聞而刑部堂官不加駁詰推求未免有意瞻徇福隆安情面刑部堂司官實咎無可寬所有該堂官及主稿隨同畫押之司官等俱著交部嚴加議處至福隆安於此案雖原報本有富禮善之名及後改供亦實不知情但致令刑部司官意存觀望即伊平素恃朕恩以致人畏即其過也此案若趙文逹已經勾決不特福隆安獲咎更重即阿桂等亦不能無罪兹幸究出情實未致枉縱其情節尚可稍從寬減福隆安著罰公俸十年仍交部嚴加議處部議革職詔免四十九年閏三月卒諭曰尚書額駙公福隆安醇良謹飭勤慎小心綜理部務宣力有年昨嵗因舊症復發屢經給假調理賜藥賜醫方冀年力尚強可以漸次平復倚畀正殷近聞病體加劇即令伊子豐伸濟倫馳驛回京省視兹聞溘逝深為悼惜著皇八子親往奠醊並賞給內庫銀五千兩派金簡經理喪事任內降革處分概豫開復前次伊家奴犯罪自請罰公俸十年亦加恩寬免應得恤典察例具奏尋賜祭葬如例諡勤恪子豐伸濟倫襲一等忠勇公爵現官御前侍衛護軍統領副都統豐升額豐升額滿洲廂黃旗人姓鈕祜祿尚書公阿里衮子乾隆二十五年由拜唐阿授三等侍衛三十四年襲一等公擢領侍衛內大臣三十五年六月管理三庫事務旋署兵部尚書七月授御前大臣兼鑲藍旗蒙古都統總管內務府大臣三十七年二月將軍溫福疏劾恭贊五岱乖謬上命豐升額偕額駙色布騰巴勒珠爾赴金川軍營訊問五岱旋發伊犂效力贖罪三月命豐升額留軍營授參贊大臣四月諭曰豐升額奏事列名應在阿桂前但阿桂厯練軍務豐升額甫經學習仍著阿桂列名在前豐升額列名在後豐升額不可稍存意見致有掣肘阿桂亦不得推諉務須和衷辦理期於軍事有益五月豐升額以大炮擊傾東瑪賊寨翼日飭官兵進攻聞賊營鎗聲不絶知賊尚衆佯退突令章京佛進泰富爾賽逼寨賊驚拒侍衛伸逹蘇以大炮斃數人賊稍却我兵力戰賊或墮崖死或焚斃餘皆遁遂克東瑪上嘉之六月攻固卜濟山梁豐升額偕舒常馬彪等率兵抵色爾渠令烏什哈逹巴三泰等左右進攻舒常馬彪等分應豐升額由中路進近賊卡賊盡竄毁其石卡次日復以大炮擊之烏什哈逹等率兵潛下巖磡豐升額由山徑䇿應鏖戰敗之盡獲其碉卡七月仍以炮擊賊碉令烏什哈逹佛倫泰等設伏彰靄巴三泰等據西北峯斷别斯滿來援賊豐升額等突入殱賊甚衆克色爾渠大碉及卡房百餘十一月豐升額與溫福克明郭宗沿途碉卡敗賊於公雅山十二月克嘉巴山焚念經樓進次布朗郭宗克底木逹等寨擒僧格桑之父澤旺詳見溫福傳是月授豐升額為副將軍溫福議分三路進溫福由功噶爾拉進攻喀爾薩爾阿桂由僧格宗至當噶爾拉同取噶拉依豐升額由章谷吉地赴綽斯甲布與舒常合取勒烏圍疏入上嘉之自是豐升額遂駐兵宜喜三十八年四月晉太子太保六月木果木師潰七月奏據綽斯甲布土司來告賊謀斷宜喜糧臺現在實力修防智固山諭曰豐升額在宜喜軍營原屬三路並勦及聞溫福軍營失事諭令撒兵今阿桂既退據得地軍氣復伸各土司中聞阿桂既出與豐升額遙為犄角亦斷不敢復萌動搖之心並可鎮撫綽斯甲布衆心豐升額必當仍駐宜喜為是其善體朕旨妥協行之十一月將軍阿桂收復小金川豐升額奉命移兵丹壩三十九年二月晦夜半豐升額自逹爾札克之北山澗越石踏雪以進黎明抵凱立葉山麓令侍衛那木札等過嶺直入見大峯六俱有碉賊瞰我兵將近鎗石並發官兵直前衝擊又令侍衛彰靄明仁取第二峯瑪爾占伊逹里等取第三峯令五岱於三峯下立營議取第四峯奏入諭曰凱立葉一路既難遄進原不應過於株守今留五岱在凱立葉牽綴賊勢而豐升額前赴阿桂軍營合力進攻兵勢更盛若果進至勒烏圍則凱立葉之賊自可不攻而潰十月賜元狐帽貂馬褂是月攻克凱立葉山梁十一月攻格魯克古丫口大兵橫越山溝四山梁五獲碉五十寨落三百遂通丹壩奏入上深嘉悅四十年正月偕阿桂奏克康薩爾四月克榮噶爾木城及木思工噶了口碉座進攻下巴木通碉柵盡克勒吉爾博山梁進據得式梯官寨命優敘五月攻遜克爾宗圍將合分三路並進賊不能支連取碉十二賊奔箐盡殪之諭曰遜克爾宗一帶攻取年餘尚未得手今豐升額全行奪取實為奮勉出衆豐升額乃巴圖魯額亦都之孫其果毅公爵即係額亦都傳襲前將軍兆惠因平定凖噶爾回部曾於公爵上加封四字今豐升額能繼其祖著於果毅字下加繼勇二字以示優奬七月攻章噶豐升額督官逹色仁和等左右分攻海蘭察攻其正面賊於碉外置壕三壕外立木柵我兵毁柵鋪壕乘之緣碉角而上從碉頂壓下賊盡竄克之並得其旁木城八月阿桂分兵四面攻勒烏圍豐升額策應克勒烏圍官寨及轉經樓喇嘛寺捷聞得旨優敘十二月克格隆古科布曲山梁四十一年正月克瑪爾古當噶山梁遂進圍噶拉依賊巢奏入諭曰副將軍豐升額本襲公爵復加賞繼勇名號著再賞以一等子暫令伊弟布顔逹賴承襲俟豐升額生子後仍令其子承襲是月調户部尚書賞戴雙眼孔雀翎二月金川平賜縀四十端銀四千兩四月凱旋上行郊勞禮恩賜御用鞍轡馬一匹命圖像紫光閣御製贊曰宜喜弗動定見識機後副西路親勵戎衣遜克爾宗督兵進取國之藎臣勇繼乃祖是月管崇文門稅務旋署左都御史兼署理藩院尚書十月授步軍統領兼管太常寺樂部四十二年四月調正白旗滿洲都統兼管禮部事務五月諭曰尚書公豐升額昨在金川奮勇著績克紹祖風且能勉承伊父阿里衮忠誠素志曽降旨於所襲果毅公爵加繼勇二字以示奬勵所有阿里衮原襲公號亦著加此二字用昭世臣濟美是年十月卒諭曰尚書果毅繼勇公豐升額秉性忠誠奉職勤恪昨以副將軍征剿金川殫力宣忱奮勇著績能承父志以紹祖風深可嘉尚是以降旨於伊所襲果毅公爵加繼勇之號以奬勳勞伊年富力強正堪任使乃於前月忽遘沉疴即派太醫院堂官疹視頻加存問並賜人參以冀速痊遽聞溘逝深為軫惻著加恩賞給陀羅被派散秩大臣一員帶領侍衛十員往奠茶酒並著加恩晉贈太子太保復諭免其代賠伊父未完銀二千七百餘兩賜祭葬諡誠武繼子明安襲公爵現官乾清門頭等侍衛欽定八旗通志卷一百四十五
