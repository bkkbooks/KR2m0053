body:
  text: 欽定四庫全書欽定八旗通志卷六十六土田志五土田規制奉天規制國初創業東土扈從将士按旗分處各有定界繼因歸附益衆糧不足支展邊開墾移兩黄旗於鐵嶺兩白旗於安平兩紅旗於石城其兩藍旗所分張義站靖逺堡地瘠以大城地與之順治元年定諸王貝勒貝子公等准於錦州各設荘一所其額外各荘令其退出又定差往蓋州收税領催給園地十晌又定分撥地畆縁邊次第挨給若不論疆界挑選膏腴徇情𣲖撥者佐領領催分别罰責又定錦州蓋州各官荘屯非奉欽賜者概令退出又定自京城來人員曾将伊原給地繳部者准給熟地未繳者給草萊地五晌若有餘丁者著該管官具結給與草萊地五年題准沙河所以外錦州以内八旗官貟家丁每名撥給地六晌又題准官員荘屯兩黄旗設於沙河所兩白旗設於寧逺州兩紅旗設於塔山兩藍旗設於錦州八年覆准山海闗外荒地甚多有願出闗墾地者令山海道造冊報部分地居住十二年題准遼陽鐵嶺至山海闗另設邉界八旗荘地多有在邊外者相沿已乆不必遷移今照舊種住惟酌量邊界開門勿悮耕穫康熙十二年題准凡欲往盛京領地設荘䕶墳者若将在京所受壮丁地退出准撥給盛京熟地不願退出者撥給荒地十九年八月户部郎中鄂齊禮踏勘盛京滿洲新開蒿地奏言東至撫順西至山海闗南至蓋州北至開原計田萬頃有竒徵収錢糧約僅有萬兩據将軍言若将滿洲自開地畆盡撤入官恐難度日上是之又户部議准盛京未墾荒地荒田一百五十四萬七千六百餘晌内除皇荘喂馬打草地二萬二千四百餘晌仍有一百五十二萬五千二百餘晌應将此地畆註冊有民願開墾者州縣申報府尹給地耕種徵糧若旗人有力願墾者亦将人名地數呈明註冊若自京城移往官兵人等有将在京地畆退還願領盛京地畆者将彼處旗人墾出餘地并未墾荒地酌量撥給得㫖盛京田地闗係旗丁民人生計最為𦂳要著爾部賢能司官二員前往㑹同奉天将軍副都統侍郎等及府尹将各處田地清丈明白務令旗民咸利設立邉界永安生業又覆准奉天新來之民界内安揷縁由次第墾種其原在旗界内居民有願移於民界内墾種者有仍願在旗界内墾種原地者聼從其便至旗人民人力不能開墾荒甸又復霸佔者嚴查治罪二十四年四月諭大學士明珠曩者每一夫田撤還一晌之田近日丈量各旗有察出溢額之田今兹撥給何以不給此等田而以百姓開墾之田四百頃撥給耶其令户部堂官察溢額之田現有若干及以百姓開墾之田因何撥給詢問明白同户部堂官面奏二十五年題准錦州鳳凰城等八處荒地分撥旗丁民丁給牛屯墾每十六丁内二丁承種餘十四丁助給口糧農器又題准黑龍江黙爾根地方户部各差官一員監看耕種黙爾根令索倫達呼爾官兵耕種黒龍江令盛京官兵耕種又題准鳳凰城等八處差大臣三員司官八員前往㑹同盛京将軍户部侍郎酌量屯墾是年十二月諭大學士等日者遣部員自吉林烏喇至黑龍江以蒙古錫伯達呼爾索倫等人力耕種田榖大穫夫民食所闗至重來嵗仍遣前種田官員以蒙古錫伯達呼爾索倫等人力耕種郎中博竒所監種田地較諸處収穫為多足供蹕站人役之口糧又積貯其餘榖博竒効力視衆為優其令註冊此遣去諸員可互易其地監視耕種博竒又復大穫則議叙之二十六年十月諭大學士等黑龍江官兵口糧闗係至重屢次轉運米數並黑龍江黙爾根地方所種米數宜加察明盛京等處運米為乆逺禆益之計當周詳區畫又發遣彼處遊手無事之人甚多其口糧作何酌給前至黑龍江一帯乃徑直通衢往來轉輸㫁不致稍有阻滯如蔡毓榮等巨富之人并殷實之家槩予口糧殊覺未當彼處漢軍皆著察出披甲當差逰手無事之人可分設官荘廣開田畆以為恒産令户兵二部賢能司員迅往逐一察明確議具奏二十八年諭奉天等處旗民田地所立界限不明著将各部賢能司官具題差往㑹同盛京户部侍郎及該府尹将旗民田地並牧厰逐一確查各立界限詳定具奏户部郎中鄭都等疏言臣等遵㫖㑹同盛京戸部奉天府府尹親往各屬地方詳察旗民地畆分立界限嗣後不許旗人民人互相墾種以滋爭端如有荒地餘多旗民情願墾種者将地名畆數具呈盛京户部在各界内聼部丈給庻界地分明旗民各安生業不致互相爭告詔從之二十九年黑龍江将軍薩布素䟽言黙爾根居住之總管索倫安諸祐等每年耕種官田二千餘晌令官兵移駐黙爾根請即以此項成熟之田分給耕種詔從之三十二年議准盛京旗人所種地畆每年地一晌徵豆一闗東升草一束令将地畆丈量不論何屬之人俱照八旗十三城所管地界交與協領城守尉等催追三十七年諭著停止差往種地嗣後不必具題如差往種地再行頒諭三十九年題准旗人所種地畆交該管官員催追五十五年覆准旗人開墾地畆令該管官員出具保結呈報盛京户部其民人開墾地畆仍在地方官處具呈轉報盛京户部准其開墾将墾過地畆於年底彚冊報户部查核雍正二年議准盛京旗人所種地畆仍照舊例在河界内種地即将彼界協領城守尉為督催之員佐領防禦驍騎校為經催之員如有抗欠不交者該督催官員即行拘拏治罪如有催追不完之數計分數題㕘四年議准盛京旗地自康熙三十二年輸草豆以來未經查丈檔冊舛錯旗民彼此爭告經年不絶将王以下至閒散宗室盛京所有荘屯内管領荘頭壮丁捕牲人等名姓居住村荘查明係何王府及何閒散宗室之人行文八旗分别造冊送奉天将軍盛京户部以備查丈地畆之大臣㑹同核對仍将查丈過地畆若干輸納草豆若干造冊具題查核又覆准盛京地畆令奉天将軍府尹户部侍郎㑹同差往丈量地畆大臣将十四城界内分為十四分旗地民地公同𣲖出賢能官員㑹同查丈其皇荘捕牲人三陵内佐領官兵屯荘執事人閒散人等千丁驛站臺上園丁户禮工三部屯荘官丁僧道各項人等地畆率領伊等該管官公同查丈務期詳悉清楚無致遺漏隠匿丈完之日将丈過地畆數目造册送部倘有隠匿不清之處日後發覺将查丈官從重治罪又覆准寧古塔船厰等處設立州縣打牲烏喇離船厰甚近著船厰知州兼轄管理其拉林河等處地畆不准開墾交與白都訥新設知縣嚴行禁止又覆准船厰等處開墾地畆禁止旗民互相典買又覆准赫爾素等驛站各邊地之驛站所有近城之公旗荘屯寧古塔所有之開熟田地亦如奉天府屬之州縣照每畆三分錢糧例交納若有附於原主名下未經查出者佃户首報該縣給與印票即令其交納錢糧不許原主侵佔十一年題准喜峯口駐防兵丁一百名将鐵門闗外大屯官地分給每名給地一頃十有五畆七分有竒菜園四分有竒令其耕種照民例分别科則按畆輸租租銀留充兵餉乾隆二年覆准黑龍江湖蘭地方設立官荘令盛京将軍於八旗開户人内選能種地壮丁四百名挈帯家口前往開墾每壮丁一名撥給地六十畆葢給草房二間每十丁合編一荘共設官荘四十所每十荘設領催一名共設領催四名管理由盛京遷移家口每丁給碾磨銀五兩其家口每人給整備行装銀二兩沿途各給口糧撥驛站車輛送至吉林由吉林撥運糧船仍給口糧送至湖蘭初至湖蘭每丁給冬夏衣㡌其家大口每月給糧二斗四升九合小口半之每開墾地六畆給籽種二斗每荘給牛六頭如有倒斃動支庫貯牛價銀買補再湖蘭安駐兵丁各有墾種地畆不能代官荘人等助墾於每荘額給牛六頭外各多給牛二頭令全出已力墾種此牛如有倒斃無庸補給每牛一頭月給牛料糧一石二斗其家口糧給一年牛料糧給兩月皆停止每丁所受之地嵗納粗細糧三十石第一年免輸第二年交半第三年全納再委撥官兵採木造屋每間各給四兩飯銀動支庫銀倉糧令該将軍等分晰歸欵奏銷竢安設官荘事竣令盛京将軍於八旗開户人内再察有願往湖蘭墾種官地之人應増設官荘若干再議具奏六年議准湖蘭地方寛衍可設官荘之處尚多應将前設四十官荘内閒丁一百三十八名選擇五十名増設官荘五所撥地開墾每名給地六十畆及牛種器具口糧並每年應納糧數均照二年之例但選撥官荘閒丁不比他處移住其每丁應給房二間每間給銀四兩五錢令其自行葢造無庸别撥兵丁其餘丁備補各荘空闕七年議准湖蘭左近温徳亨山並都爾圖地方土性肥饒水草佳美應将盛京将軍所送願墾官地開户人内選能種地壮丁五十名増設官荘五所撥地開墾其資送及撥給田房牛種器具衣㡌口糧並應納糧數均照二年之例再六年増設官荘五所合之此次所増官荘五所已足十荘之數亦照例増設領催一名管理九年二月議政大臣和碩裕親王廣禄等議得副都統巴寧阿所奏開墾拉林地畆移駐滿洲一事以今年出派本處人丁一千五百名盡力開墾得地七百五十一頃二十一畆将此地即令原派一千五百人耕種明年再添派人丁六百名開墾又可得地三百頃二年所得共一千五十餘頃給與移駐一千户滿洲均分每户得地一頃有餘再者修造房屋衙署雜事甚繁只前所派人丁六百名不足供役請添派六百名給與塩菜銀兩及採辦牛隻犁鏵各費用即於吉林庫存項下動支仍令盛京户部照數歸欵如此則一千户滿洲地畆房屋可以按期完成等語查臣等議政處原議一千户滿洲每名給地三頃後經侍郎三和具奏二年内只能開墾一千六七百頃臣等續議且以二年内所墾均給外其餘隨其力量遞年補墾足額咨行在案嗣於乾隆八年九月奉㫖前據将軍鄂彌達等赴拉林阿爾楚喀踏勘地方将應撥給移駐一千名滿洲之地派本處官兵令第一年開墾一千二百頃次年開墾五百頃于甲子年秋間遣去駐劄等因具奏迄今一載所墾地畆不敷原奏數目只開墾七百餘頃此皆鄂彌達並不以事為事之所致也鄂彌達著交部察議其未墾地畆著交新任将軍博第務照原奏數目開墾如其難得量其所得若干預報該部将派往之人合地畆數目先行撥徃欽此欽遵亦在案巴靈阿博第自應遵㫖辦理今尚未辦遽議添派六百名開墾與原降諭㫖不符巴寧阿所奏均無庸議請交該将軍博第将原派人丁一千五百名内儘力通融耕種熟地仍将去年開墾未完地二百五十頃補墾足額所有已墾之七百五十餘頃著八旗先派七百五十人前往其未墾之二百五十頃俟墾足後仍派二百五十户續行遣徃以足一千之數奉㫖依議二十年十月大學士忠勇公傅恒等議覆将軍傅森奏稱今年海溝耕種開懇地五百頃出長榖苗尚屬茂盛因雨水過裕稍缺晒晾其収割登場者僅得粟米一千六百七十石稗米五十石蕎麥八百三十石俱收入新倉存貯再修理副都統衙署三十六間五百户滿洲住房二千五百間現已完八屯共掘井三十二眼查乾隆九年移駐滿洲一千户每口每日給米八合三勺今所移五百户自伊等到時起至秋收時止應給八個月口糧所收新墾榖石不敷給與請于拉林存倉榖内動支等語臣等去年㑹議将拉林阿爾楚喀地方盡數籌畫可㨂選滿洲三千名分為六起遣往今此項遣徃兵丁自丙子年起程應行給與銀兩房間地畆俱照前次一千名滿洲之例辦理奉㫖依議二十一年十一月兵部具奏據吉林将軍覺羅額勒登咨稱拉林所管瓦琿地方修葢房屋備第一起五百户滿洲居住茲已完竣其本年收成榖石亦已報部請于丁丑年春季地未泛漿之前遣第二起前往方可不悮耕種二十二年十一月兵部具奏據吉林署将軍傅森咨稱今年西溝地方葢造第三起五百户滿洲房間完竣請于戊寅年春季地未泛漿之前遣往二十三年十一月兵部具奏據吉林将軍薩拉善咨稱今年霍濟墨地方葢造第四起五百户滿洲房間完竣請于己夘年春季地未泛漿之前遣往皆奉㫖依議二十四年十月奉上諭内務府議駁得禄奏請荘頭應交米石折銀一案辦理甚属錯謬盛京荘頭應交米石在本處尚有准其折銀交納之例而錦州相隔三百餘里反不准其折銀交納情理俱為倒置此案于本年正月奉㫖交議直延至九月底具奏即有移查何至延緩若是所有㑹計司承辦之員著降二等調用其餘同司各員俱著罰俸二年内務府總管及堂郎中俱著罰俸一年二十七年三月山海関副都統富黨阿奏言山海関駐防原有官員飬贍地一萬二千四百八十餘畆原奏作一千七百八十晌此内官員及寡婦等所應得數目並未分别查辦又有菜園田畆亦未丈量查官員等應得地數統算不及六千畆原奏作千晌其間餘剰甚多請将此項餘地一體查丈除應給者照數給與外其餘出之地酌辦飬贍鰥寡孤獨之户奉㫖依議富黨阿此奏甚是但富黨阿如此陳奏彼處官員必歸怨于伊未必實心遵奉著戸部派賢能司官一員前往山海闗協同富黨阿妥協辦理五月户部派員往山海闗㑹同副都統查丈事竣奏稱山海闗原給官員地畆曽經侍郎塞爾赫丈量造冊中有官兵墳𦵏之地及伊等祖上原得之地康熙三十五年收地冊内並予開除今臣部委員查丈既核與原册相符其伊等墳地及祖上原得地均應准其開除又奏山海闗舊設駐防協領等二十一員俱給有養贍地畆惟副都統一員及佐領八員乃乾隆八年添設並未議給地畆其每年所食俸米係採買供支造入兵馬冊内報銷在案今據該處丈出地畆除照舊仍給官員及飬贍孤寡尚多贏餘請将副都統一員佐領八員亦依原設官員之例給與地畆其應領俸米請自次年春季起一體裁汰庶帑項稍可節省而官員亦受其益又奏查定例各處駐防官員之寡妻有情願守節者准給期年半俸銀米今山海闗駐防官員寡妻因無期年半俸銀米向俱照伊夫原得地數辦給整分未免過優嗣後請減半給與仍俟孀婦物故或縁事回旗即将前項地畆撤回備用報部查核又奏闗外地畆較闗内之地有間今官員應得地畆若不将一年租榖按照俸米計算恐於官員無益應請㨂選上地准照伊等俸米之數仍以六畆為一晌副都統給與一百晌協領七十晌佐領六十晌防禦五十晌驍騎校筆帖式各四十晌謹案此處晌數未便更改縁前文有六畆為晌句其各官所得地畆應納錢糧仍照舊在盛京寜逺州旗倉交納又奏官員地畆應以上則給予所剰中則下則地足為飬贍官員寡妻及鰥寡孤獨人等之用但官員之寡妻可以給與地畆其鰥寡孤獨人等若亦給與地畆恐伊等不能辦理適為無益請派賢能官二員㑹同地方官按地肥瘠酌定租數收租後仍隨時價變銀存公照熱河地方飬贍鰥寡之例每月給與錢糧銀一兩五錢俟孤子成立挑補披甲即将養贍銀裁汰此係聖主格外恩施與别項地畆不同且餘出之地向既不納錢糧應免其報陞科則其每年用過餘剰各數亦照熱河之例咨行正藍三旗核銷以清公項又奏查康熙二十七年将山海闗城守尉佐領移駐盛京所有官員菜園地五頃一十畆經户部収存至康熙二十九年派往山海闗駐防之總管防禦等以本身地畆呈部請换遂以五頃一十畆之菜園給予後因厯任移换閲年已乆協領防禦等官有换得者有本身無地而與原任子孫同分地租者有原任子孫仍照舊收佔者有曾經埋𦵏祖墳者伏思此項地畆既經查明丈過除𦵏墳之區仍留給本員子孫外其餘官地請依照各官品級給與副都統六十畆協領二員各四十畆佐領八員各三十畆防禦八員各二十畆另於各官飬贍地内按數劃出以抵還原交本身地畆之人其有餘剰則以充公為養贍孤寡之用俱奉㫖依議三十一年三月奉上諭户部議覆侍郎英㢘奏請丈出盛京旗民餘地准令無地兵丁閒散人等認買一摺原為旗人生計起見但此等無地人戸貧富不齊其有餘者置産必多而無力之家未必能一力承買恐於伊等資計仍無實濟因念該處冬圍兵丁一切鞍馬之資不無拮据若将此項餘地内酌派徵租每年賞備資装於該兵丁殊有禆益其應撥用若干及所餘地畆尚多或可一體徵租存貯動撥或聼旗人認買毋致有名無實之處新柱現在出差盛京著㑹同将軍府尹確勘實在情形妥協定議具奏是年四月尚書新柱等奏稱奉天旗人原頼種地為生惟是其中貧富難齊在有餘之家凡遇可置之産無不設法購覓而無力之家或專藉糧餉以供養贍或耕數畆以資糊口日給尚屬拮据何能出資置産若将丈出餘地准令無地兵丁認買即使官為辦理極其嚴密而詭計影射以及私典偷買等弊斷難悉除是地畆終歸有力之家而無地旗丁勢必不能一力承買誠属有名無寔至於冬圍兵丁係輸流派撥数年方值一次即有些微添置實亦分所當然但一切鞍馬行装無一不湏製備若所費稍多未免即至拮据迺蒙聖主俯念兵艱恩施格外復為籌欵賞給俾得辦理有資則其於生計自必漸次寛裕臣等通盤酌計原丈餘地四十一萬八百餘晌加之移駐塔爾巴哈台兵一千名隨缺地七千晌二共地四十一萬七千八百餘晌内除應撥隨缺官員地一萬六千九百晌令其照例納糧兵丁地四萬八千五百七晌水沖沙壓學田水手公産等項地三萬九千九百餘晌其餘地畆共三十一萬二千四百晌有奇謹案六畆為一晌然此處晌数俱仍来文未便以畆数核改葢其竒零之餘数與開除之細目非按地確查末由懸斷故只就原奏開載期於傳信無訛一併入官但各該户數載經營一旦撤出未免有妨生計請即令原種人等按數認種或有轉租於人者聴其自便應輸租銀仍於該户名下催追不許稍有諉缷如有事故情願更替許其呈明本旗方准退領倘有拖欠租銀以及寔係無力承種之户俱由各該旗查明撤出另行召種仍将徵租地畆花户姓名原認地數四至造具紅冊四分分送户部及盛京户部将軍府尹各衙門存查其各處地畆髙下肥瘠不同租價難以畫一必湏分别等差方可永逺遵照查錦州義州寧逺熊岳葢州復州金州等七城地土髙阜人烟湊集應請作為上等盛京廣寕牛荘海城遼陽等五城地雖窪阜不一尚屬平坦應請定為中等岫巖鳳凰城興京開原鐵嶺等五城或臨近海濵地多斥鹵或山多沙石半屬荒磧應請定為下等其上等地畆上則每晌酌擬租銀四錢八分中則四錢二分下則三錢六分折中每晌銀四錢二分中等地畆上則每晌酌擬租銀四錢二分中則三錢六分下則三錢折中每晌銀三錢六分下等地畆上則每晌酌擬租銀三錢六分中則三錢下則二錢四分折中每晌銀三錢酌計每年共徵租銀十一萬二千四百両有竒令承種地户各按地畆之髙下分别輸納每年派撥冬圍兵丁一千三百名每名應需恩賞銀十五兩共需銀一萬九千五百兩應請即在此項租銀内撥給其餘銀兩解交盛京户部存貯撥用應徵租銀請責成各該處城守尉協領暨地方州縣照例分限督催動存各數由盛京户部按年另冊報銷其承催督催各官照例一體考察以專責成再奉天地方錢多銀少此項餘地租銀應請銀錢兼収以免易銀易錢之累每銀一兩合大制錢一千文免其徵耗冬圍兵丁恩賞即於所収錢文内撥給如有餘剰錢文照搭放兵餉例辦理經户部議准奉㫖依議三十四年二月大學士劉統勲等遵㫖将户部議覆侍郎瓦爾達條奏旗地原摺交将軍恒禄侍郎瓦爾達閲看並令将該處情形逐一講論據瓦爾達稱從前條奏此事原以該處旗人生計艱難出典之地力難回贖計惟改典作租分别年限給還原業主庶旗産不致轉為民業今閲户部覆奏民人因違例而撤地歸主固所以示儆而同一違例出典之旗人不湏歸價即可得地是因違例而轉得便宜於情理似未允協等語所議寔属持平無可再議惟查盛京出典地畆較近京旗地不同該處旗民交易均属白契所開價值或係零星凑算或以什物准折甚至隨意虚開皆所不免若照近京旗地之例依典價按年遞減恐原契不無浮冐難以盡凴至向例近京旗地官贖以後仍准原業主五限交銀或指扣俸餉自行回贖今查該處旗人生計尤為淡薄向例五年之限為期稍迫恐不及按限扣還應請酌寛等語伏思該處旗民交易向來既惟用白契其原價自不足凴查户部從前辦理入官地畆皆係按租定價即回贖近京旗地有契價較時值過重者亦係體察租數據時核减厯經遵辦在案臣等公同酌議請将此項民典旗地無論年分逺近契價多寡總以現在租息為㫁如核計租銀可得一錢者量給價銀一兩均就租息之重輕定價銀之多寡自可杜浮冒之弊先令地方官查照段落履勘核實造册呈報户部恭候欽派大臣前往㑹同該將軍侍郎府尹覆勘定奪至該侍郎所稱官贖之後旗人扣價還官請照向例酌寛年限之處亦係為旗人生計起見查從前京師官贖旗地准令原業主扣俸交銀俱係定限五年今此項回贖地價可否准令十年扣交俾生計益為寛裕出自皇上天恩奉㫖依議三十七年十二月將軍増海奏言盛京本城各佐領下馬甲計前鋒二百名領催五百二十八名馬兵四千八百六十八名共五千五百九十六名分於六十六佐領毎佐領有七十餘名者八十餘名者九十餘名者額數多寡不一滿洲蒙古有前鋒漢軍火器營無前鋒皆一體當差其中傳事聴差看守城門衙門倉庫等俱係輪流行走一月差竣仍得兩月寛閒曾經皇上賞賚每人隨缺地六十畆以充生計至於額設歩兵八百名其中食一兩五錢之領催八十名食一兩之歩兵七百二十名而每佐領下領催或一名或二名或並無領催其步兵或三名五名或十五名二十名數既参差其所當差務計近城十六堆用兵一百六十名邉門八堆用兵六十名八旗二十四堆用兵一百九十二名又緝盗巡更查街及傳事聴差等用兵一百四十餘名計每日必湏步兵五百五六十名原額八百名内作兩班輪流寔不敷用甚至有兼倍差遣者臣等細心籌畫請将六十六佐領下馬兵不論原額七十名八十名九十名截長補短皆以八十名為斷計共五千二百八十名作為定額其餘三百十六名遇缺陸續裁汰此項裁汰馬甲補為步營領催五十二名步兵三百三十六名共三百八十八名合原數八百名共成一千一百八十八名每佐領下定為步營領催二名步兵十六名如此籌畫均匀則盛京世僕俱荷皇上恩膏差務均平閒暇時亦可以謀生理矣其裁汰之三百十六名馬甲每年所餘錢糧除應給現増三百八十八名歩兵錢糧四千九百六十八兩外仍餘銀二千六百十六兩入旗正項報銷其隨缺地畆亦可節省是否有當伏祈皇上睿鍳訓示奉上諭将軍増海奏盛京各佐領下所有馬甲多寡不等請裁馬甲添設歩甲其餘剰錢糧并隨缺地畆入於正項報銷一摺經軍機大臣㑹同該部覆准所辦非是盛京額設馬甲並隨缺地畆皆為飬贍該處滿洲而設今年乆生齒日繁若将伊等應得分例裁汰入官於伊等生計殊屬無益如現在京中八旗户口繁盛生計不無拮据經朕特沛恩施另賞鰥寡孤獨錢糧以資生理其派往西安凉州莊浪寧夏兵丁俱照所派之額在京挑補又添兵缺甚多毎年多費帑金不下數萬並無恡惜國家一切用度固應節儉然亦只宜酌減無益糜費並查核不肖人員使不得從中侵蝕至於正項應支之處豈可節省盛京滿洲皆朕臣僕人丁日盛不敷養育尚宜酌量添給豈有轉将伊等應得分例裁汰之理今各佐領下馬甲額缺不均固宜均匀辦理但此項裁缺錢糧地畆亦宜斟酌養贍多人著将裁汰之馬甲三百十六名錢糧交増海等或添設歩甲或添設養育兵惟期恩施普被其隨缺地三千一百六十晌如何使衆人均有禆益之處並著増海等定議具奏三十八年正月増海奏應裁三百十六缺之馬甲若添作歩營領催五十二名歩甲三百三十六名合原有之八百名輪流差遣則無庸重叠出派而更替有人伊等當差與生計俱不至貽悞應請仍照前奏辦理其裁缺所䞉之銀兩除新添歩營應給四千九百六十八兩外仍餘二千六百十六兩養贍鰥寡孤獨計毎月可給養育兵四百三十六名請於盛京本城舊滿洲八佐領漢軍二十四佐領毎佐領各給八名舊蒙古八佐領毎佐領各給六名新滿洲二十三佐領内除二佐領各給六名外其餘二十一佐領及巴爾呼䝉古三佐領共二十四佐領毎佐領各給五名再查得六十六佐領馬甲隨缺地畆俱在各城邉境相隔甚逺該兵丁不能耕種惟取租價毎年秋收後由佐領派領催收取分給兵丁在案而此歩兵等並無隨缺地畆夜間坐更巡邏等差亦屬辛苦仰懇天恩將所裁馬甲地租銀毎年賞給歩兵為冬間買置皮衣之用則各歩兵等禦寒有頼皆永霑皇上厚恩於無既矣奏入命户部議行是年八月奉上諭上年奉天查贖旗地一事經裘曰修㑹同履勘後交瓦爾達詳加查核今半年餘尚未見查辦完竣已降㫖將瓦爾達革職所有查辦旗地未完事件著交喀勒崇義㑹同將軍府尹即速悉心確查妥辦是月裘曰修瓦爾達奏盛京民典旗地經該將軍等查明候贖地十二萬餘晌謹按此處晌數未便以畆數更改盖原奏不著奇零若干無從核算故仍其舊咨部動帑回贖奉㫖派出臣裘曰修瓦爾達㑹同覆勘臣等至盛京調取户部等衙門底册赴各城詳加體察並無旗人妄指民業為旗産亦無民人掯不聴贖等情原報地數租價並取具各該旗及地方官結狀前來臣等復回至盛京㑹同臣増海等悉心籌畫其一切原查贖報動帑徴租指扣俸餉各條欵均照户部原議辦理查此項地畆䝉皇上天恩動帑回贖俾出典旗人不失舊業受典民人照舊得價聖恩高厚至優極渥臣等公同酌議自贖之後原業旗人能自耕種准其撤回自種原佃民人偶有拖欠地租令地方官代為催追倘仍抗不給租方許撤地另行招佃如原業旗人不能自種而原佃民人又不欠租遽將地畆撤出另行招佃者察出照律治罪以示懲儆使旗民相安以仰副聖主一視同仁之至意奉㫖所奏是依議四十一年四月將軍宏晌奏言盛京各城旗倉米石毎年二三月間除定額應存數目外將多餘米石照市値減價糶給兵丁坐扣餉銀原因倉米不能久貯又恐青黄不接之時兵丁食用維艱是以籌畫通融期於倉貯兵丁均有禆益惟是所糶米石皆係挨年陳米官斗又小於市斗雖經減價核與兵丁買用市米無甚區别而按季坐扣所剩餉銀無多一切當差需用仍屬拮据自應稍為變通以收實效查盛京各城額設馬兵一萬五千六百五十九名錦州義州二城額設歩兵三百八十八名荷蒙天恩馬兵毎名賞有隨缺地六十畆歩兵毎名賞有隨缺地三十畆俾其耕種食用但前項隨缺地畆係由各城零星荒甸及丈出餘地内撥給相離窵逺者多兵丁不能親身耕種均係佃種收租毎地六畆不過收制錢三百文而往返取租盤纒之外所剰無幾是雖有隨缺地畆未能均沾實恵臣等詳悉籌畫請將兵丁隨缺地畆交各城地方官依上中下則照數徴租報部其兵丁應得隨缺地租改折米石即以毎年出糶之米給領以地六畆銀三錢之數計算馬兵一名毎年可得租銀三兩步兵一名毎年可得租銀一兩五錢照依厯年出糶自五錢至一兩價銀數目折中酌定毎米一石作價七錢五分毎馬兵一名給米四石步兵一名給米二石如此通融辦理倉米既可無庸出糶而兵丁得此米石生計自為寛裕詳查盛京各城旗倉毎年應徴米四萬九千二百石零除各項需用外毎年實餘米三萬四千一百餘石馬兵步兵二項共需米六萬三千四百一十二石除餘米三萬四千餘石尚不敷米二萬九千餘石查奉天府屬各州縣倉每年例有出陳易新糶借米石所有不敷兵米請即就近動用民倉發給仍照直省採買不敷兵米之例飭令各州縣分别定價照數買補還項所需銀兩即在所徴隨缺地租銀内動用如此一轉移間於旗民各倉額貯無虧所徴地租即以下則地毎六畆三錢核計一年可得租銀四萬七千五百餘兩其中上等者銀數更多以之抵補旗倉糶米價値及買補民倉動用米石俱屬有贏無絀而兵丁得以永逺均霑實恵與國課倉儲兵丁生計洵屬有益是否有當伏乞皇上睿鑒訓示奉㫖該部議奏五月户部議奏乾隆十三年軍機大臣㑹同盛京將軍酌議兵丁隨缺地畆於現在閒空荒甸就近均匀撥給令其耕種仍交該將軍留心查訪務湏抵缺交代勿使私自典賣奏准在案臣等伏思盛京各城旗兵自撥給隨缺地畆以來咸得服習農功以資養贍食用無虞缺乏而於青黄不接時復將旗倉米石減價出糶俾接濟有資仰見我皇上軫䘏旗僕有加無已之至意立法本為至善今該將軍以前項地畆相離窵逺兵丁不能耕種收租往返盤費尤多請將地畆撤出交縣徴租毎年馬兵折給四石步兵折給二石云云查從前分撥地畆時原議就本城荒甸撥給如本處有餘仍分給别城使之自行耕種本不應有相離遥逺之理今據稱窵逺者多是當日未照原議辦理以致兵丁不能親身耕種勢不得不變為收租而收租必至有名無實所以該將軍有撤地撥米之奏也然其中扞格難行處臣部不得不詳愼籌畫查盛京各城旗倉米數除各項需用外毎年只餘米三萬四千餘石今若按毎兵折支四石二石之數共需米六萬三千餘石計不敷之數將及三萬勢將借動民倉殊不知民倉積貯原以備民間緩急之需一切賑䘏平糶均為民食攸闗倘年嵗有豐歉不齊民間之需用既多旗兵之折支又例難停止左支右絀將必有掣肘之虞且嵗有不收地畆錢糧尚應蠲緩佃户租銀更難按則徴齊則採買無資又將作何辦理况盛京地畆按則徴租毎晌三四錢不等而各屬月報糧價毎一石米市値七八錢至一兩四五錢是即將地租全徴尚不敷買補則不敷之價又将何出且不敷之米幾及三萬即為年額必需採買之數設遇年景不齊市價昂湧若加價採買則租數多虧若停買緩待則兵丁又無米可支是不但無禆兵食反恐有損民倉與其更張成規毎多掣肘自不如遵照舊例較為允協該將軍所奏應毋庸議至隨缺地畆其中或間有遥逺之處自應就地土之坐落量加籌換即可使逺近田畆一律均齊矣奉㫖部駁甚是依議又奉上諭户部議駁宏晌等奏盛京各城兵丁隨缺地畆請交地方官按則徴租將所得租銀折中定價改給米石一摺所駁甚是已依議行矣各城兵丁賞給隨缺地畆俾其自為耕種以資養贍所以體恤兵丁者至為周渥宏晌等乃因其地有逺近輙欲官為徴收按價折米設或豐歉不齊採買無資又将作何籌辦該將軍等何未計及於此至從前定議時原令将現在閑空荒甸就近均勻分撥何以兵丁受撥之田悉皆窵逺是當時已辦理不善即或因地畆不能就近分撥有斷難照辦之勢當時即應奏明另為設法乃相沿日久或欲一旦更張又不計其事之是否可行徒欲要譽衆兵而未知通盤籌畫有是理乎著傳諭宏晌將其中有無弊混之處據實奏覆是月宏晌覆奏隨缺地畆係乾隆十三年原任将軍達爾當阿請將閒荒餘地分給兵衆毎名各十晌因荒甸不足分給前後陸續毎名先給七晌嗣於乾隆三十一年理藩院尚書新柱奏將丈出旗人餘地毎名補給三晌以足十晌之數而當日分撥時皆係開種所餘去城稍逺不能與當差之處附近以致毎年秋季衆兵告假取租往返積日竊伏思户部内倉及開原等外城十四倉每年除支給俸米並存倉額米外所有餘米俱推陳出新令兵丁春季認買至秋還價若將地畆官為徴租亦可抵還倉借以省取租之勞又恐米石不敷請動民倉補足並未通盤籌畫愚昧具奏請交部嚴加議處奉㫖此次姑寛以後戒之愼之四十六年奏准盛京吉林等處流民私墾地畆均按則輸糧如有流民回籍他往所遺地畆撥給旗人耕種納糧仍飭該管官不時稽查倘此次清查後復有流民私自開墾及旗人私行租與民人佃種者旗人民人等一律治罪地畆入官五十七年盛京將軍琳寧奏請將興京開原遼陽等城閒地撥給守陵官兵外詳見後卷所餘地畆尚多查錦州各城於乾隆五十四五十五等年水灾案内勘明水冲沙壓田畆不堪墾復例應補給八旗兵地一萬一千餘畆請撥補兵額以收實效從之以上奉天規制欽定八旗通志卷六十六
