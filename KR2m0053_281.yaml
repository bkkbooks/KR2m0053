  text: 人物志一百四十七列女傳二十七八旗漢軍列女傳五鑲黃旗漢軍文舉人髙頴之妻金氏鑲黃旗漢軍鐵匠王應公之妻陳氏鑲黃旗漢軍馬甲李潤智之妻周氏鑲黃旗漢軍領催德住之妻杜氏鑲黃旗漢軍知州郎紫垣之妻張氏鑲黃旗漢軍馬甲沈成玉之妻劉氏鑲黃旗漢軍馬甲王家實之妻朱氏鑲黃旗漢軍間散袁得利之妻王氏鑲黃旗漢軍間散蘇長榮之妻吳氏鑲黃旗漢軍間散金有玉之妻石氏鑲黃旗漢軍馬甲金保住之妻吳氏鑲黃旗漢軍千丁晉世貴之妻王氏鑲黃旗漢軍千丁胡國禮之妻程氏鑲黃旗漢軍千丁羅應弼之妻丁氏鑲黃旗漢軍千丁金文臣之妻沈氏鑲黃旗漢軍千丁李自貴之妻趙氏鑲黃旗漢軍千丁王忠之妻金氏鑲黃旗漢軍千丁杜茂之妻耿氏鑲黃旗漢軍千丁馮朝良之妻張氏鑲黃旗漢軍千丁趙廷臣之妻劉氏鑲黃旗漢軍壯丁李成士之妻王氏鑲黃旗漢軍千丁沈國相之妻曹氏鑲黃旗漢軍千丁陳正之妻卜氏鑲黃旗漢軍千丁祁有正之妻趙氏鑲黃旗漢軍間散范連章之妻楊氏鑲黃旗漢軍間散方朝相之妻李氏正黃旗漢軍間散劉錦之妻傅氏正黃旗漢軍馬甲管傑之妻陳氏正黃旗漢軍間散洪四之妻楊氏正黃旗漢軍馬甲賴代之妻馬氏正黃旗漢軍領催魯章阿之妻王氏正黃旗漢軍間散洪國璠之妻劉氏正黃旗漢軍馬甲文廷功之妻木氏正黃旗漢軍間散木斌之妻周氏正黃旗漢軍間散劉教斌之妻劉氏正黃旗漢軍間散薛文魁之妻劉氏正黃旗漢軍馬甲溫得根之妻趙氏正白旗漢軍馬甲方元得之妻李氏正白旗漢軍馬甲張宏濟之妻焦氏正白旗漢軍馬甲馬鳴岐之妻王氏正白旗漢軍馬甲王建富之妻趙氏正白旗漢軍馬甲陳廷棟之妻蘇氏正白旗漢軍間散張料傑之妻邊氏正白旗漢軍生員馬昌阿之妻張氏正白旗漢軍間散馮良起之妻金氏正白旗漢軍間散金有運之妻倪氏正白旗漢軍間散談趙祥之妻雷氏正白旗漢軍間散王國成之妻雷氏正白旗漢軍間散閔文讚之妻趙氏正白旗漢軍間散馬進賢之妻閔氏正白旗漢軍間散楊國安之妻黃氏正白旗漢軍間散楊永祚之妻夏氏正白旗漢軍間散楊永懋之妻金氏正紅旗漢軍馬甲項起龍之妻楊氏正紅旗漢軍間散張國祿之妻徐氏正紅旗漢軍間散阿達色之妻李氏正紅旗漢軍間散尚服境之妻髙氏正紅旗漢軍間散韓什之妻王氏鑲白旗漢軍馬甲許世榮之妻徐氏鑲白旗漢軍馬甲邱玉之妻程氏鑲白旗漢軍馬甲王明倫之妻苖氏鑲白旗漢軍馬甲朱士瑾之妻王氏鑲白旗漢軍間散存住之妻洪氏鑲白旗漢軍馬甲雷文熙之繼妻鍾氏鑲白旗漢軍馬甲夏大小兒之妻蔡氏鑲白旗漢軍馬甲石得之妻楊氏鑲白旗漢軍間散莫林住之妻馬氏鑲紅旗漢軍馬甲趙雲鵬之妻王氏鑲紅旗漢軍間散劉朝臣之妻韓氏鑲紅旗漢軍馬甲劉思明之妻黃氏正藍旗漢軍馬甲于沛生之妻髙氏正藍旗漢軍馬甲李斌之妻任氏正藍旗漢軍間散王文相之妻溫氏正藍旗漢軍間散王朝如之妻張氏正藍旗漢軍間散佟升之妻鄧氏正藍旗漢軍間散石柱之妻陳氏正藍旗漢軍間散髙國賢之妻張氏正藍旗漢軍馬甲張自漢之妻白氏正藍旗漢軍間散張自侯之妻劉氏鑲藍旗漢軍間散張七兒之妻王氏鑲藍旗漢軍馬甲孫維貴之妻張氏鑲藍旗漢軍壯丁劉書紳之妻王氏鑲藍旗漢軍間散張鄭之妻白氏鑲藍旗漢軍壯丁徐文煥之妻蘇氏鑲藍旗漢軍馬甲侯士俊之妻閻氏鑲藍旗漢軍壯丁王國卿之妻靳氏鑲藍旗漢軍間散張璜之妻胡氏鑲藍旗漢軍壯丁徐士煥之妻王氏鑲藍旗漢軍馬甲張廣之妻丁氏鑲藍旗漢軍壯丁李世亮之妻何氏鑲藍旗漢軍官學生湯武色之妻關氏鑲藍旗漢軍壯丁黃國倉之妻厲氏鑲藍旗漢軍間散賈圖之妻張氏鑲藍旗漢軍間散蘇淡之妻李氏以上俱於乾隆三十一年旌表鑲黃旗漢軍馬甲劉維之妻祁氏鑲黃旗漢軍馬甲孫加興之妻馬氏鑲黃旗漢軍間散馮璧之妻王氏正黃旗漢軍馬甲邵玉璽之妻李氏正黃旗漢軍馬甲梁起文之妻張氏正黃旗漢軍馬甲張復魁之妻韓氏正黃旗漢軍間散楊經之妻夏氏正黃旗漢軍間散董琳之妻佟氏正白旗漢軍間散王鉞之妻靳氏正白旗漢軍馬甲羅廷畨之妻楊氏正白旗漢軍馬甲李生堉之妻郝氏鑲白旗漢軍敖爾布線天章之妻解氏鑲白旗漢軍馬甲李楷之妻方氏鑲白旗漢軍馬甲黃統之妻孫氏鑲白旗漢軍間散何永埈之妻姚氏鑲白旗漢軍間散繆璘之妻郗他拉氏正紅旗漢軍馬甲李柏秀之妻王氏正紅旗漢軍馬甲臧銓之繼妻王氏正紅旗漢軍馬甲張廷貴之妻薛氏正紅旗漢軍馬甲邢自福之妻王氏正紅旗漢軍間散張自榮之妻周氏正紅旗漢軍間散洪得貴之妻侯氏鑲紅旗漢軍外郎張徴之妻關氏鑲紅旗漢軍馬甲陳世勳之妻陳氏鑲紅旗漢軍馬甲陸齊林之繼妻夏氏鑲紅旗漢軍間散劉永祥之妻趙氏鑲紅旗漢軍間散閻喜之妻李氏鑲紅旗漢軍馬甲吳雲德之妻于氏鑲紅旗漢軍間散閻國棟之妻關氏正藍旗漢軍副參領張在良之繼妻方氏正藍旗漢軍馬甲李荆之妻蘇吉力氏正藍旗漢軍千丁徐邦全之妻何氏正藍旗漢軍千丁平定瑞之妻李氏正藍旗漢軍千丁黃邦恆之妻賀氏正藍旗漢軍千丁劉弼之妻于氏正藍旗漢軍千丁夏國官之妻盛氏正藍旗漢軍千丁夏銀之妻田氏正藍旗漢軍千丁王志鳯之妻王氏正藍旗漢軍千丁王文德之妻楊氏正藍旗漢軍千丁丁守喜之妻傅氏鑲藍旗漢軍筆帖式魯璜之妻趙氏鑲藍旗漢軍馬甲范科之妻楊氏鑲藍旗漢軍馬甲陳克興之繼妻劉氏以上俱於乾隆三十二年旌表鑲黃旗漢軍馬甲王廷祥之妻陳氏鑲黃旗漢軍馬甲張霖之妻宋氏鑲黃旗漢軍間散蘇殿祜之妻宋氏鑲黃旗漢軍間散薑品之