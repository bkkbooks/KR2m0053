  text: 旗分志二十一八旗佐領二十一正藍旗蒙古佐領佐領鑲藍旗蒙古正藍旗蒙古佐領正藍旗蒙古都統所屬左右參領各一右參領下佐領十五左參領下佐領十五右恭領第一佐領原係天聰年間編立之牛録初令海賴管理海賴故以色楞塔布囊管理色楞塔布囊故以其弟索諾穆管理索諾穆從征陳亡以其子色爾登管理色爾登故以其從孫車令管理車令故以其子伊禮布管理伊禮布革職以其叔曽祖之二世孫騎都尉永祿管理右參領第二佐領原係巴嶺地方蒙古於國初編立牛録初令拉拔塔布囊管理拉拔塔布囊故以其弟德勒各勒管理德勒各勒故仍以拉拔塔布囊之子圖磊管理圖磊故以其子烏里逹管理烏里逹故以其弟阿玊希管理阿玊希故以烏里逹之子烏爾圖那思圖管理烏爾圖那思圖故以其子宗柱管理宗柱緣事革退以其弟署副驍騎校富寧管理富寧故以其子永泰管理永泰故以其子富爾松阿管理右參領第三佐領原係敖漢地方蒙古於天聰年間編立牛録初令宜穆圖管理宜穆圖從征陳亡以其弟氷圖管理氷圖故以其弟之子阿哈圖管理阿哈圖故以其兄之子賽音起克管理賽音起克故以其弟沙進管理續以沙進之子蘇珠克圖管理蘇珠克圖故以其子七十五管理右參領第四佐領原係葉赫查哈拉同翁牛特科爾沁克西騰阿霸垓等入户於天聰八年編為牛録初令查哈拉管理查哈拉故以富拉他管理富拉他故以吳遜太管理吳遜太緣事革退以訥爾德管理訥爾德故以其弟索禮管理索禮故以其子桑阿禮管理桑阿禮因病辭退以其弟之子賽音逹禮管理賽音逹禮故以其子竹林管理續以竹林之姪輔顯管理續以特屯泰管理續以特屯泰之姪張仙保管理謹按此原係無根源佐領乾隆四十三年作為族中承襲佐領右參領第五佐領原係第四佐領內人丁於康熙十一年桑阿禮管佐領時因人丁滋盛分編一佐領令吳遜泰之子二等阿達哈哈番蘇穆都管理續以富拉塔之孫護軍參領昻吉圖管理續以昻吉圖之子逹蘭泰管理逹蘭泰緣事降調以逹蘭泰之弟四格管理續以侍郎宜道管理續以滿洲侍郎查克丹管理查克丹緣事革退以三等阿思哈尼哈番七十管理七十緣事革退以侍讀滿岱管理滿岱升盛京侍郎以博爾圖管理續以元保管理元保升任江南道以瑚圖禮管理續以富成管理右恭領第六佐領原係康熙三十四年分編佐領時將色爾登吳爾圖那素圖因逹禮四格五佐領內餘丁共編為一佐領以三等阿思哈尼哈番佛三寶管理佛三寶故以其子拜他喇布勒哈番兼一拖沙喇哈番伊洛爾圖管理伊洛爾圖緣事革退以步軍副尉滚布管理滚布告退以輕車都尉孟可管理續以三等男七十管理七十休致以二等侍衛瑚必圖管理瑚必圖故以員外郎五十三管理五十三派往軍營以雲騎尉烏木都管理續以驍騎校兼印務章京吉保管理章京告病以員外郎五十三管理續以四格管理右恭領第七佐領原係喀喇沁烏蘭地方蒙古六十七戶人丁太宗文皇帝以其人編為半個牛録初令瑚班管理瑚班故以其弟之子額博根管理至康熙八年人丁足額始編為整佐領額博根年老辭退以其子扎什管理扎什故以其弟彀色管理彀色故以其族子上圖管理上圖年老辭退以額博根之子三等阿逹哈哈番卓特巴管理卓特巴故以其兄之子新七十管理新七十故以其子二逹色管理二逹色故以其子班逹史管理右恭領第八佐領原係察漢那勒地方人丁編為牛彔初令色楞塔布囊管理色楞塔布囊故以其子沙金達力管理沙金達力故以其子恩克管理恩克從征陳亡以同祖弟博第管理博第故以恩克之孫圖臘管理圖臘緣事革退以其族弟長祿升管理長祿升故以圖臘之子達春管理達春故以其孫玉祿管理玉祿故以其子期善管理右恭領第九佐領原係喀爾喀蒿齊特蒙古於國初編為牛彔以書隆格紅國禮管理紅國禮故以桃海管理桃海故以其子拜他喇布勒哈番墨克得管理墨克得故以那瑪士喜管理那瑪士喜故以其子庫素吕管理庫素吕故以其弟阿玉錫管理阿玉錫故以頭等阿達哈哈番布達理管理續以舒庫爾特管理舒庫爾特故以其子伊瑪圖管理伊瑪圖故以健鋭營前鋒巴圖什里管理右恭領第十佐領原係國初編設初以葉布舒塔布囊管理葉布舒年老辭退以其子查時霞管理查時霞出征病故以噶爾瑪管理噶爾瑪故以查時霞之弟三等阿達哈哈番他拉尼管理他拉尼從征陳亡以其子庫魯克管理庫魯克故以其弟諾木竒管理諾木竒故以其子嶽素圖管理嶽素圖故以其叔父之子巴蘭泰管理巴蘭泰故以其子額爾德呢管理額爾德呢故以其弟巴彥布管理巴彥布故以扎坤珠管理右參領第十一佐領原係第十佐領內丁壯他拉尼管佐領時人丁滋盛分編一佐領以他拉尼之族弟吳和起管理吳和起故仍以他拉尼之族弟阿玊石管理阿玉石故以他拉尼兄之子孟格類管理孟格類故以他拉尼之子二等阿達哈哈番黑達資管理黑達資故以其子烏林管理烏林故以其弟安泰管理安泰故以其子烏朗塔布管理右參領第十二佐領原係天聰八年以喀爾沁之上都開綳地方六十六户人丁併入色楞塔布囊半箇牛彔為一整牛彔以色楞塔布囊管理續以其弟索諾木管理續以索諾木之子色爾登管理至康熙二十一年人丁滋盛分編一佐領以護軍校白格管理白格緣事降調以白格族兄協領哈岱兼管哈岱年老辭退復以白格管理白格年老辭退以親軍托克托和管理托克托和故以白格弟之子護軍校阿南達管理阿南達故以其子親軍巴岱管理巴岱故以莾鼐色楞之曽孫武克泰管理武克泰故以其弟溫都斯泰管理溫都斯泰故以其子定柱管理右參領第十三佐領