body:
  text: 人物志二十二大臣傳八滿洲鑲黄旗八偉𫝊清補熙完顔保祝髙斌傅清子明仁傅清滿洲鑲黄旗人追贈一等公李榮保之次子雍正元年由閒散授藍翎侍衛五年授三等侍衛十二年授雲麾使乾隆元年晉鑾儀使二年六月晉正黄旗滿洲副都統五年授天津總兵九年駐蔵副都統索拜期滿命傅清以副都統往代十年疏言駐蔵章京筆帖式向照哈宻等處例三年錯綜換班派唐古特巴塘裏塘等兵䕶送查唐古特兵沿途不無竊掠請嗣後駐蔵大臣率章京等赴蔵舊駐官員帶兵同回不另䕶送蔵地不比内地事随到随辦交代後可查照無庸錯綜更換下軍機大臣議從之十一年疏言西蔵處邉末畨蠻錯處西北界準噶爾北通青海為四川西南外郛打箭爐之門户是以特派大臣並文武各員駐兵彈壓自雍正十二年設立塘汛不特以𫝊送公文且聨絡聲勢法本周詳上年副都統索拜議改畨塘以免糜費乃撤站未㡬搶刦纍纍而裏塘一帶夾壩更甚於昔又準噶爾不惜重費赴蔵熬茶或萌覬覦意况畨塘初設逓送即不妥協倘因循久遇𦂳要事難保無悞請自蔵至爐沿途塘汛官兵仍舊苐酌衝僻逺近布置總在一千兵數内軍機大臣議如所請行先是西蔵郡王頗羅鼐子二長珠爾黙特䇿布登次珠爾黙特那木扎勒上奬頗羅鼐勞績令自保一子襲爵頗羅鼐以珠爾黙特那木扎勒奏封長子十二年三月頗羅鼐卒命珠爾黙特那木扎勒襲郡王諭曰西蔵地方關係甚要頗羅鼐經事練達下人信服伊亦能奮勉効力今已身故雖命伊子珠爾黙特那木扎勒襲封總辦蔵衛事務而蔵地素屬多事衆心不一珠爾黙特那木扎勒又年㓜未必即能收服衆心頗羅鼐在時凡事由伊主張不過商同傅清斟酌辦理今非頗羅鼐時可比着𫝊諭𫝊清逐處留心訪查如有珠爾黙特那木扎勒意見不到之處即行指示惟期地方安静不生事端今嵗準噶爾又往熬茶當留心防範此際衆人意見情形及珠爾黙特那木扎勒襲爵辦事後各處人心輸服與否俱一一體訪具摺奏聞倘有一二滋事之人即酌量辦理以示警戒四月奏言阿里克地方向係頗羅鼐長子公珠爾黙特策布登駐守嗣因足疾回蔵兹頗羅鼐故阿里克𦂳要伊病亦全愈臣令仍往駐騰格里諾爾喀喇烏蘇等處向係珠爾黙特那木扎勒於夏季領兵駐防今伊留蔵辦事臣令派親信宰桑先期往駐再自阿哈雅克起至阿里克每卡増兵三十巡防疏下軍機大臣議行六月奏言準噶爾夷使進蔵熬茶各隘應増兵防範阿哈雅克騰格里諾爾一路派兵六千交該管宰桑等駐守另派噶卜倫策凌旺扎勒等帶兵三百由喀喇烏蘇䕶夷使進蔵珠爾黙特策布登帶兵五千防守阿里克又派兵四千於工布達克布及蔵内防偹再準噶爾入蔵之徑有五各派兵百設卡偵探又歸併蔵内之那克素三十九部落畨衆俱係叛賊羅卜蔵丹津舊屬夷使到時難保必無生事令移収别處至準噶爾人等赴各寺廟熬茶時仍派兵約束并宻飭知各寺廟喇嘛疏入詔軍機大臣議奏尋議調兵太多不但勞費恐伊等聞而生懼應令酌調數千於𦂳要處嚴防毋涉張皇與珠爾黙特那木扎勒酌辦餘如所奏行十三年二月命俟準噶爾熬茶事竣馳驛来京四月補天津總兵九月授古北口提督十四年二月調固原提督十月駐蔵副都統紀山奏珠爾黙特那木扎勒性情乖張與達賴喇嘛隙請將達賴喇嘛移駐泰寧上訓飭之諭曰從前蔵地常派大臣二員駐劄辦事後乃裁去一員朕思蔵地闗係𦂳要彼處應辦事件有二人相商較為有益且換班先後更替有一舊人尤覺妥當傅清曽經駐蔵彼處事體諒屬稔知着賞給都統銜即由固原馳驛赴蔵十二月紀山復奏珠爾黙特那木扎勒告其兄珠爾黙特策布登聚兵攻取果弼奈事諭曰現在既有珠爾黙特策布登起兵之信可速寄信傅清蔵地闗係甚要事之真偽今雖不能即定然不可不為留意珠爾黙特那木扎勒年㓜燥急性好生事外貌雖依紀山教導其實紀山轉被欺䝉亦未可知使伊本無生事之心伊兄實欲進兵来蔵是特其兄弟間互相侵犯辦理尚易若伊兄並無此事而伊造言誣搆藉端生事則伊即係不可存留之人速宜辦理然土伯特人賦性狡詐或因珠爾黙特那木扎勒嚴刻屬下乘伊兄弟不和從中離間更未可定此事傅清務須沿途留心細訪倘珠爾黙特那木扎勒不願派大臣駐蔵藉端設計以陷紀山㫁不可忽畧以致堕其術中如有見聞即行具奏尋命侍郎拉布敦往代紀山傅清途中覆奏言珠爾黙特策布登搆兵事恐未確或係珠爾黙特那木扎勒謀據兄地揑詞起兵端臣至蔵察看情形即將珠爾黙特那木扎勒辦理得㫖珠爾黙特那木扎勒乖戾詭譎留之終必生事或乘伊與兄搆兵令四川總督策楞等帶兵以助戰為名相機擒戮或俟明年章嘉呼圖克圖赴蔵熬茶遣川督帶兵䕶送至彼伺間殱除二者孰為利便傅清至蔵可察看情形熟籌具奏十五年五月傅清既抵蔵偕拉布敦奏言珠爾黙特䇿布登暴死珠爾黙特那木扎勒擅調兵運礟赴薩海諭曰此時惟應静以鎮之待其自起自止在我原無治罪之心則伊亦不生猜疑之念勿因急欲解其疑心轉生一畨忙亂俟其回蔵後將如何舉動之處再行奏聞九月疏劾珠爾黙特那木扎勒往後蔵時誣搆噶卜倫第巴布隆贊等抄没其産給所親愛又逐珠爾黙特䇿布登之子珠爾黙特旺扎勒戮辱頗羅鼐舊人殆盡現帶兵二千餘在距前蔵三百餘里之達术地方駐牧諭曰此皆珠爾黙特那木扎勒乖張悖戾但道途遼逺可暫聴之十月復奏珠爾黙特那木扎勒叛跡漸著宜相機擒治上命副都統班第赴蔵並宻諭總督策楞等備兵援𠞰時珠爾黙特那木扎勒隂通準噶爾絶我郵置軍書不達者旬日傅清與拉布敦决計先翦除是月十三日召珠爾黙特那木扎勒至通司岡公署登樓數其罪誅之逆黨羅卜蔵扎什等糾衆圍樓縱火施鎗砲達賴喇嘛遣救不得入傅清被創自盡拉布敦亦遇害十一月策楞馳疏聞諭曰駐蔵都統傅清左都御史拉布敦前因珠爾黙特那木扎勒潛謀不軌情跡顯著奏請相機翦除朕以伊等孤懸蔵地未可輕舉曽令俟班第到彼察看情形降㫖辦理乃伊等未及奉到諭㫖以機有可乘遂爾便宜行事逆渠已經授首而傅清拉布敦旋為逆黨所害為國捐軀深用憫惜又諭曰從前西蔵郡王頗羅鼐實心恭順且料理蔵中事務一切安帖後因年力就邁朕念及將来詢伊二子之中孰堪為嗣據伊奏稱長子人輭弱又已出家次子珠爾黙特那木扎勒人尚强幹能勝彈壓因是令其承襲迨伊奏事一二次以後朕於其詞意之間即知其非伊父居心可比日後必生事端屢諭駐蔵大臣留心體察嗣伊摺奏請撤駐蔵官兵朕以兵數原屬無多若不准其所請轉啟伊疑忌之心是以即依所請行著紀山前往駐劄詎紀山與之設誓和好即奏事嘗與同列銜名朕深責其非體是紀山不但不能懾服其心更已墮其術中矣𫝊清前經駐蔵為伊等所敬服遂令前往更換且慮其勢孤益以拉布敦協同駐蔵乃珠爾黙特那木扎勒心益狡悖將伊長兄珠爾黙特策布登圖害反以伊兄叛逆誣奏又伊與達賴喇嘛素有讐釁既戕其兄遂欲計害蔵中不順伊之班第等其勢將延及達賴喇嘛獨據其地雄長一方近遂將塘汛文書禁絶不通悖逆情形漸益昭著傅清拉布敦深知奸計摺請便宜從事以絶後患於今年十月初八日奏到朕以僅二大臣孤懸絶域未可輕舉即使便宜辦理亦於國體有闗且非萬全之道批令俟班第更換拉布敦到蔵日㑹同達賴喇嘛及蔵中大格隆等明正其罪以申國法庶協天朝體制乃傅清等未及接到諭㫖即於十月十三日𫝊珠爾黙特那木扎勒到通司岡加以誅戮而傅清拉布敦旋為伊屬下羅卜蔵扎什所害總督策楞奏到朕深為憫惻不覺涕零因思傅清拉布敦若静候諭㫖遵行或不至是但珠爾黙特那木扎勒反形已露倘不先加誅戮傅清等亦必遭其荼毒則傅清拉布敦之先㡬籌畫殱厥渠魁實屬可嘉非如霍光之誘致樓蘭而斬之也夫臨陣捐軀雖奮不顧身然尚廹以勢所不得不然如傅清拉布敦揆㡬審勢决計定謀其心較苦而其功為尤大以如此實心為國之大臣不保其令終安得不倍加軫悼耶傅清拉布敦着加恩追贈為一等伯着入賢良祠昭忠祠春秋致祭傅清並入伊家祠從祀伊等子孫給與一等子爵世襲㒺替以示朕褒忠録庸之至意並將伊二人為國捐軀之大節明白宣示使天下共知其不得已之苦心否則好事喜功者將借此二人為口實而事外無知之人又有議其擅開邉釁而仍邀國家如此厚恩者朕豈肯令是非倒置若此㢤十六年四月命立祠通司岡柩至京上親臨奠醊賞治喪銀萬兩仍賜祭𦵏如例諡襄烈御製詩紀其事曰衛蔵西南夷極邊入我王化百餘年始猶羈縻後執賮置兵為守防呼韓䝉古習俗尚黄教得失視此為轉旋其何小醜背厚澤夜郎自大輕王臣託詞承平勞物力示之大信休兵屯戕兄虐下遂無忌更與外賊為牽援血人於牙攫財賄中梗驛路軍書𫝊惟時奉命監彼土曰傅清暨拉布敦目覩逆勢日猖獗炎炎不息將燎原戰守不可兵力弱官軍萬里阻蜀門國事為重餘度外二人同心利斷金知無一生有九死但期濟事酬深恩珠爾黙特那木扎汝来示汝大義存天無二日爾二日爾忘爾父叨藩翰兇渠稔禍力已張藐視二人何有焉籠中之鳥砧上魚西蔵指日據有全挺身来見忽疑慮潜呼羣醜施戈鋋傅卿直前扼其臂逆王命者誅無延拉卿㧞刀剚其脰罪在魁首無牽連羅蔵扎什其羽翼走險呌詉豕突然桀犬吠堯各為主蜂屯蟻聚来獽狿吁嘻二臣力不逮如歸視死雙捐軀小魁烏合旋就縛駢首就戮長竿懸逆誅順撫妖氛靖衛蔵萬衆如一言忠臣報主有如此智勇兼濟誠通天昔每椎心今吐氣如披雲霧瞻蒼旻不勞一旅翦渠㓂豈止萬命免沉淪尸祝社祭衆夙志䖍伸絶域千秋𫝊靈輿肅肅歸故里建祠臨奠恩頻宣錫爵賜封延後世志予哀悼旌勲賢雙忠之氣浩千古雙忠之力敵萬軍罵賊有似奮常山誘致大異斬樓蘭雙忠蹟畧𫝊斯篇他年以待信史編又諭曰前駐蔵都統𫝊清左都御史拉布敦因珠爾黙特那木扎勒逆謀顯著先事翦除奮不顧身忠誠卓越俱已加恩贈卹入祀賢良祠昭忠祠傅清並入伊家祠從祀不知者或訾二人冒險邀功且議朕為酬庸過厚也今據駐蔵策楞班第等奏珠爾黙特那木扎勒自立名號潜遣其心腹堅㕘扎錫等通欵準噶爾稱策旺多爾濟那木扎勒為汗且求其發兵至拉達克地方以為聲援幸值準夷内潰所遣使人回蔵被獲得其逆書并餽獻諸物是其隂蓄異志勾結準夷罪不容誅設非二臣協力同心决計先辦則其貽害蔵地將不可言是二臣之心甚苦而有功於國家甚大特建雙忠祠合祀二人春秋致祭丕昭勸忠令典傅清既有専祠著不必從祀家廟傅清子明仁初襲一等子爵授三等侍衛乾隆二十五年同額爾登額齎勅赴巴達克山宣諭威徳三十六年四月赴金川軍營十二月大軍攻巴朗拉賊卡明仁偕侍衛新達蘇等於兩碉間施礮擊賊三十七年三月攻資哩北山賊乘雪夜逃明仁偕侍衛喬蘇爾等分路追之賊泅遁阿喀木雅寨我軍以礮環攻賊復竄明仁追擊之五月攻資哩南山明仁偕侍衛賡音素等督鑄礮有功七月賊三百餘犯明仁所守木卡擊敗之九月提督董天弼由納雲達進兵命明仁偕翼長富瑚等往助之尋自咱瑪山梁踰穆陽岡分攻木了山梁克石卡三十餘大卡木城三斬賊百餘諭部議叙十一月授二等侍衛十二月西南兩路大軍合進明仁充領隊侍衛尋随將軍温福攻克布朗郭宗擢頭等侍衛三十九年三月大軍攻凱立葉明仁偕侍衛彰靄擊第二峯賊卡五月進攻羅博瓦山岡下木城石碉賊從箐内拒敵擊敗之四十年五月諭曰明仁在阿桂隊内於本年正月攻取康薩爾山梁等處随衆帶兵乃此後打仗並無伊名着阿桂查明據實覆奏尋以明仁患病未愈奏諭曰明仁在彼無用着来京明仁懇留軍營自効將軍阿桂代奏奉㫖聽其自留看如何効力九月卒於軍營諭曰據阿桂奏明仁自到軍營以来帶兵打仗頗屬奮勉近雖抱病尚力疾行走兹因病身故等語覽奏深為憫惻着賞給副都統銜並着該部即照贈銜議卹所有子爵即着伊子寳綸承襲尋賜祭𦵏如例保祝保祝滿洲鑲黄旗人姓富察領侍衛内大臣馬武子雍正元年三月以監生授三等侍衛四年三月在乾清門行走五年四月襲佐領世職九年十一月擢御前侍衛十二年十二月襲三等輕車都尉十三年十一月授正紅旗漢軍副都統乾隆元年調正黄旗滿洲副都統二年三月赴西寧辦事閏九月疏言多倫尼托克安圖等七族及因察族哈爾受族遣人赴西寧交馬價銀並帶貿易之貨行至茶户遇郭洛克格爾側等賊畨掠去銀貨并傷從人今多倫尼托克安圖等族願將掠去馬價即行補交因察族亦随後補解臣查郭洛克格爾側畨族係四川松潘鎮所轄已咨川督飭緝究擬至多倫尼托克安圖等族係新附畨民中途被刼随即補交其向化輸誠洵属可嘉請將該畨今年應貢馬價仰邀聖慈寛免以卹逺畨其補交銀兩准抵次年正供奏入諭曰所奏甚是照所請行十月疏言西寧所𨽻之畨民四十族零居錯處逺近不齊每嵗因輸馬價銀赴西寧者每族不過數人而川省所轄之郭洛克邊界乃必由之道人單勢弱間被刼殺請嗣後馬價銀兩年彚貢一次至應貢年令各畨族預𫝊就所居逺近分兩起結伴同行仍按其族分大小貢馬多寡每起以五六十人為率可無刼殺之慮並免每年跋涉總理事務王大臣議行十一月命来京三年四月署馬蘭鎮總兵十二月署廣東提督四年八月奏恵州府連日大兩山水驟湧河道頓髙二丈倒灌入城兵民房屋多浸塌臣㑹同道府分别瓦房草房酌給銀兩随時脩復又衝塌兵房七十間請撥從前買馬價内存剰之項估值量給使被水之兵得寛裕料理上是之十一月實授六年七月潮陽縣民因暫止平糶罷市三日未㡬嘉應州土豪攔截採買穀船四十餘保祝俱以實在情形具奏上以此風不可長著巡撫王安國嚴究勿縱安國尋奏分别首從人犯定擬如律保祝疏言今歲雨澤未勻早稻豐歉不一地方官固曽開倉平糶但於五月中旬即以早稻將登並未計及秋成如何遽行停止以致米價日昻愚民自罹法網請糶阻攔若非疊遣營員彈壓開導㡬至莫遏夫倉儲原備民間不足倘以五月即停為例不顧民間何用豫備現在早稻薄収晚禾甫挿宜豫將應糶應卹分别辦理報聞八月奏永安歸善二縣被水諭曰地方官設有料理不妥百姓不得實恵之處據實奏聞十月奏瓊州乏食應飭有司或動公採買或招商轉運上命其告知總督慶復随時留心十一月疏言練兵除常期操演外每嵗秋冬率弁兵於随近山原往来馳逐使士卒習勞諭曰此固美舉然不可擾累地方也七年十月調直𨽻提督九年二月奏喀爾喀蒙古王子徳木楚克遣䕶衛巴達瑪等闗領俸銀巴達瑪私帶硝磺出口并於駝䭾内搜出銅條鐡塊解刑部収審至䝉古原闗俸銀及所帶駝䭾飭令中軍同守闗滿漢官兵照數查明交原人収管備文押解理藩院查収辦理得㫖嘉奬四月保祝以病告命御醫馳驛前往診視旋准解任調理十年十月授正紅旗䝉古都統十二年四月卒賜𦵏銀八百兩諡恭簡髙斌髙斌滿洲鑲黄旗人初𨽻内務府雍正元年正月由内務府主事遷員外郎兼佐領四月遷郎中四年管理蘇州織造六年授廣東布政使尋調浙江七年調江蘇九年二月調河南九月遷河東副總河十年調兩淮鹽政兼署江寜織造十一年二月諭令就近學習河工十二月署江南河道總督十二年四月疏言范公堤逼臨江海為鹽場藩籬年久多殘缺計六萬四千一百三十八丈請按相距里程設堡夫三百五十六及時培修汛官稽其勤惰又宿桃中河安清中河宿虹外河山安揚河海防江防等㕔前經河臣嵇曾筠等題准分畫所轄界址更正銜名闗防其各河營守備與㕔員同汛協防請一體更正部議如所請八月回鹽政任十二月仍署河道總督十三年四月回鹽政任十二月授江南河道總督乾隆元年六月疏言河工搶修工段需用土方請照兵四夫六之例責令河兵挑運十分之四准用夫工十分之六約計需費銀兩與酌給之數相符將此項據實報銷又葦蕩左右二營額採蕩柴分為厰運自運二項共需運脚萬餘兩請將蕩柴内分給各㕔領運若干照依漕規繳價若干其應給運脚即於應繳價銀内扣除餘充兵餉至自運易滋弊竇應歸厰運十二月又言江南河工向因未設河庫道凡各省州縣外解嵗夫等項河銀并闗稅計十八萬五千餘兩係各㕔自行收支多弊混請將此項河銀自乾隆二年為始悉歸道庫一切收支解放兵餉修船之費俱由河庫道經管隨時報明河臣查核均下部議行先是上以河南永城江南蕭縣等處黄河為患命髙斌㑹同兩江總督趙宏恩河南巡撫富徳等籌辦疏通之策至是髙斌等奏言黄河南岸徐州府碭山縣之毛城舖舊有减水石壩一蕭縣之王家山有天然减水石閘一邳州睢寧縣之峰山有减水閘四俱建自康熙年間誠分黄導淮以水治水之善策因年久淤淺水發為患查毛城舖原有洪溝巴河二河為減洩黄水故道因閘下地勢東北髙於西南是以水向南行漫入祝家口請於水涸後將二河濬令深通並挑寛河頭百餘丈再於二河上首逼近毛城舖口門之處將舊有之蔣溝河疏通祝家口潘家口等處築夾土大壩攔截南流務使減下之水盡入蔣溝洪溝巴河分流下注則永城碭山一帶均無淹漫之虞至王家山天然閘減下之水亦㑹入徐溪口閘下舊有引河中自齊村橋至堌集間被淤墊宿州境内灰谷堆燕子口等處亦有淤淺應一律疏浚又峯山減水四閘厯年既久自閘塘以迄孟山湖六十餘里引河多淤應一併估挑又奏言淮揚運河自清口至𤓰洲三百餘里其上源係分清口洪澤湖之水入天妃閘建瓴而下經淮安寳應髙郵揚州以達於江惟藉東西兩岸一綫漕堤以為防固請於天妃正越兩閘之下相距百餘丈各建草􅄵三草壩之下酌建正石閘二越河石閘二又於所建二閘尾各建草壩三重重闗鎖層層收蓄則水平溜緩洪湖之異漲可禦運河之水勢可減再查湖水三分入運七分㑹黄其山旴尾閭之天然南北二壩原以宣洩洪湖異漲今運道無虞髙堰大堤堅固將来非有異漲二壩斷不可輕開使清水全力禦黄髙寳諸河所受之水循軌入江不至泛溢下河則髙寳興鹽等州縣民田可免洪湖洩水之患疏下均議行㑹御史夏之芳主事孫濩孫先後條奏河工事宜命髙斌㑹同大學士嵇曾筠副總河劉永澄等詳度妥議時安徽布政使晏斯盛廣東學政王安國等復請疏濬海口命髙斌同趙宏恩及江蘇巡撫邵基㑹勘二年三月髙斌以淮運湖河各事宜有面奏請訓之處疏請来京得㫖俞允四月至京適宏恩亦以户部尚書内擢命王大臣㑹同髙斌宏恩將諸臣所奏海口清口運河運口各事宜逐條詳議御史甄之璜鍾衡等復奏毛城舖工程有碍運道民生請停止諭曰朕前因蕭永等處屢遭水患應作何辦理為乂安百姓之計令該督撫總河等勘明妥議嗣據奏稱疏濬毛城舖迤下一帶河道經徐蕭睢宿靈虹等州縣下至泗州之安河陡門紆迴曲折六百餘里以達於洪澤湖復出清口仍與黄㑹已經該部議行據淮揚京員夏之芳等連名陳奏以為未便朕以該員等生長淮揚所奏毛城舖引河不便開通之處果有所見亦未可定此事闗係重大是以復降諭㫖令總河㑹同該督撫悉心籌畫今據髙斌趙宏恩来京進呈河圖面奏情事乃知夏之芳等所奏俱非現在情形據夏之芳等稱毛城舖引河一開則髙堰可危淮揚運道民生可慮今據髙斌等奏稱毛城舖減水壩原因徐州一帶兩岸山勢夾束河水屢屢為患是以前河臣靳輔於康熙十七年題明建設減下之水使歸洪湖以助清刷黄六十年来上下河道民生均受其益是現在毛城舖濬河乃因毛城舖壩以下舊有之河身淤阻量加挑浚使水有所歸並非開鑿毛城舖之壩也况減下之水紆迴曲折六百餘里經由楊㠉等五湖為之停蓄一入湖邉即已澄清從無挾沙入洪湖之患亦無洪湖不能容納之虞又豈至如夏之芳等所言危髙堰而妨淮揚之運道民生乎朕令髙斌趙宏恩公同總理事務王大臣與夏之芳等悉心講論而夏之芳等身未親厯其地徒以惑於浮言復固執偏見及王大臣等畧與辨論即多遁詞其原無定見可知矣今日忽據御史甄之璜鍾衡抗疏陳奏甄之璜奏稱毛城舖開河淮揚百萬之衆憂慮惶恐因致直𨽻地方雨澤愆期夫淮揚與直𨽻相隔數千里直𨽻之亢旱與毛城舖引河何涉而乃為此支離誕妄之語鍾衡條奏二摺皆係毫無禆益之事將毛城舖一案牽引叙入尤屬巧詐甄之璜鍾衡著革職交部嚴審定議具奏夏之芳等既以冒昧之識阻撓河務於前又以巧詐之私希冀掩過於後此并非尋常奏對不實者比著交部嚴察議奏三年正月淮揚運河工竣得㫖嘉奬下部議叙四年三月諭曰從前河道總督髙斌因議疏濬毛城舖水道之時並請另開新運口堵塞舊運口以避黄河倒灌近據外間傳說及南来之人多言黄水淤墊之處究未刷洗浄盡所改新口雖離黄稍逺而上流水勢旁洩其力已弱不能直注黄河將来倒灌阻塞之患終不能免人言如此是否確情朕實難以遥定惟有命大學士鄂爾泰乘驛前往庶與朕親臨閱視相同四月鄂爾泰勘奏新運口宜開如髙斌議下大學士九卿議行詳鄂爾泰傳七月疏言淮揚所屬黄運湖河堤工額設堡夫堆積土牛原以偹増卑培薄之用但土牛虚鬆雨淋每多坍缷莫如改築子堰為善部議如所請八月請陛見諭令霜降後起程賜詩曰禹功萬古仰平成疏濬隨時賴俊英淮浦建牙資保障黄流奏績久澄清息機早是無穿鑿順性猶然矢樸誠潘靳嘉猷編簡在千秋惟爾繼賢聲九月命於進京時取道直𨽻與總督孫嘉淦總河顧琮㑹勘直𨽻河道六年八月疏言黄河自宿遷厯桃源至清河二百餘里河流湍急險工林立北岸止有縷堤一道並無遥堤重障又内逼運河唇齒相依運河南岸雖有縷堤卑薄不足以資捍禦請將運河南岸縷堤通築髙厚作為黄河北岸之遥堤更於縷堤内酌建格堤九道又江都三汊河為𤓰儀二河口門江廣漕鹽船必由之要津但𤓰河地勢卑不能蓄留淮水引入儀河請塞𤓰河舊口門改向洋子橋營房迤下另挑越河以減淮水入𤓰河之分數則儀河可以分流刷淤濟運並塞𤓰洲廣恵閘上之舊越河於閘下另開一道由城河西行以㑹閘河則水勢均平於運道更為便利又請將鎮江運河南岸坍缷埽工改建磚工下部議行尋調直𨽻總督兼管總河印務賜詩曰淮揚底定早垂勲節鉞新開紫氣分自是經綸方藉展可知魚水正需殷人言久慶江南兩物望應歸冀北雲保障繭絲須識取編氓一路頌聲聞十二月奏籌永定河全河機宜惟在使尾閭通暢請於三角淀舊淤傍南稍淺處開為引河下接大清河之老河頭上接鄭家樓水口挑去積土所挑土即於北岸廢埝之南圈築坡埝以防北軼南岸之尾亦量為接築以遏南溜其下口河唇隨時疏通至上游應籌分洩之道請於南岸六工之雙營北岸三工之胡林店七工之小恵家莊各増建三合土滚壩一周身俱較石壩減落尺寸南岸郭家務舊有草壩亦應一律修築如式大學士等議行七年三月疏言直𨽻山西沿邉副㕘遊都等缺恩許揀用滿洲人員直𨽻為京畿重地請將已補邉缺通曉營務者調補内地别以京員補用邉缺則滿洲人員更可疏通四月又請拓天津水師營汛増駐滿洲兵千合舊額為三千滄州亦増兵二百合舊額為五百均從之七月上以淮揚屢被水灾髙斌乆任江南於地方事宜熟悉命同侍郎周學健往㑹總督徳沛等辦理賑䘏水利事宜十二月奏言永定河上游為桑乾河北岸自山西大同縣屬之西堰頭村起至直𨽻西寧縣屬之辛其村止南岸自大同縣屬之冊田村起至西寧縣屬之揣骨疃止可各開渠灌田桑乾河由西寧石閘村入山經宣化縣之黒龍灣懐来縣之和合堡宛平縣之沿河口兩山夾峙一線中趨若於山口取巨石錯落堆疊仿竹絡壩之意作為玲瓏水壩以殺汹湧之勢則下游之患可減疏上議行九年四月以病聞命醫診視五月奏言現經户部議准直𨽻藁城縣知縣髙崶呈請自備工本赴山東開礦臣思開礦之事向惟行於滇粤邉省山左内地且近岱嶽孔林似屬不宜况擾民滋怨奸竊易生尤為可慮請亟停止上嘉是之十年三月加太子太保五月授吏部尚書仍管直𨽻水利河道工程六月議政處行走十一月兼總管内務府大臣十二月充經筵講官協辦大學士軍機處行走十一年三月以御史楊開鼎疏劾河督白鍾山駁減工費需索河員漫口衝决匿灾不報命髙斌往江南㑹同總督尹繼善查辦尋奏駁減需索等欵皆虚惟陳家浦衝刷淹没事實鍾山坐革職四月疏言淮黄二瀆每年伏秋水漲其大小總以老壩口水誌為準則今應酌定以乾隆七年最大水誌連底水一丈四尺七寸為準每年水勢較此尚差若干令河臣明白奏報以便騐度水勢之大小至各處閘壩開閉則應以就近石工一定不易水長之尺寸為度如黄河則有徐州城外石堤可騐清水則有洪湖山旴石滚壩可騐於此立定準則騐度啟閉在工人員皆得遵循無悞如黄河南岸洩水門户則有碭山縣之毛城舖壩王家山之天然閘睢寧縣之峰山四閘毛城舖壩應以徐城石堤連底水長至七尺為度即行開放秋汛過後至九月初一日即行堵閉再壩外引水支河現有四道而蔣家營一河河頭直順迎溜洩水尤多今止留三道其上流之汪家莊引河應行堵閉蔣家營河頭應改為倒勾從前太順之口門堅築草壩堵塞以防引溜過多之患天然閘應以徐城石堤連底水長至八尺為度即行開放水落堵閉不必拘定日期峰山四閘在徐城之下非遇異漲毋許輕開至黄河北岸洩水門户則有宿遷縣之竹絡壩清河縣之王營減壩安東縣之馬家港竹絡壩口門應收窄二丈止留四丈其内外之臨黄束黄二壩亦應一律收小酌定每年於十月内東省煞壩後始行開放以濟来嵗重運過完即行堵閉王營減壩應照乾隆八年原議必俟非常之漲始行開放馬家港與此一例毋庸常時開放至於清水則以洪澤一湖為灌輸蓄納之地水弱則不足禦黄濟運水大則髙堰一帶工程受險其洩水之處山旴三滚壩外則有旴𣅿之蔣家閘南北天然二壩蔣家閘應酌定以洪湖水長與山旴南壩相平始令開放南壩一不過水即行堵閉天然南北二壩應酌量於南滚壩過水三尺之時始將土壩開放俟南滚壩一平即行堵閉又運口分淮入運為淮揚運河三百里進水之源不過藉以通舟濟運水勢原不宜過大其草壩口門應酌定以四尺為度二壩三壩亦照式收小至南壩壩墩應照北壩改做磨盤式以便重運挽行出口疏入議行七月運河水漲海州一帶被淹命髙斌往勘八月㑹奏河工現行事宜一六塘河謝家莊龍溝口等處堤堰應照原估丈尺量地勢髙低酌加寛厚六塘河經由之武漳義澤六里各滚壩應照原議加培増長再將六塘河尾閭之中墩河項家衝東門河挑浚寛深即於口門建石滚壩以利宣洩沐陽前後兩河應將舊有子堰及現議増築處所一律増培髙厚一海州州同應移駐大伊山鎮管理漣河以南六塘河子堰閘壩等工再増設州判一管理漣河以北之贑榆縣及薔薇南橋等河子堰閘壩等工裁溧水縣縣丞改為沐陽縣縣丞管理一切河道圩􅜌從之尋請將海州沐陽贑榆乾隆十年以前積欠地漕銀米及淮安分司所屬之板浦徐瀆中正莞瀆臨洪興莊等六鹽場未完折價帶徴銀一體豁免得㫖俞允十一月充玉牒館副總裁十二年三月授文淵閣大學士四月諭往江南同新任河道總督周學健辦理防汛事宜其直𨽻河道總督印務交直𨽻總督那蘇圖暫管五月直𨽻水利工程告竣上奬髙斌及劉於義勤勞下部議叙十三年三月命同左都御史劉統勲赴山東查辦災賑先是浙閩總督喀爾吉善劾浙江巡撫常安婪賍各欵命髙斌偕總河顧琮往訊嗣又命大學士訥親往㑹審論罪如律至是髙斌與顧琮㑹奏不能按欵窮究請交部嚴加議處諭曰髙斌等初審以常安婪贓納賄七欵皆虚惟失察家人勒索議以革職其意謂罪至革職事已兩平可以顢頇了局如所謂和事老人者經朕嚴切批示諭令髙斌回浙再行研審髙斌回奏謂將題本内看語摘叙簡畧未經聲明等語朕看其始終有飾非䕶過情形因命大學士訥親前往而髙斌等於訥親未到浙之先即倉忙審出常安婪收銀兩更察出原㕘欵外婪取差役贓銀此明係聞訥親往浙之信為此先發掩飾之計髙斌顧琮承審此案若謂其有意瞻徇常安朕可保其實無是心而身為大臣於特交查審重案乃不知秉公辦事模棱兩可尚以為識大體而沽名則實有負委任咎無可辭著交部嚴察議奏部議革職詔從寛留任閏七月兼管江南河道總督事務十二月以查辦周學健家産徇私瞻顧命革去大學士仍留河道總督任十五年三月以前所築十字河竹絡壩之臨黄臨運二壩辦理未協部議革任特予寛免十六年三月上南巡命仍以大學士銜管河道總督事閏五月暫管兩江總督印務八月河南陽武漫工未合龍詔往相度堵築命未下髙斌奏請赴豫協辦諭奬其急公任事得大臣體十一月工竣交部議叙尋命同侍郎汪由敦往勘天津一帶河工十七年三月髙斌年七十賜詩曰早𠫭黄閣侍金鑾晚覺扶鳩步履難卧理藉卿為保障成功告我永安瀾讀書未懈平生志益夀何須九轉丹黄髪皤皤在朝衆勤勞軫念乆河干十八年七月奏洪澤湖水漲泛髙郵車邏壩决邵伯迤北運河二閘及下河髙郵寳慶一帶被淹下部嚴議是月學習河務布政司富勒赫劾奏南河虧帑事命署尚書策楞尚書劉統勲往查屬實八月諭曰富勒赫初奏時朕意髙斌等為屬員朦蔽咎在失察今據策楞等查出浮冒朦混種種滋弊如外河同知陳克濬海防同知王徳宣虧缺皆至二三萬髙斌等豈竟毫無覺察乃置之不問竟視虧帑為應然彌補為故智二人之罪其可逭乎至通判周冕應辦物料全無貯備以致二閘被冲束手無策仍不據實題𠫭挐問僅稱悞事撤回另委接辦此尤其乖謬之甚者若非䇿楞等前往則該員竟致漏網髙斌等之居心尚可問乎髙斌張師載俱着革職留工効力贖罪九月黄河復决銅山縣張家馬路南注靈虹諸邑歸洪澤湖奪淮而下諭曰秋汛已過何致衝漫河堤其中顯有情弊該管同知李焞着革職挐問髙斌張師載身任南河日乆不能留心查察致該處堤身卑薄踈鬆一時潰决漫延數邑其罪實無可逭伊二人現在留工効力如邵伯二閘决口已塞着同往銅山工次上緊堵閉若尚未完即令髙斌赴銅山勒限堵塞如不能刻期告竣即嚴奏治罪策楞尋奏李焞及革職守備張賔侵帑誤工狀諭曰李焞張賔着即於該工正法使在工人員知所懲戒此皆由髙斌張師載負恩狥縱實無可貸念髙斌尚係舊人不忍即寘重典張師載因并寛宥然國有常刑雖於法外矜全亦不可不使知儆惕着將髙斌等縳赴行刑處所令其目覩行刑訖再行釋放二十年三月髙斌卒於工次命賞給内大臣職銜並内庫銀一千兩料理喪事二十二年上南巡諭曰原任大學士内大臣髙斌前任河道總督時頗著勞績即如毛城舖所以分洩黄流髙斌設立徐州水誌至七尺方開後人不用其法遂致黄弱沙淤隠貽河患其於黄河兩岸汕刷支河每嵗冬季必督率㕔汛實力填築近年司河工員疎忽因有孫家集奪溜之事至三滚壩洩洪湖盛漲髙斌堅持堵閉是以數年之間下游州縣屢獲豐收其功在生民自不可冺至於癸酉張家馬路及運河二閘之决則又其果於自信抑且年邁志滿之失朕不得不治其罪而要其瑕瑜自不相掩在本朝河臣中即不能如靳輔而較齊蘇勒嵇曽筠朕以為有過之無不及也兹者翠華南幸追溯前勞特沛恩綸用孚公論可與靳輔齊蘇勒嵇曽筠一同祠祀以昭國家念舊酧功之典且亦使後之司河務者知所激勸二十三年賜諡文定四十四年御製懐舊詩列五督臣中詩曰本朝善治河靳輔齊蘇勒斌實可比靳弗徒保工急至其於齊也有過無不及惟是閉三壩自信過於力下河曽受福異漲害亦廹用此抵以罪勸懲國之則然終諒其心與祠復原職壬午復南巡清口親定式豫折東西壩頻年已受益昨秋黄河决洪湖漲因逼無已徐啟壩未至衝潰棘使斌而有知應歎初未識五十一年命入祀賢良祠子髙恒以兩淮鹽政任内藉端侵肥一案論斬如律恒子髙樸在葉爾𦍑勒𣲖回民婪索金寳盜賣官玉命即於該處正法五十二年二月諭曰原任大學士髙斌宣力年久伊之子孫皆經獲罪現在並無服官者着將伊孫候補通判髙杞調取来京以内務府郎中補用以示朕軫念前勞眷注舊臣之意髙杞後遷兵科給事中補熈補熈滿洲鑲黄旗人姓佟佳父一等公鄂倫岱雍正元年補熈由廕生補理藩院員外郎二年調兵部四年改刑部七年授鑲白旗漢軍副都統九年署天津總兵十年奏言通州營教場順治年間圈為旗地操練無定所難免妨農害稼請將遺址還營又言向修天津城毁沿濠民房今工竣應仍搆舖面地租充營費並令兵丁築室四隅於十分内留給二分令配軍搭厦以居一例免租均從之尋署宣化鎮總兵十一年襲祖佟國綱騎都尉世職疏言張家獨石及洗馬林堡三口准種地民出入餘悉禁邉民圖近偷越弁目賄放嗣後凡報州縣給口票騐無違禁物俱准出入無票解究宣化大同貯炮多請撥張家獨石二處各六具紫溝龍門二處各四具以資操演諸汛視衝僻定兵多寡以重巡守十二年疏言逃兵有竊帶餉馬者律未載明請勅部加重議罪家口移縣嚴追賠繳直𨽻營制兵餉從補日始惟宣化至下月初一日起支應改畫一生息銀給兵父母妻子外同居兄弟概停給以杜冒濫俱下部議行九月擢江南提督十三年疏陳營汛事宜一福山至吳淞川沙俱屬水師中間劉河陸路營勢不聨絡請撥崇明鎮沙船四交劉河營派千總外委輪班㑹哨一崇明狼山二鎮水師統領二月出巡前及十月巡竣後令吳淞川沙黄浦劉河等營随崇鎮㑹操福山營随狼鎮㑹操俾知練習一柘林之漴缺汛南滙之新塘汛青村之青村港汛俱沿海要地應各増設千總駐巡原設把總留營操練一海口載貨小船漁户網船請照大船刻號編船户姓名無者不許出口從之乾隆元年授漕運總督疏言漕標左營副將右營遊擊夏秋間例出䟎空運營中乏員訓練請増設中營副將轄都司一千總二把總及外委千把各四左營改設遊擊轄守備千總各一把總三外委千把四右營弁兵如左數將原額新舊兵分撥無容増餉又言向例漕船未滿十年運損朽者准雇民船一次均給回空限單旗丁因費多聽民船回空自行攬載至淮别僱應㸃沿途催查兵役知船數不符需索滋累請交糧後但給旗丁随身限單到次繳騐所僱船免給至白糧船未滿五年限丁疲船朽者即減運另選均得㫖允行時山東河南截漕船應扣給錢糧未定章程敕總漕議尋議奏本折色月糧為安家贍養三修銀為修艌船隻應全支本折色行糧計程支潤耗銀米原以資潤折耗其銀亦計程支其米到截留州縣收逾半月限者計月支山東任城幇無贍運屯田其贍軍銀全支河南盤剥銀因臨清剥淺設已抵者全支未抵者按程支疏入着為例二年六月命㑹勘東省運河九月疏請定閘水以四尺為準視舊例深五寸省剥淺費下部議行十一月丁憂回京三年補鑲白旗蒙古都統五年二月調正藍旗滿洲都統七月授綏逺城建威將軍十月疏稱旗員不諳開墾事宜請令雁平道協理又同巡撫喀爾吉善奏於歸化城増設巡道於滿洲䝉古内補授俱從之六年疏言綏逺城兵額多祇佐領防禦驍騎校等各三十五員不敷董率請將右衛滿洲正紅鑲紅鑲白正藍鑲藍五旗撥佐領等各一歸綏逺下五旗又言托克托城内倉儲數萬防守人寡令歸化城都統派兵輪守又言殺虎口距綏逺二百餘里應設三十六汛内新店子五松秃路沙兒沁大黒河設把總各一二十家子為適中地設都司並中軍千總各一管轄各汛均於鎮標殺虎口協標内撥兵往駐其寧武八角營都司得勝路千總新平虎威水峪樓溝四把總汛僻員冗俱移撥新設各汛再城東南係察哈爾四旗兵駐劄餘係土黙特䝉古地遇失事即責該地官兵庶無推諉均議行八年暫兼管山西提督事九年奏請綏逺民願以米穀豆抵交墾户借項及應徴草折銀者聽交納免加耗俾積欠早完從之十一年疏請設滿漢繙譯官學於綏逺城選在京八旗罣誤人員咨充教習有成定年陞轉公費照前蒙古學例給予部議教習於右衛八旗舉貢生監並罷間旗員内考補餘如所請十四年四月疏言右衛滿洲上三旗及䝉古八旗官多兵少請裁佐領防禦驍騎校各一裁員俟綏逺右衛二城缺坐補兵均派各旗轄領催俟缺出汰除漢軍上四旗官少兵多每旗應増佐領防禦驍騎校各一各撥原領催二在新佐領下兵亦均派轄増缺令漢軍現任官暫兼俟滿洲䝉古裁缺後將漢軍人員揀放不至多糜俸餉部議准行八月病命太醫院官往視十月諭来京調養十八年卒賜祭𦵏諡温僖長子嗣睿襲世職完顔偉完顔偉滿洲鑲黄旗人完顔即其姓雍正九年由内務府筆帖式授堂主事十年遷户部員外郎十二年命往江南學習河務乾隆二年授浙江海防兵備道四年調江南河庫道尋擢浙江按察使時建尖山壩工巡撫盧焯以完顔偉素諳工程奏派赴工督查給公項為往来費諭每年賞銀五百兩五年條奏現行事宜一歲暮封印遇緊要文移向於年月兩旁硃寫印信遵封上司牌票則刻本官花押鈐盖年月上行用易滋詐偽請於封印時地方官各備空白文移用印鈐盖貯内衙遇緊要事填用上司亦備空白牌劄如批發各屬文書不能鈐印者先用牌劄飭知仍登記號簿其用剩空白開印時銷燬一竊盜拒捕及白晝搶奪殺傷事主之案例照强盜案題𠫭疎防勒緝苐强盜無分首從斬决竊盜拒捕搶奪殺傷止下手者當其重罪且竊盜因追逐始拒捕而搶奪在白晝與黒夜行刼者有間倘照强盜案不論己未獲概𠫭疎防恐地方官轉多諱匿請嗣後竊盜拒捕與白晝搶奪殺傷人若未經獲賊與雖獲賊而為首及下手兇犯未獲者仍照例題𠫭如限内已獲為首及下手兇犯惟夥賊未獲者免𠫭仍勒限緝拿庶輕重有别部議從之六年二月命為江南副總河八月授江南河道總督初髙郵州南闗五里車邏三壩遇河湖漲洩水輒浸下河州縣民田前總河髙斌遵㫖閉洪澤湖天然壩及南闗等三壩不使入下河至是知州沈光曽因上河濵湖灘地被水詳請將濟運有餘之水由三壩減洩并易芒稻河閘為壩以疏寳應髙郵甘泉諸湖南注之路完顔偉劾其擾亂河工得㫖河工闗係緊要沈光曾以必不可行之事顛倒是非且不具詳於髙斌在任之時而詳於完顔偉新任之際眀係倡論惑衆擾亂河務着交部嚴加議處尋將沈光曽議以革職先是上以黄河大溜逼近清口每倒漾為患命循康熈年間舊迹開陶莊引河𨗳黄使北大學士鄂爾泰往㑹河臣髙斌勘奏議甫定以汛水驟集積淤停工髙斌尋亦去任至是復命完顔偉相度施工完顔偉因奏自清口迤西黄河南岸設木龍挑溜漸向北趨木龍之議倡自髙斌完顔偉踵而行之盖慮引河功不易就圖補偏救弊之為然自是陶莊引河之議遂寢厥後四十一年上獨申睿斷决意開之踰年而功竣新河直抵周家莊始㑹清東下去清口較昔逺五里倒漾之患永絶詳見御製陶莊河神廟碑記七年七月疏報本年淮源上游雨多水發河南賈魯河水勢盛長由渦達淮歸洪澤以致異漲其自三石滚壩減下之水已歸髙寳邵伯等湖而古溝東壩漫刷過水又從白馬湖㑹之致髙郵邵伯一帶水勢過大臣督員加築子堰捍禦並將入江入海要道相機開放髙郵之柏家墩南老土壩并南闗五里車邏三壩次第開放水勢始定諭曰朕心正為此厪念覽奏稍慰朕懐是時黄河水漲石林口減水過多沛縣被水并及山東魚臺滕嶧等縣完顔偉具疏請罪下部議罰俸一年十一月御史吳煒疏㕘完顔偉劾罷知州沈光曽信任㕘將朱永凡用舍倒置命完顔偉回奏尋言光曽因倡議惑衆題㕘永凡厯練辛勤故請留任諭曰今年河湖異漲議者皆歸罪河臣甚非情理之平但完顔偉未諳河務驟遇此災未免倉皇著調補河東河道總督九年正月奏言山東連年被水由於上游散漫下游梗阻運河南接汶泗沂濟諸水洩入微山蜀山南旺馬踏等湖北接漳衛二水洩入鹽河徒駭馬頬鈎盤等河遇伏秋異漲每宣洩不及應於運河内増閘壩以分其勢疏下河以暢其流其經由州縣支分𣲖别或有淤狭溝渠殘缺壩閘堤堰均查明浚修報聞十年以母老陳請回京上慰留之十三年三月授左副都御史六月卒欽定八旗通志卷一百四十二
