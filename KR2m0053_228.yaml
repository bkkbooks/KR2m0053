body:
  text: 欽定四庫全書欽定八旗通志卷二百十四人物志九十四忠義傳六滿洲八旗六共八十一人康熙十四年馬喇希馬喇希滿洲鑲黃旗人姓伊爾根覺羅氏世居夾木湖地方康熙十四年以驍騎校從定西大將軍多羅貝勒董額征四川至隴州隨振武將軍佛尼勒等擊敗偽將髙鼎等於關山河岸復隨平逆將軍畢力克圗等擊偽將郝天祥敗之次日賊復合衆夾攻遂力戰陳亡恩賜雲騎尉世職承襲詳見世職表僧色禮僧色禮滿洲鑲黃旗人姓洪鄂氏世居長白山任三等侍衛康熙十四年從大兵征吳耿二逆藩於江西有功進征廣東至九窑十八洞地方戰歿於陳恩賜雲騎尉世職承襲詳見世職表貴復貴復滿洲鑲黃旗人姓瓜勒佳氏世居哈達地方任二等侍衛兼佐領順治十六年從征雲南我兵圍沅江府有賊千餘出犯我蘆屯泛貴復率本恭領兵擊却之康熙十四年隨征逆藩耿精忠至江西敗賊萬餘於符潭浦尋隨定南將軍希爾根擊偽帥李茂珠李福生於建昌府城南鐘鼓山力戰被創以創發殁恩賜雲騎尉世職承襲詳見世職表福拉他福拉他滿洲鑲黃旗人姓兀札喇氏世居瓜勒察地方襲父東阿騎都尉世職康熙十四年四月從征逆藩耿精忠至江西隨署護軍統領伯郎素擊賊於鄱陽湖乘船勦殺中炮陳亡恩賜騎都尉加一雲騎尉世職承襲詳見世職表圗弼赫圗弼赫滿洲鑲黃旗人姓瓜勒佳氏世居吉林烏喇地方以護軍校駐防涼州康熙十四年從定西大將軍多羅貝勒董額征從逆提督王輔臣於秦州力戰陳亡恩賜雲騎尉世職承襲詳見世職表瑚什塔瑚什塔滿洲鑲黃旗人姓納喇氏康熙十三年以護軍恭領銜從征逆藩吳三桂至陜西隨前鋒統領穆占與賊戰於野狐嶺平陽關又擊偽將石存禮於朝天關韓天福於保寧進至蟠龍山小梅嶺龍潭驛西山等處連戰俱有功十四年進攻秦州遇賊力戰歿於陳恩賜三等輕車都尉世職承襲詳見世職表圗弼和圗弼和滿洲鑲黃旗人姓瓜勒佳氏世居烏喇地方康熙十三年以護軍校隨定西大將軍多羅貝勒董額征逆藩吳三桂於十四年擊賊秦州力戰殁賞恤如例固哈禮固哈禮滿洲鑲黃旗人姓瓜勒佳氏世居納音委署護軍校康熙十四年隨將軍席卜臣鎮守陜西漢中府擊賊將王屏藩於猴子嶺陳亡賞恤如例額勒布額勒布滿洲正黃旗人姓葉赫氏世居葉赫初以八品官隨大兵征逆藩吳三桂至湖廣長沙府擊賊於石匣村有功康熙十四年六月進攻江西抵新口與賊力戰殁於陳恩賜雲騎尉世職承襲詳見世職表車圗納車圗納滿洲正黃旗人姓屠氏世居烏喇地方康熙十三年以護軍校從征逆藩吳三桂由陜西進四川賊設伏於林中以餘衆陳於野狐嶺執紅纛以誘我軍隨前鋒統領穆占追擊之於陽平關時偽將石存禮等據朝天關連營三十里勢張甚復隨穆占及西安將軍瓦爾喀等擊敗之至娘娘廟偽將吳之茂率萬衆阻我軍復隨大兵連敗之於張飛廟又連敗偽將王屏藩等於槐樹驛小梅嶺龍潭驛等處十四年進攻秦州從逆提督王輔臣遣兵來犯力戰於南山陳亡恩賜騎都尉又一雲騎尉世職承襲詳見世職表費赫齊費赫齊滿洲正黃旗人姓董鄂氏世居董鄂地方順治十五年以佐領從征雲南擊偽侯李成蛟於涼水井偽晉王李定國於雙河口十七年從征山東土賊敗吕思啓等於鋸齒崖俱有功康熙十三年復從定西大將軍多羅貝勒董額征逆藩吳三桂隨前鋒統領穆占連敗賊於野狐嶺陽平關等處又擊敗偽將石存禮於朝天關王屏藩於蟠龍山及小梅嶺龍潭驛等處十四年進攻秦州遇賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表積善積善滿洲正黃旗人姓屠佳氏世居烏喇於康熙十三年以護軍校從定西大將軍多羅貝勒董額征從逆提督王輔臣十四年擊賊於秦州力戰陳亡恩賜雲騎尉世職承襲詳見世職表傅達禮傅達禮滿洲正黃旗人姓舒佳氏世居渾春地方康熙十三年以驍騎校從征逆藩吳三桂隨前鋒統領穆占擊偽將石存禮於朝天關敗之十四年又隨大兵敗賊將吳之茂於蟠龍山及娘娘廟又連敗賊於張飛廟槐樹驛小梅嶺龍潭驛西山下功最著進攻秦州復破賊於北山偽將王屏藩集衆復戰遂力戰陳亡恩賜騎都尉世職承襲詳見世職表塔爾海塔爾海滿洲正黃旗人任驍騎校康熙十四年隨征逆藩吳三桂至四川奉安西將軍赫業以軍事差往他所還至娘娘廟遇賊兵力戰陳亡恩賜雲騎尉世職承襲詳見世職表阿喀倪阿喀倪滿洲正黃旗人姓那穆都魯氏世居瓦爾喀綏分地方父坤巴圗魯官散秩大臣阿喀倪於康熙十四年以一等侍衛從征吳耿二逆藩至江西耿逆偽帥黃豪於鄱陽湖率賊萬餘船七百隻三路來戰阿喀倪率舟師敗之復於康山周湖汊口界牌鋪景德鎮等處屢敗賊衆又敗叛將程鳯等於沉香山張名揚等於馬鞍山復連破賊兵於土地堂林田等處地方遷副都統仍在軍前領兵隨和碩簡親王喇布進至吉安府吳逆偽帥韓大任陳耀元等復率衆七千拒戰於螺子山我軍失利阿喀倪力戰陳亡恩賜騎都尉世職承襲詳見世職表綽思啓綽思啓滿洲正黃旗人姓威古特氏世居察哈爾地方康熙十四年以驍騎校隨定西大將軍多羅貝勒董額征從逆提督王輔臣於秦州力戰陳亡恩賜雲騎尉世職承襲詳見世職表諾岱諾岱滿洲正黃旗人姓瓜勒佳氏世居蘇完地方隨征湖廣有功康熙十四年以八品官復隨揚威將軍內大臣阿密達征從逆提督王輔臣於平涼力戰陳亡恩賜雲騎尉世職承襲詳見世職表阿寧阿阿寧阿滿洲正白旗人康熙十四年以參領從定西大將軍貝勒董額征從逆提督王輔臣擊賊於秦州戰歿賞恤如例俞珥俞珥漢軍正白旗人以驍騎校駐防杭州康熙十四年隨提督常進忠率舟師擊賊朱飛熊等歷戰並有功四月進發海門悉力拒敵力戰陳亡恩賜雲騎尉世職承襲詳見世職表布思泰布思泰滿洲正白旗人姓富塔臘氏世居長白山任護軍校康熙十四年從征逆藩耿精忠至浙江台州擊偽將曽飬性等於小梁山陳亡恩賜雲騎尉世職承襲詳見世職表瑚紐瑚紐滿洲正白旗人姓納喇氏世居葉赫地方康熙十三年由護軍校隨前鋒統領穆占征逆藩吳三桂擊賊於野狐嶺及陽平關俱有功復擊敗偽將石存禮等於朝天關十四年同總兵王懷忠擊賊於娘娘廟敗之又隨定西大將軍多羅貝勒董額攻賊於秦州力戰陳亡恩賜雲騎尉世職承襲詳見世職表弼穆弼弼穆弼滿洲正白旗人姓查庫他氏世居薩楚庫地方初以一等輕車都尉兼一雲騎尉任參領康熙十四年隨定南將軍希爾根征逆藩耿精忠至江西與賊力戰於建昌之石峽新口殁於陳恩賜一雲騎尉併為三等男世職承襲詳見封爵表赫圗赫圗滿洲正白旗人姓伊爾根覺羅氏世居烏喇地方康熙十四年定逺平寇大將軍安親王嶽樂率兵取長沙赫圗從征越八旗先登力戰殁於陳恩賜騎都尉世職承襲詳見世職表伊藍泰伊藍泰滿洲正紅旗人姓他塔喇氏世居安禇喇庫地方康熙十三年從定西大將軍多羅貝勒董額征逆藩隨前鋒統領穆占擊賊於野狐嶺陽平關朝天關俱有功又與偽將王屏藩鄭蛟麟吳之茂戰於蟠龍山又連敗賊於娘娘廟張飛廟槐樹驛小梅嶺龍潭驛等處十四年進攻秦州遇賊力戰陳亡恩賜騎都尉兼一雲騎尉世職承襲詳見世職表瑚圗瑚圗滿洲正紅旗人姓伊爾根覺羅氏世居呼努渾河地方康熙十四年以佐領授恭將隨振武將軍佛尼勒征逆藩吳三桂與賊戰於蟠龍山朝天關庸寧鋪等處俱有功進攻秦州偽將吳之茂率兵萬餘立二營於北山瑚圗奮勇直入其營中炮殁於陳恩賜雲騎尉世職承襲詳見世職表德爾根德爾根滿洲正紅旗人康熙十三年從征浙江敗耿逆偽總兵劉秉仁於半山嶺十四年隨都統喇哈達敗賊於石塘尋擊偽將連登雲力戰陳亡恩賜雲騎尉世職承襲詳見世職表覺羅色爾圗覺羅色爾圗滿洲正紅旗人初襲父騎都尉順治七年恩詔加至三等輕車都尉後以軍功加為二等輕車都尉康熙十四年從定西大將軍多羅貝勒董額征從逆提督王輔臣至平涼力戰陳亡恩賜一等輕車都尉世職承襲詳見世職表索鼐索鼐滿洲正紅旗人姓舒舒覺羅氏世居葉赫地方康熙十四年以八品官隨多羅貝勒董額征從逆提督王輔臣至益門鎮與偽將王屏藩等戰敗之賊復合力戰陳亡恩賜雲騎尉世職承襲詳見世職表肯特肯特滿洲正紅旗人康熙十四年以七品官隨定南將軍希爾根征逆藩耿精忠至江西擊賊帥邵連登於建昌破之旋擊賊於饒州力戰陳亡賞恤如例聶爾庫聶爾庫滿洲正紅旗人康熙十四年隨振武將軍佛尼勒征逆藩吳三桂與偽將吳之茂戰於羅門鎮力戰陳亡恩賜雲騎尉世職承襲詳見世職表阿蘭阿蘭滿洲正紅旗人任佐領遇恩詔授騎都尉世職順治九年從征流寇有功康熙十四年隨將軍瓦爾喀征逆藩吳三桂至四川敗賊黨於朝天關尋以迎餉至槐樹驛遇敵戰殁加恩賜世職為二等輕車都尉承襲詳見世職表阿巴都阿巴都滿洲正紅旗人任護軍校康熙十四年隨征從逆提督王輔臣至平涼府擊其子王繼正陳亡恩賜雲騎尉世職承襲詳見世職表海都海都滿洲正紅旗人姓何舍里氏世居葉赫任驍騎校康熙十四年隨定南將軍希爾根征江西擊耿逆偽帥邵連登於建昌之長興大敗賊衆進攻新口淝堰力戰陳亡恩賜雲騎尉世職承襲詳見世職表渾親渾親滿洲鑲白旗人姓那蘭氏世居烏喇康熙十三年十月以二等輕車都尉委署章京隨定南大將軍希爾根征逆藩耿精忠至江西屢敗賊衆有功十五年復隨定逺平寇大將軍安親王嶽樂征逆藩吳三桂賊將馬寶率衆三萬餘來犯渾親奮勇擊戰被傷殁恩賜一等輕車都尉世職承襲詳見世職表陳達陳達包衣鑲白旗人世居瀋陽地方任陕西甘州永固城逰擊康熙十四年西番阿里奈從偏都口來犯達率所部禦之力戰殁於陳恩賜雲騎尉世職承襲詳見世職表阿哈里阿哈里滿洲鑲白旗人姓索綽絡氏世居吉林烏喇地方順治十八年以驍騎校從征山東擊敗賊將假秉瑚乂連敗賊黨孫小五王莭祥蕭五于大賽岩及鋸齒崖康熙十四年復從定西將軍多羅貝勒董額征逆藩吳三桂至陜西偕達理善等擊偽將髙定蔡元德等有功進攻秦州遇賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表鄂善鄂善滿洲鑲白旗人康熙十三年以護軍恭領隨安西將軍赫業征逆藩吳三桂屢著戰功十四年擊賊於秦州力戰陳亡恩賜雲騎尉世職承襲詳見世職表暖推暖推滿洲鑲白旗人姓兀札拉氏世居黑龍江薩爾察地方任騎都尉兼副參領康熙十四年隨寧海將軍富喇塔征耿逆九月十八日由和山嶺攻溫州擊偽副將朱起龍暖推力戰殁於陳恩賜雲騎尉世職承襲詳見世職表何和禮何和禮滿洲鑲白旗人任驍騎校康熙十四年從征陜西擊逆賊劉世良於華山陳亡恩賜雲騎尉世職承襲詳見世職表賽音布祿賽音布祿滿洲鑲白旗人姓瓜勒佳氏世居葉赫地方康熙十三年以前鋒校從征逆藩吳三桂由陜西進四川破賊於野狐嶺陽平關保寧等處又戰於小梅嶺龍潭驛俱有功十四年復隨定西大將軍多羅貝勒董額都統赫業等擊從逆提督王輔臣於秦州陳亡恩賜雲騎尉世職承襲詳見世職表葉和臣葉和臣滿洲鑲紅旗人署驍騎校康熙十四年從定西將軍董額征從逆提督王輔臣攻平涼力戰陳亡賞恤如例輝蘭輝蘭滿洲鑲紅旗人姓完顔氏世居完顔地方康熙十四年以護軍校隨征從逆提督王輔臣攻綏德州有功又擊偽總兵王繼正於平涼力戰陳亡恩賜雲騎尉世職承襲詳見