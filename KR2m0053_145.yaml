body:
  text: 欽定四庫全書欽定八旗通志卷一百三十一人物志十一宗室王公傳九原封和碩英親王阿濟格原封和碩英親王阿濟格阿濟格太祖髙皇帝第十二子母曰大福金烏喇納蘭氏生子三長即阿濟格次睿王多爾衮次豫通親王多鐸並著勳烈有大名阿濟格初授台吉天命十年十一月隨貝勒蒙古爾泰等征察哈爾至農安塔林丹汗遁乃還十一年四月同台吉碩託征喀爾喀巴林部十月蒙古喀爾喀扎魯特背盟隨大貝勒代善等往聲其罪執巴克父子三人及拉什希布岱青多爾濟桑阿爾齋等十四貝勒又斬鄂爾寨圖貝勒盡俘其家口牲畜是年封貝勒天聰元年正月同二貝勒阿敏等征朝鮮克五城朝鮮屈服請和阿濟格在事有功五月從上征明同莽古爾泰等率偏師衛塔山運糧士卒遇明兵二萬擊敗之會大軍於錦州進薄寧逺城北明援兵千二百掘壕以車為營列火器以拒阿濟格同大兵擊殱之明總兵滿桂出寧逺東二里陳上欲進擊諸貝勒以距城近不可攻勸阻甚力惟阿濟格請從戰上因率以前進命侍衛諸將俱戴兜鍪馳衝敵敗明前隊騎兵追至城下大殪之諸貝勒愧憤不及胄馳進分擊步卒斬馘無算三年八月同貝勒濟爾喀朗等略明錦州寧逺焚其積聚俘獲三千十月上親統大兵伐明分三路進阿濟格同貝勒阿巴泰率左翼四旗及蒙古兵從龍井關入夜半克之黎明毁水關進明漢兒莊副將易愛洪山口恭將王遵臣聞炮來援擊斬之殱其衆進圍漢兒莊守將李豐降十一月大兵克洪山口至遵化州山海關總兵趙率教來援阿濟格率左翼兵擊敗之會上以數騎巡視遵化城垣遮擊其敗兵阿濟格追斬率教於陳並戮其所屬副將以下官遂進逼京城明寧逺巡撫袁崇煥錦州總兵祖大夀來援屯廣渠門外上命阿濟格同莽古爾泰等率兵迎擊追殺至城壕阿濟格馬被創死始還十二月同阿巴泰等往略通州焚其船進克張家灣尋與諸貝勒隨上往視薊州形勢明山海關兵五千來援距薊州二里許與我兵遇不及入城遂列營相拒同諸貝勒等突入敵營殱之阿濟格乘馬又被創死四年二月大兵凱旋途遇敵兵踞山築壘阿濟格同衆貝勒破之斬級六十獲馬八五年八月大兵將征明阿濟格奉命同貝勒德格類嶽託率二萬人由義州進大凌河與大軍會夜圍錦州敵兵六千襲攻阿濟格營時大霧人覿靣不相識及敵將至忽有青氣自天下衝敵營霧中開如門於是阿濟格嶽託列陳進頃之霧霽急擊敵兵敗之追殺至錦州城生擒逰擊一獲甲械及馬匹各二百旗纛十五上幸阿濟格營親勞酌金巵賜之上以阿濟格及碩託等每戰必衝鋒陷陳諭之曰爾等勿以敵寡而輕戰恐其出城誘我墮彼計中也如敵兵大至則遣人來報朕當親往覘視以圖迎擊如敵衆前來下營可令厮卒預備裝載為旋軍狀以觀其動靜敵退則聽之如彼乘夜劫營即令厮卒避於僻地選精兵馳擊如敵營結定則移此處火炮擊之如值夜深臨卧我軍當時加瞭望以偵敵形尋聞明增兵來援命額駙揚古利率八旗護軍之半往益阿濟格軍時明錦州兵七千逐我偵敵者於小凌河岸突近御前護衛兵不滿二百上擐甲渡河直入敵陳敗之阿濟格繼至敵復出步軍列城壕外騎兵翼其後阿濟格奮擊之敵望風遁破其步軍斬副將一擒把總一於是上以所統兵留付阿濟格明監軍道張春等復以兵四萬援錦州我師迎擊於大凌河截殺者過半逐北逾一舍六年五月從上征察哈爾林丹汗遁阿濟格統左翼及蒙古兵略宣府大同明兵懼盡獻張家口所貯犒邊財物七月師旋七年三月命築通逺保城以兵駐守五月迎明降將孔有德等立營江岸明兵及朝鮮兵皆不敢追有德等輜重得畢至八月統兵略山海關俘獲甚衆八年五月從上征明自巴顔珠爾克入龍門口遇明兵敗之進攻龍門未下趨保安州克之斬其守備一謁上於應州獻所獲八月拔靈邱斬其知縣守備各一師還崇德元年敘功晉封多羅武英郡王五月命同阿巴泰征明入邊連破雕鶚保長安嶺保薄延慶州先後克定興安肅容城安州雄縣東安文安寶坻順義昌平遇敵五十六戰皆捷俘獲人口牲畜共十七萬九千八百有竒擒總兵曹丕昌等又遣都統談泰等設伏斬遵化三屯營守將殱其探卒我師方出關明兵二百躡我後還擊殱之捷聞得嘉奬賜鞍馬一馬三九月凱旋駕出盛京地載門十里迎勞之告祭畢行抱見禮上見王逺征勞瘠為之惻然命坐御座側設宴以金巵酌酒親賜之十二月上親征朝鮮命阿濟格駐防牛莊二年三月以貝子碩託等攻明皮島久未下命引兵千往助攻四月至軍夜遣都統薩穆什哈督護軍兵前進續遣都統阿山葉臣率鋭卒乘小舟疾攻西北隅兵部承政車爾格統八旗驍騎及漢軍朝鮮兵乘巨艦逼其城都統石廷柱户部承政馬福塔從北隅督戰遂克其島斬守島總兵沈世奎及諸路來援者俘人口三千四百有竒獲大船七十炮十資畜無算上遣使賫諭褒嘉十二月遣軍自牛莊入白土場遇明兵七百造飯清河岸􅊳擊敗之四年二月從上征明率師至大凌河東揚言以紅衣炮攻臺守卒咸懼四里屯張剛屯寶林寺旺民屯于家屯成化峪道爾彰等俱下尋率四旗護軍還守塔山連山俘人馬千計四月班師九月略錦州寧逺界六年三月同鄭親王濟爾哈朗圍錦州立營掘壕為久困計城中蒙古台吉吳巴什等密遣人議降為總兵祖大夀所覺日薄暮整兵出城外接戰阿濟格夜至城下助蒙古台吉等擊之明兵敗入城乃徙蒙古及明兵降者於義州事詳鄭獻親王傳四月明援兵自杏山詣松山阿濟格與鄭親王分統左右翼兵設伏阿濟格伏松山北嶺令前鋒兵誘敵我伏兵齊起前鋒兵返擊之右翼伏兵躡其後大敗之斬級百七十獲馬百餘甲七十六月關內援兵又自松山城沿海進阿濟格率左翼兵從松山西襲擊至松山城壕敗之獲馬五十餘七月上以阿濟格克敵奏捷賜白金四千八月明洪承疇率兵十三萬來援錦州上親征大軍營松山明兵潰遁阿濟格等追至塔山還獲其筆架山積粟十二堆復率兵往塔山邀擊明兵之敗逃者斬馘無算又同睿親王多爾衮以炮克敵臺四生擒副將王希賢參將崔定國都司楊重鎮等搜𠞰三日總兵吳三桂王朴奔杏山僅以身免時錦州松山杏山髙橋各路兵猶固守不下九月駕還盛京阿濟格與諸王貝勒分兵困之十一月承疇夜出松山兵六千犯我營我兵沿壕射之敵返走松山城閉不得入收降其衆二千餘敵從杏山夜遁者多為伏兵所殺三桂等走寧逺七年二月遣前鋒統領鄂莫克圖等略寧逺遣護衛及親軍䇿應誘殺三桂等所遣追兵六百三月三桂等復率兵四千駐塔山分兵至高橋與我哨卒接戰阿濟格遣前鋒兵濟之敵不戰而退我兵追至連山斬三十人生擒百户一師逾寧逺城西十里審視運糧海道明兵出城犯又敗之斬九十餘級獲馬十三四月凱旋八年九月復同鄭親王濟爾哈朗統兵征寧逺軍城北填壕塹布雲梯以紅衣炮急攻之城頽敵不支奔潰隳其城斬逰擊吳良弼都司王國安等二十餘員直抵前屯衛周視戰壘立營柵移炮星夜攻陷其城斬總兵李輔明袁尚仁等三十餘員兵四千餘明中前所總兵黃色棄城遁我兵追襲之復拔中前所順治元年四月同睿親王多爾衮入山海關破走流賊平定燕京有功十月册封和碩英親王旋命為靖逺大將軍統兵由邊外入陜西征流寇二年二月入邊沿途剿賊八戰皆捷陜西屬城攻克者四投降者三十八時流賊李自成親帥賊兵十三萬并湖廣襄陽承天荆州德安四府所屬各州縣原設守禦賊兵七萬聲言欲取南京水陸並進我兵亦分水陸兩路躡其後追及於鄧州承天德安武昌富池口桑家口九江等處降者撫之拒者誅之窮追至賊老營連破之賊兵竄入九公山自成僅以步卒二十人遁俘其偽趙侯偽襄南侯偽總兵左光先偽軍師宋獻䇿等斬其兩叔父及偽汝侯劉宗敏於軍是役也凡十有三戰皆大捷故明寧南侯左良玉子夢庚執總督袁繼咸守道李猶龍巡撫黃澍率總兵十二馬步兵十萬舟十萬詣軍門降計所下河南屬城十二湖廣屬城三十九江西屬城六南京屬城六皆設官撫定閏六月捷聞上祭告郊廟社稷諭嘉其運籌決勝懋著勳庸仍遣侍臣赴軍中慰勞又諭曰王克奏膚勳不勝喜悅念王及行間將士馳驅跋涉懸崖峻嶺深江大河萬有餘里可謂勞苦而功高矣寇氛既靖宜即班師其招撫餘兵應留充軍伍或散歸田里王與諸大臣商榷行之八月師旋方自成遁時王誤以死聞又不候旨班師攝政王多爾衮傳語以王等有罪不遣迎但於午門候齊歸第復議前出師時脅宣府巡撫李鑑釋逮問赤城道朱夀錅又擅取鄂爾多斯土默特馬降郡王尋復之五年七月命統兵剿天津曹縣兩處土寇平之十一月喀爾喀二楚呼爾行獵近我邊界命出駐大同十二月大同總兵薑瓖聞大兵將至疑襲已據城叛總督耿焞奔陽和附近十二城叛應賊兵四出攻城邑阿濟格聞變星馳往圍大同城事聞特命阿濟格為平西大將軍率都統巴顔等會征薑瓖六年正月賊黨劉遷攻代州據外郛章京愛松古逰擊高得勝併蒙古兵俱被困遣端重郡王博洛等往援大破之斬賊渠郭芳遷遁去三月攝政王至大同會王兩福晉卒攝政王諭其先歸王啓云豫不希富貴但丈夫重名譽欲佐命效力流芳史册耳顧以妻死棄大事而歸乎卒不行四月復左衛六月啓攝政王曰輔政德豫親王子功小不當優異鄭親王乃叔父之子不當稱叔王當以已為叔王攝政王乃數其妄思越分及私除職官等罪衆議削其爵攝政王以其恃親冒請免罪令勿預部務及交接漢官八月阿濟格復同貝子鞏阿岱統兵征大同九月偽總兵楊振威斬薑瓖并其兄琳弟有光詣軍門降大兵入城誅從逆吏民隳大同城睥睨五尺班師還八年正月攝政王多爾衮薨於喀喇河屯王赴喪次即急歸夜又不至而私召其子勞親上迎喪王又不去佩刀攝政王近侍額克親吳拜等發其計圖攝政鄭親王等即於路監守之至京議削爵幽禁降子勞親貝子革所管佐領閏二月復議移繫别室籍其家子勞親等黜宗室十月監者告其欲於獄中舉火衆議當正法得旨賜自盡爵除乾隆四十三年正月諭曰朕覽實録載英親王阿濟格秉心不純往追流賊誑報已死又擅至沿邊索馬且向巡撫囑託公事過迹昭著雖前此亦有微功不足以抵其罪黜爵實由自取至其子孫前此降為庶人削其宗籍皇祖御極之初曾加恩將其次子傅勒赫復還宗支追封公爵遞襲其餘諸子仍除籍嗣於康熙五十二年復蒙恩將第三子伯爾遜第八子佟塞第十子鄂拜第十一子班進泰各支賜給紅帶子附入玉牒今思傅勒赫一支既已作為宗室襲爵其有後之伯爾遜各支及無後之和度等同係英親王子孫似無庸復為區别因推廣皇祖恩意著交宗人府一體查明復還黃帶子列入宗譜其恩封公爵遞襲世次詳玉牒欽定八旗通志卷一百三十一
