body:
  text: 欽定四庫全書欽定八旗通志卷一百八十五人物志六十五大臣傳五十一䝉古正黄旗下頼徳參濟旺哩阿頼巴都爾莽奈洛阿南達噶勒阿喇納舒明薩喇勒巴爾濟爾徳參濟旺徳參濟旺䝉古正黄旗人姓博爾濟吉特世居阿布罕地方初為察哈爾大臣察哈爾林丹汗不道天聰六年上統師徃征林丹汗棄故業渡黄河西遁八年復征之林丹汗殁于大草灘察哈爾亡徳參濟旺偕噶爾瑪濟農多呢庫魯克多爾濟達爾罕諾顔等携衆六千及家屬來歸召宴于客琫御營徳參濟旺率諸臣跪獻酒諭曰朕本不飲酒念爾新附諸臣誠意當飲盡一巵復酌酒親賜之並賚甲胄衣裘授一等子九年六月察哈爾索木諾台吉率本部内附上宴來歸者並賜徳參濟旺飲諭曰察哈爾國之傾覆爾諸臣之來歸朕皆豫知徳參濟旺奏曰聖諭及此洵有如神之鑒也順治二年以誣告沙濟降為三等子三年五月蘇尼特部長騰機思與其弟騰機特等叛奔喀爾喀徳參濟旺隨豫親王多鐸追勦至諤特克山喀爾喀土謝圖汗車臣汗各遣兵數萬兩路迎戰我師奮擊大敗之先後斬級俘獲甚衆八月㨗聞詔下所司察叙九月復徳參濟旺一等子世職五年八月卒子哈爾瑪襲洛哩弟沙哩岱洛哩姓鄂爾沁初為察哈爾林丹汗䕶衛天聰六年太宗文皇帝親統大軍征察哈爾林丹汗驚懼率部衆西渡黄河自竄土黙特部尋竄唐古特部而殁洛哩携元初帕斯巴喇嘛所鑄嘛哈噶拉金佛並率百餘人來歸𨽻蒙古正黄旗予一等輕車都尉世職崇徳三年隨貝勒岳託征明由墻子嶺毁邉墻入擊敗明總督呉阿衡自宻雲迎戰兵六年隨大軍圍明錦州敵衆出城拒戰我左翼三旗䕶軍擊之失利退入壕内敵衆環逼洛哩汛地洛哩奮力拒戰殁于陣賜䘏晋三等男以其兄沙濟襲洛哩有弟二一烏班和碩齊一沙哩岱烏班和碩齊亦于林丹汗殁時自察哈爾率七十人來歸予三等輕車都尉世職既卒沙哩岱襲沙哩岱初任佐領世祖章皇帝順治元年隨睿親王多爾衮入山海闗以歩戰撃敗流賊李自成三年隨豫親王多鐸征蘇尼特部騰機斯撃敗土謝圖及碩雷兩汗兵叙功晋二等輕車都尉十五年沙濟卒沙哩岱併襲三等男合為二等子世襲罔替尋授散秩大臣十八年十二月聖祖仁皇帝即位加恩諸大臣之舊自察哈爾来歸者沙哩岱與内大臣噶爾瑪㪚秩大臣札木素等並賜莊田奴僕康熙九年卒以其從弟之子達爾札襲阿頼阿頼姓莽努特世居喀爾喀部太宗文皇帝時挈家屬來歸𨽻正黄旗䝉古甞奉使阿嚕部招降部長數人率衆俱至上嘉其能賜號達爾漢優免賦役既而降人復有叛去者外藩䝉古諸貝勒追之不及阿頼率兵五百窮追數月斬倡叛者四人盡俘逃衆以還又率兵征喀木尼喀部擒其部長葉雷獲户口牲畜無算崇徳元年叙功授一等輕車都尉兼一雲騎尉世職加賜號曰庫魯克達爾漢三年授禮部右恭政四年擢正黄旗䝉古都統六年大軍圍明錦州明總督洪承疇自松山赴援上親統師征之阿頼受方畧設伏杏山路側邀擊敵衆斬殪無算尋攻松山城承疇以衆迎戰阿頼率兵沿濠擊敵射殪數人大軍並進敵退入城不得收降二千餘衆順治元年同都統葉臣等招撫山西郡邑凱旋賜白金三百兩三年隨豫親王多鐸征叛逃蒙古騰機思等將追及賊衆還戰阿頼先率兵繞出其後俟賊潰遁截擊擒斬甚衆五年同尚書宗室務達海領兵駐防漢中六年正月叛鎮姜瓖黨姚舉等䧟忻州阿頼移兵赴援破賊石嶺闗進復忻州追勦賊黨屢戰皆㨗賊平班師三遇恩詔晋世職為二等男九年十月命領兵駐防西安尋還京以老疾觧都統任康熙十二年諭奬久著勞績諸大臣加阿頼太子大保十七年卒賜祭葬如典禮謚襄武立碑墓道以其弟之孫髙良襲世職巴頼都爾莽奈子哈岱巴頼都爾莽奈䝉古察哈爾人姓烏彌初為察哈爾大臣林丹汗敗奔唐古特巴頼都爾莽奈率二百餘户駐哈屯河踰一載來歸𨽻䝉古正黄旗崇徳元年授一等男三年隨貝勒岳託征明敗明總兵呉國鎮及内監馮永盛兵敵犯前鋒統領席特庫營率衆擊却之明年隨大兵攻寧逺城中騎兵出戰迎擊破之六年從征錦州敗洪承疇兵于松山杏山間敵屢犯鑲紅旗營擊之俱潰是年掘壕圍錦州城城内兵突出奮勇逆戰中流矢殁于陣卹贈三等子越明年以其子哈岱襲爵哈岱年十七隨父撃寜逺兵敵射巴頼都爾莽奈馬斃哈岱不及甲胄馳入陣以所乘馬掖其父騰上歩從擊敵偕還上聞而嘉之賚子甚厚既襲爵從大兵征明敗敵兵于宻雲進攻易州順徳克之遂畧地至山東臨清世祖章皇帝順治元年哈岱隨睿親王多爾衮入山海闗撃敗流賊李自成二年大兵既定江南哈岱隨貝勒博洛征浙江敗敵於海寜縣進攻杭州大破敵兵師還得優賚三年隨豫親王多鐸征蘓尼特部騰機思敗土謝圖及碩雷兩汗兵四年晉二等子六年隨英親王阿濟格征大同叛鎮姜瓖賊出犯正黄鑲黄兩旗汛哈岱率所屬兵擊却之又與都統鰲拜從濠内撃其後隊有斬獲九年恩詔予世襲十二年隨定海大將軍伊爾徳征舟山海賊十三年師次定海縣偽總兵陳六御偽伯阮思于海島列戰艦以待哈岱同䕶軍叅領桓達理率兵進攻賊衆敗北追至衡水洋口連斬賊渠俘其餘黨舟山平十四年晉一等子康熙十四年聖祖仁皇帝命為内大臣明年以討逆藩呉三桂奉命同侍衛阿喇尼徃喀喇沁翁牛特蘇尼特諸部察閲兵馬調駐大同河南兖州等府事竣還朝十九年以疾卒年六十有三賜祭葬謚勤壯立碑墓道孫阿喇納襲雍正元年世宗憲皇帝追念巴頼都爾莽奈功詔祀昭忠祠阿南達阿南達蒙古正黄旗人姓烏彌三等子巴賚都爾莽奈之孫内大臣哈岱之次子也初任侍衛由三等洊擢一等康熙八年輔政大臣鰲拜獲罪拘禁王大臣等以阿南達素與黨附請革任擬立斬籍没得㫖寛免仍任一等侍衛尋兼佐領二十七年噶爾丹侵掠喀爾喀阿南達奉命偕喇嘛商南多爾濟齎敇往諭以休兵和好噶爾丹旋遣使入朝而肆掠如故二十九年二月上命阿南達往㑹喀爾喀都部兵進勦噶爾丹三月以尚書阿喇尼代之阿南達還奏噶爾丹為托多額爾徳尼擊敗窮蹙奔竄至有兩人共一騎及削木為仗者請發滿洲勁旅乘機往勦上命選察哈爾兵六百阿南達率之赴圖拉策應西路都統額赫訥軍五月阿喇尼奏請移西路軍㑹勦阿南達率兵北渡瀚海㑹命裕親王福全為撫逺大將軍阿南達以兵㑹之八月敗噶爾丹于烏蘭布通三十一年奉命赴寜夏招和碩特部台吉巴圖爾額爾克濟農來降是年十一月擢正黄旗蒙古副都統三十二年二月上聞噶爾丹將取粮哈宻敕郎坦為昭武將軍偹兵寜夏以阿南達屢至邉境偵悉敵情命與前鋒統領碩岱同往駐防明年召還三十五年二月上親征噶爾丹以撫逺大將軍費揚古率師出西路命阿南達往喀爾喀諸扎薩克旗分選熟識路徑者二十人為嚮導五月上由中路進征至克嚕倫河噶爾丹望見御營大驚奔竄阿南達同費揚古由圖拉進趨昭莫多聞噶爾丹遁歸特哷勒濟費揚古令阿南達同前鋒統領碩岱副都統阿迪等率兵先往挑戰佯郤誘賊至昭莫多大軍合擊敗賊追逐三十里擒斬無算噶爾丹引數騎逺竄阿南達赴行在奏捷召詢交戰情形阿南達具述其詳復奏言陣獲厄魯特人皆云噶爾丹乍聞哨卒報稱皇上親征猶不信謂必遣将前來無足懼後有彼所親信人由大軍縱歸具言親征果真軍威難敵乃惶懼䑕竄屬下人多怨懟者噶爾丹亦深以為悔上曰此畨師出即奏膚功皆上天眷佑也乃班師命阿南逹駐守肅州七月詔移兵邊境偵噶爾丹聲息相機𠞰撫阿南逹尋疏言昆都倫額濟内諸處各遣官率兵分駐哨探臣親率巴圖爾額爾克濟農之兵復與提督李林隆商議増發緑旗兵携子母礟位赴布隆吉爾相度要隘分置䇿應乃還肅州上以所奏示議政諸臣曰阿南逹處處偹兵朕甚嘉之噶爾丹之自昭莫多敗竄也其部衆多離㪚噶爾丹多爾濟者其妻弟也勢窮蹙持兩端阿南達至布隆吉爾擒其哨卒拜格遣歸招降噶爾丹多爾濟遂遣使通欵阿南達因其使檄諭哈宻回人曰聞逃來人言噶爾丹窮困所屬不及千人無口粮無冬衣倘來投汝地汝即擒之令噶爾丹多爾濟助汝汝勿疑又傳語噶爾丹多爾濟曰哈宻若有噶爾丹聲息報汝汝即遣人來報一面往助哈宻協力而行十一月阿南達復往布隆吉爾噶爾丹遣其族姪固䝉多爾濟等與達頼喇嘛青海諸台吉通問阿南達偵知率兵追及于素爾河擒固䝉多爾濟等百餘人至肅州并以賊書十四函呈奏三十六年正月哈宻回人擒噶爾丹之子色卜騰巴勒珠爾等獻軍前阿南達械送至京閏三月疏言厄魯特晉巴徹爾貝來降訊知噶爾丹窮蹙臣請竭力進征殱滅醜族上命阿南逹與李林隆率甘州兵二千進勦軍至塔爾河聞噶爾丹已死其屬下台吉丹濟拉將由巴里坤竄依䇿妄阿喇布坦阿南達率兵追之旋奉詔還駐布隆吉爾以待丹濟拉來歸九月丹濟拉詣哈宻乞降阿南達遣人䕶送入覲是年叙昭莫多軍功予雲騎尉世職尋奉詔率兵駐西寕四十年六月卒於西寕予祭葬如典禮以次子阿敏多斡襲職雍正三年從其長子巴里坤副將軍阿喇納請追賜謚恪敏阿喇納阿喇納蒙古正黄旗人姓烏彌副都統阿南逹長子康熙十九年襲其祖哈岱一等子爵二十七年授三等侍衛洊遷一等侍衛五十年任上都達布遜諾爾牧厰總管五十三年授散秩大臣五十五年十月聖祖仁皇帝命往巴里坤㕘贊軍務諭令揀選八旗察哈爾勁卒並曽隨阿南達出兵舊人共四百名率之以行㑹駐阿爾台㪚秩大臣祁里德奏請進勦䇿妄阿喇布坦詔阿喇納先往祁里徳軍前㑹同喀爾喀王貝勒貝子公等詳議進兵事宜再赴巴里坤五十六年七月靖逆將軍富寜安由巴里坤分兵三道進勦阿喇納領首隊兵選五百人潜行襲賊邉界至烏蘭烏蘇擒哨賊二人用為嚮導進兵至烏嚕木齊乃還五十八年七月率兵四千與將軍富寜安分道擊賊邉境至齊克塔木擊破賊營擒斬二十人餘悉降之進次闢展回衆據城守我師奮擊擒一人縱之歸令傳諭城中曰師行討逆非襲擊若等若速歸順赦勿誅否者破城悔無及矣回衆三百餘人皆降遂入吐魯畨酋目沙克扎珀爾等悉衆降附㑹富寜安軍于烏蘭烏蘇凱旋六十年六月吐魯畨回人托克托瑪木特等以萬餘人駐魯克齊木擊敗凖噶爾兵乞内附阿喇納奉詔率兵二千往駐吐魯畨收撫其衆九月奏請于初冬雨雪時乘賊無備進兵襲擊尋以冬寒不宜深入諭令偵賊情形就近襲擊是月賊人来犯阿喇納遣侍衛克什圖迎擊而自率兵䇿應戰甫接阿喇納至分所率兵為三衝擊賊陣賊不能禦敗入林中舍騎歩戰中鎗礟多斃賊大創盡棄軍械馬匹遁我兵追捕數十里擒斬百餘人㨗聞授副將軍仍駐吐魯畨六十一年正月詔議進兵勦賊機宜二月奏言賊進退雖熟踪跡甚輕火器雖多鉛藥甚少我軍慮周而器偹勝賊者一賊恃鎗㦸少弓箭我軍鋒銛弓勁勝賊者二賊衆臨陣易敗惟伺隙刧掠我軍部伍整肅無間可乘勝賊者三賊以乘夜盗馬為得計我軍有偹賊不得入勝賊者四賊侵我邉外曠地逰牧自謂便易我軍一至賊顧戀妻子牲畜不能一心迎戰勝賊者五以勁旅直搗伊犁不難掃蕩巢穴惟賊徑甚多處處可以通我駐兵後路賊來一夕可至若逺設汛界被賊攔截輙至消息阻隔即今所種吐魯畨地畆亦湏防踐擾請將巴里坤阿爾台兩路大兵移駐烏嚕木齊臣等移駐附近吐魯畨險要之地彼此接應既可守䕶屯田亦可斷賊人潜襲之路其進勦大兵宜分三路阿爾台兵由科布多沿河越額爾齊斯河進發巴里坤兵由烏嚕木齊進發吐魯畨兵由阿勒輝口越那喇特嶺進發賊三路來迎則勢分易敗若一路拒戰則我以一軍奮擊趣兩軍直抵其妻子屯駐之地彼必不能兼顧賊所恃為險要者三嶺然歩行可上非若棧道之難也所恃以資生者羊牛乳酪然乆駐則水草無多牲畜易竭勢必離㪚請及時聚粮練兵相機勦滅疏下議政大臣尋議阿喇納陳奏詳明能得肯綮我兵屯墾之地防賊潜犯宜令酌留馬兵捍禦擒勦惟阿爾台至烏嚕木齊沙漠間阻二千餘里往返較遲今賊已竄匿伊犁稍緩則其黨自相疑貮然後統兵進取為便世宗憲皇帝雍正元年七月疏言察喀爾兵久在行間遇軍營䕶軍校驍騎校補用但軍中出缺甚少較之未甞効力及軍中撤還之人陞補較遲未為平允請下部酌議諭議政大臣曰自進剿䇿妄阿喇布坦已經八載凡出征之京營八旗及盛京黒龍江寜古塔西安右衛滿洲緑旗䝉古察哈爾官兵有乆在行間即應陞用者嗣後令諸路將軍詳加揀選將應陞名冊咨送各旗都統䕶軍統領及督撫提鎮遇有缺出即行題補并令揀員署理俟補授之員陞轉時即以署員請補則行間既獲陞遷之路即各營才力可用者亦無慮致嘆積薪其交兵部通諭中外知之九月授阿喇納鑲紅旗䝉古都統仍留駐吐魯畨十月進征青海羅卜藏丹津允撫逺大將軍年羮堯請命阿喇納率滿洲蒙古緑旗兵二千駐防布隆吉爾二年三月賊酋阿喇布坦蘇巴泰刼我邉境阿喇納遣總兵孫繼宗等率兵擊之追奔至推黙爾賊兵拒戰大敗之賊竄還獲牲畜器械甚衆七月卒于布隆吉爾遺疏為其父阿南達請謚部議以副都統例不予謚格之特㫖如所請行又諭曰副將軍阿喇納駐軍布隆吉爾宣力有年患病溘逝朕深為軫惻加恩于一等子爵外賞給騎都尉世職許其子并襲于甘肅藩庫内給銀一千兩交與阿喇納之弟凖扎布送櫬回京十一月䘮還命八旗䝉古大臣出城迎奠予祭葬如典禮謚僖恪以其子伍米泰襲世爵為三等伯十年九月禮部以應入賢良祠諸臣列奏上諭曰阿喇納恪謹持躬忠誠奉職前者西陲用兵宣力年乆收復吐魯畨平定青海俱有勞績其應否入祀九卿㑹議尋入祀賢良祠乾隆十五年加伯號曰誠毅舒明舒明䝉古正黄旗人姓烏梁海濟勒莫特由二等侍衛擢頭等侍衛乾隆九年授綏逺城副都統十年調右衛副都統十五年命辦理青海事務十八年授正白旗滿洲副都統十九年八月授都察院左副都御史十月兼正黄旗䕶軍統領二十年正月赴北路軍營管理輝特台吉等㳺牧十月授吏部侍郎十一月奏言輝特台吉達瑪林率属六十餘户來尋妻父都爾伯特汗䇿凌請將其属人編入佐領與䇿凌同居游牧並封授職銜上允所請授達瑪林扎薩克台吉十二月以䇿凌等告稱生計稍艱請移至額克阿喇勒游牧得㫖如所請行二十一年二月偵降酋訥黙庫戕臺站侍衛謀携㳺牧叛馳奏勅㕘賛大臣阿蘭泰速往擒阿蘭泰奏請調兵防䕶並遣詢訥黙庫同部台吉䇿凌諭責其紛紛𣲖兵虞洩漏三月訥黙庫就擒上以舒明籌辦妥協阿蘭泰推諉㡬至遲誤命革阿蘭泰男爵給舒明以示鼔勵詳見阿蘭泰傳四月遵㫖偕阿蘭泰編達什達瓦属為三旗移阿勒台五月奏請調扎布堪駐劄兵五百交侍衛三都卜領駐布延圖從之六月奏噶雜特宰桑根敦為烏梁海所掠率所属九十餘户投誠得㫖根敦著授為佐領暫與丹畢游牧同居又奏䇿凌烏巴什巴圖博羅特及達瑪林等属人生計艱窘請賑諭賞米六百石分給接濟尋奏都爾伯特台吉烏巴什同伯什阿噶什投誠得㫖伯什阿噶什已封親王烏巴什亦著封為貝子在額爾齊斯等處㳺牧俟明年入覲七月奏内閣侍讀學士富森帯達什達瓦属七千五百餘人于六月至阿拉克綽爾知㑹臣等指定安挿地方查和通鄂博布拉罕蔡罕托輝等處係扎哈沁舊㳺牧地寛水草充足已遣主事巴杭阿迎富森等至彼定界安挿報聞先是舒明奉㫖查和托輝特青滚雜卜叛迹至是奏叛迹已著命㑹同親王成衮扎布等擒拏八月授恭替大臣尋奏青滚雜卜現居㳺牧其属移唐努山得㫖唐努山距新烏梁海甚近著舒明選𣲖侍衛數員同桑寨多爾濟䕶衛都喇勒遣往新烏梁海曉諭總管赤倫帯兵協擒九月奏伯什阿噶什烏巴什等属人請暫留居哈達青吉勒得㫖前命安挿伯什阿噶什属人于額克阿喇勒地方自哈達青吉勒移至彼處程途既逺且時届嚴寒行走稍艱箸即照舒明所奏辦理尋諭曰據成衮扎布奏請𣲖科卜多兵二百名交舒明前往協擒青滚雜卜著即帯領前往科卜多駐剳兵丁尚多並著再𣲖三百名令侍衛巴寜阿勤泰㑹同舒明前往十月奏言前經成衮扎布遣察哈爾營總圖炳喀爾喀䕶衛齊納圖往烏梁海途中獲青滚雜卜遣往烏梁海之伯爾格等三人臣等訊問據供青滚雜卜遣赴公丹拜貝子彭楚克處調兵八百名俱不聽且挐送前來等語隨委員觧赴成衮扎布軍營得㫖伯爾格等現在解送成衮扎布軍營著嚴訊正法新舊烏梁海等並無一人附和青滚雜卜聽其調遣大兵一到即可擒獲著成衮扎布即速領兵前進勿少遲疑十二月命同成衮扎布在烏里雅蘇台軍營辦事二十二年授理藩院侍郎二十三年三月諭來京署理正白旗䝉古副都統五月以成衮扎布奏請令舒明帯左副將軍印回烏里雅蘇台辦事九月奏稱俄羅斯界所設阿噶爾等卡倫為和托輝特之烏梁海等賊奪馬駝傷兵丁巳𣲖喀爾喀台吉達瑪林扎卜等同和托輝特扎薩克達什朋楚克協擒得㫖著𫝊諭成衮扎布于北路索倫兵内酌量帶領進剿或即于喀爾喀𣲖老成歴練之人以所部兵丁追獲渠魁正法示衆不可致令漏網二十五年三月授歸化城都統九月命暫暑綏逺城將軍印務二十六年十一月授綏逺城將軍兼署歸化城都統十二月陛見二十七年正月卒子雅滿泰襲三等男官正白旗䝉古副都統命往西藏辦事五十三年廓爾喀擾後藏界雅滿泰措置乖方詔革職給筆帖式五十五年三月授頭等侍衛五月命協辦西藏事務五十六年九月以廓爾喀復擾藏界詔革職枷責薩喇勒薩喇勒厄魯特人初為凖噶爾台吉達什達瓦宰桑乾隆十五年凖噶爾内亂薩喇勒率属四十七户投誠詔安置察哈爾𨽻䝉古正黄旗尋授散秩大臣十七年凖噶爾台吉喇嘛達爾扎請遣薩喇勒還上不許十八年命授北路軍營叅賛大臣十九年正月率兵五百擒擅入卡倫之烏梁海得木齊扎木恭等于科布多諭曰薩喇勒感戴朕恩遵奉指示無忝任使甚属可嘉著加恩補授内大臣尋命收烏梁海衆當薩喇勒擒扎木恭時釋還收凌朔岱訥庫勒等十人至是告稱宰桑雅爾都得木齊阿茂海欲來歸乞駐牧烏蘭固木克木克木齊克薩喇勒飭其親至許駐特斯河不則駐之阿爾台山之外並請發厄魯特兵聽調尚書舒嚇徳以為未便諭曰薩喇勒辦理招諭驅逐烏梁海事宜頗属奮勉軍營將軍大臣等劄付不合機宜薩喇勒未免掣肘新降杜爾伯特車凌之人即調遣亦無不可但㳺牧未定或致逃竄于事無益著舒赫徳㑹同薩喇勒車凌等議將伊属下最可信任之塞卜騰等台吉宰桑酌𣲖數員領兵一二百名再令御前侍衛永柱㑹同總管阿敏道揀𣲖察哈爾八旗兵五百名帯領交與薩喇勒為招諭驅逐之用薩喇勒係熟悉此路之人相機行事務期迅速成功不必照將軍大臣等所飭固執而行三月薩喇勒兵至卓克索烏梁海宰桑雅爾都車根赤倫察達克圖布慎瑪濟岱各鄂拓克竄徙阿爾台山外薩喇勒奏烏梁海等已逺遁但貪戀故土必仍回牧彼時整兵速出易于收服請暫撤兵還允之是月命薩喇勒來京靣領諭㫖再赴軍營六月諭曰今年春薩喇勒等帯兵驅逐凖噶爾之烏梁海等俱已逺避我兵既撤伊等或潜回原處明年大兵進勦凖噶爾倘伊等暗送信與凖夷或乘間肆竊俱有闗係應即遣兵先為辦理薩喇勒等到軍營時著公同酌辦七月輝特台吉阿睦爾撒納來降命薩喇勒迎勞頒賞九月偕喀爾喀貝子車木楚克扎布等率兵千八百擊前竄徙之雅爾都車根赤倫察達克四宰桑于察罕烏蘇薩喇勒先得勝獲馬牛羊無算先是有扎哈沁宰桑庫克新禡木特者犯卡倫追之弗獲達青阿誘執之上罪其不武令縱之去禡木特移牧布拉罕察罕托輝不即降道遇通禡木特被擒縶之諾海克卜特爾薩喇勒偵知之十月由烏蘭山後掩擒通瑪木特並獲庫克新禡木特送軍營安置其户畜于庫卜克爾克勒事聞諭曰薩喇勒遇事奮勉此次首先進取克成此功著賞給世襲子爵補授正白旗領侍衛内大臣時定議征達瓦齊命薩喇勒為定邉右副將軍二十年正月詔領哨探兵同叅賛大臣鄂容安等由西路進征諭鄂容安曰新厄魯特進兵時肆行搶掠北路將軍班第業經奏聞朕已曉諭定邉左副將軍阿睦爾撤納等西路哨探兵前進亦宜禁止薩喇勒之兄現在彼處如給伊㣲物及伊属下略為饋遺可無深䆒若過分貪掠鄂容安即以已意提撕薩喇勒一經指示自當歛戢鄂容安其審擇輕重留心辦理又諭薩喇勒曰阿睦爾撤納以托忒字奏請將伊游牧移居烏里雅蘇台等處朕以事属可行已准其請惟奏請印文招降伊輝特属人一事是欲其取多人占據地方之意已經㣲露似平定凖噶爾專偽伊一人集事矣薩喇勒到彼務湏留心防範慎勿任其所行然亦不可稍為洩漏此時進兵愈速愈妥薩喇勒其善體朕意二月薩喇勒等疏報扎哈沁得木齊巴哈曼集以三百餘户宰桑敦多克以千餘户來降隨宣敕諭令安居毋恐上奬其妥協命北路投誠人員照此辦理薩喇勒復遣侍衛瑚集圖賫敕諭達瓦齊同族台吉噶爾藏多爾濟尋率台吉諾海奇齊等三十餘人來降詔封為綽囉斯汗諭曰據薩喇勒奏凖噶爾大台吉噶爾藏多爾濟率衆投誠看來大功告成在指顧間不勝欣慰薩喇勒遵朕訓示動合機宜俟成功後加恩優叙先將朕所佩荷包賜予並賞給雙眼翎以示優奬又諭曰薩喇勒等奏帯領噶爾藏多爾濟投誠人等前進又羈留達瓦齊來使帯往進發辦理悉中機宜伊奏内有噶爾藏多爾濟心迹叵測之語朕思噶爾藏多爾濟雖不可深信既已投誠帯兵同進諒無意外之虞若防範太過恐伊反生貮心惟有示以大度黙化其疑懼之意而已三月薩喇勒疏言臣前奏請俟將軍永常到烏魯木齊將臣所領疲乏兵裁駐交伊統領為聲援増𣲖和託輝特等兵起程仍飭索倫兵殿後其餘各隊俱徐行息馬力以張聲威據阿睦爾撤納咨北路兵業經起程臣宻奉諭㫖令西北兩路哨探兵于博囉塔拉㑹合進勦毋令北路先發今若照臣原奏俟永常到起程必在北路之後臣等一面飛檄永常令督催和託輝特及索倫兵速進一面于寜夏凉州莊浪滿洲兵内揀選臕壯馬可至伊犁者𣲖兵四百令和起齊努渾帯領臣等同進發復商𣲖新降台吉噶爾藏多爾濟兵三百其姪扎那噶爾布兵六十噶勒雜特宰桑哈薩克錫喇兵五十輝特台吉巴雅爾等兵五十扎哈沁宰桑敦多克兵三百呼爾璊台吉納穆奇兵三百于三月二十七日自羅克倫啟行計程四月十五日可抵博囉搭拉合北路大軍四月疏言臣等領兵前進招撫各部人衆綽囉斯台吉衮布扎卜及弟三濟扎卜布庫努特台吉巴爾珠爾當扎木素呼爾璊台吉納木喀喇木錐阿巴噶斯哈丹得木濟普爾普及吐魯畨伯克莽阿里克等皆率属來降共四千餘户葉爾𦍑喀什噶爾和卓木獻玉盤一願為臣僕各令回原牧再新降輝特台吉巴雅爾等請給地耕牧臣等如所請令往吐魯畨莽阿里克處領取又將阿睦爾撤納属人二百餘及額林哈畢爾噶窮夷八百餘户俱附有牲畜之扎哈沁宰桑敦多克等属下給籽種令其耕牧臣等由羅克倫啟行噶爾藏多爾濟率姪扎那噶爾布隨營効力形迹尚無可疑且將軍永常現駐烏魯木齊而和託輝特台吉旺布多爾濟厄魯特公丹拜及索倫巴爾呼兵續進應援防範周宻彼亦不能乘隙覬覦臣等辦理諸事留數日此際達瓦齊想已得兩路進兵之信若不遣人招服恐其逺颺因繕檄曉諭利害飭侍衛塔奇圖及臣薩喇勒属前鋒䇿稜等由烏蘭烏蘓先往傳諭兩䟽入詔奬薩喇勒籌畫妥協以御用寳石朝珠賜之薩喇勒兵至額林哈畢爾噶察新降諸台吉宰桑有不願噶爾藏多爾濟為汗意疏請停頒諭㫖又言新降人編旗分佐領若按户清查恐致驚疑令各將所属户口開報即交伊等管束諭曰薩喇勒相機酌辦甚可嘉予著即傳諭玉保將朕所降封噶爾藏多爾濟為汗之㫖不必宣諭薩喇勒自進兵以來諸事奮勉又能詳察彼衆情形為此陳奏甚合機宜不特額林哈畢爾噶等處台吉宰桑情有不願倘凖噶爾全部誤認以噶爾藏多爾濟代達瓦齊為汗輾轉傳播闗係甚大今暫行停止不即宣諭則衆人俱無猜疑于進兵事宜大有禆益薩喇勒著賞銀一千兩即遣人送至伊㳺牧處以示鼓勵尋諭曰據薩喇勒奏領兵已過博羅布爾噶蘇台至登努勒台達瓦齊所属並無一人防守其伊犁附近之台吉宰桑喇嘛等已遣人前往招降所辦機宜悉協不勝欣慰至所奏功成後請停止伊犁駐兵一事薩喇勒等葢因凖噶爾近年以來生計窮蹙若多駐官兵恐不無勞費起見耳朕前此諭令駐兵原非欲令乆戍以現辦四衛拉特旗分佐領并五集賽各鄂拓克及哈薩克布魯特邉界一切事宜若不令大臣駐剳遇有應行查辦之事無所統率䆒属未協且既駐大臣不能不酌量駐兵備差遣著班第薩喇勒等至伊犁時㑹同妥議具奏是月薩喇勒等既抵登努勒台將軍班第等亦至尼楚衮兩路大軍合時達瓦齊居伊犁河西之格登懵不設備五月西路大軍由喀塔克渡口越克特滿嶺北路大軍由固勒扎渡口越推墨爾里克嶺直抵格登達瓦齊驚遁未㡬就擒伊犁平詔封薩喇勒一等公賜超勇號賞寳石頂四團龍服六月撤大軍還命阿睦爾撒納入覲薩喇勒同班第鄂容安駐守伊犁班第等奏准留察哈爾兵三百喀爾喀兵二百備差遣尋諭曰侍衛濟福回京奏稱薩喇勒聞知伊子信息惟以追擒達瓦齊為事並未遣人往尋等語薩喇勒出力奮勉不以私事廢公實能明曉大義朕心深為嘉予此時伊子玉魯斯諒已回至㳺牧著加恩授為三等侍衛此朕特加優眷傳諭薩喇勒知之七月班第奏薩喇勒與阿睦爾撤納皆私取達瓦齊牧畜什物彼此甚不協諭曰薩喇勒歸順已久受恩甚厚諒必不至有僣妄悖逆之事若因此等小節疑而不用何以收羣䇿之力即以掠取牲畜什物而論薩喇勒必不至如阿睦爾撒納之甚班第等惟當開誠相示據理阻止薩喇勒自必聽從是時阿睦爾撒納謀叛逗遛途中班第等屢疏入告薩喇勒亦以為言上宻諭諸臣擒治弗能决八月阿睦爾撒納叛遁逆黨克什木等作亂班第鄂容安被䧟死之薩喇勒為烏魯特宰桑納親哈什哈之子錫克錫爾格所羈不得歸十二月薩喇勒遣其兄布林等至巴里坤辦事大臣和起所告稱阿睦爾撒納現在愽羅塔拉道都託羅海薩喇勒商同伊犁台吉宰桑等由託和木圖往擊和起以聞諭曰薩喇勒駐劄伊犁倉猝遇賊為賊拘留自必愧恨然因兵少力弱中賊詭計被執今伊感念重恩㑹同伊犁衆台吉宰桑等分路領兵期獻逆賊是其誠心奮勉始終不渝朕聞之實深嘉予轉復為之惻然著將軍䇿楞傳㫖慰勞並將荷包鼻煙壺各一件俟薩喇勒至軍營時即行頒賜又諭曰薩喇勒原係厄魯特人叩闗投誠甫及五年隨圍出兵奔走幾無寜嵗前此命其同駐伊犁亦因伊熟彼地情形耳及阿睦爾撒納背叛生變班第鄂容安捐軀盡節而薩喇勒衝陣突出其後力窮被拘留所以不加深咎者誠以厄魯特風俗原不知致身大義未可以世受國恩之滿漢臣子相提並論初非朕之溺愛厄魯特而然也拘方之士或將謂三人同駐伊犁彼二臣臨危致命而伊乃靦顔就執其偷生負國斷難姑容如此則是以祖父世臣受恩深重明于大義者為比未免過于求全責備而其視薩喇勒為過髙矣夫責人易而當局難平居議論誰則不能獨不思身當其境可深信其能引决就義如班第鄂容安所為者恐亦未能多得也俟阿睦爾撒納擒獲之日朕自分别加罪另降諭㫖尋命司員唐喀禄經理薩喇勒㳺牧二十一年正月薩喇勒至吐魯畨遣人通信巴里坤叅賛大臣達勒黨阿率兵往㑹二月奏言臣䝉委任駐剳伊犁遇賊竊發不能盡力勦滅致將軍恭賛大臣等捐軀盡節臣力窮被執自知徒死不足塞責隠忍偷生希圖報効遂與台吉諾爾布敦多克等聚兵欲擒逆賊阿睦爾撒納自贖前愆上年十二月内與阿睦爾撒納交戰數日不勝隨同諾爾布敦多克等由吐爾畨前來據伯克莽阿里克言噶爾藏多爾濟欲俟擒獲阿睦爾撒納立子諾爾布林沁為總台吉轄四衛拉特又巴雅爾等知臣至吐魯畨帯兵突來意不可測幸臣先入城聞巴里坤調兵將至始回凖噶爾人反覆變亂全不可信必調西北兩路兵三四萬併力勦擒逆賊並將各部落人等分别𠞰撫其凖噶爾兵似不可用疏入諭曰此次薩喇勒甚有畏懼凖噶爾之心又恐來京治罪是以故難其説為此陳奏今大兵將抵伊犁若如所奏必待大兵三四萬始可前進則機㑹已失必致堕賊奸計因降㫖令其即同達勒黨阿進剿然伊既懐疑懼未必能盡心擒賊以圖報効將軍䇿楞等竟不必俟薩喇勒偕行即薩喇勒趕赴一切𦂳要機宜不必與之商酌尋諭薩喇勒駐特訥格爾辦事仍授定邉右副將軍三月命由巴里坤來京䇿楞奏言侍衛巴寜阿自伊犁回至軍營告稱上年八月二十三日賊掠台站將軍班第等由固爾扎赴崆格斯禦之賊甫至薩喇勒欲奔叅賛大臣鄂容安云賊來當戰胡急走薩喇勒答云爾何知遂䇿馬而行喀爾喀察哈爾等俱隨之去將軍處止司員侍衛及兵丁六十人是夜賊蠭聚將軍等遂各自盡疏入諭曰薩喇勒與班第同為將軍自當奮力禦賊果至勢窮力絀班第等先以身殉薩喇勒或不得已衝突而出不識死綏之義尚不足責乃竟首先奔竄以致大衆潰㪚是二臣雖死于賊而薩喇勒亦不能無罪但係巴寜阿一面之辭應將薩喇勒觧京質對著傳諭黄廷桂俟薩喇勒至肅州時即鎻拿速行押解來京嗣薩喇勒至供逃出是實命革職永逺監禁諭曰班第鄂容安同薩喇勒駐守伊犁當逆賊叛亂之時班第鄂容安捐軀殉節而薩喇勒獨自脱迯及拿解來京朕親加審訊據稱彼時以賊衆四集恐力不能支是以帯兵逃出兾圖再舉等語朕因其所言情節尚應質對今巴寜阿柏琨等到京質訊之下言頗相符但供㧞去所賜孔雀翎而逃是其偷生負國已属顯然在滿漢世受國恩之臣而臨難茍免自當明正典刑伊係厄魯特新附之人不足責以死綏大義今班第鄂容安靈櫬已到朕親臨祭奠優予䘏典靈櫬俱令進城即著旺扎爾帯同薩喇勒前往班第鄂容安柩前將逆黨克什木等先行馘耳祭奠令薩喇勒在旁看視夫人孰無死使薩喇勒亦能如二臣之决計就義則今日哀榮之典自當一體同受而乃顛越至此使伊稍有人心能無愧乎二十二年諭曰薩喇勒當厄魯特變亂時觀望畏縮不能奮勇復讐是以降㫖拿問但伊曽奏及巴雅爾雖降必叛其言頗騐今巴雅爾等既已生擒扎那噶爾布亦經獻馘哈薩克阿布賚率属歸誠計阿睦爾撒納自可旦夕俘獲著將此等情節傳諭薩喇勒施恩免罪出獄從前賞給瑪木特房屋令其居住二十四年六月復授㪚秩大臣鑲白旗蒙古副都統命乾清門行走八月授内大臣賞二等超勇伯爵二十五年卒諭曰内大臣薩喇勒人頗䔍寔効力有年今患病溘逝深為軫惻著加恩𣲖㪚秩大臣一員侍衛十員往奠茶酒仍賞銀一千兩辦理䘮事二十六年命圖形紫光閣御製賛曰彼中宰桑識時早歸副帥以往克賛戎機㧞身戰出不忘本朝云胡不死責備則澆子玉魯斯襲伯爵巴圖濟爾噶勒巴圖濟爾噶勒厄魯特人乾隆十九年以杜爾伯特宰桑投誠𨽻䝉古正黄旗人二十年五月大師征凖噶爾達瓦齊擁衆萬人踞格登山崖巴圖濟爾噶勒與翼領喀喇巴圖魯阿玉錫新降宰桑察哈什以兵二十餘往探乘夜衝入大軍繼進賊驚潰達瓦齊遁收所居大䝉古包及礟六降其台吉二十宰桑四親兵五百兵四千餘諭曰喀喇巴圖魯阿玉錫巴圖濟爾噶勒察哈什等遵令乘夜翻營一鼓先登所向披靡尤為實力奮勉俱加恩授為㪚秩大臣加賞男爵世襲八月阿睦爾撒納叛阿玉錫奏巴圖濟爾噶勒黨惡執之諭歸部管轄十一月厄魯特侍衛丹津告訥黙庫欲逃叛命辦事大臣阿蘭泰擒治并將巴圖濟爾噶勒拏觧來京二十一年三月巴圖濟爾噶勒將訥黙庫背叛情形據實陳奏免其治罪加恩授三等侍衛五月擢頭等侍衛赴達勒黨阿軍營十一月達勒黨阿奏其効力有勞授㪚秩大臣二十二年十月解馬赴濟爾哈朗命為領隊大臣授鑲藍旗蒙古副都統十一月在哨探隊内行走二十三年與侍衛鄂實圍扎哈沁得木齊哈勒拜㳺牧擒斬哈勒拜及其属襲執叛賊琿齊于尼勒喀河盡收其㳺牧四月擒噶勒襍特宰桑特克勒徳克隨將軍兆惠等由伊犁進勦回部五月至善塔斯嶺招降布嚕特頭人並其属六十餘又降阿勒巴齊鄂勒椿等收其馬駝軍械八月招撫塔拉斯布嚕特三百餘户十月諭曰巴圖濟爾噶勒原在富徳隊内不必隨往葉爾𦍑即同巴禄領兵搜捕哈丹阿巴噶斯餘賊及沿途嗎哈沁等凡奏事行文列名于次不必受巴禄節制巴禄與巴圖濟爾噶勒當和衷協力以期集事若能盡剿餘孽併獲哈薩克錫喇則真伊二人之福也十一月命速赴富德軍營十二月至伊拉里克因馬駝未至兵皆負粮械徒行巴圖濟爾噶勒奏將已到闢展之駝儧送續到者速為接濟得㫖嘉奬二十四年正月兵至阿爾吉什時逆賊霍集占黨侵和闐侍衛齊凌扎布請援將軍兆惠令巴圖濟爾噶勒與瑚爾起往撃之三月至和闐賊望風遁偵賊騎七百餘屯踞博羅齊乘霧直前衝擊潰之追越卓窪勒河勦殺百餘收回人四千餘户撫定齊喇塔克克里雅三城御製博羅齊行紀其事詩曰博羅齊者鄰和闐賊􅉰據險偵我軍先是圍解黒水困元戎遣救掄二臣一為瑚爾起吉林舊族世受恩一巴圖濟爾噶勒乃厄魯特宰桑其勇誠超羣同心協力速赴援率軍數不能盈千途歴戈壁不毛之地負甲歩進無俄延哈拉哈什已垂䧟齊凌札布馳來言夜急行至伊立齊時賊望風先逃奔集兵拯哈拉哈什賴天大霧彌漫漫乘霧直搗賊營後伺怠奮勇攻中堅斬將搴旗獲輜重孤城恢復餘俱安昔薛延陀禬神能致雪兾困李勣終乃自敝焉此霧或亦敵鮓荅翻為我用成功全易云天所助者順向猶未信今信然持盈知足感帝佑敢肆志詡能開邉尋下部議叙給雲騎尉世職七月霍集占棄葉爾𦍑遁追及于阿勒楚爾賊伏兩山間我兵分三隊奮擊巴圖濟爾噶勒領左翼自辰至午賊大潰追殺千餘生擒五十奪礟械無算賊逸入巴達克山界巴圖濟爾噶勒與伊柱領兵八百于山後堵禦大兵尾至伊西勒庫爾淖爾賊據險守我師整隊發礮樹回纛降賊萬餘巴圗濟爾噶勒以功賞戴花翎給白金九月富德令侍衛賽音圖等往巴達克山勒獻霍集占𣲖巴圖濟爾噶勒駐兵卡倫張聲勢瓦罕伯克以户口降二十五年凱旋賚銀幣授内大臣命圖形紫光閣御製贊曰杜爾伯特部中傑驍嘉其心直授職本朝凡與交戰義弗返顧師濟和闐不孤恩遇嗣追叙平定凖噶爾及回部功加騎都尉三十四年授公中佐領三十七年卒賜祭葬如例子二長綽克圖襲騎都尉兼一雲騎尉次普爾普由侍衛隨征金川有功授三等奮勇男官䕶軍統領以勦䑓灣逆匪林爽文奉㫖加給雲騎尉五十五年卒賜祭葬如例欽定八旗通志巻一百八十五
