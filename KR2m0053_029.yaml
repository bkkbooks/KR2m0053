  text: 旗分志十五八旗佐領十五正藍旗滿洲佐領佐領管領分管正藍旗包衣正藍旗滿洲佐領下四參領至五參領第四參領第一佐領係康熙十三年以吳達禮燕台達爾漢吳爾都四佐領餘丁編立始以王府長史兼議政大臣雅賴管理雅賴從征陳亡以其弟拜他喇布勒哈番兼前鋒恭領雅海管理雅海從征病故以雅賴之子班第管理班第緣事革退以其弟之子拉薩禮管理拉薩禮緣事革退以其兄玉蘭保管理玉蘭保緣事革退以其弟之子索柱管理索柱故仍以玉蘭保管理玉蘭保故以富慶管理富慶故以德慶管理德慶故以恆泰管理恆泰故以全起管理謹案此係無根源佐領乾隆四十三年奏定改為族中承襲佐領第四參領第二佐領原係國初編立之半個牛彔始令西佛管理西佛故以其弟隋遜管理後增以薩哈爾察地方來歸人丁編為一整牛録仍以隋遜管理隋遜故以其兄之子達勒漢管理達勒漢故以其叔父之子福保管理福保故以其兄密禮布管理密禮布因病告退以其弟善布管理善布故以其兄之孫倭星額管理倭星額軍前病故以其族人舒禮布管理舒禮布故以德楞額管理德楞額故以沙精阿管理謹案旗册此佐領係庫雅拉氏五十丁及薩哈爾察五十丁合編之佐領第四參領第三佐領亦係國初編立始以轄那齊布管理那齊布故以其子甲喇章京漢文稱恭領蘇爾德管理蘇爾德故以其子副都統蘇護吉管理蘇護吉故以其子護軍參領蘇賚管理蘇賚年老辭退以其弟一等侍衛蘇金管理蘇金因病辭退以其弟蘇魯布管理蘇魯布故以其弟西拉圖管理西拉圖緣事革退以其兄之子色和納管理色和納故以永昌管理永昌故以永寧管理永寧故以諾明阿管理諾明阿告病以鳳林管理太祖高謹案旗册那齊布係瑚納和地方人皇帝初編佐領時編為一佐領後隨世祖章皇帝進京因中途病故未襲進京後另編一佐領承襲第四參領第四佐領係第三佐領內滋生人丁康熙二十一年蘇賚管佐領時分編一佐領以其叔祖之孫那爾賽管理那爾賽故以其兄佘琿管理佘琿故以其子額色禮管理額色禮故以其伯父之孫阿柱管理續以納特管理納特故以武什泰管理武什泰故以誠都管理第四參領第五佐領亦係第三佐領內滋生人丁康熙二十三年復分編一佐領以三等侍衛桑格管理桑格故以其弟護軍校亢保管理亢保升任寧夏城守尉以其兄之子驍騎校察護管理察護故以其叔父護軍校索柱管理索柱年老辭退以其子安泰管理安泰故以神保管理神保故以巴哈連管理續以卓靈阿管理續以長慶管理第四參領第六佐領原係康熙十九年將佛保佐領內王府長史佛保族人及西圖庫佐領內給事中倉色族人合編一佐領以佛保管理佛保故以其子瞻布立管理瞻布立故以阿達哈哈番宗海管理宗海故以正卿傅德管理傅德故以二等阿達哈哈番兼王府長史富爾瑚納管理續以常有管理常有故以志信管理志信故以喜常管理第四參領第七佐領係順治八年於張八十蘇和濟二佐領內分出始令工部啓心郎五十八管理五十八故以其弟西拉巴管理西拉巴故以五十八之子燕台管理燕台故以其子燕德管理燕德因病辭退以其子四十一管理四十一故以寧珠管理寧珠故以木克得赫管理謹案此係無根源佐領乾隆四十三年奏定為族中承襲佐領第四參領第八佐領係第七佐領內滋生人丁康熙二十三年燕台管佐領時分編一佐領以其族叔父詹事府中允阿哈尼堪管理阿哈尼堪故以其子阿達哈管理阿達哈故以其子法爾納管理法爾納緣事革退以其伯父之子和善管理和善故以其叔父吏部侍郎阿山管理續以三格管理三格故以阿福管理謹案此係無根源佐領乾隆四十三年奏定為族中承襲佐領第四參領第九佐領原係國初以烏喇地方來歸人丁編為半箇牛録以尼喀禮之子威赫德管理威赫德故以其子克什圖管理克什圖故以其族人德普特臨管理後增以一百丁編為整佐領仍以德普特臨管理德普特臨故以庫岱管理庫岱故以其族弟丹泰管理後復令克什圖之弟綽克託管理綽克託升任江寧副都統以其弟烏布禮管理烏布禮故以綽克託之子額爾德赫管理額爾德赫故以其弟烏爾德赫管理烏爾德赫故以其子嶽索禮管理嶽索禮告退以伍格管理伍格告退以塔斯海管理塔斯海故以六十三管理六十三故以安慶管理第四參領第十佐領係第九佐領內滋生人丁康熙二十三年烏爾德赫管佐領時分編一佐領以丹泰之子囊開管理囊開故以其兄之子車勒琿管理車勒琿升任太原城守尉以其族叔父賽音布管理賽音布故以其族子蘇巴禮管理蘇巴禮故以其族人山拜管理山拜故以其子蘇章阿管理續以八十管理八十故以瑚圖禮管理瑚圖禮故以託恩多管理謹案此係無根源佐領乾隆四十三年奏定為族中承襲佐領第四參領第十一佐領亦係國初編立始以傅克察管理傅克察從征陳亡以其族孫阿爾哈管理阿爾哈故以傅克察之弟巴爾柱管理巴爾柱故以其兄之孫庫勒納管理庫勒納故以其族孫邁都護管理邁都護從征陳亡以其族人噶哈管理噶哈故以其子巴哈管理巴哈故以其族弟竒轍布管理竒轍布故以科盛額管理科盛額故以永平管理第四參領第十二佐領係第十一佐領內滋生人丁康熙十一年噶哈管佐領時分編一佐領以傅克察之孫巴拜管理巴拜故以其子蘇尼克管理蘇尼克故以其子定柱管理定柱故以富卉管理富卉故以塔竒布管理塔竒布故以永明管理第四參領第十三佐領亦係國初編立始以克一德里管理克一德里故以托希納之弟托爾弼管理托爾弼故以其族孫蘇爾都管理蘇爾都故以其族弟蘇赫納管理蘇赫納故以蘇爾都之子