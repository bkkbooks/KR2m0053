body:
  text: 欽定四庫全書欽定八旗通志卷七十二土田志十一守陵人員地畝看守永陵闗防屬下各旗人等及匠役掃院丁壯地八十五頃三十九畝二分在馬家和羅吳庫禮噶山胡籃哈達等處總管屬下八旗丁壯地四百四十八頃六畝四分佐領屬下千丁地二萬一千一百五十八晌零六分在奉天遼陽撫順因登巨流河界内看守福陵闗防屬下包衣八旗官員兵丁及掃院看園人等地二百八十七頃八十三畝七分在盛京興京界内總管屬下八旗人員並看守官㕔丁壯地六百零三頃三十四畝在盛京興京開原等界内佐領屬下千丁地一千一百三十八頃二十七畝六分在奉天開原界内右舊志原文看守昭陵闗防屬下官員人等及掃院丁壯地一千七百零七頃三十四畝七分總管屬下八旗丁壯地四千五百五十七晌五畝在奉天開原廣寧秀巖牛莊界内右舊志俱本奉天來冊乾隆五十七年八月戸部議覆盛京將軍琳寧奏稱乾隆十三年添給官兵地畝時以守陵官兵與打圍當差者有間是以未經一律撥給總縁當年丁少尚可倚賴舊業養生而年來生齒日繁必須酌給官地以資養育查奉天大段閑地業經招募旗人墾種而興京瀋陽開原遼陽鳳凰城廣寧牛莊等城所屬尚有零星小段閑荒臣等擇其可耕並無闗碍者得九萬八千餘畝儘足以供分撥等語自屬實在情形應如所奏准其撥給三陵官兵以副皇上一視同仁之意奉㫖依議戸部来冊康熙二十七年安奉昭西陵隨設雲騎尉品級章京十六員各給地三十六畝筆帖式二員各給地二十四畝領催四名披甲七十六名各給地六畝後添設驍騎校二員在乾隆二年各給三十畝戸部来冊又禮部讀祝官二員贊禮郎四員各給地三十畝九品筆帖式二員各給地二十四畝牛吏二名擠奶人二名各給地六畝又内闗防衙門筆帖式二員各給地二十四畝俱本衙門来冊昭西陵謹案舊志載康熙二十七年遵化州撥給六年給官兵等地三頃八十六畝在石門鎮三十披甲人等地六畝在北閣老灣莊云據本州来冊而今户部及本衙門冊並無此項蓋二十七年一項即在戸部所開二十七年一項之中部冊括其總數州冊載其零數三十六年一項地止六畝當亦在關防衙門冊所開地畝之内年逺案牘不存無從核其年月耳謹附識扵此不更複載焉順治十八年遵化州撥給孝陵官兵等忠義衞地三十三頃三畝五分零在西三屯等莊又給地四十三頃七十六畝五分零在李官屯等莊又給地十頃十二畝四分零在韋家嶺等莊又給地一頃六十三畝在西峯寺前又給州東寛屯地六頃二十五畝五分在下院寺等莊又給筆帖式地五十六畝在租戸莊舊志據本州来冊康熙二年題准孝陵禮部設奉祀郎中工部設修理郎中兵部設守衛總管翼領防禦領催驍騎校内務府設奉祀郎中等官及内監各執事男婦鑾儀衛設校尉二十四名户部設庫尉二人領催一名禮工二部設各項人役三百二十餘名各給地七頃二十畝園頭一人給地一頃五十畝以供米麫菜蔬會典又題准看守孝陵内大臣給園地十五晌會典是年定總管一員給地七十二畝翼領二員各給地六十畝雲騎尉品級章京十六員各給地三十六畝筆帖式二員各給地二十四畝領催四名披甲七十六名各給地六畝嗣又添設驍騎校二員在乾隆二年各給地三十畝户部来冊又禮部讀祝官二員贊禮郎四員各給地三十畝筆帖式二員各給地二十四畝牛吏二名擠奶人二名各給地六畝本衙門来冊又内副管領一員給地三十畝筆帖式二員各給地二十四畝本衙門来冊謹案舊志據遵化州来冊載讀祝官地二頃六十六畝又五十四畝在租户莊鑲藍旗筆帖式東勝衛地二十四畝在馬各莊披甲人等地八畝二分零在上莊總管筆帖式地二十四畝在桃園莊飯上人地二十四畝在租戸荘所載畝數未符葢亦據其境内所轄之零數即在今冊總數之中謹附識扵此康熙四十八年遵化州撥給孝東陵郎中地十二畝舊志據本州来冊五十七年安奉孝東陵隨設雲騎尉品級章京十六員各給地三十六畝筆帖式二員各給地二十四畝領催四名披甲七十六名各給地六畝嗣又添設驍騎校二員各給地三十畝戸部来冊又禮部讀祝官二員贊禮郎四員各給地三十畝本衙門来冊又内闗防衙門筆帖式二員各給地二十四畝本衙門来冊五十八年給鑲黄旗官兵地四十四畝正黄旗官兵地四十三畝八分零正白旗官兵地四十四畝正紅旗官兵地四十三畝九分零鑲白旗官兵地四十四畝鑲紅旗官兵地四十四畝正藍旗官兵地四十四畝鑲藍旗官兵地四十三畝九分零又給各旗䕶軍地十八畝舊志據遵化州来冊謹案舊志又有茶上人飯上人地四十畝筆帖式地十六畝拜唐阿地六十六畝又拜唐阿地三十四畝闗防郎中地十二畝員外郎鳴賛地一頃十六畝雍正二年新設内管領地二畝䕶軍地十六畝云云兹戸部及本衙門来冊皆未之及當係後来裁減歸併案牘無存今遵奏定凡例均以現在額數條欵著録而附載舊文以備考康熙十九年安奉景陵隨設總管一員給地七十二畝翼領二員各給地六十畝雲騎尉品級章京十六員各給地三十六畝筆帖式二員各給地二十四畝領催四名披甲七十六名各給地六畝嗣又添設驍騎校二名各給地三十畝戸部来冊又禮部讀祝官六員贊禮郎十員各給地三十畝牛吏二名擠奶人二名各給地六畝本衙門来冊又副管領一員給地三十畝筆帖式二員各給地二十四畝本衙門来冊景陵䕶謹案舊志載雍正元年遵化州撥給十畝侍衛等軍等地十畝二年又給員外郎等地地一頃䕶軍等地十畝闗防郎中等地十二畝又員外郎等地十二畝茶上人等地十六畝飯上人等地十二畝官兵等地十二畝五年給飯上人地八畝與今戸部及本衙門来冊互有詳畧當由後来改定今謹以現在條欵額數著録而附載舊文扵此康熙二十一年營建孝誠仁皇后孝昭仁皇后陵寢設官員兵丁置莊園禮部則例是年遵化州撥給䕶守官兵等地十八頃六十六畝在平安城又四頃五十畝在龍虎峪又屯地一頃二畝在小喜峯口又七頃二十畝在堡子店又十八頃六十六畝在念莊等處二十二年給披甲人等地十二畝在小厰二十九年給員外郎等地四畝四分又一畝六分在堡子店俱舊志又安奉妃園寢隨設雲騎尉品級章京八員各給地三十六畝披甲四十名各給地六畝又乾隆二年添設驍騎校一員給地三十畝戸部来冊乾隆三十一年十二月奉上諭管理陵寢之員俱給有俸糈以資養贍太監等亦俱支領錢糧所有總管及官員太監等分受菜地本非例内應得之項均着撤回無庸給予嗣後嵗徵各地租交與該處滋生庫按例料理三十二年三月軍機處議奏菜地既已撤回此外所有官地一項應否併撤奉㫖官員太監一概不必給予是年戸部奏言據直𨽻總督咨稱所有東陵西陵内務府官員太監茶膳人等業經遵撤但陵寢員役除内務府所屬外尚有外八旗總管衙門官兵及禮部兵部官員人等地畝應否照舊給予抑或一併撤回臣等伏查陵寢官兵地畝自康熙二年安設孝陵官兵即分别等差量為撥給嗣後俱照此辦理兹者軍機處議辦景陵菜地案内將内務府官員太監隨缺官地一併撤回其八旗官兵及禮兵二部官員人等彼時原未議及伏思内務府與八旗事屬一體所有八旗之禮兵等部官員筆帖式及兵丁人等地畝自應全行撤回以昭畫一奉㫖此内之總管翼領郎中員外主事等官每年例得俸糈較多足資養贍伊等所給官地自應一體撤回其防禦祝賛等官以及兵丁人等均係㣲末員弁若一併撤回恐扵生計不無拮据著加恩仍行給予至内務府官地前經降㫖將官員人等一概不准給予今八旗防禦以下既未撤回所有内務府副管領以下亦著加恩給予謹案以上據户部原文以下據承辦各衙門来冊乾隆元年安奉泰陵隨設防禦十六員各給地三十六畝驍騎校二員各給地三十畝筆帖式二員各給地二十四畝内務府副管領一員給地三十畝筆帖式二員各給地二十四畝佐領下茶上人二名各給地二十四畝禮部讀祝官二員贊禮郎四員各給地三十畝筆帖式四員各給地二十四畝牛羊吏二名擠奶人二名各給地六畝工部筆帖式二員各給地二十四畝又承辦事務衙門添設筆帖式二員各給地二十四畝又八旗兵丁共二百名各給地六畝三年設立皇貴妃園寢防禦八員各給地三十六畝副管領一員驍騎校一員讀祝官二員贊禮郎三員各給地三十畝四十二年安奉泰東陵隨設防禦十六員各給地三十六畝驍騎校二員各給地三十畝禮部讀祝官二員贊禮郎四員各給地三十畝筆帖式四員各給地二十四畝牛羊吏二名擠奶人二名各給地六畝内務府筆帖式二員各給地二十四畝佐領下茶上人一名飯上人二名各給地二十四畝以上共官地三十九頃六十畝在涿州者四頃二十畝九分六釐在安肅縣者二十八頃八十九畝五分四釐在定興縣者三頃九十七畝五分在新城縣者一頃三十二畝在易州者一頃二十畝又乾隆八年安奉皇貴妃園寢隨設雲騎尉品級章京四員各給地三十六畝原設驍騎校一員給地三十畝領催二名披甲三十八名各給地六畝是年安奉端慧皇太子園寢隨設委署翼長一員雲騎尉品級章京一員章京六員各給地三十六畝委署驍騎校一員領催一名披甲三十八名各給地六畝又設副管領一員讀祝官二員贊禮郎三員各給地三十畝十七年安奉孝賢皇后陵寢隨設總管一員給地七十二畝翼領二員各給地六十畝雲騎尉品級章京十六員各給地三十六畝原設驍騎校二員各給地二十四畝筆帖式二員各給地二十四畝領催四名披甲七十六名各給地六畝又副管領一員給地三十畝筆帖式二員各給地二十四畝讀祝官二員贊禮郎四員各給地三十畝牛吏二名擠奶人二名各給地六畝是年安奉純恵皇貴妃園寢隨設雲騎尉品級章京八員各給地三十六畝驍騎校一員給地二十四畝領催二名披甲三十八名各給地六畝以上守陵人員地畝欽定八旗通志卷七十二
