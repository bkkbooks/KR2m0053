body:
  text: 營建志七八旗駐防規制三各省駐防三右玉縣駐防原右衛雍正初改為右玉縣康熙三十二年設將軍一員衙署一所坐落本城鼓樓西街路北計房六十一間內七檩房八間五檩房三十七間四檩房十三間六檩房三間獅子一對旗杆二條轅門牌樓二座照壁一座五檩圍房四十三間於乾隆二年將軍移駐綏逺城駐防後作為公所會府之用於乾隆五十年奏準交地方官變價現今實剩應取租圍房十一間副都統二員衙署二所一所坐落本城東街路北計房二十間內七檩房六間五檩房十四間一所坐落本城鼓樓西街路北計房三十間內七檩房六間五檩房二十四間於乾隆二十六年裁汰副都統一員將西街衙署一所交本處同知徴租於乾隆三十三年裁汰副都統一員改設城守尉一員將東街衙署一所作為城守尉衙署印房一所坐落本城鼓樓西街路北計五檩房五間於乾隆三十四年裁汰交地方官變價左司一所坐落本城鼓樓北街路北計房八間內七檩房三間五檩房五間於乾隆三十四年裁汰交地方官變價右司一所坐落本城鼓樓東街路北計房十七間內七檩房六間五檩房十一間於乾隆三十三年裁汰副都統改設城守尉作為城守尉印房公庫一所坐落本城鼓樓西街路北計房十一間內七檩房三間五檩房八間於乾隆三十四年裁汰交地方官變價萬順當一所坐落本城鼓樓東街路北計房十間內七檩房三間五檩房七間於乾隆三十四年裁汰交本處同知徵租鑲黃旗滿洲蒙古坐落本城東街正黃旗滿洲蒙古坐落本城西街正白旗滿洲蒙古坐落本城東門外正紅鑲紅鑲藍等三旗滿洲蒙古坐落本城北門外路西鑲白旗滿洲蒙古坐落本城北門外路東正藍旗滿洲蒙古坐落本城北門外馬營河北鑲黃正黃正紅正白鑲白鑲紅正藍等七旗漢軍坐落本城南門外路東鑲藍旗漢軍坐落本城南門外路西所有各旗官兵衙署房間俱各隨旗地面坐落協領十二員衙署十二所俱各隨旗地面坐落每所各計七檩房三間五檩房十五間於乾隆二十九年撥補緑營協領二員移駐張家口協領二員調補綏逺城協領一員裁汰協領二員於乾隆三十三年裁汰協領五員所有衙署俱各隨裁汰時交地方官變價佐領六十四員衙署六十四所俱各隨旗地面坐落每所各計七檩房三間五檩房十二間於乾隆六年移駐綏逺城佐領五員於乾隆十四年裁汰佐領十一員添設佐領四員於乾隆二十六年裁汰佐領二十四員於乾隆二十九年移駐張家口佐領十員撥補緑營佐領八員於乾隆三十三年裁汰佐領十員所有衙署俱各隨裁汰時交地方官變價防禦六十四員衙署六十四所俱各隨旗地面坐落每所各計七檩房三間五檩房九間於乾隆六年移駐綏逺城防禦五員於乾隆十四年裁汰防禦十五員添設防禦四員於乾隆二十六年裁汰防禦二十四員於乾隆二十九年移駐張家口防禦八員調補綏逺城防禦一員裁汰防禦一員撥補緑營防禦八員於乾隆三十三年裁汰防禦六員所有衙署俱各隨裁汰時交地方官變價現有防禦四員現有衙署四所驍騎校六十四員衙署六十四所俱各隨旗地面坐落每所各計七檩房三間五檩房五間於乾隆六年移駐綏逺城驍騎校五員於乾隆十四年裁汰驍騎校十一員添設驍騎校四員於乾隆二十六年裁汰驍騎校二十四員於乾隆二十九年調補綏逺城驍騎校五員裁汰驍騎校三員撥補緑營驍騎校八員移駐張家口驍騎校二員於乾隆三十三年裁汰驍騎校六員所有衙署俱各隨裁汰時交地方官變價現有驍騎校四員現有衙署四所步軍總尉二員步軍校八員係乾隆二十六年新添步軍總尉係由佐領改補步軍校係由防禦改補於乾隆二十九年裁汰步軍總尉一員於乾隆三十三年裁汰步軍總尉一員於乾隆二十九年移駐張家口步軍校二員調補綏逺城步軍校一員撥補緑營步軍校一員於乾隆三十三年裁汰步軍校三員所有該員等衙署係由佐領防禦衙署內撥給俱各隨裁汰時交地方官變價茟帖式二員衙署二所坐落本城鼓樓西街路北一所計七檩房三間五檩房六間一所計七檩房三間五檩房五間於乾隆三十三年裁汰茟帖式一員裁汰七檁房三間五檩房六間交地方官變價現有筆帖式一員現有衙署一所領催前鋒馬兵三千五百四名內滿洲蒙古兵二千三百三十七名漢軍兵一千一百六十七名除滿洲蒙古兵三百三十三名漢軍兵一百六十七名無房外其餘滿洲蒙古兵每名五檩額房四間漢軍每名五檩額房二間於乾隆二十一年裁汰滿洲蒙古兵三百三十七名漢軍兵一百六十七名於乾隆二十五年裁汰滿洲蒙古兵二百六十七名漢軍兵一百三十三名於乾隆二十九年移駐張家口滿洲蒙古兵六百六十四名於乾隆三十三十三等年滿洲匠役內改補馬兵十名移駐綏逺城滿洲蒙古兵二百六十四名裁汰蒙古兵十五名撥補緑營漢軍併辭革病故兵八百六十七名於乾隆三十三年移駐綏逺城滿洲蒙古兵五百名所有該兵等房間隨裁汰時交地方官變價現有領催馬兵三百名每名五檁額房四間原設鐵箭匠一百一十二名每名五檩額房二間於乾隆六年裁汰鐵箭匠十名於乾隆十四年裁汰鐵箭匠二十二名於乾隆二十六年起至三十三年止陸續裁汰鐵箭匠六十名移駐張家口鐵箭匠二十名所有該匠役等房間隨裁汰時交地方官變價現有城守尉一員衙署一所計七檩房六間五檩房十四間坐落本城鼓樓東大街印房一所計七檩房六間五檩房十一間坐落本城鼓樓東大街防禦四員衙署四所每所計七檁房三間五檩房九間二所坐落本城鼓樓東二所坐落本城鼓樓西驍騎校四員衙署四所每所計七檩房三間五檩房五間二所坐落本城鼓樓東二所坐落本城鼓樓西筆帖式一員衙署一所計七檩房三間五檩房五間坐落本城鼓樓西滿洲蒙古領催馬兵三百名每名五檩房四間共房一千二百間鑲黃正白鑲白正藍四旗坐落本城鼓樓東正黃正紅鑲紅鑲藍四旗坐落本城鼓樓西原設教場一所計七檩房五間坐落本城北門外路西四門官廳四所每所計五檩房三間殺虎口一座係康熙三十三年駐防右衛以來舊有關隘坐落城北二十里西傍建蓋五檩堆房六間烏里雅蘇臺駐防乾隆三十年設木城一座圍五百丈髙一丈六尺城門三城樓三座角樓四座將軍衙署一所住房五間過廳五間東西配房各六間儀門一座大門三間參贊大臣衙署二所各十八間火藥局五間獄房十間以上俱係修城以前建蓋軍器庫四十一間水磨房三間看磨兵房三間銀庫十六間倉厫八十一間以上俱係四十年四十一二等年陸續建蓋綏逺城乾隆二年設立城垣衙署官房等項城長九里十三步內土外磚鼓樓一座萬夀宫一座二十間將軍衙署一所一百三十二間左右司二所各十六間副都統衙署二所各五十四間內乾隆二十七年裁汰一所三十八年裁汰一所俱變價協領衙署十二所各三十八間內乾隆十六年裁汰一所二十九年裁汰一所三十五年裁汰一所俱變價佐領衙署六十所各二十四間內乾隆十六年裁汰二十六所三十四年裁汰十一所三十五年裁汰五所內一所出賃取租餘俱變價現存衙署十八所佐領居住十五所世職官居住三所防禦衙署六十所各十九間乾隆十六年裁汰二十三所以一所出賃取租餘變價現存衙署二十五所防禦居住二十所世職官居住五所驍騎校衙署六十所各十四間乾隆十六年裁汰二十所三十四年裁汰十八所俱變價現存衙署二十二所驍騎校居住二十所世職官居住二所茟帖式衙署四所各十四間乾隆四年裁汰一所出賃取租滿漢翻譯學一所十間旗庫一所十四間義學八所各十二間箭廳一所六間火藥局一所六間四門官廳八所各三間堆撥二十處各房二間兵房一萬二千間乾隆十六年裁汰變價四千六百三十二間出賃取租一百五十六間三十四年又裁汰變賣一千六百六十二間現存兵住五千四百間公所一百五十間糧餉理事同知衙署一所房七十六間倉庫大使衙署二所各十四間乾隆二十二年裁汰一所變價豐裕倉房一百零五間關帝廟二十四間旗纛廟十七間馬王廟十一間城隍廟二十二間山神廟二十四間土地廟二十四間東嶽廟七間火神廟七間龍王廟七間真武廟七間教場在西門外房十三間歸化城駐防城垣四面共三百七十六丈東西南三面設立關廂周圍共四百五十四丈五尺城內舊設倉厫四座二十間康熙三十一年於歸化城西南一百八十里托克托城內蓋造倉厫十座共五十間城內原設官員衙署一所十八間雍正元年添設理事同知衙署一所五十五間協理同知事務筆帖式衙署一所共四十間二年建聖廟一所二十一間學舍一所共九間六年於托克托城增倉六座共三十間八年建巡察御史衙署一所共十一間十三年辦理歸化城事務副都統通智疏請增修公署建大門三間二門一間大廳五間廳東設錢糧銀庫一間廳西設軍器庫一間設東廂房五間為户司設西廂房五間為兵司辦事房三間檔房四間班房一間軍器房四間間散官員住房三間共三十六間增修聖廟共二十六間學舍共十間先農壇共六間以上除舊設衙署倉厫及增修衙署在城內餘俱在城外教場在城北房七間寬一百丈長一百丈乾隆三十年建副都統衙署伊犁駐防乾隆二十七年阿桂等奏稱伊犁修理城郭遵照軍機大臣議奏酌量樹木豐茂即在烏哈爾里克建立今于本年二月二十五日興工七月初八日俱已完竣衙署兵房亦皆建設奴才等挨次察看雖係土工俱屬堅固除將城郭房屋衙署式樣另繪粘單恭呈御覽外塔勒竒河兩邉離槗之處約計十餘里今已添派官兵砍伐樹木修造槗梁俟完竣時奴才等遵照從前原奏于屯田修工二千兵丁內挑選一千二百名存住其餘八百兵丁交副將國柱量時撤回本營至此項在工官兵俱各出力奮勉謹將大小官員職名及奮勉人名一併繕單恭呈御覽伏乞睿鑒再回子等于古林修理城郭廣大亦如烏哈爾里克城等伊等于去嵗修理至本年三月亦並完竣其回子住房亦各蓋完移住觀其所修雖不如兵丁之整齊善好然城房尚屬堅固為此一併繪圗粘單恭呈御覽奏入硃批好事知道了三十一年正月奉旨據明瑞等奏稱由涼州莊浪携眷移駐滿洲兵丁城垣房屋一萬七百餘間俱已修理完竣其在工文武官員均屬奮勉可否請旨酌量加恩等語所有修建城工文武官員等著加恩交部議敘兵等著交眀瑞等酌量賞賚三十五年九月奉旨據伊勒圗等奏將由西安派往伊犁駐防二千滿洲官兵之住房及堆撥鋪舍共五千二百餘間于上年五月于屯田兵丁內揀派出二百名興修至本年七月均已修理完竣等語所有屯田兵丁不悮田務且又修建如許房間甚屬可嘉著交伊勒圖等將現在官員察眀分别等第送部議敘其二百名兵丁各賞給一月鹽菜銀兩寧逺城在古爾札地方乾隆二十六年建方圎四里七分城內係阿竒木伯克鄂羅木雜普率衆回子居住三十二年在城南十五里修倉厫一百間三十八年添倉二十間俱為回子交糧收貯之所惠逺城乾隆二十九年將軍公眀瑞奏準在伊犁河北一里許修建城垣房屋給與涼莊熱河移來滿洲官兵居住城長九里三分髙一丈四尺城內鼓樓一座將軍衙署一所八十間參贊大臣衙署一所六十間領隊大臣衙署四所各四十間協領衙署八所各二十三間佐領衙署四十所各十六間防禦衙署四十所各十二間驍騎校衙署四十所各八間兵房九千一