body:
  text: 選舉志九八旗科第題名八厯科武舉二乾隆元年丙辰科漢軍趙汝謙方天相佐領張允師盧承家佐領劉徳成髙應翽佐領時順包衣富拉洪佐領常安包衣雅圖管領名以上鑲黄旗五李景良李據徳佐領劉鐸永徳管領董孟包衣馬文煥佐領阿爾薩蘭包衣和善管領名以上正黄旗四徐章常天佑佐領蕭鎬祖秉基佐領王恒徳珠成額佐領李質樸尚琳佐領郭鎧朱震佐領蔡宏恒秉基佐領王光烈宣廷文佐領楊昌保住管領王廷對珠成額佐領郭汝棟郭璽佐領旗十名以上正白劉度瀛楊國正佐領正紅旗一名苗國瑄白郁文佐領呉煐聶維藩佐領雷林陳治安佐領王鈞王殿臣佐領任希賢宣智仁佐領觀徳包衣馬麟佐領張恒泰包衣馬麟佐領名以上鑲白旗七姚經通祝兆龍佐領崔永寧祝維坤佐領郭澄董國柱佐領施秉乾呉宗寧佐領扈鐸陳履坦佐領王造魯包衣王雅圖佐領以上鑲紅旗六名朱宏佟鑛佐領朱秉衡包衣常寧管領名以上正藍旗二王良輔習潔佐領洪乾運陳國偉佐領衡志堂包衣保住佐領名以上鑲藍旗三乾隆三年戊午科漢軍孫士英金偉佐領劉秉衡王國麟佐領鄧懋徳包衣依福佐領三保包衣七十管領王亭包衣豊成額佐領趙瑾包衣色勒佐領名以上鑲黄旗六祖廷槐馬謙佐領劉鈞王嘉彦管領李景雲李據徳佐領王永寧包衣馬文煥佐領以上正黄旗四名康溥祖秉基佐領王正遲維璧佐領廣福包衣十保管領劉邦傑包衣李永標佐領明安圖包衣李永標佐領海長包衣尚琳佐領李聨舉包衣掌儀局屬名以上正白旗七曺良圖臧應聘佐領籧天禄包衣薩圖佐領名以上正紅旗二雷志動陳治安佐領王鳴球陳紀勲佐領金世璉王殿臣佐領白錀劉永炳佐領盧廷璽盧世焕佐領劉永格馮瀚佐領四格包衣色克圖佐領李棟包衣蘓白圖管領呉寛包衣三保管領李文英包衣屯住管領張鏞包衣常泰管領一名以上鑲白旗十王大勲柯啟文佐領姚琨祝兆龍佐領艾宗蘄周偉佐領旗三名以上鑲紅李芸甘士璉佐領傅國璵包衣和生厄管領李毓詔包衣烏爾太佐領李世福包衣常徳佐領名以上正藍旗四崔瀛楊文燦佐領賈康泰張偉佐領崔鈺楊文燦佐領三名以上鑲藍旗乾隆六年辛酉科漢軍金元武金瑋佐領宋澤方天相佐領張瑞方天相佐領鄒志亮藥師保佐領趙璜包衣八格佐領于文煥包衣常在管領名以上鑲黄旗六張斗張松齡佐領劉文璧祖雲龍佐領米自仁栢彬佐領玉麟包衣蘓爾徳佐領孫爾敏包衣沈崳佐領名以上正黄旗五蔡永福蔡湘佐領遲之鎰謝文玉佐領楊毓芳董成謨佐領張玉琦宜兆熊佐領陳杰包衣明玉管領卞逹色包衣慶恩佐領名以上正白旗六李克私朱倫漪佐領羅尚通董珠佐領四格包衣宜吉善佐領以上正紅旗三名董九齡胡世勲佐領王昶王九如佐領雷霈陳治安佐領郭廷英聶維藩佐領郭廷㤙聶維藩佐領張廷秩王殿臣佐領呉惠包衣三保管領張嘉謨包衣顔卜佐領名以上鑲白旗八閔尚義董國柱佐領髙其慧王士儀佐領李煓金璉佐領姚畋柯宗麟佐領李烱金璉佐領花映林包衣巴彦布佐領以上鑲紅旗六名汪璋佟澍佐領朱士瑢常寧管領陳大綸羅查佐領五格包衣畢立克圖佐領張鳯翔包衣額里賀管領以上正藍旗五名金大銑金依中佐領鑲藍旗一名乾隆九年甲子科漢軍佟士玗劉廷塏佐領張顯楊徳廕佐領徐芳胡世相佐領任聨登王國麟佐領王為琮范毅佐領董殿相龎天柱佐領劉士敏王守中佐領七名以上鑲黄旗王元勲栢嵩年佐領白忠閻光國佐領劉文盛祖雲龍佐領王之賔喬天成佐領張竒沛黄霈佐領文治民金璋佐領陳鵬飛王文煥佐領馬國柱黄霈佐領金纁金璋佐領三保包衣明瑞管領名以上正黄旗十楊奎光蔣普忠佐領宣兆侯宣廷文佐領徐質侯天爵佐領二格包衣色勒佐領八十五包衣雲昇管領名以上正白旗五趙宗潤呉玠佐領馮珂張儒忠佐領二名以上正紅旗張漢霆安致和佐領潘廷俊孫志猷佐領髙培金秉良佐領白璉金秉良佐領張鈺金秉良佐領唐鑣陳治安佐領六名以上鑲白旗雷大復祝維坤佐領孟煦孟以慎佐領梁建標紀大中佐領三名以上鑲紅旗王永椿佟賦仁佐領陳延白雲佐領陳瑜陳寵佐領傅國璵包衣安圗管領朱煜包衣陶格佐領名以上正藍旗五李焜張鳯翷佐領鄭徳新包衣鶴山佐領名以上鑲藍旗二乾隆十二年丁夘科漢軍王正名馬元聲佐領王永達章武佐領王釗范宜中佐領靳光寵范宏賔佐領馬鸞聲張正徳佐領鄭元文鄧五倫佐領劉煊劉焯佐領董殿勲龎天桂佐領胥廷佐鄧五倫佐領九名以上鑲黄旗𫝊登雲金瑞書佐領姜凱左宏鐸佐領顧珮閻光國佐領三名以上正黄旗郭汝桂郭璽佐領于恒平永保佐領何琅祖秉基佐領岳芝芳祖秉基佐領梁琪保徳佐領旗五名以上正白王承祊魯成龍佐領馬雲路呉如讓佐領二名以上正紅旗王永棠陳時賢佐領孔繼慈孔𫝊志佐領盧世偉盧世煥佐領孔繼燕孔𫝊志佐領蕭芝鈺李溥佐領旗五名以上鑲白趙鶴齡柯宗麟佐領賈榮祖周福慶佐領李瑾金璉佐領鞠廣仁劉恒佐領李熾金璉佐領李從典趙宏名佐領馮興世裴徳滎佐領髙賜書趙宏名佐領八名以上鑲紅旗佟瑾明安圖佐領汪昌業佟㴻佐領劉錞包衣二格佐領鍾國猷包衣賽必漢佐領以上正藍旗四名馬䕫陳國禧佐領金大傑金依中佐領戴天培尚玉徳佐領張純錫李彤標佐領四名以上鑲藍旗乾隆十五年庚午科漢軍劉汝敬劉焯佐領王永隆王守中佐領孫鼐那俊佐領董繼從劉焯佐領趙國麟劉廷凱佐領范建康范建中佐領閆正祥林茂益佐領任聨科王國麟佐領李秉義蕭芝錦佐領九名以上鑲黄旗延恂僧保佐領文澤民金鑲佐領于世基于良弼佐領張竒溥黄霈佐領常保僧保佐領劉鑑劉沛徳佐領栢之恩曺瑛佐領張鳯翼包衣四九管領名以上正黄旗八蔡源寛蔡寳麟佐領楊綸蔡實麟佐領歐陛宣黄燦佐領歐陞俊黄燦佐領劉世徳五福佐領呉良玉沈鐸佐領旗六名以上正白劉淳劉揚佐領王鈵于宗文佐領汪倬陳錚佐領呉良玉沈鐸佐領孟興仁劉垣佐領旗五名以上正紅徐宗烈趙宏名佐領姜清霔孟以植佐領張廣潤李長麟佐領秦良弼周福慶佐領曺龍驤呉文煥佐領王榮縉王士儀佐領六名以上鑲紅旗張顯文李植佐領張宜李楷佐領徐玶明安圖佐領韓國鏌李楷佐領徐紹李侍京佐領張新在張維禄佐領六名以上正藍旗乾隆十七年壬申科漢軍王士端呉文焕佐領劉文憲金大徳佐領鄭元烈鄧五倫佐領勒光臨范宏賔佐領劉澍兆范宜中佐領何邦彦徐樹英佐領唐萬仁唐禹仁佐領王瑛馬元凱佐領邵璸范宜中佐領勒光昭范宏賔佐領鄭元凱鄧五倫佐領十一名以上鑲黄旗李文機李景佐領傅登衢金瑞書佐領徐大綸李侍京佐領張三格永忠佐領齊榮祖尚徳佐領崔起龍孟額圖佐領六名以上正黄旗王􅎾劉浩佐領徐世琳孫爟佐領王之瀛李端佐領夏貢夏良智佐領七十八老格佐領福蘭泰來忠管領鄭夀祺張鍹佐領旗七名以上正白張擴臧應聘佐領楊永全臧應聘佐領二名以上正紅旗李秉智蕭芝錦佐領黄瑞張拱辰佐領馮湛張纂磐佐領韓琪何塏佐領蔡延禮張正徳佐領五名以上鑲白旗張啟仁孫繼祖佐領鑲紅旗一名徐勇李侍景佐領沈自浚李楷佐領旗二名以上正藍楊濟武興佐領蔣攸鎬金文淵佐領何璠陳國儀佐領開元包衣儀柱管領翟大勇包衣天保佐領李乘曜包衣托倫佐領名以上鑲藍旗六乾隆十八年癸酉科漢軍何國偉周福慶佐領范植蒲鼎勲佐領徐雲霖鄧五倫佐領趙琮那俊佐領龎上進韓景禹范宏賔佐領李承凖陳國禧佐領范建邦范建中佐領徐登魁盧天培佐領張岱張正徳佐領宋學宏呉文焕佐領劉騰蛟施廷率佐領七十三包衣全保管領三名以上鑲黄旗十祖廷相馬晉佐領馬成梁馬晉佐領顧瓉閻國光佐領李景藩李景髙佐領李致中趙文煥佐領范澤深馬世賢佐領六名以上正黄旗髙峰髙崗佐領蔡永興蔡寳麟佐領楊永和蔡寳麟佐領張世魁李端佐領白逹塞𫝊巖佐領宜成彩宜兆勲佐領蔣成章陳晉佐領宋瑾徳住佐領石元龍石勇佐領梁昭保徳佐領旗十名以上正白田起鵬劉坦佐領名正紅旗一席得亮李溥佐領趙紀芳祖學聖佐領董世培胡世隆佐領三名以上鑲白旗王秉直呉文煥佐領馬朝御周福慶佐領王家幹包衣博成額佐領以上鑲紅旗三名徐鐸李侍京佐領佟淇以上正藍旗二名伊洪金文淵佐領于舜臣陳國禧佐領二名以上鑲藍旗乾隆二十一年丙子科漢軍郭敏富拉他佐領郎兆璧祖尚賢佐領趙廷棟那俊佐領胥廷勷鄧五倫佐領馬國釗齊斌佐領胡宗孔唐禹仁佐領賈聨桂范建中佐領三逹塞包衣永和佐領名以上鑲黄旗八李盛松尚銘佐領張杰華齡佐領李憲中趙文焕佐領顧瑛閻光國佐領汪傑陳錚佐領岑儀張芳佐領旗六名以上正黄佟應仕線堪佐領全濬髙崗佐領應瑞楊廷住佐領董炎董成謨佐領解繼芳何森管領旗五名以上正白王雲澍王浡佐領王大受天保住佐領二名以上正紅旗張聖佐孔廣福佐領雷鈞陳良佐領崔從龍祖學乾佐領陳文奎安定國佐領四名以上鑲白旗候得祥金璉佐領施廣呉如亮佐領王榮紳王士儀佐領卞國樞金璉佐領李震祝繼坤佐領何卓煥周福慶佐領李希白柯明治佐領七名以上鑲紅旗陳徳炤張鵬鳴佐領于允中佟鑑佐領朱永澄包衣八十管領名以上正藍旗三華友鵬金文淵佐領伊瑞金文淵佐領趙良璞楊文燦佐領劉鍹劉紹基佐領張際盛包衣鄭福佐領名以上鑲藍旗五乾隆二十四年己夘科漢軍胡秉恭金元成佐領傅宗孔沙津岱佐領皂保髙廷棟佐領李拉芬周徳昌佐領張景楊徳廕佐領滿貴寳善管領范宜文范建中佐領保慶寳善管領范建江范建中佐領䨇徳呉亷佐領旗十名以上鑲黄巴哈泰馬晉佐領顧炎閻光國佐領徳灝劉浩佐領陳愫董斯教佐領于駿李林慶佐領奚俊祖徳鼎佐領徳成四格佐領旗七名以上正紅黄廷璽金之鐸佐領王朝英海福佐領張挺洛朱紹美佐領佟躍崐線堪佐領周禮五福佐領何俊金之鐸佐領六名以上正白旗馬輝祖書寳佐領陳毓瑞楊鋭佐領趙義安包衣呉奕曽佐領以上正紅旗三名柴國相陳自能佐領金濬苗國瓉佐領二名以上鑲白旗劉嘉善呉如亮佐領王榮綬王士儀佐領黄湛呉如亮佐領孔興越包衣常興佐領六十五包衣穆特布佐領以上正紅旗五名趙起予明安圖佐領舒誠包衣克興厄佐領舒試包衣克興厄佐領以上正藍旗三名李恭寛尚玉徳佐領鄭廷璽王廷臣佐領蕭依聖陳國禧佐領佛保包衣卓爾賀管領以上鑲藍旗四名乾隆二十五年庚辰科漢軍李武富拉洪管領馬徳聲張峻佐領崔承文崔承書佐領范聨芳林茂益佐領四名以上鑲黄旗宋兆鰲黄承恩佐領韓佑昌金鑲佐領栢震金履㢲佐領張容李生輝佐領張錫謨馬世賢佐領曽永泰李景健佐領鄭雲景閻光國佐領許廷瑍劉浩佐領旗八名以上正黄蔡思襄蔡寳麟佐領蔣成美陳晉佐領福明海福佐領金積福金之鐸佐領徐本善夏䕃佐領黄徳懋趙大猷佐領張挺淦景徳佐領旗七名以上正白何兆祥閻濩春佐領劉玉徳包衣和成額佐領以上正紅旗二名盧維宗盧世煥佐領劉輝祖陳良佐領馮麟祥瞻潘佐領于廷彦包衣成徳管領名以上鑲白旗四王錫朋呉文焕佐領王榮純王士儀佐領鞠彩呉國澍佐領徐登元孫繼祖佐領四名以上鑲紅旗王永昶張惟録佐領甘運湖佟潾佐領佟世錕梁大棟佐領陳徳㶣張鵬鳴佐領季銘包衣托克托活佐領官印包衣七十六