body:
  text: 人物志一百二十四列女傳四八旗滿洲列女傳二鑲黃旗滿洲馬甲哈布納之妻蘇佳氏正白旗滿洲前鋒敦泰之妻席他喇氏以上俱於康熙二十一年旌表正白旗滿洲前鋒伊特庫之妻烏蘇氏正白旗滿洲馬甲周石之妻佟佳氏正藍旗滿洲領催撥勒庫之妻伊爾根覺羅氏鑲藍旗滿洲間散業楞額之妻薩瑪喇氏以上俱於康熙二十二年旌表鑲黃旗滿洲馬甲達爾代之妻富察氏康熙二十三年旌表正白旗滿洲筆帖式石圖之妻瓜勒佳氏正藍旗滿洲三等侍衛賽魯之妻覺羅氏以上俱於康熙二十四年旌表正紅旗滿洲護軍雅睦敦之妻鈕祜祿氏正藍旗滿洲護軍蘇穆巴喇之妻薩密勒氏以上俱於康熙二十五年旌表正紅旗滿洲馬甲諾何器之妻瓜勒佳氏康熙二十六年旌表正白旗滿洲間散喀竒哈之妻富察氏正白旗滿洲前鋒統領德爾德之妻趙氏鑲白旗滿洲領催宏善之妻竒塔拉氏正藍旗滿洲馬甲阿農阿之妻薩克察氏以上俱於康熙二十七年旌表鑲黃旗滿洲阿禮色之妻趙氏正白旗滿洲間散威赫德之妻完顔氏正白旗滿洲馬甲色福納之妻劉氏正紅旗滿洲馬甲掇拜之妻瓜勒佳氏鑲藍旗滿洲馬甲尼什哈之妻紇石烈氏以上俱於康熙二十八年旌表鑲黃旗滿洲一等男尼堪之妻納喇氏正紅旗滿洲馬甲雅孫之妻張佳氏鑲白旗滿洲馬甲朱荷之妻洪葛氏鑲紅旗滿洲領催根特之妻瓜勒佳氏正藍旗滿洲馬甲拉薩里之妻扎拉里氏鑲藍旗滿洲護軍國禮之妻紇石烈氏以上俱於康熙二十九年旌表正紅旗滿洲筆帖式托何齊之妻宏吳氏正藍旗包衣馬甲色本之妻張佳氏以上俱於康熙三十年旌表鑲白旗滿洲筆帖式綽克托之妻瓜勒佳氏鑲紅旗滿洲前鋒護軍馬哈喇之妻王氏鑲紅旗滿洲馬甲和爾岱之妻鄂齊禮氏鑲紅旗滿洲馬甲霍商之妻宏古氏以上俱於康熙三十一年旌表鑲藍旗滿洲馬甲牛鈕之妻瓜勒佳氏鑲黃旗滿洲護軍查慕素之妻張佳氏正黃旗滿洲領催安朱庫之妻瓜勒佳氏鑲紅旗滿洲護軍四格之妻黃佳氏以上俱於康熙三十二年旌表鑲紅旗滿洲護軍唐武善之妻穆伊氏正黃旗滿洲護軍馬哈納之妻伊爾根覺羅氏正藍旗滿洲護軍勒竒之妻伊爾根覺羅氏正藍旗滿洲護軍洛起之妻李佳氏正藍旗滿洲馬甲雅圖之妻鈕祜祿氏以上俱於康熙三十三年旌表鑲黃旗滿洲護軍霍勒布代之妻納喇氏鑲白旗滿洲間散尼瑪柱之妻瓜勒佳氏正藍旗滿洲馬甲伊爾哈之妻伊拉理氏正藍旗滿洲馬甲凖泰之妻瓜勒佳氏以上俱於康熙三十四年旌表正黃旗滿洲馬甲瓜爾佳之妻富察氏鑲藍旗滿洲馬甲富黨阿之妻方佳氏以上俱於康熙三十五年旌表正藍旗滿洲前鋒護軍龍色之妻紇石烈氏康熙三十六年旌表鑲藍旗滿洲前鋒護軍封色之妻完顔氏康熙三十七年旌表鑲黃旗滿洲馬甲噶達琿之妻紇石烈氏鑲黃旗滿洲前鋒軍常錫保之妻納喇氏正白旗滿洲護軍唐久之妻薩克達氏鑲紅旗滿洲前鋒護軍格爾泰之妻瓜勒佳氏鑲紅旗滿洲護軍吳巴里之妻薩克達氏以上俱於康熙三十八年旌表鑲黃旗滿洲弓匠留住之妻洪佳氏正黃旗滿洲親軍溫察之妻舒穆祿氏以上俱於康熙三十九年旌表鑲黃旗滿洲户部員外郎丹泰之妻覺羅氏正黃旗滿洲官學生遂哈之妻馬佳氏正白旗滿洲護軍郭山之妻李佳氏以上俱於康熙四十年旌表鑲黃旗滿洲護軍薩哈亷之妻富察氏正黃旗滿洲馬甲齊史之妻納喇氏正紅旗滿洲官學生白和之妻瓜勒佳氏正藍旗滿洲前鋒護軍布三泰之妻托和羅氏正藍旗滿洲馬甲花色之妻富察氏以上俱於康熙四十一年旌表鑲黃旗滿洲護軍瓦爾逹之妻喀喇氏鑲黃旗滿洲護軍校章樂之妻富察氏鑲黃旗滿洲護軍札勒之妻哥蘇禮氏鑲黃旗滿洲護軍薩哈納之妻納喇氏鑲黃旗滿洲領催赫碩色之妻劉氏正紅旗滿洲護軍薩拉布之妻紇石烈氏正紅旗滿洲筆帖式三寶之妻納喇氏正紅旗滿洲護軍朱通保之妻嚴佳氏正紅旗滿洲護軍希喇布之妻紇石烈氏鑲白旗滿洲護軍吳三泰之妻黃佳氏鑲紅旗滿洲領催雅圗之妻王氏鑲紅旗滿洲馬甲溫拍之妻瓜勒佳氏鑲紅旗滿洲監生玖史之妻赫色勒氏正藍旗滿洲護軍金大立之妻庫雅拉氏正藍旗滿洲筆帖式溫拜之妻伊爾根覺羅氏正藍旗滿洲護軍泰達禮之妻庫雅拉氏正藍旗滿洲前鋒護軍班代之妻寧古塔氏以上俱於康熙四十二年旌表正黃旗滿洲前鋒護軍納什哈之妻舒穆祿氏正黃旗滿洲馬甲鄂色之妻圗薩喇氏正紅旗滿洲筆帖式永愛之妻覺羅氏正藍旗滿洲馬甲碩色之妻司佳氏以上俱於康熙四十三年旌表正白旗滿洲領催山瑚之妻韓氏正白旗滿洲馬甲畢雅克達之妻他塔喇氏鑲紅旗滿洲領催麻色之妻馬佳氏正藍旗滿洲馬甲圗韓泰之妻佟佳氏正藍旗滿洲護軍傳勒和之妻唐佳氏以上俱於康熙四十四年旌表鑲黃旗滿洲護軍瑚顔之妻唐基氏鑲黃旗滿洲八品官哈爾賽之妻覺羅氏鑲黃旗滿洲筆帖式班迪之妻洪氏正黃旗滿洲護軍瑪拉息之妻瓜勒佳氏正白旗滿洲馬甲琿泰之妻黃佳氏正白旗滿洲馬甲丹達禮之妻李佳氏正白旗滿洲護軍費揚古之妻伊爾根覺羅氏正紅旗滿洲馬甲劉保住之妻于氏鑲紅旗滿洲護軍赫碩色之妻瓜勒佳氏鑲紅旗滿洲間散康永祥之妻胡氏以上俱於康熙四十五年旌表鑲黃旗滿洲護軍艾納之妻劉氏正黃旗滿洲領催雅答爾庫之妻馬佳氏正黃旗滿洲護軍富有常之妻李佳氏正黃旗滿洲親軍烏爾泰之妻覺羅氏正黃旗滿洲護軍蘇和之妻瓜勒佳氏正白旗滿洲領催偏色之妻覺羅氏正白旗滿洲雲騎尉郎住之妻覺羅禪氏正白旗滿洲馬甲覺和托之妻瓜勒佳氏鑲白旗滿洲馬甲烏魯孫之妻查庫他氏鑲白旗