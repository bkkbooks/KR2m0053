body:
  text: 人物志一百二十四列女傳四八旗滿洲列女傳二鑲黄旗滿洲馬甲哈布納之妻蘇佳氏正白旗滿洲前鋒敦泰之妻席他喇氏以上俱於康熈二十一年旌表正白旗滿洲前鋒伊特庫之妻烏蘇氏正白旗滿洲馬甲周石之妻佟佳氏正藍旗滿洲領催撥勒庫之妻伊爾根覺羅氏鑲藍旗滿洲閒散業楞額之妻薩瑪喇氏以上俱於康熈二十二年旌表鑲黄旗滿洲馬甲達爾代之妻富察氏康熈二十三年旌表正白旗滿洲筆帖式石圖之妻𤓰勒佳氏正藍旗滿洲三等侍衛賽魯之妻覺羅氏以上俱於康熈二十四年旌表正紅旗滿洲䕶軍雅睦敦之妻鈕祜禄氏正藍旗滿洲䕶軍蘇穆巴喇之妻薩宻勒氏以上俱於康熈二十五年旌表正紅旗滿洲馬甲諾何器之妻𤓰勒佳氏康熈二十六年旌表正白旗滿洲閒散喀竒哈之妻富察氏正白旗滿洲前鋒統領徳爾徳之妻趙氏鑲白旗滿洲領催宏善之妻竒塔拉氏正藍旗滿洲馬甲阿農阿之妻薩克察氏以上俱於康熈二十七年旌表鑲黄旗滿洲阿禮色之妻趙氏正白旗滿洲閒散威赫徳之妻完顔氏正白旗滿洲馬甲色福納之妻劉氏正紅旗滿洲馬甲掇拜之妻𤓰勒佳氏鑲藍旗滿洲馬甲尼什哈之妻紇石烈氏以上俱於康熈二十八年旌表鑲黄旗滿洲一等男尼堪之妻納喇氏正紅旗滿洲馬甲雅孫之妻張佳氏鑲白旗滿洲馬甲朱荷之妻洪葛氏鑲紅旗滿洲領催根特之妻𤓰勒佳氏正藍旗滿洲馬甲拉薩里之妻扎拉里氏鑲藍旗滿洲䕶軍國禮之妻紇石烈氏以上俱於康熈二十九年旌表正紅旗滿洲筆帖式托何齊之妻宏呉氏正藍旗包衣馬甲色本之妻張佳氏以上俱於康熈三十年旌表鑲白旗滿洲筆帖式綽克托之妻𤓰勒佳氏鑲紅旗滿洲前鋒䕶軍馬哈喇之妻王氏鑲紅旗滿洲馬甲和爾岱之妻鄂齊禮氏鑲紅旗滿洲馬甲霍商之妻宏古氏以上俱於康熈三十一年旌表鑲藍旗滿洲馬甲牛鈕之妻𤓰勒佳氏鑲黄旗滿洲䕶軍查慕素之妻張佳氏正黄旗滿洲領催安朱庫之妻𤓰勒佳氏鑲紅旗滿洲䕶軍四格之妻黄佳氏以上俱於康熈三十二年旌表鑲紅旗滿洲䕶軍唐武善之妻穆伊氏正黄旗滿洲䕶軍馬哈納之妻伊爾根覺羅氏正藍旗滿洲䕶軍勒竒之妻伊爾根覺羅氏正藍旗滿洲䕶軍洛起之妻李佳氏正藍旗滿洲馬甲雅圖之妻鈕祜禄氏以上俱於康熈三十三年旌表鑲黄旗滿洲䕶軍霍勒布代之妻納喇氏鑲白旗滿洲間散尼瑪柱之妻𤓰勒佳氏正藍旗滿洲馬甲伊爾哈之妻伊拉理氏正藍旗滿洲馬甲凖泰之妻𤓰勒佳氏以上俱於康熈三十四年旌表正黄旗滿洲馬甲𤓰爾佳之妻富察氏鑲藍旗滿洲馬甲富黨阿之妻方佳氏以上俱於康熈三十五年旌表正藍旗滿洲前鋒䕶軍龍色之妻紇石烈氏康熈三十六年旌表鑲藍旗滿洲前鋒䕶軍封色之妻完顔氏康熈三十七年旌表鑲黄旗滿洲馬甲噶達琿之妻紇石烈氏鑲黄旗滿洲前鋒軍常錫保之妻納喇氏正白旗滿洲䕶軍唐久之妻薩克達氏鑲紅旗滿洲前鋒䕶軍格爾泰之妻𤓰勒佳氏鑲紅旗滿洲䕶軍呉巴里之妻薩克達氏以上俱於康熈三十八年旌表鑲黄旗滿洲弓匠留住之妻洪佳氏正黄旗滿洲親軍温察之妻舒穆禄氏以上俱於康熈三十九年旌表鑲黄旗滿洲户部員外郎丹泰之妻覺羅氏正黄旗滿洲官學生遂哈之妻馬佳氏正白旗滿洲䕶軍郭山之妻李佳氏以上俱於康熈四十年旌表鑲黄旗滿洲䕶軍薩哈亷之妻富察氏正黄旗滿洲馬甲齊史之妻納喇氏正紅旗滿洲官學生白和之妻𤓰勒佳氏正藍旗滿洲前鋒䕶軍布三泰之妻托和羅氏正藍旗滿洲馬甲花色之妻富察氏以上俱於康熈四十一年旌表鑲黄旗滿洲䕶軍瓦爾逹之妻喀喇氏鑲黄旗滿洲䕶軍校章樂之妻富察氏鑲黄旗滿洲䕶軍札勒之妻哥蘇禮氏鑲黄旗滿洲䕶軍薩哈納之妻納喇氏鑲黄旗滿洲領催赫碩色之妻劉氏正紅旗滿洲䕶軍薩拉布之妻紇石烈氏正紅旗滿洲筆帖式三寳之妻納喇氏正紅旗滿洲䕶軍朱通保之妻嚴佳氏正紅旗滿洲䕶軍希喇布之妻紇石烈氏鑲白旗滿洲䕶軍呉三泰之妻黄佳氏鑲紅旗滿洲領催雅圗之妻王氏鑲紅旗滿洲馬甲温拍之妻𤓰勒佳氏鑲紅旗滿洲監生玖史之妻赫色勒氏正藍旗滿洲䕶軍金大立之妻庫雅拉氏正藍旗滿洲筆帖式温拜之妻伊爾根覺羅氏正藍旗滿洲䕶軍泰達禮之妻庫雅拉氏正藍旗滿洲前鋒䕶軍班代之妻寜古塔氏以上俱於康熈四十二年旌表正黄旗滿洲前鋒䕶軍納什哈之妻舒穆禄氏正黄旗滿洲馬甲鄂色之妻圗薩喇氏正紅旗滿洲筆帖式永愛之妻覺羅氏正藍旗滿洲馬甲碩色之妻司佳氏以上俱於康熈四十三年旌表正白旗滿洲領催山瑚之妻韓氏正白旗滿洲馬甲畢雅克達之妻他塔喇氏鑲紅旗滿洲領催麻色之妻馬佳氏正藍旗滿洲馬甲圗韓泰之妻佟佳氏正藍旗滿洲䕶軍傳勒和之妻唐佳氏以上俱於康熈四十四年旌表鑲黄旗滿洲䕶軍瑚顔之妻唐基氏鑲黄旗滿洲八品官哈爾賽之妻覺羅氏鑲黄旗滿洲筆帖式班廸之妻洪氏正黄旗滿洲䕶軍瑪拉息之妻𤓰勒佳氏正白旗滿洲馬甲琿泰之妻黄佳氏正白旗滿洲馬甲丹達禮之妻李佳氏正白旗滿洲䕶軍費揚古之妻伊爾根覺羅氏正紅旗滿洲馬甲劉保住之妻于氏鑲紅旗滿洲䕶軍赫碩色之妻𤓰勒佳氏鑲紅旗滿洲閒散康永祥之妻胡氏以上俱於康熈四十五年旌表鑲黄旗滿洲䕶軍艾納之妻劉氏正黄旗滿洲領催雅答爾庫之妻馬佳氏正黄旗滿洲䕶軍富有常之妻李佳氏正黄旗滿洲親軍烏爾泰之妻覺羅氏正黄旗滿洲䕶軍蘇和之妻𤓰勒佳氏正白旗滿洲領催偏色之妻覺羅氏正白旗滿洲雲騎尉郎住之妻覺羅禪氏正白旗滿洲馬甲覺和托之妻𤓰勒佳氏鑲白旗滿洲馬甲烏魯孫之妻查庫他氏鑲白旗