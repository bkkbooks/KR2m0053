body:
  text: 兵制志十馬政太僕寺馬政直上駟院馬政外省牧馬省營馬八旗牧馬朝謹按我牧有所飼育有方馬政遊太和翔洽物遂孶生凡天閑良驥特立專司皇城諸處分設有内廐外廐其掌於太僕寺者左右南苑上兩翼各牧場掌於遜諾爾等處各牧場馬數計二駟院者上都達布十萬有竒又八旗官馬直省牧馬營馬數亦二十餘萬有竒每嵗孶息之數更不可量逈非唐志之皇上侈稱無實者所可同日而語我畜牧日繁哈薩克天威震叠式廓新疆泉甘土厚諸部落亦嵗嵗貢馬求市洵伊古以來未有如今日之蕃庶者也至若馬數日盈或分往屯田或撥御製給緣邉營伍俾均歸實用伏讀新樂府隂山道篇煌煌聖言真足昭垂萬古謹據於左大清會典則例臚敘馬政太僕寺馬政總管兩翼馬厰大臣兼副都統銜一人太僕寺卿滿漢各一人少卿滿漢各一人掌兩翼牧場均齊賞罰之政左司員外郎滿洲䝉古各一人主事滿洲蒙古各一人掌䭾載幔城網城之駝隻以偹巡幸右司員外郎滿洲䝉古各一人主事滿洲䝉古各一人掌察驗牧場馬匹盈虧以時印烙主簿滿洲一人掌奏章文移筆帖式滿洲蒙古各八人掌繙譯牧場太僕寺左翼四旗牧場在張家口外東北一百四十里哈喇尼敦井東西百五十里南北百三十里東以布奎布拉克為界西以察罕齊老台為界南以都什山為界北以呼什呼蘭台山巴延托羅該為界太僕寺右翼四旗牧場在張家口外西北三百十里齊齊爾漢河東西百五十里南北三十二里東以庫努克托羅該努克圖溝為界西以珠爾台烏克爾齊老為界南以格根達巴敦達哈喇為界北以布爾噶蘇台河南岸為界司牧官役統轄兩翼牧場總管一人兩翼牧場總管二人副管一人防禦二人翼領四人驍騎校三人䕶軍校八人協領十人䕶軍三百十四名馬羣牧長牧副每羣各一人牝馬羣每羣牧丁八名牡馬羣每羣牧丁十四名牧課嵗春季本寺滿堂官一人往口外將馬駒驗騸秋季往口外分撥騸過三嵗之駒入羣三年均齊一次屆期列名奏請欽㸃前往員外郎嵗春季往口外稽察孳生倒斃各數並訓練馬駒逐一印烙秋季往口外驗視肥瘠並訓練馬駒有未印烙及印烙糢糊者補印烙牝馬羣計三年之内每三馬應孳生一駒於孳生額數外多至一百六十匹者為上等八十匹以上者次之八十匹以下者又次之其於孳生額數内少至一百匹或少五十匹以上及五十匹以下者亦分三等牧長牧副丁以是各定其賞罰牡馬羣以在場見牧之數區為十分視其馴習及斃損之多寡以定賞罰至該管協領以上各官統計所管馬羣得賞受罰之等次核計有差上駟院馬政總管院事大臣兼副都統銜一人無定員由特簡院卿二人掌在京内廐外廐及邉外各牧場之政左司郎中一人侍衞員外郎各二人主事一人掌均齊賞罰右司侍衞員外郎各二人主事一人掌各馬廐馬場之俸餉芻菽堂主事二人掌奏章文移筆帖式二十五人掌繙譯侍衞二十一人掌侍直内以八人兼試御馬司鞍長二人司鞍八人司轡二人皇子每位司鞍二人司轡二人内廐外廐内廐設於皇城御馬及副馬川馬各一廐均無定數仗馬一廐七十匹公馬廐廐各二百匹附橐駝十匹駕車馬驘二廐廐各馬五十匹驘五十匹其應差巡羣馬附各廐外廐設於南苑御馬及内馬共六廐内桐馬一羣騰馬四牡馬三十六餘無定數安河公馬一廐二百匹其應差巡羣馬附各廐凡御馬中有不馴者汰入公馬廐日值御馬闕以内廐御馬補内廐御馬闕以外廐御馬補外廐御馬闕簡内馬之良者奏補仗馬及祭神受釐四色馬闕行取大凌河良馬充補川馬闕行崇文門税務駕車驘闕行户部轉行左右翼税務各監督買補駕車馬闕以公馬補公馬及應差巡羣馬闕彚數行各牧羣總管取補内廐外廐司牧官役牧長五人副牧長五人牧副十人牧丁一百名内外廐每廐廐長各一人廐副各二人川馬廐以公馬廐廐長兼管廐丁各二十名草夫御馬廐三十六名副馬廐二十八名仗馬廐三十三名川馬廐十四名公馬五廐各四十四名駕車馬驘二廐各三十二名南苑六廐各二十八名安河公馬廐二十四名共五百八十六名内設百總六人外郎十六人駕車馬驘二廐各設驍騎四十八人醫長䝉古二人醫師䝉古十八人癩醫六人獸醫漢十六人主醫馬駝之疾由院行所司支取藥物嵗終㑹計於次年二月奏銷内外廐牧課凡考牧内外各廐院卿嵗閲一次三年奏遣官察驗一次各具息耗實數以聞惟苑廐挏馬嵗閲積三嵗具奏不議賞罰其各廐孳生統三嵗計以牝馬三生駒一為額數浮者為一等平者二等闕者三等疲瘠及斃損每嵗以百匹内核計以數少數平數多分三等定賞罰有差其出牧嵗四月朔以内外廐公馬四百匹就草張家口外限九月望前視天時凉暖豫奏日期回廐遣侍衞二人率廐長廐副經理出入餘俱於南苑就草出入期如之内廐駝每百匹以五十匹存廐餘就草上都出入期亦如之貢馬䝉古索倫嵗貢馬駝由理藩院具奏送上駟院行知掌試御馬大臣侍衞奏㑹本院官公同選驗不入選者罷還之選受者行廣儲司如例給賞駝發内廐馬發南苑六廐牧養又歸化城兩旗䝉古嵗貢馬喀爾喀哲卜尊丹巴胡圖克圖嵗貢駝馬陜西岷州衞二十四寺畨僧嵗貢馬均由理藩院咨送發各廐芻秣應管之大臣率本院侍衞詣廐驗視辨其堪供御馬内馬公馬之屬列其等次以聞乾隆二十三年之後西域哈薩克巴達克山諸部先後投誠遣使貢馬其尤者則御定嘉名餘皆分入各廐至哈薩克貿易之馬尤夥每年無定額於烏嚕木齊及伊犁廣設牧羣以為新疆駐守各兵之用其贏餘仍發補内地各標營額缺供直馬日以内廐御馬四匹齊其毛色具鞍轡列於院門外凡駐蹕圓明園以御馬六匹立園門右如之直班侍衞司