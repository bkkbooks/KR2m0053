給扈從人等官馬時皆折給銀兩情弊顯然此皆由平素不實力喂養所致而彼時該旗驗放馬匹大臣亦未能察出嗣後著交八旗都統不時稽察再遇朕巡幸放給官馬時預將八旗都統副都統名銜由值年旗彚奏候朕每旗簡派大臣一員十七年奏上年將八旗官馬撥出萬匹交直𨽻各標營並熱河副都統及近京莊頭分頒牧養議俟次年草豆價平仍分與八旗官兵目下京師草豆較上年價值已減此項馬匹或仍交直隸等處或應留京牧養奉㫖此項官馬前交直𨽻各標營牧養脿分既屬充足且聞於該兵丁等亦屬有益著不必交熱河副都統及各莊頭俟回鑾後撥出萬匹皆交與直隸總督仍前分撥牧養十九年奏准八旗官駝照官馬例交與直𨽻宣化府屬分給牧養二十八年定八旗每年出場牧放馬匹派京城副都統二人左右兩翼察哈爾總管各一人侍衞各一人管轄其京城官兵停止派往每馬一千匹編作三羣每羣派察哈爾官一人兵二十名預期來京領馬出口每馬一百匹准倒斃十匹其倒斃止六匹者官交部議敘兵酌量奬賞如倒斃逾額著令官兵賠補至例應倒斃者於省派京城官兵路費銀内買補三十年奏准八旗官馬原係給與官員兵丁拴養因官兵内或將錢糧糜費以致官馬疲瘦併有空缺又值前數年草豆價昻是以將官馬改交直隸牧養旋因八旗前鋒䕶軍暨親丁等乏官馬當差已奉㫖加恩於直隸牧養官馬内撥出四千五百匹交給各該處設立官圈喂養分給兵丁乗騎今查八旗所有印房章京㕘領佐領閑散官滿洲每旗一百餘員蒙古每旗五十餘員左右兩翼所有前鋒章京前鋒侍衞四十員八旗滿洲火器營所有鳥鎗營長䕶軍㕘領六十四員八旗䕶軍營所有䕶軍㕘領二百八十員學習閑散官約計一百員伊等當差不能自養馬匹請再於直隸牧養官馬内撥出二千匹給與三營前鋒䕶軍章京等每人各拴養一匹外八旗滿洲每旗一百匹八旗䝉古每旗五十匹除兼管文職官員外旗員每人分給馬一匹其所存三百餘匹交與前鋒䕶軍統領等將各營學習閑散官暨當差出力之䕶軍校每人分給馬一匹各令其拴養仍令該都統及前鋒統領䕶軍統領等隨時查核諭每年出派察哈爾侍衞前往牧厰時以伊等熟知水草諳練牧放於馬匹有益今聞得察哈爾侍衞至牧厰後但看水草於馬匹事務總不管理甚屬非是著交巴禄傳諭派出察哈爾侍衞等嗣後察哈爾侍衞至牧厰時查看水草外務令馬匹肥壯不致脿欠之處俱令同章京等量其有益妥協辦理永著為例著出厰大臣通行曉諭出厰章京兵丁知之乾隆十六年諭八旗兵丁喂養駝馬需用黒豆甚闗𦂳要現今市價昻貴著將倉貯黒豆撥發八萬石交與八旗減價平糶以平市價該部遵諭速行又諭八旗所拴官駝只有八百餘隻每遇巡幸或有用六七百餘隻不等雖有所餘亦為數無多倘再有行役之處仍用此項駝隻若無輪流歇養之暇必至疲瘦此項官用駝隻馬匹原為旗人拴養若每佐領各多添駱駝一隻拴養於旗人生計既有禆益而一切差役亦覺寛裕嗣後各佐領著再添官駝一隻令其永逺拴養此項添養駝隻或由太僕寺所屬牧放駝隻内取用或應如何添立之處著八旗大臣㑹同該部議奏如此添養後倘再不盡心喂養仍有脿欠疲瘦者惟於該旗大臣等是問五十年諭據總管内務府大臣奏内府䕶軍營額設官馬每遇出青之時請將世職官等停止出派即於䕶軍營内揀派妥員帶領䕶軍前往牧放等語世職官員等既非䕶軍所屬喂養事宜又未諳悉於馬匹實屬無益嗣後内府䕶軍營出青馬匹應如所奏辦理因思八旗圈馬向遇出青係派出之副都統二員監放此項馬匹俱係八旗棚養及䕶軍營官拴之馬今止令副都統二員監視牧放恐亦未能辦理認真或令各該旗添派養馬之官一二員隨同牧放庶可期脿分肥壯不致有名無實但如此辦理是否可行並應如何揀派官員酌定章程之處著阿桂㑹同八旗滿洲䝉古都統詳悉籌酌迅速妥議具奏謹按八旗官馬有官圍馬有官員拴養馬有傳事拴養馬遇出青時官圍馬全行出場牧放拴養馬咸半出場傳事馬概不出場毎年以為定例外省牧馬乾隆元年定甘肅提標西寧鎮標各設馬場一處以遊擊一人統率每場牝牡馬千二百匹分五羣每羣牡馬二百匹牝馬四十匹以千把總一人為牧長外委千把總一人為牧副兵十人為牧丁三年均齊一次屆期總督委官察驗敘明賞罰具題所牧馬不論牝牡每三匹取孳生馬一匹三年内一羣中多孳生馬八十匹以下及八十一匹以上至一百六十匹以上者分三等官議敘陞用兵給賞有差如少孳生額數二十匹以下者官兵即議罰責若於原牧額數缺少者官兵責革罰賠其提鎮遊擊統計五羣之數以定賞罰十三年定甘肅凉州西寧肅州三鎮各設駝場一處每牝牡駝一百六十為一羣每羣以千把總一人為牧長外委千把總一人為牧副兵九人為牧丁仍委守備一人督理五年均齊一次千把總外委兵丁邉地較内地不同五年期逺應議賞以示鼓勵每牝牡駝百五年内孳生四十隻者無庸議賞於額數外多孳生一至十者及至二十與二十一以上者官議敘兵加賞有差其五年内准倒斃二十隻若倒斃逾額不論多寡以續得孳生抵補其餘再計孳生之數如少孳生一以上與十一以上至二十一以上者官兵分别賞罰督理之守備其賞罰亦隨額數上下以為準每屆五年均齊之期由總督委官赴場印烙將各數目及牧放官兵姓名造冊敘明賞罰具題至孳生牝駝於五年均齊後照例配搭孳生其餘牝駝騸割别牧以備撥用四十年定巴里坤東西中三厰牧放馬匹以遊擊都司守備各一人統率每厰馬分五羣每羣以千把總一人為牧長外委一人為牧副按馬二十四匹派兵一名牧放三年期滿總督委員逐厰查驗分晰馬數敘明賞罰具題所牧馬不論牝牡每三匹取孳生馬一匹三年内一羣中除孳生額數外其浮額一百七十六匹以下與一百七十七匹以上及三百五十三匹以上分三等官議敘陞用兵給賞有差如缺額二十匹以下及四十匹以下至八十匹以下亦分三等行罰至統率各官應議賞罰均照各馬厰例核計其孳生盈餘馬匹除分給伊犁各該處足用外仍撥解内地以供協濟直省營馬順治三年定緑旗兵馬一匹每月給料豆六斗草六十束六年定官員騎坐馬皆自備名曰例馬每月照數領草料提督准例馬十五匹總兵官十二匹副將八匹㕘將遊擊六匹都司守備四匹千總把總二匹至兵丁騎操馬酌各營情形或馬步各半或馬四步六或馬三步七或馬二步八或馬一步九或不設馬皆於奏銷案内照實數報兵部察核行知户部銷算草料八年定副將以下把總以上每月于應支銀内扣二錢馬兵扣一錢步兵扣五分守兵扣三分名曰棚扣存貯營中以備買馬之用若有餘剩由兵部覈明于奏銷題交户部充餉乂定營馬係對敵及追捕賊盜損失者免其賠補走脱及竊失者著落本人賠補若倒斃者每馬以十兩為額令其賠補名曰賠樁每年遞減一兩至十年者免賠准動支棚扣銀買補十六年定提督例馬二十匹總兵官十六匹副將十二匹㕘將八匹遊擊以下仍各照舊數康熈三年定江南江西福建浙江湖北湖南四川廣東廣西雲南貴州等省營馬以三年賠樁過三年者免直隸山東山西河南西安甘肅以五年賠樁過五年者免四年定三年賠樁之省一年倒斃本兵賠銀七兩合隊二兩本管官一兩二年倒斃本兵賠銀六兩五錢合隊一兩七錢本管官八錢三年倒斃本兵賠銀六兩合隊一兩四錢本管官六錢三年以後免其賠樁動支朋扣銀買補五年賠樁之省自一年倒斃至三年倒斃之分賠均如三年賠樁之省其四年倒斃本兵賠銀五兩五錢合隊一兩本管官五錢五年倒斃本兵賠銀五兩合隊七錢本管官三錢五年以後免其賠樁動支朋扣銀買補又定廣東地方潮濕馬易倒斃賠樁准照十兩減半一年倒斃賠銀五兩二年倒斃賠銀四兩五錢三年倒斃賠銀四兩三年以後免其賠樁五年定廣西地方瘴濕馬易倒斃賠樁照廣東之例又定營馬倒斃如符年限者准用朋扣銀買補其定價直隸每匹九兩山東十兩山西八兩河南八兩五錢江南十三兩九錢七分江西十六兩八錢二分四釐福建二十二兩浙江十六兩湖北湖南十五兩西安八兩廣東二十一兩九錢廣西二十兩雲南二十一兩八錢貴州二十兩二錢二分有竒甘肅四川除以貢馬抵補外其不敷之馬甘肅每匹給價八兩四川每匹給價十二兩七年定各省朋樁銀兩嵗底兵部查核除應扣外咨户部發餉如有營馬缺額開送户部購買四十五年定直省營馬倒斃遞年加增必致朋扣不敷買補嗣後如倒斃過多實有冐銷情弊該督撫提鎮即行題㕘四十七年定營馬倒斃該管官驗明耳尾將日期出結詳報督撫提鎮一面用朋扣銀買補仍將新馬價值毛齒領騎兵姓名按季冊報仍於年終奏銷由部察覈雍正元年定江南江西福建浙江湖北湖南四川雲南貴州等省營馬騎過三年倒斃者免其賠樁廣東廣西二省減半賠樁騎過三年倒斃者亦免其賠樁直隸山東山西河南西安甘肅等省騎過五年倒斃者免其賠樁均准動支朋扣銀買補七年定官兵朋扣銀有經督撫提鎮題奏撥修船料及軍裝器械並賞號公務之用者均入于奏銷案内由部察照准其開銷又定山西河南西安甘肅四省營馬開報倒斃不得過十分之三十一年定直𨽻山西河南西安甘肅馬價在十兩之内山東亦僅十兩均未便以十兩賠樁應以七兩為額如騎一年倒斃賠樁七兩二年倒斃賠樁六兩以下按年遞減若騎過年限免其賠樁准其動支朋扣銀買補十二年定營馬除口外差遣及在軍前倒斃者皮臓免其變價外江南督標每匹變價一兩五錢提標一兩安徽撫標一兩二錢蘇松撫標九錢二分有竒湖北湖南一兩其餘直省均五錢發給馬價時將皮臓變價扣除于奏銷冊造報察覈又定廣東營馬每年開報倒斃每百匹只准倒十五匹廣西准十七匹其直𨽻山東江南江西浙江福建湖北湖南四川雲南貴州開報營馬倒斃數無一定嗣後均不得過十分之三又定四川營馬將原價減去四兩照驛馬例給以八兩所有賠樁銀照直𨽻等省例以七兩為額按年遞減乾隆元年議准外委千把總領馬即供騎操原未令其存價如遇倒斃入營馬數内開報動支朋扣銀買補十五年定廣東馬價每匹減三兩以十八兩九錢作定價報銷廣西馬價每匹減三兩以十七兩報銷十六年諭滇省各營騎操馬匹定例三年外准報倒十分之三其額外濫倒馬從前該督提等皆於朋扣等項内通融買補並未著賠嗣據該督察出奏聞仍請從寛免其賠樁經軍機大巨等議令照例按數賠補但念邉方水土餧養馬匹與他處情形不同自應通融籌辦今若復令賠樁兵丁未免拮据嗣後滇省馬匹除額定十分倒三按例分别年限著賠外其濫額倒斃馬匹著加恩免賠若兵弁等因有此㫖或致餧養失宜溢倒過多者該督提等嚴行㕘處二十五年議准營馬價值除直𨽻山東山西河南西安甘肅四川等省或僅在十兩以内或據該督撫察核實無溢冒無庸議減福建准以十九兩浙江江蘇安徽准以十四兩江西准以十六兩湖北湖南准以十四兩廣東准以十八兩廣西准以十六兩雲南貴州准以十八兩報銷欽定八旗通志卷四十一
