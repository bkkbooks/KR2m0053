body:
  text: 欽定四庫全書欽定八旗通志卷九十典禮志十三滿洲祭神祭天典禮二坤寧宫月祭儀注神坤寧宫月祭祝辭祭翌日祭天儀注祭神翌日祭天贊辭坤寧宫月祭儀注正月初三日每月初一日坤寧宫祭朝祭神預將鑲紅片金黃縀神幔用黃棉線繩穿繫其上懸挂西山墻所釘之雕龍頭髤金紅漆三角架以淨紙二張各四折鏤錢四挂於神幔兩端舁供佛之髤金小亭連座奉安于南首啓亭門次于神幔上懸菩薩像又次懸關帝神像均于大炕上東向供奉炕上設紅漆大低桌二桌上供香碟三醴酒三盞時果九碟方切灑糕分為十盤以九盤供于桌上一供桌下北首七月供淋漿糕亦如之炕沿下供醴酒一樽樽前鋪黃花紅氊設獻酒長低桌桌上列黃磁大碗二一盛醴酒一空設司爼太監等預于中間屋內鍋前地上設油厚髙麗紙二張進􅊶錫紅漆大桌二西向分為二行各置于油髙麗紙上屆時司香點香司爼太監司爼等進豬二於坤寧宫門外之右首皆奏三絃琵琶之司爼等太監二司爼官司爼八首領太監二以次進三絃琵琶在前次十人分二層排列均向上盤膝坐奏三絃琵琶鳴拍板其後司爼滿洲等屈一膝跪拊掌司祝進于獻酒桌前跪司香舉臺盞授司祝司祝接受獻酒六次每一獻將所獻之酒注于空碗內復自盛醴酒碗內挹新酒注于二盞中以獻每一獻司爼等歌鄂囉羅六次獻畢司祝以臺盞授於司香一叩頭興合掌致敬三絃琵琶拍板暫止司香及司香婦人撤盛酒之二碗並獻酒之桌設司祝叩頭小低桌司香舉神刀授司祝司祝執神刀進司爼等復奏三絃琵琶鳴拍板拊掌司祝一叩頭興司爼等歌鄂囉羅司祝擎神刀禱祝三次誦神歌一次擎神刀禱祝時司爼等復歌鄂囉羅誦神歌三次如前儀如是九次畢司祝跪一叩頭興又禱祝三次以神刀授于司香奏三絃琵琶鳴拍板人等起立避于旁皇帝親詣行禮司香移司祝叩頭小低桌于北首皇帝進于朝祭神位前正中向上立司祝先跪皇帝跪司祝祝畢皇帝行禮興退司祝叩頭興合掌致敬如同皇后行禮皇帝在南皇后在北行禮司爼官司爼等俱出外惟留司爼婦人太監等在內如遇皇帝皇后不行禮之日司祝叩頭畢司香撤佛菩薩前供酒二盞闔供佛小亭門撤菩薩像恭貯于黃漆木筒司爼太監等恭舁供佛小亭並所供二香碟移奉于坤寧宫西楹大亭香碟供于前小亭座移置於後復移神幔稍南位關帝神像于正中所供之酒並香碟皆移正中酒樽用淨袱羃之奏三絃琵琶鳴拍板人等進坐於原處司香婦人斂氊三折之鋪于近炕沿處司香舉臺盞授於司祝司爼太監等舁一豬入門置炕沿下首西向司爼滿洲一人屈一膝跪按其豬司爼官及司爼首領太監內監等奏三絃琵琶鳴拍板拊掌司祝跪于炕沿下三折紅氊上斜向西南舉臺盞獻酒一次司爼等照前歌鄂囉羅獻畢司祝致禱以二盞酒合注一盞中司爼滿洲執豬耳司祝灌酒於豬耳內以臺盞授司香一叩頭三絃琵琶拍板暫止司爼滿洲執豬尾移轉豬首向東司爼太監等進前舁豬暫順放於包錫大桌上司香舉臺盞授司祝司祝接授臺盞舁第二豬入門獻酒灌酒如前儀以􅊶錫大桌上豬二俱令首西向橫放省之每桌前令司爼婦人二舉銀裏木槽盆接血司香婦人撤去氊進紅漆長髙桌設於西炕前以接血木槽盆列髙桌上撤去所供糕酒與果豬氣息後司爼等轉豬首順桌向南直放去其皮按節解開煮於大鍋內其頭蹄及尾俱不去皮惟燎毛燖淨亦煮於大鍋內以臟腑置於錫裏木槽盆舁出另室內整理潔淨舁進以盛血木槽盆就地安置司爼滿洲一人進於髙桌前屈一膝跪灌血於腸亦煮鍋內司爼太監等置皮於盛皮木槽盆內撤去􅊶錫大桌二及油厚髙麗紙仍以膽與蹄甲貯紅漆小木碟內置於炕上所設之大低桌北首邉上候肉熟時細切胙肉一碗設筋一雙供于大低桌正中以二豬之肉分置二銀裏木槽盆內前後腿分設四角胸膛向前尾樁向後肋列兩旁合湊畢置豬首于上復以臁胋連油整置於鼻柱上供於神位前長髙桌司香點香司香婦人鋪黃花紅氊一司香舉醴酒碗一司香舉空碗齊進拱立又一司香舉臺盞授司祝司祝進跪獻酒三次是獻也凡獻酒换盞注酒及司爼太監等奏三絃琵琶司爼等鳴拍板司爼滿洲拊掌歌鄂囉羅三次俱如前儀三獻畢以臺盞授于司香叩頭興合掌致敬皇帝皇后親詣行禮如前儀神肉前叩頭畢撤下祭肉不令出户盛于盤內于長桌前按次陳列或皇帝率皇后受胙或率王大臣等食肉之處請旨遵行如遇皇帝不受胙之日令值班大臣侍衛等進內食之食畢司爼太監等撤去皮骨皮油送交膳房其骨膽蹄甲司爼官送潔淨處化而投之于河隨將神幔收捲其所挂紙錢存貯月終貯髙麗紙囊內除夕送赴堂子與堂子內所挂淨紙及神杆同化之所有關帝神像恭貯于紅漆木筒其供佛小亭恭貯菩薩像木筒及二香碟仍移奉西楹以小亭安奉於亭座之上菩薩像關帝神像二筒安奉於西山墻繪花紅漆抽屉桌上供香碟三于桌之東邉其夕祭神儀預將鑲紅片金青縀神幔繫于黑漆架上用黃色皮條穿大小鈴七枚繫樺木桿梢懸于架梁之西恭請穆哩罕神自西按序安奉架上畫像神安奉于神幔正中設蒙古神座於左皆于北炕南向炕上設紅漆大低桌二香碟五醴酒五盞時果九碟以灑糕如前分為十盤其九盤供于桌上一供桌下西邉炕沿下供醴酒一樽未進豬之前恭請佛菩薩像並二香碟供于西楹大亭預令司爼太監等鋪油紙設桌俱如朝祭儀屆時進豬置於常放之處司香點香司香婦人以司祝祝禱時所坐黑漆杌置神位前司爼太監以鼓連架近杌安置司祝繫閃縀裙束腰鈴執手鼓進于神位前司爼太監二進西向立一太監擊鼓一太監鳴拍板司祝先向神位坐于杌上擊手鼓誦請神歌祈請擊鼓太監一手擊鼓一點以和手鼓司祝拱立初次向後盤旋蹡步祝禱擊鼓太監雙手擊鼓三點以和手鼓司祝復盤旋蹡步前進祝禱擊鼓太監雙手擊鼓五點以和手鼓司祝拱立初次誦請神歌擊鼓五點拍板三鳴以和之二次向後向前盤旋蹡步祝禱惟擊鼓七點司祝拱立誦神歌以禱仍擊鼓五點拍板三鳴三次禱祝亦惟擊鼓十一點司祝拱立三次誦神歌以禱擊鼓四點末以雙槌交擊一次拍板仍三鳴以和之三次誦神歌禱畢司祝祝禱時惟擊鼓四點三鼓而止退司祝以手鼓授司香婦人釋閃縀裙腰鈴司香婦人鋪黃花紅氊皇帝親詣行禮司香婦人移置司祝叩頭小低桌于四首皇帝進于夕祭神位前正中向上立司祝先跪祝畢皇帝行禮如朝祭儀如同皇后行禮皇帝在東皇后在西行禮如遇皇帝皇后不行禮之日司祝叩頭畢酒樽以淨袱羃之司香婦人斂氊三折之鋪于近炕沿處置醴酒一碗空盞一于炕沿上司爼太監等舁豬入門置炕沿下首北向司爼滿洲一人屈一膝跪按其豬司祝跪于炕沿下三折紅氊上斜向東北從盛酒碗內挹酒注于盞中舉捧禱祝司爼滿洲執豬耳司祝灌酒于豬耳內以盞置炕沿一叩頭司爼滿洲執豬尾移轉豬首向南司爼太監等進前舁豬暫順放于􅊶錫大桌上司祝跪從酒碗內挹酒注于盞中舁第二豬入門仍如前儀獻酒禱祝灌酒畢一叩頭興退置豬于􅊶錫大桌上二豬俱令首西向省之每桌前令司爼婦人二舉銀裹木槽盆接血司香婦人撤去氊進紅漆長髙桌設于北炕前以接血木槽盆列長髙桌上撤去大低桌上所供之糕留一盤其餘糕酒與果亦俱撤去豬氣息後司爼等轉豬首順桌向南直放其去皮節解灌血腸煮肉以及撤出􅊶錫大桌油紙等件俱如朝祭儀惟膽與蹄甲於竈內化之俟肉熟時細切胙肉五碗每碗設筯一雙供于炕上二大低桌之上以二豬之肉分置于二銀裏木槽盆如朝祭儀供于神位前長髙桌司香點香司香婦人鋪黃花紅氊司祝進跪祝叩頭合掌致敬司香婦人收氊以司祝所坐之杌置夕祭常放處又設小桌小腰鈴列于桌上神鈴置于桌之東撤去香碟內火並燈掩竈內火展背燈青綢幕蔽之衆俱退出闔户擊鼓太監以鼓移幕前近處司祝坐于杌上初次誦神歌向神鈴祈請時擊鼓四點又雙槌交擊一次拍板三鳴以和之次司祝執鈴桿振鈴誦神歌以禱鼓擊五點拍板三鳴以和之司祝置神鈴初次誦神歌向腰鈴祈請鼓擊四點又雙槌交擊一次拍板三鳴以和之司祝搖腰鈴誦神歌以禱鼓擊五點拍板三鳴以和腰鈴之聲禱畢擊鼓三點柏板一鳴而止捲起背燈神幕開户移入燈火撤祭肉送交膳房恭請佛菩薩像並二香碟仍安奉西楹原位二香碟亦供于原處收捲神幔撤夕祭神畫像並蒙古神穆哩罕神俱恭貯于紅漆匣內安奉于北墻花黑漆抽屉桌上供香碟五于桌之南邉如為皇子祭祀皇子叩頭則司祝禱祝皇子叩頭如皇子不叩頭則司祝禱祝叩頭皇子未分府前居住别室即于所住之正室內恭請神位朝祭則懸幔供奉佛亭夕祭則繫幔於架供奉神座以祭之朝祭未進豬之前請出二香碟供于祭室外之西山墻廊下亭內撤出皮骨後仍請入供于安奉朝祭神位之紅漆抽屉桌上夕祭除不請出香碟外俱如坤寧宫祭儀凡諸王貝勒貝子公等以及宗室覺羅並伊爾根覺羅錫林覺羅姓之滿洲等俱如此儀祭之正月初三日每月初一日坤寧宫朝祭誦神歌禱祝辭上天之子佛及菩薩大君先師三軍之帥關聖帝君某年生小子某年生小子為某人祭則呼某人本生年今敬祝者豐于首而仔于肩衛于後而護于前畀以嘉祥兮齒其兒而髮其黃兮年其增而歲其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮朝祭灌酒于豬耳禱辭上天之子三軍之帥關聖帝君某年生小子某年生小子為某人祭則呼某人本生年敬獻粢盛嘉悅以享兮朝祭供肉祝辭上天之子三軍之帥關聖帝君某年生小子某年生小子為某人祭則呼某人本生年今敬祝者豐于首而仔于肩衛于後而護于前畀以嘉祥兮齒其兒而髮其黃兮年其增而歲其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮夕祭坐于杌上誦神歌祈請辭自天而降阿琿年錫之神與日分精年錫之神年錫惟靈安春阿雅喇穆哩穆哩哈納丹岱琿納爾琿軒初恩都哩僧固拜滿章京納丹威瑚哩恩都蒙鄂樂喀屯諾延某年生小子某年生小子為某人祭則呼某人本生年今敬祝者豐于首而仔于肩衛于後而護于前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮初次誦神歌禱辭納丹岱琿納爾琿軒初某年生小子某年生小子為某人祭則呼某人本生年今敬祝者豐于首而仔于肩衛于後而護于前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮二次誦神歌禱辭恩都哩僧固僧固恩都哩某年生小子某年生小子為某人祭則呼某人本生年今敬祝者豐于首而仔于肩衛於後而護于前畀以嘉祥兮齒其兒而髮其黃兮年其增而歲其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮末次誦神歌禱辭拜滿章京納丹威瑚哩恩都蒙鄂樂喀屯諾延某年生小子某年生小子為某人祭則呼某人本生年今敬祝者豐于首而仔于肩衛于後而護于前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮誦神歌禱祝後跪祝辭上天之子年錫之神安春阿雅喇穆哩穆哩哈納丹岱琿納爾琿軒初恩都哩僧固拜滿章京納丹威瑚哩恩都蒙鄂樂喀屯諾延某年生小子某年生小子為某人祭則呼某人本生年今敬祝者豐于首而仔