body:
  text: 人物志九十八忠義𫝊十滿洲八旗十九年共一百六十五人雍正六年至宗室五海宗室五海任䕶軍校署副䕶軍叅領雍正七年選充車騎營隨靖邊大将軍公傅爾丹由北路進𠞰準噶爾九年六月二十八日至和通胡爾哈諾爾猝遇伏發力戰道隘不得前歿於陣賞䘏如例邦古立邦古立滿洲鑲黄旗人任驍騎校雍正八年出征嘎思於是年十二月隨𠞰卡倫力戰陣亡賞䘏如例赫成赫成滿洲鑲黄旗人姓𤓰勒佳氏世居哈達地方雍正七年以䕶軍校隨靖邊大将軍内大臣公傅爾丹由北路進𠞰準噶爾九年六月於和通胡爾哈諾爾擊賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表務庫務庫滿洲鑲黄旗人任前鋒藍翎長於雍正七年隨靖邊大將軍公傅爾丹征準噶爾九年六月二十八日至和通胡爾哈諾爾擊賊陣亡賞䘏如例瑪照瑪照滿洲鑲黄旗人姓舒穆祿氏世居渾春雍正七年以署叅領隨靖邊将軍公傅爾丹征準噶爾九年至和通胡爾哈諾爾擊賊歿於陣恩賜雲騎尉世職承襲詳見世職表保定保定滿洲鑲黄旗人姓章佳氏世居烏喇地方部委副䕶軍校雍正七年六月隨靖邊将軍公傅爾丹征準噶爾九年六月遇賊於和通胡爾哈諾爾地方力戰陣亡賞䘏如例七十六七十六滿洲鑲黄旗人姓納喇氏世居張尼地方雍正七年隨靖邊大将軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡賜祭一次恩賜雲騎尉世職承襲詳見世職表福受福受滿洲鑲黄旗人姓佟佳氏世居加哈地方任䕶軍校雍正七年隨靖邊大将軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾賊兵設伏拒敵福受力戰陣亡賜祭一次恩賜雲騎尉世職承襲詳見世職表徳福受徳福受滿洲鑲黄旗人姓鄂爾葛氏世居薩哈連烏喇鄂爾葛村地方由驍騎校陞閒散章京雍正七年以部委叅領隨靖邊大将軍内大臣公傅爾丹由北路進𠞰準噶爾九年六月於和通胡爾哈諾爾擊賊力戰陣亡賜祭𦵏恩賜雲騎尉世職承襲詳見世職表安啟安啟滿洲鑲黄旗人姓富爾庫魯氏世居松花江任叅領雍正七年隨靖邊大将軍公傅爾丹由北路進𠞰準噶爾九年至和通胡爾哈諾爾猝遇伏賊力戰援絶歿於陣恩賜雲騎尉世職承襲詳見世職表徳明徳明滿洲鑲黄旗人姓勒第氏世居薩哈連地方任二等侍衛雍正七年隨靖邊大将軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡賜祭一次恩賜雲騎尉世職承襲詳見世職表達色達色滿洲鑲黄旗人姓完顔氏世居英額成地方任䕶軍校雍正七年隨靖邊大將軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表常存常存滿洲鑲黄旗人姓薩哈達氏世居薩克達地方任䕶軍校雍正七年隨靖邊大将軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡賜祭一次恩賜雲騎尉世職承襲詳見世職表安㤗安泰滿洲鑲黄旗人姓伊爾根覺羅氏世居洛里村地方任䕶軍校雍正七年隨靖邊大将軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡賜祭一次恩賜雲騎尉世職承襲詳見世職表戴豪戴豪滿洲鑲黄旗人姓戴佳氏世居渾郭一等侍衛副都統海清之第三子也幼充侍衛入值禁廷後累任至副都統雍正七年靖邊大将軍公傅爾丹率師由北路進𠞰準噶爾戴豪以副都統叅贊軍務身在行間竭忠盡謀九年六月進至和通胡爾哈諾爾地方賊兵設伏拒戰勢甚盛戴豪殁於陣賜祭葬如典禮恩賜騎都尉世職承襲詳見世職表郎保郎保滿洲鑲黄旗人姓鈕鈷禄氏曾祖朝哈爾果毅公額亦都巴圖魯第十三子也崇徳七年戰殁贈二等輕車都尉世職自有𫝊祖額黒里襲仕至工部尚書加爵一等男卒父英素降襲三等男旋晉二等康熙三十六年卒郎保降為三等男仕至散秩郎雍正七年征準噶爾隨靖邊大将軍公傅爾丹由北路進𠞰九年六月遇賊於和通胡爾哈諾爾郎保奮戰殁於陣事聞賜祭𦵏恩賜雲騎尉世職承襲詳見世職表錫宻賚錫密賚滿洲鑲黄旗人姓鄂諾氏世居薩哈連烏喇累任至副都統雍正七年隨靖邊大将軍公傅爾丹由北路進𠞰準噶爾九年六月至和通胡爾哈諾爾賊伏兵山谷間錫密賚率兵前擊奮勇血戰殁於陣事聞賜祭𦵏恩賜騎都尉世職承襲詳見世職表馬爾齊馬爾齊滿洲鑲黄旗人姓扎庫塔氏世居噶哈里地方仕至歸化城副都統雍正七年隨靖邊大将軍公傅爾丹進征凖噶爾哈諾爾九年六月賊伏兵於和通胡爾哈諾爾馬爾齊率兵薄之徃來衝突賊陣奮勇為一軍冠遂歿於陣事聞賜祭𦵏恩賜騎都尉世職承襲詳見世職表按達海按達海滿洲鑲黄旗人姓鄂穆它氏世居尼瑪察地方任䕶軍校雍正七年隨靖邊大将軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡賜祭一次恩賜雲騎尉世職承襲詳見世職表額什特額什特滿洲鑲黄旗人姓𤓰勒佳氏世居遼河地方任長鎗營䕶軍校雍正七年隨靖邊大将軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡賜祭一次恩賜雲騎尉世職承襲詳見世職表理興理興滿洲鑲黄旗人姓章佳氏世居烏喇地方任前鋒校雍正七年隨靖邊大将軍内大臣公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡賜祭一次恩賜雲騎尉世職承襲詳見世職表依㤗依泰滿洲鑲黄旗人姓李佳氏世居扎庫木必拉賀倫霍羅地方部委䕶軍校雍正七年隨靖邊大将軍公傅爾丹征準噶爾九年六月遇賊於和通胡爾哈諾爾地方力戰陣亡賞䘏如例黒達色黒達色滿洲鑲黄旗人姓扎魯特氏世居察哈爾地方襲父常禄雲騎尉職厯任副叅領雍正七年從靖邊大将軍公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾遇賊力戰殁於陣賜祭𦵏恩賜騎都尉世職承襲詳見世職表丹泰丹泰滿洲鑲黄旗人任䕶軍校雍正九年隨靖邊大将軍公傅爾丹征準噶爾六月至和通胡爾哈諾爾猝遇伏賊力戰殁於陣賞䘏如例赫爾布赫爾布滿洲鑲黄旗人由領催委署驍騎校駐防盛京雍正九年六月隨靖邊大将軍公傅爾丹征準噶爾遇賊於和通胡爾哈諾爾地方力戰陣亡賞䘏如例妞妞妞妞滿洲鑲黄旗人由領催部委驍騎校駐防右衛雍正九年隨靖邊大将軍公傅爾丹征準噶爾遇賊於和通胡爾哈諾爾地方力戰陣亡賞䘏如例兆塔兆塔滿洲鑲黄旗人由驍騎校部委叅領駐防寧古塔雍正九年隨靖邊大将軍公傅爾丹征準噶爾遇賊於和通胡爾哈諾爾地方力戰陣亡賞䘏如例黒達子黒達子滿洲鑲黄旗人世襲輕車都尉任副叅領雍正九年隨大将軍公傅爾丹征準噶爾至和通胡爾哈諾爾力戰陣亡賞䘏如例額爾登布額爾登布滿洲鑲黄旗人以部委䕶軍校於雍正七年六月隨靖邊大将軍公傅爾丹征準噶爾九年六月遇賊於和通胡爾哈諾爾地方力戰陣亡賞䘏如例舒申舒申滿洲正黄旗人累官郎中雍正六年派往軍前坐臺突遇準噶爾賊來奪我臺站舒申隻身力戰陣亡恩賜雲騎尉世職承襲詳見世職表馬爾薩馬爾薩滿洲正黄旗人姓瓜勒佳氏昭勲公圗賴曾孫初襲雲騎尉祖費揚古之世職也尋遷佐領又授鑾儀衛整儀尉以次擢雲麾使冠軍使出為張家口牛羊羣總管康熙五十九年陞滿洲正紅旗副都統六十一年陞正黄旗都統管内大臣事雍正三年罷七年起為察哈爾縂管尋奉命為䕶軍統領駐劄克拜達里地方八年擢内大臣叅贊靖邊大将軍公傅爾丹軍務九年擊準噶爾於和通胡爾哈諾爾力戰歿於陣恩賜騎都尉兼一雲騎尉世職世襲詳見世職表冷格冷格滿洲正黄旗人姓鐸爾衮氏世居愛滹和屯地方累官至一等侍衛雍正八年隨奮威大将軍公岳鍾琪由西路進𠞰準噶爾冷格為前哨捉生至噶爾斯地方遇賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表和溥和溥滿洲正黄旗人姓赫舍里氏世居葉赫地方康熙六十年辛丑科與兄和浩中同榜進士授刑部主事雍正七年世宗憲皇帝命内大臣公傅爾丹為靖邊大将軍檢選才能司員隨往和溥與焉九年六月至和通胡爾哈諾爾我兵轉戰連日和溥奮不顧身衝殺力竭遂殁於陣賜祭𦵏銀二百五十兩恩賜雲騎尉世職承襲詳見世職表舒楞格舒楞格滿洲正黄旗人姓舒穆禄氏初由䕶軍仕為藍翎侍衛遷三等侍衞累遷至一等轉䕶軍叅領陞正紅旗漢軍副都統兼管吏部侍郎事雍正八年六月奉命同阿爾泰進征準噶爾九年六月率右衛兵擊賊遇於和通胡爾哈諾爾舒楞格奮戰歿於陣恩賜騎都尉世職承襲詳見世職表永國永國滿洲正黄旗人姓巴岳特氏世居阿蒲凱由官學生考授内務府筆帖式尋調補理藩院筆帖式雍正元年授本院主事尋陞員外郎二年擢本院郎中五年陞内閣侍讀學士七年陞盛京禮部侍郎未之任會靖邊大將軍公傅爾丹統兵由北路進𠞰凖噶爾詔以内閣學士銜隨䕶大将軍印務九年與賊遇於和通胡爾哈諾爾地方我兵轉戰連日永國歿於陣恩賜騎都尉世職承襲詳見世職表阿蔵阿蔵滿洲正黄旗人署䕶軍校雍正七年隨靖邊大将軍公傅爾丹由北路進𠞰準噶爾九年遇賊於和通胡爾哈諾爾力戰陣亡賞䘏如例查什查什滿洲正黄旗人姓巴岳特氏世居克爾倫地方由領催署驍騎校駐防右衛雍正七年隨靖邊大将軍公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾地方與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表徳寧徳寧滿洲正黄旗人任䕶軍校雍正七年隨靖邊大將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾遇賊戰歿賞䘏如例瑚山瑚山滿洲正黄旗人姓那喇氏世居葉赫任前鋒校雍正九年従靖邊大将軍内大臣公傅爾丹率兵由北路進𠞰準噶爾至和通胡爾哈諾爾遇賊戰殁賞䘏如例阿林阿林滿洲正黄旗人姓瓜勒佳氏世居哈達地方任前鋒校雍正九年隨靖邊大将軍内大臣公傅爾丹征準噶爾六月至和通胡爾哈諾爾奮勇殺賊陣亡恩賜雲騎尉世職承襲詳見世職表瑪爾圗瑪爾圗滿洲正黄旗人姓瓜勒佳氏世居蘇完地方任驍騎校雍正九年隨靖邊大将軍内大臣公傅爾丹征準噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表莫爾渾莫爾渾滿洲正黄旗人由領催署驍騎校雍正九年隨靖邊大将軍公傅爾丹征準噶爾六月至和通胡爾哈諾爾猝遇伏賊奮勇力戰殁於陣賞䘏如例哲爾布哲爾布滿洲正黄旗人姓瓜勒佳氏世居蘇完任䕶軍校雍正九年隨靖邊大將軍内大臣公傅爾丹征準噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表沙納海沙納海滿洲正黄旗人姓伊爾根覺羅氏世居佛阿拉地方任驍騎校雍正九年隨靖邊大将軍内大臣公傅爾丹征準噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表博爾屯博爾屯滿洲正黄旗人任防禦署叅領駐防盛京雍正九年六月隨将軍前鋒統領定夀征準噶爾至和通胡爾哈諾爾猝遇伏賊奮勇力戰歿於陣賞䘏如例新安新安滿洲正黄旗人任雲騎尉署叅領分防右衛雍正九年隨靖邊大将軍公傅爾丹征準噶爾九年六月至和通胡爾哈諾爾猝遇伏賊争先陷陣阻隘無援歿於陣恩賜騎都尉世職承襲詳見世職表騷達色騷達色滿洲正黄旗人姓富察氏世居訥殷江地方前鋒校委署䕶軍叅領雍正九年隨靖邊大將軍内大臣公傅爾丹征準噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表圗䕶