body:
  text: 典禮志二八旗朝儀附王公相見回避等儀一朝期順治八年三月定王以下輔國公以上一月三次大朝照常集午門內諸王朝房其五日朝期集太和門順治九年定凡八旗武職官員大節及常朝日上朝外每月初一初十二十日具補服于午門外分翼坐班如遇皇帝巡幸除朝期外每日于午門外分翼坐班止用常服又題準王貝勒貝子公大臣凡遇恩賞俱於每月常朝日進內行禮一朝位康熙元年定大朝及常朝日齊集親王世子郡王長子貝勒貝子入八分公鎮國公輔國公在丹陛上序立東西各二班親王郡王貝勒為一班貝子入八分公為二班公侯伯都統子尚書第一班護軍統領副都統前鋒統領侍郎男步軍翼尉大九卿第二班一等侍衛護衛參領輕車都尉步軍協尉小九卿郎中第三班二等侍衛護衛騎都尉佐領員外郎科道官第四班三等侍衛護衛雲騎尉鳴贊官主事步軍校第五班護軍校驍騎校博士筆帖式第六班其坐次各照職銜不論加級十六年題準每月常朝期及大節齊集滿員公侯伯鎮國將軍都統尚書左都御史子及凡一品官第一班輔國將軍護軍統領前鋒統領步軍統領副都統侍郎學士左副都御史通政使大理寺卿詹事府詹事男及凡二品官第二班奉國將軍步軍翼尉長史參領一等侍衛護衛太常寺卿太僕寺卿光祿寺卿祭酒通政副使大理寺少卿少詹督捕理事官侍讀學士侍講學士侍讀侍講庶子諭德洗馬鴻臚寺卿郎中給事中監察御史太常寺少卿太僕寺少卿輕車都尉及凡三品官第三班步軍協尉佐領司儀長二等侍衛護衛欽天監監正內閣侍讀司業光祿寺少卿鴻臚寺少卿通政使司參議中允員外郎騎都尉及凡四品官第四班三等侍衛護衛雲騎尉步軍校贊善欽天監監副太常寺寺丞主事大理寺寺正光祿寺署正都察院經厯及凡五品官第五班護軍校驍騎校通政使司知事大理寺評事鳴贊官司務司庫等各職掌官及凡六品官六品筆帖式第六班七品官七品筆帖式第七班八品官八品筆帖式第八班九品官第九班乾隆十六年重定百官班次皆依品序列正從一品為一班二品為二班遞至九品分為九班至翰林詹事為文學侍從之臣少詹事侍讀學士侍講學士仍舊列三班庶子侍讀侍講洗馬國子監祭酒改列四班中允贊善司業編修檢討庶吉士改列五班其京營武職朝班及外省提鎮等官遇事入朝照康熙二十二年所定直省行禮班位提督二班總兵官三班副將參將四班逰擊五班守備六班千總等官七班均附於右翼各班之末一王公等入朝隨從順治九年定凡王公等進午門親王隨護衛六員世子郡王五員郡王長子貝勒四員貝子三員公二員民公侯伯都統子護軍統領副都統尚書侍郎許隨人役一名其餘不許隨從又定親王以下貝勒以上進宫門隨護衛一員貝子以下不許隨進康熙元年題準凡親王以下公以上進午門時順治九年例如詣御前止許隨護衛一員六年題準親王郡王進午門時止許隨護衛二員貝勒以下公以上許隨護衛一員二十二年題準親王以下公以上進午門時隨從人數仍照順治九年例如詣御前王貝勒年未滿十六歲者許隨護衛二員一稽查雍正三年八月議準紫禁城內各門一應看守之處甚屬緊要今在內行走諸王大臣官員及各執事人等仍照常令在景運門隆宗門後左門出入其後右門原係膳房茶房及應行走之執事人等出入之門亦應仍照舊例其餘不許出入令該班大臣官員問明其不應出入者即行攔阻如有奏事大臣等帶領間人行走而該班大臣官員等不行稽查致有混入者將帶入之大臣及該班之大臣章京護軍校護軍等一併治罪再皇上躬祭壇廟及升殿之日一應執事人等俱於五鼓入內伺候夤夜之際無憑稽查俱令各該管人等帶入其部院大臣官員原從後左門出入仍令侍衛等隨入其內閣兵部理藩院官員及兼理部務在內行走之王大臣處回事官員等仍照舊例令在景運門隆宗門出入左翼門右翼門昭德門貞度門此四門除官員執事人等行走外跟隨之家人一概不許行走如有違禁擅入者將家人之主及該班之章京護軍校護軍等一併治罪倘看守之人怠玩不行查問致百間人混入者經臣等查出將該班章京護軍校護軍等各交該部從重治罪雍正十二年九月題準凡遇皇上親祭壇廟令每旗於參領內派能管轄者二人令其查認各旗齊集官員又每翼再派監察御史二員查旗侍衛章京二員令其稽查十二年十一月題準景運門隆宗門實為要地嗣後除內廷行走之王貝勒貝子宗室公等仍準其行走外其餘王貝勒貝子宗室公等俱令由後左門出入親王以下宗室公以上仍照前準帶跟隨人其大臣等跟隨之人槩不準入其乾清門侍衛奏事批本人員領侍衛內大臣散秩大臣值班侍衛茶飯房並預備弓箭持傘人及打牲執事人等侍衛筆帖式內務府大臣官員筆帖式鑾儀衛大臣官員再現今辦理軍機事務大臣官員等俱令由景運門隆宗門後左門行走外其部院八旗大臣官員俱令由後左門行走俟命下之日通行傳諭令各處將應行走人等職名開寫行文景運門值班大臣處登記檔案查對準行如司門人等不行詳查仍令混行出入將值班之大臣官員以及護軍人等一併交部從重治罪乾隆三年定每月八旗官員坐班禮部兵部各派司員二人稽察六年奏準每逢朝期八旗官員除有公事外不赴朝班者稽察御史會同該部將官員過少旗分察明緣由指參交部察議王公回避儀欽差及賫捧敕旨或欽賜恩賞者遇王等於道及過王府門不下馬其王公官員等相遇或讓道或回避禮各不同崇德元年定親王出行郡王遇讓道行貝勒遇執事回避讓道旁行貝子鎮國公固倫額駙和碩公主額駙遇勒馬鞠躬側立道旁候