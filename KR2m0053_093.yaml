body:
  text: 典禮志二八旗朝儀附王公相見迴避等儀一朝期順治八年三月定王以下輔國公以上一月三次大朝照常集午門内諸王朝房其五日朝期集太和門順治九年定凡八旗武職官員大節及常朝日上朝外每月初一初十二十日具補服扵午門外分翼坐班如遇皇帝巡幸除朝期外每日扵午門外分翼坐班止用常服又題准王貝勒貝子公大臣凡遇恩賞俱於每月常朝日進内行禮一朝位康熙元年定大朝及常朝日齊集親王世子郡王長子貝勒貝子入八分公鎮國公輔國公在丹陛上序立東西各二班親王郡王貝勒為一班貝子入八分公為二班公侯伯都統子尚書第一班䕶軍統領副都統前鋒統領侍郎男歩軍翼尉大九卿第二班一等侍衛䕶衛參領輕車都尉歩軍協尉小九卿郎中第三班二等侍衛䕶衛騎都尉佐領員外郎科道官第四班三等侍衛䕶衛雲騎尉鳴賛官主事歩軍校第五班䕶軍校驍騎校博士筆帖式第六班其坐次各照職銜不論加級十六年題准每月常朝期及大節齊集滿員公侯伯鎮國将軍都統尚書左都御史子及凡一品官第一班輔國将軍䕶軍統領前鋒統領歩軍統領副都統侍郎學士左副都御史通政使大理寺卿詹事府詹事男及凡二品官第二班奉國将軍歩軍翼尉長史叅領一等侍衛䕶衛太常寺卿太僕寺卿光禄寺卿祭酒通政副使大理寺少卿少詹督捕理事官侍讀學士侍講學士侍讀侍講庶子諭徳洗馬鴻臚寺卿郎中給事中監察御史太常寺少卿太僕寺少卿輕車都尉及凡三品官第三班歩軍恊尉佐領司儀長二等侍衛䕶衛欽天監監正内閣侍讀司業光禄寺少卿鴻臚寺少卿通政使司叅議中允員外郎騎都尉及凡四品官第四班三等侍衛䕶衛雲騎尉歩軍校賛善欽天監監副太常寺寺丞主事大理寺寺正光禄寺署正都察院經厯及凡五品官第五班䕶軍校驍騎校通政使司知事大理寺評事鳴賛官司務司庫等各職掌官及凡六品官六品筆帖式第六班七品官七品筆帖式第七班八品官八品筆帖式第八班九品官第九班乾隆十六年重定百官班次皆依品序列正從一品為一班二品為二班遞至九品分為九班至翰林詹事為文學侍從之臣少詹事侍讀學士侍講學士仍舊列三班庶子侍讀侍講洗馬國子監祭酒改列四班中允賛善司業編修檢討庶吉士改列五班其京營武職朝班及外省提鎮等官遇事入朝照康熙二十二年所定直省行禮班位提督二班總兵官三班副将叅将四班逰擊五班守備六班千總等官七班均附於右翼各班之末一王公等入朝隨從順治九年定凡王公等進午門親王隨䕶衛六員世子郡王五員郡王長子貝勒四員貝子三員公二員民公侯伯都統子䕶軍統領副都統尚書侍郎許隨人役一名其餘不許隨從又定親王以下貝勒以上進宫門隨䕶衛一員貝子以下不許隨進康熙元年題准凡親王以下公以上進午門時順治九年例如詣御前止許隨䕶衛一員六年題准親王郡王進午門時止許隨䕶衛二員貝勒以下公以上許隨䕶衛一員二十二年題准親王以下公以上進午門時隨從人數仍照順治九年例如詣御前王貝勒年未滿十六歳者許隨䕶衛二員一稽查雍正三年八月議准紫禁城内各門一應看守之處甚属𦂳要今在内行走諸王大臣官員及各執事人等仍照常令在景運門隆宗門後左門出入其後右門原係膳房茶房及應行走之執事人等出入之門亦應仍照舊例其餘不許出入令該班大臣官員問明其不應出入者即行攔阻如有奏事大臣等帶領閒人行走而該班大臣官員等不行稽查致有混入者将帶入之大臣及該班之大臣章京䕶軍校䕶軍等一併治罪再皇上躬祭壇廟及陞殿之日一應執事人等俱於五鼔入内伺候夤夜之際無憑稽查俱令各該管人等帶入其部院大臣官員原從後左門出入仍令侍衛等隨入其内閣兵部理藩院官員及兼理部務在内行走之王大臣處回事官員等仍照舊例令在景運門隆宗門出入左翼門右翼門昭徳門貞度門此四門除官員執事人等行走外跟隨之家人一㮣不許行走如有違禁擅入者将家人之主及該班之章京䕶軍校䕶軍等一併治罪倘看守之人怠玩不行查問致百閒人混入者經臣等查出将該班章京䕶軍校䕶軍等各交該部從重治罪雍正十二年九月題准凡遇皇上親祭壇廟令毎旗於叅領内派能管轄者二人令其查認各旗齊集官員又每翼再派監察御史二員查旗侍衛章京二員令其稽查十二年十一月題准景運門隆宗門實為要地嗣後除内廷行走之王貝勒貝子宗室公等仍准其行走外其餘王貝勒貝子宗室公等俱令由後左門出入親王以下宗室公以上仍照前准帶跟隨人其大臣等跟随之人槩不准入其乾清門侍衛奏事批本人員領侍衛内大臣散秩大臣值班侍衛茶飯房並預備弓箭持傘人及打牲執事人等侍衛筆帖式内務府大臣官員筆帖式鑾儀衛大臣官員再現今辦理軍機事務大臣官員等俱令由景運門隆宗門後左門行走外其部院八旗大臣官員俱令由後左門行走俟命下之日通行傳諭令各處将應行走人等職名開冩行文景運門值班大臣處登記檔案查對准行如司門人等不行詳查仍令混行出入将值班之大臣官員以及䕶軍人等一併交部從重治罪乾隆三年定每月八旗官員坐班禮部兵部各派司員二人稽察六年奏准每逢朝期八旗官員除有公事外不赴朝班者稽察御史㑹同該部将官員過少旗分察明縁由指叅交部察議王公迴避儀欽差及賫捧勅㫖或欽賜恩賞者遇王等於道及過王府門不下馬其王公官員等相遇或譲道或迴避禮各不同崇德元年定親王出行郡王遇讓道行貝勒遇執事迴避讓道旁行貝子鎮國公固倫額駙和碩公主額駙遇勒馬鞠躬側立道旁候過輔國公鎮國将軍民公都統尚書以下遇俱下馬立道旁候過固倫公主和碩公主遇相讓尊長在先分路行郡主以下縣君以上遇停車候過郡王出行貝勒公主以下遇與親王迴避儀同貝勒出行貝子鎮國公固倫額駙和碩公主額駙遇讓道旁行輔國公鎮國将軍民公都統尚書遇勒馬側立道旁候過輔國将軍副都統侍郎等官以下遇俱下馬立道旁候過固倫公主和碩公主遇貝勒讓道行郡主縣主郡君遇相讓分路行縣君遇停車候過貝子出行鎮國公和碩公主額駙遇分路行輔國公鎮國将軍民公都統尚書遇讓道旁行輔國将軍副都統侍郎及叅領等官遇勒馬側立道旁候過佐領等官以下遇俱下馬候過固倫公主和碩公主遇貝子勒馬候過郡主縣主遇貝子讓道行郡君縣君遇相讓分路行鎮國公出行輔國公鎮國将軍民公都統尚書遇分路行輔國将軍副都統侍郎及叅領等官遇勒馬側立道旁候過佐領以下等官遇俱下馬候過輔國公出行鎮國将軍都統尚書等官遇分路行輔國将軍副都統侍郎等官遇讓道旁行奉國将軍叅領佐領等官遇勒馬立於道旁候過䕶軍校驍騎校等官及軍民人等遇俱下馬候過鎮國将軍出行輔國将軍副都統侍郎等官遇分路行奉國将軍叅領佐領等官遇勒馬立於道旁候過䕶軍校驍騎校等官及軍民人等遇俱下馬候過輔國将軍出行奉國将軍叅領等官遇讓道旁行佐領等官遇勒馬候過䕶軍校驍騎校等官及軍民人等遇俱下馬候過奉國将軍出行佐領等官遇讓道行䕶軍校驍騎校等官及軍民人等遇俱勒馬候過凡閒散宗室遇親王以下輔國将軍以上俱下馬遇民公以下大臣俱不下馬分路行凡覺羅有職者各照品級迴避無職者遇親王以下輔國将軍以上俱下馬遇民公都統尚書等官俱引馬迴避其餘各官俱不迴避讓道行順治八年題准一應迴避等儀俱照崇德元年例行其新設官員侯伯與民公同内大臣與都統同男與副都統同輕車都尉與叅領同騎都尉雲騎尉與佐領同康熙十八年題准和碩公主遇親王郡王停車候過遇貝勒相讓分路行遇貝子貝子讓道行和碩公主額駙郡主額駙遇親王郡王俱下馬立道旁候過遇貝勒勒馬側立道旁候過遇貝子讓道旁行遇鎮國公分路行閒散宗室遇和碩公主額駙不下馬分路行覺羅無職者遇和碩公主額駙不下馬引道迴避餘俱照舊例行凡過諸王府門崇德元年定親王府門郡王過并隨從人員俱不下馬貝勒過鞠躬趨馬過隨從人員俱下馬親王妃郡王妃過序長幼應下輿者歩行過不應下輿者徑過隨從婦女各照其主固倫公主和碩公主郡主縣主過并隨從婦女俱不下車馬隨從人員俱下馬郡君縣君過不下輿隨從婦女俱下車馬貝子和碩公主額駙民公以下官員及軍民人等過俱下馬貝勒夫人以下官員命婦及軍民人等婦女過俱下車馬郡王府門與親王同貝勒府門貝子鎮國公過不下馬隨從人員俱下馬輔國公和碩公主額駙民公以下官員及軍民人等過俱下馬貝勒夫人過序長幼應下輿者歩行過不應下輿者徑過随從婦女各照其主郡君縣君過并隨從婦女俱不下車馬隨從人員俱下馬貝子夫人以下官員命婦及軍民人等婦女過俱下車馬内外王公相見儀崇德年間定外藩親王見内親王内親王出殿降階迎内親王居左外親王居右俱由中門入内親王在東向西立外親王在西向東立外親王行二跪六叩頭禮内親王答禮畢内親王坐於東外親王坐於西其隨從官員於殿外行二跪六叩頭禮隨伊主後坐宴畢随從官員先行一跪一叩頭禮外親王離位行一跪一叩頭禮内親王答禮外親王起行内親王送至階下回府本府官送出府門外外藩郡王見内親王内親王出殿迎不降階内親王由中門先入外郡王隨後入内親王在東向西立外郡王在西向東立外郡王行二跪六叩頭禮内親王跪受半禮荅半禮畢内親王坐於東外郡王坐於西其隨從官員於殿外行二跪六叩頭禮随伊主俊坐宴畢随從官員先行一跪一叩頭禮外郡王離位行一跪一叩頭禮内親王答跪拱手不叩外郡王起行内親王送出殿不降階本府官送出府門外外藩貝勒見内親王内親王離坐迎不出殿外貝勒由西旁門入行二跪六叩頭禮内親王躬身拱手禮畢内親王坐於中外貝勒坐於西旁其隨從官員於殿外行二跪六叩頭禮随伊主後坐宴畢随從官員先行一跪一叩頭禮外貝勒離位行一跪一叩頭禮内親王躬身拱手外貝勒起行内親王不送本府官送出府門外外藩貝子見内親王部堂官引進殿外貝子行二跪六叩頭禮内親王躬身拱手坐受禮畢外貝子在西側坐其隨從官員於殿外行二跪六叩頭禮隨伊主後坐宴畢貝子離位行一跪一叩頭禮内親王躬身拱手坐受隨從官員在殿外行一跪一叩頭禮外貝子起行内親王不送本府官送出府門外外藩公見内親王禮與外藩貝子見内親王禮同外藩親王見内郡王内郡王迎至大門内郡王居東外親王居西俱由中門入内郡王在東向西立外親王在西向東立對行二跪六叩頭禮畢内郡王坐於東外親王坐於西其随從官員行二跪六叩頭禮隨伊主後坐宴畢随從官員先行一跪一叩頭禮外親王内郡王各就坐行一叩頭禮外親王起行内郡王送至大門内回本府官送出府門外外藩郡王見内郡王禮與外藩親王見内親王禮同外藩貝勒見内郡王禮與外藩郡王見内親王禮同外藩貝子見内郡王禮與外藩貝勒見内親王禮同外藩公見内郡王禮與外藩貝子見内親王禮同外藩親王見内貝勒内貝勒出府門外迎内貝勒居東外親王居西俱由中門入外親王先行内貝勒稍後外親王在西向東立内貝勒在東向西立對行一跪三叩頭禮畢外親王坐於西内貝勒坐於東其随從官員行一跪三叩頭禮隨伊主後坐