body:
  text: 欽定四庫全書欽定八旗通志卷二百二十七人物志一百七忠義傳十九蒙古八旗四四十五人雍正年中共常祿常祿蒙古鑲黃旗人姓博爾濟吉特氏多鐸和之曾孫也多鐸和以戰功授一等輕車都尉卒子石達襲卒子佳良襲卒子常祿降襲騎都尉又一雲騎尉尋管佐領事纍遷至副都統雍正七年由北路出兵九年遇賊於和通胡爾哈諾爾常祿戰歿恩賜騎都尉世職承襲詳見世職表巴圖巴圖蒙古鑲黃旗人姓烏珠庫特氏世居努圖克喀爾喀地方任驍騎校雍正九年隨靖邉大將軍內大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表恭格恭格蒙古鑲黃旗人任驍騎校雍正九年隨靖邉大將軍內大臣公傅爾丹由北路進兵征凖噶爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表達爾查達爾查蒙古鑲黃旗人由親軍委署護軍校駐防察哈爾於雍正九年六月隨副都統常祿出征凖噶爾在和通胡爾哈諾爾地方擊賊力戰陳亡賞恤如例阿必達阿必達蒙古鑲黃旗人由護軍校駐防察哈爾雍正九年六月隨副都統常祿出征凖噶爾在和通胡爾哈諾爾擊賊力戰陳亡賞恤如例吻卓拜吻卓拜蒙古鑲黃旗人任護軍校駐防察哈爾雍正元年奮威將軍公嶽鍾琪調征羅卜藏丹津九月隨都統武格擊賊於鄭海堡力戰陳亡賞恤如例碩岱碩岱蒙古鑲黃旗人姓巴嶽特氏世居克西克騰地方雍正九年以護軍參領隨靖邉大將軍內大臣公傅爾丹由北路進剿凖噶爾於和通胡爾哈諾爾擊賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表額爾必哈額爾必哈蒙古正黃旗人姓吳郎罕氏世居巴林地方任護軍校雍正九年隨靖邉大將軍內大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表西喇爾代西喇爾代蒙古正黃旗人姓噶起特氏世居喀喇沁地方襲職雲騎尉任佐領兼副參領雍正九年從靖邉大將軍公傅爾丹由北路征凖噶爾六月至和通胡爾哈諾爾奮勇決戰道遇伏賊隘不能前力盡殁于陳十年恩賜騎都尉世職承襲詳見世職表阿木古朗阿木古朗蒙古正白旗人官輕車都尉兼佐領署參領雍正九年六月隨靖邉將軍公傅爾丹征凖噶爾至和通胡爾哈諾爾遇賊戰殁賞恤如例積蘭泰積蘭泰蒙古正白旗人姓西爾都特氏世居沙塔拉道里莽海地方任護軍校雍正九年隨靖邉大將軍內大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表白達色白達色蒙古正白旗人姓和色爾氏世居察哈爾地方任護軍校雍正九年隨靖邉大將軍內大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表六十一六十一蒙古正白旗人任驍騎校於雍正九年派隨大兵征凖噶爾至和通胡爾哈諾爾與賊力戰殁恩賜雲騎尉世職承襲詳見世職表六十五六十五蒙古正白旗人姓巴雅爾齊氏世居阿納課爾親地方任驍騎校雍正九年隨靖邉大將軍公傅爾丹由北路出征凖噶爾在敦胡立哈諾爾等處與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表大碩色大碩色蒙古正白旗人由護軍署護軍校雍正十年隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陳亡賞恤如例眀泰眀泰蒙古正紅旗人護軍署護軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾遇賊戰殁賞恤如例八十一八十一蒙古正紅旗人姓巴林氏世居喀爾喀地方任驍騎校駐防寧夏雍正九年隨靖邉大將軍卓鼐出征十年正月二十三日至哈爾巴烏蘭與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表尹吉那尹吉那蒙古正紅旗人任雲騎尉兼驍騎校署前鋒參領雍正十年從靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陳亡賞恤如例巴爾虎岱巴爾虎岱蒙古鑲白旗人姓查甘他塔爾氏世居哈拉斯地方駐防右衛委署防禦雍正九年隨靖邉大將軍內大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表赫達塞赫達塞蒙古鑲白旗人任驍騎校雍正九年從靖邉將軍公傅爾丹征凖噶爾至和通胡爾哈諾爾力戰陳亡恩賜雲騎尉世職承襲詳見世職表七十三七十三蒙古鑲白旗人姓得忒可兒卓忒氏世居盛京錦州府駐防寧夏雍正九年以驍騎校隨靖邉大將軍內大臣公傅爾丹由北路進剿凖噶爾於和通胡爾哈諾爾擊賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表增受增受蒙古鑲白旗人姓和果羅氏世居多永地方任護軍校雍正九年隨靖邉大將軍內大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表五十五十蒙古鑲白旗人姓和果羅氏世居多永地方雍正九年以護軍參領隨靖邉大將軍內大臣公傅爾丹由北路進剿凖噶爾於和通胡爾哈諾爾擊賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表旺初克旺初克蒙古鑲白旗人署護軍校雍正十年七月隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陳亡賞恤如例多爾吉多爾吉蒙古鑲紅旗人姓哈卜齊特氏世居喀喇沁地方雍正元年以筆帖式隨奮威將軍公嶽鍾琪征羅卜藏丹津由松潘口出黃勝關剿熱當十二部落有功乘勝深入賊執之遂遇害恩賜主事什燕寶什燕寶蒙古鑲紅旗人姓西爾德特氏世居察哈爾雍正七年以部委章京隨靖邉大將軍內大臣公傅爾丹由北路進𠞰凖噶爾九年六月於和通胡爾哈諾爾擊賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表舍利保舍利保蒙古鑲紅旗人姓卓特氏世居查哈爾科爾沁地方任護軍校雍正七年隨靖邉大將軍內大臣公傅爾丹由北路進𠞰凖噶爾九年六月至和通胡爾哈諾爾與賊力戰陳亡恩賜騎都尉世職承襲詳見世職表阿爾瑪阿爾瑪蒙古鑲紅旗人姓烏楚各特氏世居喀喇沁地方任員外郎雍正九年隨靖邉大將軍內大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表納思圖納思圖蒙古鑲紅旗人前鋒翎長署護軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾遇賊力戰陳亡賞恤如例素珠克圖素珠克圖蒙古鑲紅旗人署護軍校雍正七年從靖邉將軍公傅爾丹征凖噶爾九年六月在和通胡爾哈諾爾遇賊力戰陳亡賞恤如例博楞泰博楞泰蒙古鑲紅旗人署護軍校雍正十年七月隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊殁於陳賞恤如例都思嘎爾都思嘎爾蒙古正藍旗人姓哈爾圖特氏世居巴煙納爾地方任二等侍衛兼雲騎尉駐防察哈爾雍正九年從副都統常祿征凖噶爾六月至和通胡爾哈諾爾猝遇伏賊奮身力戰陷陳不屈死之賞恤如例丹巴丹巴蒙古正藍旗人署護軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾遇賊戰殁賞恤如例湖拉湖拉蒙古正藍旗人姓喀爾綽特氏世居巴煙納爾地方由護軍校部委防禦駐防察哈爾于雍正九年九月二十六日隨副都統常祿出征凖噶爾在哈爾巴烏蘭地方力戰陳亡賞恤如例雅圖雅圖蒙古正藍旗人姓吳蘭得格壘氏世居阿蘇特地方任護軍參領兼佐領雍正七年充車騎營隊長從靖邉大將軍公傅爾丹由北路征凖噶爾九年六月至和通胡爾哈諾爾猝遇伏賊抵戰力盡殁於陳恩賜雲騎尉世職承襲詳見世職表靠山靠山蒙古正藍旗人姓務爾魯特氏世居哈爾太任驍騎校於雍正七年隨靖邉大將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾地方與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表扎爾六窪扎爾六窪蒙古正藍旗人姓努特氏世居敖漢地方任三等輕車都尉雍正七年隨靖邉大將軍內大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾遇賊力戰陳亡恩賜雲騎尉改二等輕車都尉世職承襲詳見世職表伊馬竒伊馬竒蒙古正藍旗人任副護軍校雍正十年七月隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陳亡賞恤如例諾爾布諾爾布蒙古正藍旗人任護軍校雍正十年七月從靖邉將軍公傅爾丹征凖噶爾戰於烏孫珠爾陳亡賞恤如例花色花色蒙古鑲藍旗人姓車莫忒氏世居察哈爾地方由護軍校于雍正七年隨靖邉大將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾地方與賊力戰陳亡賞恤如例班第班第蒙古鑲藍旗人姓博爾濟錦氏世居喀爾勒圖莫忒地方初由侍衛兼佐領於雍正九年六月隨靖邉大將軍公傅爾丹前往北路出征凖噶爾至和通胡爾哈諾爾地方與賊力戰陳亡賞恤如例常平常平蒙古鑲藍旗人護軍委署護軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月二十八日在和通胡爾哈諾爾擊賊力戰陳亡賞恤如例五十九五十九蒙古鑲藍旗人任護軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月在和通胡爾哈諾爾擊賊陳亡賞恤如例滿達滿達蒙古鑲藍旗人任護軍校雍正七年從靖邉將軍公傅爾丹征凖噶爾九年六月在和通胡爾哈諾爾力戰陳亡賞恤如例薩哈連薩哈連蒙古鑲藍旗人任副驍騎校雍正十年隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陳亡賞恤如例欽定八旗通志卷二百二十七
