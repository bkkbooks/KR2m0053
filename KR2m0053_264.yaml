  text: 人物志一百三十列女傳十八旗滿洲列女傳八鑲黄旗滿洲䕶軍齊斌之妻趙氏鑲黄旗滿洲閒散明全之妻張氏鑲黄旗滿洲䕶軍阿爾薩蘭之妻周氏鑲黄旗滿洲馬甲古寧阿之妻鄭氏鑲黄旗滿洲領催夀寳柱之妻布氏鑲黄旗滿洲䕶軍蘇爾泰之妻富察氏鑲黄旗滿洲馬甲石柱之妻王氏鑲黄旗滿洲閒散七十九之妻王氏鑲黄旗滿洲馬甲保佑之妻王氏鑲黄旗滿洲閒散石爾之妻王氏鑲黄旗滿洲馬甲達帶之妻富察氏正黄旗滿洲筆帖式阿也㨟之妻博爾吉忒氏正黄旗滿洲護軍僧保之妻姚氏正黄旗滿洲護軍錫禮之妻富察氏正黄旗滿洲護軍隆福之妻張氏正黄旗滿洲護軍福禄之妻伊爾根覺羅氏正黄旗滿洲前鋒四十八之妻伊爾根覺羅氏正黄旗滿洲文生員富寜阿之妻伊爾根覺羅氏正黄旗滿洲副驍騎校六格之妻宋氏正黄旗滿洲馬甲八十五之妻富察氏正黄旗滿洲打牲壯丁果齊勒圖之妻素都哩氏正黄旗滿洲閒散常保之妻崔氏正白旗滿洲馬甲阿柏金之妻延濟氏正紅旗滿洲馬甲鄧柱之妻竒塔拉氏正紅旗滿洲前鋒達阿之妻𤓰勒佳氏正紅旗滿洲馬甲薩爾圖之妻郭羅落氏正紅旗滿洲馬甲虎什巴之妻庫雅拉氏正紅旗滿洲馬甲伊靈阿之妻𤓰勒佳氏正紅旗滿洲馬甲黒達色之妻郭佳氏正紅旗滿洲馬甲常青之妻田佳氏正紅旗滿洲閒散李音太之妻于佳氏正紅旗滿洲打牲壯丁瑪吐兒之妻西木肯氏鑲白旗滿洲馬甲葉布舒之妻富察氏鑲白旗滿洲馬甲雙頂之妻鈕祜禄氏鑲紅旗滿洲馬甲徳禄之妻張氏鑲紅旗滿洲馬甲常青之妻劉氏鑲紅旗滿洲馬甲伊凌阿之妻𤓰勒佳氏鑲紅旗滿洲護軍薩靈阿之妻寧古塔氏鑲紅旗滿洲護軍常清之妻劉氏鑲紅旗滿洲護軍永太之妻富察氏鑲紅旗滿洲護軍金官保之妻烏扎拉氏鑲紅旗包衣護軍校特克慎之妻納喇氏鑲紅旗包衣馬甲色勒之妻汪氏鑲紅旗包衣閒散佛保之妻李氏鑲紅旗包衣閒散金有維之妻朱氏鑲紅旗包衣閒散七狗兒之妻韓氏鑲紅旗包衣閒散阿林之妻張氏鑲紅旗滿洲馬甲薩臨保之妻格岳樂氏鑲紅旗滿洲馬甲歩金太之妻𤓰勒佳氏正藍旗滿洲䕶軍額爾登格之妻倪氏正藍旗滿洲馬甲伊裡哈之妻伊爾根覺羅氏正藍旗滿洲䕶軍關音布之妻張氏正藍旗滿洲䕶軍毛格之妻劉氏正藍旗滿洲䕶軍富成之妻戚氏正藍旗滿洲領催舒魯之妻魏氏正藍旗滿洲筆帖式富昌之妻朝佳氏正藍旗滿洲領催海拉圖之妻伊爾根覺羅氏正藍旗滿洲前鋒福隆阿之妻冷氏正藍旗滿洲䕶軍黄保之妻朱佳氏正藍旗滿洲領催厄爾登布之妻白佳氏正藍旗滿洲䕶軍徳存之妻戴佳氏正藍旗滿洲䕶軍清都之妻楊佳氏正藍旗滿洲䕶軍色和臣之妻伊爾根覺羅氏正藍旗滿洲䕶軍黑達色之妻趙氏正藍旗滿洲䕶軍佟超之妻張氏正藍旗滿洲䕶軍富海之妻巴雅拉氏正藍旗滿洲䕶軍曽舒之妻王氏正藍旗滿洲䕶軍七格之妻李氏正藍旗滿洲䕶軍巴焉布之妻趙氏正藍旗滿洲䕶軍二格之妻舒穆禄氏正藍旗滿洲馬甲圗海之妻希察拉氏正藍旗滿洲城守尉和尚之妾兆氏正藍旗滿洲馬甲花色之妻薩克達氏正藍旗滿洲馬甲班金太之妻佟陸氏正藍旗滿洲馬甲安太之妻格岳樂氏正藍旗滿洲馬甲雅克蘇之妻吳氏以上俱於乾隆十九年旌表鑲黄旗滿洲馬甲八十之妻納喇氏鑲黄旗滿洲䕶軍皂保之妻劉佳氏鑲黄旗滿洲䕶軍什夀之妻胡佳氏鑲黄旗滿洲䕶軍莫爾渾之妻杜善氏鑲黄旗滿洲閒散三達色之妻伊爾根覺羅氏鑲黄旗滿洲䕶軍校胡氏太之妻章京氏鑲黄旗滿洲䕶軍黑達色之妻張佳氏鑲黄旗滿洲三等侍衛趙啓之妻𤓰勒佳氏正黄旗滿洲治儀正扎禄之妻趙氏正黄旗滿洲筆帖式乃滿代之妻趙氏正黄旗滿洲䕶軍白那之妻舒穆禄氏正黄旗滿洲䕶軍常林之妻白氏正黄旗滿洲䕶軍六十五之妻吳氏正黄旗滿洲䕶軍七達色之妻張氏正黄旗滿洲䕶軍富爾訥之妻邢氏正黄旗滿洲馬甲九格之妻舒穆禄氏正黄旗滿洲閒散青厄之妻李氏正白旗滿洲前鋒藍翎長蘇隆阿之妻馬氏正白旗滿洲閒散富勒賀之妻包氏正白旗滿洲馬甲塔金泰之妻唐氏正白旗滿洲領催七達色之妻奚氏正白旗滿洲䕶軍雅保之妻唐希勒氏正白旗滿洲䕶軍百夀之妻穆氏正白旗滿洲䕶軍烏凌阿之妻富察氏正白旗滿洲䕶軍脱謹之妻韓佳氏正白旗滿洲䕶軍克䝉額之妻納喇氏正白旗滿洲䕶軍元保之妻張氏正白旗滿洲馬甲開蘭太之妻𤓰勒佳氏正白旗滿洲馬甲六格之妻佟宜氏正白旗滿洲䕶軍福保之妻鈕祜禄氏正白旗滿洲䕶軍囘色之妻查氏正白旗滿洲前鋒薩爾善之妻索氏正白旗滿洲候補筆帖式厄圗琿之妻傅氏正白旗滿洲䕶軍長在之妻劉氏正白旗滿洲馬甲六十之妻魏氏正白旗滿洲䕶軍厄爾登布之妻趙氏鑲白旗滿洲前鋒阿英阿之妻白氏鑲紅旗滿洲䕶軍福夀之妻完顔氏鑲紅旗滿洲䕶軍徳海之妻唐氏鑲紅旗滿洲親軍校福格之妻赫舍里氏鑲紅旗滿洲領催劉住之妻髙佳氏鑲紅旗滿洲馬甲永太之妻蔡氏鑲紅旗滿洲䕶軍額爾登額之妻富察氏正藍旗滿洲護軍白達色之妻李氏正藍旗滿洲䕶軍闗保之妻烏魯氏正藍旗滿洲䕶軍二達色之妻烏齊吉特氏正藍旗滿洲中書兆吉之妻劉氏正藍旗滿洲筆帖式佟泰之妻𤓰勒佳氏正藍旗滿洲䕶軍馬起之妻康佳氏正藍旗滿洲驍騎校托爾岱之妻張佳氏正藍旗滿洲前鋒七哥之妻薩克齊氏正藍旗滿洲馬甲寜柱之妻𤓰勒佳氏正藍旗滿洲閒散那林太之妻李佳氏正藍旗滿洲䕶軍木爾薩之妻納喇氏正藍旗滿洲馬甲蘇蘭太之妻張氏正藍旗滿洲䕶軍薩爾敦之妾張氏正藍旗滿洲䕶軍多隆武之妻楊氏正藍旗滿洲領催都哈那之妻