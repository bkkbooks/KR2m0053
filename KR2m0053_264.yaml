  text: 人物志一百三十列女傳十八旗滿洲列女傳八鑲黃旗滿洲護軍齊斌之妻趙氏鑲黃旗滿洲間散明全之妻張氏鑲黃旗滿洲護軍阿爾薩蘭之妻周氏鑲黃旗滿洲馬甲古寧阿之妻鄭氏鑲黃旗滿洲領催夀寶柱之妻布氏鑲黃旗滿洲護軍蘇爾泰之妻富察氏鑲黃旗滿洲馬甲石柱之妻王氏鑲黃旗滿洲間散七十九之妻王氏鑲黃旗滿洲馬甲保佑之妻王氏鑲黃旗滿洲間散石爾之妻王氏鑲黃旗滿洲馬甲達帶之妻富察氏正黃旗滿洲筆帖式阿也㨟之妻博爾吉忒氏正黃旗滿洲護軍僧保之妻姚氏正黃旗滿洲護軍錫禮之妻富察氏正黃旗滿洲護軍隆福之妻張氏正黃旗滿洲護軍福祿之妻伊爾根覺羅氏正黃旗滿洲前鋒四十八之妻伊爾根覺羅氏正黃旗滿洲文生員富寧阿之妻伊爾根覺羅氏正黃旗滿洲副驍騎校六格之妻宋氏正黃旗滿洲馬甲八十五之妻富察氏正黃旗滿洲打牲壯丁果齊勒圖之妻素都哩氏正黃旗滿洲間散常保之妻崔氏正白旗滿洲馬甲阿柏金之妻延濟氏正紅旗滿洲馬甲鄧柱之妻竒塔拉氏正紅旗滿洲前鋒達阿之妻瓜勒佳氏正紅旗滿洲馬甲薩爾圖之妻郭羅落氏正紅旗滿洲馬甲虎什巴之妻庫雅拉氏正紅旗滿洲馬甲伊靈阿之妻瓜勒佳氏正紅旗滿洲馬甲黑達色之妻郭佳氏正紅旗滿洲馬甲常青之妻田佳氏正紅旗滿洲間散李音太之妻于佳氏正紅旗滿洲打牲壯丁瑪吐兒之妻西木肯氏鑲白旗滿洲馬甲葉布舒之妻富察氏鑲白旗滿洲馬甲雙頂之妻鈕祜祿氏鑲紅旗滿洲馬甲德祿之妻張氏鑲紅旗滿洲馬甲常青之妻劉氏鑲紅旗滿洲馬甲伊凌阿之妻瓜勒佳氏鑲紅旗滿洲護軍薩靈阿之妻寧古塔氏鑲紅旗滿洲護軍常清之妻劉氏鑲紅旗滿洲護軍永太之妻富察氏鑲紅旗滿洲護軍金官保之妻烏扎拉氏鑲紅旗包衣護軍校特克慎之妻納喇氏鑲紅旗包衣馬甲色勒之妻汪氏鑲紅旗包衣間散佛保之妻李氏鑲紅旗包衣間散金有維之妻朱氏鑲紅旗包衣間散七狗兒之妻韓氏鑲紅旗包衣間散阿林之妻張氏鑲紅旗滿洲馬甲薩臨保之妻格嶽樂氏鑲紅旗滿洲馬甲步金太之妻瓜勒佳氏正藍旗滿洲護軍額爾登格之妻倪氏正藍旗滿洲馬甲伊裡哈之妻伊爾根覺羅氏正藍旗滿洲護軍關音布之妻張氏正藍旗滿洲護軍毛格之妻劉氏正藍旗滿洲護軍富成之妻戚氏正藍旗滿洲領催舒魯之妻魏氏正藍旗滿洲筆帖式富昌之妻朝佳氏正藍旗滿洲領催海拉圖之妻伊爾根覺羅氏正藍旗滿洲前鋒福隆阿之妻冷氏正藍旗滿洲護軍黃保之妻朱佳氏正藍旗滿洲領催厄爾登布之妻白佳氏正藍旗滿洲護軍德存之妻戴佳氏正藍旗滿洲護軍清都之妻楊佳氏正藍旗滿洲護軍色和臣之妻伊爾根覺羅氏正藍旗滿洲護軍黑達色之妻趙氏正藍旗滿洲護軍佟超之妻張氏正藍旗滿洲護軍富海之妻巴雅拉氏正藍旗滿洲護軍曽舒之妻王氏正藍旗滿洲護軍七格之妻李氏正藍旗滿洲護軍巴焉布之妻趙氏正藍旗滿洲護軍二格之妻舒穆祿氏正藍旗滿洲馬甲圗海之妻希察拉氏正藍旗滿洲城守尉和尚之妾兆氏正藍旗滿洲馬甲花色之妻薩克達氏正藍旗滿洲馬甲班金太之妻佟陸氏正藍旗滿洲馬甲安太之妻格嶽樂氏正藍旗滿洲馬甲雅克蘇之妻吳氏以上俱於乾隆十九年旌表鑲黃旗滿洲馬甲八十之妻納喇氏鑲黃旗滿洲護軍皂保之妻劉佳氏鑲黃旗滿洲護軍什夀之妻胡佳氏鑲黃旗滿洲護軍莫爾渾之妻杜善氏鑲黃旗滿洲間散三達色之妻伊爾根覺羅氏鑲黃旗滿洲護軍校胡氏太之妻章京氏鑲黃旗滿洲護軍黑達色之妻張佳氏鑲黃旗滿洲三等侍衛趙啓之妻瓜勒佳氏正黃旗滿洲治儀正扎祿之妻趙氏正黃旗滿洲筆帖式乃滿代之妻趙氏正黃旗滿洲護軍白那之妻舒穆祿氏正黃旗滿洲護軍常林之妻白氏正黃旗滿洲護軍六十五之妻吳氏正黃旗滿洲護軍七達色之妻張氏正黃旗滿洲護軍富爾訥之妻邢氏正黃旗滿洲馬甲九格之妻舒穆祿氏正黃旗滿洲間散青厄之妻李氏正白旗滿洲前鋒藍翎長蘇隆阿之妻馬氏正白旗滿洲間散富勒賀之妻包氏正白旗滿洲馬甲塔金泰之妻唐氏正白旗滿洲領催七達色之妻奚氏正白旗滿洲護軍雅保之妻唐希勒氏正白旗滿洲護軍百夀之妻穆氏正白旗滿洲護軍烏凌阿之妻富察氏正白旗滿洲護軍脫謹之妻韓佳氏正白旗滿洲護軍克蒙額之妻納喇氏正白旗滿洲護軍元保之妻張氏正白旗滿洲馬甲開蘭太之妻瓜勒佳氏正白旗滿洲馬甲六格之妻佟宜氏正白旗滿洲護軍福保之妻鈕祜祿氏正白旗滿洲護軍回色之妻查氏正白旗滿洲前鋒薩爾善之妻索氏正白旗滿洲候補筆帖式厄圗琿之妻傅氏正白旗滿洲護軍長在之妻劉氏正白旗滿洲馬甲六十之妻魏氏正白旗滿洲護軍厄爾登布之妻趙氏鑲白旗滿洲前鋒阿英阿之妻白氏鑲紅旗滿洲護軍福夀之妻完顔氏鑲紅旗滿洲護軍德海之妻唐氏鑲紅旗滿洲親軍校福格之妻赫舍里氏鑲紅旗滿洲領催劉住之妻髙佳氏鑲紅旗滿洲馬甲永太之妻蔡氏鑲紅旗滿洲護軍額爾登額之妻富察氏正藍旗滿洲護軍白達色之妻李氏正藍旗滿洲護軍關保之妻烏魯氏正藍旗滿洲護軍二達色之妻烏齊吉特氏正藍旗滿洲中書兆吉之妻劉氏正藍旗滿洲筆帖式佟泰之妻瓜勒佳氏正藍旗滿洲護軍馬起之妻康佳氏正藍旗滿洲驍騎校托爾岱之妻張佳氏正藍旗滿洲前鋒七哥之妻薩克齊氏正藍旗滿洲馬甲寧柱之妻瓜勒佳氏正藍旗滿洲間散那林太之妻李佳氏正藍旗滿洲護軍木爾薩之妻納喇氏正藍旗滿洲馬甲蘇蘭太之妻張氏正藍旗滿洲護軍薩爾敦之妾張氏正藍旗滿洲護軍多隆武之妻楊氏正藍旗滿洲領催都哈那之妻