body:
  text: 欽定四庫全書欽定八旗通志卷一百五十七人物志三十七大臣傳二十三滿洲正白旗二談喀克都哩碩錫圖庫拜星訥鄂凖塔喇阿濟格尼堪瑪蘇拜薩弼圖卓羅瓦爾喀珠喀克都哩喀克都哩世居那木都魯以地為氏太祖髙皇帝時與其兄康果禮率衆來歸分轄其衆為佐領𨽻滿洲正白旗授三等子爵太宗文皇帝初即位以喀克都哩為正白旗都統天聰元年隨征朝鮮有功三年上親統大軍征眀命八旗都統攻遵化城授方略分八隅列陳喀克都哩督所部兵薩木哈圖樹雲梯先登衆繼之城遂拔明巡撫王元雅自殺上嘉喀克都哩造攻具如法督兵先諸軍克城功親酌金巵奬勞優賚之晉爵二等子賜號噶思哈巴圖魯言其勇敢善戰疾如飛鳥也眀年正月上攻克永平眀兵潰走昌黎上遣敖漢奈曼巴林扎魯特兵攻其城不克命喀克都哩同都統達爾漢等率兵千人往助仍不克焚其近城廬舍而還先是敘克遵化功薩木哈圖得賜巴圖魯號授騎都尉世職並諭喀克都哩曰薩木哈圖奮勇建功宜加愛惜自後攻城但令隨衆並進如彼欲先登亦必阻之至是攻昌黎薩木哈圖運木築柵復樹梯將登城聞上命撤兵乃止上以喀克都哩弗恤士卒申諭切責五年五月同都統楞額禮分率左右翼步騎征眀南海島徴舟艦於朝鮮弗至師次海濵不能渡遂還軍屢擊敗明兵之邀戰者俘獲甚衆八月從上征眀圍大凌河城喀克都哩率本旗兵軍其城之東北城中食盡明總兵祖大夀率衆降乃班師六月從上征察哈爾與諸將分路率兵攻取籍所俘人户及金帛馬牛羊以獻奬賚有差七年上以征眀及朝鮮察哈爾宜何先詢諸貝勒大臣喀克都哩奏言宜先征眀以承天佑協人情且利在神速攻其不備上嘉納之八年喀克都哩家人訐其欲逃歸瓦爾喀以財物運藏那木都魯故屯上曰喀克都哩豈有逃遁之理果欲負朕天必鑒之遂不窮治其事仍以訐告者付喀克都哩殺之逾數月喀克都哩卒會有詔分别舊臣勳績賜敕書豫世襲喀克都哩之子塞古德圖爾泰赴吏部述其父功請襲上命諸貝勒集議貝勒多鐸言喀克都哩之嫂和碩郡主謂喀克都哩前此被首事屬實恭領吉思哈自呼爾哈凱旋亦言呼爾哈人謂喀克都哩曽欲逃歸諸貝勒並以奏聞遂不豫襲鄂碩鄂碩滿洲正白旗人先世居棟鄂以地為氏祖棆布太祖髙皇帝時率四百人來歸賜名魯克素授其次子錫爾泰為佐領長子錫罕豫騎都尉世職即鄂碩父也天命十一年蒙古貝勒卓哩克圖所屬叛逃錫罕追及之盡殱其衆天聰元年隨大貝勒阿敏征朝鮮率八十人光驅遇敵戰殁太宗文皇帝念錫罕死事晉世職為三等輕車都尉以鄂碩襲八年七月鄂碩隨豫親王多鐸征明攻前屯衛斬其哨卒十二月奉命與前鋒統領勞薩率將士往迎察哈爾部之來歸者是年授佐領九年大軍招察哈爾部衆進征眀朔州至崞縣遇敵哨斬二人獲馬四由平魯衛出邉敵兵邀戰鄂碩與都統圖爾格擊郤之敘功晉世職為二等輕車都尉尋擢前鋒參領崇德元年鄂碩與勞薩率兵百人偵眀邉事至冷口斬哨卒三獲馬十五二年參領丹岱等往土默特貿易還鄂碩隨前鋒統領武拜率將士赴歸化城護之擒斬眀邏卒三年隨睿親王多爾衮征眀由青山口入擊敗眀太監髙起潛兵四年奉命與前鋒恭領沙爾瑚達率土默特兵三百人略寧逺鄂碩遵上方略以前鋒挑戰敵人堅壁不出乃從錦州北界略其樵採者而還五年隨大軍圍錦州以前鋒敗敵騎時錦州被我軍圍急眀總督洪承疇率兵赴援上聞之親統大軍營於松山杏山之間命武拜等以偏師營髙橋東鄂碩統逰卒偵躡敵有自杏山潰出者尾擊之既而杏山兵果潛出鄂碩偵知以告武拜武拜未即擊致潰卒復入城上以鄂碩有統帥哨卒之責乃僅告知武拜不親行追擊豫鞭責示懲六年復隨大軍圍錦州别將兵略寧逺遇明兵六百騎鄂碩與前鋒統領鄂摩克圖引軍薄之大破敵搴纛二獲馬六十餘七年隨饒餘貝勒阿巴泰征眀毁界嶺口邉墻進師敗明總督范志完兵於豐潤敵自密雲出劫我錙重奮戰郤之遂越燕京趨山東所至克捷師旋出邉明總兵吳三桂遣步騎邀戰復擊之潰遁乘夜掩襲搴纛三斬級數十擒哨卒二十九獲馬二百餘世祖章皇帝順治元年四月從大兵入山海關擊敗流賊李自成追至望都十一月追自成至陜州距潼關立營賊據山為寨以拒我師鄂碩與前鋒統領努三率兵拔其寨二年陜西既定大兵由河南下江南鄂碩率八旗前鋒兵之半先行至睢寧縣敗敵兵千餘人復隨端重親王博洛分兵征蘇州擊明巡撫楊文驄舟師獲戰艦二十五趨杭州敗明魯王朱以海兵擒其總兵一尋與護軍統領哈寧阿等攻湖州克其城先是敘征明錦州山東及入關破流賊功鄂碩晉世職至三等男及是敘陜西江南浙江功晉爵二等男六年擢滿洲鑲白旗副都統時明桂王朱由榔據湖南廣西鄂碩隨鄭親王濟爾哈朗往征有功師還賚白金三百兩八年授前鋒統領十三年擢內大臣兩遇恩詔晉爵三等子復以其為皇貴妃父晉三等伯十四年九月卒加贈為侯賜祭葬如典禮諡剛毅以其子費揚古襲三等伯别有傳錫圖庫錫圖庫滿洲正白旗人姓烏扎拉先世居烏拉部兄福蘭當太祖髙皇帝時率屬來歸豫騎都尉世職尋卒錫圖庫襲其職任佐領兼前鋒參領太宗文皇帝天聰四年大軍既取明永平錫圖庫同參領圖嚕什等率兵循徼敵境擒哨卒二人獲馬十有七五年七月奉命偵敵大凌河生擒二人還上統師往征圍大凌河城擊敗錦州援兵錫圖庫皆在事有功六年隨大軍征明於宣府大同邉外分兵略地多所俘獲八年同諸將略蒙古錫爾哈錫伯圖地斬七十餘級獲户口百餘及駝牛馬而還得分賜所獲是年敘功晉世職為一等輕車都尉九年同前鋒統領勞薩等入明邉克長城略代州朔州斬獲甚衆崇德元年八月睿親王多爾衮征眀寧逺錫圖庫率二十人前行至中後所及山海關東偵敵屢擒哨卒並獲其馬又於前屯衛設伏擊敗敵兵初喀木尼堪部葉類等來歸居多博科地至是葉類倡叛率所屬挈妻孥偕遁盜科爾沁諸部馬匹有追捕者輒為所害十二月錫圖庫奉命率前鋒護軍八人往會寧古塔副都統烏巴海督兵躡追數旬圍之溫鐸招降不從葉類潛遁我兵盡殺其黨九十四人俘婦女八十餘獲馬五十有六追及葉類於山中射殪之二年五月凱旋上遣大臣出迎五里宴勞敘功晉爵一等男五年七月命同護軍統領濟什哈率所部兵並徴外藩敖漢奈曼烏喇特諸部兵征索倫部敗敵衆於甘河擒叛酋博木博果爾之弟布固德復追擒博木博果爾籍户口千餘獲馬數百六年正月還賜宴於北驛館晉爵三等子五月授本旗副都統七年隨貝勒阿巴泰征明由薊州越燕京趨山東克兖州旋師錫圖庫分率右翼兵不與左翼期會先出邉部議革副都統任命從寬罰銀百兩八年十一月擢前鋒統領世祖章皇帝順治元年隨大軍討流賊李自成擊賊將唐通於一片石入山海關屢戰皆捷擒賊遊騎於三河縣追擊自成至安肅獲馬百餘進征山西同都統葉臣等取太原擊敗偽磁侯田見秀於汾洲又敗賊於綘州二年正月敘功晉三等子時自成據陜西大軍由潼關綏德兩路分進錫圖庫率兵趨會擊敗延安賊衆自成遁湖廣錫圖庫移兵安陸追至荆州殱賊無算獲船百餘三年隨肅親王豪格征四川滅流賊張獻忠五年六月敘功晉一等子時湖南郡邑尚為明桂王朱由榔所據錫圖庫隨鄭親王濟爾哈朗征之六年正月大軍至長沙錫圖庫同左翼前鋒統領努三先率兵渡江攻湘潭努三破北門錫圖庫破西門遂定湘潭進克永興城擒斬其總兵尹舉智杜貞明等獲馬七十船四百尋偕諸將定寶慶府進定全州由榔將焦璉等分三路來犯錫圖庫擊郤之又移兵攻克永安關定道州七年正月凱旋賜銀三百兩八年正月內大臣武拜洛什博爾輝等訐告英親王阿濟格謀干政事王大臣集鞫錫圖庫坐豫謀應斬籍沒爵除後洛什博爾輝以造言搆釁伏誅武拜亦坐附和削職籍沒談拜談拜滿洲正白旗人姓他塔喇父阿敦官都統嘗從太祖髙皇帝征撫順招明逰擊李永芳來降談拜初任佐領太宗文皇帝天聰五年大軍圍大凌河城明總兵祖大夀遣百餘騎逸出談拜與護軍參領布顔圖追斬三十餘人獲馬二十有四八年以克副任使豫騎都尉世職兼任參領九年大軍征察哈爾收其降衆遂征明代州欣州談拜同前鋒參領蘇爾德安達立率四十人伏欣口明哨卒三百至擊斬過半崇德元年隨武英郡王阿濟格征明敗敵燕京城北趨盧溝橋遇敵復敗之二年同參領丹岱薩蘇喀等率護軍驍騎各四十略明邉境次清河敵兵七百據守奮擊之潰搴纛二並獲其馬三年隨貝勒嶽託征明入墻子嶺薄豐潤縣城擊敵墮壕殱殪無算復擊敗明太監馮永盛等拒戰兵四年隨鄭親王濟爾哈朗略錦州率護軍破敵少兵於城南是年七月敘功加一雲騎尉五年授兵部參政六年兼任正白旗蒙古副都統七年冬隨貝勒阿巴泰征山東攻利津縣克其城八年春出邉遇眀總督趙光抃范志完總兵吳三桂白廣恩等邀戰率本旗兵戰皆捷凱旋賚白金是年十月敘功晉世職三等輕車都尉世祖章皇帝順治元年隨大軍入關定燕京三年擢兵部尚書尋隨肅親王豪格征流賊張獻忠過陜西同都統瑪喇希等擊敗叛鎮賀珍於雞頭關進次四川屢擊敗獻忠賊衆復同都統李國翰渡涪江擊敗賊渠袁韜四年遷吏部尚書先是敘入關定燕京功並以考滿兩晉世職為一等輕車都尉及獻忠滅晉爵三等男嗣遇恩詔晉二等男七年三月卒子瑪爾賽襲爵别有傳星訥星訥滿洲正白旗人姓覺爾察初為二等侍衛兼佐領從太祖髙皇帝征明遇蒙古兵四百於塔山之北射其渠魁殪之遂敗其衆天聰七年太宗文皇帝命與恭領蘇爾東阿等率兵三百駐守遼河先是我師征察哈爾星訥以二十人往張家口偵敵猝遇敵兵禦守四日夜俟貝勒阿濟格至請兵二百攻克之察哈爾部多爾濟塔蘇爾海倚山立寨列火器拒守星訥率護軍先登敵衆奔潰八年上統大軍征察哈爾星訥隨額駙布顔代率蒙古兵進哈麻爾嶺遇其部俄爾塞圖等率所屬户口來歸納之以聞時察哈爾林丹汗西奔土默特其下相率歸順上乃移師征眀星訥同前鋒參領席特庫等略大同眀將自龍門率兵三千逆戰星訥擊之敗北斬獲甚衆論功豫雲騎尉世職尋授刑部恭政崇德三年同承政葉克舒征黑龍江奏捷敘功並以其兄辛泰弟西爾圖陳亡應得世職令併襲之晉三等輕車都尉參政吉思哈有女為雅什塔子婦新寡吉思哈疾女歸省星訥之子阿思哈見而謀娶之雅什塔訟於所司論罪星訥應革世職罰鍰降理事官上命降罰如議免革世職四年授護軍恭領兼議政大臣尋遷副都統六年二月授工部參政三月隨鄭親王濟爾哈朗圍錦州明總督洪承疇親自以兵六萬赴援屯松山北岡星訥先登破其壁壘明援兵繼至星訥屢擊敗之七年敗明總兵吳三桂白廣恩等兵於髙橋八年擢工部承政世祖章皇帝順治元年隨睿親王多爾衮入山海關擊流賊李自成以步兵破賊陳是年改六部承政曰尚書星訥仍任工部二年敘功授一等輕車都尉三年隨肅親王豪格師抵西安分勦賊於邠州賊潰遁進趨秦州賊將髙汝礪率步騎迎拒大敗之與肅親王會師川中屢敗賊渠張獻忠兵凱旋晉太子少師加一雲騎尉六年逆鎮薑瓖據大同叛星訥隨大兵討之圍其城賊填塹毁垣簡驍勇蒙盾突犯星訥率將士持短兵力戰却賊賊背城為陳復以火器來攻星訥親督精鋭馳壓其營大兵乘之賊兵不能支殱其徑兵略盡七年遇恩詔晉爵二等男八年都統額克青等舉發英親王阿濟格令其子勞親以兵衆迎睿親王喪謀干政法司鞫議星訥𨽻王屬下雖未與謀苐不即奏劾且為王趣召勞親應罷尚書任又議其在工部擅撤昭陵工役五百人及不補植陵樹罪革世職籍家産半九年復任工部尚書列議政大臣十年上以星訥宣力有年衰老可念命以原官加一級致仕十四年自陳戰功請復世職部議星訥前任工部獲罪應削恩詔所加之爵仍留戰功所得世職奉旨復一等輕車都尉兼一雲騎尉豫世職康熙十三年卒賜祭葬孫巴爾達襲凖塔凖塔滿洲正白旗人姓佟佳扈爾漢第四子也天聰八年授騎都尉世職任恭領同參領鰲拜等率兵略明錦州復與前鋒統領勞薩等率將士百人往迎察哈爾國來歸者崇德二年隨武英郡王阿濟格征明皮島王以敵兵堅守不能克集諸將問進取之䇿凖塔與鰲拜對曰我二人先登誓必克之否則不復見王遂連舟越衆渡海舉火為號以待後師敵兵據堡列陳凖塔與鰲拜冒矢石奮勇衝擊遂取其島敘功超授三等男賜巴圖魯號尋擢任都統隨貝勒嶽託征明至密雲攻牆子嶺八旗並進凖塔先據嶺以導諸軍遂毁邉城入敗眀內監馮永盛及總兵侯世祿軍三屯營守將以步騎三千截我輜重同都統武賴擊敗之連敗敵兵二千於董家口遂往略地克取二城敘功晉爵二等男六年三月隨睿親王多爾衮征眀錦州以聽從遣兵回家離城逺駐論罪應革職籍沒得旨改輸罰鍰九月命隨安平貝勒杜度等圍錦州有功七年復同都統葉臣等率將士鎮錦州先是圍錦州時城內眀兵出犯鑲黃旗壕塹三旗護軍避敵壕內王貝勒等袒護不報凖塔坐徇情附和論罰詔免之眀年隨征眀山東與都統葉克書等遣將領攻孟家臺以調度失宜致傷士卒且誑稱率五人突入敵圍衝出敵陳論罪革巴圖魯號降為一等輕車都尉罰贖十二月復鎮錦州順治元年從睿親王入山海關擊流賊李自成與都統談泰等追至真定大破之賊焚輜重倉皇遁去於是燕京迤北居庸關內外各城及天津真定皆降敘功復授爵為三等男二年正月率右翼兵隨饒餘郡王阿巴泰征山東平定郡縣趨江南時眀福王朱由嵩遣兵渡河圍徐州沛縣李家樓凖塔督兵馳擊敗之擒斬其將六人明兵赴河死者無算下徐州奉旨屯兵鎮守五月自徐州進兵南下擊敗明副將髙祐軍於宿遷師次清河明總兵劉澤清率步兵四萬船千餘據黃淮清三河口連營十里凖塔遣副都統康喀賴等率兵渡清河列營相拒以炮擊敗敵艦復遣都司楚進功率步兵六百人拒黃河北岸鳴炮相應隨分兵兩路一自清河上逰進擊一攻對岸馬步敵兵俱敗之合軍追至淮安界斬其副將二恭將一有偽新昌王者潛遁海島雲臺山聚衆攻陷興化凖塔遣兵進勦破其巢穴擒斬之通州如臯泰興等城皆下遂定淮安鳳陽廬州望風納欵敘功晉爵三等子仍賜巴圖魯號三年奉命隨肅親王豪格勦流賊張獻忠於四川賊糾衆迎戰凖塔指揮八旗前鋒及兩黃正白三旗騎兵奮勇進擊俘斬甚衆復同貝勒尼堪等分兵攻克遵義夔州荗州榮昌富順內江資陽諸郡縣川寇悉平復隨肅親王勦陜西賊黨武大定等四年凱旋卒五年論凖塔前後功加世爵為一等子無子以弟阿拉密襲十二年追諡曰襄毅詔立碑墓道阿濟格尼堪阿濟格尼堪滿洲正白旗人姓他塔喇天聰八年襲父達音布三等輕車都尉世職任參領從太宗文皇帝征察哈爾由大同入眀邉與護軍統領雅賴擊敗明兵於崞縣師還復同參領阿爾津至山海關偵敵多斬獲崇德元年從上征朝鮮遇明寧逺守邉兵擊敗之三年隨貝勒嶽託征眀過北京破總兵侯世祿軍追斬其護印者獲其印與馬四年擢護軍統領隨肅親王豪格攻錦州設伏連山擒五人獲馬七六年鄭親王濟爾哈朗統兵圍錦州阿濟格尼堪以七十人設伏敗敵衆進攻杏山領纛直入敵營敵大潰時錦州城中蒙古諾木齊等願投誠為明總兵祖大夀所覺以兵圍之未得出阿濟格尼堪偵知之乘夜薄城力戰率兵先登克其郛援諾木齊等以歸旋擊松山兵兩戰皆捷上以阿濟格尼堪年少能奮勇殺敵賚白金四百兩晉一等輕車都尉是年八月明總督洪承疇集諸鎮兵援錦州上親統大軍駐營松杏兩山之間截其糧道眀總兵吳三桂唐通等潛遁上召阿濟格尼堪親授方略與護軍統領鰲拜等追擊大破之八年八月奉命駐防錦州九月鄭親王攻取中後所前屯衛阿濟格尼堪率所部及蒙古兵攻中前所明總兵黃色遁拔其城復追捕城中逸出者皆就獲敘功加一雲騎尉世祖章皇帝順治元年四月睿親王多爾衮統兵入山海關擊流賊李自成阿濟格尼堪率護軍破賊追至望都敘功晉一等男十月隨豫親王多鐸追勦自成取道河南渡孟津薄潼關賊鑿重壕以阻我軍賊將劉方亮糾衆千餘來犯阿濟格尼堪同護軍統領圖賴阿爾津等奮戰賊挫衄乘夜侵正白旗護軍驍騎營復擊却之連破賊二營領兵踰壕塹躬冒矢石先登城賊衆驚潰或竄或降大兵俱入關二年正月進征西安自成由商州竄湖廣豫親王奉詔征江南四月至淮安遣阿濟格尼堪率護軍趨揚州列營城北合諸軍攻克其城獲戰艦二百餘渡江至江寧追擊眀福王朱由嵩於蕪湖敗其舟師捷聞晉爵三等子三年隨端重親王博洛定浙閩攻克金華衢州破仙霞關下建寧延平眀唐王朱聿鍵遁走汀州阿濟格尼堪同護軍統領都爾德追擊至城下率精鋭先登擒斬聿鍵其總兵薑正希糾衆二萬赴援阿濟格尼堪指揮將士擊之斬殺過半眀年凱旋晉爵一等子賜敕豫世職勿替五年授正白旗滿洲都統六年隨鄭親王征湖廣列恭贊大臣是時眀桂王朱由榔遣其總督何騰蛟總兵王進才馬進忠等據湖南郡邑阿濟格尼堪至長沙與兵部尚書阿哈尼堪領將士先驅次湘潭遇迎戰者輒擊敗之破北門入騰蛟就擒追勦潰衆於湘鄉盡殱之遂趨寶慶距城七十里進才進忠糾衆抗拒我軍分步騎更畨進戰直簿城東門進才等潛遁追勦之沅州靖州進定全州七年正月班師賜白金五百兩晉爵三等伯列議政大臣四月卒豫祭葬如典禮諡勇敏子伊理布襲别有傳薩弼圖薩弼圖滿洲正白旗人姓他塔喇先世居扎庫穆父沙津當太祖髙皇帝時率衆來歸授佐領薩弼圖其長子也沙津卒代管佐領太宗文皇帝天聰八年以克副任使豫騎都尉世職尋兼任參領崇德四年隨承政薩穆什喀索海征呼爾哈部師至黑龍江薩弼圖俘獲丁壯百餘進攻鐸陳阿薩津二城敵兵四百逆戰薩弼圖同佐領卓卜特等率兵九十奮擊斬五十人餘衆潰走索倫部長博木博果爾以兵助呼爾哈部抗拒我師薩弼圖同副都統伊遜等設伏掩擊斬七十人五年四月凱旋敘功加一雲騎尉七月隨大軍圍明錦州刈其城西田禾敵由城西北隅出發鎗炮拒戰薩弼圖偕衆衝擊敵郤走逐之抵城壕復移兵設伏松山要路擊敗敵步兵旋駐守駱駝山城敵兵二百來犯薩弼圖督兵截擊盡殱之六年率兵薄錦州城駐營跨壕作橋敵出樵採薩弼圖馳擊斬十人生擒九人復斬其持弓矢者五人翼日城中出兵投火藥欲焚橋擊之遁既而步騎坌集欲奪壕門薩弼圖迎斬二人敵潰却時眀總督洪承疇據松山以馬兵來劫我紅衣炮薩弼圖先衆擊郤復偕衆步戰破敵步兵三營敘功晉世職為三等輕車都尉旋擢正白旗滿洲副都統七年十月隨貝勒阿巴泰征明由界嶺口毁邉墻入擊敗明總兵馬科轉戰至山東以雲梯攻克平度州城世祖章皇帝順治元年隨睿親王多爾衮入山海關擊流賊李自成督後隊兵有功既定燕京同都統葉臣巴哈納招撫山西自成偽將陳永福據太原薩弼圖率兵圍城屢擊敗出拒賊衆山西既平移師征陜西自成兄子錦據延安以賊衆迎拒薩弼圖七戰皆捷復同前鋒統領錫特庫攻破自成賊寨敘功並三遇恩詔晉爵至二等男尋以年老致仕十八年卒賜祭葬如例子果里襲爵卓羅卓羅滿洲正白旗人姓佟佳三等男巴篤理第三子也天聰八年襲父爵兼任佐領崇德三年隨貝勒嶽託征眀燕京明太監馮永盛率兵拒戰卓羅以三百人擊敗之進征山東屢敗敵衆四年略錦州入其郛擒守備一人六年大軍圍錦州眀總督洪承疇率衆赴援駐松山卓羅隨武英郡王阿濟格擊敗之七年復破松山兵於山北八年授刑部恭政順治元年從入山海關擊敗流賊李自成二年敘功晉一等男任正白旗副都統三年隨順承郡王勒克德渾征湖廣敗自成餘黨一隻虎於荆州凱旋賚黃金十兩白金三百兩先是眀桂王朱由榔據武岡以其總兵王進才等分據長沙衡州寶慶上命恭順王孔有德統師征之至是遣卓羅同副都統藍拜赴有德軍協謀進勦四年自嶽州趨長沙進才聞大兵至遁走卓羅同藍拜追擊敗之遂與智順王尚可喜擊敗其總兵徐松節軍統舟師還長沙遣恭領張國柱扎蘇藍等敗總兵楊國棟於天心湖卓羅會合孔有德軍趨祁陽由熊羆嶺入城斬其總兵副將各一進攻武岡州擊敗其安國公劉承允於夕陽橋承允降由榔遁桂林遂取武岡五年師還復賚黃金十兩白金三百兩六年考滿加一雲騎尉旋擢禮部尚書列議政大臣七年調都察院左都御史八年二月兼鑲白旗滿洲都統閏二月上甄别部院大臣以卓羅緘默曠官罷左都御史専任都統九月擢吏部尚書三遇恩詔晉爵至一等子兼一雲騎尉九年十一月授靖南將軍率兵征廣東旋以廣東漸平召還十一年復任吏部尚書十二年八月命同都統阿爾津率兵駐防荆州初朱由榔稱號於粵孫可望李定國白文選等皆以張獻忠餘黨附由榔竊王號至是據辰州十三年八月卓羅同阿爾津自澧州常德進征辰州可望焚舟夜遁卓羅與副都統泰什哈護軍統領費雅思哈等率兵渡江攻發其伏追擊至瀘溪纍戰破之偽恭將假文科及守備四員來降復辰州十四年可望率所部赴長沙歸順定國文選等隨由榔竄入雲南十五年寧南大將軍宗室羅託自湖南定貴陽上命平西王吳三桂由四川進征南將軍卓布泰由廣西進而卓羅隨信郡王多尼以師會之規取雲南十六年正月合攻雲南城下之屢敗文選定國兵遂克永昌騰越追勦至南甸乃還詔留卓羅及都統伊爾德分八旗兵駐守雲南賚蟒服鞍馬時由榔奔緬甸定國竄據孟艮復謀入犯約降將髙應鳳為內應以由榔印劄誘元江土司那嵩倡叛十月卓羅同前鋒統領白爾赫圖恭領穆克爾等擊敗賊衆於磨隴口賊將馬秉忠孫應斗馬忠君皆敗郤進師鑿壕困之以雲梯克其城斬應鳳於軍那嵩自焚死殱其黨無算十八年定西將軍愛星阿同吳三桂征由榔於緬甸詔卓羅駐守雲南是年十二月緬人執由榔以獻雲南平康熙元年四月奉詔率駐守雲南八旗兵還京敘功晉爵二等伯世襲七年卒豫祭葬如典禮諡忠襄以其孫赫特赫襲瓦爾喀珠瑪喇弟伊瑪喇瓦爾喀珠瑪喇姓那木都魯世居瓦爾喀渾春地祖察禮當太祖髙皇帝時率衆人來歸𨽻滿洲正白旗珠瑪喇自少扈從太宗文皇帝征討任佐領時葉赫有同名者命稱瓦爾喀珠瑪喇以别之天聰八年賜敇授騎都尉世職尋率前鋒十人追獲叛逃蒙古四十三人特豫優賞崇德二年同佐領喀凱等分路征瓦爾喀於額勒約索額黑庫倫僧庫勒諸路俘獲甚衆三年論功加一雲騎尉授吏部理事官四年三月隨貝勒嶽託征眀乘夜升雲梯攻克故城縣眀總兵侯世祿以兵赴援珠瑪喇徒步突入敵軍力戰敗之被創甚猝遇明內監髙起潛軍負創奮擊敵敗北十月隨肅親王豪格略錦州破眀邉城兵進至太平寨敵嚴陳以待珠瑪喇復徒步大呼衝鋒入陳斫毁鹿角中創不退敵兵大潰十一月隨承政索海薩穆什喀統左右翼兵征索倫部珠瑪喇俘獲十九人進攻呼爾哈之雅克塞城我軍火焚其郛佐領和託先登珠瑪喇繼之克其城師還黑龍江濵呼爾哈潰衆復合烏魯蘇屯之博木博果爾兵六千來襲我正藍旗後隊珠瑪喇與索海設伏掩擊殱敵略盡五年六月晉三等輕車都尉六年隨鄭親王濟爾哈朗征眀圍錦州敗松山騎兵眀總督洪承疇赴援立營松山西北我右翼兵與戰失利敵兵環攻左翼軍珠瑪喇力戰敗敵炮傷頷氣絶上震悼賜殮具三日復蘇奏聞上甚喜令加意調養勿即隨征尋以監造盛京塔工告成賞賚甚優命率兵防守錦州諸山寨眀兵來犯戰竟夜敵潰走斬四十餘級獲雲梯及軍械眀年晉二等輕車都尉八年考績晉一等世祖章皇帝順治元年珠瑪喇隨睿親王多爾衮入山海關擊敗流賊李自成兵復勦滅馬山口土賊敘功加一雲騎尉二年十月調户部理事官十一月同都統巴顔等率兵會定西大將軍何洛會征流賊張獻忠自西安進師屢挫賊三年上命肅親王豪格代何洛會統軍趨階州聞賊衆屯禮縣南遣珠瑪喇分兵擊之賊驚竄復與護軍統領鰲拜進征西充獻忠既滅乃班師六年隨英親王阿濟格討大同叛鎮薑瓖至左衛賊列兵城外迎戰珠瑪喇擊走之復左衛旋勦賊寧武關賊於山岡列炮以拒珠瑪喇同恭領烏庫禮率師疾馳據岡脊大破賊營偽總兵劉偉遂以關降七年敘録勞績舊臣晉爵三等男豫世襲罔替八年擢正白旗副都統遇恩詔纍晉一等男十年三月卒於官年五十有三豫祭葬如例祀四川名宦弟伊瑪喇初任前鋒侍衛順治三年隨肅親王軍於四川賊黨趙雲桂圍保寧伊瑪喇登城射中雲桂目賊駭走我師乘之大捷至是襲兄珠瑪喇一等男爵尋授恭領康熙十三年陜西提督王輔臣叛應逆藩吳三桂伊瑪喇隨揚威將軍阿密達討之十四年五月師至寧州賊兵千餘抗拒擊之潰遂復寧州九月進攻平涼距城八里輔臣糾賊萬餘迎戰伊瑪喇隨貝勒洞額擊敗其衆十五年隨撫逺大將軍圖海復攻平涼至城北虎山墩偵賊賊合步騎突至伊瑪喇督衆奮戰賊敗北十八年搜𠞰棧道益門鎮諸路賊營敗賊將陳君極二十一年賊平還京二十七年以老疾乞休三十四年五月卒亦祀四川名宦次子滿色襲爵世宗憲皇帝御極恩詔察奏效力行間未議敘者兵部列伊瑪喇名進賜加雲騎尉世職與長子能泰襲蘇拜子和託蘇拜滿洲正白旗人姓瓜勒佳前鋒統領武理堪之次子也蘇拜年十五從太祖髙皇帝征蒙古有功授侍衛兼管佐領事太宗文皇帝天聰九年隨大軍征察哈爾收降林丹汗子額哲遂入眀邉攻代州明兵三百自崞縣赴援蘇拜先衆迎戰敵潰遁崇德元年從征朝鮮破敵桃山村三年任護軍恭領隨貝勒嶽託征明自墻子嶺入邉越燕京擊敗明太監馮永盛軍五年大軍圍明錦州蘇拜屢擊却松山杏山敵兵又同都統圖爾格等設伏於烏欣河口多所俘獲敵兵千餘襲追戰郤之護輜重以歸六年復圍錦州敗松山騎兵又敗眀總督洪承疇三營步兵敘功豫世職騎都尉加一雲騎尉七年隨貝勒阿巴泰征明至山東屢敗敵馬步兵攻克樂安昌邑二縣八年凱旋晉世職三等輕車都尉世祖章皇帝順治元年隨睿親王多爾衮入山海關擊敗流賊李自成是年冬隨大軍西勦自成取道土默特鄂爾多斯入邉鑿黃河冰濟師擒斬賊衆明年春至榆林賊乘夜襲我蒙古營蘇拜與護軍統領徹爾布往援擊敗羣賊旋軍遇伏復戰卻之進征延安七戰皆捷自成走湖廣躡追之至安陸屢破賊營斬獲無算三年署護軍統領隨肅親王豪格征流賊張獻忠敗賊將髙汝礪於三寨山進擊獻忠於西充連敗賊衆我正藍旗軍為賊所困蘇拜同護軍統領阿爾津率兵趨援大敗賊五年還京授護軍統領先是敘入關及𠞰滅自成功洊晉一等輕車都尉加一雲騎尉及獻忠滅敘功並三遇恩詔晉爵至二等子八年正月同其兄武拜及內大臣洛什博爾輝等舉發英親王阿濟格謀干政罪狀議敘晉一等子加一雲騎尉二月洛什博爾輝以諂媚諸王造言搆釁伏誅蘇拜與武拜並坐附和罷任削職籍沒又以睿親王葬時私置御用服飾蘇拜徇隱不舉又王欲移駐永平蘇拜曽與密謀論死得旨寬免九年起為正白旗副都統十三年擢內大臣十五年上念其戰陳有功復爵一等男世襲旋授領侍衛內大臣康熙三年十二月卒賜祭葬如典禮諡曰勤僖子昻安巴襲爵第三子和託初任侍衛康熙十五年以參領從征陜西叛鎮王輔臣至平涼城北擊敗賊衆十六年從征逆藩吳三桂至湖廣於攸縣河岸擊敗賊將王國佐等又敗賊將胡國柱等於永興十九年由廣西征逆孽吳世璠敗賊將何繼祖等奪石門坎黃草壩進薄雲南城敗賊將胡國柄劉起龍敘功豫世職騎都尉加一雲騎尉尋任護軍恭領五十二年卒子巴爾泰襲職欽定八旗通志卷一百五十七
