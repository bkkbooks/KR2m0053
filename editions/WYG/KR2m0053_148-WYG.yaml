body:
  text: 欽定四庫全書欽定八旗通志卷一百三十四人物志十四宗室王公傳十二追封勤敏鎮國公阿拜僖追封慤厚輔國公塔拜恪鎮國公巴布㤗塞國公聶克追封介直輔國公頼慕布貝原封鎮鎮國公屯齊原封固山子温齊輔國公品級扎喀納鎮國將軍洛託追封勤敏鎮國公阿拜阿拜太祖髙皇帝第三子天命十年十月命與弟塔拜巴布泰統兵一千征東海北路呼爾哈部分路進俘千五百户還上出城迎勞尋授騎都尉天聰八年四月晋三等男崇徳三年五月任吏部承政四年八月封三等鎮國将軍六年十月命往錦州南乳峯山駐防八年八月以老罷承政任順治四年九月晋二等鎮國将軍五年二月卒年六十有四十年五月追封鎮國公諡勤敏阿拜第六子鞏安初封奉恩将軍順治五年襲二等鎮國将軍六年晋封輔國公康熙二十年五月卒爵除追封慤厚輔國公塔拜子額克親塔拜太祖髙皇帝第六子鎮國公阿拜弟天命十年十月與阿拜等征東海北路呼爾哈部俘其衆還論功授三等輕車都尉天聰八年四月陞一等輕車都尉尋封三等輔國将軍崇徳四年九月卒年五十一順治十年五月追封輔國公諡慤厚康熙五十二年四月塔拜曽孫正白旗漢軍副都統楚宗奏請撰文立碑從之塔拜次子額克親崇徳元年五月隨武英郡王阿濟格征明薄京師明兵自涿州来拒擊破之四年八月封三等奉國将軍九月襲封三等輔國将軍其三等奉國将軍以弟巴顔布爾善襲五年六月額克親隨睿親王多爾衮征明圍錦州以親軍破敵十一月隨貝勒多鐸設伏塔山敵兵出殱之六年八月大兵征明錦州敗明總兵洪承疇兵十三萬移營近松山掘壕圍困之城内兵乗夜犯御營額克親同内大臣錫翰等嚴守壕門禦之敵敗却十二月叙功賜銀八十兩順治元年隨睿親王多爾衮入山海闗擊破流賊叙功授二等輔國将軍四年九月晋一等輔國将軍尋封輔國公六年十月晋封鎮國公七年八月擢正白旗滿洲都統晋封固山貝子八年二月以御前大臣羅什博爾恵謟媚諸王造言搆釁伏法額克親坐附和削爵黜宗室九年二月復入宗室任内大臣十二年正月卒爵除塔拜第四子巴穆布爾善崇徳元年十二月隨大兵征朝鮮擊敗朝鮮兵於陶山村四年九月襲其兄三等奉國将軍爵順治元年四月從睿親王多爾衮入山海闗破流賊有功二年授二等奉國将軍四年晋一等奉國将軍六年晋三等鎮國将軍八年晋封輔國公康熙四年任領侍衛内大臣六年擢秘書院大學士尋充纂修世祖實録總裁八年五月議巴穆布爾善結黨行私等罪二十一欵伏誅子黜宗室爵除六月諭宗人府自順治十八年後宗室有犯罪革黜宗室者著查明原案情節具奏尋宗人府奏革退宗室内巴穆布爾善係與鰲拜結黨情罪重大其子郭禮博禮七十七觀音保革去宗室之處應無庸再議得㫖巴穆布爾善之子本應依議但係宗室朕心不忍俱着為閑散宗室恪僖鎮國公巴布泰巴布泰太祖髙皇帝第九子輔國公塔拜弟天命十年十月與阿拜塔拜統兵征東海北路呼爾哈部俘其衆而還十一年九月初設十六大臣以巴布泰管正黄旗事天聰四年三月隨大貝勒阿敏駐永平明兵䧟灤州不能禦議罷職八年四月授副都統五月從大軍征明克保安州十一月以巴布泰匿所獲罷職崇徳六年五月封三等奉國将軍七年十一月命駐錦州順治元年四月從睿親王多爾衮入山海闗定京師同都統譚泰撃敗流賊逐北至望都二年二月叙功晋一等奉國将軍三年正月隨平南大将軍勒克徳渾征湖廣攻賊於安逺南漳西峯口闗王嶺襄陽府等處俱有功四年九月晋三等輔國将軍尋晋封輔國公六年四月命同貝子務達海往大同代英親王阿濟格剿叛鎮姜瓖十月晋封鎮國公十二年正月卒年六十有四諡恪僖巴布泰第三子祜錫録於順治十三年降襲三等鎮國将軍康熙三十四年以庸劣削爵祜錫禄長子富良初於康熙二十六年封三等輔國将軍三十四年改襲父爵仍降襲三等輔國将軍三十九年六月卒子尼雅翰降襲三等奉國将軍雍正五年五月卒子佛照降襲奉恩将軍九年正月卒以佛照弟多義襲乾隆十六年授佐領四十一年十二月卒以多義子恩額穆襲封奉恩将軍追封介直輔國公頼慕布頼慕布太祖髙皇帝第十三子天聰八年四月授騎都尉崇徳四年九月預議政七年二月隨武英郡王阿濟格征明敗明寜逺兵十月上御篤恭殿宴賚武英郡王不俟賞先歸頼慕布坐失勸阻革世職罷議政是月又議武英郡王駐髙橋時㑹敏恵恭和元妃喪武英郡王令鎮國公扎喀納於帳内歌舞頼慕布坐容隠應黜宗室上免之八年七月奉特㫖凡戮力行間敏勤素著者准令其部下人自行採参頼慕布下五十人預焉順治二年二月封奉恩将軍三年五月卒十年五月追封輔國公諡介直頼慕布長子来祐於順治三年襲封奉恩将軍尋晋三等鎮國将軍八年晋輔國公康熙八年以才力不及削爵雍正十三年九月今上御極奉諭㫖太祖太宗子孫内從前或係本支無人未經封爵或别有事故革退未襲者著宗人府查奏尋奏頼慕布後嗣係閑散宗室並無官爵乾隆元年五月奉㫖以来祐之孫扎坤泰承襲奉恩将軍二十二年二月卒子永武襲奉恩将軍二十八年十月卒爵除原封鎮國公聶克塞聶克塞太祖髙皇帝孫鎮國将軍湯古代之長子也弟穆爾察初封三等奉國将軍崇徳五年九月襲父鎮國将軍爵聶克塞遂襲弟穆爾察爵為三等奉國将軍七年十一月隨豫親王多鐸征明寧逺敵兵迎拒敗之順治元年四月隨睿親王多爾衮入山海闗定京師敗流㓂追至望都二年二月叙功晋二等奉國将軍四年九月晋一等奉國将軍六年十月晋封鎮國公初聶克塞以貝子額克親子為嗣八年二月額克親獲罪削爵聶克塞妄奏與額克親不協三月降輔國公九年六月家人哈爾巴訐以私餽出妻衣物降三等鎮國将軍康熙四年二月卒年六十五爵除鎮國公屯齊屯齊顯祖宣皇帝曾孫追封恪僖貝勒圖倫次子崇徳元年五月隨武英郡王阿濟格征明入延慶克十二城九月凱旋四年五月隨鄭親王濟爾哈朗畧明錦州松山杏山屯齊力戰被創常賚外加賜銀百兩四年八月封輔國公五年六月隨睿親王多爾衮圍錦州明兵夜襲我鑲藍旗營撃敗之六年八月從上征明錦州敗明兵於塔山十一月復隨睿親王多爾衮貝勒岳託圍錦州順治元年十月晉封固山貝子隨定國大将軍豫親王多鐸南征破流賊平陕西河南並有功二年四月賜圓補紗衣一襲五月隨豫親王下江寕明福王朱由崧遁太平屯齊與貝勒尼堪等追至蕪湖擒之十月凱旋論功賜金百兩銀五千兩鞍馬一是年授鑲藍旗滿洲都統三年正月隨肅親王豪格西征五月破流賊賀珍等觧漢中圍又敗二隻虎孫守法于漢隂復興安五年四月陕西逆囬犯鞏昌諸郡命為平西大将軍同輔國公漢岱討之㑹總督孟喬芳已擊斬米喇印丁國棟屯齊還赴英親王阿濟格軍駐大同六年十月晋封多羅貝勒九年七月明桂王将李定國等擾湖南屯齊隨敬謹親王尼堪往征之十一月敬謹親王戰没命屯齊為定逺大将軍統其衆進剿時定國偕屬将馬進忠等犯永州大軍至定國度龍虎闗西遁其黨孫可望率兵来靖州馮雙禮来武岡州屯齊遂進師寳慶至周家坡雙禮進忠等據險拒我師㑹日暮天兩列陣相距是夜可望率兵自寳慶来合衆號十萬倚山陣屯齊分兵奮撃大破之獲馬七百餘象一軍械無算捷聞得㫖嘉奨十一年十月議隨敬謹親王戰没罪削爵十二年八月授鎮國公品級十五年正月隨信郡王多尼征由榔於雲南薄其城定國挟由榔奔永昌餘衆率降師還封鎮國公康熙二年六月卒年五十八月以屯齊次子富爾泰降襲輔國公品級十六年任宗人府右宗人二十二年降三等鎮國将軍品級四十年六月卒停襲初屯齊第五子謨啟原任二等侍衛生徳成額任三等侍衛生彭齡乾隆四十三年三月詔以鎮國公屯齊著有勞績賜一等奉國将軍爵世襲罔替以屯齊之曾孫彭齡襲封十一月授頭等侍衛原封固山貝子温齊温齊鎮國公屯齊長子順治六年十月封固山貝子康熙十三年三月授宗人府右宗人四月授鑲藍旗滿洲都統是年四川叛應逆藩吴三桂命隨定西大将軍貝勒洞鄂由陕西進征陕西提督王輔臣叛大軍駐漢中敗賊於仙逸闗復闗山闗及秦州禮縣追剿至西河復清水伏羌事詳信郡王傳十六年二月上以洞鄂等乆屯平凉無功削洞鄂爵温齊降輔國公革都統及右宗人時三桂䧟湖南安逺靖㓂大将軍尚善規復岳州九月命温齊統京兵往恭賛軍務十七年六月敗賊於桞林嘴君山八月尚善卒於軍貝勒察尼代仍以温齊為恭賛十月敗賊於陸石口進擊岳州克之十八年正月温齊追逸賊吴應麟至二百餘里以未携爨具引還應麒遁且虛報陣斬偽官兵五千餘事聞上命察尼嚴取供詞七月察尼以其詞奏諭曰國家軍法嚴明並無虚偽多報首功之事温齊乃有罪之人不思効力自贖岳州徒歩奔逸之㓂不即窮追且殺賊不過三四百人與原疏逈異著削爵罷叅賛爵除輔國公品級扎喀納扎喀納顯祖宣皇帝曾孫追封貝勒扎薩克圖長子崇徳三年隨奉命大將軍睿親王多爾衮征明趨臨清州渡運河略濟南府還破天津衞扎喀納皆在事有功四年四月師還賜銀二千兩馬一駞一是年授鎮國公時内大臣多爾濟屬下有䝉古及漢人自伊嚕逃命扎喀納伺諸屏城藩城間不獲而歸議削爵詔從寛降輔國公六年八月從上征明錦州明總督洪承疇以兵犯我鑲紅旗營撃敗之師還敵襲我後相距僅百步扎喀納轉戰敵驚遁明總兵吳三桂白廣恩王樸等沿海潛逃扎喀納同輔國公芬古追撃至塔山七年七月駐防錦州九月還十月以駐高橋時遇敏惠恭和元妃喪扎喀納從武英郡王歌舞為樂坐大不敬罪削爵黜宗室幽禁順治元年隨睿親王入山海闗定京師二年二月叙功復入宗室授輔國公品級九月同鎮國公傅勒赫率兵駐防江南十一月同貝勒勒克徳渾征湖南凱旋賜黄金五十白金千五年十二月同謙郡王瓦克達率兵赴英親王阿濟格軍駐防大同六年九月晋封固山貝子九年七月隨敬謹親王尼堪征湖南賜蟒衣鞍馬弓矢至衡州敬謹親王戰没上以貝勒屯齊代其任與扎喀納合軍敗賊兵十萬於周家坡十一年十月議隨敬謹親王戰殁罪削爵十二年八月復授輔國公品級十五年正月隨信郡王多尼征明桂王朱由榔於雲南抵貴陽沿途敗敵降由榔屬官劉之扶王宗臣等百餘兵千餘師進雲南省城由榔遁攻永昌克之十六年三月卒於軍扎喀納第五子瑪喀納於康熙四年降襲三等鎮國将軍品級四十三年以校射不嫻削級扎喀納曾孫瑪商阿於雍正七年由七品筆帖式襲三等奉國将軍品級乾隆四年授䕶軍恭領十四年四月卒子英禄降襲奉恩将軍品級四十年閏十月卒子福亨額降襲雲騎尉品級鎮國将軍洛託洛託顯祖宣皇帝曾孫追封和恵貝勒寨桑古之長子天聰八年八月從上征明有功籍獻所俘獲於大同南西岡御營崇徳元年封固山貝子十二月隨大兵征朝鮮同貝勒多鐸圍南漢山城殱其援兵八千又敗其援兵五千二年四月命預議政四年二月大兵征明洛託隨武英郡王阿濟格圍塔山連山五年六月隨睿親王多爾衮代鄭親王濟爾哈朗於義州築城屯田九月錦州兵五百夜襲我鑲藍旗營洛託同輔國公屯齊等撃敗之六年三月以圍錦州時不臨城及遣兵私回議削爵詔罰鍰八月上親征明圍松山大破明總督洪承疇軍洛託同睿親王多爾衮等至塔山大路横擊之明兵潰赴海死者無算十一月復圍錦州七年三月隨鄭親王濟爾哈朗攻塔山四月克之六月任都察院承政九月與貝子博洛尼堪等往代公博和託屯齊扎哈納等駐防錦州八月家人都塔里訐其隂事勘實上以其悖亂違法重撻之削爵幽禁順治八年三月復封三等鎮國将軍十三年五月諭吏部曰三等鎮國将軍洛託當太宗時曾犯大罪因愛其才且係宗室特加寛宥今值國家用人之際乆令閒住深為可惜着授鑲藍旗滿洲都統時川冦餘黨孫可望李定國馮雙禮並兵州總兵叛賊馬進忠均受眀桂王朱由榔封爵可望據黔擾湖南十四年四月命洛託為寧南靖冦大将軍駐防荆州至則遣兵奪取心潭隘斷巴東渡口敵總兵田國欽黄世奎鄧基昌等及可望所屬偽總兵趙世超副将趙三才相繼降十二月可望與定國内訌戰不勝亦来降上命洛託同都統濟席哈由湖南進取貴州十五年三月㑹承疇師於常徳抵辰州收復沅陵瀘陵麻陽黔陽溆浦諸縣進軍沅州進忠遁檄偏沅巡撫袁廓宇招撫靖州並屯鎮逺二十里山口堵禦是月雙禮遣其總兵馮天裕閆廷桂等先後自平越来降四月大兵至貴州由榔之總兵羅大順復收潰卒襲新添衛城敗之洛託與承疇守貴陽十六年二月凱旋叙功授雲騎尉晋一等鎮國将軍十七年七月上以海冦鄭成功竊據海隅日乆未下命洛託為安南将軍同尚書車克内大臣達素都統索渾等往征大破賊衆十一月師還康熙四年四月卒年五十洛託第七子富達禮于康熙四年九月襲騎都尉世職十二月改為降襲奉恩將軍八年晉一等輔國將軍二十三年任頭等侍衛二十五年四月授散秩大臣十一月以謟附領侍衛内大臣索額圖恃勢致富為其從弟蘇起所訐削爵爵除配饗四郡王傳謹案乾隆四十三年奉覺羅㫖以四郡王限於支派屬在之列是以宗室王公中未立其傳因列諸特命國史館查明事實不拘詳畧各補一傳大臣之前兹八旗通志所載大臣例皆各按旗分截然編列而此諸王無旗分可隸故標出配饗四郡王之目另載於此以支派而言雖􅁵在宗室之後而以㫖天潢而論仍卓居大臣之前庶得以仰合諭云多羅通達郡王雅爾哈齊雅爾哈齊顯祖宣皇帝第四子太祖髙皇帝母弟也卒年月及事蹟舊史不著無嗣順治十年五月追封多羅郡王諡通達十一年三月配饗太廟列東廡乾隆十九年九月命入祀盛京賢王祠四十三年正月諭曰通達郡王係顯祖之子武功慧哲宣獻三郡王係景祖之子當時雖身預配饗第以宗支而論已在覺羅之列是以宗室王公表傳内未經立傳但思宗室傳既限於支派國史傳又以屬在宗潢令此四王無所附麗亦覺欠缺著交國史館查明四王事實補為立傳列國史諸大臣傳之前即或當時紀載簡少其功績無由稽核無妨不拘詳畧各立一傳以徵信焉武功郡王禮敦子貝和齊禮敦景祖翼皇帝長子顯祖宣皇帝兄也生而英勇自肇祖原皇帝開基赫圖阿拉至景祖翼皇帝始築城居之兄徳世庫居覺爾察地瑠闡居阿哈和洛地索長阿居和洛噶善地弟寳朗阿居尼瑪蘭地寳實居章嘉地分築五城環赫圖阿拉二十里而居並稱寧古塔貝勒當是時鄰部有碩色訥者生九子俱强悍又有嘉呼者生七子輕捷多力能披重鎧連躍九牛二族恃其强侵陵諸路禮敦從景祖率諸貝勒往征盡滅之收服五嶺以東蘇克素䕶河以西二百里内諸部由此國益强盛禮敦戰功居㝡號巴圖魯後五城族人嗜利搆兵致外侮内難交作太祖髙皇帝備嘗艱險光復舊物討誅尼堪外蘭國中乃帖服而禮敦巳先殁矣卒年月舊史不著追溯翼運功宗無出其右太祖髙皇帝肇造東京營景祖顯祖陵於城東北楊魯山自赫圖阿拉奉遷梓宫並遷禮敦櫬附葬陵側崇徳元年四月追封武功郡王配饗太廟順治十五年九月奉安景祖顯祖於興京永陵禮敦附陵側康熙二十一年及三十七年再親詣興京謁永陵命大臣詣王墓酹酒乾隆八年十九年四十三年親謁永陵皆命大臣酹酒於墓十九年詔建賢王祠於盛京祀國初有功諸王以王入祀王子貝和齊承先志敬事太祖太祖征明廣寧命與宗室鐸弼等留守遼陽貝和齊子色勒天聰中任都統後以軍功晉一等男爵官至領侍衞内大臣自有傳順治四年七月錄王孫席賚阿濟賚阿賚二世孫吉哈禮額塞託和禮瑪福塔託布齊達哈塔薩賽巴賽瑪賽噶達琿託木託禮二世孫噶爾珠闢古莫洛均授佐領康熙五十六年八月以王後無任顯秩者特擢其三世孫侍衛吉禮為散秩大臣多羅慧哲郡王額爾衮額爾衮景祖翼皇帝次子顯祖宣皇帝兄也當太祖高皇帝未誅尼堪外蘭時覺爾察城阿哈和洛城和洛噶善城尼瑪蘭城章嘉城諸族人嗜利搆兵難交作額爾衮智慮周達視不善若凂已永保令名焉卒年月不著無嗣順治十年五月追封多羅郡王諡慧哲十一年三月配饗太廟列東廡乾隆十九年九月入祀盛京賢王祠多羅宣獻郡王齋堪齋堪景祖翼皇帝第三子顯祖宣皇帝兄也當太祖高皇帝初諸族人嗜利搆兵齋堪弗與為伍惟善是務有老成望云卒年月不著無嗣順治十年五月追封多羅郡王諡宣獻十一年三月配饗太廟列東廡乾隆十九年九月入祀盛京賢王祠欽定八旗通志卷一百三十四
