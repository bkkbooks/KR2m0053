body:
  text: 欽定四庫全書欽定八旗通志卷首之十勅諭四雍正年間雍正六年正月二十九日上諭值班侍衛及守衛䕶軍等與其長晝閑坐莫若學習清語近見新挑之侍衛䕶軍等棄其應習之清語反以漢語互相戯謔甚屬不合且滿洲人等俱係太祖太宗世祖聖祖皇考之所遺留朕心寧不愛惜當日耆舊大臣等務以造就後進為心每將學習滿洲本務努力上進語時時教導今兵丁在值班之處互相戯謔殊非善習嗣後宜各加勉勵屏除習氣以清語拉弓及相撲騙馬等技専心致志習學有成實爾等進身之階國家亦收得人之效矣特諭雍正六年三月二十三日正白旗滿洲都統穆森等將該旗盛京兵部郎中通濟家人王六首告伊主隠匿税務餘銀一事具奏奉上諭通濟家人控告伊主隠匿税務所得銀兩如果通濟不完正額蔵匿銀兩是乃通濟辜負國恩則伊家人之所告為是身為職官既負國恩家人控告亦何不可今通濟並未虧空錢糧其將税務所得銀兩隱匿未行盡報者雖屬非理之事然亦係旗人相沿之愚昧陋習十居七八非止通濟一人也此等積惡家奴往往謀求賣身與監收税務之人隨往任所挾其家主之私詐索銀兩勒令放出伊家主畏其控告只得將伊放出既得放出則又復求監收税務之人投入此等惡奴誘挾索詐之習斷不可長且凡人不負國恩不干法紀雖惡奴等告以家務細故豈有將伊家主治罪之理通濟並未虧空税額及别項錢糧且又給與王六銀兩併賣身文契乃伊仍不知足其詐控伊主之情顯然畢露著將王六拘禁該旗行文通濟將從前訛詐伊之欵項惡蹟一一問明到日嚴加審訊將此徧行曉示八旗特諭雍正六年四月初三日鑲藍旗滿洲都統綽竒等因該旗原任尚書赫碩塞所欠錢糧不能完納議將伊姪及姪孫等之俸禄錢糧俱各坐扣一半共扣二十二年還項請㫖具奏奉上諭拖欠錢糧之人不能完納若坐扣伊弟兄及族中弟兄子姪之俸禄錢糧者爾等須各問其情願與否將情願代償之處於摺内聲明盖以拖欠錢糧之人平素若果資助伊之族人及至拖欠錢糧本身不能完納伊等理宜代其償還如施欠錢糧之人平素並無資助族人之處不願代彼償還者勒令代償可乎將此徧諭八旗大臣知之特諭雍正六年四月十二日管理旗務王大臣等奉上諭本月初九日徹夜聞放爆竹想皆惡亂黨與内所遺不守本分之奸人妄播謡言使放爆竹以摇惑衆人之意耳都統髙其佩聞放爆竹之聲即傳該旗兵丁因其不能應時齊集尚至不知所措而兵丁人等乃畧不以為意毫無驚擾愈顯衆心堅定朕深加慰悦此等妄造謡言心懐逆志之奸人不過徒抱慚憤而已似此不忠不孝妄亂應誅之軰亦豈能悖上天而逞其私志乎要皆一一自干法網致遭誅戮而已兵丁人等雖不以為意視為笑談然亦非善習兵丁等俱係在旗當差仰食錢糧之人凡事悉由㕘領佐領驍騎校等遞相𫝊示今乃並不聴上官𫝊示而以私下妄播之謡言輕相聴信有是理乎即聞謡言亦應向該管官員處問明此言由何而至以便遵行乃不計其虛實一有所聞即輕信而從之亦殊非善習也嗣後一切事件凡有未經該管官員𫝊示而私下妄行播揚者聞言之下即将其人姓名確記向各該管官員将事體之虚實及從何𫝊來之處詳確詢問兵丁等能如是行之似此妄造謡言奸逆之徒自必畏懼而妄念全消矣兵丁等斷不可輕信私下妄播之謡言即相率而行也若仍有輕信妄播之謡言附和而行之者務必查出從重治罪特諭雍正六年六月十三日上諭看來旗人之家僕逃亡者甚衆從前在盛京時滿洲之僕人隨伊家主於戰陣之間則奮力向前到營則汲水造飯夜則牧馬匹其人材稍優者至有跟隨伊主建立功績且從前滿洲人性氣剛烈僕人遇有不是處亦不免於捶楚詈罵其家下僕人不但不知逃避絶無怨望之言惟一意効力及至進京之後雖漸習於安逸然其習氣尚好今厯年乆逺乃棄此美習俱相效漢人之家僕並不實心効力務希徼倖習學詐偽稍有不遂即思逃避且爾等逃将安往至被緝獲或者發遣或者刺字此不但一生無有顔靣並且貽子孫以羞辱為何不效法爾等祖父之素行美習轉效漢人家僕之惡習爾等雖係僕人亦人子也誠能各為其主輸誠効力豈有不愛養爾等之理嗣後凡為僕人者理宜革心向善永戒逃亡之惡習今滿洲等不能倣效從前滿洲役使僕人之道但小有拂意即加楚辱折挫若僕人内果有酗酒妄為與人爭鬬不守本分肆行惡亂者固當責處然亦即應發遣何必留其在家今衣食不能使其豐足又任情折挫稍有不遂即加以捶楚畧無愛養之意僕人之心所以不服兼之不勝捶楚即行逃避矣為家主者當使僕人衣食不乏體恤使令務循於理僕人之中曉大義有知識者無㡬小有不善理宜開諭教導使之悛改若有怙惡不俊者亦何必數行打罵将彼售之不亦善乎爾等並不以理使令教訓惟事折挫以此僕人之心不服豈可謂伊等之不是乎或有以枉法作弊之事使令僕人及被要挾又恐其首告竟有鎻禁欲致之於死者懐此暴虐之心又何能使僕人感戴顧戀乎且所行如此而僕人不行首告惟圖逃避尚為有人心者也滿洲等果能善養僕人則平民尚有願投旗下為僕者何為不務平民投旗之舉而顧挫辱舊僕使之至於逃避乎現今旗下僕人一年之内逃避者至今四五千人不知爾等愧與不愧朕實為爾等羞之嗣後滿洲等將役使僕人之陋習痛加改悔善行撫育使不至於逃避迨至子孫皆有禆益亦造福之事也將朕此㫖徧𫝊八旗官兵以及家下僕人等知之特諭雍正六年六月十八日上諭今聞各都統凡值議處之事或則徇庇或則重擬斷不求夫中道而私謂衆人云我等寧可重擬皇上自必從寛及朕㫖意從寛伊等則云因我等從重議擬始得從寛歸結是將恩施自朕之事而仍使之感戴諸臣也朕若降㫖依議伊等又謂如此從重嚴擬何以仍復依議使人歸怨於朕此皆奸宄悖逆之臣所遺惡習耳諸臣掠取美名而歸惡名於朕其事猶小朕亦能容受但國法民風所闗甚為重大辦理公事議處人員惟在秉公平心罪重者不得從輕罪輕者不得從重朕臨御已六年矣朕因怒而處分無罪者何人誅戮無罪者何人朕因喜而寛宥有罪者何人赦免有罪者何人六年之間朕披露誠悃諄諄訓誨至再至三而諸臣尚不能信從而行事如此豈非知而故犯耶朕於何事忽畧而不留心諸臣於何事或能欺朕朕豈不辯是非未諳事體年少之主乎從前朕不時面訓諸臣竟未能悛改遵行而乃作此間言浮語此等罪愆非他罪可比是誠有心擾亂國政者人臣之罪莫大乎是今特書諭爾等若仍不知畏懼不知悛改存悖謬奸惡之心經朕察出定立行正法决不赦宥至於刑部審理旗下事務亦蹈此病著将此通行曉諭都統内務府刑部旗員諸臣并概行曉諭衆人俾共知之特諭雍正六年六月二十六日管理旗務王大臣等奉上諭内務府自補授内務府御史以來於事甚有禆益現今各旗雖有御史稽察旗務亦並未查出一事具奏爾等八旗無論滿洲䝉古漢軍於驍騎㕘領前鋒㕘領䕶軍㕘領内擇其人信實通曉文義者各旗都統等㑹同前鋒統領䕶軍統領等每旗揀選八員引見朕欽㸃四員令其稽察旗務伊等任内之事仍令照常兼理如果行走好朕即将伊等用於部院今著暫将一應事務查出登記不必具奏給爾八旗數月之限将一切辦理錯誤未整之事查明改更倘仍有不行整理更改者於明年正月為始令其㕘奏其稽察旗務之監察御史等仍著照常稽察特諭雍正六年七月初八日稽察八旗事務之侍衛㕘領等奉上諭八旗兵丁所以鼓勵教養撫恤而成就者乃都統等之専責今觀大臣等不以事為事並不實心辦理茍且推諉遂已成習在伊等之意以為都統之職遇補授官員則視其年久計其效力挑選兵丁則不肯受賄賂便為克盡厥職矣夫於補官不狥私弊於挑兵不受賄賂乃人臣當然之事有何殊異若不能辯别官員之賢否教訓兵丁使之成就又何益於國家政務且今時之大臣不比當日之大臣從前滿洲人等咸各樸實盡心事上勤慎供職於馬步射技藝不待教訓自加精練俗尚節儉生計從容故當日之大臣易於統率今時之年少滿洲等不諳素習惟事奢華賭博㳺戯至於應習之滿洲技藝反不専心學習若大臣等不加意教導懲戒其責将誰諉耶朕自御極以來将如何有益於兵丁生計使其永逺得所之處屢經降㫖令大臣等議奏乃無一人開心見誠獻一嘉猷是以朕為兵丁周詳區畫仰頼上天垂祐聖祖仁皇帝六十餘年養育之恩滿洲人丁日益蕃息䕶軍馬甲皆有定額恐其不敷養贍朕特施恩將㓜丁挑為教養兵令食錢糧以為養贍又軫念兵丁等遇喜䘮事不能措辦特賜恩賞銀兩以濟其拮据又軫念兵丁等之米石糶賤糴貴故設立米局以平價值又軫念年老兵丁不能當差無以養瞻者遣往耕種井田凡此雖係朕為滿洲等周詳區畫特沛之恩施仍頼大臣等仰體朕意奉行惟謹而後上澤有以下逮乃大臣中或有将應挑教養兵之人不行挑取而挑其不應挑者是將朕愛養兵丁之恩澤反為伊等瞻狥情面之私舉矣再喜喪之事将恩賞銀兩並不作速發給任意遲延夫喜事尚可稍遲如遇喪事若不依時發給其家無奈只得重利質代至作債負此皆大臣等不能體朕施恩之心怠惰疎玩並不設身處地體貼度量之所致也兵丁等所藉以養家口者米石甚屬𦂳要若大臣官員果於平素開導訓誨令兵丁等皆曉然於謀生之道值領米之時務使存留以敷家口之資餘剰者些須糶賣何由致於窘廹今大臣等並不詳加教誨其不肖之徒不能謀生一得米石全不計及家口妄以賤價糶賣一至不能接續之時又以貴價糴買如此則徒令逐末之民得其利耳雖百姓皆係朕之編氓亦不可不辨其賢否若利於良民尚屬有益但良善之民率皆家中讀書務農斷不肯抛棄田畝各處謀利其惟利是圖者皆㳺手好閑之徒若使此軰獲利其良善之民反為伊等煽誘圖利棄其本業流入惡習矣此於養民之道又無益也大臣等倘不将兵丁加意教誨導以儉樸革其奢靡妄用飲酒賭博等事則兵丁生計何能豐裕今户部現存庫帑四千萬餘兩若将此賞與兵丁便能各立産業家給人足永逺不致匱乏朕亦樂於盡發庫帑以行賞賜大臣等能保其果立産業以為永逺之資乎若今日一經賞給即任意妄費曽不踰時罄盡無餘又何益哉愈有以逞其妄費之心而已再大臣等或有不論是非妄將無辜之一二人題􅄁邀取㕘劾之名以塞其責或有将交與承審事件並不論事之輕重罪之當否亦不遵照律例妄加重擬而云恩出自於皇上夫滿洲乃國家之根本伊等祖父皆跟隨太祖太宗衝鋒摧敵奮身効力繼則仰䝉世祖聖祖皇帝八十餘年愛恤教養之人朕豈樂於治伊等之罪哉朕自即位以來視滿洲皆同赤子如何教訓如何施恩凡大臣等将無辜之人混行擬罪朕詳情度理予以平允之處不可勝述即訓飭大臣等之諭㫖亦甚詳備乃大臣等之私心習氣並未改易且有一種人於㕘領任内看來人頗敏㨗可用及授以副都統等職則染於習俗不能稱職豈伊等福薄不克當大臣之任抑或智量才幹實屬不及朕再四思維不觧其故因此朕特周詳籌畫派爾等稽察旗下事務凡事爾等務秉忠正之心篤意行之勿狥私瞻顧勿苛刻酷虐勿為懦弱好人勿畏避大臣若係㑹奏之事則八人同奏或二三人欲奏之事即二三人具奏有一人具奏之事即獨自具奏若有不能繕寫之人欲面奏者即請口奏如此則爾等之人品才幹朕皆得而知之視其才具可稱何職者朕自酌量補用爾等皆係選擢之能員若實心効力不但朕加奨用即上天聖祖仁皇帝之神靈昭鑒必且錫爾等以福矣朕為兵丁屢降之㫖大臣等並未詳悉開導曉諭衆人爾等将朕此㫖曉悟衆人甚屬要𦂳勿負朕選用之恩勿玷爾等専任之職各加勉勵特諭雍正六年七月二十九日議政王大臣等奉上諭諭前鋒􅄁領䕶軍􅄁領驍騎㕘領侍衛御史小衙門堂官等現今八旗副都統缺甚多凡朕知其大概之人俱經録用繼則王大臣等薦舉之人亦皆録用看來俱屬平常其為侍衛􅄁領時皆係可用之人一經擢任大臣即時改變不似從前只圖保身事事推諉並不實心為國効力是或薦舉之時遺漏賢員未薦或大臣等陋習浸染之所致朕俱不觧其故夫人之才能與為國宣力之心惟已自知之王大臣等薦舉之時如何能深知其衷心與其才能乎爾等有素抱才能矢為國効力之心者可自行薦舉勿以自薦為嫌羣相退縮也身列大臣則為國効力之處亦大若責任輕者於黽勉供職之外不得越分妄辦大臣之事其効力之處小矣且滿洲官員並不分文武若以自薦為嫌恐有不合但知兢兢自守彼戰陣之時奮勇先登不惜身命者豈非効力國家耶果有為國効力之心勿論何地均屬一體有何瞻顧退縮之處古人尚有由白丁自薦者况爾等俱係現任職官理宜自行薦舉與其為人所薦不若自薦也将此曉示伊等俟各自薦舉後朕再斟酌録用特諭雍正六年九月初六日上諭原任南陽總兵官李永陞居官不職且得受軍政陋規經接任官㕘劾部議革職治罪具奏朕令發往阿爾泰驛站坐臺効力今年春間朕恭閲聖祖仁皇帝實錄見原任四川總督李國英擒𠞰逆㓂勞績茂著因命查其子孫帶領引見比将伊孫李永安授為副㕘領並知李永陞即李國英之孫特從臺站地方調回授為㕘領面諭之曰爾不自念爾之祖父勉為好官然朕心實不忍忘爾祖父之勞績也今加特恩宥過錄用爾其思之勉之昨該旗奏伊名下應追未完銀兩伊情願變産扣俸完納朕又降㫖免追矣大凡官員等之祖父為國家宣力抒誠致身殉節者其子孫應體祖父之忠心倍加黽勉以紹家聲斯不愧名臣之後若犯法婪贜虧空國帑不修名節有玷家風是不忠之外又加不孝之罪以情理論之應加倍重懲然朕繼述先志褒功奨善追維往昔時時眷注於懐是伊等不肖之子孫忍於自忘其祖父而朕則不忍以其子孫之不肖遂忘其先人之善不加恩於其後嗣也著八旗通查凡有祖父陣亡盡節及偉績殊勲載在國史而子孫犯法問罪及虧空施欠者無論已結未結著該旗大臣等秉公據實確查具奏又漢人中如嵇曽筠之父錢以塏之祖皆能抗節捐軀舍生取義已荷國恩優加榮奨又如趙申喬楊宗仁清亷公正乃國家實心任事之大臣其任内一切應賠銀兩朕豈忍令其子孫賠償已經降㫖概從寛免不得絲毫牽累著各省督撫等確查所屬有居官清正如趙申喬楊宗仁湯斌陳璸張伯行之比而其子孫犯法問罪及虧空拖欠者無論已結未結俱行秉公據實具奏不得稍徇情面其祖父若係陣亡盡節者亦照八旗例查奏八旗及各省督撫查奏之處俱著具摺交送内閣陸續進呈候㫖特諭雍正六年十月初六日上諭諸王大臣鑲黄旗副都統滿珠西禮奏稱京營武弁等員㕘将以下千總以上不宜専用漢人亦應參用滿洲等語其詞甚為荒謬從來為治之道必在開誠布公遐邇一體若因滿漢存分别彼此之見則是有意猜疑互相漠視豈可以為治乎天之生人滿漢一理其才質不齊有善有不善者乃人情之常用人惟當辨其可否不當論其為滿洲為漢人也自我太祖髙皇帝開國之初即滿漢兼用是以規模宏逺中外歸心蓋漢人之中固有不可用之人而可用者亦多如三藩變亂之際漢人中能奮勇效力以及捐軀殉節者頗不乏人豈可謂漢人不當用乎滿洲中固有可用之人而不可用者亦多如貪贜壊法罔上營私之軰豈亦可因其為滿洲而用之乎且滿洲人數本少今祗将中外𦂳要之缺補用尚覺足以辦理若如㕘将以下之員弁悉将滿洲補用則人數甚為不敷勢必有員缺而無補授之人朕屢諭在廷諸臣當一徳一心和衷共濟勿各存私見而分彼此在滿洲當禮重漢人勿有意以相逺始為存至公無我之心去黨同伐異之習蓋天下之人有不必强同者五方風氣不齊習尚因之有異如滿洲長於騎射漢人長於文章西北之人果决有餘東南之人頴慧較勝非惟不必强同亦且可相濟而為理者也至若言語嗜好之間服食起居之末從俗從宜各得其適此則天下之大各省不同而一省之中各府州縣亦有不同豈但滿洲與漢人為有異乎其實人之所以為人者事君當忠事親當孝臣子之職當公爾忘私國爾忘家則其理本無不同又何得相矜以所長相笑以所短相悦以所同相憎以所異也向來為此言者亦有其人蔡珽傅鼐等皆曽陳奏朕思為此説之故有二一則識見卑鄙毫無所知之人故有此區别之情一則懷挾私邪思欲擾亂國政之人故為此謬妄之論也朕臨御以來惟以四海為一家萬物為一體於用人之際必期於國計民生有所禆益故凡秉公持正實心辦事者雖疎逺之人而必用有狥私利已壊法亂政者雖親近之人而必黜總無分别滿漢之見惟知天下為公凡中外諸臣皆宜深體朕懐同寅協恭股肱手足交相為濟則國家深有倚賴久安長治之道必由於此也特諭雍正七年十一月初三日上諭滿漢文武大臣今日冬至祀天於圜丘天氣晴明和靄迥異平時朕御極以來時時黙禱凡遇壇廟祭祀典禮所闗皆求上天賜以晴和天氣而齋戒之日朕必䖍誠敬謹以為昭格之本不敢絲毫怠忽乃數年之中果䝉上天鑒察朕心每逢祭祀典禮或先期風雨或過後隂寒而本日行禮之時必然晴霽暄和此萬耳萬目所觀瞻厯厯不爽者間有無知之軰奏稱天道渺茫恐難預必朕諭之曰若果天道不符朕之所禱必是朕心不誠朕當作災異㑹倍加警惕修省言者慚赧而止大抵妄誕無稽之人則以為天乃清虚之氣去人甚逺何能有感必應而庸愚鄙陋之人又以為神明之道可以禱求獲福而以私意干凟豈知褻慢已甚不但不能獲福且至得罪於鬼神矣天道至公惟佑善人一念善天必錫之福一念不善天必降之災且天道至近時刻照臨於前後左右之間帝王有帝王之天臣工有臣工之天即匹夫匹婦亦有匹夫匹婦之天舉首即是動念即是不以貴賤而殊亦無須㬰之離也善惡之報全視乎其人之自取以善念而得善報以惡念而得惡報即如播種者種稷則生稷種黍則生黍又如擊器者擊金則為金聲擊石則為石聲此一定之理無可疑者然善惡之分又必視乎其心之公私倘存心為公則雖懲創多人誅戮多人亦適足以成其善而可以獲福存心為私則雖保全多人寛釋多人亦適足以成其惡而至於獲譴夫所謂私者不但徇情枉法婪贓受賄然後謂之私有沽名邀譽之念亦是私有計較利害之念亦是私有迎合君上之念亦是私有垂名後世之念亦是私必湏利害得失全不計及只一念順理而行以俟天命此即所謂誠也然必敬而後能誠故古之聖賢以主敬為本惟其主敬是以念兹在慈不愧屋漏不慚衾影處處可以對天則不善之念又何自而萌乎既無不善之心則是一身之中方寸之内但有獲福之基而無招禍之理焉有不荷神明之黙佑而順適暢遂者乎此朕身試之而確然見其無毫髮之或爽者爾諸臣試遵朕言而行自然覺悟自有效騐也總之為君為臣之道只有敬天勤民二端而用人行政即在敬天勤民之内爾等每當頒禄受賞之際咸感激以為主上之恩不知朕之所以自奉與逮及大小臣工者皆百姓之膏脂也君若臣共受百姓之奉養而於教民養民之道漠不闗心聴其失所清夜捫心何以自安尚云可對天地而無慚乎吾君臣當共勉之特諭雍正七年十一月初八日奉上諭從來開國之初必有從龍之佐或闢疆拓土茂建崇勲或陷陣衝鋒捐軀殉節至於承平之後伐叛討逆其抒誠宣力之臣壮猷忠節並足以垂光竹帛流譽無窮凡為人主者據情據理必無不存篤念忠勲之心於本身厚加贈䘏尤切望其子孫人人成立克紹前徽以永受優待功臣之澤若忠節之後廢墮家聲乃朝廷所不忍聞也則為之子孫者自當謹守家風努力奮志砥礪㢘隅世世為國家有用之材以繼述先烈即或貧寠不能自振國家自必加以恩澤周恤其身家而不至於困苦無依也乃功臣之後往往有不肖子孫自甘敗類或謀私結黨欺君悮國或貪贓壊法虧空國帑陷身刑辟或發遣邉逺或妻子入辛者庫在國家之法雖宗室懿親亦不能曲為寛宥豈能於忠節之子孫别開寛假之路乎此等人不念先人之心跡以致深負國恩非惟不忠更兼不孝其祖父有知亦應深惡而痛絶之且使國家遇此等之人若寛之以恩則法有所不伸若置之於法則情有所不忍為君者實處兩難之地則其人之罪尚可言乎然伊等忍於負國而并忘其先人朕豈忍不念舊而不推恩及其後裔上年降㫖令各旗将功臣之子孫内有犯法問罪及虧空拖欠者一一查出具奏今年各該旗陸續查奏前來朕詳加披覽斟酌情罪或其中勲節之後嫡派止此一二人者如施世驊馬爾璣三格窩赫王錢蘇成馬炘炎陳朝炎洪徳標金啟復金式訓金習禮范光廷噶楚哈李天坒孫元起楊天樞常履坦陳履坦張瑆張珂何紹祖金瑗四格達喀和爾圖王績陳泰常履謙郭朝政傅善剛愛王拭二成格富寧李隆昇碩瞻闗保住寧古齊劉元泰劉元禄常住范時㨗范宏璧范宏恕夸岱法海慶恒慶泰補希松阿延岳興阿庸徳廣徳額倫特孫查齊圖思海覺羅哈占滿保伊林阿阿竒達共六十一員名下應追未完銀兩共五十四萬六百九十五兩金五百兩米一千七百二十一石此各項錢糧俱係國家公帑非朕所得私自用恩豁免者著將内庫銀兩照數撥補代為伊等完項其或擬以充發監候及妻子家屬入辛者庫等罪者概行寛釋凡此邀恩宥貸之人皆當捫心自愧刻骨銘肌并勉其子弟遷善逺辜毋或仍蹈故轍倘再有過犯豈能再邀倖免而凡屬忠節之子孫皆當以此為戒共加奮勉以毋貽前人之羞倘因此次格外之恩或生玩法之念是朕之加恩不能勸人為善轉致導人為非矣豈不重負朕念舊褒忠之至意乎凡此寛宥人等倘有貧乏不能自給者准其於該都統處具呈俟該都統奏聞朕當另加恩恤以存養之其餘八旗所查功臣之子孫可寛者亦無㡬候朕再加詳閲發出特諭雍正七年十二月初五日上諭國家設兵衛民所以安良除暴雖尚武勇之力然必謹守法度顧惜㢘恥不為犯法干紀之行始不負朝廷豢養之恩可以有上進之望平時因八旗兵丁乃國家之根本所以養之者恩甚髙厚偶有差遣征𠞰之事復加意體恤賞給各項銀兩行糧之外復給坐糧所以籌畫其用度養贍其身家者至周至渥矣為兵丁者自宜感戴國恩兢兢奉法共知自愛以邀爵賞而沐寵榮况朕之訓飭教𨗳者至再至三豈伊等尚不知猛省痛改惡習乎乃自藏回陜之八旗兵丁四百名仍有沿途騷擾居民之事經撫臣憲徳兩次㕘奏共一百三十餘名似此負恩犯法無知無恥緑旗兵丁之不如不顧人之鄙笑朕實為爾等深愧之况其所得能有㡬何豈因此足以養身贍家而乃輕犯國憲自罹罪譴耶乃一時率其獷悍之性不知檢束以致身投法網罪無可逃能不愧悔即伊等明理知義之父兄戚屬及同列之兵丁等聞之見之亦諒無不切齒痛恨代為之羞也况損人利己者天理之所不容强奪横取者國法之所不宥爾兵丁等試思之同為父母生育之身又受國家教養之澤並不至於無衣無食顛連困苦也即至此極尚當勵丈夫志以勉盡大義方是若果安分守法則才力稍優者可以冀望上進即中平之人得食錢糧亦可以養贍妻孥奈何惟利是貪而不顧天理不畏國法為此可羞可愧之行乎今將該撫所㕘各欵一一開出並降此㫖著通行曉諭八旗兵丁及各省駐防兵丁俾伊等知同列中有此無恥之事必致敗露不能掩藏自後共相儆戒勿為習俗所漸染而凡有統領管轄之責者皆當仰體朕心申明紀律時加開導則兵民和睦共享昇平之福於久長否則國法具在徒䧟身於罪戾而獲不忠不法之名豈不可憫之甚乎思之勉之将此諭交與八旗及各省駐防管兵官員等著各抄錄一道每月𫝊集兵丁敬謹宣讀令其觸目警心時時檢束恪謹遵奉特諭雍正八年二月二十九日上諭嗣後凡二三衙門㑹議㑹審之事或因一處已經行催而他處尚未辦理者著已經行催之衙門即繕摺奏聞雖經行催不行具奏日後若因遲延治罪仍将此不行具奏之衙門一併議處如奏聞之後以為已經具奏日後總有遲延與已無涉仍将事件依然遲延者亦将此衙門之大臣等一併議處将此通行曉諭八旗及各部院特諭雍正八年五月初十日上諭今年春夏以來屢沛蠲免寛恤之政中外臣民皆以為沐朕浩蕩之恩而不知朕施恩之故自朕之接待天下臣庶朗然如青天白日無不可以共知共見隠微况怡親王不幸仙逝朕思其美善尤不忍不以朕之本意明白宣諭使衆共知之朕御極之初命怡親王管理户部事務朕知户部庫帑虧缺甚多令王清查辦理王奏云此項虧空厯年已久清查之後必求皇上開恩寛免此時朕姑應之及王遵㫖查出虧缺之項至於二百五十餘萬兩之多王奏請以将來餘平飯銀陸續代為完補朕以厯年該管官員侵蝕國帑藐視國憲若不責令賠補何以謹度支而清弊竇於是飭令開報著追未從王之請王始而變色後即遵㫖悉心辦理是以中外之人但知户部多年虧項自怡親王查出甚至無識小人有謂王過於搜求者而不知王之請免追究請為代完幾番陳奏之苦心若斯之懇切也數年以來在外該員名下追出者不及十分之一二而怡親王以餘平飯銀代為補完者則已十之八九然則各員之應完而不完者其銀豈又免乎其罪尚可貸乎今春朕見怡親王抱恙未痊因思王從前懇切陳奏之意特降諭㫖将各員未完銀概行免追以遂王之初願一日朕向王言之王悚惕不寧曰此皇上寛大之恩非臣所敢冀望者此户部庫項之始末朕不忍不宣播於衆者也王曽奏稱皇上用法稍覺嚴厲朕語之曰人心玩愒已久百弊叢生此時若不懲創將來無所底止葢朕雖未即從王之言而王一片寛厚忠直之意未嘗一日不在朕心也近見貪贓侵帑作奸犯科之風漸次止息吏治漸次肅清因思王言特沛恩膏将雍正三年以前各直省官員名下應追銀兩令該部清出請㫖豁免三月間王來見朕朕語以施恩豁免之意王對曰此皇上如天之仁宸衷獨斷若云出自臣奏臣萬不敢居也朕意欲俟秋冬之間将内外大小文武官員㕘罰各案悉行寛免准其開復此意亦曽向大臣等言之適因京師四月雨澤愆期朕齋心䖍禱之餘遂頒寛免開復之㫖庶㡬集中外歡心感天和而施甘㴻果蒙天降時雨四野均沾凡此數事皆朕念王之忠從王之言而布此寛大之典也王一生為國為民濟人利物之事不可枚舉常存惟恐人知之念若朕偶宣露則王之惶悚不可名状是以王在生之日朕不肯違拂其意以此揚播於衆今王已仙逝若朕仍秘而不宣則内外臣民隠被王之厚徳而莫知其由是朕冺王之善也此心何以自安據天理本良朕實難於隠忍况王之懿美多端筆不能述姑就此言其大概耳特諭雍正八年五月二十六日上諭禮記曰聖王之制祭祀也法施於民則祀之以勞定國則祀之能禦大災大患則祀之此崇徳報功之典千古不易者而人心懿好之公感恩戴徳永慕追思有功於一郡則一郡祀之有功於一鄉則一鄉祀之此又縁人情而制禮自古及今名賢碩彦享俎豆而奉烝嘗者不可勝數然其功徳未必盡如吾弟怡親王之大且深也王忠孝兩全智仁兼備嘉謨經國渥澤安民其美難以枚舉試舉其功在社稷之大端而言之從古帝王之治天下理財與用人並重葢必國用充足然後可以嘉恵於民王自總理户部以來謹領度支均平貢賦月要嵗㑹令肅風清無弊不除無恵不舉如江南江西浙江之浮糧乃皇考多年欲行裁減而格於部議者王則體皇考愛民恤下之心佐朕減賦賜租之政悉心經畫奏請蠲除俾民力寛紓催科不擾此王之功徳及於三省者也又如户部庫帑累年虧空至二百五十萬之多王則經理多方代為彌補使各官脱然無累子孫并免追賠此王之功徳及於衆姓者也又如朕因怡親王之奏而蠲免多年之逋欠寛宥各官之處分此王之功徳及於天下者也又如府庫充盈儲蓄完備是以軍需所用至逾千萬皆取之帑藏而裕如一絲一粟無煩小民之供億此王之功徳顯著於軍國而隠被於蒼生者也又如櫛風沐雨冒暑衝寒徧厯京畿興修水利俾數千里沮洳之地變為膏腴數千年創始之規永為樂土此又畿輔百萬耆民所涕泣而道之者也且王謙冲納善誠信交孚其在户部也則與大學士張廷玉蒋廷錫籌畫清釐和衷共濟其營水田也則與大學士朱軾相度指示合志同心諸臣有為國之悃王則深敬禮之諸臣有治事之才王則若已有之待之以腹心親之如骨肉其他保䕶善類推賢讓能之美筆不勝書此又舉朝賢大臣銘諸肺腑寤寐勿諼者也八年以來王輔弼朕躬知無不言言無不盡彰善癉惡樹之風聲内外大小臣工敬王之公服王之明感王之誠畏王之直無不感化漸摩洗心滌慮敦潔已奉公之義成大法小㢘之風興賢育才崇文敷化此則吏治澄清而薄海士民莫不被其澤者也至於教訓侍衛練習禁兵培養人才振興士氣俾將弁可備干城之選軍旅皆成義勇之師此又武備修明而内外戎行莫不收其效者也王之嘉言懿行鴻勲偉績人則知其大概而不能悉其全朕則全知之而亦不能備舉也王應運而興歸全而逝古稱聰明正直之謂神詩經曰維嶽降神生甫及申莊子曰傅説乘東維騎箕尾而比於列星然則王之靈爽在天千秋不冺更復何疑國家崇報之典已仿古人書於太常祭於太烝之禮特命配享太廟而天下官民感王之恩慕王之徳者莫由展其焚香報享之忱則於禮有闕而情未申然朕未降諭㫖則又不敢舉行昔潮人奉韓愈之教於其歿也飲食必祭水旱疾疫凡有求必禱焉然則王之遺爱在人動人思慕而仙靈之福國佑民有禱必應者豈不更駕於韓愈哉著通行内外直省有欲為王建立祠宇嵗時展祀者著奏聞准其舉行或塑遺像或設神牌聴之其不能深知王之功徳者不必行若隨衆從事而不出誠心則是獲罪於王吾弟神明亦必不享也若有存迎合之心勉强從事者朕訪聞得知必嚴加治罪朕御極以來為世道人心計懲奸鋤暴用法不得不嚴而心懷悖逆之徒滅絶天良遂視朕為仇敵近日敗露者已屢見之矣但朕非出於不知而無意為之者将來怡親王建祠之後或怨朕之人不得逞其志而遷借於王以洩悖逆之私忿妄生謗議暗事摧殘者必有之然此皆與朕為梗於王無與也若朕萬年後吾弟之隆盛功徳百世流芳愈久愈能彰顯處朕可預信之矣特諭雍正八年六月十九日内閣㑹同宗人府將怡親王諡號應加之字謹擬具奏奉上諭怡親王謚號著用賢字康熙六十一年十一月廷臣恭擬皇考聖祖仁皇帝尊諡朕刺指血濡筆恭定今吾弟怡親王諡號朕滴淚研硃以定此並諭諸王大臣等知之特諭雍正八年六月二十九日上諭尚書舜典云欽哉欽哉惟刑之恤哉朱子曰所謂欽恤者欲其詳審曲直令有罪者不得免而無罪者不濫刑也吾弟怡賢親王嘗奏朕云今法司衙門凡有審問事件並不究其情之虛實動以夾訊夫聴斷之下求之於辭氣耳目以察其情設誠以待之據理以鞫之未有不得其實者何庸夾訊倘有証佐確據情罪顯著而本犯猶狡獪不以實供則不得已而用刑若並不詳鞫其情而概用重刑嚴訊三木之下何求不得此重案之未免有寃抑牽累也吾弟之言如此是以八年來凡朕交王承審數十件繁難大案皆以誠敬用心以情理感格愚頑簡孚閲實俾各自将罪犯委曲招吐從未曽夾訊搒楚一人而諸案情罪無不允當吾弟之存心忠厚如此凡為法司者皆當奉以為法也今外省有司既不能聴辨五辭無明决折獄之才每遇重大案件至期限将滿之時慮及處分則連用重刑該犯欲緩湏㬰之命凡官吏訊問之語靡不承認遂據其供招鍜鍊成獄且凡遇命盜案件其中牽連之人有司亦明知其無辜而欲為開釋恐致上司之翻駁遂有非夾棍不能歸結之論夫欲保全一已之功名彌縫上司之查駁無論情之虚實罪之輕重輙用三木以訊每致未結而有刑斃之人此其居心尚可問乎從前阿爾松阿為刑部時不能剖斷曲直乃各将原被告之一足共一三木此天良喪盡之人視夾棍為兒戯其心之殘忍􅆭毒甚矣未幾而身為叛逆不能保其首領善惡之報施其有爽乎吾弟怡賢親王之存心仁恕固不待言而其本懐總不欲使天下有一寃抑之人俾國家受濫刑之議此其忠君愛國之心出於誠懇篤摰是以凡有聴斷歸於至當能使羣議帖服刑章式敘也今吾弟仙逝之後凡啟靈大祀之日上天必賜以清和景象而羣工黎庶致其哀慕深情誠千古以來未有之賢王此天之報吾弟亦云厚矣吾弟嘉猷入告之事不可勝數偶因戒飭問官輕用三木一節将吾弟敷奏之言宣示於衆且布告各省有司令咸以吾弟怡賢親王之聴訟居心奉為按鞫之規範則明慎用刑庶㡬咸中有慶矣著凡掌刑名衙門将此諭刋榜永示於堂署特諭雍正十年閏五月初九日上諭八旗人等昔人云和氣致祥乖氣致異此天人相感之至理自古及今未嘗或爽朕以此訓𨗳天下臣民者至詳且悉矣邇年以來如去夏今春京師亢旱地猶微動未嘗寧息朕戒慎恐懼思過省愆幸邀上天慈恩錫以霖雨不致大為災患然上天垂象示儆之意必有由來朕留心體察於旗人得一二事似有抑鬰不舒之氣以致上干天怒朕不得自寛衆亦各應自省也如用兵凖噶爾一節八旗将士逺役於外抛其室家離其骨肉其父母妻子盼望憂思或者意中以朝廷不恤士卒謂此舉過當乃可已而不可已者不知凖噶爾賊夷狡獪兇頑世濟其惡擾害我臣服之䝉古窺伺我西北之邉疆若此賊不加懲創則䝉古不獲安居蒙古不獲安居則邉塞不得寧謐我八旗之人顧能優㳺燕處度外置之乎是知皇考經理於前朕紹述於後皆出於萬不得已並非窮兵黷武欲拓地開疆而疲勞将士於沙漠窮荒之地也觀近日賊夷跳梁之狀以我朝大兵駐劄邉境而猶心懐覬覦敢肆狂逞若此則從前雖欲棄置不問以圖息事寜人其可得乎國家養士於平時原欲服勞於一日将士受恩於屢世本期報効於行間况我滿洲八旗人等忠義之心勇敢之氣實無與比倫爾等祖父自從龍入闗以及各處征討削平㓂亂皆以捐軀致命為榮以老死牖下為恥今乃承平日久習於晏安因數年之征戍即生愁怨之心而忘乃祖乃父之勞績何志氣隳惰自暴自棄一至於此乎從來急公殉難者享千古不朽之榮名而奏凱獻功者膺國家寵褒之爵賞豈但出征弁兵當勇往奮興爭先恐後即其父母妻子亦當深知大義遏抑私情務其逺者大者如此則忠君報國之悃誠必䝉上天垂鑒黙加福佑大功可以立成凡列在戎行者均受國家逾格之恩澤矣又如催追虧空一節聞八旗人等亦以為苦累獨不思居官之人侵盜國帑剝蝕民膏律以國法皆在不赦之列朕以習染既久人數衆多不忍加以刑戮特從寛典勒追還項以儆将來之貪官汚吏使知侵盜横取之物不足以長子孫庶可以止奸貪而厲㢘恥則風俗漸移人心各正衆得有受恩之地朕愈樂乎加恩此朕之苦心實欲為計久逺也若云朕為財物計而為此綜核之舉獨不思十年以來朕之減除正賦蠲免積逋與夫興修工程賑濟賞賚加恵於官弁兵民者所費不下數千萬曽無吝惜此中外所共知共見者豈有惟與旗人較量錙銖不顧啟人之非議乎即論逺近權多寡亦寧肯為此施措哉且雍正三年以前之舊欠朕已令該旗大臣等查奏酌免矣朕之意㫖旗人既未能悉之而該管官員又不能宣布開示每於督催著追之時過嚴過刻甚且牽累無辜希圖卸責此庸劣不忠之大臣奉行之不善致令有不明義理之小人心懐怨懟而身任其事者復自謂無可奈何更隠示以為奉朕㫖出朕意朕㫖果能如是乎朕意豈如是乎上天神明自有照鑒夫身犯罪名事後猶不知悔上施教育沐恩復不知感與夫為已忘公忠愛不存者此皆乖戾之氣必致上干天和行遭譴責朕時深警畏復深憫惻或逆黨之餘孽有意擾亂引誘人心於不善亦未可定用是再頒諭㫖通行曉諭倘八旗人等果能遵朕訓誨洗滌肺腸感國恩之深厚體朕意之諄誠莫被奸邪浮言之所惑共矢愛君親上之懐永絶昧理欺公之習則可以立身者即可以報國不但朕之沛澤施恩必先自旗人始而上天福佑善良諸事吉慶有可預信其必然者特諭雍正十年七月初一日上諭本朝設立各省駐防兵丁原以捍衛地方申明武備其厯來所定規條俱屬盡善無可更張之處乃數年以來以一二事陳奏於朕前者重見疊出不下百餘次其識見甚為庸鄙朕悉置之不論未曽降㫖申飭乃近日仍有不知而妄凟者是以特行宣諭以覺愚蒙一則奏稱駐防兵丁之子弟宜准其在各省考試獨不思國家之設駐防弁兵原令其持戈荷㦸備干城之選非令其攻習文墨與文人學士争名於塲屋也在弁兵之子弟有能讀書向學通曉文義者原聴其來京應試以廣伊等進取之途並未嘗禁其從事文學今若悉准其在外考試則伊等各從其便競尚虚名而輕視武事必致騎射生踈操演怠忽将來更有何人充駐防之用乎况我聖祖仁皇帝臨御六十一年所以教養弁兵者至周至渥如果應行早已著為令典又何待今日之喋喋敷陳乎一則奏稱駐防兵丁身過之後其骸骨應准在外瘞塟家口亦應准在外居住獨不思弁兵駐防之地不過出差之所京師乃其鄉土本身既故之後而骸骨家口不歸本鄉其事可行乎若照此行之日久将見駐防之兵皆為漢人是國家駐防之設竟為伊等入籍之由有此理乎以上二條皆事之必不可行者著将朕㫖頒布於外俾無知之人豁然省悟不復再行妄奏特諭雍正十一年四月二十二日上諭凡奏事惟據實敷陳毋用頌揚之語屢經降㫖訓飭今閲奏摺仍有瑣瑣用頌揚語者不但披覽之下殊覺煩冗而伊所奏之事反致不能詳盡是大臣等未将朕訓㫖曉示耳著再行𫝊諭凡奏事惟敷陳正意其稱頌浮辭不必叙入特諭雍正十一年四月二十八日上諭朕覽本朝人刋寫書籍凡遇胡虜夷狄等字每作空白或改易形聲如以夷為彛以虜為鹵等字様閲之殊不可觧揣其意蓋妄為觸本朝之忌諱曰避之以明其敬慎此固背理犯義而不敬之甚者也夫中外地所畫之境也上下天所定之分也我朝肇基東海之濵統一中國君臨天下所承之統堯舜以來中外一家之統也所用之人大小文武中外一家之人也所行之政禮樂征伐中外一家之政也内而直𨽻各省之臣民外而䝉古極邉諸部落以及海澨山陬梯航納貢之倫莫不尊親奉以為主乃復追遡開創帝業之地目為外夷以為宜諱於文字之間是徒辨地境之中外而竟忘天分之上下不且悖謬已極哉孟子曰舜東夷之人也文王西夷之人也舜古之聖帝而孟子以為夷文王周室受命之祖孟子為周之臣子亦以文王為夷然則夷之字義不過方域之名自古聖賢不以為諱也明矣至以虜之一字加之本朝尤為錯謬漢書注云生得曰虜謂生得其人以索貫而拘之也敵國分隔互相訿詆北人以南為島夷南人以北為索虜唐漢宋元明邉烽不息每以不能臣服之國反以為虜我滿洲住東海之濵並非胡人亦從未被虜若言東夷之人則可况今普天之下率土皆臣雖窮邉逺徼我朝猶不忍以虜視之惟凖噶爾背天逆命自棄於王化之外或可呼之為胡虜耳至若王師入闗漢人順命心悦誠服而為臣子在本朝雖不忍以漢人為虜而律以生得之義漢人實乃本朝之虜也乃轉以本朝為虜而諱言之豈獨昧於大義並字義亦失之矣不亦謬乎總之帝王之承天御宇中外一家也上下一體也君臣父子之分定於天也尊親忠孝之情根於性也未聞臣子之於君父合體同心猶可以絲毫形迹相岐視者也我朝正位建極百年於兹矣列聖相承功徳隆盛迨世祖章皇帝入撫中夏救斯民於水火而登之袵席仁心仁政洋溢中國聖祖仁皇帝臨御六十餘年深仁厚澤淪肌浹髓中國之聖主自堯舜以來莫可比倫朕以涼徳纉承統緒勤求治理勉效祖考雖未能跂及萬一然十載之秉公矢誠朗如天日滿漢䝉古並無岐視此心久為臣民所共曉矣夫滿漢名色猶直省之各有籍貫也文移字迹未便混同初非留此以為中外之分别乃昧於君臣之義者不體列聖撫育中外廓然大公之盛心猶泥滿漢之形迹於文藝記載間刪改夷虜諸字以避忌諱将以此為臣子之尊敬君父乎不知即此一念以犯侮慢大不敬之罪而不可逭矣此皆始作之大奸大逆譏訕之辭後人由之而不覺淺夫寡識至於如此朕於大義覺迷録中曽經詳悉開導實憫天下士民無知而自蹈於大罪想天下士民今已深悉兹見書籍避忌之謬妄重為反復曉諭嗣後臨文作字及刋刻書籍如蹈前轍将此等字様空白及更換者照大不敬律治罪各省督撫學政有司欽遵張掲告示窮鄉僻壤咸使聞知其從前書籍若一概責令填補更換誠恐卷帙繁多或有遺漏而不肖官吏遂借不遵功令之名致滋擾累著一併曉諭有情願填補更換者聴自為之特諭雍正十一年十一月二十四日上諭旗員隨任子弟定例年至十八嵗以上始令歸旗其在京之世襲官年至十嵗以上者送義學讀書今西寧道楊應琚之子世襲拜他喇布勒哈畨楊重穀現隨伊父任所年甫十嵗未至歸旗年分該旗乃引在京世職入學讀書之例行令歸旗殊屬錯悮著交部查議至於八旗有似此違例将隨任子弟未至年分行令歸旗者亦著該部行查一併交部查議特諭雍正十二年五月十七日上諭向來八旗官員遇有吉㓙之事竸尚繁華恣意糜費以致兵民效尤㒺思樽節重有累於生計朕屢加訓諭並令九卿等按其品級分别等次酌定規條頒行已久伊等自當體朕教養之苦心各循職分謹守章程以為仰事俯育之道乃近聞八旗人等仍有未改陋習以誇多鬬靡相尚者不知聖人教人以生養死葬合禮為孝又曰禮與其奢也寧儉喪與其易也寧戚朕之教人亦即此意如曰父母之葬祭必以耗財為孝獨不思蕩廢家産以致不能顧恤品行辱及先人其不孝也更為何如子女之婚嫁必以厚資為慈獨不思無所貽謀以致不能養育子孫饑寒困苦其不慈也更為何如况越禮踰分之事但覺可恥更有何榮朕之提撕警覺已至再至三而庸愚之人尚未醒悟今特再行宣諭該都統等務須諄切化導並不時稽查俾八旗人等遵照所頒定例實力奉行毋得陽奉隂違負朕崇儉黜奢維風訓俗之至意倘視為具文仍踵故習經朕訪聞必将該都統等一併議處特諭雍正十三年正月二十一日上諭八旗所拴官馬下五旗竟有給王公等之䕶衛官員親軍等拴養不時乗騎者官馬之設特以偹要事之用每日乗之俾其勞苦何得肥壮著交與八旗大臣等将各旗官馬務令應養之人拴養該管官員等不可妄狥情面給與不應拴養之人令其乗騎著都統等不時留心查驗特諭雍正十三年八月初三日九卿等奉上諭從來滿洲風俗於尊卑上下之分秩然有禮即冠履亦從不濫置一處此風實應永為典則當年聖祖皇帝惟恐古風漸逺時頒諭㫖諄切告誡朕即位以來敬謹奉行凡於本章奏摺中遇有壇廟等字者必敬謹奉持不敢置於牀座近見滿洲薫染漢習諸凡輕忽禮意漸弛竟有將槀案任意安放靴襪間者此風不可不嚴為謹飭以儆玩䙝嗣後部院及八旗官員人等於一切稿案或置懐中或貯嚢内皆可携行不得夾帯靴襪之間該管上司務湏嚴行查禁違者即行㕘處如不實力遵行經朕查出將該管上司必加嚴處特諭欽定八旗通志卷首之十
