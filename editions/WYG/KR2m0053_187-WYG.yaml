body:
  text: 欽定四庫全書欽定八旗通志卷一百七十三人物志五十三大臣傳三十九滿洲鑲紅旗三山阿席熙坤瑪祜宏世禄哈擴爾噶爾弼遜柱錫勒達阿爾䕶穆成額阿席熙阿席熙滿洲鑲紅旗人姓𤓰勒佳世祖章皇帝順治六年由兵部筆帖式遷本部主事九年遷都察院理事官十二年遷兵部督捕左理事官康熙元年遷光禄寺卿二年十二月考滿輔政大臣鰲拜等令解任隨旗行走尋出征茅麓山坐罪革職六年聖祖仁皇帝親政鍳阿席熙無罪命以郎中用七年二月授陜西布政使九年十二月巡撫鄂善疏述其儉樸率屬革除陋規舉為卓異十一年四月擢陜西巡撫十二年六月擢江南江西總督十三年正月逆藩吴三桂犯湖南阿席熙疏請遣發所屬兵赴援諭以江南江西需兵防守不必遣發四月疏言耿精忠據閩反叛賊兵一出汀州一出光澤與江西之贛州建昌接壤請撥現駐安慶滿洲兵赴江西分道𠞰禦又言杭州將軍圖喇以浙江兵力單弱咨請發兵赴援雖江南在在需兵防守而隣封告急無容坐視已於提標及狼山鎮標調馬兵二百步兵八百遴遊擊一員領往浙江聴調遣疏入並報聞七月増設江西總督阿席熙専轄江南時江西之廣信建昌已為耿精忠賊兵所䧟饒州㕘將陳九傑等叛應之詔阿席熙於隣近饒州處増兵防守阿席熙疏言徽州府屬休寜婺源祁門等縣與饒州接壤池州府屬建徳縣亦與饒州府屬之鄱陽浮梁二縣界址相連已分選將弁率兵移駐各隘口加謹防禦疏甫上績溪婺源二縣及徽州府城俱從逆阿席熙遣㕘將馬之駿遊擊姚宏信等率兵隨江寜將軍額楚往𠞰先復績溪次復府城與婺源九月上命簡親王喇布為揚威大將軍率師至江寜以將軍阿宻達額楚華善王之鼎與阿席熙並㕘贊軍務先是阿席熙以徽州及六安為盗賊淵藪請増兵三千分防堵禦部議以饟艱不允而允其募補江寜閒甲千名至是疏請以六百名入徽州營以四百名入六安營増設千把等官並各設副將一員擢遊擊姚宏信劉才任之又徽州營増馬九十六安營増馬五十以符馬一步九營制並從之十七年七月疏言前經部議御史劉安國條奏令察核𨼆漏地糧許自首免罪現年起科隨遍察江南全省清出田地一萬四千四百七十餘頃草山八百六十三里應徴銀三萬五千一百餘兩米麥豆三千一百九十餘石今已照數徴完可撥充軍用得㫖阿席熙察出全省𨼆漏地畆錢糧俱完具見實心任事可嘉下部議敘加兵部尚書銜二十年三月京口禦防髙騰龍因其族兄已故鎮江知府髙得貴為巡撫慕天顔檄追户部核減草豆價銀七千餘兩於家屬商之㕘領馬崇駿以慕天顔浮冐奏銷各欵訐告於將軍楊鳯翔鳯翔以奏銷非所預知寢其事六月阿席熙劾奏馬崇駿髙騰龍挾詐官民婪惡多端請革職勘治上命兵部郎中圖爾宸刑部郎中鍾有徳赴鎮江察審馬崇駿髙騰龍尋遣人叩閽訟慕天顔奏銷浮冐聞其首告乘秋審赴省與阿席熙宻商三晝夜揑欵劾罷希圖箝口上命圖爾宸鍾有徳一併訊質定讞下部核議馬崇駿髙騰龍婪取事實論絞慕天顔奏銷浮冐經户部核減諉罪於無産可抵之已故屬員又因人訐告私圖寢息應降三級調用仍賠核減銀兩阿席熙任總督多年於婪贓官員置若罔聞直待其訐告巡撫始行糾劾應降二級以加級抵銷仍留任上以阿席熙瞻徇慕天顔無可置辯命降三級調用不准抵銷遂罷任還京尋卒瑪祜瑪祜滿洲鑲紅旗人姓哲栢由順治九年繙譯進士充王府教習授佐領兼刑部員外郎遷欽天監監正時巡撫缺員多推用漢軍給事中和和達因有江南江西宜用滿洲之奏聖祖仁皇帝康熙八年議政王大臣等奉命㑹推滿洲郎中以上至學士通漢文有才能者為江寜巡撫一再舉奏未當上意遂特簡瑪祜任之九年淮安揚州二府遇夏雨連綿田畆廬舍被淹者多詔發帑賑濟瑪祜疏請蠲免桃源等縣帶徴康熙元年至六年積欠賦銀及六七兩年未完漕米部議漕米無蠲免例上曰桃源等縣屢被水災民生困苦漕米亦予蠲免瑪祜又以蘇州松江常州三府遇水分晰成災輕重請蠲減嵗賦部議令再確查上曰今年江南水災甚大比往年不同其被災情形曽經科臣柯聳陳奏今瑪祜以低窪淹没田地成災分數奏請減賦部議再令詳察恐致遲延即照所請行十年疏言蘇州松江二府額賦最重由明洪武初張士誠竊據其地乆攻始克遷怒於民取豪户收租簿付有司定税蘇松兩府賦額較宋代多至七倍比元朝亦多三倍是以民力困竭積逋嵗多現奉㫖分别官侵吏蝕民欠以次察追自康熙元年至八年民欠二百餘萬恐催徴亟而接踵逃亡舊欠仍懸新逋復積請敕部察核蘇松二府浮糧酌量減除以期自後嵗賦清完疏下部議以科則乆定寢其事時布政使慕天顔以蘇松頻遭水患議濬劉河淤道二十九里濬吴松江使復舊規建閘以時蓄洩瑪祜與總督麻勒吉疏請以漕折銀十四萬兩充費得㫖俞允給事中柯聳奏言東南水利宜乘此大工興舉時俾支河悉疏通且為善後計部議令巡撫籌覆瑪祜覆奏各州縣支河已次第興工疏濬其嵗修可令里民分任劉河吴松江口為海潮渾沙所往來宜責成府佐董水利者於每嵗水發時用淘河之法以通淤滯其吴江縣長橋乃太湖洩水要道嵗乆未挑上流盡漲沙灘應令縣民協力開濬又疏言髙郵興化諸州縣賑濟前議四月中停止今清水潭堤岸衝決田地復多淹没請展限俟水涸可耕後疏皆下部議行是年以京口將軍李顯貴鎮江知府劉元輔侵饟事覺不先舉發部議降調得㫖留任十五年六月卒於官年四十有九上曰瑪祜自簡任巡撫以來悉心任事奮勉勤勞且清慎素著溘焉病逝朕心深為憫惻下部議䘏賜祭𦵏如典禮諡清恪宏世禄宏世禄滿洲鑲紅旗人姓𤓰勒佳世居瓦爾喀祖噶錫屯太祖時率族衆來歸管佐領順治十一年十一月宏世禄由佐領授䕶軍㕘領十八年隨定西將軍愛星阿出征雲南獲明桂王朱由榔於緬甸阿瓦城康熙三年二月敘功授雲騎尉十二年二月擢鑲紅旗䝉古副都統十四年三月撫逺大將軍信郡王鄂扎副將軍圖海等𠞰察哈爾布爾尼命宏世禄偕䕶軍統領哈克山副都統烏丹㕘贊軍務四月大軍薄達禄賊壘布爾尼設伏山谷擁衆三千餘拒敵宏世禄率右翼兵與哈克山烏丹等進攻伏發鋭卒繼至我師合擊殱之布爾尼悉衆出列火器拒戰宏世禄等縦兵分擊大敗之賊復收潰衆拒山岡射却之分路掩殺無算布爾尼以三十騎遁師還敘功加三等輕車都尉十五年二月調滿洲副都統十九年三月逆孽吴世璠據雲貴同都統瑪竒趙璉副都統祖植椿率兵往廣西㕘贊大將軍賚塔軍務二十年正月偽將軍何繼祖擁賊萬衆距安籠所三十里堅據石門坎賚塔令都統勒貝等率兵前進宏世禄與副都統赫哷布總督金光祖分兵二隊繼之大敗賊衆奪石門坎隘口恢復安籠所城二月偽將軍詹養王有功張光先等九人據黄草壩我師分隊進擊宏世禄率頭隊兵直進自夘至未擒斬賊千二百有竒乘勝自曲靖迅馳恢復馬龍州易龍所楊林城時有賊屯板橋之渾水塘及嵩明州城相為犄角宏世禄遣營總碩塔幹都海等率兵往攻嵩明州克之渾水塘賊聞風棄營夜遁進軍歸化寺十一月世璠自殺雲南平軍旋復管佐領二十三年八月議政大臣等遵㫖甄别八旗大員以宏世禄庸劣不能彈壓下人請革職上以宏世禄年老免其黜退尋以老病乞休允之二十七年正月卒賜祭𦵏如例子龍科襲職孫佛保由佐領署火器營總隨大軍平定西藏雍正二年優敘給雲騎尉哈山哈山滿洲鑲紅旗人姓富察世居訥殷地順治十四年由官學生授鼓㕔筆帖式康熙十五年遷禮部主事二十年四月監督九江闗税務八月疏言九江闗定例徴船税不徴商貨但僻在一隅惟江南等省往雲南貴州四川湖廣之船由此經過其往福建廣東廣西及江西省城者則由湖口縣入鄱陽湖近年用兵雲貴商船不至川木罕下僅徴湖廣一省商船是以嵗多缺額惟湖口為八省咽喉山水接壤之區移闗於此不惟徴税有餘且可控扼八省臣查明宣徳年間始立九江闗嘉靖萬厯中曾移湖口本朝順治初年仍歸九江十二年監督費達復以移闗請下撫按議時撫臣郎廷佐以湖口地險易損商船議寢康熙十六年監督梁忠以軍興需餉請移湖口徴收部議不准所以屢移屢止者聖心至仁不以足税為急而以損船為念也臣今親往湖口察看形勢縣城在江東岸大江由城西東北流都陽湖之水南來㑹江城南沿山一里有狀元灣三里有鳯凰磯五里有文昌洑此船自湖出泊處城北臨江一里有麒麟河三里有武曲港五里有柘磯港此船自江入泊處明代移闗時所築舊堤雖壊可以修理停泊將九江僅徴湖廣一省商船移於湖口與六省商船一體徴收庶不致缺税額下九卿科道議命郎中伍什巴王九鼎㑹同巡撫李士楨詳勘奏言附近湖口之八里江梅家洲三里江躭鵝洲琉璃江惟水消可泊柘磯港武曲港文昌洑麒麟河虹橋港狀元灣水漲可泊並繪圖以聞仍下九卿議九卿等一議以順治三年至康熙十九年内溢額者二十年共十二萬七千四百餘缺額者十五年共五十五萬二千五百餘既移闗可以溢額應准行一議湖口消漲隨時無一定泊處恐風濤不測有覆舟之患闗税缺額之年皆因滇黔等省用兵商賈不行所致今各省蕩平商旅通行不致缺額議移未便得㫖仍著畫一議奏尋議移駐一年俟税額具題到日再議得㫖允行後監督蘇赫裴憲度等以二十二年分所收船税銀十二萬九百六兩零具題下部議作為額移闗乃定二十一年遷兵部員外郎二十二年調吏部二十三年御試八旗文學之臣以御製竹賦為題繙譯以覘滿漢文義自通政使以下筆帖式以上共五百餘員上親定等第哈山列一等擢右諭徳二十四年轉左二十九年遷内閣侍讀學士三十五年遷内閣學士三十六年二月調左副都御史六月遷盛京禮部侍郎四十二年十月疏言臣部所役網户採牧校尉等八百二十五人内無力婚娶者百六十餘此等人役因無室家往往不務生計逃避官差請發盛京户部銀四萬兩倣照公庫例派員經理一分生息以六年為期本還户部可得息銀二萬八千餘兩陸續給與無妻壯丁完娶銀人五十兩仍將餘銀生息乆逺有益下部議從之四十九年五月遷吏部右侍郎五十年五月轉左命往科爾沁審理台吉特古斯違禁留阿雜爾喇嘛一案得特古斯及侍郎拉都渾欺飾狀具奏稱㫖如所擬降革有差旋署禮部尚書事十一月擢刑部尚書列議政大臣五十一年五月諭曰刑部事件甚屬𦂳要自補授哈山以來㕘革劣員剔除積弊辦理之事明而不煩一應積案漸次完結可謂効力但意在速完或致草率刑名闗係重大務湏加意詳慎以副委任至意七月疏奏完結事件得㫖嘉奬五十二年三月萬夀聖節與賜年老大臣宴賚冠服等十二月誤將特㫖發遣不應援赦之流犯常明入彚題釋放得㫖切責下部議革職五十八年卒於家年八十有七子富明安官總督自有傳擴爾坤子遜扎齊擴爾坤滿洲鑲紅旗人姓薩克達先世居那穆都魯地國初有葉古徳者率户口來歸編佐領使統之是為擴爾坤祖父喜福兵部理事官崇徳八年十二月隨副都統鄂羅塞臣征黑龍江攻降圖呼爾禪城順治三年隨都統覺羅巴哈納擊敗叛鎮賀珍於漢中六年𠞰叛鎮姜瓖賊黨於寜武闗及左衛被創力戰紀功初由考滿授雲騎尉兩遇恩詔晉三等輕車都尉後因創發卒十五年贈二等輕車都尉以擴爾坤長子希特哈襲擴爾坤時任佐領隨征貴州敗明桂王朱由榔之將李成蛟於涼水井又擊走其晉王李定國於雙河口十八年希特哈卒擴爾坤次子佛倫雅圖襲職尋亦卒康熙元年擴爾坤襲二等輕車都尉十二年八月由䕶軍㕘領擢鑲紅旗䝉古副都統十二月以逆藩吴三桂反命駐防太原十三年正月移駐西安尋以四川告警命擴爾坤進駐漢中六月同副都統吴國楨㑹總督周有徳軍於廣元接應攻保寜大軍七月叛鎮吴之茂由昭化出犯廣元擴爾坤遣兵敗之八月賊五千餘由廣元西南水陸兩路來犯分兵擊却之九月擊敗刼糧賊衆於二郎闗擒偽都司賀騰龍十一月偽將軍何徳成引賊四千犯廣元分兵渡河擊却之逐北三十餘里尋以七盤朝天諸闗復為賊據詔撤廣元兵還漢中十四年七月漢中乏餉將軍錫卜臣領軍還城固縣擴爾坤率右翼四旗兵殿後偽總兵彭時亨等以八千餘賊據險邀阻擴爾坤擊潰之且戰且行三晝夜次洋縣之金水河與賊七戰皆㨗諸軍前行擴爾坤仍殿後賊衆環逼中鎗力戰殁於陣賜祭𦵏如例加騎都尉又一雲騎尉合舊襲之職為三等男二十五年二月以其孫額爾白納襲甫八嵗是冬殤乃以其子遜扎齊襲遜扎齊初任侍衛尋遷䕶軍㕘領三十二年十二月擢鑲紅旗滿洲副都統三十五年上親征噶爾丹以遜扎齊管鑲紅旗火器營協管鑲紅旗行營事五月師至克嚕倫河噶爾丹竄走命同平北將軍馬思喀追𠞰至巴顔烏蘭六月遷䕶軍統領三十六年扈蹕寜夏以伊拉古克三胡土克圖奔投䇿妄阿喇布坦命同散秩大臣巴當阿率兵齎四十日糧追至瀚海而還四十二年四月遷正黄旗蒙古都統四十四年九月調滿洲都統列議政大臣四十五年命同尚書徐潮等往淮安監修河工自髙家堰三壩下引水至唐漕河入寶應湖自髙郵減水壩下引水従車邏中壩至串場河白駒閘入海又於文華寺開引河及淮安城南澗河清溝引水由蝦溝口入海共濬河十萬四千九百餘丈築隄四萬一千五百餘丈并建閘洞閲五月竣事五十五年五月擢工部尚書五十七年四月調户部六十一年十一月世宗憲皇帝御極命協管陵工雍正元年四月以辦理敬謹盡心賜雲騎尉職合舊襲之三等男晉為二等男十月調工部尚書二年十月因户部庫虧帑二百五十餘萬兩遜扎齊不先舉發及奉㫖察究何人侵蝕復徇情庇䕶命革職分賠越三年以應賠銀十萬兩僅繳一千二百餘兩論斬繫獄六年九月詔八旗及各省督撫確察虧帑罪犯其父祖有偉績殊勲及陣亡盡節者據實具奏於是鑲紅旗都統等以遜扎齊之祖喜福父擴爾坤俱係出征傷亡入奏命免罪釋放并免追繳八年十一月卒其舊襲男爵循例銷去恩加之職改二等輕車都尉以其次子瑪什泰襲噶爾弼噶爾弼滿洲鑲紅旗人姓納喇父額爾徳赫任敬謹莊親王尼堪府長史從王征伐著績順治十六年署䕶軍統領偕安南將軍達素等𠞰海賊鄭成功於厦門額爾徳赫率右翼兵擒偽民安侯周序命署鎮海將軍康熙元年還京尋卒噶爾弼初任前鋒㕘領康熙四十四年授正黄旗䝉古副都統四十五年調正黄旗滿洲副都統五十一年遷正紅旗䕶軍統領五十七年調鑲紅旗䕶軍統領五十八年凖噶爾賊酋䇿凌敦多卜三濟等襲據西蔵命噶爾弼馳赴四川協理總督年羮堯軍務噶爾弼諜知䇿凌敦多卜與三濟不睦疏請遣諭䇿凌敦多卜降以分賊勢詔可五十九年二月平逆將軍宗室延信奉命由青海往定西蔵詔授噶爾弼為定西將軍偕都統武格率四川雲南兵由拉里協𠞰時䇿凌敦多卜自拒延信軍而遣其黨春丕勒宰桑以兵二千六百由章米爾戎來拒我軍乘其不備取道莫珠貢喀集皮船渡河直趨西蔵八月克之噶爾弼集蔵地大小苐巴頭目及各寺畨僧等宣示皇仁封閉達賴喇嘛倉庫遣兵守隘截凖噶爾糧道擒斬䇿凌敦多卜所授總管喇嘛五人䇿凌敦多卜等為延信所擊大敗遁西蔵平㨗聞諭曰噶爾弼等遵朕指授率領官兵歴從古用兵未到之絶域各加奮勵克取蔵地撫綏唐古忒人民甚屬可嘉凱旋之日著従優議敘是年延信留駐蔵六十年四月以病召還命噶爾弼往代仍佩定西將軍印閏六月授鑲藍旗䝉古都統九月至瀘定橋託病不行年羮堯以聞下部議革職尋因來京逗遛擬斬雍正元年六月詔貰其罪賜都統銜赴軍營効力七月署固原提督二年五月署布隆吉爾副將軍十一月授鑲紅旗漢軍都統三年九月調鑲藍旗滿洲都統兼右翼前鋒統領十一月擢奉天將軍四年奏言臣父額爾徳赫數従征有功因任長史未邀議敘懇恩賜諡奉㫖致祭一次諡果毅五年正月疏言奉天金銀銅鉛等礦雖乆禁開採而竊掘者尚多利之所在聚集多人恐其中濳蔵匪類致生事端除盃犀湖等處所産鐵為居民犁具所必需無湏禁止外請將遼陽屬之黄波羅峪開元屬之打金厰等處均照錦州大悲嶺例永禁開採以靖地方疏下部議如所請先是盛京户部員外郎滿達禮等侵用買米帑銀為侍郎王朝恩所劾諭曰噶爾弼係赦罪擢用之人理宜稽察積弊整頓陋習有應奏聞之事即行奏聞此等情弊伊如云不知則是於地方之事全不留心訪察負朕任用之恩如云知而不㕘則徇情𨼆匿可乎著明白回奏二月噶爾弼以失察請議處詔下部議㑹噶爾弼卒免議遜柱遜柱滿洲鑲紅旗人姓棟鄂曾祖郎色太祖髙皇帝時偕其兄郎格率瓦爾哈什所屬來歸祖阿爾泰任䕶軍㕘領順治元年隨睿親王多爾衮入山海闗擊敗流賊李自成兵追至望都縣敘功授雲騎尉世職遜柱於康熙八年補吏科筆帖式三十二年授工部主事三十四年遷户部員外郎三十七年遷本部郎中尋調縀疋庫四十三年授監察御史四十六年遷翰林院侍講學士仍兼御史事明年授内閣學士四十八年奉命祀江瀆明年遷盛京工部侍郎五十年調吏部左侍郎五十二年奉命祀東嶽五十六年擢兵部尚書五十九年三月疏言皇上勤求治理加意人才武臣推用時自提鎮以及千總必親考其騎射騐其年力如此其重也兵部向有武舉武生官員子弟効勞一途三年役滿考試弓馬分别一二等以守備千總用定例遵行已乆但人廣銓滯每逢月選効勞出身者多係弓馬生疎人才不及則裁汰不可不嚴也請於差官六十名裁二十名站堂辦事三十名裁四名停用武生官員子弟専取武舉武進士願効勞者其宗人府鑾儀衛兵科効勞之人一體取用武舉三年役滿内大臣㑹同兵部嚴加考試武進士頭等以營守備用二等以衛守備用武舉頭等亦以營守備用二等以守禦所千總用弓馬生疎人才不及者不准推用詔如所請六十年命兼吏部尚書六十一年十一月世宗憲皇帝御極充經筵講官雍正元年十月賜老成戎府扁額二年十月疏言國家設官分職一部之事分寄數司司無大小事有繁簡向來滿司員由堂官酌派惟漢司員係指缺補授竊思人才不一或才長而事簡則不得展其才或才短而事繁則致遲悮臣愚請漢司員指缺補授後堂官試看一二月如其人才能與指補之司相宜無庸置議倘才與缺不相宜奏請引見調補庶能員得展其長即中才亦可循分供職下九卿議從之三年六月充實録館副總裁四年二月調吏部尚書仍兼兵部事七月命専理兵部事五年正月署大學士九月授文淵閣大學士兼兵部尚書先是遜柱曾受檢討沈竹原任道石文彬私餽應追入官逾限未完部議奪俸展限七年十一月諭曰遜柱雖素餐多年尚無大過且年已八旬先帝舊臣在朝者甚少伊應追銀兩俱豁免停俸案件亦著開復以昭優恤老臣至意九年疏陳兵部事宜六欵一各司案件例有専責胥吏以上皆有當盡之職乃或因案涉繁劇或因事稍勞苦遂巧為推缷諉之他司甚至推之别部往返遷延每至遲誤臣等嚴加戒飭倘有漫不悛改仍蹈故轍者㕘處一外省暨各部咨行事件例皆按日登記然輕重緩急難以一律其稍闗𦂳要者分别先後限辦乃有故意推延或稱無例可查或稱舊案未得不思朝廷用人惟材原責以隨宜辦理若止據成例舊案只一書吏可查何湏司員何湏堂官請嚴為條約務令司員竭其才力如事涉疑難許呈堂酌定倘有舛錯臣等身任其責若推諉遲誤者照溺職例議處一議敘上闗國典奉命之日即應辦理乃展轉支吾如一案議敘人員多至百十人中有一二人註冊未明一二字重複錯誤藉端駁詰延遲日乆弊竇百出請嗣後議敘案件隨到隨辦即一二人當駁查不得因一二人稽遲至一二字重複錯誤詳查原案立可分晰而不肖官吏往往藉此需索臣等現行嚴禁若仍有此弊將該管官吏治罪一軍功議敘所闗尤重介胄之士効命疆埸非尋常勞績可比查從前敘功案内力戰一次予一功牌力戰數次亦止予一功牌所司以為定例是一經立功之人不得再與議敘甚非國家勸功行賞之意雖成例亦當更定請查明前案盡予改正一武職議處盜案疎防往往反覆駁詰如初㕘疎防之案則駁以或係疎防或别有𨼆匿及該處以實無𨼆匿報又稱確盜窩主應俟刑部審結再議查刑部盜案有遲至數年未結者若必俟結案定議則應開復人員其中雖有可用之才該上司以㕘案未結例不陞補而應行議處者轉得將降級罰俸之處遷延嵗月徒滋弊端請疎防案件即照該督撫提督所報定議仍咨刑部如審結後有𨼆匿揑報等情將該員及查報不實之上司㕘處庶事案隨到隨結不至壅滯於律法亦無疎縦一胥吏之設只令收送文簿此外原無執掌乃猾吏舞文或將新到文卷故意延捱舊存案牘擅自𨼆匿在堂司官以為稍遲一二日偶遺一二件未必遽有大弊然推陞之案稍差一二日其得缺先後各異承審之案稍遺一二件其情罪輕重迥别請嚴為條禁其遲誤一二日遺漏一二件者量行懲戒遲誤至五日以上遺漏至五件以上者分别輕重杖責若别有行私索詐等弊送刑部定擬並如議行十年三月特諭遜柱年逾八旬不必兼兵部十一年七月命以原官致仕八月卒年八十有四得㫖遜柱醇厚和平服官多年且年逾八旬應給恩典察例具奏尋賜祭𦵏如例錫勒達錫勒達滿洲鑲紅旗人先世居棟鄂以地為姓曾祖對齊巴顔於太祖髙皇帝時率屬來歸父格哩官兵部郎中兼佐領世祖章皇帝順治十五年従征雲南卒於軍聖祖仁皇帝康熙十一年錫勒達由太常寺贊禮郎兼管佐領事十六年授太常寺卿二十三年遷左副都御史尋擢内閣學士充經筵講官二十四年正月上祈穀禮成顧錫勒達及太常寺卿格斯特曰前見太廟致祭時執事官捧福胙由神位前趨走於尊祖敬宗之意未協爾等曾稽舊例否錫勒達對曰太常寺紀書禮部㑹典俱未載及上復以贊禮郎唱亞獻為次獻義亦與漢字不符命太常寺與内閣禮部集議改定執事各官従殿外側旁趨走改唱次獻為亞獻二十六年擢禮部左侍郎兼管太常寺事三十年與内大臣明珠等奉命頒賞喀爾喀部歸降人衆三十三年禮部奏祭奉先殿儀注誤設皇太子拜褥於檻内下吏部議處尚書薩穆哈革職錫勒達得㫖寛免三十五年上親統大軍征噶爾丹錫勒達扈従與學士三寶隨皇三子允祉等經理鑲紅旗大營軍務三十六年五月擢都察院左都御史九月遷兵部尚書三十八年七月奉命赴陜西署川陜總督十一月調禮部尚書三十九年十月調吏部尚書仍並署總督事時烏思藏喇嘛擅殺内地土官錫勒達疏請敕令喇嘛第巴拘犯解訊并請移化林營兵駐打箭爐以資彈壓得㫖允行既而逆畨刦掠官兵阻絶橋道錫勒達宻陳進勦機宜上命侍郎滿丕率荆州駐防官兵㑹提督唐希順相機𠞰撫至是錫勒達奏請親往㑹𠞰上以秦地𦂳要需人鎮撫諭止之尋滿丕等以㨗聞初錫勒達之未至陜西也四川巡撫于養志提督岳昇龍互訐贓欵遣侍郎洛察布泰往勘養志昇龍並應革職命未下昇龍復以養志交結藏畨宻奏上命錫勒達覆審得養志刪改昇龍咨報文移不據實奏致逆畨侵占内地戕害土官狀罪應斬昇龍革職無餘罪上以洛察布泰前此察審未明並降用尋復昇龍原官四十年十月錫勒達赴召還京任部事明年御史王度昭疏劾尚書李振裕勒取屬員禮物部議振裕收屬員賀夀圍屏屬實應革職諭曰若果勒取禮物其罪寜止革職若收一屏豈宜以細故輕黜大臣凡稱清吏豈皆一物不受錫勒達自陜西來曾奏藩庫羨餘嵗分萬金今仍為吏部尚書若以受屛議革如伊嵗受萬金者更以何罪處之下九卿等㑹訊振裕止收一屏亦非勒索度昭指實一事均免議尋命錫勒達以吏部尚書銜管理部事四十二年八月鎮筸紅苗作亂奉勅偕副都統圖斯海徐九如率前鋒四十名調荆州及廣西貴州湖南兵撫𠞰上指授方畧并諭令㑹同荆州副都統珠滿湖廣提督俞益謨協力酌籌十一月錫勒達至荆州趨鎮筸先遣將士赴苗寨宣諭徳威苗人薙髻摘環呈繳軍械歸誠者三百一寨惟天星寨龍椒洞排六梁等十五寨逆苗並恃險負嵎觀望不至錫勒達乃與圖思海等議令貴州提督李芳述進取糯塘山上葫蘆下葫蘆兠沙等寨廣西提督張旺進取馬鞍打郎老枉山等寨鎮筸總兵雷如進取毛都塘老家寨兩頭羊湄亮七都樹等寨而自與珠滿俞益謨率兵由報木營抵龍椒洞分兵五路預扼遁竄要隘攻滅天星寨并力搜𠞰排六梁箐斬殪無算李芳述張旺雷如等並分率所部攀籐入箐熏峝縁崖奮勇撲𠞰前後斬賊千餘級餘悉納降收獲牛馬軍械均充賞賚明年正月與總督俞成龍巡撫趙申喬等定議安立營汛増設鎮筸道乾州同知鳯凰營通判各一員為善後計三月還京復命繪圖呈覽報聞仍奉命兼管太常寺事四十五年十二月卒年五十有九賜祭如例子六人次子烏禮布官至黑龍江將軍第五子世貴官至内閣學士第六子拉布敦官至左都御史贈壯果伯祀雙忠祠乾隆十五年詔以其子及同旗兄弟子孫並改𨽻正黄旗拉布敦别有傳阿爾䕶阿爾䕶滿洲鑲紅旗人姓富察世居輝發地父鄂拜國初來歸管佐領世祖章皇帝順治元年隨大軍入山海闗擊走流賊李自成三年隨貝勒博洛征福建明年敘功予世職一等輕車都尉仕至鑲紅旗蒙古副都統第三子斡爾達襲世職阿爾䕶其長子也初任長史康熙十三年九月命署副都統同振武將軍坤巴圖魯率兵之河南駐防汝寜十二月賊帥王屏藩叛鎮吴之茂由四川窺陜西提督王輔臣叛應之阿爾䕶同坤巴圖魯率兵赴西安十四年二月率兵五百守寶雞五月賊兵七百餘由鳯縣犯棋盤宫阿爾䕶遣兵擊敗之追至天王村陣斬偽都司李玉國等四百餘級生擒偽總兵劉偶三遂招撫歸川十二堡偽㕘將普國祥等七員兵一千餘名降八月詔將軍佛尼勒分兵六百令阿爾䕶統轄嚴防棧道諸險要九月同副都統鄂泰分兵三隊擊敗偽總兵彭時亨等於棧道口仰天池賊兵墜崖死者無算復有偽總兵李姓冉姓引賊千餘由棧道螞蟻河出口立三營於九龍山阿爾䕶率兵八百星夜進攻大殪之生擒十七人獲器械縦釋賊營婦女二十九口歸其家十月偽總兵石存禮黒邦俊楊天保徐崇炳任徳旺等率兵八千出棧道據益門鎮口分七營覷寶雞以援平凉阿爾䕶與鄂泰曉諭諸軍此棧道隘口營壘􅀎攻克者與克州城一例論功遂分兵一由西山岡上一由東山岡上一由中路直指賊壘鼓勇奮進自已至未盡破賊七營追奔十五里射死偽總兵一擒斬偽官兵二百餘獲木印二偽劄二百馬匹旗幟盔甲器械無算又敗益門鎮賊兵四千於仰天池山下及益門鎮東邵家山黄兒子溝沈家坡等處尋遇偽總兵四人偽副將六人率賊五千據黄兒山拒戰擊却之賊不敢出棧道十五年二月以軍前効力屢次殺賊立功實授鑲紅旗䝉古副都統是年大軍克平凉阿爾䕶隨將軍穆占移師湖廣十六年擊吴逆偽將軍吴國貴於長沙力戰殁於陣十七年九月賜祭𦵏如例諡敏壯贈三等輕車都尉世職以其子博禮襲世宗憲皇帝雍正二年以阿爾䕶入祀昭忠祠穆成額穆成額滿洲鑲紅旗人姓那穆都魯西安將軍富喀禪之子也襲父三等子世爵康熙十三年二月耿精忠叛應吴三桂江西寜都廣信各屬騷動聖祖仁皇帝命康親王傑書為大將軍往征福建復命定南將軍希爾根副將軍哈勒哈齊平定江西六月令穆成額署副都統事與副都統倭赫率大兵赴希爾根軍前未至而精忠䧟石城犯寜都穆成額奉諭兼程速赴江西希爾根等方統兵援撫州穆成額遂分兵守南昌九月吴三桂自長沙遣賊將犯袁州詔穆成額率所部往與總兵趙應奎併力固守以俟大軍㑹𠞰遣將軍尼雅翰率駐防江寜兵及副都統碩塔等援之十月偽總兵黄乃忠等合賊衆數萬自萍鄉來犯袁州穆成額與副都統幹都海倭赫等敗賊於西村斬殺萬餘復登山奮擊賊大衂追斬五千餘級復與趙應奎分兵二路疾趨萬載縣環城攻擊賊出拒敵奮擊敗之陣斬賊渠邱以祥擒偽官童聖功收獲俘殪無算復其城十一月偽總兵張泰竊據安福縣穆成額偕㕘領色埓等分路進𠞰殺賊五千餘復安福縣時耿逆未平叛賊劉進忠等隂連鄭錦冦瀕海郡邑平南王尚可喜與總兵黄芳泰連疏請發大兵至潮州上命尼雅翰與鎮南將軍侍郎舒恕率兵赴廣東穆成額㕘贊軍務十四年大兵恢復南䧺始興守備李光明通賊䧟城穆成額與總兵張星耀統衆攻𠞰陣斬賊將郭梓擒光明及所署偽官等復始興明年五月尚之信叛韶州南䧺應之穆成額隨舒恕等退保南安贛州十月與江西巡撫佟國楨合兵勦滅贛州附近諸賊復萬安縣復與副都統額赫訥等屢敗逆賊於南康縣之固鎮堡十六年三月詔舒恕等鎮守贛州而以副都統莽吉圖為鎮南將軍征廣東仍敕穆成額與額赫訥㕘贊軍務駐兵韶州莽吉圖聞賊黨劉進忠冦潮州乃留穆成額守韶而自率兵赴廣東七月三桂遣賊犯韶州穆成額與副都統赫哷布督兵急擊却之及廣韶悉定仍與莽吉圖進兵廣西十七年三月吴逆偽將分犯潯梧桂林平樂等郡有㫖諭莽吉圖鎮梧州令穆成額與將軍額楚都統勒貝巡撫傅宏烈統兵協𠞰七月兵至鬱林戰失利退保藤縣十二月藤縣失守上復遣平南王尚之信及將軍舒恕率師赴援賊乃遁走二十二年議政王大臣等以穆成額藤縣失機不能禦賊且不收陣亡士卒骸骨應褫職籍没編入内務府佐領得㫖免其編𨽻尋以其弟新柱襲世爵欽定八旗通志卷一百七十三
