body:
  text: 欽定四庫全書欽定八旗通志卷二百十七人物志九十七忠義𫝊九滿洲八旗九年至六十年共一百三人康熙二十九根太根太滿洲鑲黄旗人由主事委署恭領康熙二十九年八月隨撫逺大將軍裕親王福全征額魯特噶爾丹至烏蘭布通與賊力戰左股受傷以傷重得殊賞後創發死恩賜雲騎尉世職承襲詳見世職表鄂岱鄂岱滿洲鑲黄旗人姓戴佳氏世居杭佳地方任驍騎校康熙二十九年隨撫逺大將軍裕親王福全征額魯特噶爾丹至烏蘭布通遇賊力戰歿於陣恩賜雲騎尉世職承襲詳見世職表赫色赫色滿洲鑲黄旗人姓富察氏世居蘇完地方署䕶軍校康熙二十九年隨撫逺大將軍裕親王福全征額魯特噶爾丹至烏蘭布通與賊力戰歿於陣恩賜雲騎尉世職承襲詳見世職表韓大任韓大任滿洲鑲黄旗包衣人世居中後所總管白陵之孫備禦韓成之子少繫呉三桂屬下順治十六年從征偽桂王有功康熙十二年冬三桂反從逆攻䧟吉安官兵失利十七年正月䕶軍統領哈克山擊敗之大任自贛州走福建詣康親王傑書軍前乞降奉㫖械桎來京既念其熟諳軍律免死授奉宸院員外郎二十九年兼火器營營長隨撫逺大將軍裕親王福全征額魯特噶爾丹戰於烏蘭布通賊隔河於深林卧駱駝為陣我軍力竭一等公佟國綱歿於陣大任奮勇衝擊傷刀鎗者六不退歿於陣恩賜雲騎尉世職承襲詳見世職表瑪蘭泰瑪蘭泰滿洲鑲黄旗人康熙三十五年隨撫逺將軍伯費揚古征額魯特噶爾丹至昭莫多地方擊賊陣亡恩賜七品官薩逹喀薩逹喀滿洲鑲黄旗人由前鋒康熙三十五年從撫逺大將軍伯費揚古由西路進兵征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜七品官老格老格滿洲鑲黄旗人姓伊拉理氏世居哈爾敏地方任前鋒校康熙三十五年隨撫逺大將軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜七品官覺和託覺和託滿洲鑲黄旗人姓𤓰勒佳氏世居蘇完地方任䕶軍校康熙三十五年隨撫逺大將軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜七品官子逹蘭泰襲哈什庫哈什庫滿洲鑲黄旗人貝勒䕶衛葉中額子任䕶軍校康熙三十五年隨撫逺大將軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰歿於陣恩賜七品官常武常武滿洲鑲黄旗人姓舒穆禄氏世居哈爾敏地方任䕶軍恭領康熙三十五年從撫逺大將軍伯費揚古由西路征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表揚舒揚舒滿洲鑲黄旗人姓𤓰勒佳氏世居哈逹地方以䕶軍校任副前鋒侍衛康熙三十五年隨撫逺大將軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表雅隆阿雅隆阿滿洲鑲黄旗人姓𤓰勒佳氏世居蘇完地方任䕶軍校康熙三十五年隨撫逺大將軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰歿於陣恩贈七品官子滿成襲道纒道纒滿洲鑲黄旗人姓戴佳氏由侍衛授科爾沁公主府長史康熙中厄魯特噶爾丹背約侵犯喀爾喀聖祖命中外備兵道纒請從効力康熙三十六年噶爾丹近踞巴顔烏蘭聖祖分派大兵三路進勦命道纒同中書阿必逹奉勅往諭至厄魯特地方噶爾丹欲屈之抗聲罵賊遇害恩賜雲騎尉世職承襲詳見世職表巴雅思虎朗巴雅思虎朗滿洲鑲黄旗人姓呉訥虎沁氏世居察哈爾初任恭領署副都統從征江西至吉安府城東北有賊三千餘掘濠立營與城中賊相應巴雅思虎朗直前突擊破走之填其濠賊兵千餘復出城來援迎擊又敗之遂定吉安江西諸城次第皆下進畧地湖廣將攻武昌至白鷺洲遇賊五百餘乘船來援巴雅思虎朗曰賊疑我不利水戰故乘船來我當出其不意亟擊之賊逺來疲乏非我敵也以十艘衝入其隊火銃鳥鎗並𤼵賊殱焉遂與都統巴查爾副都統碩塔進擊追至城下巴雅思虎朗中流矢卒恩賜騎都尉世職承襲詳見世職表巴朗巴朗滿洲鑲黄旗人姓董佳氏世居嘉木湖任雲騎尉兼三等侍衛康熙五十四年告往阿爾泰軍前効力五十七年告從前鋒統領塞楞進兵西藏至吉爾哈笋遇凖噶爾賊首先入陣殺賊數人更深入箭盡拔所中賊箭射殺賊一人力竭歿於陣賞䘏如例諾里爾逹諾里爾逹滿洲鑲黄旗人姓莫爾濟勒氏世居黑龍江巴林地方康熙五十五年選侍衛十五員隨侍衛班領塞楞進藏諾里爾逹以二等侍衛與選五十七年抵哈喇烏蘇察罕鄂布與凖噶爾賊遇諾里爾逹揮戈進擊轉戰數日遂歿於陣恩賜祭葬恩賜雲騎尉世職承襲詳見世職表常存常存滿洲鑲黄旗人任䕶軍校康熙五十七年從將軍公諾勒布進𠞰西藏遇凖噶爾賊於索諾木力戰陣亡賞䘏如例壯爾壯爾滿洲正黄旗人署䕶軍校康熙十四年從奉命大將軍康親王傑書征逆藩耿精忠敗賊将劉秉仁等十五年從寧海将軍喇哈逹敗海冦王進功於泉州十六年破偽提督呉淑於泉州十七年九月隨副都統禪布等敗偽将軍劉國軒於蜈蚣山十九年從征南大将軍頼塔征逆孽呉世璠二十二年正月擊敗何繼祖等於石門坎三月㧞黄草壩直抵雲南城下二十五年以軍功授雲騎尉二十九年從裕親王福全征厄魯特噶爾丹至烏蘭布通與賊力戰陣亡恩賜騎都尉世職承襲詳見世職表阿立瑪阿立瑪滿洲正黄旗人世居哈逹任叅領康熙二十九年從征厄魯特噶爾丹至烏蘭布通擊賊歿於陣恩賜雲騎尉世職承襲詳見世職表六什六什滿洲正黄旗人世居葉赫任䕶軍校康熙二十九年從征厄魯特噶爾丹至昭莫多擊賊歿於陣恩賜雲騎尉世職承襲詳見世職表徳赫得徳赫得滿洲正黄旗人姓𤓰勒佳氏世居尼瑪查哈逹地方任䕶軍校康熙二十九年八月隨裕親王福全征厄魯特噶爾丹至烏蘭布通與賊力戰歿於陣賞䘏如例恩賜雲騎尉世職承襲詳見世職表庫逹禪庫逹禪滿洲正黄旗人姓伊爾根覺羅氏世居鄂穆渾任䕶軍叅領康熙十三年從征呉逆經石門坎黄草壩桂花寺諸戰俱有功二十九年從裕親王福全征厄魯特噶爾丹於烏蘭布通戰歿恩賜騎都尉加一雲騎尉世職承襲詳見世職表門岱門岱滿洲正黄旗人任䕶軍叅領康熙二十九年隨尚書計論布征厄魯特噶爾丹至烏蘭布通力戰歿於陣恩賜雲騎尉世職承襲詳見世職表格布額格布額滿洲正黄旗人姓查庫塔氏世居阿里村任驍騎校康熙二十九年從裕親王福全征厄魯特噶爾丹至烏扎喇空古地方力戰陣亡賞䘏如例格色格色滿洲正黄旗人任䕶軍校康熙二十九年隨撫逺大将軍裕親王福全征厄魯特噶爾丹至烏蘭布通與賊力戰陣亡恩賜八品官子八十襲務逹禪務逹禪滿洲正黄旗人任前鋒恭領康熙三十五年從撫逺大将軍伯費揚古征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜騎都尉世職承襲詳見世職表鄂佛和鄂佛和滿洲正黄旗人任䕶軍校康熙三十五年隨撫逺大将軍伯費揚古由西路進兵征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜六品官子書魯泰襲南岱南岱滿洲正黄旗人姓顔扎氏世居雅蘭西林地方任藍翎侍衛康熙五十七年九月隨将軍額倫忒進勦西藏遇凖噶爾於哈喇烏蘇與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表阿延圖阿延圖滿洲正黄旗人由領催委署䕶軍恭領康熙五十七年八月隨副都統鄂山於和博克薩里山地方遇凖噶爾賊力戰陣亡賞䘏如例賽弼圖賽弼圖滿洲正黄旗人姓𤓰勒佳氏世居三姓地方順治十六年襲父留丹二等輕車都尉世職康熙十四年從撫逺大将軍圖海征陜西叛鎮王輔臣在平凉與賊力戰身受數創四十九年縁事削去恩詔所加三等輕車都尉改為騎都尉五十九年創發歿恩賜雲騎尉世職承襲詳見世職表邁圖邁圖滿洲正白旗人姓佟佳氏世居哈逹地方初任二等侍衛順治五年從征山東在鋸齒山巖擊破賊首蒋正綱十五年隨信郡王多尼征朱由榔至貴州敗偽侯李成蛟於凉水井偽晉王李定國在雙河口拒敵復擊破其衆萬餘至盧噶地方定國立寨拒戰復擊敗之康熙十三年從征逆藩耿精忠至浙江敗偽總兵劉秉仁於半山嶺十五年進克建陽縣擊走偽王總兵三千餘衆海冦偽總督趙得勝偽将軍何佑等統兵四萬在太平山連札二十六營隨寧海将軍喇哈逹破之併敗栢木山埋伏賊兵十六年隨平南将軍頼塔敗何佑等兵於泉州府又擊敗偽将軍劉國軒呉淑等於蜈蚣山並在事有功二十二年議叙授雲騎尉二十九年以副都統委署䕶軍統領從征厄魯特噶爾丹在烏蘭布通地方戰歿三十年恩贈三等輕車都尉世職承襲詳見世職表紐赫紐赫滿洲正白旗人姓伊爾根覺羅氏世居雅爾虎地方任䕶軍叅領順治十五年從征貴州擊敗偽侯李成蛟等至雙河口偽晉王李定國率衆萬餘列象堅拒復擊敗之又敗賊於普安州康熙二十九年從撫逺大将軍裕親王福全征厄魯特噶爾丹至烏蘭布通與賊力戰歿於陣恩賜雲騎尉世職承襲詳見世職表兆爾敏兆爾敏滿洲正白旗人姓穆爾察氏世居穆倫地方任員外郎縁事落職康熙二十九年由廢員隨撫逺大将軍裕親王福全征厄魯特噶爾丹至烏蘭布通與賊力戰歿於陣賞䘏如例寳石寳石滿洲正白旗人原任一等侍衛兼輕車都尉以事削職康熙二十九年隨裕親王福全征厄魯特噶爾丹至烏蘭布通擊賊陣亡賞䘏如例伍齡阿伍齡阿滿洲正白旗人姓董鄂氏世居董鄂地方父巴杜以軍功授二等輕車都尉征福建至羅源山陣亡恩賜一等輕車都尉兼雲騎尉伍齡阿襲任三等侍衛縁事革職康熙二十九年八月隨裕親王福全征厄魯特噶爾丹至烏蘭布通與賊力戰陣亡賞䘏如例第爾求第爾求滿洲正白旗人姓託和絡氏世居黑龍江地方任䕶軍校縁事革職康熙二十九年由廢員隨撫逺大将軍裕親王福全征厄魯特噶爾丹至烏蘭布通遇賊力戰歿於陣賞䘏如例寳住寳住滿洲正白旗人姓他塔喇氏世居查坤木地方康熙二十九年由廢員隨撫逺大将軍裕親王福全征厄魯特噶爾丹至烏蘭布通與賊力戰歿於陣賞䘏如例金布金布滿洲正白旗人康熙二十九年以廢員隨裕親王福全征厄魯特噶爾丹八月至烏蘭布通與賊力戰歿賞䘏如例八十八十滿洲正白旗人姓阿顔覺羅氏世居赫圖阿喇地方任䕶軍校委署恭領康熙二十九年隨撫逺大将軍裕親王福全征厄魯特噶爾丹至烏蘭布通與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表哲爾徳哲爾徳滿洲正白旗人姓巴雅拉氏世居松花江地方任二等侍衛康熙三十五年隨撫逺大将軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表卓爾賀卓爾賀滿洲正白旗人姓查喇拉氏世居烏喇地方任䕶軍校康熙三十五年隨撫逺大将軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜七品官尼滿尼滿滿洲正白旗人任䕶軍校康熙三十五年隨撫逺大将軍伯費揚古由西路進兵征厄魯特噶爾丹至昭莫多與賊力戰陣亡賞䘏如例奚特諾奚特諾滿洲正白旗人任䕶軍校康熙三十五年隨撫逺大将軍伯費揚古征厄魯特噶爾丹至昭莫多力戰歿恩賜七品官卓拉虎卓拉虎滿洲正白旗人任䕶軍校康熙三十五年從撫逺大將軍伯費揚古征厄魯特噶爾丹至昭莫多力戰歿恩賜七品官安濟布安濟布滿洲正白旗人委署前鋒校康熙三十五年從撫逺大将軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜七品官托逹海托逹海滿洲正白旗人署䕶軍校康熙三十五