body:
  text: 欽定四庫全書欽定八旗通志卷一百六十八人物志四十八大臣傳三十四滿洲鑲白旗二哈納額色赫興鼐葉璽覺羅巴喀爾塔喇拉烏庫理哈索渾依覺羅果科逹克薩莽圖瑚圖納都瑚瑪興鼐兄孫喀爾竒興鼐滿洲鑲白旗人姓納喇世居哈逹地父素巴海於太祖髙皇帝時率二百人來歸編佐領令其長子莽果統之興鼐素巴海第三子也受知太宗文皇帝天聰八年予騎都尉世職崇徳元年隨英親王阿濟格征明同都統逹爾罕攻順義縣先登克城叙功加一雲騎尉三年任工部理事官考滿晉世職三等輕車都尉世祖章皇帝順治元年隨大軍征流賊李自成至陜西賊衆自延安府出犯興鼐率衆截擊大敗之二年追剿自成於武昌躡擊之富池口獲其船賊黨整衆據河岸以拒興鼐同䕶軍統領哈寜阿叅領希爾根擊潰其衆又同䕶軍叅領布克沙至江南池州府明總兵黄斐乘舟拒戰我兵奮擊潰走斬首二百級獲船十二三年蘇尼特部騰機斯等叛奔喀爾喀興鼐隨豫親王多鐸率兵追之敗土謝圖漢及碩類汗兵敘功晉世職二等輕車都尉七年擢工部侍郎尋以考滿並三遇恩詔晉至二等男爵十五年以㑹勘出征福建將士在羅源縣敗遁事徇情定讞罷任革世職十八年聖祖仁皇帝即位以興鼐處分過重復予世職一等輕車都尉兼一雲騎尉康熙三年九月卒子成格襲世職其兄莽果之孫喀爾竒於順治十六年以䕶軍校隨安南將軍明安逹哩駐防荆州聞海賊鄭成功犯江寜率兵赴援敗偽都督楊文英於揚子江口康熙十三年署䕶軍叅領隨定南將軍希爾根討逆藩耿精忠師次南昌賊已䧟建昌撫州因督兵圍撫州敗賊於四十里塘堡地十四年偽都督楊益茂據九江府七里岡喀爾竒偕衆戰郤之尋擊敗偽將軍邵連登復建昌府城時逆賊呉三桂據湖南其黨夏國相䧟萍鄉喀爾竒隨大軍進征國相敗走遂趨長沙破偽總兵謝勝先於瀏陽十七年隨貝子彰泰敗偽將軍呉國貴於武岡州凱旋叙功予雲騎尉世職尋卒子喀爾岱襲覺羅巴哈納覺羅巴哈納滿洲鑲白旗人景祖翼皇帝第三兄之四世孫也年十七即効力戎行屢從太宗文皇帝征伐著有勞績天聰八年授騎都尉世職九年命免功臣徭役並分設佐領巴哈納與焉崇徳三年授刑部理事官明年擢本部叅政尋兼正藍旗滿洲副都統七年以刑部失勘違禁出邉之布山罪又拒戰錦州之䕶軍阿桑喜自陳戰功於法司巴哈納審㫁不公革世職留副都統任八年七月論登州畧地諸將罪巴哈納以倡議令軍士皆歸坐奪所俘獲論罰如律順治元年四月擢正藍旗蒙古都統尋調滿洲都統六月與都統石廷柱徇霸州滄州徳州臨清皆下之七月詔平山西遂移師㑹都統葉臣軍遣使招降明總督李化熙等十一月同石廷柱率師自汾州趨平陽大敗賊兵於西山寨俘斬甚衆降偽副将三員至黑龍闗降明守偹三員綜計得降卒六千餘人以功賚白金授三等輕車都尉世職三年九月隨肅親王豪格勦流㓂張獻忠於四川分兵討平遵義䕫州茂州諸路斬偽官數百員降甲士數千獲馬驘輜重無算餘冦悉平五年二月以前討張獻忠時䕶軍統領哈寜阿被圍䕶軍統領阿爾津蘇拜援出之叅領希爾根遲留不救及師旋希爾根冒功妄争巴哈納勘察失實又肅親王欲以有罪揚善之弟吉賽為䕶軍統領巴哈納與議政大臣索渾不為阻止扶同進奏部議革職解任得㫖改降世職為騎都尉尋擢户部尚書八年正月世祖章皇帝既親政巴哈納入奏事畢上詢民間疾苦及國家無益之費巴哈納以遣官採辦臨清甎分派漕船載運通州由五閘撥運供用對遂奉諭永行停止二月兼正白旗滿洲都統四月駐防佐領碩爾對訐告户部給餉不均下法司鞫問部議巴哈納阿附睿王私厚白旗兵丁給餉不絶刻待黄旗兵丁屢請不發應論死籍沒上命免死革世職罷任籍沒家産三分之二明年十月起授刑部尚書十一年二月同諸大臣奉命分賑畿輔賜敕印以行八月上嘉其素効忠勤始終不渝特晉太子太保明年二月加少保兼太子太保五月晉少傅兼太子太傅授𢎞文院大學士十五年改中和殿大學士十三年復設内三院仍授秘書院大學士康熙元年兼鑲白旗滿洲都統五年十二月卒贈少師兼太子太師康熈八年五月巴哈納子巴什訴言巴哈納自十七嵗効力行陣厯四十餘年因與鰲拜遏必隆不和不給諡號不與立碑部議給予祭葬得㫖巴哈納准予諡諡敏壯額色赫額色赫滿洲鑲白旗人姓富察世居訥殷祖莽吉圖當太祖髙皇帝時隨其兄夢古慎郭和來歸額色赫初事太宗文皇帝由䕶軍校屢從征授兵部理事官天聰九年隨副都統巴竒蘭征黒龍江先還奏㨗崇徳三年擢秘書院學士五年齎敕赴錦州諭睿親王多爾衮駐兵機宜㑹都統圖爾格敗明兵於木倫河額色赫以㨗還奏六年三月同内大臣圖爾格大學士范文程剛林等往訊圍錦州大軍離城逺駐遣兵歸家等状王貝勒大臣皆服罪降罰有差八月明總督洪承疇率衆十三萬援錦州至松山額色赫受上方畧往諭都統王貝勒等尋還奏敵勢甚衆宜益兵上遂統師親征擊敗之七年鄭親王濟爾哈朗克錦州祖大夀降額色赫至軍營宣諭慰撫降衆八年隨貝勒阿巴泰征明至山東下兖州同叅領穆成格等奏㨗世祖章皇帝順治元年隨大軍入闗定燕京二年叙功授騎都尉世職四年考滿加一雲騎尉五年遷刑部啟心郎八年擢國史院大學士九年充纂修太宗文皇帝實録總裁官㑹試正考官列議政大臣復充武㑹試正考官屢遇恩詔晉世職至一等輕車都尉十二年加少保兼太子太保再充㑹試正考官時方纂輯太祖太宗聖訓又奉諭取經史中忠臣孝子賢人亷吏之事蹟語言分類採輯成書名曰資政要覽額色赫充總裁官十三年敕使朝鮮鞫獄是年考滿晉少傅兼太子太傅廕一子入監十五年改保和殿大學士十六年詔奨奉職勤勞晉少師兼太子太師十八年十月卒賜祭葬如典禮諡文恪聖祖仁皇帝念額色赫宣力有年敬慎素著特擢其子塞色赫秘書院學士而以其孫常明襲世職世宗憲皇帝時以額色赫入祀賢良祠葉璽見子辰市禄葉璽滿洲鑲白旗人姓郭絡羅祖常舒為沾河寨長太祖髙皇帝創業時同其弟揚舒率衆來歸從征尼堪外蘭及誅諾宻納皆在事有功尋擢任大臣以其子布哈圖察哈喇並為佐領葉璽布哈圖之子也太宗文皇帝崇徳二年以䕶軍叅領隨睿親王多爾衮征明由青山口毁邉墻入破薊遼總督呉阿衡軍五年圍錦州擊敗杏山騎兵及松山歩兵世祖章皇帝順治元年隨英親王阿濟格征流賊李自成二年正月至延安府賊兵出犯葉璽同左翼兵奮擊大敗之李自成尋遁走湖廣大兵進擊抵安陸府獲賊船四復同䕶軍統領哈寜阿自大江追擊流賊至富池口奪其戰艦賊復列陣岸上又擊敗之尋還京三年四月蘇尼特部騰機斯騰吉特等叛奔喀爾喀葉璽隨豫親王多鐸貝子博和託等征之屢擊敗賊衆追至布爾哈圖山擒斬七人招降喀爾喀二十五户七月師自圖拉河西行至扎濟布拉克遇喀爾喀土謝圖漢兩子率兵二萬來犯葉璽力戰歿於陣賜䘏贈䕶軍統領予騎都尉職世襲罔替無子以弟之子額爾遜襲世宗憲皇帝雍正二年建昭忠祠以葉璽入祀葉璽兄之子辰布禄初任佐領兼工部理事官崇徳三年随睿親王多爾衮征明山東攻克陽信縣城順治三年隨定西大将軍和洛輝擊敗賊賀珍兵於漢中又隨肅親王豪格征流賊張獻忠同䕶軍叅領逹素鄂摩克圖等屢挫賊鋒師還賊躡其後復同前鋒叅領錫卜臣還擊敗之兩遇恩詔予騎都尉世職十一年從征海賊鄭成功至浙江舟山與署䕶軍統領尼雅逹敗偽總制陳六御等叙功晉世職為三等輕車都尉十七年卒子瑪晉襲喀爾塔喇子赫特赫喀爾塔喇滿洲鑲白旗人姓章佳世居費雅朗阿父圖爾坤歡詹當太祖髙皇帝時率子五人及百餘户來歸授佐領使轄之既卒喀爾塔喇仍其任太宗文皇帝崇徳三年任䕶軍叅領隨豫親王多鐸征明寜逺将入邉截擊敵兵生擒六人及還遇敵兵又連敗之六年大軍圍明錦州城内兵出犯鑲黄旗所守壕塹左翼䕶軍俱退避壕内喀爾塔喇及叅領逹木布等坐罪應論死上命從寛罰鍰世祖章皇帝順治元年四月大軍入山海闗擊流賊李自成喀爾塔喇率本旗兵敗賊騎追至望都盡殱其後隊旋隨都統巴哈納等下河南懐慶擊敗賊兵進定山西破賊於黄河渡口追至榆林二年自成遁走湖廣喀爾塔喇隨䕶軍統領鰲拜攻安陸府克之復率兵追剿連破賊營獲船六十餘五年江西總兵金聲桓以南昌叛上命征南大将軍譚泰往討之大軍至童子渡賊據水為陣喀爾塔喇奪其舟梁擊敗賊衆分兵趨饒州遇偽副将三人率衆三千迎戰喀爾塔喇同叅領巴朗等擊敗之乘勝攻克饒州城進征南昌甫駐營賊衆來犯喀爾塔喇奮戰挫賊既而大軍掘壕圍城喀爾塔喇駐守江岸賊以船運糧入城喀爾塔喇屢率衆邀擊獲船八又縱火焚其船七百餘六年正月大軍合攻城北喀爾塔喇同叅領艮泰另率兵於城南樹雲梯破城凱旋得優賚九年八月擢䕶軍統領時孫可望李定國等擾湖南上命敬謹親王尼堪統師征剿喀爾塔喇領䕶軍以隨十一月大軍至衡州彼衆迎戰我軍既擊敗之乘勝疾趨遇伏喀爾塔喇力戰歿於陣先是叙平流賊功予喀爾塔喇雲騎尉世職嗣叙平金聲桓功凡三遇恩詔洊晉一等輕車都尉及是議䘏晉三等男賜祭葬如典禮諡忠壯立碑墓道子赫特赫襲爵十六年任叅領隨大軍征海賊鄭成功於福建擊敗偽總兵黄昌等尋率舟師進攻厦門殁於陣議䘏予騎都尉世職以其兄赫伸襲弟格爾徳襲三等男烏庫理烏庫理姓扎庫塔先世居和克通吉父瑪爾圖當太祖髙皇帝創業時率百餘人來歸𨽻滿洲鑲白旗授騎都尉世職從大兵征明圍錦州殁於陣烏庫理襲父職年十六即効力戎行太宗文皇帝命管㕘領事崇徳三年隨貝勒岳託征明至山東明太監馮永盛率兵迎戰擊敗之大軍攻濟陽縣雲梯兵未至攀垜堞先登揮所部兵克其城師還將出邊同歩軍統領薩穆什喀殿後敵不敢逼道經大平寨復歩戰敗敵七年隨征明錦州戰於松山敵遁走旋合潰兵據北山立營壁壘甚固烏庫理直前奮擊三戰皆㨗世祖章皇帝順治元年四月烏庫理隨睿親王多爾衮入山海闗擊敗流賊李自成追躡至望都九月隨都統葉臣攻太原府率數十騎繞城偵視城中兵突出摶戰烏庫理同叅領薩璧圖杭愛往來衝擊斬獲甚衆尋隨英親王阿濟格征陜西湖廣江西班師至池州府偵賊黄斐兵獲賊船十二還京任兵部理事官叙功加一雲騎尉三年隨肅親王豪格征流賊張獻忠於四川擊敗賊将髙汝礪騎兵獻忠敗潰衆遁烏庫理追之多斬獲旋軍賊躡我後還擊却之五年從征大同叛鎮姜瓖圍寜武闗偽巡撫姜輝偽總兵劉維思合兵三千赴援屢犯我營闗内賊衆亦乘隙出拒烏庫理率三旗䕶軍往來協擊轉戰闗下及偏闗西河營等地凡七戰七勝進趨左衛賊兵萬餘列陣以待烏庫理衝擊破之復用紅衣礟攻克其城連敗賊兵多斬殪八年二月調工部理事官十月仍調兵部三遇恩詔晉世職至一等輕車都尉十年同理事官額赫理率禁旅並調江寜杭州駐防兵赴福建㑹勦海賊鄭成功時海澄縣為賊所據大軍進征賊扼要隘列火噐拒戰烏庫理連破其營賊乃毁橋斷路烏庫理躍馬渉河賊衆驚潰大軍畢渡賊又於海岸屯兵三千餘烏庫理歩戰敗之先後與都統金礪及額赫理等招降賊兵數千平賊寨數十叙功加一雲騎尉十二年擢大理寺卿疏陳五事一言國家定鼎以來滿洲士卒嵗從征討所領月餉例有定額而買馬置械一切軍装皆所自偹留京家口衣食維艱請恩加賞賚一言兵荒所在民多流離目前已奉㫖賑貸将來作何安輯俾自為生計乞勅部速議便宜一言緑旗死事弁兵䝉恩咸予贈䘏更請推廣皇仁飭所司撫慰其妻孥量為贍給一言江廣閩浙沿江濵海盜賊出沒不常其邉口要區請勅各督撫詳察機宜増設重兵以資防勦一言我朝中外一家邉逺畨夷職貢之外仍通貿易而西北䝉古若厄魯特俄羅斯諸部尚阻聲教請勒理藩院大臣酌議互市條例以昭畫一疏上俱下部議行尋奉命往視黄河決口十三年擢漕運總督越三年考滿還京賜鞍馬授盛京總管聖祖仁皇帝康熙元年改總管為将軍仍以烏庫理任之是年疏陳所屬兵丁宜定更畨直役之例以均勞逸詔如所請先是盛京設户部禮部工部侍郎等官而兵民獄訟悉𨽻其事於總管未設刑部至是烏庫理請増設疏下廷議始設刑部侍郎一郎中二員外郎六主事三四年四月以疾卒於任賜祭葬如例以其世職令二子分襲長子俄謨克圖襲三等輕車都尉次子佛保襲騎都尉兼一雲騎尉索渾索渾滿洲鑲白旗人姓𤓰勒佳初事太宗文皇帝以佐領兼前鋒叅領崇徳三年同叅領沙爾瑚逹等率兵五十人往偵明義州擒八人歸四年上親征明錦州命索渾分兵畧杏山獲牲畜無算尋以所部兵在松山遇敵退縮被奪弓矢櫜鞬索渾坐約束不嚴命逮繫尋釋之五年隨睿親王多爾衮圍錦州遇敵兵於松山奮戰多斬獲六年復從上親征錦州敗明馬歩軍於松山斬二十九人明兵自松山宵遁追至海岸俘斬甚衆旋遇明杏山騎兵復同叅領席特庫等擊敗之追斬百餘人時蒙古兵有降明者立寨山巔索渾同叅領瑚里布進攻盡殱其衆七年隨貝勒阿巴泰征明薊州敗明總督范志完兵復與都統武頼敗敵於三河敵援兵踵至索渾同都統巴哈納奮力邀擊敵遂潰走八年隨鄭親王濟爾哈朗征寜逺有騎兵千餘迎拒索渾率前鋒力戰却敵既而敵軍擾我牧羣復擊却之擒二人叙功授雲騎尉世職世祖章皇帝順治元年大兵入山海闗討流賊李自成索渾擊敗偽總兵唐通於一片石復隨豫親王多鐸追勦自成師至陜州分兵先驅偽将軍張有曽糾賊騎二百餘屯據靈寳城外索渾率二十人乘夜襲擊獲馬四十餘二年叙入闗功晉世職為騎都尉兼一雲騎尉嗣遇恩詔晉一等輕車都尉六年七月擢䕶軍統領十月隨巽親王滿逹海征叛鎮姜瓖餘黨索渾率兵往圍平遥偽知縣已先率兵民遁走復糾賊五百人回取儲糗我軍奪門入盡殱之七年任吏部侍郎八年改授鑲白旗副都統十五年擢本旗都統十六年同内大臣逹素征海賊鄭成功於福建明年勦賊厦門官軍不習水戰失利康熙元年論死罷任削世職尋卒覺羅果科覺羅果科滿洲鑲白旗人初任䕶軍叅領太宗文皇帝崇徳六年隨大軍圍明錦州分兵駐杏山河岸敵兵自寜逺來窺果科同前鋒統領努三擊敗之追至連山斬級三十獲馬三十二七年同努三畧寜逺遇中後所敵騎五十犯我牧地戰却之敵援兵四百踵至並擊之潰遁八年復同努三至界嶺口偵軍事與明兵戰斬其守備及歩騎三百餘俘獲甚衆世祖章皇帝順治元年隨睿親王多爾衮入山海闗擊敗流賊李自成追至望都二年隨英親王阿濟格征陜西攻克綏徳城自成兄子錦據延安數犯我營果科同䕶軍統領希爾根奮勇迎擊三戰三㨗自成奔湖廣我軍追至安陸府屢敗賊衆獲賊船八十三年隨肅親王豪格征流賊張獻忠過漢中擊敗叛鎮賀珍獻忠自西充引賊衆迎戰奮擊敗之復與希爾根搜剿賊黨多所斬獲五年隨鄭親王濟爾哈朗征湖南任前鋒叅領時明桂王朱由榔據廣西其總督何騰蛟守湘潭我兵薄城下騰蛟分兵三門拒戰果科與前鋒叅領瑚沙敗其城西兵奪門而入尋隨都統佟圖賚率兵趨衡州距城三十里遇彼衆千餘擊敗之其總兵陶養用據石橋立寨果科隨副都統碩詹等攻㧞其寨復擊敗胡一青周進唐之兵追擊一青至全州還京授刑部理事官叙功予雲騎尉世職兩遇恩詔晉世職為騎都尉兼一雲騎尉十一年三月擢工部左侍郎七月署尚書事十三年十月乾清宫成加尚書銜十五年三月壇廟工成議叙晉世職二等輕車都尉十七年九月擢工部尚書先是尚書穆哩瑪甫任事以修理京師通州諸倉所給磚價視時值浮多與新任侍郎巴進泰同議裁減窑户以不敷工費訴於部果科言新任官不知則例令如舊補給十八年五月果科卒輔政大臣鰲拜等以修倉糜費請㫖下王大臣察議由果科主其事罰銀百兩革尚書原銜削世職留軍功所得雲騎尉以其子薩爾布襲康熙七年聖祖仁皇帝親政薩爾布訴枉求復世職大學士圖海等入奏下部議不准諭曰前此議處時果科已故較同案官貟處分過重命復還騎都尉以薩爾布兼襲納都瑚納都瑚姓𤓰勒佳費英東弟音逹户齊之第八子也初與其兄伊遜鐘金吉賽等俱𨽻滿洲鑲黄旗後改𨽻鑲白旗世祖章皇帝順治元年納都瑚任䕶軍叅領隨睿親王多爾衮入山海闗擊敗流賊李自成尋隨豫親王多鐸敗賊潼闗進定西安移師下江南追明福王朱由崧至蕪湖並有斬獲功授雲騎尉世職三年多尼特部騰機思等叛奔喀爾喀納都瑚隨豫親王追勦遇土謝圖汗及碩羅汗兵拒戰並擊敗之五年隨征南大将軍譚泰討叛鎮金聲桓屢敗賊兵復於章江西岸截賊饟運獲艘三十餘七年遇恩詔晉騎都尉八年二月擢正白旗副都統九月改副都御史先是伊遜之孫沙爾布卒無嗣命納都瑚并襲其一等輕車都尉遂由騎都尉晉三等男復以叙前軍功及兩奉恩詔晉爵三等子至是有㫖核議各官濫邀爵職改納都瑚為一等男兼一雲騎尉十三年四月考滿廕一子入監十四年七月上以都察院奏請更定世職襲例或有受囑徇私情事召集院臣詰問副都御史能圖與納都瑚實先倡議並下部論罪應削爵革任命從寛降爵一等革副都御史仍理院事十五年正月援赦欵復原官及所降之爵十七年卒賜祭葬無子以鐘金之孫貴欽吉賽之子盧栢赫分襲貴欽襲一等輕車都尉盧栢赫襲二等輕車都尉合所襲吉賽之騎都尉晉一等輕車都尉兼一雲騎尉瑪拉瑪拉滿洲鑲白旗人姓納喇尚書尼堪從子也尼堪卒無子瑪拉與叔阿穆爾圖阿錫圖及其弟兆資分襲尼堪二等子爵瑪拉襲三等輕車都尉初任理藩院筆帖式世祖章皇帝順治五年逆鎮姜瓖叛英親王阿濟格帥師圍大同令瑪拉調䝉古兵隨征七年任户部副理事官累遷理藩院即中康熙十四年察哈爾布爾尼叛聖祖仁皇帝命信郡王鄂扎帥師討之瑪拉自陳久任理藩院習知䝉古情形願赴軍前効力遂奉命與員外郎色稜赴科爾沁翁牛特巴林敖漢喀喇沁土黙特扎嚕特諸部調選兵馬協剿凱旋擢通政使十五年遷禮部侍郎十六年擢工部尚書十七年同内大臣喀岱徃科爾沁諸外藩宣諭禁令先是瑪拉甫任尚書上誡以工部弊端甚多宜盡心釐剔十九年四月詔添給陵寝匠作雇直令工部議行議自奉詔之日始支給新定雇直上詰瑪拉何不於議行奉㫖日始瑪拉謂已牒工所添給未便追扣上以情節朦混下吏部都察院察議應降一級諭責瑪拉不能清釐弊端回奏復巧飾命降五級從寛留任二十年三月因饗殿噐用修造疎忽革尚書任仍留世職二十二年四月上以俄羅斯數犯邉界擾害索倫及斐雅喀諸部命集兵黑龍江為進征計遣瑪拉往索倫預儲軍實並支部帑四千兩量買貨物携赴軍前市易糧米牛羊瑪拉尋疏言索倫總管博克等所獲俄羅斯人及軍前招降者皆迫於大兵始投誠索倫宻邇俄羅斯不宜久留應移之内地事下部議行二十三年五月疏言雅克薩尼布楚二城久為俄羅斯所據臣宻詢情形雅克薩惟耕種自給尼布楚人嵗捕貂與喀爾喀貿易資以養贍請勅喀爾喀車臣漢禁止所部與尼布楚貿易並勅黑龍江将軍水陸並進作攻取雅克薩状因刈其田禾則俄羅斯不久自困上是其言即以瑪拉所奏檄知喀爾喀並以大軍将次進勦𫝊示俄羅斯二十四年正月詔遣都統朋春等師師往黑龍江䇿議進兵又念瑪拉自遣用以來甚為奮勉且頗知雅克薩諸地形勢特授副都統銜叅贊軍務三月瑪拉遣蒙古三十人往雅克薩城生擒俄羅斯七人得城中設備及遣人乞援各部状逮送至京六月朋春等收復雅克薩城大兵告㨗瑪拉在事有功二十五年黒龍江佐領鄂色以耕牛多斃農噐損壊時近東作奏請儲備命瑪拉往黑龍江督理農務諭曰農事闗係兵餉須令合力播種收穫豐稔懋著成效二十七年授䕶軍統領二十九年上以噶爾丹肆掠喀爾喀命瑪拉同都統額赫訥前鋒統領碩鼐等率喀爾喀兵往征噶爾丹賜内廐馬以行未幾噶爾丹掠烏朱穆沁上命裕親王福全等分統大兵協力㑹勦噶爾丹敗遁師旋三十年正月噶爾丹復犯我喀爾喀至阿爾哈賚地無所掠而遁時以土謝圖漢車臣漢率衆來歸駕幸喀爾喀撫綏之瑪拉扈從五月駕回鑾命瑪拉同都統瓦岱等率兵赴圖拉偵軍事七月抵克嚕倫聞噶爾丹逺遁遂旋軍九月上以瑪拉才能素著於䝉古事亦諳練特授西安将軍三十一年三月準噶爾和碩特部台吉巴圖爾額爾克濟農來降上因其人未可深信諭瑪拉相機徙入内地毋致復逸瑪拉疏言巴圖爾額爾克濟農率所屬二千二百餘口窮乏來歸揆其情形不復逸矣遂遣員弁䕶送巴圖爾額爾克濟農及其子育木春來朝上優賚遣之九月瑪拉以疾卒於任年六十有一賜祭葬如典禮諡敏恪子瑪哈逹襲三等輕車都尉世職逹克薩哈逹克薩哈姓賽宻勒世居黑龍江曽祖塔馨塔太祖髙皇帝時來歸𨽻滿洲鑲白旗逹克薩哈初為䕶軍校隨征明錦州寧逺有功擢前鋒侍衛世祖章皇帝順治六年睿親王多爾衮討叛鎮姜瓖以紅衣礟攻渾源州城逹克薩哈乘城毁處先登克之十七年隨信郡王多尼征貴州明桂王朱由榔使其将李定國白文選祁三省竇名望等分據要隘大軍至永寧州祁三省擁衆萬餘自雞公背迎戰敗潰逹克薩哈率本旗前鋒乘勝追擊至畢節縣蹙之響水河橋斬級甚衆進攻七星闗敗白文選拒戰兵十六年大軍克雲南城朱由榔遁永昌分軍追勦逹克薩哈先驅至普淜挫其衆生擒十一人抵玉龍闗復擊敗白文選兵李定國潛設伏於磨盤山犯我後軍逹克薩哈返軍力戰敗之又同前鋒統領白爾赫圖破其木柵擒斬竇名望㨗聞賚白金裘馬十八年隨定西将軍愛星阿進剿朱由榔至緬甸緬人執由榔以獻師旋叙功予騎都尉世職聖祖仁皇帝康熙十年授䕶軍叅領旋調前鋒叅領十三年隨信郡王鄂扎征察哈爾布爾尼師至逹禄布爾尼伏兵二百從山谷間出突犯我師逹克薩哈禦戰郤賊布爾尼旋整衆三千餘迎戰逹克薩哈率八旗前鋒撃敗其中隊布爾尼復收合潰兵據山岡列火噐以拒逹克薩哈奮勇衝擊賊潰遁叙功晉世職三等輕車都尉二十年擢鑲白旗䝉古副都統二十二年調本旗滿洲副都統尋以年老致仕二十四年卒賜祭塟如典禮子逹賴襲職莽依圖莽依圖滿洲鑲白旗人姓兆佳父武逹禪太宗文皇帝崇徳三年隨睿親王多爾衮征明攻直𨽻任邱山東濟陽並先登賜號巴圖魯予騎都尉加一雲騎尉世職任太原城守尉世祖章皇帝順治七年武逹禪卒莽依圖襲職兩遇恩詔晉世職至二等輕車都尉十五年隨征南将軍卓卜特征明桂王朱由榔至貴州明年自都匀進師盤江其晉王李定國據雙河口悉衆為三十營列象陣拒戰莽依圖率歩兵衝擊破之隨大軍定雲南聖祖仁皇帝康熙二年隨靖西将軍穆哩瑪征湖廣流賊李來亨等賊據茅麓山列寨拒守莽依圖冒矢石進攻毁寨二賊大敗來亨自經死凱旋授江寕協領十三年逆藩呉三桂䧟湖南莽依圖隨征南将軍尼雅翰率師進剿岳州用紅衣礟擊沉賊舟敗賊七里橋多斬馘十四年三桂遣賊將董重民結廣西叛鎮馬雄犯廣東平南王尚可喜上疏請兵詔尼雅翰率師至廣東莽依圖以署副都統駐守肇慶十五年可喜子之信叛降三桂受偽爵倡兵作亂三桂賊将范齊韓等逼肇慶總督金光祖降賊莽依圖率所部兵突圍出且戰且走還駐江西偽将軍黄士標偽總兵黄割耳糾衆犯信豐莽依圖率兵往援與城内兵奮勇夾勦斬獲甚多賊遁走入山後追敗之圍遂觧十六年三月實授江寜副都統時廣東尚為賊将董重民等所據上命莽依圖為鎮南将軍率師規復以副都統額赫訥署副都統穆成額叅贊軍務四月自安康至南安偽将軍嚴自明以城降遂偕額赫訥穆成額率師進征南雄偽将軍宋思政偽總兵郭茂威等迎降尚之信亦擒董重民率藩屬及金光祖反正歸順莽依圖進駐韶州五月疏言南安南雄韶州所屬文武官弁昔雖迫於賊勢致汚偽職今既望風欵附若悉事更張恐生反側請令暫留原任綏撫殘黎上特允所請且諭奨其進兵迅速六月命翰林院侍講學士顧八代赴軍前傳諭速剿逆賊擇便而行時賊将胡國柱馬寳糾賊萬餘犯韶州莽依圖擊郤之九月賊復據河西斷我水運餉道列營蓮花山以瞰城中㑹将軍額楚率江寕兵至與城内軍夾擊破其四營斬獲甚衆賊敗竄帽峯山我軍乘夜追擊大敗之河西賊亦遁水運遂通十月追擊至樂昌賊據風門澳拒守我軍三路仰攻别令猺兵由間道奮擊擒斬賊二千餘乃撫定仁化仍回駐韶州疏言将軍傅宏烈以五千兵獨當西路恐力不支已遣副都統額赫訥赴梧州協剿得㫖賊犯韶州将軍莽依圖同額楚夾剿既大敗賊衆復追𠞰仁化諸縣指顧悉定可謂智勇兼擅凡為將者統兵滅賊底定疆圉不必一一俱俟中㫖惟應機適變盡乃心力斯克副委任莽依圖當逆賊甫遁即遣副都統額赫訥等往援粤西深可嘉尚十七年正月三桂遣其孫吳世琮䧟桂林馬寳亦由宜章䧟平樂上命莽依圖赴廣西與傅宏烈㑹師剿賊二月疏言臣抵平樂圍其城賊水陸拒阻宏烈所率緑旗兵與戰不勝臣孤軍難以久留乃退駐中山鎮宏烈亦以莽依圖所率滿洲兵不相應援入奏上念擊賊失利因江水泛漲並免罪諭令和𠂻協議剿滅逆賊莽依圖尋以賊逼賀縣退回梧州乞罷将軍任上切責之仍留任圖功贖罪明年二月呉世琮犯梧州莽依圖同宏烈率師拒戰大敗之賊棄營遁先是偽将軍馬承廕以南寜降至是賊由梧州敗竄糾衆犯南寜六月城中食盡旦夕且䧟莽依圖方卧病聞之督師倍道援勦賊悉鋭聚新村列鹿角西山拒戰額楚額赫訥引前鋒兵擊之賊稍郤莽依圖與将軍舒恕麾大軍進而預遣左翼兵潛出山後截賊歸路盡殪之呉世琮負重傷以數十騎越山遁南寜圍觧上以廣西底定命進取雲貴九月莽依圖以馬承廕雖降心懐叵測恐為肘腋患主言湖南大兵在武岡禦賊臣等一軍先向雲南恐諸路兵不相應援且廣西新定若無兵駐守恐有他虞請暫駐南寜相機進勦上命簡親王喇布鎮桂林莽依圖俟都統希佛兵至取路恢復疆土十九年四月授䕶軍統領五月馬承䕃叛於栁州莽依圖率師進勦次來賔承廕驅象陣逆戰我軍以勁弩射象回奔賊陣亂乘勝力戰賊大敗棄甲走莽依圖自率輕騎追擊獲象三斬賊甚衆㑹簡親王與總督金光祖分路勦賊並㨗承廕復降栁州平八月莽依圖卒於軍年四十有七二十二年議政王大臣等追論莽依圖征廣西時自平樂退梧州應坐失機籍家産半革去恩詔所得騎都尉上曰莽依圖在行間頗有勞績且屬下兵民俱稱其善凡所過地方亦不擾害百姓可免籍没削去恩詔所加世職其原襲之騎都尉又一雲騎尉以其弟博和哩襲五十九年入祀廣西名宦世宗憲皇帝雍正十年入祀賢良祠今上乾隆元年追諡襄壮瑚圖瑚圖滿洲鑲白旗人姓洪鄂順治十二年以䕶軍校隨寜南靖冦大将軍辰泰出師湖廣敗明桂王将盧明臣馮雙禮於岳州武昌十七年隨安南将軍洛託赴福建敗海賊鄭成功於厦門康熙二年授駐防江寜協領八年擢江寜副都統十三年逆藩耿精忠叛上命瑚圖同副都統瑪哈逹率所部赴杭州與将軍圖喇計兵事尋以賚塔為平南将軍瑚圖叅其軍務八月偽将軍馬九玉遣其将胡錦等犯衢州至石梁瑚圖與副将王廷梅李承恩分路迎擊賊潰奔崖山進圍之擒錦時賊黨小林别駐大溝源乘勝進擊大敗之十月偽将馬四等率賊衆一由江山至錢塘一由處州至林山謀犯衢州瑚圖分兵東西夾攻陣斬偽将范安國王大頂等已而偽将周列桑明率賊三萬屯焦園紅橋等處分路擊之連破賊衆斬萬餘級十四年三月九玉擁衆屯衢州西南夜渡水犯我營賚塔令瑚圖與廷梅往擊之敗諸杭埠斬殺甚衆餘賊多溺死八月九玉遣其將李廷桂率賊七千營於衢州北元口村設木城絶官軍糧道並據東西山為聲援瑚圖分兵擊敗兩山賊夜衝賊營焚木城賊敗遁十五年八月官軍破賊於大溪灘復江山縣九玉走常山瑚圖追之賊拒戰又敗之進圍常山賊夜開西門遁追至江西玉山界賊大潰斬獲無算復常山縣進克仙霞關㧞浦城精忠窮蹙詣康親王傑書軍門降瑚圖隨軍駐福州十一月海逆鄭錦將徐耀率衆三萬至烏龍江南營於石門枕峰諸山謀犯福州康親王傑書遣瑚圖同總兵董大來夾擊破賊營十四賊遁追四十餘里尋以瑚圖防守泉州十六年三月泉州城内外土賊四起瑚圖遣將領水陸分𠞰盡殪之十月南安縣賊陳式陳角等樹旗揚言欲犯泉州瑚圖令營長張廷輔副將朱起龍分擊敗之斬陳角先是漳泉多寇南安賊首李復貴同安賊首朱寅各據髙山勾海逆乘機剽掠康親王傑書令提督段應舉同瑚圖分路進𠞰擒復貴及寅之偽軍師林日向等至是寅復犯陽坑小黄山瑚圖與三等台吉查渾副都統鄔爾三路追勦之殺賊千餘斬偽将謝良楊徳瑚圖尋駐漳州十七年二月海逆䧟石瑪逼海澄瑚圖同海澄公黄芳世副都統孟安應援敗賊於灣腰樹奪金門山進至觀音山賊陳福陳仁來拒擊敗之賊奔下滸追之斬偽将洪結賊收餘黨於石瑪築壘拒官軍三月賊船二百餘乘潮至壘中賊復出列相表裏瑚圖與芳世安令海澄總兵官黄藍潛師夾攻陣斬偽将朱成髙榮等十一人沉賊船九賊仍遁入壘海澄圍觧時官兵俱屯海澄石瑪漳州兵少瑚圖同總督郎廷相晝夜防守忽海逆連䑸數百乘虚突犯入東闗擊以礟賊敗退復益船擁衆至且勾山賊蔡寅由天寳山斷我糧道瑚圖親督戰焚其船賊仍不退閏三月芳世自海澄以兵來援大破賊衆寅始遁去時海逆劉國軒呉淑等復破海澄䧟長泰糧道復阻賚塔令瑚圖帶甲八百防守要路九月淑率賊萬餘逼漳城國軒營對河為犄角城内兵少適副都統沃申率兵千餘來援瑚圖隨賚塔分路勦至蔗林遇伏我兵小郤斬退者三人兵奮遂破賊陣連㧞其營十六殺賊過半賊退據長泰謀犯南靖我兵分二隊進賊列營蜈蚣山瑚圖同沃申力戰自辰至未賊大敗棄營走斬賊将鄭英何觀衆四千餘復長泰賊退據江東橋橋為漳泉往來要道十月賚塔營橋西令瑚圖同沃申提督石調聲取橋東岸乃由長泰繞道越朝天嶺過龍江口深入賊巢賊以礟迎敵瑚圖等奮勇衝擊賊棄寨奔船據橋口急擊之賊奔出江遂通漳泉路十八年二月賊設伏四山來誘我戰瑚圖同大來副都統雅達里分兵突至山下伏盡起瑚圖等力戰不退賊大敗奔據玉洲觀音山各寨十月賊屯鰲頭山窺江東橋欲斷我路我兵四路迎剿瑚圖與副都統瑪思文為一路擊敗之十九年三月我兵分路剿賊瑚圖攻克玉洲各寨賊戰敗竄厦門遂復海澄四月賊江欽等鳩賊䑸竄聚廣東逹濠島瑚圖隨賚塔至潮州沿海督剿水陸並進賊退乘勝取磊石門賊來争復擊敗之又遇我水師夾攻賊大潰遁出大洋尋閩粤平定瑚圖回江寜任二十三年十一月上南巡駐蹕江寜賜瑚圖蟒袍一十二月擢杭州将軍二十六年三月卒於官得㫖瑚圖才品優長殫心盡職効力行間勞績茂著及授杭州将軍復能和輯兵民不干預地方事務行止清慎克盡厥職著從優議䘏尋議祭葬如例特㫖加祭一次諡敏恪欽定八旗通志卷一百六十八
