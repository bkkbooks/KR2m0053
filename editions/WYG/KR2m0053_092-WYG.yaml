body:
  text: 典禮志謹案古者大經大法皆謂之禮故周官六職傳於禮家而左傳載韓起之言稱易象春秋為周禮家語記孔子之言亦以小正為夏禮坤乾為殷禮不止儀禮為古經也史家所記則典章文物為多矣禮書始見於史記泛論其理焉耳未及乎制度也漢書禮樂志序述始詳沈約宋書以後遂為史例案晉書禮志在宋書前然實唐人所作三國志又無志則正史専名禮志當始于宋書後来圖經輿記亦間立典禮一門然所載皆天下之通制不應偏属於一方故撰地志者多刪此一門以省冗複蓋著書之體例應如是也惟八旗通志事事皆闗國典凡八旗之制度即聖朝一代之制度非郡志邑志所可比併非省志所可比舊志立此一門於義至當故今亦採掇新令以補葺舊文蓋我朝朱果𤼵祥帝出乎震實唐虞以来肅慎氏之故地相沿舊俗古禮多存即以燕饗一事而論列茵而坐即古禮之布席割牲而燕即古禮之折爼殽烝此由質文漸變中土日趨於浮華而三代遺規轉以風俗淳樸而未改也暨我太祖髙皇帝太宗文皇帝受天明命聖聖相承修舉典章益為明備郊社宗廟之儀誥勅冊封之典載内三院之簡牘者班班可考世祖章皇帝撫有廣輪監殷監夏因革損益持其大中聖祖仁皇帝世宗憲皇帝以及我皇上更稽古之義因時之宜遞參詳而潤色之彬彬然百度咸熙與三五而比盛凡大清㑹典大清通禮與禮部則例之所載莫不州分部居綱舉目張足垂萬世之法守今恭錄其闗於八旗者條分件繫而參以近數十年之案牘排比考證務使端委釐然至欽定滿洲祭天祭神典禮溯開創之初規定繼承之永式至誠至敬尤見昭事之本原謹仿杜佑通典全載開元禮之例具著於篇作典禮志典禮志一王公儀制王公冊封王公俸禄諸王冊封王府慶賀公主冊封王公冊封凡封爵崇徳元年定顯祖子孫考論功徳列爵九等一等為和碩親王二等為多羅郡王三等為多羅貝勒四等為固山具子五等為鎮國公六等為輔國公七等為鎮國将軍八等為輔國将軍九等為奉國将軍其餘俱為宗室又定皇子係庶妃所生者封鎮國将軍親王側室妾媵所生子封輔國将軍郡王側室妾媵所生子封奉國将軍有功績者量加封授出自欽定又定中宫所生女為固倫公主妃所生女為和碩公主親王女為和碩格格郡王女為多羅格格貝勒女為貝勒多羅格格貝子女為固山格格公女為公格格若中宫撫養下嫁者亦稱為和碩公主順治十年題准宗室分爵十等親王一子封親王餘子封郡王郡王一子封郡王餘子封貝勒貝勒子封貝子貝子子封鎮國公鎮國公子封輔國公輔國公子授三等鎮國将軍鎮國将軍子授三等輔國将軍輔國将軍子授三等奉國将軍以上鎮國輔國奉國将軍初封俱三等後遇加封至二等一等奉國将軍子授奉恩将軍奉恩将軍子孫世授奉恩将軍又定親王一子封世子嗣親王郡王一子封長子嗣郡王輔國公一子授輔國公餘如前例十七年定親王女和碩格格漢文稱郡主世子郡王女多羅格格稱縣主貝勒女多羅格格稱郡君貝子女固山格格稱縣君入八分鎮國輔國公女稱鄉君未入八分公以下女俱稱宗女不授封又定親王世子郡王正室漢文稱親王妃世子妃郡王妃貝勒以下輔國将軍以上正室稱夫人奉國将軍正室稱淑人奉恩将軍正室稱恭人十八年定貝勒貝子庶夫人子授奉恩将軍康熙六年定皇子滿十五嵗宗人府具題請封其爵級出自欽定康熙二十三年八月宗人府議奏諸王之子減等冊封應将親王一子冊封為世子候襲親王其餘諸子皆授為貝子将郡王一子冊封長子候襲郡王其餘諸子皆授為鎮國公貝勒以下皆有減等授封之例仍應照現行例行得㫖親王諸子著授為貝勒郡王諸子著授為貝子餘如所議凡授封崇徳元年定王以下将軍以上俱由内院官具奏引至崇政殿前行授封禮公主王妃等遣官授封順治十三年十月禮部奏准㑹典開載親王嫡妃不存妾子已襲封親王者其妾准封繼妃給與封冊其諸王以下奉國将軍以上大福晉嫡妻病故者其側福晉及妾准立為嫡将姓名送部照例給與封冊誥命順治十四年題准親王郡王嗣封者傳至宗人府禮部堂官宣授冊寳該嗣王跪受貝勒以下奉恩将軍以上傳至宗人府宗人府官頒給誥命俱行跪受若年幼者送至其府宣賜康熙十二年題准凡封親王世子郡王及親王妃世子妃郡王妃内外固倫公主和碩公主遺内大臣散秩大臣為正使内閣翰林院學士禮部侍郎為副使禮部列名奏請欽㸃差宣讀官同徃宣讀制冊寳印文封貝勒貝子及貝勒夫人貝子夫人郡主縣主郡君遣内閣侍讀學士侍讀翰林院侍讀學士侍講學士侍讀侍講為正使禮部郎中員外郎主事為副使内閣中書翰林院禮部有品筆帖式同徃宣讀制冊文封鎮國公以下奉恩将軍以上鎮國公夫人以下奉恩将軍恭人以上縣君鄉君由宗人府禮部給授誥命三十六年諭恩詔加封凡宗室官員入八分公以下奉恩将軍以上及閒散宗室用為大臣侍衛者照文武官員例依品級加封四十五年題准親王以下入八分公以上側室所生女與嫡出一體封授實為過優嗣後親王側妃所生女降二等視貝勒嫡女授為郡君品級郡王側妃所生女降二等視貝子嫡女授為縣君品級貝勒側夫人所生女降二等視鎮國公嫡女授為鄉君品級其壻俱照所降品級封為額駙至貝子鎮國公輔國公側室所生並無應降品級将貝子側夫人所生女食五品俸壻授為六品鎮國公輔國公側夫人所生女食六品俸壻授為七品五十二年詔宗室官員照四十二年例准給封贈自入八分公以下至閒散宗室授官者該都統查明品級大小有遇前次恩詔已加封贈後陞任換頂帶者准照新任加封其一品封贈三代二品三品封贈二代四品至七品封贈一代八品九品止封本身俱照例咨送内閣撰寫誥命自奉國将軍至旗員侍衛等照三十六年例俱准各加一級未入八分公鎮國将軍輔國将軍及宗室一品二品官員俱照例送一子入國子監讀書凡封號順治九年題准我朝封王以本王素行為號與前代以地名為號者不同以後嗣王襲封換給新冊暫用舊寳印賜封號後另鑄寳印換給十二年題准嗣王襲封者准稱伊父原有封號其父另給諡號康熙九年題准已給封號諸王襲封時照現在之號封給停其改給祖父原號其未給封號應襲親王郡王等議加封號凡襲爵嗣封者俱由宗人府具題請㫖咨送禮部鑄寳印行冊封禮順治九年題准應襲王爵者必以嫡妃子承襲若嫡妃無子方准次妃子承襲十年題准軍功封授郡王已經子孫承襲者如無親生子孫准親兄弟及親兄弟之子襲封至親王之子嵗滿照例封郡王者有親生子孫准與承襲如絶嗣不准承襲十八年題准嵗滿所封郡王原係世襲王爵如有絶嗣者應否襲封奏請欽定又題准王貝勒貝子公将軍等有嫡室所生子照例襲封如嫡室無子准以庶出之子襲封康熙三十四年諭宗室應得承襲之誥命嗣後不必另奏即同襲職本一併奏聞乾隆四十一年十月諭諸王襲爵由軍功晉封者世襲㒺替其餘恩封諸王襲爵時皆應以次遞降凡親王以次遞降者至鎮國公而止郡王以次遞降者至輔國公而止其公爵均著世襲罔替又題准貝勒缺出降一等承襲貝子再出缺時襲鎮國公再出缺時襲未入八分鎮國公貝子缺出降一等承襲鎮國公再出缺時襲輔國公再出缺時襲未入八分輔國公鎮國公缺出降一等承襲輔國公再出缺時襲未入八分輔國公再出缺時襲頭等鎮國将軍輔國公缺出降一等承襲未入八分輔國公再出缺時襲頭等鎮國将軍再出缺時襲頭等輔國将軍自貝勒遞降至未入八分鎮國公貝子遞降至未入八分輔國公鎮國公遞降至頭等鎮國将軍輔國公遞降至頭等輔國将軍即令世襲㒺替毋庸再降以上承襲階級凡嵗滿崇德九年定和碩親王之子以下奉國将軍之子以上男至二十嵗女至十五嵗列名具題請㫖授封又定親王以下奉國将軍以上有薨故者其子弟即准承襲不必俟其嵗滿順治九年正月吏部題太宗時凡宗室王貝勒貝子公俱視其才徳錫封燕京定鼎後定例郡王以上准襲封貝勒以下不准襲封其子年至十五者始照所定品爵封授後於順治八年有年未滿嵗授為公将軍者已註封冊應否授爵至於太宗時所定之例與後所定之例作何遵行得㫖凡封王貝勒貝子公俱著照得北京後定例行此等年未滿嵗授爵者著於未滿嵗以前食俸不必給誥命封冊亦不必除名滿嵗以後照定例除授其所設儀仗官著裁革又題准貝勒以下薨故者應襲一子不俟嵗滿即封餘子仍俟嵗滿授封若父在得封之子未分居之先薨故者其子嵗未滿不准即封十八年題准親王之子以下奉恩将軍之子以上年至十五嵗准照應得爵秩具題授封至十八嵗具題令其上朝各照爵級職掌隨班行走康熙二十七年二月宗人府遵諭議覆親王以下奉恩将軍以上子年十五㮣予封爵恐致視為故典㒺知激勸嗣後應停止此例俟年至二十辨其文藝騎射之優者列名引見請㫖授封惟親王以下奉恩将軍以上有薨逝者即准一子襲爵不俟嵗滿得㫖依議如人材超卓者不拘年嵗特予封授雍正三年考試宗室請㫖奉㫖今年係朕初次考試其降級封授處暫行停止照各應得品級封授以上承襲年嵗世宗憲謹案此係後不為例皇帝特恩凡冊誥崇徳元年定諸王貝勒及王貝勒妃夫人公主俱給紙制冊授封順治十一年題准封親王世子及親王妃世子妃固倫公主和碩公主給金冊封郡王及郡王妃給鍍金銀制冊封貝勒及貝勒夫人郡主以下俱給授誥命十二年正月禮部奏准向封和碩格格多羅格格多羅貝勒夫人俱給誥命今應改給紙冊十七年題准凡封貝勒及貝勒夫人郡主縣主俱給紙制冊十八年九月禮部題親王郡王貝勒貝子公将軍正室及女封誥冊文内請用滿洲䝉古漢文字様詔從所請康熙十二年題准封貝子及貝子夫人郡君俱給紙制冊又定冊誥文俱由翰林院撰擬中書科繕寫金冊由工部鐫造乾隆二十四年諭吏部進呈授封誥勅属意措詞與本人事蹟逈不相類内閣承用向来定本故套相沿非辭尚體要之義嗣後各按事實簡明撰擬乾隆四十七年諭冊封清語原係通稱並無上下之别嗣後朕親用呈上者俱繙寫冊表外其冊封皇后妃嬪及王貝勒以至外藩王等仍用冊封字様以上承襲冊誥凡陞降崇徳元年定宗室内有因功陞授者自奉國将軍陞輔國将軍次第論功加封至和碩親王親王有功酌給賞賜其有罪降封者自和碩親王遞降一等至奉國将軍得罪降為閒散宗室其或因大功越陞或因重譴黜革者不論等級二年定親王郡王貝勒女不論已嫁未嫁者父陞隨陞父降隨降康熙元年八月諭禮部宗女封為格格應有定例今見格格封號從其生父父陞則陞父降則降又有從養父封者竟無定例或應從生父或應從養父爾部同宗人府㑹議畫一定例具奏宗人府禮部遵諭議王貝勒貝子等有願撫養女者奏准撫養隨養父陞降如未奉㫖私自撫養者仍照生父陞降得㫖格格不便照養父品級俱著照生父品級其從前照養父給過品級者仍著存留三十六年題准定例王以下品級子不隨父陞降女隨父陞降嗣後得品級之女亦照子例俱不隨父陞降以上承襲陞降之制諸王冊封儀崇徳元年定是日諸王貝勒及文武各官俱於崇政殿前分翼序立内院官捧制冊印置殿内黄案上請㫖授封内院官引諸王貝勒依次進跪殿前宣制冊官及捧制冊官於黄案東西向立次第宣制冊畢捧制冊印授諸王貝勒王等捧受