body:
  text: 人物志九十六忠義𫝊八滿洲八旗八至二十七年共七十五人康熙十七年五穆都五穆都滿洲鑲黄旗人姓富察氏世居葉赫地方順治十五年以䕶軍㕘領從信郡王多尼征貴州敗偽侯李成蛟等於凉水井至雙河口敗偽王李定國進至魯噶復大敗其衆追至磨盤山又敗之十八年授雲騎尉世職是年從征山東土賊于七至鋸齒崖敗賊俞三吕四竒等康熙十三年署前鋒統領同貝子富拉塔征逆藩耿精忠至浙江敗賊於黄水山至蒲塘敗偽總兵呉臣又敗偽將軍楊徳十四年十月至上蒲塘偽将軍曾養性率賊三萬餘衆乗船二百餘艘水陸来戰五穆都同貝子富拉塔奮擊敗之復太平樂清青田三縣及大荆盤石二衛以力戰身被數創十七年七月三十日傷發卒十九年議功加世職㤙賜雲騎尉併為騎都尉世職承襲詳見世職表賜祭𦵏予諡立碑哈寧阿哈寧阿滿洲鑲黄旗人姓􅆶勒佳氏初署䕶軍校康熈十五年隨揚威大将軍簡親王喇布征吴三桂扵江西十六年十二月擊賊扵吉安獐坑嶺十七年進勦老虎洞青龍嶺諸䖏所至克敵尋署䕶軍㕘領陞䕶軍統領六月至永順縣撃偽将馬寳胡國柱等力戰中礮殁於陣賞䘏如例覺羅莫洛渾覺羅莫洛渾滿洲鑲黄旗人祖拜三天聰中従大兵攻寧逺陣亡父顧納岱順治初従征南昌府中礟陣亡累贈一等子並自有𫝊莫洛渾初襲父世職任事勤慎康熙十七年従征福建海賊進攻厦門禦敵衝鋒奮勇力戰陣亡加贈騎都尉授三等伯諡剛勇賜祭𦵏立碑墓道敦達禮敦達禮滿洲鑲黄旗人康熙十八年二月以七品官従安親王岳樂征逆孽吴世璠至湖廣長沙府偽将軍吴國貴等来拒敦達禮身先士卒力戰陣亡二十五年㤙賜雲騎尉世職承襲詳見世職表五塞五塞滿洲鑲黄旗人署䕶軍校康熙十三年隨内大臣阿宻達往河南擒叛鎮蔡禄有功十八年隨順承郡王勒爾錦征湖廣至武岡州雙井舖撃賊陣亡賞䘏如例覺羅努赫勒覺羅努赫勒滿洲鑲黄旗人康熙十四年以一等侍衛従征逆藩吳三桂至湖廣十七年六月有偽将軍杜輝巴養元江義等率二萬餘賊乗船二百餘隻来犯栁林嘴努赫勒隨討逆将軍鄂内率舟師敗之杜輝等又率賊来犯君山仍以舟師連敗其衆進至湘隂距縣城五里敗賊衆二千餘十九年隨固山貝子章泰進征貴州撃吴逆偽将軍髙起龍等中傷陣亡㤙賜雲騎尉世職承襲詳見世職表博洛博洛滿洲鑲黄旗人康熙十五年以一等侍衛兼䕶軍㕘領隨㝎逺平寇大将軍安親王岳樂征逆藩吴三桂屢立戰功十九年従固山貝子章泰勦賊至平越府以本旗驍騎校二十餘人撃賊陣亡㤙賜雲騎尉世職承襲詳見世職表董重民董重民包衣鑲黄旗人康熙十九年六月以四品官奉命往雲南招撫逆孽吳世璠世璠抗命不従重民切責之被害賜祭一次㤙賜都司僉書廕子董髙巴五品官阿爾賽阿爾賽滿洲鑲黄旗人姓康儀爾氏世居費爾塔哈村地方康熙十四年従㝎逺平寇大将軍安親王岳樂征逆藩吴三桂為左翼前鋒統領率領前鋒兵擊賊嘗十戰皆克之二十年正月擊賊扵貴州平越府水西之蘆柴坑力戰歿扵陣㤙賜雲騎尉世職承襲詳見世職表尼馬達尼馬達滿洲鑲黄旗人駐防江寧官佐領部委㕘領于康熙二十四年四月初十日隨叅謀大臣刑部尚書齋三在福州府拒敵陣亡賞䘏如例鄂爾吉虎鄂爾吉虎滿洲鑲黄旗人由親軍委署䕶軍校隨順承郡王勒爾錦征逆藩吴三桂康熈二十年二月初八日至山西平陽府之髙槗撃賊中鎗歿賞䘏如例登庫登庫滿洲鑲黄旗人姓鈕祜禄氏世居柏山哈達任驍騎校従征雲南江西有功康熙二十五年􅀙征廣東至韶州府東山遇賊戰亡賞䘏如例古魯錫古魯錫滿洲正黄旗人姓巴岳特氏世居䝉古他拉西拉穆蘭地方任䕶軍㕘領康熙十三年隨奉命大将軍康親王傑書征逆藩耿精忠十七年閏三月扺漳州與海賊偽将軍劉國軒力戰死之㤙賜雲騎尉世職承襲詳見世職表噶爾都噶爾都滿洲正黄旗人姓西克特禮氏世居松阿禮烏拉之庫爾喀和羅懇布禄村地方襲父賈􅀎阿一等輕車都尉又一雲騎尉康熈十四年噶爾都従征陕西擊叛賊王輔臣子王繼正敗之十七年従征南将軍穆占往湖廣征逆藩吴三桂至沿山嶺賊将馬寳等率三萬餘衆來戰噶爾都力戰陣亡㤙賜三等男世職承襲詳見封爵表巴圖巴圖滿洲正黄旗人姓他塔喇氏其先係察哈爾蒙古襲父索寧三等輕車都尉職隨貝勒尚善征逆藩吴三桂康熈十七年在湖廣洞庭湖撃偽帥杜輝巴養元江義等歿扵陣㤙賜二等輕車都尉世職承襲詳見世職表黑色黒色滿洲正黄旗人任一等輕車都尉康熙十七年隨将軍貝勒尚善征逆藩吴三桂至湖廣長沙府陣亡賞䘏如例傅岱傅岱滿洲正黄旗人姓舒舒覺羅氏世居烏英額地方康熙十三年以驍騎校従征逆藩吴三桂至陕西隨振武将軍佛尼勒敗賊扵滴水涯進次平凉賊三千餘衆斷路立寨復擊敗之尋従征四川賊将石存禮黑邦俊楊天保徐宗炳等率猓猓七千出棧道益門鎮立七營扵西山傅岱隨大兵攻破之又敗賊衆四千扵陽山池又敗益門鎮賊兵扵黄兒山十七年隨討逆将軍鄂内湖廣縂督蔡毓榮至岳州賊将杜輝巴養元江義等率船二百艘賊二萬衆由湖庭湖至栁林嘴来犯傅岱隨大兵以舟師力戰陣亡㤙賜雲騎尉世職承襲詳見世職表海什尼海什尼滿洲正黄旗人康熙十三年以委署䕶軍校隨奉命大将軍康親王傑書征逆藩耿精忠至浙江破賊帥王宗仁扵諸暨河岸又敗偽都督於義烏又敗偽縂兵扵臨善村又隨平南将軍賴達敗偽将軍李廷貴扵衢州府北原口破其四營又敗偽林縂兵扵大溪灘十五年隨賴塔破海冦扵小門山鎮風嶺諸䖏十六年進撃偽縂督興眀伯趙得盛偽将軍何猷等扵太平山破其十六營柏木山賊衆来援敗之時賊勢甚盛海什尼扵四騎前鋒中首先進擊奮勇力戰追破賊扵城下十八年福建泉州府被圍隨賴塔往援阻洛陽槗奪其槁泉州之圍遂解海什尼亦受傷陣亡㤙賜騎都尉世職承襲詳見世職表觀音保觀音保滿洲正黄旗人康熙十八年以従征福建海冦鄭成功於侯官縣戰歿㤙賜雲騎尉世職承襲詳見世職表邁圖邁圖滿洲正黄旗人姓𤓰勒佳氏世居蘓完地方康熙十三年征逆藩耿精忠以署驍騎校隨㝎國将軍希爾根至江西南昌縂兵官楊富叛隨将軍執之扵省城又隨希爾根及平冦将軍哈爾哈齊等敗偽都督易天錫於建昌易天錫自建昌趋撫州復追敗之又隨希爾根敗賊於塘阜及宜黄十四年四月隨㝎逺平寇大将軍安親王岳樂撃耿逆偽将軍邵連登於長興連破之復建昌乗勝攻新城並有功迺隨副都統額赫納等駐守建昌十二月賊首李茂珠等率賊萬餘列陣於城南之鐘鼔山􅁒攻城邁圖随額赫納等率衆出城奮撃敗之追殺數百里十五年九月随額赫納敗賊於芝坪時以署㕘領第一隊前進三敗賊於府城之北闗斬偽副将楊六曾國珍偽守備朱世龍趙虎錢松夏椿許大詔等十七年隨江寧将軍額椘進廣西征逆藩吴三桂敗偽将軍吴世琮於藤縣二十年隨征南大将軍賴塔征逆孽吴世璠兩敗賊於石門坎進至雲南城下力戰陣亡㤙賜雲騎尉世職承襲詳見世職表彰保住彰保住滿洲正黄旗人姓薩克達氏世居寧古塔地方康熙十五年以七品官従征逆藩吴三桂至湖廣破賊萬餘扵攸縣賊收衆復戰又敗之十六年與賊戰扵永興城下二十年至雲南破賊並有功旋従都統希佛等追偽将軍馬寶巴養元扵馬木山力戰陣亡㤙賜雲騎尉世職承襲詳見世職表噶思海噶思海滿洲正白旗人姓𤓰勒佳氏世居虎爾哈地方任騎都尉兼一雲騎尉順治十一年従寧海大将軍宜爾徳征偽魯王至浙江舟山擊偽縂兵陳六御偽英毅伯阮思等扵海上仝委署䕶軍統領尼雅達等敗其衆獲船隻以功加世職為三等輕車都尉十四年従㝎逺大将軍簡親王濟度征福建海冦鄭成功破賊船六百餘扵厦門康熙十六年隨将軍穆占征逆藩吴三桂至湖廣與偽将軍馬寶胡國柱等戰於永興陣亡弟之子富海襲職二十五年叙噶思海功追加為二等輕車都尉世職承襲詳見世職表尚志立尚志立包衣滿洲正白旗人世居瀋陽地方國初来歸任逰撃康熙十三年従征逆藩吴三桂至湖廣十七年隨縂督蔡毓榮撃賊帥杜輝巴養元等扵洞庭湖力戰陣亡㤙賜雲騎尉世職承襲詳見世職表巴查爾巴查爾滿洲正白旗人姓博爾濟錦氏世居克禄倫地方康熙十七年以三等男隨征南将軍穆占征逆藩吴三桂至湖廣永興縣撃偽将軍胡國柱馬寶等力戰陣亡賞䘏如例尼麻喇尼麻喇滿洲正白旗人任䕶軍校康熙十七年従征福建攻海冦扵厦門力戰陣亡㤙賜雲騎尉世職承襲詳見世職表瓦濟馬瓦濟馬滿洲正白旗人姓𤓰勒佳氏世居雅爾瑚地方任䕶軍校康熙十七年従征逆藩吴三桂至湖廣偽将軍吴應麒廖進忠馬寶等率衆七萬據岳州随討逆将軍鄂内撃賊陣亡恩賜雲騎尉世職承襲詳見世職表彦拜彦拜包衣滿洲正白旗人姓𤓰勒佳氏世居烏喇地方康熙十三年以六品官委署䕶軍校従征逆藩耿精忠至浙江賊帥王宗仁率衆二千餘拒扵諸暨河岸彦拜隨副都統馬哈達敗之至義烏敗偽龔都督等扵山坑嶺偽都督周烈偽縂兵桑眀等自衢州府蕉園率衆二萬餘来戰彦拜随平南将軍賴塔敗之扵紅槗又敗偽将軍馬九玉等十七年敗海冦偽縂督徐堯扵烏龍江之小門山鎮又敗賊扵鎮風山破偽縂督趙得勝扵太平山敗其二十餘營又敗偽将軍何猷徐堯吴順等扵泉州克其城旋追逆賊扵祖頭山力戰陣亡㤙賜雲騎尉世職承襲詳見世職表倭詩倭詩滿洲正白旗人姓托活洛氏世居虎爾哈地方康熙十七年由七品官従討逆将軍鄂内征逆藩吴三桂至湖廣洞庭湖遇賊将杜輝等力戰陣亡㤙賜雲騎尉世職承襲詳見世職表色克圖色克圖滿洲正白旗人姓納喇氏世居哈達任七品官康熙十七年従征逆藩吴三桂至廣東遇偽将馬䧸董仲民王宏勲等率衆拒敵戰歿於陣賞䘏如例瓦爾達瓦爾達滿洲正白旗人姓湯務氏世居哈達地方康熙十四年以委署䕶軍校従征逆藩耿精忠三月至江西敗偽都督易天錫於建昌府又於千金坡敗偽縂兵楊三李茂珠等至㑹浦撃偽縂兵朱一典尋抵新昌擊偽帥􅈫國棟兵連戰皆㨗五月隨㝎南将軍希爾根敗偽将軍邵連登於建昌府之長興十五年二月随安親王岳樂至萍鄉破偽将軍夏國相李良棟等於来龍山十八年至長沙府用雲梯攻城同黑圖先登被傷而歿㤙賜騎都尉世職承襲詳見世職表西特庫西特庫滿洲正白旗人姓𤓰勒佳氏世居蘇完地方康熙十三年以委署佐領従征逆藩耿精忠至浙江敗其偽千縂兵又随平南将軍賴塔敗偽都督周烈扵衢州十二月偽縂兵桑眀等又犯衢州復敗之於蕉園河岸十四年敗偽将馬九玉扵繆村十五年従賴塔進攻福建破偽縂兵閔可孝守備趙申等扵夏口海寇鄭錦遣偽帥許耀聚衆三萬扵小門山又随賴塔進撃敗之又敗之扵真鳯山十八年海冦偽将軍劉國軒統衆萬餘来犯海澄力戰陣亡㤙賜雲騎尉世職承襲詳見世職表阿蘭阿蘭滿洲正白旗人任前鋒校康熙十八年随征南将軍穆占征湖廣至永興沿山嶺與吴逆偽将胡國柱等力戰殁扵陣㤙賜雲騎尉世職承襲詳見世職表費雅達費雅達包衣正白旗人姓馬氏世居盛京任縂兵官初隨将軍王進寶征漢中有功後従将軍趙良棟由雲南至四川康熙十八年九月抵永寧衛遇逆賊夏國相吳國柱等率兵拒戰身被重傷遂亡扵陣其隨丁四十名俱死焉特加太子少保左都督諡