body:
  text: 兵制志八教閲京營直省兵籍京營領侍衛府三旗親軍教閲之制鑲黄旗每月於初二十六兩日習騎射二次於初六十一二十一二十六等日習步射四次正黄旗每月於初三十七兩日習騎射二次於初七十二二十二二十七等日習步射四次正白旗每月於初四十八兩日習騎射二次於初八十三二十三二十八等日習步射四次八旗驍騎營教閲之制每月於初四初八十三十八二十三二十八等日習射六次都統以下各官親徃監視春秋二季擐甲習步射二次由旗定期咨部擐甲習騎射二次由部定期通行又春月分操二次合操一次秋月合操二次預奏操期仲春孟秋之日按期登城習鳴螺兵部遣官稽察嵗以為常其八旗漢軍鳥槍兵於春秋月各演鳥槍四十五日嵗仍合操二次季秋月試礮於蘆溝橋每旗各出礮十位演放五日間三嵗則於蘆溝橋以鳥槍營兵與礮營兵合演槍礮籐牌兵每年春秋二季四旗合操四次八旗合操二次又於初冬分派各旗演習步圍每年二次或三次八旗前鋒營教閱之制每月於初二初六十一十六二十一二十六等日習步射六次春秋二季擐甲習騎射二次又於左右翼内各分前鋒之半兼習鳥槍月演十次均由統領督率所屬如法訓練每年秋季前鋒統領㑹同䕶軍統領奏聞率所屬兩營官軍演習步圍兩三次八旗䕶軍營教閲之制每月於初二初六十一十六二十一二十六等日習步射六次春秋二季擐甲習騎射二次與前鋒營同圓明園八旗䕶軍營教閱之制每月習步射六次春秋二季習騎射演放鳥槍與八旗䕶軍營同八旗步軍營及巡捕營教閲之制八旗步軍習步射城門驍騎習鳥槍均以春秋操演步軍翼尉同城門領更畨考閲内九門外七門安設礮位每屆三年四門一次隨同八旗運徃蘆溝橋輪流演放巡捕營㕘將遊擊月考其屬之弓矢守備千把總各練汛兵春秋習鳥槍與城門驍騎同内府三旗教閲之制每月習射六次春秋二季擐甲習射二次每年立冬後内府䕶軍並尚虞處侍衛鷹狗房執事人等演習步圍又遴選三旗䕶軍學習馬射等技藝各以時操演火器營教閲之制每月演習步射六日騎射六日馬上技藝六日各於本旗教場齊集其鳥槍礮䕶軍驍騎該管官按日於本旗公所考騐合操日八旗分左右翼行陣施放槍礮九次至第十次礮與鳥槍連環施放無間每年秋季俟八旗漢軍礮位演放完竣後奏請徃蘆溝橋演礮五日健鋭營教閲之制每月逢四九日期合操雲梯䕶梯鳥槍大隊鳥槍馬上三槍過馬騙馬札槍貫跤等技藝逢二七日期合操雲梯䕶梯鳥槍馬上三槍及騎射步射舞鞭舞刀等技藝其餘日各於本旗較馬步射施放鳥槍恭遇駕駐圓明園自三月初一日起每日左右翼輪流演水戰用船四逢八日期大操用船八若遇啟駕廵幸行圍以後則按三八日期操演凡較閲每年自七月十六日開操至次年四月十六日止若遇閏七月即於閏七月十六日起其封開印信日暫停八旗設立教場鑲黄旗教場在安定門外正黄旗教場在徳勝門外正白旗教場在東直門外鑲白旗教場在朝陽門外正紅鑲紅兩旗教場均在阜成門外正藍旗教場在崇文門外鑲藍旗教場在宣武門外各設演武㕔該都統等以時督率訓練順治七年世祖章皇帝諭我朝以武功開國頻年征討不臣所至克㨗皆恃騎射今荷天庥天下一統勿以太平而忘武備尚其益習弓馬務造精良康熈十二年聖祖仁皇帝諭漢軍不能騎馬者甚多每旗應設一營操練火器議政大臣等集議以聞尋議覆八旗漢軍鳥槍驍騎毎佐領下増十八名共二十名演習鳥槍得㫖火器關係武備甚為𦂳要應嚴加操演以裨實用雍正五年世宗憲皇帝諭火器營甚屬𦂳要馬上教習熟練方為有益凡屬滿洲以騎射為根本不可専習鳥槍而廢棄騎射兵丁在馬上射箭放槍著加意熟習再兵丁内有自己養馬學習鳥槍技藝及勤謹効力當差者爾等即當勸勉以優等記名其或行走不及者亦當誘之于善教訓兵丁湏如教訓自己子弟不可遽加苛責若有下愚不移之人或經再三教訓仍然行止妄亂者豈可留之京師爾等當即行奏聞發遣十年諭兵可百年不用不可一日不備帝王之治天下未有不以武備為先務者而兵丁之演習武藝亦未有不勤加訓練而能有成者從來士農工商各習一業茍不専心竭力則其業必不精况兵丁所司戰鬬之事非膂力剛强不能披堅執鋭非習藝嫻熟不能克敵宣威奈何怠惰茍安虚度嵗月不思設兵之本意不意己身之職業乎國家承平日乆人耽安逸武備漸覺廢弛今當邊陲用兵是以令勤操演又不令直班俾得専心訓練復給以飯銀資其日用無非體恤勤勞也爾等各宜勉力學習如騎射長槍之類必令純熟精强成國家之勁旅以柔弱怯懦為恥以安逸華麗為戒人之力量用則日増不用則日減如出城操演正可演習步行又何必騎馬乘車若此等者一經察出必從重治罪乾隆三年上諭聞得䕶軍披甲旗人内有不肖之徒入班唱戱者亦有不入戱班自行演唱者既係旗人自當勤習騎射清話武藝乃入此等卑習㒺顧身名是何道理朕昨較獵南苑見兵丁於行圍之道及馬上甚屬生踈不堪此皆平日不勤習武藝沉於戯玩之所致也八旗大臣前鋒統領䕶軍統領等均有教育旗人之責乃平日並不將該管人等留心稽查約束以致如此放蕩著交各該管大臣等嗣後将此等之人務必嚴查約束倘仍不留心致使旗人不習武藝任其流入此等卑習或經朕訪聞或被㕘劾朕惟該管大臣等是問並著步軍統領亦嚴加察拿又上諭八旗弁兵等䝉皇祖六十一年教養之恩不啻天髙地厚我皇考臨御十三年宵旰焦勞施恩沛澤為旗人籌畫生計者至周至渥朕即位以來仰體皇祖皇考聖心無時無刻不以贍養旗人為念凡有益於伊等生計者悉已次第舉行即如近年之中借給餉銀數百萬兩原議按月扣除未幾仍行豁免在國帑所費已多而於旗人究未能永逺補益今再四思維八旗生齒日見其繁若於每佐領下各添兵額則食糧者加増於原數而閒曠者自少似為養贍旗人之本計除各王公屬下包衣外查八旗滿洲䝉古現有十六嵗以上壯丁七千六百餘名五嵗以下㓜丁一萬六千四百餘名漢軍壯丁現有二萬五千一百餘名幼丁七千一百餘名又圓明園八旗壯丁現有五百餘名幼丁一千餘名共計五萬七千九百餘名著将滿洲蒙古佐領共八百八十二個每佐領添食四兩之䕶軍一名領催一名食三兩之馬甲二名食二兩之養育兵十名圓明園八旗每旗添養育兵四十二名至於漢軍佐領共二百七十個半伊等人丁雖衆其中力能營運者尚多且佐雜千把皆可録用與滿洲蒙古不同今酌量毎佐領添領催一名馬甲二名養育兵六名通計加添䕶軍領催馬甲四千三百三十餘名養育兵一萬七百七十餘名每嵗需銀四十三萬九千餘兩需米九萬六千三百餘石至於八旗佐領人數多少不一若照額加添或佐領人數不敷或有人丁而不願披甲者應於人多之佐領下挑補其如何辦理妥協之處著軍機大臣㑹同議政王大臣八旗大臣詳加妥議具奏此朕逾格加恩之舉旗人等當思國家之經費有常弁兵之額數有定将來生齒愈繁豈能更有増益朝廷曠典不可屢邀惟有謹身節用崇儉去奢以為仰事俯育之道不至匱乏則朕之施恩為不虛而旗人亦永享安寧之福矣四年上諭滿洲兵丁素以騎射馬上技藝甚為𦂳要是以奮勉習學該管大臣官員等亦留心訓練滿洲兵技藝甚屬强健逺過緑營兵丁今滿洲兵丁為習俗所染惟好安逸不甚演習技藝該管将軍大臣等又不以操演為事技藝漸至廢弛逺不及先矣今聞四川撫標親隨兵丁之缺例應以滿洲兵丁内挑取經四川副都統永寧以補巡撫親隨馬甲之缺由滿洲兵丁内桃選五人送徃該撫挑取令各射步箭二枝並無一人射中者至副都統永寧原有管束兵丁訓練熟習之責今兵丁技藝如此生踈皆伊平日不留心訓練所致於滿洲風氣大有關係永寧著嚴加申飭務須将兵丁等留心訓練俾各致精鋭若仍似此踈懈不以為事經朕查知必行治罪據四川省如此其他省駐防兵丁亦恐如此著通咨各省駐防将軍副都統等各加奮勉訓練不得怠玩五年上諭塞爾徳陽泰身為副都統不以公務為事又致令行私作弊實負朕恩著革職交刑部議處具奏協領蘇通阿等亦行私作弊著交兵部嚴察議奏其辦理不明之協領鐵圖等及将家生子挑甲之該管官員理應交部察議但人數衆多且伊等亦係遵塞爾徳陽泰之言而行者俱著從寛免其交部将軍係一省大臣理應如是辦理恩施出自朕躬嗣後右衛官兵若感戴朕恩遵奉将軍法令改過急公竭力行走不但於爾等生計有益亦可永受朕恩該部知道又上諭内扎薩克之六㑹所備兵丁及軍器已連閲三年因伊等預備操練甚好是以此次朕加恩賞賚派出備兵之王貝勒台吉官兵今凖噶爾噶爾旦策零甚屬恭順諸凡俱照朕所指示而定並無事故若每年仍𣲖大臣前徃查閲蒙古等預備馬匹牲餼徃返行走未免勞苦嗣後每年派大臣之處著停止俟二三年後理藩院将派大臣前徃查閲之處具奏請㫖爾等可曉諭派出備兵之王貝勒台吉官員等将各㑹兵丁仍不時操練俾軍器銛利整齊以副朕體恤伊等之至意毋謂暫不查閲即行怠忽伊等若稍怠忽致兵丁訓練荒踈軍器􅃜缺不全一經派往查閲大臣叅奏朕斷不寛恕著特此明白曉諭又上諭八旗兵丁赴蘆溝橋演槍砲定例三年一次於九月内舉行兵丁人等雖預領有本月分錢糧但家間養贍與在橋日費不能兼顧未免拮据今屆操演之期朕心軫念著照訓練營舊例賞給一月飯銀以示優恤再應用帳房亦著照訓練營之例赴工部關領俾營制齊一以肅觀瞻仍交該管官於完操之日查明繳部嗣後三年一次赴橋操演俱著照此例行六年上諭朕行圍回京之後恭讀太宗皇帝實録内載昔太祖時我等聞明日出獵即預為調鷹蹴毬若不令徃得請隨行今之子弟惟務出外遊行閒居戯樂在昔時無論長幼争相奮勵皆以行兵出獵為喜爾時僕從甚少人各牧馬披鞍析薪自㸑如此艱辛尚各為主効力國勢之隆非由此勞瘁而致乎今子弟遇行兵出獵或言妻子有疾或以家事為辭者多矣不思勇徃奮發而惟耽戀室家偷安習玩國事能無衰乎此等流弊有闗於滿洲風氣是以䝉太宗皇帝諄切訓諭朕此次行圍諸王大臣中竟有耽戀室家托故不願隨徃者朕已為姑容亦不必明指其人夫行圍出獵既以操練技藝鍊習勞苦尤足以奮發人之氣志乃滿洲等應行勇徃之事若惟事偷安不知愧恥則積習相沿實於國勢之隆替甚為闗係嗣後倘有不知悛改仍蹈前轍者朕斷不輕為寛宥可遍行諸王大臣及官兵人等知之七年上諭向來直𨽻山西沿邊副叅将等缺准以侍衛章京等員補用原以滿員騎射素優防禦闗隘自屬相宜而於緑營旗營伍恐未能周知是以止将邊缺補用朕思直𨽻一省為京畿重地所有營汛均屬𦂳要若将己任邊闗将備滿員之内擇其通曉營務者調補内地以在京滿員補用邊缺則於職守既無遺悞而滿員亦得藉此疏通向來沿邊副叅等缺以三分補用緑旗以七分補用滿員今内地副叅等缺應酌以七分補用緑旗以三分補用滿員在緑旗將弁原於各省通行陞轉非若滿員之有界限分缺無多實無佔礙之虞而滿員歴任邊疆留心營伍亦收駕輕就熟之益其如何分缺揀補及如何定例題陞之處該部詳悉妥議具奏十年上諭國家養育兵丁将責以披堅執鋭䧟陣摧鋒之用故當召募之始必擇其身材强壯技藝可觀者方准入伍朕聞外省兵糧缺出惟馬糧係督撫提鎮親行拔補至步糧則由營員騐放因而狥情示惠徃徃將猥弱不堪之人混行収録虚縻糧餉者有之又向例兵糧缺出先儘餘丁頂補餘丁不足始募民人充伍查餘丁一項原係將營中清出火糧收養兵丁子弟每名月給餉銀五錢既可貼補兵丁之不足且以造就人材立法本非不善乃兵丁因餉銀有限凡子弟之壯大者多令别業資生而以幼小羸弱之丁充補其數徒然佔食半餉難以造就人材國家何能收養兵之實用直省督撫提鎮等宜思設兵者經國要畧簡募者教練先資既徃者姑不究兹後遇有兵糧缺出無論馬步戰守餘丁務湏親自騐收不可憚勞委之營弁倘一時事冗不能親閲亦必令親信大員代㸔庶有一兵即得一兵之用於詰戎之道方有禆益其不實力奉行或經科道查叅必重處不貸該部即遵諭通行又上諭八旗前鋒䕶軍等三年考騐一次原恐該管大臣等不勤加訓練漸至踈懶是以特派王大臣等閲㸔分别等第以示懲勸自此例定後已經騐㸔二次勸優懲劣各知奮勉此次考騐著暫行停止交該管大臣章京等不時勤加訓練勿致臨時竭蹷並曉諭兵丁等令其平素勤習務期騎射技藝各極精熟俟下次考騐出派王大臣閲㸔時遇有庸劣者朕惟該管大臣章京等是問又上諭國家設立營伍修明武備所為折衝禦侮之用必訓練精熟於平日斯可奮勇决勝於臨時是以陸路設營汛沿海設水師皆湏勤演習收實效者自去年朕命大臣查閲營伍後陸路該管大員頗有竭力整頓氣象而水師操演則不過将演就陣法塞責了事其操舟破浪之法官弁兵丁茫然不知以為此水手之事漫不留意即至柁工水手其能熟練者亦屬寥寥平日操演之時各船進退尚且参差徃來間斷茍其臨敵何以致用夫水師以舟為主出沒風濤去來倐忽必掌柁者能操縱自如而搶風折􅀈破浪冲波水手等盡能嫻習即官弁兵丁等亦皆心領神㑹不待呼應而自靈然後猝然遇敵駕駛輕㨗一舟之中臂指相使如一人之身則應變制勝無難向來水師員弁仍以水師用原欲其熟悉情形收得人之效今則視為故套該管者不加察徼倖者茍延玩是育材之善政為伊等之㨗徑矣著通行申飭沿海将軍督撫都統提鎮等務遵朕㫖實心訓練實心甄别毋得仍前玩忽虚應故事又上諭八旗滿洲舊習原以操練騎射技藝為要兵丁内擇其善者挑為前鋒䕶軍訓演操練俾至勇健實欲我滿洲舊習不致荒廢凡有差役之處不落人後耳故每月六次步射春秋騎射三年一次考騐成例具在使兵丁盡善盡美練至勇健者皆賴該管大臣章京等盡心訓導乃此數年來朕嘗恐舊業荒廢屢申訓諭今見前鋒營兵丁尚屬可觀而䕶軍營兵丁該管大臣章京等平素甚不以訓教為要務視操演如故事兵丁等亦惟求安逸並不勤習直至考騐之時始各勉力習學似此懈怠舊習必至漸廢兵丁如何尚能勇健䕶軍統領等實負朕簡用之恩著嚴加訓飭嗣後務循舊例親徃操演指教兵丁即視如子弟力回惡習以期技藝純熟倘再似此懈怠不勤經朕察出必将該管大臣官員及兵丁等治罪决不寛貸将此通諭知之又上諭八旗兵丁習學騎射技藝甚屬要務從前考射前鋒䕶軍等以示懲勸優者已加恩賞賚矣驍騎營兵丁未經増入此項考騐之列今將八旗滿洲蒙古漢軍上三旗包衣佐領䕶軍校驍騎校親軍前鋒䕶軍領催馬甲拜唐阿等特出派王大臣與該管大臣公同考騐射布把其中三枝以上者分别記名中數不及而様式好或弓硬而骨幹强健者亦令取記再年邁殘疾不能射箭然久於營伍抑曽効力行間平素步射差務較好現不獲入考者各該管大臣詳細聲明亦著増入俟朕閲後酌量賞賚庶幾可望兵丁互相鼓舞優者愈加勤勉而劣者亦知奮發學習皆底於善所有派出王大臣等即行考閲分别等第将各記名數目交軍機處彚奏十一年上諭適閲前鋒統領䕶軍統領帯領引見之兵丁弓力甚軟且射法生踈撒放亦不清楚箭出均未能至把即落於地滿洲人等騎射本為要務今朕步射之弓力不甚勁不過六七力然尚能貫把者亦由撒放耳前鋒䕶軍等皆係精鋭之兵有如是射箭之理乎前鋒統領䕶軍統領等並無别辦事件専司訓練兵丁宜念我朝根本盡職勤練俾兵丁等各皆精鋭試思引見之人皆係遴選技優者不過如是其餘尚可觀乎此皆該管大臣章京等平素怠玩並不訓練所致朕從前已降㫖申飭此次復從寛免其治罪将此傳諭伊等嗣後務各實力訓練以期盡善若仍如是怠惰不加勤勉朕斷不寛宥必将該管大臣章京等一體治罪至該都統等皆藉事辦理旗務並不将馬甲等騎射為事射箭之日亦不過令其一箭塞責並不留心訓練醸成怠玩之習且伊等有何應辦之事職司管兵可不以教育為務乎著嚴行申飭十二年上諭據八旗䕶軍統領奏稱定例内䕶軍校缺出俱視其本佐領有出過兵年陳者揀選補授但此十數年間将曽在軍前出力保舉人員俱已用完今所餘者雖係有兵並無别項勞績且又已逾年嵗騎射平常者多伊等仗賴必至陞階而以騎射竟不為事差使亦不奮勉安於茍且從事其次應陞著有勞績少年人等亦思伊等之前有人己身暫不能陞進而不肯奮力効勉者有之嗣後補放䕶軍校時本佐領年陳有兵之人員内如有優者仍著揀選補放外如雖係有兵而並無别項勞績且騎射生踈人亦平庸者即裁除其名以其次應陞人員内惟以騎射尚優並能管轄差使勤奮者揀選補放等語但䕶軍校有管教䕶軍之責且係精鋭之營當以其人去得足以管轄者揀選補用今據䕶軍統領等現在陞用其餘有兵人員内甚不得人請另行通融辦理等語所奏甚是著照伊等所請辦理至前鋒統領圓明園䕶軍營亦著照此辦理但諸事有一利即生一弊今既如此更定後人去得騎射優者固屬可得然奉行日久漸滋瞻徇迴䕶之弊將曽經出征人員内尚可陞進而竟裁除以至寃枉者亦所不免如辦理不公有以不應裁除者任意裁除以不應陞之人徇情揀選補放者准其被曲之人赴領侍衛内大臣前出首其内大臣等奏聞時朕另派大臣查辦朕特派大臣等豈又瞻徇情面耶必然秉公查辦設或並無被曲而圖倖進濫行誣告者必􅃊責治罪朕降此諭㫖特為預防滋弊以得用人之公而軍前効力之人不致寃枉之意其中如有無知之人希圖倖進以長控告之習乃不應控告者濫行控告仍照定律治罪著通行曉諭大臣官員以及各兵丁等知之十四年上諭去嵗金川用兵朕思我滿洲兵向用雲梯攻城因命八旗於前鋒䕶軍内擇年壯人材勇健者千人特命大臣監視操演所選兵各奮勉學習不數月間皆已精練隨征金川功成凱旋如令仍回本營隨旗行走則伊等前功徒費且我滿洲舊日技藝仍至廢弛若將伊等専設一營演習均可為精鋭兵於緩急之用更有禆益遇有行幸令伊等隨徃圍獵學習行走更得嫻熟俟回軍之日不必令回本營専令大臣數人管轄特簡大臣一人總統其如何設營伍操演遇行幸隨蹕再如何施恩使得陞轉之途著大學士公同管轄操演之大臣等詳議具奏尋議准設立健鋭營雲梯兵一千名専習雲梯鳥槍馬步射馳馬躍馬舞鞭舞刀諸技又於昆明湖設趕繒船以前鋒軍習水戰駕船駛風之技十五年上諭朕前降㫖沿邊及直𨽻地方營協恭用八旗滿洲人員原因滿員弓馬素優人材驍勁習於勞苦整頓營伍是其所長是以令其分缺補用今行之數年邊方營伍漸次整飭而滿員之於外任相宜者亦俱經擢用嗣後緑營分用滿員所有都司以上各缺應令稍為裁減俾得其平至文員選用道府按俸推陞另立班次行之既久部院之能辦事者亦俱以俸次陸續外補該堂官雖欲留之而不可得夫内用外用均為國家任事之職而為滿為漢在朕初無町畦髙下之見雖朕因材器使自可不拘成格若其著為定例遵循者又當隨時斟酌以核人材而均銓政著吏兵二部查明滿員外用分班分缺定例量加裁酌另行詳悉定議具奏又上諭滿洲舊習惟以馬步射清語為要前因侍衛及八旗武官步箭庸劣徃徃有半不到地出溜者經朕節次降㫖訓飭大臣等理當仰副朕㫖毋致廢棄滿洲舊習善為盡心訓練官兵本日領侍衛内大臣前鋒統領䕶軍統領等𢃄領引見人員内多有步箭庸劣半不到地出溜者此皆弓軟步射生踈之所致也至侍衛等尤非尋常武員可比更宜以馬歩射為要若如此可乎此次朕惟將該管大臣及侍衛等治以罰俸處分並未從重治罪嗣後引見人員内仍有似此者被朕查見時朕必将該管大臣等從重治罪将該員即時懲責斷不寛宥至朕時常演射行圍原為令官員兵丁等習學田獵恐将滿洲舊習荒廢特欲整飭之意耳若計安逸朕在宫庭花苑内何樂不得朕尚不圖安逸以身率先各都統等除訓練官兵之外伊等又有何事辦理朕如此屢降諭㫖訓飭伊等反不輔朕以復滿洲舊習訓練官兵此與違背朕㫖何異有是理乎再補放武員但視其騎射馬步技藝而已並不賴伊等辦事又何必論其聰明辦事可否耶嗣後帯領侍衛武官等引見時朕但視其馬步射清語優長者録用若技藝庸劣雖人去得朕亦不用将此通行傳諭領侍衛内大臣前鋒統領䕶軍統領八旗都統等務體朕意各将所屬官員兵丁訓練以期優長朕如此開導訓諭而伊等仍照前不以為事此即有意背㫖自尋其辜仍望朕施恩寛貸可乎慎之勉之特諭又上諭朕前因緑旗營伍廢弛兵力軟弱皆由将弁不能約束訓練所致是以分用滿員以資鈐轄邇來因簡用過多業将遊擊以下之缺量加酌減今觀侍衛協領叅領等人員内才具稍優者皆已陸續外用副叅等缺仍屬過多旗員内漸少出色之人而緑旗員缺亦未免稍偏朕因材器使内外原屬一體但隨時委用輕重務在合宜自應量為調劑且向來滿員内任者即藍翎侍衛亦皆以為榮初無欣羡外任之意若樂於外任可以偷安且多得俸薪則所見卑鄙已甚滿洲淳樸之風當不出此總之操縱在朕向之多用緑旗不可嘆向隅今之簡用滿洲不可嘆阻塗所有分缺簡用之處該部另行定議具奏十六年上諭侍衛等乃武員之表率騎射尤為𦂳要去嵗因侍衛等步射庸劣業經降㫖儆飭皆已治罪本日引見之侍衛等步射仍屬庸劣多有半不到地出溜者是何道理其步射庸劣之哈魯等十四員交領侍衛内大臣嚴加議處具奏至領侍衛内大臣本係専任管教侍衛之人平時並不善為訓練以致如此庸劣甚屬怠惰将領侍衛内大臣等俱交部查議即如竒通阿豐安伊等更有何事並不将侍衛等盡心訓練尤屬非是著将竒通阿豐安嚴加查議具奏十七年上諭朕恭閲太宗文皇帝實録内載崇徳元年十一月癸丑日上御翔鳳樓集諸親王郡王貝勒固山額真都察院官命宏文院大臣讀大金世宗本紀上諭衆曰爾等審聴之世宗者䝉古漢人諸國聲名顯著之賢君也故當時後世咸稱為小堯舜朕批覧此書悉其梗概殊覺心徃神馳耳目倍加明快不勝嘆賞朕思金太祖太宗法度詳明可垂久逺至熈宗合喇及完顔亮之世盡廢之躭於酒色盤樂無度效漢人之陋習世宗即位奮圖法祖勤求治理惟恐子孫仍效漢俗預為禁約屢以無忘祖宗為訓衣服語言悉遵舊制時時練習騎射以備武功雖垂訓如此後世之君漸至懈廢忘其騎射至於哀宗社稷傾危國遂滅亡乃知凡為君者耽於酒色未有不亡者也先時儒臣巴克什達海庫爾纒屢勸朕改滿洲衣冠效漢人服飾制度朕不從輙以為朕不納諫朕試設為比喻如我等於此聚集寛衣大袖左佩矢右挟弓忽遇碩翁科羅巴圖魯勞薩挺身突入我等能禦之乎若廢騎射寛衣大袖待他人割肉而後食與尚左手之人何以異耶朕發此言實為子孫萬世之計也在朕身豈有更變之理恐日後子孫忘舊制廢騎射以效漢俗故常切此慮耳我國士卒初有幾何因嫻於騎射所以野戰則克攻城則取天下人稱我兵曰立則不動摇進則不回顧威兵震懾莫與争鋒此畨徃征燕兵出邊我之兵威竟為八大臣所累矣故諭爾等其謹識朕言欽此朕每敬讀聖謨不勝欽凛感慕深惟國家開創之時我祖宗躬親勞瘁勤求治理矩矱相傳罔敢渝越以立萬世之丕基至於今咸受無疆之福者皆仰遵明訓所致也我朝滿洲先正遺風自當永逺遵循守而勿替是以朕常躬率八旗臣僕行圍較獵時時以學習國語熟練騎射操演技勇諄切訓誨無非率由舊章期以傳之奕禩永綿福胙惟是我皇祖太宗聖訓所垂載在實録若非刋刻宣示則累朝相傳之家法外庭臣僕何由共悉且自古顯謨令典多泐之金石曉諭羣工我皇祖太宗之聖睿特申誥誡昭示來兹益當敬勒貞珉永垂法守著于紫禁箭亭御園引見樓及侍衛教場八旗教場各立碑刋刻以昭朕紹述推廣至意俾我後世子孫臣庻咸知滿洲舊制敬謹遵循學習騎射嫻熟國語敦崇淳樸屏去浮華毋或稍有怠惰式克欽承彞訓冀億萬世子孫共享無疆之庥焉特諭又上諭自設立健鋭營遴選兵弁並駐劄以來教演技藝甚多今又練習水戰自應奨勵著施恩賞予養育兵缺一百名於伊等子弟内挑取以資生計又上諭看來八旗世襲官員内並不學習清語騎射庸劣不堪者甚多皆由幼時襲官賴有俸養惟求安逸該都統等又不勸勉教訓所致此項官職皆伊等祖父宣力所得伊等承襲後因年未及嵗即閒散安逸並不學習正事恣意流蕩遂成無用之人若令其當差伊等亦得長進其年已及嵗之官亦多旗下差務無多惟以安逸為事及挑選侍衛時俱退避不前著将此等一併揀選分與䕶軍營按伊等品級在章京䕶軍校䕶軍上兼行並勉力教演騎射若果行走勤奮即奏補實缺伊等藉此學習亦屬教養幼穉之道應如何分派差使行走補用令于旗差足數有餘之處著軍機大臣㑹同八旗都統前鋒統領䕶軍統領議奏又上諭馬步騎射係我滿洲最要之材技今旗下人等皆安於逸樂並不以此為要勤加習學且亦不知先輩時技藝不能如人即大愧恥務求至善故朕力革流習遵循舊制每每身先操演騎射率衆行圍不憚勞瘁又令各宜務期至善所降諭㫖甚多是以因朕常閲步射尚知畏懼畧加學習若無朕前射箭之事則益不以為事而該都統亦並不董率勤習矣将此傳諭領侍衛内大臣八旗都統前鋒統領䕶軍統領等嗣後武職官員内凡陞調及世襲于引見時除向來看視步箭不議外其引見向不射箭之補放印務章京人等並侍班引見官員亦俱著射箭又上諭䕶軍前鋒皆係精鋭之兵弓馬騎射乃我滿洲至要之材技必湏鼓舞教訓不時操演以臻精鋭䕶軍前鋒等每月雖有一定射箭日期然該管大臣官員等視為故事未必悉力教演至三年一次欽派王大臣驗看軍政雖係奨優懲劣之例但為期甚逺伊等亦不過臨期鹵莽操演一經驗看過後仍復荒棄便不勤習豈能至于嫻熟從前皇考思及兵丁騎射最闗𦂳要曽特降諭将前鋒䕶軍挑選引見並有奨賞録用者亦有因庸劣不堪致将該旗都統等責處治罪者此特教養兵丁之道著交前鋒統領䕶軍統領等䕶軍校前鋒䕶軍内有材堪造就騎射優長每翼挑選前鋒校各十名前鋒二百名上三旗每旗各挑選䕶軍校二十名䕶軍二百名下五旗每旗各挑選䕶軍校十五名䕶軍一百五十名請㫖欽派王大臣閲看此内如有上好前鋒校前鋒著於每翼揀選十五名䕶軍校䕶軍每旗著揀選十名奏請引見如此則兵丁等互相鼓舞演習技藝而亦可視該都統等董飭之賢否以定功過矣嗣後以此為例按年俱如此辦理本年於朕哨圍回鑾後著前鋒統領䕶軍統領等即行遵照揀選請㫖欽派王大臣閲看又上諭八旗世職官員皆係承襲伊等先人宣力所得之職現食俸禄除旗下官差外並無操演之處惟安於逸樂遂至清語技藝均屬不堪朕曽降㫖将尚可造就之人揀選引見其有出色者挑取侍衛中平者令在䕶軍營當差清語騎射皆令演習此特軫念伊等先人勤勞教養旗僕之意但此等引見人員皆係揀選八旗才具優長者其内如有不堪者尚應革退令别人承襲其旗差行走之世職官員内庸劣之人因不令引見反不勤學此特導之漸染惡習耳况滿洲世僕並非伊等自身宣力所得之官不過承襲世職即因不能清語騎射革退令别人承襲實屬分所應得原議殊未詳盡此等旗差行走之世職恩䕃等官應如何考驗並此次考驗後應如何作為常例之處著交八旗都統另行議奏又上諭向例八旗兵丁軍械每年出派王大臣查騐一次但每年查騐殊覺繁冗兵丁亦屬多費嗣後著三年一次查騐朕今已展查騐限期如屆查騐之年派出王大臣斷不可仍前塞責了事務湏詳細實心查騐倘仍不以為事朕必親身閲兵若閲兵時有不齊者必将王大臣治罪决不姑貸其查騐時除八旗驍騎營官員兵丁及前鋒䕶軍包衣䕶軍著仍照例查騐外其包衣佐領下馬甲及王屬包衣兵丁之軍械俱著無庸查騐又上諭八旗滿洲官員原俱在城内居住即偶有年老告退之人移於京城左近坟塋地方居住尚可至南城外皆係漢大臣官員住居之所滿洲官員不應在彼居住今聞滿洲官員内亦有移在南城外居住者殊屬不合著交八旗都統嚴行飭禁現住之人俱令移居城内並著派御前大臣及侍衛等㑹同廵城御史将現在南城外居住滿洲皆係何人並係何等官職查明奏聞又上諭旗員步射一端甚闗𦂳要朕節經降㫖曉諭從前已有因䕶軍營射箭致䕶軍統領俱被飭責者之八旗都統寧不知耶豈以䕶軍前鋒始操演步射旗下官員即不當操演步射乎本日正藍旗滿洲旗分帶領引見官員看來步箭多有半不到者是何道理實屬不堪八旗都統了無事務於官員等步射自應教演似此因循廢弛伊等皆所司何事将此着通行傳諭八旗王大臣嗣後旗員步射如再有似此半不到者惟伊等是問又上諭騎射國語乃滿洲之根本旗人之要務朕今嵗校閲京城世爵其射箭尚可觀及人材英俊者已施恩選取侍衛並分在各處令其學習行走其射箭甚劣不堪教化者察明革職别行承襲至各省駐防亦皆有世爵若不教訓騎射國語伊等近于素餐安逸之習必致學為不善著各省将軍都統等将伊等不時教導務使騎射優嫻國語純熟如有教訓不化騎射甚劣者該将軍都統等即指名叅奏革職别行承襲将此通諭知之又上諭因八旗世職多有自幼承襲惟躭於安逸将騎射技藝不以為事故經朕降㫖令将尚可觀者帶領引見分在各處學習行走其餘庸劣者八旗都統等請限訓練令其陸續帯領引見此特朕軫念伊等先人勤勞教養旗僕之意今引見訓練之世職等看來皆不過平等而已並未有練至優長者但此係初次朕亦不究姑從寛貸其稍有傑出見長者仍記名奨勵其甚屬不堪者始革退二人俟再逾三年朕仍閲看彼時仍如此等情形斷不寛恕令伊等務湏加意勤習八旗都統等皆有教養旗人之責平日若将旗員視如子弟加意訓練騎射何致生踈况演習射藝清語既無閒曠之暇不致遊蕩亦於伊等生計稍有禆益此次尚屬平等姑容從事嗣後都統等若仍不以為事至朕閲看之時方趕𦂳教演一經查獲不得怨悔也将此著通行傳諭八旗再此次世職官員以朕閲看各将技藝趕𦂳演習俱至平等矣看來尚知悛改可期造就其中經朕記名者著賞緞三疋著該都統等再行𢃄領引見除其革職及因有事故未經引見之官員外其餘人員俱著加恩各賞縀二疋又上諭八旗世職官員亦同職任官列入軍政一體填註才守皆屬虛名並非實據該員等惟應計其騎射技藝平時當差如何耳嗣後八旗世職官員免其入于軍政着該都統等三年一次帯領引見于引見時将其平時當差如何之處一併聲明将此着永為令十九年上諭旗員外補緑營盖以八旗營兵素為嚴肅而旗員嫻熟騎射訓練整飭自足以表率士卒乃近來外任武職旗員來京引見者弓馬率多平常竟與緑營官弁舉動相似即奏對履歴清語亦覺生踈是不獨不能振剔戎行而轉濡染其陋習此豈簡用之本意嗣後務當各加奮勉留心學習倘仍躭於安逸一膺外任遂置弓馬於不問以致平時技藝漸就荒廢該督撫提鎮等即行據實叅奏兵部堂官有本兵之責於堂考時亦當慎加甄别但如堂考緑營官弁視為奉行故事而已總之旗人騎射是其本務不得與緑營比况膺将領之寄将為標營凖則者乎可将此㫖通行傳諭凡外任武職旗員令其各録一道懸之公署其部推新任者即由兵部謄録俾領赴任晨夕觀瞻知所警戒二十一年上諭昨據前鋒統領䕶軍統領等帯領引見人内因多有胡亂挑射或不到箭把擦地而去者經朕申飭将前鋒統領䕶軍統領等交部察議矣今日兵部帯領引見副都統記名人員内䕶軍叅領滿丕等三人步射平常未到箭把甚屬不堪朕已将伊等戒飭但䕶軍恭領除進班外更有何事時常勤習馬步箭清語是伊本等要務伊等果将此等武藝為要務須演習可為兵丁法則而伊等步射亦不致平常矣此等步射平常者皆由平素並不勤習至引見時始急忙上𦂳所致前鋒統領䕶軍統領等所司何事伊等果於平素嚴飭該叅領等令其各自勤習不時親看演射何至如此耶此又非難事朕屢經嚴行飭諭仍有如此者皆由前鋒統領䕶軍統領等自取朕之咎責也但此次只責懲歩射平常者嗣後若復如此經朕查出必将該管前鋒統領䕶軍統領等一併飭責决不寛宥著通示前鋒統領䕶軍統領又上諭從前朕以滿洲習氣純樸而騎射步箭優長較之漢人實為精强能耐勞苦可為緑旗官兵儀型是以加恩将滿洲陸續陞用緑營其陞用之人宜感戴朕恩用心勤習馬步騎射滿洲國語為各該管官兵儀型今看來陞用緑營人員並不勤習馬歩騎射只圖安逸差使無多遂致廢棄武藝生踈或有不及緑營人員者似此光景朕用伊等何為尚可為漢人儀範耶是以朕從前曽降有諭㫖著交兵部将朕從前所降諭㫖並此次諭㫖皆彚寫鐫板通飭遵行嗣後遇有補授緑營官員即刷給一分令其不致廢棄滿洲舊習用心勤演馬步騎射滿洲國語倘伊等仍不勤勉不以演習武藝為事朕必加重懲治决不姑貸二十二年上諭外省駐防将軍及緑營之提鎮出行則皆乘輿夫将軍提鎮有總領官兵之責若養尊處優自圖安逸亦何以表率行伍而作其勇敢之氣况旗人幼習騎射即緑營中亦必以其弓馬優嫻始歴加陞用乃一至大僚轉至狃於便安忘其故步此豈國家簡擢之意耶京師都統副都統既皆乘馬而滿洲侍郎則無論年逾六旬亦俱不得乘輿即朕巡省所至尚每日乘馬而行乃外省武職獨相沿陋習此甚非宜嗣後将軍提鎮概不許乘輿其編設轎夫并著裁革如有仍行乘坐者照違制律治罪可通行傳諭知之二十五年上諭馬步射清語係滿洲根本甚為𦂳要前曽降㫖所有八旗散職官員每三年閲看一次今嵗正值閲看伊等之期已按旗閲看矣其中稍可造就之子爵伯清額等三十二人令在侍衛上行走輕車都尉嵩山等四十一人令在䕶軍營行走輕車都尉李文貴等九人令在鑾儀衛行走其餘人員内不惟步射好清語熟者甚少竟有步射甚劣不能清語者滿洲人氏於馬步射清語皆屬分内應學之事散職官員除進班之外並無别項差務益當勤學且間二三年始閲看一次即使庸劣者習二三年後尚有不工之理乎此皆平素希圖安逸不肯勤學而該管大臣又不嚴加教訓所致其習甚惡若不力為整飭相沿日久必致滿洲故業盡失除其中稍可者朕皆姑容辦理外輕車都尉劉文靖騎都尉富柱長在登保雲騎尉闗柱堆清額恩騎尉王至誠三官保步箭甚劣不能清語本應将伊等罷黜警衆今特施恩此次暫行寛免俱罰俸一年嗣後旗員等務湏上𦂳勤學馬步射清語各該管上司亦不時教演倘仍前怠惰不學及該管大臣等不嚴加教訓至下次閲看時仍復如此朕决不輕貸二十六年上諭馬步騎射乃滿洲舊務至前鋒䕶軍俱係精兵尤當熟練今屆期考騐八旗前鋒䕶軍等騎射朕特𣲖王大臣考騐其中騎射生踈者均宜治罪但近年前鋒䕶軍等因無曽拴馬伊等未得演習其中恐有馬箭生踈者如騐看生踈不得不治其罪如治其罪伊等無曽拴馬未得演習情又可恕著加恩此次考騐前鋒䕶軍時不必騐看馬箭惟騐看步箭如步箭生踈斷不寛恕必責懲示衆昨於前鋒䕶軍營均已賞給馬匹拴養此際該管大臣官員等必令伊等勤勉訓練如伊等不肯勤學該管官員又不肯努力訓誨至下次騐看時仍有生踈者不惟将兵丁治罪將該管大臣官員等一併治罪再考騐伊等分作兩翼騐看甚需時日此次出派大臣較多著每翼分為二處騐看至上三旗包衣䕶軍等亦當考騐即著交現派大臣等一併騐看二十七年上諭據鐵保奏巡察所屬營兵看得遊擊阿林太不能騎射且辦事遲鈍守備馬陞騎射生踈已咨明總督将此二員叅奏等語旗員補放緑營員缺特因滿洲人員騎射素優可作緑營官兵表式並非欲令伊等在外安逸徒佔緑營之缺也伊等自應加意勤習騎射可以為法緑營何致偷安怠惰馴致騎射生踈從前朕屢經頒發諭㫖即漢人身為武員尚不應出此况滿洲乎在該管大臣等理應不時查騐一遇此等人員立即叅奏何以拘泥成例直待将行軍政時始行叅奏耶阿林太等身係遊擊不能騎射皆由平日任意懈弛不勤練習之所致除将阿林太馬陞着交部嚴加議處外並著通行曉諭各省督撫提鎮務将所屬武職不時留心察閲令其勤加練習嗣後倘仍有此等不能騎射之人不惟該員等罪無可逭必将該督撫提鎮等一體治罪三十二年上諭前據定長奏䕶送健鋭營兵丁酌雇竹兜應用並跟役亦為雇兜乘坐一節所辦全屬不知事體已經傳㫖申飭官兵奉派進勦自應奮徃遄征固無緩坐肩輿之理至於兵丁跟隨僕役責在効力服勤尤宜身奈勞苦即云道途遼逺乗騎不敷自應給與應得馬價或願沿途轉雇或願省費徒行皆未為不可若如定長所奏使輿儓之賤得一體乗兜而驅策舁送者皆地方清白良民毋論道路傳聞駭人觀聽且使該役等見所過地方如此多方體恤必将因惰生驕諸凡抑勒平人繹騷鄉里勢又何所不至其於軍行政體所闗甚重若僅傳㫖教誡不足示懲定長著交部嚴加議處並通諭官兵經過地方各督撫知之三十九年上諭馬步箭乃滿洲舊業向以此為要務無不留心學習今國家昇平日久率多求安将𦂳要技藝全行廢棄不習因循懦弱竟與漢人無異朕痛恨之滿洲臣僕俱世受國家豢養之恩理宜自勵成材期與國家効力乃不知自愛竟成廢物甚屬不堪如朕已逾六旬仍每嵗行圍木蘭特欲令滿洲臣僕服習勤苦熟諳技藝之意若不如此則滿洲各大臣侍衛官員兵丁等必致俱不能騎射矣國家與滿洲臣僕鼓勵教導之例至詳且備即如設立前鋒䕶軍等各營特派大臣官員訓練又每旗設立十五善射十五缺每遇缺出揀選時不論王公文武大臣侍衛官員拜唐阿兵丁閑散宗室概行挑取帯領引見復按其班次将王公文武大臣官員概列於前因伊等熟練步箭每於伊等内挑取者居多拜唐阿兵丁排列於後挑取者甚少但王公大臣官員挑選十五善射或圖美名或為戴翎者多伊等或於未得之先尚以步箭為事及既挑之後即棄而不習反不若将拜唐阿兵丁等多挑幾人伊等尚知各務陞途不時習練嗣後所有十五善射之缺惟将拜唐阿兵丁及各該旗閑散宗室揀選𢃄領引見挑取之後仍令在原差上行走務令加意練習如果嫻熟准該管大臣保舉於應陞處列名即以藍翎侍衛陞用倘不留心練習以致生踈者即行叅革至王公大臣侍衛官員内步箭果有嫻熟者挑取十五善射時不必佔拜唐阿兵丁閑散宗室等缺即於上三旗内每旗另添設十五缺将下五旗王公大臣侍衛官員一併歸入揀選𢃄領引見挑取如此辦理則王公大臣官員内步箭好者既不至廢棄而兵丁陞路亦不致壅滯矣著交該管大臣将現在十五善射作何分别挑取並新定之缺作何揀選𢃄領引見之處詳加核定請㫖永逺為例四十年上諭健鋭營火器營俱由滿洲兵丁内揀選好另立之營所闗最為𦂳要現經管理此二營之大臣等操練演習固屬盡心但因日久風氣漸弛即如在軍營則有詈罵将軍在本營即有偷盗馬匹之事若不及早整頓必至流為不堪大有闗係著𣲖舒赫徳總管火器營派福隆安總管健鋭營舒赫徳福隆安不必輪班前徃操練著每月去一二次查看整頓風俗嚴行約束毋令為匪並技藝務操演致精熟嗣後該二營官兵内如仍有無恥行為卑賤者朕惟伊二人是問四十一年上諭考驗未上衙門世職等步射務令每人多射數箭從嚴試看始可分别優劣定其等第從前遇考試之年𣲖出之王大臣騐看步射不過令人射三箭即行挑選此特王大臣等欲迅速竣事耳嗣後派出考試世職之王大臣等必令各員俱射五箭加意詳閲再定其等第揀選不得祇射三箭即行定擬也其軍政等處特𣲖王大臣考試步射者俱照此一體遵行著為令直省八旗駐防營以将軍都統副都統掌其教閲訓練騎射演放槍礮並以時親臨閲試第其優劣以為賞罰春秋合操均與京營同八旗水師營每年春秋二季将軍都統副都統等督率官兵分駕戰艦金州福建乍浦廣東赴海口黒龍江齊齊哈爾黙爾根江寧于江面天津赴海口每年四月起八月止均擇天氣晴和潮平風順時出洋列陣張帆起碇掌號鳴礮以次操演停操之後仍各率官兵講習水務陸路緑旗營總督所屬為督標巡撫所屬為撫標提督所屬為提標總兵所屬為鎮標總督節制巡撫提鎮提督節制鎮標每嵗秋季霜降日申令本標官兵校閲于演武場前一日各營将弁肅隊伍赴教場豫立軍營屆日黎明軍士擐甲列陣中軍建大纛于場正中将臺上𫝊令合操中軍揚旗麾衆臺下舉礮三軍中鳴角擊鼓步騎甲士列隊行陣施放槍礮連環無間並如京營之制若長槍籐牌㓲刀短兵之屬各因其地之宜以教士卒皆有成法閲畢試材官将士騎射技勇申明賞罰犒勞軍士各釋甲歸伍漕運總督河道總督屆期教閲本標官兵亦如之其各營将弁隨時訓練本管軍士分按日期緑營水師有内河有沿江沿海出洋信候各省不同每嵗春秋季月或夏秋之季乗艦列陣揚帆駛風鳴角發礮操演演具如軍律乾隆元年諭各省營伍離提鎮遼逺不能親身稽察該督撫酌量地方營制如何令提鎮等隔數年一次親身察閲詳議具題尋議准直𨽻提督分所屬為三路嵗閲一路三嵗而遍馬蘭宣化正定三鎮嵗各一閲泰寧天津二鎮二嵗各一閲山東兖州鎮臨清沂州等處分路嵗閲登州鎮西南東南等處分路嵗閲二嵗而遍山西太原大同二鎮嵗各一閲河南南陽河北二鎮嵗各一閲江南提鎮嵗各一閲江西南昌南贛二鎮嵗一閲二嵗而遍閩浙總督蒞任一閲水師提督一嵗閲海壇閩安烽火門等處一嵗閲金門南澳銅山等處二嵗而遍陸路提督一嵗閲興化福州福寧建寧延平等處一嵗閲泉州漳州龍巖汀州邵武永春等處二嵗而遍海壇金門南澳台灣四鎮水師嵗一閲福寧汀州建寧漳州四鎮陸路嵗一閲浙江提督三嵗一閲定海黄巖温州三鎮嵗各一閲衢州處州二鎮嵗各一閲湖廣總督蒞任一閲提督嵗閲湖南湖北二嵗而遍襄陽宜昌永州鎮筸四鎮嵗各一閲陜甘總督五嵗一閲提督三嵗一閲延綏興漢河州凉州寧夏西寧肅州七鎮嵗各一閲四川川北重慶建昌松潘四鎮三嵗各一閲廣東左翼右翼髙州瓊州碣石潮州南澳七鎮嵗各一閲廣西提督三嵗一閲左江右江二鎮嵗各一閲雲南貴州提鎮所屬酌數年内一閲各疏報出巡回任日期及各營汛官兵技藝是否純熟軍装器械是否齊全以待部核十年諭國家設立營伍修明武備以為折衝禦侮之用必訓練精熟於平日斯可奮勇决勝於臨時是以陸路設營汛沿海設水師皆湏勤演習以收實效自去年朕命大臣察閲營伍後陸路該管大員頗肯竭力整頓氣象而水師操演則不過将演就陣法塞責了事其操舟破浪之法官弁兵丁茫然不知以為此水手之事漫不留意即至舵工水手其能熟練者亦屬寥寥平日操演之事各船進退尚且参差徃來間斷茍其臨敵何以致用夫水師以舟為主出沒風濤去來倐忽必掌舵者能操縱自如而搶風折艥破浪冲波水手等盡能嫻習即官弁兵丁等亦皆心領神㑹不待呼應而自靈然後猝然遇敵駕駛輕㨗一舟之中臂指相使如一人之身則應變制勝無難向來水師官弁仍以水師用原欲其熟悉情形收得人之效今則視為故套該管者不加察徼倖者茍延玩是育材之善政為容身之㨗徑矣著通行申飭沿海将軍督撫都統提鎮等務遵朕㫖實心訓練實心甄别毋得仍前玩忽虛應故事十一年諭國家設立營制所以嚴拱衛而固苞桑務在精選鋭以儲干城勤訓練以資捍禦所謂兵可百年不用不可一日無備也從前因各標營日漸廢弛朕命大臣前徃山東河南江南等省先行閲看並降㫖申飭復於督撫提鎮奏摺中時加批諭令其實力整頓今各省操演之法大扺旗纛戈甲期以飾觀步伐陣圖似為練習其實在技勇精强弓馬嫻熟者甚少在水師營汛亦不過演就水陣聊以塞責而已即軍政薦舉未能盡屬公當徒為具文以是整飭戎行豈能使壁壘一新士氣日奮即如西北稱勁旅而江浙多柔脆不知既以為兵自應鼓其鋭氣使弱者日進於强豈可任其委靡不加振作盖營伍之中兵馬錢糧甲胄器械皆宜事事留心向來虛冐兵糧私扣朋馬夤縁㧞補挪措軍装等弊猶未盡除而教訓演習惟事粉飾因循怠忽尚沿舊習殊非設兵衛民之意是必立定年限専差大臣閲看庶将弁知有責成不敢怠廢而各兵亦知有考騐時時警惕技藝不致生踈於戎行自有裨益朕前㫖與以三年之限著兵部請㫖並未定有分省察閲之年分今已閲之省則已過二年其餘則未命前徃也其如何分年分省差大臣徃閲著該部定議俟臨時酌量或自京師命大臣前徃或即命本省督撫察閲尋議定自乾隆十二年為始閲直𨽻山西陜西甘肅四川十三年閲湖北湖南雲南貴州十四年閲福建浙江廣東廣西十五年閲山東河南江南江西周而復始但地方遼濶若止欽命大臣一人勢難周遍至甘肅處極邉安西提標駐塞外若令閲川陜之大臣並閲則廣逺難周請于應閲直𨽻等省之年差徃直𨽻山西一人陜西四川一人甘肅一人應閲湖北等省之年差徃湖北湖南一人雲南貴州一人應閲福建等省之年差徃福建浙江一人廣東廣西一人應閲山東等省之年差徃山東河南一人江南江西一人兵部于每年開印後将應閲之省分並滿大學士領侍衛内大臣都統尚書侍郎名單開列奏請或欽㸃大臣前徃或即令該督撫就近察閲恭候欽定再向來各省督撫提鎮原有分年察閲營伍之例嗣後各省如遇欽㸃大臣察閲之年該省督撫提鎮停其察閲至當提督簡閲之年則各鎮停簡閲當督撫簡閲之年則提鎮概停簡閲十八年諭各省標營分年特派大臣查閲又督撫提鎮有統轄操防之責例應以時巡視所以簡軍實嚴武備也是以各兵之漢仗技勇為本至於旗幟衣㡌期足以别隊伍整軍容無缺可矣奚事増美焉近來外省營汛每遇大員蒞閲徃徃先期部署為一切觀美計製造旗幟更易號衣公費不足遂坐扣兵糧以致伊等生計為艱是營伍未有整頓之實而兵丁先被扣餉之累殊非巡查簡閲之本意嗣後查騐兵丁務覈其實毋以旗章衣服粉飾外觀至或有欽差大員經過營汛地方兵丁循例站隊者亦俱無庸張設旗幟總之整飭戎行全在漢仗技勇其縁飾之具皆屬無益之虚文而因以扣餉瘠兵則尤其大不可者著通行各省督撫提鎮咸共知之二十二年諭今日朕至杭州省城其接駕之緑營兵丁有奏簫管細樂者夫身𨽻行伍當以騎射勇力為重戍樓鼓角不過用肅軍容即古者鐃歌鼓吹之詞亦以鳴其得勝之氣耳若吹竹彈絲技近優伶豈挽强引重之夫所宜相效此等緑營陋習各省均所不免可傳諭各省督撫提鎮等轉飭所屬標營嗣後營伍中但許用鉦鼓銅角其簫管細樂概行禁止又諭外省駐防将軍及緑營之提鎮出行則皆乗輿夫将軍提鎮有總統官兵之責若養尊處優自圖安逸亦何以表率營伍而作其勇敢之氣况旗人幼習騎射即緑營中亦必以其弓馬優嫻始歴加陞用乃一至大僚轉致狃於便安忘其故步此豈國家簡擢之意耶京師都統副都統既皆乘馬而滿洲侍郎則無論年逾六旬亦俱不得乘輿即朕巡省所至尚每日乗馬而行乃外省武職獨相沿陋習此甚非宜嗣後将軍提鎮概不許乘輿其編設轎夫並著裁革如有仍行乘坐者照違制例治罪可通行傳諭知之三十九年尚書公福隆安奏鳥槍一項於軍器中最為得用而進步連環尤為鳥槍中鋭利之法八旗勁旅凡遇専操㑹操惟演九進十連環使之精熟是以所向無敵至各省緑營兵丁操演鳥槍不過按照陣式虛應故事施之臨事全屬無用即如征勦金川所有緑營兵丁放槍俱不得力直至𣲖出京城健鋭火器兩營兵前徃始各展其所長轟擊殪賊幾無虚發近日臨清勦捕逆匪亦得京兵之力其效已可概見伏思各省緑營原設鳥槍兵與其循習虚文莫若練資實用請飭令各省督撫提鎮詳查本省原設鳥槍兵若干俱令照健鋭火器二營進步連環鳥槍法式一體演習并飭該管大員董率将領兵丁専心學習務使進退如法操練精嫻庶臨用並能致勝而防守愈昭嚴飭矣五十年諭國家設兵衛民可百年不用不可一日無備陜甘兩省係邉陲要區設兵不為不多乃逆回兩次滋事緑營兵丁懦怯退縮致賊匪得以蔓肆鴟張此皆承平日久督撫提鎮不能實心整飭各營将弁不加操演講習因循怠玩以致兵備廢弛屢經降㫖嚴切訓飭若能如福康安加意整頓于各標營内挑出兵丁一半専意訓練俾軍律嚴明士氣勁鋭一變緑營懦怯之習兩省共有三萬餘勁旅設或地方稍有不靖又何患不立時撲滅耶在雲貴四川兩廣福建等省係沿邉沿海重地自應照福康安所辦于各營内挑選壯健勤加訓習使各有數萬勁旅庶平時足以重操防而臨時可以供調遣即腹地亦當如此留心簡練各省皆係總督専主營政而山東山西河南江西係巡撫兼提督銜著将福康安原摺抄寄各省總督及山東山西河南江西巡撫一體留心不動聲色皆有精兵之備亦一至要也又諭鳥槍實為行軍利器著傳諭各省督撫務令兵丁時時操演嫻熟兵役奉差捕賊毋得施放空槍以期共收實效又聞各省營伍槍兵每不得㧞補馬戰及外委等以致槍兵無向上之心甚或以羸弱充數殊不知臨陣殱賊鳥槍弓矢尤為得力自應将熟練槍手一體㧞補俾知上進有階則更争相鼓勵踴躍演習兵籍凡八旗親軍前鋒鳥槍䕶軍於䕶軍驍騎步軍教養兵壯丁内㧞補䕶軍於驍騎步軍教養兵壯丁内㧞補驍騎於步軍教養兵正身壯丁内㧞補步軍於正身壯丁及户下人内㧞補教養兵於正身幼丁内㧞補領催於䕶軍驍騎内選充均由叅領佐領選應補之人呈都統統領等簡覈録其材力驍勇者既入伍令各旗籍具名按季報部以時稽其盈縮駐防兵由該管官於駐防壯丁内㧞補若駐防官子弟有嫻習騎射願於任所充伍者聽凡直省考㧞營兵以人材强壯技藝優嫺者充補騎兵㧞於步戰兵步戰兵㧞於守兵守兵㧞於餘丁無餘丁乃募於民督撫提鎮本標及相近營汛均親考㧞餘令副叅考㧞仍於巡閲屬營時覈之考㧞失實及虛佔名糧者論如法營兵令五人聫名具保互相覺察其有不遵約束生事擾民容姦保慝離次失伍有干紀律者皆論如法並坐其長欽定八旗通志卷三十九
