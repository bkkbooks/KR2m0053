body:
  text: 欽定四庫全書欽定八旗通志卷一百八十七人物志六十七大臣傳五十三蒙古正白旗下䝉旺扎爾旗納穆扎爾夣麟古正紅恩格圖瑚衮楚克固英䝉䝉古鑲白旗弼綽拜爾沙沙理布古鑲紅旗喇什阿阿敏道旺扎爾子博靈阿旺扎爾蒙古正白旗人姓圖伯特父拉錫官領侍衛内大臣以盡心職守給騎都尉兼一雲騎尉世職有傳旺扎爾於雍正六年由廕生授三等侍衛擢御前二等侍衛十二年襲其父拉錫世職十三年授鑲藍旗滿洲副都統乾隆元年以扈從失儀議革職命在三等侍衛上行走三年正月噶爾丹䇿凌遣使求北路副将軍䇿凌轉奏喀爾喀與厄魯特以阿勒台山為界上以其詞㳟順命旺扎爾偕侍郎阿克敦台吉額黙根齎勅往諭議定地界十二月旺扎爾率來使哈桞自凖噶爾回京奏噶爾丹䇿凌遵㫖定界状上允其進藏煎茶並貿易欽派大臣與哈栁議行詳阿克敦𫝊四年遷頭等侍衛八月授正黄旗滿洲副都統十一月命往蘇州同縂督郝玉麟㑹審織造海保貪縱各欵得實論罪如律五年閏五月命查審喜峯口管理臺站員外郎班第永昌交代受賄隠匿状鞫實議罪如律八月奏言殺虎口等處臺站原為接逓喀爾喀衆䝉古事件而設甚關𦂳要因無大員兼管致馬匹疲痩缺額請将殺虎口臺站令綏逺城将軍轄古北口獨石口令提督轄喜峯口令熱河副都統轄䟽下軍機大臣議行十一月廵察寳坻八城官兵六年五月署正黄旗䕶軍統領六月左都御史劉吴龍疏􅄁浙江廵撫盧焯受賄營私各欵上命旺扎爾㑹同閩浙縂督宗室徳沛查審得實焯擬絞餘論罪有差七年二月署鑲紅旗䕶軍統領六月以獨石口張家口等處多盜命旺扎爾前往督緝分查界址酌立章程八年二月授鑲白旗滿洲都統六月授嚮𨗳統領旋授理藩院右侍郎九年兼管火器營事十一年兼管武偹院事十三年擢御前大臣暫攝鑾儀衛事詔赴金川軍營查閱沿途驛站諭曰旺扎爾抵營應在經畧大學士傅恒抵營後四五日其時一切布置大局已定碉卡路徑著領旺扎爾随便閲看此際滿兵有交鋒克捷之事亦令目覩一二次經畧大學士抵營宣布恩諭賞賚兵丁軍心如何奮勉傅爾丹等情形何似旺扎爾還朝俱可面陳朕得備悉軍營大槩尋回京奏劾山西境内惟腰站有馬数匹尚未設定軍臺亦無馬匹呈騐聞道貟葛爾福在平定州及過彼處並未謀面大站馬匹均疲痩不堪平陽府衝途既無馬匹亦未見該守令等奉㫖切責廵撫阿里衮並議處葛爾福等十四年金川畨酋乞降奉㫖議叙尋晉領侍衛内大臣十五年縂管圓眀園八旗官兵及上駟院健鋭營事十七年御史周燾宻奏通倉米石虧缺上命旺扎爾同協辦大學士吏部尚書梁詩正刑部尚書劉統勲盤騐尋䟽劾中西二倉米虧請将監督革審南倉米數無虧惟贏餘米石不歸本厫請将監督察議再臣查過各厫因盤騐數目不符復詳加丈量但丈量之法較之盤騐米數相懸約皆一二百石若以此為凖米少丈多即信為多則有闗倉儲米多丈少即信為少亦難定監督情罪之輕重現值闗放俸米請交户部将丈過厫座開支可得虧缺實數並請派大臣監放以杜那移掩飾之弊倉場侍郎漫無覺察請交部察議從之二十七年轉理藩院左侍郎尋卒諭曰旺扎爾内廷行走宣力多年今閒溘逝深為憫惻加恩賞銀二千兩辦理䘮事著綿徳阿哥帶侍衛十人往奠茶酒應得䘏典察例具奏尋賜祭𦵏如例諡恪慎子博靈阿乾隆二十七年龍世職授三等侍衛三十六年擢御前頭等侍衛署鑲黄旗䝉古副都統尋授正藍旗蒙古副都統三十七年二月随征金川八月大兵由墨壟溝進攻甲爾木乗夜霧奪石卡甚多扼賊來路博靈阿在事有功十二月授領隊大臣三十八年正月大兵攻納圍山梁博靈阿同和隆武由東溝進攻與賊相持㑹侍衛綏庫等由納圍納扎木中間小路進兵賊出碉抵拒博靈阿與綏庫合兵擊斃賊人甚衆三月隨大兵分攻當噶爾拉博靈阿力撲賊碉頦受鎗傷尋卒事聞諭曰副都統博靈阿自派往軍營頗加奮勉今因傷亡故情殊可憫念伊父子俱属出力著将伊兄子内選擇一人繼博靈阿為子仍加恩贈都統銜尋賞䘏如陣亡例議給騎都尉加一雲騎尉并原有之世職為一等輕車都尉以嗣子濟魯穆圖襲金川平命圖形紫光閣贊曰由納圍前擊當噶拉禦賊鏖戰英風颯㳫摧碉越險因傷殞生不忝祖父晉職加旌納穆扎爾納穆扎爾䝉古正白旗人姓圖伯特父拉錫官領侍衞内大臣有𫝊納穆扎爾初由閒散授藍翎侍衛洊授頭等侍衛乾隆十年六月授正白旗滿洲副都統十二月調鑲藍旗十三年九月署縂管内務府大臣尋遷户部侍郎十五年調工部時西藏郡王珠爾墨特納木扎勒謀叛伏誅詔納穆扎爾偕都統班第往駐藏十六年三月奏言藏中增噶卜倫辦事現充噶卜倫者一係公爵餘俱扎薩克台吉今増設之員請並給扎薩克銜以符體制從之尋命増設卡倫兵十一月奏自喀喇烏蘇至那克桑喀勒占庫車等處増䑓八飭扎薩克台吉等廵察十七年正月又奏凖噶爾通藏隘口係阿里那克桑騰格里淖爾阿哈雅克四路現俱設卡倫嚴防從前凖夷犯藏係繞勒底雅路而入此路現亦派兵防守報聞十九年命赴北路軍營管理新降杜爾伯特及輝特和碩特等㳺牧二十年三月奏言厄魯特人赴京領俸餉值夏令恐不耐炎暑請加體恤命副都統多爾濟運應支俸餉至張家口給之四月以輝特和碩特生計維艱奏給糧畜接濟上允所請五月同喀爾喀親王得親扎布由塔宻爾安置輝特和碩特十三旗人於固爾班舒魯克都爾伯特十旗人於鄂爾海西喇烏蘇分界駐牧設卡倫防範六月都爾伯特遭霜雪傷畜奏給口糧賜米五百石賑之時将軍班第奏輝特降酋阿睦爾撒納謀據凖噶爾状命納穆扎爾偕􅄁贊大臣阿蘭泰等駐防烏里雅蘇台十月調户部侍郎二十一年六月奏言伊克眀安台吉徳濟特同逆賊阿睦爾撒納叛遁請以其属分給輝特不從叛之扎薩克阿卜達什等及喀爾喀又言和托輝特郡王青滚雜卜自軍營叛遁臣恐衆喀爾喀被煽徧諭所部示以利害上奨之尋授㕘贊大臣赴将軍成衮扎布營領索倫兵追剿青滚雜卜十一月擒之于杭哈将噶斯諭曰納穆扎爾帶兵追擒一聞逆賊所在疾馳前進立為掩獲甚為勇往出力着加恩封一等伯賜號勤襄十二月命赴喀爾喀車臣汗部查緝齊木齊格特人之肆竊者尋于呼倫貝爾之西墨爾根哈瑪爾俱就擒上嘉其功下部議叙二十二年二月授工部尚書兼鑲紅旗滿洲都統四月命仍赴北路駐科布多辦事五月移駐布延圖十月署定邊左副将軍二十三年二月奏言烏梁海部衆歸誠其酋察達克等授内大臣散秩大臣諸職所属鄂拓克内有得木齊收楞額辧理庶務請将得木齊改佐領收楞額改驍騎校給頂帶嵗貢貂皮送烏里雅蘇台以恩賞縀布給之三月納穆扎爾回京六月命赴西路軍營授㕘贊大臣署将軍印務七月授靖逆将軍由庫車㑹剿回酋霍集占等九月阿克蘇城歸附詔納穆扎爾同㕘贊大臣三泰往㑹定邊将軍兆恵軍兆恵遣副都統愛隆阿侍衛奎瑪岱以兵來迎納穆扎爾路遣愛隆阿先還而自與三泰奎瑪岱乗夜進騎兵僅二百餘遇賊三千被圍力戰矢盡死之三泰奎瑪岱俱歿于陣事聞諭曰靖逆将軍納穆扎爾㕘贊大臣三泰巴圖魯侍衛奎瑪岱奉命前赴軍營輕装進發所領兵丁僅二百餘人設令先到大營固可㑹同進勦即後至一二日亦與愛隆阿一同駐守乃星夜趲行之時適遇賊衆猖獗伊等並不肯于中途退避自全惟知直前衝擊以致授命捐軀忠毅之氣深可嘉憫納穆扎爾著贈公爵三泰贈子爵俱世襲㒺替奎瑪岱照竒徹布例賞給世職應得䘏典仍著該部察例具奏尋賜祭𦵏如例諡武毅入祀昭忠祠贈三等義烈公以子保寜襲二十四年回部平上追悼納穆扎爾及三泰為國盡莭與前西藏殉莭之都統傅清左都御史拉布敦伊犁殉節之将軍班第㕘贊大臣鄂容安比烈御製雙義詩紀其事詩曰雙忠昔集事雙烈能忘身兹作雙義詩其故得細陳曰納穆扎爾曽贊北路軍奮勇翦逆賊封伯酬其勲副都統三泰英氣頗超人均御前侍衛素悉厥忠純兆恵富徳輩從戎久効勤欲代俾将母二臣被選掄去嵗黒水役固守遣索倫致信愛隆阿權退催後援可支百日間速進莫逡巡将軍及㕘贊輕進徒俱焚當待師並來何慮狂狙狺爾時二臣者馳驛往軍門過愛隆阿營却近黒水濵所遣人未遇礟聲前忽聞知賊與我戰聞戰恥退奔徒携百餘騎赴義命同捐凶信驛遞來痛淚傷心魂使早知拒守退俟熊羆羣同進可樹功何致均沉淪即先至一日合兆恵軍屯亦可旋今嵗奚煩以身狥不前復不後此實若有神富徳自和闐重至黒水津葉爾竒木降諸事粗處分痛念我将士沙場化為燐黄頭雖不偹掩骼權為墳猿鶴昔属幻邱隴今可循因以此事奏西望揮淚頻豐碑旌墓門千秋西海垠捐軀固臣節在爾非所論在予則何忍此恨終當伸夷考六人跡事異心同均與國休戚共寧止曰藎臣史筆多訛𫝊永言𫝊其真尋命圗形紫光閣御製贊曰我懐賢勞命将往代正值黒水猖獗鼠軰以二百衆䧟萬賊中因縁徇節勇濟以忠長子保寧襲公爵官伊犁将軍第三子保泰官察哈爾都統駐藏辦事夢麟夢麟䝉古正白旗人姓西嚕特乾隆十年進士改庶吉士散館授檢討十五年三月充日講起居注官五月遷侍講充廣西鄉試副考官七月遷祭酒九月授督河南學政十六年授内閣學士十七年六月湖北奸民馬朝柱據羅田縣之天堂寨謀不軌聞捕散匿夢麟以河南商城縣界連羅田親往查拿上嘉之七月丁憂十一月䟽言商城界江楚峻嶺深巖奸匪易藏原設把縂不足防守請酌撥守偹増兵廵哨勅下河南廵撫議准撥襄城營守偹一兵百移駐歸汝寧營轄十八年二月署户部侍郎六月充江南鄉試正考官九月提督江蘇學政二十年五月授工部侍郎回京十月署兵部十二月兼蒙古鑲白旗副都統二十一年在軍機處學習行走二十二年河督白鍾山奏請開浚荆山橋河命夢麟馳勘即速興工三月諭曰自去年孫家集奪溜荆山橋一帶淤沙為患不細今夢麟與白鍾山等䟽瀹並施乃得剋期成功甚属可嘉交部議叙尋議加一級時上南廵閱視河工以六塘河以下積潦桃宿諸縣窪地成巨浸分𣲖夢麟率道㕔等勘辦尋奏六塘河上承駱馬湖水至清河以下分為兩𣲖由武障義澤等河入潮河歸海長三百餘里間淤數十處致水停積已委募急挑南北兩堰及去年水壊宿遷堰工並各處缺口俱加脩築宿遷桃源清河等縣積水酌開溝十五設涵洞五建閘四以資宣洩疏入報聞六月奏荆山橋善後事宜四條一銅沛廰北岸丁家樓漫灘黄水滙入蘇家閘直衝荆山橋河身淤墊最易令河貟築壩填堵一荆山橋河道在洞沛邳睢境者分四汛歸河務同知専管飭州縣協辧一自微山湖口至荆山橋下㳺之王母山紆長灣曲灘嘴更多每嵗霜降後䟽掘一嚴禁居民于灣處圈築堰壩捕魚渡口接築馬頭阻塞河路得㫖如所議行先是山東廵撫鶴年奏金鄉等縣水患命侍郎裘曰脩偕夢麟往來相度辦理至是合䟽言金鄉魚䑓濟寧久為微山湖水淹浸當籌分洩之路韓庄閘南有伊家河至江南梁旺城入運久經淤塞今議開濬俾積水乗勢東注消涸自易從之七月兩江縂督尹繼善奏沂水散漫入運為沛邑害又奏湖口閘應行事宜夢麟奉㫖與在工諸臣分任責成九月合奏淮徐水患頻仍必原委並治支幹兼脩庶可甦積困而收實效山東江南接壤諸湖已相機辦理惟沂河自盧口旁洩没民田阻運河當築壩堵截使不得入運湖流可全力下注此籌酌沂水不礙微山等湖入河歸海之情形也六塘河在駱馬湖下游為洩沂水要道北岸宿遷陵溝地方有水口桃源有港河俱注沭陽縣之沭河入漣河歸海並加濬分路宣通六塘河歸海口門間有淺阻亦為䟽治此籌酌六塘河分𨗳沂水入海之情形也河南夏邑永城等縣水由睢河下注江南洪澤湖出清口㑹黄入海近年河道多淤董家溝等處尤宜急濬至各水既歸洪澤出口務湏通暢查清口束水二壩業遵㫖拆卸其各閘收束時口門亦酌量加寛此籌酌睢河入湖並湖水入海之情形也以上皆先興舉其餘因地制宜逐一經理得㫖覧奏頗得要領宜和衷共濟不可草率塞責是月調户部侍郎十二月各工先後告竣議叙加二級二十三年四月調工部七月署翰林院掌院學士八月卒賜𦵏祭如例恩格圖恩格圖科爾沁䝉古人世居哈達太祖髙皇帝時挈家来歸𨽻正紅旗授佐領與㕘領阿岱駐伊蘭布里庫防㳺牧䝉古率十人廵􅗲海濵遇敵百人追斬幾盡聞眀兵千餘犯海州率兵三百馳擊敗之天聪三年從太宗文皇帝征明北京明總兵滿桂等赴援恩格圖首先奮擊斬獲有功尋攻遵化破山嶺敵營入大安口皆先衆軍力戰叙功授三等輕車都尉世職擢兵部承政考滿晉職二等尋授本旗䝉古都統崇徳元年随武英郡王阿濟格征眀同阿岱等分率甲士設伏眀三屯營守備率兵來探伏發圍之盡殱焉又與都統譚泰等征朝鮮竪雲梯登城朝鮮兵潰走盡收其牲畜貨賄以歸先是随武英郡王征明戰松山正藍正白鑲白三旗營汛錯亂恩格圖隠匿不舉及還師又不俟後隊齊至先行出邊猝遇敵兵戰敗遁走至是論罪罰鍰奪其俘獲明年又議征朝鮮時恩格圖在軍營方食奉召不即赴且約束不嚴致厮卒妄行為朝鮮兵所殺論鞭百詔免之罰贖以懲三年随貝勒岳託征明宻雲距墻子嶺五里恩格圖率兵先諸軍越髙峯入邊破敵五年隨鄭親王濟爾哈朗等圍錦州松山城松山兵夜襲我營恩格圖率本旗兵敗之六年從上征眀明縂督洪承疇合軍十三萬赴援松山上分遣諸将受方畧令恩格圖與前鋒統領武拜進繫之及諸軍並進恩格圖詐言未奉上命不至期㑹之地将戰猶披氊而坐遇敵不前既旋師論罪應禠職仍輸罰鍰得㫖寛免罰如律部臣又論攻明錦州時明兵出犯鑲黄旗汛貝子尼堪失察我兵之未戰者恩格圖坐徇情附和議罰上以諸王貝勒及大臣等久駐錦州素著勞績凡罪概予寛宥恩格圖亦免議旋命更畨駐守松山順治元年隨睿親王多爾衮入山海闗敗流賊李自成二年叙功晉一等輕車都尉兼一雲騎尉復隨豫親王多鐸破流賊于潼闗賊夜犯正黄旗營恩格圖率兵往援俘斬甚衆師旋賊分兵躡我後恩格圖殿四戰皆捷進征江南敗明将鄭鴻逵于𤓰洲随端重親王博洛下浙江至錢塘大破敵衆獲舟三十五旋攻克嘉興府與都統瑪喇希圍崑山縣城内敵兵迎戰恩格圖連擊敗之遂取其城三年晉爵三等男随征福建同都統漢岱招降一府五縣又同副都統鄂羅色臣招降一府八縣遣兵助大軍擊敗偽帥吴凱兵攻克賊衆萬餘於分水闗進勦海賊七千於南靖縣皆有功四年晉二等男尋晉一等五年征叛鎮金聲桓卒于軍子鄂爾濟圖尚幼以兄子克什圖襲爵遇恩詔晉三等子十八年分授克什圖騎都尉職命鄂爾濟圖襲一等男衮楚克固英衮楚克固英姓和勒依忒初為察哈爾宰桑太宗文皇帝天聪六年察哈爾林丹汗聞我軍往征竄奔土黙特部其舊部人衆相繼潰散八年上征明大同凱旋出尚方堡二十里駐營衮楚克固英率二百餘人同察哈爾宰桑徳伸濟旺等来歸分𨽻八旗袞楚克固英𨽻正紅旗䝉古任㕘領崇徳元年五月予一等男爵二年七月縁事降一等輕車都尉三年随貝勒岳託征眀由墻子嶺入邊駐營眀兵自宻雲來犯将薄我營袞楚克固英偕衆郤避論罪應黜革籍沒上念其率衆投誠功免罪止籍其牲畜分給察喀爾大臣六年大軍圍明錦州明縂督洪承疇率衆赴援自松山迎戰衮椘克固英整兵破敵陣尋敵騎突犯鑲紅旗汛地袞椘克固英同副都統察哈爾模海擊郤之八年九月随鄭親王濟爾哈朗征明寧逺連敗敵馬歩兵順治元年大軍入山海闗擊流賊李自成袞椘克固英與都統恩格圖合兵奮戰敗賊二年叙功晉三等男三年隨肅親王豪格征流賊張獻忠屡戰克捷六年隨英親王阿濟格討大同叛鎮姜瓖師薄城賊出犯土黙特營衮楚克固英趨援力戰中流矢没於陣賜䘏如例晉爵二等男世襲罔替以其子垂本襲綽拜綽拜姓巴林世居葉赫太祖高皇帝時來歸𨽻鑲白旗蒙古尋管佐領事太宗文皇帝天聰八年以克副任使予騎都尉世職九年隨䕶軍統領烏巴海征瓦爾喀部深入額赫庫倫及額埒岳索地俘獲甚衆晉世職為三等輕車都尉崇徳三年兼任户部理事官是年随睿親王多爾袞征明由青山口入邊屡擊敗敵衆越燕京畧山東直抵濟南敵騎千餘拒戰綽拜與都統和洛輝先衆奮擊遂克其城七年随肅親王豪格圍明縂督洪承疇於松山承疇遣兵乗夜越壕犯鑲黄旗營綽拜擊卻之並墮壕殱殪無算八年考滿晉二等輕車都尉順治元年隨大軍入山海闗敗流賊李自成二年叙功晉一等輕車都尉四年考滿加一雲騎尉五年授㕘領随征南大将軍譚泰討江西叛鎮金聲桓克復饒州南昌凱旋賚白金千兩馬四十匹七年任倉場侍郎八年二月授鑲白旗䝉古副都統三月兼工部侍郎五月遷本旗都統三遇恩詔晉爵至一等男九年八月以疾解任十二月卒賜祭𦵏如例子奇黙格圖襲職阿爾沙瑚兄子果勒沁阿爾沙瑚姓斡三初為察哈爾林丹汗䕶衛天聪六年太宗文皇帝征察哈爾林丹汗竄奔唐古特阿爾沙瑚率所属四十餘户渡哈屯河來歸𨽻䝉古鑲白旗予三等輕車都尉世職崇徳三年十月随貝勒岳託征眀由墻予嶺入邊屡敗敵乗勝至山東攻克濟南等城眀年三月師還出邊擊敗太平寨敵兵五年同前鋒統領席特庫征索倫部斬獲甚衆生擒部長博木博果爾及其妻子六年大兵圍明錦州有松山馬兵刦我紅衣礟阿爾沙瑚力戰却之又敗明縂督洪承疇三營歩兵論功晉世職一等輕車都尉八年卒以兄子果勒沁襲果勒沁初任佐領崇徳元年從上征朝鮮偕侍衛二十人敗敵兵於桃山村順治元年随睿親王多爾袞入山海闗擊敗流賊李自成叙功加一雲騎尉尋授䕶軍㕘領五年擢鑲白旗蒙古副都統屡遇恩詔晉爵至二等男十七年擢本旗都統時明桂王朱由榔竄􅃡甸李定國白文選分據孟艮木邦假擁戴由榔為名復集潰衆出掠上命内大臣公愛星阿為定西将軍率師㑹平西王吴三桂往征而以果勒沁及都統卓羅遜塔副之且敕諭愛星阿凡軍中機冝皆與果勒沁㑹議而行十八年九月果勒沁随愛星阿至大理秣馬逾月出騰越取道南甸隴川猛夘十一月師次木邦偵知定國走景線而文選遁據錫箔江愛星阿令果勒沁及遜塔䕶軍統領畢力克圖斐雅斯哈前鋒統領伯勒赫圖等簡精銳疾馳三百餘里至江濱文選已毁橋遁走茶山縂兵官馬寧追至猛養文選窮蹙歸降大軍次舊挽坡􅃡人以由榔獻乃旋軍康熙三年叙功晉爵一等男兼一雲騎尉尋列議政大臣八年調本旗滿洲都統九年二月卒賜祭𦵏如典禮謚襄敏子鄂爾輝襲爵沙理布沙理布姓博爾濟吉特太宗文皇帝崇徳二年自察哈爾率丁壯百餘來歸使轄之為佐領𨽻鑲白旗䝉古尋授一等侍衛任㕘領順治五年擢鑲白旗䝉古副都統九年遷本旗都統遇恩詔予雲騎尉世職時明桂王朱由榔将李定國劉文秀盧眀臣馮雙禮等侵掠湖廣十年十二月沙理布奉命同寧南大将軍辰泰統兵鎮守湖南十二年文秀明臣雙禮等以衆數萬分犯岳州武昌沙理布同䕶軍統領蘇克薩哈設伏邀擊大敗之文秀等復犯常徳戰船千餘蔽江而下沙理布指揮軍士截擊六戰皆捷縱火焚其船斬獲無算眀臣赴水死雙禮被創遁文秀走桃源沙理布與䕶軍統領都爾徳等協力追勦文秀竄貴州十五年隨信郡王多尼征雲南由榔與定國敗竄永昌十六年四月我師克永昌渡潞江定國據磨盤山拒戰我前鋒統領白爾赫圖等領衆敗之破其木柵斬其将竇名望沙理布乗勝先驅遇賊伏力戰殁於陣十七年二月䘮還遣官致奠賜祭葬如典禮諡襄壯晉騎都尉世職子伊勒篤襲後以襲次滿停襲乾隆十五年詔核八旗世職之以死事䘏叙而襲次已滿者特予恩騎尉世襲罔替復以沙理布之曽孫徳明襲弼喇什弼喇什䝉古喀喇沁人姓博爾濟吉特初為其部台吉太宗文皇帝天聪二年二月弼喇什從其父貝勒布延懇請歸附八月上統大軍往征察哈爾召蒙古諸部各領所属人衆以從于是駐營綽囉郭勒弼喇什随其汗拉斯喀布率部衆來朝貢財幣駝馬上悉却之賜宴并甲胄遂從上擊敗察哈爾部衆於錫爾哈錫伯圖俘獲甚衆尋随貝勒岳託往征棟奎與㕘領薩木什喀佐領布顔䕶軍校博爾輝等奮勇力戰追斬蒙古拜思噶勒扎穆等百餘人尋率所部人户之在喀喇沁者來歸𨽻䝉古鑲紅旗尚多羅郡王旋命貝勒代善贍養之九年弼喇什以貧乏入奏上加恩賚予而以不能愛養逺人諭責貝勒焉崇徳元年叙功予三等子爵世襲罔替三年奉敕往明張家口宣諭互市六年復奉命如初時諸王大臣各遣其屬隨往互市有郡王阿達禮属下和託者盜禮親王代善白金三百守者執之以告弼喇什付從者監視和託遁去弼喇什以防守䟽忽論罰如例順治三年弼喇什隨豫親王多鐸往追叛逃䝉古騰機斯等於喀爾喀道卒子多爾濟襲後遇恩詔晉爵二等子阿敏道阿敏道䝉古鑲紅旗人姓圖爾格斯世居察哈爾父阿吉斯官員外即康熙三十五年随西路大軍剿噶爾丹以糧運不繼士苦飢阿吉斯言於衆曰我等官兵世受國恩甘斃道路誓圖竭力前進衆皆諾及擊敗噶爾丹於昭莫多凱旋奉㫖嘉奨交部議叙給雲騎尉世職卒阿敏道襲雍正三年授三等侍衛四年授二等侍衛九年四月率巴爾呼兵百由固爾班賽堪赴巴里坤軍營十一月復命偕侍讀學士查克丹調喀爾喀兵三千率之往尋偕䕶軍統領費雅思哈赴烏爾輝音扎罕練兵乾隆元年以凖噶爾乞和撤大軍阿敏道還京三年授鑲藍旗察哈爾縂管十九年二月率察哈爾兵随大軍收烏梁海十二月加副都統銜二十年正月遷所獲包沁人等于齊拉罕五月大軍定伊犁定北将軍班第奏𣲖管理䑓站八月逆賊阿睦爾撒納叛阿巴噶斯哈丹附逆肆掠臺站衝斷阿敏道輒續以兵㑹定西将軍永常自木壘退駐烏爾圖布拉克撤阿敏道還事聞革永常職以䇿楞代之詔阿敏道率精騎馳赴伊犁偵班第信䇿楞等未即遣上詰責之十一月偕喀爾喀郡王品級車木椘克扎布等以兵千往捕阿巴噶斯哈丹賊衆二十一年六月授鑲藍旗蒙古副都統時回酋波羅泥都霍集占有異志定邊右副将軍兆恵察知之遣阿敏道率索倫兵百及厄魯特兵三千赴葉爾羗哈什哈爾撫諭且宻飭擒致之閏九月至庫車回衆閉城不納阿敏道斬㳺騎四十餘圍之回衆詭告曰厄魯特向係仇敵恐為所害若撤還即降阿敏道允撤厄魯特兵入城止索倫百人從或慮危險阿敏道荅曰我等招撫回衆惟期于國家大事有濟何暇他慮遂為霍集占所覊二十二年諭霍集占送阿敏道還不從謀加害庫車伯克呼岱巴爾氏以告阿敏道謀脫歸不克死之從者百人皆遇害事聞諭照陣亡例議䘏加世職為騎都尉兼一雲騎尉賜祭𦵏入祀昭忠祠子彭蘇克燕丕爾襲世職欽定八旗通志卷一百八十七
