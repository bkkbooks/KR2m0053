body:
  text: 欽定四庫全書欽定八旗通志卷一百三十八人物志十八大臣傳四滿洲鑲黄旗四武華善直拉哈逹穆篤額楚鄂善陳秉顧八代佟國綱佟國維華善華善滿洲鑲黄旗人姓伊爾根覺羅世居佛阿拉祖塞楞鄂哈思瑚國初來歸華善其五世孫也順治元年任筆帖式二年授雲騎尉五年遷刑部主事九年恩詔加騎都尉世職十年遷本部郎中十三年八月隨寜海大將軍伊爾徳剿舟山海㓂陳六御阮思華善率所部舟師直前䧟陣身被數創力戰馘斬二人部卒繼進遂敗賊舟山平敘功加一雲騎尉康熙元年同吏部郎中陳一炳赴廣東安輯降卒三年疏報偽都督杜輝率偽官百餘員兵二千餘來獻南澳地偽將軍張雄鄭夢蛟偽監軍莊夢侯等各繳偽闗防牌劄投誠給口糧願歸農者安置從戎者入伍章下所司五年授兵部督捕理事官七年遷太僕寺卿八年授内宏文院學士九年五月命廵撫甘肅疏言寜州地䖏邉鄙土瘠賦重近因歳歉民逃地荒請將本州錢糧照真寧縣一例徴收其逃荒地丁豁免從之十二年三月疏言鞏昌所屬西和禮縣去嵗疫癘盛行牛驢倒斃亦衆若待請始賑恐播種愆期災民殘喘難待已發帑銀買耕牛給籽種計口量賑部議華善違例擅發應令賠補詔優免十三年冬陜西提督王輔臣叛於寜羌十四年正月叛黨趙士昇等犯鞏昌蘭州勢孤華善檄甘肅提督張勇總兵孫思克王進寳來援未至蘭州逰擊董正已應賊城且䧟官民固請華善以身免作恢復計二月華善乃與按察使伊圖自蘭城出西渡河至永昌與勇進寳㑹議進取策疏請賜􅃯假勇事權得便宜行事詔授勇靖逆將軍華善偕勇進寳出蘭州臨鞏路令寧夏鎮陳福出靖逺路思克防大靖蘆塘索橋等處各分兵進嗣進寳先渡河東華善慮其軍孤遣逰擊黄鋐守備李守魁率騎進援至新城進寳與賊戰鋐等從旁掩擊陣斬數百級擒賊將李廷玉郭虎三月進圍蘭州時叛將潘瑀據洮州曽文耀據河州厄魯特逹爾加岱成等乘隙入寇肆掠人口牛畜四月華善乃留進寳伊圖圍蘭州親統兵赴臨洮勦禦遣土司楊朝樑攻洮州副將楊三元攻河州並逐厄魯特人衆出境瑀文耀遁走遂復河洮二城河西乃寜閏五月華善領兵圍鞏昌賊困突出我兵奮擊多斬獲賊敗入城輔臣遣將李國樑援鞏華善發兵邀截掘濠塹於鞏城斷賊出路六月賊降復鞏昌同日進寳復蘭州諸疏入上嘉勞之先是厄魯特入犯河州漢回民被誘出闗華善患之遣官招撫七月三元招回馬嘉錦馬應才等萬餘人復其業十五年三月華善與勇議伏羌為秦鞏要路恐賊襲取遣逰擊安守正劉廷棟等防守未㡬賊來襲㐲羌官兵剿禦擒斬無數諭㫖加奬八月疏言臨鞏二府地瘠民貧自逆賊蹂躪土荒民散請免十四年逋賦銀七萬八千八百三十餘两糧六萬八百餘石其已輸者抵十五年正賦下部議行九月以病乞休得㫖地方初定正資料理著殚心供職無以病免尋卒于官長子瑪思泰襲職卒襲除額楚額楚滿洲鑲黄旗人先世居薩哈勒察姓烏扎拉世祖章皇帝順治二年内大臣和洛輝統師駐防西安道經河南明總兵劉洪起既降復叛據西平縣城和洛輝督兵樹雲梯攻剿䕶軍昂海先登額楚繼之遂克其城敘功予雲騎尉世職尋授佐領屢遇恩詔晋世職至三等輕車都尉十五年從大軍取貴州明年凱旋隨副都統噶楚哈瑪爾賽至荆州聞海賊鄭成功犯江寜由大江趨援噶楚哈令額楚為鑲黄旗營總合江寜駐防兵擊敗賊衆敘功晋世職二等輕車都尉尋授駐防江寜恊領擢副都統聖祖仁皇帝康熙七年授江寜將軍十三年逆藩耿精忠叛應呉三桂遣賊將由福建䧟江西廣信建昌饒州等府徽州及婺源績溪等縣俱從逆額楚奉詔同署副都統宗室巴爾堪率兵往剿逆賊萬餘于績溪縣西北迎戰額楚督兵奮擊陣斬偽副將一及賊衆三千餘擒從逆把總劉成功斬之復績溪遂復徽州府城賊將據休寜縣之新嶺倚險立寨額楚分步兵左右擊騎兵由中路進攻破鹿角毁木柵斬賊五百餘乘勝進剿至婺源賊皆潰遁婺源亦復額楚奉詔征饒州撃賊於樂平縣之叚家村斬二千餘級進薄樂平東門前鋒叅領巴特瑪樹雲梯登城賊兵五百餘由西南二門出遁額楚遣兵追襲擒斬過半進次鄱陽縣大磯莊賊由雲髻峰下來犯額楚遣巴特瑪等列陣奮戰賊敗潰從逆饒州叅將陳九傑時為偽都督棄城遁入鄱陽湖額楚撫定城中人民賊旋由湖中駕船三百來犯額楚督兵射殪三百餘賊以礟擊毁賊十餘船餘賊俱竄遁十四年四月額楚率兵剿賊萬年縣至石頭街渡口逺望隔㟁分布賊營十數處賊船二百餘横踞渡口額楚令歩兵直趨渡口集戰艦發鎗礮宻令騎兵乘夜由上流潜渡繞出賊營後水陸夾擊殪賊數千盡獲賊船陳九傑就擒伏誅餘賊棄城遁賊之在安仁者皆乘船遁我兵追及之賊以風逆泊船拒戰旋自焚其船棄貲械奔竄萬年安仁二縣悉平五月剿賊弋陽賊將蔣得􅀈等率賊五萬于城北樹木柵十有五又以五千餘賊分踞西崗橋額楚分兵為二攻毁木柵奪取西崗橋賊卻入城我兵登城攻克擒斬偽逰擊張三竒偽都司張明徳胡中甲等先後擊斬及溺水死者二萬餘賊十五年簡親王喇布自江寜移師南昌額楚奉詔叅贊軍務呉三桂賊將髙大傑等突䧟吉安據之額楚同將軍哈勒哈齊率兵攻克外城與賊相持賊將馬寳韓大任引賊數萬來援額楚迎戰於螺子山等處屢失利㑹安親王岳樂自袁州進征湖南圍長沙馬寳聞急趨救吉安賊衆食盡乘夜出南門奔逸上遣侍即班第察奏螺子山戰敗罪以額楚不能舉發首先敗走之人又賊遁不行追擊罪無可諉應罷任革世職命以世職仍領江寜兵立功贖罪率兵赴廣東十六年九月賊將胡國柱馬寳率賊萬餘犯韶州額楚師次蓮花山賊逼營額楚督兵禦擊㑹將軍莾吉圖自城中出兵夾撃大敗賊賊由㡌峰山遁追擊至樂昌仁化詔莾吉圖進駐梧州額楚守韶州十二月諭曰韶州地屬𦂳要一切軍務額楚若啟簡親王轉奏恐多遲誤其令額楚以江寜將軍印統轄兵馬事許専奏十七年詔同都統勒貝率兵進駐梧州㕘賛莾吉圖軍務時廣東總兵祖澤清復叛自髙州勾結山海諸賊犯電白額楚奉詔㑹剿擊却賊衆進駐藤縣遇大疫士馬多病斃額楚以聞命别擇要地移駐額楚旋疏言呉逆據鬰林容縣潯州聲言三路來犯藤縣軍營未可動移但士馬缺乏應請増遣以備剿禦上命其仍駐藤縣諭將軍舒恕於南雄韶州兵内擇有馬者發額楚軍未至賊犯藤縣額楚同廵撫傅宏烈率兵禦擊失利退保梧州賊䧟藤縣十八年二月賊將呉世琮犯梧州額楚同莾吉圖傅宏烈擊卻之賊併力犯南寜城中食盡時降鎮馬承䕃守南寜遣人告急額楚與莾吉圖舒恕勒貝分兵四路趨援擊賊於新邨西山之巔斬殪無算世琮負創奔逸南寜圍觧額楚駐守永淳十九年六月額楚奉詔還江寜二十年十月卒於任以兄子格克里之次子富努保襲二等輕車都尉世職富努保尋卒以格克里長子法保襲初格克里於康熙十四年以六品官從大軍征廣東剿叛鎮馬雄偽將軍董重民等於電白縣戰歿於陣二十五年議卹予雲騎尉世職以法保併襲合已襲之職為一等輕車都尉陳秉直陳秉直滿洲鑲黄旗人姓陳佳順治六年由貢生授山東平隂知縣七年土賊周魁軒犯境陳秉直撃斬其衆獲馬驘三百餘賊不敢犯十年遷山東膠萊運判十二年山東廵撫耿淳奉詔保舉知府陳秉直以薦授福建泉州知府十六年遷山東鹽運使明年遷山西河東道康熙三年擢河南按察使定例按察使承問案件舛錯二十次以上者革職二十次以下者降罰有差六年陳秉直承問四十六案内舛錯九案例止罰俸刑部遺漏總數咨吏部議處奉㫖按察使係承理一省刑名今這九件即舛錯九次殊屬溺職陳秉直著革職嗣陳秉直訴於刑部部臣以遺漏縂數檢舉得㫖復職八年補陜西按察使九年調江南按察使十二年遷浙江布政使十三年六月大軍剿逆藩耿精忠戸部侍郎逹都赴浙督餉㑹巡撫田逢吉以疾觧任授逹都為廵撫逹都疏薦陳秉直年壯才優民心悦服堪任廵撫部議不准特㫖允陳秉直陞浙江廵撫逹都仍以原銜督餉時方停杭州織造併入江蘇二局十二月疏言絲利産自浙江奏銷絲價較江蘇减省若停止織造不特機張朽廢可惜且工匠失業將來復設所費尤多請仍留杭州織造衙門將裁减縀八千餘疋於江蘇杭三處均减户部議不准諭㑹同工部内務府再議從之十四年二月疏言楚浙等省軍興需餉浩繁而地經蹂􅏳額賦難徴當此籌餉之際在外除武臣及佐雜微員照常支俸外其督撫司道府㕔州縣等官常俸全捐充餉俟事平支給軍需不無少濟下部議行時精忠逆黨據餘姚大嵐山閏五月遣都司王得福等剿之擒斬賊渠魯朝全等十餘人降偽總督禇楚白等復遣投誠偽總兵韓六合剿賊首何應龍邵天衢等斬獲甚衆先後招撫偽官汪飛龍陳渭等一百五十餘人兵五千餘得㫖嘉奬十七年以裁省各項錢糧十萬七千有餘議敘加兵部右侍郎留廵撫任十八年三月自陳議以浮躁應降三級調用奉㫖陳秉直著降三級仍留原任七月疏言杭屬田少山多恃以養生辦課者惟桑麻竹木今駐防旗厮皆有額設錢糧草料乃以打柴為名四出戕伐致小民俯仰無資臣每加嚴禁但以罪止鞭責無所畏忌請􅃯部禁止犯者嚴加治罪議從之八月以吏科給事中李宗孔劾陳秉直察吏無能賢否混淆觧任二十五年十二月卒拉哈逹拉哈逹滿洲鑲黄旗人姓鈕祜禄尚書車爾格第五子也初任侍衛兄法固逹襲父騎都尉兼雲騎尉世職世祖章皇帝順治七年因其祖額亦都以來世有勞績晉三等輕車都尉尋卒拉哈逹襲職两遇恩詔晋至一等輕車都尉十七年授兵部督捕侍即十八年擢工部尚書列議政大臣聖祖仁皇帝康熙三年授鑲黄旗䝉古都統八年調本旗滿洲都統十三年四月授鎮東將軍駐防兖州時逆藩耿精忠叛應呉三桂犯浙江拉哈逹甫至兖州奉諭曰杭州為浙江要地以爾素有才能遣往暫理杭州將軍事務並諭以浙江一應軍務與平南將軍賚塔總督李之芳等公同商酌毋分彼此七月賊自温處犯金華拉哈逹遣副都統沃伸偕副將陳世凱等迎撃大敗之擒斬偽都督閆標等及其偽官百七十餘兵七千餘時賊分犯黄巖台州寜波紹興俱騷動提督塞伯哩屢疏告急上既命康親王傑書為大將軍統師赴浙貝子傅喇塔為寜海將軍分兵赴台州援剿復詔康親王未至之先援剿事宜俱聼賚塔與拉哈逹商酌以行及康親王至金華上命副都統雅塔哩署杭州將軍拉哈逹仍以都統赴康親王軍前㕘贊軍務十四年五月拉哈逹分兵擊賊於處州復松陽宣平二縣十五年九月隨康親王進征福建耿精忠乞降時海賊鄭錦踞漳泉興化賊將許耀率賊三萬逼福州營於烏龍江之南石門山枕峯山拉哈逹率兵渡江奮撃奪其營十四追奔四十餘里擒偽總兵四偽副將以下三十餘人十二月授寜海將軍十六年同賚塔進剿興化連破賊營二十六斬偽總督趙徳勝復興化偽總兵郭維藩以仙逰降許耀竄泉州據城拒守拉哈逹乘夜進圍之漏未盡梯城入斬許耀及偽總兵偽副將等泉州平遂復漳州及海澄等十縣沿途招降賊將四百二十二員兵四千一百七十名移師征潮州叛鎮劉進忠迎降拉哈逹還福州十七年四月鄭錦之偽總統劉國軒䧟平和犯海澄拉哈逹遣副都統瑚圖等擊賊於碧落泉潛石山河灣及紅蕉寨葛布山皆有斬獲賊斷江東橋及長泰同安諸小徑我師不能進海澄遂䧟副都統穆赫林提督叚應舉死之漳平同安恵安相繼失守賊復犯泉州詔責拉哈逹不急援海澄俟事平論罪嚴趣其禦賊泉州拉哈逹欲由長泰大路進值江水泛漲泥濘難行時侍讀學士李光地丁憂家居遣人來迎請為嚮導拉哈逹遂率兵由南靖之峯蒼嶺朝天嶺至漳平招降在城之偽總兵黄瑞標張勝等及偽官二十餘兵四百有竒復踰石柱嶺趨安溪進薄泉州賊乃竄遁十八年拉哈逹遣逰擊趙雲剿賊於泉州之臭塗澳斬五百餘級焚其寨先是賊逼泉州於沿海東石地築城掘壕扼金門厦門要害至是拉哈逹遣副都統沃伸率兵攻之水陸並進冐鎗礟登城斬偽㕘將逰擊數員擒偽總兵陳深及賊衆百六十餘人餘賊溺死者無算獲其偽印及船礟器械十九年拉哈逹同廵撫呉興祚由同安港口進至潯尾招降賊寨分兵徑渡拉哈逹居中呉興祚由左總兵王英由右直趨厦門而賚塔與總督姚啟聖提督萬正色楊捷總兵黄大來等皆如期至三面合擊賊不能支遂克之隨遣兵趨金門偽總兵呉國俊等迎降鄭錦遁䑓灣詔康親王還京拉哈逹與副都統馬思文率兵千人守福州二十一年八月上以進取臺灣有緑旗兵及駐防漢軍足用滿洲兵可撤命拉哈逹率之還京二十二年王大臣等議拉哈逹當賊䧟海澄時不能救援應降世職為三等輕車都尉罷都統上念其隨康親王平閩有勞績且久任都統能稱其職寛免革任二十四年以老病致仕四十二年七月卒年七十有七予祭塟如例子博雅柱襲武穆篤武穆篤滿洲鑲黄旗人姓富蔡祖穆哈連世居葉赫天聰時來歸武穆篤初任䕶軍㕘領順治十五年從信郡王多尼征明桂王朱由榔由貴州趨雲南擊敗其將李成蛟於凉水井李定國於雙河口進至盧噶定國列象陣拒戰敗之十六年追至磨盤山又敗之以功授雲騎尉十八年從靖東將軍濟什哈剿山東土㓂于七至棲霞縣之鋸齒山圍其寨敗賊黨俞三吕四竒等于七竄入海康熙八年擢前鋒叅領十三年三月逆藩耿精忠據福建反詔以貝子傅喇塔為寜海將軍武穆篤為前鋒統領從征師由浙江進十一月至台州賊將曽實陳理列營黄瑞山欲犯天台武穆篤偕副都統吉爾塔布提督塞白理奮擊敗之至蒲塘敗偽總兵呉臣又敗偽將軍楊徳十四年八月大兵至凉蓬隘口殺賊伏兵幾半賊夜遁武穆篤與提督叚應舉䕶軍統領費雅思哈等追擊於黄土嶺賊潰退據黄巖縣圍其城賊帥曽飬性遁偽官二十兵三千迎降遂復黄巖九月次上塘嶺飬性紏偽都督馬士玉張廣文等水陸兵三萬拒戰武穆篤統前鋒衝擊大敗之身被數創擒斬偽官六十餘獲甲械無算復太平樂清青田三縣及大荆磐石二衛十五年八月大兵自處州啟行至雲和縣石塘嶺賊據險守其地當温州入閩之衝傅喇塔檄副都統沃申總兵陳世凱奪其山寨武穆篤與費雅思哈四等塔布囊和濟格爾道員姚啟聖統應援兵乘大霧直搗賊巢十七年七月創發卒於軍䘮至京遣領侍衛内大臣奠茶酒十九年八月上以武穆篤効力行間勞績茂著特命照實授前鋒統領議卹晋騎都尉世職賜祭葬謚襄壯雍正七年入祀昭忠祠子綳色孫富昌遞襲騎都尉乾隆十七年勅查陣亡世職官襲次已完者子孫特予恩騎尉准襲一次以武穆篤曽孫禄全襲鄂善鄂善滿洲鑲黄旗人姓納喇順治十五年任三等侍衛聖祖仁皇帝康熙三年遷二等侍衛七年九月授秘書院學士八年九月遷副都御史九年閏二月疏言近例官員罰俸事在陞任前者罰已陞之俸事在降調前者計未降之俸追銀均此處分而先後輕重互異請􅃯議畫一俾永逺遵循疏下吏部議仍復世祖章皇帝時舊制無論陞降並罰現任俸其裁缺給假丁憂者俟補官扣抵免行追四月授陜西廵撫十一年四月擢山西陕西總督尋以山西歸廵撫統轄改卾善為陜西總督十二年九月改舊駐貴陽之雲貴總督専轄貴州増設雲南總督調卾善任之十二月至湖廣值逆藩呉三桂反雲貴已陷賊詔鄂善暫留湖廣與總督蔡毓榮共籌勦禦十三年正月上聞賊逼沅州卾善與蔡毓榮及提督桑額皆在荆州諭趣桑額赴援改卾善雲貴總督隨大軍進征二月桑額率兵渡江賊已自沅州進䧟常徳澧州桑額仍退守荆州尋部議蔡毓榮失守所屬城邑應革職鄂善不能遵㫖籌畫機宜應降五級調用均得㫖從寛留任載罪圖功四月鄂善疏言標下需兵惟自陕擕至健丁一百五十名堪以入伍現在召募罕應請於附近湖廣各省抽調步兵一千四百名陜西省抽調馬兵四百五十名成標兵二千長驅進剿并請以陕西安逺營㕘將張夢椒為臣標中軍副將陕西提標守偹李國梁為臣標左營逰擊陕西督標千總馮徳昌為臣標中營守偹俾收得人之效疏下部議附近湖廣各省步兵俱當防守汛地陕西馬兵本省需用皆未便抽調仍令卾善在湖北酌募其標下中軍副將等官已由部選授張夢椒等應留陜西原任六月鄂善復疏言欲募有隣里保結之兵漫無一應由楚人止就本省之募不就滇黔之募也其自願投充者慮係逃人或為奸宄無益有害萬不敢招轉盻入秋大軍進剿湖南招徠降兵即可撥補營伍請􅃯領兵王將軍等於恢復之日陸續驗發充額疏下部議從之十二月陜西提督王輔臣叛於寜羌州秦州平涼俱䧟詔鄂善同副都統穆舒渾等率現駐襄陽之滿洲䝉古兵移守興安漢中十四年正月鄂善至西安總督哈占以省㑹兵少奏留鄂善與穆舒渾率所擕之兵恊守尋詔移守榆林延安哈占兩奏止之六月遣營總鄂爾博什邁圖等援郃陽擊敗叛將李師膺於鳯凰山獲偽劄旗礟八月上諭責哈占曰前以延安為諸路要衝曽命鄂善駐守哈占奏留之西安致延安䧟沒迨將軍畢力克圖恢復延安又命鄂善速往安撫殘黎保固疆土乃至今未行皆由哈占但知有西安置他處於度外也是月鄂善移駐延安尋奏招回復業人民六萬二千餘得㫖嘉奬十六年六月率兵分守棧道以東郿縣各山口七月賊由洪河口至塘坊廟列衆二千來犯鄂善令右翼兵擊賊山澗左翼兵擊賊河岸而自領中營兵踴躍直前仰攻山梁斬馘百餘賊自相蹂踐越山而遁是月授甘肅廵撫十七年七月以失察布政使伊圖侵蝕採買價值部議革職詔從寛留任先是正月清水縣民控告知縣佟國臣苛歛各欵鄂善令按察使舒椒布勘鞫舒椒布檄秦州知州王之鯨就近質訊延擱數月至是清水縣民赴京叩閽上遣吏部郎中丹岱等往鞏昌察審得實十八年正月還奏佟國臣革職計賍論絞舒椒布王之鯨懸案逾限擬降調鄂善於所屬貪賍不先察究及告發仍不審劾已經革職擬革任得㫖從寛與舒椒布並任事如故五月因計典察議才力不及無級可降罷任還京尋卒顧八代顧八代滿洲鑲黄旗人姓伊爾根覺羅父顧納禪太宗文皇帝天聰九年由閑㪚隨征明大同攻小石城先登賜號巴圖魯予騎都尉世職尋任㕘領世祖章皇帝遣師入山海闗及平定陕西河南江南浙江顧納禪皆在事有功晋職三等輕車都尉世襲㒺替卒子顧蘇襲遇恩詔晋二等輕車都尉尋卒子佛岳襲顧八代為顧納禪次子順治十六年以廕生充䕶軍隨征雲南得功牌二凱旋授户部筆帖式尋因佛岳卒無子襲二等輕車都尉世職擢任吏部文選司郎中康熙十四年聖祖仁皇帝御試旗員列第一改翰林院侍講學士㑹逆藩呉三桂踞湖南遣賊將掠廣東廣西鎮南將軍莽依圖由江西進定廣東駐韶州十六年六月上命顧八代𫝊諭莽依圖規復廣西方畧即留營隨征顧八代既至莽依圖進駐梧州屢擊敗賊將呉世琮等十八年京察掌院學士拉薩哩葉方藹以顧八代隨征稱職政勤才長注考大學士索額圖改注浮躁傳㫖下部察議吏部言浮躁例應降調顧八代有世職令隨旗行走尋莽依圖疏言顧八代襄辦軍務竭誠奮勉三載以來運籌决勝動合機宜請留軍前委署副都統㕘贊軍務得㫖仍以原銜隨征十九年廣西既定莽依圖卒於軍顧八代隨平南大將軍賚塔進征二十年師至雲南顧八代同㕘贊大臣穆占等與勇畧將軍趙良棟定攻取策賚塔從之遂殄滅逆孽呉世璠平雲南凱旋補侍講學士二十三年入直上書房二十四年擢内閣學士充平定三逆方畧副總裁官二十五年充經筵講官明年授禮部侍郎二十八年擢本部尚書三十二年九月奉㫖顧八代因在内廷供奉有年屢加擢用洊至尚書今觀其人不宜部院著革任以世職隨旗行走仍直内廷三十七年因疾乞休四十七年十二月卒世祖憲皇帝雍正四年諭曰原任禮部尚書顧八代品行端方學術醇正昔䝉皇考簡用服官有年當征剿呉逆時以學士協賛軍務從將軍莽依圖賚塔等克復粤西滇南勞績茂著備承恩眷且深知品學優長足為模範特命為朕兄弟之師朕自幼與共朝夕講論忠孝大義研究經書至理肫誠周至獲益良多嗣以公事詿誤罷職仍在内廷課讀數載抱疾閒居戊子冬物故朕親臨其䘮並遣人為之經理殯葬本欲陳情於皇考之前求加恩賜䘏值聖體違和不敢凟奏迄今回憶當年誦讀情景宛然如昨老成舊學時眷於懐應優加贈卹以展朕篤念師資酬奬前勞之意尋允部議復禮部尚書銜加贈太傅予祭塟如典禮謚文端立碑墓道上復念其子孫甚貧恩賞銀一萬兩八年七月命建賢良祠於京師特諭應入祀者滿洲大臣五人大學士圖海都統賚塔次即顧八代及尚書瑪爾漢總河齊蘇勒先是顧八代乞休後子顧儼襲因銷恩詔所加之職改三等輕車都尉雍正三年由㕘領擢任鑲黄旗漢軍副都統見大臣表顧儼之子顧琮别有𫝊佟國綱佟國綱滿洲鑲黄旗人姓佟佳輕車都尉佟飬正之孫都統佟圖賴長子也初𨽻漢軍管佐領任一等侍衛聖祖仁皇帝康熙元年襲父三等子尋任内大臣十四年察哈爾布爾尼作亂上命撫逺大將軍信郡王鄂扎統師討之授國綱安北將軍往鎮宣府賊平乃還十六年因佟圖賴為孝康章皇后之父追贈一等公以國綱襲二十年授鑲黄旗漢軍都統二十二年充教習鳥鎗兵丁總管二十七年疏言臣先世因在撫順倡率明人來歸故𨽻漢軍其初實係滿洲曽䝉太祖髙皇帝諭令與佟佳氏之巴都哩䝉阿圖諸大臣考訂支派敘明族譜今請仍歸滿洲事下部議以佟姓官職衆多應仍留漢軍現任國綱本支准改入滿洲是年俄羅斯遣使費耀多囉等至尼布楚請定邉界命國綱同内大臣索額圖等往議既抵色稜額因噶爾丹侵掠喀爾喀召還令遣人曉諭費耀多囉等緩期得其復書奏聞明年四月同索額圖等往尼布楚定議以額爾固訥河及格爾必齊河為界立碑垂示久逺二十九年七月命撫逺大將軍裕親王福全征噶爾丹以國綱㕘賛軍務八月朔師次烏蘭布通噶爾丹於隔岸林中卧駝於前而兵伏其後國綱率兵奮勇進擊賊突發鳥鎗國綱中鎗遂歿於陣櫬至京命皇子及内大臣侍衛迎奠茶酒及將葬諭領侍衛内大臣曰佟國綱為國効力忽爾陣亡每一思之痛不能已必須一視其䘮朕心庶㡬少慰國綱弟國維及諸臣叩阻再三乃命諸皇子及上三旗大臣侍衛部院大臣皆往送賜祭葬如典禮謚忠勇以長子鄂倫岱襲一等公其陣亡所得之騎都尉又一雲騎尉世職以第三子夸岱襲世宗憲皇帝時贈國綱太傅入祀昭忠祠並勅立家廟佟國維佟國維滿洲鑲黄旗人都統佟圖賴次子順治十七年任一等侍衛聖祖仁皇帝康熙九年授内大臣十二年冬逆藩呉三桂反其子呉應熊居京師明年春逆黨謀為不軌以紅㡌為號國維發其事奉命率侍衛三十人至大佛寺擒縛十數人械送刑部鞫實伏法二十一年授領侍衛内大臣尋列議政大臣二十八年因國維爲孝懿仁皇后之父封一等公二十九年七月大軍征噶爾丹命國維􅄁贊軍務八月次烏蘭布通國維與兄都統佟國綱並率左翼兵進擊國綱循河岸戰歿國維由山腰遶賊後擊之潰遁師還以噶爾丹既敗不率兵追剿部議革職得㫖罷議政降四級留任三十五年上親征噶爾丹國維從甫出獨石口以駝載遲滯疎於管攝自請處分上貰之三十六年復從上征噶爾丹至寜夏聞噶爾丹竄死上回鑾敘前隨征功復所降四級四十三年詔賑山東流民之就食京師者以國維同内大臣明珠等監賑尋以年老觧任四十八年正月召國維與諸大臣並集𫝊㫖詰問曰前因有人為皇太子條奏朕降硃筆諭㫖示諸大臣爾曽奏稱皇上辦事精明天下人無不知䁱斷無錯誤之處此事於聖躬闗繫甚大若日後易於措處祈速賜睿斷或日後難於措處亦祈速賜睿斷總之將原定主意熟慮施行為善爾係觧任之人此事與爾無涉乃身先衆人啟奏是何心哉國維奏曰臣雖以庸愚觧任䝉皇恩優厚因聖體違和冀望速愈故奏請速定其事今奉明㫖詢問實無詞以對奏入奉諭曰將來誠如爾言朕有難於措處自不必言衆人亦將謂爾所奏果是矣若朕無難措處到彼時自知之耳人其可懐私仇而妄言乎明日復諭曰爾年老之人屢向朕所遣人云每日祝天求佛願皇上萬夀朕思自五帝以至今日尚未及萬載朕何敢侈望及此此皆以荒誕不實之言欺朕朕不信也爾既有祈望朕躬易於措處之言嗣後惟篤念朕躬不於諸皇子中結為黨羽謂皆係吾君之子一體㸔視不有所依附而䧟害其餘即俾朕躬易於措處之要務也二月又諭曰爾前此易於措處難於措處等語竟似捨命陳奏爾乃國家大臣榮貴極矣年已老邁子孫甚多若欲捨命則見朕之病勢漸増即當親身入内奏云醫生等既可入内我又何不可入親身領醫生診㸔晝夜侍奉湯藥使朕疾得痊方可稱為實心乃漠不相闗並未嘗念及朕躬朕仍賴皇太子及諸皇子晝夜侍奉率領醫人診㸔進藥調理仰䝉上天䕶佑今已痊愈由是觀之爾並非實心乃置身兩可意謂皇上若獲痊愈我仍沾禄食茍且度日倘有不測則皇太子將何所往必合我言矣此非爾之本意乎皇太子允礽前染瘋疾朕為國家而拘禁之後詳察被人鎮魘之處將鎮魘物俱令掘去其事乃明今調理痊愈始行釋放朕將此情由俱曽硃筆書出詳悉諭諸大臣今譬有人因染瘋狂持刀砍人安可不行拘執若已痊愈又安可不行釋放而必欲殺之乎朕拘執皇太子時並無他意殊不知爾之肆出大言激烈陳奏者係何心也諸大臣之情状朕已知之不過碌碌素餐全無知識一聞爾所奏之言衆皆恐懼欲立允禩為皇太子而列名保奏矣朕臨御既久安享太平並無難處之事臣庶託賴朕躬亦各安逸得所今因爾所奏之言及羣下小人就中揑造言詞所以大臣侍衛官員等俱終日憂慮若無生路者此事闗係甚重亂臣賊子自古有之今觀衆人情狀果中爾所奏日後難於措處之言矣爾聞外邉匪類妄言理應禁止爾乃倡造大言驚駭衆心有是理乎爾既捨命陳奏必有確見其何以令朕躬及皇太子諸皇子志意安舒不至殷憂亦可明白陳奏朕特降此㫖非欲誅爾也因衆皆憂慮須事明後衆心乃可定爾當體念朕心若懐藏私意别有作為天必誅之國維奏曰臣前所奏之言俱載在檔案今並不推諉衆人因臣大言妄奏皆畏懼列名致貽聖體及皇太子諸皇子之憂臣罪莫大皇上雖憐憫不誅臣何顔生斯世祈速賜誅戮以示衆奏入復奉諭曰朕今特為安撫羣下降㫖申明非欲有所誅戮也爾前啟奏時外間匪類不知其故因盛讚爾云如此方謂之國家大臣不懼死亾敢行陳奏今爾之情形畢露人將謂爾為何如人耶洵可耻之極矣朕若誅爾似類沽名朕今斷不誅爾其坦懐勿懼但不可卸責於朕躬觀爾迷妄之狀其亦被人鎮魘歟五十八年正月卒賜祭葬如例世宗憲皇帝雍正元年贈太傅諡端純子隆科多襲一等公爵欽定八旗通志卷一百三十八
