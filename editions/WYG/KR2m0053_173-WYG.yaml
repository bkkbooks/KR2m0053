body:
  text: 人物志三十九大臣傳二十五滿洲正白旗四阿宻逹碩岱邁圖罕即坦哈伊巴逹塔瑪爾漢覺羅舒恕費揚古桑格邁圖邁圖滿洲正白旗人姓佟佳父烏進世居哈逹國初來歸任典儀邁圖初任二等侍衛順治五年從征山東破賊首蒋静剛於鋸齒山岩十五年隨信郡王多尼征明桂王朱由榔至貴州連破其将李成蛟於凉水井李定國於雙河口定國走魯噶立寨以拒復擊破之康熈十三年逆藩耿精忠叛邁圖隨康親王傑書征之授營總十四年大軍自仙居趨黄岩至半山嶺偽都督劉秉仁糾衆萬餘來拒邁圖偕副都統吉勒塔布等奮擊斬賊二千餘十五年克建陽縣闗廂敗偽總兵王姓三千餘衆十六年正月海逆鄭錦偽總督趙得勝偽将軍何祐等擁衆四萬據興化於城西北太平山屯營二十六伏賊萬餘於白茅山為援邁圖隨寧海将軍拉哈逹先攻其伏賊敗追至太平山盡破其營斬得勝於陣復興化祐退據泉州二月進擊㧞之賊敗遁十七年隨平南将軍賚塔擊鄭逆偽将軍劉國軒吳淑等於蜈蚣山破其營七復長泰縣二十五年正月授正白旗蒙古副都統兼佐領五月叙功授雲騎尉二十九年六月署前鋒統領隨裕親王福全剿厄魯特噶爾丹於烏䦨布通陣殁部議給祭𦵏如例特命加祭一次諡忠毅子瑪喇襲雲騎尉三十年追叙邁圖功加世職為三等輕車都尉郎坦郎坦滿洲正白旗人姓𤓰勒佳内大臣武拜之子也年十四任三等侍衛世祖章皇帝順治六年遷二等侍衛隨端重親王博洛征叛鎮姜瓖師次渾源州城圍之賊渡濠來犯郎坦射其酋貫心而殪遂敗賊衆師還擢一等侍衛八年以武拜附和内大臣洛什博爾輝等造言搆釁獲罪並革郎坦任九年恩授三等侍衛尋復一等侍衛聖祖仁皇帝康熈二年代父管佐領遷䕶軍恭領隨定西将軍圖海征流賊李來亨等於湖廣茅麓山同䕶軍恭領葉楚赫深入賊巢擒偽官十一人四年襲父一等子爵仍任一等侍衛十二年京城有邪教陳三道等設壇惑衆郎坦率諸侍衛逮繫之十三年奉命行邊捕獲逃盜張飛腿等於板城十九年擢正白旗䝉古副都統明年調本旗滿洲副都統二十一年八月上以俄羅斯屢擾黒龍江邊境久據雅克薩地命郎坦同副都統朋春率兵沿黒龍江行獵覘雅克薩情形相度水陸往來逺近十二月疏言俄羅斯久據雅克薩恃有木城若發兵三千擕紅衣礮二十具即可攻取陸行自興安嶺以往雖無險山而林木叢雜途徑仄隘冬雪之時沙結堅氷夏日遇雨泥深淤阻惟輕装可行水程自雅克薩還至愛滹城於黒龍江順流行船僅須半月觀兩岸悉可縴挽若逆流行船約須三月視從陸倍期於運糧饟軍器輜重為便現有大船四十小船二十六宜増造小船五十餘奏入詔寧古塔将軍巴海等造船偹礮擇要地駐守暫緩進兵二十二年二月擢郎坦前鋒統領九月命往㑹黒龍江将軍薩布素酌議駐兵額素哩事宜還奏額素哩今年七月即經霜雪來年宜乘春和時以寧古塔諸處兵分為三班更番往駐上以更番戍守非久長策不允行二十三年甄别八旗管兵官員之弗勝任者罷郎坦前鋒統領以子爵隨旗行走二十四年正月都統朋春同臺灣投誠左都督何祐率兵征雅克薩副都統班逹爾沙䕶軍統領佟寳為叅贊郎坦以副都統銜隨征師既行上遣侍衛往諭朋春曰朕以仁治天下素不嗜殺爾其嚴諭将士毋違朕㫖以我兵馬精强器械堅利俄羅斯勢不能敵必獻地歸誠爾時勿殺一人俾還故土宣朕柔逺至意五月師薄雅克薩城朋春班逹爾沙等軍其城南何祐等集戰船於城東南潜進紅衣礟於城北與副都統温岱等将夹攻之先積柴城下為焚城状其城長額里克舍乞降郎坦宣恩諭宥其罪額里克舍稽顙謝引六百餘人徙去其願來内附者巴什里等四十五人挈妻子及前此被掠之索倫逹呼爾户口百餘俱隨大将軍還奉詔安挿内地毁其木城郎坦與議政王大臣等㑹議鎮守事宜議於墨爾根築城駐兵是年冬俄羅斯復據雅克薩築城明年二月命同班達爾沙擕礮率藤牌兵百往會黒龍江将軍薩布素進征旋奉詔以郎坦諳悉地形即令恭贊軍務六月師薄其城鑿壕築壘四面列圍賊出拒阻擊敗之斬額里克舍尋以俄羅斯察罕汗遣使詣闕謝罪請釋雅克薩圍上命以别遣使來議地界詔釋圍退駐查克丹待之尋還駐寧古塔明年擢郎坦正白旗蒙古都統二十八年俄羅斯議界使人費耀多羅等至尼布楚上遣領侍衛内大臣索額圖等同郎坦往議以格爾必齊河及額爾固訥河為界毁雅克薩城令其人徙去是年調正白旗滿洲都統二十九年古北口外突聚羣盜刦掠屯荘郎坦奉命偕侍衛赫濟爾亨等督石匣城古北口官兵捕剿出喜峯口追及之龍鬚門盜以鳥鎗抗禦逃據山頂擲石拒阻傷害緑旗兵三人從役一人赫濟爾亨率兵發矢殪十餘盜復分兵山坡繞後截擊斬四十餘盜無一脱者郎坦還奏羣盜逞兇傷害兵丁侍衛及衆官兵奮勇擊斬状下部議卹賞紀録有差三十一年正月上以噶爾丹肆掠喀爾喀逼我邊境授郎坦安北将軍駐防大同二月疏請出邊駐喀喇穆倫以偵賊情申嚴邊偹詔暫駐歸化城七月命同副都統碩鼐恭領素丹等勘閲寧夏延綏西寧沿邊進兵道路以聞三十一年擢領侍衛内大臣兼火器營總管列議政大臣三十二年授昭武将軍率兵駐甘州八月擒獲哈宻回人之輸税厄魯特者訊知噶爾丹所在請於來春率兵進剿疏下王大臣等議以噶爾丹已遣使乞宥罪止之三十三年三月上以寧夏近賀蘭山為邊隘要地諭郎坦率兵移駐於甘肅提督孫思克分偵噶爾丹及其侄䇿旺喇布坦搆釁事遇有邊警會啇禦剿七月上聞噶爾丹将逼圖拉諭郎坦熟練邊情移兵圖拉禦剿尋以圖拉無警還京仍任領侍衛内大臣預議政三十四年五月命往盛京察視邊隘至八虎口疾劇遣太醫往視六月卒年六十有二櫬至通州遣侍衛四人奠茶酒賜祭𦵏如例子拉忻襲爵阿宻達阿宻逹滿洲正白旗人姓他塔喇順治四年授三等侍衛洊遷至一等侍衛兼佐領九年遷䕶軍恭領十四年擢正白旗滿洲副都統康熈八年遷䕶軍統領十年擢領侍衛内大臣明年列議政大臣十三年三月襄陽總兵楊來嘉附逆藩吳三桂據榖城叛河北總兵蔡禄初與來嘉並為海賊鄭成功禆将成功死先後率衆來降並授左都督擢任總兵至是聨結謀叛蔡禄造鳥鎗購驘馬令兵丁以捕魚為名演習披甲適奉使侍衛觀寳偵得其状以奏聖祖仁皇帝命阿宻逹率䕶軍恭領八員每佐領下䕶軍一名馳赴懐慶察視阿宻逹至禄不出迎集礮手以拒阿宻逹直入其廨擒蔡禄及其家口以奏上手勅諭之曰爾行未踰旬克濟厥事以遏亂萌朕心深為嘉悦但人命至重須研審得實方可正法毋得株連無辜至所俘人口散給士卒宜重賞被傷者以示鼓勵阿宻逹遵㫖鞫訊得蔡禄與楊來嘉遣人往來潜謀投順吳逆且與子侄家人私議若大兵來懐慶閉城以拒突圍往據太行山情状奏聞命将蔡禄及子姪同謀者俱正法時耿精忠亦叛上慮江寧兵單撥滿洲兵千人駐守以阿宻逹總統授為揚威将軍五月命以所統兵習水戰九月授簡親王喇布揚威大将軍駐江寧以阿宻達為叅贊十一月陕西提督王輔臣叛命阿宻逹率兵赴西安明年正月仍授揚威将軍印以副都統鄂克濟哈覺羅夸岱恭贊軍務率所部兵及西安駐防兵之半赴蘭州剿禦大将軍貝勒洞鄂以西安兵單奏留阿宻逹駐守上以蘭州闗係𦂳要仍諭遵前㫖行二月王輔臣據平凉蘭州諸路皆陷賊洞鄂自率兵赴秦州奏令阿宻達剿平涼賊未至聞賊據涇州分兵遣鄂克濟哈剿擊斬偽總兵衛民譽獲馬匹器械復其城五月復遣兵敗賊於寧州之東山斬馘八百餘復寧州並得㫖嘉奨先是阿宻達與平涼賊戰失利退駐涇州至是聞洞鄂與總兵孫思克等復秦州疏言逆賊王輔臣悉鋭集平涼令秦州遁回之賊又至慶陽羣盜依山結壘與為聲援臣以孤軍前進恐未易奏功乞敕大将軍洞鄂酌量留兵駐守秦州餘兵盡㑹平涼並命提督陳福及鄂爾多斯兵急取定邊固原以遏賊慶陽之援臣率兵出白水由平涼東面進取庶易為力上曰兵貴神速機不可失平涼逆賊聞大兵克取秦州正在驚擾我兵宜乘勝長驅攻取平涼将軍阿宻達逗遛不前殊屬非宜前已増調太原兵近總督周有徳又運送紅衣礮爾等當速取平涼八月洞鄂兵亦至平涼命阿宻逹叅贊軍務速行進攻是月分兵三隊進剿擊敗賊兵萬餘追奔至城外賊據山險拒守㑹總兵孫思克由西路入與大兵合剿屢敗賊衆十二月阿宻達偕孫思克等分兵赴城西掘壕守䕶以防賊逸偽總兵蔡元糾衆四千由山梁擕火器來犯我軍擊敗之克取山梁擒斬甚多十五年二月上以貝勒洞鄂等屯兵日久未能滅賊命大學士圖海代為大将軍阿宻達與洞鄂等並任恭贊五月我兵分兩翼由虎山墩進攻阿宻達與孫思克督兵大敗賊衆斬偽總兵二六月王輔臣降平涼平十七年二月圖海請三路進兵分剿叛附呉逆諸賊阿宻達偕副都統覺和託四川總督周有徳等率兵至秦嶺與賊戰斬馘三百撫定諸賊巢尋命赴湖南安親王岳樂軍營協剿逆孽呉世璠十八年九月大兵克武岡州諭阿宻逹與安親王酌議軍營留兵事宜十一月奏言軍營滿洲兵每佐領酌留十二人防守其每佐領八人前鋒二百人䕶軍每佐領三人驍騎並漢軍每佐領五人俱遣還上命阿宻達率之回京十九年十月授正白旗䝉古都統二十一年七月以三逆平定特遣大臣頒賞厄魯特喀爾喀諸部阿宻逹預焉二十二年三月兵部議阿宻達在平涼攻戰時我兵退回不能禁阻應盡革職任上曰阿宻逹為人頗優且多勞績其令降五級從寛留都統任二十六年八月調本旗滿洲都統二十八年十月復授領侍衛内大臣二十九年六月噶爾丹與喀爾喀搆釁侵我外藩䝉古烏珠穆沁界上命阿宻達往領副都統噶爾瑪等所轄弁兵偵探賊情具奏七月以裕親王福全為撫逺大将軍阿宻逹與公蘇努等為恭贊是月抵岡阿與喀爾瑪軍合復會尚書阿喇尼軍於葫蘆谷爾河以噶爾丹所在入奏上以噶爾丹退回二宿之地似欲潛遁命阿宻逹速選精壮馬兵率之前往便宜行事時濟隆胡土克圖使人至軍營阿宻逹遣郎中哈爾吉布等與偕至噶爾丹所未㡬噶爾丹亦遣尊多伊格蘇爾為使具述所以入汛為索喀爾喀讐人弗敢秋毫侵犯阿宻逹以聞且奏賊衆内逼状遂與蘇努會合裕親王軍分大軍為三蘇努等率左右兩翼阿宻逹與王等統中軍以進八月朔至烏蘭布通噶爾丹依山列陣卧駱駝於林外拒河以守我左翼兵由山腰衝入大軍臨之大敗其衆㑹日暮收兵次日剿殪餘㓂賊堅壁據險遣使矢誓請和尋自錫喇穆稜河載水横渡大磧山夜遁去十一月師回部議王大臣調度乖方既經戰勝不能乘機剿滅賊敗又不即追殺以致窮㓂遁走貽誤軍機又未經請㫖擅率大軍内徙福全應革王爵阿宻逹與蘇努等皆革職上念我軍已擊敗厄魯特王大臣槩從寛免革爵職阿宻達降四級留任三十一年二月以年老乞休允之三十五年二月上親征噶爾丹阿宻逹奏請隨征與康親王傑書管理鑲藍旗營務五月駕至克嚕倫河復奏請効力𨽻左翼大軍尋揀選精鋭追剿噶爾丹以阿宻達暫充将軍率留後之滿洲兵及緑營歩兵赴克勒和碩既至命兼轄留駐兵尋以撤兵回京四十八年五月卒碩岱子海綬碩岱滿洲正白旗人姓喜塔臘先世居尼雅滿山有昻郭都哩巴顔者當太祖髙皇帝時來歸碩岱其五世孫也世祖章皇帝順治六年以二等侍衛兼恭領隨睿親王多爾衮討大同叛鎮姜瓖復渾源州九年三月上幸南苑碩岱與一等伯巴什泰及蒙古侍衛素尼並從素尼猝㧞刀殺巴什泰碩岱即舉所執長鎗擊素尼立仆擒之置諸法上嘉其勇敢予騎都尉兼一雲騎尉世職十三年授䕶軍恭領十五年隨征南将軍卓卜特由廣西征貴州時明桂王朱由榔之将李定國李成蛟等分據黔西要隘碩岱率兵渡盤江擊敗成蛟於涼水井復擊敗定國於雙河口十六年大軍取雲南追剿定國至騰越碩岱遇伏於磨盤山力戰克㨗十八年山東土賊于七據棲霞縣之岠嵎山作亂碩岱隨靖東将軍濟什哈往剿斬獲賊黨無算于七竄入海聖祖仁皇帝康熙六年擢前鋒統領十二年冬逆藩呉三桂反上以荆州地當衝要命碩岱領前鋒兵先諸軍進發固守荆州俟諸軍繼至再進據常徳以遏賊勢十三年正月碩岱至荆州二月賊陷常徳及澧州犯宜昌時順承郡王勒爾錦統大軍至碩岱奉詔恭贊軍務同䕶軍統領額斯泰等援宜昌擊郤賊将劉之復陶繼智等十四年十二月諭責順承郡王駐荆州久未能恢復湖南郡邑罷碩岱叅贊十六年安親王岳樂自江西進圍長沙碩岱隨征南将軍穆占都統宜里布等移兵助攻取道岳州韶岡河遇賊艘四十餘運糧至擊敗之進圍長沙數月賊負固不下詔穆占移師規取衡州碩岱隨穆占征茶陵賊棄城遁攸縣碩岱同宜里布率兵追剿賊據河岸拒戰我兵奮擊賊潰奔遂復攸縣十七年隨穆占恢復郴州永興桂陽興寧還駐郴州賊将馬寳胡國柱等犯永興碩岱率兵往援戰失利都統宜里布䕶軍統領哈克三殁於陣副都統託岱宜思孝等還郴州碩岱棄營入永興城穆占奏劾之詔免逮繫令立功贖罪時賊勢猖獗屢逼犯永興碩岱同前鋒統領薩克察等嬰城固守逾三月吴三桂死賊乃遁去十八年大軍復寳慶武岡撤八旗兵三之一還京碩岱同内大臣阿宻逹等率以行既至京追議永興戰敗罪罷任革世職二十九年起為正白旗滿洲副都統三十年隨定北将軍瓦岱征噶爾丹至克魯倫河偵賊衆逺去旋師三十四年十月同都統噶爾瑪率兵駐大同三十五年正月上親征噶爾丹統師出中路以撫逺大将軍費揚古出西路費揚古請選大同所駐䕶軍二百八十人為前鋒詔以碩岱署前鋒統領率之往四月上統師擊噶爾丹於克嚕倫河噶爾丹聞風驚遁時碩岱與費揚古並在圖拉上度賊必遁往西路先傳諭費揚古邀賊費揚古偵賊至特埒爾濟口令碩岱率前鋒挑戰且戰且郤誘至昭莫多合兵奮擊斬獲無算噶爾丹引數騎逺竄師旋擢碩岱内大臣叙功予雲騎尉世職上念其勞績素著命復前所革世職晉為三等輕車都尉五十一年卒年八十有四賜祭𦵏如例以其第三子納丹珠襲職第四子海綬於雍正七年以䕶軍校隨大将軍傅爾丹征凖噶爾九年擊賊於和通呼爾哈諾爾力戰陣亡議卹予雲騎尉世職子沙通阿襲伊巴罕伊巴罕滿洲正白旗人姓格濟勒世居雅蘭其伯父舒球於天聰八年隨副都統薩木什喀巴竒蘭征黑龍江有功予騎都尉世職卒無子以伊巴罕襲伊巴罕初授三等侍衛旋任刑部郎中兼佐領順治七年九月三遇恩詔晉世職至二等輕車都尉十八年署恭領隨定西将軍愛星阿征明桂王朱由榔至緬甸緬人執由榔以獻康熙十四年任䕶軍恭領隨定南将軍希爾根討逆藩耿精忠至江西偽都督易天錫據建昌府城伊巴罕率兵進攻大敗賊既而撫州賊悉趨援建昌伊巴罕奮戰郤賊復擊敗偽将軍卲連登偽總兵李荗珠等拒戰賊衆尋與䕶軍統領桑額攻復新昌縣擒斬偽總兵朱一典及賊黨無算十五年擢正白旗蒙古副都統隨安親王岳樂討逆藩吴三桂擊敗其偽将軍夏國相等復萍鄉縣十八年隨征南将軍穆占討三桂孫世璠自衡州進征武岡賊将吴國貴以二萬衆據楓木嶺拒戰伊巴罕率本旗兵奮擊大破之十九年擢前鋒統領二十二年遷盛京将軍二十四年召還仍授前鋒統領二十五年叙前隨征江西湖廣軍功晉世職為一等輕車都尉兼一雲騎尉後以年老乞休尋卒子蘇完住改襲三等輕車都尉逹哈塔達哈塔滿洲正白旗人姓佟佳世祖章皇帝順治九年繙譯進士分内院學習十三年授國史院侍讀聖祖仁皇帝康熙三年遷宏文院侍讀學士九年十月定内閣翰林院官制令以内閣撰文中書舍人兼太常寺卿十年正月改翰林院侍讀學士十二年十月遷太僕寺卿十四年洊遷太常寺卿通政使司通政使都察院左副都御史十六年五月授兵部督捕左侍郎十八年三月京察論才力不及降調十月左都御史魏象樞疏薦逹哈塔清謹自守四壁蕭然人有醇樸之風行無奔競之習疏下部議候四品卿録用二十二年九月補通政使司左通政十月仍授兵部督捕左侍郎二十三年八月諭之曰朕以爾素有操守簡任侍郎近見督捕事務尚多弊端旗下人不無怨言若但守己亷潔而凡事不能肅清究竟何益嗣後爾當嚴率屬員勉力釐剔以副委任之意九月調吏部左侍郎管右侍郎事十二月擢左都御史二十四年四月九卿以靖海将軍施琅奏定沿海各港門出洋船數人數及閩海闗監督伍什巴奏給貿易捕魚各船照票增設抽税衙署等事分晰議入命逹哈塔往福建㑹同施琅定議還奏海禁既開應聴啇賈貿易小民捕魚勿限人數船數無篷桅船仍令地方官騐放有篷桅船由監督烙號給票徴税其營船按汛防守不許越界擕貨厦門南臺各設抽税衙署並分撥哨船於沿海要口二十餘處巡行察騐九月擢吏部尚書二十六年三月監修賦役全書先是户部以舊刋賦役全書所載錢糧尾數在􅁝忽秒撮以下者繁冗易滋弊竇請増入毫勺内重編簡明新書給事中楊周憲言其名為簡明實滋紛擾下廷臣詳酌既定議召詢九卿科道意見同否達哈塔奏錢糧事臣不能洞悉今仍存􅁝以上之數但刪忽以下之數綜計所刪銀僅數千兩而檔冊簡明易核臣等故同一議上曰朕原不惜刪去些㣲錢糧但論有益於民否耳尚書李之芳給事中任辰旦御史錢珏相繼奏檔冊簡明吏胥不得作弊實有益於民遂以刑部侍郎蘇赫副都御史胡昇猷光禄寺卿龔佳育㑹同户部監造至是達哈塔奉命同尚書王日藻監修四月以雨澤愆期詔同大學士勒徳洪余國柱等清理刑部獄囚時尚書湯斌少詹事耿介等為皇太子允礽講官逹哈塔奉命與湯斌耿介並輔導皇太子六月以講書失儀三人俱罰俸逹哈塔奏言臣奉命輔導東宫誠欲竭力自効恪供厥職奈賦性愚拙動輒愆儀數日之内負罪實多以湯斌耿介尚不能當輔導之任况庸陋如臣敢不亟請罷斥下部察議以輔導東宫為日未久遽自請罷規避圖安應革職得㫖寛免是月正白旗驍騎校阿齊尼叩閽控訴本旗都統馬哈達與原任征南大将軍賚塔之子侉色孫福保等朋謀誣陷事上命達哈塔鞫訊諭之曰馬哈達係爾族姪侉色亦爾親戚爾素稱鯁直自能秉公審斷七月奏阿齊尼初以家丁琿齊作滿洲告馬哈逹准令披甲嗣為佐領福保舉首琿齊係漢人不應披甲馬哈逹據詞牒部阿齊尼懐恨控告上以所奏含糊令再審復得琿齊實係滿洲馬哈逹偏聴福保誣坐阿齊尼誑與披甲状請革馬哈逹福保職並以前審未得實情自請議處吏部議達哈塔徇庇馬哈逹福保應革職詔從寛改為降五級留任八月卒於官年五十有五瑪爾漢瑪爾漢滿洲正白旗人姓兆佳由順治十一年繙譯舉人授工部七品筆帖式累遷内閣侍讀刑部員外郎聖祖仁皇帝康熈十三年陕西提督王輔臣叛應逆藩吴三桂上命揚威将軍阿宻達自江寕移師往討瑪爾漢隨征署驍騎恭領十四年四月同副都統鄂克濟哈穆舒琿等由涇州進剿連破賊寨斬級數百復寧州城十五年六月撫逺大将軍圖海統兵圍平涼王輔臣降瑪爾漢還京十二月圖海請調涼州寧夏固原諸鎮兵進定興安漢中上命副都統烏丹同瑪爾漢赴諸鎮經理征調事並詢商緩急機宜甘肅提督張勇言興安漢中山峻路險運饟維艱宜暫緩進征上是其言令圖海駐守鳯翔泰州諸要隘分兵遣助湖廣大軍命瑪爾漢隨征南将軍穆占規復湖南十七年授監察御史仍留軍營十九年穆占進征貴州二十年進征雲南瑪爾漢俱隨征得功牌十有二嗣追論湖南諸将弗力援永興致将士損傷罪瑪爾漢抵銷功牌九二十二年命巡視河東塩務會御史許承宣羅秉倫先後劾奏前任山西巡撫圖克善勒令平陽府所屬十三州縣増報塩丁加課累民事下巡撫穆爾賽㑹同瑪爾漢確核遂覆奏虚報一萬七千餘丁應豁免此後課銀一萬五百四十餘兩得㫖允行二十五年以審理歸化城都統固穆徳罪案不實降三級調用二十六年補理藩院司務尋遷户部郎中三十三年四月遷翰林院侍講學士七月擢兵部侍郎三十五年上親統大軍由中路征噶爾丹命瑪爾漢經理驛站駐劄土木遇西路軍營奏報本章遞送御營是年八月以解送軍營馬匹在䝉古地方牧養瑪爾漢不遣䝉古司員監視致痩斃者多部議革職命從寛留任三十八年六月擢都察院左都御史十月遷兵部尚書尋充經筵講官兼議政大臣四十三年三月上諭八旗都統曰聞京城就食之民近自河間逺自山東已於五城給食恐尚未徧及著八旗各於本旗城外分三處煮粥𣲖家計殷實家人衆多之大臣監散凡就賑之民病則醫治歿則棺歛給粥時各清晰識認務使周徧於是瑪爾漢同内大臣佟國維明珠阿宻達等並奉命監賑四十六年調吏部尚書四十八年正月以老疾乞休允之五十七年十二月卒年八十有五遺疏上得㫖瑪爾漢宣力年久素著勤勞前以衰老乞休兾其善加頤養准予解任兹聞溘逝深為憫惻下所司議䘏遣内大臣侍衛往奠賜祭𦵏如例世宗憲皇帝雍正八年六月諭閣臣曰原任吏部尚書瑪爾漢為人謹慎小心老成忠厚在聖祖仁皇帝時宣力多年完名引退中外皆稱為善人著加増太子太傅賜祭一次以示朕眷念耆舊之意是年八月詔建賢良祠以大學士圖海都統賚塔尚書顧八代等與瑪爾漢並入祀今上乾隆九年詔九卿核議已祀賢良諸臣之應追諡者列奏賜瑪爾漢諡曰㳟勤覺羅舒恕覺羅舒恕滿洲正白旗人武功郡王禮敦之三世孫也順治十二年任侍衛由三等洊陞一等聖祖仁皇帝康熙八年六月授兵部督捕侍郎十年三月遷吏部侍郎十三年三月逆藩吳三桂陷湖南命内大臣希爾根為定南将軍帥師之江西以舒恕恭贊軍務尋署前鋒統領六月諭希爾根於每佐領下撥驍騎三名付舒恕剿賊時閩逆耿精忠遣賊犯江西陷撫州九月舒恕隨希爾根進剿擊敗逼城立營之賊賊自城中出拒又自建昌路率衆來犯連擊敗之賊尋棄撫州奔竄舒恕督兵追殺數十里十二月擊敗屯據東鄉縣界賊衆十四年三月賊復犯撫州舒恕督叅領邁蘭協領綽勒們等迎剿敗之七里岡追殺三十餘里時建昌已恢復餘賊尚據新城縣五月舒恕偕都統覺羅霍特督兵克復縣城擒偽遊擊許定國又偕總兵許貞敗賊於宜黄復宜黄崇仁樂安三縣未㡬廣東告急上命舒恕率兵赴援十月授鎮南将軍時叛鎮馬雄偕吴逆偽将王宏勲紏衆犯髙州勢猖甚舒恕擊之失利退駐肇慶十五年二月平南王尚可喜病篤其子之信通賊倡兵作亂舒恕退回贛州簡親王喇布以聞詔舒恕堅守南安梅嶺以保固江西十六年三月諭曰今大兵分路進征逆賊不暇窺贛其改授副都統莽依圖為定南将軍率兵赴粤侍郎舒恕量留甲兵同巡撫佟國楨鎮守贛州舒恕尋遣知縣郭毓秀招降偽官劉定邦即令持扎招撫偽總兵闗世榮偽副将周先徳等别遣遊擊陳廷玉招撫偽總兵張輝偽副将鄧瑞等復遣都司廖正英招撫偽總兵王受之合計降兵數萬先後疏聞六月授南安将軍七月簡親王以呉逆聚㓂宜章将窺南韶入奏詔莽依圖迅赴韶州舒恕率兵守南安南雄為之聲援舒恕尋遣副都統赫呼布率兵赴韶州十七年二月将軍額楚疏報總督金光祖潯州失利諭舒恕迅赴南雄鎮守兼顧韶州四月将軍穆占疏言郴州桂陽新復幅員遼濶賊來無兵可禦請敕舒恕移駐防守時尚之信已反正亦以宜章地方𦂳要請令舒恕駐守詔舒恕具南雄韶州情状以聞舒恕疏言南韶為湖南江西廣東三省接壤要地不可輕離十二月莽依圖疏報梧州危急諭曰南雄韶州已為内地舒恕其率所屬兵迅赴梧州十八年四月即軍前授都察院左都御史六月逆賊呉世綜糾衆犯南寧城中食盡旦夕且陷額楚等引前鋒兵擊敗西山賊衆舒恕同莽依圖督衆兵進豫遣左翼兵潜出山後截賊歸路盡殱之世琮負重傷以數十騎遁南寧圍解十月舒恕以病劇乞回肇慶調理詔回京既召對諭大學士等曰朕以舒恕病劇必實故召還京師昨見之神色如故絶無病状舒恕前在髙州敗回肇慶復自廣東退奔不據韶州南雄諸要地竟還贛州致江西全省震動又以巡撫金儁之言盡洩於尚之信又不欲将軍傅宏烈進兵恐嚇阻撓舒恕身為将軍負如許重罪不思戮力自贖詐稱病劇肆行欺罔著羈候宗人府俟旋師之日嚴察議奏十九年七月裕親王福全等覆訊以舒恕身為将軍詐稱患病不行奏明私以印信敕書交将軍莽依圖罪一又前進取髙州至電白為賊所敗罪二又自廣州敗出不據韶州南雄諸要處以遏賊勢乃退歸贛州致江西全省震動罪三又因巡撫金儁之言已知尚之信逆謀乃不行宻奏反疑金儁之言為吴逆離間計遣人潛告尚之信云以安其心辦理錯謬罪四又阻撓傅宏烈進兵罪五應革職任籍沒家産得㫖革職免籍沒三十四年二月授鑲黄旗滿洲副都統六月出任山西右衛左翼䕶軍統領七月授寧夏将軍時上以噶爾丹欲掠墨爾根濟農諭安北将軍費揚古加意防偹費揚古自請率兵防阿爾察圖蘇穆哈逹地以舒恕率兵一千五百名往駐歸化城北額埒蘇台地十一月授費揚古撫逺大将軍以舒恕同都統伊哷慎等恭贊三十五年正月上親征噶爾丹由獨石口出中路授舒恕揚威将軍率右衛兵隨費揚古出西路五月費揚古擊敗噶爾丹於昭莫多舒恕率右衛兵還駐納喇特六月奉詔回歸化城籌辦凱旋軍糧八月疏請仍赴喀喇穆倫費揚古軍前十一月上駐蹕棟斯拉召費揚古議軍務以舒恕暫署大将軍事三十六年閏三月詔費揚古移師郭多里巴勒噶遜舒恕仍以揚威将軍留駐喀喇穆倫屢收納降人遣送入京並偵奏噶爾丹困窘状五月費揚古疏報噶爾丹竄死詔叙功予舒恕雲騎尉世職召還京三十七年二月擢正藍旗滿洲都統四十年十二月以病乞休致仕四十二年五月卒年六十有五賜祭𦵏如例子延夀襲雲騎尉由侍衛洊擢歸化城副都統右衛将軍費揚古費揚古滿洲正白旗人姓棟鄂内大臣鄂碩之子也世祖章皇帝順治十五年襲父三等伯爵聖祖仁皇帝康熈十三年隨安親王岳樂率兵赴江西討逆藩吴三桂委署營總時賊将黄乃忠糾賊萬餘自長沙犯袁州費揚古與副都統沃赫總兵趙應奎等擊敗之擒偽官童聖功復萬載縣城十五年擊走賊将夏國相於萍鄉毁寨十二進圍長沙屢戰皆㨗十八年敗賊将吴國貴於武岡凱旋紀功擢領侍衛内大臣兼火器營總管列議政大臣二十八年命頒賚喀爾喀左翼土謝圖漢二十九年上以噶爾丹刦掠喀爾喀又數擾我邊境授裕親王福全撫逺大将軍費揚古往科爾沁調兵隨征叅贊軍事是年八月擊敗噶爾丹於烏蘭布通三十二年命費揚古為安北将軍駐歸化城三十三年五月噶爾丹使人至歸化城言欲入貢費揚古偵其踵至者男婦凡二千人遣兵迎問且止之馳疏請㫖上知噶爾丹陽為修好潛蓄窺探意命侍郎滿丕諭責其使遣之還七月上聞噶爾丹将逼圖拉詔費揚古同右衛将軍希佛率兵往禦希佛請益兵上責希佛遇事疑沮令弗偕往諭大學士等曰費揚古勲舊大臣今駐防歸化城軍民皆心服於此事無不能辦也尋以圖拉無警慮噶爾丹将趨歸化城詔費揚古旋師三十四年七月噶爾丹至塔宻爾費揚古率兵往禦噶爾丹由圖拉河西竄去十月授右衛将軍仍兼管歸化城将軍事十一月疏言聞噶爾丹據巴顔烏蘭距歸化城約二千里宜集兵運糧於來年二月往剿詔授為撫逺大将軍召入覲受方畧三十五年二月以黒龍江将軍薩布素率兵出東路命費揚古集兵歸化城出西路振武将軍孫思克率甘肅兵西安将軍博霽率陜西兵㑹期並進上親統大軍出中路四月費揚古至察罕和碩噶爾丹驅賊衆趍克嚕倫河東路兵未至科圖而上已由科圖進次什巴爾台近壓賊境五月三日費揚古師至圖拉疏言西路有草之地為賊所焚我軍毎迂道秣馬又遇雨糧運遲滯師行七十餘日人困馬疲乞上緩軍以待㑹噶爾丹望見御營於克魯倫河大驚奔竄上宻諭費揚古邀擊親督大軍躡追至拖諾山駐蹕費揚古聞噶爾丹遁歸特哷勒濟遂遣前鋒統領碩岱副都統阿南達阿廸等率兵先往挑戰且戰且郤誘至昭莫多復分兵三隊東則滿洲漢軍及察哈爾兵倚山列陣西則右衛大同及喀爾喀兵沿河列陣而使將軍孫思克率緑旗兵居中並遵上方畧令官兵皆步戰俟賊勢披靡乃上馬衝擊時噶爾丹率衆幾萬人我軍分隊迎戰自未至酉斬級二千餘賊皆潰奔乘夜追逐三十餘里生擒數百人獲馬駝牛羊廬帳器械無算噶爾丹引數騎逺竄費揚古令阿南達齎疏馳報御營召詢其詳阿南達奏曰噶爾丹聞上親征心膽俱裂且不虞我兵絶其去路突然交戰擒斬過半傷斃山谷者相枕藉噶爾丹之妻亦受戮其部衆來降者又二千餘人費揚古恐語涉矜張故疏内約畧言之上乃班師留費揚古駐守科圖七月奉詔由科圖移駐喀爾喀郡王善巴遊牧地甫至噶爾丹潛使台吉丹濟拉率千五百人來掠喀爾喀牲畜糗糧費揚古遣副都統祖良璧御郤之追擊至翁錦賊敗遁費揚古尋以馬瘦移軍喀喇穆倫㑹噶爾丹使其宰桑格類固英等來請納欵上再幸塞外駐蹕棟斯拉命費揚古馳赴黄河西界行在入對諭及昭莫多之戰勢如破竹實為可嘉費揚古奏曰軍中機務皆遵上宻諭以冀成功西路官兵聞聖駕先臨克嚕倫河無不踴躍奮勉噶爾丹之敗衂皆睿謨神武震以軍威追之窮蹙所致臣不能生擒以獻罪也上曰觀來降台吉等及格類固英之言噶爾丹窮蹙是實朕意不忍悉加屠戮欲招降其衆撫而活之費揚古奏曰聖意實非臣等愚昧所能測真天地好生之仁也翼日賜御佩櫜鞬弓矢遣還軍營三十六年正月阿南達自肅州奏報哈宻囘人擒獻噶爾丹之子塞卜騰巴爾珠爾等上以其疏錄示費揚古賜胙肉鹿尾闗東魚等物諭曰時當上元令節衆蒙古及投誠厄魯特齊集暢春園適阿南達疏至衆皆喜悦爾獨居邊塞不得在朕左右殊深軫念故以阿南達疏示知並賜物問爾無恙即如與爾相見也二月上幸寧夏詔費揚古宻籌進剿噶爾丹費揚古疏請罷大將軍任隨領兵將軍出征上不允所請令便宜調遣兵馬以行上由黄河西岸駐蹕達拉布隆頒賜上駟院馬五十駱駝十費揚古進次薩竒爾巴勒哈遜時厄魯特部衆降者相繼丹濟拉亦遣人納欵言噶爾丹已死欲擕骸骨及其子女並率三百户來歸費揚古以聞上回鑾留費揚古駐師察罕諾爾以待丹濟拉六月丹濟拉至哈宻費揚古有疾詔昭武將軍馬思喀代統其兵費揚古還京仍任領侍衛内大臣晉封一等公費揚古以噶爾丹雖死非係生擒疏辭封爵得㫖宜遵成命毋固辭諭大學士等曰塞外情形不可臆度必身厯其境乃有確見昔朕欲親征噶爾丹衆皆不欲惟費揚古宻抒謀畧與朕意合遂悉以西路官兵令其統領進剿道路遼逺兼乏水草乃全無顧慮直抵昭莫多奮揚軍威俾奸狡積冦挫衂大敗累年以來統兵諸將未有能過之者又諭曰朕屢出征知為將甚難固不可急亦不可緩費揚古惟相機調遣緩急合宜是以濟事四十年六月上幸索約勒濟費揚古扈從中途疾作上停蹕一日親往視疾賜御帳蟒縀鞍馬等物銀五千兩遣内大臣侍衛等䕶送還家尋卒賜祭𦵏如典禮諡襄壯以其子辰泰襲一等侯兼一雲騎尉世宗憲皇帝雍正十年入祀賢良祠桑格桑格滿洲正白旗人姓喜塔臘戸部侍郎庫禮之子庫禮以軍功得騎都尉世職又以考滿及遇恩詔晉一等輕車都尉加一雲騎尉長子堯泰襲旋卒停襲順治十七年更定襲例庫禮之一等輕車都尉加一雲騎尉應世襲桑格由三等侍衛襲父職聖祖仁皇帝康熈六年以桑格善射擢一等侍衛十年五月授䕶軍統領十三年三月逆藩耿精忠叛應呉三桂上命定南将軍希爾根帥兵赴江西以桑格恭贊軍務八月奉諭曰江右為粤東咽喉江浙唇齒所闗綦重今兵民之心尚持兩端若不先滅地方小醜大兵難以前進爾當協同将軍領重兵進剿毋使兵力单弱致有踈失時耿精忠之偽都督易明䧟撫州桑格同副都統席布率兵規復賊衆四萬餘迎戰擊敗之進薄撫州城賊衆自建昌至倚城結壘合城内之賊抗拒桑格同席布督兵奮擊克賊壘連敗賊衆賊棄城竄遁追剿百餘里復撫州入城駐守十月昜明糾賊五萬復自建昌來犯桑格乘賊甫渡河擊之賊墮水死者無算斬賊将楊三李茂著於陣十一月希爾根移師撫州桑格率兵趨剿距城九十里之碣山隘口斬賊甚衆十四年正月剿賊上高縣斬偽總兵朱一典謝以泰等遂乘勝破賊将阮國棟於新昌城北山復二縣城進圍東鄉克之復擊敗賊衆於長興鄉連破賊營斬賊将邵連登等昜明引賊竄遁遂復建昌六月鎮南将軍尼雅翰以廣州兵少請敕桑格率兵赴廣東總統将士守禦詔以江西賊㓂未平令前鋒統領覺羅舒恕移兵前往桑格仍留援剿十五年二月安親王岳樂統師由袁州剿呉三桂賊帥夏國相等於萍鄉桑格合諸軍並進破賊十二寨於來龍山夏國相等竄走長沙十八年二月隨安親王復長沙上賜桑格詩有百戰威名早已揚之句八月進征武岡賊帥呉國貴馬寳張祖法等踞隘口拒戰桑格偕副都統伊巴罕等督兵攻剿越三晝夜以礮擊斃呉國貴賊衆悉潰追剿至楓木嶺之木𤓰橋十一月安親王奏令率每佐領下䕶軍三名還京二十年五月詔以桑格前此出征尚能奮勉回京後委頓不堪解䕶軍統領任以世職隨旗行走三十五年二月上親征噶爾丹桑格署䕶軍統領分管鑲白旗大營五月師至克嚕倫河同内大臣阿宻逹請追剿逃㓂得㫖俞允分𨽻左翼軍隨平北大将軍馬思喀追剿至巴顔烏蘭西路軍已擊敗噶爾丹於昭莫多㑹師収集降衆䕶送至張家口尋還京命復䕶軍統領原品三十八年二月卒子阿柱襲世職欽定八旗通志卷一百五十九
