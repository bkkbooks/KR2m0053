body:
  text: 選舉志五八旗科第題名三厯科舉人二乾隆元年丙辰科滿洲禄成福成德成格覺羅永昇陳泗改名恭春英林佐領慶和禪布佐領都寛長命保佐領大章通海包衣伯齡管領名以上鑲黄旗九達時濟覺羅永福佐領和錦那蘭佐領魁德福昌烏爾泰佐領廣寧改名廣慶烏爾清阿佐領武式齊包衣海成管領薩哈齊來儀修仁包衣海成管領廪格恒文佐領旗十名以上正黄徳保包衣哈豐阿管領何彬常英德貴亨泰佐領觀保舒瞻阿林佐領旗六名以上正白林昌納欽佐領卓諾以上正紅旗二名福禧喜格佐領勒福元凱徳馨包衣徳格佐領荷綬三格徳光佐領佛琯成文厄爾成額佐領名以上鑲白旗八楊名玢金琯佐領布庫侉蘭泰佐領福森伍靈泰佐領三名以上鑲紅旗通善佛保皂保佐領旗二名以上鑲藍䝉古德寧安薩炳阿佐領正白旗一名漢軍王宏業陳桂佐領趙德昌劉廷梁徐成樸張斯臣佐領四名以上正黄旗劉芳雙慶佐領姚顯以上正白旗二名白焜王殿臣佐領王徳綸白郁文佐領劉桐白郁文佐領三名以上鑲白旗張正賢柯承露佐領蔣有道董國柱佐領蔣尚憲董國柱佐領三名以上鑲紅旗佟濬佟鈁佐領劉棟桐保管領劉鵬霄包衣五達子管領以上正藍旗三名曹秉順尤錫章以上鑲藍旗二名乾隆三年戊午科滿洲富敦阿濟圖佐領安平塞爾布佐領樂善戴屯佐領百揆赫雅圖佐領福通阿馬倫岱佐領盛格穆隆阿佐領王􅀈雅圖常在管領張利仁包衣馬爾泰佐領福安包衣百喜佐領名以上鑲黄旗十額爾金泰福柱佐領亮玉撓海管領為保額爾敏佐領博棣那蘭佐領福徳清泰管領興國包衣七十佐領劉瓉包衣六合格管領王國興包衣爾達色佐領以上正黄旗八名英文來住佐領修仁二格佐領哲庫納富徳佐領德爾得徳貴佐領索爾遜徳寧佐領英竒包衣尚琳佐領庚保包衣李永標佐領張永貴包衣韓六什管領以上正白旗八名許鋼吴文炳佐領恒昌觀音保佐領二名以上正紅旗查庫蘭巴什佐領傅隆阿明徳佐領永紳扎哈禮佐領三名以上鑲白旗興桂安泰佐領崑寧富昌佐領旗二名以上鑲紅阿桂蘓章阿佐領李之佩李森佐領高其文包衣髙從孔佐領以上正藍旗三名福明陶花色佐領王灝蒲連佐領計殿英阿爾泰佐領福同額僧額佐領衆佛保包衣保住管領名以上鑲藍旗五漢軍高書勲髙纉勲佐領鑲黄旗一名張肇機張松林佐領劉錫齡張竒勲佐領二名以上正黄旗張廣永李長齡佐領鑲紅旗一名乾隆六年辛酉科滿洲國棟國柱佐領名鑲黄旗一本著宗室尚嘉保佐領舒世泰扎三泰佐領俊徳伊三泰佐領姱色包衣郝善管領名以上正黄旗四舒敏王雅圖佐領永寧哈爾圖佐領額爾登萼明徳佐領恒泰全保佐領俄格金鄂色那佐領伊靈阿廣海佐領何森宗室鳳池佐領名以上正白旗七額爾登布福寧佐領永徳明福佐領覺羅普爾泰覺羅公阿岱佐領以上正紅旗三名世祥伍雅圖佐領查克殫查郎阿佐領鄂魯禮雅爾胡達佐領闗壽觀音保佐領尤良包衣顔卜佐領名以上鑲白旗五圖他布増福佐領名鑲紅旗一席占鄂金佐領温敏阿拉宻佐領覺羅奉寛覺羅永禄佐領徳保包衣郭興阿佐領以上正藍旗四名多龍阿包衣佛保佐領鑲藍旗一名蒙古索住兆昌佐領永年查哈晏佐領二名以上正白旗甘珠露改名甘珠爾玉保佐領鑲白旗一名福明安薩克薩哈佐領官德包衣富拉洪管領以上鑲紅旗二名白英徹靈佐領名正藍旗一漢軍張法震靳光岳佐領鑲黄旗一名房嵒祖雲龍佐領正黄旗一名石周南石勇佐領楊廷芳董成謨佐領石之珂謝文玉佐領姚文包衣四保柱管領寅保包衣慶恩佐領名以上正白旗五朱孝升吴如鑲佐領吳廷樞包衣劉忠管領名以上正紅旗二馮聖世裝得榮佐領鑲紅旗一名于仁臣陳國禧佐領楊師震高國琇佐領二名以上鑲藍旗乾隆九年甲子科滿洲坤豫額爾壽佐領正常阿素柱佐領傅隆阿覺羅常安保佐領傅勒渾包衣哲庫納佐領以上鑲黄旗四名國柱五十佐領保中武徳佐領何棟福成佐領覺羅阿永阿覺羅葩實佐領趙德榮包衣四十八佐領以上正黄旗五名覺羅多敏覺羅海格佐領永亮哈爾圖佐領永徳西冲額佐領李士通包衣彌勒保佐領以上正白旗四名馬世馨馬爾屯佐領鼐郎阿伊泰佐領吳坤包衣吳奕曽佐領張斌常泰佐領李書包衣吴奕曽佐領以上正紅旗五名哈達哈阿林佐領哈府納阿林佐領傅清石介佐領常善包衣顔卜佐領名以上鑲白旗四綸音惠塞爾登佐領覺羅恒泰覺羅三徳佐領郭明增壽保佐領三名以上鑲紅旗福柱禮六十五佐領英禄包衣賀伸佐領名以上正藍旗二尚徳胡達禮佐領九十四圖宻善佐領二名以上鑲藍旗䝉古夢麟明福佐領名正白旗一庫爾納常舒保佐領鑲白旗一名漢軍施廷燦蒲鼎勲佐領顧邦英祖尚賢佐領二名以上鑲黄旗張法良包衣雅爾岱佐領吳伸包衣八十六佐領以上正黄旗二名繆廷機楊繼祖佐領馬良楊廷柱佐領二名以上正白旗蔣志鐸吴文炳佐領正紅旗一名積善胡松齡佐領鑲白旗一名劉翀董國柱佐領徐文勇周瑋佐領二以上鑲紅旗名甘運灃甘士璉佐領陳大吕羅查佐領二以上正藍旗名乾隆十二年丁卯科滿洲沙松安戴屯佐領書圖穆克登佐領何伸七十一管領書明穆克登佐領七十二黒管領伊常阿國柱佐領六以上鑲黄旗名裕德五格佐領麻致祥改名瑪星阿寳瓶佐領武納翰納徳純佐領穆丹白啓佐領穆和藺白啓佐領雪格巴延泰佐領六名以上正黄旗王站柱慶恩佐領李士達彌勒保管領常泰彌勒保管領多隆務明達佐領四以上正白旗名伊立布明徳佐領名鑲白旗一和色布覺羅伊勒圖佐領郭兆增壽保佐領二名以上鑲紅旗徳昌覺爾産哈哈佐領王懿徳慶恩佐領七十一黑壽佐領布彦達克薩哈佐領洪之昭包衣五達子管領徳山包衣蘓楞額佐領以上正藍旗六名鄂寧圖米善佐領博明哈克散佐領闗達陸世乆佐領富炎泰西平佐領吉郎阿包衣儀住佐領廣吉祥包衣尚裔圖管領以上鑲藍旗六名蒙古吉來七十佐領名鑲黄旗一文達兆常佐領名正白旗一蘇楞額常舒保佐領鑲白旗一名漢軍馬圻馬衍業佐領正黄旗一名董大鏞催福佐領名鑲白旗一張克純金權佐領王秉韜祝兆龍佐領張克紳金權佐領三以上鑲紅旗名徐績李侍京佐領張鳳鰲包衣四十九管領以上正藍旗二名乾隆十五年庚午科滿洲德克精額永安佐領興寶常亮佐領耀徳七十八管領咸寧包衣常福管領名以上鑲黄旗四三山包衣觀音布管領正黄旗一名徳風禧縁管領德瑛禧縁管領舒展玉保柱管領興代禧縁管領富森柏靈阿佐領舒魯忠順佐領覺羅吉爾禪覺羅特通額佐領舒明阿世臣佐領八以上正白旗名朱成阿容徳佐領德世馨三泰佐領六十五何音布佐領三名以上正紅旗景福海隆阿佐領巴德伊齡阿佐領覺羅巴彦學覺羅六十保佐領英垂伊齡阿佐領全魁達禮佐領于璉包衣養善佐領名以上鑲白旗六那霖阿林泰佐領常世寧四德佐領二以上鑲紅旗名那丹七佟世屏佐領正藍旗一名伍寶初庫佐領覺羅滿吉禄覺羅博麟佐領名以上鑲藍旗二蒙古穆騰闗保佐領索安福格佐領旗二名以上鑲白永住扎史扎木素佐領正藍旗一名漢軍施奕學蒲鼎勲佐領秦廷基范宜中佐領盧焜盧熿佐領靳光宸范宏賔佐領夏廷傑范毅佐領五以上鑲黄旗名馬世煌馬衍業佐領王纉曽陳錚佐領金成華郭襄佐領三以上正黄旗名王之炳張鍹佐領名正白旗一董大銓崔福佐領名鑲白旗一乾隆十七年壬申科滿洲多倫五哈達哈佐領覺羅喜崇福覺羅常岱佐領覺羅奎福覺羅常安保佐領徳克進包衣哲庫納佐領以上鑲黄旗四名徳健馬斌佐領濟倫車勒庫佐領明徳布徳坤貢布佐領阿爾景阿英泰佐領鑑昭祐齡佐領旗六名以上正黄德隆禧縁佐領伊三善長青佐領二以上正白旗名舒啟額爾金布佐領觀音保多謀圖佐領復興包衣和成額佐領以上正紅旗三名法國彦法良佐領永誠明徳佐領旗二名以上鑲白富勒赫來朝佐領綸音忠塞泰佐領二以上鑲紅旗名富爾遜五十哈齊佐領咸寧成徳佐領藥師保六十佐領三以上正藍旗名覺羅托岱覺羅明善佐領鑲藍旗一名䝉古永慧明智佐領名鑲黄旗一明秀包衣明福管領正白旗一名永安包衣崔三格管領鑲白旗一名明保安泰佐領噶勒薩安泰佐領二以上正藍旗名漢軍花長觀范宏賔佐領秦廷堃范宜中佐領二名以上鑲黄旗董樑僧保佐領名正黄旗一周天竒海福佐領王炎張鍹佐領旗二名以上正白曹世德臧應聘佐領梁巖包衣和成額佐領以上正紅旗二名郎興朝董正佐領劉同敬安致和白佐領名以上鑲旗二周成緯孟長齡佐領于宗瑛王士義佐領二名以上鑲紅旗楊泌武興佐領陳居廣尚維邦佐領二名以上鑲藍旗乾隆十八年癸酉科滿洲福盛阿馬倫岱佐領廷麟博爾奔察佐領成策竒秀佐領慶雲伊通阿佐領文玉永安佐領旗五名以上鑲黄尹登額覺羅八十佐領徳勝馬斌佐領穆隆安四十八佐領徳寶柱烏爾泰佐領四名以上正黄旗趙信寶善佐領徳元喜元管領舒敦忠順佐領輔宸常清佐領德欽柏成額佐領五名以上正白旗賈虞龍包衣孫潢佐領正紅旗一名達郎阿伊齡阿佐領圖龍阿富僧阿佐領竒明馬徳佐領興善富僧額佐領阿肅赫伸佐領旗五名以上鑲白那繼善慶柱佐領富森泰務基佐領南齊禮四十八佐領聖保包衣沙色佐領名以上鑲紅旗四富勒渾巴什佐領名正藍旗一覺羅集蘭覺羅明善佐領鑲藍旗一名蒙古僧格闗保佐領常貴英保住佐領二名以上鑲白旗福興庭柱佐領名鑲藍旗一漢軍張廷炳盧熿佐領名鑲黄旗一常德威和徳管領劉嘉兆威和德管領李文樞李景佐領王鑒陳錚佐領楊廷楷威和德管領五名以上正黄旗竇鍾柱保德佐領名正白旗一祖允烋祖學乾佐領佟士苞包衣永徳佐領名以上鑲白旗二楊錦楊殿邦佐領李天培牛寅佐領以上鑲紅旗二名趙淳潘昇佐領名正藍旗一乾隆二十一年丙子科滿洲慶玉穆通阿佐領傅彬常恒佐領富森布竒秀佐領三以上鑲黄旗名圖爾炳阿覺羅八十佐領靈秀舒元佐領覺羅福祥覺羅八十佐領名以上正黄旗三常瑞明安佐領三成包衣薩穆哈佐領以上正白旗二名恒濟常禄佐領穆克登布伊泰佐領八十豐陞富佐領明保塔永阿佐領四名以上正紅旗慶齡覺羅明海佐領策興倪喜佐領伯成克星額佐領崇人克星額佐領傅芬伍神保佐領五名以上鑲白旗覺羅魁英覺羅恭泰佐領竒山拉蘇佐領雍謙富昌佐領旗三名以上鑲紅興德徳敏佐領長庚傅惠佐領成都五十泰佐領三名以上正藍旗覺羅福志覺羅明善佐領朱成額成徳佐領覺羅成桂覺羅明舒佐領名以上鑲藍旗三䝉古雅爾善明全佐領阿禮莫包衣代通管領名以上鑲黄旗二嵩貴觀音布管領托金泰常松佐領二以上正黄旗名清泰福格佐領名鑲白旗一徳明吉亨佐領名正藍旗一漢軍蘇爾泰包衣那俊佐領鑲黄旗一名劉元德豐盛額佐領柏永慶塞克圖佐領六十八威和徳管領三名以上正黄旗方伯彌勒保管領正白旗一名孫霈張儒正佐領門錡陳國鼐佐領二名以上正紅旗黎珠包衣額騰義管領鑲白旗一名宋學濓吴文煥佐領孫暟包衣那親管領名以上鑲紅旗二趙濓潘昇佐領名正藍旗一杜茂景徳佐領鄒鍾齡武興佐領孫念祖包衣蘓爾泰管領鑲藍旗三名乾隆二十四年己卯科滿洲基爾悾阿興太佐領太分興徳佐領寶源永安佐領沙金太石柳佐領江安兆德佐領旗五名以上鑲黄德藴恩都佐領覺羅有徳覺羅