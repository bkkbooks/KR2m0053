body:
  text: 欽定八旗通志卷二百五人物志八十五大臣𫝊七十一漢軍鑲紅旗三黄郭世隆王哲爾肯張仲舉秉中國棟黄廷桂郭世隆郭世隆漢軍鑲紅旗人父洪臣原籍汾州順治二年英親王阿濟格統師至九江收降明故將左良玉之子夢庚及部衆來京入旗洪臣與焉分轄降衆為佐領康熙四年世隆襲管佐領八年授禮部員外郎二十五年擢監察御史二十七年命赴盛京察審福陵守兵赴訴其兄寃死事得誣良刑逼自縊狀原審侍郎阿禮瑚及司員俱坐失實褫革世隆還京䟽言盛京刑部凡已經告發事件執法結斷者甚少夤縁和息者居多以故曲直莫分刁誣愈熾近有旗人宜爾根控訴命案先經私和後復涉訟仍不審結乞敇嚴察私和之兩造及聴許部員究實情而肅法紀又䟽言盛京鳯凰城及山海闗各設有迎送朝鮮貢使之五品官數員每逢貢使至以一員迎送此外别無職守且既有通事官従鳳凰城隨行至京沿途撥兵䕶送料理食物夫役車輛迎送官實属贅設應裁汰又䟽言設官乆任以其能熟悉民風土俗而去弊興利也若不肖之徒往往以乆任滋弊如盜採人葠律有重典惟不肖官弁與奸民熟習互相容隠故弊竇彌多每年報部採葠之數不及千觔而京師及各省貨賣者不啻百倍皆由開原邉口縦奸民盜採山海闗又縦其私販宜分别故縦失察嚴定處分其守口官員與山海闗城守尉應每年更換以清弊源䟽並下部議行又詔山海闗官兵停止盛京將軍管轄降調現任城守尉照張家口例兵部選員更換十月擢内閣學士是月上謁孝陵過通州有陜西禮縣民訴知縣萬世緯知府紀元婪取狀命世隆往㑹督撫察審鞫實萬世緯貪婪科𣲖杖斃縣民論斬紀元受賄舉為卓異論絞二十九年四月充國史副總裁七月直𨽻巡撫于成龍内陞左都御史以世隆代之先是户部奏鑲紅旗罷任安溪知縣孫鏞首福建巡撫張仲舉布政使張永茂催徴恩免錢糧侵隠入己上遣郎中吳爾㤗等往㑹總􅇂興永朝勘訊既而上聞吳爾泰甫至即拘訊知府六人牽連州縣官數十人乃命世隆往世隆至則研訊司府州縣胥役數人得張仲舉與布政使張汧索取州縣賦冊竄改撤銷齎解批迴重造司冊侵隠已徴地丁額銀作民欠蠲免狀又張汧陞湖廣巡撫虧帑三十餘萬因仲舉前任湖廣布政使亦虧帑相約互抵仲舉勒道府揑具借帑印領給按察使田慶曾令出結署藩司事及張永茂抵任仲舉聞張汧在湖廣贓私敗露閩帑尚未補完復截留府州縣額支官俸役食令慶曾給永茂又令永茂加取各属齎觧銀火耗代為彌補諸左証悉合遂先釋吳爾泰所拘之府州縣官回任窮詰仲舉永茂慶曾各語塞并孫鏞控列雜贓亦鞫實仲舉侵那二十六萬三千餘兩擬斬永茂科斂一萬七千餘兩擬絞慶曾受賄二千二百兩擬徒各追賍入官被勒之属員及改造冊檔書吏概免罪䟽入上切責吳爾泰謬妄革去郎中發黑龍江効力世隆䟽下法司如擬行九月世隆將至巡撫任諭曰凡接任好官者難于成龍居官甚好繼之不易爾係有才之人當勤謹任事三十年二月䟽言直𨽻守巡二道分管通省錢糧刑名與各省布按兩司無異應改部選為請㫖簡授上是其言下部従之是年順天保定真定永平諸属夏旱秋水詔世隆履勘撫綏世隆察奏七十四州縣本年及來年額賦分别蠲緩其受灾較重之霸州文安大城永清真定井陘獲鹿元氏賛皇髙邑臨城行唐靈夀寜晉十四州縣發賑四月又遵諭詳籌積貯之務䟽言荒歉之嵗以每州縣飢民萬口為率大口四合小口二合按名賑給有五六千石之糧可供半年之食今直𨽻捐納米榖一百三十萬石有竒應均撥收貯州縣大者存五千石中者存四千石小者存三千石庶可隨時變通賑濟荒歉常平倉米今嵗平糶六十三萬二千石有竒例應嵗内買補恐米價因之益昂應展限來嵗五月其原糶之州縣官雖有陞遷事故亦令本員買還以撥應貯之州縣收倉庶杜推諉䟽下部従之三十一年二月䟽言奉天所属州縣連年大有米榖贏餘請敕山海闗但禁大車装載暫聴旗人民人肩挑駞負進闗轉糶則永平等處米價可以漸平䟽下部議自三月至八月如所請行十一月䟽言宣化向設鎮道及十衛六㕔與各營分理錢糧驛務㕔員限于佐貳營衛皆属武弁政多扞格宜裁六㕔十衛改設一府八縣上是其言令世隆分晰定擬尋奏改宣化衛為宣化府附郭前衛為宣化縣萬全右衛為萬全縣懷安衛為懷安縣蔚州衛為蔚縣龍門衛為龍門縣懷來衛為懐來縣赤城堡為赤城縣順聖川西城為西寜縣三十二年四月以真定路當孔道地方遼濶自裁去總兵後分防弁兵甚少奏移紫荆闗副將駐真定酌調各營馬步兵二千添設守偹千總把總等官分撥汛防以龍泉闗㕘將移駐紫荆闗以真定營逰擊移駐龍泉闗三十三年四月以霸州等處因子牙河堤決田畝被淹已遵㫖賑濟平糶其大城縣趙扶村之南隄青縣之楊村隄至東子牙隄雄縣蒲淀五官淀之東隄請即修築又黑龍港河及王家口乆經􅌎塞請開浚深通得㫖俞允三十四年二月擢閩浙總督三十五年五月䟽言閩省兵餉嵗需銀一百三十四萬兩有竒本省額徴僅一百萬兩有竒向皆撥用雜税及浙江協餉今雨澤愆期民間荒歉難以催徴請撥鄰省帑銀三十萬兩以為協餉俟民力稍舒徴補存貯以備不時之需三十六年浙海闗監督李雯請移寜波城外之闗于鎮海縣增設紅毛館以便洋船貿易世隆言鎮海距寜波僅六十餘里洋船既至鎮海即可直抵府城移闗設館于商民無所利益仍舊為便次年又䟽言泉州府向徴落地塩税銀一千五百九十兩有竒所属七縣派引行塩徴課五千五百八十兩有竒若依巡塩御史鍾申保所奏改落地塩税為派引徴課又加引七縣行塩恐將來新引壅滯塩價日昂有累民户請仍循定例䟽並下部議従之四十一年十月調兩廣總督四十二年七月䟽言粤東自南澳起經碣石鎮至虎門協海靣二千餘里守汛遼濶請增設兵船于遥對南澳之澄海協以資巡防海門一所最為𦂳要應移達濠營遊撃守偹千總把總駐劄改為海門營以海門所守偹移為達濠營守偹甲子一所乃險要海口従前止設千總一員應以鎮左營移駐與碣石鎮聨絡防守吳川營隔海百餘里有硇洲一島宜以龍門協所属之乾體營兵令白鴿寨守偹千總把總統之駐劄硇洲改為硇洲營白鴿寨即以千總管領至平海大鵬二所逼近巨海應専設二營其順徳一鎮外有香山虎門二協内有省㑹駐防兵可裁去總兵官止留逰擊為順徳營改鎮標左營為平海營右營為大鵬營下部議如所請四十三年四月䟽言前奏添造戰船俱經報竣設立船兵自南澳至龍門令守偹千總把總逐日帯領巡哨副將􅄁將逰擊每月㑹巡一次水師總兵於春秋季駕船二十分巡外洋至瓊州上年十一月至今年二月先後擊敗賊衆於沱濘外洋沈賊船六斗頭角海面沈賊船一瓊南萬崖二處海面沈賊船二四十五年五月䟽報海洋巨盜蔡玉也等聚衆刼掠商船今已擒獲分别定擬斬流得㫖遣刑部侍郎常綬往勘覆奏蔡玉也等五人應立斬部議世隆平時禁戢不嚴及事發又䑃朧掩飾應革職於是罷任四十六年六月起授湖廣總督四十七年十二月條奏防守紅苗三欵一沿邉安設塘汛已經周密惟盛華哨起至鎮溪所一帶山髙箐密難於瞭望應酌撥鎮筸兵八百名另設四營分駐每日派官一員帶兵五十名逰巡一舊日苗來内地民往苗叢每滋事端今以塘汛為界址苗除納糧買賣外不得擅入塘汛之内民亦不得擅出塘汛之外違者治罪一内地奸民與苗人結親至勾通為匪不可究詰嗣後如有前弊應㫁離異下部議従之四十九年六月䟽劾祭告南嶽之翰林院侍讀學士陳壮履繞道嘉魚滋擾驛站得㫖降陳壮履為編修十月世隆内遷刑部尚書五十年十月以山西太原流匪陳四等六十餘人携婦女數十乗馬驘由湖北往湖南貴州詭稱赴雲南開墾索取州縣口糧刦掠商賈財物世隆前任總督不即察究縦容滋蔓革職罷任五十二年三月遇萬夀慶典復原品五十五年九月卒年七十有二後祀直𨽻福建浙江廣東廣西湖廣名宦哲爾肯哲爾肯漢軍鑲紅旗人由佐領授刑部員外郎康熙十一年遷中城御史十三年六月因吴逆之亂隨大軍出征江西十四年授都督僉事任南贛總兵十五年八月以舉首偽将軍髙得捷逆書敘功加都督同知十一月敗賊扵九渡水擒斬偽總兵副将又敗之南康縣復潭鋪斬首千餘十二月廣東從逆提督嚴自明總兵張星耀逼南康縣哲爾肯與将軍舒恕斬賊萬餘破其營十七賊遁南安均得㫖奨叙十六年四月上以大軍攻圍長沙吴逆窮蹙欲往衡州慮其侵犯贛州吉安等處分我兵勢命哲爾肯與總督董衛國分佈防禦偵情形不時奏聞十七年正月與舒恕遣官扵江廣交界之九鄉招撫偽縂兵賴榮等十七員兵萬餘又遣遊擊楊以松敗賊扵鸕鷀寨斬偽副将等十餘斬獲六千有竒叙功加左都督十八年二月兩廣總督金光祖䟽請復設廣西提督上命哲爾肯任之八月䟽言臣駐潯州三合嘴弹壓兩江接應大兵但慶逺太平思恩三府逼交阯接雲貴為粤西籓籬今逆賊苗蠻嘯聚負固臣請統兵先往南寜㑹同将軍莽依圖相機剿撫上可其奏並諭原駐之三合嘴倘属𦂳要可發兵汛守十月疏報泗城土知府岑繼禄向化歸誠下部知之十一月䟽言提標設兵舊制馬一步九今廣西餘孽未靖需戰馬甚多請改為步八馬二從之十九年因與逆藩尚之信結親部議革職得㫖從寛留任戴罪圖功二十一年䟽言懐集營兵業經奉㫖裁汰但僻處深山必得官兵弹壓今酌撥潯協守偹一兵三百佈防歸潯州副将兼轄下部議行二十二年卒扵官賜祭𦵏如例題請入祀江西名宦祠張仲舉張仲舉漢軍鑲紅旗人由筆帖式任通政司知事康熙十六年正月奉㫖揀發福建署泉州府知府三月海賊張七糾衆數千夜犯新西北三門奸民啟之入仲舉率家丁同副将馮昭京等大敗賊生擒張七八月山冦朱寅結海逆鄭錦偽将軍李復貴等犯南安仲舉隨副都統楊鳳翔提督段應舉剿殱賊衆生擒寅復貴及偽軍師林日向等十月總督郎廷相請即以仲舉補授泉州府知府允之十七年正月康親王傑書令仲舉往諭鄭錦降錦不従且遣偽總督劉國軒偽提督吴淑何佑等陷海澄長泰圍泉州仲舉親冐矢石出家資鑄械犒軍晝夜嬰城固守兩月餘㑹大軍克興化漳州寜海将軍喇哈達率兵抵安溪賊始觧圍去十月巡撫吴興祚表上守城功擢興泉道十八年錦遣偽右武将軍林盛據東石康親王檄仲舉取賊船從水路㑹𠞰大軍遂復東石十九年江西按察使缺員九卿㑹推左通政張可前大理寺少卿張永祺合詞保仲舉畫題時御史唐朝􅂜曰我閩人也知仲舉為官平常不應保九卿因劾朝彞不早言詔宥之二十年仲舉隨興祚復厦門金門尋遷山東按察使二十二年遷湖南布政使二十五年三月入覲奏言宋儒周敦頤程顥程頤張載邵雍朱熹各有専祠乞賜額得㫖前哲有功聖學允宜表彰御書學達性天額頒發各祠及白鹿洞嶽麓兩書院四月擢福建巡撫二十六年䟽言臺灣設府縣學應考人數無多未便照内地額請府學量設廪増各二十名縣學各十名俟人才漸盛補照直省額廪生出貢自康熙二十七年始照例舉行部議従之二十七年二月䟽言漳州所属龍巖與漳平界連向因龍巖地廣将田百二十餘頃撥𨽻漳平其糧轉付巖户代納官民交累請即歸漳平徴收九月又言臺灣十營兵米每年約三萬六千石現存粟僅支五月旱蝗為災乏食可慮請酌撥司帑三萬兩就産米處所買貯備給候部文動帑實恐遲誤謹先發司帑一萬採買其二萬俟文到日再撥俱下部議行二十八年三月䟽言民間例禁私藏鳥鎗但航海商船防䕶不可無資請視船大小酌帯六桿四桿再臺灣畨民資生納餉均藉捕鹿有用竹弓箭及鳥鎗者應請免繳仍禁増制又言臺灣所用明桂王偽號錢甚多若一時全禁貧民無以為資請開爐鼓鑄收買偽錢銷燬部議均如所請六月䟽言畨民以捕鹿資生前因東洋興販禁兵民捕獵惟畨民得捕藉向社商等易布及米塩社商按季納餉今既停興販前禁頓弛兵民持械四出鹿靡孑遺不但畨民乏日用資且彼此攘奪易滋擾請仍禁止事下部議以興販既停鹿皮将售何處恐地方官借以自利令總督興永朝確查永朝覆奏畨民捕鹿資生納課隨處皆可轉售有司實因社餉起見並非圖利請如仲舉議允之九月䟽言福清縣三面臨海民皆壩海為田自海冦不靖民竄堤壊沃産化為海國前縣冊報時未經聲明荒陷無徴確數今逐畝清丈計缺額糧銀九千九百九十餘兩米三百四十石有竒復業之民慮缺額未豁不敢來歸良田盡成荆棘請将無田之糧豁免又沿海各州縣田多未墾保無隠匿查康熙五年閩省清丈田畝止及界内應将界外補行清丈下部議以福清墾三千六百六十餘頃己於康熙二十六年起科並未題報缺額今請豁免亦應令永朝確查其界外田應否清丈并詳議嗣永朝奏此項荒田實因前令鄧獻英将荒陷田畝統報墾數及額賦無徴始報明實無欺隠邀豁等弊其沿海界外田自遷棄以來閲年既乆界址混淆亦應如仲舉議清丈得㫖允行二十九年正月䟽言宋儒朱熹祖籍徽州府之婺源熹父松官閩遂家焉故有閩徽二派今熹十八世嫡孫瀠籲請承襲查明代原有五經博士二員分主祀事請即令瀠承襲主閩派祀下所司議行先是安溪革職知縣孫鏞赴部首告仲舉及布政使張永茂侵蝕庫帑六月遣吏部郎中吴爾泰同興永朝勘訊既而上聞吴爾泰甫至即逮訊知府二及州縣官數十諭曰吴爾泰乃一司官将此事妄為張大亦未可定著内閣學士郭世隆前往詳訊尋訊得仲舉與前布政使張汧索州縣賦冊竄改撤銷齎解批迴重造司册侵隠已徴地丁額銀揑作民欠汧遷湖廣巡撫虧帑三十餘萬因仲舉前任湖南布政時亦虧帑相約互抵仲舉勒道府具借帑印領給按察使田慶曾令出結署事及永茂受代仲舉聞汧在湖廣以贓敗閩帑尚未補完復截留府州縣額支官俸役食令慶曾給永茂又令永茂加取各属齎解銀火耗代為彌補仲舉共侵挪銀二十六萬三千餘兩依律擬斬監候尋病殁黄秉中黄秉中漢軍鑲紅旗人初由廕監生任兵部筆帖式康熙二十年授山東范縣知縣二十八年遷貴州黔西州知州尋内陞刑部員外郎三十四年遷吏部郎中四十年授監察御史四十一年五月䟽言各部院具題事宜奉有諭㫖必由内閣發科抄然後施行惟緑頭牌摺子口𫝊諭㫖即行不由内閣不發科抄日後無従查考請嗣後於奉㫖遵行後即録原奏並所奉諭㫖移送内閣封呈御覽如偶有錯誤勅令更正俱發内閣登記以備稽核又欽奉清字諭㫖各衙門譯漢奉行恐字句亦有未符宜令原奏官員送内閣繙譯遵照𫝊抄䟽入下部確議部臣以事涉繁瑣議駁得㫖凡口𫝊諭㫖及緑頭牌摺子啟奏事件著各衙門於每月終彚開奏覽四十四年二月䟽言科道官由滿洲漢軍陞補者大抵積俸二十餘年漢人一為知縣俸滿三年行取到部即得考選科道殊覺太驟請嗣後行取知縣先以六部主事用俟練習有年始許考選上閲奏諭大學士曰御史黄秉中條奏行取知縣即補科道未免太過此言誠當下九卿詹事科道㑹同確議議如所請著為例六月遷内閣侍讀學士四十七年十月擢内閣學士值浙江水災命往同巡撫賑飢十二月授浙江巡撫四十八年七月疏言寜波紹興等處連嵗歉收米價騰貴計惟招商可平而温台二府豐收米賤格於出洋之禁請許商民由内洋販運以濟寜紹從之四十九年署總督事同提督王世臣䟽報盜刦龍游縣村荘為官兵追逐逃至遂昌縣山中處州右營都司張朝臣率兵搜勦遇盜六七十人抵拒朝臣被槍刺腹死隨有金衢兩協官兵齊至捕盜斬殺殆盡䟽下兵部議部臣言盜夥六七十人非尋常盜案可比且都司已槍刺殞命而兵丁無一損傷顯有隠報情弊上命遣部院賢能司官一員往㑹巡撫将軍副都統至都司張朝臣陣亡處詳察情由議奏於是兵部郎中察爾欽等㑹勘奏言隨張朝臣之兵丁張斌同時陣亡潘文彩傷重致死並有鳥鎗兵五人因失火藥𤼵焚死部議張朝臣張斌潘文彩予䘏如例踈防及救援不力隠匿不報各官治罪有差秉中不察劾應降一級留任上以秉中前此奏報不實命降五級戴罪圖功九月調福建巡撫五十年六月同總督范時崇提督藍理以泉州盜陳顯五等結夥二千餘人搶掠永春徳化漳平大田等縣居民入奏上曰督撫提鎮等平時不能撫䘏百姓訓練兵丁及事出又不能相機即行勦撫縦容賊盜滋蔓騷擾地方肆行搶奪又遲延日乆始行奏聞反稱百姓不廢耕織照常安業凡强盜竊盜合夥至三四十人百姓尚且畏懼逃避今數逾二千豈得謂百姓不廢耕織安居舊業乎明係掩飾誑奏下部嚴察部議治罪革職有差命革藍理職免治罪秉中與范時崇免革職降五級戴罪効力十月因前任浙江巡撫時不劾奏糧道陳鑾改折漕糧事革任罰賠五十一年三月命以子牙河分司効力三年期滿直𨽻巡撫趙宏燮奏秉中自偹工料修防隄岸俱各穏固下部議敘給還原品五十七年五月卒長子廷鑑次子廷鈺三子廷桂廷桂官至大學士世襲三等伯别有𫝊王國棟王國棟漢軍鑲紅旗人康熙五十二年進士改庶吉士五十四年授檢討五十七年充㑹試同考官逾年遷國子監司業六十年授侍講尋轉侍讀雍正元年三月充陜西鄉試正考官四月復設日講起居注官以國棟充補六月遷侍讀學士十一月充廣東鄉試正考官二年六月授右通政八月充㑹試同考官十月命為河南學政四年五月遷光禄寺卿十月特㫖授浙江觀風整俗使國棟抵任以浙江風俗澆漓諸務廢弛仰遵聖訓首以尊親大義宣諭紳士懲頑抗以清積欠究包訟以警奸徒革虚冐以飭營伍嚴保甲以弭盜源巡歴所至據實以聞温諭奨之是年遷宗人府府丞五年二月上以浙江被水米價騰貴命國棟同巡撫李衛動帑銀四萬兩于杭州嘉興湖州三府修城濬河築堤俾民傭食力國棟奏杭州至海寜河淤應濬太湖隄閘及嘉興石塘多坍應修理但冬春雨雪多興工必過費俟九十月水落再行䟽濬上是其言五月擢湖南巡撫諭曰本欲令爾在浙整飭數年以期成效但湖南廢弛日乆急需治理今命爾巡撫其地勉之八月䟽言督撫大吏去任者固不可沽譽市恩新莅者尤當加意整飭風聲所播庶可令行禁止若意示寛大則吏治必弛民情必慢事難整理諭嘉國棟得治理寛嚴之要惟期實力行之時上命湖廣總督邁柱㑹修兩省隄工國棟䟽言長沙岳州常徳三郡逼近洞庭如湘隂巴陵華容安鄉澧州武陵龍陽沅江益陽九州縣環繞大湖隄塍甚多居民恒于秋冬水涸時築隄堵水而耕但地勢卑下每江漲水不能洩反灌入湖以致隄岸衝决田禾淹沒民難安堵現有潰口四百餘處已飭水利各官刻期完築此外險工次第興修更嚴禁包折等弊務期加髙培厚工程堅固七年六月䟽言岳州府属遼濶中隔洞庭石門慈利俱係苗疆九谿永定軍屯雜處文移每至稽遲有鞭長不及之慮請改所属澧州為直𨽻州轄石門慈利安鄉三縣改九谿永定二衛為一縣設知縣教諭訓導巡檢各一員初僉都御史申大成奏黔省軍田百姓賤價頂種易啟紛争請彷民田一體買賣畝納税五錢官給照為業並推行各省七月國棟䟽言湖南軍田瘠薄不比黔省膏腴均與民田一例買賣無賤價頂種之弊其科則輸賦較民田更重若照黔例税五錢是合屯糧十餘年常賦之數㫁非民力能勝應按各属屯糧全書分别差等其㣲價頂種未立賣劵糧仍軍户者令頂種人納税五錢給照為業如時價平買並非頂種糧未過割者照屯糧一石税五錢給照過割其已過割者税二錢至龍陽武陵長靖諸屯田土下賦重應令售主按劵價每兩税三分諸䟽並下部議行先是湖南靖州逆犯曾静遣其徒張熙投逆書于川陜總督岳鍾琪鍾琪以聞上命刑部侍郎杭奕禄副都統海蘭至湖南偕國棟拘訊國棟據曾静妄供並未究出黨羽又阿其那塞思黑門下太監以罪徙廣西流言于路直𨽻河南督撫並查奏國棟稱湖南接觧兵役未聞一語又茶陵州黨犯陳蒂西𫝊播流言敇國棟提問亦不得證實九月降㫖切責十月革職回京八年正月命辦理刑部右侍郎事十月充武㑹試副考官十一月署山東巡撫國棟前任河南學政時薦教職申程章才品俱優特㫖申程章以知州銜授浙江海寜知縣後遷江蘇淮安知府以詐典商楊紀塩商程星所贓為巡撫尹繼善所糾部議國棟濫舉應革任得㫖寛留九年二月河南祥符封邱等縣水災詔國棟往查賑七月署江蘇巡撫尋署浙江巡撫十年仍回刑部侍郎任十一年偕尚書彭維新等稽察京通各倉十二年以與尚書福敏等議福建民藍厚正毆斃胞兄事失當敇責其糊塗姑息下部嚴察部議降三級調用以國棟係革職留任之員無級可降應革任得㫖派充苦差十三年十月命署刑部右侍郎十二月卒黄廷桂黄廷桂漢軍鑲紅旗人父秉中官福建巡撫有𫝊康熙四十九年廷桂由監生襲曾祖憲章所遺雲騎尉世職五十二年遷三等侍衛五十九年補叅領雍正三年授直𨽻宣化鎮縂兵五年二月擢四川提督六月疏陳營伍地方五事一軍械宜速製川省三面環夷自平西藏青海後多缺額不堪用現飭確查修補一馬厰宜别建川馬本不髙大又日繫槽致多羸現訪得豐樂場後荒山六十里派弁督牧其附郭舊厰追出募墾一士卒驕奢宜禁川省自年羮堯濫賞放縦至今習氣未除現飭服用絹布毋僣官制一畨蠻防範宜宻每嵗十月間生熟畨蠻至内地傭工名為下壩次年夏初始歸近禁携婦女隻身合夥成羣肆惡應飭携家属數名口方許至内地形跡可疑者查禁一汛守地宜均成都属徳陽仁夀二縣北南距數百里歸一把總駐防永寜協駐貴州永寜縣城中隔河河東𨽻黔河西𨽻川兵民岐視非邉隘所宜奉㫖與總督岳鍾琪㑹商行十一月奏嚴緝竊賊及賭具諭曰牧民之官果肯執法懲奸諒未有不畏懼者大都䙝玩之生率由日乆懈弛有意縱捨所致故禁令之弗行其咎惟在不公不明而不在不嚴也夫法猶治病之藥取攻疾而已過於峻利則元氣必大傷知乎此斯知過猛之不足為貴矣又奏建昌畨蠻新𨽻版籍竊掠時聞臣飭擒嚴懲又省城設防火堆棚三十每營救火兵二十得㫖嘉奨六年二月請設義學於提標五營及城守兩營諭曰義學一事各省提鎮及駐防将軍等往往以此奏請朕俱未准行従來文武並為國家器用不可偏有重輕汝意專以崇文為善舉歟子弟讀書一道非魯鈍者所能湏俊秀者方可夫以少年聰頴之資既習禮儀稍通文墨猶思荷戈執殳甘為前驅乎勢必漸染日乆流為怯懦将來俊秀者咸不愿為兵而亦不能為兵矣營伍中所餘無非魯鈍一流欲求干城之選豈可得哉是非興文之良策實乃廢武之岐途譬猶驅鄉塾生童教習櫓盾徒誤其文而已武亦莫能就也似此邀虚名而無實益之舉将焉用之至云營伍錢糧冊籍乏人查對因此之故而令闔營俊秀子弟皆至文武兩相廢棄詎不更謬凡事但宜隨地隨時斟酌損益期於辦理無悮則已何必思及分外創新立異始為美談耶三月奏報烏蒙米貼苗婦陸氏不法傷雲南兵已檄永寜遵義将弁援勦諭奨其機宜妥協㑹四川雷波土司楊明義隂助陸氏誘附近結覺阿魯阿照平底等苗刦糧陸氏就擒廷桂及鍾琪請𠞰明義詔廷桂偕總兵張耀祖㑹𠞰九月軍至拉宻擒明義并獲造謀人卑租及匪目業姑物租等諭曰首惡渠魁陸續被擒朕嘉悦覽焉撫𠞰餘孽無涉輕率詳慎為之尋奏結覺賊酋雙尺阿魯賊酋魯佩及阿不羅賊酋覺過均就擒斬馘近萬諭曰覽奏斬獲情形何啻獵人弋獲禽獸倘兵退仍復如故将如之何亦豈有盡行殺戮不留噍類之理乎當詳思善於措置之道為要十月奏𠞰附近黄螂之確里宻等處枝夷底定後併力翦除阿都及阿驢報聞十二月確里宻賊酋利耶為我軍礟斃阿都苗擒獻其酋阿必阿驢苗亦就撫七年正月廷桂奏軍事竣諭曰此畨底定之功仰荷上天垂庇聖祖錫佑兼賴汝等提鎮大臣及將弁兵丁胥能効忠奮勇之所致也朕深為嘉悦尋䟽陳苗疆地方情形得㫖畨俗苗情歴歴如繪絲毫無隠朕甚嘉之惟善後一著最為要務殚心竭力共相籌酌必得良策庶兾永寜四月奏湖北容美土司田旻如遣土逰撃至四川建始縣界徴花絲銀已咨湖北督撫提督查究諭曰楚蜀各土司中惟容美最為富強縁自前明官吏玩愒弛縱遂致越分僣禮相沿成習迄今尚未改也地方大吏應曉以大義漸令革除若據濫給委牌科斂絲花等欵即坐以狂悖之罪似属太過已宻諭楚督邁柱令其嚴飭田旻如矣汝等慮其疑畏不遽根究之意甚是尋奏籌𠞰瞻對賊蠻得㫖瞻對雖㣲亦不可輕視凡事槩以敬慎處之七月奏太平營都司郜見信䜛虐兵致合營交甲求退請革職諭曰借輕信䜛言苦虐衆兵一語遂欲倖免結黨挾制之罪豈可得乎類兹刁風不宜滋長當嚴查為首者重懲示儆郜見若仍留本營勢不相安另揀賢員調補十一月請開採黄螂等處銅鉛資鼓鑄諭曰此奏識見殊属庸愚之至所謂守突奥之熒燭未仰天庭而覩白日者也雷波黄螂一帯地方與新撫涼山諸夷壌疇交錯苐宜示以静鎮胡可興起利端若聴民開採各處流亡無藉之徒勢必羣相趋赴萬一釀生事故所闗匪淺汝其㑹同憲徳速将金竹坪白蠟山等處凡出産銅鉛礦厰槩行封禁嚴加防範稍有奉行不力脱至紛紜黄廷桂憲徳之身家性命未足以償厥辜也廷桂奏謝聖訓得㫖向後一切事宜務湏詳慎為要率爾之見何可凟陳朕覽所奏倘亦如汝遽即見諸施行竟至滋擾地方其害曷勝枚舉豈引咎頌聖數語所堪了結者如云曾經審思原非率爾則已之才識實属不逮可知愈當加勉詳慎十二月奏緝獲妖言逆犯楊大銘等十九人并檄酉陽土司獻首惡楊七諭曰此事最宜詳慎勿俾無知弁員憑威迫脇激出事端朕意或係奸匪揑詞妄供希圖推缷亦未可定料該土司未必有此事也八年正月奏楊七果獲扵楊隘嘴並非酉陽境内諭曰朕非有過人技能但較汝等克誠克公耳凡人為一己利害是非之心切則遇事接物動輙有過不及之失勉公與誠斯為對症之藥嗣酉陽改土歸流十二月奏報猓賊滋事調兵戰克金鎖闗墨鐵闗黄草坪等處恢復永善得㫖官兵之奮勇争先汝之調度合宜深為可嘉據鄂爾泰亦有川省将領此畨勞效較勝滇省張耀祖逺甚之奏勉旃九年三月大軍𠞰噶爾丹策凌上以川陜地廣又理軍需總督一員難控制特增設四川總督即以廷桂補授兼管提督印務六月請将川省常平倉捐榖改銀欵數悉照雲貴現行例諭曰川省乃産米之鄉籌畫積貯尚易為力該督撫遽請開捐誤矣且欲改榖作銀又復将銀買榖輾轉滋弊更属悖謬但通省倉厫止有四十餘萬石為數太少著另議增貯十年八月奏遣總兵趙儒𠞰捕兒斯賊畨諭曰務期一舉戡定以收永逺綏靖之功毋得潦草結局今賊畨敢扵猖獗者皆由汝從前未經料理妥協所遺之患設不能奮勉立效以贖前愆二罪併罰恐汝等難以克當矣十二月捷奏至奉諭嘉奨十一年奏獲大竹縣奸民文興貴文射斗等上嘉之十三年五月疏報夏熟收成分數諭曰際兹盈寜之慶當益加凛畏更勉公忠試思川省屢䝉天佑頻錫豐年豈文武不和各立門户排擠乖争之風所能感召者耶若因此而自以為是任情肆念殊非所以仰答天貺矣亟宜返躬内省倘有不慊扵中極力改悔毋稍逡巡六月奏貴州古州逆苗包利枉利漢奸張九萬等糾衆陷清溪餘慶等縣四川建昌永寜俱苗疆界連貴州臣飭各員弁加意撫緝苗民勿為煽惑諭以不動聲色静鎮慎宻為要乾隆元年正月西陲軍務竣裁四川總督廷桂仍為提督其總督缺後扵十三年復設十二月命來京候㫖二年補鑾儀使尋署天津鎮總兵三年實授五年遷古北口提督六年七月諭曰古北口為畿輔籓籬該提標所属弁兵素稱勁旅今因出口行圍親臨簡閲見隊伍整齊技藝嫺熟洵由統領大員董率有方将弁兵丁勤扵練習所致朕甚嘉之黄廷桂已賞馬二匹著再加恩賞上用緞二疋九月授甘肅巡撫九年䟽奏恤孤貧瘞枯骨勸輸社倉清查監獄開渠灌田及教民種樹紡織各事均得㫖嘉奨十二年署陜甘總督十三年四月奏練兵三事一技藝分三等示激勸一馬步兵逐名考騐一前鋒戎纛毋許逺迎露積詔如所請行十二月授兩江總督十四年五月䟽言江西俗悍有司因循姑息致不安分之人動輒喧閙滋事臣飭嚴拿究辦又各營僅按日輪操南方晴少雨多轉多閒曠臣令扵隂雨時擇公所及寛敞寺院内如式操練又挽強命中最為要技現飭造七力及十力硬弓教演其弱者不得過六力諭曰汝至江西頗知整飭振作但不可欲速而要之以乆可也九月議奏裁併衛所事宜擬将漕船少之儀徴衛併入揚州衛金山衛併入鎮海衛揚州四帮併入三帮鎮江中帮併入前後兩帮共裁守備二千總四下部議行尋奏立限清查積案報聞十五年二月加太子少保七月奏赴運河豆班集漫口撫恤災户諭率属詳查妥辦八月奏奉賢縣奸民李如岡等聚衆結猛将㑹擾害地方臣飭属拏獲首従各犯得㫖重處示警毋姑息十月䟽㕘江蘇巡撫雅爾哈善於奏銷錢糧奉㫖訓飭忽将知縣許惟枚等十一員特㕘送臣㑹稿畫題臣查惟枚等經徴未完均不及一分例止停陞罰俸今盡請革職人必以為欽奉嚴㫖非巡撫本意其居心更属巧詐得㫖所㕘甚是雅爾哈善交部嚴議尋議革職留任十六年聖駕南巡御製詩賜之曰迎鑾衛警蹕建節乆旬宣體我勤民徳嘉卿率属賢何湏張錦帳惟喜閲鱗田細騐剛柔俗周諮豐歉年咸中方有慶虚己自無偏此地人文盛還淳尚勉旃是年調陜甘總督十八年正月調四川總督八月奏川省嵗豐榖賤命轉輸二十萬石賑淮陽被水州縣御製詩紀其事曰全蜀幸逢年教開移粟船不因讀漢詔拯溺自應然十二月晋吏部尚書留川督任十九年二月重慶奸民譚二陳琨等謀逆廷桂擒首従十四人置扵法九月疏言川省惟成都府属地平衍又有都江大堰灌溉餘各属山田臣令勘修塘堰引灌新都蘆山等十州縣及青神縣蓮花壩樂山縣平江鄉三台縣南明鎮悉變膏腴報聞二十年五月請增鼓鑄為通省修城用諭曰有益地方之事詳妥為之是月晉武英殿大學士兼管總督事六月打箭爐外孔撒麻書兩土司搆釁金川及綽斯甲布袒麻書革布什咱及徳爾格忒袒孔撒互攻殺廷桂偕提督岳鍾璜飭諭觧散尋調陜甘總督十二月奏言軍營文報𦂳要向派大員管理不若就近責成沿邉提鎮詔如所請二十一年二月奏従前各處調觧軍營之馬多不堪用一由口外嚴寒一由弁兵作弊自安西至哈宻經戈壁十餘站飼飲不時致多疲斃現派都司守偹等官分站専管河州靖逆兩副将往來稽查将積貯草豆經過馬匹住歇時刻行走臕分各情形按日呈報臣令標員赴各站查察並安西提督及哈宻防鎮不時就近督催得㫖嘉奨四月命駐肅州督辦軍需五月奏西北兩路軍營向通商販後因撤兵禁止今巴里坤軍營一應牛羊等物專由肅州一帯販往路逺價昂難資接濟請照舊通商部議從之十月請設巴里坤理事同知一上允之十一月奏吐魯畨回人莽阿里克與厄魯特潜謀叛逆其人在巴里坤哈宻貿易者甚多恐暗通信息臣調安西兵千赴兩處分駐但兵數尚少若向内地調撥又慮張皇現有派赴巴里坤種地兵五百塔勒納沁種地兵二百即令同往防守再晋省解到之駝出闗未乆若趕赴軍營湏撥兵防䕶已截留安西一帯牧放其續調馬亦扵哈宻附近留牧至馬匹尚湏豫籌陜甘兩省選得三萬令加𦂳餉牧備調但陜省距甘肅路逺按站行需五六十日請先調來甘分撥加意飼養陸續行走可收實用諭曰黄廷桂經理軍務籌畫精詳一切調度甚合機宜大臣能如此明决擔承實心體國深可嘉悦著賞雙眼孔雀翎并加賞騎都尉世職令其子承襲二十二年正月上以廷桂與巴里坤辦事大臣雅爾哈善札商戰馬一事意存推諉訓諭之三月奏言臣節次觧送出口馬二萬七千五百餘統於三月十五日以前全抵巴里坤餘隨後補觧又出口駝四千二百餘續到者亦隨時觧往應用報聞尋軍營大臣奏廷桂所觧馬依限到且臕壮堪用諭奨其辦理妥速交部議敘十月命續觧馬八千廷桂奏前自凖噶爾脱出之官兵等乆居邉地嫻牧務請即令觧往得㫖俞允十一月又續觧馬四千無悮諭部議敘十二月奏言甘肅有墊辦軍需銀十萬餘兩請飭各員自行彌補其半上嘉廷桂賢勞在事各員奮勉特命蠲免並賞廷桂銀一萬兩二十三年二月奏軍需辦觧将竣即屆春耕請暫停可緩之糧運又豫備正餘馬一萬七千駝五千餘陸續觧巴里坤諭奨其悉心調劑四月諭酌議伊犁駐兵屯田事五月疏㕘甘肅布政使武忱糧道成徳怠玩悮公漠視軍務詔革職時奉㫖扵直𨽻山東山西河南陜西購馬一萬由肅州轉送巴里坤備來年進𠞰之用廷桂酌定飼牧事宜又籌運糧十萬石扵巴里坤諭曰甘省連年辦理軍需黄廷桂急公集事俱無貽悮今嵗春夏以來一切轉運糧餉復甚妥協深慰朕懐著加恩再賞銀一萬兩七月奏言臣因西路大軍駐庫車糧運甚要聞有自哈宻直趨吐魯畨之路委員勘得夾山路徑騾駝皆可行較由巴里坤路近現奉㫖籌庫車阿克蘇等城糧運可否行車臣已委員迅勘若俟覆到日始由巴里坤辦運未免稍遲不若先徑運至吐魯畨再由彼轉運因擬将哈宻現辦車騾留半運巴里坤所貯糧分半竟由哈宻運至吐魯畨收貯仍俟直督及山陜撫臣購駝騾到日均由哈宻運軍營回空時将吐魯畨糧轉運軍營較巴里坤省往返二十餘站諭曰黄廷桂所奏籌辦庫車糧運一摺甚合機宜若拘泥成規必俟查明道路觧到駝隻始由巴里坤起運即極力儧赴已需時日朕正在降㫖籌辦而黄廷桂即能計慮及此請将糧石運貯吐魯畨與朕㫖適相脗合閲奏不勝欣慰黄廷桂身體素弱如此悉心計畫朕不惟嘉之且深憐之也是月加少保十二月廷桂奏臣奉㫖購辦牛羊查内地牛羊不習口外水土成羣赶觧易斃且耕作屆期未免難購惟羊尚可購四五萬此時口外嚴寒請扵來年二月起程接濟軍食又酌撥銀二十萬觧阿克蘇買回城米詔如所議行尋諭曰大學士管陜甘總督黄廷桂忠誠素著老成練達西陲用兵以來雖未身歴行陣而籌辦一切軍需動協機宜多有朕所降諭㫖尚未到肅而適相脗合旋即奏到與朕所規畫不約而同者數年以來若非黄廷桂體國奉公不遺餘力安得精詳妥協若此而毫不累民内地若無事者然此其功為尤大宜晉崇階用彰勞績著由騎都尉晉封三等伯並賞紅寶石㡌頂四團龍補服以示優異尋賜所封伯爵號忠勤二十四年正月廷桂以督辦軍需抵凉州病劇猶勉視事布政使蒋炳以聞上命額駙福隆安帶御醫往診視甫行而廷桂卒遺䟽至諭曰黄廷桂忠誠敏達幹練老成歴任封疆勤勞懋著西陲用兵以來籌辦軍需事事精詳妥協倚畀方深是以迭加寵錫用彰勞績昨據蒋炳奏到在凉偶感風寒力疾視事舊恙增劇即派福隆安帶同御醫馳驛前往診視以兾速痊遽聞溘逝深為震悼覽其遺摺當彌留之際尚拳拳以西師垂竣籌辦軍需為念益見體國奉公赤忱罔斁不知聲與涕俱難以自禁即著福隆安前往奠醊賞銀一萬兩交地方官料理喪事並入祀賢良祠其伯爵即令伊子承襲應得䘏典仍著該部察例具奏尋諭廷桂靈柩所過地方文武員弁出城奠醊并派員沿途䕶送賜祭𦵏如例諡文襄御製輓辭曰華鐙廣樂正陳時扼擥驚聞辰尾騎慈慶朝儀難並輟強酬節物淚雙垂屈指軍興逮五年儲胥事事合機先亶惟良弼蒼生福痛惜摧心敢問天馬利軍行粟賑民彌留兩事尚諄諄鞠躬盡瘁今誠已葛亮而來此一人運籌力疾尚勞心驛館誰為下鵲鍼賜賻行将歸故里椒漿冩痛定親臨封疆歴三十餘年公正㢘明衆共𫝊皇考時臣所餘幾鼻酸然復思愀然廷桂柩至京上親臨奠醊詩曰事繁食少赤星頽易簀諄諄餉務裁公謹卒官父子感馬光還陜士民哀忍将巫祝先桃茢載共公卿酹玊罍奪我良臣一何遽不教留聴凱歌迴二十五年凱宴成功諸将士上追念廷桂御製詩有獨憶儲胥宣力者凱迴未見惜斯人之句尋命圖形紫光閣御製賛曰外任封疆内司綸綍俾理儲胥經權弗詘殚誠盡智事協予心未同凱宴痛惜曷任四十四年御製懐舊詩列廷桂於五督臣首詩曰西陲用兵時軍需信要務統勲既罷斥特用就熟路擘畫實盡勞諸事皆弗誤而以民為重従不加征賦遇災仍賑恤入告直陳故可比主吏蕭闗中勤供輸以此論功勲章服錫異數為政頗尚嚴赫赫名乆著然而公無私任勞任怨素兩朝所造就似此誠罕遇廷桂孫嘉襲伯爵卒子文燝襲現任鑲白旗漢軍副都統嘉弟模歴官湖廣鎮筸總兵降藍翎侍衛檢歴官福建巡撫漢軍副都統降藍翎侍衛廷桂原襲之雲騎尉世職從弟廷樞襲欽定八旗通志卷二百五
