body:
  text: 欽定四庫全書欽定八旗通志卷七十四土田志十三八旗塋地順治十年詔八旗貧無塟地者每旗撥給墳塋地五十晌康熙九年奏准各佐領内管領下絶嗣之人有奴僕田地者給守墓二人祭田三十畝仍歸本佐領内管領下有奴僕無田地者給與守墓二人外餘人交部收管或有親生之女亦給祭田如前數内府三旗絶嗣産業有親女親姊妹者除守墓奴僕祭田外其餘人口田産交該佐領内管領分給親女二分姊妹一分但有姊妹者如係同佐領内管領則並受人口家産如係别佐領内管領則止受人口其田産交與該旗十二年題准凡欲往盛京領地設荘䕶墳者若将分内壮丁地退出准撥熟地不願退出者以荒地撥給謹案舊志列此條盖以設荘䕶墳足與塋地以類相附今仍之十七年諭大學士等前命爾等清查地畝以給出征死亡兵丁必平原髙燥之處方可若地勢卑濕不堪為墳塋雖撥給何所用之又湏令與道途相近若去道逺則家貧難以趋赴矣至於官員職卑小民貧乏者皆資地畝為生若取伊等之地撥給兵丁又致彼失業可查内務府所管地畝及諸王大臣地畝詳加丈量有溢於正額者分給兵丁以副朕恤下至意尋大學士等議滿洲蒙古及包衣毎佐領給地十五畝漢軍另户兵少毎佐領給地七畝半清查内務府及王以下大臣等園地溢額者撥給詔從之又議准八旗府佐領毎一佐領給墳地六晌滿洲蒙古毎佐領給墳地三晌漢軍每佐領給墳地一晌半十八年二月諭内務府近聞從前所賜包衣佐領及渾託和人等塟地今已無餘此等窮寒之人在日辛勤供役沒無葬身之處甚為可憫著扵户部查交爾衙門田地内酌量撥給特諭二十三年四月撥給陜西西安駐防兵丁塋地鑲黄旗滿洲地十二畝六分零在咸寧縣北闗菜園漢軍地八畝零在咸寧縣城東南正黄旗滿洲地十二畝六分零在咸寧縣城北菜園漢軍地八畝零在長安縣南火巷正白旗滿洲地十三畝一分零在咸寧縣仁頭院漢軍地八畝八分零在咸寧長安兩縣南城濠邊正紅旗滿洲地十二畝六分零在長安縣海家村漢軍地八畝六分亦在海家村鑲白旗滿洲地十三畝一分零在咸寧縣仁頭院漢軍地八畝零在咸寧縣城南鑲紅旗滿洲地十二畝六分零在長安縣觧家村漢軍地八畝六分零在長安縣海家村正藍旗滿洲地十三畝零在長安縣西南城濠邊漢軍地八畝零在咸寧縣南城濠邊鑲藍旗滿洲地十二畝六分零在長安縣楊家村漢軍地八畝八分零在長安縣南城濠邊右俱舊志雍正十三年履准辦理虧空追及家産者如係墳園祭田一概不准入官從前有已經入官者亦請㫖令該旗逐一清釐給還本人乾隆元年奏准凡闗祭田如三頃以下即撥出給還本人如有十餘頃者以三頃給還本人其餘仍入官二十一年酌議隨墳地畝事先是内務府題准各佐領與包衣達所送各屬下絶嗣家産凡有奴僕田地者俱派家人二口給田五晌令其看守伊主墳墓其餘地畝交部入官又乾隆元年多羅慎郡王等條奏八旗絶嗣地畝十分之内七分入官三分留為祭奠墳墓之用如無族人本人有女仍給伊女承受至是復議以酌留絶嗣地畝原欲使無倚之荒塚祭掃有資不祀者轉而有祀用昭盛世澤及枯骨之典今上三旗包衣凡有絶嗣地畝如無親屬可承祭掃者猶得按照内務府題准之例留地五晌以為伊家人守墳之資而在八旗人等無親屬祭掃者即将地畝全行入官並不按照上三旗包衣之例一體仰邀曠典辦理未免偏枯嗣後應将八旗滿洲蒙古漢軍及下五旗包衣内官兵閑散人等報出絶嗣地畝按照給與族人親女之例量為推廣如無族人親女而有親姊妹姪女及親外甥外孫者亦将所報地畝内七分入官三分留為祭奠之用如無此等親屬即按照上三旗包衣之例派家人二名将隨墳地畝不敷三十畝者全行給與以為祭掃之資如所報出之地過多者給留之數亦不得過三十畝以昭畫一如止有地畝而無家人亦将隨墳地畝按照酌給家人地數交與該佐領擇可倚之人毎年收租代為祭掃以廣皇仁倘有将此項留給地畝私相典賣一經查出或被旁人首告本人從重治罪該恭佐領失察照例議處右户部来文是年二月奉上諭各省駐防兵丁不准在外私置田産有物故者其骸骨及寡妻仍令各回本旗此定例也朕思國家承平日久在内在外俱已相安一體若仍照例辦理則在外當差者轉以駐防為𫝊舍未免心懷瞻顧不圖乆逺之計而咨送絡繹亦覺紛繁地方官頗以為累嗣後駐防兵丁著加恩准其在外置立産業病故後即在該處埋塟其寡妻停其送京但各處情形不同兵丁内有無力置地塋塟者亦未可定著該将軍都統等酌動公項置買地畝以為無力置地窮兵公塟之用再向来此等駐防兵丁有因患病事故呈請回京到京後又復挑選差使者甚属無謂今既准其在外置産安塟所有呈請回京之例著停止著為例謹案自此以下皆據各駐防来册一一登載其有未詳旗分數目及坐落䖏所者一時無由考核並從原冊永平府駐防塋地係於盧龍縣撥給玉田縣駐防於玉田縣撥給三河縣駐防於三河縣撥給順義縣駐防於順義縣撥給冷口喜峰口駐防皆扵遷安縣撥給羅文峪駐防於遵化州撥給以上七處共地一十八畝又良鄉縣駐防塋地共八畝固安縣駐防塋地共二十九畝八分山海闗駐防塋地共二十畝係臨榆縣置買撥給張家口駐防原給塋地八十畝乾隆三十一年復於入官地内賞給一百五十畝獨石口駐防乾隆三十年官置塋地三十三畝三分保定府駐防塋地七十五畝在保定府城南滄州駐防塋地七畝四分在滄州城外青州駐防十六佐領毎佐領下給塋地十畝共一百六十畝徳州駐防官置塋地四十畝山西綏逺城駐防原無塋地乾隆三年咨行歸化城都統以土黙特紅山口等地撥給後又病其窵逺乾隆五年乃以本城北門外公地撥換計共二十一頃十九畝右衛駐防原有官菜園地二頃零八畝乾隆二十一年分給窮兵為公塟之所在右衛東門外太原駐防官置塋地四十五畝陜西駐防塋地康熙二十三年原賞外乾隆三十九年復以移駐巴里坤之右翼舊地分賞計滿洲䝉古共二頃六十九畝有竒漢軍共六十六畝八分有竒並坐落長安咸寧二縣界内甘肅駐防塋地二百二十五畝在凉州滿城外寧夏駐防原有兵丁閑地九百六十畝乾隆二十一年改為塋地荘浪駐防塋地兩處共二百二十五畝開封府駐防塋地三十九畝七分在祥符縣境内荆州駐防舊設塋地五十八畝九分復置買一百六十畝毎旗分給二十畝江寧駐防原定馬厰地界一自明陵左吴王山外界水起至靈谷寺西溝止一自明陵右髻鬁山界水起至鍾山橋止一自山後王家灣迤北而東石􅷨礦之横山起至鍾山橋止分為三厰共計一萬五千一百一十餘畝内除留䕶明陵地一千一百三十畝禁止挖掘又除省衛項下陞科地七百九十餘畝實餘地一萬三千一百九十畝其髙阜處皆可埋塟低漥處仍堪牧馬兩無妨礙准予公塟杭州駐防塋地乾隆二十二年官給錢塘縣六泉園及青山脚荒地共一百八十九畝二分乍浦駐防乾隆二十五年官設民地五十畝三分零在西門外流字圩福州駐防塋地二百一十三畝二分廣州駐防官山八十九畝在番禺縣城外蟠松嶺駟馬岡等處成都駐防乾隆二十一年於馬厰地内撥出二十頃給為兵丁塋地乾隆四十六年奉上諭熱河滿洲兵丁駐居年久已故人等骨殖無力送京營塟甚屬堪憫著施恩於附近閑曠地内查出四十頃賞為塋地以上八旗塋地欽定八旗通志卷七十四
