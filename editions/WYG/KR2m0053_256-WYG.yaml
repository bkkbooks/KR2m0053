body:
  text: 人物志一百二十二列女傳二覺羅列女傳覺羅噶布喇之妻滿代順治十七年旌表騎都尉覺羅伊薩哈之妻隋赫晉康熈十八年旌表二等䕶衛覺羅穆格善之妻戴佳氏康熈二十年旌表八品官覺羅倭勒之妻常姐康熈二十一年旌表覺羅愛星阿之妻他塔喇氏康熈三十八年旌表六品官覺羅劉禮覇之妻𤓰勒佳氏康熈四十五年旌表覺羅宏義之妻納喇氏康熈五十四年表旌詹事府少詹事覺羅僧㕘之妻汪氏康熈五十九年旌表員外郎覺羅都爾福之妻那氏雍正六年旌表覺羅青雲之妻富察氏雍正九年旌表覺羅陸海之妻納喇氏覺羅馬齊蘭之妻伊拉理氏覺羅常岱之妻葉赫覺羅氏以上俱於雍正十一年旌表侍讀覺羅富昌之妻趙佳氏雍正十二年旌表三等輕車都尉覺羅寶玳之妻喀勒爾沁氏三等侍衛覺羅常舒寶之妻𤓰勒佳氏三等輕車都尉覺羅愛三之妻郭羅洛氏覺羅愛申阿之妻唐氏以上俱於雍正十三年旌表覺羅白親之妻劉氏覺羅扎穆達之未婚妻瑪林泰之女以上俱於乾隆二年旌表七品官覺羅薩鼐之妻叩忒氏乾隆三年表旌覺羅英德之妻卓佳氏覺羅隆昌之妻伊爾根覺羅氏以上俱於乾隆四年旌表覺羅瑚什里之妻劉氏乾隆七年旌表輕車都尉覺羅愛保之妻何氏覺羅那欽之妻郭爾羅斯氏覺羅貝思哈賴之妻孟氏覺羅巴彦圖之妻舒舒覺羅氏覺羅富拉他之妾尤氏以上俱於乾隆八年旌表輕車都尉覺羅胡八什之妻何氏覺羅常住之妻劉氏以上俱於乾隆九年表旌覺羅瑟琿之妻薩哈爾察氏㕘領覺羅馬海之妾唐氏以上俱於乾隆十年旌表大學士覺羅勒德渾之妻江氏覺羅泰啟之妻他塔喇氏庫使覺羅扎克丹之妻鈕祜禄氏覺羅和章之妻畢拉喇氏覺羅那爾泰之妻何氏以上俱於乾隆十一年旌表二等侍衛覺羅長德之妻李氏佐領覺羅八十之妾郭氏雲騎尉覺羅順代之妾楊氏以上俱於乾隆十二年旌表覺羅海柱之未婚妻𤓰勒佳氏覺羅滿保之妾林氏以上俱於乾隆十四年旌表覺羅那爾尚之妻于氏乾隆十五年旌表覺羅德供之妻巴雅拉氏三等侍衛覺羅布庫德之妾王氏以上俱於乾隆十九年旌表員外郎覺羅禄保之妻伊爾根覺羅氏覺羅忠善之妻鈕祜禄氏覺羅哲爾金之妾董氏以上俱於乾隆二十年旌表覺羅扎蘭泰之妻𤓰勒佳氏覺羅色勒圖之妻碧魯氏以上俱於乾隆二十二年旌表覺羅德書之妻何氏覺羅特謹之妻崔氏覺羅德常之妻納喇氏以上俱於乾隆二十三年旌表八品筆帖式覺羅摶起之妻蘇佳氏覺羅滿秀之妻佟吉氏覺羅傅永之妻伊爾根覺羅氏覺羅明亮之妻孔氏覺羅永泰之妻張佳氏以上俱於乾隆二十四年旌表覺羅鄂岳之妻嚴氏覺羅色爾圖之妻蘇氏覺羅富蘭泰之妻王氏覺羅金保柱之妻烏佳氏以上俱於乾隆二十五年旌表覺羅巴吉里之妻史佳氏覺羅三泰之妻洪郭洛氏覺羅岱齊禮之妻黄佳氏以上俱於乾隆二十六年旌表覺羅布庫之妻納喇氏乾隆二十七年旌表覺羅滿岱之妻車齊合特氏覺羅殷泰之妻戴佳氏覺羅珠興額之妻舒穆魯氏覺羅阿林之妻胡氏以上俱於乾隆三十年旌表覺羅雙齊之妻佟佳氏覺羅八代之妻洪郭洛氏以上俱於乾隆三十一年旌表覺羅鄂穆拜之妻納喇氏覺羅福禄之妻徐氏以上俱於乾隆三十二年旌表覺羅查庫之妻馬佳氏覺羅社楞額之妻納喇氏以上俱於乾隆三十三年旌表覺羅安岱之妻佟氏乾隆三十四年旌表覺羅費揚武之妻劉氏覺羅富常之妻烏佳氏覺羅恒山之妻伊爾根覺羅氏覺羅滿岱之妾馬氏以上俱於乾隆三十五年旌表覺羅色勒布之妻趙氏覺羅長和之妾田氏覺羅那保之妾王氏以上俱於乾隆三十六年旌表覺羅明柱之妻叩德氏覺羅雙福之妻納喇氏以上俱於乾隆三十七年旌表文舉人覺羅多敏之妻楊氏乾隆三十八年旌表覺羅常住之妻納喇氏乾隆三十九年旌表覺羅鳳安之妻汪佳氏覺羅永錦之妻𤓰勒佳氏以上俱於乾隆四十一年旌表䕶軍覺羅燕貴之妻齊瑪里氏乾隆四十二年旌表䕶軍覺羅佟保之妻包氏覺羅新泰之妻孫氏覺羅闗秀之妻納喇氏覺羅恒英之妻梁氏以上俱於乾隆四十四年旌表覺羅達薩塔之妻蘇佳氏乾隆四十六年表旌覺羅福吕著之妻榮氏覺羅岱興之妻舒穆禄氏以上俱於乾隆四十八年旌表覺羅五福之妻𤓰勒佳氏乾隆四十九年表旌覺羅塔爾布之妻納喇氏覺羅央平之妻羅氏覺羅永舒之妻蘇氏以上俱於乾隆五十一年旌表覺羅隂德保之妻都佳氏乾隆五十二年表旌覺羅額爾登額之妻汪佳氏覺羅富昌之妻高佳氏覺羅廣德之妻和舍氏以上俱於乾隆五十三年旌表覺羅佛喜之妻富察氏覺羅禮泰之妻李氏以上俱於乾隆五十四年旌表覺羅平泰之妻周氏覺羅清海之妻納喇氏以上俱於乾隆五十五年旌表䕶軍覺羅阿爾綳阿之妻張氏乾隆五十六年旌表領催覺羅興額之妻李氏乾隆五十七年表旌覺羅三德之妻納喇氏覺羅麟現之妻𤓰勒佳氏以上俱於乾隆六十年旌表欽定八旗通志卷二百四十二
