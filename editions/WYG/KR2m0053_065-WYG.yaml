陞轉由小京官中書筆帖式補授者授為主事由本處總管補授之八旗游牧員外郎員缺令該總管於本處散秩官筆帖式及驍騎校䕶軍校内遴選人去得者保送理藩院引見補授如保送之人平常將京城本旗通曉滿洲䝉古字語之䕶軍校驍騎校䕶軍内遴選辦事去得者亦由理藩院引見補授均於本處以佐領陞轉不准調京乾隆二年議准由京補授游牧員外郎八人其由小京官中書筆帖式授為主事者三年無過該總管保題實授員外郎在員外郎任五年期滿令該總管出具考語咨部註冊其由六部出身之人仍竢六部䝉古員外郎員缺無論保題陞選補用二人後將年滿游牧員外郎論俸咨取一人調補由理藩院等衙門出身之人亦竢理藩院等衙門蒙古員外郎員缺無論保題陞選補用二人後將年滿游牧員外郎論俸咨取一人調補如五年内遇有應陞以陞銜留任仍以陞銜較俸陞轉驛站各官雍正十二年議准盛京五路驛站正副監督各一員由盛京五部堂官於郎中員外郎主事内公同遴選人明白能管理者各一人出具考語題請實授管理三年令盛京戸部兵部㑹同稽察驛站副都統察明該員果能整飭驛務錢糧不致浮冒保題到日由兵部移送到部照例議叙如有浮冒錢糧廢弛驛務等事題㕘治罪乾隆四年奏准驛站正副監督二人請照關口官之例三年内如遇論俸應陞時以陞銜留任仍以陞銜較俸陞轉又奏准張家口喜峯口獨石口殺虎口古北口管站員外郎員缺由理藩院於該院員外郎内遴選引見差徃管理三年期滿照例更代所遺更代員缺不行開選即將換囘之人頂補又議准寧古塔驛站官二員由該將軍於本處倉官筆帖式内毎一缺遴選二人擬定正陪出具考語咨部引見由倉官八品筆帖式補用者授為七品由未入流筆帖式補授者授為八品六年任滿該將軍出具考語咨部註冊七品官以京城主事等員缺陞選八人後陞用一人八品官以京城正從七品小京官員缺陞選六人之後陞用一人至黑龍江驛站官員缺由該將軍於本處應陞之官遴選正陪咨部引見補授邊地同知通判雍正十一年奏准理事同知有管理民人辦理刑名之責必得通曉漢文律例之人方能勝任應令各部理藩院將滿洲䝉古員外郎主事内通曉漢文人明白者遴選引見補授乾隆四年議准各部院衙門遇有保送理事同知通判之時將京察一等合例人員内保送倘此等人員内如有服制未滿現患疾病及實有不能離京情莭並通曉部務而不宜於外任者均令該堂官将不便保送情由逐一聲明過部别行遴選合例人員保送五年議准各邊地理事同知員缺除員外郎不行補用外由部行文内閣並部院衙門於滿洲䝉古内京察一等之主事小京官筆帖式遴選通漢文曉蒙古語賢能之人保送過部㑹同理藩院並各部院遴選考試漢文及䝉古字語務期循名責實分别去取引見補授其邉地理事通判員缺除主事不行陞用外止將小京官筆帖式一例考試註冊補用威逺堡等關口守口官雍正十一年議准威逺堡等六關口各設守口官一人盛京兵部㑹同盛京將軍於五部員外郎主事小京官内毎一缺遴選二人擬定正陪咨部引見補授二年期滿仍令盛京兵部㑹同盛京將軍察明該員果能黽勉効力者保題到日由部按該員原銜議叙如㝷常供職者即咨囘部以應得之官補用如有怠忽廢弛等事即行題㕘若二年内遇有應陞以陞銜留任即以陞銜較俸乾隆八年議准六關口守口官以原銜管理關口事務其本任員缺毋庸别行開選二年期滿各囘原任其有黽勉効力保題議叙者仍照舊例保題議叙如係在京人員補授者年滿之日仍照舊例調補京官其未經調補之先業經任滿者仍囘原衙門辦事遇有在京員缺由部照例調補盛京銀庫各官雍正元年議准盛京戸部銀庫掌關防監督一員由在京部院堂官遴選郎中出具考語咨部引見恭候欽㸃管理三年期滿更代乾隆三年議准盛京戸部銀庫増設員外郎一人於該部司分員外郎内遴選一人管理庫務三年期滿照例調京仍於司分員外郎内遴選調補所遺司分員外郎缺再行咨部銓補壇廟守衞官順治初年定凡守衞天壇地壇社稷壇太廟堂子皇史宬官並朝鮮通事員缺由禮部及該旗開送正陪移咨過部五品以上引見補授六品以下本部堂官騐看補授盛京工部司匠康熙二年題准司匠員缺由盛京五部暨在京各部院衙門九品筆帖式令堂官各遴選一人保送過部列名引見補授如有奉㫖記名者由部註冊知照該部遇司匠缺挨次補授奉天等處倉官原例奉天黒龍江寧古塔等處各倉倉官員缺由将軍副都統五部堂官於各本處八九品未入流筆帖式内每一缺遴選二人擬定正陪出具考語咨部引見補授乾隆五年議准黒龍江等處倉官伊等均係本處生長之人其有無力搬移不能来京情願守候本處武職員缺者與豫行保舉之領催等一并咨送兵部引見俟奉㫖記名後遇本處驍騎校員缺令該將軍酌量與記名之領催一併陞補八年議准由筆帖式遴選補授倉官其筆帖式原缺不必開選三年任滿如居官好堂官保題到部歸於单月遇有本處應陞之主事將本處人員陞用三人後陞用一人其筆帖式原缺即行開選若係尋常之人出具考語咨部註冊仍囘筆帖式原任以在京各項小京官員缺於雙月分推陞三人之後陞用一人鳳凰城迎送官乾隆五年奏准迎送官三員定為八旗公額遇員缺由禮部該旗咨部本部行文各旗將騎都尉以下驍騎校以上官員毎旗遴選一人出具考語咨送過部由部騐看擬定正陪引見補授如以驍騎校補授授為五品滿官掌印順治十八年題准各部院衙門堂司悉令滿官掌印六科及京畿道河南道掌印由都察院題請欽㸃其餘各道以現任資深者轉補各部院屬司由各該堂官遴委郎中掌印若郎中有事故則遴委員外郎掌印陞補武職世爵各官兼理部院順治年間定由郎中員外郎官補授㕘領佐領者均兼部院行走其由員外郎等官補授㕘領由主事等官補授佐領者均解部院職任康熙四十五年題准凡由㕘領男爵輕車都尉補授郎中等官由副㕘領侍衞騎都尉佐領補授員外郎等官雲騎尉補授主事䕶軍校驍騎校補授小京官均俟三年限滿遇有陞轉將武職食俸年分以上朝之日起通行較算如原係部院主事筆帖式授為侍衞佐領復用員外郎等官者陞轉時將前在部院之俸及現任之俸准其積算其在武職上行走之俸不必通理雍正八年議准由郎中等官承襲輕車都尉由員外郎等官承襲騎都尉由主事等官承襲雲騎尉者均屬班聨相等應令兼理部院其世爵品大文職品小除奉特㫖兼理部務者不行開缺外餘均令世爵上行走所遺員缺即行銓補如果有才能出衆因世爵品大不行兼理者准該堂官具奏保留引見恭候欽定其循分供職者照例開缺不得奏請兼理倘有請托徇情等弊引見時其人不勝保留或保留之後辦事不能妥協即将保奏之堂官嚴加議處乾隆十三年奏准八旗世爵及武職官員改補文職者輕車都尉㕘領以科道郎中用騎都尉副㕘領佐領以員外郎用雲騎尉以主事用䕶軍校驍騎校等以七品小京官用其世爵均仍帶於本身侍衞有奉特㫖以文職用者一等侍衞係三品應以三品京堂用二等侍衞係四品應以四品京堂用遇有員缺三品者開列於應陞人員之前四品者開列於俸深人員之前請㫖補授此内各員缺如有應用科甲以及考試擬正陪者仍照例不行開列至三等四等侍衞係五品應將三等侍衞以郎中用四等侍衞以員外郎用藍翎侍衞係六品應以主事用遇有員缺歸於月分照例補用宗人府題補各官並出差雍正二年議准宗室理事官由鎮國將軍輔國將軍副理官由奉恩將軍佐領經歴主事由廕生五六品官并考取一等閑散宗室均由宗人府擬定正陪引見補授乾隆二年奏准宗室理事官遇有郎中應陞員缺與旗員郎中一例較俸開列陞轉三年議准宗人府理事官凡遇出差亦令該部行文宗人府將才能俸深者保舉一人咨送該部與各部院保送之旗員一同引見候㫖簡用内務府堂郎中等官陞轉乾隆五年奏准内務府官員向由内務府陞轉其堂郎中總理六庫事務郎中等三缺經内務府奏准咨送過部以應陞之官列名應准其與部院官一例較俸陞轉此内有由漢軍郎中遴選調補者應令其以補授堂郎中等缺之日扣算食俸三年之後再行接算前任郎中之俸與漢郎中一例較俸陞轉若暫時差往外省本任不行開缺者仍照現任官例論俸陞轉其出差例有年限如鹽政關差等項本任員缺内務府别補有人亦應准其論俸仍竢扣滿年限再行擬陞未經差滿之時如應陞道府准其以陞銜註冊俟差滿囘京照依原陞補用其未經差滿之前如尚未陞用竢囘京之時未經補用以前仍不准算俸得官之後或仍補堂郎中等缺或補授對品官方准一例較俸推陞漢軍典籍陞轉乾隆三年議准以推陞中書後准其與漢中書較俸以主事同知兼掣與各項應陞人員一例推陞漢軍年滿大使陞轉乾隆四年奏准戸部三庫及戸部寳泉局工部寳源局大使均由筆帖式補授五年期滿仍照原筆帖式品級以應陞之官用其由漢軍筆帖式補授大使年滿者歸於雙月如遇應陞京官班次與漢軍俸深人員分缺間用如遇應陞外官班次歸於即陞月分與在外各項即陞人員通較日期先後補用其未入流筆帖式改為九品者陞轉之處仍照品級考所載以州同州判縣丞陞轉京官降調候補順治年間定京堂降官三品以上者悉照品級對品别官補用降從六品者不補光䘵與署正以正七品用仍支六品俸與六品一例較俸陞轉降至正九品者以九品筆帖式用滿官並無正九品故准補筆帖式陞正從八品之缺䝉古官員降至七品以上者准以原銜借補中書降至八品以下者以原銜借補理藩院司務如有情願補筆帖式者准其具呈補用漢軍降至從八品者不補典籍因係中書陞補之官並無應補班次以筆帖式用帶餘級食俸仍陞八品官外任旗員降補京官乾隆十四年奏准各省理事同知通判遇有降調者悉照京官降調至滿洲蒙古知縣事同一例應均以京官降調嗣後凡降一級者即以七品筆帖式改補降至八品者即以八品筆帖式改補降至九品者即以九品筆帖式改補十五年奏准外任道府以下滿洲䝉古人員如由正印降調赴補者准其各按品級遇正印佐貳員缺均准降補如由佐貳官降調赴補者不准降補正印均以對品别官補用惟降至從六品以下除正七品之知縣一項由正印官降調者尚堪補用外其餘均係首領並無補用旗員之例考定例内理事同知通判降調者原以京官補用但京官品大外官品小若降至外任無可補之缺槩以京官對品借補未免過優嗣後凡降至從六品以下者皆降一等以京官補用如降至從六品者以正七品之小京官借補降至正七品者以從七品之小京官借補降至從七品者以正八品補用但滿洲䝉古無正八品之小京官應均以從八品之小京官降補降至從八品以及正九品者均以九品筆帖式補用不准仍帶原銜以上降調借補小京官人員有情願告降補用筆帖式者仍按品級准其以七八品筆帖式降補開列出差監督乾隆七年議准凡户部開列大小各差監督於毎年十月内行文過部咨取八旗應出大差官員按旗通行論俸每旗覈送五人應出小差官員較一任俸每旗亦覈送五人將職名開单叙明俸次移送戸部開列卓異理事同知通判等官陞轉雍正十三年議奏歸化城等處同知通判及協理各官停其三年更代若遇才守出衆者題請陞擢不及者黜革供職勤謹者仍照原銜較俸推陞奉㫖依議乾隆五年奏准各省滿洲理事同知通判如有卓異之官經該督撫具題到部俟來京引見奉㫖註冊後歸於毎年二四六十月分除各項不積算人員及應選班次仍照例辦理外如遇應陞月分不論食俸深淺以應陞之官先儘陞用仍以陞班積算倘有俸次已深者仍准論俸推陞其卓異應陞之處銷去欽定八旗通志卷五十一
