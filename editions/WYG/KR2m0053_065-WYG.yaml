body:
  text: 欽定四庫全書欽定八旗通志卷五十一職官志十開列大學士尚書雍正五年奉㫖凡補授大學士尚書時應否令其在議政處行走具奏請㫖欽此乾隆五十六年奉上諭國初以來設立議政王大臣彼時因有議政是以特派王大臣承充辦理自雍正年間設立軍機處之後皆係軍機大臣每日召對承㫖遵辦而滿洲大學士尚書向例俱兼議政虚銜無應辦之事殊屬有名無實朕向來辦事祗崇實政所有議政空銜着不必兼充嗣後該部亦毋庸奏請欽此四五品京堂雍正六年議准通政使司副使大理寺太常寺太僕寺少卿鴻臚寺卿等缺均不分滿洲蒙古通行論俸開列陞補其郎中應陞各缺除内閣侍讀學士仍按滿洲䝉古補用乾隆三年議准滿洲䝉古科道均准内陞外轉遇有京堂員缺先將内陞科道開列具題補用一人再有缺除科道毋庸開列外將俸深郎中論俸開列四人引見候㫖簡用其出差外任者不行開列如内陞科道無人仍將俸深郎中論俸陞補科道不准通行論俸四年奏准内閣滿洲漢字侍讀學士員缺將漢字出身之郎中等官論俸擬出十人送内閣考取擬定正陪交部與各項記名議叙人員一同開列引見補授其内閣清字侍讀學士二員將應陞各官論俸擬正陪陞補五年奏准凡降級補四品京堂人員遇有缺如値内陞班次即以奉㫖降級日期與奉㫖内陞日期論先後一同開列如值俸深班次將降級應補人員列名在俸深應陞人員之前一同引見若奉㫖將降級之人補授無論内陞俸深班次均不積算如上次用内陞則下次仍用俸深不算過班其通政使左㕘議光禄寺鴻臚寺少卿員缺將應陞之滿員外郎等官除出差外任不行開列外論俸開列四人引見如有降級應補人員列名在俸深應陞人員之前一同引見候㫖簡用又奏准奉㫖記名各官如由科道記名者遇有應陞與内陞之科道論奉㫖日期先後開列具題由郎中等官記名者開列在俸深郎中之前將記名之處聲明一同引見候㫖簡用補授後各按本班照例積算又奏准議叙應陞四品京堂之科道郎中等官均論其議叙奉㫖日期先後遇有員缺入於俸深郎中等官開列四人之末依次引見候㫖簡用若遇内閣侍讀學士員缺如係清字之缺其應陞人員無論清漢字様均行開列如係漢字之缺其議叙人員察其漢字出身者仍照例開列其由清字出身者停其開列乾隆五十五年六月欽奉諭㫖科道内陞外轉之例停止乾隆五十六年正月奏准通政使司副使大理寺少卿由四品京堂開列太常寺少卿鴻臚寺卿由内閣侍讀學士五品京堂欽天監監正及科道賛禮郎鳴賛叅領引見補授太僕寺少卿由内閣侍讀學士五品京堂科道叅領開列又通政使司叅議光禄寺少卿鴻臚寺少卿由五品京堂及科道開列具題又内閣侍讀學士由科道與郎中分班引見補授乾隆五十五年議准内閣侍讀學士滿員四缺由五品京堂及科道各保一員帶領引見一次由部院堂官於郎中内擇其實係辦事出力者各保送一員按依部分帶領引見一次翰詹官員順治初年定翰林院侍讀學士員缺由侍講學士轉侍讀員缺由侍講轉詹事府左庶子員缺由右庶子轉左中允由右中允轉左賛善由右贊善各轉補雍正四年議准侍講學士侍講詹事府少詹事右庶子洗馬右中允等員缺將應陞之翰詹官員與科甲出身之部屬應陞官員分班簡用均論俸擬正陪引見請㫖如部屬無科目出身人員即將翰詹官員陞補十二年奉㫖滿洲贊善員缺將俸深之小京官筆帖式各一人引見請㫖著為定例欽此乾隆七年議准翰詹員缺凡開復降補人員亦列名於應陞官之前一同引見補用十三年奏准嗣後於六部滿員外郎内每部酌定一人作為科甲人員陞轉之階遇有員缺將科甲出身之主事等官陞用俾翰詹衙門陞轉時不致乏人又奏准内閣侍讀學士翰林院侍講學士侍講詹事府少詹事庶子洗馬員缺其論俸應陞擬正人員遇有出差者或將論俸擬正之人補授或將其次論俸應陞之人别擬正陪引見補授之處皆行奏聞候㫖遵行十六年具奏見出有侍講一缺上次已用部員此次應用翰詹但應陞編檢班内止有檢討一人既不便即將該員指補亦不便因無擬陪之人將該員扣除别將部屬人員陞用相應請㫖可否將此一人擬正將科甲部屬人員論俸擬陪一并引見之處恭候欽定奉㫖擬陪人員一并引見五十六年奏准少詹事專以學士陞任學士專以侍讀侍講洗馬司業陞任將外班揀選之處查銷中允賛善免其試俸又内班無人由外班抵補俟内班有人時按次歸還翰詹兼理部務乾隆元年議准翰林院侍讀學士侍講學士詹事府少詹事庶子等員缺由科道郎中等官陞補者均不令兼管部院事務其員缺别行銓選由員外郎等官陞補翰林院侍讀侍講詹事府洗馬主事等官陞補詹事府中允小京官陞補贊善如係熟練部務之人准各該堂官奏留辦事兼兩處行走其該堂官不行奏留者照例開缺稽察宗室覺羅各學乾隆二年議准宗室覺羅各學奏㸃滿漢文臣稽察由部行文各衙門咨取三四品科甲出身文臣學問淵博繙譯精通者開列職名奏請欽㸃十二人兩翼宗學分㸃四人左翼四旗覺羅學分㸃四人右翼四旗覺羅學分㸃四人督率教習勤加訓迪仍同該管王公不時稽察如遇陞遷外任事故等項出缺由部别行開列具奏遴選國子監司業雍正六年奏准滿司業員缺傳齊應陞各官交九卿遴選四五人由部引見恭候簡用七年議准蒙古司業員缺由部傳齊各部院䝉古郎中員外郎㑹同理藩院遴選能繙譯䝉古文藝通曉清文蒙古字語者四五人由部引見恭候簡用科道雍正五年遵㫖議准稽察宗人府御史二人由宗人府於宗室内簡選引見補授仍屬都察院統轄十二年議准滿給事中員缺由部行文都察院咨取前任宗室滿洲䝉古監察御史通行引見轉補再䝉古御史二缺毎遇轉科時將所遺之缺歸於滿洲陞補俟蒙古科員缺出之後如將滿御史轉補即以所出之缺歸於䝉古陞補統計䝉古科道二缺十三年議准滿洲䝉古御史員缺行文咨部令該堂官於郎中員外郎等官内保送引見候㫖簡用乾隆三年奏准將應行考選之各部院郎中員外郎通行引見其奉㫖記名者遇有御史員缺將奉㫖記名之郎中員外郎各論俸次郎中二人員外郎一人引見補授八年覆准宗室御史遇滿洲御史内陞時准其一同開列各科給事中員缺亦准其與滿洲御史通行引見如將宗室御史轉補科員所遺宗室御史員缺自應别行補授但宗室御史原奉特㫖設立二人令其專察宗人府事件既不便額外増設又不便令滿洲御史稽察請嗣後如宗室御史轉補科員後所遺宗室員缺將滿洲人員補授其稽察宗人府事件即令轉補之宗室科員與現任宗室御史一同稽察至宗室科員陞轉滿洲御史轉補之後再將宗室御史員缺照例補授四十六年復添稽察宗人府監察御史二員俱交與宗人府於宗室内㨂選引見補授令都察院統轄又議准滿洲䝉古監察御史其各衙門司員補授之後俱不准奏留仍兼行走惟刑部有諳悉律例理藩院能習䝉古文語之員奏請留部者亦必帶領引見應否准其仍留行走之處恭候欽定戸部庫官調補乾隆三年奏准戸部三庫郎中員外郎員缺由該堂官行文各部院於郎中員外郎内遴選潔已奉公辦事勤慎之人保送該庫堂官引見調補三年期滿照例更代五年奏准戸部三庫年滿官員即以各衙門調補所遺之缺轉補其有品級不相當者以原銜暫行轉補俟在京有對品員缺不論雙单月由部即行具題坐補將所遺之缺再行開選九年奏准三庫掌籍主事一人三年期滿應照郎中員外郎之例於各部院滿主事内遴選調補仍於三年期滿照例更代又奏准司庫職司出納稽覈盤騐大使亦有監收錢糧呈報批文之責請均一例令三年更代三庫司庫等五人於各部院衙門正七品從七品小京官遴選保送調補竢調庫後各准其仍以原銜辦理司庫事務其由三庫更代之司庫等亦各以原銜辦理所代官員事務均令仍食各本身原俸統竢有缺時由部各按缺底詮選三庫大使四員於各部院衙門現任滿洲筆帖式内遴選更代遇員缺行文各部院衙門各保送一人由該庫堂官毎一缺遴選二人引見調補其各部院衙門調補之筆帖式准其以筆帖式辦理大使事務由三庫更代之大使等亦各以原銜在所代筆帖式上行走均令仍食各本身原俸統竢有缺時由部仍各按缺底按旗補用十四年奏准三庫員外郎員缺内閣侍讀亦准一同遴選引見如䝉恩准調補三庫即將該員授為員外郎其更代之員外郎交部即用工部庫官調補康熙十年題准工部節慎庫郎中員外郎員缺由工部郎中員外郎選擇調補製造庫員外郎員缺由部照例陞選乾隆十八年諭工部製造庫郎中員缺𦂳要向例由吏部將六部俸深郎中擬定正陪引見多係年老平常之員往往不得其人嗣後遇有員缺著工部堂官於本部司官内遴選保題引見補用欽此歩軍統領衙門員外郎等官雍正十二年奏准步軍統領衙門員外郎員缺各部院將主事等官保送該衙門遴選通曉清漢文移熟悉刑名者補授主事員缺即於該衙門司務筆帖式内遴選補授均由該統領帶領引見司務員缺由該統領於筆帖式内遴選咨部題補各部院堂主事康熙十五年題准起居注衙門滿堂主事六部理藩院漢軍堂主事員缺令各部院衙門將熟習繙譯之應陞主事人員出具考語保送過部㑹同本部堂官遴選正陪由部引見補授内閣侍讀康熙十六年題准滿洲䝉古漢軍侍讀員缺由内閣於中書内毎缺遴選二人擬定正陪出具考語咨部引見補授内閣中書雍正二年覆准滿中書員缺由内閣於貼寫中書内按旗毎缺遴選二人擬定正陪咨部引見補授乾隆五年議准貼寫中書補用五人外遇有宜用各項舉人出身之筆帖式應令内閣㑹同本部將此項人員與貼寫中書一同考試繙譯擇其佳者引見補授十三年奏准滿洲中書共七十人酌定毎旗各七人共五十六人其餘十四人定為八旗公額十五年奏准嗣後八旗額設滿中書五十六人歸貼寫中書按旗分遴選擬定正陪引見補授外其餘公額滿本房七人漢本房七人共十四人改為考取班次挨旗輪補俟有員缺行文該旗將閑散文舉人繙譯舉人咨部移送内閣與該旗貼寫中書㑹同考試每缺考取二人擬定正陪引見補授蒙古中書乾隆五年議准遇員缺由部將應用之現任䝉古筆帖式並文舉人出身之筆帖式及閑散之文舉人不論旗分一同移送内閣考試繙譯擬定正陪引見補授補用五人後將降調人員免其考試補用一人如降至從六品者以原銜借補中書仍支原俸陞轉其由理藩院等衙門筆帖式考取者以理藩院等衙門陞用由六部等衙門筆帖式考取者以六部等衙門陞用再唐古忒中書員缺由唐古忒學出身之筆帖式陞用九年議准内閣新設䝉古貼寫中書六人應照滿洲貼寫中書之例分班間用嗣後遇有蒙古中書員缺先將䝉古貼寫中書論俸擬用一人次將蒙古各項人員考補一人均分班間用漢軍中書乾隆五年議准遇有員缺由部將應用之現任漢軍筆帖式及閑散舉人不論旗分一同移咨内閣遴選考試擬定正陪引見補授掌關防郎中乾隆元年奏准孝陵奉祀掌關防郎中員缺由部行文各部院於郎中内將老成謹慎之人各遴選一人出具考語保送過部與陵寢各郎中一同較俸擬定正陪引見恭候欽定盛京三陵掌關防等官乾隆十九年覆准三陵掌關防官員缺將三陵尚茶正尚膳正内管領一并遴選題補三陵尚茶正尚膳正内管領