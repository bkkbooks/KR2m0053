body:
  text: 兵制志謹案十紀以來以兵定天下者黄帝為首故言兵制者始風后之握竒經其書真偽不可知其公孫宏等之註釋真偽亦不可知然其法律井井四竒四正變化不窮兵家終莫易其法也夏殷以前兵制不可考其可考者莫詳於周禮所謂六鄉六遂各以卿大夫司民事經理其教養修明其政令三時務農一時講武無事則各執其業有事則按井出賦合而為天子之六軍故其時軍民不分吏與將帥亦不分所謂寓兵於農其法至善秦漢以後時易勢更鎮戍徧天下而非内重即外重迄不能臂指相使綱目相維唐初設折衝果毅府畧得其意而顯慶以後浸淫漸廢藩鎮遂割據而不寜核其因革之由知古聖人慮逺而計周也我朝出震乘乾用武功開國定制以人户𨽻佐領以佐領𨽻㕘領以㕘領𨽻都統副都統皆司其版籍經其土田掌其教化平其訟獄而歸於詰其戎兵於周禮鄉遂之法如重規叠矩誠所謂先聖後聖其揆一矣至八旗之制則實同於風后之握竒蓋天地之數皆以九為紀而九數所積則皆八周外而一居中河圖洛書皆四竒四耦統於五十天有九宫地有九野皆以四正四隅環乎中央即井田之制以八家同養公田亦因天地自然之象焉風后之陣數用八諸葛亮魚腹石陣亦用八其竒正相錯而變化生正隅相輔而彌縫宻蓋以此也大聖人規矩在握造化生心黙與天地通而闇與古之聖賢合法立一時制垂萬禩洵酌古今之宜而得變通之利者矣謹臚其制度具列如左至備折衝者曰前鋒司宿衛者曰䕶軍職巡察者曰步軍戍重鎮者曰駐防以及火器營之習逺攻健鋭營之簡驍果並詳其規制條教用見我列祖列宗所以削平僭亂蕩滌洪鑪百戰無敵於天下與我皇上神謨宻運駿烈光昭坐照九天之上而制勝萬里之外武功十全為攝提合雒以來所未嘗睹者有由然也兵制志一八旗兵制太祖髙皇帝初設四旗先是癸未年以顯祖宣皇帝遺甲十三副起事征尼堪外蘭敗之又得兵百人甲三十副後以次削平諸部歸附日衆初出兵校獵不論人數多寡各隨族長屯寨行每人取矢一每十人設一牛录額真領之至辛丑年設黄白紅藍四旗旗皆純色每旗三百人為一牛录以牛录額真一轄之謹案是年為編牛录之始嗣後設固山額真梅勒章京甲喇章京等官雍正二年以八旗都統印信額真二字作主字觧非臣下所得用改為固山諳班兹敬按年月於改定以後書新名改定以前仍舊稱以昭初制甲寅年始定八旗之制以初設四旗為正黄正白正紅正藍増設鑲黄鑲白鑲紅鑲藍四旗合為八旗黄白藍均鑲以紅紅鑲以白每三百人設牛录額真一五牛录設甲喇額真一五甲喇設固山額真一每固山設左右梅勒額真各一以轄滿洲䝉古漢軍之衆時滿洲䝉古牛录三百有八蒙古牛录七十六漢軍牛录十六行軍時地廣則八旗並列分八路地狹則八旗合一路而行天命五年改設八旗官定總兵官為三等其副將㕘將遊擊亦如之各牛录額真俱為備禦官每牛录下設千總四人天聰八年五月上諭凡我國官名俱當易以滿語勿仍襲漢語舊名今悉為釐定五備禦之總兵為一等公一等總兵官為一等諳班章京二等總兵官為二等諳班章京三等總兵官為三等諳班章京一等副將為一等梅勒章京二等副將為二等梅勒章京三等副將為三等梅勒章京一等㕘將為一等甲喇章京二等㕘將為二等甲喇章京遊擊為三等甲喇章京備禦為牛录章京代子為分得撥什庫章京為小撥什庫旗長為専達屯撥什庫仍舊名凡管理不論官職管固山者即為固山額真管梅勒者即為梅勒章京管甲喇者即為甲喇章京管牛录者即為牛录章京管巴雅喇纛額真即為纛章京管巴雅喇甲喇章京額真即為巴雅喇甲喇章京嗣後皆照我國新定者稱之又上諭滿洲蒙古漢人兵衆前此騎步守哨等兵雖各有營伍未分名色故止以該管將領姓名稱為某將領之兵今宜分辨名色永為定制隨固山額真行營馬兵為阿禮哈超哈巴雅喇營前哨兵為噶佈什賢超哈駐防盛京兵為守兵預備兵為援兵各城寨兵為守邊兵舊䝉古左營為左翼兵右營為右翼兵舊漢兵為烏真超哈元帥孔有徳兵為天祐兵總兵官尚可喜兵為天助兵謹案阿禮哈超哈為驍騎營之始巴雅喇為䕶軍營之始噶佈什賢超哈為前鋒營之始天祐天助兵後俱歸漢軍䝉古兩翼後仍分八旗九年設蒙古八旗先是八年以所獲察哈爾户口分給八旗是年正月復以察哈爾來歸官兵分𨽻各旗復編審䝉古及舊喀喇沁壯丁分為䝉古八旗其旗色與滿洲同每旗設固山額真一梅勒章京二甲喇章京二分轄所編牛录崇徳二年分漢軍為二旗設左右翼二旗旗皆皂色每旗設固山額真一轄所編牛录四年分漢軍為四旗旗色一以皂鑲黄一以皂鑲白一以皂鑲紅一純皂色每旗設固山額真一梅勒章京二甲喇章京四牛录章京十八五年五月設索倫兵牛录先時索倫部自索海班師後續有三百三十餘户來降上命理藩院㕘政尼堪擇可為首領者授為牛录遂分八牛录領之六年四月上召衆於篤恭殿諭曰八家所屬牛录舊取辦事人四名銀匠五名今宜各退辦事人二名銀匠四名每牛录許留銀匠一名鐵匠一名辦事人二名王貝勒等各令家下漢人學習匠役待三年後再將各牛录匠役停止每牛录原鐵匠六名王貝勒取一名退去一名止許留四名每牛录滿洲三人中許一人披甲以六十名為常數其中或多或少務於三人中選一人他牛录甲雖有餘亦不許補不足者今後漢人匠役不許造弓箭貨賣違禁造賣者治罪各牛录人有造弓者該牛录章京親騐給角觔製造令鞍匠造鞍有弓鞍不如式及擅索弓價推諉不造者送法司治罪有舊披甲人詐稱年老令家奴代披及牛录章京之子狥私不令披甲者各固山額真牛录章京稽察其有稽察不公後被牛录首首出者罪之七年始設漢軍八旗定旗色與滿洲八旗同每旗設固山額真一梅勒章京二甲喇章京五八年六月諭户兵二部各旗閒散蒙古宜清查人丁編入佐領俱令披甲現在滿洲旗下者察其壯丁毋許混匿其諸王貝勒貝子公等家閒散蒙古編為小旗設巴雅喇轄之順治元年世祖章皇帝定鼎燕京分置滿洲䝉古漢軍八旗於京城内鑲黄正黄居北方正白鑲白居東方正紅鑲紅居西方正藍鑲藍居南方鑲黄正白鑲白正藍為左翼正黄正紅鑲紅鑲藍為右翼左翼自北而東而南鑲黄在地安門内正白在東直門内鑲白在朝陽門内正藍在崇文門内右翼自北而西而南正黄在徳勝門内正紅在西直門内鑲紅在阜城門内鑲藍在宣武門内又定八旗都統所轄甲兵滿洲䝉古旗每佐領下設親軍上三旗𨽻領侍衛府下五旗𨽻宗室王公設前鋒𨽻前鋒統領設䕶軍𨽻䕶軍統領設步軍領催及步軍𨽻步軍統領其本營領催驍騎及弓匠鐵匠鞍匠等各𨽻本旗都統漢軍旗每佐領下設步軍領催及步軍𨽻步軍統領其本營領催驍騎各𨽻本旗都統本謹案制各旗官員兵丁户口屬籍無不𨽻於都統朝兵至於簡用充補自驍騎營而外則各該管大臣分領焉其領侍衛府八旗前鋒營䕶軍營步軍營内府三旗營營制具列後卷分門備載又設盛京八旗駐防兵時以遷都燕京命内大臣何洛會為盛京總管設左右翼梅勒章京各一統領駐防兵又設直省八旗駐防兵順治二年分遣八旗兵駐防直𨽻順徳山東濟南臨清徳州江南徐州山西平陽潞安蒲州八城後依各省形勝設將軍都統副都統或但設城守尉防守尉駐防又設直省緑旗營凡直省漢兵俱以緑旗為辨總督所屬為督標巡撫所屬為撫標提督所屬為提標總兵所屬為鎮標其屬於河通總督者為河標屬於漕運總督者為漕標謹案緑旗營制屬督撫提鎮専轄不𨽻八旗都統本志不具載又設外藩扎薩克各旗先是天聰年間科爾沁各蒙古相繼欵附定鼎之後以次編旗凡内扎薩克二十五部為五十一旗每旗扎薩克一人協理旗務者無定員以王貝勒貝子公台吉等為之設都統副都統以本旗台吉兼任㕘領佐領驍騎校驍騎如内八旗之制至康熙三十年設喀爾喀各旗三十六年設賀蘭山厄魯特旗及哈宻旗四十三年設額濟内土爾扈特旗雍正三年設青海各旗十年設吐魯番旗乾隆十九年設杜爾伯特各旗各隨人衆編佐領有差設守衛陵寢官員兵丁先是天聰八年永陵設散秩官至是福陵昭陵永陵各設雲騎尉又増設散秩官嗣後盛京三陵各増設總管副總管防禦驍騎校等員又於京師東陵西陵各設總管副總管防禦驍騎校等員順治十七年上諭嗣後固山額真清字仍稱固山額真漢字稱為都統梅勒章京清字仍稱梅勒章京漢字稱為副都統甲喇章京清字仍稱甲喇章京漢字稱㕘領牛录章京清字稱為牛录章京漢字稱為佐領諳班章京清字稱為諳班章京漢字稱為總管烏真超哈清字稱為烏真超哈漢字稱為漢軍又經大臣議定噶布什賢噶喇諳班漢字稱為前鋒統領巴雅喇纛章京漢字稱為䕶軍統領噶布什賢章京漢字稱為前鋒㕘領巴雅喇章京漢字稱為䕶軍㕘領噶布什賢専達漢字稱為前鋒校巴雅喇専達漢字稱為䕶軍校分得撥什庫漢字稱為驍騎校又定王公府屬武職官員兵丁分别親王郡王貝勒貝子鎮國公輔國公等以次設長史散騎郎䕶衛等職并府屬佐領下各設驍騎校驍騎有差禁謹案王公府屬官兵附於載於後衛兵制之後另為一條備康熙十四年設遊牧察哈爾八旗時以遷察哈部衆於宣化府大同府邊外編為八旗如内制三十八年増設總管初𨽻䝉古八旗都統後又増設都統駐張家口乾隆二十六年増設都統副都統以下官職有差康熙二十三年設三旗虎槍營以備蒐狩三十年設火器營以習火器雍正二年設圓明園八旗䕶軍營又設圓明園内府三旗分地駐劄以備翊衛謹案増設三旗虎槍等營其官制兵額詳見後卷分門備考雍正二年設漢軍藤牌兵每佐領下藤牌兵四名乾隆元年定漢軍每旗設藤牌兵一百名六年定藤牌兵歸併大營每旗百名於鳥鎗手額内挑取並簡選㕘領一人散秩官驍騎校各二人領催五人令其管轄雍正六年奏定八旗方位謹案八旗方位詳見旗分志兹不復載乾隆十三年設内府前鋒營即於内府三旗䕶軍營内簡選充額仍屬䕶軍統領管轄十四年設健鋭營總統無定員以王公大臣兼任率兩翼長八旗前鋒㕘領等統轄前鋒兵演習雲梯諸技是為雲梯兵二十六年設西域新疆駐防兵時以平定凖噶爾囘部分派滿洲兵索倫兵察哈爾兵緑旗兵視各處地形酌量分駐卡倫兵領以侍衛屯田兵領以督屯武職駐防馬兵𨽻於佐領緑旗兵𨽻於營員其四兵則各城伯克經理而以駐劄之將軍大臣總轄之各兵丁或携眷永駐或三年更代以次増設無定額十七年設盛京内府三旗總管先是順治三年設盛京内府鑲黄旗正黄旗佐領八年設正白旗佐領至是令三旗佐領皆歸總管統轄朝謹案我開國先立四旗以統人衆尋以歸附日廣以神武増設八旗以旗統人即以旗統兵𨽻乎旗者皆可為兵非必有召募之煩而後收兵之用也列聖相承規模大備内而京營則有親軍前鋒驍騎䕶軍步軍之分或用上三旗或兼用八旗外而直𨽻各省駐防兵用八旗各標及營汛兵用緑旗營百數十年増損斟酌盡善我皇上智勇天錫覲光揚烈戈所揮無思不服自西陲底定式廓版圖列戍開屯天威宣化洽至于外藩諸部奔走偕來分職編旗與内八旗相等望風懐景航海棧山武功十全超邁前古凡皆里之外固不徒矜馘獻之功睿算神謨先機决勝於萬資熊羆之力是以開窮日月搆盡乾坤洵億萬世經武之鴻圖迄乎無外者也兹謹敘兵制以恩禁衛駐防政教閲軍器馬政彚為八門依類備載䘏軍令軍欽定八旗通志卷三十二
