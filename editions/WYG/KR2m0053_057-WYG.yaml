  text: 職官志二職官禮部府兵部奉天刑部工部盛京五部禮部禮部尚書滿洲一人從一品初設滿洲承政一員䝉古承政一員崇徳三年更定禮部設滿洲承政一員省蒙古員缺順治元年改承政為尚書雍正元年以親王郡王大學士兼理部務後隨時簡任不恒置乾隆十四年定禮部滿洲尚書以兼管樂部太常寺鴻臚寺入銜永為定式左右侍郎滿洲各一人正二品初設㕘政八員崇徳三年改設滿洲左㕘政二員右㕘政三員順治元年改㕘政為侍郎定制滿洲左右侍郎各一人儀制清吏司郎中滿洲二人正五品員外郎滿洲三人從五品主事滿洲一人正六品祠祭清吏司郎中滿洲二人員外郎滿洲三人䝉古一人主事滿洲一人主客清吏司郎中滿洲一人䝉古一人員外郎滿洲二人主事滿洲一人精膳清吏司郎中滿洲一人員外郎滿洲二人主事滿洲一人蒙古一人堂主事滿洲三人漢軍一人鑄印局主事職銜滿洲一人禮部初設理事官四人副理事官七人順治七年改設滿洲郎中四人員外郎六人主事四人蒙古章京四人漢軍郎中八人員外郎五人十三年增設滿洲員外郎四人十八年増設滿洲郎中二人康熈九年裁䝉古章京二人以一人改為郎中一人改為員外郎又裁漢軍郎中七人三十八年裁䝉古郎中員外郎漢軍員外郎各二人五十七年復設䝉古郎中一人員外郎一人増設主事一人雍正五年漢軍郎中員外郎額缺俱行裁省乾隆初始定額如今制堂主事順治元年定額鑄印局主事職銜一人乾隆五年奏准添設司務㕔司務滿洲一人正八品筆帖式滿洲三十四人䝉古二人漢軍四人自七品至九品以出身為差詳見吏部篇滿洲漢軍員數順治元年定䝉古員數雍正十二年定分𨽻各司視事之繁簡以為額謹按禮部初設馬館二於宣武廣渠門儲峙牧芻以待外藩朝覲置正監督一人以本部司官充副監督一人以理藩院司官充均一年更代乾隆二十七年省監督官以馬館歸理藩院經理又禮部初設滿宣表官四人後裁二人今亦省併太常寺謹附識於此樂部總理樂部事務王一人總理樂部事務禮部尚書一人各部院内務府大臣無定員乾隆七年始置樂部以親王尚書大臣兼理部務皆由特簡無常員和聲署署正滿洲一人署丞滿洲一人供用官滿洲八人初順治元年沿明制設教坊司以掌宮懸大樂置奉鑾一人左右韶舞各一人左右司樂各一人協同官十五人俳長二十人色長十七人歌工九十八人尋省協同官五人俳長無定員雍正元年始除樂户籍更選精通音樂之人充教坊樂工七年改教坊司為和聲署除奉鑾韶舞等官名乾隆七年定設署正署丞侍從待詔供奉供用官均以禮人部内務府太常寺鴻臚寺官兼攝所属署史十六㑹同四譯館提督㑹同四譯館禮部郎中兼鴻臚寺少卿銜一人滿洲漢人並用初制會同四譯分設兩館會同館自順治年初置即隸禮部以主客司主事提督館事十四年設員外郎品級通事一人掌㑹同館印尋省雍正十年改定會同館監督由部掄選引見用一人四譯館則簡國初沿明制置隸於翰林院立囘囘緬甸百夷西畨髙昌西天八百暹羅八館以譯逺方朝貢文字乾詔下隆十三年以四譯館閒冗無事會同四譯館改八大學士禮部定議倂入禮部為館為二曰西城館百夷館以禮部郎中一人兼鴻臚寺少卿銜兼懾之於滿漢郎中内掄選引見請任三年而代㫖簡朝鮮通事官滿洲十人初置六人後增至十六人凡六品六人七品六人八品二人無品級二人乾隆二十三年省六品四人七品四人增設八品二人朝鮮譯學置譯生二十人於下五旗朝鮮子弟内選充凡通事官員缺以譯生選補咨吏部註冊兵部兵部尚書滿洲一人初設滿洲承政二員䝉古承政一員崇徳三年改設承政一員順治元年改承政為尚書無定員五年定設滿洲尚書一員雍正元年以來以大學士及他部尚書兼理部務皆由特簡無常員左右侍郎滿洲各一人初設㕘政八員崇徳三年改設左㕘政一員右㕘政三員順治元年改㕘政為侍郎定制滿洲左右侍郎各一人武選清吏司郎中滿洲三人䝉古一人員外郎滿洲四人主事滿洲一人車駕清吏司郎中滿洲三人員外郎滿洲二人䝉古一人主事滿洲一人職方清吏司郎中滿洲四人員外郎滿洲三人蒙古一人主事滿洲一人䝉古一人武庫清吏司郎中滿洲二人員外郎滿洲一人䝉古一人主事滿洲一人堂主事滿洲四人漢軍一人初兵部設理事官十員副理事官十六員順治元年改定滿洲郎中員外郎各八人䝉古郎中員外郎各四人漢軍郎中二人員外郎六人滿洲主事四人十二年増設滿洲郎中三人員外郎五人康熈三十八年省滿洲員外郎三人䝉古郎中員外郎及漢軍員外郎各四人五十七年復設蒙古郎中一人員外郎三人增設䝉古主事一人雍正五年省漢軍郎中員外郎額乾隆初始定額如今制堂主事順治元年定額司務㕔司務滿洲一人順治元年定額馬館監督滿洲一人順治八年設滿洲監督一人扵本部司官内遴選引見補充嵗周而代筆帖式滿洲六十二人蒙古八人漢軍八人俱順治元年定分𨽻各司視事之繁簡以為額謹按兵部初設督捕侍郎滿洲一人以掌旗人逃亡之事其属有左右理事官滿洲各一人郎中滿洲一人員外郎滿洲十五人漢軍八人主事滿洲三人漢軍一人司務滿洲一人筆帖式滿洲三十四人漢軍十六人康熙三十八年俱省其職事併入刑部為督捕清吏司又初設有會同館大使一員亦康熈三十八年省又京城九門步軍及巡捕營初制以兵部職方司主事一人總司之後歸入步軍統領衙門謹識於此刑部刑部尚書滿洲一人初設滿洲承政二員䝉古承政一員䝉徳三年改設承政一員順治元年改承政為尚書七年増置滿洲尚書一員十年仍