body:
  text: 欽定四庫全書欽定八旗通志卷一百十五營建志四京城營建規制四八旗學舎八旗學舎順治十年四月工部尚書臣劉昌等議覆工科愛惜喇庫哈畨散多題准各旗設立宗學以昭皇恩玉成宗室之至意其設立書院之處該臣等偹查㑹典開載親王冊封外藩工部題眀遣官營造府第内有書院一所其郡王宗室以下止各給房價聴其自造今議親王以下宗室建立宗學或臣部酌量給與工價或令其自行建造統候聖裁奉諭㫖建立宗學著量給工價聴其自行修造雍正二年奉上諭宗室學房左右二翼著各立一所左翼給房一百三間右翼給房九十二間是年五月工部議覆准禮部文開宗室讀書之處應於公所設立學堂二所其八旗分左右翼毎翼各於公所設立學堂二所其學堂於兩翼現有官房内令該管處奏聞撥給六所交工部修理書桌椅櫈等項亦交工部置辦奉㫖依議行文該管處奏聞撥給學房行文到部之日有修理之處派員修理其書桌椅櫈等項照依來文辦送多羅順承郡王等題稱所立宗學房屋臣等親身閱看将應修之處臣衙門派官料估領請工部錢糧修理将所用錢糧核算題銷等因奉㫖依議左翼宗學坐落東四牌樓燈市口東史家衚衕西口雍正二年初設房八十八間十二年果親王奏交工部修理乾隆十八年修理拆去房十九間三十六年諴親王奏明動撥宗人府年例恩賞庫銀兩交本學㑹同宗人府衙門司員修理添盖房二間現共房六十四間右翼宗學於雍正三年初設在西单牌樓北口石虎衚衕共房八十八間乾隆十九年移設於絨線衚衕内板槗迤東共房三十六間二十八年簡勤親王奏准交内務府修理以上八旗宗學房舎雍正七年上諭八旗内覺羅佐領或有或無向未畫一今既将下五旗覺羅佐領由各該王属下撤出作為公中佐領朕意均派八旗方為妥協前者宗人府設立宗學祗令教習宗室尚未及於覺羅覺羅人衆今若一概歸併宗學教習者勢難遍及應每旗各立一衙門管轄覺羅或王或公派委一員統理令其於各該旗覺羅内揀選老成練逹品行端方者一二人分管即於該旗衙門之旁設立一學除情願在家學習者外擇其可教之人令其讀書學射滿漢兼習所派出之管轄人員不時訓誨稽察如内有行止不端不知守法安分者即回眀宗人府王等令在該旗衙門居住學習禁止出門俟其改行遷善之後再回眀宗人府王等始許出門年底彚疏具題如此則於覺羅少年子弟大有禆益而人人皆可成就著宗人府王公等會同滿洲大學士六部尚書詳悉議奏特諭是年十二月宗人府王公滿洲大學士六部尚書等議覆我皇上御極以来睦族敦宗教飬備至俯念覺羅等雖世系稍逺亦出自天潢是以由該王屬下撤出置之公中佐領兹又特命将七旗所有之覺羅佐領均之於八旗每旗各設一學令其讀書得以成就恩徳之隆實為偹至查七旗所有覺羅佐領共三十二分鑲黄旗七分正黄旗五分正白旗無有正紅旗七分鑲白旗五分鑲紅旗四分正藍旗二分鑲藍旗二分今應就便視其可移者每旗置為覺羅佐領四分将鑲黄旗七佐領内之佛保永昌阿堵鑲白旗之海蘭此四佐領移置正白旗正藍旗惟有覺羅佐領二分将鑲藍旗之永禄同保住此二佐領移置正藍旗共成四分将正黄旗之東武立正紅旗之得進圖爾得黒馬喇熈此四佐領移置鑲藍旗再八旗各擇官房一所立為衙署旁設清漢各一學八旗覺羅内自八嵗以上十八嵗以下子弟俱令入學讀書其中有情願在家讀書者聴其自便其入官學讀書者清漢隨其所願而教之如十八嵗以上已曽讀書而又願入學讀書者亦准其入學至十八嵗以上未曽讀書者不可竟無教訓於每月朔望𫝊集該旗公署宣􅊰聖諭廣訓總管一旗覺羅等之王公由宗人府将王公等職名開列奏請欽㸃每旗派覺羅二人以為督教之長即交委出之王公等㑹同宗人府王公等務擇其能管轄人去得者挑取由各部院現任筆帖式内擇其人老成能繙譯者㨂選八人每旗各分一人教授清書由禮部揀選教習八人每旗各分一人教授漢書再行文兵部将現在十五善射或已退之十五善射内無論官兵揀選八人每旗各分一人令其教射於學舎院内修一習射之地令覺羅等於誦讀之暇兼以習射所選督教之長十六人令其每日在學行走讀書之覺羅等有怠惰不學者各學之長即嚴加訓飭若不悛改即回明該旗管轄之王公等嚴加訓責如有甚劣者報知宗人府拘於本旗衙署内教訓不准出外行走即不讀書之覺羅内有行為妄亂者亦拘於衙署之中教訓不准出外行走俟痛加悛改之時告知宗人府始行放出由宗人府彚集奏聞再讀書之覺羅等若不時加考課則優劣不分無以懲勸令該管之王公等於每年春秋二季親身考騐分别等第報知宗人府登記檔案如所學之書及騎射俱優者奏聞引見擢用則劣者自知黽勉效法各加奮勵而學業可成矣至讀書之覺羅及督教人等每月各給公費銀二兩其米石紙筆墨氷炭等物俱照宗學之例行文各該部領取教清書之筆帖式教漢書之教習等亦照宗學之例教習三十六個月期滿行文吏部照例補用如懶惰不勤者咨送該部革其職銜如有多教三年者将其多教三年之處一併咨部議叙再各學之覺羅有進文生員及繙譯生員至四人者将教清漢書之教習等亦交該部議叙其教射之人亦照筆帖式給與公費其衙署學舎著各該旗揀擇足用之官房一所委員會同派出之覺羅學長估計領取官房租銀修理報部核銷再每旗挑馬甲各二名以為𫝊事之用覺羅等讀書五年如果成就多人著宗人府詳查奏聞将該管之王公議叙派出之學長等如果勤慎教導令該王公等報知宗人府另行保奏教射之人俟過五年交各該旗於伊等應陞之缺即用如怠惰不勤即㕘奏治罪如此則教習人等各得勤於訓導而讀書之覺羅等學業可成矣奏入奉㫖依議鑲黄旗覺羅學係官房一所共五十一間坐落安定門大街香兒衚衕雍正十年八月建設正黄旗覺羅學係官房一所共六十一間坐落西直門内北衛衚衕雍正十年八月建設正白旗覺羅學係官房一所共四十五間半坐落朝陽門内南小街新鮮衚衕雍正十年八月建設鑲白旗覺羅學係官房一所共三十二間坐落東四牌樓大街路東十條衚衕雍正十年八月建設正紅旗覺羅學係官房一所共五十五間坐落阜成門朝天宫内中廊下雍正十年八月建設鑲紅旗覺羅學係官房一所共四十三間坐落宣武門内象房槗西承恩寺街雍正十年八月建設正藍旗覺羅學係官房一所共五十三間坐落王府大街路西阮府衚衕雍正十年八月建設鑲藍旗覺羅學係官房一所共四十五間坐落阜成門南玉帶衚衕雍正十年八月建設以上八旗覺羅學舎雍正七年奉㫖於咸安宫設立官學其咸安宫坐落夀康宫後長庚門内乾隆十六年恭逢皇太后六旬萬夀改建夀安宫将官學移於西華門内北邉共房二十二間其咸安宫咸安門匾額即移於官學大門懸掛乾隆二十五年復移於西華門内北邉器皿庫共房二十七間其舊官學改為衣庫其匾額仍在該處懸掛四十四年拆去房三間添盖房七間以上咸安宫學舎康熈二十四年四月諭内務府今見内府佐領人員善射及讀書善文者甚少可専設學舎選可教之人令其學書習射優者録用劣者罷黜學舎應立於朕常見之處俾學習之人黽勉肄業二十五年奉聖諭於北上門兩傍所有官房三十間設立滿漢學房以上景山官學房舎順治元年十一月國子監祭酒李若琳疏言近奉諭㫖滿洲官員子弟咸就學肄業而臣衙門僻在城東北隅諸子弟往返晷短途遥臣等議得滿洲八固山地方各覔空房一所立為書院将國學二㕔六堂教官分教八旗子弟各旗下設學長四人俱就各旗書院居住朝夕誨廸臣等不時親􅍗稽察勤惰仍定於每月逢六日各師長率子弟同進衙門臣當堂考課以示懲勸下禮部議行二年題准滿洲子弟就學肄業分為四處康熙七年十月禮部尚書郝維訥等具題為咨請代題修理官學房事該臣等議得國子監呈稱鑲黄旗正白旗正紅旗官學房舎於今年大雨連綿俱行倒塌已經移咨工部覆稱係該旗自行修理本部無修官學房之例在案及移文該旗都統又稱應工部修理但八旗官學房原係部給肄業伏乞代題勅下該部修理以便官學生肄業等語查官學房係官學生肄業之處今據該監呈稱盡行倒塌工部雖從無動用錢糧修理之例但無學房恐於學業有悮相應請勅工部修理奉㫖依議十年十一月工部尚書吴達禮等議覆國子監疏稱鑲白旗官學房三間俱被倒塌仰祈勅部照修造鑲黄旗正白旗正紅旗官學房之例修造以便官學生肄業等因查康熙七年十月内禮部具題鑲黄旗正白旗正紅旗倒塌官學房舎經臣部議准盡行倒塌房每間給錢一十五千其倒塌半邉並歪斜房每間給錢七千五百文交與該旗助教自行盖造修理在案今鑲白旗官學房三間國子監既稱俱被倒塌應照例每間給錢一十五千共給錢四十五千交與該旗助教自行盖造奉㫖依議十一年正月工部尚書呉達禮等題准國子監鑲藍旗漢軍官學房廂房三間倒壊檩椽磚瓦等項俱已拆碎又滿洲官學房正房一間半漢軍官學房正房三間俱歪斜将塌照例給錢交與該旗助教自行修理奉㫖依議十二年八月工部尚書呉達禮等具題為更换官學以便誦習事該臣等議得國子監祭酒宜昌阿等疏稱現在正白旗官學房舎倒塌查従前各旗官學俱撥在寺廟盖造學房肄業今查正白旗地方演武塲傍空廟一所可以盖造學房将現在學房變價於空廟院内盖造庶官學生肄業得所等因查得正白旗舊教塲地方原有空廟一座臣部差官騐看正白旗官學倒塌房三間半其現在學房亦窄狭損壊難以肄業是實相應交與該旗助教等将現在學房變價在此廟内自行酌量盖房肄業如錢糧不足臣部查核添給奉㫖依議雍正五年十月康親王果郡王㑹同工部議覆國子監祭酒孫嘉淦條奏八旗設立官學内一條議得八旗學舎乃諸生誦習之所今每學止三四間一旗三學共十三四間不等實属狭隘應将現今官學房交還各該旗查収每旗另給官房一所二十餘間量可容百人誦讀者著本旗修理俾諸生聚處其中則學舎寛適便於誦讀矣奉㫖依議鑲黄旗官學坐落圓恩寺衚衕内坐北向南共房三十七間正黄旗官學坐落西直門大街新街口公用庫地方共三十一間正白旗官學坐落東四牌樓南小街新鮮衚衕内共房二十八間正紅旗官學坐落阜城門内巡捕㕔衚衕共房四十七間鑲白旗官學坐落東单牌樓象鼻子坑共房三十五間鑲紅旗官學坐落宣武門内頭髪衚衕共房四十八間正藍旗官學坐落崇文門内单牌樓北街東新開路共房三十五間鑲藍旗官學坐落宣武門内乾石槗東口内共房四十間以上國子監八旗官學房舎世職幼官學係乾隆十八年設每翼學舎二處欽派大臣管理鑲黄旗正白旗同在安定門交道口共房二十八間鑲白旗正藍旗同在朝陽門内乾麵衚衕共房三十二間鑲紅旗鑲藍旗同在宣武門内单牌樓北共房二十五間正黄旗正紅旗原設於阜城門内驢肉衚衕乾隆二十六年因回子貝勒霍吉斯住房狭小将學房撥給居住移設本學於西直門内大街髙井衚衕對過共房十五間以上幼官學舎雍正元年議准教塲内盖造八旗兵丁子弟學舎各五間七年正藍旗副都統正㕘領阿祿奏准設立各旗甲喇學舎教習本旗養育兵幼丁弓箭滿䝉話雍正十年上諭圓眀園兵丁朕従前未經細看此次朕往觀大閱細看沿途站立管道之圓眀園兵丁氣象較前甚優圓眀園之八旗及内府三旗賞給教習令伊等子弟學習漢書著果親王等議奏特諭是年四月果親王允禮等議覆八旗及内府三旗營房向因地勢建造故相隔逺近不一今䝉聖恩設立學舎當視營房之逺近建造查得鑲黄正黄正白鑲白此四旗營房相近應造學舎一所設教習二名正紅鑲紅此二旗營房相近應造學舍一所設教習一名正藍鑲藍此二旗營房相隔甚逺不便設立一學每旗各應造學舎一所各設教習一名其内府三旗既同一營房應造學舎一所設教習一名共造學舎五所挑取教習六名其教習於八旗及内府生員内擇其能訓誨者六名令為教習著四年一換每月給伊等錢糧二兩每年三季共給米二十一斛二斗其中如有善於教訓誠屬優等者咨行吏部即以茟帖式補用其平常者駁回該旗其教誨甚劣者将生員革退其缺另行挑取奏入奉㫖依議鑲黄旗在安定門内共房二十五間正黄旗滿洲在十刹海北大槗北魏兒衚衕羊房衚衕四處共二十二間蒙古原在武王侯衚衕共房七間半乾隆三十九年将馬圈四間改作學舎以舊學舎取租正白旗在朝陽門内南小街竹竿巷共房三十一間乾隆三十七年買置正紅旗滿洲蒙古在阜成門内西廊下共房二十五間漢軍在上岡地方共房十一間鑲白旗滿洲蒙古漢軍在東四牌樓构欄衚衕計房十一間正藍旗在大方家衚衕牛角灣西褲子衚衕趙家樓五處共房十九間半鑲藍旗在西長安門草㡌衚衕共房九間健銳營學舎乾隆四十年大學士忠勇公傅恒奏添派八旗官學教習八名其教習咨行吏部由繙譯生員監生内考取三年期滿教導有成咨行吏部入於議叙班以茟帖式補用五十年吏部奏准八旗官學教習現遺之缺勿用咨行吏部調取查禮部現有考取候補宗學覺羅學咸安宫學及國子監八旗官學各教習人數甚多應可調補俟三年期滿仍咨吏部入於議叙班内以筆帖式補用謹案此項官學俱未給房即由兵丁房内摘借設立雍正三年四月工部議覆禮部咨内務府文開遵奉恩詔設立八旗秀才童生學舎分為四處将安定門大街内官房十九間觀音寺衚衕内官房二十間給與左翼作為學堂武定侯衚衕内官房二十四間半兵部窪官房二十間給與右翼作為學堂六年十一月禮部為遵㫖議奏事准鑲黄旗滿洲都統咨稱鑲紅旗滿洲都統兼理鑲藍旗三旗事務和碩果親王等謹奏該臣等㑹議得副都統韓光基條奏設立義學一疏欽惟我皇上敦崇文教以作養人才為重立學教誨誠造就童蒙之至意也今八旗入學讀書者每旗不過數人且有總不到學堂者皆因兩旗合立一學而兩旗之人俱在各處散居其住址甚逺之生童因遇寒天雨水是以行走維艱應如韓光基所奏将八旗現有之官房酌量足用者挑選四所添設學堂四處令八旗各立一學倘有隔旗居住情願就近入别旗學堂讀書者亦准其讀書如此則肄業諸生既無逺涉之勞而教習亦得盡心訓誨矣奉㫖依議欽此欽遵行文各該旗查眀左右兩翼現在四處學堂指定某處為某旗學堂報部外再将各旗所有官房量其足用者各選擇一所添設學堂四處指明坐落分晰旗分以便移咨工部派員修理左翼四旗義學鑲黄旗義學安定門大街官房十九間正白旗義學豆腐巷官房二十一間半鑲白旗義學觀音寺衚衕官房二十間正藍旗義學崇文門内小石槗官房十四間右翼四旗義學正黄旗義學西直門内毛角灣衚衕官房九間半正紅旗義學武定侯衚衕官房二十四間鑲紅旗義學兵部窪官房二十間鑲藍旗義學西長安門草㡌衚衕官房九間㫖裁謹案八旗兩翼義學房舍乾隆二十七年奉汰以上八旗兵丁學舍欽定八旗通志卷一百十五
