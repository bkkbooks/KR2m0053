body:
  text: 人物志一百十二忠義𫝊二十四駐防八旗一一百四十七人乾隆年中共呼克圖呼克圖察哈爾鑲黄旗人委署䕶軍校乾隆二十年隨征北路迨準部就平阿睦爾撒納叛逃伊犁逆黨克什木巴朗等肆行擾亂呼克圖奉令防守軍臺遇賊戰殁賞卹如例古木布拉布坦古木布拉布坦察哈爾鑲黄旗人二品官兼佐領委署營總乾隆十九年於副都統白起隊出師北路二十年隨将軍班第駐劄伊犁八月二十四日逆黨克什木巴朗等進犯軍營與将軍等同時被害賞卹如例衮布爾呼坦衮布爾呼坦察哈爾鑲黄旗人二等輕車都尉兼佐領署副叅領乾隆十九年於副都統白起隊出師北路二十年隨将軍班第駐守伊犁時凖部初平阿睦爾撒納背叛八月二十四日逆黨克什木巴朗等進犯軍營将軍等以孤軍無援被害衮布爾呼坦死之賞卹如例恩賜雲騎尉世職承襲詳見世職表元敦元敦察哈爾鑲黄旗人由䕶軍委署䕶軍校乾隆十九年於總管五十六隊前往西路出師二十一年二月隨㕘贊大臣富徳收勦凖夷餘黨在索郭魯克地方戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表阿木爾濟阿木爾濟察哈爾鑲黄旗人姓果洛果特爾氏署防禦乾隆十九年於副都統白起隊出師北路二十一年七月隨副將軍哈逹哈往征哈薩克於圖克圖魯莫果特爾地方戰殁賞卹如例薩恰薩恰察哈爾鑲黄旗人姓巴勒特氏由䕶軍署副驍騎校乾隆十九年於總管五十六隊出師西路二十一年九月隨副都統阿敏道往葉爾𦍑招降逆回為霍集占計誘被害賞卹如例恩賜雲騎尉世職承襲詳見世職表托木果爾托木果爾察哈爾鑲黄旗人由䕶軍委署䕶軍校乾隆十九年隨總管五十六隊前往西路出師二十一年十一月自集爾噶朗撤回遇厄魯特賊衆戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表阿木拉扎阿木拉扎察哈爾鑲黄旗人由披甲授防禦乾隆十九年於副都統白起隊出師北路効力軍臺二十一年隨副将軍哈逹哈往征哈薩克七月在圖克圖魯莫果特爾地方戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表懐蘭保懐蘭保察哈爾鑲黄旗人委署驍騎校乾隆二十一年十月隨寧夏将軍和起進討巴雅爾至闢展地方為尼瑪等所害賞卹如例車凌多爾濟車凌多爾濟察哈爾鑲黄旗人以子爵署營總乾隆二十一年於總管端濟布隊赴西路軍營二十二年春命将軍兆惠等由額林哈必爾罕路進塔本集賽車凌多爾濟在營奮勉効力六月隨叅賛大臣富徳搜剿凖夷餘黨至博羅謳庫特與賊力戰殁於陣事聞奉㫖車凌多爾濟奮勇擊賊陣亡甚屬可憫賞銀一千一百兩入祀昭忠祠子那木札爾承襲頭等子爵加恩賜雲騎尉世職承襲詳見世職表五爾圖五爾圖察哈爾鑲黄旗人姓克勒特氏由䕶軍委署䕶軍校乾隆十九年於總管五十六隊前往西路出師二十二年隨總管端濟布追勦準夷餘黨在嗎唬斯游牧被害賞卹如例恩賜雲騎尉世職承襲詳見世職表伍巴什伍巴什察哈爾鑲黄旗人姓和勒伊特氏由䕶軍委署副驍騎校乾隆二十一年於總管端濟布隊出師西路二十二年十月在穆爾圖山遇賊戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表第祿巴第祿巴察哈爾鑲黄旗人任馬場總管乾隆二十二年派往軍營巡查臺站十一月在喀拉烏蘇河與塞音白勒克等賊戰殁於陣賞卹如例恩賜雲騎尉世職承襲詳見世職表札爾吉爾圖札爾吉爾圖察哈爾鑲黄旗人由領催委署防禦乾隆二十二年十一月隨都統滿福追勦沙拉斯嗎唬斯二鄂托克賊人詭稱就撫前驅除道以待行次哈拉和落與都統滿福等皆死之賞卹如例温都扎布温都扎布察哈爾鑲黄旗人任佐領隨副都統唐喀祿前往軍營乾隆二十三年四月十七日於塔木根庫勒地方遇賊戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表額莫根額莫根察哈爾鑲黄旗人姓巴勒特氏由䕶軍委署䕶軍校乾隆二十三年於總管敏珠爾隊出師西路二十四年閏六月隨叅贊大臣明瑞追勦逆回於霍斯庫魯克山戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表巴蘇巴蘇察哈爾鑲黄旗人由䕶軍委署䕶軍校乾隆二十三年於總管敏珠爾隊前往西路出師二十四年正月初六日隨副将軍富徳追勦霍集占在呼爾璊地方戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表策林策林察哈爾鑲黄旗人委署䕶軍校乾隆二十四年正月初六日隨副将軍富徳追勦逆回殁于陣賞卹如例必里克圖必里克圖察哈爾正黄旗人由前鋒校委署䕶軍校乾隆十九年於總管阿敏道隊前往北路出師二十年隨将軍班第等駐伊犁八月二十四日逆黨克什木巴朗進犯軍營與将軍等同時被害賞卹如例恩賜雲騎尉世職承襲詳見世職表巴魯巴魯察哈爾正黄旗人由䕶軍委署驍騎校乾隆十九年於總管阿敏道隊出師北路二十年隨将軍班第等駐伊犁八月二十四日逆黨克什木巴朗進犯中營與将軍等同時被害賞卹如例札玉呼札玉呼察哈爾正黄旗人姓冲果爾氏由䕶軍委署驍騎校乾隆十九年於總管五十六隊出師西路二十一年自集爾噶朗撤回遇厄魯特賊衆戰殁賞卹如例恩賜雲騎尉世職承襲詳見世襲表嘉虎嘉虎察哈爾正黄旗人委署驍騎校乾隆十九年於總管阿敏道隊出師北路二十一年十一月自集爾噶朗撤回遇厄魯特賊衆戰殁賞卹如例阿玉西阿玉西察哈爾正黄旗人由䕶軍委署䕶軍校乾隆十九年於總管五十六隊出師西路二十一年自集爾噶朗撤回遇厄魯特賊衆戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表齊旺多爾濟齊旺多爾濟察哈爾正黄旗人由䕶軍委署䕶軍校乾隆二十一年自集爾噶朗撤回遇厄魯特賊衆戰殁賞卹如例恩賜雲騎尉世職承襲詳見世職表準濟