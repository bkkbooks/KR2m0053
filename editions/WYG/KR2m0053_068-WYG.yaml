  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_068-1a, image: WYG0665/WYG0665-0185c.png}
body:
  text: 氏族志古氏族掌於太史戰國之初智果别族為輔氏尚告諸太史是舊制周末未改也司馬遷作年表王僧䖍謂旁行斜上體仿周譜盖當時猶見其書然不隸於官散佚漸盡沿及東漢乃有家牒故李善文選註引劉歆七畧有子雲家諜之文謹案諜即牒字亦無裒合諸族勒為一編者也魏晉以後甄别流品以門第官人譜學於是乎興焉至於北魏南北氏族始並見於史籍然各為宗派各有音義彼此不相假借也明陶宗儀作輟耕錄謹案宗儀入明最久其聞明恵宗即位詩有老臣忭舞之語是其顯證以為元人非也今改正妄以金源氏族分配漢姓如完顔曰王古里甲即𤓰爾佳曰汪女奚烈即鈕祜禄曰郎石抹即舒穆禄曰蕭納剌即納喇曰康紇石烈即赫舍哩曰髙蒲察即富察曰李兀顔即烏雅曰朱顔盞即顔札曰張散答即薩克達曰駱斐滿即費莫曰麻温迪罕即温特赫曰温阿里侃即阿禮哈曰何阿典即阿克占曰雷烏林達即烏林阿曰蔡抹顔即穆燕曰孟都烈即都理曰强斡勒即倭勒曰石温敦即温屯曰宋移剌即伊喇曰劉术虎即珠勒赫曰董奥屯即鄂通曰曹阿不哈即韓楚哈曰田尼忙古即尼瑪哈曰魚孛术魯即博都哩曰魯吾魯即珠魯曰恵僕散即布薩曰林烏古論即呉庫理曰商鑿空杜撰實為無稽之談流俗相傳又有𤓰爾佳姓關舒穆嚕姓徐他塔喇姓唐那木都魯姓南烏扎拉姓呉兆佳姓趙薩克達姓倉巴雅拉姓白之類沿宗儀餘波尤為乖謬夫舌人見於周官是譯語從來已久其可考者語言文字則譯意東觀漢記載白狼王懷德慕德諸歌是也人名地名則譯音史記載南單于姓攣鞮是也左傳楚令尹之名稱楚謂乳榖謂虎於莬於有義可推者尚不改字况姓氏相沿多莫詳其義而曰某當姓某不亦傎乎古來繙經諸家於佛書僅譯其語言而賓頭盧維摩詰之類姓名則概不改職是故也我國家龍興之初東北諸部率先歸附遼金元之舊姓往往而存其他因地為氏如分於别邑而稱東野因事為氏如生於平旦而稱東方者亦子孫世守雖遷徙而不改其初支派尚一一可考朝鮮密邇邊陲歸為臣僕者世系亦一一能稽漢軍之隸八旗者閥閲巨族世承爵秩大抵皆譜牒分明更不待論焉我皇上御極之初勅修八旗氏族通譜條分縷析叙述備詳近因卷帙稍繁檢尋未易又恐無識之徒拾陶宗儀之瞽説特勅廷臣編為輯要一書原原本本既簡且該為古今姓氏書之最今叙述八旗族系一以是編為宗惟是編所列氏族凡散居各地者皆標一最著之地而以等處括其餘今則凡一姓系出數處者皆一一臚列盖是編為總括便覽故僅舉大綱今則從志乘之體分詳支派所謂言非一端各有當也至國姓原始則敬遵開國方略自為一篇弁冕此門不敢與庶姓並列亦不敢題綱標目與庶姓同一體裁盖禮貴尊尊春秋之大例即古今之通義矣氏族志一國姓原始我朝肇建丕基始於長白實金源之舊地而帝系所出則氏族各别受天眷命預發其祥亦實在金源以前恭考開國方畧遼瀋極東之地有長白山即山海經之不咸山也高二百餘里綿亘千餘里山上有潭曰闡門周八十里源深流廣鴨綠混同愛滹三江出焉鴨綠江自山南西流入遼東之南海混同江北流入北海愛滹江東流入東海山川雄厚靈秀斯鍾寳珠珍石竒木靈藥應候挺生多非人迹所能到其東有山曰布庫哩山下有池曰布勒瑚里相傳有三天女長曰恩古倫次曰正古倫季曰錫庫倫同浴於池有神鵲銜朱果置季女衣試取含之倐已入腹遂覺似有身告二女曰吾身重不能冲舉矣二女曰此天授爾娠俟免身再來未晚也季女尋産一男生而能言體貌偉異及長母告以朱果之事因命之曰汝姓愛新覺羅名布庫哩雍順天生汝以定亂國其往治之汝順流而往即其地也與一小舟乗之凌虛而去舟順流至河步而止乃登岸折草木為茵端坐其上是時有三姓争雄長日搆兵尋讐亂靡由定有取水河步者見而異之歸語人曰吾適至河步見一男子察其貌非常人也衆往觀皆以為異詰所自來曰我天女所生天男天生我以定汝等之亂衆曰此天生聖人也遂交手舁迎至家奉為貝勒居長白之俄朶里城國號曰滿洲是為我大清建國受姓之始盖卜世億萬事非偶然地契天符必有靈異古帝王誕生之瑞載諸史籍及諸子百家者姑置無論若生民之詩歌於周雅元鳥之篇載於商頌皆尼山刪定列在經典前聖必無虛詞後聖必無誤信也以古證今豈不炳然有徵哉若胙土錫姓自三五以下皆權屬帝王而我朝錫土錫姓皆由神授尤攝提合雒以來未聞斯事矣謹恭述原始弁冕氏族志之首信篤承佑命垂裕無疆其所由來者久也欽定八旗通志卷五十四
