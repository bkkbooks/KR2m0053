body:
  text: 旗分志八八旗佐領八正紅旗滿洲佐領正紅旗滿洲佐領上一㕘領至三㕘領正紅旗滿洲都統所屬㕘領五第一㕘領下佐領十五第二㕘領下佐領十四第三㕘領下佐領十五第四㕘領下佐領十五第五㕘領下佐領十五第一㕘領第一佐領係國初編立始令固山額真後改固山按班漢文稱都統覺羅多弼管理多弼年老辭退以其子纛章京布爾海管理布爾海退任以其弟王府長史阿爾海管理阿爾海縁事革退以其弟之子都統巴爾布管理巴爾布縁事革退以其兄之子副都統安圖管理安圖縁事革退以其叔祖之孫副都統都業立管理都業立故以其伯祖之二世孫步軍總尉赫麟管理赫麟縁事革退以覺羅恭阿代管理恭阿代告退以其子覺羅富昌管理富昌故以其子覺羅金良管理第一㕘領第二佐領係第一佐領内滋生人丁康熙二十四年安圖管佐領時分立一佐領以其叔祖之孫勒爾慎管理勒爾慎縁事革退以其伯祖之孫副都統伊敦管理伊敦縁事革退以其叔祖之三世孫拜他喇布勒哈畨漢文稱騎都尉永普管理永普故以䕶軍覺羅富興管理富興故以其叔髙祖之四世孫法明管理法明故以其子舒寧管理第一㕘領第三佐領亦係第一佐領内滋生人丁康熙八年巴爾布管佐領時分立一佐領以其伯父之孫席林管理席林故以其父䕶軍㕘領席赫訥管理席赫訥退任以其子齊禄管理齊禄故以其叔祖之二世孫善泰管理善泰告退以其子覺羅公托管理公托故以其伯髙祖之三世孫覺羅英祖管理英祖故以其叔髙祖之四世孫西密揚阿管理西密揚阿陞任以其兄窩興額管理窩興額陞任以其伯祖之孫穆克登額管理第一㕘領第四佐領係康熙三十四年將富漢等佐領内滋生人丁編一佐領以都統七十兼管七十縁事革退以其兄之子三等公增夀兼管增夀故以其弟富吉管理富吉因人不及革退以其子常青管理常青故以其子富清管理富清故以其伯祖之子三等公恒泰管理恒泰縁事革退以其弟恒興管理恒興告退以其兄之子色楞額管理色楞額故以胡世布之三世孫能泰管理第一㕘領第五佐領初以噶布拉管理噶布拉縁事革退以恩格管理恩格縁事革退以夸占管理夸占縁事革退以其族叔祖䕶軍㕘領禪圖管理禪圖縁事革退以公彭春管理彭春因病告退以其子蘇喇章京漢文稱散騎郎富漢管理富漢因病告退以其子四十九管理四十九故以其子成福管理國謹案此勲舊佐領係初編立第一㕘領第六佐領係康熙二十三年編立始以普善之長子左通政普海管理普海陞任盛京理事官以其弟副都統噶爾泌管理噶爾泌調西安副都統以其兄之子主事干都管理干都縁事革職以噶爾泌之子廕生噶漢泰管理噶漢泰故以其弟達漢泰管理達漢泰調管第七佐領以䕶軍㕘領查海管理查海告退以岳亮管理岳亮陞任以保成管理保成陞任以四十九管理四十九陞任以恒伯管理恒伯陞任以貴中管理第一㕘領第七佐領初以罕楚哈管理後改令伊特赫管理伊特赫年老辭退以其子金特赫管理金特赫年老辭退以其弟格徳琿管理格徳琿因年老告退以達漢泰管理達漢泰陞任以其伯髙祖之三世孫兆禄管理兆禄告退以其子五十九管理五十九故以其叔祖之孫敏住管理敏住故以其子雙慶管理第一㕘領第八佐領係康熙十三年編立初以何和理額駙二世孫䕶軍㕘領拉哈管理拉哈故以其子隆坤管理隆坤故以其叔父羅達管理羅達年老辭退以其兄副都統謨達之子侍衛署䕶軍㕘領巴克三管理巴克三故以其兄之子副䕶軍㕘領三太管理三太陞任以其伯父巴裕管理巴裕故以其子董福管理董福故以其叔之孫如昌管理如昌故以其子徳山管理第一㕘領第九佐領初令鈕尼雅哈管理鈕尼雅哈故以噶布什賢管理噶布什賢縁事革退以其族曾祖宜特黑管理宜特黑故以其族叔祖副都統羅滿色管理羅滿色故以其子䕶軍㕘領李柱管理李柱故以其子皂保管理皂保縁事革退以羅滿色兄公彭春之孫黑徳管理黑徳故以其子和音布管理和音布故以其弟十格管理十格革退以其叔髙祖之三世孫合慶管理合慶革退以其伯髙祖之三世孫福太管理國謹案此勲舊佐領係初編立第一㕘領第十佐領初令夸占管理後改令吉希管理吉希故以其弟七十管理七十告退以其叔父䕶軍㕘領禪圖管理禪圖故以其子薩克素管理薩克素故以其子蘇保管理蘇保陞任以其弟徳保管理徳保革退以其弟蘇普通阿管理蘇普通阿革退以其姪蘇凌阿管理蘇凌阿陞任以其子魁敏管理國謹案此勲舊佐領亦係初編立第一㕘領第十一佐領亦係康熙十三年編立初以副都統覺羅杜爾巴管理杜爾巴故以䕶軍㕘領覺羅富爾敦管理富爾敦因病辭退以二等阿思哈尼哈畨漢文稱男朱亮管理朱亮故以其弟拜他喇布勒哈畨兼一拖沙喇哈畨漢文稱雲騎尉富永管理富永縁事革退以其族子恒徳管理恒徳縁事革退以其族兄富爾敏管理富爾敏故以其姪富昌阿管理富昌阿故以其伯祖之子二達色管理二達色故以其叔之孫額勒錦管理額勒錦故以其子舒敏泰管理第一㕘領第十二佐領係國初以朝鮮來歸人丁編立始以馬富塔管理馬富塔故以其孫一等阿達哈哈畨漢文稱輕車都尉又一拖沙喇哈畨步軍總尉邦那密管理邦那密年老辭退以㕘領阿禄管理阿禄以足疾辭退以其弟一等阿達哈哈畨又一拖沙喇哈畨副都統常來管理常來縁事革退以其弟常禄管理常禄亦縁事革退復以阿禄管理阿禄告退以其孫徳青管理徳青故以其子青山管理青山故以其叔曾祖之孫八十三管理八十三故以其叔之孫岱凌阿管理第一㕘領第十三佐領即第十二佐領内滋生人丁康熙二十三年阿