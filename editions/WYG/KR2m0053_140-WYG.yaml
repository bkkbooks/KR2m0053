body:
  text: 欽定四庫全書欽定八旗通志卷一百二十六人物志六宗室王公傳四和碩徳豫通親王多鐸貝多羅信郡王多尼原封多羅勒察尼和碩徳豫通親王多鐸多鐸太祖髙皇帝第十五子初封貝勒天聰二年二月與同母兄多爾衮從太宗文皇帝征察哈爾多羅特部大捷俘獲萬餘車駕將還瀋陽途中宴從征將士賜多鐸號額爾克楚呼爾三年十月復從征明由龍井闗入同貝勒莽古爾泰多爾衮以偏師圍漢兒荘城降之遂㑹大兵克遵化進薄京師明寧逺巡撫袁崇焕錦州總兵祖大夀以兵二萬来援屯廣渠門外諸貝勒敗之多鐸以年幼留後明潰卒来犯擊却之十二月從上閲視薊州形勢明山海闗援兵五千距城二里許列陣多鐸同諸貝勒擊敗之五年七月上征明大軍抵大凌河夜圍其城正白旗都統喀克篤禮率本旗兵圍東南之北多鐸率䕶軍兵為䇿應又與大貝勒代善等率兵三千以礮攻克明近城臺保九月明援兵七千出錦州拒我前鋒於小凌河岸上以兵二百馳擊敵潰遁多鐸追至錦州墜馬馬逸入敵陣乃乗小校扎福塔之馬而還越十日明援兵四萬距大凌河十五里列營多鐸從上擊敗之十一月與貝勒濟爾哈朗等率兵三千五百往塔山東阻截邉海隘口俘百餘人六年四月從征察哈爾林丹汗遁大兵分路前進多鐸與濟爾哈朗多爾衮等率兵略歸化城西南黄河一帶俘衆千餘八年五月復從征明七月與阿濟格貝勒等率兵自巴顔珠爾格入龍門遇明兵敗之又奉命率兩黄旗每佐領兵五名往略保安州攻克其城殺其守備㑹大兵於應州謁上籍俘獲數以獻八月往略朔州東至五臺山還從上擊敗明兵於大同城南九年二月上命貝勒多爾衮等征明山西五月諭諸貝勒大臣曰出師諸貝勒此時想已入明境明必調寧逺錦州兵往援我兵今當入寧錦界立營使彼望見我軍以牽其救援之兵遂於每佐領選䕶軍二人以多鐸為帥艾度禮阿格等輔之入廣寧境遣副都統阿山石廷柱㕘領圗賴呉拜郎邱察哈爾等率兵四百先驅多鐸率大兵繼進逾十三山站立營明錦州總兵祖大夀令副将劉應選穆祿呉三桂等率兵三千五百迎探大夀駐營錦州城外五里時明将劉成功趙國志率兵八百與應選等合兵至大凌河西與我兵遇阿山等以敵數馳報多鐸多鐸遂率所部馳赴飛塵蔽天明諸将見我勢鋭大驚奔潰阿山等四百兵突入掩殺兩路追擊斬應選殱敵兵五百擒逰擊曹得功及守備三員獲馬匹甲胄無算距錦州松山城五里收軍還翼日復攻克一臺回駐廣寧邉境旬餘乃還駕出懐逺門五里外迎勞多鐸獻陣獲官将及所得軍器馬匹上以多鐸初専閫外能出竒制勝嘉奨之賜良馬五甲五崇徳元年四月晉封和碩豫親王六月命掌禮部事八月與睿親王多爾衮等征明分兩翼王率左翼兵由錦州入降胡有陞等由義州還十二月上親征朝鮮遣戸部承政馬福塔等率兵三百為前鋒多鐸等由沙河保領兵千繼之至其都國王李倧棄國遁我兵踰城入城中軍士奔竄追之四十里至南漢山城環圍之朝鮮臣在外者聞其主被圍率兵二萬餘先後来援屢擊敗之迎上駐城西獻所獲馬械命分賚有差二年正月大兵北渡漢江營江岸距王都城東二十里許朝鮮全羅忠清兩道兵来援列營南漢山命多鐸率兵往視天方雪隂晦敵營依山而陣我兵進擊敗之追至山巔還詰旦復率兵進朝鮮兵已㧞營夜遁收其馬千餘二月朝鮮降乃班師三年二月從上征喀爾喀多鐸率本旗䕶軍兵及土黙特兵從寧逺錦州間進發大兵從義州一路進發多鐸将入邉俘斬哨卒十餘攻克桑阿爾齋舊居之大興堡斬守備一及壮丁二百俘其戸口道擒大夀所遣二諜以歸九月上至演武塲送睿親王征明王以目疾甫愈不至詔俟睿親王班師議罪旋命率所部兵往中後所助鄭親王濟爾哈朗十一月将過中後所大夀以兵来襲傷我兵九人掠馬三十王且戰且退殺敵三十人夜達鄭親王營翼日合兵至中後所上統兵至敵不敢出四年五月議前不送出師及中後所失士馬罪降多羅貝勒八月命掌兵部事十月同肅親王豪格征明錦州寧逺敗敵於城北山岡斬總兵金國鳳及其二子五年三月奉命與鄭親王分統左右翼兵往義州葺城屯田逾月畢工墾田東西四十里五月蒙古多羅特部蘇班岱等駐杏山西五里臺宻乞内附上命多鐸與鄭親王等率䕶軍兵千五百往迎之夜過錦州城南至杏山携其貲畜以行黎明松山總兵劉周智列兵環松山錦州兵續至與周智合逼我軍多鐸與鄭親王等進擊敗之追𠞰至城下斬副將楊倫周㕘將李得位等獲旗纛馬匹盔甲還賜多鐸御廏良馬一十一月圍錦州夜伏兵桑阿爾齋保旦敵至敗之追至塔山斬八十餘級獲馬二十六年三月復同鄭親王圍錦州收其守郛䝉古将諾木齊等屢敗明兵松山杏山間事俱詳鄭獻親王傳八月明總督洪承疇㑹八總兵以兵十三萬援錦州上親統大軍臨之自盛京馳六日環松山而營明兵大驚八總兵等宵遁上命多鐸設伏明總兵呉三桂王樸率兵從杏山奔寧逺我前鋒兵自杏山西追擊至髙橋伏兵起夾攻之斬殺無算三桂樸僅以身免九月上旋蹕命多鐸與諸王更畨圍松山城内兵夜出犯我鑲黄旗營我兵擊敗之斬級千餘獲礮五十七十一月承疇自松山城出兵六千夜犯我正紅正黄二旗營我兵依汛沿濠射郤之殪四百餘人七年二月明松山副將夏承徳宻約内應以其子夏舒為質夜半梯登南城生擒承疇及巡撫邱民仰總兵王廷臣曹變蛟等七月叙功晉封多羅豫郡王十月以貝勒阿巴泰為奉命大將軍由黄崖口征明薊州命王與郡王阿達禮等屯寧逺邉境牽制明寧逺援兵至則遣人入略俘百餘人敵出戰敗之多獲牲械八年四月因聖躬違和有事祈禱疏言兵者不得已而用今日之勢宜暫息兵至國中興作俟規模既定後舉行但當以農務為急農務克勤則庶民衣食豐足衣食豐足則舉國慶豫舉國慶豫則朝廷膺無疆之福而聖躬永享安和此後舉行未晚也順治元年四月從睿親王多爾衮入山海闗破流賊李自成定燕京十月晉封和碩豫親王時明福王朱由崧自立於江寧設江北四鎮扼淮徐為割據計十一月命多鐸為定國大將軍統師南征值河南奏流賊肆掠詔先𠞰賊河南十二月至孟津遣䕶軍統領圗賴先渡黄河流賊偽都司黄士欣果毅將軍張有聲潰遁沿河十五寨保望風歸附睢州明總兵許定國玉寨首領李際遇等率衆來降大兵至陜州賊将張有曽屯靈寶城外我軍夜襲敗之師距潼闗二十里立營俟紅衣礮至進攻賊将偽汝侯劉宗敏據山為陣我前鋒綂領努山鄂碩等趋破之圖賴復率騎掩殺甚多宗敏遁二年正月賊将劉方亮犯我營被我兵擊敗自成親率兵迎戰我軍協力並進殱其步卒賊騎奔復連夜來犯俱敗之既而紅衣礮至進逼潼闗賊鑿重壕立堅壁以拒遂發巨礮攻之我師相繼衝入殺賊無算賊又以騎兵三百横衝我師貝勒尼堪懐順王耿仲明貝子尚善等躍馬夾擊敗之賊又分兵躡我後蒙古都綂恩格圖領殿後軍破之諸軍連勝殱賊營精鋭殆盡自成喪魄走西安偽守闗吴山伯馬世堯率所部七千餘降獲馬千餘匹輜重兵甲無算師入潼闗獲世堯所遣致書自成者三人併世堯斬以徇越二日至西安自成已先五日焚宫室挈子女輜重出藍田竄商州南走湖廣遣䕶軍綂領阿爾津等追之不及而還二月㨗聞諭曰聞爾等破流㓂扵潼闗遂得西安不勝嘉悦初曾命爾等取南京今既破流冦大業已成即將陕西事宜交與靖逺大将軍和碩英親王等爾等即遵前命趋南京大丈夫為國建功正在此時汝其勉之三月王率兵抵河南偽平南伯劉忠迎降兵出虎牢闗分遣都綂拜音圖等出龍門闗尚書漢岱副都綂伊爾徳侍郎尼堪等綂外藩䝉古兵出南陽三路同趋歸徳州縣望風投順所至撫兵民設官屬疏請速鑄給印信以防詐偽從之諭奨其方收闗陜旋定中原𠞰㓂安民勲庸茂著賜寶飾刀鋄金鞓帶四月自歸徳趨泗州明守将焚橋遁我兵夜渡淮遣漢岱伊爾徳阿濟格尼堪杜爾徳等先驅趋揚州獲船百餘距揚州城二十里列營復遣署䕶軍綂領固納岱伊爾都齊費揚古烏達禪副都綂阿哈尼堪署副都綂格霸庫等軍城南䕶船二百餘翼日薄城下招諭明大學士史可法翰林學士衛允文等降不從遣拜音圖圖賴阿山等攻之七日克其城可法等死焉五月師至揚子江明鎮海伯鄭鴻逵等以水師分守𤓰州儀徵我軍陳北岸列營相持三日㑹日暮遣拜音圖圖賴阿山等率舟師由運河潜渡其夜五鼓復令副都統李率泰率舟師渡江留左翼兵泊北岸以備夹擊福王聞揚州失守率馬士英及諸太監遁太平大軍至南京明忻城伯趙之龍魏國公徐州爵保國公朱國弼隆平侯張拱日臨淮侯李祖述懐寧侯孫維城靈璧侯湯國祚安逺侯栁祚昌永康侯徐宏爵定遠侯鄧文囿項城伯常應俊大興伯鄒順益寧晉伯劉允基南和伯方一元東寧伯焦夢熊安城伯張國才洛中伯黄周鼎成安伯柯祚永駙馬齊贊元大學士王鐸翰林程正揆張居禮部尚書錢謙益兵部侍郎朱之臣梁雲構李綽給事中林有本陸朗王之晉徐方來荘則敬及都督十六員巡捕提督一員副將五十五員迎降其沿途来歸者興平伯髙傑子髙元照庸昌伯劉良佐提督李本深總兵胡茂正張士元郭䕶楊承祖李中星何應昌翟鳴鳳王之剛李遇春張天祿張天福李成棟李棲鳳等二十三人監軍道張健柯起鳳副將四十七人㕘將遊擊共八十六人馬步兵二十三萬八千三百捷聞諭曰皇天眷佑宗廟式靈王公將士分猷宣力方平河朔旋定江南覽王奏報朕深嘉悦王躬履戎行指授方畧克奏膚功特遣侍臣前赴軍中慰勞一應有功將帥官兵作速察叙以憑封賞時王入駐城中安撫居民令投誠軍士歸伍遣貝勒尼堪貝子屯齊等追福王于太平福王復走蕪湖登舟欲渡江圖賴等邀之江口明靖國公黄得功迎戰敗之敵兵皆墮水盡奪其舟得功中流矢死總兵田雄馬得功縛福王及其妃歸我軍初福王走太平其大學士馬士英挾福王母走杭州議奉潞王朱常淓拒守六月貝勒博洛等趋杭州士英迎戰大敗夜渡錢塘江逃潞王率衆降浙東西皆歸順明淮王朱常清亦自紹興来降王承制改南京為江南省疏授江寧安慶巡撫以下官三百七十三人復遣人至湖州移周王眷属扵杭州安置收總兵王之仁属下兵将二萬五千人有偽稱杜楊王煽亂廬州和州間者遣總兵吴勝兆等𠞰平之七月詔多羅貝勒勒克徳渾為平南大将軍至江寧命王等俘福王還京十月凱旋上行郊勞禮于南苑晉封和碩徳豫親王賜黒狐帽紫貂朝服黄金五千白金五萬馬十玲瓏鞍二三年五月以蘇尼特部騰機思騰機特等叛奔喀爾喀詔集外藩諸蒙古兵於克嚕倫河以多鐸為揚威大将軍同承澤郡王碩塞等綂師追𠞰七月師至盈阿爾察克山聞騰機思在衮噶嚕台星夜前進三日及之敗賊于諤特克山斬台吉茂海渡圖拉河追至布爾哈圖山斬騰機特子二人孫三人及喀爾喀台吉十三人盡獲其家口輜重師次扎濟布喇克喀爾喀土謝圖汗兩子以兵二萬碩雷汗子以兵三萬兩路迎戰我師奮擊大捷追奔三十餘里先後斬級數千俘千餘人獲駝千九百馬二萬一千一百牛萬六千九百羊十三萬五千三百有竒十月凱旋上出安定門迎勞錫宴所獲牲畜詔頒賚将士加賜王鞍馬一四年七月晉封輔政叔徳豫親王賜黄金千兩白金萬兩鞍馬二冊文稱其定鼎中原以來所建功勲卓越等倫云六年三月薨年三十六以其子多尼襲七年三月立碑紀功九年鄭親王濟爾哈朗等㑹議豫王係多爾衮母弟應盡削王爵上念其功止追降為郡王康熙十年五月追諡曰通乾隆四十三年正月上諭廷臣曰豫親王多鐸從睿親王入闗肅清京輦即率師西平流㓂南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勲績超邁等倫自應世胙原封以彰殊眷豈可以風影㣲眚輙加貶易命追封親王復其封號並配享太廟八月入祀盛京賢王祠多羅信郡王多尼子鄂扎多尼弟洞鄂多尼豫通親王多鐸次子崇徳七年七月封多羅郡王順治六年十月襲父和碩親王爵七年五月預議政八年二月加封號曰信九年三月追降多鐸為郡王多尼亦降多羅信郡王罷議政十月復議政十五年正月上命多尼為安逺靖冦大将軍偕平郡王羅科鐸貝勒尚善杜蘭等征明桂王朱由榔與征西大将軍平西王呉三桂征南将軍都綂卓布泰㑹於平越府之楊老堡定議分兵進取王自貴陽入呉三桂自遵義入卓布泰自都勻入約以十二月㑹雲南省城十一月王由貴陽趋安荘衛由榔将晉王李定國焚磨盤江鐵索橋遁十二月我兵以浮橋濟遂自交水至松嶺衛鞏昌王白文選率兵二萬拒我軍擊走之十六年正月薄雲南省城時呉三桂卓布泰亦至定國文選挟由榔奔永昌王入城駐守遣貝勒尚善等由鎮南州克永昌府及騰越州六月上以王䟦涉險阻經厯寒暑傳諭慰勞賜御用衣一蟒袍一及鞍馬弓矢等物十七年五月凱旋遣内大臣迎勞十八年正月薨年二十六諡曰宣和六月以其子鄂扎襲封多羅信郡王康熙十四年三月察哈爾布爾尼叛上命鄂扎為撫逺大將軍往討以大學士都統圖海副之䕶軍統領哈克山副都統吳丹洪世禄為㕘贊瀕行諭之曰大兵出山海闗當宣布累朝待布爾尼厚恩及朕不忍加誅之意彼若悔罪来歸則已否則以勅書付縱還䝉古持往諭之即布爾尼等臨陣来降亦當保全恩養今值䝉古馬瘦爾等速往毋違四月師次岐爾哈台偵賊屯達禄王留輜重以輕騎進布爾尼設伏山谷間列陣而待王與圖海等分布滿洲蒙古兵進擊厯山澗賊伏發撓我土黙特兵我軍擊破之布爾尼領大隊列火噐以拒我兵奮擊賊大敗復收潰卒戰我軍乘勝連敗之布爾尼偕其弟羅卜藏以三十騎遁至扎嚕特境貴勒蘇台為科爾沁赴調之部長沙津射殪察哈爾平王招撫餘黨編為一千三百餘户閏五月師還上迎勞于南苑諭嘉其逺行征討建立大功賜黄金百兩白金千兩二十四年掌宗人府事二十九年噶爾丹深入烏珠穆沁上命恭親王常寧為安北大将軍鄂扎副之三十五年二月上親征噶爾丹以王綂領正白旗營三十八年以惰解宗人府任四十一年十月薨以其叔洞鄂襲多羅信郡王洞鄂豫郡王多鐸第七子順治十八年正月封多羅貝勒康熙十二年冬逆藩吴三桂反扵雲南四川文武官叛應之十三年六月洞鄂奉命為定西大将軍同貝子温齊輔國公綽克托率貝子凖達所領驍騎之半由陜西進討将抵略陽陜西提督王輔臣叛于寧羗州洞鄂以道阻退次漢中留将軍錫卜臣等駐守自引兵出棧道由鳯縣至鳯翔復留副都綂赫業等駐守自率餘兵回西安十四年正月上諭廷臣曰蘭州近邊要地應速遣兵駐守今保寧大兵已回西安達禮善巴圖魯兵亦将至西安其餘西安現在兵每佐領下四五名赴蘭州𠞰禦逸賊洞鄂疏言蘭州固宜遣防但保寧還卒鎧甲未備達禮善巴圖魯兵兼程來恐難驟遣若以西安兵往恐輔臣由陳倉諸路㫁我棧道自秦州平凉來逼深為可虞又疏言興安兵變殺總兵王懐忠臣等出示安撫仍止前往興安之副都綂穆舒渾兵上勅撫慰興安又諭洞鄂曰陜西重地棧道闗係尤急沔州秦州乃通漢中要路其若何據守保固與總督等會議務期萬全時鳯縣賊毁偏橋守隘阻運輔臣所部王好文等復㫁棧道二月諭責洞鄂等退縮遲延致狡㓂阻截仍嚴飭往定平凉秦州諸路扵是将軍阿宻達署副都綂鄂克濟哈等率所調興京兵西安兵往平凉洞鄂與温齊綽克托等率回自保寧及達禮善巴圖魯兵往秦州是月賊䧟蘭州勅兩路兵速進洞鄂至隴州經仙逸闗偽總兵髙鼎等聚衆四千據闗山河岸立營拒守洞鄂與署前鋒綂領穆占西安将軍佛尼勒副都綂達禮善巴圖魯分布八旗官兵令驍騎兵俱步行為前隊前鋒及䕶軍兵為後隊又預撥都綂赫業為竒兵就近應援比接戰自己至午賊力拒赫業已援兵合力衝擊賊敗遁斬殺甚多因乘勝追擊復闗山闗三月大軍次渭河奪其橋圍秦州四月王輔臣遣賊兵萬餘自平凉來援屯南山城内賊兵八千餘突出我兵分擊大敗之克東西兩闗屢敗賊陣斬偽總兵何隆李國棟招撫偽文武官二百二十餘兵八千四百餘安輯民人九萬有竒遂復秦州又遣振武将軍佛尼勒内大臣坤巴圖魯總兵官孫思克追𠞰至閻闗賊迎戰破之復禮縣追賊至西和殺千餘人陣斬偽官三十清水伏羗俱平捷聞得㫖嘉奨又遣西安将軍穆占率兵援鞏昌復郡城七月上諭洞鄂曰國家仰荷天眷秦州鞏昌蘭州等處漸次恢復朕甚嘉悦此係保寕還斾之兵間闗䟦涉努力効命所致湏不時存念恤其勞苦非𦂳要必節其勞無大過則寛其罰爾等将兵在外事情經練頗多必能同寅協恭折衷而行但相隔遼逺意慮所及不得不為告誡秦地實為形勝要區今将軍總督總兵及投誠兵衆雲屯一處将軍張勇勞績甚多恐貝勒等藐忽視之生彼憤懣時厪朕懐貝勒等既效勤勞底定秦省務期克奏全功以慰朕望八月偽總兵趙士昇以蘭州降歸川十二保及偽叅将普國祥兵千餘人皆就撫遂與平逆将軍畢力克圖揚威将軍阿宻達㑹于平凉賊出城迎戰我軍合擊屢敗之斬偽總兵郝天祥餘擒斬無算九月遣副都綂鄂泰阿爾琥敗賊于寳雞縣羊添池山焚其營十二月疏言大兵攻平凉克取第一闗廂距城三里許對南山屯營欲進薄城因溝深地險難下壘故未䏻即下諭宜㫁餉道以困之十五年二月諭兵部曰大将軍貝勒洞鄂等屯兵平凉日久賊冦尚未剿滅城池尚未恢復夫秦省不能即定川賊尚在窺伺者皆由王輔臣未剿滅平凉未克取故也其以都綂大學士圖海為撫逺大将軍率每佐領䕶軍二名亟赴陜西總轄全省滿漢大兵㫁賊餉道剿滅逆孽速靖地方大将軍抵平凉時盡收各将軍敕印遇有分遣酌量給付其貝勒洞鄂以下悉聴大将軍節制是月疏言聞逆賊将斷闗山擬遣兵往守現在兵少難分至鞏昌雖有副都統翁愛率兵前赴而賊逼可虞命将軍錫卜臣等調兵守闗山張勇等堵剿出犯秦鞏之賊十六年二月部議陜西軍前功罪以洞鄂在軍前無功革貝勒爵三十一年九月任正藍旗滿洲都綂四十二年三月兄子信郡王鄂扎薨以洞鄂襲多羅信郡王爵四十五年六月薨王薨後禮部請䘏上諭廷臣曰洞鄂補授都綂襲王爵以來並無戴恩効力之處且係軍政問罪之人不准賜䘏其王爵亦當論嫡長所生以信郡王鄂扎之子徳昭襲徳昭既襲封多羅信郡王雍正二年十一月授宗人府左宗正四年八月管正白旗事務五年十一月轉左宗正乾隆二十七年二月薨年六十有三謚曰慤以豫通親王多鐸六世孫如松襲初多鐸第三子多爾博出為睿親王後睿親王被罪未及襲還本宗封多羅貝勒多爾博生蘇爾發襲固山貝子生塞勒塞勒生功宜布皆襲輔國公如松功宜布第三子也乾隆十一年六月襲父爵輔國公十七年七月任乾清門散秩大臣二十一年四月管健鋭營事六月署鑲黄旗滿洲副都綂二十二年正月署領侍衛内大臣尋授宗人府右宗人二月授兵部侍郎四月授鑲紅旗滿洲副都綂二十三年二月調正黄旗滿洲副都綂九月遷正黄旗漢軍都綂二十四年六月轉左宗人九月署兵部尚書十二月授領侍衛内大臣二十五年十月授綏逺城將軍二十六年十一月調西安將軍二十七年閏五月命襲封多羅信郡王八月授正藍旗䝉古都綂九月署領侍衛内大臣二十八年七月授右宗正十月管理宗人府銀庫事三十年十一月以縱輿夫開博場應革爵得㫖寛免在閒散王上行走如松請嵗繳王俸五千兩贖罪宗人府議不足蔽辜應革爵命照如松請仍免革爵三十五年十一月薨年三十有四諡曰恪三十六年以慤郡王徳昭第十五子修齡襲修齡初于乾隆二十七年六月襲如松所遺之輔國公三十年十二月授散秩大臣三十四年十月授宗人府右宗人十二月任正白旗滿洲副都綂三十五年正月調鑲紅旗滿洲副都綂五月轉左宗人閏五月調正紅旗漢軍副都綂三十六年四月命襲封多羅信郡王旋授左宗正三十七年三月總理鑲白旗覺羅學四十三年正月特命復豫通親王始封爵號晉襲和碩豫親王四月任正白旗䝉古都綂四十八年十月授盟長十一月掌宗人府事四十九年閏三月調鑲藍旗滿洲都綂五十一年三月薨年三十有八諡曰良十月以其長子豫豐襲封和碩豫親王原封多羅貝勒察尼察尼豫通親王多鐸第四子順治十三年正月封多羅貝勒康熙七年正月授宗人府左宗正七月預議政九年三月充玊牒館副總裁十二年十二月逆藩呉三桂反命寧南靖㓂大将軍順承郡王勒爾錦由湖廣進勦以察尼恭贊軍務十三年三月至荆州時賊已䧟岳州七月察尼與鎮南将軍尼雅翰水陸齊進偽将軍呉應麒以賊七萬餘由陸路来拒察尼等督兵奮擊大敗之斬首萬級舟師抵七里山以礮攻沉賊船十餘六月命貝勒尚善為安逺靖㓂大将軍赴岳州察尼回荆州駐守十四年五月賊䧟榖城察尼佩靖㓂将軍印往援都綂伊里布等先至賊棄城遁時賊䧟南漳興山又増兵犯彞陵據城外鎮荆山掘壕結寨八月察尼至彛陵以賊寨難進攻其粮由江運議増舟師㫁賊運道困之十月遣兵敗賊牛皮了口進攻黄連坪焚其積聚興山賊遁十五年二月呉逆移南漳彞陵賊兵向長沙順承郡王令察尼回荆州渡江剿賊同都綂伊里布等趋石首賊據虎渡口迎戰敗之追至太平街斬級三百餘泊江南岸翼日再登岸擊賊過太平街遇賊伏失利退荆州詔責勒爾錦老師糜餉察尼恭賛無能令立功贖罪十七年八月貝勒尚善薨於岳州軍中上命察尼代為安逺靖㓂大将軍規復岳州九月疏言舟師入湖已久雖未大挫賊鋒賊亦不能出戰近聞賊餉將絶將軍林興珠獻䇿謂宜于湖水涸後圍以木栰立木樁列火礮俾小船巡警以困之然湖水之涸為期尚遲兩三月間賊中安知無變今乘水勢未退立一營扵南津港俟水涸酌撥舟師營於君山髙家廟絶其粮道賊勢窮蹙不難撲滅上善其言令副都綂闗保率兵赴岳州軍聴調遣是月遣提督桑額攝撫逺将軍彰泰率師至南津港大敗賊衆十一月偽将軍杜輝巴養元姜義等賊舟犯陸石口将軍鄂納敗之斬千餘級遣署副都綂葉儲赫進攻岳州破賊萬餘時賊粮已匱屢乘舟出意在疏通餉道每出鏖戰移時偽帥率衆五千自髙家廟渡江來犯我營察尼遣署前鋒綂領杭竒助禦却之先是察尼以舟師屢出戰疏請發江南子母等礮一千又請調荆州水師總兵張忠并標兵營君山髙家廟上皆允之至是又疏言湖水漸涸陸地漸出我兵營伍隔絶恐賊􅇓通粮饋請增發滿漢兵議政王大臣議不允上以圍取岳州闗係𦂳要賊粮将絶宜益兵遂命安親王岳樂量調長沙閒駐兵赴岳州十八年正月疏請調兵六千圍岳州城並請設随征左右前後四營總兵官分轄詔如所請是月偽總兵王度冲偽将軍陳珀等各以其舟師降呉應麒等棄城遁復岳州計招撫偽官六百餘兵五千餘獲船六十五礮六百四十餘二月安親王自長沙進取衡州察尼發緑旗兵沙船助其軍尋遣都綂珠滿追擊賊于湘隂斬獲無算復其城提督桑額克安鄉降偽官三員四月命察尼由常徳進征辰龍闗軍務在澧州以南者聴調度十九年三月同都綂鄂訥等攻克辰龍闗抵辰州賊潰遁偽知府𫝊祖禄以成降並招撫偽将軍楊有禄周楨楊寳䕃祖述舜等五月疏言自常徳進辰沅沿途雨濘馬乏詔暫屯沅州酌量進發六月疏言在軍前鋒四百有竒䕶軍驍騎每佐領二十餘人應簡前鋒三百每佐領䕶軍六驍騎九進取雲貴上命彰泰統師進征察尼領久征勞苦之滿洲兵還京十一月議察尼出師湖廣不速扼要害退縮不前老師糜餉坐失事機㡬至悮國應削貝勒及議政宗人府職籍家属財産仍拘禁得㫖察尼應如議處分但既克岳州且從前有効力之請著從寛免其覊禁籍没僅削爵為閑散宗室二十四年十二月特授奉天将軍二十七年九月卒年四十有八喪還遣領侍衛内大臣公費揚古往奠賜祭葬如輔國公例謚曰恪僖爵除欽定八旗通志卷一百二十六
