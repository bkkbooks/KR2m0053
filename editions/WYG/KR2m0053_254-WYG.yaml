body:
  text: 欽定四庫全書欽定八旗通志卷二百四十人物志一百二十孝義傳謹案孝弟皆庸行又皆良知良能也而古稱孝弟之至通於神明又何其誠開金石精貫三靈歟盖五常百行之根本具在於是人心世道之綱維亦具在於是充其量雖大聖大賢不敢自謂能無憾而匹夫匹婦一念之勃發徃徃能動天地而感風雷諸史所録代不數人明其難也所録又多閭里微末之人不必皆出士大夫明人人可以勉而企也八旗風氣淳樸人敦至性又涵濡聖朝之化澤環居内行篤修視為恒事譬諸越無鏄秦輦轂觀感尤深故無廬人人能作轉不以是為能舊志所載寥寥無多良以是也然幸存什一於千百豈可復使名佚簡牘竟冺幽光今一一具録以傳不朽近時潜徳外彰得邀旌表者亦一一續載盖惟不近名其名乃真凡有考者固不能不鄭重而表章之矣逹拜逹拜滿洲鑲白旗人姓郭爾羅斯氏世居沾河地方年十二太宗文皇帝選取隨侍肅親王豪格王年亦㓜逹拜昕夕不離比王年長分封令逹拜掌王府錢榖事太宗復取回任用屢試以事五年復遣詣王府又遣索尼巴克式諭王曰逹拜忠慎爾其信任之順治三年肅親王徃征四川逹拜從行有功四年破張獻忠等賊凱還時睿王攝政惡肅親王不附已誣致其罪幽禁之王府舊時䕶衛人員俱不敢近惟逹拜不避相害日徃伺候具飲食親送至禁所王性不喜榖食逹拜令妻手治具烹炰縷切如王素所嗜而後進詢門者王飲食如常歸即欣喜如云王憂懼飲食減少歸即涕泣憤悶閉目終日不言語不飲食至五年王薨逹拜哭泣盡哀助王府備衣棺治䘮事既𦵏踰月達拜上月墳訖叩辭王二子歸即自經以殉睿王聞之大怒下令暴其屍執其家人踰數日莫能殯歛義烈之氣路人皆為哀感順治七年世祖章皇帝親政肅親王寃得白逹拜之父朱馬海携二孫噶爾哈圖杭藹以逹拜殉義事叩閽第四日傳至吏部奉特㫖云察例以身殉王無給官職之例但逹拜當伊王獲罪之時不顧利害死生以身從之甚屬可憫可照殉太宗皇帝大臣例給與三等輕車都尉著伊長子噶爾哈圖承襲世世罔替又勅附𦵏肅親王墳園以旌其義先是逹拜之兄敦達禮於太宗文皇帝賔天時以死從殉特給世職故世祖用其例推恩逹拜八旗人士亦傳誦其兄弟忠義並堪不朽云和爾渾和爾渾者亦滿洲鑲白旗人性忠義不避利害自少小時即與逹拜友善逹拜以肅親王寃死發憤從殉忤睿王暴其屍又盡收其妻子下詔獄加嚴刑逹拜屍暴露數日僅覆以席親黨環視哀悼而已莫敢收歛和爾渾獨憤然直前竊負其屍手為包裹蔵於荒廟達拜妻子得釋始就廟中得全屍以𦵏和爾渾之義烈亦與達拜並稱於時云夏穆善夏穆善滿洲正紅旗人原任盛京將軍葉克書次子初為噶布什賢轄有勇好義崇徳三年從征明至山東與碩翁科洛巴圖魯敗呉總鎮兵五年從征明圍錦州與布丹敗明杏山兵七年圍錦州又與沙爾呼達敗明經畧洪承疇三營兵比洪承疇兵與右翼戰又同布丹敗之武英郡王阿濟格駐扎杏山遣夏穆善徃寧逺探捉間諜歸至烏喇峯前有寧逺兵六百人來追即與鄂碩同擊敗之順治元年隨睿王多爾衮入山海闗追流賊於安肅慶都並有功十一月從豫親王多鐸南征與布丹五敗流㓂於潼闗二年五月隨豫親王克南京有敵兵來攻江寧府橋即與富喀擊敗其衆時明福王已遁隨圖賴等徃跡之遇賊兵即同科爾坤敗之三年二月隨征南大將軍貝勒博洛徃定福建有偽副將守白楓嶺與敦多敗其衆過嶺與和託敗偽帥吳愷兵遂與巴音岱進兵司西舖至渡口敗其守兵捉生逐哨斬五十五人生得三人論功授半個前程三遇恩詔累加至三等輕車都尉九年三月多羅順承郡王勒克徳渾薨逝夏穆善以其本旗之王恩遇素厚遂慷慨從死禮部以聞奉㫖這殉死可嘉着給與雲騎尉後不為例於是由三等輕車都尉加為二等輕車都尉以第五子翔格色承襲仍賞䘏如典禮人服其好義咸稱為從前未有云沙木哈沙木哈滿洲鑲白旗人性孝友康熈三年春正月沙木哈為弟三泰毆傷瀕死本旗執其弟送刑部沙木哈自念同胞止有一弟倘身死弟又抵罪無人守先墓撫諸孤令其妻哈里克言於官活三泰之命比沙木哈死哈里克遵遺言叩閽求貰三泰罪得㫖從所請免其弟死哈里克仍自盡以殉夫事聞部議旌表奉㫖命禮部立碑墓上書其事於石夫婦孝義八旗並傳頌焉范承譜范承譜漢軍鑲黄旗人㓜讀書知忠孝大義康熈十二年從族兄福建總督承謨赴任助理政務明年鎮守福建靖南王耿精忠假公事誘執承謨據福建反以承譜等數人在幕中任事併執之勒令降不屈拘幽三載十五年康親王傑書統兵入閩精忠害承謨併害承譜等四十七年承謨子廣東巡撫時崇疏奏承譜等仗義死事言臣父殉難時相隨殉難者共五十三人内有生員嵇永仁王龍光儒士沈天成族叔范承譜伊等同臣父被逆幽囚三載矢死不屈守節盡忠仰祈特沛恩綸予以一命之榮入於臣父祠堂得邀陪祀之典等語禮部議覆言十七年浙江巡撫陳秉直因游擊魏萬侯之子生員魏棟與伊父同時殉難題請賜䘏吏部等衙門議覆生員殉難者無恩䘏之例將生員魏棟酌量贈國子監助教加贈官員例應撰給勅命移送内閣擬撰給發在案今生員嵇永仁王龍光照例追贈國子監助教其沈天成范承譜俱係白身雖無追贈之例但伊等遭逆不屈與范承謨同時殉難應將沈天成范承譜酌量追贈國子監學正俱照例送内閣撰給勅命其嵇永仁等四人應如巡撫范時崇之請准入范承謨祠堂陪祀奉諭㫖令范承譜等四人並設主從祀承謨祠甘國城甘國城漢軍正藍旗人原任雲貴總督文焜第四子也性至孝知大義初補國學生文焜由直𨽻巡撫陞雲貴總督丁内艱歸𦵏請終制不許復赴任間闗南北馳驅萬里諸子分仕四方惟國城相依隨行跬歩不忍離文焜起復赴任僅兩月而吳三桂據雲南反貴州兵將俱已受三桂賄餌全城從逆文焜縊其眷屬七人率國城及二筆帖式馳赴鎮逺府欲用鎮逺城守兵搤油搾闗以拒三桂而守將江義又已降賊文焜知事不可為遂至吉祥寺自刎以殉國城哭泣具棺歛訖即自經於父柩之旁二筆帖式亦從死焉二筆帖式一名雅圖滿洲鑲黄旗人給雲騎尉世職一名何善亦滿洲人旗分未詳後貴州巡撫閻興邦請於朝建祠祀文焜賜祠名勁節黔人議以國城及二筆帖式從祀於祠未及上聞云陳汝器陳汝器漢軍鑲紅旗人生而至孝父啟泰任福建巡海道康熈十三年耿精忠叛啟泰全家殉難汝器赴漳州扶櫬被海賊刼掠下海幽囚兩載不屈乘間冐險逃歸􅄓風毒霧出没波濤竟以其父櫬還家聖祖仁皇帝嘉其父子忠義優贈啟泰工部右侍郎諡忠毅賞祭𦵏如例汝器以通政司左右通政大理寺少卿用二十年十一月補右通政尋陞左二十二年二月陞右僉都御史遇事陳奏侃侃二十三年陞太僕寺卿二十七年五月陞大理寺卿三十三年十一月陞刑部侍郎三十五年巡撫安徽等處三十七年罷歸四十年任佐領雍正四年以老乞休尋卒鄂素鄂素字紹徳一字位公姓完顔氏滿洲鑲黄旗人父名阿什坦鄂素生而孝友三嵗時乳母持餹與之不肯遽食曰待兄來當共食之侍父母側命之坐不肯遽坐曰兄尚未坐與兄赫世亨和素同居四十年未嘗有不豫之色母卒時甫七嵗即擗踊悲號幾於滅性及見父則抑哀承顔昏定晨省惓惓不倦有事他出必依戀親側乆之乃行兩事繼母從未失口稱一繼字繼母亦撫愛特甚父母寢疾親奉湯藥禱天祈夀衣帶不解靣垢不盥父沒哀毁瘠羸杖而後能起力疾治䘮又與兄和素謀曰父母之恩昊天罔極按禮士大夫皆有家廟今必為父母立祠堂朝夕瞻拜庶幾事亡如存於是鳩工搆堂於居室之東朔望奠祭嵗時蒸嘗必誠必敬兄偶外出寢食懐思遣人問起居計資斧度僕馬約歸期絡繹不絶及歸相見則喜溢顔色居常得一食必使人饋之二兄然後食或得帛将製衣必先為二兄製然後衣居官二十載無私財無私蓄焉次妹再繼母出也于歸有期因商之兄曰母在資奩猶可斟酌今惟吾兄弟是依若少不備何以自安於是罄已所有悉以資之家庭間藹然以和又肅然有則僕婢數十口未嘗怒詈鞭笞皆翕然不忍負儼然不能犯待族黨少長有序相聫以親睦婚䘮拮据必周其艱難行李徃來必濟其匱乏不遺餘力乃已待朋友亦然性嗜詩書善騎射公退手不釋卷時出游則馳射破的以為娛留心經史見一嘉言善行是則是傚嘗語兄和素曰吾人讀書貴乎身體而力行不徒慕淹雅之譽至於文辭要在意達理暢不可馳騖靡麗之工兄弟時時促膝聚談公署所行互相咨訪是非利弊折衷歸一論賢否析理欲輙至繼膏更僕康熈二十年奉命㸔管謄録通鑑等書謂諸生曰爾等徒抄寫而不識之於心豈不虚曠此日因令其每暮歸時俾各述所録之書不能者有罰因之各知刻勵學問多有進者弱冠時為内務府筆帖式有呈狀者應筆帖式取供辭逹情盡虚實昭然總管深異之遂委為筆帖式長十六年授總管内務府主事政務清理十八年陞慎刑司員外郎聽訟務得其情人稱為白靣包公二十年遷本司郎中聖祖仁皇帝特㫖云朕用人不拘資俸淺深因爾勤敏特擢斯職二十二年又奉特㫖兼管佐領先是京師舊俗䘮家棺衣輿具皆出租賃無賴小人分占坊巷勒索百端貧者傾家莫辦因捐資制造為本佐領䘮家公用且立一義會糾約所屬勿分貴賤但遇有䘮之家每人出銀一錢相助謂捐者微則人易為力所凑者多則其事易集是後貧家之䘮不苦於殯歛至今便之二十二年奉命管看謄録太皇太后御覽書籍告成賞銀五十兩又奉特㫖鄂素賢能著聞着同侍郎等修濬下河二十八年重修大清律例部臣請簡才能官纂修聖祖特㫖慎刑司郎中鄂素文理既通又練逹事體着同部員纂修二十九年授掌印郎中旋奉差督理通恵河漕運街道抽分倉厫兼理永平宻雲紅號等事到任即咨工部免徵三十七州縣税課一日忽心動曰吾兄病矣自灤州闗一晝夜馳還沿途祈禱願減算與兄誓茹素三年至家兄果病且困喜見其至豁然甦病亦漸輕然親視湯藥寢食不離者兩月餘兄疾痊始之任三十一年卧病猶茹素聖祖聞之遣醫胗視且著來京攝養及病篤又増遣良醫調理并令其入宫長女出視既卒聖祖惋惜者乆之特降諭㫖郎中鄂素病卒於官深為可憫著䕶柩入城歸第比䘮旋時廨中胥吏河上役夫與通州商民咸悲慟如䘮所親年四十一嵗子留保辛丑進士後任通政使兼詹事署理翰林院掌院學士事翁杜翁杜滿洲鑲白旗人副都統圖克善之次子也性篤孝康熈四十二年八月圖克善病服藥不能愈翁杜年甫十八日夕傍徨聞古有割股愈親疾者遂於宻室割左臂肉和藥以進父病旋愈闔旗稱為孝子五十二年翰林院奉㫖修滿洲氏族大全本旗都統以翁杜割股事造入冊内移送書局焉佟良佟良䝉古鑲黄旗人事親以孝稱其母於康熈四十九年五月得病醫治不愈佟良遂於庭中焚香叩拜黙為禱祈潜入己室將左臂肉割取一片託言祭肉奉母食之其母於第三日病愈又伊二兄烏綳額患吐血病甚篤佟良徃東嶽廟祈禱於右臂燃燈七盞焚香禱神願減已算移與伊兄自是兄病亦愈佟良後任天津州防禦刲股燃臂雖未合於正理其孝友之誠亦可嘉焉鍾保鍾保滿洲鑲黄旗人㓜時即以孝稱父母訓誨語必敬守無違出必告反必靣每事先意承志父希普以歩軍校從征逆藩吳三桂有功比積俸将得遷轉鍾保念父年老力勸請休家居就食昕夕不少違前母所出兄析居蕩産先卒鍾保撫其孤俾同居教育婚娶祖遺田宅悉推與之康熈三十九年由官學生補刑部筆帖式累遷本部員外郎調内務府旋任倉場監督任滿陞刑部郎中五十三年父沒居䘮哀慟水漿不入口者三日或戒以母在不當致毁始節哀事母尤謹每公退歸必依依母側夜歸亦必於窓外候母動息安而後歸寢母有弟二人貧苦鍾保體母志竭力周之年四十餘孺慕不少改雍正二年恩詔命天下舉孝子順孫本旗公舉鍾保應詔事下禮部議覆給銀三十兩建坊旌門奉㫖依議尋奉特㫖授甘肅按察使遷布政使縁事罷歸復起官湖北布政陞湖南巡撫調任湖北後任工部侍郎覺羅色爾岱覺羅色爾岱鑲紅旗人景祖翼皇帝長兄之七世孫也性篤孝年十七嵗時父病不脱衣帶侍養日乆醫藥無效病漸危急色爾岱夜深獨至庭中飲泣禱天願以身代取利刄刲左臂肉為湯以進疾乃少間父没後事寡母益孝謹母病飲食减少則已亦節飲食或病不能飲食則已亦不飲食母疾愈飲食復初然後已亦飲食族黨歎羨咸以為難雍正元年恩詔令天下舉忠孝節義之人色爾岱時以官學生任縀疋庫庫使於是從兄翰林院庶吉士覺羅恩夀户部員外郎覺羅栢修等率同宗族公舉色爾岱孝行以應詔㫖下禮部議給銀三十兩建坊旌表其家色爾岱辦事精明而誠篤六年授銀庫主事仍兼管縀疋庫使時國家承平日久府庫充實縀疋多朽螙前後司庫者交代盤查約略檢㸃而已莫能稽其細數或架滿無庋閣之所則委積於地色爾岱謂國用所闗理宜清核請於總理三庫王大臣分别新舊朽螙為三等三月而畢數目井然自是前後官可以按數交代不致侵蝕其委積在地者色爾岱復捐已所應得公費飯銀約二千兩造架盛閣煥然一新王大臣等竒其才守共保薦之屢加遷擢後任銀庫掌印郎中克什布克什布滿洲鑲紅旗包衣人任三等侍衛事親至孝母病危篤醫者言不可起克什布遂於夜静時扃宻室刲臂肉熟而進之母病頓愈宗族稱其孝雍正二年詔舉節孝本旗以克什布孝行咨部奏聞准建坊旌表給坊銀三十兩如例舒蘭舒蘭滿洲正紅旗人居家孝友父名敦多禮任刑部侍郎縁事革職奉㫖發徃黑龍江在雲騎尉品級上効力行走時舒蘭任户部筆帖式即具呈辭職言父有罪逺去數千里之外人子豈忍不隨之同去尚書等以非例不允舒蘭哀懇不已始憫其孝思據情上聞准隨父之黒龍江八年聖祖仁皇帝特降恩㫖敦多禮今已年老著回京於是隨父歸復補理藩院筆帖式昏定晨省無間朝夕宗族鄉黨無不稱為至孝聖祖仁皇帝屢向大臣拉錫等稱其孝行有聞得舒蘭甚孝之㫖平居在族黨敬長慈㓜人人以為矜式尋陞理藩院主事康熈三十五年七月大兵破噶爾丹聖祖降勅書於䇿妄阿喇布坦特命舒蘭馳驛賫至西寧付回回酋長喀錫色勒葉大魁啟徳等轉送事畢還朝是年九月聖祖以噶爾丹尚存活將再行親征舒蘭復隨駕徃寧夏三十七年四月隨大學士馬齊都統吳達禪滿丕等徃與喀爾喀立盟三十八年四月初三日隨都統吳達禪䕶軍統領車克楚徃收巴爾虎是年閏七月復同都統呉達禪滿丕分派巴爾虎旗分佐領九月十六日巴爾虎佐領額克圖率合佐領下人將副使阿必達驍騎校班廸暨牧馬人共十一人殺死又將御馬羣八百餘匹牧馬人私馬四百餘匹駝三十餘匹驅之而逃特㫖命舒蘭馳驛急徃取一的信候徃追之散秩大臣諾爾布兵回再來覆㫖舒蘭即於是月二十日起程二十二日至鑲黄旗察哈爾所居蘇木哈達地方猶恐候諾爾布等回遲延時日先遣察哈爾撥什庫翁我代等六人分三路前徃迎探二十六日翁我代等至云至薩穆諾渾奴魯等處採探總無回兵之信且未曽遇一人舒蘭念天寒草枯追兵深入馬皆疲痩若候其回定延時日乃一面遣撥什庫將此情由奏明自率諳察哈爾路徑者四人即於二十七日起程循回兵之路迎候取信直至邊外至喀爾喀王查兒貝勒之祖母博迪蘇克喀屯所居必爾呵呼地方始遇散秩大臣諾爾布叩其的音是夜遂曉諭鄂爾坤圖拉伯兒扯兒色稜額左近所居蘇克金僧格貝勒等八旗鄂濃巴爾集地方所居扎薩克台吉羅卜藏厄爾徳尼等言巴爾虎喀克圖等負皇上之恩殺察哈爾官兵偷盜御馬而逃若至汝等地方不拘那一旗即執而斬之或匿居何處急速報部遂書此諭於押印空紙上附於博廸蘇克喀屯之長史官杜立馬命其遣能人從間道超過巴爾虎特至查薩克令其互相傳遞務必於巴爾虎未到之先到彼傳諭分派已完回京奏聞即奉㫖呉達禪喀瓦爾達率兵徃追著舒蘭馳驛先至左翼四旗派察哈爾官兵二百人厄魯特善放鳥鎗者八十人等候吳達禪等此處我另派新滿洲侍衛二十人前徃舒蘭奏言臣派徃察哈爾兵訖候大人等到願隨大人等一同出征聖祖許之舒蘭隨大人等出征未至其處公西布退哈坦巴圖魯等八旗已遵從前舒蘭曉諭劄付於巴爾虎未至之先各處整兵預備巴爾虎至其地次日衆扎薩克兵并至圍繞執為首者斬之遣撥什庫色徳來奏聖祖大喜特陞撥什庫色徳為理藩院主事又封公西布退哈坦為貝子舒蘭亦陞内閣侍讀四十三年四月奉命同乾清門侍衛拉錫徃窮黄河之源七月始還奏言臣等奉使巡察黄河發源處於康熈四十三年四月初三日奉訓㫖言黄河之源雖名古兒班索而嘛其實發源處從無人到爾等務須窮源明白察視其河流於雪山自何處流入雪山邊内凡經流等處宜詳閱之若至其地瘴氣甚厲可進則進不可則止不必泥㫖強進臣等欽此欽遵於康熈四十三年四月初四日自京起程五月十三日至呼呼諾兒地方有大澤其水色深碧中央水高澤之西岸有石山一土山三東西較寛南北少窄澤周圍六百餘里産魚二種身圓而無鱗腹寛頭尾尖削其色黄其口齊身有黒㸃自二三寸至四五尺長不等口小者䝉古名為那胡口大者名為布哈十四日至貝勒色卜騰札兒所居地名呼呼卜拉克十五日居其地十六日貝勒色卜騰札兒同臣等起程六月初七日至星宿海之東有澤名鄂陵周圍二百餘里初八日至鄂陵之西又有澤名札陵亦周圍三百里鄂陵之西札陵之東相隔三十里此二澤亦産那胡布哈等魚初九日至星宿海蒙古名鄂敦塔拉擇山之至高者登而視之觀星宿海之源小泉萬億不可勝數周圍羣山䝉古名為庫兒棍即崑崙也南有高山名古兒班吐而哈西南高山名布胡珠而黒西有高山名巴而布哈北有高山名阿克塔隂齊竒東北髙山名烏䦨杜石古兒班吐而哈諸泉西畨國名為噶爾馬塘巴而布哈山諸泉名為噶爾馬滁穆郎阿克塔隂齊竒山諸泉名為噶爾馬沁尼三山之泉流出三支河即古兒班索而嘛也三河徃東順流入於札陵自札陵一支流入鄂陵自鄂陵流岀之河乃黄河也除此而他山之泉與平地之泉流出為小河者不可勝數盡歸黄河朝東而下自呼呼諾兒雪山以至於星宿海一路産野牛野騾豹猞猁猻牝牡盤羊鹿麅小黄羊火狐沙狐羦羊香獐獺兒獾子等獸臣等自星宿海於六月十一日回程欲看氷山之形并黄河向何方流去等處故離原去之路向東南行二日登哈而給山見黄河徃東而流至呼呼托羅海山又向南流繞撒除克山之南又北流至巴而托羅海之南流去第二日至氷山之西但見其山最高雲霧蔽之䝉古言此山長三百餘里九高峯自古至今未見氷消者終日雲霧常雨雪一月之中得晴三四日而已自此回行十六日至席拉庫特爾之地尋看黄河流入雪山邊内之處又向南行過僧庫里高嶺行百餘里又至黄河岸見黄河自巴而托羅海山向東北流於歸徳堡之北邊哈山之南從兩山峽中流入蘭州臣等謹將黄河發源山川之圖恭呈御覧自京至星宿海共七千六百餘里寧夏之西由松山至星宿海天氣漸低地勢漸高人氣閉塞故多喘息非瘴氣也是年陞侍讀學士十二月奉命徃封西海地方王貝勒等陞内閣學士四十四年七月鄂羅斯初次從喀爾喀路逕來貢併請互市特㫖命舒蘭至鄂羅斯邊界經理止許二百人來京其餘皆留於邊界鄂羅斯來者七百餘人舒蘭率其二百人進京至今為例四十五年十二月奉使西域封喇藏為汗并捉拿偽達賴喇嘛因受西藏瘴氣得病乞休居家養病七年病漸愈五十二年特㫖復起用内閣學士兼禮部侍郎是年冬復兼光禄寺卿十二月陞工部侍郎在内閣學士任内遇聖祖萬夀覃恩得廕一子以族子名巴郎阿者人頗誠篤而家貧親老即以恩廕予之人以為難五十九年卒年六十八子三人次子塞爾登中辛卯科舉人以上舊志所載王瓉王瓉漢軍正白旗人係㧞貢生素行純孝其母病殁三年廬於墓側哀毁盡禮於乾隆七年旌表多永握多永握滿洲鑲白旗人係貢生㓜年䘮父孝於慈母友於兄弟和睦鄉里為人樸實行止謹慎咨請旌表乾隆三年三月奉㫖賞給六品頂帶榮身雅哈理雅哈理滿洲鑲白旗人孝於慈母友於兄弟和睦鄉里為人樸實行止謹慎咨請旌表乾隆三年三月奉㫖賞給六品頂帶榮身扎史扎史蒙古鑲藍旗人係貢生孝於慈母友於兄弟和睦鄉里為人樸實行止謹慎咨請旌表乾隆三年三月奉㫖賞給六品頂帶榮身欽定八旗通志卷二百四十
