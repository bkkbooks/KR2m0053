body:
  text: 人物志一百三十八列女傳十八八旗䝉古列女傳一正紅旗蒙古䕶軍鄂博恢之妻雍古爾氏順治十八年旌表鑲藍旗䝉古驍騎校布顔圖之妻蔡堪珠康熈元年旌表正白旗䝉古䕶軍戴達理之妻根柱正紅旗蒙古前鋒峩奔代之妻阿濟格以上俱扵康熈三年旌表鑲藍旗䝉古領催錫拉代之妻那喇鼐康熈四年旌表正藍旗䝉古馬甲索吉之妻招格康熈五年旌表鑲黄旗蒙古領催多勒吉之妻蘇門徳正黄旗䝉古䕶軍校西喇海之妻峩哲内正黄旗䝉古馬甲塞冷之妻沙穆禮正紅旗蒙古馬甲古璐之妻孫徳鑲藍旗䝉古前鋒博托和之妻莾弩克鑲藍旗䝉古馬甲齊塔穆之妻巴竒克泰鑲藍旗蒙古驍騎校布漢代之妻察漢以上俱扵康熈六年旌表正紅旗䝉古䕶軍希福之妻額哲鑲白䝉古馬甲納木之妻格墨爾鑲紅旗蒙古䕶軍校滿篤祜之妻阿濟格巨以上俱扵康熈七年旌表鑲黄旗䝉古兵丁谷梅之妻額墨艮康熈八年旌表正藍旗䝉古䕶軍鄂爾圖之妻克竒克特氏鑲藍旗蒙古䕶軍宋峩圖之妻察哈珠杜佳氏鑲藍旗䝉古䕶軍校楊古岱之妻吳郎韓氏正白旗䝉古領催恩椅參之妻奔貝以上俱扵康熈十年旌表鑲黄旗蒙古馬甲爾木之妻敖牛忒氏正黄旗䝉古他赤哈哈畨色冷之妻相氏正藍旗䝉古䕶軍傅戴之妻伊爾根覺羅氏鑲藍旗䝉古馬甲鄂羅奚之妻克什騰氏以上俱於康熈十一年旌表鑲白旗䝉古馬甲墨兑之妻馬氏鑲藍旗䝉古馬甲哲爾禮克之妻西拉諾忒氏以上俱於康熈十二旌表鑲黄旗蒙古䕶軍崇起爾之妻克穆純氏康熙十三年旌表鑲黄旗䝉古䕶軍校勞章之妻克木出忒氏鑲白旗䝉古馬甲托克托和之妻莾努特濟吉氏鑲紅旗蒙古䕶軍克什圖之妻巴林氏以上俱於康熈十五年旌表鑲黄旗䝉古䕶軍拜塞之妻哈喇諾特氏鑲黄旗䝉古馬甲蘇奔之妻鄂綽特氏以上俱扵康熈十六年旌表正白旗蒙古䕶軍喇拜都之妻鞠特氏鑲白旗䝉古雲騎尉克什庫之妻鄂查特氏正藍旗䝉古䕶軍博羅啟塔特之妻克西克騰氏正藍旗蒙古䕶軍齊那爾之妻克西克謄氏鑲藍旗䝉古馬甲竒達尼之妻泰處特氏以上俱扵康熈十八年旌表鑲黄旗䝉古馬甲巴朗之妻阿爾哈楚特氏正紅旗蒙古親軍文徳之妻鄂羅特氏以上俱扵康熈十九年旌表正紅旗蒙古馬甲端吉之妻巴隆武氏鑲藍旗䝉古馬甲巴圖禮之妻洪鄂禮氏以上俱於康熈二十二年旌表鑲黄旗䝉古䕶軍恩柯之妻薩爾屯氏康熈二十三年旌表正紅旗蒙古䕶軍阿玉錫之妻鞠氏正紅旗䝉古馬甲特布勒之妻烏扎氏以上俱扵四康熈二十年旌表鑲藍旗䝉古馬甲鄂羅代之妻巴魯特氏鑲藍旗蒙古馬甲柯恩吉之妻額爾圖特氏鑲藍旗䝉古領催霍商之妻阿爾他斯氏以上俱扵康熈二十五年旌表鑲黄旗䝉古閑散卜彦圖之妻他塔喇氏鑲藍旗蒙古馬甲哈喇之妻齊穆特氏鑲藍旗䝉古馬甲諾爾米之妻克西克騰氏以上俱於康熈二十六年旌表正黄旗䝉古前鋒䕶軍花色之妻覺羅氏鑲藍旗蒙古䕶軍恩克之妻戴楚特氏以上俱扵康熈二十七年旌表鑲黄旗䝉古馬甲沙里之妻巴岳􅑯氏鑲黄旗䝉古䕶軍阿禹史之妻克西克騰氏以上俱扵康熈二十八年旌表鑲黄旗蒙古䕶軍班廸之妻阿爾格綽氏鑲黄旗蒙古馬甲那哈楚賴之妻博霍羅特氏鑲黄旗蒙古馬甲巴拜之妻阿勒特氏鑲黄旗䝉古䕶軍校穆徳之妻齊穆特氏鑲藍旗䝉古馬甲班泰之妻齊穆特氏以上俱扵康熈二十九年旌表鑲黄旗蒙古馬甲馬三泰之妻克西克騰氏鑲黄旗䝉古馬甲馬尼之妻把岳忒氏鑲黄旗䝉古領催阿禹錫之妻查拉禮氏正紅旗䝉古䕶軍邁蘭之妻雅蘇穆氏正紅旗䝉古馬甲額爾金之妻馬林泰氏正紅旗䝉古馬甲庫吉之妻巴林氏鑲藍旗蒙古䕶軍諾睦之妻朱拉特氏鑲藍旗䝉古領催色黒之妻白格屯氏以上俱扵康熈三十年旌表鑲黄旗䝉古馬甲巴顔之妻博爾濟克氏鑲黄旗蒙古馬甲霍商之妻哈齊特氏正紅旗䝉古䕶軍朱漠之妻布爾㡬穆特氏鑲藍旗䝉古領催瓦岱之妻巴岳特氏以上俱於康熈三十一年旌表鑲黄旗蒙古䕶軍勾色之妻薩爾屯氏正紅旗䝉古馬甲齊他特之妻巴林氏正紅旗蒙古前鋒䕶軍麻色之妻杭阿達氏正紅旗蒙古前鋒䕶軍天保住之妻宏鄂羅特氏正紅旗䝉古䕶軍鄂齊禮之妻宏鄂羅特氏鑲藍旗䝉古馬甲薄羅特之妻薩布禪氏以上俱於康熈三十二年旌表正紅旗䝉古馬甲希倫圖之妻芬氏正紅旗蒙古閑散巴圖禮之妻喀爾泰氏鑲紅旗䝉古領催海森岱之妻林氏鑲藍旗䝉古䕶軍圖門徳之妻扎魯特氏鑲藍旗蒙古馬甲額登之妻多倫鄂霍圖禮氏鑲藍旗蒙古馬甲阿蘭道之妻弩偶勒特氏鑲藍旗䝉古馬甲鄂齊禮之妻齊楚特氏以上俱於康熈三十三年旌表鑲黄旗䝉古弓匠阿敏之妻齊那禮氏鑲藍旗蒙古馬甲巴扎禮之妻趙氏鑲藍旗䝉古馬甲花色之妻商氏鑲藍旗䝉古馬甲額爾吉圖之妻齊特楚氏以上俱於康熈三十四年旌表鑲黄旗蒙古領催諾黒圖之妻富察氏鑲黄旗䝉古領催班迪之妻趙佳氏正紅旗䝉古領催碩薩禮之妻阿蘇特氏正紅旗蒙古領催江吉之妻巴約特氏鑲白旗䝉古䕶軍巴查思虎朗之妻查羅格氏正藍旗䝉古馬甲杜格之妻尼楚昆巴林氏鑲藍旗蒙古馬甲諾爾密之妻克西克騰氏鑲藍旗䝉古領催多爾技之妻富察氏鑲藍旗䝉古䕶軍拉布格之妻吳爾哈氏以上俱於康熈三十五年旌表鑲黄旗蒙古䕶軍巴雅思胡朗之妻覺羅氏鑲黄旗䝉古䕶軍鄂爾齊之妻多爾山氏正紅旗䝉古䕶軍巴朗之妻查爾奔氏正紅旗蒙古馬甲鄂爾查圖之妻查爾奔氏正紅旗䝉古閒散拜祐之妻趙氏正紅旗䝉古閒散卓白爾格之妻趙氏正紅旗蒙古馬甲諾木竒之妻赫楚特氏鑲紅旗䝉古䕶軍克史圖之妻布爾喀金氏正藍旗䝉古䕶軍查穆索之妻翁吉爾特氏鑲藍旗蒙古䕶軍孟格之妻陳氏以上俱於康熈三十六年旌表鑲紅旗䝉古䕶軍柯應之妻白氏鑲紅旗䝉古吴爾逹哈之妻那氏以上俱於康熈三十七年旌表鑲藍旗蒙古領催薩爾代之妻何氏康熙四十年旌表鑲紅旗䝉古䕶軍雅爾格泰之妻祁理克氏康熙四十一年旌表鑲紅旗蒙古䕶軍巴喇海之妻姜氏鑲藍旗䝉古䕶軍白濟之妻張佳氏以上俱於康熙四十二年旌表正紅旗䝉古䕶軍恒吉之妻巴魯特氏鑲紅旗蒙古親軍僧格之妻李氏正藍旗䝉古䕶軍錫巴爾泰之妻胡氏以上俱於康熙四十五年旌表鑲紅旗䝉古馬甲博羅諾之妻蔣氏鑲紅旗蒙古領催薩穆哈之妻白齊特氏以上俱於康熙四十六年旌表鑲黄旗䝉古前鋒䕶軍敦住之妻蘇尼特氏正紅旗䝉古前鋒䕶軍鄂諾之妻巴魯特氏鑲紅旗䝉古䕶軍孟克之妻陳氏正藍旗蒙古馬甲達頼之妻趙氏正藍旗䝉古馬甲額爾吉圖之妻胡氏以上俱扵康熈四十七年旌表鑲黄旗䝉古馬甲額斯虎之妻佟佳氏鑲黄旗䝉古馬甲松郭圖之妻台吉氏鑲黄旗䝉古馬甲班廸之妻額爾圖特氏鑲黄旗䝉古馬甲舎徳之妻噶竒特氏鑲黄旗蒙古馬甲羅渾岱之妻都爾白特氏鑲黄旗䝉古領催克史徳之妻釵特氏鑲黄旗䝉古馬甲那顔泰之妻鄂羅特氏鑲黄旗䝉古馬甲諾史内之妻克西克騰氏鑲黄旗䝉古䕶軍碩色之妻額爾圖特氏鑲黄旗䝉古䕶軍烏爾齊之妻額爾圖特氏鑲黄旗䝉古馬甲巴大禮之妻孟奴特氏鑲黄旗䝉古領催額葉圖之妻徐氏鑲黄旗蒙古䕶軍巴圖禮之妻博爾諾特氏鑲黄旗䝉古馬甲那哈岱之妻眀安氏鑲黄旗䝉古馬甲沙穆代之妻巴魯特氏鑲黄旗蒙古馬甲哈爾扣之妻馬哈弩特氏鑲黄旗䝉古前鋒䕶軍希達之妻魏氏鑲黄旗䝉古馬甲卓特巴之妻博霍羅特氏鑲黄旗䝉古䕶軍色楞之妻沙佳氏鑲黄旗蒙古䕶軍畢里格圖之妻克西克騰氏鑲黄旗䝉古閑散恩格爾之妻布爾哈竒特氏鑲黄旗䝉古䕶軍羅宻之妻薩璽特氏鑲黄旗蒙古䕶軍鄂穆圖之妻阿蘇格氏鑲黄旗蒙古閒散佛天保之妻薩爾圖特氏鑲黄旗䝉古領催阿都頼之妻巴宇特氏鑲黄旗䝉古䕶軍齊桑古禮之妻吳佳氏鑲黄旗蒙古閑散霍尼齊之妻額爾圖特氏鑲黄旗䝉古䕶軍諾木圖之妻阿蘇克氏鑲黄旗䝉古馬甲白特之妻柯阿坦氏正紅旗蒙古前鋒䕶軍拉穆察禮之妻巴宇特氏正紅旗䝉古領催白爾白孫之妻博爾濟克氏鑲白旗䝉古馬甲查漢泰之妻拜都氏鑲白旗蒙古前鋒䕶軍鄂倫泰之妻博爾濟吉特氏正藍旗蒙古馬甲格門之妻喀喇巴林氏正藍旗䝉古馬甲班達爾錫之妻莾弩特氏鑲藍旗䝉古馬甲色爾吉之妻巴宇特氏鑲藍旗蒙古八品官常夀之妻洪古禮氏以上俱扵康熈四十九年旌表鑲黄旗䝉古馬甲白爾綽之妻額爾圖特氏鑲黄旗䝉古領催馬喜之妻哈魯奴特氏鑲黄旗蒙古馬甲舍徳之妻額爾圖特氏鑲黄旗䝉古前鋒䕶軍勾色之妻哈拉氏鑲黄旗䝉古馬甲齊爾克特之妻克爾蘇氏鑲黄旗蒙古馬甲布達史之妻莾女特氏鑲黄旗䝉古前鋒䕶軍䝉古爾古之妻霍竒特氏鑲黄旗蒙古領催查穆素之妻蘇魯克氏鑲黄旗䝉古馬甲吴模黒之妻額爾圖特氏鑲黄旗䝉古馬甲華擅之妻博爾季特氏鑲黄旗蒙古領催季思古之妻額爾圖特氏鑲黄旗䝉古䕶軍多爾賽之妻額爾圖特氏鑲黄旗䝉古馬甲阿畢達之妻額爾圖特氏鑲黄旗蒙古馬甲綽世禧之妻博霍羅特氏鑲黄旗䝉古馬甲達禮之妻博爾濟克氏鑲黄旗䝉古馬甲雅圖之妻吳朗阿氏鑲黄旗蒙古弓匠趙爾彬之妻兀魯特氏鑲黄旗䝉古䕶軍索諾馬之妻何佳氏鑲黄旗䝉古䕶軍班廸之妻額爾圖特氏鑲黄旗蒙古䕶軍額爾吉圖之妻蘇佳氏鑲黄旗䝉古䕶軍齊其克之妻陳氏鑲黄旗䝉古馬甲花色之妻博爾濟克氏鑲黄旗蒙古領催顧魯之妻他塔喇氏鑲黄旗䝉古步甲劉色之妻博爾濟克氏鑲黄旗䝉古䕶軍馬頼之妻威古特氏鑲黄旗䝉古䕶軍托羅孫之妻雅圖祜氏鑲黄旗䝉古騎都尉馬竒格圖之妻模爾柯特氏鑲黄旗䝉古馬甲霍商之妻烏魯特氏鑲黄旗䝉古閑散舒都之妻博爾吉特氏正黄旗䝉古領催齊尼克之妻博和羅特氏正黄旗蒙古領催秦諾克之妻博和羅特氏正黄旗䝉古䕶軍薄琦之妻哈爾諾特氏正黄旗䝉古布拉齊阿禹錫之妻博和羅特氏正白旗蒙古領催達爾查之妻殷舒布氏正白旗䝉古馬甲達爾穆之妻鄂衣穆特氏正白旗䝉古䕶軍穆色之妻伊爾根覺羅氏正白旗蒙古侍衛阿爾訥之妻喀勒沁氏正白旗䝉古馬甲達頼之妻喀勒沁氏正白旗䝉古馬甲巴布之妻李氏正白旗蒙古前鋒䕶軍胡禄素之妻查哈齊氏正白旗䝉古馬甲綽克圖之妻察哈爾氏正紅旗䝉古䕶軍花色之妻趙模圖氏正紅旗䝉古前鋒䕶軍季爾哈朗之妻雅格三氏正紅旗蒙古領催額爾吉圖之妻明武特氏正紅旗䝉古親軍顧史之妻翁鄂岳格氏正紅旗䝉古䕶軍達爾馬希之妻阿蘇特氏正紅旗蒙古䕶軍齊爾格泰之妻季羅特氏正紅旗䝉古前鋒䕶軍達瓦色之妻阿蘇特氏鑲白旗䝉古親軍鐸史之妻巴魯特氏鑲白旗蒙古馬甲何雅圖之妻張氏鑲白旗䝉古領催畢爾格圖之妻王氏鑲白旗䝉古馬甲勾色之妻杭阿坦氏鑲白旗蒙古親軍畢爾格圖之妻寧古塔氏鑲白旗䝉古馬甲王達之妻巴魯特氏鑲白旗蒙古馬甲蕭色之妻阿拉格楚特氏鑲白旗䝉古前鋒䕶軍鄂欽之妻巴魯特氏鑲白旗䝉古驍騎校巴達克之妻巴延圖氏鑲白旗蒙古䕶軍年泰之妻巴林氏鑲白旗䝉古親軍巴朗之妻翁科特氏鑲白旗䝉古馬甲白順之妻錢氏鑲白旗蒙古䕶軍阿禹史之妻黄氏鑲紅旗䝉古馬甲陸式懿之妻魏氏正藍旗䝉古䕶軍鈎色之妻任氏正藍旗蒙古䕶軍那穆齊之妻渾鄂洛氏正藍旗䝉古䕶軍蘇模之妻邢