body:
  text: 欽定四庫全書欽定八旗通志卷一百四十七人物志二十七大臣傳十三滿洲正黄旗一爾揚古利恩楞額禮納穆泰額徳尼格徳爾希福明安敦拜索尼希爾根揚古利揚古利姓舒穆禄世居渾春後𨽻滿洲正黄旗父郎柱為庫爾喀部長傾心歸附太祖高皇帝厚遇之命其子揚古利入侍郎柱為部人所害圍其家其妻負幼子納穆泰於背射衆突出以其族來歸未幾庫爾喀舉部内附揚古利察知部人之殺其父者手刄之時年甫十四上深異之日見信任且尚主焉始令守汛江上警備嚴宻無敢犯者征輝發多壁城阻大水衆難之揚古利率先逕渡大獲而還取訥殷部及朱舍里安禇拉庫等路皆有功從征哈逹擒其貝勒孟格布禄丁未年遷蜚悠城户口侍衛扈爾漢率兵三百禦烏喇兵萬人方據山各結營相持揚古利勵衆曰吾儕平居相謂與其死於疾無寧死於敵此非臨敵時乎持矛突入斬烏喇兵七人敵稍却諸貝勒兵踵至併力奮擊大破之征輝發城及赫席黒木倫等路衝鋒奪險常為衆先戊申年從征烏喇金州城城中拒命冒矢石攻克之癸丑年再征烏喇攻青河敵勢甚鋭太祖遣使持矢召諸將退揚古利獨麾衆薄城疾攻㧞之從擊明兵於界藩破其軍進擊尚間崖之兵有㫖令被傷者勿行揚古利獨裏創率十佐領兵憑高馳擊大破之天命六年大兵取瀋陽遼陽皆先登陷陣既定上嘉揚古利績且憫其傷痍命位次八貝勒下統左翼兵授一等子世襲兼諭勿更臨戰陣十年明總兵毛文龍兵三百人夜入耀州復率兵殱其衆天聰元年從征朝鮮有功三年九月同副都統阿山緝逃人至雅爾古遇文龍所遣採葠者斬九十六人擒千總三員從者十六人以歸是月太宗統大兵征明揚古利率䕶軍兵敗明總兵滿桂軍於都城之北十二月師還畧通州火其船遂取張家灣明兵來援薊州我兩紅旗䕶軍兵少却揚古利鼓勇直前明兵敗奔命以兩紅旗規避各員贖罪物賚予之揚古利即以分諸將士四年率兵略錦州義州六年太宗親征察哈爾命同貝勒阿巴泰等留守七年六月上以討明及朝鮮察哈爾三者用兵孰先詢諸大臣揚古利奏宜深入明境朝鮮察哈爾自當歸順且極言用兵之不可緩上於是决意征明八月命率兵徃略山海闗八年五月晉超品一等公仍管六佐領事世襲不替賜敕免死罪三次八月從攻大同宣府拔靈邱縣斬其知縣守備官崇徳元年與武英郡王阿濟格等帥師直入明境攻克闗隘下昌平等十二城五十八戰皆勝俘獲億萬計二年太宗親征朝鮮其全羅忠清兩道兵來援營於南漢城㑹天大雨雪晝晦揚古利從豫親王多鐸進擊之追及山嶺有朝鮮敗卒竄伏崖側竊舉礮中揚古利傷重而卒年六十有六揚古利厯事兩朝恩寵極隆太宗嘗命䕶軍為之守門賜豹尾槍二令親軍佩之甲卒二十人為之衛其卒於軍也太宗解御衣衣之哭之慟親視含歛比𦵏復臨奠醊為置守塜是年十一月追封武勲王建碑墓道順治中配享太廟聖祖復御製碑文紀其功雍正元年加號曰武誠子二人長阿哈旦以軍功授雲騎尉次塔瞻襲超品公擢置内大臣崇徳六年八月太宗親禦洪承疇援兵於錦州敵遁命塔瞻徃高橋設伏追擊斬獲甚衆尋以上移營松山時明總兵曺變蛟棄寨宵遁我兵擊之其敗軍突入御營塔瞻不能督衆守營降為一等公改賜敕為免死二次順治四年卒子愛星阿襲别有傳楞額禮楞額禮滿洲正黄旗人姓舒穆禄揚古利次弟也自少從太祖高皇帝征伐敘功授騎都尉世職累晉一等男任正白旗副都統天命九年明將毛文龍縱兵渡朝鮮義州城西鴨緑江入島中屯田楞額禮奉命率左翼兵同右翼副都統吳善襲之途中獲諜者知明兵晝則渡江入島收穫夜仍回宿江岸楞額禮遂乘夜引兵由山間潜行平旦度明兵已渡江即突馳至其島明將士大驚奔潰追斬五百餘級餘衆争舟盡墮水死焚其島中積聚而還太宗文皇帝即位楞額禮列十六大臣尋任正黄旗都統為八大臣偕㕘領阿山率兵六百人徃畧喀爾喀巴林地擒其貝勒十四人俘獲甚衆上嘉其功率貝勒大臣迎勞之晉爵三等子天聰元年隨大貝勒阿敏等征朝鮮率兵八十人乘夜襲明斥堠六所盡獲其哨卒既至朝鮮攻克義州城晉一等子三年二月明人由海島移駐朝鮮鐵山楞額禮率精兵剿之斬馘無算九月隨其兄揚古利率兵往雅爾古追捕逃人遇毛文龍部下採葠軍士擒殺數十人以歸五年三月上以書諭八大臣疏陳政事得失楞額禮奏言臣以微賤之身擢居大僚皇上所行果有闕失豈敢緘黙不言若無過舉臣又何所指陳自今以後願罄所知以抒忠悃知而不言惟天鑒之至於治民使無偏枉怨由何生臣惟有省躬自誓秉公聴斷以仰答聖意而已五月同都統喀克篤禮分統左右翼兵徃征南海島有功八月從大軍征明圍大凌河城率本旗將士軍城北面之西上招明總兵祖大夀降大夀遲疑未决先遣其部將韓棟来謁出楞額禮所守門楞額禮令軍士戎服執㦸林立營門内外森嚴堅整棟既謁上遣使送之歸將入城楞額禮呵之止門外問姓名審形貌然後令入棟目擊軍威及城守嚴整狀還白大夀大夀降志始决七年應詔陳軍事言宜先率外藩䝉古及本國兵直抵明内地資其糧草牲畜再整師奪山海闗既入闗即屯駐闗中多積芻糧以備徃來攻伐之用此時若不速圖遷延嵗月則彼先有備進取轉難至於朝鮮姑與和好若内地既得朝鮮自為我有也六月隨貝勒岳託等率右翼兵取明旅順口凱旋上迎勞如初八年正月卒上親臨其䘮哭之慟明年巡幸盛京北山道經其墓躬下馬奠而哭之順治十二年追諡武襄子穆成格襲爵厯官刑部左㕘政見大臣表納穆泰子阿拉宻納穆泰滿洲正黄旗人姓舒穆禄揚古利第三弟也自少從太祖高皇帝征伐累著勲績太宗文皇帝即位擢為八大臣授本旗都統天聰元年隨貝勒阿敏等征朝鮮以功得優賞三年太宗親統大兵伐明令納穆泰率兵攻遵化城北面之西克之四年春同都統圖爾格守灤州明監軍道張春等來攻城納穆泰與圖爾格分兵守禦矢石齊發出精鋭繞城轉戰擊敗敵兵驅之壕外敵復突至攻納穆泰所守門焚城樓有執纛立雲梯登城者我兵阿玉什斬之奪其纛敵兵稍却㑹貝勒阿敏等怯不赴援敵兵發礮攻城我兵力不能勝遂奔永平隨阿敏棄城歸六月論罪納穆泰坐敵兵復至時不率兩旗將士擊敵及奔永平不能全軍以還又阿敏退歸不行力阻罪應死上命免死革職籍其家五年同正紅旗理事大臣布爾吉入明邊緝捕逃人攻㧞臺堡獲明哨卒還遇逋叛者斬六人執九人以歸是時明寧逺人張士粹等來降詭言明築大凌河城工竣納穆泰與圖爾格奉命率兵千人徃覘虚實俘獲而還且奏士粹等姦詭狀遂誅之尋擢兵部承政授三等輕車都尉世職復同圖爾格率兵略錦州松山俘獲甚多八年從征明入上方堡略朔州軍至大同攻王家莊納穆泰先登有功九年詔統右翼兵隨睿親王多爾衮等徃取察哈爾林丹汗子額哲我兵自應州赴平魯衛城内出馬歩兵五百列陣邀戰納穆泰合左翼圖爾格兵衝擊破之追斬百餘人敵又糾合潰兵數百據堡列營納穆泰率衆奮擊盡殱其衆敘功加三等男是年十月卒子阿哈連襲阿哈連積戰功授騎都尉加一雲騎尉以其兄阿拉宻襲三等男阿拉宻縁事降為一等輕車都尉順治九年從征湖南擊孫可望於岔路口力戰陣亡卹贈復為三等男額爾徳尼額爾徳尼世居都英額姓納喇太祖高皇帝時來歸𨽻滿洲正黄旗賜號巴克什每從上征討蒙古諸部能因其土俗語言文字傳宣詔令招納降附著有勞績天命三年上親征明取撫順師還明總兵張承䕃自廣寧紏衆追躡額爾徳尼同諸將還擊敗其衆斬承䕃敘功授男爵初己亥年二月額爾徳尼奉命同理事大臣噶盖創立國書噶盖奏曰䝉古字傳習已乆難以更製上曰我國之語必譯為䝉古語讀之則未習蒙古語者不能知也柰何以我國語製字為難反以習他國語為易耶額爾徳尼奏曰更製之法臣等未能明故難上曰無難也以䝉古字合我國語音聫綴成句即可因文見義矣㑹噶盖以事伏法額爾徳尼遵上指授獨任擬製奏上裁定頒行國書傳布自此始額爾徳尼既卒太宗文皇帝復命儒臣達海庫爾禪等述其義而増益之天聰七年諭文館諸臣曰額爾徳尼遵太祖諭創造國書乃一代傑出之人今也則亡世祖章皇帝順治十一年追諡文成子薩哈連官至鑾儀衛冠軍使改入大學士希福族中賜姓赫舍里恩格徳爾恩格徳爾姓博爾濟吉特世居西拉木楞太祖高皇帝創業時喀爾喀䝉古自分五部争相雄長恩格徳爾為巴岳特部台吉嵗乙巳首先來朝獻馬二十上優賚遣之明年率五部使臣獻駝馬奉表尊上為神武皇帝自此朝貢無間天命二年尚貝勒舒爾哈齊女為額駙九年請率部衆來歸上嘉其輸誠最先予宥罪劵遣大貝勒代善等統兵移之遼陽賜鞍馬貂裘及田宅器用與其弟莽果爾岱並授爵三等子子囊弩克滿敦等賜裘服授職有差𨽻滿洲正黄旗太宗文皇帝天聰三年同都統武訥格等率兵征察哈爾招降二千户尋從上征明入龍井闗克遵化城薄燕京上親統師駐徳勝門外明寧逺巡撫袁崇煥錦州總兵祖大夀合衆二萬赴援屯於城東南上命分軍進擊恩格徳爾率外藩蒙古戰失利卻走㑹武訥格率兵突前奮擊乃敗敵于是集議恩格徳爾不嚴整隊伍縱騎驟進致敗罪應罰鍰奪俘獲並削爵上念其率衆歸順功免削爵明年春大軍克永平上駐蹕城中恩格徳爾奉命略地遇明歩卒三百將戰復有敵騎三千自玉田縣突出恩格徳爾佯退誘敵敵稍前疑有伏還走因追襲其後獲馬百五年大軍圍大凌河城明監軍道張春總兵吳襄等合衆四萬自錦州赴援上親督兵擊敗之敵初接戰時鋒甚鋭我右翼兵獨先衝入張春營左翼兵避礮矢進擊稍緩因論臨陣退縮諸將罪恩格徳爾應罰鍰削爵上復免其削爵罰鞍馬一白金百兩崇徳元年五月卒以其第四子額爾克戴青襲爵世祖章皇帝順治十二年追諡恩格徳爾曰端順視一品大臣例立碑墓道世宗憲皇帝雍正七年追封三等公加號順義額爾克戴青初任侍衛授三等輕車都尉世職既襲其父三等子以所授職予弟索爾噶襲順治二年以額爾克戴青素荷太宗眷顧晉二等子七年春睿親王多爾衮欲額爾克戴青附已令大學士剛林等許以改入正白旗當晉封三等侯額爾克戴青不從明年世祖親政嘉其守正不阿超晉一等侯九年列議政大臣管鑾儀衛事尋擢領侍衛内大臣遇恩詔晉二等公復因索爾噶卒以其職仍與額爾克戴青併襲晉一等公十年同内大臣鄂齊爾等以佐領敦達禮岱敏互訐事奏請下刑部鞫訊刑部袒岱敏坐敦達禮削職罰鍰敦達禮訟寃得釋部臣及奏請諸臣並坐偏徇降革有差額爾克戴青降爵二等公十四年加少保兼太子太保十六年以家僕陳保毆侍衛阿拉那於市反誣阿拉那持刀擊人額爾克戴青坐縱徇革世爵加銜罷議政及領侍衛任專留内大臣銜以所襲恩格徳爾之三等子予其兄二等輕車都尉囊弩克併襲為二等伯十八年六月卒賜祭𦵏如例諡勤良康熙六年仍改囊弩克為二等輕車都尉以額爾克戴青之子岱夀襲二等公希福希福姓赫舍里曽祖穆瑚禄祖特赫訥父瑚什穆巴顔世居都英額再遷哈達太祖高皇帝既滅哈達希福從其兄碩色率所屬來歸以通滿漢䝉古文字召直文館屢奉使諸蒙古部賜號巴克什文字之任一以委之後𨽻滿洲正黄旗天聰二年九月太宗文皇帝親征察哈爾令往徵科爾沁兵還土謝圖額駙奥巴止之曰㓂騎塞路行將安之即有罪譴吾執其咎答曰君命安得辭死則死耳事不可誤也遂行再宿達大營復命曰科爾沁兵不赴調土謝圖額駙奥巴已率兵他往侵掠掠畢然後來㑹上怒復遣壯士八人隨之往促其速赴調行四晝夜至一小屯遇敵擊殺三十餘人卒達科爾沁所以其兵來㑹明年奥巴至上命希福與館臣庫爾禪等責讓之奥巴服罪獻駝馬以謝敘功授騎都尉世職復以從征燕京敗明兵於北門外大凌河之役同都統譚泰等争先奮擊錦州援兵師還敵兵襲我後又擊敗之晉三等輕車都尉崇徳元年改文館為内三院希福為國史院承政尋授宏文院大學士晉二等輕車都尉是年請定察治訛言惑衆之例三年與大學士范文程請更定部院官階之制詔並可其奏希福雖居内院筦機務猶間奉使察哈爾喀爾喀科爾沁諸部編户口設佐領頒法律於䝉古平其獄訟或往來軍營宣示機宜核功賞相度形勢諭上徳意於諸降人還奏未嘗不稱㫖也順治元年繙譯遼金元三史書成奏進世祖章皇帝展閲再四賞賚有加時都統譚泰附睿親王多爾衮希福素譏譚泰衰慵又以所得分撥第宅二區相隔甚逺囑譚泰更易之譚泰不允希福使人謂之曰爾為都統即為我更撥一屋有何不可而不能爾誠衰邁矣譚泰銜之㑹譚泰弟副都統譚布詣希福希福曰日者大學士范文程以堂餐華侈語我我對曰吾儕儒臣也非六部大臣及功勲大臣比安得盛饌若此遂偕往啓王王以予言為然且自咎曰吾過矣譚布退以告譚泰譚泰訐之法司希福坐偽傳王言詆諆大臣欲搆釁亂政應論死讞成啟王王令免死革職罷任尋籍其家八年二月上親政雪其寃復職給産仍授宏文院大學士九年正月充纂修太宗實錄總裁官二月充㑹試主考官遇恩詔晉三等男又奉特㫖以希福為太祖太宗任使銜命馳驅能盡心力嘉其功晉一等男又遇恩詔加一雲騎尉復以定鼎燕京時希福方罷任未獲加授世職至是特晉為三等子世襲十月授議政大臣十一月病卒年六十有四贈太保諡文簡長子竒塔特襲爵次子帥顔保别有傳明安子昂洪多爾濟明安姓博爾濟吉特初為䝉古烏嚕特部貝勒太祖高皇帝天命二年遣使獻駝馬七年率所屬人户來歸予三等子爵别立烏嚕特蒙古一旗太宗文皇帝天聰三年同都統武訥格額駙恩格徳爾等率滿洲䝉古兵征察哈爾降其邊境二千户五年從上征明圍大凌河城明總兵祖大夀以兵出犯我臺堡明安同都統和碩圖等率兵夾擊大敗之既而我軍偽為明兵赴援狀以誘大夀出戰明安同兩翼都統齊進奮擊大夀敗卻尋率衆降明安得優賚六年從上征察哈爾師還以俘獲數少又弗即遵諭歸𨽻户籍且擅以官牛與其下䝉古及私匿在逃蒙古二人諸罪部議應革世職罰鍰奪俘獲人口及賜物上念其前此先衆來歸免革世職改𨽻正黄旗滿洲世祖章皇帝時三遇恩詔晉爵至二等伯順治十一年卒幼子朗素襲爵世宗憲皇帝時追封明安為一等侯加號恭誠明安之長子昂洪初隨父來歸子三等輕車都尉世職天命十一年隨征巴林部及扎嚕特部天聰五年從征大凌河俱有功超晉三等男賜號達爾漢和碩齊順治二年晉二等男七年卒子鄂齊爾襲爵由侍衛累官至領侍衛内大臣十四年卒賜諡勤恪祭𦵏如例明安之次子多爾濟亦隨父來歸予騎都尉世職尚郡主為額駙天命十一年隨大貝勒代善等征扎嚕特有賊人巴嚕克竊馬遁多爾濟追及擒之尋隨征棟奎及克什克騰等處又隨征朝鮮並有功天聰五年始設六部以多爾濟為刑部承政理䝉古事六年以直御前失儀又奉命選取獵户不當部議削世職上特宥之罰白金百兩八年八月從征明大同上命前鋒統領圖嚕什烏拜分率左右軍以多爾濟領中軍擊明總兵曹文詔大敗其衆追至城下獲馬百崇徳二年授内大臣並預議政四年隨鄭親王濟爾哈朗略錦州陣斬三人獲馬三匹六年上征明駐師松山杏山之間多爾濟同内大臣宗室錫翰奉命伏兵高橋明杏山兵千人以糧不繼潜遁伏發敗之追至塔山斬獲甚衆尋以圍松山時明總兵曺變蛟率兵夜犯御營多爾濟未及禦敵所領侍衛䕶軍巡守不嚴議罪繫三日罰白金五百兩仍敘高橋敗敵功晉爵一等男順治二年以多爾濟素荷太宗眷顧晉三等子五年卒弟綽爾濟襲爵敦拜敦拜滿洲正黄旗人姓富察其先世居沙濟父本科理當太祖高皇帝時來歸有朱舍里部長尤楞額梗化不服命同鄂佛洛總管達賴往征之有功賜號蘇赫巴圖魯管佐領事尋卒子三人敦拜其長也初任佐領天命十一年從大兵征明寧逺先驅偵敵擊敗城中出戰兵師旋遇敵二十人與歩戰盡殱之敵復以騎追射我師敦拜還擊卻敵殿後以歸天聰八年太宗文皇帝嘉其克副任使授騎都尉世職崇徳五年擢䕶軍統領隨鄭親王濟爾哈朗圍明錦州敵出城誘戰敦拜突入其隊斬三人餘衆俱遁敵騎自杏山一再來犯並戰卻之六年復圍錦州明總督洪承疇自松山遣兵犯我兩紅旗營敦拜先後率所部禦卻尋復來犯我外藩䝉古營敦拜趨援敗敵斬首二百餘級獲其雲梯十四七年敘功加一雲騎尉八年同䕶軍統領阿濟格尼堪率兵駐防錦州世祖章皇帝順治元年隨大軍入山海闗擊敗流賊李自成兵追至望都二年敘功晉世職二等輕車都尉先是自成敗遁還西安明福王朱由崧自立於江南上敕豫親王多鐸征江南取道河南先除自成賊黨敦拜率䕶軍以隨師至陜州賊將劉方亮領兵千餘來犯敦拜同䕶軍統領圖賴阿濟格尼堪等奮擊敗之賊復夜襲我營敦拜率兵連敗賊衆遂破潼闗進定西安自成由商州遁走湖廣敦拜同䕶軍統領阿爾津等追斬三百餘人豫親王移師下江南敦拜復從破揚州趨江寧朱由崧聞大軍至遁走蕪湖將登舟渡江敦拜追及之與阿爾津圖賴等扼據江口截其去路明將黄得功迎戰我兵奮擊盡奪其舟得功中流矢死由崧為其總兵田雄等執以獻三年敘功晉世職一等是年隨端重親王博洛由浙江進征福建同副都統珠瑪喇擊敗偽總兵黄某等拒戰兵五年隨征南大將軍譚泰討江西叛鎮金聲桓賊黨踞九江府敦拜先驅直抵城下敗賊衆聲桓與其黨王得仁糾歩騎七萬自南昌迎戰敦拜合兵奮擊敗之復招撫臨江一府四縣六年奉命統兵𠞰畿南土賊斬賊渠李玉三陳金玉邢少川吳臨瑞席快等獻縣雄縣任邱寳坻諸邑土賊悉平七年五月敘平定福建江西功晉爵三等男尋隨睿親王多爾衮獵於中後所以同都統噶達渾等私行射生降一等輕車都尉明年上親政復爵如故九年遇恩詔晉二等男十一年朱由榔將李定國自廣西犯廣東上遣珠瑪喇為靖南將軍以敦拜佐之統兵往征時定國擁衆新㑹據山峪立寨平南王尚可喜先以兵防禦未及戰敦拜同珠瑪喇至遂合兵進剿破賊巢斬獲甚衆復追至横州江岸定國逺竄獲象十有六馬二百餘所陷郡邑悉復凱旋敘功晉爵二等子得㫖從優再議晉一等子㑹有疾乞休上念其勤勞年乆加太子太保以原官致仕十四年起為盛京總管十七年正月卒賜祭𦵏如典禮諡襄壯無子以從孫瑚錫布為嗣襲爵索尼索尼滿洲正黄旗人姓赫舍里父碩色大學士希福兄也太祖高皇帝時碩色自哈達部挈家來歸太祖以其兄弟父子並通國書及蒙古漢人文字咸擢置文館理事賜碩色希福巴克什號授索尼一等侍衛使出入扈從隨軍征討時哈達兵犯界藩城索尼身先士卒擊敗之復隨征棟夔䝉古援兵雲集立二寨互為掎角索尼與諸將合兵攻𠞰㧞其一寨餘衆悉降天聰元年從太宗文皇帝攻錦州遇明兵千餘徙大凌河户口索尼以二十騎襲擊之多斬獲旋偵敵寧逺城内兵突出索尼奮勇力戰追擊敵兵至壕而返二年上親征喀爾喀徵兵外藩科爾沁不至既遣希福率徤士八人徃趣之復詔索尼與侍衛阿珠祜齎諭飭責土謝圖額駙奥巴初奥巴為台吉入朝太祖以貝勒舒爾哈齊孫女妻焉既而奥巴屢違令約私與明通時復徵兵不至索尼於是禀受方略以行既入科爾沁其部人饋以牲索尼麾之去曰爾汗有異心爾物安可食耶部人以告奥巴奥巴病足居别室索尼與阿珠祜詣見公主以諭㫖告奥巴聞之扶掖至佯問曰此為誰索尼曰吾儕天使也爾有罪義當絶今特以公主故使來餽問耳奥巴語左右具饌索尼阿珠祜不顧而出奥巴恐使台吉塞冷等請其事索尼出璽書示之即令從者先行奥巴得書大驚令所屬大臣環跽請曰汗獲重罪甚惶懼今冦騎塞路恐使者即歸遭侵掠益滋汗咎請少留索尼曰銜君命而來死何足辭與阿珠祜拂衣起整轡欲行衆皆泣且曰汗欲引罪自謝扣馬首力挽之乃止翼日奥巴辭以足疾欲令其台吉拜思噶爾及桑噶爾寨偕索尼等入謝索尼曰汝欲解已罪而使二人行吾豈為取拜思噶爾等而來耶奥巴乃使人請曰上怒我我固應肉袒謝懼不我容而逐我耳索尼曰皇上覆載如天地汝果引慝入朝雖有罪必䝉矜恤奥巴叩首决計入朝索尼見其悔罪輸誠與阿珠祜偕其大臣黨阿賴先歸奏狀俱稱㫖三年從征明至燕京明寧逺巡撫袁崇煥等赴援列營於城東南索尼奉諭傳令左翼迎擊貝勒豪格先馳入陣敵兵蹙之矢石如雨索尼躍馬突入東西衝擊斬殺甚衆遂㧞貝勒於重圍明年正月大軍至榛子鎮城内無官守索尼同文臣達海頒漢字詔諭降其民復招撫沙河驛越日㧞永平與達海等奉命執黄旗於城上以漢語遍諭軍民皆歸順二月班師隨貝勒阿巴泰等率將士守永平五年正月朝鮮使臣朴蘭英來朝賜其王葠蘭英以賞薄辭索尼與㕘領英俄爾岱等斥責之蘭英懼拜命七月擢吏部啓心郎從征明圍大凌河城明兵自錦州赴援索尼持短兵歩戰敗之九月奉命徃瀋陽宣布捷音踰月偕㕘將祝世昌率漢軍千六百人及朝鮮使臣至軍營十二月與達海等奏定元旦朝賀儀制明年從征察哈爾由大同入明邊取阜臺寨㑹六部官署工竣上召索尼及諸啟心郎諭以啟廸諸貝勒俾勤事改過毋曠厥官八年以索尼任職吏部事無闕失授騎都尉世職仍與學士羅什等日直内院凡宣示諭㫖及察審功罪咸當上意值有㫖以郡王禮祭貝勒岳託吏部尚書阿拜誤以岳託子襲封郡王傳語都統葉臣事聞下廷臣議誤傳詔㫖罪以索尼任吏部郎官應連坐論罰鍰上曰索尼未經奉㫖豈肯妄言特命免議崇徳八年考績超授三等男世祖章皇帝順治元年都統和洛輝等訐告肅親王豪格言詞悖妄王坐廢為庶人詔王大臣集衆宣示以索尼忠貞戮力不附肅王與都統譚泰䕶軍統領圖賴並賜鞍馬二年晉二等子是時睿親王多爾衮攝政以索尼既列子爵不宜復列郎官令解啟心郎任仍理部事先是索尼叔父希福以不附睿親王為譚泰搆罪劾罷未幾索尼發譚泰隠匿諭㫖事譚泰亦坐削公爵有求古琴於索尼者索尼於庫内取漆琴與之索尼又嘗令傔從於禁門橋下捕魚見庫院草長使牧者秣馬院中譚泰遂臚狀劾索尼下法司勘訊論死睿親王奏從輕典削世爵永不敘用遂罷廢三年正月圖賴劾譚泰事渉索尼逮問圖賴曰譚泰有罪吾於途次作書致索尼使啟睿親王索尼不以啟聞及訊齎書者塞爾特曰書達索尼索尼囑我勿言也諸大臣論索尼罪當斬王親鞫之索尼曰吾發譚泰擅隱諭㫖罪顧匿圖賴書以庇之乎王問塞爾特因得佐領希思漢慮譚泰得罪投書於河狀索尼遂昭雪尋復授二等子索尼終不附睿親王於政事多以理争王由是惡之五年以貝子屯齊等訐告索尼於崇徳八年秋與圖賴等謀立肅親王私結盟誓議罪應死有㫖免死禠職輸贖鍰遣守昭陵追奪賞賜八年上既躬親大政以前議索尼罪不實特召還朝復其爵遇恩詔晉三等伯予世襲九年復命諸王議功晉一等伯賜敕免死二次擢内大臣兼議政大臣總管内務府事十七年應詔上言十一事一曰小民寃抑有司不為詳審者宜别為嚴察使無壅於上聞二曰凡犯罪發覺問官以奉有嚴㫖徃徃不察其情輒加重罪不無枉濫乞敕法司量情詳慎三曰前議福建將士罪任大將軍者止削一不世襲之騎都尉而所屬將領其子爵男爵乃盡議革輕重不均有乖懲勸請敕更正四曰凡開國之臣自騎都尉以上皆有功行間及贊成大業者所授之職宜予世襲其後非有戰功恩詔所加宜不給世襲敕書五曰在外諸藩風俗不齊若必嚴以内定之例恐反滋擾宜格外寛容六曰近聞大臣勢豪奪據行市奸宄之徒投託指引以攘貨財請㫖嚴禁七曰今四方商賈擔負捆載來京者多為旗下大臣家人短價強買人將畏而不前請察禁八曰諸王貝勒以及各官私引玉泉山之水為灌溉致竭泉流當禁九曰邊外木植皆商人僱民採伐水運解部故額税之外令自售賣使利及商人今聞大臣於採木之地私行強佔以致商不聊生請禁止十曰大臣不殫力公事惟飾第宅請懲禁十一曰五城審事諸官遇世族富家與窮民搆訟必罪窮民曲意徇私不思執法請嚴飭無得枉情納賄恣意妄行䟽入上以所奏皆實事宜申禁飭部議行十八年正月世祖升遐遺詔以索尼與大臣蘇克薩哈遏必隆鰲拜四人輔政於是索尼及諸臣明誓受事尋蘇克薩哈與鰲拜争事成隙索尼惡之年已老矣且有疾康熈六年三月與輔臣等奏請聖祖仁皇帝親政四月上諭吏部曰輔政大臣伯索尼太祖高皇帝時黽勉效力太宗文皇帝任以内外大事悉能果斷殫厥忠誠世祖章皇帝時亦任以内外大事竭忠純篤以其勲舊忠貞堪受重託遺詔俾令輔政恪遵顧命夙夜靖共厥績茂焉今既染疴且復年邁宜特加恩寵以示酬庸之典下王大臣㑹議晉一等公與前所授一等伯並世襲索尼以寵榮逾分悚仄難安陳情辭一等公爵得㫖嘉奬仍令祇遵成命不必遜辭是年七月卒賜祭𦵏有加禮諡文忠以第五子心裕襲一等伯第六子法保襲一等公長子噶布喇仕至領侍衛内大臣十三年十二月聖祖因孝誠仁皇后推恩所生授為一等公第三子索額圖别有傳希爾根子喀西泰希爾根滿洲正黄旗人姓覺爾察世居長白山太宗文皇帝在藩邸時希爾根任䕶衛太祖高皇帝天命十一年春蒙古巴林部貝勒囊努克背盟刼掠大軍進征攻其寨囊努克挾數騎遁希爾根將追及馬蹶易馬突前擊潰敵騎太宗遂射殪囊努克自是屢從征討有功授騎都尉世職崇徳元年大軍征明分克昌平寳坻順義密雲東安文安定興安肅容城安州雄縣諸處希爾根任䕶軍叅領擊敗明太監高起潛兵擒其總兵巢丕昌又助都統譚泰設伏敗三屯營騎兵師還敵躡我後諸將䕶輜重先行希爾根獨以軍殿敘功超授一等輕車都尉二年四月隨大軍攻克明皮島九月上將行圍選從行者希爾根之父雅賴以佐領與選希爾根因已亦從行啟睿親王多爾衮乞免其父不許乃使人告都統譚泰謂雅賴已免令珠爾堪代之及獵上以珠爾堪不宜與選詰問侍衛索尼奏曰與選者雅賴希爾根紿言已免行故代以珠爾堪遂下法司鞫勘希爾根坐欺罔應革世職罷㕘領任得㫖從寛罰鍰五年隨睿親王圍明錦州我師據山岡列營眀兵來攻擊走之復敗松山援兵尋以圍錦州時擅離軍伍及言事不實論罰鍰停止敘功七年大兵入黄崖口進圍薊州眀總兵白騰蛟率兵馳救希爾根逆擊破之世祖章皇帝順治二年敘勲舊勞績加一雲騎尉是年隨英親王阿濟格討流賊李自成由綏徳州進圍延安府賊攻鑲藍旗營希爾根擊却其衆賊將一隻虎者恃其勇屢犯我營希爾根三戰皆捷遂至西安同前鋒統領席特庫徃躡賊蹤殱賊二隊自成奔湖廣追勦至安陸府賊踞城拒希爾根與䕶軍統領鰲拜攻克之獲戰艦八十移師武昌擊走賊兵之截我輜重者賊于江濵集艦五百餘將東下都統譚泰督衆徃取希爾根先至獲之凱旋敘功晉爵三等男世襲三年隨肅親王豪格征流賊張獻忠與䕶軍統領哈寧阿阿爾津蘇拜等擊敗賊黨高汝礪武大定等拒戰兵進擊獻忠於西充别趨涪州勦賊袁韜俘斬無算師還部議擊獻忠時哈寧阿被賊圍希爾根弗援妄與阿爾津蘇拜争功應論死得㫖從寛罰贖降世職為三等輕車都尉六年隨巽親王滿達海征大同叛鎮姜瓖希爾根圍太谷以礮破其城偽知縣李成沛偽都司吳汝器遁追斬之進克大同及長子縣渾源州朔州復招降永寧州嵐縣潞安府等城同都統漢岱攻復遼州山西平晉秩二等尋訴前鎸秩寃得㫖授一等輕車都尉兼一雲騎尉三遇恩詔晉爵二等男九年擢䕶軍統領十年與内大臣額爾克戴青等㑹奏佐領敦達禮岱敏互訐事下法司鞫議削敦達禮世職並罰鍰敦達禮訟寃命覆勘得釋因論法司誤勘及㑹奏諸臣偏徇罪希爾根降爵三等男尋予復如故擢列内大臣更追敘戰功晉爵一等男世襲康熙十二年聖祖仁皇帝念其宣力有年詔加太子太保十三年三月授定南將軍討逆藩耿精忠師次南昌賊已陷廣信建昌撫州九月希爾根督兵圍撫州賊出城抗拒連敗之復擊走偽都督易明援兵賊待援不至棄城遁偽將軍陳昇連結土賊郭應定等犯贛州希爾根令副都統甘度海㕘將塞勒等禦戰陣斬偽總兵柯隆李梁追𠞰至龍泉縣破賊三營又攻取曹林十餘寨十四年擊敗偽將軍邵連登恢復建昌府城移師饒州𠞰滅餘干浮梁樂平諸邑賊衆先是上命安親王岳樂為定逺平㓂大將軍統師南昌簡親王喇布為揚威大將軍統師江寧至是諭趨安親王進征湖南安親王請俟希爾根殱滅饒州廣信賊㓂乃規取長沙上以賊渠吳三桂早滅則江西福建之賊不勦自平趣安親王速進詔簡親王率江寧兵二千赴南昌以希爾根為副將軍協同鎮守十五年三桂糾賊陷吉安據之希爾根隨簡親王督師攻圍十六年賊遁城下詔簡親王鎮吉安希爾根仍駐南昌以年老召還京十八年五月卒賜祭𦵏以其孫尚世特襲爵希爾根之子喀西泰任䕶軍㕘領當吳三桂初反時隨前鋒統領穆占進征四川遇賊將王屏藩等于蟠龍山戰方合賊别由水道登岸來犯喀西泰力戰殁于陣欽定八旗通志卷一百四十七
