body:
  text: 欽定四庫全書欽定八旗通志卷二百二十七人物志一百七忠義𫝊十九䝉古八旗四四十五人雍正年中共常禄常禄䝉古鑲黄旗人姓博爾濟吉特氏多鐸和之曾孫也多鐸和以戰功授一等輕車都尉卒子石達襲卒子佳良襲卒子常禄降襲騎都尉又一雲騎尉尋管佐領事累遷至副都統雍正七年由北路出兵九年遇賊於和通胡爾哈諾爾常禄戰歿恩賜騎都尉世職承襲詳見世職表巴圖巴圖䝉古鑲黄旗人姓烏珠庫特氏世居努圖克喀爾喀地方任驍騎校雍正九年隨靖邉大將軍内大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表恭格恭格蒙古鑲黄旗人任驍騎校雍正九年隨靖邉大將軍内大臣公傅爾丹由北路進兵征凖噶爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表達爾查達爾查䝉古鑲黄旗人由親軍委署䕶軍校駐防察哈爾於雍正九年六月隨副都統常禄出征凖噶爾在和通胡爾哈諾爾地方擊賊力戰陣亡賞䘏如例阿必達阿必達䝉古鑲黄旗人由䕶軍校駐防察哈爾雍正九年六月隨副都統常禄出征凖噶爾在和通胡爾哈諾爾擊賊力戰陣亡賞䘏如例吻卓拜吻卓拜蒙古鑲黄旗人任䕶軍校駐防察哈爾雍正元年奮威將軍公岳鍾琪調征羅卜蔵丹津九月隨都統武格擊賊於鄭海堡力戰陣亡賞䘏如例碩岱碩岱䝉古鑲黄旗人姓巴岳特氏世居克西克騰地方雍正九年以䕶軍㕘領隨靖邉大將軍内大臣公傅爾丹由北路進剿凖噶爾於和通胡爾哈諾爾擊賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表額爾必哈額爾必哈䝉古正黄旗人姓吴郎罕氏世居巴林地方任䕶軍校雍正九年隨靖邉大將軍内大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表西喇爾代西喇爾代䝉古正黄旗人姓噶起特氏世居喀喇沁地方襲職雲騎尉任佐領兼副㕘領雍正九年從靖邉大將軍公傅爾丹由北路征凖噶爾六月至和通胡爾哈諾爾奮勇决戰道遇伏賊隘不能前力盡殁于陣十年恩賜騎都尉世職承襲詳見世職表阿木古朗阿木古朗蒙古正白旗人官輕車都尉兼佐領署㕘領雍正九年六月隨靖邉將軍公傅爾丹征凖噶爾至和通胡爾哈諾爾遇賊戰殁賞䘏如例積蘭泰積蘭㤗䝉古正白旗人姓西爾都特氏世居沙塔拉道里莽海地方任䕶軍校雍正九年隨靖邉大將軍内大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表白達色白達色䝉古正白旗人姓和色爾氏世居察哈爾地方任䕶軍校雍正九年隨靖邉大將軍内大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表六十一六十一䝉古正白旗人任驍騎校於雍正九年派隨大兵征凖噶爾至和通胡爾哈諾爾與賊力戰殁恩賜雲騎尉世職承襲詳見世職表六十五六十五䝉古正白旗人姓巴雅爾齊氏世居阿納課爾親地方任驍騎校雍正九年隨靖邉大將軍公傅爾丹由北路出征凖噶爾在敦胡立哈諾爾等處與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表大碩色大碩色蒙古正白旗人由䕶軍署䕶軍校雍正十年隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陣亡賞䘏如例眀泰眀泰䝉古正紅旗人䕶軍署䕶軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾遇賊戰殁賞䘏如例八十一八十一䝉古正紅旗人姓巴林氏世居喀爾喀地方任驍騎校駐防寧夏雍正九年隨靖邉大將軍卓鼐出征十年正月二十三日至哈爾巴烏蘭與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表尹吉那尹吉那蒙古正紅旗人任雲騎尉兼驍騎校署前鋒㕘領雍正十年從靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陣亡賞䘏如例巴爾虎岱巴爾虎岱䝉古鑲白旗人姓查甘他塔爾氏世居哈拉斯地方駐防右衛委署防禦雍正九年隨靖邉大將軍内大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表赫達塞赫達塞䝉古鑲白旗人任驍騎校雍正九年從靖邉將軍公傅爾丹征凖噶爾至和通胡爾哈諾爾力戰陣亡恩賜雲騎尉世職承襲詳見世職表七十三七十三蒙古鑲白旗人姓得忒可兒卓忒氏世居盛京錦州府駐防寧夏雍正九年以驍騎校隨靖邉大將軍内大臣公傅爾丹由北路進剿凖噶爾於和通胡爾哈諾爾擊賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表増受増受䝉古鑲白旗人姓和果羅氏世居多永地方任䕶軍校雍正九年隨靖邉大將軍内大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表五十五十䝉古鑲白旗人姓和果羅氏世居多永地方雍正九年以䕶軍參領隨靖邉大將軍内大臣公傅爾丹由北路進剿凖噶爾於和通胡爾哈諾爾擊賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表旺初克旺初克蒙古鑲白旗人署䕶軍校雍正十年七月隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陣亡賞䘏如例多爾吉多爾吉䝉古鑲紅旗人姓哈卜齊特氏世居喀喇沁地方雍正元年以筆帖式隨奮威將軍公岳鍾琪征羅卜蔵丹津由松潘口出黄勝關剿熱當十二部落有功乗勝深入賊執之遂遇害恩賜主事什燕寳什燕寳䝉古鑲紅旗人姓西爾徳特氏世居察哈爾雍正七年以部委章京隨靖邉大將軍内大臣公傅爾丹由北路進𠞰凖噶爾九年六月於和通胡爾哈諾爾擊賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表舎利保舎利保蒙古鑲紅旗人姓卓特氏世居查哈爾科爾沁地方任䕶軍校雍正七年隨靖邉大將軍内大臣公傅爾丹由北路進𠞰凖噶爾九年六月至和通胡爾哈諾爾與賊力戰陣亡恩賜騎都尉世職承襲詳見世職表阿爾瑪阿爾瑪蒙古鑲紅旗人姓烏楚各特氏世居喀喇沁地方任員外郎雍正九年隨靖邉大將軍内大臣公傅爾丹由北路進兵征凖噶爾六月至和通胡爾哈諾爾與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表納思圖納思圖䝉古鑲紅旗人前鋒翎長署䕶軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾遇賊力戰陣亡賞䘏如例素珠克圖素珠克圖䝉古鑲紅旗人署䕶軍校雍正七年從靖邉將軍公傅爾丹征凖噶爾九年六月在和通胡爾哈諾爾遇賊力戰陣亡賞䘏如例博楞泰博楞泰䝉古鑲紅旗人署䕶軍校雍正十年七月隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊殁於陣賞䘏如例都思嘎爾都思嘎爾蒙古正藍旗人姓哈爾圖特氏世居巴烟納爾地方任二等侍衛兼雲騎尉駐防察哈爾雍正九年從副都統常禄征凖噶爾六月至和通胡爾哈諾爾猝遇伏賊奮身力戰䧟陣不屈死之賞䘏如例丹巴丹巴䝉古正藍旗人署䕶軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾遇賊戰殁賞䘏如例湖拉湖拉蒙古正藍旗人姓喀爾綽特氏世居巴烟納爾地方由䕶軍校部委防禦駐防察哈爾于雍正九年九月二十六日隨副都統常禄出征凖噶爾在哈爾巴烏蘭地方力戰陣亡賞䘏如例雅圖雅圖䝉古正藍旗人姓吴蘭得格壘氏世居阿蘇特地方任䕶軍㕘領兼佐領雍正七年充車騎營隊長從靖邉大將軍公傅爾丹由北路征凖噶爾九年六月至和通胡爾哈諾爾猝遇伏賊抵戰力盡殁於陣恩賜雲騎尉世職承襲詳見世職表靠山靠山䝉古正藍旗人姓務爾魯特氏世居哈爾太任驍騎校於雍正七年隨靖邉大將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾地方與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表扎爾六洼扎爾六洼䝉古正藍旗人姓努特氏世居敖漢地方任三等輕車都尉雍正七年隨靖邉大將軍内大臣公傅爾丹征凖噶爾十年七月至烏孫珠爾遇賊力戰陣亡恩賜雲騎尉改二等輕車都尉世職承襲詳見世職表伊馬竒伊馬竒䝉古正藍旗人任副䕶軍校雍正十年七月隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陣亡賞䘏如例諾爾布諾爾布蒙古正藍旗人任䕶軍校雍正十年七月從靖邉將軍公傅爾丹征凖噶爾戰於烏孫珠爾陣亡賞䘏如例花色花色䝉古鑲藍旗人姓車莫忒氏世居察哈爾地方由䕶軍校于雍正七年隨靖邉大將軍公傅爾丹征凖噶爾九年六月至和通胡爾哈諾爾地方與賊力戰陣亡賞䘏如例班第班第蒙古鑲藍旗人姓博爾濟錦氏世居喀爾勒圖莫忒地方初由侍衛兼佐領於雍正九年六月隨靖邉大將軍公傅爾丹前往北路出征凖噶爾至和通胡爾哈諾爾地方與賊力戰陣亡賞䘏如例常平常平䝉古鑲藍旗人䕶軍委署䕶軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月二十八日在和通胡爾哈諾爾擊賊力戰陣亡賞䘏如例五十九五十九䝉古鑲藍旗人任䕶軍校雍正七年隨靖邉將軍公傅爾丹征凖噶爾九年六月在和通胡爾哈諾爾擊賊陣亡賞䘏如例滿達滿達蒙古鑲藍旗人任䕶軍校雍正七年從靖邉將軍公傅爾丹征凖噶爾九年六月在和通胡爾哈諾爾力戰陣亡賞䘏如例薩哈連薩哈連蒙古鑲藍旗人任副驍騎校雍正十年隨靖邉將軍公傅爾丹征凖噶爾至烏孫珠爾擊賊陣亡賞䘏如例欽定八旗通志卷二百二十七
