body:
  text: 職官志十二公式加級隨帶陞任各官并滿洲侍衞等官補放緑營查係陞任者原任内所有軍功加級准其隨帶其曽經奉㫖賞給隨帶之級并議敘及捐納所加之級原有隨帶字様者仍准隨帶其餘一切加級俱改為紀録一次如對品補授之官所有一應加級均准帶於新任世職所得加級後經補授職任官其職任品級與世職相等或較小於世職者俱准隨帶若職任品級較大於世職者查明應隨帶者准其隨帶應改紀録者改為紀録至職任所得加級後經承襲世職無論職任兼與不兼若世職品級與職任相等或較小於職任者俱准隨帶若世職品級較大於職任者查明應隨帶者准其隨帶應改紀録者改為紀録其佐領所得加級後陞㕘領以上等官雖仍兼佐領者亦将加級查明應隨帶者准其隨帶應改紀録者改為紀録佐領補放副叅領驍騎校補放印房章京俱係揀選引見奉㫖補放之員品級雖屬相當實係陞任其任内尋常加級於補放後照例咨部改為紀録加級准改紀録内外旗員遇有罰俸案件除原有紀録准其抵銷外若任内有議敘加級願改為紀録抵銷罰俸者准其呈明咨部每級改為紀録四次照數抵銷其抵銷所剩紀録遇陞任時查係隨帶之級所改者仍准隨帶不係隨帶之級所改者在任時抵銷過一次二次或三次者槩行註銷若所改紀録並未抵銷罰俸准其将紀録一次帶於新任其一人而加數級者如遇議處案件按伊加級年月先後次第抵銷至覃恩所加之級不准改抵軍功加級紀録抵銷官員因公詿誤遇有議處之案應降一級者以加一級或紀録四次抵銷罰俸一年者以紀録二次抵銷罰俸六個月者以紀録一次抵銷如係軍功紀録二次准其抵銷降一級紀録一次准其抵銷罰俸一年如遇有罰俸六個月之案将軍功紀録一次抵銷免其罰俸仍給還尋常紀録一次軍功加一級准其抵銷降二級如遇有降一級調用之案将軍功加一級抵銷免其降調仍給還軍功紀録二次有即陞及卓異加一級者亦准抵銷降一級其例不准抵銷并因私罪議處不准抵銷之加級紀録并不敷抵銷之紀録准其隨帶先有即陞卓異加級俱不准隨帶如議處官員内任内有軍功等項并隨帶加級紀録及尋常加級紀録例准抵銷者兵部於議處時查明将該員尋常之加級紀録分别先後先行抵銷至軍政處分各官雖任内先有即陞卓異加級不准抵銷亦不准隨帶若軍功加級紀録及别項加級紀録不准抵銷仍准隨帶再議處拖欠錢糧官員如有軍功及錢糧全完加級紀録者准其抵銷别項加級紀録俱不准抵銷紀録抵銷内外旗員縁事罰俸一個月至五個月不至銷去紀錄一次者俱准註於紀録再遇罰俸合計抵銷如任内有紀録四次又有罰俸一個月至五個月註抵者遇因公降級處分仍准其紀録四次抵銷降一級其前議罰俸註抵銀兩補行實罰如因犯私罪議處者一槩不准抵銷降級留任准抵銷雍正三年九月奉上諭朕體恤臣工凡官員辦事著有勞績者無論大小俱勅部議敘其有過誤致干吏議者亦照例處分夫一人之身有功有過一官之級有降有加舊例官員降級留任停其陞轉必三年無過方准開復降後雖有恩詔加級不准抵銷殊非以功補過開人自新之義嗣後降級留任官員遇有恩詔及議敘加級俱准以加一級抵銷降一級庶人皆奮勵勉圖後效亦鼓舞吏治之一道也至降級後捐納加級者不得抵銷前案特諭欽此乾隆五十三年十一月奉上諭内務府奏請員外郎廷標等循例開復一摺又議處副闗防董濬照向例将降調處分改為罰俸一摺此例因國初年間内務府人數本少職事較多是以定例遇有降調處分俱係改為罰俸免其降調今内務府生齒日繁堪以當差者本不乏人其議處各員除奉特㫖留任外自應照部院衙門之例按其情節輕重分别實降抵銷以示公允嗣後議處内務府官員著查照吏部處分則例辦理其従前改為罰俸之例即行停止除廷標等五員降調之案業已四年期滿仍准開復外所有董濬一員即照此例辦理欽此親王郡王等降級乾隆五十六年五月奉上諭向來定例兼将軍副都統之宗室王公等遇有案件應與同事大臣降調者每降一級俱加倍罰該管職任俸四年抵銷苐念因一案将同事大臣等俱行實降王公等僅於兼管職任内罰俸抵銷並不降級仍行留任未免於宗室王公等稍有袒䕶殊未平允本日因偷盜内庫銀兩一事業經降㫖将崇尚斌寧所兼職任俱行實降著交宗人府及該部嗣後凡兼職任之宗室王公等遇有案件應與同事大臣降級調用者均著照此次之例将宗室王公等所兼職任實行議降其加倍罰俸抵銷之例著即停止况所降者僅兼任之級於伊等承襲原爵殊無干涉欽此辦理陵寢事務貝子公等罰俸分别公私乾隆四十三年三月奉㫖管理宗人府旗務之王公等遇有罰俸案件如係私罪均罰王公俸若係公罪俱各罰職任俸其辦理陵寢事務之貝子公等雖無兼銜亦係在大臣分上辦事理應照依管理宗人府旗務王公之例辦理嗣後辦理陵寢事務之貝子公等若因私罪罰俸仍罰伊等貝子公俸外如係公罪即照罰都統職任俸在伊等俸禄内坐扣将此著為例欽此旗員降級八旗職任官縁事應降級留任者按所降幾級即降俸幾級應降級調用者各按品級遞降内務府所屬職任官應降級調用者每一級加罰俸一年免其降調降級多者照此遞増世職官縁事應降級留任者亦按所降之級降俸應降級調用者每一級以罰世職半俸三年議抵降級多者照此遞増罰俸未完不准陞轉如世職兼職任所犯在職任者不論世職大小俱就職任議處不由職任所犯世職大即就世職議處職任大即就職任議處議處侍衞乾隆元年七月奉㫖嗣後侍衞等差使遇有議處事件著領侍衞内大臣即行議奏欽此議處世職父祖所得世職承襲之子孫縁事應革職者即行議革查明應襲之人奏請承襲至本身出征因公所得世職有犯賭博宿娼枷號以上之罪者将世職黜革雖有襲次不准承襲其餘所犯之罪應革職者免其黜革永停半俸俟伊身故後子孫仍按次承襲支食全俸其本身効力隨衆所得世職縁事應革職者即行議革雖有襲次不准承襲議處大小兼銜正副㕘領兼管佐領者因公降革離任係叅領任内之事将㕘領議以降革仍留佐領係佐領任内之事将佐領議以降革所兼叅領該管大臣出具考語另行請㫖其議以降調佐領如屬世襲者按所降級數每一級罰佐領半俸三年議抵若係公中佐領即行降調再有兼銜仍留小銜副都統以上等官有兼佐領者因公降革離任係副都統等官任内之事将副都統等官議以降革仍留佐領係佐領任内之事将佐領議以降革所兼副都統等官於本内聲明請㫖其議以降調佐領如屬世襲者按所降級數毎一級罰佐領半俸三年議抵若係公中佐領即行降調再有兼銜仍留小銜若因私罪降革毋庸請留兼攝之任至所兼世職除例内定有専條不准存留者仍照舊遵行外其餘俱准存留世職外省協領等官有似此兼管者亦照此例行議處世職兼文武職任文武職任官如有貪汚行止不端革職者不論何任事發所兼之官俱行革退應襲官交與該旗查明應襲之人承襲若因溺職議處者将所兼之世襲公中佐領及文武職任一併革退其世襲應否存留之處該旗具奏請㫖至奉特㫖革退各官係由武職内獲罪革退者所兼文職應去應留該部院具奏請㫖所兼世職佐領該旗具奏請㫖係由文職内獲罪革退者所兼武職世職佐領并止任武職獲罪革退者所兼世職佐領應去應留該旗具奏請㫖其文職兼任因公掛誤罪止降革離任者查係何任内掛誤即由何任内降革武職兼世職官罪止革職者在武職任内掛誤革其武職仍留世職革職留任者係由何任議處即停何任之俸所剰之職尚有餘俸仍行給與降級留任者係由何任議處即按何任品級扣俸因病具呈者停俸文職俟病痊補缺日給俸若兼世職俟病痊具呈日給與世職之俸武職俟病痊隨旗當差日給俸再世職佐領挑選侍衞實因家貧不能行走經領侍衞内大臣奏退侍衞者回旗仍在世職佐領上行走若因怠惰規避行止不端叅革侍衞者将所兼之職俱行革退應襲官該旗将應襲之人奏請承襲議處原任降調官員陞任後遇原任事發應行降調者如係營私作弊等案情罪重大者俱於原任内議以降調将陞任并所有兼任一併降調係因公掛誤情罪尚輕者於現任内議以降調仍留所兼之任至内外陞任官員尚未引見遇有原任内因公降革處分叅案到部仍於原任内議處将陞補之處扣除係在引見之後者即於陞任内議處例有展㕘之案照離任官例議結其毋庸引見各員並換防屯田軍營出師人員以具題奉㫖之日為斷分别議處至㕘案到部遲延将開報遲延並督催不力各官照遲延例議處如核其發覺日期在陞任以前而開報在陞任以後者即照規避例議處議處記過官員八旗官員承辦事件不加詳慎致有錯失其情罪不至特疏叅處者該管大臣記過一次報部存案俟積至三次該管大臣即行㕘奏交部将該員罰俸三個月議處出師人員派往出兵屯種駐劄官員遇有議處之案應罰俸者准其註册於事竣之日補行罰俸應降級留任革職留任者仍按年限開復應降級調用者帶所降之級仍留軍營効力暫停開缺准照原缺支食俸餉等項其應行革職者即於議處本内将該員應否開缺准留軍營効力支食半俸或作為兵丁効力之處聲明請㫖以上降革准留軍營効力官員均俟事竣之日該管官将該員出具考語給咨送部引見請㫖其奉特㫖革職留在軍營効力者亦准其支食半俸至在辦事處有犯降革並非進𠞰者不准留營効力若有錢糧等項未清亦不准回旗伊犁新疆等處由内地派往換班及屯田各員遇有降革罰俸等案仍照向例辦理至伊犁烏嚕木齊巴里坤等處駐防大臣官員遇有處分毋庸註冊均照内地駐防一例定議議處軍營派守卡倫人員乾隆十七年二月奉上諭兵部議奏将違例私将地畆典與民人之卡倫侍衞佛保應否革職仍令在軍營効力等語佛保係犯罪之員非尋常派出軍營者可比理應於年滿之後多留數年効力贖罪今乃僅将卡倫侍衞佛保議以年滿時令該将軍出具考語帶領引見所議未為詳悉佛保著留軍營俟伊應届三年期滿後再留三年効力贖罪嗣後如有似此者俱照辦理欽此伊犁官員罰俸減半坐扣伊犁駐防滿洲索倫錫伯察哈爾厄魯特部落協領等官因公罰俸照京城䕶軍校驍騎校例減半坐扣重欵審虚将軍都統副都統㕘劾屬員所㕘重欵全屬虚㒺者照溺職例革職若係該管上司挟嫌誣報将誣報官照此例革職至審案已結事經昭雪例得於本内聲明准其開復或原㕘重罪審虚該員尚有輕罪例應降級罰俸者亦應於本内聲明将原㕘革職之案准其開復按其所犯輕罪分别議處倘拘牽斥駁不為題請准本人赴部告理經部查核得實除将本人照例題請開復外将不行題請官照偏袒不公例降二級調用係承審官不詳請開復者照此例降二級調用如所控虚揑不實将本人交刑部照例治罪其或承審之員因原叅已經去任有意審虚使㕘員倖圖開復照故出例革職或原叅重罪全屬虚罔承審官迴䕶原叅不行審雪有心鍜鍊照故入例革職并有重欵雖已審虚撏撦一二輕欵以實之代原㕘掩飾者照徇情例降二級調用因公降革在京武職三品以下五品以上因公降革旗員若有辦事勤練人材可用任内並無錢糧不清及治罪之案者該管大臣将該員降革之案咨送都察院秉公察核如果應行帶