body:
  text: 欽定四庫全書欽定八旗通志卷六十七土田志六土田規制屯户規制謹案雍正二年以内務府餘地併八旗入官地畆於覇州等處撥旗人首户試行井田故舊志立井田一目乾隆元年已停止井田改為屯戸今敬遵新例標目而仍列井田規制於前識縁起焉雍正二年閏四月諭曰朕交與怡親王查户部餘地内務府衙門餘地拖欠錢糧人員所交地畆數目俱已查明具奏朕盡行覽過爾等即照此辦理但内有民地如何辦理之處爾等議明具奏再行辦理六月怡親王等覆奏臣等查得内務府餘地共一千六百餘頃拖欠錢糧人等所交地共二千六百餘頃此二項地内挑選二百餘頃作為井田行文八旗除官員子弟現在讀書之人及有産業現可當差並後順藩下人等外将無産業滿洲五十户䝉古十户漢軍四十户共挑選一百户前往種地此撥去種地之人自十六歳以上六十嵗以下各授田百畆周圍八分為私田中間百畆為公田共力同養公田俟三年之後所種公田百畆之榖再行徴取将革職大員内誠實有年紀者揀選二員前往勸教管理三年之内果有成效着令議叙十月後農事既畢令打歩圍學習射箭伊等子姪内有好者令本佐領照常挑差如果行之有效再照此例派往一次庶無産旗人各得竭力以務本業而亦可服苦矣令户部挑選賢能司官㑹同該州縣将拖欠錢糧人員所交之地查明収貯仍将地之腴􅇤租價之實数查明分為等次造冊報部再與種地人等壓蓋土房四百間設立村荘之處亦交與查地官員即将此項地内挑選設立算其人口分給每間給銀十両共需銀四千両仍将用過銀数造冊報部俟土房盖完之日将種地人等令其前往居住此耕種井田人每名給銀五十両以為一年辦買口糧牛種農具之用将此銀即交與查地官員㑹同管理勸教二人公同監辦若有餘剩銀両分與伊等以備來年種地之用将用過銀両報部查核壓蓋土房辦員農具合算共約需銀一萬四千両此二項地内除挑選井田地畆外仍有地四千餘頃約計一年可得租銀三萬餘両立此井田所需銀両将户部銀両支給再拖欠錢糧人等所交之地如何作價抵補拖欠錢糧之處俟查完地畆後再行議奏現在地内有典旗人地畆者有典買民人地畆者先經内務府奏稱如典旂人地畆勒限三月准其取贖如逾限即行入官辦理此内有典買民人地畆俱闗係地方錢糧應交與地方官勒限三月令原業主取贖如逾限将此地交與該撫給與本地民人収取原價觧交内廣儲司等語但典賣地畆之人俱係貧窮小民勒限則不能遽得銀両取贖請暫停勒限使民人得銀即在户部具呈騐㸔原契照部原折價銀交納准其取贖未贖之前照例起租觧部贖後止租再查户部餘地俱係供應各處撥給備用之地仍令各處収贖備用如有撥給之處仍照舊撥給再作井田地畆内倘有旗民人等之地交雜其中者将就近存貯好地内照数換給如此八旗中無産業者各得産業以全生計均沾聖主洪恩於無既矣奉㫖所議甚好照行三年正月又奏新城縣有地一百一十六頃零固安縣有地一百二十五頃八十九畆零俱係拖欠錢糧人等所交及内務府所収之地畆查固安縣地畆坵叚雖属零星然皆附近村居且去京師甚近甚可分給種地人等耕種請将固安縣所有一百二十五頃八十九畆零官地以十二頃五十畆為公田以一百頃為私田計得十二井五分其存剩一十三頃三十九畆零為種地之人室廬塲圃處所至壓蓋土房需銀四千両令直𨽻縂督於雍正二年地丁錢糧内動支交地方官即行壓蓋務於二月内完工庶耕種不失農時一靣預行挑選種地人等俟土房報完之日即給與口糧牛種農具等項銀両撥往居住其管理之員俟八旗查送到日彚齊引見恭候欽定奉㫖依議耕種之期已近壓蓋土房務期堅固不可草率即速行文二月又奏井田管理之員據八旗都統咨送原任副都統保徳等二十九員到部相應開列職名即帶領引見奉㫖此次著厄爾徳黒連宵先去将此十人爾部記檔再派往時此内派往五年奉上諭旗人枷號鞭責治罪革退官兵並無恒業在京閒住倚靠親戚為生以致良善之人被累維艱而伊等無事閒㳺不能不生非為惡将此等之人查出令於京城附近直隸地方耕種井田作何安置之處王大臣等㑹議具奏遵㫖議定将八旗滿洲䝉古内拖欠錢糧及為非犯法枷責治罪革退官兵皆并其妻子發往井田各該旗查明備造細冊鈐蓋印信發與管理井田之官嚴行約束令其耕種不許出入京城伊等子孫内如有長大誠實弓馬嫻熟欲來京披甲當差者該管官保送來旗於挑選披甲時仍行挑選若挑選後為非犯法者将保送之官一體治罪發往井田之人在彼處仍行怙惡不悛妄生事端者管理井田官即呈報該旗咨部加倍從重治罪廵察御史地方官員亦不時稽察若不守分飲酒生事等項地方官不申報該督或該督不咨行該地方被廵察御史察出将州縣官並該督議處若御史不行查恭将御史治罪再管理井田之員有事呈報各旗若無記識難以慿信交與該旗鑄給管理井田闗防但今𤼵往之人皆係從前已經治罪不必照先去之人安置每户給三十畆五户共給牛三隻購買牛具籽粒等物及每年口糧每户給銀十五両交與管理井田官員於相宜地方築建土堡酌量人口多寡苫蓋土房俾其居住𤼵往之人管理井田官員不能料理妥貼或約束不嚴致令生事擾害地方者将管理官員從重治罪嗣後每年一次查出𤼵往再有開户之人犯法治罪退甲閒住不無妄生事端嗣後給與發往井田人内効力良善之人為佃丁不許擅賣令其出力又諭井田地方止有一人管理著於彼處再補放驍騎校四員領催八名料理事務俸餉陞轉照在京驍騎校領催一體以為彼處之人出身之路若陞轉後仍在彼處効力者即令其帶銜在彼居住此二年在彼勤慎可用應補驍騎校之人著保送到部引見補放乾隆元年四月和碩荘親王等奏設立井田試行十年以來所有承種之一百八十户縁事咨回者已有九十餘户循環頂補大都皆不能服田力穡之人行之未見成效但此時若盡行撤回則勤謹者轉致失業若将不肖之户咨回更換勢必増添工本徒費錢糧臣等酌議應令確察實力耕種安挿得所者改為屯户按畆完納屯糧於附近州縣倉内収貯備用其原設之領催改為屯長約束屯户聼該處防禦管轄原設之驍騎校撤回該旗補用不能力穡之户咨回本旗停其撥補原領田房交州縣賃耕取租觧部又雍正五年将過犯革退之旗人發往固安新城二縣每户給地三十畆并給牛具耔種蓋造土堡房屋令居住耕種當經各旗發過六十二名除病故迯亡外現今只存二十七户此二十七户亦應查明将實力耕種者改為屯户其中不肖之户亦令咨回本旗奉㫖依議十一月又議覆管理井田事務甘國璧等條奏屯荘七欵一井田每户原給田一百二十五畆以十二畆五分為公田十二畆五分為室廬塲圃一百畆為私田公田糧石原係盡収盡報今改為屯荘未便仍循公田舊例應交與户部核定科則行令該州縣遵照徴収屯糧一堡户原止給地三十畆俾其自種自食不交公糧今既改屯若令其按畆完糧未免拮据且現在此等户数亦属無多應聼其暫行照舊耕種一三堡旗人零星居住旗民雜處難於約束稽查應将各户原領房地交還州縣即於咨回井户所遺房地内照数撥給一改屯人户嗣後身故有子者自應頂補倘遇無子寡婦情願守節並無親属可依者留地四十畆養贍即令本屯人代種完糧俟伊身後仍将地畆交官召種一井田原撥霸州固安永清新城四州縣之地今議改屯荘令防禦管轄而現在防禦止有霸州一員固安一員應将附近霸州者令霸州防禦管轄附近固安者令固安防禦管轄一井田各荘向設鄉長一名專供督率農務交糧并稽查逃盜賭博等事今改屯荘請仍留供役如果能勤慎遇屯長缺出准其㧞補一驍騎校在外耕種多年一旦撤回未有可補之缺該員呈稱難以度日應准其暫留種地俟有缺補放之日即令回京将地畆交還州縣奉㫖依議三年户部覆准從前井田每户毎年交榖十二石五斗収貯縣倉今改為屯田是並無公田私田之分應照畆輸糧毎畆徴屯糧一斗既不失皇上愛養旗人之至意復與原設井田良法亦不相悖所有霸州之狄家荘等四處共地三十六頃二十五畆固安之蠻子營等五處共地六十四頃十一畆零永清之喬家營等三處共地二十七頃五十畆新城之荘西宫井二邨共地二十七頃十二畆零以乾隆二年為始令各州縣㑹同防守尉於秋収後照数徴収并照口外熱河八旗地畆之例造入地糧冊内報部查核奉㫖依議十一年六月奉上諭直𨽻通省今年應徴地丁錢糧已加恩全行蠲免固安霸州二防守尉所轄應徴屯糧例不在蠲免之内但朕念耕種井田之旗户按畆輸榖在縣交納與民田正賦納銀者相同著将固安霸州二防守尉本年應徴屯糧榖石一體加恩蠲免該部即行文該督知之十七年三月户部議覆直𨽻總督方觀承疏稱霸州固安永清新城四州縣共查出屯户私立年限租約三百三十五張長租地二十七頃四畆有零租市錢二千五百一十千文又銀三両榖三百餘石甚属不合查屯荘地畆給與無業旗人耕種輸租原為旗人立經乆之業自應力勤耕作永安生計乃不肖屯户等擅将所種額地私立坐租之名違例長租實與私典無異若非嚴行懲創無以儆戒将來應如該督所議将長租地二十七頃四畆有零全行撤出召種輸租其各屯長屯户得過長租錢文銀兩榖石并令勒限追出入官屯長納寧屯户張桂民人劉全忠等均應照律分别治罪但事犯在乾隆十四年四月初九日恩詔以前應予援免又議屯長額種地畆之外復有認種空分地畆因屯户退出地畆有違欠者據屯長呈明代種帶銷其無違欠者亦准認種交租前督臣高斌酌議令屯長代種既可以帶銷舊欠又可以裕其生計詎意不肖屯長因認種地多遂爾長租私典以致積欠纍纍今既徹底查清自應將屯長認種地畆概行撤出召民承種輸租又議節年舊欠科則榖及代種帶銷穀又節年舊欠帶完銀及舊欠認種空分地租銀均應酌定年限帶徴查屯户所種額地僅交科榖舊欠尚少其撤剰地畝嵗獲租糧儘可帶銷應將所欠科穀無分多寡均以三年帶完至屯長認種額地及空分地畆兼交銀穀節年積欠較多存剰地畆及所食錢糧不敷坐扣應再行查核如為數不多三五年内可以帶完者銀則於錢糧内按季坐扣榖則於所種地内分年帶交倘所欠銀榖過多約計年限不能帶完者即將該屯長革退嚴行治罪至防守尉有管轄之責既狥情任其貪多攬種其私行立約長租又毫無覺察以致連年積欠無完應即着落防守尉名下賠補如既定分年之後復不按限清完以致逃亡拖欠者應將未完之項亦着落經催不力之防守尉按數賠補又議未完借領捐備榖二千餘石及借米八十三石各屯户前欠未清續借自宜撙節乃並不計及該户能完與否遽行申部請借移交地方官放給竟致一人名下拖欠多至數十餘石其狥庇濫借咎實難辭據該督聲明乾隆九年恩詔所有借出籽種口糧等項查明實在無力完繳者准予豁免今前項未完原借米麥榖石是否實係無力完繳應令該督詳細查明取結具題其餘未完原借捐備榖石應如該督所請均分作三年帶完如限滿不能催完即着落防守尉名下賠補又議此項屯糧向係地方官經徴按年彚入另案奏銷防守尉雖有管轄之名並無協催之實查屯户以防守尉為專管民人以州縣為專管理事㕔則旗民統轄應將屯户額徴科榖責令防守尉經徴其退出召民承種地畆應令地方官經徵統以各理事㕔為督催每年另冊奏報如有未完與地糧一例處分又議理事同知既有分任督催之責如有闗屯户錢糧地畆事件理應分同稽查該防守尉不得徑行申部并令嗣後防守尉一面徑移道司核詳咨部一面移明理事㕔查核轉報又議旗人地畆久經嚴禁不許私行典賣今固安霸州等處屯長擅將所種旗地私立坐租之名租與民人耕種實與私典無異該防守尉等漫無覺察殊屬不合應將原任固安縣防守尉海明原任霸州防守尉孫塔均應照例各罰俸一年事在恩詔以前應予寛免奉㫖依議以上屯户規制欽定八旗通志卷六十七
