body:
  text: 典禮志十八旗喪禮王公等喪禮官公主王妃等喪禮公等塋制員喪禮王王公等喪禮和碩親王薨上輟朝三日㑹喪者和碩親王以下奉恩将軍以上民公侯伯都統尚書子爵以下佐領騎都尉以上及本翼宗室集於外固倫公主和碩福晉以下奉恩将軍恭人以上集於内全設儀仗並鞍馬空馬各十五匹彩棺朱髤餙金龍内襯五層喪主王長子無則長孫承重及餘子皆剪髪辮去冠飾主婦王福晉無則承以冡婦及諸婦以下皆去首飾散髪成服王所屬官員俱成服初祭上賜牛一羊八酒九瓶紙錢三萬次祭賜同加封諡給造墳銀五千兩命工部立碑墳前並建碑亭翰林院撰給碑文初祭除上賜羊紙外自偹引旛一桿金銀錠七萬紙錢四萬祭饌三十席羊九隻次祭同百日期年用金銀錠一萬紙錢一萬祭饌十五席羊九隻上賜羊紙遣官詣墳致祭二次王所屬宗室官員於墳前門外跪迎俟所遣官過随入讀祝祭奠畢仍送諭祭官至迎接所望闕謝恩行三跪九叩頭禮世子薨上輟朝二日㑹喪者和碩親王以下奉恩将軍以上民公侯伯都統尚書子爵以下㕘領以上集於外固倫公主和碩福晉以下奉恩将軍恭人以上集於内全設儀仗並鞍馬空馬各十四匹初祭上賜牛一羊八酒九瓶紙錢二萬五千次祭賜同給造墳銀四千兩初祭除上賜羊紙外自備引旛一桿金銀錠六萬五千紙錢四萬祭饌三十席羊九隻次祭同百日期年用金銀錠一萬紙錢一萬祭饌十五席羊九隻彩棺朱髤繪龍殮襯造墳封諡立碑諭祭等項俱如和碩親王例郡王薨上輟朝二日㑹喪者和碩親王以下奉恩将軍以上民公侯伯都統尚書子爵以下􅄁領以上集於外固倫公主和碩福晉以下奉恩将軍恭人以上集於内全設儀仗並鞍馬空馬各十四匹初祭上賜牛一羊六酒七瓶紙錢二萬三千次祭賜同給造墳銀三千兩初祭除上賜羊紙外自備引旛一桿金銀錠六萬紙錢三萬七千祭饌二十五席羊七隻次祭同百日期年用金銀錠一萬紙錢一萬祭饌十三席羊七隻彩棺朱髤繪龍殮襯造墳封諡立碑諭祭等項俱如和碩親王例貝勒薨上輟朝一日㑹喪者世子郡王以下奉恩将軍以上民公侯伯都統尚書子爵以下本旗佐領集於外和碩公主世子郡王福晉以下奉恩将軍恭人以上集於内全設儀仗並鞍馬空馬各十三匹初祭上賜牛一羊四酒五瓶紙錢一萬五千次祭賜同給造墳銀二千兩初祭除上賜羊紙外自備引旛一桿金銀錠五萬紙錢三萬五千祭饌二十席羊五隻次祭同百日期年用金銀錠一萬紙錢一萬祭饌十席羊五隻彩棺朱髤繪蟒殮襯造墳封諡立碑諭祭等項俱如和碩親王例不造碑亭貝子薨㑹喪者貝勒以下奉恩将軍以上民公侯伯都統尚書子爵本旗􅄁領郎中以上集於外貝勒夫人以下奉恩将軍恭人以上集於内全設儀仗並鞍馬空馬各十二匹用彩棺朱髤繪蟒内襯三層初祭上賜羊五隻酒五瓶紙錢一萬次祭賜同給造墳銀一千兩初祭除上賜羊紙外自備引旛一桿金銀錠四萬紙錢三萬祭饌十五席羊三隻次祭同百日期年用金銀錠八千紙錢八千祭饌八席羊五隻封諡立碑諭祭等項俱如貝勒例鎮國公卒㑹喪者貝子以下奉國将軍以上集於外郡君貝子夫人以下集於内全設執事並鞍馬空馬各十匹初祭上賜羊四隻酒四瓶紙錢九千次祭賜同給造墳銀五百兩初祭除上賜羊紙外自備引旛一桿金銀錠三萬紙錢二萬一千祭饌十五席羊三隻次祭同百日期年用金銀錠七千紙錢七千祭饌七席羊四隻彩棺殮襯封諡立碑諭祭等項俱如固山貝子例輔國公卒㑹喪者貝子以下奉國将軍以上集於外郡君貝子夫人以下集於内全設執事並鞍馬空馬各八匹初祭上賜羊四隻酒四瓶紙錢八千次祭賜同給造墳銀五百兩初祭除上賜羊紙外自備引旛一桿金銀錠二萬紙錢一萬二千祭饌十五席羊三隻次祭同百日期年用金銀錠六千紙錢六千祭饌七席羊四隻彩棺殮襯封諡立碑諭祭等項俱如鎮國公例鎮國将軍卒輔國公以下奉國将軍以上集於外用朱棺襯一層設執事並鞍馬七匹初祭上賜羊二隻酒二瓶紙錢五千次祭賜同初祭除上賜羊紙外自備引旛一桿金銀錠六千紙錢一千祭饌六席羊三隻次祭同上仍賜羊紙遣官祭一次翰林院撰給祭文迎接謝恩如例立碑候㫖行輔國将軍卒㑹喪者鎮國将軍以下集於外用朱棺襯一層設執事並鞍馬五匹初祭上賜羊一隻酒一瓶紙錢四千次祭賜同初祭除上賜羊紙外自備引旛一桿金銀錠五千紙錢一千祭饌五席羊三隻次祭同上仍賜羊紙遣官祭一次内閣撰給祭文迎接謝恩如例自立碑内閣撰給碑文奉國将軍卒㑹喪者輔國将軍以下集於外用朱棺襯一層設執事並鞍馬四匹初祭次祭上共賜羊一隻酒二瓶紙錢六千初祭自備引旛一桿金銀錠四千紙錢四千祭饌四席羊一隻次祭同上所賜羊紙亦在數内上仍賜羊紙遣官祭一次迎接謝恩如例奉恩将軍卒不㑹喪用朱棺襯一層設執事並鞍馬三匹初祭次祭上共賜羊一隻酒二瓶紙錢三千初祭自備引旛一桿金銀錠三千紙錢三千祭饌三席羊一隻次祭同不撰祭文宗室卒用朱棺襯一層鞍馬二匹初次祭用引旛一桿金銀錠三千紙錢三千祭饌二席羊二隻八分以内和碩親王已娶妻未封之子卒用鞍馬七匹郡王子用鞍馬六匹貝勒子用鞍馬五匹貝子之子卒用鞍馬四匹鎮國公輔國公之子卒用鞍馬三匹建造墓室聴便八分内無品級宗室卒所用馬羊金銀錠紙錢祭饌照鎮國将軍例和碩親王以下貝子以上薨鎮國公輔國公卒俱由宗人府題請賜封諡得㫖賜諡内閣擬諡以聞鎮國将軍輔國将軍卒應否與諡宗人府具題請㫖奉國将軍以下不疏請𦵏期親王期年而𦵏郡王貝勒七月而𦵏貝子以下公以上五月而𦵏凡應㑹喪者進衙門用常服辦事如至喪家及墳所仍用喪服御前公侯伯内大臣䕶軍統領䕶軍􅄁領以上官員及部員不應㑹喪者奉㫖遣往方許赴喪其餘各旗䕶軍統領䕶軍􅄁領䕶衛各随本府王等赴喪各官命婦亦随本府王妃等赴喪不許私往公主王妃等喪禮親王福晉薨㑹喪者和碩親王以下奉國将軍以上集於外固倫公主親王福晉以下奉國将軍恭人以上集於内設儀仗鞍馬六匹用彩棺内襯五層王下官員帽除纓官員妻俱喪服初祭次祭日上賜牛一隻羊八隻酒九瓶紙錢二萬餘儀與親王喪同世子福晉薨㑹䘮者世子郡王以下奉恩将軍以上固倫公主以下奉恩将軍恭人以上屬員服喪及棺襯俱如親王福晉例設儀仗鞍馬五匹初祭次祭日上賜牛一隻羊六隻酒七瓶紙錢一萬五千餘儀與世子同郡王福晉與世子福晉喪同貝勒夫人薨惟固倫公主親王福晉不㑹喪屬員服喪及棺襯俱如郡王福晉例設儀仗鞍馬四匹初祭次祭日除上賜羊五隻酒五瓶紙錢一萬餘儀與貝勒喪同貝子夫人薨㑹喪者貝勒以下集於外郡主貝子夫人以下集於内屬員服喪俱如貝勒夫人例用彩棺内襯三層設儀仗鞍馬三匹初祭次祭日上賜羊三隻酒三瓶紙錢七千餘儀與貝子喪同鎮國公夫人卒㑹喪貝子以下集於外郡君貝子夫人集於内屬員服喪及棺襯執事馬匹俱如貝子夫人例初祭次祭日上賜羊二隻酒二瓶紙錢六千餘儀與鎮國公喪同輔國公夫人卒惟郡君不㑹喪屬員服喪及棺襯執事馬匹俱如鎮國公夫人例初祭次祭日上賜羊二隻酒二瓶紙錢五千餘儀與輔國公喪同固倫公主薨會喪者和碩親王以下奉國将軍以上集於外固倫公主親王福晉以下奉國将軍淑人以上集於内所屬官員俱喪服全設儀仗並鞍馬六匹用彩棺襯五層上共賜牛一羊八酒九瓶紙錢二萬餘儀節與親王喪同若下嫁外藩翰林院撰擬祭文遣官致祭和碩公主薨㑹喪者世子郡王以下奉恩将軍以上固倫公主以下奉恩将軍恭人以上所屬官員俱喪服全設儀仗並鞍馬五匹用彩棺襯五層上共賜牛一羊六酒七瓶紙錢一萬七千儀節與世子福晉同郡主喪儀與郡王福晉同縣主喪儀與貝勒夫人同郡君喪儀與貝子夫人同縣君喪儀與鎮國公夫人同鄉君喪儀與輔國公夫人同若下嫁外藩均遣官致祭如儀親王側福晉喪與世子福晉同惟諭祭一次禮部疏請候㫖遵行不撰祭文世子側福晉喪與郡王福晉同郡王側福晉喪與貝勒夫人同貝勒側夫人喪與貝子夫人同貝子側夫人喪與鎮國公夫人同鎮國公側夫人喪與輔國公夫人同輔國公側夫人喪輔國公以下㑹喪餘與輔國公夫人同王公等塋制王府塋制親王享堂五間門三間描畫五彩飛金小花圍墻一百丈門外房五間碑亭一座守塜人十家世子郡王享堂三間門三間畫五彩小花圍墻八十丈門外房三間碑亭一座守塜人八家固倫公主同貝勒貝子享堂三間門三間紅油圍墻七十丈門外房三間守塜人六家和碩公主郡主同鎮國公輔國公享堂三間門三間紅油圍墻六十丈守塜人四家縣主郡君縣君同𦵏費親王造墳銀五千兩世子造墳銀四千兩郡王造墳銀三千兩貝勒造墳銀二千兩貝子造墳銀一千兩鎮國公輔國公鎮國将軍造墳銀均五百兩輔國将軍造墳銀四百兩王府碑制親王石碑交龍首髙四尺五寸碑身髙九尺濶三尺八寸七分龍趺髙四尺五寸郡王石碑交龍首髙三尺九寸碑身髙九尺濶三尺八寸龍趺髙四尺三寸貝勒石碑交龍首髙三尺六寸碑身髙九尺濶三尺七寸三分龍趺髙四尺一寸貝子石碑交龍首髙三尺四寸碑身髙九尺濶三尺六寸六分龍趺髙四尺鎮國公輔國公石碑交龍首髙三尺三寸碑身髙九尺濶三尺六寸三分龍趺髙三尺九寸鎮國将軍碑式照一品例輔國将軍碑式照二品例王府造碑料價親王碑價銀三千兩世子碑價銀二千五百兩郡王碑價銀二千兩貝勒碑價銀一千兩貝子碑價銀七百兩鎮國公輔國公碑價銀各四百五十兩鎮國将軍碑價銀三百五十兩輔國将軍碑價銀三百兩順治五年十月定賜諸王以下修造園塋銀兩以和碩禮親王與衆不同特賜銀一萬兩乾隆十二年三月諭據公九如奏請指俸借銀三千兩修伊髙祖英親王阿濟格園寝英親王原係國家宣力名王今伊園寝年乆傾頽不必借俸修理着即加恩交與工部撥官帑修理三十八年二月諭睿親王多爾衮當世祖章皇帝冲齡踐阼時攝政有年威福自専不能恪盡臣節身殁之後因其屬人首告經諸王大臣定罪除封成案具在苐我朝定鼎之初睿親王實先率衆入闗肅清京輦檄定中原前勞未可盡冺今其後嗣廢絶而塋域之在東直門外者嵗乆益就榛蕪亦堪憫惻著交内務府𣲖員前往相視将墻屋傾頽者酌加繕茸仍為量植松楸並准其近支王公等以時祭掃用昭朕篤念成勲瑕瑜不掩之至意四十二年諭現在修理履端郡王墳塋着加恩於養心殿内庫賞銀二萬兩官員喪禮異姓公和碩額駙卒用朱棺襯一層設執事並鞍馬七匹初祭用引旛一桿金銀錠八千紙錢八千祭饌八席羊四隻次祭同侯伯卒用朱棺襯一層設執事並鞍馬六匹初祭用引旛一桿金銀錠七千紙錢七千祭饌七席羊四隻次祭同一品官卒用朱棺襯一層設執事並鞍馬五匹初祭用引旛一桿金銀錠六千紙錢六千祭饌六席羊三隻次祭同二品官卒用朱棺襯一層設執事並鞍馬四匹初祭用引旛一桿金銀錠五千紙錢五千祭饌五席羊三隻次祭同三品官卒用朱棺襯一層設執事並鞍馬三匹初祭用引旛一桿金銀錠四千紙錢四千祭饌四席羊二隻次祭同四品官卒用朱棺襯一層設執事並鞍馬二匹初祭用引旛一桿金銀錠三千紙錢三千祭饌三席羊二隻次祭同五品官以下至有頂帶官故用朱棺襯一層設執事並鞍