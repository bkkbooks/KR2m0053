body:
  text: 欽定四庫全書欽定八旗通志卷二百二十九人物志一百九忠義𫝊二十一漢軍八旗一順治十五年共七十五人天命六年至髙守官髙守官漢軍鑲黄旗人任鴨緑江鎮守堡官天命六年中軍陳萬策叛執鎮守逰擊佟養正送明總兵毛文龍守官與焉遂遇害恩賜騎都尉世職承襲詳見世職表花應春花應春漢軍鑲黄旗人崇徳三年以佐領随多羅貝勒巴彦征明至山東攻臨清城先登戰歿賞卹如例崔應泰崔應泰漢軍鑲黄旗人原籍廣寜初任佐領崇徳七年随和碩鄭親王濟爾哈朗征明錦州同四都統兵督放紅衣礟攻塔山城礟裂被傷而歿賞卹如例張思孟張思孟漢軍鑲黄旗人初襲三等輕車都尉世職任佐領順治二年從大軍征山東濟寜州梁山泊土賊力戰陣亡恩賜二等輕車都尉給塟銀五百兩立碑銀三百次子遵聖襲張必科張必科漢軍􅀈黄旗人順治四年由貢生授直𨽻慶雲令時土賊多警㑹上元夕賊衆出掠率兵捕之縳三渠斬以殉其黨大合衆圍城賊黨内應者啟門納賊賊大至必科巷戰截殺引弓忽弦斷挺戈躍戰賊環圍之援兵不至舉火自焚賜祭塟贈按察司僉事崇祀名宦祠張文衡張文衡漢軍鑲黄旗人原藉開平衛順治元年以佐領入闗從大學士范文程恭贊軍務山東流冦趙應元作亂文衡討平之以功遷江南徽寜道按察司副使又平巨㓂汪張飛等悉招降諸叛官遂陞甘肅廵撫五年回民米喇印作亂殺總兵官文衡率家丁三十餘人巷戰歿事聞賜祭塟授其子張祖訓知州康熙元年恩贈通議大夫都察院右副都御史管一舉管一舉漢軍鑲黄旗人順治元年授山西徳勝路叅將五年十一月大同總兵姜瓖叛脅從不屈遇害其妻及長子致忠子婦孫女等一十三人皆就戮㓜子承業乳母懐之逃出得免恩贈一舉副將馬成功馬成功漢軍鑲黄旗人國初投誠順治六年随和碩鄭親王濟爾哈朗征湖廣偽帥何通爵馬進忠率賊來犯成功同尚書阿哈尼堪擊敗之旋随都統金維城擊賊郝摇旗恢復袁州等處賊將馬進忠復聚衆來犯成功奮勇力戰陣亡恩賜雲騎尉世職承襲詳見世職表傅進忠傅進忠漢軍鑲黄旗人順治二年随明將左夢庚投誠授雲騎尉十六年随安南將軍内大臣逹素征福建海㓂鄭成功十七年五月至厦門力戰陣亡恩賜騎都尉世職承襲詳見世職表祖大春祖大春漢軍正黄旗人大夀之弟也任佐領崇徳三年随揚威大將軍多羅貝勒岳託征明至山東攻濟寜州城率本叅領兵以雲梯先登中礟歿於陣恩賜騎都尉世職承襲詳見世職表尚安福尚安福漢軍正黄旗人崇徳三年随揚威大將軍多羅貝勒岳託征明至山東攻鄒縣以雲梯上城歿於陣恩賜騎都尉世職承襲詳見世職表祖應元祖應元漢軍正黄旗人初任佐領崇徳八年随和碩鄭親王濟爾哈朗征明攻中後所以本叅領火礟從旁擊其城破之進取前屯衛復以礮攻克其外城論功授騎都尉順治元年随都統葉臣平定山西督紅衣礮克太原城十一月随定國大將軍和碩豫親王多鐸平定河南二年四月進攻揚州府城中礮歿於陣恩賜騎都尉世職承襲詳見世職表李向舜李向舜漢軍正黄旗人明寜逺伯李成樑之孫也順治元年以署恭領随定國大將軍和碩豫親王多鐸南征督紅衣礮攻武岡寨克其城二年四月攻揚州府城中礮歿於陣恩賜雲騎尉世職承襲詳見世職表金應得金應得漢軍正黄旗人世居瀋陽地方由驍騎校委署恭領順治二年随大兵征江南四月攻揚州府城中礮陣亡恩賜雲騎尉世職承襲詳見世職表成大業成大業漢軍正黄旗人累任江西湖東道順治五年正月江西逆鎮金聲桓叛約大業共謀不從被執罵賊不絶聲遂遇害八年賜祭一次李向堯李向堯漢軍正黄旗人順治元年任山西助馬路叅將五年十一月大同總兵姜瓖叛向堯被執脅䧏不屈闔家七十餘口殉難恩贈左都督僉事王自明王自明漢軍正黄旗人初任佐領順治三年随征陕西遇流賊孫守法率本旗兵敗之又賊帥賀珍率馬歩兵五千餘列陣於山自明随定西大將軍何洛㑹擊敗之五年十一月山西總鎮姜瓖叛六年七月随征西大將軍和碩㢲親王滿逹海徃征九月攻汾洲府城中礮陣亡恩賜騎都尉世職承襲詳見世職表劉應舉劉應舉漢軍正黄旗人初任佐領随大兵攻明右衛朔州督紅衣礮克其城順治六年七月隨征西大將軍和碩㢲親王滿逹海征山西叛鎮姜瓖九月攻汾州府北闗廂越衆先登遂歿於陣恩賜騎都尉加一雲騎尉世職承襲詳見世職表柏天儲柏天儲漢軍正黄旗人父永馥初為明武官率所屬投誠授騎都尉世職天儲初任侍衛兼佐領順治五年九月隨定逺大将軍和碩鄭親王濟爾哈朗征湖廣流賊李錦六年至岔路口奮勇擊賊陣亡加恩賜三等輕車都尉世職承襲詳見世職表張鴻猷張鴻猷漢軍正黄旗人初任守備随定國大将軍豫親王多鐸南征平定河南江南攻揚州嘉興二府及江隂縣武岡寨四城俱督紅衣礮克之順治五年十一月山西總兵姜瓖叛六年七月随征西大将軍和碩㢲親王滿逹海往討八月攻大同府渾源州督本旗紅衣礮克其城進取中衛戰歿於陣恩賜騎都尉世職承襲詳見世職表郭名望郭名望漢軍正黄旗人世居鐡嶺地方崇徳八年以驍騎校随征明用烏鎗攻克前屯衛取中後所順治元年随豫親王多鐸破流賊滅福王平定河南江南用紅衣礟攻克揚州六月随貝勒博洛征浙江克嘉興旋攻崑山常熟江隂三縣城以功授雲騎尉世職三年五月加騎都尉七年九年三遇恩詔由騎都尉兼一雲騎尉進三等輕車都尉後随征福建同恭領朱名登攻金華城破之六年正月随定西大将軍和碩敬謹親王尼堪征山西叛鎮姜瓖四月由左衛往圍大同攻保徳州中傷歿于陣加賜二等輕車都尉世職子汝龍襲後陣亡自有𫝊李天寵李天寵漢軍正黄旗人任驍騎校順治五年九月随定遠大将軍和碩鄭親王濟爾哈朗征湖廣流賊李錦六年至坌路口遇賊身先士卒力戰歿于陣恩賜雲騎尉世職承襲詳見世職表郭汝龍郭汝龍漢軍正黄旗人父名望陣亡恩賜二等輕車都尉自有𫝊汝龍襲父職順治十一年十二月從定逺大将軍世子濟度征福建海㓂鄭成功十四年至福州聞賊圍羅源縣郭汝龍率兵往援擊賊歿于陣恩賜一等輕車都尉世職承襲詳見世職表李向禹李向禹漢軍正黄旗人李向堯之弟也由貢生任山西陵川縣知縣順治五年十一月逆鎮姜瓖叛向禹罵賊不屈闔家殉難十五年特㫖遣順天府尹羅繪錦致祭恩賜山西按察司僉事廕其弟向旭以知縣職張彦洪張彦洪漢軍正黄旗人續順公沈志祥之部屬也于順治十六年從安南将軍内大臣逹素征福建海賊鄭成功十七年賊擺列舡兵于蓋峙山拒敵彦洪奮勇衝擊陣亡賜輕騎都尉未襲乾隆十六年奉㫖賞恩騎尉世職承襲詳見世職表滕應元滕應元漢軍正白旗人以領催随征有功授騎都尉天聰四年正月從大兵征明攻灤州城奮勇先登力戰歿于陣賞卹如例西逹爾翰西逹爾翰漢軍正白旗人本籍滿洲任副都統管佐領事天總八年從大兵征朝鮮先登衝擊中流矢傷目猶手刄數賊尋歿于陣賞卹如例董廷元董廷元漢軍正白旗人天命六年從大兵定瀋陽大祖高皇帝愛其勇授寛甸守備天聰五年從大兵征明大凌河六年從征察哈爾䝉古七年從征旅順口江華島俱立戰功崇徳元年十二月從征朝鮮二年三月從奉命大将軍恭順王孔有徳征皮島所乘舡被敵礟擊破同家人六口俱沉歿太宗文皇帝憐之恩賜祭銀六百两趙國良趙國良漢軍正白旗人明之守備也崇徳七年大軍圍松山城國良随副将夏成徳來䧏順治元年叙功授騎都尉世職五年十一月大同總兵姜瓖叛國良随定西大将軍和碩敬謹親王尼堪往征六年三月于太谷縣奮勇擊賊中礟陣亡恩賜一雲騎尉七年遇恩詔追贈三䓁輕車都尉世職承襲詳見世職表李可愛李可愛漢軍正白旗人順治三年任山東陽榖縣知縣值土冦丁惟岳之亂可愛嬰城固守力盡城䧟死之賞卹如例遲變龍遲變龍漢軍正白旗人由生員任國史院副理事官遷山西糧道順治三年晋江西布政使整飭學校招集流民江右徳之五年二月金聲桓王得仁㩀城叛舉兵圍署誘以䧏不從賊入署縳脅之變龍罵益厲賊怒割其舌抉其目遂碎屍於市其祖孫父子兄弟妻妾闔門十八人各繫以石沉於江嗣絶康熙三十四年奉㫖崇祀名宦祠董廷儒董廷儒漢軍正白旗人原任大同守備善騎射有謀畧順治五年十二月總兵姜瓖謀叛誘廷儒至署宻語云公如助我成大事富貴當與共也廷儒怒曰汝受國家厚恩不盡忠報効乃思反耶遂起㧞所佩刀殺賊賊衆群起廷儒被擒詈聲倍壮賊剖其心支觧之子開國暨男婦二十七人俱被害嗣絶無可廕襲特㫖追贈昭武将軍祭塟如典禮趙冲學趙冲學漢軍正白旗人順治初任蘭州同知五年河西叛回米喇印丁國棟等紏黨二萬餘來㓂脅䧏不從遂被害賞卹如例董廷柏董廷柏漢軍正白旗人初任驍騎校崇徳五年從征明圍錦州同恭領孫有光擊明松山歩兵敗之又敗其杏山騎兵七年從孫有光擊明閭洪山嘴守兵敗之松山敵兵乗夜犯我壕塹遂攻塔山城廷柏用紅衣礮擊却之叙功列二等又攻杏山城擊却之叙功加一等授佐領八年從征前屯衛至中後所廷柏復以紅衣礮攻其城克之又攻克前屯衛城順治元年二月叙功授雲騎尉二年遇恩詔加騎都尉世職是年從和碩豫親王多鐸南征破流賊平河南五月克揚州六月克平湖嘉善進攻嘉興府克之至錢塘江敵兵萬餘夜犯我營廷柏随都統呉守進擊敗之六年從和碩鄭親王濟爾哈朗征湖廣流賊李錦同副都統金維城率兵至馬河力戰陣亡恩賜騎都尉加一雲騎尉世職承襲詳見世職表張登雲張登雲漢軍正白旗人順治二年以佐領随都統巴彦墨爾根侍衛往西安府擊流賊屢敗之又擊敗賊将劉文炳兵是年随肅親王豪格等征四川擊賊首袁韜兵敗之六年正月以管火噐營恭領從平西大将軍和碩英親王阿濟格征大同叛鎮姜瓖八月攻大同闗廂登雲梯中礟陣亡恩賜雲騎尉世職承襲詳見世職表髙􅇐髙􅇐漢軍正白旗人初任佐領順治五年随定逺大将軍和碩鄭親王濟爾哈朗征湖廣流賊李錦六年同副都統金維城率兵戰于馬河奮勇馳擊歿于陣恩賜雲騎尉世職承襲詳見世職表黄廷柏黄廷柏漢軍正白旗人初任江南靈壁縣知縣遷順天大興縣超遷山西汾州府知府順治五年大同總兵姜瓖叛六年四月偽副将姜建勲擁萬騎猝圍汾洲攻䧟城東門廷柏督壯士與賊鏖戰自晝至夜力屈被執罵不絶口遂遇害委屍于路子奠中年十三守父屍號泣汾人感其徳具棺衾歛之置北城下既而奠中亦被賊執碎其首不死九月汾州平世祖章皇帝命廷栢家屬枎柩馳驛還京賜祭塟恩贈太僕寺卿廕奠中為國學生康熙五十七年十月禮臣覆准立祠死所歳時奉祀六十一年十一月遇覃恩以孫國材官追贈廷栢資政大夫福建廵撫兼都察院右僉都御史雍正二年三月世宗憲皇帝御書成仁取義匾額懸祠中示褒崇焉王國輔王國輔漢軍正紅旗人由驍騎校崇徳八年從大兵攻前屯衛中後所二城國輔率本旗兵以紅衣礮克之又随都統葉臣等攻太原城以紅衣礮克之復随多羅武英郡王阿濟格征流賊在延安府同副都統敦岱擊敗之叙功授為雲騎尉两遇恩詔加為三等輕車都尉十年正月病故以子有徳襲後因乏嗣于乾隆十三年奉㫖入祀昭忠祠李變龍李變龍漢軍正紅旗人順治二年任陕西固原鎮標中軍逰擊值土㓂作亂副將武大定率兵討之兵未合與