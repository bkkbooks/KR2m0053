body:
  text: 欽定四庫全書欽定八旗通志卷一百二十一人物志志書之有人物盖自漢晋以来矣襄陽耆舊汝南先賢其記載之權輿乎唐宋至今凡一郡一邑之志洎夫天下之通志無不蒐羅史籍探索金石以表章懿淑垂軌将来亦敦崇世教風勵人心之義也我國家龍興東土奄有埏紘貞元㑹其昌期斯川岳鍾其靈氣風雲龍虎英喆輩生炳炳然與虞臣周佐争光者盖不可以殚數列聖相承教養培植百有餘載我皇上撫臨函夏益鞠益謀四極四合㒺不率迪而八旗根本之地沐浴聖化觀感尤深故髙門巨閥詠駿烈誦清芬者尤繩繩繼起此人物一志所以視往古為盛也然厯朝輿記泛濫者多即八旗舊志但據碑誌之文者亦或不免亦既仰請睿裁一以國史列傳為凖誠足以信今傳後昭袞鉞之至公惟是國史之例義兼彰癉故美惡並存志書之例則遐稽古籍並以揚善為宗茍㫁限不嚴則體裁為舛今敬擬宗室王公以及内外文武大臣惟以功名終始者得入此編或先麗刑書後䝉天鑒宗室如睿親王大臣如鰲拜等亦得並入若其初年黾勉得荷恩榮末路昏迷自羅罪譴雖有功績均不敢濫収又八旗漢軍如范文程之生原豐邑功比鄼侯自宜垂光於竹帛其他勝國舊臣倒戈順命如洪承疇等雖勤勞茂著顯秩酬庸然我八旗滿洲中應天佐運百戰開疆勲業逺出其上者史不勝載實不借楚材晋用以焜耀旂常况我皇上大公至正扶植綱常甄别貳臣各為列傳一筆一削義秉春秋其人既瑜不掩瑕尤未可列為臣範其或家承帯礪延及子孫果有挺出之才仍一體登諸簡牘庻一奪一予均得其平至於宗室襲封諸臣世爵國史之例子孫各附其祖父以著淵源今志人物則必其卓有樹立無忝家聲乃得列為附傳若世澤相承並無事迹及雖有事迹而未為特出者其世系支派則詳載於封爵世職二表兹不複贅焉人物志一宗室王公傳一之上和碩禮烈親王代善案和碩康良親王傑書謹宗室諸傳先列親王而郡王貝勒等以次逓及故不叙世代然每一親王下各有子孫表著者宜連屬比附以便覧觀則又難劃然序爵也兹敬以傳之一載禮烈親王及其子孫傳之二載鄭獻親王及其子孫傳之三載睿忠親王傳之四載豫通親王傳之五載肅武親王傳之六載承澤親王敬謹親王傳之七載追封親王者饒餘郡王是也傳之八亦追封親王者靖定貝勒是也傳之九載原封親王者英親王是也盖首卷至此皆親王而中間各以子孫分附焉至傳之十乃載誠毅貝勒篤義貝勒安平貝勒等傳之十一載原封貝勒阿敏等略傳之十二載鎮國公阿拜至鎮國将軍洛託大序爵之中仍各彚其派係庻披覽之際有條緒可尋云和碩禮烈親王代善子滿達海代善太祖髙皇帝次子初從征哈達輝發葉赫等國論功封貝勒丁未年以東海瓦爾喀斐悠城人苦烏拉國貝勒布占㤗之虐乞移家歸附代善與兄禇英随貝勒舒爾哈齊及一等大臣費英東侍衛扈爾漢率兵三千往徙之軍夜行見大纛上有光衆以為異捫視無有復樹之光如初舒爾哈齊疑非吉兆欲回兵代善與禇英並决意進兵遂至斐悠城盡収環城屯寨凡五百户令扈爾漢率兵三百衛之先行布占㤗發兵萬人邀諸路次日代善與諸貝勒至率兵奮禦遂渡河代善與禇英各率兵五百分二路縁山擊之烏拉兵遂敗代善追及烏拉統兵貝勒博克多從馬上左手攫其胄而斬之上嘉其功賜號古英巴圖魯癸丑年正月布占泰背盟代善随上統大兵征之既攻克遜扎塔郭多鄂謨三城布占泰率兵三萬越富勒哈城而軍時領兵諸貝勒大臣皆欲戰上曰征伐大國豈能遽使無孑遺乎代善曰所慮者無計令布占泰出城耳今彼兵既在平原曠野可一鼓擒也舍此不戰厲兵秣馬何為今我兵士飽馬騰列陣在此當决戰上曰爾等衆志既孚即决戰可也時諸貝勒大臣及軍士皆踴躍遂進兵烏拉兵大敗十損六七餘皆棄兵甲遁我兵乗勢奪門遂克其城布占㤗率敗兵不滿百回至城下見城陴悉樹我軍旗幟大驚潰代善復統兵截擊之布占㤗僅以身免竄葉赫所属城邑皆降編户萬家天命元年上初正大號叙羣臣功封和碩大貝勒四人以代善為首三年四月上以七大恨告天興師征明行二日雨欲旋師代善言天降此雨以懈明将之心吾進兵乃出其不意上善之遂進圍撫順明逰擊李永芳以城降東州瑪哈丹二城及臺保五百餘皆下携降衆還既出明邉二十里明總兵張承廕等率萬人来追代善同四貝勒返戰上遣使止之代善奏曰彼若待我我則與戰若不待是必走矣當乗勢追襲無使我兵寂然歸致謂我怯也上然之亦移師入邉破其三營斬承廕及副将頗廷相恭将蒲世芳逰撃梁汝貴等四年三月明大發兵四路来侵上親禦西路命代善前行偵者告明兵六萬出清河代善曰清河道仄﨑嶇未能驟至當先禦撫順乃與扈爾漢先出扎喀闗方謀設伏待敵㑹四貝勒至謂界藩有築城夫役宜急衛之遂直趨界藩據吉林崖時明總兵杜松結營薩爾滸山而自引兵圍吉林崖衆貝勒遂分兵千助吉林軍上至命先攻薩爾滸山我兵仰射奮擊破之適所遣助吉林崖軍亦乗勝合撃大敗明兵斬杜松及搃兵王宣趙夢麟等而明搃兵馬林復夜營尚間崖代善以三百騎往視遣使馳報上親臨明兵四萬已成陣代善䇿馬先入衆貝勒繼之明兵敗潰斬副将麻岩林僅以身免代善復與四貝勒統兵敗明搃兵劉綎兵四萬於阿布達哩岡綎歿於陣旋収降朝鮮助明之将士而還七月從上攻鉄嶺城敗助明之䝉古兵八月從上平定葉赫六年三月上親征明瀋陽既敗明搃兵李秉誠等代善偕其子台吉岳託追四十里斬馘無算七月鎮江城中軍陳良䇿與居民潜通明将毛文龍令别堡之民詐稱兵至大呼噪城中驚擾良䇿乗亂執城守遊擊佟養正殺其子豐年并從者六十人叛投毛文龍上聞之命代善同莽古爾泰率兵三千遷金州沿海居民於復州十一年八月太祖龍馭上賔代善及子岳託薩哈璘共作議書詣朝以書示大貝勒阿敏等言推戴太宗文皇帝嗣統衆皆喜上讓至再三代善言益懇切衆議亦堅乃從之十月命率精兵萬人往征蒙古喀爾喀扎嚕特部執貝勒巴克父子三人及貝勒拉什希布岱青多爾濟桑阿爾齋等十四人殺鄂爾齋圖貝勒俘其屬户還天聰元年五月奉命與貝勒阿敏碩託率正紅鑲紅鑲藍三旗兵征明攻錦州薄寧逺城殪殺無算因溽暑班師三年十一月上親征明入洪山口克遵化趨京城北土城闗之東駐營明大同總兵滿桂宣府總兵侯世禄以兵来援至徳勝門代善領兵進撃敗之追至隘口掩殺甚衆十二月攻克良鄉還破敵永定門南遂隨上率䕶軍礟手五百往視薊州形勢代善先發㑹明山海闗歩兵五千来援薊州距城二里許與我兵遇敵兵不敢入城遂立營環立車盾鎗礟代善麾左翼四旗䕶軍攻其東破之四年二月明兵部侍郎劉之綸率兵至遵化踞山營代善率八旗䕶軍兵攻之圍其山招之綸降不從遂縱兵攻破其七營之綸遁巖中我兵射殪之擒遊撃守備各一五年七月從上圍大凌河城正紅旗兵圍西北代善軍為䇿應時城外守臺明兵害我逰牧十人掠駝馬去代善與貝勒濟爾哈朗等率兵三千以紅衣礮攻其臺焚近臺房屋百餘間獲駝馬數十留兵守之九月明監軍道張春總兵吴襄等率兵四萬自錦州来援距城十五里代善随上率滿洲䝉古舊漢兵約二萬迎擊之敵馬歩兵合營四面列大小礮及鳥鎗我右翼兵衝入敗之襄及其副将桑阿爾齋遁春復収潰卒而軍乗西風縱火逼我營甚急㑹天雨反風燬敵營我兵合攻之陣斬副将張吉甫等生擒春及副将張洪謨楊華徴薛大湖等時被擒各官見上皆跪拜獨春不跪上欲誅之代善曰我兵前此陣獲之人無不収養此人􅁒以死成名奈何殺之以遂其志遂赦之八年五月随上率兵征明出榆林口至宣府境率兩紅旗及䝉古兵自喀喇鄂博入攻徳勝保殱其衆明城守恭将李全自縊死保民皆潰逃進攻大同懐仁縣未克遂由朔州趨馬邑八月上親攻大同代善率兵来㑹獻俘獲還十年四月上建國號大清改元崇徳大封功臣晋代善和碩兄禮親王十二月從上征朝鮮受其國王李倧降以歸八年八月世祖章皇帝嗣位王與鄭親王濟爾哈朗睿親王多爾衮同輔政時郡王阿達禮貝子碩託謀立睿王多爾衮禮親王代善發其謀阿達禮碩托伏誅碩託代善第二子阿達禮則其孫也衆咸謂王大義滅親比烈周公云順治五年十月薨年六十有六以第七子滿達海襲親王爵賜號曰㢲是年定賜祭葬銀例親王應五千兩奉㫖特賜銀萬兩六年十月立墓碑紀功康熙十年五月上特表王功績追謚曰烈復立碑表墓子八人長子克勤郡王岳託第三子頴親王薩哈璘俱自有傳乾隆十九年九月入祀盛京賢王祠四十三年正月上以王與鄭親王濟爾哈朗睿親王多爾衮肅親王豪格克勤郡王岳託並太祖太宗世祖時戮力行間櫛風沐雨之親藩宜配饗太廟又以王等初封嘉號當長延奕禩詔現襲禮親王爵之康親王復封號曰禮㢲親王滿達海禮親王代善第七子天聰二年大兵征明錦州滿達海率師往截明杏山糧運於海上取之崇徳五年復從大兵圍錦州擊敗杏山援兵又以紅衣礮撃敗松山馬兵六年五月封輔國公八月從肅親王豪格圍松山以本旗兵擊敗明松山兵錦州城中有兵出城刈草率右翼侍衛擊走之明兵犯鑲紅旗營滿達海擊敗之明總兵洪承疇以兵十三萬援錦州滿達海以歩戰破其三隊承疇兵復来犯力拒之馬被創肅親王豪格易以馬甫就騎而敵大至乃奮勇返擊殿後而還明兵復乗雨来犯率兵擊却之明總兵吴三桂率兵據山立營滿達海偕諸軍撃破之三桂宵遁十一月從豫郡王多鐸赴寜逺有明兵運粟海上率兵撃取之七年四月從鄭親王濟爾哈朗等征明克塔山八年從征明中後所前屯衛俱有功八月授都察院承政順治元年四月從睿親王多爾衮入山海闗撃走流賊李自成復敗之於望都縣十月晋封固山貝子随英親王阿濟格追剿自成由邉外趋綏徳二年二月進克沿邉三城及延安府又追賊至湖廣承天府破偽肅王八月凱旋三年正月從靖逺大将軍肅親王豪格剿四川流賊張獻忠七月由漢中進秦州圍賊渠髙如礪於三台山如礪降十一月師至西充斬獻忠肅親王令偕貝勒尼堪等分剿遵義䕫州荗州榮昌隆昌富順内江資陽諸處餘賊四年八月班師六年四月襲父和碩親王爵七月授征西大将軍與多羅謙郡王瓦克達征大同叛鎮姜瓖攻朔州寜武等處八月克朔州馬邑降寜武闗偽總兵劉偉偽道員趙夢龍及副将以下官弁五十餘員馬歩兵五千四百餘名静樂縣寜化所八角保山寨悉平遂㑹端重親王軍克復汾州斬偽廵撫姜建勲偽布政使劉秉業等偽總兵楊振威斬瓖首獻英親王軍大同平十月遣䕶軍統領索渾圍平遥偽知縣劉三元棄城走又遣署䕶軍統領希爾根圍太谷以紅衣礮破其城偽知縣李成沛偽都司吳成器率衆遁遣兵追殱之時潞安府賊分兵拒沁州又圍遼州王復遣多羅貝勒拜音圖䕶軍統領索渾馳赴沁州賊聞風遁遂㧞沁州趨潞安偽道員胡國鼎来戰大兵圍之比夜遁去遣兵邀擊殱之又遣鎮國公漢岱署䕶軍統領希爾根赴遼州擊破賊兵屯留襄垣榆社武鄉等縣俱降尋召還京七年二月同理六部事八年二月加封號㢲親王三月命掌理吏部事六月上幸南苑賜鞍馬九年二月薨年三十一諡曰簡七月以長子常阿岱襲封㢲親王十六年追論滿達海與睿親王素無嫌分取其所遺財物掌吏部時尚書譚㤗驕縦不能糾削爵謚並降常阿岱爵為貝勒詔以多羅康郡王傑書襲其祖代善親王爵康熙四年常阿岱薨諡懐愍第六子星尼降襲固山貝子次子錫倫圖於十五年封奉㤙将軍三十六年從征厄魯特有功加一雲騎尉後俱停襲乾隆四十三年三月上以㢲親王滿達海著有勞績賜一等輔國将軍爵世襲㒺替以滿達海七世孫福色硜額襲和碩康良親王傑書傑書禮親王代善孫父祜塞禮親王第八子順治三年六月封鎮國公是年卒以傑書兄精濟襲封鎮國公尋晉多羅郡王六年三月薨諡懐愍十月傑書襲多羅郡王八年二月加號曰康十五年五月詔以傑書爵追封其父祜塞為多羅郡王諡恵順十六年十二月㢲親王常阿岱降貝勒乃以傑書襲其祖代善和碩親王爵仍號康康熙元年三月追贈其父祜塞為親王十三年三月逆藩耿精忠據福建反分兵犯浙江江西六月授傑書奉命大将軍同貝子傅喇塔由浙江進剿九月師駐金華總督李之芳駐衢州破賊于焦園紫瑯山賊将徐尚朝引兵五萬犯金華王令都統巴雅爾副都統瑪哈達迎擊斬賊将吴榮先等三十餘人殱賊兵二萬十二月尚朝復率馬歩兵三萬土冦二萬逼金華城南十二里莊巴雅爾與總兵陳世凱等㑹剿破之於積道山殺二萬餘復永康縉雲二縣賊将馮公輔由義烏遁武義遣署前鋒統領希福躡之苦竹嶺斬殪甚衆賊将沙有祥據桃花嶺梗處州路瑪哈達與總兵李榮等擊潰之副都統穆赫林又敗之于白水洋十四年正月復處州府及仙居縣公輔尚朝等猶據宣平松陽屢窺處州都統拉哈達偕諸将禦剿破之石塘石佛嶺大王嶺東隴隘口上套寨下五塘等䖏時寜海将軍貝子傅拉塔由黄巖規復温州叛鎮祖宏勲曽養性糾賊數萬倚山憑江水陸抗阻上命傑書由衢州進回奏處州方有賊警金華兵力弱難驟進十五年三月諭趣之曰王坐守金華将及二載徒以文移往来為事不親統官兵進剿逆賊何日可滅宜尅期進取毋再遲延觀望貽悮軍機八月自金華移駐衢州敗賊于大溪灘復江山常山二縣進攻仙霞闗偽恭将金應虎迎降遂長驅抵浦城縣攻㧞之乃傳檄精忠言浦城為閩中財賦要地今大兵攻拔已扼咽喉與其縶頸就戮曷若立功贖罪以全百萬生靈九月復建陽撫降建寕延平二府精忠益震慴無措遣其子顯祚来迎師王遣人賫免死勅諭示之十月精忠出城六十里迎降獻所属官兵冊籍王遂入駐福州奏精忠請随大軍𠞰海賊鄭錦以贖罪上報可時錦偽總統許耀率兵三萬直逼福州至烏龍江南石門枕峯諸山結寨遂遣恭賛軍務都統拉哈達率兵進剿大敗之追擊四十餘里十一月疏言精忠出剿海賊其弟昭忠聚忠宜以一人来福州統轄藩屬又疏言福州經制兵已照原額全設精忠随大軍所率佐領下兵數已不少其左右兩鎮官兵可並裁汰宏勲養性應令赴京候補上命耿昭忠為鎮平将軍駐福州餘如所請是月王遣穆赫林等撃敗偽将軍吴淑于浦塘復邵武府進師㤗寜偽總兵王安邦等降汀州府及所屬諸縣悉復十六年正月拉哈達頼塔破賊将趙得勝何祐等二十六營于白茅太平諸山復興化府二月復泉州漳州二府奏入諭曰王統率大兵自衢州入仙霞闗直抵福州剿撫並用所向克㨗擊逐海賊収復全閩安輯百姓克奏膚功深為可嘉三月疏言福建既平臣即欲統兵入粤但省㑹重地未可輕離且距漳州逺恐遲至炎暑難進師先就現駐漳州汀州騎兵令将軍拉哈達等率同耿精忠赴潮州尋遣總兵馬三竒前鋒恭領都克納敗海賊於龍溪十二月海賊率兵五千餘犯泉州府所屬小營地方副都統楊鳯翔擊敗之十七年閏三月海賊犯漳州提督叚應舉郤之四月賊䧟平和環逼海澄穆赫林段應舉守禦越七旬外援不至城遂䧟長㤗亦䧟王以援遲請罪詔俟師旋再議七月賊䧟同安恵安王遣署副都統禅布提督楊㨗統兵進剿兩路夾攻復之十月都統賴塔等破賊于蜈蚣山復長泰又破賊於柯鏗山萬松闗副都統吉勒塔布搃督姚啟聖提督楊㨗等敗賊将劉國軒於江東橋又敗之於潮溝之間副都統瑚圖敗吴淑於石衛寨斬獲無算盡奪賊寨沉其船十八年正月吉勒塔布及廵撫吴興祚擊賊劉國軒吴淑何祐等於郭塘歐溪頭大敗之追至江邉斬首二千餘級生擒偽搃兵一偽副将二二月國軒等犯江東橋吉勒塔布迎擊賊敗走太平寨我兵追𠞰斬賊千餘十月副都統沃申敗賊衆於東石城克之吉勒塔布復敗賊于鰲頭山十九年二月沃申率滿洲緑旗兵進至大定山奮勇剿殺賊遁尾其後斬獲無算焚燬賊巢恢復大定小定地方大兵水陸分進規取玉洲劉國軒竄石馬海澄間我兵急追之走厦門随遣官招撫海澄偽搃兵蘓堪開西門迎降玉洲石馬賊巢悉破復海澄水師提督萬正色克海壇三月拉哈達楊㨗等克厦門金門賴塔克銅山焚燬賊巢餘賊竄臺灣先是精忠為藩下恭領徐鴻弼等首其歸順後尚蓄逆謀王疏請逮治上宻諭王令自請来京至是精忠亦自請入覲王亦奉詔班師五月疏言閩省投誠兵多需餉浩繁厦門金門已恢復宜留八旗兵六百守泉州二千四百分守福州漳州餘皆随還十月凱還至京上率諸王大臣等至盧溝橋迎勞傑書行抱見禮十一月命預議政二十二年正月疏言官兵向駐永興城中與賊對壘仰荷天眷靈神顯助於雞公山真武廟旁􅆆旗列隊一時官兵賊衆無不共見扵是我軍氣奮賊勢退沮其雞公山廟神理應特致褒旌祀典以垂永乆得㫖如所請春秋致祭二十九年七月率兵屯歸化城備剿噶爾丹尋以撫逺大将軍裕親王福全将抵烏蘭布通詔移師㑹之至則賊已竄十月撤還三十六年閏三月薨年五十三諡曰良建碑墓道七月以傑書第六子椿㤗襲和碩康親王爵四十八年薨諡曰悼長子崇安襲雍正五年掌宗人府事十一年薨諡曰修以椿泰弟原封三等輔國將軍巴爾圖襲乾隆十八年薨諡曰簡以崇安第二子原封多羅貝勒永恩襲十九年總理正黄旗覺羅學四十三年正月命復禮烈親王始封之號仍為禮親王欽定八旗通志卷一百二十一
