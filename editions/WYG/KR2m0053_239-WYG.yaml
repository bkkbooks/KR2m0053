body:
  text: 欽定四庫全書欽定八旗通志卷二百二十五人物志一百五忠義傳十七䝉古八旗二至十四年共六十二人康熙十三年博洛博洛蒙古鑲黄旗人以䕶軍校管䕶軍㕘領事得巴圖魯號康熙十三年從征湖廣逆藩吳三桂與賊力戰陣亡恩賜雲騎尉世職承襲詳見世職表圖爾猛額圖爾猛額䝉古鑲黄旗人任佐領委㕘領駐防江寧於康熙十三年調遣隨征至江西吉安府遇敵力戰陣亡賞䘏如例博喜圖博喜圖䝉古鑲黄旗人任䕶軍校康熙十三年十二月二十三日從征四川至朝天關偽将王屏藩等分兵環攻我軍博喜圗力戰殁恩賜雲騎尉世職承襲詳見世職表費揚武費揚武蒙古鑲黄旗人上駟院牧長墨爾根托克推之次子也任二等侍衛在鑾儀衛内行走康熈十四年隨貝子傅臘塔征海㓂鄭成功至浙江将渡錢塘賊統兵四萬拒戰費揚武挺身攖敵三入而三出之大敗賊衆事聞奉諭曰費揚武猶勝於張飛可比趙子龍也進征福建至海澄被執賊百計誘降叱曰我若降異日将何顔面聖耶遂自刎賞䘏如例拜海拜海䝉古鑲黄旗人姓巴林氏世居巴林地方初襲父額森三等輕車都尉世職康熙十四年隨定南将軍希爾根征逆藩耿精忠至江西遇賊将李茂珠等於建昌府南鐘鼔山力戰陣亾恩賜二等輕車都尉世職承襲詳見世職表白杜白杜蒙古鑲黄旗人康熙十四年以佐領從大兵征江西至南昌擊賊陣亡恩賜雲騎尉世職承襲詳見世職表格得徳格得徳蒙古鑲黄旗人任驍騎校署恭領康熙十四年隨大兵征逆藩吴三桂於雲南力戰陣亾賞䘏如例羅漢羅漢蒙古鑲黄旗人姓白氏世居喀喇沁地方康熙十四年以驍騎校隨寧南靖㓂大将軍順承郡王勒爾錦征逆藩吴三桂至湖廣㐮陽府偽将軍張義禅王慧等率衆萬餘來犯羅漢執纛進戰於二郎岡陣亾恩賜雲騎尉世職承襲詳見世職表嵩夏嵩夏䝉古鑲黄旗人姓柯勒徳氏世居科爾沁地方康熙十三年以前鋒校從征逆藩吳三桂至朝天闗隨前鋒統領穆占擊敗偽将石存禮等進至保寕復敗偽将吴應龍等又擊賊于蟠龍山小梅嶺龍潭驛等處俱有功十四年進攻秦州遇賊力戰陣亾恩賜雲騎尉世職承襲詳見世職表墨度墨度蒙古正黄旗人任七品官康熙十三年従征逆藩吴三桂至湖廣擊僞将吴應麒馬寳李之鳯偽縂兵蕭輔成等於南汛江口諸處咸有功進至洞庭湖偽将巴養元等率巨艘列陣拒戰隨貝勒尚善擊却之賊復來犯被創殁恩賜雲騎尉世職承襲詳見世職表額爾陳額爾陳蒙古正黄旗人任䕶軍校康熈十三年從征逆藩吳三桂至湖廣攻偽將巴養元等於洞庭湖戰殁恩賜雲騎尉世職承襲詳見世職表圖武爾圖武爾蒙古正黄旗人任䕶軍校康熈十三年隨征逆藩吴三桂歿於陣恩賜雲騎尉世職承襲詳見世職表色爾古楞色爾古楞蒙古正黄旗人署䕶軍校康熙十三年隨將軍都統赫業擊吴逆偽将軍王屏藩於蟠龍山力戰陣亾恩賞銀貳百两格洛爾圖格洛爾圗蒙古正黄旗人由領催委署驍騎校駐防西安康熈十四年隨定西大将軍多羅貝勒董額征從逆提督王輔臣于秦州力戰陣亡賞䘏如例蒙柯䝉柯蒙古正黄旗人由領催委署驍騎校駐防西安康熈十四年随定西大将軍多羅貝勒董額征從逆提督王輔臣于秦州力戰陣亾賞䘏如例鄂七拜鄂七拜䝉古正白旗人姓他塔喇氏世居察哈爾任驍騎校駐防江寧康熈十三年搃督李之芳調集官兵赴援浙江鄂七拜隨副都統胡圖㑹剿僞將曽養性于台州至小梁山奮勇力戰殁於陣賞䘏如例德色徳色䝉古正白旗人任八品官康熈十三年從征湖廣至長沙力戰被傷殁於軍賞䘏如例卓特巴卓特巴䝉古正白旗人襲其叔拜思虎郎七品官康熈十三年従大兵出征逆藩吴三桂至湖廣長沙府遇賊力戰陣亾賞䘏如例布逹什布達什蒙古正白旗人姓沙賚氏世居扎魯特康熈十四年以䕶軍校從定西大将軍多羅貝勒董額征從逆提督王輔臣於秦州力戰陣亾恩賜雲騎尉世職承襲詳見世職表色楞色楞䝉古正紅旗人任佐領康熈十三年正月隨将軍赫業征四川至野狐嶺沿山擊敗賊三百餘衆又敗其山林伏衆千餘又賊伏二千餘衆突出迎戰奮擊敗之進至延平闗有偽總兵率衆萬餘據山險立鹿角列砲鎗連數營拒戰復大敗之六月初六日抵盤龍山遇偽将軍王平範等衆四萬排設砲鎗藤牌自我右翼水路後哨登陸攻我左翼前後互擊力戰陣亾恩賜雲騎尉世職承襲詳見世職表賞銀五百两十七年十二月初三日諭祭一壇阿納阿納䝉古正紅旗人任叅領康熈十三年從征海賊鄭成功至浙江遇賊力戰殁於陣賞䘏如例噶爾瑪噶爾瑪蒙古正紅旗人康熈十三年從征海賊鄭成功至浙江擊賊殁于陣恩賜雲騎尉世職承襲詳見世職表季拉泰季拉泰䝉古正紅旗人以領催署章京康熙十三年從征逆藩吴三桂於雲南至廬囤擊賊陣亡恩賜雲騎尉世職承襲詳見世職表納穆僧額納穆僧額䝉古正紅旗人姓喀出特氏世居喀喇沁地方康熈十三年以筆帖式隨經畧大學士莫洛征逆藩吴三桂至寧羗州適提督王輔臣叛力戰陣亡恩賜雲騎尉世職承襲詳見世職表蘇巴什達蘇巴什達蒙古正紅旗人姓齊木克圖氏世居喀喇沁地方康熈十三年以驍騎校隨寧南靖㓂大将軍順承郡王勒爾錦征逆藩吴三桂至湖廣遇賊於綏寧擊賊陣亡恩賜雲騎尉世職承襲詳見世職表竒他乃竒他乃䝉古正紅旗人任前鋒校駐防荘浪康熈十三年隨安西将軍都統赫業征逆藩吴三桂於四川至蟠龍山賊将王屏藩等合各偽将兵四萬餘水陸夹攻竒他乃力戰陣亡賞䘏如例阿里瑪阿里瑪䝉古正紅旗人由空銜佐領於康熈十四年從征逆提督王輔臣子繼正戰于平凉府陣亡恩賜雲騎尉世職承襲詳見世職表克什圗克什圗䝉古正紅旗人任驍騎校駐防西安康熈十三年隨安西将軍瓦爾喀擊偽将王屏藩等于娘娘廟力戰有功十四年復隨振武将軍佛尼勒等與賊戰於秦州陣亡賞䘏如例圗爾渾圗爾渾蒙古正紅旗人姓明阿氏世居科爾沁地方康熈十三年以理藩院郎中隨經畧大學士莫洛征逆藩吴三桂至寧羌州適提督王輔臣叛力戰陣亾恩賜雲騎尉世職承襲詳見世職表五喇岱五喇岱䝉古正紅旗人姓博和羅特氏世居科爾沁地方任二等輕車都尉康熈十四年從征逆藩吴三桂隨前鋒統領穆占敗偽将石存禮于朝天闗復隨鎮西将軍席卜臣擊偽將王屏藩等敗之賊復合遂力戰陣亡恩賜一等輕車都尉世職承襲詳見世職表波纍波纍䝉古正紅旗人姓黄氏世居依布杵徳地方由領催委署恭領駐防西安康熈十四年隨定西大将軍多羅貝勒董額㑹剿従逆提督王輔臣于秦州西闗力戰陣亡恩賜雲騎尉世職承襲詳見世職表邁拉邁拉蒙古鑲白旗人姓博爾濟吉特氏世居察哈爾任䕶軍叅領康熈十三年從将軍安親王岳樂征江西擊偽将邵連登於建昌陣亡恩賜雲騎尉世職承襲詳見世職表諾穆啟諾穆啟䝉古廂白旗人姓芒格努忒氏世居喀喇沁地方任佐領康熙十三年從寕海将軍富喇塔征耿逆至浙江擊賊将曽養性于台州小梁山力戰殁于陣恩賜雲騎尉世職承襲詳見世職表托畢㤗托畢㤗䝉古鑲白旗人姓博和羅特氏世居古爾班納里忒地方兵部郎中任佐領康熈十三年逆藩吳三桂反十二月奉勅往勞四川縂督鄭蛟鱗等至成都被賊王賓懐劚刃死恩賜騎都尉世職承襲詳見世職表固魯吾固魯吾蒙古鑲白旗人以驍騎校駐防盛京康熈十三年十月耿逆偽都督周烈縂兵桑明犯衢州縂督李之芳平南将軍賴塔遣兵援剿固魯吾閱厯行間著有戰功至紅橋與賊力戰殁于陣賞䘏如例雅圗雅圗䝉古鑲白旗人任驍騎校康熈十四年隨大兵征湖廣至巖山嶺吴逆偽将馬寳胡國柱率三萬餘衆来犯奮勇衝擊陣亾恩賜雲騎尉世職承襲詳見世職表拉布士喜拉布士喜䝉古鑲紅旗人姓烏蘭氏世居喀喇沁地方康熈十三年以佐領従㝎西将軍圖海征湖廣賊李來亨等於茅麓山力戰陣亾恩賜騎都尉兼雲騎尉世職承襲詳見世職表渾進渾進蒙古鑲紅旗人姓博洛哥氏世居喀喇沁地方康熈十三年以空銜佐領従征逆藩吴三桂至湖廣破偽都督楊文榮等戰艘百餘尋于岳州遇偽将軍吴應騏等率兵七萬餘來拒渾進力戰陣亡恩賜雲騎尉世職承襲詳見世職表拜桑古爾拜桑古爾䝉古鑲紅旗人姓卧九忒氏世居巴林地方康熈十三年以佐領隨寕南靖㓂大将軍順承郡王勒爾錦征逆藩吴三桂至湖廣南漳縣賊衆來犯率夲旗兵敗之至永興遇偽将軍馬寳胡國柱等率兵三萬餘拒戰殁于陣恩賜雲騎尉世職承襲詳見世職表查穆素查穆素䝉古鑲紅旗人初任佐領兼雲騎尉康熈十三年従揚威大将軍簡親王喇布征吴逆至江西吉安府螺子山遇僞将韓大任率衆七千來犯力戰殁於陣恩賜輕車都尉世職承襲詳見世職表阿余什阿余什蒙古鑲紅旗人姓博爾濟吉特氏世居察哈爾地方任驍騎校委署叅領駐防西安康熈十三年従征逆藩吴三桂至四川隨夸蘭大費赫齊迎糧于槐樹驛遇賊吴之茂王屏藩等擁兵截殺力戰不克遂殁于陣賞䘏如例華善華善䝉古鑲紅旗人姓西訥椘特氏世居科爾沁地方康熈十四年以五品官隨揚威将軍内大臣阿宻達征從逆提督王輔臣輔臣遣其子偽縂兵王繼正率兵犯平凉華善隨大兵擊敗之賊復集戰遂力戰陣亾恩賜雲騎尉世職承襲詳見世職表薩音圗薩音圗䝉古正藍旗人姓布爾哈齊忒氏世居愛必汗英舍堡地方順治十五年以䕶軍校從征貴州駐靖州偽縂兵田國欽黄世貴等欲納欵為賊所阻薩音圗同䕶軍統領鄂納等往接應道遇賊二千餘人擊敗之十六年雲貴平由水路回軍至江南時海賊鄭成功新䧟鎮江𤓰州進犯江寧率衆二萬列艘江中薩音圗隨副都統葛禇哈等擊敗之又連敗江岸賊五萬餘賊乃以全軍十萬列紅衣礮鳥鎗拒戰復擊敗之授雲騎尉康熈元年隨征東将軍季什哈征山東同夸蘭大吴喇泰敗賊呂思曲楊明五喬易集張靖綱于三等於大山下及鉅齒崖南等處三年従定西将軍圗海征湖廣賊季来亨等於茅麓山率夲旗兵敗其偽縂兵四偽将四收其衆千餘人旋于間道遇賊力戰陣亡恩賜騎都尉世職承襲詳見世職表孟額圗孟額圗蒙古正藍旗人姓記爾必思氏世居喀喇沁地方康熈三年以一等輕車都尉隨定西将軍圗海征湖廣賊李來亨等于茅麓山同䕶軍統領敖艾力戰陣亡恩賜雲騎尉世職承襲詳見世職表塔爾尼塔爾尼䝉古正藍旗人姓博多忒氏世居喀喇沁地方康熈十四年以佐領従定西大将軍多羅貝勒董額征從逆提督王輔臣至漢中偽将王屏藩譚洪等拒戰塔爾尼率兵擊敗之賊復合遂力戰陣亾恩賜雲騎尉世職承襲詳見世職表恩克恩克䝉古正藍旗人姓烏朗漢濟爾敏世居喀喇沁地方康熈十四年以佐領隨揚威将軍内大臣阿宻達征從逆提督王輔臣於平凉力戰陣亡恩賜雲騎尉世職承襲詳見世職表布達喜布達喜蒙古正藍旗人姓薩爾圗氏世居喀喇沁地方康熈十三年以佐領従征四川搃偽縂兵石存禮等引重兵據朝天闗隘口掘㩝塹立木城伏地礮復疊石為墻結三十餘營拒敵布達喜率所属兵擊破之十四年隨取保寕分兵駐槐樹驛以援糧運遇偽将軍王屏藩吴之茂等兵至力戰殁于陣恩賜雲騎尉世職承襲詳見世職表肯哲肯哲䝉古正藍旗人姓布氏世居敖漢地方康熈十三年以佐領随揚威将軍内大臣阿宻逹征四川十四年至陜西擊賊于平凉力戰陣亡恩賜雲騎尉世職承襲詳見世職表伊納爾起伊納爾起䝉古正藍旗人姓克