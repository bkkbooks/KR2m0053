body:
  text: 欽定四庫全書欽定八旗通志卷四十二職官志國家亮功熈績自古為昭我朝創立八旗因章辨色定職列官實有合於軒轅氏以青雲縉雲建官命師聨為營衛之制和萬國而開淳化所為合撰同符也太祖高皇帝設固山額真今稱都統梅勒額真今稱副都統甲喇額真今稱㕘領牛录額真今稱佐領以相統轄太宗文皇帝闢文館為内三院設承政㕘政啟心郎諸官整飭庶務世祖章皇帝統一區㝢亰秩則悉増滿缺直省則滿漢㕘用一視同仁辨章昭晰樹閎逺之規模六合向化垂緒於億萬斯年我皇上澄敘官方釐定規制優賚予以廣慈重職司以覈實申明舊制増立新模於設官分職之良法美意益昭明備矣八旗舊志所載職官分八旗官職八旗部院官為兩門區條别目複沓㕘差頗失聨事彚疇互相經緯之意又其志八旗官職則以王府官列於陵寢官之前其志八旗部院官則以宗人府列於内閣之後編排次第未能整齊至其沿革增併之踈舛更不可枚舉臣等奉命増修謹據大清㑹典欽定職官表以次甄録庶幾於經邦治府統官諧民之典秩然有敘首載宗人府宗支錫爵肇𤓰瓞之綿長文爵則伸明職掌武職則釐分品秩㢘法同昭裁成盡善與夫増置官師因時定制設延閣之校司列香山之健銳經緯並宣敷揚盛治德威逺被闢地安屯新疆各官星羅碁布實惟大聖人以守兼創光前烈而鞏丕基鴻規式廓即職官之增載亦非舊志之體例所可拘也惟舊志於部院各官止載滿缺不及漢人員額兹仍其例焉職官志一職官宗人府部内閣部軍機處府吏戸翰林院詹事宗人府宗令一人左右宗正各一人左右宗人各一人初制宗令以親王郡王統理宗正以貝勒貝子兼攝宗人以鎮國輔國公及將軍兼攝後擇賢任使不復以封爵為限乾隆元年以來間以親王總理事務無常員左右司理事官宗室各二人初制三品康熙二十二年定為正五品副理事官宗室各二人初制從四品康熈二十二年定為從五品初設郎中六員員外郎四員主事四員康熈十二年始分𨽻左右兩司三十八年兩司各裁郎中一員雍正二年改郎中為理事官改員外郎為副理事官初制皆以覺羅為之後以覺羅滿洲􅄁用雍正二年定以宗室滿洲􅄁用乾隆二十九年定制悉以宗室為之主事宗室各二人正六品經厯宗室二人正六品順治九年制􅄁用宗室滿洲乾隆二十九年定制以宗室為之堂主事宗室二人初制四品康熈九年定為正六品初制以宗室滿洲􅄁用乾隆二十九年定制以宗室為之委署主事四人乾隆五十三年四月奏明由筆帖式内陞署仍食七品俸筆帖式宗室二十四人並支七品俸初制以宗室滿洲㕘用乾隆二十九年定制以宗室為之内閣大學士滿洲二人初定一品順治十五年改為正二品雍正八年陞為正一品國初置文館天聰十年改為内三院曰内國史院曰内秘書院曰内宏文院各設大學士一人分其事為職掌順治元年増設學士二年定為正二品衙門以翰林院官分𨽻内三院稱内翰林國史院内翰林秘書院内翰林宏文院増設侍讀學士侍讀等官九年設典籍十五年改内三院為内閣其大學士俱改内閣銜仍分設翰林院十六年裁學士侍讀等官十八年復改内閣為内國史院内秘書院内宏文院裁翰林院康熈九年仍改為内閣另設翰林院如舊制十年仍補學士以下等官滿漢大學士順治元年設六員不備官康熈年間率用四員雍正年間多用至六員乾隆十三年定制滿漢各二員協辦大學士滿洲一人從一品簡充以六部尚書來初置自雍正年以學士兼禮部侍郎銜滿洲六人初定二品順治十五年改為正五品尋以兼禮部侍郎銜改為正三品雍正八年陞為從二品初制滿洲學士三員漢軍三員自順治元年以後増減不一康熈九年定滿洲二員十年増四員又定漢軍二員十二年以漢軍併於漢缺兼禮部侍郎銜侍讀學士滿洲四人蒙古二人初制三品後改為從五品雍正三年定為從四品順治二年置初兼太常寺銜後停兼銜八年設滿洲侍讀學士三員漢軍侍讀學士三員十八年増滿洲侍讀學士三員䝉古侍讀學士三員康熈九年定制滿洲侍讀學士滿文二員漢文二員共四員䝉古侍讀學士二員漢軍侍讀學士二員乾隆十四年改定滿洲四人䝉古二人漢軍侍讀學士缺以漢軍漢人通行銓補侍讀滿洲十人䝉古二人漢軍二人初制四品後改為正六品順治二年置初兼太常寺少卿光禄寺少卿銜尋停兼銜滿洲侍讀初設滿文五員滿漢文六員共十一員康熈三十八年省滿文一員滿漢文二員共八員旋復増二員為十員典籍滿洲二人漢軍二人正七品内閣為典掌絲綸之地自大學士以下皆不置印惟典籍給印順治九年置初各設三員康熈九年定各設二員中書滿洲七十人䝉古十六人漢軍八人貼寫中書滿洲四十人蒙古六人從七品順治十六年置滿洲中書初設滿文撰文二十員辦事二十員滿漢文撰文十七員辦事十八員共七十五員康熈三十八年省滿文撰文辦事各一員滿漢文撰文一員辦事二員共七十員䝉古中書初設撰文九員辦事十員共十九員康熈三十八年省撰文一員辦事二員共十六員漢軍中書初設撰文五員辦事八員共十三員康熈三十八年省撰文一員辦事四員共八員中書科中書舍人滿洲二人從七品初設一員乾隆十四年増一員共二員筆帖式滿洲十人軍機處軍機大臣無定員由大學士及尚書侍郎奉特㫖召入自雍正十年三月大學士等遵㫖議奏辦理軍機處密行事件所需鈐封印信謹擬用辦理軍機印信字様移咨禮部鑄造貯辦理軍機處派員管理並行知各省及西北兩路軍營至乾隆初年停止改設總理乾隆二年十一月奉諭莊親王等奏辭總理事務朕勉從所請但目前兩路軍務尚未全竣且朕日理萬幾亦間有特㫖交出之事皇考當日原設有辦理軍機大臣今仍着大學士鄂爾泰張廷玉公訥親尚書海朢侍郎納延泰班第辦理嗣後永以為制至軍機章京以内閣滿漢侍讀中書及各部郎中員外郎主事簡其賢能者奏充無定額謹案軍機為機務要地不設専署即附載内閣之後翰林院掌院學士滿洲一人順治十五年置康熈二十八年五月以大學士徐元文兼管翰林院掌院學士事始用重臣兼領自特簡乾隆元年以來多以重臣兼攝以重其任侍讀學士滿洲二人初制從五品雍正三年定為從四品侍講學士同侍講學士滿洲二人康熈九年置侍讀侍講學士各三人乾隆五十年二月裁侍讀侍講學士各一人侍讀滿洲二人初制正六品雍正三年定為從五品侍講同侍講滿洲二人康熈九年置侍讀侍講各三人乾隆五十年二月裁侍讀侍講各一人謹案順治九年壬辰科十二年乙未科俱分滿漢進士為二榜壬辰科滿洲一甲進士麻勒吉折庫納巴海乙未科一甲進士圖爾宸查漢索泰俱分授修撰編修以後滿漢進士合為一榜編修檢討係庶吉士散館授職庶常館教習大臣滿洲一人小教習無額缺國初教習多以内院學士為之侍讀等亦間有預者自康熈九年後皆以掌院學士領其事而内閣學士時􅄁用焉六十一年辛丑科始以工部尚書陳元龍領教習事嗣後大學士尚書侍郎均得為之特簡皆由制小教習始置於康熈三十三年雍正八年無常停乾隆十年復置皆由教習大臣㑹同掌院學士掄選奏充無額缺九年壬辰科始選滿洲進士六人漢軍謹案順治進士四人改庶吉士乙未科選滿洲進士六人與壬辰科同後滿漢合為一榜新進士引見選庶吉士滿漢無定員典簿㕔典簿滿洲一人從八品典簿㕔孔目滿洲一人從九品待詔㕔待詔滿洲二人從九品俱順治十五年置筆帖式滿洲四十人漢軍四人初制滿洲四十八人漢軍八人康熈三十四年省滿洲八人漢軍四人謹案翰林院不設司屬凡有陳奏及往來文牒舊例以典簿筆帖式具稿呈堂雍正元年以官輕滋弊令掌院學士於俸淺編修檢討内擇才守優長者充作司官名曰辦院事後復増置協辦院事由掌院學士掄充有缺遞補辦院事滿洲二人協辦院事滿洲一人以非院官正額謹附識於此經筵講官滿洲八人以内閣學士掌院學士讀講學士詹事少詹事及尚書侍郎左都御史副都御史通政使大理寺卿之由内閣翰林陞任者列名以原銜兼充日講起居注官滿洲八人起康熈九年置居注館於太和門西廊設記注官滿洲四人以官一人十六年日講官兼攝十二年増設滿洲記注又増設滿洲記注官一人五十七年三月省記注官令翰林官於理事日侍班記注之事併歸内閣詔復設雍正元年注官如康熈五十六年以前故事乾隆日講起居元年増設滿洲記注官二人凡記注官均以翰林詹事坊局官以原銜兼充惟掌院學士例各兼一缺均兼日講繋銜起居注館主事滿洲二人初制滿洲三人漢軍一人康熈三十八年省滿洲漢軍各一人五十七年俱省雍正元年復置滿洲主事二人筆帖式滿洲十四人漢軍二人順治初置滿洲八人漢軍二人十一年增設滿洲六人康熈五十七年俱省雍正元年復設如今額文淵閣領閣事滿洲一人國初定制大學士以未建我文淵閣繫銜而閣制皇上右文稽古修明典籍乾隆三十七年蔵弆逸文墜特詔直省守吏購訪海内遺書以廣石渠允廷簡竒秘響臻復散見永樂大典者重加釐訂成編臣議採古書之敕館爰排校繕録彚為四庫全書凡三萬六千冊而贏臣命於華殿後鼎建文上文淵閣以貯之四十一年秘書官品頗詳以宋程俱麟臺故事所載詔大學士等集議㕘仿其制剏置閣職領閣事以大學士協辦大學士掌院學士兼充直閣以下咸定額有差用資典守蘭臺東觀永昭美備焉文淵閣提舉閣事滿洲一人上諭乾隆五十三年奉一員係由總管内務府大臣兼文淵閣提舉閣事充其司員以下皆所管轄着交提舉閣事一人專為管理其領閣直閣校理檢閲等俱着兼充虚銜不必辦理本閣事務文淵閣辦理事務内務府司員四人筆帖式四人奏俱由提舉閣事大臣掄選充詹事府詹事府詹事滿洲一人正三品少詹事滿洲一人正四品順治元年初設少詹事一人掌府事是年十一月省九年設詹事一人以掌府印十五年復省康熈詔復設十四年奉洲置詹事一人少詹事二人三十七年詹事府滿省少詹事一人左春坊左庶子滿洲一人以四品冠𢃄食五品俸右春坊同左中允滿洲一人以五品冠帶食六品俸右中允同左贊善滿洲一人從六品右贊善同右春坊右庶子滿洲一人右中允滿洲一人右贊善滿洲一人國初設左右春坊皆漢人員缺以内三院官兼攝順治十五年省康熈十四年復置左右春坊官左右庶子滿洲各一人左右諭德滿洲各一人左右中允贊善滿洲各二人三十七年省滿洲右諭德一人左右中允贊善各一人乾隆十三年省滿洲左諭德一人司經局洗馬滿洲一人從五品康熈十四年置所屬有正字初置滿洲正字二人康熈三十七年裁省主簿滿洲一人從七品康熈十四年定額又初置滿洲錄事二人康熈三十七年以後次第裁省筆帖式滿洲六人康熈十四年初置十人三十八年省四人朝謹案詹事府本東宫官屬我家法相承盡祛厯代之弊良法美意具載儲貳金鑑書中而預教至為嚴慎皇子皆在書各選翰林官分侍讀講日有課程擇大尚書房讀臣二三人為總師傳以綜理之凡詹事坊局各官但存其員額以備翰林敘進之階云吏部吏部尚書滿洲一人從一品天聰五年十月議定官制建六部每部各一貝勒主之吏部設滿洲承政一員䝉古承政一員㕘政八員啟心郎一員崇德三年更定吏部設滿洲承政一員左㕘政二員右㕘政三員啟心郎一員順治元年停貝勒總