body:
  text: 欽定四庫全書欽定八旗通志卷一百六十七人物志四十七大臣傳三十三滿洲鑲白旗一爾吉思哈揚愛松古尼堪齊格申善伊遜卜臣察哈喇棟阿頼哈寧阿車克珠瑪喇鄂屯錫吉思哈弟吉普喀達吉思哈姓烏蘇世居瓦爾喀馮佳屯初臣於烏拉部見其貝勒不足事與弟吉普喀達來歸太祖髙皇帝並任佐領𨽻滿洲正白旗後改𨽻鑲白旗天命四年吉思哈從征明有功授三等輕車都尉世職六年以恭領率兵圍遼陽城立雲梯先登天聰八年太宗文皇帝念其功晉世職二等輕車都尉是年同恭領武巴海征東海呼爾哈部俘獲男婦千五百有竒牲畜輜重無算九年同副都統巴竒蘭等征黒龍江收二千丁以歸晉一等輕車都尉崇徳元年太宗親征朝鮮聞明兵入鹻場遣吉思哈率兵躡其後擊敗之明兵遁二年正月大軍攻克朝鮮國都吉思哈奉命同理藩院叅政尼堪等率毎旗甲士十人及科爾沁敖漢奈曼扎魯特烏喇特諸外藩兵征瓦爾喀將出朝鮮境有朝鮮兵二萬分列營壘吉思哈率兵合諸軍進擊並設伏絶其去路斬其平壌廵撫殱數千人獲馬三千敵遁走山巔設柵拒守我軍圍之三日敵衆遂降進略瓦爾喀即以所獲牲畜等物分給外藩隨征將士遣之各還所部奏㨗稱㫖累遷至吏部叅政三年四月卒以其子吉瞻襲職吉普喀達亦以天命四年從征功授三等輕車都尉世職六年任叅領隨大軍攻奉集堡明總兵李秉誠赴援為我左翼四旗兵逐奔吉普喀達奮徃追擊直抵城壕中礮卒天聰八年贈二等輕車都尉子𤓰爾察襲愛松古愛松古姓納喇世居葉赫太祖髙皇帝天命四年來歸𨽻滿洲鑲白旗屢從征伐太宗文皇帝崇徳元年命偕察漢喇嘛等赴明邊殺虎口互市尋復遣徃科爾沁調敖漢奈曼扎魯特烏喇特諸部兵征明三年七月初設理藩院以愛松古為副理事官十月自歸化城導厄魯特部長墨爾根戴青來歸四年詔率巴林烏喇特兵赴四子部追捕逃人愛松古至中途潛歸論死命從寛鞭百仍令供職六年隨大軍圍松山明總督洪承疇遣其兵夜遁理藩院官属未偵報又不悉力邀擊愛松古復坐鞭責罰鍰世祖章皇帝順治元年擢任佐領隨都統葉臣等征山西時流賊李自成西遁其偽伯陳永福據太原我軍以紅衣礮攻之城圮永福挾衆突出愛松古以蒙古兵迎戰多斬馘獲馬千餘又追敗賊將馬驥於黄河獲舟十有五二年隨都統巴哈納進圍延安賊馬歩出城來犯愛松古郤之尋率八騎躡追自成獲其孥三年五月蘇尼特部騰機思等率所部叛奔喀爾喀七月豫親王多鐸奉命集兵克嚕倫河進勦愛松古率前鋒兵扼據險隘大軍繼進騰機思遁走復隨侍郎尼堪副都統明安達禮乘夜追擊獲其輜重斬其台吉茂海遂渡圗喇河喀爾喀土謝圗汗以兵二萬拒戰愛松古隨鎮國將軍瓦克達等敗其馬兵追逐三十餘里四年叙功予雲騎尉世職五年四月奉命率䝉古兵六百駐防太原涇陽叛賊李陽以二千人來犯愛松古敗其衆斬李陽以徇十一月又擊敗叛賊王享明於交城是時叛鎮姜瓖據大同賊黨劉遷糾衆萬餘謀犯代州與瓖犄角愛松古聞報率駐防兵馳赴代州偕遊擊髙國勝籌畫守具遷擁衆猝薄城下立雲梯為乘城計愛松古力禦之獲梯九斬賊三百賊益兵掘城我軍自城上發矢石賊多死遷走繁峙六年正月賊復來犯潛結城郛奸徒為内應門啟賊衆擁入郛愛松古督兵嬰城固守越十餘日端重親王博洛統兵赴援擊敗賊衆斬賊渠郭芳遷遁代州平乃還駐太原四月瓖黨十餘萬由清源犯太原愛松古與廵撫祝世昌議賊勢猖獗宜相度形勢據險防禦使不得逼城下乃分遣將士赴清源徐溝禦賊㑹端重親王率兵自晉祠入勦賊衆敗遁七年遇恩詔授騎都尉叙功加一雲騎尉八年擢叅領尋擢鑲白旗䝉古副都統兩遇恩詔晉世職為二等輕車都尉九年孫可望等掠湖南愛松古隨敬謹親王尼堪率兵進勦師至衡州王殁於陣師還以不及救王降世職為騎都尉兼一雲騎尉十六年致仕康熈十四年六月卒賜祭𦵏如典禮子訥青初以三等侍衛於順治十六年隨征海賊鄭成功至厦門卒於軍至是以訥青之子瑪爾繼襲職尼堪尼堪姓納喇世居松阿里烏喇太祖髙皇帝時率衆來歸賜號巴克什後𨽻滿洲鑲白旗初以説降䝉古科爾沁部授騎都尉天命十年偕侍衛博爾晉等率兵征呼爾哈部收獲五百户師還上郊勞賜宴天聰初擢一等侍衛從太宗文皇帝征明攻錦州有功七年隨貝勒等鞫獄藩部同行佐領阿什達爾漢以所賫勅諭二十道付尼堪尼堪委之從役遂失其九所司奏劾論罸如律是年蒿齊忒部台吉額林等歸順命尼堪徃迎之明年正月收其所部户口及牲畜以還七月上統大軍征明道遇察哈爾部衆來降尼堪奉㫖還盛京安置降人家属時鄭親王濟爾哈朗留守盛京令尼堪同卦爾察席特庫率駐防兵十二人偵明兵猝遇敵奮擊之追至遼河凡三戰斬馘百餘衆悉驚潰九年隨貝勒岳託駐兵歸化城土黙特部長博碩克圗之子私與明通使人徃喀爾喀約明使偕來岳託遣尼堪同叅領阿爾津等伺之擒其使十人及明使四人以獻尋與承政英俄爾岱馬福塔等齎諭朝鮮崇徳元年六月授理藩院承政二年正月大軍攻克朝鮮國都上命尼堪同叅領吉思哈佐領葉克舒率八旗及科爾沁扎魯特敖漢奈曼諸外藩兵征瓦爾喀將出朝鮮境有朝鮮兵於吉木海列營抗拒尼堪率師進擊大破之斬其平壌廵撫朝鮮合兵二萬襲我軍後尼堪與吉思哈等設伏誘敵殱萬餘人敵遁據山巔立柵拒守我師圍之三日遂下降其哈忙城廵撫及各城總兵副使等官獲牲畜布帛等物無算進略瓦爾喀即以所獲分給外藩將士遣之還班師奏凱尋同承政阿什達爾漢徃科爾沁巴林扎魯特喀喇沁諸部頒赦詔並㑹諸部王貝勒清理刑獄三年五月部議尼堪於科爾沁察審諸事狥庇失實應觧部任籍家産半得㫖觧任免籍家産七月授理藩院右叅政四年大軍征明檄調科爾沁諸部兵來者俱不及額詔尼堪㑹科爾沁王貝勒等訊其罪遂厯喀喇沁土黙特諸部讞定罪狀五年四月上以尼堪克副任使授三等輕車都尉先是承政薩穆什喀等征索倫部俘其衆數千至是復有數百户來歸命尼堪徃頒賞賫並與郭爾羅斯部新附之衆共編為八佐領而還七月奉諭檄外藩兵征索倫簡其軍實世祖章皇帝定鼎燕京以功進二等輕車都尉順治二年隨豫親王多鐸平定河南統外藩兵由南陽趋歸徳招服一州四縣晉一等輕車都尉三年復隨豫親王討蘇尼特部騰機思大破其衆多斬獲明年叙功晉三等男遷本院尚書六年喀爾喀使至餽睿親王多爾衮馬而不及巽親王滿達海巽親王使人告理藩院尼堪以啟睿親王王曰於例云何曰外藩職貢例不越送諸王王惡其語侵已令内大臣議尼堪罪奪其俸三遇恩詔加至三等子世襲㒺替十年上以尼堪宣力有年衰老可念特命以原官加一級致仕晉二等子十七年卒賜祭𦵏無嗣以其弟阿穆爾圖阿錫圖及從子瑪拉兆資分襲其職瑪拉自有傳齊爾格申齊爾格申世居寧古塔以地為氏太祖髙皇帝時隨其兄納林率丁壯百餘來歸即以納林管之授為佐領𨽻滿洲鑲白旗納林卒齊爾格申仍其任率所部鎮達卜遜木城明人來攻耀州齊爾格申徃援敗之淤泥河還駐平山見海濵鹽徒千人具舟將竄乘夜襲之殪其衆明錦州守將來犯齊爾格申撃之靣被創奮勇力戰卒敗敵太宗文皇帝天聰六年修蓋州城移人户以實之命齊爾格申隨副都統石國柱叅領雅什塔等率兵駐守八年以克副任使授騎都尉世職是時明邊將數誘我新附之衆徃歸齊爾格申嘗率兵十沿海緝捕逃亡有七人將渡海明人以舟迎之既離岸矣齊爾格申渉水追射殪其執鳥鎗者一人及倡逃者一人遂躍入其舟生擒明偹禦一及邏卒十三人旋復率兵扼北新渡口偵知敵舟五十餘泊島即設伏以待果有二十餘人入島伐木伏發盡獲之海中敵舟有二人遥呼曰我逃人也誰敢逐我者齊爾格申挐小舟應聲猝至擒其一斬其一敵舟驚潰崇徳元年四月分别駐防年滿各官功罪以齊爾格申捕獲逃人甚衆駐守稱職賜良馬五月隨武英郡王阿濟格征明宣府薄大同戰城下兩敗敵衆出延慶州俘人户牲畜以還世祖章皇帝時嘗任福陵總管順治七年遇恩詔加一雲騎尉世職先是齊爾格申之從弟多尼喀於崇徳七年隨貝勒阿巴泰征明至山東攻萊陽縣先登克其城賜號巴圗魯授騎都尉又一雲騎尉世職至是卒命齊爾格申併襲為一等輕車都尉復兩遇恩詔晉爵三等男康熈十二年三月卒賜祭𦵏如例孫石清襲爵揚善子羅碩揚善姓𤓰勒佳費英東第四弟音達户齊之子也太祖髙皇帝時以其祖索爾果歸附功授騎都尉世職初𨽻滿洲鑲黄旗後改𨽻鑲白旗太宗文皇帝即位設十六大臣以揚善佐理鑲黄旗事尋任䕶軍統領三年從大軍征明北京遵上方略衝鋒破堅所至有功五年攻大凌河城與明監軍道張春戰冒矢石先衆入陣擊敗敵兵胸腕中創各一晉三等輕車都尉擢内大臣六年上統大軍親征察哈爾揚善從時林丹汗既率衆遁其部衆近明界沙河堡者悉逃入堡内揚善奉命率精兵六十人偕通事顧禄古齎諭索取之明人驚懼盡歸我察哈爾逃人崇徳二年征大同蒙古部人有被掠者悉取以歸旋授議政大臣六年隨鄭親王濟爾哈朗圍錦州以城内明兵出犯鑲黄旗官兵退怯避敵揚善坐狥隐論罰贖得㫖寛免順治元年四月都統和洛輝希睿親王多爾衮意誣告肅親王豪格言詞悖妄揚善不力為諫阻又不舉首與其子羅碩俱棄市羅碩初以能通滿洲蒙古漢語太宗文皇帝擢居文館崇徳元年授國史院學士尋任前鋒叅領兼刑部理事官凢在文館軍營𫝊宣諭㫖徃來報㨗以及問罪朝鮮審斷獄訟罔不當上意至是以平素出入肅親王府第坐謟附為亂論死順治八年世祖章皇帝念揚善父子之無辜也治和洛輝罪命復揚善輕車都尉世職以其孫霍羅襲伊遜伊遜姓𤓰勒佳費英東弟音達户齊之第三子也初與兄揚善弟吉賽納都祜吉遜等並𨽻滿洲鑲黄旗後改𨽻鑲白旗伊遜少從太祖髙皇帝征伐屢立戰功太宗文皇帝即位設十六大臣以伊遜佐理鑲黄旗事從征多羅特率歩卒擊敗䝉古兵天聰三年大軍伐明攻遵化城伊遜先登中礮傷臂太宗臨視授三等輕車都尉世職尋擢兵部承政七年偕户部啟心郎英俄爾岱齎諭朝鮮宣示威徳定互市議咸稱㫖八年管佐領崇徳元年率八旗兵百四十人徃助海州防守明兵望風引遁師還㑹都統都類獲罪逮繫兵部叅政穆爾泰慮溽暑蒸鬰驅囚出繫所遣使為都類設幙次且為拂蠅囚訴其狀伊遜坐同官𨼆匿不奏罷任三年更定部院官制仍授為兵部承政明年兼管副都統奉命副工部承政薩穆什喀率左翼兵征索倫至呼爾哈部是時達爾布尼阿哈爾都户白庫都漢必爾岱等聚衆抗拒於伍庫爾城伊遜乘夜舉火攻克之進攻鐸陳未下聞博穆博果爾兵來援我師遂還已而佐領薩必圖卓布退等率師繼至伊遜復整兵徃鐸陳設伏斬敵七十餘級當薩穆什喀之以師還也博穆博果爾以兵襲我輜重甲士厮卒多陣亡者伊遜坐不急入援罪應罷職詔寛免以罰贖懲之八年卒子噶達渾襲職順治十二年追諡伊遜曰襄壯賜祭𦵏建碑紀績察哈喇子富喇克塔察哈喇姓郭絡羅初𨽻滿洲鑲黄旗後改𨽻鑲白旗父常舒為沾河寨長太祖髙皇帝時與其弟揚舒率衆來歸命分轄其衆為佐領既卒察哈喇仍其任太宗文皇帝即位以察哈喇列十六大臣佐理正紅旗事天聰三年大軍征明取遵化薄燕京明年正月旋師取永平灤州命貝勒阿敏等守永平都統納穆泰等守灤州以察哈喇署都統率䝉古左右翼兵守遵化四月同都統武訥格於樵採所設伏敗敵獲馬二百餘明將合歩騎四千奪大安口察哈喇與武訥格整軍奮擊殱殪甚衆五月明兵䧟灤州納穆泰等走永平阿敏度不能禦敵撤遵化將士棄城偕歸㑹敵兵已逼城察哈喇同都統鄂本兑等突圍出全師以還五年上遣都統楞額禮等征明南海島察哈喇率兩紅旗兵隨征次海濵獲敵船以未足濟師暫駐守猝遇明兵渡海來犯我佐領穆世屯禦敵陣亡察哈喇督兵奮擊敗敵别遣人沉其船敵還爭舟不得溺水死者過半六年五月大軍略明宣府大同邊境分兵略歸化城及黄河濵命察哈喇同承政車爾格率兵五百為前隊且備船濟師十一月同承政巴篤理徃朝鮮議職貢嵗額九年隨貝勒多鐸征明錦州與都統阿山叅領武拜等率兵四百先驅遇明兵三千於大凌河西相對列陣以衆寡不敵遣騎還告貝勒營貝勒統師馳赴明兵望見驚潰察哈喇與阿山等分路追擊擒斬無算凱旋分賜所俘獲逾年卒子富喇克塔任佐領兼都察院理事官崇徳八年七月擢工部叅政兼叅領世祖章皇帝順治元年四月授正藍旗滿洲副都統旋擢本旗蒙古都統隨睿親王多爾衮入山海闗擊敗流賊李自成追至望都連敗賊兵叙功授騎都尉世職是年冬隨豫親王多鐸征河南趨潼闗自成聚賊抗拒偽汝侯劉宗敏據山列陣富喇克塔同都統拜音圖以礮擊潰之賊犯我䝉古營復督兵殱賊無算明年陜西底定移師征江南同都統阿山馬喇希率兵先驅明兵據泗州北淮河橋我兵至則焚橋遁遂進克揚州三年隨貝勒博洛征浙江以雲梯兵攻克處州城進征福建同都統漢岱克分水闗趨泉州連敗拒戰賊衆招撫州一縣三凱旋加一雲騎尉五年二月以都統巴哈納等違例奏授佐領吉賽為䕶軍統領富喇克塔坐扶同列奏觧都統任尋隨征南大將軍譚泰討江西叛鎮金聲桓次九江賊衆迎戰富喇克塔率師進擊獲戰艦百餘同都統和洛輝截賊運道奪糧艘二百進攻南昌聲桓與其黨王得仁糾賊七萬離城扼據要隘富喇克塔督衆掘港以沙船二十先薄城明年賊平凱旋富喇克塔卒於軍先是遇恩詔晉世職為三等輕車都尉七年五月叙江西戰功晉一等輕車都尉以其子福克都襲哈寧阿哈寧阿姓富察世居額宜湖父阿爾圖山率其族攻薩齊庫城殺部長喀穆蘇尼堪招撫三百餘人來歸太祖髙皇帝𨽻滿洲鑲白旗任佐領復分編人户俾哈寧阿亦任佐領天聰二年隨貝勒岳託等征明錦州略松山杏山髙橋諸臺堡奮勇擊敵授䕶軍統領三年太宗文皇帝統大軍征明燕京哈寧阿從與明廵撫袁崇煥總兵祖大夀戰於廣渠門外以敗敵授騎都尉世職四年奉命率精兵百人徃略明境五年從征大凌河八年大軍征明大同哈寧阿先馳至小西城列雲梯攻具我師遂畢登復以二十人出略擊敗敵兵三百九年同承政圗爾格狥地入明山西界師旋過平魯衛明兵躡我後還擊敗之追至城壕斬馘無算叙功晉二等輕車都尉崇徳元年從征皮島有功二年列議政大臣三年隨豫親王多鐸徃㑹鄭親王濟爾哈朗軍征明道經中後所祖大夀輕師來襲叅領翁克及土黙特部兵先奔哈寧阿且戰且退士卒被䧟論罪應死奉詔免死革世職籍家産半四年論征明失律之佐領阿蘭太罪哈寧阿復以狥庇論死上仍貸之坐鞭責六年從圍錦州再敗敵兵明總督洪承疇以十三萬兵赴援上親統大軍環松山而營度明兵必宵遁命哈寜阿同䕶軍統領鰲拜率左翼軍列陣右翼地右翼軍以次遞列属於海濵夜一鼓明兵果沿海走哈寧阿率師掩擊敵自相蹂躪死者枕藉尋進攻松山屢戰俱㨗敏惠恭和元妃之䘮也哈寧阿隨武英郡王阿濟格方守髙橋輔國公扎喀納於軍中絃歌而舞事覺哈寧阿以不舉劾逮繫既而釋之八年三月同䕶軍統領阿爾津征呼爾哈部獲男婦二千五百有竒牲畜貂皮無算七月凱旋得優賚順治元年隨睿親王多爾衮入山海闗擊流賊李自成至望都大破其衆又同都統譚泰率前鋒兵追敗之正定賊倉皇焚輜重遁二年復授三等輕車都尉是年擊賊綏徳州賊聞風遁走追敗之延安府城内兵出犯左翼軍又擊郤之時李自成已奔武昌進師馳擊至安陸府獲賊艘八十復與譚泰移兵江南遇敵於楊子江奪其戰艦追至富池口敵列陣岸上又擊敗之三年二月隨順承郡王勒克徳渾征湖南流㓂敗偽伯呉汝義降其衆四月晉二等輕車都尉五月隨肅親王豪格擊敗叛鎮賀珍於漢中窮追至秦州賊黨武大定退據三寨山山勢壁立未可攻我師圍之偽遊擊周克徳者遣其子來降𨗳我師由僻徑登其守將石國璽為内應哈寧阿同副都統阿拉善署䕶軍統領噶達渾率兵六百破壁壘入賊皆自山堕崖下斬殺略盡進征川賊張獻忠略䕫州茂州資州遵義相繼克㨗五年正月師旋叙功晉一等輕車都尉世職是年卒子率顔襲珠瑪喇珠瑪喇姓碧魯世居葉赫太祖髙皇帝時率所部呼爾哈人來歸𨽻滿洲鑲白旗任佐領天聰三年隨大兵入明邊至遵化擊敗敵兵閲三日太宗文皇帝親臨遵化城明山海闗兵赴援將入城珠瑪喇率哨卒十人至擊斬甚衆至燕京遇明總兵滿桂黒雲龍麻登雲孫祖夀等軍於大紅門同叅領音達户齊額駙揚古利擊却之旋克永平復攻昌黎奮勇先登身被六創叙功授騎都尉世職尋縁事削去五年圍大凌河城明監軍道張春赴援珠瑪喇同叅領鄂諾連戰破其前後隊六年從征察哈爾獲布顔圖台吉於穆魯哈岱殱其從者百餘人俘其妻子以歸七年隨貝勒徳格類岳託攻旅順口率䕶軍十人乘船登岸擊甕城歩軍統領巴竒蘭曰誰能用命先登者珠瑪喇與佐領雍舜超躍而上向敵大呼曰我珠瑪喇登城矣連被三創不少却卒㧞其城上為嘉嘆親酌金巵以賜復授騎都尉世職九年隨貝勒多鐸征明夜設雲梯攻錦州被創甚劇崇徳元年征朝鮮自山巔力攻奪其寨門大兵繼之不戰而入遂取一寨又率兵征明敗其總兵海某軍取四縣師還擊敗開平两營兵三年七月授兵部理事官十月從圍錦州率甲士四十人攻襲廣寧北岧峙山山寨收降駱駝山兵衆又與都統石廷柱招降大凌河北山四寨六年同叅領禧福奉命徃張家口董理互市事及還法司劾其以私財市貨物向藩部人索馬諸罪状論死籍没得㫖寛宥革世職輸所市貨物入官尋隨鄭親王濟爾哈朗圍錦州敗敵騎之來奪我紅衣礮者敵騎復犯我軍珠瑪喇注矢射之應弦而仆敵衆退走七年與前鋒統領沙爾瑚達征松阿里江呼爾哈部落招降喀爾喀木等十屯俘丁壯千餘及牲畜輜重以歸命禮部官迎勞宴賚之世祖章皇帝順治元年珠瑪喇任叅領率兵從睿親王多爾衮入山海闗擊敗流賊李自成七月授正藍旗滿洲副都統尋擢兵部侍郎明年正月叙克明燕京破流賊及克錦州松山功復授騎都尉世職十一月與副都統和托等駐防杭州任左翼副都統時明福王朱由崧之大學士馬士英竄嚴州與其總兵方國安糾衆犯餘杭珠瑪喇率兵擊走之還距杭城三十里突遇土賊復大破其衆國安等仍聚衆數萬於江東赭山及杭州之朱橋范村所在肆掠珠瑪喇同總兵田雄副將張杰等分兵進勦賊悉平三年從征福建與䕶軍統領敦拜擊敗其總兵黄某軍四年考滿加一雲騎尉五年隨征南大將軍譚泰勦江西叛鎮金聲桓敗賊兵七萬又與都統和洛輝及沙爾瑚達連敗賊兵焚其戰艦千三百餘招撫九江一府五縣七年三月遇恩詔賜勅授三等輕車都尉世襲罔替又以平江西功晉世職為二等八年擢正白旗䝉古都統遷吏部尚書兩遇恩詔晋三等男十年冬吏部擬銓廢員房之麒為山東驛道之麒嘗任山東按察使罷職占籍青州為山東廵按馮右京列薦起用至是改歸直𨽻東明籍有㫖詰問吏部以直𨽻縉紳保結可慿復奏㑹給事中許作梅劾之麒於青州置田宅朦朧就銓復奉㫖嚴飭察核乃議之麒應革職上以部臣於銓授時不行詳勘及詰問仍支餙命王大臣察奏珠瑪喇坐罰鍰罷尚書任専管都統事十一年孫可望李定國自雲貴㓂廣西分兵犯廣東連䧟郡邑珠瑪喇奉命為靖南將軍同敦拜徃征之賜敕諭曰賊犯廣東故特遣爾等爾等至惟以安民為首務嚴飭兵將恪遵紀律賊若竄入廣西可與平南靖南兩王及總督李率泰相機酌議勦撫若入雲貴則擇善地休兵奏聞候㫖至遇賊對壘時爾二人居中調度毋以輕謀致敗用全我師是時定國犯新㑹平南王尚可喜靖南王耿繼茂等先率兵徃援至三水縣分布沿江隘口以待大軍比珠瑪喇至遂合兵進勦敗之於珊洲斬其副將一擒兵將十餘人獲首級百五十餘既抵新㑹定國紏歩騎四萬分據山峪列礮象拒戰珠瑪喇遵上方略指揮將士奮勇衝擊賊兵潰奔定國復出兵四千自山巔馳下迎截我師又擊敗之奪其山定國遁走十二年正月奏㨗得㫖嘉奨二月定國竄髙州珠瑪喇與敦拜授策副都統畢力克圗鄂拜等分兵追躡敗定國於興業再敗之於横州定國渡江焚橋驚走我師躡之三戰皆㨗定國率殘兵走賔州入南寧竄安隆珠瑪喇與尚可喜等遂復髙雷亷三府三州十八縣及粤西二州四縣獲象十六及馬二百餘噐械無算下部議叙復賜敕諭曰頃者李定國棲據南方頻侵兩粤二王及諸臣宣厥忠勇謀操必勝於新㑹等處殺賊既多復追至横州江岸降其軍將獲其噐械克定髙雷亷等府州縣先後屢㨗功績懋著朕甚嘉之特賜敕諭以示奬勵爾等其益勵忠勤垂名永久九月班師上召見於南苑諭大學士馮銓等曰珠瑪喇以元戎統領大兵出征廣東㨗歸今五旬矣如此年齒建立大功殆福人也賜茶奬勞明年部臣叙功擬晉世爵一等男兼一雲騎尉上以珠瑪喇功多不應循常格議叙特諭吏兵二部曰都統珠瑪喇等率兵擊敗李定國雪衡州桂林之忿快慰衆心朕甚嘉悦其軍功再加議叙尋議晉爵三等子十五年十一月以年老致仕康熈元年卒年五十有八賜祭𦵏諡㐮敏次子博通鄂襲爵鄂屯鄂屯滿洲鑲白旗人姓富察世居訥殷其伯父夢古慎郭和率所部三百人來歸太祖髙皇帝授為佐領使統所部既卒子喀爾喀嘛仍其職尋獲罪罷以鄂屯代之天聰五年同佐領武巴海隨副都統蒙阿圖征瓦爾喀進師額黒庫倫及額勒約索降其部衆崇徳元年授騎都尉世職三年任户部理事官六年大軍圍明錦州明總督洪承疇率兵赴援我右翼兵擊之於松山失利兩紅旗及鑲藍旗駐營地為敵所奪鄂屯率其屬三十五人守山巔力戰敗敵得優賚世祖章皇帝順治元年隨睿親王多爾衮入山海闗同叅領珠瑪喇擊敗流賊李自成騎兵追至望都復敗之二年論功加一雲騎尉三年隨副都統巴山等率兵駐防江寕任協領聞巢縣為賊襲據即率兵馳擊復其城六年同提督張大猷勦六安州山賊陣斬賊渠張福寰先是江寧設總督漕儲兼理錢法户部侍郎以鄂屯兼任之尋裁仍專任協領三遇恩詔晉世職至一等輕車都尉九年平南將軍金礪以海賊鄭成功侵據海澄縣請増兵進勦部議調江寧駐防兵二百徃助鄂屯與理事官額赫理烏庫理率之以行至則進攻海澄之東壘賊刦我紅衣礮鄂屯同額赫理擊却之賊悉衆十餘萬來犯鄂屯三戰皆㨗賊乃毁橋拒守鄂屯同烏庫理擊潰其衆先後招降賊兵數千平賊寨數十師還叙功加一雲騎尉十六年因老乞休康熈十五年正月卒子鄂塞襲職錫卜臣錫卜臣滿洲鑲白旗人姓𤓰勒佳費英東弟郎格之孫也太宗文皇帝天聰五年授前鋒侍衛崇徳元年從上征朝鮮三年隨睿親王多爾衮征明由青山口毁邊墻入至通州明太監髙起􅅗率兵來戰錫卜臣同前鋒叅領素爾徳擊敗之五年七月大軍圍明錦州敵騎自杏山來援錫卜臣同前鋒統領烏拜擊敗其衆錦州馬歩兵出城刈草又屢敗之六年復圍錦州擊敗明總督洪承疇三營歩兵敵千騎自寧逺來窺錫卜臣與前鋒統領努三追擊至連山斬獲無算世祖章皇帝順治元年隨大軍擊流賊李自成敗賊將唐通於一片石追敗自成於安肅望都復進征山西敗賊於太原二年隨英親王阿濟格征陜西錫卜臣同兵部理事官鄂摩克圖擊敗賊衆自成走湖廣又同前鋒叅領錫特庫追至安陸擊毁賊船是年擢前鋒叅領叙功予雲騎尉世職三年隨肅親王豪格征流賊張獻忠師至陜西擊敗叛鎮賀珍於漢中遂進四川屢戰皆㨗獻忠既滅還京改䕶軍叅領五年冬大同總兵姜瓖叛錫卜臣同䕶軍統領素拜徃討屢敗賊復隨端重親王愽洛擊敗賊黨劉遷觧代州圍屢遇恩詔並叙四川大同戰功晉世職至二等輕車都尉十一年擢䕶軍統領十二年命同都統卓洛等率兵駐防荆州時張獻忠遺黨孫可望降於明桂王掠湖南據辰州十三年錫卜臣同卓洛由澧州常徳進征賊聞大兵至棄城遁追破之於瀘溪賊竄入山谷遂復辰州十六年海賊鄭成功犯江寧錫卜臣同安南將軍明安達哩自荆州赴援破偽都督楊文英等於揚子江斬獲無算聖祖仁皇帝康熈九年擢鑲白旗䝉古都統十二年諭奬久著勞績諸大臣加錫卜臣太子少傅十三年四川廵撫羅森提督鄭蛟鱗總兵譚宏呉之茂等叛應逆藩吳三桂上命錫卜臣為鎮西將軍率兵鎮守陜西是年冬錫卜臣同都統赫葉等征四川賊據保寧我兵營於蟠龍山爲賊所刼復阻截饟運錫卜臣還漢中值陜西提督王輔臣叛於寕羌賊黨分據棧道錫卜臣駐漢中饟運久阻食不繼十四年八月還西安䟽言自本年二月兵糧匱竭取食賊麥以至七月食已罄盡計欲保全大軍乃自漢中出沿途擊賊馬匹噐械俱盡上命陜西督撫給帑買馬人各一匹並整頓噐械鎮守西安十九年還京仍任都統二十二年四月議政王大臣追論蟠龍山戰敗罪應罷任革世職籍没得㫖錫卜臣尚有勞績免其籍没尋卒於家棟阿賚棟阿賚滿洲鑲白旗人姓䝉郭初任䕶軍叅領太宗文皇帝天聰八年隨都統阿山征明錦州敵列營城南山岡棟阿賚先衆衝擊破其歩兵營崇徳三年隨貝勒岳託征明由墻子嶺入邊擊敗明總督吳阿衡軍五年隨豫親王多鐸圍錦州設伏擊敗塔山援兵六年四月隨鄭親王濟爾哈朗圍錦州我軍分伏於錦州南山西岡及松山北嶺而令前鋒兵誘明援兵之自杏山至松山者敵至棟阿賚率衆奮擊斬獲無算又破敵營於松山北岡九月大軍圍明總督洪承疇廵撫邱民仰等於松山城城内兵逸出棟阿賚率兵追擊殱之敵馬歩兵乘夜出城犯我鑲黄旗汛地復奮擊敗走追越城壕而還八年三月同䕶軍統領阿爾津哈寧阿等征黒龍江呼爾哈部攻克博和哩諾爾噶勒都里三屯招降大噶勒達蘇小噶勒達蘇二屯又進圍綽庫禪能吉勒二屯俘丁壯百人師還賚貂皮及白金九月隨鄭親王征明寧逺城内兵出戰棟阿賚率䕶軍四十人奮擊明兵遁走遂進克前屯衛城復同䕶軍統領阿濟格尼堪布善等攻㧞中前所城世祖章皇帝順治元年正月兼任刑部理事官二月叙錦州寧逺功予雲騎尉世職四月隨睿親王多爾衮入山海闗敗流賊李自成二年正月叙功晉世職為騎都尉三年擢正黄旗滿洲副都統是年隨順承郡王勒克徳渾征湖廣擊敗自成餘黨一隻虎等於荆州凱旋賚白金四年正月命率兵駐防杭州既至遣兵勦滅孝豐縣東栢山土賊時海賊鄭彩等冦掠福建十一月棟阿賚奉命同侍郎辰㤗統兵征勦五年師至建寧連敗賊將曹大鎬傅國用張耀星等復建寧府城及同安平和二縣鄭彩聚賊船千餘據長樂連江二縣棟阿賚辰㤗及副都統李率泰等分兵進擊盡驅出海又勦其餘黨於興化擒偽總督顧世臣等十一人斬之其被賊脅從城邑亦皆就撫六年召還京授都察院叅政兩遇恩詔並叙平福建功晉世職至一等輕車都尉八年二月卒子棟山襲職車克車克滿洲鑲白旗人姓𤓰勒佳世居蘇完祖克爾素太祖髙皇帝時來歸父席爾那任佐領既卒車克仍其任兼前鋒侍衛天聰八年從上征明由大同趨懐逺薄左衛城與前鋒統領圗魯什等設伏敗明總兵曹文詔騎兵略地越代州百餘里至五台山還遇明總兵祖大弼兵二百餘擊敗之並多斬獲崇徳三年授户部副理事官㑹户部承政韓大勲私取庫金事覺以前此貯庫時車克失記册檔論死上命免死罰鍰仍留部用尋兼任叅領五年鄭親王濟爾哈朗率兵圍錦州令車克同前鋒統領勞薩等領兵三百設伏髙橋北以縱敵弗擊議罪籍家財半六年復赴鄭親王軍助圍錦州破明總督洪承疇歩兵三營世祖章皇帝順治元年從大兵入闗擊敗流賊李自成二年叙功授騎都尉四年考績以車克在户部能任事加一雲騎尉五年擢本部侍郎隨英親王阿濟格征大同叛鎮姜瓖車克分兵徃援太原與廵撫祝世昌合謀遣兵勦除瓖黨劉遷萬錬瓖尋伏誅七年兼任正白旗副都統兩遇恩詔晉世職至二等輕車都尉八年三月觧侍郎任改都察院叅政四月駐防河間佐領碩爾對訐户部諸臣給饟不均下法司鞫實由尚書巴哈納主議車克前任侍郎坐附和降世職為雲騎尉九月擢户部尚書明年列議政大臣遇恩詔晉騎都尉十年上以車克前此降世職處分過重仍復二等輕車都尉十一年八月上嘉其素効忠勤任部務有勞績加太子太保十二年擢秘書院大學士晉少保奉命輯太祖太宗聖訓充總裁官十三年三月自陳學識踈淺未諳秘書院事請罷大學士任上弗允六月諭吏部曰户部尚書職司國計倚頼非輕必得精敏練達之才方能勝任大學士車克向任司農亷勤夙著着晉少傅兼太子太傅仍管户部尚書事十四年考滿加少師兼太子少師十六年奉命赴江南督造戰艦十七年同安南將軍羅托統兵勦海賊鄭成功十八年聖祖仁皇帝即位車克奉詔還京調吏部尚書先是旗人阿那庫與其兄金布争産奉有諭㫖均分阿那庫旋以金布隐匿婢女三人訴户部車克以婢女舊為金布所有於分産無渉置弗理阿那庫復與本旗佐領吉詹爭論吉詹以阿那庫違㫖妄爭牒户部車克移牒刑部遂坐阿那庫違㫖罪論絞至是阿那庫妻擊登聞鼓訟寃詔所司勘議阿那庫違㫖之罪得釋車克應革任罰鍰詔削加銜免革任康熈元年復授秘書院大學士六年以疾致仕十年六月卒賜祭𦵏如典禮諡文端子渥爾敏襲職欽定八旗通志卷一百六十七
