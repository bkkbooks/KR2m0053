body:
  text: 典禮志六八旗軍禮大閲征京營訓練敕親征旋凱旋將出遣使頒凱命大閱大閱之禮三嵗一舉兵部奏請欽命王公大臣六人總理其事編飭八旗火器前鋒䕶軍驍騎諸營修整戎器甲胄金鼓旗纛之属欽天監諏吉前期二月八旗佐領各出弁卒為大閱之衆命八旗都統副都統前鋒統領䕶軍統領各勒所部扵演武場訓練士衆嚴明紀律前二日武備院卿率官校赴大閱處列御營張幄殿設御座於正中張圎幄於殿後設御用甲胄弓矢於幄内八旗將校甲兵依式布步騎軍營翼日總理閲兵王公大臣督諸軍各宿軍幕屆日五鼓鑾儀衛陳騎駕鹵簿樂部陳鐃歌樂於行宫門外乃饗軍士食畢饗諸軍皆貫甲出營列陣列陣之制去陣前百四十有七丈建大纛以為軍表左翼鑲黄正白鑲白正藍以次而東西上右翼正黄正紅鑲紅鑲藍以次而西東上陣内諸軍各按旗依表為隊㝡前為漢軍火器營滿洲䕶軍火器營驍騎火器營並列各别其隊合漢軍滿洲火器營統兵大臣十有七人將校七百十有二人兵八千三百七十有六人其後間二十有五丈為首隊兵八旗前鋒居中八旗䕶軍驍騎各按翼按旗分列前鋒左右合首隊前鋒䕶軍驍騎統帥十有六人将校二百九十有六人兵四千四百十人又後間十有五丈為次隊兵八旗䕶軍驍騎各按翼按旗分列合次隊䕶軍驍騎統帥八人将校百四十有四人兵三千五百二十有八人大軍左右分張兩翼為協隊按旗相属斜行雁綴成列合協隊䕶軍驍騎統帥八人将校百三十有六人兵千七百六十有四人滿洲䝉古漢軍合委散秩官八人驍騎校八人驍騎三百二十人禁約讙譁又合委傳宣官八人驍騎校八人䕶軍校八人承傳軍令軍陣既嚴兵部尚書侍郎詣行宫奏成列司礟舉礟三鐃歌大樂作奏壮軍容之章皇帝乗騎出行宫侍衛二十人前引大臣十人騎而導後䕶領侍衛内大臣二人侍衛班領率豹尾班侍衛執槍十人佩刀十人佩弓矢十人騎而従駕入御營躬御甲胄扈従王公大臣侍衛親軍咸擐甲侍班滿漢九卿記注官蟒袍補服豫於御營前恭竢兵部尚書奏請閱兵皇帝佩刀出御營属櫜鞬乗騎前張黄龍曲盖一武備院官掌之兵部尚書侍郎二人騎導前引後扈如前儀總理閱兵王公大臣滿大學士乗騎随従三旗内大臣散秩大臣率親軍舉黄龍大纛三旗侍衛親軍各從侍衛什長親軍校随纛扈蹕有執事王公附豹尾班後随行皇帝入自左翼出右翼由列陣中路行經驍騎䕶軍前鋒諸隊前火器營諸隊後陣前将校甲士各就列迴身以向恭竢駕過皇帝周視隊伍還營御幄殿前引大臣分立殿前東西面後扈大臣侍衛翼立御座左右殿外東西列豹尾班侍衛建黄龍大纛一侍衛親軍按隊環衛總理閱兵王公大臣大學士兵部尚書侍郎立于殿外階上西位東面執事王公侍班九卿記注官分翼立于階上東西面御營前左右列侍衛各六人八旗傳令官在其下滿洲索倫䝉古善馭馬侍衛三十人不擐甲按翼立侍衛後備馭驚軼之馬届時兵部尚書出班跪奏鳴角開操鑾儀使率鳴角軍進御前蒙古大角鳴承傳海螺以次逓鳴逹于軍陣司礮三舉礟諸陣内擊鼓螺角畢鳴乃行陣擊鼔鳴螺舁鹿角整隊前進鳴金止一字成列領隊甲士麾紅旗槍礮齊發鳴金止再擊鼓鳴螺整隊而進鳴金麾旗發槍礮如是者九初進以二十丈再進以七丈五尺為率至第十進大小礮連環槍齊發無間鳴金三乃止開鹿角為八門首隊前鋒䕶軍驍騎甲士以次出次隊軍随之火器營兵列扵後鹿角門閤諸軍出鹿角外既成列八旗齊鳴螺譟而進左右翼兵雁綴斜行成列並進軍中鳴金止乃鳴螺振旅而還各列於初成列之地兵部尚書出班跪奏大閱禮成皇帝入御營釋甲胄扈従王公大臣侍衛各退咸解甲具吉服随駕還行宫司礮舉礮三鐃歌清樂作奏鬯皇威之章将帥各率弁兵按隊歸營解甲徹幕申嚴約束依次入城翼日鑾儀衛陳大駕鹵簿皇帝乗騎囘鑾警蹕如前儀駕還宫恩賜賞賚有差京營訓練京營八旗弁兵春秋季月合操四次春曰貫甲秋曰常服營陣規制如大閱之儀仲春孟秋之月按旗登城習鳴螺兵部遣官稽閱嵗為常制䕶軍驍騎官兵一嵗三校騎射本旗都統臨視之前鋒䕶軍三嵗一校騎射兵部疏上領侍衛内大臣八旗都統副都統名每翼欽命數人㑹本翼都統臨視之八旗滿洲漢軍火器營礮間三嵗季秋月演試扵盧溝橋都城各門之礮分三之一更遞運往同演命兵部滿尚書一人臨視之親征皇帝親征之禮命下内閣諏啟行吉日以聞兵部承制宣攝内外諸司各随職供備前後備六軍頒行軍律令前期三日遣官祇告天地宗廟社稷太嵗屆日遣官致祭道路之神於天安門外列礮于演武場遣八旗都統致祭司礮之神鑾儀衛陳騎駕鹵簿于午門外前列鐃歌大樂兵部設御營黄龍大纛于堂子内門外之南不従征王公暨滿一品官蟒袍補服従征王以下大臣服征衣佩刀豫往堂子街門内祇竢従征六軍分翼列陣於都門外屆吉時禮部尚書侍郎詣乾清門請駕御征衣佩刀出宫乗騎前列九龍華盖一武備院卿騎𨗳領侍衛内大臣侍衛咸服征衣佩弓矢乗騎前後翊衛駕入堂子街門王公以下跪候過随入武備院官豫布皇帝拜褥於圜殿外甬道正中及旗纛前皇帝降騎禮部尚書侍郎恭𨗳由内門中門入就圜殿外拜位南向立前引大臣止立門外後扈大臣随侍鴻臚寺官引王公位丹陛上引衆官位丹墀東西鳴贊奏跪拜興皇帝行三跪九拜禮王公等随行禮畢禮部尚書侍郎恭𨗳皇帝出堂子内門詣旗纛前望纛行三跪九拜禮王公等随行禮畢皇帝乘騎𨗳迎樂作奏佑平之章領侍衛内大臣侍衛班領率親軍䕶軍舉黄龍大纛扈蹕王公以下咸騎従駕出都門至陳兵處司礮三舉礮各旗将弁士卒俯伏候過整隊随行駕至郊不從征王以下文武百官咸蟒袍補服跪送車駕載途大軍分隊前驅駐蹕行營建御營於正中前鋒軍過御營前分列東西二營八旗䕶軍及驍騎張左右翼分列十六營火器營軍礮軍綿甲軍列為四營皆環御營為向御營内張帳殿黄幄周黄幔為城南設旌門列黄龍大纛於門外左右幔城外設網城東西南樹旌為三門網城外布幕為重營東西南北各為一門䕶軍㕘領侍衛鑾儀衛官及䕶軍執事人每重扈蹕将及所征之地遣使齎敕往諭親御軍門簡閱将士申嚴紀律諸軍秉宸謨廟算分道進發奏先捷班師凱旋皇帝親征既克有罪諏吉凱旋前期一日遣官致祭旗纛之神屆日鑾輿先發諸軍整旅徐旋駕将至京内閣宣下諸司在京王公百官咸蟒袍補服郊迎鑾儀衛陳法駕鹵簿自郊外五里至堂子門外駕至郊王公百官跪候過随行駕入都門大樂鼓吹前導至堂子内門禮部尚書侍郎恭導皇帝降輿致祭堂子王公等随行禮畢鑾儀衛移設鹵簿起堂子至午門外皇帝乗輿入東長安門至午門百官跪候過王公随入至内金水橋候駕還宫皆退大師凱旋翼日遣官祇告天地宗廟社稷太嵗並遣官致祭陵及隨征旗纛司礮之神宴從征将士扵御苑皇帝親勞之䇿勲行賞有差禮部諏吉疏請御殿受賀皇帝御太和殿受中外羣臣表賀頒詔布告天下御製碑銘勒石太學以告成功編次親征方畧宣付史館命将出征皇帝命大将軍出討寇亂先期内閣大學士擬銜名奏請欽定禮部製印欽天監諏吉以聞兵部徧布諸司供備前期三日鴻臚寺官豫設敕印案於太和殿内東楹之南内閣侍讀二人自閣奉敕印入陳於案鑾儀衛率官校陳法駕鹵簿樂部率和聲署陳樂懸王公百官咸蟒袍補服就班位序立如常朝儀出征大将軍暨従征各官蟒袍補服入竢於丹墀之東西面禮部尚書侍郎詣乾清門請駕皇帝龍袍補服至太和殿北階中和韶樂作奏隆平之章皇帝御太和殿陞座丹陛樂作奏慶平之章鴻臚寺官引大将軍升自東階立丹陛之東北面接敕印官二人從升立扵左西面分引從征各官按左右翼就丹墀東西拜位均北面序立賛受敕大學士一人入殿左門就東案奉敕由中門循左闑出授大将軍大将軍祇受轉授接敕官跪奉以興退俟扵左賛受印大學士一人奉印授大將軍如受敕儀樂作大将軍暨従征各官行三跪九叩禮奉敕印官降自東階由太和中門出大将軍従出從征各官皆出駕興中和韶樂作奏顯平之章出師日鑾儀衛陳法駕鹵簿扵午門外文武百官蟒袍補服按翼集午門外東西闗下大将軍暨従征各官服征衣王貝勒貝子公滿大學士将軍都統尚書蟒袍補服均東面豫竢扵堂子街門内兵部建八旗大纛各一於堂子内門外之南軍士執螺角列俟扵街門外従征将士按翼分立扵甬道左右禮部尚書侍郎詣乾清門請駕皇帝龍袍補服乗輿出法駕鹵簿前導百官跪送駕至長安橋軍士吸角吹螺大将軍従征各官暨王公大臣等跪候過隨行駕進堂子街門禮部尚書侍郎恭𨗳皇帝降輿就位行禮羣臣咸隨行禮畢恭導皇帝至纛前行禮大将軍暨従征各官均隨行禮畢𨗳迎樂作奏佑平之章皇帝囘鑾遣官以師行祇告奉先殿其日工部官豫張黄幄扵東長安門列南向武備院官供御座鋪陳光禄寺官備酒以竢皇帝祇告堂子禮畢王公大臣先至東長安門分翼序立大将軍暨従征将士先至幄外恭竢皇帝入幄陞座内大臣侍衛翊立左右皇帝命大将軍入親賜卮酒大將軍跪飲畢退率從征将士謝恩行三跪九叩禮畢佩櫜鞬辭駕皇帝命乗馬啟行樂作皇帝乗輿還宫王公百官送駕各退遣官祖餞大将軍於都門外禮部官豫張幕扵門外道左内務府官設燕扵幕内光禄寺官備茶酒承㫖餞送之王公大臣侍衛各官蟒袍補服竢扵幕外大軍按翼肅隊大将軍至下馬從征官咸下馬王公大臣侍衛迎入鴻臚寺官引就拜位行三跪九叩禮畢分引就燕席禮部兵部尚書侍郎奉茶燕畢望闕謝恩行禮王公大臣等送至幕外視大将軍啟行各退遣使頒敕王公大臣出師疆場皇帝即軍中命為大将軍先期臨軒遣正副使各二人持節賚敕印往至日大将軍率屬郊迎扵演武場築壇壇上正中設敕印案前為香案屆時正副使蟒袍補服登壇陳敕印於案退東靣立大将軍蟒袍補服詣香案前跪宣敕官東面宣讀敕文訖正使奉敕副使奉印以次授大将軍大将軍祇受轉授従官跪接大将軍行三跪九叩禮大将軍奉敕印莅事正副使還朝持節復命凱旋大将軍戰勝滅冦諏吉凱旋先期具疏以聞振旅還朝将至京師先遣官入奏皇帝命廷臣以茶酒出郭迎勞大将軍率従征将士望闕謝恩行三跪九叩禮畢還朝翼日皇帝御太和殿中和韶樂作奏隆平之章大将軍出班従征内閣官二人恭奉敕印升丹陛大将軍詣案前跪以次恭納敕印扵案退就班位丹陛樂作奏慶平之章大将軍率従征将士謝恩行三跪九叩禮畢駕興中和韶樂作奏顯平之章諏吉祇告天地宗廟陵寢社稷先師孔子並致祭旗纛礮神羣臣恭進賀表皇帝陞殿受賀御製碑銘勒石太學分命儒臣編纂方畧垂示武功乃燕勞大将軍諸従征者咸與燕翼日論功行賞有差若命重臣經畧軍務節制將帥出征不庭其頒敕印祭堂子餞送凱旋之儀均與大將軍同欽定八旗通志卷八十三
