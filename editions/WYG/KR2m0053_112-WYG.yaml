body:
  text: 欽定四庫全書欽定八旗通志卷九十八學校志五世職幼學學清文學義教場官學京䝉古語學算八旗學附盛八旗官學黒龍江官學世職幼學雍正七年閏七月八旗都統議覆都統竒爾薩所奏未及年嵗尚未上朝之佐領世職人員俱著義學肄業等語伏惟我皇上振興文教加恩八旗命每旗各立義學将閒散幼穉俱令讀書已咸被陶成矣臣等請照都統竒爾薩條奏将八旗滿洲蒙古漢軍内有未及年嵗尚未上朝之佐領世職人員亦俱令入義學肄業其不在本旗地方居住者令都統将伊之佐領並職名出具印結移咨現住之旗分都統著就近入彼旗義學謹案義學於乾隆二十三年裁汰而兩翼别設世職新學詳本卷後如此則日後上朝於辦理任内事務亦屬有益奉㫖依議乾隆元年議准八旗世爵年二十以下者分撥各旗官學一同教習三年期滿該旗大臣逐加考試分别等第引見録用毎學各増漢教習一人各撥教射教習一人其應給月費等項照例支給三年奏准八旗世爵在官學學習三年期滿引見録用其雖滿三年而年未及二十嵗者仍留讀書俟滿二十嵗後再行請㫖考試十七年五月奉上諭近來八旗世襲官多有不習清語騎射流於不堪者此皆由自㓜襲官食禄不思上進只求安逸該都統亦不勤加教誨之所致也此等官員皆伊祖父所立至伊等承襲時因年嵗未及安居無事不勤正務任意流弛至於無用若給與差役行走伊等尚可成就但該旗之差役無幾至挑選侍衞竟有求情不到者著将伊等分入八旗䕶軍營在㕘領䕶軍校䕶軍上相兼行走令其習學騎射騎射果好奏補實缺如此可為成就㓜年之道其如何擬派差役坐補陞用留旗當差之處交軍機大臣㑹同八旗都統前鋒統領䕶軍統領等合議具奏尋㑹議奏言我皇上念世襲官員躭於安逸恐至無用著将伊等分在八旗䕶軍營量其品級擬與差役令其學習武藝實成就世職官員仁厚之至意也臣等查得八旗世襲官員内除大臣侍衞部院衙門各營及别項差役行走人員外其餘看守倉庫城街火堆等項官差即世職較多之旗分足分為三班若遇有告假患病隨圍等故即不足三班若将本旗原有職官移給别項差務則旗員之差役似覺過宻只有恩騎尉一項係皇上特恩増設之員未増此項世職之前旗員差役原無不敷查得現今在旗行走之恩騎尉共一百六十餘員即照此數将世襲官與恩騎尉一并挑選挑選時臣等㑹同領侍衞内大臣前鋒統領䕶軍統領詳細察看将其可學騎射清語者令戴空藍翎在侍衞上行走果有行走勤慎騎射清語可觀者挑侍衞時指名帶領引見補放如有不習騎射清語當差懶惰者若将伊等駁回本旗反遂其好逸之願請交該管大臣㕘奏革職其餘官員交前鋒統領䕶軍統領三品以上者著在副䕶軍㕘領上行走四五品者著在委䕶軍叅領行走六品者在䕶軍校上行走七八品者在委䕶軍校上行走若有勤學騎射清語當差勉力者以副䕶軍㕘領委䕶軍㕘領䕶軍校補用如有當差雖勤而騎射清語不能長進者駁回本旗當差如有差不力又無長進者即行㕘奏革職将本身世職另行襲放如此則世襲官員皆知奮勉有志者既得上進而於旗員差役亦不至有碍矣再八旗年嵗未及之幼官坐食半俸併無行走學習之處雖有入學讀書之例而入學者甚少此等幼童或驕養過甚不習武藝或自謂身已為官恣意妄行或比匪為非故至長大時賢者少而不肖者甚多臣查得年嵗未及之幼官共一百七十員若特派大臣教誨多有可成臣等詳細議定兩翼各設二學将米局現有官房交該部作速修理分給至管學之員請将頭二品大臣職名請㫖指派所有修理房屋添設教習學内應用煤炭冰水等項交該管大臣查例議奏八旗幼官内十嵗以上者應令入學習清語騎射俟三年期滿管學大臣請㫖派王大臣考騐清語騎射擬定等第頭等者帶領引見恭候聖裁或以部屬或以侍衞用二等者交該旗印房行走或對品陞用三等者仍給半俸留學俟三年期滿考騐若仍無長進則教亦無益此等廢材請即行革職将應有世職另選應襲之人承襲如此則八旗世僕皆獲黽勉之途有用之材可望多覯矣奉㫖依議嗣後年幼襲官之人至十嵗以上即照此例令其入學所有在侍衞處䕶軍營行走者俟朕木蘭回鑾後親身考騐将此先行曉示令伊等各知奮勉如臨時仍有不能射箭者即照所請革職是年管理左右翼世職官學大臣議奏臣等将八旗米局酌量就近之處鑲黄正白㑹立一學鑲白正藍㑹立一學正黄正紅㑹立一學鑲紅鑲藍㑹立一學每翼派㕘領二員輪流稽察所有學務令其管理每學派領催二名馬甲八名分作三班聽候差遣𫝊事臣等不時到學考察庶不至於怠惰廢弛矣至於挑取滿教習查漢軍義學例在該旗滿洲閒散官員筆帖式或革職降級人員内挑取每月給銀二兩若無米石者折給米價銀一兩今幼官學教習請照例於每翼挑取四人每學分設二員均給公費其教習騎射之人在䕶軍校驍騎校前鋒䕶軍内每翼各選四人照國子監助教例每月給公費銀一兩五錢如果教導有方俟三年期滿交部議叙不善教誨者即将該員駁回本旗係職官則交部察議兵丁則鞭責革退又原奏内有領給冰炭一項但支領氷炭等物車馬煩冗請每月改給公費銀四兩以為氷炭茶水之用所有經費均於八旗官房租銀内輪流動用年終奏銷奉㫖知道了是年奏准八旗世爵既經於兩翼設立官學教導将現在官學肄業之世爵子弟咨回各旗所有八旗官學増設之漢教習一人相應裁汰教射教習亦咨本旗三十八年四月奉上諭據范時綬奏稱現在官學讀書之鑲白旗滿洲恩騎尉倭什洪額素日庸愚懶惰教習等欲加責懲詎倭什洪額即以小刀自傷頭顱請将倭什洪額革職交該旗養傷俟平復時嚴加管束所遺恩騎尉另選承襲等語設立官學令年幼世襲官員在彼學習清語騎射原係造就伊等之隆恩倭什洪額素日並不上𦂳學習而教習等欲加責懲伊竟不服從反用小刀自傷額顱甚属無恥倭什洪額身係滿洲世職豈宜如是況恩騎尉一官原因伊祖先所得世職襲次已滿朕復念彼勞績特恩賞給正宜感激朕恩上𦂳學習而反甘自暴棄實屬不堪若不嚴行處治何以炯戒滿洲世僕著将倭什洪額革職銷除旗籍發往黑龍江所有恩騎尉停止承襲其管理官學之大臣章京教習等著交部分别察議並将此通諭八旗知之以上世職幼學清文學雍正七年九月禮部議覆副都統劉汝霖所奏八旗漢軍各在就近地方選擇官房十數間立一清文學於滿洲閒散官員内擇其人品端方通曉清文者二人以充教習将佐領下無力延師之人揀選入學讀書再令本㕘領不時稽察其中有文理精通者於各部院考取繙譯時許本旗咨送以備考用其粗能通文射箭者即在本旗挑補領催馬甲以備抄録檔案之用至於所選教習果能實心効力教導有方請㫖交部議叙等語查八旗漢軍都統辦理事務用清文之處居多漢軍子弟學習清文甚屬𦂳要若不另設清文義學専司教訓而漢軍子弟清文生疎一切書寫事件恐致錯誤應如劉汝霖所奏令八旗漢軍各在本旗近地設立義學一所於毎佐領揀選一二人入學専習清文其教習交與滿洲都統㑹同漢軍都統於滿洲閒散官筆帖式或因公詿誤人員内擇其精通清文堪以管教者二人充補又於漢軍本旗内選善射者一二人乗子弟之暇教習射箭其所選教習官則月給公費銀二兩若閒散人則月給錢糧二兩米二斛其米石折銀俱在漢軍本旗公費銀兩内給與再令本旗㕘領不時稽察課業如子弟文理精通情願考試繙譯者吏部考取筆帖式時即閒散人亦准其具呈送考其粗能通文射箭者即在本旗挑補領催馬甲以備抄録檔案之用如有志上進願仍在義學肄業各聽其便該旗不得勒令挑補領催馬甲倘教習等視為具文不盡心教導本旗查出題㕘如果勤加教誨三年内子弟能熟清文本旗分别等第請㫖交部議叙如此則漢軍皆嫻熟清文射法而我皇上作養之恩益溥徧無既矣奉㫖依議選擇教習人員著帶来引見十月八旗王大臣議覆㕘領阿魯所奏毎甲喇請立一清文學舍除大臣官員子弟情願在家學習及官學讀漢書者外其十二嵗以上餘丁俱令入學習清書騎射教導倫理等語查滿洲佐領下餘丁雖俱交能清文之領催馬甲等教訓並未立有學舍應如阿魯所請毎甲喇立一學舍教訓除漢軍餘丁已照劉汝霖條奏立學外其滿洲䝉古旗分請於旗下官員内每甲喇選擇五間令為學舍若該旗無房於他旗附近之房選擇五間立為學舍於毎旗前鋒䕶軍領催馬甲内挑老成通曉清文能教訓者二人令為師長除大臣子弟願入官學義學讀漢書及在家學習外其十二嵗以上餘丁俱令教清文清語每甲喇或章京或驍騎校派出一員令教導倫理騎射其䝉古旗分亦照此設立學舍並教以䝉古語該㕘領不時稽察臣等亦不時稽察一年一次考試其教訓好者官員則給以紀録兵丁則記檔遇應陞之處送名若不以事為事教導惰懈者官員則題㕘察議兵丁則革退另選如此則餘丁皆得仰沾皇恩不數年間俱得成就矣奉㫖依議十二年議准清文學年滿教習分為三等其所教子弟内有能考中繙譯外郎筆帖式者作為頭等交部議叙所教子弟雖未有考試之人有能寫清字楷書併粗通繙譯者将該教習作為二等再留學三年如所教子弟止能寫清字併粗通清語者作為三等撥回原處乾隆三年議准八旗漢軍清文教習年滿者所教子弟肄業果優有能考中繙譯外郎筆帖式繙譯生員者作為頭等仍照原議交部議叙若雖無考中之人尚有能寫清字楷書併粗通繙譯及通曉清話者為二等照原議留學三年若所教之人並無粗曉繙譯清話又不能繕寫清字楷書是該教習並不實心教誨係現任筆帖式閒散官充當者即時交部查議係廢員充當者即時駁回永不叙用仍嚴飭稽察之㕘領官不時查報二十三年奉㫖裁去八旗義學此項八旗清文學仍行存留遇有教習缺出仍照例奏請補授遇有考試貼寫中書筆帖式繙譯謄録等項其義學内學生仍准一體考試以上清文學教塲官學雍正元年九月八旗都統議奏查八旗教塲盖造房屋令貧乏兵丁居住每月每旗派㕘領一員在教塲居住稽查飲酒賭博等事兵丁有犯将該㕘領照例治罪兹因日久未免漸弛請嚴行稽查倘有疎忽從重議處至教塲内居住兵丁無力延師教訓子弟應於各教塲俱設一學該旗選擇老成善清書騎射者二人令其教習各都統等揀擇地方交部造房五間以為學舍如此則教塲兵丁子弟俱有肄業之所庶可仰副聖主教育滿洲之至意也奉㫖依議十年奉上諭圓明園兵丁朕從前未經細看此次大閱細看沿途站立管道之兵丁氣象較前甚優圓明園之八旗及内府三旗賞給教習令伊等子弟學習漢書著果親王等議奏是年四月果親王允禮等議覆八旗及内府三旗營房向因地勢建造故相隔逺近不一今䝉聖恩設立學舍當視營房之逺近建造查鑲黄正黄正白鑲白四旗營房相近應造學舍一所設教習二名正紅鑲紅二旗營房相近應造學舍一所設教習一名正藍鑲藍二旗營房相隔甚逺不便設立一學毎旗各應造學舍一所各設教習一名其内府三旗既同一營房應造學舍一所設教習一名共造學舍五所挑取教習六名其教習於八旗及内府生員内擇其能訓誨者為之四年一換每月給錢糧二兩每年三季共給米二十一斛二斗如有善於教訓誠屬優等者咨行吏部以筆帖式補用其平常者駁回該旗其教誨甚劣者将生員革退其缺另行挑取奉㫖依議以上教塲官學䝉古語學雍正元年十一月副都統竒爾薩奏請八旗蒙古佐領下各建立官學教習䝉古書話尋八旗都統等議奏每旗設立一學揀選能䝉古書話者為助教教習子弟於毎佐領下擇可學者一人令其肄業其助教員缺交吏部㑹同理藩院考取引見補授再於八旗前鋒䕶軍領催馬甲内擇其能蒙古書話者令協同助教教習其如何録用之處應交部另議具奏尋吏部議得助教八人外其協同教習之人遇助教缺出由理藩院考選擬定正陪咨送吏部引見補授其肄業人等准其考試以䝉古筆帖式補用並奉㫖依議以上䝉古語學算學康熙九年九月諭禮部天文闗係重大必選擇得人令其専心習學方能通曉精微可選取官學生與漢天文生一同習學有精通者俟欽天監員缺考試補用尋禮部議於官學生内每旗選取十名交欽天監分科學習有精通者俟滿漢博士缺出補用詔從所議雍正十二年奏准康熙五十二年設算學於暢春園之䝉養齋簡大臣官員精於數學者司其事特命皇子親王董之選八旗世家子弟學習算法又簡滿漢大臣翰林官纂修數理精藴及律吕諸書至雍正元年告成御製序文鐫版頒行自明季司天失職過差罕稽至此而推步測驗㒺不協應際此理數大備之時正當淵源傳授垂諸億萬斯年應於八旗官學増設算學教習十有六人教授官學生算法毎旗官學擇資質明敏者三十餘人定以未時起申時止學習算法乾隆三年奏准設立官學教養八旗子弟専以讀書繙譯為業以備将来録用至算法一藝理數精微非童稚所能驟通況以一時之蹔教授三十餘人勢難遍及又按算法乃欽天監専司其如何教習録取之處應令酌量辦理其官學生習算法概行停止案停止算學係由尚書孫嘉淦奏准又奏准算學設漢教習二人即於奏停八旗官學内教習算學之人充補月廩等項照八旗官學漢教習例五年期滿果能盡心訓課著有成效者該管大員奏交吏部議叙舉人筆帖式充補者交與欽天監以靈臺郎補用貢監生員充補者以挈壺正補用官學生算學生充補者以博士補用将来教習員闕於奏停教習㧞補完日令該管大員㑹同欽天監於學内教習有成之人考選充補又奏准就欽天監附近専立算學一所額設滿洲漢人各十有二人蒙古漢軍各六人滿洲蒙古漢軍即於八旗官學内擇其從前曽學算法資性相近願學者不拘旗分選取漢人無論舉貢生童或世業子弟取同鄉京官印結具呈國子監㑹同管理算學大臣考試秉公録取案復設算學於欽天監附近之地係由大學士鄂爾泰議准又奏准算法中線面體三部各限一年通曉七政共限二年毎季小試嵗終大試由算學㑹同欽天監考試勤敏者奨勵怠惰者黜退别補又奏准算學生每月膏火照官學生例在本旗咨領又議准欽天監天文生向於本旗考取生監補用今應将五年期滿算學生學有成效者由該管大員㑹同欽天監秉公考取擬定名次咨吏部注冊俟各本旗天文生缺挨補至考取生監停其補用再天文生每旗滿洲二人漢軍一人並無䝉古今算學生既有䝉古六人為數無多應與滿洲算學生一同考送吏部按定名次歸各該旗補用漢算學生五年期滿一同考取舉人引見以博士用貢監生童以天文生補用四年奏准算學隸國子監管轄應稱國子監算學所有考校一應文移案卷即用監印鈐盖又奏准算學教習之飯食衣服由監行文支給十年奏准欽天監肄業生二十四人撥歸算學肄業毋庸别給膏火倘教習不敷即選學業有成之算學生協同分教已補者即食本俸未補者仍領學生膏火一應教習應試考取天文生均照算學生例十二年奏准算學額設教習二人協同分教三人嗣後教習未滿五年分教未經實授遇有陞任如實心訓課勤慎稱職之人均仍留教習令滿五年奏明交部議叙二十五年國子監将滿洲算學生咨送吏部考試庫使部咨算學係題明専用天文生之人不應選用别項不便准考隨經算學咨稱查乾隆四年五月内議准算學事宜欵内有八旗算學生應試照官學生例辦理之語既有應試二字則凡官學生應試之處自應遵照原議送考尋部復咨云既有八旗算學生應試照官學例辦理之條自應准其與考但查原題内稱算學生學有成效不應選用别項今送考庫使之算學生仍咨算學查明如係尚未成效之人既咨送國子監造冊送部以便一體考試附國子監所載則例一八旗算學生告假告病由算學咨明國子監轉咨該旗暫停膏火其銷假病愈者由算學将到學日期咨明仍給膏火一八旗算學生開缺另補由算學辦理咨明國子監轉咨該旗将開缺之算學生膏火停止其頂補之官學生将錢糧裁除外即支給算學生膏火一八旗算學生取中天文生由算學移知國子監轉咨該旗将膏火停止一八旗算學生告回本學由算學咨明國子監仍令在官學讀書一八旗候補之算學生情願隨學肄業由算學咨明國子監轉飭該生隨學肄業如有已經本監咨退之處亦聲覆查照隨學肄業各生仍食官學生錢糧乾隆十一年國子監因隨學人數過多知照算學酌定以十二人為準一算學教習衣服靴帽由算學移付國子監之繩愆㕔與八旗漢教習一體辦理以上算學附八旗義學謹案八旗義學已于乾隆二十三年裁汰今附志其源委於此以備稽考康熙三十年禮科給事中博爾濟疏請立盛京兩翼官學得㫖京師八旗各佐領下㓜童由各佐領内擇其優長之人令其教習讀書及馬歩箭著九卿一并議奏九卿等議覆京師八旗子弟讀漢書者考取生員舉人進士時仍令射馬步箭能者方准作文考試其餘㓜童十嵗以上者本佐領各選一人教習滿洲旗分教滿書滿語蒙古旗分教滿洲䝉古書語漢軍旗分教滿書滿語並教馬步箭仍令各佐領驍騎校稽查将此學名為義學詔從所議雍正元年十二月奉恩詔養育人材首以學校為要宗室内有俊秀情願讀書及八旗秀才童生内有家貧不能延師者宜各設立學堂一概教育四年四月禮部議八旗設立學堂分左右翼每翼各於公所設立學堂二所各設漢書教習二員滿漢書教習二員旗人内有家貧不能延師之秀才童生情願讀漢書者令入漢學堂教習情願讀滿漢書者令入滿漢書學堂學習其漢書教習於吏部咨取守部舉人於國子監咨取恩拔嵗副貢生其滿漢書教習於八旗咨取舉人恩拔嵗副貢生臣部奏請簡命大臣考選才學優長清漢精通者充職三年期滿咨送吏部舉人照留京進士教習之例以應補之缺即用貢生照國子監教習之例以應補之缺補用其學堂於兩翼現有官房奏撥四所由工部修理書桌椅櫈等項亦由工部置辦臣部派司官二員専管臣等亦不時稽查其學習生童有不肯専心誦讀不聽教誨者即行懲責不許復入學堂教習内有不肯盡心教導或行止不端者指名㕘革其教習照内教習之例毎月給錢糧二兩每年給米二十四斛看守學堂房屋及𫝊事人於禮部所有八旗𫝊事披甲内每旗派撥一名奉㫖依議其稽查與翰林院衙門㑹同嚴查不可推諉六年十一月副都統韓光基奏言兩旗共立一學八旗入學讀書之子弟毎旗不過數人且有竟無一人者盖因兩旗之人各自散處其逺者或值天寒或值雨水難行不能就學所以至於乏人請於八旗官房内量其足用揀擇四所共為八所毎旗各立一學増添教習四員共為八員毎學一員其入學讀書之人不必限定額數年二十以下十嵗以上情願讀書者俱令入學如有讀書不能成就者仍照常挑取兵丁或所居與别旗學舍相近情願就近讀書者聽其自便将此交禮部與八旗同行管轄其教習三年考滿及一應需用等項俱交禮部承管至揀選讀書子弟督查怠玩等事每旗𣲖㕘領一員輪流承管如禮部承管事件或致廢弛及教習等訓誨不勤有悞子弟令該旗大臣查㕘如本旗承管事件或致廢弛亦令禮部查㕘管理旗務王大臣議如所請奉㫖依議乾隆八年三月禮部奏從前考取八旗義學教習人員業經充補正擬照例奏請考試據滿洲文進士徳音繙譯進士雙圖等具呈情願一體考試查文進士繙譯進士向無考試八旗教習之例可否准其考試恭候欽定奉㫖准其考試十五年奉諭㫖嗣後各旗義學教習所教學生内考中一二名者仍留學三年考中三名者交部議叙二十三年二月奉上諭國家設立官學原欲成就人才而近来八旗義學徒有虚名而無實益況已有咸安宫國子監官學又兩翼新設幼官學此等學内八旗士子盡可肄業又何必留此無用官學反至於旗人有悞著将義學裁去所有咸安宫等處官學交該管大臣必以成人才收實效為急務将武藝騎射清語留心教誨即如讀漢書者亦必使之崇尚實學盡除虛浮惡習斷不可有虚名而無實益前經降㫖交部臣明白回奏該部將伊等平素懈弛之處飾辭具奏甚屬不曉事體除歸宣光在部未久免其交部外其餘大臣俱著交部察議以上八旗義學盛京八旗官學康熙三十年禮科給事中博爾濟疏言盛京府州縣俱設立學校考取士子盛京左右兩翼亦應各設官學酌選俊秀㓜童設立滿漢官教習滿漢書馬步箭即於盛京各部衙門筆帖式烏林人缺出補用得㫖著九卿議奏九卿等議覆盛京係發祥重地教育人材宜與京師一體應如博爾濟所請盛京左右兩翼各設官學二處将彼處俊秀幼童各旗選取十名每翼四十名滿學各二十名教讀滿書習馬步箭漢學各二十名教讀滿漢書習馬歩箭交與盛京禮部堂官不時稽查操演如盛京有各部衙門筆帖式烏林人缺出照例補用滿學設滿文助教各一員漢學設通滿漢文助教各一員俱由吏部考授其漢學令奉天府尹於盛京生員内擇其才學優長者各二名令其教讀學舎由盛京工部撥給詔從所議是年覆准盛京左右兩翼設立滿漢官學其漢學行文府尹於盛京生員中各取教習二名所取係廩生既充教習廩糧停其支給應照京城八旗教習之例給倉米十二石由盛京戸部支給其廩缺另行㧞補鄉試之年仍照例准其鄉試雍正二年覆准盛京八旗教習舊例於奉錦二府屬生員内考取今各學生員就考者少著将奉錦二府屬恩拔嵗副各貢生并生員一體與考秉公遴選學優者充職三年期滿咨送吏部仍照舊叙用十年盛京八旗設義學四處選取漢軍俊秀子弟每旗各十五名每學各三十名選學官教習滿漢書及馬步箭奉天将軍司其事乾隆二年定盛京照京師例宗室覺羅共設立一學内設繙譯教習四人騎射教習四人漢書教習四人其漢書教習於奉天府舉人貢生内由府尹考取盛京禮部序補三年期滿府尹等出具考語咨送宗人府與京師覺羅教習一體帶領引見以知縣教職分别補用二十八年議准盛京左右兩翼官學左翼四旗内滿洲官學生三十六名漢軍官學生四名包衣官學生三十名右翼四旗内滿洲官學生三十四名䝉古官學生二名漢軍官學生四名包衣官學生三十名左翼内並無蒙古之缺應将左翼滿洲官學生定為三十四名所裁二缺改為䝉古以昭畫一四十三年五月禮部奏言據宗人府稱盛京宗學覺羅學漢教習向来額設三人奉天府尹於所屬舉人貢生内考取由盛京禮部序補教習漢書三年期滿府尹等出具考語咨送宗人府與京師覺羅學漢教習一體帶領引見以知縣教職分别補用臣等伏思盛京宗室覺羅向来立有官學専為通曉漢文而設但宗室覺羅子弟自當熟嫻弓馬及學習繙譯為先務至欲兼習漢文則該處之舉貢生員等自為師承留心講貫即無難於通曉若必官為設學而考充教習者仍即係本地之人徒為該教習等進身之捷徑其於官學諸生並不能有所禆益請将盛京額設宗學覺羅學漢教習之例停止其現在已補教習及先經考取未補者均毋庸復令充補以黜虚名而崇實政奉㫖知道了四十九年八月奉上諭據穆精阿等奏閱盛京禮部考試助教繙譯卷七本求取通篇穏順者殊不可得僅擇其文理稍順疵謬尚少之卷擬取二本助教有教學之責自應選擇嫻習繙譯者送考以便㧞補何至咨到七卷内竟無通篇穏妥之卷此項試卷向例係将軍㑹同禮部兵部考試自不應漫無去取濫行咨送且此等應試之人平日豈竟無所講習遽應考試耶著傳諭永瑋等即将此次試卷因何平常之處據實覆奏以上盛京八旗官學黑龍江官學康熙三十四年題准黑龍江將軍所轄官兵内有新滿洲席北索倫達呼里等應於黙爾根地方兩翼各設學一處毎翼設教官一員将新滿洲席北索倫達呼里及上納貂皮達呼里等每佐領選取俊秀幼童各一名教習書義應補教官之人該将軍選擇優長者將姓名咨送吏部其教官照京師例稱為助教學舍該將軍撥給按黙爾根助教由黒龍江将軍揀選充補以上黑龍江官學欽定八旗通志卷九十八
