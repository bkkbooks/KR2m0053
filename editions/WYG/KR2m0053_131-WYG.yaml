body:
  text: 營建志六八旗駐防規制二各省駐防二順天順義縣駐防順治五年設防守尉衙署一所十九間防禦衙署二所共三十間筆帖式衙署一所六間領催甲兵五十名各營房二間俱在縣城東門内教塲在縣城南門外長八十丈寛一十九丈乾隆四年建驍騎校衙署一所八間教塲房三間檔房二間聽事房三間昌平州駐防防守尉衙署一所二十間防禦衙署二所一所十間一所十一間領催馬兵五十名各房二間乾隆七年建驍騎校衙署一所房六間三河縣駐防順治六年設官員公㕔三間防守尉衙署一所十二間防禦衙署二所各十間甲兵五十名各房二間康熈二十二年増筆帖式一員給衙署一所六間三十四年増驍騎校二員給衙署二所各六間甲兵五十名各房二間俱在縣城内乾隆五十三年將部放筆帖式裁汰改由本處甲兵内挑放所遺衙署作為官學良鄉縣駐防順治八年設城守尉衙署一所十五間防禦衙署二所各七間筆帖式衙署一所六間甲兵五十名各營房二間箭亭三間教塲一處週圍二百七丈俱在縣城東門内北街寳坻縣駐防康熈十二年設防守禦衙署一所十二間防禦衙署二所各十間驍騎校衙署一所六間甲兵五十名各營房二間俱在縣城東門外週圍一百七十七丈五尺固安縣駐防官員公㕔三間班房三間防守尉衙署一所二十一間防禦衙署二所各十間驍騎校衙署一所七間領催甲兵五十名共營房一百四十六間俱在縣城南門内教塲在公㕔之前采育里駐防順治二年設防守尉衙署一所十九間防禦衙署二所各十二間驍騎校六間甲兵五十名各營房二間分列防守尉衙署東西俱在采育大街中分六段週圍一千二百五十二丈八尺衙署後餘地為官兵教塲城堡四圍俱土墻東安縣駐防順治六年設防守尉衙署一所十三間防禦衙署二所各七間驍騎校七間甲兵五十名各營房二間俱在縣城内大街迤南路東週圍二百七十四丈三尺教塲在縣城東門外計地三十四畝六分二釐七毫覇州駐防康熙十二年設其官兵衙署營房係十一年改造防守尉衙署一所十二間防禦衙署二所各十間驍騎校六間甲兵五十名各營房二間教塲一處俱在州城東門内街北永平府駐防康熈三十四年設防守尉衙署一所十二間防禦衙署二所各十間甲兵八十名各營房二間俱在府城内東南下水關地方驍騎校衙署二所各六間甲兵二十名各營房二間俱在府城内東北上水闗地方乾隆五十五年六月因洪水冲塌下水闗官署兵房一百九十七間奏請移建於城西北二街高阜處城長一千六百二十六丈五尺計九里十三步山海闗駐防副都統衙署五十八間左右翼協領衙署各十八間八旗佐領衙署各十五間俱乾隆六年設三十七年副都統岱興阿奏准裁汰鑲黄正紅兩旗將鑲黄交右翼協領兼轄正紅交左翼協領兼轄空出佐領衙署二所五十年副都統寳琳奏准將左翼協領移住鑲黄佐領衙署右翼協領移住正紅佐領衙署其左右翼協領衙署各以前四間貯本旗四翼軍噐以後十間為鑲黄正紅二旗防禦衙署又八旗原設防禦八員驍騎校八員甲兵二百名因舊有官房多寡有無不均於四十九年給防禦六員各房八間鑲黄正紅二旗防禦已移住驍騎校各房六間兵丁各房二間筆帖式三員各房二間官學三座九間教塲在南門外房三間山海闗臨榆縣城垣外磚裡土長一千五百零八丈計八里三分羅文峪駐防康熙年間設防禦衙署二所一所八間一所六間筆帖式二員未給房甲兵四十名内十一名由本處甲兵子弟挑取未給房其餘各房二間俱係康熈雍正年設乾隆元年添驍騎校一員房六間六年裁防禦一員其房六間撥給筆帖式居住八年添驍騎校一員房六間添甲兵六十名各房二間五十二年裁筆帖式二員以其房作為學舍羅文峪有二小城上闗城長三百七十丈零八尺下闗城長三百零五尺玉田縣駐防康熈十二年設其官兵衙署營房係十一年盖造防守尉衙署一所十二間防禦衙署二所各十間甲兵五十名各營房二間二十二年増筆帖式一員給衙署一所六間三十四年増驍騎校二員給衙署二所各六間甲兵五十名各營房二間俱在縣城西門闗廂外路北保定府駐防順治六年設未給衙署時駐防各官俱在聖廟中辦事康熈二十八年直𨽻廵撫于成龍題准建設城守尉衙署一所防禦衙署四所驍騎校衙署四所筆帖式衙署二所甲兵各給住房俱在府城南門内廣盈倉一座在清苑縣西北教塲在南門外迤西週圍二百八十九丈乾隆元年建火藥庫房三間看庫堆子一間週圍舊係土墻十九年改建磚坯五十九年現存防守尉衙署四十一間防禦衙署内一所十二間三所各十間驍騎校衙署内二所各九間一所五間一所六間筆帖式衙署六間兵丁住房三百三十九間内學舍九間城垣圍長十二里零三百三十步頂寛二丈底寛四丈高三丈五六尺至四丈不等舊係土坯十八年改建磚工雄縣駐防康熈十二年設防守尉衙署一所十二間防禦衙署二所各十間驍騎校六間甲兵五十名各營房二間俱在縣城東門内週圍一百八十丈滄州駐防順治五年設城守尉衙署一所防禦衙署四所驍騎校衙署四所筆帖式衙署二所甲兵三百十一名弓匠鐵匠四名各給住房俱在州城内西北隅教塲在州城北門外週圍七十九丈五尺雍正十三年盖箭亭三間鳥鎗教塲一座在城外西北長六十五丈濶三十七丈五尺火藥庫三間在城内東南隅乾隆九年添駐兵二百名三十六年裁汰披甲十一名改為養育兵五十九年現存城守尉衙署四十五間防禦衙署内一所十間一所九間二所八間驍騎校衙署内一所五間三所六間其筆帖式衙署現存一所九間一所已於五十三年裁汰改為官學其四旗官學共二十八間甲兵工匠各房二間天津府駐防雍正四年四月兵部右侍郎莽鵠立等親往該處踏勘地形丈量應築營房地基自南至北二百二十五丈自東至西二百六十丈週圍約五里餘繪圖進呈隨經工部議准照該侍郎所進圖式建築城堡内盖兵丁營房四千間每一連十間隔作五段前後量留院落中分街巷設立水溝以洩積水建造橋梁以便人行建設堡門四座礮臺四座以備守望又先經兵部等衙門㑹議駐防副都統照寧夏例給衙署二十間後巴顔德奉㫖授為都統加建大㕔頭門鼓亭號房等二十間住房十八間共計衙署一所五十八間理事㕔衙署一所計二十二間教習衙署二所内一所十八間一所十五間協領衙署六所各十八間佐領衙署三十二所各十五間防禦衙署三十二所各八間分得撥什庫官房三十二所各六間筆帖式衙署三所各三間堆子房十五間倉二座共十間教習千總把總舵工水手等造給住房共一百一十八間雍正六年増設火攻營一座建火藥房二十四間在營墻外東北隅雍正八年於北門外建演武㕔三間張家口駐防康熈三十二年設四品總管一員防禦二員驍騎校八員筆帖式二員皆給有衙署甲兵一百六十名皆給有住房乾隆七年由京添駐甲兵一百四十名二十七年由右衞移來官兵將總管補為協領又添協領二員佐領十員防禦八員步軍尉二員驍騎校二員兵丁匠役七百二十名皆添有衙署兵房自三十四年以後又陸續裁佐領三員步軍尉二員其衙署或變價或作為弓房學舍軍器庫房等項五十九年現存協領衙署三所各十六間内一所即總管衙署佐領衙署七所各十五間防禦衙署十所内二所八間八所十二間驍騎校衙署十所内八所各六間二所各八間筆帖式衙署二所各六間兵丁匠役共一千零二十名各房二間弓房學房軍器庫房各五間教塲房八間坐落右翼滿營南喜峰口駐防順治二年設防禦衙署二所内一所九間一所十間筆帖式衙署二所各六間甲兵八名各營房二間十六年増甲兵八名各營房二間康熈二十三年増防禦二員給衙署二所内一所十間一所六間甲兵六十四名各營房一間雍正二年増甲兵二十名内二名由京城撥至各給營房二間其十八名係本處餘丁挑選未給房康熈三十一年設管理喜峰口驛傳道衙署一所十二間筆帖式衙署二所内一所六間一所七間俱在城内另有正闗公署一所六間在闗内倉厫一座五間康熈二十五年盖造在城内教塲在城西門外長九十丈濶十八丈雍正七年裁防禦二員添設防守尉一員將所裁防禦衙署二所一所為防守尉衙署一所為齊集辦公事公署乾隆元年添驍騎校二員八年補給衙署各六間是年又添驍騎校二員衙署亦各六間添甲兵一百名各房二間原設城垣圍長三里十六步高二丈六尺係遷安境内營房週圍八十丈去城三里古北口駐防順治三年設防禦衙署四所各八間筆帖式衙署二所各六間甲兵八十名各營房一間俱在小城潮河川雍正二年増甲兵二十名係本處餘兵挑選未給房又増協領一員裁防禦二員即以所裁衙署改為協領衙署計十六間康熈二十六年盖造倉房十五間三十一年古北口外坡賴村盖造倉房十五間教塲一處週圍二百四十八丈乾隆元年添驍騎校二員衙署各六間四年添驍騎校二員衙署各六間添披甲一百名每名房二間營房坐落闗内南山係七年設立獨石口駐防防守尉衙署一所十八間防禦衙署二所各十間筆帖式衙署二所各四間甲兵四十名各房一間雍正二年増甲兵六十名内四十九名未給房其十一名各給房二間俱在獨石闗口内乾隆三十一年重修衙署補給兵丁房屋築土墻一道北靠邉城東西南三面長一百三十三丈八尺大門一間門房二間墻北舊有磚砌邊城長一百四十九丈五尺墻南教塲設箭亭三間五十三年裁汰筆帖式以其房作為學舍千家店駐防康熈五十年設自獨石口移駐防禦一員給房八間兵丁四十名給房各二間雍正五年又裁獨石口防禦一員移駐千家店八年給衙署十六間乾隆元年添設驍騎校一員五年給衙署六間教塲在西千家店村南冷口駐防康熈九年設章京衙署一所十間筆帖式衙署一所六間甲兵十二名各營房三間二十三年増章京一員給衙署一所十間筆帖式一員給衙署一所六間甲兵十二名將初給甲兵營房各分一間令其居住雍正二年増甲兵二十六名内五名由京城撥至各給營房二間其二十一名未給房公署一所在闗門内營房四間在南門外其餘衙署營房俱在城内教塲在南門外千家店駐防康熈五十年設以營盤口外千家店花盆龍潭等處現有房地撥獨石口章京一員撥什庫四名甲兵三十六名駐防千家店等處章京衙署一所八間甲兵營房各二間雍正七年添設章京一員十年延慶州盖章京衙署一所十六間熱河駐防雍正元年設副都統衙署一所王公等隨圍住房七十一間乾隆三十五年被水冲塌復修如舊協領四員衙署共七十三間佐領十二員衙署共一百六十六間防禦十六員衙署共一百三十二間驍騎校十六員衙署共九十七間筆帖式二員衙署十一間兵丁一千七百六十名内一千六百名各房二間其餘未給各該旗公所七十四間係裁汰協領一員佐領四員衙署所改左司房十二間右司房十三間教塲房三間堆房二間箭亭三間堆房三間銀庫三間帳房庫二間檔庫三間礮房火藥房三間収擠筒房並兵丁值班房共五間官學六處共三十間以上房三千九百零九間俱坐落熱河又分駐喀喇河屯現存協領衙署一所十九間佐領衙署一所共三十三間防禦衙署四所共三十三間驍騎校衙署四所共二十二間兵丁四百四十名内四百名各房二間公所十四間係裁汰佐領一員所改箭亭三間堆房三間學房