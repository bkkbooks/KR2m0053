body:
  text: 欽定四庫全書欽定八旗通志卷一百五十八人物志三十八大臣傳二十四滿洲正曰旗三薩賚塔白庫禮圖伊理布蘇克哈爾赫禮羅碩都莽奕禄逹蘇納海鄂泰覺羅吉哈賚塔賚塔滿洲正白旗人姓那木都魯和碩額駙康果禮第四子也年十四授三等侍衛太宗文皇帝天聰九年因其叔父喀克都哩欲逃瓦爾喀事覺坐黜罷崇徳六年隨大軍圍明錦州擊松山杏山敵兵屢有斬獲明年冬隨貝勒阿巴㤗征明越燕京趨山東攻新城髙陽覇州夀光博興等城皆先登身中五創賜人戸牲畜銀幣授前鋒侍衛世祖章皇帝順治元年五月隨大軍討流賊李自成敗賊將唐通於一片石追擊自成至安肅望都十一月授䕶軍恭領隨豫親王多鐸由河南征陜西連敗自成賊衆于潼闗明年隨豫親王征江南攻克掦州取江寧追敗明福王朱由崧於蕪湖叙功予雲騎尉世職三年隨端重親王博洛征福建明唐王朱聿鍵遁汀州賚塔率兵破其城晉世職騎都尉五年明桂王朱由榔據湖南賚塔隨鄭親王濟爾哈朗往征六年四月師至衡州敗其總兵陶飬用於青草橋又敗胡一青萬五千衆於府南山進克祁陽由榔將周進唐於大忠橋拒敵擊敗之復斬其副將等於王公嶺一青旋與王進才各率馬歩數千人拒於河岸亦敗潰賚塔進擊其總督譚宏於道州又擊一青及焦璉等於全州皆聞風竄遁七年八年兩遇恩詔洊晉二等輕車都尉初喀克都哩獲罪康果禮之世管佐領亦坐革太宗諭以後有報効仍准給還至是賚塔請於部得㫖復之即予賚塔承管十一年由榔將李定國犯廣東賚塔隨都統珠瑪喇等往征屢敗其兵觧新㑹圍定國遁走追敗之興業及横州叙功晉爵三等男十三年擢䕶軍統領十六年海賊鄭成功犯江寧命安南將軍達素同賚塔率師往征至則賊已敗遁遂移師福建明年賚塔同都統索歡𠞰賊厦門官軍不習水戰失利聖祖仁皇帝康熈元年論罪罷任革世職及佐領二年署前鋒統領隨靖西将軍穆哩瑪征流賊李來亨等於茅麓山屢戰皆㨗賊平凱旋復授䕶軍統領兼佐領八年擢正白旗䝉古都統十三年逆藩耿精忠叛命賚塔為平南将軍統兵赴浙江𠞰禦精忠賊黨犯金華賚塔遣副都統瑪哈達雅塔哩拉哈等擊走之復義烏及諸暨二縣賚塔進駐衢州偽都督周列率賊二萬由常山來犯賚塔遣副都統瑚圖等邀擊於焦國擒斬過半偽總兵桑明旋以五萬衆犯衢州賚塔同總督李之芳遣兵迎擊復斬級萬餘十四年督兵擊敗偽将軍馬九玉等於黄潭口大鐡村王屋山坑埠南塘諸處偽副将李廷魁屯衢州城北元口山賚塔督兵乗夜攻圍破走之焚其木城九玉同賊将林福等退據大溪灘時康親王傑書為大将軍駐金華賚塔奉詔恭賛軍務以分駐衢州仍佩平南将軍印屢擊卻來犯賊衆十五年八月康親王進駐衢州賚塔循例歸将軍印以都統任叅賛先率兵馳擊大溪灘斷賊糧道復江山馬九玉潛遁九月賚塔同瑪哈達等率兵破仙霞闗偽恭将金應虎降進㧞浦城又同副都統吉勒塔布等敗賊於建陽克其城進復建寧府十月隨康親王抵延平精忠窮蹙迎降時漳泉興化俱為海賊鄭錦所據十六年正月賚塔同寧海将軍拉哈達𠞰賊興化連破二十六營陣斬偽總督趙得勝等復興化偽總兵郭維藩以仙逰降三月同拉哈達討叛鎮劉進忠於潮州進忠迎降康親王奏復授賚塔平南将軍印守潮州十七年四月鄭錦之偽總兵劉國軒䧟平和犯海澄上命賚塔移師赴援賊斷江東橋及長㤗同安諸小徑我師弗克進六月賊陷海澄漳平同安惠安犯泉州九月賚塔與總督姚啟聖合兵進討大敗賊於蜈蚣山破其七營斬四千餘級復長㤗十月復敗賊於漳州萬松闗十八年偽将軍吳淑何祐等犯長㤗賚塔同提督楊㨗等分道進擊斬二千餘級生擒偽總兵副将三人劉國軒復犯江東橋賚塔迎擊敗之賊走太平寨追斬千餘級十九年二月同姚啟聖楊㨗等𠞰賊海澄招降偽總兵蘇堪復其城聞水師提督萬正色已取海壇賚塔由松㠘進征偽将軍陳昌率衆迎降鄭錦遁臺灣厦門金門相繼定四月調本旗滿洲都統仍為平南将軍守潮州尋奉命移駐廣州㑹尚之信獲罪逮繫其藩下長史李天植等怨都統王國棟發難誘殺之藩兵咸畏罪思亂賚塔宻承詔㫖以罪不株連慰撫藩兵自率兵圍之信第收捕天植及同謀者繫獄候㫖餘釋勿問時逆孽吴世璠尚據雲南定逺大將軍貝子彰㤗自湖南進征貴州上以賚塔在福建廣東勞績素著授為平南大將軍赴廣西調遣滿漢兵由南寜直進雲南賚塔遂率兵由田州泗城進西隆州偽總兵周應龍迎降偽將軍何繼祖等擁賊數萬於石門坎築壘拒敵石門坎者距安籠所三十里地峻隘稱天險賚塔令都統勒貝希佛瑪竒䕶軍統領額赫訥等率師直前自與副都統宏世禄赫哷布總督金光祖分兵為二由間道躡其後二十年正旦度賊無備飭前軍進攻賊倉卒出禦後軍履險上前後夾擊大敗賊衆奪其隘口進復安籠所城降偽總兵陳義魁繼祖復糾偽將軍詹養王有功等率二萬人據黄草壩列象拒戰二月二日賚塔督兵奮擊自夘至未奪賊營二十二生擒詹養王有功及賊衆千餘獲其象馬上以賚塔自廣西深入雲南獨先諸路大敗逆賊温㫖嘉奬師抵曲靖降偽總兵尹士元偽道員劉世忠等隨遣兵取霑益州㫁賊中路偽將軍線緎等皆遁歸分遣希佛瑪竒等復馬龍州易龍所及楊林城營總碩塔等克嵩明州其他賊營聞風解散遂會合彰泰軍駐營歸化寺偽將軍胡國柄劉玘龍等離城拒戰賚塔與彰泰分兵進擊自夘至酉賊大潰斬國柄玘龍及偽總兵九生擒賊六百餘逆孽吴世璠嬰城守陰調賊將馬寳胡國柱夏國相等還救大軍并力環攻賊内亂欲擒世璠出獻世璠自殺線緎等開城降遂磔偽大學士方光琛等於軍前戮世璠屍傳首京師夏國相竄廣南賚塔與彰泰檄土官儂朋總兵李國樑率師追𠞰擒之西板橋又遣希佛等追𠞰胡國柱於雲龍州國柱縊其黨王叙李匡自焚餘衆悉降雲南平二十一年十月大軍凱旋上親率諸王大臣郊勞於蘆溝橋西二十里外御黄幄召彰泰賚塔行抱見禮還京仍任都統二十二年以隠匿尚之信藩下應入官婦女事覺應勘問上曰賚塔自福建廣東至雲南宣力勤勞樹立大功勿因微細事遂以非禮加之致失朕眷顧功臣之意下所司集質得實請革職治罪詔從寛削級罰俸明年十二月卒予祭葬如典禮加祭二次謚襄毅二十四年六月上諭王大臣等曰平定雲南賚塔之功最大縱有他過為人訐告朕究不加罪諸臣曰皇上俯念賚塔有功曲賜保全不特効力行間者皆歡忻鼓舞即臣等亦莫不感戴二十五年追叙其功予一等男爵子費葉楞襲雍正五年八月世宗憲皇帝諭曰原任都統賚塔當三逆變亂時統兵征𠞰克復雲南功績􅅷著朕恭閲聖祖仁皇帝實録備悉其詳因伊身有過犯功過相抵是以未封公爵止授一等男在當日之不優封賚塔者欲使立功之人咸知儆惕收歛不可恃功驕肆妄為今事厯多年後人已知鑒戒奉法着追封賚塔一等公令伊孫博爾屯承襲以示朕眷念舊臣之意八年始建賢良祠詔以賚塔與大學士圖海等並入祀九年加公號曰褒績庫禮庫禮滿洲正白旗人姓喜塔臘國初有昻果都理巴顔者來歸其四世祖也庫禮逮事太宗文皇帝崇徳初朝鮮臣服嵗以兵從我師征討庫禮嘗奉命統其軍五年睿親王多爾衮等征明圍錦州上遣户部恭政碩詹徴朝鮮水師五千及米萬觔赴大凌河濟師庫禮與副都統洪尼喀率三十人導其舟以行明年復隨鄭親王濟爾哈朗圍錦州克其郛斬八百餘級復同前鋒統領薩穆什喀攻松山北崖庫禮率朝鮮兵二百餘人奮勇先登克焉有科爾沁降明蒙古兵來犯礟傷庫禮手不為動卒與朝鮮兵併力破敵從攻松山敵襲我正紅鑲藍二旗汛地庫禮同左翼將領勒卜忒擊退其衆斬獲甚多上嘉其功賞所獲牲畜授騎都尉世職七年擢户部恭政世祖章皇帝順治元年改定官制庫禮仍任户部侍郎以聼從豫親王多鐸擅集視八旗女子論罪輸罰鍰二年叙克燕京功加一雲騎尉尋奉命往淮安總理漕儲四年九月鹽城土賊潜訌庫禮㑹漕運總督楊聲逺親往撫慰民心始定無何賊渠周文山等率其黨八百餘人夜襲淮安從夾城東門缺口突入逼庫禮衙署庫禮率中軍張大治旗皷王國印暨帳下數十人挺身迎擊發矢揮刃大呼殺賊其妻悉出署中所存箭使僕婢齎送助戰衆皆一以當百自丑至辰斬殪甚衆賊大驚奔潰復追斬百八十餘級盡收其偽印劄兵械等淮城獲全賊渠偽益王朱隆武者時襲據廟灣城紏醜徒數千船百餘乗間將窺淮庫禮與楊聲逺等議曰賊勢横非出竒設伏不足致其死命乃遣兵分布要害賊謂無備也方掦㠶直上至車家橋伏發歩騎四起水陸蹂躪賊被刃及溺死者過半獲偽印劄及舟楫器械無算餘遁歸廟灣庫禮復集衆議以都統張大猷巡撫陳之龍分統水陸官軍直趨廟灣羣逆望風竄匿于是次第𠞰撫劉荘埸等十巢旬日之内根株肅清鹽城廟灣民各復業事聞得㫖嘉奬以考滿晉三等輕車都尉未㡬回户部侍郎任七年乞休予致仕累遇恩詔晉世職一等輕車都尉又一雲騎尉尋卒賜祭塟如典禮諡僖恪子堯泰襲伊理布伊理布滿洲正白旗人姓他塔喇三等伯阿濟格尼堪長子也崇徳三年任兵部副理事官順治八年襲父爵兼管佐領兩遇恩詔晉一等伯十七年任刑部侍郎明年調吏部是時海賊鄭成功據臺灣四出刼掠有言瀕海居民宜移之内地者伊理布奉命同尚書蘇納海赴江南浙江福建㑹勘疆界定議還京擢正白旗䝉古都統康熈二年命赴廣東㑹同總督盧崇峻察勘海疆新移人户俾安輯得所七年調本旗滿洲都統旋列議政大臣十二年冬逆藩吳三桂反十三年上命順承郡王勒爾錦統師進討以伊理布叅賛軍務既至荆州三桂據常徳䧟松滋襄陽總兵楊來嘉副将洪福叛附三桂於榖城鄖陽間據山結寨窺伺郡邑詔伊理布守宜昌十四年來嘉等犯南漳順承郡王承制授伊理布討逆将軍印偕副都統根特往援賊遁旋犯均州營于武當山下伊理布麾兵連戰陣斬偽副将叅将及賊兵千餘賊潰走已而三桂于松滋北山屯聚賊數千沿江日増戰艦将合水陸來犯上命伊理布同都統范達禮防守襄陽均州南漳諸處賊将張以誠王㑹聫結來嘉等復冦南漳伊理布同總督蔡毓榮分率勁旅夾擊大破之斬三千餘級獲偽劄器械無算十六年奉詔率荆州防兵同征南将軍穆占由岳州進長沙恢復茶陵賊遁入攸縣伊理布率兵追𠞰賊據河岸拒戰我兵奮進斬四千餘級生擒百餘人克復攸縣城十七年四月穆占統兵復郴州永興桂陽興寜遂自駐郴州以伊理布守永興六月三桂遣賊将馬寳胡國柱等逼永興犯我河外營伊理布率兵禦擊歿于陣十八年䘮還上遣内大臣奠茶酒復遣侍衛傳諭其母曰伊理布時侍朕前深悉其人及出師著有勞績方謂成功之後即可凱旋相見忽聞陣殁不覺悽愴痛悼兹聞爾家費用不給特賜白金六百兩為治䘮資賜祭𦵏如典禮諡武壮立碑墓道子阿什坦襲爵世宗憲皇帝時以伊理布入祀昭忠祠蘇克薩哈蘇克薩哈滿洲正白旗人姓納喇額駙蘇納長子也初委署佐領崇徳六年隨鄭親王濟爾哈朗等圍錦州明人出歩騎接戰敗之太宗文皇帝聞明總督洪承疇以師十三萬赴援親帥大軍環松山列營敵兵遁走蘇克薩哈同䕶軍統領漢岱追敗其衆於塔山翼日復追擊明兵於海岸隨豫親王多鐸等設伏襲擊與漢岱追斬杏山兵之潛遁者順治二年叙功授騎都尉世職尋晉三等輕車都尉七年世祖章皇帝念蘇克薩哈父蘇納在太祖太宗時屢著功績繼因隠匿丁壯削世職三等輕車都尉至是特㫖復蘇納世職以蘇克薩哈併襲為三等男八年任議政大臣九年兩遇覃恩晉爵一等男加一雲騎尉初蘇克薩哈𨽻睿親王多爾衮属下既而睿親王薨於獵所蘇克薩哈與王府䕶衛詹岱等舉首其殯殮服色違例及謀遷永平諸逆状命諸王大臣質訊皆實遂論睿親王如謀逆律是嵗擢鑲白旗䕶軍統領十年孫可望聚衆犯湖廣蘇克薩哈奉勅同都統辰㤗等率禁旅出鎮湖南與經畧洪承疇㑹啇進𠞰十二年明桂王将劉文秀盧明臣馮䨇禮等分兵犯岳州武昌蘇克薩哈伏兵邀擊大敗之明臣等復縱艦拒戰又擊敗之文秀引兵趨常徳戰艦千餘蔽江而下蘇克薩哈指揮軍士奮勇截擊明臣等悉衆抗禦我軍協力撲𠞰六戰皆㨗縱火焚其船斬獲無算明臣赴水死䨇禮被創遁降其副将等四十餘人文秀走貴州明年叙功晉爵二等子任領侍衛内大臣加太子太保十八年正月與索尼及遏必隆鰲拜等受顧命為輔政大臣奉聖祖仁皇帝嗣統是時索尼為四朝舊臣遏必隆鰲拜皆以公爵先蘇克薩哈為内大臣鰲拜尤功多意氣凌轢人多惮之蘇克薩哈以額駙子入侍禁廷承恩眷奉遺詔輔政名亞索尼與鰲拜稱婣婭而論事多與鰲拜􅘅積以成讐索尼亦惡蘇克薩哈㑹鰲拜欲令鑲黄旗與正白旗互易屯荘索尼賛成之遏必隆弗能止遂行圈換之令旗民皆弗便康熈五年大學士兼管戸部尚書蘇納海坐撥地遲悞總督朱昌祚等坐紛更阻撓罪皆論死上覽部議召詢輔臣咸曰宜如議獨蘇克薩哈不對上因不允所請鰲拜卒矯詔並予棄市未㡬索尼死鰲拜益驕恣蘇克薩哈慮其逼已也居常怏怏六年上親政諭部議加恩輔臣以示酬庸之典越日蘇克薩哈奏言臣才庸識淺䝉先皇帝眷遇拔授内大臣早夜悚懼恐負大恩當先皇帝上賔之時惟願身殉以盡愚悃不意恭承遺詔臣名列於輔臣之中分不獲死以蒙昩餘生勉竭心力冀圖報稱不幸一二年來身嬰重疾不能始終効力於皇上之前此臣不可逭之罪也兹遇皇上躬親大政伏祈睿鑒令臣往守先帝陵寢如綫餘息得以生全則臣仰報皇上豢育之㣲忱亦可以稍盡矣疏上有㫖諭議政王貝勒大臣曰蘇克薩哈奏請守陵如綫餘息得以生全不識有何逼廹之處在此何以不得生守陵何以得生其㑹議具奏王貝勒等以大臣怨望奏請逮治鰲拜與其黨大學士班布爾善等謂蘇克薩哈不欲歸政文致之搆罪二十四欵坐奸詐欺飾存蓄異心論如大逆應與其長子内大臣查克旦皆磔死餘子侍衛穗黒塞黒里郎中那賽塞克精額達器徳器孫侉克札兄弟之子圖爾㤗海蘭皆斬决藉没族人前鋒統領白爾赫圖侍衛額邇徳烏爾巴亦皆斬决獄具入奏上知鰲拜素與蘇克薩哈有隙是以搆成罪欵必欲置之重典諭以核擬未當不許所請鰲拜攘臂上前强奏累日卒坐蘇克薩哈處絞餘悉如議八年五月鰲拜既敗特諭吏兵二部曰蘇克薩哈雖有罪不至誅滅子孫此皆鰲拜挾讐滅其後嗣深為可憫白爾赫圖等無罪誅戮殊為寃枉其蘇克薩哈及白爾赫圖等官俱應給還七月復蘇克薩哈原官及世爵二等子命其㓜子蘇常夀承襲白爾赫圖白爾赫圖滿洲正白旗人姓納喇初由前鋒校授兵部副理事官崇徳五年隨睿親王多爾衮圍明錦州敵出城犯我左翼白爾赫圖同前鋒叅領鄂碩戰卻之復擊敗杏山敵騎六年同前鋒統領武拜恭領瑚宻色等屢擊敗明總督洪承疇兵於松山杏山間七年春自錦州分兵畧寧逺獲牲畜八年任前鋒叅領順治元年大兵入山海闗討流賊李自成白爾赫圖擊敗偽總兵唐通於一片石既定燕京追賊安肅及望都並多斬獲復隨豫親王多鐸西𠞰自成連破賊營攻克潼闗二年移師江南狥蘓州擊走明廵撫楊文驄獲其船二十餘進征杭州擊敗明大學士馬士英之衆分兵狥湖州同前鋒侍衛安㤗圖色等以雲梯克其城三年隨端重親王博洛征金華敗賊衆於八歩嶺進定福建五年隨鄭親王濟爾哈朗征湖南時明桂王朱由榔将王進才馬進忠袁宗第等分踞寳慶武岡六年白爾赫圖率本旗前鋒破之湘潭進征寳慶同副都統拜音岱等克其東門城外有九營合兵來犯白爾赫圖擊之潰溺水死者無算尋自武岡征沅州屢敗進才進忠宗第等進定全州七年凱旋得優賚八年隨都統阿喇善征山東土賊至沂州攻圍蒼山賊寨斬賊首劉遜張齊又搜𠞰附近山寨斬賊首趙三元楊大成應科等九年改䕶軍恭領先是叙山海闗暨浙江福建軍功予世職騎都尉兼一雲騎尉及三遇恩詔洊晉一等輕車都尉十三年擢前鋒統領十五年隨信郡王多尼征貴州時由榔據雲南以其将李定國白文選劉正國竇名望等扼據貴州要隘大兵至安荘衛劉正國以衆迎戰白爾赫圖同䕶軍統領布葉錫禮擊敗其衆斬正國於響水橋導大兵渡盤江進克雲南城十六年白爾赫圖領所部進攻玉龍闗白文選引遁追擊敗之獲其鞏昌王金印象三馬百有四十擒總兵吕三貴大兵取永昌府渡潞江李定國設伏磨盤山我前鋒既深入伏起白爾赫圖下馬據石立連發三矢斃賊三人賊駭潰我軍繼進合擊殱之竇名望據木柵拒守白爾赫圖率衆破柵斬名望遂取騰越州由榔定國文選皆遁追逐踰南甸而還信郡王班師白爾赫圖同都統卓羅留駐雲南定國既竄出邉屯孟艮復圖入犯約降将髙應鳯為内應以由榔印劄誘元江土司那嵩倡叛白爾赫圖同卓羅率兵往𠞰敗賊於磨隴口進圍元江城掘壕困之越月城乃㧞那嵩自焚死擒應鳯斬於軍十七年以在滇乆著勞績頒賜衣服白金鞍馬十八年九月隨定西将軍愛星阿𠞰由榔於緬甸十一月㑹師木邦聞白文選屯錫箔江邊白爾赫圖同都統果爾欽遜塔等簡精鋭先發至則文選已毁橋遁乃結筏以濟大軍次舊挽坡愛星阿令白爾赫圖率前鋒百人往蘭鳩江濵取緬人所獻由榔及其親屬至軍中大軍凱旋康熈元年四月白爾赫圖奉詔同都統卓羅率前鋒軍先還京叙功晉爵一等男六年輔政大臣蘇克薩哈為鰲拜搆陷株連族人白爾赫圖蘇克薩哈族弟也削官爵坐斬八年上親政以白爾赫圖無罪枉坐追復原官及一等男爵以其子白爾肯襲爵十年其子一等侍衛羅鐸恭領塞赫等訴陳白爾赫圖征雲南功多為鰲拜屈抑未予優叙得㫖下部議晉爵三等子並賜葬祭如典禮諡曰忠勇羅碩羅碩滿洲正白旗人先世居棟鄂以地為姓祖魯克素國初來歸管佐領羅碩初任刑部理事官順治元年從睿親王多爾衮入山海闗破流賊李自成追至望都縣二年叙功予雲騎尉世職六年四月以叅領同副都統卦喇領兵駐防太原時姜瓖叛黨攻陷汾洲諭固守太原勿輕進𠞰汾州廼於城南八十里立營徐溝清源二縣境扼賊使毋薄城賊攻破清源城羅碩與卦喇分路擊之賊棄城遁陣斬五千餘人五月賊擁衆犯太原據晉祠堡立柵羅碩隨端重親王博洛衝破賊營斬首萬餘級八月賊首雷和尚張五等糾衆萬餘圍絳州復大破之斬級二千餘又破賊首胡邦秀石滋龍湯平等於浮山縣南之老君廟斬首千級得㫖奨叙八年三月擢任工部侍郎八月轉吏部九月復調工部以三遇恩詔加至二等輕車都尉九年隨敬謹親王尼堪征湖南失利十二年議罪革一騎都尉觧侍郎任罰鍰尋授大理寺卿十七年追尊端敬皇后禮成以皇后伯父晉世職一等輕車都尉康熈四年卒第三子舒敏第三孫伍㤗分襲羅碩長孫鄂爾多康熈十二年由侍衛擢刑部右侍郎十四年轉左十八年吏部考察以不謹革職命從寛䧏二級隨旗上朝尋以恭領隨征湖廣四川二十三年復任刑部侍郎是年調户部二十五年授内務府總管二十六年擢兵部尚書明年調户部二十八年五月轉吏部尚書三十年七月暢春苑奏事出得痰疾遣御醫調治賜御用衣服人葠並派侍衛䕶送至家踰時卒賜祭葬如例謚敏恪莽奕禄莽奕禄滿洲正白旗人初𨽻鑲白旗姓富察世居葉赫曽祖阿布岱國初來歸授騎都尉莽奕禄於順治元年六月襲職七年九月屢遇恩詔洊晉二等輕車都尉十一年以署恭領隨靖南将軍珠瑪喇征廣東明桂王朱由榔将李定國糾歩騎四萬據新㑹縣之山峪列礟象拒戰我軍奮擊之潰奔别将以四千衆自山頂馳突我兵又敗之奪山隘定國遁師還叙功晉世職一等康熈元年授䕶軍叅領十三年逆藩吳三桂叛莽奕禄署䕶軍統領隨征湖廣十五年三月由石首縣進軍太平街賊八千餘拒戰莽奕禄同䕶軍統領伊勒都齊夾擊敗之斬百餘級賊遁回營復隨貝勒察尼分兵夾擊陣斬三百餘十七年五月擢鑲白旗䝉古副都統十九年十一月隨征南将軍穆占進貴州恢復靖逺清平及平越府時逆孽吳世璠據貴陽偽将軍韓天福據新添衛莽奕禄與前鋒統領薩克察巴圖魯等領驍騎擊敗之殪賊千餘追奔三十餘里乗勝復龍里縣進薄貴陽吳世璠遁遂克之并復威清敷勇平壩鎮西等衛及定畨州城二十年正月進軍平逺州賊偽将軍髙起隆夏國相王永清楊應選張足法儂朋王㑹等擁衆二萬據城西南山拒戰莽奕禄與副都統花色等統前鋒䕶軍奮擊敗之殺賊四百餘遂攻城自午至酉再敗賊斬級千餘于是王㑹降髙起隆等遁招撫偽官三百四十四兵三千七十復平逺三月同遊擊王成功領兵四千追𠞰逸賊張足法等賊倚山拒戰我軍連奪三山賊敗走邀奪髙家橋陣斬千餘人墜厓死者無算旋收復黔西大定諸城擒偽廵撫張維堅等斬之均得㫖議叙遂入雲南㑹大将軍賚塔軍於曲靖擊敗賊圍省城八月調滿洲副都統並命恭賛軍務十一月吳世璠自殺雲南平還京共得功牌五叙不及職二十二年四月遷䕶軍統領管佐領二十三年九月遷䝉古鑲白旗都統二十四年十月調滿洲都統三十年十月授荆州将軍三十九年十一月調荆州滿洲兵二千𠞰打箭爐蠻上以莽奕禄年老命留鎮荆州以副都統珠滿阿際禮領兵往四十二年二月以老乞休允之六月上幸塞外莽奕禄赴行在請安賜御書引年老将額御衣一襲東珠頂㡌孔雀翎入内大臣班八月卒年七十諭曰莽奕禄才品優長簡任将軍實心効力勤勞最久兹聞溘逝深為軫惻下部議䘏賜祭葬如例諡敏肅子色爾敏例襲騎都尉兼一雲騎尉六十一年十一月世宗憲皇帝御極恩詔下部察奏舊日出征八旗官兵因少一功牌未叙職者特追授莽奕禄雲騎尉世職並擢入正白旗蘇納海蘇納海滿洲正白旗人姓他塔喇岱圖庫哈里之曽孫也初為睿親王多爾衮䕶衛世祖章皇帝順治三年正月授宏文院學士命隨肅親王豪格討流賊張獻忠十一月獻忠滅王令蘇納海先還奏㨗六年隨英親王阿濟格討大同叛鎮姜瓖偽總兵楊振威等斬瓖首以獻王亦令蘇納海馳奏上即命往軍中宣恩諭仍隨英親王還京七年以繙譯三國志告成賚鞍馬銀幣兩遇恩詔授世職騎都尉兼一雲騎尉尋以甄别各官濫邀世職削雲騎尉九年正月詔重修太宗文皇帝實録充副總裁官十一月盛京總管葉克舒奏獲朝鮮國越界採葠之人命蘇納海同副都統瑚沙携其人往朝鮮勅國王李淏㑹鞫明年三月還京以淏陪臣至齎表謝罪附貢方物是年擢吏部侍郎十一年同尚書巴哈納侍郎額爾徳等分賑畿輔十二年兼任鑲紅旗滿洲副都統十三年户部援恩詔赦免員外郎朱世徳虧缺河西務額税世徳官如故吏部亦弗置議得㫖詰問乃以世徳應禠職逮訊覆奏部臣坐瞻徇降革有差蘇納海罷任革世職逾月上以蘇納海舊在内院練習院務起授國史院學士尋充經筵講官遷禮部侍郎十六年加太子少保十七年擢工部尚書旋調兵部是時海賊鄭成功據臺灣四出刼掠有言瀕海居民宜移之内地者蘇納海同侍郎伊里布奉命赴江南浙江福建㑹勘定議聖祖仁皇帝即位擢國史院大學士康熈二年兼管戸部尚書事五年輔政大臣鰲拜與蘇克薩哈有隙鰲拜因已𨽻鑲黄旗蘇克薩哈𨽻正白旗欲以正白旗屯荘改撥鑲黄旗而别圈民地給正白旗使旗人訴情以牒户部蘇納海持不可謂旗人安業已久民地曽奉諭不許再圈宜罷議鰲拜銜之矯㫖遣貝子温齊等履勘旋以鑲黄旗地不堪耕種疏聞遂遣蘇納海㑹同直𨽻總督朱昌祚廵撫王登聮經理其事昌祚登聮交章言兩旗人較量肥瘠相持不决而旗地待換民地待圈所在荒廢不耕農人環訴失業請停止圈換之令蘇納海亦以屯地難於丈量候明詔進止鰲拜遂擅坐蘇納海藐視上命遲悞撥地械付刑部議罪部議律無王條應鞭百籍没家産上覽疏知鰲拜以蘇納海始終不阿欲置之死召四輔臣詢問鰲拜極言情罪重大索尼遏必隆附和之獨蘇克薩哈不對上仍以部議不按律文弗允鰲拜出矯㫖即予處絞八年上親政以鰲拜罪惡衆著命逮治於是議政王大臣等列状入奏因及誣陷蘇納海事鰲拜既伏罪上諭部臣曰朕閲處分蘇納海原案由鰲拜等以撥地遲延遽行逮問多端文致誣陷不按律文任意處死寃枉可憫宜予恩卹於是賜祭葬如例諡曰襄愍尋以其子瓦爾達為三等侍衛鄂㤗鄂㤗滿洲正白旗人姓􅆶勒佳世居蘇完地方國初來歸順治四年以兵丁從征百户所首登城克之叙功授雲騎尉尋晉騎都尉七年復以從克江西九江府登城有功晉二等輕車都尉賜巴圖魯號九年授盛京禮部理事官縁事革職嗣授恭領康熈十年授盛京副都統十三年十二月陜西提督王輔臣叛定西大将軍貝勒洞鄂奉命討之詔鄂㤗率盛京兵一千來京備調十四年二月諭曰陜西沿邊有路通山西汾州恐逆賊乗隙來犯其授鄂㤗為建威将軍統領自盛京調來兵一千往駐太原防守汾州諸處四月命由太原赴西安叅贊軍務其建威将軍印以副都統烏丹代時輔臣陰通川賊八月鄂㤗偕署副都統阿爾瑚駐寳雞縣扼棧道十月川賊李冉二姓出棧道犯九龍山鄂㤗與阿爾瑚督擊盡殪之㑹偽總兵任徳望等率賊衆及猓猓七千餘來援至益門鎮屯營七鄂㤗等分兵九路衝擊自已至未盡破賊營陣斬賊将徐姓徳望以百騎遁驍騎校韓楚漢射中其股降之斬獲甚衆十五年三月復搜捕餘賊於紅崖堡詔奬其功下部議叙十八年鄂㤗卒二十五年追叙軍功授騎都尉兼一雲騎尉世職以其子鄂山襲覺羅吉哈禮覺羅吉哈禮滿洲正白旗人武功郡王禮敦第二世孫也世祖章皇帝順治四年七月録武功郡王後嗣授吉哈禮佐領尋襲其父阿賚騎都尉世職遇恩詔晉至二等輕車都尉兼任䕶軍恭領聖祖仁皇帝康熈八年六月擢鑲黄旗滿洲副都統十二年十二月逆藩吳三桂反奸民楊起隆乗機作亂詐稱朱三太子廣徳元年中興官兵以白布裹頭紅布披身為號約於京城内外放火舉事潛聚皷樓西街已故降将周全斌家全斌之子公直首於正黄旗漢軍都統祖永烈永烈與正黄旗滿洲都統圖海偕吉哈禮及佐領鄂克遜等率兵圍之生擒其偽齊肩親王焦三偽䕶駕指揮朱尚賢偽閣老張大偽軍師李柱偽總督陳繼志偽提督史國賔偽黄門官王鎮邦等送法司鞫實磔於市互詳圖海鄂克遜傳十九年九月命同副都統席布率毎旗前鋒三十毎佐領下䕶軍一漢軍二驍騎三内府佐領下兵六百赴四川㑹同鎮安将軍噶爾漢𠞰賊十一月即軍前擢鑲黄旗䝉古都統時逆孽吳世璠據滇黔其賊将胡國柱夏國相馬寳等分犯瀘州叙州及建昌二十年三月上以宣威将軍鄂克濟哈久駐成都致建昌陷賊令觧任以吉哈禮代為宣威将軍統其所部兵馳㑹勇畧將軍雲貴總督趙良棟𠞰賊建昌五月吉哈禮疏言將軍趙良棟統緑旗官兵自雅州前進臣盡率所部兵繼其後因現在糧少騎兵止齎二十日糧歩兵止齎十五日糧請諭趣運送接濟從之六月吉哈禮同趙良棟率兵擊賊大渡河奪賊船濟師胡國柱等聞貴州廣西大軍已並進雲南合圍省城引賊衆歸援吉哈禮收復建昌奉詔進征雲南互詳趙良棟傳九月吉哈禮行至武定府疾卒於軍年五十有六賜祭葬如例子吉斯哈襲二等輕車都尉達都達都滿洲正白旗人先世居那木都魯以地為姓世祖章皇帝順治四年由筆帖式授吏部副理事官八年恩詔予騎都尉職十二年四月疏言皇上大開言路在京七品以上官員咸得進奏則兵民何以綏輯糧賦何以充足邊疆盗賊何以捕滅各抒所見可也乃御史張嘉以添設滿洲闗差致多擾累為言又不指明何地闗口何人害民何民被勒多取徒以向無而添設既撤而復行謂不足取信天下其意不過以闗有滿官則官民貨船不狥情靣一體徴税故獨忌滿洲偏私顯著今天下雖定邊患未寧總督廵撫布政使責任甚重必當仍用舊人俟太平日久不分新舊一體任用謹陳管見以聞下部議闗税滿漢兼差督撫九卿科道㑹推布政使新舊一體論俸陞轉應俱如定例行妄奏之張嘉降一級調用六月擢吏部郎中十三年四月因河西務鈔闗員外郎朱世徳虧課一萬三千餘兩照户部議援恩赦免罪吏部諸臣並坐瞻狥達都革騎都尉降本部員外郎十八年遷刑部郎中聖祖仁皇帝康熈二年隨都統穆里瑪出征湖廣署恭領𠞰滅流賊餘黨李來亨等于茅麓山明年師還議初領隊時失利退還不殿後禦賊致損隊伍及登山堕厓自傷右脇詭稱為滚石所中應革職籍没鞭責得㫖寛免籍沒披甲軍前効力六年復用為刑部郎中八年二月遷光禄寺卿十一月授秘書院學士十二月充世祖章皇帝實録副總裁九年十月改保和殿學士兼禮部侍郎十年二月充經筵講官十一年七月實録告成加一級食一品俸十一月擢户部右侍郎十三年六月大軍𠞰逆藩耿精忠達都奉命往浙江督餉文官布政使武官副將以下俱聼節制鑄給總理大兵糧餉兼管地方兵馬一切事務印八月疏言浙省舊設杭嚴廵道嘉湖守道金衢守道各轄二府康熈六年裁併杭嘉湖為一道金衢嚴為一道在平時可節冗費今大兵雲集軍務繁劇一道管理三府未能兼顧請如舊各管二府仍分設杭嚴道以便料理錢糧軍需疏下部議如所請行十月疏言原任建寧府通判何源濬前以朝覲回閩于今年三月過浦城縣一百二十餘里聞耿精忠叛亂賊兵已陷建寧從役勸其姑往投順收集家口誓死不從妻子親丁盡抛棄賊寨徒歩七日行一千二百餘里至杭州請兵其忠貞可嘉曽經廵撫田逢吉疏聞部議暫留浙省俟福建恢復仍赴原任現已羈棲半載無任可赴無俸可支似堪憐憫請與叙用得㫖何源濬聞耿逆變亂抛妻子徒歩請兵深為可憫下部優叙以浙省知府擢用十一月田逢吉因疾觧任詔授達都浙江廵撫達都疏言廵撫事繁責重浙省當用兵之際民心摇動臣才識未裕精神已衰自揣難勝厥任現署廵撫之布政使陳秉直年壯才優素為民心悦服乞敕部補授下部議不准特㫖允陳秉直陞補廵撫達都仍以原銜理餉十四年二月疏言大軍分𠞰叛賊處州温州指日恢復催辦糧料綏輯流民惟道府是頼請于在浙軍前勤勞素著之官酌量選補以留浙効用僉事姚啟聖補温處道通判王國㤗補温州知府運判線一信補處州知府又疏請以辦運軍糈勤勞最著之經厯許嗣華縣丞鄭廷俊等分補㕔縣正佐官二十餘員俱下部議從之九月疏言衢州等處大兵雲集浙省本年鹽課先經奏准按季徴觧難供急需温州陷賊金衢台嚴處五府地丁銀兩催科莫應杭嘉湖寜紹五府即照額全完僅供駐防滿漢官兵俸餉今大兵毎月約用銀二十萬餘兩請就近撥給以濟軍需下部議撥長蘆鹽課十萬兩山東地丁十萬兩赴浙應用十五年八月康親王傑書統師自金華移駐衢州達都前往經理糧餉十一月疏言大兵俱已進閩需餉甚多陸續觧銀二十萬兩又將現存司庫銀五萬兩委官隨臣觧赴閩省計滿漢緑旗官兵毎月需餉數十萬兩閩地殘破無從措辦請于就近省分地丁鹽課等銀添撥五六十萬兩竟觧閩省接濟大兵供應疏下部議撥江南庫銀四十萬赴閩十六年七月大軍由閩入粤達都與副都統沃申等駐潮州十七年五月海賊鄭錦犯海澄將軍賚塔由潮州帥師赴援海賊楊金目等聫䑸由鰲頭突犯團山達都與總兵馬三竒遣兵撲𠞰斬賊五百餘生擒長髮賊五名礟沉賊船追至寮口賊由急水東岸遁十八年八月召補户部右侍郎十二月至京召詢海賊情形奏言臣來時厦門金門賊勢大挫賊船較前甚少聞海中糧米無從凑集賊不能久不日可定上曰今海禁甚嚴賊糧從何而來達都奏賊所恃屯糧之處俱為大兵所有惟向廣東髙州海島稍稍竊運而已上曰當賊匱糧之際大兵速取海澄要害之處則賊失所慿依全閩可定夫師行既繁民力重困若能一舉滅賊地方速平大兵無野處之苦民困自此甦矣十九年七月轉左侍郎十一月命往盛京㑹議鹽務還奏盛京新舊官兵及百姓呈訴未設鹽商之前食鹽毎觔不過三四文自設商納課以來毎觔至十餘文又鹽舖俱設于府州縣城貧民自屯庄往買有誤農業且路逺多費因傳問鹽商等又據稱鹽課已勉强認納價值斷難减少臣等伏思八旗新舊官兵皆賴田禾為生地方百姓係安挿招徠流徙之人盡属窮苦且吉林寜古塔居住之人並新滿洲及邊外䝉古等俱逺來買食自康熈十八年招募商人准行鹽引一萬三千七百七十四道徴課銀六千五百二十三兩十九年加増鹽引三千一百道徵課銀一千四百六十八兩在官徵課無幾食鹽之昻貴倍増應停止鹽商辦課仍照舊聼有鍋之人煎鹽依從前賤價售賣不許豪强覇佔責令奉天將軍户部侍郎察禁下九卿等議從之三月調吏部左侍郎二十一年二月遷左都御史七月卒賜祭葬如例欽定八旗通志卷一百五十八
