  text: 人物志一百四十八列女傳二十八八旗漢軍列女傳六鑲黄旗漢軍領催舒九功之繼妻張氏鑲黄旗漢軍敖勒布管世貴之妻李氏鑲黄旗漢軍馬甲金枝之妻周氏鑲黄旗漢軍馬甲賈邦彩之妻宋氏鑲黄旗漢軍養育兵于耀之妻梁氏鑲黄旗漢軍閒散阿爾素蘭之妻噶濟塔氏鑲黄旗漢軍閒散留昌保之妻曹氏鑲黄旗漢軍閒散伍什之妻王氏正黄旗漢軍馬甲蒲清之妻徐氏正黄旗漢軍養育兵喻常傑之妻盖氏正白旗漢軍湖廣總督徐治都之繼妻許氏正白旗漢軍馬甲趙増之妻楊氏正白旗漢軍閒散髙遷之妻徐氏正白旗漢軍閒散徐章之妻朱氏正紅旗漢軍馬甲沙兆景之妻汪氏鑲白旗漢軍監生王為琳之妻劉氏鑲白旗漢軍壯丁王瑚之妻王氏鑲白旗漢軍閒散楊如穂之妻孫氏鑲白旗漢軍閒散張天成之妻黄氏鑲紅旗漢軍馬甲徐天樹之妻郭氏鑲紅旗漢軍閒散劉若水之妻張氏鑲紅旗漢軍閒散劉寛元之妻張氏正藍旗漢軍馬甲徐瓚之妻劉氏鑲藍旗漢軍䕶軍羅布蔵之妻黄氏鑲藍旗漢軍䕶軍台寧之妻喻布爾氏鑲藍旗漢軍馬甲陳仲之妻馬氏鑲藍旗漢軍養育兵綽爾們之妻朱氏以上俱於乾隆四十一年旌表鑲黄旗漢軍馬甲王建勲之妻姚氏鑲黄旗漢軍養育兵楊應龍之妻吕氏鑲黄旗漢軍馬甲髙大淇之妻常氏鑲黄旗漢軍馬甲劉徳生之妻陳氏鑲黄旗漢軍炮手陳國名之繼妻耿氏鑲黄旗漢軍佐領傅廷烱之妻曹氏鑲黄旗漢軍閒散三達子之妻李氏鑲黄旗漢軍馬甲白正宗之妻王氏鑲黄旗漢軍馬甲蔣源濂之妻郭氏鑲黄旗漢軍敖勒布陳士榮之妻李氏鑲黄旗漢軍馬甲武其燿之妻保氏鑲黄旗漢軍閒散聶先榮之妻何氏正黄旗漢軍閒散胡顯文之妻萬氏正黄旗漢軍馬甲宋瑛之妻韓氏正白旗漢軍馬甲夏文簡之妻張氏正白旗漢軍閒散姚住之妻伊爾根覺羅氏正紅旗漢軍馬甲宋朝宣之妻于氏正紅旗漢軍閒散張進之妻關氏正紅旗漢軍馬甲線露之妻李氏鑲白旗漢軍馬甲劉玉林之妻徐氏鑲白旗漢軍馬甲孫彰之妻李氏鑲紅旗漢軍馬甲南金相之妻楊氏鑲紅旗漢軍馬甲吳霽之妻馮氏鑲紅旗漢軍閒散孫芳之妻賈氏鑲紅旗漢軍壯丁張斌之妻郭氏鑲紅旗漢軍閒散金有章之妻白氏鑲紅旗漢軍閒散王國柱之妻范氏鑲紅旗漢軍壯丁張士竒之妻侯氏正藍旗漢軍馬甲烏爾泰之妻他塔喇氏以上俱於乾隆四十二年旌表鑲黄旗漢軍馬甲秦松栢之妻王氏鑲黄旗漢軍馬甲王建勲之妻姚氏正黄旗漢軍閒散馮燕之妻徐氏正黄旗漢軍台丁李金之妻楊氏正黄旗漢軍馬甲李承漢之妻李氏正黄旗漢軍壯丁李如芝之妻閔氏正黄旗漢軍閒散羅極之妻康氏正黄旗漢軍閒散李才之妻陳氏正白旗漢軍閒散郭四之妻竇氏正白旗漢軍馬甲王成祖之妻連氏正白旗漢軍閒散徐洪明之妻談氏正白旗漢軍馬甲董希賢之妻傅氏正紅旗漢軍筆帖式王澍之妻李氏正紅旗漢軍馬甲姜寧邦之妻伊爾根覺羅氏正紅旗漢軍馬甲博國訓之妻戴氏正紅旗漢軍馬甲王澤深之妻梁氏正紅旗漢軍馬甲武林泰之妻常氏正紅旗漢軍閒散貴良之妻任氏鑲白旗漢軍主簿劉權之妻李氏鑲白旗漢軍馬甲丁起哲之妻姚氏鑲白旗漢軍馬甲王聨科之繼妻馮氏鑲白旗漢軍馬甲祁時澍之妻鄧氏鑲白旗漢軍閒散張天富之妻侯氏鑲白旗漢軍閒散彭延祐之妻髙氏鑲白旗漢軍馬甲韓之華之妻楊氏鑲紅旗漢軍監生陳淑之妻佟氏鑲紅旗漢軍馬甲李世鳯之妻佟氏鑲紅旗漢軍馬甲陸鴻之妻周氏鑲紅旗漢軍馬甲周煥之妻陳氏鑲藍旗漢軍壯丁張宗孔之妻曹氏鑲藍旗漢軍馬甲于國秀之妻王氏以上俱於乾隆四十三年旌表鑲黄旗漢軍馬甲林翰臣之妻王氏鑲黄旗漢軍馬甲沈起潮之妻李氏鑲黄旗漢軍馬甲李東勝之妻髙氏鑲黄旗漢軍閒散馮繼信之妻張氏鑲黄旗漢軍馬甲張養仁之妻徐氏正白旗漢軍馬甲徐尚達之妻冉氏正白旗漢軍馬甲張福儒之妻白氏正白旗漢軍馬甲梁寛之妻姜氏正白旗漢軍閒散楊焜之妻劉氏正白旗漢軍馬甲趙顯珮之妻馬氏正白旗漢軍閒散李夢蘭之妻萬氏正紅旗漢軍馬甲萬國培之妻朱氏正紅旗漢軍馬甲陳通之妻田氏正紅旗漢軍閒散田永凱之妻趙氏正紅旗漢軍養育兵劉萼之妻魯氏鑲白旗漢軍馬甲雷􅀢之妻汪氏鑲紅旗漢軍馬甲髙炳之妻鄭氏鑲紅旗漢軍馬甲明泰之妻髙氏鑲紅旗漢軍馬甲劉天臣之妻金氏鑲紅旗漢軍馬甲扎爾泰之妻劉氏鑲紅旗漢軍閒散姜廷臣之妻劉氏鑲紅旗漢軍馬甲張捷宗之妻呉氏鑲紅旗漢軍馬甲金垣之妻劉氏鑲紅旗漢軍馬甲劉應鳯之妻安氏正藍旗漢軍馬甲陳寰之妻佟氏正藍旗漢軍馬甲王維之妻徐氏正藍旗漢軍閒散袁士才之妻陸氏正藍旗漢軍閒散李紛之妻仲氏正藍旗漢軍閒散王傑之妻徐氏正藍旗漢軍壯丁趙之㑹之妻馬氏正藍旗漢軍馬甲髙崇樸之繼妻郭氏鑲藍旗漢軍馬甲周芝祥之妻黄氏鑲藍旗漢軍閒散李國璟之妻郭氏以上俱於乾隆四十四年旌表鑲黄旗漢軍馬甲雅爾泰之妻徐氏鑲黄旗漢軍馬甲陳釧之妻鄧氏鑲黄旗漢軍馬甲韋敬之妻李氏鑲黄旗漢軍馬甲吳進賢之妻張氏正黄旗漢軍營兵梁應爵之妻徐氏正黄旗漢軍營兵伍成章之妻蔡氏正黄旗漢軍弓匠徐桂之妻辛氏正黄旗漢軍閒散岑俊之妻姜氏正黄旗漢軍閒散董鑾之妻魏氏正白旗漢軍領催楊奎光之妻金氏正白旗漢軍馬甲崔秉鈐之妻張氏正白旗漢軍壯丁韓修仁之妻郭氏正白旗漢軍馬甲巴善之妻温氏正白旗漢軍馬甲逢吉之妻赫氏正白旗漢軍馬甲王化行之妻彭氏正白旗漢軍馬甲劉福臣之妻李氏正白旗漢軍閒散馬保住之妻李氏正紅旗漢軍馬甲李宗義之妻張氏鑲白旗漢軍營兵翁天