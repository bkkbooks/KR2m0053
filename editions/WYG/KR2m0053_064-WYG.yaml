筆帖式員缺補用雍正九年奏准委署筆帖式如効力行走好者竢本旗理藩院䝉古字語筆帖式員缺該院出具考語咨部引見授為八品三庫大使筆帖式庫使調補乾隆九年奏准三庫筆帖式並三庫掌籍筆帖式共十有五人不論旗分作為遴選調補户部行文各部院衙門保送六部各保送二人其餘衙門各保送一人由該庫堂官每一缺遴選二人引見調補三年滿日照例更代其更代之筆帖式即補所調員缺俟有本旗分員缺仍按調庫人員旗分銓補歩軍統領衙門筆帖式雍正十二年奏准遇有員缺由該衙門移咨到部轉行各部院衙門於現任筆帖式内遴選老成諳練之人出具考語保送由部㑹同歩軍統領再行遴選三四人引見補授如有奉㫖記名者即行註冊俟有員缺引見補授三旗領侍衛府筆帖式乾隆四年奏准領侍衛府筆帖式十有二人由領侍衛内大臣於親軍内考試繙譯擬定正陪咨部再行考試擬補三年期滿遇有本旗部院筆帖式員缺與外任年滿調補人員較年滿日期先後調補遇考試現任時一同考試至陞轉時将伊等得補侍衛筆帖式之日所食親軍錢糧准其接算盛京刑部䝉古筆帖式乾隆四年議准蒙古筆帖式二人将盛京考取䝉古繙譯之人補用如盛京無應考之人即将在京考取蒙古繙譯之人掣籖補用六年期滿照例調補督撫衙門筆帖式乾隆四年奏准各省督撫衙門筆帖式例由部院衙門保送過部引見之處照歩軍統領衙門筆帖式之例出具考語保送到部再行遴選每一缺遴選二三人引見補授十四年奏准各省督撫衙門筆帖式内有已滿六年者令各督撫出具考語送部遇有本旗各部院衙門筆帖式員缺補授未經得補之前到部照現任各處調京之例令其掣簽分在各衙門額外行走其未經年滿者俟年滿之日亦照此例辦理遴選協辦同知筆帖式雍正八年奏准歸化城協辦同知筆帖式員缺交與理藩院将八旗䝉古筆帖式内人明白通曉漢文者選取以筆帖式原品令往歸化城協理同知辦事十二年奏准和林格爾崑都崙托克托城薩拉齊各増設筆帖式一人於各部理藩院筆帖式内遴選引見𤼵往乾隆元年議准歸化城清水河善岱増設筆帖式二人均由部行文内閣各部院将滿洲䝉古中書筆帖式内通曉䝉古語清漢字好能辦事者各遴選一人出具考語保送到部引見補授其筆帖式員缺别行開選五年奏准歸化城等處協辦筆帖式任事已滿三年果能勤勞供職㢘謹自持地方旗民事務實堪勝任者令該管上司據實保舉送部引見後仍回原任其奉㫖記名者遇有應陞由部於在京記名人員引見之時将該員記名之處一并繕録名单進呈候㫖簡用其歸化城和林格爾協辦筆帖式二人均係兼三要員如有人地不相宜之處准該督撫於各協理筆帖式内酌量題請調補八旗隨印筆帖式雍正十一年奏准嗣後隨印筆帖式員缺其生監官學生閑散人等内有願就考試者亦准其咨部取中者准其補授其由前鋒䕶軍領催驍騎補授者仍食伊等原錢糧由生監官學生閑散補授者給與九品筆帖式三年期滿咨部註册考試仍留隨印効力俟得補後再行開選乾隆十八年奏准見在景運門行走之上三旗每旗辦事筆帖式四人内按旗分掌稿筆帖式三人著隨闗防一同辦事不論旗分遴選人員明白辦事好者補授咨部註冊三年無過年滿後兩翼大臣㑹同詳察出具考語咨部照領侍衛府筆帖式之例以各部院衙門筆帖式用如有過犯即革退掌稿筆帖式咨部再行遴選補授吉林寧古塔将軍等處筆帖式康熈五十三年題准由将軍副都統選取本處應用之人坐名補授咨部註冊乾隆五年奏准吉林黒龍江捕牲烏喇等處筆帖式其由領催及驍騎選補者仍食原錢糧由閑散選補者給與九品筆帖式錢糧不准與在京筆帖式一同陞轉仍由該将軍等照向例陞用又奏准吉林将軍衙門理刑司増設筆帖式一人黒龍江将軍衙門増設銀庫筆帖式二人令該将軍於本處應補人員内遴選通曉漢文能繙譯者送部引見補授又奏准吉林黒龍江理刑司銀庫増設之筆帖式准其與在京各處筆帖式一例陞轉由本處考試選補如本處無考試繙譯之人令該将軍行文盛京兵部将考試繙譯人員内挨名指補送部引見補授游牧筆帖式雍正元年議准八旗游牧總管隨印筆帖式員缺由該總管於本處蒙古兵丁内每員缺選取二名擬定正陪咨部考試補用授為八品食俸補用庫使乾隆四年奏准部寺庫使員缺由部行文國子監将本旗應補庫使之官學生詳加考試繙譯每員缺取中四人将考卷一并咨部由本部堂官覆行考試擇其佳者指名坐補三年期滿免其考試入於各部繕本班内較期滿先後以筆帖式補用九年奏准各部寺庫使調補三庫庫使之人如從前有經該衙門奏准守候本衙門本旗筆帖式員缺者仍准其候補原衙門本旗之缺十六年議准庫使員缺行文國子監将本旗官學生每員缺咨送三人宗人府将覺羅學生每員缺咨送二人彚齊考試擇其佳者指補盛京各部庫使乾隆十七年覆准盛京各部庫使員缺分為左右兩翼如遇員缺仍照例令盛京兵部㑹同盛京禮部不拘旗分在本翼四旗官學生内考取繙譯擇其佳者指補咨部註冊教習期滿補用筆帖式乾隆五年奏准圓眀園八旗營房教習四年期滿列為一等及八旗義學教習三年期滿為人勤慎教導有成者咨送到部均入於議叙班内較日期先後以筆帖式補用各處補用外郎雍正十一年奏准八旗滿洲蒙古漢軍外郎員缺該旗咨部行文本旗於生監官學生兵丁閑散人等内将滿漢文藝好者選取二名擬定正陪咨部考試繙譯補授乾隆三年奏准盛京外郎由盛京兵部於考試繙譯候補筆帖式之漢軍生監官學生人等遇有外郎員缺挨名補用咨部註冊六年期滿出具考語咨部考職録用如願補用筆帖式具呈盛京兵部准其以筆帖式即行補用将考定職銜註銷以補筆帖式之日算俸至在京各旗外郎年滿考職後有情願就筆帖式者亦照盛京之例准其與候補筆帖式取中者按考定名次選用兵部武選司架閣科増設外郎雍正三年奏准由兵部於領催内遴選咨部補授乾隆五年奏准架閣科外郎五年期滿歸於繕本班内遇有本旗筆帖式員缺即行充補不積算本班之缺福州将軍衙門増設外郎水師營増設外郎雍正八年奏准由該将軍於學習清書已成漢軍子弟内選補八年期滿照例註冊補用若止曉清文弓馬可觀者遇有領催缺准其㧞補乾隆二年奏准廣州駐防照福州駐防之例八旗増設外郎各一名由該将軍於現在國語明晰之官學生内選取八年期滿咨部照例註冊補用若止曉清文弓馬可觀者遇有領催缺准其㧞補三年奏准京口将軍八旗各設外郎一名選熟悉國語者充補八年期滿咨部照例補用若止曉清文弓馬可觀者如馬歩兵丁照閑散之例如係領催照記名領催之例以驍騎校題補遺缺仍照例㧞補各處年滿筆帖式調京康熙九年題准陵寢筆帖式及各省城守尉駐防協領筆帖式六年期滿由各該處出具考語咨送到部由部察覈相符以本旗月分所出之在京各部院衙門筆帖式員缺論期滿之前後先行調補乾隆三年奏准盛京等處有年滿囘京候補之筆帖式其未補之先到京時由部傳令掣籖在各部院學習行走仍令食伊原俸盛京驛站筆帖式停調補雍正十一年議准盛京三陵總管及驛站等處筆帖式無年滿之例停其調補盛京五部止與在京部院筆帖式一同論俸陞轉筆帖式病痊起補康熙元年議准筆帖式有不願在伊本衙門行走因而告病觧退希圗别補好衙門此等人員起補時仍竢本衙門有缺補用乾隆四年奏准各省衙門筆帖式六年期滿例應調補來京之人其有因病解退者起補時由部察明該員除在任已滿六年照例先行補用如從前在任未及五年起補時仍俟該員原衙門有缺坐補接算扣滿年限再行調補如在任已五年以上起補者以赴補之文到日再扣限一年至在任已五年半以上者再扣限半年准照調補之例先行補用補用天文生雍正五年議准欽天監滿洲漢軍天文生缺除舉人貢生並原任筆帖式不行補用外於考試繙譯取中之監生生員官學生義學生内各按旗分名次歸入月選與所出筆帖式員缺一例掣籖補用不算筆帖式班次如有缺本旗無應擬之人則扣留俟考取有人之日再行補授不准借補别旗之人八年奏准欽天監天文生其由監生生員補用者授為八品由官學生義學生等補用者授為九品各按品級食俸遴選貼寫中書乾隆五年議准内閣貼寫中書八旗共四十人内滿本房二十四人每旗定為三人漢本房十二人每旗定為二人員缺由内閣知㑹到部行文各部院各該旗各按旗分将現在候補筆帖式内除坐補原部及先用即用人員外其餘無論已未考取註冊各部院繕本筆帖式及文舉人繙譯舉人貢監生員官學生義學生等移咨過部轉送内閣㑹同考試選取補授照筆帖式給俸三四品官廕生補用筆帖式乾隆五年奏准漢軍三品四品官廕生分部者學習期滿准其入於議叙班内以學習期滿日期較先後補用各部院衙門筆帖式三品官廕生授為七品四品官廕生授為九品繙書房筆帖式十人乾隆十五年奏准将户部刑部筆帖式額内各撥給五人遇缺不論旗分亦不分滿洲䝉古漢軍員缺於繙書房行走人員内遴選咨部引見補授如有應補之人於每月截限以前咨部即行坐補附於月選筆帖式内引見補授俟有本項旗缺翼缺即行補還欽定八旗通志卷五十
