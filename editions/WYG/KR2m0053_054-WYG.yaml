闗係𦂳要必須預備方為有益督撫提鎮將所轄各營酌量每年應用之數動公費製造潮濕地方預備三年髙燥地方預備五年加謹收貯毎年所用火葯即於收貯数内動支仍照動支数目製造貯庫出陳易新按年造册報部該管官陞遷事故離任照倉庫錢糧例交代若有􅃜缺及不堪用者責令該管官賠補仍各議罰乾隆十八年奏准濯靈厰製造演放火葯毎火葯萬斤用硝八千斤硫黄一千有五斤十兩廣膠六斤四兩每烘葯百斤用硝八十三斤十兩八錢硫黄十四斤七兩五錢帳房帳房之制官用藍布為之单袷惟宜每架髙六尺五寸下寛一丈二尺深六尺四寸上施梁為脊承以兩柱羃布斜垂至地如人字形兩邉皆圍以布左當柱中分以便出入兵帳房用白布制亦如之氊帳穹頂銜椽羃以白氊承椽以斜竹相交為墻皆髹朱外圍白氊下圍朱簾頂髙九尺墻髙四尺徑一丈四尺凉棚藍布為之單袷惟宜縱一丈八尺横二丈七尺中施横梁為脊濶九尺兩端承以柱髙一丈七尺四寸簷四出髙七尺五寸周承以柱十圍布墻前啟兩窻中開門後樹白布屏繪五采麒麟校閲用之戰船戰船毎船長十一丈至一丈九尺濶二丈三尺五寸至九尺六寸各有差天津山東福建舡均屬外海江西湖廣船均屬内河江南浙江廣東船分屬外海内河外海定限三年小修六年大修九年再大修不堪修者更造内河定限三年小修八年大修十一年再小修十四年再大修不堪修者更造其修造之費有正價有津貼正價各以其直無定額津貼每正價百兩自加四加六加八至加倍倍半有差由工部准兵部移咨覈覆修造各令本省道員㑹同副將恭將等官弁監造工竣報部題銷康熙三十四年諭戰船闗係𦂳要修理銀數覈减太過恐臨用之時因船料單薄復行大修以致貽悮著工部㑹同户兵二部再行確議具奏尋議准令各督撫將軍提鎮將修理戰船銀照各地方工料價值據實確估具題工竣報銷五十二年覆准戰船風篷桅索除應修之年毋庸别給外每嵗於朋扣餘剰銀内給與製辦又議准各營艍犁趕繒等船於船頭船尾刋刻某營某鎮某號捕盗船名雍正六年諭各省修造戰船於造成之時觧送總督親騐總督委中軍每向監造文員需索規例為之狥隠是以工料皆屬虚糜其實不能堅固朕思戰船闗係𦂳要嗣後船厰附近省城者著在城之督撫提鎮及布按兩司於承造完工之日公同騐㸔倘有不能堅固完好及浮冒侵蝕等弊即揭報題叅按律治罪是年議准浙江乗造戰船船底􅀈木用大號堅固松木每􅀈長一丈面梁濶三尺三寸船身及正桅均長一丈二尺頭號艍船濶二丈二尺五寸船身増長八丈九尺艙深七尺九寸板净厚三寸一分二號趕繒船濶一丈九尺五分船身减長七丈九尺艙深七尺一寸板净厚二寸九分三號雙蓬䑩船濶一丈七尺五寸船身减長六丈六尺艙深六尺一寸板净厚二寸五分四號快哨船濶一丈四尺船身减長四丈八尺艙深五尺板净厚二寸每板長一丈均用釘三又議准奉天戰船身長七丈四尺寛一丈八尺七寸二十一艙八年諭向來外省各標營沙唬趕繒等船原令道員㑹同副將監督修造道員遴委同知通判承修副將遴委都司守備監修聞承修之人備辦物料必俟監修驗看自千總以及遊副遂層需索不一而足及如式修造赴各標營交收又有騐㸔勒索之弊迨交收之後一任船置河干雨淋日曬船中器械繩索為頭舵人等竊盗變賣而該管將弁概不追究夫始則借端勒索後則聼其毁棄豈非以承修之責專在文員而監修武弁置身局外遂至視同陌路此等錮弊聞各處仍然而京口將軍標下為尤甚嗣後修造標營戰船著道員副將㑹同領價道員遴委丞倅副將遴委都守協同辦料修造如係將軍標下之船即遴委叅領以下等官同領同辦其船交收之後在汎停泊責令頭船苫盖澆洗毎嵗令該管將弁出具印結送督撫察覈如有陞遷事故具結交代至船有小修大修拆造之不同是以工料多寡懸殊今聞船未發厰頭舵人等已將在船什物私行盗賣即届小修亦必令其拆換加備甚屬不法嗣後著將什物一併具册移交如有􅃜缺將該管官弁及頭舵人等分别叅追十年議准山東登膠南北二汎海口趕繒船照雍正六年浙江題定之例身長七丈三尺板厚二寸七分雙篷䑩船身長六丈四尺板厚二寸五分福建大號趕繒船身長九丈六尺板厚三寸二分身長八丈板厚二寸九分二號趕繒船身長七丈四尺及七丈二尺板均厚二寸七分雙篷艍䑩船身長六丈板厚二寸二分江西南湖營沙唬船身長四丈四尺至六丈八尺板厚一寸三分至一寸六分直𨽻天津水師營大小趕繒船身長七丈四尺板厚二寸九分身長八丈六尺板厚三寸身長六丈五尺板厚二寸六分以上每板一尺概用三釘江南修造戰船應用板片薄厚鐵釘数目照浙江省所定分寸沙船一丈三釘趕繒船尺板四釘京口營船九丈以外梁頭棧板均凈厚三寸九丈以内梁頭棧板凈厚二寸八分量定三寸三分用一釘以收一尺三釘之實蘓州狼山川沙呉淞等營船身長四丈七尺至十一丈板厚二寸二分至三寸六分每板一尺用三四釘有差湖北湖南戰船身長三丈二尺至七丈八尺八寸板厚一寸二分至二寸二分每板一尺用三四五釘有差廣東戰船身長一丈九尺至九丈板厚一寸至三寸一分每板一尺用三四五六釘有差各省戰船寛九尺六寸至二丈三尺五寸有差均令道員㑹同副將等官監督廣東外海戰船委道員内河委知府各㑹同副叅等官監督十一年議准直省修造戰船報銷限期直𨽻限以四月福建臺灣限以十月其餘各厰限四月山東限六月江西大修拆造限三月小修限兩月江南限四月湖廣大修拆造限六月小修限四月浙江限四月廣東瓊州限六月其餘各厰限四月均以工竣日起限