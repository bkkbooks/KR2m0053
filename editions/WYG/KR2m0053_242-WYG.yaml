body:
  text: 人物志一百八忠義𫝊二十蒙古八旗五九十人乾隆年中共䇿塔爾䇿塔爾䝉古鑲黄旗人姓博勒特氏世居喀爾喀由官學生考取筆帖式授理藩院主事乾隆十三年派往西藏辦事十五年冬十月藏王朱爾墨特那木扎爾潛謀不軌都統傅清左都御史拉布敦以計誘而誅之逆黨羅卜藏扎什等遂率衆數千縱火焚署在事文武官員俱被殺害䇿塔爾與通判常明偕死之賞䘏如例恩賜雲騎尉世職承襲詳見世職表朔隆伍朔隆伍䝉古鑲黄旗人姓博爾濟吉特氏世居羅罕地方乾隆十三年出征金川得三等功牌任藍翎長二十年從征西路一十一年自集爾噶朗撤回為厄魯特賊衆所害賞䘏如例恩賜雲騎尉世職承襲詳見世職表耨金耨金蒙古鑲黄旗人由健鋭營䕶軍委署驍騎校乾隆二十一年奉定邉将軍兆惠令隨副都統阿敏往葉爾羗喀什噶爾招降逆回為霍集占計誘被害賞䘏如例九住九住䝉古鑲黄旗人姓烏朗漢吉爾莫吉爾敏氏世居喀喇沁地方任健鋭營副前鋒叅領兼佐領隨征西路乾隆二十一年因觧送䇿楞玉保來京中途為厄魯忒賊衆邀截力戰死之賞䘏如例恩賜雲騎尉世職承襲詳見世職表諾海諾海䝉古鑲黄旗人由健銳營前鋒補奨賞藍翎乾隆二十二年八月於烏魯木齊地方搜勦嗎哈沁渡河溺死賞䘏如例善徳善徳䝉古鑲黄旗人由健銳營前鋒委署筆帖式乾隆二十二年隨将軍成衮扎布出師令守軍臺遇賊刦掠與訥爾圖同時被害照陣亡例減半議䘏賞銀一百兩訥爾圖訥爾圖䝉古鑲黄旗人由健銳營前鋒委署筆帖式乾隆二十二年春命将軍成衮扎布恭賛大臣舒赫徳等由朱爾都斯路進伊犂訥爾圖在營奮勉効力奉将軍令駐守軍臺遇賊搶刦被害賞䘏如例良徳良徳䝉古鑲黄旗人由健銳營前鋒委署筆帖式乾隆二十三年六月隨征庫車於軍臺遇賊戰歿賞䘏如例八十一八十一蒙古鑲黄旗人由健銳營前鋒委署筆帖式乾隆二十三年六月隨征庫車於軍臺遇賊戰歿賞䘏如例啟里巴圖啟里巴圖䝉古鑲黄旗人姓巴魯特氏世居邁拉果爾地方任前鋒藍翎長乾隆二十四年派往西路軍營八月初四日追勦霍集占於阿爾楚爾地方力戰歿賞䘏如例恩賜雲騎尉世職承襲詳見世職表䝉古勒䝉古勒䝉古鑲黄旗人姓厄魯特氏乾隆二十三年由拜唐阿授三等侍衛三十二年六月派往雲南征勦緬甸十二月隨将軍公明瑞擊賊於蠻結陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表富海富海䝉古鑲黄旗人姓珠爾格特氏乾隆二十九年由前鋒授鳥鎗藍翎長派往雲南征勦緬甸三十四年十月擊賊於老官屯陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表巴圖伯爾巴圖伯爾䝉古鑲黄旗人姓厄魯氏由領催授藍翎長隨征金川乾隆三十八年六月擊賊於昔嶺陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表布延圖布延圖䝉古鑲黄旗人姓厄魯特氏乾隆三十七年由藍翎長隨征金川三十八年攻克當噶旋進兵儧拉得功牌三三十九年三月擊賊於思底陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表巴善保巴善保䝉古鑲黄旗人姓布魯特氏由領催委署七品官乾隆三十八年隨征金川三十九年七月擊賊於當噶爾陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表烏爾璫阿烏爾璫阿䝉古鑲黄旗人姓吉爾們氏乾隆二十七年由前鋒派戍伊犂二十八年授藍翎長二十九年陞副前鋒校厯前鋒校三十年出征烏什屢列超等得功牌九三十四年隨征緬甸三十五年在軍營授委署前鋒叅領進攻新街老官屯得功牌二三十八年調征金川三十九年授副䕶軍㕘領調補副前鋒恭領攻克䟎拉得功牌二是年六月擊賊於木克什陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表伊興阿伊興阿䝉古正黄旗人姓額魯特氏世居盛京任理藩院員外郎乾隆十九年七月隨定北将軍班第出師北路收獲烏梁海宰桑等有功二十年八月阿睦爾撒納叛二十四日逆黨克什木巴朗等進犯軍營伊興阿力戰歿於陣賞䘏如例恩賜雲騎尉世職承襲詳見世職表七十三七十三蒙古正黄旗人任健銳營前鋒藍翎乾隆十九年出師西路二十一年自集爾噶朗撤回遇賊戰歿賞䘏如例恩賜雲騎尉世職承襲詳見世職表查雲阿查雲阿䝉古正黄旗人姓栢爾郭奴特氏世居薩拉木倫地方任甘肅水泉營守備乾隆二十三年六月隨征庫車與逆黨阿布都克勒木戰歿於陣賞䘏如例恩廕千總子佛保住襲額勒津額勒津蒙古正黄旗人姓巴約特氏由健銳營前鋒派往雲南征勦緬甸臨陣奮勉得㫖賞戴藍翎乾隆三十二年十二月擊賊於老官屯受傷尋歿賞䘏如例恩賜恩騎尉世職承襲詳見世職表克木納克克木納克䝉古正黄旗人姓額爾哲特氏乾隆三十二年由拜唐阿派往雲南征勦緬甸臨陣奮勉得㫖授藍翎侍衛是年十二月隨将軍公明瑞擊賊於蠻結陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表海明海明䝉古正黄旗人姓他塔喇氏乾隆三十六年由前鋒隨征緬甸旋調征金川三十七年授空銜藍翎三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表智色智色䝉古正黄旗人姓巴約特氏乾隆三十七年由䕶軍授空銜藍翎隨征金川三十八年六月擊賊於昔嶺陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表果寧阿果寧阿蒙古正黄旗人姓徹黙特氏乾隆二十七年由䕶軍出征伊犂三十一年回京三十四年出征緬甸旋調征金川三十七年授六品頂帶藍翎三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表拴珠拴珠䝉古正黄旗人姓巴約特氏乾隆三十四年由鳥鎗䕶軍出征緬甸三十五年回京三十六年復派往雲南軍營尋調征金川三十七年授六品頂帶藍翎三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表塔斯哈塔斯哈䝉古正黄旗人姓巴林氏乾隆三十一年由鳥鎗䕶軍出征緬甸三十二年回京三十四年授鳥鎗翎長三十六年復派往雲南軍營尋調征金川三十七年授六品頂帶藍翎三十九年三月擊賊於羅博瓦陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表索珠索珠蒙古正黄旗人姓齊卜楚特氏乾隆二十七年由䕶軍授藍翎長三十六年隨征緬甸旋調征金川三十七年授鳥鎗䕶軍校三十八年署鳥鎗䕶軍恭領三十九年擢副䕶軍叅領是年五月擊賊於色淜普陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表延山延山䝉古正黄旗人姓額哲特氏由馬甲補副鳥鎗䕶軍恭領隨征金川屢經打仗有功得超等功牌三十七恩入郊勞宴乾隆四十八年發往福建以遊擊用五十年補福寧鎮標右營遊擊五十一年十一月隨勦臺灣逆匪五十二年三月于鳯山擊賊陣亡賞䘏如例恩賞雲騎尉世職承襲詳見世職表諾克圖諾克圖䝉古正白旗人姓克什克忒氏世居察哈爾任健銳營前鋒恭領乾隆二十年隨征西路二十一年自集爾噶朗撤回為厄魯特等賊衆邀截力戰死之賞䘏如例恩賜雲騎尉世職承襲詳見世職表穆克登布穆克登布䝉古正白旗人世居喀喇沁地方任健銳營前鋒校乾隆二十年從征西路二十一年自集爾噶朗撤回中途為厄魯特等賊衆所害賞䘏如例恩賜雲騎尉世職承襲詳見世職表賽沙爾泰賽沙爾泰䝉古正白旗人任總管乾隆二十三年十月定邉将軍兆惠自庫車直薄葉爾羗令隨總兵官髙天喜等督修喀拉烏蘇河橋工兵未渡河逆酋霍集占統二萬餘衆蟻集重圍賽沙爾泰力戰死之賞䘏如例恩賜雲騎尉世職承襲詳見世職表烏爾圖納蘇圖烏爾圖納蘇圖蒙古正白旗人姓薩爾圖克氏世居察哈爾由䕶軍厯補前鋒校乾隆二十三年隨征西路進勦波羅泥都霍集占二十四年委署前鋒恭領於霍斯庫魯克山與逆回戰歿賞䘏如例恩賜雲騎尉世職承襲詳見世職表三都布三都布䝉古正白旗人姓圖博忒氏世居察哈爾初授藍翎侍衛洊厯頭等侍衛授察哈爾總管乾隆二十四年正月隨副将軍富徳追勦波羅泥都霍集占大敗逆酋於呼爾璊三都布力戰歿於陣賞䘏如例恩賜雲騎尉世職承襲詳見世職表巴圖巴圖蒙古正白旗人姓巴約特氏乾隆三十七年由䕶軍隨征金川攻取明郭宗功列超等授空銜藍翎三十八年六月擊賊於大壩溝陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表諾爾布諾爾布䝉古正白旗人姓巴約特氏乾隆三十二年由健鋭營前鋒出征緬甸得功牌一旋調征金川進攻巴朗路頂宗明郭宗等處共得功牌十二三十七年授六品頂帶藍翎三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表徳禄徳禄䝉古正白旗人姓巴嚕特氏乾隆三十七年由䕶軍校隨征金川進攻巴朗路頂宗明郭宗等處共得功牌十三十八年六月擊賊於木果木陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表音特恒音特恒䝉古正白旗人姓克埒特氏乾隆三十八年由委署驍騎校隨征金川得功牌八四十年四月擊賊於榮噶爾博陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表都爾圖都爾圖䝉古正白旗人姓赫爾拉特氏乾隆三十八年由鳥鎗䕶軍隨征金川授鳥鎗翎長進攻阿克木雅等處得功牌二四十年閏十月擊賊於西里陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表色楞色楞䝉古正紅旗人授二等侍衛乾隆二十二年春隨将軍兆惠恭賛大臣富徳等由額林哈必爾罕進兵尋遇賊衆戰歿賞䘏如例納木扎布納木扎布蒙古正紅旗人委署前鋒恭領乾隆二十二年從征西路時烏魯特鄂托克率衆反叛将軍成衮扎布遣將追之納木扎布争先赴敵擒獲宰桑黙羅尋為賊衆所害賞䘏如例逹什車凌逹什車凌䝉古正紅旗人凖噶爾濟賽宰桑乾隆二十年大兵征伊犂所過諸部先後歸誠逹什車凌率衆迎降隨西路副将軍薩拉爾軍營効力五月初九日奉㫖授散秩大臣賜冠服二十三年将軍兆惠進兵葉爾羗征勦兩和卓木逹什車凌於巴圖魯侍衛璊綽爾圖隊前驅十月十三日進取沙拉斯遊牧路遇回衆截戰偕璊綽爾圖等死之事聞賜祭葬銀兩入祀昭忠祠恩賜騎都尉世職承襲詳見世職表特克哈什哈特克哈什哈䝉古正紅旗人授空翎乾隆二十三年定邉将軍兆惠征勦葉爾𦍑特克哈什哈隨散秩大臣逹什車凌隊前驅於十月十三日進攻沙拉斯逰牧途遇逆回統衆截戰與逹什車凌等偕死之賞䘏如例特宻濟特宻濟蒙古正紅旗人授空翎乾隆二十三年大兵進攻葉爾𦍑特宻濟隨散秩大臣逹什車凌隊前驅於十月十三日進取沙拉斯逰牧突遇逆回統衆截戰被害賞䘏如例素泰素泰䝉古正紅旗人姓鄂拉氏由雲騎尉世職授健銳營副前鋒叅領乾隆三十二年派往雲南征勦緬甸是年十二月隨将軍公明瑞擊賊於蠻結陣亡賞䘏如例恩賜雲騎尉併前雲騎尉為騎都尉世職承襲詳見世職表柴逹木柴逹木䝉古正紅旗人姓巴林氏由健銳營前鋒陞鳥鎗䕶軍校乾隆十三年隨經畧大學士傅恒出兵金川二十年隨副都統明安出兵伊犂三十三年派往雲南征勦緬甸三十五年擊賊於老官屯陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表烏林保烏林保蒙古正紅旗人姓薩哈爾圖氏乾隆三十二年由鳥鎗䕶軍派往雲南征勦緬甸得奨賞藍翎侍衛是年十二月由老官屯移營至旱塔右臂中鎗傷三十三年正月行至杉木隴傷發歿賞䘏如例恩賜雲騎尉世職承襲詳見世職表五十三五十三䝉古正紅旗人姓博爾濟氏乾隆三十二年由䕶軍隨征緬甸三十五年調征金川三十六年委署七