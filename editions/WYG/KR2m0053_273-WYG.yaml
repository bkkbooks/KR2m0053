body:
  text: 人物志一百三十九列女傳十九八旗蒙古列女傳二鑲黄旗䝉古馬甲弼立克圖之妻哈爾親氏鑲黄旗䝉古馬甲漢班之妻巴林氏鑲黄旗蒙古馬甲弼里克之妻吴爾多蘇氏鑲黄旗䝉古馬甲噶爾瑪扎布之妻徐氏正黄旗䝉古馬甲花色之妻柰曼氏正黄旗䝉古領催齊里之妻柰曼氏正黄旗䝉古驍騎校阿爾拉拜之妻竒穆忒氏正白旗䝉古馬甲烏爾圖那蘇圖之妻白氏正白旗蒙古䕶軍滿色之妻吉木特氏正白旗䝉古親軍三音查昆之妻李氏正白旗䝉古䕶軍黒達色之妻孫氏正白旗䝉古馬甲恩充之妻叩徳氏正白旗䝉古馬甲佛保之妻額爾格氏正白旗蒙古馬甲䝉克之妻杭吉蘇氏正白旗䝉古馬甲都楞之妻扎爾佳氏正白旗蒙古馬甲那穆僧之妻巴魯克氏正白旗䝉古馬甲瑪什之妻趙佳氏正白旗䝉古馬甲達爾什之妻格濟里氏正紅旗蒙古前鋒達頼之妻台處克氏正紅旗蒙古雲騎尉皂保之妻陶氏正紅旗䝉古䕶軍達爾瑪西之妻博古特氏鑲白旗䝉古䕶軍格勒爾圖之妻趙氏鑲白旗蒙古䕶軍雅圖之妻趙氏鑲白旗䝉古䕶軍赫赫之妻莽努忒氏鑲白旗䝉古䕶軍克什布類之妻韓氏鑲白旗蒙古馬甲丹巴之妻巴立克氏鑲白旗䝉古領催浩尚之妻𤓰勒佳氐鑲白旗䝉古馬甲長生之妻佟佳氏鑲白旗䝉古馬甲巴拜之妻莾古特氏鑲白旗䝉古馬甲三雅圖之妻巴魯克泰氏鑲白旗蒙古監生扎爾敏之妻王氏鑲紅旗䝉古達色之未婚妻于氏鑲紅旗䝉古䕶軍察漢之妻王氏鑲紅旗蒙古前鋒存住之妻王氏鑲紅旗䝉古䕶軍黒色之妻王氏鑲紅旗䝉古馬甲恒徳之妻王氏鑲紅旗䝉古領催福夀之妻馬佳氏鑲紅旗蒙古馬甲格墨爾之妻巴林氏鑲紅旗䝉古馬甲扎錫之妻蔡佳氏正藍旗䝉古馬甲濃阿里之妻𤓰勒佳氏正藍旗蒙古馬甲達蘭達之妻齊墨徳氏正藍旗䝉古領催晋保住之妻余氏鑲藍旗䝉古䕶軍扎巴拉之妻什氏鑲藍旗蒙古䕶軍張保住之妻李氏鑲藍旗䝉古領催六兒之妻紅氏鑲藍旗䝉古馬甲邁拉遜之妻達爾衮氏鑲藍旗蒙古馬甲小兒之妻李氏鑲藍旗䝉古閑散三兒之妻葉氏鑲藍旗䝉古馬甲劉保住之妻任氏鑲藍旗蒙古䕶軍常久之妻楊氏鑲藍旗䝉古䕶軍和楞額之妻勒忒氏鑲藍旗䝉古領催二格之妻錫徳楚布氏鑲藍旗蒙古領催五十六之妻張氏以上俱乾隆元年旌表鑲黄旗䝉古馬甲七十七之妻趙氏鑲黄旗䝉古前鋒多爾吉之妻趙氏鑲黄旗蒙古䕶軍輟喜之妻李氏鑲黄旗䝉古䕶軍蘇郎之妻劉氏鑲黄旗䝉古䕶軍喜兒之妻何氏鑲黄旗䝉古䕶軍色楞之妻馮氏鑲黄旗䝉古馬甲都楞之妻郎氏鑲黄旗蒙古䕶軍阿必達之妻李氏鑲黄旗䝉古䕶軍色納克之妻張氏鑲黄旗䝉古䕶軍五保之妻楊氏鑲黄旗蒙古䕶軍福保之妻張氏鑲黄旗䝉古領催黒説子之妻何氏鑲黄旗䝉古領催校扎喜内之妻李氏鑲黄旗蒙古䕶軍茍色之妻陳氏鑲黄旗䝉古馬甲保住之妻正氏鑲黄旗䝉古桅牧伊瑪竒之妻馮氏鑲黄旗蒙古筆帖式徳保之未婚妻他塔喇氏正黄旗䝉古閑散宣記之妻博爾濟克氏正黄旗䝉古馬甲長生之妻卓們齊特氏正黄旗蒙古馬甲伍濟爾之妻赫舍里氏正白旗䝉古領催福夀之妻阿拉克楚氏正白旗䝉古馬甲烏拉爾齊之妻楊氏正白旗蒙古馬甲鄂齊爾之妻牛氏正白旗䝉古馬甲沙子之妻張氏正白旗䝉古領催福夀之妻阿拉克禇氏正白旗蒙古馬甲烏拉爾計之妻楊氏正紅旗䝉古馬甲官保之妻侯氏鑲紅旗䝉古馬甲額爾吉圖之妻趙氏鑲紅旗蒙古筆帖氏佛保之妻努燕博羅特氏鑲紅旗䝉古領催雙鼎之妻章京氏鑲紅旗䝉古領催花色之妻陳氏鑲藍旗䝉古領催喇八十之妻王氏鑲藍旗蒙古馬甲楊烏利之妻敖佳特氏鑲藍旗䝉古馬甲諾海之妻敖羅特氏鑲藍旗䝉古馬甲託布克之妻杜氏以上俱於乾隆二年旌表正黄旗蒙古䕶軍班達爾史之妻拜玉特氏正黄旗䝉古前鋒雅圖之妻李氏正黄旗䝉古䕶軍妞色之妻王氏正黄旗蒙古䕶軍懐徳之妻闗氏正黄旗䝉古馬甲瓦禄之繼妻劉氏正黄旗䝉古領催存住之妻李氏正黄旗蒙古䕶軍巴彦岱之妻周氏正黄旗䝉古䕶軍烟九兒之妻王氏正黄旗䝉古親軍兆住之妻劉氏正黄旗蒙古䕶軍根徳邵之妻馬氏正黄旗䝉古佐領巴朗之妻栢玉特氏正黄旗䝉古䕶軍老米之妻孟氏正黄旗蒙古領催雅泰之妻吴氏正白旗蒙古弓匠阿里衮之妻舒氏正紅旗䝉古䕶軍巴圖之妻扎魯特氏正紅旗䝉古䕶軍黒狗之妻格爾納氏正紅旗䝉古䕶軍索曖之妻哈起克氏鑲白旗蒙古馬甲六十之妻張氏鑲白旗䝉古䕶軍阿玉史之妻保郭羅忒氏鑲白旗䝉古鎗手白起之妻布拉克齊忒氏鑲白旗蒙古䕶軍扎爾布之妻阿蘇忒氏鑲白旗蒙古䕶軍卓博多之妻巴魯忒氏鑲白旗䝉古䕶軍和尚之妻趙氏鑲白旗䝉古馬甲海拉太之妻巴林氏鑲白旗蒙古䕶軍鄂齊爾扎穆蘇之妻臧氏鑲白旗䝉古䕶軍班第之妻巴林氏鑲白旗䝉古親軍校穆賽之妻西爾塔理氏鑲白旗蒙古䕶軍錫爾徳克之妻烏爾扎氏正藍旗䝉古䕶軍達蘭泰之妻彭氏鑲藍旗䝉古馬甲鄂莫克圖之妻柯史克特氏鑲藍旗蒙古鳥鎗䕶軍華色之妻魏氏鑲藍旗䝉古䕶軍羅爾扎之妻張氏鑲藍旗䝉古親軍瑪喜之妻何氏鑲藍旗蒙古䕶軍廣柱之妻吴氏鑲藍旗䝉古馬甲和尚之妻陳氏鑲藍旗䝉古䕶軍長夀之妻安氏鑲藍旗蒙古䕶軍三達色之妻蔡氏鑲藍旗䝉古馬甲趕金兒之妻王氏鑲藍旗䝉古馬軍諾和圖之妻崔氏鑲藍旗蒙古䕶軍阿必達之妻烏爾蘇氏鑲藍旗䝉古䕶軍拜達爾之妻巴玉特氏鑲藍旗䝉古馬甲八十四之妻張氏鑲藍旗蒙古親軍和雅圖之妻恵氏鑲藍旗䝉古親軍常明之妻姚氏以上俱於乾隆三年旌表鑲黄旗䝉古親軍烏雅圖之妻張氏鑲黄旗䝉古前鋒喀爾喀之妻額勒忒氏鑲黄旗蒙古閒散保住之妻張氏鑲黄旗䝉古䕶軍五十爾之妻朱氏鑲黄旗䝉古前鋒七夀之妻馬氏鑲黄旗蒙古馬甲五十之妻楊氏鑲黄旗䝉古領催昻色之妻畢氏鑲黄旗䝉古前鋒齊夀之妻馬氏正黄旗蒙古䕶軍常保之妻和氏正黄旗䝉古親軍凌存之繼妻吴氏正黄旗䝉古馬甲黒雅圖之妻張氏正白旗䝉古馬甲恩厄木之妻和舍里氏正白旗䝉古䕶軍蘇珠克圖之妻何氏正白旗蒙古筆帖式厄爾克圖之妻何氏正紅旗䝉古索住之妻巴玉特氏正紅旗䝉古騎都尉色楞之妻竒墨司氏正紅旗䝉古騎都尉額爾得厄之妻栢河落特氏正紅旗蒙古馬甲克什特之妻卓特氏正紅旗䝉古䕶軍布彦圖之妻公克里氏正紅旗蒙古䕶軍諾木琿之妻白玉特氏正紅旗䝉古馬甲濟蘭泰之妻文氏正紅旗䝉古領催朱爾泰之妻沙爾圖氏鑲白旗蒙古䕶軍石代之妻多林氏鑲白旗䝉古䕶軍常明之妻黄氏鑲白旗䝉古䕶軍阿必達之妻紀氏鑲白旗蒙古馬甲扎木素之妻来竒特氏鑲白旗䝉古馬甲沙克都爾扎布之妻莽諾特氏鑲白旗䝉古䕶軍鄂齊爾之妻特齊氏鑲紅旗蒙古馬甲瑪拉玉之妻覺羅禪氏鑲紅旗䝉古馬甲進步之妻杜佳氏鑲紅旗䝉古閑散黄毛之妻巴雅克氏鑲藍旗蒙古䕶軍張泰之妻扎魯特氏以上俱於乾隆四年旌表正黄旗䝉古馬甲臘八兒之妻李氏正白旗䝉古親軍都爾巴之妻玉出特氏正紅旗䝉古親軍色仍鄂之妻白氏正紅旗䝉古閑散栢起之妻納喇氏正紅旗䝉古馬甲黒狗之妻白玉特氏正紅旗蒙古䕶軍増舒之妻梅色里氏鑲白旗䝉古䕶軍達爾扎之妻博爾濟錦氏鑲白旗䝉古馬甲扎什之妻布爾喀齊忒氏鑲白旗蒙古䕶軍巴林之妻劉氏鑲白旗䝉古閑散舍冷之妻趙氏鑲白旗䝉古䕶軍白達色之妻劉氏鑲白旗蒙古䕶軍阿蘭太之妻翁牛特氏鑲白旗䝉古䕶軍蘇珠克圖之妻克徹特氏鑲紅旗䝉古䕶軍噶爾瑪之妻泥什勒氏鑲紅旗蒙古䕶軍校丑色之妻劉氏鑲紅旗䝉古䕶軍羅爾代之妻張氏鑲紅旗䝉古䕶軍黒色之妻張氏正藍旗蒙古馬甲常的保之妻敖氏鑲藍旗䝉古馬甲茄藍保之妻楊氏鑲藍旗䝉古䕶軍那木泰之妻王氏鑲藍旗蒙古馬甲花色之妻李氏以上俱扵乾隆五年旌表鑲黄旗䝉古馬甲蘇延太之妻烏蘇氏正黄旗䝉古䕶軍兆特巴之妻何氏正紅旗蒙古前鋒佛保之妻劉氏正紅旗䝉古䕶軍靠山之妻金氏正紅旗䝉古䕶軍校阿吉圖之妻韓佳氏正紅旗蒙古䕶軍劉住之妻白玉特氏正紅旗䝉古馬甲阿思哈那之妻鈕祜祿氏正紅旗䝉古馬甲烏三保之妻𤓰勒佳氏正紅旗蒙古閑散達拉之妻伊爾根覺羅氏正紅旗䝉古馬甲額爾特之妻扎庫塔氏正紅旗䝉古馬甲尼魯代之妻葉赫氏正紅旗蒙古馬甲英格之妻雅木濟氏鑲白旗蒙古䕶軍長安之妻陳氏鑲白旗䝉古䕶軍關保之妻王氏鑲白旗蒙古䕶軍沙錦之妻傅氏鑲白旗䝉古前鋒常明之妻他塔喇氏鑲白旗䝉古雲騎尉明阿塔之妻多竒忒氏鑲白旗蒙古拜唐阿雅圖之妻穆和林氏鑲白旗䝉古馬甲李六之妻里克哩氏鑲白旗䝉古馬甲烏薩納之妻托科囉氏鑲紅旗蒙古領催瑚魯木史之妻楊氏鑲紅旗䝉古䕶軍花色之妻王氏鑲紅旗䝉古䕶軍蘇住客之妻克勒得氏鑲紅旗蒙古馬甲博什特之妻傅氏鑲紅旗䝉古馬甲吉言達頼之妻𤓰勒佳氏鑲紅旗䝉古馬甲瑪爾吉納之妻舒穆祿氏鑲紅旗蒙古馬甲特布西之妻𤓰勒佳氏鑲紅旗䝉古馬甲穏特之妻𤓰勒佳氏正藍旗䝉古馬甲珠蘭太之妻墨勒哲埒氏正藍旗蒙古馬甲凌保之妻阿克集哩氏正藍旗䝉古馬甲倭西勒之妻瑪喜氏鑲藍旗䝉古鳥鎗䕶軍二格之妻和氏鑲藍旗蒙古䕶軍和達色之妻王氏鑲藍旗䝉古馬甲和尚之妻蘇氏以上俱於乾隆六年旌表鑲黄旗䝉古馬甲圖英之妻呂氏鑲黄旗蒙古馬甲常住爾之妻劉氏鑲黄旗䝉古䕶軍孟克之妻田氏鑲黄旗䝉古馬甲鄂拜之妻西特赫爾氏鑲黄旗蒙古馬甲武密集拉之妻尼瑪齊氏鑲黄旗蒙古馬甲伯祿之妻舒穆祿氏正黄旗䝉古䕶軍常明之妻闗氏正黄旗䝉古䕶軍西拉登之妻王氏正黄旗蒙古前鋒田保之妻李氏正黄旗䝉古䕶軍白竒徳之妻張氏正黄旗䝉古馬甲三加保之妻李氏正黄旗蒙古䕶軍八格之妻王氏正白旗䝉古䕶軍阿南達之妻張氏正白旗䝉古䕶軍校巴彦之妻李氏正白旗蒙古䕶軍七十之妻王氏正白旗䝉古領催常阿之妻扎斯呼哩氏正白旗䝉古馬甲扎蘭塔之妻西特赫爾氏正白旗蒙古馬甲充額之妻扎斯呼哩氏正白旗䝉古閑散西哩之妻啟塔哩氏正白旗䝉古叅領薩木丹之妻和舍里氏正紅旗蒙古親軍恩得爾虎之妻格爾博特氏正紅旗䝉古領催赫勒達色之妻烏扎拉氏正紅旗䝉古馬甲喀爾遜之妻呼西哈哩氏正紅旗蒙古馬甲犒申之妻墨勒集哩氏正紅旗䝉古牧長察勒必善之妻烏扎拉氏鑲白旗䝉古馬甲敦住克之妻烏拉哈氏正藍旗䝉古馬甲特稜特之妻烏拉氏正藍旗䝉古閑散墨爾吉之妻扎斯呼哩氏正藍旗䝉古馬甲克西布之妻扎哈齊氏鑲藍旗䝉古鳥鎗䕶軍七格之妻白氏鑲藍旗䝉古䕶軍諾海之妻張氏鑲藍旗蒙古馬甲阿穆之妻尼雅哈哩氏鑲藍旗䝉古馬甲愛呼之妻李氏鑲藍旗䝉古領催楚木齊哩之妻烏拉扎氏鑲藍旗蒙古馬甲甘岱之妻王氏鑲藍旗䝉古馬甲尼堪之妻西克特哩氏鑲藍旗䝉古馬甲愛三之妻扎嚕特氏鑲藍旗䝉古牧丁尼堪之妻烏扎拉氏鑲藍旗䝉古領催伊哈訥之妻玻霍勒圖氏鑲藍旗䝉古水手伊爾巴善之妻西特赫爾氏以上俱於乾隆七年旌表鑲黄旗䝉古馬甲諾媚之妻白氏正黄旗蒙古䕶軍色楞敦住之妻白氏正黄旗䝉古馬甲四十兒之妻馬氏正黄旗䝉古筆帖式碩色之妻傅氏正黄旗蒙古七品官克什勒之妻李氏正黄旗䝉古閑散吉蘭泰之