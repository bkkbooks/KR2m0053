body:
  text: 欽定四庫全書欽定八旗通志卷八十典禮志三八旗儀制諸王儀仗官員儀仗公主王妃等儀仗八旗諸王以下儀仗王府噐用附天聰六年二月禮部定旗傘等儀仗除出征仍照舊規外凡近地往來大貝勒旗二對傘一柄校尉四人諸貝勒等各旗一對傘一柄校尉二人如遇朝期諸貝勒不用旗傘止許校尉隨從若出郭門仍用旗傘違例者罰羊凡赴行在所諸貝勒旗傘校尉槩不許用惟大貝勒隨駕行時許用傘著為令崇德元年五月定親王郡王貝勒等儀仗仍照品級分賜銀兩令其製造又定親王銷金紅傘二柄纛二桿旗十桿立𤓰一對骨朶一對吾杖二對執事人青衣紅帯青㡌銀頂上挿紅翎郡王銷金紅傘一柄纛一桿旗八桿卧𤓰一對吾杖二對執事人衣帯㡌頂與前同貝勒銷金紅傘一柄纛一桿旗六桿骨朶一對紅杖一對執事人衣帯㡌頂與前同貝子彩畫雲紅傘一柄豹尾鎗二桿旗六桿紅杖一對執事人衣帶㡌頂與前同城内止用傘杖鎮國公紅傘一柄豹尾鎗二桿旗六桿紅杖一對執事人衣帶㡌頂與前同城内止用紅杖輔國公紅傘一柄豹尾鎗二桿旗六桿紅杖一對執事人青衣紅帶藍翎紅氊㡌城内止用紅杖鎮國将軍金黄傘一柄旗六桿城内用夜不収二名開路後隨人六名輔國将軍執事與鎮國将軍同城内用夜不収一名開路後隨人四名奉國将軍旗四桿城内用從人四名順治元年正月増和碩親王儀仗撒袋二副大刀二柄鎗二桿多羅郡王大刀二柄鎗二桿多羅貝勒大刀二柄三月禮部議定諸王貝勒等儀仗凡行獵出兵和碩親王多羅郡王多羅貝勒隨帶儀仗不用前導或專領兵馬或鎮守城池儀仗前導奏樂而行貝子儀仗内増條纛一桿其旗幅視多羅貝勒條纛短五寸二年二月定和碩親王多羅郡王多羅貝勒固山貝子儀仗郡王以上用五爪龍貝勒以下不許用三年五月定諸王貝勒貝子公等儀仗引導之例和碩親王繡紅羅曲柄傘一銷金紅羅傘二繡團紅羅傘二青羅孔雀團扇二繡團紅羅扇二立𤓰二對卧𤓰二對骨朶二對吾杖二對纛二桿條纛二桿旗十執大刀二口鎗二桿馬三對多羅郡王繡紅羅曲柄傘一銷金紅羅傘二繡團紅羅扇二青羅孔雀團扇二立𤓰二對卧𤓰二對骨朶一對吾杖二對條纛二桿旗八執馬三對多羅貝勒銷金紅羅傘二繡團紅羅扇二立𤓰一對卧𤓰一對骨朶一對吾杖一對條纛一桿旗六執馬二對固山貝子銷金紅羅傘一繡團紅羅扇二立𤓰一對骨朶一對吾杖一對條纛一桿旗六執鎮國公銷金紅羅傘一青羅孔雀扇一骨朶一對吾杖一對旗六執輔國公銷金紅羅傘一青羅孔雀扇一骨朶一對吾杖一對旗四執八年五月定世子儀仗繡紅羅曲柄傘一銷金紅羅傘二繡紅羅圓傘一繡紅羅圓扇二繡孔雀青羅圓扇二立𤓰四卧𤓰二骨朶二吾杖四大纛一條纛二小旗八大刀二馬六九年七月定諸王世子大朝常朝及京城内行走儀仗和碩親王繡紅羅曲柄傘一柄繡紅羅圓傘二柄繡紅羅圓扇一對立𤓰二對卧𤓰二對骨朶二對吾杖二對馬四匹多羅郡王紅羅銷金傘二柄繡紅羅圓扇一對立𤓰二對卧𤓰一對骨朶一對吾杖二對馬二匹世子馬匹較郡王多二用馬四匹其餘儀仗俱與郡王同順治九年題准親王紅羅繡花曲柄傘一柄紅羅銷金傘二柄紅羅繡花傘二柄紅羅繡花扇二把青羅繡孔雀扇二把立𤓰二對卧𤓰二對骨朶二對吾杖二對大纛二桿條纛二桿旗十桿大刀二口豹尾鎗二桿馬六匹京城内止用曲柄傘一柄繡花傘二柄繡花扇二把併立𤓰卧𤓰骨朶吾杖馬四匹世子紅羅繡花曲柄傘一柄紅羅銷金傘二柄紅羅傘一柄紅羅繡花扇二把青羅繡孔雀扇二把立𤓰二對卧𤓰一對骨朶一對吾杖二對大纛一桿條纛二桿旗八桿大刀二口馬六匹京城内止用銷金傘二柄繡花扇二把併立𤓰卧𤓰骨朶吾仗馬四匹郡王紅羅繡花曲柄傘一柄紅羅銷金傘二柄紅羅繡花扇二把青羅繡孔雀扇二把立𤓰二對卧𤓰一對骨朶一對吾杖二對條纛二桿旗八桿馬六匹京城内止用銷金傘二柄繡花扇二把併立𤓰卧𤓰骨朶吾杖馬二匹貝勒紅羅銷金傘二柄紅羅繡花扇二把立𤓰一對卧𤓰一對骨朶一對吾杖一對條纛一桿旗六桿馬四匹京城内止用銷金傘一柄立𤓰卧𤓰骨朶吾杖貝子紅羅銷金傘一柄紅羅繡花扇二把立𤓰一對骨朶一對吾杖一對條纛一桿旗六桿京城内止用立𤓰骨朶吾杖鎮國公紅羅銷金傘一柄青羅繡孔雀扇一把骨朶一對吾杖一對旗六桿京城内止用骨朶吾杖輔國公執事與鎮國公同鎮國将軍輔國将軍奉國将軍執事仍照崇徳元年定例康熈六年題准親王郡王轎夫執事人用繡團獅子緑縀衣貝勒以下及公以上轎夫執事人用素緑縀衣康熈十八年二月禮部題多羅郡王執事比多羅貝勒執事止多曲柄傘一把孔雀扇二把立𤓰二桿吾杖二桿條子纛一桿旗二桿馬二匹今長子執事比多羅貝勒執事應添孔雀扇一對吾杖一對其餘執事俱與多羅貝勒執事同奉㫖依議康熈二十四年十一月諭大學士等王等皆用紫韁乘騎或以紫韁濫給㣲賤之人乗用又其甚者遂至給與外省官員商賈等軰不待敝壊而更新騎用者至多大悖儀典良由未經定例以至於是王等既束用金黄帶若騎用金黄韁則不得妄給㣲賤而等威辨矣其令宗人府㑹同禮部定例議奏十二月宗人府禮部遵㫖議覆王等應用金黄色馬韁其紫色馬韁原非定例當用應禁止得㫖郡王之長子貝勒貝子著用紫色馬韁餘如議凡排設儀仗崇徳元年定赴御前不准排設順治九年題准出京城俱排設遇元旦萬夀冬至大朝日除纛旗外餘俱排設儀仗至下馬牌止凡輿馬順治九年定親王乗轎馬至午門外下郡王至午門前両旁樓角下貝勒以下在闕門外下馬牌處下親王以下貝勒以上坐八人明轎貝子以下輔國公以上坐四人明轎貝勒貝子公坐轎至皇城外易馬入願騎馬者聽親王旗鎗五對攢竹樺皮桿長八尺上安鐵鎗頭下有鐵䂎樺皮鎗帽飾以紅纓繫雲緞旗長三尺濶二尺三寸上銷金雲蟒豹尾鎗一對硃紅攢竹竿長八尺一寸畫三色金雲蟒上安鍍金鎗頭下有鐡䂎紅油鎗㡌畫五色雲蟒飾以紅纓下懸豹尾纛二對以縀為旗紅縀火熖邉長三尺三寸濶七尺五寸上銷金雲蟒硃紅薫竹竿長一丈四尺間纒以藤下釘鐵篐上安鍍金頂飾以紅纓大刀二口吾杖二對硃紅攢竹為之長七尺両末貼金銅篐瀝粉貼金雲二叚立𤓰二對硃紅攢竹柄長五尺三寸貼金銅篐刻木為𤓰立置於上承以龍頭𤓰及龍頭俱瀝粉貼金卧𤓰二對刻木為𤓰卧置於上柄長五尺五寸餘制同立𤓰骨朶二對硃紅攢竹柄貼金銅篐刻木為骨朶承以龍頭貼金飾共長七尺紅繡曲柄傘一把頂徑五尺冐以紅羅垂三簷繡五龍風衣二件帯二條傘骨三十二根竹鐡相間硃紅攢竹柄長九尺五寸柄曲處用鐡心貼金龍頭承傘頂安金木葫蘆紅繡花傘二把紅羅為之上繡四季花直柄長九尺餘制同曲柄傘紅瑞草傘二把紅羅為之上銷金瑞草餘制同紅繡傘紅繡扇一對心高二尺三寸濶二尺三寸五分面背皆紅羅面繡四季花背銷金團花硃紅合竹柄長九尺二寸黑繡扇一對面背皆皁羅面繡孔雀背銷金團花餘制同紅繡扇明轎一乗面濶二尺二寸進深一尺八寸高三尺三寸地平濶二尺二寸進深二尺九寸俱施羊肝漆灑金上下雕玲瓏花卉直竿二根各長一丈五尺横竿二根各長六尺二寸肩扛四根各長五尺撑竿二根各長一尺八寸俱紅漆貼金飾暖轎一乗銀頂金黄葢幨紅幃緞氊隨時通高六尺餘制與明轎同紅布幰衣油綢雨衣各一件郡王旗鎗四對硃紅攢竹竿各長八尺貼金雲蟒上安鐡鎗頭下有鐡䂎紅油鎗㡌畫五色雲蟒飾以紅纓懸雲縀銷金雲蟒旗纛一對以下諸制俱同親王儀仗惟曲柄傘繡龍四吾杖二對立𤓰二對卧𤓰一對骨朶一對紅繡曲柄傘一把紅瑞草傘二把紅繡扇二把黑繡扇二把明轎一乗暖轎一乗紅葢幨幃餘同前制乾隆四十六年諭嗣後阿哥内經朕加㤙封為王貝勒貝子公者毋庸由諸王貝勒等藍甲内均匀攤出給與著加㤙照所封品級另給一分藍甲如此辦理封爵之阿哥等不分諸王貝勒藍甲而諸王貝勒養贍伊等所屬應得分例自然足用尤為有益順治五年七月定諸王貝勒貝子公和碩格格等應用金噐數目親王和碩福晉金鞍各限一噐皿不限郡王瓶一鐺二茶筩二酒罇二餘小噐不限貝勒鐺二茶筩二酒罇一碗三盤三餘小噐不限貝子鐺茶筩酒罇各一碗二盤二公碗盤各一和碩格格等鐺茶筩酒罇各一碗盤各三酒盃盞不限公主王妃等儀仗貴妃車制附凡公主以下儀仗崇德元年定固倫公主清道旗一對紅杖一對吾杖一對銷金紅傘一柄青扇一把拂子一對金唾盂一金水盆一轎車紅葢紅幃青鑲葢角青垂簷和碩公主紅杖一對吾杖一對銷金紅傘一柄青扇一把拂子一對金水盆一轎車紅葢紅幃藍鑲葢角藍垂簷以上赴朝或坐轎或坐車止用傘扇紅杖吾杖郡主吾杖一對銷金紅傘一柄青扇一把拂子一對轎車青葢青幃紅鑲葢角紅垂簷赴朝或坐轎或坐車止用傘扇吾杖縣主紅杖一對銷金紅傘一柄拂子一對車青葢藍幃紅鑲葢角紅垂簷赴朝坐車止用傘紅杖郡君紅杖一對銷金青傘一柄車藍葢藍幃紅垂簷赴朝坐車用傘紅杖縣君紅杖一對車藍葢藍幃紅鑲青垂簷赴朝坐車用紅杖鄉君車藍葢藍幃紅鑲青垂簷順治四年正月定公主格格儀仗公主大旗二桿吾杖一對立𤓰一對卧𤓰一對骨朶一對繡花青扇一對繡孔雀紅扇一對繡寳花紅傘二柄曲柄傘一柄轎車紅頂紅幔頂上四角鑲邉及垂簷俱用青和碩格格大旗二桿吾杖一對立𤓰一對骨朶一對繡孔雀紅扇一對繡寳花紅傘二柄轎車紅頂紅幔頂上四角鑲邉及垂簷俱用藍多羅格格吾杖一對立𤓰一對繡花青扇一對繡寳花紅傘一柄轎車青頂青幔頂上四角鑲邉及垂簷俱用紅多羅貝勒女多羅格格轎車青頂藍幔頂上四角鑲邉及垂簷俱用紅固山格格轎車藍頂藍幔紅垂簷鎮國公女格格轎車藍頂藍幔青鑲紅垂簷輔國公女格格轎車藍頂藍幔紅鑲青垂簷按㑹典九年題准例即係四年所定不復載康熈六年題准公主郡主轎夫執事人用繡團獅子緑縀衣縣主轎夫執事人用素緑縀衣三十年定固倫公主轎車金黄葢紅幃紅鑲葢角金黄垂簷和碩公主轎車紅葢紅幃金黄鑲葢角金黄垂簷郡主轎車紅葢紅幃青鑲葢角紅垂簷縣主轎車紅葢紅幃藍鑲葢角藍垂簷郡君車紅葢藍幃藍鑲葢角紅垂簷縣君車青葢青幃紅鑲葢角紅垂簷鎮國公女鄉君車青葢青幃藍鑲葢角紅垂簷輔國公女鄉君車青葢藍幃紅垂簷凡公主以下鄉君以上慶賀及赴朝儀仗康熈六年定儀仗至紫禁城止公主等至下馬牌下轎車其隨入婦女名數固倫公主五名和碩公主四名縣主三名郡君二名縣君一名乾隆五十一年七月詔向來親王郡王固倫公主和碩公主門上總管首領太監俱無給與頂戴之例但親王郡王為宗潢屏翰公主係皇帝親女其諳逹太監總管首領太監内即酌量給與頂戴一人尚不為過分嗣後親王郡王固倫公主和碩公主太監内各准給八品頂戴一人将名姓報禮部内務府備查不得私有増益至固倫公主和碩公主一切禮儀䕶衛㑹典内並未定有等級嗣後固倫公主品秩著視親王和碩公主著視郡王其額駙品級頂戴著照㑹典舊例公主纛一對硃紅薫竹竿長一丈三尺間纒以藤下有鐡䂎上安鍍金頂飾以紅纓懸素縀旗紅繡曲柄傘一把紅縀為之上繡寳相花餘制與親王曲柄傘同紅繡花傘二把直柄餘制同曲柄傘紅繡