body:
  text: 欽定四庫全書欽定八旗通志卷一百八十八人物志六十八大臣傳五十四䝉古正藍旗徹阿濟拜畢布爾哈圖竒塔特爾貝立克圖都納延㤗琿錦唐喀祿秦布徳福䝉古鑲藍旗甘阿濟拜阿濟拜䝉古正藍旗人先世居巴林姓卓特阿濟拜初任佐領天命三年太祖髙皇帝取明撫順班師明總兵張承廕自廣寜襲我軍後阿濟拜隨貝勒阿巴泰擊卻敵衆四年明總兵杜松由撫順來犯界藩阿濟拜復隨貝勒擊敗之七年從大兵征廣寜敗明兵於沙嶺天聰三年太宗文皇帝征明燕京阿濟拜任叅領畧通州斬哨卒五獲馬四進薄燕京同叅領卾羅塞臣等擊敗明廵撫袁崇煥兵九年命同䕶軍統領布哈率八十人畧明邉境至寜逺擒七人獲馬四十牛百餘還出邊六十里明兵千人追至布哈與戰沒於陣阿濟拜同巴圖魯哈談等還擊敗敵䕶所獲以歸分賜有差叙功授騎都尉世職崇徳六年隨鄭親王濟爾哈朗圍明錦州明年錦州既下以䕶軍統領卾羅塞臣曽先破敵陣諸將隠其功並論罪阿濟拜應鞭責上以諸將圍城日久勞苦有功皆免之順治元年四月大兵入山海闗敗流賊李自成阿濟拜署副都統為後隊尋同都統伊拜剿賊山西至澤州連破賊營十一月擢正藍旗䝉古副都統二年三月叙入闗功加一雲騎尉三年隨肅親王豪格征流賊張獻忠過漢中同都統巴哈納擊走叛鎮賀珍進趨秦州同尚書星訥擊敗賊將髙汝礪獲馬驘百餘進擊獻忠於西充與䕶軍統領阿爾津蘇拜連挫賊衆五年叙功晉三等輕車都尉三遇恩詔晋一等輕車都尉兼一雲騎尉九年八月以老疾命解副都統任尋卒賜祭葬如典禮謚忠勤立碑於墓以其弟卾兌襲職布爾哈圖布爾哈圖䝉古喀喇沁人姓博爾濟吉特初為其部貝勒天聰三年六月遣使納貢九月來朝十月太宗文皇帝親統大軍征明以布爾哈圖前在喀喇沁時曽往來明國習知闗隘使為我師嚮導於是入明邉攻克龍井闗及洪山口大安口等城撫定羅文峪十一月大軍克遵化上命貝勒杜度駐兵守之復命布爾哈圖分駐羅文峪四年正月明副將丁啟明等率兵三千來犯布爾哈圖勒兵邀擊敵衆敗奔退歸營堡翼日進兵奪其堡奮擊大破之陣擒啟明及遊擊以下官三員斬獲無算賜號岱逹爾漢五年正月詔以貝勒阿巴秦女妻之三月上親征察哈爾布爾哈圖與土黙特部貝勒等並率所屬從征遇察哈爾叛逃䝉古刦土黙特西蘭圖部下人畜布爾哈圖追擊斬之足被創尋挈其所部人戸來歸𨽻䝉古正藍旗崇徳元年叙功予一等子爵世襲㒺替順治元年卒子班珠勒襲後遇恩詔晋爵至一等伯竒塔特徹爾貝子卾諾勒竒塔特徹爾貝姓哈爾圖特初為察哈爾宰桑天聰六年太宗文皇帝親征察哈爾其汗林丹聞大兵至驚遁所部皆潰㪚竒塔特徹爾貝别率四百户駐哈屯河上遣使招之即渡河來歸賜賚優厚𨽻正藍旗䝉古崇徳元年予三等子爵三年九月隨大軍征明由青山口入邉越燕京畧山東四年三月凱旋以部下佐領額珠文等過三屯營時取敵糧為敵所困額珠文及甲士一人從役一人並遇害竒塔特徹爾貝未及援罰馬如例九月隨大軍征明寜逺以火攻其城敵出城禦戰竒塔特徹爾貝率所部擊卻之六年大軍圍錦州明總督洪承疇集兵赴援營於松山西北我左翼三旗㑹擊竒塔特徹爾貝率衆奮戰大㨗既而敵以騎兵刦我紅衣礮竒塔特徹爾貝移兵擊之潰旋復偕衆破敵三營歩兵七年叙功晋二等子順治元年隨睿親王多爾衮入山海闗擊敗流賊李自成追至望都三年蘇尼特部騰機斯等叛奔喀爾喀竒塔特徹爾貝隨豫親王多鐸往征之行次英噶爾察克山聞騰機斯在衮噶魯台星夜疾追獲其孥於卾克特山時喀爾喀部土謝圖汗以衆二萬拒大軍於扎濟布拉克竒塔特徹爾貝率所部邀擊追北三十餘里詰旦碩雷汗亦以二萬衆至竒塔特徹爾貝復率兵擊之皆潰遁四年叙功晉一等子九年遇恩詔予世襲㒺替十二年奉敇往喀爾喀部宣諭土謝圖汗車臣汗等以其遵㫖弗違誓辭還奏康熙三年四月卒賜祭葬如例子卾諾勒襲爵兼任佐領十八年以恭領隨䕶軍統領莾吉圖征海賊鄭錦卒於軍恩卹如例子索諾木襲爵畢力克圖畢力克圖姓博爾濟吉特世居科爾沁太宗文皇帝時來歸𨽻䝉古正藍旗任豫親王多鐸䕶衛隨征朝鮮及明錦州屢有斬獲順治元年隨豫親王追剿流賊李自成於潼闗明年定西安移師由河南進拔揚州下江寜畢力克圖署䕶軍叅領所至克敵有功四年授騎都尉世職六年擢正藍旗䝉古副都統時大同總兵姜瓖叛畢力克圖奉命率兵駐防平陽偕巴圖魯羅多渾勦太平縣賊遇賊黨郭中傑引賊衆冦絳州擊敗之又敗賊騎千餘於張湖村七年同西安協領根特等率師圍太平城賊負固抗拒逾二旬不下乃因城壕掘地道燃火藥以隳其城師入叛賊李建泰及賊黨俱伏誅八年正月兼任禮部左侍即屢遇恩詔晉世職至一等輕車都尉十年四月調戸部左侍即十一年六月隨靖南將軍珠瑪喇征廣東時明桂王朱由榔將李定國由廣西犯廣東據新㑹縣左之山峪畢力克圖同䕶軍統領敦拜擊潰其衆復與副都統卾拜䕶軍統領賚塔攻其巢定國大敗溺水死者無算乘勝追至興業縣遇其都督呉三省總兵楊成王三才等率歩兵千餘拒戰斬殺過半進抵横州定國渡江逺竄凱旋叙功晉爵三等男十三年以員外即朱世徳司𣙜河西務虧缺税銀户部誤援恩詔赦免部臣俱坐降革畢力克圖罷侍即任降世職為二等輕車都尉十七年雲南既平由榔竄緬甸定國與其黨白文選等分駐孟艮木邦上命内大臣公愛星阿為定西將軍畢力克圖署䕶軍統領率師赴雲南同平西王呉三桂相機征剿十八年十一月㑹師木邦定國先奔景線文選遁據錫箔江濵聞我兵至毁橋遁畢力克圖與前鋒統領白爾赫圖等先至江岸獲其諜者大軍結筏渡江越十日次舊挽坡距緬城六十里緬人謀擒獻由榔請大軍留駐以百人進蘭鳩江濵為扞衛于是白爾赫圖率前鋒遄往畢力克圖率䕶軍二百隨其後緬人以由榔獻乃旋軍時白文選為總兵馬寜等追及于猛養率衆降畢力克圖撫其衆移入邉境康熙三年叙功晉世職為一等輕車都尉兼一雲騎尉八年擢正藍旗䝉古都統列議政大臣十二年五月詔以畢力克圖屢從征伐著有勞績加太子少師十四年三月授平逆將軍時叛鎮王輔臣附逆藩呉三桂作亂據平凉肆掠陜西郡邑上命畢力克圖帥師駐大同尋延安綏徳皆䧟賊諭進駐榆林畢力克圖既帥師移駐偵知賊衆三千餘屯楊家店渡口乃分兵三隊乘夜疾進黎明鳴角渡河賊不虞我師之至也悉驚駭潰竄遂復呉堡縣城進師虎耳崖口遇賊衆復擊敗之偽遊擊黄文英偽總兵朱龍俱遁綏徳平進征延安賊將李士英等棄城遁畢力克圖令副都統覺和託率兵追擊至宜川俘斬無算自駐延安城招撫附近城邑保安安塞宜川延長安定諸縣皆復奉命移師㑹揚威將軍哈宻逹征平凉將至王輔臣驅賊萬餘迎戰畢力克圖督兵合擊陣斬偽總兵郝天祥及賊衆無算距城數里駐營十五年上遣大學士圖海為撫逺大將軍征平凉命畢力克圖率所部前鋒赴寜夏統轄滿洲䝉古兵防剿圖海至平凉王輔臣降畢力克圖還駐平凉十七年移兵守隴州寳雞諸路賊倚仰天池髙山為巢畢力克圖進兵剿除招降靈䑓華亭崇信等縣及偽叅將李天秀等三十一員兵二千餘賊復據寳雞縣之蟠龍山分三隊來犯又偽副將胡長腿據顯義關山坡列陣距戰畢力克圖以兵兩路合擊大敗賊衆十八年上以畢力克圖出師日久年已衰邁召還京先是圖海議分兵四路取漢中興安令畢力克圖同提督孫思克恢復畧陽至是已進征圖海以奏上命俟漢中興安恢復撤回畢力克圖先取成縣招降偽副將王光生等十九員兵三百六十餘名㑹提督趙良棟已復畧陽與將軍王進寳並定漢中圖海亦定興安遂班師十九年還朝仍任都統二十年六月卒年七十有三予祭𦵏謚恪僖孫常逺襲職二十五年追叙陜西軍功晉二等男世襲納延泰納延泰䝉古正藍旗人姓薩爾都克雍正元年正月由理藩院筆帖式授主事四月遷員外即三年遷即中五年擢額外侍即七年署太僕寺卿内閣學士九年授叅賛大臣命赴北路軍營十年實授理藩院侍即署鑲紅旗䝉古都統時台吉策旺多爾濟等私易赴調兵兵多逃詔納延泰選補缺額逃者嚴加治罪並將策旺多爾濟等貽悞之由諭各扎薩克等知警㝷命選卾爾多斯兵赴軍十一年同喀爾喀扎薩克圖汗等議駐兵備邉十二月署工部侍即兼理上駟院事乾隆二年擢理藩院尚書鑲藍旗䝉古都統軍機䖏行走尋加太子少保十六年充方畧館副總裁二十一年命赴北路軍營查辦軍務二十五年諭曰成衮扎布以原任喀爾喀台吉旺沁多爾濟不往軍前一事請示於部該部大臣等並未恭奏且召見詢問時納延泰仍推諉巧辯甚屬非是著革去尚書尋授理藩院侍即仍管都統事二十七年正月患病遣醫眕視尋卒賞銀五百两治䘮五月奉㫖納延泰之子惠齡着加恩以部院主事用是月以納延泰前在都統任内失察章京西寜等私用印文冐領銀两事發諭曰鑲藍旗䝉古印務章京西寜等結黨營私冐領銀兩種種作弊朕已降㫖嚴審治罪矣但納延泰管理此旗多年此等事件並未查出直如木偶前伊病故時朕尚念其舊臣賞賜銀两復加恩將伊子錄用主事今西寜等種種弊端俱係納延㤗管都統時全不以公事為意自以為年老在世㡬何不過搪塞完事而已甚屬不堪若伊本身現在朕必重治其罪今伊雖故未便仍留其都統職銜及塋内碑碣着革去職銜作為庶人所有賞給立墳建碑等項俱着撤回併將所立碑碣撲毁五十三年諭曰納延泰從前辦理鑲藍旗䝉古都統事務因未允協病故後追問其罪將伊職銜盡行革去但念納延泰効力行走多年現今伊子惠齡又屬効力行走着施恩將納延泰原有職銜俱准開復惠齡現官廵撫唐喀祿唐喀禄䝉古正藍旗人姓他塔拉雍正十三年由筆帖式授理藩院堂主事乾隆六年遷員外即十九年七月賞給副都統銜赴北路軍營管理新降輝特台吉阿睦爾􅐰納班珠爾等游牧二十年正月奏班珠爾屬多老稚不能耕恐飢餒軍機大臣劾其冐凟諭曰班珠爾等投誠以來朕屢次施恩現距夏秋尚逺果有必湏接濟之䖏朕自加恩賞給何必預為陳請前以唐喀禄尚能通曉䝉古言語是以賞給副都統銜俾照管阿睦爾􅐰納等游牧乃一切未能盡心徒事𤨏屑著即撤回仍在員外郎上行走尋奏留同理游牧之扎薩克林丕勤多爾濟諭曰衆厄魯特俱隨大軍進剿游牧䖏復有何事唐喀禄擅將將軍調遣之人不行發往甚屬可惡著該部嚴察議奏尋議照溺職例革職得㫖唐喀禄不應僅予革職在家安居著交理藩院作為筆帖式行走不必給與頂帶九月給還員外郎原職命䕶送濟隆呼圖克圖由巴林赴伊犁十二月管理定邉右副將軍薩喇爾游牧二十一年四月諭曰北路軍營辦事乏人員外即唐喀祿尚諳䝉古事務著賞副都統銜授為領隊大臣隨同哈逹哈辦事五月命率駐防扎布堪兵一千隨大軍赴哈薩克索叛賊阿睦爾撒納七月賊固爾班和卓潛遁烏梁海唐喀祿報定邉右副將軍哈逹哈馳剿擒之得㫖嘉奬授副都統賜孔雀翎尋阿睦爾􅐰納黨逹瓦藏布由額爾齊斯糾烏梁海博博等肆刼唐喀祿以兵五百授索倫總管卾博什擒降其衆三百餘又咨㑹副都統舒赫徳派兵赴額爾濟斯駐防閏九月命駐科布多辦事十一月奏言科布多地近卡倫兵丁不敷差遣請於撤回大軍及臺站兵内酌留二百名報聞十二月授理藩院侍即尋補鑲藍旗䝉古副都統二十二年二月奏言輝特降衆自遷至扎克賽地方自相刼掠且係阿睦爾􅐰納親屬請遷往呼倫貝爾齊齊哈爾等䖏又巴勒濟得木齊亦願遷往察哈爾詔如所請尋授叅賛大臣偕杜爾伯特汗策凌等堵剿噶勒雜特賊衆三月奏言喀爾喀地方現有扎哈沁特楞古特竒爾吉斯烏爾罕濟蘭人等約萬餘日久難免滋事請將扎哈沁人移駐卡倫内特楞吉特竒爾吉斯烏爾罕濟蘭人給東三省兵丁為奴上可其奏是月擒輝特逃賊策卜登多爾濟等諭部議叙四月奏請移杜爾伯特游牧於烏蘭固木得㫖俞允並奬其辦理妥協時西路大軍剿叛賊哈薩克錫喇命唐喀祿以兵駐額爾齊斯為聲援㑹阿睦爾􅐰納自哈薩克竄歸為西路軍所敗諭偕喀爾喀郡王品級車木楚克扎布留心堵剿八月奏言臣等辦理阿睦爾撒納所留種地之烏梁海等䖏途次偵杜爾伯特貝勒巴圖博羅特台吉阿喇善等潜與阿睦爾􅐰納通臣遣兵趨擒之于輝巴朗山後並剿滅烏梁海五十餘戸現領兵赴塔爾巴哈台搜拿阿睦爾撤納及哈薩克錫喇諭曰唐喀祿等和𠂻商辦甚合機宜著交部議叙并將御用荷包鼻烟壺加恩賞賜九月諭曰據兆惠奏唐喀祿等咨報選兵三百名令瑚爾起進剿餘兵即行撤回唐喀祿等係特派擒剿哈薩克錫喇之人到塔爾巴哈台等䖏輙行撤兵殊屬乖謬著交部嚴加議䖏至唐喀祿等撤回兆惠已經具奏而伊尚未奏到是又必自分彼此仍留北路具奏以致遲滯耳尋唐喀禄奏至言糧不敷馬乏已遵前㫖撤兵諭曰朕屢諭伊等追擒哈薩克錫喇何嘗令其撤兵即有豫籌撤兵之語亦謂交辦事竣之後耳豈現諭擒賊而即令撤兵耶唐喀祿若但歸咎於口糧馬力將兵撤回不過交部議處乃竟以遵㫖撤兵餙詞取巧僅予議處不足示懲著革侍即副都統職降為藍翎侍衛交納穆扎爾差遣効力十月諭曰據烏梁海人等告稱阿爾台以外逸賊頗多已諭䕶送哈薩克來使之和碩齊詳細搜查著𫝊諭納穆扎爾等派唐喀祿帶兵二百同侍衛二人赴彼䖏適中之地駐劄一有信息即行接應唐喀祿係獲罪之人今令効力自贖宜知奮勉十一月命協剿巴哈曼集等賊衆尋以阿睦爾撤納竄俄羅斯命偕和碩齊駐額爾齊斯等處偵禦二十三年正月諭曰阿桂等奏稱和碩齊唐喀祿遵㫖將哈薩克使臣送至邉界即前往額爾齊斯之和尼邁拉呼布空郭勒地方堵剿沙喇伯勒逋逃賊衆著傳諭伊等奮勉擒剿勿致兎脱三月定邉將軍兆恵奏土爾扈特舍稜等謀竄俄羅斯命唐喀祿與和碩齊速往堵剿四月偵舍稜伏阿古爾哈爾海率兵追至布固圖河舍稜弟勞章扎卜被擒詭為兄乞降唐喀祿未信和碩齊遽縱之還越日舍稜詭約降且獻酒和碩齊飲之凂唐喀祿造其營賊忽譟唐喀祿及侍衛富錫爾穆倫保佛爾慶額力戰均遇害和碩齊更衣降賊恭贊大臣阿桂以聞諭曰唐喀祿雖一時被誘遇害尚能奮勇捐軀深可憫惻著交部照陣亡副都統例議卹侍衛富錫爾穆倫保佛爾慶額等亦著交部議卹俱給世職尋命入祀昭忠祠給騎都尉世職子唐岱襲富錫爾佛爾慶額滿洲鑲黄旗人穆倫保滿洲正白旗人均入祀昭忠祠其子襲雲騎尉徳福徳福䝉古正藍旗人姓巴魯特乾隆十三年由前鋒派往金川軍營十四年撤還授前鋒校二十年從征逹瓦齊二十三年隨將軍兆惠剿逆回霍集占於葉爾羗師旋叙功賞給雲騎尉世職二十六年授副前鋒叅領三十二年赴雲南軍營賜戴孔雀翎題補東川營叅將將軍明瑞擊賊于蠻結猛育等䖏徳福均在事有功遷騰越營副將三十三年擢鶴麗鎮總兵三十四年偕侍衛巴朗克車徳等剿賊於猛戛賊酋苗温等敗遁斬獲甚衆尋隨大軍進攻老官屯賊據寨以死拒徳福身先督戰被創死之經畧傅恒以聞諭曰總兵徳福身先士卒奮勇捐軀深為軫惻着入祀旌勇祠應得卹典該部察例具奏尋賜祭𦵏如例並命入祀昭忠祠子音徳赫廕都司襲雲騎尉甘都甘都先世居葉赫遷巴林因以巴林為氏太祖高皇帝時率子弟來歸授佐領𨽻鑲藍旗䝉古太宗文皇帝天聰元年從征寜逺擊敗明兵於城北山岡追逐至壕塹三年從征明攻克大安口敗敵玉田縣上親統師取遵化簡將士駐守甘都與焉明年大軍棄遵化出邉甘都為殿擊敗追襲敵兵八年予三等輕車都尉世職擢任兵部恭政崇徳三年考滿晋世職為二等輕車都尉尋以裁叅政改兵部理事官隨貝勒岳託征明北京擊敗明總兵祖大夀及太監髙起潜等軍進趨山東攻克濟南府城明年春師還取道蠡縣復克其城叙功晋一等輕車都尉㑹佐領傅喀争濟南先登功引甘都為証甘都坐附和罰鍰五年從征瑚爾哈部有索倫兵五百據掛拉爾屯甘都同承政索海理事官喀喀穆率兵攻破其栅斬級二百生擒一百三十人以歸六年大軍圍錦州明總督洪承疇列營松山屢以歩騎來犯甘都皆擊敗之恭順王孔有徳之長史徐勝芳為敵所困甘都突入陣援之出七年錦州下部議諸將徇隠軍士失律罪甘都應罰鍰得㫖寛免仍叙功加一雲騎尉順治元年四月隨睿親王多爾衮入山海闗擊敗流賊李自成十二月隨豫親王多鐸由河南征陜西屢敗自成賊衆遂克潼闗取西安二年五月移師征江南同都統恩格圖瑪拉希等取宜興崑山二縣叙功晋三等男三年隨端重親王博洛征浙江追剿明總兵方國安於黄巖環城困之偵賊勢既蹙撤圍一面縱其出遁擊之賊皆潰城遂㧞大軍進征福建甘都先衆攻克分水闗追剿明唐王朱聿鍵於汀州招降漳州府及漳平縣五年上命都統譚泰為征南大將軍討叛鎮金聲桓甘都署前鋒都統率兵赴江西遇恩詔晋二等男尋以疾卒於軍子武山布襲爵琿錦琿錦姓薩爾圖世居敖漢部當太宗文皇帝收服敖漢時琿錦隨衆來歸迷失路竄入明錦州崇徳六年大兵圍錦州琿錦同䝉古台吉諾木齊武巴什等縋城來降授騎都尉世職𨽻鑲藍旗䝉古任叅領順治元年四月隨睿親王多爾衮入山海闗擊流賊李自成署副都統事督後隊兵有功加一雲騎尉六月與都統覺羅巴哈納征山東七月移師山西偽伯陳永福據太原琿錦单騎畧城下城中兵突出琿錦擊敗之已而我軍攻克太原城其屬五州十縣皆降以功賚白金二年同都統都類剿自成於武昌追至九江口獲賊船明年隨肅親王豪格征流賊張獻忠時叛鎮賀珍擾漢中以歩騎二千據雞頭闗琿錦率右翼兵隨貝勒尼堪擊敗之珍遁走追斬無算遂進征四川同都統巴特瑪等屢擊敗獻忠拒戰賊衆獻忠既滅移師涪州與䕶軍叅領希爾根擊賊袁韜於涪江西岸賊皆潰竄五年叙功晋三等輕車都尉尋擢鑲藍旗䝉古副都統隨鄭親王濟爾哈朗征湖南時明福王朱由榔將馬進忠王進才袁宗第等盤踞寳慶沅州六年琿錦同前鋒統領努山副都統拜音岱等攻克寳慶破其營遂征沅州領本旗兵進擊扵洪江斬其總兵二副将四兵二千餘獲船九七年凱旋得優賚三遇恩詔晋一等輕車都尉兼一雲騎尉十五年隨信郡王多尼征雲南朱由榔與其將李定國等敗竄永昌十六年四月大軍克永昌渡潞江定國設伏磨盤山我師既破其木栅琿錦同都統沙理布乘勝追擊遇伏力戰歿於陣賜祭葬如典禮謚曰壮勤兄子古錫襲職秦布秦布䝉古鑲藍旗人姓烏朗罕濟勒們世居喀爾沁地方康熙二十三年襲其祖圖馬賴所遺二等輕車都尉四十四年四月授恭領十一月授鑾儀使五十九年遷滿洲鑲紅旗副都統雍正二年調䝉古鑲紅旗副都統五年遷䝉古鑲藍旗都統七年署正紅旗䕶軍統領八年授陜西西安將軍九年七月疏言西安額設兵丁八千今戸口繁滋將及四萬請於滿洲餘丁内選一千令其當差遇有調遣䖏照馬兵例派往俟兵事告竣陸續裁汰從之十三年五月奏涼州駐防兵二千名内請選精壮者二百為前鋒西寜一千名内選一百為前鋒滿洲八旗两翼並分設協領一員䝉古八旗两翼並合設恊領一員滿洲每旗佐領並設一員䝉古佐領涼州則每旗分設一員西寜則两旗合設一員其管理行文事件之筆帖式涼州設三員西寜設二員西寜副都統事務繁多應於協領内㨂選一員協辦涼州將軍衙門照依西安例設二司其將軍副都統印信二司闗防恊領條記請交部鑄給至官兵俸餉口糧等項照西安例支領軍機大臣議行乾隆元年正月奏請涼州西寜两䖏添設歩兵一千並請將西寜滿洲兵移駐莊浪四月請將西安兵四千改為鳥鎗兵均得㫖允行三年三月奏言原例窩逃之地方人等處分甚嚴地方官亦有責任嗣因都統塞徳奏准逃人在地方居住未及一年若不知情地方官並窝家俱免議致兵丁跟役逃亡益甚請仍照原例嚴加議䖏下九卿議覆從之五年三月以年老休致八月西安將軍綽爾多劾秦布前在將軍任内違例徇情將兵丁錢糧撥給額外筆帖式部議革職八年八月卒欽定八旗通志卷一百八十八
