body:
  text: 人物志四十二大臣傳二十八滿洲正白旗七永貴烏爾登舒赫徳烏爾登烏爾登滿洲正白旗人姓烏禮蘇父喀喇官至寕夏副都統雍正六年烏爾登由前鋒授藍翎侍衛洊授二等侍衛乾隆六年命御前行走五年授一等侍衛六年補公中佐領八年賞副都統銜赴北路軍營十一年還京授鑲黄旗䝉古副都統十二年遷䕶軍統領十三年四月派赴金川軍營七月由馬奈一路督戰奪賊卡四尋調赴卡撒攻克水碉三層碉雙碉等處及二道山梁十二月經畧大學士傅恒抵軍營令烏爾登還馬奈駐守十四年金川平還京十六年奉㫖督察平糶事宜十八年命赴北路軍營授恭賛大臣駐防烏里雅蘇台十九年正月以扎哈沁宰桑禡木特等䦨入卡倫烏爾登偕喀爾喀副都統策登扎卜率兵五百與恭賛大臣努三等分路查緝總辦卡倫事務九月恭賛大臣薩喇爾徃收烏梁海烏爾登由索郭克接應俘獲甚衆事聞奉㫖優叙給一等功牌二十年二月隨大軍進𠞰凖噶爾先是上以烏爾登等查緝扎哈沁事竣並不徃擒迯犯巴朗又匿所獲烏梁海牲畜諭班第訊問至是諭曰班第奏訊問烏爾登供詞一切推諉俱䣃過於薩喇爾一人夫薩喇爾歸順未久前收獲烏梁海人衆即有搶擄以伊舊染凖夷習俗初降未知法度是以姑為寛容若烏爾登等乃滿洲世僕亦效凖夷之所為是尚可宥乎且烏爾登於收服烏梁海時未将逃人巴爾報出殊屬舛謬又将現有牲畜等物開单呈報伊在軍營已三四年何能将厯年所有一一登記顯係得信隠匿少開數目希圖䣃罪著班第等徹底嚴查毋得任其狡餙四月鞫實擬斬監候得㫖烏爾登前不徃擒巴朗實屬貽悞軍機罪不可逭但念收服扎哈沁烏梁海時伊曾隨同効力著加恩免其治罪仍留軍營以閒散効力贖罪五月授三等侍衛九月授二等侍衛命選厄魯特宰桑厄爾錐音等兵赴伊犁沿途𠞰賊授一等侍衛十二月諭曰此次烏爾登帯領厄魯特宰桑等徃西路軍營行走奮勉着加恩賞給副都統銜在領隊大臣上行走現在進兵𠞰㓕阿巴噶斯哈丹等㳺牧即着領兵前徃二十一年三月叛賊阿睦爾撒納竄哈薩克定西將軍䇿楞遣烏爾登以兵一千隨恭贊大臣玉保追之㑹玉保誤信布庫努特逃人言賊勢窮蹙無煩大軍深入遽引兵還烏爾登追至庫隴癸嶺獲賊黨額琳沁亦還阿睦爾撒納脱走上訓飭之七月逹爾黨阿代䇿楞為将軍偵哈薩克伏山谷中烏爾登以百騎誘之出大軍逆擊大敗之時議策楞玉保等疎縱阿睦爾撒納罪烏爾登以領隊大臣同在軍營革職鎻拿來京上面詰之烏爾登奏臣前聞逆賊逃信即請發兵五百追擒玉保策楞俱謂臣僥倖不允後隨玉保前進復請追拿玉保止發兵五十名至庫隴癸嶺僅餘二十八駝又疲乏逆賊已於臣起行日過嶺竄哈薩克上以其言詢原叅賛大臣扎拉豐阿屬實詔授三等侍衛在乾清門行走㝷命仍赴軍營二十二年六月叛賊扎那噶爾布尼瑪等自額林哈畢爾噶遁哈什河烏爾登偕侍衛瑪瑺襲擊敗之擒其黨羙諾和什二十三年三月隨副将軍富徳擒扎哈沁得木齊哈勒拜等五月定邉将軍兆恵招降布魯特部頭目圖魯啟拜烏爾登奉檄由株木罕至圖固斯塔老宣讀恩㫖皆乞降禡木特呼里比因請遣弟舍爾伯克入覲許之烏爾登即伴送來京二十四年三月擢一等侍衛諭曰現在大軍搜捕嗎哈沁并堵截逆囬霍集占逃路烏爾登著授恭賛大臣與喀爾喀郡王車木楚克扎布為一隊互相策應六月授正藍旗䝉古副都統十月以捕嗎哈沁不力革恭賛在領隊大臣上行走二十五年凱旋賚幣二十八年遷䕶軍統領三十年叙䕶送逹什逹瓦屬衆至伊犁及由烏里雅蘇台觧送伊犁孳生牛羊俱辦理妥協加一級三十一年擢鑲黄旗蒙古都統三十三年授左翼前鋒統領兼管火器營三十五年二月管健鋭營㝷授散秩大臣十二月卒舒赫徳舒赫徳滿洲正白旗人祖徐元夣禮部侍郎加尚書銜謚文定有傳雍正六年舒赫徳由筆帖式授内閣中書十年遷侍讀十三年遷監察御史在軍機處行走乾隆元年七月四川廵撫王士俊宻疏四事上閲疏内有近日條陳惟在翻駁前案語發王大臣等閲㸔舒赫徳因劾士俊妄發狂論請明正其罪詔逮問治罪二年八月奏八旗生齒日繁盛京黒龍江寕古塔三省土沃可墾若将八旗閒散分居三省則京城既多勁旅而根本重地更添丁壮請勅三省将軍勘所屬可墾若干畆可駐兵若干酌定人數按户攤給並請照舊例設公庫各省税務歸併旗員旗地典於民者贖還現存公中收租地分賞無地之家以十年為期次第舉行部議如所請諭曰舒赫徳條奏将各省税務歸併旗員管理甚無識見彼意以為旗人生計艱難若管理税務則可沾餘潤以資飬贍不知國家設立闗隘原以稽察奸宄利益商民並非為收税之員身家計也朕日以砥勵亷隅訓勉臣工尚恐其不能遵奉而可以謀利之見為之導乎况當日旗員管理闗務者亦指不勝屈惟視此以為利藪故貪黷之風侵蝕之弊不一而足因而身罹重譴籍其家産累及子孫是今日旗員之貧乏未必不由於當日收税之所致也豈可使之復蹈前轍且各省委辦税務率多道府等官並無滿漢之别如滿洲有任道府而亷潔自爱者何嘗不可派委而必定以為例乎總之為上者施逮下之仁惟勵以忠勤示以節儉固其根本之圖為下者當早作夜思宣力供職以永受國家恵飬之恩方可謂之計長乆盖厚其生計之道不可不思而長貪風以為恵下則利未見其為利且貽害於後日此理甚明非所以教旗員之道亦並非所以愛旗員之心也初雍正年間京師設官米局收買八旗兵米存貯平糶後議裁市民買米囤積弋利價日昻舒赫徳奏請復設從之三年五月遷内閣侍讀學士四年七月擢副都御史十月奏請秋審緩决五次以上者分别减等發落從之十二月遷兵部侍郎六年三月兼辦歩軍統領事務十月條奏八旗三營事宜一内城九門外城五門設銅鐵炮一千九百餘請令工部兵部擇可用者分置各城殘缺者修整八旗演砲時載徃蘆溝橋騐放一歩軍營向無帳房披甲等廵邏修道遇嚴寒雨雪侵膚請每旗滿洲給帳房二十䝉古漢軍各十一三營盔甲旗幟年乆敝壊應酌留朋扣銀修整每營設鳥鎗百帳房八十一内外營馬草料俱有定價惟三營草豆毎月由五城司坊官開時價報户部户部始行支放兵丁先期稱貸拮据應核實每馬月給銀二両五錢户部按月支放七年六月奏言八旗捕盗歩軍校滿洲三員蒙古漢軍各一員輪流值月遇盗案與本旗副尉一體議處一旗地方遼濶一人值月不能遍及雖有議處之條實無弭盗之益請分滿洲旗為三捕盗歩軍校三員分管蒙古漢軍捕盗歩軍校各一員各管本旗地方以専責成均下部議行十二年五月調户部侍郎十三年四月兼理兵部授正黄旗漢軍都統九月調鑲紅旗漢軍都統軍機處行走七月充㑹典館總裁授兵部尚書㝷調户部管理三庫十二月赴四川軍營疏言沿途驛逓絡繹䝉聖諭酌設筆帖式領催兼司站務而正腰各站經管知縣仍委之書役恐多遲悞請再派筆帖式領催駐站親行逓送從之時大學士傅恒經略金川軍務十四年正月命舒赫徳為恭賛加太子太保師旋留辦軍需奏言督撫咨商皆要務所設驛站應嚴考核請飭各督撫將省㑹相接之衝驛未設専員及逺近不接向無驛站之處如何接續抽設酌限日行里數定為章程報部存案其接連外國要隘亦酌設驛站俾重務不致稽阻下部議行軍需奏銷蕆事命徃雲貴湖廣河南查閲營伍軍装並勘雲南金沙江運銅水道六月奏勘金沙江自新開灘上至黄沙坪銅運無阻其上逰四十餘灘多險蜈蚣嶺等十五灘危險異常仍湏陸運總督張允隨奏報一律開通請交部嚴議所糜帑八萬餘兩着原辦人賠補詔免察議上游糜費銀准将下游節省銀抵補其不足者令張允隨及承辦各員分賠時古州鎮總兵哈尚徳因放水請移建城垣上以城工未便輕遷勅舒赫德相度議奏九月覆奏古州上通都匀下接黎平城西有山水三穿城逹江江水倒漾山水為所阻不能由㴠洞宣洩屢致水患擬於城外掘溝引水入溶江其傍南一水去江較逺仍由冰洞入城将城内行水溝掘寛建石閘隨時啟閉可免水患無庸移城得㫖如所議行十月調兵部尚書十五年六月奏言定例額兵百名内扣名糧二分充營中公用奈繕治軍械廵防路費多不敷該管官每借支存公銀給兵於領餉時按名坐扣餘餉不敷飬贍似應酌給公費查東南山多馳驟難施馬兵可稍减西北馬兵十居八亦可酌裁籐牌兵全無實用請勅督撫提鎮各就營伍情形酌議将公費名粮於馬兵籐牌兵内扣出舊例每百名二分之外請加増数分以偹公用廷議允行十二月赴浙江㑹勘海塘十六年四月命㑹勘永定河七工下口十月㑹審杭州将軍覺羅額爾登婪賘案鞫實觧宗人府治罪十七年正月偕侍郎玉保赴北路軍營防範凖噶爾十八年七月以逹瓦齊戕喇嘛逹爾扎自立凖夷内亂徹防守兵詔舒赫徳回京九月命馳徃銅山辦理黄河决口㝷疏言正河㫁溜淤墊俟水落挑河引溜進埽期冬末竣工至洪湖漲溢工多汕刷督官兵搶䕶将下游之舊南闗白家墩等壩王營减壩開放决范公堤數處以資暢洩奏入報聞又奏言洪湖磚工不能經乆惟石工為有益查江南之洞庭龍潭等山塲及山東嶧縣之花山産石料并近水次易運分咨両省採辦於明嵗二月到工請簡熟諳工程大臣帶工員來江辦理上命侍郎嵇璜徳爾敏徃涖其事十二月奏張家馬路及二閘漫口合龍大溜復歸故道得㫖下部優叙加二級時都爾伯特台吉策凌烏巴什等率衆投誠凖噶爾宰桑瑪木特追之䦨入北路卡倫旋逸出上命舒赫徳赴鄂爾昆軍營先是有㫖令将軍大臣等與薩喇勒查拿瑚圖克等之便招諭凖噶爾烏梁海十九年正月舒赫徳奏報恭賛達青阿誘擒瑪木特薩喇勒擒獲烏梁海得木齊扎木恭瑚圖克等疏至諭曰舒赫徳等奏凖噶爾逹瓦齊復作台吉烏梁海不願歸順已令薩喇勒暫住卓克索地方宣揚兵勢另籌辦理等語竟未喻辦理此事之㫖前令将烏梁海收降招服者非因達瓦齊訥黙庫濟爾噶爾彼此搆釁乘亂而始辦也特因烏梁海追逐䇿凌直入我卡倫若不懲治必致肆意妄行是以令於此時或許歸降或行驅逐一經辦定於地方長乆有益原與達瓦齊之復作台吉與否全無闗渉朕曽降㫖軍營将軍大臣毋得偏執己見致令薩喇勒辦理周章今觀此奏豈非故掣其肘乎若謂薩喇勒馬力疲乏即令其在駐劄處暫為休息未始不可達瓦齊復作台吉之處何必齒及此尤朕所不觧也再瑪木特已經釋放伊若感恩自必來歸如不歸誠必将此事告知伊台吉其台吉豈肯晏然即已勢必遣使前來索取逃人策凌等彼時非發兵征討更無善策在舒赫徳等以為既将瑪木特釋放若扎木恭等亦照此釋放便可無事獨不思堂堂天朝有如是辦理之法乎今凖夷正值力弱舒赫徳尚如此畏怯若遇彼猖獗時伊等不過收入喀爾喀一籌莫展而已俟烏梁海辦竣之後瑪木特若不來歸亦必一律辦理今應如何防範瑪木特之處亦宜預為留心此時惟遵朕屢次所降諭㫖飭諭薩喇勒悉心妥辦舒赫徳倘再行從中阻撓决不寛恕其罪三月奏凖噶爾烏梁海已逺徙俄羅斯界投誠之策凌等暫在推河拜達里克庫爾竒勒等處種地㳺牧詔回京面領諭㫖仍赴軍營四月諭曰舒赫徳此次差徃軍營辦理一切舛謬從前行文凖噶爾達瓦齊一事自應奏聞請㫖遵行乃一面具奏一面即行擅發甚屬錯悞曾将應行察議之處暫令存記今令舒赫徳等查奏原任貝勒額林沁公格勒克巴木丕勒未至調遣地方一案伊等公然為之奏請寛免此等奉調遲悞之罪軍務攸闗豈得因其曽効微勞即從寛宥乎况此原係伊等應行查恭之事乃並未恭奏已屬寛縱及朕諭令查奏復敢巧為開脱舛謬已極着交部将伊前次存記之案一併嚴察議奏部議革職得㫖舒赫徳着将從前所有加級紀錄盡行銷去從寛免其革職七月輝特台吉阿睦爾撒納來歸舒赫徳與定邉副将軍策楞疏将阿睦爾撒納等大台吉留軍營候㫖眷屬移住蘇尼特上斥其辦理錯謬諭将阿睦爾撒納等妻子撤囘令㑹集一處在烏里雅蘇台附近㳺牧居住復諭曰舒赫徳自去年命徃北路軍營所辦諸事動輙乖張其查拿瑪木特擅入卡倫一案有凖噶爾扎那噶爾布差人投書詢問舒赫徳並不奏聞請㫖竟擅自致書達瓦齊其舉動冐昧實出意外朕彼時降㫖嚴行申飭及來京時面加訓諭伊亦自知錯謬因末行治罪嗣因策凌烏巴什歸誠知凖噶爾簒奪相仍人心離散實有可乘之機特命策楞為定邉左副将軍並令舒赫徳協同辦理舒赫徳在熱河面領訓誨指授極為詳明伊二人自到軍營畏葸猜疑毫無籌畫凡所部署事事不合機宜即如阿睦爾撒納等窮蹙來歸尚未接見即議令将兵壮屯駐軍營同來眷屬悉移置於戈璧之南相距數千里使其父母妻子分析離居此豈在天理人情之内在阿睦爾撒納等甫經歸命焉知天朝将伊等分遣安挿究屬何意㫁不能不生疑畏且並不候㫖竟稱一面奏聞一面辦理此何等重大事而率意妄行乃爾耶至阿睦爾撒納稱有徳濟特台吉率衆一千户亦傾心向化因為水所阻又阿睦爾撒納胞兄及其親子為瑪木特所拘並求給與口糧馬匹前徃救應接取成衮扎布薩喇勒努三俱以為可行而策楞舒赫徳悉堅執不允薩喇勒係熟悉彼處情形之人既以為可行伊二人必欲執拗不知其出何肺腑方今凖夷叠遭内亂所屬部落叩闗内附者接踵而至此正可以大示懐柔永綏邉境之時策楞舒赫徳身膺重寄何顛倒舛謬至於此極盖舒赫徳因朕有十月間令伊進京之㫖遂一切茍且辦理其不肯接濟阿睦爾撒納者恐致遷延不得歸家之故又自以同列大臣才具大率與彼相若而伊親信已乆即辦事不當不過申飭議處未有可代其任者國家簡用大臣寄以専閫重任而乖張僨事如此實為深負朕恩舒赫徳着革職以閑散在叅賛上効力贖罪家産俱着籍没其子舒常着革職發徃黒龍江披甲在京諸子着拿交刑部以為大員負恩者戒旋赴鄂爾昆塔米爾等處經理阿睦爾撒納等㳺牧二十年正月命以章京銜協理烏里雅蘇台事務二十一年給副都統銜九月廵臺站至努克木倫沿途查拿掠馬之厄魯特䕶送運徃軍營口粮牲隻至額爾齊斯有掠臺站之烏梁海竄俄羅斯向之索取奏至上嘉其辦理尚合機宜令來京補正紅旗漢軍副都統子舒常並授三等侍衛二十二年二月授兵部尚書兼鑲黄旗漢軍都統赴巴里坤恭賛軍務七月因奏防範沙喇斯游牧内移上以舒赫徳藉作歸計訓飭之十二月諭曰從前舒赫徳在軍營時屢獲重譴朕皆曲為寛宥因今春西師兩路進𠞰不得其人将伊喚回加恩起用凡一切機宜朕俱詳晰面諭切嘱不可復行退縮令其到軍營時傳諭将軍成衮扎布善為協同辦理詎意舒赫徳到軍營進兵以來所辦諸事俱不奮勉将軍成衮扎布本係䝉古伊雖經厯戰陣之事然未面領訓諭則舒赫徳理應盡心相助乃伊等此次所辦之事違失機宜甚多即如伊等進兵時既将克勒特烏魯特等游牧招服即當将馬匹收取以益我兵力使賊無所施其叛逆伎倆方得制禦之道伊等方且諭彼避入山中以為恐被我軍作躪致使賊有餘力俟我兵既過即行叛去以此一端而論即可見其諸事全無成算及朕降㫖責諭方且東􅃒西露往來道路以致疲馬力於無用之地此皆舒赫徳並不将朕諭㫖詳晰曉諭将軍成衮扎布之所致也盖兵法忌怯弱而舒赫徳選懦性成兵法忌諱飾而舒赫徳最工文過合計伊前後罪譴即正以典刑亦不足蔽辜但西路進兵以來事雖未能就緒尚無挫軍威而損國體之處若即将伊正法伊反得諉過於将軍成衮扎布矣朕念成衮扎布去嵗擒叛賊青滚襍布之功看伊顔靣貰舒赫徳以不死然其不足復用所為下愚不移亦屢試而知之矣舒赫徳著加恩免死革職令為兵丁在軍營自偹貲斧効力贖罪再伊子舒常亦因加恩舒赫徳復授為侍衛遣往軍營今舒赫徳既經革職舒常著仍革退侍衛發黒龍江二十三年諭給舒赫徳頭等侍衛銜駐防阿克蘇十月将軍兆恵追𠞰逆回霍集占罙入被圍命定邉右副将軍富徳徃援授舒赫徳恭賛大臣舒赫徳以阿克蘇通葉爾𦍑喀什噶爾要隘設卡倫令囬人辦納糧米上嘉之授副都統旋擢吏部侍郎遷工部尚書鑲紅旗滿洲都統賜戴孔雀翎十二月簡阿克蘇鋭卒并諸路兵先至者馳援兆恵軍二十四年正月與富徳合軍至呼爾璊賊騎五千餘迎戰撃敗之轉戰五日四夜戮賊千餘㑹恭賛大臣公阿里衮督觧馬亦至乘夜呼突斫陣賊大潰兆恵聞鎗砲聲知援至夾擊逆酋布拉呢敦脅中鎗舁入城遁喀什噶爾時恭賛大臣巴祿阿桂在巴爾楚克亦悉精鋭徃軍營策應㨗聞得㫖嘉奨七月舒赫徳移駐葉爾𦍑命阿桂駐阿克蘇辦事嗣以阿桂䕶送屯田囬人赴伊犁廵查邉徼舒赫徳仍駐阿克蘇先後奏定囘城賦税䑓站酌設伯克阿克蘇皷鑄騰格以四分存公六分散給囬人阿克蘇庫車哈喇沙爾烏什和闐設筆帖式専理囬務派陜甘同知通判管粮餉牧羣差務分駐侍衛三年更代均得㫖議行二十六年命圖形紫光閣御製賛曰屢授重寄亦屢左遷厲厥意懦策厥材賢白衣白水聞黒水信安衆進援爵秩重晋二十七年十二月諭於戸部飯銀内每年賞銀五百兩二十八年五月充經筵講官兼署工部尚書歩軍統領加太子太保二十九年命與侍郎裘曰修徃訊福建提督黄仕簡恭奏厦門洋行陋規案因所辦未得領要奉諭㫖指示覆審督撫無收受陋規事惟屬員代購物件屬實詔觧總督楊廷璋任廵撫定長從寛留任道府同知落職治罪有差詳見楊廷璋傳三十年正月暫兼管户部事務充國史館副總裁三十一年二月署陜甘總督時議修西寜鞏昌所屬縣及嘉峪闗外燉煌玉門巴里坤城舒赫徳奏定章程四條一估計工叚立標簽以便勘騐一舊坍卸料物分别應用一工員依限程工督辦總辦各員不時嚴催一在工佐雜分叚經理聼督工大員稽察分别勸懲詔如所議又奏言甘肅賑務𦂳要部撥城工銀經過多係灾區請令州縣就近截領給賑藩庫另撥項給辦城工免稽遲而省運費復撥兵先徃穆壘耕作備次年送到民户口糧籽種之需其各省發遣新疆人犯奏准伊犁三人烏嚕木齊一人周流派撥七月署户部尚書三十二年二月充三通館副總裁十月命偕侍郎邁拉遜徃審湖南桃源縣生員林鳳鳴控知縣狄如煥及湖北棗陽縣監生張舒控知縣永福藉差苛派二案均鞫虚抵罪如律因奏雲南大兵不日凱旋各站額設夫馬外應添若干請動司庫銀發給各屬専雇夫馬至站差竣核銷如有不敷按糧均派毋許私行攅凑銀錢以息浮言而杜奸弊三十三年正月暫署歩軍統領二月授恭賛大臣命赴滇與阿里衮鄂寕籌辦軍務進𠞰緬匪旋以宻奏籌辦情形有設法招致投誠語諭曰昨舒赫徳鄂寕宻陳籌辦情形一摺甚屬乖謬内如計算進兵馬匹一事拘泥成数毎兵千名應給馬三千九百通計需馬十萬餘匹其説甚誕試問前者平定凖夷囬部豈此么䯢可比然用馬何嘗至如許之多即康熈年間征𠞰呉逆滇黔一帶未始不調集兵衆亦不聞辦馬竭蹶若此滇省籌辦糧馬原不無少有拮据朕新正閲鄂寕奏摺即已洞鍳所以宻諭舒赫徳徃辦此事并屢諭該督撫從長計議乃舒赫徳一到滇省即張皇其詞匆忙入告有似滇省之事朕總不知藉彼奏而朕始悉其端委者然有是理乎至摺内稱設法招致緬匪投誠所見尤屬荒唐無耻逈非情理所應有進𠞰緬匪一事朕初無必欲辦理之意屢降諭㫖甚明因楊應琚措置乖張其勢難以中止遂令明瑞徃蕆其事明瑞統兵罙入督率将士擊斬披靡獨以額勒登額逗遛僨事屢促赴援䘮心不顧以致賊匪抄出前路窺伺大營明瑞自率扎拉豐阿觀音保等殿後擁䕶秉志堅貞預存不肯中道輕還之意是以親冐鋒鏑寕為臨陣捐軀陸續回營弁士所損不及十之一二此軍行實在情事莫不共見共聞至現在籌辦機宜原欲從長審慎並無急於為掃穴殱渠之計第将軍叅賛既勤事効節誼難置之不問而國體所係應行應止亦當随時制宜如機有可乘則整兵繕邉厚集繼進無妨稍需時日使将來果不必辦理朕即明降諭㫖暫行撤兵中外聞之孰不以為光明正大若如舒赫徳所奏乃漢唐宋明庸懦無能之君臣所為我堂堂大清勢當全盛簡卒偫糧殄此醜類於力有何不給而肯效掩耳盗鈴恬不為耻耶且緬甸毎以詐降為狡獪長技楊應琚等已屢受其愚即此事賊衆自知得罪天朝懼干申討或有遣人乞降之信尚當嚴加拒斥責令兇酋束身歸命或遣大頭目賫表輸誠庻可允其代奏朕亦屢經諭及舒赫徳在京早熟聞之即起程前朕慮其偏於将就完局曾面加訓誡伊亦自以更厯已乆必不敢再致荒唐為對何一離朕前竟爾自相剌謬至是幸而當今綱紀肅清一切皆稟承朕㫖伊等欲為此鄙謬之舉尚不敢不先行入告朕得及時飭駁急令停止朝廷一舉一動皆臣民耳目所屬何所庸其粉飾况軍國重務豈可自欺欺人設無知之徒聞有此奏疑朕授意舒赫徳所為無論朕不肯受且朕何如主若如此等事稍有游移則前此底定西陲何以克奏膚功於二萬餘里之外哉舒赫徳向在左右承朕指示調度辦事尚能妥協一行奉差輙難専任此次所奏竟爾復蹈故轍着交部嚴加議處部議革職並革雲騎尉世職命給都統銜授恭賛大臣赴烏什辦事三十六年土爾扈特汗渥巴錫台吉策伯克多爾濟並各鄂拓克台吉烏巴什舍楞等全部歸順命徃伊犁經理撫輯㝷授伊犁将軍舒赫徳遵㫖籌辦安汎設偵飬贍撫綏應行入覲之台吉大頭目驛送入京查明部落户口安置伊犁其餘部衆俱量擇善地分編以居俾烏嚕木齊塔爾巴哈台兩處大臣就近統理事聞上嘉之十一月授户部尚書先是定議移西安滿洲兵二千駐防巴里坤居西城原任緑旗兵移東城三十七年五月舒赫徳㑹同總督文綬奏言西北城地窪積水滿漢官兵商民同居城狹人衆勘於東門外半里許建滿城一座官署兵房四千八百間地近屯田泉甘土渥使兩城形勢聨絡廷議允行九月奏言沙拉博山鉛厰以廢員委辦而厰中所撥遣犯恐聚集滋事請令屯田官一員總理撥屯兵四十供驅策遣犯百名一半開礦一半輪流種地官給牛種耕具官員三年議叙遣犯分别减年即准為民從之是月授領侍衛内大臣三十八年二月子舒常責斃家人二名特諭改發伊犁交舒赫徳嚴行管束三月御賜詩曰伊犁萬里撫軍民不比堂亷取㫖頻此豈僅為保障寄因之特用老成人固思舊侣歡常聚其奈嚴疆倚獨諄食少事煩正何礙如斯我亦倍精神四月加太子太保七月晋武英殿大學士兼管刑部事務充國史館四庫全書館清字經館總裁正白旗滿洲都統十月賜黒狐端罩總理吏部及户部三庫事務仍兼刑部如初以原銜充經筵講官三十九年三月兼翰林院掌院學士九月命徃江南籌辦黄河老壩口堤工因夀張奸民王倫假邪教紏衆據臨清舊城命先赴山東偕額駙拉旺多爾濟左都御史阿思哈及廵撫徐績擒𠞰分兵三路舒赫徳與拉旺多爾濟自徳州進阿思哈由髙唐州赴梁家淺㑹合廵撫徐績進直𨽻總督周元理由故城進㑹兵至臨清賊退踞廢城土岡阿思哈徐績率兵掩擊斬戮數十人賊竄入城副都統伍什布侍衛伊琳等入城殱戮侍衛音濟圖春寕擊賊於塔灣舒赫徳拉旺多爾濟赴舊城東南隅與阿思哈徐績兵合令委署翼長保倫等進舊城搜𠞰薄暮列兵上城周圍廵警令侍衛納穆扎在北門衝要堵賊去路殱賊數百生擒百餘村民俱縛賊來獻王倫自焚死有名賊目孟燦梵偉等俱檻觧伏誅舒赫徳疏陳善後事宜一賊平示諭良民歸里酌給口糧資送一舊城民房被燬酌給貧民修費一難民囬籍寒冬難傭工覔食照被灾極貧例給四月口糧一城外村荘焚掠一空本年錢糧請緩至明秋起徴漕米及民借倉榖麥本等項緩至明秋分兩年帶徴附近州縣俱照此辦理一首逆及有名賊目房地入官變價入於本案動用一民間牛馬被掠請動帑買牛五百頭聼小民領用一年後将原價交官歸欵十一月叙功加三級賜御用貂尾冠黒狐褂諭曰大學士舒赫徳辦理山東逆匪王倫一案迅速𠞰除安輯良善經理諸務俱能竭盡心力動合機宜深可嘉尚着加恩授為御前大臣賞戴雙眼孔雀翎其從前所得雲騎尉世職仍着賞給四十年五月教習庻吉士四十一年二月金川平命繪入前五十功臣御製賛曰土爾扈特安集邉城命入綸閣速定臨清金川之役未悉端委書㫖承行時亦賛理三月奏山東民李承納呈控丁元明鑚通伊子舒寕奪開煤窑承納轉托贊善王燕緒闗説現将舒寕拿交刑部諭曰舒寕先因獲罪發徃交伊父舒赫徳管束嗣復加恩准帶囬京乃竟怙惡不悛敢與人交徃圖利玷辱伊父顔面實屬敗類適王燕緒隨駕在此因命軍機大臣及侍郎和珅廵撫楊景素會同詢問舒寕與丁元明夥開煤窑竟屬實有其事舒寕係大學士之子本不應交渉外事即或丁元明原係山主應行開採之人亦非舒寕所當干預若其理曲情虚恃有舒寕之勢争佔他人窑座則舒寕之罪更重如審訊得實其人豈可復留今両造具在一經研訊無難水落石出至舒赫徳自請治罪之處尚可從寛舒寧之生事不法非伊意料所及且於接呈之後愧憤惶悚即将伊子拿送刑部據實具奏所辦尚是設舒赫徳敢於容隠别經發覺則其首領亦不能保但不能管教伊子咎有應得着交都察院嚴加議處旋議革任詔免舒寕發伊犁充當苦差交舒赫徳自加責處再行發徃李承納圖佔煤窑營謀架控罪亦如之七月充文淵閣領閣事四十二年充蒙古源流臨清紀畧正總裁四月卒諭曰大學士舒赫徳老成端重練逹有為朕御極之初即膺任使宣猷中外四十餘年前此平定囬城懋著勞績嗣於西陲撫輯歸順逺藩東省𠞰捕悖逆匪衆悉心籌畫動合機宜實為國家得力大員自簡任綸扉日直内庭兼綜部務勤勞匪懈倚毗良深兹以聖母孝聖憲皇后山陵大禮扈從前來至期應恭㸃神主襄事乃於十九日忽遘時疾即𣲖太醫院堂官診視頻加存問以冀速痊兹遽聞溘逝深為震悼即賞給陀羅被遣額駙福隆安帶領侍衛十員徃奠茶酒俟進京仍親臨賜奠加恩晋贈太保入祀賢良祠其任内革職降級之案概予開復伊子舒常已諭令馳驛來京治䘮應得䘏典該部察例具奏御製賜酹詩曰扈蹕将㐮事中途忽永辭失斯佐惜矣屬我命逄其中外力宣乆􅁝綸心謹司老成漸凋䘮觸緒總興悲五月上臨奠祭諭曰大學士舒赫徳應得封典着加恩仍行給與謚文襄賜祭塟如例四十四年上製懐舊詩列入五功臣詩曰遇順饒有智逄艱或失算究以從政乆經事實明練屢罷屢復用中心惜英彦踐厯更老成遂掌􅁝綸渙西師頻建功然職在恭賛土爾扈歸順經理實妥善六日靖臨清則信資偉幹爕理原未乆勲伐誠可按懐舊不能忘凄然一染翰子舒常現官左都御史永貴永貴滿洲正白旗人姓拜都父布蘭泰官古北口提督世襲雲騎尉自有傳永貴於雍正十三年由筆帖式授户部主事乾隆四年遷本部員外郎十年遷郎中十一年三月授湖南辰沅永靖道十二年三月擢雲南布政使十一月調浙江布政使十四年七月署浙江廵撫十五年十二月疏言行銷浙鹽之温州台州寕波等府及江南所屬松江府向以地近場竈私梟滋事經督臣李衛奏明發帑交地方文武官收買場竈餘塩名為帑塩嗣因武員領辦較多有浙江提標松江提標黄巖鎮樂清協平陽協寕海營等武職衙門經辦塩務責以廵緝稽查由是商引疏消但從前立法未周致有奉行不善今條例八事一向來各武職請領帑本徑赴道庫支領差弁給竈收塩文武不相綂屬不能隨時稽察恐啟侵挪扣尅之弊嗣後除地方並無文職及不領帑本各營無庸置議外其温州台州所屬之黄巖鎮樂清協寕海營均㑹同該縣具批由道詳准給領寄貯縣庫給竈時營員㑹同塩大使移縣支領據實給發仍令各縣場将收發銀数報塩政各衙門其帑商課程塩本外輸等項亦令會同徴收起觧支發一各營赴竈收塩均令㑹同塩大使遵照官秤收發仍按冊報塩政各衙門以杜私售浮收之弊一收發塩銀各營俱係副恭承辦仍歸廵撫節制惟黄巖鎮係鎮臣經理應改委該鎮中軍辦理責成鎮臣督察其各處司厫廵緝收塩之弁俱令詳廵撫給發委牌一辦帑銀塩應於嵗底令各員會同盤查其黄巖縣帑塩係黄巖鎮中營協辦寕海縣長亭場帑塩係寕海營協辦均令台州府會同黄巖鎮盤查樂清縣長林場帑塩係樂清協協辦令温州府㑹同温州鎮盤查其江浙提標中營所辦責成両處提督率同寕波松江二府盤查其温州台州二府令温處道寕紹道盤查崇明場令太倉州盤查仁和場令杭州府盤查青村下砂袁浦三場令松江府盤查但有挪移虧缺将㑹辦盤查文武各官分别恭處着賠一各商請領塩引毎商以四百引為率務令全納課程方准領運完足全帑再領後塩其給發竈價非實在無力窮户不得預行借給一黄巖鎮收發塩觔照江浙提標例令該鎮委定弁目専司經理廣為銷售所賣引塩餘利量給飯食公費外餘歸帑塩盈餘項下報撥充餉有欺隠侵蝕者照侵盗錢糧例罪之一武職辦塩地方有失察私塩案副恭等照兼轄官議處委辦偹弁照専汛官議處其實力緝獲私塩者按所獲分别議叙一各府協營所收經費現令據實開報其廵塩兵役虚糜廪禄者逐一裁汰分别應留應革奏定章程有浮收侵扣者嚴叅究處下部議行十六年閠五月實授浙江廵撫先是上年浙省温台等屬偏灾命照例蠲賑永貴奏以知府金洪銓専辦賑務嗣因洪銓辦理不善永貴奏請勒令休致總督喀爾吉善復奏洪銓玩視民瘼應革職留浙効力贖罪御史范廷楷亦以永貴狥庇洪銓劾奏諭曰金洪銓玩賑誤公非㝷常闒茸之員可比該撫僅請休致實屬瞻徇是以朕見喀爾吉善之奏即将該知府革職留省効力而傳諭切責永貴者不啻至再至三矣且永貴辦理未妥之處不獨金洪銓一事其籌畫灾賑諸務種種張皇竭蹷苐封疆重任一時難得其人且浙省現多被灾之處驟易新任反於辦理賑恤之事無益若循例議以降罰使該撫與該督各存意見轉無補於救灾濟民是以姑從寛貸惟於其果能實力妥協辦賑與否以定永貴之去留耳是年浙東各郡旱永貴先後奏入叠奉恩諭暫弛海禁以通商販截留本省及江蘇漕糧八十萬石又借撥江蘇湖廣福建江西米五十五萬石以資賑糶並令江浙二省就近報捐俊秀收納本色折色以補倉儲十二月諭曰浙省今年春旱成灾本重廵撫永貴竟至張皇失措茫無定見於附近之江南江西福建湖廣山東等省既四處告糴不已甚至欲委員逺赴奉天採買米糧且稱賑糶所需必得三百萬石之數方足以資接濟從來辦理賑務㫁無因一省被灾遂􅁒竭數省之力以供其用者故朕降㫖訓飭乃近聞永貴在浙竟至有心諱飾将來於賑糶諸務必􅁒多所撙節則是該撫從前并非為民總屬為己其意不過欲多得米石遂可有恃無恐縱事不竟行且得藉以謝灾黎且以杜朕責防人彈封疆大臣豈宜如此存心耶然朕猶以為為百姓起見不妨姑留之以觀後效今乃一變而有諱灾之意是其辦賑不妥矣朕子恵元元痌瘝在抱一切政務寛嚴時酌其中至於賑恤灾黎每不惜加恩格外則十六年如一日此天下臣民所共知者若以永貴一人辦理不善竟至灾民失所非朕勤求民瘼本懐且使各省督撫聞風效尤漸啟諱災之習所闗於民主休息者甚鉅實難再為寛容永貴著革職來京候㫖十七年正月發徃北路軍營効力贖罪四月命辦理糧餉二十年十一月上以其辦理奮勉賞按察使銜署臨洮道仍命速徃巴里坤辦糧餉事務二十一年五月賞副都統銜兼恭賛大臣九月命籌辦西路䑓站是年冬厄魯特宰桑逹什策凌等煽亂定邉右副将軍兆恵駐伊犁由濟爾哈朗赴特訥格爾沿途𠞰賊二十二年二月永貴抵巴里坤具以軍中状聞諭嘉官兵同心奮勉賞永貴三等輕車都尉世職㝷賜玉韘荷嚢鼻烟壺三月偕兆恵等由額林哈畢爾罕路進𠞰五月領兵追賊扎那噶爾布尼瑪至孟克圖嶺未獲上訓飭之十月協辦軍務命署西安廵撫未任詔徃魯克察克辦理屯田事務二十三年三月以侍郎銜留軍營辦事是月奏派兵三千六百在烏嚕木齊闢展托克三哈喇沙爾等處墾種可收三萬六百石諭朂其親徃察勘董勸並較量收成分數酌籌來嵗次第增兵墾種事宜旋奏托克三增兵四百哈喇沙爾增兵二千又奏昌吉羅克倫各增兵千五百墾種從之八月授刑部侍郎十月奏闢展等處收穫較上年多六千餘石除備續墾各處籽種外餘穀三萬五千八百餘石足敷官兵口糧七月有竒仍俟次年早收小麥青稞接濟諭令悉心經畫時兆恵兵抵葉爾羗需用馬匹詔永貴廵查臺站前至阿克蘇即留駐辦理運送馬糧事務二十四年六月命囬京九月行至庫車適布政使徳舒觧送囬人為厄魯特嗎哈沁所戕永貴奏調率阿克蘇兵搜捕諭令與䕶軍統領努三協殱逆黨十月囬部全平命來京二十五年六月調倉塲侍郎十月疏言毎嵗漕艘抵通必於石壩另換剥船由五閘轉運進京自大通橋下至通州通永闗計四十餘里從未大加挑浚河身愈髙隄㟁愈庳雨大則冲隄潰㟁雨少則淺阻膠舟漕運因之遲滯雖每年嵗修終無實濟不如為一勞永逸計大挑一次嗣後嵗修可省過半詔如議速行十二月授左都御史二十六年正月命徃哈什哈爾辦事六月奏囬部三十一城阿竒木伯克請分别鑄給印信又奏擇伯克子弟及囬人可造就者賞戴金頂學習辦事俱從之十一月授禮部尚書二十七年授鑲紅旗漢軍都統二十八年三月疏言囬部地畆取溉溝渠有赫色勒托庸庫森提斯衮等河惟赫色勒布伊提斯衮汗阿里克三處分别圖巴里克河之水尚不足用請自赫色勒河東南浚渠四十餘里引水入赫色勒布伊村以資灌溉又托庸河水湍急衝刷地畆派伯克等添建上石隄壩並鑿山石以弱水勢報聞五月奏遣托木齊圖等向霍罕額爾徳尼索所佔阿濟北鄂斯等處地額爾徳尼遵約歸還上嘉其辦理妥協下部議叙加一級八月還京二十九年六月充經筵講官三十年三月烏什囬人滋事命徃哈什哈爾辦事八月烏什平命駐劄烏什辦事三十三年十月署伊犁将軍十二月調吏部尚書三十四年十月調禮部尚書先是厄魯特有放馬兵盗哈薩克馬轉誣哈薩克一案辦事大臣巴爾品為人朦蔽任意審㫁至是奏請治罪上以永貴既查出此案情節不即叅奏根䆒飾詞缷罪殊屬取巧交部嚴議降三級調用三十五年四月理藩院尚書增海奏凉州荘浪滿洲兵丁應賠損傷馬匹銀兩永貴誤将熱河官兵俸餉坐扣詔切責仍交部嚴加查議五月諭曰永貴自署理伊犁将軍以來未能實心任事所辦哈薩克馬匹一案伊明知巴爾品被人朦蔽乃隠忍不奏經朕降㫖訊問始行奏聞又凉州荘浪兵丁應賠倒馬銀両将並無干渉之熱河官兵俸餉一併扣存亦未據聲明具奏是以令伊來京自應即予革職但永貴平日尚屬勤慎不至竟當廢棄著加恩補授左都御史革職留任効力行走不准戴用翎頂閠五月授鑲黄旗漢軍都統八月授禮部尚書革職留任准用頂帶不戴花翎十月署鑲黄旗䝉古都統十一月充經筵講官三十六年五月充國史館副總裁三十八年正月署户部尚書四月署兵部尚書七月仍署户部十月命紫禁城騎馬四十一年正月兼署吏部事二月回禮部辦事仍署吏部四月上廵山東旋蹕在京王大臣迎駕未候召見而退敕交宗人府都察院議處議上上以宗人府議處王公等俱罰俸二年而都察院於程景伊永貴僅議降二級留任實屬徇情改程景伊永貴革職留任仍議處都察院堂官十二月充玉牒館副總裁四十二年四月恭逢孝聖憲皇后山陵禮成命永貴暫署大學士敬襄㸃主大典兼署吏部尚書五月補吏部尚書七月命在阿哥總諳逹處行走賞戴花翎九月管禮部事務四十三年二月禮部奏儀制司員外員缺主事内别無合例擬陪之員請以李潄芳題補引見諭曰李潄芳在給事中任内當山東逆賊王倫倡亂之初即奏稱係飢民聚處滋事朕以所言如果有據則地方官之諱灾醸亂罪難輕逭因諭大學士舒赫徳於𠞰捕賊匪時留心體訪嗣後舒赫徳覆奏細查夀張等縣收成俱八九分且逆賊初時搶掠各鄉米豆糧食所在多有是飢民醸衅之説實係荒唐及賊黨要犯就獲觧京命軍機大臣會同九卿科道在刑部公鞫各犯並無供有因灾起事者朕集衆親鞫復令李潄芳自向各犯詢問亦無以對者是李潄芳前奏之妄衆皆曉然伊又曾奏直𨽻亦有飢民地方官在蘆溝橋堵截不令他徃而給事中范宜賓㝷襲其説入告因派侍郎髙樸袁守侗帯同李潄芳范宜賓前徃良鄉及黄村東壩各處並未見成羣乞食流民皆李潄芳等所目擊實無人為之隠餙也是李潄芳肆行妄言悉屬毫無風影而造作無稽轉􅁒為賊揑詞䣃過更不知其是何肺腸即治以􅃝惡惑衆之罪亦所應得但朕從不肯因言民隠事加罪科道然李潄芳心術如此豈宜復居言路為世道人心之害范宜賔已革職發徃新疆効力而李潄芳從寛以主事改用已屬格外加恩且其時曾經明降諭㫖中外共曉永貴豈轉未聞知李潄芳現為主事已邀寛典止宜令黾勉自効以贖前愆豈宜曲為寛徇復為陞用昨永貴等奏将李潄芳充會試副提調朕以不過禮部應辦之事遂行㸃派孰意永貴等竟以此試朕見朕前日允其所請今即請将李潄芳陞補員外郎並云無合例擬陪之員兾李潄芳之必得是永貴全不思李潄芳前此之罪由自取一味心存囘䕶必欲令其遷官員外之不已勢必復以郎中保題郎中之不已勢必復行保送御史此乃明季惡習乃永貴竟敢以此等伎倆巧為嘗試其視朕為何如主乎朕披閲禮部奏摺以其事必係永貴主意及召見侍郎阿肅不待詢而伊即稱為永貴所誤朕因永貴厯任年乆是以用為尚書乃伊見朕屢沛渥恩漸無忌惮惟以沽名取恱為事其居心尚可問乎永貴深負朕恩着将所有職任悉行革退並㧞去花翎加恩賞給三品頂戴自備資斧前徃烏什辦事永貴至烏什後若不痛改前非實心任事必将伊在彼正法以示烱戒三月詔永貴所有輕車都尉仍留其本身九月奏請烏什地方照阿克蘇例設立義倉從之先是葉爾𦍑辦事侍郎髙樸勒買囬衆金珠寳石不發價值並私將玉石為阿竒木伯克色提巴勒底所控詳見髙樸傳永貴赴葉爾𦍑質訊屬實疏入諭曰髙樸貪婪無忌罔顧法紀實出情理之外已另降諭㫖将髙樸革職嚴審即於該處正法矣吏部尚書員缺仍着永貴補授朕於臣工功罪一秉大公至正如髙樸貪黷負恩若此較伊父髙恒尤甚不能念係慧賢皇貴妃之侄髙斌之孫稍為矜宥也永貴原因市恩李潄芳身獲重譴之人今辦理此事公正可嘉復加恩擢用此諸臣所共知共見禍福惟視其人之自取朕不稍存成見於其間十月賞戴花翎十二月授恭賛大臣四十四年正月回京二月授鑲藍旗滿洲都統九月命紫禁城騎馬十月充經筵講官四十五年三月協辦大學士五月調鑲藍旗漢軍都統四十八年五月卒諭曰協辦大學士吏部尚書永貴老成端謹練逹精誠敭厯中外勤勞懋著雖近覺精神稍衰尚能照常辦事遽聞溘逝深為軫惜着派散秩大臣帶同侍衛十員前徃奠醊其任内降革罰俸處分准予開復㝷賜祭𦵏如例謚文勤子伊江阿襲職現官副都統銜葉爾𦍑領隊大臣欽定八旗通志卷一百六十二
