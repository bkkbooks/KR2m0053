  text: 營建志五八旗駐防規制一京都駐防各省駐防京都駐防京師九門外駐防雍正六年設除正陽門外有巡捕營兵看守不設旗兵看守外其崇文門等八門於沿河空閒處修造房屋於各滿洲䝉古漢軍三旗𣲖章京四員驍騎校四員馬甲二百名挈家移住盖給章京房屋每員八間驍騎校毎員五間兵丁每名二間城門附近各修造堆子房八間乾隆二十七年奏准各營房添官㕔三間學房三間滿洲火器營乾隆二十九年設城内城外八旗營房官員房一千零四十一間兵丁房六千零三十八間公館檔房官學等共房一百一十五間城内八旗每旗礮五位各有貯礮營房健鋭營乾隆十五年設翼長二員委署翼長二員前鋒㕘領八員副前鋒㕘領十六員委前鋒㕘領三十二員前鋒校一百員前鋒二千名副前鋒校四十員筆帖式八員藍翎長一百名委前鋒一千名養育兵五百名四十一年添畨子佐領一員驍騎校一員領催四名馬甲錢糧番子八十一名五十三年又添番子防守尉一員番子驍騎校一員十三年盖給官兵房屋三千五百一十間内翼長二所十三間前鋒㕘領八所毎所十三間副前鋒㕘領八所每所十間前鋒校五十所毎所六間前鋒一千所毎所三間又印務公所四十一間碉樓六十六座十九年盖給官兵房屋二千一百二十八間内委前鋒㕘領十六所毎所八間委前鋒一千所毎所十二間二十九年盖給官兵房屋三千四百八十四間内前鋒㕘領八所毎所十三間副前鋒㕘領八所毎所十間前鋒校五十所毎所六間前鋒一千所毎所三間五十六年盖給房屋九十間内委署翼長二所每所十三間委前鋒㕘領八所毎所八間又是營房所設戰船水手官員迭有増損現存戰船四隻水手四十八名委署千總把總各四員官房堆房共一百二十六間圓明園八旗駐防雍正二年設共盖房一萬間分為八處毎處一千二百五十間毎處䕶軍㕘領一員住頭等房一所十三間䕶軍副㕘領二員住二等房二所各十間䕶軍委署㕘領四員住三等房四所各八間䕶軍校十員住房十所各六間䕶軍三百七十五名毎名住房三間乾隆十二年每旗増䕶軍一百名各添房三百間圓明園包衣三旗駐防雍正二年設毎旗䕶軍㕘領一員各住房十二間毎旗侍衛委署㕘領一員各住房十間毎旗䕶軍校委署㕘領一員各住房八間毎旗䕶軍校三員各住房六間每旗䕶軍四十名各住房三間共盖房五百零四間左翼四旗鑲黄旗營房坐落樹村西邉正白旗營房坐落樹村東邉鑲白旗營房坐落水礳正藍旗營房坐落保福寺右翼四旗正黄旗營房坐落蕭家河正紅旗營房坐落安河橋鑲紅旗營房坐落東四木村東邉鑲藍旗營房坐落藍靛厰西邉包衣三旗營房坐落水礳前邉八旗及包衣三旗毎處教場内盖箭亭三間各省駐防一盛京駐防将軍衙署在撫近門内天聰六年設立六部時為吏部衙門順治元年遷都裁改康熈十三年重修為鎮守奉天等處將軍衙署新舊共房五十六間倉十間在城内西南隅火藥庫十三間在城外瀋水南奉天府城週圍九里三分康熙十四年於城内設内倉三十間通濟倉一百問太平倉七十間新倉三十間南館倉五間於城外置草厰一座教場一處其八旗兵丁官房鑲黄旗滿洲四佐領下共二百二十二間䝉古二佐領下共九十六間漢軍三佐領下共一百六十八間正黄旗滿洲四佐領下共二百二十四間䝉古二佐領下共九十六間漢軍三佐領下共一百六十六間正白旗滿洲四佐領下共二百二十四間䝉古二佐領下共九十六間漢軍三佐領下共一百六十六間正紅旗滿洲四佐領下共二百二十四間䝉古一佐領下共五十六間漢軍三佐領下共一百六十六間鑲白旗滿洲四佐領下共二百二十四間䝉古一佐領下共五十六間漢軍三佐領下共一百六十八間鑲紅旗滿洲四佐領下共二百二十二間蒙古一佐領下共五十六間漢軍三佐領下共一百六十八間正藍旗滿洲三佐領下共一百六十八間䝉古一佐領下共五十六間漢軍三佐領下共一百六十八間鑲藍旗滿洲四佐領下共二百二十二間䝉古一佐領下共五十六間漢軍三佐領下共一百六十八間總共兵房三千六百三十六間三十年於左右兩翼設官學二處學房各十間由盛京工部撥給乾隆元年設宗室覺羅二學宗室學房二十六間覺羅學房十八間五十九年現存將軍衙署大堂三間穿堂三間儀門三間大門三間南耳房二間户司房十二間兵司房十間刑司房三間工司房五間繕寫摺本房三間歩營司房五間畨子司房四間印庫三間檔庫四間俱係原設其大門房二間東耳房三間司務㕔三間接濟官兵銀兩處房四間砲房二間當月房一間賞銀庫六間又渾河南教場房八間邉城内教場一處房三間俱係乾隆三年至三十四年陸續添設兵丁房屋于乾隆三十八年將軍増海奏明變賣七百四十五間五十年將軍公宗室永瑋又奏賣一千八百九十七間現存九百九十四間火藥庫陸續添房二十一間左右兩兾官學於三十二年作為將軍住房移其學于協領署内興京駐防自太祖太宗時始設城週圍三里半康熙三十四年建造城守尉衙門三間在城内教場在城外兵丁住房共八十間原有倉厫八間五十二年添盖十間又草厰一座東京駐防天命六年建城週圍六里六十歩髙三丈五尺號曰東京天命十年遷瀋陽是為盛京遂於東京設城守章京康熙二十年城守移駐金州遼陽駐防城週圍十五里一百八十步康熙三十年設立衙門十間倉四十間在城内大街南隅城南門外二里設立教場一處三十年設立火器營兵丁官房二百一十間雍正六七兩年添盖倉二十間乾隆三十八年將軍増海奏准變賣兵房五十九間五十年將軍宗室公永瑋又奏賣六十一間其城垣於四十三年奉