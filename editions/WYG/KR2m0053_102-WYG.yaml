body:
  text: 欽定四庫全書欽定八旗通志卷八十八典禮志十一八旗䘏典王公䘏典旌官員䘏典丁旌表宗室覺羅節孝表官員兵節孝王公卹典順治十二年題准親王以下奉恩将軍以上薨故者請㫖給與諡號是年宗人府言襲替諸王奉㫖各照其父原封號襲封今已薨諸王應另加諡號勒碑疏入詔從所請十四年定貝勒以下奉恩将軍以上無後嗣者仍予諡立碑康熈二年題准貝勒以下奉恩将軍以上薨故者槩停題請給諡若應與諡者仍候㫖給賜四年題准貝勒以下輔國将軍以上薨故者應否與諡題請欽定九年宗人府等衙門題前代舊制諸王薨逝将諡號載於封號之下本朝見行例諸王薨逝給與諡號勒碑不将封號刋勒恐後世之人難曉今臣等酌議薨逝諸王未與諡號者應於封號下加諡號一字已與諡號者仍加寫封號詔從所請二十年大學士等奏追贈諸王諡號查前明時親王諡號係用一字郡王以下䕶國将軍以上皆用二字上曰以後追諡郡王滿漢文亦俱用一字官員卹典天聰八年定凡功臣已故而無兄弟子嗣承襲者准照官職免其丁之半其妻故後方令應差順治二年定大臣病故者旗下官由該都統咨送吏部查明轉行禮部給與祭𦵏九年定異姓公侯伯子及管事内大臣都統大學士尚書鎮守省城總兵官卒禮部具題候㫖命工部立碑内院撰給碑文外照例給羊紙遣官捧祭文祭一次如係承襲之公侯伯子卒照例給羊紙外不給祭文不立碑如承襲後曽有専任効力三年者仍給祭文候㫖立碑都統副都統侍郎學士侍郎品級滿洲啟心郎卒自立碑内院撰給碑文外照例給羊紙遣官捧祭文祭一次如係承襲之官照例給羊紙不給祭文不立碑如承襲後曽有専任効力三年者仍立碑給祭文㕘領理事官品級滿洲啟心郎理事官輕車都尉卒照例給羊紙有専任滿三年者遣官祭一次給祭文不立碑有専任未滿三年者及無専任輕車都尉以下騎都尉雲騎尉以上照例給羊紙不給祭文其承襲之公侯伯以下九品官以上或効力有年殁於戰陣或在任病故吏部分别咨禮部禮部具題其遣官諭祭立碑皆候㫖行凡承襲之公侯伯以及有勅書雲騎尉以上未上朝而卒者不給羊紙順治十六年諭朝廷軫念勞臣於其身後有諭祭之典及加諡立碑等項酬績勸忠所闕甚重必其生平或行間著績或奉職勤勞乃堪承此典今凡牛录章京及拜他喇布勒哈畨等官身故者一槩諭祭於典制未合反為輕用恩䘏着另詳議定例具奏十七年四月禮部遵㫖更定諭祭造𦵏例凡以功封民公侯伯病故者照㑹典例造墳仍照品級給與紙張羊酒遣官致祭一次加祭者出自上裁如承襲効有勤勞者題請祭𦵏候㫖舉行都統有職掌内大臣大學士尚書左右都御史有兼銜加級者各按品照㑹典例造𦵏仍照世職品級給紙張羊酒遣官致祭一次如承襲子爵効有勤勞者題請祭𦵏候㫖舉行都統侍郎學士副都統副都御史有兼銜加級至一品二品者各按品照會典例造𦵏仍照世職品級給紙張羊酒遣官致祭一次通政使大理寺卿已經考滿者照㑹典例造𦵏未經考滿者减半造𦵏仍照世職品級給紙張羊酒遣官致祭一次老病致仕者照㑹典例造墳給與紙張羊酒遣官致祭與現任官同無職掌内大臣前未有諭祭之例今議雖無職掌但係内大臣應與紙張羊酒遣官致祭一次無造𦵏􅄁領郎中佐領員外郎等陣亡者給與紙張羊酒遣官致祭造𦵏否則不致祭造𦵏其武職􅄁領以下文職卿郎中以下等官有輕車都尉騎都尉雲騎尉世職者照舊給與紙張羊酒無世職者不給議上詔從所議康熈九年題准本身所得民公侯伯病故給與全𦵏並致祭銀兩遣官讀文致祭一次應否與諡請㫖定奪如有優䘏出自聖㫖承襲公侯伯病故䘏典同内大臣都統子爵品級散秩大臣大學士尚書左都御史鎮守将軍提督病故者各照品級給與全𦵏並致祭銀兩遣官讀文致祭一次應否與諡請㫖定奪如有陣亡者優卹出自聖㫖男爵學士副都御史總督總兵官加級至一品巡撫病故各照所加品級給與全𦵏並致祭銀兩遣官讀文致祭一次應否與諡請㫖定奪學士副都御史巡撫通政使大理寺卿病故三年任滿者給與全𦵏未滿三年者給與半𦵏俱給致祭銀兩遣官讀文致祭一次不請諡有加級者仍照前例請諡布政使副将病故各照品級給與全𦵏並致祭銀兩遣官讀文致祭一次不請諡雲騎尉三等侍衛䕶衛以上陣亡者各照加贈品級給與全𦵏並致祭銀兩遣官讀文致祭一次凡與諡一品官員工部立碑碑文内閣撰擬尚書侍郎等官以原官原品觧任及随旗上朝官員病故卹典與現任同如無原官字様止以原品上朝者不准卹尚書都御史侍郎學士副都御史通政使大理寺卿總督巡撫布政使提督總兵官副将以甄别京察年老有病原品致仕病故者俱不准卹承襲官員加至男爵者給與半𦵏遣官致祭一次承襲公以下雲騎尉以上未及嵗滿上朝者不准卹九年題康熈二年奉上諭一品二品官曽經賜諡者除造墳外仍與立碑其三品官加級至二品者禮部原未定有立碑之例今陕西巡撫白清額既奉㫖賜諡應照二品官立碑嗣後官員凡給賜諡者即照此例行詔從所請三十八年諭閒散子爵甚多有何給與諡號之處嗣後若頭等大臣仍将應否給與諡號照舊請㫖閒散子爵及副都統侍郎等官将請給諡號之處俱着停止只将給與全𦵏半𦵏部内一次致祭之處題請四十四年題准嗣後男爵以下雲騎尉以上官員若係本身所得之官與襲職後又能効力得官病故者俱照舊例給與一次致祭銀兩其襲職官員俱停支給祭銀又定武官奮勇力戰陣亡除給卹銀加贈品級廕子弟一人外仍照舊例給與全𦵏遣官致祭凡民公侯伯以下官員致祭銀兩定例公四十兩侯三十五兩伯三十兩一品官二十五兩二品官二十兩三品官十六兩四品官十二兩五品官十兩十八年議准民公造墳銀六百五十兩侯六百兩伯五百五十兩一品官五百兩二品官四百兩三品官三百兩四品官二百兩五品官至七品官一百兩凡一品二品由禮部題請三品以下官死難者始行題請在旗下工部給發凡與諡大臣立碑工價銀兩定例公侯伯各四百兩一品官三百五十兩二品官三百兩三品官二百五十兩給本家自造旌表宗室覺羅節孝順治九年諭諸王宗室覺羅内有孝友義順及守節貞烈者宗人府核實具奏禮部題請旌表十年題准宗室内節孝者各依等第頒給恩賜親王固倫公主親王福晉給銀一百兩緞十六疋世子和碩公主親王側福晉世子福晉給銀九十兩緞十四疋郡王郡主世子側福晉郡王福晉給銀八十五兩緞十二疋貝勒縣主郡王側福晉貝勒嫡夫人給銀八十兩緞十一疋貝子貝勒側夫人郡君貝子嫡夫人給銀七十五兩緞十疋鎮國公貝子側夫人縣君鎮國公夫人給銀七十兩緞九疋輔國公鎮國公側夫人鄉君輔國公夫人給銀六十五兩緞八疋鎮國将軍輔國公側夫人給銀六十兩緞七疋輔國将軍鎮國将軍夫人給銀五十五兩緞六疋奉國将軍輔國将軍夫人給銀五十兩緞五疋奉恩将軍奉國将軍淑人給銀四十五兩緞四疋奉恩将軍恭人給銀四十兩緞三疋鎮國将軍輔國将軍奉國将軍奉恩将軍女及閒散宗室並妻女給銀三十五兩緞二疋以上俱由户部頒給内院撰擬勅命一道奨諭凡旌表貞節者自固倫公主親王妃以下輔國公夫人以上俱照等第除欽賜羊酒紙張外禮部仍照定例另給羊酒紙張内院撰文遣官致祭鎮國将軍夫人以下閒散宗室妻女部給羊酒紙張内院撰文遣官致祭凡覺羅内有節孝者給銀三十兩緞一疋有貞烈者給羊酒紙張内院撰文遣官致祭十三年題准親王薨妾媵殉節者禮部給羊酒紙張内院撰文遣官致祭旗表官員兵丁節孝順治九年題准滿洲蒙古漢軍孝子順孫義夫節婦該管佐領驍騎校核實送􅄁領㕘領核實送都統副都統都統副都統核實送禮部禮部核實奏請旌表十年題准凡旌表節孝滿洲䝉古漢軍支户部庫銀三十兩聴其自行建坊十二年題准滿洲䝉古漢軍孝子順孫義夫節婦應令􅄁領佐領查明保送都統副都統冄加核實年終送禮部分别題請旌表康熈三十七年諭興起教化鼓舞品行必以孝道為先孝子尤宜褒奨八旗貧人克盡孝道誠為非易如有盡孝於其父母者察明奏聞五十一年題鑲紅旗有受聘未婚之女聞訃剪髪穿孝敬守夫墓守節三年從容自縊與尋常輕生者不同奉㫖着照例旌表雍正元年恩㫖節婦年逾四旬而身故計其守節已歴十五載以上者亦應酌量旌奨又恩㫖旌表節義給銀建坊民間往往視為具文未曽建立恐日久仍至冺没不能使民間有所觀感著於地方公所設立祠宇将前後忠孝節義之人俱標姓氏於其上已故者則設牌位於祠中祭祀用以闡幽光而垂永久著交該部議奏禮部議覆八旗分左右翼擇地各建一祠一為忠義孝弟之祠立石碑一通将前後忠義孝弟之人刋刻姓氏於其上已故者設牌位於祠中一為節孝之祠門外建大坊一座将前後節孝婦女標題姓氏於其上已故者設牌位於祠中每年春秋二次致祭交與大宛兩縣其建立祠宇牌坊交與工部營造其建坊銀兩嗣後應行停給奉㫖孝行節義建立牌坊年久毁壊遂至湮没今欲設立祠宇特為昭垂久逺之意並非欲節省錢糧部議建立祠宇停給建坊銀兩不合建坊銀兩仍着給與餘依議四年鑲白旗貞女未婚聞壻病故自盡家人救甦至次日剪髪摘環哭往壻家願終守故墓該旗都統奏請旌表奉㫖如此貞節甚屬可嘉理應旌表十三年八月順天學政錢陳羣奏稱婦人三十嵗以内夫死守節在先迨撫孤成立之後因子顯達始獲受封者准予旌表具奏禮部議覆嗣後除受封在先夫死在後之命婦仍照例母庸旌表外其三十嵗以前夫死守節在先後因子貴受封之節婦查明確實准其一體旌表奉㫖依議乾隆十四年五月江蘇巡撫覺羅雅爾哈善奏各省題報節婦應分别辦理奉上諭國家旌表節孝所以發潜徳之幽光正倫常而維風化典至重也比見各省具題不過核其年例相符遽請建坊崇祀非有竒節卓特之行其何以示勸今經江蘇巡撫雅爾哈善奏請略為區别果係節而兼孝或能教子成立或貧無依倚艱苦自守或毁形自矢百折不回凡此卓卓竒節著於閭閻非尋常可比者應於彚題時聲明請㫖特賜建坊祠内照例標題設位致祭其餘循分守節以老者准其附入彚題書姓氏於總坊設位祠中不必更給坊銀等語雅爾哈善所奏似猶未免為節省錢糧起見而朕意則以為事當核實惟核實則庸庸者不得雜出其間而苦節有以自見盖國家令典雖曰善善欲其長而名器過濫則無以示觀感且孝子當旌而不被旌者非即不孝也節婦當旌而不被旌者亦非謂其不必守節也江蘇一省嵗至二百餘人俱令設位祠中日久濫觴将無地可容豈所謂稱盛典耶他如名宦鄉賢其克當之無愧者代有幾人而題請崇祀不一而足無非督撫及該地方鄉紳欲為他日自身計未問其人之名實相副與否即幸而贓私不致敗露亦難掩後人耳目徒滋訾議上年滇省請以侍郎許希孔入鄉賢朕經詳悉頒示明㫖令各省督撫詳慎核實雅爾哈善此奏甚為有見著九卿定議具奏經九卿議覆内稱州縣親民之官果其民俗闗心何致訪求不實請令直省督撫訓示地方有司實心體訪諮於學校詢於輿論如係夫亡守志舅姑年老無倚婦兼子職奉養終身或宗祧所係藐孤煢孑撫育有成以綿嗣續或外廹强暴毁形見志事近捐軀終保貞潔或境處单㣲甘心茶蓼饑寒併廹秉節愈堅如斯之類孝義兼全阨窮堪憫允宜亟為表彰具結詳報督撫學臣秉公確查彚疏題請旌表給銀建坊歿後致祭祠内以光爼豆其在荒村僻壤孤苦单寒舉報無力易致湮沒尤宜搜訪詳報以昭顯幽闡㣲之義如因仍故習委之隣族呈報胥役核查以致舉報不實单寒遺漏俱照定例㕘處督撫不據實紏􅄁别經發覺亦交該部議處至於尋常守節若槩令入祠崇祀當此風化盛明之時人敦節義誠有無地可容之患但既經守節合例亦不忍令其湮沒不彰應令地方官於本家呈報之時核其年例相符詳明督撫學臣酌量給匾嘉奨附疏彚題仍於祠内統建一碑俟具題之後陸續刋刻姓氏載入本州縣誌書毋庸特予建坊設位奉祀八旗節孝亦照此例畫一辦理奉㫖依議十五年三月禮部議覆湖北巡撫唐綏祖條奏各省給匾嘉奨節婦應照百嵗老人之例交内閣撰擬給匾字様奉㫖依議嗣經内閣交出欽定清標彤管字様三十二年十二月黒龍江将軍福僧阿奏請索倫巴爾虎達虎里人等旌表之處應行停止經大學士等議奏索倫巴爾虎達虎里咨查旌表節孝人等永行停止伊犁係新駐之處毋庸咨查至凡有旗人省分咨送旌表孝子順孫義夫之處竊思滿洲舊習直樸孝義之行俱係分内之事應請嗣後停止奏准通行三十九年五月據總管烏嚕木齊等處都統索諾木䇿凌咨巴里坤正紅旗對齊佐領下前鋒特柱之妻伊爾根覺羅氏應否照依内地之例一體旌表經禮部查烏嚕木齊巴里坤駐防官兵係由西安寜夏等處移駐雖係新設實與内地無異且前在西安等處有貞節婦女均得援例請旌與黒龍江所屬呼倫貝爾打牲逰牧各處原屬逈别奏准欽定八旗通志卷八十八
