body:
  text: 人物志七十二大臣傳五十八漢軍鑲黄旗四楊范時崇髙施世綸施世驃長春其倬郝玉麟范時捷范時崇范時崇漢軍鑲黄旗人大學士文程孫福建總督承謨子也承謨殉耿逆之難時崇以廕入監讀書康熙二十三年授遼陽州知州二十八年遷廣西梧州府同知二十九年調南寧府同知三十一年遷直隸順徳府知府三十三年調宣化府知府三十六年遷天津道四十年擢貴州按察使尋調福建按察使四十三年遷山東布政使四十四年擢廣東巡撫四十五年七月疏言髙州府吳川縣屬硇川一島原有田糧户口載在版籍自康熙元年遷界户遷田廢丁糧豁免無徵二十三年展界又因孤懸海外仍未給民耕種近奉㫖酌改沿海營制硇川島已設専汛遷民來歸故土已有譚福臻等九十餘家呈請復業應查明原額錢糧户口聴開墾陞科下部議行十月上以兩廣額定鹽税外各處餘費多於額税以致嵗歉正項錢糧命時崇㑹同巡鹽御史圖爾泰兼理鹽政上發函章諭以兩廣鹽政積弊甚多朕已察得陋弊數條著交該撫查辦十二月時崇遵所發章内情節疏奏鹽政七條一鹽政衙門嵗有羡餘十萬兩向歸鹽政有一種蠧胥名曰發收鹽政初任時任其播弄迨少知事例而一年差期将届急公之心不勝營私之念徵羡餘而置正課於不問應将此項盡充公用其發收一役應革一鹽政到任即遣内司承差坐守場口名為緝私止知勒索致私鹽充斥查緝私責在文武官原無藉内司承差應革一恤商裕課無過於裁冗員運司職掌兩省餉課應與庫官仍留任任事其知事大使及潮州廣濟橋運同廣恵分司均屬冗員應裁查驗之任責之州府課銀徑解運司一運司向得羡餘六萬兩内應解河工銀萬兩銅斤水脚銀萬兩今鹽政羡餘充公其鹽政名下銅斤水脚萬兩應在運司羡餘項下支解餘三萬兩充公一行鹽地方文武員皆有規例名曰茶果應行禁革再犯以枉法􅂍治罪一兩廣場商無力養竈丁不得不售私鹽埠商不能向場買運民間又不得不食私鹽商人惟買鹽政大票以為行鹽䕶符私鹽盛則官鹽愈滯請将運使庫銀借給三萬兩毎府委佐貳賢員将竈丁所曬鹽盡行收買鹽價收放責成知府隨賣隨收官鹽得行課餉自裕一兩廣鹽埠惟運樂與廣濟橋最大利徒揑商人名色賄鹽政承充總商倚勢恣私必應禁革令各州縣自募殷實土著具結保充疏入部議如所請鹽政運司所得羡餘解交内務府得㫖廣東兵餉不敷此項銀兩即存留彼處充餉餘如所議行四十七年三月疏言粤東濵海各州縣倉榖久貯易於霉爛省城八旗官兵需糧甚多請将近省州縣存榖酌量多寡折米六萬石運省支用其該年派撥額米秋成徵補間遇嵗歉亦可動用賑濟下部議行十二月疏言前耿逆之變隨臣父范承謨殉難者五十三人内生員嵇永仁王龍光儒士沈天成及臣族叔范承譜俱偕臣父幽囚三載殉難死節經前撫臣楊熙題請贈銜部以生員無追贈例議寢臣仰祈皇上特沛恩綸予以一命陪祀臣父祠堂以慰忠魂下部議生員嵇永仁王龍光應追贈國子監助教沈天成范承譜雖庶民無追贈例但係死節應追贈國子監學正并入祠陪祀從之四十八年五月疏言廣東連州總鹽額引行銷本州及湖廣之桂陽臨武藍山嘉禾四州縣樂昌總鹽額引行銷本縣及湖廣之郴州宜章興寕永興四州縣但連樂二州縣之引多於衡郴八州縣之額以致此壅彼缺請量勻十分連州樂昌行銷十分之三桂陽郴州等行銷十分之七又潮州恵州贑州三府俱行銷廣濟橋鹽此三府所屬平遠鎮平程鄉興寧長樂五縣額引較多而恵州府屬之龍川和平永安三縣及江西贑州府屬十二縣額引獨少不敷民食應將平遠等五縣之引勻銷於龍川等十五縣贑屬十二縣内信豐龍南定南三縣接壤惠川距潮路遠難運應就近改食恵鹽又福建汀州府屬八縣内長汀一縣額引幾居通府之半應撥銷於寧化等七縣廣西靈川陽朔義寧三縣鹽引難銷應撥於易銷之全州灌陽興安三州縣商民均有禆益部議從之四十九年八月擢福建浙江總督時海賊鄭盡心在洋肆刼遠至錦州等處兵部檄沿海各省嚴緝五十年三月時崇緝獲盡心解京四月疏言兵糧計口授食刻不容緩本年夏秋不敷兵米萬七千七十餘石請於嘉湖二縣府捐米石内各移萬石貯省倉以敷兵米下部議行五十二年五月疏言臺灣屬三縣年徵稻粟十三萬八千餘石除折支各營兵米外嵗餘七萬石現存六十六萬三千餘石貯已十年易致紅朽請将新收者勻留二十萬石備三年兵米之用其四十六萬餘石出糶給臺灣俸餉從之八月又言閩省福興全漳四府一年兩熟本年興漳早禾豐收福州歉薄晚稻則興全雨未霑足福州得雨更遲恐來嵗青黄不接時民食可慮請于江浙運米内撥給収貯米貴平糶得㫖江南運米内速将五萬石運至福建米到日即行平糶毋致浥爛五十三年三月陛見瀕行賜御製詩有棟梁祖幹家聲重蘭桂孫枝令譽清之句序云浙閩總督范時崇陛見來京朕毎念伊祖為開創宰輔伊父乃忠義名臣所以待之優重今因回任特書御詩餞送五十四年十一月授左都御史五十五年五月因祈雨不親到經大學士嵩祝奏劾得㫖范時崇著降三級留任革去恩詔所得廕生五十六年四月授兵部尚書五十八年九月振武将軍博爾丹請於莫代察罕廋爾與鄂爾齋圖果爾各築設站特命時崇前往料理五十九年三月回京十月以疾乞休允之十二月卒施世綸施世綸漢軍鑲黄旗人靖海侯琅仲子康熙二十四年以廕授江南泰州知州二十八年正月以承修京口沙船遲誤部議降調督臣傅臘塔以世綸清廉公直題留得㫖留任三月擢揚州知府三十年八月海潮驟漲泰州范公堤衝塌千九百餘丈民田竈地多沒世綸牒請捐修三十二年調江寧知府三十五年丁父憂督臣范承勲以世綸輿情愛戴請在任守制御史胡徳邁特疏應行離任遂歸連丁母憂嵗餘特㫖授蘇州知府仍以終制辭不赴三十八年服闋授江南淮徐道四十年十月湖南按察使員缺大學士伊桑阿等以九卿保舉世綸入奏諭曰施世綸朕深知之其操守果亷但遇事偏執百姓與生員訟彼必䕶庇百姓生員與縉紳訟彼必䕶庇生員夫處事惟求得中豈可偏私如施世綸者委以錢榖之事則相宜耳十二月遷湖南布政使先是議遷五開衛署於平屯俾黎平府専城而治四十一年世綸牒稱五開衛界黔粤控蠻彛實為辰沅靖之藩籬明宣徳年間黔省黎平府數被苗患爰僦衛城建府署國朝因之自康熈二十七年府衛官弁不和始有遷衛之議平屯僻處一隅不惟建造無資且孤立堪虞若官軍兩遷一旦棄田園壞廬舍必致流離失所若僅遷衛署貢賦出納遥轄最難矧自明迄今府衛同城軍民相安無事請仍舊便議久不决嗣總督喻成龍巡撫趙申喬㑹疏以聞特㫖俞允四十二年以衡州府之安仁嘉禾臨武永州府之江華寳慶府之城步及郴州之桂陽靖州之通道天柱向止訓導一員請添設教諭又永定銅鼓二衛止設教授綏寧㑹同二邑止設教諭俱請添訓導勅部議行四十三年調安徽布政使四十四年遷太僕寺卿四十五年二月因湖南任内失察兵掠當舖事罷職三月特㫖授順天府尹疏陳四欵一禁五城司坊擅理詞訟一禁奸徒包攬捐納一禁牙行要佔客貨一禁逐流娼歌宴勅部議定為令四十八年授左副都御史兼管府尹事四十九年遷户部右侍郎督理錢法尋調總督倉場五十四年奉㫖巡撫雲南㑹漕運總督缺員即以世綸補授先是漕運俱由瓜州閘行其閘下花園港乃糧艘停泊處至是江溜北趨花園港衝塌百餘丈世綸以咨河臣恐糧艘遲滯權將繞城河開壩行五十九年七月上諭曰總漕施世綸居官素優歴年漕船俱催䟎全完並無遲悞本年漕船已經過淮更無他事漕運印務暫交與河道總督趙世顯署理施世綸速赴豫省将河南府至西安黄河輓運路逕勘明具奏陜西現在榖石數目亦著查奏今陜西正值軍興之際施世綸暫居陜西恊同總督鄂海辦理世綸乃溯流上尋求古蹟九月疏言河南府孟津縣至陜州太陽渡大小數十餘灘縴路髙低不等或在河南或在河北惟圪把窩魚林漆等處縴路年久間有坍卸其澠池以下水道下水船可載糧三百餘石上水載及其半澠池以上河髙迅激僅可輓數十石由砥柱至三門神門本無縴路若小舟乗東南風猶或可上鬼門水勢洶湧土人從未行舟惟人門稍緩石崖鑿有縴路路旁鑿有方眼又有石鼻臣愚以為石鼻可穿鐵索方眼可装木限援手助力觀此則從前輓運跡猶存自陜州至西安府河水平穏俱有輓運路逕臣謹繪圖呈覽又奏河南府至陜州三門現在無船請自河南府至陜州太陽渡三百餘里用車運計五日可到毎車可装榖八石計榖二十萬石需車價銀四萬三千七百五十兩自太陽渡至西安府黨家馬頭河平穏水運為便需運費銀二萬六千兩自黨家馬頭至西安府倉二十里又需車價銀四千兩其貯榖口袋二十萬餘需價銀三萬兩共計銀十萬三千七百五十兩總於豫省支銷不令陕西接運但運榖二十萬石止得米十萬石請令豫省以二榖易一米起運則運價可省半若慮米難久貯請照例出陳易新奏入嘉其詳悉從之十月上諭曰陜西地方現有軍務又年嵗歉收總漕施世綸協同總督鄂海動支倉榖散賑但地方官員大半在軍前辦事之人殊少發帑金五十萬並陜甘常平倉貯榖百三十餘萬石酌量動用派部院司官往賑交施世綸總管六十年四月疏言陜西四月無雨秋成可慮豫省先運米十萬石督臣已借支駐防兵餉所存無幾請促豫省将後運米石運到平糶再撥河南湖廣米各十萬石運至陜西存貯備用部議如所請六月命歸淮安理漕事六十一年四月以病乞休温㫖慰留令其子廷祥馳驛省視五月卒遺疏入請隨父琅墓附葬閩省上允之諭曰施世綸簡任總漕清慎自持勤勞素著歴年催儧無誤前病請解任方冀調理痊愈以副眷懐忽聞溘逝深為軫惻應得䘏典察例具奏尋賜祭葬如例施世驃施世驃漢軍鑲黄旗人靖海侯施琅第六子康熈二十二年隨琅𠞰海賊鄭克塽委署守備取澎湖及臺灣叙功加左都督銜三十年授山東濟南城守營叅將三十五年二月上親征噶爾丹天津總兵岳昇飛奏薦世驃隨征召試騎射命䕶糧運既至奎素地復隨大将軍馬斯喀追賊至巴顔烏蘭凱旋仍任濟南叅将乞歸福建葬父得㫖施琅久在海疆功績懋著其子施世驃頃隨軍進𠞰亦効有勤勞凖給假葬親事畢即回任三十七年遷臨清副將四十年擢浙江定海總兵四十二年四月上南巡御書彰信敦禮匾賜之時海中多盜世驃屢出洋巡緝先遣禆将假商舶以餌盜擒獲甚衆斬盜首江崙四十六年上南巡詢及擒斬海盜事温諭嘉奬賜戴孔雀翎四十七年擢廣東提督五十一年調福建水師提督六十年四月姦民朱一貴自稱明裔偽號中興王下大元帥聚衆倡亂於鳯山縣之姜薗害臺灣總兵歐陽凱副将許雲恭将羅萬倉逰擊㳺崇功等遂䧟臺灣府治五月丙寅世驃聞報即率所部進扼彭湖總督滿保檄南澳總兵藍廷珍等以師㑹衆議三路進攻世驃謂南路打狗港在臺灣正南南風正盛不可泊北路之清風隙去府百餘里饟運頗艱度賊必屯聚中路宜直搗鹿耳門時臺灣文武官相率退回澎湖惟北路淡水營守備陳策堅守汛地世驃遣遊擊張駴等赴援而自統師指中路選勁卒乗兩小舟載旗幟先伏於南北港六月丙午抵鹿耳門外洋賊據礟臺拒阻世驃登船樓督戰擊鼓發礟中賊貯火藥器火大熾賊驚潰衆軍齊進兩港悉樹我軍旗幟賊不敢犯遂揚帆直度鯤身鯤身者海沙也大舟不能過是日海水驟漲八尺戰艦乗風迅達遂復安平鎮明日破賊四千於二鯤身辛亥賊悉衆八千來犯復擊敗之壬子遣守備林亮等由西港進遊擊朱文謝希賢林秀等越七鯤身由鹽埕大井頭諸路奮勇登岸並趨府城世驃身先将士指麾布陣賊俱敗潰一貴竄遁遂復府治復遣叅將林鎮等分路撫𠞰閏六月丙寅諸羅縣溝尾荘民楊旭等誘擒一貴及其黨翁飛虎王玉全張阿三李勇陳印等以迎叅將林秀縛送世驃軍前賊黨抗拒者先後擒斬畧盡餘衆就撫臺灣南北兩路悉平上詔部臣優叙有功将士賜世驃東珠㡌黄帶四團龍補服九月世驃卒於臺灣軍營遺疏言臣父琅昔日䝉恩葬閩今臣骸骨願得與父相依并留臣幼子隨臣妻守塋近因𠞰賊借藩庫銀一萬兩容臣長子雲南知府士岡次子廣東遊擊廷専變産交完疏入得㫖施世驃効力年久勞績懋著沿海水師營務極為諳練簡任提督實心盡職當臺灣匪類竊發即調遣官兵親渡海洋屢次大敗賊衆七日内克復臺灣擒獲賊首朱一貴等俾地方寧謐深為可嘉海疆要地正資料理忽聞将星隕落朕心深為悼念著贈太子少保察例賜䘏所借藩庫銀一萬兩免其償還其安葬福建及妻子留住之處並照所請行賜祭葬如典禮諡勇果雍正元年八月兵部議敘克復臺灣功以應否給世職請得㫖臺灣地方自古未屬中國皇考以聖畧神威取之載入版圖逆賊朱一貴等倡亂佔據臺地皇考籌畫周詳指授地方官員遣調官兵七日之内𠞰滅數萬賊衆克復全臺皇考當春秋髙邁威揚海外功徳峻偉官兵感戴皇考教養之恩奮勇攻取甚屬可嘉固不必援引前例後亦不得為例兹仰副皇考從優議叙之㫖官員現行議叙功加之外著概行各加一等提督施世驃統領大兵徑渡海洋鼓勵将士屢經大戰擊敗賊衆七日之内克復臺灣著給予一等輕車都尉世職尋以其子廷専襲楊長春弟長泰楊長春漢軍鑲黄旗人父廷瑜任杭州駐防恊領從征耿精忠於台州陣亡長春廕八品監生康熙二十五年授佐領三十五年由中路隨征噶爾丹管礟有軍功三十八年都統公鄂倫岱奏薦長春上親㨂選以真隸遊擊補用四十一年授京口叅領四十四年駕南巡長春以沙船備操上追念其父陣亡賜壯節流芳額四十九年鎮海将軍馬三竒奉㫖緝海賊鄭盡心黨與令長春帥兵船出洋搜捕長春由吳淞出口歴内外洋及江南浙江接壌之盡山花烏等處扺浙省定海於衢山舟山間獲賊船三賊五十餘三竒以長春於陸路水路皆諳練奏請授中軍副将上允其請五十一年三竒保題長春引見親詢出洋緝賊情形得㫖嘉奨五十七年調湖廣鄖陽城守營副将五十九年遷江西南瑞鎮總兵雍正元年賜孔雀翎二年擢浙江提督陛見賜秉心誠悃額並冠服命長春於浙省道府以下官舉所知者一員奏言臣到浙未久整飭營伍文員内才幹廉潔者未盡周知不敢冐昧陳奏得㫖所奏合宜應如是時長春弟長泰任肅州總兵以長春授浙江提督具疏謝上諭之曰汝兄楊長春徳勝於才和平忠厚謹慎有餘所嫌者稍覺偏於善柔雖然武臣中可謂一好提督四年長春卒賜祭葬如例諡勤恪長泰由營總於康熈二十九年從裕親王福全征噶爾丹三十二年授佐領三十六年由中路隨征噶爾丹四十年授叅領五十年擢西安左翼副都統五十四年策妄阿喇布坦擾哈宻長泰隨将軍富寧安駐防巴里坤五十六年襲擊策妄阿喇布坦賊衆於烏魯木齊多俘獲還仍駐巴里坤下部議叙五十七年遷肅州總兵雍正三年富寧安以策妄阿喇布坦已歸順奏撤巴里坤等處兵長泰率吐魯番撤回官兵赴肅州汛鎮守六年授杭州副都統十年五月以老解任尋卒髙其倬髙其倬漢軍鑲黄旗人父廕爵任口北道其倬由康熙三十三年進士改庶吉士散館授檢討尋兼佐領四十一年充四川鄉試正考官四十五年授右中允尋轉左四十六年遷侍講四十八年提督山西學政五十一年丁父憂服闋補侍讀遷右庶子五十五年轉左五十六年二月遷侍讀學士十一月遷内閣學士五十八年正月以河南南陽鎮標兵挾忿圍辱知府命其倬同刑部尚書張廷樞往鞫得實寘首犯於法總兵髙成等論罪如律二月丁母憂五十九年授廣西巡撫六十一年二月署雲貴總督十二月實授雍正元年九月疏言雲貴兩省土司承襲向有陋規上下衙門每因文結舛錯藉端需索苦累臣已嚴行禁革并請嗣後咨部文冊内數字舛錯無甚闗係者免其駁換於疏内代為聲明庶承襲事易結掯索弊除得㫖嘉奨十二月疏言雲貴魯魁山土目楊方普李四姓糾衆剽掠不聴約束本年十月内其酋方景明等率猓夷數百殺元江猓目施和尚焚其寨臣遣兵分𠞰擒景明及猓夷三百二十六名分别正法報聞先是青海台吉羅卜藏丹津肆逆謀侵西藏定西将軍策旺諾爾布檄各路偵禦其倬以雲南邊外中甸阿墩子地方為進藏要路檄遊擊劉宗魁劉國候等嚴防並遵㫖令提督郝玉麟以兵二千由中甸進駐察木多副将孫宏本以兵五百赴中甸為聲援二年二月羅卜藏丹津為大軍所敗竄凖噶爾青海平中甸喇嘛營官番目等擕三千五百户繳偽劄納土歸誠其倬疏聞上嘉其辦理妥協給騎都尉世職十月貴州狆家苗酋阿近與弟阿卧倚險作亂其倬以狆家苗聚處定番廣順二州境其附近苗寨多被迫脅遣人招撫阿近等勢窘為官兵所擒疏至諭部優叙加三級尋請増雲南楚姚鎮兵六百并増鎮屬景䝉營叅将守備各一千總二把總四兵千即以新裁援𠞰左右兩協弁兵撥補部議從之十一月條奏中甸善後事宜一中甸開墾商民日増請設撫番清餉同知及經歴巡檢等官管理一畨目舊有營官神翁列賔名目聴堪布喇嘛指使請給外委守備千把總劄付聴中甸文武官轄一中甸向行滇茶請照打箭爐例設