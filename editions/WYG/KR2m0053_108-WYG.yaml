body:
  text: 欽定四庫全書欽定八旗通志卷九十四學校志謹案學校之制與選舉相表裏後世選舉與古異故學校之教亦異唐宋元明選舉之法又微異故學校之教從而亦微異大抵古司徒司樂論徳論材後世變而論文藝文藝之中唐以詞章為主而輔以經義宋經義詞章遞相主輔元明則經義為主而輔以詞章延佑之六經兼採古注洪武之三場沿為今體其選舉之法即其學校之教矣我國家列聖相承振興聖典宏奨儒風太祖太宗經綸草昧所為汲汲於興賢育才者選舉志載之詳矣世祖定鼎中原奄有四海府州縣衛諸學皆沿明代舊規而修舉益詳考核益慎於八旗子弟督課尤詳宗室則有宗學覺羅則有覺羅學八旗則有咸安宫景山及國子監所管諸官學八旗世職幼官又各有學皆簡其師長豐其廪餼嚴其章程明其勸懲所以造就而成全之者美意無乎不至良法無乎不周髦士蒸蒸亦遂響然而興起夫從龍勲舊閥閱相承景命熾昌貞元㑹合帝媯臣唐作於上而八元八凱應運挺生穆考寧王集其勲而八虞二虢乘時奮起麟麟炳炳照耀旂常為聖朝之股肱心膂為蒼生之霖雨舟楫盖僂指不能以僕數此其人豈必待學校而始成哉然而列聖之意固以為搘拄萬古之綱常宜明大義經理天下之繁劇宜知大體其間氣特鍾之異才固不可限以常格至中人以上以下課以經義則不能不從事於講肄從事於講肄則不能不讀聖賢之書讀聖賢之書則耳濡目染漸至於心領神㑹曉然於事理之是非事君必能知大義臨事亦必能知大體即其限於材質不能大成者亦可嫻於禮教明於亷恥凜然不敢妄為而不失開國敦龎之舊俗信乎經文緯武具有睿裁大聖人智周萬物而慮通百代所以為教育計者深且逺矣豈徒使英俊之才殫思於雕繪之詞爭勝於訓詁之學與文士較短長哉謹詳述規制具著於篇作學校志學校志一國子監肄業順治十一年議准凡覺羅廕生照各官廕生例一體送監讀書期滿仍開送宗人府十八年恩詔滿漢官員文官在京四品以上在外三品以上武官在京在外二品以上各送一子入監讀書䕶軍統領副都統男爵世職侍郎學士以上之子俱為廕生其餘各官之子俱為監生康熙四年定恩詔准廕者先送國子監讀書後授官職九年二月諭吏兵二部向來包衣佐領下官員子弟不准為廕監生今思内外官員効力相同加恩豈宜有異嗣後包衣佐領下官員子弟應否為廕監生爾部定議以聞尋議包衣下一品官子弟許其承廕二品至四品各廕一子入監讀書詔從所議十年奉上諭滿洲漢軍監生内有善於書寫者著禮部選送翰林院考定具奏所取監生不拘真草鍾王各家亦不論多寡選取彚送又議准滿洲監生並漢軍識滿漢字監生年滿者定期於二月八月咨部三月九月考試照考定名次挨補其漢軍止識漢字監生應與漢人一體於五月十五日考試是年議准八旗新舊生員内通行選㧞文行兼優者滿洲蒙古起送二名漢軍起送二名入監肄業十二年覆准凡呈送八旗漢軍各官廕監生及官學生國子監於策論判語内酌量出題考試再令繙譯滿漢文一篇務湏嚴加闗防彌封各卷擇取文理優通者送部其未取者令囘監讀書如八旗各助教不行勤課者查出題㕘其滿洲識漢字廕監生官學生不在考試之例二十二年定覺羅廕生監生由國子監考試移送吏部二十四年議准入監肄業之選㧞貢生滿洲䝉古起送二名漢軍起送一名三十一年覆准國子監季考月課雖有成例嗣後考試務親身督課分别奨勵毎月朔望令滿漢肄業生齊集講書如視為具文不實心奉行從重議處三十六年閏三月國子監祭酒孫岳頒司業張豫章疏言國學中向於嵗副例俊而外另開選㧞一途自康熙十年及二十四年各舉行一次今又十有三年矣除鄉試中式及每年咨送吏部考職外所存舊選㧞寥寥無㡬應照舊例選㧞尋禮部議滿洲䝉古起送二名漢軍起送一名赴監肄業如無文行兼全者寧缺毋濫其卷册俱由提督學政送部詳查劄監肄業如有冐濫者将考官糾㕘奉㫖依議四十八年十月奉上諭八旗漢軍人等亦著應武鄉㑹試隨經兵部題准八旗漢軍包衣武生併中書部院六品七品八品筆帖式廕生監生及監生之披甲䕶軍領催拜唐阿等有願應武鄉試者一體考試五十二年恩廕宗室一品二品照滿漢文武大臣例送一子入監讀書其未入八分公亦照民公例送一子入監讀書六十一年八月禮部尚書陳元龍疏言國子監監生皆由捐納入監能文之士稀少舊例各省學臣於每學生員内選㧞一名送監肄業此例停止已久應仍照康熙三十六年例令學政於每旗滿洲蒙古共選㧞二名每旗漢軍選㧞一名如無文行兼優者寧缺勿濫如有冐濫将該學政照溺職例革職奉㫖依議雍正元年四月奉上諭八旗滿洲亦著應武鄉㑹試隨題准滿洲亦照漢軍考武之例廕生監生及監生之披甲䕶軍領催拜唐阿等有願應武鄉試者一體考試謹案八旗滿洲考試武場續於雍正十二年停止是年遵㫖選㧞滿洲䝉古毎旗起送二名漢軍毎旗起送一名入監肄業七年照例選㧞滿洲䝉古毎旗起送二名漢軍每旗起送一名入監肄業是年閏七月奉上諭凡由舉人考試補用之筆帖式俱准其與舉人一體㑹試其由貢監考試補用之筆帖式亦准於考試繙譯舉人時一同考試皆所以廣育人材使之各有所成就也至由貢監生員考試之小京官筆帖式其中未必無通曉舉業文藝之人若因其已經出仕遂不得與於鄉試則彼平日之所學莫由表見亦屬可惜著通行八旗凡由貢監生員考取之小京官筆帖式内若有願就鄉試者俱准其與舉子等一同入場考試使片善寸長不致遺棄以副國家教養人材之典八年三月工部侍郎兼管國子監祭酒孫嘉淦疏言皇上振興學校作育人材特發帑金以為太學諸生肄業之資皇恩普被率土懽忻但漢人貢生為數甚多而旗下選㧞不過數人臣前為學政考試八旗生員見其材質聰俊氣宇軒昂者實繁有人而皆溺記誦詞章之習不知返躬實踐修已治人之道似為可惜臣之愚見仰懇聖恩將旗下生員多行選㧞每旗或㧞八人或㧞十人令其入監肄業臣等與漢人貢生一體教導候其學成之日皇上㨂用則滿漢之人才日出於吏治民生必有禆益或即以之補授助教等官使之督率生徒則八旗官學益加振興矣得㫖著果親王鄂爾竒孫嘉淦㑹同選㧞尋和碩果親王允禮等奏取得鑲黄旗積善等十三名正黄旗明福等十七名正白旗李國竒等十四名鑲白旗泰保等九名正紅旗明正等八名鑲紅旗興柱等七名正藍旗豐盛格等十六名鑲藍旗通善等十名八旗共計九十四名行文禮部劄送國子監肄業九年户科給事中周榮祖疏言八旗貢監僅取馬歩箭合式即准應試誠恐文理荒疎者亦得倖進應令國子監𫝊示八旗貢監照例録科又國子監例載凡滿洲蒙古漢軍貢監生於鄉試前一年行文該旗將恩㧞副嵗優等貢官廕生及捐納貢監查明該生旗分佐領年貌三代出身履厯如係官卷即註明祖父伯叔兄弟何項官職再轉行内務府各旗其有包衣貢監湏註明包衣滿洲䝉古漢軍字様造具清冊於鄉試年二月内咨送到監録科送試各省駐防八旗一體遵照辦理其呈騐貢監執照與漢貢監同十三年照例選㧞滿洲䝉古每旗起送二名漢軍每旗起送一名入監肄業乾隆元年奏准八旗㧞貢生肄業期滿咨呈吏部以筆帖式分班銓選遇官學助教員缺准與各部院咨送人員一同考選再漢軍㧞貢生仍准揀選川廣雲貴四省州縣佐貳官七年二月奉上諭㧞貢六年一舉為期太近嗣後定為十二年選㧞一次永著為例九年兵部侍郎舒赫徳請申嚴録科額數以滿合二字號貢監雖屬無多不得濫冐録取宜令國子監嚴加考試務以精通三場者録送二十四年禮部文稱八旗鄉試業奉上諭停止騎射應行文國子監録科分别官民字號造冊送部轉送順天府四十二年五月禮部議覆尚書兼府尹袁守侗奏請八旗貢監生員應鄉試者但令各該旗造冊移咨順天學政及國子監録科徑送順天府投卷入場其由部取冊轉送之處俱行停止應如所奏奉㫖依議又八旗考試恩監生将八旗官學算學欽天監肄業各生能通文理者三年一次由國子監奏請欽沠大臣考試取中後赴典薄􅈦填寫親供辦給執照一張偹載年貌三代旗分佐領並奏考緣由及所取𣲖大臣姓名考試年月付本生收執五十三年奏准正途貢監及廩增附加捐者由國子監照向例収考俊秀捐納貢監者届期奏請欽𣲖大臣彚考附國子監規條一滿洲蒙古漢軍監生責成八旗助教務在勤加教誨不得怠隋徇情以致廢弛一滿洲䝉古漢軍各監生入監日首謁先師廟各生排列殿墀禮生贊行四拜禮畢赴彛倫堂臺下序立謁見祭酒司業行四拜禮隨詣各堂師相見行二拜禮凡遇進監至大門外下馬不許乘馬出入一滿漢各監生於朔望日隨行釋奠禮外有講書覆講上書覆背諸課程每月三囘週而復始兩廂及六堂官講四書性理通鑑博士講五經一朔望日祭酒司業率屬員諸生拜謁文廟畢升堂講書一滿漢各監生聴講書後習讀講章有未能通曉者即赴講官處講解或赴兩廂質問毋得憚煩蓄疑安於愚昧一滿洲䝉古漢軍廕監生十嵗以上到監讀書俟年滿十八嵗考試咨部一滿洲䝉古漢軍例監生坐監二十四個月一滿漢各廕監生途遇師長歩行者旁立候過乘騎者逺下趨避敢有藐忽抗行者决責一八旗各項監生請假取具該都統印文到日查明酌量准給一八旗各官學諸生逐日所填功課冊年終由各助教移付國子監呈堂查閲以上國子監肄業欽定八旗通志卷九十四
