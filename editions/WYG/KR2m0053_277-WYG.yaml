  text: 人物志一百四十三列女傳二十三八旗漢軍列女傳一正紅旗漢軍陳進忠之妻李氏鑲藍旗漢軍千總余效孔之妻陸氏以上俱扵順治十五年旌表正紅旗漢軍王國英之妻周氏順治十六年旌表鑲藍旗漢軍驍騎校寗可得之妻髙氏順治十八年旌表正白旗漢軍張文禮之妻閔氏鑲藍旗漢軍俞曰昌之妻吕氏以上俱扵康熙元年旌表正黄旗漢軍馬甲姜國眀之妻于氏正紅旗漢軍祝時永之妻李氏正藍旗漢軍馬甲阿代之妻詹珠鑲藍旗漢軍李國柱之妻劉氏以上俱扵康熙二年旌表鑲藍旗漢軍馬甲陳達漢之妻王氏鑲藍旗漢軍馬甲劉光漢之妻李氏以上俱於康熙四年旌表正黄旗漢軍逰擊王恱逺之妻馬氏康熙五年旌表正黄旗漢軍領催趙應選之妻寗氏正紅旗漢軍壮丁曹得有之妻温氏正紅旗漢軍領催李九功之妻王氏鑲白旗漢軍通事李國進之妻蕭氏鑲藍旗漢軍艾懷英之妻馮氏鑲藍旗漢軍劉光明之妻蕭氏以上俱扵康熙六年旌表正黄旗漢軍籓下陳復顯之妻吕氏正黄旗漢軍籓下崔天泰之妻趙氏正黄旗漢軍籓下黄世英之妻佟氏正黄旗漢軍籓下金貴之妻何氏正黄旗漢軍劉顯名之妻范氏以上俱於康熙七年旌表鑲黄旗漢軍壯丁盧永祚之妻戴氏正白旗漢軍輕車都尉王國興之妻張氏鑲藍旗漢軍雲騎尉達自稅之妻喬氏以上俱扵康熙八年旌表正黄旗漢軍籓下宋引昌之妻余氏正黄旗漢軍籓下曾養徳之妻張氏正黄旗漢軍籓下䕶軍文運亨之妻吳氏正黄旗漢軍籓下馬甲遲彦達之妻張氏正黄旗漢軍籓下廖廷鑑之妻周氏正黄旗漢軍籓下歩兵凌自美之妻鄭氏以上俱於康熙九年旌表鑲黄旗漢軍守備唐圻之妻柯氏正黄旗漢軍領催黄成義之妻熊氏正紅旗漢軍張應魁之妻王氏鑲藍旗漢軍驍騎校寗維詔之妻左氏鑲藍旗漢軍孔有時之妻頗氏以上俱於康熙十年旌表正黄旗漢軍䕶軍宋之龍之妻郭氏正黄旗漢軍䕶軍徐履升之妻蔡氏以上俱扵康熙十一年旌表鑲白旗漢軍閒散劉大受之妻張氏正紅旗漢軍閒散馬賜之妻程氏鑲紅旗漢軍閒散孔承恩之妻于氏正藍旗漢軍閒散彭元勲之妻鄒氏以上俱扵康熙十二年旌表鑲黄旗漢軍甘肅廵撫張文衡之妻馬佳氏正紅旗漢軍閒散何進成之妻黄氏正紅旗漢軍閑散于時化之妻張氏正藍旗漢軍趙宗舜之妻洪氏正藍旗漢軍楊貴之妻陳氏正藍旗漢軍謝有成之妻李氏正藍旗漢軍廖克愛之妻沙氏正藍旗漢軍吳茂元之妻梁氏以上俱於康熙十三年旌表鑲白旗漢軍閑散孔永正之妻白氏康熙十四年旌表正藍旗漢軍馬甲張有良之妻趙氏正藍旗漢軍馬甲張國泰之妻陸氏正藍旗漢軍馬甲胡達之妻孫氏正藍旗漢軍馬甲姜興周之妻李氏以上俱於康熙十五年旌表正黄旗漢軍閑散董得榮之妻趙氏康熙十六年旌表正黄旗漢軍滄州知州成其美之妻曹氏正紅旗漢軍閑散李遇春之妻姜氏正紅旗漢軍馬甲孫起龍之妻蘇氏正藍旗漢軍閑散鞠士安之妻金氏以上俱於康熙十七年旌表正黄旗漢軍閑散班瑜之妻王氏正紅旗漢軍閑散韓廷松之妻邵氏以上俱扵康熙十八年旌表鑲黄旗漢軍閑散丁彦福之妻何氏康熙十九年旌表正白旗漢軍壯丁劉世禄之妻鄧氏正白旗漢軍壯丁王延柱之妻田氏正紅旗漢軍閑散夏世華之妻劉氏以上俱於康熙二十一年旌表正紅旗漢軍馬甲于守正之妻耿氏正紅旗漢軍閑散陳竒才之妻王氏鑲藍旗漢軍閑散張玉眀之妻佟氏以上俱於康熙二十二年旌表鑲藍旗漢軍閑散張巴之妻于氏康熙二十三年旌表正紅旗漢軍四川武隆縣知縣張羽興之妻石氏正紅旗漢軍馬甲傅天貴之妻于氏以上俱於康熙二十四年旌表鑲白旗漢軍閑散陳世瑚之妻楊氏康熙二十六年旌表正白旗漢軍候補知縣王業昌之妻彭氏正白旗漢軍壯丁路世華之妻吳氏正紅旗漢軍閑散龎天禄之妻王氏正紅旗漢軍閑散唐有徳之妻白氏以上俱於康熙二十八年旌表正白旗漢軍壯丁沈國器之妻張氏正白旗漢軍閑散李正眀之妻盧氏正紅旗漢軍鐵匠王采之妻馬氏以上俱於康熙二十九年旌表鑲黄旗漢軍閑散門有禄之妻王氏正黄旗漢軍䕶軍焦一亮之妻朴氏以上俱於康熙三十年旌表正黄旗漢軍閑散徐九思之妻范氏鑲紅旗漢軍閑散周環之妻陳氏以上俱於康熙三十一年旌表正紅旗漢軍馬甲王世泰之妻馮氏正黄旗漢軍閑散顧敏生之妻邢氏正紅旗漢軍馬甲林天禄之妻焦氏以上俱扵康熙三十二年旌表正黄旗漢軍閑散許可逹之妻施氏正紅旗漢軍馬甲陳應選之妻李氏以上俱於康熙三十三年旌表正黄旗漢軍閑散王朝輔之妻王氏康熙三十四年旌表正紅旗漢軍馬甲劉宏祖之妻李氏康熙二十五年旌表鑲黄旗漢軍閑散王僴之妻王氏鑲黄旗漢軍鐵匠韓有功之妻翟氏鑲白旗漢軍佐領鄭朝興之妻蔡氏以上俱於康熙三十七年旌表正紅旗漢軍閑散于三徳之妻薛氏正紅旗漢軍馬甲劉登仕之妻羅氏以上俱於康熙三十八年旌表正黄旗漢軍馬甲岑自眀之妻陳氏康熙三十九年旌表鑲白旗漢軍馬甲李國瞻之妻孟氏鑲紅旗漢軍閑散張仲舒之妻李氏以上俱於康熙四十年旌表鑲黄旗漢軍候選知縣祁熊嘉之妻傅氏康熙四十二年旌表鑲紅旗漢軍廕生楊天羽之妻張氏康熙四十三年旌表鑲白旗漢軍河南開封府知府蔣煥之妻胡氏康熙四十五年旌表正黄旗漢軍馬甲陳芳之妻郭氏康熙四十六年旌表鑲紅旗漢軍候選州同紀振坤之妻陳氏康熙四十七年旌表正黄旗漢軍馬甲梁進智之妻陳氏正黄旗漢軍閒散文起正之妻楊氏鑲紅旗漢軍馬甲陳三泰之妻宗氏鑲紅旗漢軍恭将喻文煥之妻何氏以上俱於康熙四十八年旌表正黄旗漢軍候選縣丞房國