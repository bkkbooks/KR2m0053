body:
  text: 選舉志六八旗科第題名四厯科編譯進士乾隆四年己未科滿洲三寳世泰佐領名正紅旗一徳爾泰竒格佐領海齡保成佐領索禄保住佐領旗三名以上鑲白富森布滿福佐領名鑲紅旗一錫爾璊増禄佐領阿華阿福佐領旗二名以上正藍増福隆徳佐領雙圖永恒佐領武倫布色勒明阿佐領卓麟文徳佐領旗四名以上鑲藍䝉古端朱克善福佐領名鑲黄旗一和著阿延泰佐領依升阿阿延泰佐領二名以上正黄旗乾隆十年乙丑科滿洲五諾璽徳恵佐領名正紅旗一圖拉雙徳佐領勒爾謹那善佐領舒寜安白達色佐領博文五雅圖佐領四名以上鑲白旗四達徳生佐領依蘭泰徳隆佐領旗二名以上鑲紅七達色阿福佐領薩哈産海慶佐領旗二名以上正藍格圖懇朝克托佐領玉林滿祥佐領旗二名以上鑲藍䝉古額爾清額色欽佐領佛爾清額色欽佐領旗二名以上正黄乾隆十三年戊辰科滿洲徳賢覺羅岱成佐領國鼐覺羅岱成佐領名以上鑲黄旗二孝順阿蘇隆阿佐領正黄旗一名永安伊里布佐領永泰珠爾杭阿佐領西通額珠爾杭阿佐領名以上正白旗三成善額爾成額佐領赫齡查哈立佐領傅爾瑚納巴什佐領佟豫成方佐領旗四名以上鑲白武敬海福佐領九格海慶佐領官福多善佐領旗三名以上正藍䝉古明福萬舒保佐領正黄旗一名舒明穆通阿佐領鑲藍旗一名漢軍李吉人柯藩佐領名鑲紅旗一乾隆十六年辛未科滿洲文敏吉勒通阿佐領正黄旗一名武霖布徳儀佐領辛昌瑪隆阿佐領二名以上鑲紅旗寜舞立禧住佐領傅勒赫五十九佐領兆坊成徳佐領旗三名以上正藍䝉古明安圖常舒保佐領鑲白旗一名漢軍王承基趙玉衝佐領正黄旗一名乾隆十七年壬申科滿洲清額鄂通務佐領額爾景額圖必赫佐領徳義常亮佐領闗倫富爾敦佐領四名以上鑲黄旗富徳常寜佐領名正黄旗一伊琳雅呼爾達佐領鑲白旗一名揆格富海佐領名鑲紅旗一琮玉海慶佐領佟國河達郎阿佐領覺羅永㑹覺羅毓昌佐領諾穆親巴克坦布佐領名以上正藍旗四䝉古萬福禄雅滿泰佐領正黄旗一名漢軍張烈馬煋佐領名正黄旗一姜䳨趙永麒佐領鑲紅旗一名乾隆四十四年己亥科滿洲文英福爾敏佐領鑲黄旗一名木通阿富常保佐領正黄旗一名存住恒安佐領名正藍旗一蒙古富俊萬舒保佐領正黄旗一名八旗科第題名五厯科繙譯舉人雍正二年甲辰科滿洲瑪興阿馬爾屯佐領常海馬爾屯佐領二名以上正黄旗覺羅雅爾哈善覺羅伊頓佐領正紅旗一名胡徳平珠佐領伊通阿伊克坦佐領多泰包衣老哥佐領名以上鑲白旗三雅爾布卑鼐佐領赫慶豐愛佐領旗二名以上正藍蘇納海増夀佐領名鑲藍旗一雍正四年丙午科滿洲來成徳吉當阿佐領傅爾漢吉當阿佐領索禄喀爾吉佐領三名以上正黄旗楊阿布那延泰佐領徳成徳音佐領永安特痕佐領旗三名以上正白成貴圖克善佐領六格包衣李宏勲佐領以上鑲白旗二名常鈞碩麟佐領名鑲紅旗一僧保那敏佐領名正藍旗一蘇章阿法三佐領名鑲藍旗一雍正七年己酉科滿洲常徳岱豪佐領名鑲黄旗一安翼覺羅永福佐領正黄旗一名傅起覺羅圖爾徳赫佐領正紅旗一名傅夀徳爾圖佐領竒爾薩朱海佐領旗二名以上鑲白布蘭泰尼出赫佐領鑲紅旗一名玉璋包衣必立哥圖佐領正藍旗一名台敏富彌善佐領薩寜阿哈脱佐領台柱富彌善佐領三名以上鑲藍旗䝉古小格勒圖佐領名鑲黄旗一漢軍郭士璽王璽佐領名正白旗一曹瑞柯明竒佐領鑲紅旗一名雍正十年壬子科滿洲覺羅查進泰覺羅九海佐領李之琳包衣三格佐領名以上正黄旗二僧保住鄂里善佐領永善金圖佐領徳明何徳佐領永寜覺羅和麟佐領名以上正紅旗四來瞻雙徳佐領七十八富徳佐領瞻泰徳爾弼佐領託恩多包衣色享額佐領色爾分包衣色亨額佐領以上鑲紅旗玉名輔格福寜佐領福基朝岱佐領旗二名以上鑲藍䝉古多爾技徒薩圖佐領鑲黄旗一名漢軍張世爵馮瀚佐領名鑲白旗一金璜金芝洪佐領鑲紅旗一名雍正十三年乙夘科滿洲胡爾鼐摩岱佐領傅傑賽弼漢佐領賽音布賽弼漢佐領常遜徳新佐領旗四名以上鑲黄蘇赫臣布占佐領菴誠覺羅永福佐領福泰索柱佐領福成包衣賽克圖管領何昞忠包衣六格管領名以上正黄旗五那啟泰權寳佐領名正白旗一寳寜依蘭泰佐領孫琦包衣鈎勒分佐領以上正紅旗二名阿克敦江柱佐領誠格齊龍佐領旗二名以上鑲白温福増夀保佐領良格富爾遜佐領輔徳色里佐領輔鼐色里佐領富躬富爾遜佐領五十九増福佐領旗六名以上鑲紅善福哈哈佐領錫爾璊希柱佐領旗二名以上正藍弁塔哈明福佐領積行明圖佐領覺羅懐玉覺羅徳進佐領増福額増額佐領卓林丹桂佐領旗五名以上鑲藍蒙古専圖那爾賽佐領正黄旗一名巴彦圖明禄佐領名鑲白旗一六十五索諾穆拉什佐領正藍旗一名漢軍曹珵陳柱佐領名正黄旗一魏象乾孟經祖佐領張毓靈孫元起佐領二名以上鑲紅旗乾隆二年丁巳科滿洲富起福泰佐領名正紅旗一富森布滿福佐領名鑲紅旗一䝉古成憲兆臨佐領名正白旗一安泰舒明阿佐領正藍旗一名漢軍劉錕張履廷佐領祖徳彛叚如彬佐領二名以上正黄旗金坤趙永恒佐領孫法祖孫孝亷佐領金培趙永恒佐領三名以上鑲紅旗乾隆三年戊午科滿洲三寳世泰佐領名正紅旗一懐玉復興佐領志信覺羅永禄佐領伊立布客山佐領蘭昌常在佐領木奚岱祁車布佐領鄂賚舒禮布佐領霍龍鄂巴希納佐領靈圖包衣畢立克圖佐領以上正藍旗七名増禄隆徳佐領名鑲藍旗一䝉古端珠克善清佐領名鑲黄旗一富昌常舒保佐領明泰穆爾太佐領二名以上鑲白旗漢軍靳光謙郎萱佐領名鑲黄旗一沈鎧慶長佐領名正白旗一趙宗源鮑桂佐領盛國琳邉從禮佐領二名以上正紅旗郭世俊祖守忠佐領鑲白旗一名柯仁董魁佐領羅綱髙顯祖佐領二名以上鑲藍旗乾隆六年辛酉科滿洲興泰覺羅舒寜佐領正紅旗一名伊蘭太徳隆保佐領覺羅徳忠覺羅伊勒圖佐領以上鑲紅旗二名照貴扎布喜佐領諾穆親永常佐領九格蘇昌佐領七達色三哥佐領三常永常佐領常雲巴彦布佐領六名以上正藍旗蒙古達色噶爾圖佐領常明明保佐領旗二名以上正黄漢軍范宜定范建中佐領鑲黄旗一名石綸明徳佐領張宏渶殷世林佐領二名以上正白旗李致和崔浩佐領名鑲白旗一員景文張東聰佐領鑲蓝旗一名乾隆九年甲子科滿洲臣福覺羅保寜佐領正黄旗一名諾璽徳恵佐領名正紅旗一勒爾謹徳文佐領名鑲白旗一武霖布徳儀佐領名鑲紅旗一薩哈産蘇昌佐領查士林親佐領奉和覺羅永禄佐領穆特布索柱佐領阿必達薩克薩哈佐領寜古立禧住佐領佟國河佟世屏佐領達哈練永太佐領旗八名以上正藍玉麟滿祥佐領明圖福伸佐領格圖懇朝克托佐領三名以上鑲藍旗䝉古明全明志佐領名鑲黄旗一和珊明保佐領名正黄旗一同古布扎納佐領正白旗一名漢軍髙而恭劉承鑄佐領正紅旗一名張應楷姜廷元佐領額爾謹盧榮佐領旗二名以上鑲藍乾隆十二年丁夘科滿洲彰保多永武佐領鑲黄旗一名孝順阿蘇隆阿佐領文敏吉勒通阿佐領英徳蘇隆阿佐領薩載徳明佐領保太覺羅保寜佐領富徳常寜佐領旗六名以上正黄永安伊里布佐領永泰珠爾杭阿佐領西通額珠爾杭阿佐領佟昌克䝉阿佐領四名以上正白旗哦爾登布徳慶佐領名正紅旗一英明寜住佐領齊格勒福佐領穆特布來泰佐領明善覺羅六十保佐領寜泰吴明額佐領法雲那善佐領吴爾勒阿克敦佐領愛星阿徳文佐領僧特包衣白子管領名以上鑲白旗九達爾吉善武臣佐領瑚雅善保林保領旗二名以上鑲紅兆坊咸寜佐領邏庚宗室亷禄佐領琮玉海慶佐領富克禪國昌佐領文爣全起佐領傅勒格阿木昌阿佐領官福多善佐領旗七名以上正藍達蘇圖敏佐領名鑲藍旗一蒙古明福萬舒保佐領正黄旗一名富成順徳佐領名正紅旗一伊爾敦扎隆阿佐領鑲白旗一名賈禄巴梁佐領伍明阿哈豐阿佐領二名以上鑲紅旗舒明穆通阿佐領鑲藍旗一名漢軍馬昌言郎思亷佐領盧岱得麟佐領旗二名以上鑲黄王承基趙玉衡佐領正黄旗一名王進亨王東忠佐領邱岱竒車布佐領二名以上鑲白旗李吉人柯藩佐領姜䳨趙永麒佐領二名以上鑲紅旗佟世衡官禄佐領張永烈楊明佐領旗二名以上正蓝乾隆十五年庚午科滿洲富徳常福佐領色明阿隆福佐領薩欣徳明佐領呈格伊吉素佐領四名以上正黄旗胡保瑪興阿佐領鑲白旗一名辛昌馬隆阿佐領鑲紅旗一名䝉古七郎阿富冲阿佐領蘇朱克圖富冲阿佐領二名以上正黄旗色楞富森布佐領正藍旗一名漢軍張烈馬煋佐領趙鍈陳元瑛佐領二名以上正黄旗乾隆十七年壬申科滿洲覺羅得福聖保佐領白清額鄂通務佐領噶爾必善常玉佐領覺羅阿爾賽聖保佐領董翰阿彌爾圖佐領名以上鑲黄旗五薩敏徳明佐領巴尼渾覺羅奉泰佐領名以上正黄旗二佛尼音富克吉善佐領西䝉額瑪興阿佐領百嵗包衣徳敏佐領名以上鑲藍旗三蒙古濟綬伍郎塔布佐領正藍旗一名漢軍伊爾登額正藍旗一名乾隆十八年癸酉科滿洲富昌徳寜佐領蘇楞厄果興阿佐領富勒琿賽炳阿佐領達靈阿朱隆阿佐領四名以上正黄旗照玉徳山佐領名正紅旗一寜安索青佐領名鑲白旗一得倫克升阿佐領西拉布阿拉宻佐領富隆常百佐領額爾謹海存佐領旗四名以上正藍圖永明禧佐領布勒庫安慶佐領旗二名以上鑲藍䝉古特克慎闗誠保佐領堆器長泰佐領旗二名以上鑲黄額爾克圖富山佐領名鑲白旗一闗住舒明阿佐領正藍旗一名漢軍陳元玫徳寜佐領名正黄旗一乾隆四十三年戊戌科滿洲文英福爾敏佐領鑲黄旗一名木通阿富常保佐領達桑阿永徳佐領志善志福佐領經文覺羅奉泰佐領佛爾清額額爾登保佐領名以上正黄旗五徳慶雙慶佐領徳象雙慶佐領佟保希智佐領旗三名以上正黄􅌢光開昌阿佐領鑲白旗一名塔青阿塔明阿佐領鑲紅旗一名國布亨和陞額佐領吉齡達郎阿佐領都隆阿固寜阿佐領福炳伊林泰佐領存住海慶佐領岱明阿風林佐領豐伸富爾松阿佐領寜順包衣七達色佐領以上正藍旗八名嵩年達春佐領常興富明阿佐領式奎衡山佐領恒麟隆徳佐領徳太滿祥佐領旗五名以上鑲藍䝉古台斐音景文佐領和柱文恒佐領旗二名以上正黄法克進伍格佐領名正紅旗一阿萬大史那爾松阿佐領鑲白旗一名徳通常春佐領名正藍旗漢軍孫良貴那彛佐領名鑲黄旗一姜斌左濤佐領名正黄旗一乾隆五十二年丁未科滿洲那蘇泰哈豐阿佐領宗山嵩山佐領明福徳明佐領旗三名以上正黄玉慶安福佐領盛泰扎爾漢布佐領名以上正黄旗二文亮阿巴徳佐領寜静伊昌阿佐領二名以上鑲白旗同麟福慶佐領富來定成佐領廣善恩全佐領祥明保林佐領富忠文林佐領富祥文林佐領旗六名以上鑲紅官徳永徳佐領阿禄鄂爾必圖佐領名以上正藍旗二兆麟隆徳佐領名鑲藍旗一蒙古明昌明福佐領菩薩保興徳佐領旗二名以上鑲黄文善保富寜佐領名鑲白旗一徳山巴金泰佐領永祥多隆武佐領吉爾格圖伍郎塔布佐領名以上正藍旗三漢軍張掞張持佐領名正紅旗一玉慶郎永徳佐領鑲紅旗一名乾隆五十七年壬子科滿洲尚霖徳義佐領名鑲黄旗一安永貴書佐領名正白旗一厄忒布覺羅金良佐領烏爾棍布舒敏泰佐領伊爾洪阿保成佐領旗三名以上正紅興禄覺羅托永武佐領松山爱隆阿佐領舒常安卓􅂶遜佐領三名以上鑲白旗七郎阿岳喜佐領廷璧包衣孫榮佐領名以上鑲紅旗二松長包衣商安佐領正藍旗一名䝉古占柱果興阿佐領正黄旗一名克什布佛保住佐領正黄旗一名萬舒常春佐領名正藍旗一漢軍韓清張永照佐領正藍旗一名繙譯䝉古舉人題名雍正十年壬子科蒙古福徳六十佐領名鑲白旗一花亷泰黒達色佐領鑲紅旗一名雍正十三年乙夘科䝉古達爾扎色爾布佐領鑲黄旗一名烏龍阿福夀佐領伊陞阿諾爾賽佐領永魁永徳佐領旗三名以上正黄常有阿林佐領星格布存住佐領旗二名以上正紅乾隆五十七年壬子科䝉古雙善富爾松阿佐領阿昌阿額爾徳呢佐領名以上正藍旗二欽定八旗通志卷一百七
