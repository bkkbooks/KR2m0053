body:
  text: 人物志二十五大臣傳十一滿洲鑲黄旗十一端濟布額明瑞博清額福隆安豐昇端濟布端濟布滿洲鑲黄旗人姓𤓰勒佳乾隆八年由前鋒授藍翎侍衞洊授二等侍衞二十年台吉巴雅爾等投誠命端濟布齎衣物往賜之還授頭等侍衞遷鑲黄旗察哈爾總管二十一年命選兵千赴西路軍營𠞰賊二十二年三月隨將軍兆恵由朱爾圖斯進兵四月至瑪納斯擒得木齊鄂羅斯獲其屬三百馬駝牛羊二千餘六月扎哈沁叛賊巴哈曼集遁端濟布偕侍衞奎瑪岱追𠞰至小衞和勒津遇前掠台站賊扎木布擒之招降巴哈曼集屬二百餘户九月擒叛賊噶爾藏多爾濟宰桑羅卜扎尼瑪得木濟敦多克於羅克倫孟古圖領送巴里坤先是布魯古特台吉琿齊呼爾璊台吉達瓦斬叛賊扎那噶爾布詣端濟布營詐降並請招叛黨額林沁達瓦端濟布信之遽撤兵還琿齊等尋遁上命靖逆將軍雅爾哈善查明治罪至是諭曰端濟布此次所辦尚合機宜從前招降惟事姑息已命查明治罪今功過相扺著加恩寛免十月扎哈沁得木齊哈勒拜等謀掠台站㕘贊大臣哈寧阿檄端濟布往𠞰至瑪納斯擒諜十餘渡河至美羅托山賊遁收其游牧牲畜詔相機速𠞰二十三年正月叙功列一等六月分領吉林厄魯特兵圍庫車賊三千自賽里木来援據高阜端濟布同侍衞順徳訥等分翼奮擊斬首二千餘獲畜械甚衆七月復同侍衛齊凌扎卜等𠞰賊之逃往蘓巴什山者三百餘八月邀擊城内逃賊於鄂根河十月大兵分三路攻葉爾羗回酋霍集占築䑓城東北端濟布以右翼後隊攻之賊拒戰我兵擊斃賊二十餘賊退入城時将軍兆恵被圍於黒水端濟布轉戰十餘至呼爾璊合兆恵軍二十四年二月敕部優叙給三等輕車都尉世職四月授鑲紅旗滿洲副都統七月隨大軍追賦至阿爾楚爾及伊西洱庫爾淖爾端濟布以兵二百截其逃路偵賊寨山巔越嶺攻之被創事聞下部議叙凱旋賜塔什巴圖魯號命圖形紫光閣御製賛曰将軍黒水先衆徑渡固營待軍實端濟布衆寡稍挫倉卒周防奪回人馬勇且謀長二十六年卒贈都統銜諭曰端濟布前在軍營頗著勞績且打仗受傷得有殘疾回京身故定例惟陣亡人員始入昭忠祠端濟布雖非陣亡但念其久在軍營効力打仗得傷回京身故與陣亡者無異著加恩准入昭忠祠尋賜祭葬諡壮節子伊逹禮襲世職明瑞明瑞滿洲鑲黄旗人姓富察一等承恩公富文子乾隆十四年由官學生襲世爵授二等侍衛二十一年四月管理健鋭營五月命以副都統銜赴西路軍營充領隊大臣時阿睦爾撒納叛竄哈薩克明瑞隨定西将軍逹勒黨阿追之再與哈薩克戰多斬獲上嘉其奮勇行陣授副都統二十三年四月追擊推素隆集賽逃人八十餘户降之殱其拒戰者収駝馬軍噐得㫖嘉奨十一月授户部右侍郎二十四年三月授叅賛大臣御前侍衛尋諭曰明瑞自到軍營凡遇陣戰領兵奮勇行走可嘉加恩於現襲公爵加賞毅勇字號授為承恩毅勇公五月隨將軍兆恵𠞰逆回霍集占於葉爾𦍑叙功賞雲騎尉世職八月追賊於和斯庫魯克山賊衆六千餘負嵎固守我兵九百奮勇鏖戰賊大敗尋復恃其馬力來拒陣斬賊五百餘級生擒及傷竄者無算諭曰覧奏我師以寡敵衆力戰敗賊實属奮勇効力朕心甚為嘉悦著交部從優議叙復賜御筆詩扇曰世胄更勲戚少年能老成從軍俾習事屢戰得英聲適以狂狙遯因将勁旅征欲遮先信漏不捨竟踪横地利彼雖擅人和我實勍騎惟九百到賊乃數千迎少卒勝其衆勇還濟以誠勗哉俘二竪衛霍遜功名十月賞戴䨇眼翎二十五年四月奉㫖明瑞所得之雲騎尉與伊弟奎林承襲明瑞仍承襲一等承恩毅勇公世襲㒺替二十六年伊犂回部功成命圖形紫光閣御製贊曰椒室懿親年少志雄謂可造就俾學從戎獨出獨入既忠且壮屢立宏勲惬予所望五月授正白旗漢軍都統尋轉户部左侍郎二十七年三月詔赴伊犂九月授領侍衛内大臣十月授伊犂将軍二十八年三月叙平定準噶爾及回部功給騎都尉時哈薩克汗阿布勒比斯來索逃回伊犂之厄魯特明瑞以凖噶爾已平厄魯特等投回伊犂乃其故土斥責之并請􅃯下烏里雅蘓台将軍一體辦理諭曰明瑞所辦其為得體從前雖無彼此不留逃人之言但成衮扎布曽将自哈薩克逃出之厄魯特給回阿布勒比斯遂欲援以為例著傳諭成衮扎布等嗣後遇此等事俱照明瑞等所辦駁之先是明瑞面奉諭㫖籌辦塔爾巴哈䑓駐兵事宜至是奏言屯田兵應駐雅爾城留馬兵三百照管貿易餘馬兵千二百交領隊大臣於週圍廵查雅爾與伊犂多往返文移請自額敏河沿至巴爾楚克沁逹蘭設大卡倫三各駐兵三十其庫克托木嶺等處酌安卡倫則塔爾巴哈䑓一帶聲勢相接現今烏嚕木齊駐兵較多於巴里坤請将二處辦事大臣撤回巴里坤提督移駐烏嚕木齊烏嚕木齊兵移駐巴里坤奏入詔以烏嚕木齊大臣移駐雅爾餘如所請二十九年四月奏請伊犂添設理事同知從之十二月疏言雅爾等處駐兵屯田所需器具於緑旗兵内挑選匠作購辦物料以備臨時添補輓車輛之馬俱於牧羣撥用報聞三十年二月烏什小伯克頼黒木圖拉等聚衆五百餘乗夜縱火焚掠據城為變明瑞派副都統觀音保往援旋聞駐烏什副都統素誠自戕即親統兵進時恭賛納世通先帶兵至烏什之鄂托巴什觀音保至納世通派守隘不令進剿復行文止明瑞兵明瑞慮觀音保兵既撥防其進剿兵半係回人及布魯特不可恃仍統兵進奏入上以所辦甚哈嘉之三月抵烏什賊衆二千餘来犯明瑞與觀音保等擊之奪臺七殺賊二百餘俱傷入城山險城堅明瑞設防困之復遵㫖查奏素誠狂縱激變及納世通凌辱回衆副都統弁塔哈掩餙兵敗狀命尚書阿桂赴烏什傳㫖将納世通弁塔哈正法賊困守既久謀夜襲大營我軍偵知之預設備頼黒木圖拉中箭死賊復推其父額色木圖拉為阿竒木悉衆死守不敢出明瑞簡巴圖魯六百餘中夜携雲梯分道潛往薄其城先登東北隅賊未覺梃刃交下守陴賊驚竄即舉火招繼進者循城北至東南毁其堞天明収軍仍逼城築壘斷其樵汲賊城糧盡遂内潰八月疏報克復烏什城上以所奏簡畧勅明瑞阿桂将入城擒賊情形逐一奏聞尋㑹奏領兵築垜圍城原充烏什商伯克沙布勒縛首逆額色木圖拉及助逆要犯四十二人以獻磔首逆有名賊犯分别正法其被賊拘及匠作婦孺萬餘口分起觧送伊犂諭曰賊人戕我大臣官兵以死拒守及長圍乆迫始縛獻首惡希冀茍免誅戮凖以天理人情豈復可赦惟盡以軍法從事始足申國憲而儆愚頑今伊等既從事姑息著将送往伊犂人等即交伊二人飬贍交部嚴加議處又諭曰素誠等苦累回人各情節從前得之俘囚之口今額色木圖拉等正犯既經就獲理應嚴訊起釁縁由及素誠所犯是否屬實使情罪確鑿以成信讞乃伊等一概置之不問輙将賊黨正法有是理乎明瑞阿桂此次辦理錯謬不得不交部議處以示懲創其在事将弁兵丁仍交部分别議叙部議革職詔從寛留任旋命冩戰圖奨其奮勇克復御製詩曰勲戚伊犂董重兵早年回部得威名變聞遂率雄師援途逺仍教兼驛行可笑無能還妬阻幸因未聼遂遄征逆回始相倉皇守壁壘新知紀律明明瑞尋奏酌留兵五百駐守留原恊領伊昌阿侍衛舒明阿理工作原御史忠徳理糧餉調巴里坤遊擊陳堯典理屯田得㫖烏什事竣滿洲索倫兵無須多駐著留滿洲兵一百名索倫兵一百名十月㑹奏回部事宜一阿竒木之權宜分一格納坦之私派宜革一回人之差役宜均一都官伯克之補用宜公一伯克等之親隨宜節一賦役之定額宜明一民人之居處宜别一伯克等與大臣官員相見之儀宜定廷議允行三十二年緬甸滋擾總督楊應琚以措置乖方獲罪三月命明瑞為雲貴縂督兼兵部尚書議政大臣經理軍務六月奏言永昌騰越至順寜威逺普洱沿邉土境延袤二千餘里傍途側出處處駐兵即二三萬衆不敷分派臣等酌議土境扼要總區如迤東之九龍江迤西之隴川適中之黒山門應各酌留一營派土練固守委妥員統領選勇幹馬兵土練不時逺偵遇賊隨時勦逐其小路令總區将弁派人時往逰廵庶防兵大減而聲勢不分至分路進勦臣由龍江一帶出口至阿瓦賊巢係由東轉南折而西隔越滚弄江下游倍逺新街水路為緬匪要地必竭力守禦新街以東俱石墈小澗舟不能逹擬於新街上㳺伐木造船使木片沿江下先聲牽綴大兵自永昌騰越出口以宛頂木邦一路為正兵餘臨期相機或分兩路由猛宻等處尅期並進叢雜僻徑隨時出竒設疑使賊疲於奔救無暇他出窺伺我軍裹糧前進較遞運多節省至奏摺文報黒山門遮放以内仍設臺站即於進剿官兵内選妥幹勇壯者數十賫交黒山門轉遞如經過外夷部有誠心向化者再於其部落留兵設站遞送上嘉之十月授将軍管總督事務十一月由宛頂木邦進抵臼小破賊寨前渡打叠江過錫箔至蒲卡以西擊敗賊伏兵至蠻結四山環繞賊立十六寨防守用濕木交排實以土環浚深溝外宻竪木栅内列象陣伏兵明瑞統兵居中令領隊大臣扎拉豐阿李全踞其東觀音保長青踞其西賊突出犯西隊觀音保長青奮力勦擊明瑞督本隊兵並進斬級二百餘賊退保栅乃留兵二千令副都統伍三㤗音濟圖逹興阿張兩翼以壮聲勢分滿洲緑旗兵為十二隊明瑞首先進擊賊驅羣象以拒明瑞目鎗傷䇿馬指揮不少挫官兵奮擊羣象反奔我兵毁栅進無不一當百逼第二栅貴州籐牌兵王連攀栅上飛身躍入縱横賊隊中擊殺十餘人我兵遂擁入鼓勇勦殺自申至戍賊棄寨竄斬級二千餘生擒三十四人獲軍械糧畜無算㨗聞諭曰明瑞秉性純誠才優幹濟前者西陲之役每身先士卒効績宣猷昨嵗自伊犁来京陛見方值緬酋滋事前督臣調度失宜因令節制雲貴並授為将軍領兵進勦自任事以来凡辦理軍營諸事均能悉心籌畫動合機宜近自木邦整隊冞入於臼小地方統衆毁栅今行次蠻結復親冐矢石殱賊因糧摧堅䧟鋭以致目受鎗傷猶鼓勇直前克掦我武自此酋衆望風驚潰刻日直搗賊巢佇聞㨗奏朕心深為嘉慰明瑞現在所襲之公係承恩世爵今既屢著殊績自應特沛恩施用示優異著授為一等誠嘉毅勇公賞給黄帶紅寳石頂四團龍補服所有原襲承恩公著伊弟奎林承襲十二月師次革竜地近天生橋渡口賊預毁兩旁所植大木於山頂立栅明瑞令逹興阿率兵二千仍由大路進佯為奪取渡口之勢自督兵從間道繞至天生橋河上流乗霧畢渡進據山梁賊衆驚潰我兵進至象孔取道猛籠土司境就糧遇賊擊敗之土司逃避搜得窖氷二萬餘石駐兵三日趨猛宻躪賊境數千里屢戰皆㨗旋由大山移駐小猛育連攻賊營時恭贊大臣額爾登額頓兵旱塔退回虎踞闗避賊遶從内地小隴川緩行廵撫鄂寜檄援不應賊偵知孤軍併力攻圍我兵火藥粮餉俱匱以疲馬騾作三日糧三十三年二月明瑞令将領分隊以次衝出自冒矢石殿後胷臂被鎗陣亡都統扎拉豐阿䕶軍統領觀音保亦殁於陣事聞上軫悼特㫖照班第例從優議卹御製輓詩曰蠻結之㨗鼓勇進孤軍深入心牽縈屢催繼援竟弗援僨轅駑馬誠堪驚然猶因糧勦猛宻計當兩路兵合并誰料援師竟避賊强弩末被魯縞輕蜂屯蟻襍截歸路将軍體恤諸孱兵携數勇士獨殿後不虞中要害命傾嗟哉捐軀因為國痛惜如失股與肱雙忠雙烈及雙義三逄斯四何為情要當専祠表勲績俾爾千古存如生恨緬事益難中止雪讎大舉期功成四月柩至京扎拉豐阿觀音保柩亦至上親臨奠酹磔額爾登額於柩前以正逗遛失援罪御製詩曰全師原是出蠻陬何事三臣命獨休被阻稜稜恥生返捐軀赫赫永名留殿軍無愧孟之反隕節同如趙慶州故里櫬歸臨奠酹酒盃釃盡淚還流賜祭葬如例謚果烈諭曰将軍公明瑞夙秉忠誠厯著勲績昨命統兵進勦緬匪身先士卒屢挫賊鋒乃以懸軍深入而額爾登額等有心逗遛後援不繼困於猛腊地方保䕶諸軍身留殿後衝冐矢石以受傷身殞已降㫖加恩優恤並入祀昭忠祠以酧忠藎從前駐藏大臣傅清拉布敦鋤凶死事曽勅建雙忠祠秩在祀典兹明瑞勤事捐軀義烈尤堪嘉尚著循前例於京師特建専祠舉行嵗祀其先後陣亡之都統扎拉豐阿䕶軍統領觀音保縂兵李全王玉廷均予入祠從祀用慰忠魂並御書賜額曰折衝抒藎四十四年御製懐舊詩列五功臣中詩曰凡經百餘戰戰必先衆軍不謂世胄家而有如此人讀書知大義挽勁鮮與倫短身既精悍謀畧兼出羣功難僂指數嘉賚匪因親征緬次猛腊獨入克㨗頻恨遇忌功者逍遥河上陳力戰絶後繼終焉捐其身於爾無悔怨於我増悲辛不須讀杜牧謂過趙使君子恵倫襲一等誠嘉毅勇公世爵博清額愽清額滿洲鑲黄旗人姓富察乾隆十七年繙譯進士授兵部主事遷户部員外郎軍機章京行走三十四年隨經畧大學士公傅恒赴緬甸軍營十月大軍敗賊於新街博清額在事有功議叙加一級三十五年三月回京授正藍旗滿洲副都統七月署兵部侍郎兼理刑部侍郎事詔偕户部侍郎索琳赴土黙特鞫諴親王壻納遜特固斯謀鴆格格案三十六年正月因不能究出實情反将案犯交納遜特固斯㸔守又不候㫖徑同索琳囘京交部察議降二級留任三月改授内閣學士七月命察視永定河不速往傳㫖嚴飭令還京三十八年四月命赴四川軍營㑹鞫提督李煦副都統常保住諱賊事五月博清額據防卡兵丁供詞劾煦等諱賊属實命再詳鞫六月木果木大營失利李煦常保住隨叅贊海蘭察防駐免治罪時賊勢䲭張博清額偕縂督富勒渾馳守䝉古橋復帶兵三百赴美諾與海蘭察相機䇿應上嘉之授領隊大臣諭曰博清額以派往審事之人即同富勒渾帶兵馳守䝉古橋旋往美諾與海蘭察督兵聲援連日海蘭察奏到諸摺俱有條理必係博清額為軍機章京辦事年久熟習機宜故能周到若此著賞戴孔雀翎八月同海蘭察奏整理軍器俟将軍阿桂至日嚨時擬辦進兵事宜十月得㫖博清額辦事不及阿桂其攻勦亦不及海蘭察不必在軍營領隊即著回京仍在軍機章京上行走三十九年署理藩院侍郎四十年授正黄旗䝉古副都統四十二年七月署刑部侍郎四十三年閏六月命往庫倫辦事四十四年授兵部侍郎四十五年十月遷理藩院尚書署都察院左都御史十一月命往西藏辦事四十九年授正白旗䝉古都統五十年詔還京未至卒諭曰博清額前在軍機章京上行走旋擢卿貳宣力年久此次前往西藏駐劄辦事已閲數載因念其年力未衰特命回京供職以資倚任兹聞溘逝殊堪憫惻除已由藏賞銀三百兩料理䘮事外所有應得䘏典該部察例具奏尋賜祭葬如例謚恭勤福隆安福隆安滿洲鑲黄旗人大學士忠勇公傅恒次子尚和嘉公主授和碩額駙乾隆二十三年授御前侍衛二十六年三月兼管光禄寺四月兼管奉宸苑七月掌鑾儀衛事三十三年二月擢兵部尚書軍機處行走三月兼議政大臣四月調工部尚書三十四年正月授御前大臣署縂管内務府大臣九月署理藩院尚書賜紫禁城内騎馬三十五年三月兼歩軍統領七月管理藩院事十月授領侍衛内大臣襲忠勇公爵三十六年疏言馬兵例准鄉試又可在營陞㧞是一人而兼兩途請将籍𨽻大宛兩縣兵丁與武童一體應試取中武生再准鄉試部議從之三十七年四月署鑲黄旗滿洲都統五月散秩大臣銜阿爾㤗總兵宋元俊恭奏四川總督桂林在卡了軍營約令叅将薛琮間道夾擊金川賊桂林畧一進攻即退並将䕶軍統領明亮副都統鐡保撤回薛琮以糧盡救不至戰歿軍盡覆桂林揑餙具奏與鐵保終日酣飲将偹罕得見在軍營修房居住勒取供應令提督汪騰龍交銀縂兵王萬邦贖取金川所􅃒官兵命福隆安往審六月奏審無酣飲勒𣲖事桂林所居有預備貯米板屋三間無不見者薛琮告急即令宋元俊往援惟官兵傷損不即查奏属實至贖取官兵係户部司員汪承霈聞有巴旺布拉克底土兵送出迷失官兵信告知桂林取銀五百交汪騰龍備賞後未見送出仍将銀取回其王萬邦給宋元俊札揑冩収銀贖人係為宋元俊所愚請分别治罪諭曰宋元俊汪承霈均著革職拿問同桂林一併觧赴行在候訊至王萬邦初為宋元俊所愚一經詰訊即吐實情此案得以明確情尚可原且領兵打仗頗為勇往免其革職治罪明亮鐵保汪騰龍已降㫖革職鐵保仍遵前㫖留軍營効力未㡬元俊議革職仍留軍營桂林得㫖發伊犂効力贖罪是月福隆安又奏言賊畨踞守碉樓木寨時出伺我兵舉動軍營事應謹密方可乗其不備已申明紀律整肅軍容以杜賊畨窺伺又言臣沿途查㸔山險路遥挽運維艱打箭爐等䖏雖貯粮萬餘而軍營存粮無㡬不能克期趕運阿爾㤗年邁請令陕甘縂督文綬往章谷等處督運得㫖調文綬四川縂督三十八年閠三月充四庫館正總裁四月加太子太保十月授正白旗滿洲都統三十九年四月御史李潄芳劾福隆安家人藍大在金陵館酗酒滋事鞫實擬罪部議革福隆安職諭留任十月疏言鳥鎗為行軍利器八旗専操㑹操演習九進十連環所向無前各省緑營鳥鎗請照火器健鋭二營進歩連環式一體演習下部議行四十一年正月調兵部尚書仍管工部事二月金川平叙功加三級命圖形紫光閣御製贊曰父定復叛子嘗愧之是用稽首躬請出師留於左右俾習規畫頗有嘉謀協予廣益七月兼文淵閣提舉閣事十一月充國史館正總裁四十二年四月暫署吏部尚書四十三年錦州副都統徳福劾協領福神保藉差斂銀命福隆安查辦尋奏訊福神保歛借商銀交将軍𢎞晌所設差局帮貼差費公用𢎞晌並未入已但以宗室大臣見小滋弊請交宗人府㑹同刑部治罪福神保等發烏嚕木齊効力餘分别枷責得㫖𢎞晌訊無染指亦未授意派歛著加恩以㪚秩大臣効力贖罪四十四年三月直𨽻總督周元理奏審辦井陘縣民李馥等歛錢告官梁進文抗官毆差案歩軍統領衙門緝獲案内逸犯供知縣周尚親有科歛侵肥各欵命福隆安同刑部侍郎喀寧阿錢汝誠㑹鞫尚親派累屬實抵罪周元理以徇庇劣員革職四十七年四月上躬詣雩壇行禮諭曰常雩大典朕親詣行禮壇内一切禮噐均宜敬謹安設乃本日行禮時見壇内懸挂天燈僅止二盞又更衣幄次所設坐褥亦不整齊郊壇典禮朕親詣行禮尚如此草率不敬若遣官恭代更不可問矣其罪甚大非尋常錯誤僅止交部議者可比工部堂官羅源漢等近因福隆安患病精神不能周到遂各委蛇袖手而派出司員等亦俱怠忽從事以致種種玩悞不可不嚴示懲儆福隆安若照常辦事時遇有此等錯誤其處分必較諸人加倍姑念患病屬實著加恩免其革職仍罰其公俸十年四十八年五月留京辦事十二月上閲朝審招册疑趙文逹毆斃夫役張二案命覆訊諭曰前閲本年朝審情實招册内趙文逹毆死夫役張二一案忽疑其或有頂兇情節因詢之和珅福康安福長安俱不能深悉其中情偽至朝審勾到之晨大學士阿桂奏此案情節頗有疑竇請㫖再行研審確情因派阿桂和珅福康安劉墉㑹同刑部堂官覆訊該犯等始猶堅執前供及研鞫再三據供實係福隆安管事家人富禮善主使責打趙文逹聼從動手属實此案既據審明可見從前刑部堂司官不能盡心推鞫復令查檢原案初供係福隆安署歩軍統領時移送刑部其原咨内本有家人富禮善喝打之語乃形部定案時趙文逹挺身直認証佐匠役等亦隨同指供司官既不嚴鞫而堂官等意在觀望不肯深求顢頇了事以致富禮善脱然事外福隆安病體至今未愈被家人始終瞞哄竟無見聞而刑部堂官不加駁詰推求未免有意瞻徇福隆安情面刑部堂司官實咎無可寛所有該堂官及主稿隨同畫押之司官等俱著交部嚴加議處至福隆安於此案雖原報本有富禮善之名及後改供亦實不知情但致令刑部司官意存觀望即伊平素恃朕恩以致人畏即其過也此案若趙文逹已經勾决不特福隆安獲咎更重即阿桂等亦不能無罪兹幸究出情實未致枉縱其情節尚可稍從寛减福隆安著罰公俸十年仍交部嚴加議處部議革職詔免四十九年閏三月卒諭曰尚書額駙公福隆安醇良謹飭勤慎小心綜理部務宣力有年昨嵗因舊症復發屢經給假調理賜藥賜醫方冀年力尚强可以漸次平復倚畀正殷近聞病體加劇即令伊子豐伸濟倫馳驛回京省視兹聞溘逝深為悼惜著皇八子親往奠醊並賞給内庫銀五千兩派金簡經理䘮事任内降革䖏分概予開復前次伊家奴犯罪自請罰公俸十年亦加恩寛免應得卹典察例具奏尋賜祭葬如例謚勤恪子豐伸濟倫襲一等忠勇公爵現官御前侍衛䕶軍統領副都統豐昇額豐昇額滿洲廂黄旗人姓鈕祜禄尚書公阿里衮子乾隆二十五年由拜唐阿授三等侍衛三十四年襲一等公擢領侍衛内大臣三十五年六月管理三庫事務旋署兵部尚書七月授御前大臣兼鑲藍旗䝉古都統總管内務府大臣三十七年二月将軍温福疏劾恭贊五岱乖謬上命豐昇額偕額駙色布騰巴勒珠爾赴金川軍營訊問五岱旋發伊犂効力贖罪三月命豐昇額留軍營授叅贊大臣四月諭曰豐昇額奏事列名應在阿桂前但阿桂厯練軍務豐昇額甫經學習仍著阿桂列名在前豐昇額列名在後豐昇額不可稍存意見致有掣肘阿桂亦不得推諉務須和衷辦理期於軍事有益五月豐昇額以大礟擊傾東瑪賊寨翼日飭官兵進攻聞賊營鎗聲不絶知賊尚衆佯退突令章京佛進泰富爾賽逼寨賊驚拒侍衛伸逹蘓以大礮斃數人賊稍却我兵力戰賊或墮崖死或焚斃餘皆遁遂克東瑪上嘉之六月攻固卜濟山梁豐昇額偕舒常馬彪等率兵抵色爾渠令烏什哈逹巴三泰等左右進攻舒常馬彪等分應豐昇額由中路進近賊卡賊盡竄毁其石卡次日復以大礟擊之烏什哈逹等率兵潛下巖磡豐昇額由山徑䇿應鏖戰敗之盡獲其碉卡七月仍以礟擊賊碉令烏什哈逹佛倫泰等設伏彰靄巴三泰等據西北峯斷别斯滿來援賊豐昇額等突入殱賊甚衆克色爾渠大碉及卡房百餘十一月豐昇額與温福克明郭宗沿途碉卡敗賊於公雅山十二月克嘉巴山焚念經樓進次布朗郭宗克底木逹等寨擒僧格桑之父澤旺詳見温福傳是月授豐昇額為副将軍温福議分三路進温福由功噶爾拉進攻喀爾薩爾阿桂由僧格宗至當噶爾拉同取噶拉依豐昇額由章谷吉地赴綽斯甲布與舒常合取勒烏圍疏入上嘉之自是豐昇額遂駐兵宜喜三十八年四月晉太子太保六月木果木師潰七月奏據綽斯甲布土司來告賊謀斷宜喜粮䑓現在實力修防智固山諭曰豐昇額在宜喜軍營原屬三路並勦及聞温福軍營失事諭令撒兵今阿桂既退據得地軍氣復伸各土司中聞阿桂既出與豊昇額遥為犄角亦斷不敢復萌動摇之心並可鎮撫綽斯甲布衆心豐昇額必當仍駐宜喜為是其善體朕㫖妥協行之十一月将軍阿桂收復小金川豐昇額奉命移兵丹壩三十九年二月晦夜半豐昇額自逹爾札克之北山澗越石踏雪以進黎明抵凱立葉山麓令侍衛那木札等過嶺直入見大峯六俱有碉賊矙我兵将近鎗石並發官兵直前衝擊又令侍衛彰靄明仁取第二峯瑪爾占伊逹里等取第三峯令五岱於三峯下立營議取第四峯奏入諭曰凱立葉一路既難遄進原不應過於株守今留五岱在凱立葉牽綴賊勢而豐昇額前赴阿桂軍營合力進攻兵勢更盛若果進至勒烏圍則凱立葉之賊自可不攻而潰十月賜元狐㡌貂馬褂是月攻克凱立葉山梁十一月攻格魯克古丫口大兵横越山溝四山梁五獲碉五十寨落三百遂通丹壩奏入上深嘉悦四十年正月偕阿桂奏克康薩爾四月克榮噶爾木城及木思工噶了口碉座進攻下巴木通碉栅盡克勒吉爾博山梁進據得式梯官寨命優叙五月攻遜克爾宗圍將合分三路並進賊不能支連取碉十二賊奔箐盡殪之諭曰遜克爾宗一帶攻取年餘尚未得手今豐昇額全行奪取實為奮勉出衆豐昇額乃巴圖魯額亦都之孫其果毅公爵即係額亦都傳襲前将軍兆恵因平定凖噶爾回部曾於公爵上加封四字今豐昇額能繼其祖著於果毅字下加繼勇二字以示優奨七月攻章噶豐昇額督官逹色仁和等左右分攻海蘭察攻其正面賊於碉外置壕三壕外立木栅我兵毁栅鋪壕乗之緣碉角而上從碉頂壓下賊盡竄克之並得其旁木城八月阿桂分兵四面攻勒烏圍豐昇額策應克勒烏圍官寨及轉經樓喇嘛寺㨗聞得㫖優叙十二月克格隆古科布曲山梁四十一年正月克瑪爾古當噶山梁遂進圍噶拉依賊巢奏入諭曰副将軍豐昇額本襲公爵復加賞繼勇名號著再賞以一等子暫令伊弟布顔逹頼承襲俟豐昇額生子後仍令其子承襲是月調户部尚書賞戴雙眼孔雀翎二月金川平賜縀四十端銀四千兩四月凱旋上行郊勞禮恩賜御用鞍轡馬一匹命圖像紫光閣御製贊曰宜喜弗動定見識機後副西路親勵戎衣遜克爾宗督兵進取國之藎臣勇繼乃祖是月管崇文門税務旋署左都御史兼署理藩院尚書十月授歩軍統領兼管太常寺樂部四十二年四月調正白旗滿洲都統兼管禮部事務五月諭曰尚書公豐昇額昨在金川奮勇著績克紹祖風且能勉承伊父阿里衮忠誠素志曽降㫖於所襲果毅公爵加繼勇二字以示奨勵所有阿里衮原襲公號亦著加此二字用昭世臣濟羙是年十月卒諭曰尚書果毅繼勇公豐昇額秉性忠誠奉職勤恪昨以副将軍征剿金川殫力宣忱奮勇著績能承父志以紹祖風深可嘉尚是以降㫖於伊所襲果毅公爵加繼勇之號以奨勲勞伊年富力强正堪任使乃於前月忽遘沉疴即派太醫院堂官胗視頻加存問並賜人葠以冀速痊遽聞溘逝深為軫惻著加恩賞給陀羅被派散秩大臣一員帶領侍衛十員往奠茶酒並著加恩晉贈太子太保復諭免其代賠伊父未完銀二千七百餘兩賜祭葬謚誠武繼子明安襲公爵現官乾清門頭等侍衛欽定八旗通志卷一百四十五
