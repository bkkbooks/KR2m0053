body:
  text: 欽定八旗通志巻一百九十九人物志七十九大臣傳六十五漢軍正白旗四文楊宗仁禮蔡良魏經國楊乾石哈孫國璽三泰何立柱楊宗仁楊宗仁漢軍正白旗人由監生於康熈三十五年授湖廣慈利知縣四十年五月調藍山四十四年總督喻成龍巡撫趙申喬疏荐卓異遷甘肅階州知州四十五年遷蘭州同知四十九年十一月總督音泰巡撫鄂竒復疏荐五十年五月遷臨洮知府五十二年以巡撫岳拜疏荐老成練達熟悉番情授西寧道五十三年七月遷浙江按察使五十四年十一月丁父憂五十七年八月補廣西按察使旋署廣西巡撫十一月擢廣東巡撫五十八年上以直省錢糧􅃜空甚多令各督撫立法清理宗仁疏言粤東􅃜空現在嚴飭各属勒限追完至於防杜将來惟督撫司道府㕔交相砥礪勿藉事勒索無論正雜錢糧知府照例不時盤查庫銀隨征隨解米穀實貯在倉毋許􅃜缺若州縣自行花費知府寧肯代為彌縫甘蹈分賠之嚴例州縣既無由那移掩飾即􅃜缺諒必無多亦易補足倘敢徇縱除本官嚴行治罪上司從重議處庻上下皆知􅀈惕若地方有不得已之公務那用難責州縣獨賠又難使倉庫􅃜缺應以督撫等所得公項銀抵補如不敷仍設法公捐總不致課帑虚懸於清釐􅃜空不無小補下部議如所請六十一年十一月世宗憲皇帝御極授湖廣總督雍正元年正月丁母憂命在任守制并停陛見宗仁疏請停給恩詔應得本身妻室封典及廕為父毋求諭祭得㫖俞允仍給封廕尋賜孔雀翎四月疏言湖廣素稱俗薄民刁兵驕吏玩細究其故皆由文武大員向所属官弁索取陋規節禮州縣必至横徴私派武弁必至虚兵冒餉兵民挟此逞奸員弁不敢過問臣今槩行禁革不許文官有私派武弁有扣冒之弊庻兵民不得藉詞逞私驕悍之習兾可黙化潜消再兩湖地方鹽價逐漸増長窮民每興嗟怨揆厥所由各官多貪鹽規商人借此長價即如總督衙門鹽規漸次加至四萬從前一錢一包之鹽今則公然昂貴至一錢五六分不等臣今盡革鹽規令商人減價出售以恵窮民俾地方漸有起色至於嚴禁官宦富户囤積止令商販往來俾米價漸平與力行保甲稽查匪類等件皆臣職分應行之事不敢一一𤨏陳得㫖覧爾所奏朕深嘉悦在他人猶聼其言而觀其行至於爾則信而不疑斯乃全楚地方否極而㤗之機也五月疏荐廣東南海知縣宋瑋陞湖南寳慶知府廣州左衛守偹范宗堯改補湖北漢陽知縣得㫖姑允所請後勿踵行又疏言俸工一項乃朝廷禄養官役之恩豈可任意飭捐以填貪壑湖廣州縣以上俸工報捐已經十有餘年總無分厘給發責成官役枵腹辦事焉能禁其不需索閭閻今自雍正元年起一切官役應支俸工臣俱令各照額編支領俾均沾實恵從前凡有公事無一不令州縣分捐實皆派累百姓臣通長核算但令州縣於所得加一耗羡内節省二分解交藩司以充一切公事之費此外絲毫不許派捐近奉部文又将解部餘平一分恩賜免觧承辦公事更得有餘况節禮陋規槩行禁革則州縣亦易於補苴從前􅃜空矣得㫖所言全是一無瑕疵勉之尋以病請以子榆林道文乾隨任終養詔加文乾按察使銜馳驛速赴並遣御醫診視七月疏言湖北糧道管理全省漕運兵糈一嵗中計有半年公出舊設驛鹽道管全省驛逓號船應付勘合火牌淮鹽到楚盤騐察私督運額銷引目職守逈異康熈五十八年依前督臣滿丕奏以驛鹽道歸併糧道似未妥協請復設以専責成下部議行九月疏言襄陽府属之樊城鎮五方雜處商賈輻輳奸宄易以潜踪請移㐮陽府同知駐樊城弹壓從之又言清净盗源稽察窝賭窩逃法莫善於力行保甲臣到任後即通飭所属令紳衿兵役與齊民一體鱗次挨編保甲不許脱漏一户聨絡守望百姓稱便誠恐州縣奉行不得法今專委本管道員稽察如有未盡合法之州縣即令指示照式編次擇其善者另予優奨得㫖此論甚好凡舉行一法必示以勸惩方期有效耳二年正月疏言立社倉實係羙政臣與各官加意講求先擇地建倉然後勸捐榖本出納聼民自主不許官吏㑹計侵肥並立奨掖尚義之典士民咸踴躍争先江夏武昌蒲圻等二十州縣各建倉三五十所不等約共捐榖本将三十萬石效騐已著臣又傳湖南循此成法施行得㫖據奏社倉一事於各省中爾先成創始之功殊可褒嘉三年六月諭奨督撫諸臣中居官行已可風有位者加宗仁太子少傅銜七月卒於官年六十有五遺疏入得㫖楊宗仁敬慎持躬亷能供職効力年乆懋著勤勞自簡任總督以來潔已奉公孤介端方始終一節忽聞溘逝朕追念良臣深為悽惻難釋於懷應沛特恩以示優眷加贈少保並給騎都尉世職准襲二次仍察例予䘏賜祭𦵏諡曰清端御製像贊有亷潔如冰耿介如石句八年入祀賢良祠文乾仕至廣東巡撫自有傳蔡良蔡良漢軍正白旗人祖士英順治年間官漕運總督自有傳父毓茂康熈九年補佐領二十一年授叅領二十五年從征噶爾丹逾年擢京口副都統四十五年高家堰下濬河築堤偕都統孫查齊等往督工四十七年卒賜祭𦵏良由閒散於康煕四十二年授佐領四十八年授叅領駐防福州五十八年遷浙江台州副将雍正二年七月詔直省副将以下游擊以上員弁輪流來京視其漢仗弓馬以辨優劣十一月良於箭亭引見射箭命發往陜西四年四月補漢中副将六月遷延綏總兵八月調江西南贛總兵九月擢福州将軍五年二月奏言閩省四旗披甲人等臣現在訓練鎗箭務令精熟行走不許怠惰其不能節省行事不合者盡力整頓更有兵丁之弟男子侄雖係壮丁尚未披甲游手好閒遇事生風自以閒散無人約束官長亦慢不稽查今飭令各旗協恭領防禦驍騎校等官将壮丁内力可營生者任其自贍仍不時查察其餘皆帯領習學鎗箭稽查出入行走之處若技藝嫻熟毫無過犯遇有甲出即選擇頂補倘不肯習學而又為非雖本家甲出亦不准頂補仍責成父兄親族勸其悔改既開其上進之路又示以不能得甲之勢則知法者更加勉勵即㳺手亦不敢為非矣得㫖此奏甚屬可嘉但務實力為之加勉勿懈六年四月奏言閩省駐防習氣不好臣留心體察實力挽回至節儉所以省財亦以惜福毎於操演地方諄切曉諭務敦節儉禁紛華近來奢靡漸歛再如賭博酗酒尤為不法先飭四旗該管官嚴行約束又每旗派撥官一員領催數名各按所管稽查得㫖嘉奨十一月叅奏左營副将金國泰右營㳺擊呉廷元酗酒不職詔革二人職諭内閣曰將軍蔡良覽其陳奏具見實心辦事伊名下有代父應賠銀兩特加恩免其賠補以示眷注七年三月奏言駐防兵丁向年賭風甚熾已嚴飭查訪又于八旗派出領催四十名臣標四營派出百隊二十名毎月一換責令専管查拏今賭風亦覺歛息風俗人心可漸轉移再查駐防報逃者甚多大半皆係所買民人此軰原無根底無知兵壮只圖身價無幾可得人用犯逃在外為匪不免株連前奉諭㫖嚴禁旗下不許擅買民人臣凛遵聖諭飭令只許八旗兑買其從前所買民人如果安分准其留用倘有犯逃者即係自回亦必令其交還原中保領去收回身價仍委協領一員尃司其事或徇私容隠本犯照例治罪官以失察糾恭領催一體連坐得㫖照所奏實力整頓開導毋得始勤終怠六月上諭蔡良訓練約束兵丁勤慎得法福州駐防營伍大為整理著調補廣東将軍九月奏言廣州駐防兵壮向樂游嬉往往不能安分臣於較閲聚集時靣為曉諭操差務要精勤使令必聴管束進退合乎規矩上下須别尊卑俾人人知法紀當遵惡習當改其壮丁人等俱飭不時稽查勿令外出閒㳺使之學習技藝再查廣州五方聚㑹地當濱海最易藏奸前任將軍石禮哈編設保甲實為清弊之要但民人雜處則其來厯眷口悉應填註更有如鑲黄旗兵壮住居正黄旗汛地者或係租賃彼旗房屋在住址原難畫一編入保甲自應聴其查㸃而本旗該管人員亦應赴彼稽查不得置之不問則逃人可漸稀少得㫖所奏二條可嘉再如奢靡之習尤當加意訓誡此為養兵根本之道慎勿稍忽九年十二月卒予祭葬如例諡勤恪十年二月上以将軍蔡良與提督張起雲總兵蘇大有魏國翥皆素有賢聲勤勞王事宜在賢良之列命直省建祠祀之魏經國魏經國漢軍正白旗人由熱河把總累遷至守偹康熈五十年特擢通州副将上以經國家貧賜銀五百兩命子姪隨任五十七年擢江南蘇松水師總兵五十八年調天津縂兵六十年六月遷湖廣提督赴熱河請訓適兵部引見大選官員上命經國近前令舉所知命㑹同歩軍統領選京營守偹千縂帯楚補用雍正元年奏稱到任後将一應陋䂓盡行裁革飭令各營修器械勤操練得㫖湖廣通省被五六庸夫敗壞賴爾一人幸保無事厥功不小三年加太子少傅調補江南松江提督尋加兵部尚書銜世襲騎都尉四年疏言江省竊案較他省獨多縁財賦之區商旅輻輳加以支河小港易於藏奸晝潜夜出難以稽查臣設巡船遣目兵輪流巡緝并飭通省水陸各營一體巡查盗風庻可息得㫖該管協營悉飭令寔力為之五年八月疏言臣子湖廣提標中營守偹魏瓆荆門營遊擊魏琨奉㫖命臣携至江南以逰擊守偹題補臣長子魏瓆業荷特恩准補臣標中营守偹請以次子魏琨賜補泰州營逰擊臣感聖主矜憐令臣父子同任一方是以冒昧題請下部議從之十二月奉㫖魏經國由末弁屡次超遷用至提督朕聞伊在楚聲名甚好加恩優待因松江地方𦂳要将伊調補乃伊沽名釣譽求悦於人以致湖廣營務廢弛即在松江從未奏地方利弊一事亦未舉劾一人所長不過操守一莭其属官弁賢不肖皆相安而昵愛之故京師稱道者多觀其行事實足為政事人心之害著革太子少傅尚書銜並世職回京另用六年授鑲紅旗漢軍都統七年正月署直𨽻古北口提督閏七月請改石匣營逰擊為順義營逰擊石匣營中軍守偹為順義營中軍守偹並増撥兵丁三百名駐順義移漕河把縂駐牛欄山順義把搃駐楊各荘從之九月疏言熱河一帯地方路通各口建立行宫四方貿易絡繹不絶近省貧民俱托足餬口臣親厯河屯營十汛見人烟稠宻户口殷繁外來㳺民蝟集㳺閒滋事者不少理事同知一員約束難周熱河迤東一百八十里地名八溝接連䝉古行商多聚於此最為繁雜請増設通判巡檢等官與同知分管東河西河部議從之八年二月疏言武職親丁名粮前經河東督臣田文鏡奏准馬歩各半各省一體遵照臣查各省營制大率馬二歩八然有馬糧甚少僅供差防者有祇設守糧無馬糧者有設馬歩戰糧無守糧者如武職親丁名糧俱准馬歩各半行之河東二省自必相宜若槩以為例似難通行請将馬糧甚少與祗設守糧之營按馬歩各半之􅂾以二歩扺一馬聼提鎮臣酌定至扵祇有馬歩戰糧並無守糧如古北提標石匣新營各員所食歩戰糧較之馬糧祇少草豆乾銀其餉数無異似應照馬二歩八留作養糧亦與馬歩各半之数相等一變通間實於軍務有禆得㫖覽魏經國所奏有不得不因地制宜之勢其言甚為明晰著直省督撫提鎮各就本地营伍情形議奏並下部知之八月疾作遣御醫齎藥往視十月卒遺疏入諭曰魏經國厯練營伍操守潔清向䝉聖祖仁皇帝深恩由㣲弁用至湖廣提督朕復授以松江𦂳要之任伊居官謹飭砥礪亷隅但遇事瞻徇兼有罷軟之習是以調取來京切加訓誨上年用為古北口提督遵朕指示辦理妥協無忝封疆之寄今聞溘逝深可憫惻應得䘏典察例具奏尋賜祭𦵏如例諡僖恪楊文乾楊文乾漢軍正白旗人湖廣總督宗仁之子由監生効力永定河工康熈五十三年授山東曹州知州五十七年遷東昌府知府六十一年卓異遷陜西榆林道雍正元年加按察使銜命隨父任侍疾三年正月授河南布政使三月奏言山東曹州西南之桃園集壤接七縣係山東河南直𨽻交㑹之區距城遼逺巡察難周奸民朝此暮彼出沒無常請以曹州州同移駐弹壓如所請行四月擢廣東巡撫賜孔雀翎及冠服鞍馬尋丁父憂命在任守制十二月奏言臣自楚赴粤途中聞告休布政使朱絳倚與總督孔毓珣姻親􅉻帑三萬餘両交代未清即嚴飭作速賠補諭曰司庫此項挪用孔毓珣曽經奏過爾等封疆大吏惟宜一心一徳以和為主切勿聴信属員􅄐閒之言以致好惡参差文乾又奏言臣抵任後查盗案塵積請概為速結諭曰盗案非命案可比命案遲延拖累無辜固属不宜若因監斃者多遂立意輕縱盜犯尤為不可此事朕難批諭况亦非摺奏完結之事倘慮積案拖累在汝秉公嚴催詳情度理而為之孔毓珣扵緝捕盜賊甚為盡力彼擒之汝縱之恐汝難當此論縱虎歸山豈為仁政此等作為非積隂功乃大壊徳行事也若不加意斟酌萬萬不可四年四月疏言廣東省城盜賊甚多非編保甲不能清理旗兵與民人連居臣擬㑹同将軍不論滿漢兵民逐以編查省㑹奸匪既清各府州縣可漸舉行盗風庻少息諭曰此見甚好弭盗之法此為探本窮源之上䇿也又疏言廣東去嵗薄收今春米價日増臣委員赴廣西買榖運糶詎有鑲黄旗披甲閻尚義等誘集多人赴厰搶榖毆傷監糶官旗兵等赴将軍衙門喊禀将軍李杕令赴臣衙門講説尚義等即擁至臣衙門及臣拿獲数人李杕令臣釋放臣未聴從又嘱理事同知汪苕文求從寛完結杖身膺重任不能約束兵丁事闗旗兵鼓衆乞皇上欽差大臣來粤確審定擬上命禮部右侍郎塞楞額兵部左侍郎阿克敦往審得寔杖及尚義等俱論罪如律十一月疏言廣東民納糧俱用老户臣令改立的名今各属申報或因墾買過割之際就本名註冊或赴縣完糧時問明辦糧人的名登於原冊老户下百姓始知改立的名則已身完賦後他人未完者不至累及且就糧管業不致詭寄飛灑諸弊争先開報一二年後通省俱可改註至丁銀自康熈五十年審定後不復加額廣東丁隨糧辦者已十之四五其未隨糧辦者令布政使確查将丁銀盡歸地糧永免無糧徴銀之累得㫖嘉奨十二月䟽言廣東地狹人衆米不敷食積貯宜豫今現存倉榖百六十餘萬石存七糶三毎年出榖五十萬石春夏二季兵丁於糶三榖内碾撥三十三萬餘石僅存十七萬石臣為民食乆逺計應酌量要地加貯二百餘萬石擇水陸總口可達数州縣適中之地建倉貯榖有需即可撥運䟽入下九卿議僉以濱海地不宜收貯以致浥爛惟恵潮瓊三府僻處海隅遇歉嵗輓運維艱潮属之海陽加貯榖十萬石潮陽加貯榖八萬石程鄉加貯榖六萬石饒平加貯榖二萬石惠属之海豐加貯榖二萬石瓊属之瓊山加貯榖六萬石得㫖依議又奏言秋審緩决人犯雖非可矜亦不至情寔請将三次緩决者减等發邉逺為民諭曰朕甚不取汝此奏且恐汝務小而遺大寛嚴不得其宜朕甚憂之大凡應嚴者既不能嚴則應寛者必不能寛果能以公忠血誠對越天地神明刑所當刑即决人亦造福之事何况其他四年四月奏言粤省辦公銀每年六七萬兩向扵火耗提用臣商同督臣及司道等将可省者盡裁必不可少之項約需四萬兩查民間置産推糧過割例有州縣公費又奉裁衛所屯糧陋規兩項均可提作公用無用冄藉火耗又各官養亷一項州縣徴収火耗每両加一其實連戥頭併封積零合筭一錢三四分不等許觧司平頭三分并繳二三分為修戰船及按察使道府㕔員養亷每兩净存五六分留作州縣養亷其解司平頭共三萬両有竒除毎両撥三釐為布政使衙門工食外督撫藩司各得養亷銀九千餘兩俱足用諭曰但務得中為是若暫邀一時之名使將来至扵難措非善舉也民情亦不可令至驕慢属員亦不可令至窘乏天下事惟貴一平所以古人有平治天下之語若一偏之見致逺恐泥故君子不為利不十不變法害不十不易制似此通盤更移之舉必徹始徹終籌畫妥當而為之慎毋逞一時之興而輕舉也五年三月乞假𦵏父允之七月福建巡撫常賚䟽恭文乾徴收太平粤海闗稅設立専行得銀二十餘萬兩致夷船進口無行承㰖去嵗将夷人銀豫行加一扣收得銀四萬三千餘兩及上餉復毎両抽分銀三分九厘令六専行先繳又發銀數萬兩於他處買湖絲茶葉等物貯如升行勒令賣完方許各行買貨所以商船稀少上以常賚所奏銀數未晰洋行貿易外楊文乾冄有見小漁利之處㩀寔入告嗣常賚疏稱粤海闗稅額毎年四萬有竒雍正四年楊文乾奏報連羡餘九萬有竒臣細訪寔十五萬兩抽分夷人銀二萬餘兩賄縱紅黄紬縀出洋得銀萬両扵畨銀不論是否買貨先加一扣收得銀四萬餘両此係例外之求復選洋船竒巧之物入署令所派尃行賠價計銀二萬餘兩又交鹽商銀萬九千作二萬兩營運生息此見小漁利處也疏入得㫖從來操守二字寔難得其人在楊文乾自以為不闗國計民生設法巧取名寔兼收不知人之耳目如何能欺所謂弄巧成拙若不改悔立見名寔俱敗耳尋諭楊文乾曰洋行一事確鑿可㩀汝意以為巧取暗獲名寔兼收殊不知人之耳目難瞞但一圖利誰肯心服汝既巧取獲利而居清官之名属員亦必令有巧利方可禁其婪取否則雖令不從此干係属員生效尤之心也至於百姓汝曽經奏朕粤人惟利是視身命皆視為次汝一狥利則百姓孰肯感服聼從耶為督撫大吏者既失属員百姓之心而欲令地方就理豈可得乎汝若不深自愧悔痛改前非必至噬臍不及矣八月上以福建州縣倉庫􅃜空甚多命文乾同浙江觀風整俗使許容吏部郎中鄂彌達内務府員外郎伊拉齊往查文乾疏奏閩省八府中惟福泉漳三府最要福州府臣就近委盤漳州府擬委候補知府潘體豐署印盤查郎中鄂彌達督察泉州府擬委候補知府劉而位署印盤查員外郎伊拉齊督察延平府擬委建寕府知府莊令翼盤查其建寧府另行委員盤查其餘府州擬扵候補知府同知内暫委署盤查所報無􅃜空州縣亦恐那新掩舊必将各員交錯調用本身一􅄐原地諸弊盡露諭曰料理頗好竭力為之文乾又奏言各州縣聞盤查信紛紛買補興化府倉榖已買足延建邵等府素産米榖今嵗年景亦佳現責令速補漳泉福等府素不産米入秋雨稍缺請寛限陸續買足逾限冄叅究諭曰買足者與未買足者原經􅃜空即属一體豈可因其現在買足與否而分别之耶若如此不論居官之賢否止㸔地方豐歉竟論造化而已爾此請㫖大謬矣朕意無他将通省人員於此倉榖一案内查其好者概留劣者概去此二句乃朕本意要在爾等秉公論人辦理朕亦難以詳􅊖指示總期通盤還朕一是字或能與不能闗保爾一生榮辱㸔汝之福量何如耳九月疏稱臣在閩聞廣南韶道林兆惠採買木料被刼又聞有盗數百搶龍門營七子汛軍噐恣刼鄉村署督臣阿克敦令地方官從寛批結高州府電白縣山内聚盗千餘白日沿村行刼又聞将軍標兵張萬良窝盗分賍署撫常賚咨提将軍石禮哈袒䕶嘱令審作誣良又常賚署中被盗将御賜奏摺匣之鎻鑰失去而借用将軍之鑰彼此隠匿盗風日熾乞敕諭督臣孔毓珣通飭文武勒限嚴緝諭曰如此據寔陳奏方是汝若身在廣東又未必如此直達也十二月文乾查明福建倉庫官虧者勒追完補民欠者陸續催徴無可着追及平糶存價採買不敷者令前任巡撫毛文銓賠補詳悉入奏上以文乾秉公辦理毫無瞻顧命從優議叙部議隨帶加二級又疏稱閩省八府一州知府同知通判州縣共八十員前後恭革改教休致五十餘員其倉庫無虧居官尚好之縣令十餘員俱交錯調用不使仍原任致滋弊端所出之缺扵先後命發人員内量才題補惟是邉海重地俗悍民刁新補各官多係初任若責其典守倉庫則有餘資其治理繁劇則不足乞皇上冄將熟諳民事者發數員交督撫於𦂳要縣缺補用可收得人之效得㫖此奏可嘉之至尋諭各省督撫除川陜雲貴廣西外每省於厯任年乆知縣内擇謹慎敏練者一員一靣具奏即行咨送閩省令該督撫酌補𦂳要縣缺六年二月疏恭廣東布政使官達用幕友謝禹臣招摇納賄三月䟽叅署巡撫阿克敦勒索暹羅國船户葉舜徳規禮銀兩詔革官達及阿克敦職命文乾同總督孔毓珣㑹訊未及訊文乾卒得㫖楊文乾才識優長辦事勤敏簡任巡撫以來寔心供職粤海地方正資料理伊自閩回粤五月間即患畏風心煩之症而急公心切力疾辦理不以病状奏聞洵属殚力封疆之臣其心寔可憐惜今聞溘逝深為憫惻應得䘏典察例具奏楊文乾柩櫬起程之日着省城官吏齊集奠送所過廣東地方文武官員親往奠醊並遣人䕶送其别省經過州縣亦着地方官照㸔尋賜祭𦵏如例石禮哈石禮哈漢軍正白旗人父文焯官至禮部尚書自有傳禮哈初任直𨽻正定府同知尋援例捐納道員雍正元年改授正定協副将二年遷貴州威寕鎮總兵三年署貴州巡撫上以其年少屡加訓諭先是雲貴總督髙其倬奏准移大定協弁兵分駐廣順州所属長寨􅃒貢羊城􅋭等處四年四月長寨狆苗阿革阿紀等糾衆楊言不容安設營汛壘石阻路總督鄂爾㤗調兵𠞰撫禮哈偕提督馬㑹伯親往督兵進擊直搗長寨擒阿革阿紀及其黨阿搗阿撈七十餘人􅃒貢羊城􅋭五十七寨均乞降乃宣諭悉歸故業安營設汛而還事聞詔奨禮哈臨事果敢交部議叙加三級並賜還其父文焯巡撫原職互見文焯傳五月擢廣州将軍十一月抵任遣員採買廣西米石接濟旗營自偹銀一萬両充運脚費部議叙加二級五年六月以遵㫖㑹鞫道員李濱抹頸玷職一案誣聼供詞指稱巡撫楊文乾逼勒所致奉諭詰責六年三月楊文乾疏奏署羅定州知州李達徳因清查肇慶府知府楊以寧虧項至将軍署謁見石禮哈不能以禮貌接待縱役凌辱上原其過猶小免究七月諭曰石禮哈與楊文乾皆實心任事之大臣但恃才自用俱欠和平二人不睦於地方無益石禮哈着調補福州将軍十二月欽差通政使留保等至廣東疏劾石禮哈在廣州日於正白旗另户壮丁小衛屡犯窃逃並不緝拏治罪又標兵朱國用等肆名為盗石禮哈既不将失察各官㩀實查叅竟扶同倒提年月詳革名糧應治其徇情疎縱之罪詔該部嚴察議奏尋議照溺職例革職從之七年正月特授鑲白旗漢軍都統七月以大軍分路進𠞰凖噶爾命石禮哈為北路叅賛大臣十三年還京補鑲紅旗漢軍都統乾隆二年奉㫖石禮哈每以不知為知舉止乖張不勝其任着革去都統在散秩大臣上行走不必食俸四年以不勉力行走命革職發往軍䑓効力贖罪七年釋還十二年卒孫國璽孫國璽漢軍正白旗人康熈六十年進士雍正元年㨂發河南以知縣用補鄢陵縣知縣遷禹州知州四年八月擢開封府知府特命専摺奏事九月調浙江杭州府知府六年二月擢福建汀漳道十月調臺灣道國璽疏言臺灣諸臣例不挈眷臣母止臣一子孀居苦節衰老龍鍾現居漳郡乞准臣每嵗内渡省視一二次仍即馳赴任所奏入上嘉之即調鹽驛道七年閏七月遷按察使十月擢山東布政使先是國璽自漳州赴任途次有持署浙江巡撫蔡仕舢名簡凂轉托學政程元章闗預試事者國璽叱之不以聞至是事覺上責之曰凡為臣子者惟當勉一公誠事事無欺無隠與君上一徳一心為要朕因觀汝可成大噐所以不次擢用諒汝必不負朕也然每遇與汝共事之同寅上司等偶一言及未有不稱道汝者朕少渉疑料汝必由俯仰浮沉取悦干譽之所致今果然矣朕深為之寒心如蔡仕舢凂汝轉託程元章一事在他人尚不肯欺隠而據寔奏聞於朕不知孫國璽具何肺腑竟能隠忍而欺朕似此不明大義不别重輕卑陋鄉愿小人之形態豈能受朕知遇之人物耶殊大失朕之期望矣國璽尋奏臣愚昧前因業經面叱並告知程元章未及㕘奏並非畏懼蔡仙舢敢為欺隠諭另䟽補叅並敕蔡仕舢明白回奏尋下部議仕舢降一級調用九年四月授國璽大理寺少卿旋署浙江布政使十月署河東副總河十年十月以河東總督田文鏡患病命國璽協辦十一月署河南巡撫十一年七月擢左副都御史九月暫署江蘇巡撫十一月署吏部侍郎乾隆元年擢兵部侍郎三年四月授安徽巡撫八月疏言安徽蕪湖鳯陽兩闗蕪湖闗不徴米税鳯陽闗因毗連江廣販運者多以故按數收課此向例也臣按本年被旱之鳯滁六泗等府州距鳯陽為近請将米榖課稅自本年八月至明嵗正月照蕪湖闗例免其徴収商賈趨利若鶩势必踴躍轉輸似於民食更為通裕得㫖所奏甚是寛徴之期應相其情形何必限以五月耶十月疏言本年江南鄉試輪臣監臨應試舉子萬七千六百有竒入場不遵條約争先闘㨗不聽唱名搜檢給卷後任意遊行多搶號板東西喧嚷至第三場給題紙因人衆紙多印刷不及分給稍遲輙噪集至公堂下經臣再三勸諭立刻補給始各歸號舍夫讀書以養氣為先似此飛揚凌競士氣不馴已可概見及収卷各官以違式卷呈請貼出多係正草不全或塗改卷靣姓名或正草全無公然題詩於後或於卷末列寫禀訴之語昔人云士先器識而後文藝器識既卑雖有文藝亦不足觀此皆教官平時漫無檢束以致士子倚恃青衿挟制官長習以為常至三年大比乃進身之階絶無敬慎顧忌之心即倖列科名朝廷亦安所用之敕下學臣行令各學教官督率訓諭務使修文砥行共相劘切至鄉試之期學臣詳慎遴選分别去取毋使掛名士籍之徒濫竽徒滋喧競嗣後如不遵功令擾亂埸規本生懲革外将本學教官嚴行叅處庶頺風可挽士習可端奏入上以國璽據實直陳不避嫌怨下部議叙予紀録四年卒賜祭𦵏如例三泰三泰漢軍正白旗人曽祖内大臣華善以其先原係蘇完人姓𤓰勒佳奏請改入滿洲籍詳華善傳祖石文炳襲三等伯官福州将軍父觀音保任都統三泰由藍翎侍衛洊授二等侍衛乾隆二十二年四月遷正紅旗漢軍副都統十月陞吏部右侍郎二十三年正月軍機處行走四月調户部左侍郎六月詔三泰與尚書納穆扎爾赴西路軍營以叅賛大臣行走學習軍務七月逆回霍集占自庫車敗遁定邉将軍兆惠往擒𠞰命納穆扎爾為靖逆将軍與三泰統索倫察哈爾及健鋭營官兵往㑹兆惠軍兆惠軍至葉爾羌令副都統愛隆阿侍衛奎瑪岱以兵來迎納穆扎爾遣愛隆阿先還自與三泰奎瑪岱乘夜進期以黎明䟎至兆惠軍營隨行二百騎猝遇賊三千被圍奎瑪岱死之納穆扎爾矢盡三泰墜馬徒歩接戰俱中創陣歿上嘉憫其忠毅贈三泰三等子爵並加恩授其兄祥泰為散秩大臣尋賜祭𦵏如例諡果勇入祀昭忠祠回部底定上追悼納穆扎爾三泰御製䨇義詩紀其事見納穆扎爾傳尋命圖形紫光閣御製賛曰率二百人共詣軍營臨敵而退寧謂忠誠如早聞信何致殞身不前不後失二賢臣子佛住襲世爵及散秩大臣現官阿克蘓領隊大臣何立柱何立柱漢軍正白旗人初名鈞官副将時始改今名其先世居䝉古之烏嚕特部曾祖和濟格爾於天命七年來歸𨽻入漢軍遂姓何氏祖拜音達禮襲三等輕車都尉世職厯官至廣州将軍以軍功晉襲一等輕車都尉並詳和濟格爾傳父何天培由廕生授佐領康熙三十五年扈駕征噶爾丹授叅領雍正四年由江南京口将軍擢兵部尚書縁事鐫級補正白旗漢軍都統六年七月江蘓巡撫張坦麟鎮海将軍金以坦疏劾天培在将軍及署巡撫任内貪欵劣蹟命刑部鞫訊得其營私壞法及鑚營年羮堯隆科多諸罪案擬斬監候乾隆元年恩釋尋病故立柱於雍正七年降襲二等輕車都尉十三年授三等侍衛累遷頭等侍衛乾隆十六年授浙江嘉興協副将二十三年奉㫖在頭等侍衛上行走六月授健鋭營翼長派往西路軍營剿逆回霍集占二十四年副将軍富徳等敗賊於阿爾楚爾立柱在事有功二十七年叙功給雲騎尉世職併所襲為一等輕車都尉尋授湖北㐮陽鎮總兵三十一年調湖南鎮筸鎮總兵三十三年二月擢雲南提督從将軍明瑞征𠞰緬甸尋調貴州提督九月卒於軍營欽定八旗通志卷一百九十九
