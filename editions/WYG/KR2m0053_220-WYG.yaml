body:
  text: 欽定四庫全書欽定八旗通志卷二百六人物志八十六大臣𫝊七十二漢軍正藍旗一剛佟養性巴劉宏遇李率泰阿泰顔佟岱瑶佟國印甲馬如璧芄劉仲錦楨張朝璘佟國佟養李日秦世佟養性佟養性遼東人先世為滿洲居佟佳以地為氏因業商遷撫順天命初見太祖髙皇帝功徳日盛傾心輸欵為明所覺置之獄潜出來歸賜尚宗室女號曰西屋裏額駙授三等男六年従克遼陽晉二等子天聰五年正月太宗文皇帝命督造紅衣礟初軍營未備火器至是礟成鑴曰天祐助威大将軍征行則載以従養性掌焉時漢軍未分旗勅養性總理官民俱受節制額駙李永芳及明副将石廷柱鮑承先等先後來降者與佟氏族人皆為所属上以漢官漸多慮養性無以服衆志特諭養性曰凡漢人事務付爾總理各官分别賢否以聞爾亦當殚厥忠忱簡善絀惡恤兵撫民竭力供職勿私庇親戚故舊陵轢疎逺仇讐致負朕委任之意昔㢘頗藺相如一将一相以争班位幾成嫌釁幸相如重視國事不念私讐是以令名垂於千祀願爾效之又諭諸漢官曰爾衆官如能恪遵約束非僅敬養性是重國體而欽法令也八月従上征明大軍圍明總兵祖大夀於大凌河養性秉方畧率漢軍載紅衣礟立營於錦州通衢擊敵城西隅臺降守臺兵又擊城南隅壊樓堞翼日擊東一臺臺圯守者宵遁進殱之九月明闗内兵援錦州上遣親軍擊敵養性勒漢軍五百従敵望風遁明監軍道張春與總兵吴襄等赴援大凌河乗夜向城上督騎兵破之方追奔明潰卒復陣養性承㫖屯敵營東舉礟攻燬敵營十月攻克子章臺礟擊臺垜臺内兵死者無算十一月祖大夀以大凌河城降上命城中所得鎗礟鉛藥悉付養性尋率兵攻克馬家湖臺自大凌河至廣寜明所置臺墩悉毁之六年正月上幸演武場閲兵養性率所轄漢軍試礟擐甲列陣上嘉其軍容整肅且以出兵大凌河時能遵方畧有克敵功賜雕鞍良馬一白金百兩設宴勞之四月上親征察哈爾命隨貝勒阿巴泰等留守瀋陽七月奉勅宣諭大凌河投誠各官察哈爾之役上命􅄁領延布禄佐領董山移哈爾占所貯糧於烏蘭哈達延布禄調遣失人遲乆不至下廷臣㑹議罪當死有㫖覆勘諭曰倘情有可矜則釋之衆皆言法不當宥養性奏曰延布禄等不留賢員協助而用不更事之人誤也罪固應死或懲責而曲貸之實惟聖恩前鋒􅄁領圖魯什亦以懲之而全其生為請上允二人議延布禄等遂従末減未幾養性卒於官詔以其子普漢襲爵普漢卒弟六十襲崇徳七年𨽻漢軍正藍旗順治初六十屢遇恩詔晉三等伯仕至本旗都統十三年世祖章皇帝追錄舊勲賜養性諡曰勤恵六十卒子國瑶襲爵自有𫝊劉宏遇劉宏遇遼東人初與其弟竒遇並以諸生隨明總兵祖大夀幕下為㕘謀天命七年太祖髙皇帝征明次三岔河宏遇同竒遇挈家來歸並以明邉境兵馬數目及戰守事宜陳奏上遣鄂克兑諭之曰得廣寜城後當授爾官嗣以明将士來降者衆宏遇閒居遼陽太宗文皇帝崇徳元年宏遇上書自陳乞錄用命大學士范文程等試之謂可任文職遂授宏文院副理事官後分漢軍為八旗宏遇𨽻正藍旗順治元年三月以繙譯遼金元三史告成賚白金鞍馬尋任工部理事官十月授山西朔州道二年四月偕副将侯大節等督兵𠞰蒋家峪黒草嘴諸賊擒斬甚衆五月擢陜西布政使四月考績稱最五年擢安徽巡撫值叛鎮金聲桓騷擾江右江北土賊蜂起宏遇駐池州飭兵守禦分遣鎮将授策搜𠞰渠寇王貳甫等次第就擒復自池州移駐安慶與總督馬國柱㑹𠞰英山霍山潜山諸賊連破賊巢擒斬渠魁孔文燦等餘黨悉平六年五月裁安徽巡撫召還七年二月授山西巡撫先是叛鎮姜瓖踞大同其黨分據平陽保徳寜武代州五臺連結榆林靖邉府谷諸邑土賊四出寇掠至是瓖伏誅餘黨竄匿山谷宏遇奏請免逋賦甦驛困矜恤諸死事家又言郡邑甫遭兵燹民田荒蕪殆盡前此大兵征伐大同徴輸芻糧竭蹶以供今尚有保徳五臺府谷餘賊未滅日需輸輓復值二麥未收秋禾遇蝗災耕種失望臣承撫字之責仰體皇上視民如傷之意不敢不以實陳得㫖下所司蠲賑尋與總督佟養量總兵剛阿泰協𠞰五臺山賊劉永忠髙鼎等於曹家寨攻毁賊巢俘斬略盡十年陜西賊楊茂等竄入平陽遣兵招降之宏遇撫山西四年建忠烈祠以祀守土諸臣死姜瓖之亂者葺太原府陽曲縣學宫修築汾河諸堤㑹以逮捕土賊王眼張義國孔朝貴閻守福等未入奏即籍沒觧部有㫖下所司察核宏遇坐罰俸給事中張璿劾宏遇不請㫖徑行籍沒罪在専擅疏復下所司議再罰俸尋奉詔甄别督撫吏部以宏遇功少過多請㫖降調旋授福建督糧道十八年九月卒於官祀山西名宦李率泰李率泰漢軍正藍旗人李永芳次子也初名延齡年十二即入侍禁廷太祖髙皇帝賜今名年十六以宗室女妻之太宗文皇帝親征察哈爾朝鮮及明錦州率泰俱従崇徳八年隨貝勒阿巴泰征明至山東有勞績洊擢副都統順治元年正月授刑部㕘政兼副都統率兵駐防錦州四月隨睿親王多爾衮入山海闗破流賊李自成尋同都統金礪招撫天津又率寜逺駐防兵平定山東河南擒斬滿家洞賊将趙應元降其衆萬人二年隨豫親王多鐸破流賊於潼闗移師南征克揚州下江寜分領精兵三百狥蘇州松江所過城邑悉撫定惟江隂閉城抗拒督兵攻破之三年隨端重親王博洛下杭州定福建敘功授世職為二等輕車都尉復以考滿兼一雲騎尉五年海賊犯福州漳泉諸郡詔率泰與靖南将軍辰泰同心協謀前往誅𠞰至則擒斬賊渠曾慶等及餘黨數萬賊鄭彩連䑸數千盤踞長樂連江城邑率泰㑹辰泰分兵夾擊盡驅出海恢復二縣又統師直入興化生擒偽總督顧世臣等十一人斬之興化平先是福州為賊困十四月城中民相食江西賊郭天才偽稱援兵自杉闗長驅抵福州駐兵洪塘載米麥江上誘郡民出就食㑹率泰提師抵建寜聞之間道飛檄廵撫使偵備賊乃夜焚洪山橋掠就食者千人以遁率泰至命有司收賊遺粟以甦餘民巡按御史周世科大治舂杵釘鉸之刑拷掠士民恣取財賄巨萬率泰白之巡撫㑹劾之世科伏誅六年従征大同叛鎮姜瓖下保徳州擒斬賊黨牛化麟等敘功加一雲騎尉先是順治元年更定官制名㕘政曰侍郎率泰仍以刑部侍郎兼任副都統事八年閏二月調吏部侍郎三月授宏文院大學士六月條奏三事一懲貪酷官吏一給滿洲兵丁馬匹草料一酌量營造工程次第上従之七月坐與大學士辰泰誤増恩詔赦欵復巧飾誑奏罷任降世職為騎都尉尋遇恩詔加一雲騎尉九年正月以吏部奉恩詔予襲太濫命削雲騎尉十一月奉特㫖晉三等男十年六月以大學士洪承疇薦授兩廣總督諭曰率泰當永不敘用經畧輔臣既保為總督特允所舉著改過自新以圖報稱時明桂王朱由榔居安隆其帥李定國擁兵粤西十一年土賊廖篤増等結連定國為寇率泰遣兵分道進𠞰陣斬篤増於玉版巢十二年定國犯粤東率泰領兵禦之敗其将髙文貴㑹靖南将軍珠瑪喇率禁旅至合兵夾擊破之於新㑹城下乗勝追逐克復髙州雷州諸郡所至軫恤民賴以安方新㑹被圍時城中糧盡且食人兵衆掠婦女千餘口率泰言於諸将盡釋之十三年詔加太子太保調浙閩總督諭以浙閩重地軍務方殷勅到即兼程赴任時逆賊鄭成功招集亡命嘯聚海濵為江南浙江福建寇害率泰既莅任相度形勢以賊揚帆鼓楫來往無常倘不急整舟師慮難擒𠞰特疏増設水軍三千復與撫臣劉漢祚動帑遴員刻期伐木増造唬哨各船百餘為戰禦計十四年招降海寇陳徳容並疏言捕𠞰鄭逆宜離其黨與散其羽翼以撫佐𠞰又言鄭成功之父芝龍不宜流徙寜古塔恐其地近海由此而遁為患滋大上悉是其言併飭所司嚴守芝龍是年敘前破李定國功晉一等男考滿加少保十五年正月招降賊黨偽都督唐邦杰偽副将林翀葉禄等三月奏允調直𨽻山東河南山西江西步兵萬人赴浙防守海汛㑹鄭成功犯温郡平陽瑞安俱䧟浙東告警率泰請調江寜滿洲兵助𠞰賊退走七月詔分浙閩總督為二以都統趙國祚為浙江總督駐温州而以率泰總督福建駐福州九月賊據南安嶺窺福州賊黨陳斌既降復叛率千餘人據羅星塔率泰馳檄㑹師焚其巨艦千餘賊遁因以舟師圍之斌降率泰奏斌屢叛状誅於福州城南十六年以㑹審羅源縣敗逃事不詳究供詞部議瞻狥應革職得㫖革去世職仍留總督任兵部又追論率泰總督浙閩時不能保固封疆應革任復得㫖寛免罰俸一年仍戴罪圖功自贖康熙元年正月率泰以漳州為全閩門户奏増設水師二千及副将逰擊等官時定海小埕賊衆盤踞率泰宻㑹靖南王耿繼茂遣兵擊走之又萬安所先經遷毁偽總兵楊宣等復於其地壘新城率泰㑹提臣馬得功調兵夾𠞰賊不能支揚帆逺遁六月招降偽總兵林俊竒等六十一員兵千餘人二年九月降偽忠靖伯陳輝等一百三十餘員兵一千六百及家属八百餘人十月招降賊将何義魏明等復統建寜延平邵武将弁三路進𠞰山賊獲逆渠王鐵佛斬之未幾海賊五百餘人由梁山突犯内地率泰遣總兵王進功􅄁将折光秋夾擊大敗之俘斬甚衆復與耿繼茂統率大兵航海攻克厦門乗勝取浯嶼金門二島逆賊鄭錦周全斌等勢窮宵遁三年二月擒斬寜化山賊錢禾四月招降偽總兵林國樑五月大兵至八尺門偽威逺将軍翁求多率兵民六萬餘人納欵率泰夜半渡海進拔銅山焚毁賊巢斬首三千三百餘級偽永安侯王廷等率家属兵民等三萬餘人出降獲船艦軍械無算鄭錦僅以數十艘遁走臺灣聖祖仁皇帝優㫖嘉奨下部議敘加秩正一品六月率泰以疾求罷諭曰覽奏知病是實當即允所請但閩省投誠官員兵民最為繁衆著親行安插務使得所事竣日然後來京閏六月遣總兵李長榮等出洋𠞰賊擒偽總兵張賢時閩海厦門各島悉已蕩平惟南山鎮海佛潭橋猶為餘孽盤踞九月率泰飭總兵官劉進忠等進𠞰陣斬賊黨七千有竒招撫男婦萬餘人十月别遣兵㑹𠞰茶仔畬山寇生擒賊首余角俘斬餘黨無算四年三月再以疾求罷上慰留之六月以漳汀二府地甚遼濶奏定守漳道仍駐漳州巡建道仍兼轄延平守建道自建寜改駐汀州兼轄邵武五年正月卒於官遺疏言閩海餘氛逺竄臺灣奉㫖撤兵與民休息洵為至計惟是将衆兵繁若撤之太驟則易致驚疑太遲又恐貽患目下當安反側之心日乆務防難制之勢紅毛夾板船雖已回國然往來頻仍異時恐生釁端閩省兵馬錢糧專望協餉倘若外解不周則有意外之虞至數年以來令濵海居民遷移内地咸苦失其故業宜畧寛界限俾獲耕漁稍甦殘喘疏上得㫖李率泰原以才能䝉世祖章皇帝特簡浙閩總督自任總督以來克副簡任之意殫力報効𠞰撫賊寇多建功績且忠清素著正資調度今以乆任巖疆積勞病殞深可憫惻下所司議䘏加兵部尚書予祭𦵏如典禮諡忠襄明年敘功追贈一等男子正宗襲剛阿泰剛阿泰漢軍正藍旗人李永芳第三子也幼隨父自撫順所來歸及長屢従征伐順治五年十一月授九江總兵未任值叛鎮姜瓖作亂改授宣府總兵明年三月至鎮時山西至宣化山賊並起懐來所属之礬山狼窩蔚州所属之三澗辛莊黒山所在屯聚剛阿泰甫莅任即率兵赴懐來逼礬山而營遣􅄁将頗重耀等分兵攻狼窩殪賊甚多礬山賊首王海等懼悉衆來歸㑹辛莊賊刼桃花堡剛阿泰移兵疾馳抵蔚州率兵搜山賊糾衆三百拒戰我軍奮擊斬馘七十餘賊敗竄追𠞰至黑山設伏山隘攜礮具進攻賊潰伏發悉殱之獲其牲畜器械三澗等賊聞風就撫五月奉命𠞰易州土寇遣􅄁将羅映台等進兵麻黄谷以巨礮燬其巢復統兵自紫荆闗循邉牆搜𠞰至昌平属鎮邉城撫定其衆乃還鎮六月疏言臣任宣鎮兩月三𠞰山寇共招撫賊首王海等二十三人餘賊一千三百餘人或隨營收伍或安插歸農尚恐猜疑未化請𤼵恩諭免死以安反側又言宣鎮營制近議裁併臣思經制有昔設而今可裁者有今宜設而昔未立者道在因時變通鎮標舊有鎗礮分𨽻各營本難畫一今盡調赴山西協𠞰臣思火器一營必湏専設以資援𠞰請於宣属四營内每營抽撥戰守步兵各七十五名演習施放别成一營領以遊擊使之朝夕訓練庶幾緩急足恃疏並下兵部議行六年九月大軍既平姜瓖餘孽張五桂髙鼎劉永忠等竄代州定襄繁峙五臺山中糾衆犯五臺縣城宣大山西總督佟養量檄剛阿泰率兵援𠞰十月至代州偵賊屯聚竇村我軍悉鋭乗夜襲擊斬偽副将張賔偽守道張秀等十餘人賊驚潰追擊大獲城下賊聞之懼解圍去我兵躡賊踪凡再敗之髙鼎劉永忠遁入靈邱之曹岩砦據岩險拒守其黨分布五臺之窰頭柏砦定襄之滹沱七角諸砦七年正月我軍分路圍𠞰剛阿泰與右衛副将徐長春由東北間道進逼窰頭砦破之斬偽副将一賊退守柏砦塞山隘以自衛張五桂復糾賊赴援我軍攀崖以上賊失隘驚竄我軍力擊并敗援兵擒五桂獲偽總兵印餘衆皆降八月滹沱七角諸賊糧盡亦降我軍進逼賊砦砦髙數百丈四面峭削不可上乃募勇健數十夜半従别徑絙綴援手而登繼以衆軍發礮直轟砦門賊駭逸偽總兵董景誼等自焚其巢而死髙鼎妻及其父髙來貢就俘山砦悉平八年二月師旋三月敘功加都督同知先是剛阿泰𠞰賊時以山西省應解宣鎮兵饟截留散給移咨督饟主事奏銷户部以援𠞰兵内有已經部議裁汰者駁令宣大總督佟養量核奏尋以調𠞰在先議汰在後奏奉諭㫖准銷及銷冊上數復不符為户科給事中髙辛允所劾下養量察審剛阿泰疏劾已陞督標副将之舊任鎮標㕘将張世忠冐領侵欺得㫖革世忠職勘擬治罪十年九月養量疏言宣鎮饟銀六萬七千兩有竒侵沒非止一人且恐朦混支銷為數尚多張世忠出入必由自無所逃其罪前任饟司徐兆舉陸元龍扶同銷算罪亦難辭今奉㫖嚴察須直窮到底臣調審領銀之員役剛阿泰身為主帥俱抗庇不發侵吞之弊顯然請㫖一併裭革赴省質訊奉㫖數萬饟銀任意侵剋大干法紀及奉諭察審經手人員又抗匿不出殊可痛恨張世忠已經拏問追擬其餘干涉員役俱令分别嚴行察議議未上剛阿泰劾養量袒䕶世忠據其委罪妄扳之詞誣指侵吞抗庇養量復劾剛阿泰驕悍欺㒺疏並下部察議給事中王廷諫許作梅並以宣府重鎮文武互訐恐致貽誤封疆交章論劾請勅三法司拘犯㑹鞫上命户部侍郎覺羅額爾徳等赴宣化察審十一年正月以世忠未曾冐領剛阿泰未曾侵吞督鎮逞忿互劾覆奏下部議處㑹甄别督撫大臣解養量任部議剛阿泰逞忿乖張應革職其饟銀支銷有無情弊令新任總督馬鳴珮再審尋奏張世忠具印領支饟即時散給兵丁並無侵欺值剛阿泰赴陽和閲兵未及申報及回又未面啟即赴督標新任剛阿泰未見領饟底冊致銷冊不符因劾其冐領罪在張世忠目無主帥不申不報應予杖懲疏仍下部核議従之以剛阿泰已經革職毋庸再議尋回旗卒於家巴顔巴顔漢軍正藍旗人李永芳第五子也天聰八年襲父三等子爵崇徳六年任􅄁領従太宗文皇帝征科爾沁有功復従圍錦州時明總督洪承疇領兵十三萬來援聞太宗親征遂退守松山我兵四出追擊巴顔與都統石廷柱等運巨礮以従大敗承疇於松山城下七年三月明副将夏承徳獻松山城巴顔與石廷柱等奉㫖收藏所獲鎗礮火藥以備用六月増漢軍四旗為八旗巴顔任正藍旗都統八年九月隨鄭親王濟爾哈朗等征寜逺拔中後所及前屯衛順治元年二月敘寜逺功晉二等子五月同石廷柱統兵𠞰昌平州寇尋同都統葉臣徇直𨽻饒陽河南懐慶山西澤州潞安諸郡邑皆下之凱旋賜白金五百兩二年十一月奉命帥左翼兵與右翼都統李國翰㑹定西大将軍和洛輝於陜西進𠞰四川三年正月流寇孫守法賀珍等犯西安府巴顔與和洛輝夾擊之殱其衆殆盡賀珍復并力拒戰巴顔與副都統齊黙克圖擊破之珍收合餘燼馬步兵約五千列陣山上巴顔登山奮擊賊衆未戰而走遂追敗之於濠泗河三月收𠞰黑水峪斬守法降賊衆二千進𠞰流寇一隻虎於商州賊兵二萬據山為陣巴顔與和洛輝督戰斬萬餘級復率兵偕副将王平等撃敗延安諸路流寇追賊至張果老厓賊入山寨我兵掘濠圍之夜潛攻克其寨擒斬賊渠獲馬驘無算五年六月敘功晉一等子十一月帥左翼兵載紅衣礮赴大同討叛鎮姜瓖六年隨睿親王多爾衮復渾源州又隨英親王阿濟格復左衛隨巽親王滿達海復朔州汾州及太谷諸縣巴顔在軍中每指麾左翼兵𤼵巨礮以攻所向皆克八年敘平姜瓖功晉三等伯兩遇恩詔加至一等伯九年正月卒年三十有三賜祭塟如例子釋迦保襲爵佟岱佟岱漢軍正藍旗人先世居佟佳父佟三太祖髙皇帝時來歸任副都統佟岱其第三子也初任佐領崇徳元年從太宗文皇帝征朝鮮師還以縦掠降民巧言掩飾論罪應死命従寛罰贖革佐領奪俘獲三年授吏部副理事官兼任􅄁領六年隨大兵圍明錦州明援兵自城出戰佟岱率兵擊敗追至城壕始還其夜明兵犯我營欲奪紅衣礮佟岱與副都統金維城奮擊郤之七年四月隨鄭親王濟爾哈朗攻克塔山杏山及附近諸臺堡六月擢正藍旗漢軍副都統八年隨鄭親王征明寜逺拔前屯衛及中後所二城敘功予騎都尉世職順治元年同都統葉臣等征山西以礮攻克太原城二年隨英親王阿濟格𠞰流賊李自成於陜西敗之延安追至湖廣獲賊船於富池口英親王征江西至九江班師佟岱與投誠總兵金聲桓駐守九江府旋遣兵與聲桓平定南康南昌建昌撫州袁州等府以所俘獲奏聞因疏言故明鍾祥王朱慈䃕等皆衰殘廢棄或姑存餘喘以彰我朝浩蕩之仁得㫖故明諸王俱令赴京朝見時湖廣總督羅繡錦未之任佟岱暫署湖廣總督三年率兵還京授兵部左侍郎是年秋隨恭順王孔有徳征湖南四年自岳州進長沙偽總兵王進才等聞風遁師次湘潭偽伯黄朝宣擁衆數萬屯燕子窩佟岱與有徳及副都統藍拜等由水道進據瀘口擊破北岸營追擒朝宣於衡州進攻寶慶克之聞明桂王朱由榔據武岡夜𤼵兵疾進敗其衆并焚木城又敗其國公劉承允於夕陽橋遂克武岡由榔遁廣西五年十月凱旋得優賚敘功加一雲騎尉六年隨睿親王多爾衮討大同叛鎮姜瓖敗賊兵於傅家嶺又同都統左夢庚擊敗賊兵進拔渾源州及左衛朔州汾州太谷等城敘功並三遇恩詔晉世職至一等輕車都尉兼一雲騎尉累遷户部吏部侍郎十一年擢浙江福建總督十二年冬海賊鄭成功䧟舟山十三年正月復䧟台州時佟岱與巡撫秦世楨不協劾世楨運饟不繼致舟山士卒叛降世楨亦劾佟岱不巡閲海疆且不循例駐衢州欲以巡撫廨署自居忿戾相争逞私詆誣状上調世楨為操江巡撫詔佟岱解任還京佟岱不即行且上疏自敘𠞰撫功上切責其冐功戀禄命新任總督李率泰巡撫陳應泰㑹同巡按御史王元曦察核佟岱與秦世楨挾忿相争貽誤封疆情罪率泰等覆奏舟山失䧟世楨不能先事宻防咎亦難辭佟岱忿争失體乆駐杭州不一至海濵實貽誤封疆疏下部院確議世楨應降一級調用佟岱應降世職一等上以所議尚輕飭再議革去恩詔所加世職留其軍功所得三等輕車都尉康熙二年卒子佟徽年襲佟國印子世徳佟國印漢軍正藍旗人父佟恒年以驍騎校隨其従父佟養正守朝鮮界之鎮江城太祖髙皇帝天命六年守城中軍陳良策叛執養正投明總兵毛文龍恒年亦被執不屈死贈騎都尉世職以弟成年襲尋卒國印襲職太宗文皇帝崇徳三年授工部副理事官六年隨睿親王多爾衮征明圍錦州與都統石廷柱擊敗吕洪山步兵上親統大軍進征圍明總督洪承疇於松山敵兵有逸入髙橋南三臺者國印與都統劉之源以礮攻克之盡殱其衆七年四月鄭親王濟爾哈朗等圍杏山塔山國印俱以礮擊其城下之敘功加一雲騎尉尋遷工部理事官奉命同副都統馬光輝等赴錦州督鑄神威礮十月隨饒餘貝勒阿巴泰征明由黄崖口入邉時明将於沿邉設臺駐兵防守甚宻國印同都統李國翰屢擊敗敵衆克邉臺七又擊敗牆子嶺守兵八年鄭親王征明寜逺既克中後所進取前屯衛國印以紅衣礮擊其城風迴礮火傷頷下創甚攻城益力卒克之順治元年敘功晉二等輕車都尉三年擢工部右侍郎六年任都察院㕘政七年九年三遇恩詔晉爵三等男十二年以疾解任康熙十一年四月卒賜祭葬如例子世徳初因國印乞休襲爵尋授㕘領康熙十三年擢正藍旗漢軍副都統十四年八月隨貝勒洞鄂征叛鎮王輔臣於平涼賊衆迎拒世徳同都統海爾圖率兵擊郤之賊復倚山據險列陣世徳率兵直前衝擊破賊陣追斬甚衆十五年同前鋒統領穆占設伏於平涼之南山擒賊偵卒擊敗賊騎百餘賊将屢糾衆來犯世徳率兵五戰皆捷復以紅衣礮擊毁賊壘殱賊無算尋招降王輔臣及其叛黨陳彭等並在事有功十七年命隨撫逺大将軍圖海規復漢中興安十九年五月卒於軍賜祭𦵏如例子銓襲爵馬如璧馬如璧遼陽東寜衛人𨽻正藍旗漢軍太宗文皇帝崇徳五年任驍騎校隨睿親王多爾衮圍明錦州敵以千餘騎出城迎犯如璧隨侍衛李國翰戰卻之復擊敗松山步兵及杏山騎兵尋進攻杏山松山兩路臺堡並隨都統石廷柱以紅衣礮破之六年隨鄭親王濟爾哈朗圍明錦州攻克駱駝山寨敵兵自十三站乗夜來襲營佐領禧福率甲士出戰如璧同㕘政碩詹馳馬陷陣殺敵甚力㑹明總督洪承疇等合步騎十三萬來援錦州上親統大軍駐營松山指授方畧如璧隨都統巴顔石廷柱等徇塔山路以紅衣礮攻下附近諸臺七年授佐領隨鄭親王取塔山杏山二城八年復隨鄭親王取中後所及前屯衛皆以紅衣礮攻城有功順治元年敘功予騎都尉世職兼任㕘領二年隨英親王阿濟格𠞰流賊李自成於陜西追至湖廣屢戰皆捷與􅄁領劉仲錦等擊走偽總兵馬進忠於武昌獲賊船十有一六年隨鄭親王征湖南時明桂王朱由榔據武岡自成遺黨李錦劉體純王進才皆附之分據寶慶衡州如璧由岳州進長沙趨衡州屢擊敗其兵復同副都統金維城破之於靖州其衆皆潰奔如璧奮力窮追遇伏步戰力竭殁於陣七年遇恩詔於騎都尉加一雲騎尉尋議䘏晉三等輕車都尉子純徳襲世宗憲皇帝時以如璧入祀昭忠祠劉仲錦劉仲錦遼陽東寜衛人後𨽻正藍旗漢軍太宗文皇帝崇徳五年任佐領隨睿親王多爾衮圍明錦州敵騎兵千餘自城中出戰仲錦隨左翼兵迎擊追至城下始還尋復擊敗松山步兵杏山騎兵及吕洪山口步兵七年鄭親王濟爾哈朗攻塔山發紅衣礮擊其城西城圯二十餘丈仲錦率所部兵先登克之進攻杏山城復以礮擊毁城垣二十五丈城中窘迫遂降敘功予雲騎尉世職八年三月隨䕶軍統領阿爾津哈寜阿等征黑龍江呼爾哈部克其博和哩諾爾噶勒都里三屯俘獲甚衆招降小噶勒達蘇大噶勒達蘇綽庫禪能吉勒四屯凱旋賜貂皮白金九月隨大兵征明寜逺以紅衣礮攻克中後所前屯衛二城敘功晉世職為騎都尉順治元年大兵既定燕京仲錦任户部理事官兼㕘領隨都統葉臣征山西取太原府旋隨英親王阿濟格𠞰流賊李自成於陜西追至湖廣屢擊敗賊衆偽總兵馬進忠遁獲其戰艦十有一五年擢兵部侍郎六年隨睿親王討大同叛鎮姜瓖復渾源州左衛及汾州皆以紅衣礮攻城有功七年授山東臨清總兵官加都督同知先是仲錦以征流賊平姜瓖功晉三等輕車都尉世襲罔替復以考滿並三遇恩詔洊晉一等輕車都尉兼一雲騎尉十年改福建右路總兵官加左都督鎮守泉州十一年八月上以仲錦有疾不能任事詔解任還京調治尋卒賜祭如例子芳聲襲張朝璘張朝璘漢軍正藍旗人父士彦明廣寜巡撫中軍守備天命七年太祖髙皇帝征廣寜明巡撫王化貞遁去士彦來降天聰八年授三等輕車都尉旋乞休朝璘襲職崇徳七年任佐領隨貝勒阿巴泰征明過北京往攻登州府師次膠州遇敵兵擊敗之八年隨鄭親王濟爾哈朗征明攻克中後所前屯衛二城晉世職二等輕車都尉任兵部理事官順治二年隨豫親王多鐸征江南以紅衣礮攻克揚州府城及江隂縣城尋率兵駐防蘇州遇明總兵黄蜚等擁衆來犯同副都統吉山擊卻之復同前鋒統領努三率兵追𠞰黄蜚等敗退旋合兵従水路來犯朝璘同􅄁領索爾敏進兵擊之潰獲其船四年隨恭順王孔有徳平湖南時明桂王朱由榔據武岡州朝璘與協領烏赫訥率兵疾進夜遇明總兵曹志建扼於路朝璘督兵擊之敵敗奔入木城朝璘進攻擲火毬木城中城焚敵衆大潰其國公劉承允率衆拒戰朝璘偕諸将擊敗之夕陽橋遂克武岡州承允降明桂王走靖州其将張先璧據沅州别部衆據黔陽縣列五營朝璘同副都統蘭拜等敗之進克沅州府六年隨睿親王多爾衮討叛鎮姜瓖於大同復渾源左衛及朔州汾州太谷等城是年以考滿稱職晉一等輕車都尉八年敘江南湖南山西功晉三等男旋授正藍旗漢軍副都統九年兩遇恩詔晉一等男十年授都察院左副都御史十三年遷户部侍郎尋奉命巡撫江西時南昌瑞州當金聲桓叛亂後農田荒蕪賦額多虚巡按御史笪重光請豁免部臣恐有以熟作荒情弊請下督撫議朝璘覆奏荒蕪田畝惟循序勸墾則熟者常熟荒者不致乆荒若編派起科則始焉包荒於熟漸至熟者仍荒非足國恤民計今南昌瑞州二府新墾荒田四千餘頃應三年後起科其未墾者二千餘頃請槩與豁除以勸墾耕而資生聚得㫖允行十五年以解廣西協餉功加兵部尚書銜十八年擢江西總督康熙二年江西右布政使王庭奏減南昌府屬浮糧下朝璘議朝璘疏言江西自陳友諒横行徴派明代相沿未改前巡按御史吴贊元切陳其事部議令確核志牘旋遭金聲桓叛亂志牘散亡是以前撫臣蔡士英僅據右布政使莊應㑹所得故牘請減袁瑞二府額徴而未及南昌今志牘復出惟武寜縣因陳友諒生身之地未浮宋元舊額其餘六縣一州浮糧請勅部察核志書減免尋部臣覆奏浮銀十九萬五千餘兩米十四萬九千餘石上命悉與豁除三年朝璘疏言吉安府向食粤鹽相隔千餘里且有十八灘之險請改食淮鹽俾商民交便事下所司従之四年以江西總督裁併江南解任五年正月補福建總督六年以老疾乞休還京越十餘年卒子聖鐸襲一等男爵佟國瑶佟國瑶漢軍正藍旗人二等子佟養性之孫也養性卒子普漢六十遞襲六十於順治初年三遇恩詔晉三等伯授副都統子國瑶順治十七年襲伯爵康熙九年擢正藍旗漢軍副都統十二年十二月逆藩吴三桂反上以湖南鄖陽地界三省山谷阨塞奸民易嘯聚且恐賊乗間侵犯特授國瑶為鄖陽提督往駐防十三年三月㐮陽總兵楊來嘉通吴逆據榖城叛鄖陽副将洪福應之刼所部兵千餘反攻國瑶署國瑶率逰擊杜英佟大年以健丁三百名奮勇衝擊賊退復來連日格鬬十餘陣斬首二百餘級賊遁走疏聞得㫖嘉奨下部優敘加左都督十四年四月洪福及叛将等分五路犯鄖西復大敗之追𠞰至泥河口板橋河陣斬偽副将林躍等七人殺賊兵數百十五年三月四川叛鎮譚洪犯鄖江北岸洪福等出掠鄖江南相聲援國瑶分兵𠞰禦敗賊於坪溝黄畈九里岡又渡江擊賊於南岸連敗之焚其舟械擒斬無算九月洪復遣衆伏鄖江兩岸以三十餘舟順流下泊琵琶灘進逼鄖陽運道塞國瑶與将軍噶爾漢撫治楊茂勲等率水陸兵大破之於沿江及陡嶺糧運始通敘功加一等十六年七月以捐賞兵丁難民功加太子少保十七年二月進𠞰楊來嘉洪福諸逆於房縣擒偽副将以下五十二人獲偽印十二劄牌二十四房縣保康相繼復十八年五月偕噶爾漢等𠞰賊於興安以日乆未下部議盡削前功詔止削陡嶺所敘一等功二十一年六月授福建将軍諭曰國家設立督撫提鎮原以為民孟喬芳總督陜西李率泰總督福建能潔已奉公愛民恤士秦閩人至今思之爾到地方宜恪遵國憲安輯兵民二十二年四月疏言京口将軍所統每旗協領㕘領防禦驍騎校共十七員今福建駐防每旗止四五員邉海重地軍務不可乏員料理請増協領以下驍騎校以上等官下部議駐防四旗應各設協領一員㕘領一員防禦五員驍騎校五員二十八年八月卒於任賜祭𦵏如例諡忠慤其伯爵以子海福襲佟養甲佟養甲遼東人先世為滿洲居佟佳繼遷撫順父佟拱隨族人養正等來歸後𨽻漢軍正藍旗太宗文皇帝時養甲入直内院理事順治元年従世祖章皇帝定鼎燕京二年授總兵官銜隨貝勒博洛率師南征越明年下杭州平福建十月加巡撫廣東銜署兩廣總督事與署提督李成棟率兵定廣東是時明唐王朱聿鍵弟聿􅟽據廣州擁兵聚寇僭號紹武養甲與成棟定恵潮二府亟趨廣州令前鋒軍悉用紅帕裹首偽為廣州援兵状以恵潮道印為文書紿守者奪門入擒其諸王世子十三人復與成棟議以南雄韶州兩郡連控江楚肇慶為兩粤咽喉梧州為粤西門户宜先撫南韶以通江右之援定肇慶以扼兩粤之吭取梧州以固肇慶之籓乃檄總兵葉承恩及副将李仰臣兵進南韶成棟兵進肇慶皆授策𠞰撫三郡悉平㑹明閣部丁魁楚擁明桂王朱由榔自肇慶竄梧州養甲復令成棟移兵進𠞰魁楚等皆遁走遂下梧州分遣總兵徐國棟取髙雷㢘瓊四府養甲自駐廣州招降海上四姓賊首鄭昌四年加兵部尚書銜實授總督兼任廣東巡撫時標營将士調遣四出廣州駐兵僅存百餘人海賊馬元生石璧徐貴相及白旗賊黄信林芳等窺伺兵力單弱集聚數萬突犯廣州養甲督令官兵守陴躬冐矢石扼太平門闗外橋梁鼓勵鄉勇力戰殺賊陣斬數百級生擒百餘人餘賊遁入海尋偕成棟率兵徇増城順徳東莞三水新寜諸邑皆就𠞰撫明總兵李承志李明忠以平樂潯州二郡兵來降即令收定左江右江諸路六月招降明趙王裔朱由棪及其将李士璉七月明閣部陳子壯尚書張家玉率賊萬餘寇廣州指揮楊可觀将以城為内應養甲伺其謀擒斬之督兵守禦成棟亦以兵赴𠞰焚賊舟賊遁越六日復來犯又敗之是時廣州初定監司守令未及銓授養甲疏請廣東布政使耿獻忠為廣西巡撫復慎簡㢘吏請㫖酌用又請移大同兵五千至兩廣資防𠞰其頻年隨征士卒増給資糧以示優恤凡新降将卒才勇者或留營訓練或分駐要隘餘令歸農㑹部議徴順治三年額銀四分之一以給餉養甲言粤省連遭寇掠請緩至順治四年為始諸疏並下部議行先是雷㢘二郡珠池每嵗例遣官開採養甲以地險費繁恐傷民力請罷其役得㫖俞允時明桂王朱由榔據桂林兩廣人心觀望有潛附由榔黨屬孫可望入滇黔為寇者養甲策遣将士進攻由榔疏請造弓矢火器備戰具分遣禁旅進𠞰雲南貴州上以廣西未定而恭順王孔有徳已奉詔軍湖南防𠞰孫可望特諭養甲悉心安輯兩廣所請俟有徳疏報再議養甲之署兩廣總督也成棟以總兵署兩廣提督率師偕往既而養甲奏平定粤嶠成棟功多請實授成棟為廣東提督成棟自負功績以養甲奏授官職不兼兩廣意殊不平又素與養甲部将郝尚乆争功有隙遷怒養甲五年閏四月成棟據南雄叛受由榔封爵與江西叛鎮金聲桓互為聲援養甲移書贛州守将策應書為成棟所獲益恨之乃以兵四百人刼養甲擁至肇慶養甲詈賊不屈成棟宻使其黨張祥賊殺之事聞贈太子少保廕一子入監予祭葬入祀昭忠祠及廣東名宦李日芄李日芄遼東人太宗文皇帝時日芄以生員入内院理事賜人五户𨽻漢軍正藍旗順治元年定鼎燕京授日芄直𨽻永平府知府三年遷霸州兵備道既之任授策州牧張儒秀諭降土賊李振宇等數百人尋擢左僉都御史四年加右副都御史銜任操江巡撫㑹叛鎮金聲桓蹂躪江西上游告警日芄親督官兵於小孤山磨盤洲扼𠞰檄江防同知趙廷臣與􅄁将汪義逰擊袁誠等迎擊賊艘五年敗賊於彭澤賊兵中礮及溺死者無算獲戰艦二十餘六年五月裁安徽巡撫命日芄攝其事先是安慶府之桐城潛山太湖三縣有賊渠余尚鑑者以擁立明宗室朱統錡為名糾金聲桓餘黨據險為巢凡二十餘寨時出侵掠十月日芄遣副将梁大用等攻皖澗寨克之進圍飛旗寨凡七日㫁賊水道賊兵四出衝突日芄分兵為四路合擊之賊衆大潰連拔飛旗桃園等寨獲朱統錡及余尚鑑斬之大和山小和山等十八寨相繼歸順七年加兵部右侍郎十年𤼵兵𠞰徽州府之赤嶺土賊斬賊首張惟良諭降其衆十一年二月特㫖甄别直省督撫詔加日芄兵部尚書是時明魯王舊将張名振屢犯鎮江𤓰洲截刼漕艘日芄於鎮江城外檀家洲水淺處植木樁深處編木筏環以鐵索大江南北岸及金山俱列大礮南岸自鎮江至圌山北岸自𤓰洲至三江口更築新隄造木橋以通巡兵往來令圌山𤓰洲等四營守備率哨船水師更畨防禦羣賊潛匿江中謀寇掠輙為標營偵擊俘斬畧盡十二年八月加太子太保十一月卒賜祭𦵏如例諡忠敏立碑墓道秦世楨秦世楨廣寜人𨽻正藍旗漢軍順治二年由貢生除直𨽻文安縣知縣三年行取考選授四川道監察御史疏言各省賦役有恩詔裁免而奉行未畫一者請令州縣具冊呈部核定發刋俾知遵守得㫖允行四年巡按浙江以審擬叛案輕重兩請部議降一級調用世楨疏辯以巡撫蕭起元不先咨議徑列其名入奏無由駮正命復原官六年巡視北城八年以六等甄别臺員世楨列一等尋命巡按江南是年八月疏言臣自淮揚至蘇州察知蠧役害民有勘鞫得實者嚴治其罪而揚州蠧役聚黨百五十人宰牲盟誓欲并力合攻訴告之人臣已執為首者數人繫獄待訊因思懲積蠧於事後不若立法使不為蠧請敇督撫司道及府㕔州縣毋於經制外濫設胥役一人並定以年限勿容乆充上是其言如所請時當兵燹之後田畝界址混淆者多官為丈量胥役乗以舞弊世楨令里長編列魚鱗冊新舊互核使業户自相丈量贏縮胥復其舊荒坍並區别之又前此州縣徴賦民有逾額輸納者世楨限夏税五月秋糧九月先給易知單示以科則定數然後開徴又每甲彚列賦額及輸户為滚單使里長按户遞𫝊既輸則填註之違則送縣追比以省追呼三者皆先行之蘇州人以為便遂條列以聞通行諸郡又以徴銀設櫃之制有司奉行不實請増司府印封日收簿亦鈐司府印輸户自封投櫃驗數書之簿别與印單執之将啟櫃封先申牒院司候稽核復請革僉㸃糧長民兑漕運之例改為官收官兑疏並下部議行著為令十月劾巡撫王國寶貪婪状詔革國寶職下總督馬國柱㑹同世楨訊治世楨復言江南素稱澤國民之無田里樹畜者以捕魚資生蘇常鎮三府舊有漁户嵗輸公用銀不列正課自國寶為巡撫加徴十倍漁户力不給終年敲扑苦累日深請概行禁革得㫖下部核議飭禁十年還京遷大理寺寺丞十一年授浙江巡撫時海賊鄭成功侵據福建窺伺浙江世楨條列移兵防守増造戰艦精選水師諸要務又以沿海漁船往往容匿賊匪宜以時稽核請籍其姓名按保甲法以二十五船為一隊責成鎮道譏察無事聴其採捕有事則助守禦疏並議行十二年海賊掠温州台州寜波復聨結賊衆數萬犯舟山副将巴成功従賊賊遂據舟山先是賊陷漳州總督佟岱移浙江各營步騎三千率以赴援至是佟岱還杭州以戰艦巨礮不速造漁船採捕弗禁止咎世楨連章入告上命部臣核議部臣以礮艦造未逾期漁船採捕一年以來世楨奏獲越境私市者三十餘人未嘗疏縦予免議佟岱復劾世楨不給饟舟山致士卒叛降且薦庸懦之巴成功為副将貽誤重地世楨訴給饟循例無缺薦擢由提督田雄主議因述佟岱忿戾逞私状疏並下巡按御史察奏給事中王紀謂浙閩方用兵督撫嫌隙已成恐悮事機請即予更調上乃調世楨為操江巡撫代以山西巡撫陳應泰及巡按御史葉舟察奏世楨無罪佟岱忿戾逞私有據詔佟岱解任以兩廣總督李率泰代之命世楨暫管總督事俟李率泰既至赴新任十三年七月世楨赴任操江㑹佟岱已還京上復命李率泰陳應泰㑹同巡按御史王元曦確核仍如葉舟所奏下部議以舟山失陷未及恢復世楨亦不能辭咎應並與處分十四年三月革佟岱世職世楨先以京察才力不及議降一級調用至是革職時世楨年已老尋卒於家欽定八旗通志卷二百六
