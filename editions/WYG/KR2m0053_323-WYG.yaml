body:
  text: 欽定四庫全書欽定八旗通志卷三百十表三八旗大臣年表記有之曰天降時雨山川出雲易有之曰雲從龍風從虎聖人作而萬物睹言興王首出必有名世之佐應運而賛襄也軒皇七十戰而勝榆罔厥有二臣寜王三千人而代大商實資十亂明良叶契豈偶然歟然輔佐有人斯臂指相使尤必職司有制斯綱目相從周公經國之要全見於周官盖不誣矣我國家肇業震維洊撫函夏太祖髙皇帝受天眷命創制顯庸太宗文皇帝緯地經天典章明備建官分職如雲鳥之啟陶姚世祖章皇帝定鼎中原修舉官政其漢滿兼用之缺中外皆循仍舊制如周監夏殷至本朝特命之官專為八旗而設者沿溯古義領侍衛内大臣即周之宫正漢之衛将軍光禄勲也内大臣即周之宫伯晉之中領軍也前鋒䕶軍綂領即周之掌舍司𨽻漢之衛尉卿也歩軍統領即周之司門下大夫漢之執金吾也内務府總管即周之内宰漢之少府卿也理藩院即漢之典属國也八旗都統副都統即周之六鄉六遂唐之折衝果毅府也駐防将軍即漢之将屯将軍唐之十二軍将軍也至我皇上開闢西域二萬餘里設将軍叅賛大臣領隊大臣辦事大臣即漢之大都䕶副都䕶戊巳校尉将兵長史也然大綱大紀雖復相因而前代之規模務揆以近今之形勢化裁盡善措置合宜用能上下同心地天交泰鞏億萬年磐石之基則逈非厯代之所及矣其間勲業爛然恩榮終始者已均見於人物志其事迹無多不能成傳者其姓名履貫亦不可冺没謹仿漢書百官公卿表例分為六類曰宗人府大臣曰内閣大臣曰部院大臣曰内大臣曰八旗都統曰直省大臣每類之中又各分子目具列於左八旗大臣年表一宗人府大臣年表謹案周禮始設都宗人家宗人以掌祀事漢立宗正所職漸廣歴代因之我朝立制尤重宗親㑹典稱國初扵篤㳟殿前列署十為諸王議政之所順治九年設宗人府以和碩親王或多羅郡王總領府事多羅貝勒為左宗正固山貝子為右宗正鎮國公或輔國公為左右宗人掌玉皇族之属籍以時修輯名封生卒婚嫁諡𦵏等事葢自牒紀載宗室子女嫡庻古有國家者宗室王公凡有委任並由特簡所宜職者宗人府而已且夫建官設職任以王公以理宗藩其事甚重任其事者不可以不志而王公為八旗表率則志八旗者宜先志也兹特按年為表列諸内閣部院大臣年表之前凡王公之賢且才者靖共厥位可考見焉至府丞一員係属漢缺兹欽定八旗通志卷三百十
