body:
  text: 欽定四庫全書欽定八旗通志卷二百七人物志八十七大臣傳七十三漢軍正藍旗二成佟鳳彩國趙賴甘文焜喻龍甘璧白鍾山李宏李夲佟鳳彩佟鳳彩漢軍正藍旗人初為國史院副理事官順治元年授香河知縣三年内陞山西道御史疏言近畿沿河州縣頻年報災皆由堤岸衝決所致宜額設堤夫培築堅固事下部議行尋命巡視河東鹽政七年巡按湖南明年外轉湖廣武昌道十年調河南督糧道十四年遷廣西右布政使十六年調江西左布政使明年擢四川巡撫疏言蜀自張獻忠蹂􅏳後城邑村墟所在蕩然宜令各官捐輸修築省㑹城垣並葺學宫又疏言成都舊稱沃野千里賴都江大堰蓄洩以資灌溉因遭兵燹壅塞日久請於近堰各州縣按糧派夫每嵗農隙時官為督率開濬疏並下部議行尋丁祖憂回京康熙六年授貴州巡撫九年疏言天下所苦累者驛站而險逺尤苦累者黔省層山峻嶺上而復下下而復上故俗言地無三里平也馬走一站必蹄瘸脊爛夫抬一站必足破肩穿甚至中途倒斃司驛者徒被㕘處竟無良䇿前此之勉力支撑者當軍興旁午不暇計及於民名為官應夫馬實則協帮於闔省里甲屢奉明詔嚴禁私派臣與督臣甘文焜再四籌酌盡除協帮驛站之累今已嵗餘民間稍有起色獨驛站萬難撐持東往湖廣者如興隆驛清平驛平越驛新添驛西往雲南者如查城驛安南驛新興驛普安驛相距逺者百餘里近者亦八十餘里所經坡嶺或陡如立壁或﨑嶇盤旋人足馬蹄無不損傷應於重安江楊老堡黄絲舖盤江坡江西坡軟橋坡六處各増設腰站照各驛額設馬五十匹馬夫二十五名謹繪驛路全圖入告請勅部詳議又疏言舊例鋪兵一名日給米一升不足飽一口故召募罕應每勒令百姓輪當近大路者尚可勉強應役若逺隔一二百里輒斂銀轉雇借名多派滋擾請嗣後於日給升米外加給銀二分庶應募弗缺而百姓亦免騷擾又疏言黔省田土或巖畔或溪澗隨其形勢零星開挖我朝闢黔之初州縣衞所各官俱係隨營委署之人不諳田畝賦役隨意開報户部見其數目參差以明季賦役全書發黔訂正因將原報多者不復更改原報少者照全書増添臣蒞黔之初見其頭緒冗雜酌訂由單規式咨明户部並嚴飭府州縣衞所等官將由單填給花户一以杜私派之弊一以騐全書之相符與否嗣據各屬造報有稱荒多熟少請於熟田内包納者有稱田地屬府州縣而丁差久在衞所者有稱田地屬土司苗人向來不計畝數止照寨之大小定糧數之多寡者此多彼縮不能照則例填給盖實徵數目與全書所載本不相符且田地名色甚多錢糧輕重不一有徵糧不徵銀田有徵銀不徵糧田徵糧則每畝自數合至數斗不等徵銀則每畝自數分至數錢不等臣現飭司府各官詳細清理若限期忙迫難免一誤再誤當俟清理完日於全書内逐一更明達部以垂永久疏並得㫖俞允十年丁母憂十一年七月起為河南巡撫兼理河道十二年疏言豫省平定有年百姓苦累未蘇每嵗修築黄河用夫七八千名或至萬餘名自二月至十月俱按地畝起派似乎公矣然狡猾之徒以自己田土飛灑於人勢豪之家以他人地畝包攬於己甚至紳衿衙役借題優免致懦弱鄉愚愈累愈貧每月三四兩不等方能雇夫一名及解到河工又為積年河工夫頭百計欺壓苦不能受勢必至於逃逃而提補又得二三兩重雇是每夫一月已費至六七兩矣即以一嵗萬夫初雇月需三四兩而計每年費至三四十萬今莫若官雇照順治十八年以前例每夫每月僱價二兩每嵗上工九個月每夫止用僱價一十八兩綜萬夫計之止用一十八萬兩其每嵗估夫若干需銀若干除嵗徵河銀外計通省地畝分别等則派銀足之刋明由单内我朝制度凡錢糧俱照明萬厯年間則例此項似屬加派而派夫較之派銀所費不啻數倍曷若稍一更變每畝不過加之釐毫俾得安心農畝此嵗修之議若是倘遇意外大工僱價浩繁或動何項錢糧又在臨時再行酌題者也疏下部議如所請得㫖派夫累民允宜停止若派銀雇夫仍屬累民著照順治十八年以前例支河庫銀雇給如有不敷需動别項錢糧再行題請鳳彩又疏言均平里甲久奉俞㫖通行直省惟河南荒多熟少因循如故雖有里甲之名其實多寡不一多者每里或五六百頃少者每里止一二百頃或寥寥數頃有司止知照例編差里大則田多户殷衆擎易舉里小則田少人稀難以成役更有官儒户名或不入甲或入甲而不當差甚至避重就輕大里愈得便宜小里愈増苦累今莫若令州縣印官按現在征糧地畝冊如一州縣有地一千頃原分為十里者每里均分一百頃一里之中各分十甲每甲均分十頃遇有差徭按里甲分當則豪強無計躱避貧弱不致偏枯矣疏下部行又疏言豫省沿河地方雖云産栁然除隄栁園栁外俱民間納糧地栽種以供採辦自康熙七年以來協濟江南河工之栁已二百七十餘萬束矣而本省嵗修常需百餘萬去嵗開封府屬陽武縣之潭口寺工險事迫無栁可用將民間之桃李杏梨等樹盡行砍伐堵塞方保無虞是修防本省河工尚且不敷難堪協運外省且豫省黄河水勢洶湧原無商旅巨艦往來不過各河口寥寥之渡船耳一遇協濟渡船不敷將小河民船從陸地挖溝引水拉至大河每隻不過装栁二三百束然尚有船可運也今朱仙鎮市舶見封雇無已俱各畏縮不前大河又無片帆往來百姓運栁至河干者祗望洋而嘆官吏束手無䇿若不亟圖變通将來必至誤運現在協濟七里溝之栁九十餘萬束而隄栁園栁官給脚價銀一分五釐民栁連運脚每束給銀四分五釐向來運本省之栁修本省之工每束尚給銀五分今逺運江南千里之外止給四分五釐小民無術飛運安得不賠累乞勅河臣於江南僱船到豫使民止備辦栁束輓運河干嗣後就江南鄰近無河患處酌辦協濟留河南有餘不盡之栁梢以備本省河患庶百姓稍得蘓息大工不致遲誤矣疏下九卿科道議行是年冬逆藩吳三桂反河南為進𠞰通衢鳳彩嚴飭各屬凡軍需糧草官購官運又酌分解馬解礟與出兵道路俾遄行無滯十三年十二月以疾乞休得㫖解任調理南汝總兵周邦寧以士民籲留入告左都御史姚文然疏言鳳彩相貌議論樸實無奇而老成練達謹慎和平服官二十餘年皆能稱職其撫豫數載恤民疾苦民愛而信之傳聞告病以來百姓皇皇如失所倚恃宜令力疾視事資駕輕就熟之益上命鳳彩仍留任十六年七月卒於官年五十有六賜祭葬如典禮諡勤僖祀河南四川貴州名宦趙賴趙賴漢軍正藍旗人父趙夢彩天聰八年授佐領後以監修福陵在事勤慎予三等輕車都尉世職順治四年賴襲父職六年以署㕘領隨謙郡王瓦克達討叛鎮姜瓖有功遇恩詔晉一等輕車都尉又一雲騎尉康熙三年擢正藍旗漢軍副都統十三年命隨順承郡王勒爾錦討逆藩吳三桂擢貴州提督值貴州湖南俱䧟賊命留駐九江就近募兵設四營將校統以防𠞰尋撃敗賊衆於都昌縣之土塘山及鄱陽縣之大灣十五年四月改授江西提督時三桂之偽将軍韓大任糾賊衆䧟吉安據之簡親王喇布督師進征賴同將軍哈爾哈齊率兵攻克東闗斬偽副將楊玊等進師圍城屢敗迎戰賊衆十六年三月韓大任乗夜突圍奔竄賴追之不及引軍還殱其餘黨吉安平尋遣兵𠞰平賊黨於泰和等縣又與副都統尼滿敗賊於大嶺斬賊五千餘復安樂縣十七年調湖南提督十八年隨簡親王敗賊於衡山縣復衡州府旋偕副都統雅哈喇復耒陽祁陽等縣時三桂已死賊黨胡國柱吳國貴吳應麟等嫌隙漸生賴偵得其情以聞請乘渙散之㑹指名招徠上可其奏尋同將軍林興珠提督趙國祚擊敗吳國貴等賊衆復武岡州是年以大兵将進取貴州仍命賴為貴州提督尋奉諭詳議𠞰賊事宜因疏言武岡楓木嶺為入雲貴大路其西為蓮花山東為蓼溪司峝口黄茅嶺各有小路可通雖皆峻嶺崎嶇然彼可來我亦可往計賊僅能當路掘濠設礟石拒守耳宜分布將士刻期並進使逆賊不能久延喙息上以其疏示在事大臣協謀定議以行十九年大將軍貝子彰泰将軍蔡毓榮統師由楓木嶺進賴同總兵趙應奎等由蓼溪司進攻克龍頭山泡洞口瓦屋塘雲霧嶺五子坡諸賊寨賊將馬寳竄走賴遣遊擊甘文煌追撃敗之洪江恢復黔陽縣旋由沅州趨鎮逺屢敗賊衆復黎平銅仁思州思南等府二十年同将軍穆占敗賊将高啟隆夏國相等復平逺府大軍之自湖南進者並隨貝子彰泰與廣西四川兩路大軍㑹期征雲南賴奉詔率所部留鎮貴州二十一年擢正藍旗漢軍都統二十六年以老乞休三十一年六月卒子述汴襲職甘文焜子國城甘文焜其先江西豐城人後遷瀋陽父應魁從世祖章皇帝入闗隸正藍旗漢軍官至石匣副将文焜由兵部筆帖式累遷禮部啟心郎聖祖仁皇帝御極改大理寺少卿康熙二年遷順天府尹六年正月授直隸巡撫先是左都御史郝惟訥以督撫親蒞屬邑官吏因縁派累民間奏罷巡厯例七年六月文焜疏言巡撫不巡視屬邑則吏治民隠無由知悉如巡撫不賢圖潤私家雖坐守一城而苛屬擾民之事正多若更賢必自愛名節省從役絲毫不以累人而年嵗豐歉民間利病有司貪亷悉無遁情請仍勅令巡視但申嚴苛擾禁例則不肖之人知儆而實心任事者得盡職守疏下部詳議部臣執郝惟訥前奏寢其事上曰各省遇有水旱等災督撫減省從役速行履勘庶不至顛倒輕重且可察訪貪官蠧役重加懲治於苦累兵民之事騐實即行更改其允文焜請著為令九月文焜疏報履勘涿霸安祁等州大興髙陽文安武清束鹿清苑等縣田地數萬頃秋雨為災請全蠲嵗賦已徵夏税流抵來年部議按例減免有差得㫖朕聞保定真定二府及霸易道所屬州縣被災特甚勘報十分九分者其盡行蠲免内有已徵者流抵來年文焜復劾昌平順義懐柔宻雲交河各州縣官遲報水災得㫖下部處分如例㑹總督白秉真以賑費浩繁請聽官紳等輸納銀米文焜輸銀三千助賑議敘加銜工部侍郎旋擢雲貴總督八年五月受事奏禁各驛站於額設夫役外派民協助時吳三桂鎮雲南雲貴總督駐貴陽三桂欲藉邉釁以固兵權詭報土畨康東入冦又隂趣凱里諸苗煽亂羽檄交馳以覘文焜措置文焜料康東無能為患凱里近在肘腋不制恐滋蔓難圖先督兵進𠞰擒斬無算連破賊巢遣副将冶秉忠搜𠞰阿魯山陣斬賊酋阿戎餘黨悉平乃以進𠞰康東師期移檄雲南而三桂果以康東逺遁來告文焜尋以滇疆遼濶疏請巡視因遍厯各府州十年三月疏言滇黔山路崎嶇且多瘴癘官員卒於任者請給勘合由驛歸櫬疏下部議行七月以病求罷上以㫖慰留九月丁母憂命在任守制十一年臻剖逆苗阿福倡亂文焜遣兵搗其寨陣斬千餘人擒阿福誅之文焜再疏乞歸𦵏許給假治喪十二年十月還貴陽任事時方允三桂撤藩之請三桂期以十一月二十四日起行隂結黨羽謀反先期三日戕雲南巡撫朱國治分遣逆黨逼貴陽文焜聞變即繕疏遣族弟文烱齎馳入告復致書川湖總督蔡毓榮趣其集兵沅州聨絡楚黔聲援先是文焜回京治喪三桂請以總督印交雲南巡撫署理因假訓練為名盡調督標弁兵赴滇厚結之至是煽誘潰散莫聽文焜調遣文焜既牒提督李本深領兵扼盤江上流以拒賊適本深以書來覘文焜意中多遁辭文焜復為手書答之畧曰黔省安危責在提督逆賊受國厚恩㒺思圖報乃弄兵一隅自取滅亡我輩忠孝自矢建樹正在今日尚其同心協力手足相依萬一不濟惟有效張巡南霽雲以身殉國斷不稍存携貳也本深得書弗顧竟據安順府從逆貴州巡撫曹申吉亦降賊文焜見城中将吏無一可與謀者度貴陽不能守惟鎮逺地勢險阻外可號召荆楚之兵内可抗扼滇黔之隘堵遏凶鋒力圖𠞰滅猶事之可為者因令妾盛氏率婦女等七人自經死即輕騎馳赴鎮逺至則守將江義亦已從逆文焜至吉祥寺江義以兵環之文焜嘆曰封疆之臣當死封疆事至此無能為矣整衣冠望闕再拜遂自刎死年四十有二第四子國城及筆帖式和善雅圖從死焉後數年吳逆既平貴州巡撫楊雍建疏陳文焜滇黔政績及遇賊死節事得㫖甘文焜總督雲貴供職勤勞吳逆反叛捐軀殉難忠節深為可憫下所司優恤並允直隸巡撫于成龍請遣其長子宣化府同知國均迎櫬還京至之日遣大臣迎奠於盧溝橋贈兵部尚書賜祭葬如典禮諡忠果廕子國璧入監二十五年貴州巡撫閻興邦以士民請建專祠於貴陽入奏御書勁節二字額其祠世宗憲皇帝時以文焜入祀昭忠祠國璧自有傳喻成龍喻成龍漢軍正藍旗人由廕生任安徽建德縣知縣康熙十三年遷山西潞安府同知安徽巡撫靳輔奏留以同知管池州府通判事十七年題補池州府知府二十三年丁母憂服闋補江西臨江府知府二十七年遷山東鹽運使三十年遷山東按察使三十二年擢山東布政使三十四年六月遷太常寺卿時議征噶爾丹命協同左都御史于成龍督運中路軍糧十二月遷大理寺卿三十五年擢刑部右侍郎三十六年轉餉寧夏三十七年轉兵部督捕侍郎三十八年十一月併督捕事歸刑部以成龍為刑部額外侍郎三十九年三月命偕尚書范承勲王鴻緒侍郎王掞田雯王紳布雅努顧藻副都御史夀鼐督修高家堰堤工九月補左侍郎十一月調工部十二月授安徽巡撫四十二年擢湖廣總督四十三年疏言鎮筸鎮額兵二千一百紅苗新附部議勻抽督撫提鎮各標兵九百合為三千防守官兵皆係額設與其勻抽不如勻調協汛逓年更換又言紅苗歸化應將辰沅靖道移駐鎮筸増同知通判巡檢吏目等官專理苗務歸辰沅靖道轄武職不許干預苗犯輕罪聽土官發落命盜重案土官拏解道㕔審擬五寨司土官歸㕔官管轄各員俱照邊俸陞調地方有逃盜事土官一併議處以麻陽縣訓導移駐五寨司設義學聽苗民肄業苗寨有仇殺者視聚衆多寡并土司分别治罪均得㫖允行是年河工告成敘督修高家堰功加成龍五級四十五年疏請湖廣各土司子弟有讀書能文者注入民籍考試從之先是成龍於四十三年疏題鎮筸鎮兵王漢傑聚衆搶掠當鋪應正法餘黨不識姓名免深究上以王漢傑等俱係防守兵丁前後糾黨三百餘人肆行譟掠又出城站隊逼官索結情罪可惡諭再詳審定擬具奏至是成龍覆奏引律不合又不劾該管官諭曰凡管理兵丁將弁必平素約束軍伍禁令嚴明兵丁始克遵法紀地方無事今喻成龍不將各營武弁讞審明白輙以並不知情狥庇具題著該部嚴加議處部議革成龍職五十二年命復原職尋卒甘國璧甘國璧漢軍正藍旗人父文焜雲貴總督殉吳三桂之難有傳康熈二十八年國璧以父廕授河南陜州知州累遷江蘇蘇州府同知浙江寧波府知府四十二年遷陜西甘山道丁憂囘旗四十二年補山東登萊青道五十二年擢江蘇按察使五十三年遷山東布政使五十四年擢雲南巡撫五十七年二月疏言鶴慶永北皆通西邊要路今備兵防守宜多儲糧查䝉化麗江等府州縣應徵糧米例係四年折徵一次兹屆折徵請仍徵本色十二月疏言撒甸苗傾心歸順請移武定府同知駐撒甸分防治理俱下部議從之五十九年五月奏雲南迤西向未設驛今大兵出口自安寧州起至塔城止請設二十一站又疏言州縣因公挪用虧空錢糧請照霉爛倉穀例革職留任限年賠完其霉爛倉榖者不論在任解任及分賠之知府限内全完准其開復均下部議行先是都統武格將軍噶爾弼㑹兵進藏議糧專用川運年􅃵堯奏蜀糧不足兼供滇蜀兵九月國璧偕總督蔣陳錫奏撥用雲南糧上責其不能預先料理幾至遲誤蔣陳錫甘國璧俱革職自備資斧運米進藏雍正元年徹兵二年命赴雲南賠補運糧倒斃牛馬並侵用銅錫等項銀八萬十年囘京十月授鑲白旗漢軍副都統十一月擢正黄旗漢軍都統十三年五月命隨同王大臣辦理苗疆事務未幾兵部㕘奏國璧朦混奏免西安糧道祖允焜應追軍需議降級留任諭曰甘國璧以輓運軍需貽誤革職已成廢棄之員前嵗朕因辦理旗務一時不得其人念伊尚無貪贜劣蹟將伊用為副都統旋授都統之職實冀其殫心供職以圖後效乃伊狡猾性成諸事瞻狥沽譽毫無抒誠報効之處深負朕恩著革職在都統任内効力贖罪六月疏言八旗世襲㕘佐領等官由外任襲替之人有於得㫖後即請領俸者有於到任後請領者事不畫一嗣後凡有外任襲替者除在軍人員俱令到任後支領從之七月命管理八旗井田乾隆元年疏言井田各户有縁事咨囘本旗者請停補缺將原領田房交州縣賃種部議令國璧確查實力耕種者改為屯户照畝輸糧其咨囘本旗者原領田房交州縣賃種國璧尋奏改屯莊事宜一各户給田有公有私公田糧石原係儘收儘報今既改屯應酌定額數照畝輸糧一三堡旗民雜處難於約束請將各户原領房田交各州縣即於咨囘井户所遺房地内撥給一八旗屯户有子者頂補無子寡婦請留地四十畝養贍即令本屯人代種輸糧俟伊身故將地交官一井田原撥覇州固安永清新城四屬地今議改屯令防禦管轄就近防禦只有二員請將近霸州者令霸州防禦管轄近固安者令固安防禦管轄一各户向設鄉長一督率農務稽察奸匪請仍留供役遇屯長缺出㧞補一原設驍騎校應徹囘另補但該員囘京候補并無房産請暫留種地俟補缺日令其交地囘京部議如所請十一月命往熱河同將軍申慕德訓練兵丁三年七月授綏逺城右翼副都統九月疏言熱河兵一千移駐歸化城係臣帶往請十起行走從之四年奏歸化城自移駐官兵以來生聚日繁需糧倍昔請撥存公銀採買糧石分貯歸化綏逺托克托城三處命交山西巡撫議行五年四月綏逺城將軍伊勒慎劾原任將軍王常貪婪不職據國璧首其侵冒匠役名糧應將王常交部治罪國璧雖經自首咎亦難辭奉㫖革職十二年卒白鍾山白鍾山漢軍正藍旗人康熈四十七年由官學生補户部筆帖式雍正元年遷江南山清裏河同知五年遷淮揚道九年遷江蘇布政使十年十一月條奏海疆事宜一狼山鎮駐通州蘇松鎮駐崇明距蘇州俱逺輓運不便請即於所駐及附近州縣撥給一崇明孤懸海外地不産米前撫喬世臣奏准於江廣産米處採買積貯請撥萬石貯崇明縣倉備平糶一海濱漲出沙洲民居不知防患請令地方官督於農隙築土墩高二丈以避潮至從之十二年七月授南河副總河十一月奏宿遷桃源安東三縣之夏家馬頭陳家樓王家馬頭等處應下埽加鑲資捍禦阜寧縣之辛家蕩係黃河頂衝兼有海潮上湧應築堤保固從之十二月擢河東河道總督乾隆元年十一月奏河標兵駐濟寧每青黄不接無倉儲可資不得不稱貸貴糴迨領餉償還約糧一斗費二升之價現有河標生息銀三千七百餘兩請買穀四千石設倉存貯令城守營守備經管河標副將稽察春間糧貴借給兵丁秋收還補免加息十二月奏陳豫東河防事宜一東省管河千把總共八員河兵六百名應増河營守備一駐要地巡防聽河道管轄一河灘土本虛鬆漲發漫灘刷成支河黄水勢分則溜緩沙停正河日致淤高應責成該管官於水落時堵塞支河堅實違者㕘處如式者議敘一伏秋水發搶䕶險工購募夫料刻不容緩請撥河南司庫存公銀以五千貯南岸鄭州及歸德府庫五千貯武陟封邱縣庫撥山東司庫銀三千貯曹單縣庫動用仍按數歸款永逺儲備均下部議行三年六月白鍾山因本年南來糧船較遲恐囘空阻凍誤冬兑議將東省本年停運及已囘次船通融接運即令南船自東囘次受兑免遲誤新運與山東巡撫法敏同奏聞上以有裨漕務從之十一月疏言河岸查出灘地葦地三十餘頃栽蘆葦備用造册報部至運河南陽南旺獨山安山湖堤兩旁俱長雜草秋深可刈作埽心因管河文武汛員向無養㢘變價資用未經歸公請嗣後武汛備弁照標營給額定隨糧文汛州同等官給養廉採草備公十二月䟽言管河州同等官在黃河則防守堤埽在運河則挑浚河道䕶重儹空懇照江南例每員嵗給銀六十兩為養㢘按季支領奏入俱報聞四年四月疏言漳水向由直隸入海康熙四十五年引漳入衛濟運故道漸淤全歸衛河勢難容受嗣經山東巡撫岳濬等㑹勘于德州哨馬營建滚水壩開引河洩衛水由鈎盤河達老黃河入海無如漳衛二水挾沙帶泥隨挑隨淤多費帑金漳水舊有正河支河應擇易浚者復其故道於館陶建閘衛水大聽漳入海以防漲衛水小分漳入衛以濟運奏入敕大學士鄂爾泰詳勘議奏尋議於邱縣城東自和爾寨村承漳河北折之勢接開十餘里至漳洞村入舊河於所挑新河頭下東流入衛處建閘以時啟閉上從之八年正月調江南河道總督四月疏言石林一工自去冬堵塞後黃河已歸正流惟南岸淤高黃水側注北岸今北岸石林口復堵築堅固大溜必直趨以下之黃村韓家塘等處新築子堰恐難抵禦臣於對岸挑引河引溜南趨加厚子堰捐修堡房派弁兵巡防十月奏言葦蕩左右兩營每年額採柴二百二十五萬束輪流運交備料乃日久弊生掛欠不清謹酌陳數條一官蕩民地縱橫夾雜兵民混採難禁應查明畫界兵各分地一區使有專責一葦柴於霜降後採取性堅經久前無定限弁兵將堅好者盜賣臨期採青葦充數嗣後應定限年内督兵採取十分之六來年清明前採完運交一蕩地距黃河水次窵逺全賴溝渠深通葦柴方可依限出筏但營弁領銀興挑敷衍塞責應委幹員駐工監督取結驗報一向來運柴船載少致兵丁夾帶私柴應令委員在總滙處量行加載船不増而運可速一運柴船脱帮停泊有改梱盜賣諸弊應照糧船例編號依帮銜尾沿河文武催儹兩奏入上均嘉之九年六月陳奏江南河標四營請照河東例建營倉動支閒款銀六千兩採糧遇價貴時出借兵丁疏入報聞十年九月疏報銅沛㕔屬氷雹山對岸沙灘逼溜南趨河崖日坍漸近堤根正籌料加帮月堤八月中黃河大溜忽隨風掣入新刷河漕冲去沙灘直達尾閭氷雹山堤外水消挂淤堤工俱已停止節省工料不少誠聖德感孚河神所致上敕白鍾山䖍誠致祭以申謝忱十一年二月御史楊開鼎劾白鍾山辦河務出納慳吝任意駁減工程不固沿河查工有供應鋪設及家人兵役需索河員滋怨上年陳家浦決七百餘丈止奏二十餘丈延兩月方興工築阜寧鹽城受累請㫖嚴飭白鍾山當公忠體國痛改前非諭曰果如所奏應重治白鍾山之罪豈但嚴飭使之改過而已若楊開鼎或懐私妄奏或悞聽人言則亦有應得之罪若不查勘明白無以服衆人之心將來大臣等何以辦事著高斌帶楊開鼎前往㑹同尹繼善確查具奏閏三月高斌等覆奏所㕘白鍾山任意駁減需索供應諸款俱無確據惟陳家浦漫口沖刷與淹没受害事屬有因致工員解體輿論不服白鍾山不宜仍任總河諭解任來京交部嚴加議處尋革職命發往江南河工効力五月高斌奏埽壩規宜上以白鍾山從前辦過工程多係不應興工處糜帑令總河顧琮查明俱著白鍾山賠補七月諭曰白鍾山在總河任内辦理河工種種濫用應賠帑銀甚多查伊在京房産所值不過數千金聞其宦資皆寄頓淮揚鹽商家代為營運朕降㫖與吉慶令其訪察今據吉慶開報已有十萬之數巧官欺人暗飽私槖究不能不敗露也著尹繼善一一追出以補白鍾山應賠之項十五年六月授直隸永定河道十八年九月江南銅山縣張家馬路河溢命白鍾山隨尚書舒赫德馳往辦理十月加按察使銜協辦南河事務十九年授河東河道總督二十年四月署山東巡撫二十一年三月疏言曲阜縣知縣缺向由衍聖公保舉每多瞻顧營私且邑中非其尊長即係姻婭牽制狎玩在所不免請改為在外揀選調補不必拘用孔氏族人下部議准令現任曲阜縣知縣孔𫝊松赴部以外省知縣另補諭曰我國家尊崇先聖逺邁前朝延恩後葉有加無已豈於此而有靳焉但與其循舊制而致瘝官有乖政體何如通變宜民俾吏舉其職民安其治於邑中黎庶孔氏族人均有裨益但現任世職知縣既已謝事若歸部銓選不過恩及其身而止於朕心猶有未愜著加恩授為世襲六品官仍令揀選充補用副朕重道崇儒至意十一月上以白鍾山堵築孫家集漫口迅速完工議敘加一級十二月奏濟寧南積水未消請緩開汶河大壩保䕶縴道民田咨江南疏浚下游河道上命白鍾山親往查辦南河文武聽調遣二十二年正月調江南河道總督二月疏言近年有石林口漫溢張家馬路衝奪沙停河淤下流不暢漸成南高北窪之勢迨孫家集潰決河底益高皇上軫念積水未消敇將荆山橋上下洩水河道挑深俾水涸民得播種查黃河受病總由水勢側注北岸衝刷溝漕惟有南北分籌南宜疏而北宜築則使支河不致奪溜疏則使有餘之水勢稍分庶徐郡可期奠安河東河臣張師載由荆山橋一路查勘於二月初至徐謹與面商陳管見三條一南岸長灘則北岸更險必將長灘逼溜生灣處挑成順勢其大灘横亘則挑引河𨗳溜歸中兩岸堤工加高一北岸無堤漫水有梁家馬路徐家莊等間段支河數十道又黃家莊郭家堂諸處有溝漕漫坡矮灘宜築土壩俾水勢平漕時收束以刷正河盛漲時平漫平消不至沖漕奪溜並將孫家集堤工加築寛厚於河身増土壩二三道以資重障一駱馬湖北受山東蒙隂諸山水西受㣲山湖水其尾閭在六塘河上游湖堤在在殘缺應修培捍禦奏入命分任和𠂻辦理上南巡御製詩賜之曰司河稱最久自是悉防修慎莫幸無事勉惟建逺謀况經益新淤此實厪深憂朂爾平成績紓予宵旰籌時工部侍郎梦麟奉命馳勘荆山橋工程白鍾山同奏言現在丈估應挑工程自茶城至荆山橋下游王母山止河道綿長廣募夫役河員呼應不靈請敕督撫派沿河銅豐沛蕭碭宿靈虹睢邳十州縣印官來工分三十七段領帑興修從之工竣賜以詩曰南巡江國周遭厯不使河干負弩朝嘉爾𨗳疏合優敘肯因小節課臣僚尋議敘加一級六月奏寧夏河水值長即飛報下游防範立法甚善正陽關乃淮水上下關鍵請於大汛時委佐襍在彼查報並敕兩江總督河南安徽巡撫令沿河州縣照寧夏水報例實力辦理詔如所請八月尹繼善奏湖口閘應増滚壩咨商白鍾山等籌辦上慮往返躭延有妨工作敕令白鍾山與梦麟尹繼善等分任責成同時並舉均於嵗内吿成以收實效十一月疏言上江諸水開放後皆歸安河達洪澤湖安河間段淤淺連年水患皆由此現募漁船四五百伐蘆撈泥俾尾閭一通上游皆有去路又勘歸仁堤下舊有涵洞穿入鮑家河達安河年久湮塞今擬開浚分林子河一支則安河進水之地亦有所分河患可漸減奏入報聞十二月疏言葦蕩營設浚船柳船石船運料定例三年小修五年大修八年拆造但未定修造時限未免遲延嗣後石船大修拆造定限四個月小修三個月浚船柳船大修拆造定限三個月小修兩個月派守備承修㕘將督修逾限議處未屆修期損壞照例分賠從之是月各工吿竣議敘加一級二十三年加太子少保二十六年乞休上慰留之尋卒詔贈太子太保賜祭葬如例諡莊恪李宏李宏漢軍正藍旗人由監生捐州同河工効力授山陽縣外河縣丞乾隆元年授揚州府揚河通判四年遷淮安府山安同知十二年丁母憂服闋補徐州府宿虹同知十六年擢河庫道十八年八月欽差尚書劉統勲等䟽㕘江南河員虧帑一案解宏任十一月查明本任無虧奏留工効力二十二年二月命發往直隸以河務同知用四月兩江總督尹繼善奏留南河尋隨欽差侍郎夢麟辦六塘河以下宣洩積潦事宜七月補河庫道十月丁父憂命在任守制二十七年調淮徐道二十九年六月擢河東河南總督九月奏言山東運河源出汶水每遇不足全資湖水接濟各水櫃貯蓄於秋冬灌輸於春夏所關甚鉅今秋雨較少湖水不宜多洩現飭早閉臨運各閘十月又言㣲山湖為山東江南二省濟運之要需蓄水最宜充盈韓莊湖口閘水現深一丈與滚水壩脊相平囘空船足敷浮送即飭下板堵閉又泗河源出泗水縣陪尾山諸泉彚合秋冬之際與其收入獨山湖僅濟南陽以南之運不若收入馬場湖俾濟寧上下河道並資其益臣現將衮州府城東京口壩築土堰攔截俾泗水由黒風洞入府河合洸水以達馬場湖廣為儲蓄南運更屬有備至專濟北運之蜀山馬踏二湖水勢較上年差弱雖冬間煞壩挑河尚有汾水分入但春間必須趕築大壩多收方於北運有裨諭曰東省運河全賴各湖水櫃收蓄充盈以濟來春重運今既水勢㣲弱自應早為經理籌辦著派淮徐河道李清時前往山東㑹同總河李宏巡撫崔應階妥協商辦十一月奏言今嵗㐲秋汛内南旺湖之北沙趙漳衛等河其南汶泗韓馬等河多淤衛河係下河㕔屬照例用船撈濬運上二㕔屬之南旺濟寧臨清三處塘河及各汛長河有額募二項人夫挑濬捕河㕔屬額夫足用其募夫工價銀全省惟泇河㕔屬因彭口山河之水挾泥沙而來多停積且入閘内水落灘現額夫不敷辦理應將補河省項移此増募儹辦期寛深濟運報聞又奏黃河北岸之耿家寨埽工為豫東第一險要自乾隆九年下埽修防嵗費帑料盈萬伏秋屢經搶䕶去冬於對河灘挑引渠兾分溜勢仰賴聖主鴻庥今秋全河大溜暢分入渠衝刷寛深險工淤閉以二十載鑲修之工一旦化險為平得㫖嘉奬交部議敘加一級三十年正月上南巡過山東宏迎駕御製詩賜之曰南河久董役北省特掄英試小將投大惟明更要誠固隄綏禹甸輸漕達燕京咨度久安計寧徒扈蹕行三月調江南河道總督諭曰李宏甫由監司擢用總河現在所屬道㕔多係舊時同寅恐難免有瞻狥掣肘之處著高晉統理南河事務李清時向任東省熟於運河事務而黄河隄岸機宜尚恐未能深悉此時河東總河仍著李宏協理李清時速即同往豫省講習河防諸務俟伏秋汛過李宏再赴南河新任七月疏言黃河至河南陜州峭壁横向水從石出名曰三門寛不過七八十丈至孟縣兩岸漸無山岡始濶十餘里北岸武陟縣南岸滎澤縣始有隄工防衛丹沁兩河由武陟木欒店滙入伊洛􅈆澗四河由鞏縣洛口滙入遇雨多水發挾沙而行勢遂浩瀚是以上南河㕔屬之胡家屯楊橋等處首攖其鋒工最𦂳要迤下順軌東流惟土性浮鬆逢灣掃刷倘黄與沁洛並漲兩岸節節須防乾隆二十六年秋汛時沁洛長一二丈而寧夏迭報河水長丈餘一時並下故處處受險若先後長落則大河儘可容納工易防修即如本年夏間伊洛並未長惟寧夏水長五尺二寸陜州城外萬錦灘亦長三尺五寸而下游各㕔僅報數寸至尺餘不等道逺流㣲又有三門關鎻水勢逓減工程鞏固此其明驗上游長落大小關工程平險不可不留心防衛臣思三門為黄河出水要區鞏縣城北洛口為伊洛􅈆澗入河總滙現咨河南撫臣飭陜州鞏縣各立水誌每年自桃汛起霜降止水勢長落尺寸逐日登記據實具報至沁水飭黄沁同知於木欒店龍王廟前另立水誌查報遇陡漲照寧夏例飛報江南總河闗㑹上下河員相機修防實於工程有益又濟瀆出河南濟源縣西北三里濟瀆廟後滙濞河由孟縣迤東達黄河岸高河底無衝溢患又大丹河出山西高平縣至河内縣之丹谷口築攔河碎石壩遏令由小丹河歸衛濟運壩下設堰九分十九渠石隙洩下之水聽民灌田名九道堰漕民並賴前經河臣張師載奏於碎石壩下丹水尾閭附近沁水處嵗築土壩攔遏臣今細訪十九渠錯出分流並未全由大丹河歸沁下游土壩無益應停嵗築惟夏秋培碎石壩以防水勢衝刷其壩底洩水堰密塞以土並將斗門下小丹河不時查驗遇淺窄䟽令與斗門一律俾丹水暢達衛河以收實效又河南輝縣百泉為衛河源蘇門山下衆泉湧出滙為巨浸南流里許建斗門三座中為官渠専資濟運東西民渠分灌田疇向例重運抵臨清閉民渠俾泉流盡由官渠入衛五月後民間挿秧需水一日濟運一日灌田按期啟閉六七月間聽民自便立法甚善永當遵守章程惟民渠迤東石壩稍坍恐將來閉民渠時泉水旁洩不盡歸官渠現飭修砌堅實上嘉之十月疏言今嵗運河水小微山湖滚壩磯心應増設石槽閘板多收水尺餘韓莊以下八閘酌量啟閉仍挑河底令深江南河清河定河成等閘與八閘毗連亦可下板其泇口猫兒窩淤淺處逐一疏濬使運河來路増多明嵗重運無虞淺阻諭曰所議甚善依議行先是上以清口節宣未暢下河田廬易淹特命定高堰五壩水誌每高一尺清口即拆展十丈以次逓展毋惜費三十一年三月疏言清口東西壩工蓄洩啟閉為黄運二河關鍵仰䝉欽定水誌臣凛遵籌辦查清口口門年來或留二十丈或十七丈上年霜降後因湖水大消祇留十四丈目下挑汛屆節湖水稍大應相機預籌臣與督臣高晉酌議將東壩先拆六丈連舊口門寛二十丈俾洪湖及早騰空預留容納之地此後視湖水加増陸續拆展宣洩諭奬其留心八月河溢徐州韓家堂宏與高晉分駐兩壩堵築九月奏言漫水滙入洪澤湖臣等飛飭下游道㕔確查防範據報高堰誌樁僅長水九寸滚壩並未過水縁本年清口東西壩陸續展寛五十三丈湖水隨長隨消暢流歸海是以漫水雖滙入而湖水並未大長此皆由皇上指授機宜平時大展清口騰空湖面之明效十月漫口合龍上以宏等經理盡心蕆工迅速交部議敘加一級十一一奏言徐屬兩岸堤埽各工水漲汕刷處或應補修或應停辦臣分别履勘銅沛㕔屬李家樓埽工百六十丈現挺入河心小店埽工四百十三丈宿虹㕔屬蔡家樓埽工百七十丈下首現經放淤形勢俱改若仍前嵗修徒費無益至各㕔塌卸工段勘估鑲修用料較多即以李家樓等三工停修節省之料移辦不至多費再各㕔兩岸堤工查騐水痕本年盛漲時有高出水面尺餘者有六寸至八寸不等者並有水與堤平臨時搶築子堰搪䕶者宜量培高厚所用土方銀無多來嵗搶修額銷數内可通融籌辦務使工歸實濟錢量無致虛糜又言臣囘至清口察湖水稍落應乗時接築口門蓄清抵黄飭道㕔等將東西壩陸續接築留口門二十丈酌量收東均得㫖嘉奬三十二年奏報本年秋汛内黄河北岸蘇家山南岸毛城舖二壩水過旋消各工平稳諭及時疏濬淤積以資宣𨗳三十三年奏言河庫道設於雍正九年額收鹽課河銀夫食等項共六十八萬兩有奇額支河葦等營兵餉堡閘等夫工食並各㕔購辦嵗搶料物加高土工等項約六十五六萬收支相抵存庫原屬無多近因節存銀兩積八十餘萬加以本年新收支發合計舊存按月造報款項繁多若不定章程恐侵那滋弊請嗣後於每年四月奏銷後河臣就近赴庫盤查一次照司道例據實保題庶符政體錢糧益昭慎重詔如所請行尋以王家田頭漫工不能預為籌辦部議降三級調用奉㫖銷去加三級免其降調三十四年奏言洪澤湖本年存水甚大臣將清口東西壩逓展宣洩適黄水驟長灌入清口臣隨將惠濟通濟福興三閘下板俾併力敵黄次日黄水消退清水仍出口㑹黄東注三閘之板照舊啟放細查此次水長乃係雨後黄河客水滙注一時未能相抵並非清水微弱臣惟凛遵聖訓留心體察隨時相機料理上是之三十五年以甄别佐雜人數過多部議降三級奉㫖從寛留任三十六年五月奏報本年黄河水長甚驟雖已開毛城鋪峯山閘尚不足殺其勢請啟王家營減水壩以洩異漲𨗳由鹽河歸海諭加意防䕶六月奏搶築各工平稳上嘉其勤妥交部議敘八月卒諭曰李宏自簡任總河以來辦理一切修防事宜頗為妥協今年督辦搶築各工不辭勞瘁尤屬奮勉出力兹聞溘逝深為軫恤應得卹典該部察例具奏尋議宏有從寛留任案照例賜祭一次子奉翰現任河東河道總督李本李本漢軍正藍旗人和碩額駙李淑鰲子乾隆元年賜一品廕生十一年分户部學習授主事累遷兵部郎中馬館監督二十三年派送軍需戰箭二十萬枝於甘肅事竣京察一等召見奬諭二十五年擢四川松茂道二十八年總督開泰􅊾赴打箭爐辦理巴塘夷務旋委攝䕫州府管䕫渝兩關税二十九年總督阿爾泰奏本整頓䕫關已有端緒請卸攝䕫州府任後仍委管理從之三十三年俸滿入都適本旗勲舊佐領缺出命本承襲仍囘四川任諭令㑹同四川提督董天弼辦理郭羅克夷務三十四年七月授福建按察使十月調任四川三十六年九月總督德福委辦兩金川軍務總局尋擢布政使十一月命督辦四川奏報郵函事務三十七年正月諭專司驛站八月辦理曽頭溝一路糧運遲誤部議革職得㫖從寛留任先是總督阿爾泰婪索屬員及派買物件短發價值原任川東道託隆發其罪諭曰李本身任藩司軍需局事務是其本責乃於辦理夫糧及運送火藥等事種種貽誤且於所派辦差正印各官不即委員署理至誤地方公事其罪愆已為不少念其尚屬公過是以仍與姑容兾其或思儆戒改悔今訊出阿爾泰在任聲名狼籍若此豈託隆逺在川東尚能縷晰指陳李本與之同城共事最久轉漫無見聞之理李本係藩司大員何竟聽其恣意貪婪不早據實陳奏似此狥情容隐難以復加寛貸著革職一併嚴訊定擬總督富勒渾以本罪止折枷不足蔽辜請留軍營効力贖罪疏入諭曰李本果係能事之員辦理川省軍需尚可兾其得力富勒渾何妨另摺奏明朕必俯從所請且可免其治罪乃該督謂折枷不足蔽辜請留軍營効力贖罪名為加重實則從寛試問枷號之與効力孰輕孰重其理顯而易見此等伎倆豈能逃朕洞鑒乎李本之罪原非必不可宥因富勒渾意在巧為開脱法司亦不指斥其非朕轉不能予以曲貸非所謂愛之適以害之耶李本仍着於川省照例折枷俟期滿後再留軍營自備資斧効力贖罪以示懲儆旋經富勒渾奏給同知銜在巴朗拉山督催糧運兼稽察要隘三十九年賞兵備道銜往南路軍臺辦理諸務并准具摺奏事四十年授四川驛塩道四十一年擢甘肅按察使四十二年河州奸民王伏林以邪教謀為不軌本隨同總督勒爾謹擒治得㫖嘉奬四十三年授貴州布政使旋䕶理巡撫是年入覲奏與雲貴總督李侍堯係屬叔姪諭不必迴避四十五年七月疏言督撫衙門需用物件有向外間購買者但身膺重寄事無鉅細悉為羣吏表率家人長隨例應闗防不得因購取什物出入至首縣中軍各有職事若令買辦物件不惟易起逢迎之漸且非整躬率屬之道各衙門原設有買辦名目在各項人役内僉充此輩雖賢愚不等而隸名在官約束較易請嗣後督撫衙門購買物件慎選人役公平購辦倘假托官勢累商病民查出即從重究處報聞尋授貴州巡撫十月奏甕安湄潭二縣勸民墾田百五十餘畝遵例六年後起科下部議行四十六年八月因拏獲四川嘓匪二十一名辦理寛縱部議降調詔從寛留任十月疏言黔省額運荆楚黒白鉛其威寧州之榨子厰黒鉛自雍正五年開採以來除二成抽課外餘鉛每百觔給價銀一兩五錢每年辦鉛七十萬觔解京供鑄後因出鉛減少與湖南各半分辦乾隆四十年該厰無鉛可運經部議令楚省全數承辦自四十年停運截至四十六年僅得課餘黒鉛百七十九萬餘觔除動支各項及備他省採買外只存百五十萬觔有零開採年久礦逺硐深加該處食物昻貴又因餘鉛盡歸官買遂至裹足不前請照滇省銅務及黔省白鉛例每百觔抽課二十觔官買四十觔通商四十觔爐丁踴躍黒鉛可期漸旺得㫖允行四十九年正月卒子侍政由㕘領授頭等侍衞和闐領隊大臣五十九年因病休致欽定八旗通志卷二百七
