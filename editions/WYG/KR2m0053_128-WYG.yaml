  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_128-1a, image: WYG0665/WYG0665-0937c.png}
body:
  text: 營建志三京城營建規制三八旗倉厫旗八旗教埸礮厰八火藥厰八旗八旗倉厫海運倉在東直門内鞭子衚衕北口外鑲黄旗地方原設厫四十五座内四座六間餘俱五間計二百二十九間空基十六座續增厫四十二座内廢七座共八十座堆房七所共八間乾隆元年添厫二十座舊太倉在朝陽門内正白旗地方原設倉厫四十二座内三座六間餘俱五間計二百一十三間空基二十三座續增厫三十八座共八十座堆子三所共六間乾隆元年添厫九座五十年被焚六座南新倉在朝陽門内鑲白旗地方原設厫三十座内二座六間餘俱五間計一百五十二間空基一十六座續增厫四十五座共七十五座堆子三所共六間乾隆元年添厫一座祿米倉在朝陽坊智化寺西正藍旗地方原設厫二十五座内二座四間餘俱五間計一百二十三間内廢二座空基五座續增厫三十四座共五十七座堆子七所共十一間此處原係祿米太平二倉康熙四十四年皆歸併為祿米倉北新倉在東直門内瓦乂兒衚衕東口正黄旗地方原設厫四十九座每座五間計二百四十五間空基八座續增厫三十一座共八十座堆子八所乾隆元年添厫六座興平倉在朝陽門内匾擔衚衕南口正紅旗地方原設厫三十座每座五間計一百五十間空基十座續增厫五十座共八十座堆子七所乾隆元年添厫一座富新倉在朝陽門内北小街鑲紅旗地方原設厫二十八座毎座五間計一百四十間外板厫二座係大通槗堆貯板木空基八座續增厫三十四座共六十四座堆子五所太平倉原與祿未倉同設一處康熙四十四年移設於朝陽門外鑲藍旗地方原設厫十五座每座五間計七十五間空基一座今歸併祿米倉詳後續建厫八十座内十座係大通槗號房改作乾隆元年添厫六座本裕倉在徳勝門外清河地方開放圓明園及鄭家荘二處駐防官兵俸甲米石厫三十座每座五間計一百五十間堆子九所萬安倉在朝陽門外正白旗地方厫四十二座每座五間計二百一十間堆子五所乾隆元年添厫三座四年奏准将儲濟倉新建厫四十八座歸併管理名曰萬安東倉其舊厫名曰西倉裕豐倉在東便門外駱駝館共厫六十三座堆子十所共十間儲濟倉在東便門外謝聖保園地共厫一百零八座堆子八所共十三間乾隆元年所添倉厫已撥入萬安倉管理豐益倉在安河槗共厫三十座堆子四所共十二間恩豐倉在東華門北首東夹道乾隆二十八年設厫十二座係沿河官房七十四間改作通州西倉在新城内原建厫一百九座續增厫九十一座乾隆二十九年裁去四十九座現存一百五十一座通州中倉在舊城南門内原建厫六十四座續増厫五十五座乾隆二十六年裁去十一座現存一百零八座凡堆缷漕米之處設立號房大通槗號房共四十八間朝陽門號房共五十八間通州石埧號房共一百零六間通州土埧號房共六十間以上倉厫名數坐落凡倉厫規制每座五間亦有四間六間者每間七檩六搭椽面濶一丈四尺進深五丈三尺山柱髙二丈二尺五寸簷柱髙一丈五尺五寸頂有氣樓厫底用磚砌墁上鋪木板厫門厫墻俱留下孔以洩地氣凡修理倉厫三年一小修五年一大修工價属户部辦料属工部自錢糧歸併户部所需料價銀兩並咨户部給發順治九年覆准看倉夫役每名月給米六斗每嵗額修倉厫七十五間如遇工作毎名日給米一升又題准京通倉厫大修属工部小修属户部如遇大修工部確查勘估措辦物料户部給發工匠價值如遇小修倉塲侍郎酌議户部給發該倉監督修理十七年覆准各倉塲基囤基俱用磚鋪砌十八年増建京城等倉厫每厫一座計房五間俱係七檁六搭眀間各造氣樓一座出樓雨搭一間每厫面濶六丈進深四丈五尺山墻髙二丈一尺長五丈一尺簷墻髙一丈二尺長六丈墻根濶七尺頂濶五尺又砌造囤基每座週圍六丈髙一尺五寸康熙十八年題准京倉差工部官督修仍差户部官一員公同估計其通庫輕賫銀兩截充兵餉應用錢糧户部支取雍正二年覆准各倉厫墻垣如有渗漏坍塌之處監督報眀倉塲侍郎即親身騐看眀白該監督果能捐修完固俟任滿交代清楚之後倉場查眀具題将實在捐修銀兩數目造册送部核眀交與吏部照例議叙按銀兩多寡准其加級紀錄以示奨勵四年覆准各倉開濬水溝墊土造槗令各監督於每年二八月中巡視挑濬永為定例不行修築者題㕘議處並行令九門提督飭該地方兵丁禁止堆積壅滯又覆准令倉塲總督查眀現在放空厫座即将現存板木滿鋪厫底堅固鋪墊如有不敷動支户部錢糧採買板木應用嗣後放空厫座俟各省随糧觧送本色板木到日陸續鋪墊八旗教塲順治八年題准八旗演武教塲各随旗分建設十八年改設鑲黄旗教塲於安定門外正黄旗教塲於徳勝門外正白旗教塲於東直門外鑲白旗教塲於朝陽門外正紅旗鑲紅旗教塲於阜成門外正藍旗教塲於崇文門外鑲藍旗教塲於右安門内各有演武㕔鑲黄旗侍衛教塲在東安門内皇城北墻根正黄旗侍衛教塲在西安門内五龍亭北正白旗侍衛教塲在東安門内皇城南墻根每教塲内設房五間抱厦三間雍正三年七月工部奏准滿洲正紅鑲紅鑲藍三旗蒙古正紅鑲紅鑲藍三旗漢軍正紅鑲紅鑲藍三旗各於教塲内建設箭亭一座每座三間給發銀兩委員盖造本年三月初四日興工四月二十九日完工交與各該旗查收是年十月兵部議覆據副都統多賽奏稱安定門外黄寺前教塲係八旗操演兵丁閱看軍器及蒙古往来之地臣見小人圖利有在路傍掘土為坯市賣者若不行禁止恐至日乆不惟掘傷教塲亦且有壊道路况地近城垣有闗風水伏祈勅下嚴行禁止等語查得教塲委属𦂳要之地又係近城風水攸闗應如所請嗣後令步軍統領衙門出示曉諭嚴行禁止仍交派出稽察教塲旗員該營武弁及兵馬司官員令其不時巡查若仍有在教塲處掘土者即行拿送刑部従重治罪将該管官一併議處再八旗教塲俱近城垣不肖人等希圖取利有掘土為坯市賣者亦未可定相應一併交與步軍統領衙門八旗稽察教塲官員及五城兵馬司官員嚴行禁止奉㫖依議乾隆五十九年查正黄旗教塲内有閱臺一座看亭拜唐阿住房一間奉㫖設立石碑一座餘旗各如舊静宜園演武㕔琉璃正殿一座五間前抱厦三間左右布瓦朝房各五間俱無匾額正殿後磚砌圓城一座前劵門上嵌石匾刻威宣壁壘四字後劵門上嵌石匾刻志愈金湯四字前劵門上琉璃瓦城樓一座計五間後券門上琉璃瓦城樓一座計三間内安設石卧碑上刻實勝寺後記俱無匾額圓城内左右看守房各三間俱係乾隆二十六年修建又寔勝寺前琉璃瓦碑亭一座八旗礮厰鑲黄旗礮厰三十五間正白旗礮厰三十五間鑲白旗礮厰三十五間正藍旗礮厰三十五間俱在鑲黄旗教塲空地正黄旗礮厰三十間正紅旗礮厰三十間俱在徳勝門内鑲紅旗礮厰二十三間鑲藍旗礮厰二十三間俱在阜成門内鑲黄旗礮厰在栢林寺東教塲口正黄旗礮厰原在徳勝門新街口内蒋家坊地方康熙四十六年五月移在西直門内樺皮厰地方棚内存貯四十七年三月即在樺皮厰地方修造礮􅈰存貯礮位正白旗礮厰在東直門内北新槗栢林寺東邉貯礮房屋計四十八間正紅旗礮厰原在新街口將養房地方康熙四十六年移在西直門内樺皮厰地方鑲白旗礮厰在北新槗栢林寺東教塲地方係康熙二十四年工部修葢二十五年初立礮􅈰鑲紅旗礮厰在宣武門内城隍廟北正藍旗礮厰在北新槗栢林寺東邉康熙二十五年工部修盖自本年起本旗礮位俱在此􅈰内收貯鑲藍旗礮厰在宣武門内城隍廟北康熙二十年正月工部尚書朱之弼題准神威将軍礮二百四十位俱已造完八旗各分給三十位每旗造房十五間各面濶一丈二尺深一丈五尺令其收貯二十四年三月工部尚書薩穆哈等題准鑲黄正白鑲白正藍四旗收貯礮車等項房每旗大門一間正房九間廂房二十六間共盖造房一百四十四間滿洲火器營城内八旗礮厰乾隆二十九年設鑲黄旗在大興縣南邉房四間正黄旗在徳勝門内西中心臺房五間正白旗在東四牌樓北七條衚衕房五間正紅旗在阜成門内馬市槗北溝沿房十一間鑲白旗在崇文門内東城根中心臺房十一間鑲紅旗在宣武門内单牌樓邱子衚衕房五間正藍旗在崇文門内大羊毛衚衕房七間鑲藍旗在宣武門内西斜街玉皇廟房六間半八旗火藥厰鑲黄正黄二旗火藥厰十二間在安民厰正白正紅鑲白鑲紅正藍鑲藍六旗火藥厰二十間在天壇後康熙十年十一月工部尚書吴達禮等議准正白等六旗堆貯礮藥庫房二十二間大門三間年乆将頽貯藥在庫不便修理将厰外大門三間厰内小門一間圍墻造砌先於庫傍餘地造庫十間搬貯火藥再拆缷舊庫木料磚瓦造庫十間全移火藥堆貯其庫房照舊七檩大門六檩共計盖造庫房二十四間康熙三十一年九月工部尚書沙木哈查得城上新造收貯火藥房一百四十六處修理舊房九十九處共計七百三十五間交與管工員外郎石流柱修造工完八旗火藥厰先經設立徳勝安定二門外收貯火藥康熙三十一年房屋倒廢将存貯火藥奏明移在濯靈厰各門城上收貯所有空地三塊雍正六年八月又經奏眀交與内務府查收欽定八旗通志卷一百十四
