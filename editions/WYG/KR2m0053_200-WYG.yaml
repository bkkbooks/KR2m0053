body:
  text: 欽定四庫全書欽定八旗通志卷一百八十六人物志六十六大臣傳五十二䝉古正白旗上岱武訥格爾明安達哩額琳齊青色格克徳穆圖憲徳克什阿必達拉錫阿蘭泰武訥格武訥格姓博爾濟吉特其先居葉赫後隸䝉古正白旗太祖髙皇帝創業興京諸䝉古向化武訥格率七十二人來歸有勇畧兼通䝉古文及漢文賜巴克什號嵗癸丑從征烏拉有功授三等男天命十一年大軍圍明寧遠城未下命分兵攻海中覺華島明叅將姚撫民擁衆四萬倚島列營鑿氷十五里為壕衛以車輴我軍奪壕口進攻盡殱其衆焚所積芻糧及船二千餘乃還天聰三年春同額駙蘇納率左右翼䝉古及滿洲兵八十征察哈爾降二千户以歸降者窺我兵少欲叛歸明遂盡殺其男子惟釋二台吉俘婦女八千有竒還分隸左右翼養贍之上怒武訥格蘇納殺降有㫖切責奪所給駝馬牛羊是年冬從征明入龍井闗克遵化進軍都城北土城闗明督師袁崇煥自寧遠來援我左翼䝉古兵迎擊弗勝武訥格率右翼繼進敗之賜所俘獲之半犒其軍尋又攻克固安縣四年春克永平明騎卒三千自玉田出武訥格遣兵擊走獲馬百餘自永平畧豐潤還聞明兵四千圍大安口城急赴援破其圍又設伏於樵採處斬獲無算五年從征明圍其總兵祖大夀於大凌河杏山守將與大夀書有擕軍士棄城或單騎潜來之語武訥格獲以獻於是我軍盡知城中虚實乃築壘鑿壕為久困計武訥格統䝉古軍列營城東南大夀遣兵出圍我所取臺堡武訥格與貝勒阿濟格等夾攻殱敵過半自是城中兵不敢復出六年同阿濟格招撫大同宣化邉境察哈爾人衆七年同貝勒阿巴泰等攻明山海闗俘獲人衆牛馬以歸明兵追及武訥格殿力戰却之太宗諭諸貝勒大臣曰武訥格所在建功今又殿後敗敵人臣為國義當如是八年五月叙功晉三等公世襲㒺替賜勅免死罪二次時太宗率諸貝勒分道征明命武訥格統左右翼䝉古兵供調遣且策應大軍始與貝勒徳格類收察哈爾降者千餘户繼由獨石口越長安嶺至保安州㑹大軍於應州所過或攻或撫悉稱㫖閏八月自得勝堡班師遇逃入陽和之䝉古四百七十餘人收以隨軍九月喀爾喀部長族屬有為察哈爾衆邀殺於路者奉命領兵百人往緝追斬二十餘人而還九年二月卒恩䘏如典禮第三子廣泰襲三等公爵長徳穆圖次齊墨克圖自有傳明安達哩明安達哩䝉古正白旗人姓西嚕特世居科爾沁父博博圖太祖髙皇帝時率七十餘户來歸即授為佐領俾轄所屬太宗文皇帝天聰元年隨征明錦州殁於陣予三等輕車都尉世職明安達哩襲兼管佐領崇徳三年任䕶軍叅領隨貝勒岳託征明由宻雲東北毁邊牆進同都統伊拜擊敗明太監馮永盛兵攻克南和縣六年隨大軍圍錦州敵據山巔列陣明安達哩率所部䕶軍衝擊敵潰遁松山敵騎來犯復擊敗之我師鑿壕駐守敵兵出錦州城奪橋明安達哩擊却入城上親督師敗明總督洪承疇三營步兵明安達哩奮勇力戰又擊敗敵騎叙功晉二等輕車都尉七年冬隨貝勒阿巴泰征明薊州薄燕京破明總督趙光抃軍又同前鋒統領阿山擊走三河縣步兵進略山東八年春師還明總兵白廣恩張登科和應薦等邀戰螺山明安達哩率所部擊之潰又同䕶軍統領鰲拜破明總督范志完軍凱旋賚白金是年擢禮部叅政兼正白旗䝉古副都統順治元年隨大軍入山海闗擊敗流賊李自成二年隨英親王阿濟格征自成於延安府七戰皆捷招撫鳯翔等府降者三十餘城三年改兵部侍郎值蘇尼特部騰機斯與弟騰機特叛明安達哩隨豫親王多鐸率師往征扼據險要騰機斯等聞風遁走明安達哩乗夜追逐至鄂特克山大破賊衆斬其台吉茂海復同鎮國將軍瓦克達等追𠞰手斬十一人獲其輜重並擊敗土謝圖汗及碩雷汗兵五年擢正白旗䝉古都統七年兼任兵部尚書先是叙入闗征流賊及征騰機斯功晉爵至二等男世襲罔替嗣以考滿並遇恩詔晉一等男加一雲騎尉八年以議敘福建湖廣大同軍功遲延削雲騎尉罰鍰九年列議政大臣復遇恩詔晉二等子十年以徇隠興安總兵任珍擅殺事覺罷尚書任降世職為一等輕車都尉兼一雲騎尉十一年統兵征俄羅斯敗敵於黒龍江十三年上以明安達哩在部日久練達庶務授理藩院尚書十五年十二月命為安南將軍率師駐防荆州十六年海賊鄭成功犯江寧明安達哩率師赴援賊艘千餘泊三山峽明安達哩督兵擊敗偽都督楊文英等擒斬偽副將一獲船艦器械甚多賊退竄入海明安達哩旋奉詔移師浙江駐防舟山十七年還京仍授兵部尚書康熙三年考滿加太子太保六年調吏部尚書旋因疾致仕八年二月卒賜祭葬如典禮諡敏果子都克襲額琳齊岱青子扎木素額琳齊岱青姓博爾濟吉特世居翁牛特初為察哈爾宰桑太宗文皇帝天聰六年大軍征察哈爾其汗林丹驚懼率衆奔土黙特部旋自竄唐古特部部衆相繼散額琳齊岱青欲歸我朝㑹察哈爾部多爾濟塔蘇爾海率所屬逰牧與大軍遇倚山拒戰敗遁額琳齊岱青追及與之謀歸順八年八月上征明大同凱旋出尚方堡額琳齊岱青遂同多爾濟塔蘇爾海率七百户來歸上遣大臣率兵衛其家屬至盛京賜賚優厚分隸䝉古正白旗崇徳元年封二等子三年隨睿親王多爾衮征明毁青山口邊牆入越燕京趨山東額琳齊岱青遇敵輙奮戰克捷六年隨鄭親王濟爾哈朗圍錦州明兵自松山來援者再又欲刼我紅衣礟額琳齊岱青皆先衆擊却之明總督洪承疇集步騎十三萬列營松山額琳齊岱青偕衆敗其三營步兵七年敘功晉一等子世襲罔替八年卒子扎木素襲爵尋授散秩大臣順治十八年十二月聖祖仁皇帝即位加恩諸大臣之舊自察哈爾來歸者扎木素與内大臣噶爾瑪散秩大臣沙哩岱等並賜莊田奴僕康熙三年三月擢内大臣六年七月卒賜祭葬如例以其子根敦扎布襲色爾格克色爾格克䝉古正白旗人姓博爾濟吉特先世居喀喇徹哩克部父阿拜岱巴圖魯天聰時率衆來歸予三等輕車都尉世職既卒色爾格克襲屢從征伐授一等侍衛崇徳元年隨豫親王多鐸圍朝鮮國都國王李倧遁南漢山城移師攻之色爾格克奮勇登山身中重創賞馬三匹五年隨鄭親王濟爾哈朗等征明圍錦州色爾格克率侍衛二十人直前摶戰有歸明䝉古僧格依者素稱驍将色爾格克擊斬之鄭親王遣啟心郎額爾赫圖奏其功明年大兵圍錦州令色爾格克選驍勇前鋒兵四十人伏荒地生擒明将一員王貝勒等嘉其勇敢以所獲鎧甲器械全給之既而明總督洪承疇自松山來援上命貝勒大臣設伏髙橋色爾格克獨斬敵兵七人賞馬二匹復先衆擊敗松山敵騎我兵鑿壕圍困松山城明兵來犯漢軍所守壕塹色爾格克率䕶軍三十人應援擊退敵衆七年冬隨饒餘貝勒阿巴泰征明越燕京攻臨城縣進征山東攻青州府俱力戰中創順治二年敘錦州松山戰功晉世職二等輕車都尉六年追敘阿拜岱巴圖魯前此率衆來歸舊勲分授其諸子各世職色爾格克晉爵二等男七年九年三遇恩詔晉一等男加一雲騎尉尋裁恩詔所加爵職仍改二等男擢任内大臣聖祖仁皇帝康熈十二年五月諭奬久著勞績諸大臣加色爾格克太子少保二十年十月卒賜祭葬如典禮諡勤敏孫錫扎保襲徳穆圖弟齊墨克圖徳穆圖䝉古正白旗人姓博爾濟吉特父武訥格積功授三等公既卒以第三子廣泰襲徳穆圖初任佐領太宗文皇帝崇徳三年正月擢户部承政七月更定官制改右叅政四年二月上親征明松山樹雲梯攻城明兵自錦州赴援徳穆圖見明兵至度不能克敵棄梯而還論死得㫖從寛罰贖尋兼任副都統六年隨鄭親王濟爾哈朗等圍明錦州有守郛之䝉古貝勒諾木齊等約降鄭親王令徳穆圖迎之㑹諾木齊率衆䝉古與明兵戰徳穆圖擕諾木齊之子阿桑喜出大兵既克郛諾木齊始來歸師還以徳穆圖曽詭言諾木齊父子俱為所擕出論鞭百罰贖籍家産半革叅政及副都統任専管佐領事七年十月隨貝勒阿巴泰征明自薊州入邊薄燕京至山東明年六月凱旋得優賚順治元年隨大軍入山海闗破流賊李自成追擊至望都敘功授騎都尉世職二年隨豫親王多鐸擊敗自成兵於潼闗平定河南江南敗明将鄭鴻逵於瓜洲又同都統瑪喇希徇常州與明将黄蜚等戰再敗其衆隨分兵攻宜興崑山等縣並克之敘功加一雲騎尉復任本旗䝉古副都統三遇恩詔晉一等輕車都尉世職九年卒子霍達襲齊墨克圖者徳穆圖仲弟也早嵗屢從行陣崇徳三年同􅄁領沙爾琥達等率䝉古四十人畧寧遠界至紅山口遇明兵百人逐之斬其禆將二人而還是年弟廣泰隨豫親王多鐸征明坐違令不前削公爵明年六月命齊墨克圖降襲一等男七月同沙爾琥達等率哨卒至錦州敵兵五百來追還擊敗之獲馬六十及其大纛一大兵三圍錦州齊墨克圖皆在軍中累著功績初圍錦州時敵出城搏戰齊墨克圖控騎截擊陣斬十人後攻明總督洪承疇步兵三營同恭領武拜奮勇掩殺遇敵騎來援復撃敗之八年三月同䕶軍統領阿爾津哈寧阿等往征黒龍江圍都里屯克之又招降大噶爾達蘇小噶爾達蘇及能吉爾三屯俘獲無筭師旋賜貂皮銀幣十一月擢本旗䝉古副都統順治二年以從大兵入闗破流賊功加一騎都尉并為三等子三年隨定西大將軍和洛輝征陜西賊賀珍遣兵破賊黨劉文炳於蒲城賀珍遁奔武功追擊之斬獲甚衆五年四月卒詔以其子薩哈納襲騎都尉世職仍以廣泰襲一等男爵克什圖克什圖䝉古正白旗人姓博爾濟吉特康熈十三年從征福建十六年海賊分犯漳州克什圖隨大軍至江東橋進擊大敗賊衆二十年從将軍賚塔由廣西進𠞰逆孽吳世璠賊将何繼祖等糾衆萬餘據石門坎隘口克什圖步擊之繼祖等退據黄草壩克什圖當先奮戰賊大敗又敗賊将胡國秉劉起龍黄明等於歸化寺二十三年補驍騎校二十五年敘功授雲騎尉世職三十一年駐防江寧三十四年還京授三等侍衛三十六年遷二等侍衛三十八年補察哈爾逰牧總管四十年七月因逃人私入圍場解總管任十一月授三等侍衛四十二年奉命使凖噶爾還以多騎喀爾喀馬革職五十四年補藍翎侍衛時凖噶爾台吉策妄阿喇布坦侵哈宻大兵將進討命克什圖偕原任員外郎保住分路齎勅往諭五十五年三月還上召詢情形諭議政大臣曰策妄阿喇布坦乃巨猾奸詭之人甚屬無恥以朕之使臣非使臣諭㫖係部文奏請另遣賢能大員克什圖等出使策妄阿喇布坦處已經數次著仍前往頒示諭㫖書諭㫖時令克什圖面看繕冩此番使臣到策妄阿喇布坦處得其確實情形大兵即可前進四月克什圖復偕保住使凖噶爾授二等侍衛並命復雲騎尉世職五十九年五月從靖逆将軍富寧安由烏爾圖進兵至烏蘭烏蘇口偵賊伏伊勒布爾和碩克什圖率輕騎夜襲之賊以我兵掩至登山藏樹石間發火器抵拒克什圖麾兵亟擊殺賊三十餘擒賊首垂木拍爾十月授副都統六十年六月回人托克托瑪穆特等來降詔偕侍衛阿玉錫領察哈爾兵千駐吐魯番納降八月策妄阿喇布坦遣衆來犯克什圖自出擊而令散秩大臣阿喇納尾已後夾擊追入林中擒斬甚衆六十一年命管理吐魯畨等處屯田雍正二年奉㫖克什圖年老著都統穆森同轄屯田兵四年還京授散秩大臣五年正月授䕶軍統領署鑲黄旗䝉古都統四月擢領侍衛内大臣兼議政大臣尋奉命與俄羅斯定界六年總管北路軍臺七年諭曰克什圖征勦雲南時頗著勤勞今大臣中與伊相似者甚少復於軍前衝鋒䧟陣得有傷痕且屢次出使凖噶爾又於䝉古地方効力􅅷著勞績著加授騎都尉世職九年命往青海與郡王額爾徳尼額爾克托克托鼐等選兵防禦凖噶爾是年卒賜祭葬如例諡勤恪子阿蘭泰襲職官至都統阿必達阿必達䝉古正白旗人姓阿拉克竒特康熈十五年以䕶軍隨貝子傅喇塔𠞰逆藩耿精忠黨曽養性於温州生擒偽守備張泗十六年海賊何祜據泉州都統喇哈達選徤卒進攻阿必達先登拔之得巴圖魯號尋授䕶軍校二十年署䕶軍㕘領隨将軍賚塔往定雲南撃賊於石門坎黄草壩武功山桂花寺均有功凱旋賜雲騎尉世職三十二年授䕶軍恭領三十五年隨大将軍費揚古由西路𠞰噶爾丹至昭莫多大敗賊衆諭部優敘加一雲騎尉併世職為騎都尉四十七年以失察䕶軍普受叩閽革職發黒龍江五十二年赦還京五十六年大軍𠞰策妄阿喇布坦阿必達請自備鞍馬赴阿爾台軍營効力署叅領雍正五年奉㫖八旗内曽經躍城之巴圖魯人等無論己未得官或告退革退人員凡有本身現在者查明具奏部臣引見諭曰阿必達著授副都統食全俸入年老大臣班内行走給還所得騎都尉並賜銀五百兩十二年復賜銀千兩優奬之乾隆元年卒賜祭葬如例其騎都尉世職子阿蘭岱襲卒弟盛保襲卒停襲拉錫拉錫䝉古正白旗人姓圖伯特康熈三十年由親軍授藍翎侍衛三十七年遷三等侍衛四十二年遷二等侍衛四十三年四月命同内閣侍讀舒蘭往窮河源九月還京復命繪圖以奏語具舒蘭𫝊四十九年正月諭大學士修滿洲䝉古合璧清文鑑以拉錫與教習唐古特書之䝉古官阿爾必特祜等㑹同繙譯五十三年遷一等侍衛六十一年十一月世宗憲皇帝御極命署理藩院侍郎旋授鑲白旗漢軍副都統又擢正白旗䝉古都統雍正元年八月授散秩大臣時喀喇沁䝉古部落嵗歉拉錫請行察乏食人數得㫖據奏俟查覆加賑則現今乏食人必致失所其令户部派員齎銀五萬兩前往一面清查一面給發毋得稽遲十月調本旗滿洲都統仍管理藩院十一月諭王大臣曰拉錫任正白旗滿洲都統未及一月即将本旗事件徹底清查明晰具奏著賞給騎都尉世職以為盡心辦事者勸二年二月奏言八旗閒散人䝉恩㫖挑取養育兵前臣等㑹議計甲喇人數挑取今正白旗滿洲各甲喇應行挑取者多寡不等請無拘甲喇通計一旗挑取如額庶皆允當行㫖所奏甚是可通行八旗均照此辦理六月奏言察哈爾右翼四旗屢失去馬匹請敕所司嚴捕竊匪下理藩院議行七月授議政大臣八月劾奏二等侍衛武爾登額越分妄用引馬上曰所奏甚屬可嘉凡為大臣者悉宜如此留心整飭豈可謂妄訐細事耶先是諭八旗都統曰朕前降㫖請釐八旗拖欠庫銀遲之既久爾等並未具奏惟拉錫甫任都統兩月所奏甚詳朕但令一二人償還其餘盡行寛免拉錫誠能仰體朕心者所賞世職尚未從優也至是命以騎都尉兼一雲騎尉三年四月兼管太僕寺四年八月以隠匿烏梁海事不奏吏部議革職治罪得㫖拉錫将烏梁海之事有心隠匿情殊可惡但伊辦理旗務亦有効力處從寛免治罪其議政大臣散秩大臣都統兼管理藩院及賞給世職俱革退以一等侍衛管太僕寺卿事効力行走五年五月授鑲白旗滿洲都統十月署江寧将軍六年十二月署天津滿洲水師營都統七年四月疏言水師營官兵俸糧毎嵗從北倉新厫逐月運送往返紛繁請於水師營堡城内西北隅蓋造厫房二座将運往薊州遵化漕米截留三萬石備貯二年之需俟支放一年外毎年截留一萬五千石易陳支放並設倉大使一員專司出入部議從之九年八月授領侍衛内大臣署正白旗滿洲都統十一年十二月卒阿蘭泰阿蘭泰䝉古正白旗人姓博爾濟吉特父克什圖官領侍衛内大臣有𫝊康熈五十五年阿蘭泰襲雲騎尉世職五十九年授藍翎侍衛累遷二等侍衛雍正九年襲其父所晉騎都尉十二年五月授頭等侍衛八月授滿洲正黄旗副都統乾隆四年命赴塔宻爾軍營辦事六年還京調滿洲鑲白旗副都統十年遷䝉古鑲藍旗都統十二年擢寧古塔将軍疏言永吉一州駐吉林烏拉係寧古塔地方向隸奉天府一切旗民事務由彼轉咨不但稽延時日且辦理掣肘諸多未便請改設理事同知隸寧古塔将軍轄從之十三年四月調盛京将軍七月疏言船厰旗民命盜案件現歸理事同知辦理将軍衙門舊設理刑司主事及筆帖式二員應裁但繙譯往來文移不可無人請留筆帖式一部議如所請十四年遵㫖酌議䕶送朝鮮貢使章程奏言向例貢使至邊鳯凰城城守尉㸃進闗門交䕶行官兵看守沿途俱有館舍後因館舍不敷聴租住村荘恐人多滋事請嗣後貢使入闗貨物行李同行按站派官一員兵二十䕶送遞将次日宿處報知前途地方官代備店舍投宿後䕶行官兵看守巡邏倘内地不肖之徒與入貢人役生事拏交地方官究治如地方官預備不周許䕶行迎送通官掲報府尹迎送通官約束不嚴許䕶行官掲報禮部䕶行官看守不嚴許迎送通官掲報将軍如迎送通官任貢使騷擾及䕶行官縱容兵丁許地方官掲報該上司均照例議處下部議行十六年奉天府尹圖爾泰奏義州倉豆積年霉變請減價平糶諭阿蘭泰等嵗撥近海州縣餘豆一二萬石及現議裁馬羣應支之豆一併運貯通州備京師平糶阿蘭泰因奏言錦寧廣義四州縣附近海口除民地項下之豆照舊存貯其退地項下毎年支剰豆萬七千餘石應儘數運交豐年再照時價購一二萬石搭運運船由天津官僱來奉天臣等委員弁擕斛運至天津兌収轉交通倉部議從之十八年疏言我皇上軫念奉天兵丁生計特設滋生銀兩許隨時借給現在兵丁倒斃馬例應買補而所得錢糧僅供食用請將滋生銀内借給半年錢糧令買補分年扣還官員有需用者亦請一體酌借議如所請十九年還京軍機處行走尋命赴北路軍營授叅贊大臣諭㑹同喀爾喀扎薩克等選馬備用毋傷生計二十年二月大軍進𠞰達瓦齊阿蘭泰偕額駙色布騰巴勒珠爾等統哨探兵前進六月達瓦齊就擒凱旋敘功晉男爵命留烏里雅蘇台辦事八月輝特降酋阿睦爾撒納叛潜遣心腹人赴扎卜堪取其孥至則阿蘭泰已遵宻㫖往收盡執之遷其户畜於塔宻爾㑹包沁總管阿克珠勒等竄附阿睦爾撒納阿蘭泰遣總管鄂博什以索倫兵五百馳追並分截各隘口阿克珠勒就擒上奬其辦理合宜九月再授叅贊大臣隨定邊左副将軍達勒黨阿追𠞰阿睦爾撒納尋命仍留烏里雅蘇台辦事二十一年二月杜爾伯特降酋訥黙庫謀叛戕守汛侍衛䕶軍統領舒明偵得狀馳以聞諭阿蘭泰速往擒阿蘭泰請調兵防䕶並遣人往詢訥黙庫同部台吉策凌得㫖訓飭三月奏訥黙庫就擒諭曰此事係舒明籌辦甚屬妥協阿蘭泰一味推諉若照伊所奏辦理必至遲悞著将阿蘭泰男爵革去即賞給舒明以示鼓勵尋命偕舒明往駐布延圖七月移駐納米爾沙扎海八月仍授叅贊大臣隨定邊左副将軍成衮扎布追擒和托輝特叛賊青滚雜卜十二月隨成衮扎布在烏里雅蘇台辦事二十三年還京授漢軍鑲黄旗副都統二十四年遷歸化城都統二十五年卒賜銀五百兩治喪子法里哈降襲雲騎尉憲徳憲徳䝉古正白旗人姓西嚕特祖明安達哩官至吏部尚書有𫝊父花善官頭等侍衛康熙五十七年憲徳由廕生授理藩院主事尋遷刑部員外郎雍正二年遷郎中四年二月授湖北按察使四月奏臣抵任有原任布政使張聖弼來謁查係虧空革職擬斬監追之犯臣牌行武昌府立拿監禁諭奬其秉公執法十月擢巡撫五年三月請於漢口鎮増設巡檢一分巡居仁由義二坊以循禮大智二坊隸舊巡檢轄部議從之先是四川夔州府知府程如絲自販私鹽而捕楚民之販私者鎗斃甚衆川陜總督年羮堯劾之適四川巡撫蔡珽威逼重慶府知府蔣興仁自盡被劾至京召見陳寃抑且力保如絲為四川第一好官事下甘肅巡撫石文焯文焯亦言其寃如絲遂免逮擢四川按察使至是年羮堯敗上閲其黨汪景祺逆書備載如絲貪殘不法珽受如絲重賄及文焯妄斷狀於是命侍郎黄炳赴川覆案其事且諭憲徳将楚民被害者查帶往鞫已而鞫寔如絲珽擬斬决文焯永停給俸憲徳尋調四川巡撫疏言川省驛鹽茶三項向皆臬司兼管稽核未周請増設驛鹽道専司其事詔如所請尋請設鹽茶大使從之九月疏言成都府灌縣都江堰口廟祀秦蜀守李氷之子二郎相𫝊父子鑿山穿江溉田至今民享其利請賜封號疏下部議封李氷敷澤興濟通祐王二郎承績廣恵顯英王十一月奏各屬増設裁改事宜一復設成都府之華陽縣増知縣教諭訓導典史各一裁府屬之税課大使一改資縣為資州轄仁夀資陽井研内江四縣裁原設之典史改綿州為直隸州轄徳陽安縣綿竹梓潼四縣改茂州為直隸州轄汶川保縣二縣及各土司裁威州併入保縣一馬湖府應裁所屬屏山縣歸叙州府通判移駐馬湖舊治轄雷波等各土司部議如所請是月奏程如絲在監自縊上嚴飭之六年正月疏言上年程如絲斬决部文到在十二月十九日而京報小鈔前五日已到洩漏寔由於此請将各省提塘通行裁革上以提塘之設由來已久未便遽革諭九卿確議尋議提塘多係微末職銜承充且無保送不實處分請令各督撫於本省武進士及候補候選人員内揀選咨部頂補地方官出結有犯分别議處又奏安置入川人户事宜一人户衆多該管官挨查取結編入保甲一户口姓名人數移查各原籍犯事故者逐回餘酌撥地畝令墾一願回籍者不必給口糧将姓名人數咨明本籍川省仍造冊存案再至者懲之一川省無著地畝現在清丈事畢應分科則編字號計留川人户之數按畝均分認墾三月又請留川人户以一夫一婦為一户給水田三十畝或旱地五十畝兄弟子姪成丁者丁給水田十五畝或旱地二十五畝一户内老㓜丁多不敷養贍者臨時酌増俱給照粟並牛種口糧分年陞科均如所請行七月疏言夔州闗税向委知府監収請照滸墅淮闗例差監督一員徴課按年輪替十一月請改成都府同知為管糧水利同知經理都江以下各堰工並從之尋請令清查地畝之員搜查鹽茶積弊諭曰川省鹽茶二項既經特設道員專司其事自應責成該道令其公誠督察期於清楚倘不能勝任即屬溺職當予恭黜另用賢員今乃言該道亦茫無端委則設立専官何為耶至於差往科道京員係為清理地畝以息豪强之争奪兼安插流民使之得所儘足辦理矣若又將鹽茶等事交予經營便寛予限期豈如該道之久在川省可比稽查過急必致騷擾民間滋生事故脱有遺漏將来反得推缷且據汝奏内搜查挨查之說更屬謬妄鹽茶積弊相沿已乆自應商酌從容清理之法安可如此嚴急從事觀汝一切料理處過急而欠變通只圖已身免咎而已不肯擔承利害實心任事於此一奏心行畢見非朕委信之意也嗣後當深以為戒十二月奏於達州拿獲年羮堯案内要犯净一道人得㫖議叙加一級七年正月奏天全土司改流等事一天全改為州設知州吏目各一駐碉門州同分駐始陽一天全州應𨽻府轄請陞雅州為府設知府經厯各一增置附郭一縣設知縣典史各一即以新置之一州一縣及名山榮經蘆山三縣歸府轄從之尋定雅州附郭縣曰雅安十月疏言川省州縣先因地廣事簡將雙流等縣裁併今生聚日繁請復其舊成都府復設雙流崇寧彭縣三縣綿州復設彰明羅江二縣重慶府復設大足壁山定縣三縣夔州府復設大寧新寧二縣潼川州復設安岳縣眉州復設彭山青神二縣嘉定州復設威寧縣設知縣訓導典史各一裁羅江驛驛丞驛務歸知縣管理裁打箭爐沿村二驛驛丞驛務歸雅州同知及瀘定橋巡檢管理十二月疏言黎大所地方為西南孔道漢夷雜處請裁原設之千總改置一縣𨽻雅州府轄設知縣典史各一以典史分駐泥頭又建昌之寧畨衛已改為冕寧縣應裁去冕山所千總部議從之尋定黎大所新設縣曰清溪八年正月請於新設寧逺府漢境内擇大村堡照義學例建學舎延塾師令熟畨子弟來學俟學業有成徃教生畨子弟如所請行四月署川陜總督查郎阿奏言川省墊江忠州等屬奸民楊成勲等造妖謠吹螺嘯聚事覺成勲自縊獲其黨陳文魁楊成禄等訴狀怨白等稿内列丈量田地科派需索累民等事有禍寃起於戊申年奉㫖清丈民田及上憲愛民如子察寃如神之語諭曰四川清丈之舉始於馬㑹伯之奏朕惟恐不便於民諭令憲徳悉心酌議以定行止隨據憲徳奏稱蜀省昔年以來人民稀少田地在在荒蕪及至底定歸復祖業者從來未經勘丈是以多所隠匿迨歴年既久人丁繁衍姦猾之徒欺其界畔無據遂相争搆訟今應明白曉諭令将所管田畝分立地界各執本名立户載入版籍每年納糧俱以串票為據如此則侵隠欺奪之患可以悉除又川省詞訟為田土者十居七八大率為界址不清亦非勘丈無以判其曲直憲徳之奏如此朕又詢問岳鍾琪據奏與憲徳之言相同隨交九卿㑹議九卿亦以應當舉行合詞覆奏朕於是慎選科臣髙維新等前往辦理伊等陛辭之日諄切訓誨務期剔除積弊安插善良並非為加増賦稅起見又復頒發諭㫖百姓果有寃抑下情准其十數人同到督撫及欽差官員衙門控告為之秉公審理此從前遣官清丈之始末也其勘丈造册等費俱令動支帑金各官供應等項俱令從公支給不使㡬微煩擾閭閻上年冬月丈量之事將竣朕又念各屬徵糧科則輕重懸殊其田土肥瘠不等則賦税自難畫一又復降㫖凡隠瞞科則等處止據實按則更定至於額糧稍重之州縣即比照就近適中地方之科則令其核減以紓民力今年正月憲徳以清丈事竣具本代達川民謝恩之詞稱通省士民咸稱清理疆界使强無兼并弱無屈抑又荷鴻慈將田不敷糧之户悉予開除疆界既已分明額賦尤為公溥等語朕亦以為經理得宜豈意奸民嘯聚竟引清丈苛虐為言怨白中公然寫為奉㫖清丈豈非該撫憲徳等但以清丈之事稱為奉㫖於已身奏請之處並未曉諭於衆耶陳文魁訴狀内稱上憲愛民如子察寃如神伊既稱頌川省上司是必憲徳等有沽譽於民之道何不將朕之徳意廣為宣播而乃朦混含糊使奸民得以藉口耶憲徳既稱通省士民懽呼感戴何以尚有陳文魁楊成禄此等匪類暗結邪黨肆行誹謗可見平日地方大吏化導之未周董戒之不力則深山竆谷安保無惑於妖言而妄為邪議者乎清丈一事既曽奉㫖朕豈肯推卸於臣工但其舉行之由始於該撫陳奏而非朕本意朕不肯推卸於臣工臣工又安可推卸於朕耶數年來朕以此事時為厪念昨據合省謝恩之奏而論似於地方有益其功亦憲徳之功若果如奸民所言則該撫失於覺察咎有所歸朕在九重之上萬里之外安能代為之謀耶著憲徳將朕此㫖刋布曉諭務令逺鄉僻壤共知之十一月請改成都府屬之松潘衛歸龍安府轄又請復設川北道駐保寧府九年二月又請將平武縣之關家村石子村檢石壩紅豆樹等處歸江油縣轄擂鼓坪鄧家渡等處歸石泉縣轄青蓮壩五郎溝等處歸彰明縣轄彰明與龍安府附近請即改𨽻龍安並如所請先是建昌總兵趙儒奏請於㑹川寧番等處開採鉛砂事下憲徳議行十年三月紫古哵厰商民為兒斯堡生番所殺憲徳言礦厰八處其獲砂多者請仍開採少者封閉以杜釁端諭曰從前趙儒奏請開採彼時朕即不然此舉詳詢憲徳回奏極言有利無害是以交部議行乃兩年以來並無成效徒滋煩擾當日奏請是何意見憲徳著交部察議所開礦厰概行封閉尋議降一級調用行㫖從寛留任十一年正月諭曰川省為産米之鄉歴來聴商賈販運從長江至楚以濟隣省之用雍正九年巡撫憲徳以川省米價稍昻又復碾辦軍需奏請暫禁商販此不過一時䙮宜之計至雍正十年川省收成豐稔米價平减憲徳即當奏請開禁乃至今照前禁遏以致米價不能流通楚省不得川省之益甚非大臣公平辦事之道況今江浙有需米之州縣望濟於楚省而該撫不令川米赴楚則隣省何以資賴著即傳諭憲徳速弛米禁毋蹈遏糴之戒五月請移保寧府同知駐南部縣鑄給茶鹽同知闗防又墊江縣新設縣丞移駐高灘場梁山縣縣丞移駐沙河舖從之八月奏鹽道曺源邠混發引目累商諭曰凡一省中鹽課引務莫非汝等督率之責果曹源邠著有貪婪不法形跡即當列欵糾叅若正改撥不當汝等何難商酌合宜而更正之今但云不敢隠蔽祈朕勅部察議竟將鹺政視如無涉然不知是何意見覽奏朕甚鄙汝等有玷督撫統轄訓飭之任也十二月台來京尋授工部尚書十二年六月兼議政大臣七月調刑部尚書仍兼工部尚書事署滿洲正紅旗都統乾隆元年命赴泰陵督辦工程二年疏劾承辦工程之工部郎中宏通在易私赴鄚州又藉覔料估之人來京日久未歸曠官廢職請交部嚴議尋議革宏通職憲徳失察降一級留任五年卒子夢麟官工部侍郎别有傳欽定八旗通志卷一百八十六
