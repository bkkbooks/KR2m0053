body:
  text: 選舉志二八旗科第二八旗繙譯科武科縁起順治八年定考試繙譯之考官於初九日入貢院出題考試滿洲舉人止考一場十四年停止繙譯考試康熙四十八年兵部議嗣後八旗漢軍包衣無品級筆帖式庫使由官學生補授之外郎閒散人等有願考試武生者該旗開列姓名移送順天府照例考取武生八十名鄉試時將所取武生并中書及部院衙門筆帖式不論上朝未上朝廕生監生以及監生之披甲䕶軍領催拜唐阿有願應武鄉試者該旗開列姓名移送順天府與武生一體鄉試取中武舉四十名如不中式者仍令當差㑹試取中武進士八名俱照文塲格式另編合字號考取奉㫖依議雍正元年總理事務王大臣奉上諭八旗滿洲等除照常考試漢字秀才舉人進士外在滿洲等繙譯武藝亦俱属𦂳要應將滿洲另繙滿文考試秀才舉人進士武秀才舉人進士之處爾等㑹同該部作何考試額數多少等處定議具奏㝷議覆嗣後八旗滿洲等亦照漢軍考取武秀才舉人進士之例秀才取四十名舉人取二十名進士取四名外塲停其舞刀掇石俱令射馬步箭有能拉勁弓馬上熟練様式好者令其入内塲另編滿字號照漢軍例考試其殿試亦照此例是年禮部遵㫖議定滿洲蒙古能繙譯者三年之内考取秀才二次舉人一次進士一次鄉試㑹試另立一場於子午夘酉年二月鄉試辰戊丑未年八月㑹試又覆准繙譯考試新奉特㫖惟恐學習之人尚少應於本年十月考取秀才一次其鄉試於雍正二年十一月舉行㑹試於雍正三年二月舉行殿試於三月舉行又定繙譯鄉試應考之人不拘滿漢字貢監生員及現任筆帖式能繙譯者俱照例考試馬步箭咨送入場其現在文舉人能繙譯者亦准與繙譯㑹試二年定繙譯應試士子有滿漢字貢監生員及現任筆帖式其書寫卷面漢字生員應書寫順天府儒學八旗貢監併繙譯生員卷面俱書寫禮部現任筆帖式卷面俱書寫各該衙門四年定繙譯鄉試增添漢軍又定繙譯鄉試照順天鄉試例於初九日頭場十二日二場十五日三場是年又奉㫖考試繙譯舉人即作三場考試亦無非繙譯作一次考好一日一夜量其所能奏章一道或四書或五經酌量出一題目考試其優劣便可見這考試並不做漢文字不必派漢大臣再考試舉子俱係八旗内人其繙譯好者衆所共知即字跡亦最易認伊等試卷應行謄録著六部各衙門繕書之筆帖式内酌量足用選取令其謄寫其堪中式之卷挑選呈覽時再行定其額數仍選備卷呈覽分房及看守巡察官員俱照文鄉試例派用舅舅隆科多㑹同禮部確議具奏又奏准本年十一月鄉試取中繙譯舉人九名並文舉人願就繙譯㑹試者據各該旗册送到部通共二十八名人數甚少或照原題於雍正三年二月㑹試或俟取中舉人及情願入繙譯㑹試之文舉人至五十名再行㑹試奉㫖六十名會試七年九月都察院左副都御史管理順天府尹事陳良弼奏查本年十月初七等日武闈鄉試所有一切應行事宜臣現在照例舉行苐查武場條例内開直𨽻各省緑旗營兵有通曉文義願應武鄉試者在充伍地方令該營將弁申送巡撫同武生一體鄉試而八旗滿洲䝉古漢軍例内止開將所取武生併中書及部院衙門筆帖式不論上朝未上朝廕生監生以及監生之披甲䕶軍領催拜唐阿有願應武鄉試者該旗亦開列姓名移送順天府與武生一體鄉試等語並無副驍騎校前鋒馬兵准入鄉試之條是以從前均未收試現今各旗將副驍騎校前鋒馬兵人等願就鄉試者紛紛咨送前來臣仰體皇上愛惜人材至意請將八旗副驍騎校前鋒馬兵人等可否亦照䕶軍營兵鄉試之例准其一體應試隆恩出自聖裁奉㫖䕶軍校前鋒准其入場驍騎校馬兵亦准其入場九年奉上諭看來蒙古旗下人能䝉古話及能以䝉古字繙譯者甚少如是相沿日久蒙古文字并䝉古話必漸至廢棄宜令蒙古旗下人亦照考試滿洲繙譯生員舉人進士之例考取䝉古繙譯生員舉人進士在理藩院補用如有讀習漢書情願考試文生員舉人進士者令照常考試著在别部院補用如此則䝉古旗下人俱各奮發勤學蒙古文字並䝉古話不至廢棄而理藩院亦收得人之效著大學士㑹同理藩院議奏又定八旗䝉古人等能繙譯滿洲蒙古文字者照考試滿洲繙譯之例一體考試又遵㫖議准八旗䝉古人等能繙譯滿洲䝉古文字者照考試滿洲繙譯之例三年之内考取秀才二次舉人一次進士一次鄉㑹試與滿洲繙譯合為一場考取秀才於本年十月舉行鄉㑹試於考試滿洲繙譯一同舉行十年停止滿洲蒙古武科十二年四月奉上諭朕御極以來於滿漢人材廣開登進之路兾收得人之效是以雍正元年定有滿洲亦准考試武場之例今已行之十年未見有宜用綠旗之材况滿洲弓馬技勇逺勝於漢人將來行之日久必至科場前列悉為滿洲之所佔而滿洲文藝不及漢人又恐考試内場時不免有傳遞代作等弊似於作養人材之道未有禆益著行停止乾隆二年奏准本年八月舉行恩科繙譯鄉試明年二月再舉行正科繙譯鄉試乾隆三年題准繙譯鄉試已厯六科現在繙譯舉人約有百餘名又原議文舉人能繙譯者亦准入場合之繙譯舉人人數實係衆多應於乾隆己未年八月舉行繙譯㑹試其㑹試事宜俱照題定則例辦理四年二月奉上諭朕從前降㫖將代賠祖父虧空已奉恩免人等停選者停補者俱准歸入伊等班次銓用其應賠祖父革職之員亦准一體開復今朕念旗人有因代賠祖父虧空者力不能完治以枷責之罪此等人員與本身虧空及縁事枷責者究属有間概行擯棄情亦可憫伊等如願考試著該旗查明除原案内載有不准考試字様外俱准一體考試俾各奮勉自新以昭朕格外加恩之至意是年八月禮部奏准恭譯諭㫖除本身虧空及縁事枷責並原案内載有不准考試字様者俱應遵照不准考試外查代賠祖父虧空人等其中有已出仕及進士舉人貢監生員之不同而力不能完治以枷責之罪者原因虧空獲譴與奉恩豁免未經治罪者有間若不將應行准考之人與何項考試之處分晰奏明恐八旗辦理未能畫一而舉貢生員等或因諭㫖有考試字様妄兾開復以應鄉㑹試致啟僥倖之端臣等伏思已經出仕之人與夫進士之歸班候選舉人之挑選註册以及貢監之捐有職銜者從前既奉恩㫖吏部分别辦理已多准予開復需次銓用之人惟其中有力不能完治以枷責之罪者原不便與奉恩豁免人等同邀開復皇上格外加恩准其考試要令進身有階不致終身擯棄似非謂已革之舉人仍得以舉人應㑹試已革之貢監生員仍得以貢監生員應鄉試也臣等酌議旗人有因祖父虧空力不能完治以枷責之罪除查係閑散人等應准其照例考試外其已經出仕及進士舉人貢監生員等如願考試者俱照閑散人等准其一體考童子試並與旗下繙譯等項考試以圖上進但不得借考試之端希圖開復如查係曾經發遣並入辛者庫赦回其罪原不止於枷責者其本身應仍不准考試以杜冐濫五年奏准查向例遇有子午卯酉年二月舉行繙譯鄉試其科考繙譯童生多在前期十一月十二月間但今年因有閏月現在天氣寒冷難於書寫將繙譯科考移於明年二月内其繙譯鄉試移於明年三月内次第舉行七年七月大學士伯鄂爾泰奏准繙譯㑹試即於文闈㑹試時另編字號令其一同考試應請分為兩場其頭場人衆不必㸃進於二場三場㸃進九年三月具奏八旗新進繙譯生員因繙譯鄉試場期甚廹不及與舊案生員一同考試馬步箭可否令其一體應試之處請㫖奉㫖著下次再行考試十一年大學士果毅公訥親等議覆侍郎徳齡等奏稱繙譯生員照文生員之例分别考試列為六等以示勸懲督課繙譯生員等亦請照文生員之例設立滿洲教官等語查本年閏三月内御史岱圖條奏八旗繙譯童生亦照文生之例於進場之前由該旗考試一次通順者准其入場考試經臣等議准在案是考試繙譯之生員以前既由該旗先將童生考試一次始准入場而進學之後鄉試時今又定例科考三等以上者准其鄉試其又添嵗考另設滿教官督課之處均毋庸議是年十一月禮部奏准查雍正元年科場條例内開繙譯鄉試應考之人不拘滿漢字貢監生員并現任筆帖式能繙譯者俱照例考試馬步箭咨送入場等語雍正七年奉上諭凡由舉人考試補用筆帖式者俱准其與舉人一體㑹試其由貢監考試補用筆帖式者亦准其考試繙譯舉人時一同考試皆所以廣育人才使之各有所成就也至於由貢監生員考取小京官筆帖式之員其中未必無通曉舉業文藝者若因其已經得官遂不得與於鄉試則彼平日之所學莫由表見亦属可惜著通行八旗凡由貢監生員之考取小京官筆帖式者若願就鄉試俱准其與舉子等一同入塲考試使片善寸長不致遺棄以副國家教養人材之典欽此是筆帖式必由貢監生員出身者始准繙譯鄉試雍正七年所奉諭㫖甚明縁元年條例内有現任筆帖式能繙譯者俱准入場之語是以厯科以來即不由貢監出身之七八品筆帖式小京官及九品筆帖式亦援照現任之例據該旗造送一體應試相沿日久漫無分别臣等伏思鄉試大典若不詳細辦理甚非慎重科場之意查九品筆帖式祗應考生員若竟准其鄉試殊属躐等應請嗣後九品筆帖式俟考取生員後再准鄉試至七八品筆帖式小京官不由貢監出身者其中不無留心滿漢文藝繙譯明通之員既已應考多年今若停其鄉試則伊等限於品級又不得降等考試生員平日所學莫由表見誠為可惜臣等詳譯雍正七年諭㫖原為振興文學廣育人才起見請嗣後不由貢監生員出身之現任七八品筆帖式小京官有能繙譯者仍照雍正元年定例准其繙譯鄉試又是年十二月大學士果毅公訥親等議覆侍郎徳齡等奏稱皇上軫念清話清文為我朝根本照考文生員之例考試繙譯生員舉人進士今滿洲等俱各奮勉學習陸續取中繙譯生員舉人甚多但舉人係即補放官員之人用在部院辦事供職無暇肄業至生員並無應辦之事正可學習若不定以考課之例則所學日漸廢棄請嗣後取中繙譯生員照文生員例交與欽㸃考試繙譯生員之大臣於考試生員之前分别考試列為六等以示勸懲繙譯鄉試之年亦照文鄉試錄送之例將舊有繙譯生員交與欽㸃考試繙譯生員之大臣於考試繙譯生員之前分别考試列在三等以上者准其鄉試其餘不准鄉試再繙譯生員平日約束教𨗳不可無官亦請照文生員之例設立滿洲教官再八旗䝉古人等亦䝉皇上一視同仁准其考試䝉古繙譯生員舉人所有陸續考取䝉古生員考課董率亦請一併議奏等語查設立繙譯科原為鼓舞滿洲令諸生專意學習國語考取時必取真才然後未得考取之人方知奮勉勤學而繙譯書史亦能發揮清文精粹義理若僅照現行之例並不分别查考由該旗一概送考而主考大臣又計考試人數之多寡視其文理略通者將就取中以致多寡不符是以二十餘年考過九次殊少優等應定考試之例求取真才令生員分别考試三等以上者准其鄉試其餘不准鄉試應如所奏交與禮部嗣後繙譯科考時將舊有繙譯生員預先查明造册咨送欽㸃考試繙譯生員之大臣於考試生員之前定期入場分别考試列在一二三等者准其鄉試其餘不准鄉試䝉古生員亦照此例辦理十三年大學士伯張廷玉等議准查繙譯考試從前並未定有額數是以厯科童生及鄉試㑹試中式舉人進士多寡未免不均今奉諭㫖飭令臣等酌定額數使考官得以遵循辦理不致有多寡不均仰見皇上慎重科名之至意臣等伏查厯年嵗科應考滿洲繙譯童生約計八九百名及一千二三百名不等取進生員或四五十名或八九十名不等通計十一二名取進一名亦有二十三四名取進一名應考䝉古繙譯童生約八九十名及一百一二十名不等取進生員或八九名或十三四名不等通計有五六名取進一名亦有十名取進一名各在案查滿洲䝉古漢軍每次應考文童者約計八九百名額進九十名在考試雖事同一例然繙譯較之時藝似属稍昜據入場人數繙譯與文童不甚懸殊如與文童一例取進恐應試之人俱趨易途滿洲繙譯生員應照文童取進之額每三名減去一名共減三十名嗣後滿洲繙譯生員額取六十名至應䝉古繙譯童試之人數較之文童應試者十分之一其取進之額亦應照文童取進之額每十名取進一名嗣後䝉古繙譯生員額取九名再查厯科鄉試應考滿洲繙譯者約五百餘名或六百餘名不等取中舉人或四十餘名或五十餘名不等通計有十名取中一名亦有十一二名取中一名應考䝉古繙譯者約四十餘名或六十餘名不等取中舉人或五六名或八九名不等通計係六七八名取中一名亦在案查滿洲蒙古漢軍每科應文鄉試者約計五六百名額中四十一名滿洲繙譯自雍正年間始行開科應試者無多取中者亦属無幾至乾隆二年迄今五科應試舉子與應試文舉之數目不相上下而取繙譯舉人每多於文舉臣等伏思八旗進身之階甚廣不止於繙譯一途如比文舉人額數較多未免過濫應照文舉人額數每十名減去二名共減八名滿洲繙譯舉人額中三十三名䝉古繙譯鄉試如照文鄉試之額每十名取中一名似覺偏枯若循厯科中式之數取中又未免太濫臣等酌請嗣後䝉古繙譯舉人額中六名以上各額如無佳文應令考官遵照定例寧缺無濫即將來人文日盛取中之數亦不得有逾定額至取中繙譯進士查直省㑹試中額係由禮部將㑹試舉人三場實在數目題請欽定中額所有繙譯進士應照文進士之例禮部將繙譯舉子兩場實在數目題請欽定中額交與閲卷大臣遵㫖取中十四年六月順天府尹奏准凡應繙譯鄉試者除生員已遵例錄科外其文生員貢監天文生中書筆帖式等均照文鄉試八旗貢監錄科之例一體錄科列在一二三等者准其鄉試其餘概不准入場則真才得以入彀薄劣難以濫等庶於考試繙譯事宜更為周密至錄科題目應照考試繙譯童生之例恭請欽命欽㸃大臣憑文選取分等第名次同科考生員名册併交禮部出榜曉諭以昭畫一所有錄科應用供給食物紙張筆墨等項應請於大宛兩縣經費項下核銷其餘一切事宜悉照考試繙譯童生之例畫一辦理是月順天府尹奏准繙譯科考向例定於十一月十二月内舉行時屆隆冬天寒晷短士子頗難書寫上科因天氣嚴寒改期於次年二月内考試科考甫竣接踵鄉試新進生員縁兵部不及辦理考箭遂致不得觀光臣等請繙譯科試定期於十月内舉行十六年奏准繙譯鄉㑹試請遵照文鄉㑹試開科恩㫖一體考試除繙譯㑹試應照原議於壬申年八月内同文㑹試合為一場考試外至繙譯鄉試因主考監臨各所等官以及應試舉子人數衆多號舎房間俱不敷用未便合為考試是以向例另立一場於二月舉行今文鄉試欽定三月其繙譯鄉試應請於二月舉行十九年三月大學士公傅恒等遵㫖議准查八旗繙譯鄉㑹試之設原欲令滿洲人等學習國書並非專以科名為重乃近年以來八旗應試之人多事鏤刻字句希圖中式於實在繙譯文義轉覺相去愈逺且查康熙六十餘年之間並非以繙譯取士而其時之精通繙譯者未嘗不人才輩出是繙譯鄉㑹二試轉覺有名無實况八旗通曉漢文者既可專就文闈以博科第而曉習繙譯之人原皆可考取内閣中書及筆帖式庫使等項亦不必藉鄉㑹試以為進身之階嗣後除繙譯生員應仍照舊考試留為伊等考取中書筆帖式之地其鄉㑹二試應請永行停止二十二年議准八旗另記檔案文武舉人生員貢生監生繙譯舉人生員仍照從前舊例雍正十三年並乾隆六年議定原係另户抱養民人為子者歸入民籍仍准考試如本係家奴開户另記檔案者其本身係文武舉人生員貢生監生繙譯舉人生員止准頂帶終身不准再行考試再此項人等既經出旗為民所有子孫應各照該籍民人例一體辦理四十年奉上諭御史穆隆阿請復考試繙譯舉人進士一摺所奏不可行已於摺内批示矣從前令旗人考試繙譯舉人進士原以清書為滿洲根本考試繙譯使不失滿洲本業也後因應試人員每以尋章摘句為事轉失繙譯正道殊屬無益因諭令軍機大臣等詳加定議除繙譯生員仍行考試以為考試中書筆帖式之階其繙譯舉人進士俱停考試亦欲使滿洲等屏絶浮華敦崇實學若必考試繙譯舉人進士衆人始能學習清書精通繙譯則前此未經考試繙譯舉人進士時精通繙譯者又豈乏人可見凡事惟在務淳樸收實效豈在徒事虚名滿洲等果能不失根本不尚虚文於滿漢諸書勤加肄業精通繙譯則生員筆帖式中書皆可考試若必考取舉人進士始得謂之出身徒虚名耳有何實用穆隆阿此奏與朕教養旗人勤習滿洲本業之至意不相符合不可行著將此通諭知之四十一年奉上諭繙譯鄉㑹試停止以來已二十餘年近日滿洲學習清文善繙譯者益少著加恩以乾隆戊戌年八月考試繙譯舉人己亥年三月考試繙譯進士既與文武科場日期兩不相礙且予伊等一年之功俾得從容究心繙譯益臻精熟四十二年覆准考試繙譯舉人生員名册並請由各該旗徑送順天府核辦是年二月奏准繙譯鄉試應考之繙譯生員文生員貢監生天文生中書七八品筆帖式小京官等應照舊例由欽派考試繙譯生員之大臣先期考試列在一二三等者准與新進生員一體入場至㑹試除繙譯舉人文舉人准其考試外其筆帖式小京官係繙譯舉人文舉人出身者均准㑹試又查乾隆二十二年奉㫖八旗童生生員遇嵗科考鄉試時停其考試騎射由舉人考試進士時仍照舊兼試馬步箭伊等若馬步箭不好即將名開除不准㑹試欽此嗣後繙譯㑹試亦應請照文場之例遵行是年二月奉上諭今日據派出監視考試繙譯進士八旗舉人馬步箭之𢎞暢等奏稱此次應考繙譯進士人員内除患病有故之外其餘步箭平常並馬箭不能者共九人請除名不准考試其馬步箭尚可者僅四十七人人數不足應否准其考試之處請㫖等語滿洲等讀書學習繙譯固係當務之事而馬步箭究係滿洲根本斷不可不至精純不能射馬步箭即使繙譯尚好亦属無用是以先遇考試必特派王大臣先看馬步箭擇其稍可者方准其應試此次步箭平常以及不能騎射之佛保等九人除名不准考試甚是其餘四十七人雖不足數並與入於貢院之例不符而馬步箭尚可但停止考試繙譯進士舉人之例業已二十餘年今朕特恩復行准考况上年初次考試繙譯舉人是應考進士者亦不能多有其人若因人數不足照例不准考試非朕教育滿洲至意此四十七人著加恩交該部仍行辦理考試但八旗都統等平日辦事無多此等事亦不能辦理乎著通行曉諭八旗此一次朕不深究嗣後凡考試進士舉人生員之人各該都統等務必嚴行察查善為教訓於未考之前揀選馬步箭可觀以及稍可者准其送名倘仍有平常之人被特派王大臣查出具奏不惟不准其人應試惟該都統等是問斷不寛恕也又多羅定郡王等奏准查八旗新滿洲烏拉齊等俱因漢仗較好特蒙聖主施恩留駐京城伊等子孫受主上養育之恩一應生計學業皆與舊滿洲一様從前一應考試八旗並未分别新舊俱與舊滿洲一體報名考試以至考中者不少由繙譯進士陞至侍郎者俱有自乾隆二十年奉㫖停其新滿洲烏拉齊應試遂無論新舊移駐皆不准其考試臣等伏思停止新滿洲烏拉齊等考試者係初移駐之人俱係在本處所生素不識文字未嘗學問而充數考試反染漢習反將伊等舊業廢棄若在京城所生已過二三世者平時習學騎射讀書繙譯之人甚多原與舊滿洲䝉古無異况三十四年所降諭㫖内東三省人等移駐京城在此等所生子孫已過二世於久駐京城之舊滿洲䝉古無異即照京城滿洲蒙古一様補用外任欽此此誠舊滿洲新滿洲俱係皇上世僕一體教養之意也今准令伊等補放外任而不准其考試殊與聖主養育之意不符適因繙譯乃滿洲等舊業䝉特恩復行考試繙譯舉人進士之例凡考試之期預先考試清語騎射可觀者方准送名請嗣後除初移駐人外其在京所生已過二三世之新滿洲烏拉齊内如有能習繙譯者仍照從前與舊滿洲一體考試四十三年奉上諭今年繙譯鄉試例應於八月考試但今秋起鑾前往盛京繙譯考試甚属𦂳要務於起鑾之前考試方為妥協著交該部將繙譯鄉試改為七月初旬考試欽此遵㫖議奏此次繙譯鄉試於七月初四日考官等入場初六日士子入場考試繙譯鄉試應照舊例止考一場㑹試分為兩場又繙譯童生向照文生之例三年兩試惟是乾隆四十一年順天府奏准繙譯童生定於八月考試今鄉試定於八月舉行並今嵗鄉試奉㫖定於七月初間舉行所有繙譯童生請改於五月考試庶與鄉試兩不相礙四十六年禮部具奏恭照乾隆四十一年十二月初八日奉上諭繙譯鄉㑹試停止以來已二十餘年近日滿洲學習清文善繙譯者益少著加恩以乾隆戊戌年八月考試繙譯舉人己亥年三月考試繙譯進士既與文武科場日期兩不相礙且予伊等一年之功俾得從容究心繙譯益臻精熟欽此四十九年尚書和珅等奏准查考試滿洲繙譯舉人係順治八年所定十四年停止雍正元年奉上諭著總理事務王大臣㑹同該部將滿洲另繙滿文考試秀才舉人進士之處定議具奏欽此經王大臣等議定滿洲䝉古能繙譯者三年之内考試秀才二次舉人一次進士一次乾隆十九年大學士傅恒等遵㫖議將繙譯鄉㑹二試停止嗣於四十年奉上諭繙譯鄉㑹試停止已久著加恩於戊戌己亥兩年舉行鄉㑹試嗣後每屆三年由部具奏其准考與否候㫖定奪欽此欽遵在案至繙譯生員因留為伊等考取中書筆帖式之地是以乾隆十九年傅恒等議定時未經裁減臣等悉心酌議中書筆帖式既准生員考取自可留此一途使八旗人等知進身有階庶各留心學習繙譯但三年兩考未免為期太近應請嗣後改作三年考試滿洲蒙古生童一次奉㫖知道了四十九年甲辰科繙譯鄉試之期應否照例舉行奉㫖不必五十一年禮部具奏查乾隆四十六年奉㫖繙譯鄉㑹試從前停止已久嗣於乾隆四十三四年復舉行考試原係特㫖加恩今該部因屆三年復又奏請為期太近恐開倖進之門此次所請考試之處不必舉行嗣後每屆三年該部仍照例具奏其准考與否候朕降㫖定奪欽此嗣於四十八年經臣部具奏四十九年三年屆期應否舉行繙譯鄉㑹試恭請欽定奉㫖不必欽此欽遵各在案今查繙譯鄉㑹試自四十九年奏請之後至五十二年又屆三年之期理合遵㫖預行奏聞應否舉行考試之處等因奉㫖准其照例舉行五十二年禮部議准順天府呈稱查繙譯條例内開八旗滿洲䝉古漢軍繙譯生員文生員貢監生天文生中書七八品筆帖式小京官科考列在一二三等馬步箭合式者俱准鄉試與新進生員一體入場等語又查乾隆九年三月内禮部具奏八旗新進繙譯生員因繙譯鄉試場期甚迫不及與舊案生員一同考試馬步箭可否令其一體應試之處請㫖奉㫖著下次再行考試欽此欽遵各在案查核例意是新進繙譯生員毋庸考箭復詳譯乾隆九年㫖意亦可酌量辦理今本年新進繙譯生員雖與五月内與錄科人員一同考箭但究係考試童生之箭現在鄉試自應仍行考試而例内亦無考試明條如循文場鄉試之例則此時行文八旗查取旗册再送兵部奏派王大臣騐試騎射為期甚迫恐難趕辦可否援照乾隆九年㫖意并遵循條例此次免其考箭與錄科人員一同入場鄉試之處咨呈禮部查照劄覆以便遵照辦理等因查乾隆九年三月初八日繙譯鄉試經本部以新進繙譯生員於初一日始出試案不及與舊案生員一同考試馬步箭可否一體應試之處具奏請㫖奉㫖著於下次再行考試欽此又乾隆十四年因上科繙譯科試甫竣接踵鄉試新進生員縁兵部不及辦理考箭遂致不得觀光請將科試改期於十月舉行等因經該府自行奏准各在案是從前新進繙譯生員未經考箭者不准鄉試向例甚明至四十四年繙譯㑹試時奉㫖滿洲讀書繙譯固係當務之事而馬步箭究係滿洲根本斷不可不至精純熟不能射馬步箭即使繙譯尚好亦属無用是以凡遇考試必特派王大臣先看馬步箭擇其稍可者方准應試嗣後凡考試進士舉人生員之人各該都統於未考之前揀選馬步箭可觀以及稍可者准其送名倘仍有平常之人被特派王大臣查出具奏不惟不准其人應試唯該都統是問欽此欽遵所有此次繙譯鄉試既於四十四年欽奉諭㫖先試騎射其新進生員自應遵㫖辦理且查現距鄉試之期一月有餘無難趕辦非如乾隆九年新進生員出案數日即屆鄉試可比相應劄覆該府尹即行咨取新進繙譯生員等年貌履厯造具旗册速送兵部辦理考試又禮部具奏查雍正三年二月繙譯㑹試據各旗册送應考舉人共二十八名經臣部以人數甚少或俟取中舉人及願入繙譯之文舉人至五十名再行㑹試等因具奏奉㫖六十名㑹試欽此又乾隆五十二年五月内欽奉上諭向來滿洲䝉古繙譯鄉㑹試每屆三年將應否舉行之處請㫖辦理但旗人進身之途甚廣並不專藉繙譯且其間亦未見出真才也嗣後每屆五年舉行一次亦不必請㫖可行與否矣伏查乾隆五十三年係先經臣部奏准應行繙譯㑹試之期惟是行據各該旗將應考舉人造册咨送到部共祗有三十八名不足六十名之額所有此次繙譯㑹試應請暫行停止遵㫖俟五年屆期鄉試後取中舉人漸多足敷六十名之數再行奏請㑹試奉㫖知道了以上八旗繙譯科武科縁起欽定八旗通志卷一百三
