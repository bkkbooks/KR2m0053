上南廵賜詩曰海疆浙閩重幕府簡猶難必也知大體寧惟期小安暴除艱廢猛衆得允於寛節相權資理徐歸黄閣端五月疏言浙江海塘老塩倉一帶柴塘四千二百餘丈䝉聖主親臨閲視諭令改築石塘實為萬年經久之至意臣親往覆勘此時正遇大汛現在柴塘實資抵禦沿塘各工俱属稳固惟潮神廟前大盤頭西藏字號起柴塘朽腐将盡潮水臨塘殊闗𦂳要現在石工採料興建尚需時日應将此䖏趕𦂳鑲修築塘百丈至柴塘四千二百餘丈改建石工自應籌度萬全現今柴塘既臨大汛未便更動而退後多係田廬臣與司道等面加籌酌似應𦂳靠柴塘内下樁築砌石工以柴塘為外䕶捍衛更為得力居民亦属相安俟秋汛後擇吉興工又諭㫖指示應修繞海寕城之石塘内有工二十九丈地勢較髙兩旁魚鱗舊塘原十六層其城東八里文字號至陳文港宻字號百五十餘丈地勢稍低兩旁魚鱗舊塘原十八層今應各照舊層數以期一律築固諭曰前因浙江海塘改建石工恐該䖏居民􅂉視柴塘為可廢任意拆毁竊用致損城郭田廬曽明降諭㫖令該督撫嚴飭地方文武各官将現有草塘照前加意防䕶以為重闗保障将来石工告竣之時亦可留為外衛此㫖尚未據三寳奏到兹據三寳摺内乃稱與司道等面加籌酌𦂳靠柴塘之内下樁築砌石工既可以柴塘為外衛則捍衛更為得力等語三寳此摺與朕降諭㫖相符其是否曽經接奉前㫖著據實覆奏三寳㝷奏前因石塘工鉅曽飭該管㕔備悉心籌畫先據稟稱從柴塘退後數丈建築石工湏拆去民房八百餘間殊非仰體聖恩保䕶田廬至意臣逐一履勘似應於𦂳靠柴塘内築砌石工嗣於五月間恭讀諭㫖杭州老塩倉一帶改築石塘仍留柴塘以資保障臣當即欽遵飭地方文武将柴塘加意保固報聞六月命來京入閣辦事八月兼管正藍旗滿洲都統十月充經筵講官四十六年正月因王亶望在浙江廵撫任内聲名狼籍未行叅奏議革職得㫖從寛留任四十七年四月繕冩清字雩壇祝版糢糊部議革任詔寛免十一月在尚書房縂師傅上行走四十八年調鑲藍旗漢軍都統四十九年五月隨駕熱河以疾歸六月卒諭曰大學士三寳厯任督撫宣力有年簡擢綸扉勤慎供職方資倚任此次扈從熱河因其遘疾即遣太醫診視並令回京調養兹聞溘逝殊為軫恤其任内降革䖏分均予開復所有應得䘏典著該部查例具奏㝷賜祭𦵏如例諡文敬武靈阿武靈阿滿洲正紅旗人姓𤓰勒佳由前鋒翎長於乾隆十九年授前鋒校二十三年八月署前鋒章京從征凖噶爾回部有功給雲騎尉世職三十年授直𨽻居庸路都司三十五年授督標後營逰擊三十九年九月山東逆匪王倫擾臨清直𨽻縂督周元理恐賊竄入境令武靈阿等赴王家淺察探行至塔灣西南距臨清三里遇賊百餘縱火刼掠武靈阿直前奮擊賊驚走翌日官兵屯西岸賊三千餘兩路来犯發鎗礟擊之賊散而復合武靈阿射中偽縂兵楊壘左肩兵穆維殪之奏入諭曰直𨽻官兵此次堵殺賊匪使其不能西逸将領弁兵俱奮勇出力甚為可嘉武靈阿著交部遇有叅将缺出即行陞補又諭曰周元理奏逰擊武靈阿射中賊目頗為奮勇著舒赫徳看其人材如果可用即補授徳州城守尉倘不能勝任亦即據實具奏是月即奏補徳州城守尉十月得㫖逰擊武靈阿已奏補徳州城守尉但城守營所得官項較逰擊轉少是明陞其官而暗减其禄非所以示體恤著舒赫徳再将武靈阿才具心地與臨清城守之徳州恭将烏大經秉公比較若烏大經勝於武靈阿即著烏大經陞補臨清副将其所遺徳州恭将員缺令武靈阿陞補俱著舒赫徳妥酌具奏旋奏補徳州營叅将舒赫徳㝷以武靈阿明敏勇幹訓練有方請調補撫標中軍叅将詔如所請四十一年二月上廵幸山東親涖臨清州舊城詢及官兵剿捕情形諭内閣曰叅将武靈阿係在事出力之人雖已加恩擢用仍著賞戴花翎示奨十月遷陕西慶陽協副将四十四年擢甘肅寧夏鎮縂兵四十六年六月從剿蘭州逆回蘓四十三於華林山四十七年三月署陜西固原提督七月回寧夏鎮任四十八年六月卒農起農起滿洲正紅旗人姓索佳父彰萊官副都統乾隆二十五年農起由筆帖式授工部主事累遷員外即中三十四年授湖南驛塩長寳道三十八年遷湖南按察使三十九年調任湖北四十年二月以湖南任内率轉命案錯誤部議降二級調用上念其才尚可用五月授山西按察使十月調任安徽四十二年遷安徽布政使四十三年鳳陽泗州潁州太平和州六安州各属旱豫省黄河潰隄下注亳州䝉城漸及鳳陽泗州所属州縣詔撥川米十萬石以賑農起徧至各属察勘督辦飭属捐設粥厰並奏支社倉榖煑粥助賑疏入報聞四十四年以失察天長縣貢生程樹留所刻詩文狂悖復失察鳳陽縣吏侵蝕賑銀兩經部議革任詔免四十五年五月調河南布政使八月擢安徽廵撫四十六年三月諭曰農起審擬廵檢潘振宗藉端婪索致斃人命一案僅擬發往伊犂殊為好名輕縱部議革任本属咎所應得念其辦理上年賑務於撫䘏事宜尚能認真著加恩從寛免其革任註冊十年無過方准開復四十七年正月調山西廵撫三月奏言向例大同朔平府属州縣食口塩平陽蒲州澤州潞安絳州等属四十四州縣食河東引塩太原汾州寧武代州忻州等屬四十四州縣引課歸入地丁就近刮食土塩聼民販運䝉古塩入内地接濟乾隆四十五年皇上軫念河東商乏禁販運䝉古塩積存口外七百餘萬斤致土塩價昻臣思以蒙古塩之有餘補内地土塩之不足於民食生計有益請令地方官給以印票聼向食土塩居民赴口外買運下部議行並議該省招富户充商五年輪換一次最易滋弊請勅該撫妥籌議奏十月奏覆池塩陸運成本較重查塩價原視年之豐嗇酌定自前塩政衆神保以價分貴賤易起争端就彼時賤價奏為定額後塩畦被水商力愈乏前撫臣巴延三是以有招富戸五年輪換之請新商不善經營虧折愈多臣訪輿論均以鹽課歸地丁為便查池塩商運民銷法行已久長商既力不能支短商又形竭蹷揆其受病之由實因澆晒工本運費較前倍増而鹽價依舊商運拮据民多食淡是病商即以病民懇恩俯念河東池塩為三省民食攸闗於定額外每斤量加價銀二釐停五年輪換之例選現商殷實者定為長商将引地分三等匀配􅍐分以資調濟廷議現増二釐之價試行三年後商力充裕再請酌减又奏浚榆次縣涂河棘針渠貫入永康渠灌溉瀕河地畆疏入報聞是年晉省秋審冊九卿改擬情實者二十二起部議革任詔留任四十八年九卿核議晋省秋審招冊改入情實者三十一起諭令明白回奏㝷回奏疏至諭曰秋讞大典由各省督撫分别情實緩决核准具題其中或稍有出入經九卿核改未有如今年之甚者至農起經朕降㫖詢問令其明白回奏乃竟於朕前强為陳辯一似九卿核改各案盡属非是並稱核之連年秋審擬入情實数目適為相凖等語此何言耶定擬案罪祗論其情罪確當豈有較論上年人數多寡之理使必執人數而論設遇案犯較少之年豈竟将無罪之人有心羅織以足其數耶農起此奏不是尤大著革去翎頂並停止三年廵撫養亷仍留山西廵撫之任以觀後効四十九年七月因辦理赴甘肅勦逆回兵差妥協詔復翎頂仍准支廵撫養㢘十二月入覲與千叟宴五十年四月副都御史梁敦書山西香差旋京召見奏汾州一帶二麥多未種民情艱苦諭農起據實陳奏農起覆奏現在不致成災諭曰地方雨水短缺致成偏災於閭閻生計大有闗係農起接奉前㫖自應迅速親赴汾州一帶實力查勘乃竟安坐省城惟以臆度之見一奏塞責朕厪念民依無時或釋農起為封疆大吏寧不之知所奏各属得雨止據地方官禀報未必盡皆確實且其中有三四寸者不得謂之霑足看來汾州一帶仍未得有透雨而該撫遽稱不致成災含混具奏竟属有心諱餙著交部嚴加議䖏即親往汾州一帶確勘據實奏聞㝷奏各属現已得雨二麥可望有収秋粮漸次播種無庸先行撫䘏現飭藩司往勘前梁敦書奉使所至係榮河一帶僻䖏山陬民婦聚集邀賞正值青黄不接藉端申訴諭曰地方旱災民瘼攸闗朕宵旰勤求無時或釋凡遇奉使回京復命之員召見時無不詢以沿途地方情形如有奏及雨澤愆期及民生拮据者即諭該督撫籌辦撫卹即所奏不實從不肯以為百姓之故加以䖏分盖朕之意縂以民依為重惟恐閭閻艱苦壅於上聞農起寧不知之乃接奉前㫖僅令藩司前往又以地方官禀報虚詞支飾陳奏且謂梁敦書因吝惜賞賚藉端入奏更不免吹毛求疵豈朕簡用委任之本意耶農起由司道用至廵撫並非由人保薦因其在藩司任内辦理安徽偏災尚能留心民事經朕特加㧞擢復由安徽調任山西今該省地方缺雨乃復廻䕶諱餙巧言陳奏殊不類其平日所為業已交部議處並令親往確勘即未至成災亦應妥為撫䘏或借口粮或緩征以資接濟五月農起親徃太汾沁遼隰平等䖏確勘連得透雨麥秋並未成災惟秋収尚早奏請酌糶常平榖借給口糧本年錢粮緩至秋後徴收諭曰平陽蒲州等䖏麥収既歉著即賞兩月口糧餘照所請速行分别平糶酌借緩徴以資接濟而紓民力至晉省迤南各属雨澤短缺農起從前奏報各摺並未剴切陳明本属含混是以朕未能深悉該省被旱實情梁敦書回京奏及節經傳㫖将該撫交部嚴加議䖏並加恩從寛留任矣今據将查勘實在情形詳悉覆奏並稱如果成灾該道府州縣七十餘員何盡𨼆匿不報且詢之村庄小民僉稱實未成災倘地方官隠匿不報何難至上司衙門呈控等語農起既經親往查勘所奏自属實在情形地方雨水収成朕亦不能不以督撫之言為據農赽尚不至有心諱餙但即該撫所奏平糶緩徴酌借口糧之䖏何以不早行籌辦耶朕厪念民依如傷在抱似此拯救災黎之事一經督撫奏聞立時降㫖俾小民生計有資早霑一日之恵即早得一日之益乃晉省缺雨已久直待朕降㫖詢問該撫始親往查勘奏聞辦理以致小民遲霑渥澤此即農起從前含糊具奏之咎封疆大吏當仰體朕懐留心民瘼豈應延緩含混若此耶農起已經部議從寛留任此次姑寛之後倘仍有心廻䕶虚詞支餙将來一經小民告發及籍𨽻山西之科道等官恭奏查出實情朕必從重治罪不能再為寛貸也八月卒諭曰山西廵撫農起自簡任封疆以來辦理地方事宜頗能實心整頓今聞溘逝殊属可惜所有任内降革處分准其開復應得䘏典該部察例具奏㝷賜祭𦵏如例欽定八旗通志卷一百六十六
