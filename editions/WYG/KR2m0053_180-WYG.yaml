body:
  text: 欽定四庫全書欽定八旗通志卷一百六十六人物志四十六大臣傳三十二滿洲正紅旗三逹舒蘭三覺羅石麟明徳吳善寶武靈阿農起舒蘭舒蘭滿洲正紅旗人姓納喇父敦多哩官至刑部侍郎兼佐領康熈二十六年二月以審理盗案失實革侍郎任復以審理革職總督蔡毓榮罪案附和尚書希福從輕擬罪由佐領降二級發黒龍江効力舒蘭初任理藩院筆帖式三十四年遷主事三十八年三月隨侍郎滿丕及都統烏逹禪等招降巴爾瑚三千餘人安駐察哈爾游牧地編𨽻佐領九月巴爾瑚佐領額克圖叛害察哈爾副總管阿必達驍騎校班第掠馬駝以遁聖祖仁皇帝命喀爾喀公錫卜推哈坦等領䝉古兵追𠞰舒蘭率諳察哈爾路徑者四人持檄傳示䝉古諸貝勒台吉并派撥察哈爾厄魯特兵隨烏逹禪㑹諸蒙古兵剿獲賊渠三十九年遷内閣侍讀四十三年四月命同侍衛拉錫往窮黄河源諭曰河源雖名古爾班索理瑪勒其實發源之䖏人跡罕到爾等務直窮其源察視河流從何䖏入雪山邉内凢經流諸處宜詳閲之九月還奏臣等於四月初四日就道五月十三日抵青海十四日至庫庫布拉克有貝勒色卜騰扎勒同行六月七日至鄂稜諾爾周二百餘里明日西行至扎稜諾爾周三百餘里二諾爾相去可三十里許明日至星宿海䝉古名鄂敦塔拉星宿海之源小泉萬億厯厯如星衆山環之南有山曰古爾班圖勒哈西南有山曰布瑚珠勒赫西有山曰巴爾布哈北有山曰阿克塔齊勤東北有山曰烏蘭都什䝉古縂名曰庫爾坤即崑崙也山泉出自古爾班圖勒哈者西畨名為噶爾瑪瑭出自巴爾布哈者名噶爾瑪楚木朗出自阿克塔齊勤者名噶爾瑪沁尼三山之泉溢為三支河即古爾班索里瑪勒也三河東流入札稜諾爾扎稜一支入鄂凌諾爾黄河自鄂稜出其他山泉與平地水泉淵淪瀠繞不可勝數悉歸黄河東下臣等於六月十一日自星宿海回程舍故道㝷河流東南行二日登哈爾吉山見黄河折而東至庫庫陀羅海山又南繞薩楚克山復北流經巴爾陀羅海山之南明日逹阿木尼瑪勒占穆遜山其山最髙雲霧蔽之不可端倪䝉古人言長三百餘里有九髙峯積氷終古不消常雨雪一月得晴僅三四日臣等自此回行又二日至錫喇庫特勒又南過僧庫爾髙嶺更百餘里至黄河岸見黄河自巴爾陀羅海山東北流經歸徳堡之北逹喀山之南兩山峽中流入蘭州自京至星宿海計七千六百餘里寧夏之西由松山至星宿海天氣漸低地勢漸髙人氣閉塞故多喘息謹繪圖復命疏入報聞是年擢内閣侍讀學士㝷諭大學士九卿等曰朕於古今山川名號雖在邉徼遐荒必詳考圖籍廣詢方言務得其正故遣使至崑崙諸䖏目擊詳求載入輿圖即如黄河之源出西塞外庫爾坤山之東衆泉渙散不可勝數望之燦如列星䝉古謂之鄂敦塔拉西畨謂之索里瑪勒中華謂之星宿海是為河源滙為扎稜鄂稜二澤東南行折北復東行由歸徳堡積石闗入蘭州其原委可得而縷析也四十四年擢舒蘭内閣學士眀年命徃西藏封拉藏為翊法恭順汗回京得風疾賜醫診視并賜藥飲兩閲月始痊四十七年閏三月疾復發乞休命觧任調理五十二年正月病痊補原官三月遇萬夀慶典復其父敦多哩侍郎原品十一月命舒蘭兼管光禄寺卿十二月遷工部侍郎明年諭責舒蘭人甚糊塗事多差錯降三級調用五十九年卒年六十有八覺羅石麟覺羅石麟滿洲正紅旗人康熈五十年授工部筆帖式雍正二年在奏事處行走三年擢員外郎四年二月授江寧布政使五月奏上江各州縣向有虧空銀二十三萬九千四百兩有竒經前撫臣李成龍准前布政使董永芠據各府州公議将上司節禮及官役俸工等銀從雍正二年起按季觧藩庫抵補至四年三月已觧銀六萬一千三百餘兩乃陞任通政使前布政使博爾多於此項内動用三萬三千七百餘兩自欠京餉一萬七千有竒疏入得㫖博爾多虚懸之項一一秉公查揭甚是似此辜負朕恩之人豈容􅁝毫姑寛且爾亦豈便代他人任過耶八月奏言泗州被水命臣動庫銀二萬両親往散給臣即馳徃料理無絲毫假手胥吏内有被災三四分者雖不蠲免錢糧向有賑粥之例酌減散給又有無田代耕窮民止有草房被水冲倒棲息無所其苦更甚亦照成災例行散賑日自辰至午恐饑民守候捐買餅餌使食得㫖料理甚属妥協可嘉之至非實心任事何能有此賑過情形已悉爾其勉之十二月疏言外省虧空等案入官田屋例應估變乃遷延日久地乏人耕遂至荒蕪屋無人居日漸坍塌甚至州縣屢易其人漫無稽查或官役侵収肥已應查田地荒蕪者招佃耕種房屋分别賃租収息造冊送部存案民間有願買者照時價變估又言江安十府糧道每年収放漕糧約四十餘萬與小省藩庫無異請照司庫例每年春秋二季分别應存應觧登冊報部聼候撥觧糧道例應押運過淮抵通在署日少凡各属解道錢糧及支放糧船行月并修船等項未便概任佐雜胥役請添設庫大使一員均下部議行五年六月遷山西巡撫十一月奏言大同府大有倉朔平府常豐倉所貯糧原備軍需四月准部咨将二倉米六萬石發給范毓馪秋後買補還倉現飭催買補第大朔二府地連直省今嵗來晉販糴者多價難平减且有闗民食採買未便急廹查各属貯倉穀不下百萬石請先動十五萬石運至二處碾米貯倉以備軍需各属倉穀請動存公銀陸續補買上是之乾隆元年四月疏言晉省汛舖墩䑓向來建設未為齊整今擬省南省北及隣界僻路等處添設墩臺七十八座營房六百七十三閒汛兵三百三十一名就近撥補其烟墩牌坊如數制造又有應裁塘汛二十二處變價完公兵六十八名撤歸伍七月疏言户部覆准侍講學士楊椿條奏山西佐雜等官宜給養亷查教職已按品給全俸藩庫鹽塲各官已有養亷者毋庸議給所有司府經厯照磨及州判縣丞等官毎員毎年應給養亷銀八十兩吏目巡檢司獄驛丞六十兩在耗羡下支其兼署之員因有本任養亷向無兼支例但念本任養亷除贍家外僅可充本任公用而兼署之任亦有幕賔束脩與應辦公務之費請准支養亷一半餘仍扣歸缺官項下充公均得議行十二月奏稱蒲州平坦潞澤澤州等營汛廣兵單撫標原設二營兵數獨少請添蒲州協一百二名平坦營八十六名潞澤營一百八十八名澤州營七十五名撫標二百二十四名守兵一百名共七百七十五名即在裁兵内撥給太原營與撫標左右二營同城兵數足敷防守惟守糧過多拔補未免壅滯無以鼓勵勤勞今擬改歩戰兵百充給撫標左右二營又言曩者設額外營官兵時在省城建營房四千間衙署十四座今兵汰宜估賣但撫標并太原營本城兵多租民房而額外營兵又議添撫標請将此營房撥給其備弁房屋仍為公署均從之四年二月奏綏逺城副都統甘國壁條奏撥銀買糧貯歸化城綏逺城托克托城三䖏命臣議奏查此三䖏自移駐官兵招民種地以来生聚日繁需粮益多應如所請但行之貴乎可久比項倉貯既無撥用原額而隨時平糶不盡出陳易新若照原奏貯至二十萬石之多恐致紅朽請動支藩庫耗羡存公銀在歸化綏逺二城各買貯榖五萬石托克托城十萬石碾運協濟請自乾隆四年始毎於秋収前遇稔即買價貴即止其領収平糶出納等事委本䖏理事同知及協理通判管理仍令朔平府雁平道盤查嵗底由布政使考成奏銷得㫖着照所請行五月疏言左都御史陳世倌條奏山東濟南等處及山西潞安以西各府屬久未得雨民望甚殷宜及時籌備查晉省山多水少不通舟楫米糧仰頼外来者無幾但民儉多有蓋藏且上年豐収民情甚安倘至下月尚無透雨致成偏灾則宜請動倉榖按被灾輕重定賑多寡又思以工代賑實為良法晋省各属城已估計應修報部者共三十四州縣此内有成災䖏即動項發州縣備料興工俾貧民得傭工度日報可五年閏六月丁父憂回旗十月授内閣學士六年七月以山西廵撫任内失察布政使薩哈亮貪黷禠職九月特授鑲藍旗漢軍副都統先是山西平陽府知府章廷珪有婪賍事石麟曽經保薦至是事發議降五級調用十二年卒明徳明徳滿洲正紅旗人姓輝和雍正十二年由筆帖式補太常寺博士乾隆元年授寺丞二年遷歩軍統領衙門員外郎三年調户部縀疋庫五年遷山東糧道七年授湖南按察使八年疏言督撫等遇刁民糾衆搶刦之案應查明是否地方官激變嚴拏究辦以示懲創不得藉此輙劾有司徒長刁風防汛弁兵亦宜協力查挐不得推諉觀望諭曰國家愛養斯民惟恐一夫失所偶遇地方歉収未嘗不籌畫接濟而刁頑之民遂乗機搶奪不可不重懲以儆乃督撫欲自諱其化導不力禁約無方止将州縣推㝷别故叅劾而於搶奪案朦混歸結又如汛弁兵丁類皆觀望不前亦豈設兵衛民本意著各督撫提鎮嚴飭所屬一同實力查拿如推諉即嚴叅議䖏九年四月廵撫蒋􅄎劾明徳剛愎自用於巴陵縣生員方宣㸃家被盗一案意存諱餙下部議革職七月授盛京禮部郎中九月授山東兖州府知府十二年調濟南府十三年遷山東鹽運使十四年七月上以川省用兵山西軍務絡繹必得幹練之員任使命明徳調補雁平道九月調甘肅安西道十六年遷湖北按察使十九年擢四川布政使二十年調甘肅布政使隨縂督黄廷桂往肅州辦軍務二十一年二月授山西廵撫六月奏言陽曲太原榆次太谷祈縣徐溝清源文水交城興縣等十縣四季徴糧貯太原府理事通判倉即供季支兵餉例不停緩今該㕔已徴之數及從前節次買存米豆足敷本年支放現令暫緩俟秋後催徴猶恐下年徴支不繼仍難緩至秋成查晋省溢額榖共五十餘萬石各属現俱平糶於此項榖價内酌撥買米三千石黒豆六千石以備墊支嗣後定於秋收後開徴下年供支則兵糈既属有備輸将亦得從容矣十二月奏言新疆派調察哈爾吉林等兵奉㫖将陕西糧運巴里坤山西歸化城粮運陕西接濟竊計陕西若動撥榆林延綏等䖏糧由歸化城存貯軍需内運往歸欵實属近便如動撥西安同州等處糧應於連界之平蒲觧澤四府州属溢額榖内撥補較為路近省費二十二年五月奏言太平縣史村驛明季因汾水阻隔改設曲沃縣䝉城鎮其人夫仍留史村汾河久西徙無碍而一驛夫馬分設未便應仍併歸史村驛諸疏俱如所請六月調補陕西廵撫十月前任山西布政使蒋洲虧空勒派為廵撫塔永寧所劾上以明徳前與蒋洲共事毫無覺察並著革職拏問命尚書劉統勲前徃鞫實洲正法明徳擬絞特免明徳罪發甘肅交黄廷桂差委二十三年補甘肅凉荘道二十四年正月授甘肅廵撫二月疏言甘省辦理軍需錢價甚昻四川銅盛錢多懇敕該督撥運三十萬串来甘搭放兵餉其餘設厰平賣市價自平從之四月丁母憂諭賞銀千兩辦䘮先是明徳在山西廵撫任濫舉属員楊文龍部議降二級調用又湖北按察使任盗案遲延補官日降三級調用至是上以其連年承辦軍需尚属出力命署甘肅按察使二十五年八月授甘肅布政使十一月復任甘肅廵撫二十六年二月奏言嘉峪関左右邉墻舊係土築年久殘缺新疆遣犯逃越稽查未宻請用莭省運糧銀萬餘兩修固嗣後遣犯由闗逃回将逰擊交部嚴加議䖏又奏獲巴里坤迯犯即於該地正法上俱從之四月疏言各省發遣巴里坤哈宻安西三䖏之犯甚多安西哈宻無屯係賞兵為奴現在兵數裁減巴里坤有屯田而糧少遣犯俱難再發應将續到者發闢展烏魯木齊屯所二䖏上年豐収非但有禆屯務即各犯亦可得所又疏言甘省地方遼闊遣犯沿途投宿坊店難以防範應将各驛閒房修二三間為監房並責分防文武官弁稽查疎脱恭䖏俱如所奏行二十七年五月復調山西廵撫九月奏歸化城五㕔地方除托克托城已設倉貯榖外其歸化城和林格爾薩拉齊清水河四通判應請每䖏増設常平倉榖三萬石動用司庫耗羡銀買貯又與河東䀋政薩哈岱合疏言夏縣白沙河居民舊築堰以䕶田廬並為城垣保障但土工不堅應改石工恐民力難勝請動充公銀七千餘兩及修浚姚暹渠存項銀四千兩令運司督州縣修固嗣後殘缺除北岸仍聼民修外南岸民少應歸河東渠堰嵗修案内辦理二十八年六月奏大同鎮所属各䑓從前因係邉境設兵過重今久成内地宜量裁改水泉營地方褊小左有老營右有偏関均設大員重兵相距甚近請裁該營逰擊並兵百将老營守偹移駐管理即𨽻老營恭将轄又裁靈邱路叅将以所属渾源營都司改補靈邱路都司歸北樓營恭将轄靈邱路守備改補渾源營守偹歸新平路恭将轄俱下部議從之是月調補江西廵撫十月奏豫章書院公費不敷九江贑州兩関平餘銀及各屬城濠地租銀每年共三千餘兩除作廵撫衙門書役工食一切辦公賞兵外尚餘銀千餘兩請歸書院佐士子膏火得㫖允行十一月復調補陜西廵撫三十年正月調江蘓廵撫未蒞任命署江西廵撫五月奏兇殺多命之案請提至省城承審官扣限兩個月速結下部議載入例冊十一月赴江蘓任三十一年七月奏言江南糧不敷食常仰給於楚蜀蘓州一帶商民毎閉糴居竒臣屡加勸諭不使復蹈前轍各属辦案疲玩成習督催不使堆積佐雜不得擅受民詞私作威福該省襟帶江海太湖界連兩省刦盗尤多臣飭属查拏立破多案崇明漁船出洋後輙肆强刦今於口岸増兵役嚴察上嘉其留心時南滙山陽兩縣民有傷父兄致死者承審官誤照過失殺問擬明徳親提駁改奏革原審各員職並劾按察使李永書不勝任請交部嚴議諭曰向来督撫每於臬司審轉案件往往曲為徇隠若明徳之秉公持正何患讞獄之不平允吏治之不整飭乎明徳辦理此事甚属可嘉賞荷包六個以示優奨又奏常熟縣福山塘一河為蘓州等䖏入海要津支港甚多灌民田數萬頃乾隆二十六年濬後迄今又淤借撥司庫銀九千七百餘兩乗時再濬於所灌民田分兩年徴収歸欵從之三十三年二月調補雲南廵撫時大兵討􅃡甸七月與署縂督阿里衮合疏言省城至永昌邉界路險運艱請撥藩庫閒欵銀三萬兩分叚儧修兩月可竣庻軍糈不致遲誤又合疏言各隘口俱設兵如奸民私販出口兵丁得財賣放一并正法失察官弁恭革治罪能拏獲者重賞八月又合疏言永昌普洱沿邉土司以􅃡匪滋擾田土多荒有乏籽種牛具者請量借給於明秋交米還項九月又合疏言滇省銅厰三十餘向係糧道専管金銀鉛厰二十九係布政使専管而本地道府無稽查責耳目未周請将各䖏厰務係州縣管理者責成本府専管道員稽查係㕔員管理者責成本道専管統歸布政使縂理糧道既不管銅厰事務太簡将驛塩道所轄之雲南武定二府改歸管理均如所請行三十四年三月擢雲貴縂督奏請牧養戰馬分派武職大員管理其棚槽草料等仍令地方官偹支上嚴飭其推諉卸責㑹副将軍阿里衮奏将領等所用馬行至南底壩地方即已疲乏詔責明徳漠視軍務漫不經心下部議革職從寛留任㝷諭曰明徳自擢任總督以来辦理諸務皆不及從前實力奮勉於養馬一事尤漫無經理因循誤公豈宜令仍為縂督即留滇省亦於公事無益念伊從前在江蘓於地方情形尚属熟悉著即降補江蘓廵撫時永昌府知府趙珮以病告歸明徳為代請上以趙珮規避革職自偹資斧効力明徳遽為代奏交部嚴加議䖏又以明徳不能催辦糧餉再下部嚴議應革任均得㫖寛免註册七月經畧大學士傅恒等奏留明徳協辦軍務俟凱旋後再赴新任㝷命署雲南廵撫専管䑓站事十月諭曰明徳辦理軍需糧馬是其専責屡經飭諭始終不能實心出力今經畧大學士傅恒奏十月初一日已抵新街㑹兵尅期深入而後隊繼進之兵尚未到齊前屢諭明徳令其設法催儧官兵迅赴蠻暮何以至今尚未全抵軍營即所運糧石亦不能源源按濟辦馬一項亦自安於無能希圖置身事外可見其平日専事空言塞責竟成疲玩痼習著革去翎頂加恩仍署雲南廵撫以觀後效三十五年卒吳逹善吳逹善滿洲正紅旗人姓𤓰勒佳乾隆元年進士授户部主事六年遷員外郎十三年遷國子監祭酒十五年六月遷光禄寺卿十二月擢内閣學士十七年授盛京禮部侍郎㝷調刑部十八年調兵部侍郎十九年調工部侍郎兼廂藍旗滿洲副都綂二十年五月授甘肅廵撫七月以查辦軍䑓無悞軍功加一級二十一年諭奨其宣力軍營賞戴孔雀翎二十二年議叙軍功加一級二十三年六月疏言軍糧由肅州運至哈宻轉運軍營每石需費十二三兩向來凱旋官兵䀋菜口粮長支者按口抵扣少領者按日補給兵丁藉以糶賣製辦衣履請嗣後酌以二成本色八成折價支給既得隨時支用亦可稍省運費下部議行七月加太子少保二十四年正月授陕甘縂督四月命以縂督銜管甘肅廵撫事十一月奏言寧夏府属横城堡濱河漲塌西南角樓墻垣請於東岸築草壩以禦河流城下堆碎石六十四丈䕶城垣接修草防風三十餘丈切西岸㳺嘴俾大溜北行庻可化險為平詔如所議行十二月調河南廵撫二十六年四月奏改營制四條一延津縣向設千總一𨽻開封營封邱縣駐衛輝營外委把總一查延津現属衛輝府封邱現属開封府請撤協防封邱之外委把縂回衛輝營移原駐延津之開封營千縂駐封邱兼防陽武縣為専汛歸開封營都司轄移衛輝營千縂一駐延津為専汛歸衛輝營叅将轄一胙城係新鄉縣専汛今延津既撥衛輝營千縂移駐廵防請仍将胙城外委為協防以延津千縂為延胙専汛一王禄營駐劄