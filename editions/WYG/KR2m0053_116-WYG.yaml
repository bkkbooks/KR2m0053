body:
  text: 欽定四庫全書欽定八旗通志卷一百二選舉志一謹案鴻濛初闢神聖挺生有天地即有君臣有君臣即有任使掄才籲秀其自古以来乎唐虞夏商既各有學校必各有選舉書闕有間遐哉莫得稽矣其教育之方與升進之路端末一一可考者惟周禮為詳顧其法不行扵後世後世雖師其意亦㫁㫁不能用其法也今之科第權輿扵隋盛扵唐沿及宋與元明皆據文章為去取遂為百世不易之規矣我朝丕建鴻基自太祖太宗即旁求英乂駕馭雄才泰顛閎夭舉諸草茅汝鳩汝方收諸敵國雖拔擢多方不拘資格而當阪泉征戰之時先修辟雝鼓鐘之業臨軒䇿士髦俊雲蒸八旗子弟歌鹿鳴而躋華資者班班可數世祖章皇帝初分滿洲漢人為二榜戊戌以後合為一榜沿襲至今伏思開國以来迄今百數十載黄軒御宇而風后力牧賛其盛帝媯垂衣而臯陶伯益效其功銘鐘鼎而紀旂常者指不勝屈其人雖不盡出扵科第然科第之中亦未嘗竟無其人博以収之慎以簡之固亦古人三途並用之義也謹各臚其規制沿革而以文武科第題名有可考者列扵後其考試中書考試筆帖式考試恩監生同一衡文校士亦以類從至舊志有徴辟一門竊惟戔戔束帛賁于邱園孑孑干旌逮于姝子此言原見扵六經然山林隠逸乃有徴名幕府賔僚乃加辟目今從龍世族莫非聖朝之臣僕遽題斯號扵義未安且其所錄又皆保薦之㣲員名實尤迕尤未可據以立制謹刪汰此門用著核實之義焉選舉志一八旗科第一八旗鄉㑹試縁起天聰八年四月命禮部考取通滿洲蒙古漢書文義者取中滿洲習滿書者剛林敦多恵滿洲習漢書者察不害恩國泰漢人習滿書者宜成格漢人習漢書者齊國儒朱燦然羅繡錦梁正大雷興馬國柱金柱王来用䝉古習䝉古書者俄博特石岱蘇魯木共十六人俱賜為舉人宴於禮部各賜衣一襲免人丁四名崇徳三年八月賜新中式舉人羅碩常鼐胡邱阿濟格畢禮克圖王文奎蘇宏祖楊方興曹京張大任于變龍等十一名各朝衣一襲授半箇牛录章京品級免人丁四名謹案是年所取舉人舊志未分析滿洲蒙古漢人今無可考核仍從原本載入六年六月内三院大學士范文程希福剛林等奏以滿漢䝉古士人考取生員並舉人七月賜新中式舉人滿洲鄂藐圖赫徳䝉古杜當漢軍崔光前卞三元章于天卞為鳳各朝衣一襲開謹案此三年為士之始其時雖以滿洲蒙古漢人國以来設科取同為一榜而互考漢文滿文盖後来鄉㑹試及考試繙譯俱發源於此故恭錄簡端以昭欽承之所自順治八年六月禮部議定凡遇應考年分鄉試取滿洲五十名䝉古二十名漢軍五十名各衙門無頂帶筆帖式亦准應試滿洲䝉古通漢文者繙譯漢文一篇惟通滿文者作滿文一篇漢軍文字篇數則如漢人之例㑹試取中滿洲二十五名蒙古十名漢軍二十五名各衙門他赤哈哈畨筆帖式哈畨俱准應試滿洲䝉古通漢文者繙譯漢文一篇作漢文一篇惟通滿文者作滿文二篇漢軍文字篇數亦如漢人之例八月以恭上皇太后徽號恩詔廣滿洲䝉古漢軍㑹試中額二十五名是科禮部奏順天鄉試滿洲蒙古試卷應用滿洲内院禮部堂官各一員為主考官其漢軍試卷仍聼漢主考官閱定又議定本年鄉試明年㑹試漢軍文字第一塲書義二篇經義一篇如未通經者作書義三篇二塲論一篇三塲策一道順治十一年鄉試十二年㑹試第一塲書義三篇經義二篇二塲論一篇判五條三塲策三道至順治十四年鄉試十五年㑹試三塲文字篇數乃與漢人一例是年内三院㑹同禮部議定八旗鄉試㑹試殿試均以滿洲䝉古共為一榜漢軍與漢人共為一榜九年三月殿試賜一甲三名麻勒吉折庫納巴海等進士及第授修撰編修與漢榜例同選滿洲庶吉士四員蒙古庶吉士二員漢軍庶吉士四員十二年三月殿試停選漢軍庶吉士八月奉上諭前選庶吉士因烏真超哈進士乆在旗下已經習學滿洲規矩不必與選二甲進士洪士銘亦照此例應選知州念係經略輔臣洪承疇之子着以京官用三甲進士耿効忠係靖南王耿繼茂之子亦着以京官用俱察照應得職銜選授十三年八月減滿洲舉人額十名進士額五名䝉古舉人額五名進士額五名漢軍舉人額五名十四年正月停止八旗考試康熙二年八月復行滿洲䝉古漢軍鄉試取中滿洲二十一名蒙古十七名漢軍一百一十八名六年九月復命滿洲䝉古漢軍與漢人同塲一例考試八年七月定順天鄉試滿洲䝉古編滿字號共取中十名漢軍編合字號取中十名㑹試滿字號取中四名合字號取中三名十一年禮部奏准滿洲蒙古亦照漢軍額數取中副榜舊志惟漢軍與漢人同試照漢人之例取中副榜五名十五年十月停止八旗考試二十六年奉恩詔八旗准同漢人一體考試二十八年覆准滿洲䝉古漢軍應鄉試之監生生員均由兵部驗射馬歩箭能射者准其移送順天府入塲鄉試二十九年題准奉天府滿洲䝉古漢軍鄉試之監生生員准奉天將軍副都統等騐射馬歩箭能射者交與該府丞分别考取移送鄉試三十六年奉上諭諭宗人府禮部國家樂育人才振興文教将使海内英雋之士靡不蒸蒸蔚起矧宗室子弟系托天潢豈無卓越之姿足稱令器允宜甄陶奨掖俾克有成考諸前史以公族應制舉入仕者代不乏人今屬籍所載日益繁衍除已授爵秩人員外閒散子姪素無職業誠恐進取之途未闢致嚮學之意漸隳嗣後八旗宗室子弟有能力學屬文奮志科目應令與滿洲諸生一體應試編號取中如此則賦質英異者咸服習於詩書而學業成就者不阻抑於仕進凡屬宗支人人得以自効而於朕興賢睦族之至意亦用是以允惬焉爾等衙門即遵諭行三十九年宗室子弟科舉㑹試奉㫖停止五十四年定鄉㑹試兩翼欽典都統各一人副都統各二人㕘領各一人散秩官各二人入塲約束八旗士子試畢出場雍正四年禮部奏准場内每翼派副都統一員㕘領一員章京一員與同考官一同進場稽查三場已畢舉子出場時副都統章京等官一同出場七年禮部議准每翼派賢能􅄁領一員於貢院磚門外一同㸃名又議准考試期近兵部咨取副都統􅄁領章京職名時各該旗副都統即将本旗老成勤慎能識漢字領催派出五名候宣㫖之日各帶至午門預備欽㸃副都統即帶本旗領催一同入場又議准八旗考試文生員舉人進士四個月前禮部行文該旗移取清冊於兩個月前送禮部㑹同兵部校對如鄉試期近科試後即行造冊送部又奉上諭凡由舉人考試補用筆帖式者俱准其與舉人一體㑹試其由貢監考試補用筆帖式者亦准其考試繙譯舉人時一同考試皆所以廣育人才使之各有所成就也至於由貢監生員考取小京官筆帖式之員其中未必無通曉舉業文藝者若因其已經得官遂不得與於鄉試則彼平日之所學莫由表見亦屬可惜著通行八旗凡由貢監生員之考取小京官筆帖式者若願就鄉試俱准其與舉子等一同入場考試使片善寸長不致遺棄以副國家教養人才之典八年御史魏繹摺奏駐防杭州逺年開户之正白旗漢軍舉人王之樑本旗不行咨送㑹試等語奉㫖舉人王之樑著交部一體㑹試十一年吏部奏准嗣後令各該旗於考試之時将應考人員詳加分别滿洲漢軍開註明晰咨送順天府註冊考試如有漢軍冒入滿洲額内中式者一經查出将咨送之該旗都統佐領等官交部分别照朦混造冊例議處該員照冒籍考試例革退舉人庶滿洲漢軍不得混行考試十三年十月奏准考試大典攸關良賤名分宜肅查八旗開戸家人来厯不一當我朝定鼎之初有投充者有養育者有俘掠者伊等本係良民既經開戸即猶之復籍自應准其居官并與考試至於旗下累世家奴實屬出身㣲賤或因已經開戸當差効力著有勞績准其居官已為不拘世類之寛典若并准其一體考試則與出身㣲賤不准考試之定例不符倘伊等厠名科目踐清華之列操衡鑑之司則所取士子俱出其門将来國家登庸選舉者無非科甲中人若出開戸之門於體統名分俱有攸關似非慎重名器之意請勅下各該旗詳查来厯凡實係旗奴開户者姑念自行檢舉其現任職官及㧞貢生監俱免革退以廣皇仁嗣後但許由旗下别途出身其本身及子孫一體考試之例應永行禁止乾隆三年議准滿洲漢軍考試各有一定籍貫惟包衣人員有投充荘頭子弟𨽻内務府管轄編入上三旗者又有舊漢人在内管領下及五旗王公所屬包衣旗鼓佐領内者此等人員原係漢人因考試之時俱由滿洲都統咨送是以從前每有在滿洲額内入學中式者雍正十一年經吏部奏准改正在案迄今日久包衣人員或有不知此例者應行文内務府并八旗滿洲都統将雍正十一年吏部奏准之後有包衣舊漢軍人悮在滿洲人内入學出貢中式舉人應歸漢軍額内考試者定限三個月逐一查明縁由取具該􅄁佐領印結造具清冊咨送禮部存案俟鄉㑹試時禮部按冊查對如仍有混行造入滿洲籍貫者即行㕘奏将該管官交部議處至嗣後包衣人員考試之時内務府及八旗滿洲都統務湏嚴飭該管官逐一查明實係滿洲蒙古人員於本人名下註明滿洲䝉古字樣冊送外其投充荘頭子弟及内管領旗鼓佐領之舊漢人俱註明縁由另冊咨送禮部歸入漢軍額内考試其再有将應歸漢軍考試之人造入滿洲冊内咨送者一經查出禮部即行㕘奏照吏部原議将該管都統佐領分别照朦混造冊例議處乾隆四年議准向来外省生員俱係隨棚補考而滿學生員不便於他處補試是以未經定有成例嗣後學臣嵗試滿學生員如有患病事故不能應試者定限於科考時補考即科考時仍有患病事故未能補考者定限於下次嵗試補考統令該管官詳細查明并嚴加𫝊催務於限内補試至實有事故不能赴考由該旗該學造冊填註加結申送學臣如該生托故不到即行斥革該管官扶同狥庇一併議處應俱照舊例遵行再查各省駐防随任之生員距京遥逺原與在籍諸生不同若㮣令赴京嵗考其中多有未便若聴其竟不嵗考亦屬於例不符今酌議駐防随任各生有来京鄉試者即令補行嵗考以符定制其因路逺及有事故不能鄉試者仍照原議令該教官造具清冊註明某生駐防某省某生随任某䖏加結申詳學臣存案但不許止應鄉試而不補嵗試致滋規避之弊該旗員及該學教官亦不許借端苛索倘有混稱駐防随任及已經考過仍復羈留者明屬徇情朦混該都統即行查􅄁至随任回旗之生仍查明欠考次數照例補試七年覆准先據鑲紅旗漢軍董國柱佐領下閒散王載旭王載昱王載景王載防等呈稱竊載旭等之祖王宏忠原係盛京民人於康熙年間入於本旗佐領下作為另戸後於雍正十二年間清冊旗人本佐領以載旭等祖王宏忠因係民人入旗入於另記檔案之内厯年俱准考試有案可查於乾隆六年九月内䝉大部等衙門㑹同八旗議覆開戸人等應否考試原卷内開另記檔案人戸誠恐冐濫唯此内有另戸抱養民人為子另記檔案者本係良民應准考試等因在案今載旭之祖實係良民入旗另記檔案於另戸抱養民人為子另記檔案者實同一體本旗以載旭等雖係另戶但已入另記檔案之内未便送考伏思旗人考試原分良賤抱養民人為子者因係良民得與考試載旭等民人入旗亦係良民懇乞准與考試如虚情甘認罪等情經本部以王載旭等於康熙何年月日因何事入旗作為另戸另行記檔並伊祖王宏忠在關東時是何籍貫之處詳悉查明過部以便辦理等因咨行去後今於乾隆七年九月十五日准該旗咨稱查得閒散王載旭等之祖王宏忠原係盛京大梁河民人於康熙二十二年因伊表親周日宣由敬謹親王包衣撥出約同王宏忠一同入旗於此佐領下作為另户乾隆元年辦理時王載旭等之父王朝璘在福建總兵任内尚未歸旗仍以另戸開造後於乾隆二年来京始将民人投旗縁由自行出首咨部另記檔案後於乾隆五年閏六月内又将王宏忠民人之處遵照戸部議覆平郡王查奏正紅旗漢軍戸口條例内民人冐為旗人混入丁冊作為另戸者照民人養子另記檔案之例造入黄冊本旗奏明咨部另行記檔在案等因前来查乾隆六年九月内本部等衙門議覆正白旗漢軍都統條奏考試大典攸闗等事一摺内開八旗另記檔案人戸其中来厯不一雖於開戸有間實非另户可比如令得與考試誠恐冐濫惟此内有另戸抱養民人另記檔案者本係良民應准其考試等因具題奉㫖依議欽此欽遵通行在案今王載旭之祖王宏忠該旗既稱原係盛京大梁河人於康熙二十二年因伊親周日宣約同入旗作為另戸復經平郡王條奏照民人養子另記檔案之例另行記檔等語是王載旭等雖於考試之例相符但考試大典未便草率相應仍咨該旗查例将王載旭等年貎履厯三代出具保結送部到日准其考試九年議覆戸科給事中周祖榮奏嗣後八旗鄉試禮部先期行文八旗将應考生監人等造冊送部即咨送兵部考試馬歩箭合式者造冊劄發順天府仍一面劄行順天學政嚴𫝊八旗生員前赴科考及錄遺併令國子監𫝊示貢監一體錄科俱各憑文録取造冊移送順天府該府尹查明科冊箭冊俱有名者方准入場如科冊有名而箭冊無名及箭冊有名而科冊無名者俱不准應試十二年准國子監咨稱查由貢監出身之現任小京官筆帖式等官及在部候選官員查此項人等本監向未考送今八旗貢監錄科事宜係初定章程本監無從遵辦相應咨呈禮部定議示覆以便遵照辦理等因到部查乾隆九年十月内本部議准户科給事中周祖榮條奏八旗貢監令國子監𫝊示一體錄科慿文錄取造冊移送順天府該府尹核對科箭兩冊有名者方准入塲並無将考箭合式之人本部造冊劄監錄科之語且考箭後再行冊送錄科則為期甚廹難以從容辦理相應劄行國子監遵照原議将各該旗送到貢監按名𫝊示錄取移送至現任小京官筆帖式及在部候選等官原因其係貢監出身所以准其一體應試查直省現任教職例由學政考送鄉試今現任小京官筆帖式及在部候選人員事同一例相應劄行國子監凡伊等由貢監出身者應照例由監一體錄科其由生員出身者仍赴學政衙門錄科二十年奉上諭八旗陳滿洲因到京年久向有考試之例故姑從而留之東三省新滿洲烏拉齊與在京滿洲等不同正宜熟習騎射為國家之用嗣後東三省滿洲烏拉齊等考試之䖏著永行停止二十一年吏部等部議准八旗另記檔案及養子開戸人等為民一案内開其一應舉貢生監查乾隆六年題准八旗開檔人等止許另戸抱養民人另記檔案者准其在旗考試其一切開戸另記檔案人等槩行禁止考試等因在案今八旗另記檔案人等荷蒙恩㫖俱令出旗為民應照各該旗造送之冊将此項另記檔案文武舉人文武生員貢生監生繙譯舉人生員仍照從前舊例原係另戸抱養民人為子者歸入民籍仍准考試如夲係家奴開戸另記檔案者其本身係文武舉人生員貢生監生繙譯舉人生員准頂帶終身不准再行考試再此項人等既經出旗為民所有子孫應各照該籍民人例一體辦理是年禮部覆准查八旗錄送鄉試文生員由學政錄科貢監生等由國子監錄科俱由各旗造冊咨送順天學政及國子監辦理今本年鄉試除各旗送到應試人等本部轉送兵部考試騎射外所有各旗送到繙譯生員應文鄉試之䖏查乾隆十六年有繙譯生員呈請文鄉試之唐侃等二名經本部行文該旗自行造冊咨送學政錄科在案今各旗送到文鄉試冊内有繙譯生員五十餘名除本部咨送兵部考試騎射外其録科之處應令各該旗自行查明另造清冊徑送順天學政錄送鄉試二十二年奉上諭八旗童生生員遇嵗科考鄉試時停其考試騎射由舉人考試進士時仍照舊兼試馬歩箭伊等若馬歩箭不好即将名開除不准㑹試二十四年奉上諭此後滿洲蒙古現任三品以上大臣子弟伊親兄弟子姪有應試者令伊奏聞務必清語騎射皆有可觀方准考試又奉上諭據禮部奏請八旗有現任三品以上大臣子孫及親兄弟之子可否令其入場鄉試一摺甚屬有意朦混前因八旗童生入場滋事風尚澆漓在平日既不専務八旗淳樸舊俗而博取虚名且流為舞弊惡習不得不力為整頓是以令伊等自行奏明必其國語騎射皆有可觀方准考試童生如此鄉試又何待言乃立法伊始而本人並不自奏即冊送禮部禮部亦即含糊具請希圖僥倖是誠何心若謂前㫖専屬童生而言則生員已經考試童生且不具論其貢監一途人人可捐若不湏陳奏是童生不得應小試轉可避而應鄉試矣有是理耶伍齡安等自問能登答此㫖乎其中係何情由著即明白回奏仍将冊内開送應考十餘人之父兄一一查明具奏并令在京總理事務王大臣𫝊齊伊等令看此㫖令其自行明白囘奏朕法在必行毋謂小小伎倆可以嘗試也又奉上諭上年降㫖令八旗三品以上大臣有子弟應試者自行奏明方准入闈持因旗童在場喧鬧滋事是以為伊父兄示之莭制俾知崇實黜浮破除積習非槩從禁制遏其進取之途也乃今年鄉試屆期伊等既不遵㫖自奏禮部又為含糊具請似此巧為嘗試将使故智益萌伊於胡㡳八旗淳樸素風嫻國語習騎射其人果有足錄均可量能擢用若科目者特備儲材一格耳今乃豔心詭遇又從而釣弋其名淵藪其弊是以國家啟迪後生之途轉為蠧壊人才之具可乎且我朝開國以来名臣碩輔莫不志秉忠忱才優韜略初非從事呫嗶者即仕躋大僚内而大學士尚書外而總督巡撫勲名氣節指不勝屈大約皆非出於甲乙兩榜即近時大臣在科第中有名者不過如鄂爾泰尹繼善一二人而已然其見用實以其心地材幹初不以其文也其他倖列科名而名實不副者亦指不勝屈若奉寛國柱者流以滿洲本色論之皆不能至驍騎校者而乃托名斯文平日又不肯潜心力學惟事希心襲取視為功名捷徑甚至懐挾夾帶無弊不作即立法嚴行捜檢而所派大臣非親即故俗稱官官相䕶亦復有名無實此所關乎風俗人心者甚鉅朕安得不力為振刷以挽頽風伊等至此尚不思痛自湔改一似竄身入闈即可僥倖萬一勢必欲朕盡停鄉㑹試而後已乎所有禮部單開不循例自奏遽任子弟冊送考試之尹繼善等著将該部及該旗曽否抄錄前奉諭㫖行文知㑹伊等之處令該部旗及伊等本人據實明白囘奏再降諭㫖至僧保住傅巖乃係内務府人員進身豈患無階而亦令子弟騖名科舉又顯違㫖不奏尤為庸妄著将僧保住傅巖革職並将伊子弟革去生監在内務府庫使上効力行走不准給俸俟五年無過該管官奏明另請挑差其朦混奏請之禮部堂官伍齡安等著交部嚴察議奏三十年奉上諭前經降㫖八旗三品以上大臣子弟果有嫻熟國語練習弓馬者遇考試之期該父兄自行奏明准其入闈原因八旗淳樸素風近来未免沾染虚浮艶心詭遇且從而釣弋其名淵藪其弊是以示之節制俾知崇實黜華非概重禁制遏其進取之途也乃邇年来八旗大臣竟無奏請子弟應試者未免多生顧慮因噎廢食伊等既不潜心力學而於國語騎射又未見専攻嫻習頓覺出色自不如兼收並進猶可為造就之資也我國家滿洲世臣宣力賛政者多原不藉文章一途但承平百餘年滿洲詞臣文藻黻飾亦不可少大臣子弟中果能於國語騎射之外兼習文藝在伊等延請師資擴充聞見較之寒素家成材自易嗣後所有八旗大臣子弟仍准一體考試毋庸奏明請㫖倘伊等仍不以實學就考如前懐挾或進身之後仍蹈虚浮陋習托名斯文無禆實用朕又何難随時懲治俾知儆惕乎可将此通諭知之三十一年禮部咨覆東陵總管請昭西陵八品筆帖式伊常阿由文舉人出身援正黄旗筆帖式玉徳保中等俱係文舉人用知縣由知縣降級調用筆帖式俱准㑹試之案咨部考試前来查乾隆二十八年正月内准吏部咨稱厯来凡已任知縣之舉人因不勝民牧之任以教職改補未經得缺之前有呈請㑹試者本部據呈咨送㑹試至八旗舉人曽任知縣亦由不勝民牧以筆帖式改補之員與改教人員事同一例自應一體准其㑹試如其中有題􅄁革職降調以筆帖式改補之員不得援照此例等因在案今筆帖式伊常阿既稱係題㕘才力不及降補筆帖式之員自不便援例㑹試相應咨覆東陵總管衙門辦理四十年奉上諭據派出驗看本年㑹試舉人騎射王大臣等奏稱應行考試者一百二十五人内報近視眼者七十三人已揀令二十人照常騎射外其餘實屬不能之五十三人俱未令其騎射等語馬歩騎射係旗人根本即讀書人亦不可不學今考試一百二十餘人内報近視眼者竟有七十餘人之多明係揑報希圖規避滿洲習氣竟至若此實堪憤恨若以近視眼不能騎射哈達哈即係近視眼此衆人之所共知伊何以随朕畋獵殺牲乎此輩因不能騎射遂藉口以圖僥倖甚属不堪滿洲臣僕甚衆豈必賴此數人况此等無用人内将来亦㫁不能得人所有不能騎射之五十三人俱著停其考試豐訥亨等並未奏及惟請嗣後交該旗大臣詳查報部派出大臣騐明後方准免其騎射所奏殊屬姑息嗣後考試人内若有似此不能騎射者俱著停其考試著為例再此輩明係揑報該旗大臣等所司何事因何出結送部著軍機大臣查明奏聞四十二年議准兼管順天府尚書袁守侗等條奏八旗貢監生員鄉試及嵗科考試文童由部查取旗冊之處俱行停止一䟽内開查八旗諸生應試名冊其中有無遺漏舛錯雖湏詳查辦理但各該生是否准其入場向由順天學政及國子監考錄之後方許投卷究非専據旗冊收考且八旗生員徑赴順天學政錄科貢監徑赴國子監錄科則應造名冊即可由各旗移送該學政及該監查辦以歸簡易應如所奏嗣後八旗貢監生員應鄉試者先由順天學政及國子監行文各該旗造冊移送録科後徑送順天府准其投卷入場其由禮部查取旗冊轉發之䖏應行停止至八旗童生嵗科兩考亦應如所奏毋庸由部取冊轉發即由該府丞查取旗冊辦理再查考試繙譯舉人生員各冊并請由各該旗徑送順天府核辦以昭畫一四十三年禮部奏准宗室停考一摺内稱據順天學政汪廷璵将文生員現充滿教習宗室榮恒候補筆帖式宗室克誠均係進學之後復還宗室可否鄉試之處呈明核定等因伏查上年二月奉㫖朕前降㫖将英親王阿濟格子孫均復還黄帶子叙入宗譜乃推廣皇祖恩意俾其子孫得列天潢今據吏部奏稱後入宗室之現任人員俱應一體出缺以宗人府職官對品改補固属遵照定例但念伊等向列仕籍原在未得黄帶子之前若因此而令将現缺全出候補無期是朕此次施恩惟使其宗支奕世䝉庥而現在職官轉不得同時被澤矣著加恩将此項改歸宗室之現任京外人員其本身均留原職仍與滿洲人員一體陞轉毋庸出缺改補其現在候補候叙人員亦仍以滿洲員缺照舊銓用其未經出仕之子孫自當照宗人府舊例行至官學生係尚未出仕之人即改歸宗學欽此欽遵在案查宗室考試之例久經停止英親王子孫既復宗室自後例應不入考試今該學政咨稱文生員現充滿教習宗室榮恒候補筆帖式宗室克誠可否鄉試之處查該二員現係候補候叙已䝉恩㫖仍以滿洲員缺照舊銓用其取中文生員雖在未復宗室以前應照宗人府舊例不必錄送鄉試奉㫖知道了以上八旗鄉㑹試縁起欽定八旗通志卷一百二
