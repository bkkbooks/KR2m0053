body:
  text: 欽定四庫全書欽定八旗通志卷一百四十人物志二十大臣傳六滿洲鑲黄旗六蘇勒達立馬斯喀丹馬齊巴錫音徳莾鵠傅爾蘇勒達蘇勒達滿洲鑲黄旗人姓𤓰勒佳原内大臣巴哈第二子也初任侍衛康熈二十一年授䕶軍叅領兼佐領明年擢鑲黄旗蒙古副都統尋調滿洲副都統累遷䕶軍統領前鋒統領二十六年擢鑲黄旗䝉古都統二十八年命為領侍衛内大臣㑹噶爾丹與喀爾喀搆釁侵掠邉境二十九年六月蘇勒達奉命率将校往科爾沁調兵統駐要地時科爾沁親王班第駐圖斯噶爾圖山其兵赴調者僅半喀喇沁阿巴噶奈曼土黙特諸部兵亦未至蘇勒達䟽聞隨移檄諸部速敇軍伍進發㑹噶爾丹已深入烏珠穆沁上命裕親王福全為撫逺大将軍出古北口恭親王常寜為安北大将軍出喜峯口詔蘇勒達俟䝉古諸部軍畢集協力㑹剿七月蘇勒達同土謝圖親王沙津等率兵赴巴林八月㑹大軍合擊大敗噶爾丹于烏蘭布通噶爾丹遣使同濟農胡土克圖至裕親王營設誓歸誠裕親王信之檄蘇勒達所統諸路兵勿擊蘇勒達知噶爾丹将遁欲覊縻之遣使紿噶爾丹與語噶爾丹不應乗間越營遁去十一月師旋王大臣議裕親王等調度乖方賊敗不即追剿乃檄止蘇勒達進兵致窮㓂逃遁應革爵蘇勒達亦罰俸一年得㫖噶爾丹奔竄時若蘇勒達等率兵邀撃可以就擒乃領兵王大臣反阻使勿進蘇勒達等亦遂聴從不復追剿俱應依議治罪但已擊敗厄魯特兵噶爾丹逺遁諸王大臣槩從寛免革于是蘇勒達亦免罰俸三十四年五月噶爾丹復犯邉上欲發兵進𠞰先檄盛京諸處兵設伏圖拉左近伺之命蘇勒達與領侍衛内大臣等詳議蘇勒達言我兵不必即趨圖拉當誘其深入一舉殄滅若彼逡廵不進俟偵實再行議奏上嘉納之三十五年三月上統師親征由中路進以撫逺大将軍費揚古由西路㑹剿五月上駐蹕什巴爾台距敵營甚近而費揚古軍甫至圖拉奏緩師期上以我軍既逼敵境不必俟費揚古當即前行令王大臣等集議蘇勒達與内大臣馬斯喀等議進剿與上意合㑹噶爾丹濳遁上密諭費揚古絶其歸路敗之於特埒爾濟口俘斬無算噶爾丹僅引數騎逺竄乃命班師是年九月蘇勒達復扈駕出居庸闗廵行塞北經理軍務賜内廐馬十一月還京三十六年卒賜祭葬如例諡恪僖馬斯喀弟馬武馬斯喀滿洲鑲黄旗人姓富察米思翰長子也初任侍衛兼佐領聖祖仁皇帝康熈二十七年由䕶軍叅領授武偹院卿明年遷鑲黄旗滿洲副都統尋兼内務府總管三十四年擢領侍衛内大臣三十五年正月命兼管火器營事二月上親統大軍由中路征噶爾丹馬斯喀領鑲黄旗鳥鎗兵以從先期奉命同内大臣等議定出征營陣隊伍序次三月駕駐郭和蘇台命閲留牧馬匹還奏留牧馬匹數逾二千僅有阿巴噶䝉古總管派八十人守視應於蘇尼特諸蒙古増派六十人各以其長官董率分馬羣為七以二十人管一羣擇水草佳處牧放悉令阿巴噶總管竒塔特稽察遇盗馬者覊候治罪上允其奏四月駕駐什巴爾台距克嚕倫河已近而西路軍尚未至圖拉諭王大臣集議機宜信郡王鄂札等請駐師稍待馬斯喀同内大臣蘇勒達明珠等議奏曰西路軍為雨所滯未克遄行無庸待之宜即進薄敵營上從馬斯喀等議五月師至克嚕倫河噶爾丹望見御營大驚奔竄上親統師追至拖諾山命馬斯喀為平北大将軍率兵進剿至巴顔烏蘭噶爾丹先已遇西路軍于特哷勒濟轉戰至昭莫多大敗竄遁其属下丹巴哈什哈等率百餘人赴巴顔烏蘭乞降馬斯喀迎㑹西路軍収集降人千餘奉詔遣官衛送至張家口外乃班師任事如舊列議政大臣九月扈駕出邉經理軍務十二月命率兵駐大同三十六年正月授昭武将軍移師赴寜夏閏三月勅㕘贊撫逺大将軍費掦古軍務先是伊拉古克三胡土克圖自内地盗馬逃歸噶爾丹至是噶爾丹死率三百餘人奔投策妄阿喇布坦四月費掦古令馬斯喀以降人導引率兵追之馬斯喀行越月至摩該圖知伊拉古克三胡土克圖逺去已數日不能追及引兵還上遣侍郎常綬等齎敕往諭䇿妄阿喇布坦得伊拉古克三胡土克圖及其弟䝉額里以歸磔誅之議政大臣等以馬斯喀追剿遲緩論革任得㫖馬斯喀辦内務府事尚優從寛留内務府總管及佐領四十一年授鑲白旗䝉古都統四十三年六月卒賜銀千兩遣内大臣一員侍衛十員奠茶酒並命皇子於發引時往送賜祭葬如典禮諡襄貞弟馬武亦由侍衛兼管佐領康熈二十七年以一等侍衛同學士開音布奉命閲視中河先是河道總督靳輔議開中河滙駱馬湖之水以通漕漕運總督慕天顔謂中河雖開不久即淤徒費無益至是工竣馬武同開音布往閲還奏啇賈由中河行舟利達無阻惟漕艘載重必盡塞支河之口使駱馬湖水悉滙中河始得遄行乃漕督慕天顔禁止堵塞支河口勒令已進中河之漕船退回有意阻撓得㫖下法司逮勘天顔禠職論罪事詳天顔𫝊三十五年上親征噶爾丹奉命同侍郎阿爾拜閲視獨石口外隨征緑旗兵赴御營復命即從征五月凱旋十月從上駐蹕歸化城命以牛羊迎犒凱旋右衛兵還奏兵丁步行者多食用未裕詔兵部按籍賞銀毎兵三兩四十三年十月擢鑲白旗漢軍副都統四十八年正月因兄大學士馬齊與内大臣阿靈阿等議奏改立皇太子事獲罪馬武亦禠職五十年起為内務府總管六十年擢鑲白旗蒙古都統明年世宗憲皇帝御極授領侍衛内大臣雍正四年十月冊封怡親王以大學士馬齊為正使馬武副之特㫖俱加一級十二月疾遣太醫診視諭曰馬武事我皇考五十餘年不離左右恪恭謹慎當盛暑嚴寒無幾微倦怠之色其生平胸懐坦白情性和平朕追念皇考凡昔年侍從之人皆加恩眷况馬武年齒最髙効力最久聖眷最渥之人朕聞其病重屢降㫖往視諸大臣合詞勸止遣親王皇子前往代朕看視朕尚望其痊可倘至不起著照伯爵賜與䘏典賞銀一千兩並給與世職以示朕優眷老臣之至意尋卒賜祭葬如典禮諡勤恪予三等輕車都尉世職以其子薩喇襲馬齊馬齊滿洲鑲黄旗人姓富察户部尚書米斯翰次子聖祖仁皇帝康熈八年六月由廕生授户部員外郎十一年管佐領十四年調户部二十一年七月遷工部郎中尋監督蕪湖闗以税銀溢額叙陞二十三年九月遷内閣侍讀學士二十四年九月授山西布政使二十五年九月擢山西廵撫十二月陛辭諭曰爾居官勤慎聲名亦佳但朕觀各督撫其始未有不善後多改轍爾若始終如一不易其操則善矣二十六年四月上嘉直𨽻廵撫于成龍清亷命九卿於各督撫中有似其人者各以所知奏大學士等以馬齊及范承勲姚締虞對七月奏定武職副將以上丁憂㕘将以下在任守制例十二月御史陳紫芝䟽劾湖廣廵撫張汧貪黷馬齊與于成龍奉命同副都御史開音布往鞫先是侍郎色楞額往鞫上荆南道祖澤深被劾各欵有㫖并察張汧有無穢跡色楞額覆奏既開釋祖澤深又不紏劾張汧至是馬齊㑹同于成龍等察審張汧勒索属員科派鹽商祖澤深婪取民財皆得實論罪如律色楞額徇情欺罔亦獲罪二十七年三月遷左都御史命籌議遣官與俄羅斯定界事䟽言俄羅斯侵據疆土我守邉官兵困之於雅克薩城本可即行剿滅聖慈寛容不忍加誅釋歸故土今悔罪求和已䝉俞允特遣大臣往議垂之史冊所闗最鉅其檔案宜兼書漢字漢員一體差往事下部議行尋九卿等㑹推應差大臣官員御史陸祖修以病辭楊燝以年老辭馬齊劾罷之又劾大理卿邉聲廷於奉㫖集議河工事詭稱耳聾緘黙無言有愧職掌下部議降調五月命同尚書張玉書圖納等往閲罷任總河靳輔所修中河諸工善否暫署河道總督八月還奏中河挑濬既竣南運河内永安堤及歸仁堤五堡减水壩有被水衝壊處宜令新任河臣修理堅固黄河南北岸之減水各閘壩皆靳輔酌量形勢以防異漲無容更改二十八年十一月䟽言數年以来噶爾丹與喀爾喀搆兵上屢遣大臣曉諭業已和好又分設喀爾喀佐領與内地䝉古視為一體此亘古所未有也臣見理藩院案冊止用滿洲蒙古文並未有漢字請嗣後兼用以昭垂永久下部議如所請添滿洲漢軍漢字堂主事二員繙譯漢字滿洲筆帖式毎旗各一員漢軍筆帖式毎翼各二員二十九年二月命同理藩院尚書阿喇尼列議政大臣舊例理藩院尚書左都御史俱不預議政預議政自是始十一月署兵部尚書尋兼署理藩院尚書三十年正月授兵部尚書三月詔安輯喀爾喀於沿邉内外避噶爾丹刼掠馬齊同侍郎布彦圖等先往調集左右翼部長至上都河額爾屯河兩界中候上親行撫綏四月駕臨閲視命詳定喀爾喀次第宴賚之尋議喀爾喀諸王貝子公等為九等分别坐次禮儀以進五月外藩阿巴噶台吉奔塔爾首告烏珠穆沁台吉車根等叛附噶爾丹馬齊奉命往審覆奏台吉車根阿穆爾充科阿達里諾壘喇扎卜等順附噶爾丹属實二等台吉博託和拉扎布阿喇什博羅特及為引路之綽克圖等曽送駝馬與噶爾丹其部校阿爾塔等為噶爾丹往来通信應分别斬絞從之三十一年二月調户部尚書三十三年盛京歉収奉命往賑以開原等八城承徳等九州縣貯倉米石給散兵民七月山西廵撫噶爾圖奏大同右衛駐防兵供給浩繁請以米豆草束抵給本色正賦上命馬齊往㑹将軍希福等確議還奏右衛官兵應用米豆草束折抵銀數並無浮冒其有不敷本色者應照改徴之價支給令官兵自行採買再右衛所出之草不多應以殺虎口迤東地方給與官兵俾資樵牧向有鑲黄旗馬厰應令旗下䝉古遷移殺虎口東北得㫖俞允三十四年奉命往賑山西平陽臨汾等州縣地震被災户口動帑一十二萬餘兩並停徴洪洞浮山等處額賦三十五年二月上親征噶爾丹先期命馬齊往調喀喇沁翁牛特兵還京兼理藩院尚書命與大學士阿蘭泰等分班直宿禁城是年噶爾丹敗遁詔以來春駐蹕邉外調度搜剿機宜命馬齊于沿邉至寜夏先徃安設馹站並查勘行途宿次三十六年十一月命㑹同吏部察審革職按察使囊吉理副将楊琳洮岷道董紹孔等運糧遲悮事覆奏嚢吉理等所運糧米非供進剿大軍但令送至翁金為西安回兵之用囊吉理等依限以一半運至翁金又以一半送至納拉特並無違悮應復原職從之三十七年三月命偕副都統烏達禪侍郎滿丕往莅喀爾喀諸部㑹盟宣諭禁令十二月以漕臣桑額奏請挑濬引河命偕侍郎于成龍常綬往勘三十八年二月䟽言桑額所奏邵伯鎮南金灣小海場鮑家荘等處挑濬引河建造草壩俱属無益惟蝦鬚沙溝及興文閘草堰等處開濬淤塞稍可洩水庶漕有濟而民不害從之時山西廵撫倭倫與布政使齊世武以太原知府孫毓璘等虧空事互訐倭倫又劾齊世武於汾陽知縣李聮虧空任情朦隠上命馬齊往審七月䟽言孫毓璘虧空庫銀倉米属實倭倫駁回齊世武掲文令知府李成龍代孫毓璘彌補又李聨虧空案内有民欠銀兩經通判韓開藩徴解倭倫反指為科𣲖劾齊世武隐諱不報應降三級調用齊世武掲報孫毓璘虧空經廵撫駁回不復再請又於李聮虧空案内未以民欠聲明應降一級調用並從之十一月授武英殿大學士四十三年七月御書永世翼戴扁額賜之四十七年十一月内大臣佟國維等以建儲事密奏上命滿漢大臣㑹議保奏特諭馬齊勿預其事四十八年正月上問廷臣曰去年冬朕躬違和命爾等保奏可為儲貳者何以獨保允禩其日先舉允禩者為誰諸臣奏公同保舉並無倡首者上曰朕知此事必係佟國維馬齊授意於衆衆乃依阿立議耳馬齊奏是日議斯事奉㫖命臣毋得干預是以臣即避去諸臣所議臣實不知上復問大學士張玉書等玉書奏曰㑹議日大學士馬齊温逹先臣到班臣問議舉者為誰馬齊答以衆意欲舉允禩臣等同行保奏上曰此事明係馬齊暗中喻衆如此大事尚懐私意伊等謀立允禩豈非欲結恩於允禩為日後恣肆専行之計耶翌日諭廷臣曰馬齊効力年久朕初心俟其年老聽彼休致以保全之昨問保舉允禩之時乃身作威勢拂䄂而出如此不誅将誰誅乎著将伊族属一併拘挐并𫝊問伊之作威何益馬齊奏曰臣因事闗重大心中驚懼不覺舉動乖繆臣罪當死奏入下王大臣議擬馬齊立斬弟副都統馬武等坐罪有差族人概革官職諭曰馬齊本應立斬為衆人戒因任用年久不忍加誅即交允禩嚴行拘禁其族人官職革退四十八年十二月俄羅斯貿易人至上以馬齊舊管俄羅斯事復令其管理馬武等尋亦起用五十一年九月諭廷臣曰内務府事件積滯甚多所闗最要著馬齊署理總管事又諭曰馬齊兄弟舊所管鑲黄旗佐領前曽撥給允禩今已撤回可仍令馬齊馬武等管轄其族人並隨入本旗五十五年五月復授武英殿大學士五十七年正月充纂修省方盛典總裁官五十九年五月命察奏副都統永泰所奏世祖章皇帝實録内失載其祖圖頼事覆奏實錄祇載國家大政其餘細㣲之事例不編入永泰妄行陳奏應議處下部議革永泰職六十一年十一月世宗憲皇帝諭曰馬齊任大學士二十餘年甚属敬謹寛厚皇考出廵毎常隨從殊為出力此畨大事又公同善為辦理黽勉勤勞著賞給一等輕車都尉世職尋命承襲其祖哈什屯一等男爵合新給世職給二等伯充纂修聖祖仁皇帝實錄縂裁官加太子太傅雍正元年改保和殿大學士晉太保三年八月以總理事務竭盡忠誠賜騎都尉世職以其第十一子富良襲十三年九月引年乞休奉今上㫖以原官致仕乾隆四年五月諭廷臣曰原任大學士二等伯馬齊在皇祖時即簡任機務倚毗甚殷及皇考即位特命總理事務嘉予勞績賞給伯爵世襲罔替朕即位之初伊以年老力辭觧退朕重違其意俞允致仕頥養髙年以示優禮耆舊之意念伊歴相三朝年逾大耋抒忠宣力端謹老成領䄂班聮名望夙重舉朝大臣未有若此之久者昨聞在家患病即命太醫加意調治今聞病勢沉重朕心深為悽惻本欲親臨看視因北郊在即時值齋戒不獲親往特命和親王及皇長子永璜公訥親代朕看視望其痊可倘果不起著賞給銀五千兩辦理後事是月卒年八十有八諭部議䘏贈太傅賜祭葬謚文穆以第十二子富興襲爵十三年因富興為散秩大臣不能奮勉行走革退命富良襲爵合前襲之騎都尉晋一等伯兼一雲騎尉十五年七月詔加伯號曰敦恵巴錫巴錫滿洲鑲黄旗人姓𤓰勒佳康熈初由賛禮郎授户部員外郎遷監察御史二十二年廵視兩浙塩課三十年八月授山西按察使三十六年閏三月擢陕西廵撫七月䟽言沿邉衛堡奉㫖照州縣例収貯捐納米穀榆林衛已貯三千石其三十一堡分大中小三等四堡各貯一千二百石九堡各貯八百石十七堡各貯四百石分派商州鎮安武功商南三原収捐各官自偹脚價運交部議如所請上曰此沿邉衛堡積貯米榖若令商州等處官員自偹轉運之費路逺而險勢必科派小民巴錫所奏户部所議皆非其俟秋成後酌動正項各就近地採買収貯先是三月駕幸寜夏過榆林有延綏東路黄甫堡民叩閽訴言自順治年間部頒茶引一百三十四道招商納税毎年五百二十餘兩未及數年口外䝉古不復通市商逃民賠詔下所司察奏至是巴錫奏口外蒙古就近在殺虎口買茶不至黄甫堡請􅃯部停頒茶引從之三十七年十二月擢雲貴總督四十年十二月䟽劾逰擊髙鑑徇隐守偹何公珽為把總張文貴訐告劣蹟請並革職逮問又劾提督李芳述庇䕶髙鑑何公珽牒咨弗實芳述亦劾巴錫買咨弗覆未㑹稿據題有違成例上覽巴錫二䟽皆下廵撫王燕察審及李芳述䟽入諭大學士等曰李芳述在西寜時甚有聲名此事似曲在總督命侍郎温達往鞫還奏下部核議張文貴誣訐何公珽何公珽以部劄填冩寃詞俱應革職擬杖髙鑑代何公珽揑稱部劄遭火燒燬應革職擬徒李芳述不據實紏劾應罰俸一年巴錫不確查寔情又不㑹同具題應降一級留任罰俸一年得㫖寛免巴錫與李芳述降罰四十四年五月内遷户部右侍郎四十五年三月雲南廵撫佟毓秀以不稱職罷任上詰問巴錫前次何以奏薦為賢巴錫奏曰臣昔在雲南與佟毓秀同事七閲月見其辦事甚勤是以奏稱其効力上曰爾前奏稱佟毓秀賢今云但奏稱効力豈効力不謂之賢将不効力者謂之為賢乎十一月以不諳部務觧侍郎任命分修通州等處河工越四年以續派工料銀無力完繳革職五十二年三月遇萬夀慶典復原品音徳音徳滿洲鑲黄旗人姓鈕祜禄祖額亦都父遏必隆俱有𫝊遏必隆五子音徳其四也康熈二十四年由佐領授三等侍衛兼善撲長三十五年從上親征噶爾丹三十六年復扈蹕視師寜夏三十八年改王府長史尋授一等侍衛先是遏必隆襲額亦都所遺一等子縁事削及輔政别封公爵其子爵未議襲五十一年特命音徳襲之六十一年十一月世宗憲皇帝御極擢散秩大臣署鑲白旗䕶軍統領十二月授正藍旗滿洲都統雍正元年命兼管䝉古漢軍都統事二年襲其伯父圖爾格二等公其一等子爵即以圖爾格孫豐阿逹襲是年授領侍衛内大臣三年兼議政大臣五年以病乞休特遣内大臣慰問遂以原品致仕十一月卒賜祭葬如例諡慤敬十年十月諭曰原任領侍衛内大臣音徳乃額亦都之孫居心謹厚行已端方朕所悉知似應入賢良祠著詢問九卿具奏尋覆請入祀賢良祠允之乾隆元年加贈一等公子五人策楞納親愛必達阿里衮皆至大臣莽鵠立莽鵠立滿洲鑲黄旗人姓伊爾根覺羅初𨽻䝉古正藍旗曽祖富拉塔居葉赫地天聰時来歸祖莽吉圖崇徳三年隨睿親王多爾衮征明過北京至山東屡敗敵兵克威縣城六年圍明錦州擊敗松山杏山兵又敗洪承疇三營援兵順治元年入山海闗敗流賊李自成追至望都縣叙功授騎都尉三遇恩詔洊晋世職為二等輕車都尉十四年由㕘領擢正藍旗滿洲副都統十五年從征明桂王朱由榔於雲南十七年凱旋追論在軍勘鞫磨盤山敗績事誤坐前鋒統領瑚哩布等罪革一雲騎尉降三等輕車都尉十八年十二月以征雲南時手受礮傷觧副都統任康熈十五年卒莾鵠立於康熈二十八年授理藩院筆帖式四十三年遷内閣中書四十四年授理藩院員外郎五十二年任右翼監督五十八年任滸墅闗監督六十一年十一月世宗憲皇帝御極命協辦理藩院侍郎事十二月擢監察御史以精於繪事諭令恭繪聖祖御容雍正元年正月擢入滿洲鑲黄旗以本族人户另編佐領使管之五月廵視長蘆塩政䟽言長蘆各商行塩地方有額引全不能銷者有額外多銷者苦樂未均請照代銷例准通融運銷并量増引目庶商無包課之累民無淡食之虞下部議行二年八月䟽言雍正元年之引蘆商未領運者十萬餘道臣請寛予展限部議不准良是但衆商實因先運康熈六十一年積引以致元年之引未完請展限二年将現在未完之引毎年帶運一半三四年之内積引可以全完此後年銷年額不至壅滯特㫖如所請山東運學嵗科取文童八名附入府學無廪貢亦無武學莽鵠立請比兩淮河東長蘆一體補廪増按期出貢廪膳銀聼各商自給并添設武學八名從之九月䟽言山東額引順治年間二十三萬道自後生齒日繁額引加増康熈五十七年加至四十五萬五百餘道其節次加増引目未經分别州縣止按引數派散於是易銷之州縣則嫌引少難銷之州縣又苦引多商人苦樂不均未免欠課而東運與長蘆事勢迥異長蘆以一商専辦一州縣之引山東則一州縣多至數十商名毎名或數十引數百引不等此長蘆之法未可行於東省也欲得其平莫如均引請以引多之魚臺等三十一州縣額引减去二萬七千七百道量増于鹿邑等二十一州縣行銷庶商困可甦塩課無欠又以増復引目向係按引分散富商引多者分多貧商引少者分少請照現辦商人三百八十餘名按名均分並得㫖允行三年三月䟽言東省竈丁原額二萬餘額徵丁銀六千餘兩其中有上中下三門九則之分故毎丁有完銀一錢六七分至三錢不等自康熈十八年額定由单報部迄今四十餘年未經編審而户口之消長家産之貧富逈異乃徴収循舊丁多額少者不加増丁少額多者不稍减甚有丁亡户絶額課虚懸則里甲有包貼之累為恤竈計莫若編審請自今逐户清查消耗者開除孶長者増補不分門則按現在丁數均派並遵康熈五十二年恩詔審丁不加賦之例此後五年一編餘丁止令注冊不特窮竈無偏累而灶課亦易徴収矣下部議行五月䟽言長蘆塩政惟竈地一項因久未清查圖冊無存有竈户逃亡荒地被民暗占入民糧者亦有地久典賣于民而糧仍竈户完納歴年久逺竈地失迷惟知糧從户徴得地者種無糧之地失地者納無地之糧民竈搆訟皆由於此臣愚以為宜清查竈地敕直𨽻督臣山東撫臣委員清丈照民地之例造魚鱗冊典賫與民者俱准回贖失迷侵佔之地斷歸竈業並嚴懲恃衿抗糧之竈户以肅法紀庶竈無失業民無争訟場課易完又請禁仕途投拜門生禁主考求索外任門生抽豐並敕九卿議行是月擢大理寺卿留塩政任時直省裁併衛所天津始改衛為州𨽻河間府莽鵠立奏改為直𨽻州分武清静海青縣近津百里之地轄之又言新奉特恩查議東省民丁攤入地畝徴糧竈丁亦應歸入竈地以廣皇仁但東省竈地瘠薄丁多地少若以六千餘兩丁銀加入八千餘兩地糧内毎兩應加七錢有零未免太重且竈地有煎曬之役自應仍足額數不容缺少請以丁銀之半歸入地畝仍以其半於實在竈丁按名均攤則賦額無缺而地糧較輕下部議如所請十二月擢兵部右侍郎仍留塩政任四年五月命御史顧琮廵視長蘆塩政仍命莽鵠立監理七月候補道程之煒條奏雲南塩務上令莽鵠立核議覆奏長蘆之産塩以場雲南之産塩以井事雖不同而大局相似如條奏所云不使竈户有餘鹵餘塩并令井官按日冊報此長蘆現行之例也嚴催場官使塩盡歸坨不使餘剰在灘私梟無所得塩即不使竈户有餘塩之意也某日某商告運某州縣塩若干包分司同批騐所稱掣過闗造冊報查即按日冊報之意也在雲南亦宜行之至如鹽道差親信人各井監查則恐不得其人轉以滋弊不若仍責提舉大使為便下部如議十月調禮部右侍郎先是天津詔設水師建營房限秋間完竣命莽鵠立偕顧琮監督十一月工未竣諭曰莽鵠立正直有守但性偏執本不能而自以為知致将營房遲悮著調補刑部右侍郎来京効力五年三月復署長蘆塩政四月調禮部右侍郎兼理塩政十月命署甘肅廵撫尋實授六年三月題究禮縣武生何登鰲窩盗窩拐並請革知縣周紀等職諭嘉實心辦理時西藏有阿爾布巴等作亂上命大臣領兵往鎮莽鵠立赴西寜料理出口事宜奏言預偹軍需米麪料豆草束及西安解到鞍屉澆薄改製如式拮据無誤而西寜道劉之頊知府江洪以騾失夫逃為總督岳鍾琪㕘革逮問莽鵠立不早察㕘部議降調諭曰莽鵠立市恩沽譽袒䕶属員若舊習不改其罪不止於降調姑從寛留任尋以援赦擬貸盗犯及審案徇庇属員得㫖切責降二級調用觧任回京十月署正藍旗滿洲副都統七年正月擢正藍旗蒙古都統九年七月署步軍統領十年六月調鑲白旗滿洲都統十二月兼管火器營十三年十月署工部尚書十一月調正藍旗滿洲都統自初署副都統時兼管理藩院侍郎事後數遷調仍兼管如初乾隆元年九月卒年六十有五乍疾劇上遣太醫診視賜之葠遺䟽入諭部議䘏賜祭葬如例謚曰勤敏傅爾丹傅爾丹滿洲鑲黄旗人追贈信勇公費英東之曽孫父沃赫襲公爵官都統有𫝊康熈三十年傅爾丹襲三等公兼佐領三十八年授散秩大臣四十二年扈駕西廵駐蹕祁縣鄭家荘上於行宫前閲太原城守兵騎射有卒馬驚近御仗傅爾丹前止其馬擒之下諭曰馬驚逸漸近御仗諸年少大臣俱效年老大臣旁觀不動惟爾直前勒止之可謂繼武前人矣特賜爾貂皮褂一領嗣後益加勉力毋以身為大臣而不思奮力向前也四十三年授正藍旗䝉古都統四十七年調正白旗䝉古都統四十八年授領侍衛内大臣五十四年三月以托疾革領侍衛内大臣職七月命率上黙特兵千赴烏蘭固木等處屯田五十六年正月復授領侍衛内大臣奏請増購農具於本年未播種前送軍前並増遣効力廢員佐屯務議政大臣議如所請三月命為振武将軍率北路大軍由阿爾台襲擊凖噶爾五十七年䟽請與西路靖逆将軍富寜安分路剿賊諭議定師期傅爾丹尋請選兵萬二千偕征西将軍祁里徳賫百一十日糧於五月啟行富寜安請以兵七千賫四十日糧於閏八月啟行議政大臣等以師期不符另議傅爾丹奏言由布魯爾直抵額爾齊斯河與富寜安俱定於七月進剿廷議凖噶爾現遣使来青海已令傳諭䇿妄阿喇布坦應暫停俟回奏仍飭兩路繕兵防守先是奉㫖於烏蘭固木及科布多築城衛喀爾喀逰牧上以傅爾丹等駐北路久稔地形敕相度具奏其設驛同遣往之員外郎保住詳議五十八年正月䟽言鄂勒齋圖郭勒土肥寒暑與内地同宜築城貯糧保柱已從殺虎口至彼詳視宜設站三十六諭曰鄂勒齋圖郭勒居喀爾喀游牧地方之中與大兵駐劄處相隔千里今欲䕶衛喀爾喀應於阿爾台科布多等處築城逺立哨兵方是傅爾丹既奏鄂勒齋圖郭勒應築城貯糧或於科布多另築一城駐兵看管充發人等耕種著同保柱及喀爾喀王貝勒公等㑹議尋覆奏科布多地隔大河水漲輙阻材木難致近科布多有察罕廋爾水草佳距鄂勒齋圖郭勒千里兩地宜各築城一城置屋二千間自鄂勒齋圖郭勒至察罕廋爾設十一站允之四月命即軍中自授章京等官五十九年六月率兵八千由布拉罕進剿九月䟽報大兵抵格爾額爾格凖噶爾棄帳械驚潰臣等分兵追及之斬二百餘級擒宰桑貝坤等百餘盡降其衆又偵烏蘭呼濟爾為彼屯耕所躪之盡焚其糧草整隊而還報聞雍正元年命撥兵赴巴里坤以傅爾丹兼統祁里徳軍三年率京兵遝授内大臣四年授黒龍江将軍五年五月䟽言墨爾根城舊有額兵九百並無鎗礮船隻請増選漢軍兵百名合為一千置舟械操演下議政王大臣議行十一月諭曰傅爾丹乃勲舊大臣之裔伊在阿爾台一路将軍任内効力有年因辦理錢糧事務不清以致應賠銀兩甚多此乃管辦錢糧人員不妥故為所累傅爾丹自署理黒龍江将軍事務以来竭誠辦事効力勤勞伊名下應賠銀兩俱從寛免六年授吏部尚書賜兩眼孔雀翎七年剿噶爾丹策凌詔以傅爾丹為靖邉大将軍由北路出師賜御用朝珠及黄帶紫轡銀五千兩尋加少保八年三月噶爾丹策凌奉表請獻叛賊羅卜蔵丹津諭傅爾丹暫緩進兵同西路寜逺大将軍岳鍾琪来京㑹籌軍務十二月還軍營九年二月䟽言北路遵㫖築城科布多地勢接布魯爾與庫列圖近為進兵孔道請仍於此築城大學士等議如其請六月奏言臣統大軍抵科布多據守卡侍衛巴爾善等擒凖噶爾一人曰塔蘇爾海丹巴詢之云噶爾丹策凌發兵三萬令大䇿凌敦多卜小䇿凌敦多卜等分領由阿爾台山竒蘭犯我北路今小䇿凌敦多卜已至察漢哈達而大䇿凌敦多卜因噶爾丹策凌妹夫羅卜藏䇿凌向駐阿里瑪圖沙喇擘勒防哈薩克今與噶爾丹策凌隙率三千餘户來投追者為所敗以是大策凌敦多卜尚未至臣思賊兵未集當乗其不偹襲之選兵一萬輕装由科布多河西分三隊於六月初九日進剿前鋒統領定夀等領第一隊㕘贊馬爾薩等領第二隊臣以大兵繼進掩擊令都統衮泰等以兵七千三百築城都統侯陳泰等以兵五千駐科布多河東扼通竒蘭要路又奏定夀擒賊巴爾塔等十二人扵扎克賽河據云距察罕哈達止三日程凖噶爾兵不過千人尚未立營臣即乗夜往襲奏入報聞七月奏言臣等於六月十七日獲凖噶爾偵者云博克托嶺有賊二千駝馬萬餘臣遣㕘贊蘇圖副都統戴豪等以兵三千往剿十八日遣定夀以兵千五百援與賊陣於庫列圖嶺斬四百餘級賊驅駝馬踰嶺遁十九日定夀蘇圖等與臣合二十日賊二萬餘從髙阜衝我營督戰殺千餘賊副都統塔爾岱馬爾齊以兵二千奪西山二十一日因賊據險我移營於和通呼爾哈諾爾定夀蘇圖及㕘贊覺羅海蘭副都統常禄西彌頼據山梁之東塔爾岱馬爾齊據其西副都統承保居中䇿應㕘贊馬爾薩由東路公逹福戴豪在前副都統舒楞額土黙特公沙津達頼等䕶後營甫移賊犯梁東西兩軍定夀等力戰殺賊忽大風雨雹被圍臣遣兵救出塔爾岱又遣承保援定夀等㑹日暮未觧二十二日海蘭突圍出定夀蘇圖馬爾齊自盡常祿陣殁西彌頼令索倫兵援定夀潰亦自盡二十三日賊連犯大營臣督軍力戰斬賊五百餘沙津達頼等及察哈爾兵皆潰惟滿洲兵四千不動二十四日隨印侍郎永國及海蘭戴豪俱自盡臣等以兵退步設方營䕶輜重令塔爾岱舒楞額殿承保統右翼馬爾薩統左翼臣與副将軍巴賽查弼納往来廵軍副都統徳禄捧敕印行賊衆三萬蜂集我且戰且退殺賊千餘達福殁於陣二十八日渡哈爾噶納河賊猶追衝左翼復擊斬五百餘七月朔日臣等還科布多築城處我兵陸續歸營者二千餘臣遣迎未歸諸将惟塔爾岱負創至巴賽查弼納馬爾薩舒楞額皆陣歿臣輕舉妄動以至敗績請立正典刑奏入諭曰此舉損兵敗績雖属有罪朕覧爾等之竭蹷力戰寛恕其罪痛惻難忍不覺淚下将朕親束之帶賜與傅爾丹繫之爾等忿激之下急思報復恐又妄動賊人雖來不可輕進追擊但能相機堅守即爾等之功科布多地方若難固守可回至察罕廋爾駐劄今已授馬爾賽為撫逺大将軍領兵前来到時爾等公同商酌辦理八月奏言臣世受國恩復蒙授大将軍重任不能遵奉聖訓妄舉損兵非惟國法不可緩死即臣心亦難以偷生皇上不即加誅降㫖慰諭復加賞賜實從古未有之鴻慈臣此次進軍失利弁兵被傷於時若不鼓勵将士収軍而回轉使賊人得計乃籌議力衛餘軍轉戰而出至建城處臣已安置哨站並𫝊諭喀爾喀副将軍等運糧固壘乞皇上速遣賢将統率大軍将臣調回與妻子一併正法諭曰朕從前諭㫖甚明朕之處事豈肯不持大義以定是非而聊為目前慰勉之理惟輕信賊言冐險深入中賊詭計是爾之罪至不肯輕生自殺力戰全歸此爾能辨别輕重之處事定之後朕自有辦理之道爾若念慮紛擾以致血氣消耗不能報讐雪恥上損國威下玷家聲罪尤甚焉爾其勉勵勇氣安心静攝計圖逺大以答朕恩九月奏偵大䇿凌敦多卜在華額爾齊斯謀由必濟掠䝉古㳺牧其地與巴里坤甚近詔西路嚴備又言賊犯黄甲舒魯克距科布多城五十餘里臣已将馬匹牲畜収入城固守仍相機擊之命振武将軍順承郡王錫保𫝊諭傅爾丹撤兵同駐察罕廋爾十月諭傅爾丹曰爾等在科布多地方恃勇輕進堕賊詭計致失地利損兵折将軍前獲罪我朝例所不貸本應執法究治但傅爾丹整頓餘兵回至科布多固守城池賊衆并力来犯復能列陣以待賊人逺遁隨即遣兵各處截殺奪回被掠馬駝此次擊賊可贖爾等前罪今朕已盡行寛免嗣後須黾勉効力朕自格外加恩是月傅爾丹至察罕廋爾軍營命以錫保為靖邉大将軍傅爾丹仍掌振武将軍印協辦軍務諭大學士等曰爾等可𫝊諭傅爾丹伊原與順承親王不合王諸事並無過失近日傅爾丹輕進以致虧損官兵若大将軍印務仍命管理非但衆心不服即傅爾丹心亦不安伊既失䝉古等之心即緑旗兵丁亦未必孚信伊所恃者惟數索倫耳豈知首先潰散幾致伊於危殆者非索倫乎順承親王諸事遵朕指示領大兵在察罕廋爾賊夷懼其聲威不敢侵擾旋即敗遁朕今令𫝊爾丹為王協理以贖前愆至殱賊立功惟王是頼傅爾丹宜悉心盡力以圖報効若仍執前見妄存私意與王不和不但無益國家傅爾丹恐益増罪戾矣十年七月順承親王錫保奏賊来侵烏遜珠勒傅爾丹等接戰數次敗賊前隊及賊後隊全至衝突我師失利還歸大營諭曰傅爾丹領兵萬餘既已敗賊前隊則後隊自宜敗去如何我師遂被衝散回營用兵失機罪在不赦去嵗𫝊爾丹冐昧進剿損傷官兵迨回科布多時尚能整頓軍旅邀截賊衆是以特恩寛免其罪理應竭力報効冀雪前恥何以又致僨事倘因賊衆我寡恐有踈失相機回營尚属可原若係輕躁懦弱以致失機即應革職嚴加議處著順承親王秉公詳查據實陳奏八月錫保奏傅爾丹並不預籌堵禦輙輕調兵進剿以致有誤軍機詔革領侍衛内大臣振武将軍及公爵十一年二月錫保續㕘傅爾丹于烏遜珠勒遇賊並未身先督戰致士卒怯走軍機大臣議覆應付三法司定擬時上詢知烏遜珠勒之役鍚保奏稱撥兵一萬而所到之兵實僅三千且留傅爾丹于軍營致賊越克爾森齊老遇額駙䇿凌兵始敗走諭曰烏遜珠勒對壘情形朕曽細問額駙策凌傅爾丹情罪尚有可原著從寛免其治罪留軍營効力贖罪十二年四月北路副将軍額駙䇿凌入覲傅爾丹隨大将軍平郡王福彭赴科布多總統弁兵十三年八月辦理糧餉額外侍郎伊都立及軍營辦事侍讀學士蘇晋侵蝕分肥事覺詞連傅爾丹婪虐等欵命侍郎海望拏觧来京並追論和通呼爾哈諾爾及烏遜珠勒失機罪九月今上御極諭曰傅爾丹除貪婪等輕罪外第一是和通呼爾哈諾爾所犯之罪甚大伊身係統轄兵丁之大将軍乃不能収拾衆心復與大臣等不睦且不能約束以致失機將官兵損折皆傅爾丹之罪與岳鍾琪無異著将伊監禁俟該部奏請時再派大臣等審訊十月王大臣等覆鞫依律擬斬决得㫖傅爾丹等失誤軍機負恩欺罔之罪不可勝数本應即正典刑以彰國法但我皇考從前未即降㫖今朕仰體皇考遲回降㫖之意著改為斬監候乾隆四年與岳鍾琪均蒙恩釋放十三年四月特授内大臣䕶軍統領馳赴金川軍營並命其孫哈寜阿隨往一體馳驛八月署川陕總督同岳鍾琪辦理軍務諭曰川省自瞻對用兵而後繼以金川之役慶復踈縱於前張廣泗怠弛於後曠日持久師老無功朕特起爾等於廢棄之中委以軍機重任今訥親張廣泗俱已召取回京軍中事務聽汝二人辦理事􅁠歸一當合兩人為一人合兩心為一心汝二人自思曩受皇考異数殊恩歴膺重寄其後干犯重辟者何事即釋放家居而敗辱之名終身不能湔洗今棄瑕録用予以自新之路當如何感激奮勉如何竭力報稱如果能克捷速奏蕩平豈但収之桑榆前恥可雪皇考厚恩向所未能報効者亦足仰酬萬一顯爵厚禄朕何吝焉是惟汝二人之福如其彼此各存意見不能鼔舞軍心以致公事不能就緒不獨軍法難逭将併前罪一體追問非慶復張廣泗可比汝二人當日同獲重罪今又同在一方勝則同其功負則同其咎務期協力和衷同心籌畫迅奏膚功以稱委任十月奏請増調滿漢官兵並言破險摧碉必資利器臣前在北路軍營見滿兵俱用絲綿長甲抵禦鎗子頗覺有益又糌粑拉烏鎗質輕形短能致逺於山林宻箐中背負亦便請多製應用軍機大臣議行時大學士傅恒奉命為經畧奏傅爾丹年近七旬精力就衰惟熟于管理滿兵請令専辦營盤諸務十四年正月命為㕘賛㑹金川酋莎羅奔朗卡乞降傅爾丹辦理納降及班師事宜四月授黒龍江将軍十七年卒諭曰傅爾丹宣力有年今聞溘逝朕心深為憫惻著加恩賞銀一千兩辦理䘮事應得䘏典該部察例具奏尋賜祭葬如例諡温慤子二長兆徳次哈達哈相繼襲公爵哈達哈别有傳欽定八旗通志卷一百四十
