body:
  text: 職官志五職官内務府上駟院内内務府奉宸院武備院盛京務府鑾儀衞内務府領侍衞府御前侍䘙内務府上駟院上駟院兼管事務大臣無定員卿二人正三品初名御馬監順治十八年改為阿敦衙門以大臣侍衞等官管理無定員康熙十六年改為上駟院三十三年額設堂官一人雍正六年定為三品卿職乾隆十四年定為卿二人由侍衞補授一人由内務府司官補授一人堂郎中一人主事二人委署主事一人左司員外郎二人主事一人委署主事一人右司員外郎二人主事一人委署主事一人筆帖式二十二人康熙十六年設員外郎四人主事一人二十四年設郎中一人増設員外郎二人三十三年分為左右二司増設主事三人三十八年裁員外郎二人五十九年設委署主事三人雍正元年増一人尋省乾隆二十二年仍設委署主事三人筆帖式康熙十六年以來陸續増置阿敦侍衞二十一人係頭二三等侍衛司鞍三人係藍翎侍衞厩長十七人係七品文職牧長五人係七品文職副牧長五人係九品頂戴牧厩副四十五人䝉古醫生頭目三人六品職銜康熙三十三年設辦理堂務上駟侍衞四人辦理二司事務各二人從増設七人乾隆二年増設六人厩長牧長以下康熙十六年以來陸續増置内務府奉宸苑奉宸苑兼管事務内大臣無定員卿二人正三品景初山瀛臺事務屬尚膳監康熙十年以内務府總管管理十六年歸併都虞司二十三年設奉宸苑仍以内務府總管管理印信雍正六年設奉宸苑堂官定為三品卿職乾隆十四年定為卿二人由侍衞補授一人由内務府司官補授一人郎中二人員外郎四人主事一人委署主事一人苑丞十二人初正八品乾隆三十六年定為六品職銜食八品俸苑副十九人筆帖式十五人玉泉山稻田厰掌庫一人正六品筆帖式三人康熙三十三年設郎中一人乾隆十六年増設一人員外郎主事俱康熙二十三年設委署主事四十年設雍正十二年裁乾隆二十二年仍設苑丞初設催總二人雍正二年以後陸續増設乾隆十國七年改名總領二十四年改為苑丞筆帖式初以來先後増置南苑郎中一人員外郎二人主事一人委署主事一人苑丞七人苑副十三人正六品筆帖式五人初屬内監管理順治十八年屬採捕衙門康熙二十三年歸併奉宸苑員額順治十八年以來先後増置圓明園管理事務大臣無定員郎中一人協理事務郎中一人主事一人委署主事一人苑丞六人六品苑副十七人七品五人八品六人九品六人筆帖式九人庫掌二人六品一人七品一人長春園熙春園綺春園春熙園管理事務員外郎一人苑丞三人六品二人七品一人苑副九人七品八品九品各三人筆帖式四人暢春園管理事務郎中一人苑丞四人六品一人七品三人苑副六人署苑副十六人委署苑副五人筆帖式六人清漪園兼管大臣無定員辦理事務員外郎一人苑丞四人六品苑副十人七品八人八品二人委署苑副六人筆帖式四人静眀園兼管大臣無定員辦理事務員外郎一人苑丞二人六品一人七品一人苑副六人八品委署苑副四人筆帖式二人静宜園兼管大臣無定員辦理事務員外郎一人苑丞五人六品三人七品二人苑副八人七品二人八品六人委署苑副十人筆帖式三人拜唐阿十二人圓明園員額雍正三年以來先後置設暢春園員額康熙年間定清漪園員額乾隆十六年以來陸續増定織染局郎中一人員外郎一人内管領一人五品由總管大臣奏委司庫一人六品筆帖式三人庫使六人司匠二人拜唐阿六人順治十八年設康熙三年歸内務府管理乾隆十六年移織染局於萬夀山初設員外郎一人乾隆十六年裁以三年以萬夀山總理大臣兼管司庫以下員額康熙後陸續増定内務府武備院武備院兼管事務大臣無定員卿二人正三品武備院初名鞍樓以侍衞三人員外郎等官掌理順治十一年改為兵仗局十八年改為武備院康熙五年𨽻内務府十五年分為鞍庫甲庫毡庫共三庫三十七年分鞍庫為北鞍庫南鞍庫雍正三年以掌理侍衞定為正三品卿職乾隆十四年定為卿二人由侍衞補授一人由内務府司官補授一人郎中一人主事二人委署主事一人郎中康熙二十一年設主事康熙十六年設委署主事康熙六十一年設後省乾隆二十二年復設筆帖式二十八人四庫各三人沙河氊作二人北鞍庫員外郎二人庫掌二人署庫掌一人􅏛房掌蓋三人初為正六品乾隆四十四年定為戴藍翎署掌蓋三人正八品帳房處司幄三人三等侍衞銜食六品俸署司幄三人六品職銜食七品俸鞍板司匠一人正八品南鞍庫員外郎二人庫掌二人署庫掌一人熟皮作司匠一人正八品康熙十五年設鞍庫員外郎等官三十七年分為南北二庫四十三年添設員外郎二人初設􅏛帳房頭目匠役催領等員乾隆二十四年改為掌蓋司幄司匠員額均先後増定甲庫員外郎二人庫掌二人署庫掌一人亮鐵作司匠三人員額康熙十五年以後陸續增定氊庫員外郎二人庫掌二人署庫掌一人沙河氊作司匠一人司弓三人六品職衛食七品俸署司弓三人八品司矢三人同司弓署司矢三人同署司弓骲頭作司匠一人靴皮作司匠一人康熙十五年設員外郎及弓匠協領備箭協領等員乾隆二十四年弓匠協領改為司弓備箭協領改為司矢稽察内務府事務御史衙門監察御史二人筆帖式八人盛京内務府鑲黄正黄正白三旗佐領各一人驍騎校各一人營造司催長二人廣儲司承管司庫二人庫使十六人兼領三旗織造庫催長三人筆帖式三人掌儀司承管催長二人筆帖式一人廣寧司承管催長一人都虞司承管催長二人筆帖式一人㑹計司承管催長二人筆帖式一人堂主事一人委署主事一人筆帖式六人文溯閣催長二人管理