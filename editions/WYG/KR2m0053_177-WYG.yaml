body:
  text: 人物志四十三大臣傳二十九滿洲正白旗八徳福伊勒圖三格特觀保滿額森阿㤗珠爾格徳台斐英阿三格三格滿洲正白旗人姓棟鄂父納親官至副都統乾隆二年三格由生員授藍翎侍衛洊授二等侍衛十八年遷鑲白旗䝉古副都統十九年四月調三姓副都統五月調黒龍江副都統尋命領索倫巴爾呼兵三千赴西路軍營二十年四月分領第三隊索倫兵由西路進𠞰六月同都統䇿楞駐巴里坤辦事八月逆賊阿睦爾撒納叛其黨阿巴噶斯哈丹掠台站諭同䇿楞防𠞰九月仍留駐巴里坤時䇿楞為㕘賛大臣奏俟兵械齊進𠞰上以䇿楞怯懦逮問三格係領隊大臣一意推諉亦革職留軍營効力二十一年二月管理特納格爾台站諭曰三格自革職後効力軍營尚屬黽勉著加恩給副都統銜以示鼓勵九月補正白旗蒙古副都統十一月以兵二百接阿卜達禮托賴及阿察郭勒台站擒戮呼爾璊賊衆五十餘十二月𠞰呼爾璊台吉賽音伯勒克等㳺牧於喀拉烏蘓盡収其駝馬諭部議叙給三等輕車都尉世職尋隨大軍赴木壘烏蘭烏蘓科舍圖搜緝叛賊巴爾雅及札哈沁㳺牧得㫖嘉奨賜玉韘荷包鼻煙壺二十二年三月同侍衛圗倫楚竒徹布等由朱爾都斯進𠞰先是定邉将軍成衮扎布檄三格追叛賊那扎噶爾布未成擒九月我兵至博羅和羅遇叛黨額林沁達瓦等百餘戸三格突撃之適布魯古特台吉琿齊呼爾璊台吉達瓦斬扎那噶爾布赴總管端濟布營詐降並請招額林沁達瓦三格信之遽撤兵還未㡬琿齊等遁敕将軍兆恵勘奏兆恵奏三格受欺状命革副都統及世職以兵丁効力二十三年隨將軍兆恵𠞰逆賊霍集占扵葉爾羗至黒水被圍偵賊輜重積城南謀由城東渡轉戰往取賊旅拒三格與原任前鋒統領鄂實侍衛特通額總兵髙天喜力戰俱歿扵陣事聞諭曰三格奮勇殺賊盡瘁捐軀深為憫惻著照伊原任副都統從優議䘏尋賜祭𦵏入祀昭忠祠諡剛勇給騎都尉兼一雲騎尉世職以其子薩炳阿襲二十五年命圖形紫光閣御製賛曰琿齊潜遁踈防降謫從軍贖罪每戰必力黑水殞命豁罪論功圗像紫光表忠無窮觀保觀保内務府正白旗滿洲人姓索綽絡乾隆二年進士改庶吉士四年散館授編修六年五月充雲南鄉試正考官十二月在南書房行走八年二月充日講起居注官四月遷侍講九年十二月提督安徽學政十二年詔留任十三年五月轉侍讀六月遷國子監祭酒閏七月擢内閣學士八月署刑部侍郎十四年正月兼國子監祭酒充經筵講官十二月授兵部侍郎仍署刑部侍郎十七年充武㑹試正考官二十年在尚書房行走二十二年六月教習庶吉士十二月兼管正白旗滿洲副都統二十五年充浙江鄉試正考官七月教習庶吉士二十六年三月充㑹試副考官六月國子監将報滿教習沈若木引見摺内既引吏部原議或以教職或以知縣用恭候欽定又聲叙該員係進士曽經歸班以知縣選用上以祭酒陸宗楷有心取巧觀保等扶同具奏下部嚴議尋部議陸宗楷觀保俱請革職得㫖從寛留任二十七年五月調吏部侍郎兼翰林院掌院學士閏五月教習庶吉士八月充順天鄉試副考官二十八年以吏部侍郎管理兵部侍郎二十九年二月調兵部侍郎奏言講官恭纂記注例扵内閣查上諭絲綸外紀各檔敬謹編輯其添叙事由以所貯六部通政司副本為據兼查六科存注紅本各部院陞補官員及自行陳奏事件由各衙門造冊送館必冊檔詳眀紀載方為詳核乃奉行日乆所送冊檔漸圖省便多有脱遺咨查需時請敕各部院衙門扵每年正月将上年事件詳細造冊派員查閲送館得㫖允行三十年七月授左都御史三十一年正月北城御史素爾訥奏北城文移檔案皆另貯城外控呈俱在漢御史家投逓非慎重公事之道上命觀保等查奏尋覆奏北城案卷自乾隆二十六年後俱貯書吏家餘四城查問廵視各員均蔵公署應令北城将案卷查存公署廵城御史交部察議書吏責革至尋常事件各城原在署接收設遇𦂳急事件彼此觀望必致遲悮請無論滿漢準其接収即日㑹同商辦上責其所查糊塗命軍機大臣詢問辦理另奏大學士公傅恒等查奏五城文移檔案俱不存貯公署該堂官查問時朦混回覆請将廵視中東西南四城御史交部嚴處五城滿漢御史應毎日進署控呈公同辦理遇昏夜𦂳急事件始準私宅接收次日㑹辦得㫖俞允三十二年教習庶吉士三十三年四月兼署禮部尚書十月吏部司員姚左垣馬道周議處山西學政吕光亨失察逆犯張廷端但呈照馮鈐從寛革職留任例扵吴華孫李宗文實降之案並未查送上以其避重就輕下都察院議處觀保将姚左垣等議照推諉遺漏例降抵罰俸上責其徇庇下部嚴處部議革任得㫖寛免十二月調補禮部尚書兼鑲白旗䝉古都統三十四年二月侍郎邁拉遜查奏咸安宫官學教習曠功上責觀保管理官學日乆並不實力整頓下部嚴察議奏部議革任詔免之十月國子監遺失書籍交部嚴議部議革任諭曰公過處分邇年率從寛予以留任使衆人見因公議處仍得安享高官益増其不肯實心任事之念觀保自用為部院大臣兼管旗務二十餘年於各任内應辦之事從未見其認真經理虚有其表毫無實際非國家得用之人何必令其徒曠職守著革任仍在尚書房行走十二月署左都御史充經筵講官三十五年五月諭曰八阿哥並未具奏入城觀保以阿哥師傅不行勸阻甚屬非是著革職八月授左都御史仍帶革職留任充順天鄉試副考官三十六年三月充㑹試副考官五月充國史館副總裁三十七年二月上御經筵觀保進退失次不能終講命革去頂帶從寛留任三十九年七月兵部侍郎高樸奏内監高雲從洩道府記載觀保與侍郎蒋賜棨吴壇在九卿班私論道府記載優劣諭曰觀保屢次獲罪本一庸材更何心靦顔論事而蔣賜棨吴壇皆新進平等材具祗宜恪勤供職何可于九卿班上議論道府朕扵用人黜陟權不下移豈在下所能窺測伊等議論優劣其意何居且其所議論者何事何人觀保蒋賜棨吴壇身為九卿豈宜如此多事俱著革職交刑部查審並著伊等各将議論情節眀白録供由刑部堂官具奏越日又諭曰硃批記載乃皇考世宗憲皇帝留意人材以備隨時録用實屬法良意美所當永逺遵守至于所用道府亦不過照例補放或後經督撫㕘劾朕亦從無庇䕶若其中果有才本平常或夤縁倖得九卿等確有實據不妨據寔㕘奏朕必為嘉奨又何所容其私相議論乃觀保等既不能指實直陳徒于班聫上妄行竊議意欲何為況觀保本屬庸材屢經䕶譴蔣賜棨吴壇甫經擢用宜恪勤奉職又何假評論人材乎嗣經大學士舒赫徳等覆鞫請加刑訊諭曰觀保等眀知交結内監探聴記載情罪重大冀圖躱避重譴不肯供認設伊等果無其事髙樸何能凴空揑造至所稱九卿同在一處不敢妄行私議九卿盡在豈肯盡為隠瞞之語更屬荒唐此等口舌案件原無凴據九卿等誰不欲置身局外此時即問之九卿又孰肯為之質證况九卿除觀保等外豈無探聴記載未經髙樸指奏之人朕亦不屑因此一一窮治遽興大獄也至刑部請㫖刑訊殊屬無謂伊等皆一二品大員即加刑訊亦不過用刑套問虛應故事伊等若復堅供如前刑部又如何辦理豈因觀保等不肯承認轉将髙樸訊究坐以誣奏之罪尚復成何事體且此後誰復肯以衆人情偽據實直陳耶觀保等探聴記載竊議道府優劣一節伊等雖狡詞隠飾揆之于理其肺肝自不能掩朕今亦不復窮究試令觀保等捫心自問又豈能盡昧天良乎髙雲從現已照御前大臣及行在刑部所擬即行正法所有觀保等一案著交刑部按律定擬具奏尋問擬斬候九月諭曰觀保蒋賜棨吴壇身為大臣不知安分奉職輙敢私議道府優劣蒋賜棨吴壇甚有向太監髙雲從探聴記載之事其罪均無可逭幸當朕勵精圖治朝政肅清之時伊等尚不敢任意妄為否則不知何所底止是以不得不為審訊以飭綱紀但念其尚無交通結納行賄營私大弊觀保蔣賜棨吴壇俱著加恩釋放觀保著以無頂帶人仍在阿哥書房行走効力贖罪四十一年卒諭曰觀保在尚書房行走有年尚屬小心勤謹今聞其患病溘逝著加恩給還左都御史原銜徳福徳福滿洲正白旗人姓伊爾根覺羅初任刑部筆帖式乾隆二年授堂主事八年遷員外郎十二年遷郎中十三年授浙江金衢嚴道十五年調杭嘉湖道十六年遷浙江按察使疏言浙省沿海知縣員缺以縣丞陞補者向例三年報滿即得與乆任知縣一體題陞未免過優嗣後應先令試俸二年果稱職寔有政績方准寔授再三年俸滿方准題陞下部議行十七年遷湖北布政使十八年調廣西布政使二十一年調福建布政使二十七年四月疏言各省軍流人犯照道里表安置福寧府屬者至二百餘名恐聚處滋事請各省應發福寜府屬軍流人犯觧赴巡撫衙門勻撥安置不必徑觧福寧府從之七月命往阿克蘓辦事三十年閏二月烏什回人以副都統素誠苦累激變㕘賛大臣納世通調官兵及布魯特人往𠞰徳福以阿克蘓庫貯軍器火藥無㡬恐各城官兵至不敷配給行文喀什噶爾葉爾羌速由台站運送並催令伯克色提巴勒底赴阿克蘓辦事疏至諭曰軍噐火藥自屬𦂳要但各城大臣既領兵㑹𠞰自必携帶豈有専俟阿克蘓預備之理况此時各台站俱有回人保無心懐叵測妄行攘奪徳福何見不及此再所奏阿克蘓辦事不可無大伯克因行文楊應琚等催色提巴勒底于入覲歸途之便馳驛速赴該處尚屬可行色提巴勒底抵阿克蘓日即留彼辦事尋伊犁將軍眀瑞抵烏什查奏納世通弁塔哈妄自尊大任用辦事之七十四等並多派回人服役即大伯克亦令向伊長跪當小伯克頼黑木圖拉倡亂城内回衆尚未盡變弁塔哈遽用鎗礮攻城以致回人出拒倉卒敗北及領隊大臣觀音保赴援而納世通等復派回人二百供官兵薪水役且賦税更較伊犁各城為重烏什之亂寔因擾累所致疏入弁嗒哈納世通于軍前正法諭徳福與弁塔哈同在阿克蘓辦事俱無端緒令眀瑞定擬具奏尋議革職諭曰徳福同弁塔哈在阿克蘓辦事弁塔哈妄自尊大徳福未能規正每相附和又將無闗𦂳要事件由六百里馳奏弁塔哈既以失機正法徳福亦應治罪因諭眀瑞等定擬具奏但其獲罪情由尚不至如弁塔哈之甚徳福著革職發往伊犁効力贖罪三十三年七月授刑部員外郎旋授湖北按察使三十五年三月署湖南巡撫十月署四川總督三十六年正月暫署雲南總督疏請将永順鎮屬龍陵營騰越恊南甸汛缺額兵就近于永順鎮標及騰越恊營舊存兵内選補足額其原營額缺原營如數募補又奏永昌府龍陵㕔東西界騰越保山南界宛頂大渡昆連潞江遮放芒市三土司袤延九百餘里同知一員未免顧此失彼請将鶴慶州觀音山巡檢移駐龍陵専司監獄捕務以資佐理均下部議行又疏劾提督常青偷安違例乗轎營兵缺額乆不募補上以彰寳在雲貴總督任曽面奏常青有褒無貶勅令眀白回奏彰寳覆奏常青辦理邊務認真尚無驕縱劣蹟疏入報聞又奏土司田賦輕民人貪利典買夷人生計日絀經大學士傅恒曽于善後事宜案内奏准凡民人典擺夷田畆限年退歸彼時只查辦闗外干崖盞達南甸隴川猛夘􅃒放芒市七處潞江土司居騰越腹地差役尤繁田多被民誘典應飭永昌府諭令首報酌原價多寡限十年八年為率收租已敷原本即将原産退還夷人以後永禁典押夷地違者治罪上從之五月授四川總督諭曰滇省軍營應辦諸務徳福若有所見不妨具摺陳奏徳福因宻陳闗外﨑嶇瘴癘我師難以襲撃􅃡甸状諭曰徳福至四川所陳緬賊各情形一摺識見乖謬􅃡地水土惡劣我兵難于罙入自不宜復議大舉墮其術中而賊匪反覆頑梗亦豈可竟置之不聞因議于秋冬之間派兵襲撃出其不意並非欲直搗阿瓦亦非欲竟取猛宻不過躪彼疆境乗勢誅掠焚燒令賊匪知我並未歇手庶㡬稍知畏懼送還内地之人以完此局就事而論寔有不可不如此辦理者何至過于顧慮襲撃亦不可行耶前諭徳福到川即接受總督印辦理小金川軍務若執此懦怯庸謬之見恐其扵進𠞰事宜轉致貽悮徳福著即来京候㫖又諭曰徳福前在阿克蘓辦事曽獲罪譴經朕棄瑕録用數年之内由臬司簡任巡撫因其尚知寔力奮勉復加恩擢用總督乃甫至四川即意存自滿全不似向年之寔心任事且敢逞其乖謬之見借滇省事宜欲以諷諭罷小金川之事夫小金川畨酋僧格桑去年秋間與沃日土司搆衅侵擾經阿爾㤗前往曉諭僧格桑即遵守約束歛跡歸巢彼時以畨蠻互相仇殺乃其常事且既已遵諭退回原可無庸再辦曽未半年而僧格桑復敢乗間圍攻沃日且及眀正土司此豈可復以口舌化𨗳若不用兵擒𠞰使畨衆知儆何以申威令而靖邊隅乃阿爾㤗辦理此事毫無㝎見惟圖遷就完局因令徳福即赴川督之任恊同妥辦冀其經畫得宜尅期集事孰意徳福尚未接印即生畏事之心希欲阻撓軍務妄奏取巧深負朕委任之恩著革去總督賞給三等侍衛以己力前往伊犁聴候委差四十年十月命回京署刑部侍郎四十二年二月署倉場侍郎七月實授十月擢刑部尚書四十三年七月兼署禮部尚書八月兼署鑲藍旗滿洲都統四十四年正月兼署左都御史五月命協同尚書福隆安留京辦事四十六年二月暫署兵部尚書五月疏言旗人置産向在兩翼監督税契民人置産則在大宛二縣近旗下家奴置産防家主知覺潜赴大宛税契旗員亦多隠旗籍赴縣納税請嗣後旗人無論官員閑散家奴凡置房産概令呈眀本管佐領赴左右翼監督衙門税契如私赴兩縣者以違制論官員交部議處閑散家奴鞭責仍令補税換照廷議從之七月疏請将都司以下官記名者俟扣滿二年方准陞用再扣二年令督撫出具考語送部引見得㫖此等人員自奉㫖記名後兵部向例扣足二年即予陞用再扣二年後遇有應陞缺出又復遞用似此按年遞陞殊覺過驟嗣後㕘將副将等官記名者仍照舊例交軍機處辦理外其逰擊以下人員交兵部記名者統限扣足三年准予陞用一次所有該員記名之處即行註銷著為令九月卒諭曰刑部尚書徳福老成歴練宣力有年兹聞溘逝深為軫惜應得䘏典著該部察例具奏尋賜祭塟如例諡勤肅子榮柱官至奉天府府尹以不親往查灾革任伊勒圗伊勒圗滿洲正白旗人姓納喇乾隆九年襲世管佐領授三等侍衛累遷侍衛班領二十四年授鑲紅旗䝉古副都統赴烏嚕木齊辦事二十五年調駐阿克蘓二十九年回京襲其祖噶都渾所遺雲騎尉世職三十年赴阿克蘓辦事三十二年五月授伊犁㕘贊大臣八月調駐哈什哈爾三十三年三月授正白旗䕶軍統領署伊犁将軍事六月授理藩院尚書七月授伊犁将軍九月授領侍衛内大臣十月丁母憂回京三十四年三月授副将軍赴雲南軍營恩賞銀千兩治装十月隨經畧大學士傅恒分路進軍賊衆潜至戛鳩江灘築寨伊勒圗偕㕘贊大臣阿里衮攻其西岸奪寨三殺賊五千餘獲噐械無算得諭初次即獲勝覧奏欣慰十二月撤兵還京三十五年正月授兵部尚書二月授伊犁将軍六月疏言土爾扈特汗渥巴錫台吉䇿伯克多爾濟並舍楞等率部衆三萬餘戸来歸先期遣使至伊犁具書通欵自言為阿玉竒汗正系向居俄羅斯地願為臣僕乆不獲間今自彼逸出行萬餘里六閲月始抵卡倫乞准入覲以伸積誠渥巴錫等尋先後至伊犁上以土爾扈特向化歸順命伊勒圖加意撫綏俾得所詳見御製土爾扈特歸順及撫恤二記七月以前雲南撤兵時並未請罪現又奏凉州莊浪兵應賠馬價銀令挑補原缺之熱河兵丁代扣兩經部議革職得㫖留任十二月疏言伊犁現由哈薩克布嚕特来投誠之厄魯特甚多請増佐領從之三十六年正月疏言内地重犯及蒙古厄魯特回犯應照人數派兵觧送如哈薩克布嚕特等犯除特派官押送外仍派兵遞解至交界處取接收官結方回有疎脱即将該官兵治罪原派押觧官㕘處議如所請七月命往烏什辦事授㕘贊大臣十月調赴塔爾巴哈台十一月疏言塔宻爾向設部院章京一把總一緑旗兵二十喀拉喀兵十管理貿易漢人官兵所需糧米即由其看守之倉庫内支領領完後湏從烏里雅蘓台運取今塔宻爾貿易漢人無多年乆並未生事若特留官兵防守不惟糜餉又生交接之繁請裁汰各令本處當差其倉庫所餘銀米運送烏里雅蘓台備用軍機大臣議行旋因舒赫徳劾領隊大臣鄂津私用隨甲種地引屯田水灌私田褫鄂津職伊勒圗乆任将軍並不紏叅又鄂津擅動官駝賣私塩伊勒圖曽給路引部議革任得㫖寛免三十八年疏劾藍翎侍衛弼三等違禁與哈薩克市馬請革職効力贖罪上是之復授伊犁將軍上以伊勒圗在塔爾巴哈台辦理妥協諭接任㕘贊大臣慶桂仿其規制辦理三十九年疏請代辦渥巴錫築倉積貯事諭曰朕覽伊勒圖屢次所来奏摺數語即眀之事必牽引别項填入觀之煩𤨏即以此次所奏令渥巴錫等築倉一案論之渥巴錫屯田原為飬贍如一年收割稍豐必湏積貯不過令將餘糧收貯以備不繼則伊等自知愛惜不至抛棄矣前以伊等初来歸附諸事未妥不得不代伊辦理今已熟諳如此事俱代辦從此無完畢日矣此即伊勒圖煩𤨏無濟于事處将軍管轄寛廣兵弁衆多辦事應度其要領簡斷為之不必過為搜求四十年六月疏言部咨禁止鳥鎗土爾扈特等係新歸附人牧馬防野獸湏用鳥鎗若概禁止不惟生計無益反致生疑不便一體收禁上是之十二月疏言伊犁屯田兵三千現改駐携眷兵而綏定城内僅容駐一營且兵房年乆多壊現咨調安西沙州巴里坤等處兵赴伊犁興修其餘各屯散處水足地厚之區應就近増建城堡查塔爾竒溝口外烏可爾博爾蘓克東察罕烏蘓霍爾果斯巴彦岱等處距屯所不逺請即于此數處建築議從所請四十四年疏言伊犁鑄錢所需銅前奏嵗由南路各回城辦運兼配黑鉛㸃錫鑄以放餉嗣烏什將庫存停運葉爾羌銅及喀什噶爾舊存銅運至寳伊局配鑄今銅已用完祗存辦運之銅将来鑄錢日少查伊犁所屬哈爾海圖地方産銅臣就近赴山試採二三年間已獲九千餘觔應酌量加鑄庶錢可流通而餉銀亦可減調報聞四十六年閏五月疏言烏什現無庫存普爾之銅本年八月即需新鑄者接濟臣通盤籌酌烏什年獲銅觔悉鑄普爾猶不敷用每年烏什庫車哈喇沙爾三城在内地調銀三萬兩若停鑄將銅運送伊犁必致缺乏且烏什所鑄普爾以一當十每百值銀一兩今解伊犁改鑄需錢八百作銀一兩糜費轉多又言伊犁崆郭羅鄂博一帶産煤商人願充窰戸者請聴其便酌收税課均報可六月諭来京四十八年加太子太保賞戴䨇眼花翎四十九年四月疏言都統海祿奏請烏嚕木齊遣犯俱派入鐵厰捐貲効力五年為民再限十年回籍查伊犁遣犯數千若俱令入厰是為奴人犯到即當差殊無區别各厰口糧亦不敷給恐日乆人衆滋事扵極邉要地未宜再遣犯每年終查辦一次實能悔過守分始許該管官保送准其為民今概以五年為民該犯等恃有定限無以分别示儆應仍遵向例辦理議如所請五十年七月卒諡㐮武命入祀賢良奉㫖伊勒圖在外宣力多年扵辦理䝉古厄魯特等部落事務二十年来頗為鎮静而衆部落亦皆心服且乆任伊犁将軍辦事妥協著加恩由雲騎尉晋一等伯世爵即著伊子哲臣泰承襲仍賜銀一千兩經理䘮事令御前侍衛豐伸濟倫馳往致奠御製詩悼之曰伊犁廿載宴邉陲不動聲色静鎮之充國屯田誠制勝子儀召飲感無欺長城萬里外萬里柱石念兹允在兹分我憂心西顧乆優恩施那減心悲額森特額森特滿洲正白旗人姓台禇勒初以前鋒馬甲從征伊犁乾隆二十三年右部哈薩克與塔什罕相攻恭贊大臣富徳使額森特諭令歸順哈薩克成悦遣人入覲額森特䕶送至京擢藍翎侍衛尋遷三等侍衛三十二年遷二等侍衛三十四年從經畧大學士公傅恒征􅃡甸十月攻老官屯舟師泊江岸陸兵先發賊突出犯傅恒令額森特等率索倫兵邀擊賊披靡既而分兩翼犄角進賊悉出拒額森特以左翼兵横馳之賊潰竄三十六年從副將軍温福征小金川攻巴朗拉額森特奪東靣山峯毁其碉賜號丹巴巴圖魯大兵取達木巴宗額森特由别道出山北連破碉卡至資哩與大兵合三十七年正月偕侍衛彰靄等攻資哩北山破五十餘卡得碉七三月資哩賊乘夜築卡額森特率兵百邀擊扵卡外阿喀木雅賊數百踵至三郤三進額森特中鎗力擊敗之扵是南北兩山官兵乘勢合𠞰賊夜遁克資哩居數日攻北山之普爾瑪寨自普爾瑪至美美卡中間大碉四賊倚為聲援額森特設計盡取之四月丙寅朔偕總兵馬彪伏兵東崖奪賊水碉翌日并奪普爾瑪寨庚辰攻東瑪賊由别斯滿山梁来援額森特設伏截擊暮收兵賊躡我後還戰斬二十餘級旋奪東北三卡毁峯下諸碉戊子逼東瑪夜半賊二隊来犯額森特伏兵卡旁羣起合擊殱之擢頭等侍衛甲午賊分兩道一由别斯滿一由色爾渠將夹犯大營額森特與總隊徳赫布分伏南北隘逆擊之賊大敗旋出賊不意薄其碉突入額森特被鎗呼戰益力遂克東瑪諭曰額森特在軍營奮勉出力攻取東瑪寨又因奮勇得傷著給副都統職銜七月攻美美卡同彰靄䇿應中路取旁碉夜半繞山徑黎眀㑹攻中碉與彰靄分道射賊南北兩山賊皆遁遂取美美卡九月繞路頂宗山而右渡河撲兠烏山寨十月㧞路頂宗碉授鑲黄旗䝉古副都統十一月自穆拉斯廓繞至博爾根奪山巔大寨復由北山下夜渡南至納拉覺山仰攻克碉十二卡十五進擊格實廸又襲破公雅山踰木爾古魯山麓取溝内寨卡並據嘉巴山十二月授領隊大臣是月小金川平三十八年正月將軍温福抵功噶爾拉山令額森特與副都統普爾普等率兵二千先發功噶爾拉者兩金川接壌要隘也峯衺銳積雪塞蹊徑賊多設碉阨險拒守額森特督兵騰雪磴直上副都統烏什哈達繼之漸克旁碉二月戰扵固木卜爾山斬賊四十餘奪卡一隨與都統海蘭察合攻得碉卡五遂隨温福移營木果木㑹攻昔嶺昔嶺多賊碉其阨要大碉十額森特分攻第九碉第十碉迸擲火彈乗賊恟懼疾馳入或殪之碉外或仆之碉中賊立盡顧見七八兩碉峻鉅復與海蘭察等合攻往来氷雪中㑹日暮乃毁已獲之兩碉佯退以誘賊果有賊四百来襲伏兵噪而前師還戰殱賊大半三月破昔嶺第五碉閏五月移攻達札克角山梁四月復攻昔嶺相持數十日六月戊戌木果木大營䧟癸夘㕘贊大臣海蘭察聞副將軍阿桂在當噶爾拉令額森特率兵千開後路賊據薩穆果穆橋不能進阿桂已全師徹駐翁古爾壟上命阿桂為定西將軍進𠞰十月甲寅額森特與總兵海禄等由資哩南北山分進賊據北山橋築卡固守額森特衝擊奪其橋卡即與海禄夹攻阿喀木雅之東溝總兵成徳亦至三路㑹𠞰賊夜竄追至坡下殱之酣戰一日夜向晨進攻阿喀木雅山四靣騰上奪其碉乗勝直取木蘭壩又蕩掃鄂克什官寨賊奔潰十一月大兵抵路頂宗額森特越山南踞髙俯瞰官兵頂趾相接攀堞躍入砍賊數十餘多墮崖死進攻眀郭宗賊竄逸獲窖内蔵糧遂復美諾獲大礮四劈山礮八上以攻復美諾諸處額森特督兵勇往授正紅旗䕶軍統領賜御用黑貂冠一三十九年正月偕海蘭察率首隊兵至谷噶山下谷噶山外有山曰喇穆喇穆峯勢峻陡海蘭察與侍衛公保寧從旁進額森特當其前夜乗雪影穿箐越險直前奮擊轉戰至黎眀已二十餘里始見髙峯列大碉九繚石墻俄雪霧交作官兵乘晦抵碉趾賊不敢出乃攻取其左右山梁及附近之儧巴拉克山峯斬三十餘級又見喇穆喇穆之東有色依谷山髙出羣峯即于是夜襲擊復勝之遂與海蘭察兵合時海蘭察亦據最髙之登古山與羅博瓦山相對險特甚二月乙未額森特與海蘭察襲其後兵從石罅躍登林中賊礟如雨我兵氣益振及第三峯麓賊數百從髙而下海蘭察鏖戰額森特等合力迎擊賊屢敗頃之復有數百賊分三隊冒死衝突連殪數十人餘帶箭遁賊猶抗守羅博瓦山庚子擲火彈焚之丙午攻克第二峯碉上奬其奮勉授散秩大臣三月進𠞰得斯東寨額森特斫寨門縱火賊出追殺之賊又以雪夜刼副將常禄保營額森特聞鎗聲急赴援内外夹擊賊敗走四月賊乘雨霧建二碉于羅博瓦山額森特與海蘭察亦乘夜雨宻率兵八百薄碉趾毁墻入賊驚竄追斬數人平其碉上謂海蘭察額森特等於大雨中殱賊毁碉足壮我軍之氣破賊人之膽五月賊夜刦烏什哈達營額森特追擊之賊負創遁六月攻羅博瓦峯下色淜普大岡賊於岡上設大碉六左右相應援海蘭察克其中三碉額森特克其左二烏什哈達克其右一附近山砦同時收取上嘉之製詩紀事有人人自為戰上下力各努盖自用兵來斬獲斯為巨之句七月海蘭察進攻該布達什諾令額森特下溝攻色淜普左偏且繞賊後時大雨額森特偵賊不備砍柵直進遂克二木城毁之諭曰額森特見海蘭察立功居多思奮勉自勵故不避雨濘将二木城立時攻㧞均屬可嘉未㡬額森特遥見該布達什諾各砦煙起知海蘭察等兵至賊􅊖往救色淜普之右備禦必疎即督兵下溝上色淜普後山結營時額森特兵少適海蘭察率兵二千来助額森特遂順下山梁奪獲筆朗納克及該筆達烏等砦諭曰額森特原係勁將自派往軍營奮勉出力調度得宜首先殺賊從前賞給丹巴巴圖魯名號今改墨爾根巴圗魯並賞銀二百兩現在大兵已圍遜克爾宗其益加奮勉迅奏膚功時額森特駐遜克爾宗之右海蘭察在其左中間岡脊尚有札木咱克等碉為賊屏蔽我兵攻之焚其寨落風大作火熾燬平房碉卡二百餘八月額森特伐木立柵與海蘭察督攻諭曰海蘭察額森特等所帯官兵直至賊碉之下或携木梯攀上或拆缺口衝進並将碉内之梯用力拔出斷賊人上下雖􅃛賊扵地窖深蔵未能攻得而官兵如此奮勉實屬可嘉九月壬子攻遜克爾宗水碉斷賊汲丁巳日出進攻官寨旋佯退日㡬中忽從叢木中躍出驟逼寨墻賊鎗石爭發持至日昳他寨賊来援我兵乃撤庚申復攻之額森特鼻受石傷又鎗傷其足居數日望遜克爾宗右有寨四乃與烏什哈達協擊克其一海蘭察亦取第二寨額森特遂撲第三寨賊鎗折其弓弰傷及指仍取親隨之弓連斃數賊上以額森特被傷尚能換弓射賊嘉奨之賞貂㡌猞猁猻馬褂各一十月攻黙格爾山額森特由中路直前與侍衛官達色繞道之兵上下夹擊砍破碉門殺二十餘賊餘墮澗死遂留兵令海禄等據守而自與官達色趨上山梁時海蘭察已從深箐中穿徑先至其西有宻拉噶拉木碉共攻克之乗勝並克凱立葉官寨賊自勒烏圍分三隊来援我兵亦分三隊下壓賊大敗追數里斃賊百餘距勒烏圍賊巢僅二十里得㫖嘉奨授㕘賛大臣仍交部議叙額森特乘勝取布拉克森及格斯巴爾二山顧見日爾巴當噶有賊卡保寧等已破其山陽五碉賊竄山頂額森特追撲殺之格斯巴爾山下曰羅卜克鄂博其溝口尚餘七碉並焚燬扵是凱立葉上下及附近寨落席捲殆盡上奨其奮勉超羣著在乾清門行走十一月與海蘭察各領一隊乗月黒額森特潜度溝突入格魯克古丫口得碉卡二循山下抵桑噶斯瑪特其山分四支前石城一後木柵三賊叠石墻掘地溝守甚力乃與海蘭察分隊進殺二十餘賊拔石城各隊兵亦奪三木柵遂由山足樹柵下抵河涯十二月攻沿河寨柵射寨隙或拔寨木以擊之時沿河寨落六處擦庸及羣尼為大四十年三月額森特燎羣尼寨並奪擦庸寨及附近木柵石卡又與海蘭察攻克上巴木通下巴木通及安吉達佳布至噶爾丹寺前所有賊寨百餘無敢復抗拒者諭曰既得勒烏圍即湏攻進噶拉依苐恐逆酋負嵎死守得之未能迅速勢必分兵馬爾邦夾攻此路兵自應大員帶往或派㕘贊大臣則莫若派額森特阿桂當遵㫖妥酌而行六月額森特由巴木通至直古腦山頂賊柵鱗次時領隊大臣福康安烏什哈達已得碉卡五十餘侍衛特成額亦克各山峯俱與額森特合兵額森特遂偕福康安等焚冷角寺及側近寨落壓至勒烏圍之上八月與海蘭察直趨勒烏圍賊巢分兵圍其兩靣勒烏圍之南為轉經樓又過甲爾日磉橋而南為科布曲賊負髙阻深互為唇齒我兵攀援負戴攻擊益力竟克之時額森特得傷不能乘馬諭曰阿桂現𣲖額森特在轉經樓前科布曲山下駐劄以牽賊勢額森特雖未能上馬逺渉而防守是其所長著令在勒烏圍一帶小心看守勿使隔岸之賊得乗隙過河滋擾或至稍有疎虞九月額森特分兵三路一攻甘都瓦爾一攻徳里雅克角一攻鄂羅木共得碉卡二十七寨落十六殺賊二百餘生擒三十餘人後數日還攻科布曲克碉一時額森特所駐與南路眀亮兵僅隔一河眀亮所攻之阿爾古額森特先用礮摧之眀亮奏入上曰額森特雖未親身攻𠞰而於隔河施礮轟碉使賊膽落如此不分畛域方無愧為恭贊益當努力自勉共襄大功十一月海蘭察分兵三路合攻西里額森特望見西里官兵轉戰而下即率保寧常禄保等赴其山麓盡克其木城勒烏圍之前有山曰克爾古什拉斯為進取噶拉依正道賊宻布城碉為嵎負計額森特分兵六隊攻克之賊退守勒隈勒山脊十二月額森特乘夜進攻賊死守前三碉乃繞下山半攻其四五兩碉至曙賊見我兵盛自相驚擾盡破之又𠞰其後兩碉及石卡九後數日額森特由勒隈勒直取格隆古先奪其前三寨然後圍其大碉賊突圍欲出我兵環殱之時海蘭察等攻科布曲海禄攻兠窩兵皆合遂將科布曲旁砦乘勢掃定賊棄索隆古而遁大兵將及賊巢賊尚以布哈爾則朗噶克為門户斫木塞道額森特率同烏爾納那木扎彰靄等督兵進賊伏積木中發鎗如雨我兵直進遂克布哈爾碉卡後數日由則朗噶克立柵上逼先令官兵潜行叢箐間近賊碉伏賊見我兵樹柵悉衆来援伏兵從箐中出撃賊驚潰我兵乘勢進取瑪爾古當噶循山東下至克角干登又下至喀爾巴河沿合圍噶拉依賊巢四十一年正月額森特攻克喀爾巴山後燬附近寨落直至河沿截噶拉依之左諭曰㕘贊大臣額森特奮勇出力茂著勤勞著賞給一等男世襲㒺替二月金川平凱旋賜御用鞍轡馬一匹縀二十端銀千兩紫光閣繪像列前五十功臣御製贊云虎鎗隨圍覺與衆殊命往𠞰賊攘臂以愉閲厯既多遂㕘謀議獨當一靣亦復集事四十六年三月甘肅循化㕔回匪蘓四十三因爭立新教聚衆破河州焚蘭州闗廂據華林山額森特奉命馳驛至蘭州五月大學士公阿桂令額森特與海蘭察眀亮等分攻華林山擊敗賊衆閏五月破其四卡賊於華林山前立大卡一通孔穴濬深溝為死守計額森特等以鍬钁開路擁進大卡殱守卡賊於是賊傾穴出鬬額森特力戰得傷大軍合擊之賊平上以額森特進𠞰受傷仍能帯兵轉戰賞大小荷包以褒其勇六月由一等男晋三等子爵四十七年十一月卒子哈金泰以三等侍衛承襲三等子爵尋病歿無子以侄伊爾琫阿襲阿滿泰阿滿泰滿洲正白旗人姓𤓰勒佳本黒龍江達呼爾披甲乾隆二十四年閏六月派赴西路軍營攻哈什哈爾城七月又隨大兵由阿拉楚爾趨至巴達克山擒賊人霍集占等俱有功三十四年奉㫖住京挑為䕶軍尋補粘竿拜唐阿三十七年賞戴藍翎三十八年授藍翎侍衛是年從征金川攻當噶爾拉山梁後一月又攻當噶爾拉之第五碉皆克之三十九年二月賊從庚額特山峽出將犯我守兵阿滿泰偕㕘領巴克坦布先據要地鎗矢齊發賊被殪者多始退奉上諭此次賊畨竟敢從庚額特前来阿滿泰巴克坦布帯兵奮撃甚為可嘉著存記檔案俟攻得馬爾邦一併交部議叙七月冐雨進攻達爾圖山梁取其碉九月副将軍眀亮以木克什對靣格木勺山其上賊碉四座足望見我軍舉動且與甲索賊人往来犄角為我肘腋之患乃令阿滿泰分兵進攻以截甲索来路次日和隆武等方攻木克什果有數百賊趨前接戰而甲索亦有百餘賊壓至格木勺山為夾攻之計並為阿滿泰所敗四十年二月眀亮復令阿滿㤗偕滿衛阿蘭保等進攻科拉木達不避鎗石奮勇仰攻直撲至碉前攀開鹿角抛擲火彈賊捨死拒守别有援賊從西南下壓我兵分路迎擊賊前行者多箭斃遂竄入深林繞出科布曲之上合力死守我兵乃撤回上以科拉木達雖殱賊十餘究未得有寸進進攻無益不如徑赴宜喜為是四月攻加素得楞等山及儒集寨以屢次奏功擢三等侍衛賜扎努恩巴圖魯號銀百兩閏十月攻獲扎烏古山梁十二月攻加雜肚絨布巴魯擔諸處所得四功牌皆頭等四十一年二月金川平凱旋繪像紫光閣列後五十功臣上命儒臣製贊曰志為氣帥敢戰者當宜喜得楞遂屢受傷克扎什古攻碉㧞柵不避險巇衝冐鎗石四十二年十二月擢副䕶軍㕘領四十六年隨大兵赴蘭州剿撒拉爾逆賊從龍尾山踰水磨溝攻上華林山累次克㨗四十七年授䕶軍㕘領四十九年五月剿石峯堡逆回初隨海蘭察率數騎從隆徳間道偵賊底店途遇數十賊乘馬羣行擊敗之奪其馬四乗勢窮追又擒獲放牧賊人取其牲畜二百進攻石峯堡遂鋤賊巢賞副都統職銜八月授頭等侍衛五十六年從征廓爾喀五十七年九月大兵攻擦木分為五隊阿滿泰從海蘭察一隊由中路直進連破重碉盡殱賊匪後數日進攻濟嚨分撲其居中官寨俱勝之遂至熱索橋賊毁橋抗拒乃同哲森保等東踰峩緑大山繞至上流紥筏濟還破橋卡我兵盡渡有㫖授鑲紅旗蒙古副都統六月攻克協布魯遂分路從海蘭察繞行時翁果爾海等為前隊阿滿㤗等為次隊珠爾抗阿等為後隊並抵博爾東拉賊卡從髙下壓箭無虚發大敗賊人七月由噶勒拉乘勝踰堆補木至帕朗古攻橋其北岸賊抵拒者既經殺退南岸賊排鎗數層連環不斷且戰且撤其橋阿滿泰率先衝奪與屯偹色丹巴皆中鎗落水死我兵一擁遂過河流深急不獲撈其屍賜䘏銀九百兩致祭予全𦵏皆如例廓爾喀降列前十五功臣繪像紫光閣上親製贊曰遇有絶險莫弗身先詎惟力勇寔以忠堅攻堆補木奪橋命殞馬革未能更切哀憫予騎都尉職世襲㒺替珠爾格徳珠爾格徳吉林滿洲正白旗人姓鈕祜禄乾隆三十三年授前鋒校三十七年授乾清門三等侍衛三十八年命赴金川軍營三十九年三月隨㕘贊奎林攻斯底賊碉奎林中飛石仍力鬬有兩賊握刀突至珠爾格徳連矢斃之餘賊逸詔授頭等侍衛給扎克博巴圖魯號八月攻俄坡第二碉賊於碉後穴地聚守倉猝不及施鎗石咸逸去珠爾格徳等追擊之上嘉其奮勉大兵既取木克什據水卡斷賊汲道設伏以待賊二百餘冒霧分路来犯我守碉土兵發鎗抵禦伏兵起合擊敗之别有賊百餘自山下援珠爾格徳衝入賊隊手刄三人九月攻取木克什山下三碉十月與都統和隆武等襲取日旁山後戰碉十餘座平碉二百餘間日旁去勒烏圍賊巢近東接谷爾提賊碉寨相望為必爭之地復與和隆武乗夜攻克遂據之十二月授正紅旗蒙古副都統四十年四月攻取達爾圖以下得楞以南各碉七月師至石真噶珠爾格徳等攻㧞石城二木城一夾攻丹扎木各寨焚之乘勝登山梁迎𠞰賊人来援者賊目負箭奔竄八月賊棄克爾瑪碉寨遁去我兵追殺至曲碩木官寨九月奎林率兵攻什扎古珠爾格徳與和隆武設伏琅谷奎林兵至奮勇夾擊獲木城一閏十月進攻扎烏古山梁克賊碉四卡八自日斯滿至巴扎木賊特其地險碉多在山梁拒守珠爾格徳與和隆武分兵進一由山梁仰攻一由箐内繞截連克賊碉十七接通甲索一路官兵曲碩木一帯俱望風而逃有達撒谷山者賊列寨嚴守珠爾格徳等分兵或攻旁卡或取中寨擲火彈燬其垣賊燒斃無算遂進克乃當獨松諸卡拉爾舍斯滿畨衆悉降四十一年二月金川平凱旋賜銀幣命圖形紫光閣御製賛曰奎林深入賊刄将及發矢斃之險中救急同心合力共集大勲冩圖旌壮惇史流芬四十四年卒台斐英阿台斐英阿滿洲正白旗人姓庫雅拉乾隆三十六年由䕶軍補司轡長三十八年授乾清門藍翎侍衛三十九年三月奉㫖赴金川軍營領隊剿賊七月與海蘭察官達色進取喇穆喇穆以西賊碉碉髙踞峯頂石壁陡滑我兵用夜半蟻附而登抵碉根而伏黎眀砍碉門躍入盡斃賊衆又進撲尾碉及木城兩座次日大霧瀰漫乗勝循喇穆喇穆山梁下剿西南兩山麓皆克之命從優議叙後數日復與海蘭察官達色帯兵三隊突至該布達什諾躍過賊濠燬其碉殱賊無遺又有木城在山巒突起處賊聚守甚堅海蘭察從山溝繞攻賊後台斐英阿隨與官達色海禄等直撲其前賊於木城外増柵兩層柵外皆深溝而柵中放鎗擲石我兵不避危險架木踰溝破前柵至内柵賊守禦益力我兵手指多傷因暫撤後數日復攻克之乃與海蘭察兵合並赴色淜普峯巒之左時額森特等在其右兩兵夾攻同時俱克十月又攻克黙格爾山梁有㫖嘉其奮勇擢三等侍衛十一月由羅卜克鄂博直下山溝值林深月黒搶上格魯克古山口崖磡壁立手足齊攀平眀已據其上凡越山溝四山梁五克獲賊碉甚衆再交部優叙四十年正月攻克康薩爾二月攻羣尼諸寨撃敗得式梯援賊又攻據勒爾吉博山麓三月南路宜喜請増兵於是同海蘭察率千人赴之進抵薩克谷山梁賊望見我兵即用排鎗迎擊驟如飛雹我兵奮勇入所向無前将山梁克獲復選健鋭預伏要口賊夜半果集将擾我新立營盤伏兵起擊大敗之次日達爾圖及得楞諸賊相率逃遁我兵急躡之賊遂崖死者無數四月從攻得楞東麓奪石卡二乘勢下壓又奪石卡一五月分率逰兵為海蘭察額森特普爾普諸路䇿應六月與福康安分攻巴占寨賊抵拒不遺餘力乃從舎圖枉卡進至拉枯寺之上適額爾特攻得昆色爾台斐英阿乃将附近各寨縱火焚燒進圍喇嘛寺飛騰而入均予誅斃毗連卦爾沙巴諸處悉行掃蕩凡經三日夜廓清賊寨縱横三四十里諭曰此次攻碉将士踴躍倍常其中勇鋭出衆之人著阿桂查眀未得巴圖魯號者即奏請賞給扵是得拉布凱巴圖魯號是月進攻章噶山峯海蘭察直𠞰正靣官達色撲其右台斐英阿偕普爾普截其左破之遂趨上舍爾都拉後山将兩峯佔據海蘭察踰溝上攻托魯古賊從箐中放鎗力拒而台斐英阿别從險處潜登所有碉卡立時盡得由此循山麓而下即勒烏圍賊巢巢磡甚高磡下一路賊往来應援恃大碉外蔽我兵莫能擊斷乃謀以晦夜與普爾普瑚尼爾圖額爾特先合攻其碉賊極力捍禦墻上擲石又穴孔放鎗我兵運柴捆堆窒隨以藥彈抛入湏㬰火發賊從煙中突出被鎗箭殪盡遂同搗勒烏圍自南分攻八月十五夜克之賊退保噶拉依窟穴九月海蘭察析兵七隊而台斐英阿領其一皆持三日糧從巖崖懸陡處攀籐上下夜半大風雨毫無畏阻抵達烏達圍天眀至當噶克底乘雲霧四塞薄其碉劈開碉門賊衆無得脱者上以諸将領冒雨衝泥攀崖越險甚屬可嘉各馳賞荷嚢以示奨勵十月攻西里之奔布魯山官兵從賊礮中挐柵進台斐英阿與瑚尼爾圖帶兵防䕶遂全勝焉西里山下曰舍勒固租魯曰瓦喇占最為扼要由瓦喇占至河復有薩爾歪三寨每攻皆克遂望科布曲一氣仰攻而上進至雍中喇嘛寺喇嘛盡數来降十二月擢二等侍衛四十一年正月圍困噶拉依二月賊出寨就俘金川平四月振旅還京師賜宴賞縀十端銀百八十兩繪像紫光閣列前五十功臣上自製贊曰一木曷支衆擎易舉嘉我諸臣心同力努人自為戰各有所成攻康薩爾直進賊營四十三年九月扈蹕盛京加一級四十六年四月赴蘭州軍營𠞰撒拉爾逆回至則與海蘭察帶兵三千五百敗賊扵龍尾山梁繼由龍尾山踰水磨溝馳上華林殱賊甚衆五月與額森特眀亮率滿洲歩兵設伏水磨溝以備賊閏五月與舒亮三徳等率滿漢兵由華林山南直壓賊卡逾數日遂取其卡四六月合圍賊營犁至華林寺賊既平隨軍凱旋擢頭等侍衛尋以圍場逸獸議奪俸又以署翼長時造冊遺漏奪俸一年四十九年六月從剿甘肅石峯堡逆回有功賞副都統職銜九月補公中佐領五十年六月補御前侍衞旋授正藍旗滿洲副都統五十三年擢正紅旗䕶軍統領五十六年調鑲黄旗以失察䕶軍盗銀鐫二級留任是年從征廓爾喀五十七年六月大兵分隊攻擦木從将軍福康安為諸隊策應並毁賊所立垜牌及攻濟嚨我兵五路進台斐英阿率索倫勁騎于山坡要地往来衝擊師至協布魯賊據橋守禦不得渡台斐英阿别逾薩木那山襲取賊寨而協布魯兵亦入至東覺山遥見賊碉甚宻扵是大兵復出竒旁繞而台斐英阿仍從正路牽綴東覺山賊勢連日礮轟殪紅衣緑衣兩賊目及賊兵無算乘隙渡河取賊寨十一生擒七十六賞都統職銜兼授散秩大臣七月大兵連破噶勒拉及堆補木二山至帕朗古奪橋進逼甲爾古拉山賊三路来犯台斐英阿射斃紅衣賊目二人旋中鎗卒於陣賞世襲騎都尉又一雲騎尉賜䘏銀千兩致祭子全𦵏立碑皆如典禮諡果肅廓爾喀畏懼乞降大兵還台斐英阿列五十功臣再繪像紫光閣上製賛曰首攻擦木繼克濟嚨身先士卒奮勇成功遂至帕朗逼甲爾古直進殞身痛惜心楚欽定八旗通志卷一百六十三
