body:
  text: 旗分志七八旗佐領七正白旗滿洲佐領管領正白旗包衣佐正白旗滿洲佐領下四㕘領至五㕘領第四㕘領第一佐領係國初以扎坤木地方来歸人丁編立始以固山額真阿敦之子塔穆拜管理塔穆拜故以其子馬爾賽管理馬爾賽故以黙爾根轄阿舒管理後以馬爾賽之次子那郎阿管理那郎阿陞任盛京固山大以其弟費揚古管理費揚古縁事革退以其叔祖興齊之孫佛保管理佛保縁事革退仍以那郎阿管理那郎阿故以其弟莽愛管理莽愛故以其兄那郎阿之子多竒闡管理多竒闡故以其長子徳保管理徳保故以其子永泰管理永泰故以其弟富爾松阿管理富爾松阿故以其子佛爾卿額管理第四㕘領第二佐領係第十佐領内滋生人丁於穆圖管佐領時分編一佐領以公托塞管理公托塞縁事革退以副都統堆秦管理堆秦故以都統阿爾納管理阿爾納外任杭州副都統以尚書馬爾漢管理馬爾漢年老辭退以其子御史闗柱管理闗柱縁事革退以都統塞爾弼管理塞爾弼故以内閣學士徳通管理徳通休致以二等侍衛伊柱管理伊柱出差以印務章京成保管理成保陞任盛京協領以護軍統領多敏管理多敏陞任以頭等侍衛都伊納管理都伊納陞任以副都統舒昌管理舒昌陞任直隷總督以副都統都爾嘉管理都爾嘉陞任以副都統額森特管理額森特故以御史蘇楞額管理蘇楞額故以副㕘領雙泰管理第四㕘領第三佐領係國初以馬察地方來歸人丁編立始令孟安圖管理孟安圖故以其次子䕶軍㕘領翁克管理翁克出征陣亡以其伯父䕶軍校綏哈管理綏哈故以翁克之子三等侍衛倭布敦管理倭布敦故以其伯祖巴篤禮第七子䕶軍㕘領呢喀達管理呢喀達故以其弟䕶軍㕘領塞根管理塞根故以巴篤禮之孫都統馬哈達管理馬哈達縁事降調以塞根之子阿禄管理阿禄陞任盛京員外郎以孟安圖嫡孫㕘領穆舒管理穆舒年老辭退以其弟副都統多賽管理多賽原品致仕以其子三寶管理三寶告退以其子多禮管理多禮故以其子舒楞額管理第四㕘領第四佐領即第三佐領内滋生人丁康熙七年塞根管佐領時分編一佐領以倭布敦之子二等侍衛達爾漢管理達爾漢縁事降調以孟安圖弟噶喇昂邦布孫之子尚書達哈塔管理達哈塔故仍以達爾漢管理達爾漢因病辭退以達哈塔之子郎中蘇爾泰管理蘇爾泰故以進愛管理進愛革退以明達管理明達陞任副將以輝徳管理輝徳陞任凉州協領以哲克僧額管理第四㕘領第五佐領係第六佐領内滋生人丁康熙二十三年馬竒管佐領時分出一佐領令巴篤禮之二世孫舒敏管理舒敏因病辭退以其子伊雷管理伊雷故以威赫管理威赫辭退以其子瑪爾拜管理瑪爾拜陞任副都統以三等侍衛永慶管理第四㕘領第六佐領亦係國初以馬察地方来歸人丁編立始以巴篤禮管理巴篤禮陞任固山額真兼禮部承政出征陣亡以其子三等阿思哈尼哈畨卓羅管理卓羅故以其子舒呼徳管理舒呼徳故以卓羅兄之子馬哈達管理馬哈達陞任將軍以其子馬竒管理馬竒年老辭退以領侍衛内大臣都統二等伯伊勒慎管理伊勒慎陞任將軍以其族弟他什哈管理他什哈故以其子扎拉芬管理扎拉芬故以扎蘭保管理第四㕘領第七佐領係第八第九兩佐領内滋生人丁康熙二十三年蘇爾班雅思哈管佐領時分出一佐領以蘇爾班之兄副都統雅圖管理雅圖故以其弟前鋒㕘領孫舒管理孫舒縁事降調以蘇爾班之子薩爾拜管理薩爾拜革退以孫舒之子蘇來管理蘇來縁事革退以其伯父㕘領蘇爾邁之孫䕶軍廣明管理廣明陞任㕘將以其子奎福管理奎福故以其子恒通管理第四㕘領第八佐領亦係國初以馬察地方來歸人丁編立始以雅什塔管理雅什塔故以其子領侍衛内大臣穆福管理穆福致仕以其子三等侍衛蘇爾班管理蘇爾班因病辭退以其弟員外郎蘇爾邁管理蘇爾邁因病辭退以其子夀玉管理夀玉故以其子蘇成額管理蘇成額縁事革退以其叔祖之子三等侍衛兼拜他喇布勒哈畨泰分管理泰分故以其孫蒼來管理蒼來故以其子景和管理第四㕘領第九佐領即第八佐領内滋生人丁康熙十一年穆福管佐領時分編一佐領令雅什塔之族孫郎中雅思哈管理雅思哈陞任布政使以其子阿思哈管理阿思哈故以其弟上駟院侍衛雅爾那管理雅爾那因病辭退以穆福之子包衣䕶軍㕘領穆占管理穆占故以其弟前鋒㕘領孫舒之子蘇来管理蘇来從父徃烏喇以雅什塔族孫拜他喇布勒哈畨閻卜管理閻卜陞任景陵噶賴達以穆福長子副都統雅圖之子二等侍衛索住管理索住差往盛京管理索倫事務以其子愛柱管理愛柱故以其子特通阿管理第四㕘領第十佐領係國初以烏喇地方人丁編立始以其人伊爾登管理續以烏喇貝勒滿泰之子阿卜泰管理阿卜泰縁事革退增以明阿弩所管之半個牛录以明阿弩之子胡世納管理胡世納故以其兄之子瑚爾班管理瑚爾班年老辭退以瑚世納之孫穆圖管理穆圖故以阿卜泰之孫巴哈塔管理巴哈塔陞任南海子六館總領以其子那明住管理那明住縁事革退以其弟之子永福管理永福故以那明住之子永徳管理永徳陞任都司以其子興泰管理興泰故以其族孫恩特和穆管理恩特和穆陞任副將以其叔祖興保管理第四㕘領第十一佐領係康熙二十三年以第十佐領内滋生人丁編立始令瑚世納之子穆舒管理穆舒故以其子蘇完柱管理蘇完柱故以其弟穆圖之子石徳管理石徳派往泰陵駐防以其堂弟徳通管理徳通故以其子五十九管理第四㕘領第十二佐領係第十三佐領内滋生人丁康熙二十三年南金管佐領時分編一佐領以南金族弟二等侍衛瑚石塔管理瑚石塔年老辭退以南金叔父之子