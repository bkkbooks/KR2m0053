front:
  text: 欽定四庫全書欽定八旗通志卷首之五天章五皇上御製詩三
  hash: sha256:8a76308c495ce5bb4925cc811d0f6132794a58aa018c1100c29a8ff336b0c7c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_007-1a, image: WYG0664/WYG0664-0092a.png}
body:
  text: 五功臣五首録四首故協辦大學士一等武毅謀勇公兆惠平定西域兆恵實惟首功以傅恒贊襄定䇿凖蕭何不戰之例宜居第一而兆恵即繼之兆恵起家中書皇考時初立軍機處兆恵即與舒赫徳同為章京故二人皆練習政事余既踐阼知其才可用屢擢至侍郎金川之役命往綜理糧餉尋為軍機大臣乾隆乙亥我師撫定伊犁而逆賊阿睦爾撒納潛蓄異謀煽衆為亂竄身逺遁因命兆恵為將軍駐伊犁聞呢嗎等之變整師東旋中途屢殱逆衆乃被圍於鄂壘扎拉圖適余所遣圖倫楚等率師至兆恵力戰得出戊寅冬薄葉爾羌城我軍已疲於逺涉而逆酋兩和卓木糾衆邀拒時我軍三千人其渡河者僅四百乃築堡黑水固守相持三閱月百計殱賊己卯春舒赫徳等統兵赴援而余先所遣送馬之阿里衮等亦至内外夾擊賊衆披靡遂回駐阿克蘇兩首竄遁追至拔達克山因各授首獻馘回部悉平賜以世襲一等公爵晉協辦大學士並賜紅寶石頂金黄帶四團龍補悉如傅恒例凱旋行郊勞禮錫宴於紫光閣詳見紀事諸詩兆恵長余僅三嵗正資倚任遽以甲申冬病歿余親臨撫酹即命其子為額駙勅祀賢良祠優加贈卹每一念及悼惜曷能已乎西師歴五年凖回兩進討兩討凡兩阻兆恵皆經了兆恵於搜剿準夷遺孽則冇鄂壘扎拉圖之圍進討回部逆酋則有喀喇烏蘇之圍皆能全師以出歴險而亨由其忠誠素篤濟以謀勇故能邀天佑而叶師貞也而皆安然出蕆功荷大造設非忠誠篤加以勇畧昭焉能合衆志成城錫箔保蒙古語錫箔者即岩保之謂也耆定贊絲綸章服元勲表謂當永承恩太平佐有道長予纔三年何不同予老故戸部尚書一等果毅公阿里衮鈕祜禄為我滿洲大族而額亦都巴圖魯乃太祖太宗朝開國元勲阿里衮其曽孫也乾隆初年為御前侍衛擢任兵部侍郎歴授巡撫總督壬申冬還朝為戸部尚書兼管步軍統領丙子冬命往軍營為參贊大臣戊寅冬命偕副都統鄂博什送馬濟軍彼時尚未知兆恵等有襲迫之事也阿里衮不憚勞瘁遄程而進己卯春㑹舒赫徳赴援賊遮之於呼爾滿阿里衮適至解其圍同趨黒水與兆恵夾擊賊衆全師而出命襲果毅公爵圖像紫光閣凱旋復為尚書兼協辦大學士戊子春命往雲南辦緬甸事與大學士公傅恒分路進剿蠻暮新街之㨗皆有功己丑冬以受瘴􅅑發肩背馳醫治療不痊悼惜贈卹如典禮祀賢良祠阿里衮性誠篤遇事力任不避艱阻余以此優眷之昨嵗秋之仲盛京謁陵園三大功臣墓陪葬其間存額亦都與揚古利費英東並以開國佐運勲臣陪葬於曽親福陵功臣昭陵之間昨秋恭謁祖陵臨三墓酹酒並紀以詩兹阿里衮者額都額亦都急呼之則為額都四世孫勇豈匹其祖忠實一例肫兆恵阻黑水回衆如蜂屯爾時舒赫徳統兵速入援又被狂狙阻進退至兩難適值阿里衮送馬繼進遄率兵亦弗多乗夜賊營掀賊駭自天降鹿埵羣逃奔兩軍俱善歸阿里衮解馬遄進所統之兵無多既解舒赫徳等呼爾滿之圍復至喀喇烏蘇夾擊賊衆兆恵等並全師而出還至阿克蘇整兵再進遂以次平定回部重進鴻功全後復往征緬受瘴惜隕身一再忘軀勞思之輒涙捫幸而子善繼阿里衮子豐昇額襲公爵擢尚書授副將軍征剿金川遜克爾宗之捷奮勇奏績以其克紹祖風於公爵加繼勇二字凱旋圖像紫光閣復加一等子世爵方以其年壯可繼父志為國宣力乃未㡬以病歿益増悼嘆金川建殊勲凱旋以病終悲惜何忍言故雲貴總督將軍一等誠嘉毅勇公明瑞明瑞為孝賢皇后之姪初襲承恩公選充侍衛乾隆丙子擢副都統命往伊犁軍營為參贊大臣尋遷户部侍郎同將軍兆恵往剿回部於喀喇烏蘇襲迫中悉力拒賊己卯春我軍内外夾擊賊衆驚潰兩逆酋望風遁明瑞統兵追及之於霍斯庫魯克轉戰三時斬馘數百復敗之於阿爾楚爾敘功於公爵加毅勇字圖像紫光閣晉都統擢領侍衛内大臣壬午授伊犁將軍乙酉統兵復定烏什事詳烏什戰圖補詠丁亥春還朝值緬匪滋擾楊應琚乖方貽誤命明瑞為雲貴總督往代之繼復授為將軍令相機進剿遂統兵由宛頂進賊於蠻結悉衆以拒明瑞身先督戰乗大霧薄賊寨破其象陣斬級二千餘生擒三十四人捷聞加一等誠嘉毅勇公世爵賜紅寶石頂金黄帶四團龍補以示優異而以承恩公爵令其弟奎林襲明瑞復敗賊於天生橋由宋寨次邦海取道猛宻轢賊境數千里旋自大山移駐猛腊屢戰克㨗㑹參贊額爾登額頓兵旱塔巡撫鄂寧十檄促援遷延不進賊偵我孤軍無繼蟻聚抗禦明瑞因緑營疲病者多令將領分隊䕶之以出而身自殿後接戰次小猛育賊益紛集明瑞身被重創而歿事聞痛惜弗能置因勅從優議卹並建旌勇専祠祀之櫬還親臨賜奠磔額爾登額於其前猶不足以紓余恨也凡經百餘戰戰必先衆軍不謂世胄家而有如此人讀書知大義挽勁鮮與倫短身既精悍謀畧兼出羣功難僂指數嘉賚匪因親征緬次猛腊獨入克捷頻恨遇忌功者逍遥河上陳明瑞師次猛腊孤軍深入重地應有繼進之兵時額爾登額分駐旱塔若星馳赴援未嘗不可合力奮剿即不能成功亦可全師而出乃額爾登額忌明瑞獨成大功觀望不進時鄂寧為滇撫十檄敦促轉繞回銅壁闗遷延半月始達宛頂而明瑞以無援助竟至捐軀額爾登額實死有餘辜矣力戰絶後繼終焉捐其身於爾無悔怨於我増悲辛不須讀杜牧謂過趙使君故大學士舒赫徳舒穆嚕亦滿洲大族昔徐元夢以翰林兼通清漢文在皇祖時即為衆所推舒赫徳其孫也頗能世其家學雍正年間以試繙譯授中書軍機處初立與兆恵同為章京故亦通達事體余即位授御史三遷至侍郎兼步軍統領戊辰擢都統復遷尚書為軍機大臣隨經畧大學士傅恒赴金川辦軍務甲戌以後並在軍營再起再罷戊寅冬以白衣留阿克蘇聞兆恵黑水事即飛驛奏聞隨簡精鋭馳援仍授副都統參贊大臣己卯春擊潰賊衆平定回部擢尚書予世職圖像紫光閣戊子春往雲南籌辦軍務以陳奏失當下部議罷職任予都統銜赴烏什為參贊大臣辛卯土爾扈特汗渥巴錫等率全部歸順調至伊犁經理撫輯事悉協機宜即命為伊犁將軍旋授户部尚書及領侍衛内大臣癸巳秋晉大學士召還兼管吏部刑部甲午秋率滿洲兵往臨清剿捕逆匪王倫等甫六日而蕆事賜戴雙眼孔雀翎以旌其能復予雲騎尉世職嗣以平定金川圖像紫光閣文武大僚得再與功臣圖贊者不過數人而已丁酉夏扈從易州敬襄山陵大典忽遘時疾遣醫診視不數日而歿賜襚賜卹入祀賢良祠並於回京後親臨奠醊舒赫徳老成練達足副任使且纔長余一嵗不意其溘逝如此之速曽賦詩惋惜之迹其生平多以功績顯故從其著者列為功臣云遇順饒有智逢艱或失算究以從政久經事實明練屢罷屢復用中心惜英彦踐歴更老成遂掌絲綸渙西師頻建功然職在參贊土爾扈歸順土爾扈特急呼之則為土爾扈余初聞渥巴錫等來歸之信恐伊勒圖一人不能經理得宜因命舒赫徳往治其事舒赫徳至伊犁於一切安汛設偵籌儲宻備之事無不悉妥故新投之人一至如歸詳見向所作土爾扈特歸順記經理實妥善叶六日靖臨清則信資偉幹爕理原未久勲伐誠可按懐舊不能忘悽然一染翰五督臣五首内録四首故大學士陜甘總督三等忠勤伯黄廷桂閣臣之兼督臣者凡四人黄廷桂宜居首然四人者或未入閣辦事或雖莅綸扉無事實可録而在封疆中則皆政績卓著者故並列之督臣亦如舒赫徳列於功臣梁詩正列於詞臣例也黄廷桂鑲紅旗漢軍康熙五十一年充侍衛尋任㕘領雍正二年授宣化總兵五年擢四川提督皇考知其才遷四川總督仍管提督事乾隆元年併川陜總督為一廷桂専任四川提督是年冬内陞鑾儀使二年署天津總兵五年遷古北口提督六年授甘肅巡撫十三年春署陜甘總督其冬遷授兩江總督十六年調陜甘十八年調四川十九年擢吏部尚書總督如故二十年五月授大學士兼管總督六月復調陜甘廷桂所至力為整飭吏治肅然遇事無所徇隠悉核實入告誠篤有足嘉者其任陜甘也適當西陲用兵之時廷桂籌辦軍需備極勞瘁凡飼解駝馬轉運糧饟無不精詳妥恊毫不累民供輸數年内地不知有兵糈事至其規畫悉中機宜每有𫝊諭批示尚未達甘肅而廷桂郵牘至適相脗合者叙平定準噶爾功子騎都尉世職旋晉三等忠勤伯賜雙眼孔雀翎紅寶石頂四團龍補以示寵眷二十三年冬督辦軍需赴涼州抱疴日劇猶勉力視事邊地少良醫布政使蔣炳奏聞即遣額駙福隆安挈御醫往視甫行而廷桂已於二十四年正月病故覽其遺疏深以調飤馬匹及地方賑務籌辦未竟為憾益足衋傷矣仍命福隆安馳往奠醊賜銀萬兩治喪入祀賢良祠即令其子襲伯爵并製輓辭四章有云鞠躬盡瘁今誠已葛亮而來此一人非斯人不足當斯語也及平定西域追畫其像於紫光閣余親為之贊云未同凱宴痛惜曷任至今思之猶為隕涕云西陲用兵時軍需信要務統勲既罷斥劉統勲為陕甘總督聞阿逆之變議棄巴里坤恐其揺惑軍心即罷斥逮治而以黄廷桂代之籌辦軍務始得其益特用就熟路擘畫實盡勞諸事皆弗誤而以民為重從不加征賦遇災仍賑卹入告直陳故可比主吏蕭闗中勤供輸以此論功勲章服錫異數為政頗尚嚴赫赫名久著然而公無私任勞任怨素兩朝所造就似此誠罕遇故大學士前兩江總督尹繼善皇考時擢任封疆余踐阼後存者漸稀惟尹繼善歴年㝡久尹繼善姓張佳前大學士尹泰子也雍正元年翰林五年遷侍講兼户部郎中命往廣東審勘藩臬兩司受賄徇隠案得實即署廣東按察使六年三月以内閣侍讀學士往江南協辦河務八月署江蘇巡撫明年二月實授仍兼管河務八年署江南總督十一年遷雲貴廣西總督乾隆二年秋入勤以父年老乞留京授刑部尚書五年授川陜總督再調兩江兩廣十三年大學士公傅恒經畧金川尹繼善往為參贊兼署陕甘總督廿一年實授兩江總督兼管總河廿九年晉大學士為軍機大臣仍管總督三十年召還入閣辦事三十六年卒於位聞而軫悼即遣皇子奠醊賻卹有加入祀賢良祠滿洲翰林中優於文學兼能通達政事者無出尹繼善右且以其為皇考所留貽大臣始終任用之尹繼善公正端厚所至以愛民為先務故甚得名譽臨事不動聲色而小大悉就理籌畫河工諸務並協機要其待僚屬雖若上和下睦然遇劣跡應劾者亦不多寛假以是人皆愛而畏之丁丑壬午乙酉三次承辦南巡不涉華靡不事科派實能深體余意尤足嘉焉尹繼善任督撫四十餘年在内閣僅六載其事蹟多著於外故仍列之督臣懐念不置而環顧滿洲翰林罕有能繼之者益増感嘆耳八旗讀書人假藉詞林授然以染漢習率多忘世舊問以弓馬事曰我讀書秀及至問文章曰我旗人胄兩岐失進退故鮮大成就自開國至今任事奏績茂若輩一二耳其餘率貿貿繼善為巨擘亦頼訓迪誘八年至總督異數誰能遘政事既明練情性復温厚所至皆妥帖自是福量輳能詩畧如白謂居易倡和亦頗富獨愛馳驛喻南巡時於山水名勝略涉㳺覽即行從不留戀久坐而景槩亦自不遺尹繼善竊比於馳驛觀山聞之不惟不怪而嘉其深合余寓意於物而不留意於物之義向每賦詩及之知寓意不留故大學士兼江南河道總督髙斌髙斌初為内務府司員雍正四年任蘇州織造六年遷廣東布政使尋調浙江江蘇及河南九年授河南副總河十年春調兩淮鹽政是冬兼江寧織造十一年春皇考命其就近學習河務十二年春署江南總河余即位後令實授河督乾隆六年調直𨽻總督十年擢吏部尚書十二年夏授大學士十三年閏七月以大學士兼管江南總河十八年以河員應追核減之項聴其遲延又淮水決邵伯二閘罷職留工自効二十年卒於工念其為宣力舊臣敭歴年乆予内大臣銜廿二年南巡復念髙斌為總河時頗著勞績如毛城舖所以分洩黄流於徐州設水誌必至七尺始開後人不用其法遂致黄弱沙淤隠貽河患至三滚壩洩洪湖盛漲髙斌堅持堵閉下河亦屢豐其功在民生自不可冺雖張家馬路及運河二閘不免果於自信貽誤而瑕瑜自不相掩本朝河臣雖不及靳輔較之齊蘇勒稽曽筠殆有過之因命與靳輔等三臣同列河壖祠祀復原職髙斌存心忠厚且以理學自居人頗方正其辦河務實能體國抒誠不涉虗偽食報宜不爽乃其子髙恒既以任鹽政時受商人賄伏法其孫髙樸往駐葉爾羗貪黷藐法勾通奸商盜賣私玉贓逾鉅萬且派累回人㡬致激變實非情理所應有因即於回疆立寘大辟猶不足以蔽辜髙斌後人不宜若此余雖憫髙斌實不能廢法曲貸也其在綸扉未久而治河之績彰彰可考因於督臣中致念云本朝善治河靳輔齊蘇勒斌實可比靳弗徒保工急至其於齊也有過無不及齊蘇勒惟以保守隄工為務其於為民大局初不計也惟是閉三壩自信過於力下河曽受福異漲害亦迫髙斌力主堵閉三壩下河固受其利然狃於成見雖遇清水盛漲亦執而不變癸酉秋洪湖異漲其自髙堰五壩洩下之水髙寶兩湖至不能容髙斌仍不肯啟放車邏南闗等壩致洪流衝突潰決隄岸不特下河被災甚重即瀕運河之髙寶各州縣亦胥受其患則咎有攸歸因治髙斌之罪用此抵以罪勸懲國之則然終諒其心與祠復原職壬午復南巡清口親定式預拆東西壩頻年已受益壬午南巡閱視清口因於髙堰五壩定水誌如清水比誌増長一尺則拆清口東西壩十丈視其増長尺寸隨時展拆兩壩俾宣洩有資為釜底抽薪之計及水減退仍按誌以次鑲築酌留口門二三十丈自定水誌以後河臣如法展拓清口連嵗有收下河受益昨秋黄河決洪湖漲因逼無已徐啟壩未至衝潰棘昨秋豫省黄河漫溢歸入淮河勢甚浩瀚計洪湖必不能容納因先事綢繆傳諭薩載以次展拓清口並於各閘壩酌啟洩水薩載遵㫖盡展清口東西兩壩六十丈又先啟山旴智信兩壩復啟仁義禮三壩並將南闗車邏昭闗各壩同時開放運河兩岸始保無虞雖下河不免稍被偏灾然減下之水較之衝决勢緩故為患不至太甚且豫籌賑卹民皆安堵惜髙斌當日未能見及展拓清口及啟放閘壩致有癸酉之失也使斌而有知應歎初未識故大學士兼兩江總督髙晉髙晉大學士髙斌之姪也初任知縣洊涉山東運河道乾隆十四年擢山東按察使明年遷安徽布政使二十年擢安徽巡撫尋協同白鍾山辦南河事廿六年授江南河道總督三十年擢兩江總督命統理總河事三十六年授大學士仍管兩江總督兼總河髙晉歴封疆三十年勤以奉職誠以任事尤能整飭吏治盡心民莫吏不敢欺而民愛之盖由縣令起家於下情無不深悉故也其於治河頗步趨髙斌效其純而去其偏故無少愆失凡修防疏築諸事皆實心經理當今曉河務者無出其右昨秋豫之祥符儀封黄河漫溢奪溜堵築非姚立徳等所能任因勅髙晉率南河諳練將弁馳往董治乃兩處漫工屢塞屢開績久弗就髙晉憂惶成疾日益危篤尚書袁守侗郵奏即遣侍衛㩦太醫院使往視並諭以安心調理醫至甫數日竟不起聞而軫悼優卹有加入祀賢良祠並為輓詞惜之髙晉老成敦樸體用兼優實督臣中之傑出者雖為閣臣而未辦閣務故仍列於督臣髙晉齒雖長余數嵗而精力未憊冀尚可資倚任不意其遽以勤事歿深嘆賢臣之淪謝矣憶余初踐阼時大臣皆長於余且多皇考所簡用今則舊臣竟無一人即有長於余者悉余所㧞擢而年小於余者亦間有彫零此懐舊之詩所為作也從來擢督撫徳才量去聲並重以此下僚中平聲百不一二中自知縣起者臻斯必超衆晉也實其人故悉下情洞更兼習河務要任久倚用乃以治河決來豫屢稽功叶憤懣因致疾不起誠堪痛歴歴懷舊臣中外資經綜而予未息肩籲俊期與共閱武乆矣兹偃武慎哉尚詰戎備而期不用習以待成功履地雲梯捷連環火器雄按勞行賞遍士氣鼓薰風賜兩江總督薩載兩江總督例兼河任重事繁資是吪晉也昔聞家訓在髙晉大學士髙斌之姪習聞家訓諳習河務因簡任而江總督兼管河務十餘年載兮能集衆思羅幕開建業亦無忝川改陶莊有足多陶莊引河自康熙己卯及南巡時即入覲命開治而河臣率以為難因循未就薩載履任時面諭赴工察看伊即力請開挖引河與余意合遂於四十二年二月奏報工成引河暢達形勢甚順等語因交部從優議叙給與世職以示奬勵識要輸誠更何諭所期軍肅與民和賜蘇州巡撫楊魁乆曽為府道上下習嫺知必不喜趨奉更當體溺饑於奢儉應示既飬教毋遺勗爾勤本務周忱有往規賜總河李奉翰今調河東總河之任之作耕當問僕世勤司奉翰父李𢎞曽為南河河東總河簡任南河兩載斯特以豫工須善後因移東省藉深知江南河務雖繁於河東而豫省善後事宜𦂳要李奉翰久任河官較為諳習至南河本要任而現在安瀾工程稳固又有薩載兼管陳輝祖隨同辦理自可漸臻熟悉因將二人對調行以無事莫過慎防以其先豈在竒尚此合龍盼佳信闗心遥望引愁思賜大學士仍管浙閩總督三寶海疆浙閩重幕府簡猶難必也知大體寧惟期小安暴除艱廢猛衆得允於寛節相權資理徐歸黄閣端閲武祖制真垂逺杭州駐八旗鴻猷惟慎矣武備可疎之既練仍應閲雖安不忘去聲危未曽御弧矢弓矢為我朝勞凡家法即位以來每率侍衛等較射習閲武必親御弧矢示衆自壬午年臂痛雖馬射如故而罷步射者十餘年矣每追憶前事不覺悵然臂病久慙斯閲江寧旗兵詰爾方行寓覲光閲兵江表武維揚微風不動旌旗肅曉日偏増組練煌問俗此時思繼述駐防當日意深長毋忘爾祖國之藎禦侮曽兹隨豫王按豫王執明福王平江南其功不可冺戊戌春有㫖申雪罪愆並復其舊封號配祀太廟凡以旌前示後勵我宗潢而彼時隨王折衝禦侮皆我八旗子弟兵今兹駐防江寧者或尚有其曽元也書扇賜大學士阿桂時在蘭州剿回冦邇日書詩經曩時曽書詩經全部並指示盡院圖之間亦涉筆兹重觀之覺書法未臻因復手寫一通易之適書至小雅北山從事賢勞經營四方之句不覺繾懐于役者之勞云北山什重勘即事懐賢臣于役頻再三江河資畫䇿逆回兹剿陷大學士阿桂於上年臘底命往浙江閱勘塘工今春並令由江南至河南查辦河務時值甘省匪回肆逆遂命由豫取道赴甘㑹𠞰近雖屢奏𠞰殺賊匪并於賊人所佔山梁四面拿卡圍逼賊勢窮蹙待斃而蕆事捷音尚未奏到懸望日甚一日耳徒以恃險守絕壁及深塹宻圍待坐困報功信遲欠憤懣爾我同賢勞乆煩憺卿無父母憂予有股肱念賜扇藉解炎是用五字掞兩江總督薩載奏報得雨詩以誌慰並書扇賜之江南夏五挿秧時一嵗農功􅇰要期早月霑膏閏餘望髙田需澤次時遲薩載奏上江地方南路雨水充足中晚二禾紛紛插蒔北路桐城合肥滁州一路地勢髙阜自五月廿四廿六等日得雨後髙田不無望澤正擬設壇祈禱於閏五月初八九等日甘霖大霈入土約有一尺山鄉得此透雨均可不悮三時栽插云按農書夏至後半月分三時頭時三日中時五日末時七日也甫商祈雨為去聲民請遂得霈霖荷昊慈接閲黄綾封事報誠忻誠懼諭卿知題𢎞旿山水畫二幀竹徑通幽萬个青豁然開朗有溪亭主人欲寫湖山趣㑹以神非㑹以形右竹閣臨流楓溪幾曲水瀠洄攬景沿流一棹開未肯秋風吹落葉恐妨杜句涉重儓右楓溪縱葦閲火噐營兵因成六韻火噐誠要用營居築水濵火噐營建自乾隆癸巳年此地濵長河以其去城市逺不致衣食侈費一意習勞肄武也欲因逺城市可以致精純萬礟齊聲發千軍一志淳武成斯敢忘律在衆胥遵幼習義猶美火噐營兵紀律整齊技藝嫻熟其十嵗子弟演放進步連環鎗者亦能如法幼童即能如是亦可嘉尚因命徧加賞賚以示奬勵勞思善亦真旌勤徧加賞教養總須均過南嶺閱健鋭營肄武作健鋭置營久逺奢俾習勤香山初置健鋭營選八旗精壯子弟列營聚處其地逺隔城市奢華於習勤肄武尤為有益從來出桓赳屢藉建功勲營中官兵屢經調派出征最稱勇敢平定西陲及兩金川均著勞績是日觀操練果然超匹羣賞因旌善布等第要明分四月二十一日親閲健鋭營鳥鎗弓箭及馬上四鎗四箭并各種技藝俱能嫻熟超羣因命頒賞其超衆者加倍賞給以示優奬閲武不黷還勤詰由來經國常因乗駐鑾暇遂閲訓貔方分翼登梯壘健鋭營習雲梯馬步射鳥鎗諸技最為精練毎校射時雲梯兵按旗分翼賈勇先登尤稱趨捷總戎試射塲是日適夀春鎭總兵袁敏重慶鎮總兵馬鎮國來覲因命試射以觀其技練習否也未能親示度略覺恧無遑向年毎閲武時必先親射以示觀法自庚辰臂病後步射艱於持滿命中毎引為愧屢見於詩也閲武長河右岸畔火噐建兵營俾以隔城市因之致鋭精火噐營於乾隆癸巳年移建西頂左之長河岸别為一營以去城市逺得專心習勞肄武也其演放進步連環鎗法有童而習之者技藝最為精熟每縁路便閲亦欲賞兼行近年每縁往西頂路便簡閲分别賞賚既示奬勸亦於旗人生計資益也恰值貴山覲擕觀廣甸呈哈薩克阿卜勒比斯適遣其子噶岱來覲於四月十三日在山髙水長賜宴賞賚後因於十五日亦命隨至教塲與觀操演旌旗壯風色組練耀曦明三進轟雷發大閲九進始發連環鎗斯為日行小操故三進即發雙馳雄電争無過小隊試非詡逺人驚然寓詰戎意毋忘保泰情酹克勤郡王園寢疊戊戌詩韻讓帝之冡子首陳推戴心克勤郡王岳託禮親王代善之長子也有謀勇多戰功天命十一年八月宻議太祖升遐岳託與弟薩哈璘以日太宗有聖徳推戴告其父代善曰國不可一無君當速四貝勒才徳冠世深契心也先帝聖心衆皆悦服繼大位代善曰此吾夙乃夜作議書翼日徧示諸貝勒大臣於朝遂定議奉海闗太宗嗣位又於天聰時奏請善撫降人及請於山通州燕京三處急圖其一以定丕甚睿親太宗嘉納之崇徳三年以命為揚威大將軍與王分道征明所向克㨗疾薨於軍王康太宗聞之驚慟輟膳三日立碑詔封多羅克勤郡熙二十七年聖祖為紀功乾隆四十三年以王後改稱平郡王復還原號並令配享太廟忘家惟為去聲國力勇更謀沉我祖所嘉許予躬應奠臨閟宫教配享彰善意猶深賜奠功臣揚古利墓别部自為長揚古利姓舒穆禄氏其父郎柱本庫爾喀部長也來歸識聖人報讐甫十四郎柱率所部人歸我為部太祖遣子揚古利入侍尋郎柱人所害揚古利手刄父仇時年甫十四卒任尚主焉毎從征伐身先士太祖深異之日見信詔之止亦不止或力戰被傷猶裹創奮擊以故功冣多前後大小百餘戰俘獲無算崇徳初從征朝鮮中礟傷殁太宗親臨慟哭視含歛追封武勲王順治中配享九年太廟康熙三十九年御製碑文紀其功雍正加封號曰英誠努力以終身所重心惟赤更兼勇絶倫鼎湖伴咫尺千載㑹精神賜奠功臣費英東墓薩爾滸之戰衝鋒首建功費英東姓瓜爾佳氏先世為蘇完部長太祖初從其父索爾和率所部來歸授一等大臣尚主佐理國事薩爾滸之戰明經畧楊鎬率四路總兵杜松馬林李如柏劉綎分將來犯杜松駐兵薩爾滸山巔費英東率所部衝破其軍死者相枕藉杜松戰殁已而馬林劉綎兩軍皆覆李如柏遁歸是役也明以四十萬衆分道來犯五日之間殱其精鋭殆盡勢如破竹實費英東首功云遂成破竹勢真是冠軍雄奬善戒其惡費英東性忠直敢言奬善黜惡無所撓避我而後太宗嘗諭羣臣曰費英東見人不善必先自斥責劾見人善必先自奬勸而後舉故被劾者無怨言被舉者無驕色未聞諸臣以善惡直奏似斯人也天聰初配享太廟順治十六年追録佐命功第一晉三等公世襲康熙三十七年國功御製碑文表其勲乾隆四十三年以費英東為開臣之冠特晉封一等公攄謀濟以忠二陵近相望來往㑹雲風賜奠功臣額亦都墓自古逢開創必資英濟臣白山聖人作東海卓材彬額亦都姓鈕祜禄氏先世居長白山幼時父母為仇所害年十三手刄父仇避居嘉穆瑚村依其姑會以少太祖過額亦都識為真主辭姑從行驍勇善戰能擊衆所向克捷嘉爾忠秉素寧惟勇絶倫額亦都性忠誠勇敢嘗督兵攻巴爾達城值渾河漲以繩聫軍士魚貫而渡夜率鋭卒攻城守者驚起殊死拒額亦都跨堞戰飛矢貫股著於堞揮刀斷矢戰益力被五十餘創不退卒拔其城而還其忠勇類如此用兵四十餘年每克敵受賜輙分給有功士卒不以自私天聰元年追封公配享特太廟順治中建碑墓道以旌其功康熙七年爵其子遏必隆為一等公枌榆佳域䕶一徳永相親賜奉天將軍永瑋將軍雖鎮守要任勝其他故國屏藩寄長謀教養多一身為表率六部視平頗聖祖曽孫爾勤劬當若何賜吉林將軍慶桂連疆因覲謁扈蹕日趨隨雖未父書讀慶桂乃尹繼善之子繼善詞臣出身慶桂由父䕃得官猶存世徳規俾之習政事曽在軍機處行走已可鎮邊陲夫子訓孟武其言汝尚思慶桂多病且尚有生母故訓之示盛京五部侍郎陪都制度規京國五部原應各備官盛京為陪都重地準京制設立五部堂司官而吏部銓考則専統於京師惟一合思鮮咨度入聲一五部各止侍郎統羣當念倍艱難一部之中雖不似京城分各司然亦有郎中員外等官為不少矣雖云漢語易清語今人率以漢語為易而以清語為難莫尚新觀忘舊觀承平日久旗人習漢語者多能清語者反少朕甚憂之盛京為國家根本大臣等當董率官吏旗人熟習國語敦尚滿洲淳樸舊風毋令沾染漢人習氣競尚侈靡也明季末流兹逺異明季陪京設部院諸寺監雖為投閒置散之地而樹黨分門互相攻撃甚者託名直言遥制中朝者有之以致言愈紛而政愈亂日引月長以及明亡我朝陪京五部各盡其職從無明末惡習是亦祖宗良法美政足為憲典也欽哉六計表衣冠賜山東巡撫明興布政黄圖治有效教巡山左撫而安官方弛後整非易山東自前任巡撫國泰貪黷營私布政使于易簡扶同欺隠以致吏治廢弛倉庫多有虧缺因令徹底清查勒限彌補民隠災餘救更難自辛丑豫省青龍岡漫口黄水下注城武金鄉魚臺濟寧等處被淹較重屢降㫖加恩展賑並飭令地方大吏率屬實力妥辦毋致一夫失所賑恤逾年費弗靳被災較重之州縣既降㫖撫恤又以自昨嵗二月合龍後該處低地未能全涸復屢頒諭㫖加恩常予賑濟直至今嵗閏三月為止俾災黎得資接濟即多費帑項弗計也恵鮮僻壤力應殫時巡夏諺義斯重供帳寧須飾美觀賜兩江總督薩載節度江南歴多嵗練於吏治悉河工惟應益慎勤諸事勿以己知懈一躬不患士文武莫弛欲求民裕儉當崇久而敬者晏平仲絜矩為師爾我同賜安徽巡撫富躬分巡歴十年擢撫自承宣富躬由吏部司員歴任道員十餘年嗣由廣西布政使擢授安徽巡撫無礙馮唐老應思黄霸賢鮮平聲民慎於後疎獄戒其前上年冬該省潁州府阜陽縣有監犯王剛等反獄一案富躬以失察降為三品頂帶速反勤諸政休因扈蹕延賜江南總河李奉翰南河任久熟經權每助豫工更力宣常近危仍勵汝志前因李奉翰熟悉河務命徃豫工堵築青龍岡漫口壬寅四月初十日壩工已掛纜合龍十一日壩工陡蟄李奉翰督率人夫搶救轉身時金門裂縫數尺李奉翰失足跌入被門纜掛住傷胷夫役救䕶得全大學士阿桂奏到深為憐念兹迎鑾境上因其河工勞績茂著賞給騎都尉世職即令其子鑾儀衛治儀正李慶徴承襲以示優眷不辭勞實致予憐而今河復雖無事益謹隄防戒有愆兩字官箴爾其聼身惟勤與志惟䖍賜漕運總督毓竒驄馬巡漕運恰遭河決危毓竒由給事中派出巡漕旋擢内閣學士仍兼巡漕值辛丑青龍岡漫口尚未合龍毓竒往來督察漕運無悞因擢授漕運總督贊參頗中要來徃不辭疲遂命今職領幸當故道隨幚期速踰月昨嵗據毓竒奏漕船尾幚於十月二十三日全數渡黄核計各幚回空抵次較常年可早月餘等語所辦甚為妥速儘力更逢時賜浙閩總督富勒渾武林曽昔撫而巡開府兹教統浙閩祗以迎鑾來隔省又看閲嵗㑹今春漫勤供奉水及陸應勉調和軍與民識大體毋苛小節思之莫忘誨諄諄閲杭州旗兵已此百年久駐防侵尋風氣漸如杭一齊傅耳誠何益衆楚咻之義可方今各省駐防旗兵其清語率皆生澁然音律尚不致大錯設令其漢語則與本地漢人無異風土所習染亦無可如何然必不可令忘清語也何事弗厪返舊俗無思不服緬前王命皇子射聊示衆老弗躬為慙莫遑閲江寧旗兵疊庚子詩韻湔過旌功史重去聲光國初平江南執明福王實豫王之功戊戌春曽降㫖申雪前愆復還封號配享勞云太廟以旌前復封陪享偉勲揚祇今江表文風盛惜昔闗東武徳煌一日備寧聽其弛八旗駐實慮猶長偏安南渡原堪守即境慆淫惡福王按福王監國江寧勢雖危弱然果能念亂圖存卧薪嘗膽未嘗不可茍延嵗月如宋南渡之偏安而乃信任馬阮惟聲色是耽以致淪胥莫挽我豫王乗霧渡江援師悉潰其底滅亡實自取耳賜陜甘總督福康安庸臣姑息養癰瞑辛丑年甘省逆回蘇四十三滋事時李侍堯正獲罪在獄念其平素尚能辦事因棄瑕録用復授為陜甘總督一切善後事宜責成經理詎李侍堯姑息飬癰於四十六年即有邪教回民修理石峯堡之事又於上年五月葺治堅固且敢公然糾衆聚集禮拜寺謀逆一切旗幟帳房噐械種種齊備夫逆民蓄謀至三四年之久而李侍堯安坐省城竟同聾瞶其始終貽悞實為百喙難辭邪教倡回民弗寧是用興師發健鋭本年四月邪教回民田五等於小山起事謀逆時李侍堯在靖逺逗遛以審辦賊黨為名並不親帶官兵設法剿捕迨賊人兩次翻山逃竄復肆行煽誘擾害良民屢經嚴㫖訓飭李侍堯始往軍營彼時即料其必不能辦理妥恊因命福康安為陜甘總督同海蘭察帶領巴圖魯侍衛等馳驛先往督辦又命大學士阿桂尚書復興挑選健鋭火噐營精兵二千名帶往剿賊以期迅速蕆事遂因易督奠生靈前旌早已奪要地福康安甫到甘省軍營商令海蘭察籌勘進兵路徑即將偵探賊匪擒殺并奪取牲畜噐械隨由隆徳進剿底店帶領巴圖魯侍衛督率官兵奮勇殺賊數百名生擒三十餘名直搗石峯堡所調各路官兵亦俱到齊聲勢壯盛四面圍堵賊巢設法進攻斷其水道賊勢窮蹙已似釡魚檻獸計日可殱除浄盡該省民情安貼惟慎籌善後事宜永期綏靖耳一路真稱臨福星善後猶應慎籌畫聴無聲勉視無形閲武健鋭雲梯營實自戊辰始事因伐促浸促浸即大金川歸降宥其死厥後乃背盟猖獗搆禍起終滅兩金川自戊辰嵗於香山置健鋭營訓練八旗勁旅屢調出征勇敢素著平定兩金川實資其力興屯晏久矣誠資衆軍力亦藉訓練耳準夷及回部蕩平胥頼此健鋭營列伍萃處地逺京城無習俗外誘技易精勤平定準夷回部時用之俱著成效實勝寺有碑績纂文皇美昔我山杏太宗文皇帝以偏師破明兵十三萬於松山歸而建實勝寺於盛京以昭功績前此己巳嵗金川凱旋因就西山舊寺葺新之名曰實勝寺用紹前光詳見實勝寺碑文所以每駐兹閱武遵前軌既用示詰戎兼以行賚予叶馬健鋭營鳥鎗弓箭及上四鎗四箭各種技藝俱能精熟即十嵗以下幼童亦有能嫻習者每親臨閲視命分别頒賞其超衆者加倍賞給以示鼓勵所為豈徒然不出敬勤理書扇賜陜甘總督福康安山莊風土好時若雨暘和以此起居適竟加飲膳多新疆勞跋涉諸政藉規磨前令福康安往闗外玉門縣屬惠回堡查勘地震偏災優加撫恤並修築土堡營房一律完整事畢後又赴巴里坤會同都統奎林查勘該處能否加兵屯田妥籌定議俾永逺遵行復憶及去嵗福康安剿捕逆回一事成功迅速深可嘉尚因賦此什書扇以賜書扇思去嵗嘉卿耆定歌裕親王廣禄八十生辰賜詩為夀念我同曽有幾人老來益與老年親春秋較長上聲正五嵗福禄駢臻值八旬善射兄今遜筋力裕親王為八十世祖曽孫今年居長於余五嵗向曽管理十五善射嫻於弓矢習蒐予尚勉精神兒孫拜合坐而受今年六月二十七日為王八十生辰特遣皇八子永璇帶領皇孫緜惠緜億緜志緜懃齎御製詩章及扁聫如意冠服等件往賜並令永璇等與王行禮王應坐受以見我朝家法隆禮親賢至意佳話天家貽萬春伊犁將軍伊勒圖病故詩以惜之伊犁廿載宴邊陲不動色聲静鎮之充國屯田誠制勝昔漢趙充國為後將軍議罷騎兵萬人留屯田條便宜十二事宣帝從其計𦍑人降者三萬餘盖伊犁自平定準噶爾回部後屯政大開烏魯木齊等各城命大臣分駐經理屯田民户日増兵餉不費行之二十餘年天時順成地利墾闢各該處屯田頻年大熟皆伊勒圖總理得宜之效也子儀召飲感無欺唐郭子儀鎮河中時僕固懐恩叛誘回紇吐畨等三十萬衆犯邊子儀隨數十騎免胄見之責以大義回紇等咸捨兵下馬拜曰果吾父也即召與飲遺之錦綵結誓如初兹伊犁自準噶爾回部平定以後伊勒圖為將軍馭以誠信額魯特回部等皆安居樂業寧静守法與内地編氓無異如哈薩克之阿布賚阿布爾比斯及其子幹里蘇統罕和卓等皆敬禮伊勒圖或呼為父此固國家徳威逺播亦由該將軍威名素著也長城萬里外萬里柱石念兹允在兹分我憂心西顧乆優恩施那減心悲伊勒圖坐鎮伊犁垂二十年撫綏額魯特及回城諸部寧謐免朕西顧之憂昨聞其患病特遣御前侍衛公豐伸濟倫帶領御醫前往診視冀其痊可兹遽聞溘逝深軫於懐因降㫖晉贈一等伯即令其子世襲仍賜銀一千兩經理其喪令豐伸濟倫前往致奠並照公爵給與䘏典以示優眷賜大學士伍彌泰少長余一嵗看如長我年依然可綸贊何必説車懸步履昨稱蹇伍彌泰昨嵗因染㣲疴艱於步履今調飬數月精神已復舊矣精神今復痊願留二三老作伴廟堂賢賜山西巡撫伊桑阿首善旬宣職稱去聲其中丞巡撫命臨兹巡惟吏治弊毋懈撫在民艱隠莫遺期俾閭閻獲安彼底須共張去聲務勤斯斌之修已晉之政胥汝家風勉效為題唐岱寒山萬木圖書院當年供奉人識其筆意此誠真喜其已落人間久又入石渠弆賞頻陜甘總督福康安奏甘省時雨普霑田禾有望詩以誌慰並書扇賜之甘省年來若雨暘福星民幸慶安康因知往嵗官為蠧向年甘省因王亶望揑灾冒賑嵗嵗報旱而實無旱侵蝕監糧各屬從風效尤及事敗露大加懲創分别治罪詳見辛丑年言志諸什並識協時政貴良髙下田胥霑澤渥東西河可卜秋穰據福康安奏據蘭州鞏昌平涼慶陽寧夏西寧等府秦階涇等州所屬於四月中下旬並五月上中旬各報得雨深透麥豆青稞暢茂秋未早者出土遲者播種齊全其甘涼肅州等屬亦於五月十六七日得兩並頼渠水溉潤禾苗滋長陜西夏收豐稔通計九分現在雨水均調秋田長發民情欣悦至寧夏各渠壩牐加砌暨増築髙厚之處均一律趕辦全完放水倍加暢駛上下田疇澆灌齊足等語甘省向來揑灾冒賑自福康安抵任後一洗積弊且年來雨暘時若轉歉為豐深慶封疆得人也慰心書箑遥為賜布我薫風敬以蘉閲武健鋭營兹駐今將四十年雖安不忘耳得力則誠然戊辰嵗於香山置健鋭營訓練八旗兵丁素稱精鋭從前平定準夷回部大小金川屢經徵調實為得力詎獨驍騰㨗所嘉心意堅滿洲兵臨陣以退縮為恥不似緑營懦怯惡習往往有兵不顧將脱逃之事兹因臺灣逆匪林爽文等糾衆不法調兵進剿乃因黄仕簡任承恩二人觀望誤事以致賊勢鴟張總兵郝壯猷所帶兵丁遇賊潰散退回郡城其畏葸失律罪無可逭若録營弁兵俱能如八旗勁旅奮勇堅心埋根前進自當早獲渠魁撲滅蕆事矣間因示戎詰亦以寓恩宣香山地逺京城健鋭營列伍萃處無外誘習氣故能操練精熟每駐蹕此地必親臨閲視分别頒賞其中技勇超衆者加倍恩賚以示鼓勵閲火噐營兵火噐營分建長河兩岸濵癸巳年於西頂北之長河岸建葢營房移城中火噐營兵之半於此居之其地去城中稍逺俾得専心習勞肄武技藝益臻純熟俾之逺城市益可致精純九進閲真練每大閲火噐營操演九進始發連環鎗其日行小操則三進即發六韜匪漫循雲梯一例賞施恵本應均昨駐静宜園閲健鋭營兵分别頒賞兹來閲視非徒簡其技勇亦所以均恩賞也閲武巡方之所重詰武及修文昨已試諸士今應閲衆軍熊羆分列隊鵞雁聚成羣原可百年偃休疎一日勤酬勞略行賞合度亦堪欣敢曰瀛氛靖戒安意正殷賜兩江總督書麟之任之作入覲剛逢六轡琴遂隨安福御舟名析津臨歙徽災務紓予念乙巳上江安慶徽州等府被旱書麟時任安徽巡撫督率所屬辦理賑恤事務頗為盡心俾灾黎不致失所實紓厪念廉謹家風望爾任書麟之父高晉前為兩江總督廉謹有為今書麟擢授此職亦當勉繼家風庶不辜予簡任之意漁舎蝸廬非異景龍陵虎阜憶前吟謂卿此去推行好寄我懐民一片心賜山東巡撫長麟連疆因接來駐蹕許追陪去宄消塵案長麟任山東巡撫頗能整頓地方嚴切緝捕上年十二月連次拿獲積年賊匪巨窩捐職運判田玉堂及包五李徳明等三案并賊犯二十餘名戢匪安良具見實心任事已即交部議叙以示奬勵有猷真幹材逢年幸同慶上年各直省俱獲有收山東據報收成九分有餘元氣要深培五字非虗譽爾惟益勗哉閲武輕輿清曉過南山閲武旌勞未可刪所愧躬倡平聲未乗騎昔年閲武必乘馬至教塲或親御弧矢示之身先之道固應如是近以年近八旬雖精力尚健亦宜節勞以從衆愿遂乗輕輿以往究用自愧云敢忘衆力近平蠻自立香山健鋭營以來屢派出征屢有成效上年臺灣逆匪滋事先派翼長等八人前往領兵打仗後復簡𣲖巴圖魯百人隨福康安等進剿果能迅奏膚功實為奮勇出力然予心益深兢惕詰戎之念未敢一日忘也益當克詰訓惟懋並視等差賞以頒莫謂例行託逰豫無非事也政胥闗賜凱旋將軍福康安參贊海蘭察等宴即席成什去年此際未登程蕆績今朝凱宴迎來往算仍先一月福康安於上年八月初旬由山莊奉命前往督剿今以七月望後凱旋來此復命計期尚未及一年驅馳真是頼羣英國威海嶠揚惟烈祖徳山莊佑實明迴憶旰宵斯擘畫不徒勞耳慰猶誠慰中豈不自懐慙何致愚民蹈法甘論武邊防乃就弛曰文諸吏率為貪臺灣設立總兵道府大員如果皆能實心整頓奸匪何由匿跡乃武職不以操防為事文職専以肥槖居心於是彼此牟利遂致吏治兵防日以廢弛而逆匪無所顧忌竟至釀成大案僨轅方悉誠吾過伏鑕奚辭信彼堪逆首林爽文等滋事之始總兵柴大紀始則以回郡調兵為辭繼則遷延不即前往剿賊方以困守諸羅邀予憐憫及福康安等至彼方悉其僨事之由已令革職拿解治罪彼實不能巧言置辯也善後雖云大端定猶餘厪念望東南福康安於平定臺灣後命留彼詳酌善後事宜大端已定惟是有治人無治法因思普吉保於臺灣總兵名望未足以資彈壓而奎林獲咎尚輕其操守訓練乃所深信即令往代普吉保為總兵庶可望其整勵戎行俾東南海隅永臻寧謐善後詳陳十六條用是兩月駐成遥臺灣善後事宜必得福康安之忠誠明練方可籌畫及詳陳事宜十六條果皆悉中弊源命廷臣集議准行而福康安歸期以此遂遲兩月抒猷山海安萬姓錫宴君臣㑹一朝念汝父當愜懐永視如子合受恩饒受恩饒處人知否不嗜殺邀天惠昭逆匪林爽文等固屬罪大惡極然亦有良民被其迫脅者悉予駢誅亦殊可憫瀕行時因即諄戒以脅從罔治之義而福康安果能體予之心専意生擒渠魁惟抗拒者痛加剿洗凡歸降者概從寛貸即此不嗜殺一念乃其克膺恩眷者也西域金川宴紫光臺灣凱席值山莊敢稱七徳七功就予自即位以來弗敢輕言用兵然前次平伊犁定回部收金川誅王倫剪蘇四十三洗田五及兹俘林爽文而七要皆不得已而用之故皆仰邀功則天鑒俱獲成功若唐太宗之侈陳七徳以為已實自恧耳又報一歸一事償往嵗緬甸之役亦由事非得已彼時將計日蕆事予以水土惡劣憐我將士多受病者適緬酋亦籲求貸罪遂令撤兵乃二十年來業已置之度外近據雲南督臣富剛奏新掌緬甸國事孟隕進貢稱臣是此一事雖未就於當年而此日之歸誠亦可償予夙願矣戒滿持盈増惕永安民和衆繫懐長養年歸政應非逺益此孜孜勵自强命於臺灣建福康安等功臣生祠詩以誌事三月成功速且竒紀勲合與建生祠垂斯琬忠明著消彼萑苻志黙移臺地期恒樂民業海灣不復動王師曰為曰毁似殊致近年以各省建立生祠􅇰為欺世盜名惡習因令嚴行飭禁並將現有者概令毁去若今特命臺灣建立福康安等生祠實因臺灣當逆匪肆逆以來荼毒生靈無慮數萬福康安等於三月之内掃蕩無遺全郡之民咸登衽席此其勲績固實有可紀且令奸頑之徒觸目警心亦可以潛消狠戾是此舉似與前此之禁毁跡雖相殊而崇實斥虗之意則原相同孰能横議且勵大小諸臣果能實心為國愛民確有美政者原不禁其立生祠也崇實斥虗政在兹題𢎞旿山水冊層城十二難為數上聲隠隠雲端見玉樓説向世間佞仙者此中無路漫須求賜山東巡撫長麟山左羣黎一何幸屢綏更值撫臣賢所嘉執敬以無事不敢放心於有年須識安民在察吏漫勤扈蹕務増妍持盈勗爾休稱泰謙鞏惟予亦勵䖍即事閱武因行賞自立健鋭營於此每年來香山親閲各兵技藝分别賞賚既示奬勵亦資旗人生計耳遊山偶答題是日便中遂至寶諦寶相各寺拈香並詣香林室小憩遊非騁耳目閲乃試髙低可忘去聲百年備惟殷一敬躋黄綾本欲滿簡用五言提往年駐此所至率有留題兹因黄綾本將滿所至處未題者多意在簡吟也題𢎞旿香山九老圖仍用白居易詩韻分班各具九之數兩次命遊白者鬚辛巳辛卯兩年俱以恭逢聖母七旬八旬大慶因命舉九老之㑹諸王與在朝文臣為一班武臣為一班致仕者别為一班各得九人令逰香山以副嘉名並冀嗣後十年一舉永兹盛典再已幸觀三絶望辛丑年欲三舉此㑹而已不可得追維往事曷禁悵懐丑惟識悵戌寧娛今嵗朝臣以予八旬萬夀欲請仍舉此典予以丑嵗既不獲遂愿而今豈忍以自娛且諸臣中亦罕有年長於予者是以未允所請重儓弗忍宴而樂置去又嫌疎且麤祗以閙餘聊一至尚仍强在未資扶欲因静慮省諸詠却撫宗臣舊所圖圖即貯此香山静宜園那更白家較伯仲大都佳話不如無命將領侍衛内大臣一等超勇公海蘭察入昭忠祠詩以誌惜本以索倫兵手擒巴雅爾乾隆二十年大兵進討準噶爾輝特台吉巴雅爾以其屬降因封為汗及阿睦爾撒納復叛巴雅爾旋附為逆大兵窮追巴雅爾走匿塔爾巴哈台山谷中時海蘭察方為馬甲從軍奮勇獨追射巴雅爾墜馬遂生擒之事聞即擢為侍衛以示優奬因之識英材超羣侍衛感恩益忠勤征戰無不委猶憶伐緬甸領隊率一旅叶明瑞被賊阻就近欲救彼額勒登額挾仇無奈為去聲所止緬甸之役將軍明瑞師次猛腊屢戰克勝既而賊偵我孤軍無繼蟻聚抗禦明瑞令將領分隊以出自為殿後而叅贊額勒登額分駐旱塔忌明瑞成功不救以致殞軀時海蘭察聞信即欲往援為額勒登額阻止彼時海蘭察不過一領隊侍衛固不能違叅贊之號令徑自赴救而其忠誠於此益見嗣後每遇出征無不簡派伊亦感激朕恩倍加奮勉至其料敵攻戰進退䇿應悉協機宜伊雖未知書儼若素嫻韜畧者金川奏㨗後遂封為一等超勇侯斯則勇兼謀赤心更莫似是後凡用師洊至叅經理凡戰皆獲勝深明進退揆曽不一字識每合七畧㫖臺灣及廓哈福康安肩比崇爵錫黻衣恩榮冀永祉丁未臺灣逆匪林爽文等滋事命福康安為將軍並令伊為叅贊不數月逆匪悉就擒獲事蕆論功因晉封為三等超勇公賞戴紅寶石頂四團龍褂及此次廓爾哈侵擾蔵界仍命伊為贊叅同福康安往討七戰皆捷賊人震讋乞降大功告竣又晉封一等超勇公及去冬回京朕方冀其長受寵恩永膺福祉不意今春抱病未及旬日遽爾溘逝可深掔惜所有飾終令典俱已恩錫既念此次深入賊境山徑﨑仄備極艱辛其得病未必不由勞瘁所致尤為憫惻因令入昭忠祠用彰勛績並為宣力効忠者勸胡乃落將星扼掔惜無已雖非當陣亡昭忠應入祀昭忠祠建於雍正年間盖為將士之捐軀行陣者特加恩恤海蘭察雖非陣亡而其屢著殊勛實合制祀之義但究與治政大臣有間未可入祀賢良惟祀昭忠祠内在國家式禮酬庸既不為過而伊得光著祀典亦可𫝊令名於無窮耳五字申予懐千秋述伊美欽定八旗通志卷首之五
