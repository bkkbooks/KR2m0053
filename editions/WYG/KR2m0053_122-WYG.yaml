body:
  text: 選舉志七八旗科第題名六歴科武進士康熙五十一年壬辰科漢軍李申金琦佐領名正白旗一朱倫瀚吳鍈佐領蒋肇基吳成龍佐領教允文鍾世臣佐領三名以上正紅旗何宏坦李宏佐領田五玉花色佐領旗二名以上鑲白吕國佐髙宏棨佐領鑲紅旗一名徐士璜髙傑佐領康熙五十二年癸巳科漢軍艾質素祖良卿佐領髙欽髙銓佐領旗二名以上鑲黄祖廷柱馬世英佐領正黄旗一名崔俊崔希堯佐領遲維墀石文賢佐領二名以上正白旗白宏文馮國相佐領鑲白旗一名韓奭韓奭佐領朱國桓朱國楷佐領二名以上鑲白旗康熙五十四年乙未科漢軍耿宏道耿化祚佐領五黄旗一名吳秉忠錫達禮佐領正白旗一名塞都劉恩儀佐領孫紹昌張廷枚佐領二名以上正紅旗葉衍秩尤文鑲紅領名一徐湛恩佛保佐領名正藍旗一康熙五十七年戊戌科漢軍李國瑞李仙培佐領鑲黄旗一名孫濓包衣青海佐領李超李士鸞佐領二名以上正黄旗武格包衣那爾布佐領李潮包衣李鍈貴佐領以上正白旗二名李維包衣雷世俊佐領徧武包衣雷世俊佐領以上鑲白旗二名七十速翮佐領名鑲藍旗一康熙六十年辛五科漢軍石載包衣發拉薩佐領鑲黄旗一名張晟包衣李鍈佐領正白旗一名余天相韓錦佐領名正紅旗一鄭之煇包衣雷世俊佐領鑲白旗一名韓壇范宏林佐領正藍旗一名雍正元年癸夘科滿洲和明聖安佐領名鑲黄旗一查勒扈渾泰佐領名正白旗一蒙古烏麗珠占百臘佐領鑲黄旗一名永福常積保佐領正白旗一名漢軍六十五包衣哈達佐領林棟王仕佐領旗二名以上鑲黄楊芝珽榮世祚佐領張燦馬謙佐領旗二名以上正黄楊普包衣謝額佐領遲維壘石文賢佐領二名以上正白旗朱秉公包衣他孫佐領佟泌年倭習禮佐領二名以上鑲紅旗張偉李楠佐領名鑲藍旗一雍正二年甲辰科滿洲科升連夀佐領名鑲黄旗一陶敏薩爾懴佐領薩哈布雅圗佐領旗二名以上正黄夀長永徳佐領武爾敦闗住佐領福寶特痕佐領旗三名以上正白白哥傅爾户佐領鑲白旗一名鎻住包衣五十七佐領正藍旗一名達三滿達佐領名鑲藍旗一漢軍佟玉儒李涵徳佐領六格包衣沈崳佐領王永瑞包衣沈崳佐領常保包衣沈崳佐領永嵗包衣董毓麟佐領以上正黄旗五名張昂包衣朱成額佐領張昺包衣朱成額佐領以上正白旗二名苗國琮白銓佐領孫鍠王殿元佐領許志良包衣雷焞佐領張琳包衣艾納佐領名以上鑲白旗四鄭烱郎應星佐領鑲紅旗一名徐大經李元亮佐領趙斌佟鐸佐領旗二名以上正藍雍正五年丁未科滿洲金保住普慶佐領馬施泰摩倫代佐領通夀馬金泰佐領三名以上鑲黄旗滿倉英徳佐領名正白旗一觀音保馬爾泰佐領瑚寶厄爾成格佐領名以上鑲白旗二漢軍劉淓馬世儒佐領譚五格包衣曺頎佐領鄧懋和包衣董殿邦佐領以上鑲黄旗三名袁朝柱李大均佐領鄭昻閻光國佐領王嵩年劉鍈佐領保住包衣伊蘭泰佐領以上正黄旗四名李炘金珩佐領名正白旗一七達子韓世滋佐領正紅旗一名張昌祀包衣雷順佐領鑲白旗一名雍正八年庚戌科滿洲徳宗額蘇柱佐領六十寶色佐領旗二名以上鑲黄伸布蘇柱佐領名正黄旗一伊三泰覺羅六十保佐領世徳陳泰佐領永徳包衣訥蘇肯内管領以上正白旗三名胡長生包衣立柱佐領鑲藍旗一名䝉古索諾木查錫額爾登額佐領正白旗一名漢軍亢永瑞海六十内管領鑲黄旗一名張四兒包衣甕白圗管領正黄旗一名二格改名王瑞朱成額佐領正白旗一名吳清英宋學禮佐領正紅旗一名雍正十一年癸丑科滿洲鄂金泰七拉渾佐領正黄旗一名巴陵阿二格佐領歪徳以上正白旗二名九哥金梁佐領石英包衣色勒管領名以上鑲白旗二䝉古特格慎訥勒圗佐領正藍旗一名漢軍徐世棟鄧世賢佐領鑲黄旗一名張璟王慎徳佐領正黄旗一名王琮朱成額佐領穆騰額包衣李彬佐領名以上正白旗二鄭之煒伊昌阿佐領萬朝興尚廷棟佐領二名以上鑲白旗乾隆元年丙辰科漢軍馬負書三多佐領李渌晉世禄馬元齡以上鑲黄旗四名塞爾特正黄旗一名黄榯邉従禮佐領正紅旗一名乾隆二年丁巳科漢軍李質樸包衣尚琳佐領正白旗一名徳勝陳廣徳佐領正紅旗一名雷霖陳治安佐領鑲白旗一名曹戴柱旗皷二格佐領徐永春李侍京佐領二名以上正藍旗乾隆四年己未科漢軍劉徳成髙應翽佐領孫士英金瑋佐領旗二名以上鑲黄楊大任包衣慶恩佐領正黄旗一名蕭鎬遲維璧佐領正白旗一名李文英包衣屯柱佐領鑲白旗一名孟可包衣巴音布管領鑲紅旗一名乾隆七年壬戌科漢軍宋澤方天相佐領于文煥常在管領趙璌八格佐領旗三名以上鑲黄汪漳佟樹佐領名正黄旗一陳杰包衣明玉管領李聨舉包衣掌儀司管領以上正白旗二名乾隆十年乙丑科漢軍張顯楊徳䕃佐領鑲黄旗一名董孟沈瑜佐領名正黄旗一蔡永福蔡湘佐領名正白旗一白璉金秉良佐領鑲白旗一名李世福常徳佐領傅國興案圗管領旗二名以上正藍乾隆十三年戊辰科漢軍劉煊劉焯佐領胥廷佐鄧五倫佐領二名以上鑲黄旗米自仁于良弼佐領正黄旗一名張玉琦石履謙佐領正白旗一名趙宗潤魯正宗佐領正紅旗一名馮興世裴徳榮佐領鑲紅旗一名乾隆十六年辛未科漢軍劉鑑劉沛徳佐領英保蘇蘭泰佐領汪倬陳錚佐領常保包衣僧保佐領名以上正黄旗四劉世徳五福佐領名正白旗一乾隆十七年壬申科漢軍董殿勲范宜恒佐領鑲黄旗一名汪昌業佟連貴佐領正藍旗一名乾隆十九年甲戌科漢軍延恂包衣額爾登佐領三格包衣劉浩佐領名以上正黄旗二徐世琳孫爟佐領名正白旗一乾隆二十二年丁丑科漢軍張杰華麟佐領名正黄旗一宜成彩宜兆勲佐領正白旗一名曹龍驤吳文煥佐領鑲紅旗一名乾隆二十五年庚辰科漢軍趙琮英亷佐領名鑲黄旗一􅃽成章陳俊佐領名正白旗一傅宗孔沙津岱佐領鑲紅旗一名乾隆二十六年辛巳科漢軍張錫謨馬世賢佐領正黄旗一名劉輝祖陳良佐領名鑲白旗一乾隆二十八年癸未科漢軍宋兆鰲黄焜佐領名正黄旗一乾隆三十一年丙戌科漢軍張士全周宗文佐領正白旗一名趙宗濬王法佐領名正紅旗一黄宗傑康景星佐領鑲白旗一名乾隆三十四年己丑科漢軍金富寧金文逹佐領魯彰阿王廷臣佐領二名以上鑲藍旗乾隆三十六年辛夘科漢軍劉輝祖陳文敬佐領鑲白旗一名朱廷荃包衣三徳佐領正藍旗一名鄭敏金文淵佐領鑲藍旗一名乾隆三十七年壬辰科漢軍張維瀚勒福佐領名正白旗一宋如璜馬陞基佐領鑲紅旗一名乾隆四十年乙未科漢軍徳成包衣朝慶佐領正黄旗一名鄧廷桂祖學仁佐領鑲白旗一名乾隆四十三年戊戌科漢軍恩泰包衣朝慶佐領正黄旗一名王三黒包衣大成分管鑲白旗一名乾隆四十六年辛丑科漢軍袁永興陳元瑛佐領正黄旗一名乾隆四十九年甲辰科漢軍劉志仁周纉烈佐領正白旗一名黄宗英李潮佐領名鑲白旗一乾隆五十二年丁未科漢軍于天禄田國榮佐領鑲黄旗一名乾隆五十四年己酉科漢軍陳四安穆騰額佐領正白旗一名張永祥王汲佐領名正紅旗一許昌林佟國泰佐領鑲紅旗一名乾隆五十五年庚戌科漢軍玉福金廣潤佐領正黄旗一名李義元包衣恒明佐領正藍旗一名乾隆五十八年癸丑科漢軍鄭文麟范建豐佐領鑲黄旗一名永泰藥師保佐領鑲紅旗一名乾隆六十年乙夘科漢軍李百禄包衣扎蘭佐領正紅旗一名欽定八旗通志卷一百八
