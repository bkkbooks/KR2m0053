八月捷聞得㫖嘉奨十一月命以勅印付貝子彰泰撤每佐領八人率還京師十九年正月上遣官迎宣諭曰王連年以來逺蒞巖疆親經百戰櫛風沐雨歴暑逾寒競揚貔虎之雄克清梟獍之孽湖湘諸處已見蕩平滇黔餘氛俱成坐困更體朕軫念窮荒之心廣示招徠深加撫恤王師所至遐邇來歸捷奏屢宣中外稱慶朕既嘉碩畫益篤親親爰命班師副朕懐想頃者聞王已抵武昌奏凱可期特遣使臣慰勞兼賜駱駝良馬以示優眷王即按程以来朕将計日以待三月凱旋上行郊勞禮于盧溝橋南二十里王俘偽太子朱慈燦以來先是順治元年冬有赴明外戚周奎家自稱太子者奎白諸朝令舊宫人及東宫官属辨是非真法司鞫實得太監楊玉取劉姓子詐冒狀並伏誅康熙十二年冬京師聞三桂反有自稱三太子朱慈璊者偽署廣徳元年糾黨京城内外舉火作亂擒其黨于鼓樓西街及燈市口詰以朱慈璊云即楊起隆已遁矣十八年秋王駐營楓木嶺土人首擒偽軍師戴必顯無為教姚文明因獲朱慈燦于新化縣僧寺追訊前在京城逆謀慈燦訴已係崇禎帝長子十二嵗遭闖難出奔南京後未再至北京福王由崧曽置諸獄釋為民即徃河南隨朽木和尚為僧流落江西湖廣二十餘年因病還俗徃来永州寳慶欲聲討吳三桂悖逆反覆不忠不孝不義諸罪商之戴必顯姚文明招兵散劄一年因三桂死中止王䟽陳請㫖因言前此屢有冒明太子事朱慈燦雖云欲討吳逆招兵散劄但當大軍復寳慶時不即自首應與戴必顯姚文明並論斬其曾受偽劄人已示許首繳偽劄銷毁免罪慈燦既自稱真係明嗣當械至京辨識得㫖朱慈燦著王帶来俟到日再議至是王移送法司令與前繫獄之朱慈璊逆黨對質俱不識詰其造印散劄與戴必顯姚文明謀亂属實皆擬凌遲如律詔並改為處斬是年秋復有託朱慈璊之名在陜西煽誘者擒之漢中三河口大将軍圖海械送京師敕法司勘訊面有刺痕實非明嗣並非楊起隆依大逆律磔于市二十年十二月命王仍掌宗人府事二十七年七月以噶爾丹擾喀爾喀同簡親王雅布各率兵五百赴蘇尼特汛界駐防十月撤還二十八年二月薨年六十有五諡曰和以其子瑪爾渾襲二十九年禮烈親王代善之曾孫原封貝勒諾尼訴岳樂康熙四年掌宗人府事時偏聽諾尼姑母讒言枉坐諾尼不孝死罪繫獄革爵䝉皇上鑒原釋放岳樂誣䧟無辜理應反坐詔宗人府㑹同領侍衛内大臣察議復諾尼貝勒追降岳樂為郡王削其諡岳樂第十五子瑪爾渾初于康熙十九年正月封世子二十九年二月襲封多羅安郡王三十五年正月大將軍征噶爾丹命率兵往歸化城偵防四十年十月掌宗人府事四十五年二月充玉牒館總裁四十八年十一月薨年四十有七諡曰慤四十九年二月以瑪爾渾次子華玘襲多羅安郡王五十八年九月薨年三十有五諡曰節雍正元年十二月諭曰向時安郡王岳樂謟附輔政大臣又自恃長軰每觸忤皇考䝉聖德寛仁始終容宥而伊諸子全不知感不務竭誠効力弟兄之間互相傾軋競事營求妄冀得爵讒害骨肉此衆所共知者瑪爾渾係應襲王爵之人似屬安分其子華玘尚無劣蹟而其嗣夭折封爵虛懸是以皇考審擇其人躊躇有待而安郡王之子伍爾占孫色亨圖等遂生怨望形于詞色夫國家恩施豈可倚恃而强邀今亷親王允䙫借此逞其讒説以離間宗室舊人致朕從容施恩之本念俱不可行將襲封安郡王本章發囘不准承襲舊所屬佐領撤出另撥乾隆四十三年三月以阿巴泰岳樂累著功績賜奉恩輔國公爵世襲㒺替以華玘之孫竒昆襲竒昆追封奉恩輔國公錫貴次子也是年四月授散秩大臣四十七年七月卒年四十四温良固山貝子博和託子彰泰博和託饒餘敏郡王阿巴泰次子初封輔國公崇德元年十二月上親征朝鮮博和託隨豫親王多鐸先驅圍其都進圍南漢山城先後敗其援兵二萬餘上駐營城西博和託以所獲獻三年八月隨睿親王多爾衮征明由董家口入略京西南六府至山西界移師山東克濟南四年四月凱還賜銀二千兩六年三月隨鄭親王濟爾哈朗等征明圍錦州七年三月錦州下圍杏山七月命駐防錦州十月隨其父饒餘貝勒阿巴泰征明入黄崖口攻薊州由河間景州進克兖州八年六月凱旋賜銀三千兩十月同輔國公芬古駐防錦州順治元年四月隨奉命大將軍睿親王多爾衮入山海闗破流賊李自成十月晉封固山貝子三年五月隨豫親王多鐸𠞰蘇尼特部騰機思騰機特等有功十月凱旋優賜俘獲五年九月卒諡曰温良順治六年十月封其子佛克齊庫為固山貝子十四年十二月薨諡曰介潔博和託第四子彰泰初于順治八年閏二月封鎮國公尋晉封固山貝子九年四月襲父爵仍為固山貝子康熙十三年春逆藩吳三桂陷湖南命順承郡王勒爾錦由荆州渡江𠞰賊六月復命安逺靖冦大將軍貝勒尚善往征規復岳州以彰泰􅄁賛軍務十五年二月諭責尚善及彰泰進取遲延三月彰泰與尚善議分軍水陸並進遣䕶軍統領額司泰等𠞰賊洞庭湖賊船入南津港泊君山及由岳州出犯者皆敗之獲船五十餘賊攅立枿樁于套湖峽口阻我舟大軍仍駐陸十七年六月伐枿樁棹輕舟擊賊栁林嘴發礮燬其船斃賊無數八月尚善卒于軍詔以貝勒察尼代為大將軍授彰泰撫逺將軍九月師出南津港賊船泊癩子山下令前鋒統領杭竒提督桑額等進擊斃賊百餘獲船四十月復敗賊於陸石口連營白米灘斷賊餉道十八年正月岳州賊帥呉應麒以乏食棄城遁大兵克岳州彰泰同桑額復華容石首二縣三月詔彰泰㑹安親王岳樂軍於衡州七月由寳慶進取武岡州賊渠呉國貴據隘拒我軍礮斃國貴餘賊潰遁彰泰追及木𤓰橋殺賊無算十一月特命岳樂還京以彰泰代為定逺平冦大將軍十九年三月遣都統穆占總督董衛國等敗偽將軍呉應麒復沅州降靖州及綏寧縣附近各土司八月疏言將軍蔡毓榮奉有調遣漢兵之㫖今進取貴州滿漢既合兵一路若調遣不相知恐礙事機上詔毓榮一切軍機闗白大將軍酌行閏八月自沅州進征十月距鎮逺十五里駐營賊據大路及兩山間結壘彰泰遣衛國等攻鎮逺衛闗口穆占等截賊旁遁隘口而自與毓榮攻賊壘賊敗潰衛國奪十向口敗賊將張足法等于大巖門穆占躡賊至偏橋衛賊由山徑竄遂復鎮逺府進定平越府及新添衛直趨貴陽逆孽吳世璠與應麒等皆遁彰泰駐守貴陽遣兵進復安順石阡都匀思南諸府十一月復遣軍復永寧州敗賊兵于安籠舖追𠞰至雞公背山鐵索橋十二月疏言詗賊兵萬三千欲據盤江遣前鋒統領薩克察等率兵至鐵索橋等處守隘上以大兵秣馬貴陽已月餘諭趣彰泰親統兵撲賊進定雲南二十年正月渡盤江偵賊帥線緎等據普安縣之江西坡二月前驅至砂子哨賊拒戰敗之彰泰督兵繼進抵臘茄坡賊在江西坡者夜竄都統拉賽等追之復新興所逐北三十里賊千餘還拒陣斬二百餘復普安州時大將軍賴塔由廣西入雲南曲靖府彰泰由普安進霑益州㑹嵩明州議合兵圍雲南省城距城三十里賊將胡國柄劉起龍自城内引賊萬餘列象陣拒戰彰泰軍其左賴塔軍其右自卯至午賊殊死戰彰泰宻遣前鋒統領沙納哈等衝其兩旁賊兵始却大兵續進逼賊歸化寺大敗之陣斬國柄起龍及偽將軍總兵九人俘獲無算彰泰與賴塔毓榮等近歸化寺駐營令諸軍分布近城南壩薩石衛走馬街雙塔寺得勝橋重闗等處以扼其吭仍廣布檄諭宣朝廷威德於是大理臨安永順姚安武定各偽官相繼詣軍門降先是賊將馬寳胡國柱夏國相等掠四川聞雲南圍急還救彰泰遣提督桑額都統希福𠞰賊楚雄寳退據烏木山扼險以拒希福等擊敗其衆寳越山遁至姚安知偽鎮將等先已歸順乃乞降七月疏言馬寳等已投降夏國相黨羽解散奔竄廣南惟胡國柱在鶴慶麗江尚未𠞰滅現有都統希福提督桑額追捕臣等圍城兵力足用頃聞將軍噶爾漢總督哈占自四川移師貴州將由威寧來雲南恐餉不敷臣等議令哈占兵還四川噶爾漢兵至日以厮役補缺額兵量行裁汰則糧不多糜圍城兵亦足用得㫖令哈占噶爾漢並旋師還四川酌防要地餘並遣還京彰泰又疏言馬寳屢經招撫不即悔罪投誠反奔尋甸携妻子赴楚雄糾逆黨為大兵所敗窮蹙已極始率衆不滿百人乞降莫贖其罪同時來降之偽將軍巴養元鄭旺李繼業等應並羈禁候㫖九月希福至雲龍州國柱自縊死總兵李國樑與土司儂朋𠞰賊廣南圍國相于西板橋國相降彰泰奏其罪與寳同並械送京十月彰泰與賴塔及將軍趙良棟等破賊營于南壩得勝橋太平橋走馬街賊竄入城大軍環城攻世璠自縊死偽將軍何進忠林天擎線緎黄明等出降彰泰誡軍士勿搶擄令都統穆占瑪竒先入城撫民清理倉庫籍賊黨屬戮世璠屍函首馳獻闕下雲南平是年即軍前授宗人府左宗正二十一年十月凱旋上率王大臣至盧溝橋南二十里迎勞二十二年二月議初征岳州遷延應以恢復貴州雲南功抵罪命仍紀功封冊賜黄金二十兩白金千兩二十四年九月以濫舉宗人府屬官品行不端罷宗正任二十九年正月薨年五十有五以彰泰第三子屯珠襲屯珠初于康熙十一年正月封鎮國公二十七年二月以庸懦降鎮國將軍二十九年六月襲封鎮國公五十二年授宗人府左宗正五十六年十月授禮部尚書五十七年閏八月卒年六十有一特贈固山貝子品級諡曰恪敏初屯珠有子安詹早殤以其兄百綬子文昭之第三子逢信嗣安詹為子十二月詔以逢信降襲輔國公乾隆十二年八月卒諡曰恭恪十二月以逢信第二子盛昌襲封輔國公二十二年七月以侍班失儀削爵二十三年二月封鎮國將軍十二月復封輔國公悼愍固山貝子蘇布圖蘇布圖饒餘敏郡王阿巴泰之孫追封賢懿貝子尚建之長子初封輔國公順治二年七月隨貝勒勒克德渾駐防江寧十二月移師征湖廣三年正月至武昌破流賊餘黨一隻虎等事詳順承恭恵郡王傳凱旋頒賚有功將士蘇布圖得賜金五十兩銀千兩尋封固山貝子五年九月隨鄭親王濟爾哈朗征湖廣十一月卒於軍年二十有四諡曰悼愍爵除欽定八旗通志卷一百二十九
