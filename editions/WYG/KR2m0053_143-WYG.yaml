body:
  text: 欽定四庫全書欽定八旗通志卷一百二十九人物志九宗室王公傳七贈和碩親王饒餘敏郡王阿巴泰原封和碩端重定親王博洛原封和碩安親王岳樂貝温良固山貝子博和託悼愍固山子蘇布圗贈和碩親王饒餘敏郡王阿巴泰阿巴泰太祖髙皇帝第七子初授台吉嵗辛亥七月命與費英東安費揚古率兵一千征東海窩集部之烏爾固宸穆稜二路皆取之俘千餘人還天命八年四月喀爾喀札嚕特部長昻安執我使送葉赫被戕命阿巴泰與台吉徳格類齋桑古岳託徃征之乗夜疾行渡遼河由額爾格勒行百餘里攻昻安所居昻安携妻子及二十餘人引牛車遁我總兵達音布先驅追及陣歿阿巴泰督諸将繼進斬昻安及其子俘其衆還上行郊勞禮隨征将士分賜所俘十年十一月同三貝勒莽古爾泰貝勒濟爾哈朗等援科爾沁時察哈爾林丹汗圍科爾沁之克勒珠爾根城已數日我軍至農安塔林丹汗夜遁軍還十一年九月太宗文皇帝即位封阿巴泰貝勒阿巴泰語額駙揚古利達爾漢曰戰則我擐甲胄行獵則我佩弓矢出何得不為和碩貝勒楊古利等以奏上命勸其勿怨望天聰元年五月上親征明錦州留阿巴泰與貝勒杜度居守十二月察哈爾昻坤杜稜来歸設宴阿巴泰語納穆泰曰我與小貝勒列坐蒙古貝勒明安巴克俱坐我上實恥之納穆泰入奏上宣示諸貝勒於是大貝勒代善等率諸貝勒訓責之曰徳格類濟爾哈朗杜度岳託碩託早隨五大臣議政爾不預阿濟格多爾衮多鐸皆先帝分給全旗之子諸貝勒又先爾入八分列今爾為貝勒心猶不足欲與和碩貝勒抗将紊紀綱耶阿巴泰引罪願罰於是罰甲胄雕鞍馬各四素鞍馬八二年五月與貝勒岳託碩託等往征明錦州敵棄城退守寧逺自十三山站以東毁堠二十一斬守者三十人獲人畜毁錦州杏山髙橋三城師還上出城五里郊迎三年十月上親征明由喀喇沁之波羅河屯行七日命阿巴泰同貝勒阿濟格率左翼軍攻龍井闗克之毁水闗入明漢兒荘副将易愛洪山口恭将王遵臣以兵來援我兵迎擊敗之斬愛及遵臣進克漢兒庄事詳英親王傳時右翼軍克大安口上親統師克洪山口並趨遵化十一月敗明援兵自山海闗至者下遵化城由薊州三河縣趨通州明大同總兵滿桂宣府總兵侯世禄屯順義縣阿巴泰與岳託分兵擊走之獲馬千餘駝百餘順義知縣率衆降大軍逼京城上駐營城北土城闗之東北明寧逺廵撫袁崇煥錦州總兵祖大夀以兵二萬来援屯廣渠門外阿巴泰奉命同貝勒莽古爾泰阿濟格多爾衮多鐸豪格等迎擊之聞敵右伏兵甚衆因約軍入隘趨右由正路入者與避敵同豪格趨右敗伏兵轉戰至城壕阿巴泰與豪格離由正路衝潰敵兵亦抵壕既收軍諸貝勒大臣議阿巴泰違約罪應削爵奪所属人户給豪格上曰阿巴泰非怯懦者特以顧其二子致離豪格耳朕奈何以子故加罪于兄因宥之十二月同阿濟格等略通州焚其船攻克張家灣遂與代善等從上閱形勢于薊州敗山海闗援兵五千餘事具英親王傳四年正月大兵至永平捕斬叛将劉興祚於山海闗攻克永平事具鄭獻親王傳二月上班師命阿巴泰同貝勒濟爾哈朗薩哈璘鎮永平四月明兵自樂亭撫寧来攻我軍之駐守灤州者擊走之事具頴毅親王傳五年七月初設六部命阿巴泰管工部事八月從上圍明大凌河城正黄旗兵圍北面之西鑲黄旗兵圍北面之東阿巴泰軍其中策應十月明總兵祖大夀降復縱囘錦州為内應上議取錦州策命阿巴泰與貝勒徳格類多爾衮岳託率兵四千易漢装偕大夀及降兵三百五十人乗夜襲錦州漏二鼓礮聲不絶錦州城中聞之以為大凌河圍者得脱分路来援我軍擊敗之斬馘甚衆㑹天大霧覿面不相識兵皆失隊伍乃收軍還七年三月監築磐蘭城五月召宴賜御用蟒衣一紫貂皮八馬一六月詔問征明及察哈爾朝鮮三者何先阿巴泰奏言明之情形皇上已悉知之其地利臣等亦熟識之宜選精兵襲其邉墻則闗門可得上親統大軍駐闗外擇貝勒大臣分路馳入駐軍内地獲其人可用者用之消息易得錦州無足顧慮天時已至可令祖大夀入山海闗與我兵㑹合攻取八月與阿濟格薩哈璘豪格等統兵二千略明山海闗而還俘獲人畜四千二百有竒八年五月随上率大兵征明宣府八月同阿濟格攻克靈邱縣及王家莊獻捷大同城南山岡御營九年七月諭之曰爾嘗自謂手疼似覺不耐勞苦不知人身血脉勞則無滯惟圖家居佚樂身不渉郊原手不持弓矢忽爾行動疾痛易生若日以騎射為事奚復患此凡有統率士卒之責者非躬親教演士卒孰肯專心武事騎射之藝精于勤而荒于嬉不可不時加練習爾當努力奮勉毋偷安旦夕斯克敵制勝能報先帝養育之恩為國盡忠矣崇徳元年四月晋封多羅饒餘貝勒六月同武英郡王阿濟格等徃征明克雕鶚保長安嶺保薄延慶州先後克定興安肅容城安州雄縣東安文安寳坻順義昌平遇敵五十六戰皆捷生擒總兵巢丕昌等又遣都統譚泰等設伏斬遵化三屯營守将我師方出闗明兵躡其後還擊殱之獲馬百四十餘捷聞勅諭嘉奨賜馬二匹九月凱旋上親迎之十二月上親征朝鮮命阿巴泰駐噶海城收集邉民防敵二年二月遣兵入明義州界捉生獲二人是月朝鮮降上班師阿巴泰携駐噶海兵還瀋陽三年二月上親征喀爾喀命阿巴泰與禮親王代善等留守盛京併監築遼陽都爾弼城五月命治盛京至遼河大路九月同睿親王多爾衮征明自青山闗毁邉墻入四年四月凱旋賜馬二銀五千事具睿忠親王傳九月同武英郡王阿濟格等赴明錦州寜逺偵敵五年六月同睿親王多爾衮等赴明義州督兵屯田有功七月同貝勒杜度等率兵設伏寧逺路殱明運糧兵獲米千石九月敗明杏山松山兵時大軍更畨圍錦州受代而還十二月命同親王多爾衮豪格貝勒杜度徃代鄭親王濟爾哈朗等圍錦州六年三月以聴從睿親王離錦州城三十里駐營及遣兵還家事論削爵奪所属户口詔從寛罰銀二千兩六月復攻圍錦州明總兵洪承疇以兵十三萬来援我兵敗其三營獲馬五百七十上親征殱敵數萬九月駕旋留軍合圍松山杏山髙橋命阿巴泰仍與諸王更畨圍錦州七年三月錦州降同鄭親王濟爾哈朗等進克杏山囘駐錦州七月從錦州受代還叙功賜蟒縀七十月特授奉命大将軍同内大臣圖爾格等征明上親送郊外十一月由黄崖口入敗明總兵白騰蛟白廣恩于薊州破河間景州趨兖州擒明魯王朱以派及樂陵陽信東原安邱滋陽諸王分兵徇萊州登州青州莒州沂州南至海州凡攻撫歸順城九十四俘獲人口牲畜九十二萬有竒還略滄州天津三河宻雲八年六月由墻子嶺班師還上遣鄭親王睿親王等郊迎三十里賜銀萬兩順治元年四月叙功晋封多羅饒餘郡王二年正月命統兵鎮守山東勦平滿家洞土賊時明福王朱由崧兵屯徐州東北遣都統凖塔等徃勦捷還三年三月薨年五十有八八年二月以其子岳樂襲康熙元年二月岳樂晉封和碩親王命贈阿巴泰如其爵十年六月追諡曰敏乾隆十九年九月命入祀盛京賢王祠原封和碩端重定親王博洛博洛饒餘敏郡王阿巴泰第三子天聰九年五月大軍由明宣府大同邉境征朔州代州應州别命貝勒多鐸從廣寧入寧逺錦州牽制明闗外兵俾毋援山西博洛從征有功崇徳元年封固山貝子随父阿巴泰征明延慶州凱旋預宴二年四月任議政三年七月任理藩院承政十月上征明寧逺命随豫親王多鐸分兵趨中後所明總兵祖大夀猝襲我師後衝潰我土黙特䝉古兵䕶軍統領哈寧阿㕘領阿爾津俄羅塞臣等與相持博洛奮勇前擊敵乃却五年五月䝉古多羅特部民蘇班代阿巴爾代等約乞降命從鄭親王濟爾哈朗等迎之於杏山西五里臺敗明追兵賜御廐良馬一尋與諸王更畨圍錦州六年八月上親征明錦州明總督洪承疇來援敗之松山追至塔山獲其筆架山積粟事具英親王傳又同貝勒羅洛渾等設伏桑阿爾齋保擊敗總兵吳三桂王樸七年春松山錦州相繼下博洛與兄輔國公博和託及貝子尼堪等更畨駐防錦州順治元年四月随睿親王多爾衮入山海闗破流賊李自成十月晉封多羅貝勒随豫親王多鐸征河南破自成於潼闗下西安南定江寧豫親王分兵半以博洛領之招撫常州蘇州同鎮國将軍拜音圖等趨杭州明兵拒者皆敗夜渡錢塘江而逃我軍追至江岸駐營敵見之以為潮且至營必沒而潮連日不至敵驚為神明潞王朱常淓遂率杭州官屬開門降浙西湖州嘉興浙東紹興寧波嚴州等府皆下淮王朱常清亦自紹興渡江來歸十月凱旋賜金二百銀萬五千兩鞍馬三三年二月命為征南大将軍同都統公圖頼率師征福建五月至杭州時明魯王朱以海稱監國于紹興其舊将方國安等營于錢塘江東岸綿亘二百里遣䕶軍統領圖頼等從上流渡江分兵擊之至江濵無舟不得渡忽江沙暴漲水淺可渉大兵策馬徑渡敵大驚博洛遣貝子屯齊等繼進國安棄戰艦奔以海遁台州斬殪無算擒總兵武景科等撫定紹興六月圍金華七月克之斬明蜀王朱盛濃等遂克衢州浙江悉平明唐王朱聿鍵猶據福建我軍分常山江山兩路並進遣圖頼等擊敗其閣部黄鳴峻兵於仙霞闗遂破浦城前鋒統領努山等擒斬其總督楊廷清李暄分遣署䕶軍統領杜爾徳前鋒統領拜音岱等攻克建寧延平聿鍵先由延平走汀州博洛遣䕶軍統領阿濟格尼堪杜爾徳等克其城擒斬聿鍵及曲陽王朱盛渡西河王朱盛洤松滋王朱演漢西城王朱通簡及其官屬敵将姜正希率師二萬來援夜襲汀州我師擊敗之斬首萬餘又遣鎮國将軍漢岱等敗敵将師福於分水闗克崇安縣斬其總督楊文忠等遣副都統卓布泰等襲克福州前後二十餘捷降偽國公鄭芝龍等二百九十餘人兵十一萬有竒福建平十一月朔捷聞得㫖嘉奨是月博洛駐福州令總兵佟養甲進征廣東時唐王朱聿鍵弟聿􅟽據廣州府偽稱紹武年號養甲等既克潮州恵州遂薄廣州克其城斬聿􅟽及周王肅眔益王思遼王術雅鄧王器䵺鉅野王夀通山王藴鉞髙宻王宏椅仁化王慈魶鄔陵王肅汭南安王企壠周王世子恭棎遼王世子儼鐐宗室由梧慈䵞等十餘人廣東平四年二月博洛承制以佟養甲為兩廣總督自率貝子博和託都統圖頼等凱旋優賚所獲金幣人口叙功晉封多羅郡王賜王號曰端重五年十一月同親王阿濟格徃大同偵防喀爾喀至則總兵姜瓖已據城叛命阿濟格為平西大将軍討之六年正月叛黨劉遷陷代州命王同承澤郡王碩塞等赴援克其郛賊遁三月旋師大同瓖潜約助馬得勝两路賊五千餘由大同北山逼我營自驅騎千餘出犯王與䕶軍統領鰲拜徹爾布等分禦之擊斬過半北山賊竄瓖亦閉城不敢復出是月睿親王赴大同招撫承制晉封博洛為親王四月賊陷山西汾州命王為定西大将軍移師徃討五月克清源交城文水徐溝祁縣等處六月賊犯平陽王遣副都統譚布等擊敗之賊渡河遁七月賊萬餘犯絳州王遣署副都統洛碩等擊走之斬級二千餘進攻孝義委署副将梁化鳳以火藥伏地中㧞其城賊三千餘犯夀陽王遣副都統卦喇特晉等援勦敗之斬級千餘屢敗賊於平遥遼州榆社時有㫖令博洛酌撤閒駐兵率還京王疏言太原平陽汾州三府屬州縣雖漸次收復而未復者尚多恐撤兵後賊乗虚襲據應仍留守禦上是其言令俟滿達海自朔州移師至汾州併力勦賊八月大同降将楊振威斬瓖首獻英親王軍王與巽親王滿達海合兵攻汾州九月克其城斬偽廵撫姜建勲偽布政使劉炳業復嵐縣永寧州遣軍分勦餘賊于岳陽縣絳州孟城驛老君廟殱