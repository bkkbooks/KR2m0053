嗣後當倍加忠慎戒飭守邉員目毋得滋事階禍維祹聞言以手至額者再四誓世世子孫永矢臣節復送至長安門兼餽贐儀臣等婉辭不受回至鎮南闗陪臣吳廷碩等四員齎國王陳謝奏章叩乞轉奏臣等伏思安南僻荒逺久列外藩皇上念其累世恭順不忍以片壤故即加兵討且鑒其感恩悔罪行賞賜地此誠怙冒鴻慈撫綏至計臣等睹異地之歡騰識天威之遐暢謹據實奏聞祈宣付史館昭垂萬世疏入上允之是月授刑部左侍郎尋署吏部尚書十一月遣杭奕禄偕副都統覺羅海蘭赴湖南會巡撫王國棟訊逆犯曽静尋命提犯來京七年九月授鑲紅旗滿洲副都統仍兼侍郎八年三月奉㫖解侍郎任回旗辦事四月補禮部左侍郎五月署右翼前鋒統領時凖噶爾台吉噶爾丹䇿凌納青海叛賊羅卜蔵丹津久不獻大軍征之九年二月上慮陜甘二省民㦯以用兵為累特命杭奕禄與左都御史史貽直署内務府總管鄭禪寳率同翰林院庶吉士及六部學習人員國子監肆業選拔貢生等徃宣諭化導七月諭杭奕禄協辦西安軍需其宣諭化導事交史貽直鄭禪寳分辦十年七月署西安將軍十一月諭曰聞陜西甘凉沿途一帶營伍廢弛總督劉於義事務繁多不能親身察閲著侍郎杭奕禄徃來稽查悉心整頓給與欽差大臣闗防凡有辦理事宜俱與劉於義酌行山西近邊營伍與陜西相近者亦著杭奕禄一體稽查十一年七月諭曰杭奕禄係朕特差稽查沿邊營伍之大臣理宜體䘏弁兵潔已奉公以副委任今聞其沿途驕奢放縱擾累兵民甚屬溺職尋奉㫖在肅州永遠枷號乾隆元年二月召來京授額外内閣學士三月補工部右侍郎時恭修世宗憲皇帝實録命杭奕禄充副總裁四月遣徃西藏駐劄辦事十二月轉工部左侍郎四年四月奏言西蔵西南三千里外巴勒布國有三汗一名庫庫木一名顔布一名葉楞雍正十二年曽通貢近三汗交惡臣遣貝勒頗羅鼐宣諭罷兵三汗歡欣聴命遣使進三部落户口數並金銀絲緞及珊瑚念珠等物報聞六月遵㫖還京調刑部左侍郎十二月襲其從兄户部侍郎申珠渾所遺三等輕車都尉世職五年二月奏言巴塘裡塘土司品秩同所屬地方亦相等嵗給養亷巴塘一千兩裏塘祗一百三十五兩請将裏塘土司二員養㢘量増詔於裏塘地方征収錢糧内交打箭爐充餉者以四百兩増賞土司用示優恤三月擢左都御史四月兼議政大臣十二月因秋審冊錯擬緩决降二級留任十年十月以老病乞休諭曰卿才品優長簡任風紀正資料理著照舊供職十一年閏三月上察其行走艱難命以原官致仕十三年七月卒子哈豐阿襲三等輕車都尉世職任山西叅將温福温福滿洲鑲紅旗人姓費莫雍正六年由繙譯舉人補兵部筆帖式九年徃北路軍營隨撫逺大将軍平郡王福彭辦理軍務十二年兵撤回京乾隆五年授兵部主事八年遷員外郎在軍機處行走十年遷吏部郎中十一年六月調户部銀庫郎中十二月擢湖南布政使十四年調貴州布政使十九年以辦理平逺州民陳新序鬨堂一案草率完結奉㫖革職自備資斧於烏里雅蘇臺辦理糧餉効力贖罪二十三年三月命署内閣侍讀學士隨赴定邉將軍營辦事四月實授時将軍兆恵統兵至庫隴癸山有宰桑恩克圖等率二百餘户據山險我兵乘霧夜擊之温福同副将髙天喜攜大礟登山擊賊俱斃十月隨大兵勦賊葉爾羌二十四年二月奉諭據將軍兆恵奏侍讀學士温福打仗手受鎗傷顴骨受鳥鎗擦傷且於諸處奮勉効力著加恩補授内閣學士是年回部平奉㫖議敘軍功加六級紀録九次二十五年回京授鑲紅旗漢軍副都統二十六年授倉場侍郎二十七年特恩賞給世襲雲騎尉三十四年授福建巡撫三十五年入為吏部侍郎在軍機處行走七月授理藩院尚書尋署工部尚書八月兼正黄旗䝉古都統三十六年八月奉㫖授副將軍統兵勦金川時大兵分三路進温福率兵二千餘由瓦寺之巴朗拉提督董天弼由甲金達援達木巴宗總督阿爾泰由約咱攻僧格宗十一月丁酉奏言阿爾泰董天弼於六月間一聞金川據革布什咱小金川乘勢圍鄂克什之信即分西南兩路夾擊尚非失計而董天弼忽改由木坪是以明正侵地雖克復而賊酋得悉衆固守約咱以拒我兵且西路兵經董天弼帶徃木坪之外現在福昌處只留千餘分守各隘餘兵無㡬以致不能進攻臣思此事辦理之始所以兼從南路進者原因金川據革布什咱是以就已到官兵於此進勦然道逺本非正路當以西路為正兵且此路原係從前征勦金川之地其小金川巢穴即各營駐兵之所今南路自章谷進攻而西路自北直進取其中堅前後夾攻使賊腹背受敵不難殄滅以臣愚見南路現集兵八九千名已不為少木坪一路雖再添兵亦屬無益查西路由汶川出口除山神溝巴朗拉之外自必尚有可進之路奮力夾攻似可得力奏入諭奨所見已得要領竚俟捷音尋諭軍機大臣曰辦理小金川一事温福以西路與賊巢最近欲於西路進攻自為扼要之見但形勢亦不可不為審度賊人所以拒守巴朗拉者原因攻圍鄂克什遂於要隘設築碉卡扼我援兵賊既以為負嵎之勢即幸藉大礟力攻破一碉賊即乘其殘壘復築勢豈能層層攻擊若於用礟之外令士卒輕冒矢石倘稍有挫損更不成事體此時南路既有重兵西路復添兵力僧格桑自必守兩路不暇他計朕意總以為攻取要䇿必當避其碉卡越道而進使賊人失其慿恃官軍得以乘間擣虚方為制勝之道著温福悉心籌辦丙辰授武英殿大學士復諭曰温福現已馳至巴朗拉扼其要害但其地山嶺險峻并與賊巢相近碉卡又多該處所有川兵不及二千且漢兵土練遇事俱不足仗萬一稍有退阻僅存温福所帶之滿洲兵二百名其勢未免單弱温福前奏至彼察看事機如刻難少待即就現有之兵奮力前進但亦不可不詳審形勢明於彼此進退之機方可進攻若鋭意深入兵力不充賊人既無所畏憚且恐約咱甲金達兩路同時會𠞰更不足以壯聲援温福務當善體朕心加意慎重董天弼兩路惟恐其懈於急攻温福一路則惟恐鋭於輕進厪念相同而於温福尤甚十二月奏攻巴朗拉賊抗拒情形得㫖温福等帶領官兵攻打巴朗拉碉卡殺賊頗多殊屬實心任事惜其時兵數無多而緑營士卒又皆懦怯不克成功温福何罪之有仍著交部議敘庚寅偕㕘贊五岱等攻巴朗拉三晝夜殱賊數百生擒十二破大碉六小碉二得㫖温福等以滿洲官兵在前緑營官兵在後晝夜攻打甚屬奮勉實堪嘉予似此聲勢賊人自必膽落不日即可集勲温福著賞給小荷包二對三十七年正月戊戌取達木巴宗撥兵分據南北山最髙處所得石碉悉焚之乙巳復分兵由别斯滿瑪爾瓦濟兩路夾攻大軍由中路進攻至斯底葉安賊寨獲碉卡百餘殱賊三百上嘉之三月丁未奏攻克資哩賊寨丁巳奏攻得阿喀木雅六月乙丑奏克東瑪賊寨七月丁酉奏攻得固卜濟山梁碉卡十月乙未奏攻得路頂宗及喀木色爾大小卡寨五十餘碉房三百餘十一月丙午奏據博爾根山梁並攻得瑪覺烏寨落上以簇拉角克那拉覺等處賊碉林立與我兵後路相通者甚多温福等宜善為防範壬子奏攻得達克蘇山寨碉卡己未奏攻得附近明郭宗一帶山梁山溝及沿路碉卡移駐大營偵道以圖直攻美諾十二月乙丑奏攻得公雅山皆有㫖議敘癸酉授定邉將軍丙子奏攻得明郭宗諭曰温福督兵進勦攻克賊巢𦂳要門户從此直搗美諾自可迅奏膚功温福著交部議敘辛巳奏由帛噶爾角攻得布朗郭宗復進攻克底木達擒僧格桑之父澤旺解京得㫖交部從優議敘三十八年二月劾額駙色布騰巴勒珠爾偏徇㕘贊五岱等欵詔革五岱職遣戌伊犁色布騰巴勒珠爾坐削爵是月辛巳奏攻得功噶爾拉等處三月丁酉奏攻得昔嶺碉卡嗣因冰雪深厚屢攻未能得手移營木果木分兵守隘口賊佔大營後路刼礮局六月辛亥温福率衆禦中鎗而亡先是温福㕘奏侍衛烏什哈達等私離汛地皇上慮其輕躁僨事特諭曰伊等不遵將軍號令固不得謂之無罪但温福即欲辦理烏什哈達亦覺過當烏什哈達理應看守所佔之處遣兵寄信温福不應将兵帶回此其罪也但烏什哈達亦曾攻碉奪卡今棄山岡而能復行佔據亦可以抵罪温福平時口吃在朕前奏事尚不能達其意性又頗露急躁官兵不知其如此必謂将軍性􅏥兵衆難堪又因不能即克地方心中煩躁不論地險雪深一味催迫官兵如此辦理恐失軍心不可不戒也至是果失事奉㫖温福倉猝遇變臨陣捐軀著賞一等伯爵世襲㒺替入祀昭忠祠並賞銀二千兩治䘮其應得卹典仍著該部察例具奏伊子永保即著承襲伯爵七月辛丑復奉諭曰前聞温福在木果木軍營遇變捐軀賞給一等伯爵嗣據劉秉恬奏初九日未時忽有客民二三千並匠役人等奔赴登春詢稱木果木礮局已被賊人搶刼大營四門闗閉客民無所依倚因各散回初十日賊番悉衆擁至斷絶大營水道緑營兵潰散遂至失事等語是温福軍營民散在前兵潰在後實係温福不能先事預防所致營中礟火係三軍之命若聞賊繞布朗郭宗之信早派精兵嚴守後路防䕶礮局何至為賊搶刼而客民匠役數千亦當収之營内為彼䕶持即備人數以壯軍威亦無不可斷無堅閉營門聴其散去之理既示賊番以弱且至摇惑軍心則温福之倉皇失算其死皆由自取今復據海蘭察富勒渾等查奏温福軍營陣亡文武大小各官多至數十人而將弁兵丁之未出者至三千餘人此皆温福􅆾方失事以致折將損兵使其身尚在即當立正典刑以申軍紀豈可復膺五等之封所有賞給伯爵著銷去但念其究係陣亡仍著交部照例議卹其應得何世職即令伊子永保承襲旋部議給騎都尉兼一雲騎尉與原有之雲騎尉應歸併為三等輕車都尉四十一年三月徹銷子勒保現任陜甘總督永保現任哈什哈爾㕘贊大臣欽定八旗通志卷一百七十四
