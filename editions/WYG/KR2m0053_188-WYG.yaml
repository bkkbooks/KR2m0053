body:
  text: 人物志五十四大臣傳四十滿洲鑲紅旗四徳音泰常温達倫特欽拜成徳夀額杭奕禄温福音泰音泰滿洲鑲紅旗人姓𤓰勒佳初為西安駐防兵康熙十三年隨副都統佛尼勒征呉三桂叛黨譚宏呉之茂王屏藩等由漢中進師克陽平朝天等關駐守梅嶺關射殪賊之毁木寨者追斬其渠一人賊糾衆乘夜刼營音泰力禦中鳥鎗折齒得上等賞十四年佛尼勒勦叛鎮王輔臣於秦州我軍臨壕列圍賊突騎出犯音泰射殪三人賊駭遁復勦西和縣屢敗之茂等於鹽關岐山堡十七年隨征寳雞敗賊益門鎮十九年進征四川克保寧叙州擊賊將胡國柱等在事有功二十七年授驍騎校三十四年遷防禦明年三月署㕘領隨西安將軍博霽率兵徃會撫遠大將軍費揚古征噶爾丹出西路五月上由中路親征至克嚕倫河而西路積雨糧運遲滯又賊屬預焚有草之地我軍迂道秣馬音泰言於博霽曰聖駕親臨擊賊我等宜倍道前進乃急趨昭莫多遇賊交戰音泰射却賊數人大軍並進噶爾丹敗遁敘功予雲騎尉世職四十一年遷佐領明年上幸西安音泰以校射記名得與賜宴尋授協領四十三年擢西安副都統明年授西寧總兵官上稔知其貧特詔陜西督撫大臣助其練兵犒賞之費四十六年諭曰音泰材健人優從軍十數年身經二十餘戰常中鎗折齒益復奮勇嫻於馬步射兼通漢文自任總兵以來邊外蒙古及内地人民交口稱譽且居西土久熟習邊事著陞授甘肅提督四十八年遷川陜總督入覲賜孔雀翎及冠服鞍馬並御書攬轡澄清匾額賜之四十九年斡偉番蠻羅都等刦掠寧番衛冕山營遊擊周玉麟遇害提督岳昇龍疏請徃𠞰上命四川巡撫年羮堯偕徃羮堯至寧番衛昇龍已擒獲羅都等三人付羮堯鞫詰既定讞羮堯遂先還昇龍同建昌總兵郝宏勲由冕山至會鹽招降番蠻諸酋願率衆十餘萬貢納糧馬音泰疏請即以降酋為土司分𨽻其衆因劾羮堯不偕徃招撫違㫖先還羮堯革職留任帶罪効力未㡬昇龍以疾解任羮堯知其曾向前任巡撫能泰布政使卞永式借帑金萬兩尚未歸欵欲率屬捐俸代償音泰不從羮堯遂入告上以昇龍効力多年允羮堯代償諭音泰宜與巡撫和衷尋諭大學士曰音泰潔清自持不徇情面乃實心任事人也五十一年左都御史趙申喬侍郎噶敏圖徃勘慶陽知府陳宏道西寧知州姚宏烈互訐虧帑婪賄欵蹟因得原任巡撫齊世武布政使伍實阿彌達分取火耗銀各數千兩事按律擬罪以音泰曾檄示州縣官徴収錢糧輕減火耗不盡行革除議褫職上曰音泰居官甚優寛免之會奉詔申禁遊民越境令嚴劾縱容之文武官於是邠州諸處拘繫者四十餘案每案十數人或至四十餘人音泰疏言訊鞫各案皆藉伎業營生無兇惡情狀可否解回原籍収管如再縦出境議處所司上曰遊民越境所以應嚴禁者恐聚衆刦掠漸致難圖明季李自成即其騐也今閲所奏各案俱以伎業取錢餬口非兇惡可比應即省釋槩免官員處分是年九月自陳病痱不能理事上曰朕前幸西安灼知音泰義勇洊擢至總督正已率屬寛嚴並用軍民無不感戴朕甚愛惜之可令在任調攝五十二年四月復以疾劇乞罷許解任還京給第宅田畝以旌其㢘又嘗諭廷臣曰音泰朕所特用之人初用時人不知其善後乃稱朕有知人之明五十三年四月䘚年六十有三賜祭𦵏如典禮諡清端其雲騎尉世職例襲一次特詔世襲㒺替子瑚什巴襲温達温達滿洲鑲紅旗人姓費莫由筆帖式授都察院都事遷户部員外郎康熙十九年授陜西道御史二十五年遷吏科給事中三十三年兼管佐領三十四年授兵部督捕理事官三十五年二月聖祖仁皇帝親征噶爾丹温達奉命隨皇七子允祐都統都斯噶爾等管理鑲黄旗大營明年冬擢内閣學士三十八年授户部侍郎四十年三月命徃山陜察騐驛站馬匹還奏由大同府至保徳州花馬池及肅州涼州西寧莊浪蘭州等處視臕肥善馳之馬悉加烙印疲痩者通飭換補并牒巡撫嚴劾官屬之餵飼失宜及侵蝕滋弊者得㫖報聞十月列議政大臣十一月雲貴總督巴錫疏劾遊擊髙鑑審理訟案􅑃飾并劾提督李芳述牒咨徇隐李芳述亦劾巴錫置咨弗覆未會稿遽題有違成例部議令巡撫察審上曰李芳述在西寧時甚有聲名此事似曲在總督巡撫未必從公著遣侍郎温達前徃察審明年二月調吏部侍郎尋還奏髙鑑罪應徒巴錫應降級李芳述應罰俸事詳李芳述𫝊九月擢左都御史四十二年復奉命徃貴州鞫威寧總兵孟大志尅減兵鑲事得實論罪如律四十三年遷工部尚書四十五年三月充經筵講官十月調吏部尚書諭曰朕因吏部事務𦂳要特簡任爾凡銓選已有定例當遵例而行其介在兩可者時或滋弊宜加意體察四十六年十二月授文華殿大學士時纂修三朝國史政治典訓平定朔漠方畧大清一統志明史並充總裁官五十年十月命八旗及部院大臣奏舉篤行孝義之人因諭曰孝者百行之首爾等不可謂無由灼知如大學士温達尚書穆和倫富寧安之孝不但衆人俱知即朕亦深知之也五十二年御製七言律詩以賜有自少存心敦孝友之句五十三年正月乞休得㫖卿耆舊老臣才品素著自簡任機務以來恪慎和平實心盡職勤勞嵗久倚毘正殷覽奏以衰老乞休情詞懇切准以原官致仕十二月諭曰温達雖年老告退尚自康健著仍任大學士五十四年四月疾遣太醫診視賜藥餌五月䘚遺疏上得㫖温達久任機務寛厚簡靜懋著勤勞予告之後朕眷注猶殷仍起辦事正期長享遐齡以承寵渥遽爾病逝深切軫悼下部議卹命皇子及大臣二員侍衛二十員奠茶酒賜祭𦵏如典禮諡文簡額倫特額倫特滿洲鑲紅旗人姓科竒哩西安將軍佛尼勒子也康熙二十一年佛尼勒卒於官四川總督哈占奏言佛尼勒家貧不能還京請以其子額倫特留西安効用部議不許得㫖自逆賊擾亂四川以來佛尼勒勤勞軍事其子額倫特准留西安補用二十三年補西安駐防佐領三十年厄魯特部巴圖爾額爾克濟農刦掠喀爾喀札薩克丹津部衆上遣將軍尼雅翰率師徃宣詔㫖令還所掠人畜率部衆徙居察哈爾地巴圖爾額爾克濟農不從以其衆奔竄額倫特隨大軍追之不及擒獲蒙古二人復隨將軍郎坦赴克錫圖穆稜出嘉峪關追獲䝉古七人三十五年上親征噶爾丹額倫特隨大將軍費揚古由西路進大敗賊衆於昭莫多以功予雲騎尉世職擢西安協領四十二年駕幸西安閲武設宴特召額倫特近御座前親賜之飲諭曰爾父宣力行間爾亦由兵丁効力以至協領故親賜飲以示異於衆尋遷西安副都統調荆州副都統四十九年特授湖廣提督上復念額倫特奉職清貧詔湖廣總督巡撫等量為資助五十二年川陜總督音泰以病乞解任上嘉其清潔自持令在任調治久而未愈乃以湖廣總督鄂海調補川陜而授額倫特為湖廣總督諭大學士等曰額倫特音泰皆朕特用之人也初用時人不知其善後乃稱朕有知人之明時江蘇巡撫張伯行亦以㢘節著諭廷臣曰天下督撫惟額倫特與張伯行操守最優耳旋奉命與户部郎中斡琿泰履勘湖南諸州縣廢壤四萬六千一百餘頃疏請聴民墾闢酌於六年後科以下則下部議行五十四年山西太原知府趙鳳詔巧立税規貪墨不職額倫特奉詔徃勘得實疏言枉法受贓例應繯首鳳詔為左都御史趙申喬之子受恩深重法應加等擬監候斬罪九卿議改立决鳳詔遂伏誅時厄魯特䇿妄阿拉布坦率賊衆犯哈宻上遣尚書富寧安等調兵進𠞰尋駐防哈宻遊擊潘至善等擊敗賊衆䇿妄阿拉布坦遁走於是領兵大臣等定議先取烏梁海土魯番諸部而後進征厄魯特五十五年閏三月命額倫特署西安將軍事同總督鄂海協理軍饟十月䇿妄阿拉布坦驅賊衆由噶順汛界山後過沙拉執青海台吉羅卜蔵丹濟布而遁上慮賊酋由噶斯口復犯青海乃詔額倫特統重兵移駐西寧為青海諸部應援五十六年三月奉諭徃巴里坤與將軍富寧安會議襲擊準噶爾邊界及留後接應事宜十月富寧安以䇿妄阿拉布坦令宰桑領賊衆由阿哩克路迤西潛去入告額倫特復奉勅回駐西寧上遣侍衛諾爾布等至青海令諸台吉協力𠞰禦且諭曰將軍額倫特才畧過人凡有聞見其同心議行既而青海親王羅卜蔵丹津以䇿妄阿拉布坦遣其屬䇿凌敦多布徃掠西藏欲滅拉蔵汗疏報額倫特奉命與内大臣䇿旺諾爾布統兵駐守青海防歸途剽掠上復𠡠西寧松潘各路備兵為拉蔵汗救援詔額倫特與青海王台吉等䇿議屯軍形勝之地額倫特疏言西寧抵蔵之路有三惟庫庫賽爾嶺及拜都嶺二路較珠爾肯一路寛廣易行請與侍衛色稜分道進𠞰若賊衆一路拒敵則我師别有間道可以直入蔵地攻其後尾若賊分路拒我其勢既分亦無難剪滅上令額倫特與䇿旺諾爾布定議以行五十七年四月偵知賊衆戕殺拉蔵汗於布達拉城執汗子蘇爾扎而據其地西蔵人來歸者額倫特並為安撫六月額倫特與侍衛色稜分路進師額倫特率大軍自穆嚕斯烏蘇啟行至圖勒哈圖以皮船濟因取道庫庫賽爾嶺七月抵齊諾郭勒賊乘夜侵我軍壘遣遊擊王汝載等擊敗之次日賊復從東南分路來犯額倫特親率弁兵縁山接戰自寅至已賊潰遁追擊十餘里多所斬獲得㫖額倫特領兵頗少徑抵絶域奮勇直前建立膚功非尋常軍功可比事定後從優議叙尋聞賊酋托布齊等以衆數千潛由喀喇烏蘇來拒我師額倫特率所部疾趨欲先渡河扼朗拉嶺之險禦賊比至喀喇烏蘇侍衛色稜等亦以兵來會併力進擊屢敗賊衆賊復聚衆數萬環集來攻額倫特領兵奮擊身被重創督戰益力與賊相持月餘至九月復厲兵進戰射殪賊衆無算矢盡持刀奮呼斫賊賊益兵圍之額倫特力戰殁於陣五十八年櫬還京命親王及貝勒貝子公等迎至城外復遣内大臣侍衛至其家奠茶雍正元年世宗憲皇帝特命敘功予三等輕車都尉世職賜祭葬如典禮諡忠勇入祀昭忠祠子愛山襲職欽拜欽拜滿洲鑲紅旗人姓𤓰勒佳曽祖羅璧國初隨兄勞薩來歸由佐領從征有功授一等輕車都尉以兼襲兄子程尼所得一等伯兼一雲騎尉併為二等公兼議政大臣卒子順保襲一等伯兼一雲騎尉卒子竒通阿襲因病告休子即欽拜於康熙三十四年襲四十六年授頭等侍衛尋改冠軍使五十四年十月授散秩大臣十二月授鑲藍旗䝉古副都統五十七年赴西寧軍營雍正元年六月還京仍為散秩大臣十月補正黄旗䝉古副都統十一月授兵部侍郎三年疏言馹站備𦂳要事今大小武職印勅俱由兵部派筆帖式領催由馹馳送查職任有輕重之分馹馬有可用不可用之别請將㕘将以下停送由提塘轉發其將軍提鎮副將有職掌大員仍舊例部議如所請四年以前引失儀且巧辯革職發軍臺効力九年正月召還復原職七月率右衛兵赴北路命㕘贊撫遠大將軍馬爾賽軍務授内大臣十年二月順承郡王錫保奏欽拜實心辦事善于約束請調赴察罕廋爾軍營諭曰馬爾賽辦事甚不愜朕意扎克拜達里克軍營全賴欽拜一人著仍留駐彼地八月凖噶爾賊犯北路為額駙䇿凌等擊敗西遁時經畧大學士鄂爾泰在肅州派兵赴袞塔瑪哈戈壁堵勦諭曰欽拜等擁兵萬餘駐守扎克拜達里克遇凖噶爾窮寇徒手奔逸並不追擊怯懦不堪著傳㫖詢問尋欽拜奏言賊由推河逃遁臣等願領兵徃追馬爾賽聴李杕固守城池之説不允再三請徃馬爾賽方領兵起程及抵博木喀喇地方僅選兵七百令臣前進馬爾賽竟還扎克拜達里克疏入上以馬爾賽負恩縱冦特命鞫實正法李杕擬斬如律十月署綏逺將軍十一年正月署建勲将軍時平郡王福彭為定邊大將軍詔