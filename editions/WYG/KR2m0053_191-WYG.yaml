body:
  text: 人物志五十七大臣傳四十三滿洲正藍旗三性桂阿克敦錫伯諾岷陶岱蘓昌明山錫伯錫伯滿洲正藍旗人姓𤓰勒佳康熈十四年以䕶軍隨前鋒統領穆占討叛鎮王輔臣于平涼時偽總兵髙鼎蔡元據龍州仙逸關列陣于關山河岸錫伯先登䧟陣左右衝突身被數創益力戰大敗之叙功列頭等賞銀五十兩復隨大軍破平涼城外賊于虎山墩王輔臣降進征湖廣十六年隨將軍鄂鼐擊賊于洞庭湖舟師進逼君山戰數日賊固守岳州不敢出十八年隨將軍林興珠擊賊首吳國貴敗之遂復武岡州進克楓木嶺二十年隨將軍賚塔敗賊將何繼祖于黄草壩抵雲南城下大將軍彰泰賚塔合兵營歸化寺賊渠吳世璠以衆萬餘驅象迎敵官兵分隊進攻錫伯列第二隊直前破賊叙功二等賞銀四十兩二十七年由前鋒授典儀三十五年隨征噶爾丹三十八年遷驍騎校四十七年遷侍衞五十年遷前鋒㕘領六十一年授左翼步軍總尉雍正二年加副都統銜食俸時青海平定議設將軍副都統于寧夏駐滿洲馬步兵三千四百三年二月特命錫伯為寧夏將軍領八旗兵由殺虎口經卾爾多斯部進横城口六月抵寧夏任七月奏八旗官兵陸續到齊沿途水草豐盛兵眷安妥得㫖錫伯帶領官兵沿途並無擾累生事善為料理甚屬可嘉下部議叙加一級四年奏阿拉善谷内地寛可作牧厰請將喀朗塢西南至中衞為緑旗牧厰喀朗塢東北至石觜子為滿兵牧厰官兵等駝馬按數出牧下部知之七年十月以勤慎奉職諭加太子少保十一月諭曰錫伯係征𠞰南省頗著勤勞之人現今大臣中與伊相似者甚少而伊復于軍前衝鋒䧟陣得有傷痕簡任將軍以來約束兵丁盡職効力為將軍中特出之人可給騎都尉世職准襲二次八年十月卒于官奏入得㫖錫伯居官勤慎老成練達軍前効力著有成勞簡擢寧夏將軍撫輯兵民整飭營伍實心黽勉邊疆重地正資料理今聞溘逝深為憫惻賞銀一千兩以為䘮事之資靈櫬准入京城大臣侍衞等迎奠下部議䘏賜祭𦵏如例諡襄壯子喜柱襲騎都尉職陶岱陶岱滿洲正藍旗人姓𤓰勒佳由主事歴遷户部郎中康熈三十三年二月上以積貯米穀有禆命截留山東漕米二萬石從天津海運至三岔口交盛京户部收貯命陶岱督運諭曰此路易行但不可欲速船户習知水性風勢必須相風勢而行毋堅執己見其一路水勢地形詳悉識之此路既開日後運米事可無難矣尋遷内閣侍讀學士六月擢内閣學士八月山東巡撫桑額疏請以登州等處米從天津運三岔口諭曰前運米至盛京大有禆益學士陶岱現在天津著將天津現存米五萬石從海口運至三岔口之處㑹同地方官議奏陶岱以天津現存米四千石榖三萬六千石以榖易米不敷五萬石之數議將近河州縣現存捐輸米内撥足五萬石運往得㫖近河州縣糧米著停止起運俟明春河南山東兩省漕米到後截留五萬石運送三十五年二月奉命以海運至盛京之米給散科爾沁之貧乏者六月遷户部右侍郎尋轉左侍郎三十六年調吏部右侍郎三十七年二月上以朝鮮告饑籲請于中江開市貿榖命陶岱運米三萬石往朝鮮以萬石賚之二萬石平糶七月疏言臣于四月進中江將賞米萬石分賑其二萬石交户部侍郎貝和諾監視貿易國王李焞具表謝章下所司御製海運朝鮮記以紀其事三十八年五月署兩江總督八月奏言聖主南巡省視惟恐貧民艱食截留漕米十萬石照時價減糶又貯十萬石備緩急前因淮揚等處米貴請將留貯米動用四萬石照前減糶荷䝉俞允今淮揚等處小民仍艱粒食且督修河工人等羣聚需米甚多請將所餘米六萬石照前減價發糶疏入格于部議特允所請三十九年正月疏免泗州盱眙地丁等項錢糧尋授倉場侍郎四十年以漕船由外河運至石壩致抵通遲誤陶岱不將經紀勒索旗丁事審奏部議降一級罰俸一年諭曰陶岱向署兩江總督聲名甚劣既授倉場仍不改前轍非可任用之人著降五級隨旗行走尋卒性桂性桂滿洲正藍旗人姓王氏先世居義州國初來歸康熈四十五年性桂由天文生補欽天監博士洊授靈臺郎五十九年遷五官正六十年補刑部主事六十一年二月遷禮部員外郎五月授監察御史巡視福建鹽政雍正五年遷大理寺卿六年三月命查浙江倉庫錢糧九月奏言臣清查黄岩縣倉庫後就近察看鎮標之海門汛并對岸台協之前所汛原設將弁防駐陸路並無哨船二處外即重洋内有支港請增小快船數隻又海門至黄岩前所至台郡每數里應增礮臺營房撥兵駐查凡沿河營汛均照台州寺前橋例設哨船巡緝得㫖嘉允十一月授都察院左副都御史七年二月擢漕運總督三月署浙江總督七月兼署杭州將軍八年赴總漕任九月上命將倉場侍郎岳爾岱總漕張大有議覆巡漕御史苗夀等條奏漕船過淮陋規及敬陳管見兩摺交性桂議奏尋議漕船陋規等款一幫船到淮原有津貼費倘例外苛索私相授受經承計贜論罪旗丁同究處一旗丁倩人造冊奸徒自名冊房串同派費應禁革令本幫字識繕冩一過淮時運官親赴盤糧㕔投文吏役上號不許留難一漕臣盤驗米色攙雜短少即應綑責中軍官稽察行杖人役作弊一江浙幫出鎮江口竪桅從前催漕之員就便查看未免多事應俟過淮日漕臣親驗揚州三岔河係各幫總滙選幹弁彈壓禁止恃强爭先一汛地員弁不顧風色水勢混催漕船渡黄者議處踈虞加等治罪一委宿遷營逰擊駐白洋河徐州營副將駐臺莊八閘稽查弁兵于逆流添夫輓運不得勒詐又議敬陳管見等款一旗丁造船每板薄釘稀六七運便杇腐嗣後嚴飭糧道給足料價其監造之衞守備及經胥等不得希圖陋規違式仍督該丁賠造至漕臣親驗囘空歸次領銀速修接運旗丁以杇腐漕艘横觸民船勒詐者革治一各衞僉定正副二丁赴次交兌如革丁生監等竄入即究運官失察容隠分别叅處疏入均如所請行十年四月授刑部尚書七月調兵部九月復署漕運總督十二月奏請截留漕糧四十萬石于蘓松等處被灾州縣平糶又疏稱廬屬幫船雖𨽻江北較之江寧等處更逺三百餘里又有大江之險原定十二月過淮毎致違限情實可原請改限正月庶不遲悞領押弁員亦免叅處俱下部議從之十一年正月回兵部尚書任六月命同内閣學士雙喜往北路軍營協理軍需十三年七月辦鄂爾坤糧餉事務八月調補吏部尚書乾隆元年仍留鄂爾坤尋患病來京調理遣御醫診視三年十一月疏請休致得㫖卿才品優長簡任銓衡正資料理覽奏以老病求罷情辭懇切著以原官致仕十二年八月卒賜祭葬如例諡恭簡阿克敦阿克敦滿洲正藍旗人姓章佳康熈四十八年進士改庶吉士五十一年授編修五十二年二月充河南鄉試副考官十月充日講起居注官五十三年十二月特㫖阿克敦學問好前典試聲名亦好著授侍講學士五十五年轉侍讀學士五十六年九月朝鮮國王李焞病目遣使來購空青命阿克敦齎賜之十月充經筵講官尋遷詹事府詹事五十七年十月擢内閣學士六十一年四月朝鮮國王李昀請以其弟李昑立為世弟命阿克敦偕侍衞佛倫往封十月擢兵部右侍郎十一月兼翰林院掌院學士時恭纂聖祖仁皇帝實録命阿克敦為副總裁雍正元年三月恩賜二品廕生四月充日講起居注官七月命專管翰林院掌院學士事尋充四朝國史副總裁二年五月充大清會典副總裁十一月充繙譯鄉試副考官十二月命偕散秩大臣舒魯封李昑為朝鮮國王三年二月充治河方畧副總裁七月兼左副都御史十二月授禮部左侍郎仍兼兵部侍郎四年三月充繙譯鄉試副考官四月調兵部左侍郎兼國子監祭酒是月兩廣總督孔毓珣請陛見上命阿克敦往署總督兼署廣州將軍福建汀州府八屬例銷粤鹽毓珣奏准汀州府引課知府總其成嵗具印領自備鹽價水脚赴潮領運分發八縣協辦銷售十二月阿克敦䟽言汀州八屬雍正元年至三年共未完課餉銀四萬九千四百二十八兩請仍照前督臣楊琳所奏委官辦理發帑融銷以雍正四年為始先完額引方輪舊引帶銷庶免新舊混淆其未完銀勒限清部議如所請每年所銷鹽觔銀除歸還水脚等項仍儘數解庫又疏言粤省瀕海一帶盜賊出没全賴左翼碣石二鎮總兵訓練巡防方能安戢聞碣石總兵陳良弼秉心貪黷凡漁船出口俱勒陋規㧞補亦多索取左翼總兵藍鳳令二子冒名補把總倚勢累兵似此劣員實不宜于重鎮得㫖據實上奏殊為可嘉現揀擇勝任之人爾即具本題叅可也初廣東巡撫楊文乾議將髙要等五縣圍基頂衝改築石工次衝改作樁埽計費數十萬金借庫銀修築且有開捐之議阿克敦意與相左文乾專摺奏請五年正月阿克敦疏言查廣東沿江之髙要髙明四會三水南海五縣向有圍基俱係土工開竇建牐以時蓄洩毎年十一月後地方官督率鄉民按畝分工加卑培薄民不為苦官無所費至田畝間被淹圍基衝决多因江漲但水性不猛非必石工樁埽方能抵禦請仍循舊法令地方官農隙督民修補倘遇江水驟漲遣員巡查防衝决圍基即能保固毋庸改築費帑且無一勞永逸之理得㫖所奏甚是尋請以廣州肇慶屬圍基專責廣南韶道肇髙亷羅道督修與毓珣㑹疏以聞下部議行廣西梧州府蒼梧縣之芋莢山産礦沙奸民聚黨偷挖經毓珣通緝未獲至是阿克敦嚴飭捕獲潘十八潭六等十四名皆有旗械為首之李亞展亦于陽江獲訊事聞奉諭此案朕時刻繫念今覽此事就緒甚為慰悦四月調吏部左侍郎六月署廣東巡撫八月疏劾肇髙㢘羅道王士俊侵嵗羡銀千餘兩請徹底清查諭曰徹底清查固屬當然但王士俊尚屬有用之員當嚴加訓飭令其遷改九月署廣西巡撫十二月疏報廣西省雍正四年分民屯田共六十六頃四十五畝有竒應徴銀米水田于六年起科旱田于十年起科部議如所請先是文乾宻㕘阿克敦于廣南韶道林兆惠採買木厰被刦不嚴緝新㑹縣獲盜犯龍門營汛被刦軍器均囑令屬員審作竊賊從寛批結電白山聚盜多人白日沿刦匿不奏又侵蝕粤海關火耗銀令家人索取暹羅國米船規禮銀請查審嚴追又毓珣叅奏阿克敦侵蝕太平關火耗銀並請查追六年六月特㫖阿克敦著革職交孔毓珣楊文乾審奏尋文乾卒八月上特遣通政使留保工部郎中喀爾吉善往㑹毓珣署廣東巡撫傅泰嚴訊嗣留保等奏訊阿克敦稱盜犯各案承審官審覆是竊非盜並未囑令寛辦又各盜俱經嚴緝因失事未久旋即離署未具題粤海太平兩關火耗銀舊規分作司事束修工食並非侵隱至内地洋船無票者例繳船禮為雜項公用船户葉舜徳係福建人非暹羅米船向有舊規實非勒取但均未禁革願賠補等語阿克敦所供究屬矯餙除諱盜侵耗輕罪不議外應坐令家人索取暹羅米船規禮依律擬絞又因士俊前揭告阿克敦袒䕶布政使官達婪贜不行查叅毓珣等遵㫖會訊定擬具奏並下部議斬監候七年十二月山東巡撫費金吾以䟽濬濟寧嘉祥及江南徐州沛縣水道請派員督修特㫖原任侍郎阿克敦前在廣東任内尚無貪贜犯法等情著寛免釋放往河道工程効力以贖前愆九年七月上以準噶爾擾喀爾喀㳺牧命撫逺大將軍馬爾賽由阿爾台進𠞰授阿克敦為内閣額外學士辦理撫逺大將軍印務十一年十二月命阿克敦辦理扎克拜達里克糧餉十二年六月召還七月西路北路將軍皆言兵力有餘賊勢窮蹙可進討上特遣阿克敦偕侍郎傅鼐副都統羅宻往準噶爾諭噶爾丹策凌以寛大之恩開其迷誤畫清邊界不得踰越十三年四月囘京奏稱噶爾丹策凌請將哲爾格西喇呼魯蘓為我喀爾喀㳺牧地界上以阿克敦等奏摺併地圖宻寄北路副將軍策凌詳悉定議尋策凌議奏往者喀爾喀㳺牧尚未至哲爾格西喇呼魯蘓應如所請行至彼處厄魯特㳺牧必以阿爾台山嶺為界若㳺牧逼近防守實難斷勿令過山嶺上從其議閏四月署鑲藍旗滿洲副都統五月署工部右侍郎八月充八旗通志副總裁九月命守䕶泰陵乾隆元年恩賜二品廕生二年閏九月管理泰陵工部事務三年正月噶爾丹策凌遣使求策凌轉奏喀爾喀與厄魯特以阿爾台山嶺為界俱照現在駐牧上以其詞恭順命阿克敦為正使偕副使侍衞旺扎爾台吉額黙根齎敇往諭議定地界十二月阿克敦等率噶爾丹策凌來使哈柳自準噶爾囘京奏稱噶爾丹策凌今議定界請循布延圖河南以博爾濟昂吉勒圖烏可克嶺噶克察為界北以孫多爾庫奎多爾多輝庫奎至哈爾竒喇博木喀喇巴爾楚克為界彼處之厄魯特毋踰阿爾台山嶺喀爾喀亦祗于扎布堪㳺牧相距遼逺庶可兩無牽掣又請進藏煎茶并懇貿易上以噶爾丹策凌既遵㫖定界嗣後近邊居人各安故土更無爭競允其進蔵煎茶貿易事欽派大臣與來使哈柳議行是年授工部右侍郎四年七月轉左侍郎八月充繙譯㑹試副考官十二月充一統志副總裁五年三月調刑部右侍郎尋轉左四月教習庶吉士閏六月調吏部左侍郎七月充經筵講官六年四月協辦步軍統領刑名事務七年三月署正白旗漢軍都統八年六月授鑲藍旗滿洲都統十年三月充㑹試正考官五月充五朝國史副總裁兼翰林院掌院學士六月充日講起居注官十一年閏三月擢左都御史兼議政處行走五月授刑部尚書十二年八月充順天鄉試正考官十三年正月命協辦大學士事務四月奉㫖不必協辦是月翰林院奏進孝賢皇后冊文繙譯錯誤奉㫖此非無心之過文意不通可比且此文留中欲細覽交出及看出大不敬背謬之處欲傳㫖詢問則阿克敦等皆散去此皆阿克敦因前日解其協辦大學士之故心懐怨望且伊于皇考時獲罪起用朕洊用至尚書數年來實無出衆宣猷之處而毎以文學老成自命不得陞用輙懐怏怏阿克敦著革職交刑部治罪部議以阿克敦怨望大不敬依律擬斬監候六月奉㫖阿克敦著照革職留任之例在内閣學士上行走効力贖罪仍署工部侍郎事務閏七月上諭刑部事務𦂳要滿洲尚書員缺朕于各部侍郎内詳悉評量或才堪辦事而踐歴未久或才力未充而統率非宜一時未得其人阿克敦前雖獲罪尚係舊人且其獲罪不因辦理部務錯謬尚可棄瑕録用著署刑部尚書是月即以原銜充經筵講官協辦步軍統領衙門刑名事務授鑲白旗漢軍都統九月充㑹典館總裁又充清漢篆文副總裁十月兼翰林院掌院事務充日講起居注官十二月協辦大學士充國史館總裁十四年二月以金川平加中外在事諸臣秩諭曰阿克敦久膺委任歴著清勤宜一體加恩以昭風勸著加太子少保七月上幸木蘭命留京辦事兼署步軍統領十月賜紫禁城騎馬十二月賜御書協中輔治額十五年七月上巡幸河南命留京辦事九月兼署左都御史十六年正月署步軍統領十九年四月上以阿克敦七十夀辰賜御書賛元錫嘏額五月上幸盛京命留京辦事二十年正月以目疾請假上允之遣太醫診視復經屢次陳情命以原官致仕二十一年正月卒遺疏上得㫖阿克敦簡任中外宣力有年上年因患目疾特予致仕俾得安養兾其痊愈今聞溘逝深為軫惻遣散秩大臣率同侍衞往奠茶酒賞銀一千兩辦理喪事應得䘏典察例具奏尋賜祭葬如例諡文勤子阿桂現任大學士以軍功封一等誠謀英勇公諾岷諾岷姓納喇滿洲正藍旗人先世居輝發祖恩國泰以習漢書應天聰八年禮部試賜舉人崇徳元年入内祕書院辦事順治元年授禮部理事官八年擢禮部侍郎洊陟本部尚書十三年四月上以六部堂官不能實心辦理各予降革恩國泰于典禮未協降三級留任十五年十二月罷康熈八年八月復任工部尚書尋調禮部十年正月以原品致仕十二年九月卒予祭𦵏如例父那敏康熈十八年授三等侍衞二十四年授佐領雍正二年授額外副都統尋署鑲白旗事五月授正白旗滿洲副都統六月遷鑲黄旗滿洲都統十一年八月卒諾岷由筆帖式授户部主事遷本部員外郎中雍正元年三月擢内閣學士兼署工部侍郎四月授山西巡撫七月疏言山西連遭荒歉兼以虧空纍纍臣奉命賑恤饑饉查補虧空但州縣任非其人恐民困方甦者又致擾累錢糧方清者復被挪移請勅部揀選賢能官二十員發晉補用九月又請揀發三十員俱䝉俞允十二月疏言州縣錢糧屢經盤查一時難窮底裡現查出虧空尤甚者指名㕘奏其餘各州縣湏通行調任令將倉庫互相盤查方能徹底澄清又言前任巡撫徳音㕘奏無抵虧空各員均革職留任奈不行完補益増虧空應同現查出虧空各員請革職者一併勒令離任嚴審查追俱如所請行又疏言山西各營官兵不敷月糧例係折給自行採買奈連嵗歉收今夏米價更昂應照時價酌議夏秋二季米價太原蒲州大同各營毎石折給銀一兩二錢平陽汾州各營一兩五錢右衞殺虎口各營一兩一錢暫増數月糧價官民大有裨益部議駁特㫖允行二年三月疏言太原平陽二府所轄州縣居通省三分之二地方遼濶經年不能周其地是以從前虧空知府毫無覺察今細察輿圖莫若照直𨽻州之制分轄請將太原府屬之樂平盂縣夀陽分𨽻平定州定襄静樂分𨽻忻州五臺崞縣繁峙分𨽻代州河曲興縣分𨽻保徳州平陽府屬之臨晉榮河萬泉猗氏分𨽻蒲州安邑夏縣平陸芮城垣曲分𨽻觧州太平襄陵稷山河津分𨽻綘州蒲縣鄉寧分𨽻吉州大寧汾西永和分𨽻隰州一經分理則太原平陽所𨽻州縣各止十一地近則易周糧少則易核不惟虧空之弊可杜即刑名詞訟亦簡而易理至直𨽻州各有倉庫向無專責恐致侵挪請將蒲州解州吉州綘州隰州錢糧就近令河東道盤查平定忻州代州保徳州錢糧令雁平道盤查其舊設之澤州遼州沁州錢糧令糧驛道盤查如通同隱匿失察照議處知府例處分又言山西掌印都司專督屯糧兼轄衞所今衞所議裁錢糧刑名原屬布按二司兼理請將該都司首領經歴裁汰均如所請行直省各官向無養亷州縣俱徴收火耗藉資日用上司所需即取給州縣貪吏以此藉口上司曲為容隱弊竇滋多至是諾岷奏請將山西一年所得耗銀提解司庫除抵補無著虧空外分給各官養亷而山西布政使髙成齡復請倣山西之例通行直省上以剔除積弊必更定法制耗羡必宜歸公養亷湏有定額詔總理王大臣九卿集議㑹各省皆以次奏請議遂定是舉也上獨申睿斷因時制宜創行萬世良法以諾岷首發其議諭奬其通權達變于國計民生均有禆益三年正月以病乞假命解任回旗調理先是貝子允禟以罪發往西寜其眷屬過山西從人擅毆生員諾岷奏請提審并請將貝子允禟勅交宗人府嚴察治罪後任巡撫伊都立審奏貝子允禟䕶衞烏雅圖等在平定州擅毆生員應請按律治罪得㫖此案内有太監李大成為允禟首領太監豈有不知此事之理諾岷審時以李大成患病竟為脱卸遽行發囘諾岷係滿都䕶屬下之人滿都䕶與允禟比隣而居原屬同黨似有瞻狥强為掩餙諾岷大負朕恩伊都立疎忽殊甚仍著伊都立將李大成審出實情具奏嗣經伊都立嚴審李大成毆生員事屬實前審時李大成諉以患病不知諾岷即未曾根究其瞻狥開脱屬實請交部嚴加議處部議革職十二年九月卒蘓昌蘓昌滿洲正藍旗人姓伊爾根覺羅祖滿丕官都統有傳父蘓保襲雲騎尉康熈五十九年蘓昌由監生考取内閣中書雍正七年遷侍讀十二年遷浙江道監察御史乾隆元年命巡察吉林等處二年七月奏請于黑龍江船厰各設理事通判得㫖允行又言船厰將軍衙門及所屬寧古塔三姓白都訥阿爾楚喀刑名案件向俱船厰理刑司審理皆本處旗員通清漢文諳律例者甚少審擬罪名多與律例不符輾轉駁詰案内干連人犯監禁日久非慎重刑名之意請揀在京員外郎主事各一筆帖式二往辦事詔下部議船厰旗民詞訟有通判專管其理刑司員外郎無庸增惟主事由京選補筆帖式由該處選補三年襲世管佐領尋轉禮科給事中四年巡視西城六年正月署廣西按察使七月調署安徽按察使七年實授十年五月丁憂囘旗仍在御史上行走十二月補工科給事中十一年正月擢奉天府府尹六月奉天各屬被水蘓昌條奏辦賑三事一奉天向來辦賑因乏公項脚價無出並不于四鄉設厰各屬幅􅊷遼濶村民赴城領賑往返數百里情殊可憫請照例分貯米石于四鄉適中之地脚價動正項核銷一辦賑胥吏飯食紙筆之費因無項可動不無賠墊請酌州縣大小定其名數按日給費令不得藉口需索一委員勘灾監賑酌給盤費並跟役飯食倘有通同侵欺等弊嚴叅治罪諭曰所議尚屬可行而實力稽查妥協辦理則汝一人之責也勉之九月奏清查㳺民三事一山海關迤北至喜峯口一帶邊墻缺處㳺民冒險繞越請咨直𨽻總督古北口提督巡防奉天沿西一帶交錦州副都統率該府加謹巡查一内地㳺民出古北喜峯等口由八溝塔子溝繞入奉天境内請令總督提督轉飭塔子溝通判河屯協副將實力巡查一奉天之南金復雄盖四城與山東登萊二府相對商㠶私載民人勢所不免奉天甲丁散居屯莊輪班赴城供差似難坐守海濱各口又無墩堡請飭商船俱于有官兵處停泊上㟁以便稽查如無引票即遞囘原籍下部議行十四年擢廣東巡撫十六年署兩廣總督初廣西巡撫舒輅奏于思陵土州沿邊種竻竹以杜私越嗣土目頭人等乘勢侵夷地夷人不甘土目遽以夷人㧞竹毁墻揑報蘓昌檄道府查明押令頭人歸所侵地因奏言鎮安太平南寧等府沿邊二千餘里處處界連交阯無論種竹難徧設辦理稍疎必致轉滋事端請通查及早更正疏入上以舒輅輕率舉行下部察議又奏言廣東承辦楠木案内各員核减長支銀三萬六千八百兩有竒前經奏明勒追不能完者各上司分賠但分賠人員有無從著追者請再均派攤賠諭曰蘓昌此奏非是分賠之例原專為侵貪之員虧蝕正帑上司不早為覺察是以責令分賠以專其責成耳核減長支已非侵貪可比即謂其不能實力稽查估報不行核實亦應令賠所應賠本分而止若又將同賠案内他人應賠之分均攤代賠於情理殊未允協且既有他人攤賠將併應賠之員俱稱無力完繳徒使案牘紛煩輾轉攤派徒失政體而亦毫無禆益前因粤西張永熹一案曾經明晰曉諭今蘓昌仍有此奏或他省尚有似此辦理者著通行傳諭知之十八年正月以協拏増城逆匪王亮臣不力諭停其議叙八月奏言瓊州為海外瘠區貧民生計維艱查有可墾荒地二百五十餘頃請招民開墾免其陞科詔如所請十一月命來京候㫖十九年授吏部侍郎二十年署戸部侍郎二十二年兼署工部侍郎二十四年正月署工部尚書九月授湖廣總督二十五年疏言辰州協兵毎月額支米三斗毎石折銀六錢前經總督孫嘉淦以六錢不能買一石題准將停運黔米二萬石派給提標等十四標營辰州協毎兵得米一石四斗又每秋預給來年一季米銀餘仍支折色自行買食查辰州逼苗疆山多田少米價素昂兵丁嵗支米一石四斗及預給一季米銀僅供半年口糧其餘額支折色銀毎斗六分一月之銀不敷半月之米請借朋扣銀一千五百兩差員往常徳買運存俟次年本色支完後按月搭放照原買價於餉銀内扣還仍將此銀永逺存留按年買運源源接濟得㫖如所議行時在籍御史孫紹基指稱與臬司沈作朋同官撞騙婪贓蘓昌叅奏抵罪並請敇部嚴定囘籍之員與督撫有司彼此交接處分部議均定為降三級調用二十六年四月疏言湖北徵收漕耗除支給旗丁食米餘俱照時價易銀撥充咸寧等縣不敷水脚及養亷公用查各官養亷現有額定耗羡税銀十五萬有盈無縮其不敷水脚亦有各屬所剩水脚銀六千餘兩撥給不須此項耗米變價湖北通省額榖僅五十二萬餘石續又增買賑榖四十萬石較他省為少且界連江浙毎多撥運協濟若將此項耗米存貯各州縣附入常平額榖内則通省嵗可増二萬七千石倉貯漸裕詔如所請是月蘓昌宻叅巡撫周琬情性乖張奏事多倒提年月揜飾已過上調蘓昌為兩廣總督命新任湖廣總督愛必達秉公體察愛必達尋奏琬遇事偏執有意與蘓昌掣肘並匿灾徇庇劣員詔革職赴巴里坤効力二十七年疏言潮州溪河經海陽揭陽普寧三縣為閩粤衝衢奸匪剽掠為害請於海陽縣屬之鱟門山揭陽縣屬之方坑楓口竹橋各設一汛兵八名以四名防汛四名配船查緝並撥原防普寧縣外委一員移駐適中之楓口汛往來督巡下部議行二十八年七月疏叅碣石鎮總兵王陳榮貪黷敗檢得㫖革職論罪如律十月加太子太保二十九年正月疏言廣東社倉榖前經督臣李侍堯等酌議額貯在五千石以上者所餘息榖照廣西例變價解貯備賑不及五千者餘息併入額榖内部議准行臣查廣東社榖捐自民間與廣西出自常平餘息者不同且廣東産米不敷民食社榖自宜多貯以補常平不足若因額貯過多即將息榖變價遇嵗歉再買給賑是糶於榖賤之時而糴於榖貴之日一石原價不能得五六斗現糧且赴司領銀往市易榖䟦渉實多未便請嗣後息榖不拘額數統存州縣備賑免其變價解繳庶積榖日充詔如所請六月調閩浙總督先是蘓昌以廣東鹽運使王槩列計典卓薦而槩於署糧道任内浮收倉榖虧帑婪贜至是為廣東巡撫明山所劾御史羅暹春因劾蘓昌在粤年久不能及早舉發非年老糊塗即有意瞻徇况近在同城豈真一無見聞不劾反舉不公不明豈復堪節制海疆諭曰此奏是失察之咎蘓昌實不能辭至節制海疆乃出自朕簡用非御史所當言羅暹春著飭行蘇昌明白回奏八月諭曰前御史羅暹春叅劾蘓昌保舉運使王槩一摺在蘓昌於屬員虧帑既漫無覺察又登之卓薦自有應得之咎言官據實指叅乃職所應爾是以批諭發京初不以為非是特其摺内有若非年老糊塗即屬有意瞻徇措詞忿激㡬於唾罵其意若有必欲甘心於蘇昌者踪跡殊為可怪昨閲刑部審擬廣東叅革知縣劉紹氾一摺該犯即係與羅暹春江西同鄉而蘇昌又即叅處該犯之總督其為藉詞潛行報復實啟黨援朋比之風不可不悉心體究創懲以防流弊因諭刑部堂官悉心查訊今據奏到羅暹春與劉紹氾雖無瞻狥實跡然該御史具摺叅劾不即于蘇昌失察原案發抄之時又不於劉紹氾審擬已經定案之後該御史亦自稱形跡之間百喙莫辯等語此等以鄉情各酬私怨其事本無實証豈對簿駁詰遽肯輸情吐露然亦不值因此即革職審問也封疆大吏果有㒺上行私確據臺垣自應據實糾彈顧立言亦自有體中外大臣皆經朕簡用茍其事不干大戾即朕亦不遽加以斥罵御史雖欲自著風力亦豈得以年老大臣盡斥之為糊塗且前如來保今如尹繼善傅森陳宏謀諸臣屢經敭厯其齒安得不老而生平奉職無愆豈遂一例槩以衰庸肆為詆訕可乎明季科道惡習立幟分門借敢言之號行傾險之謀假公濟私無所不至為害甚大我朝百餘年來整綱飭紀朝政肅清斷不容有營私搏撃之人復得稍萌故智但遏邪防弊持之不可不堅今羅暹春之奏其為劉紹氾而發本非有証佐可質而任意詬毁已情見乎詞且不先不後之間自供亦無容置喙此而陽為不知於人心政事所關非細羅暹春著交部嚴加議處是月蘇昌覆奏自請嚴議並下部議得㫖蘇昌降五級從寛留任羅暹春從寛免革職加恩以主事用三十年上南巡御製詩賜之曰楚粤曽宣績浙閩兹撫封外中久敭歴聲望益舂容早是心如水應知夀比松自當隨蹕輦奕葉本從龍三十一年臺灣淡水㕔屬鱟壳莊民為生番焚殺五十餘人同知李浚原詳報不實蘇昌叅奏革職檄按察使余文儀往㑹臺灣鎮派兵嚴緝並條奏安戢事宜五款一逼近番界之零星住戸悉遷附大莊一民莊酌撥弁兵移駐捍衞一近山各莊建望樓嚴守望一禁墾界外荒埔免越界滋衅一清查熟畨産業民人不得侵佔得㫖如所議行三十三年來京陛見命在紫禁城内騎馬尋卒賜祭葬如例諡慤勤子富綱現任雲貴總督明山明山滿洲正藍旗人姓伊爾根覺羅雍正五年由閑散襲佐領遷叅領縁事革職乾隆十九年詔給主事銜在軍機處行走旋補戸部主事遷員外郎二十年署甘肅寧夏道二十二年遷山西按察使二十四年正月遷浙江布政使二十五年奏嚴禁窩賭二條一拿獲賭博應將造賣賭具者追出治罪查雍正十三年刑部議准湖南巡撫鍾保條奏賭博案内不將造賣人供出即將買有賭具之犯照販賣賭具為從例杖一百徒三年後律例館改照不應重律杖八十定例既輕犯者益衆請仍照原例問擬杖徒一窩賭必有聚賭之人往來兩隣無不悉知嗣後如有經旬累月開場窩賭者許左右隣舉首照例給賞徇隠照不應重律杖八十若得財准竊盜計贓從重論部議允行二十六年丁母憂仍在軍機處行走二十七年五月署江西巡撫八月授廣東巡撫九月疏請禁印官蟒衣跪迎督撫上是之部議允行十月疏言臣自江西起程聞浙江被水將來米價必昂江西本年米價甚平陳陳相因請勅江西浙江撫臣酌量情形如需接濟即碾撥江西常平榖二三十萬石運浙浙江民食有資江西又可收出陳入新之益得㫖嘉奬二十八年正月奏言廣東府㕔貯榖前撫臣鶴年奏令附近州縣碾放春夏兵米秋後徴收還倉查廣州通判倉貯榖八萬二千七百八十餘石嵗撥南海番禺東莞順徳新㑹香山増城清逺八縣兵米僅六千二百石十三年始出易一週粤地潮濕久貯黴耗堪虞請自乾隆癸未年始除増城清逺二小縣仍照舊數碾放其南海畨禺東莞順徳四縣每年各加撥千石新㑹香山二縣毎年各加撥六百石連原撥數共出陳榖萬一千四百石七年即可全數易新詔如所請行六月調陜西巡撫十一月復調廣東巡撫先是鹽運使王槩署糧道浮收兵米折銀萬餘兩入已各埠虧餉銀檄運同保成往查槩向保成跪求保全總督蘇昌明山兄也未行叅劾明山莅任奏請革任諭曰此奏可嘉之至蘇昌竟為其所愚而汝不顧弟兄私情即行叅奏不負朕任用之恩矣勉之槩尋擬罪如律三十年閏二月調江西巡撫暫留署兩廣總督六月奏言崖州僻處海島産榖素少額貯榖五千三百七十八石有竒額外榖一千一百七十四石有竒連年碾放兵米所存無㡬查髙州府電白縣有溢額榖七千餘石與崖州連近請撥運五千石與崖州額貯榖額外榖共一萬一千五百五十二石餘為定額歸善縣額貯榖十一萬餘石為數甚多上年平糶尚有應買補榖價請截六千一百七十四石二斗六升價銀批解充餉即以抵崖州加貯額部議從之三十一年二月調西安巡撫三十三年十二月擢陜甘總督三十四年十一月以成縣知縣湯尚箴縱役索詐滋事不早糾叅部議革職諭曰明山著革職從寛留任十一月以烏什換班兵所乘用馬明山不照定例咨新疆大臣交原領兵收放遽令入新收項下上以所奏取巧交部嚴議部議革任詔免之三十六年五月以前調任江西巡撫時令首縣修改衙署事發諭曰前據髙晉查審知府李枝昌一案内有墊用前任巡撫明山修理書房銀兩之事因令該督撫秉公確查並令明山明白囘奏旋據明山覆奏彼時因書房窄狹拆去截板所費不過十餘金俱係隨時發價而所需工匠不得不令首縣代僱因自請交部議處朕以明山所奏如果屬實尚不致有干吏議而其事既係首縣承辦無難澈底根查因交高晉一併查明具奏今據高晉奏查明山於廣東調任江西時即先行札飭中軍傳諭南新兩縣修改衙署所費約五百餘金現有印封原札可據呈覽與伊回奏所稱無涉等語實出情理之外明山不應如此督撫到任修理衙署令首縣代辦亦事所常有但不當以累及屬員即或發價稍遲其罪亦小乃經傳㫖詢問並不據實直陳輙敢托詞揑覆希兾朦混封疆大臣為朕所倚任顧可心存欺隠乎且小事如此則何事不可為大事尚足信乎明山著交部嚴加議處復諭曰明山現在交部嚴加議處伊係革職留任之員部議自應革任向來督撫遇此等處分或事屬公過或情尚可原每以人材難得酌量加恩仍予留任今明山於覆奏衙署一事敢於欺飾朦混其心已不可信且其近日辦事動輒舛錯頓不如從前之精到亦既屢令軍機大臣嚴飭矣然人材難得尚望其改過自新今竟敢為欺飾若此豈可復膺封疆重寄明山著即解任聽候部議尋議革任三十七年三月授副都統命為烏魯木齊領隊大臣疏言烏魯木齊増駐滿兵三千於城西北建官署兵房由内地撥緑旗兵千五百乘春建造備今秋滿兵移駐但計程緑旗兵四月方到工而滿兵今秋出口即需住房臣酌撥烏魯木齊差屯兵二百先行工作俟内地兵到接辦修市肆百間收租備恩賞暨公用移涼州理事同知駐烏魯木齊新城以資彈壓從之四十四年九月卒子海寧官至浙江巡撫五十五年十月卒諭照總督例給予䘏典賜祭葬諡勤毅欽定八旗通志卷一百七十七
