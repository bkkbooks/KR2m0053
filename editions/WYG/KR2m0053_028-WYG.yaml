body:
  text: 旗分志十四八旗佐領十四正藍旗滿洲佐領正藍旗滿洲佐領上一㕘領至三㕘領正藍旗滿洲都統所屬㕘領五第一㕘領下佐領十六第二㕘領下佐領十七第三㕘領下佐領十七第四㕘領下佐領十七第五㕘領下佐領十七第一㕘領第一佐領係國初以烏魯特地方来歸人丁編立始令諾穆圖管理諾穆圖故以阿濟達管理阿濟達故以法保管理法保故以索諾穆之二世孫三等伯赫達色管理赫達色故以索諾穆之三世孫根敦扎卜管理根敦扎卜陞任奉天協領以其子端柱管理端柱縁事革退以達克薩哈管理達克薩哈縁事革退以徳敏管理徳敏故以伯秀管理伯秀故以福元管理第一㕘領第二佐領係第三佐領内滋生人丁於穆成格管佐領時分編一佐領以鎮國將軍宗室瑚什布管理瑚什布故以其叔父之子輔國將軍宗室拉克達管理拉克達故以其子奉國將軍宗室敬徳管理敬徳故以其子奉恩將軍宗室巴進泰管理巴進泰故以其弟二等侍衛宗室林貴管理林貴縁事革退以其兄之子宗室增成管理增成故以徳良阿管理徳良阿故以廣禄管理第一㕘領第三佐領亦係國初編立始以宗室青巴圖魯莽阿貝勒第四子鎮國公宗室韓岱管理韓岱縁事革退以本佐領人福格管理福格陞任寧古塔副都統以本佐領人穆成格管理穆成格年老辭退復以韓岱之孫奉國將軍宗室哈爾薩管理哈爾薩故以韓岱弟之子輔國將軍宗室徳楞管理徳楞故以其子奉國將軍宗室額勒赫布管理額勒赫布故以其伯父之子奉國將軍副都統宗室滿珠習禮管理滿珠習禮縁事革退以宗室吳達海之二世孫䕶國將軍宗室松阿立管理松阿立陞任以松林管理松林故以廣眀管理廣眀故以廣泰管理第一㕘領第四佐領原係國初編立之半個牛彔漢文稱佐領始以宗室青巴圖魯莽阿貝勒之子宗室吳達海管理吳達海晉封貝子以本牛彔人三泰管理後以人丁足額編為整佐領仍以三泰管理三泰故以吳達海兄之孫奉國將軍宗室勒色里管理勒色里授右衛䕶軍㕘領以其子奉恩將軍宗室達禮䕶管理達禮䕶縁事革退以其叔父之子奉恩將軍兼監察御史宗室冲陽和管理續以巴彦布管理巴彦布告病以海存管理海存故以永登額管理永登額故以國祥管理第一㕘領第五佐領係第二佐領内滋生人丁於宗室拉克達管佐領時分編一佐領以奉國將軍宗室滿達管理滿達故以其子宗室八十三管理八十三縁事革退以其弟宗室額爾徳尼管理額爾徳尼縁事革退以佟寧管理佟寧故以眀阿善管理眀阿善故以圖彌善管理圖彌善故以續徳管理謹案此佐領係康熙二十三年分立第一㕘領第六佐領係第四佐領内滋生人丁康熙二十三年宗室勒色里管佐領時分編一佐領以宗室吳達海之孫奉國將軍宗室卓綏管理卓綏故以其子宗室卓頼管理卓頼縁事革退以達三太管理達三太故以那思太管理那思太故以毓光管理第一㕘領第七佐領係第三佐領内滋生人丁於宗室徳楞管佐領時分編一佐領以其族孫奉恩將軍宗室納蘇圖管理納蘇圖故以其族祖之孫奉恩將軍宗室天相管理天相故以其子奉恩將軍兼二等侍衛宗室小格管理小格陞任以忒爾錦管理忒爾錦故以平文管理平文故以桂宗管理謹案此佐領亦係康熙二十三年分編第一㕘領第八佐領係第九佐領内滋生人丁康熙三十四年寳柱管佐領時分編一佐領以輔國將軍宗室巴哈穆管理巴哈穆故以其子奉恩將軍宗室格爾斌管理格爾斌革退以其弟宗室良玉管理良玉縁事革退以富勒伸管理富勒伸故以蘇隆阿管理蘇隆阿革退以舒貴管理舒貴故以平翰管理第一㕘領第九佐領亦係國初編立之半個牛彔始以海珠䕶管理海珠䕶故以喀占管理至康熙五年人丁足額編為整佐領仍以喀占管理喀占故以輔國公宗室恭安管理恭安故以額壘管理額壘故以寳柱管理寳柱故以恭安之孫副都統宗室諾木柱管理諾木柱故以廷喜管理廷喜故以永普管理永普故以徳崇太管理徳崇太故以徳堯管理第一㕘領第十佐領亦係國初編立始以朱䕶達管理朱䕶達年老告退以其子畢魯管理畢魯年老告退以其子邁堪管理邁堪故以其弟圖勒管理圖勒縁事革職以其兄之子御史滿丕管理滿丕縁事革職以郎中朱三管理朱三陞任以滿丕叔父之子霍立管理霍立縁事革職以朱䕶達之三世孫拖沙喇哈番漢文稱雲騎尉黒夀管理黑夀故以岳什太管理岳什太故以忠徳管理謹案朱䕶達原由奥堪地方来歸第一㕘領第十一佐領係第十佐領内滋生人丁康熙三十四年霍立管佐領時分編一佐領以宗室吳爾登管理吳爾登縁事革退以朱䕶達之族人長夀管理長夀縁事革退以宗室如福管理如福縁事革退以朱䕶達之五世孫㕘領眀山管理明山陞任以蘇昌管理蘇昌陞任以富剛管理富剛陞任以蘇成管理蘇成故以海寧管理海寧陞任以恒安管理恒安革退以海慶管理第一㕘領第十二佐領亦係國初以烏魯特地方来歸人丁編立始以鄂里喀圖管理鄂里喀圖故以其次子諾穆圖管理諾穆圖故以其兄撓海管理撓海故以其長子庫塞管理庫塞故以其叔父之子花塞管理花塞年老告退以其伯父之子丹㧞管理丹㧞故以其子博爾泰管理博爾泰故以其伯父之子五達色管理五達色縁事革退以長保管理長保縁事革退以伯眀管理伯眀故以瑚什太管理瑚什太故以格爾忒管理謹案旗冊此佐領原係天聰七年烏魯特貝勒鄂勒寨圖来歸時將所携人丁編立第一㕘領第十三佐領亦係國初以烏魯特地方来歸人丁編立始以羅敏管理羅敏故以和同齊管理和同齊故以阿什圖管理阿什圖故以烏魯特貝子揣爾扎珥之孫喇麻寨管理喇麻寨故以其子劉相