  text: 欽定四庫全書欽定八旗通志卷首之四天章四皇上御製詩二
  hash: sha256:b29af4b88f5a7bc661ff8ef9df53e5f4d03bc394d3df93220efdfec122f9439f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_006-1a, image: WYG0664/WYG0664-0068c.png}
body:
  text: 賜安徽巡撫髙晉江分上下各撫治簡劇因之寄任殊以汝慎勤應勝此鳳廬其念洊災區賜河道總督白鍾山南巡江國周遭厯不使河干負弩朝嘉爾導疏合優叙肯因小節課臣僚二十一叔父慎郡王輓辭十韻同庚亦契韻年少久相隨膝下陪聞禮床前領弄飴後来雖各學時復有聨詞見樂善堂全集中及我親機政惟王合表儀乙夘冬由貝勒晉封郡王嘉言聞進牘碩畫見司旗曾命管理旗務閒趣兼工畫清辭獨剰詩晚年務置醴用杜甫語雙鬢早添絲都為去聲一兒棄遂教百事隳未能規子夏因與繼孫枝王早失子無嗣因命皇六子出嗣祀事叔輩晨星在顧瞻寜弗悲仲冬南苑大閲紀事廿年一舉寜為數乾隆己未大閲至今葢廿年矣周禮分明節候論便設軍容示西域時哈薩克布魯特塔什罕回人等皆令預觀佇看露布靖堅昆邇日盼將軍兆恵喜音殊切於懐好齊以暇千旓颭既正還奇萬礮喧風日晴和士挾纊非予恩也摠天恩賜浙閩總督楊應琚岱甸烏臺建銅邱幕府開節移閩海要人喜福星来三世封疆寄平生經濟材予心深所託元氣貴栽培故大學士黄廷桂輓辭華鐙廣樂正陳時扼擥驚聞辰尾騎慈慶朝儀難並輟强州酉節物淚雙垂屈指軍興逮五年儲胥事事合機先凡軍需事宜有經朕先時規畫而傳諭批示甘肅尚未奉到者及郵牘至無不適相脗合亶惟良弼蒼生福痛惜摧心敢問天馬利軍行粟賑民彌留兩事尚諄諄遺疏内深以調飤馬匹及地方賑卹諸務籌辦未竟為憾覽奏衋傷不忍終幅鞠躬盡瘁今誠已葛亮而來此一人運籌力疾尚勞心驛館誰為下鵲鍼時以督辦軍需赴涼州雖抱疴日劇猶勉力視事邉地素少良醫經布政使蔣炳奏聞即命福隆安挈御醫前往診治甫行而惡耗遽至可勝慟悼賜賻行將歸故里椒漿寫痛定親臨封疆厯三十餘年公正㢘明衆共傳皇考時臣所餘幾鼻酸然復思愀然故大學士黄廷桂靈柩至京親往賜奠事繁食少赤星頽易簀諄諄餉務裁公謹卒官父子感馬光還陜士民哀忍將巫祝先桃茢載共公卿酹玉罍奪我良臣一何遽不教留聽凱歌迴賜將軍兆恵書扇火嶺炎蒸劇將軍未解鞍國威揚萬里臣節率三單贈奬赤心篤持同白羽看黄香思漫引存問悉平安兆恵母年髙時遣人存問固濟爾巴圖魯璊綽爾圖盡節詩璊綽爾圖者索倫侍衛員曾以血戰功因賜號旌賢璊綽爾圖於乾隆二十一年冬随大兵進𠞰阿睦爾撒納與哈薩克力戰有功特賜是號固濟爾何謂敢勇能摧堅亦云其勇耳大節乃炳然兆恵定回城哈什哈爾驛章一一宣云有瑪穆特被回擄去年其人厄魯特隨軍厮役焉將軍遣偵騎彼亦隨往旃時將軍遣散秩大臣達什䇿楞及璊綽爾圖莫寜察岱屯等率兵百人前行捉生口瑪穆特莫寜察厮養也忽被賊回遮衆寡敵實難矢盡守空屋奮突揮以拳莫寜察戰沒岱屯命亦捐璊綽爾圖在傷重飲劍艱猝被生縛去至霍集占前卓立唾賊罵裂眥髪衝冠巴圖魯侍衛豈懼爾狂㹪天兵今少至數萬繼進連以千敵爾萬汝滅踵不旋霍集占乃怒持刀向頸剸其達什䇿凌同時遭繫牽霍集占忿詈爾厄魯特人叶脣齒應相依何受中國官鐵鈎鈎四肢其死最可憐是皆所親見飾語敢取愆徒以無足數旦夕命茍延渠逃定回城乃復得見天兆恵聞此語既悦繼涕漣悦以我有人涕以已所遣叶據實厯詳陳痛淚不忍看心與帥臣同恩加寜惜駢璊綽爾圖等前已有㫖勅部照陣亡例賜卹今悉其死事英烈狀復命察其子嗣優加恩卹為齒睢陽張為舌常山顔古有今豈無詩録其人𫝊雙義詩有序副將軍富徳至葉爾竒木既定回城痛去嵗將士之沒於王事暴骨沙場為之築墳表墓因以奏聞葢隨將軍兆恵力守者固已無恙而旁出捉生及在途值賊者猝致捐軀實出逆料時則納木扎爾三泰適以奉差而往遇難而殉此雙義之詩所由作也夫雙忠戡亂於無形雙烈表節於有北今之雙義亦復炳然此皆我八旗世臣與國同休戚者在諸人含笑九泉已知世禄之必被而朕捫心午夜奚啻手足之如傷用兵既非得已盡節豈所樂聞且即此役而言非生擒二酋何以雪我三軍之恨哉然既建大業寜免㣲疵即走卒厮養頗切同仇則知我國家豢養旗人萬年鞏固之基而非周秦漢唐一興兵而天下驛騷怨聲載道者比此又朕所深慶幸者夫雙忠昔集事雙烈能忘身二事皆見前集兹作雙義詩其故得細陳曰納木扎爾曾贊北路軍奮勇剪逆賊封伯酬其勲納木扎爾先以都統叅贊北路軍務曾擒喀爾喀叛逆青滚雜卜論功加封伯爵副都統三泰英氣頗超人均御前侍衛素悉厥忠純兆恵富徳輩從戎久効勤欲代俾將母將軍兆恵富德母俱年髙比嵗領軍討賊故特簡二臣往代之二臣被選掄去嵗黒水役事見前固守遣索倫致信愛隆阿權退催後援可支百日間速進莫逡巡將軍兆恵等猝被賊遮時愛隆阿拒河駐後將軍兆恵自圍中遣索倫二人間道傳語大兵未集可速迴阿克蘓俟後軍一齊進援將軍及叅贊輕進徒俱焚當待師並来何慮狂狙狺時授納木扎爾為靖逆將軍三㤗為叅贊大臣之信兆恵已知之故亦令暫迴以俟後軍爾時二臣者馳驛往軍門過愛隆阿營却近黒水濱所遣人未遇礮聲前忽聞知賊與我戰聞戰恥退奔徒攜百餘騎赴義命同捐叶凶信驛遞来痛淚傷心魂使早知拒守退俟熊羆羣同進可樹功何致均沉淪即先至一日合兆恵軍屯亦可旋今嵗奚煩以身殉叶不前復不後此實若有神富徳自和闐重至黒水津葉爾竒木降諸事粗䖏分痛念我將士沙場化為燐黄頭雖不備掩骼權為墳猿鶴昔屬幻邱隴今可循因以此事奏西望揮淚頻豐碑旌墓門千秋西海垠捐軀固臣節在爾非所論在予則何忍此恨終當伸夷考六人蹟事異心同均與國休戚共寜止曰藎臣史筆多訛𫝊永言𫝊其真賜明瑞有序叅贊大臣毅勇公明瑞以逆酋大小和卓木望風先遁率前鋒鋭卒往遮而賊􅉰間道通信逆酋遂兼程走明瑞追及之於霍斯庫魯克以逺馳之旅摧拒險之徒銜枚列隊者甫九百人鳴哨據梁者且六千指而能折負隅之勢揚卷籜之風轉戰三時辟易百里擒生斬級輜重畢收而將軍富德等亦以兩城既定統師㑹𠞰逆豎計日可擒非其志秉忠誠曷以功隆摧陷雖古名將孰克方兹爰賜是詩以彰其績世胄更勲戚少年能老成從軍俾習事屢戰得英聲適以狂狙遁因將勁旅征欲遮先信漏不捨竟踪横地利彼雖擅人和我實勍騎惟九百到賊乃數千迎少卒勝其衆勇還濟以誠朂哉俘二豎衛霍遜功名將軍兆恵富德差乾清門侍衛来請安詩以賜之數年萬里未為遥遥在將逢隔五朝却為勞儀待旋蹕時將軍等凱旋近郊擬以二十七日上陵回程具儀迎勞如三秋念轉無聊二月廿七日郊勞出征將軍兆恵富德及諸將士禮成紀事京縣郊南親勞軍圜壇陳纛謝成勲出師本意聊嘗試西陲之役始以厄魯特諸台吉率衆欵附請兵甚力我喀爾喀牧圉勢不可以錯處滋患無寜及其鋒而偏師嘗試特計因其地以撫之故禡旗命將之典槩未舉行語具乙亥告成碑記兹準夷既平而回中諸部以次戡定實荷上蒼宗社鴻庥非敢謂先時逆覩及此也奏凱今朝備禮文釋甲弢戈罷征伐論功行賞筞忠勤膝前抱見詢經厯國朝舊制凡出征將領成功還者行抱膝跪見禮以示優異今即遵行一瞬五年戚以欣同心萬里那暌違畢竟歡言賦采薇勇將歸来兼福將黻衣著得解戎衣漫稱偃武修文日恐即嬉文恬武機飲至寜誇暢和樂持盈益勵慎幾㣲三月朔日御殿定邉將軍兆恵副將軍富徳等率成功諸將士朝謁詩以紀事黄麾簇仗正衙排奏凱来朝樂孔皆脱劎釋冰摇玉佩卷班按隊叩金階幸逢耆定干戈戢况值熙和風日佳范士燮言予敢忘惴矜保㤗是長懐大學士来保八十壽辰詩以賜之八袠棃鮐茀祿增三朝禁近亮勤稱温城過闕毋忘下東海為閭知有興矍鑠齊眉叶琴瑟徘徊繞膝侍孫曾皤皤元老多黄髮時大學士史貽直亦年七十九矣自是明廷大吉徴夀五弟和親王五十夀辰星臺太史報書雲邸第佳辰瑞靄氛體似吹葭氣方熾算同刺繡線添紋年齊蘧使對尼父詩例髯仙夀夘君掞藻謾稱鶺鴒頌惟懐敬業昔同羣賜山西巡撫鄂弼旬宣此初任嘉爾副予望出政宜除細移風在奬良公為衆官表儉是晉民長保障休輕視家聲朂繼芳閲健鋭營習武健鋭垂營制勤教子弟兵果然實效獲遂用大功成耆定敢因懈詰戎益致精簡良行賞遍弧矢亦親抨昆明湖泛舟示尹繼善泛舟昆明攜近臣繼善南来亦同舸忽然博古謂盛世襲彼漢名似弗可笑而謂之意固佳黒土原非沿刼火未聞神池自堯乎皆見三輔黄圖詎始茂陵劉郎那道古且置言今時即云襲漢我不辭闢疆二萬里以外用兵纔閲五載遲西海一帶皆吾屬嵗嵗入貢朝丹墀伊犂耕牧日孳息烽火不作寜邉陲一狼千羊非所喻試問元封能爾為書箑頭賜駐守伊犁内大臣阿桂典屬今時班定逺冠軍昔日霍票姚阿桂於平回部時以厯戰奏竒捷今統留駐伊犂兵循行諸部屯政撫輯合宜其勇決沉㫁殆兼霍班之美雪塗無藉持清暑欲扇仁風萬里遥賜兩江總督尹繼善保障資三省忠勤著兩朝節樓無過久尹繼善於雍正七年巡撫江蘇旋兼節制厯兩江雲貴川陜諸重任而兩江至今凡三莅前後三十餘年幕府獨稱超善得軍民服兼能上下調暇還工作誦吉甫可同條賜江南河道總督髙晉撫皖昔㕘俎督淮今建旌髙晉昔為安慶巡撫時命為副總河俾習河務簡賢我惟切盡職爾應誠兩世司河務髙晉髙斌之嫡姪也一心如水清朂哉為國幹便是繼家聲賜湖廣總督愛必達荆襄資坐鎮江浙逺来迎曰有世臣藎常懐報國誠清勤課吏治疾苦達民情久靖苗疆術無過不擾行賜閩浙總督楊廷璋西粤昔開府南閩今建牙兼知亦舊制閩浙總督駐衙於閩兼知浙省舊制也勝任得卿嘉政有羣黎感身無大耋嗟廷璋年七十三精神尚健老成方倚賴調攝意湏加賜江西巡撫常鈞百戰得歸身九歌出牧臣常鈞於西師屢著功績凱旋疉擢至豫撫無端泛河洛有術免沈淪熟路輕車易去秋楊橋漫口以胡寳瑔素習豫省水利有㫖對調然方水注聞封時常鈞督塞五門頗寓行師之律厥功甚鉅賢勞體恤頻西江魚米地休息且同民賜安徽巡撫託庸連疆来接駕咨政引同舟共濟義應繹勤宣業可修老看身益壯人實食無浮虹宿被灾地欽哉善恤賙賜奠大學士来保輙復成詩一世篤勤行三朝禁近臣老成惜多謝去嵗大學士史貽直梁詩正半年相繼而沒厚重有誰倫那問生由命因知夀底真来保夀至八十四嵗且看市㕓上應有輟舂人夀莊親王七十誕辰吾叔長上聲吾十六嵗於今亦届古稀年近尊行裏無雙老闔藩衛中有數去聲賢友愛深承宗帝澤引教平聲迴憶祖皇邉康熙六十一年奉鎗箭皇祖㫖令王教子由来齒德光朱邸恒藉儀型福夀綿臨協辦大學士尚書武毅謀勇公兆恵第酹酒重坎昔已濟百年今忽消大星落昨夜宻席尚前朝前日養心殿軍機大臣等同進朕謂宜就第攝養昨日兩命御前侍衛挾醫往視稱小差今早亟問則已報逝矣一痛嗟何及千勞憶匪遥恨無執手訣城闕鎖深宵賜江南總督大學士尹繼善綸扉昨已命和羮江國仍資扈蹕行明代稱賢必王守仁石永漢家推盛則韋賢平當封疆㡬處皆時望旌節卅年獨老成亦識心殷依北闕待宣入閣贊樞衡賜江南河道總督髙晉疊舊作韻東南稱澤國保障畀雙旌詎在工穿鑿惟應盡敬誠隄堅幸黄刷口拓暢淮清年来清口宣洩之法髙晉善體朕意於啟閉尺寸一以髙堰五壩為程不惜拆清口壩之勞費是以屢年五壩不過水下河田廬並資利益實爾推行善毋須揚頌聲賜湖廣總督吳達善甘陜贊軍餉滇黔建棨牙兩湖俾治劇萬姓庶䝉嘉公不和斯鮮俗有湖北督撫常不知之諺或惑於形家之説以為地勢使然此謬論也葢公豈有不和者明期照莫差官方誠闒茸湖北吏治自愛必達周琬以来因循欺蔽較各省為劣兹命督撫諸臣力挽頽風可弗意為加賜閩浙總督蘇昌楚粤曾宣績浙閩兹撫封外中久敭厯聲望益舂容早是心如水應知夀比松自當隨蹕輦奕葉本從龍賜安徽巡撫託庸又下大江来舟行許扈陪率因諮衆隱遂以訪羣材節操古松似精神秋水哉恐妨悞程吏數日便教迴坐天成寺樓得句命尹繼善和韻石級髙縈䇿馬登春山羃䍥曉烟澄峯排兩闥爭輝日澗轉千盤尚帶氷松較六朝還更古天懸一鏡不須鐙寺樓老翰相攜坐問爾棲霞可得能大學士尹繼善隨圍因請詩走筆成什調之久置馳生耳後風過五旬後雖毎嵗行圍然不似向年御飛騎下峻阪矣偶然蘭阪驟雲驄雖抛射鵠五年閲向喜射鵠幾暇常集侍衛等試射中的恒十之八九自壬午以後因臂病不能如志弗為者五年於兹而馬射則仍縱送如常也原屢中去聲麚片刻中廿四日圍中發矢連斃五鹿廿五日行圍復殪其三尹繼善見之驚為神異因命其射一疲卧之鹿則第三箭始著鹿身轉蹷起帶箭而去祗以賤良衆屬目笑稱馬步一張弓緑營不嫻馳騁馬弓之力率減於步弓遂有以馬步一張弓誇於衆者若我滿洲則馬射更為得力故其弓較步弓尤强尹繼善久莅外任習聞緑營語因戯及之隨圍老翰催成什譎諫相如同不同題李世倬皋塗精舍圖圖寫臯塗著壁懸偶來即景賞雲煙誰知常住舍中者已閲人間二十年是圖丁夘所作逮今二十年矣閲武健鋭練精旅香山聚隊居知方素嘉爾閲武便臨予所尚赳桓實寜誇聲勢虚展伸佈行雁偏伍列麗魚撫壯誠欣矣問勞尚憫如藉兹成偉績前此平定回部時健鋭營士卒所至奮勇先登屢奏攻堅陷陣之捷遂成大功耆定可忘諸將軍公明瑞輓詩蠻結之捷鼓勇進孤軍深入心牽縈屢催繼援竟弗援額爾登額以恭贊統兵自旱塔沿途逗遛屢經傳㫖飭責撫臣鄂寜亦十檄進援木邦接應將軍彼並置之不問僨轅駑馬誠堪驚然猶因糧𠞰猛宻計當兩路兵合并誰料援師竟避賊額爾登額既退葸貽誤致老官屯匪孽尾随大軍伺隙又以猛夘一帶多有賊蹤彼自生驚阻遂由内地繞至宛頂復恇怯不進强弩末被魯縞輕蜂屯蟻襍截歸路將軍體恤諸孱兵攜數勇士獨殿後不虞中去聲要害命傾將軍公明瑞自大山移駐猛腊率衆擊賊連勝殱數千指以緑營疲病者多不忍棄去令將領䕶行而身自殿後接仗臂胸被創竟致捐軀都統扎拉豐阿䕶軍統領觀音保總兵李全亦俱陣歿嗟哉捐軀因為國痛惜如失股與肱雙忠雙烈及雙義駐蔵副都統傅清左都御史拉布敦以鋤兇死事表曰雙忠而定北將軍班第恭贊大臣鄂容安為伊犁賊黨所迫倉猝捐軀是為雙烈黒水之役恭贊伯納木扎爾侍郎三泰遇賊被害是為雙義三逢斯四何為情大臣竭忠報國節義炳然罕覯兹後先嫓績三而且四深用憮然要當專祠表勲績俾爾千古存如生恨緬事益難中止雪仇大舉期功成將軍公明瑞及領隊大臣都統扎拉豐阿䕶軍統領觀音保靈櫬至京親臨奠酹即事成什全師原是出蠻陬何事三臣命獨休將軍公明瑞師次小猛育額爾登額逗遛不接應以致旱塔木邦之賊并力邀遮時以營中病疲之卒誼難徑棄三臣矢志不肯輕還殿後接戰臨陣捐軀被阻稜稜恥生返捐軀赫赫永名留殿軍無愧孟之反隕節同如趙慶州故里櫬歸臨奠酹酒杯釃盡淚還流題𢎞旿畫翠巘髙秋千尋翠巘嵌丹楓秋色臨平想像中石渠寳笈有王䝉臨平秋早畫軸上等真蹟楊昇曾未見款識仿昇筆法精神直欲逼思翁攜和親王遊山作雨後春山恰好登牽来御馬與同乗卅年前興爾應憶七字立成我尚能莫負韶光繪如許試看霜鬢㸃俱増偶然屧步休誇健近寺或步陟王稱健步能濟勝許掾風流底足稱閲武自葺實勝寺爰居健鋭營鋪敦恒藉是開拓竟因成緬甸何無賴王師斯有征重臣奉命討耆定貴先聲題李世倬畫曾是皋塗命寫真林仍羅落嶺嶙峋獨憐盤礴為圖者却已多年作古人書扇賜經畧大學士傅恒炎徼熾煩暑軍營區畫頻大端應悉記細務不辭親世上誰知我天邉别故人朂斯風到處揚武並揚仁經畧大學士傅恒奏報收撫猛拱土司賜詩示奬猛拱輸誠舟濟師朱波早是失藩籬猛拱土司渾覺遣其頭目脱猛烏猛至騰越誠願備舟濟師比經畧大學士傅恒軍次戛鳩江夷目等已陳舟江岸遂由允帽寨口渡江今奏報八月二十四日至南底河脱猛烏猛復率猛拱城長来迎並艤舟河干待渡傅恒先遣領隊大臣公奎林統勁旅五百往定其城俟後隊全至盛兵以莅猛拱乃江外一大部落緬匪恃為扞蔽今既收撫其地則彼之門户已失在我實操勝勢亦如平準夷時之先取烏梁海也烏梁海譬先收附準噶爾斯易掃夷身先去聲諸軍共辛苦心嘉碩輔佛肩仔秋霖中喜瘴江渡已趲兵行兩月期傳恒於七月二十日自騰越統兵進𠞰出闗以後路益﨑嶮兼之秋雨地濘積潦甚深平時驅馬可涉之溪非舟橋不得渡他人當之鮮有不畏難生阻者而傅恒督率士卒結筏成梁且有横一木於水靣身先踐渉為衆倡以此人皆感勵指顧集事雖當雨多漲盛之時我軍安渡無滯據奏九月初十日計可至蠻暮與副將軍阿桂㑹師即議分路攻取老官屯較前嵗師期早將兩月云伊犂耆定久戈􅌢詎緬昏狂事疥搔西陲底定已慶戢櫜故於回部獻俘時曾有從今更願無斯事之句實朕志也至緬夷僻在荒徼初未嘗有勤逺拓邉之意即其始作不靖尚不欲動衆聲討乃賊酋敢恃險逺抗我顔行且寛以一年待其悔罪仍冥頑負固此則國體所繫勢難中輟不得已用兵之苦心上天實鑒之昔實謀猷贊帷幄今資奔走効弓刀東山那學謝安逸上蔡還過裴度勞佇待紅旗飛報捷重開紫閣勒勲髙前此西師之役惟傅恒與朕同志獨贊成功曽於紫光閣圖形䇿勲列在第一今以事鉅人少不得已命前往經畧乃劬勩備嘗茂績尤著佇大捷迅奏閣畫再標用彰懋賞耳臨和親王府第酹酒永言誌痛視疾起居執手詢旋聞哀信達楓宸維屏維翰有為恃斯邁斯征無更親弱質兒孫憐汝偝髙年妃母養去聲予申二裕貴太妃居宫中今年八十有自難慰遣予當代為申養以頤之髙年志一朝喪弟兼賢輔自顧何心慶六旬臨大學士忠勇公傅恒第賜酹酒瘴徼方欣輿病迴侵尋辰尾頓增哀鞠躬盡瘁誠已矣臨第寫悲有是哉千載不磨入南恨半塗乃奪濟川材平生忠勇家聲繼汝子吾兒定教培賜山東巡撫富明安承宣久佐方伯治安撫遂教幕府開能繼前規重本務大學士阿爾㤗前撫山東時董飭所屬専務實政於農桑水利諸事區畫周詳治行稱最崔應階繼之亦守而弗失曾諭富明安當一禀成規而更勤於察吏勤求諸吏舉清裁繁滋户口誠庶矣宜異古今其逺哉齊魯大邦小無數一人可具穎陽材賜兩江總督髙晉壤接因來輦路迎六年一日此丹誠防河積穀胥籌度察吏安民屬老成省嵗稔多原致喜去嵗江以南秋收均有十分髙晉云乃數年来所僅見任官賢少輙為怦俞哉回任勤諸政豈在劬勞扈蹕行憶故大學士忠勇公傅恒用去嵗臨第賜酹詩韻去嵗滇南力疾迴恰斯靣晤憶生哀傅恒去嵗自滇南迴於天津復命迄今一年餘兹復駐此追憶為之黯然樸齋即景依然也前席言人何往哉由古同為閲世客祗今誰是作霖材自憐無助涓埃者後進方當竭力培賜大學士髙晉回兩江總督任用去嵗賜詩韻昨年曾晤路旁迎去春東巡髙晉以江省封圻毘接奏請来迎還任時曾賜以詩黄閣旋除鑒素誠四月内尹繼善大學士缺出中外殊難其選以髙晉敭厯有年服官公正即為簡畀仍兼節制兩江適以潦淤萃畿輔去秋近京積雨較多永定河及北運河並有漫溢之處應通行相度修治髙晉素諳河務經理詳慎特令来京道便㑹同裘曰修及周元理悉心勘辦召来相度議平成南人望汝還為快北闕惟兹别漫怦内外需材贊治理苦心簡任敢輕行閲武八旗子弟兵健鋭此居營聚處上聲無他誘初建健鋭營於此掄八旗勇壯之士居之以其地離京城逺無習俗外誘而列營聚處技易精勤平定西陲時用之頗著成效勤操自致精一時看斫陣異日待干城亦已收明效西師頗著名賜山東巡撫徐績新疆宣力數年更徐績由山東按察使進京命駐哈宻辦事又調赴烏魯木齊前後凡三年簡授齊東安撫行詎曰繭絲惟保障况兹路熟就車輕小㢘大法視斯率察吏安民篤以誠風土休言夙所悉矜知則闇學知明賜閩浙總督鍾音之任海江保障寄儀刑弗動色聲措輯寜述職咨詢近前席歸轅荏苒别明廷兩疆所部連康嵗一路應知是福星朂爾莫渝終始志昭昭原不若惺惺臨故大學士傅恒墓賜奠佳城咫尺蹕途傍莅止因之酹桂漿已厯廿年次輔弼又經三載隔隂陽先兹於汝應相恨後此顧予轉自傷無忌昭陵雖有例那教賜奠痛文皇賜伊犂將軍舒赫徳伊犂萬里撫軍民不比堂㢘取㫖頻此豈僅為保障寄因之特用老成人固思舊侣歡常聚其奈嚴疆倚獨諄食少事煩正何礙如斯我亦倍精神詠題壁玉韘賜將軍阿桂闓體誠資挽六鈞玉工琢作刻崖人漫嗤沙苑詩無謂用方岳秋崖事可識浯溪筆有神臂病多年疎射鵠心厪邇日望書麟良球等度奚相稱合賜燕然勒績臣書扇賜將軍阿桂六韻掌握師行掄俊豪事無巨細一心操功成九仞尤應慎志洽諸軍實所褒探路欲因乘怠隙阿桂奏督兵進𠞰巴占賊人因係近巢險隘悉力抵拒官軍屢攻未下兹於菑則大海山梁之西探有昆色爾喇嘛寺又西為章噶若由昆色爾將章噶占得則菑則大海拉枯喇嘛寺均已攔截其内賊自不能踞守届時或順山腿下至河邉或涉水而西皆可繞出勒烏圍之南以㫁其與噶喇依往来之路海蘭察親至其地審度情形統兵往𠞰約於初三四間即可奮力前進以我精鋭擣彼空虚諒無不克云云所籌甚合機宜亟盻捷音速至攻碉直可壓危撓我居避暑原無暑卿效賢勞真是勞嘉予七言錫書扇凱歌三㨗換征袍勉之指日親郊勞紫閣銘勲崇爵叨於郊臺迎勞將軍阿桂凱旋將士等成凱歌十首郊臺仍是此郊臺何幸重修盛事来漫謂數年經契濶精神注似日相陪勲臣率拜列靈旗郊勞之儀陳將軍叅贊等得勝纛於臺上朕親率成功將士及王公大臣等行禮是時臺下鳴螺鐃歌樂作軍士鳴螺赫武儀樂奏鐃歌行抱見拜纛禮成御幄次將軍叅贊趨至座前行抱見禮各加撫慰賜坐賜茶猶循祖宗以来之家法也詰戎家法萬年垂已已班師本受降非擒賊滅冦故未行郊勞之典庚辰郊勞典鴻厖放牛歸馬予素志凱獻何期此見雙準部回城定五年金川小冦亦如前嘉予將士久敵愾不覺對之増惻焉地險加之衆志堅促浸逆賊恃其地險碉堅蟻衆齊心抗拒其事雖小於平定西域而逐步力戰而得攻𠞰之艱視前不啻數倍過之林碉步步戰而前小於昔事難過倍慰意恒因意􅍀然鑿穴而居避火器終於靣縛出蕃城官軍圍攻賊巢用大礮四面轟擊賊衆皆鑿地而匿以避礮火今䑕窟垂破逆酋膽落計窮因率其弟兄甲爾瓦沃襍爾斯丹巴並其兩土婦及助惡大頭人丹巴沃襍爾阿木魯綽窩斯甲尼瑪噶喇克巴暨兩喇嘛並大小頭目二千餘人出寨跪捧印信乞免誅戮遂悉就擒獲貪生螻蟻固如此聚族將焚語豈誠先是投出番衆僉稱聞逆酋等毎言若官軍攻至巢穴窘迫無計即相聚焚死不肯為官兵所得彼時即以畨人之性最忌自戕不過故作妄語欺飾以圖狡脱屢諭將軍等嚴防今果不出所料倏經于役五春秋棧道﨑嶇似坦郵棧道雖險較之金川則坦途矣夾路花紅復栁緑阿誰致悔覓封侯脱却戎衣換吉衣龍章示奬特恩稀郊勞時將軍等俱甲胄覲謁隨行奏凱而還俾衆觀仰軍容之盛入朝後始解甲易吉服將軍阿桂實為此事首功特賜四團龍補以示優異同心戮力還掄最便解天閑賜六飛將軍阿桂及副將軍豐昇額叅贊海蘭察並賜御用鞍馬乘以扈行兵洗金川永不波潢池跋扈竟如何良鄉近逺多黎庶歡喜都来聴凱歌凱歌亦豈易為聞五嵗辛勤勞衆軍我實未曾安五夜㡬多憂慮與平分賜協辦大學士吏部尚書一等誠謀英勇公阿桂六十夀辰功髙殊衆賜冠衣夀日充閭耀吉輝謀勇奏平定玉壘歸来俾協贊黄扉六旬慶自今伊始廿四考當逾古稀不説保全朂黽勉嘗謂史稱宋太祖能保全功臣以為善事夫欲保全之是心中已先有一彼將有過或我將疑彼之念非待臣以誠之道也君之與臣惟願其長享令名以宣猷佐理何必預設保全之意哉名同郭令豈其非閲武樓閲武因成六韻誌事節前閲武甸場寛組練生光了弗寒可勿用仍要以備不忘危敢恃其安新疆舊部兹同扈北路西戎許並觀大兵平定兩金川以其地安營設鎮而令其餘各土司分年入覲俾益懐徳畏威兹初次舉行派定明正等十八處土司土舍頭人共二十四員名命成都將軍明亮攜以入朝與朝正外藩及年班回部並哈薩克使臣等同與朝賀宴賚適於閲武樓閲武因命舊藩新部及此次瞻謁之土司甲爾叅德沁等皆得與觀破險衝鋒或經見邇年攻𠞰金川我八旗將士越險摧堅勇鋭百倍番衆等皆見而畏懾至若滿洲兵行陣嚴肅簡練精强則其昔時所未聞見也正旗堂陣俾初看銷兵氣共陽和鬯訓旅心殷揚覲難示義方還頒禮賜閲武禮畢所有在事之將校兵衆等皆循例行賞武臣莫重詡登壇臨大學士舒赫徳第賜酹酒扈蹕將襄事中途忽永辭日安聖母山陵大禮于廿五奉地宫後恭㸃行神主例應滿漢大學士各一員襄事因令舒赫徳扈乃舒赫徳忽於十九日晡遘疾亟遣御醫診治以冀速痊不意其勢日加劇病中猶以欲襄廿五大典為惓惓至廿二日酉時遽爾溘逝聞之實深震悼失斯佐惜矣屬我命逢其今年正月遭子之聖母大故二月杪又有皇四喪今舒赫德忽復病歿雖皇四子事闗天性不能不傷而舒赫德佐子政務實國家得力大臣一旦失之痛惜尤甚此皆由今嵗流年駁雜所致星命家言理或有之也中外力宣久絲綸心謹司老成漸凋喪觸緒總興悲蘇爾相詩差往緬屯因被羈庚寅春因緬匪懇求解老官屯圍時曾有奉表還人納貢之説久渝不至命雲貴總督彰寳遣人往詢而彰寳遽遣都司蘇爾相持檄往緬境乃匪目諾爾塔將蘇爾相羈於老官屯蘇爾相屢欲引決不得留彼八年丁酉春匪目得魯蘊願將蘇爾相送還禀致邉吏總督圖思徳據以入告然不免露遷就完事之見為緬匪所窺復爾居奇翻悔而緬目綻拉機又從中掣其肘益致反覆遷延幸余預料圖思徳之才識拘淺非能任其事者因改令撫黔而調李侍堯代其職并命阿桂往彼相機籌辦二人措置得宜緬匪始知畏懼于四月廿七日差人將蘇爾相及其隨往之弁兵等送還内地阿桂等因訊錄他犯供詞以奏乃知蘇爾相在彼情事為之矜憫今知悔罪送還為兵傳後實非佳也事貴先聲信有之緬地水土惡劣前此官軍至彼輙多染病且有死亡者實非可用武之地故決計不復加兵昨嵗平定兩金川受俘誅逆令所留緬目秤官猛等數人與觀皆惴慄觳觫不敢仰視因縱之歸秤官猛等遂於緬地𫝊述中國威武會緬酋懵駁已死其子贅角牙繼立頗知悔懼而得魯藴等又深慮獲罪天朝終難安處因思表貢還人求許開闗通市其悔罪之心實由先聲所懾也癘地瘴鄉憐久汝氷天雪窖豈殊其設如比儗伊家武無子無妻謂過伊蘇武直未降匈奴如衛律李陵耳氷天雪窖囓雪餐氊豈能度十九嵗之久歸而為典屬國賜之二百萬漢之奨忠不為不厚而李陵猶謂之薄葢彼既降虜所謂出婦無好辭耳至於娶妻生子則武故不得謂之全人而亦令其嚙雪餐氊以延嵗月乎司馬遷所云附青雲之士者史之美在此而史之病亦即在此矣因用武事故並及之觀䕶軍氷技行賞嵗暮家家多窘迫例因氷技沛恩施乍驚此日憑觀處大異常年侍覽時彩徹旌旗遵國制持仍弓矢耀軍儀常年走隊時按八旗旗色各負小旌與弓矢相間今嵗因在二十七月之内盡徹旌旗惟令持弓矢習射云習勞佈恵非無事要即其中酌用之閲氷技本以嵗暮行賞兵丁因令照常演肄定其等差而今昔相形益覺悽愴追復睿親王封號并復其宗嗣襲封予諡配享詩以誌事稽宗盟之軼事展親兼以褒功覈方䇿之遺聞申枉因而繼絶睿親王者屬本懿藩分居執政勤勞王室棐忱洵同姓之良綏定燕京偉績更諸王之冠顧以任隆見嫉亦或氣盛招尤履霜之釁潛積於多年戴盆之寃頓興於既逝指斂衣為左證理知所必不然肆羅織以深文獄甚於莫須有徒以衆怨之搆成貝錦而執作爰書尚非親政之年矯綸綍而竟從重典繄予恭披實錄鑒王實有大勲當危疑推戴之時拒羣議而匡扶沖主迨戡亂肅清之際迎聖駕而肇建丕基且誡比列之謟䛕朂以尊君親上復斥同懐之愆戾加以義正詞嚴厯厯具存班班可考緬其誠藎皎如白日青天嘉乃壯猷允矣信今傳後使果有不軌之志未嘗無可乘之機乃貞心既矢於寢興豈逆跡轉萌於泉壤無端而暴其罪狀毎惻於中如是而坐以叛名宜昭其屈念疇昔非由親決弗嫌成案之翻為國家特叙成勞惟協公評之當用是復其王爵仍教世襲茅封並為録彼宗支咸使列于玉牒葺園寢而春秋祀享配太室而殿廡筵班補列𫝊以連篇準易名之一字推祖宗之恩意辨誣足勝金縢勉子姓以欽承守緒奚煩鐵劵爰成四韻並引長言流言恐懼似周公公則生前王已終睿親王之寃獄與周公之被流言相似然公之受謗在生前故恐懼可以有待王則遭誣於身後故是非無以自明然予恭閲實録為之昭雪較諸感風雷而𤼵金縢者似尤光明正大耳無倖位心真是睿有開基業孰齊忠謚增一字非私恵論定千秋付衆同配食襲封推祖澤睦親惇叙朂宗功命仍稱禮鄭豫肅諸親王及克勤郡王原封爵號并予配享詩以誌事有序溯維城於王室同扶有永之鴻圖考列爵於宗盟各著非常之偉閥事在本朝為極盛蹟皆前古所罕聞毎以繹尋實錄之文因有追叙成勞之典粤稽禮邸實惟讓王四路分殲薩爾滸助揚神武連營並克山海闗奮厲師貞翊聖明而特表藎誠誅逆惡而不徇私義至鄭王屬居近派䝉太祖育自宫中初定平壤之盟旋鼓寜逺之勇遵化歸化頻建豐庸松山杏山疉施勝算翦强藩而成一統識裕先機膺攝政而疏千言監陳前憲若夫論功之最惟豫尤超幼統偏師荷嘉名之肇錫獨抒長䇿舉大勢以全規洎入燕京遂專閫節破潼闗而追流冦狂魄尋僵平江介以定中原游魂自滅又如肅武親王之百戰稱雄而秦地恢城蜀疆殪賊勲尤崇也他若克勤郡王之屢征奏捷而降納朝鮮計圖明塞略更優焉是為同姓之股肱名皆炳著並照當年之耳目人所艷稱乃日久而舊號俱更雖世及而遺風幾泯爰命復原封之字俾同竹帛以常新並教列配享之廂咸侑馨香而弗替餘凡類似悉予詳求念櫛風沐雨之勞使徴獻者知宗功之不朽比礪山帶河之永期襲次者懐祖烈以毋忘用紀長歌並疏小引貝勒讓帝如汝陽最長太祖大事禮親王於諸子中為而功德隆茂衆望皆屬太宗禮親王因作議書言紹承大統必得聖君始能戡亂致治以成一統自顧徳薄願共推戴四貝勒嗣位入朝遍示諸貝勒大臣衆皆喜宗辭讓再三王意益懇切乃從太之薩爾滸戰我武揚薩爾滸之戰禮親王同薩爾太宗隨事太祖立功詳見向所作滸山書推戴沖主出丹誠叶不私子孫徳尤彰親王世祖嗣位時禮之子碩托孫阿達禮曾謀立睿親王禮親王發其謀並誅之宫中育養子姪行其名曰濟爾哈朗叶太鄭親王為育祖親姪幼於宫中號和碩貝勒戰功多矣難致詳同攝政亦抒謀臧逺取雲貴見早强鄭親王病劇未能世祖臨問泣對曰臣受取三朝深恩仰答不勝感痛惟願以雲貴滅桂王統一四海為念王之世祖為之大慟逆藩日後之謀果不出先見也幼領偏師建績昂褒䝉聖嘉錫美名叶宗豫親王幼統偏師輙有功呼爾太嘉之賜號額爾克楚直入潼闗賊奔商旋師平定江南疆功莫大焉䇿允良王之戰功甚多難以縷舉至其破潼闗逐闖賊及平定江南尤其功之最著者也整兵入蜀肅親王陣斬巨冦張獻忠叶悉平内地讋諸羗肅親王射殪張獻忠並削除羣賊平定陜西禮親王子智獨長克勤郡王為禮親王長子有謀勇濟以悃素復勇往叶盟定朝鮮勣克襄克勤郡王常同大貝勒阿敏及鄭親王征朝鮮克四城諭朝鮮王李倧降時阿敏懐異志欲直趨朝鮮王京倧挈孥奔遣其臣進昌君求和衆議許之阿敏不允克勤郡王宻與鄭親王定議駐師平山城遣使往諭倧報命願嵗貢方物遂許其降既盟告阿敏阿敏以未與盟仍縱兵大掠勸之不聴復令倧弟李覺與阿敏盟乃班師恨未得與定北京叶郡克勤王於崇德三年以疾薨于軍與入太宗聞而慟哭加以恩禮故未及闗定燕京也是皆巨擘輝天潢與復舊號並配享叶其未及者付考章並教一一稽宗盟叶封其餘宗室諸王貝勒等有功績顯著其爵後經降奪者並命宗人府查奏雪寃彰善示後蘉祖宗恩澤予衍慶本支百世奕禩昌過禮烈親王園寢賜奠因成六韻朝家讓帝溯前聞而衆太祖上賓王於諸皇子中最長望皆屬太宗王之子岳託薩哈璘請從衆心推戴王曰此吾素志也乃作議書曰紹承大統必得聖君始能戡亂致治以成一統願奉四貝勒嗣位入朝遍示諸貝勒大臣衆皆喜以告乃太宗辭讓再三王言益懇切衆議亦堅太宗從之路便椒漿賜奠勤由潭柘至香山蹕路經王園寢因臨酹酒唐較寜王無逼抗吳逾太伯有功勲烏喇平聲突陣如風捲王嘗從征太祖烏喇布占㤗率兵三萬以拒衆皆願戰慮布太祖尚未欲加兵王曰我士飽馬騰利在速戰所占泰不出耳今彼兵既岀平原曠野可一鼓擒也克其太祖因命進兵王随太祖親突陣大敗之遂城布占㤗遁走王復統精兵截戰又敗之布占泰僅以身免撫順攻城卜雨欣天命三年四月太祖伐明大軍兩路進㑹天雨何慮太祖欲還軍王曰天雖隂雨我軍皆有禦雨之具沾濕且天降此雨以懈明邉將之心使吾進兵出其不意耳是雨利於我不利於彼也太祖善其言遂進兵下撫順東州馬根單三城及堡寨五百餘處寛甸勇而誅上將天命四年二月明遣經略楊鎬大發兵四路来侵明總太祖率師親征王督兵於界藩山斬敵百人又敗兵杜松等於薩爾滸山又明總兵馬林營尚間崖總兵潘宗顔營斐芬山互為犄角直入太祖命步兵接戰敵兵自西突至王即怒馬迎戰其陣遂同諸貝勒大敗敵兵斬獲過半總兵劉綎由寛甸路来犯太宗督兵登岡衝擊王率左翼兵自西夾攻敵衆披靡劉綎歿於陣凌河恕以免監軍天聰五年八月我軍圍大凌河城明兵来援距城十五里而軍我右翼兵衝入敗之生擒明監軍道張春等春見太宗不跪太宗欲誅之王曰我前此所獲無不收養且此人既以死忠為貴奈何殺之以遂其志乎太宗悦遂赦春滅親大義棄孫子崇德八年八月子碩太宗升遐親王世祖嗣位郡王阿達里及貝託謀立睿多爾衮王發其謀俱伏誅碩託為王第二子阿達里則其孫也陪祀推恩展禮文今年正月降㫖以王及睿豫鄭肅克勤諸王同配享太廟三酹不禁清淚落祖宗遺澤逮礽雲閲武城内移来火器營聚居訓練藝圖精火器營兵向居城内隨八旗操演技藝不能精熟癸巳年始于西頂北之藍靛厰度地建葢營房移城内火器營兵之半聚處于此並派大臣董率之俾就近以時肄習衆兵既得訓練且省賃居之費較前已覺改觀紛華習令逺諸市賃僦費仍省衆兵子弟八旗厪教養本根百世示權衡五年一閲原非數入聲技熟因之命賞行閲侍衛射閲射闗戎詰班分侍衛官廿年曾未舉不閲侍衛射二十年矣兹命毎日掄侍衛二十人校射於出入賢良門閲之按三旗次序輪閲一周幾暇試親看發矢旌雙中人發二矢其俱中射侯者即賞以旌之闓弓愧獨難向閲射時必親射俾衆共觀曾有發二十矢中十九者自臂痛以来久疎射事雖技癢而不能强為心甚歉然殿庭躬教衆芳躅緬貞觀賜奉天將軍𢎞晌各省將軍駐奉天任最繁旗民紛雜處文武董雄藩用簡宗臣俊同為聖祖孫朂哉勤教養培此故風存賜吉林將軍福康安從征能奮武福康安以侍即命征𠞰金川奮勇著績録其功授嘉勇男世爵列紫光閣前五十功臣貳部亦通文知可棟梁任因教節鉞分迎鑾仍扈蹕鑒悃匪嘉勤汝父家聲在福康安為故大學士忠勇公傅恒之子勉之尊所聞示盛京五部侍郎陪京五部備官儀實各亮工有所司詎祗養髙勝國似盛京設户禮兵刑工五部毎部侍郎一人掌之凡盛京之事各視其職分屬焉非若勝國陪京備員虚設為投閒置散之地也亦常掄彦内朝移侍郎中遇才猷練達之人用之京部或外省督撫者皆有之曹郎互半中兼外五部司官向用本處人員雍正五年皇考以各員素多串通欺隱之弊概行撤回調補京缺而京見命在京各部堂官㨂員發往補授乾隆八年幸盛各員頗知黽勉積習亦經悛改令將各司員半用本地人員半由京員遷調俾其不礙陞途乾隆十八年復諭吏部議盛京即中員外主事各缺用京員十之七本地人員十之三以歸平允臺職應全罷允宜明季南京兼設都察院官屬更無所事事我朝盛京則不置此職也大異南京紛議論徒資撓亂竟何禆酹克勤郡王園寢毎陳開國䇿均合聖人心王戰功頗多且於天聰時陳奏善撫降人及請於山海闗通州燕京三處急圖其一以定丕基並請駐兵金州瞭哨諸事太宗皆嘉納之不少赳桓衆獨嘉幹略沉佳城留故里致奠重躬臨彰善俾觀感伊予此意深王之後襲封者改為平郡王今春以開國勲藩爵延于世自應仍其初封之號俾襲爵者顧名追念無忘其先人體國勲勞常懐効勉於訓示宗親有益曾命軍機大臣㑹同宗人府核議著為令賜奠功臣掦古利墓主吏勇過漢長孫陪似唐溯思同麥飯恩合奠椒漿百戰英惟勝一心誠且良揚古利以功授超品一等公世襲罔替公號曰英誠兩朝勲績赫異姓獨封王揚古利幼從其父來歸因太祖深異之日見信任亦命入侍且尚主毎從征伐必身先士卒而著詔之止不止或受傷猶裹創行以故功績最多崇徳初隨征朝鮮誤中礮傷而歿武勲太祖臨哭之慟親視含斂追封王賜奠費英東墓來歸識超衆獨入目無前費英東自少從先兵太祖征討三十餘年身士衝突堅陣當其鋒者莫不披靡嘗從攻葉赫城上矢石雨下太祖再命之退對曰勢垂危必不退也竟拔其城嘉諭萬人敵其從費英太祖伐明取撫順也明兵来援礮驚東馬旁逸衆皆不前費英東回馬大呼揮諸軍並進遂破之太祖拊髀嘆曰萬人敵也從征三十年薦賢奨以豫劾惡誨於先我善必太宗嘗諭羣臣曰費英東見人不先自斥責而後劾見人善必先自奨勸而後舉故被劾者無怨言被舉者亦無驕色未聞諸臣以善惡直奏似斯人也開國思殊績贈封理合然賜奠額亦都墓冠世稱勇獨丁年識主真額亦都年十三手刃父仇避居嘉木湖村居數嵗太祖過其地額亦都識為真主遂從行驍勇善戰能以少擊衆所向克捷跨堞太祖知其能日見信任嘗攻巴爾達城率鋭先登而戰飛矢貫股著于堞揮刃斷矢戰益力被五十餘創不退卒拔其城而還其勇果類如此忠攄實異衆恩顧亦超倫風雨精神㑹松楸碑碣陳元孫能繼勇額亦都元孫豐昇額襲果毅公爵昨為副將軍征𠞰金川奮勇著績嘉其克紹祖風於公號加繼勇以旌之惜因病不能永年撫念為之嗟嘆奕世有良臣故大學士兼兩江總督髙晉輓辭本以修隄藉碩謨詎虞病不起中都昨嵗豫省漫口較大非姚立德等所能辦因髙晉熟悉河防諭率諳工將備馳赴工所董視堵築不意其忽遘沈疴歿于工所為之悼惜祗縁下楗虧工屢祥符之時和驛八堡及儀封之十六堡漫口皆合而復開屢費工作今時和驛已經堵閉堅實而儀封之工于臈月十八甫經合龍十九日復又蟄塌引河亦復淤淺仍湏挑濬為從来築河所未見髙晉葢因績久弗成憂慙致疾更值僨轅敗事殊髙晉之姪髙樸在葉爾羗勒索回人珍寳並借開採宻爾岱山玉為名以牟已利苦累回衆若非及早敗露幾至釀成事變已屬罪不容誅甚至串通奸商遣家人同其私販玉石至蘇州售賣得價鉅萬實出情理之外其家人過江寜時曾持髙樸禀與髙晉候安髙晉並不詰其赴蘇之故轉徇其請給與回程䕶票殊不類髙晉所為因傳諭詰責髙晉慙怖引罪自覺無顔病遂因而日積使如是而不知愧懣又不成其為髙晉矣漠不闗心豈卿也愁因致疾究忠乎考終入祀夫何恨前據袁守侗等奏髙晉痰𠻳咯血經久不瘳漸致不能眠食病頗危篤因遣太醫院堂官陳世琯令乾清門侍衛布彦達賚偕其馳驛往視并諭髙晉加意調養戒勿力疾親赴工次以冀速痊昨髙晉自奏服藥相投已能進米飲知榖味兹忽據袁守侗等奏報髙晉於此月初六子時氣脱而逝為之嗟惋不置髙晉秉公持正察吏恵民為督撫中傑岀者即其嫻於河務一時亦罕有其匹深惜失此得力大臣且念其勤勞王事詔入祀賢良祠並遣侍衛前往奠醊復其生前降革處分并予卹典飾終之禮備至髙晉亦可以無憾矣寜識懐賢痛惜吾懐舊詩二十三首内録十二首三先生三首内録一首龍翰福先生先生名福敏康熙丁丑翰林皇考在藩邸即延其課予弟兄讀雍正初巡撫浙江遷湖廣總督嗣以撫浙時過愆罷歸未幾復起用洊厯左都御史余踐阼後優禮之尋授大學士先生服官政績無所表見而方正嚴憚且能多方誘迪於課讀為長余初就外傅始基之立實有以成之故毎追念不置云今古既殊宜其教亦異施古方教數去聲年今為出閣時出閣讀書明季諸臣常爭之我朝書者家法皇子皇孫無不六嵗就外傅讀憶半舞勺嵗六嵗時也皇考掄賢師即從師授經詎惟習少儀循循既善誘嚴若秋霜披背誦自幼敏匪曰詡徇齊日課毎速畢師留為之辭余幼時日所授書毎易成誦課常早畢先生即謂余曰今日之課雖畢曷不兼治明日之課比及明日復然吾弟和親王資性稍鈍日課恒落後先生則曰弟在書齋兄豈可不留以待之復令予加課俟具既畢同散彼時孩氣未嘗不以為怨今思之則實有益於已故余所讀之書倍多實善誘之力也以此倍多讀胥益平生資誰知童時怨翻引老日悲不失赤子心能無繾綣思嗚呼於先生吾得學之基五閣臣五首内録三首故大學士鄂爾泰鄂爾泰康熙乙夘舉人官内務府員外郎皇考素知其名登極初特擢江蘇布政使遷雲南巡撫尋晉雲貴總督兼轄廣西經理三省苗疆改土歸流其績最著餘亦多恵政所在吏民徳之雍正九年授大學士召還入閣辦事並軍機大臣余踐阼後深加倚任乾隆十年卒於位遵遺詔配享太廟入祀賢良祠鄂爾㤗性嚴正且鎮靜有古大臣風誠亦不可及已業師祗三人其三情向剖謂徐張嵇見三先生詩皇考重英賢率命書房走鄂爾㤗蔣廷錫以閣臣蔡珽法海列卿九胡煦顧成天劉統勲梁詩正任啓運邵基戴瀚来先後其時學亦成云師而實友不足當絳帷姓名兹舉偶鄂其中巨擘内外勤宣久初政命總理初即位時循例置總理事務王大臣四人荘親王果親王鄂爾㤗張廷玉皆所有遺詔中人也顧問備左右具瞻鎮百寮將美恵九有好惡略失尚性陽隂則否遵詔命配享旌善垂不朽故大學士一等忠勇公傅恒傅恒為滿洲勲戚世家孝賢皇后親弟也初由侍衛侍御前旋授内務府總管擢侍郎為軍機大臣遷尚書協辦閣務乾隆戊辰經略金川晉大學士兼程統兵進𠞰莎羅奔郎卡聞而怖讋欵服乞降以功封一等忠勇公西師之役與余同志襄贊軍務克成大勲圖畫紫光閣功臣列第一及緬甸逆命傅恒堅決請行己丑春授經略率勁旅往討自戛鳩濟師以後身先士卒艱瘁備經遂收服猛拱所至獲勝進攻老官屯時已染沈疴猶復力疾督𠞰逆酋畏懼懇請解圍而余亦因其地水上惡劣豫降㫖撤兵庚寅春還朝病日危篤至七月中遂不起余親臨賜酹喪儀視鎮國公入祀賢良祠傅恒在綸扉二十三年日侍帷幄藎誠素著顧年未五旬鞠躬盡瘁喪我賢臣毎念及傷且惜焉世臣更近戚丹誠素所信命之習政事幹材亦日進金川往經畧旌旗改觀奮金川莎羅奔即卡小醜陸梁初非難治而督臣張廣泗措置乖方老師玩冦致巤軰勢益鴟張及遣訥親前往董辦又復畏葸偷安憚於臨敵以致績久弗就因各治其罪命傅恒率師經畧親履行陣連克堅碉壁壘一新遂擒戮奸渠梁爾吉逆酋聞而喪胆始悔罪乞降然其時其勢未宜深入迅郎卡既怖讋特許歸降順即卡窘迫投誠傅恒尚欲進兵不允所請余察其時勢祗可如此蕆事乃詔許受降即令班師凱旋贊黄閣章服三錫晉傅恒既成功賜以紅寳石頂金黄帶四團龍補以示寵異其後奨賜首功如兆恵等皆視以為例西師兩用兵同心却衆論坐謀無不協用蕆大功建其後征緬甸力請往抒藎猛拱既収服官屯進圍困祗以水土劣兵後多病頓值彼悔罪請爰撤師旅振傅恒攻老官屯晝夜不輟期在必克逆酋畏懼願納欵懇請解圍傅恒却勿許然余念瘴鄉水土惡劣又聞軍士多病不宜久居其地先期諭令撤兵傅恒始奉命還比歸而病入膏肓不可救矣惜哉然因受瘴深兼悔隳功悶遂以永辭世飾終典空綣嗟我社稷臣所期寜在近年少長上聲於余騎箕惜且恨故大學士來保來保侍皇祖二十餘年厯官一等侍衛皇考時改内務府總管余即位授尚書六曺俱遍乾隆十二年擢大學士為軍機大臣二十九年卒於位入祀賢良祠來保性端謹年躋大耋神明不衰老成之度足為庶寮矜式毎詢以康熙年事娓娓可聴而於巡幸行圍諸典尤悉葢其在御前最久也善相馬余嘗作歌以賜亦其餘事之足稱者初供批本職後充侍衛䕶弓矢固所習慤勤更其素止進恒有常不失尺寸處洊陞掌内府亦久䝉恩遇因命長部曺旋贊絲綸布更踐既已深老成遂獨許叶雖無赫赫名却有休休度讀書通大義萬石猶後步欽定八旗通志卷首四
