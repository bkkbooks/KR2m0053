body:
  text: 欽定四庫全書欽定八旗通志卷一百三十五人物志十五大臣傳一滿洲鑲黄旗一養費英東希額亦都魯覺羅拜山佟正雅禪圖什伊偉齊爾登康喀賚超哈爾武善車爾格圖爾格費英東費英東姓𤓰勒佳世居蘇完後𨽻滿洲鑲黄旗驍果善射引强弓十餘石太祖髙皇帝創業之初隨其父蘇完部長索爾果首率所部軍民五百户来歸太祖嘉之授一等大臣尚主有兊沁巴顔者費英東女兄之夫也謀逆費英東擒而誅之初征瓦爾喀部取噶嘉路殺部長阿球降其衆以歸戊戌年正月同台吉禇英等統兵千人再征瓦爾喀取安楚拉庫路圍屯寨二十餘所屬人戸悉招降之丁未年正月斐悠城長苦烏拉侵擾請内附費英東同貝勒舒爾哈齊等遷之盡收其環城屯寨令侍衛扈爾漢䕶五百戸先歸烏拉貝勒布占泰發兵萬人邀諸路兩軍相持未决費英東率師繼至大敗之五月討東海窩集部與貝勒巴雅喇等取赫席赫路鄂謨和蘇嚕路佛訥赫托克索路俘二千人而還辛亥年七月同台吉阿巴泰等取烏爾固辰穆稜二路癸丑年五月從太祖征烏拉同諸貝勒大臣力戰破敵乗勝奪門遂拔其城尋命與何和哩額亦都扈爾漢安費揚古為五大臣佐理國事天命四年二月眀兵四路来侵一軍據薩爾滸山巔費英東率本旗兵進撃破之太祖之征眀取撫順也明兵来援礟驚費英東馬旁逸諸軍不前費英東廻馬大呼揮諸軍並進遂破之太祖拊髀嘆曰萬人敵也從攻葉赫城上矢石雨下太祖命之退對曰我兵已薄城下矣再命之退對曰勢垂克必不退也竟拔其城費英東自少從太祖征討諸國三十餘年身先兵士衝突堅陣當其鋒者莫不披靡性忠直遇事敢言毅然不撓以功授一等子世襲五年三月卒五十有七太祖間之哀慟親臨其䘮太宗文皇帝天聪八年以其子察喀尼襲爵賜勅免死二次崇徳元年追封費英東直義公配享太廟陪𦵏福陵太宗嘗諭羣臣曰費英東見人不善必先自斥責而後劾之見人之善必先自奨勸而後舉之被劾者無怨言被舉者亦無驕色朕未聞諸臣以善惡直奏似斯人也順治十六年世祖章皇帝念佐命勲臣詔晉費英東世爵為三等公康熙九年聖祖仁皇帝御製碑文勒石紀勲雍正九年世宗憲皇帝加公號曰信勇乾隆四十三年上追念費英東忠勛晉世爵為一等公子十人察喀呢見大臣表第六子索海官副都統第七子圖賴官都統功封一等雄勇公皆自有傳額亦都額亦都姓鈕祜禄世居長白山後歸太祖髙皇帝𨽻滿洲鑲黄旗幼時父母為人所害額亦都以隣人匿之得免年十三手刄其仇避走嘉穆瑚地依於其姑居數嵗太祖過其地額亦都識為真主請事太祖白於姑姑止之不可遂從行嵗癸未從太祖討尼堪外蘭於圖倫城先登攻色克濟城掩敵無偹取之又别率兵攻舒勒格布占克其城額亦都驍果善戰挽弓十石能以少擊衆所向克㨗太祖知其能日見信任丁亥年八月命督兵取巴爾逹城至渾河河漲不能渉以䋲聫軍士魚貫而渡夜薄其城率銳卒先登城中兵猝驚起拒跨堞而戰飛矢貫股著於堞揮刀㫁矢戰益力被五十餘創不退卒拔其城而還太祖迎於郊燕勞之其所俘獲悉以賜遂賜號巴圖魯薩克察之入冦也額亦都率數人禦敵敵敗躡之夜入其城進攻連克尼瑪蘭城章嘉城索爾瑚寨功最師還上迎勞如初界藩有科什者以勇聞盜九馬遁單騎追斬之盡返所盜馬嘉穆瑚之貝琿巴顔謀叛附哈逹命討之誅其父子五人以徇癸已年九月葉赫合九國之師来侵太祖陳兵古哷山命額亦都以百騎挑戰敵悉衆来犯奮擊殪九人敵却大兵繼之斬葉赫貝勒布齋九國之師皆潰遂乗勝畧諾賽寨及兆嘉村㑹我軍有齊法罕者戰殁額亦都直入敵陣以其尸還訥殷路者九國之一也其長藪稳色克什既敗歸復聚七寨之衆據守佛多和山命同大臣安費揚古噶葢等以兵千人圍其寨三月下之斬藪稳色克什賜上所乗馬以旌其勞丁未年五月同大臣費英東隨貝勒巴雅喇征東海窩集部有功庚戌年十一月命招撫窩集部之那木都魯綏芬寧古塔尼瑪察四路䧏其長康果哩等十九人師旋乗勝擊取雅蘭路俘萬人而還辛亥年十二月同額駙何和哩等征窩集部之呼爾哈路克扎庫塔城詳見何和哩傳天命二年同大臣安費揚古攻明馬哈丹花豹衝三岔兒堡並克之四年明經略楊鎬率六總兵統兵二十餘萬分四路来侵大貝勒代善出禦明總兵杜松王宣趙夢麟兵於撫順過扎喀闗議駐師僻地以竢太祖太宗文皇帝時為四貝勒謂界藩山有築城夫役急往䕶之宜耀兵向敵以壮夫役士卒之膽不當駐僻地示弱衆議未决額亦都曰貝勒之言是也遂進師界藩㑹太祖帥兵亦至指揮夹撃大破眀兵於吉林崖及薩爾滸山明三縂兵皆歿於陣還破明縂兵馬林於尚間崖劉綎於阿布達哩岡額亦都皆在事有功連嵗太祖親征各部之不用命者若哈達輝發烏拉葉赫以次削平額亦都在行間輒為軍鋒用兵垂四十餘年未嘗挫衂每克敵受賜輒分給將士之有功者不以自私太祖特優遇之當天命建元之初國人有私訴於額亦都者額亦都擅自聴㫁太祖以大臣不應聴受私訴恐一人獨㫁必至生亂因罰額亦都並著為禁令然心知其忠誠寵顧不少衰初妻以宗女後尚和碩公主與費英東等同為五大臣佐理國政累官至一等内大臣受爵一等子天命六年卒於官年六十太祖親臨哭之慟祭𦵏如禮太宗文皇帝天聪八年以其子遏必隆襲一等子崇徳元年追封額亦都宏毅公配享太廟陪𦵏福陵順治十二年建碑墓道晉世爵為二等公雍正十年加公號曰果毅乾隆二十四年五月晉為一等公子十六人車爾格圖爾格伊爾登敖徳超哈爾索渾遏必隆均有傳額森見大臣表覺羅拜山子顧納岱孫莫洛渾覺羅拜山滿洲鑲黄旗人景祖翼皇帝第五弟寳朗阿之曽孫也天命六年從太祖髙皇帝征明攻瀋陽斬其驍将號秃尾狼者眀兵自城南悉衆来戰復斬一副将降其衆既克遼東授三等􅁿車都尉世職天聪元年從攻錦州不下環守之復移師往攻寧逺錦州兵潛出躡我軍後拜山與佐領巴希争先還撃奮戰歿於陣太宗文皇帝親臨其䘮酹酒哭之賜人户牲畜贈三等男子顧納岱襲爵崇徳三年從征明撃敗明兵於山海闗追奔至豐潤又敗之時我軍有出取芻束者為敵所乗顧納岱馳往奮撃整衆以歸至山東敗明内監馮永盛縂兵侯世禄軍攻博平克之晉爵一等男世祖章皇帝順治元年四月顧納岱以䕶軍統領随睿親王多爾衮入山海闗撃敗流賊李自成兵十月復随豫親王多鐸追流賊至陕州賊據山為陣顧納岱與䕶軍統領圖賴率兵馳撃斬獲過半三年二月賊将劉方亮以兵千餘夜窺我營營中有偹出撃敗之於是鑲黄正藍正白三旗兵協力進攻賊騎奔竄遂克潼闗直逼西安叙功加一雲騎尉三月随豫親王徇河南乗勝渡淮四月至揚州與䕶軍統領伊爾都齊等軍於城南獲船二百餘明日合師薄城下七日拔之又敗明帥黄得功舟師于蕪湖貝勒博洛徇蘇州顧納岱破敵王岡村還克崑山攻江隂大兵以紅衣礟撃破其城顧納岱先登移師趨浙江敗明守将水陸兵於平湖收其戰艦進攻嘉興明兵悉衆出戰背城結陣顧納岱與都統恩格圖漢岱等合擊之三戰三捷七月旋師明年叙功晉三等子㑹蘇尼特部騰機思等叛奔喀爾喀顧納岱随豫親王率兵往剿騰機思等遁走分遣䝉古兵追撃敗之於歐特克山復自土喇河西行撃敗喀爾喀兵於查濟布喇克尋以恩詔晉二等子世襲五年随征南将軍譚泰討叛鎮金聲桓至九江大破逆将吴江軍進攻南昌中礟殁於陣䘏贈一等子命其子莫洛渾襲莫洛渾歴官一等侍衛順治十七年授㕘領從安南将軍達素討海冦鄭成功攻厦門力戰死康熙二年聖祖仁皇帝念拜山顧納岱皆陣亡莫洛渾又以戰殁嘉其世篤忠貞特贈莫洛渾爵三等伯立碑墓道謚剛勇無嗣從弟諾爾遜庫特庫分襲世職佟養正子佟圖賴佟養正遼東人其先為滿洲世居佟佳以地為氏祖達爾哈齊以貿昜寓居開原繼遷撫順遂家焉天命初佟養正有從弟佟養性輸誠太祖髙皇帝於是大軍征眀克撫順佟養正遂挈家並族属来歸𨽻漢軍六年從征遼陽以功授三等輕車都尉世職奉命駐守朝鮮界之鎮江城時城守中軍陳良䇿潛通明将毛文龍詐令諜者稱兵至各堡皆呼譟城中大驚良䇿乗亂據城叛佟養正被執不屈死之長子佟豐年并從者六十人俱被害詔以次子佟圖賴襲世職佟圖賴初名佟盛年後改今名天聪五年太宗文皇帝征眀圍大凌河破監軍道張春援兵佟圖賴以從征有功晉二等􅁿車都尉崇徳三年授兵部右􅄁政五年從睿親王多爾袞圍錦州取白官兒屯䑓六年随鄭親王濟爾哈朗復圍錦州取金塔口三䑓七年攻松山城眀人突出騎兵奪我紅衣礟佟圖賴撃敗之又敗山口歩兵克塔山杏山諸䑓遂下其二城論功晉一等輕車都尉始分漢軍為八旗佟圖賴𨽻廂黄旗授正藍旗都統是時軍士多奉命分畧明邊地佟圖賴以為不如深入明境直取燕京乃與都統李國翰等奏言天意歸於聖主大統攸属眀國人心動摇當因天時順人事攻抜燕京控扼山海則萬世鴻基自此而定上以大兵不取關外四城何能即克山海優㫖開諭之八年隨鄭親王取前屯衛中後所二城加一雲騎尉世職順治元年調鑲白旗都統同都統巴哈納石廷柱招降山東四府七州三十二縣七月下太原招降九府二十七州一百四十一縣師還賜白金四百兩尋隨豫親王多鐸𠞰流賊李自成屢破賊衆於黄河岸毁其柵獲賊艦十五遂平河南二年五月軍次江南敗明舟師於揚子江先後攻揚州及嘉興諸府皆下之晋爵二等男賜蟒服黄金三十兩白金千五百兩五年授定南將軍與都統劉之源率左翼漢軍駐寳慶時明桂王朱由榔將馬進忠等犯衡湘辰永間䧟寳慶佟圖賴至擊破其衆進拔其城六年鄭親王率師征湖廣佟圖頼分兵趨衡州所向皆㨗陣斬其總兵陶養用破胡一青等七營兵於城南乗勝疾擊連破之於望公嶺山峪口一青窮竄集潰衆萬餘距廣西全州三十里立六營以自保又破之遂下全州還師駐衡州常寧告警遣佐領陳天謨等馳赴之戰於石鼓洞我兵大勝斬其渠二人八年凱旋賜宴得優賞尋授禮部侍郎復調正藍旗都統叠奉恩詔晉秩至三等子世襲十三年八月引疾乞休世祖章皇帝篤念前勞命加太子太保以原官致仕十五年卒於家年五十有三上聞之輟朝震悼子祭𦵏如典禮贈少保兼太子太保諡勤襄康熙十六年聖祖仁皇帝以追尊孝康皇太后推恩所生特贈佟圖賴一等公爵令其子佟國綱承襲並命改𨽻滿洲雍正元年追封佟養正一等公諡曰忠烈詔祀昭忠祠與佟圖賴並加贈太師明年勅建佟圖賴専祠賜額曰功宗元祀子國綱國維皆有傳雅希禪子訥爾特拉篤渾雅希禪滿洲鑲黄旗人先世居馬佳以地為氏父尼瑪禪當太祖髙皇帝創業時随其兄赫東額率五十餘户来歸任佐領雅希禪随父事太祖立戰功授騎都尉世職列理事十大臣天命四年奉命同大臣額克星格等與喀爾喀五部涖盟還奏稱㫖從征明戰於界藩先衆克敵復撃明縂兵馬林於尚間崖破其中堅晉二等輕車都尉太祖既取遼陽叙功晉三等男沙嶺之役為敵所傷戰弗勝論罪降一等輕車都尉八年隨貝勒阿巴泰征扎魯特攻其貝勒昻安所居寨昻安携其孥乗牛車遁雅希禪與前鋒統領達音布等以兵追之昻安督從者拒戰達音布中創歿雅希禪合兵直前奮撃斬昂安及其子殱其從者俘其孥以歸奏凱分賜所俘獲尋卒年五十有一子三人長㳟衮次訥爾特次拉篤渾㳟衮襲世職獲罪降世職為騎都尉二命與其弟訥爾特分襲之太宗文皇帝崇徳三年授㳟衮刑部副理事官四年從征索倫陣亡部議以㳟衮不遵軍令致為敵所殺應革世職籍其家三分之一上念其父雅希禪功特命宥之以其弟拉篤渾襲世職拉篤渾少隨父兄征戰屡立功崇徳六年隨征眀錦州力戰陣亡䘏贈加一雲騎尉子鄂爾璧襲訥爾特之未襲世職也從太宗征明敗敵於小凌河復由大同入明邊率善射者攻小石城克之既襲騎都尉隨征錦州屡敗明兵於松山杏山崇徳七年任刑部㕘政兼副都統時左右兩翼㑹兵撃松山城松山兵夜遁訥爾特同䕶軍統領鰲拜趨塔山南海岸先敵至蓐食以待夜擊明兵達旦明兵據山巔訥爾特冒矢石率衆仰攻敵敗走復乗勝追躡敵衆溺水死者無算八年随貝勒阿巴泰征眀初入邊敗眀守将進軍渾河築梁以濟明将合兵千餘来拒訥爾特率衆撃走之復敗其援兵於三河縣隨大軍至山東指揮所部兵攻克武定州城旋師将出邊敵刦我紅衣礮訥爾特與都統凖塔還撃破其歩兵二營六月凱旋賜白金五百兩九月隨鄭親王濟爾哈朗征明寧逺明縂兵吴三桂糾衆来禦訥爾特力戰歿於陣時年三十有八晉贈三等輕車都尉以其子訥新襲職順治十二年世祖章皇帝追念舊勲賜雅希禪諡曰敏果立碑墓道圖魯什圖魯什姓伊爾根覺羅世居葉赫後𨽻滿洲鑲黄旗天命九年任佐領追逃牧䝉古獲之十年奉命率士卒往海邊旅順口偵緝冦盜俘獲甚衆授㕘領天聰三年從太宗文皇帝征明先馳至大安口城下覘虛實敵兵覺集衆来攻單騎撃敗之後兵繼至遂克其城大兵由遵化趨北京明兵自薊州襲追圖魯什伏兵邀撃有斬獲時太宗駐營燕京西南城隅令圖魯什與副都統阿山往覘敵兵多寡遇明督師袁崇煥軍獲其諜者知明縂兵滿桂黒雲龍麻登雲孫祖夀以兵四萬人列營永定門之南還報太宗且曰敵兵盛宜及其不虞乗夜襲撃太宗從之夜三皷秣馬蓐食八旗及䝉古兵俱進圖魯什率麾下将士先驅直馳入敵營敵衆大亂大兵乗之遂斬滿桂孫祖夀生擒黒雲龍麻登雲復往偵通州道遇明兵撃敗其衆收獲馬匹乗夜襲敗北門外敵營又於永平擒斬叛将愛塔以功加世職二等輕車都尉四年正月大軍攻永平降其城随貝勒濟爾哈朗等駐兵守之二月同副都統勞薩等偵明邊境敗其堡卒有俘獲三月明将遣兵􅅗至我斥堠所軍行塵起圖魯什率兵四十人往探㕘領巴篤理等以兵繼之圖魯什先至撃敗明副將張洪謨軍追十餘里巴篤理等乗勝掩殺㑹敵出伏兵突擊我軍圖魯什與巴篤理殿後接戰敵遂遁四月師還奉命往視邊墻部兵五十人為三隊㽞居後獨率四騎先至城下猝遇蒙古數十人圍之兩墻間環射之圖魯什奮鬬突出顧所率騎尚䧟圍中一騎已中矢仆復大呼馳入援三騎挟傷者以歸五年八月從征大凌河明兵二千自松山来援圖魯什與都統阿山等撃敗之陣斬百餘人獲三纛還上酌金巵賜之九月攻錦州遵上方畧命營中厮卒摇旗幟偽為明兵来援者誘城中出戰大敗其衆時明監軍道張春以援軍至我兵與戰三日夜春軍渡河圖魯什邀撃敗之是夕上率兩翼騎兵襲春營圖魯什兵先進明兵潰走遂擒張春十月復偕勞薩往錦州松山偵軍事斬明兵執纛奔寧逺者十二人閠十一月追察哈爾兵踰興安嶺獲駝馬鎧甲之委於路者六年從征察哈爾軍次博羅額爾吉圖魯什率精兵五百先徃收䝉古流散户口二百餘人以還上以察哈爾汗遁去命旋師先是上命㕘領延布祿佐領棟山移哈爾占所貯粮於烏蘭哈達延布禄等以調遣失人遲久不至下廷臣會議罪當死上命覆勘諭曰倘情有可矜則釋之衆皆言法不當宥圖魯什奏云曩者上嘗申諭臨陣退縮者斬然間亦䝉恩寛釋今懲延布禄棟山而全其生實惟聖恩上深嘉其議而末減之八年二月畧地錦州為前隊有擒獲功五月擢前鋒統領加三等男世襲六月復從征察哈爾奉命率兵覔市昜所失貨賄獲之七月至歸化城遇察哈爾諸宰桑率千二百戸来降遂挈以朝行在是月毁眀邊墻入大同與侍衛瑚什布等敗眀縂兵祖大弼軍俘斬奏捷畧地至宣化攻懐逺設伏於左衛城敗眀縂兵曺文詔軍閠八月大兵營左衛城東圖魯什往偵宣府單騎先驅遇祖大弼偵卒十五人接戰矢中其腹猶力戰不已我兵至生擒二人餘皆殱之圖魯什被創危篤上親臨視越二日卒賜號碩翁科羅巴圖魯䘏贈三等子世襲世祖章皇帝時追諡忠宣次子巴什泰襲爵官一等侍衛兩遇恩詔進一等伯順治九年三月為謀逆之蒙古侍衛瑣尼刺死詔贈三等侯以其子珠拉岱襲偉齊子穆里瑪偉齊滿洲鑲黄旗人姓𤓰勒佳費英東第九弟也天命十年同侍衛博爾晉等率兵二千往征呼爾哈收獲五百户凱旋上郊勞賜宴並念其父索爾果歸附功授騎都尉世職會䝉古逃亡十户偉齊追之盡俘以歸天聪三年從太宗文皇帝征眀畧地至遵化三擒哨卒明兵犯我師偉齊遮撃數逐北論功晉三等輕車都尉上統大軍出征嘗令偉齊㽞守盛京任八門提督九年命免功臣徭役偉齊與焉並増給佐領人户使之専轄尋卒以第六子穆里瑪襲職世祖章皇帝以偉齊厯事兩朝忠誠素著賜諡端勤視一等大臣例立碑墓道擢穆里瑪一等侍衛順治四年授㕘領屡遇恩詔晉一等輕車都尉又一雲騎尉予世襲五年隨征江西叛鎮金聲桓師至童子渡賊将列陣以拒穆里瑪與㕘領喀爾塔喇等撃敗之復率兵渡河衝撃敗賊衆二千至饒州下其城移師前進賊集步騎二萬追襲同㕘領巴都還撃賊兵郤走我軍攻南昌掘壕圍守聲桓與其偽帥王得仁悉衆拒戰穆里瑪以本旗兵奮勇撲剿連敗賊衆十七年六月擢工部尚書八月授都統康熙二年四川賊李来亨等竄伏湖廣鄖襄山中聚㓂刦掠穆里瑪奉聖祖仁皇帝命為靖西将軍與都統圖海率禁旅會椘蜀之師討之時来亨擁衆據茅麓山穆里瑪督兵攻圍九戰皆捷賊復夜襲縂督李國英提督鄭蛟麟等營穆里瑪分遣諸将先後援勦追斬甚衆来亨勢蹙自焚死招撫偽王侯及偽縂督等官論功超晉一等男世爵内大臣公鰲拜穆里瑪兄也怙勢攬權穆里瑪及大學士班布爾善等私相黨附凡朝政皆就鰲拜家取進止八年鰲拜伏誅穆里瑪坐黨惡營私削爵與班布爾善等並棄市六十年上念偉齊功復以穆里瑪之曽孫察克慎襲騎都尉世職偉齊子七人次子卓布泰第三子鰲拜第四子巴哈皆别有傳康喀賚子鍚納海康喀賚滿洲鑲黄旗人姓瑚爾喀太祖髙皇帝時由新達謨率族来歸㑹初立佐領使統其一屡從征伐天命十一年太宗文皇帝御極八旗各設縂管政務大臣一是為八大臣又每旗設理事聴訟大臣二是為十六大臣康喀賚與舒賽並任鑲藍旗理事聴訟大臣天聪元年正月有䝉古十五人自奉集堡叛逃康喀賚同正白旗大臣阿達海鑲白旗大臣吴拜追至都爾弼十五人還闘吴拜中創不退康喀賚與阿達海併力奮進盡斬之事聞得優賚五年七月始設六部每部以一貝勒總管部務次設承政以康喀賚與䝉阿圖祝世允囊努克並為工部承政崇徳三年七月重定官制每部止㽞承政一員康喀賚遇裁五年十一月授鑲藍旗滿洲副都統尋卒子錫納海天聪九年随睿親王多爾衮征察哈爾招降林丹汗子額哲以還尋選每旗二十人為王府䕶衛錫納海預焉崇徳三年八月随睿親王征明越燕京由臨清直抵濟南五年十一月隨鄭親王濟爾哈朗圍明錦州還鄭親王以錫納海勤幹奏授二等䕶衛㑹父卒襲管佐領六年三月復随鄭親王圍錦州克其外城明縂督洪承疇率兵赴援錫納海同前鋒統領努山偵探至杏山遇哨騎撃敗之擒一人以歸我左翼兵設伏松山北以前鋒兵誘之比至伏發撃敗其援兵錫納海與侍衛喇世塔等自錦州還盛京奏㨗復赴軍襲獲寧逺哨卒世祖章皇帝順治元年隨睿親王入山海闗撃流賊李自成兵二十餘萬賊竄走錫納海率兵追之至望都奮力𠞰撃多斬馘二年叙征錦州杏山及平流賊功予雲騎尉世職遷二等侍衛六年隨鄭親王平湖南凱旋兼任刑部郎中尋授一等侍衛兩遇恩詔晉世職至三等輕車都尉十七年擢鑲藍旗滿洲副都統聖祖仁皇帝康熙元年八月同靖西将軍穆里瑪征鄖襄流賊郝摇旗李来亨等三年會陕西湖廣四川三省兵勦平之斬摇旗来亨遁走茅麓山自焚死十年錫納海以病乞休允之十二年三月卒於家年五十有七賜祭𦵏如例以孫道福色襲世職武善武善姓伊爾根覺羅世居呼訥赫後𨽻滿洲鑲黄旗父噶盖太祖髙皇帝時来歸授理事大臣從征兆嘉城及攻訥殷之佛多和寨取安椘拉庫路俱有功嘗奉命同巴克什額爾徳尼㕘訂國書後大臣滅哈達擒其貝勒䝉格布祿以歸贍養之噶盖與交厚蒙格布禄尋謀逆伏誅噶盖並坐罪死武善其長子也初任佐領尋兼任㕘領天命九年明皮島縂兵毛文龍遣兵渡鴨緑江入島屯田太祖命武善與副都統楞額禮率兵十人撃之途中獲間諜訊知明兵晝則渡江入島收穫夜則還宿江岸遂乗夜進兵􅇓伏山僻平眀度眀兵已渡疾馳至島明将士大驚悉奔潰武善與楞額禮追斬五百餘級敵争舟盡堕水死因焚島中積聚而還既而文龍復遣兵三百登島岸焚我房舎掠牛馬武善同䕶軍㕘領滿都禮等督兵追撃盡奪所掠以歸斬其逰撃一備禦一千縂二太宗文皇帝即位以武善列十六大臣管鑲紅旗副都統事天聪元年上遣諸大臣分兵為三隊畧眀錦州武善同都統阿山率所部為後隊遵上方畧相機設伏防䕶所俘獲還奏稱㫖是年五月授三等輕車都尉世職崇徳元年户部承政瑪福塔以互市往朝鮮義州偵知明兵􅅗入鹻塲遣使馳奏上命武善同吏部㕘政吉思哈率兵馳援撃走明兵三年正月駐守歸化城土黙特部長以喀爾喀扎薩克圖屯兵近地将犯城来告上親統師往征武善與副都統武巴海並從㑹扎薩克圖引遁師還饟米運㽞中途者為武巴海之厮卒盜取武善坐徇隠革世職罷任八月授工部㕘政時瓦爾喀諸䝉古皆𨽻版圖脩職貢凡通使及宴勞每以武善典其事順治元年卒車爾格車爾格滿洲鑲黄旗人姓鈕祜禄額亦都第三子也幼從太祖髙皇帝於軍中屡建功績授騎都尉世職晉三等輕車都尉奉命征東海瓦爾喀部大勝凱旋太祖親出郊宴勞之又念其父勲晉爵三等子太宗文皇帝即位設八大臣車爾格與焉分理鑲白旗事天聪元年随大貝勒阿敏等征朝鮮其國王李倧慴服願効職貢乃與共盟而還二年五月隨貝勒阿巴泰等畧明錦州松山俘獲甚多五年七月授刑部承政尋遷兵部七年八月命同刑部承政索海往偵眀邊隘至錦州斬七人生擒把縂一人兵九人来獻十月明廣鹿島副将尚可喜遣吏納欵車爾格奉命率将士往招之明年二月自廣鹿島馳䟽言可喜統集廣鹿長山二島男婦三千餘来歸因道逺需乗騎於每佐領下有四馬者撥二馬給之即日啓行遂與俱至崇徳二年四月隨武英郡王阿濟格等攻皮島師還以屡違軍令又為阿濟格索獲婦女于睿親王多爾衮論罪削職罷任三年七月起授工部左㕘政五年二月擢户部承政八年考滿復授騎都尉世職世祖章皇帝定鼎燕京恩詔加一雲騎尉順治二年二月卒子法固達襲職長子辰泰第五子拉哈達各有傳圖爾格圖爾格宏毅公額亦都第八子也自少隨征積功累爵至輕車都尉天命十一年太宗文皇帝即位八旗八大臣下毎旗各設二人偹屯戍决獄訟號十六大臣以圖爾格任鑲白旗尋遷都統又念其父勲晉爵子天聪三年十一月從太宗伐明克遵化城四年二月班師命貝勒阿敏等守永平而以圖爾格同都統納穆泰率兵守灤州五月眀合兵攻灤州與納穆泰分汛固守間簡精銳出城殺敵敵轉攻納穆泰所守汛圖爾格急遣阿玉什分兵往援㑹火及城樓有執纛者乗雲梯登阿玉什揮刀斬之奪其纛敵却時阿敏聞灤州被圍不急救及遣大臣巴都禮率兵數百来援夜三鼔突圍入城而城已垂破未㡬明兵發巨礟攻城城壊城樓焚圖爾格度力不能支率衆潰圍奔阿敏軍阿敏大驚棄永平遁諌之不聴殿後全師而還於是議棄永平罪以不能力諌削世職觧都統任五年五月我師攻明錦州令率䕶軍駐錦州松山間夜截明兵之赴松山者斬首二十級敵敗從之我軍有星訥者堕馬敵還取星訥圖爾格從三十騎馳之翼之出是月聞明人将城大凌河命同納穆泰往覘之俘其人畜以歸七月起為吏部承政八月從太宗攻大凌河分圍城東靣之北城中兵突出犯我南礟䑓圖爾格不及騎徒歩撃走之十月畧松山八年三月畧錦州並有功是年五月太宗伐明入大同命同副都統勞薩率兵駐張古䑓河以扼敵師九年二月命率左翼兵從貝勒多爾衮等往招察哈爾降其長額哲六月還兵畧明山西分兵三隊為軍鋒自平魯衛入毁寧武躪代州乗勝至忻口遇伏敗之追至崞縣殱其衆還經平魯衛衛兵邀我師于途親䧟陣殺敵百人敵遁走入城不敢出圖爾格䇿敵必復至設伏以待而身為之殿明錦州縂兵祖大夀合大同縂兵王某率兵三千来追返兵用歩戰衝其中堅伏起夹撃大敗之乃徐引兵出邊十年二月叙功授一等男崇徳元年五月復任鑲白旗都統是年随武英郡王阿濟格攻克明昌平雄縣並先登二年閠四月以罪黜初圖爾格尚和碩公主公主所生女為貝勒尼堪福晋福晋無子詐取僕女為女至是事敗圖爾格亦坐罪論死得㫖免削職二年八月仍令攝都統事三年十月随多爾衮伐明破太監馮永盛總兵侯世禄兵復同都統拜音圖敗敵於董家口毁邊墻入奪青山闗下四城五年七月随多爾衮圍錦州取其禾連破錦州松山兵又同都統葉克書率兵三百伏烏忻河口伺錦州牲畜出牧駈之歸敵衆千餘来戰葉克書馬中箭蹶敵人将兵之圖爾格射敵敵殪救之上馬併力衝殺敵敗復合凡六戰六勝身被二十餘創猶殿後力戰悉保所俘而還十月晉爵子尋擢為内大臣六年八月經畧洪承疇率兵十三萬援錦州太宗親征既敗承疇兵命隨阿濟格邀撃明敗兵於塔山時明縂兵曺變蛟吴三桂王樸等各引本部兵遁而變蛟兵夜衝鑲黄正黄兩旗汛地突犯御營時守營右翼大臣及侍衛等皆未至圖爾格發矢連殪二人率衆軍併力攅射變蛟兵始敗去又随豫親王多鐸設伏敗吴三桂王樸兵於髙橋七年十月同饒餘貝勒率師伐眀直抵山東兖州府俘明魯王朱以派及樂陵陽信東原安邱滋陽諸王並各王府宗室官屬㡬千人下三府十八州六十七縣八年六月班師賜銀千五百兩十月晉爵二等公順治二年二月卒年五十以子科布梭襲九年六月追謚忠義配享太廟立碑墓道雍正九年賜公爵號果毅伊爾登伊爾登滿洲鑲黄旗人姓鈕祜祿額亦都第十子也幼時太祖髙皇帝撫之宫中及長任侍衛屡從大軍征討天命初築界藩及薩爾滸諸城有勞績賜蟒服八年授世職三等輕車都尉累功晉三等男太宗文皇帝嗣統列十六大臣佐理鑲白旗事尋奉命駐防邊界天聪三年九月率兵剿獐子島獲船四沉之俘其人以歸十月從上征明隨貝勒阿巴泰阿濟格攻克龍井闗堕其水門入斬明将易愛王遵臣盡殱其衆復攻遵化敗明山海闗援兵斬其将趙率教士月随大軍征明薄燕京克永平灤州遷安等城師旋晉爵一等男會其兄都統圖爾格鎮灤州以失守罷任命伊爾登代為都統五年八月攻大凌河城伊爾登與各旗都統分受方畧即率本旗䕶軍圍其東面之南環伺以困之卒破敵兵明年上親征察哈爾命與貝勒阿巴泰等㽞守瀋陽七年六月上以征明及朝鮮察哈爾三者何先諭諸貝勒大臣各抒所見時上㽞八旗諸軍興屯明山海闗外地於是諸貝勒大臣奏曰明吾讐也用兵宜先今㽞重兵以稽時日彼必有偹矣伊爾登曰與其頓兵闗外不若徑入内地視其城有可取則取之多率歩兵偹梯牌以為攻具乗機摧䧟何城不克况蓄銳已久人有戰心及是時而用之所謂事半而功倍也明日上命伊爾登率左翼随貝勒岳託等取眀旅順口俘獲人戸牲畜噐用財賄無算旋與都統葉臣率兵二千五百駐守之八年上征明分兵入尚方堡伊爾登復奉詔與貝勒阿巴㤗正白旗都統阿山率兵由巴顔朱爾格入龍門會大兵於宣府敗明歩騎兵獲馬百餘進攻靈邱縣及保安州皆有功是年冬前鋒統領巴竒蘭等出征黒龍江虎爾哈部伊爾登與都統納穆泰達爾漢葉克書葉臣阿山色勒篇古八大臣簡士卒閱噐械集諸将宣讀勅諭而送之先是衆大臣奏諸王旗纛事畢将退伊爾登曰公等不勤國事乃急爾私事遽拂衣行乎既而衆大臣集於禁門外伊爾登又曰日者諸王謂八旗都統為不及古大臣於時伊爾登兄圖爾格為吏部承政矣會諸王令圖爾格與䕶軍統領楊古利入奏事衆都統以圖爾格為曽獲罪也而非議之伊爾登不悦篇古曰爾以兄為無罪耶伊爾登曰汝軰殊可厭皆幸禍之流耳於是衆都統悉以其言訐之法司崇徳元年伊爾登下法司勘訊坐䜛謗諸王及大臣論罪削一等男爵觧都統任仍罰鍰尋随豫親王多鐸征朝鮮既還復隨武英郡王阿濟格攻皮島以不俟旗纛輒先渡江坐罰鍰三年復任䕶軍統領四年春武英郡王阿濟格征眀攻燕京伊爾登率兵略地以三十人敗敵千人獲其馬上親統大軍征明攻松山杏山城我前鋒軍偵知明縂兵祖大夀内監髙起􅇓以兵二千迎戰我軍既設伏伊爾登率兵四十人誘敵追襲發伏還撃大敗敵衆六月命為議政大臣尋兼内大臣六年六月隨鄭親王濟爾哈朗圍錦州明縂督洪承疇以師赴援立營松山西北鄭親王令右翼兵擊之失利乃據乳峯山以保兩紅旗與鑲藍旗駐營地為敵所奪都統葉臣等斂兵不進獨四旗䕶軍恭順王孔有徳與䝉古敖漢奈曼察哈爾兵及伊爾登所領侍衛與戰伊爾登先右翼軍突入敵陣陷重圍身中數創所乗馬死易馬負傷再戰益奮凡三易馬四戰皆㨗太宗嘉嘆復三等男世爵予襲八次賜白金四百兩八月上陳師松山杏山間命偕超品公塔瞻率八旗䕶軍㕘領先赴髙橋設伏方出營遇明歩兵之自杏山潰遁者千人撃斬之遂至髙橋復遇杏山歩騎兵六百餘南奔塔山發伏盡殱其衆上移營近松山夜有松山敗軍突犯御營伊爾登與内大臣宗室錫翰整兵拒戰奮勇撃殺敵兵敗遁命侍衛大臣之踈防與不能力戰却敵者各輸罰鍰以賚軍士伊爾登得優賞順治元年世祖章皇帝定鼎燕京論功進一等男三遇恩詔累晉二等伯世襲十三年以年老致仕上念伊爾登為宣力老臣命上駟院給乗騎入朝每至必召見賜食又圖其像二一蔵内庫一予其家康熙二年疾卒賜祭𦵏如典禮諡曰忠直孫噶都襲爵官至鑲黄旗蒙古副都統領侍衛内大臣超哈爾子額赫哩超哈爾滿洲鑲黄旗人姓鈕祜禄額亦都第十三子也少從太祖髙皇帝征伐授佐領太宗文皇帝天聪八年以克副任使予騎都尉世職九年同佐領納海巴雅彰屯等齎書赴喜峯口潘家口董家口諸處諭明守邉将吏還遇戍卒邀戰擒斬百餘人擢䕶軍㕘領崇徳元年隨武英郡王阿濟格征明将入邊遇敵哨卒迎拒超哈爾撃之擒二人獲馬四至燕京城北奪取紅衣礟敗敵兵百餘轉戰至盧溝橋再與敵遇皆敗之二年列議政大臣三年七月授禮部㕘政九月隨睿親王多爾衮征明由青山口入邊㑹師涿州超哈爾分率所部攻任邱縣指揮軍士穴地道隳其城趨趙北口明兵毁橋梁我師不得渡乃自河西乗馬襲敵後大敗敵衆遂畧山東克濟南府明年春旋師出邊超哈爾殿敗敵於太平寨五年轉兵部㕘政六年隨鄭親王濟爾哈朗圍明錦州城内兵出戰超哈爾撃敗之追入其郛力戰殁於陣年四十有一上聞之軫悼賜白金六百一十兩晉世職為二等輕車都尉以其長子格黒禮襲世祖章皇帝順治十二年追諡超哈爾曰果壮視一品大臣例立碑墓道額赫哩超哈爾次子也初任佐領順治二年格黒禮卒額赫哩襲職五年以㕘領隨鄭親王濟爾哈朗征湖廣至荆州撃敗流賊一隻虎兵復與㕘將博爾輝迢躡偽侯郭姓撃敗之七年凱旋先是京師五城設滿洲理事官至是以額赫哩任中城明年遷都察院理事官三遇恩詔晉爵至二等男九年奉命率兵五百赴江寧駐防會平南将軍金礪以海賊鄭成功抗據海澄縣請増兵進剿上命撥江寧杭州兵各五百令額赫哩合所部兵同㕘領烏庫理等統之赴福建至則賊兵千餘踞海崖毁橋拒戰額赫哩與金礪率兵進擊大敗賊衆遂攻海澄鄭成功率賊十餘萬奪我紅衣礟額赫哩同金礪連戰皆捷復擊敗其餘賊撫降甚衆十二年擢兵部侍即叙擊敗海賊功晉爵一等男十六年鄭成功糾衆突犯江南䧟鎮江逼江寧給事中楊雍建䟽劾樞臣踈於運籌致賊狂逞額赫哩坐降級㽞任明年甄别部院諸臣上以額赫哩於部務弗任勞怨命觧任降爵三等男授光祿寺卿尋改通政司通政使康熙二年遷副都御史五年復任兵部侍郎七年擢工部尚書十年卒賜祭𦵏如典禮以其子英素襲爵欽定八旗通志卷一百三十五
