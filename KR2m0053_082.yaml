body:
  text: 欽定四庫全書欽定八旗通志卷六十八土田志七土田數目內府莊園數目直宗室莊屯數目畝八旗給地總數𨽻各處八旗地數目山奉天各處八旗地畝數目數採捕場臺站地畝附井田目內府莊園數目順治初定鼎燕京近畿百姓帶地來投願充納銀莊頭者各按其地畝為納銀莊頭後有願領入官地畝設莊納銀亦為納銀莊頭帶地來充者為投充人單身投充願領地納銀者每人給一繩地四十二畝為一繩為繩地人納蜜納葦納棉納靛者為蜜户葦户棉靛户坐落順天永平天津保定宣化所屬州縣及喜峰口古北口外等處鑲黃旗四十四莊帶地投充人及繩地人共投一百五十八名蜜户八名葦户六名共地二千三百六十八頃有竒後定為大莊一百五十九所半莊五十九所園三十二所共地四千三百八十六頃正黃旗四十七莊帶地充投人及繩地人共六十三名蜜户十有八名葦户一名共地一千三百九十九頃有竒後定為大莊一百四十六所半莊五十四所園二十九所共地四千一百二十三頃正白旗四十一莊帶地投充人九十三名蜜户十有二名共地一千九百八十八頃有竒後定為大莊一百五十三所半莊五十八所園三十九所共地四千二百七十九頃帶地投充人各帶地畝多寡不一計地三千三百頃九十八畝零繩地人計地三百五十二頃四十五畝均每畝徴銀三分草一束蜜户計地二百八十九頃六十三畝零每六畝徴蜜五斤交納官三倉雍正六年準蜜户所交蜜除官三倉呈明足用外其餘每畝折銀五分交廣儲司庫葦户計地一百四十九頃八十二畝零按地肥瘠每畝徵銀一分至八分不等除每年額徵蘆葦四萬餘斤抵折銀兩外其額徵銀五十二兩零交廣儲司棉靛户共地三十四頃七十二畝每棉丁徴棉花五十斤靛丁徴水錠百斤交廣儲司乾隆五年議棉靛户之地畝鹻薄不堪種棉種靛準照投充人之例每畝徴銀三分草一束銀交廣儲司草交會計司又菜園瓜園順治初年定每內管領下菜園頭二名瓜園頭一名輪班交納菜蔬瓜實後立菜庫在康熙三十三年定菜園頭為六十名每名給畦地一頃八十畝無畦地則每畝折給旱地五畝每名旱地九頃除暢春園奉宸苑種菜各用園頭一名外其餘五十八名隨時交納鮮菜按菜園頭六十名中二十五名係畦地三十五名係旱地乾隆四年奏準畦地照舊供菜旱地折銀交廣儲司安肅園頭四名専納白菜瓜園頭三十名給地與菜園頭同嵗納瓜茄諸蔬又承種雲南西瓜園頭二名各交西瓜一百投充西瓜園頭四名各交西瓜一千又果園順治初年定順天保定河間永平等府屬設果園一百三十六所共陳丁七百有五給養贍家口地二百七十一頃二十畝零每丁嵗徴銀三兩盛京陳園丁三百五十有一廣寧陳園丁一百十有七每丁嵗徴銀三兩近畿新園一百二十一所携地來投共八百七十頃四十七畝零每畝徴銀五分嗣於南苑設果園五所在康熙十二年各給地一頃十有九畝外各給養贍家口地二頃十畝嵗納各種桃李不徴地畝錢糧尋又以新陳各園頭等子孫繁衍將入官地畝增設新園二十六所各給地五頃計地一百三十頃每嵗按畝徴銀一錢如遇水旱一例豁免在雍正二年又盛京增新丁八十四名每丁徴銀三錢六分廣寧增新丁三名每名徴銀四錢二分共徴銀三十一兩有竒又營造司設灰軍煤軍炭軍各以地三十五畝編為一丁其草子匠各以地四十二畝編為一丁灰軍及草子匠共地一百八十九頃二十一畝每七畝徴銀二錢一分草七束銀交廣儲司草交會計司煤軍及草子匠共地一百八十八頃五十一畝炭軍地一百八十四頃八十畝徴銀皆與灰軍同每地六畝交草七束以上各設千總二人把總四人外郎四人即於三項軍丁內選補每人各給地三十五畝免其賦又長夫三旗佐領下人每地三十畝為一丁每十二丁編長夫一名內管領下亦三十畝為一丁每八丁編長夫一名每夫每月納銀二錢一分零三旗共編長夫二百五十八名每月納銀五十六兩零運送物件即動用此銀雇夫又園户匠役景山瀛臺靜明園南花園每名給養贍家口地六十畝其餘各園給地三十畝功德寺園頭一名花匠二名種花地二十畝豐臺園頭一名花匠二名種花地六十畝將容城房山等縣取租地二十頃分給二處園頭備辦正陽門外三里河金魚池投充園頭一名長工二名每名給地六十畝有闕以其子弟充補又南苑苑户每名給地二十八畝湯山苑户每名給地三十畝南苑海户每名給地二十八畝凡南苑海户二千二百名後裁去千户二名總甲十名小甲四十名門軍四十五名海户五百零三名原給之地悉行撤回總甲每名增地三十二畝小甲及巡青海户每名增地十二畝尚餘地八十八頃八十八畝仍為羊草地其牆外馬道及通州等處退出地七十四頃交與户部令州縣徵收錢糧又沙河氊匠司匠內頭目二十名各給官地一畝二分其餘匠役各給官地一畝均令新舊交代相承為業順治十八年奏準將帶地投充新丁分為三旗共計一千三百七十丁現今實在一千二百二十七丁每丁有地自三十畝至四十二頃不等共地一千七百七十二頃二十四畝零內有水田二百四十一畝零每水田六畝徴銀一兩五分旱地六畝徴銀三錢五分再籍沒入官無地牲丁三名各徴丁銀二兩每年共徴銀八千八百八十五兩零均催交廣儲司內有納牲者按則折銀準抵正賦有被水者俟報到具奏停其徴收有衝壞溝渠不能耕種水田尚可改種旱地者停其水田之賦照旱地徴收衝成溝渠不能耕種者將應徴之賦暫徴收均於每年秋收後委官察驗稻田莊共水田二十五頃十有五畝旱地二頃八十八畝坐落涿州房山玉田等州縣豆糧六莊計地四百九十二頃八十六畝坐落武清縣康熙八年題準將各莊編為一二三四等每十年編一次九年奏準於附近莊頭內選四人於南苑安設四莊每莊給地十有八頃十二年奏準南苑增置莊一所又奏準房山縣設稻田莊一所計水田二頃八十四畝玉田縣設稻田莊一所計水田六頃六十畝旱地一頃二十畝又奏準安設瓜園菜園除額給地外並豫養家口地一百二十畝牛四頭蒲簾一百二十五秫秸三千五百束均免差一年二十一年奏準涿州設稻田莊一所計水田七頃八十畝旱地一頃六十八畝又議準盛京糧莊所納糧米給與三旗人丁口糧外餘於該莊作窖收貯二十三年奏準山海關外莊頭每十年委本司官前往編定等次又奏準暢春園內餘地及西厰二處種稻田一頃六畝令附近之莊頭壯丁每年輪種給與石景山等處地十有一頃三十四畝四分以為耕種稻田之資二十四年設立糧莊每莊給地十有八頃舊例每莊壯丁十名選一人為莊頭給田一百三十晌場園馬館另給田四晌壯丁蕃衍則留于本莊缺則補足給牛八頭量給房屋田種口糧器皿免第一年錢糧至是設糧莊每莊地三百晌其頭等二等莊頭不準給牛又山海關內古北口喜峰口外糧莊每一所納糧百石此名斤石每石合倉石三石六斗每百石合倉石三百六十石山海關外糧莊每一所納糧百二十石合倉石四百三十二石二十五年定莊田報災之例凡莊田報災定例於七月二十日以前莊頭呈報會計司委員察勘於定額內酌量豁免至是題準莊頭報災勘災得餘剩好地六十五晌以下者給與養贍家口六十五晌以上者照舊當差二十六年題準於納銀二百之莊頭內改立糧莊增壯丁為十五名三十年奏準各莊頭收存之糧核明實數或十莊或五莊收聚一處擇殷實之莊作窖收貯三十四年奏準歸化城安設皇莊十有三所各給地十有八頃於各莊頭子弟及殷實壯丁內選充莊頭每莊嵗徴米二百石由歸化城都統徴收貯本處旗倉四十五年奏準捕牲烏喇地方於蜜户內簡選五人安設皇莊五所每莊定壯丁十四名給以牛具令其開墾四十八年令莊頭地畝不足額者準其補給薄鹻沙壓者準其換給五十年定糧莊納糧之數山海關內古北口喜峰口外頭等莊報倉石二百五十石二等莊三等莊遞減三十石末等莊報一百二十石每石折小米五斗五十一年定山海關外頭等莊報倉石三百二十二石二等莊三等莊遞減三十石末等莊報一百九十二石又定領種入官地畝莊頭四名每名報糧七十石帶地納糧莊頭一名報糧六十四石又奏準豐臺安設菜園十有一所除給地外並豫鑿井六口牛四頭房三間五十五年定給莊頭頂帶之例莊頭內當差四五十年不欠錢糧者給八品頂帶二三十年無欠及年老不能當差者均給九品頂帶舊例賞罰於額外多納一石者賞銀四錢多者賞馬匹端罩缺額一石者責二鞭鞭不過百後此例皆停又奏準盛京莊頭每十年委本司官前往編定等次五十七年奏準各州縣莊頭子弟內簡選十五人於駐馬口外彌陀山等處安設皇莊十有五所各給荒地十有八頃令其墾種六十年議準涿州入官稻田三頃令附近莊頭承種雍正元年諭山海關內莊頭等所欠陳糧俱令豁免所欠新糧限三年內交完尋內務府議定一二年內全完者賞給品級及加級有差三年不完者罪之又奏準山海關外莊頭等次改令錦州副都統編審造册送府停止司官前往二年定莊田勘災例以被災地畝編作十分按分數免差仍計口給糧有揑報者罪之三年令口內莊頭交倉所餘之糧折銀交廣儲司口外莊頭糧米運交熱河倉其雜糧秫秸等項亦折銀交廣儲司又奏準山海關外一等莊給地五十四頃二等五十一頃三等四十五頃四等三十九頃如有不足額者將各莊餘地補給其餘地畝令地方官召民耕種輸租户部又奏準功德寺水田七頃四十四畝甕山水田八頃十一畝所得稻已敷一年之用留此二處官種外其六郎莊等處應租與附近居民計六郎莊水田五頃四十八畝旱地三頃七十五畝北塢水田九頃三十七畝旱地一頃八十八畝蠻子營水田十頃旱地一頃二十五畝黑龍潭水田五頃三十一畝旱地五十四畝石景山水田四頃八十二畝功德寺頭圈水田一頃三十五畝旱地一頃八十七畝甕山旱地一頃一畝六郎莊房基地十五畝荷花池四畝功德寺房基地九畝荷花池十二畝各有竒泄水河荷花池一區甕山荷花池一區並分别徴租有差六年奏準將豆秸七十二莊均改為半莊并入現有半莊共計半莊一百七十有一又議準向來各莊但有居住村名地畝數目未載四至令內務府司官會同户部及地方官逐一丈量各造四至清册三本分貯內務府户部直𨽻總督衙門以偹察核又奏準駐馬口外彌陀山等處十有五莊每莊嵗納米二百倉石由右衛將軍徴收貯該處旗倉七年議準丈量口外莊頭等原額地畝並自墾地畝甚屬過多且不畫一將現在頭莊各給地三十九頃所餘之地共二千九十頃五十二畝按每莊三十九頃之數於莊頭子弟及誠實壯丁內選五十三人增設莊五十三所又奏準將房山縣入官稻田七頃九十五畝增設莊一所又奏準關內三百二十二莊內定為一等五十七莊二等十有六莊三等三十八莊四等二百十有一莊口外一百三十八莊均定為一等十三年定承催官奬勸例六年全完者加一級三年全完者紀録按承催官于乾隆元年停止至四年復設又奏準各等莊頭四等升為三等三等升為二等二等升為一等原有頂帶者各加一級無頂帶者以次賞給九品從八品正八品頂帶初次降等有頂帶者褫革無頂帶者鞭八十二次鞭一百三次鞭一百革退莊頭乾隆元年奉旨盛京編審莊頭等次著內務府司官會該管官辦理二年奏準歸化城十有三莊墾地二千六百餘頃每莊各給六十頃外尚餘地一千九百餘頃交地方官募民耕種輸租户部四年奏準菜園瓜園地亦照莊地丈量四至造册存案又奏準凡投充人等所帶地畝如有薄鹻沙壓者委官勘實準其退出暫交地方官召民耕種輸租户部其附近處有可補之地照數補給如無可補之地即按其現有地畝交差八年奏準自康熙二十三年編審等第以來凡地畝寬裕者皆已陸續升等加差若仍照例編等必至有名無實應停止十年編等之例九年議準德勝門外向有荷花池一區每年僅徴銀四十五兩今勘得內有稻田九十四畝旱地三畝荷花池七十六畝蒲池五十四畝共應徴銀八十兩有竒嵗入奏銷又德勝門內銀錠橋西所有稻田三頃向屬本苑管理後因地勢髙窪不等難以耕種所有房屋交房租庫管理年來挑挖河道疏濬順利業經栽種荷花已成荷池除房租仍聽房租庫收租外所有荷池地畝應仍歸苑管理以昭畫一又覆準燕郊及白澗桃花寺隆福寺四處行宫各置千總一人兵八名應得俸銀俸米除燕郊一處仍於本佐領關支外其白澗等三處官辨俸銀於佐領下關支俸米則各於附近撥地九十畝給抵其四處兵丁每兵月餉五錢外亦各於附近給地六十畝以抵月糧十年覆準燕郊白澗桃花寺隆福寺盤山􅡹髻山蟠龍山今大興莊三家店八處看守行宫之千總畫一每人歲給俸銀六十兩又撥給官地九十畝所有馬乾俸米一併裁汰此八處兵丁各給官地六十畝每月給餉銀一兩又奏準國初以來附近耕種地畝自二三十頃至四五十頃不等嗣後此等地畝如莊頭係子孫兄弟及族人承種者不必議減外其欠糧或緣罪革退及絶户以異姓承種者均以十八頃為一分九頃為半分餘地足十八頃九頃者增設大莊半莊竒零不足數者交地方官召民耕種輸租户部十一年議奏石槽懷柔密雲瑶亭四處行宫照燕郊等處之例各設千總一人照例給地九十畝嵗給俸銀六十兩至於兵丁除盤山十二名燕郊等皆八名瑶亭六名均毋庸議外惟懷柔羅家橋現兵各五名應各增一名密雲現兵六名應增二名照例給豫地畝月餉奉旨羅家橋懷柔縣行宫不必增設兵丁將所議增設之二名增與瑶亭行宫又奏準専設暢春園西厰莊頭除舊給石景山地十有一頃三十四畝四分外將附近州縣入官地增給六頃六十五畝六分以足十八頃之額十二年覆準口外行宫千總嵗支俸銀及撥給官地尚與口內千總不甚相殊而委署千總每名給地九十畝月支餉銀五錢兵丁每名給地六十畝而月支餉銀或多或少或有或無參差不一今酌定千總每月餉均增為一兩兵丁均增為五錢至巴克什營一處千總應改𨽻熱河總管照例給地九十畝嵗俸六十兩以昭畫一十三年議準瀛臺麥田每年委附近莊頭一人辦理又奏準宣化府不足之莊地十有八所除應納錢糧只按現在畝數徴收外嗣後有報水衝沙壓者內府官會同地方官勘實召民承種輸租户部十七年議準司屬東安武清之雀户被水淹沒地四十九頃有竒自乾隆六年以來均由司委官前往會同地方官察看惟有乾隆十年勘出水涸淤地六十六畝有竒業已升科餘年並未察出徒滋紛擾嗣後停止委官交户部轉咨直督於每嵗秋成後飭地方官勘明報府再宛平縣尚安村雀戶水田被水衝壞溝渠水淹成溝難以耕種田九十五畝堪種旱地二十四畝嵗委催長一名察勘以杜隱匿三十五年定莊頭承種額撥官地不準藉稱薄鹻沙壓退交兑換其有誤差不能承充莊頭者內務府大臣查勘確實另派莊頭承種四十七年奏準內務府所屬莊園人等承種官地如遇旱潦災歉俱照民地之例一分至四分者不準報災其分給口糧之處槩行停止以上內府莊園數目宗室莊屯數目國謹案王勳戚及八旗臣工俸糈之外既初諸賜園地復按所屬壯丁撥給晌畝遇有旱潦隨時豫數賜賑澤至渥矣故前卷既載規制兹復以纍年給目開具於後鑲黃旗宗室整莊四所半莊一所園一所共地六百一十晌坐落大興通州武清平谷河間各州縣正黃旗宗室整莊五所半莊十二所莊四所園三所共地一千七百七十六晌坐落大興宛平三河寶坻順義涿州房山保定雄縣易州任邱各州縣正白旗宗室整莊四所莊一所園二所共地六百晌坐落順天香河通州寶坻房山及沙河所等處正紅旗宗室整莊一百四十五所半莊三所整園五十所半園十所園四所共地二萬七百三十六晌零坐落順天宛平昌平涿州文安保定定興淶水及遼陽海城蓋平各州縣鑲白旗宗室整莊一百七十八所半莊五所莊八所整園八所園二十所果地靛地網户獵户等地七十六處共地二萬八千六百一十九晌零坐落大興宛平良鄉固安永清東安香河通州三河武清寶坻昌平密雲懷柔房山霸州薊州玉田平谷遵化豐潤遷安灤州樂亭保定易州河間任邱滄州保安及遼陽海城蓋平鐡嶺山海關外等處鑲紅旗宗室整莊二百九十八所半莊二十三所莊五所整園一百十一所半園二所共地四萬三千八百三十五晌坐落大興宛平永清香河通州寶坻昌平涿州房山霸州灤州新城河間肅寧滄州延慶及張家口外等處正藍旗宗室整莊五百四十四所半莊一百五十一所莊二十二所整園一百三所半園十九所園七十三所果菜牧地五處共地八萬八千五百五十四晌零坐落大興宛平良鄉永清東安香河通州武清昌平順義懷柔涿州房山霸州保定薊州玉田平谷遵化豐潤永平昌黎灤州樂亭新城易州青縣無極保安及承德遼陽開原錦州寧逺廣寧開平冷口外等處鑲藍旗宗室整莊二百三十一所半莊六十三所莊九所整園一百二所半園二所園三所共地三萬七千五百七十九晌零坐落大興宛平固安永清東安昌平懷柔灤州蠡縣安州髙陽及遼陽海城蓋平錦州開平等處以上宗室莊屯數目欽定八旗通志卷六十八
