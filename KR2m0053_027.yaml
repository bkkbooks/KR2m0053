  text: 旗分志十三八旗佐領十三鑲紅旗滿洲佐領佐領管領分管鑲紅旗包衣鑲紅旗滿洲佐領下四參領至五參領第四參領第一佐領係國初以完顔地方來歸人丁編立始以博爾晉管理博爾晉故以其孫護軍參領羅多理管理羅多理故以博爾晉次子順托輝管理順托輝故以其弟都統議政大臣兼阿思哈尼哈番漢文稱男特錦管理特錦故以順托輝之子護軍參領恩特赫管理恩特赫病故以其子額世吞管理額世吞因病告退以博爾晉之三世孫護軍統領噶爾璽管理噶爾璽故以其子喀什金管理喀什金故以其弟倭克金管理倭克金故以其子德紳管理第四參領第二佐領係第一佐領內餘丁康熙六年特錦管佐領時分出一佐領以其子二等阿思哈尼哈番兼驍騎參領特爾赫管理特爾赫故以其子三等護衛額勒倫管理額勒倫故以博爾晉之三世孫二等阿思哈尼哈番兼散秩大臣副都統額爾德管理額爾德緣事革職以博爾晉之三世孫三等護衛阿爾圗管理阿爾圗故以其子福海管理福海故以其子德敏管理第四參領第三佐領亦係國初編立始以五大臣銜侍衛西喇巴之長子噶祿管理噶祿故以其弟都統馬喇喜管理馬喇喜故以其弟法衣丹大漢文稱王府長史塔爾布管理塔爾布年老告退以其子占布管理占布因病告退以其子僧保管理僧保故以其子榮華保管理榮華保緣事革退以其叔祖之子驍騎校兼副佐領康色立管理康色立故以凖提保管理凖提保故以其叔祖之二世孫海明管理海明升任以其子永寧管理永寧革退以其叔祖之二世孫舒敏管理舒敏故以其伯髙祖之二世孫德齡管理第四參領第四佐領係第三佐領內餘丁康熙四年塔爾布管佐領時分出一佐領以噶祿之子傅當阿管理傅當阿故以其叔父薩穆岱之孫筆帖式章鼐管理章鼐緣事革職以其弟二等侍衛伍爾敦管理伍爾敦故以噶祿之二世孫巴哈布管理巴哈布故以其子六格管理六格故以其子武爾敦額管理武爾敦額故以其弟珠爾杭阿管理珠爾杭阿故以其子興安管理第四參領第五佐領亦係第一佐領內餘丁康熙二十三年恩特赫管佐領時復分出一佐領以博爾晉之三世孫汪素管理汪素故以其弟二等阿達哈哈番兼前鋒侍衛阿柱管理阿柱故以其兄侍郎羅查管理羅查調任右衛副都統以其子員外郎羅音泰管理羅音泰升任四川布政使以其兄之子廕生富昌管理富昌故以其子富盛阿管理富盛阿革退以其叔曽祖之孫德成額管理德成額革退以其叔髙祖之四世孫額通阿管理第四參領第六佐領係第二佐領內餘丁額勒倫管佐領時分出一佐領以其兄工部員外郎額世倫管理額世倫因病告退以其子一等阿達哈哈番額爾夀管理額爾夀故以其子額勒沖額管理額勒沖額故以其子伊興阿管理第四參領第七佐領係第三佐領內餘丁康熙三十四年占布管佐領時復分出一佐領以馬喇喜之孫三等精竒尼哈番傅爾素管理傅爾素故以其子員外郎傅成管理傅成革退以其弟之子舒通阿管理舒通阿故以其叔髙祖之二世孫齡太管理齡太故以其子五常管理五常故以其叔曽祖之孫拴住管理拴住故以其子柱德管理柱德病故以其子德興阿管理第四參領第八佐領係第四佐領內餘丁康熙三十四年章鼐管佐領時分出一佐領以馬喇喜之孫四品額駙阿爾素管理阿爾素故以薩穆岱之孫護軍參領哈理管理哈理故以其子杭吉圗管理杭吉圗緣事革職以其叔之子額勒清額管理額勒清額故以其子勒善管理第四參領第九佐領係國初以烏魯忒地方來歸人丁編立始以恩克僧管理恩克僧緣事革職以布顔泰之長子多羅額駙兼一等阿思哈尼哈番俄木布管理俄木布故以其子六品廕生色特禮管理色特禮故以其子副都統塞爾登管理塞爾登故以其孫色秦管理第四參領第十佐領係順治二年以和托佐領內餘丁編立始為半個牛録以三等阿達哈哈番紀馬瑚管理紀馬瑚故以其叔父之子户部郎中舒恕管理舒恕故以其叔父之子勒弼管理勒弼故以其兄之子二等阿達哈哈番穆圗管理穆圗故以其弟克竒管理至康熙七年人丁滋盛編為整佐領仍以克竒管理克竒駐防右衛以其次子佟竒保管理佟竒保因病告退復以克竒管理克竒年老休致以其長子筆帖式卓爾海管理卓爾海升任齊齊哈爾協領以其子拖沙喇哈番兼三等侍衛佟夀管理續以同書管理同書故以其弟四格管理四格故以其子福興管理福興故以其子嵩齡管理第四參領第十一佐領係國初以瓦爾哈什地方來歸人丁編立始以郎格管理郎格從征陳亡以其弟郎色管理郎色故以其族弟張世巴管理張世巴故以郎格之長子三等阿達哈哈番兼驍騎參領董錫祿管理董錫祿故以其弟拜他喇布勒哈番揚古禮管理揚古禮故以郎格之次子三等阿達哈哈番兼副都統吏部侍郎議政大臣和托管理和托故以郎色之子護軍參領阿爾泰管理阿爾泰從征陳亡以其長子二等護衛達哈布管理達哈布故以其弟筆帖式達布岱管理達布岱故以其弟拜他喇布勒哈番兼一拖沙喇哈番達拜管理達拜故以郎格弟馬克圖之二世孫護軍參領阿爾法管理阿爾法故以阿爾泰之孫大學士孫柱管理孫柱故以其子員外郎舒通阿管理舒通阿故以其子富慶管理謹案此佐領亦係以巴顔自瓦爾喀什率領來歸人丁編立郎格為巴顔親姪第四參領第十二佐領係第十一佐領內餘丁康熙七年達布岱管佐領時分出一佐領以郎色之孫驍騎校布喀達管理布喀達故以其弟之子傳勒赫管理傳勒赫因病告退以郎格之二世孫二等精竒尼哈畨兼護軍參領蒙古管理蒙古緣事革退以其兄二等阿思哈尼哈番蘇喀管理蘇喀故復以蒙古管理蒙古因病告退