江廣等省採買並請敕發江西倉榖二十萬石湖南十萬石運閩以濟窮黎得旨允行九月諭玉麟仍兼管閩浙兩省事四年三月奏言閩省偶遇歉收兵丁每虞艱食沿海各鎮已有儲榖其餘各營計兵一名貯榖二石共六萬一千六百石請以節省生息銀採貯於兵食有濟六月又奏閩省沿海鹽場離郡縣甚遠曬丁待食常平倉榖每艱挽運查閩省辦課有匿報鹽斤等弊按所犯酌罰陸續買榖萬石檄鹽道於曬丁最多離城最逺之福清場貯榖五千石蒲田場貯三千石餘各場視可以建倉處次第經理諸疏入俱得旨嘉奬七月擢吏部尚書十一月命署兩江總督先是上聞福建漳州府知府王德純居官劣迹敕革職令署福建巡撫王士任秉公嚴審至是御史朱續晫奏言風聞現審未結事如王德純一案有與督撫關涉處上命續晫馳驛赴閩會同總督德沛及士任查審尋會鞫德純婪贓屬實合疏具題續晫又以會鞫時士任袒護玉麟欲出其罪心多欺詐具摺另奏詔革士任職並以玉麟身為總督於貪婪不法之王德純不行糾恭且題升知府又以才情敏練辦事實心保薦敕部嚴加議處部議降五級調用諭曰朕命德沛確查郝玉麟曽否收受王德純賄賂今據奏郝玉麟止於每年收受王德純禮物並未受賄郝玉麟係皇考簡用之大員久歷外任人亦諳練若照部議降調尚屬可惜著從寬降二級調用五年補刑部右侍郎六年二月因病乞休上允之九月署閩撫策楞參奏延建邵道鄂善交結玉麟家人郭姓各欵上命革鄂善職並將玉麟家人嚴審得實玉麟革職十年三月卒范時捷范時捷漢軍鑲黃旗人大學士文程之孫康熙三十四年襲一等子兼管佐領三十六年授參領由寧夏運米至噶多立軍功議敘一等三十八年授廣東南雄副將四十一年六月調廣西潯州副將七月遷廣東韶州總兵四十二年調瓊州總兵四十七年調陜西寧夏總兵先是鄂爾多斯王松阿喇布請於察罕托輝之地暫行遊牧許之五十二年八月時捷疏言察罕托輝係版圖內地今蒙古逰牧多越界與寧夏民相混於體制不便請以黃河為界上曰前松阿喇布以察罕托輝水草佳茂懇請暫行逰牧並未有令永逺逰牧之旨著理藩院查明具奏尋議如時捷所請五十七年署甘肅提督雍正元年四月署陜西巡撫九月實授二年十月疏請裁潼關榆林靖邊等衛守備千總及教職等缺移華隂縣丞駐潼關各衛所錢糧歸併附近州縣管理生童歸該管州縣考試潼關應支兵糧就近改撥潼商道收支從之十一月來京三年三月授鑲白旗漢軍都統五月疏劾川陜總督年羹堯欺罔貪婪五欵一運米至軍前侵蝕腳價銀四十餘萬兩一管理駝米勒取私費三十萬兩一違旨派勒屬員捐俸興工一與將軍督撫文書擅用令諭直書官名一保舉題補各官多營私受賄又劾東河運使金啓勳附年羹堯生事擾民啓勳逮下獄治罪年羮堯罷為杭州將軍詳見年羹堯傳五年六月兵部𠫭奏時捷等引見人員班行不整應革職諭曰范時捷乃年羮堯門下鷹犬年羮堯稱其才品超羣滿漢官員無與比並及年羮堯事敗其案內牽連范時捷之處甚多朕俱不行究問且念其為勳臣之後仍畀以都統重任料伊自必感朕深恩力圖報效乃歷年以來見其辦事昏庸奏對糊塗並無絲毫效力一事可取之處揣范時捷之意或以朕處治年羮堯之故觖望於心不肯黽勉亦或才具本屬不及向因工於諂媚故年羮堯揄揚太過乃至今日底裏畢現耶范時捷著革去都統在侍衛上行走朕非因偶爾失儀一節處分大臣也八年正月授散秩大臣總理陵寢事務七月時捷兄時繹因協理河東河務誤工革職十月以時捷授古北口提督諭曰范時捷係開國名臣范文程之孫乃不念國家培植之恩并不思祖宗積纍之厚其在陜西為官時甘心出年羮堯之胯下諂媚逢迎以至辱身賤行為人所鄙笑朕令其來京辦理旗務而伊志氣昏庸委靡不振無心為國家出力是以降為侍衛以示懲戒繼因陵寢地方辦事需人將伊命往今范時繹獲罪罷黜范氏子孫竟無現居大員之人范時捷尚非棄才可此是以令其管理古北口提督事務觀其如何改過自新一洗從前之愧恥直隸總兵官俱聽范時捷節制十二月調署陜西固原提督九年正月寧遠大將軍嶽鍾琪奏甘肅固原肅州兵丁撥二千人出口內地應募補固原召募之事令時捷辦理四月協辦西寧總兵官事六月署大通鎮旋仍署西寧總兵十年六月奏修西寧鎮邊牆命興工督修乾隆二年九月偕西寧辦事大臣保祝奏請多倫尼託克圖例交馬價準作次年正賦上是之閏九月因患病奉旨來京以散秩大臣行走俾得調理三年四月卒欽定八旗通志卷一百九十二
