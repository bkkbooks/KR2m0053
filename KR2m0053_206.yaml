body:
  text: 人物志七十二大臣傳五十八漢軍鑲黃旗四楊范時崇髙施世綸施世驃長春其倬郝玉麟范時捷范時崇范時崇漢軍鑲黃旗人大學士文程孫福建總督承謨子也承謨殉耿逆之難時崇以廕入監讀書康熙二十三年授遼陽州知州二十八年遷廣西梧州府同知二十九年調南寧府同知三十一年遷直隸順德府知府三十三年調宣化府知府三十六年遷天津道四十年擢貴州按察使尋調福建按察使四十三年遷山東布政使四十四年擢廣東巡撫四十五年七月疏言髙州府吳川縣屬硇川一島原有田糧户口載在版籍自康熙元年遷界户遷田廢丁糧豁免無徵二十三年展界又因孤懸海外仍未給民耕種近奉旨酌改沿海營制硇川島已設専汛遷民來歸故土已有談福臻等九十餘家呈請復業應查明原額錢糧户口聽開墾升科下部議行十月上以兩廣額定鹽稅外各處餘費多於額稅以致嵗歉正項錢糧命時崇會同巡鹽御史圖爾泰兼理鹽政上發函章諭以兩廣鹽政積弊甚多朕已察得陋弊數條著交該撫查辦十二月時崇遵所發章內情節疏奏鹽政七條一鹽政衙門嵗有羡餘十萬兩向歸鹽政有一種蠧胥名曰發收鹽政初任時任其播弄逮少知事例而一年差期將屆急公之心不勝營私之念徵羡餘而置正課於不問應將此項盡充公用其發收一役應革一鹽政到任即遣內司承差坐守場口名為緝私止知勒索致私鹽充斥查緝私責在文武官原無藉內司承差應革一恤商裕課無過於裁冗員運司職掌兩省餉課應與庫官仍留任任事其知事大使及潮州廣濟橋運同廣惠分司均屬冗員應裁查驗之任責之州府課銀徑解運司一運司向得羡餘六萬兩內應解河工銀萬兩銅斤水腳銀萬兩今鹽政羡餘充公其鹽政名下銅斤水腳萬兩應在運司羡餘項下支解餘三萬兩充公一行鹽地方文武員皆有規例名曰茶果應行禁革再犯以枉法贓治罪一兩廣場商無力養竈丁不得不售私鹽埠商不能向場買運民間又不得不食私鹽商人惟買鹽政大票以為行鹽護符私鹽盛則官鹽愈滯請將運使庫銀借給三萬兩每府委佐二賢員將竈丁所曬鹽盡行收買鹽價收放責成知府隨賣隨收官鹽得行課餉自裕一兩廣鹽埠惟運樂與廣濟橋最大利徒揑商人名色賄鹽政承充總商倚勢恣私必應禁革令各州縣自募殷實土著具結保充疏入部議如所請鹽政運司所得羡餘解交內務府得旨廣東兵餉不敷此項銀兩即存留彼處充餉餘如所議行四十七年三月疏言粵東濵海各州縣倉榖久貯易於黴爛省城八旗官兵需糧甚多請將近省州縣存榖酌量多寡折米六萬石運省支用其該年派撥額米秋成徵補間遇嵗歉亦可動用賑濟下部議行十二月疏言前耿逆之變隨臣父范承謨殉難者五十三人內生員嵇永仁王龍光儒士沈天成及臣族叔范承譜俱偕臣父幽囚三載殉難死節經前撫臣楊熙題請贈銜部以生員無追贈例議寢臣仰祈皇上特沛恩綸豫以一命陪祀臣父祠堂以慰忠魂下部議生員嵇永仁王龍光應追贈國子監助教沈天成范承譜雖庶民無追贈例但係死節應追贈國子監學正并入祠陪祀從之四十八年五月疏言廣東連州總鹽額引行銷本州及湖廣之桂陽臨武藍山嘉禾四州縣樂昌總鹽額引行銷本縣及湖廣之郴州宜章興寧永興四州縣但連樂二州縣之引多於衡郴八州縣之額以致此壅彼缺請量勻十分連州樂昌行銷十分之三桂陽郴州等行銷十分之七又潮州惠州贑州三府俱行銷廣濟橋鹽此三府所屬平遠鎮平程鄉興寧長樂五縣額引較多而惠州府屬之龍川和平永安三縣及江西贑州府屬十二縣額引獨少不敷民食應將平遠等五縣之引勻銷於龍川等十五縣贑屬十二縣內信豐龍南定南三縣接壤惠川距潮路遠難運應就近改食惠鹽又福建汀州府屬八縣內長汀一縣額引幾居通府之半應撥銷於寧化等七縣廣西靈川陽朔義寧三縣鹽引難銷應撥於易銷之全州灌陽興安三州縣商民均有禆益部議從之四十九年八月擢福建浙江總督時海賊鄭盡心在洋肆劫遠至錦州等處兵部檄沿海各省嚴緝五十年三月時崇緝獲盡心解京四月疏言兵糧計口授食刻不容緩本年夏秋不敷兵米萬七千七十餘石請於嘉湖二縣府捐米石內各移萬石貯省倉以敷兵米下部議行五十二年五月疏言臺灣屬三縣年徵稻粟十三萬八千餘石除折支各營兵米外嵗餘七萬石現存六十六萬三千餘石貯已十年易致紅朽請將新收者勻留二十萬石備三年兵米之用其四十六萬餘石出糶給臺灣俸餉從之八月又言閩省福興全漳四府一年兩熟本年興漳早禾豐收福州歉薄晚稻則興全雨未霑足福州得雨更遲恐來嵗青黃不接時民食可慮請于江浙運米內撥給收貯米貴平糶得旨江南運米內速將五萬石運至福建米到日即行平糶毋致浥爛五十三年三月陛見瀕行賜御製詩有棟梁祖幹家聲重蘭桂孫枝令譽清之句序云浙閩總督范時崇陛見來京朕每念伊祖為開創宰輔伊父乃忠義名臣所以待之優重今因回任特書御詩餞送五十四年十一月授左都御史五十五年五月因祈雨不親到經大學士嵩祝奏劾得旨范時崇著降三級留任革去恩詔所得廕生五十六年四月授兵部尚書五十八年九月振武將軍博爾丹請於莫代察罕廋爾與鄂爾齋圖果爾各築設站特命時崇前往料理五十九年三月回京十月以疾乞休允之十二月卒施世綸施世綸漢軍鑲黃旗人靖海侯琅仲子康熙二十四年以廕授江南泰州知州二十八年正月以承修京口沙船遲誤部議降調督臣傅臘塔以世綸清廉公直題留得旨留任三月擢揚州知府三十年八月海潮驟漲泰州范公堤衝塌千九百餘丈民田竈地多沒世綸牒請捐修三十二年調江寧知府三十五年丁父憂督臣范承勳以世綸輿情愛戴請在任守制御史胡德邁特疏應行離任遂歸連丁母憂嵗餘特旨授蘇州知府仍以終制辭不赴三十八年服闋授江南淮徐道四十年十月湖南按察使員缺大學士伊桑阿等以九卿保舉世綸入奏諭曰施世綸朕深知之其操守果亷但遇事偏執百姓與生員訟彼必護庇百姓生員與縉紳訟彼必護庇生員夫處事惟求得中豈可偏私如施世綸者委以錢榖之事則相宜耳十二月遷湖南布政使先是議遷五開衛署於平屯俾黎平府専城而治四十一年世綸牒稱五開衛界黔粵控蠻彛實為辰沅靖之藩籬明宣德年間黔省黎平府數被苗患爰僦衛城建府署國朝因之自康熙二十七年府衛官辨不和始有遷衛之議平屯僻處一隅不惟建造無資且孤立堪虞若官軍兩遷一旦棄田園壞廬舍必致流離失所若僅遷衛署貢賦出納遙轄最難矧自明迄今府衛同城軍民相安無事請仍舊便議久不決嗣總督喻成龍巡撫趙申喬會疏以聞特旨俞允四十二年以衡州府之安仁嘉禾臨武永州府之江華寶慶府之城步及郴州之桂陽靖州之通道天柱向止訓導一員請添設教諭又永定銅鼓二衛止設教授綏寧會同二邑止設教諭俱請添訓導敕部議行四十三年調安徽布政使四十四年遷太僕寺卿四十五年二月因湖南任內失察兵掠當鋪事罷職三月特旨授順天府尹疏陳四欵一禁五城司坊擅理詞訟一禁姦徒包攬捐納一禁牙行要占客貨一禁逐流娼歌宴敕部議定為令四十八年授左副都御史兼管府尹事四十九年遷户部右侍郎督理錢法尋調總督倉場五十四年奉旨巡撫雲南會漕運總督缺員即以世綸補授先是漕運俱由瓜州閘行其閘下花園港乃糧艘停泊處至是江溜北趨花園港衝塌百餘丈世綸以咨河臣恐糧艘遲滯權將繞城河開壩行五十九年七月上諭曰總漕施世綸居官素優歷年漕船俱催趲全完並無遲誤本年漕船已經過淮更無他事漕運印務暫交與河道總督趙世顯署理施世綸速赴豫省將河南府至西安黃河挽運路徑勘明具奏陜西現在榖石數目亦著查奏今陜西正值軍興之際施世綸暫居陜西協同總督鄂海辦理世綸乃溯流上尋求古迹九月疏言河南府孟津縣至陜州太陽渡大小數十餘灘縴路髙低不等或在河南或在河北惟圪把窩魚林漆等處縴路年久間有坍卸其澠池以下水道下水船可載糧三百餘石上水載及其半澠池以上河髙迅激僅可挽數十石由砥柱至三門神門本無縴路若小舟乘東南風猶或可上鬼門水勢洶湧土人從未行舟惟人門稍緩石崖鑿有縴路路旁鑿有方眼又有石鼻臣愚以為石鼻可穿鐵索方眼可裝木限援手助力觀此則從前挽運迹猶存自陜州至西安府河水平穩俱有挽運路徑臣謹繪圖呈覽又奏河南府至陜州三門現在無船請自河南府至陜州太陽渡三百餘里用車運計五日可到每車可裝榖八石計榖二十萬石需車價銀四萬三千七百五十兩自太陽渡至西安府黨家馬頭河平穩水運為便需運費銀二萬六千兩自黨家馬頭至西安府倉二十里又需車價銀四千兩其貯榖口袋二十萬餘需價銀三萬兩共計銀十萬三千七百五十兩總於豫省支銷不令陕西接運但運榖二十萬石止得米十萬石請令豫省以二榖易一米起運則運價可省半若慮米難久貯請照例出陳易新奏入嘉其詳悉從之十月上諭曰陜西地方現有軍務又年嵗歉收總漕施世綸協同總督鄂海動支倉榖散賑但地方官員大半在軍前辦事之人殊少發帑金五十萬並陜甘常平倉貯榖百三十餘萬石酌量動用派部院司官往賑交施世綸總管六十年四月疏言陜西四月無雨秋成可慮豫省先運米十萬石督臣已借支駐防兵餉所存無幾請促豫省將後運米石運到平糶再撥河南湖廣米各十萬石運至陜西存貯備用部議如所請六月命歸淮安理漕事六十一年四月以病乞休溫旨慰留令其子廷祥馳驛省視五月卒遺疏入請隨父琅墓附葬閩省上允之諭曰施世綸簡任總漕清慎自持勤勞素著歷年催儧無誤前病請解任方冀調理痊愈以副眷懷忽聞溘逝深為軫惻應得恤典察例具奏尋賜祭葬如例施世驃施世驃漢軍鑲黃旗人靖海侯施琅第六子康熙二十二年隨琅𠞰海賊鄭克塽委署守備取澎湖及臺灣敘功加左都督銜三十年授山東濟南城守營參將三十五年二月上親征噶爾丹天津總兵嶽升飛奏薦世驃隨征召試騎射命護糧運既至奎素地復隨大將軍馬斯喀追賊至巴顔烏蘭凱旋仍任濟南參將乞歸福建葬父得旨施琅久在海疆功績懋著其子施世驃頃隨軍進𠞰亦效有勤勞凖給假葬親事畢即回任三十七年遷臨清副將四十年擢浙江定海總兵四十二年四月上南巡御書彰信敦禮匾賜之時海中多盜世驃屢出洋巡緝先遣禆將假商舶以餌盜擒獲甚衆斬盜首江崙四十六年上南巡詢及擒斬海盜事溫諭嘉奬賜戴孔雀翎四十七年擢廣東提督五十一年調福建水師提督六十年四月姦民朱一貴自稱明裔偽號中興王下大元帥聚衆倡亂於鳯山縣之薑薗害臺灣總兵歐陽凱副將許雲恭將羅萬倉逰擊遊崇功等遂陷臺灣府治五月丙寅世驃聞報即率所部進扼彭湖總督滿保檄南澳總兵藍廷珍等以師會衆議三路進攻世驃謂南路打狗港在臺灣正南南風正盛不可泊北路之清風隙去府百餘里餉運頗艱度賊必屯聚中路宜直搗鹿耳門時臺灣文武官相率退回澎湖惟北路淡水營守備陳策堅守汛地世驃遣遊擊張駴等赴援而自統師指中路選徑卒乘兩小舟載旗幟先伏於南北港六月丙午抵鹿耳門外洋賊據炮臺拒阻世驃登船樓督戰擊鼓發炮中賊貯火藥器火大熾賊驚潰衆軍齊進兩港悉樹我軍旗幟賊不敢犯遂揚帆直度鯤身鯤身者海沙也大舟不能過是日海水驟漲八尺戰艦乘風迅達遂復安平鎮明日破賊四千於二鯤身辛亥賊悉衆八千來犯復擊敗之壬子遣守備林亮等由西港進遊擊朱文謝希賢林秀等越七鯤身由鹽埕大井頭諸路奮勇登岸並趨府城世驃身先將士指麾布陳賊俱敗潰一貴竄遁遂復府治復遣參將林鎮等分路撫𠞰閏六月丙寅諸羅縣溝尾莊民楊旭等誘擒一貴及其黨翁飛虎王玉全張阿三李勇陳印等以迎參將林秀縛送世驃軍前賊黨抗拒者先後擒斬略盡餘衆就撫臺灣南北兩路悉平上詔部臣優敘有功將士賜世驃東珠帽黃帶四團龍補服九月世驃卒於臺灣軍營遺疏言臣父琅昔日蒙恩葬閩今臣骸骨願得與父相依并留臣幼子隨臣妻守塋近因𠞰賊借藩庫銀一萬兩容臣長子雲南知府士岡次子廣東遊擊廷専變産交完疏入得旨施世驃效力年久勞績懋著沿海水師營務極為諳練簡任提督實心盡職當臺灣匪類竊發即調遣官兵親渡海洋屢次大敗賊衆七日內克復臺灣擒獲賊首朱一貴等俾地方寧謐深為可嘉海疆要地正資料理忽聞將星隕落朕心深為悼念著贈太子少保察例賜恤所借藩庫銀一萬兩免其償還其安葬福建及妻子留住之處並照所請行賜祭葬如典禮諡勇果雍正元年八月兵部議敘克復臺灣功以應否給世職請得旨臺灣地方自古未屬中國皇考以聖略神威取之載入版圖逆賊朱一貴等倡亂占據臺地皇考籌畫周詳指授地方官員遣調官兵七日之內𠞰滅數萬賊衆克復全臺皇考當春秋髙邁威揚海外功德峻偉官兵感戴皇考教養之恩奮勇攻取甚屬可嘉固不必援引前例後亦不得為例兹仰副皇考從優議敘之旨官員現行議敘功加之外著概行各加一等提督施世驃統領大兵徑渡海洋鼓勵將士屢經大戰擊敗賊衆七日之內克復臺灣著給豫一等輕車都尉世職尋以其子廷専襲楊長春弟長泰楊長春漢軍鑲黃旗人父廷瑜任杭州駐防協領從征耿精忠於台州陳亡長春廕八品監生康熙二十五年授佐領三十五年由中路隨征噶爾丹管炮有軍功三十八年都統公鄂倫岱奏薦長春上親㨂選以真隸遊擊補用四十一年授京口參領四十四年駕南巡長春以沙船備操上追念其父陳亡賜壯節流芳額四十九年鎮海將軍馬三竒奉旨緝海賊鄭盡心黨與令長春帥兵船出洋搜捕長春由吳淞出口歷內外洋及江南浙江接壤之盡山花烏等處扺浙省定海於衢山舟山間獲賊船三賊五十餘三竒以長春於陸路水路皆諳練奏請授中軍副將上允其請五十一年三竒保題長春引見親詢出洋緝賊情形得旨嘉奬五十七年調湖廣鄖陽城守營副將五十九年遷江西南瑞鎮總兵雍正元年賜孔雀翎二年擢浙江提督陛見賜秉心誠悃額並冠服命長春於浙省道府以下官舉所知者一員奏言臣到浙未久整飭營伍文員內才幹廉潔者未盡周知不敢冒昧陳奏得旨所奏合宜應如是時長春弟長泰任肅州總兵以長春授浙江提督具疏謝上諭之曰汝兄楊長春德勝於才和平忠厚謹慎有餘所嫌者稍覺偏於善柔雖然武臣中可謂一好提督四年長春卒賜祭葬如例諡勤恪長泰由營總於康熙二十九年從裕親王福全征噶爾丹三十二年授佐領三十六年由中路隨征噶爾丹四十年授參領五十年擢西安左翼副都統五十四年策妄阿喇布坦擾哈密長泰隨將軍富寧安駐防巴里坤五十六年襲擊策妄阿喇布坦賊衆於烏魯木齊多俘獲還仍駐巴里坤下部議敘五十七年遷肅州總兵雍正三年富寧安以策妄阿喇布坦已歸順奏撤巴里坤等處兵長泰率吐魯番撤回官兵赴肅州汛鎮守六年授杭州副都統十年五月以老解任尋卒髙其倬髙其倬漢軍鑲黃旗人父廕爵任口北道其倬由康熙三十三年進士改庶吉士散館授檢討尋兼佐領四十一年充四川鄉試正考官四十五年授右中允尋轉左四十六年遷侍講四十八年提督山西學政五十一年丁父憂服闋補侍讀遷右庶子五十五年轉左五十六年二月遷侍讀學士十一月遷內閣學士五十八年正月以河南南陽鎮標兵挾忿圍辱知府命其倬同刑部尚書張廷樞往鞫得實置首犯於法總兵髙成等論罪如律二月丁母憂五十九年授廣西巡撫六十一年二月署雲貴總督十二月實授雍正元年九月疏言雲貴兩省土司承襲向有陋規上下衙門每因文結舛錯藉端需索苦纍臣已嚴行禁革并請嗣後咨部文册內數字舛錯無甚關係者免其駁換於疏內代為聲明庶承襲事易結掯索弊除得旨嘉奬十二月疏言雲貴魯魁山土目楊方普李四姓糾衆剽掠不聽約束本年十月內其酋方景明等率猓夷數百殺元江猓目施和尚焚其寨臣遣兵分𠞰擒景明及猓夷三百二十六名分别正法報聞先是青海台吉羅卜藏丹津肆逆謀侵西藏定西將軍策旺諾爾布檄各路偵禦其倬以雲南邊外中甸阿墩子地方為進藏要路檄遊擊劉宗魁劉國候等嚴防並遵旨令提督郝玉麟以兵二千由中甸進駐察木多副將孫宏本以兵五百赴中甸為聲援二年二月羅卜藏丹津為大軍所敗竄凖噶爾青海平中甸喇嘛營官番目等擕三千五百户繳偽劄納土歸誠其倬疏聞上嘉其辦理妥協給騎都尉世職十月貴州狆家苗酋阿近與弟阿卧倚險作亂其倬以狆家苗聚處定番廣順二州境其附近苗寨多被迫脅遣人招撫阿近等勢窘為官兵所擒疏至諭部優敘加三級尋請增雲南楚姚鎮兵六百并增鎮屬景蒙營參將守備各一千總二把總四兵千即以新裁援𠞰左右兩協辨兵撥補部議從之十一月條奏中甸善後事宜一中甸開墾商民日增請設撫番清餉同知及經歷巡檢等官管理一畨目舊有營官神翁列賔名目聽堪布喇嘛指使請給外委守備千把總劄付聽中甸文武官轄一中甸向行滇茶請照打箭爐例設引收課由麗江府收報一中甸沿江數百里及山谷曠土甚多請給牛種房屋招佃開墾三年後起科供增駐官兵嵗糈一中甸僧衆千餘寺屋數百收藏軍械易於宿姦番人舊給喇嘛費甚多應裁減除出身西藏之喇嘛外其本地喇嘛選誠實者三百名咨給度牒餘以次選補器械入官每年量給青稞酥油并銀三百兩為口糧衣單資至番目受外委劄付亦分别嵗給銀兩青稞養贍又條奏魯魁山善後事宜一魯魁山內通哀牢外界異域須重兵控壓請設普威營置恭將一駐普洱守備二分駐威遠土州及茶山千總四把總八分汛控禦一賊巢全在元江協與新嶍營所轄地新嶍營隸臨元鎮不隸元江協兩界互相推卸誤事請移新嶍營及擬設之普威營均隸元江協以臨元鎮統轄一威遠土州為野賊逋逃藪請改土歸流設撫彛清餉同知及經歷井大使巡檢等官分管鹽井地方事務一方姓普姓土職糾衆滋擾請停襲一威遠新開之按板抱母二鹽井嵗獲息銀二萬餘兩請充新兵餉一猓目施和尚之姪膩勒等妻子請移駐元江府城威遠土官刀光煥子弟家口移省城安置一九龍江口夷人出入處請設汛照山海關例給印票客商兵役往來一例盤察毋得出境滋事村寨各編里甲户口以稽一設義孰數處夷人子弟有志讀書者入孰誦習於元江府附考額外加取二名一勸誨夷人墾田請照雍正元年定例旱田十年水田六年後升科又條奏貴州苗疆事宜一定番廣順頑苗皆就擒請於西猛設汛調定廣營千總駐防一定番廣順二州路通廣西泗城土府請於青藤斷杉樹二處設汛衛行旅一請改大定鎮為協裁中營遊擊以左營兼中營仍守大定移中營守備一千把總各一分防廣順州所屬長寨遮貢安順府所屬十三枝普定縣所屬五枝等處移把總一防羊城􅋭統歸定廣協轄至都勻府屬之獨山州接廣西南丹土州苗性尤頑請移都勻守備駐防一黔省境連川楚姦人勾結掠販人口為害請定例地方官一年內分别拏獲人數議敘其不能查緝為他處獲者亦照人數議處客民有買貧民子女者報官用印不得至四五人違者照興販科斷一黔省與楚蜀滇粵接壤請定例夷人越界拏送本省滋事者即於其地審辦又黔省有拏白放黑之習被人劫殺力不能報將無干之家奪其人畜暗插寃單令其轉為報仇否則索贖請加應得罪一等一土司等貧困不支往往以有糧田詭稱無糧售於紳襟商民買主收無糧之租土司納無田之賦久之完納無資或派令屬苖代完請徹底清查令執業者輸納又土司下設立權目人等報明有司後有事發併懲一黔地潮濕倉米易朽請核計兵米存二年之蓄餘於春夏減糶著為例一黎平府與楚省五開衛同城民苗雜處分隸兩省請改五開衛為縣隸黎平銅鼓衛亦歸併五開古州八萬等苗疆均屬黔省事權歸一又言向來雲貴兩省拔補千總把總皆以本營之兵補本營之缺伏思同為兵丁一旦難以約束即同輩千總亦羣非笑其不肖者則又護庇兵丁將備稽查不易為力請嗣後拔補本營時即於外營對調不必仍留本營詔並如所請三年二月加兵部尚書銜五月疏言近聞策妄阿喇布坦萬里效順籌度經久之計正在此時臣以為兵宜酌減備未可全撤西路形勢臣所不知至阿爾台一路臣曽運米二次自殺虎口出經蒙古各部落約三四千里大兵駐劄極邊甚有關係似宜兵數量減米數微增則遠戍倍加踴躍上嘉納之六月晉太子少傅十月調福建浙江總督其倬以雲南鶴慶府鄧川嵩明騰越三州太和浪穹二縣土軍丁賦係明嘉靖萬歷間因夷人作亂暫撥民人協防隨立太和所鳯梧所名目每丁徵銀一兩伊等既納民賦於本籍又輸軍賦於防所相仍未革疏請豁除允之四年抵閩浙總督任疏言福興漳泉汀五府地狹人稠自平定臺灣以來生齒日繁山林斥鹵之地悉成村落多無田可耕流為盜賊勢所不免臣再四思維惟廣開其謀生之路如開洋一途前經嚴禁但查富者為船主商人貧者為頭舵水手一船幾及百人其本身既不食本地米糧又得沾餘利歸養家屬若慮盜米出洋則外洋皆産米地慮透漏消息則今廣東船許到外國豈福建獨慮漏泄慮私販船料則中國船小不足資彼之用以臣愚見開洋似於地方有益請弛其禁詔下怡親王會同大學士九卿議行五年四月疏言臺灣水沙連等社凶番自朱一貴作亂後不納餉賦肆行焚劫臣令臺厦道吳昌祚同知王汧參將何勉等率辨兵番壯分路裹糧進剿擒首惡骨宗等二十名各社相繼歸誠報聞十月以李衛為浙江總督命其倬専管福建總督事六年二月條奏福建鹽政事宜一謹産地之收曬閩省鹽場福清最大請倣保甲法添設團長甲長查報日曬之鹽設總倉封鎖以杜私賣且免雨水之患修砌莆田各團鹵窟以資防護一嚴銷地之售賣閩鹽向係商行後改官運近用水客肩販請暫令水客認銷而以官運接濟三年無誤報部充為商人再發引以立成法場鹽多産之時仍照官運例動課收積一定鹽課之額數閩省鹽課有額徵公費二項請照定數作正額其溢行之鹽所獲銀數造為盈餘報查除支給鹽道各衙門公用外餘造册奏銷解部水腳即於長價等項內撥納一酌辦理之人員閩省舊設鹽務各官雍正二年裁汰請嗣後於佐雜官內遴辦無庸另設下部議行六月以原任山西道御史蕭震於康熙十三年遭耿逆之變與原任邵武府知府張瑞午等合謀討賊事泄身殉妻妾媳婢同時死節瑞午業蒙恤典而震獨遺疏請入鄉賢祠致祭旌其門詔如所請七年六月因與臺灣革職知縣周鍾瑄濫致書扎又未審出加徵耗榖各實情部議革職命降三級留任尋疏言閩省戰船多係平臺灣時所獲長濶不稱請酌定丈尺隨時更改閩安協左營之船多鐵板沙線請改為平底以適進哨之用又請改福建同安泉州長福邵武四營