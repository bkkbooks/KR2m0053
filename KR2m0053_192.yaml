body:
  text: 欽定四庫全書欽定八旗通志卷一百七十八人物志五十八大臣傳四十四滿洲鑲藍旗一沙安費揚古穆固三泰喀三爾瑚達克坦愛武巴海音塔穆舒賽德瑚什布都爾席特庫巴泰安費揚古子達爾岱安費揚古姓覺爾察世居瑚濟寨後𨽻滿洲鑲藍旗父完布祿事太祖髙皇帝章嘉及尼瑪蘭二族誘之叛不從又劫其孫以要之終無二志安費揚古自少從太祖征伐癸未年八月太祖以薩爾滸城長諾密納隂附尼堪外蘭執而誅之命安費揚古帥兵取其城兆嘉城長理岱𨗳哈達兵劫瑚濟寨既去安費揚古方獵聞之帥十三人疾追斬四十人盡獲所掠以歸甲申年正月從征兆嘉城獲李岱其黨理固哩扎親走附旺泰奉命往招並旺泰降之六月從征瑪爾墩寨寨踞山巔進攻三日矢石交下不能克安費揚古夜帥兵從間路攀崖上拔之丁亥年六月太祖征哲陳部八月征洞城明年九月征完顔城皆從尋攻克章嘉尼瑪蘭赫徹穆等城又取香潭寨其長理敦拜瑚遁追及於碩郭之陽擒以獻癸巳年六月從征哈達克其富勒佳齊寨師還太祖親殿敵潛躡焉有數騎突前勢甚急安費揚古遮擊皆斬之九月隨大軍擊敗葉赫等九國兵閏十一月同額亦都等討訥殷部克佛多和山寨斬其長藪穩色克什己亥年九月從太祖滅哈達辛亥年七月奉命征東海窩集部與台吉阿巴泰等取烏爾固宸穆稜二路癸丑年正月太祖征烏拉安費揚古帥師薄城執大纛先登天命元年同扈爾漢征薩哈連部至烏勒簡河取河南北諸寨八月師次黑龍江江水常以九月始氷是時中流忽結氷若浮梁約廣六十步安費揚古曰此天佑我國也策騎先涉衆從之遂取江北十一寨復招服使犬諾囉錫喇欣諸部三年四月大軍下撫順明總兵張承蔭等赴援分營為三安費揚古擊其左營大破之復同額亦都攻克馬哈丹花豹衝三岔兒諸堡四年破明經略楊鎬兵滅葉赫六年取瀋陽遼陽安費揚古皆在事有功太祖常嘉其鷙勇賜號碩翁科囉巴圖魯命為一等大臣佐理國事居五大臣之列七年七月卒年六十有四順治時追諡敏壯子八人第六子曰達爾岱天總五年任鑲藍旗參領從征大凌河守臧家堡崇德時從征朝鮮攻明錦州寧逺皆有功順治二年授雲騎尉世職七年以追敘安費揚古功晉職一等輕車都尉世襲罔替康熙五十二年聖祖仁皇帝念安費揚古為開國勳臣復賜三等輕車都尉世職令其裔孫明岱分襲焉固三泰子明阿圖孫賽弼翰固三泰姓納喇葉赫貝勒錦台什同族太祖髙皇帝時率屬來歸𨽻滿洲鑲藍旗任佐領尚公主封固倫額駙從大軍征明廣寧單騎入敵陳身被數創戰愈力大軍繼之遂敗敵兵優加男爵太宗文皇帝御極設八大臣以固三泰為鑲藍旗都統天聰元年三月隨大貝勒阿敏征朝鮮有功四月凱旋上郊勞之優以殊禮三年上親統大軍征明攻遵化固三泰率本旗兵於城西南隅攻克之明年大軍取永平明兵潰走昌黎上遣敖漢奈曼巴林扎魯特兵攻其城不克命固三泰同都統達爾漢等率兵往助尋遣人以城守堅還奏奉諭撤兵因焚其近城廬舍而還復受上方略征灤州先令參領髙鴻中庫爾禪率十人誘敵啓門大軍遂入城籍其倉庫銀榖以聞五年上幸文館閲館臣達海所譯武經因諭羣臣曰古來為將帥者必體恤士卒朕聞額駙固三泰與敵交鋒士卒有戰死者嘗以繩繫其足曵歸輕蔑士卒若此何以得其死力乎尋以固三泰不能鈐束士卒不諳機務命解都統任九年詔免功臣徭役固三泰與焉並增賜人户俾專管佐領事世祖章皇帝定鼎燕京加恩優賚尋卒子明阿圖初任佐領大軍入關時明阿圖署副都統督兵殿後有功順治二年授雲騎尉世職任都察院理事官四年考滿晉騎都尉六年授鑲藍旗蒙古副都統兩遇恩詔晉三等輕車都尉八年二月卒長子關柱襲職次子賽弼翰初為簡親王濟度護衛聖祖仁皇帝康熙四年授護軍參領十三年隨護軍統領瑚里布討逆藩吳三桂由陜西進四川攻克陽平關及朝天關趨保寧叛鎮吳之茂王輔臣紏賊阻餉道乃退駐西安十四年隨瑚里布攻復秦州十五年王輔臣降師旋賽弼翰得優賚十七年海賊鄭錦犯福建陷海澄長泰詔增遣八旗兵赴福建以賽弼翰為營長同諸參領率之往十八年賊將劉國軒吳淑何祜等犯漳州結壘郭塘歐溪頭來奪江東橋賽弼翰隨平南將軍賚塔進戰連挫賊衆毁其壘殱殪無算二十年隨賚塔由廣西征雲南討逆賊吳世璠敗賊將何繼祖等于石門坎黃草壩遂會四川貴州兩路兵平定雲南二十三年擢蒙古鑲藍旗副都統二十四年調本旗滿洲副都統二十五年敘功授騎都尉世職二十九年十一月卒豫祭葬如典禮子伊增額襲職喀山子納海喀山姓納喇世居葉赫部之蘇完當葉赫未滅時挈家屬來歸𨽻滿洲鑲藍旗太祖髙皇帝以其才可用授佐領屢從征明取瀋陽遼陽並有功豫三等輕車都尉世職天命九年明總兵毛文龍以守備二員率兵百人來奪額駙康果禮屯莊喀山領所部禦擊斬二守備殱其衆太宗文皇帝天聰六年從征察哈爾同前鋒統領勞薩參領吳拜等率精鋭先驅察哈爾林丹汗竄遁八年追敘禦擊毛文龍部衆功晉爵三等男時以目失明辭佐領任順治二年世祖章皇帝念其舊勞晉爵一等男三遇恩詔晉二等子十二年十月卒賜祭葬立碑諡曰敏壯子納海初以喀山病目命代管佐領事旋授前鋒參領天聰八年從征明大同與前鋒參領席特庫等率四十人擊敗陽和敵騎斬級二百獲馬六十餘復設伏宣府擒敵哨騎九年大軍復征大同納海奉命率兵駐上都城舊址偵軍事迎奏捷使以偕還尋同參領卾莫克圖等齎書諭明喜峰口潘家口董家口諸守將及還斬邊界哨卒百餘俘一人崇德二年同席特庫齎書諭明總兵祖太夀自廣寧入邊擒哨卒十二斬其九縱二人使齎諭至錦州以一人歸四年隨武英郡王阿濟格征明錦州以攻克臺堡及俘獲之數還奏旋從上征松山明兵出城迎戰擊郤之祖大夀遣援兵自寧逺乘船趨杏山將入城納海同前鋒參領瑚密色索渾率兵衝擊其後斬五十人獲甲四十及船一旋與瑚密色等自松山略杏山獲牛三十九羊三百餘復同前鋒統領席特庫略錦州郊外擒斫木燒炭者二十二人獲馬騾牛無算五年大軍圍錦州敵出城築臺納海同前鋒參領色赫布丹蘇爾德馳擊斬四十人復追斬出城刈草者四十二人敵以三百騎一再來犯並擊之遁尋與色赫等往小凌河遇祖大夀所遣蒙古十七人自錦州至皆斬之六年明總督洪承疇集援兵次松山納海同前鋒統領吳拜擊敗其騎兵上統師親征圍松山城敵犯我前鋒汛地納海偕諸參領合擊郤敵既而敵兵自杏山走塔山納海率衆邀擊追至筆架山斬首四百搴纛六生擒二十八人獲馬二百餘七年錦州下敘功豫雲騎尉世職是年冬署前鋒統領隨貝勒阿巴泰征明自黃崖口入長城趨薊州擊敗明總兵白騰蛟白廣恩迎戰兵遂進征山東明年凱旋以不俟左翼軍先出邊右翼諸將並停敘功後三遇恩詔晉世職至三等輕車都尉及喀山卒以二等子爵豫納海併襲晉為二等伯順治十七年二月卒弟納秦襲沙爾瑚達沙爾瑚達姓瓜勒佳其先蘇完人世居呼爾哈太祖高皇帝時從其父桂勒赫來歸任佐領後𨽻滿洲鑲藍旗天命初從征瓦爾喀部有功授騎都尉世職天聰元年明人於錦州大凌河築城屯田太宗文皇帝自將擊之既至大凌河明人棄城走大軍遂圍錦州沙爾瑚達時任前鋒參領纍戰皆捷三年大軍征明入紅山口拔遵化州抵北京沙爾瑚達敗其郭外兵論功授三等輕車都尉世職自是數奉命同前鋒參領勞薩等率遊騎入明邊往來錦州松山杏山間俘繫明諜卒凡擒哨長一獲邊卒十八牲畜器械甚夥大凌河之捷也明總兵祖大夀降請歸錦州為內應既而背其言八年上於行營遣大臣略地至錦州且遺書大夀恐不能達召沙爾瑚達親授方略令襲取守烽堠卒付以敕書如無所獲即懸書十三站山坡沙爾瑚達輕騎往未遇敵懸書而歸九年與步軍統領巴竒蘭等征黑龍江以功加一雲騎尉時貝勒多鐸率師征明錦州遇祖大夀部將劉應選等於大凌河曲上以多鐸所將兵少令沙爾瑚達及各旗大臣扎福尼等往濟其軍會多鐸已擊敗明兵遂班師是年冬赴錦州偵軍事還獻俘獲命即以分賚將士崇德元年從征朝鮮率兵敗敵於南漢山城二年列議政大臣上以參領丹岱阿爾津等往土默特貿易慮明兵於中途截擊遣沙爾瑚達率將校往歸化城護之三年與前鋒統領吳拜率兵八十人至紅山口遇明兵斬其禆將二擊走羅文峪騎兵五百奪其纛獲馬四十又殱密雲步兵百餘四年上統軍征明沙爾瑚達率前鋒兵趨義州復至錦州捕伐薪為炭者取其牲畜猝遇敵卒敗之尋率土默特部卒二百人入寧逺北界與參領蘇爾德鄂碩布丹先設伏以數騎誘敵敵堅壁不出乃擒其樵採者以歸五年敘功晉二等輕車都尉六年三月隨睿親王多爾衮圍錦州以離城逺駐下部議罪應革職籍家産半上特宥之令罰鍰八月擢前鋒統領上以纍嵗用師錦州未克遣將更畨圍之明人分道赴援屯師松山上親征部分諸將擊敵賜沙爾瑚達馬使率兵營於髙橋東界誡之曰爾素日行不逮言今日之役當思自勉復諭曰如敵兵敗可於杏山西臺橫截大路躡擊之毋使入城及戰明兵遁沙爾瑚達違命弗追擊縱潰卒二百餘入城上縶而問之曰汝何辭稽首對曰殺臣祗一死耳宥臣當效命疆場乃赦之罷前鋒統領及議政俾任參領立功自贖七年呼爾哈部煽亂沙爾瑚達受詔與葉赫珠瑪喇討平之招降喀爾喀木等十屯人户千餘獲馬騾牲畜無算凱還賜宴及布帛有差世祖章皇帝順治元年沙爾瑚達征庫爾喀及黑龍江皆有功復隨大軍追擊流賊李自成於潼關明年隨貝勒博洛攻取江寧進師杭州所在力戰三年論功晉一等輕車都尉四年授副都統駐守東昌時兖東賊渠丁維嶽張堯中攻陷州郡撫臣張儒秀告急沙爾瑚達馳軍進𠞰大破賊衆陳斬渠魁東郡以平加一雲騎尉五年江西總兵金聲桓據南昌叛沙爾瑚達隨大軍征討有功遷護軍統領復為議政大臣六年河間賊竊發奉命率兵𠞰撫賊黨解散明年改任鑲藍旗滿洲副都統晉爵三等男纍遇恩詔晉一等男兼一雲騎尉九年正月上以吏部於兩次恩詔加秩過濫削去沙爾瑚達一雲騎尉七月奉詔統率官兵駐防寧古塔十年擢都統仍留鎮守賜冠服鞍馬十五年七月俄羅斯犯塞沙爾瑚達擊走之斬獲甚衆十六年卒年六十有一喪還命大臣祭奠贈太子太保諡襄壯立碑如例長子巴海襲爵别有傳穆克坦穆克坦姓戴佳世居哈達之杭澗後𨽻滿洲鑲藍旗方太祖高皇帝未滅哈達穆克坦隨父率衆來歸授佐領屢從征代所向陷陳先登賜巴圖魯號初扎海瑚色之叛歸哈達也穆克坦同父及兄追之父兄俱戰歿從子額爾訥亦叛往哈達穆克坦單騎追斬之天命元年同諸將征瓦爾喀方戰蒙庫及噶哈二人先敗走舒賽阿爾琥達幾被擒穆克坦與延布哩等八人衝入敵陳敵衆披靡遂救之出師還太祖治蒙庫噶哈罪盡奪其所獲以賜穆克坦阿達海等叛歸明大貝勒阿敏乘夜追之穆克坦從矢射阿達海阿達海接戰刃斫穆克坦墜馬身獲重傷六年從征明耀州奮勇登城克之尋奉命駐防耀州有蒙古人叛去我兵追及之與戰不利穆克坦策馬直前衝突大呼刺殺首逃者海色餘皆潰散敘功授二等男世襲太宗文皇帝即位擢居十六大臣之列理鑲藍旗事天聰元年四月隨征朝鮮有功五年八月大軍征明至大凌河穆克坦以本旗兵隨宗室芬古圍城西南敵兵出城挑戰穆克坦率先徑抵城壕舍騎步戰欲迫敵入壕城上炮矢齊發敵兵復出奮擊力戰殁於陳太宗聞之曰我舊臣陳亡殊為可惜贈一等男世襲順治十二年追諡忠勇立碑墓道子愛音塔穆襲爵别有傳次子溫察官郎中兼佐領第三子那桑阿任五品官以軍功授雲騎尉世職武巴海武巴海姓瓜勒佳世居烏拉後𨽻滿洲鑲藍旗天命三年從太祖高皇帝征明以功授佐領天聰元年四月隨大貝勒阿敏征朝鮮攻義州與副都統阿山穆克坦等相繼登城破之五月從太宗文皇帝征明錦州敵犯我汛地我軍少却武巴海殿後督戰擊敗其衆五年三月同副都統蒙阿圖征瓦爾喀進師額赫庫倫及額勒約索收降部衆數千人而還上郊勞設宴賜號巴圖魯六年六月大軍征察哈爾其汗聞我師入境携部衆牲畜渡河遁武巴海奉命追捕逃人遇察哈爾兵五人斬之並獲其馬匹牲畜從征旅順口破敵紀功旋率師征烏扎喇分遣軍士每二旗為一道四道並進敵方漁于烏里河武巴海麾騎直前斬級三百餘獲其輜重七年二月偕佐領郎格赴朝鮮互市獲瓦爾喀族屬十五人以歸復同參領吉思哈率兵三百往征東海呼爾哈部明年五月奏捷俘獲無算十二月同佐領景固勒岱率兵四百再征瓦爾喀降其屯長芬達哩復收阿庫里尼滿部衆千餘人凱旋命大臣迎勞即以所獲賜之九年十月隨貝勒嶽託統兵鎮守歸化城時土默特人來言其部長博碩克圖之子使喀爾喀隂與明通嶽託遣武巴海同參領阿爾津等四人要于路茂罕泄其謀喀爾喀人潛遁武巴海追執之並獲明使者以獻茂罕者博碩克圖子乳母之夫也初從土默特來歸既有叛志私稱博碩克圖子為汗自稱為貝勒且殺我察哈爾降人至是擒斬之師還復往追蒙古逃人額勒綽克斬獲有功明年授副都統加世職一等輕車都尉崇德元年六月晉三等男十二月喀木尼喀部葉雷等叛挈其妻孥亡去武巴海率寧古塔及科爾沁兵追之行數十日無所見遇宿雁三射其一鴈負矢而飛墮往取之見賊營遺火躡其蹤及之于溫多獲賊妻子葉雷逃入山追及圍之諭使降不服發矢射之葉雷將注矢有狐起於前觸葉雷弓弓墜遂殪葉雷併誅其黨捷聞太宗嘉其功命都統等迎勞二年六月敘功晉三等子賜衣服僕馬莊田三年七月以隱匿本旗罪人罷副都統任先是從征朝鮮武巴海以所轄戰艦不列汛地又往圍南漢山城移營時士卒離伍參領沙爾瑚達擊敗敵人又詭言不知論死得旨寬免至是與副都統武善征歸化城以本旗厮卒盜米徇隱不究論罪折贖四年七月卒無子分世職為三嗣子傅喀襲一等輕車都尉弟夏色姪錫漢分襲兩騎都尉舒賽子西蘭孫席特庫舒賽世居薩克達以地為氏後𨽻滿洲鑲藍旗天命四年從太祖高皇帝征明敗其總兵馬林等於尚間崖授騎都尉世職尋隨征瓦爾喀俘獲甚衆晉二等輕車都尉太宗文皇帝即位擢列十六大臣佐理鑲藍旗事天聰元年隨征朝鮮凱旋奉命同都統阿山等駐防義州八年太宗親統師征明以鄭親王濟爾哈朗留守盛京舒賽同副都統蒙阿圖等副之初舒賽率兵攻城輒被綿甲先登太祖嘉其勇又慮其輕進諭止之舒賽益奮勉前後攻克十六城至是賜敕晉三等男崇德六年十月卒世祖章皇帝順治十二年追諡壯敏立碑墓道子西蘭初任佐領天聰元年授騎都尉世職順治元年任護軍參領隨副都統鄂羅塞臣等征黑龍江生擒二十餘人尋隨豫親王多鐸討流賊李自成師次潼關賊衆抗拒西蘭三戰皆捷二年隨貝勒博洛征江南招降松江府復隨征福建攻克平和縣有功加一雲騎尉遇恩詔晉三等輕車都尉七年卒次子阿蘭襲西蘭長子席特庫崇德六年襲其祖舒賽三等男爵八年任參領隨鄭親王征明前屯衛同參領覺善等擊敗敵兵以炮克城斬其總兵李輔明順治元年隨大軍入山海關敗李自成兵進征山西助都統葉臣等攻克太原府二年隨英親王阿濟格𠞰賊陜西敗之於延安自成遁湖廣追𠞰至安陸與護軍統領鰲拜哈寧阿等連挫賊衆敘功晉二等男五年四月卒子常舒襲瑚什布子穆徹納瑚什布姓納喇葉赫貝勒錦台什之族人太祖高皇帝時來歸𨽻滿洲鑲藍旗任佐領時大貝勒代善屬下阿山阿達海等自負才勇以未遇任用欲他往率屬潛逃瑚什布隨貝勒阿敏追之射殪阿山二子阿山阿達海既入明邊仍來歸瑚什布尋任侍衛兼參領太宗文皇帝天聰二年從征通古索爾和部身中七創戰益力斬敵守將一敘功豫騎都尉世職八年從上征明大同與前鋒統領圖嚕什等擊敗明總兵祖大弼軍進攻萬全左衛明總兵曹文詔遣騎兵出城迎戰復設伏邀擊斬三十餘級生擒四人九年分設蒙古八旗都統擢瑚什布鑲藍旗蒙古都統崇德元年隨武英郡王阿濟格征明越燕京攻克定興縣城凱旋部議出邊時不整隊伍又不殿後致士卒十人為敵所殺罰銀六百兩革世職罷都統專任佐領三年授理藩院副理事官世祖章皇帝順治四年復騎都尉世職七年九月三遇恩詔晉世職至二等輕車都尉尋卒子泰庫襲職次子穆徹納初任護軍校順治三年七月隨豫親王多鐸討蘇尼特部逃人騰機斯擊敗喀爾喀兵四年任護軍參領六年隨英親王阿濟格征大同叛鎮薑瓖敗偽總兵劉偉思等賊衆進攻寧武關賊帥宜孟臣來援穆徹納與護軍統領藍拜擊敗其衆尋運紅衣炮至左衛城遇賊於吳家峪步戰擊却之十一年隨靖南將軍珠瑪喇征廣東敗明桂王將李定國於新會先是三遇恩詔豫騎都尉兼一雲騎尉世職至是敘功晉三等輕車都尉十三年閏三月卒子薩爾圖襲職席特庫席特庫滿洲鑲藍旗人世居佟佳以地為氏其父努顔自佟佳率屬來歸太祖高皇帝使管一佐領及卒席特庫襲父官太宗文皇帝天聰五年擢前鋒參領率兵至明錦州邊界襲擊明兵之諜者明兵尋犯耀州席特庫馳援郤敵兵七月復奉命至大凌河偵軍事有俘獲上聞明總兵祖大夀修築大凌河城親統大軍攻之指授方略令諸將固守汛地明兵出誘戰並進擊敵席特庫及正藍旗士卒徑抵城濠舍騎步戰禆將多貝戰殁席特庫奮入敵陳取多貝尸還九月大軍擊寧逺兵之赴援大凌河者既接戰我軍一卒墜馬席特庫領纛衝敵援之出六年與護軍參領鰲拜等略邊境擒三十人及降明蒙古五人以獻詔以所俘獲賜之八年正月與前鋒參領圖魯什等至錦州松山偵軍事有斬獲二月齎諭至錦州懸於十三站山坡以示祖大夀時察哈爾部人有散入蒙古席爾哈席伯圖地者四月席特庫奉命同蒙古布哈塔布囊等往略席爾哈席伯圖地斬七十餘級獲其户口及牲畜尋同卦爾察尼堪率兵二十人往濟農城躡明兵蹤迹至西拉木輪河遇降明蒙古百人席特庫設伏追擊盡殱之二人逸而奔席特庫射之殪其一一為我國諜者所獲是役也席特庫以二十人殱敵百人特賜甲胃以旌之八月隨大貝勒代善征明略大同敗明陽和守將騎兵九百獲馬六十餘大軍自陽和趨天城衛北席特庫設伏赤城踰月大軍趨左衛城復偕前鋒參領吳拜設伏宣府並多斬獲十一月敘功晉世職三等輕車都尉九年八月隨貝勒多爾衮略地山西自平魯衛入明寧武關守將率兵來偵席特庫迎戰斬首十餘級敵兵敗遁十一月與參領布顔等偵明兵於錦州旋與前鋒統領勞薩等躡明兵於冷口皆有功崇德二年齎敕諭祖大夀遂自廣寧入邊擒斬十餘人縱二人使齎諭還錦州三年九月隨貝勒嶽託征明至墻子領密雲兵突出席特庫同勞薩分兵擊敗其衆會日暮收兵獲巨炮二十餘明總督吳阿衡率兵來戰復敗之尋攻真定破明內監髙起潛兵追至運糧河三敗其軍敵兵夜犯鑲藍旗營席特庫偕佐領俄兑等奮勇力戰却敵四年與前鋒參領沙爾瑚達率將士略錦州界敗敵兵俘獲人口及牲畜六年三月隨鄭親王濟爾哈朗等圍錦州明人自杏山赴援鄭親王率師設伏席特庫以前鋒兵誘敵來戰佯敗走敵來追伏發席特庫還擊敵兵大敗之明總督洪承疇出兵松山城拒戰席特庫復與勞薩敗敵二隊躡擊至濠而返八月大兵復圍錦州承疇以軍十三萬赴援席特庫偕前鋒八參領與戰敗大同總兵王朴等軍承疇率敗軍奔塔山連戰敗北旋奔杏山席特庫橫衝馳突敵大奔潰我師追至筆架山斬四百餘級獲馬二百四十餘大纛六松山杏山二城兵有潛遁者席特庫與前鋒參領布爾遜等屢襲擊之先後追斬數百人獲馬駝七年二月大軍克松山城率前鋒兵駐塔山明寧逺兵千騎掩至席特庫合八旗兵追至連山有斬獲功十月貝勒阿巴泰征明入長城豫郡王多鐸率師往制寧逺錦州援兵席特庫從遇寧逺兵擊却之晝夜巡偵俘明兵十五人斬四十餘級以功晉二等輕車都尉旋合左右翼兵從界嶺口毁邊墻入敗明大同兵之往守山海關者既克長城明薊州總兵白騰蛟率步騎奔桃林關聞我師將攻薊州騰蛟以師馳還與馬蘭峪總兵白廣恩合師拒戰席特庫同前鋒參領瑚里布麾衆奮擊敗明兵數千陳擒參將一斬逰擊三獲馬六百餘順治元年四月隨睿親王多爾衮入關破流賊李自成偽將唐通於一片石六月都統葉臣率兵定山西九月世祖章皇帝命席特庫往助其軍至絳州渡河沉賊船十一月抵汾州平陽逼賊營賊出戰追斬四千餘級降賊將康元勳於西山寨進兵黑龍關復降明守備三員兵三千人二年自成遁入湖廣席特庫隨大軍追至安陸府斬四百餘級收獲戰艦敘功晉一等輕車都尉三年豫親王多鐸率師討蘇尼特部叛逃蒙古騰機思我軍自土喇河西行喀爾喀土謝圖及碩雷諸蒙古各以兵遮截席特庫率衆奮擊追奔數十里斬獲無算四年敘功加一雲騎尉七年詔録敘舊臣晉爵三等男豫世襲九年恩詔晉一等男康熙五年三月卒年七十賜祭葬子塞爾古德襲巴泰巴泰漢軍鑲藍旗人姓金氏天聰五年任二等侍衛從太宗文皇帝征明圍大凌河城明兵自錦州趨援我師迎戰侍衛尼牙漢中傷墜馬巴泰馳入敵陳援之以出六年從征明大同敵馳射我參領席特庫巴泰突前衝擊敵遁走崇德元年隨睿親王多爾衮征明至沙河生擒哨騎一斬九人獲馬八我偵敵者至楊村為敵所困巴泰馳擊斬其一人敵潰走旋師出邊率十人偵敵三屯營敵有奪我馬馳去者巴泰追斬之取馬以歸六年隨鄭親王濟爾哈朗征明錦州敗其總督洪承疇兵比還巴泰殿後敵追者猝及面中流矢仍躍馬揮刃斬一人敵乃郤上嘉其善戰併録前勞授雲騎尉世職尋擢一等侍衛世祖章皇帝順治二年以勞績久著晉世職為騎都尉尋遇恩詔加一雲騎尉時睿親王攝政內大臣索尼侍衛巴哈護軍統領鰲拜並以弗附睿親王坐罪罷任降罰有差巴泰亦弗附睿親王王問以鰲拜索尼相善否巴泰對弗知又問爾與索尼善否對曰我二人同直相善於是罪以偽稱弗知削雲騎尉世職並罰鍰世祖既親政復世職屢遇恩詔晉至二等輕車都尉十五年命列散秩大臣旋擢內大臣聖祖仁皇帝康熙三年擢國史院大學士賜敕嘉其曩日不附睿親王克抒忠悃晉爵三等男六年充纂修世祖實録總裁官時鰲拜輔政惡巴泰不附已會以輔政大臣蘇克薩哈論事齟齬搆陷其罪集衆定讞慮巴泰有異議弗使與聞七年二月巴泰以疾解任八年五月鰲拜獲罪逮繫上召巴泰授祕書院大學士仍充實録總裁官九年十一月改內院為殿閣以巴泰為中和殿大學士兼吏部尚書又賜敕嘉其忠藎勤勞晉爵一等子十一年以實録告成賜銀幣鞍馬加太子太傅十三年以疾乞休詔解任調理十四年命仍入閣辦事十六年七月引年乞休奉旨卿以年邁請休情辭懇切準原品致仕念卿宣力有年清端勤慎以朕所御冠服特賜與卿用旌老臣昭朕始終眷念十九年復起為正黃旗漢軍都統二十三年乞解任得旨俞允仍命以內大臣銜與朝請二十九年卒豫祭葬如典禮諡文恪子蘇赫襲爵愛音塔穆愛音塔穆滿洲鑲藍旗人姓戴佳一等男穆克談之長子也太宗文皇帝天聰六年襲父爵九年以穆克談舊轄人户益以壯丁五十授愛音塔穆為世管佐領世祖章皇帝順治元年四月隨睿親王多爾衮入山海關擊敗流賊李自成十月豫親王多鐸奉命赴河南討賊愛音塔穆同副都統沙爾瑚達屢破賊兵追至潼關賊來犯我師者三愛音塔穆殿後連擊敗之明年大軍既定河南進克江寧愛音塔穆並在事有功六年八月隨鄭親王濟爾哈朗征湖廣時明桂王朱由榔據武岡湖南郡邑半附之愛音塔穆率兵至寶慶擊走偽總兵馬進忠王進才復其城流賊劉體純亦附由榔遣其黨袁宗第等列十寨於沅州之洪江鎮隔岸拒守愛音塔穆與尚書阿哈尼堪督兵渡江連破賊寨賊悉奔潰遂與阿哈尼堪駐守沅州十二月賊將王強犯沅州復與阿哈尼堪擊敗其衆十一年由榔將李定國陷新會時平南王尚可喜等先率兵往援定國擁兵四萬餘列象炮據山峪為戰守計愛音塔穆隨靖南將軍珠瑪喇至廣東率兵協𠞰奮勇衝擊大破賊衆追擊二十餘里定國遁走先是愛音塔穆三遇恩詔晉爵至二等子至是敘功豫騎都尉世職合為一等子加一雲騎尉康熙十九年正月卒賜祭葬如例子公圖襲三十五年隨撫逺大將軍伯費揚古征噶爾丹敗賊於昭莫多加一雲騎尉合所襲之爵為三等伯三十九年卒子噶敏圖襲都爾德父阿爾岱都爾德滿洲鑲藍旗人姓覺爾察安費揚古之孫也父阿爾岱任佐領天命十年率兵戍耀州禦敵有功授騎都尉世職天聰五年從征大凌河殁於陳恤贈三等輕車都尉都爾德於天聰八年襲職順治元年正月任刑部理事官四月隨睿親王多爾衮進山海關擊敗流賊李自成十月豫親王多鐸統師征陜西都爾德署護軍統領以從十二月至陜州見流賊據山巔即率衆先攻拔其營還軍殿後賊來追戰却之明日設伏潼關賊至斬獲無算二年正月賊將劉方亮合千餘衆逼我營都爾德同護軍統領圖賴等率兵迎擊賊衆潰走尋隨大軍由河南下江南破明兵於揚州城北獲戰艦百餘既克江寧明福王朱由嵩奔蕪湖復率兵邀截之江口俘斬大捷三年十一月隨端重親王博洛平浙江進師福建與前鋒參領拜音岱攻建寧延平二府下之明唐王朱聿鍵遁走汀州同護軍統領阿濟格尼堪率兵進攻擒斬聿鍵及其官屬遂定汀州五年九月鄭親王濟爾哈朗統師討湖廣流賊李錦等都爾德從征所至有功六年十二月流賊王強犯沅州同尚書阿哈尼堪率兵破之斬偽副將三人殱其衆獲馬數千七年凱旋授護軍統領八年命為議政大臣先是兩敘軍功晉世職為一等輕車都尉至是遇恩詔加一雲騎尉九年再遇恩詔晉一等男康熙三年七月卒豫祭葬如典禮諡忠襄子席布襲爵欽定八旗通志卷一百七十八
