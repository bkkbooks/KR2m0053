body:
  text: 旗分志十二八旗佐領十二鑲紅旗滿洲佐領鑲紅旗滿洲佐領上一參領至三參領鑲紅旗滿洲都統所屬參領五第一參領下佐領十八第二參領下佐領十七第三參領下佐領十七第四參領下佐領十八第五參領下佐領十七第一參領第一佐領係康熙十一年以産齊布佐領內喀勒沖義族人編一佐領始以員外郎五十八管理五十八故以其子蘇喇章京漢文稱散騎郎佛保管理佛保故以一等護衛延夀管理延夀緣事革職以侍讀學士朱臣管理朱臣故以都統瑚什圖管理瑚什圖緣事革職以副都統達爾占管理達爾占分𨽻惠郡王屬下以護軍統領兼副都統布大世管理布大世緣事革職以監察御史瑚辛泰管理瑚辛泰緣事革職以員外郎音注管理音注緣事革職以一等護衛常鼐管理常鼐故以二等侍衛阿林太管理阿林太故以護軍統領清保管理清保升任以護軍副參領陶清管理陶清升任以騎都尉兼藍翎侍衛博啓圖管理博啓圖故以郎中圖善管理圖善故以護軍副參領常凱管理常凱故以詹事府右庶子那穆竒禮管理那穆竒禮故以員外郎海寧管理海寧升任以都司巴踫阿管理巴踫阿故以雲騎尉兼印務章京達祿管理第一參領第二佐領係國初以葉赫地方來歸人丁編立始以霸竒蘭管理霸竒蘭出征傷歿以其次子固山額真後改固山按班漢文稱都統拜三管理拜三故以霸竒蘭之孫一等護衛郎圖管理郎圖故以霸竒蘭之二世孫郎中色冷管理色冷因病辭退以霸竒蘭之孫官保管理官保故以霸竒蘭之二世孫翰林院侍讀拉錫希布管理拉錫希布故以其子署副參領富德管理富德緣事革退以其子富隆額管理富隆額故以其子薩炳阿管理薩炳阿故以其子雙索管理雙索故以其伯髙祖之四世孫二等侍衛齊克唐阿管理第一參領第三佐領係第二佐領內餘丁康熙六年分出一佐領以霸竒蘭之孫一等護衛色爾古冷管理色爾古冷因病告退以其子瑪瑚色管理瑪瑚色故以其子保明管理保明故以其子扎拉芬管理扎拉芬故以其子佟安管理第一參領第四佐領係第二第三兩佐領內餘丁康熙二十二年色冷瑪瑚色管佐領時分編一佐領以其族孫副都統朱車管理朱車故以霸竒蘭之二世孫精竒尼哈畨漢文稱子衆神保管理衆神保因病辭退以其子保德管理保德故以霸竒蘭之二世孫富昌管理富昌緣事革退以霸竒蘭之四世孫三等精竒尼哈畨兼副參領何申管理何申緣事革退以傅達禮管理傅達禮故以其子武臣管理第一參領第五佐領亦係國初編設始以拖沙喇哈畨漢文稱雲騎尉兼梅勒章京漢文稱副都統鄂拜管理鄂拜故以其次子萬津管理萬津故以其子三等侍衛八十五管理八十五故以其弟常保管理常保故以其弟存保管理存保故以其繼子常明管理常明革退以其伯祖之孫富亮管理富亮故以其子敦住管理敦住故以其子書隆阿管理書隆阿故以其叔髙祖之二世孫常林管理國謹案此佐領原係齊所屬人丁編立後因告碩它初將三壇扎爾呼貝勒將三壇扎爾呼齊擡于正藍旗令衮塔錫管理衮塔錫革退始令鄂拜管理由鄂拜至敦柱伊旨敦家連襲八次乾隆三十一年奉又資分二佐領著柱承襲之佐領伊家襲過八次施恩作為世管佐領第一參領第六佐領係第五佐領內餘丁康熙十三年萬津管佐領時分出一佐領以鄂拜之弟護軍參領墨勒管理墨勒從征陳亡以鄂拜長子副都統兼議政大臣阿爾虎管理阿爾虎亦從征陳亡以其弟一等阿達哈哈畨漢文稱輕車都尉兼一拖沙喇哈畨法克進管理法克進故以阿爾虎之子三等阿達哈哈番玻璃管理玻璃故以其子佛保管理佛保故以其叔祖之子拜他喇布勒哈番漢文稱騎都尉兼一拖沙喇哈番副步軍校來格管理來格緣事革退以其弟索住管理索住故以其弟富明阿管理富明阿故以其伯祖之二世孫德清額管理德清額故以其叔曽祖之二世孫蘇沖阿管理蘇沖阿故以其子福喜管理第一參領第七佐領係第五第六兩佐領內餘丁康熙二十四年八十五法克進管佐領時分出一佐領以墨勒之子拜他喇布勒哈番兼一拖沙喇哈番華善管理華善故以其兄之子一等阿達哈哈番兼一拖沙喇哈番法立管理法立緣事革退以萬津之孫七十三管理七十三故以其弟富良管理富良緣事降調以其兄之繼子三等阿達哈哈番德喜管理德喜故以其子穆通阿管理謹案此佐領乾隆四十三年奏準作為族中承襲佐領第一參領第八佐領係國初以卦勒察地方來歸人丁編立始以他那喀管理他那喀從征陳亡以其弟他可柱管理他可柱故以他那喀之子拜他喇布勒哈番朱爾堪管理朱爾堪故以他可柱之子二等護衛鄂竒管理鄂竒因病告退以其弟驍騎校庫爾布什管理庫爾布什因病告退以鄂竒之子監察御史永泰管理永泰升任布政使以其子二等護衛常魁管理常魁因病告退以他可柱之二世孫拜他喇布勒哈番兼散騎郎李保柱管理李保柱告退以其伯曽祖之三世孫世芳管理世芳故以其子造保管理造保故以其子福廣管理第一參領第九佐領係第八佐領內餘丁康熙二十三年分編一佐領以庫爾布什兄之子四品典儀西泰管理西泰故以其弟四格管理四格因病告退以他那喀弟之子員外郎巴爾圖管理巴爾圖故以其兄之子一等阿達哈哈番鐵丹管理鐵丹緣事革退以其子巴揚阿管理巴揚阿緣事革退以巴爾圖之子護軍校三雅圖管理三雅圖故以其子伊靈阿管理伊靈阿故以其子蘇沖阿管理蘇沖阿故以其伯髙祖之五世孫吉勒通阿管理第一參領第十佐領係國初以查昆莫地方來歸人丁編立始以阿爾布尼管理阿爾布尼故以其兄艾塔之子壯尼大漢文稱護軍校伊爾格尼管理伊爾格尼年老告退以其