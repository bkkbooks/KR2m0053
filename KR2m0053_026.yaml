body:
  text: 旗分志十二八旗佐領十二鑲紅旗滿洲佐領鑲紅旗滿洲佐領上一㕘領至三㕘領鑲紅旗滿洲都統所屬㕘領五第一㕘領下佐領十八第二㕘領下佐領十七第三㕘領下佐領十七第四㕘領下佐領十八第五㕘領下佐領十七第一㕘領第一佐領係康熙十一年以産齊布佐領内喀勒冲義族人編一佐領始以員外郎五十八管理五十八故以其子蘇喇章京漢文稱散騎郎佛保管理佛保故以一等䕶衛延夀管理延夀縁事革職以侍讀學士朱臣管理朱臣故以都統瑚什圖管理瑚什圖縁事革職以副都統達爾占管理達爾占分𨽻恵郡王屬下以䕶軍統領兼副都統布大世管理布大世縁事革職以監察御史瑚辛泰管理瑚辛泰縁事革職以員外郎音注管理音注縁事革職以一等䕶衛常鼐管理常鼐故以二等侍衛阿林太管理阿林太故以䕶軍統領清保管理清保陞任以䕶軍副㕘領陶清管理陶清陞任以騎都尉兼藍翎侍衛博啟圖管理博啟圖故以郎中圖善管理圖善故以䕶軍副㕘領常凱管理常凱故以詹事府右庶子那穆竒禮管理那穆竒禮故以員外郎海寧管理海寧陞任以都司巴踫阿管理巴踫阿故以雲騎尉兼印務章京達禄管理第一㕘領第二佐領係國初以葉赫地方來歸人丁編立始以霸竒蘭管理霸竒蘭出征傷歿以其次子固山額真後改固山按班漢文稱都統拜三管理拜三故以霸竒蘭之孫一等䕶衛郎圖管理郎圖故以霸竒蘭之二世孫郎中色冷管理色冷因病辭退以霸竒蘭之孫官保管理官保故以霸竒蘭之二世孫翰林院侍讀拉錫希布管理拉錫希布故以其子署副㕘領富徳管理富徳縁事革退以其子富隆額管理富隆額故以其子薩炳阿管理薩炳阿故以其子雙索管理雙索故以其伯髙祖之四世孫二等侍衛齊克唐阿管理第一㕘領第三佐領係第二佐領内餘丁康熙六年分出一佐領以霸竒蘭之孫一等䕶衛色爾古冷管理色爾古冷因病告退以其子瑪瑚色管理瑪瑚色故以其子保明管理保明故以其子扎拉芬管理扎拉芬故以其子佟安管理第一㕘領第四佐領係第二第三兩佐領内餘丁康熙二十二年色冷瑪瑚色管佐領時分編一佐領以其族孫副都統朱車管理朱車故以霸竒蘭之二世孫精竒尼哈畨漢文稱子衆神保管理衆神保因病辭退以其子保徳管理保徳故以霸竒蘭之二世孫富昌管理富昌縁事革退以霸竒蘭之四世孫三等精竒尼哈畨兼副㕘領何申管理何申縁事革退以傅達禮管理傅達禮故以其子武臣管理第一㕘領第五佐領亦係國初編設始以拖沙喇哈畨漢文稱雲騎尉兼梅勒章京漢文稱副都統鄂拜管理鄂拜故以其次子萬津管理萬津故以其子三等侍衛八十五管理八十五故以其弟常保管理常保故以其弟存保管理存保故以其繼子常明管理常明革退以其伯祖之孫富亮管理富亮故以其子敦住管理敦住故以其子書隆阿管理書隆阿故以其叔髙祖之二世孫常林管理國謹案此佐領原係齊所屬人丁編立後因告碩它初将三壇扎爾呼貝勒将三壇扎爾呼齊擡于正藍旗令衮塔錫管理衮塔錫革退始令鄂拜管理由鄂拜至敦柱伊㫖敦家連襲八次乾隆三十一年奉又資分二佐領著柱承襲之佐領伊家襲過八次施恩作為世管佐領第一㕘領第六佐領係第五佐領内餘丁康熙十三年萬津管佐領時分出一佐領以鄂拜之弟䕶軍㕘領墨勒管理墨勒從征陣亡以鄂拜長子副都統兼議政大臣阿爾虎管理阿爾虎亦從征陣亡以其弟一等阿達哈哈畨漢文稱輕車都尉兼一拖沙喇哈畨法克進管理法克進故以阿爾虎之子三等阿達哈哈番玻璃管理玻璃故以其子佛保管理佛保故以其叔祖之子拜他喇布勒哈番漢文稱騎都尉兼一拖沙喇哈番副步軍校來格管理來格縁事革退以其弟索住管理索住故以其弟富明阿管理富明阿故以其伯祖之二世孫徳清額管理徳清額故以其叔曽祖之二世孫蘇冲阿管理蘇冲阿故以其子福喜管理第一㕘領第七佐領係第五第六兩佐領内餘丁康熙二十四年八十五法克進管佐領時分出一佐領以墨勒之子拜他喇布勒哈番兼一拖沙喇哈番華善管理華善故以其兄之子一等阿達哈哈番兼一拖沙喇哈番法立管理法立縁事革退以萬津之孫七十三管理七十三故以其弟富良管理富良縁事降調以其兄之繼子三等阿達哈哈番徳喜管理徳喜故以其子穆通阿管理謹案此佐領乾隆四十三年奏准作為族中承襲佐領第一叅領第八佐領係國初以卦勒察地方來歸人丁編立始以他那喀管理他那喀從征陣亡以其弟他可柱管理他可柱故以他那喀之子拜他喇布勒哈番朱爾堪管理朱爾堪故以他可柱之子二等䕶衛鄂竒管理鄂竒因病告退以其弟驍騎校庫爾布什管理庫爾布什因病告退以鄂竒之子監察御史永泰管理永泰陞任布政使以其子二等䕶衛常魁管理常魁因病告退以他可柱之二世孫拜他喇布勒哈番兼散騎郎李保柱管理李保柱告退以其伯曽祖之三世孫世芳管理世芳故以其子造保管理造保故以其子福廣管理第一㕘領第九佐領係第八佐領内餘丁康熙二十三年分編一佐領以庫爾布什兄之子四品典儀西泰管理西泰故以其弟四格管理四格因病告退以他那喀弟之子員外郎巴爾圖管理巴爾圖故以其兄之子一等阿達哈哈番鐵丹管理鐵丹縁事革退以其子巴揚阿管理巴揚阿縁事革退以巴爾圖之子䕶軍校三雅圖管理三雅圖故以其子伊靈阿管理伊靈阿故以其子蘇冲阿管理蘇冲阿故以其伯髙祖之五世孫吉勒通阿管理第一㕘領第十佐領係國初以查昆莫地方來歸人丁編立始以阿爾布尼管理阿爾布尼故以其兄艾塔之子壮尼大漢文稱䕶軍校伊爾格尼管理伊爾格尼年老告退以其叔父阿布濟之子瑚什管理瑚什故以其伯父阿爾布尼之子壯尼大達都管理達都陞任盛京副都統以伊爾格尼之子一等䕶衛阿爾法管理阿爾法故以阿爾布尼之孫驍騎校尼什哈管理尼什哈故以達都之子員外郎僧額管理僧額故以其子二等䕶衛六十管理六十故以尼什哈之孫二等䕶衛興夀管理興夀故以其子雙全管理雙全故以其子全禄管理第一㕘領第十一佐領係第十佐領内餘丁康熙二十三年僧額管佐領時分出一佐領以阿禧之孫主事穆臣管理穆臣故以阿爾布尼之孫索代管理索代故以其子星禧管理星禧縁事革職以阿禧之孫鳴贊清璽管理清璽故以其子筆帖式貴保管理貴保故以其子藍翎侍衛吉福管理第一㕘領第十二佐領亦係第十佐領内餘丁康熙十一年尼什哈管佐領時分出一佐領以伊爾格尼之孫壯尼大格蘭管理格蘭故以阿爾法之子監生星峩特管理星峩特故以其子書保管理書保陞任以其伯祖之二世孫圖克善管理圖克善故以其叔祖之二世孫秀山管理秀山故以其子他芳阿管理第一㕘領第十三佐領係第十二佐領内餘丁康熙二十三年星峩特管佐領時分出一佐領以伊爾格尼之孫監生色得禮管理色得禮故以其子洗馬色爾圖管理色爾圖縁事革職以格蘭之子鳴贊文清管理文清故以其叔父之子助教常徳管理常徳故以其叔祖之孫永住管理永住故以其子伊克塔哈管理伊克塔哈故以其伯曽祖之三世孫慶住管理慶住故以其子徳林管理徳林故以其叔髙祖之孫圖克善管理圖克善故以其子慶善管理第一㕘領第十四佐領係國初以尼馬察地方來歸人丁編立始以瑚球管理瑚球故以其兄之子顧濟納管理顧濟納從征陣亡以其弟宜勒慕管理宜勒慕故以其子三等阿達哈哈番根特管理根特故以其弟三等侍衛西揚古管理西揚古縁事革退以其兄一等阿達哈哈番兼一拖沙喇哈番蟾齊布管理蟾齊布故以其兄之子筆帖式阿什布管理阿什布縁事革退以蟾齊布之子筆帖式喜察管理喜察縁事革退以其弟一等阿達哈哈番赫圖管理赫圖因病辭退以其子廕生扎勒管理扎勒故以其子伊昌阿管理伊昌阿故以其子常永管理第一㕘領第十五佐領係康熙三十四年以常鼐福徳赫紳常明徳喜扎親鈕楚赫噶爾泰石哥阿爾素十佐領餘丁編立始以長史西特庫管理西特庫縁事革退以一等阿達哈哈番瑚世㧞管理瑚世㧞年老告退以一等䕶衛色爾古得管理色爾古得縁事革退以刑部侍郎覺和托管理覺和托縁事革退以富明管理富明故以䕶軍㕘領鐵坦管理鐵坦告退以副都統富鼐管理富鼐出差以輕車都尉田保管理田保告退以前鋒侍衛兼騎都尉又一雲騎尉阿哈那管理阿哈那故以印務章京阿克精阿管理阿克精阿陞任以驍騎校勒立善管理勒立善陞任以副都統保成管理保成陞任以步軍校達冲阿管理第一㕘領第十六佐領係康熙十三年以何倫覺羅西旦兩佐領餘丁編立始以輔國將軍宗室恩克布管理恩克布故以一等侍衛覺羅托倫管理托倫陞任右衛䕶軍㕘領以阿達哈哈番兼䕶軍㕘領覺羅烏爾虎管理烏爾虎故以詹事府庶子黨阿賴管理黨阿頼因疾告退以䕶軍㕘領達爾占管理達爾占休致以步軍尉遂保管理遂保故以吏部郎中富海管理富海縁事革退以額勒登布管理額勒登布故以鳥鎗㕘領雅爾賽管理雅爾賽故以䕶軍㕘領什格管理什格故以侍郎吳吉管理吳吉告退以員外郎明善管理明善陞任以員外郎樂保管理樂保陞任以捕盗章京圖敏管理圖敏陞任以捕盜章京永舒管理第一㕘領第十七佐領亦係國初編立始以覺羅瓦爾喀管理瓦爾喀故以其長子一等阿達哈哈番兼一拖沙喇哈番阿三管理阿三故以其叔父之孫三等阿達哈哈番兼宗人府郎中覺羅西佛管理西佛故以瓦爾喀之子都統覺羅伊勒門管理伊勒門故以其叔父之子副都統覺羅西布管理西布故以其伯父之子一等侍衛覺羅西旦管理西旦年老告退以其兄之孫三等阿達哈哈番管理䕶軍㕘領事兼蘇喇章京覺羅瓦喇達管理瓦喇達故以其子副䕶軍㕘領覺羅外東管理外東陞任右衛協領以其子覺羅七十管理七十故以其子蘇蘭太管理蘇蘭太故以其子松海管理第一㕘領第十八佐領係第十七佐領内餘丁康熙三十四年西旦管佐領時分編一佐領以其叔父之孫三等侍衛覺羅納申管理納申故以西旦叔父之子三等阿達哈哈番覺羅勒爾特管理勒爾特故以其兄之孫三等阿達哈哈番覺羅哈爾遜管理哈爾遜故以其子覺羅増夀管理増夀革退以西旦叔父之二世孫拖沙喇哈畨兼副䕶軍㕘領覺羅安夀管理安夀縁事發遣以西旦兄之孫覺羅滿秀管理滿秀故以覺羅伊勒圖管理第二㕘領第一佐領係天聰八年編立始以固山額真後改固山按班葉臣管理葉臣故以其子都統車爾布管理車爾布故以其弟副都統車倫管理車倫故以其子都統車納富管理車納富故以其弟一等侍衛永福管理永福故以其兄之子齊克他哈管理齊克他哈故以其子明住管理明住故以其子武林保管理第二㕘領第二佐領係第一佐領内餘丁康熙二十六年車納富管佐領時分編一佐領以其伯父車爾布之次子車爾特管理車爾特縁事革職以其兄都統莽喀管理莽喀陞任荆州將軍以其子圖善管理圖善因病告退以車爾特之子廕生揚泰管理揚泰故以莽喀之子三等伯圖禄管理圖禄縁事革退以徹爾素管理徹爾素故以其子徹舒管理徹舒故以其伯曽祖之二世孫恒宜管理恒宜故以其叔曽祖之三世孫舒爾那管理舒爾那故以其子那齊魁管理第二㕘領第三佐領係康熙八年編立始以托洛㑹之子舒書管理舒書故以其弟長史哈那密管理哈那密故以其子積徳管理