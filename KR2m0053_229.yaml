body:
  text: 欽定四庫全書欽定八旗通志卷二百十五人物志九十五忠義傳七滿洲八旗七至十六年共一百五十一人康熙十五年愛圖愛圖滿洲鑲黄旗人姓勒第氏世居黑龍江康熙十三年以前鋒校隨定逺平冦大將軍安親王岳樂征逆藩吳三桂有功十五年復從征至長沙府擊賊殁於陣賞䘏如例納星額納星額滿洲鑲黄旗人署䕶軍校康熙十三年隨順承郡王勒爾錦征逆藩吳三桂十五年六月至湖廣永興擊賊陣亡賞䘏如例圖福納圖福納滿洲鑲黄旗人署䕶軍校康熙十五年從征南將軍穆占擊吳逆偽將馬寳胡國柱等於永興戰殁賞䘏如例幽徳赫幽徳赫滿洲鑲黄旗人姓葛濟勒氏世居綏分以佐領駐防荆州康熙十五年總督李之芳平南將軍賴塔㑹同奉命大將軍和碩康親王傑書進剿衢州幽徳赫從事行間敗賊馬九玉於大溪灘等處進取江山縣力戰殁於陣恩賜雲騎尉世職承襲詳見世職表瓦爾達瓦爾達滿洲鑲黄旗人姓𤓰勒佳氏世居哈達地方任前鋒㕘領順治二年隨大兵出征浙閩至枯竹擊敗偽都司何楚儒賊衆千餘康熙十五年隨副都統瑪哈達攻建陽復擊敗偽王總兵賊衆三千餘至城門力戰死恩賜雲騎尉世職承襲詳見世職表英格英格滿洲鑲黄旗人姓鈕祜禄氏世居長白山任三等侍衛康熙十三年出鎮宣府十五年從征陕西至洪城黄河岸擊賊殁於陣賞䘏如例赫西根赫西根滿洲鑲黄旗人姓覺羅氏世居盛京康熙十五年以驍騎校從寧海將軍富喇塔征耿逆於浙江至太平山與賊力戰殁於陣恩賜雲騎尉世職承襲詳見世職表阿岱阿岱滿洲鑲黄旗人姓布爾哈齊氏世居烏魯特地方順治十五年以雲騎尉從征雲南貴州至魯噶偽晉王李定國率衆拒敵阿岱隨大兵進擊連敗之康熙十五年隨安逺靖冦大將軍貝勒尚善征逆藩吳三桂至湖廣岳州賊將吳應麒柯鐸髙起龍廖進忠等率兵四萬餘拒戰奮擊陣亡恩賜雲騎尉世職承襲詳見世職表邁圖邁圖滿洲鑲黄旗人姓富察氏世居訥殷初任七品官康熙十三年王師征逆藩吳三桂邁圖從征至湖廣興國州陳朱二姓賊首率衆六千餘於江西鄱陽湖之岔口村十五里拒戰邁圖率本㕘領兵隨大軍敗之又敗賊渠陳留音朱重仁等於鄱陽湖之艾影山又擊賊三百餘艘於鄱陽湖之灞口敗其衆十五年從定逺平冦大將軍安親王岳樂擊吳逆偽將軍夏國相李良棟等於袁州萍鄉縣東之来龍山中創陣亡恩賜雲騎尉世職承襲詳見世職表倭赫倭赫滿洲鑲黄旗人康熙十五年以雲騎尉隨寜海將軍富喇塔平南將軍頼塔等征福建至海澄海冦偽將軍劉國軒方煽亂倭赫率兵力戰陣亡恩賜騎都尉世職承襲詳見世職表富喀富喀滿洲鑲黄旗人任前鋒校康熙十五年隨康親王傑書征福建海冦鄭成功與賊將劉國軒力戰陣亡賞䘏如例額宜圖額宜圖滿洲鑲黄旗人姓勒忒氏世居黒龍江任前鋒校康熙十四年從征逆藩耿精忠於江西偽伯樂燦踞宜黄挑濠拒戰同侍郎舒恕擊敗之十五年隨安親王岳樂征逆藩吳三桂至湖廣長沙力戰殁於陣恩賜雲騎尉世職承襲詳見世職表依蘇依蘇滿洲鑲黄旗人姓伊爾根覺羅氏世居松阿里烏喇地方康熙十六年吳逆偽將軍馬雄董仲民率賊兵犯廣東依蘇以七品官隨大兵擊賊於電白縣陣亡恩賜雲騎尉世職承襲詳見世職表巴特瑪巴特瑪滿洲鑲黄旗人姓龔吉爾氏世居厄魯特地方初任佐領康熙十三年逆藩耿精忠之偽將羅都督率賊萬餘来犯江南績溪縣巴特瑪隨江寧將軍額楚擊却之又敗賊於洞庭橋進至馳臺嶺追擊賊兵於休寧縣之新嶺尋從大兵剿江西饒州府擊賊兵於樂平縣段家村雲起峯等處至鄱陽湖賊將率五千餘人乗船三百餘艘来犯我軍復擊敗之又敗偽都督兵於石頭街河岸偽總督姜徳洪率賊五萬餘於弋陽縣修立木城以拒我師復連結偽總兵柯勝等五千餘賊倚為聲勢巴特瑪挺身躍戰力破其壘克復弋陽至貴溪又敗偽總兵郭先張文孝等賊於艾山西行至吉安復敗賊三千餘人十六年踰大庾嶺進攻廣東韶州府擊賊帥馬寳胡國柱於蓮花山中傷陣亡恩賜雲騎尉世職承襲詳見世職表隂達渾隂達渾滿洲鑲黄旗人姓喜塔臘氏世居尼雅滿山地方由前鋒校從征雲南有功授雲騎尉康熙十六年隨征南將軍穆占征湖廣與偽將軍馬寳力戰於巖山嶺陣亡恩賜騎都尉世職承襲詳見世職表瑪海瑪海滿洲鑲黄旗人姓章佳氏世居札魯特地方任驍騎校部委㕘領康熙十六年隨征南將軍穆占征逆藩吳三桂至湖廣永興之巖山嶺擊偽將軍馬寳胡國柱等力戰陣亡賞䘏如例四格色四格色滿洲鑲黄旗人姓兆佳氏世居穆呼任驍騎校署副㕘領從江寧將軍額楚征逆藩吳三桂康熙十六年於江西吉安擊賊陣亡恩賜雲騎尉世職承襲詳見世職表覺羅郭和里覺羅郭和里滿洲鑲黄旗人康熙十五年以委署㕘領隨定逺平冦大將軍安親王岳樂征逆藩吳三桂十六年二月至長沙擊其偽總兵於瀏陽陣亡賞䘏如例騰克騰克滿洲鑲黄旗人康熙十三年以驍騎校從征逆藩吳三桂十六年隨江寧將軍額楚於廣東韶州蓮花山與偽將軍馬寳力戰陣亡恩賜雲騎尉世職承襲詳見世職表花色花色滿洲鑲黄旗人姓薩馬拉氏世居寧古塔地方康熙十五年以驍騎校隨撫逺大將軍圖海征叛逆王輔臣十六年進征逆藩吳三桂至四川保寧蟠龍山擊賊陣亡恩賜雲騎尉世職承襲詳見世職表託託滿洲鑲黄旗人姓𤓰勒佳氏世居烏喇委署䕶軍校康熙十三年隨順承郡王勒爾錦征湖廣十六年至荆州太平莊遇賊力戰陣亡賞䘏如例西扎布西扎布滿洲鑲黄旗人任驍騎校康熙十六年隨征南將軍穆占征湖廣至永興與賊將馬寳胡國柱等力戰陣亡賞䘏如例薩音達理薩音達理滿洲鑲黄旗人姓費莫氏世居薩齊庫任八品官康熙十六年隨江寧將軍額楚征逆藩吳三桂至廣東韶州府力戰殁於陣恩賜雲騎尉世職承襲詳見世職表諾莫渾諾莫渾滿洲鑲黄旗人姓伊圖馬氏世居葉赫科爾沁地方順治十七年從征山東土賊同四旗兵進攻以第二人登寨克之康煕十六年征逆藩吳三桂隨䕶軍統領哈克山於永興縣擊賊哈克山殁於陣諾莫渾奮勇衝入奪哈克山屍既出復入奪我纛遂殁於陣恩賜雲騎尉世職承襲詳見世職表格克禮格克禮滿洲鑲黄旗人姓兀札喇氏世居薩哈爾察地方康熙十六年以七品官從侍郎覺羅舒恕征逆藩吳三桂至廣東電白縣偽將軍馬雄董仲民等率賊来拒格克禮奮勇進戰殁於陣恩賜雲騎尉世職承襲詳見世職表索爾敦索爾敦滿洲鑲黄旗人姓伊拉里氏世居哈爾敏任䕶軍校康熙十七年五月十六日隨征逆藩吳三桂至湖廣永興與偽將馬寳胡國柱等戰於沿山嶺陣亡恩賜雲騎尉世職承襲詳見世職表和託和託滿洲鑲黄旗人姓富察氏世居訥殷江地方襲職騎都尉兼一雲騎尉康熙十七年從征廣西至藤縣偽將軍呉世琮馬承䕃等率賊拒敵和託奮勇力戰殁於陣恩賜三等輕車都尉世職承襲詳見世職表花山花山滿洲鑲黄旗人任驍騎校康熙十七年隨將軍賴塔征四川與賊力戰陣亡賞䘏如例穆成額穆成額滿洲鑲黄旗人署䕶軍校康熙十七年隨將軍穆占征逆藩吳三桂至湖廣長沙府擊賊殁於陣賞䘏如例勒特熙勒特熙滿洲鑲黄旗人姓伊爾根覺羅氏世居嘉水湖康熙十四年以二等侍衛兼副䕶軍㕘領隨撫逺大將軍圖海征陕西逆提督王輔臣定平涼固原等處又自陕西隨征南將軍穆占禦逆藩吳三桂於湖廣十六年三月攻長沙偽將軍吳國貴等率衆數萬来拒勒特熙奮勇進戰中傷殁十七年恩賜雲騎尉世職承襲詳見世職表禪布禪布滿洲正黄旗人世居庫爾喀署䕶軍校康熙十五年隨安親王岳樂征逆藩吳三桂與偽將軍吳國貴戰於長沙陣亡賞䘏如例强謙强謙滿洲正黄旗人姓鄂卓氏世居撤哈連烏喇康熙十三年以親軍校駐防湖廣有賊二千来犯引兵擊却之十五年從安逺靖冦大將軍貝勒尚善征逆藩呉三桂至岳州偽帥呉應麒髙起龍馬寳等率衆七萬来犯强謙奮勇突入賊陣身被重創殁於陣恩賜雲騎尉世職承襲詳見世職表逹林逹林滿洲正黄旗人姓覺羅氏世居盛京以七品官委署叅領隨揚威大將軍簡親王喇布征逆藩吳三桂康熙十五年十二月進攻江西抵吉安擊賊於螺子山殁於陣恩賜雲騎尉世職承襲詳見世職表善泰善泰滿洲正黄旗人任驍騎校委署叅領駐防杭州康熙十五年總督李之芳平南將軍頼塔調隨杭州副都統倭申巴圖魯㑹剿衢州賊馬九玉於大溪灘敗之進取江山縣力戰殁於陣賞䘏如例懐色懐色滿洲正黄旗人姓賢逹禪氏世居松花江地方康熙十四年四月從征逆藩耿精忠至浙江遇賊將周烈桑明等二萬衆於衢州焦園河岸懐色率衆衝鋒而入賊敗走偽將軍連雲徐上朝等紏衆據處州懐色隨副都統馬哈達擊之賊於大溪灘立木城掘壕自固懐色隨大兵擊破其城十五年十一月隨寧海將軍喇哈達敗海賊徐耀於小門山十六年二月隨平南將軍賴塔敗偽總督趙得勝等於太平山連破二十六營又與賊戰於柏木山身先陷陣被傷殁恩賜雲騎尉世職承襲詳見世職表巴錫巴錫滿洲正黄旗人姓富察氏世居納音江父阿爾納工部員外郎順治十三年以宫殿工成議敘授雲騎尉尋卒巴錫襲職康熙十五年從定逺平冦大將軍安親王岳樂征逆藩吳三桂至江西十六年正月隨江寧將軍額楚與賊將韓大任陳耀元等戰於吉安之螺子山被傷死恩賜雲騎尉世職承襲詳見世職表雅穆布雅穆布滿洲正黄旗人任親軍校康熙十六年隨安親王岳樂征湖廣至長沙偽將軍呉國貴等率賊數萬立鹿角炮鎗挨牌拒戰雅穆布力擊之中傷逾時創發死恩賜雲騎尉世職承襲詳見世職表瑚什布瑚什布滿洲正黄旗人姓趙氏世居牙郎色地方以副前鋒藍翎侍衛隨總督伊禮布征逆藩吳三桂至湖廣康熙十六年六月與賊將馬寳胡國柱等戰於巖山嶺陣亡恩賜雲騎尉世職承襲詳見世職表常明常明滿洲正黄旗人由䕶軍隨征南將軍穆占征逆藩吳三桂康熙十六年三月至湖廣長沙與偽將軍吳國貴戰殁賞䘏如例積善積善滿洲正黄旗人祖和圖陣亡自有𫝊積善襲職為佐領委署㕘領康熙十六年隨副都統穆舒征逆藩吳三桂於四川至保寧九敗賊兵以力戰陣亡恩賜騎都尉世職承襲詳見世職表孔額徳孔額徳滿洲正白旗人姓伊爾庫勒氏世居諾洛科洛尼地方順治十五年以委署協領從征雲貴敗偽侯李成蛟於涼水井復連敗偽晉王李定國於磨盤山十八年從征東將軍季什哈征殷秉瑚及山賊孫小五王節祥蕭五等並有功康熙十四年從征浙江總督李之芳平南將軍賴塔調援衢州偽將軍馬九玉等率兵五萬拒敵孔額徳力戰陣亡恩賜騎都尉世職承襲詳見世職表三泰三泰滿洲正白旗人姓扎拉里氏世居瓦爾喀任驍騎校康熙十四年隨和碩簡親王喇布擊逆藩偽帥韓大任陳耀元等於江西吉安力戰陣亡恩賜雲騎尉世職承襲詳見世職表拉薩禮拉薩禮滿洲正白旗人姓佟佳氏世居雅爾虎任整儀尉順治十四年從定逺將軍世子濟度征福建海冦鄭成功於厦門力戰陣亡恩賜雲騎尉世職承襲詳見世職表齊藍布齊藍布滿洲正白旗人姓修和里氏世居𤓰勒察地方順治五年以䕶軍㕘領從征偽桂王至貴州雙河口偽晉王李定國等率衆萬餘来拒我師齊藍布隨信郡王多尼進擊連敗之康熙十四年征耿逆至江西追擊偽都督易天錫於建昌府城殁於陣三十五年恩賜雲騎尉世職承襲詳見世職表孔伊納孔伊納滿洲正白旗人