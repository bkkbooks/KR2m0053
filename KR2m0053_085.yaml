body:
  text: 土田志十土田數目奉天八旗地畝數目目採捕山場站地畝附井田數臺奉天八旗地畝數目鑲黃旗地畝在盛京興京開原遼陽界內共二千七百四十七晌二畝四分正黃旗地畝在盛京興京開原界內共一千六百五十晌一畝四分正白旗地畝在盛京興京開原遼陽界內共三千四百二十七晌一畝一分以上上三旗地畝上三旗包衣佐領下園丁地畝在盛京開原遼陽界內共二萬二千二百四十六晌四畝以上包衣佐領下地畝盛京禮部六品官所屬各壯丁地在盛京興京遼陽鐵嶺秀巖界內共八千三百四十九晌五畝三分盛京工部五品官所屬壯丁地在盛京遼陽牛莊秀巖因登界內共九千三百六十六晌六品官所屬壯丁地在盛京興京開原遼陽界內共三千一百五十晌四畝九分製造庫匠役人等地在盛京界內共三百七十二晌盛京户部倉官莊頭樓軍倉軍地共六千八百五十一晌三畝四分領催莊頭地共四萬六千八百八十晌二十一畝六分盛京禮部莊頭壯丁地七百八十四晌一畝六分盛京兵部站丁地一千零四十五晌四畝八分盛京工部莊頭壯丁地一千二百七十六晌零三分以上屬盛京官員所地畝興京界內八旗所屬王貝勒貝子公大臣等地二萬零三十九晌二畝官貟兵丁間散人等地九千六百八十一晌零五分撫順界內右翼四旗所屬王貝勒貝子公大臣等地二萬一千六百四十七晌十七畝七分官員兵丁間散人等地一千二百五十三晌二畝六分鹻場汪清二門官兵台丁地五千四百六十七晌二畝七分開原界內八旗莊屯地二千八百頃零七十九畝遼陽城界內八旗官貟兵丁地一萬四千八百零九晌一畝鐵嶺界內左翼四旗莊屯地八千六百五十七頃四十四畝二分法庫邉門莊屯地六百七十八頃五十八畝威逺堡邉門莊屯地二百二十八頃八十七畝英額邉門莊屯地一百二十六頃七十二畝二分鳯凰城八旗巴爾虎地一千九百四十八頃六十四畝又正黃旗屯地共六十頃九畝靉河邉門分種地共二十四頃七十四畝四台四屯地六十一頃五十九畝復州界內八旗分撥地二萬八千八百二十三晌二畝熊嶽城界內八旗滿洲蒙古巴爾虎漢軍莊屯地二千八百八十三頃三十九畝金州界內八旗滿洲蒙古漢軍官員兵丁地三千三百四十一頃零四畝水師營地二十六頃十八畝山海關官貟兵丁寡婦間散人等在山海衛寧逺州界內共地一百三頃五十七畝七分零又正白正紅鑲紅旗下間散人等地共三頃六十七畝零秀巖界內八旗官貟兵丁地二千一百二十一頃零二畝七分蓋州界內各旗官貟兵丁地六千七百七十三晌牛莊界內八旗官貟兵丁地四萬八千七百一十六晌四畝廣寧城所屬巨流河白旗堡小黑山閭陽驛張五台邉門等界內八旗官貟兵丁間散人等地共一萬五千一百九十四頃九十六畝二分錦州界內王貝勒貝子公宗室額駙官貟莊頭間散人等地共二千七百十七頃零七畝八分八旗兵丁間散人等地共一千五十四頃五十畝零四分義州界內八旗莊屯地五千四百七十一頃二十五畝清河邉門莊屯地五百三十四頃二十三畝九關台邉門莊屯地二百三十二頃十八畝吉林烏喇界內官員兵丁開墾地鑲黃旗六千二百四十二晌正黃旗四千九百二十一晌正白旗四千四百三十五晌正紅旗四千二百十三晌鑲白旗四千八百零八晌鑲紅旗三千六百九十六晌正藍旗四千三百五十四晌鑲藍旗四千四百五十四晌水師營四千四百二十六晌又各莊頭開墾地共四千二百零一晌寧古塔界內官貟兵丁開墾地鑲黃旗五千七百八十四晌正黃旗三千三百九十五晌正白旗五千五百八十五晌正紅旗七千晌鑲白旗七千九百五十九晌鑲紅旗五千四百四十五晌正藍旗四千六百六十九晌鑲藍旗三千六百六十一晌又各莊頭開墾地共五千五百五十七晌渾春界內官貟兵丁開墾地鑲黃旗一千九百五十三晌正黃旗一千六百五十九晌正白旗五千二百八十二晌三姓地方官員兵丁開墾地鑲黃旗一千九百十六晌正黃旗三千零二十五晌正白旗九百九十一晌正紅旗六千九百九十四晌白都訥界內官員兵丁開墾地鑲黃旗一千九百四十三晌正黃旗一千二百二十八晌正白旗三千九百二十四晌正紅旗二千零九十二晌鑲白旗一千三百三十七晌鑲紅旗一千一百八十七晌正藍旗三千五百八十四晌鑲藍旗三千二百三十五晌又各莊頭開墾地共三百七十二晌阿爾楚喀界內官員兵丁開墾地鑲黃旗一千九百十八晌正黃旗二千零五晌正白旗九百八十五晌俱據奉天來册以上奉天八旗地畝數目採捕山場凡上三旗及五旗王以下奉恩將軍以上採捕山場各有分界凡上三旗及各旗採捕人等按驗户部執照移文奉天將軍給與出邉信票採獲人參稱驗造册送部凡內府圍獵人貟所騎內廄馬匹餧飬槽䥷鍋掀以及將軍衙門圍獵需用鐵鑹木掀筐木籠車輛等件照來文造給其製帳房口袋需用布匹綿線黃麻􅐨麻該部移取其木籠動支錢糧製給用過數目報部凡烏喇採捕處所烹煎鱘鰉魚需用鍋杓笟籬等物本部辦買布鹽繩麻等物於該部支取其蘆席官丁取辦驛站牛車運送用過錢糧本部報銷鑲黃旗人參山黑車木馬家肥牛村牛哈兒哈色欽趙家厄爾民河哈爾民河岡佟家河拉哈多布庫河牙爾渣河鑲黃旗採捕山波那活河一而門呼藍馬哈拉鑲黃旗圍獵山哈代上澗附威諄河河爾法氲加色葉坑厄嶺沂徹漲泥河巚嶺果羅河一馬呼港得弗河交河正黃旗人參山木起呼渾谷背山傍幽呼羅東界克車木肥牛村土克善梅佛黑齊五林峯厄爾民河哈爾民河夾岡佟家河拉哈多布庫河渾濟山見得黑山正黃旗採捕山一而門牙瀨港厄黑五陵阿正黃旗圍獵山喀普赤藍勒克得弗口朱扯正白旗人參山呼雷剛山嶺東勝阿谷濟爾歌把羅打八拉岡濟爾歌河瓦而喀什八羅覺羅衛濟嶺昻把釋楞阿沙哈河綿灘厄母皮里阿什汗河湖南谷湖南嶺布魯張市義欣谷梭希納鈕王澗谷布勒亨正白旗採捕山希爾哈河阿克敦上澗峯木書河正白旗圍獵山沂徹漲泥河科羅河復漲泥河吉當阿河岸蒙古谷大起朱車衮正紅旗人參山牛哈兒哈撒木湯阿劉姑山嶺五兒烘噶哈阿巴噶哈木敦古黑嶺背山傍汙處哈谷西伯谷五兒烘谷阿米大谷阿米大牙爾過正紅旗採捕山撒侖一而門五藍得弗哈占你白葉正紅旗圍獵山覺羅大湯阿邉米牙呼會肥一藍木黑林過而名岡呼渾肥得里都什黑梅黑河勒扶峯色黑驪逹馬納會肥圍屯鑲白旗人參山劉姑山嶺撒木湯阿張而都科八羅歡他呼勒英厄剛山嶺色珍大霸庫扎兒大庫河烏林布占三通嶺多布庫羅門渾濟木敦鑲白旗採捕山阿呼峯撒侖鑲白旗圍獵山喀普赤藍木單焉泰上澗峯色勒五魯庫江都庫峯火托峯渾濟你什哈河鑲紅旗人參山加海撒木占河沂徹東五札木必汗札木他賴紐木舜五什欣阿普大力五兒烘阿普大力白母白力撒哈連昻八烏而呼納孟厄阿沙哈圍黑厄黑港古黑嶺南山傍瓦里呼汗處掀谷昻把烏黑昻把釋楞鑲紅旗採捕山勒扶渡口一八單依蘭峯朱緑峯呼朱白葉兩紅旗合給圍獵山覺羅大陽阿邉米牙呼會肥一藍木黑林過而名岡呼渾肥得里都什黑梅河勒扶峯色黑驪逹馬納羅大羅火港正藍旗人參山東勝阿加哈嶺瓦爾喀什札爾呼河吉牟申書谷五兒烘噶哈昻巴噶哈木敦家牟占灣他哈鈕王澗谷非牙郎阿阿什哈溫拉黑正藍旗採捕山阿濟哈革牙哈木克峯阿灘納麥爾齊昻巴牙哈正藍旗圍獵山吉當阿河西岸圍黑夸藍一吞河昻把西伯納親河葉河一藍木黑林鑲藍旗人參山札木必汗札東阿色欽札庫木厄一扶峯都稜溫泉札爾呼河圍黑法三鑲藍旗採捕山牙瀨港一吞木克波吞波吞酸馬岡鑲藍旗圍獵山書民烏力汗馬打堪岡色朱稜駿焉瓦色以上採捕山場臺站地畝奉天將軍所轄驛站沙河站壯丁八十七名地一千五百五十五晌一百二十六畝東光站壯丁六十四名地一千七百二十五晌一百二十一畝三分寧逺驛壯丁七十五名地一千八百五十晌二百三十四畝七分髙橋驛壯丁六十三名地一千二百九十六晌二百零八畝小凌河驛壯丁四十六名地四百九十五晌一百四十七畝一分十三山驛壯丁九十一名地三千三百五十二晌二百零八畝九分廣寧驛壯丁六十九名地一千八百一十晌三百四十二畝八分小黑山驛壯丁四十三名地三千七百一十七晌二百九十二畝七分二道境驛壯丁七十三名地二千六百八十二晌二百九十三畝三分白旗堡壯丁八十七名地二千七百六十二晌二百六十三畝九分巨流河驛壯丁五十二名地一千一百三十二晌零五畝四分舊邉驛壯丁五十三名地一千一百二十九晌一百一十九畝四分盛京驛壯丁三十八名地九百二十八晌一百十畝九分十里河驛壯丁二十四名地五百二十八晌六十七畝東京驛壯丁九名地一百一十晌十五畝狼子山驛壯丁二十二名地四百七十一晌六十七畝甜水站壯丁十九名地四百六十九晌五十一畝連山關驛壯丁二十名地六百三十八晌九十五畝通逺堡驛壯丁十九名地三百四十七晌四十七畝雪裏站壯丁地三十一名地四百九十九晌七十畝鳯凰城驛壯丁二十三名地四百五十九晌四十六畝髙麗堡驛壯丁四十名地三百零七晌易路驛壯丁五十名地五百三十二晌三畝八分嚴千户屯驛壯丁三十一名地五百八十五晌六十五畝法庫驛壯丁三十三名地五百六十六晌沙爾湖驛壯丁二十三名地一百九十晌五十畝一分開原驛壯丁五十三名地七百九十三晌五十七畝噶布喇村驛壯丁二十一名地四百三十九晌二畝六分木竒驛壯丁十八名地四百零六晌十八畝俱據奉天來册黑龍江將軍所轄驛站茂欣連素等處十驛於各驛十里內驛夫種地共三千零六十八晌墨爾根村等處十驛于各驛十里內驛夫種地共四千零三十晌俱據墨龍江來册寧古塔將軍所轄臺站巴言俄佛洛邉門七臺種地共二千四百零六晌一統邉門六臺種地共一千四百五十六晌河爾素邉門八臺種地共九百三十晌布爾圖庫蘇巴爾漢邉門七臺種地共一千二百八十九晌􅴾喇站蘇通站一而門站刷煙站一巴旦站阿爾坦厄墨爾站黑爾素站夜河站蒙古河洛站共九處種地七千九百六十晌金周俄佛洛站書蘭站法他哈站登格爾哲庫站蒙古站討來詔站孫札波站蒿子站舍力站北都訥站厄和木站拉法站推吞站俄莫和索洛站畢爾漢必拉站沙蘭站寧古塔站共十七處種地一萬零六百四十三晌俱據寧古塔來册以上臺站地畝附井田數目謹案會典載井田改屯地共一百五十四頃九十八畝有奇徵租解部奏報然自雍正二年議行以來其設立之年月分𨽻之村莊頃畝之細數具詳舊志今謹仍而存之以偹稽考雍正三年正月順天府固安縣設立圈頭村井地十七頃四十八畝九分零林城村井地二十頃七十九畝一分零劉家村井地十四頃二十四畝九分零石家務井地十九頃六十六畝五分零蠻子營井地十一頃七十五畝三分零固城村井地十四頃三十三畝零六項共地九十八頃二十七畝九分零二月保定府新城縣設立宫井村井地十頃七畝一分零新立莊井地十七頃六十二畝四分零二項共地二十七頃六十九畝五分零五年十一月保定府新城縣設立韓村營井地六頃九十畝七年三月順天府霸州設立沙城村圈子村狄家莊坌河村四處井地各十頃又葉家莊補足固安縣井地一頃五十二畝五項共地四十一頃五十二畝又順天府永清縣設立髙家營村井地十頃北孟村井地十五頃南台子村井地十頃三項井地三十五頃以上并地數目欽定八旗通志卷七十一
