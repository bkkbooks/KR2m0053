body:
  text: 土田志十土田數目奉天八旗地畆數目目採捕山場站地畆附井田數臺奉天八旗地畆數目鑲黄旗地畆在盛京興京開原遼陽界内共二千七百四十七晌二畆四分正黄旗地畆在盛京興京開原界内共一千六百五十晌一畆四分正白旗地畆在盛京興京開原遼陽界内共三千四百二十七晌一畆一分以上上三旂地畆上三旗包衣佐領下園丁地畆在盛京開原遼陽界内共二萬二千二百四十六晌四畆以上包衣佐領下地畆盛京禮部六品官所属各壯丁地在盛京興京遼陽鐵嶺秀巖界内共八千三百四十九晌五畆三分盛京工部五品官所属壯丁地在盛京遼陽牛莊秀巖因登界内共九千三百六十六晌六品官所属壯丁地在盛京興京開原遼陽界内共三千一百五十晌四畆九分製造庫匠役人等地在盛京界内共三百七十二晌盛京户部倉官莊頭樓軍倉軍地共六千八百五十一晌三畆四分領催荘頭地共四萬六千八百八十晌二十一畆六分盛京禮部荘頭壮丁地七百八十四晌一畆六分盛京兵部站丁地一千零四十五晌四畝八分盛京工部莊頭壮丁地一千二百七十六晌零三分以上属盛京官員所地畆興京界内八旗所属王貝勒貝子公大臣等地二萬零三十九晌二畆官貟兵丁閒散人等地九千六百八十一晌零五分撫順界内右翼四旗所属王貝勒貝子公大臣等地二萬一千六百四十七晌十七畆七分官員兵丁閒散人等地一千二百五十三晌二畆六分鹻場汪清二門官兵台丁地五千四百六十七晌二畆七分開原界内八旗莊屯地二千八百頃零七十九畆遼陽城界内八旗官貟兵丁地一萬四千八百零九晌一畆鐵嶺界内左翼四旗荘屯地八千六百五十七頃四十四畆二分法庫邉門莊屯地六百七十八頃五十八畆威逺堡邉門莊屯地二百二十八頃八十七畆英額邉門荘屯地一百二十六頃七十二畆二分鳯凰城八旗巴爾虎地一千九百四十八頃六十四畆又正黄旂屯地共六十頃九畆靉河邉門分種地共二十四頃七十四畆四台四屯地六十一頃五十九畆復州界内八旗分撥地二萬八千八百二十三晌二畆熊岳城界内八旗滿洲䝉古巴爾虎漢軍荘屯地二千八百八十三頃三十九畆金州界内八旗滿洲蒙古漢軍官員兵丁地三千三百四十一頃零四畆水師營地二十六頃十八畆山海闗官貟兵丁寡婦閒散人等在山海衛寜逺州界内共地一百三頃五十七畆七分零又正白正紅鑲紅旂下閑散人等地共三頃六十七畆零秀巖界内八旂官貟兵丁地二千一百二十一頃零二畆七分盖州界内各旂官貟兵丁地六千七百七十三晌牛荘界内八旂官貟兵丁地四萬八千七百一十六晌四畆廣寜城所属巨流河白旂堡小黒山閭陽驛張五台邉門等界内八旂官貟兵丁閑散人等地共一萬五千一百九十四頃九十六畆二分錦州界内王貝勒貝子公宗室額駙官貟荘頭閑散人等地共二千七百十七頃零七畆八分八旂兵丁閑散人等地共一千五十四頃五十畆零四分義州界内八旂荘屯地五千四百七十一頃二十五畆清河邉門荘屯地五百三十四頃二十三畆九闗台邉門荘屯地二百三十二頃十八畆吉林烏喇界内官員兵丁開墾地鑲黄旂六千二百四十二晌正黄旂四千九百二十一晌正白旂四千四百三十五晌正紅旂四千二百十三晌鑲白旂四千八百零八晌鑲紅旂三千六百九十六晌正藍旂四千三百五十四晌鑲藍旂四千四百五十四晌水師營四千四百二十六晌又各荘頭開墾地共四千二百零一晌寜古塔界内官貟兵丁開墾地鑲黄旂五千七百八十四晌正黄旂三千三百九十五晌正白旂五千五百八十五晌正紅旂七千晌鑲白旂七千九百五十九晌鑲紅旂五千四百四十五晌正藍旂四千六百六十九晌鑲藍旂三千六百六十一晌又各荘頭開墾地共五千五百五十七晌渾春界内官貟兵丁開墾地鑲黄旂一千九百五十三晌正黄旂一千六百五十九晌正白旂五千二百八十二晌三姓地方官員兵丁開墾地鑲黄旂一千九百十六晌正黄旂三千零二十五晌正白旂九百九十一晌正紅旂六千九百九十四晌白都訥界内官員兵丁開墾地鑲黄旂一千九百四十三晌正黄旂一千二百二十八晌正白旂三千九百二十四晌正紅旂二千零九十二晌鑲白旂一千三百三十七晌鑲紅旂一千一百八十七晌正藍旂三千五百八十四晌鑲藍旂三千二百三十五晌又各荘頭開墾地共三百七十二晌阿爾楚喀界内官員兵丁開墾地鑲黄旂一千九百十八晌正黄旂二千零五晌正白旂九百八十五晌俱據奉天来冊以上奉天八旂地畆數目採捕山場凡上三旂及五旂王以下奉恩将軍以上採捕山場各有分界凡上三旂及各旂採捕人等按騐户部執照移文奉天将軍給與出邉信票採獲人参秤騐造冊送部凡内府圍獵人貟所騎内廐馬匹餧飬槽䥷鍋掀以及将軍衙門圍獵需用鐵鑹木掀筐木籠車輛等件照来文造給其製帳房口袋需用布疋綿線黃麻􅐨麻該部移取其木籠動支錢糧製給用過數目報部凡烏喇採捕處所烹煎鱘鰉魚需用鍋杓笟籬等物本部辦買布塩䋲麻等物於該部支取其蘆蓆官丁取辦驛站牛車運送用過錢粮本部報銷鑲黄旂人参山黒車木馬家肥牛村牛哈兒哈色欽趙家厄爾民河哈爾民河岡佟家河拉哈多布庫河牙爾渣河鑲黄旂採捕山波那活河一而門呼藍馬哈拉鑲黄旂圍獵山哈代上澗坿威諄河河爾法氲加色葉坑厄嶺沂澈漲泥河巚嶺果羅河一馬呼港得弗河交河正黄旂人参山木起呼渾谷背山傍幽呼羅東界克車木肥牛村土克善梅佛黒齊五林峯厄爾民河哈爾民河夾岡佟家河拉哈多布庫河渾濟山見得黒山正黄旂採捕山一而門牙瀨港厄黒五陵阿正黄旂圍獵山喀普赤藍勒克得弗口朱扯正白旂人参山呼雷剛山嶺東勝阿谷濟爾歌把羅打八拉岡濟爾歌河瓦而喀什八羅覺羅衛濟嶺昻把釋楞阿沙哈河綿灘厄母皮里阿什汗河湖南谷湖南嶺布魯張市义欣谷梭希納鈕王澗谷布勒亨正白旂採捕山希爾哈河阿克敦上澗峯木書河正白旗圍獵山沂澈漲泥河科羅河復漲泥河吉當阿河岸䝉古谷大起朱車衮正紅旂人参山牛哈兒哈撒木湯阿劉姑山嶺五兒烘噶哈阿巴噶哈木敦古黒嶺背山傍汙處哈谷西伯谷五兒烘谷阿米大谷阿米大牙爾過正紅旗採捕山撒侖一而門五藍得弗哈占你白葉正紅旗圍獵山覺羅大湯阿邉米牙呼㑹肥一藍木黒林過而名岡呼渾肥得里都什黒梅黒河勒扶峯色黒驪逹馬納㑹肥圍屯鑲白旂人参山劉姑山嶺撒木湯阿張而都科八羅歡他呼勒英厄剛山嶺色珍大霸庫扎児大庫河烏林布占三通嶺多布庫羅門渾濟木敦鑲白旂採捕山阿呼峯撒侖鑲白旂圍獵山喀普赤藍木單焉泰上澗峯色勒五魯庫江都庫峯火托峯渾濟你什哈河鑲紅旂人参山加海撒木占河沂澈東五札木必汗札木他賴紐木舜五什欣阿普大力五児烘阿普大力白母白力撒哈連昻八烏而呼納孟厄阿沙哈圍黒厄黒港古黒嶺南山傍瓦里呼汗處掀谷昻把烏黒昻把釋楞鑲紅旂採捕山勒扶渡口一八單依蘭峯朱緑峯呼朱白葉兩紅旂合給圍獵山覺羅大陽阿邉米牙呼㑹肥一藍木黒林過而名岡呼渾肥得里都什黒梅河勒扶峯色黒驪逹馬納羅大羅火港正藍旂人参山東勝阿加哈嶺瓦爾喀什札爾呼河吉牟申書谷五兒烘噶哈昻巴噶哈木敦家牟占灣他哈鈕王澗谷非牙郎阿阿什哈温拉黒正藍旂採捕山阿濟哈革牙哈木克峯阿灘納麥爾齊昻巴牙哈正藍旗圍獵山吉當阿河西岸圍黒夸藍一吞河昻把西伯納親河葉河一藍木黒林鑲藍旂人参山札木必汗札東阿色欽札庫木厄一扶峯都稜温泉札爾呼河圍黒法三鑲藍旂採捕山牙瀨港一吞木克波吞波吞酸馬岡鑲藍旂圍獵山書民烏力汗馬打堪岡色朱稜駿焉瓦色以上採捕山場臺站地畆奉天将軍所轄驛站沙河站壮丁八十七名地一千五百五十五晌一百二十六畆東光站壮丁六十四名地一千七百二十五晌一百二十一畆三分寧逺驛壮丁七十五名地一千八百五十晌二百三十四畆七分髙橋驛壮丁六十三名地一千二百九十六晌二百零八畆小凌河驛壮丁四十六名地四百九十五晌一百四十七畆一分十三山驛壮丁九十一名地三千三百五十二晌二百零八畆九分廣寜驛壮丁六十九名地一千八百一十晌三百四十二畆八分小黒山驛壮丁四十三名地三千七百一十七晌二百九十二畆七分二道境驛壮丁七十三名地二千六百八十二晌二百九十三畆三分白旂堡壮丁八十七名地二千七百六十二晌二百六十三畆九分巨流河驛壮丁五十二名地一千一百三十二晌零五畆四分舊邉驛壮丁五十三名地一千一百二十九晌一百一十九畆四分盛京驛壮丁三十八名地九百二十八晌一百十畆九分十里河驛壮丁二十四名地五百二十八晌六十七畆東京驛壮丁九名地一百一十晌十五畆狼子山驛壮丁二十二名地四百七十一晌六十七畆甜水站壮丁十九名地四百六十九晌五十一畆連山闗驛壮丁二十名地六百三十八晌九十五畆通逺堡驛壮丁十九名地三百四十七晌四十七畆雪裏站壮丁地三十一名地四百九十九晌七十畆鳯凰城驛壮丁二十三名地四百五十九晌四十六畆髙麗堡驛壮丁四十名地三百零七晌易路驛壮丁五十名地五百三十二晌三畆八分嚴千户屯驛壮丁三十一名地五百八十五晌六十五畆法庫驛壮丁三十三名地五百六十六晌沙爾湖驛壮丁二十三名地一百九十晌五十畆一分開原驛壮丁五十三名地七百九十三晌五十七畆噶布喇村驛壮丁二十一名地四百三十九晌二畆六分木竒驛壮丁十八名地四百零六晌十八畆俱據奉天来冊黒龍江将軍所轄驛站茂欣連素等處十驛於各驛十里内驛夫種地共三千零六十八晌墨爾根村等處十驛于各驛十里内驛夫種地共四千零三十晌俱據墨龍江來册寧古塔将軍所轄臺站巴言俄佛洛邉門七臺種地共二千四百零六晌一統邉門六臺種地共一千四百五十六晌河爾素邉門八臺種地共九百三十晌布爾圖庫蘇巴爾漢邉門七臺種地共一千二百八十九晌􅴾喇站蘇通站一而門站刷烟站一巴旦站阿爾坦厄墨爾站黒爾素站夜河站䝉古河洛站共九處種地七千九百六十晌金周俄佛洛站書蘭站法他哈站登格爾哲庫站蒙古站討来詔站孫札波站蒿子站舍力站北都訥站厄和木站拉法站推吞站俄莫和索洛站畢爾漢必拉站沙蘭站寜古塔站共十七處種地一萬零六百四十三晌俱據寜古塔来冊以上臺站地畆附井田數目謹案會典載井田改屯地共一百五十四頃九十八畆有奇徵租解部奏報然自雍正二年議行以来其設立之年月分𨽻之村荘頃畆之細數具詳舊志今謹仍而存之以偹稽考雍正三年正月順天府固安縣設立圈頭村井地十七頃四十八畆九分零林城村井地二十頃七十九畆一分零劉家村井地十四頃二十四畆九分零石家務井地十九頃六十六畆五分零蠻子營井地十一頃七十五畆三分零固城村井地十四頃三十三畆零六項共地九十八頃二十七畆九分零二月保定府新城縣設立宫井村井地十頃七畆一分零新立荘井地十七頃六十二畆四分零二項共地二十七頃六十九畆五分零五年十一月保定府新城縣設立韓村營井地六頃九十畆七年三月順天府霸州設立沙城村圈子村狄家荘坌河村四處井地各十頃又葉家荘補足固安縣井地一頃五十二畆五項共地四十一頃五十二畆又順天府永清縣設立髙家營村井地十頃北孟村井地十五頃南台子村井地十頃三項井地三十五頃以上并地數目欽定八旗通志卷七十一
