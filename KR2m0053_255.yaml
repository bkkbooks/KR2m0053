body:
  text: 人物志一百二十一列女傳一謹案戰國䇿稱聶政之姊為列女是列女為嘉名矣編錄為傳始於劉向乃善惡並載以示彰癉然艷妻佚女特附載焉耳後代史家沿流而作則始范蔚宗例皆紀善猶之孝友忠義諸傳是史法也宋以來圗經志乘亦各立此門培植倫常扶特風化其人雖微其事則名教之所繫義至重焉我國家化行自近逺邁二南八旗淑女貞媛後先接迹皆炳然與日月爭光允宜備列簡牘垂名奕葉苐事隔百載聞見異辭去取之間宜存斷限後漢書收蔡文姬隋書收蘭陵公主論者病焉豈非簡擇國之不審乎今敬遵大臣列傳一從史之例一以厯年旌典為憑庶表章之中寓謹嚴之㫖其序第則首以際天潢次分列八旗各編年紀載使端緒秩如惟運輦轂昇平居依婦職謹守閨箴教子養親事皆庸行茹大抵勤修荼辛苦梗概畧同不比前代諸列女多遭逢變故時有竒節之可書故非行誼卓絶者其事迹皆不一一複贅焉宗室列女傳貝勒莽古爾泰之大福金舊志失載姓氏貝勒莽古爾泰之次福金烏喇貝勒岳託之福金納蘭氏和碩肅親王之次妃黄氏輔政徳裕親王多託之次福金舊志失載姓氏和碩巽親王之元妃珍木積和碩巽親王之側室賽敏珠宗室白臨哈思虎之女哲賴以上俱於順治十年旌表鎮國公席特庫之姊總兵官佟養性之妻順治十三年旌表和碩鄭親王濟爾哈朗之側室烏努古和碩鄭親王濟爾哈朗之側室舒紀和碩鄭親王濟爾哈朗之側室蘇邁和碩鄭親王濟爾哈朗之側室徳音哲和碩鄭親王濟爾哈朗之側室穆克金和碩敬謹親王尼堪之側室納喇氏和碩敬謹親王尼堪之側室舒穆禄氏輔國公世布石倫之妻巴蘇泰以上俱於順治十三年奉㫖致祭宗室宏科泰之妻博爾濟吉特氏鎮國将軍聶古塞之妹布顔圖之妻以上俱於順治十七年旌表輔國公品級查喀納之側室碩尼順治十八年旌表輔國公福勒赫之妻博爾濟錦氏順治十八年奉㫖致祭奉恩輔國公品級扎喀納之繼妻佟佳氏康熙二十一年旌表輔國将軍都爾巴之妻趙格康熙二十五年旌表和碩鄭親王慤厚世子富爾敦之妻納喇氏康熙二十七年旌表輔國將軍伯竒之妻博爾濟錦氏一等侍衛宗室勒克徳之妻髙氏以上俱於康熙三十三年旌表翼長宗室海全之繼妻納喇氏康熙四十七年旌表宗室興昌之妻董佳氏追封貝勒𢎞暾之未婚妻富察氏以上俱於雍正六年旌表奉國将軍永徳之妻吉爾門氏雍正十一年旌表奉國将軍鄂明之妻伊爾根覺羅氏宗室艾興阿之妻他塔喇氏宗室博爾都之妻𤓰勒佳氏輔國将軍富良之妻穆佳氏宗室逹色之妻納喇氏奉恩将軍鍾竒之妻伊爾根覺羅氏奉恩将軍岳帑之妻兆氏以上俱於雍正十三年旌表簡親王之長女鑲藍旗滿洲輕車都尉鎖住之妻鎮國将軍徳義之女正紅旗滿洲佐領珠亮之妻奉恩将軍英圖之妻何氏宗室徳夀之妻穆爾察氏以上俱於乾隆二年旌表奉恩将軍徳全之妻李氏宗室徳恒之未婚妻伊爾根覺羅氏鎮國公蘇勒發之女鑲黄旗漢軍額駙郎文烋之妻宗室普善之妻富察氏宗室諾穆齊之妻他塔喇氏以上俱於乾隆四年旌表宗室和特賀之女鑲紅旗滿洲宜徳之未婚妻乾隆五年旌表宗室尚禄之女正藍旗滿洲廕生趙柱之妻宗室魁書之妻伊爾根覺羅氏宗室同保之妻納喇氏以上俱於乾隆六年旌表宗室卓綽之長女正藍旗滿洲監生揚桑阿之妻宗室卓綽之次女正藍旗滿洲監生黒格之妻以上俱於乾隆七年旌表宗室傳寳之女正藍旗滿洲叅領沙通阿之妻筆帖式宗室法爾納之女鑲白旗漢軍王武炯之妻宗室西寧之妻納喇氏以上俱於乾隆九年旌表宗室徳隆恩之妻汪佳氏宗室倬鼐之妻富察氏以上俱於乾隆十年旌表輔國公允盛之女正黄旗䝉古雲騎尉闗寧之妻宗室雅疆阿之女鑲藍旗滿洲朔瞻之妻五品官宗室富平之妻舒穆禄氏宗室靈柱之妻張氏宗室圖敏之妻那木都魯氏宗室伊都里之妻富察氏宗室西泰之妻伊爾根覺羅氏宗室暮尼之妻𤓰勒佳氏以上俱於乾隆十一年旌表宗室阿桂之妻聞氏宗室國柱之妻伊爾根覺羅氏宗室鄂蜜之妻王氏以上俱於乾隆十二年旌表宗室色爾赫之女鑲紅旗滿洲承緒之妻宗室魁智之妻張氏鎮國公揚福之妾韓氏以上俱於乾隆十三年旌表宗室額勒謹之妻博爾濟氏奉恩将軍巴進泰之妾白氏以上俱於乾隆十四年旌表宗室楊存柱之妻烏勒佳氏宗室額特布之妻黄佳氏以上俱於乾隆十五年旌表宗室巴逹海之女鑲藍旗滿洲䕶軍松科之妻乾隆十七年旌表宗室禄祥之妻伊爾根覺羅氏宗室徳進寳之妻博爾濟錦氏以上俱於乾隆十八年旌表宗室黒逹色之妻伊爾根覺羅氏宗室徳進保之妻包氏奉國将軍宗室永玒之未婚妻烏蘇氏宗室善住之妻舒穆禄氏以上俱於乾隆十九年旌表宗室勒色里之女正白旗滿洲前鋒喜成之妻乾隆二十年旌表宗室凱音圖之妻𤓰勒佳氏宗室燕逹海之妻汪佳氏宗室景禄之妻伊拉理氏以上俱於乾隆二十二年旌表宗室額勒金之妻博爾濟氏乾隆二十四年旌表奉恩将軍錫圖倫之妾吳氏乾隆二十五年旌表五品官宗室懷塔庫之妻富察氏宗室寧啟之女八品廕生堂英之妻宗室富勒都之妻薩爾圖氏六品官宗室永林保之妻博爾濟吉特氏宗室台必圖之妻薩克逹氏以上俱於乾隆二十六年旌表宗室查逹哈之妻闗佳氏乾隆二十七年表旌宗室裕泰之妻𤓰勒佳氏宗室那拉之妻鈕祜禄氏宗室保海之妾王氏宗室錫勉之妾劉氏以上俱於乾隆二十九年旌表宗室那海之女正藍旗滿洲筆帖式永平之妻宗室常松保之妻吉禮氏宗室碩定之妾王氏以上俱於乾隆三十年旌表宗室伊實之妻𤓰勒佳氏宗室色爾晉之妻哈普齊克氏宗室珠法拉之妾吳氏佐領宗室永貴之妾萬氏以上俱於乾隆三十一年旌表䕶軍叅領宗室岳泰之女鑲黄旗滿洲䕶軍瑪爾遜之妻宗室文徳之妻鈕祜禄氏宗室明森之妻𤓰勒佳氏以上俱於乾隆三十二年旌表宗室有福之妻他塔喇氏宗室哲成之妻扎魯特氏以上俱於乾隆三十三年旌表宗室錫臣之女正紅旗滿洲庫使覺羅托渾之妻乾隆三十四年旌表副都統職銜宗室永瑞之妻碧魯氏宗室穆昆之妻伊扎爾氏宗室和齡之妻𤓰勒佳氏以上俱於乾隆三十五年旌表宗室道寶之妻阿塔穆氏乾隆三十六年表旌宗室岳泰之女正白旗滿洲閑散廣書之妻宗室七十四之妻𤓰勒佳氏以上俱於乾隆三十七年旌表奉國将軍石通之妾王氏乾隆三十八年表旌宗室明義之妻𤓰勒佳氏宗室鈕古禮之妻鈕祜禄氏宗室康喀拉之妾李氏以上俱於乾隆三十九年旌表宗室福康之女正紅旗滿洲筆帖式明亮之妻宗室登實之妻伊佳氏宗室玉普之妻佟佳氏以上俱於乾隆四十年旌表宗室色勒之妻吳氏乾隆四十一年旌表宗室文徳芬之女鑲白旗滿洲䕶軍保寧之妻宗室普松之女正白旗䝉古閑散文都遜之妻宗室長連之妻葉赫那拉氏宗室敏魁之妻崇氏以上俱於乾隆四十二年旌表宗室岳増之妻納喇氏宗室伊克唐阿之妻納喇氏宗室穆成明之妻佟氏以上俱於乾隆四十三年旌表宗室維名之女正白旗漢軍閑散觀和之妻副管宗室廣雲之妻薩克逹氏以上俱於乾隆四十四年旌表宗室順和之女鑲黄旗蒙古佐領九柱之妻宗室阿克禄之妻納喇氏宗室觀金保之妻佟佳氏宗室順雲之妾王氏以上俱於乾隆四十五年旌表宗室趕生之女正紅旗滿洲監生珅保之妻三等侍衛宗室和勝之妻卓勒氏宗室茂秀之妻伊爾根覺羅氏宗室那爾布之妻果氏二等侍衛宗室科明阿之妾劉氏以上俱於乾隆四十六年旌表宗室索倫之女正藍旗蒙古男布喀之妻宗室金榜之女正白旗滿洲筆帖式成山之妻宗室懷元之妻察庫他氏宗室愛慶之妻郭爾羅斯氏以上俱於乾隆四十七年旌表宗室徳盛之女鑲藍旗滿洲富成之妻宗室瑞福之妻孫氏宗室永吉之妻博爾濟吉特氏宗室明周之妻張佳氏宗室善敬之妻徐氏宗室夀生之妻鈕祜禄氏宗室煥章之妻佟佳氏宗室禄祥之妻伊爾根覺羅氏宗室禄祥之妾寳氏宗室慶年之妾松氏以上俱於乾隆四十九年旌表一等侍衛兼佐領宗室特爾欽之女鑲黄旗滿洲親軍徳禄之妻宗室連生之女鑲黄旗滿洲親軍西清之妻宗室尚興之妻叩徳氏宗室林保之妻伊爾根覺羅氏宗室穆舒翁額之妻納喇氏以上俱於乾隆五十年旌表宗室那魯之女正藍旗滿洲佐領白明之妻宗室西通阿之妻鈕祜禄氏宗室碩敘之妻楊佳氏宗室寧徳保之妻王氏以上俱於乾隆五十一年旌表宗室兆福之女正紅旗滿洲鳥鎗藍翎長伊昌阿之妻宗室色勒布之女鑲藍旗滿洲佐領徳克金布之妻二等侍衛宗室恒彬之妻納喇氏宗室書慶之妻𤓰勒佳氏宗室星魁之妻兆佳氏宗室東科諾之妻𤓰勒佳氏宗室常明阿之妻𤓰勒佳氏以上俱於乾隆五十二年旌表奉恩将軍逹慶阿之妻納喇氏宗室尼楚赫之妻伊爾根覺羅氏宗室吉祥之妾周氏以上俱於乾隆五十三年旌表宗室吉郎阿之女鑲紅旗滿洲素隆阿之妻宗室凌雲之女正白旗滿洲佐領魁福之妻宗室多拖里之妻戴佳氏奉恩将軍成岱之妾烏氏以上俱於乾隆五十四年旌表筆帖式宗室玉貴之女鑲黄旗滿洲前鋒托克托賀之妻宗室廣靈之女鑲紅旗滿洲三聖保之妻宗室阿林泰之女正白旗滿洲䕶軍佟保住之妻宗室保月之女鑲白旗䝉古騎都尉䇿凌喏爾布之妻宗室徳敬安之妻鈕祜禄氏宗室阿爾通阿之妻博爾濟吉特氏宗室舒齡阿之妻佟佳氏以上俱於乾隆五十五年旌表宗室永忠之女鑲黄旗滿洲䕶軍都爾松阿之妻宗室廣貴之女鑲白旗滿洲前鋒阿克當阿之妻宗室鵬博之妻富察氏宗室逹爾崇吉之妻于氏宗室明山保之妻納喇氏以上俱於乾隆五十六年旌表宗室建宴之女正黄旗滿洲䕶軍索爾布之妻宗室廣斌之妻𤓰勒佳氏宗室永瑞之妻納喇氏宗室永税之妻納喇氏奉恩将軍阿朗阿之妾髙氏以上俱於乾隆五十七年旌表宗室噶朗阿之妻完顔氏宗室托金泰之妻𤓰勒佳氏宗室書寧阿之妻巴拉特氏以上俱於乾隆五十八年旌表宗室瑞廣之妻柯氏宗室美豐額之妻舒舒覺羅氏宗室永増之妻博爾濟吉特氏宗室𢎞昞之繼妻烏蘇氏宗室永玿之妻顔氏宗室更通之妻伊爾根覺羅氏宗室徳克善之女鑲藍旗滿洲䕶軍五福圖之妻以上俱于乾隆五十九年旌表欽定八旗通志卷二百四十一
