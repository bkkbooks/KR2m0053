body:
  text: 旗分志十一八旗佐領十一鑲白旗滿洲佐領佐領管領分管鑲白旗包衣鑲白旗滿洲佐領下四㕘領至五㕘領第四㕘領第一佐領係第二佐領内滋生人丁康熙六年大學士車克管佐領時分一佐領以其編弟噶都琿之子哲黒管理哲黒隨征沒於軍前以其長子保住管理保住年老辭退以其子穆赫林管理穆赫林因病告退以其子索琿管理索琿因病告休以其子徳善管理第四㕘領第二佐領係國初編立始以席拉納管理席拉納故以其子大學士車克管理車克年老致仕以其子佛保管理佛保因病辭退以其兄王府長史卓爾塔管理卓爾塔年老辭退以其弟侍郎額穆丕管理額穆丕因足疾辭退以其子員外郎穆克徳里管理穆克徳里縁事革退以其弟三等侍衛栢賚管理栢賚陞任遊擊以其子吉當阿管理吉當阿陞任遊擊以其子哲敏管理哲敏陞任遊擊以車克之曽孫松堂管理第四㕘領第三佐領係第一第二兩佐領内滋生人丁康熙二十三年保柱卓爾塔管佐領時分編一佐領以大學士車克弟色克之子色勒敏管理色勒敏故以其弟色勒管理色勒故以車克第八子倭爾敏之子韓泰管理韓泰故以色勒之子和達色管理和達色缺出以其子宗神保管理宗神保缺出以其伯祖恒唘之孫庚音管理庚音缺出以其子靈喜管理第四㕘領第四佐領係國初以瑚布察地方來歸人丁編立始以舒賽管理舒賽故以其長子杜沙管理杜沙故以其子索保管理索保故以其兄龔安管理龔安隨征殁於軍前以其子僧保管理僧保因病辭退以其叔祖圖錫塔之子禅塔哈管理禅塔哈故以其子常寜管理常寧缺出以其子四格管理四格縁事革退以舒賽之三世孫康泰管理第四㕘領第五佐領即第四佐領内滋生人丁康熙二十三年僧保管佐領時分編一佐領以其叔父索保之子索索禮管理索索禮縁事革退以其伯父杜爾特之子阿爾布代管理阿爾布代縁事革退以其叔父穆里馬之子佛代管理佛代從征殁於軍前以其子恩昭管理恩昭缺出以其子寧珠管理寧珠縁事革退以其伯父之孫色爾登管理色爾登缺出以其孫富當阿管理第四㕘領第六佐領係國初以吉林地方來歸人丁編立始以喀爾喀麻管理喀爾喀麻故以其子那木色竒管理那木色竒故以其兄喀爾巴拜管理喀爾巴拜故以其子薩穆哈管理薩穆哈故以其子索吉達管理索吉達故以其弟穆克善管理穆克善故以其兄之子江柱管理江柱年老告休以其子阿克棟阿管理阿克棟阿缺出以其子阿勒吉善管理第四㕘領第七佐領即第六佐領内滋生人丁康熙二十三年索吉達管佐領時分編一佐領以其弟一等阿達哈哈番兼一拖沙喇哈番副都統圖克善管理圖克善故以其弟王府長史穆爾泰管理穆爾泰故以其兄之子三等阿達哈哈畨伊克都管理伊克都因病告休以其子佳琿管理佳琿缺出以其子富保管理第四㕘領第八佐領亦係第六佐領内滋生人丁先於康熙八年薩穆哈管佐領時分編一佐領以其叔父之子䕶軍㕘領闗岱管理闗岱故以其子蘇喇章京漢文稱散騎郎馬錫禮管理馬錫禮故以其子䕶軍㕘領蘇敏管理蘇敏從征陣亡以其子永清管理永清告休以其子伊昌阿管理第四㕘領第九佐領係第八佐領内滋生人丁康熙二十三年馬錫禮管佐領時分編一佐領以其伯父之子拜他喇布勒哈畨兼一拖沙喇哈畨呼沙琥管理呼沙琥縁事革退以其兄諾邁管理諾邁故以其子赫綳額管理赫綳額缺出以其子色布青管理第四㕘領第十佐領原係國初編立之半箇牛录始以滿丕管理後増以額克興額所管半箇牛录為一整牛录仍以滿丕管理滿丕陣亡以其子馬爾吉拉管理馬爾吉拉故以冷僧吉管理冷僧吉縁事革退以滿丕次子鄂禮管理鄂禮縁事革退以其弟鄂羅管理後鄂禮事白仍以鄂禮管理鄂禮故以巴格管理巴格故以鄂羅之子鄂爾和善管理鄂爾和善故以其子鄂金管理鄂金縁事革退以鄂禮之孫鄂海管理鄂海因病告休以其子巴哈布管理巴哈布缺出以鄂海之曽孫勲台管理勲台缺出以其子孝順阿管理第四㕘領第十一佐領即第十佐領内滋生人丁康熙八年鄂禮管佐領時分編一佐領以額克興額弟之子石圖管理石圖年老辭退以其子西納海管理西納海年老辭退以其子石林管理石林縁事革退以其子徳桂管理徳桂缺出以其子西來管理第四㕘領第十二佐領亦係第十佐領内滋生人丁康熙二十三年又分編一佐領以鄂禮弟之子鄂爾和達管理鄂爾和達故以其子二等侍衛鄂爾賽管理鄂爾賽縁事革退以額克興額弟之二世孫赫爾圖管理赫爾圖缺出以其子和敏管理和敏縁事革退以其伯父之子和寧管理和寧缺出以其弟和文管理和文缺出以其子和陞額管理第四㕘領第十三佐領係國初編設始以塔海管理塔海從征陣亡以其弟顧巴海管理顧巴海故以其族弟格善管理格善從征陣亡以其子華善管理華善故以其子華賚管理華賚陞任寳坻縣協領以其子倫序管理後復以華賚管理華賚縁事革退以顧巴海之二世孫佛喜管理佛喜故以其子富明阿管理富明阿缺出以其子海亮管理第四㕘領第十四佐領亦係國初編立始以董阿頼管理董阿頼故以其弟副都統阿進泰管理阿進泰縁事革退以侍郎吳努春管理吳努春縁事革退以長史希佛管理希佛故以副都統蘇赫管理後復以阿進泰之子達爾堪管理達爾堪縁事革退以其子䕶軍㕘領兼察旗御史阿林管理阿林告休以其子普興管理普興故以其叔父孟克管理孟克告休以其子二達色管理二達色缺出以其子凌福管理第四㕘領第十五佐領即第十四佐領内滋生人丁康熙三十三年達爾堪管佐領時分編一佐領以其伯父杜頼之子巴哈拉管理巴哈拉縁事革退