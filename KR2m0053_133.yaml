  text: 欽定四庫全書欽定八旗通志卷一百十九
  hash: sha256:bd57f5737900ec8d6678857e1e33ac19133df73d9fb372412639b96d043b9601
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_133-1a, image: WYG0665/WYG0665-1013a.png}
body:
  text: 營建志八水師營建規制戰船運船戰船健鋭營乾隆十六年設戰船八隻十八年添戰船二十四隻二十一年裁汰八隻二十三年裁汰八隻二十六年裁汰八隻三十六年裁汰四隻現計戰船四隻天津州水師營戰船雍正三年十二月奉㫖差教習蔡勇林全往江南浙江福建監造戰船計江南造送大趕􅙔船六隻小趕􅙔船六隻山版船十二隻浙江造送大趕􅙔船五隻小趕􅙔船五隻山版船十隻福建造送大趕􅙔船五隻小趕􅙔船五隻山版船十隻三省共送至戰船六十四隻金州水師營戰船康熙五十四年設計船十隻乾隆十九年裁汰四隻其修造定例自初造後三年小修又三年大修又三年如船身尚堪修理准再大修否則拆造凡應修之先查勘船身如尚堅固緩修一年其拆造改為大修大修改為小修旅順口水師營戰船十隻康熙五十三年自山東送至齊齊哈爾水師營大戰船十隻二號戰船十五隻江船五隻划子船十隻墨爾根水師營二號戰船六隻江船四隻黒龍江水師營大戰船十隻二號戰船四十隻江船十隻划子船十隻乾隆三十八年將齊齊哈爾黒龍江二處划子船裁汰其三處大戰船身長八丈三尺頭寛三尺中寛一丈三尺梢寛七尺五寸連樓二十二艙艙深四尺二寸大桅長六丈二尺五寸小桅長三丈二尺五寸二號戰船身長七丈一尺頭寛三尺五寸中寛一丈零五寸梢寛四尺八寸連樓二十二艙艙深三尺八寸大桅長四丈五尺小桅長二丈五尺江船身長五丈二尺頭寛一尺九寸中寛八尺二寸梢寛一尺五寸連樓十四艙深二尺八寸桅長三丈江寧府水師營戰船雍正五年二月奉㫖江寧駐防滿洲官兵照天津水師營例設立水師營毎年春秋二季於鎮江撥大小沙船二十隻發往江寕以備演習乾隆十六年奉㫖裁汰京口水師營左營舊設唬船二隻沙船八隻右營舊設沙唬船六隻髙資營舊設艍犁船三十二隻沙船四十四隻乾隆十八年裁汰左營唬船一隻撥交東海營裁汰右營唬船一隻撥交狼標右營裁汰髙資營艍犁船八隻沙船二十隻二十七年將軍奏明沙唬船身濶底平行走遲緩請改造海哨船計改左營沙唬船為海哨船十八隻改右營沙唬船為海哨船十隻改髙資營沙唬船為海哨船十二隻三十三年又改髙資營艍犁船八隻為外海快哨船是年即裁去八隻五十八年又裁左營海哨船十隻右營海哨船二隻髙資營海哨船六隻以上船隻俱由常鎮道承辦乍浦水師營戰船雍正六年四月題准照天津之例左營設大號趕􅙔船五隻小號趕􅙔船四隻南􅙔船二隻俱編為寧字號右營設大號趕􅙔船四隻小號趕􅙔船五隻南􅙔船二隻俱編為謐字號乾隆十五年將南􅙔船裁汰三十三年裁寧字大趕􅙔船五隻小趕􅙔船一隻謐字大趕􅙔船二隻四十七年俱一例改造小趕􅙔船此處船隻由乍浦同知耑辦委理事同知承估工竣之後都統騐收發營福州府水師營戰船雍正六年奉㫖福建駐防添設水師營兵六百名配給戰船於烏龍江下流三江口地方演習計大趕􅙔船二隻二號趕􅙔船二隻雙篷䑩船二隻又因洋嶼上下一帯小港灣㲼甚多再設小巡船八隻以備巡查乾隆十年奏准裁汰雙篷船二隻改造大八槳船四隻三十三年奏裁汰􅙔船二隻小巡船二隻計趕􅙔船長七丈一尺濶一丈七尺十九艙桅長七丈一尺八槳船長四丈濶一丈二尺十四艙桅長四丈二尺小巡船長三丈二尺濶九尺十四艙桅長三丈二尺廣東廣州水師營戰船乾隆十一年設外海􅙔艍船六隻櫓槳船八隻十九年裁汰􅙔艍船二隻四十年又裁􅙔艍船二隻櫓槳船四隻湖北荆州府水師營戰船康熙二十八年三月題准設立武常荆岳四水師營撥𣲖内河順字號沙船十隻廣字號戰船六隻大字號巡江船四隻豐字號戰船十四隻共三十四隻分防差操三十七年提督題請裁減三十八年經部議照舊存留奉㫖依議運船謹案烏喇所属一切兵糧全資輸輓康熙二十二年特命大臣相視河道于開城鄧子村易屯門及易屯口等處設倉毎嵗農隙之時運米貯于開城倉内春秋二季以舟運至鄧子村交缷自鄧子村陸運百里至易屯門倉由易屯河舟運出易屯口直達混同睿慮誠江自是轉運不勞飽騰有藉深逺也遼河運糧船一百隻每船載六十石易屯河運糧船一百隻每船載六十石混同江運糧大船八十隻每船載二百石以上遼河運船係兵部管理易屯河混同江運船係吉林將軍管理船厰船六十四隻大船七十隻以上船隻属吉林將軍管理凡遼河運丁滿兵三百名奉天府属州縣分派水手六百名每月給工食銀一兩免其差徭易屯河及混同江水手俱由吉林將軍分𣲖歳以為常凡烏喇修造船隻所需櫓牙兵部送給篷桅由工部運觧船厰船隻運糧船三十隻聴差槳船二十隻小划子船二十隻松阿里江口渡船四隻白都納船隻阿里江諾江兩界口渡船六隻喀薩哩渡口渡船一隻喇林河口渡船一隻嫩江渡船二隻塔阿河渡船一隻訥莫河渡船二隻墨爾根渡船一隻黒龍江渡船一隻呼蘭河運糧船十隻渡船一隻伊犁河運糧船十六隻渡船四隻恵逺城渡船四隻葉爾羌渡船二隻喀喇沙爾大渡船六隻小渡船四隻造船木料由本地砍伐餘物悉由内地調取欽定八旗通志卷一百十九
