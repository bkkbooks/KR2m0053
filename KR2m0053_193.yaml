body:
  text: 欽定四庫全書欽定八旗通志卷一百七十九人物志五十九大臣傳四十五滿洲鑲藍旗二遜塔根特巴都哩巴特瑪藍拜介山哲庫訥巴海額赫納嵩祝巴都哩姪海都巴都哩滿洲鑲藍旗人先世居性佳以地為姓父剛格當太祖髙皇帝時同其族人福瑚等來歸巴都哩屢從征任佐領兼參領太宗文皇帝天聰八年大軍征明大同巴都哩同宗室拜音圖等為嚮導當未入邉牆之先獲察哈爾宰桑四人以歸尋擢護軍統領崇德元年大軍征朝鮮豫親王多鐸統師攻克其國都巴都哩奉命同護軍統領鞏阿岱别率兵衆往濟其師進圍南漢山城屢敗敵兵二年從上行圍葉赫巴都哩與護軍統領哈寧阿所屬兵衆前後亂行上訓責之曰凡獵於布圍時即須分别整齊以次前進合圍始能得獸今爾等不加約束前後行赱參差何以使獸不突逸此皆爾等庸懦無能所致今次姑從寬宥後若再違必從重治罪三年隨睿親王多爾衮征明從密雲東北毁邉牆入越燕京趨山東克濟南府明年春凱旋出青山口明邉將以衆追襲巴都哩率兵還戰護軍尼喀遜被創墜馬巴都哩令護軍校拉卜什希遣人護之歸因付與護軍圖罕旋為圖罕棄於路巴都哩戰郤敵行已逺乃知之不及還携尼喀遜事聞鞭圖罕百貫耳鼻以徇巴都哩不早察知責罰如例六年授兵部參政尋兼任鑲藍旗滿洲副都統八年同副都統鄂洛塞臣征黑龍江招降圖瑚勒禪等城順治元年五月師旋世祖章皇帝遣侍郎明安達哩往迎宴勞以所獲户口一千九百有竒分𨽻八旗貂狐水獺等皮給從征將士敘功豫雲騎尉世職十一月擢鑲藍旗滿洲都統未幾卒無子以叔父之子杭嘉襲杭嘉卒子海都襲海都初任佐領兩遇恩詔晉世職為騎都尉兼一雲騎尉十一年隨貝勒屯齊出征湖南擊敗孫可望馬步兵於岔路口其餘衆復來襲我正黃正紅兩旗營海都奮擊却之十五年隨信郡王多尼征雲南擊敗李定國白文選于七星關聖祖仁皇帝康熙十五年海都任參領署護軍統領事隨安親王嶽樂征逆藩吳三桂師至袁州賊將夏國相等踞萍鄉縣拒戰海都領兵擊破之隨安親王至嶽州十六年同都統霍特率兵進擊偽總兵陳宗硌等於平江縣賊衆潰奔我師奮勇追擊賊潛出伏拒戰海都復擊敗之又敗賊將邱義朱永升等於七家洞桕營等地尋以疾卒二十五年敘功賞雲騎尉世職合所襲之職為三等輕車都尉以其子穆錫屯襲藍拜藍拜世居佟佳以地為氏父噶哈太祖髙皇帝時來歸任佐領𨽻滿洲鑲藍旗太宗文皇帝天聰八年藍拜任護軍參領奉命隨都統阿山略明錦州獲牲畜復隨前鋒統領勞薩率兵迎察哈爾部衆之來歸者尋擢副都統崇德四年五月以不稱職解任十一月命承政薩穆什喀索海分統左右翼征索倫部仍以藍拜管副都統事取道呼爾哈部攻克雅克薩城獲丁壯甚多索倫部長博穆博果爾迎戰藍拜同索海設伏擊敗其衆敘功授騎都尉世職分賜貂皮及所獲人户六年三月以隨睿親王多爾衮圍明錦州離城逺駐議革世職籍家財半命從寬罰鍰仍隨鄭親王濟爾哈朗圍錦州城明兵自松山來奪我紅衣炮藍拜率兵擊却之五月擢兵部參政八月明總督洪承疇集衆援錦州據松山列營藍拜同諸將進擊敗其三營尋敵騎乘隂雨犯我右翼藍拜同參領遜塔等拒戰大捷十一月調禮部參政明年七月部議圍錦州時徇隱軍士失律諸將罪藍拜應罰鍰得旨寬免世祖章皇帝順治元年隨大軍入山海關擊敗流賊李自成敘功晉世職三等輕車都尉三年上遣恭順王孔有德統師征湖南授藍拜為鑲藍旗滿洲副都統率兵偕征是時明桂王朱由榔據武岡自成餘黨郝搖旗王進才等降附之與明巡撫何騰蛟總兵黃朝宣張先璧等抗拒我師有德至長沙擊走王進才藍拜同副都統卓羅追擊其衆千餘殱殪過半下湘潭黃朝宣擁衆屯燕子窩藍拜同副都統佟岱乘艦至瀘口督兵破其營尋隨智順王尚可喜援桂陽賊聞風竄遁遂移師征道州擊赱郝搖旗旋會有德軍征沅州張先璧遣其衆自黔陽出扼要隘列五營有德令分兵擊之藍拜率先攻戰斬級七千餘遂合兵薄沅州張先璧集衆三萬拒戰悉敗潰取其城捷聞賜白金擢本旗都統五年九月還仍任副都統敘功賜黃金白金晉二等輕車都尉六年九月兼任禮部侍郎八年擢都統兼工部尚書九年四月調刑部十月解尚書任専管都統事十一月奉命同靖南將軍卓羅征廣東未定州縣尋以廣東漸定撤還屢遇恩詔晉爵至二等男十年十二月命率兵鎮守湖南時流賊張獻忠餘黨孫可望劉文秀馮雙禮等亦降附朱由榔由蜀江窺武昌嶽州常德諸郡藍拜督兵防禦賊不能犯十三年正月偕護軍統領蘇克薩哈等還京召見上親勞以酒諭曰爾等為朕宣力年久矣今見爾等形貌癯瘠朕心惻然藍拜奏曰宣力效勞人臣之誼臣等有何功績致厪聖懷今得覲天顔臣心足矣四月以老病乞解都統任詔允所請加太子太保康熙四年七月卒豫祭葬如典禮子幹都海襲爵遜塔子瑪錫泰遜塔滿洲鑲藍旗人姓覺爾察安費揚古之孫也父碩爾輝太祖髙皇帝時分編安費揚古所屬人户授為佐領尋卒遜塔承管之天聰八年太宗文皇帝嘉其克副任使豫騎都尉世職崇德三年授户部副理事官是年冬上遣師征明貝勒嶽託帥右翼由墻子嶺毁邉墻入遜塔署參領隨前鋒統領席特庫等擊敗明總督吳阿衡兵遂越燕京略山東明年春師還將出邉敵躡我後遜塔隨護軍統領圖賴等奮戰郤之敵侵我喀喇沁營遜塔移兵赴援敵潰走六年大軍圍錦州明總督洪承疇集兵赴援列營松山遜塔同參領藍拜率兵進擊連破三營敵乘隂雨犯我右翼營復同藍拜步戰郤敵八年十月授參領世祖章皇帝順治元年四月隨睿親王多爾衮入山海關擊敗流賊李自成二年敘功授三等輕車都尉世職三年隨肅親王豪格征流賊張獻忠過漢中同都統巴哈納等擊敗叛鎮賀珍兵進師西充獻忠紏賊抗拒遜塔同都統李國翰等連挫賊衆五年凱旋兼任刑部理事官尋奉命駐防淮安六年二月莒州賊曹良臣紏黨數百掠海州城知州張懋勳州同李士麟擊賊遇害遜塔同參領烏達齊兵偹道卞三元漕標逰擊王欽中等赴援賊遁歸馬鬐山乃進兵圍之絶其去路直搗賊巢良臣及其黨盡殱旋師復剿滅羽山牟山餘賊先是揚州設浙淮鹽務理事官兼僉事銜尋改兼户部右侍郎銜是年十月詔以遜塔任之駐揚州七年改督理漕運户部侍郎移駐淮安八年裁遜塔還京授鑲藍旗滿洲副都統三遇恩詔晉三等男十三年擢工部尚書考滿廕一子入監十五年三月監修壇殿工成晉二等男八月以建造乾清宮怠玩議降職得旨寬免九月兼鑲藍旗蒙古都統十七年二月應詔自陳罷尚書専任都統是年明桂王朱由榔竄緬甸其將李定國白文選等分踞孟艮木邦謀入犯永昌普洱元江上命定西將軍愛星阿偕遜塔及護軍統領費雅思哈等率禁旅赴雲南合鎮守兵進剿明年十一月會師木邦文選定國皆遁大兵趨緬甸緬人執由榔來獻文選降乃班師康熙三年敘功並録前此隨征張獻忠及剿滅曹良臣戰績晉爵一等男兼一雲騎尉世襲罔替四年五月遷本旗滿洲都統十二月卒豫祭葬如典禮諡忠襄子瑪錫泰襲爵瑪錫泰初任佐領尋兼前鋒參領康熙十四年隨信郡王鄂札征察哈爾布爾尼師次達祿布爾尼踞山岡列火器抗拒瑪錫泰率本旗前鋒薄險當其衝四戰皆捷敘功晉三等子十六年從大軍討逆藩吳三桂率兵赴吉安十七年授鑲藍旗蒙古副都統尋遷本旗滿洲副都統隨征南將軍穆占等鎮守茶陵攸縣諸處十九年隨征南將軍莽依圖征廣西至賔州陶屯擊敗偽將軍范齊韓詹養等二十年隨征南大將軍賚塔自廣西征雲南破賊將何繼祖王有功等於石門坎黃草壩進圍雲南城斬賊無算復同都統希福率兵剿賊楚雄賊將馬寶巴養元等窮蹙降雲南平凱旋晉一等子三十年四月以老病致仕尋卒子五爾希襲爵根特根特姓瓜勒佳世居尼馬察父尼努太祖髙皇帝時與其兄尼唐阿率衆來歸均任佐領𨽻滿洲鑲藍旗太宗文皇帝嘉尼努能事授騎都尉世職天聰八年隨副都統巴竒蘭征黑龍江呼爾哈部有功加一雲騎尉旋軍時有蒙古兵弗戒於火尼努被焚死根特襲職尋任刑部理事官世祖章皇帝順治元年睿親王多爾衮統師入山海關討流賊李自成根特署前鋒參領敗賊將唐通於一片石追剿自成至望都復同前鋒參領阿爾布尼剿撫馬塍口土賊敘功晉世職三等輕車都尉四年授協領駐防西安時叛賊王光泰據鄖陽詔侍郎喀喀木率禁旅自河南進征並調西安駐防兵會剿根特率兵破賊黨甄以鍾等於房縣旋師復敗賊方國成於谷口六年叛鎮薑瓖據大同其黨虞允白璋張萬全等陷平陽蒲州及臨晉猗氏河津諸邑根特隨總督孟喬芳侍郎額色統軍渡河剿賊復蒲州臨晉河津進征平陽白璋糾步騎六千至榮河迎戰根特同副將趙光瑞等奮擊大破之斬二千餘級復逐賊至黃河賊未及濟我師薄之溺水死者無算遂斬白璋餘賊竄入孫吉鎮悉殱焉移師趨猗氏偽監軍衛登芳依山結寨與張萬全為犄角以抗根特分兵擊斬萬全殱其衆移兵轉戰生擒登芳陳斬偽將王國興等三十員復剿賊聞喜敗偽都督郭中傑兵于侯馬驛追奔三十里斬獲無算仍還駐西安九年還京授參領三遇恩詔晉世職一等輕車都尉兼一雲騎尉十年明桂王朱由榔將馮雙禮白文選馬進忠等踞武岡寶慶根特隨貝勒屯齊征之自永州趨寶慶彼衆十餘萬扼險隘抗拒根特鼓勵將士分路截擊以驍騎衝之其衆遂亂時正黃正紅二旗兵方與戰根特復躍馬往夾擊之其衆大敗進征武岡其黨有牧馬者千餘來犯又敗之十一年九月隨寧海大將軍伊爾德往浙江剿舟山賊以右翼兵擊偽伯阮思及賊將陳六御兵獲其戰艦及紅衣炮復舟山十二年敘功晉爵三等男署鑲藍旗滿洲副都統十四年敘復舟山功晉一等男十五年授鑲藍旗蒙古副都統康熙十六年三月擢本旗滿洲都統列議政大臣二十三年四月以老病乞休三十二年卒賜祭葬如典禮諡襄壯子格圖肯襲爵巴特瑪巴特瑪姓博爾濟吉特世居克爾倫蒙古貝子伊蘇特之孫也太宗文皇帝時隨伯父宰桑古英率族屬來歸𨽻滿洲鑲藍旗分屬貝勒濟爾哈朗下尋授侍衛兼佐領太宗諭之曰爾雖分𨽻貝勒然朝夕侍朕朕必加恩崇德三年宰桑古英授爵三等男賜達爾漢和碩齊號巴特瑪授三等輕車都尉世職擢任蒙古都統是年十月隨貝勒嶽託征明由牆子嶺入密雲明兵于邉城東小門平垣處拒戰巴特瑪擊敗之於是大軍並進連克城邑略山東明年凱旋優賚牲畜金幣五年睿親王多爾衮圍明錦州巴特瑪同都統葉克舒設伏松山斬獲無算敵乘夜犯我後營巴特瑪復與貝子羅託擊却敵衆明年三月部議圍錦州時巴特瑪聽從睿親王離營逺駐且私遣兵丁還家應革職籍沒詔從寬罰鍰是年秋隨大軍擊敗明總督洪承疇於松山復同都統談泰等移師圍錦州七年明總兵祖大夀以錦州降部臣追論統師王貝勒於禦戰錦州城壕之役審察功罪弗當巴特瑪徇情附和應罰鍰上以王貝勒大臣等圍城日久勞苦有功槩免罪召集誡諭之尋命巴特瑪同輔國公博和託等駐守錦州八年隨貝勒阿巴泰征明至山東屢擊敗明兵之拒戰者旋師攻克新河棗強二城俘獲甚衆世祖章皇帝順治元年隨睿親王入山海關討流賊李自成遇賊將唐通兵數百巴特瑪為前驅擊敗之追破自成於望都二年敘功晉一等輕車都尉兼一雲騎尉三年隨肅親王豪格征流賊張獻忠於四川賊據西充縣界抗拒巴特瑪同護軍統領鰲拜率師奮擊陳殪獻忠大破其衆方合戰時護軍統領哈寧阿被圍參領希爾根未赴援及師還與護軍統領阿爾津等爭功部訊得實以巴特瑪在軍中不能勘定功罪致啓爭冒應罰鍰得旨寬免五年貝子屯齊等訐鄭親王濟爾哈朗過誤坐巴特瑪弗規諌罪削所管人户之半尋三遇恩詔晉爵一等男洊擢一等侍衛散秩大臣復進列內大臣十六年內大臣公額爾克戴青之僕陳保等毆侍衛阿拉那於市巴特瑪之僕亦助毆法司鞫訊聼陳保等誣詞坐阿拉那持刀擊人應革職折贖上鑒其誣下王貝勒覆勘得實額爾克戴青坐縱徇罷任削爵降巴特瑪世職為一等輕車都尉兼一雲騎尉康熙十一年六月卒子班達爾沙襲介山介山滿洲鑲藍旗人姓舒舒覺羅父法都太宗文皇帝天聰元年任牛莊城守尉同守邉官棟世祿岱達喀爾達塔爾弼喜等擊敗明兵於遼河岸殪其守偹一千總二把總二及兵二百獲船三尋授佐領卒後次子素隆阿襲管介山為法都第四子初由户部筆帖式洊遷理事官世祖章皇帝順治六年署驍騎參領隨睿親王多爾衮征大同叛鎮薑瓖協理軍餉十年授兵部啓心郎十七年遷工部右侍郎十八年聖祖仁皇帝御極調兵部右侍郎是年八月命往廣東會同平南王尚可喜等察看沿海城寨村莊限民毋得出界居住康熙二年正月還京疏言瓊雷亷欽諸府州各營汛有踰年未領餉者應定限撥運俾隨時給發粵東文武官委署冗雜應飭督撫提鎮慎加遴選沿途驛站苦纍嗣後賫詔賫敕官員若在同省者宜併合差遣其餘文書可由驛遞達者宜停遣専員又部發緑旗各營馬匹輒至疲斃皆由途間餵飼失宜宜慎選幹員解送事並下部議行四月輔政大臣鰲拜以介山在廣東所定海界不於册檔注明離海里數及詰問又先後矛盾傳旨下吏部坐奏對不實革職八年五月介山以鰲拜挾仇誣枉控訴議政王等謂介山革職由吏部定議非鰲拜専擅寢其事九年四月上以介山前此處分太過命降原官一級復用十二年四月授太僕寺卿十二月遷大理寺卿十三年二月兼管佐領十一月授户部右侍郎十四年擢都察院左都御史十五年五月疏言京師五方雜處設巡城御史詢民隱察姦宄乃蒞事六月稍稍諳練即屆更換非所以慎重城務也嗣後應以一年更換下部議如所請定為例十月康親王傑書討逆藩耿精忠降之將進剿海賊鄭錦奏請增參贊大臣十二月上命介山同兵部侍郎烏努春赴福建參贊軍務諭之曰耿精忠勢屈而降其心叵測仍須嚴防海賊鄭錦連陷府州縣生靈塗炭宜速圖克復爾素曉兵事凡機宜所在隨時奏聞勿為諸將掣肘十六年四月遷刑部尚書十九年六月康親王將班師奏厦門諸處新經恢復沿海官兵宜撒宜留令介山烏努春與奉使會勘之侍郎溫岱及總督巡撫提督定議以行尋詔介山率應撤兵一千移駐杭州即率出征福建之察哈爾兵還京二十年五月調吏部尚書後一月至京上諭曰爾出征甚勞察哈爾衆兵出征亦為勞瘁兹回本地宜加給行糧二十一年七月應詔陳時務疏言各省裁兵應設法安插咸俾得所上因諭督撫提鎮等曰各處兵丁有隨征進剿效力已久者毋概行裁退已裁兵丁及投誠歸農者其善加撫輯務俾有以資生二十二年二月調禮部尚書二十三年十二月以疾乞休命原品致仕三十四年九月卒年七十有四賜祭葬如例哲庫訥哲庫訥滿洲鑲藍旗人姓納喇世祖章皇帝順治八年定考試翻繹之制哲庫訥取中舉人明年會試中式殿試一甲二名授編修十年遷侍讀十一年遷侍讀學士十二年充日講官擢國史館學士十三年教習庶吉士充經筵講官十五年四月同侍郎霍達奉命往察直𨽻總督張元錫自刎事得學士麻勒吉胡兆龍竒徹伯奉使湖南歸途呵辱元錫狀麻勒吉等並降級十一月改內三院為內閣設翰林院命哲庫訥以禮部侍郎兼翰林院掌院學士十六年疏言八旗披甲人生計艱難宜授以恆産直省緑旗兵宜汰老弱勤訓練滇黔粵閩尚有負固不服及既降復叛城邑大兵所指宜専戮渠魁宥厥脅從則聞風懷歸者益衆十七年疏請時御便殿咨詢羣臣選博學方正之士隨侍左右記言記動以垂後世令庶司百職詳察現行事例未協宜者酌擬更改請旨施行並飭禁風俗之奢侈申嚴國學之考課疏並下王大臣議行尋詔翰林各官直宿景運門內以備顧問哲庫訥與掌院學士王熙自請分日入直並以讀講學士至編修檢討每日八員輪直上允所議十八年聖祖仁皇帝御極復內三院舊制改哲庫訥國史院學士旋擢吏部侍郎康熙三年會試舉人有逋欠錢糧朦混入場者議禮部侍郎察布海應降級察布海以持服未在事訴辨輔政大臣鰲拜因哲庫訥弗為奏白傳旨議處降一級調用補大理寺卿六年京察自陳鰲拜傳旨解任降四級隨旗行赱八年鰲拜獲罪拘禁哲庫訥訴辨其素與鰲拜齟齬致寃抑降調會國史院學士缺員上命以哲庫訥補授九年充玉牒副總裁官教習庶吉士是年仍改內三院為內閣設翰林院哲庫訥任掌院學士會復設起居注日講官命哲庫訥充之又充經筵講官太祖太宗聖訓副總裁官十年十二月遷兵部督捕左侍郎十五年正月卒賜祭葬如例巴海巴海滿洲鑲藍旗人姓瓜勒佳沙爾瑚達長子也初任佐領順治十四年授祕書院侍讀學士十六年襲父一等男爵世祖章皇帝諭吏部曰寧古塔係邉疆要地沙爾瑚達駐防年久甚得人心今已病故其子巴海素著勤慎堪代其父授為寧古塔總管十七年俄羅斯犯邉境巴海同副都統尼哈里等率兵至黑龍江松花江交會處偵賊在飛牙喀西境即疾趨使犬部界分布舟師潛伏江隈賊船踵至合擊之賊敗郤棄船登岸竄走巴海督兵追戰斬六十餘級溺水死者甚衆獲其船及鎗炮軍器因招降飛牙喀百二十餘户敘功加一雲騎尉十八年追論禦擊俄羅斯時有五船兵失利巴海不以實奏削一等男及雲騎尉聖祖仁皇帝康熙元年改總管為將軍仍以巴海任之十年上詣盛京召巴海問寧古塔及瓦爾喀呼爾哈人民風俗諭曰朕向聞爾賢能今益知爾矣飛牙喀赫哲雖服然其性暴戾當廣布教化多方訓迪俄羅斯雖云投誠當加意防禦訓練士馬整備器械毋墮狡計爾膺邉方重任尚其黽勉以報朕知遇之恩初邉境有墨爾哲氏者纍世輸貢至是巴海招之其長扎努喀布克托等願率衆內移巴海請安輯於寧古塔附近地設佐領四十以扎努喀布克托及諸族屬任之分轄其衆號為新滿洲十三年冬巴海率諸佐領入覲頒賚有差特賜巴海黑狐裘貂朝衣各一襲十七年諭奬巴海暨副都統安珠瑚實心任事撫輯新滿洲户口咸令得所各豫一等輕車都尉兼一雲騎尉世職二十一年巴海疏言巡緝採參官兵宜分别所獲多寡定奬賞之例上諭部曰盜採者緝獲視所獲多寡議敘甚為允當其非採參而孑身採捕他物者毋得妄拘並詳議著為令又時上幸吉林回鑾諭巴海以吉林兵丁勞苦宜加憐憫命除捕鷹取魚諸徭役俾勤耕種二十二年以奏報田禾歉收不實部議罷任革世職上曰巴海遷移新滿洲不可謂無功降世職為三等輕車都尉罷將軍任二十三年授鑲藍旗蒙古都統尋列議政大臣三十五年卒賜祭葬如例子四格襲職額赫納額赫納滿洲鑲藍旗人姓納喇世居葉赫祖蘇巴海國初來歸父渥和訥任世管佐領額赫納襲職任護衛尋遷護軍參領順治十四年隨寧南靖寇將軍貝子洛託征雲南康熙元年隨靖東將軍濟席哈剿平山東棲霞縣土寇于七十一年擢鑲藍旗蒙古副都統尋駐防山東兖州十四年九月以逆藩吳三桂耿精忠叛賊黨分犯江西命簡親王喇布為掦威大將軍由江寧移鎮江西詔額赫納參贊軍務十五年正月麻姑山賊王永召等犯江西省城額赫納同副都統席布敗之先是叛鎮馬雄勾滇賊王宏勳擾廣東上命簡親王於副都統額赫納巴爾堪內擇一為將軍兵援廣東王請以額赫納往命倍道速進未至而平南王尚可喜病其子之信以韶州南雄叛應賊連閩粵諸寇謀犯贛州額赫納退守南贛賊屯蓮塘口額赫納率頭隊敗賊衆斬偽將黃輝陳可相等遂進兵芝坪敗偽總兵吳漢興焚賊營二十餘十月廣東提督嚴自明叛犯南康縣進圍信豐額赫納同副都統穆成格迎擊之固鎮鋪擒斬萬餘自明走南安信豐圍解十六年三月上命副都統莽依圖為鎮南將軍赴粵以額赫納參贊軍務大兵抵韶州之信率官民歸正自明亦獻南安降十月三桂偽將馬寶王錦等營韶州城東山梗我運道額赫納同江寧將軍額楚分剿大敗之莽依圖以廣西巡撫傅宏烈兵單疏請令額赫納赴梧州協剿得旨額赫納速赴梧州即與傅宏烈同定廣西十七年四月調鑲藍旗滿洲副都統時廣東總兵祖澤清據髙州叛命額赫納回剿之次電白賊盡鋭據守額赫納連破其營斬偽總兵江瓊等賊四千餘追二十餘里圍其城賊黨王得功降遂進攻髙州澤清已挈家遁髙州平時賊首吳世琮犯南寧十八年五月額赫納至貴縣會莽依圖兵由橫州直抵南寧敗賊于新村世琮中流矢以二十騎遁奉詔速剿餘黨乘勝進取雲南十二月調鑲藍旗護軍統領十九年五月隨莽依圖進剿桞州至賔州之陶登遇偽將軍范齊馬承烈等由武宣迎敵額赫納同都統勒貝希福分路擊斬無算二十年正月偽將軍何繼祖擁衆屯安籠所拒我師額赫納率前隊進剿大將軍賚塔繼之大敗賊衆復安籠所二月次黃草壩偽將軍王有功張光先等屯曲靖府羅平州界額赫納同希福擊走之奪賊營二十二擒斬甚衆大軍尋平雲貴額赫納隨將軍班師二十三年調鑲藍旗前鋒統領二十四年擢鑲藍旗滿洲都統尋授議政大臣二十九年三月噶爾丹侵喀爾喀犯泛界上命額赫納同侍郎溫達等由歸化城分路偵禦會噶爾丹為裕親王福全敗遁八月額赫納撤兵還三十五年以老乞休允之四十四年卒賜祭葬如例嵩祝嵩祝滿洲鑲藍旗人姓赫舍哩父岱衮天聰時協管佐領兄來衮崇德時任侍衛順治元年二月授內院學士四年考滿豫雲騎尉職遇恩詔晉騎都尉世襲卒後弟瑚蘭布子瓦爾達姪雅圖遞襲十八年八月以嵩祝襲騎都尉康熙九年管佐領二十三年遷護軍參領三十三年五月擢內閣學士三十四年五月以盛京遇旱命同侍郎珠都納往會將軍等支海運存貯米萬石散給貧民以萬石平糶七月回京上問盛京各處田禾嵩祝奏上下不等盛京比年失收今嵗雖有秋難支來嵗上曰盛京貯米幾何若散賑可支幾月嵩祝奏臣等往賑五十日所用不至二萬石今天津海口所運及錦州積貯共十二萬石若以賑濟可支六七月上曰海運有定時其令來嵗再運九月命同珠都納往開原等處散給兵米諭曰將軍等請給米但言兵丁而已其陵上執事人及衆百姓並不言及此皆朕赤子可一併散給嵩祝奏臣等前次散給正當甚乏之時故計口月給倉米一斗五升今總發數月給一斗足矣上曰照前給一斗五升勿減省可給至來嵗四月爾等親加核散十一月回奏遵旨以盛京倉米計口給散兵丁執事人等均霑實惠三十五年二月上親征噶爾丹嵩祝分管正黃旗行營五月至克嚕倫河凱旋命協同內大臣公長泰統領後隊滿漢兵緩一日行接受西路軍營奏章閲視發遞御營六月遷兵部侍郎九月改護軍統領三十六年扈蹕至寧夏命昭武將軍馬斯喀等窮追噶爾丹嵩祝參贊軍務聞噶爾丹竄死其黨伊拉古克三胡土克圖奔投策妄阿喇布坦奉詔追剿至摩該圖不及而還以軍中散給兵丁米糧羊隻缺少嵩祝未以原奉詔旨宣示軍前削加級罰俸一年四十年九月遷正黃旗漢軍都統十二月廣東官軍剿連州猺人失利命嵩祝偕副都統達爾占侍郎傅繼祖往會總督石琳調廣西湖南兵進剿即授為廣東將軍四十一年正月瀕行諭曰猺人所居之山通連廣東廣西湖廣三省林木叢密山勢崇竣恃此險僻頑梗不馴自宋明以來即在此三省擾害民生爾等務體朕好生至意不必遽行征剿先曉示招撫爾等到彼即以猺人山寨形勢三省官兵進征之路及立營之處繪圖呈覽如猺人歸順止將殺害官兵之為首者正法可也二月師次連州駐軍三江口檄三省官兵分布要隘繪圖以進疏言猺人為數無多棲身之地亦未寬廣所恃者山險路狹耳諭曰猺人就撫則已否則於其居處要隘立營圍之不必勞兵力彼自窮迫四月疏言臣等遵奉皇上指示機宜勘視八排山寨即于要地設立營壘先遣人招撫連州界內油嶺行祥橫坑三排猺人先行剃髮開報家口荷負雞彘酒食呈送行營而連山界內之軍寮馬箭火燒坪大掌嶺四大排並雞公背等各小排以次剃髮投誠最後里八洞排猺人將為首殺傷官兵之李貴鄧二等九人擒獻即行正法示衆遣官察驗人口共八千一百餘安插事宜責成督提料理臣等撤兵回京閏六月赴熱河復命奏言猺人俱已受降皆由聖主威德無逺弗屆前者臣等請訓時皇上豫料五月內受撫之事必成今果如聖明洞鑒分毫不爽三省督撫提鎮以及軍民無不欽服九月調正紅旗滿洲都統四十八年二月署奉天將軍四十九年八月疏報錦州離城百二十里雙島有賊船十停泊又二百餘人樹旗二湖嘴山上施放鎗炮城守尉馬哈達等帶領哨兵屯丁分兩路截賊歸路賊衆爭路上船我兵追擊殺死三十餘名獲船一并牌刀鎗炮等物生擒賊船水手王遇機正法得旨嘉奬升賞在事官兵有差五十年二月疏言奉天所屬金州鐵山距山東所屬隍城島僅半日程請令山東防海水師官兵巡哨直至金州鐵山俾海邉賊匪無所容身又請揀選盛京滿洲兵一千教習鳥鎗為火器營俱下部議從之十月遷禮部尚書五十一年四月授文華殿大學士兼禮部尚書五十五年四月扈蹕熱河上以天時亢旱命嵩祝傳諭在京諸臣竭誠祈禱勿因遇端午節互相會飲越旬餘在京大學士蕭永藻王掞等以接奉諭示熱河得雨霑足臣等不勝忭具奏諭責嵩祝曰朕因憂慮暵旱兩降諭旨在京諸臣遲延日久始摺奏熱河得雨臣等不勝忭語止於此處得雨有何欣幸部院諸臣貪圖在家安逸祈雨之處未必親到朕兩降諭旨命爾抄發京師乃並不直書申飭又不察明劾奏爾乃大學士也是非所在豈特當與衆言之即於朕前亦當懇切言之可馳驛回京嚴察題參嵩祝至京察劾祈雨不到及奏報遲延之大學士蕭永藻王掞尚書赫碩色張鵬翮趙申喬陳詵王頊齡等以不早察劾自請敇部議處部議革職得旨從寬留任革退恩詔所得廕生六十一年冬世宗憲皇帝命復原職加太子太傅充纂修聖祖仁皇帝實録並重修玉牒總裁雍正元年賜詩有訏謨屬老成之句五年八月以奉天將軍噶爾弼察奏盛京庫銀虧缺三萬餘兩由康熙三十八年貝子蘇努任將軍私令官員借放收貯接任之將軍蒙俄洛嵩祝唐保住等徇隱不舉應分賠追繳敕部嚴議嵩祝革職罷任十三年卒年七十有九其原襲之騎都尉循例改雲騎尉以其孫蘇楞額襲欽定八旗通志卷一百七十九
