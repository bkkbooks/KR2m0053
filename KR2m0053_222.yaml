人府主事遷啓心郎十五年遷太常寺少卿十七年遷太常寺卿十八年遷兵部督捕理事官康熙元年擢順天府府尹二年授四川巡撫五年疏言夔州為水陸通衢請於雲陽巫山等處各設水站從之七年疏言四川自張獻忠亂後民少地荒請不拘省分凡無恆産傭工遊食之人地方官查報即酌給盤費招徠安置文武官量豫激勸招民百家以上墾田十頃以上者分别紀敘升轉則爭先招墾川省可冀富庶下部議行八年以捐賑修城議敘加工部侍郎銜九年五月以捐資招回川民六百七十四户安置得所議敘加工部尚書銜八月疏言康熙六年奉旨裁各省道廳以汰冗員但蜀居天末幅􅊷遼濶擇其最要者懇復四員以資管轄諭曰據張德地奏稱沿邉畨夷苗猓雜處道員必不可裁其各省亦曽題請存留道員或有禆益於地方邉疆著議政王大臣九卿科道議奏尋議如所請行十年四月武生劉琯等訐德地於康熙八年武闈賄賣武舉命副都御史阿範等往審以德地科場作弊擬斬援赦免死革職永不敘用十二年七月德地叩閽稱寃詔下部另議尋議德地科場受賄無實據前議太過應復職十三年二月復授四川巡撫時逆藩吳三桂叛七月偽總兵彭時亨等率衆三千餘犯廣元德地偕四川總督周有德親禦之十一月陜西總督哈占以蜀中水陸阻賊糧運難繼入奏命德地同大將軍洞鄂撤保寧兵回廣元廣元兵回漢中守陽平等處𠞰除寧羌諸賊十四年逆鎮王輔臣叛蘭州陷命洞鄂等進𠞰留德地協守西安等處尋興安兵變又命德地赴延安固守遏賊衝十七年正月兵部追敘廣元𠞰賊功諭曰周有德張德地等前在廣元時將供應大兵糧米不能運送接濟伊等徒然坐食糜費不過擊退來犯之賊並無大創功績又接駐大兵後並無效力之處著大將軍圖海參贊各官會同嚴察議奏先是廣元之役周有德劾奏德地棄城敗遁請革職命大將軍圖海質詢定擬具奏至是德地以平逆要略三事陳奏得旨張德地廣元敗遁貽誤地方及令守延安乃行推諉今又自行巧卸虛誑妄奏殊為可惡著吏部嚴察議奏部議革職提拏嚴審得旨張德地著革職免其提拏二十二年楚民胡朝勳許世杰等以德地局霸部民為僕勒寫身契控部經部訊德地巡撫四川時借招民為由將胡朝勳等招到四川即以所給路費作身價發知府冀應熊勒寫文契藩司劉顯貴用印屬實應議罪因事在赦前免議得旨依議尋卒桑額桑額漢軍鑲藍旗人三等侯李國翰第三子由護衛遷參領康熙三年授寧夏總兵十二年九月擢雲南提督未抵任值逆藩吳三桂反留駐荆州十三年正月改湖廣提督二月賊將夏國相犯澧州桑額率兵赴援戰失利還荆州三月賊將吳應麒陷嶽州順承郡王勒爾錦統師駐荆州令桑額移守武昌七月隨貝勒察尼規復嶽州由城陵磯進剿以炮擊沉賊船大敗賊衆于七里山下十五年二月敘功加右都督十七年七月賊由洞庭湖乘風出犯桑額率副將胡世英逰擊郭文魁等奮戰郤之追至嶽州城下九月賊船數十聚癩子山下桑額同前鋒統領杭竒合兵攻擊發矢石鎗炮殪賊百餘獲賊船四明年正月嶽州賊遁桑額收復華容石首安鄉等縣敘功晉左都督詔趣大兵滅賊收疆仍授桑額雲南提督桑額奏改彛陵鎮標兵為湖廣提標以舊所屬兵為雲南提標率之進征十九年三月同總兵陳珀遊擊李珵等攻克辰龍關復辰州沅州進征鎮逺平越貴陽安順及永寧州屢敗賊兵遂趨雞公背鐵索橋賊聞風震懾焚橋而遁桑額乃督土司沙起龍等築浮橋以濟師二十年二月隨大將軍貝子彰泰圍雲南省城同總兵白成功王仕華等屢敗迎戰賊衆逆孽吳世璠窮蹙其賊帥馬寶胡國柱俱自四川還救桑額率兵𠞰賊楚雄馬寶據烏木山列陳副都統託岱由中梁進攻營總斡都海由右梁進攻桑額領精鋭趨左併力衝擊賊衆潰遁窮追五十里馬寶越山遁赴大將軍賚塔營乞降與逆黨方光琛等並磔死桑額同都統希佛搜剿胡國柱於永昌截守潞江諸要隘國柱度不能脫自縊死其黨皆降雲南平初桑額赴援澧州退還部議應革職及進征雲南奏標下兵逃散三百餘上命左都御史哲爾肯赴武昌察審覆奏標兵因家口在武昌無資養贍逃回者千餘人上切責桑額不恤士卒下部嚴議應革職並得旨留任戴罪圖功至是敘功復原職二十一年五月乞休詔慰留之二十五年三月卒於官子李楠由佐領洊陟鑲藍旗漢軍副都統見大臣表許嗣興許嗣興原名嗣印漢軍鑲藍旗人父得功明副將順治元年投誠授三等男兼世管佐領官至雲南提督康熙十五年卒賜祭葬其孫國相襲嗣興于康熙十一年由兵部督捕筆帖式授山西蒲州知州十五年丁父憂服闋補山西欣州知州內遷刑部員外郎轉工部郎中尋授四川夔州府知府二十九年擢陜西洮岷道三十年八月岷州同知年昌齡首告嗣興斥辱屬員勒索金銀馬匹諸劣迹巡撫伊圖劾奏命革職三十四年梋復三十八年補湖廣下荆南道四十一年遷廣東按察使四十三年擢河南布政使四十五年十二月因廣東按察使任內承審不實部議降一級調用巡撫汪灝以嗣興于地方利弊民生休戚能實心經理疏請降留得旨俞允四十八年十一月擢福建巡撫四十九年閏七月泉州漳州福州興化四府及福寧州被旱嗣興疏報遲延諭曰督撫係封疆大吏水旱情形自應及時奏報漳泉等處五六月旱災督撫並未據實上聞至閏七月得雨後始行具奏殊屬溺職著嚴飭行嗣興尋疏請本年福興泉漳四府福寧一州所屬未完地丁銀緩徵並將各屬積榖發糶但賦既緩徵各鎮營餉不敷請於鄰省撥協銀三十萬兩八月又疏言閩省額賦嵗內完不過五六分至嵗外奏銷究不過九分必不能照奏撥之數完解賦少餉繁請再撥鄰省協餉銀三十萬兩並請凡遇大撥兵餉將本年起解地丁銀祗撥一半其半候撥次年兵餉庶不致遲悮俱下部議行先是嗣興任河南布政使時巡撫汪灝疏參歸德府知府郎鍾貪婪革職至是鍾以被誣叩閽命侍郎張世爵往審尋審得郎鍾因公科斂牙稅失察衙役犯贓屬實並無入已贓灝以貪婪糾參過為巧飾應降三級嗣興及按察使髙啓桂原揭過當應罰俸一年又豫省各州縣牙稅年額解司庫七千五百餘兩實盈餘銀萬七千餘兩灝及嗣興久任撫藩眀知此項盈餘不查出作正自四十五年至四十八年計銀六萬八千二百五十兩有竒除題明災除外餘令二人分賠事下部議灝應賠三萬兩嗣興應賠一萬兩得旨許嗣興年已衰邁且於此案有應賠銀兩著革任五十九年卒雍正二年子國桂為宣化總兵疏請豫恤賜祭葬如例蒲人公請崇祀名宦祠國桂初由佐領授參領康熙二十九年從征噶爾丹於烏蘭布通中火器傷得功牌一尋授副將纍遷浙江黃巖總兵江南京口副都統五十六年補漢軍正黃旗副都統五十九年大軍定西藏國桂領炮隨征凱旋敘功給雲騎尉世職雍正元年授宣化總兵三年遷漢軍正紅旗副都統四年以原任總兵時奉旨恩免兵丁應賠駝載馬匹兵丁私立碑為國桂頌德後任總兵黃廷桂劾之部議革職擬斬監候尋病殁其雲騎尉世職停襲尚之孝尚之孝漢軍鑲藍旗人尚可喜次子幼隨父於鎮所康熙十三年任藩下都統值逆藩吳三桂耿精忠反潮州總兵劉進忠叛應之可喜令之孝率兵討進忠先是可喜欲以長子之信襲其平南王爵至是惡之信􅒬酒嗜殺因疏陳之孝律已端慎馭下寬厚堪嗣職聖祖仁皇帝命之孝襲封平南王之孝畏之信啓巡撫劉秉權為之奏辭部議令可喜如舊理事俟賊平以之孝襲時普寧為進忠黨劉斌所據知縣段藻佯附賊潛遣人請兵約為內應之孝誘斌出城迎戰藻閉門絶賊我兵奮擊敗賊斌竄走之孝復普寧進征潮州進忠糾衆抗拒我兵三戰皆捷陳斬偽副將陳璉及賊兵千餘又攻克東津筆架山洗馬橋賊營十四年詔授之孝平南大將軍之孝圍潮州嵗餘進忠求援於海賊鄭錦錦遣偽總兵劉國軒引賊萬餘助進忠我兵戰失利之孝退駐惠州十五年可喜以疾劇入奏上命之孝還廣州視疾代理藩務之孝未聞命之信已降三桂脅之孝撤兵棄惠州之孝弗能抗解兵柄侍可喜疾及可喜卒仍間居廣州十六年之信歸順襲父爵之孝還京命列內大臣之孝疏言臣詣闕待罪分當誅戮乃蒙恩寬宥願募兵三千備軍械𠞰賊自效廷議如所請俟募兵數足分為三營設將校給以俸餉赴簡親王喇布軍供調遣于是詔授之孝宣義將軍十七年之孝率兵至江西時三桂餘黨猶分據吉安贛州山寨之孝與總兵許盛會師進𠞰多斬獲十八年招降偽總兵林興隆偽副將王國贊等二十餘員兵六千餘偽將軍楊一豹江機由廣信冦掠建寧邵武之孝奉詔赴福建會𠞰師至汀州一豹等降於康親王傑書軍之孝還江西十九年江西平命之孝還京以所募兵留充江西緣旗營伍是年九月之信以悖逆賜死廣州法司議之孝應連坐詔免之仍隨內大臣班入直二十年五月請迎其父骸骨於廣州歸葬海城得旨俞允二十二年議政大臣等追論之孝當之信叛時不能討賊邇者藉詞葬父久留海城又奏請欲守陵寢計圖晏逸請革職銜與其子弟並籍入內務府詔從寬止削其職三十五年正月卒年五十有七子崇坦官至鑲紅旗漢軍副都統欽定八旗通志卷二百八
