body:
  text: 欽定四庫全書欽定八旗通志卷二百八人物志八十八大臣傳七十四漢軍鑲藍旗朝李國翰來羅繡錦劉光弼申紀王用馬之先嗣興海爾圖尚之孝段應舉張德地桑額許李國翰李國翰漢軍鑲藍旗人父繼學初以商人隨明經略楊鎬軍通使我朝太祖高皇帝天命六年大兵取遼陽繼學來歸授都司以副將劉興祚婪索民財劾罷之復屢擒間諜追殺逃人敘功豫三等男爵尋以年老致仕國翰襲父爵任侍衛賜號墨爾根太宗文皇帝天聰三年從征明北京還攻永平先衆步戰有斬獲五年圍大凌河城內兵突出國翰率兵戰却之旋攻克一臺又擊敗明兵之自錦州赴援者九月考察所管人户以善於拊循晉二等男崇德三年七月任刑部理事官十月隨貝勒嶽託征明於邉外發敵所藏火藥數處比入邉遇敵千餘人據山列陳國翰率兵奮擊敗敵獲馬四十進克墻子嶺轉戰至山東克濟南府城師還攻望都獲鹿二城並以炮擊毁其垣四年授鑲藍旗漢軍副都統五年隨睿親王多爾衮圍錦州攻克吕洪山臺擊敗山口步兵敵兵自松山遁入高橋迤南三臺國翰偕衆攻克之斬百餘級生擒副將王希賢參將崔定國等七年明總督洪承疇就擒總兵祖大夀以錦州降移師攻克塔山杏山國翰並在事有功晉一等男加一雲騎尉是年擢鑲藍旗漢軍都統八年隨鄭親王濟爾哈朗取明前屯衛中後所二城敘功晉爵三等子順治元年五月大兵既擊敗流賊李自成定燕京國翰同都統劉之源祖澤潤率兵𠞰滅饒陽土賊康文斗郭壯畿等進征山西時李自成遁陜西其黨猶分據太原平陽等府國翰同都統葉臣合兵攻克太原復分𠞰賊衆於汾西縣山西既平凱旋賚白金五百兩尋隨英親王阿濟格征陜西屢敗賊衆自成遁湖廣移師追𠞰敗賊應山縣進征武昌同都統金礪奪賊船數百二年十一月命同都統巴顔率兵征四川甫至西安值叛鎮賀珍自漢中糾賊黨孫守法等來犯國翰與駐防西安內大臣和洛輝期師兩路夾擊斬級無算三年三月肅親王豪格統師至西安遣國翰同巴顔搜𠞰延安餘賊追至張果老崖掘壕困之乘夜攻克其寨殱賊渠獲馬二百餘遂隨肅親王征四川滅流賊張獻忠復率兵渡涪江擊敗偽總兵袁韜五年四月命為定西將軍同平西王吳三桂鎮漢中六年偽王朱森釡偽侯趙榮貴糾衆萬餘犯階州國翰先衆趨擊陳斬森釡榮貴尋擊敗偽將軍王永強斬級數千獲駝馬數百復宜君同官蒲城宜川安塞清澗等縣上深嘉其勇略並諭以自後但發縱指示不必身先士卒時叛鎮薑瓖據大同其黨劉登樓張鳳翼任一貴謝汝德萬鍊等分據城邑國翰遣兵會𠞰殱賊甚衆招撫河東諸處攻復府谷縣擒斬偽經略髙有才及偽官三百餘人招降偽總兵郝自德等先是張獻忠既滅其黨孫可望劉文秀白文選李定國等竄遁既而降附明桂王朱由榔與其所設官屬並據川東川南九年國翰同三桂督兵攻復成都嘉定擒斬其總兵李廷明林時泰龍名揚等文秀文選皆敗走别遣將分徇重慶敘州皆下之其守將王復臣等糾猓玀列象陳合衆五萬犯保寧薄城下國翰自綿州聞急趨援率兵奮擊斬復臣及賊衆萬餘捷聞頒賜紫貂冠服鋄金甲胄櫜鞬等物及鞍馬敕部優敘初國翰以征𠞰自成獻忠兩敘功復兩遇恩詔洊晉一等伯至是晉三等侯可望懲保寧之敗與定國併力犯湖廣不復窺四川國翰奉詔同三桂還鎮漢中而偽侯談文談洪談詣與自成遺黨劉二虎等聨結為冦尋復陷重慶使偽都督杜子香據之十五年三月國翰同三桂進征由南部西充至合州杜子香率衆迎戰敗遁遂復重慶以總兵嚴自明率所部留鎮而自與三桂進桐梓偽總兵王友臣迎降遂趨遵義偽將軍劉正國據險隘拒戰我師擊之潰由水西遁入雲南遂取遵義及所屬州縣五月進擊偽將軍楊武偽總兵梁亦英等於開州斬級千餘獲其象馬器械開州及附近城邑俱降水西土司安坤等並歸順時寧南大將軍宗室洛託與經略洪承疇已取貴陽國翰與三桂奉詔俟信郡王多尼征南將軍卓卜特兩路兵並進雲南乃還駐遵義七年疾卒喪至京命內大臣致奠贈太子太保賜祭葬如典禮諡敏壯長子海爾圖襲爵與第三子桑額俱别有傳世宗憲皇帝時以國翰入祀賢良祠其侯爵既襲三次循例改襲三等伯今上乾隆十五年加伯號曰懋烈羅繡錦弟繪錦羅繡錦遼陽人後𨽻鑲藍旗漢軍太宗文皇帝天聰五年始設六部繡錦由諸生授工部啓心郎八年命禮部試滿洲漢人通文義者為舉人繡錦與選賜衣一襲免四丁尋授國史院學士纂修太祖髙皇帝實録書成得優賚崇德七年兼授佐領順治元年七月擢河南巡撫時流賊李自成羽黨有衆二萬冦掠衛輝懷慶間而原武新鄉諸邑復有土賊為患繡錦同總兵祖可法協力防𠞰並請敕發八旗徑旅會豫親王多鐸統師征陜西上命取道河南相機𠞰賊諸賊或降或遁繡錦疏請以河北荒地九萬餘畝令守兵屯種得旨俞允二年十一月擢湖廣四川總督時湖南郡邑為明巡撫何騰蛟等所據自成遺黨一隻虎劉二虎等復冦擾湖北繡錦至荆州一隻虎率衆犯城順承郡王勒克德渾自江寧移師擊走之及順承郡王班師賊復窺犯繡錦飭兵防𠞰屢奏捷土賊胡公緒據天門縣之八百洲糾黨四出焚掠殺署鹽道周世慶繡錦遣中軍副將唐國臣署總兵楊文富分路進𠞰陳擒公緒平毁賊巢四年恭順王孔有德征湖南取長沙衡州寶慶辰州等府繡錦條奏增設鎮協移兵駐守事宜並下部議行先是襄陽總兵王光恩與鄖襄道李之綱互訐贓私下撫按會核光恩獲罪逮問其弟光泰遂糾衆作亂據鄖陽提督孫定遼戰殁上遣侍郎喀喀穆率師自河南進𠞰繡錦以兵會之復鄖陽光泰遁四川五年喀喀穆將班師值江西總兵金聲桓叛湖南騷動常德武岡辰州沅州復為郝搖旗馬進忠所陷繡錦奏留喀喀穆駐守荆州而分遣總兵徐勇馬蛟麟防守要地屢敗賊衆上復命鄭親王濟爾哈朗統師征湖南諸陷賊郡邑以次恢復繡錦疏言湖南叛服不常大兵凱旋之後恐餘孽跳梁煽誘降將如故凡勢窮乞降之衆宜安插腹地以靖疆圉上嘉納其言九年七月卒於官年六十有三賜祭葬如例贈兵部尚書廕一子入監弟繪錦順治八年授通政司理事官十三年擢順天府府尹十八年遷貴州巡撫康熙四年繪錦以定例荒地招民開墾三年後起科復經户部定議各省荒地限兩年墾遍過期遣官履勘因疏言黔省雖開闢數年而連年逆苗倡亂征剿頻仍不能不藉用民力又復疊遇水災已熟之田輒多荒棄未墾之地尚事招徠通計各府衛新墾之地有一萬二千九百餘畝應照例起科此外請酌寬年限並暫停遣官履勘疏下部從之六年十一月以年老乞休後卒於家劉光弼劉光弼遼陽人初冒姓曹後復劉姓𨽻鑲藍旗漢軍太宗文皇帝天聰五年任耀州城守尉率兵從上征明圍大凌河城攻克近城三臺城內兵突出光弼先衆馳擊斬一人我兵有陷陳者力援出之明監軍道張春總兵吳襄等由錦州來犯光弼衝入敵陳斬其禆將崇德五年任參領隨大軍圍明錦州同侍衛李國翰等攻克吕洪山諸臺屢擊敗松山杏山馬步兵敵以兵據山口阻我師光弼同國翰率兵奮戰敵皆敗遁錦州既下復以炮攻克塔山杏山兩城及附近臺堡敘功豫騎都尉世職七年六月擢鑲藍旗漢軍副都統八年同都統劉之源赴錦州督鑄紅衣炮尋隨鄭親王濟爾哈朗征明寧逺取前屯衛中後所二城敘功加雲騎尉世職順治元年隨大軍入山海關擊敗流賊李自成旋同都統葉臣等征山西攻克太原城三年隨端重親王博洛征浙江拔金華進定福建乃還京五年授禮部侍郎尋隨征南大將軍談泰討江西叛鎮金聲桓復南昌府談泰奏以光弼署江西提督事六年平廣昌縣山賊招降偽官三十餘員旋得旨實授提督時山賊張自盛洪國玉等據湖東劫掠光弼遣參將陳升等往𠞰斬獲無算偽總兵董明魁郭承旻等率衆降七年八年三遇恩詔晉世職至一等輕車都尉十三年詔奬力捍巖疆著有勞績諸臣賜鞍馬弓矢等物以示優異光弼與焉十六年以老病致仕康熙十二年卒豫祭葬如例子顯祿襲職申朝紀申朝紀遼東人後𨽻鑲藍旗漢軍太宗文皇帝天聰八年任刑部啓心郎崇德元年賜內院學士六部啓心郎以下諸臣人户牲畜分四等朝紀得二等優賜順治元年七月授河南河北道駐懷慶值流賊李自成之黨二萬餘來犯朝紀登城守衛晝夜不懈有賊渠乘白馬薄壕麾衆犯城者朝紀舉炮殪之賊黨悉驚竄二年七月擢江南布政使十一月擢山西巡撫三年疏言驛遞之纍民始自明季之計糧養馬按畝役夫臣蒞任後禁革驛遞濫應里甲私派雖積習已除恐踰時復蹈前轍請旨嚴飭勒石各驛永逺遵守又言闔省驛站銀舊額一十五萬有竒明季疊經裁減撥充兵餉于是驛費不足輒私派於民近蒙皇上軫恤民力經制次第釐定請敕部盡復原額庶驛費裕而私派永除又請定賦役全書凡應裁應留俱核實詳酌俾有司不得私徵濫派疏並下部議行四年四月陽城土賊王希堯賈國昌以邪教倡亂朝紀遣中軍都司白璧同冀南道武延祚率兵往𠞰希堯國昌俱伏誅五月汾州營叛兵李本清任自興等糾衆劫掠據永寧銅柱寨朝紀赴汾州指揮調度遣冀寧道王昌齡督兵同參將張國纓遊擊髙國盛等進攻賊寨發鎗炮殱賊無算擒李本清任自興獲馬騾弓箭等物焚其寨六月鄉寧縣逆民楊春暢等復以左道聚衆據冷泉寨洞朝紀遣平陽營副將范承宗𠞰平之七月擢宣大山西總督五年三月卒於任祀山西名宦祠王來用王來用漢軍鑲藍旗人天聰八年太宗文皇帝命禮部考取通滿漢蒙古文義者為舉人來用以漢書中式崇德元年授工部啓心郎八年兼參領順治元年授保定兵備道二年擢山西布政使三年三月大兵屯四川𠞰流冦張獻忠餘孽詔授來用户部右侍郎總督山西川陜糧餉駐西安六月疏言川陜賦役未定錢糧無從核對請敕部詳開實數以杜吏胥妄報弊七月又言道府州縣責在催徵應以完十分為上等七八分為中等三五分為下等嵗終察核實罰庶知警惕八月又言陕西被兵州縣地荒人少糧欠難追請蠲荒徵熟又山西舊銅日少鼓鑄日增定價過賤商販裹足請酌加均下部議行四年奏稱漢南遭賊賀珍蹂躪荒殘已極請加恩賑濟並敕部儲備肅親王凱還兵餉五年閏四月奏稱叛回倡亂河西運道阻塞進征雲貴大兵指日入秦請撥楚漕協濟八月又言漢中駐大兵錢糧嵗不下數十萬請専設餉司以専責成疏入俱如所請六年疏言出征兵丁例得家口養贍錢糧司兵者欲於離伍日算支司餉者欲於到軍日扣起又同時出兵有直至軍前或中途留駐不同請定例畫一銷算部議兵丁調後不論己未到俱應給家口養贍中途逃亡不得冒支得旨允行八年四月御史聶玠劾來用専倚中軍王楨自隳職業部議降一級用援赦免七月裁督餉總督入京另補九年授順天巡撫十年閏六月疏言山海永平距百五十里有永平道協中馭應裁山海道協止留遊擊三屯遵化距五十里有三屯協副將可兼攝臣又駐遵化應裁遵化協副將止留遊擊計裁兵千一百名馬蘭松棚喜峯太平四路守備僻冗亦應裁其兵無幾歸各汛分轄衝要如薊城駐餉司薊屬開平衛俱宜增兵二百拱華城宜設守備增兵百五十拱極城宜設都司增兵二百俱於裁數內撥補餘員歸部另選兵令歸農得旨具見用心料理下部議從之十二月移巡撫駐河間府奏言撫標兩營隨臣移駐請撤回城內舊設滿兵或調要處用尋議調滿兵駐德州十一年命各督撫確議衛所裁併之處來用奏裁興州後屯衛歸通州左衛大同衛