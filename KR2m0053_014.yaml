  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_014-1a, image: WYG0664/WYG0664-0243a.png}
body:
  text: 乾隆年間二乾隆二十一年二月初二日上諭今八旗人口孳生漸多將另記檔案抱養之子開檔人等查明業經降旨將無錢糧者即令出旗任其各謀生理外其食錢糧者如何定限裁汰出旗之處著該部會同八旗大臣定議具奏矣但宗室王公所屬包衣佐領下人等原定出力年久之人準該王公等行文令其出在該旗佐領下現在八旗另記檔案抱養之子開檔人等俱已查明辦理而王公包衣佐領下人等若仍準出旗旗人既多暫時不得錢糧伊等恐不無拮據兩無利益嗣後宗室王公等包衣佐領下人等著停其出旗佐領再宗室王公等包衣佐領下人內想來人口生齒亦繁該王公養贍伊等不無拮據著交宗室王公等各會同本旗都統將包衣佐領下人等亦明白查辦一次此次辦理後幾年再查辦一次之處俟酌量降旨此項人等亦可得一體各謀生理著該王公都統等即遵諭辦理乾隆二十一年六月初七日上諭昨據户部會同八旗奏稱將另記檔案及開檔人等出旗之事議得所有設法贖身作為公中開檔之人若令一體為民似無分别請查明此等根源分别辦理等語但令伊等出旗為民者特以旗人生齒日繁一切差使不能易得伊等徒有旗人名色不得自謀生理故特格外施恩縱有數人僥幸並無關礙毋庸深究若以此項作為公中開檔之人必宜查明其另記檔案及抱養之子根源亦屬不一豈能人人俱查耶且伊等原由有年淺者亦有最年久者按次考查不惟致增繁冗且交各甲喇各佐領陸續究查或理宜為民之人因無力被屈或實有情節者仗有力鑽營反得為民種種情弊在所不免是朕曲體伊等恩恤反不得周贍也此等作為公中開檔之人亦不必另行查辦著加恩俱令一體出旗為民此次辦理後復有設法贖身者再行照例查辦著交該部八旗遵諭辦理乾隆二十二年十月二十三日上諭此數年間每時屆冬出派王大臣等查明紫禁城內外該班之前鋒護軍賞給銀兩此項賞賚乃朕惠愛旗僕俾受朕恩原為奬勵差使勤勉者自應視其平素差使勤勉清語騎射嫻熟衣服單薄者賞給亦不得僅較其衣服美惡何則若以衣服華美而為殷實不賞伊等皆係一體食錢糧之人或知節省之道始能殷實耳其不肖之人因滋意妄費遂致艱窘似此等之人若因其衣服籃縷即行賞給則不肖之徒相習成風不肯學好且勉強顧臉之人反不能沾恩矣况人皆兾欲得賞而轉故服籃縷亦皆未可定若然此項賞賚不但非示以奬勵之道竟將旗人導之於不善矣嗣後於查賞時只查驗其平時射箭清語嫻熟差使勤勉者賞賚勿論伊等衣服之美惡將此著通行曉諭八旗現已天氣寒涼即著照此旨辦理乾隆二十三年二月二十七日上諭從前覺羅內有挑取供鍾子章京並未有翎朕因降旨令伊等俱戴藍翎此亦指六品以下人員而言並非以五品官員概用藍翎之謂也今見該衙門所有供鍾子覺羅等不論品級概戴藍翎甚屬拘泥嗣後所有挑取供鍾子章京覺羅內六品以下官員仍戴藍翎其五品以上官員著戴花翎將此著該衙門永為令乾隆二十四年正月十二日上諭從前紫禁城內門上該班之章京護軍等皆係輪流進班是以於有飯食無飯食處所皆得均勻行走今因午門東華西華神武四門進班緊要其章京護軍等皆擬派専人不令轉該他處之班著加恩此四門該班之章京護軍等亦著照他處給與飯食乾隆二十四年二月初四日上諭據禮部奏正白旗滿洲詳文內稱舒常之妻應給格格品級等因相應請旨給復多羅格格等語舒常係舒赫德之子舒赫德乃屢獲重罪之人因此次將軍兆惠深入接手辦事乏人伊甚屬奮勉出力朕始特恩復加録用此亦伊尚有承受朕恩之福適逢其會耳然朕猶格外加恩將伊子舒常補授侍衛此皆朕曲豫之殊恩稍有人心者即竭力奮勉尚恐不能仰報况復有為妻懇請品級之理乎復有兾倚妻之品級以期自身獲大品級之理乎果由舒常本家具呈是無恥已極朕必將舒常重治其罪今詢問並非由舒常本家具呈係諴親王意見咨部者舒常之妻係裕親王之女王等管理旗務即如此袒庇王等之女徇情咨行可乎且恩典者國家甚要之事當施恩者始施恩耳豈臣下私行瞻顧即能希冀恩施者耶即王公之女格格等給與品級亦國家曲豫之恩如平素並無事故始可照例給與應得之恩典若屢獲重罪仍按照初次給復原品有是理乎諴親王如此瞻徇非尋常瞻徇可比諴親王著交宗人府嚴加察議觀保身為副都統乃身同尸位亦屬非是觀保著一併交部嚴加察議此事禮部理宜駁回該部若果駁回伊等即無不是即不駁回僅照舒常品級議給品級其誤尚不過交部查議乃該部並不照例辦理轉奏請給復多羅格格品級此非瞻徇舒赫德而何朕前伊等如此行事可乎禮部堂官著交部嚴加查議再向例王等之女格格等近派者皆奏明指人逺派者許人後完姻時奏請品級今接踵相沿近派王等亦多有先許人始行奏聞者朕從前將王等之女格格等多指給蒙古台吉此亦因係舊俗且以蒙古台吉等本係親戚彼此連姻由來已久况查取京城世家大臣子弟將王公等之女婚配者亦有今王等每欲違棄舊俗惟願給配京城之人或又有無恥之徒向王等營求私相議定完姻時始奏請格格品級甚屬惡習從前並無此等陋習亦此數年間始興起者此風斷不可長除已經婚配者不議外著交該衙門現在親王郡王等之格格內如有已經許配京城之人尚未迎娶者仍準其給與斷無離人夫婦之理著查明指名奏聞將該親王郡王罰俸一年嗣後凡親王郡王之格格等俱著照舊例俟朕降旨指給蒙古台吉其中若係伊等之親戚行走相熟之蒙古私行給與者尚可準其私下結親後奏聞其不行具奏私與京城之人結親之處著嚴行禁止乾隆二十五年五月二十日上諭行圍乃滿洲故業所以嫻習騎射技勇之事皇祖在位時以滿洲故業為要曽經行圍朕臨御以來效法皇祖恐滿洲故業有失欲令官員兵丁學習騎射技勇嘗率伊等行圍每次賞賚乃希圖安逸不肖之徒不識朕教養滿洲之意反以行圍為勞衆不無怨望本日朕恭讀皇考世宗憲皇帝實録雍正四年奉上諭皇考六十一年躬行諸務朕能勉力效法者無不敬謹力行其未能力行者朕則俟諸異日即如皇考慎重武備每嵗巡幸出口行圍訓練軍戎一事朕此數年來並未舉行其懦弱無識之官員及懶惰不堪之兵丁等多有以朕之不行圍為是者此皆愚賤之人茍圖安逸不明大體之言國家武備關係緊要一日不可廢弛朕之不行圍即朕之不逮皇考處也朕自知之皇考德盛化神睿慮周詳巡幸所至日理萬幾無少遺漏無異宫中朕則自朝至暮殫竭心力猶慮辦理未能允協行圍一事實無暇舉行此即朕之不如皇考處也皇考神武天縱挽強貫札超絶千古衆蒙古等無不仰瞻驚服朕之射藝又不逮皇考皇考聖躬強固行健如天雖至暮年不減少壯朕之精神復不逮皇考是以於出口訓兵一事意未舉行惟於前嵗遣皇子等赴口外教演行圍復於引見武辨及旗員時皆觀其射藝始行補用俟朕辦理政務皆秩然就理後即於農隙親舉行圍之典朕事事皆不如皇考惟洞達下情躬親經厯朕在藩邸四十餘年凡大臣官員結黨蓄姦鑽營請託欺蔽朦混面從背違一切假公濟私之習無不真知灼見可以指數是以於今宵衣肝食勤勤懇懇為世道人心計其長久不得不嚴訓之不能不切並非好為講論自取憂勞也雖然由此擴謀行政尚未能及皇考之萬一亦惟事事黽勉效法而已欽此由此觀之皇考世宗憲皇帝十三年內雖未經行圍而聖心要未嘗不以訓練官兵射獵行圍為要務也朕此數年巡幸出口行圍正仰體皇考之心效法皇祖教養滿洲之道且朕巡幸行圍於一切應辦事件仍照常辦理毫無遺悮即扈從之官員兵丁等皆特恩賞給幫銀路費官馬伊等亦毫無苦處官員兵丁各宜仰體朕意勤習騎射技勇一切行走之處皆奮勉行走不可希圖安逸流入懶惰習氣以致有失滿洲故業將此通行曉諭八旗乾隆二十五年六月十二日上諭八旗滿洲蒙古皆各有姓氏乃厯年既久多有棄置本姓沿漢習者即如牛呼魯氏或妄稱為郎姓即使指上一字為稱亦當曰牛豈可直稱為郎同於漢姓乎姓氏者乃滿洲之根本所關甚為緊要今若不行整飭因循日久必致各將本姓遺忘不復有知者著將此交八旗各省嗣後引見人員俱將姓氏繕寫緑頭牌面仍勒限一年如一年後經朕詢問仍有不能對答者斷乎不可必將該管大臣一併治罪再挑選秀女時亦一體遵照各將姓氏繕於緑頭牌面將此通行曉諭乾隆二十六年八月初八日上諭八旗滿洲俱係朕世僕出征之事俱係伊等分所當然且微有勞績年老患病不能當差者子令休致給與俸祿乃國家格外之恩自古罕有之事但風氣頽衰似此格外之恩衆悉不曉以致視為應當至上年據伊勒圖以護軍校蘇朗阿在軍營因受潮濕患病請休致給與全俸等語具奏因其特以出征視為竒特似有勒請期望給俸之意是以朕將蘇朗阿未曽給俸將伊勒圖所奏非是之處已降諭旨通行曉諭矣今𢎞昉所奏護軍校五十七雖係駐戍之兵如在軍營僅居住一二年尚不便給俸五十七在軍營居住八年且又在蘇克阿勒達呼地方前往防殺賊匪即呈請解退亦不過因患眼疾不能當差之故並非似蘇朗阿在軍營身致殘廢可比看來衆已曉朕訓飭未敢以出征為竒特妄為矜誇矣𢎞昉理宜將五十七可否照例賞給俸祿之處奏請乃必不準其得俸所辦亦屬非是伊以為從前朕未準蘇朗阿得俸者蓋因節省錢糧是以迎合所行甚屬鄙小朕豈如是之主乎朕於旗下世僕加恩不下盈千纍萬至數人俸祿又需幾何况大臣等辦理此等事件理應援例請旨可否賞給之處以俟加恩豈可自行専主辦理𢎞昉並不計其事理糊塗辦理甚屬不堪𢎞昉著交部嚴加察議具奏將此著通行曉諭八旗乾隆二十七年五月初八日上諭八旗都統副都統雖係分别頭二品職銜即與尚書侍郎無異均有管理旗務之責凡遇辦公理宜合為一心妥辦或都統員缺令王等兼管特因都統員缺不得其人是以由王等內簡其能辦事者管理此例亦由來已久俾王等習學事務之意王等自當於旗務盡心勉力辦理不得驕傲從事至大臣等亦不得謂其占伊升階但習俗日漓不免滋此兩項弊端即如王等品級雖尊亦不過於應論品級之處論耳於都統任上行走即與都統相等豈可以王稱呼耶或副都統內有不曉事之人濫為迎合參佐領等又屈奉諂諛不惟於旗務尤為無益亦關國家體制此豈與朕㨂派王等管理都統事務之意相符耶嗣後王等有兼管都統者惟當論都統職任於旗務悉心善為辦理以副朕揀用之意著通諭八旗知之乾隆二十七年五月二十三日上諭現詳查另記檔案人等或有一旗分意欲上自康熙年間徹底查察者大臣等皆未曉朕意前經屢降旨令另記檔案人等自行出首昨又降旨賞給十五日限期如有自行出首者免其治罪此特為將乾隆二十二年叧記檔案之人查明其已經為民後復入旗檔占有兵丁額缺者詳加查察之意並非欲自二十二年以前上掀查察也果若此詳查年嵗已久而旗檔亦不能齊全何時得其始末耶况二十二年另記檔案人等遵奉朕旨自行出首時朕尚加恩賞賚為民今此等業經為民復入旗檔之人內如果十五日限其自行出首不過不治其罪亦不賞賚而已大臣等查辦此事惟將二十二年既已自行出首為民後復入旗檔之人詳查如十五日限內自行出首者不治其罪亦無庸賞賚仍著為民如尚隱忍不肯自行出首至限期已滿經大臣等查出即著從重治罪其中如有二十二年未經首報遵奉新旨自行出首者著照前次加恩賞賚為民至近有阿里衮等查出所奏正白旗蒙古另記檔案中書達賚等十五人均係二十二年以前即入於叧户檔案之人並非為民後復入旗檔者著加恩將達賚等十五人俱免其治罪所有伊等家産妻子俱不必賞給王大臣等仍著為民現在八旗內若有如達賚者俱照此辦理既將達賚等加恩免其治罪所有失察之厯任都統官員等亦著加恩免其交部治罪將此著再傳諭八旗遵行乾隆二十七年閏五月初六日上諭從前準噶爾部落素不安分憑陵衆蒙古自噶爾丹時即肆跳梁侵擾喀爾喀西藏是以我皇祖皇考不惜帑金先後興兵征討數十年來上煩聖慮伊等野性難馴喜相爭奪以致自生內亂互相殘滅爰有策凌等各率所屬歸誠朕以機會可乘特選將出師掃除凶逆大兵所至勢如破竹不一二年平定其亂肅清疆宇擬欲撫綏其衆俾各安生計詎伊等無福承受數應滅亡復生叛亂是以更遣偏師殱除醜類平定伊犁至回人素為準夷役使兩和卓木俱經拘禁額林哈畢爾罕我兵𠞰定伊犁時念兩和卓木均係派哈怕爾後裔特命釋放送歸原處居住乃小和卓木霍集占受朕深恩毫不知感輒敢反噬傷我王臣因降旨令凱旋官兵乘勢將葉爾羌喀什噶爾諸回城悉行收服追剿兩和卓木直抵拔達山部落該回目即將霍集占斬馘進獻此皆伊等罪惡貫盈上干天譴是以軍行所過降服者撫之凶逆者殄之數十載未竟之緒五年以來悉為底定拓地二萬餘里均照內地兵民駐劄屯墾誠自古罕有之竒功也在事奮勉諸臣現經部臣查奏請旨應得世職者約五百餘人朕以敵愾奏功勞績克著酬庸之典即稍從優渥亦非賞賚無節者比雖其間實有奮勇出衆及隨營效力之不同但宣力行間均屬勤勞王事正不必過為區别此內除達爾黨阿哈達哈皆僨事獲罪無庸議給世職外其餘諸人俱著照部臣所奏一體加恩賞給世職各於本身兼帶此等皆滿洲世僕得此恩賞世職俸薪養贍家口更覺充裕而八旗添設世職五百餘員於旗人生計亦大有禆益並將此通諭知之乾隆二十七年七月初四日上諭前降旨將八旗官員所有應扣應罰俸銀等項俱已加恩展扣俾得按數全支苐念領俸之期應在八月初旬為時尚早再著加恩令將應支本年秋季俸銀俸米均改於七月十四日起即行文支放所有滿漢大臣官員俸給俱一體早放以資接濟該部遵諭速行乾隆二十八年二月初十日上諭據松春奏西安現有滿洲漢軍副都統各一員滿洲副都統所管八旗滿洲兵丁七千名漢軍副都統所管八旗漢軍兵丁二千四百名所管兵丁額數懸殊請將現任西安副都統偉善定為左翼滿洲副都統管轄滿洲漢軍兵丁將曹英所遺漢軍都統員缺改為右翼滿洲副都統員缺管轄滿洲漢軍兵丁等語西安副都統二員令分左右翼管轄理宜如是但必以漢軍副都統員缺改為滿洲副都統員缺所奏殊屬非是滿洲蒙古漢軍皆朕之世僕孰不可以補放何必定擬為滿洲副都統之缺松春所見甚鄙嗣後以滿洲人員補放亦可以蒙古漢軍人員補放亦可將現在西安副都統偉善即為左翼副都統曹英所遺之缺即為右翼副都統之缺著永為令乾隆二十八年十月二十九日上諭向來旗下家奴多有書寫旗奴者甚屬非是著交各該處嗣後俱寫旗下家奴不得仍書旗奴二字乾隆二十九年三月二十四日上諭近聞各部院辦事惟司員説堂畫稿而各司筆帖式經年不得常見堂官其所熟悉者不過跟班數人而已筆帖式將來俱可升用司員若該堂官未經謀面遇有保題升用之處止以司官之言為憑於理未協該堂官自應於筆帖式內留心察看遇有堪以造就尚能辦事者時加訓勉以期有成嗣後各衙門司員説堂畫稿時並令筆帖式隨同行走仍就各該處筆帖式人數多寡酌定班次輪流上堂識認則該堂官自可悉其才具因材造就如有怠惰庸劣之員該堂官亦可隨時參革乾隆三十年六月初九日上諭八旗世職官員原因酌量勳勞議定襲次以昭報功施恩之意但承襲時皆係由該旗將本支子孫查眀承襲如本支無人準令於逺近另支派中挑選承襲此亦曲豫恩施但準此等另支承襲族中疏逺人等甚多與立功得官之人全無干涉或承襲時猶有調取各省駐防兵丁人等使其承襲此項人等愚昧者多惟能披甲當差而與世職之任多不相當既經承襲後竟不能當差一有過失革職乃反不如伊等披甲且致苦纍理應概行查明酌量辦理嗣後將並非逺派宗族例應承襲者仍照舊例辦理外其極逺支派及調取外省駐防兵丁來京承襲之處均著停止於原立軍功本支承襲出缺之家應如何加恩之處著該部會同八旗大臣等詳細查明定議具奏至例應承襲人等於出缺之名下有應扣賠官銀例應著落於承襲人員應得俸祿內坐扣完結惟此項人等多有皆係小官或由兵丁間散承襲者家計殷實者少僅得一官伊等應得些小錢糧業經裁去又將承襲世職俸祿扣賠於伊等當差實屬不無拮據著交該部八旗將此項官員名下所欠官銀共有若干之處一併查明繕寫清單進呈以待朕酌量降旨辦理乾隆三十年九月十二日上諭據兵部八旗會議查辦世職一摺甚屬錯悮殊非朕體恤加恩之本意前因世職人員內有由兵丁襲職其本身應得錢糧既經停止而所襲世職俸祿又代扣本缺之應還官項是一經襲職而當差度日反無所資且材質兼有宜於兵丁而不宜於服官者往往易於獲咎斥革轉不如披甲食糧之得以常留生計而其中或有因一本宗無人遞及疏派承襲者得官既無所利並至失其故業未嘗不轉以襲職為纍是以降旨令該旗查議量為變通原欲於酬庸延賞中寓曲加恩恤之意也乃該部旗議稱輾轉承襲施於渺不相涉之人未免濫邀爵賞請停止逺支承襲者二十餘員等語於大意全未體會竟似朕此次查辦因靳吝世職起見矣試思邇年平定伊犁回部録勳錫爵特豫世職者不啻五六百員之多何有於此二十餘人而顧為之查核裁制耶國家豢養八旗為之計長久而籌贍育者恩施優渥如果於伊等生計有益雖稍濫亦非所惜此議不必行現在襲替無人祗有逺族及别族同姓子孫者亦應俟將來出缺時再行辦理何必亟亟於此預為計議至所有查出承襲各官名下應行代扣官項銀四萬一千三百餘兩及世職佐領代扣出缺人員各欠項六千六百餘兩俱著一併加恩寬免以示優恤可將此通諭八旗知之乾隆三十年九月二十一日上諭八旗世職官員出缺時將伊等原借官項例應俱著落於承襲人員賠繳但此等承襲人員內由微員兵丁間散承襲者多既承襲後將伊等原食錢糧業經停止而俸祿又代人扣賠各官項於伊等生計無益經朕特降諭旨交該部八旗大臣等查辦嗣據該部八旗查明具奏承襲人員名下應代扣官項四萬餘兩並有代世管佐領出缺人員應扣各項銀六千六百餘兩等語朕即將代賠之項均著寬免此特以逺族人等雖經承襲官職尚代他人扣賠銀兩於伊等生計甚屬無益故朕施恩今據永慶等因伊父所欠官項免其賠繳具奏謝恩是該部八旗大臣等所辦甚屬錯謬以賠補他人所欠官項謂之代扣可也而子為父賠繳欠項亦謂之代扣可乎且伊等所欠俱係支借官項即其子不襲官時亦應著落賠補非逺族人承襲者可比如弟兄叔姪承襲雖不得謂之代賠而與父子尚稍屬有異若係父子實屬無所區别據此辦理竟將父子視為無干之人是導旗人為不孝有是理乎即朕節年為旗僕一切生計施恩賞恤亦為數不少果有應施恩者雖數百萬兩亦無所吝惜若於道理不合情事亦斷不能施行今伊等將父子視為無干之人而入於代賠數內牽混具奏何以存心竟不曉事體殊成笑話今朕業經降旨寬免仍著施恩寬免其子賠父項銀兩即著落措辦該部八旗大臣等賠繳併將伊等交部嚴加議處乾隆三十年十月初三日上諭八旗官員因事故離任尚有未完宗人府銀並紅白事借俸資生等銀在伊等親戚家族及保官披甲兵丁並子孫俸餉各銀內扣還者共一萬六千七十兩零又因無俸餉可扣按季交納者共七千七百兩俱係應完之項今八旗世職應接扣前項銀四萬餘兩已加恩免其扣交此項銀兩並著加恩一併豁免以示體恤乾隆三十二年五月初四日上諭滿洲蒙古人員內由道府等官丁憂回籍者與漢員不同漢員丁憂回籍必待二十七個月服闋始以原官補用滿員則滿百日後例應行走當差既令在原衙門分别補用即有俸糈飯銀足資養贍非家居持服者可比原不應復照漢員一體起復銓補但思伊等曽任外省於地方事務自較熟練且現在遇有道府缺出除授需人著吏部將各衙門由道府服滿改補京職人員查眀帶領引見如有堪勝外任者交軍機處記名俟請旨缺出開單進呈候朕簡用其服滿同知通判州縣等官亦著該部帶領引見如果其人仍堪外用即交部照例銓選乾隆三十三年六月十二日上諭門上侍衛俱係內廷當差進班隨侍最為緊要差使亦甚榮耀况侍衛等並無别項差使該侍衛等理宜各顧體面敬謹當差倍加勤勉今據領侍衛內大臣等奏侍衛等於內紫禁東園前園及跟隨阿哥等出入者空班多人進班散秩大臣等非専管侍衛之員每多疏縱請交散秩大臣等嗣後每遇進班嚴察侍衛等語是侍衛等習氣下流踈懈不堪之至從前朕曽屢降諭旨何至下流一至於此此皆領侍衛內大臣等平素不以為事疏縱瞻徇漫不經心嚴察約束之所致如富恆阿里衮身係軍機大臣事體繁多無暇及此其他該管大臣等俱何為者伊等平素惟事柔懦不行嚴管以致侍衛等習氣下流一至於此成何事體嗣後各侍衛等均各勤勉當差痛改流習各顧體面謹慎行走扎拉豐阿趙德達色等又有何事理應不時稽察伊等務須嚴加管束留心稽察再從前內紫禁進班之護軍等坐堆傳籌恐其懶惰朕曽降旨専派人員稽察迄今並未出派至今日久又懶惰不以為事均未可定朕今派人稽察進班侍衛將進班之護軍等一併稽察各該大臣等倘仍不嚴行管束稽察茍且從事以致空班經朕察出斷不輕貸必將伊等從重治罪再散秩大臣等雖非専管侍衛之人但一遇進班是日侍衛差務均係伊之責成尚可推諉乎嗣後散秩大臣等將本班侍衛等留心稽察倘有空班者應參者即行處參應回領侍衛內大臣者即為回稟倘不以為事茍且塞責一經領侍衛內大臣察出將散秩大臣等一併題參將此旨交各該大臣通諭侍衛護軍等敬謹遵行外於侍衛護軍等進班之各堆撥處所粘貼以示懲戒乾隆三十三年九月二十九日上諭據增海奏廣州八旗滿洲兵丁內年幼身弱披甲者二百二十九名內仍有兼食錢糧者一百三十六名請將馬甲革退孀婦孤子無依靠者九十三名照依現由天津移來養育之例給豫錢糧等語各省派往兵丁駐防特為防守地方起見理應挑年壯技強者俾成健鋭如不得人暫行懸缺俟得人時再行挑補有何不可乃將並不能馬步騎射之幼丁挑補充數可乎今廣州將年幼身弱者挑為馬甲甚屬非是此內有兼食錢糧者一百三十六名著俱行革退孀婦孤子無依靠者九十三名照依養育兵例給豫錢糧之處均照增海所請辦理從前將軍大臣等所司何事將此交李侍堯增海於此項糜費錢糧著落辦理錯誤之厯任將軍大臣等分賠之處察眀具奏看來各省駐防似此將幼丁挑為馬甲者亦不能保其必無將此交各省駐防之督撫將軍副都統等將有無將幼丁挑為馬甲之處查眀據實奏聞乾隆三十三年十一月初六日上諭上年進𠞰緬匪我滿洲官兵勇往爭先經朕加恩將宣力人等俱交部議敘賞給官銜陳亡者亦分别賞給官銜銀兩並給養贍孀婦俸餉但官兵內有緣由不眀者六百四十四名經部議俟事體眀晰後再行定擬加恩辦理等語此等緣由不眀之人若均算入陳亡之數一體施恩而賊營內滿洲緑營官兵均有其一體施恩可乎若竟不算入陳亡數內如此多人豈盡寄於賊巢或因回兵時因傷病身亡或陳亡時無人目睹結保未經算入者均亦有之此等之人若俟事體眀晰後再行加恩伊等妻子現無依靠不無貧匱朕心實為憫惻况此等未出官兵伊等若在京城其子弟尚可挑差使今雖事體未眀不過暫停伊等陳亡恤典豈有反將伊等子弟如獲重罪不令挑差使之理乎即伊等事體眀後應加罪者再加之以罪有何不可都統等念不及此糊塗辦理甚屬不堪都統等著眀白回奏著將此項人等查眀或有兼餉尚可生活者不計外其單俸隻餉無依靠者俱著查出現有馬甲養育兵丁遺缺即將伊等按數挑補俾得錢糧養贍伊等妻子家口俟事體眀後作何辦理之處朕另降諭旨乾隆三十四年五月初六日上諭供鐘之宗室覺羅官員賞戴花翎者特為祭祀時與侍衛等一律齊整若在京城尚可以戴倘奉差外出即不應戴明善巡查漕運時已不應戴花翎現復有應問事件解任伊仍照常戴花翎甚屬非是明善所戴之花翎著即拔去嗣後宗室覺羅供鐘官員凡奉委外差俱不準戴花翎回在原差行走時再令其戴再宗室覺羅官員挑入供鐘後升至三品京堂武職至副都統均著離供鐘之任不準其戴花翎著交該衙門遵例奉行乾隆三十四年六月三十日上諭本日值年之王等因遇齋戒於奏事帶領引見均未經到只大臣等前來看來王等遇齋戒日期俱不來圓明園奏事帶領引見諸處俱不行走惟敬謹齋戒凡諸祀典慎肅齋戒大禮攸關理應如是敬謹嗣後王等俱著在紫禁城內齋戒不可各在本府與紫禁城外齋戒著永為令乾隆三十四年九月二十九日上諭前以東三省人等竟不認識漢字如何辦理緑營事務曽經降旨嗣後東三省人等不必補用緑營官員並交兵部將現在各省緑營人員內東三省人共有幾員之處查明具奏特以東三省人等俱係本地生長不識漢字難以辦理緑營事務之故耳若伊等子孫生長京城原與舊滿洲無異八旗都統等理宜分别辦理今竟全無區别將現在各省緑營居官之東三省人等概行撤回甚屬拘泥除此次召回之東三省人等帶領引見時朕酌量調補外並著八旗嗣後東三省人等若係本身移住京城者仍照前降諭旨不必升補緑營若移住京城後所生之孫在京已居二代與久居京城舊滿洲蒙古無異即著回京城之滿洲蒙古一體挑選升補外任倘因有此旨即不盡心教導伊等子弟學習騎射清語技藝唯令専讀漢書學漢人習氣尤屬非是斷乎不可乾隆三十四年十月二十七日上諭各旗王公所屬人員服宦在京者向遇年節生辰一赴本門叩謁尚屬分所當然若伊等既膺外任則均有當官公事其迹易涉嫌疑各宜自知防檢前以王公等於所屬外任人員每多需索曽經降旨嚴切申禁比來諸王公頗知奉法自愛不敢踰間而此等因公赴京人員尚多照常問謁雖現在不至有結納逢迎之事但恐日久因循王公等或罔知顧忌謁見之不已必且託其購辦器物購辦之不已必且從而開説事端甚至忘公徇私習成流弊其所繫於官守朝常者甚大用是眀晰誥誡為之杜漸防微亦正所以先事保全之也昨於行在召見永定河道滿保奏稱係四阿哥屬下人應往叩謁朕思令行自近自當舉一以例其餘嗣後各王公屬下人等惟京員向各門往來仍照舊不禁外其有現居外任職官因事來京者概不許於本管王公處謁見通問以清弊源著為令倘仍不知省改或久而復沿故轍一經發覺除本人從重治罪外其本管王公等亦一體懲治必不稍為寬貸將此通諭知之乾隆三十五年閏五月初三日上諭此次雲南出征陳亡病故之人甚屬可憫雖皆已加恩賞賚但伊等家口生計恐不免拮據著加恩此次陳亡病故兵丁內有子者如年已及嵗著即挑補馬甲其未及嵗者不論大小俱著挑補養育兵俟年及嵗時亦著挑補馬甲仍著該部咨行盛京吉林黑龍江荆州成都熱河將軍副都統一體施恩乾隆三十五年十月二十日上諭據色布騰巴勒珠爾奏稱將奬賞火器營兵丁銀十萬兩不必置買田産請借與八旗官員以一分取利等語色布騰巴勒珠爾所奏只知得利而未念及於旗人生計無益耳即如旗員等遇有事故雖亦私行借貸如利息過重尚有不借者即一經借貸其還時或遲時日皆可自便若係官銀定有交還年限必於限內照數坐扣且借給之銀僅定以百兩之數又不甚多豈能以此即可置買産業不過稍修理衣服雜項費用即可全完亦斷不能濟其緊要况今定例一分而八旗官員等以其利輕不論有無事故所有各員皆欲指俸支借一經借貸後本人遇有事故不能抵還遂致著落保人代賠原準行之都統等代為抵還尤屬不成事體如取一分之利各官俸銀內即少得一分銀兩八旗官員所領俸銀皆所以養贍伊等家口以此指借官銀後坐扣伊等俸銀是前次借項尚未扣完復扣續借之項而八旗官員不論有無事故所有俸銀皆被官為坐扣旗人竟為官項所纍必致失其生計旗員支借官銀坐扣俸銀一事於旗人生計甚屬無益斷不可行前經原任大學士傅恆以旗員支借官銀坐扣俸銀于旗人生計無益情節曽經具奏嗣朕加恩將官員等紅白事件支借俸銀之例停止酌定各按品級分别給豫恩賞銀兩之例至如各省滋生銀兩一項亦屬坐扣利息之項然官為貿易滋生利息亦屬非宜故降旨全行撤四停其滋生於伊等紅白事件動用别項賞給再鹽商人等支借滋生銀兩亦經降旨撤回停止後因鹽商人等以此項仍行賞借與伊等深有裨益屢次懇請始酌量賞借矣且伊等皆係商人自善於滋利今火器營以賞銀十萬兩辦買田産日久弊生將此項銀兩亦著賞借與兩淮鹽商量為滋生利息殊為兩有裨益其內已經動用置買房間銀兩著照色布騰巴勒珠爾所奏作為五年歸欵外其餘現有銀兩仍著交內務府合對此數目交與李志英將現在該處鹽商應交內務府銀兩內留銀十萬兩即賞借與鹽商人等以一分徴收利息其所得利銀著交內務府該管轉向內務府領用如此則旗員不至坐扣俸銀而所得利銀亦於該營官員兵丁等實有裨益嗣後八旗官員指俸借銀之風勿令再萌乾隆三十五年十月二十六日上諭據總管內務府大臣奏兼攝茶庫之兵部員外郎五十三現升禮部郎中請仍留兼辦庫務等語所奏不可行前因內務府人員習氣不好是以令六部選派誠幹司員引見兼管六庫俾相牽制此等兼攝之員若令久於其任則不但不能糾察轉恐沾染積習彼此聨為一氣殊非派員兼理之本意嗣後六部人員兼管六庫者並定限三年更換一次其有升任等事總管內務府大臣概不準奏留著為令乾隆三十六年正月初九日上諭昨因年老患病休致之頭等侍衛阿弼達二等侍衛穆克德璽俱在侍衛上多年行走出力又經出兵打仗今因患病不能當差請休致尚係病逾半年奏請休致者非緣别項事故革退之人可比阿弼達穆克德璽著加恩仍戴原品頂翎穆克德璽曽經出兵打仗得功牌著賞給全俸阿弼達雖經出兵並未打仗得功牌著賞給半俸嗣後侍衛內果有出力行走年久又因年老患病不能當差具呈告退者著仍戴頂翎若年老未邁患病革退或緣懶惰規避等故革退者即徑行革退著為令乾隆三十六年二月二十三日上諭今據軍機大臣努三等議覆請增健鋭營養育額缺一摺內稱請將八旗圓明園健鋭營火器營養育兵之缺一體定為四名兵丁內得給養育兵一缺等語所奏尚是但如此辦理視原定養育兵之缺較少矣養育兵特為養贍單分錢糧家口衆多及鰥寡孤獨身無依靠之人若照軍機大臣所議則養育兵之缺既少於伊等生計不無拮據非所以副朕矜恤旗人之意朕撫御天下凡兵丁生計皆賴朕之恩施理當隨時調劑辦理俾伊等永逺寬裕即如各省民人偶遇偏災俱降旨將應徴錢糧寬免且不惜庫帑數十萬賑濟使民得遂其生今八旗滋生蕃庶亦當酌量施恩增添錢糧以資伊等生計養育兵之缺不便於四名兵內得給一缺著於三名兵內得給一缺籌辦此項養育兵缺惟著食單分錢糧人口衆多之家挑取不得復令鰥寡孤獨分占養育兵之缺朕於此項人等另行加恩發户部庫銀每人每月賞給銀一兩五錢養贍此內孤子數年間即可長成至十二嵗時即可挑換養育兵之缺其所出之缺即可另給此四項人以為養贍如此定例辦理雖每嵗多需庫餉五六萬兩而八旗人等均沾朕恩以資生計即用數十萬兩朕亦不惜著交八旗都統務體朕矜恤旗僕之至意俾旗人等共沐恩施均勻辦理將此通行曉諭乾隆三十六年四月初九日上諭隨圍官員兵丁騎坐官馬內有倒斃者每匹賠交銀七兩限兩月內交户部官員俱有俸銀限兩月內交賠伊等力量尚能至兵丁人等每月惟賴此數兩錢糧若亦照官員限兩月內交賠不無拮據於伊等生計無益嗣後官員倒斃馬匹仍著限兩月內賠交兵丁倒斃馬匹著加恩於伊等應得錢糧內每月坐扣銀一兩著永為令乾隆三十六年四月二十七日上諭向來各衙門派往新疆辦事人員三年期滿由該處大臣出具考語保送引見以應升之缺即用原所以示鼓勵但新疆自底定以來久𨽻版圖與內地郡縣無異且各給與養亷而新疆事務又極清簡該司員等出差三年不過循分奉公與在京各衙門辦事亦無差别乃因期滿遽行保奏該管大臣率以與例相符不復問其才具短長輒注上考是該員等一經派出即可借此計日超遷足開躐等者除升捷徑殊非核實課績之道嗣後新疆辦事人員期滿時祗令該處大臣給咨赴部引見其間果有出色之員朕自當隨時量加擢用若照常供職者概令仍回本衙門辦事照依等原官補用於事理方為允協所有該管大臣出具考語保奏即升之例著停止乾隆三十六年五月二十五日上諭從前因五旗王公屬下包衣人等滋生蕃庶該王公等養贍伊等不無拮據曽經兩次查辦令其出旗今越十餘年核計人丁復盛應行查辦著交衆王公等將包衣人等有情願令其出旗者仍照從前所辦之例會同本旗都統查明令其出旗或以人少不願令其出旗者亦隨其自便乾隆三十六年八月初二日上諭稽察正白旗滿洲事務給事中永安奏稱據該旗因本年雨水過多將所有倒塌官房查明造册五本呈報前來恐别旗亦有似此者請交八旗都統通查作何修理之處核計妥協辦理等語此項官房朕另降諭旨特派大臣查明施恩官為蓋造外此項房間果係衙署倉庫當報察旗御史二百兩銀以上者由本旗奏請二百兩銀以下者行工部照例辦理此項房間係朕特賞給孤寡無産業之旗僕居住者非衙署倉庫可比即如營房一樣該都統所當承辦者伊等遇有應辦事件即當奏聞辦理何必造册送察旗御史似此應辦之事尚如此推諉朕放都統又何為乎正白旗滿洲旗分如此辦理别旗亦似此辦理否著正白旗滿洲都統明白回奏外交八旗都統將如何辦理之處俱各查明具奏乾隆三十七年三月二十九日上諭向來內外各衙門題奏咨行事件凡遇滿洲蒙古人地名應譯對漢字者往往任意書寫並不合清文蒙古文本音因而舛誤俚鄙之字不一而足甚至以字義之優劣強為分别軒輊尤屬可笑方今海宇車書大同清文鑑一書屢經釐定頒示且曽編輯同文韻統本三合切音詳加辨訂合之字音無銖黍之差第篇帙較繁行文或未暇校閲昨因評纂通鑑輯覽於金遼元人地名之訛謬者悉為改正復命廷臣重訂金遼元國語解將三史內訛誤字樣另為刋定以示傳信而現在疏章案牘清漢對音轉為畫一於體制殊為未協著交軍機大臣依國書十二字頭酌定對音兼寫清漢字樣即行刋成簡明篇目頒行中外大小衙門嗣後遇有滿洲蒙古人地名對音俱查照譯寫俾各知所遵守將此通諭知之乾隆三十七年五月初四日上諭據舒赫德奏稱今烏嚕木齊築城駐劄滿兵其應補放官員缺若調取至伊犁選擬似覺繁擾可否令烏嚕木齊大臣等照伊犁辦理之處請旨等語舒赫德所奏雖因應行補放人員由烏嚕木齊至伊犁其往返行走繁擾起見但以驍騎校防禦等微員尚可至佐領協領俱係大員由烏嚕木齊參贊大臣等自行㨂選補放不合體制且由烏嚕木齊至伊犁究與來京較近嗣後烏嚕木齊滿營驍騎校防禦缺出毋庸送往伊犁將軍該處參贊大臣等秉公㨂選擬定正陪繕寫各員勞績履厯具奏補放免其引見若佐領參領缺出由烏嚕木齊參贊大臣於應升人員內視其勞績秉公㨂選咨送伊犁將軍復行詳加㨂選擬定正陪繕寫履厯勞績具奏補放亦照伊犁一體遇便由驛來京該部帶領引見乾隆三十七年九月二十六日上諭向來旗下家奴有酗酒行凶者一經本主報明該旗即行送部發遣其妻室有年老殘廢及不願隨帶者俱不同發定例未為周密如近日秦璜所有發遣家奴之妻留占為妻之事不可不另定章程以防流弊蓋家奴犯法其妻亦屬有罪之人自當一體發遣但此等犯罪旗奴妻室自不值官為資送若其中果有不能隨帶者或令於親屬依棲或聽本婦另嫁自不便仍留服役以杜嫌疑嗣後該部旗遇有發遣家奴之案俱照此辦理著為例乾隆三十七年十二月十九日上諭髙朴奏查驗修理八旗營房工程見新修房屋已有任情汙踐而不愛惜者請照外城街道柵欄之例交與八旗都統等隨時查明分别粘補修理於年終咨報值年旗彚奏等語所奏是修建營房原係加惠八旗兵丁不惜發帑興修俾安棲止自應倍加愛惜保護承受恩澤何致建造方新已有任情汙踐之事况前經特派八旗都統及查旗御史留心稽察伊等尤當實力奉行毋致虛文塞責今據髙朴摺奏情形則前此派查時伊等所司何事甚非核實稽工之道著交各該旗都統等嗣後八旗營房遇有零星傷損即令隨時查明分别粘修使住房各兵共知愛護不得任意殘毁並交查旗御史隨時詳查糾核仍令各該旗於嵗底將查過有無修理及是否完整之處咨報值年旗彚總具奏一次倘有不行修理以致損壞過甚者惟各該旗都統及查旗御史等是問髙朴摺併發乾隆三十八年八月十七日上諭親老改補近省本屬漢員相沿之例在漢員各居本籍若一告親老即扣除其缺并不令改補近省轉無以遂其祿養之私故定例先期預為呈明將來坐補原缺既防規避亦體人情行之原屬無礙若八旗人員與漢員本不相同即不為外任在部在旗均得當差報效豈可因憚於逺涉仍聽其在外希榮戀棧乎况我滿洲舊習惟知體國奉公遇有差遣從不敢畏難避逺今若效尤漢人事例則尊君親上之誼久必漸忘於風俗人心甚有關係吏部照漢員一體定例之處殊未允協嗣後八旗升選官員如實係親老不能逺離者得缺後許其呈報該部聲明緣由帶領引見候朕臨時酌量或以旗員或以部缺改用自無不可俟該員養親事畢仍照伊原得之缺坐補其預為地步巧行規避之例永逺著停止庶不致蹈襲虛名有乖舊俗著為令所奏之岱青阿即照此例行乾隆三十九年二月十八日上諭前因陳亡員辨深堪軫念曽經降旨於伊等襲職次數已完後著賞給恩騎尉令其世襲罔替為令其原官之嫡嗣準照此例承襲若係絶嗣撫養兄弟之子者於承襲世次已完時毋庸給與恩騎尉今覽正藍旗滿洲都統進呈承襲原任前鋒校兆海所得之雲騎尉家譜內開兆海在四川軍營受傷身故由部遵旨議敘照陳亡例準襲雲騎尉二次因無子嗣將過繼伊兄伍什哈達之次子承襲等語此項受傷身故人等朕因念其勞績與陳亡人等一例議敘給與世襲已屬格外殊恩若承襲世次已完並給與恩騎尉則與實在陳亡者毫無區别此等人員如承襲世次已完不但過繼兄弟之子不應賞給恩騎尉即有子嗣者亦不應令其承襲嗣後此項受傷身故人等朕特加恩與陳亡人等一體襲職者惟得應襲之官照例承襲無論有無子嗣於承襲世次已完時概不準承襲恩騎尉著為令乾隆三十九年五月初十日上諭向來八旗人員身任旗職如遇陳亡等事子孫議給世職其有年未及嵗者並照應得世職給與半俸至旗人簡用緑營官員陳亡議恤子孫即照緑營官職豫以廕生其年未及嵗者未經議及應得分例第思此等同為旗人雖豫廕之例不可易而效命疆場其子孫當幼稚之時養贍無資情殊可憫其應如何酌量加恩之處著軍機大臣會同該部定議具奏乾隆三十九年十二月初九日上諭和郡王綿倫薨逝伊雖無子嗣現有親弟二人按兄終弟及之例得應襲爵者宗人府於綿循綿倬除服後帶領引見候朕簡定至向來王等襲爵惟功勳舊諸王例應世襲罔替此外如怡親王之公忠體國經皇考特恩有世職罔替之旨亦應遵守勿替其餘恩封諸王襲爵時例應以次遞降蓋承恩封爵宜有親疏之别若不限以等差則國家延祚奕世王爵愈積愈多既不免於冗濫且以勳勞世及者無所區分亦非所以昭奬勸此展親之恩不得不示之節制也即如和勤親王永珌襲爵時已應降襲郡王朕念其為和恭親王嫡長子朕之親姪不忍降封是以仍襲親王逮至綿綸則不得不遞減為郡王矣今繼綿綸襲爵者於例應降封貝勒但朕究念其為和恭親王之孫且綿綸襲爵未久即嬰疾早逝弗克長享藩封為可憫今若照例改為貝勒則是和恭親王薨後未五年而王爵已失於心實有所不忍此次仍著加恩襲封郡王將來再遇應襲時即照例遞行降襲又念諸王遞降之例自貝勒貝子公以下至奉恩將軍不過六七傳即至奉恩將軍世襲罔替朕心仍有所不忍嗣後著加恩凡親王以次遞降者至鎮國公而止郡王以次遞降者至輔國公而止其公爵均著世襲罔替俾我大清國億萬斯年而親王郡王之子子孫孫均得永延世澤恪守恩封以副朕篤厚宗親至意著為令乾隆四十年七月初五日上諭據阿桂等奏訊據脫出之劉均祥供稱係甘肅兵前往四川軍營充當德爾森保親隨在木果木後山防守賊衆前來衝突德爾森保被圍尚射殺賊五六名又有一賊拉伊馬尾德爾森保僅餘一矢仍將此賊射死後被賊鎗傷咽喉旋即墜馬被賊衆砍死經伊親見等語前因德爾森保係特派駐防木果木後山之人所守山梁被賊奪去以致將軍大營潰亂情罪重大且賊人衝突之時究不知伊作何下落恐係被賊擒獲是以將伊子俱拿交刑部監禁今覽劉均祥供詞德爾森保於潰亂之際打仗陳亡屬實德爾森保如果失陷緊要地方又有奮勇打仗總捐軀亦不足蔽辜即將伊子一併治罪亦屬當然今伊打仗陳亡屬實其罪止於失陷地方不過停其議恤尚不至將伊子一併治罪著加恩將刑部監禁德爾森保之子即行釋放伊等既屬無罪之人所有應當差使著交該旗大臣照間散滿洲例一體挑取行走朕辦理庶務一秉大公功罪皆由人自取即如德爾森保前次失陷地方情罪重大身死又不分明即將伊子監禁今既陳亡屬實不至將伊子一併治罪即施恩寬免毫無偏倚將此交將軍阿桂通行曉諭軍營官員兵丁外並著通諭八旗知之乾隆四十一年七月初十日上諭向來滿洲蒙古用為道府人員丁憂回旗仍在原衙門走者曽經諭令每過三年吏部將該員等帶領引見量加簡録兹自乾隆三十八年冬間查辦以後迄今又閲三載因思此等滿員曽任道府於地方事務較為熟習自可仍以外用而旗員向例百日期滿即可當差行走原不必待至三年服闋始令引見嗣後著吏部查明滿洲蒙古人員有道府丁憂回旗已滿百日在部行走者俱於每年十月內帶領引見一次即自今嵗為始又上諭據正藍旗滿洲旗分因二等侍衛庫勒德依陳亡經部議敘應承襲雲騎尉庫勒德依並無子嗣調取伊親弟黑龍江馬甲圖倫保帶領引見朕已將庫勒德依所得雲騎尉準圖倫保承襲矣但向例陳亡所得世職襲次完後仍賞給恩騎尉世襲罔替此特為陳亡人等子孫永受朕恩之至意然陳亡之人生有子孫自應如此辦理若如庫勒德依係原立官之人因並無子嗣將伊親弟兄承襲者即承襲之人尚有子孫不過照例豫以應得襲次自不應賞給恩騎尉世襲罔替現承襲庫勒德依官之馬甲圖倫保將來雖有子嗣亦只將雲騎尉照例再準承襲一次無庸賞給恩騎尉世襲罔替著為令乾隆四十一年九月十三日上諭滿洲蒙古人員由道府丁憂回旗已滿百日在部行走者曽降旨於每年十月內該部查明帶領引見至滿員內曽任丞倅州縣丁憂回旗在原衙門行走者伊等曽膺外用於地方事務自較諳習著吏部一併查明照道府回京人員之例亦於每年十月帶領引見一次乾隆四十二年五月十一日上諭京察革退之筆帖式駁回本旗仍可挑補馬甲給與錢糧以資養贍至司員等既經降革向無給與錢糧之例但在旗臣僕俱賴俸餉為生而此等降革人員又非犯罪者比伊等雖不能辦理部務若令其看守壇廟門庫等項差使尚可充當乃因京察降革後遂致有失生計朕心不忍嗣後八旗遇有京察降革司員除年老不能當差者不計外其餘人員著交各旗大臣等以看守壇廟門庫等缺酌量補用以示朕憐憫旗人之意乾隆四十三年十二月十三日上諭昨據副都統納木扎爾奏請八旗無依孤女照養贍孤寡例給與錢糧養贍一事已交八旗大臣議奏矣朕思八旗孤寡並無依倚甚屬可憫是以從前俱加恩給與錢糧以為養贍是孤女即寓於孤子內自應一體辦給今所有孤女並未入於孤子之內給與錢糧者係八旗大臣原辦時遺漏著不必交八旗王大臣議奏嗣後八旗所有無依孤女即照孤子一體給與錢糧米石俟出嫁後裁汰乾隆四十四年八月初三日上諭近來凡有諭旨兼蒙古文者必經朕親加考正方可頒發而以理藩院所擬原稿示蒙古王公等多不能解緣翻譯人員未能諳習蒙古語就虛文實字敷衍成篇遂致不相吻合又如從前德通所翻清文阿岱閲之往往不能盡曉夫阿岱素精國語無不備知其所以不曉德通之清文者非阿岱不通清語乃由德通拘泥漢字文義牽綴為文於國語神理全未體會是歧清語與清文而二之無怪其相背也則蒙古王等之不解理藩院之蒙古文其義亦然總由國朝定鼎至今百有餘年八旗滿洲蒙古子弟自其祖父生長京城不但蒙古語不能兼通即滿洲語亦日漸遺忘又復憚於學習朕屢經訓飭而率教者無幾固由習俗所移亦其人之不肯念本向上耳朕因潔矩而思之非特此也即如制義所以代聖賢立言雖古今時無不同而中國語言相沿未改無難會意追求乃今之所為時文朕覽之多不能解朕雖不喜作時文然向在書齋中於明季及國初名家大家之文亦曽誦習其中如歸有光黃淳耀純乎古文讀之心喜餘亦理精義正足供玩味奈何今之作者相戾若此至於文體之變固不始於今時曩者魏晉六朝習尚浮靡斯文極敝韓愈出而起衰八代約六經之旨以成文人見之轉以為怪故其言曰作俗下文字下筆令人慚及示人必以為好小慚者謂之小好大慚者即以為大好是文字趨向之壞在韓愈時且然何况今之距唐乂將千載乎夫文風遞降説者每以比之江河日下然聽其流而不返日甚一日伊於何底昔韓愈尚思回狂瀾於既倒矧有移風易俗之責者乎文以眀道宜以清真雅正為宗朕曽屢降諭旨諄諄訓誡無如聽之藐藐恬不為怪讀書人於此理尚不能喻安望他日之備國家任使乎大抵近來習制義者祗圖速化而不循正軌每以經籍束之髙閣即先正名作亦不暇究心惟取庸陋墨卷勦襲撏扯效其浮詞而全無精義師以是教弟以是學舉子以是為揣摩試官即以是為棄取且今日之舉子即異日之試官不知翻然悔悟豈獨文風日下即士習亦不可問矣嗣後作文者務宜沉潛經義體認先儒傳説闡發聖賢精藴務去陳言辭達理舉以期合於古人立言之道慎毋掉以輕心試官閲卷亦當嚴為甄别一切膚詞爛調槩擯不録庶幾共知謹凛文化蒸然日上以副朕崇雅黜華之至意其翻譯清文蒙古文亦當實力講求勿仍陋習此旨著頒示貢院暨各省學政暨翻書房理藩院各書一道揭之堂楣俾皆觸目驚心欽承毋忽并諭中外知之乾隆四十六年八月十八日上諭向來由內務府官員擢用道府者丁憂回旗於百日滿後例由總管內務府大臣帶領引見其包衣漢軍未曽為內務府司員者遇有丁憂事故著照八旗漢軍人員之例仍以二十七個月服滿歸部銓選毋庸於百日滿後帶領引見著為令乾隆四十六年十月二十七日上諭向來宗室人員既不分用各部院又不便簡用外省道府其宗人府理事等官保送御史止有二缺轉科後遺缺仍用八旗滿洲人員升途未免稍狹現在宗室蕃衍其中不少可用之才所有宗室御史著於原定二缺之外俟有滿洲御史缺出時再行添用宗室二員連前四員作為額缺如有遷轉科員者其御史員缺仍以宗室人員補放至陵寢辦事衙門司員俱屬宗室貝勒公等官轄與部院司員有間嗣後遇有陵寢辦事衙門司員亦可酌改宗室數員其如何分别補用應改若干員缺之處著宗人府會同該部詳悉妥議具奏乾隆四十七年九月十五日上諭近觀蒙古世襲家譜知各蒙古王公子嗣及間散台吉他布囊年已及嵗者俱各按定例給以應得品級頂帶而宗室中除承襲封爵及現有官職外其間散宗室向無按品給頂之例現在宗支繁衍瓜瓞綿延皆我祖宗派系流傳譜列銀潢名登玉牒乃以身無職級竟至與齊民無别殊不足以示親親而崇體制嗣後著將王貝勒貝子公子嗣及間散宗室年已及嵗者俱照蒙古王台吉他布囊之例分别給與品級官頂其宗室現在當差職分較小者準其與間散宗室一體照例換給官頂在宗室等身有品級自必各知自愛不至蕩檢踰間其中或有不肖犯法之人亦照蒙古台吉他布囊之例即行革去官頂如此則於褒榮之中仍寓勸懲之意藉此可以教育成全而天家子姓俱得邀章服之榮益足昭國家睦族展親之誼甚盛典也所有如何分别嫡庶等第酌給官頂之處著大學士軍機大臣會同宗人府詳悉妥議具奏至聖祖世宗之孫現在皇子皇孫曽孫元孫輩俱可戴紅絨結頂其如何分别支派逺近準其用之處亦著一併妥議具奏再覺羅雖亦係宗親但派系稍逺向原準其同旗人應試出仕且有任各省州縣者若一體另給官頂於現行統屬儀制轉多未協毋庸另行議及將此通諭知之乾隆四十八年六月二十七日上諭現任甘肅永安營遊擊廣明福係正黃旗蒙古人既係旗人而以廣明福為名直與漢人之名相似觀之甚覺不協況旗人以明福廣福俱可為名又何必以廣明福為名即著交八旗滿洲蒙古嗣後旗人內有似此用漢人名者永行禁止將此通諭知之乾隆四十八年九月十一日上諭朕恭謁祖陵禮成現降旨將奉天所屬府州縣乾隆四十九年地丁正項錢糧通行蠲免所有各莊及旗地應納糧石草束等項自應一體加恩以敷渥澤著將盛京户部各莊頭本年應交倉糧一萬餘石免其交納所有各處匠役應需口糧著於舊存倉糧內撥給其盛京興京遼陽牛莊蓋州熊嶽復州金州岫巖鳳凰城開原錦州寧逺廣寧義州等十五處旗地本年應納米豆草束亦著免徵一半俾旗莊均沾嘉惠該部遵諭行乾隆五十一年四月十九日上諭四庫館進呈八旗通志一書朕詳加披閲其忠烈傳提要內詳載開國以來烈祖烈宗褒奬功勳風勵忠節之典而於乾隆年間恩恤諸大政俱闕而不載如八旗陳亡官員世職襲次已完朕特降恩旨賞給恩騎尉世襲罔替而緑營官員陳亡議恤之例止得難廕一次非奉特旨加恩不能得有世職昨年降旨凡陳亡人員無論漢人及旗人之用於緑營者總與旗人一體給與世職即襲次已完亦照例給恩騎尉俾得賞延於世蓋以官員等力戰敵愾效命疆場其義烈實堪嘉尚是以特沛殊恩使其子孫永承恩澤懋答前勛甚盛典也乃通志內竟未登載則將來此書之傳何足以羽翼國史昭示來兹再志內所載壯尼大即護軍校他如昂邦章京阿思哈尼哈番之為子男阿達哈哈番之為輕車都尉拜他拉布勒哈番之為騎都尉拖沙拉哈番之為雲騎尉雖不便擅改原文亦當加案注明或請朕指示使後人開卷曉然方為傳信豈多人無一思及此但知遷延其事以為領桌飯之計乎是鈔史非修史矣前因遼金元三史人地名原文俱係當時國語而後之修史者不諸文義率以不善語言為之譯寫是以數年來特命館臣按照各史不改其事但將語言詳加改正鋟板重修遂使當時名爵山川瞭如指掌今以本朝之書敘本朝之事乃止仍原文開載不為分晰注明列凡例以定章程是為前史盡改正而於本朝反不經意不幾貽笑將來傳疑後世辦理太屬疏漏此書著交軍機大臣會同該館總裁重加輯訂詳悉添注加按進呈候朕披閲定後再將文淵等閣陳設之書一體改正所有原辦此書之總裁及纂修等俱著逐一查明交部議處乾隆五十一年六月二十日上諭各處拜唐阿內粘杆處備用弓箭傘處鷹狗處拜唐阿等每年常隨圍行走且差使亦屬緊要此內除兼拜唐阿行走食護軍馬甲錢糧人等外其食二兩之拜唐阿等較馬甲等差使頗屬緊要且所食錢糧較馬甲反少甚屬不均令加恩食二兩之拜唐阿等著交各該旗本佐領管領內遇有甲缺即行坐補以裕伊等之生計著為令乾隆五十七年二月二十二日上諭從前八旗官員兵丁名內有與大臣等同名者已降旨令其改易矣夫與大臣同名尚行改易况與宗室近派王等同名反有不行改易之理耶且如保泰即與裕親王之名相同凡係旗人命名均應避忌此字汪扎爾那木扎爾皆係身與同時乃以此字命名伊子甚屬錯謬而保泰又並未改易公然稱謂至今始致福消獲罪著交八旗都統將現在八旗人等之名盡行察查如有似此相同者令其改易外嗣後生子命名呈報該旗時該旗都統等務各切實查核設有濫行命名者即時改易乾隆五十七年九月二十九日上諭朕恭閲聖祖仁皇帝實録內載前任福建總督范承謨雲貴總督甘文焜遇吳三桂耿精忠二逆之變抗節不屈殉難捐軀忠藎深堪嘉憫因命查核二臣殉節後所得恤典范承謨甘文焜俱贈尚書並廕一子入監此等封疆死事之臣雖非效命行間臨陳捐軀者可比但當逆竪盜兵偏隅煽焰致命遂志徑節不回實有合於成仁取義之道其身雖已仰邀贈恤而其子僅廕以入監尚不足以勵臣節而慰忠魂即使其子孫等能承世業疊繼簮纓但所膺官秩祗能及身而止而其祖父忠貞之澤究不能流傳勿替非賞延於世之義前因滿漢軍功應得世職人員襲次已完者仍賞給恩騎尉俾其子孫永逺承襲所有范承謨甘文焜子孫亦著照此例各賞給恩騎尉世職罔替其有現任職官者即準其兼襲此外尚有似此殉節諸臣並令軍機大臣會同部旗查明原有世職罔替者毋庸另行賞給外其並無世職者均著一體賞給恩騎尉以為藎臣效節者勸乾隆五十八年四月十九日上諭據林寧等將部奏準飭查奉天府屬捕魚船數一體酌定章程繕寫漢字具奏一摺已批交該部議奏矣但盛京所有應奏事件理宜繕寫清字摺具奏即遇有清字繁多難以顯明之處亦應以清漢字兼寫具奏曽經屢降諭旨今林寧奏摺僅繕漢字而所奏報盛京並無蝗蝻萌生一摺亦用漢字具奏殊屬錯謬即如酌定捕魚船數章程一案若因部咨用漢字語句繁多則於奏報並無蝗蝻萌生一摺語句無多亦不能清字具奏耶嗣後部院凡遇咨行東三省事件俱著清漢兼寫飭交各部院衙門外林寧等著申飭嗣後凡遇應奏事件俱用清字繕摺具奏若遇語句繁冗之事亦著兼寫清漢字摺具奏毋得僅用漢字摺具奏乾隆五十八年五月初九日上諭從前因滿洲蒙古人名地名每有音漢不同特刋對音一書將多音阿爾將多音阿勒之處普行宣示矣今閲人地名並未遵照頒發字式繕寫仍有將多音阿勒多音阿爾濫寫者將此再宣示八旗各衙門國史等館舊有人地名訛錯已久者尚不必更換仍遵舊式繕寫外嗣後人名地名音漢必須遵照頒發字式繕寫乾隆五十八年五月十二日上諭兵部題升守備引見之火器營護軍校阿敏與太宗文皇帝御兄二貝勒重諱昨將凡重宗室王公之名者尚令其更改況此諱係斷不可重者伊家因其不知固如此命名該都統等所司者竟何事著將正白旗蒙古都統等申飭外即將此名著改為阿勒坦將此旨通諭八旗嗣後再有似此者務將該都統一併議處乾隆五十九年九月二十四日上諭據永慶等奏協領扎明阿因病休致一摺內稱將扎明阿履厯造具清漢册咨送兵部等語此等履厯册內話語無多即書寫清字咨部自無不識之理現因各省駐防滿洲漸染漢習正當整飭之時此等無關緊要檔册事件若兼書漢字日久尤易染成漢人習氣著交各省將軍大臣等嗣後此等事件即造清字册不必兼書漢字乾隆六十年八月十四日上諭甘肅西寧口外係青海蒙古地方該處道員自應用滿洲蒙古人員蔡廷衡係屬漢人不能通曉蒙古言語所有西寧道員缺著榮德調補所遺員缺即著蔡廷衡補授嗣後此缺即作為旗員額缺欽定八旗通志卷首之十二
