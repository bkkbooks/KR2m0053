body:
  text: 欽定四庫全書欽定八旗通志卷二百二十六人物志一百六忠義𫝊十八䝉古八旗三至五十七年共八十六康熙十五年人羅希羅希䝉古鑲黄旗人姓齊墨特氏世居喀喇沁順治五年從征江西叛鎮金聲桓用雲梯攻南昌府奮勇先登克其城賜號巴圖魯恩授二等輕車都尉七年九年屢遇恩詔加至一等輕車都尉又一雲騎尉康熈十五年從征逆藩呉三桂至湖廣醴陵縣偽将馬寳等率三萬餘衆来犯羅希力戰殁於陣二十五年議䘏加世職為三等男承襲詳見封爵表納墨户納墨户䝉古鑲黄旗人任恭領駐防荆州敗賊郭甲王嘉等於瀘溪康熈十五年隨大兵征海㓂鄭成功攻澄浦嶴乘勝進逼厦門力戰陣亡恩賜雲騎尉世職承襲詳見世職表鄂爾賽鄂爾賽蒙古鑲黄旗人姓克勒特氏世居巴林康熈十五年以七品官隨簡親王喇布征江西偽将軍馬三保等率衆三萬餘来犯鄂爾賽列鹿角礟挨牌拒敵力戰陣亡恩賜雲騎尉世職承襲詳見世職表茍色茍色䝉古鑲黄旗人康熈十五年以驍騎校從征南将軍穆占征逆藩呉三桂至湖廣遇偽将軍馬寳於永興縣巖山嶺列陣迎拒茍色奮勇前擊中鳥鎗陣亡恩賜雲騎尉世職承襲詳見世職表昂阿頼昂阿頼䝉古鑲黄旗人姓博和羅特氏世居揚西穆康熙十五年以署䕶軍校從征逆藩耿精忠至江西陣亡恩賜雲騎尉世職承襲詳見世職表瑪克三瑪克三蒙古鑲黄旗人康熙十六年以七品官從征逆藩呉三桂至廣東韶州府與偽将范七翰等二萬餘衆擊戰于蓮花山下陣亡恩賜雲騎尉世職承襲詳見世職表闗保闗保䝉古鑲黄旗人姓博爾濟錦氏世居烏魯特地方康熈十七年以七品官隨征逆藩呉三桂至廣東韶州鎮南将軍莽依圖同江寧将軍額楚夹勦之闗保從征遇偽将軍馬寳等萬餘衆於蓮花山擊賊陣亡恩賜雲騎尉世職承襲詳見世職表門都孫門都孫䝉古鑲黄旗人任佐領委署恭領駐防西安于康熈十九年正月隨将軍額楚在廣西地方與賊力戰陣亡賞䘏如例阿有世阿有世蒙古鑲黄旗人署驍騎校駐防涼州康熈二十年二月二十二日隨征南将軍賴塔在雲南黄草壩遇敵陣亡賞䘏如例色爾濟色爾濟蒙古鑲黄旗人姓博爾濟錦氏世居柯勒特地方任䕶軍恭領康熙二十九年隨撫遠大将軍裕親王福全征厄魯特噶爾丹至烏蘭布通賊於隔河深林卧駱駝為挨牌以拒色爾濟率兵隨右翼繞河擊敗之以功奏授大臣時聞噶爾丹出邉令徃察之為喀爾喀所害三十年恩賜雲騎尉世職承襲詳見世職表花色花色䝉古鑲黄旗人康熈三十五年以虚銜防守尉從征厄魯特噶爾丹擊賊於昭莫多力戰陣亡賞䘏如例色楞色楞䝉古鑲黄旗人姓圗土特氏世居察哈爾地方襲三等男兼佐領為頭䓁侍衛管領旋署理藩院侍郎康熈五十六年凖噶爾逆孽䇿楞敦多布由特機斯近擾西藏十月殺害拉藏汗五十七年聖祖命色楞統兵進剿六月色楞渡七㲼河由拜圗前往與西安将軍額倫特合兵至喀喇烏蘇地方賊兵二三萬四靣圍繞来犯色楞同額倫特督兵力戰相特至九月遂殁於陣賞䘏如例諾爾布諾爾布蒙古正黄旗人姓撥和羅特氏世居喀喇沁地方順治五年以驍騎校隨征陜西流㓂敗偽總兵陳某及黄應禮單回子等於横城屡著戰功康熈十三年隨征逆藩吳三桂至湖廣十五年三月從安逺靖㓂将軍貝勒尚善擊偽将軍杜輝巴飬元江義等於岳州洞庭湖戰歿於陣恩賜雲騎尉世職承襲詳見世職表巴爾哈孫巴爾哈孫䝉古正黄旗人任䕶軍校康熈十五年隨将軍貝勒尚善征逆藩呉三桂至湖廣與偽将軍呉應麒廖進忠馬寳等戰于岳州府陣亡恩賜雲騎尉乾隆十三年賞給恩騎尉世職承襲詳見世職表巴楞孫巴楞孫䝉古正黄旗人姓杭阿特氏世居喀喇沁任䕶軍校康熙十五年隨安遠靖㓂大将軍貝勒尚善征逆藩呉三桂至湖廣取岳州偽将軍呉應麒等引賊七萬列陣拒敵巴楞孫奮勇迎擊殁於陣恩賜雲騎尉世職承襲詳見世職表莫都莫都蒙古正黄旗人任七品官委署隊長康熙十五年隨安遠靖㓂大将軍貝勒尚善平湖廣取岳州三月十五日與呉逆賊戰於洞庭湖中創殁恩賜雲騎尉世職承襲詳見世職表色冷色冷䝉古正黄旗人父納木賽順治十五年以署䕶軍校從征偽桂王屡立戰功授雲騎尉既卒色冷襲職康熈十六年隨征南将軍穆占征逆藩呉三桂至湖廣與偽将軍呉國貴戰於長沙陣亡賜祭一次務孫岱務孫岱䝉古正黄旗人姓哈爾吉努氏世居喀爾喀地方任驍騎校委署恭領康熈十六年隨将軍額楚征逆藩呉三桂至江西吉安遇偽将軍馬寳等力戰歿於陣恩賜雲騎尉世職承襲詳見世職表圖布深圖布深蒙古正黄旗人姓烏郎看機爾門氏世居喀喇沁初隨貝勒尚善征廣東時委署叅領康熈十七年正月隨征湖廣與賊将杜輝等力戰於岳州洞庭湖陣亡恩賜雲騎尉世職承襲詳見世職表沙渾沙渾䝉古正黄旗人署䕶軍校康熈十七年隨将軍穆占征湖廣擊偽将馬寳胡國桂等於永興力戰陣亡賞䘏如例遼東遼東蒙古正黄旗人姓他塔喇氏世居盛京地方康熈十三年以䕶軍校隨定遠将軍希爾根征逆藩耿精忠至江西敗偽總兵朱一典於㑹浦又敗偽左都督筭國棟䓁於新昌之北山並隨䕶軍統領桑額力戰有功十四年四月賊帥邵連登引偽左都督九人賊兵八萬連營於建昌府之長興據山口築壕列陣拒敵遼東隨希爾根敗之十五年二月隨定遠平㓂大将軍安郡王岳樂征逆藩呉三桂敗偽将軍夏國相李良棟於江西萍鄉之東来龍山十六年呉逆遣偽将軍呉國貴引賊数萬屯據長沙遼東力戰被重傷二十五年傷發卒恩賜雲騎尉世職承襲詳見世職表博爾和對博爾和對䝉古正黄旗人姓空克禮氏世居克西克騰地方襲父巴圗三等輕車都尉順治十五年隨多羅信郡王多尼征朱由榔師次湖廣靖州偽總兵田國興黄世貴欲来納欵為賊衆所阻博爾和對隨䕶軍統領鄂納等徃迎遇賊二千餘人撃敗之挈國興等来歸進兵至貴州偽總兵羅大順擁衆三萬餘列陣於十萬﨑山拒敵博爾和對隨将軍等進戰敗之十六年凱旋由水路至江寕值海賊鄭成功䧟鎮江𤓰州㓂江寕即同副都統噶禇哈同本地官兵擊却之又連敗江㟁賊衆十七年叙功由三等輕車都尉超授一等輕車都尉康熙十三年授察哈爾都督奏請以長子哈喇扣襲其世職二十九年以提督統察哈爾兵隨撫逺大将軍和碩裕親王福全征厄魯特噶爾丹遇賊於烏蘭布通地方擊敗之即在軍前授為恭賛大臣尋奉詔入噶爾丹取其降表回遇喀爾喀賊衆来犯力戰歿於陣賜祭𦵏如典禮謚襄慤又加一雲騎尉世職承襲詳見世職表克什克什䝉古正黄旗人姓翁牛特氏世居喀喇沁地方以前鋒康熈三十五年隨撫遠大将軍伯費揚古進征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜七品官雅爾吉岱雅爾吉岱蒙古正黄旗人姓洪郭爾氏世居喀喇沁地方康熙三十五年以鳥鎗兵隨撫遠大将軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陣亡恩賜八品官揆爾齊他特揆爾齊他特䝉古正黄旗人以領催𣲖守軍䑓康熙五十七年閏八月凖噶爾内犯奪我十八䑓揆爾齊他特被擒賊詢以内地虛實誘之䧏奮臂大罵不屈賊怒毁其面目耳鼻至死罵益厲遂分裂其尸棄之河六十年賞䘏如例八十八十䝉古正黄旗人由領催委署驍騎校駐防西安康熈五十七年七月隨侍郎色楞抵喀拉烏蘇遇凖爾噶賊力戰陣亡賞䘏如例和忒和忒蒙古正白旗人姓扣懇氏世居葉赫地方康熈十六年以佐領從奉命大将軍康親王傑書征福建海㓂偽将軍劉國軒等率賊萬餘犯海澄和忒力戰歿於陣恩賜雲騎尉世職承襲詳見世職表諾爾穆諾爾穆䝉古正白旗人姓博爾吉濟特氏世居翁牛特其先阿魯都􅏢郡王之族也父色勒順治間来歸授雲騎尉屢遇覃恩加至三等輕車都尉以諾爾穆襲康熙十六年隨江寕将軍額楚征逆藩吳三桂至江西與偽将軍馬寳等戰于吉安陣亡恩賜二等輕車都尉世職承襲詳見世職表瑪哈達瑪哈達䝉古正白旗人康熈十六年以驍騎校從江寕将軍額楚征逆藩吳三桂與偽将軍馬寳戰於吉安陣亡恩賜雲騎尉世職承襲詳見世職表東克東克蒙古正白旗人姓阿林覺羅氏世居葉赫地方康熈十六年以驍騎校從鎮南将軍莽依圖征逆藩吳三桂至廣東與偽将軍馬寳戰于韶州陣亡恩賜雲騎尉世職承襲詳見世職表孟色爾孟色爾䝉古正白旗人姓巴依忒氏世居喀爾喀地方官侍讀康熈十七年頒詔廣東值海㓂煽亂死於難恩賜騎都尉世職承襲詳見世職表活特活特䝉古正白旗人康熙二十年以佐領隨征南大将軍頼塔由廣西進征逆孽呉世璠戰於雲南之黄草壩陣亡賞䘏如例布大布大蒙古正白旗人姓阿里拉爾氏世居呼庫諾爾佐領部委叅領駐防西安康熙五十七年九月隨侍郎色楞進勦西藏于哈喇烏蘇遇凖噶爾賊力戰陣亡恩賜騎都尉世職承襲詳見世職表布達布達䝉古正白旗人任雲騎尉康熙五十七年隨侍郎色楞進征西藏擊賊陣亡同旗馬起亦以是役歿於陣賞䘏如例檔色檔色䝉古正紅旗人任驍騎校康熈十三年隨征呉耿二逆藩於江西有功十五年進至湖廣擊賊於醴陵陣亡恩賜雲騎尉乾隆十三年賞給恩騎尉世職承襲詳見世職表博爾濟博爾濟蒙古正紅旗人姓阿蘓克氏世居喀喇沁地方以驍騎校隨安親王岳樂征逆藩呉三桂至湖廣康熙十六年十月進攻長沙力戰陣亡恩賜雲騎尉世職承襲詳見世職表三進三進䝉古正紅旗人姓薩爾處特氏世居西拉木蘭地方以委署恭領隨貝勒查尼征逆藩呉三桂康熈十七年隨都統朱滿自襄陽徃截海賊粮運至九馬嘴遇風舟覆歿恩賜雲騎尉世職承襲詳見世職表嘠爾馬嘠爾馬䝉古正紅旗人署䕶軍校康熈十七年隨征呉逆至襄陽率舟師抵九馬嘴要截賊粮遇風沉舟歿恩賜雲騎尉世職承襲詳見世職表巴泰巴㤗䝉古正紅旗人任䕶軍校康熈十七年從征呉逆至襄陽率舟師抵九馬嘴要截賊粮遇風沉舟歿恩賜雲騎尉世職承襲詳見世職表素施達素施達蒙古正紅旗人任䕶軍校從征呉逆至湖廣康熙十七年分兵襄陽截賊運粮河道率舟師抵戰覆舟歿恩賜雲騎尉世職承襲詳見世職表和瑞和瑞䝉古正紅旗人康熙十三年以三等輕車都尉從征逆藩呉三桂至陕西同副将張登科敗偽将軍呉之茂彭時亨等於廣元偽将軍王屏藩譚宏等引賊衆自漢中渡江来犯復擊敗之又擊偽将軍劉慶成俱破其衆十七年從征南将軍穆占至湖廣擊偽将軍杜輝等於洞庭之桞林嘴連敗之十八年進取湘隂於九馬嘴力戰陣亡恩賜世職為二等輕車都尉承襲詳見世職表俄爾和兑俄爾和兑䝉古正紅旗人襲父雲騎尉職康熈十四年從征逆藩吳三桂至陕西敗偽縂兵於上羅鎮十七年從征南将軍穆占徃湖廣敗偽将軍杜輝等於洞庭之桞林嘴十八年進取湘隂在九馬嘴地方力戰陣亡恩賜雲騎尉合原襲世職為三等輕車都尉承襲詳見世職表黒色黒色蒙古正紅旗人姓博爾吉孫氏世居卓魯克地方由輕車都尉世職於康熈十九年從征逆孽呉世璠二十年正月攻石門坎力戰陣亡賞䘏如例額爾吉圗額爾吉圗䝉古正紅旗人姓巴禹特氏世居喀爾喀地方理藩院郎中兼佐領康熈二十年四月運米徃賑䝉古為烏拉所害恩賜雲騎尉世職承襲詳見世職表博爾和博爾和䝉古鑲白旗人姓巴林氏世居察哈爾地方由䕶軍校委署佐領康熙十五年二月隨定遠平㓂大将軍安親王岳樂征逆藩耿精忠至江西之㑹浦遇偽縂兵朱一典等率衆拒