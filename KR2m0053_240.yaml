body:
  text: 欽定四庫全書欽定八旗通志卷二百二十六人物志一百六忠義傳十八蒙古八旗三至五十七年共八十六康熙十五年人羅希羅希蒙古鑲黃旗人姓齊墨特氏世居喀喇沁順治五年從征江西叛鎮金聲桓用雲梯攻南昌府奮勇先登克其城賜號巴圖魯恩授二等輕車都尉七年九年屢遇恩詔加至一等輕車都尉又一雲騎尉康熙十五年從征逆藩吳三桂至湖廣醴陵縣偽將馬寶等率三萬餘衆來犯羅希力戰殁於陳二十五年議恤加世職為三等男承襲詳見封爵表納墨户納墨户蒙古鑲黃旗人任恭領駐防荆州敗賊郭甲王嘉等於瀘溪康熙十五年隨大兵征海寇鄭成功攻澄浦嶴乘勝進逼厦門力戰陳亡恩賜雲騎尉世職承襲詳見世職表鄂爾賽鄂爾賽蒙古鑲黃旗人姓克勒特氏世居巴林康熙十五年以七品官隨簡親王喇布征江西偽將軍馬三保等率衆三萬餘來犯鄂爾賽列鹿角炮挨牌拒敵力戰陳亡恩賜雲騎尉世職承襲詳見世職表茍色茍色蒙古鑲黃旗人康熙十五年以驍騎校從征南將軍穆占征逆藩吳三桂至湖廣遇偽將軍馬寶於永興縣巖山嶺列陳迎拒茍色奮勇前擊中鳥鎗陳亡恩賜雲騎尉世職承襲詳見世職表昂阿賴昂阿賴蒙古鑲黃旗人姓博和羅特氏世居揚西穆康熙十五年以署護軍校從征逆藩耿精忠至江西陳亡恩賜雲騎尉世職承襲詳見世職表瑪克三瑪克三蒙古鑲黃旗人康熙十六年以七品官從征逆藩吳三桂至廣東韶州府與偽將范七翰等二萬餘衆擊戰于蓮花山下陳亡恩賜雲騎尉世職承襲詳見世職表關保關保蒙古鑲黃旗人姓博爾濟錦氏世居烏魯特地方康熙十七年以七品官隨征逆藩吳三桂至廣東韶州鎮南將軍莽依圖同江寧將軍額楚夾勦之關保從征遇偽將軍馬寶等萬餘衆於蓮花山擊賊陳亡恩賜雲騎尉世職承襲詳見世職表門都孫門都孫蒙古鑲黃旗人任佐領委署恭領駐防西安于康熙十九年正月隨將軍額楚在廣西地方與賊力戰陳亡賞恤如例阿有世阿有世蒙古鑲黃旗人署驍騎校駐防涼州康熙二十年二月二十二日隨征南將軍賴塔在雲南黃草壩遇敵陳亡賞恤如例色爾濟色爾濟蒙古鑲黃旗人姓博爾濟錦氏世居柯勒特地方任護軍恭領康熙二十九年隨撫遠大將軍裕親王福全征厄魯特噶爾丹至烏蘭布通賊於隔河深林卧駱駝為挨牌以拒色爾濟率兵隨右翼繞河擊敗之以功奏授大臣時聞噶爾丹出邉令往察之為喀爾喀所害三十年恩賜雲騎尉世職承襲詳見世職表花色花色蒙古鑲黃旗人康熙三十五年以虛銜防守尉從征厄魯特噶爾丹擊賊於昭莫多力戰陳亡賞恤如例色楞色楞蒙古鑲黃旗人姓圗土特氏世居察哈爾地方襲三等男兼佐領為頭等侍衛管領旋署理藩院侍郎康熙五十六年凖噶爾逆孽䇿楞敦多布由特機斯近擾西藏十月殺害拉藏汗五十七年聖祖命色楞統兵進剿六月色楞渡七汊河由拜圗前往與西安將軍額倫特合兵至喀喇烏蘇地方賊兵二三萬四靣圍繞來犯色楞同額倫特督兵力戰相特至九月遂殁於陳賞恤如例諾爾布諾爾布蒙古正黃旗人姓撥和羅特氏世居喀喇沁地方順治五年以驍騎校隨征陜西流寇敗偽總兵陳某及黃應禮單回子等於橫城屢著戰功康熙十三年隨征逆藩吳三桂至湖廣十五年三月從安逺靖寇將軍貝勒尚善擊偽將軍杜輝巴飬元江義等於嶽州洞庭湖戰歿於陳恩賜雲騎尉世職承襲詳見世職表巴爾哈孫巴爾哈孫蒙古正黃旗人任護軍校康熙十五年隨將軍貝勒尚善征逆藩吳三桂至湖廣與偽將軍吳應麒廖進忠馬寶等戰于嶽州府陳亡恩賜雲騎尉乾隆十三年賞給恩騎尉世職承襲詳見世職表巴楞孫巴楞孫蒙古正黃旗人姓杭阿特氏世居喀喇沁任護軍校康熙十五年隨安遠靖寇大將軍貝勒尚善征逆藩吳三桂至湖廣取嶽州偽將軍吳應麒等引賊七萬列陳拒敵巴楞孫奮勇迎擊殁於陳恩賜雲騎尉世職承襲詳見世職表莫都莫都蒙古正黃旗人任七品官委署隊長康熙十五年隨安遠靖寇大將軍貝勒尚善平湖廣取嶽州三月十五日與吳逆賊戰於洞庭湖中創殁恩賜雲騎尉世職承襲詳見世職表色冷色冷蒙古正黃旗人父納木賽順治十五年以署護軍校從征偽桂王屢立戰功授雲騎尉既卒色冷襲職康熙十六年隨征南將軍穆占征逆藩吳三桂至湖廣與偽將軍吳國貴戰於長沙陳亡賜祭一次務孫岱務孫岱蒙古正黃旗人姓哈爾吉努氏世居喀爾喀地方任驍騎校委署恭領康熙十六年隨將軍額楚征逆藩吳三桂至江西吉安遇偽將軍馬寶等力戰歿於陳恩賜雲騎尉世職承襲詳見世職表圖布深圖布深蒙古正黃旗人姓烏郎看機爾門氏世居喀喇沁初隨貝勒尚善征廣東時委署參領康熙十七年正月隨征湖廣與賊將杜輝等力戰於嶽州洞庭湖陳亡恩賜雲騎尉世職承襲詳見世職表沙渾沙渾蒙古正黃旗人署護軍校康熙十七年隨將軍穆占征湖廣擊偽將馬寶胡國桂等於永興力戰陳亡賞恤如例遼東遼東蒙古正黃旗人姓他塔喇氏世居盛京地方康熙十三年以護軍校隨定遠將軍希爾根征逆藩耿精忠至江西敗偽總兵朱一典於會浦又敗偽左都督算國棟等於新昌之北山並隨護軍統領桑額力戰有功十四年四月賊帥邵連登引偽左都督九人賊兵八萬連營於建昌府之長興據山口築壕列陳拒敵遼東隨希爾根敗之十五年二月隨定遠平寇大將軍安郡王嶽樂征逆藩吳三桂敗偽將軍夏國相李良棟於江西萍鄉之東來龍山十六年吳逆遣偽將軍吳國貴引賊數萬屯據長沙遼東力戰被重傷二十五年傷發卒恩賜雲騎尉世職承襲詳見世職表博爾和對博爾和對蒙古正黃旗人姓空克禮氏世居克西克騰地方襲父巴圗三等輕車都尉順治十五年隨多羅信郡王多尼征朱由榔師次湖廣靖州偽總兵田國興黃世貴欲來納欵為賊衆所阻博爾和對隨護軍統領鄂納等往迎遇賊二千餘人擊敗之挈國興等來歸進兵至貴州偽總兵羅大順擁衆三萬餘列陳於十萬﨑山拒敵博爾和對隨將軍等進戰敗之十六年凱旋由水路至江寧值海賊鄭成功陷鎮江瓜州寇江寧即同副都統噶禇哈同本地官兵擊却之又連敗江岸賊衆十七年敘功由三等輕車都尉超授一等輕車都尉康熙十三年授察哈爾都督奏請以長子哈喇扣襲其世職二十九年以提督統察哈爾兵隨撫逺大將軍和碩裕親王福全征厄魯特噶爾丹遇賊於烏蘭布通地方擊敗之即在軍前授為恭贊大臣尋奉詔入噶爾丹取其降表回遇喀爾喀賊衆來犯力戰歿於陳賜祭葬如典禮諡襄慤又加一雲騎尉世職承襲詳見世職表克什克什蒙古正黃旗人姓翁牛特氏世居喀喇沁地方以前鋒康熙三十五年隨撫遠大將軍伯費揚古進征厄魯特噶爾丹至昭莫多與賊力戰陳亡恩賜七品官雅爾吉岱雅爾吉岱蒙古正黃旗人姓洪郭爾氏世居喀喇沁地方康熙三十五年以鳥鎗兵隨撫遠大將軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陳亡恩賜八品官揆爾齊他特揆爾齊他特蒙古正黃旗人以領催𣲖守軍臺康熙五十七年閏八月凖噶爾內犯奪我十八臺揆爾齊他特被擒賊詢以內地虛實誘之降奮臂大罵不屈賊怒毁其面目耳鼻至死罵益厲遂分裂其尸棄之河六十年賞恤如例八十八十蒙古正黃旗人由領催委署驍騎校駐防西安康熙五十七年七月隨侍郎色楞抵喀拉烏蘇遇凖爾噶賊力戰陳亡賞恤如例和忒和忒蒙古正白旗人姓扣懇氏世居葉赫地方康熙十六年以佐領從奉命大將軍康親王傑書征福建海寇偽將軍劉國軒等率賊萬餘犯海澄和忒力戰歿於陳恩賜雲騎尉世職承襲詳見世職表諾爾穆諾爾穆蒙古正白旗人姓博爾吉濟特氏世居翁牛特其先阿魯都􅏢郡王之族也父色勒順治間來歸授雲騎尉屢遇覃恩加至三等輕車都尉以諾爾穆襲康熙十六年隨江寧將軍額楚征逆藩吳三桂至江西與偽將軍馬寶等戰于吉安陳亡恩賜二等輕車都尉世職承襲詳見世職表瑪哈達瑪哈達蒙古正白旗人康熙十六年以驍騎校從江寧將軍額楚征逆藩吳三桂與偽將軍馬寶戰於吉安陳亡恩賜雲騎尉世職承襲詳見世職表東克東克蒙古正白旗人姓阿林覺羅氏世居葉赫地方康熙十六年以驍騎校從鎮南將軍莽依圖征逆藩吳三桂至廣東與偽將軍馬寶戰于韶州陳亡恩賜雲騎尉世職承襲詳見世職表孟色爾孟色爾蒙古正白旗人姓巴依忒氏世居喀爾喀地方官侍讀康熙十七年頒詔廣東值海寇煽亂死於難恩賜騎都尉世職承襲詳見世職表活特活特蒙古正白旗人康熙二十年以佐領隨征南大將軍賴塔由廣西進征逆孽吳世璠戰於雲南之黃草壩陳亡賞恤如例布大布大蒙古正白旗人姓阿里拉爾氏世居呼庫諾爾佐領部委參領駐防西安康熙五十七年九月隨侍郎色楞進勦西藏于哈喇烏蘇遇凖噶爾賊力戰陳亡恩賜騎都尉世職承襲詳見世職表布達布達蒙古正白旗人任雲騎尉康熙五十七年隨侍郎色楞進征西藏擊賊陳亡同旗馬起亦以是役歿於陳賞恤如例檔色檔色蒙古正紅旗人任驍騎校康熙十三年隨征吳耿二逆藩於江西有功十五年進至湖廣擊賊於醴陵陳亡恩賜雲騎尉乾隆十三年賞給恩騎尉世職承襲詳見世職表博爾濟博爾濟蒙古正紅旗人姓阿蘇克氏世居喀喇沁地方以驍騎校隨安親王嶽樂征逆藩吳三桂至湖廣康熙十六年十月進攻長沙力戰陳亡恩賜雲騎尉世職承襲詳見世職表三進三進蒙古正紅旗人姓薩爾處特氏世居西拉木蘭地方以委署恭領隨貝勒查尼征逆藩吳三桂康熙十七年隨都統朱滿自襄陽往截海賊糧運至九馬嘴遇風舟覆歿恩賜雲騎尉世職承襲詳見世職表嘎爾馬嘎爾馬蒙古正紅旗人署護軍校康熙十七年隨征吳逆至襄陽率舟師抵九馬嘴要截賊糧遇風沉舟歿恩賜雲騎尉世職承襲詳見世職表巴泰巴泰蒙古正紅旗人任護軍校康熙十七年從征吳逆至襄陽率舟師抵九馬嘴要截賊糧遇風沉舟歿恩賜雲騎尉世職承襲詳見世職表素施達素施達蒙古正紅旗人任護軍校從征吳逆至湖廣康熙十七年分兵襄陽截賊運糧河道率舟師抵戰覆舟歿恩賜雲騎尉世職承襲詳見世職表和瑞和瑞蒙古正紅旗人康熙十三年以三等輕車都尉從征逆藩吳三桂至陕西同副將張登科敗偽將軍吳之茂彭時亨等於廣元偽將軍王屏藩談宏等引賊衆自漢中渡江來犯復擊敗之又擊偽將軍劉慶成俱破其衆十七年從征南將軍穆占至湖廣擊偽將軍杜輝等於洞庭之桞林嘴連敗之十八年進取湘隂於九馬嘴力戰陳亡恩賜世職為二等輕車都尉承襲詳見世職表俄爾和兑俄爾和兑蒙古正紅旗人襲父雲騎尉職康熙十四年從征逆藩吳三桂至陕西敗偽總兵於上羅鎮十七年從征南將軍穆占往湖廣敗偽將軍杜輝等於洞庭之桞林嘴十八年進取湘隂在九馬嘴地方力戰陳亡恩賜雲騎尉合原襲世職為三等輕車都尉承襲詳見世職表黑色黑色蒙古正紅旗人姓博爾吉孫氏世居卓魯克地方由輕車都尉世職於康熙十九年從征逆孽吳世璠二十年正月攻石門坎力戰陳亡賞恤如例額爾吉圗額爾吉圗蒙古正紅旗人姓巴禹特氏世居喀爾喀地方理藩院郎中兼佐領康熙二十年四月運米往賑蒙古為烏拉所害恩賜雲騎尉世職承襲詳見世職表博爾和博爾和蒙古鑲白旗人姓巴林氏世居察哈爾地方由護軍校委署佐領康熙十五年二月隨定遠平寇大將軍安親王嶽樂征逆藩耿精忠至江西之會浦遇偽總兵朱一典等率衆拒