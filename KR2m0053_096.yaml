  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_096-1a, image: WYG0665/WYG0665-0539c.png}
body:
  text: 典禮志五八旗祀典二功臣廟祀賢良祠功臣廟祀前殿正龕敬謹莊親王尼堪英誠武勲王揚古利武壮王孔有徳武襄公巴爾堪東次龕一等公安北將軍諡忠勇佟國綱贈太師一等公諡忠烈佟養正散秩大臣一等公逹福一等公領侍衛内大臣西哈一等侯諡襄武馬得功贈三等侯巴什泰一等伯諡武壯宜理布贈二等伯己都里一等伯程尼三等伯穆和琳大學士張泰贈一等伯議政大臣羅沙太子少保三等伯諡忠毅王之鼎贈太子少保福建總督諡忠貞范承謨額駙托相大學士龍西大學士色恩泰湖廣總督諡忠勇額倫特副將軍查弼訥内大臣兵部尚書圖捫贈大學士佟濟倉場總督王秉仁二等子都統博波圖議政大臣長史諡襄壯雅賚刑部尚書道禪工部尚書名盖㕘贊内大臣馬爾薩西次龕輔國公諡襄愍巴賽大學士諡忠愍莫洛續順公沈瑞禮部尚書布顔岱十六大臣管佐領綽和諾湖北巡撫柯永昇都統沙里布贈太子少保巡撫諡文毅馬雄鎮雲貴總督諡忠果甘文焜兩廣總督佟養甲禮部侍郎朝哈爾贈禮部尚書諡忠烈髙卞爵贈工部侍郎費楊古贈三等子圖魯錫三等男喀爾他拉䕶軍統領喀爾䕶吉㕘賛大臣副都統海蘭副都統蘇圖前鋒統領胡里布䕶軍統領哈克三贈䕶軍統領佐領葉喜侍郎永國䕶軍統領阿爾岱湖廣提督孫定遼東又次龕前鋒統領劉哈副都統盧錫副都統科普蘇副都統阿喀倪副都統納爾特副都統錫宻賚副都統科爾坤副都統多頗洛副都統戴豪副都統渾錦副都統衛正副都統羅濟副都統阿什圖副都統覺羅阿克善副都統阿爾䕶副都統常禄副都統吉三副都統巴雅思虎朗西又次龕福建提督段應舉副都統穆舒副都統孟魁副都統白闕副都統邁圖副都統葛思特雲南巡撫朱國治右副都御史張文衡刑部侍郎馬如璧通政使莫洛渾一等子穆克覃一等子阿納逹一等子岱音布一等子覺羅莫洛渾東稍龕左都督總兵官諡忠愍吴萬福總兵官諡忠武阿爾泰贈雲騎尉張廷輔前鋒統領定夀三等子錫喇巴江西布政使司遲變龍西稍龕䕶軍統領郭色䕶軍統領新泰提督諡壯勇康泰二等子覺羅顧納岱贈都督同知司九經二等子拜蘭總兵郝效忠總兵劉良臣三等子巴朗都爾莽賚贈總兵官甘應龍二等子拜三一等男路什後正堂備禦尼馬禪等一百十有五人左次龕䕶軍㕘領倭赫等七十人右次龕一等輕車都尉季普哈逹等八十人左又次龕㕘將劉衍等四十五人右又次龕二等輕車都尉莽儀禄等四十人東配樓贈雲騎尉七品官覺羅星徳等四百三十七人西配樓贈雲騎尉䕶軍校雅思哈等四百五十七人東廡一等輕車都尉赫爾徳等一百八十八人西廡守備劉澤久等一百二十八人東西房附祀兵丁共一萬三百有七人謹案後正室以下諸臣姓名詳列忠義傳中兹不具載賢良祠雍正八年七月諭國家効忠宣力之臣勲績茂著必膺崇報之典令其世享烝嘗雍正二年朕已敇建昭忠寺自開國以来致命立功盡忠報國之儔皆得春秋妥侑世世血食顧念古者大烝之祭凡法施于民以勞定國者皆得並列祀典永受明禋則我朝名臣良弼其經邦佐治黼黻昇平者皆祭法所必登朕欲為之建立祠宇久矣即如怡親王之精白一心忠誠體國勲在社稷澤被生民其功徳隆盛又豈一切効忠宣力者之可比倫乎洪惟太祖太宗創業垂統厥有一徳佐命之良世祖撫綏萬邦實多奮庸熙載之彦迨我聖祖臨御六十餘年其間良臣碩輔後先相望據朕所深知者舉其一二如大學士公圖海公賴塔大學士張英尚書顧八代馬爾漢趙申喬河道總督靳輔齊蘇勒總督楊宗仁巡撫陳璸等持躬正直奉職公忠或垂節鉞之勲或勵氷霜之節俯仰無愧為朝野所共欽終始不渝無瑕疵之可指似此等靖共爾位不愧古大臣之風者正不乏人既樹羽儀于一世宜隆俎豆于千秋且使世世為臣者觀感奮發知所慕效羣以臯䕫稷契共相期待則明良喜起之盛朕於斯有厚望焉著於京城内白馬闗帝廟之旁選擇吉地特建廟宇命名賢良祠春秋以時展祀其應入祠之員著内閣㑹同該部確查本朝滿漢文武大臣才徳著聞完名全節者詳慎開列具奏請㫖將來繼起之臣亦併得沾被恩光永為盛典特諭賢良祠八旗文武大臣爵位姓名前室設位南面忠敬誠直勤慎亷明和碩怡賢親王允祥雍正八年入祀和碩超勇親王策凌乾隆十五年入祠後室享祀大臣少保兼太子太傅中和殿大學士一等忠逹公諡文襄圖海正藍旗滿洲都統一等褒績公諡襄毅賴塔太師禮部尚書諡文端顧八代太子太傅議政大臣吏部尚書諡恭勤馬爾漢太子太保工部尚書銜河道總督諡文襄靳輔太子太傅河道總督諡勤恪齊蘇勒少保湖廣總督諡清端楊宗仁以上俱雍正八年入祀太傅兼太子太師内秘書院大學士一等子諡文肅范文程大學士諡文成榜式達海太子太保加贈少保武英殿大學士兼吏部尚書諡文清阿蘭泰鑲紅旗蒙古都統協理将軍謚僖恪阿爾納正藍旗漢軍都統諡桓僖馮國相太子太傅武英殿大學士兼吏部尚書諡文恭富寜安太子太保領侍衛内大臣一等公諡公懿福善太子少師領侍衛内大臣一等公謚襄壮費揚古太子太保振武将軍甘肅提督諡襄武孫思克太子太保江南江西總督諡清端傅拉塔少保兼太子太傅内國史院大學士諡文毅甯完我太子太保定西将軍兼都統三等侯諡敏壯李國翰太子少傅靖海将軍靖海侯福建水師提督謚襄壮施琅鎮南将軍鑲白旗䕶軍統領諡襄壯莽依圗少保兼太子太保定西将軍内大臣一等公諡靖康愛星阿西安将軍諡恭靖佛尼勒太保四川陕西總督諡忠毅孟喬芳少師兼太子太師内國史院大學士諡文恪額色黑四川陕西總督諡襄勤李國英鑲藍旗滿洲都統諡襄壯根特䝉古副都統一䓁輕車都尉諡襄壮褚庫巴圗魯領侍衛内大臣二等公諡慤敬尹徳以上俱雍正十年入祀太子太傅文淵閣大學士兼吏部尚書世襲二等輕車都尉諡文恪髙其位雍正十二年入祀太子太保内大臣議政大臣一等男加雲騎尉諡恪僖哈世屯户部尚書議政大臣一等男加一雲騎尉諡敏果米思翰乾隆元年入祀太傅尚書銜諡文定徐元夢乾隆二年入祀太傅保和殿大學士兼户部尚書世襲二等伯諡文穆馬齊文華殿大學士兼吏部尚書諡文端伊桑阿乾隆十二年入祀太子太傅直𨽻總督諡慤勤那蘇圗乾隆十四年入祀一等伯都統諡襄烈傅清一等伯左都御史諡壯果拉布敦乾隆十五年入祀太保武英殿大學士諡文端福敏一等伯西路将軍諡武烈和起以上乾隆二十一年入祀太子太保浙閩總督諡慤勤喀爾吉善太子太保兩廣總督諡文勤鶴年以上乾隆二十二年入祀武英殿大學士三等忠勤伯兼管陕甘總督諡文襄黄廷桂乾隆二十四年入祀太子太保户部尚書諡勤恪李元亮乾隆二十六年入祀四川總督尚書銜諡勤肅鄂弼乾隆二十八年入祀太保武英殿大學士諡文端来保太保協辦大學士户部尚書一等武毅謀勇公諡文襄兆惠乾隆二十九年入祀太子大保户部尚書果毅公諡襄壮阿里衮乾隆三十四年入祀太保保和殿大學士一等忠勇公諡文忠傅恒乾隆三十五年入祀太保文華殿大學士諡文端尹繼善乾隆三十六年入祀太子太保陕甘總督諡勤毅吳達善乾隆三十七年入祀太保武英殿大學士諡文襄舒赫徳乾隆四十三年入祀太子太傅文華殿大學士兩江總督諡文端髙晉乾隆四十四年入祀太子太保東閣大學士諡文肅英亷乾隆四十八年入祀太子太保兩江總督薩載乾隆五十一年入祀将軍諡武毅奎林乾隆五十七年入祀致祭禮儀前室祀宗室親王以下貝勒貝子以上後室祀公侯伯以下三品大臣以上均按代序官同官序其年月位均南向嵗春秋仲月諏吉前室遣官一人致祭後室以太常寺卿一人将事所祀王子孫咸與行禮大臣子孫通籍在京者如之祭日太常寺官入祠供具前室異案各羊一豕一果實五盤鑪一鐙二中設一案少東北向供祝版西設一案東向陳香盤二尊二爵六素帛二後室五案共羊豕一每案果實五盤鑪一鐙二東設一案西向陳香盤一尊一爵三素帛一設洗於前室東階下前後各設燎鑪扵垣門内東南隅承祭官朝服詣祠贊禮郎二人引前室承祭官由中門入又二人引後室承祭官入各至東階下盥手升階就拜位立鴻臚寺官引王以下子孫序立于前室甬道左右引公以下大臣子孫序立扵後室庭中左右均北靣贊就位承祭官以下皆就位贊上香前室承祭官詣正中香案前三上瓣香次詣各香案前上香復位承祭官暨陪祀官均行二跪六叩禮後室承祭禮同賛奠帛爵行初獻禮賛讀祝司祝北靣宣讀承祭官立聴陪祀官皆跪聴亞獻終獻如初儀贊行二跪六叩禮燎祝帛禮畢各退祭文維年嵗次月日皇帝遣諭祭賢良祠王大臣和碩怡賢親王大學士公圗海等之靈曰功銘鐘鼎尚書崇元祀之文徳冠巖廊周禮著大烝之典盖旂常載績本臣子之素懐而爼豆薦馨乃朝廷之崇報爾和碩怡賢親王望重親賢粹鍾川嶽竭忠誠而體國著勲徳於當年大學士公圗海等或當列祖開基之日佐命立功或際熙朝極盛之時宣猷贊化或驅除暴亂定疆宇扵域中或震耀聲靈収版圗於海外内則台星卿月奏亮工熈載之勲外則錫鉞授麾襄阜物安民之治老成謀國者進黄髪之嘉猷清白持身者表素絲之髙節純勤盡職則夙夜匪躬宻勿承休則堂㢘一徳我皇考追思前蹟特焕褒綸崇廟宇扵神京布几筵而時祭盖以表揚既往沛酬庸褒徳之恩激勸将来勵懐古欽風之志朕寅承丕緒嗣舉舊章撫節物以懐賢潔牲牢而致享於戲名傳史牒美茂績之長昭禮重明禋𬗟英靈而如在奠兹清酤尚克歆承欽定八旗通志卷八十二
