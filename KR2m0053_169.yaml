body:
  text: 人物志三十五大臣傳二十一滿洲正黃旗九阿努三音官保扎達青阿愛隆觀保拉豐阿官達色努三努三吉林滿洲正黃旗人姓瓜勒佳雍正六年由前鋒授藍翎侍衛九年授三等侍衛十三年授二等侍衛乾隆二年命在乾清門行走八年授頭等侍衛十年在御前行走十一年二月赴北路軍營時四川總督慶復𠞰下瞻對土酋班滚三月命努三赴慶復軍營給治裝銀四百兩尋慶復奏班滚焚斃十二年接任總督張廣泗奏班滚現在如郎命治慶復罪以努三隨同具奏命銷去議敘加級革退御前行走著在乾清門行走十三年九月命回京請訓再赴金川軍營十四年授鑲白旗蒙古副都統尋授正藍旗護軍統領十八年四月偕湖廣總督永常赴安西籌議防範事宜十九年正月留駐鄂爾坤軍營二月凖噶爾宰桑瑪木特追來降之都爾伯特台吉策淩闌入卡倫上授努三參贊大臣偕散秩大臣薩喇勒往會將軍成衮扎布率兵分路查緝時凖噶爾烏梁海宰桑赤倫居吹地努三偕貝勒青滚雜卜台吉班珠爾分兵往擒赤倫及所屬四得木齊雅爾都所屬一得秦家口牲畜至額里音淖爾喀喇烏蘇擒扎哈沁噶勒雜特兵百五十餘人及為首之達什敦多卜事聞下部優敘二十年二月上以努三及護軍統領烏勒登收服扎哈沁未即擒獲逃犯巴朗諸事退諉交定北將軍班第定邉左副將軍阿睦爾撤納審訊並命參贊大臣策楞協理北路軍務侍郎兆惠查明努三等收取牲畜等項有無隱匿一併具奏尋班第等奏至諭曰班第等訊問努三烏勒登供詞一切推諉即卸過於薩喇勒大薩喇勒歸順未久從前收獲烏梁海人衆時即有搶虜之事以伊舊染凖夷習俗初到未知法度是以姑從寬容若努三烏勒登乃滿洲世僕亦效凖夷之所為是尚可寬宥乎且烏勒登收服烏梁海時未將逃人巴爾報出努三擒獲包沁逃人特赫拜哈都理應正法乃並未奏聞請旨俱屬舛謬策楞所查努三之事尚未奏到著傳諭班第阿睦爾撤納即將努三烏勒登併案嚴審定擬具奏四月諭曰據班第等審訊努三烏勒登擬以應斬監候努三烏勒登收復扎哈沁後並不往拿巴朗實係貽悮軍機罪不可逭但念伊二人去嵗收復烏梁海扎哈沁時亦曾隨同效力著加恩免其治罪仍留軍營以間散效力贖罪努三烏勒登俱係滿洲世僕乃在軍營逡巡畏葸此次不即正法俾全首領皆朕格外之恩其由軍營查出馬匹什物及伊二人所有家産俱著入官五月授藍翎侍衛在嚮道章京上行走二十一年正月授三等侍衛二月遷頭等侍衛命同左都御史何國宗往伊犂測量度數並繪地圗詳見何國宗傳二十二年二月以送兵赴巴里坤至嘉峪關即奏請回京得旨降藍翎侍衛仍留巴里坤聽差遣六月招撫巴爾達穆特各鄂拓克人衆上嘉其奮勉擢二等侍衛七月授頭等侍衛先是將軍兆惠追逆賊阿睦爾撤納至哈薩克哈薩克黨逆拒戰兵敗請降兆惠遣努三與哈薩克來使往諭即留駐其地尋阿逆竄死俄羅斯詔努三仍回軍營二十三年正月撤兵至烏隆古聞哈薩克錫喇之得木齊達什扎卜等匿博羅爾托輝努三偕副都統順德訥𠞰之又生擒盜巴里坤馬之庫魯特宰桑摩羅等於拜塔克收服根敦扎卜達什扎卜丁壯二百餘上嘉之二月授鑲藍旗護軍統領四月命經理巴里坤等處屯田七月奏言自穆壘至烏魯木齊有昌吉羅克倫可耕地十六處令屯兵輪種詔選內地緑營兵七千往屯八月又奏言兩處應各駐兵一千五百更畨開種命如數添派十一月偵𠞰嗎哈沁於博羅托海收其馬匹疏入詔賜幣時兆惠被遮黑水二十四年正月努三隨定邉左副將軍富德往援至呼爾璊分兩翼進擊賊敗遁努三與副都統鄂博什截賊去路前至兆惠營告援兵至復偹駝馬迎兆惠營官兵努三鄂博什為殿回駐阿克蘇事聞下部議敘恩給騎都尉世職三月命赴烏嚕木齊經理哈薩克貿易沿途查勘屯田搜捕嗎哈沁賊衆六月奏言烏嚕木齊現屯兵一千再留凱旋兵五千在特訥格爾昌吉羅克倫一帶分地墾種明年穫糧即運供伊犂口糧籽種上是之九月奏擒嗎哈沁訥克衣等下部議敘命兼管烏嚕木齊屯田事是月奏言博克達山在烏嚕木齊之東為西陲重鎮請令駐劄大臣每年春秋致祭從之二十五年三月凱旋上御豐澤園幄次宴賚將軍兆惠富德等及隨征將士賜努三幣十端銀二百五十兩五月兼署正黃旗滿洲副都統八月授右翼前鋒統領二十七年正月授鑲藍旗蒙古都統兼武偹院事五月兼上駟院卿十月命在阿哥總諳達上行走三十年授領侍衛內大臣三十一年五月管健鋭營三十二年十月署正紅旗護軍統領三十三年授御前大臣三十五年五月命紫禁城內騎馬三十八年十月調正藍旗滿洲都統四十三年十一月卒諭曰努三內廷行走多年甚屬出力今聞溘逝深為軫念著施恩派散秩大臣一員帶領侍衛十人往奠茶酒仍賞銀三百兩辦理喪事應得恤典察例具奏尋賜祭葬如例諡恪靖子依什策楞襲病故襲次已完停襲官保官保滿洲正黃旗人姓吳雅雍正十年由刑部筆帖式擢堂主事十一年遷員外郎乾隆五年遷郎中七年授江南江寧府知府十一年三月總督尹繼善奏官保不宜外任詔以京員用七月補刑部員外郎十三年轉郎中十九年改監察御史二十年遷刑科給事中命巡視臺灣二十二年二月擢漢軍鑲黃旗副都統五月命往西藏辦事二十六年正月授刑部右侍郎十一月轉左二十七年三月調滿洲正黃旗副都統二十八年以刑部侍郎兼管工部侍郎三十年調工部侍郎三十一年四月復往西藏辦事先是西藏糧務通判吳元澄私那藏庫銀買運貨物虧空銀萬八千餘兩厯任駐藏大臣俱失察官保訪知參奏上命官保同駐藏大臣瑪常革吳元澄職在藏地審明正法並遵旨查失察駐藏大臣職名入奏上嘉官保沿途留心抵藏後即查出此事實屬急公交部議敘加一級三十二年授正紅旗蒙古都統三十三年六月署理藩院尚書七月授刑部尚書仍署理藩院事兼正紅旗蒙古都統尋調正紅旗滿洲都統十一月兼署禮部尚書十二月充經筵講官三十四年正月署户部尚書是月協辦大學士二月協理步軍統領刑名署理户部三庫事務命紫禁城內騎馬六月上駐蹕熱河命留京辦事是月巡察興平倉奏言興平倉新收漕糧粳米八厫內三厫俱乾潔五厫米色較潮潤若不豫籌恐黴變虧折查乾隆二十四年江浙漕糧偶被風潮總漕楊錫紱奏準先行支放今興平倉新漕米色潮潤之五厫請先支放以免虧缺交倉場侍郎妥協辦理得旨俞允嗣經倉場侍郎實麟黃登賢查驗五厰內米色果灰暗潮潤上以總漕梁翥鴻不能查察交部嚴加議處實麟黃登賢率行收倉交部察議尋議翥鴻降三級調用實麟登賢俱降一級留任九月命偕禮部尚書王際華户部侍郎英亷總理平糶事宜官保以西城麵厰虧短將監糶侍郎蔣元益參奏並遵旨查中東南北四城麵厰情形嗣查奏北城麩麵短少曾經報出中東南三城監糶大臣未能豫行查辦請與會同辦理之御史一併察議諭曰此案短少麩麵緣由北城據實報出所辦尚是該城監糶大臣等免其交部中東南三城未能豫行查辦自應察議但官保等祇知各城監糶之應與處分不知北城早報出伊等不即妥辦以致屢生事端其咎更無可辭官保王際華英亷一併交部察議部議俱降一級留任十一月實授户部尚書三十五年調刑部尚書兼議政大臣三十六年五月充國史館正總裁六月兼署兵部尚書三十八年調吏部尚書四十一年正月以患病年逾八旬請將內閣吏部等事務俱行開缺諭曰官保宣力有年尚能誠謹供職今以老病懇請解任著以原官致仕三月卒遺疏上敇部查應給恩典照例具奏賜祭葬諡文勤子萬寧官至布政使凝德任獨石口副將達青阿達青阿滿洲正黃旗人姓顔扎乾隆二年由拜唐阿授藍翎侍衛纍遷二等侍衛十三年命隨大學士傅恆往金川軍營尋諭曰朕聞大學士傅恆沿途行走部伍整齊兵丁安靜守法此皆大學士盡心辦理故能妥協如此朕心甚為欣慰達青阿隨軍偹辦諸務亦能協力黽勉著授頭等侍衛從此益加奮勉悉聽大學士指示加意勤慎不可恃恩稍自矜張也十四年二月授鑲藍旗蒙古副都統十二月諭曰朕明春幸五臺著達青阿等馳驛前往查勘由太原至固關道路尋授參贊大臣往北路軍營十七年與喀爾喀副將軍得親扎卜參贊貝勒額林沁駐防喀錫喇烏蘇十八年五月駐防察罕淖爾特爾竒河源十一月與喀爾喀公格勒克巴木丕勒駐防扎卜堪等處時凖噶爾台吉達瓦齊與訥默庫濟爾噶爾連嵗搆兵都爾伯特台吉策淩烏巴什等率所部三千餘户來降凖噶爾宰桑瑪木特以兵二百追入卡倫達青阿與貝勒策登扎卜公格勒克巴木丕勒等率兵赴庫克嶺會貝子車木楚克扎布密策淩等遷移遊牧俟果有追兵相機戰守定邊副將軍成滚扎布以聞諭曰凖噶爾瑪木特以二百人闌入卡倫甚有輕視我兵之意若不加以懲創將來噶勒藏多爾濟阿睦爾撤納必愈加恣肆如入無人之境是邊界住劄兵丁徒有虛名何以保護喀爾喀耶在守卡兵丁僅二三十名豈能以理曉諭阻止二百之衆成衮扎布達青阿等即應派兵擒𠞰何以姑息玩愒至此可將現在如何辦理之處速行具奏尋成滚扎布奏瑪木特復逸出卡倫潛回遊牧達青阿選兵一千同車木楚克扎布等相機擒𠞰十九年正月達青阿遣使誘致瑪木特於來路設伏瑪木特等至擒之諭曰從前降旨原令達青阿領兵前往詢問瑪木特闌入卡倫情由應以理責其進卡之罪倘呼之不至或至而心懷不服有所抗拒即以兵力擒拏今但遣一使曉諭而瑪木特即親身前來並無抗拒情形達青阿設計誘擒辦理非是且蒙古人內名瑪木特者甚多並不詢其孰假孰真更極舛錯瑪木特恭順聽命釋放回巢達青阿著來京候旨三月命在藍翎侍衛上行走效力贖罪二十二年五月擢鑲藍旗滿洲副都統二十四年三月卒愛隆阿弟巴靈阿愛隆阿滿洲正黃旗人姓覺爾察由前鋒厯遷前鋒侍衛乾隆十七年授正黃旗護軍參領二十年擢黑龍江左翼齊齊哈爾副都統尋調白都訥副都統二十一年授領隊大臣赴巴里坤軍營二十二年五月偕參贊大臣富德追擒叛賊巴雅爾至愛登蘇遇哈薩克阿布賚部衆突出與戰數次哈薩克既歸附豫議敘八月自巴爾楚克至濟爾哈朗接續臺站搜𠞰賊於沙喇博和什嶺遇都爾伯特納木竒遊牧乞降旋遁去愛隆阿追及殺千餘人納木竒遂納欵九月收厄魯特宰桑烏魯木遊牧百餘户於察罕烏蘇十月大兵撤回濟爾哈朗命愛隆阿協辦軍務尋駐守濟爾哈朗巴里坤適中地十二月領兵策應阿里衮追𠞰沙喇斯等賊二十三年正月隨靖逆將軍雅爾哈善進討波羅泥都霍集占先是愛登蘇之戰侍衛竒徹布陳亡至是愛隆阿呈稱前擒巴雅爾與哈薩克對陳奪回竒徹布尸富德未奏定邊將軍兆惠奏言臣等查詢富德從前愛隆阿原報並無奪回竒徹布尸語至擒獲巴雅爾時其領隊行走之處業已聲明蒙恩交部議敘愛隆阿顯係爭功請嚴議諭曰愛隆阿貪功訐告理應從重治罪但伊此次行走尚為出力加恩免其治罪所有議敘即著停止又諭曰愛隆阿以羅卜藏多爾濟晉封王爵伊但邀議敘心懷不足殊不思羅卜藏多爾濟係蒙古台吉愛隆阿何可相比今但停止議敘已屬加恩前令其在雅爾哈善隊內行走此次進兵當知立功自贖若不奮勉效力必將伊從重治罪斷不寬宥六月大兵圍庫車城賊來援愛隆阿等遇賊於戈壁𠞰殺甚衆霍集占親率賊赴救愛隆阿等率吉林及索倫兵追敗之於鄂根河殺溺死