月扎拉豐阿奏稱科卜多屯田約計大小麥収在七分以上惟所種粟因氣寒霜早秀而不實諭曰都爾伯特人等在烏蘭古木耕種烏梁海人等在布拉罕察罕托輝耕種俱獲豐収科卜多相距不逺従前扎哈沁等亦曾開墾収成尚好看来此次或播種稍遲或霜雪早降又或土性不宜種粟著傳諭扎拉豐阿詳詢該處舊日居人酌量辦理十月奏言科卜多屯田用青稞籽種百石向䝉古游牧貿易商民等購買不許運送諭曰科卜多既有内地商民行走将来生聚必繁今伊犂等處俱建造城堡若照例興工甚屬有益科卜多所有舊城基址既稱地形卑濕著傳諭扎拉豐阿伊現在安營於科卜多之南哈勒巴山即於該處擇髙燥之地計可容兵民若干不必過為寛大派屯田緑旗兵従容興築辦理十一月扎拉豐阿奏言烏梁海内大臣察達克等前往辦理庫克新臣亦領兵五十名徃偵探策應諭曰此次察達克辦理庫克新因庫克新原係伊部落人等逃入俄羅斯又指伊等名目為匪是以自請往辦原不藉扎拉豐阿之助乃伊復請自行領兵前往徒覺張皇於事無益著速行停止定邊左副将軍成衮扎布等尋奏額爾齊斯河渡口有兵馬旗纛踪跡此處向係哈薩克行走之路恐因伊等牧羣被烏梁海竊取自當加意防範諭曰察達克等曽請自行辦理庫克新今既有此踪跡當候信息明確酌量行止昨扎拉豐阿奏請領兵策應察達克等已諭令不必前往此次非専辦庫克新可比著扎拉豐阿同察達克等前往於偵探策應之處自可相資為用二十八年正月察達克擒戮庫克新扎拉豐阿仍回科卜多六月成衮扎布奏扎拉豐阿報稱科卜多土肥但䝉古等未諳耕墾若添派緑旗兵百木石鐵匠數人於現在修補農具将来建造城房俱有益下軍機大臣議行成衮扎布又奏扎拉豐阿咨稱科卜多修城請於種地緑旗兵四百内酌派八十名委員監修兩年可竣於屯田無悮允之十一月成衮扎布入覲命扎拉豐阿往烏里雅蘇臺署理将軍印務尋来京二十九年充右翼監督三十年三月署鑲紅旗漢軍都統四月兼武偹院卿三十一年授滿洲正白旗䕶軍統領三十二年六月授領隊大臣赴雲南軍營十一月隨将軍公明瑞至蠻結分據東山梁十二月明瑞督兵進𠞰值大霧扎拉豐阿率左哨薄賊壘奪木寨一𠞰殺無算三十三年正月給都統銜二月師至小猛育明瑞歿於陣扎拉豐阿等亦中鎗陣亡事聞諭曰都統扎拉豐阿等隨明瑞進𠞰緬匪勤事捐軀深堪嘉尚已降㫖兵部従優議卹若僅循例議給世職殊未副朕逾格酧庸之意扎拉豐阿舊有承襲一等輕車都尉世職著加恩給予世襲一等男爵尋賜祭𦵏如例入祀昭忠祠並附祀旌勇祠諡昭節子春寧襲世職官正白旗滿洲副都統四十八年縁事革職命春寧子富勒洪阿襲四十九年賞藍翎侍衛隨𠞰甘肅回匪田五等有功擢二等侍衛遞遷正藍旗䝉古副都統伊犂領隊大臣官達色官達色滿洲正黄旗人姓𤓰勒佳乾隆十三年補健鋭營前鋒校二十年征準噶爾派往西路軍營五月補藍翎長二十一年十一月隨将軍兆恵自鄂壘扎拉圖至特納格爾𠞰賊二十二年三月上南巡兆恵遣官達色及副䕶軍校兆坦赴行在備訊問諭嘉其沿途𠞰賊奮勉行走授藍翎侍衛二十三年進𠞰烏什䕶送霍集斯之子漠咱帊爾入覲二十四年正月遷三等侍衛二十六年兼健鋭營行走二十七年五月予雲騎尉世職十一月遷二等侍衛三十年八月授副叅領三十一年六月遷甘肅山丹營遊擊三十三年八月命往雲南以叅将題補三十四年授雲南順雲營叅将嗣以不識漢文不能辦理緑營事務自請回京當差經畧大學士傅恒以官達色鑄礮奮勉委署翼長從征老官屯三十五年副将軍阿桂以官達色原任叅将已開缺奏補健鋭營前鋒叅領三十六年隨将軍温福征金川十一月率成都滿洲兵四百抵甲金達時方進攻巴朗拉山梁官達色與侍衛烏什哈達等領瓦寺土兵百餘由山右登奪卡六據其東西碉後髙峰十二月復攻巴朗拉官達色與侍衛明仁等攜大礮轟賊碉三晝夜克之詔給巴爾丹巴圗魯號白金百兩三十七年正月師踰達木巴宗至斯底葉安賊嚴守我兵三路夾擊官達色以礮轟破其碉二月署松潘鎮總兵三月官兵於北山坡築卡斷賊後賊乗雪夜築二卡攻之賊棄卡逃越日資哩賊衆亦逃官達色分追賊泅水淹斃無數餘竄阿哈木雅隨移營至其寨外發礮轟擊垂破賊夜遁官達色與侍衛賡音素由中路躡之斃賊十餘人五月温福等攻南山總兵牛天畀既克髙峰大卡官達色率兵二百協擊有賊畨突出林中欲截天畀後官達色擊走之遂合天畀兵下壓斃第二卡拒敵之賊十餘人餘逃入大卡時天畀連攻南山嶺第二碉官達色領兵攻第三碉以分賊勢多所斬馘三十八年三月署襄陽鎮總兵進攻達爾圗我兵設伏伺賊出擊之賊蔵身碉根施鎗礮我兵舉巨礮轟擊日斃數十人時豐昇額議移兵日旁官達色同領隊大臣華善等率兵六千餘駐守宜喜軍營仍每日發礮作進攻状賊守稍懈五月分路攻達爾圖官達色攻第二三碉卡拔其木栅殱賊衆六月賊搶佔木波喇嘛寺糧站諭五福同官達色防守丹壩等處三十九年四月上以凱立葉一路未能深入命副将軍豐昇額往谷噶㑹𠞰官達色與侍衞普濟保等率兵四千赴谷噶五月定邊将軍阿桂派官達色隨叅贊大臣海蘭察乗雨雪大作分路攻取喇穆喇穆髙峰大碉奪碉下石卡三殺賊十餘餘傷竄入大碉至碉根擲火弹以雨濕不燃暫還六月破色淜普山梁七月復隨海蘭察率兵六百直取喇穆喇穆迤西髙峰兩大碉夜半潛發援石壁蟻附而登伏碉旁黎明突破兩碉殱賊無筭旋分三隊攻該布達什諾大碉至溝邊賊覺鎗石如雨我兵益奮躍踰溝刨碉根或縁碉直上賊見勢鋭逸出截擊之殱其在碉者附近各卡栅賊俱逃追斬無算時賊尚聚守該布達什諾木城阿桂令海蘭察等繞據木城後官兵分道進官達色攻其前賊守益堅奮勇分攻之克其石卡木城遂突入遜克爾宗十月攻黙格爾山梁官達色與額森特等合攻其碉卡三冒鎗石攀援直上砍破碉門殺賊二十餘隨上山攻其西面之密拉噶拉木山奪大寨一石碉四併克旁近寨落十一月従羅卜克鄂博攻溝内碉寨官達色等禦格魯克古来援之賊旋同海蘭察額森特等分隊裹糧踰溝攻格魯克古了口克當噶海寨及兜烏當噶大碉共焚其沙木拉渠寨連日攻作固頂沿途碉寨遂與丹壩官兵合復領兵循格魯克古山梁下壓至桑噶斯瑪特箐邊有賊卡二躍入殺賊賊潰克山腰石城木栅四十年正月實授襄陽鎮總兵三月攻達佳布安吉二寨復分兵三路攻勒吉爾博山趾賊碉官達色與總兵保寧特成額等分攻第一碉克之四月攻榮噶爾博下木城及木思工噶克丫口碉官達色截殺来援賊六月攻榮噶爾博第八峰官達色與普爾普等踰溝拔木寨二十六進逼巴占七月以巴占抗守甚固分道従舍圖枉卡進攻官達色循昆色爾山梁東上據雅木則碉對面遂克果克多山等碉復同泰斐英阿額爾特等焚附近各寨旋圍拉枯喇嘛寺官兵騰入賊不能遁殱焉遂収喇嘛科爾所屬之卦爾沙巴等寨焚昆色爾寺及山陽什爾徳察烏曲所屬之格思等寨乗勝克雅木則戰碉隨同海蘭察等分三路攻章谷大碉賊掘溝設栅伏鎗石以待我兵拔栅即取其木植駕溝而過縁碉角蟻附至碉頂以次下攻賊驚竄我兵𠞰殺數十人克其碉並収其旁木城復従章噶下溝分攻各碉卡官達色與保寧仁和等攻克寨落七遂合海蘭察兵攻勒烏圍復同普爾普等由托古魯山半破栅下逼並分攻隆斯得三寨砍寨門先克兩寨殺賊三十餘賊来援潛入最後寨復攻克之寨内貯鉛子積地二尺餘火藥百餘簍収取之乃設礮臺攻逼勒烏圍之轉經樓旋與保寧彰靄等克轉經樓官兵合破烏圍賊巣九月同海蘭察等繞道攻達烏達圍破其當噶克底碉連破噶拉宇及莫魯古進攻西里賊四出衝抵官達色踰溝夾攻力殱賊衆賊穿林逃十月與福康安烏什哈達等各領兵循達思里山麓焚碉寨閏十月官兵克達噶木攻西里之黄草坪海蘭察攻其前官達色拔其旁栅遂克之十一月隨海蘭察攻奔布魯木山峰併策應各路克西里諸要隘拔木栅十餘復同烏什哈達等逼瓦喇占以礮轟破其碉循瓦喇占而下為薩歪有寨落三海蘭察與五福等攻其前官達色與烏什哈達左右合擊賊棄寨逃邀殪之旋隨海蘭察等攻克科布曲木城及索隆古山碉進攻布哈爾朗噶克海蘭察由山坳險徑繞出朗阿古後官達色與烏什哈達軍由左破之收朗阿古官兵並克布哈爾及朗噶克遂據噶爾占山梁四十一年正月我兵既取舎齊喇嘛寺復進攻雍中喇嘛寺分兵三路官達色同普爾普等由右進及暮兵四合賊不能支有喇嘛六十餘出寺降餘驚潰追𠞰之進攻噶拉依賊巣二月金川平三月調山西大同鎮總兵四月賞二等輕車都尉併所得雲騎尉為一等輕車都尉世職命圗形紫光閣列前五十功臣御製贊曰連環火攻國之䧺器率領得人無往不利及至近碉砍門穴孔大呼直入嘉乃獨勇四十三年正月丁父憂回旗四月命署直𨽻宣化鎮總兵四十五年七月卒子哈芬布襲一等輕車都尉欽定八旗通志卷一百五十五
