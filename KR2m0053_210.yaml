body:
  text: 欽定四庫全書欽定八旗通志卷一百九十六人物志七十六大臣傳六十二漢軍正白旗一國柱宜永貴和濟格爾徐馬沈永忠大貴蔡士英于時躍趙祥星孫思克和濟格爾子拜音達禮和濟格爾本䝉古烏嚕特人後𨽻正白旗漢軍遂為何氏太祖高皇帝天命七年征明取廣寧城和濟格爾時為明千總随守備石廷柱来降授㕘領十一年從征巴林部囊努克斬三人追獲叛逃蒙古又從征棟䕫俘獲甚衆太宗文皇帝天聰三年從征明偵敵薊州斬哨卒三敵兵三百来犯和濟格爾衝鋒入斬其把總一五年大軍圍大凌河城明兵自錦州赴援和濟格爾先衆斬敵明總兵祖大夀遣兵出城樵採且刦奪臺堡並奮撃之生擒二人尋與敵戰城下我軍執纛者墜于壕和濟格爾掖之出復以鳥鎗殪敵三人八年予騎都尉世職崇徳三年随貝勒岳託征明至山東屢撃敗敵兵四年始分漢軍為四旗以和濟格爾為鑲白旗副都統五年随大軍圍錦州禦撃松山步兵杏山騎兵皆㨗六年復圍錦州明總督洪承疇率衆駐松山来犯者再和濟格爾俱撃郤之敵自松山分據髙橋南三臺和濟格爾以礮攻克之殱百餘人七年復攻克塔山杏山二城敘功加一雲騎尉是年分漢軍為八旗改正白旗副都統兼任佐領八年随鄭親王濟爾哈朗征明寧逺攻克中後所前屯衛二城順治元年二月敘功晉三等輕車都尉世襲㒺替三年二月卒長子巴圖襲職兼佐領遇恩詔晉二等輕車都尉七年巴圖卒和濟格爾次子拜音達禮襲職兼佐領康熈八年授㕘領九年擢宣化總兵官十三年七月調随征福建總兵官時逆藩吳三桂䧟湖南耿精忠據福建平南王尚可喜請增兵駐防廣東拜音達禮與福建巡撫楊熈並奉命駐廣州十五年二月可喜子之信糾衆據城叛拜音達禮與楊熈議引所部出城㑹大軍撃賊之信已分布叛黨閉城阻之拜音達禮控騎突前斬關奪門出同楊熈率所部還㑹大軍扵贛州疏述其事以聞上以其奮勇奪門忠貞可嘉下部議叙部議予軍功紀録一次復有㫖從優再議于是予雲騎尉職世襲㒺替合所襲巴圖之職為一等輕車都尉十九年授駐防廣州副都統二十七年擢廣州将軍三十七年六月卒于官賜祭塟如例以其子何天培襲職馬國柱馬國柱遼陽人𨽻正白旗漢軍太宗文皇帝天聰八年命禮部考取舉人國柱與選賜衣一襲免四丁入直内院崇徳三年授都察院理事官順治元年大兵撃走流賊李自成大同代州歸順授國柱山西巡撫自昌平出居庸關至代州任事值都統葉臣巴哈納石廷柱等平忻州太原國柱進駐太原策應大軍汾州平陽潞安澤州等府以次底定賊黨李過髙一功遁據綏徳國柱疏請分兵東西夾撃使賊首尾不能相應則一鼓可以成擒上是其言二年二月疏薦明廢官巡撫張鵬雲苗胙土太僕寺卿王邦柱巡按陳昌言等並下部録用六月陽曲土賊閻汝龍等糾衆刦掠國柱遣逰撃楊㨗率兵往𠞰擒斬汝龍等復𠞰嵐縣土賊髙九英招撫四十餘寨交城賊梁自雨河曲賊李俊等與九英互為犄角國柱亦遣将𠞰平之十月擢宣大總督四年七月調江南江西河南總督五年正月安慶土賊馮洪圖䧟巢縣掠無為州國柱飭按察使王國寳随侍郎鄂屯率兵𠞰撃擒斬洪圖及其黨蒋懋修鍾武等是月江西總兵金聲桓據南昌叛賊将潘永禧突犯徽州國柱遣滿洲駐防官兵進撃賊衆奔潰復祁門黟縣上命征南大将軍譚泰率師討聲桓九江南康饒州以次恢復時偽尚書余應桂據都昌出沒鄱陽湖國柱遣副将楊㨗等随大軍以雲梯攻克都昌城擒應桂斬之復撃敗賊黨鄧雲龍等于武寧十月廣東叛鎮李成棟由南雄犯贛州國柱遣兵與巡撫劉武元等㑹𠞰大敗其衆六年湖廣流賊王定安䧟羅田結連江南英山土賊陳元等謀犯霍山縣國柱遣中軍副将朱運亨撃郤之三尖山檄總兵卜從善𠞰白雲梅家英窠諸寨偽石城王朱統錡糾賊五千餘由金紫寨赴援倚山列陣我兵奮力衝撃斬獲無算連破賊寨擒偽總兵孔文燦偽副将方學達等國柱復自率兵㑹提督巴山張大猷𠞰六安州山賊先圍賊黨侯應龍于将軍寨迎撃賊渠張福寰賊俱敗潰陣斬福寰應龍招降偽總兵王俊偽副将藉維倫等諸賊寨俱燬滅先是明魯王朱以海竄舟山其将吳凱據大蘭山助守國柱奉詔酌籌𠞰撫機宜知寧波貢生方聖時與其僉都嚴我公為舊相識令赴以海處陳說利害我公遂投誠并獻招撫策國柱䕶送京師上遣之齎敕招撫國柱復寓書與凱至是凱偕諸舊将顧竒勲姜君獻陳徳芝等繳敕印来降是年秋江南河南所属州縣有雨雹傷稼者國柱請勅撫按確勘分别蠲卹得㫖嗣後州縣遇有災傷督撫按即察明頃畝分數奏請蠲卹勿泛奏候㫖遲于察勘著為令國柱又疏言江南既改為省南京國子監宜改為江寧府學即其舊址新之仍支學田租銀以供祀事疏下部議從之七年遇恩詔加太子少保九年七月福建賊渠張自盛竄入江西大覺巖國柱檄提督劉光弼㑹閩兵合𠞰陣斬偽總兵李全等自盛就擒十年五月蘇松巡按秦世楨疏請各省州縣賦課徑解布政司以杜勒索侵那諸弊國柱疏言州縣錢糧由府解司所以察核完欠重郡守之責成請于解府之時府但編號記簿無庸拆封換批則勒索那移之弊可絶詔如國柱所請行十一年正月海賊張名振屢犯崇明及劉河吳淞等地國柱増造戰艦募水師遣總兵王璟副将張思達等分兵夾撃敗賊于靖江又敗之于泰興燬賊船賊衆逺竄二月湖廣紅頭賊賴龍等據桂東犯江西國柱與湖廣總督祖澤逺㑹師協𠞰直搗賊巢擒獲賴龍等是年遇察典加太子太保九月以年老致仕康熈三年二月卒賜祭𦵏如例祀江南山西名宦祠宜永貴子思孝孫廷輔宜永貴遼陽人後𨽻正白旗漢軍太宗文皇帝崇徳五年永貴任佐領兼㕘領随睿親王多爾衮圍明錦州以礮攻克涼馬山五里屯馬家湖諸臺六年復圍錦州屢撃敗敵兵松山兵乗夜来犯亦以礮郤之明總督洪承疇兵自松山分據髙橋南三臺永貴攻克其臺斬百餘人七年錦州下鄭親王濟爾哈朗等移師攻取塔山杏山城永貴並用礮撃毁附近各臺及其城叙功予雲騎尉世職八年随鄭親王攻克中後所前屯衛二城晉世職為騎都尉順治元年授兵部理事官二年随豫親王多鐸追𠞰流賊李自成敗賊衆于潼關又從征江南攻取揚州四年考滿加一雲騎尉旋授臨清總兵官六年朝城土賊杜全濮州土賊張文齊等分據臺堡刦掠城邑永貴率逰撃王政純曹如松等㑹集滿洲駐防大兵往朝城搜𠞰斬杜全及賊衆五百餘人随移師濮州賊據土城以鎗礮拒戰我兵奮勇攻克殱賊四百餘人追獲張文齊斬之八年復入為兵部理事官九年擢正白旗漢軍副都統尋授總督倉場侍郎屢遇恩詔晉世職至一等輕車都尉十年七月授南贛巡撫十一年偽都督許勝可等擾瑞金永貴發兵㑹𠞰直搗羅漢岩生擒勝可及其黨數百人斬以徇因疏言羅漢岩地勢險僻往往為盜賊盤踞請移兵駐任田寨就近彈壓十二年調福建巡撫十三年以病癭得㫖允解任代未至海賊鄭成功擁衆數十萬襲䧟閩安鎮及連江縣乗潮駕舸據烏龍江洪塘白沙諸要路阻大兵聲援遂逼犯福州時定逺大将軍世子濟度統師駐漳泉間提督馬得功率福州步騎𠞰賊徳化永春城中守兵僅數十永貴力疾登陴率布政使王顯祚按察使鄭廷魁知府彭六翮駐防佐領焦賛三格等並出原任按察使周亮工等于獄集厮役及民間丁壯數百人分門固守令有馬者伏城外截撃士卒數易衣幟更畨出戰賊謂我兵甚衆戰輙退乆之悉衆来犯既竪梯我兵奮力禦撃傷賊甚衆城垣屢為賊穿穴且毁應時堵塞完固當賊之甫逼城也永貴以蠟書招馬得功為賊所阻踰月乃達得功由永福縣山路還援而大軍之在漳泉者亦至于是内外合撃斬賊萬餘人溺死者無算危城得全既受代永貴乃還京十六年起為安徽巡撫十八年四月以疾解任康熙四年復以年老辭世職乃予其孫廷輔襲六年十一月卒賜祭塟如例子思孝任正白旗漢軍副都統十年疏請追叙永貴福州全城功予騎都尉世職合前所得一等輕車都尉為三等男思孝既卒仍以廷輔襲十九年廷輔任㕘領随征南大将軍賚塔討逆賊吴世璠由廣西進師撃敗偽将軍何繼祖等于黄草壩二十年三月圍雲南城賊将胡國炳等率衆萬餘出城拒戰廷輔率兵撃敗之賊平還京二十二年卒二十五年追敘雲南軍功晉二等男子兆熊有傳沈永忠從子瑞沈永忠續順公沈志祥兄子崇徳初志祥以明皮島副将挈部衆来降𨽻漢軍正白旗永忠授爵至三等男順治六年志祥卒無子永忠襲續順公爵是年十月命率領部衆駐濟南協同巡撫夏玉𠞰除土賊七年二月授𠞰撫湖南将軍時李自成餘黨郝摇旗牛萬才馬進忠等降于明桂王朱由榔永忠奉詔移駐寳慶令總兵許天寵張國柱郝效忠等禦撃馬進忠于靖州進𠞰郝摇旗于黎平皆奏㨗復屢挫牛萬才兵萬才納欵復降其總兵曹應元副将劉芳節及從官二百餘員兵民萬餘九年四月由榔将李定國白文選等䧟沅州武岡永忠在寳慶聞警告急于定南王孔有徳有徳發兵赴援永忠不及待退保湘潭七月遣兵禦賊永州聞桂林已䧟乃撤兵還長沙旋移駐岳州㑹敬謹親王尼堪奉詔率兵至永忠請随征自効王令居後策應十一月白文選䧟辰州總兵徐勇死之敬謹親王亦戰歿永忠具疏請罪十年上遣大學士洪承疇經畧軍務以永忠疏下承疇核議承疇言武岡甫䧟時永忠倡率竄遁致寳慶復為賊據湖南士民至今嗟怨若仍任防𠞰衆心已離軍威難振請令率舊部漢軍還京其随征總兵許天寵張國柱等及新将兵衆雖皆敗奔猶可兾收後效仍留湖南以資戰守上從之十一年給事中魏裔介劾永忠貽悮封疆請治罪定南王女四貞疏述其父殉難事謂因永忠告急分桂林兵以援之永忠既棄寳慶又弗牒知援軍還守要隘致桂林被䧟疏並下王貝勒大臣議應斬念其随志祥投誠有功請免死削爵詔如議以其從弟永興襲公爵㕘領宋文科等因永興甫三嵗請以百八十甲仍屬永忠自備器械馬匹供調遣並請量授官職得㫖予永忠子爵虚銜㑹都統郎賽奉命駐防福建檄永興部衆随往永忠疏請自効遂代永興率所部赴福建十五年永忠疏劾㕘領馬進功贓欵進功亦訐永忠侵尅軍饟事下都統巡撫㑹鞫以永忠擅支軍鑲覆奏部議革銜罷任上以永忠雖擅支與侵欺者有間飭再議改罰嵗俸降銜為男爵十七年授協鎮廣東将軍永忠疏言臣自奉命駐閩連年征𠞰臣弟永明臣子珺㕘将張彦洪俱陣亡今移鎮要地助理需人請以隨征之都督同知牛萬才偕往尋萬才以不願𨽻永忠部下訴于總督李率泰並訐永忠貪虐状率泰奏入命靖南王耿繼茂覆核謂萬才所訐無據永忠馭之近刻是以不願從行乃革萬才職留閩効力康熈元年裁肇慶總兵官即以永忠駐肇慶三年碣石總兵蘇利叛永忠率兵隨平南王尚可喜𠞰滅之四年永忠以年老乞休部議令永興代領部衆駐潮州九年永忠卒尋永興亦卒並賜祭塟如例以永興兄子瑞襲爵仍駐潮州十三年逆藩耿精忠據福建反潮州總兵劉進忠叛應之脅瑞從逆瑞年甫十三與部下副都統張夢吉鄧廣明㕘領蘇雲龍徐彦龍佐領于國璉等謀拒之遣使赴廣州告急先集兵撃賊巷戰三日進忠引賊黨入城刦掠殺國璉驅瑞及家屬入閩行至詔安聞可喜援兵至程鄉仍還潮州未㡬進忠復逼廣明部衆擁瑞赴漳浦羈留之夢吉乃收其部兵之半歸廣州㑹海賊鄭錦侵據内地瑞居漳浦聲援阻絶錦遂擕之至臺灣强授偽爵結婚姻十七年康親王傑書請削瑞公爵其廣州舊部分徙于山西諸省上念瑞及部衆素無叛志詔置勿論二十年大兵平福建将征臺灣瑞宻遣人迎大兵約為内應賊将朱友覺之瑞與從兄珽及家屬並遇害大兵既取臺灣提督施琅入告下部議卹仍予世襲續順公以瑞從子熊昭襲徐大貴徐大貴漢軍正白旗人太宗文皇帝時任佐領兼工部理事官崇徳五年随大兵圍錦州屢撃敗松山杏山敵兵是時明總督洪承疇駐兵松山遣兵分據髙橋南三臺大貴先衆攻克之既而敵兵千餘乗夜犯我營大貴率衆禦撃斬二十餘級七年攻克塔山杏山二城並有功予雲騎尉世職八年随鄭親王濟爾哈朗征明寧逺取中後所前屯衛二城晉世職為騎都尉順治元年正月擢正白旗漢軍副都統七月從征山西取太原府追𠞰流賊李自成部衆入陜西境賊衆自延安城内突出大貴領所部奮撃大敗之二年随豫親王多鐸平定河南江南叙功晉三等輕車都尉三年遷刑部侍郎仍兼副都統七年任駐防杭州左翼副都統九年八月随平南将軍金礪移師福建𠞰海賊時賊酋鄭成功據海澄以衆二十餘萬㓂漳州大貴與金礪督兵進撃殱賊三萬進攻海澄賊十萬餘扼隘拒戰且欲刦我紅衣礮大貴撃郤之連破賊壘先是三遇恩詔晉世職至一等輕車都尉加一雲騎尉十二年敘撃敗海賊功晉爵三等男十三年随寧海大将軍伊爾徳征舟山偽總制陳六御偽英毅伯阮思等率三萬衆戰艦二百餘迎犯我軍大貴統左翼軍撃敗之獲船二十有六軍械鎗礮無算賊棄舟山遁十四年引疾乞休命加太子少保致仕尋叙復舟山功晉爵二等男康熙十八年十一月卒賜祭塟如例諡勤果以其孫永泰襲爵子治都别有傳蔡士英蔡士英漢軍正白旗人初為明守備太宗文皇帝崇徳七年鄭親王濟爾哈朗征明克錦州士英随明總兵祖大夀来降順治元年二月叙録降将授佐領尋署㕘領六月随都統石廷柱征山東遇饒陽土賊掃地王康玉環擁衆萬餘阻道𠞰平之擒斬玉環尋随都統葉臣招撫山西以紅衣礮攻太原府敗偽伯陳永福兵二年随英親王阿濟格征陕西撃敗流賊于延安府城下随貝勒博洛征浙江進定福建五年授都察院左僉都御史遷副都御史六年任正白旗漢軍副都統随巽親王滿達海征叛鎮姜瓖復朔州及汾州府城九年四月授江西巡撫時廣西土賊楊文等集浙閩流亡據九仙山肆掠旁邑袁州吉安土賊劉京李文斌受明桂王朱由榔侯爵糾衆䧟安福永新諸縣士英至與提督劉光弼㑹商援𠞰遣逰撃岑應元等率師撃敗賊衆復安福永新李文斌劉京先後擒斬遂遣㕘将陳陞等㑹同浙江官兵攻破九仙山賊寨楊文中礮死降其弟楊富等餘衆並受撫又偽總兵霍武結連福建逆㓂周立滋擾江西偽都督曹志攀偽總兵汪文生先後糾賊犯饒州廣信士英檄兵征𠞰復遣湖東道安煥通判張羽明等諭降之先是江西巡撫夏一鶚請豁荒田税糧部議令覆加察核至是士英疏言江右連年兵燹加以天災流行死亡相枕腴産抛荒前撫臣夏一鶚疏報全省荒數及今覆察為數較多前此因地為賊據今始恢復或民徙他鄉今始歸来有闔門遭戮開報無人者又有誤聴訛傳恐報荒即作官田者竟有未報之數臣思有荒而不除除之而不盡非所以廣布皇仁今十三郡所屬尚多㓂盜良民甘心相從正以今日歸来明日即追徵荒逋故寧從賊而不悔耳且貪官汙吏因荒熟未分始則借荒為口寔繼則縁荒而作奸牽混不清窮民徒受催科之苦究無補于國用朝廷亦何樂有紙上之虚數哉惟除荒一舉不過減有名無實之賦額自此按冊而徵無所託詞再督勸開墾遵例起科數年之後可以仍完原額臣委官遍行踏勘通省荒蕪確數實十萬七千五百餘頃較前撫臣所報多二萬五千六十七畝有竒伏乞恩准豁除庶國計民生兩有攸賴疏入得㫖允行又江西右布政使荘應㑹奏袁州瑞州二府科糧獨重請減浮額下士英確勘疏言袁瑞多山素稱瘠土自陳友諒竊據時因饟絀借徵明洪武初奸民黎伯安抱冊以獻沿襲不改較元至治間額徵浮倍視臨江吉安等府亦輕重懸殊應減從原額每畝九升三合起科以蘇積困奉㫖浮糧積乆重困一方應從原額減免毋踵弊混徵士英又因工部議令察勘廣信府之封景山可否採木疏言封景山初名銅塘因其峭險屢為盜藪削平之後即封禁故亦稱封禁山唐代黄巢倡亂其黨藉為窟穴流毒一方明嘉靖間奸民葉宗留賃居燒炭遂謀為不軌鄧茂七為之附援三省摇動㡬危信州邇為山賊楊文竊踞寧謐未乆恐啟奸謀請敇禁開採詔從之十二年擢漕運總督明年疏言舊例本省丁船協運他省糧務未免稽延請改撥就近官丁領兑又言海州先遭兵火致多無主荒田已入新墾冊報原額正供錢糧無憑徵解請㫖豁除並刋正賦役全書以示乆逺事皆下部議行十四年因病解任十六年病痊復授漕運總督先是順治二年設鳳陽巡撫駐泰州六年因標兵調赴廣西裁巡撫歸漕運總督管理至是士英以海防漕務勢難兼理請仍舊制于是復設鳳陽巡撫士英耑理漕務十八年以疾致仕康熙十三年正月卒賜祭塟如典禮諡襄敏祀江西名宦淮安士民亦建祠祀之四十四年聖祖仁皇帝南巡過淮安御書奏績東南以額其祠子毓榮别有傳于時躍于時躍廣寧人𨽻正白旗漢軍順治二年以生員授合肥令尋遷懐慶府知府四年擢分守河南道值靈寳盧氏二縣土賊劉芳張進澤張三桂等嘯聚剽掠時躍同副将㓂徽音逰撃孔國養入山搜𠞰連破賊寨馘其渠餘黨盡平七年遷陜西按察使九年擢山西布政使尋以陜西藍田縣知縣楊行健為巡按髙爾位劾罷時躍坐薦舉失當部議降二級經畧洪承疇薦其才得㫖赴軍前効用十一年又以承疇請補湖廣驛鹽道十二年正月超擢廣西巡撫時流賊張獻忠餘黨孫可望李定國等降附明桂王朱由榔據貴州雲南十二月明裔朱盛濃偕其弟盛添聚衆富川勾連土賊王心蒋乾相等及猺獞肆行刦掠時躍㑹提督線國安總兵全節等進𠞰陣擒盛濃盛添斬賊無算寨悉平十三年由榔将義寧伯龍韜據栁州結可望為㓂時躍宻移提督線國安定南王䕶衛李茹春與投誠總兵温如珍等㑹𠞰陣斬韜其餘衆皆潰遁十四年冬可望與定國相攻不勝率所部来降定國随朱由榔竄入雲南詔大兵由湖南四川廣西三路分進時躍疏言廣西大兵由栁州慶逺進發則賓州逼近南寧太平宜設重兵防守而栁州亦宜屯兵以策應疏下所司議行時朱由榔之餘将尚擁衆㓂掠鬱林則李勝李喬華懐集則何奎豹李盛功富川賀縣則馬寳梁忠南寧太平則賀九義曹友並據險為巢侵犯城邑獞賊羅法達廖仁倫等復掠臨桂永福荔浦修仁等縣時躍親督将弁𠞰撫所䧟城邑次第克復十七年叙功加都察院副都御史十八年擢廣西總督偽徳陽王朱至濬竄入安南時躍遣守備袁文舉夏仲英至安南招撫至濬率衆投誠叙功加時躍右都御史康熙二年十月卒于官賜祭塟如例祀廣西名宦祠趙祥星趙祥星漢軍正白旗人順治五年由貢生授山西趙城縣知縣再任直𨽻任縣十三年十一月行取奉㫖以御史用十四年補福建道監察御史巡視中城十五年二月命巡察㑹試外塲疏言考試第一場以四書文為重乞皇上欽定三題宻封發内簾其餘諸題仍令考官照舊擬出庶關節難通弊端盡塞部議從之十月巡按湖南十六年八月疏言衡陽等州縣衛自順治十一年至十五年一切透支挪移欵項造冊咨部覆核應即嚴追其現存倉庫銀米責令起解庶官吏知儆軍需有賴十一月疏言寳慶府之武岡州與靖州之綏寧通道二縣皆山多嶺險地近猺苗現在汛防乏人請于中右兩路或寳慶協及沅州鎮標撥兵分防實未雨綢繆之急務均下所司議行十七年七月差滿考核計清釐挪移等項銀四萬八千餘兩墾荒田三千九十餘頃奉㫖趙祥星准回道管事十月掌山東道監察御史十八年二月疏言輦轂下綱紀肅清而棍徒招摇生事應責司坊官挨户稽查並設循環簿朔望赴五城御史查騐以杜奸宄得㫖京城重大之地惡棍挾詐官民肆行擾害殊属可惡以後實係光棍俱照强盜例治罪餘如所奏康熙元年正月疏言江南省上江下江學道二員湖廣省湖北湖南學道二員應裁併歸一部議如所請是年巡視兩浙鹽政二年八月任滿回京授工科給事中洊遷順天府府丞十二年六月遷通政司右通政八月轉左通政尋遷大理寺卿十一月擢山東巡撫時軍興需費祥星以暫裁通省存留支給等銀二十餘萬兩充餉先後具奏均奉㫖嘉奨議授為兵部右侍郎祥星又清釐山東隠漏地畝四萬一千餘頃照例起科議授兵部尚書晉正一品銜俱仍留巡撫任十七年五月署山東提督十八年正月疏言去嵗雨澤愆期秋成歉薄除現在賑濟外請将常平倉榖贖鍰動支接賑得㫖允之三月自陳議以不謹應革職奉㫖趙祥星着革職仍留原任七月上諭應行應革事宜着部院科道及各督撫條奏吏科給事中李宗孔等疏㕘祥星已經議革仍留原任豈能頓改前非請即予處分奉㫖着解任三十二年六月卒孫思克孫思克漢軍正白旗人三等男孫得功次子初任王府䕶衛順治八年二月管佐領六月授刑部理事官十一年六月遷㕘領十三年考滿廕一子入監尋随大軍由湖南進征貴州雲南屢立戰功康熙二年正月擢甘肅總兵官五年三月同提督張勇疏言厄魯特蒙古僻處海隅雖通西蔵亦荒徼絶塞非有肥饒地土資生朝廷曲示招徠准開市口貿易且以境内數十萬之番族令每年輸納駝馬牛羊與彼為厄魯特䝉古者理應感戴皇仁鈐束部落各安邉境乃墨爾根台吉等狼心不改鷹眼未化蟻聚蜂屯于祁連山上縱牧内地之大草灘去冬不遵撫諭抗拒于定羌廟為官兵撃退稍挫其鋒猶不悛改狂肆愈盛聲言糾合部落三道分肥一入河州臨洮鞏昌一逼西寧一犯涼州狡謀叵測宜迅速創懲方可議修築而嚴固守得㫖下廷臣宻議以兵端不可輕動令嚴防邉境仍撫恤畨人以和其心于是思克偕張勇修築邉牆自扁都口西水關至嘉峪關六年八月内地住牧黄城兒大草灘之厄魯特䝉古盡數徙去思克至南山各隘相度衝險撥兵固禦總督盧崇峻疏聞下部知之十三年六月諭奨効力邉疆有年下部議加銜右都督是冬平凉提督王輔臣叛應吳三桂臨鞏諸郡相繼從逆蘭州危急思克遣逰撃劉衍等移兵協防自統兵進次苦水㑹蘭州失守乃駐河西尋回凉州十四年五月疏言前因督臣哈占定議南北兩路兵同時進𠞰将軍張勇總兵王進寳等從金城關渡河規復蘭州臣自凉州領標兵由阿壩紅水蘆塘索橋人跡不到之草地結筏渡河規復靖逺一路幸賴天威遐播靖逺周圍三百里城堡皆已納欵正擬趨固原㑹大兵于平凉不料西海蒙古墨爾根台吉等已從山口入内地與官兵拒敵副将陳達陣亡臣留㕘将劉選勝等守靖逺由草地渡河回涼以保河西根本重地墨爾根台吉引衆出口而甘州所属之髙臺與紅崖梨園等堡有黄畨頭目入口刼掠合數千餘騎攻圍暖泉順徳諸堡臣即自凉赴甘畨族乃逺竄因将軍張勇約期㑹𠞰王輔臣復渡河而東由草地往来兵丁勞苦十倍他鎮乞恩加犒賞得㫖往来防𠞰具見忠藎兵丁各加犒賞閏五月同張勇等圍鞏昌時定西大将軍貝勒洞鄂圍秦州城中賊屢出犯其逆黨自四川至者結寨秦州南山上益猖獗洞鄂檄思克率兵二千駐秦州西賊勢乃窘偽總兵陳萬策偽道馬肇升赴思克營乞降偽總兵巴三綱遁遂復秦州南山賊潰竄思克同振武将軍佛尼勒等追撃于閻闗敗之乗勝克禮縣復敗賊于西和奪門入斬偽官三十清水伏羌等縣皆復仍赴鞏昌㑹𠞰遣降将陳萬策等入城曉諭偽道陳台孫總兵陳可等以鞏昌十七州縣降河東悉定八月㑹𠞰平涼思克由静寧隆徳進撃走賊将李國樑陣斬賊兵五百餘生擒偽守備一千總二復静寧州進次華亭偽副将髙鼎率将弁二十八兵千餘迎降遂抵平凉與大軍合十五年三月貝勒洞鄂奏言大軍圍平凉半載賊屢出犯思克標兵徒步當先敗賊于南山者四敗偽總兵蔡元于城北者四又九處設伏敗賊于南門賊别将来襲掘壕軍思克揮兵急撃賊退復逼者三俱敗之𠞰涇州白起寨偽将李茂思克先至寨下遣領旗李錦先登擒李茂斬賊數十又敗賊于南山甲子峪及馬營子麻布嶺宜酌示鼓勵紀功叙錄五月随撫逺大将軍圖海破賊于虎山墩王輔臣窮蹙乞降思克還凉州八月諭部臣曰自逆賊變亂以来奸徒附和侵擾地方大兵未集人心不無動摇張勇王進寳孫思克一聞蘭州之變即率兵𠞰殺賊衆收復城邑其功甚大及大兵攻取平凉復同心協力展布謀猷兼以訓練士卒忠義素孚故能身先行陣所向克㨗朕甚嘉之于軍功議叙之外應從優加恩孫思克陞為涼州提督並授一等輕車都尉世職十月疏言全秦底定仰仗天威臣何功可録䝉皇上溢格優陞復授世職臣即粉身碎骨萬不敢辭今嵗虎山墩之戰随大将軍圖海相度地形并偵通固原路徑賊伏兵萬餘猝起来犯臣率領隊兵奮戰追撃十餘里雖敗賊衆而賊刀斫臣右臂傷筋及骨迄今五閱月已成殘疾乞解任回旗得㫖卿乆鎮巖疆𠞰除賊㓂奮勇克敵屢建戰功新簡提督正資料理不必求罷十六年四月彚叙前後軍功晉三等男時噶爾丹侵西北諸䝉古其濟農等為所敗突入邉塞擾居民思克同張勇以兵逐之乃徙去十八年七月上敕圖海調思克與提督趙良棟等𠞰賊漢中興安圖海奏九月初旬四路進發思克與将軍畢力克圖由畧陽進㑹有詔因京師地震令内外大臣各抒所見思克疏言漢中興安皆重山疊嶺勢險路紆逆賊盤踞有年又刨斷各路要口我兵未能長驅直入賊兵爬山越嶺如履平地稔知小路曲徑潛躡我後以絶餉道為害滋甚大将軍圖海定議四路進兵雖分賊勢終憂兵单緑旗兵毎人止有一馬常需䭾載甲胄器械馬料不足嬴瘦甚多步兵背負棉甲乾糧不皆强壮惟滿洲勁旅堪恃第為數亦無多若各路調取又恐秦省三邉地逼畨夷秋髙馬肥乗機思逞不若今秋暫緩進兵揀選各營强壮飼秣馬匹俟来春二三月間塞外草尚未生水泉尚涸畨夷不敢内犯之時多調邉兵以資戰守秦地大半皆山土瘠民貧不産秔稻所種惟麥豆之屬向有捐納一項稍禆軍需今已停止専事採買用民負載䭾運雇賃之價數倍於應輸之賦各路需餉甚多山逕狹隘輓運維艱或照向年捐例轉輸協濟亦宜緩期熟計俾士馬得以飽騰况八旗出征官兵聞京師地震傾壊房屋壓斃人口各有内顧之憂俟来春人心稍定兵糧俱足再議進兵未晚疏入上命學士拉薩禮至凉州宣諭詰問曰陜西緑旗兵較之各省曏推精鋭賊能跋涉山嶺我兵何獨不能漢中興安久為内地滿漢大兵經行熟悉孫思克何得視同絶域荒誕其辭凡将帥用兵前為衝鋒後顧餉道自有一定機宜倘以賊潛斷餉道為憂怯懦不前則永無破賊之日矣各省緑旗兵皆止給一馬越境征𠞰粤東粤西閩楚諸處今又進定滇黔較之平定境内漢興勞逸何如耶凡将軍提鎮募兵時必選精壮毋得濫收充數定例嚴明如果兵非强壮難以應用則孫思克平日所司何事滿洲兵在陜西者亦不少且有大将軍圖海籌畫周詳何得妄稱单弱正值秋成凉爽各處賊㓂大敗震驚之餘不速行平蕩反欲扵来春青黄不接之時進取設或二三月間進取之後四五月間畨夷馬肥思逞又将若之何粤東粤西山嶺亦多何曽豫備糧餉官兵豈有止食稻米不食他粟之理陜西數年以来未曽勞民轉運漢興雖多險阻非隔省可比今恐輓運累民来春又誰為輓運耶當逆賊敗遁之時急令進兵者正為早定地方以安百姓耳今以輓運維艱請開事例為詞其規避進兵明甚八旗官兵世受渥恩不特房屋傾圮無足重輕即赴湯蹈火誼亦難辭何得妄言人情憂慮孫思克封疆大臣前者陜西境内淪䧟即應議處念同大軍進𠞰宥過計功加不次之擢給世襲之官當捐軀報國自請破賊安疆乃身任提督統轄全師不思奮力前進反煽惑人心飾辭妄奏深負朕恩速行詰取供詞思克乃自引罪拉薩禮還奏得㫖俟事平日再議十一月思克與畢力克圖撃敗賊衆扵階州文縣成縣進駐沔縣詔思克還涼州尋以總督哈占請移駐荘浪防守河東河西二十年三月慶陽賊渠耿飛倡亂糾叛畨達爾嘉濟農等犯河州思克與張勇𠞰平之二十二年四月追論前奏緩進兵罪革三等男爵及提督仍留總兵任二十三年六月遷甘肅提督二十八年三月北套生畨犯内地掠錫喇偉古爾畨族思克遣兵截阻斬獲甚衆二十九年十一月出使西域之學士達瑚郎中桑格歸至嘉峪關外為西海阿竒羅卜蔵所刼思克聞報即遣逰撃朱應祥計賺其宰桑質扵關内始反我使臣别遣副将潘育龍逰撃韓成等搗其巢穴斬馘四百餘阿竒羅卜蔵遁復遣人赴西海詰問各台吉責償所掠物各台吉懼罄阿竒羅卜蔵所有以償思克奏請免其窮治諭嘉盡心籌畫區處合宜如所請行三十年二月疏言肅州協去甘州五百里去凉州一千里極邉之地外逼西海北套哈宻諸部内則畨族插帳與民雜處噶爾丹巢穴離邉月餘程其姪策妄阿喇布坦現在西套住牧雖叔姪為讎恐将来復合有侵奪西海之舉嘉峪闗外係其必由之路所設副将威望不尊兵馬不滿一千不足以資控禦調兵接應緩不濟急不可不作先事未然之防請設總兵一員兵三千以固邉圉庶可漸消窺伺又甘肅地瘠民貧一切布種收穫與腹地迥别一年一收縱遇豐年輸将國賦之外僅瞻八口並無葢蔵本地兵馬糧料不敷供支莭年折價已苦無處糴買萬一徴調雲屯何以接濟宜扵河西要地屯積糧草以備戰守但本地無糧可買輓運又恐勞民惟捐輸是賴而本地富庶之家有限請無論本省别省官民一例捐納加級紀録職監俟邉儲稍充即行停止下九卿議從之三十一年三月加太子少保予騎都尉世職五月疏報遣總兵潘育龍等追来降復叛之畨衆于庫列圖嶺擒之請将叛首竒齊克正法宥其從人妻子解京上免竒齊克死令安插内地十一月乞休優㫖慰留加振武将軍銜三十二年二月命内大臣郎坦領京營兵至寧夏同思克駐防即以思克為㕘賛探噶爾丹聲息三十三年正月疏報巴圖爾額爾克濟農之弟博濟扵三十年間叛逃復帶部落窺邉經臣遣兵同總兵柯彩撃敗自其兄蒙恩安插賀蘭山并以博濟被獲人口發往收養後頗知自悔前罪兹特率所屬男婦百餘来投詔與巴圖爾額爾克濟農同住牧三十五年二月上親征噶爾丹由中路命撫逺大将軍費揚古由西路進思克率陜西兵出寧夏至翁金與費揚古兵㑹五月上駐蹕克嚕倫河噶爾丹聞駕親臨倉皇遁去費揚古邀撃之昭莫多令思克率緑旗兵居中與東西二軍并力迎撃斬獲無算追逐三十餘里噶爾丹引數騎逺竄㨗奏至奉諭褒奨召赴京命侍衛迎勞賜袍褂帽靴等物並御製詩箑有鷹揚資逺畧宿望在西陲之句入覲暢春園賜御書綏懐堂額及端罩四團龍補服孔雀翎朝帽朝衣朝珠鞍馬並給随帶官兵糧料命赴肅州駐兵探噶爾丹往哈宻聲息三十七年叙昭莫多戰功加給雲騎尉三十九年二月以病乞休遣御醫及兵部官往視仍命留任調養是月卒詔從優議卹贈太子太保賜祭𦵏諡襄武七月櫬還命皇長子前往奠醊賜鞍馬二銀千兩諭廷臣曰聞孫思克䘮回時自甘州至潼闗沿途軍民無不號泣相送若平昔居官不善何以得此誠可謂将軍矣復諭兵部曰孫思克謀勇素裕居官甚優久鎮巖疆允稱良将給還前所革世職部議并為一等男加一雲騎尉以其子承運襲雍正十年入祀賢良祠乾隆三十二年以思克當吳三桂反叛及噶爾丹犯邉時懋著勞績其一等男爵詔予世襲㒺替欽定八旗通志卷一百九十六
