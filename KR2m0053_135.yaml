body:
  text: 欽定四庫全書欽定八旗通志卷一百二十一人物志志書之有人物蓋自漢晉以來矣襄陽耆舊汝南先賢其記載之權輿乎唐宋至今凡一郡一邑之志洎夫天下之通志無不搜羅史籍探索金石以表章懿淑垂軌將來亦敦崇世教風勵人心之義也我國家龍興東土奄有埏紘貞元會其昌期斯川嶽鍾其靈氣風雲龍虎英哲輩生炳炳然與虞臣周佐爭光者蓋不可以殫數列聖相承教養培植百有餘載我皇上撫臨函夏益鞠益謀四極四合罔不率迪而八旗根本之地沐浴聖化觀感尤深故髙門巨閥詠駿烈誦清芬者尤繩繩繼起此人物一志所以視往古為盛也然厯朝輿記泛濫者多即八旗舊志但據碑志之文者亦或不免亦既仰請睿裁一以國史列傳為凖誠足以信今傳後昭袞鉞之至公惟是國史之例義兼彰疸故美惡並存志書之例則遐稽古籍並以揚善為宗茍斷限不嚴則體裁為舛今敬擬宗室王公以及內外文武大臣惟以功名終始者得入此編或先麗刑書後蒙天鑒宗室如睿親王大臣如鰲拜等亦得並入若其初年黽勉得荷恩榮末路昏迷自羅罪譴雖有功績均不敢濫收又八旗漢軍如范文程之生原豐邑功比鄼侯自宜垂光於竹帛其他勝國舊臣倒戈順命如洪承疇等雖勤勞茂著顯秩酬庸然我八旗滿洲中應天佐運百戰開疆勳業逺出其上者史不勝載實不借楚材晉用以焜耀旗常况我皇上大公至正扶植綱常甄别二臣各為列傳一筆一削義秉春秋其人既瑜不掩瑕尤未可列為臣範其或家承帶礪延及子孫果有挺出之才仍一體登諸簡牘庶一奪一豫均得其平至於宗室襲封諸臣世爵國史之例子孫各附其祖父以著淵源今志人物則必其卓有樹立無忝家聲乃得列為附傳若世澤相承並無事迹及雖有事迹而未為特出者其世系支派則詳載於封爵世職二表兹不復贅焉人物志一宗室王公傳一之上和碩禮烈親王代善案和碩康良親王傑書謹宗室諸傳先列親王而郡王貝勒等以次遞及故不敘世代然每一親王下各有子孫表著者宜連屬比附以便覽觀則又難劃然序爵也兹敬以傳之一載禮烈親王及其子孫傳之二載鄭獻親王及其子孫傳之三載睿忠親王傳之四載豫通親王傳之五載肅武親王傳之六載承澤親王敬謹親王傳之七載追封親王者饒餘郡王是也傳之八亦追封親王者靖定貝勒是也傳之九載原封親王者英親王是也蓋首卷至此皆親王而中間各以子孫分附焉至傳之十乃載誠毅貝勒篤義貝勒安平貝勒等傳之十一載原封貝勒阿敏等略傳之十二載鎮國公阿拜至鎮國將軍洛託大序爵之中仍各彚其派係庶披覽之際有條緒可尋云和碩禮烈親王代善子滿達海代善太祖髙皇帝次子初從征哈達輝發葉赫等國論功封貝勒丁未年以東海瓦爾喀斐悠城人苦烏拉國貝勒布占泰之虐乞移家歸附代善與兄禇英隨貝勒舒爾哈齊及一等大臣費英東侍衛扈爾漢率兵三千往徙之軍夜行見大纛上有光衆以為異捫視無有復樹之光如初舒爾哈齊疑非吉兆欲回兵代善與禇英並決意進兵遂至斐悠城盡收環城屯寨凡五百户令扈爾漢率兵三百衛之先行布占泰發兵萬人邀諸路次日代善與諸貝勒至率兵奮禦遂渡河代善與禇英各率兵五百分二路緣山擊之烏拉兵遂敗代善追及烏拉統兵貝勒博克多從馬上左手攫其胄而斬之上嘉其功賜號古英巴圖魯癸丑年正月布占泰背盟代善隨上統大兵征之既攻克遜扎塔郭多鄂謨三城布占泰率兵三萬越富勒哈城而軍時領兵諸貝勒大臣皆欲戰上曰征伐大國豈能遽使無孑遺乎代善曰所慮者無計令布占泰出城耳今彼兵既在平原曠野可一鼓擒也舍此不戰厲兵秣馬何為今我兵士飽馬騰列陳在此當決戰上曰爾等衆志既孚即決戰可也時諸貝勒大臣及軍士皆踴躍遂進兵烏拉兵大敗十損六七餘皆棄兵甲遁我兵乘勢奪門遂克其城布占泰率敗兵不滿百回至城下見城陴悉樹我軍旗幟大驚潰代善復統兵截擊之布占泰僅以身免竄葉赫所屬城邑皆降編户萬家天命元年上初正大號敘羣臣功封和碩大貝勒四人以代善為首三年四月上以七大恨告天興師征明行二日雨欲旋師代善言天降此雨以懈明將之心吾進兵乃出其不意上善之遂進圍撫順明逰擊李永芳以城降東州瑪哈丹二城及臺保五百餘皆下携降衆還既出明邉二十里明總兵張承廕等率萬人來追代善同四貝勒返戰上遣使止之代善奏曰彼若待我我則與戰若不待是必走矣當乘勢追襲無使我兵寂然歸致謂我怯也上然之亦移師入邉破其三營斬承廕及副將頗廷相恭將蒲世芳逰擊梁汝貴等四年三月明大發兵四路來侵上親禦西路命代善前行偵者告明兵六萬出清河代善曰清河道仄﨑嶇未能驟至當先禦撫順乃與扈爾漢先出扎喀關方謀設伏待敵會四貝勒至謂界藩有築城夫役宜急衛之遂直趨界藩據吉林崖時明總兵杜松結營薩爾滸山而自引兵圍吉林崖衆貝勒遂分兵千助吉林軍上至命先攻薩爾滸山我兵仰射奮擊破之適所遣助吉林崖軍亦乘勝合擊大敗明兵斬杜松及總兵王宣趙夢麟等而明總兵馬林復夜營尚間崖代善以三百騎往視遣使馳報上親臨明兵四萬已成陳代善䇿馬先入衆貝勒繼之明兵敗潰斬副將麻岩林僅以身免代善復與四貝勒統兵敗明總兵劉綎兵四萬於阿布達哩岡綎歿於陳旋收降朝鮮助明之將士而還七月從上攻鐵嶺城敗助明之蒙古兵八月從上平定葉赫六年三月上親征明瀋陽既敗明總兵李秉誠等代善偕其子台吉嶽託追四十里斬馘無算七月鎮江城中軍陳良䇿與居民潛通明將毛文龍令别堡之民詐稱兵至大呼噪城中驚擾良䇿乘亂執城守遊擊佟養正殺其子豐年并從者六十人叛投毛文龍上聞之命代善同莽古爾泰率兵三千遷金州沿海居民於復州十一年八月太祖龍馭上賔代善及子嶽託薩哈璘共作議書詣朝以書示大貝勒阿敏等言推戴太宗文皇帝嗣統衆皆喜上讓至再三代善言益懇切衆議亦堅乃從之十月命率精兵萬人往征蒙古喀爾喀扎嚕特部執貝勒巴克父子三人及貝勒拉什希布岱青多爾濟桑阿爾齋等十四人殺鄂爾齋圖貝勒俘其屬户還天聰元年五月奉命與貝勒阿敏碩託率正紅鑲紅鑲藍三旗兵征明攻錦州薄寧逺城殪殺無算因溽暑班師三年十一月上親征明入洪山口克遵化趨京城北土城關之東駐營明大同總兵滿桂宣府總兵侯世祿以兵來援至德勝門代善領兵進擊敗之追至隘口掩殺甚衆十二月攻克良鄉還破敵永定門南遂隨上率護軍炮手五百往視薊州形勢代善先發會明山海關步兵五千來援薊州距城二里許與我兵遇敵兵不敢入城遂立營環立車盾鎗炮代善麾左翼四旗護軍攻其東破之四年二月明兵部侍郎劉之綸率兵至遵化踞山營代善率八旗護軍兵攻之圍其山招之綸降不從遂縱兵攻破其七營之綸遁巖中我兵射殪之擒遊擊守備各一五年七月從上圍大凌河城正紅旗兵圍西北代善軍為䇿應時城外守臺明兵害我逰牧十人掠駝馬去代善與貝勒濟爾哈朗等率兵三千以紅衣炮攻其臺焚近臺房屋百餘間獲駝馬數十留兵守之九月明監軍道張春總兵吳襄等率兵四萬自錦州來援距城十五里代善隨上率滿洲蒙古舊漢兵約二萬迎擊之敵馬步兵合營四面列大小炮及鳥鎗我右翼兵衝入敗之襄及其副將桑阿爾齋遁春復收潰卒而軍乘西風縱火逼我營甚急會天雨反風燬敵營我兵合攻之陳斬副將張吉甫等生擒春及副將張洪謨楊華徴薛大湖等時被擒各官見上皆跪拜獨春不跪上欲誅之代善曰我兵前此陳獲之人無不收養此人𣣔以死成名奈何殺之以遂其志遂赦之八年五月隨上率兵征明出榆林口至宣府境率兩紅旗及蒙古兵自喀喇鄂博入攻德勝保殱其衆明城守恭將李全自縊死保民皆潰逃進攻大同懷仁縣未克遂由朔州趨馬邑八月上親攻大同代善率兵來會獻俘獲還十年四月上建國號大清改元崇德大封功臣晉代善和碩兄禮親王十二月從上征朝鮮受其國王李倧降以歸八年八月世祖章皇帝嗣位王與鄭親王濟爾哈朗睿親王多爾衮同輔政時郡王阿達禮貝子碩託謀立睿王多爾衮禮親王代善發其謀阿達禮碩托伏誅碩託代善第二子阿達禮則其孫也衆咸謂王大義滅親比烈周公云順治五年十月薨年六十有六以第七子滿達海襲親王爵賜號曰巽是年定賜祭葬銀例親王應五千兩奉旨特賜銀萬兩六年十月立墓碑紀功康熙十年五月上特表王功績追諡曰烈復立碑表墓子八人長子克勤郡王嶽託第三子頴親王薩哈璘俱自有傳乾隆十九年九月入祀盛京賢王祠四十三年正月上以王與鄭親王濟爾哈朗睿親王多爾衮肅親王豪格克勤郡王嶽託並太祖太宗世祖時戮力行間櫛風沐雨之親藩宜配饗太廟又以王等初封嘉號當長延奕祀詔現襲禮親王爵之康親王復封號曰禮巽親王滿達海禮親王代善第七子天聰二年大兵征明錦州滿達海率師往截明杏山糧運於海上取之崇德五年復從大兵圍錦州擊敗杏山援兵又以紅衣炮擊敗松山馬兵六年五月封輔國公八月從肅親王豪格圍松山以本旗兵擊敗明松山兵錦州城中有兵出城刈草率右翼侍衛擊走之明兵犯鑲紅旗營滿達海擊敗之明總兵洪承疇以兵十三萬援錦州滿達海以步戰破其三隊承疇兵復來犯力拒之馬被創肅親王豪格易以馬甫就騎而敵大至乃奮勇返擊殿後而還明兵復乘雨來犯率兵擊却之明總兵吳三桂率兵據山立營滿達海偕諸軍擊破之三桂宵遁十一月從豫郡王多鐸赴寧逺有明兵運粟海上率兵擊取之七年四月從鄭親王濟爾哈朗等征明克塔山八年從征明中後所前屯衛俱有功八月授都察院承政順治元年四月從睿親王多爾衮入山海關擊走流賊李自成復敗之於望都縣十月晉封固山貝子隨英親王阿濟格追剿自成由邉外趨綏德二年二月進克沿邉三城及延安府又追賊至湖廣承天府破偽肅王八月凱旋三年正月從靖逺大將軍肅親王豪格剿四川流賊張獻忠七月由漢中進秦州圍賊渠髙如礪於三台山如礪降十一月師至西充斬獻忠肅親王令偕貝勒尼堪等分剿遵義夔州荗州榮昌隆昌富順內江資陽諸處餘賊四年八月班師六年四月襲父和碩親王爵七月授征西大將軍與多羅謙郡王瓦克達征大同叛鎮薑瓖攻朔州寧武等處八月克朔州馬邑降寧武關偽總兵劉偉偽道員趙夢龍及副將以下官辨五十餘員馬步兵五千四百餘名靜樂縣寧化所八角保山寨悉平遂會端重親王軍克復汾州斬偽巡撫薑建勳偽布政使劉秉業等偽總兵楊振威斬瓖首獻英親王軍大同平十月遣護軍統領索渾圍平遙偽知縣劉三元棄城走又遣署護軍統領希爾根圍太谷以紅衣炮破其城偽知縣李成沛偽都司吳成器率衆遁遣兵追殱之時潞安府賊分兵拒沁州又圍遼州王復遣多羅貝勒拜音圖護軍統領索渾馳赴沁州賊聞風遁遂拔沁州趨潞安偽道員胡國鼎來戰大兵圍之比夜遁去遣兵邀擊殱之又遣鎮國公漢岱署護軍統領希爾根赴遼州擊破賊兵屯留襄垣榆社武鄉等縣俱降尋召還京七年二月同理六部事八年二月加封號巽親王三月命掌理吏部事六月上幸南苑賜鞍馬九年二月薨年三十一諡曰簡七月以長子常阿岱襲封巽親王十六年追論滿達海與睿親王素無嫌分取其所遺財物掌吏部時尚書談泰驕縱不能糾削爵諡並降常阿岱爵為貝勒詔以多羅康郡王傑書襲其祖代善親王爵康熙四年常阿岱薨諡懷愍第六子星尼降襲固山貝子次子錫倫圖於十五年封奉恩將軍三十六年從征厄魯特有功加一雲騎尉後俱停襲乾隆四十三年三月上以巽親王滿達海著有勞績賜一等輔國將軍爵世襲罔替以滿達海七世孫福色硜額襲和碩康良親王傑書傑書禮親王代善孫父祜塞禮親王第八子順治三年六月封鎮國公是年卒以傑書兄精濟襲封鎮國公尋晉多羅郡王六年三月薨諡懷愍十月傑書襲多羅郡王八年二月加號曰康十五年五月詔以傑書爵追封其父祜塞為多羅郡王諡惠順十六年十二月巽親王常阿岱降貝勒乃以傑書襲其祖代善和碩親王爵仍號康康熙元年三月追贈其父祜塞為親王十三年三月逆藩耿精忠據福建反分兵犯浙江江西六月授傑書奉命大將軍同貝子傅喇塔由浙江進剿九月師駐金華總督李之芳駐衢州破賊于焦園紫琅山賊將徐尚朝引兵五萬犯金華王令都統巴雅爾副都統瑪哈達迎擊斬賊將吳榮先等三十餘人殱賊兵二萬十二月尚朝復率馬步兵三萬土冦二萬逼金華城南十二里莊巴雅爾與總兵陳世凱等會剿破之於積道山殺二萬餘復永康縉雲二縣賊將馮公輔由義烏遁武義遣署前鋒統領希福躡之苦竹嶺斬殪甚衆賊將沙有祥據桃花嶺梗處州路瑪哈達與總兵李榮等擊潰之副都統穆赫林又敗之于白水洋十四年正月復處州府及仙居縣公輔尚朝等猶據宣平松陽屢窺處州都統拉哈達偕諸將禦剿破之石塘石佛嶺大王嶺東隴隘口上套寨下五塘等處時寧海將軍貝子傅拉塔由黃巖規復溫州叛鎮祖宏勳曽養性糾賊數萬倚山憑江水陸抗阻上命傑書由衢州進回奏處州方有賊警金華兵力弱難驟進十五年三月諭趣之曰王坐守金華將及二載徒以文移往來為事不親統官兵進剿逆賊何日可滅宜尅期進取毋再遲延觀望貽悮軍機八月自金華移駐衢州敗賊于大溪灘復江山常山二縣進攻仙霞關偽恭將金應虎迎降遂長驅抵浦城縣攻拔之乃傳檄精忠言浦城為閩中財賦要地今大兵攻拔已扼咽喉與其縶頸就戮曷若立功贖罪以全百萬生靈九月復建陽撫降建寧延平二府精忠益震懾無措遣其子顯祚來迎師王遣人賫免死敕諭示之十月精忠出城六十里迎降獻所屬官兵册籍王遂入駐福州奏精忠請隨大軍𠞰海賊鄭錦以贖罪上報可時錦偽總統許耀率兵三萬直逼福州至烏龍江南石門枕峯諸山結寨遂遣恭贊軍務都統拉哈達率兵進剿大敗之追擊四十餘里十一月疏言精忠出剿海賊其弟昭忠聚忠宜以一人來福州統轄藩屬又疏言福州經制兵已照原額全設精忠隨大軍所率佐領下兵數已不少其左右兩鎮官兵可並裁汰宏勳養性應令赴京候補上命耿昭忠為鎮平將軍駐福州餘如所請是月王遣穆赫林等擊敗偽將軍吳淑于浦塘復邵武府進師泰寧偽總兵王安邦等降汀州府及所屬諸縣悉復十六年正月拉哈達賴塔破賊將趙得勝何祐等二十六營于白茅太平諸山復興化府二月復泉州漳州二府奏入諭曰王統率大兵自衢州入仙霞關直抵福州剿撫並用所向克捷擊逐海賊收復全閩安輯百姓克奏膚功深為可嘉三月疏言福建既平臣即欲統兵入粵但省會重地未可輕離且距漳州逺恐遲至炎暑難進師先就現駐漳州汀州騎兵令將軍拉哈達等率同耿精忠赴潮州尋遣總兵馬三竒前鋒恭領都克納敗海賊於龍溪十二月海賊率兵五千餘犯泉州府所屬小營地方副都統楊鳯翔擊敗之十七年閏三月海賊犯漳州提督假應舉郤之四月賊陷平和環逼海澄穆赫林段應舉守禦越七旬外援不至城遂陷長泰亦陷王以援遲請罪詔俟師旋再議七月賊陷同安惠安王遣署副都統禪布提督楊捷統兵進剿兩路夾攻復之十月都統賴塔等破賊于蜈蚣山復長泰又破賊於柯鏗山萬松關副都統吉勒塔布總督姚啓聖提督楊捷等敗賊將劉國軒於江東橋又敗之於潮溝之間副都統瑚圖敗吳淑於石衛寨斬獲無算盡奪賊寨沉其船十八年正月吉勒塔布及巡撫吳興祚擊賊劉國軒吳淑何祐等於郭塘歐溪頭大敗之追至江邉斬首二千餘級生擒偽總兵一偽副將二二月國軒等犯江東橋吉勒塔布迎擊賊敗走太平寨我兵追𠞰斬賊千餘十月副都統沃申敗賊衆於東石城克之吉勒塔布復敗賊于鰲頭山十九年二月沃申率滿洲緑旗兵進至大定山奮勇剿殺賊遁尾其後斬獲無算焚燬賊巢恢復大定小定地方大兵水陸分進規取玉洲劉國軒竄石馬海澄間我兵急追之走厦門隨遣官招撫海澄偽總兵蘇堪開西門迎降玉洲石馬賊巢悉破復海澄水師提督萬正色克海壇三月拉哈達楊捷等克厦門金門賴塔克銅山焚燬賊巢餘賊竄臺灣先是精忠為藩下恭領徐鴻弼等首其歸順後尚蓄逆謀王疏請逮治上密諭王令自請來京至是精忠亦自請入覲王亦奉詔班師五月疏言閩省投誠兵多需餉浩繁厦門金門已恢復宜留八旗兵六百守泉州二千四百分守福州漳州餘皆隨還十月凱還至京上率諸王大臣等至盧溝橋迎勞傑書行抱見禮十一月命預議政二十二年正月疏言官兵向駐永興城中與賊對壘仰荷天眷靈神顯助於雞公山真武廟旁𥪡旗列隊一時官兵賊衆無不共見于是我軍氣奮賊勢退沮其雞公山廟神理應特致褒旌祀典以垂永久得旨如所請春秋致祭二十九年七月率兵屯歸化城備剿噶爾丹尋以撫逺大將軍裕親王福全將抵烏蘭布通詔移師會之至則賊已竄十月撤還三十六年閏三月薨年五十三諡曰良建碑墓道七月以傑書第六子椿泰襲和碩康親王爵四十八年薨諡曰悼長子崇安襲雍正五年掌宗人府事十一年薨諡曰修以椿泰弟原封三等輔國將軍巴爾圖襲乾隆十八年薨諡曰簡以崇安第二子原封多羅貝勒永恩襲十九年總理正黃旗覺羅學四十三年正月命復禮烈親王始封之號仍為禮親王欽定八旗通志卷一百二十一
