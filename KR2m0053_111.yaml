body:
  text: 欽定四庫全書欽定八旗通志卷九十七學校志四宗學學覺羅學咸安宫官學景山官宗學順治九年十二月工科副理事官散都疏請每旗各設宗學每學用學行兼優滿漢官各一員為之師範凡未封宗室之子年十嵗以上者俱入宗學有放縱不循禮法者學師具報宗人府小則訓責大則奏聞其親王世子郡王亦應選用滿漢官各一員講論經史貝勒以下俱應勤加講閲以昭成就宗室人材之意得旨每旗設滿洲官教習滿書其漢書聽從其便十年三月散都又疏言親王應各設在部博士滿洲進士漢軍進士各一員頂帶照騎都尉世子應各設在部筆帖式滿洲進士漢軍進士各一員頂帶照雲騎尉郡王應各設在官學間散滿洲進士漢軍進士各一員頂帶照博士如滿洲漢軍進士不足於舉人內考用舉人不足於各王護衛內選用親王郡王等滿十嵗然後設立師傅宗室八學各設滿洲生員一員頂帶照筆帖式各員六年滿後考取優者録用詔從之康熙十二年題準王以下入八分公以上子弟年滿十嵗者於本府講讀經史諸書二十四年議準宗室子弟令延文學優贍者在各府第精専學習雍正二年立官學於宗室內揀選分尊年長者四人令其教習諭之曰朕惟睦族敦宗務先教化特立義學揀選爾等教習隨其資質勸學興行有不遵教訓者小則爾等自行懲勸大則揭報宗人府會同奏聞其行止端方精勤好學者無論年齒長幼即行保奏從來立教之術莫要於奬善懲惡善不奬不能使之勸惡不懲不能使之改爾等既膺簡任務期勤慎黽勉恪共厥職以副朕篤厚宗親殷勤教育之至意又覆準左右兩翼官房每翼各立一滿學一漢學王貝勒貝子公將軍間散之十八嵗以下子弟除在家自讀者悉聽外其在官學子弟或清書或漢書隨其志願分别教授十九嵗以上已曽讀書之宗室有願讀書者亦聽其入學其教授人員於各部院司官中書內揀選四員每翼分與二員令教習清書禮部揀選教習四員每翼分與二員令教習漢書至騎射亦屬緊要兵部於間散官及護軍校護軍內揀選善騎射者四員每翼分與二員於官學內修一箭道讀書之暇教習騎射以欽選之宗室四人為正教長宗人府選十六人為副教長如正教長缺出即擇副教長補授令伊等輪流值日不時勸勉教習禮義每月考試一次將學業騎射優者平常者不及者分别等第申報注册每春秋二季宗人府親試其學業優長騎射出衆者舉奏引見其值日教長月給銀三兩米三斗讀書子弟月給銀米同更按月各給川連紙一刀筆三枝墨一錠自十一月朔至正月晦各給炭百八十斤自五月朔至七月晦每日給氷一塊教習清書之司官中書仍領該部院公費其教習漢書者照國子監教習例每月給米兩斛三十六月滿時咨送吏部照例補用其教習騎射者每月給銀一兩所應給銀米筆墨紙炭氷塊行文該部支給所立宗室學房宗人府親閲應修之處派官料估領取工部錢糧修理至教習五年稱職舉其勤宣訓化實迹保奏仍賞正教長每員縀四匹副教長每員縀二匹教習清書官員行文該部院議敘教習騎射人員交該旗以應升之缺即用有不稱職者指參乾隆三年議準兩翼宗學設立總稽課程各二人以滿漢京堂官充之七年十二月奉上諭我朝崇尚本務原以弓馬清文為重而宗室誼屬天潢尤為切近向來宗室子弟俱講究清文精熟騎射誠恐學習漢文不免流於漢人浮靡之習是以順治十一年六月欽奉世祖章皇帝諭宗人府朕思習漢書入漢俗漸忘我滿洲舊制前準宗人府禮部所請設立宗學令宗室子弟讀書其內因派員教習滿書其願習漢書者各聽其便今思既習滿書即可將翻譯各漢書觀玩著永停其習漢字諸書専習滿書爾衙門傳示所以敦本實而黜浮華也近因雅爾哈善條奏設立宗學以漢文教習宗室子弟迄今已厯數年昨經考試並無佳卷即翻譯卷亦屬平常朕非過求文字出色其實在明通者實難其選即所取二三人不過於其內就短取長文理稍順而已尚恐未必盡出心裁或不免彼此商確湊集其於造就之方究無禆益也但既經考試著宗人府將所取之人照例帶領引見嗣後宗室子弟或有不能學習漢文者應聽其専精武藝其在宗學肄業者考試之時更應益加嚴肅至宗室進身之階原有襲封世職又可揀選侍衛及護軍參領等缺與其徒務章句虛文轉致荒廢本務不如嫻習武藝崇實黜浮儲為國家有用之器也可傳諭宗人府將此旨明白曉諭宗室人等知之八年三月禮部帶領宗人府考取之宗室玉鼎柱等引見奉旨考取之宗室玉鼎柱達林圖福喜俱準作進士與乙丑科會試中式之人一體殿試引見或選入翰林或以部屬等官補用候朕臨時降旨嗣後俱照此例行十年七月稽查右翼宗學通政司右通政熊學鵬奏言右翼宗學共設滿漢教習九人凡在館學生滿漢文藝之優劣教習人員訓課行走之勤惰皆應不時考核今稽查右翼宗學係臣與光祿寺卿沈起元二人俱係漢官於翻譯素未通曉請再派滿洲文臣一員公同稽查奉旨著派開泰二十一年奏準裁宗學漢教習九人改為翻譯教習以上宗學覺羅學雍正七年奉上諭八旗內覺羅佐領或有或無向未畫一今既將下五旗覺羅佐領由各王屬下撤出作為公中佐領朕意均派八旗方為妥協前者宗人府設立宗學祇令教習宗室尚未及於覺羅覺羅人衆今若一槩歸併宗學教者勢難遍及應每旗各立一衙門管轄覺羅或王或公派委一員統理令於各旗覺羅內揀選老成練達品行端方者一二人分管即於該旗衙門之旁設立一學除情願在家學習者外擇其可教之人令其讀書學射滿漢兼習所派出之管轄人員不時訓誨稽察如內有行止不端不知守法安分者即回明宗人府王等令在該旗衙門居住學習禁止出門俟其改行遷善之後再回明宗人府王等始許出門年底彚疏具題如此則於覺羅少年子弟大有裨益而人人皆可成就著宗人府王公等會同滿洲大學士六部尚書詳悉議奏是年十二月宗人府王公滿洲大學士六部尚書議覆我皇上敦宗睦族俯念覺羅等雖世系稍逺亦出自天潢是以由該王屬下撤出置之公中佐領兹又特命將七旗所有之覺羅佐領均之於八旗每旗各設一學令其讀書得以成就恩德實為備至查七旗所有覺羅佐領共三十二分鑲黃旗七分正黃旗五分正白旗無有正紅旗七分鑲白旗五分鑲紅旗四分正藍旗二分鑲藍旗二分今應就便視其可移者每旗置為覺羅佐領四分將鑲黃旗七佐領內之佛保永昌阿堵鑲白旗之海蘭此四佐領移置正白旗正藍旗惟有覺羅佐領二分將鑲藍旗之永祿同保住此二佐領移置正藍旗共成四分將正黃旗之東武立正紅旗之得進圖爾得赫瑪喇熙此四佐領移置鑲藍旗再八旗各擇官房一所立為衙署旁設清漢各一學八旗覺羅內自八嵗以上十八嵗以下子弟俱令入學讀書其中有情願在家讀書者聽其自便其入官學讀書者清漢隨其所願而教之如十八嵗以上已曽讀書而又願入學讀書者亦準其入學至十八嵗以上未曽讀書者不可竟無教訓於每月朔望傳集該旗公署宣講聖諭廣訓總管一旗覺羅之王公由宗人府將王公職名開列奏請欽點每旗派覺羅二人以為督教之長即交委出之王公會同宗人府王公務擇其才品能管轄人者挑取由各部院現任筆帖式內擇其老成能翻譯者揀選八人每旗各分一員教授清書由禮部揀選教習八人每旗各分一員教授漢書再行文兵部將現在十五善射或已退之十五善射內無論官兵揀選八人每旗各分一人令其教射於學舍院內修一習射之地令覺羅等於誦讀之暇兼以習射所選督教之長十六人令其每日在學行走讀書之覺羅等有怠惰不學者各學之長即嚴加訓飭若不悛改即回明管轄之王公嚴加訓責如有甚劣者報知宗人府拘於本旗衙署內教訓不準出外行走即不讀書之覺羅內有行為妄亂者亦拘於衙署之中教訓不準出外行走俟痛加悛改後告知宗人府始行放出由宗人府彚集奏聞再讀書之覺羅等若不時加考課則優劣不分無以懲勸令該管之王公等於每年春秋二季親身考驗分别等第報知宗人府登記檔案如所學之書及騎射俱優者奏明引見擢用則劣者自知黽勉效法各加奮勵而學業可成矣至讀書之覺羅及督教人等每月各給公費銀二兩其米石紙筆墨氷炭等物俱照宗學之例行文各該部領取教清書之筆帖式教漢書之教習亦照宗學之例教習三十六個月期滿行文吏部照例補用如懶惰不勤者咨送該部革職如有多教三年者將其多教之處一併咨部議敘再各學之覺羅有進文生員及翻譯生員至四人者將教清漢書之教習亦交部議敘其教射之人照筆帖式給與公費其衙署學舍著各旗揀擇足用之官房一所委員會同覺羅學長估計領取官租銀修理報部核銷再每旗挑馬甲各二名以為傳事之用覺羅等讀書五年如果成就多人著宗人府詳查奏聞將該管之王公議敘派出之學長等如果勤慎教導令該王公報知宗人府另行保奏教射之人俟過五年以應升之缺即用如怠惰不勤即參奏治罪如此則教習各勤於訓導而讀書之覺羅學業可成矣奉旨依議以上覺羅學咸安宫官學雍正六年十一月奉上諭咸安宫內房屋現在空間看景山官學生功課未専於內府佐領管領下幼童及官學生內選其俊秀者五六十名或百餘名委派翰林等即住居咸安宫教習彼處房屋亦多且有射箭之處其學房住房爾等酌量修理著令居住再挑選烏拉人幾名於伊等讀書之暇令其教授清話弓馬伊等皆係幼童有欲帶僕人者準各帶一人幾日後著回家看往一次如是訓導其上進之子又加勤學庶可收堪用之材至伊等所需飲食紙筆弓箭等物並騎射之駑馬作何官給之處爾等妥議具奏七年四月總管內務府議奏臣等欽遵諭旨於景山官學生佐領管領下自十三嵗以上二十三嵗以下之幼童看其俊秀可以學習者選得九十名於咸安宫內酌量修理讀書房屋三所每所各分給三十名令其讀書其教習著於翰林院官員揀選厚重者九人具奏每所派三人令勤加教授其教清話弓馬之人臣等於烏拉人及舊滿洲內挑選善教授者九人亦每所派三人於讀書之暇著令教授學習諸生年嵗大小不同可學習步射者著在咸安宫門前間地教以步射可學習騎射者酌量時宜教以騎射紫禁內地關係緊要應令諸生清晨入學日暮散歸如遇雨水祁寒之際教習學生有情願在內者即著宿居學內管理學房事務揀選內府官四員奏令専管應於掌儀司太監內選其老成者三人夜間巡察火燭所派太監即令管理學房官管轄其教習等如果教授有方諸生之學業可觀三年一次查勘將翰林等交部議敘教清話弓馬之人以應升之缺升用倘有疏懈怠玩不悉心教授者臣等指名題參學生內有滑懶不肖者革退另選查景山滿漢教習除官給飯食外無俸之教習每人月給銀二兩漢教習各給住房二間每年給縀紗衣一套三年給縀面羊皮袍褂一套今選取教習等所食俸銀及官給飯食衣服應均照定例其翰林教習之住房於附近官房內撥給學生飯食照該班護軍之例除給與官米外每日每人用肉菜銀五分按月由內庫發給看管飯食及做飯使令等項於管領下領催蘇拉內酌派咸安宫門外西邉所有房屋撥給數間以為做飯之處所讀之書所需之筆墨紙張弓箭器皿騎射之駑馬鋪用席氈溫炕木柴暖手黑炭等物委官計算數目向各該處領取臣等仍不時身往稽察皇上命下之日行文翰林院揀選翰林欽天監選擇吉日令學生入學讀書可也奉旨依議十二年五月翰林院侍讀學士保良奏言我皇上加恩內府子弟特設咸安宫官學漢教習教以文義滿教習教以清書弓箭又賜以紙筆飯食等物無非作養人材之至意也諸生沾被皇恩専心肄業自雍正七年七月開學以來迄今五載除新補學生外內有中式舉人副榜者四人有考中生員補廪者二十三人有兼習清書稍知翻譯者十三四人其餘雖質學不等然皆略明大義弓箭俱有可觀但諸生學習日久年紀漸長二十以外者十有四五若不限以年分考試别其優劣無以示勸懲查宗學有五年一次考試之例今立學已屆五年伏祈皇上派員考試别以等第其年紀尚幼質堪成就者仍留學內讀書其年紀長成考在上等與考在下等均應作何發落令考試官考後請旨嗣後或三年一考或五年一考著為定例永逺遵行如此不惟學生知所鼓舞警戒而滿漢教習之勤惰優絀亦可因此而見矣奉旨內務府總管等議奏九月總管內務府議照宗學例五年考試一次除陸續後進學生不能應考者不令其考試外其應考學生令管理官學翰林官查明送考其考試官由吏部開列職名奏派大臣一員司官一員內務府司官一員分為三日考試第一日考試漢文擬以四書二題第二日考試翻譯楷書清字擬以上諭一假第三日考試騎射步射其考場清漢文在掌儀司衙門騎步射在正黃旗侍衛教場其監察官員派內府護軍統領一員護軍參領二員酌派護軍查看其所需桌張紙卷等項臣衙門派員料理其考試之學生定為三等一二等由考試官具奏作何録用請旨定奪三等者仍留學肄業其年長質愚不能上進者即行革退又查得雍正十一年二月內將年滿教習等具奏奉旨咸安宫景山教習疏懶怠忽不實心訓課者居多爾等將現今年滿實在勤慎者揀選帶領引見其餘仍令效力三年嗣後若不實心訓課即行參奏重處將此旨傳諭兩學官員教習等知之欽此臣等謹遵諭旨漢教習內三年期滿如果實心訓課行走優勤者臣衙門出具考語咨部引見以應升之缺補用其訓課平等者三年期滿仍留三年俟六年期滿照依此例補用如不實心訓課者臣等即行𠫭奏其教清話馬步射之教習五年期滿教授盡心行走勤慎者於應升之處列名不及者革退另選其不盡心教授者參奏重處如此則勤懲兼施誘勵備至學生等自必羣知奮興以歸於上進之途而教習等亦不至有草率偷安之弊矣請以此著為定例永逺遵行抑臣等更有請者咸安宫教清話馬步射之教習原設九人今學生內既有稍知翻譯之人應請於九缺內扣除三缺改補翻譯教習三員此翻譯教習請照八旗助教之例由部考取三員令教翻譯清書五年期滿交部議敘奉旨依議乾隆三十四年二月總管咸安宫官學教習邁拉遜參奏教習等怠惰曠功一摺奉上諭所有咸安宫稽查教習之張曾敞等著交部察議至觀保管理官學日久並不實力整頓以致教習人員怠惰曠功若此若非邁拉遜查出參奏觀保尚在睡夢中觀保著交部嚴察議奏以上咸安宫官學景山官學康熙二十五年特命建設官學於北上門兩旁共給官房三十間滿官學三房漢官學三房每房給桌二十張凳十五條自五月初一日起至七月三十日止每日給冰一塊自十一月初一日起至正月三十日止每日給炭二十斤中間十二月二十七日起至正月十六日扣除散學二十日不領六房窗户著落內管領每年十一月內用毛頭紙糊飾是年議定景山官學生於內佐領內管領下選取三百六十六名又議定教習額數清書每房設教習三員漢書每房設教習四員又議準生員內有善於訓導願為教習者選擇移送各給衣食令教習三旗子弟又議定生員教習六年限滿以教諭即用其由官學內中式舉人副榜及捐貢之教習俱以知縣用又奉上諭內廷執事人間散人內老成堪為師長者不分滿洲蒙古漢軍著挑選九名教滿書二十九年奉上諭內閣中書內善書善射者揀選三名教滿書仍照常升轉三十一年議定於新添內管領三員下增選官學生定為三百八十八名三十四年奏準於新添滿洲佐領七員漢軍佐領六員內管領三員下仍挑選官學生三百八十八名官學生缺額即於新添佐領內管領下均勻選取三十八年議定停止官飯每月每人給公費錢一千文五十二年奉上諭於新科進士內揀有年紀者選取三名教習照常升轉是年議定進士教習期滿升用內閣中書雍正元年議準將御筆尖圈記名新進士挨次充補教習是年題準官學生三百八十八名俱於佐領內管領下間散人挑取又議定教習六年期滿果官學生成就多者將中書等具題咨送吏部以應升之缺即用內教習等亦以應升缺即用又奏準停止公費仍給官飯教清書中書三員內教習六員亦照漢教習例又定官學生內生員每月給紙筆銀一兩隨本佐領關給三年議定教習員缺由禮部向吏部咨取候選舉人向國子監咨取恩拔嵗副貢生欽點大員考試選取三年期滿咨送吏部以應升之缺補用十二年九月總管內務府議奏景山官學設立教習係一體給公費飯食誠為優渥學生等考試舉人生員筆帖式及挑選護軍披甲等差無不沾被皇恩但學生之優劣教習之勤惰亦當詳加考驗示以勸懲請照現定咸安宫官學之例令管理景山學官將應考之學生開送一同考試試官分别等次另摺具奏考在一二等者臣衙門另行請旨其滿漢教習亦照例分别録用奉旨依議附會典所載則例景山官學額設人役滿漢六房每房灑掃間散人二名看房人一名教習廪給內教習食執事俸米中書教習食中書俸漢教習每人給官房兩間每日給白米七合五勺豬肉一斤及鹽油菜蔬等物每月給銀二兩連米俱於漢軍佐領下關領每年夏季給官用紗袍褂各一件絨纓帽各一頂秋季每人給官用緞棉袍褂各一件三年給官用縀面羊皮袍褂各一件皮帽一頂皮靴一雙氈襪一雙滿漢教習每年各給水筆二十四枝墨一兩二錢以上景山官學欽定八旗通志卷九十七
