body:
  text: 欽定四庫全書欽定八旗通志卷九十七學校志四宗學學覺羅學咸安宫官學景山官宗學順治九年十二月工科副理事官散都疏請毎旗各設宗學毎學用學行兼優滿漢官各一員為之師範凡未封宗室之子年十嵗以上者俱入宗學有放縱不循禮法者學師具報宗人府小則訓責大則奏聞其親王世子郡王亦應選用滿漢官各一員講論經史貝勒以下俱應勤加講閱以昭成就宗室人材之意得㫖每旗設滿洲官教習滿書其漢書聴從其便十年三月散都又疏言親王應各設在部博士滿洲進士漢軍進士各一員頂帯照騎都尉世子應各設在部筆帖式滿洲進士漢軍進士各一員頂帯照雲騎尉郡王應各設在官學閒散滿洲進士漢軍進士各一員頂帯照博士如滿洲漢軍進士不足於舉人内考用舉人不足於各王䕶衛内選用親王郡王等滿十嵗然後設立師傅宗室八學各設滿洲生員一員頂帶照筆帖式各員六年滿後考取優者録用詔從之康熙十二年題准王以下入八分公以上子弟年滿十嵗者於本府講讀經史諸書二十四年議准宗室子弟令延文學優贍者在各府第精専學習雍正二年立官學於宗室内揀選分尊年長者四人令其教習諭之曰朕惟睦族敦宗務先教化特立義學揀選爾等教習隨其資質勸學興行有不遵教訓者小則爾等自行懲勸大則揭報宗人府㑹同奏聞其行止端方精勤好學者無論年齒長幼即行保奏從來立教之術莫要於奨善懲惡善不奨不能使之勸惡不懲不能使之改爾等既膺簡任務期勤慎黾勉恪共厥職以副朕篤厚宗親殷勤教育之至意又覆准左右兩翼官房每翼各立一滿學一漢學王貝勒貝子公将軍閒散之十八嵗以下子弟除在家自讀者悉聴外其在官學子弟或清書或漢書隨其志願分别教授十九嵗以上已曽讀書之宗室有願讀書者亦聴其入學其教授人員於各部院司官中書内揀選四員每翼分與二員令教習清書禮部揀選教習四員毎翼分與二員令教習漢書至騎射亦屬𦂳要兵部於閒散官及䕶軍校䕶軍内揀選善騎射者四員毎翼分與二員於官學内修一箭道讀書之暇教習騎射以欽選之宗室四人為正教長宗人府選十六人為副教長如正教長缺出即擇副教長補授令伊等輪流值日不時勸勉教習禮義毎月考試一次将學業騎射優者平常者不及者分别等第申報註册每春秋二季宗人府親試其學業優長騎射出衆者舉奏引見其值日教長月給銀三兩米三斗讀書子弟月給銀米同更按月各給川連紙一刀筆三枝墨一錠自十一月朔至正月晦各給炭百八十觔自五月朔至七月晦毎日給氷一塊教習清書之司官中書仍領該部院公費其教習漢書者照國子監教習例每月給米兩斛三十六月滿時咨送吏部照例補用其教習騎射者毎月給銀一兩所應給銀米筆墨紙炭氷塊行文該部支給所立宗室學房宗人府親閲應修之處派官料估領取工部錢糧修理至教習五年稱職舉其勤宣訓化實蹟保奏仍賞正教長每員縀四疋副教長每員縀二疋教習清書官員行文該部院議叙教習騎射人員交該旗以應陞之缺即用有不稱職者指㕘乾隆三年議准兩翼宗學設立總稽課程各二人以滿漢京堂官充之七年十二月奉上諭我朝崇尚本務原以弓馬清文為重而宗室誼屬天潢尤為切近向来宗室子弟俱講究清文精熟騎射誠恐學習漢文不免流於漢人浮靡之習是以順治十一年六月欽奉世祖章皇帝諭宗人府朕思習漢書入漢俗漸忘我滿洲舊制前准宗人府禮部所請設立宗學令宗室子弟讀書其内因派員教習滿書其願習漢書者各聴其便今思既習滿書即可將繙譯各漢書觀玩著永停其習漢字諸書専習滿書爾衙門𫝊示所以敦本實而黜浮華也近因雅爾哈善條奏設立宗學以漢文教習宗室子弟迄今已厯數年昨經考試並無佳卷即繙譯卷亦屬平常朕非過求文字出色其實在明通者實難其選即所取二三人不過於其内就短取長文理稍順而已尚恐未必盡出心裁或不免彼此商確凑集其於造就之方究無禆益也但既經考試著宗人府将所取之人照例帶領引見嗣後宗室子弟或有不能學習漢文者應聴其専精武藝其在宗學肄業者考試之時更應益加嚴肅至宗室進身之階原有襲封世職又可揀選侍衛及䕶軍㕘領等缺與其徒務章句虚文轉致荒廢本務不如嫻習武藝崇實黜浮儲為國家有用之器也可傳諭宗人府将此㫖明白曉諭宗室人等知之八年三月禮部帶領宗人府考取之宗室玉鼎柱等引見奉㫖考取之宗室玉鼎柱達林圖福喜俱准作進士與乙丑科㑹試中式之人一體殿試引見或選入翰林或以部屬等官補用候朕臨時降㫖嗣後俱照此例行十年七月稽查右翼宗學通政司右通政熊學鵬奏言右翼宗學共設滿漢教習九人凡在館學生滿漢文藝之優劣教習人員訓課行走之勤惰皆應不時考核今稽查右翼宗學係臣與光禄寺卿沈起元二人俱係漢官於繙譯素未通曉請再派滿洲文臣一員公同稽查奉㫖著派開泰二十一年奏准裁宗學漢教習九人改為繙譯教習以上宗學覺羅學雍正七年奉上諭八旗内覺羅佐領或有或無向未畫一今既將下五旗覺羅佐領由各王屬下撤出作為公中佐領朕意均派八旗方為妥協前者宗人府設立宗學祇令教習宗室尚未及於覺羅覺羅人衆今若一槩歸併宗學教者勢難遍及應毎旗各立一衙門管轄覺羅或王或公派委一員統理令於各旗覺羅内揀選老成練達品行端方者一二人分管即於該旗衙門之旁設立一學除情願在家學習者外擇其可教之人令其讀書學射滿漢兼習所派出之管轄人員不時訓誨稽察如内有行止不端不知守法安分者即囘明宗人府王等令在該旗衙門居住學習禁止出門俟其改行遷善之後再囘明宗人府王等始許出門年底彚疏具題如此則於覺羅少年子弟大有裨益而人人皆可成就著宗人府王公等㑹同滿洲大學士六部尚書詳悉議奏是年十二月宗人府王公滿洲大學士六部尚書議覆我皇上敦宗睦族俯念覺羅等雖世系稍逺亦出自天潢是以由該王屬下撤出置之公中佐領兹又特命將七旗所有之覺羅佐領均之於八旗每旗各設一學令其讀書得以成就恩徳實為備至查七旗所有覺羅佐領共三十二分鑲黄旗七分正黄旗五分正白旗無有正紅旗七分鑲白旗五分鑲紅旗四分正藍旗二分鑲藍旗二分今應就便視其可移者每旗置為覺羅佐領四分將鑲黄旗七佐領内之佛保永昌阿堵鑲白旗之海蘭此四佐領移置正白旗正藍旗惟有覺羅佐領二分將鑲藍旗之永禄同保住此二佐領移置正藍旗共成四分将正黄旗之東武立正紅旗之得進圖爾得赫瑪喇熙此四佐領移置鑲藍旗再八旗各擇官房一所立為衙署旁設清漢各一學八旗覺羅内自八嵗以上十八嵗以下子弟俱令入學讀書其中有情願在家讀書者聴其自便其入官學讀書者清漢隨其所願而教之如十八嵗以上已曽讀書而又願入學讀書者亦准其入學至十八嵗以上未曽讀書者不可竟無教訓於毎月朔望𫝊集該旗公署宣講聖諭廣訓總管一旗覺羅之王公由宗人府將王公職名開列奏請欽㸃每旗派覺羅二人以為督教之長即交委出之王公㑹同宗人府王公務擇其才品能管轄人者挑取由各部院現任筆帖式内擇其老成能繙譯者揀選八人每旗各分一員教授清書由禮部揀選教習八人每旗各分一員教授漢書再行文兵部將現在十五善射或已退之十五善射内無論官兵揀選八人每旗各分一人令其教射於學舍院内修一習射之地令覺羅等於誦讀之暇兼以習射所選督教之長十六人令其毎日在學行走讀書之覺羅等有怠惰不學者各學之長即嚴加訓飭若不悛改即囘明管轄之王公嚴加訓責如有甚劣者報知宗人府拘於本旗衙署内教訓不准出外行走即不讀書之覺羅内有行為妄亂者亦拘於衙署之中教訓不准出外行走俟痛加悛改後告知宗人府始行放出由宗人府彚集奏聞再讀書之覺羅等若不時加考課則優劣不分無以懲勸令該管之王公等於毎年春秋二季親身考騐分别等第報知宗人府登記檔案如所學之書及騎射俱優者奏明引見擢用則劣者自知黾勉效法各加奮勵而學業可成矣至讀書之覺羅及督教人等毎月各給公費銀二兩其米石紙筆墨氷炭等物俱照宗學之例行文各該部領取教清書之筆帖式教漢書之教習亦照宗學之例教習三十六個月期滿行文吏部照例補用如懶惰不勤者咨送該部革職如有多教三年者將其多教之處一併咨部議叙再各學之覺羅有進文生員及繙譯生員至四人者將教清漢書之教習亦交部議叙其教射之人照筆帖式給與公費其衙署學舍著各旗揀擇足用之官房一所委員㑹同覺羅學長估計領取官租銀修理報部核銷再毎旗挑馬甲各二名以為𫝊事之用覺羅等讀書五年如果成就多人著宗人府詳查奏聞將該管之王公議敘派出之學長等如果勤慎教導令該王公報知宗人府另行保奏教射之人俟過五年以應陞之缺即用如怠惰不勤即㕘奏治罪如此則教習各勤於訓導而讀書之覺羅學業可成矣奉㫖依議以上覺羅學咸安宫官學雍正六年十一月奉上諭咸安宫内房屋現在空閒看景山官學生功課未専於内府佐領管領下幼童及官學生内選其俊秀者五六十名或百餘名委派翰林等即住居咸安宫教習彼處房屋亦多且有射箭之處其學房住房爾等酌量修理著令居住再挑選烏拉人㡬名於伊等讀書之暇令其教授清話弓馬伊等皆係幼童有欲帶僕人者准各帯一人㡬日後著囘家看往一次如是訓導其上進之子又加勤學庶可収堪用之材至伊等所需飲食紙筆弓箭等物並騎射之駑馬作何官給之處爾等妥議具奏七年四月總管内務府議奏臣等欽遵諭㫖於景山官學生佐領管領下自十三嵗以上二十三嵗以下之幼童看其俊秀可以學習者選得九十名於咸安宫内酌量修理讀書房屋三所每所各分給三十名令其讀書其教習著於翰林院官員揀選厚重者九人具奏每所派三人令勤加教授其教清話弓馬之人臣等於烏拉人及舊滿洲内挑選善教授者九人亦每所派三人於讀書之暇著令教授學習諸生年嵗大小不同可學習步射者著在咸安宫門前閒地教以步射可學習騎射者酌量時宜教以騎射紫禁内地闗係𦂳要應令諸生清晨入學日暮散歸如遇雨水祁寒之際教習學生有情願在内者即著宿居學内管理學房事務揀選内府官四員奏令専管應於掌儀司太監内選其老成者三人夜間巡察火燭所派太監即令管理學房官管轄其教習等如果教授有方諸生之學業可觀三年一次查勘將翰林等交部議叙教清話弓馬之人以應陞之缺陞用倘有疎懈怠玩不悉心教授者臣等指名題㕘學生内有滑懶不肖者革退另選查景山滿漢教習除官給飯食外無俸之教習每人月給銀二兩漢教習各給住房二間毎年給縀紗衣一套三年給縀面羊皮袍褂一套今選取教習等所食俸銀及官給飯食衣服應均照定例其翰林教習之住房於附近官房内撥給學生飯食照該班䕶軍之例除給與官米外每日每人用肉菜銀五分按月由内庫發給看管飯食及做飯使令等項於管領下領催蘇拉内酌派咸安宫門外西邉所有房屋撥給數間以為做飯之處所讀之書所需之筆墨紙張弓箭器皿騎射之駑馬鋪用蓆毡温炕木柴煖手黒炭等物委官計算數目向各該處領取臣等仍不時身往稽察皇上命下之日行文翰林院揀選翰林欽天監選擇吉日令學生入學讀書可也奉㫖依議十二年五月翰林院侍讀學士保良奏言我皇上加恩内府子弟特設咸安宫官學漢教習教以文義滿教習教以清書弓箭又賜以紙筆飯食等物無非作養人材之至意也諸生沾被皇恩専心肄業自雍正七年七月開學以來迄今五載除新補學生外内有中式舉人副榜者四人有考中生員補廪者二十三人有兼習清書稍知繙譯者十三四人其餘雖質學不等然皆畧明大義弓箭俱有可觀但諸生學習日久年紀漸長二十以外者十有四五若不限以年分考試别其優劣無以示勸懲查宗學有五年一次考試之例今立學已屆五年伏祈皇上派員考試别以等第其年紀尚幼質堪成就者仍留學内讀書其年紀長成考在上等與考在下等均應作何發落令考試官考後請㫖嗣後或三年一考或五年一考著為定例永逺遵行如此不惟學生知所鼓舞儆戒而滿漢教習之勤惰優絀亦可因此而見矣奉㫖内務府總管等議奏九月總管内務府議照宗學例五年考試一次除陸續後進學生不能應考者不令其考試外其應考學生令管理官學翰林官查明送考其考試官由吏部開列職名奏派大臣一員司官一員内務府司官一員分為三日考試第一日考試漢文擬以四書二題第二日考試繙譯楷書清字擬以上諭一叚第三日考試騎射歩射其考場清漢文在掌儀司衙門騎歩射在正黄旗侍衛教場其監察官員派内府䕶軍統領一員䕶軍㕘領二員酌派䕶軍查看其所需桌張紙卷等項臣衙門派員料理其考試之學生定為三等一二等由考試官具奏作何録用請㫖定奪三等者仍留學肄業其年長質愚不能上進者即行革退又查得雍正十一年二月内將年滿教習等具奏奉㫖咸安宫景山教習疎懶怠忽不實心訓課者居多爾等將現今年滿實在勤慎者揀選帯領引見其餘仍令効力三年嗣後若不實心訓課即行㕘奏重處將此㫖傳諭兩學官員教習等知之欽此臣等謹遵諭㫖漢教習内三年期滿如果實心訓課行走優勤者臣衙門出具考語咨部引見以應陞之缺補用其訓課平等者三年期滿仍留三年俟六年期滿照依此例補用如不實心訓課者臣等即行𠫭奏其教清話馬步射之教習五年期滿教授盡心行走勤慎者於應陞之處列名不及者革退另選其不盡心教授者㕘奏重處如此則勤懲兼施誘勵備至學生等自必羣知奮興以歸於上進之途而教習等亦不至有草率偷安之弊矣請以此著為定例永逺遵行抑臣等更有請者咸安宫教清話馬歩射之教習原設九人今學生内既有稍知繙譯之人應請於九缺内扣除三缺改補繙譯教習三員此繙譯教習請照八旗助教之例由部考取三員令教繙譯清書五年期滿交部議叙奉㫖依議乾隆三十四年二月總管咸安宫官學教習邁拉遜㕘奏教習等怠惰曠功一摺奉上諭所有咸安宫稽查教習之張曾敞等著交部察議至觀保管理官學日乆並不實力整頓以致教習人員怠惰曠功若此若非邁拉遜查出㕘奏觀保尚在睡夢中觀保著交部嚴察議奏以上咸安宫官學景山官學康熙二十五年特命建設官學於北上門兩旁共給官房三十間滿官學三房漢官學三房毎房給桌二十張櫈十五條自五月初一日起至七月三十日止毎日給冰一塊自十一月初一日起至正月三十日止每日給炭二十斤中間十二月二十七日起至正月十六日扣除散學二十日不領六房牕户著落内管領每年十一月内用毛頭紙糊飾是年議定景山官學生於内佐領内管領下選取三百六十六名又議定教習額數清書毎房設教習三員漢書毎房設教習四員又議准生員内有善於訓導願為教習者選擇移送各給衣食令教習三旗子弟又議定生員教習六年限滿以教諭即用其由官學内中式舉人副榜及捐貢之教習俱以知縣用又奉上諭内廷執事人閒散人内老成堪為師長者不分滿洲䝉古漢軍著挑選九名教滿書二十九年奉上諭内閣中書内善書善射者揀選三名教滿書仍照常陞轉三十一年議定於新添内管領三員下増選官學生定為三百八十八名三十四年奏准於新添滿洲佐領七員漢軍佐領六員内管領三員下仍挑選官學生三百八十八名官學生缺額即於新添佐領内管領下均匀選取三十八年議定停止官飯毎月毎人給公費錢一千文五十二年奉上諭於新科進士内揀有年紀者選取三名教習照常陞轉是年議定進士教習期滿陞用内閣中書雍正元年議准将御筆尖圈記名新進士挨次充補教習是年題准官學生三百八十八名俱於佐領内管領下閒散人挑取又議定教習六年期滿果官學生成就多者将中書等具題咨送吏部以應陞之缺即用内教習等亦以應陞缺即用又奏准停止公費仍給官飯教清書中書三員内教習六員亦照漢教習例又定官學生内生員每月給紙筆銀一両隨本佐領闗給三年議定教習員缺由禮部向吏部咨取候選舉人向國子監咨取恩㧞嵗副貢生欽㸃大員考試選取三年期滿咨送吏部以應陞之缺補用十二年九月總管内務府議奏景山官學設立教習係一體給公費飯食誠為優渥學生等考試舉人生員筆帖式及挑選䕶軍披甲等差無不沾被皇恩但學生之優劣教習之勤惰亦當詳加考騐示以勸懲請照現定咸安宫官學之例令管理景山學官将應考之學生開送一同考試試官分别等次另摺具奏考在一二等者臣衙門另行請㫖其滿漢教習亦照例分别錄用奉㫖依議附㑹典所載則例景山官學額設人役滿漢六房毎房灑掃閒散人二名看房人一名教習廪給内教習食執事俸米中書教習食中書俸漢教習毎人給官房兩間每日給白米七合五勺猪肉一觔及鹽油菜蔬等物每月給銀二兩連米俱於漢軍佐領下闗領毎年夏季給官用紗袍褂各一件絨纓㡌各一頂秋季每人給官用緞棉袍褂各一件三年給官用縀面羊皮袍褂各一件皮㡌一頂皮靴一雙毡襪一雙滿漢教習毎年各給水筆二十四枝墨一兩二錢以上景山官學欽定八旗通志卷九十七
