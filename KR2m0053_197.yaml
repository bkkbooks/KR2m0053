body:
  text: 人物志六十三大臣傳四十九滿洲鑲藍旗六桂鶴年貴鄂實鐘音鄂弼林林鶴年鶴年滿洲鑲藍旗人姓伊爾根覺羅父春山康熙五十一年進士改庶吉士纍官盛京兵部侍郎鶴年由乾隆元年進士改庶吉士散館授檢討五年充日講起居注官兼公中佐領十年遷國子監司業十三年遷翰林院侍講學士十五年正月擢內閣學士尋充經筵講官十一月遷倉埸侍郎十二月疏言現在米價稍昻請將京倉甲米通倉俸米於明春早放半月可期平減十六年二月又言各倉放米年分自乾隆十年至十三年不等漸虞陳積由厫座有多寡派貯不均之故請自本年始東豫二省所運豆即於厫多之儲濟萬安舊太海運四倉酌量派撥每季放米仍按旗均籌並如所請行十七年以米數虧短不能實力董查奉旨革職留任十八年六月疏參坐糧廳郎中綽克托剛愎自用並不虛𠂻籌辦於支放錢糧及行查要件任意遲延又徇縱市恩濫保重役臣不敢以曽保京察一等復行回護下部議革綽克托職八月奏言通州南倉建自明天順年間後併入中倉我朝因之設中南倉監督原係一倉雍正四年御史殷式訓條奏以南倉在新城中倉在舊城請增設滿漢監督因分為二與西倉分貯漕白米遵循已久臣等酌現在情形核計每年所放俸米約四十萬石若收貯過多恐陳陳相因不無浥爛之虞中西二倉厫三百餘足敷收貯南倉似可不設現估三倉應修厫工料銀八千餘兩虛費間置請俟南倉米放完即將該倉裁汰歸併西中其原估修葺事即停得旨俞允十九年三月授廣東巡撫奏平米價嚴保甲緝竊盜禁私鑄私雕各事宜諭曰諸凡行之以實要之以久勉之閏四月疏言雷州府之海安營額兵九百餘嵗需兵米三千四百餘石所支本色不及一成近年米價稍昻兵丁口食不敷查有高州府屬之化州石城縣官租每嵗收穀三千石請碾米撥給海安詔如所請十一月奏言海陽縣之蔡家園向多水患請將土堤改築灰墻其首險要工百餘丈臣現捐俸倡修次險工一併改築報聞二十一年九月奏言廣州府屬之番禺花縣肇慶府屬之陽春縣徴收民米內有厨房米又名官眷米相傳起於明故藩米必細長潔白方準收納為旗營武職俸米計萬二千餘石此項嘉穀産少價昻伏思通倉自王公大臣以下一律支放粵省豈可另立名色纍民現飭查禁革上嘉之十月調山東巡撫奏言濟寧魚臺金鄉滕嶧五州縣積潦成災奉旨加意賑恤二十二年正月上南巡過山東鶴年迎駕御製詩賜之曰粵海旬宣久青齊治撫掄嘉伊品犖犖為我牧元元坐鎮青油幕扈隨紫氣軒驅馳何足貴善政勉徐源四月奏言武定府屬之海豐縣地處海濱其東北鄉黎敬等五莊尤低易潦積欠較多請將乾隆十一年至二十年舊欠恩豫豁免其地畝糧稅並照下則徴收詔如所請五月奏言濟寧金鄉等五州縣未涸地畝尚千餘莊諭曰朕此次南巡親蒞河工相度險要指授在工諸臣分任責成凡以為積嵗被災羣黎籌疏泄之方捍禦之術宵旰靡寧冀收實效業屢頒明旨矣近據鶴年奏報因思東省積潦再經伏雨秋霖將益苦泛溢而上江之宿虹靈璧等縣河南之永城夏邑等處皆有積水計漫淹地界不下數百里此其受病非一朝一夕驟致蔓延蓋其始皆由於地方官漫不經心偶遇水災不急為籌度日復一日因循釀害積水日益增淹地日益廣以致高下田廬盡成巨浸及至受害既深自非大動帑項厚資工力不能奏效而大小各官又莫能深悉受害之由確得袪患之術惟恐議疏議築虧帑貽纍遂爾噤口束手坐視其民為魚而莫展一籌現今水患已不可勝言若不及時徹底籌辦將來何所底止著侍郎裘曰修馳驛前往山東河南上江現在積水各州縣往來周視熟察情形與鶴年等會商籌辦七月奏言漳河暴漲驟注衛河館陶冠縣猝被水災無從宣泄致濟寧金鄉等處既涸復淹諭鶴年往勘疏消及賑恤各事宜又諭曰江蘇巡撫陳宏謀安徽巡撫髙晉山東巡撫鶴年河南巡撫胡寶瑔等皆能任事之大臣所有三省積年被水之由應如何相度形勢從長計議俾可永弭水患之處各於所屬境內悉心查勘仍復彼此會籌妥辦裘曰修等往來查閲隨事商酌是月遷兩廣總督奏言東省水患頻仍臣奉命勘辦一面通飭各屬講求疏濬修防之法一面與裘曰修會議濬伊家河以泄微山湖之水其河自韓莊迤西舊有河形處起至江南之梁旺城入運計程七十里需銀十三四萬一切須臣經理又尚有與河臣張師載勘濬運河並築堤工程皆刻不容緩之事懇恩留臣督辦諭曰覽奏具見良心然朕實因無人故不得不用汝仍遵前旨行十月諭曰山東河道鶴年甚為熟悉著仍回山東以總督辦巡撫事綜理一切工程運河即在境內可往來督辦不必専駐濟南十一月奏言濬運河為今第一要工但查南陽以下湖河現尚相連必先濬伊家河泄積水使久淹地畝漸次涸出然後履勘一律估修庶工實費省臣前派州縣等官分假承挑伊家河指日工竣運河事俟春暖鳩工不致有誤新運詔如所請又偕張師載奏言運河河身淤墊日甚若照常挑濬殊非經久之䇿請自濟寧以下之石佛閘起北至臨清閘止逐一探底以深八尺為度俾河身一體平坦上韙其言十二月奏伊家河工竣水勢消退狀諭曰伊河自開壩放水以來水勢消退漸露堤形將來陸續消涸隄工自可全露於運河民生甚有禆益在工諸臣能悉心籌畫甚屬可嘉鶴年等著交部議敘又奏濬運河四事一運河淤淺處必煞壩逐假測量核實挑辦庶帑不虛糜一縴路逼窄者多居民草土屋願售者每間以銀數兩買令拆移則堤身自寬其瓦屋不願變價者仍聼民便量為幫寬以期鞏固一被水民田須設法疏消趕種春麥况沿河原設有㴠洞應於糧艘回空之後煞壩未開之先兩次宣泄並酌增㴠洞歸於水利案內議估一煞壩橋梁應改修處所查有解江餘剩石料并應拆石塊俱堪適用請儘數先修不敷再行採買未便一例估報致費不資諭曰如此實心經理誠不負任使矣是月卒諭曰鶴年厯任巡撫頗能黽勉今春南巡時見其辦事妥協深堪委任是以擢用兩廣總督仍命在東辦理河務近據奏報挑濬伊河悉心籌畫俱能深愜朕懷開壩放水後積水漸消涸地甚廣雖履任未久勞績懋著遽聞溘逝朕心深為軫惻著加恩賞給太子太保兵部尚書銜入祀賢良祠仍賞銀三千兩料理喪事應得恤典該部察例具奏尋賜祭葬如例諡文勤子桂林官至兩廣總督自有傳鄂實鄂實滿洲鑲藍旗人大學士鄂爾泰第二子嗣其叔父御史鄂禮後乾隆元年由廕生授三等侍衛十三年命往金川軍營授二等侍衛十六年遷頭等侍衛十八年擢蒙古正紅旗副都統二十年調滿洲鑲藍旗副都統兼管健鋭營鄂實兄鄂容安時以參贊大臣於伊犂陳亡鄂實請從征許之會凖噶爾已故台吉達什達瓦之妻率屬來歸命鄂實齎茶幣迎賚之即赴西路軍營為領隊大臣達什達瓦妻尋請選所屬兵由珠勒都斯協勦叛賊阿睦爾撒納逆黨諭鄂實同內大臣厄爾錐音率之進勦二十一年正月授參贊大臣閏九月命還京授左翼前鋒統領仍兼副都統二十二年正月復赴西路軍營授參贊大臣六月定邊將軍成衮扎布檄協擒叛賊扎那噶爾布尼瑪等以地險馬疲中道而返諭曰若謂地險則賊衆何以能行若謂馬疲豈賊馬獨能壯健鄂實等自應尋蹤追襲即不能盡行勦滅而收其牲隻捉生取路自可前進何至撤回著查明覆奏鄂實等尋派兵二百令侍衛濟塞布副總管莽蘇爾等勦賊上以鄂實不親往申諭詰責十二月降藍翎侍衛自備資斧在軍營效力是月扎哈沁賊哈勒拜等遁往瑪納斯河源鄂實追戮賊百四十餘獲牲械甚多定邊將軍兆惠以聞諭曰此次進勦正值隆冬大雪之時馬力自當疲乏尚能勦賊奏功使去年進兵若此何患無成彼時鄂實係參贊大臣有事但諉之將軍不加策勵今自知負罪直前勦賊朕深悉其隱著加恩授為三等侍衛二十三年三月哈勒拜竄伏額卜推河其黨達爾扎巴朗聚牧鄂實同侍衛老格等掩擊生擒哈勒拜戮賊八十餘師次闥勒竒鄂實復同侍衛納蘭圖勦賊巴爾達穆特等三十户收其牲械諭部議敘十月隨將軍兆惠勦逆回霍集占於葉爾羌三戰殺賊甚多賊竄入城不出諜賊輜重屯城南英峩竒盤山謀取道城東乘虛往襲偕總兵髙天喜原任副都統三格侍衛特通額等渡黑水未半橋圮賊悉衆拒鄂實等力戰俱殁於陳事聞諭曰鄂實等奮勇殺賊盡瘁捐軀深可憫惻鄂實著照伊原任前鋒統領從優議恤尋賜祭葬諡果壯入祀昭忠祠恩賞騎都尉又一雲騎尉世職子鄂瀾襲二十四年回部平命圖形紫光閣御製贊曰其兄徇節其弟忍使欲報兄讐固請不已黑水之挫復以捐身超雪前罪賞延後昆鐘音鐘音滿洲鑲藍旗人姓覺羅禪乾隆元年進士改庶吉士授檢討二年在批本處行走六年充日講起居注官九年遷國子監司業十二年遷祭酒兼世襲佐領十三年三月擢內閣學士充殿試讀卷官閏七月遷盛京刑部侍郎十五年以失察郎中錫琳等玩法婪贓議降二級詔從寬留任十六年遷户部右侍郎十七年授陜西巡撫十九年閏四月疏言漢中府廣積倉大使别無職掌應裁榖改貯南鄭縣下部議行是月襲其髙祖阿爾岱所贈輕車都尉五月疏言陜省常平額貯糧二百七十三萬餘石因西同等府屬賑濟缺額節次買補尚缺穀二萬餘石今歲豐價減請照時價買貯如議行尋調福建巡撫二十年疏言臺灣流寓雜處請編保甲倘生事為匪即押遞原籍有藉稱墾地越畨界搭藔藉名採捕實則接引偷渡均拆藔驅還原籍嗣後內地領照過臺之人先赴官驗照如係偷渡解內地懲治從之又言閩省地方官開徴將錢糧一兩以上者聽花户交錢致州縣囤積日多發商易銀墨吏多收少發扣剋漁利價何由平臣飭屬凡錢糧至一錢者令花户封銀投匱責成該管官照例委員監收按期申報其一錢以下應收制錢三日內照數發商易銀毋使壅滯剋短並禁發典商營運至南臺閩安等處商舶雖定有額帶數目而違例多帶者未定專條今議額外夾帶錢十千以上笞五十勒令易銀二十干以上杖一百將錢一半入官五十千以上荷校一月錢全入官既可慎重海防民用亦裕得旨妥協為之勿因去弊而反滋弊也二十三年正月調廣東巡撫尋仍調陜西二十四年二月疏言陜省連年災歉倉貯空虛請將榆林等七州縣出口種地貧民給牛具籽種銀秋收照時價交還膚施等縣倉亦缺額照現有糧石出三借給為數無幾多借又於倉貯有礙請按種地多寡借銀俾春耕有賴秋後照時價交糧在民可免糶穀易銀在官不須發銀買穀得旨此因時制宜之法可行也二十五年疏言榆葭道僅轄榆林府五州縣應裁歸延榆綏道轄鄜州屬之洛川等三縣改歸糧道稽察下部議行二十七年正月西安將軍嵩椿調任來京奏陜西地方官接見將軍不照督撫例敕鐘音將陜省因何沿習違式之處查明據實具奏尋奏請酌改儀注諭曰鐘音覆奏摺糊塗不堪已於摺內批示兹因嵩椿面奏伊在西安曽有道旁呈遞手本並不跪接之員並非體制是以降旨飭查而鐘音並不實言其事之有無一味顢頇但稱酌改儀注妄意調停了事所見已屬大謬復經明切傳諭雖甚愚懵亦當了然洞悉矣今乃輾轉執迷不悟所奏竟至出人意表如稱前此司道接待將軍俱相沿舊習非敢於將軍嵩椿之前傲慢失禮一似朕庇護嵩椿為之爭論體統又有蒙恩不加嚴譴仍令確查云云此則成何言語夫嵩椿何人鐘音乃於朕前奏事竟有敢不敢之辭耶試問方今即有舉朝重臣及欽差大吏稍示威福令地方官委曲承奉者朕寧肯稍假借之又何有於嵩椿此皆萬無可置論之事而鐘音憒憒若此何以能勝巡撫之寄可見封疆中處非其據茍冀無事善藏者不少朕轉不能不為深慮矣鐘音著傳旨嚴行申飭尋命來京補授兵部侍郎七月諭往巴里坤軍營辦事二十九年四月疏言巴里坤東至呼濟爾台西至鄂什希原設卡倫十八處今凖噶爾平巴里坤已成內地除通烏里雅蘇台歸化城闢展烏魯木齊等處大路者尚須巡查餘兵皆撤回從之十月詔回京三十一年六月教習庶吉士八月授廣東巡撫三十五年二月丁母憂諭來京署吏部侍郎四月充武英殿總裁閏五月署福建巡撫十二月兼署閩浙總督三十六年五月實授閩浙總督加太子少保六月疏言臺灣流寓既難概為查逐似宜隱寓招徠向例由臺渡回內地廳縣給照汛口盤驗放行役兵留難每致裹足請嗣後回籍者概免給照準自赴鹿耳門開姓名總單由船户持交口岸員辨挂號放行報臣衙門備案自內地渡臺者遵例給照盤驗稍為變通則欲回者無所阻遊民自必漸少如所議行三十七年疏言浙江大荆營暘谷嶴有南合北合溪心等村生齒日繁商販往來應設汛查橫山汛原駐把總一外委一兵五十以防海口今海口淤塞商船漁艇久不通請改汛為塘留兵五撥把總一帶兵二十五移駐暘谷嶴北合設塘駐外委一帶兵十南合設塘駐兵十大芙蓉汛轄之西店嶺墩地非要隘原設兵八應撥五人移駐溪心下部議行三十九年入覲御製詩賜之曰海江保障寄儀型弗動色聲措輯寧述職咨詢近前席歸轅荏苒别明廷兩疆所部連康歲一路應知是福星勗爾莫渝終始志昭昭原不若惺惺四十一年兼署福建巡撫四十三年二月授禮部尚書充經筵講官三通館四庫全書館副總裁兼正藍旗蒙古都統九月扈駕盛京卒於途諭曰禮部尚書鐘音敡厯內外奉職恪勤且在滿洲科目中尚為通達事體因擢授秩宗方加任使兹以扈從途次忽覯沉疴特遣太醫診治並令先期回京調攝以冀速痊遽聞溘逝深為憫惻著加恩晉贈太子太保應得恤典著該部察例具奏尋賜祭葬如例諡文恪子恩慶襲一等輕車都尉恩明現官安徽按察使恩長現官湖南按察使鄂弼鄂弼滿洲鑲藍旗人大學士鄂爾泰第三子乾隆五年授三等侍衛二十三年授漢軍正紅旗副都統尋署刑部侍郎二十四年十月授山西巡撫十二月奏辦賑四條一陽曲靜樂岢嵐嵐縣興縣積貯不敷散給已請撥南路收存豫米三萬石但嵗暮民多運貨糧運壅滯請就近將欣州汾州府屬米借撥明春運還一加賑口糧定例正二月開賑災重迫不及待現飭加賑兩月者嵗內先給一月折色一月者先給半月折色餘俟明春按期補放一籽種按畝借給為數頗多百姓領借後將粟穀易雜糧布種給以折色為便一加賑口糧照例題定本折色各半今奉旨加增折價民間以領銀購雜糧充食為幸請將加賑三月四月者各給一月本色餘俱給折色上嘉勉之二十五年四月疏言陽曲縣王封山場陽城縣東冶山場磺洞遼濶前撫臣明德奏請移駐同知每季輪派守備千把各一帶兵巡查路逺費多巡查甫熟已屆更換請就近移汾州城守營千總兵六十駐王封山𨽻太原營參將轄潞澤城守營千總兵四十駐東冶山𨽻澤州營都司轄仍令太原營守備澤州營都司每季會同知巡查一次部議從之五月疏言晉省連年偏災撥賑平糶各倉穀尚未買補今平蒲絳解等屬麥熟請將臨汾等州縣應買補穀一石收麥六斗米一石收麥一石如無應補穀及出糶米並請於司庫現存溢額穀價內酌州縣大小麥收盈縮採買備次年糶借奏入報聞六月疏言緑旗兵配執技藝分弓箭鳥鎗藤牌大炮四項藤牌係短兵必大隊方可衝突其摧堅致逺不及鳥鎗等項請將晉省南北兩路各營額兵三百名以上仍設藤牌兵三百名以下毋庸設挑技藝純熟者歸併大營餘俱改為鳥鎗弓箭兵七月疏言大同府豐鎮廳朔平府寧逺廳所轄地在邊外通判駐劄處無城庫獄防範難周請將鎮羌堡把總移豐鎮廳仍歸德勝營參將轄殺虎協把總移寧逺廳仍歸本協副將轄各撥兵四十以三十名防守庫獄十名妥設塘汛均下部議行二十六年二月上巡幸五臺諭曰從前兩次巡幸五臺帳殿周廬隨常頓宿今春恭奉皇太后前詣臺山巡撫鄂弼於菩薩頂側建蓋行宫並於臺麓寺旁添設數楹以供安憩朕詢其工料費乃出自養亷夫朕既不許派纍百姓而各官養亷原為辦理公務及薪水之資今以之捐建行宫則甚不可著於存公項內撥賞銀二萬兩以供鳩工飭材之用時上以太原滿營城守尉嵗支俸米百三十斛銀百三十兩辦公拮據諭鄂弼議給養亷鄂弼請照保定城守尉例於文職空缺養亷內嵗支給二百兩從之二十七年五月調陜西巡撫兼署將軍尋疏言西安駐防出旗為民之驍騎校前鋒領催馬步甲及炮手匠役千五百一名間散丁壯二千四百五十一名婦女幼丁奴僕四千九十二名內出缺裁汰者止二百五十餘名間散壯丁仍居滿城依親朋糊口當差旗人更多重纍請選人材健壯者於督撫二標及城守營步兵出缺與緑旗輪流間補俾有效用之路近省潼關鳯翔等協並提鎮標營皆可移往間補詔如所請行二十八年正月疏言西安派往烏魯木齊等處換班官六十一員兵二千三百六十二名內有乾隆二十三年派往中途減退回營者領過俸賞車價銀應於此次扣除歸欵但事經五載銀已用去現在辦裝拮據請先將車價扣還俸賞扣十分之二餘作四年分扣奏入報聞五月疏言臣上年奏請興修鳯翔漢中通川棧道今查閲營伍順道詳勘自寶雞大散關至寧羌州與川省交界之七盤關止各工俱屆完竣但將來難免日久損壞請撥經費餘息銀一萬兩交南鄭十二州縣營運生息貯府庫責成漢興道總理隨傾隨修彚奏核銷如應大加修治確估奏明動工從之六月授四川總督未蒞任卒諭曰鄂弼自簡任巡撫以來實力宣猷恪勤懋著昨降旨補授四川總督正望其及時效用忽聞溘逝深為軫惜著加賞贈尚書銜入祀賢良祠應得恤典該部察例具奏尋賜祭葬諡勤肅桂林桂林滿洲鑲藍旗人姓伊爾根覺羅父鶴年官兩廣總督自有傳桂林由廪生捐主事乾隆二十五年授工部主事洊遷郎中三十三年遷山西河東道三十五年遷山西按察使三十六年三月擢户部侍郎在軍機處行走九月命往四川辦理軍務桂林至成都以山路﨑嶇民夫背運軍糧動以千數彈壓撫綏祗建昌道白瀛一人難以分理增委幹練佐雜按程巡查丞倅督站員散給口糧工價知府總司其事十一月奏言清溪縣南至打箭爐軍糧藥彈多堆積緣運價俱承辦各員墊給藉口遲延酌暫支打箭爐同知庫貯銀八千兩給站應用俟司庫銀到歸欵得旨嘉奬旋授四川總督是月小金川頭人在卡外投文呈送禮物桂林檄列其酋僧格桑罪狀斥回諭曰僧格桑跳梁肆惡抗拒官兵非搗穴擒渠不足以示懲創今看所投文稟詞意鴟張賫稟頭人自應即時拘執嚴刑根究庶得賊巢確實情形攻勦亦易為力乃放縱回巢而所辦檄諭意類調停並不辭嚴義正桂林著嚴行申飭十二月督兵復約咱斬賊百餘級生擒六人諭曰桂林等奏攻得約咱賊寨辦理大有起色可見事在人為桂林能實心奮往遂見實效前已授伊為總督似此方克受朕恩眷又奏攻克約咱東山梁大碉一平碉四石卡二十餘上嘉之復請添調黔陜兵五千諭曰桂林等十一月二十日即攻得約咱距此拜摺之時已逾兩旬何以至今尚無信息看來桂林竟是靜住約咱専待續調之兵方擬前進殊昧兵貴神速之道桂林一路已有兵八千餘名雖云分防各處要隘何至用至六千餘名之多前次阿爾泰等分派過多以致存兵太少不敷進勦之用桂林到彼何亦不知另為調度仍令以有用之兵置之無用之處乎前次桂林統兵奪取約咱並續得東山梁碉卡頗知奮勉彼時賊人受創膽寒我兵若乘勝進攻賊必望風股栗易若摧枯而官兵乘勝之後正當勵其鋭氣及鋒而用今乃逗遛不進坐致老師不知師老則志隳桂林即未曽經厯行陳而於事理所在亦可籌度而得豈伊一經擢用不復黽勉自勵耶溫福攻得巴朗拉帶兵直進已得制勝之勢且其地距美諾亦止一百五六十里是該處為進攻正路較南路為尤要所帶僅有黔兵三千亦不可無精鋭接續現已飛諭書明阿即帶陜甘兵二千名由維州取道趕至溫福軍營應用其餘三千名令赴約咱一路以供桂林之用桂林須力圖奮往毋再遲延干究旋奏令總兵宋元俊等設伏喇嘛寺深林桂林及阿爾泰等督兵逼卡丫元俊擊斬賊九十餘級克木城石卡碉寨獲刀矛鳥鎗乘勝占據寺東墨爾多山梁諭曰一切布置合宜欣慰覽之於無意中用汝竟能得力亦賴半載在軍機處日聽朕訓也三十七年正月攻克卡丫越日復攻克郭松甲木噶爾金斃賊無算獲碉房石卡甚衆奏入諭令益當奮勇前進二月攻克噶爾金之後山梁並東山梁之山凹邦科地方一面攻東山梁一面襲阿仰由墨壟溝進取達烏上嘉之又奏言索諾木添兵助惡總以求賞革布什咱為辭今若差人宣諭則彼成絶望必預作凖備或竟收革布什咱民人盡换金川畨悉力嚴防辦理更難臣思與其會攻於事後莫若迅發於幾先兩酋朋比為姦正以我現勦小金川不能兼辦金川是以從中滋擾此時索諾木自必注意西南兩路所占革布什咱地不能分駐多人若乘索諾木兵力未備革布什咱人心未定之際相機而動正可撫勦並行詢之宋元俊亦稱革布什咱被金川侵占畨衆勉強服從果迅發大兵俾金川猝不及防自可先行收復隨遣守備陳定國赴巴旺布拉克底與革布什咱交界處察金川畨情動靜臣與元俊分兵五路進約將軍溫福等合擊三月桂林令革布什咱投誠頭人旺勒丹等潛約其戚嘉琿爾幫內應夾攻收復革布什咱寨落七十餘里招撫畨民甚衆並令元俊定國帶綽斯甲布土兵據甲爾壟壩俾金川四面受敵諭交部議敘是月奏報元俊率兵赴黔資溝攻吉地斷其水道燒斃賊畨百餘進勦丹東桂林復以東山梁墨壟溝懸崖路窄積雪未消賊嚴守難越飭暫緩鎗炮暗伏山腳巖洞中伺賊防稍懈即乘機奪隘諭曰桂林奏克復革布什咱之吉地官寨及黔資溝地方所辦俱好黔資溝既已占據阻其應緩甲爾壟壩又預約綽斯甲布派兵堵截自不慮索諾木之復來爭奪但宋元俊所統兵練甚多莫若趂賊人防守未定之時乘勝直搗其巢併將索諾木擒獲果能將金川剪除其餘各土司自更畏威守法方為一勞永逸桂林當酌量情形隨機妥辦總以動出萬全為要至另摺所奏墨壟溝山嶺一帶擬將鎗炮暫緩施放飭令各兵密於巖洞藏伏賊畨防禦久疲見此心必疏懈我兵即可乘機奪隘所辦甚合機宜亦屬出竒制勝之䇿旋奏臣等察看扎哇窠山梁崖下有溝內立碉卡若過此溝更可進攻阿仰隨令侍衛鎮將由東山梁墨壟溝山嶺攻擊以張聲勢選辨兵濳赴扎哇窠山梁縋崖設伏臣等督辨兵由東山梁墨壟溝兩路奮攻扎哇窠伏起賊驚竄克溝內大碉一石卡二十一别遣參將常泰環攻黨哩革畨內變頭人安幫等迎獻所殺金川賊級都司李天貴等圍沙沖革畨從內占據碉房金川賊進退無路我兵痛殱之黨哩沙沖地盡復四月又奏總兵英泰等攻克達烏官寨上嘉其調度深合機宜賞御用玉韘是月又奏攻克格烏巴桑及那隆山嶺元俊攻克丹東及覺拉喇嘛寺誅賊頭人三畨衆百三十餘革布什咱地盡復陳定國所調綽斯甲布兵檄暫駐交界候調諭曰革布什咱之地全行收復辦理頗為迅速惜所籌未能妥合前遣陳定國往綽斯甲布調令發兵占據甲爾壟壩該酋業已發兵今既盡得革布什咱之地正當乘勝進勦金川攻其無備乃宋元俊飭令綽斯甲布畨兵暫駐界上聼候調遣失此極好機會甚為可惜又摺內奏稱該地當人心初定應於要隘處駐守官兵以資防範等語桂林所見亦誤革布什咱之地久為金川侵占今經官兵收復節次殱其防守畨衆甚多又殺其頭人三名索諾木豈有不知况聞索諾木已將幫助小金川之賊兵撤回必係知官兵復其侵地懼而自防尤當乘其未備之時出其不意先發制人今宋元俊辦理既錯桂林即應就近申飭不當聼其坐守觀望桂林在軍營節次所辦事務悉能妥合惟此一節則不免失算昨又傳諭文綬備調兵三千名兵力不為不厚溫福桂林當竭力相機妥辦旋奏攻達烏東岸山梁及甲爾木侍衛六十一參領普寧參將薛琮陳亡自以籌畫未周請交部治罪詔免五月元俊與原任四川總督阿爾泰劾桂林冒昧發兵傷亡六百餘人又復於四月初六夜迫薛琮同侍衛將備等領漢土兵三千餘從墨壟溝進約繞至前敵山梁接應夾攻初八日桂林始與副都統鐡保提督汪騰龍等行至前敵山梁桂林遽先回卡了軍營並將明亮鐡保汪騰龍等撤回薛琮糧盡請援始令都司廣著往賊已據險軍盡覆脫出僅二百餘人及巴旺布拉克底明正土兵數百桂林虛詞陳奏又在卡丫修房居住勒取屬員供應與鐡保汪騰龍終日酣飲在營將備罕得見面密令汪騰龍交總兵王萬邦銀五百贖取所遮官兵以圖掩飾得旨革職拿問命額駙尚書公福隆安往審尋審明所劾皆虛惟官兵傷損不即查奏屬實至贖取官兵係戶部司員汪承霈聞有巴旺布拉克底土兵送出迷失官兵信告知桂林取銀五百交汪騰龍備賞其王萬邦給宋元俊書札揑寫收銀向金川贖人係為宋元俊所愚請分别治罪詳福隆安傳諭曰前阿爾泰宋元俊會參桂林乖張欺罔至有將銀向金川贖取迷失兵丁之事因將桂林革職拿問特派福隆安馳往軍營勘問旋據審明桂林並無造房居住驕縱不法各欵至薛琮告急稟至桂林即派宋元俊赴援其發銀贖取兵丁一節係司員汪承霈及知州曹焜以巴旺布拉克底土兵尋覔緑營迷失之兵頗為出力是以向糧員取銀備賞曽經稟知桂林支發非欲賞金川之人並審出宋元俊搆陷串飾情節則桂林尚非法所難貸但其在軍營內日親麯糵止圖已身安逸不能與士卒同甘苦而北山梁傷損官兵亦不得謂之無罪著加恩發往伊犂自備資斧效力贖罪交與舒赫德令在印房學習當差三十八年七月詔給三等侍衛銜往四川軍營辦理糧運十二月奏言南路糧運程逺須兼資土司烏拉此時達木巴宗一帶存糧充裕將軍阿桂令分運接濟臣飭由美諾趕運章谷章谷存米毋庸運南路軍營緣南路進勦皆以章谷為後路章谷存貯有餘則轉運軍營自易三十九年正月奏言明亮移駐附近章谷之格藏橋由巴旺布拉克底進兵一切供運若取資章谷恐緩不及濟查巴旺官寨距臨卡三站係適中之地已令臬司李世傑運貯米千二百石俟大兵進後再將巴旺存糧趕運臨卡奏入均報聞四月奏言科多至僧格宗深箐僻逺請將僧格宗所需糧石改由南路章谷運交附近僧格宗等處就近支領上是之六月奏言僧格宗一帶山險前橫大河我兵營卡不能瀕河安設賊慿髙滚石放鎗我仰攻不甚得勢現令僧格宗至科多一路防兵移駐河南據險要俾賊無從施其鬼蜮上嘉之四十年四月授頭等侍衛九月授四川提督四十三年授兩廣總督四十四年二月廣西桂林柳州二府旱桂林恐穀價昻奏撥預備廣東平糶榖十萬石分貯水次各州縣酌量動撥奏入報聞十二月卒諭曰兩廣總督桂林才具優長辦事敏練簡任封疆正資倚畀忽聞溘逝深為軫惜著加太子太保銜任內處分並著開復應得恤典該部察例具奏尋賜祭葬如例諡莊敏貴林貴林滿洲鑲藍旗人姓張佳由護軍補鳥鎗藍翎長乾隆三十四年從征𬗟甸十月隨營總仁和在新街擊賊得頭等功牌一後數日隨副都統海蘭察殺賊於老官屯又得頭等功牌三十五年補鳥鎗護軍校三十七年擢為委護軍參領次年補副參領三十九年授山西河保營參將四十三年軍政卓異注册四十六年授廣東羅定協副將五十二年三月帶兵赴臺灣征勦賊匪時南路賊莊大田破鳯山貴林先同將軍常青留府城守禦後數月北路賊攻嘉義城中告急常青奏以貴林與總兵蔡攀龍赴援有旨賞戴花翎復諭曰副將貴林等協力攻勦奮勇可嘉應加恩升擢所有浙江溫州鎮總兵員缺即著貴林補授八月貴林與蔡攀龍及逰擊楊起麟都司杭富帶兵千六百及義民三千運糧赴嘉義抵縣城蔡攀龍護糧餉及義民先入官兵半在城外忽賊衆突至遮殺貴林等不得前轉戰至正音莊衆寡不敵貴林與起麟杭富俱歿於陳九月總兵普吉保以聞奉上諭貴林等前經常青派赴諸羅援應奮勇打仗甚為出力是以降旨將貴林補授總兵楊起麟補授參將並俱賞戴花翎今貴林楊起麟同都司杭富因勦捕賊匪臨陳捐軀殊屬可憫貴林著照總兵例議恤楊起麟著照副將例議恤其都司杭富亦著照例議恤以示憫恤十一月上因勾到又諭曰貴林楊起麟邱能成諸人皆因奮勇勦賊臨陳捐軀即敕部從優議恤一律得給世襲以示軫惻設郝壯猷當賊擾鳯山時能奮不顧身授命疆場亦可與貴林等同邀恤典是與其死於國法曷若歿於戎陳刑賞昭然惟人自取尋兵部議給騎都尉世職三次俟襲完時給恩騎尉世襲罔替恤銀七百兩全葬銀四百兩致祭一次入祀昭忠祠貴林長子丹巴多爾濟襲世職五十四年病故次子尚安承襲欽定八旗通志卷一百八十三
