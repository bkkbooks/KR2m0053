body:
  text: 氏族志七八旗高麗譜系李氏凡七派一出黄河套一出開城府一出平安道一出易州一出葢州一出栁闗屯一出李佳堡國謹案李氏係高麗國王之姓我族𨽻滿洲旗分者家肇興東土即稱臣内屬其氏㫖以甚繁今纂八旗氏族志書謹遵李氏列於高麗姓氏之首金氏凡七派一出易州一出海州一出開城府一出金家堡一出望京一出葢州一出紅溪堡韓氏凡二派一出易州一出安法朴氏凡五派一出易州一出平壤一出開城府一出平安道一出蜀州張氏凡四派一出易州一出望京一出開州一出碧漢傅氏謹案氏族通譜所載是派無考柏氏系出易州洪氏凡四派一出南大門一出得州一出易州一出開城府崔氏凡四派一出易州一出􅏨克山一出開城府一出得州劉氏凡二派一出安法一出博川郡黄氏凡三派一出易州一出開州一出盖州岡氏凡二派一出易州一出望京楊氏系出輝寕吴氏凡二派一出易州一出海州陳氏系出平壤文氏系出嘉山堡孫氏系出望京丁氏系出恩山縣任氏系出易州伊氏謹案氏族通譜所載是派無考宋氏謹案氏族通譜所載是派無考徐氏系出噶山車氏系出平陽萬氏系出平陽江氏系出得州邉氏系出易州何氏系出平安道閔氏系出易州林氏謹案氏族通譜所載是派無考佟氏系出開州瓦氏系出易州耿氏系出博川郡宋氏凡三派一出得州一出東牛衛一出輝寜馬氏系出􅏨克山鄭氏系出得州曹氏系出建常郭氏系出易州沈氏系出得州方氏系出得州秦氏系出得州孟氏系出易州田氏系出平壤辛氏謹案氏族通譜所載是派無考欽定八旗通志卷六十
