body:
  text: 欽定四庫全書欽定八旗通志卷一百三十二人物志十二宗室王公傳十追封多羅誠毅勇壮貝勒穆爾哈齊襄敏固山貝子務達海勒原封鎮國公漢岱平追封多羅篤義剛果貝巴雅喇多羅安貝勒杜度追封誠毅勇壯貝勒穆爾哈齊穆爾哈齊顯祖宣皇帝第二子以功賜號誠毅嵗乙酉四月從太祖髙皇帝征哲陳部值大水遣衆兵囘留八十人畧地而前有嘉哈部長蘇庫賚呼者宻告哲陳部主於是托摩和章嘉巴爾達薩爾滸界藩五城俱集兵以待上執麾前進穆爾哈齊及近侍延布禄烏靈阿隨上直入重圍殺二十餘人敗其衆敵奔界藩争赴渾河遁穆爾哈齊復隨上渡河追躡其後至吉林崖立其巔見兵由旁徑來上慮為敵所見去冠纓隠身以待射其前至者一人貫其脊而殪穆爾哈齊又射殪其一餘多墜崖死太祖曰今日之戰以四人而敗八百之衆乃天助我也天命五年九月穆爾哈齊以疾卒年六十上親往奠順治十年六月追封多羅貝勒諡勇壯爵除襄敏固山貝子務達海務達海誠毅貝勒穆爾哈齊第四子天聰八年十二月授騎都尉崇徳三年任刑部左叅政四年八月封三等輔國將軍五年二月任鑲白旗副都統十一月隨鄭親王濟爾哈朗圍錦州偵知敵於杏山塔山間運糧芻夜畧之擒斬甚衆七年六月擢刑部承政先是務逹海隨貝勒阿巴泰征明分畧山東登州未至離衆先歸八年七月部議削世職罷副都統任上免之祇奪所賞俘獲入官順治元年四月隨睿親王多爾衮入山海闗定燕京敗流賊李自成二年二月叙功晉封二等輔國將軍四年正月以議鄭親王造府踰制罪瞻徇削世職六月晉一等輔國將軍九月晉三等鎮國將軍五年三月同都統阿頼等駐防漢中是年晉固山貝子六年四月同鎮國公屯齊哈輔國公巴泰往大同更代英親王阿濟格討叛鎮姜瓖八月仍命阿濟格赴大同務達海還京七年五月任議政八年五月攝都察院承政十一年十二月同定逺大將軍世子濟度統官兵往福建征剿鄭成功中途疾命囘京十二年五月薨諡襄敏爵除原封鎮國公漢岱漢岱誠毅貝勒穆爾哈齊第五子天聰八年十二月授騎都尉尋封一等奉國將軍崇徳二年四月與議政六年八月隨上征明圍松山敗明總兵吳三桂等漢岱率所部追擊大破之七年隨饒餘貝勒阿巴泰攻明薊州河間景州克兖州十二月即軍前授兵部承政八年六月凱旋賜銀二百兩縀六疋順治元年四月隨睿親王多爾衮入山海闗擊敗流賊李自成叙功晉三等鎮國將軍十月隨定國大將軍豫親王多鐸南征至潼闗連破流賊前營旋同副都統伊爾徳侍郎尼堪等由南陽路趨歸徳克一州四縣四月渡淮克揚州獲船百餘十月賜金二十五兩銀千三百兩三年正月授鑲白旗滿洲都統五月同貝勒博洛趨杭州追擊明魯王朱以海於台州是月晉一等鎮國將軍十一月同貝勒博洛進征福建破明唐王朱聿鍵之總兵師福於分水闗入崇安縣撫定興化漳州泉州叙功晉輔國公五年四月同貝子屯齊征陜西逆囘㑹總督孟喬芳已擊斬米喇印丁國棟遂奉命同謙郡王瓦克達貝子尚書等赴英親王軍駐防大同六年七月隨親王滿達海𠞰賊朔州寧武克其城移師攻遼州賊迎戰漢岱偕䕶軍統領希爾根擊敗之並降屯留襄垣榆社武鄉等縣七年十二月任吏部尚書兼攝正藍旗都統八年二月調刑部尚書三月以不陳奏英親王私藏兵器事削世職罰鍰五月晉封鎮國公九年四月復調吏部尚書七月隨定逺大將軍敬謹親王尼堪征湖南瀕行賜蟒衣鞍馬弓矢刀帶等物十二月敬謹親王戰殁上命貝勒屯齊代其軍漢岱亦合營十年三月擊敗明桂王朱由榔之秦王孫可望等兵十一年十月追議隨敬謹親王戰没罪削爵十二年正月復任吏部尚書二月加太子太保八月封鎮國將軍品級十三年四月以河西務鈔闗員外郎朱世徳虧課萬餘兩户部援赦免罪吏部亦弗置議廷議解漢岱任諭曰漢岱於湖南失事情罪重大考之成憲即應正法朕念係宗室姑從寛免且加任用乃不思感恩報効圖盖前愆反依阿蒙蔽負朕大恩本宜重處復念宗室從寛着革任削太子太保鎮國將軍品級爵除追封多羅篤義剛果貝勒巴雅喇子拜音圖巴雅喇顯祖宣皇帝第五子太祖高皇帝之弟初授台吉嵗戊戌正月太祖命與長子禇英征安楚拉庫路夜取屯寨二十降萬餘人賜號篤義丁未年四月命征東海窩集部取赫席赫鄂謨和蘇嚕佛訥赫托克索三路俘二千人天命九年九月薨年四十有三順治十年五月追封多羅貝勒諡剛果爵除巴雅喇第三子拜音圖初於天聰八年四月太宗文皇帝加恩宗室授為三等子爵與功臣同六月隨貝勒阿濟格迎察哈爾來降之土巴濟農九年十二月授鑲黄旗都統崇徳元年五月隨武英郡王阿濟格征明畧保定府攻安肅縣克之九月師還十月同諸王大臣以所獲陳獻篤恭殿前部臣差等以聞上曰朕聞拜音圖不忘君上俘獲之時即簡選收藏携歸進獻具見敬忱甚為可嘉十二月從征朝鮮以騎入其城收其輜重三年十月睿親王多爾衮征明同都統圖爾格敗敵於董家口毁邊牆入克青山闗下四城六年八月議拜音圖弟鞏阿岱隨大軍圍錦州時臨陣退縮罪下王大臣㑹鞫拜音圖拂袖出坐狥庇論死得㫖革職罷都統任並罰鍰尋率兵助睿親王軍於錦州復同貝勒多鐸圍守松山七年六月復都統任順治二年正月隨豫親王多鐸敗賊將劉方亮於潼闗是月封一等鎮國將軍三月賜繡服一襲四月南征克揚州以舟師破其兵於江南岸六月同貝子博洛攻下杭州十月叙功賜黄金八十白金四千鞍馬一三年五月授三等公尋隨豫親王擊敗喀爾喀部兵晉封鎮國公五年十一月晉封固山貝子隨英親王阿濟格戌大同六年九月攻叛鎮姜瓖餘黨於沁州賊遁㧞其城復圍偽道胡國鼎於潞安殱之十月晉封多羅貝勒九年三月以依附睿親王削爵幽禁黜宗室爵除多羅安平貝勒杜度子杜爾祜弼穆爾祜爾祜薩特杜度原封廣畧貝勒禇英長子太祖高皇帝孫也初授台吉天命九年喀爾喀巴約特部台吉恩格徳爾請移居東京杜度隨大貝勒代善等徙其户口來歸尋封貝勒天聰元年正月同二貝勒阿敏貝勒岳託等征朝鮮屢戰皆㨗朝鮮王李倧懼遣使議和諸貝勒許之阿敏欲直趨其都謂杜度可同往杜度變色曰皇上乃吾叔父何可逺離耶遂與岳託等議定盟而還二年二月上征多羅特部命杜度㽞守三年十一月隨上征明薄京城明大同總兵滿桂宣府總兵侯世禄以兵来援杜度與大貝勒代善等擊敗之又同貝勒濟爾哈朗率兵畧通州燬其船攻克張家灣上班師至薊州遇明山海闗援兵五千杜度等擊敗之事具英親王傳十二月命杜度統本旗兵往駐遵化四年正月明兵攻遵化杜度逆擊斬其副將一獲駝馬千計五年七月上征明以杜度㽞守六年四月大軍征察哈爾杜度仍㽞守七年三月奉命監築鹻塲城五月明將孔有徳耿仲明来降懼明及朝鮮兵阻截杜度同貝勒濟爾哈朗阿濟格等迎之於鎮江岸䕶其眷口輜重以來明及朝鮮兵不敢追六月詔問征明及朝鮮察哈爾三者何先杜度奏言朝鮮已在掌握宜緩征如察哈爾來逼則征之若尚逺可先取大同邊地秣馬以觀其勢如逼近察哈爾則往征之察哈爾若敗遁即深入明境若破察哈爾天下自然膽裂矣八年五月奉命防守海州保邊禦敵崇徳元年四月叙功晉封多羅安平貝勒九月明將造巨艦百餘横截遼河為守禦計守海州河口伊勤慎以聞命杜度濟其師敗却明兵而還十二月上統兵征朝鮮遣杜度等䕶輜重後行諭簡精騎畧皮島雲從島大花島鐵山島至則居民先遁焚其廬舍二年二月抵臨津江時氷已泮不可渡忽一夕大雨雪寒甚氷復凝越日軍數萬徑渡狀聞上喜曰嘉祥洊至皆天意也是月同睿親王多爾衮取朝鮮王妻所居之江華島我師將渡江敵船百餘列兩翼以拒杜度等督舟師衝入發紅衣礟敵遁我兵登岸復擊敗其兵千遂克其城朝鮮降三年二月上親征喀爾喀杜度同代善濟爾哈朗㽞守併監築遼陽都爾弼城是月明石城島總兵沈志祥挈属来降杜度運米濟之八月命岳託為揚威大將軍征明杜度副之自宻雲東北牆子嶺入明兵千餘逆戰杜度督王延祚等擊敗之進攻牆子嶺分兵入破明黑峪闗古北口黄崖口馬蘭峪等闗尋岳託以疾薨於軍杜度總軍務與左翼軍㑹於通州河西越京城西抵山西南抵濟南降城克敵事具睿忠親王傳四年四月凱旋賜馬二駝一銀五千八月命管禮部事九月與貝勒濟爾哈朗等畧明錦州寧逺五年四月上廵視義州杜度留守六月與睿親王多爾衮往代鄭親王濟爾哈朗等於義州築城屯田七月明錦州兵由城西北隅來犯敗之又克城西九臺小凌河西岸二臺尋聞明總督洪承疇率兵四萬營杏山城外遂同諸王貝勒等迎擊敗其騎卒掩殺至城壕又率右翼兵伏寧逺路明兵自闗内運米錦州殺其步卒三百餘八月前往錦州斬明兵出樵採者八十六人又率師往杏山誘擊敵兵偵松山兵出馳赴之三戰三㨗敵遁九月代還十二月復同睿親王等代鄭親王圍錦州六年二月攻廣寧山城擊斬明松山援兵二百四十及錦州兵之出獵小凌河者百七十餘人三月以聴從睿親王離城逺駐遣兵私囘論削爵奪所属户口詔從寛罰鍰六月復圍錦州明闗内援兵出松山戰敗其衆追逐五里許八月從上親征九月駕還留杜度圍錦州七年六月薨於軍年四十有六時諸王貝勒等方集篤恭殿㑹議出征功罪而杜度之訃適至上為之罷朝命䕶軍統領圖頼等往奠以其長子杜爾祜降襲鎮國公雍正二年立碑紀功杜爾祜初封輔國公崇徳六年八月隨上圍松山敵夜遁諸將士相繼追擊杜爾祜恐後有敵兵少待已而無至者亦隨衆追擊大破其衆七年三月隨大兵圍錦州祖大夀以城降詔杜爾祜還京六月降襲其父爵為鎮國公十月㕘領拜山等首其怨望論削爵黜宗室籍順治元年十一月隨定國大將軍豫親王多鐸南征有功二年二月復封輔國公入宗室十月叙功賜黄金五十白金二千五年九月隨鄭親王濟爾哈朗征湖廣六年四月敗賊於永興抵辰州賊渠一隻虎遁追擊之進𠞰廣西定全州七年正月凱旋賜白金六百事具鄭獻親王傳八年二月晉封多羅貝勒九年十月任議政大臣十二年二月卒年四十有一諡曰慤厚以杜爾祜第五子敦達降襲固山貝子康熈十三年九月卒諡恪恭以敦達次子普貴降襲鎮國公三十七年四月諭宗人府察行走勤惰議奏普貴原有瘋疾今雖愈不便令其行走應革退上以普貴向來行走尚優既稱瘋疾已痊仍着照常行走雍正元年十月以病削爵命普貴第十一子智保降襲輔國公三年正月卒以普貴第十三子蘇保襲封輔國公四年十二月卒以普貴第七子誠保襲乾隆十九年九月卒諡温禧以誠保次子慶春襲封奉恩輔國公三十八年六月卒以慶春長子恒寧襲杜度第二子穆爾祜天聰九年五月命隨貝勒多鐸率師入寧錦界立營以牽制明兵使毋援山西仍沿途畧地獲馬二百餘克臺一崇徳元年封輔國公七年十月以怨望削爵黜宗室籍順治元年十一月隨定國大將軍豫親王多鐸南征剿流賊李自成先後破其二營賊犯我前鋒兵同㕘領鄂博擊敗之我軍近山設伏有賊自山上來犯又敗之二年授三等鎮國將軍復入宗室三年叙功晉一等鎮國將軍五月隨豫親王多鐸追騰機思擊敗土謝圖汗及碩雷汗兵四年三月封輔國公五年十二月大同總兵姜瓖叛穆爾祜奉命同敬謹郡王尼堪等討之師至寧武闗擊敗賊兵及左衛賊兵之來犯者六年十月晉封固山貝子九年七月隨定逺大將軍敬謹親王尼堪征湖南賜蟒衣鞍馬弓矢師至衡州敬謹親王尼堪戰殁上命貝勒屯齊代其軍與穆爾祜合營三月明桂王朱由榔將孫可望與都督馮雙禮軍合我師擊諸周家坡獲馬七百十一年十月議隨敬謹親王戰殁罪削爵穆爾祜次子長源於順治十六年降襲三等鎮國將軍品級康熙三十四年病削爵子察爾岱降襲三等輔國將軍品級雍正十一年八月卒子諾爾博降襲三等奉國將軍品級乾隆二十五年以病休次年卒子鳳文降襲奉恩將軍品級四十年授三等侍衛五十年授䕶軍㕘領杜度第三子特爾祜崇徳四年八月封輔國公六年隨大兵圍錦州敗明兵杏山松山間七年三月明總兵祖大夀降特爾祜移師駐塔山尋克之十月以怨望削爵黜宗室籍順治元年隨睿親王多爾衮入山海闗破流賊李自成追至望都十一月隨定國大將軍豫親王多鐸南征敗流賊於潼闗二年二月封輔國公復入宗室十月叙功賜黄金五十白金二千六年十月晉封固山貝子十五年二月卒年四十諡恪僖十八年以特爾祜次子噶爾哈圖降襲鎮國公康熙二年卒以其第三子登塞降襲輔國公十二年以登塞係貝子之子改封鎮國公六十一年十二月任宗人府左宗人雍正元年以老休二年卒諡恪恭子瑟爾臣襲輔國公四年二月任鑲藍旗䝉古都統四月任宗人府右宗人九年管正白旗覺羅學乾隆五年轉左宗人十五年八月卒諡温僖子額爾經阿襲奉恩輔國公二十年八月卒次年二月以瑟爾臣次子徳明阿襲三月授散秩大臣二十二年以庸惰削爵子徳尊降襲三等鎮國將軍杜度第七子薩弼崇徳七年以兄杜爾祜穆爾祜特爾祜等怨望削爵黜宗室籍薩弼亦從坐順治元年四月隨睿親王多爾衮入山海闗擊敗流賊追至望都縣二年二月封輔國公復入宗室三年隨順承郡王勒克徳渾征流㓂一隻虎於荆州率本旗䕶軍屢敗賊衆凱旋賜黄金五十白金千六年十月同親王滿達海剿賊於朔州寧武並有功十月詔還京晉封固山貝子十二年二月卒年二十有八諡懷愍次子固鼐降襲鎮國公十五年三月卒諡悼愍十八年以薩弼長子巴鼐襲封鎮國公康熙二十三年正月卒子阿布蘭降襲輔國公五十七年授宗人府右宗人五十八年任鑲藍旗滿洲都統五十九年預議政六十一年十一月遷右宗正雍正元年三月上諭公阿布蘭人謙和自皇考任用以來所交事務一心勤慎効力晉封多羅貝勒二年以奏事不敬降輔國公五年坐擅以玉牒底本私示隆科多削爵以巴鼐孫法爾善襲乾隆元年六月卒諡和慤次子禄慶襲封奉恩輔國公二十三年坐守䕶陵寢儀樹不謹降三等鎮國將軍二十七年四月卒以禄慶長子倫成襲欽定八旗通志卷一百三十二
