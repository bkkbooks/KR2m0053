  text: 人物志一百三十九列女傳十九八旗蒙古列女傳二鑲黃旗蒙古馬甲弼立克圖之妻哈爾親氏鑲黃旗蒙古馬甲漢班之妻巴林氏鑲黃旗蒙古馬甲弼里克之妻吳爾多蘇氏鑲黃旗蒙古馬甲噶爾瑪扎布之妻徐氏正黃旗蒙古馬甲花色之妻奈曼氏正黃旗蒙古領催齊里之妻奈曼氏正黃旗蒙古驍騎校阿爾拉拜之妻竒穆忒氏正白旗蒙古馬甲烏爾圖那蘇圖之妻白氏正白旗蒙古護軍滿色之妻吉木特氏正白旗蒙古親軍三音查昆之妻李氏正白旗蒙古護軍黑達色之妻孫氏正白旗蒙古馬甲恩充之妻叩德氏正白旗蒙古馬甲佛保之妻額爾格氏正白旗蒙古馬甲蒙克之妻杭吉蘇氏正白旗蒙古馬甲都楞之妻扎爾佳氏正白旗蒙古馬甲那穆僧之妻巴魯克氏正白旗蒙古馬甲瑪什之妻趙佳氏正白旗蒙古馬甲達爾什之妻格濟里氏正紅旗蒙古前鋒達賴之妻台處克氏正紅旗蒙古雲騎尉皂保之妻陶氏正紅旗蒙古護軍達爾瑪西之妻博古特氏鑲白旗蒙古護軍格勒爾圖之妻趙氏鑲白旗蒙古護軍雅圖之妻趙氏鑲白旗蒙古護軍赫赫之妻莽努忒氏鑲白旗蒙古護軍克什布類之妻韓氏鑲白旗蒙古馬甲丹巴之妻巴立克氏鑲白旗蒙古領催浩尚之妻瓜勒佳氐鑲白旗蒙古馬甲長生之妻佟佳氏鑲白旗蒙古馬甲巴拜之妻莾古特氏鑲白旗蒙古馬甲三雅圖之妻巴魯克泰氏鑲白旗蒙古監生扎爾敏之妻王氏鑲紅旗蒙古達色之未婚妻于氏鑲紅旗蒙古護軍察漢之妻王氏鑲紅旗蒙古前鋒存住之妻王氏鑲紅旗蒙古護軍黑色之妻王氏鑲紅旗蒙古馬甲恆德之妻王氏鑲紅旗蒙古領催福夀之妻馬佳氏鑲紅旗蒙古馬甲格墨爾之妻巴林氏鑲紅旗蒙古馬甲扎錫之妻蔡佳氏正藍旗蒙古馬甲濃阿里之妻瓜勒佳氏正藍旗蒙古馬甲達蘭達之妻齊墨德氏正藍旗蒙古領催晉保住之妻余氏鑲藍旗蒙古護軍扎巴拉之妻什氏鑲藍旗蒙古護軍張保住之妻李氏鑲藍旗蒙古領催六兒之妻紅氏鑲藍旗蒙古馬甲邁拉遜之妻達爾衮氏鑲藍旗蒙古馬甲小兒之妻李氏鑲藍旗蒙古間散三兒之妻葉氏鑲藍旗蒙古馬甲劉保住之妻任氏鑲藍旗蒙古護軍常久之妻楊氏鑲藍旗蒙古護軍和楞額之妻勒忒氏鑲藍旗蒙古領催二格之妻錫德楚布氏鑲藍旗蒙古領催五十六之妻張氏以上俱乾隆元年旌表鑲黃旗蒙古馬甲七十七之妻趙氏鑲黃旗蒙古前鋒多爾吉之妻趙氏鑲黃旗蒙古護軍輟喜之妻李氏鑲黃旗蒙古護軍蘇郎之妻劉氏鑲黃旗蒙古護軍喜兒之妻何氏鑲黃旗蒙古護軍色楞之妻馮氏鑲黃旗蒙古馬甲都楞之妻郎氏鑲黃旗蒙古護軍阿必達之妻李氏鑲黃旗蒙古護軍色納克之妻張氏鑲黃旗蒙古護軍五保之妻楊氏鑲黃旗蒙古護軍福保之妻張氏鑲黃旗蒙古領催黑説子之妻何氏鑲黃旗蒙古領催校扎喜內之妻李氏鑲黃旗蒙古護軍茍色之妻陳氏鑲黃旗蒙古馬甲保住之妻正氏鑲黃旗蒙古桅牧伊瑪竒之妻馮氏鑲黃旗蒙古筆帖式德保之未婚妻他塔喇氏正黃旗蒙古間散宣記之妻博爾濟克氏正黃旗蒙古馬甲長生之妻卓們齊特氏正黃旗蒙古馬甲伍濟爾之妻赫舍里氏正白旗蒙古領催福夀之妻阿拉克楚氏正白旗蒙古馬甲烏拉爾齊之妻楊氏正白旗蒙古馬甲鄂齊爾之妻牛氏正白旗蒙古馬甲沙子之妻張氏正白旗蒙古領催福夀之妻阿拉克禇氏正白旗蒙古馬甲烏拉爾計之妻楊氏正紅旗蒙古馬甲官保之妻侯氏鑲紅旗蒙古馬甲額爾吉圖之妻趙氏鑲紅旗蒙古筆帖氏佛保之妻努燕博羅特氏鑲紅旗蒙古領催雙鼎之妻章京氏鑲紅旗蒙古領催花色之妻陳氏鑲藍旗蒙古領催喇八十之妻王氏鑲藍旗蒙古馬甲楊烏利之妻敖佳特氏鑲藍旗蒙古馬甲諾海之妻敖羅特氏鑲藍旗蒙古馬甲託布克之妻杜氏以上俱於乾隆二年旌表正黃旗蒙古護軍班達爾史之妻拜玉特氏正黃旗蒙古前鋒雅圖之妻李氏正黃旗蒙古護軍妞色之妻王氏正黃旗蒙古護軍懷德之妻關氏正黃旗蒙古馬甲瓦祿之繼妻劉氏正黃旗蒙古領催存住之妻李氏正黃旗蒙古護軍巴彥岱之妻周氏正黃旗蒙古護軍煙九兒之妻王氏正黃旗蒙古親軍兆住之妻劉氏正黃旗蒙古護軍根德邵之妻馬氏正黃旗蒙古佐領巴朗之妻柏玉特氏正黃旗蒙古護軍老米之妻孟氏正黃旗蒙古領催雅泰之妻吳氏正白旗蒙古弓匠阿里衮之妻舒氏正紅旗蒙古護軍巴圖之妻扎魯特氏正紅旗蒙古護軍黑狗之妻格爾納氏正紅旗蒙古護軍索曖之妻哈起克氏鑲白旗蒙古馬甲六十之妻張氏鑲白旗蒙古護軍阿玉史之妻保郭羅忒氏鑲白旗蒙古鎗手白起之妻布拉克齊忒氏鑲白旗蒙古護軍扎爾布之妻阿蘇忒氏鑲白旗蒙古護軍卓博多之妻巴魯忒氏鑲白旗蒙古護軍和尚之妻趙氏鑲白旗蒙古馬甲海拉太之妻巴林氏鑲白旗蒙古護軍鄂齊爾扎穆蘇之妻臧氏鑲白旗蒙古護軍班第之妻巴林氏鑲白旗蒙古親軍校穆賽之妻西爾塔理氏鑲白旗蒙古護軍錫爾德克之妻烏爾扎氏正藍旗蒙古護軍達蘭泰之妻彭氏鑲藍旗蒙古馬甲鄂莫克圖之妻柯史克特氏鑲藍旗蒙古鳥鎗護軍華色之妻魏氏鑲藍旗蒙古護軍羅爾扎之妻張氏鑲藍旗蒙古親軍瑪喜之妻何氏鑲藍旗蒙古護軍廣柱之妻吳氏鑲藍旗蒙古馬甲和尚之妻陳氏鑲藍旗蒙古護軍長夀之妻安氏鑲藍旗蒙古護軍三達色之妻蔡氏鑲藍旗蒙古馬甲趕金兒之妻王氏鑲藍旗蒙古馬軍諾和圖之妻崔氏鑲藍旗蒙古護軍阿必達之妻烏爾蘇氏鑲藍旗蒙古護軍拜達爾之妻巴玉特氏鑲藍旗蒙古馬甲八十四之妻張氏鑲藍旗蒙古親軍和雅圖之妻惠氏鑲藍旗蒙古親軍常明之妻姚氏以上俱於乾隆三年旌表鑲黃旗蒙古親軍烏雅圖之妻張氏鑲黃旗蒙古前鋒喀