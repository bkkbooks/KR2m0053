  text: 典禮志八八旗婚禮王公婚禮例公主等婚禮婚禮通品宦婚禮王公婚禮親王婚禮親王及親王未分家之子婚娶納幣用珍珠金銀花繡袍褂裙粧縀蟒縀素縀衣共九襲蟒縀素縀被褥七具金項圈一合包一大簪三枝小簪三枝墜子一副指環十枚行定時宰牲三十六席五十酒五十樽娶時宰牲四十五席六十酒六十樽親王以下輔國公以上異姓公侯伯以下侍郎男爵以上公主福晉以下郡君貝子夫人以上俱會宴給與其父蟒朝衣帽帶靴其母蟒袍褂裙金墜鞍馬二匹金二十兩銀一千兩娶外藩親王郡王扎薩克貝勒台吉之女初定時行七九禮用牲六十三鞍馬三匹甲胄三副銀器一具蟒縀三匹縀八匹布四十二匹娶外藩親王女聘用鞍馬十二匹盔甲十二副間甲二十四副縀六十匹布六百匹銀器三具娶外藩郡王女聘用鞍馬十匹甲胄十副間甲二十副縀五十匹布五百匹銀器三具娶外藩扎薩克貝勒女聘用鞍馬八匹甲胄八副間甲十六副縀四十匹布四百匹銀器三具娶外藩台吉女聘用馬六匹甲胄六副間甲十二副縀三十匹布三百匹銀器二具女父送來京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十匹布二百匹銀桶器三具女之兄弟若來各按時給衣一襲隨從男婦三十人各給衣服有差世子郡王婚禮世子郡王及世子郡王未分家之子婚娶納幣用珍珠金銀花繡袍褂裙粧縀蟒縀素縀衣共八襲蟒縀素縀被褥六具金項圈一合包一大簪三枝小簪三枝墜子一副指環八枚行定時宰牲二十七席四十酒四十樽娶時宰牲三十六席五十酒五十樽親王以下輔國公以上異姓公侯伯以下侍郎男爵以上公主福晉以下郡君貝子夫人以上俱會宴給豫其父蟒朝衣帽帶靴其母縀袍褂裙金墜鞍馬二匹金十兩銀七百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行七九禮用牲六十三鞍馬三匹甲胄三副銀器一具蟒縀三匹縀八匹布四十二匹娶外藩親王郡王女聘用鞍馬十匹甲胄十副間甲二十副縀五十匹布五百匹銀器三具娶外藩扎薩克貝勒女聘用鞍馬八匹甲胄八副間甲十六副縀四十匹布四百匹銀器三具娶外藩台吉女聘用鞍馬六匹盔甲六副間甲十二副縀三十匹布三百匹銀盆器二具女父母親送來京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十匹布二百匹銀桶器三具女之兄弟若來各按時給衣一襲隨從男婦二十五人給衣服各有差長子貝勒婚禮長子貝勒及長子貝勒未分家之子婚娶納幣用珍珠金銀花繡袍褂裙粧縀蟒縀素縀衣共七襲蟒縀素縀被褥五具金項圈一合包一大簪三枝小簪三枝墜子一副指環六枚行定時宰牲十八席三十酒三十樽娶時宰牲二十七席四十酒四十樽郡王以下輔國公以上異姓公以下尚書男爵以上郡王福晉以下貝子夫人郡君以上俱會宴給豫其父蟒朝衣帽帶靴其母縀袍褂裙金墜鞍馬二匹金五兩銀五百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行五九禮用牲四十五鞍馬二匹甲胄二副銀器一具蟒縀二匹縀六匹布四十匹娶外藩親王郡王扎薩克貝勒之女聘用鞍馬八匹甲胄八副間甲十六副縀四十匹布四百匹銀器三具行定時宰牲二十七娶時宰牲四十五女父母親送來京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十匹布二百匹銀器三具女之兄弟若來各按時給衣一襲隨從男婦二十人給衣服有差貝子婚禮貝子及貝子未分家之子婚娶納幣用珍珠金銀花繡袍褂裙粧縀蟒縀素縀衣共六襲蟒縀素縀被褥四具金項圈一大簪二枝小簪二枝墜子一副指環四枚行定時宰牲十四席二十酒二十樽娶時宰牲二十一席三十酒三十樽貝勒以下輔國公以上本旗官屬侍郎男爵以上貝勒夫人以下縣君輔國公夫人以上俱會宴給豫其父補縀朝服鞓帶靴帽其母縀袍褂裙金墜鞍馬一匹銀四百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行三九禮用牲二十七鞍馬一匹甲胄一副銀器桶一具蟒縀一匹縀四匹布十八匹聘用鞍馬六匹甲胄六副間甲十二副縀三十匹布三百匹銀器二具女父母親送來京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十匹布二百匹銀器三具女之兄弟若來各按時給衣一襲隨從男婦十五人給衣服有差鎮國公婚禮鎮國公及鎮國公未分家之子婚娶納幣用袍褂裙粧縀蟒縀素縀衣共五襲蟒縀素縀被褥四具金項圈一大簪二枝小簪二枝墜子一副指環四枚行定時宰牲十三席十八酒十八樽娶時宰牲十七席二十八酒二十八樽貝子以下奉國將軍以上貝子福晉縣君以下奉國將軍淑人公之女及本屬官員俱會宴給與其父補縀朝衣鞓帶靴帽其母縀袍褂裙金墜鞍馬一匹銀三百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行二九禮用牲十八鞍馬一匹甲胄一副銀器一具蟒縀一匹素縀二匹布十一匹聘用鞍馬五匹甲胄五副間甲十副縀二十五匹布二百五十匹銀器二具行定時宰牲十八娶時宰牲二十七女父母親送來京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十匹布二百匹銀器三具女之兄弟若來各按時給衣一襲隨從男婦十五人給衣服有差輔國公婚禮輔國公及輔國公未分家之子婚娶納幣用袍褂裙粧縀蟒縀素縀衣共四襲蟒縀素縀被褥三具金項圈一大簪二枝墜子一副指環四枚行定時宰牲十一席十六酒十六樽娶時宰牲十五席二十六酒二十六樽鎮國公以下奉國將軍以上縣君鎮國公夫人以