  text: 典禮志八八旗婚禮王公婚禮例公主等婚禮婚禮通品宦婚禮王公婚禮親王婚禮親王及親王未分家之子婚娶納幣用珍珠金銀花繡袍褂裙粧縀蟒縀素縀衣共九襲蟒縀素縀被褥七具金項圈一合包一大簪三枝小簪三枝墜子一副指環十枚行定時宰牲三十六席五十酒五十罇娶時宰牲四十五席六十酒六十罇親王以下輔國公以上異姓公侯伯以下侍郎男爵以上公主福晉以下郡君貝子夫人以上俱㑹宴給與其父蟒朝衣帽帶靴其母蟒袍褂裙金墜鞍馬二匹金二十兩銀一千兩娶外藩親王郡王扎薩克貝勒台吉之女初定時行七九禮用牲六十三鞍馬三匹甲胄三副銀器一具蟒縀三疋縀八疋布四十二疋娶外藩親王女聘用鞍馬十二匹盔甲十二副閑甲二十四副縀六十疋布六百疋銀器三具娶外藩郡王女聘用鞍馬十匹甲胄十副閑甲二十副縀五十疋布五百疋銀器三具娶外藩扎薩克貝勒女聘用鞍馬八匹甲胄八副閑甲十六副縀四十疋布四百疋銀器三具娶外藩台吉女聘用馬六匹甲胄六副閑甲十二副縀三十疋布三百疋銀器二具女父送來京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十疋布二百疋銀桶器三具女之兄弟若來各按時給衣一襲隨從男婦三十人各給衣服有差世子郡王婚禮世子郡王及世子郡王未分家之子婚娶納幣用珍珠金銀花繡袍褂裙粧縀蟒縀素縀衣共八襲蟒縀素縀被褥六具金項圈一合包一大簪三枝小簪三枝墜子一副指環八枚行定時宰牲二十七席四十酒四十罇娶時宰牲三十六席五十酒五十罇親王以下輔國公以上異姓公侯伯以下侍郎男爵以上公主福晉以下郡君貝子夫人以上俱㑹宴給予其父蟒朝衣帽帶靴其母縀袍褂裙金墜鞍馬二匹金十兩銀七百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行七九禮用牲六十三鞍馬三匹甲胄三副銀器一具蟒縀三疋縀八疋布四十二疋娶外藩親王郡王女聘用鞍馬十匹甲胄十副閑甲二十副縀五十疋布五百疋銀器三具娶外藩扎薩克貝勒女聘用鞍馬八匹甲胄八副閑甲十六副縀四十疋布四百疋銀器三具娶外藩台吉女聘用鞍馬六匹盔甲六副閑甲十二副縀三十疋布三百疋銀盆器二具女父母親送來京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十疋布二百疋銀桶器三具女之兄弟若來各按時給衣一襲隨從男婦二十五人給衣服各有差長子貝勒婚禮長子貝勒及長子貝勒未分家之子婚娶納幣用珍珠金銀花繡袍褂裙粧縀蟒縀素縀衣共七襲蟒縀素縀被褥五具金項圈一合包一大簪三枝小簪三枝墜子一副指環六枚行定時宰牲十八席三十酒三十罇娶時宰牲二十七席四十酒四十罇郡王以下輔國公以上異姓公以下尚書男爵以上郡王福晉以下貝子夫人郡君以上俱㑹宴給予其父蟒朝衣帽帶靴其母縀袍褂裙金墜鞍馬二匹金五兩銀五百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行五九禮用牲四十五鞍馬二匹甲胄二副銀器一具蟒縀二疋縀六疋布四十疋娶外藩親王郡王扎薩克貝勒之女聘用鞍馬八匹甲胄八副閑甲十六副縀四十疋布四百疋銀器三具行定時宰牲二十七娶時宰牲四十五女父母親送来京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十疋布二百疋銀器三具女之兄弟若来各按時給衣一襲隨從男婦二十人給衣服有差貝子婚禮貝子及貝子未分家之子婚娶納幣用珍珠金銀花繡袍褂裙粧縀蟒縀素縀衣共六襲蟒縀素縀被褥四具金項圈一大簪二枝小簪二枝墜子一副指環四枚行定時宰牲十四席二十酒二十罇娶時宰牲二十一席三十酒三十罇貝勒以下輔國公以上本旗官屬侍郎男爵以上貝勒夫人以下縣君輔國公夫人以上俱㑹宴給予其父補縀朝服鞓帶靴帽其母縀袍褂裙金墜鞍馬一匹銀四百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行三九禮用牲二十七鞍馬一匹甲胄一副銀器桶一具蟒縀一疋縀四疋布十八疋聘用鞍馬六匹甲胄六副閑甲十二副縀三十疋布三百疋銀器二具女父母親送来京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十疋布二百疋銀器三具女之兄弟若来各按時給衣一襲隨從男婦十五人給衣服有差鎮國公婚禮鎮國公及鎮國公未分家之子婚娶納幣用袍褂裙粧縀蟒縀素縀衣共五襲蟒縀素縀被褥四具金項圈一大簪二枝小簪二枝墜子一副指環四枚行定時宰牲十三席十八酒十八罇娶時宰牲十七席二十八酒二十八罇貝子以下奉國将軍以上貝子福晉縣君以下奉國將軍淑人公之女及本屬官員俱㑹宴給與其父補縀朝衣鞓帶靴帽其母縀袍褂裙金墜鞍馬一匹銀三百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行二九禮用牲十八鞍馬一匹甲胄一副銀器一具蟒縀一疋素縀二疋布十一疋聘用鞍馬五匹甲胄五副閑甲十副縀二十五疋布二百五十疋銀器二具行定時宰牲十八娶時宰牲二十七女父母親送来京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十疋布二百疋銀器三具女之兄弟若来各按時給衣一襲隨從男婦十五人給衣服有差輔國公婚禮輔國公及輔國公未分家之子婚娶納幣用袍褂裙粧縀蟒縀素縀衣共四襲蟒縀素縀被褥三具金項圈一大簪二枝墜子一副指環四枚行定時宰牲十一席十六酒十六罇娶時宰牲十五席二十六酒二十六罇鎮國公以下奉國將軍以上縣君鎮國公夫人以下奉國將軍淑人公之女及本屬官員俱㑹宴給予其父補縀朝衣鞓帶帽靴其母縀袍褂裙金墜鞍馬一匹銀三百兩娶外藩親王郡王扎薩克貝勒台吉之女行定時行一九禮用牲九鞍馬一匹甲胄一副銀器一具蟒縀一疋素縀二疋布二疋聘用鞍馬四匹甲胄四副閑甲八副縀二十疋布二百疋銀器二具行定時宰牲十八娶時宰牲二十七女父母親送来京各給夏衣一襲冬衣一襲貂褂一鞓帶一圍腰刀一弓箭撒袋一副甲胄一副鞍馬二匹蟒縀素縀三十疋布二百疋銀器三具女之兄弟若來各按時給衣一襲隨從男婦十五人給衣服有差鎮國將軍婚禮鎮國將軍行納幣禮縀衣三襲縀衾褥二具布衣一襲布衾褥一具金項圈一具金簪二枝金耳墜全副定婚日宴宰牲六娶日設宴十五席輔國将軍婚禮輔國将軍行納幣禮縀衣二襲縀衾褥一具布衣一襲布衾褥一具金項圈一具金簪二枝金耳墜全副定婚日宴宰牲四娶日設宴十席奉國将軍婚禮奉國将軍行納幣禮縀衣二襲縀衾褥一具布衣一襲布衾褥一具金簪二枝金耳墜全副定婚日宴宰牲三娶日設宴八席宗室婚禮宗室行納幣禮縀衣二襲布衣一襲縀衾布褥一具金耳墜全副定婚日宴宰牲二娶日設宴五席覺羅婚禮覺羅婚娶有職者各照品級用無職者用縀衣二襲縀被褥一牀金項圈一金耳墜一副行定時用羊牲二酒八罇娶時宰牲四席五酒十罇公主等婚禮公主下嫁禮公主下嫁於朝臣定婚進獻用一九禮用駱駝馬設宴七十席行聘進獻用九九禮用駱駝馬盔甲下嫁日設宴九十席如下嫁外藩止用牲酒不設筵宴公主下嫁得㫖指婚初定額駙家備駝一馬八羊八十有一酒九十罇屆期恭進額駙於是日詣干門恭謝乃設燕行禮下嫁前一日遣官賫送妝匳詣額駙第鋪設至日額駙家備九九禮物恭進文馬十八䭾甲十八馬二十一駝六羊八十一酒九十罇設燕如初定禮下嫁禮成翌日行朝謝禮如下嫁外藩止用牲酒不設筵燕郡主于歸禮郡主于歸初定額駙家備燕五十席酒五十罇若外藩王等尚主用駝馬羊七九牲五九納于王府納幣額駙家備鞍馬七甲胄七外藩王等用馬六十牛六十羊六百婚前一日遣人送粧匳至額駙第陳設至日送郡主于歸媵婢八人男婦五户若奉旨賜婚者額駙偕郡主詣大内謝恩行禮縣主于歸婚禮縣主于歸燕四十席酒四十罇納幣額駙家備鞍馬五甲胄五外藩王等用馬五十牛五十羊五百婚前一日遣人送粧匳至額駙第陳設至日送縣主于歸媵婢七人男婦四户郡君于歸禮郡君于歸燕三十席酒三十罇納幣額駙家備鞍馬四甲胄四若嫁外藩用馬四十牛四十羊四百餘與縣主同至日送郡君于歸媵婢六人男婦四户縣君于歸禮燕二十席酒二十罇納幣鞍馬三甲胄三若嫁外藩用馬三十牛三十羊三百餘與郡君同至日送縣君于歸媵婢五人男婦三户鄉君于歸禮燕十八席酒十八罇納幣鞍馬二甲胄二若嫁外藩馬二十五牛二十五羊二百五十餘如縣君同至日送鄉君于歸鎮國公女媵婢四人輔國公女媵婢三人男婦皆二户品宦婚禮凡民公行納幣禮縀衣四襲縀衾褥三具金項圈一具金簪三枝金耳墜一副定婚日宴用牲九娶日設宴二十席侯行納幣禮縀衣四襲縀衾褥三具金項圈一具金簪三枝金耳墜一副定婚日宴用牲八娶日設宴十八席伯行納幣禮縀衣四襲縀衾褥三具金項圈一具金簪三枝金耳墜一副定婚日宴用牲七娶日設宴十七席一品官行納幣禮縀衣三襲縀衾褥三具金項圈一具金簪三枝金耳墜一副定婚日宴用牲六娶日設宴十五席二品官行納幣禮縀衣二襲縀衾褥二具金項圈一具金簪三枝金耳墜一副定婚日宴用牲四娶日設宴十席三品官行納幣禮縀衣二襲縀衾褥二具金項圈一具金簪二枝金耳墜一副定婚日宴用牲三娶日設宴八席四品官行納幣禮縀衣一襲縀衾褥一具金項圈一具金耳墜一副定婚日宴用牲二娶日設宴六席五品官行納幣禮縀衣一襲縀衾褥一具金項圈一具金耳墜一副定婚日宴用牲二娶日設宴五席六品以下官行納幣禮與五品官同定婚日宴用牲二娶日用牲三自四品以下金項圈金耳墜各聽其力能其者備用軍民人等行納幣禮衣一襲衾褥一具定婚日宴用牲一娶日宴用牲二婚禮通例崇徳間定親王以下婚娶如違定例多用者多用之物入官兩家俱議罪又定自超品公以下至軍民人等婚娶若違定例多用者多用之物入官兩家俱議罪崇徳三年定凡送親外藩王貝勒貝子公等送女與内王以下公以上為婚前一夕内王以下公以上自備筵宴到日由禮部備辦筵宴回日筵宴同順治五年八月諭禮部曰方今天下一家滿漢軍民皆朕臣子欲其輯和親睦莫如聨姻一事凡滿漢官民有欲聨姻者各從其願八月諭户部曰滿漢官民欲其輯睦互結婚姻前已有旨嗣後凡滿洲官員之女欲與漢人為婚者先須呈明爾部查其應具奏者即與具奏應自理者即行自理其無職人等之女部册有名者令各牛录章京報部方嫁無名者聽各牛录章京自行遣嫁至漢官之女欲與滿洲為婚者亦行報部無職者聽其自便不必報部其滿洲官民娶漢人之女實係為妻者方准其娶八年題准凡外藩送親與内親王者前一夕内親王府自備牲酒親王迎至宿次㓜輩郡王貝勒各一人貝子二人内大臣二人禮部堂官俱蟒服同注筵宴如遣屬官往迎部員同往筵宴到日由禮部備辦牲酒親王及郡王以下各官筵宴郡王妃貝勒貝子夫人禮服出迎筵宴如仍遣屬官迎接部員同迎接筵宴凡送親如内郡王者如郡王親迎㓜輩貝勒一人貝子一人公二人同往其餘迎接筵宴與親王同凡送親與内貝勒者如貝勒親迎㓜輩貝子一人公二人同往其餘親迎筵宴與郡王同凡送親與内貝子公者如貝子公親迎㓜輩公二人同往其餘迎接筵宴與貝勒同以上凡大臣應否遣迎請㫖定奪到後賜恩宴一次在禮部筵宴二次回日筵宴同九年定王以下公以上凡奉㫖賜婚者俱朝服於中和殿或於位育宫謝恩不贊行三跪九叩頭禮及成婚日再行三跪九叩頭禮又定和碩親王世子多羅郡王之女下嫁在朝及外藩之人娶時和碩親王進上牛一隻羊一隻酒二罈世子多羅郡王進上牛一隻羊一隻酒二罈多羅貝勒以下俱免進和碩親王以下如奉上諭結婚其行定及娶時俱謝恩一次又題定凡奉㫖賜婚公主郡主等外藩王以下内外各官俱朝服於中和殿或於位育宫謝恩不贊行三跪九叩頭禮成婚日再行三跪九叩頭禮康熙元年定王以下入八分公以上有婚嫁事報明禮部具題布改為縀餘俱仍舊五年定鎮國将軍輔國将軍女嫁於外藩媵送滿洲男婦二名䝉古漢人男婦六名奉國将軍奉恩将軍女媵送不許用滿洲止用䝉古漢人男婦六名宗室女媵送䝉古漢人男婦四名八年定凡奉㫖賜婚郡主以下者謝恩行禮俱由禮部具題又定出嫁郡主縣主歸寜母家有給人口者不准給滿洲准給䝉古漢人八名出嫁郡君以下鄉君以上歸寜准給䝉古漢人六名出嫁鎮國将軍女以下宗女以上歸寜准給䝉古漢人四名雍正元年定凡有品級官員婚嫁各用伊執事鼓樂人不得過十二名燈不得過六對無品級閒散人等及生監軍民不得僭用執事鼔樂人不得過八名燈不過四對一應糜費概行嚴禁八年三月禮部議覆據詹事府少詹事伊爾敦奏稱看得八旗官員兵丁遇有喜䘮等事不按定例遵行仍有任意糜費者若不嚴行禁止誠恐日久必至相習成風仰請勅下該部自大小官員以至兵丁凡喜䘮等事其應用之項按其職分之尊卑明白分晰著為定例刋刻成書於八旗各佐領及族長等頒給一本令其傳示暁諭凡遇喜䘮等事預行報知該佐領該族長務令逐項照例遵行等語查雍正元年五月内九卿等遵㫖議覆自民公侯伯滿漢官員以及兵民等其婚䘮等事俱各按品級著為定例逐歀開載一體傳行但未有専行暁示稽察之員所以致有任意違越之事應如伊爾敦所奏将欽定欵項再行刷印交各該旗令其轉交該佐領族長等傳示曉諭凡遇喜䘮等事預行報知該佐領族長等照例遵行若有違例僭用者該佐領族長等即報知各該旗都統查明交部治罪若徇隠不報任其違越一經發覺将該佐領族長及僭越之人一併交部分别議處奏入奉㫖依議着該旗都統察旗御史㕘領侍衛及步軍統領一同稽察果有違例僭越者即行㕘奏若該旗都統察旗御史㕘領侍衛步軍統領内如有一處查出其餘一併免其議處若經他處查出将該旗都統察旗御史㕘領侍衛步軍統領等一併議處欽定八旗通志卷八十五
