body:
  text: 欽定四庫全書欽定八旗通志卷一百七十六人物志五十六大臣傳四十二滿洲正藍旗二達伊拜對寧古理費揚武烏禮哈納哈克三雅覺羅豁特哈占賚滿丕穆赫林勒貝恭圖伊拜弟庫邇闡伊拜姓赫舍里世居齋谷父拜思哈當太祖髙皇帝時來歸授佐領𨽻滿洲正藍旗既卒伊拜與其兄宜巴里弟庫邇闡分轄人户任佐領太宗文皇帝即位察哈爾部貝勒圗爾濟率人户來歸命伊拜迎犒之天聰八年上統師征明伊拜齎敕往科爾沁部調兵隨征是年五月以克副任使豫雲騎尉世職九年擢任正白旗蒙古都統崇德元年隨武英郡王阿濟格征明入長城攻克昌平等州縣俘獲甚衆師還出邉敵襲我後隊縱劫掠因論伊拜不殿後及徇隱軍士失律諸罪坐罰鍰三年九月隨睿親王多爾衮征明由青山口入邉越燕京略山東四年三月凱旋以過三屯營時佐領喇巴希為敵所困伊拜未助戰罰馬一又其僕與軍士爭草鬪毆伊拜袒其僕以鳴鏑射軍士復罰鍰五年大軍圍明錦州伊拜遇杏山敵騎率本旗兵擊敗之復連敗松山騎兵步兵後敵騎復自杏山來犯伊拜邀擊多斬獲又同左翼軍擊卻錦州城中出戰敵兵六年攻錦州破其山嶺步兵復擊敗其拒戰騎兵敘功晉世職為騎都尉時明總督洪承疇集兵十三萬駐松山援錦州上親征陳師於松山杏山間授諸將方略分布要隘俟敵潰遁截擊伊拜奉命同副都統談拜等率兵倚杏山駐營明兵自松山竄走伊拜追逐至塔山敵挫衄及溺水死者無算七年大軍擒承疇於松山明總兵祖大夀以錦州降伊拜奉命駐守杏山是年七月部議圍錦州時敵犯鑲黃旗壕塹軍士有未戰者伊拜徇隱應罰鍰上貰之八年十月奉命與輔國公篇古率將士駐守錦州順治元年調正藍旗蒙古都統隨大軍入山海關擊敗流賊李自成尋同都統葉臣等勦賊山西圍太原府城賊出城抗拒伊拜同都統巴哈納等督兵敗賊克其城招降附近郡邑師還賜白金三百兩二年隨英親王阿濟格征陜西敗賊延安自成走湖廣追𠞰至武昌連破賊營三年敘功晉三等輕車都尉五年隨鄭親王濟爾哈朗征湖南時衡州寶慶諸郡為明桂王朱由榔之將所據六年春大軍克湘潭伊拜同都統佟圗賴等分兵趨衡州距城三十里彼兵千餘據橋立寨伊拜督兵擊之潰進薄城下連敗其寨斬其總兵陶養用遂定衡州大軍别徇寶慶辰州武岡沅州靖州賊俱敗遁七年四月凱旋復賜白金三百兩八年以年老解都統任九年命為議政大臣疊遇恩詔晉爵至三等男十五年卒年六十有五贈太子太保諡勤直賜祭葬如典禮立碑墓道以其第三子費揚武襲爵伊拜弟庫邇闡初任佐領天聰九年隨副都統巴竒蘭征黑龍江有功豫雲騎尉世職崇德元年授都察院理事官兼任參領五年隨工部承政薩穆什喀征索倫部與其部長博穆博果爾力戰卻之師還以俘卒遁去論監守不嚴應鞭責上念其曽與博穆博果爾力戰停其敘功免罪仍子賞賚尋隨睿親王圍明錦州擊敗杏山敵騎及松山步兵又同左翼軍擊敗錦州城中出犯兵六年擢都察院參政復隨鄭親王圍錦州敵騎自松山來奪我紅衣炮庫邇闡擊卻之旋率兵據守山寨敵來犯勢甚衆時薩穆什喀别守汛地欲遣兵助戰庫邇闡以敵易禦辭之遂獨率所部奮擊敗敵斬四十一人獲雲梯鎗炮甲楯旗纛敘功晉世職為騎都尉八年擢正藍旗蒙古副都統順治元年隨大軍入山海關擊流賊李自成追敗之望都敘功加一雲騎尉二年正月隨豫親王多鐸擊流賊於潼關連破其兩營敘功晉三等輕車都尉尋以考滿稱職晉二等四年六月奉命率兵駐防濟南會土賊謝遷等陷淄川縣城庫邇闡遣所部兵並調緑旗兵往援部議其不親赴𠞰罪應罰鍰解副都統任革世職得旨倍其罰餘寬免明年擢都察院承政尋仍改為參政六年同都統談泰征江西叛鎮金聲桓卒於軍遇恩詔晉世職為一等輕車都尉以其子舒赫襲寧古理寧古理滿洲正藍旗人姓託和洛崇德三年任吏部主事六年大軍圍明錦州寧古理隨鄭親王濟爾哈朗營以擊敗敵兵馳齎捷奏七年錦州降復以降人及所獲簿籍馳奏順治二年四月遷吏部啓心郎四年五月山東巡撫張儒秀以罷歸侍郎孫之獬因土賊謝遷陷城遇害為請恤部臣陳名夏金之俊謂應復其原銜豫恤寧古理與侍郎馬光輝謂孫之獬既革職為民例不豫恤以兩議上得旨申飭議恤非例是年考滿豫雲騎尉世職嗣兩遇恩詔晉世職騎都尉兼一雲騎尉八年閏二月以前此吏部銓選有越格濫用者革啓心郎任會御史張煊劾奏尚書陳名夏在吏部専權徇私諸欵並言其以尚書而卸罪於啓心郎致寧古理革任巳得脫然時尚書談泰因陳名夏與已同掌吏部坐張煊誣陷罪未幾談泰以把持部務恣意妄行獲罪上命寧古理仍為啓心郎十年五月擢吏部右侍郎十三年四月因河西務鈔關員外郎朱世德虧課萬餘兩户部援赦免罪吏部亦弗置議並坐瞻徇寧古理革任降世職為雲騎尉十四年四月上以寧古理前在吏部諳習事務命遇侍郎缺出即與推補十六年正月授禮部右侍郎十八年閏七月擢左都御史十二月疏言定例駐牧察哈爾蒙古向京城置買盔甲弓箭由八旗都統造册送部出口時察驗放行其他蒙古不得私買恐日久禁弛有借名置買及私相轉賣之弊請旨嚴飭關隘官員察詰並令蒙古都統以下參領佐領以上申禁又設兵原為勦賊之偹近見各省匪徒或數千人嘯聚總督提鎮不親率標兵堵禦輒請京兵京兵一出不惟費餉亦且擾民請嗣後有竊發者總督提鎮先率標兵勦捕不得輒請京兵則餉運可省而民生得安又各省罪犯應解部審者向來各部差官提解仍須州縣官遞送今驛遞繁苦宜概令在外督撫提鎮解送停止差官以省供應之費下部議從之康熙元年七月遷户部尚書二年二月卒部臣以任尚書未滿一年奏諭曰寧古理雖為尚書未久念初設六部之時即在部任事可豫尚書恤典賜祭葬諡勤敏子色楞襲雲騎尉世職費揚武費揚武滿洲正藍旗人姓納喇由護軍校纍遷參領太宗文皇帝崇德七年冬隨饒餘貝勒阿巴泰征明甫入邉明山海關總兵馬科迎戰費揚武擊敗其衆遂越燕京趨山東既至膠州明兵千餘屯城外費揚武奮勇挫敵乘勝薄濵州領雲梯兵先登攻克其城及師還明總兵范志完總兵吳三桂等分兵阻截費揚武先後破走之護所俘獲出邉凱旋敘功豫雲騎尉世職管佐領事世祖章皇帝順治元年四月隨睿親王多爾袞入山海關破流賊李自成騎兵尋署護軍統領隨豫親王多鐸追勦李自成師抵潼關賊將劉宗敏等引衆出禦費揚武率本旗護軍擊敗山下步騎賊衆復連破其兩營二年三月豫親王移師南征費揚武同護軍統領固納岱伊勒都齊等率兵攻揚州城南獲船二百餘又同護軍統領阿爾津擊敗江寧府境步兵追勦至蕪湖明總兵黃得功拒戰費揚武擊敗其衆獲船三十有一尋隨端重親王博洛征浙江同前鋒統領鄂碩副都統卓布泰等擊走明閣部馬士英於杭州生擒偽總兵一復率兵勦平海寧平湖二縣土賊獲明總兵王之仁戰艦十有六十二月授議政大臣先是敘入關破流賊功由雲騎尉晉騎都尉至是敘江南浙江功績加一雲騎尉世襲罔替四年仍署護軍統領從征福建卒於軍以其子雅素哈襲職烏達禮烏達禮滿洲正藍旗人姓納喇世居輝發祖曰三檀太祖髙皇帝時來歸任佐領父曰薩珠瑚烏達禮其次子也初為前鋒侍衛兼王府長史太宗文皇帝崇德八年擢國史院學士世祖章皇帝順治元年隨豫親王多鐸征河南陕西二年隨征江南三年隨端重親王博洛征福建時明唐王朱聿鍵僣號福州海賊鄭芝龍受爵為平國公大軍入閩擒斬聿鍵芝龍猶擁兵觀望端重親王遣烏達禮赴泉州開諭之芝龍乃降四年考滿授雲騎尉世職五年擢工部啓心郎八年調刑部啓心郎屢遇恩詔晉世職三等輕車都尉十一年正月上以八旗逃人日衆增設兵部督捕侍郎郎中員外主事等官另置廨署専理緝捕事擢烏達禮為左侍郎十三年五月以逃人緝獲者少督察不嚴坐瞻徇除世職尋諭以洗心滌慮改過自新復職如舊會考滿蔭一子入監十一月同右侍郎梁清逺疏陳四事一申禁姦棍窺探緝獲之犯一嚴懲解役踈縱窩逃之人一分晰誣告逃人坐罪之條一增詳逃人自首銷檔之例得旨如所請行十七年甄别部院諸臣以烏達禮職司督捕弗任勞怨下部議處降世職為騎都尉改任通政司通政使聖祖仁皇帝即位擢任吏部侍郎康熙五年因病解任八年九月起任刑部侍郎旋擢工部尚書十四年轉刑部十六年三月轉禮部八月轉吏部二十年三月致仕五月卒賜祭葬如例以其孫阿林襲職對哈納對哈納滿洲正藍旗人姓鈕祜祿世祖章皇帝順治二年由內院筆帖式遷工部主事九年遷郎中十一年遷刑部啓心郎十五年裁缺十七年補都察院左副都御史十八年二月遷刑部侍郎康熙五年擢夲部尚書六年五月聖祖仁皇帝詔臣工指陳民生利病對哈納同尚書郝惟訥侍郎麻勒吉等疏言賣身旗下之人每與民間搆訟或夲主為之代告稱妻子寄居其家田宅財物坐落某處某某借銀若干類多揑詞索詐株連無辜竊思有銀有産之人豈肯賣身亦無存留妻子而獨賣己身之理請嗣後通飭八旗及直𨽻各省遇此等控詞概不準理庶狡徒稍戢民生得安疏入從之七年九月授國史院大學士充世祖章皇帝實録總裁官八年七月諭曰刑部事務殷繁人命所繫必得才猷練逹之人方克勝任大學士對哈納諳練刑部事務著加太子太保以國史院大學士管刑部尚書事九年以內三院為內閣對哈納改文華殿大學士會吏部尚書馬希納解任調對哈納管吏部尚書事十一年七月副都御史李之芳疏言部院官失察胥役犯贓應如州縣例革職吏部以部院官員例不關防胥役寢其議上以京官雖與外官有間不應逈異下九卿科道會議尋議外官改罰俸一年京官應罰俸六月得旨申飭令再議諭責對哈納曰衙役作弊小民受害無窮所司官理應從重處分以清積蠧今爾等俱已富貴不念小民困苦惟恐重處屬員致有干涉初議京官不應處分繼議外官亦從末減明係瞻徇朕擢爾吏部尚書自應殫心為國矢公報效乃全無主見殊負委任之意于是定議外官處分仍舊部院司官失察書吏犯贓不及十兩者罰俸一年過十兩者降一級留任十二年六月疏言舊例各省司道府州縣召募經制書辦典吏攢典等役恐積久弊生一嵗一次轉撥約有數萬人甚為繁擾且致文册生疏每多舛訛遺漏請照督撫鹽院衙門之例五年役滿停其轉撥得旨允行十三年二月以病乞休溫旨慰留十四年九月卒于官年五十有七賜祭葬如典禮諡曰文端哈克三哈克三滿洲正藍旗人姓佟佳父法薩理巴圗魯任驍騎校出征戰歿哈克三其長子也世祖章皇帝順治二年任禮部筆帖式纍遷至員外郎十四年改授護軍參領聖祖仁皇帝康熙二年隨靖西將軍穆哩瑪征湖廣流賊李來亨等三年賊竄入茅麓山哈克三同護軍統領堪泰由山後進攻來亨敗卻遣其子據險築寨列鳥鎗拒戰我軍奮擊敗之賊潛遁復紏衆劫總兵于大海營哈克三與大海併力攻擊多斬馘來亨自經死八年擢正藍旗蒙古副都統十二年八月調本旗滿洲副都統十月遷護軍統領十四年三月察哈爾布爾尼叛命撫逺大將軍信郡王鄂札副將軍圗海往討哈克三參贊軍務四月師次逹祿布爾尼列陳以待潛設伏山谷我師進勦遇伏發犯我土默特兵哈克三率中隊兵力禦敗之復偕衆擊賊營賊甫列火器我師以驍騎衝擊賊潰奔斬馘甚衆布爾尼以三十騎遁去為科爾沁額駙沙津射斃察哈爾平敘功豫哈克三世職為三等輕車都尉十六年三月命同都統勒貝副都統布舒庫參贊簡親王喇布軍務時逆藩吳三桂賊將韓大任等踞萬安哈克三與副都統雅沁等分兵往勦既至大任渡河遁走哈克三以山路險狹騎兵難騁請調緑旗兵相機守隘斷其餉道俾賊無從逸出簡親王以聞奉諭曰逆賊韓大任已無外援宜乘此時即行蕩掃乃藉口調兵延引時日使賊得固守殊悮機冝其令哈克三等乘賊勢蹙併力窮追務在剪除毋縱賊入楚十二月賊由萬安遁入興國縣山中哈克三率師追及之黃塘殺賊百餘賊復紏聚千人固守新田鋪口我師步行奮擊擒賊甚衆又選輕騎乘夜追勦至薑坑嶺賊黨陳堯元李茂珠以五千人據嶺拒守哈克三分兵四靣仰攻殱其偽副將等六人斬䤋千餘於是韓大任陳堯元李茂珠等走福建踞老虎洞賊衆萬餘人明年三月哈克三與都統巴雅爾副都統錫三雅沁布舒庫分隊奪隘前進破其六營殪賊六千餘擒斬偽總兵以下三百人獲旗幟器械無算大任等窮蹙會康親王傑書遣人招撫大任率衆降哈克三還吉安命赴湖南與將軍穆占會師勦賊尋駐守彬州六月三桂據衡州遣賊黨馬寶胡國柱等紏賊三萬犯永興穆占令哈克三率兵援勦禦之河外營奮力擊賊賊勢猖哈克三與都統伊里布皆戰歿事聞諭穆占曰凡遇賊冦必審已量力可擊則擊之如賊衆我寡即冝調集諸路合為一軍壯聲勢以圗攻勦今逆賊大隊犯永興我兵分駐他處遇戰力單以致失利我朝諸將遇敵雖兵力單弱亦不退縮必奮勇攻擊是以都統伊里布護軍統領哈克三等陷歿于陳聞之不勝傷悼十八年十月喪還命內大臣噶布拉奠茶酒復遣內大臣佟國維齎銀五百兩賜其家傳諭曰哈克三臨陳捐軀戮力盡疩殊為可嘉特賜銀五百兩其舉殯時仍遣內大臣一員并侍衛往送賜祭葬如典禮諡武毅晉世職為一等輕車都尉兼一雲騎尉弟之子巴爾泰襲世宗憲皇帝時以哈克三入祀昭忠祠覺羅豁特覺羅豁特滿洲正藍旗人景祖翼皇帝第五子恪恭貝勒塔察篇古之三世孫也父穆成額以軍功授雲騎尉順治三年豁特襲職因近族加騎都尉三遇恩詔遞加二等輕車都尉世襲罔替尋授佐領纍遷護軍參領兵部理事官十七年擢鑲藍旗滿洲副都統康熙三年隨豫親王多鐸進勦蘇尼特叛人騰機思有功加一等輕車都尉九年擢鑲藍旗蒙古都統十三年逆藩吳三桂耿精忠叛分犯江西豁特偕護軍統領朗素等隨安親王嶽洛往勦十四年五月大軍克建昌賊將許定國據新城縣豁特偕前鋒統領覺羅舒恕等圍克之生擒定國十六年十二月逆賊朱秦等犯湖南平江縣豁特迎敗之斬六千餘級擒偽副將二逰擊一守偹六十七年閏三月剿馬棚賊邱義尚於七家洞擒斬無算又降偽總兵朱永升等俱得旨嘉奬是年六月豁特卒於軍先是安親王既克建昌欲平附近餘孽檄豁特取石匣村失利安親王疏聞命事平察議二十二年議政王大臣議豁特在石匣交戰未收官兵骸骨並失軍炮應革職籍沒家産編入包衣佐領奏入諭曰覺羅豁特失悮軍機理應依議但係覺羅編入包衣佐領為奴似屬不便著免其編入尋命留豁特父穆成額所立雲騎尉世職以豁特從子訥秦襲穆赫林穆赫林姓博爾濟吉特祖索諾木為烏嚕特部台吉太祖髙皇帝天命七年索諾木同貝勒明安等率所屬人户來歸别立烏嚕特蒙古一旗賜賚優厚屢從征有功豫爵二等子世祖章皇帝順治十二年追諡順良視一品大臣例立碑穆赫林之伯父博琫初襲索諾木爵太宗文皇帝天聰六年從征察哈爾以俘獲數少及私行畋獵諸罪削爵改𨽻正藍旗滿洲穆赫林之叔父僧格襲三遇恩詔晉爵至三等伯順治九年卒穆赫林襲爵聖祖仁皇帝康熙五年授正藍旗滿洲副都統尋列議政大臣十三年四月命同都統拉哈達率兵駐防兖州旋命移駐江寧時逆藩耿精忠叛應吳三桂上命康親王傑書為大將軍貝子傅喇塔為寧海將軍穆赫林率駐守江寧之喀喇沁土默特兵赴浙江會𠞰十四年穆赫林隨傅喇塔征台州偽都督林沖糾衆萬餘列十三寨于白水洋穆赫林督兵攻拔賊寨斬獲無算擒偽總兵朱富復仙居縣城遂由黃岩進征偽將軍曾養性偕叛鎮祖宏勳據溫州分水陸迎犯穆赫林擊敗之上塘嶺取賊艦三十餘偽總兵彭國明率衆五千餘瀕江列寨穆赫林率兵至寶帶橋分布隊伍指麾攻擊摧賊鹿角斬級千餘盡獲其鎗炮旗幟遂駐軍江岸賊數來犯輒戰卻之溫州繞城有河引江水入焉閘以蓄之我軍欲毁閘以涸水輒為賊阻久相持未能薄城時康親王駐金華􅊾傅喇塔與穆赫林速攻城穆赫林言必多取大炮至乃可克十五年二月上諭責王貝子等遷延康親王因劾奏穆赫林與副都統吉勒塔布提督假應舉等抗違軍令瞻顧不前狀詔事平日議罪八月康親王由衢州攻克仙霞關招降耿精忠徙曽養性祖宏勳等至福州溫州平檄穆赫林移師福建駐守延平海賊鄭錦使其偽將軍吳淑偽總兵吳由邵武犯延平穆赫林率兵擊之浦塘隘口陳斬偽總兵楊大任生擒偽總兵阮信等破其木城獲軍械無算乘勢追勦復邵武汀州二府及所屬縣十六年賊屢窺犯泉州及潮州陷所屬城邑穆赫林與副都統沃伸總兵馬三竒等一再擊敗之十七年三月賊犯海澄穆赫林與海澄公黃芳世率兵迎戰於灣腰樹賊勢猖獗我兵失利退保海澄賊復糾衆環逼阻我聲援據髙阜瞰城中炮石交下穆赫林同提督假應舉協力固守糧盡身負重創六月乙卯城陷穆赫林與應舉並自經死及賊平議政王大臣等追論穆赫林征溫州時抗違軍令擊海賊時于灣腰樹戰敗及被困海澄援兵將至不奮力突圍城陷後急迫自盡應追革官爵籍沒家産上念穆赫林屢著戰功寬免籍沒以僧格之孫赫達色襲三等伯世宗憲皇帝時穆赫林與段應舉並入祀昭忠祠勒貝勒貝滿洲正藍旗人姓郭爾羅父鄂羅塞臣官左都御史諡果敏有傳勒貝初授侍衛兼佐領順治十八年由一等侍衛授正藍旗蒙古都統康熙八年調正藍旗滿洲都統十六年三月吳逆未平上以簡親王喇布出師江西久無功其參贊大臣均不勝任命勒貝及護軍統領哈克三副都統布舒庫往代之十月鎮南將軍莽依圗由廣東進定廣西命勒貝偕江寧將軍額楚守韶州十二月諭曰韶州地屬緊要一切軍務若令簡親王轉奏恐有遲誤其令額楚統轄兵馬勒貝參贊軍務凡事許得專奏十七年二月上以梧州為兩廣接壤要地諭勒貝同額楚往戍時逆賊祖澤清據髙州叛陷鬱林州及北流興業陸川博白四縣四月勒貝偕將軍傅宏烈等擊敗偽總兵梁子玉于白米嶺斬之偽總統饒一龍等各棄城遁一州四縣盡復十八年吳逆偽將吳世琮圍南寧總督金光祖遣總兵談升等與戰於新村西山之巔勒貝偕額楚及副都統額赫納等分路撲勦殺賊甚衆世琮重創遁南寧圍解十九年五月復偕額赫納等勦叛賊馬承蔭于栁州大敗之於陶登乘勝克象州承蔭降均得旨嘉奬下部議敘八月莽依圗卒於軍上以勒貝代為鎮南將軍尋命隨征南大將軍都統賚塔進定雲南即令參贊軍務十二月大軍抵西隆州偵偽將軍何繼祖王宏勳等糾衆萬餘扼定籠所之石門坎勒貝與都統希福等先驅二十年正月抵其地攻克苐一峯第二峰第三峰奪隘口復安籠所城繼祖等走復糾偽將軍詹養王有功等九人衆二萬餘守黃草壩列象拒戰二月勒貝率次官兵隨大將軍賚塔進勦生擒詹養王有功及賊千餘直抵雲南城逆孽吳世璠自殺雲南平班師勒貝以疾道卒柩至京命內大臣往奠二十二年賜祭葬如例恭圗恭圗滿洲正藍旗人姓兆佳康熙四年由間散授世管佐領六年補安親王府長史九年授參領十二年擢本旗蒙古副都統十四年大兵勦吳三桂詔恭圗統領蒙古兵駐防河南尋命帥師赴荆州十五年三月隨鎮安將軍噶爾漢攻南漳縣之靈機寨焚賊營賊三千餘迎敵擊敗之得旨嘉奬十六年十月同征南將軍穆占率兵赴安親王嶽樂軍於長沙十八年隨征武岡州賊帥吳國貴馬寶擁兵二萬四千據隘口恭圗偕副都統伊巴漢等攻之三晝夜炮斃吳國貴追至楓木嶺之木瓜橋賊衆悉潰十九年調滿洲副都統二十年隨大將軍貝子章泰進兵雲貴時偽將軍線緎據江西坡我兵奮擊賊帥夜遁恭圗追至蠟茄坡再戰復敗之恢復新興所普安州二城復隨大軍敗賊將胡國柄等於歸化寺雲南平還京二十三年議政王大臣遵旨甄别都統副都統等官以恭圗不能彈壓所屬議革職得旨恭圗前曽奏請休致不可列衆人中黜退可仍留原任二十四年因病解任尋卒于家賜祭葬如例哈占哈占滿洲正藍旗人先世居葉赫姓伊爾根覺羅哈占由官學生為鴻臚寺贊禮即纍遷吏部員外郎郎中兵部督捕理事官聖祖仁皇帝康熙八年授祕書院學士十一年擢工部侍郎十二年九月授陜西總督甫之任逆藩吳三桂反四川巡撫羅森提督鄭蛟鱗總兵吳之茂談宏叛應之與三桂所遣偽將軍王屏藩等合謀冦陕西上命都統赫葉為安西將軍護軍統領瑚里布為副將軍同西安將軍瓦爾喀進征四川詔哈占同巡撫杭愛籌運軍餉並與甘肅提督張勇陕西提督王輔臣協力捍禦邊境綏輯軍民十三年三月命尚書莫洛經略陕西凡事與哈占會商而行哈占以漢中廣元山路險峻奏于略陽水道造船接運借山西榖二十萬石協濟六月命貝勒洞鄂為定西大將軍統轄征四川將士時興安總兵王懷忠率兵四千隨將軍瓦爾喀征保寧哈占遣逰擊程福亮率兵防守興安叛鎮楊來嘉自鄖陽連結王屏藩等犯興安福亮擊敗之漁渡路八月莫洛自請領兵先是貝勒洞鄂由秦州征四川哈占以洛陽糧艘為賊所劫餉運難繼奏入上命四川總督周有德等經理廣元至保寧輸運諭哈占飭屬速運廣元相繼毋誤哈占因疏言陜西官民疲于挽輸請令山西省協助上曰山西運糧水路則有黃河汾渭之險陸路道逺勞費尤甚其令户部發庫銀十五萬兩遣員齎至西安採辦酌增其直俾民間獲什一之利樂于輸送自可源源接濟十二月王輔臣叛於寧羌莫洛遇害貝勒洞鄂由漢中還西安十四年正月詔洞鄂征秦州哈占分兵防守蘭州哈占疏言西安兵少不宜分遣又疏請增兵上命移荆州兵一千以雲貴總督鄂善率赴西安旋諭鄂善移兵守延安哈占復奏留之時同州逰擊李師膺倡叛殺韓城知縣翟世琪脅神道嶺營卒聫結蒲城土賊陷延安固原道陳彭定邉副將朱龍皆以城叛王輔臣據平涼其黨分據秦州鞏昌慶陽陷蘭州洮州河州復阻截棧道陷漢中哈占遣將勦賊于汾州淳化三水長武漢隂石泉甘泉寶雞諸處屬奏捷六月貝勒洞鄂復秦州提督張勇復鞏昌洮州河州寧夏提督陳福復定邉平逆將軍畢力克圗復延安西寧總兵王進寶復蘭州詔趣洞鄂督諸路兵合攻平涼哈占以興安遊擊王可成叛奏移潼關緑旗兵守商州移西安滿洲兵守潼關尋又以興安叛兵與蜀冦合已陷商州舊縣關將逼西安南山羣盜又分出各口乞敇貝勒洞鄂將軍畢力克圗等發兵赴西安應援上切責之曰始王輔臣叛朕以蘭州為近邉要地令哈占發兵鎮守哈占謂西安兵少不宜分遣致蘭州諸處淪陷嗣以延安為諸路要衝命鄂善周有德等駐守哈占又留之西安致延安陷沒哈占為封疆大臣遇事不周詳籌度祗欲重兵自衛貽誤非小今又謂叛兵與蜀冦合欲諸將分兵赴西安是但知有西安置他處于度外矣且蜀冦何能即至西安因諸將齊赴平涼故為聲揚欲亂我軍心分我軍勢耳諸將當益急攻平涼其現駐太原兵令將軍烏丹率赴潼關防守現駐榆林之蒙古兵令理藩院員外郎拉篤祜率赴西安以偹勦禦九月哈占疏報慶陽從逆知府王文紳守偹路調鼎等擒偽總兵南一元獻城投歸十五年上命大學士圗海代洞鄂為大將軍攻圍平涼王輔臣降哈占疏陳安輯降衆復設官屬等事俱下部議行十七年以失察布政使伊圗侵蝕採買價直部議革職詔從寬留任十九年正月將軍趙良棟王進寶等復成都保寧四川郡邑相繼底定哈占疏言軍餉由陜西運至保寧應令四川官屬接運上以四川初定恐難驟供轉餉諭哈占即令陕西運官以略陽糧艘運至敘州八月詔哈占簡本標及緑旗各營精鋭率赴保寧規復雲貴十月哈占疏言臣進兵保寧所需糧餉若以陜省所運支給不足于用請命四川督餉官盡心經理又言叛賊談宏彭時亨等四出剽掠臣自漢中往保寧所統兵無幾請敇陕西甘肅巡撫提督撥兵略陽陽平寧羌廣元諸要地防守上俱允所請會侍郎趙璟金鼐奏言陕西轉餉入蜀運官不知軫恤人民滋困尚書宋德宜亦言陜西四川宜以一總督統理庶人民勞逸可以酌劑均平于是裁四川總督以哈占為川陜總督哈占既至保寧遣總兵髙孟勦彭時亨敗賊衆於南溪羅石橋諸處復營山縣渠縣哈占尋疏言臣今奉命為川陜總督或應領兵進征或駐兩省適中之地調遣䇿應諭其速滅談宏彭時亨即進征雲南二十年正月鎮南將軍噶爾罕奏報談宏已死忠州萬開建始雲陽梁山等縣賊巢俱平高孟追擊彭時亨亦復廣安州逹州大竹東鄉等縣詔哈占率所屬兵馳赴敘州會建昌永寧兩路兵進征哈占疏言永寧一路大兵急需糧餉陜西輸運困敝請於永寧瀘州諸處採買支給遂允所請發西安庫銀六萬兩遣員齎往五月疏言臣兵發永寧由赤水畢節追勦逆賊馬寶進征雲南兵少力弱請令現駐敘州之固原總兵官王用豫為後應敕用豫即率兵馳守永寧時湖南廣西大軍畢集雲南合圍省城大將軍貝子彰泰以兵多糧少奏言馬寶既降賊勢窮蹙大兵已足用哈占率兵甫至貴州威寧冝令還四川以節滇餉因命哈占還駐要地兼顧川陜哈占至曲靖旋師詔哈占前此革職處分豫開復尋以彭時亨窮蹙來降敘哈占遣兵追勦功加兵部尚書銜先是談宏已死其黨偽總兵牟一乾牟一舉率衆赴遵義降于提督周卜世軍散處巴縣涪州至是哈占疏言一乾等素習姦狡若仍留舊地恐復為患請移之陜西懦弱者歸農強壯者分各營效用上嘉所奏協冝如請行又言慶陽協所轄之潼關商州神道嶺金鎖關四營距慶陽道逺應歸固原鎮統轄富平營分防六縣汛廣兵單應于郿縣營分兵百名增𨽻疏下部議從之二十二年授兵部尚書二十四年四月調禮部尚書十一月以疾乞休自述前此當吳逆作亂捐軀思效晝夜拮據者十年積勞成病得旨哈占前任川陕總督值大兵進征雲南屢奉旨催促始隨他人之後前往未曽立功乃妄稱捐軀思效晝夜拮據著嚴行申飭仍殫力供職以贖前愆二十五年八月卒年五十有五雅賚雅賚滿洲正藍旗人姓納喇初為王府長史兼佐領聖祖仁皇帝康熙十三年九月命署副都統率兵駐防江寧未至奉命移駐安慶時逆藩耿精忠叛應吳三桂遣賊將由福建陷江西廣信建昌饒州三府及湖口彭澤二縣上遣安親王嶽樂為大將軍統師赴南昌詔雅賚與署副都統阿喀尼參贊軍務先由安慶移兵勦賊彭澤十一月雅賚同阿喀尼進征偵知彭澤城北小姑山有賊二百餘據守先遣兵攻勦賊結水寨發鎗炮拒戰我兵繞其後陟山而下奪勇分擊斬偽千總陳三省餘賊多創衄及溺水死者獲賊船二取其軍器遂進薄縣城城西臨大江南北皆巖巒路險峻乃督兵趨其東陟山坡樹雲梯登城賊不能抗縱火焚城中廬舍開東門出遁我兵追擊之殱殪大半獲偽劄及軍器無算遂進征湖口偽逰擊周立龍偽守備周立虎率兵二百餘來降會安親王軍至賊聞風棄城遁都昌安親王令雅賚同阿喀尼勦賊都昌至則賊復竄往鄱陽湖復其城偽監軍道葉甲偽都司周羅王錫等乞降十四年二月雅賚同阿喀尼率水師勦賊鄱陽湖先趨五桂寨賊棄寨竄遁賊將黃浩旋合賊衆乘船迎犯我軍分兩隊交戰賊敗卻追至梅溪瑞洪康山湖汊壩口先後殪賊數千生擒二百餘口獲船數百尋會陸路軍于苜蓿灣與護軍統領郎素副都統珠拉禪等收復餘干縣城四月隨安親王征建昌賊將邵連登據常興山列營三十雅賚率首隊兵由山左仰攻諸軍由右夾擊盡破賊營殱賊無算連登中流矢死六月同都統霍特進征廣昌次石峽天暑人馬疲渴猝遇賊伏我師稍卻雅賚直前奮戰中炮沒于陳賜祭葬如典禮諡襄壯豫騎都尉世職以其子班第襲世宗憲皇帝時入祀昭忠祠其世職既襲三次循例停襲今上乾隆十五年詔核八旗世職之以死事恤敘而襲次已滿者特豫恩騎尉世襲罔替復以雅賚之四世孫德慶襲滿丕滿丕滿洲正藍旗人姓伊爾根覺羅自其曽祖珠瑚逹以來世管佐領康熙十一年由贊禮郎授理藩院主事十四年遷刑部員外郎十九年授監察御史兼襲管佐領二十五年五月御史李時謙疏論刑部勘鞫原任奉天府通判戴純責處雇工人傷重殞命讞證參差遽坐故殺擬絞請敕法司詳勘刑部奏李時謙滿丕于法司會議處共言此案冝改輕由戴純之兄工部員外郎戴綸有賄囑情弊並得旨下法司再審法司以聼許賄囑定讞戴純仍擬絞戴綸李時謙滿丕並革職二十八年李時謙以廷臣薦舉復原官滿丕隨都統郎坦赴尼布楚與俄羅斯使人費耀多囉等議地界毁雅克薩城而還時駕幸古北口外行圍滿丕詣行在奏事處乞代奏願往歸化城北路軍營效力得旨滿丕從雅克薩來不必出征暫在行圍之處隨朕進京二十九年六月授理藩院郎中偕員外郎鄂齊爾齎敕宣示噶爾丹七月上命裕親王福全統師往烏蘭布通親臨邊塞指授方略滿丕持噶爾丹奏章還呈覽于古北口御營又奏言噶爾丹賊壘與大軍相拒不過百里臣願往軍前擊賊上可其奏遂赴烏蘭布通領火器營發鎗炮擊敗賊衆得頭等功牌是年擢內閣侍讀學士眀年遷內閣學士三十一年二月遷理藩院右侍郎明年轉左三十三年五月將軍費揚古奏噶爾丹遣人至言欲通貢偵知有男婦三千餘隨行上命滿丕馳往歸化城詰問來使遣之還仍以噶爾丹奏章呈覽七月詔費揚古進師圗拉尚書阿喇尼率蒙古兵為前哨諭稱滿丕效力之心甚殷可協同阿喇尼經理馹站尋以圗拉無警撤回三十四年七月命往歸化城北協理軍務至則散給噶爾丹使人梅宰桑等餱糧宣敕遣還十一月同副都統阿南逹率喀爾喀兵進駐四子部落蘇尼特部落兩界要地偵偹三十五年二月上親征噶爾丹由中路以費揚古為大將軍出西路滿丕分管自京派發西路之兩藍旗兵由翁金至圗拉五月破賊于昭莫多七月奉詔還歸化城察奏凱旋官兵行糧及撫輯降人諸務九月自請仍赴費揚古軍同駐喀喇穆掄地十一月奉詔移駐喀爾喀逰牧界外塔拉布拉克偵防噶爾丹侵掠三十六年閏三月收降噶爾丹屬人扎木素等由馹遞送歸化城安插奏述扎木素言噶爾丹前在薩克薩圗呼哩克夜聞大炮三聲隨有瀚海旁採捕之人驚告以瀚海飛塵若霧兼聞炮聲大兵已逼近矣衆皆惶恐擾亂噶爾丹避徙十有六日至哈薩克圗哈喇阿濟爾罕地扎木素不願從行逸出來降奏至報聞未幾噶爾丹果竄死阿察阿穆塔台費揚古班師上召滿丕還京列議政大臣豫雲騎尉世職三十七年三月同尚書馬齊副都統烏逹禪出邊蒞喀爾喀諸部會盟三十八年六月兼鑲黃旗滿洲副都統三十九年十一月命往四川總統調發官兵勦撫畨蠻四十年二月同提督唐希順奏分兵三路攻復打箭爐駐兵木鴉十二月奏鴉隴江濵瞻對喇衮革布什咱綽斯甲布諸土目各率所屬户口投誠繳明代印信號紙應請授五品安撫司之職其副為六品土百户頒給印信號紙下部議從之四十一年三月擢正藍旗蒙古都統五月召還京四十三年九月以疾乞罷命原品休致五十二年卒子蘇保襲雲騎尉欽定八旗通志卷一百七十六
