總督值嵗大飢民多流徙而諸郡縣尤苦於兵海寇鄭彩踞福州偽總督顧世臣等踞興化偽帥顔昌儒等踞永春德化偽蕩湖侯阮進張名振等復奉明廢藩陷尤溪出沒于舟山橫洋間錦安撫流民調兵次第會剿擒斬渠魁諸郡縣悉安九年八月漳平圍急錦提師赴援擊賊於江東橋還次同安賊乘夜遣人刺死之事聞賜兵部尚書祭葬如例曽大明曽大明漢軍正藍旗人順治九年以騎都尉隨總督李率泰駐兩廣十年逆賊李定國犯髙明力戰陳亡加恩賜雲騎尉世職承襲詳見世職表朱三朱三漢軍鑲藍旗人初以功授二等輕車都尉天聰五年七月從太宗文皇帝征明至大凌河遇明監軍道張春兵力戰陳亡恩賜一等輕車都尉世職承襲詳見世職表陳維道陳維道漢軍鑲藍旗人原籍錦州崇德七年任佐領尋升恭領十月以署副都統管領雲梯兵隨奉命大將軍饒餘貝勒阿巴泰征明八年三月攻河間府城中炮歿於陳恩賜騎都尉世職承襲詳見世職表栁朝琳栁朝琳漢軍鑲藍旗人任福建漳州府參將順治元年遇海賊之亂城陷不屈死之賞恤如例王鰲永王鰲永漢軍鑲藍旗人順治二年十一月隨大兵招撫山東遇敵陳亡恩賜騎都尉乾隆十六年賞給恩騎尉世職承襲詳見世職表金世爵金世爵漢軍鑲藍旗人任廣東合浦縣知縣順治五年髙州總兵祖澤清叛城陷死之賞恤如例逹自瑞逹自瑞漢軍鑲藍旗人順治元年隨左夢庚投誠授雲騎尉五年十一月山西總兵薑瓖叛六年七月從征西大將軍和碩巽親王滿逹海往征九月攻汾州府城督放紅衣炮克之十月進攻太谷縣城中炮陳亡恩賜騎都尉世職承襲詳見世職表張進學張進學漢軍鑲藍旗人駐防盛京順治六年由護軍校隨副都統墨勒根等擊叛將王永強髙有才于延綏榆林等處值賊兵萬餘迎戰進學被刀傷卒恩賜雲騎尉世職承襲詳見世職表何天福何天福漢軍鑲藍旗人順治十年十二月以驍騎校委署章京從寧南靖寇大將軍陳泰征湖廣十一年擊木城賊中炮陳亡恩賜雲騎尉世職承襲詳見世職表李宏德李宏德漢軍鑲藍旗人任浙江海門逰擊順治十五年九月海賊鄭成功內犯宏德親往征剿爭先馳擊遂歿於陳恩賜雲騎尉世職承襲詳見世職表欽定八旗通志卷二百二十九
