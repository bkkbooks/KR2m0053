body:
  text: 欽定四庫全書欽定八旗通志卷二百二十九人物志一百九忠義傳二十一漢軍八旗一順治十五年共七十五人天命六年至髙守官髙守官漢軍鑲黃旗人任鴨緑江鎮守堡官天命六年中軍陳萬策叛執鎮守逰擊佟養正送明總兵毛文龍守官與焉遂遇害恩賜騎都尉世職承襲詳見世職表花應春花應春漢軍鑲黃旗人崇德三年以佐領隨多羅貝勒巴彥征明至山東攻臨清城先登戰歿賞恤如例崔應泰崔應泰漢軍鑲黃旗人原籍廣寧初任佐領崇德七年隨和碩鄭親王濟爾哈朗征明錦州同四都統兵督放紅衣炮攻塔山城炮裂被傷而歿賞恤如例張思孟張思孟漢軍鑲黃旗人初襲三等輕車都尉世職任佐領順治二年從大軍征山東濟寧州梁山泊土賊力戰陳亡恩賜二等輕車都尉給葬銀五百兩立碑銀三百次子遵聖襲張必科張必科漢軍􅀈黃旗人順治四年由貢生授直𨽻慶雲令時土賊多警會上元夕賊衆出掠率兵捕之縳三渠斬以殉其黨大合衆圍城賊黨內應者啓門納賊賊大至必科巷戰截殺引弓忽弦斷挺戈躍戰賊環圍之援兵不至舉火自焚賜祭葬贈按察司僉事崇祀名宦祠張文衡張文衡漢軍鑲黃旗人原藉開平衛順治元年以佐領入關從大學士范文程恭贊軍務山東流冦趙應元作亂文衡討平之以功遷江南徽寧道按察司副使又平巨寇汪張飛等悉招降諸叛官遂升甘肅巡撫五年回民米喇印作亂殺總兵官文衡率家丁三十餘人巷戰歿事聞賜祭葬授其子張祖訓知州康熙元年恩贈通議大夫都察院右副都御史管一舉管一舉漢軍鑲黃旗人順治元年授山西德勝路參將五年十一月大同總兵薑瓖叛脅從不屈遇害其妻及長子致忠子婦孫女等一十三人皆就戮幼子承業乳母懷之逃出得免恩贈一舉副將馬成功馬成功漢軍鑲黃旗人國初投誠順治六年隨和碩鄭親王濟爾哈朗征湖廣偽帥何通爵馬進忠率賊來犯成功同尚書阿哈尼堪擊敗之旋隨都統金維城擊賊郝搖旗恢復袁州等處賊將馬進忠復聚衆來犯成功奮勇力戰陳亡恩賜雲騎尉世職承襲詳見世職表傅進忠傅進忠漢軍鑲黃旗人順治二年隨明將左夢庚投誠授雲騎尉十六年隨安南將軍內大臣逹素征福建海寇鄭成功十七年五月至厦門力戰陳亡恩賜騎都尉世職承襲詳見世職表祖大春祖大春漢軍正黃旗人大夀之弟也任佐領崇德三年隨揚威大將軍多羅貝勒嶽託征明至山東攻濟寧州城率本參領兵以雲梯先登中炮歿於陳恩賜騎都尉世職承襲詳見世職表尚安福尚安福漢軍正黃旗人崇德三年隨揚威大將軍多羅貝勒嶽託征明至山東攻鄒縣以雲梯上城歿於陳恩賜騎都尉世職承襲詳見世職表祖應元祖應元漢軍正黃旗人初任佐領崇德八年隨和碩鄭親王濟爾哈朗征明攻中後所以本參領火炮從旁擊其城破之進取前屯衛復以炮攻克其外城論功授騎都尉順治元年隨都統葉臣平定山西督紅衣炮克太原城十一月隨定國大將軍和碩豫親王多鐸平定河南二年四月進攻揚州府城中炮歿於陳恩賜騎都尉世職承襲詳見世職表李向舜李向舜漢軍正黃旗人明寧逺伯李成梁之孫也順治元年以署恭領隨定國大將軍和碩豫親王多鐸南征督紅衣炮攻武岡寨克其城二年四月攻揚州府城中炮歿於陳恩賜雲騎尉世職承襲詳見世職表金應得金應得漢軍正黃旗人世居瀋陽地方由驍騎校委署恭領順治二年隨大兵征江南四月攻揚州府城中炮陳亡恩賜雲騎尉世職承襲詳見世職表成大業成大業漢軍正黃旗人纍任江西湖東道順治五年正月江西逆鎮金聲桓叛約大業共謀不從被執罵賊不絶聲遂遇害八年賜祭一次李向堯李向堯漢軍正黃旗人順治元年任山西助馬路參將五年十一月大同總兵薑瓖叛向堯被執脅降不屈闔家七十餘口殉難恩贈左都督僉事王自明王自明漢軍正黃旗人初任佐領順治三年隨征陕西遇流賊孫守法率本旗兵敗之又賊帥賀珍率馬步兵五千餘列陳於山自明隨定西大將軍何洛會擊敗之五年十一月山西總鎮薑瓖叛六年七月隨征西大將軍和碩巽親王滿逹海往征九月攻汾洲府城中炮陳亡恩賜騎都尉世職承襲詳見世職表劉應舉劉應舉漢軍正黃旗人初任佐領隨大兵攻明右衛朔州督紅衣炮克其城順治六年七月隨征西大將軍和碩巽親王滿逹海征山西叛鎮薑瓖九月攻汾州府北關廂越衆先登遂歿於陳恩賜騎都尉加一雲騎尉世職承襲詳見世職表柏天儲柏天儲漢軍正黃旗人父永馥初為明武官率所屬投誠授騎都尉世職天儲初任侍衛兼佐領順治五年九月隨定逺大將軍和碩鄭親王濟爾哈朗征湖廣流賊李錦六年至岔路口奮勇擊賊陳亡加恩賜三等輕車都尉世職承襲詳見世職表張鴻猷張鴻猷漢軍正黃旗人初任守備隨定國大將軍豫親王多鐸南征平定河南江南攻揚州嘉興二府及江隂縣武岡寨四城俱督紅衣炮克之順治五年十一月山西總兵薑瓖叛六年七月隨征西大將軍和碩巽親王滿逹海往討八月攻大同府渾源州督本旗紅衣炮克其城進取中衛戰歿於陳恩賜騎都尉世職承襲詳見世職表郭名望郭名望漢軍正黃旗人世居鐡嶺地方崇德八年以驍騎校隨征明用烏鎗攻克前屯衛取中後所順治元年隨豫親王多鐸破流賊滅福王平定河南江南用紅衣炮攻克揚州六月隨貝勒博洛征浙江克嘉興旋攻崑山常熟江隂三縣城以功授雲騎尉世職三年五月加騎都尉七年九年三遇恩詔由騎都尉兼一雲騎尉進三等輕車都尉後隨征福建同恭領朱名登攻金華城破之六年正月隨定西大將軍和碩敬謹親王尼堪征山西叛鎮薑瓖四月由左衛往圍大同攻保德州中傷歿于陳加賜二等輕車都尉世職子汝龍襲後陳亡自有傳李天寵李天寵漢軍正黃旗人任驍騎校順治五年九月隨定遠大將軍和碩鄭親王濟爾哈朗征湖廣流賊李錦六年至坌路口遇賊身先士卒力戰歿于陳恩賜雲騎尉世職承襲詳見世職表郭汝龍郭汝龍漢軍正黃旗人父名望陳亡恩賜二等輕車都尉自有傳汝龍襲父職順治十一年十二月從定逺大將軍世子濟度征福建海寇鄭成功十四年至福州聞賊圍羅源縣郭汝龍率兵往援擊賊歿于陳恩賜一等輕車都尉世職承襲詳見世職表李向禹李向禹漢軍正黃旗人李向堯之弟也由貢生任山西陵川縣知縣順治五年十一月逆鎮薑瓖叛向禹罵賊不屈闔家殉難十五年特旨遣順天府尹羅繪錦致祭恩賜山西按察司僉事廕其弟向旭以知縣職張彥洪張彥洪漢軍正黃旗人續順公沈志祥之部屬也于順治十六年從安南將軍內大臣逹素征福建海賊鄭成功十七年賊擺列船兵于蓋峙山拒敵彥洪奮勇衝擊陳亡賜輕騎都尉未襲乾隆十六年奉旨賞恩騎尉世職承襲詳見世職表滕應元滕應元漢軍正白旗人以領催隨征有功授騎都尉天聰四年正月從大兵征明攻灤州城奮勇先登力戰歿于陳賞恤如例西逹爾翰西逹爾翰漢軍正白旗人本籍滿洲任副都統管佐領事天總八年從大兵征朝鮮先登衝擊中流矢傷目猶手刃數賊尋歿于陳賞恤如例董廷元董廷元漢軍正白旗人天命六年從大兵定瀋陽大祖高皇帝愛其勇授寬甸守備天聰五年從大兵征明大凌河六年從征察哈爾蒙古七年從征旅順口江華島俱立戰功崇德元年十二月從征朝鮮二年三月從奉命大將軍恭順王孔有德征皮島所乘船被敵炮擊破同家人六口俱沉歿太宗文皇帝憐之恩賜祭銀六百兩趙國良趙國良漢軍正白旗人明之守備也崇德七年大軍圍松山城國良隨副將夏成德來降順治元年敘功授騎都尉世職五年十一月大同總兵薑瓖叛國良隨定西大將軍和碩敬謹親王尼堪往征六年三月于太谷縣奮勇擊賊中炮陳亡恩賜一雲騎尉七年遇恩詔追贈三等輕車都尉世職承襲詳見世職表李可愛李可愛漢軍正白旗人順治三年任山東陽榖縣知縣值土冦丁惟嶽之亂可愛嬰城固守力盡城陷死之賞恤如例遲變龍遲變龍漢軍正白旗人由生員任國史院副理事官遷山西糧道順治三年晉江西布政使整飭學校招集流民江右德之五年二月金聲桓王得仁據城叛舉兵圍署誘以降不從賊入署縳脅之變龍罵益厲賊怒割其舌抉其目遂碎尸於市其祖孫父子兄弟妻妾闔門十八人各繫以石沉於江嗣絶康熙三十四年奉旨崇祀名宦祠董廷儒董廷儒漢軍正白旗人原任大同守備善騎射有謀略順治五年十二月總兵薑瓖謀叛誘廷儒至署密語云公如助我成大事富貴當與共也廷儒怒曰汝受國家厚恩不盡忠報效乃思反耶遂起拔所佩刀殺賊賊衆群起廷儒被擒詈聲倍壯賊剖其心支解之子開國暨男婦二十七人俱被害嗣絶無可廕襲特旨追贈昭武將軍祭葬如典禮趙沖學趙沖學漢軍正白旗人順治初任蘭州同知五年河西叛回米喇印丁國棟等紏黨二萬餘來寇脅降不從遂被害賞恤如例董廷柏董廷柏漢軍正白旗人初任驍騎校崇德五年從征明圍錦州同恭領孫有光擊明松山步兵敗之又敗其杏山騎兵七年從孫有光擊明閭洪山嘴守兵敗之松山敵兵乘夜犯我壕塹遂攻塔山城廷柏用紅衣炮擊却之敘功列二等又攻杏山城擊却之敘功加一等授佐領八年從征前屯衛至中後所廷柏復以紅衣炮攻其城克之又攻克前屯衛城順治元年二月敘功授雲騎尉二年遇恩詔加騎都尉世職是年從和碩豫親王多鐸南征破流賊平河南五月克揚州六月克平湖嘉善進攻嘉興府克之至錢塘江敵兵萬餘夜犯我營廷柏隨都統吳守進擊敗之六年從和碩鄭親王濟爾哈朗征湖廣流賊李錦同副都統金維城率兵至馬河力戰陳亡恩賜騎都尉加一雲騎尉世職承襲詳見世職表張登雲張登雲漢軍正白旗人順治二年以佐領隨都統巴彥墨爾根侍衛往西安府擊流賊屢敗之又擊敗賊將劉文炳兵是年隨肅親王豪格等征四川擊賊首袁韜兵敗之六年正月以管火器營恭領從平西大將軍和碩英親王阿濟格征大同叛鎮薑瓖八月攻大同關廂登雲梯中炮陳亡恩賜雲騎尉世職承襲詳見世職表髙杰髙杰漢軍正白旗人初任佐領順治五年隨定逺大將軍和碩鄭親王濟爾哈朗征湖廣流賊李錦六年同副都統金維城率兵戰于馬河奮勇馳擊歿于陳恩賜雲騎尉世職承襲詳見世職表黃廷柏黃廷柏漢軍正白旗人初任江南靈壁縣知縣遷順天大興縣超遷山西汾州府知府順治五年大同總兵薑瓖叛六年四月偽副將薑建勳擁萬騎猝圍汾洲攻陷城東門廷柏督壯士與賊鏖戰自晝至夜力屈被執罵不絶口遂遇害委尸于路子奠中年十三守父尸號泣汾人感其德具棺衾斂之置北城下既而奠中亦被賊執碎其首不死九月汾州平世祖章皇帝命廷柏家屬枎柩馳驛還京賜祭葬恩贈太僕寺卿廕奠中為國學生康熙五十七年十月禮臣覆準立祠死所歲時奉祀六十一年十一月遇覃恩以孫國材官追贈廷柏資政大夫福建巡撫兼都察院右僉都御史雍正二年三月世宗憲皇帝御書成仁取義匾額懸祠中示褒崇焉王國輔王國輔漢軍正紅旗人由驍騎校崇德八年從大兵攻前屯衛中後所二城國輔率本旗兵以紅衣炮克之又隨都統葉臣等攻太原城以紅衣炮克之復隨多羅武英郡王阿濟格征流賊在延安府同副都統敦岱擊敗之敘功授為雲騎尉兩遇恩詔加為三等輕車都尉十年正月病故以子有德襲後因乏嗣于乾隆十三年奉旨入祀昭忠祠李變龍李變龍漢軍正紅旗人順治二年任陕西固原鎮標中軍逰擊值土寇作亂副將武大定率兵討之兵未合與