body:
  text: 人物志一百十九循吏傳四漢軍鑲紅旗藍旗漢軍正藍旗漢軍鑲漢軍鑲紅旗外任官王清彥王清彥字亮辰漢軍鑲紅旗人順治初授湖廣耒陽縣知縣丁父憂起復九年補任直𨽻大名府魏縣年少有肆應才猾吏蠧胥莫能施其姦事至立判案無留牘時軍興役繁清彥稽牌甲均頭役雖有力之家不得規免窮民無偏纍之苦百姓感其德後內升行人司行人縣民立石畫像以志去思復公請於督撫學政崇祀名宦祠盧豫盧豫漢軍鑲紅旗人康熙癸卯科舉人十六年任山東濰縣知縣朔望同僚屬宣講聖諭十六條風雨不輟小民敦倫睦族教化大行夜不扃户每春下鄉勸農捐助牛種民無遊惰田無荒蕪遇蝗蝻撲滅有方禾稼賴以無害捐俸修理黌宫又於北門外買田十畝為義冢倡修大橋於東門外白浪河設立義學俾訓童蒙旌孝子節婦以樹風聲有節坊烈廟碑記傳世後升湖廣荆州府同知崇祀山東名宦祠徐鳯鳴徐鳯鳴字祥宇漢軍鑲紅旗人順治八年任進賢縣知縣其明年冬土冦入縣鳯鳴與鬭面受一矢仍奮勇追賊手戮數十人賊懼引去邑賴以安事載江西通志十二年調河南郟縣知縣縣當流冦殘敗之後四野荒蕪鳯鳴撫輯招徠安插八里營等處給地耕種名其保曰鴻宅保冢頭鎮河水時發民多病涉鳯鳴捐修石橋以便行旅其禔躬極亷潔聽訟極公明設立義學振興文教邑人歌頌不衰十五年升廣東儋州知州郟縣人思其德崇祀名宦祠韓昌先韓昌先漢軍鑲紅旗人由貢生任浙江蕭山縣知縣蒞事明敏政簡刑寬立里甲均當法使徭役均而詭計弊絶至今遵焉卒於官民為立社西郭以祀之事載縣志康熙六年九月崇祀名宦祠又同旗有蘇宏謨者任貴州糧驛道時滇師凱旋供億之繁日無寧晷宏謨遊刃豁如毫無凝滯先是往來差遣多以人代馬謂之夾馬夫民苦之又養馬草料盡派民間宏謨悉為革除民力以蘇歿後崇祀貴州名宦祠黃道宏黃道宏漢軍鑲紅旗人康熙七年由廕生知福建詔安縣縣治負山濱海地瘠民貧俗多頑梗道宏至即減耗羡修建申明旌善二亭並設義學以勸諭之詔安與粵之潮州接壤姦宄出沒道宏設法撫輯皆歸本業會歲旱虔誠祈禱甘霖立沛十一年遷臨江府同知閩人祀之名宦祠張仲德張仲德漢軍鑲紅旗人康熙十五年任廣東布政使時粵東初平民多失路仲德廣為招徠休養生息免雜徭杜包侵絶差擾禁挪墊革火耗胥吏不敢作姦田有瘠薄給牛種勸民力耕當大兵雲集往征粵西南韶等府每苦兵餉不繼仲德措置得宜勸輸有法上不損賦下不擾民兵馬飽騰因得恢復諸郡兵燹之後士子失業仲德勤加訓誨振興文教貧士或衣食不周必多方周濟浮糧坍荒繪圖詳告編審丁糧隨時消長計糧多寡定差之輕重絶丁口混淆糧差偏纍詭計之弊凡不便於民者悉去之粵中有輕生惡習每因睚眥服毒自縊民以病殁者亦架詞誣陷株連牽纍其家立破仲德遍諭嚴禁有假命圖賴者重治親人並罪鄰人之不為勸解者仍責令本家自行殯葬不許地棍借端詐騙自是粵民無輕生者時征勦叛鎮祖澤清兵馬雜遝積尸甚多仲德捐俸買棺埋葬得免暴露歿後士民僉舉入名宦祠金鳴鳯金鳴鳯字竹亭漢軍鑲紅旗人康熙十六年以恩監生為光澤縣知縣時逆賊初平村落殘燬鳴鳯極意招徠常單騎巡行郊邑有強卒凌虐百姓鳴鳯痛懲之冦至則統領鄉勇盡力捕殺嘗捐資施賑贖難婦給牛種恤農民以生以聚邑民賴之崇祀名宦祠張至隆張至隆漢軍鑲紅旗人康熙三十二年任肇慶府知府廉潔率下僚屬敬畏肅學校勸農桑飭保甲省刑獄士民頌之郡當牂牁下流歲三四月西流暴漲廬舍漂溺至隆親駕小舟躬先負土日夜督率堤以永固從肇慶新橋而上人煙寥落山路多岐舟人以胡蔓毒藥為香燃之客迷遂竊其資名曰悶香船至隆捕得悉投大江中其患始息民立祠祀焉姚啓盛姚啓盛字際斯漢軍鑲紅旗人以刑科給事中分巡贑南持大體不事煩苛而市井豪猾及吏胥貪墨者必繩以法先是贑城數被火災啓盛教民造綆缶畚挶之具以備救護城東小山曰火熖山相傳以為火祥因於路逵浚大井建閣於其上命名天一以壓之啓盛為增修完固火患衰息贑江十八灘水險易溺為置船拯救民無水患革雩都大庾之派積困以蘇尋升江西督糧道又擢布政使每遇贑州事輒留意曰吾未嘗一日忘贑也卒於官贑民匍匐往哭焉康熙十七年崇祀名宦祠黃執中黃執中漢軍鑲紅旗人康熙十七年授福建古田縣知縣時耿逆初定餘黨逃匿山中每出虜掠居民相率遷徙以避執中相率鄉勇攀藤附葛搗其巢殱巨魁八人餘黨潰散乃招撫流離各歸安業尋以丁憂去官服闋補浙江天台縣廉以持己惠以養民一如在古田時升河南南陽府同知卒天台民懷遺愛崇祀本縣名宦祠古田縣亦崇祀名宦祠李遇時李遇時字雨若漢軍鑲紅旗人康熙十八年任嶽州府知府時吳逆之亂大兵初定嶽州招撫流亡勸農息訟滇黔未靖親詣行間轉餉數百里所屬平江縣亂後多積逋遇時曉以大義民咸樂輸郡學傾圯捐資倡率修葺課士勸學振起文教重修嶽陽樓廢墜咸舉士民公請崇祀名宦祠胡雲龍胡雲龍漢軍鑲紅旗人康熙二十一年由廕生知四川鄰水縣事招撫流移勸諭墾闢經畫井然民懷其德崇祀名宦祠同旗有王瑚者以康熙二十二年任四川溫江縣知縣性剛果能斷禁科派吏胥畏之無敢犯法者卒民人思之亦崇祀名宦祠趙世安趙世安字惟康漢軍鑲紅旗人康熙二十七年任浙江仁和縣知縣尋擢福建興化府同知強毅多幹略嚴禁賭博凡樗蒱之戲有偵得者雖紈袴子弟必重懲之又請以罰鍰重修木蘭陂民懷其利後攝詔安縣事卒於官閩人祀之名宦祠王登魁王登魁漢軍鑲紅旗人康熙二十八年由貢生任河南汝州知州設立義學培養人才延請名儒捐俸供給文風丕變每逢朔望實力宣講聖諭重修州志三十年秦晉大荒飢民流入中州登魁設法賑濟全活甚衆蝗起露處郊野撲捕不遺餘力遂不為災先是魯山賊王二等依山嘯聚摽掠鄰境登魁親率民兵討平之三十一年運楚省糧賑飢關中所經過州縣無不騷動登魁措置有方民不擾纍聽斷果決胥吏毫不敢欺舊例編審册籍里書那甲換乙登魁每編一里即明張告示使人人皆知那移之弊悉除三十三年薦舉卓異三十四年六月升江西瑞州府同知紳民列狀保留奉旨留任三十五年十二月升工部員外民至今思其德焉崇祀河南名宦同旗有劉天爵者康熙二十八年任四川屏山縣知縣首重文教士習一新崇祀名宦祠劉廷璣劉廷璣漢軍鑲紅旗人任處州府知府處郡纍石為田十日不雨則旱十日不晴則潦廷璣蒞任閲府城東有好溪堰西有通濟堰舊毁於水捐俸築之蓄泄有資民賴其利康熙二十九年旱荒廷璣上狀督撫並繪飢民圖以獻得請買米平糶飢而不害尤留心訟獄所屬麗水縣民李某家被盜縣捕盜首曹大鞫之扳連二十餘人獄具報府廷璣察盜首甚黠疑其誣因閲所獲器械內有刀刻楊祿字密訪之果有是人近不知所往遂於夜半取曹大訊之曰本日獲盜楊祿供同黨惟爾餘俱不知也曹大始吐扳連是實因蹤迹楊祿捕獲之餘皆得白民稱為神君時當耿逆亂後學校荒廢廷璣捐資改建廣其規制又建蓮城書院為義學又建南明書院為講學之地親率諸生講誦膏火廪餼畢備圭山舊有文昌閣久圯因重建之翼以橫舍二十八楹擬列宿環拱文昌之象為闔郡士子精舍撥社田九十畝資其費既去任士民即其書院祀之纍升至江西按察使緣事降淮揚道生平博學留心風雅所著有葛莊詩集在園雜記行於世崇祀浙江名宦祠張萬言張萬言漢軍鑲紅旗人由恩監生纍升至瓊州府知府在任七年潔己愛民多行善政康熙三十年議設瓊商配引加餉瓊民呈稱瓊郡環海自古竈户皆自煎自賣設商則小民貴販難賣黎人食淡恐生不測萬言據呈力為詳請題免是年大旱發穀賑飢士民感德四十五年士民公請崇祀名宦祠馬國楨馬國楨漢軍鑲紅旗人由監生康熙二十九年任河南安陽縣知縣清介自持勇於除弊每逢朔望宣講聖諭務令家諭户曉民知向義留心民瘼遇水旱災荒或虔誠步禱甘霖立應或捐俸煮粥按户散賑而且加意學宫重修庠舍廣搜經史置之齋房俾單寒之士課誦有資邑素有水患國楨開濬河道境內遇旱則有蓄水之處遇潦則有泄水之區民咸賴之又邑中有孀婦張氏者夜被賊殺凶手未獲拘比鄰之馮三李三二人訊之馮三以李三是夜離家因而誣證其事久未白國楨忽假寐間若有神明指示之者曰馮四訊之始知事由馮三因拆視其衣見血迹猶存腥聞尚在馮三俯首伏罪邑人歎服在任十二載四十年升廣西潯州府同知四十三年又升湖廣荆南道尋轉江南鎮江道五十三年丁憂回籍五十九年奉旨派委運米進藏以疾卒於軍前河南人思其德公請崇祀名宦祠祝鍾哲祝鍾哲漢軍鑲紅旗人康熙三十一年由廕生任江西撫州府知府入境日以生民為念刑罰悉用輕典城牆傾圯者即行修葺嚴禁催科加耗漕項羡餘減香稅革積弊三十二年夏大旱齋戒步禱焦勞致疾歿於任合郡士民感念三十三年公請崇祀名宦祠吳玥吳玥漢軍鑲紅旗人康熙甲戌進士四十年任河南湯隂縣知縣內慈祥外嚴毅愛民如子而疾惡如仇興利剔弊政簡刑清設義孰置學田延名師訓課生童時親加考校多士振興四十二年聖祖仁皇帝西巡面試經書稱旨特調江南蘇州府長洲縣知縣士民至今猶歌思不置云後崇祀名宦祠熊惟傑熊惟傑漢軍鑲紅旗人任浙江按察使性峭直然善拊循百姓杭州兵民雜處強弱不相能常多訐訟或訴於途有司驅車過不問望見按察使前節輒歡然曰熊父來事當白矣惟傑為立剖之兵民咸恱服焉卒祀名宦祠同旗有武國楹者任至浙江按察使清慎慈和貧至不能具饔飱聖祖仁皇帝南巡善其治賜豫優渥後升福建布政使尋卒崇祀浙江名宦祠張肇經張肇經漢軍鑲紅旗人任杭州府通判才猷練達剖決明敏案無留牘民無寃獄一時有神明之頌靖共厥職以勞卒於官杭州民人思之康熙四十一年崇祀名宦祠同旗有趙士珩字楚卿者任湖廣巴陵縣知縣均徭役請蠲荒糧政簡刑清設登瀛會以造士文風丕振士民德之亦崇祀名宦祠以上二十六人並舊志所載漢軍正藍旗外任官張朝瑞張朝瑞漢軍正藍旗人世居遼東廣寧順治五年知河南登封縣少年老成洞悉民隱邑經兵燹土地荒蕪多方招徠給牛種勸開墾凋殘頓蘇衙署傾坍捐俸重修又修理學宫雅意作人纂修邑志立義學課士嚴保甲靖盜賊士民德之秩滿升河南道御史巡按湖北父老追送百餘里後崇祀登封縣名宦祠張登選張登選漢軍正藍旗人順治十二年進士仕至浙江按察使執法公平獄無枉滯浙江經逆藩耿精忠之亂冦盜充斥男女流離登選為設法贖之完聚甚衆民感其恩康熙三十年十二月崇祀名宦祠梁繼祖梁繼祖漢軍正藍旗人世居義州康熙元年由舉人知五臺縣凛遵聖諭每逢朔望躬詣城隍廟親為講解諄諄然以敦教化厚風俗為務姦宄革面豪強屏肅勸止鬬爭嚴禁賭博嵁巗匿盜之藪悉皆解散初蒞任見學宫荒廢捐俸補葺宫牆煥然一新署前有隙地一塊建文昌祠延師教授生童四鄉亦廣立義學貧乏不能讀書者皆教育其中由是科名蔚起又蓋造養濟院一所窮獨鰥寡存活甚衆升江南六安州知州又升平陽府知府尋卒三十五年五臺縣士民思其德崇祀名宦祠劉際昌劉際昌漢軍正藍旗人康熙初年由舉人任河南考城縣知縣剛方寡言笑處事明斷迎刃而解時鄉有盜警親率健卒夜往擒之盡獲由此羣盜屏息復捐俸修學宫殿廡振興文教尋升雲南曲靖軍民府知府馬龍州知州後崇祀考城縣名宦祠劉靖寰劉靖寰漢軍正藍旗人康熙九年由廕生任四川犍為縣知縣時地方初靖前軍興時相沿派辦差務甚繁胥吏假公濟私侵漁百姓常例之外多所苛求靖寰訪知其弊悉革之出納有經事治而民不病州人德之崇祀名宦祠同旗有劉際亨字賓虞者康熙二十五年由廕生任四川夾江縣知縣亦當逆藩吳三桂變亂之後都邑荒蕪際亨修理城垣開築新堰有功地方尋升工部主事士民思之崇祀本縣名宦祠甘國基甘國基漢軍正藍旗人康熙二十七年任山西太原府知府正躬率屬除舊政之病民者修學校課生童士風鼓舞每月朔望勤講聖諭實心化民折獄明允片言立決嚴訪胥蠧豪惡斂迹又捐俸覔乳母養育嬰兒設立義冢收埋枯骨潔己奉公民皆感頌纍升至河南布政使禁私派革火耗懲貪酷舉廉能民間利弊加意興除又延名師以主書院捐義田以資膏火凡有關名節之事曲意成全被恩者至今頌之山西河南並崇祀名宦祠以上七人並舊志所載漢軍鑲藍旗外任官魏明德魏明德漢軍鑲藍旗人康熙十五年以護軍從征福建逆藩耿精忠事平委知龍溪縣旋調赴軍前十八年再任龍溪性寬簡遇事敢為時軍需夫役旁午交至明德按籍均應無所瞻徇軍士占民房者請諸大帥立還之邑人感其德祀之名宦祠何偉何偉漢軍鑲藍旗人康熙二十二年由廕生任浙江遂安縣知縣遇紳士有禮然正直自矢不可干以私剖決庶務民無枉抑田地山場有虛糧者勘實具結請均攤本里不使偏纍課額亦不虧捐俸重修學宫振興文教衡文察行懲勸並行士皆淬勵三十九年升江南和州知州以治遂安者治之居五年卒於任先是鑲紅旗漢軍石參為和州十年清亷慈惠多善政比卒和民立祠以祀之至是奉偉合祀號曰二賢牧祠劉顯謨劉顯謨漢軍鑲藍旗人由官學生考取內閣中書升內閣侍讀從鎮南將軍莽依圖南征八年升刑部員外郎旋升工部郎中康熙二十七年外轉分巡荆南道按察司僉事在任敦崇節儉立義學省刑罰禁私徭雜派兵民相安尋兼監視三府河工修築堅固親身督率隄防百姓安堵升山西河南道卒於官荆州人思其德崇祀名宦祠齊宗德齊宗德漢軍鑲藍旗人康熙三十五年任陽山縣知縣到任後首隆學校多士奮興陋規雜派次第革除民無擾纍四十一年邑被大水城垣濠塹及人民廬舍多倒塌湮沒宗德為捐俸修築俱得完固在任九年興利除害勸課農桑省刑薄斂淡薄自甘民霑實惠四十四年丁母憂歸通邑如失怙恃勒像於石以志去思焉阿琳阿琳字玉山漢軍鑲藍旗人由廕生任部曹康熙四十年外補福建汀漳道副使漳俗苦姦民豪橫琳執其尤黠者置之法餘則榜其過惡於門使知愧悔於是豪強斂戢修理學宫𨗳民嚮學歲飢出俸金為粥賑之民甚賴焉尋升貴州按察使纍官至太僕寺卿卒康熙六十一年閩人思之崇祀名宦祠以上五人並舊志所載欽定八旗通志卷二百三十九
