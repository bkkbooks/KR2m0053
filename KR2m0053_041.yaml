body:
  text: 旗分志二十七八旗佐領二十七鑲紅旗漢軍佐領鑲紅旗漢軍佐領鑲紅旗漢軍都統所屬㕘領五第一㕘領下佐領六第二㕘領下佐領六第三㕘領下佐領六第四㕘領下佐領六第五㕘領下佐領六第一㕘領第一佐領係順治二年将八臺壮丁編為牛录初以髙岱管理髙岱故以其子髙登科管理髙登科陞任總兵官以其弟髙登名管理髙登名年老辭退以其子髙宏肇管理髙宏肇陞任逰擊以髙登科之子髙宏棨管理髙宏棨陞任西安駐防協領以其子髙煥管理髙煥陞任㕘領縁事革退以刑部右侍郎王國棟管理王國棟縁事革退以刑部筆帖式祝兆龍管理祝兆龍故以三等男副㕘領呉文煥管理呉文煥㕘革以副㕘領曹龍標管理曹龍標故以雲騎尉王正中管理王正中故以印務章京李鎮管理謹案此佐領雍正十年髙煥治罪改為公中佐領第一㕘領第二佐領係順治元年編設初以户部侍郎祝世廕管理祝世廕故以其長子祝萬年管理祝萬年故以其弟祝萬春長子祝鍾靈管理祝鍾靈告終養以祝萬年長子祝鍾秀管理祝鍾秀故以其子祝兆圖管理祝兆圖故以祝鍾靈子祝兆彛管理祝兆彛故以其弟祝兆書之長子祝致英管理續以祝維坤管理祝維坤故以其子祝天璽管理祝天璽革職續以其堂叔祝維震管理謹案旗冊此佐領係天聰五年編立第一㕘領第三佐領係順治二年編設初以周國政管理周國政陞任寜夏總兵官以其壻徐國相管理徐國相陞任山東布政使以周國政子哲爾肯管理哲爾肯陞任廣西提督以其弟周文炳管理周文炳故以其子周承詔管理周承詔故以其子周炎管理周炎縁事革退以其叔父之子周煒管理周煒故以周福慶管理周福慶故以周福順管理周福順故以藥王保管理謹案旗冊此佐領係順治八年編立第一㕘領第四佐領係順治元年編設初𨽻正藍旗以蔡永年管理蔡永年故以鞠應春管理鞠應春故以朱廷彩管理朱廷彩故以王學孟管理王學孟陞任鎮江蘇喇章京以朱廷彩之子朱永祚管理朱永祚故以其弟朱永芳管理朱永芳陞任廣東駐防㕘領以其子朱先管理朱先因病辭退以千總王霈管理雍正四年此佐領撥𨽻本旗王霈故以一等阿達哈哈畨又一拖沙喇哈畨劉垣管理劉垣故以趙䝉恩管理趙䝉恩故以呉國澍管理呉國澍陞授山西都司以王世賢管理王世賢故以紀大鏞管理紀大鏞補放世管佐領以黄文燝管理第一㕘領第五佐領係天聰九年初編半箇牛录以撥什庫李茂芳管理崇徳七年始編為整牛录順治初年李茂芳外任揚州以其子李顯貴管理李顯貴陞任鎮江将軍以其子李廷麟管理李廷麟縁事革退以其子李斯韓管理李斯韓因甄别革退以其叔父之子候選縣丞李斯琦管理李斯琦縁事革退以其兄之子李延紳管理李延紳陞授大名府知府以堂弟李延綿管理李延綿陞授京口㕘領以堂姪李錦雲管理李錦雲故以其子廣福管理第一㕘領第六佐領係崇徳二年編設初𨽻正藍旗以李天福管理李天福故以佟仲器管理佟仲器故以佟宏器管理佟宏器陞任奉天府尹以驍騎校佟文煜管理佟文煜縁事革退以工部員外郎呉光祖管理呉光祖陞任潞安府知府以阿達哈哈畨呉瑞麟管理呉瑞麟陞任鎮江駐防㕘領以呉祥麟管理呉祥麟縁事革退以孟希賢管理雍正四年此佐領撥𨽻本旗孟希賢故仍以㕘領呉瑞麟管理呉瑞麟縁事革退以副㕘領馬國楷管理馬國楷縁事革退以阿達哈哈畨于宗璽管理于宗璽陞授京口協領以户部郎中黄澍管理黄澍陞授福建道以三等輕車都尉李璋管理李璋故以雲麾使柯眀意管理柯眀意陞授㕘将以騎都尉李延書管理李延書革職以印務㕘領胡邦卿管理謹案旗冊此佐領係崇徳七年編立第二㕘領第一佐領係順治二年編設初以世職牛录章京張起龍管理張起龍縁事革退以拖沙喇哈畨白應時管理白應時陞任鎮江駐防㕘将以申鋐諝管理申鋐諝縁事革退以拖沙喇哈畨白如正管理白如正故以其子白超管理白超縁事革退以副㕘領王朝輔管理王朝輔縁事革退以户部員外郎劉廷瑛管理劉廷瑛陞任知府以王士儀管理王士儀革職以黄嘉管理黄嘉故以馬陞基管理馬陞基故以劉嘉慶管理劉嘉慶故以黄文勲管理第二㕘領第二佐領係崇徳七年編設初以刑部承政兼梅勒章京孟喬芳管理孟喬芳陞任川陜總督以其弟孟喬榮管理孟喬榮因病告退以孟梁文管理孟梁文陞任鎮江駐防協領以孟喬芳養子孟熊飛管理孟熊飛縁事革退以孟喬榮子孟熊佐管理孟熊佐故以孟喬芳之孫孟維祖管理孟維祖故以其弟孟經祖管理孟經祖縁事革退以其弟孟繩祖管理孟繩祖縁事革職以孟以恒管理孟以恒故以孟長齡管理第二㕘領第三佐領係康熙七年編設初以都統柯永華之弟柯永藝管理柯永藝故以其弟二等侍衛柯永蒔管理柯永蒔年老辭退以柯永華子柯森管理柯森陞任逰擊以其子柯眀徳管理柯眀徳故以其弟柯眀善管理柯眀善縁事革退以其弟柯眀治管理柯眀治故以柯藩管理謹案旗冊此佐領康熙七年因柯永華陞授都統奉㫖一品大臣令出包衣賞編佐領第二㕘領第四佐領係崇徳七年編設初以王元爵管理王元爵陞任甲喇章京從征浙江陣亡以其養子王秉政管理王秉政陞任漢中駐防㕘領從征四川陣亡以其弟王秉衡管理王秉衡縁事革退以倉場總督王秉仁管理王秉仁從征湖廣陣亡以其弟王秉信管理王秉信縁事降調以王秉政子王原懿管理王原懿故以其子王紹瑞管理王紹瑞縁事革退以其兄之子王佐管理王佐故以王元爵之曽孫王永譽管理王永譽陞任直𨽻昌平㕘将以其子王守中管理王守中故以其子王溶管理第二㕘領第五佐領係崇徳七年編設初