  text: 旗分志二十六八旗佐領二十六鑲白旗漢軍佐領鑲白旗漢軍佐領鑲白旗漢軍都統所屬參領五第一參領下佐領六第二參領下佐領六第三參領下佐領六第四參領下佐領六第五參領下佐領六第一參領第一佐領係順治三年將隨左夢庚投誠人員編為牛彔漢文稱佐領初以投誠遊擊安文信管理安文信年老辭退以其孫八品官安有勳管理安有勳故以其子拜他喇布勒哈畨漢文稱騎都尉又一拖沙喇哈畨漢文稱雲騎尉安華管理安華升任廣東副都統以其子安致中管理安致中升任福建駐防協領以其弟安致和管理安致和緣事革退以參領王毅管理謹案此原係世管佐領乾隆二十六年安致和緣事革退作為公中佐領第一恭領第二佐領係崇德七年編設初以姚時雍管理姚時雍故以馬一豹管理馬一豹駐防福建以姚世勳管理姚世勳緣事革退以姚正宗管理姚正宗緣事革退以祖大樂兄子祖澤逺之孫阿達哈哈畨漢文稱輕車都尉蘇巴里管理蘇巴里升任廣東參將以其族叔祖良籌管理祖良籌緣事革退以其族兄之子祖應祥管理祖應祥緣事革退以祖尚德管理祖尚德革職以孝順阿管理孝順阿故以廣泰管理旨世謹案乾隆二年祖尚德員缺應襲之人年俱幼小奉管佐領非世職可比若將伊等補放不能辦事仍須另著人署理今譜內蘇巴里祖尚志現俱管理佐領此佐領即著祖尚志署理俟伊等長成再行補放諭旨又奉福珠里佐領并世管佐領缺出仍照前將應嗣後襲之人即行帶領引見補放若補授之人年紀幼小即將伊族中管佐領之人署理如無管佐領之員準伊族中應襲之員署理如無應署之員再行揀異姓人員代管其承襲之人照例給與半俸俟其長成能辦事時具奏將佐領事務移交管理第一恭領第三佐領係崇德七年編設初以祖澤逺管理祖澤逺升任杭州梅勒章京漢文稱副都統以汪騰髙管理汪騰髙從征陳亡仍以祖澤逺管理祖澤逺升任江南提督以分得撥什庫漢文稱驍騎校馬成功管理續仍以祖澤逺管理祖澤逺年老辭退以其子祖良臣管理祖良臣緣事革退以其族伯副都統祖植春管理祖植春年老辭退仍以火器營協領祖良臣管理祖良臣年老辭退以其子蘇巴里管理蘇巴里升任黑龍江參領以參領蕭國用署理蕭國用升任杭州駐防協領以參領祖良籌署理續因蘇巴里升任正黃旗漢軍副都統此佐領仍以蘇巴里管理蘇巴里因年老告休以祖學聖管理祖學聖緣事獲罪以祖尚德管理祖尚德緣事革退以髙瑞管理謹案此佐領於乾隆二十九年作為公中佐領第一恭領第四佐領係崇德七年編設初以守偹盧登科管理盧登科故以其子盧光祖管理盧光祖故以其弟盧揚祖管理盧揚祖年老辭退以其兄之子盧起隆管理盧起隆故以其弟之子官保管理官保外用河南候補道以其兄盧世昌管理盧世昌緣事革退以其弟盧世煥管理盧世煥參革以其子明喜管理第一參領第五佐領係康熙十二年將臺上漢人編為佐領初以撥什庫漢文稱領催李進忠管理李進忠故以李天祿管理李天祿故以其子李衡管理李衡故以其子李朝棟管理李朝棟故以其子李炳管理李炳故以李烍管理第一參領第六佐領係順治三年將隨左夢庚投誠人員編為牛録初以投誠人秦舉管理秦舉升任廣東駐防參領以其弟秦斌管理秦斌從征病故以其子秦國卿管理秦國卿故以其子秦世祿管理秦世祿故以其弟秦世祥管理秦世祥故以其弟秦世祺管理秦世祺故以其姪秦璜管理秦璜升任廣州將軍緣事革職獲罪以騎都尉加一雲騎尉髙全錧管理謹案此佐領襲至秦璜緣事治罪乾隆三十七年作為公中佐領第二恭領第一佐領係崇德七年編設初以王國明管理王國明駐防杭州以張登雲管理張登雲從征山西陳亡以王國明之弟王國亮管理王國亮駐防鎮江以其弟王國登管理王國登年老辭退以王國亮之子王衡管理王衡升任廣東駐防協領以其子王殿元管理王殿元故以其子王之錦管理王之錦緣事革退以其族叔王殿臣管理王殿臣革職以王之鋭管理王之鋭故以王焜管理王焜故以王一麟管理第二參領第二佐領係崇德七年編設初以劉志友管理劉志友年老辭退以其子刑部貟外郎劉景榮管理劉景榮升任河南道以其弟劉景材管理劉景材從征江西病故以其兄劉景梁管理劉景梁升任參領病故以其子三等侍衛常有管理常有升授一等護衛緣事革退佐領以其兄之子劉永炳管理劉永炳升任以劉塏管理劉塏故以劉廷筠管理第二參領第三佐領係順治三年編設初𨽻正白旗以半個前程孔永吉管理孔永吉駐防福建以蕭養元管理續以董正國管理續以孔永吉之子孔興隆管理康熙九年此佐領始撥𨽻本旗孔興隆故以其子孔育彥管理孔育彥因病辭退以其子孔傳斌管理孔傳斌故以其弟孔傳志管理孔傳志告病以其姪孔繼梁管理孔繼梁故以其子孔廣福管理孔廣福故以其子孔昭國管理第二參領第四佐領係康熙十二年編設初以本旗滿洲前鋒陳世龍管理陳世龍年老辭退以其子筆帖式雅爾泰管理雅爾泰因病辭退以其子陳治安管理陳治安故以陳鑑勳管理陳鑑勳革職以陳良管理陳良故以陳文敬管理陳文敬革職以其弟陳文玉管理第二恭領第五佐領係順治三年編設初𨽻正白旗以遊擊劉定邦管理劉定邦故以鄭啓君管理鄭啓君故以石文煥管理石文煥故以綽爾滿管理綽爾滿緣事革退以鄭朝興管理鄭朝興從征陳亡以鄭宗磐管理鄭宗磐故以鄭汝霖管理鄭汝霖故雍正四年此佐領撥𨽻本旗以拖沙喇哈番汪宏毅管理汪宏毅緣事革退以副參領韓延紀管理韓延紀故以改用旗員之郎中白映槐管理白映槐故以金秉恭管理金秉恭故