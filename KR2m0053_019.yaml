body:
  text: 旗分志五八旗佐領五正黃旗滿洲佐領領管領正黃旗包衣佐正黃旗滿洲佐領下四參領至五參領第四參領第一佐領原係國初以都督兼扎爾固齊漢文稱遊牧雅虎所管牛録分為二渾托和漢文稱管領之一始以雅虎長子承政滿達爾漢管理後因人丁滋盛改為牛録仍以滿達爾漢管理滿達爾漢年老辭退以其子諾木齊管理諾木齊故以其弟散秩大臣多謨克托管理多謨克托解任以其子格爾布管理格爾布解任以其叔父之子護軍統領鄂克濟哈管理鄂克濟哈故以其子班代管理班代升任西安副都統以其弟董達色管理董達色升任天津駐防協領以其子三等侍衛五十管理五十往守陵寢以雅虎之五世孫常忠管理常忠故以其子武爾清阿管理第四參領第二佐領係第一佐領內滋生人丁多謨克托管佐領時分出一佐領以其兄之子副都統謨爾渾管理謨爾渾退任以其伯父之孫查爾達管理查爾達緣事革退以其兄之子二等阿達哈哈番納明管理納明升任綏逺城副都統以叔祖之二世孫德克進管理德克進故以其孫哈福納管理哈福納緣事革退以其叔祖之孫哲爾進管理第四參領第三佐領係以第一第二兩佐領內餘丁編立始以散秩大臣吳格管理吳格往守陵寢以伊善管理伊善解任以吳格之子三等侍衛興常管理興常故以其子常福管理常福故以其子福泰管理第四參領第四佐領初即雅虎牛彔分編之第二渾托和始以雅虎第三子承政馬福塔管理後亦因人丁滋盛改為牛録仍以馬福塔管理馬福塔故以其兄之子侍郎碩爾對管理碩爾對故以馬福塔之子尚書馬希納管理馬希納因病辭退以其子蘇爾特管理蘇爾特緣事革退以滿達爾漢之二世孫佛羅管理佛羅年老辭退以其子節祿管理節祿故以副都統謨爾渾之子郭岱管理郭岱故以其子郭興阿管理郭興阿故以其子郭清額管理第四參領第五佐領係第四佐領內滋生人丁康熙六年馬希納管佐領時分立一佐領以馬希納之弟內閣學士馬爾杜管理馬爾杜故以其伯父之子詹事德爾德管理德爾德故以其子常雲管理常雲緣事革退以馬希納之子英修管理英修升任陵寢副總管以其兄都統蘇勒法管理蘇勒法故以其子蘇洪管理蘇洪緣事革退以其伯父之子整儀尉納德春管理納德春告休以其姪蘇和臣管理蘇和臣升任廣州協領以其子額林清管理額林清故以其弟額勒進管理額勒進故以其子祥安管理第四參領第六佐領係康熙三十四年分編佐領時於伊爾格圖馬爾薩頗爾噴尚德鄂克濟哈謨爾渾六佐領內分出初以副都統布喇管理布喇故以其子塔竒拉管理塔竒拉故以侍讀學士花塞管理花塞緣事革退以給事中常住管理常住故以喜蘭泰管理喜蘭泰故以副都統和碩額駙富僧額管理富僧額故以通政司少卿那罕管理那罕故以三等伯鄂爾齊達遜管理鄂爾齊達遜故以侯安林管理安林革退以頭等侍衛雅爾瑚達管理雅爾瑚達故以騎都尉成祿管理成祿升授霸州防守禦以副都統春寧管理春寧升任伊犁領隊大臣以吏部員外郎珠隆阿管理第四參領第七佐領係國初編立始以固山額真後改固山按班漢文稱都統覺羅托博輝管理托博輝故以其子達賴管理達賴故以其兄額爾克管理額爾克解任以達賴之子功格特管理功格特故以托博輝弟拉代之子額素圖管理額素圖年老辭退以功格特之弟鍾特管理鍾特因病告退以其長子巴鼐管理巴鼐因疾辭退以其子巴海管理巴海故以巴鼐弟巴竒蘭之子永福管理永福故以其子進德管理進德故以其子奉泰管理奉泰故以御史覺羅保寧署理第四參領第八佐領係第七佐領內滋生人丁康熙二十三年巴鼐管佐領時分編一佐領以額素圖之子色楞管理色楞故以額爾克之二世孫西特庫管理西特庫故以色楞弟阿哈禪之子色什圖管理色什圖升任白都訥協領以巴鼐之弟進寶管理進寶升任福陵副總管以其族兄德爾錦管理德爾錦因殘疾辭退以巴鼐之次子九海管理九海故以廣泰管理廣泰故以其子保寧管理第四參領第九佐領係國初以朝鮮來歸人丁編立始以納林管理納林故以其子達敏管理達敏緣事革退以其弟阿逹哈哈畨逹爾胡大管理後令逹爾胡大専任阿達哈哈畨以其弟戴都管理戴都故以其長子戴寧管理戴寧故以其弟戴文管理戴文襲三等阿逹哈哈畨以戴寧之子副都統戴林布管理戴林布升任江寧將軍以其弟富泰管理富泰故以其姪之子羡昌管理羡昌故以其子恆泰管理恆泰緣事革職以其叔曽祖之孫佟德管理續以騎都尉常福管理第四參領第十佐領係第九佐領內滋生人丁康熙六年戴都管佐領時分立一佐領以達爾胡大子戴敏之繼子福喀管理福喀故以其子福長管理福長故以戴敏次子逹夀管理達夀故以其子竒常管理後改令戴興之子石德管理石德緣事革退以其子竒祿管理竒祿故以其子佟泰管理佟泰緣事革退以其祖之三世孫佟德管理第四參領第十一佐領係康熙十三年於齊蘭布雅圖覺羅薩秦穆占明珠五佐領內分出初以郎中碩甘管理碩甘升任漕運總督以一等伯四格管理四格駐防右衛以都統吉黨阿管理吉黨阿緣事革退以護軍參領喀濟管理喀濟故以護軍統領寇婁管理寇婁告病以前鋒參領拉思泰管理拉思泰告退以護軍參領皂保管理皂保升授副將以公德祿管理德祿故以副都統和珅管理和珅升任尚書以侯和雙額管理第四參領第十二佐領初係副都統泰音布管理泰音布故以內大臣鄂莫克圖管理鄂莫克圖故以內大臣坤巴圖魯管理坤巴圖魯故以散秩大臣拜音察克管理拜音察克故以尚書賴都管理賴都故以散秩大臣公五格管理五格故以侯英泰管理英泰故以