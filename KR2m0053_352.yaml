body:
  text: 八旗大臣題名三各省提督柯永盛漢軍鑲紅旗人順治四年四月任湖廣提督康熙三年六月調山西提督十一年四月休王可臣漢軍正白旗人康熙十二年十一月任湖廣提督十二月休十五年六月任廣東提督十七年閏四月卒徐治都漢軍正白旗人康熙十八年三月任湖廣提督三十三年六月休額倫特漢軍鑲紅旗人康熙四十九年三月任湖廣提督五十二年四月升湖廣總督髙其位漢軍鑲黃旗人康熙五十二年四月任湖廣提督六十年五月調江南提督雍正三年六月升內閣大學士魏經國漢軍正白旗人康熙六十一年五月任湖廣提督雍正四年調江南提督張正興漢軍鑲黃旗人雍正十年八月任湖廣提督周卜世漢軍正黃旗人康熙十三年二月任山西提督十五年四月降李思忠漢軍正黃旗人順治四年五月任陜西提督十四年七卒柏永馥漢軍正黃旗人康熙三年十月任陜西提督李林隆漢軍正紅旗人康熙三十一年三月任陜西提督三十七年三月升都統噶爾弼滿洲鑲黃旗人雍正元年二月任陜西提督蘇丹滿洲正黃旗人雍正二年七月署陜西提督姚文玉漢軍正藍旗人雍正三年六月任陜西提督李繩武漢軍正黃旗人雍正十年十月任陜西提督乾隆元年十二月任甘肅提督三年四月調陜西提督六年十二月復任十年七月調安西提督十三年八月再任十月調陜西提督十四年二月任直𨽻古北口提督四月調福建陸路提督十一月調浙江提督雷繼尊漢軍鑲黃旗人康熙三十九年十月任甘肅提督四十年五月卒吳洪漢軍鑲紅旗人康熙四十三年三月任甘肅提督四十六年四月卒殷泰滿洲鑲紅旗人康熙四十六年四月任甘肅提督四十八年七月升川陜總督范時捷漢軍鑲黃旗人康熙五十七年六月任甘肅提督雍正元年七月署陜西巡撫九年四月調陜西提督孫思克漢軍正白旗人康熙十五年八月任涼州提督二十三年五月調甘肅提督三十九年十月故楊茂勳漢軍鑲紅旗人康熙十八年四月任四川提督黃廷桂漢軍鑲紅旗人雍正五年二月任四川提督偏圗漢軍正白旗人康熙三年二月任雲南提督桑格漢軍鑲藍旗人漢名李世榮康熙十二年九月任雲南提督十二月調湖廣提督十八年二月再任胡拜漢軍正藍旗人康熙十三年二月任雲南提督諾穆圗漢軍鑲藍旗人康熙二十七年八月任雲南提督三十三年二月升副都統郝玉麟漢軍鑲白旗人雍正元年九月任雲南提督七年三月升兩廣總督趙賴漢軍正藍旗人康熙十三年二月任貴州提督十五年三月調十八年二月再任馬三竒漢軍鑲黃旗人康熙二十八年二月任貴州提督三十年十二月調浙江提督三十八年二月升京口將軍張致漢軍鑲紅旗人康熙六十年六月任貴州提督雍正元年升副都統線國安漢軍正白旗人順治五年六月任廣西提督十六年十二月革哲爾肯漢軍鑲紅旗人康熙十八年二月任廣西提督二十三年三月休李林盛漢軍正黃旗人康熙二十三年六月任廣西提督三十七年四月調陜西提督四十六年六月調甘肅提督四十三年三月休張朝午漢軍鑲藍旗人康熙五十一年任廣西提督左世永漢軍正黃旗人康熙五十五年䦌二月任廣西提督雍正元年三月升都統張溥漢軍正黃旗人雍正七年四月任廣西提督八年七月調廣東提督乾隆二年正月卒侯襲爵漢軍鑲紅旗人康熙十七年閏四月任廣東提督二十三年九月調貴州提督盧崇耀漢軍鑲黃旗人康熙三十六年七月任廣東提督三十七年七月升廣東將軍施世驃漢軍鑲黃旗人康熙三十六年七月任廣東提督五十一年三月任福建水師提督六十年十月卒馬毅漢軍鑲白旗人廣熙六十一年十二月任廣東提督雍正元年八月卒董象緯漢軍鑲黃旗人雍正元年九月任廣東提督三年七月升鑾儀使王之鼎漢軍正紅旗人康熙十年八月任江南提督十二年十月升十八年五月任四川提督二十年正月卒金世榮漢軍正黃旗人康熙二十八年十二月任浙江提督二十九年十一月調江南提督三十三年十月升福州將軍趙珀漢軍鑲紅旗人康熙五十七年九月任江南提督六十年正月革柏之蕃漢軍正黃旗人雍正五年十二月任江南提督補熙滿洲鑲黃旗人雍正十二年十月任江南提督乾隆元年七月升漕運總督田雄漢軍鑲黃旗人順治三年五月任浙江提督康熙二年五月卒李哈喇庫漢軍正藍旗人康熙二年七月任浙江提督六年十一月解任劉邦柱漢軍鑲黃旗人康熙六年十二月任浙江提督八年六月解任塞白理漢軍正黃旗人康熙八年九月任浙江提督十四年五月卒石調聲漢軍鑲黃旗人康熙十四年十一月任浙江提督三十三年三月卒鍾世臣漢軍正紅旗人康熙六十年十月任浙江提督雍正二年六月卒楊長春漢軍鑲黃旗人雍正二年七月任浙江提督四年六月卒劉光弼漢軍鑲藍旗人順治十六年正月任江西提督康熙十二年十二月休趙國祚漢軍鑲紅旗人康熙十三年正月任江西提督十八年十一月休劉忠漢軍正黃旗人順治四年五月任福建陸路提督五年三月來京授一等男楊名髙漢軍鑲黃旗人順治五年三月任福建陸路提督十三年二月革馬得功漢軍鑲黃旗人順治十三年二月任福建陸路提督康熙二年從征陳亡段應舉漢軍鑲藍旗人康熙十五年三月任福建陸路提督十七年五月解任諾邁漢軍鑲藍旗人康熙十九年九月任福建陸路提督楊琳漢軍鑲紅旗人康熙五十年九月任福建陸路提督五十三年十二月升廣東巡撫施琅漢軍鑲黃旗人康熙元年七月任福建水師提督十八年三月休許天寵漢軍正白旗人順治十八年九月任河南提督佟徽年漢軍正藍旗人康熙十三年任河南提督王永譽漢軍正紅旗人康熙十三年正月任河南提督宗室璋格正藍旗人乾隆元年二月任直𨽻古北口提督七月卒宗室德沛鑲藍旗人乾隆元年七月任直𨽻古北口提督二年二月升甘肅巡撫贍岱滿洲正黃旗人乾隆二年四月任直𨽻古北口提督三年三月調甘肅提督五年八月卒永常滿洲正白旗人乾隆三年四月任直𨽻古北口提督五年十一月解十年八月任甘肅提督十三年七月調安西提督十四年九月復任是年十二月仍調安西提督黃廷桂漢軍鑲紅旗人乾隆五年十一月任直𨽻古北口提督六年九月調甘肅巡撫塞楞額滿洲正白旗人乾隆六年十二月任直𨽻古北口提督七年十月調陜西巡撫保祝滿洲鑲黃旗人乾隆四年三月任廣東提督七年十二月任直𨽻古北口提督十年十月解馬爾拜滿洲正白旗人乾隆十年十一月任直𨽻古北口提督十一年十二月解索拜滿洲鑲黃旗人乾隆十二年正月任直𨽻古北口提督三月解拉布敦滿洲正黃旗人乾隆十二年三月任直𨽻古北口提督十三年四月解滿福滿洲鑲藍旗人乾隆十三年四月任直𨽻古北口提督閏七月解傅清滿洲鑲黃旗人乾隆十三年閏七月任直𨽻古北口提督十四年二月調固原提督三月調陜西提督是年十一月卒海亮滿洲正黃旗人乾隆十三年二月任甘肅提督十四年九月任直𨽻古北口提督十月降布蘭泰滿洲正白旗人乾隆十四年十一月任直𨽻古北口提督十七年九月卒馬負書漢軍鑲黃旗人乾隆十七年九月署任直𨽻古北口提督十八年十月調福建陸路提督三十二年九月卒色克慎蒙古正白旗人乾隆二十七年十月任直𨽻古北口提督二十八年十二月解覺羅永泰鑲黃旗人乾隆二十九年二月任直𨽻古北口提督三十年十一月解常青滿洲鑲白旗人乾隆四十二年七月任直𨽻古北口提督四十六年七月調浙江提督剛塔滿洲正藍旗人乾隆四十六年六月任直𨽻古北口提督十月解四十七年十一月再任四十八年十月調福建陸路提督四十九年正月調陜西提督六月解閻正祥漢軍鑲黃旗人乾隆四十九年七月任甘肅提督五十二年六月任直𨽻古北口提督五十七年正月解慶成漢軍正白旗人乾隆五十七年二月任直𨽻古北口提督髙鈺滿洲鑲黃旗人乾隆十一年九月署江南提督即于是月解王進泰漢軍鑲白旗人乾隆十九年閏四月任甘肅提督二十三年調江南提督二十六年四月調廣西提督二十八年九月調都統三十二年七月調直𨽻古北口提督三十八年七月調四川提督三十九年四月解四十一年五月解任直𨽻古北口提督四十二年七月齊斌漢軍鑲黃旗人乾隆二十六年四月任江南提督二十七年二月調直𨽻提督十一月仍調回任三十年二月解陳杰漢軍正白旗人乾隆三十八年三月任江南提督四十二年十二月調烏魯木齊提督是年四月丁憂五十二年四月復任五十四年六月調浙江提督五十八年五月解李奉堯漢軍鑲黃旗人乾隆四十四年二月任江南提督四十六年八月調福建陸路提督四十七年十一月解保寧蒙古正白旗人乾隆四十七年五月任江南提督四十九年三月解王柄漢軍鑲白旗人乾隆五十五年六月任江南提督十月解五十九年十一月任雲南提督劉鑑漢軍正黃旗人乾隆四十四年十二月任浙江提督四十六年六月解王彚漢軍正紅旗人乾隆五十三年八月任陜西提督五十八年七月任浙江提督瑪爾洪阿滿洲正黃旗人乾隆五十七年二月任福建陸路提督常泰滿洲正藍旗人乾隆五十二年五月署福建水師提督八月解五十六年三月復署五十八年二月解六月復署八月解王炳漢軍鑲白旗人乾隆五十二年八月署福建水師提督五十五年十一月解哈當阿蒙古正黃旗人乾隆四十九年八月任陜西提督五十六年三月任福建陸路提督是年十一月調水師提督福永蒙古鑲黃旗人乾隆三十二年十二月任湖廣提督三十三年十二月解李質粹漢軍正白旗人乾隆八年八月任陜西提督九年七月丁憂瑚寶滿洲鑲白旗人乾隆十二年四月任陜西提督十三年十月升署甘肅巡撫楊寧滿洲正黃旗人乾隆二十五年十二月任陜西提督二十九年二月升廣州將軍三十二年三月任雲南提督八月調貴州提督十月解柯藩漢軍鑲紅旗人乾隆五十八年七月任陜西提督法靈阿漢軍鑲黃旗人乾隆三十七年十月任甘肅提督四十四年四月解仁和滿洲鑲黃旗人乾隆四十四年五月任甘肅提督四十六年七月解五福滿洲鑲白旗人乾隆二十九年十一月任烏魯木齊提督三十三年三月解六月任雲南提督三十四年五月解四十四年十一月任廣西提督四十七年五月解十一月回任四十八年二月卒巴彥弼滿洲鑲白旗人乾隆三十四年十月任烏魯木齊提督三十八年十二月解興奎滿洲正黃旗人乾隆五十二年二月任烏魯木齊提督桂林滿洲鑲藍旗人乾隆四十年十月任四川提督四十三年三月升兩廣總督明亮滿洲鑲黃旗人乾隆四十三年三月任四川提督四十六年四月解成德滿洲正紅旗人乾隆四十六年七月任四川提督五十五年十二月解觀成滿洲鑲白旗人乾隆五十五年十二月任四川提督五十八年四月解穆克登阿滿洲鑲黃旗人乾隆五十八年十一月任四川提督髙瑹漢軍鑲黃旗人乾隆五十二年二月任廣東提督五十六年八月解書麟滿洲鑲黃旗人乾隆四十一年七月任廣西提督四十四年二月丁憂三德滿洲鑲紅旗人乾隆五十年七月任廣西提督五十三年六月卒王朝輔漢軍鑲紅旗人乾隆二十一年八月任雲南提督二十二年九月解額爾格圗滿洲鑲藍旗人乾隆二十三年五月任雲南提督二十八年四月解達啓滿洲正黃旗人乾隆二十八年十二月任雲南提督三十一年六月卒海祿蒙古正藍旗人乾隆四十一年十二月任雲南提督四十八年六月升烏魯木齊都統五十四年三月任廣西提督八月任福建陸路提督五十六年二月卒鄂輝滿洲正白旗人乾隆四十八年八月任雲南提督五十一年五月升四川成都將軍談五格漢軍鑲黃旗人乾隆三十一年三月任貴州提督三十二年七月解八月任雲南提督三十三年二月卒常青滿洲正藍旗人乾隆三十五年四月任貴州提督是月調任雲南提督四十一年調直𨽻提督四十六年八月任江南提督四十七年四月丁憂是年十二月任福建陸路提督四十九年五月陛烏魯木齊都統拜凌阿蒙古鑲黃旗人乾隆三十五年八月任貴州提督三十八年六月解保成滿洲正紅旗人乾隆四十九年二月任貴州提督五十四年十二月卒欽定八旗通志卷三百四十一
