body:
  text: 兵制志九軍器軍器戰船武具火器火藥帳房凡給發軍器金鼓以示進退之節海螺以定朝昏之聚散旗纛以一瞻視甲胄以衛身器械以制敵各營兵之專習者為弓箭為鳥槍為炮為藤牌兼習者為長槍為大刀為挑刀水師則有排槍鈎鐮槍標槍大斧火箭之屬水陸異用險易異宜習者期純熟教者期專一大炮以兵千名設十炮為率郡邑城守沿海沿邉及水師戰艦各置炮於其所若兵少及非要隘營汛貯炮於督撫提鎮駐劄之地需用乃發仍以時演放如法順治初定軍器由兵部圖式移文工部製造按名給發仍令該管官隨時稽察有損缺者修整補治如有贏餘器械留營以備增補其敝壞者悉行銷毁五年奏準馬兵每名給甲一胄一櫜鞬一弓一箭四十腰刀一步兵每名給甲一胄一腰刀一其步兵內之弓箭兵給弓一箭三十長槍兵給長槍一鳥槍兵給鳥槍一直省兵均照此給發康熙六年奏準八旗世爵暨文武官各備甲一胄一弓二櫜鞬一腰刀一其箭數視品秩之大小公五百五十侯五百伯四百五十子四百男三百五十輕車都尉二百五十騎都尉二百雲騎尉百五十武官一品至五品視子男至雲騎尉六品以下均一百文官一二品視子男三品京堂視武職二品四品京堂科道郎中視武職三品員外郎視武職四品營兵護軍前鋒領催各七十驍騎各五十世爵中官大於爵者照官職箭數爵大於官者照世爵箭數直省督撫提鎮及副將以下官應備弓矢甲胄各按品級定數與八旗武職同三十年設八旗火器營每佐領下設鳥槍前鋒鳥槍護軍鳥槍驍騎每名各給鳥槍一滿洲八旗每旗各設子母炮五位其餘大小銅鐡炮位均貯漢軍八旗炮局內又定護軍營八旗每旗各設海螺三十六前鋒營左右翼各設海螺八火器營八旗每旗各設隨炮海螺五八旗鳥鎗護軍鳥槍驍騎每旗各設海螺十四驍騎營每佐領下各設海螺一每恭領下各設海螺一漢軍鳥槍營每旗設鼓一金五炮營每旗設鼓一金五藤牌營每旗設海螺五每旗藤牌兵百名每名給藤牌一㓲刀一每旗挑刀兵五十名每名各給挑刀一漢軍八旗每佐領下各設鹿角一架棉甲兵四名每名各給連耞棍一副直省標營金鼓海螺鹿角藤牌挑刀等項視營之大小兵之多寡酌設雍正五年諭各處營伍所用器械向來原無一定之例是以武辨到任往往以己所好尚及素所熟習者操演所屬兵丁間或學習未久而接任官又别有意見將從前所習者更改調換是兵丁之技藝每視該上司之去留以為轉移非訓練專精之道也凡事久則熟熟則生巧宜令各省將軍督撫提鎮因地制宜酌定規制永逺遵奉除騎射最為緊要天下通行學習外其餘各種演習悉著該上司會同通省官辨細心斟酌應用何軍器詳悉定議奏聞令各營永逺遵行接任官不得擅自更改倘將有應變通之處具題請旨如此則兵丁各精其業且使一省之中彼此畫一將來或有調遣會集之處正可相資為用於營伍大有裨益是年議準官兵所用軍器內鳥槍一項能衝鋭折堅最為便利如腹內省分地勢平坦利用弓矢至沿邉沿海省分山深林密利用鳥槍應將腹內省分每兵千名設鳥槍三百桿沿海沿邉省分每兵千名設鳥鎗四百桿嗣據各省陸續議覆山東省各營軍器弓箭鳥鎗炮藤牌長槍大刀均係通設之械每兵百名分作十分弓箭三分鳥槍五分藤牌一分長槍一分此外别設炮手専演發炮河南省各營軍器駐防八旗設馬步弓箭兵鳥槍兵子母炮兵長槍兵督標兩營設馬步弓箭兵鳥槍兵炮兵藤牌兵大刀兵河北鎮標九營各設馬步弓箭兵鳥槍兵炮兵護炮㓲刀兵南陽鎮七營如之直𨽻省各營軍器除騎射鳥槍炮畫一操練外惟宣化鎮平陽之地利於藤牌應以該鎮向設之三眼槍長槍大刀兵改換藤牌紫荆關鳥槍甚少應以該鎮向設之大刀兵改添鳥槍山西省各營地屬沿邉每兵百名分作十分弓箭六分鳥槍四分别設炮兵專演大炮惟殺虎協舊有藤牌兵三百名仍令演習其餘長槍㓲刀之屬悉令改為弓箭鳥槍兵江南江西省水師各營軍器除弓箭鳥槍炮外如藤牌大刀鈎鐮槍過船槍鉞斧標鐡彈均為水師利用之器其陸路各營有設三眼銃及長槍者應將三眼銃改為鳥槍兵長槍改為藤牌兵福建省陸路各營每兵千名分作二十隊弓箭馬兵四隊弓箭步兵二隊鳥槍兵十隊炮兵一隊藤牌兵一隊長槍兵一隊大刀兵一隊水師戰船大趕繒船兵八十名設排槍四十二桿中趕繒船兵六十名設排槍三十桿小趕繒船兵五十名設排槍二十五桿大艍船兵三十五名設排槍十六桿中艍船兵三十名設排槍十六桿小艍船兵二十名設排槍十桿仍各偹用火藥彈子火罐火箭之屬浙江省各營每兵千名分作二十隊弓箭兵六隊鳥槍兵八隊藤牌兵二隊片刀兵二隊長槍兵一隊炮兵一隊陕西四川省各營除弓箭鳥槍炮通行演習外其弓箭馬兵兼習槍棒守兵兼習㓲刀又令提標守兵二百名專習藤牌廣東省各營每兵百名設弓箭手二十名各佩腰刀兼習雙刀長槍鳥槍兵五十名各佩腰刀藤牌兵十名用牌刀挑刀兵十名炮兵十名雲南貴州廣西三省各營每兵千名設弓箭兵二百鳥槍兵六百藤牌兵一百以炮兵百名兼習牌刀十年議準福建省水路海靣遼濶陸路林深箐密鳥槍一項最為利用於定例每兵千名設鳥槍四百桿外再增鳥槍百桿乾隆五年議準雲南貴州二省地多山箐又隂雨不常弓箭一遇潮濕之時險仄之地不能應手施展惟弩弓以木為質其力最徑令弓箭手各兼習弩弓十五年議準湖廣武昌鎮水師二營地界川江水操弓箭技有難施惟鳥槍極為利便照沿海沿邉省分每兵千名設鳥槍四百桿几簡核軍器京營三年一次由八旗奏請特命王公大臣驗閲駐防八旗軍器各將軍都統副都統於到任後率所屬簡稽軍營鎧仗同城限二月外屬限三月竣事遊牧處官兵軍器由部奏請特命大臣驗閲各察其盈絀利鈍具疏以聞直省各標營軍器以都司守備為專管官副將恭將遊擊為兼管官遇有動用修補估價詳報給公項治備嵗終彚送布政司核銷督撫提鎮嵗委官察驗取具册結嵗終彚疏題報以册逹部稽核虧闕者論如法順治五年奏準每年秋季奏請點驗八旗護軍營驍騎營器械春季奏請點驗前鋒營步軍營器械令該管官互相稽察又定點驗軍器若盔甲弓箭等項全無者官革職兵鞭一百革退軍器缺少與朽壞及箭上無字並書他人姓名者官罰俸兵鞭責有差如所屬官兵盔甲弓箭等項全無及軍器缺少或朽壞者各計名數多寡論該管之都統恭領降罰如律至佐領驍騎校等所管兵數無多有軍器缺少朽壞者各計名數從重論雍正元年奏準遊牧八旗察哈爾官兵軍器由部越一嵗疏列滿洲蒙古都統統領副都統職名恭請欽點一人前往稽閲十年議準直省各營軍裝器械屬督撫所轄者督撫委官盤察提督所轄者提督委官盤察皆取本營並無缺少及委官並無揑飭印甘結存案各於年終保題至於各鎮有督提統轄者由該鎮委官盤察取印甘結並加具保結送督提察核於年終保題若無督提統轄各該鎮委官盤查取結亦於年終保題其保題時各將所屬如保題後仍有闕少將經手盤查官罰俸督撫提鎮準失察例論倘委官明知缺少扶同揑報者降級調用又議準各營軍裝器械以都守為專管官副恭逰為兼管官若無故闕少經督撫提鎮題恭將專管官兼管官均論罰照數分賠係兼管官察出揭報者免議止令專管官獨賠限六月賠完如逾限不完將專管官住俸兼管官停升俟賠完日開復若係兵丁闕少經該管官察出揭報追補足額者免議至於新舊各官接任將軍裝器械限一月交代如無闕少新官造册出結詳報督撫提鎮年終報部若交代時舊官推卸不交新官勒索不受皆照交代遲延例分别議處其闕少各數果係年久朽壞出師闕損及因公動用者準動公費製備免其議處分賠倘有藉端科纍兵辨製備者照因公科斂例議處又議準督撫提鎮將營中盔甲弓箭鳥槍藤牌刀槍旗幟鍋帳鉛藥鍬棍等項按照題定額數製偹一有闕損該管官即詳報隨時修整準其動用公費務期齊全足用如有贏餘擇其堪用者存營以偹增補其朽敝者酌量銷毁以免竊賣之弊十一年議準營中一應軍器遇有缺損不按時修整及修整而收貯不謹以致朽壞及失火燒毁或將預備鐡木等項堆貯潮濕地方以致鏽蝕者將該管官論罰照數賠補乾隆元年議準民間不許私製鳥槍其鄉村險僻之處防虎防盜鳥槍在所必需各省督撫確察州縣內有實在應用地方照兵丁鳥槍式樣製造書鏨姓名具呈地方官編號注册偹案如非應用地方有私藏或私造售賣者鳥槍入官仍從重處責該管官以失察論四年題準各省將軍都統副都統於到任時將所屬同城親標旗營一應軍裝器械限兩月委官盤驗其外屬各營軍裝器械限三月委官盤驗各保題一次仍取具該管官並無虧少印結及委員並無揑飭印結存案於年終保題仍將所屬各營軍器數目造册送部察核倘委盤保題之後仍有缺額别經發覺者將盤驗之官議罰其委官扶同揑結者議降如例六年諭聞得八旗火班堆房之撒袋弓箭因年久未修皆有毁壞不堪應用者火班堆房係防範之兵器械關係軍容理宜整齊著交八旗大臣各動本旗公用房租銀兩將火班防範兵丁之器械修理整齊嗣後如有毁壞者陸續修補十年二月諭蒙古人等購買盔甲若照京師官兵例官為製造則價值昂貴著仍聼伊等自行購買其各省購買盔甲之處著兵部議奏至於鄂爾多斯扎薩克等購買盔甲之處曽否呈報理藩院理藩院曽否具題著查明具奏同日諭鄂爾多斯扎薩克等購買盔甲之處既經呈報理藩院具奏著那延泰班第謂鄂爾多斯王貝勒色等曰爾不必恐懼爾等購買盔甲之處皇上知道等因明白曉諭至於爾此奏殊為輕遽十五年諭八旗官兵器械闕少者均咨部官為造給器械內弓箭尤為緊要惟賴不時整理善為收貯從前兵部八旗都統會議訓飭八旗官兵將器械善為收貯曽經奏準施行今都統等或因日久廢弛不以為事亦未可定著再行傅諭務遵原諭留心訓飭稽察十六年覆準鳥槍為緊要軍器倘有年久不堪適用者令該堂官驗看確實準其重造其舊槍鎔化之鐡加謹收貯以備增造各項軍裝之用十八年諭八旗軍器例應每年特簡王公大臣點驗但一嵗點驗殊覺煩擾嗣後著三年一次點驗既寬點驗之限臨時務宜實心察核不得草率了事若朕親閲時軍器仍有虧闕損壞者必將點驗之王公大臣治罪至點驗之年將八旗前鋒營護軍營驍騎營內府護軍官兵軍器仍照例點驗外其內府佐領下驍騎及王公府屬兵丁軍器皆停其點驗軍器制度王命旗牌旗牌之制旗以藍繒為之方廣二尺六寸兩靣銷金清漢令字每一令字上各鈐以兵部印旗杆一長如旗木頂垂朱髦牌以椵木製形圓髙一尺二分濶九寸五分厚一寸朱髹上刻荷葉形緑髹牌兩靣鐫清漢令字各一飾以金懸於槍上槍以榆木為之長八尺圍一寸鐡頂槍冒髹以黃繪龍垂朱髦牌邉及槍杆均鐫清漢令字第幾號填以金頒給旗牌定制經略十二副總督挂印總兵官各十副巡撫提督八副總兵官五副雍正三年諭各省督撫提鎮舊例均頒發王命旗牌所以重節鎮之權崇天室之威也但傳守既久或遇地方卑濕蟲蛀漆剝或因閲嵗滋多形制毁敝而督撫提鎮等以旗牌損壞例當恭處不敢修整甚有預防損壞將所頒旗牌收貯照樣别造者尤為不可嗣後各督撫提鎮所頒王命旗牌加謹收貯勿致損傷亦不得别造其有地方卑濕閲嵗滋多不免蟲蛀漆剝形制毁壞