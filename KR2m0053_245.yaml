body:
  text: 欽定四庫全書欽定八旗通志卷二百三十一人物志一百十一忠義傳二十三漢軍八旗三乾隆五十四年共二雍正九年至十三人劉士瑀劉士瑀漢軍鑲黃旗人由馬兵纍升陜西涼州髙溝營守偹雍正十年總兵楊􅛵派率緑旗兵赴巴里坤軍營旋奉四川總督劉於義派赴峩崙磯駐防時凖噶爾賊衆猝犯士瑀接戰三日晝夜不息股負重傷大呼殺賊以援絶歿於陳恩賜祭葬子劉洪勳廕衛千總穆爾圖穆爾圖漢軍鑲黃旗人由防禦委署參領雍正十年隨靖邉大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表胡永福胡永福漢軍鑲黃旗人任驍騎校乾隆二十年出征回部三十八年隨征金川進攻沙壩山梁得二等功牌一三十九年二月擊賊於阿克木雅身受鎗傷越十日傷發歿賞恤如陳亡例恩賜雲騎尉世職承襲詳見世職表秦紹榮秦紹榮漢軍鑲黃旗人任驍騎校乾隆二十年出征回部得頭等功牌一三十八年隨征金川三十九年二月擊賊於阿克木雅陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表傅良臣傅良臣漢軍鑲黃旗人任恭領乾隆十三年出征金川二十年出征回部得頭等功牌一三十八年隨征金川攻克沙壩山得二等功牌一三十九年三月擊賊於邁過爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表楊發育楊發育漢軍鑲黃旗人乾隆二十九年由候補筆帖式授鑾儀衛整儀尉升雲麾使擢陜西宜君營恭將隨征金川三十九年七月擊賊於達爾圖陳亡賞恤如例恩賜其子魁寶為守偹范宜申范宜申漢軍鑲黃旗人乾隆三十年由間散授鑾儀衛整儀尉升湖南撫標中軍守偹隨征金川前後攻克當噶赤耳丹思等處功列超等擢湖南撫標右營都司升湖廣提標遊擊四十年五月進攻宜喜在事奮勉賞戴花翎尋擊賊於額爾替陳亡賞恤如例恩蔭其子廣和為守偹瑚登秀瑚登秀漢軍正黃旗人由驍騎校委署間散章京雍正十年隨靖邉大將軍內大臣公傅爾丹征凖噶爾七月至烏孫珠爾與賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表五雲漢五雲漢正白旗漢軍由領催部委防禦駐防右衛雍正九年六月隨靖邉大將軍公傅爾丹征凖噶爾遇賊於和通胡爾哈諾爾地方力戰陳亡賞恤如例董濚董濚漢軍正白旗人乾隆三十三年由鑾儀衛雲麾使兼佐領補授四川達州營遊擊三十六年隨征金川由木坪一路進兵攻克達圍碉一座石卡五十餘生擒賊畨數十又攻克木爾等寨獲器械牲畜甚衆復攻斯當安南梁賊敗追至日耳克之三十七年攻克資哩奮勇立功部議給劄優敘是年十月擊賊於木蘭壩病歿賞恤如例恩賜其子德楞額為監生李九齡李九齡漢軍正白旗人姓李氏乾隆三十二年由鑾儀衛整儀尉授湖北鄖陽協右營守偹調湖南永綏協左營守偹三十七年隨征金川三十八年六月帶兵前往美諾堵禦乘夜擊賊屢有斬獲得功牌二賞戴花翎是月擊賊於思底陳亡賞恤如例恩賜其子多福為衛千總珠蘭泰珠蘭泰漢軍正白旗人姓石氏乾隆十九年由官學生補鑾儀衛整儀尉升治儀正兼公中佐領厯雲麾使授陜西西安城守營參將三十七年隨征金川三十八年六月擊賊於木果木陳亡賞恤如例恩賜其子海常為守偹韓慶春韓慶春漢軍正白旗人乾隆九年由武生授鑾儀衛整儀尉升治儀正二十六年授江南安慶城守營都司擢陜西興漢鎮左營遊擊三十七年隨征金川進攻龍燈猛固美諾占固等處功列超等三十八年六月擊賊於木果木陳亡賞恤如例恩賜其子世榮為守偹袁尚仁袁尚仁漢軍正白旗人由領催駐防西安乾隆二十年隨征烏魯木齊二十三年隨征阿克素有功三十八年隨征金川三十九年補驍騎校四十三年擢防禦四十六年升陜西河州鎮起臺堡守偹值撒拉爾逆回肆擾派守州城遇賊被害賞恤如陳亡例減半恩廕把總吳嗣昌吳嗣昌漢軍正紅旗人由拔貢生任廣西臨桂縣縣丞乾隆五年逆苖吳金銀擾亂隨知縣倪國正往撫被執不屈同時被害賜衛經厯恩廕一子入監附祀倪國正祠王滇王滇漢軍正紅旗人乾隆三十年由馬兵補鑾儀衛整儀尉三十一年升治儀正三十三年授陜西邠州營都司三十七年隨征金川補提標右營遊擊三十八年六月擊賊於木果木陳亡賞恤如例恩賜其子順恩為守偹王履端王履端漢軍正紅旗人乾隆二十六年由拜唐阿補鑾儀衛整儀尉二十八年升治儀正三十年授江南夀春鎮左營都司三十六年擢湖北竹溪營遊擊三十八年隨征金川三十九年進攻達扎克甲得古各山梁所至奮勇功列超等四十年正月抵促浸河病歿賞恤如陳亡例恩廕監生劉輝祖劉輝祖漢軍鑲白旗人由乾隆二十六年武進士授藍翎侍衛三十一年授四川永寧協左營都司三十四年解送軍需馬匹赴滇議敘軍功加一級三十六年十一月隨征金川進攻西山梁喇嘛寺等處又由東山梁渡河攻噶啞等處三十七年三月攻阿仰達烏等處得旨優敘推升福建建寧鎮中營逰擊七月由墨壟溝進攻甲爾木十一月克獲布拉呢得斯紐寨里日寨十二月抵美諾隨大軍由占固八卦碉追擒小金酋僧格桑調補陜西延綏鎮黃甫營遊擊三十八年正月由當噶拉進攻金川五月升授陽平關參將六月賊撲三敵營輝祖督兵奮擊殱賊三百餘頭帶石傷賞戴花翎旋升湖南長沙協副將十二月升署甘肅寧夏鎮總兵三十九年正月進攻思底博堵乘皮船渡河克獲山梁木城二座三月由沈角山梁捉獲般達爾古水卡四十年七月在絨布寨軍營病歿賞恤照陳亡例減半詔列次五十功臣圖像紫光閣贊曰駐當噶拉扼賊咽喉賊悉全力屢犯不休褁傷力戰殺賊三百南路功最病亡足惜恩賜其子德升以巡捕營千總用珠敦珠敦漢軍正藍旗人姓趙氏乾隆四十三年由文生員補鑾儀衛整儀尉四十五年擢治儀正四十八年擢廣西左江鎮標右營都司五十三年隨征安南賞戴藍翎五十四年正月於黎城西門外東路顯南地方擊賊陳歿賞恤如例恩賜恩騎尉世職承襲詳見世職表常明常明漢軍鑲藍旗人由生員雍正四年補授通政司八品筆帖式乾隆十三年升授四川雅州府通判抵任後即奉差赴藏十五年十月十三日逆黨羅卜藏扎什等縱火焚署常明率領兵民禦賊力護庫餉中流矢歿於軍賞恤如例董邦竒董邦竒漢軍鑲藍旗人任防禦乾隆二十年出征回部得三等功牌一三十八年隨征金川得頭等功牌一四十年十一月擊賊於科布曲陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表尚維升尚維升漢軍鑲藍旗人乾隆三十七年由世家子弟補鑾儀衛整儀尉三十八年升授治儀正四十一年升授雲麾使四十四年授兩廣督標前營恭將四十五年委署廣州協副將四十六年委署羅定協副將四十八年補三江口協副將四十九年十二月委署廣東右翼鎮總兵官印務五十二年奉旨補授廣西左江鎮總兵五十三年十月帶兵出征安南戰於富良江有功恩賞花翎五十四年正月于市球江同許世亨擊賊陳亡賞恤如例賜諡直烈特旨賞三等輕車都尉世職承襲詳見世職表欽定八旗通志卷二百三十一
