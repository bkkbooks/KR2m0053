body:
  text: 人物志一百十三忠義傳二十五駐防八旗二七十五人乾隆年中共濶靈阿濶靈阿吉林鑲黃旗人授護軍校署防禦乾隆二十年阿睦爾撒納叛逃諸夷煽附劫掠臺站濶靈阿擊賊於庫爾圖戰歿賞恤如例桑吉納桑吉納吉林鑲黃旗人姓薩哈爾察氏由驍騎校厯升參領乾隆二十一年出征巴里坤所至奮勉共得功牌頭等者一二等者二三等者三三十八年隨征金川四十年四月擊賊於榮噶爾博陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表達爾呼勒岱達爾呼勒岱吉林蒙古鑲黃旗人姓布爾哈齊氏由領催委署驍騎校乾隆三十四年隨征緬甸三十八年調征金川進攻阿克木雅美諾等處奮勉受傷列功超等得功牌二四十年四月擊賊於遜克爾宗陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表得森特得森特吉林鑲黃旗人姓巴嚕特氏由驍騎校厯升參領乾隆二十一年出征巴里坤得功牌頭等者一三等者二三十八年隨征金川四十七年七月擊賊於巴占陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表墨埒墨埒吉林鑲黃旗人姓竒塔爾氏由披甲委署驍騎校乾隆三十八年隨征金川進攻布咱納等處在事奮勉列為超等得功牌二四十年十月擊賊於碾占陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表扎爾蘇扎爾蘇吉林正黃旗人姓克勒特氏由領催厯升防禦乾隆三十四年隨征緬甸三十八年調征金川四十年正月擊賊於空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表孟庫孟庫吉林正黃旗人姓溫都氏任委署驍騎校乾隆三十四年隨征緬甸三十八年調征金川進攻阿克木雅丹噶山當噶拉得楞等處在事奮勉列超等三次頭等二次得功牌二四十年七月擊賊於石真噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表永德永德吉林正黃旗人姓鄂羅氏乾隆三十八年由委署協領隨征金川四十年十一月擊賊於西里陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表三保三保吉林正白旗人姓巴魯忒氏委署前鋒參領乾隆三年出師阿爾臺二十一年隨固倫額駙色布騰巴爾珠爾隊出師伊犂在博羅和落等處戰有功二十二年十一月十一日隨都統滿福追𠞰沙拉斯嗎唬斯行次哈拉和落與都統等同為賊人計誘被害賞恤如例富昌富昌吉林正白旗人姓溫特赫氏由前鋒委署驍騎校乾隆三十四年隨征緬甸得頭等功牌一三十八年調征金川三十九年五月擊賊於羅博瓦陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表克星額克星額吉林正白旗人姓伊拉哩氏由防禦厯升參領乾隆二十一年出征巴里坤得功牌頭等三等各五二等者二三十八年隨征金川三十九年七月擊賊於色淜普陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表和屯和屯吉林正白旗人姓溫特赫氏乾隆三十八年由藍翎侍衛隨征金川三十九年七月擊賊於木雅山陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表赫升保赫升保吉林正白旗人姓鄂羅氏由領催厯升防禦乾隆二十一年出征巴里坤得功牌頭等三等各二二等者三三十八年隨征金川進攻阿克木雅等處得頭等功牌一三十九年十二月擊賊於遜克爾宗陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表根春根春吉林正白旗人姓蘇都里氏由領催厯升防禦乾隆三十八年隨征金川四十年九月擊賊於當噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表簡保簡保吉林正紅旗人姓烏扎拉氏委署前鋒𠫭領乾隆二十一年出師巴里坤隨總管端濟布隊在烏什博羅哈拉和落葉爾羌等處擊賊十一次屢有戰功先後所得功牌凡頭等者七三等者六嗣於二十三年十月十三日隨定邊將軍兆惠進𠞰逆回波羅泥都霍集占於喀拉烏蘇河戰殁賞恤如例那爾泰那爾泰吉林正紅旗人姓瓜勒佳氏署防禦乾隆二十一年出師巴里坤隨將軍成衮扎卜在葉爾羌等處擊賊四次保列出衆軍功兩得頭等功牌隨營效力厯著勞績二十三年十月十三日定邊將軍兆惠進𠞰波羅泥都霍集占令總兵髙天喜等督修喀拉烏蘇河橋兵未渡河逆回統數萬餘衆衝擊重圍那爾泰力戰死之賞恤如例恩賜雲騎尉世職承襲詳見世職表烏爾幹烏爾幹吉林正紅旗人姓庫德氏委署驍騎校乾隆二十一年出師巴里坤隨副都統愛隆阿隊戰賊二次保列出衆軍功二十四年正月隨副將軍富德追𠞰逆回至呼爾璊地方戰殁於陳賞恤如例札庫齊札庫齊吉林正紅旗人姓瓜勒佳氏署防禦雍正九年隨征阿爾臺乾隆十三年隨征金川均著勞績二十一年隨定邊將軍兆惠出師巴里坤在喀拉烏蘇集爾噶朗等處戰賊十六次纍列出衆軍功嗣於二十四年正月初八日隨副將軍富德追𠞰霍集占於呼爾璊戰殁賞恤如例觀森保觀森保吉林正紅旗人姓薩克察氏由防禦厯升參領乾隆三十四年隨征緬甸得頭二三等功牌各一三十八年隨征金川賞戴花翎進攻色淜普得頭等功牌一三十九年二月擊賊於達爾圖陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表烏林泰烏林泰吉林正紅旗人姓雅爾薩喇氏由防禦厯升參領乾隆二十一年出征巴里坤得頭二三等功牌各一三十八年隨征金川進攻阿克木雅馬奈等處得頭等三等功牌各二三十九年七月擊賊於達爾圖陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表哲坤保哲坤保吉林正紅旗人姓伊蘇氏由驍騎校厯升防禦乾隆二十一年出征巴里坤得功牌頭等三等者各四二等者五三十四年隨征緬甸三十八年調征金川得頭二等功牌各一四十年七月擊賊於巴占陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表阿林保阿林保吉林正紅旗人姓穆達齊氏由領催厯升防禦乾隆三十四年隨征緬甸三十八年調征金川得頭等功牌二四十年八月擊賊於勒烏圍陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表額爾登保額爾登保吉林正紅旗人姓巴約特氏乾隆三十八年由空銜藍翎隨征金川得二等功牌一四十年八月擊賊於勒烏圍陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表巴雅爾巴雅爾吉林正紅旗人姓巴林氏乾隆三十八年由藍翎前鋒隨征金川四十年八月擊賊於勒烏圍陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表永保永保吉林鑲白旗人姓烏蘇氏任驍騎校乾隆二十一年出師巴里坤隨巴圖魯侍衛老格隊在濟爾噶朗等處戰賊九次斬賊首五級得頭等功牌二二十四年八月隨布政使德舒搜𠞰嗎哈沁餘賊至阿爾坦和碩地方戰殁賞恤如例額爾登保額爾登保吉林鑲白旗人姓葉穆氏由防禦委署參領乾隆二十一年出征巴里坤得功牌頭等者三二等者一三等者二三十四年隨征緬甸得頭等三等功牌各一三十八年調征金川屢著勞績賞戴花翎三十九年三月擊賊於思底陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表烏爾青額烏爾青額吉林鑲白旗人姓博赫哩氏由佐領委署𠫭領乾隆二十一年出征巴里坤得功牌頭等者三二等者二三等者一三十八年隨征金川得頭等三等功牌各一三十九年十二月擊賊於空薩爾身受重傷尋殁賞恤如陳亡例恩賜雲騎尉世職承襲詳見世職表額爾德木保額爾德木保吉林鑲白旗人姓竒塔爾氏由五品職銜委署參領賞戴花翎三十八年隨征金川四十年正月擊賊於空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表錫喇納錫喇納吉林鑲白旗人姓瑚爾哈喇氏由領催委署七品官乾隆三十八年隨征金川進攻達咱克角等處得二等功牌一三十九年進攻猛固寨石真噶等處在事奮勉列超等頭等功各二次四十年十月擊賊於達撒谷陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表額克圖額克圖吉林鑲紅旗人姓庫雅拉氏委署前鋒參領乾隆二十一年出師巴里坤隨副都統愛隆阿隊在霍羅喀拉和落等處九戰賊人奮勇前進臂中鳥鎗負創力戰斬戮賊衆保列出衆軍功先後所得功牌凡頭等者六三等者一後隨定邊將軍兆惠進𠞰逆回於二十三年十月十三日在葉爾羌戰殁賞恤如例穆哈納穆哈納吉林鑲紅旗人姓蒙武索氏署防禦乾隆二十一年出師巴里坤隨副都統愛隆阿隊在嗎納斯庫爾等處五戰逆回纍著軍功先後得頭等功牌二二等及三等功牌五嗣於二十三年十月十三日隨定邊將軍兆惠進𠞰逆回於喀拉烏蘇河戰殁於陳賞恤如例達蘭泰達蘭泰吉林鑲紅旗人姓烏蘇氏乾隆三十八年由空銜藍翎隨征金川四十年三月擊賊於遜克爾宗陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表拜蘇呼隆拜蘇呼隆吉林蒙古鑲紅旗人姓布魯特氏由領催委署驍騎校乾隆三十八年隨征金川進攻美諾羅博瓦等處屢著勞績列超等三次頭等二次得功牌一四十年四月擊賊於榮噶爾博陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表剛格剛格吉林正藍旗人姓瓜勒佳氏由領催委署驍騎校雍正九年隨征阿爾台著有勞績乾隆二十一年出師巴里坤得頭等功牌二十二年十一月十一日隨都統滿福追𠞰沙拉斯嗎唬斯為賊人計誘被害賞恤如例鄂羅敖鄂羅敖吉林正藍旗人姓厄魯特氏乾隆三十七年由藍翎侍衛隨征金川三十九年三月擊賊於思底陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表巴雅巴雅吉林正藍旗人姓珠爾格特氏乾隆三十八年由藍翎前鋒隨征金川三十九年十一月擊賊於格隆古陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表巴囒保巴囒保吉林正藍旗人姓博赫哩氏乾隆三十八年由領催委署驍騎校隨征金川四十年正月擊賊於空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表英格英格吉林正藍旗人姓巴哩氏由驍騎校厯升參領乾隆二十一年出征巴里坤得頭等功牌五三十四年隨征𬗟甸三十八年隨征金川進攻美諾羅博瓦等處受鳥鎗傷四十年七月擊賊於空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表文德文德吉林正藍旗人姓伊蘇氏乾隆三十八年由護軍奬賞藍翎隨征金川四十年七月擊賊於石真噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表噶嚕噶嚕吉林正藍旗人姓札拉哩氏乾隆三十八年由前鋒出征金川尋委署驍騎校三十九年進攻阿克木雅美底卡等處列功頭等四十年九月擊賊於當噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表舒爾鴻額舒爾鴻額吉林正藍旗人姓溫都氏乾隆三十四年由披甲隨征𬗟甸三十八年調征金川授藍翎驍騎校三十九年進攻阿克木雅美底卡等處在事奮勉列功頭等四十年九月擊賊於當噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表固爾特固爾特吉林鑲藍旗人姓瓜勒佳氏任前鋒參領雍正九年隨征阿爾臺乾隆二十一年出師巴里坤隨固倫額駙色布騰巴爾珠爾隊在集爾噶朗等處戰賊十二次斬獲甚衆先後所得功牌凡頭等者五三等者四嗣於二十三年十月十三日隨定邊將軍兆惠征𠞰逆回波羅泥都霍集占在喀拉烏蘇河戰殁賞恤如例西林保西林保吉林鑲藍旗人姓伊爾根覺羅氏任佐領雍正元年隨征阿爾臺乾隆十三年隨征金川均著勞績二十一年出師巴里坤隨定邊將軍兆惠在集爾噶朗等處擊賊十一次斬賊首三級先後得頭等功牌五二等三等功牌各一嗣於二十三年十月十三日進𠞰波羅泥都霍集占於喀拉烏蘇河戰殁賞恤如例僧西保僧西保吉林鑲藍旗人姓他塔喇氏由領催厯升防禦乾隆二十一年出兵巴里坤得頭等功牌三三十四年隨征𬗟甸三十八年調征金川屢著勞績賞戴藍翎是年十二月擊賊