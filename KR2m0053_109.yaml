body:
  text: 欽定四庫全書欽定八旗通志卷九十五學校志二八旗官學上謹案上卷係官學生選補及在學肄業之事順治元年十一月國子監祭酒李若琳疏言近奉旨滿洲官員子弟咸就成均肄業而國學在城東北隅諸子弟往返晷短途遙臣等謹議滿洲八旗地方各覔空房一所立為書院將國學二廳六堂教官分教八旗子弟各旗下仍設學長四人俱就各旗書院居住朝夕誨迪臣等不時親詣稽察勤惰仍定於每月逄六日各師長率子弟同進國子監臣當堂考課以示懲勸下禮部議行二年五月從國子監祭酒薛所藴請命滿洲子弟就學分為四處每處用伴讀十人勤加教習十日一次赴監考課遇春秋演射五日一次就本處習練俾文武兼資以儲實用是年九月增官學生額先是每佐領各取官學生一名以十名習漢書餘習滿書至是禮部奏請增額命每佐領增取一名於原額習漢書十名外加用十名餘俱滿書十一年題準八旗每佐領下留官學生各一名禮部會同國子監詳加察驗如學業無成者各歸佐領仍於本佐領下選擇頂補以後三年一次察驗永為定例十三年諭禮部文武乃治天下之極要不可偏向今見八旗人等専尚讀書有子弟幾人俱令讀書不肯習武殊違我朝以武功定天下之意爾部酌量每佐領下應讀滿漢書幾名更定具奏凡部院考用者俱照額定讀書子弟內選用考試額外私自讀書者部院不準選用考試是年禮部議定滿洲蒙古漢軍前經題明每佐領止留一人讀書滿洲蒙古官學生不往外省作官止許在部院衙門選用且奉恩詔滿洲蒙古三品官以上廕一子入監遇部院衙門考用之時此等亦可選用今滿洲蒙古仍照前定之例每佐領下止留一人其漢軍官學生既內外並用應於每佐領一人外再添一人其考試生員舉人進士及部院衙門選用俱應於額定數內方準考選額外私自讀書者不準考選十四年正月禮部奏言蒙古官學生補用之缺少應合兩佐領出一人讀書漢軍官學生或仍舊例每佐領出二人讀書或因進士舉人生員停其考試視滿洲例每佐領止出一人讀書奉旨漢軍官學生如滿洲例每佐領止出一人讀書十八年諭滿洲漢軍每佐領各增官學生一名共送子弟二人一習滿書一習漢書止許武官及甲兵子弟開送文官子弟不準開送康熙元年定八旗官學生每月赴監講書一次翻譯一次五日射箭一次又定八旗滿洲蒙古漢軍隨印外郎缺由本旗咨報吏部行文到監於本旗年久官學生內遴選一人咨送吏部考試翻譯補用六年題準凡官學生除該監照常考試外每年禮部嚴加考試一次分别等第送部録用如某旗官學生肄業怠廢即開列助教教習職名參處九年十一月禮部據國子監呈奏言世祖章皇帝時八旗官學生不論文武官員子弟每佐領下選擇二名移送國子監教習後順治十八年奉有文官子弟不許送官學生之旨但官學生俱係部院衙門録用關係緊要且今奉諭旨文武廕監仍以部院衙門録用以後應仍遵世祖章皇帝時例不論文武官員子弟令本佐領將可學之人移送本監教習詔從所議十一年題準每佐領下裁官學生各一名於所留官學生內均分習學滿漢書是年四月禮部議覆蒙古官學生補用之路合計不過數缺或數年方出一缺又有廕生監生間補官學生補用甚難今滿洲漢軍官學生奉旨裁減每佐領止存一人蒙古官學生亦應裁減每二佐領合留一人奉旨依議十六年題準官學生以生員俊秀選補如本佐領下無生員俊秀方選補間散人四十八年十月諭八旗漢軍人等亦著應武鄉會試隨經兵部題準八旗漢軍由官學生補授之外郎有願考武生者該旗開具姓名移送順天府照例考取武生鄉試時將所取武生該旗亦開列姓名移送順天府一體考試取中五十年改八旗官學生隨國子監六堂諸生在監肄業尋議改設四學每兩旗共為一學雍正元年九月吏部覆準國子監司業博禮條奏官學生等不可濫取應於該佐領下無論官兵子弟不許瞻徇情面擇其資性頴秀可以讀書上進者一人著參領佐領保送都統驗看移送國子監肄業務令實在學習不得徒飾虛名查設立官學原為作養人材肄業子弟豈容濫取應如博禮所請嗣後官學生缺出於佐領下選擇移送國子監衙門令其從實肄業二年覆準設立官學原欲清漢兼優精通翻譯以備部院衙門補用可任職事飭令國子監滿漢祭酒司業轉飭助教教習等官每日親臨官學將官學生內習滿文者教以書寫本摺字畫習文章者講論聖賢經傳習翻譯者熟翻古文淵鑒大學衍義等書祭酒司業不時巡行親查以勸勤警惰每月傳至國子監考試一次分别優劣優者奬賞劣者戒懲俾有實效毋存虛名五年十月康親王果郡王議覆國子監祭酒孫嘉淦條奏八旗設立官學原欲比户皆沾教澤不必拘定門第但學滿文者可用幼稚之人其學漢文翻譯者必得十四五以上資性聰敏之人方易啓迪嗣後選官學生務令該佐領擇聰明俊秀子弟申送驗看交與國子監當堂考録其年幼者令學滿文其稍長者令學漢文庶將來皆有可成再查舊例八旗滿洲蒙古漢軍每佐領下必選一人入學若拘於定額則恐草率塞責若聽其缺額又恐人數太少酌定每旗額設學生一百名內滿洲六十名蒙古二十名漢軍二十名其滿洲六十名內照例分三十名在滿書房習清文三十名在漢書房習漢文凡有學生缺出通在一旗選擇不必拘定佐領之數庶學生皆得秀良不致混行申送再查學舍乃諸生講誦之所今每學止三四間一旗三學共十三四間不等實屬狹隘應將現今官房交還各該旗查收每旗另給官房一所二十餘間量可容百人誦習者著本旗修理俾諸生聚處其中則學舍寬適便於誦讀矣再八旗官學生向來皆無錢糧以故無力之家不能行走查得八旗蒙聖主洪恩設教養兵滿洲三千六百八十名蒙古四百八十名漢軍九百六十名滿洲蒙古每名一月給銀三兩漢軍每名給銀二兩令其學習弓馬所以惠愛八旗之人典至渥也但查八旗教養兵有幼稚之人以充額數不能操弓上馬而官學生年壯者往往挑選披甲伏思今官學生內有年壯而讀書遲鈍者令回旗披甲其所出之缺選年幼者補之以習滿文俟其稍長益學弓馬則彼此皆有禆益伏望聖恩飭令八旗將教養兵額數滿洲分出三十名蒙古漢軍各分出十名以此五十名錢糧給官學生計滿洲蒙古每名月領銀一兩五錢漢軍每名一兩則壯者既有錢糧以學弓馬幼者亦有錢糧以學文藝長幼並蒙聖恩文武皆得造就矣應將八旗教養兵清查實數如目前現缺五十名者即照數目撥給官學如缺額之數不及五十名者俟其將來缺出陸續撥給官學以漸足五十名之數如此一轉移間則錢糧不必加增而官學生皆沾聖恩鼓舞振興矣奉旨所議是依議十年奏準八旗漢軍舊家大臣子孫內無力延師者左翼二十一人右翼十一人每人月給銀二兩令其就本旗官學該助教與教習等課讀清漢書再於兩翼滿洲內選教騎射之教習各一間日赴學教國語並馬步射每人月給銀三兩乾隆三年奏準八旗子弟選取入學三年之內令其専誦經書朝夕講課三年後監臣考驗擇其材質聰穎有志力學者歸漢文班分𨽻教習令其専心講誦其年齒已長願學翻譯者歸滿文班分𨽻助教令専心翻譯是年尚書孫嘉淦奏稱官學舊例其學翻譯者考筆帖式而已間有粗通文義者考文武生員而已原以明經治事之實學非旦夕可致之功是以未敢専定章程查國子監拔貢人等現蒙皇上天恩月給廩餼講求明經治事之學頗有端緒臣等請將八旗官學生之歸漢文班者不必専講四書亦使之講求經史為有用之學每三年一次録其可以應考者奏請欽點大臣來監考驗取其明通者授為監生由官學而升之太學使與拔貢人等明經治事期滿出色者一體保舉考選録用奉旨著照所請行四年奏準各部寺八旗庫使員缺由國子監將本旗官學生嚴加考試翻譯取中四人併卷咨送吏部再行考擇充補六年奏準官學生歸漢文班者邇年以來頗知奮勉但諸生年幼度其資力止能於四書外専治一經史册浩繁乍難責其研究見在加意教導至明年八九月間擇其可以應考者繕摺奏聞請欽點大臣試以經文一篇論一道其中文理明順者酌量拔作監生令該旗造册咨送本監與漢貢監生一同肄業講求明經治事之學期滿果有尤異者準豫保舉十一年侍郎兼管國子監宗室德沛奏言八旗官學子弟雖分清漢兩途但助教一官有督率一學之責不但教習翻譯即漢文功課亦應稽查奉旨依議十二年將蒙古官學生額設二十名內挑入咸安宫學三名十六年議準嗣後各部寺八旗庫使員缺吏部行文到監將本旗宫學生考試翻譯每缺一人咨送三人與覺羅官學生一并由吏部考擇充補三十一年議準嗣後挑取官學生十八嵗以下者肄業統以十年為率如學漢文者不能進學習翻譯及清話者不能考取中書筆帖式庫使概令咨回本旗另挑差使三十二年奏準下五旗包衣每旗各添設官學生十名滿洲六缺蒙古二缺漢軍二缺照從前義學之例不給錢糧三十四年奏準官學生既經取中中書筆帖式庫使等官將來俱有出身之路未便令其在學候補應即開缺另行挑取五十四年閏五月國子監奏請於官學生中驗其年幼而多熟經書及文理明順者隨時挑取給與雙分錢糧遇有缺出歸併每學限以十名之內寧缺毋濫若一二年內學業不進仍行甄退並於該學教習中擇其學問較優者將雙分錢糧官學生専令督課果能功課勤密著有成效擬於報滿引見分别録用之後再行奏請咨部豫以補官日紀録一次注册奉旨此項官學生額缺每旗於百名內裁去十名添作出色學生膏火以示勸懲固不為多但於其中挑取十人給與雙分錢糧未免過優嗣後如遇甄汰時百名內陸續裁扣十名挑取多熟經書文理明白者二十名將此十名錢糧分為二十分給豫既足以昭鼓勵又可以多育人材較為兩有裨益附國子監議定八旗官學生條例一八旗官學生由該旗都統選擇聰明俊秀子弟十八嵗以下者用印文咨送國子監該助教帶領上堂公同察驗視其資質可造然後記名注册充補一官學生各有旗分如所居離本旗官學甚逺或天寒隂雨不能就學晷短途長未免曠時願於附近之别旗官學讀書者該助教帶領具呈準於附近官學讀書一官學生定例以辰時上學申時散學設立到學簿每日令該生親自畫到稽查勤惰如有連日到遲及三日不到者該助教即行申飭倘不悛改呈堂斥革如學生偷安曠業而助教徇隱姑容者察出記過議處一每館各立功課簿該教習飭令學生將每日所讀之書某書某處起止古文某篇時文某篇每期所作之文是何題目照實填寫不得浮開月終彚交助教收存年終交國子監博士􅈦呈堂察核一漢館每日常課有授書背書講書回講習字默書諸事備書於功課册滿館學生則每日教清書蒙古學生則每日教蒙古語一每月三八日漢館出題試文一篇五言六韻詩一首未能成篇者令作半篇滿館試翻譯或清書一道蒙古試蒙古翻譯一道一蒙古弓箭教習每日輪館教演步騎二射一官學生於常課之外該助教教習每月會課一次漢館學生作文一篇蒙童背書一次滿洲蒙古二館學生各試翻譯一道又弓箭教習會同助教率領諸生出城校試馬步射一次一官學生於春秋二季赴監會考各一次該助教預先呈册定期傳知學生分兩班考試試東四學漢文翻譯之日兼試西四學步騎二射試西四學漢文翻譯之日兼試東四學步騎二射學坐毋許不到其實在患病者先期呈堂俟病痊補試一季考漢文卷送滿漢堂官公同閲看滿文卷専送滿堂官閲看蒙古卷専送蒙古堂官閲看評定等第張榜傳集優者豫奬賞劣者面加訓飭一官學生季考列一等者奬賞紙筆墨刻由國子監檔子房交發到學該助教當堂分給以昭鼓勵一祭酒司業輪查各學該助教教習率領學生迎於堂下恭揖聼候訓諭蒙童挑背經書已作文者挑講文理或現試文藝習翻譯者試以清文數行并查每日課程簿册蒙古亦然一每年嵗終該助教查明學生平日勤惰回堂甄别量豫去留一官學生內有願讀清書者助教看其年歲稍長文義粗通始準改學翻譯如新補到學未經讀過漢書者不得遽行撥入翻譯館一官學生文理荒疏經書不熟責成漢教習翻譯平常清書生疏責成滿教習其蒙古語亦然馬步射生疏責成弓箭教習如官學生懶惰浮遊功課不進者聼該教習責懲不服者革退一官學生考取文生員翻譯生員如在學已滿十年者該助教帶領呈堂量豫去留一官學生有告假穿孝百日及兩月一月者出具本佐領圖記投遞本學該助教具稿呈堂存案例不停止錢糧功服以下送殯後上學一官學生有告假隨任省親修理墳塋收取地租省視親伯叔兄弟者量其路程逺近如離京四十里告假在十日以內者取具本佐領圖記呈堂給假其告假一月兩月者行文該旗暫停錢糧俟銷假再行補復如過三個月即行旗開缺一官學生有告假隨任回京及病痊呈請復班者該助教帶領呈堂驗看資性年嵗如尚可造就準其遇缺坐補一春秋丁祭官學生應在哲廡及崇聖祠四配兩廡執事該助教自行挑𣲖開送國子監先期隨班演禮有不到者查明革退一凡遇祭酒司業到任及封印開印助教各率官學生到監行禮一八旗新補入學助教同滿漢教習齊集學堂學生行三叩頭禮起俟助教分撥定館其見本館教習亦如之然後受業助教到任教習到館學生參見禮同一咸安宫學生缺出由該學咨取到監將本旗滿洲官學生內揀選俊秀者數名咨送一八旗滿洲蒙古漢軍都統舊設外郎缺出由該旗轉咨到監將本旗漢軍年久官學生內揀選一名咨送吏部一八旗蒙古都統新設外郎缺出該旗咨取到監將本旗漢軍官學生內揀選滿漢兼優者一名咨送一唐古忒學生缺出由該學咨取到監將本旗蒙古官學生內考選能翻譯者數名咨送一經咒館咨取蒙古官學生將能寫蒙古字者挑送一凡下五旗包衣官學生不準挑選外郎唐古忒學生一八旗官學生例不準挑補護軍馬甲拜唐阿及别項差使一八旗滿洲官學生準考庫使下五旗包衣官學生不準考庫使附八旗學舍一鑲黃旗官學在安定門內大興縣西圓恩寺胡同共房三十七間一正黃旗官學在西直門內祖家街共房三十七間一正白旗官學在朝陽門內南小街新鮮胡同共房二十八間一正紅旗官學在阜成門內巡捕廳胡同共房四十七間一鑲白旗官學在東單牌樓之東象鼻子坑共房三十五間一鑲紅旗官學在宣武門內頭髮胡同共房四十八間一正藍旗官學在東單牌樓之北新開路共房三十五間一鑲藍旗官學在西單牌樓之北甘石橋馬尾胡同共房四十間謹案國子監例載凡八旗官學房屋墻垣有應修理處及每年糊飾頂棚窗格等工由該學助教具稿呈堂咨行各該旗都統自行估計修理欽定八旗通志卷九十五
