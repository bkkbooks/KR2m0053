body:
  text: 旗分志十八旗佐領十鑲白旗滿洲佐領鑲白旗滿洲佐領上一參領至三參領鑲白旗滿洲都統所屬參領五第一參領下佐領十六第二參領下佐領十七第三參領下佐領十七第四參領下佐領十七第五參領下佐領十七第一參領第一佐領係以覺羅伍什佐領內餘丁編立始以其叔父永開管理永開年老辭退以其子嶽占管理嶽占故以其叔父之子薩爾泰管理薩爾泰故以其子三等侍衛署護軍參領塞爾特管理塞爾特故以其子明海管理明海故以其子孝順阿管理謹案覺羅伍什佐領已擡入正白旗第一參領第二佐領係康熙十三年以各佐領溢額人丁編立始以郎中瑚什塔管理瑚什塔調補陵上郎中以內閣學士希福管理希福升任以其子三等侍衛伊堂阿管理伊堂阿撥𨽻正藍旗以護軍參領覺羅常堯管理常堯故以護軍參領朱海管理朱海升任福州城守尉以侍讀學士巴顔泰管理巴顔泰故以三等阿達哈哈畨漢文稱輕車都尉甘都海管理甘都海升任寶坻縣協領以馬德管理馬德出缺以侍郎多倫管理多倫緣事革退以署副都統恩丕管理恩丕補放副都統以學士雙慶管理雙慶故以祭酒竒臣管理竒臣緣事革退以內閣學士阿肅管理阿肅革職以頭等侍衛國琳管理國琳升任以兵科給事中窩星額管理第一參領第三佐領係以覺羅伍什嶽占二佐領餘丁編立始以伍什兄之子白竒管理白竒故以其叔父哈達管理哈達故以其叔父之孫華色管理華色故以其子穆翰管理穆翰故以其弟圖翰管理圖翰故以其子承保管理承保因病告休以其弟承泰管理第一參領第四佐領係國初以巴玉特地方來歸人丁編立始以其人昻噶管理昻噶故以昻蓋管理昻蓋故以巴玉特台吉巴拜之子科爾坤管理科爾坤故以其弟阿玉錫之子來善管理來善故以其子赫成格管理赫成格故以其弟安寶管理安寶故以其子永福管理永福故以其子罡奎管理國謹案旗册此佐領係吉率屬來歸以其人編立初喀爾喀巴玉特台第一參領第五佐領即第四佐領內滋生人丁康熙二十三年來善管佐領時分立一佐領以其伯父之子西圖管理西圖故以其兄之子賽音達立管理賽音達立故以其子穆爾泰管理穆爾泰故以來善之子七十管理七十故以其子德倫管理德倫故以其子傅元管理第一參領第六佐領係國初編立始令瑪爾圖管理瑪爾圖從征陳亡以其子武庫里管理武庫里升任盛京將軍以其子鄂謨克圖管理鄂謨克圖故以其子塞爾祜德管理塞爾祜德因病辭退以其子德善管理德善故以其弟德順管理德順故以其子寶寧管理寶寧故以其子常慶管理第一參領第七佐領係第九佐領內滋生人丁康熙十二年喜佛管佐領時分編一佐領以喜佛之子華善管理華善緣事革退以紀思哈之二世孫明德管理明德故以其子秋格管理秋格故以其子永福管理永福故以其子富順管理謹案旗册此佐領係第九佐領穆舒琿下滋生人丁康熙十二年分立令異姓達都管理缺出額興額管理革退後與原立佐領紀思哈族孫定山管理缺出令紀思哈之嫡孫華善管理華善告休以紀思哈之二世孫明德管理第一參領第八佐領係第十一佐領內餘丁康熙二十三年托晉管佐領時分編一佐領以紀布喀達之孫都統木森管理木森原品休致以紀布喀達之孫富成額管理富成額缺出以其叔之子穆吉勒恩管理穆吉勒恩年老告休以其次子穆特恩管理穆特恩升任副將以其族姪德光管理第一參領第九佐領係國初以瓦爾喀地方來歸人丁編立始以紀布喀達管理紀布喀達調管第十一佐領以其兄紀思哈管理紀思哈故以其子紀詹管理紀詹故以其弟喜佛管理喜佛故以紀思哈之孫塞爾特管理塞爾特故以其子副都統德敏管理德敏缺出以其孫福克精額管理謹案旗册紀思哈故紀詹年幼與族弟穆瑚管理缺出以族姪烏爾三管理旋令穆瑚之弟珠瑚管理又以族姪齊崇額管理齊崇額治罪後始以紀詹管理又喜佛缺出後令紀布喀達之孫穆舒琿管理穆舒琿缺出始以塞爾特管理第一參領第十佐領亦係第九佐領內餘丁康熙二十三年塞爾特管佐領時分編一佐領以紀思哈之孫烏光管理烏光故以其子玊德管理玉德故以其子冬格管理冬格故以其子永奎管理謹案旗册烏光缺出以其子成德管理第一參領第十一佐領係國初以烏喇地方來歸人丁編立始以紀布喀達管理紀布喀達從征陳亡以其弟對勒慎管理對勒慎緣事革退以其族弟穆虎管理穆虎緣事革退以紀布喀達之子卦勒察管理卦勒察故以其弟尼滿管理尼滿故以其族叔祖達爾布管理達爾布緣事革退以紀布喀達之孫托晉管理托晉緣事革退以紀布喀達之二世孫特晉泰管理特晉泰緣事革退以其弟特屯管理特屯故以其子布顔泰管理布顔泰休致以其子托虎托管理謹案旗册紀布喀逹率瓦爾喀鳳家村人户來歸編此佐領第一參領第十二佐領係國初編立始以備德管理備德緣事革退以圖庫管理圖庫緣事革退以五十泰管理五十泰緣事革退以拉塞禮管理拉塞禮故以理藩院尚書尼堪管理尼堪年老辭退以其弟阿穆爾圖管理阿穆爾圖升任奉天將軍以其弟鴻臚寺卿阿錫圖管理阿錫圖故以其兄之子阿達哈哈畨阿林泰管理阿林泰故以其伯父之孫瑪哈達管理瑪哈達因病辭退以阿林泰之子吳勒禮管理吳勒禮緣事革退以其伯父之子烏爾衮管理烏爾衮故以其曾伯祖之四代孫瑪彥管理瑪彥缺出以其父瑪興阿管理謹案此佐領原係似珠林公中佐領乾隆二十六年改為無根源公中佐領四十三年定為族中承襲佐領第一參領第十三佐領係國初以訥音地方來歸人丁編立始以朗格管理朗格故以其子郎中楊鼐管理楊鼐故以其弟鍾