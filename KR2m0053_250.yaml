body:
  text: 人物志一百十六循吏傳一漢軍鑲黃旗漢軍正黃旗謹案循吏列傳始於史記然名臣如鄭之國僑搘拄危疆扶持孱主內修政事外禦強鄰僅以循吏目之無乃隘乎前後漢書所載州郡之長吏為多斯名實相符矣惟是是非厯義而論定恩讐未盡特旨好惡多私德政去思諸碑朱足依據近仆毁仰見大公至墓志墓表神道碑蔡雍稱平生所作惟郭有道碑無愧色則其他有愧可知韓愈號剛正不阿劉義乃譏其諛墓得金則不如愈者槩可想見其詞亦難為憑今於舊志所載仍列於傳其舊志所未載者則惟以各省奏祀名宦者為據猶之節婦烈女以曾邀旌表為斷云爾雖記載寥寥似乎挂漏然於春秋謹嚴之旨亦庶幾乎不悖矣漢軍鑲黃旗外任官楊天祐楊天祐漢軍鑲黃旗人順治三年任直𨽻大名府開州知州愛民重士政簡刑清時值山東大寇丁鳴吾率賊萬餘自朝城攻開州由北門越城入直至州署天祐率家人奮勇禦之殱鳴吾兄子復射鳴吾中左脅賊潰鳴吾傷重道死大冦遂滅闔州咸獲生全州民感之崇祀名宦祠董鳳舞董鳳舞漢軍鑲黃旗人順治五年任上杭縣知縣時地方初定人户流移田多荒蕪鳳舞招徠墾闢撫恤偹至適援剿潮漳之兵道經上杭往來絡繹供需百出鳳舞拮據措置不病民而供億無誤尋以積勞卒於官人思其德祀本縣名宦祠郎熙化郎熙化漢軍鑲黃旗人順治十六年任髙州府通判執法不撓凡地方賦役陋規悉申請革除其驕兵悍卒誣陷良民者即核實按法民恃為長城云後崇祀髙州府學名宦祠謹案舊志載郎熙化同旗張可立先世居福建福清縣國初始入旗籍順治十二年乙未科成進士十七年亡任四川劍州知州時土寇初平學校廢弛百姓流轉徙未盡復業可立涖官一以重士安民為務州人德之亦崇祀名宦今通志之例凡已入旗籍之人所生子孫乃入志其初由漢人入旗者雖孔有德洪承疇之功亦不載入是以刪去不列其名謹附識於此金雲鳳金雲鳳漢軍鑲黃旗人康熙二年由筆帖式任荆州府通判值定西將軍圖海等征茅麓山流寇軍需浩繁西山險道挽運維艱家派一夫轉運多道斃者雲鳳設法轉輸詳請永免户夫之派民甚賴之在任察吏安民弭盜剔姦凡為民害者密行咨訪悉治以法加意學宫分題校課多士咸振興焉九年升浙江嚴州府同知纍升至霸昌道三十六年崇祀荆州名宦祠于宗堯于宗堯漢軍鑲黃旗人康熙七年由廕生任常熟縣知縣時漕政積弊糧俱民運輒至破家宗堯創議詳定官收官兊民困得蘇至今永賴其利其餘美政尚多備載邑乘以積勞成疾十一年四月卒於官邑人思其德留葬於虞山之麓十八年崇祀名宦祠趙良璧趙良璧漢軍鑲黃旗人康熙八年由廕生任山西徐溝縣知縣勤課農事見勤於田事者一一奬賞間有怠惰者微懲之在任六載荒蕪盡闢勤宣聖諭每月朔望令鄉耆約長以次宣讀有未明晰者必親為詳解務使人人通曉催科有法民皆踴躍輸將編審丁差加減必核實學宫傾圯捐資改建城樓塌壞者重葺之挑濬城濠沿堤植栁千餘株城隍廟火焚倡率士民重修徐溝久不發科形家言宜於城外巽地築一文峯力未及舉於去任後寄銀四百兩令建文昌髙閣嗣是科甲有人士子尸祝焉在任值天時亢旱聞太原縣晉祠鎮水母最靈距徐溝四十餘里良璧露頂跣足徒步拜禱甘霖立沛革除鋪户里民應承陋例詞訟不受錢不聽請託察胥役尤嚴差票莫敢需索紳襟士庶賢者奬之不肖者懲之先是徐溝黨棍竊盜日夜橫行自良璧到任匪類潛蹤募夫工食按季實發跕馬草豆親自採買不私派里户善政甚多纍升至浙江布政使頗過於威稜然徐溝人德之崇祀名宦祠許宏勳許宏勳漢軍鑲黃旗人康熙十三年任浙江紹興府知府時逆藩耿精忠為亂蹂躪浙東是年十二月宏勳同恭將滿進貴敗賊於嵊縣之長嶺桂門山嶺等處殺賊兵一千七百餘人生擒偽軍師邱爾章偽將軍馬玉等十四人賊兵三百六十六名招撫偽總兵馬瑞之等下部議敘纍升至雲南按察使二十七年楚省兵變震驚逺近滇南姦民造言煽惑七月二十日營卒張麻子要結黨羽將為亂滇民貧而黠者多附之歃血誓盟期於是夜三鼓舉兵劫掠適居民張喬得其謀赴署告急宏勳立遣人密捕謀首飛揭上官委員坐譙樓令止擊二鼓時逆黨方聚衆飲酒聽鼓聲而發捕者猝至首從皆就縳及旦究出渠魁立即正法脅從悉寬宥不動聲色變弭禍息兵民安堵比卒人咸思之公舉崇祀名宦祠同旗有盧燦者康熙十三年任浙江龍遊縣知縣亦以值耿逆反叛浙中盜賊竊發燦𠞰捕兼施恩威并著邑內賴之二十年卒於官士民亦祀之名宦祠王之佐王之佐號燮菴漢軍鑲黃旗人康熙十六年由監生任寧化縣知縣時耿逆初平海氛未靖徵求軍需日三四至之佐權宜變通得減其半二十年大剿海寇王師十萬駐漳州日餉千斛上遊飛挽以次遞運寧化應派運夫五百名月一更代之佐念民疲役重力以免夫上請語特懇切督撫憐而許之時有奉欽差入閩閲查兵餉者頗作威福將入縣境之佐逺迎躬為導馬以縣署居之供具彌謹一宿即護導出境民間秋毫無擾會有黃機者乘甲寅三藩之變受吳三桂偽劄脅其鄉黨從逆楊地一鄉不從遂圍而屠之之佐請兵會𠞰時兵與海賊相持難以移師之佐情詞懇切督撫許調三鎮兵會剿又值同安告急檄調二鎮往援之佐力懇仍留三師言令當以官爭去留不忍示弱以驕賊致民人糜爛聲淚交迸督撫覽其誠許之之佐遂部率兵躬為嚮導蹙賊壘分攻之賊盡棄其衆越贛石入江西投誠江西撫臣納之發符護賊還寧化使招集舊部以成一旅之佐堅不奉􅊾昌言於大吏曰普天王土非列國分疆之比閩賊即江賊也若閩賊入江即當宥死江賊入浙又應偷生王法將誰加乎如謂法外宥過以招不庭則自江納之即自江用之今名寄江籍而身返閩巢閩之文武何顔臨之乎大吏韙其言遂搗其巢穴設防兵洞口絶其歸路數十年逋誅獷族皆鳥獸散之佐戮力行間每領兵數千旦夕巡行營壘聫客師為指臂市井肅若無人後以勞得寒疾卒軍民震悼罷市巷哭者三日思之不忘崇祀本縣名宦祠張聲逺張聲逺漢軍鑲黃旗人康熙二十年由監生任湖廣臨武縣知縣在任作士愛民廢墜修舉縣學宫燬於眀季康熙初年始建規模未偹聲逺加意振興凡兩廡櫺星門及名宦鄉賢祠宇師儒齋舍次第營構煥然維新均編徭役釐定里分丁糧均平時大兵猶進剿滇黔不無雜派聲逺嚴飭胥役不得擾纍邑中大水㕓肆多漂沒聲逺步行慰撫按户捐資助民營葺縣治南十里向有兩石神像居民屠狗以祀供以銀花嵗無虛日聲逺命左右碎毁其像作磔狗石神文開示愚民載在邑志民思其德崇祀名宦祠黃道行黃道行漢軍鑲黃旗人康熙二十四年分守福建延建邵道延郡水陸交衝舊有里役大為民纍道行嚴行禁革郡中火親督員役撲滅之隨捐銀米按户撫恤又時詣學宫進諸生講文藝反覆辨難優加禮異士風為之一振士民感德祀之名宦祠靳襄靳襄字天垣漢軍鑲黃旗人初任杭州府督糧通判剛方正直不畏強禦撫軍以駐防旗兵驕橫題升為理事同知旗軍多以債息折取民人子女襄悉為捐俸贖回俾室家完聚浙闈人文日盛號舍不足多編席補湊辦修貢院因為添設瓦號房千餘士子永賴焉其餘濟貧民掩遺骸禦火災施丹藥闔郡感德康熙二十八年升南安府知府朔望勤宣聖諭教訓民人作興學校設義學捐俸延師孤寒之士皆得向學詳請增設科舉名數人文蔚起重修道源書院及陽明書院春秋致祭不懈在任緝盜安民革除火耗禁陋規免徭役嵗旱步禱甘霖立沛捐俸築城垣修橫浦橋惠政甚多升直𨽻天津鹽法道卒五十二年崇祀浙江杭州名宦祠靳治揚靳治揚漢軍鑲黃旗人由筆帖式補用同知升福建漳州府知府康熙三十四年調臺灣府知府抵任後蕩滌草冦招撫土畨詳免崩陷田課尤雅意作人捐資修學舍番童有未知禮義者立社學延師教之臺人崇祀名宦同旗有于有慶者康熙三十五年由官生任四川江油縣知縣在任數載除陋規薄耗羡邑人頌之亦祀名宦祠王光鼎王光鼎漢軍鑲黃旗人任嚴州府知府嚴郡灘髙水急津渡最險光鼎捐資所在多設渡船遂無風濤之患行人利之郡有狐妖害民民來訴光鼎禱於城隍狐遂絶迹康熙三十六年嚴州旱米騰貴光鼎冒盛暑躬行祈禱復捐資率其屬逺糴平糶所全活甚衆既而旱甚不雨因自暴烈日中感疾不返署遂卒民皆奔哭易服持喪輟耕罷市者七日眀年七月公請於大吏奉其主入府縣二學名宦祠淳安遂安二學亦祀焉同旗有許國棠者康熙四十二年由筆帖式任四川綦江縣知縣撫字有方六載升知冀州亦有政績入祀本州名宦祠徐濬徐璿漢軍鑲黃旗人任廣東萬州知州萬處瓊郡海田多新墾者民多爭競濬蒞任後首清地畝疆界以杜爭端減免差徭除革濫派優禮士子折獄眀敏又捐修文廟出穀賑濟飢民添設槗梁人無病涉清查保甲宵小潛蹤弊革利興去任之後猶謳歌不忘康熙五十一年崇祀本州名宦祠張綏逺張綏逺漢軍鑲黃旗人直𨽻慶雲縣殉難知縣必科孫也任廣西思恩府知府嚴絶苞苴遇詞訟虛公聽斷民不稱寃嵗荒捐俸賑濟地方疾疫施藥調治全活甚衆仕至陕西西寧道按察司副使崇祀廣西名宦祠以上十九人並舊志所載漢軍正黃旗外任官劉國寧劉國寧字漢章漢軍正黃旗人順治七年由恩廕生任黃岡縣知縣年甫二十蒞任有神君之號徵收有法革除一切陋規邑為水陸衝衢長江上下兵艘差騎踵至國寧輒單騎親往迎送一無擾纍邑多火災預設救火具臨時身先往救去任後士民思其德崇祀本縣名宦祠陳邦寄陳邦寄漢軍正黃旗人順治八年以廕生授浙江石門縣知縣時邉圉未靖師旅往來邦寄善御卒伍道無譁兵有海寇鈎連嘯聚村落者邦寄謀勇過人隨在撲滅民得安枕復以政暇課農桑理文教居三載以詿誤去人咸惜焉為立祠於南郊外肖像祀之祠圮復改建於新橋之側又崇祀名宦祠趙民善趙民善漢軍正黃旗人順治十年由貢士任山東膠州知州值土賊蹂躪之後潔己愛民加意撫綏時以查海産滋纍民善濟之以寬旱魃為虐誠禱致雨在任八年鞅掌盡瘁甫報升湖廣衡州府知府旋卒於膠膠民思慕不忘崇祀名宦祠又建専祠於城隍廟祀之金維藩金維藩漢軍正黃旗人順治十七年由廕生選授禮部筆帖式纍遷至本部郎中康熙六年升授浙江按察使在任潔己奉公愛民禮士尋告終養回京十七年起補廣東廣南韶道二十五年授廣西按察使三十四年正月卒後浙人思其德政五十二年公請崇祀名宦祠吳育珍吳育珍漢軍正黃旗人順治十二年乙未科進士康熙十三年任武昌分守道升湖廣按察使時逆藩吳三桂反叛人心驚惶育珍多方安輯出示撫慰民心稍安俄蘄州兵變育珍密訪報院擒獲渠魁安定餘卒又大兵進攻嶽州育珍督輸糧草供應無缺武昌姦棍多掠賣良家子女育珍密訪嚴拿匪類潛蹤又民間向有苛派運夫之纍育珍嚴飭各屬永行禁革捐俸修葺學宮敦崇文教楚人愛戴二十一年丁憂回籍服闋補山東按察使卒於官崇祀湖廣名宦祠張所志張所志漢軍正黃旗人由貢生纍官監察御史順治十七年巡察四川伸寃理枉吏畏民懷康熙十二年出為山西糧驛道廉介自持經管糧務禁絶陋規署布政司印務嚴革火耗飭各户自封投匱勒石署前又禁差役擅騎驛馬及驛遞草料私派里民驛馬倒弊派民買補之弊夫馬工料按時給發無扣尅短少厰夫站馬足額捐俸設立義學令貧民子弟肄業季考月課甄别文藝監鄉試文武兩場捐俸加給飯食每冬春發米煮粥以濟飢民掩暴骸施醫藥嵗旱齋戒誠禱獲甘霖三日十九年升福建按察使平反寃抑訟獄衰息尋署理巡撫事值海寇猖獗修理戰艦督運糧餉會同將軍提鎮等進𠞰寇息民安二十一年升江西布政使留心政教凡有關民社者無不舉行提調鄉試文武兩闈禁止派辦時三藩之亂初定會計月餉酌盈劑虛軍儲充裕而民不擾四川山西福建江西并崇祀名宦祠夏瑋夏瑋漢軍正黃旗人康熙九年由廕生任江南和州知州清白自矢實心任事均賦役省詞訟剔除弊蠧嵗飢捐資賑粥所全活甚多又修學宫輯志書文風日盛十九年升任淮安府同知和州士民思其德崇祀名宦祠袁一相袁一相漢軍正黃旗人初任外吏纍遷至浙江左布政使司布政使浙江州縣書吏與藩司書吏勾通解多投少擱批不即發事覺則州縣官并受其纍一相立循環簿每遇錢糧徴解連前數彚書於批寓目瞭然上下侵蝕之弊遂除南米嵗入廣豐倉倉少不足貯則露積覆以葦多紅朽一相捐俸建倉六十餘所屬吏請紀其事於石一相曰此藩司職耳不足録也在任凡所區畫悉可經久以疾暴卒人咸惜之事載浙江通志康熙十四年三月崇祀名宦祠李國維李國維漢軍正黃旗人康熙十二年由舉人知河南鞏縣賑濟緝暴勤幹廉明十三年官兵進剿逆藩吳三桂鞏當孔道拮據供應井井有法民皆安堵二十年升雲南新樂州知州鞏人思其德崇祀本縣名宦祠同旗有張國用者世居遼東廣寧順治五年貢士康熙十四年任河南浙川縣知縣循良正直勤於撫字亦會逆藩吳三桂之亂供應軍需不纍百姓去任後士民感頌崇祀名宦祠王進取王進取字簡修漢軍正黃旗人康熙十六年任尤溪縣知縣時耿逆初平瘡痍未起進取加意民瘼不事苛急嘗重建黌宫捐公廨地以廣學宫俾諸生肄業其中文教一新士民德之崇祀名宦祠王育賢王育賢漢軍正黃旗人康熙十七年任福建興泉道六月海寇圍泉州育賢治戰守具躬操畚鍤築垣與士卒登陴守禦不解甲者四十餘日會援師至圍乃解自臨閭巷撫慰民人以勞卒於官宦囊蕭然百姓醵錢為治棺殮携牲醴以祭者數千人比喪還京哭送三十餘里設木主於崇陽樓祀之何錫爵何錫爵號淡園漢軍正黃旗人初隨父天佑判荆州府兩攝縣事多所勸助父卒於官有應取七百餘金郡守命吏致之錫爵却之曰先父居官廉直吾不敢負且新令逺來貧乏恐纍百姓故留為若助耳郡守歎服康熙十八年由監生選陕西寶雞縣知縣是時王師駐扎城外差務殷繁錫爵年甫弱冠內撫百姓外應軍需兵民相安著有聲績旋丁母憂離任服闋補雲南定邊縣知縣攝定逺事催科不擾摘姦如神吏畏民服稱為包何二十九年推升河南鄭州知州鄭當孔道素稱難治錫爵下車後杜苞苴雪沉獄除苛政興立學校循行阡陌在任五載時和年豐有蝗不入境之異士民感恱為立生祠於子産祠之南顔其額曰遺愛同流撫臣亷得其實卓異為河南第一升南陽府同知尋護府先是秦省飢民有來就食者幾千人屬官以疫癘為憂錫爵諭之曰秦豫莫非王土子民不可歧視因分部安輯首倡捐賑逾年始為資送回籍全活甚衆三十九年陜西平涼府知府缺出廷舉賢吏錫爵名在首列即奉旨擢用即扺任見兵燹之後一望荒蕪民不堪命慨然捐給老弱粟布加意撫綏至今猶家祝焉後丁生母憂起補雲南順寧府知府未及抵任而卒比櫬旋都道經鄭州士民擕牲醴迎祭者不絶於路哭聲振林谷扶送五十餘里復請崇祀本州名宦祠馬世英馬世英漢軍正黃旗人康熙二十二年由廕生任河南睢州知州勤於吏治士恱民安二十四年霪雨六十餘日平地水深數尺浸漫入城老幼悲號世英親募夫囊土計土給值晝夜拮據壅塞城墉廬舍俱得保全州民為勒石以志功德尋內升本旗佐領離任之日士民相送者不絶於途崇祀名宦祠李興祖李興祖漢軍正黃旗人副都統宜哈納之子湖廣總督輝祖之弟也由廕生補翰林院筆帖式改督捕侍郎衙門筆帖式又改都察院筆帖式外轉直𨽻河間府慶雲縣知縣康熙二十四年升山東兖州府捕盜同知時初設捕盜衙門駐劄郯城縣郯城界山東江南兩省扼要之地東近磨山西鄰黑陵澗南迤羽山北倚蒼山皆羣盜窩巢國初羽山土寇李二和尚尤為渠魁肆行虜掠沂城郯城官兵往捕輒匿海濵及沿海捕緝又奔沂郯所出歿之處距四屬俱百里而遙康熙十八九年間四州縣彚詳通報始發漕標大兵圍剿於黑陡澗李二和尚身死所遺餘孽日久尚未盡殄曉散夜聚擾害地方至是興祖蒞任即布令曉諭居民有能擒一賊及指賊所居者有賞其所獲賊果能自新即令招撫免罪不一年間餘黨盡除三年內多方巡察防範甚嚴凡遇竊盜搶奪拐逃等情隨到隨審恩威并濟兩省所屬人民悉遵化導姦宄衰息復捐俸修葺學宫朔望躬宣聖諭諄切教訓禮讓之風日起署沂州印務一載清廉惠愛咸頌仁眀俸滿升直𨽻河間府知府纍升江西布政使順天府丞卒兖州人思其德崇祀名宦祠王育良王育良漢軍正黃旗人康熙二十九年由例監生授山東東阿縣知縣在任善政有三一曰改單頭徵糧時設立滚單之法一社共若干村一村共若干户輪流滚催不事敲朴追呼民皆依限完納一曰淺閘夫往時夫役工食不足簽派里民育良詳請河撫兩院不論紳士百姓照地徵錢官覓夫役附近州縣俱照此例行焉一曰飛車凡往來差使裝載行李多派民出車應辦稍遲即加譴責胥吏緣是乾沒為姦育良自修官車用驛遞夫馬民無所擾此三事迄今遵為定例邑人德之崇祀名宦祠王維翰王維翰漢軍正黃旗人康熙三十一年由監生升任江西臨川縣知縣政簡刑清催科有法課試生童必公必明聽斷訟獄不徇情靣屏絶饋遺加意愛民四十五年升河南睢州知州政聲視臨川益著值州有水災施衣施粥復捐穀賑濟貧民不使流離失所五十五年丁憂離任睢民感頌為建生祠於州東至今里老猶稱道不置馬雲從馬雲從漢軍正黃旗人康熙三十四年任四川達州知州己卯秋潦民食維艱雲從多方告糴境內賴以全活邑民至今感頌崇祀本州名宦祠李清鎧李清鎧漢軍正黃旗人康熙三十六年由官監生知山西太平縣蒞任六年每逢朔望敬宣聖諭睱則履畝勸農大修學宫創建兩廡設義學教士敦詩禮裁革火耗勸民輸將聫保甲修城垣盜賊潛蹤士民思其德五十六年崇祀名宦祠王敏政王敏政字九經漢軍正黃旗人由監察御史外轉分巡福建興泉道按察司副使康熙四十三年改蒞臺灣仁厚不苛尤加惠畨民凡通事社商之朘削及畨車之濫派者咸革除之畨民感恱秩滿升任廣東雷瓊道布政司參政尋病卒閩人思其德建専祠祀之并祀名宦祠王授位王授位漢軍正黃旗人康熙四十三年由監生任龍門縣知縣甫到任見學宫傾頺捐俸創建設立義學延師教士縣被大水多方賑恤淹塌房屋者給穀淹死者給棺災民賴以安全防禦盜賊嚴飭鄉丁隄防隘口催科撫字革除陋例息訟寧民善績甚多後升福建邵武府同知五十九年崇祀龍門縣名宦祠周元文周元文字洛書漢軍正黃旗人康熙四十六年由福建延平府知府調補臺灣府居官廉正姦胥猾吏畏若神眀置義學田以贍寒士按月課試悉心鼓舞嵗荒詳請題免租課十之三定斗斛革火耗一切措置悉本實心臺灣民至今猶思其德崇祀本府名宦祠吳存義吳存義漢軍正黃旗人任髙州府糧捕通判案存義授官年月舊志未載天性篤孝蒞任五載氷清自持日用器物及修葺衙宇悉皆自辦不損民間絲毫巡察有方萑苻遁迹革火耗減差徭政簡刑清愛民禮士署事各州縣所至皆著循績殁後士民痛悼如失怙恃康熙五十五年崇祀高州府名宦祠張宏猷張宏猷漢軍正黃旗人國初任長沙府知府時軍務旁午一切簿書手自裁決不假他人御下以嚴治民以惠尤加意學校待士以禮有貧乏者嵗時賙之後擢廣西副使道崇祀長沙名宦同旗有李錦者任江南寧國縣知縣清􅋵介節保障巖邑士民懷之亦祀本縣名宦祠趙金章趙金章漢軍正黃旗人由監生任廣西昭平縣知縣甫下車即重建學宫設義學訓迪士子捐資偹牛種開墾荒田民安耕鑿又設義塜掩埋露骨邑民頌焉後祀本縣名宦祠以上二十六人並舊志所載欽定八旗通志卷二百三十六
