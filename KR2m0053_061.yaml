body:
  text: 欽定四庫全書欽定八旗通志卷四十七職官志六職官八旗都統器前鋒統領營護軍統領鎗步軍統領火營健鋭三旗虎營盛京將軍等官八旗都統都統滿洲各一人蒙古各一人漢軍各一人從一品副都統滿洲各二人蒙古各二人漢軍各二人正二品太祖國初削平諸部歸附日衆人為一牛彔每牛彔設一髙皇帝辛丑年始編三百額真乙卯年設八旗每三百人設一牛彔額真五牛彔設一甲喇額真五甲喇設一固山額真每固山額真設左右梅勒額真二人以佐之天聰八年改梅勒額真以下為章京惟固山額真如故其隨固山額真行營馬兵定為阿禮哈超哈是為驍騎營之始九年分設蒙古八旗崇德七年定設漢軍八旗順治十六年鑄給八旗都統二十四印十七年定制固山額真漢字稱為都統梅勒章京漢字稱為副都統雍正元年改八旗都統印漢文固山額真字為固山按班漢名如舊八旗驍騎參領滿洲各五人蒙古各二人漢軍各五人正三品八旗副驍騎參領滿洲各五人蒙古各二人漢軍各五人正四品天聰八年制管甲喇者即為甲喇章京順治八年定甲喇章京漢字稱為參領滿字如舊康熙三十四年每甲喇增置委署參領一人於世爵佐領等員內選用雍正元年改為副參領七年又增置左右司掌關防參領旗各二人十三年省八旗佐領滿洲六百八十一人蒙古二百有四人漢軍二百六十七人正四品驍騎校每佐領下一人正六品天命元年始編置滿洲牛彔八年增編蒙古牛彔天聰四年增編漢軍牛彔八年制管牛彔者即為牛彔章京順治十七年定牛彔章京漢字稱為佐領分得撥什庫漢字稱為驍騎校滿文如舊印務參領滿洲各二人蒙古各一人漢軍各二人於本旗參領內選充印務章京滿洲各八人蒙古各四人漢軍各六人於佐領驍騎校世職內選充印務筆帖式滿洲各八人蒙古各四人漢軍各六人於監生甲兵內選充隨印外郎滿洲各一人蒙古各二人漢軍各一人於漢軍官學生內考充雍正七年每旗設左右司掌關防參領章京及司務等員十三年俱省改設印務參領章京筆帖式員額乾隆元年定謹按今制八旗有值年公署嵗列都統副都統銜名奏請簡派掌八旗會理之事選左右翼官校之賢能者分治之領催驍騎掌書鈔各舉職以從其長課事考成聞所嵗終則會已結未結之事彚疏以旗以應升注册屬之稱職者於每嵗更代月咨本立法最為詳備謹附識於此前鋒統領前鋒統領左右翼各一人正二品天聰八年定巴雅喇營前哨兵為噶布什賢超哈順治十七年定噶布什賢噶拉衣按班漢字稱為前鋒統領每翼各設一人以總其事或以王公大臣兼領前鋒參領左右翼各八人正三品前鋒侍衛左右翼各八人正四品委署前鋒侍衛左右翼各四人給五品冠帶以前鋒校或親軍校選委前鋒校左右翼各四十八人從六品國初設噶布什賢章京順治十七年定為前鋒參領並置前鋒侍衛前鋒校等員額乾隆十七年增置委置前鋒侍衛旗各一人前鋒軍八旗滿洲蒙古每佐領各二人分其半以兼習鳥鎗設之什長隊長以時訓練而黜陟之委署前鋒校左右翼各四人乾隆十七年後添設即在藍翎長內兼充隨印協理事務前鋒參領左右翼各一人隨印協理事務前鋒侍衛左右翼各一人隨印前鋒校左右翼各二人藍翎長左右翼各二十四人委署藍翎長左右翼各四人隨印筆帖式左右翼各二人凡前鋒營各官皆滿洲蒙古兼用隨印參領侍衛及前鋒校俱雍正三年定筆帖式初制每翼各一人康熙四十六年省雍正三年復增置護軍統領護軍統領每旗各一人正二品國初設巴雅喇營統以巴雅喇纛章京順治十七年定漢字稱為護軍統領設員額如今制護軍參領每旗十四人正三品內司鑰長每旗各一人署司鑰長每旗各一人內司鑰長署司鑰長俱以前鋒參領護軍參領遴選除授副護軍參領每旗十四人初置五品雍正十二年定為正四品委署護軍參領每旗各七人給五品冠帶以護軍校選委護軍校滿洲蒙古每佐領各一人從六品國初設巴雅喇營甲喇章京順治十七年定漢字稱為護軍參領又設署護軍參領雍正元年改為副護軍參領乾隆十七年復增設委署護軍參領員額護軍八旗滿洲蒙古每佐領各十七人及十六人不等委署護軍校每旗各七人乾隆十七年設二十八年撤入善撲營一缺隨印協理事務護軍參領每旗各一人隨印協理事務副護軍參領每旗各一人隨印護軍校每旗各二人隨印筆帖式每旗各二人門筆帖式鑲黃正黃正白三旗各十人隨印參領副參領及護軍校俱雍正三年定以本員兼充無專員筆帖式初制每旗各一人康熙四十六年省雍正三年復增置門筆帖式初制未設後增置內委署主事一員額外主事二員皆豫六品頂帶均係兼充圓明園八旗護軍營總統無定員禁雍正二年始置於所選苑周圍建營房八京中八旗官軍分地駐劄專司宿直以王公大臣統轄營務焉營總護軍參領每旗各一人正三品副護軍參領每旗各二人初置五品雍正十年升為正四品署副護軍參領每旗各四人初制六品雍正十年升為正五品護軍校每旗各八人從六品副護軍校每旗各八人給冠帶仍食月餉營總副參領署副參領俱雍正三年置參領雍正十年置護軍校初置八十人雍正十年增置三十二人乾隆十二年又增十六人副護軍校雍正七年置初定七十二人十年增置四十人乾隆十二年又增十六人隨印協領事務營總二人隨印協理事務護軍參領二人隨印護軍校四人隨印筆帖式八人乾隆十六年置御前嚮導總統無定員以前鋒統領護軍統領八旗副都統兼任嚮導處參領四人侍衛四人前鋒校六人護軍校六人皆於前鋒護軍營內選用謹案嚮導處雖無専設之員非定有常額者可比然翊衛歸途責任綦重今以其隨時內謹附載於後簡任者皆在前鋒護軍營官步軍統領提督九門巡捕五營步軍統領滿洲一人正二品初置九門步軍巡捕三營皆領於兵部職方司以漢人主事一員専司政令康熙十三年始改設提特簡八督九門步軍統領一員年以巡捕三營併𨽻於步旗大臣綜理其事三十軍統領乾隆四十六年以所轄三營地方遼濶增為巡捕五營舊設有協理步軍統領衙門刑名事務部臣一人乾隆四十三年省如步軍統領有以都統副都統等官簡放者該部聲明請旨簡派其由侍郎簡放者即不必復派協理之員近制以親信王公大臣兼任左右翼步軍翼尉每旗各一人正三品八旗步軍協尉每旗滿洲一人蒙古一人漢軍一人正四品步軍副尉每旗滿洲一人蒙古一人漢軍一人正五品捕盜步軍校每旗滿洲三人蒙古一人漢軍一人步軍校每旗滿洲二十一人蒙古八人漢軍八人正五品委署步軍校每旗滿洲五人蒙古二人漢軍二人翼尉本名總尉康熙十三年置協尉本名副尉順治五年置副尉本名參尉雍正四年置乾隆十九年俱改今名步軍校亦順治中置捕盜步軍校委署步軍校俱康熙三十四年置步軍統領衙門員外郎滿洲二人主事滿洲二人司務滿洲一人筆帖式滿洲十二人員外郎初置一人康熙六十一年增一人司務雍正十三年置筆帖式初置四人康熙三十年增四人雍正十三年又增四人城門領滿洲十八人漢軍七人正四品城門吏滿洲十八人漢軍七人正七品門千總漢軍三十二人從六品城門領初名城門尉城門吏初名城門校乾隆十九年俱改今名其員額內城每門各二人外城每門各一人門千總初為指揮千户順治四年改置內外城每門各二人信炮總管滿洲一人正四品司信炮官漢軍各一人正五品初順治十年始定制信炮五于白塔山及內九門各置信炮五設信炮官漢軍左右翼各二人以司其事雍正二年改定員額如今制乾隆八年定歸於步軍統領管轄又紫禁城內西筒子河舊制置步軍校二人以偹緊急差傳乾隆四十八年增置協尉一員移駐造辧處外圍地方焉火器營火器營總統六人以王公或領侍衛內大臣都統前鋒統領護軍統領兼任初康熙三十年始置火器營設鳥鎗護軍每人各給鳥鎗一八旗各給子母炮五專司練習火器以王公大臣兼領無定員雍正年間始定置六人火器營左右翼翼長各一人正三品八旗掌關防營總每旗各一人正三品委署翼長二人在內鳥鎗護軍參領每旗各一人正三品副鳥鎗護軍參領每旗各二人正四品兼管炮位每旗各一人委署鳥鎗護軍參領每旗各四人五品頂帶花翎委署鳥鎗參領十人於鳥鎗護軍校內選用仍食原餉鳥鎗護軍校每旗二十八人筆帖式每旗各二人營總乾隆二十九年置鳥鎗護軍參領初設十六人均以旗員兼任雍正三年省察哈爾八旗護軍參領改入火器營定為專設之缺乾隆二十九年省八人又初制有鳥鎗驍騎參領二十四人鳥鎗驍騎校一百十二人乾隆三十五年省驍騎參領以驍騎校額併入護軍校內即以副護軍參領兼管炮位及委署護軍參領皆如今額又有鳥鎗藍翎長每旗二十八人八旗滿洲蒙古每佐領下鳥鎗護軍六人筆帖式於護軍內選用仍食原餉健鋭營健鋭營總統無定員以王公大臣兼任乾隆十四年于八旗前鋒護軍內簡雲梯精卒千人從征金川及功成凱旋因命以其衆特立為健鋭雲梯營於香山實勝寺傍建屋以居之其官屬皆設為定額而以王公大臣兼理旨特營務有缺則請簡焉健鋭營左右翼翼長各一人正三品委署左右翼翼長各一人正三品乾隆三十五年置八旗前鋒參領每旗各一人正三品副前鋒參領每旗各二人正四品乾隆十五年初置八人二十九年增置八人委署前鋒參領每旗各四人即於前鋒校內選委乾隆十九年初置十六人二十九年增置八人五十年又增置八人前鋒校共一百人從六品乾隆十五年初置五十人二十九年增置二十四人三十三年又增置二十六人副前鋒校共四十人即於前鋒內選用藍翎長共一百人乾隆十五年初置五十人三十九年增置五十人筆帖式八人即于前鋒內選用仍食原餉乾隆十五年初置四人三十八年增置四人謹案翼領等官俱乾隆十四年置委署前鋒參領副前鋒校俱十八年增置又前鋒千人委署前鋒千人三旗虎鎗營虎鎗營總統一人以公侯領侍衛內大臣兼任三旗總領各二人以內大臣都統前鋒統領護軍統領副都統侍衛簡用虎鎗長每旗各七人虎鎗副每旗各七人均於虎鎗人內選用筆帖式三人七品虛銜仍食原餉委署筆帖式三人初康熙二十三年黑龍江將軍進精騎射善殺虎新滿洲四十人至京分𨽻上三旗始置虎鎗營設官以領之三旗虎鎗人共六百人於侍衛參領親軍校親軍前鋒校前鋒護軍校護軍驍騎校驍騎領催及間散人內選用初制設三百六十人雍正元年增置每旗各八十人內虎鎗人四百八十人學習虎鎗人一百二十人虎鎗總統總領馬褂以黃色鎗長以紅色虎鎗人以白色襟均鑲以青乾隆三年始鑄給關防焉盛京將軍等官盛京將軍一人從一品副都統三人世祖章順治元年燕京以內太臣一員副都統二員及每皇帝定都盛旗駐防章京留守臣為昻邦章京給鎮守總管印京三年改駐防大康熙元年改為鎮守遼東等處將軍四年改鎮守奉天等處將軍乾隆十二年改奉天將軍為鎮守盛京等處將軍其副都統二員雍正五年以一員移駐錦州府又增置熊嶽副都統一員盛京等處駐防城守尉八人協領十七人佐領一百二十七人防禦九十四人驍騎校一百九十八人通事官二人盛凡駐防之地自將軍所治外其所屬各城曰京興京曰撫順曰遼陽曰海城曰蓋州曰開元曰鐵嶺曰復州曰寧海曰旅順水師營曰岫巖城曰鳯凰城曰錦州