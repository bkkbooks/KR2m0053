body:
  text: 欽定四庫全書欽定八旗通志卷二百二十四人物志一百四忠義傳十六蒙古八旗一順治十七年共六十六人天聰五年至拜桑武拜桑武蒙古鑲黃旗人姓扎拉理氏世居烏蘭地方天聰五年七月以佐領從太宗文皇帝征明大凌河明監軍道張春率兵來援我兵奮勇攻擊敵敗走拜桑武率衆追之被傷歿於陳恩賜雲騎尉世職承襲詳見世職表三晉三晉蒙古鑲黃旗人姓柯勒特氏世居西拉木倫地方崇德三年隨揚威大將軍多羅貝勒嶽託征明至山東用雲梯兵攻茌平縣首先登城身被重傷力戰死之恩賜騎都尉世職承襲詳見世職表扈護巴雅拉扈護巴雅拉蒙古鑲黃旗人姓博爾濟錦氏世居扎魯特地方任護軍校崇德三年從貝勒嶽託征明擊馮太監侯總兵於豐潤大敗之出邉時明陳總兵同三太監率兵拒敵扈護巴雅拉力戰歿恩賜騎都尉世職後遇恩詔加至二等輕車都尉承襲詳見世職表喇瑪金州喇瑪金州蒙古鑲黃旗人崇德六年六月大兵征明圍錦州大敗明兵於松山八月明軍門洪承疇督諸將率精兵十三萬赴援太宗文皇帝帥兵親征喇瑪金州以扎薩克王從事焉越衆先登突圍衝擊戰歿於陳詔豫優恤賜達爾罕號恩賜一等伯世職承襲詳見封爵表布齋布齋蒙古鑲黃旗人崇德六年十月以護軍校隨大兵征明錦州圍松山杏山松山總督洪承疇出兵六千夜犯我營布齋奮勇進擊歿於陳恩賜雲騎尉世職承襲詳見世職表扎叟兒額布亨扎叟兒額布亨蒙古鑲黃旗人姓科爾孫氏世居西喇木魯地方於順治元年隨定國大將軍和碩睿親王多爾衮入山海關擊流賊李自成兵中炮陳亡恩賜騎都尉世職承襲詳見世職表巴拜巴拜蒙古鑲黃旗人姓額爾忒特氏世居邁朗古特地方以護軍校於順治元年從大兵入山海關擊流賊於昌平州力戰陳亡賞恤如例布岱布岱蒙古鑲黃旗人姓韋默特氏世居翁牛特地方順治二年以二等侍衛奉差往蘇尼特喀爾喀地方遇賊戰歿得賞銀四百兩克什特克什特蒙古鑲黃旗人姓西喇氏世居科爾沁地方任前鋒侍衛崇德八年從奉命大將軍多羅貝勒阿巴泰攻山東師旋遇明范軍門兵來襲克什特分兵敗之順治元年從靖逺大將軍和碩英親王阿濟格征流賊至陜西延安府賊犯我鑲黃正白兩旗營克什特率前鋒兵助擊敗之又隨大兵圍荆州同俄謨克圗擊敗其衆進圍承天府同阿思哈敗流賊六百餘衆至九公山遇賊田國公同達蘇奮擊敗之復隨都統庫魯克達爾漢阿賴率兵追賊遇賊兵千餘人擊破之三年隨和碩肅親王豪格征四川同西忒庫敗流賊賀珍又擊敗流賊張獻忠凱旋時賊躡多羅貝勒尼堪兵後即同胡沙回擊敗之克什特從征多年所至擊斬敵哨甚衆嘗生擒六人以功授雲騎尉世職尋加騎都尉六年正月隨平西大將軍和碩英親王阿濟格征大同叛鎮薑瓖八月攻大同關廂中炮陳亡加恩賜一雲騎尉世職承襲詳見世職表彰吉泰彰吉泰蒙古正黃旗人姓恭努特氏世居扎魯特地方崇德二年三月以護軍校隨奉命大將軍恭順王孔有德征明攻皮島力戰歿於陳賞恤如例彰古彰古蒙古正黃旗人姓翁古特氏世居扎魯特地方任佐領崇德五年從大兵征明圍錦州松山兵來犯奪我紅衣炮彰古率本旗兵擊敗之旋奉命於城外挖濠環圍城中騎兵出犯濠塹彰古力戰陳亡恩賜雲騎尉世職承襲詳見世職表博朔岱博朔岱蒙古正黃旗人姓拜葉特氏世居察哈爾地方以功賜號綽綸巴圗魯崇德五年以三等侍衛隨大兵征明圍錦州至松山遇敵兵來拒博朔岱奮勇進擊遂歿於陳恩賜葬銀五百兩遣官致祭羅立羅立蒙古正黃旗人姓鄂爾沁氏初屬察哈爾林丹汗天聰八年大兵破林丹汗羅立乃擕户口一百人來歸特授一等輕車都尉世職崇德三年隨揚威大將軍多羅貝勒嶽託征明擊敗密雲縣兵六年隨大兵征明錦州掘濠圍城城中悉衆出戰我左翼兵擊之不勝退保濠塹羅立堅守汛地竭力拒戰歿於陳恩賜三等男爵承襲詳見封爵表阿布喇庫阿布喇庫蒙古正黃旗人姓巴林氏世居科爾沁地方初隨大兵征明攻松山時克敵有功崇德六年復隨大兵取錦州遇敵衆來拒阿布喇庫大聲呼噪直衝入斬執纛者奪纛而歸旋隨內大臣宜爾登擊明經略洪承疇援兵力戰歿於陳恩賜騎都尉世職承襲詳見世職表彰庫善彰庫善蒙古正黃旗人隨父納喀楚自科爾沁來歸任恭領兼管佐領事崇德六年從征明圍錦州再敗敵兵於松山明經略洪承疇率兵來援彰庫善力戰歿恩賜雲騎尉世職承襲詳見世職表阿布圖阿布圖蒙古正黃旗人姓求綽特氏世居西拉木倫地方順治二年以章京銜同副都統葉赫朱瑪喇等駐扎杭州率步兵敗偽大學士馬士英又同諾雲多禮等擊馬士英力戰歿於陳恩賜雲騎尉世職承襲詳見世職表圗渾圖渾蒙古正黃旗人姓巴林氏世居察哈爾地方任護軍校順治二年七月隨平南大將軍多羅順承郡王勒克德渾征湖廣流賊李自成三年二月於彛陵州擊賊陳亡恩賜雲騎尉世職承襲詳見世職表席達席達蒙古正黃旗人姓科爾沁氏任護軍校順治五年從大兵平定福建力戰歿於陳恩賜雲騎尉世職承襲詳見世職表武京武京蒙古正黃旗人天聰三年隨大兵征明至通州遇敵擊敗之又敗明經略盧象升兵六年同護軍統領席特庫征察哈爾至興安伊卡倫斬獲無算崇德六年復從大兵征明破錦州七年授佐領世職三遇恩詔加至二等輕車都尉厯官副都統順治九年隨將軍敬謹親王尼堪征湖南流寇張獻忠餘黨戰歿於陳恩賜一等輕車都尉世職承襲詳見世職表魏正魏正蒙古正黃旗人姓齊嶽噶穆克氏自科爾沁來歸天聰三年隨征明至通州敵兵來犯魏正率本旗兵擊敗之又破明經略盧象升營又隨大兵掠興安生擒哨卒斬獲甚多崇德六年隨攻錦州明經略洪承疇會兵來援立步卒三營魏正率本旗兵擊敗之授雲騎尉世職順治二年以太宗文皇帝眷顧舊臣加世職為騎都尉三遇恩詔加至二等輕車都尉任副都統十一年征湖南遇偽秦王孫可望馬步兵於岔路口拒敵力戰陳亡恩賜世職為一等輕車都尉承襲詳見世職表納穆桑額納穆桑額蒙古正黃旗人姓博爾濟吉特氏世居兀魯特地方二等伯明安之第五子也順治十七年以一等護衛隨安南將軍宗室羅託征福建海寇率本翼兵攻厦門力戰歿於陳從優議恤恩賜騎都尉兼一雲騎尉世職承襲詳見世職表波波圗波波圗蒙古正白旗人姓席魯特氏世居科爾沁天命初來歸授騎都尉天聰元年五月從多羅大貝勒代善等征明錦州力戰陳亡恩賜輕車都尉世職承襲詳見世職表博波圗博波圗蒙古正白旗人姓石魯特氏世居科爾沁國初來歸時恩授三等輕車都尉天聰八年隨攻錦州歿於陳順治初以子明安達理官恩贈光祿大夫都統二等子外三外三蒙古正白旗人順治十年以佐領從征雲南與偽侯李成蛟兵戰於涼水井敗之後從征廣西擊賊於懷集縣陳亡恩賜雲騎尉世職承襲詳見世職表蘇班達理蘇班達理蒙古正白旗人初任佐領從大兵入關破流賊兵二十萬後攻望都縣在事俱有功順治二年敘功詔授騎都尉兼一雲騎尉尋進二等輕車都尉卒子班第襲順治十一年班第從征浙江舟山偽英毅伯阮思率舟師三萬來犯同護軍統領尼雅達等力戰破之順治十四年復從征湖廣荆州江陵等處纍著勞績進一等輕車都尉兼一雲騎尉察哈爾布爾尼背叛列鳥鎗火炮以拒我師班第率衆破敵事平恩封三等男子滚布色塞冷襲卒無嗣乾隆十三年奉特旨入昭忠祠阿哈尼阿哈尼蒙古正白旗人姓富察氏世居葉赫地方以驍騎校駐防江寧順治十六年海賊鄭成功破鎮江犯江寧阿哈尼隨官兵擊賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表海色海色蒙古正紅旗人纍戰功授輕車都尉天聰八年隨太宗文皇帝征大同進攻興普摩衆薄城下先登戰歿賞恤如例海色海色蒙古正紅旗人姓扎魯特氏世居喀爾喀地方天聰八年由間散從大兵征大同攻王家莊城奮勇力戰歿於陳恩賜騎都尉世職承襲詳見世職表感濟泰感濟泰蒙古正紅旗人世居喀喇沁地方崇德二年率丁壯四十人來歸授騎都尉世職三年九月隨揚威大將軍多羅貝勒嶽託征明至邉境率雲梯兵攻墻子嶺城力戰陳亡賞恤如例拜渾岱拜渾岱蒙古正紅旗人姓烏朗漢濟爾敏氏世居喀喇沁地方初任佐領崇德六年五月從大兵圍錦州同副都統安達理擊明經略洪承疇援兵陳亡七年恩賜雲騎尉世職承襲詳見世職表恩克伊恩克伊蒙古正紅旗人姓巴林氏世居科爾沁地方任佐領崇德七年三月圍錦州時松山兵犯我紅衣炮同副都統安達禮擊敗之進攻塔山臺並有功順治元年隨和碩睿親王多爾衮入山海關流賊李自成率兵二十萬來犯恩克伊奮勇追擊遂歿於陳恩賜騎都尉世職承襲詳見世職表珠達色珠達色蒙古正紅旗人姓薩爾處特氏世居巴林地方順治三年五月以護軍校隨揚威大將軍和碩豫親王多鐸追蘇尼特部落騰機思至扎濟布喇克地方擊土謝圗汗被創陳亡恩賜雲騎尉世職承襲詳見世職表寡檔寡檔蒙古正紅旗人任護軍校順治三年隨大兵征山東遇土賊戰歿賞恤如例博啓博啓蒙古正紅旗人任護軍參領順治十一年從寧海大將軍都統宜爾德征偽魯王至浙江舟山擊偽英毅伯阮思總制陳六御等舟師於海上屢破之十四年敘功授雲騎尉十六年從安南將軍內大臣達素征福建海寇鄭成功十七年五月攻厦門陳亡恩賜騎都尉兼一雲騎尉世職承襲詳見世職表祖大權祖大權蒙古鑲白旗人天聰五年率其子副將澤逺來歸崇德八年十二月從征錦州戰歿於陳恩賜佐領世職承襲詳見旗分志薩門薩門蒙古鑲白旗人姓烏爾呼諾特氏世居喀喇沁地方順治元年由間散隨定國大將軍和碩豫親王多鐸南征二年六月隨多羅貝勒博洛至江南用雲梯攻江隂縣先衆登城歿於陳恩賜騎都尉加一雲騎尉世職承襲詳見世職表諾門達賴諾門達賴蒙古鑲白旗人姓烏爾哈濟爾默氏世居伊遜伊馬圗地方順治四年以前鋒參領從征湖廣偽王總兵楊總兵等率賊二千來犯隨委署前鋒統領吳沙擊敗之賊復率兵一萬來犯我營諾門達賴奮勇進戰被鳥鎗傷歿於陳十五年恩賜雲騎尉世職承襲詳見世職表綽諾綽諾蒙古鑲白旗人初從征山東用雲梯攻新昌被傷戰益力遂克其城以功授騎都尉賜號巴圗魯順治七年覃恩加雲騎尉世職九年纍加至二等輕車都尉十月傷發卒承襲詳見世職表特木爾特木爾蒙古鑲紅旗人姓科爾伯蘇氏世居土默特為察哈爾所屬天聰九年大兵征察哈爾林丹汗遁特木爾率衆來歸授參領世職崇德元年十二月從征朝鮮二年隨忠勳王揚古利於南漢山戰殁恩賜三等輕車都尉世職尼拉哈尼拉哈蒙古鑲紅旗人姓額爾忒特氏世居蒿齊忒地方以間散隨大兵征山東攻獲鹿縣首先登城破之授雲騎尉崇德四年隨都統馬拉希進山海關率馬步兵擊敗流賊兵二十萬敘功加一雲騎尉改為騎都尉順治三年三遇恩詔又加一雲騎尉改為二等輕車都尉尋卒因無嗣承襲於乾隆十三年奉旨入祀昭忠祠同阿爾同阿爾蒙古鑲紅旗人世居巴林地方以地為氏崇德三年以驍騎校隨多羅貝勒嶽託征明出邉時隨副都統席喇率護軍防守厯七晝夜敗敵者再六年五月大兵圍錦州擊敗明經略洪承疇三營步兵挖濠困之城內馬步兵出犯我左翼三旗護軍不能取勝奔入濠塹同阿爾守汛地不敢失同阿桑布奮勇抵戰遂歿於陳七年恩賜騎都尉世職承襲詳見世職表僧額僧額蒙