body:
  text: 欽定四庫全書欽定八旗通志卷三十六兵制志五恩䘏改定武職養亷受八旗養育兵退武職封廕亡議叙軍功臨陣傷優賞休官兵陣武職䘏典賞䘏陣亡官兵賞䘏兵丁朝謹按御兵之道必在紀律嚴明恩威並濟我列聖相承豐功偉業厚津深仁並著方䇿域蕩平金川厎定皇上御極以来西天戈所指衆志成城盖由軍政素嫻是以臨事無不踴躍赴功克敵致果用集鴻勲猶復湛恩廣被睿慮周詳如改定内外武職養亷給與緑營陣亡䘏廕諸大政皆所以䇿勵戎士軫念成勞又如勻𣲖養育兵額銀米及撥給鰥寡孤獨錢糧所以謀八旗生計者至優且渥兹專輯恩䘏一門仰見我皇上經武整軍體䘏優養無㣲不至所由人人感奮迅奏膚功昭赫濯於千古也謹臚列於左改定武職養亷一改定武職養亷舊制八旗武職親隨名糧領侍衛内大臣滿洲都統各給八名䝉古漢軍都統前鋒䕶軍統領六名民公滿洲副都統四名侯伯蒙古漢軍副都統三名内大臣子内務府三旗㕘領前鋒䕶軍驍騎各㕘領二名前鋒䕶軍驍騎各副𠫭領前鋒侍衛一名有半散秩大臣王府長史男内府三旗佐領八旗佐領一名每親随一名月餉銀三兩米二斛折銀一兩於領米時給發歩軍統領九名歩軍翼尉四名協尉三名副尉捕盗官二名歩軍尉一名均於額設歩軍内撥給緑營武職親丁名糧提督八十名總兵官六十名副將三十名𠫭将二十名逰擊十五名都司十名守偹八名千總五名把總四名各按營伍以馬歩守均勻配搭支食外委千把總加給歩糧一分乾隆八年諭國家體䘏臣工文武皆属一體文職則給養亷武職則給親丁名糧以資養贍自康熙四十二年部議由提鎮以及千總覈定數目之後復於雍正六年特奉皇考上諭令武職去任之後将名糧停扣不必募補即留與接任之人所以體䘏之者更為周至是以武職親丁雖年年造冊究係虚名開載實無其人名實不符衆所共知朕思既為武職養亷即應改為養亷名糧将親丁姓名裁去毋庸虚造冊籍其各省武職親丁名糧向来如何分别多寡今如何定例之處該部議奏即經遵㫖議准改為養亷名糧核實造報其外委千把總例給隨糧一分亦歸入養亷名糧項下一律造報十年特㫖賞給八旗大臣官員養亷嵗支銀八萬六千兩計領侍衛内大臣九百兩八旗滿洲都統七百兩前鋒䕶軍統領䝉古漢軍都統各六百兩歩軍統領滿洲副都統内務府總管各五百兩内大臣散秩大臣蒙古漢軍副都統兩翼翼尉内府三旗統領内務府奉宸上駟武偹院卿各四百兩健銳火噐營翼長圍場總管各二百兩圍場翼長一百兩其自八旗滿洲䝉古漢軍各𠫭領印務章京八旗䕶軍各𠫭領圓明園三旗各㕘領兩翼前鋒㕘領侍衛健鋭火噐營管總𠫭領八旗察哈爾總管等官毎年俱按大臣養亷支剰銀兩儘數分給四十六年奉上諭向来各省提鎮以下至将弁等俱有分扣兵丁名糧作為得項者此固舊例如此且武職衙門非如文員之定有養亷是以即将此項為公用養贍之資但此例定自何年或係雍正年間議定文職養亷時一體酌給其每員應得若干係何名目各省是否一例按照地方情形品級大小酌定數目多寡又或各省参差不同着交各該部将定例年月及現在欵項數目分晰查明開单具奏至此事因仍已乆恐又有於定數之外私自剋扣増添者若每員任内私扣一名後任積漸加增侵扣無所底止督撫姑息不加查察乆之即為虚額空糧之弊尤不可不徹底清查著即通諭各督撫将各省提鎮以下武職現在分扣名糧實數及有無私添之處查明㨿實具奏此事既乆朕概從寛不究若稍有隠匿或致别經查出惟該督撫是問將此通諭知之又奉上諭國家設兵衛民簡核軍實期於行伍整齊兵額充足如兵丁等紅白事件從前設有生息恵濟銀兩以資賞䘏後因生息名色有闗國體特勅停止昨據阿桂等奏陜甘添兵案内籌及賞䘏聲請酌復恵濟銀兩朕以國家賞兵之費藉商生息支給究属非宜已傳諭阿桂等令其動用正項開銷矣兹袁守侗海禄前赴行在令軍機大臣傳㫖詢問直𨽻雲南賞兵銀兩支銷欵項據稱直𨽻裁扣公糧銀二萬兩雲南裁扣公糧銀一萬六千餘兩以偹賞用等語看来各省大都如此兵丁紅白銀兩原係加恵行伍格外施恩若因此裁扣公糧致兵額不足殊非核實行伍之道况今户部帑項豐盈各省藩庫積存充裕即現在京營添兵四千九百餘名陜甘二省各營添兵一萬三千九百餘名其馬歩糧餉合之各省兵丁賞䘏紅白銀兩約筭嵗支不及百萬國家何靳此費不令開銷正帑各省乃紛紛裁扣名糧又且請復生息甚無謂也朕臨御四十六年以来惟事事以敬天勤民為念凡三次普免天下地丁錢糧兩次普蠲各省漕糧以及遇災即賑總計何啻萬萬又並未加増賦稅仰荷上蒼嘉祐開拓邉陲府藏殷實國用充饒朕又豈肯稍存靳惜致令有司開聚歛剋扣之端乎所有各省行伍賞䘏兵丁紅白銀兩自乾隆四十七年為始俱著於正項攴給造冊報部核銷至各省提鎮以下武職員弁俱有應得坐糧馬乾等項前於六月内業經降㫖通諭各省督撫将各該省武職所得公項逐一查明覆奏俟奏報到日令軍機大臣㑹同該部核辦照文員之例議給養亷其所扣兵餉即可挑補實額核計添給養亷嵗支亦不及二百萬兩官員既無拮据而各省又添増兵力於行伍大有禆益朕御極之初户部庫項不過三千萬兩今已増至七千餘萬復有何不足而不加恵天下散財以得民乎所有辦理添補兵額紅白賞䘏銀兩及名糧裁添養亷縁由明晰曉諭中外知之嗣據直省各将武職應得養亷名糧數目陸續具奏經户部酌核章程統歸畫一以垂永乆按各武職品級大小通同比較定額提督每員給養亷銀二千兩總兵一千五百兩副将八百兩𠫭将五百兩逰擊四百兩都司二百六十兩守偹二百兩千總一百二十兩把總九十兩經制外委千把總每員十八兩每年照文職養亷例於耗羡項下動支又以在京廵捕五營員弁管轄地方處分較重並非外省各營專事操防者可比所有歩軍統領向係部旗大臣兼理應得養亷名糧銀八百八十兩照舊支給外其副将核給養亷銀九百兩𠫭将六百兩逰擊五百兩都司三百兩守偹二百四十兩千總一百四十兩把總一百兩外委二十兩又以甘肅之烏嚕木齊等處雲南之騰越鎮龍陵協四川之崇化綏寧靖逺𢡟功撫邉五營或係新疆或作邉境亦與腹地情形逈異酌給甘肅省烏嚕木齊提督飬亷銀二千八百兩伊犂巴里坤總兵官各二千一百兩瑪納斯哈宻副将各一千二百兩其𠫭将各八百兩逰擊六百兩都司三百八十兩守偹三百二十兩千總一百八十兩把總一百二十兩外委二十八兩雲南騰越鎮總兵一千六百兩龍陵協副将九百兩其逰撃四百五十兩都司三百兩守偹二百六十兩千總一百四十兩把總一百兩外委二十二兩四川崇化等五營逰擊五百五十兩都司三百四十兩守偹二百六十兩千總一百六十兩把總一百二十兩外委二十八兩通計直省大小員弁原扣名糧銀一百三十六萬八千四百七十六兩改給養亷銀一百三十二萬五千七百十六兩仍節省銀四萬有零其雲南省之提督總兵福建省之臺灣鎮總兵舊有額外動支耗羡公件銀兩廣東水師各營舊有額外加増草乾銀兩一併刪除毋庸重給再各省緑營兵丁紅白賞䘏銀兩既遵奉恩㫖動支正項所有各省原動用之裁扣節省各欵應查明分别正閒欵項另行提解及存為武職養亷支銷之用等因具題奉㫖依議雲南提督總兵及福建臺灣總兵或地當烟瘴或逺隔重洋均與腹地不同著加恩於議給養亷外雲南提督加賞銀五百兩雲南總兵及福建臺灣總兵各加賞銀二百兩以示朕軫念巖疆加恵戎行之至意八旗養育兵雍正二年諭八旗滿洲䝉古漢軍均係累世効力舊人承平既乆滿洲户口滋盛餘丁繁多或有人丁多之佐領因䕶軍馬甲皆有定額其不得披甲之閒散滿洲以無錢糧至有窘廹不能養其妻子者朕每思及此惻然動念将如何施恩俾得生計之處再四籌度並無長䇿欲増編佐領恐正項米石不敷若不給以錢糧俾無養贍何以聊生既不能養其家口何由造就以成其才今将旗下滿洲蒙古漢軍内共選四千八百人為教養兵訓練藝業所挑人等只給三兩錢糧計四千八百人一年共需錢糧十七萬二千八百兩每一旗滿洲䝉古漢軍共六百名内䝉古旗下六十名漢軍旗下八十名其漢軍之八十名令為歩兵食二兩錢糧就此錢糧數内通融料理可多得四十名兵丁每一旗著挑取一百二十名再看軍噐内長鎗尤為有用著滿洲蒙古每佐領下挑取䕶軍四名馬甲四名令其學習長鎗漢軍每佐領下挑取馬甲四名令其學習籐牌挑刀此四千八百名教養兵若計佐領挑取恐其人有多寡不同應於旗下甲喇内計其人數挑取如此則䕶軍馬甲益得有用之人而閒散餘丁亦得學習成就矣至於如何編録教訓管轄之處八旗都統䕶軍統領副都統等公同定議具奏尋議教養兵每旗滿洲挑取四百六十名䝉古六十名漢軍八十名並通融錢糧所挑之四十名漢軍兵丁漢軍毎旗為一百二十名滿洲旗下佐領人數多寡不甚相懸所挑四百六十名教養兵應令各旗不論佐領在甲喇内挑取䝉古漢軍旗下佐領數目多寡不同論旗挑取恐有不均俱應不論旗分各計八旗總數按其佐領多寡均勻挑取其挑取時必擇其實係貧乏射箭好可以學習之另户餘丁挑取至於甲喇佐領内所有閒散滿洲多寡不等亦務令均勻從公挑取不可稍有瞻徇其管轄教訓等事應令八旗大臣各派㕘領三員副𠫭領三員閒散章京二員驍騎校十員令其管轄教訓擇教養兵内人去得射箭好能清語者每十人内委署一人為領催令其管轄此係教養之兵凡圍場及看守等處暫且不必令其行走毎五日一次習歩射十五日一次習馬射該管𠫭領至驍騎校等監看其都統副都統等亦輪班親徃視其馬歩射之優劣分别記名遇長鎗營之䕶軍馬甲缺出如教養兵内有馬歩箭好記名者令按甲喇挑取䕶軍按佐領挑取馬甲其䕶軍馬甲缺出将教養兵亦准挑取或教飬兵内有飲酒行止不端者該旗大臣即将伊革退另行挑取如該管官員不盡心教訓瞻狥情面容留騎射俱劣之兵丁經各該旗大臣等查出将該管官員一併治罪再武偹所闗甚要皇上特降諭㫖令滿洲蒙古每佐領各𣲖䕶軍四名馬甲四名學習長槍漢軍毎佐領各派馬甲四名學習藤牌挑刀實於武偹大有禆益應令該旗大臣等務将年少可以學習者挑取每翼委都統一員䕶軍統領一員副都統一員䕶軍營毎旗派䕶軍㕘領二員䕶軍校十四員驍騎營每旗按滿洲䝉古漢軍各派𠫭領一員每甲喇𣲖閒散章京二員驍騎校二員領催四名令其管轄其教習槍法由八旗廵捕三營官兵内挑取四十人毎旗各𣲖五人令其教習毎月給工食銀三兩其教習藤牌挑刀由廵捕三營及古北口之緑旗官兵内挑取四十人每旗各𣲖五人令其教習每月給工食銀三兩凡此學習人等應給限三年令其學習俟三年限滿考試擢其優者以為兵丁之長每二十人各置一長令其教習陸續挑取之人其教習八十人令回各本處遇有應舉之處得以列名再此長槍兵丁實係精兵應令每旗設立二纛每甲喇設立二旗令佐領内将現在喂養官馬毎人各給一匹拴養所用長槍旗纛交與該部製造其藤牌挑刀将庫内現存貯者取用如有不敷交該部行文廣東福建督撫等動用正項錢糧製造齎送其動用何項帑銀令其報部核銷奉㫖依議乾隆元年覆准嗣後選取教飬兵該都統於閒散餘丁内年壮可當差者照常選取外如旗内幼丁並無産業及無執事兵丁錢糧可以養贍者年過十嵗該㕘領佐領據實具保該都統覆核無異即行㧞補三年定滿洲䝉古各旗原設養育兵每二名出缺作為三名照漢軍例各給銀二兩滿洲蒙古八旗每佐領下増足養育兵十名漢軍八旗每佐領下増足六名共増養育兵一萬七百七十餘名是年又覆准八旗増設教養兵将鰥寡人等之子不論年嵗㧞補至獨身人等既無子嗣又年老不能當差實属可憫嗣後煢獨之人除犯重罪革退官職執事等差外如犯輕罪黜革之人未經當差無錢糧可支者亦給與教養兵錢糧以資養贍仍通行八旗都統於人多旗分照例選取十嵗以上之餘丁如並無倚靠實係艱苦雖未及嵗亦准㧞補人少旗分先儘十嵗以上之餘丁選取不敷再於十嵗以下之幼丁内選取四年覆准嗣後教養兵缺自有别載册籍及在軍前陣亡列一二等奉㫖作為正户别載冊籍人等並内務府奏准分給漢軍當差人之子弟内無錢糧者均照正户例准其選取六年議准教養兵缺或於夲𠫭領内選補或論旗分人數多寡計餘丁之年嵗選補辦理殊不畫一嗣後統於本𠫭領下選補其䝉古漢軍不論旗分各計八旗總數選取之例停止十八年議定八旗選往静宜園健銳營一千兵内滿洲每旗應選九十四名䝉古每旗三十一名即令該都統於現設教養兵内遴選撥徃所餘教養兵缺選取食一兩五錢之教養兵外嗣後養育兵每三名缺出作為四名再恩賞一名各改給銀一兩五錢於原設養育兵一萬五千一百二十四名外勻出缺五千四百四十名再恩賞缺五千四十四名共二萬五千二百十二名食錢糧四十五萬三千八百一十六兩二十九年諭由京𣲖徃移駐熱河之兵一千名其缺不另挑補但旗人所賴者惟官米若一年裁去米糧二萬二千餘石不惟旗人無以謀生京城米價必貴今将此項移駐兵丁應領米糧二萬二千餘石分賞八旗無米之養育兵其如何均分給賞之處著八旗大臣定議具奏嗣議准滿洲蒙古八旗養育兵共二萬三百十五名每名應給分米一石八斗八升按春秋二季支放三十二年定養育兵每年應領三色米兩季支放改為一色稄米春季領給三十六年因賞給八旗鰥寡孤獨錢糧将八旗滿洲䝉古漢軍各養育兵數按三兵一缺均勻經軍機大臣㑹同户部八旗都統核議定額八旗滿洲應得養育兵三千二百七十九缺八旗漢軍仍照原額養育兵四千八百十三缺圓明園各旗營酌給養育兵一千缺健銳營酌給五百缺火噐營酌給一千缺又以三營莭省之一千八百六十六缺賞給八旗滿洲俾特恩廣被實恵普霑交與各旗營一體遵照辦理又八旗滿洲䝉古應裁養育兵六千二百三十八缺除撥圓明園等三營及増廣八旗滿洲共三千五百九十三缺外仍應裁二千六百四十五缺嵗計省銀四萬七千六百十兩抵給各旗鰥寡孤獨賞銀仍増賞銀六萬四千六百九十餘兩以符每月賞鰥寡孤獨銀一兩五錢之數至八旗滿洲蒙古養育兵米因從前酌改鳥鎗䕶軍及移駐熱河馬甲案内共存米三萬八千三百八石八斗以分賞無米之養育兵除漢軍舊例毋庸分給外八旗滿洲䝉古及圓明園等三營共養育兵一萬八千四百四十三名每年按名改給米一石六斗武職封廕一武職封廕滿漢文武官階正一品建威将軍從一品振威将軍正二品威武将軍從二品武功将軍正三品武義都尉從三品武翼都尉正四品昭武都尉從四品宣武都尉正五品武徳騎尉從五品武徳佐騎尉正六品武畧騎尉從六品武畧佐騎尉正七品武信騎尉從七品武信佐騎尉正八品奮武校尉從八品奮武佐校尉正九品修武校尉從九品修武佐校尉其現任夲職及終養丁憂回籍人員恭遇覃恩得請封贈一品上及三代二品三品上及二代四品五品上及一代給以誥命六品七品給以勅命亦上及一代妻室封典均視文職如有請貤封贈者均論服制不准旁推八品以下祗給夲身勅命一軸有願貤封贈其父母者亦聴凡恩廕内外現任武職二品以上恭遇恩詔錫廕各送一子入監讀書三年期滿咨吏部授官其廕監生未仕而殁或病廢者准其補廕一補之後不准再補所送承襲之人必以適長子如無適長子或有而病廢及有别項職事則廕適長孫其次子次孫及期親兄弟子孫並承繼之子孫均按其倫序以次承襲該管官取具承廕之人年貌姓名文冊及親供印結送部查其所生在詔前者准為題請得㫖後給以執照若本官曾遇恩詔已送子入監後經陞任又遇恩詔欲改廕者未仕監生准其改廕至所廕監生於承襲之後别授他職及中科目者不准補廕其八旗廕生願改武職者照所應得品級随旗行走准予食俸盛京駐防及㳺牧察哈爾各官所得廕生情願来京者令其随旗行走願由夲處効力及緑旗廕生願改武職者並聽議叙軍功一議叙軍功有特㫖優叙者由部覆議奏請随時酌定其由統兵将帥列序官兵功績等次造冊送部者部核其實分為五等八旗官兵給以印軸曰功牌應授爵者移咨吏部甄别授之自雲騎始按功遞加未至授爵者由部註册仍令圖功准其積筭功牌之式以紫綾為面用潔白厚紙裱襯一層四邉墨印螭文内註明功次凡填功績及年月處鈐用部印編次號數覈對給發一等功牌長二尺八寸二等功牌長二尺四寸三等功牌長二尺二寸四等功牌長二尺五等功牌長一尺八寸内各廣尺有五寸五分從征有功者文職視武職王公所属䕶衛親軍視官兵委署官視見任各以所得軍功等第予叙緑旗官兵軍功議叙者曰功加其出衆人員准功加一等紀録五次立一等功者准功加一等紀録二次二等加一級紀録一次三等紀録三次四等紀録二次五等紀録一次立功多者積筭授以世爵文職軍功應功加一等者准加一級叙功不實者