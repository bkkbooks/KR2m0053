六品官以上遞減銀五十兩恩騎尉七品八品官二百二十兩前鋒䕶軍親軍領催及執纛人二百兩驍騎百五十兩其委署官及世爵小或無世爵者各照夲職應得䘏典礮手百三十兩各部未披甲通事滿洲䝉古隨役百兩漢隨役七十兩緑營官兵提督賞銀八百兩次總兵官次副将次㕘将次逰擊各逓減百兩都司三百五十兩次守􅊀次守禦所千總次衛千總次營千總次把總各逓減五十兩外委官視把總馬兵七十兩歩兵五十兩土兵減歩兵一半又出征病故文武各官一二品提鎮以上遺本到部應否䘏賞候㫖遵行其副将以下及三四品官賞銀五十兩五六品官四十兩七品以下三十兩八旗兵逺方出征除陣亡外有不服水土病故者賞銀二十兩乾隆三年上諭雍正十年凖噶爾逆賊来侵時傅爾丹領兵於烏遜珠爾地方失機故此次人員不准録功陣亡士卒止賞給身價未交議叙此次士卒未能敗賊以致失機者罪在将軍大臣於所属官兵無渉且此次駐防官兵三百餘人奮勇力戰陣亡者二百五十餘名其存者僅五十名俱被重傷而回假使失機士卒俱似此捐軀力戰彼時即得立功均未可定在烏遜珠爾地方失機士卒固例不應録功然力戦陣亡之人亦不得仰邀議敘情殊可憫著交該部将此次陣亡之人照和屯胡爾哈例議敘其未得䘏典著補行給與五十八年上諭向例出征陣亡兵丁緑營歩兵賞䘏銀五十兩屯練降番祗賞䘏銀二十五兩此次進剿廓爾喀屯練降番登山陟險甚為勞苦所有陣亡之屯練降番俱著加恩改照緑營歩兵之例賞䘏銀五十兩以示體䘏兵丁舍命陣亡豈可分别厚薄此後永以為例著恵齡曉諭伊等賞䘏兵丁乾隆三年上諭朕即位以来為旗人生計多方籌畫凡有禆益之事無不舉行因屢有條奏以為支借庫銀有益者是以将餉銀借支一年續又借支半年乃見兵丁等借銀之初未甞無補而物價一時騰貴所領之銀隨手花費並不能置立産業而每月扣除額餉於生計轉為無益非養贍旗人之善䇿今特加恩著将扣除未完之餉銀悉行豁免停止再借至於伊等生計如何有益之處朕另為籌計從容辦理四年九月上諭從前欲於八旗官兵生計有益曽借給俸餉乃旗人得銀隨手用盡並未置有産業兵丁應得錢糧按月坐扣與伊等生計無益是以前已降㫖免其扣還将官員應還俸銀寛展限期以減其坐扣之數官員俸銀雖非兵丁錢糧可比然旗員此際又經指俸借别項銀兩有種種應還之處於伊等生計無益官員未經扣完銀兩亦著豁免户部可奏請動别項存貯銀兩補還原項又上諭寧夏供支滿兵糧草向係毎年採買散給共計白米一千五百餘石粟米七千餘石草一十三萬餘束其所定部價白米粟米每石價銀一兩草一束價銀一分今聞該地方自上年被灾之後新寳二縣田地被水淹浸不能耕種已少産米糧數十萬石目下糧草之價日覺昻貴所定官價不敷採辦勢必貽累小民著将乾隆五年應支滿兵糧草白米毎石加銀一兩粟米毎石加銀五錢每草一束加銀一分如此則價值増添官民易於辦理但係格外之恩後不為例該部可即行文該督撫知之又上諭從前定議西路派換哈宻等處防兵官員借給一年俸銀馬兵借給銀六兩歩兵借給銀四兩其􅊀戰兵遇有調遣官員借給二年俸銀馬兵借給銀十兩歩兵借給銀六兩俱於回營之日在俸餉内分年扣還朕念官兵人等逺役勞苦回營之日復将俸餉坐扣其差操防汛以及養贍家口等費未免艱難著将所借銀兩俱行賞給免其回營坐扣嗣後如有派撥即照所借銀兩之數賞給以昭朕優恤戎行之至意五年上諭内廷侍衛等守衛扈從差務甚繁因欲伊等當差寛裕䝉世宗憲皇帝特恩每旗賞給馬錢一百分朕即位以来部員則加増俸禄旗員則賞給養亷銀兩隨甲錢糧至於侍衛等差務繁多若生計維艱則難於當差特為施恩侍衛等著一概給與馬錢又上諭八旗官兵内有曽在軍前効力年老者朕心深為軫念今特施恩分别賞賚俾伊等得以從容過年無論現在當差與已經退差者官員内八十嵗以上者賞給銀一百兩七十嵗以上者賞給銀八十兩六十嵗以上者賞給銀六十兩兵丁内八十嵗以上者賞給銀四十兩七十嵗以上者賞給銀三十兩六十嵗以上者賞給銀二十兩該部該旗即遵㫖辦理六年上諭荆州滿洲城内官兵住房被火焚燬甚多朕深憫惻著照京師旗人房屋被火焚燬之例一體加恩即就近動荆南道庫内銀兩賞給該部即遵奉朕㫖速行文将軍滚泰等餘著察議具奏又上諭聞八旗兵丁在部具呈買置官地及到該地方領地之時往往移甲換乙将瘠薄更易膏腴非復原指之産業而歸旗之限又廹不得不回京師及向部中具呈部中據呈行查該地方官又復支吾塞責不能為之清理大失公平之義著該部定議作何稽查以清弊竇七年上諭湖北各標鎮協營於雍正九年派調馬兵一千名赴陕出口駐劄凉州随帯馬一千匹所有曽經支領乾糧以部例折筭該扣還一千三百一十三兩此項雖不在豁免之列朕念各兵効力邉陲勞苦可憫且事閱多年其中事故更換者不少夲兵家属既不可以著追而現在之兵丁所領糧餉又僅敷每日之食用難以扣抵從前之前項朕心軫恤著将長支豆草價銀一千三百一十三兩悉予蠲免俾戎行得沾恩澤該部可即行文該督撫知之又上諭八旗漢軍自從龍定鼎以来國家休養生息户口日繁其出仕當差者原有俸祿錢糧足資養贍苐閒散人多生計未免窘廹又因限於成例外任人員既不能置産另居而閒散之人外省即親友可依及手藝工作可以别出營生者皆為定例所拘不得前往以致袖手坐食困守一隅深堪軫念朕思漢軍其初夲係漢人有從龍入闗者有定鼎後投誠入旗者亦有縁罪入旗與夫三藩户下歸入者内務府王公包衣撥出者以及招募之炮手過繼之異姓并隨母因親等類先後歸旗情節不一其中惟從龍人員子孫皆係舊有功勲歴世既乆自無庸另議更張其餘各項人員等或有廬墓産業在本籍者或有族黨姻属在他省者朕意欲稍為變通以廣其謀生之路如有願改歸原籍者准其與該處民人一例編入保甲有不願改入原籍而外省可以居住者不拘道里逺近准其前往入籍居住此内如有世職仍許其帯往一體承襲其有原籍並無倚賴外省亦難寄居不願出旗仍就當差者聴之所有願改歸民籍與願移居外省者無論京外官兵閒散俱限一年内具呈夲管官查奏如此屏當原為漢軍人等生齒日多籌畫乆逺安全計出自特恩後不為例此朕格外施仁原情體恤之意並非逐伊等使之出旗為民亦非為國家糧餉有所不給可令八旗都統等詳悉曉諭仍詢問伊等有無情願之處具摺奏聞九年上諭今天津等處添𣲖駐防並𣲖往拉林阿爾楚哈地方種地兵丁之缺應照原議将八旗養育兵銷除二千三百四名但養育兵缺特為養贍並無産業孤寡人等而設若僅所出之缺全行銷除則於旗人生計無益著交與八旗俟駐防兵丁起程後将每月所出養育兵缺暫行減半銷除其餘一半著照常養贍孤寡人等展限三年陸續銷除又上諭聞得奉天兵丁生計稍覺艱難著施恩准借両月錢糧即於彼處預􅊀銀兩内動支至明年寛展限期緩為坐扣此動支原項後該部照數領取補還十一年上諭據将軍達爾當阿奏稱遵㫖查免廣寧義州遼陽等處旗人被水地畆應納糧草其牛莊盖州復州岫巖鳳凰城等處亦有似廣寕等處被水地𤱔等語牛莊等属被水處所著達爾當阿等亦查明遵照從前所降諭㫖辦理蠲免又上諭保定府駐防兵内入操者各賞給一月錢糧其未入操官兵内年七十八十以上者著總督那蘇圗查明分别賞賚又上諭據将軍傅森奏稱今年五月間黑龍江地方山水漲發河水漫溢附近居住旗人屯丁俱被水災諸榖未及成熟七月内復被霜傷損請自今年九月起至明年七月止借給伊等口糧籽種豆榖三千八百餘石以資接濟等語今年黑龍江被災稍重地方現今辦給米石若仍令交還則伊等力不能支著将前項米石加恩免其交還即行賞給該部知道十二年上諭今嵗直𨽻偏災順天府属之霸州文安大城武清天津府属之天津静海為較重被災人民業已降㫖加恩賑恤其兵丁例不領賑朕念伊等身列戎行有差遣廵查之役地方既遇歉収食用未免拮据著加恩将霸州等處駐劄各營兵丁於司庫建曠銀内借給一季餉銀自戊辰年夏季起分作四季扣還以資目前用度該部即遵諭行十三年上諭目今京師米價漸昻且多閏月兵丁支放甲米雖據部議展早於七月下旬但為期尚早著照乾隆八年之例将京倉官米給發各旗併五城米局減價出糶以平市價至開倉之日為止該部遵諭速行十六年上諭朕清蹕南廵行慶施恵所有駐防旗人亦應一體加恩著各督撫将軍等将江寕京口浙江等處駐防滿洲漢軍官兵年七十八十以上者查明分别賞賚又上諭乍浦水師滿兵自雍正七年設立於杭州江寧二處餘丁内挑選移駐原定加増每月支餉銀二兩米一石伊等水陸操防差務繁多而移駐将及二十年家口漸増所領銀米不敷食用朕命駕省方清問所周無不廣敷渥澤自應一體加恩所有乍浦駐防水師新兵每月米石著照杭州駐防之例給與二石五斗其應支夲折色之處令該将軍督撫副都統酌量照例辦理十八年上諭朕於旗人生計詳細籌筭節次施恩将䕶軍領催馬甲養育兵缺陸續増添並支借庫銀以資困乏但八旗生齒日繁用度不無拮据著加恩八旗増添馬甲一千名此次増添馬甲如令在城内居住仍須租房未免耗費将此項馬甲歸併健銳營即於夲營官房後續建官房安置居住此次建盖官房著𣲖内大臣蘇和訥沃和侍郎徳爾敏監修再八旗養育兵原非令其當差而設特為養贍伊等家口但旗人生齒日衆竟有不得錢糧者養育兵並無差使而每月各食銀二兩自應籌畫辦理譬如十人内現有六人得食養育兵餉若從伊等每月所得二兩錢糧内各裁去五錢是從六人錢糧内勻出二分即可養贍八人若再加恩賞添二名則十人皆得邀恩今養贍伊等尚不致艱窘即不得錢糧之家亦得一體均得食餉矣其現食二兩錢糧之人並非一時即全行裁去五錢八旗應如何酌勻缺分陸續挑補之處著軍機大臣㑹同八旗都統議奏二十一年上諭據署黑龍江将軍綽勒多奏稱齊齊哈爾黒龍江墨爾根呼蘭等處之八旗水師驛站官莊人等節年未完米石并本年支借口粮共十五萬五千餘石請分年完繳等語齊齊哈爾等處近年連遇偏災米榖歉収兵丁既多拮据又從役軍營甚属効力朕心深為憫惻所有齊齊哈爾黒龍江墨爾根呼蘭等處厯年未完借欠米石并本年支借口糧十五萬五千餘石俱著加恩免其完繳以示格外恩恤該部即遵諭行又上諭近年朕為滿洲生計委曲籌畫除八旗定額之前鋒䕶軍馬甲外又特㫖増添領催養育兵額缺近看伊等生計雖較前稍裕但念京城滿洲生齒日繁且錢糧各有定數惟賴一身錢粮養贍許多人口甚属艱難拉林現有開墾田地盖造房屋着選八旗滿洲遣往拉林種地居住此皆朕撥遣滿洲世僕住居舊所令其生計饒裕之至意非因不肖發往拉林者可比即如此次撥遣滿洲自京城起身前按户賞給修裝銀兩途又辦給車輛草束等項到彼處又賞給置産業銀兩分給官房並開墾地畝牛具籽種等項每户計費銀百餘兩所有遣往三千滿洲至用銀數萬餘兩此費朕不稍惜者特欲伊等安享生理曲為體恤伊等到彼各宜仰戴朕恩節用勤農閒暇之際演習馬歩技藝果演習精純彼處馬甲拜唐阿之缺亦可得補不為無出身之地将此着交該将軍副都統等通行諭令𣲖往之滿洲人等知之但此項𣲖往之人甚衆賢否不一倘有不肖匪徒妄生事端或不願在彼居住私自逃回京城者該将軍等拿獲時奏聞即行在彼正法懲衆㫁不可姑容将此亦傳諭八旗知之二十二年上諭因八旗滿洲旗分生齒繁多遣往拉林阿勒楚喀地方耕種屯田又因𣲖往各處駐防令滿洲旗僕挑取錢糧已覺容易其蒙古旗分因開檔另記檔案人多皆令出旗而䝉古旗僕所得錢糧亦覺紓裕但人數多寡不同殊未平允即如上三旗人丁衆多年長成丁者皆不得錢糧其下五旗人丁較少至年少幼童皆得挑取披甲八旗理應各按本旗辦理但皆係朕之世僕若如此不均非所以副朕恵愛旗僕之意其人少旗分之缺應如何通融於人多旗分内挑取行走俟人少旗分生齒足額時再行歸復夲旗挑取之處著軍機大臣八旗都統等查明核擬議奏其八旗䝉古旗分若有似此多寡情節亦著照此辦理今人數多寡既皆通融均勻辦理從前議以出旗謄缺之人應如何作速謄缺之處亦著一併議奏二十三年上諭前經定議令将五旗另籍檔案人等分發直𨽻河南山東陜西四省充補緑營兵丁今聞伊等因在京當差日乆不能在緑營當差情願為民者甚多伊等俱係在旗食糧多年歸入緑營原欲使伊等得食錢糧以資生計之意耳若伊等恐不能在緑營當差情願為民亦属可行但念伊等俱係食糧日乆一旦為民並無錢糧恐伊等未免有失生計現在福州廣州尚有應行𣲖往駐防滿洲兵丁此二處駐防著停𣲖滿洲兵丁即𣲖此項人等前往駐防若伊等仍有重遷不願前往者即聴其為民又上諭凡遇朕廵幸隨往兵丁所得帮銀均於八旗滿洲蒙古漢軍兵丁所借庫銀内坐扣帮給此項坐扣銀兩為數雖不甚多以不随差之人而帮助隨差之人雖係由来之例伊等應出之項但兵丁等生計全賴錢糧将所帮之銀由所借庫銀内坐扣伊等得項究竟較少著加恩嗣後兵丁等所得帮銀著免其於兵丁銀内坐扣均動官項賞給現在還補未完銀十四萬五千餘兩亦著加恩寛免朕加恩寛免兵丁坐扣錢糧特為伊等生計有益令其勤習技藝之意該都統等均有教養兵丁之責朕此施恩之處伊等知之嗣後但當善為督率兵丁毋得浮費以整滿洲純樸之習演習技藝以務生計将此通諭旗下兵丁等知之又上諭甘省因年来辦理軍需兵民輻輳米糧市價未免稍昻所有各營兵丁應支折色若仍照舊支給兵丁不免拮据著将該省滿營官兵除六個月照舊折支外其六個月如有改支折色者每石加賞銀一兩其甘凉寕西肅五提鎮所属并蘭州撫標城守固原提標各官兵除八個月照舊折支外其四個月有改支折色以及六個月夲色馬料改支折色者每石俱加賞銀一兩安西口外每石加賞銀一兩五錢至陕省延綏鎮属地方偶被災歉著将明嵗應闗折色亦照甘省甘凉各鎮之例一體每石加賞銀一兩再甘省應納草束業已降㫖豁免其滿漢各營折支草價恐不敷採買著将口外安西提属每束加銀一分五釐口内寕夏凉莊滿營及甘凉寕西肅延綏六提鎮属蘭州撫標城守固原提標每束各加銀一分以示體恤兵弁之意該部即遵諭行二十四年上諭據定長等奏稱現在皮䩞存貯衣履等項通融分給由哈察運送駝赴托克遜哈爾沙爾庫平之西安凉莊等處滿洲緑營兵丁外其不敷者支取布疋製􅊀給發所用銀兩在於各兵錢糧内照數扣還等語此項兵丁俱係輓運軍需往返行走甚属勞苦著加恩将所有分給衣履等項動用銀兩不必将伊等錢糧扣還即行賞給以示優䘏二十七年上諭八旗兵丁甲米閏月例不支放但京師自夏至以来雨水稍多道路泥濘糧食車輛或有阻滯買食未免拮据著加恩賞給一個月甲米即行給放俾兵丁饔飱優裕市價益平於閭閻生計亦有禆益該部遵諭速行三十四年上諭據巴爾品等奏稱夲年雅爾地方種地緑營舊班兵丁每人交納細糧二十五石有零新班兵丁每人交納細糧十八石七斗有零共收麫米折色糧二萬二百五十石八斗零與阿桂奏請議叙之例相符請将𠫭将劉簡與屯田官員等一體交部議叙兵丁等各賞給一月鹽菜銀兩等語著照巴爾品所請官員等交部議叙兵丁各賞給一月鹽菜銀兩三十五年上諭據舒赫徳等奏夲年烏什屯田五百兵丁所種地畝每人各收穫米十九石有餘等語屯田兵丁一年所種地畝每人收穫細糧至得十九石實属善為耕作著加恩将管理屯田之官員等交部議叙兵丁等著各賞給一月鹽菜銀兩三十七年上諭朕駐蹕熱河所有八旗在此引見人員内補放歩軍校之擬陪䕶軍校驍騎校等官皆係食餉微末之員自京来此往還多費而擬陪者又不獲陞用其力不無拮据著加恩将此次来此補放歩軍校擬陪之䕶軍校驍騎校等官亦照外省補放驍騎校之例将擬陪人員記名遇有歩軍校缺出即行補授毋庸再送引見嗣後遇朕在此駐蹕由京送放歩軍校之擬陪人員即以此為例三十九年上諭據正白旗滿洲都統等奏由親軍䕶軍領催馬甲捐納監生人等所有夲身錢糧請照舊支給令其當差其由養育兵捐納監生人等請令出缺等語自應如此辦理馬甲養育兵原為養贍貧苦旗人而設現令捐納人等出缺另挑不過欲為多養旗人之地伊等既有報捐豈有仍仗馬甲養育兵錢糧度日之理所有八旗捐納監生之馬甲養育兵該都統等從前因何挑補顯係贍徇八旗都統等内有兼御前乾清門併尚書侍郎上行走者承辦事務較多或一時未能詳察其專管旗務之都統副都統所司何事即此見伊等不能實心任事著将伊等嚴行申飾又上諭新疆一帯修建工程均係撥兵丁砍伐木植築打土方支給該處兵丁耕種所收米麫青稞等項較之採買物料僱覔匠夫者夲属減省今烏魯木齊新建滿城兵房工程既較内地應用銀數有減無浮又何必復照内地之例核筭所有用過銀兩即著照數准銷毋庸再行交部查核嗣後新疆等處工程𣲖撥兵丁及砍伐木植修建者俱不必照依内地定例核銷四十五年上諭今夏雨水較多京城房屋間有坍損八旗兵丁生計不無拮据著加恩普賞給一月錢糧以示優賚該部知道又上諭朕從前有㫖将直𨽻旗租銀仍賞給八旗兵丁經部議挑選八旗兵丁中差使勤慎者賞給兩月錢糧以示鼓勵今思一人得兩月錢糧亦不能立家産不過隨手花費而不得賞者未免向隅且分别挑選該管官員不無瞻徇出入之弊殊非朕普恵八旗兵丁之意此後著将直督觧到銀兩足敷普行賞給八旗兵丁一月錢糧時該部即奏聞普賞一次四十八年上諭前經降㫖直𨽻觧到旗租銀兩足敷普賞八旗兵丁一月錢糧即行普賞一次現在直𨽻觧到租銀已足敷賞給之用著加恩普賞八旗兵丁一月錢糧以示朕加恵旗人用溥春祺之意該部即遵諭行五十二年上諭前經降㫖直𨽻觧到旗租銀兩足敷賞八旗兵丁一月錢糧即行普賞一次現在直𨽻觧到租銀已足敷賞賚之用著加恩普賞八旗兵丁一月錢糧俾八旗兵丁生計益臻充裕以示春祺錫慶有加無已至意該部即遵諭行五十六年上諭前經降㫖直𨽻觧到旗租銀兩足敷普賞八旗兵丁一月錢糧即行普賞一次現在直𨽻觧到租銀雖不足敷賞賚之用但念該兵丁等寒冬嵗暮生計維艱著於節年積存旗租項下撥補足數加恩普賞八旗兵丁一月錢糧俾生計益臻充裕以示敷錫春祺有加無已至意該部即遵諭行五十七年上諭梁肯堂奏山海闗駐防兵丁五十八年應需兵米一萬七千七百餘石請勅下奉天府尹仍照舊在寕逺州錦縣協撥一萬石交山海闗通判領囘供支其餘米石於征収屯米動放外仍令永平府属州縣領價採買支放等語夲年直𨽻地方被旱較廣此項兵米若令全數就近採買未免辦理稍難著照該督等所請即著奉天府尹於寧逺州錦縣協撥一萬石其餘米石仍著梁肯堂照舊辦理據實報銷該部即遵諭行摺并發五十八年上諭前經降㫖直𨽻觧到旗租銀兩足敷普賞八旗兵丁一月錢糧即行普賞一次現在直𨽻觧到租銀雖不足敷賞賚之用但念該兵丁等寒冬嵗暮生計維艱著於莭年積存旗租項下撥補足數加恩普賞八旗兵丁一月錢糧俾生計益臻充裕以示敷錫春祺有加無已至意該部即遵諭行欽定八旗通志卷三十六
