  text: 人物志一百四十列女傳二十八旗蒙古列女傳三正黃旗蒙古護軍三達色之妻關氏正黃旗蒙古護軍巴什一之妻和氏正紅旗蒙古馬甲二墜之妻李氏正紅旗蒙古親軍吾達里之妻白氏正紅旗蒙古護軍布達之妻王氏正紅旗蒙古間散喇嘛小之妻卓特氏正紅旗蒙古鳥鎗護軍色楞之妻把嶽忒氏以上俱於乾隆十六年旌表鑲黃旗蒙古護軍德保住之妻劉氏鑲黃旗蒙古護軍達色之妻李氏鑲黃旗蒙古護軍色爾忒之妻王氏鑲黃旗蒙古護軍巴哈那之妻張氏鑲黃旗蒙古護軍巴克塘阿之妻厄勒特氏鑲黃旗蒙古前鋒鎖諾木扎布之妻錫氏鑲黃旗蒙古馬甲鎖住之妻陳氏正黃旗蒙古馬甲巴銀達里之妻舒穆祿氏正黃旗蒙古馬甲傅生阿之妻瓊佳氏正黃旗蒙古間散朋蘇之妻新氏正黃旗蒙古護軍劉保住之妻張氏正黃旗蒙古護軍班泰之妻孫氏正黃旗蒙古護軍克爾登之妻胡氏正黃旗蒙古護軍四黑之妻邉氏正白旗蒙古護軍扎瑪素之妻巴里特氏正白旗蒙古護軍窩木布之妻韓氏正白旗蒙古護軍五巴里之妻何氏正白旗蒙古護軍三達色之妻薩米忒氏正白旗蒙古馬甲長保之妻伊拉理氏正白旗蒙古馬甲百林之妻汪吉氏正紅旗蒙古馬甲博爾屯之妻烏色氏正紅旗蒙古馬甲八達色之妻徐佳氏正紅旗蒙古馬甲倭什訥之妻吳佳氏正紅旗蒙古前鋒常英之妻伊氏正紅旗蒙古親軍富永阿之妻景氏正紅旗蒙古護軍吉爾嘎郎之妻張氏鑲白旗蒙古馬甲官保之妻張氏鑲紅旗蒙古親軍白衣保之妻覺羅氏鑲紅旗蒙古護軍綱噶拉之妻周氏鑲紅旗蒙古護軍福夀之妻趙氏鑲紅旗蒙古護軍玉住之妻白氏正藍旗蒙古間散巴爾虎德之妻吉嶽樂氏正藍旗蒙古護軍七達色之妻魯布特氏正藍旗蒙古護軍校五十九之妻孫氏以上俱於乾隆十七年旌表鑲黃旗蒙古護軍三格之妻王氏鑲黃旗蒙古鳥鎗護軍二達色之妻劉氏鑲黃旗蒙古筆帖式坎什之妻王氏鑲黃旗蒙古鳥鎗護軍多爾吉之妻孫氏鑲黃旗蒙古護軍四十六之妻張氏鑲黃旗蒙古護軍六十爾之妻什爾德忒氏鑲黃旗蒙古護軍色爾固楞之妻王氏鑲黃旗蒙古護軍福保之妻馮氏正黃旗蒙古馬甲五爾金扎布之妻白氏正黃旗蒙古護軍伊常阿之妻張氏正黃旗蒙古間散黑逹色之妻莽努特氏正黃旗蒙古藍翎侍衛西拉補綽克圖之妻白氏正黃旗蒙古馬甲西盛保之妻孫氏正黃旗蒙古護軍三逹色之妻王氏正白旗蒙古護軍五十一之妻王氏正紅旗蒙古馬甲集爾塔哈之妻烏爾喀達氏正紅旗蒙古鳥鎗護軍沙色之妻圖氏正紅旗蒙古護軍九格之妻審氏正紅旗蒙古前鋒額森特之妻成氏正紅旗蒙古護軍扎木蘇之妻石氏鑲白旗蒙古馬甲桑格之妻鮑氏鑲白旗蒙古馬甲黑達色之妻張氏鑲白旗蒙古馬甲步庫之妻吳氏鑲白旗蒙古護軍二保之妻盧氏鑲白旗蒙古護軍阿使之妻卜氏鑲白旗蒙古鎗手嶽起之妻劉氏鑲白旗蒙古馬甲武雅嚕之妻西特黑爾氏鑲紅旗蒙古前鋒巴燕太之妻王氏鑲紅旗蒙古護軍伊靈阿之妻李氏鑲紅旗蒙古護軍留住之妻巴魯特氏鑲紅旗蒙古護軍七克慎之妻張氏鑲紅旗蒙古護軍額爾特之妻年氏鑲紅旗蒙古護軍三雅圖之妻田氏鑲紅旗蒙古領催那燕太之妻關氏鑲紅旗蒙古馬甲鄂倫太之妻郎氏鑲紅旗蒙古馬甲百夀之妻李氏鑲紅旗蒙古間散韓扎達之妻徐氏鑲紅旗蒙古牧丁伊察之妻扎斯呼哩氏正藍旗蒙古馬甲西稜特之妻瓜勒佳氏鑲藍旗蒙古間散沖古之妻卓羅氏鑲藍旗蒙古間散伊囒塔之妻巴雅拉氏鑲藍旗蒙古護軍趙格之妻常氏以上俱於乾隆十八年旌表鑲黃旗蒙古鳥鎗護軍八十爾之妻李氏鑲黃旗蒙古鳥鎗護軍策布坦之妻李氏鑲黃旗蒙古拉嗎學生催達拉之妻王氏鑲黃旗蒙古鳥鎗護軍五通保之妻梁氏鑲黃旗蒙古官學生富成之妻富氏鑲黃旗蒙古馬甲克蒙厄之妻張氏鑲黃旗蒙古郎中嗎呢之妻富氏鑲黃旗蒙古護軍德福之妻吳氏鑲黃旗蒙古護軍松保之妻江氏鑲黃旗蒙古馬甲謨霍囉之妻西特赫爾氏正黃旗蒙古護軍伍爾圖之妻莽弩特氏正黃旗蒙古護軍巴麟之妻赫氏正黃旗蒙古護軍白達色之妻白氏正黃旗蒙古領催額起爾之妻李氏正黃旗蒙古馬甲常住兒之妻白氏正白旗蒙古護軍達賴之妻李氏正白旗蒙古護軍索柱之妻果氏正白旗蒙古護軍海福之妻張氏正白旗蒙古護軍胡必圖之妻髙氏正白旗蒙古護軍校佛保之妻張氏正白旗蒙古馬甲三格之妻把嶽忒氏正白旗蒙古前鋒索多樂之妻特勒勒氏正白旗蒙古驍騎校阿玉璽之妻顔珠氏正白旗蒙古馬甲扎什之妻陳氏正紅旗蒙古前鋒發林泰之妻莫爾德禮氏正紅旗蒙古馬甲豁隆額之妻吕佳氏正紅旗蒙古護軍京阿納之妻趙氏正紅旗蒙古護軍二達子之妻卜氏鑲白旗蒙古護軍三保之繼妻把嶽忒氏鑲紅旗蒙古馬甲布齊訥之妻寧古塔氏鑲紅旗蒙古護軍法貴之妻喀爾親氏鑲紅旗蒙古護軍永貴之妻陽氏正藍旗蒙古馬甲六十一之妻劉氏正藍旗蒙古護軍廣周之妻王氏正藍旗蒙古馬甲阿爾薩之妻伊爾庫勒氏鑲藍旗蒙古馬甲五達色之妻依勒氏鑲藍旗蒙古馬甲五十六之妻謝氏以上俱於乾隆十九年旌表鑲黃旗蒙古馬甲趕生之妻趙氏鑲黃旗蒙古護軍七十五之妻博爾蘇特氏鑲黃旗蒙古馬甲玉保之妻金氏鑲黃旗蒙古馬甲扎木蘇之妻玉氏鑲黃旗蒙古馬甲烏林泰之妻胡氏正黃旗蒙古護軍和盛額之妻劉氏正白旗蒙古間散阿哈里之妻邁氏正白旗蒙古護軍僧保之妻永氏正白旗蒙古護軍佛保柱之妻方氏正白旗蒙古護軍雙全之妻張氏正白旗蒙古馬甲特苦德之妻江氏正白旗蒙古護軍保住之妻受氏正白旗蒙古馬甲多爾吉之妻王氏正紅旗蒙古護軍