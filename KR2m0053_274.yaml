body:
  text: 人物志一百四十列女傳二十八旗蒙古列女傳三正黄旗䝉古䕶軍三達色之妻關氏正黄旗䝉古䕶軍巴什一之妻和氏正紅旗蒙古馬甲二墜之妻李氏正紅旗䝉古親軍吾達里之妻白氏正紅旗䝉古䕶軍布達之妻王氏正紅旗蒙古閑散喇嘛小之妻卓特氏正紅旗蒙古鳥鎗䕶軍色楞之妻把岳忒氏以上俱於乾隆十六年旌表鑲黄旗䝉古䕶軍徳保住之妻劉氏鑲黄旗䝉古䕶軍達色之妻李氏鑲黄旗蒙古䕶軍色爾忒之妻王氏鑲黄旗䝉古䕶軍巴哈那之妻張氏鑲黄旗䝉古䕶軍巴克塘阿之妻厄勒特氏鑲黄旗蒙古前鋒鎻諾木扎布之妻錫氏鑲黄旗䝉古馬甲鎻住之妻陳氏正黄旗䝉古馬甲巴銀達里之妻舒穆禄氏正黄旗蒙古馬甲傅生阿之妻瓊佳氏正黄旗䝉古閑散朋蘇之妻新氏正黄旗䝉古䕶軍劉保住之妻張氏正黄旗蒙古䕶軍班泰之妻孫氏正黄旗蒙古䕶軍克爾登之妻胡氏正黄旗䝉古䕶軍四黒之妻邉氏正白旗䝉古䕶軍扎瑪素之妻巴里特氏正白旗蒙古䕶軍窝木布之妻韓氏正白旗䝉古䕶軍五巴里之妻何氏正白旗䝉古䕶軍三達色之妻薩米忒氏正白旗蒙古馬甲長保之妻伊拉理氏正白旗䝉古馬甲百林之妻汪吉氏正紅旗䝉古馬甲博爾屯之妻烏色氏正紅旗䝉古馬甲八達色之妻徐佳氏正紅旗䝉古馬甲倭什訥之妻吴佳氏正紅旗蒙古前鋒常英之妻伊氏正紅旗䝉古親軍富永阿之妻景氏正紅旗䝉古䕶軍吉爾嘠郎之妻張氏鑲白旗蒙古馬甲官保之妻張氏鑲紅旗蒙古親軍白衣保之妻覺羅氏鑲紅旗䝉古䕶軍綱噶拉之妻周氏鑲紅旗䝉古䕶軍福夀之妻趙氏鑲紅旗蒙古䕶軍玉住之妻白氏正藍旗䝉古閑散巴爾虎徳之妻吉岳樂氏正藍旗䝉古䕶軍七達色之妻魯布特氏正藍旗蒙古䕶軍校五十九之妻孫氏以上俱於乾隆十七年旌表鑲黄旗䝉古䕶軍三格之妻王氏鑲黄旗䝉古鳥鎗䕶軍二達色之妻劉氏鑲黄旗蒙古筆帖式坎什之妻王氏鑲黄旗䝉古鳥鎗䕶軍多爾吉之妻孫氏鑲黄旗䝉古䕶軍四十六之妻張氏鑲黄旗蒙古䕶軍六十爾之妻什爾徳忒氏鑲黄旗䝉古䕶軍色爾固楞之妻王氏鑲黄旗䝉古䕶軍福保之妻馮氏正黄旗蒙古馬甲五爾金扎布之妻白氏正黄旗䝉古䕶軍伊常阿之妻張氏正黄旗䝉古閑散黑逹色之妻莽努特氏正黄旗蒙古藍翎侍衛西拉補綽克圖之妻白氏正黄旗䝉古馬甲西盛保之妻孫氏正黄旗䝉古䕶軍三逹色之妻王氏正白旗䝉古䕶軍五十一之妻王氏正紅旗蒙古馬甲集爾塔哈之妻烏爾喀達氏正紅旗䝉古鳥鎗䕶軍沙色之妻圖氏正紅旗䝉古䕶軍九格之妻審氏正紅旗蒙古前鋒額森特之妻成氏正紅旗䝉古䕶軍扎木蘇之妻石氏鑲白旗䝉古馬甲桑格之妻鮑氏鑲白旗蒙古馬甲黒達色之妻張氏鑲白旗䝉古馬甲步庫之妻吳氏鑲白旗䝉古䕶軍二保之妻盧氏鑲白旗䝉古䕶軍阿使之妻卜氏鑲白旗蒙古鎗手岳起之妻劉氏鑲白旗䝉古馬甲武雅嚕之妻西特黒爾氏鑲紅旗䝉古前鋒巴燕太之妻王氏鑲紅旗䝉古䕶軍伊靈阿之妻李氏鑲紅旗䝉古䕶軍留住之妻巴魯特氏鑲紅旗蒙古䕶軍七克慎之妻張氏鑲紅旗蒙古䕶軍額爾特之妻年氏鑲紅旗䝉古䕶軍三雅圖之妻田氏鑲紅旗䝉古領催那燕太之妻闗氏鑲紅旗蒙古馬甲鄂倫太之妻郎氏鑲紅旗蒙古馬甲百夀之妻李氏鑲紅旗䝉古閑散韓扎達之妻徐氏鑲紅旗䝉古牧丁伊察之妻扎斯呼哩氏正藍旗蒙古馬甲西稜特之妻𤓰勒佳氏鑲藍旗䝉古閑散冲古之妻卓羅氏鑲藍旗䝉古閑散伊囒塔之妻巴雅拉氏鑲藍旗蒙古䕶軍趙格之妻常氏以上俱於乾隆十八年旌表鑲黄旗䝉古鳥鎗䕶軍八十爾之妻李氏鑲黄旗䝉古鳥鎗䕶軍策布坦之妻李氏鑲黄旗蒙古拉嗎學生催達拉之妻王氏鑲黄旗䝉古鳥鎗䕶軍五通保之妻梁氏鑲黄旗䝉古官學生富成之妻富氏鑲黄旗蒙古馬甲克䝉厄之妻張氏鑲黄旗䝉古郎中嗎呢之妻富氏鑲黄旗蒙古䕶軍徳福之妻吴氏鑲黄旗蒙古䕶軍松保之妻江氏鑲黄旗䝉古馬甲謨霍囉之妻西特赫爾氏正黄旗䝉古䕶軍伍爾圖之妻莽弩特氏正黄旗蒙古䕶軍巴麟之妻赫氏正黄旗䝉古䕶軍白達色之妻白氏正黄旗䝉古領催額起爾之妻李氏正黄旗蒙古馬甲常住兒之妻白氏正白旗䝉古䕶軍達頼之妻李氏正白旗䝉古䕶軍索柱之妻果氏正白旗蒙古䕶軍海福之妻張氏正白旗䝉古䕶軍胡必圖之妻髙氏正白旗䝉古䕶軍校佛保之妻張氏正白旗蒙古馬甲三格之妻把岳忒氏正白旗䝉古前鋒索多樂之妻特勒勒氏正白旗䝉古驍騎校阿玉璽之妻顔珠氏正白旗蒙古馬甲扎什之妻陳氏正紅旗䝉古前鋒發林泰之妻莫爾徳禮氏正紅旗䝉古馬甲豁隆額之妻吕佳氏正紅旗蒙古䕶軍京阿納之妻趙氏正紅旗䝉古䕶軍二達子之妻卜氏鑲白旗䝉古䕶軍三保之繼妻把岳忒氏鑲紅旗蒙古馬甲布齊訥之妻寜古塔氏鑲紅旗䝉古䕶軍法貴之妻喀爾親氏鑲紅旗䝉古䕶軍永貴之妻陽氏正藍旗蒙古馬甲六十一之妻劉氏正藍旗䝉古䕶軍廣周之妻王氏正藍旗䝉古馬甲阿爾薩之妻伊爾庫勒氏鑲藍旗蒙古馬甲五達色之妻依勒氏鑲藍旗䝉古馬甲五十六之妻謝氏以上俱於乾隆十九年旌表鑲黄旗䝉古馬甲赶生之妻趙氏鑲黄旗䝉古䕶軍七十五之妻博爾蘇特氏鑲黄旗䝉古馬甲玉保之妻金氏鑲黄旗䝉古馬甲扎木蘇之妻玉氏鑲黄旗蒙古馬甲烏林泰之妻胡氏正黄旗䝉古䕶軍和盛額之妻劉氏正白旗䝉古閑散阿哈里之妻邁氏正白旗蒙古䕶軍僧保之妻永氏正白旗䝉古䕶軍佛保柱之妻方氏正白旗䝉古䕶軍雙全之妻張氏正白旗蒙古馬甲特苦徳之妻江氏正白旗䝉古䕶軍保住之妻受氏正白旗䝉古馬甲多爾吉之妻王氏正紅旗蒙古䕶軍諾穆圖之妻白氏正紅旗䝉古馬甲觀音保之妻吳氏正紅旗䝉古馬甲必里克圖之妻王氏鑲白旗蒙古䕶軍六十九之妻把岳忒氏鑲白旗䝉古親軍巴雅爾圖之妻巴林氏鑲白旗䝉古䕶軍花色之妻把岳忒氏鑲白旗蒙古䕶軍三保之妻烏蘭氏鑲白旗䝉古馬兵牛都色之妻把岳忒氏鑲白旗䝉古前鋒惟格之妻巴林氏鑲紅旗蒙古䕶軍伊拉氣之妻常氏鑲紅旗䝉古步甲六十三之妻華氏鑲紅旗䝉古䕶軍李伸保之妻何氏鑲紅旗蒙古䕶軍訥清額之妻牛氏以上俱於乾隆二十年旌表鑲黄旗䝉古䕶軍坡連之妻滿氏鑲黄旗䝉古䕶軍莫爾太之妻伊拉里氏正黄旗蒙古䕶軍五達色之妻趙氏正黄旗蒙古領催古木楚之妻尹氏正白旗䝉古馬甲色克圖之妻白氏正紅旗䝉古䕶軍校倚得之妻趙氏正紅旗蒙古西伯烏集布勒朝哈同保之妻張氏正紅旗䝉古馬甲同保之妻張氏正紅旗䝉古馬兵吉明之妻李氏鑲白旗蒙古馬兵五喜之妻雷氏鑲白旗䝉古領催明夀之妻李氏鑲白旗䝉古驍騎校巴圖之妻劉氏鑲白旗蒙古閑散布拉克之妻吴氏鑲白旗䝉古庫兵玉住之妻博果羅忒氏鑲白旗䝉古馬兵常海之妻敖拉爾氏鑲紅旗蒙古馬甲石頭之妻林氏鑲藍旗䝉古驍騎校阿爾太之妻孫氏鑲藍旗䝉古馬甲加馬善之妻佟格里氏鑲藍旗蒙古馬甲麻禮之妻布雅木濟氏鑲藍旗䝉古馬甲五三太之妻烏扎拉氏鑲藍旗䝉古馬甲得爾蘇勒之妻沙克竒里氏以上俱於乾隆二十一年旌表鑲黄旗蒙古馬甲愛住之妻博羅忒氏鑲黄旗蒙古步甲長安住之妻韓氏鑲黄旗蒙古馬甲諾爾布之妻兆齊里忒氏鑲黄旗䝉古馬甲巴什圖之妻江氏鑲黄旗䝉古膳房人諾蘇啃之母曽氏鑲黄旗䝉古馬甲必雅勒塔哩之妻扎斯呼哩氏正黄旗䝉古閑散黒色之妻楊氏正黄旗蒙古鳥鎗䕶軍楊桑阿之妻王氏正黄旗䝉古馬甲徳色勒之妻那木達拉氏正白旗䝉古䕶軍富森太之妻秦氏正白旗蒙古䕶軍多隆武之妻王氏正白旗䝉古生員鄂全之妻阿氏正紅旗䝉古驍騎校常保住之妻趙氏正紅旗蒙古䕶軍明山之妻趙氏正紅旗䝉古䕶軍神保之妻鄂氏正紅旗䝉古領催巴太之妻趙氏正紅旗䝉古前鋒五十六之妻伯蘇特氏正紅旗蒙古前鋒同格之妻阿素氏正紅旗䝉古馬甲阿蘭太之妻齊克特禮氏正紅旗䝉古馬甲連生之妻馬氏正紅旗蒙古馬甲招哥之妻郭氏鑲白旗䝉古䕶軍安升之妻富察氏鑲白旗䝉古馬兵諾木圖之妻𤓰勒佳氏鑲白旗蒙古馬甲平安住之妻韓氏鑲白旗䝉古馬甲安圖之妻扎斯呼哩氏正藍旗䝉古閑散喜佛訥之妻舒穆禄氏以上俱於乾隆二十二年旌表鑲黄旗蒙古䕶軍全保之妻陳氏正黄旗䝉古閑散伍寜阿之妻孟氏正黄旗䝉古馬甲阿林塔之妻伊爾根覺羅氏正白旗蒙古馬甲五保之妻張氏正白旗䝉古拉麻學生清海之妻郎氏正白旗䝉古馬甲伊大蘭之妻扎庫塔氏正白旗䝉古馬甲那書拉之妻扎庫塔氏鑲白旗䝉古馬兵闗得之妻張氏正藍旗䝉古前鋒都楞額之妻伊爾根覺羅氏正藍旗蒙古馬甲黒達色之妻伊爾根覺羅氏鑲藍旗䝉古䕶軍三達色之妻舒穆禄氏以上俱於乾隆二十三年旌表鑲黄旗䝉古騎都尉巴牙絲胡郎之妻吴氏鑲黄旗蒙古䕶軍喜住之妻劉氏鑲黄旗蒙古䕶軍巴爾虎之妻納喇氏鑲黄旗䝉古馬甲天福之妻佟佳氏鑲黄旗䝉古閒散班第之妻王氏鑲黄旗蒙古馬甲南泰之妻張佳氏鑲黄旗䝉古馬甲彭泰之妻郭羅氏正黄旗䝉古馬甲托啟之妻富察氏正白旗蒙古領催三保住之妻張氏正白旗䝉古馬甲那因泰之妻濟佳氏正白旗䝉古馬甲林官保之妻綽克托氏正紅旗蒙古親軍七十三之妻鄂氏正紅旗䝉古馬甲朱倫太之妻楊氏正紅旗䝉古馬甲悦舒之妻陸氏正紅旗蒙古馬甲七十二之妻黄佳氏鑲白旗䝉古領催李保住之妻孫氏鑲白旗䝉古養育兵三扎布之妻張氏鑲白旗蒙古馬甲六十之妻伐氏鑲紅旗䝉古䕶軍蘇靈阿之妻孟氏鑲紅旗䝉古䕶軍色克之妻吴氏鑲紅旗蒙古䕶軍歪圖之妻納喇氏鑲紅旗䝉古馬甲巴言之妻巴魯特氏鑲紅旗䝉古馬甲仲神保之妻鄂巴氏正藍旗蒙古馬甲保住之妻哈魯特氏鑲藍旗䝉古馬甲鄂勒吉太之妻吴氏鑲藍旗䝉古䕶軍琪凌阿之妻蘇氏鑲藍旗蒙古弓匠諾海之妻林氏鑲藍旗䝉古馬甲薩滿岱之妻汪佳氏鑲藍旗䝉古馬甲皂保之妻韓佳氏鑲藍旗蒙古馬甲長保之妻兀魯特氏鑲藍旗䝉古馬甲董福之妻烏色氏以上俱扵乾隆二十四年旌表鑲黄旗䝉古馬甲奚三太之妻富察氏正黄旗蒙古偹箭八品官逹色之妻把岳忒氏正黄旗䝉古䕶軍伍爾泰之妻卓特氏正白旗䝉古䕶軍薩炳阿之妻周氏正白旗蒙古馬甲阿那逺之妻趙氏正白旗䝉古馬甲庫爾哈之妻尼瑪齊氏正白旗䝉古閒散托洛之妻托克落氏正白旗蒙古馬甲阿那達之妻趙氏正紅旗䝉古鳥鎗領催常徳之妻闗氏鑲白旗䝉古䕶軍四十八之妻嚴氏鑲白旗蒙古䕶軍校格堯之妻烏色氏鑲紅旗䝉古親軍五爾親之妻石氏鑲紅旗䝉古馬甲嗎色那之妻秀水力氏正藍旗䝉古領催年昌阿之妻鈕祜祿氏正藍旗蒙古馬甲奚特何諾之妻佛穆竒氏正藍旗䝉古馬甲古斯太之妻陳氏正藍旗䝉古馬甲王家之妻吉齊羅氏鑲藍旗蒙古長鎗䕶軍班住之妻趙氏鑲藍旗䝉古馬甲蘇爾吉納之妻科齊里氏鑲藍旗䝉古馬甲海齊之妻西特里氏以上俱於乾隆二十五年旌表正黄旗蒙古馬甲四十三之妻周氏正黄旗䝉古馬甲達爾瑪之妻張氏正黄旗䝉古領催定住之妻范氏正黄旗蒙古馬甲納穆哩之妻舒穆祿氏正黄旗䝉古前鋒富保之妻努葉勒氏正黄旗䝉古馬甲色爾圖之妻赫哲勒氏正白旗蒙古文舉人永明之妻佟氏正白旗䝉古䕶軍富保之妻張氏正白旗䝉古馬甲羅坌之妻包氏正白旗䝉古馬甲薩