  text: 旗分志二十八八旗佐領二十八正藍旗漢軍佐領正藍旗漢軍佐領正藍旗漢軍都統所屬參領五第一參領下佐領六第二參領下佐領六第三參領下佐領六第四參領下佐領六第五參領下佐領六第一參領第一佐領係天聰八年編設初以劉仲錦管理劉仲錦升任山東總兵官以分得撥什庫漢文稱驍騎校唐安管理續以撫順額駙李永芳之孫興哥管理續以馬龍管理馬龍升任逰擊以李永芳之孫一等阿思哈尼哈番漢文稱男李正宗管理李正宗升任都統以其子李淑聞管理續以李淑聞之兄一等阿思哈尼哈番李淑德管理李淑德升任副都統以興哥之子候補筆帖式李淑膺管理續以李淑德之子靈保管理靈保升任以其叔父李淑從管理李淑從故以其子李奈管理李奈故以李永芳之五世孫達春管理第一參領第二佐領係天聰八年編設初以李銘管理李銘故以李芝蘭管理李芝蘭故以分得撥什庫馬郎阿管理馬郎阿故以李永芳之孫副都統關保管理續以關保之子李淑鼐管理續以李淑鼐之弟李淑璧管理李淑璧升任廣東潮州逰擊以其兄之子李綵管理續以李綵之族叔李淑棟管理李淑棟緣事離任仍以李淑璧管理續以李淑璧之子李綬管理李綬故以其弟李紱管理李紱故以其弟李蘭管理李蘭故以其子李光慶管理李光慶故以其子巴海管理第一參領第三佐領係天聰八年編設初以高應第管理高應第升外任遊擊以李永芳之孫李繩宗管理李繩宗升任都統以李綿宗管理續以李興宗管理續以李淑紳管理續以二等伯李淑忠管理李淑忠故以其子李本管理李本故以其弟李梅管理第一參領第四佐領原係天聰八年編設初以李永芳之子巴顔管理續以分得撥什庫馬如璧管理馬如璧升任刑部左侍郎以馬維德管理馬維德故以郎中劉芳譽管理劉芳譽故以劉成貴管理劉成貴因病辭退以馬崇德管理馬崇德升任廣東駐防參領以劉成祿管理劉成祿因病辭退以劉芳耀管理劉芳耀升任協領以李永芳之孫都統二等伯李繩宗管理李繩宗故以其弟之子李淑翰管理旨大謹案乾隆三十九年奉入鑲黃旗漢軍伊弟李奉學士李侍堯一支著抬堯所管佐領一併入鑲黃旗漢軍第一參領第五佐領係天聰八年編設初以李名管理李名故以李永芳之子副都統克勝額管理克勝額故以步軍尉李眀宗管理李眀宗故以李淑炳管理李淑炳緣事革任以其弟李淑楷管理李淑楷故以其弟李繪管理李繪故以其子李世泰管理李世泰故以其弟李世勇管理第一參領第六佐領係天聰八年編設初以都司陳錦管理陳錦升任浙江福建總督以馬如正管理馬如正故以李梅芳管理李梅芳故以其弟刑部郎中李英芳管理李英芳故以其子李萬春管理李萬春升任杭州駐防協領以李永芳之孫一等伯天保管理天保升任馬蘭峪副將以其子佛寶管理佛寶升任蘭州遊擊以其弟李元亮管理李元亮升任三屯營副將以佛寶之子李侍京管理李侍京故以其子李慶棻管理李慶棻故以其叔父李世都管理李世都故以其子李廷璋管理李廷璋故以其子和榮管理第二參領第一佐領係天聰年間編設初以鎮江殉難撥什庫漢文稱領催佟恆年之弟佟成年管理佟成年故以其兄佟嶽年之子拜他喇布勒哈番漢文稱騎都尉兼工部員外郎佟國印管理佟國印年老辭退以其弟佟國卿管理佟國卿升任廣東瓊州總兵官以佟國印之子阿思哈尼哈番兼副都統佟世德管理佟世德隨征陜西病故以其子佟鎬管理佟鎬緣事降調以其弟阿思哈尼哈番佟銓管理佟銓故以其子佟溥管理佟溥故以其伯父之子佟湧管理佟湧故以其弟佟澍管理佟澍故以其子佟槤貴管理佟槤貴故以其弟佟槤升管理佟槤升故以其子永存管理第二恭領第二佐領係天聰八年編設初以佟學文管理佟學文升任宣化總兵官以其子佟鸞彩管理佟鸞彩故以其兄佟鳯彩之子三等阿達哈哈番漢文稱輕車都尉佟賦斌管理佟賦斌年老辭退以佟鸞彩之子佟賦仁管理佟賦仁故以佟飬性之五世孫佟椿齡管理第二參領第三佐領係崇德年間編設初以王應久管理王應久升任陜西臨洮總兵官以常夀管理常夀故以刑部理事官陳典謨管理陳典謨升任杭州副都統以詩武里額駙佟飬性之族孫佟圖茂管理佟圖茂故以佟與善管理佟與善升任湖廣鄖陽撫治中軍以佟飬性之曾孫佟世功管理佟世功從阷陜西陳亡以其弟佟世澤管理佟世澤因病辭退以其子恭領拖沙喇哈番漢文稱雲騎尉佟鑑管理佟鑑緣事革退以其族弟佟礦管理佟礦故以眀阿善管理眀阿善故以李慶雲管理續以趙士鎧管理謹案此原係勳舊佐領眀阿善故後無嗣乾隆五十年奉旨作為公中佐領第二恭領第四佐領係崇德七年編設初以分得撥什庫朱和善管理朱和善改名李時芳升任駐防協領以理事官朱衣客管理朱衣客升任道員以李時芳之子李敬實管理李敬實從征福建海澄陳亡以其子李眀倫管理李眀倫緣事革退以海寧管理海寧故以佟國棟管理佟國棟因病辭退以驍騎校佟世豫管理佟世豫緣事革退以二等精竒尼哈番漢文稱子七復管理七復緣事革退以其子白起圖管理白起圖故以其弟二等精竒尼哈番八十六管理八十六故以其子德昌管理德昌故以其子和寧管理第二參領第五佐領係崇德年間編設初以長夀管理長夀因病辭退以彭紹勳管理彭紹勳故以其子彭希聖管理彭希聖升任廣東駐防協領以其子彭其儀管理彭其儀升任福建駐防參領以佟飬性之二世孫佟世仁管理佟世仁故以其弟之子二等精竒尼哈畨七復管理七復緣事革退以其弟吏部員外郎佟鐸管理佟鐸緣事降調以其兄一等精竒尼哈畨佟鎔管理佟鎔緣事革退以