body:
  text: 定八旗通志卷二百七十表一封爵表封建之制聖人之不得已也聖人立法恆鑒窮萬里以外而慮周百世以後豈不知裂土分茅星羅碁布足以啓併吞割據之患哉惟是元萌黃牙肇生衆庶不能獨立無侣也必漸有聚落焉不能遞相君臣也必漸有材智較勝者為之統率焉統率既久君長之勢遂漸定各自奉其君長列國之勢遂漸成聖人首出其始亦一君長耳厥後德盛化神為衆君長所歸附遂總馭而定一尊然不能盡除其君長以拂衆情又不能聽其紛然爭競無所限制也於是因已成之勢分疆畫界使民區以國國立以君而國君共𨽻於天子如臂指相維以居髙控下而已古初質朴民氣尚淳然小之有夙沙大之有蚩尤已不能使之全靖矣逮周衰弊極併為七國龍虎啖食垂百餘年而秦乃一之遂改郡縣非秦之法制能度越三五也古聖人當不能不封建之時雖明知其弊亦沿而不改秦適值可罷封建之時且目擊其弊故戒而不為古今勢異此之謂矣自時厥後凡封建者必肇亂即唐不封建而藩鎮世及明惟使諸王統兵而不使統民亦皆肇亂知分藩立國斷非後世所可行雖古聖人生於後世亦斷不以封建禍天下也我朝龍興東土開國時駕馭雄才驅䇿羣力僅異姓王四人三蘖既平惟天潢乃錫王爵而皆無分土其五等之班以酬勳舊者雖盟同帶礪亦第褒以嘉名不復繫銜以郡國至子孫承襲則王公侯伯子男皆一一繪列宗圖恭呈御覽鑒别能否擇而畀之亦不似古之諸侯自相授受於中襲爵之人又皆量才器使世祿而不世官蓋展親崇功雖準古義而於世及之內仍寓選舉之大權此誠非十紀以來用封建者之所及亦非三代以後徒廢封建者之所及矣謹自開國以至今日分門臚列各詳其始封與其世襲之次仿史記年表之例具列如左封爵表一宗室封爵表一親王一欽定八旗通志卷二百七十
