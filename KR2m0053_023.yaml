body:
  text: 旗分志九八旗佐領九正紅旗滿洲佐領領分管管領正紅旗包衣佐正紅旗滿洲佐領下四參領至五參領第四參領第一佐領係國初編立始以岱松阿管理岱松阿故以其叔父之子拖沙喇哈畨戴音納管理戴音納故以岱松阿之長子阿思哈尼哈畨阿納海管理阿納海出征陳亡以其弟白住管理白住升任寧古塔固山大以其子參領白世騰管理白世騰年老辭退以其子白伸德管理白伸德故以其弟白德昌管理白德昌故以其子扎爾杭阿管理扎爾杭阿故以其叔白興德管理白興德緣事革退以其子白竒圖管理第四參領第二佐領即第一佐領內滋生人丁康熙二十三年白住管佐領時分立一佐領以其兄一等阿思哈尼哈畨巴罕管理巴罕年老辭退以其兄之子星夀管理星夀故以其叔父之子阿思哈尼哈畨兼參領巴燕圖管理巴燕圖故以其子護軍參領巴爾度管理巴爾度故以其子一等阿達哈哈畨又一拖沙喇哈畨長住管理長住故以其子富爾哈納管理富爾哈納故以其子訥青阿管理訥青阿故以其子文祥管理第四參領第三佐領係國初編立始令楚庫巴圖魯管理楚庫年老辭退以其子一等阿達哈哈畨兼參領義闌布管理義闌布緣事革退以其弟一等阿達哈哈畨海存管理海存緣事革退仍以義闌布管理義闌布緣事革退以其子御史孫塔管理孫塔緣事革退以其弟副參領席特庫管理席特庫故以孫塔之子尚寶管理尚寶故以其子永剛管理永剛故以其伯父達喀管理達喀故以其子扎坤珠管理扎坤珠故以其弟榮宗管理榮宗故以其叔之子富永管理富永故以其伯之四世孫尚安圖管理續以阿爾泰之四世孫海秀管理第四參領第四佐領即第三佐領內滋生人丁康熙八年義闌布管佐領時分立一佐領以楚庫巴圖魯兄之子前鋒參領集喇立管理集喇立年老辭退以其族子副都統噶哈管理噶哈故以其子那穆代管理那穆代故以集喇立之子湯愛管理湯愛升任熊嶽城守尉以噶哈之孫三等護衛雲寶管理雲寶緣事革退以其伯父之子筆帖式奎寶管理奎寶故以其子海秀管理續以其子尚安圖管理第四參領第五佐領係國初以葉赫地方來歸人丁編立半個牛録始令傅岱管理傅岱故以其子卜爾孫管理後因户口滋盛定為整牛録仍以卜爾孫管理卜爾孫故以其子參領穆成格管理穆成格升任西安副都統以其子竒山管理竒山升任盛京協領以其叔父侍郎伊圖管理伊圖故以其弟侍郎趙山管理趙山緣事革退以其兄之子都統綽竒管理綽竒故以其兄之子二等阿達哈哈畨穆林管理穆林故以其叔之子常祿管理常祿故以其子廣保管理廣保故以其子永貴管理第四參領第六佐領即第五佐領內滋生人丁康熙八年穆成格管佐領時分立一佐領以其弟副都統穆書管理穆書從征陳亡以其弟侍郎伊圖管理伊圖升任甘肅巡撫以其兄之孫莫爾格申管理莫爾格申升任盛京協領以其叔祖之子拜他喇布勒哈畨穆善管理穆善緣事革退以五格管理五格故以其子定柱管理定柱革退以其叔之孫干佛保管理干佛保故以其子寶琳管理寶琳故以其子林盛阿管理第四參領第七佐領係第八佐領內滋生人丁康熙二十三年分立一佐領以托克退之四世孫佛保管理佛保緣事革退以納罕太之孫郎中察達海管理察達海故以其子護軍參領常奈管理常奈緣事革退以納罕太之四世孫巴爾都管理巴爾都故以其子登額圖管理登額圖故以其伯曾祖之四世孫德保管理德保故以其弟德勝管理德勝故以其叔祖之四世孫文圖管理第四參領第八佐領係國初編立始令納罕太管理納罕太故以其弟得黑里管理得黑里緣事革退以固山額真後改固山按班濟什哈管理後復以納罕太之弟梅勒章京漢文稱副都統托克退管理托克退緣事革退以納罕太之子摩積管理摩積故以其弟科多拜管理科多拜故以其兄之子勒畢管理勒畢從征陳亡以其子額勒琿管理額勒琿年老辭退以納罕太之四世孫得爾賽管理得爾賽故以納罕太之六世孫巴燕圖管理巴燕圖出征病故以喀拉管理喀拉故以其子綽克托管理綽克托告退以其子多福管理多福故以其子恆升管理第四參領第九佐領係第十二佐領內滋生人丁康熙二十三年拉篤瑚管佐領時分編一佐領令三等護衛德林管理德林故以前鋒校瑚什那管理續以副參領普恆管理續以郎中常太管理續以三等侍衛兼輕車都尉四福保管理續以印務章京兼驍騎校伍寧阿管理續以三等侍衛兼雲騎尉和昌管理續以刑部侍郎塔琦管理續以對品以京職補用之原任逰擊成寧管理第四參領第十佐領係國初編立始以駱吞之子尼唐阿管理尼唐阿故以其兄綽穆陀管理綽穆陀故以其兄之子一等阿達哈哈畨又一拖沙喇哈畨步軍總尉法談管理法談年老辭退以其子護軍參領圖克善管理圖克善年老辭退以其兄之孫內閣學士額赫納管理額赫納故以其養子拜他喇布勒哈畨額特赫管理額特赫緣事革退以其髙祖之二世孫巴太管理巴太故以其子巴揚阿管理巴楊阿故以其子博明管理博明故以其子果勒明阿管理第四參領第十一佐領即第十佐領內滋生人丁康熙二十三年圖克善管佐領時分立一佐領以圖克善叔祖哈寧阿之孫一等護衛王府長史僖特哈管理僖特哈年老辭退以圖克善兄之孫護軍參領色布竒管理色布竒緣事革退以哈寧阿之孫員外郎伊特海管理伊特海緣事革退以僖特哈弟之子僖臨管理僖臨緣事革退以圖克善之孫塔倫泰管理塔倫泰告退以其族叔希昌管理希昌告退以其子富尼雅罕管理富尼雅罕故以其子希智管理第四參領第十二佐領係康熙十三年以噶爾漢佐領下餘丁五十名並勒貝佐領下侍郎拉篤