body:
  text: 旗分志九八旗佐領九正紅旗滿洲佐領領分管管領正紅旗包衣佐正紅旗滿洲佐領下四㕘領至五㕘領第四㕘領第一佐領係國初編立始以岱松阿管理岱松阿故以其叔父之子拖沙喇哈畨戴音納管理戴音納故以岱松阿之長子阿思哈尼哈畨阿納海管理阿納海出征陣亡以其弟白住管理白住陞任寧古塔固山大以其子㕘領白世騰管理白世騰年老辭退以其子白伸徳管理白伸徳故以其弟白徳昌管理白徳昌故以其子扎爾杭阿管理扎爾杭阿故以其叔白興徳管理白興徳縁事革退以其子白竒圖管理第四㕘領第二佐領即第一佐領内滋生人丁康熙二十三年白住管佐領時分立一佐領以其兄一等阿思哈尼哈畨巴罕管理巴罕年老辭退以其兄之子星夀管理星夀故以其叔父之子阿思哈尼哈畨兼㕘領巴燕圖管理巴燕圖故以其子䕶軍㕘領巴爾度管理巴爾度故以其子一等阿達哈哈畨又一拖沙喇哈畨長住管理長住故以其子富爾哈納管理富爾哈納故以其子訥青阿管理訥青阿故以其子文祥管理第四㕘領第三佐領係國初編立始令楚庫巴圖魯管理楚庫年老辭退以其子一等阿達哈哈畨兼㕘領義闌布管理義闌布縁事革退以其弟一等阿達哈哈畨海存管理海存縁事革退仍以義闌布管理義闌布縁事革退以其子御史孫塔管理孫塔縁事革退以其弟副㕘領席特庫管理席特庫故以孫塔之子尚寶管理尚寶故以其子永剛管理永剛故以其伯父達喀管理達喀故以其子扎坤珠管理扎坤珠故以其弟榮宗管理榮宗故以其叔之子富永管理富永故以其伯之四世孫尚安圖管理續以阿爾泰之四世孫海秀管理第四㕘領第四佐領即第三佐領内滋生人丁康熙八年義闌布管佐領時分立一佐領以楚庫巴圖魯兄之子前鋒㕘領集喇立管理集喇立年老辭退以其族子副都統噶哈管理噶哈故以其子那穆代管理那穆代故以集喇立之子湯愛管理湯愛陞任熊岳城守尉以噶哈之孫三等䕶衛雲寶管理雲寶縁事革退以其伯父之子筆帖式奎寶管理奎寶故以其子海秀管理續以其子尚安圖管理第四㕘領第五佐領係國初以葉赫地方來歸人丁編立半個牛录始令傅岱管理傅岱故以其子卜爾孫管理後因户口滋盛定為整牛录仍以卜爾孫管理卜爾孫故以其子㕘領穆成格管理穆成格陞任西安副都統以其子竒山管理竒山陞任盛京協領以其叔父侍郎伊圖管理伊圖故以其弟侍郎趙山管理趙山縁事革退以其兄之子都統綽竒管理綽竒故以其兄之子二等阿達哈哈畨穆林管理穆林故以其叔之子常禄管理常禄故以其子廣保管理廣保故以其子永貴管理第四㕘領第六佐領即第五佐領内滋生人丁康熙八年穆成格管佐領時分立一佐領以其弟副都統穆書管理穆書從征陣亡以其弟侍郎伊圖管理伊圖陞任甘肅巡撫以其兄之孫莫爾格申管理莫爾格申陞任盛京協領以其叔祖之子拜他喇布勒哈畨穆善管理穆善縁事革退以五格管理五格故以其子定柱管理定柱革退以其叔之孫干佛保管理干佛保故以其子寶琳管理寶琳故以其子林盛阿管理第四㕘領第七佐領係第八佐領内滋生人丁康熙二十三年分立一佐領以托克退之四世孫佛保管理佛保縁事革退以納罕太之孫郎中察達海管理察達海故以其子䕶軍㕘領常奈管理常奈縁事革退以納罕太之四世孫巴爾都管理巴爾都故以其子登額圖管理登額圖故以其伯曾祖之四世孫徳保管理徳保故以其弟徳勝管理徳勝故以其叔祖之四世孫文圖管理第四㕘領第八佐領係國初編立始令納罕太管理納罕太故以其弟得黑里管理得黑里縁事革退以固山額真後改固山按班濟什哈管理後復以納罕太之弟梅勒章京漢文稱副都統托克退管理托克退縁事革退以納罕太之子摩積管理摩積故以其弟科多拜管理科多拜故以其兄之子勒畢管理勒畢從征陣亡以其子額勒琿管理額勒琿年老辭退以納罕太之四世孫得爾賽管理得爾賽故以納罕太之六世孫巴燕圖管理巴燕圖出征病故以喀拉管理喀拉故以其子綽克托管理綽克托告退以其子多福管理多福故以其子恒陞管理第四㕘領第九佐領係第十二佐領内滋生人丁康熙二十三年拉篤瑚管佐領時分編一佐領令三等䕶衛徳林管理徳林故以前鋒校瑚什那管理續以副㕘領普恒管理續以郎中常太管理續以三等侍衛兼輕車都尉四福保管理續以印務章京兼驍騎校伍寧阿管理續以三等侍衛兼雲騎尉和昌管理續以刑部侍郎塔琦管理續以對品以京職補用之原任逰擊成寧管理第四㕘領第十佐領係國初編立始以駱吞之子尼唐阿管理尼唐阿故以其兄綽穆陀管理綽穆陀故以其兄之子一等阿達哈哈畨又一拖沙喇哈畨步軍總尉法談管理法談年老辭退以其子䕶軍㕘領圖克善管理圖克善年老辭退以其兄之孫内閣學士額赫納管理額赫納故以其養子拜他喇布勒哈畨額特赫管理額特赫縁事革退以其髙祖之二世孫巴太管理巴太故以其子巴揚阿管理巴楊阿故以其子博明管理博明故以其子果勒明阿管理第四㕘領第十一佐領即第十佐領内滋生人丁康熙二十三年圖克善管佐領時分立一佐領以圖克善叔祖哈寧阿之孫一等䕶衛王府長史僖特哈管理僖特哈年老辭退以圖克善兄之孫䕶軍㕘領色布竒管理色布竒縁事革退以哈寧阿之孫員外郎伊特海管理伊特海縁事革退以僖特哈弟之子僖臨管理僖臨縁事革退以圖克善之孫塔倫泰管理塔倫泰告退以其族叔希昌管理希昌告退以其子富尼雅罕管理富尼雅罕故以其子希智管理第四㕘領第十二佐領係康熙十三年以噶爾漢佐領下餘丁五十名並勒貝佐領下侍郎拉篤琥之族衆五十名共編一佐領以䕶軍㕘領格徳琿管理後將噶爾漢佐領下餘丁撥𨽻鎮國公噶爾薩屬下時拉篤琥族衆已滿百丁因獨以其人編一佐領令拉篤琥管理拉篤琥故以其族孫郎中蘇河訥管理蘇河訥陞任盛京侍郎以其弟尼牙達管理尼牙達故以其族伯祖之孫副㕘領徳爾參管理徳爾參駐防寧夏以清泰管理清泰故以其子觀音保管理觀音保故以其弟普薩保管理普薩保故以其兄之子色克精額管理第四㕘領第十三佐領係第十四佐領内滋生人丁康熙二十三年倭和納管佐領時分立一佐領以烏勒穆之孫給事中博爾濟管理博爾濟革退以其伯父之孫三等䕶衛兼副㕘領達爾瑪管理達爾瑪告退以博爾濟之孫副㕘領長年管理長年故以其伯曾祖之二世孫世太管理世太故以其叔之孫黄什管理黄什故以其伯祖之二世孫永謙管理永謙故以其叔曾祖之二世孫徳恵管理第四㕘領第十四佐領係國初編立始以烏勒穆管理烏勒穆故以其次子一等侍衛鄂齊理管理鄂齊理殁於秦州軍前以其兄本拜之子倭和納管理倭和納陞任右衛䕶軍㕘領以其子三等䕶衛法代管理法代故以其子孫寶住管理孫寶住陣亡以其弟吳訥式管理吳訥式縁事革退以其叔之子常明管理常明故以其子巴爾當阿管理巴爾當阿故以其叔常福管理常福陞任以其伯之孫吉勒圖堪管理吉勒圖堪故以徳恵管理第四㕘領第十五佐領係康熙十三年以他拉克圖佐領下餘丁分立半個佐領以䕶軍統領結寅管理結寅故以伊希達之子䕶軍㕘領阿哈尼堪管理至二十三年因人丁滋盛編為整佐領仍以阿哈尼堪管理阿哈尼堪故以其子精阿代管理精阿代故以三等阿達哈哈畨海福管理海福故以通政使覺羅雅爾哈善管理雅爾哈善故以䕶軍㕘領兆來管理兆來故以印務章京兼雲騎尉托敏管理托敏出差以給事中覺羅巴延三管理巴延三陞任以三等侍衛兼騎都尉忠慶管理忠慶出差以少卿扎郎阿管理扎郎阿縁事革退以三等侍衛塔勒必善管理塔勒必善縁事革退以通政司㕘議七十五管理續以理藩院員外郎保成管理第五㕘領第一佐領係國初以訥音地方來歸人丁編立始以碩占管理碩占年老辭退以其子二等侍衛伊爾根管理伊爾根故以碩占之弟䕶軍㕘領卜舒庫管理卜舒庫故以伊爾根之子員外郎公安管理公安故以其子方喀管理方喀故以其弟精竒尼哈畨明寶管理明寶故以其子徳成管理徳成故以其子初什勒管理第五㕘領第二佐領係康熙二十三年將常明佐領内瑚里布合族人丁編一佐領初令瑚里布之子副都統查拉克圖管理查拉克圖陞任歸化城都統以其弟郎中常明管理常明調任盛京郎中以其弟前鋒㕘領剛元管理剛元故以其子永亮管理永亮故以其子額勒登額管理額勒登額故以其弟昆亮管理昆亮故以其子徳音管理第五㕘領第三佐領係國初以葉赫地方來歸之諾穆圖與其弟格巴庫等七十餘人編為半個牛录始𨽻正白旗附於其族兄蘇納牛录内以蘇納兼管後改𨽻本旗合於副都統碩占佐領内令各管其半至康熙十三年人丁足額始另立為整佐領以諾穆圖之子尚書郭斯海管理郭斯海故以其子拖沙喇哈畨明夀管理明夀故以其弟三等䕶衛吳山管理吳山故以其弟藍翎侍衛英泰管理英泰告退以其子慶志管理慶志故以其伯之孫白啟圖管理白啟圖告退以其孫祥福管理第五㕘領第四佐領係康熙二十三年以莫達佐領内滋生人丁編立始以拖沙喇哈畨法喀管理法喀年老辭退以其族弟主事愛達世管理愛達世年老辭退以其子闗保管理闗保陞任熱河總管以其子福寧管理福寧告退以其子永安管理第五㕘領第五佐領係康熙三十四年將察爾器雙全傅臘塔索柱四佐領内溢額人丁共編一佐領以布爾杭額之孫一等侍衛津保住管理津保住縁事革退以達爾漢之二世孫一等侍衛兼䕶軍副㕘領舍爾圖管理舍爾圖故以其弟副㕘領舍林管理舍林縁事革退以其子三等侍衛和舜管理和舜故以其子舒隆阿管理舒隆阿故以其子寧顯管理寧顯故以其子佛靈阿管理第五㕘領第六佐領初係噶布臘管理噶布臘於軍前獲罪以前鋒侍衛東金管理東金故以其子㕘領他拉克圖管理他拉克圖故以其子䕶軍㕘領常明管理常明故以其子侍衛法三管理法三告退以其子伊太管理伊太革退以其弟徳寧管理徳寧故以其兄永平管理永平故以其子徳慶管理謹按此佐領係崇徳四年噶布喇承管族中連管八次乾隆四十四年奏准作為族襲佐領第五㕘領第七佐領係國初以葉赫地方來歸人丁編立始以卜單管理卜單故以其子䕶軍㕘領綳素理管理尋以其弟阿來管理阿來陞任江寧協領以其子䕶軍副㕘領常禮管理常禮故以綳素理之子一等阿達哈哈畨又一拖沙喇哈畨傅海管理傅海年老辭退以其子親軍校傅保管理傅保故以其子海龍阿管理海龍阿故以其子舒誠管理第五㕘領第八佐領係國初編立始以蘇柄額管理蘇柄額故以其子塔即納管理塔即納故以其叔父三等阿達哈哈畨烏爾昆管理烏爾昆故以塔即納之子三等阿達哈哈畨擴奎管理擴奎因目疾辭退以固山額真後改固山按班濟席哈管理濟席哈故以其族弟給事中威達善管理尋以濟席哈之子瓦勒達管理康熙二十四年改令阿達哈哈畨奈三管理奈三故以其族子拜他喇布勒哈畨杭州管理杭州故以其子河南管理河南故以㕘領沙賴管理沙賴從征陣亡以國子監祭酒覺羅烏拜管理烏拜陞任以䕶軍㕘領額勒金布管理續以㕘領蘇保管理蘇保陞任以三等侍衛公明英管理公明英陞任以驍騎校保徳管理保徳陞任以正卿達敏管理達敏告退以步軍校伊蘭太管理續以郎中和徳管理第五