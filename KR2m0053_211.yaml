body:
  text: 欽定四庫全書欽定八旗通志卷一百九十七人物志七十七大臣傳六十三漢軍正白旗二華善蔡毓榮董衛國石琳王國安董衛國董衛國漢軍正白旗人初任佐領厯官國史院學士順治十八年擢江西巡撫康熙四年加工部尚書銜九年以病乞休詔慰留之十三年正月改兵部尚書銜時逆藩吳三桂犯湖南長沙失守衛國疏請發兵偹禦袁州吉安命副都統根特巴圖魯自兖州移師赴援㑹逆藩耿精忠復犯寧都廣昌南豐等處廣信副將柯昇叛應之衞國密疏告急命定南將軍希爾根㑹同衛國相機𠞰禦衛國復疏言袁州逼賊氛應設總兵綂兵三千鎮守並請以副將趙應奎陞授詔從之南瑞總兵楊富謀不軌衛國亷得實擒置之法並殱其黨上嘉其功七月設江西總督即授衛國舊制南昌水師營兵五百以守偹領之衛國奏省衛重地應改設遊擊增兵五百又江西營制馬一歩九用兵之際多一馬兵可當歩兵十奏改馬二歩八均如所請行十一月耿逆賊黨分犯新昌上髙衛國調遊擊佟國棟叅將趙登舉守偹張射光往援大捷斬偽都督左宗榜十四年七月與希爾根等招撫泰和龍泉永新廬陵偽官二百七十餘賊衆六萬五千有竒上髙新昌金溪餘干諸冦遏廣信糧道十二月衛國奏督兵親𠞰值簡親王喇布駐師南昌以省城投誠人襍處堪虞督臣不宜他岀奏止之十五年正月遣中軍吳友名擊賊於瑞州復上髙新昌二縣二月賊圍靖安調吳友名擊之賊潰十二月遣副將許盛遊撃楊以松等先後敗賊於泰和定南復其城十六年三月疏言賊首楊玉泰竊據宜黄樂安崇仁山谷中請綂官兵掃蕩允之未㡬招降崇仁偽總兵蔡仕伯宜黄偽總兵沈鳳祥等五月大破賊衆於大嶺陣斬偽官百餘兵五千餘復樂安玉泰窮蹙䧏時湖南平江及銅鼓營賊起衛國留提督趙賴守樂安調本省兵援楚㑹簡親王檄衛國標下兵盡赴樂安衛國以江西為楚粤控要省城駐滿兵不過二百恐守禦失利上疏乞賜罷斥嚴㫖責王不合並申諭嗣後調遣與衛國㑹商行之八月遣兵徇建昌招撫偽總兵張發降其官一千餘衆六萬餘九月擊走賊首朱綂錩於瀘溪擒其黨金洪尹文郁十二月遣兵徇新昌招撫偽總兵袁菊茂等官一千三百餘衆五萬餘復銅鼓營衛國以伏莽未靖疏請赴吉安隨簡親王協力撲勦留副都綂多諾守南昌得㫖緑營官兵聴便宜調遣十七年三月賊首韓大任赴閩降其黨郭應輔等分據萬安㤗和諸縣衛國勦其衆四萬餘招撫偽總兵以下官三百餘衆四萬六千餘分别安置六月吳逆犯永興薄吉安上命衛國酌撥緑旗兵守吉安速募精鋭五千偹援先是衛國奉㫖守銅鼓營三桂既死餘黨據岳州長沙大兵圍之不下十二月衛國奏銅鼓營寧謐無事請赴楚援勦上嘉許並授方畧未至岳州長沙繼定十八年正月詔赴大將軍安親王岳洛軍協同進取於是衛國隨大軍由衡州寳慶大敗賊於紫陽河雙井鋪復武岡城嗣給事中李宗孔劾衛國居總督任不治事失民心廷議革職諭戴罪圖功十九年三月率兵破鴨婆黄茅等嶺進勦靖州賊與都綂穆占㑹追敗偽將軍吳應麟等復沅州十月至鎮逺奪石巷口抵大巖門偽將軍張足法悉衆拒衛國親奮擊大破之足法夜遁追至油閘闗而還復鎮逺城大兵既定貴州大將軍貝子彰㤗進征雲南留衛國守貴陽二十年雲南平回任二十一年調湖廣總督二十二年廷議前綏逺將軍湖廣總督蔡毓榮劾衛國不聴調度貽誤軍機而衛國有平鎮逺功請免議諭曰董衛國遵朕指授勦定賊㓂恢復鎮逺實為可嘉蔡毓榮勞績逺出其下且二人敵體大臣無聴調度例以妬功故䧟人重罰著將蔡毓榮降五級調用先是御史蔣伊劾衛國縱兵俘掠至是江西總督于成龍疏辯十一月衛國入覲瀕行諭曰爾在外二十餘年地方事宜知之已悉前此用兵之際未免騷擾閭閻今天下承平當思休養民力至於興革利弊尤在嚴飭所屬實力奉行爾前有勞績朕罔不知毋畏人言勉圖後效十二月衛國遘疾卒於任賜祭葬如例石琳兄子文晟石琳漢軍正白旗人都綂石廷柱第四子順治十四年由佐領兼禮部郎中康熙元年授山東按察使二年正月丁母憂十一月起補江南按察使三年六月以前在山東承追入官房地變價遲延降一級調用六年十二月授浙江鹽運使十二年五月遷湖廣下荆南道十三年襄陽總兵楊來嘉副將洪福叛應逆藩吳三桂踞房縣保康竹山煽誘醜徒嘯聚南漳縣之天門蘭山雞公等寨時出刦掠石琳同總兵劉成龍搜勦斬獲甚衆撫定各寨洞總督蔡毓榮疏報㨗功得㫖嘉奬十五年九月遷江南按察使二十年五月遷浙江布政使二十三年九月擢湖廣巡撫二十四年工部以建造太和殿檄催各省採運楠木杉木琳以楠木産自萬山之中挽運維艱疏請輾限部議不准上曰各省所運楠木杉木山路﨑嶇挽運艱難若限期太廹恐致擾民其令從容運送勿累民力二十五年十一月調雲南巡撫二十六年十二月疏言省城外松華壩并金汁等六河壩閘上引松華諸山之水源下以資昆明諸縣之灌溉額設嵗修銀八百兩貯庫以待不時之需自康熙二十二年修築後迄今四載屢被山水衝决致田禾淹没今急需修築勘估銀三千一百六十兩請動支貯庫嵗修銀俟工竣報銷事下部議行二十八年五月疏言臣奉㫖詳察賦役全書應行更改增刪者謹採訪輿情臚列八條一滇省自明初置鎮設衛以田養軍名曰屯田又有給指揮等官為俸聴其招佃者名曰官田其每畝租入較民賦十數倍猶之佃民納租於田主我朝開滇之始吳三桂留鎮就昔日之租數充正供之糧額相沿至今積逋逾多官民交困當改照民賦上則例起科者也一滇省鹽井有九竈户從井汲滷用柴薪煎煑工費甚繁以各井行鹽之多寡為每嵗徵課之重輕阿陋等六井井小課少辦納猶易若瑯井每觔征課六釐白井每觔征課八釐至黒井每觔征課一分六釐此明末亂時額外横加較明初原額每觔二釐有竒不啻數倍今即難議盡减如原額當减黒白二井照琅井每觔六釐者也一開化府自康熙四年吳三桂勦平土酋後勘丈額田七百五十九頃有竒每畝科米一斗六升三合較之在昔未設府以前每畝不過二三升相去懸殊且通省民糧最重者惟河陽縣上則田每畝征米八升一合有竒今當酌量减半與河陽縣一例者也一元江府由土改流吳三桂因官兵駐防糧運不繼遂於額糧之外别立名色曰田錢地講銀曰茶商税銀曰普洱無耗秋米曰浪媽等六寨地租以元江之﨑嶇山谷加此數倍之糧實難辦納所當各减其半者也一通海縣六寨地糧較民賦重㡬三倍當改照新定民賦科則􅑇嘉縣每糧一石徵條編銀四兩有竒較通省亦為偏重今既歸南安州附徵即應與州一例每糧一石徵條編銀一兩四分者也一麗江界連土畨古稱荒服吳三桂叛後割金沙江以内喇普地與䝉畨地去而糧額猶存所當刪除者也一建水州自明時設臨元𠫭將嵗派村寨陋規銀三百二十六兩馬料襍糧八十二石原由貪墨取求吳三桂搜括軍糧遂編入正額所當裁革者也一新平縣之銀場易門縣之銅厰開採年久礦斷山空商逃匠散各官捐賠課税難免派累小民所當盡與豁免者也兹當更造全書聖諭諄諄惟恐民情壅閼臣㑹同經管錢糧諸臣再四𠫭酌敬陳各條伏祈睿裁垂之永久疏下所司議俟全書刋定頒發遵行是月擢兩廣總督三十一年三月疏言瓊州總兵吳啟爵奏瓊州所屬黎地應設一州四縣建築五處城垣增兵防守等事部議令臣㑹同確核隨委惠潮道史起賢等渡海履勘復集省城公同商酌建城五處工費浩繁若依鎮臣所奏土石竹木就地取用近黎出力逺黎出米則以不滿九千丁之黎岐執數萬人之工役使農功盡棄田畝盡荒安保其甘心餓莩而不為刦掠至設立州縣所以治民今黎岐不通語言披髪祼身僅以片布遮其下體野性難馴其地半皆峻嶺髙山深林宻箐東西自薄沙營至寳停營只三百餘里南北自烏石營至藥安營亦不過三百五十里中間田畝皆就山溝零星耕種不足以供賦税安用强設無益之贅員且設官必設役每州縣嵗需工食千兩水土毒惡瘴氣彌漫外來之人不能服習易至損傷前明海瑞俞大猷諸臣議開通十字路者蓋由其時武偹廢弛邉臣全無經緯平日虚兵冒餉有事罔上邀功調兵十餘萬費餉數十萬動輙數年故為此議終未舉行今鎮臣誤執前人之説與現在情形逈不相符應毋庸議惟正北之水尾東北之太平營正西之薄沙東南之寳停皆黎人出入要路原撥鎮標兵三百名仍當留駐其増募之兵三百名亦作為經制責成鎮臣相險設防毋致踈虞再飭瓊州道府及近黎各州縣加意撫綏俾共沭皇仁於久逺疏至上曰閲瓊州輿圖周圍設州縣而黎人居中如果此處應取古人何為將周圍取之而在内彈丸之地反棄而不取乎不入版圖必有深意創立州縣建築城垣有累百姓不准良是三十九年十二月令總兵唐光堯勦撫出犯寳停營傷害兵丁之生黎王鎮邦等旋就撫投順因疏劾遊擊詹伯豸雷瓊道成㤗慎遣人入黎峝採取花梨沉香滋擾啓釁各欵請觧任勘究給事中湯右曾據掲紏劾言黎人拒鬬事起於上年十二月遲至一載始行題報有扶同掩飾希圖欺隠情弊詔石琳及巡撫蕭永藻提督殷化行回奏又命侍郎凱音布學士邵穆布往審詹伯豸成㤗慎論罪有差石琳察奏不先應降二級調用得㫖從寛留任四十一年閏六月疏報廣東連州排猺逞兇刦掠抗拒官軍傷害副將林芳把總陳溥及兵丁從役十餘人勅遣都綂嵩祝侍郎傅繼祖等赴粤㑹勦分扼隘口令同知劉有成守偹黄起鵬等入排宣播恩諭止擒首惡不及無辜各徭目遂率衆剃髪投誠獻出兇首九名正法嵩祝等以設立州縣善後事宜交琳辦理並與撫臣彭鵬提督殷化行悉心區畫琳奏言連州所轄油嶺等三大排以及香罏山等各小排連山縣所轄軍寮等五大排以及雞公背等各小排周圍約計四百餘里山嶺﨑嶇道途窄狹難以増設縣治莫若仍歸連州連山縣管轄擬於近猺適中之三江口建立寨城移駐理猺同知一員俾領把總一員兵百名不時入排巡察宣講上諭使知各務本業以杜非為仍兼管連州陽山連山二縣捕務再移駐副將一員都司一員守偹二員千總四員把總八員兵二千名分為左右二營令副將管領仍兼管連陽營俱𨽻督提綂轄所有同知及副將等官就近撥移其兵糧應於將軍督撫提鎮各標協營均勻𣲖出依所𣲖之數汰除老弱移歸新協連陽村莊舊有鄉勇素識排内情形今應就中考騐人力强壯技藝嫻熟者入伍食糧則汛守益嚴矣事下九卿議行十月卒於官年六十有四賜祭葬如例琳兄綽爾們官二等侍衛綽爾們子文晟於康熙十八年授蘇州府同知卓異陞雲南開化府知府以琳任巡撫迴避改廣西梧州府又因琳總督兩廣改山西平陽府三十三年二月諭嘉其居官有聲超擢貴州布政使九月遷雲南巡撫三十四年五月疏言滇省屯賦較民田重逾數倍乆在睿鑒中康熙二十七年以前逋欠屯賦銀七萬一千二百餘兩米麥十萬七百餘石已䝉皇仁盡行蠲免矣自二十八年以來逋欠仍復如舊非軍户敢於頑抗亦非各官不善催科也通省民賦最重者莫如河陽縣上則田糧每畝八升一合有竒地税每畝五升九合有竒若屯田則每畝四斗五升至七斗二升不等屯地亦每畝一斗五升至三斗八升不等前者臣叔石琳撫滇時曾因奉㫖詳核賦役全書瀝陳屯糧重困未經部覆仰懇聖恩將此屯賦悉照河陽縣上則例起科不特現種人户易於輸納即荒蕪無徵者亦莫不踴躍樂墾矣得㫖雲南屯田錢糧較民田額重數倍民人苦累嗣後屯田賦額照河陽縣民田上則徵收下所司知之三十六年十一月入覲㑹安南國王黎維正疏言臣國牛羊蝴蝶普園三處為鄰界土司侵佔請勅諭歸還上詢及其事文晟奏言牛羊蝴蝶普園三處自明時内属我朝開闢雲南即在䝉自縣徵糧至康熙五年改歸開化府並非安南之地彼輕聴妄言擅行具奏而又遣兵到邉臣同督臣王繼文仰體皇上柔逺至意令防守者勿輕動臣思此地久入版圖且在内境斷不宜給還上命大學士詳議以黎維正輕聴妄言生事妄行申飭之三十七年七月疏言北勝州逼近蒙畨係金沙江下流第一要地請改為永北府下部議從之四十三年三月調廣東巡撫四十四年八月擢湖廣總督四十五年四月疏劾湖北荆州府所属之容美土司田舜年僭造宫殿兇惡不法各欵據附近土目向久忠等紛紛具控備錄原詞恭陳睿覽請勅察究尋又疏言田舜年居心殘毒行事乖張若不䋲之以法恐夜郎自大與各土司仇殺洩忿滋擾邉隅况側近紅苖勦撫未久宜彰國法以懾苖情今值田舜年來省謁見令暫留候㫖不敢姑息養癰致貽後患五月疏言臣閲邸抄奉㫖石文晟所奏并所録各土司呈詞三摺俱抄錄發與湖南巡撫趙申喬湖廣提督俞益謨閱㸔以為何如勿得相商各出所見具奏仰見聖明詳慎至意臣自應静候睿裁今復檢出田舜年從前叛從吳逆及投誠後逐年不法原案偹錄二摺附陳御覽田舜年已發交按察司㸔守請勅下兩撫臣提臣秉公究審六月疏報田舜年在省病故時上已遣左都御史梅鋗内閣學士二格㑹審遂合疏請追革田舜年原職以其所属户口收入版圖上復遣大學士席哈納侍郎張廷樞蕭永藻覆勘還奏田舜年未曾僭造宫殿其兇惡不法等事亦無實據業經病故其土職請以其子承襲誣控之向久忠等應枷責移徙内地石文晟不能詳察草率具題應降三級調用詔從寛以所降之級留任先是文晟以疾乞觧任疏留中未發四十六年五月諭大學士等曰石文晟人極粗鄙若為土司而罷其職似未得體此疏既自行引疾乞罷可允其請乃批發革任五十二年三月逢慶典復原品五十九年八月卒年七十有八王國安王國安漢軍正白旗人順治十八年由刑部筆帖式考授宏文院中書康熙六年補國史院典籍九年改内閣典籍十二年遷刑部員外郎十三年授内閣侍讀學士十六年奉命頒詔朝鮮二十一年六月擢内閣學士充纂修明史總裁官七月授浙江巡撫疏言嘉湖二幫白糧每年派運費銀三萬四千餘兩康熙三年撫臣朱昌祚請以漕船帶運並暫徵運費銀一萬八千餘兩添造新船六十四自是舡足敷撥無加派運費之累十五年以後改徵折色運船年久朽爛今白糧復徵本色請照康熙三年例將免徵運費銀三萬四千餘兩暫徵一年購船入幫抽選運白可永免加徵從之二十三年二月擢浙江總督四月調福建總督二十五年六月條陳臺灣事宜一臺屬士子請照内地例府學額進二十名臺灣鳯山諸羅三縣學照中縣十二名提學道不能渡海考校交分巡臺厦道就近管理一臺灣文武官三年後例得陞轉内地官與兵似屬一體現在兵丁到汛年月各不同請將此内有願在臺者聼留外餘按赴汛年月三年調歸原營仍於内地照數撥換以示軫恤一臺灣澎湖兵除糧米於本地支領外其餉銀取給内地往來海船每患飄溺每年祗四月風信極順十月波濤恬靜稍可無虞請於每年四月内即發夏秋二季餉銀十月内即發冬季並來年春季餉銀交該管官貯給得㫖臺灣駐防兵丁於三年内陸續盡數更換永著為例餘如所議行二十六年三月授刑部右侍郎五月轉左二十八年命以刑部左侍郎䘖管奉天府府尹事陛辭諭曰奉天為根本重地今聞遊民甚多務農者少一遇旱潦即難補救爾至任當勸民務農嚴察光棍游手之徒奉天田土旗民疆界相錯丈量明白以旗人餘地付之莊頭前府尹金世鑑奏請將旗人餘地俱與百姓耕種徵收錢糧所見甚小今已另遣官前往丈量雖係彼處户部之事爾在地方亦須公同詳察永定則例二十九年十月以前在福建總督任内明知巡撫張仲舉侵蝕錢糧扶同具題部議照徇庇例降三級調用得㫖革去侍郎仍留府尹任三十年疏言盛京刑部理旗民交渉事件府尹向不闗預似於職掌非宜查田土房産諸事原有府尹㑹同盛京户部審理之例請凡旗民互控案件府尹亦㑹同刑部審理部議從之三十三年奉天府洊饑命發山東倉穀四萬石由海道運賑國安以運穀四萬石不若米二萬石之易請將所指穀石與地方官酌易再需米州縣多近海俟運至三岔口即可分發各城應由渾河運送如水淺難行即以漁船分運經費既省輸送倍速諭部速行三十四年丁繼母憂三十七年補奉天府府尹四十六年遷兵部右侍郎四十七年轉左侍郎四十八年奉命赴陜西祭歴代帝王陵寝六月卒於涇陽縣子以巽官至内閣學士華善華善漢軍正白旗人都統石廷柱第三子豫親王多鐸以女妻之授和碩額駙尋任内大臣康熙六年以元宵節赴宴時譏誚莊親王博果鐸革内大臣仍留和碩額駙十三年三月以逆藩吳三桂反命華善為安南將軍率師防守鎮江四月杭州將軍圖喇奏耿精忠叛詔華善選所部漢軍二百名領以歩將二員赴浙江聴調遣五月鎮海將軍王之鼎奏耿逆結連海賊窺伺内地應調右路官兵集天寧洲訓練詔華善督所部兵習水戰九月命簡親王喇布為揚威大將軍統兵駐江寧華善與王之鼎等㕘贊軍務十五年四月改授華善平㓂將軍統轄江南滿洲蒙古兵十六年九月簡親王駐江西疏請増兵詔華善率江寧徽州所駐滿洲䝉古漢軍赴簡親王軍前以平冦将軍印留付江寧副都統科爾擴岱十七年三月授定南將軍詔率兵進湖南駐守茶陵閏三月奏茶陵兵少恐吳逆乘間自衡州出犯安仁攸縣請増調以資防禦時簡親王率師進湖南詔即以簡親王統師駐茶陵六月詔華善進守永興八月奏言永興道阻難通且兵力單弱致行期稽滯詔責華善調赴永興為日已久乃藉口兵單道阻逗留不前俟事平察議諭趣以設策勦賊并力進征尋簡親王疏報吳三桂病死永興賊兵解去議政王等言華善不赴永興應革職在簡親王軍前披甲効力上曰華善自六月調赴永興迄今未至殊負厥職我國家将士凡有調遣俱即馳赴從未有如此遲延觀望者姑免革職披甲付将軍穆占令隨營領隊効力十八年三月穆占奏副都統布舒庫前鋒營總塔勒岱等擊敗偽將軍吳國貴范齊韓於永州華善預有功二十二年二月議政王等追論不急救永興罪擬革職籍沒家産上以華善尚未僨軍寛免籍沒二十七年三月華善疏言臣高祖布哈原係蘇完人姓瓜爾佳明成化年間授建州左衛都指揮僉事臣曽祖阿爾松阿嘉靖年間襲職臣祖石翰移居遼東臨沒時囑臣伯父石國柱石天柱臣父石廷柱曰我雖暫來漢地然此心依戀故土爾兄弟當力成吾志務建功業以歸本主其後太祖高皇帝兵臨廣寧臣伯父國柱天柱臣父廷柱相率岀迎隨獻廣寧城太祖高皇帝見而大喜曰我國之人仍歸我國恩遇特優自是臣父隨征無不奮勇當先太宗文皇帝知臣父本出滿洲命轄滿洲精兵後乃改轄漢軍伏念臣父雖統漢軍實係滿洲近䝉皇上察取國初功臣家世名字臣伯父石國柱石天柱臣父石廷柱亦預其列謹備叙臣家世系乞恩改入滿洲旗籍事下部議以族人官職衆多應仍留漢軍旗下嗣後編審册内改造滿洲三十四年六月卒蔡毓榮蔡毓榮漢軍正白旗人漕運總督蔡士英次子初任佐領兼刑部郎中尋授京畿道御史兼㕘領遷秘書院學士康熙五年授刑部侍郎七年遷吏部侍郎九年授四川湖廣總督駐荆州十年疏言蜀省民少田荒宜廣招開墾凡候選及現任人員招民三百户者議叙即用即陞墾熟田畆寛限五年起科又言蜀省衝要營員請照沿邉例題補十一年疏言移駐弁兵其子弟有讀書者應准入籍考試十二年請裁遵義總兵官改鎮松潘事並下部議行是年十二月逆藩吳三桂反毓榮䟽言雲貴總督甘文焜手書遺臣言吳三桂反臣隨調沅州總兵官崔世禄疾赴貴州禦之令彛陵總兵徐治都永州總兵李芝蘭各率兵繼進上諭以宜令提督桑額疾馳沅州固守敇遣王貝勒大臣領八旗兵至荆州復命侍衛納爾泰傳諭毓榮籌備軍需十三年二月分設四川總督改毓榮専督湖廣以前此招民墾荒叙功加兵部尚書銜先是賊兵䧟沅州崔世禄降賊至是常徳澧州長沙岳州相繼失守部議毓榮當賊未䧟常徳時不即令桑額往守調度無能應革職命從寛留任戴罪圖功尋丁父憂命在任守制仍率緑旗兵偕八旗兵進勦毓榮遣中軍副将胡世英分防江口值叛鎮楊來嘉等據南漳縣之天門寨馬良坪諸處岀掠城邑毓榮遣襄陽總兵劉成龍率兵禦勦屢奏捷時廣西提督馬雄叛應吳三桂以逆書與兩廣總督金光祖詭言毓榮欲携緑旗兵數千赴岳州降賊光祖為毓榮婣戚宻遣人告之毓榮䟽陳狡謀狂噬請解任回旗上命以殫心供職勿因逆書引嫌十四年九月大將軍順承郡王勒爾錦奏増設緑旗兵援𠞰二營領以兩副將詔毓榮統轄之毓榮尋䟽言吳逆久據湖南而湖南之長沙與江西之吉安袁州接壤郴州桂陽又與吉安之龍泉接壤若楚省大兵由荆岳諸路進而江省大兵亦由袁州諸路㑹期進攻使賊三面受敵首尾不能相顧則我兵之勢合而賊兵之勢分一舉而膚功立奏也又言前此屢奉恩諭䧟賊官民來歸悉赦已往之罪且不惜數百萬帑金用兵𠞰賊無非為救民水火計惟是烽燧之區或不暇辨是民是賊恐俘戮者衆乞勅統兵王貝勒遴選滿洲賢員齎奉撫民勑諭隨師前進每収復城邑即稽察户口悉予安輯賊黨以外戒毋妄殺則脅從之衆無不聞風投順矣䟽並下所司議行十七年毓榮奉詔率兵五千隨貝勒尚善𠞰賊岳州因同討逆將軍鄂納等率舟師進𠞰栁林嘴及君山用礮擊沉賊舟殱賊無算賊復犯我糧艘夾擊敗之斬級千餘是年吳三桂死大兵以次恢復岳州長沙衡州等府十八年三月毓榮疏言洞庭湖中之君山有龍神廟久著靈顯唐封為利涉侯宋加封順濟王我朝順治四年王師過湖祈風有應委官葺新昨嵗七月大軍攻取湘隂風浪叠壊船艦臣同討逆將軍鄂訥登山䖍禱即風靜浪平克復岳城湖南諸郡底定固皆皇上威福所致亦賴湖神䕶助請勅賜封祀以旌神功䟽下部議視嶽鎮海瀆例封為洞庭湖之神遣禮部祭告十月毓榮疏言湖南惟辰州一府尚為賊據而楓木嶺辰龍闗兩路皆極險隘我軍士馬疲困宜暫休息俟糧草克繼㑹期進𠞰上命給事中摩囉郎中伊爾格圖傳諭曰逆賊敗遁負險未可專恃馬兵宜用緑旗歩兵前進聞蔡毓榮所属官兵甚為强壯以此兵力何難𠞰除將滅之冦從古險隘地方若不攻取豈有自定之理其如何恢復辰沅速定雲貴詳議以聞毓榮疏言辰沅水路直達武陵賊既扼險於陸又復據泊上游若我師由陸路進攻恐賊以輕舟順流反襲我後宜造八槳小船二百水陸並進並請専責一人總統諸路緑旗兵上允其議即授毓榮為綏逺將軍賜勑總統緑旗兵總督董衛國提督趙賴等並受節制十九年三月分路破賊楓木嶺辰龍關並撃壊賊船復辰州沅州及瀘溪溆浦麻陽等縣八月毓榮請頒𠡠招撫吳世璠上諭大學士等曰吳世璠為賊渠魁恃其險阻抗拒守兵殘害生民罪惡重大蔡毓榮不圖早滅逆冦乃欲降勑招撫率意妄奏着嚴飭之閏八月定邉大将軍貝子彰泰與毓榮由沅州進征貴州奏言緑旗兵與滿洲兵已㑹合一處若各自調遣恐未能并力奏功上命毓榮一切軍機闗白大将軍商酌以行十月毓榮同董衛國督兵復鎮逺府隨彰泰定貴陽二十年正月彰泰奏賊衆萬餘欲據盤江已遣兵固守鐵索橋以禦之上諭之曰大兵秣馬貴陽已經月餘今逆賊欲據盤江祗遣兵前往殊昧機宜彰泰蔡毓榮當即親統大兵撲滅賊衆平定滇中勿失機㑹三月毓榮隨彰泰抵雲南省城營於歸化寺偽將軍胡國柄等糾賊萬餘列象陣拒戰我師分隊進撃大敗賊衆陣斬國柄及賊衆無算十月逆孽吳世璠自殺其黨以城降雲南平毓榮還任湖廣總督復原職二十一年六月調雲貴總督疏言雲貴兩省俱險要邉疆又當新復之初督標兵舊設四千未足資彈壓請増兵一千分為五營又因議裁吳逆所設十鎮請改為六鎮在迤西者曰鶴麗曰永順曰楚姚䝉景在迤東者曰開化曰臨元澂江曰曲尋武霑又言中甸在金沙江外舊轄麗江土府為吳逆割畀蒙畨通商互市今互市已停而䝉畨所設喇嘛營官未撤宜令土知府木堯仍歸其地十月又奏籌滇善後事宜分别十款一曰蠲荒賦逆賊據滇八載按畝加糧驅之鋒鏑地廣丁稀今各府州縣衛所報無徵地丁額賦應亟予蠲除招徠開墾二曰制土夷前此土目世職不過宣慰吳逆濫加偽秩或至将軍總兵投誠之時權照偽銜給劄今當悉行追繳換給土職其應襲者年十三以上令赴儒學習禮起送承襲族人子弟准就試州縣舊被吳逆奪職者察明宗𣲖予襲以示綏柔三曰靖逋逃有逆属舊人鳥駭䑕竄者有征兵奉裁乘間免脱者有八旗僕從不隨師凱旋匿滇境者宜定首報賞格重懲窩隠所獲之人按律量從末減自必聞風投歸不致以畏死之故竄入生苖矣四曰議理財滇省賦稅無多兵食仰給他省惟産五金可令民自開礦硐而官總其税省㑹及禄豐䝉自大理增設爐座以廣鼓鑄故明沐氏莊田及入官叛産均令變價以裕錢本其田仍一例納賦又兵弁皆有餘丁宜令酌墾各營荒地起科後編入里甲則賦有餘而饟可節寔為邉儲至計五曰酌安揷逆属家人曾隨賊伍者應遣發極邉若僅受偽銜並未從行助逆宜免其遷徙以示矜全六曰收軍仗私造軍器者應坐謀叛論罪其土司收藏刀鎗及民人以鉛硝硫黄貿易者並當嚴禁七曰勸捐輸滇省民鮮盖藏偶有祲災無從告糴請暫開捐監事例以備積貯八曰弭野盜魯魁在萬山中初為新嶍阿䝉土人所據聚嘯為盜内通新平開化元江易門外接車里孟艮鎮元猛緬向者吳逆養冦自重授以偽職今雖震讋天威受土司銜仍宜厚集土練各兵坐鎮隘口以防後患九曰敦寔政兵燹之後宜整理撫綏其要在墾荒蕪廣樹畜裕積貯興教化嚴保甲通商賈崇節儉蠲雜派恤無告止濫差所在州縣即以十事考殿最立勸懲庶邉疆日有起色十曰舉廢墜學宫之設以育人材吳逆煽亂悉皆頺毁今武功既成宜敷文教有倡率捐修者録叙以勵之其逆黨所據官僚廨宇宜仍給為公署聴其自葺至通省稅糧既有成額宜均本色折色之數酌存留起運之經黔滇驛站一例酌增工食則民間永無派累矣疏入上以所奏各欵有合時務下九卿詹事科道議行尋諭曰土司等賴刀鎗捕獵以為生計勿槩禁止先是毓榮自貴州進征雲南時疏劾提督趙頼駐守貴州抗留檄調進征官兵議政王大臣以趙賴已奏明防守𦂳要難於遣發寢議毓榮復劾總督董衛國不聴調度違誤軍機上命事平時定議二十二年部議董衛國未曽違誤且有復鎮逺功請免議上以毓榮妬功誣奏下部議削五級二十五年閏四月改總督倉場侍郎十月改兵部侍郎十二月領侍衛内大臣佟國維等奏侍衛納爾泰自首前奉使雲南回京毓榮令其子琳餽以銀九百兩又内務府以新自雲南歸旗之革職知州文定國訐毓榮隠匿應入官婦女及徇縱逆黨状入奏詔法司勘鞫得寔擬斬立决籍沒命免死與其子琳並遣發黑龍江後赦還三十八年卒欽定八旗通志卷一百九十七
