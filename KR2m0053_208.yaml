body:
  text: 欽定四庫全書欽定八旗通志卷一百九十四人物志七十四大臣傳六十漢軍正黃旗一興李思忠城金玉和吳景道雷金維彭有德盛朱國治世髙爾位林周卜李蔭祖耿繼茂李李思忠子塞白理李思忠先世居鐵嶺父如梴明寧逺伯成梁之從姪也初官太原同知後罷歸寓居撫順我太祖髙皇帝天命三年大兵克撫順思忠來歸明年師克開原鐵嶺如梴家居與弟如梓及子一忠存忠俱死焉六年太祖定遼陽敕思忠收集其族人之流亡者思忠招徠户口並復故業上深嘉之授佐領豫騎都尉世職尋以擒獲間諜功晉世職至三等輕車都尉天聰三年太宗文皇帝親統大兵征明取遵化命思忠與參領英固勒岱留守既而明將謝尚忠等來攻城思忠開門出戰敵兵三進三却時大安口三屯營等十一城既降復叛明監軍道張春合步騎犯灤州貝勒阿敏怯不赴援灤州失守士卒奔潰阿敏大驚并檄遵化守將棄城東歸值遵化城中火器營猝為敵火箭所焚衆心恟懼思忠戒勿輕動徐結陳出城招明官之降者四人以行身自為殿及出關無一亡失者既歸上命議阿敏等棄城罪以思忠為偏禆非能主其事而貸之五年隨都統楞格哩等征明南海島未至遇明兵戰於茨榆坨擒十一人獲戰艦五敵復率衆來奪思忠迎戰炮傷頷不為動仍奮擊敗之晉世職為一等輕車都尉九年考察户口思忠所轄之沙河堡燕郎寨增丁百十有三晉爵三等男尋奉命駐守蓋州城崇德二年疏言遼陽各城今悉調丁夫修築而蓋州城垣又復穨陊部議丁夫不足應調餘丁供役查蓋州地處邉陲軍士防守靡寧其餘丁僅堪耕種今若棄農就役不過用土補苴而城工不堅嵗功亦廢不若就應修處所勤加巡視守護俟各城蕆工再集丁夫造甎修築則城垣永固而人得及時盡力農事得旨如所請行七年以漢軍分𨽻八旗思忠𨽻正黃旗順治元年隨豫親王多鐸征流賊李自成破潼關尋隨征江南克揚州招撫江北得十州縣三年二月奉命為西安駐防副都統三月擢陜西提督七年八年三遇恩詔晉爵一等男兼一雲騎尉十一年以年老致仕十四年七月卒賜祭如例子五人次子蔭祖别有傳第三子顯祖襲爵世祖賜名塞白理授二等侍衛任參領聖祖仁皇帝御極擢隨征江南左路總兵官康熙六年遷廣東水師提督八年改浙江提督招降海賊鄭錦之偽寧逺將軍林伯馨偽都督施轟等十三年逆藩耿精忠反塞白理疏言耿逆交通三桂結連鄭冦沿海所在賊䑸皆可揚帆直入而江南之崇明孤懸海外尤為可虞又黃巖圍困日久請援孔亟寧海象山新昌餘姚四縣賊衆蜂起恐冦據寧海斷我餉道請速援台州護守寧波疏入並奉敕授方略調兵防禦尋隨貝子傅喇塔擊走賊將曾養性等於台州十四年九月卒於軍年四十有三賜祭葬如例祀浙江名宦祠子李鐫襲爵金玉和金玉和遼東人後𨽻漢軍正黃旗太祖髙皇帝天命四年征明取開原還軍界藩玉和時為明千總與同官王一屛戴集賔等率二十餘人來降授參領豫三等男爵太宗文皇帝天聰五年擢禮部承政六年上幸演武場閲兵玉和同額駙佟飬性等率所轄漢軍擐甲列陳試炮得賜鞍馬八年考績晉三等男崇德元年都察院劾奏玉和與吏部承政李延庚互舉子弟事坐徇私罷任降世職為三等輕車都尉二年從上征朝鮮旋隨武英郡王阿濟格攻明皮島以前進之水師失利玉和不趨援論死上以其有率衆投誠功免死革世職四年復授參領六年隨大軍圍錦州屢擊敗明兵時明總督洪承疇部衆分據松山南三臺玉和率兵攻克之盡殱其衆敵乘夜犯我壕塹奮擊却之斬級五十七年錦州下復率兵攻克塔山城敘功豫騎都尉世職八年隨鄭親王濟爾哈朗征明寧逺攻克前屯衛中後所二城順治元年正月擢工部參政二月敘寧逺功晉三等輕車都尉八月以副都統隨征河南署懷慶總兵官時流賊李自成為大軍追逐竄陜西其黨二萬餘劫掠河南十月犯濟源縣玉和統兵往援至則城已陷夜半遇賊力戰中流矢殁於陳事聞下部議恤追晉二等男以其子維延襲雍正七年入祀昭忠祠吳景道吳景道遼東廣寧衛人後𨽻漢軍正黃旗太宗文皇帝天聰時授吏部啓心郎崇德元年改都察院理事官疏劾刑部理事官郎位貪汚不法狀鞫問得實黜郎位為民追贓免死尋賜內院學士都察院參政諸臣人户牲畜有差景道得一等優賜郎位銜景道劾已旋誘都察院筆帖式李民表同居令以八欵訐景道于法司鞫之悉誣李民表伏誅籍郎位半産入官景道以失察李民表違禁移居他旗罰如例順治二年授河南布政使尋擢河南巡撫時河北初定河南五府餘冦未靖寶豐宋養氣新野陳蛟商城黃景運等各聚衆數千人侵掠城邑景道檄總兵髙第副將沈朝華等分路捕剿飬氣蛟景運並就擒伏誅四年鄖陽賊王光泰率衆千餘犯淅川景道遣恭將尤現等與總兵張應祥合兵擊郤之五年羅山縣土賊張其倫據雞籠山寨結黨出掠景道遣都司朱國強佟文煥等分兵截擊攻破賊寨擒其倫及賊黨朱智明趙虎山等以奏得旨官兵蕩平賊寨有功人員察明敘賚生俘賊首張其倫等著即正法是年山東曹縣賊范慎行等煽誘河南寧陵商邱考城虞城儀封蘭陽祥符封邱諸邑糾衆剽掠屯據黃河北岸景道檄髙第率兵搗賊巢屢戰俱捷賊退據長垣第進蹙之賊竄蘭陽景道遣佟文煥率兵搜剿斬千餘人追至曹縣賊列柵拒守景道檄總兵官孔希貴自衛輝由胙城進兵斷其東路遣逰擊趙世泰都司韓進等率精騎疾馳分道夾擊師至東明賊分三路迎拒我軍左右合擊殱其徑兵數千餘衆潰散獲賊渠范慎行誅之得旨嘉奬下部議敘加兵部右侍郎七年晉本部尚書八年陜西商州賊何柴山等嘯聚突至盧氏縣夜襲趙世泰軍髙第統兵扼剿賊敗奔商南景道檄張應祥撲滅之九年以堵築汴河決口工竣與河道總督楊方興並賜鞍馬冠服及白金十年八月以老疾乞休得旨吳景道撫豫有年清勤素著據奏年逾七十積病日深情詞懇切準致仕仍下部議加恩晉一級廕一子入監十三年三月卒年七十有五賜祭葬如典禮贈太子太保諡慤僖祀河南名宦雷興雷興遼陽人後𨽻漢軍正黃旗太祖髙皇帝定遼東興以諸生選直文館太宗文皇帝設科取士興中式舉人授祕書院副理事官崇德元年特試內三院學士舉人生員興名列二等賜人五户及牲畜等物尋任都察院理事官順治元年十月授天津巡撫時土賊李聨芳張成軒嘯聚滄州南皮間興同總兵婁光先督師進剿成軒等竄遁我兵追至海口扼其去路賊驚潰投水死者大半興復遣兵搜捕餘黨斬其渠魁散脅從者歸農滄州南皮一路悉平疏言大沽海口為神京門户請置戰船以備海防下所司議行二年四月調陜西巡撫時陕西當流賊李自成擾亂後户口散亡興招徠撫綏之疏述其狀得旨嘉奬屢賜冠服裘馬三年肅親王豪格奉詔統師由陕西進征四川師未至流賊孫守法等掠興安興慮賊勢猖獗急移潼關兵三百駐防商州復值叛鎮賀珍掠漢中興密檄漢羌道胡全才設備固守以待大兵及肅親王統師至賊皆竄遁是年九月興疏言隴州關山為河西咽喉西安藩蔽山險林深盜賊易于出沒應設兵分防控禦臨洮鞏昌與西番為鄰請暫留屯軍以防邉隘並下部議行四年四月以疾解任十年八月起授河南巡撫未至任卒賜祭如例贈兵部右侍郎廕一子入監祀陜西名宦祠金維城子世礪金維城漢軍正黃旗人總兵金玉和之子也初由侍衛授參領太宗文皇帝崇德元年大兵征明錦州維城奉命同副都統金礪督運軍糧三年任兵部副理事官四年擢鑲白旗漢軍副都統五年隨鄭親王濟爾哈朗圍錦州明兵自城出戰維城同都統石廷柱率兵擊郤先後攻克其臺十有八屢敗松山杏山敵衆六年松山兵來奪我紅衣炮擊之遁七年錦州下移師攻克塔山杏山城維城皆在事有功豫雲騎尉世職是年六月調正白旗漢軍副都統兼任兵部參攻十二月奉命率漢軍馬步兵四百駐防錦州八年隨鄭親王征明寧逺克中後所前屯衛二城敘功晉世職為騎都尉順治元年定都燕京改六部參政曰侍郎維城仍任兵部侍郎兼副都統四年考績加世職一雲騎尉五年隨鄭親王征湖廣六年攻克湘潭縣趨寶慶擊敗明桂王朱由榔將馬進忠王進才袁宗第等追剿至武岡沅州靖州俘斬無算七年凱旋得優賚遇恩詔晉世職至一等輕車都尉九年調正黃旗漢軍副都統十年以總兵任珍擅殺懼罪行賄兵部事覺部臣均坐降革維城罷任降世職為三等輕車都尉十五年卒長子世需襲職次子世礪初任佐領康熙十七年隨平南將軍賚塔征福建擊敗海賊於江東橋太平寨諸處十八年賊將劉國軒合衆萬餘犯漳州世礪督兵進戰中流矢殁賜恤豫雲騎尉世職孫興祚襲雍正七年以世礪入祀昭忠祠彭有德彭有德漢軍正黃旗人順治元年由將材從大兵入關二年授山西大同都司尋遷逰擊管右衛路參將事五年十二月逆鎮薑瓖叛遣人持書招有德降有德囚其使同城守備王曰吉等隂通賊有廢辨閻某糾衆圍有德署炮石並發有德奮勇突圍奪門出妻妾子女及家屬六十餘人皆遇害馳至英親王阿濟格軍前告瓖叛狀並呈逆書隨奉令同守備梁化鳳攻大同城又率兵至右衛招撫賊衆賊于城上施炮穿有德甲不為動復雲岡威逺等堡六年十月敘大同戰功遷參將管陽和副將事九年十月授浙江杭州副將陽和軍民具狀乞留下部議準以升銜留任十一年十一月新設大同總兵詔以有德充補尋加署都督僉事十八年加署都督同知康熙八年正月因老病乞罷得旨以原官致仕十六年十一月卒賜祭葬如例朱國治朱國治漢軍正黃旗人順治四年由貢生授固安知縣洊擢順德知府霸州道十五年內升大理寺少卿十六年四月遷大理寺卿十一月擢江寧巡撫明年春劾布政使陳培正庸劣纍民罷之時海賊鄭成功盤踞外洋出沒江南濵海州縣國治疏言鄭逆未靖欲破狡窟必先度形勢賊衆負險我師逺涉風濤其勞逸不同賊衆熟識海道我師弓馬便捷其素習不同水師舟楫較之賊船大小懸殊其攻取器用不同臣謂以守禦戰凡海邉江口多設墩臺待賊勢困援絶乘間攻之自能擒渠獻馘下所司議行十八年疏言海防緊要請移蘇州海防同知于常熟移松江海防同知于上海各令其督修沿海橋梁馬路墩堡與各營汛將辨相機䇿應使任専而事無歧誤從之又疏言蘇松常鎮四府錢糧抗欠者多因分别造册紳士一萬三千五百餘衙役二百四十人敕部察議部議現任官降二級調用襟士褫革衙役照賘治罪有差時有造妖言惑衆者吳縣潘應祥溧陽端應用等國治先後捕誅之康熙元年丁父憂不候代歸部議擅離職守革職聖祖仁皇帝既親政詔起用十年補雲南巡撫時吳三桂以平西王留守滇黔收畜亡命潛謀不軌十二年七月詭請移藩錦州上念三桂久握重兵恐滋蔓生變特允所請遣侍郎哲勒肯學士傅達禮至雲南經理其事三桂期以十一月二十四日啓行國治方疏請增設驛堡撥協夫馬以待遷移而三桂與逆黨胡國柱夏國相馬寶等密謀叛逆舉兵扼守關隘先期三日邀國治及按察使李興元雲南知府髙顯辰同知劉崑脅之叛皆不屈國治罵賊尤烈遂遇害二十年雲南平上命驛送國治櫬及家屬回京二十一年諭曰朱國治當逆賊吳三桂反叛之初抗不從逆遂被殺害捐軀殉難深為可憫其從優議恤乃加贈户部右侍郎豫祭葬如典禮廕一子入監世宗憲皇帝時入祀昭忠祠髙爾位髙爾位漢軍正黃旗人父勳明錦州衛副將從總兵祖大夀投誠爾位順治四年舉人初任直𨽻南和知縣九年四月行取授監察御史十月巡按陕西十一年四月奏言邇來姦徒營謀委署州縣佐二昔之衙蠧地棍今之典史職雖卑而有父母之呼兼有巡捕之責無職而官非該管道府受賄因何濫委如任縣典史楊顯耀等概係積蠧快皂惡棍鑽營代補小民莫敢誰何請敕部行督撫確查允委官一并重處再州縣乏員本府廳官夤緣委署在府官待為同堂曲徇優容新任箝口結舌一惟唯唯至如州縣積蠧事露鑽之府廳府廳衙蠧不法鑽之司道恃衙門為藏姦之藪視小民為網中之魚統祈天語申飭今後州縣乏員萬不能候新舊交代者須擇才品俱優之隔府官暫署如貪汙不法道府立參徇縱連坐各省大小衙門及在京五城積蠧概行革汰並得旨允行六月巡視中城奏言官餵馹馬州縣中十無一二民應者十八九鄉愚不能自應倩之馹棍勒索遂意然後代應遇軍機傳報使客郵符竟無一馬驛棍逃避仍拘民應更可異者府廳司道總兵私遣貟役皆騎驛馬雖屢奉嚴綸而官役私牌日行州縣不敢不應又不敢册報甚至私牌內有擅批上司免報者請今後一應紙票及過往參謁各官統禁騎驛馬非兵部火牌勘合不許濫應違者驛傳道揭部請旨重懲各省州縣驛馬里馬照賦役額設協濟銀兩或鄰封協銀于每季終出毫不纍民甘結報部科查照有仍前者許科道糾參不發覺者連坐更有請者直𨽻正順廣大等八府屬解運芝麻棉花二項腳費數倍大為民害伏乞敕部照陜省彚解藥材例責成本府不經民手部議從之十二年六月巡按山西十三年六月條奏晉省夙弊一司道府廳衙蠧犯贓本管失察應議處一州縣到任十日內查前任起存錢糧毋得逾定限道府徇隱者連坐一見貨抽稅不得以無貨而包稅無鋪而納課致商賈褁足年有豐歉以有餘補不足並下部議行十四年十月奏請布按監司內升未任事之先皇上親試觀其年貌詢其政事才識兼優者令任事年力衰邁平常者别用下部知之十五年七月遵旨條奏興利除害事宜一齎奏縣役馬上不許擅用大小皮包以恤驛困一升遷大小官員不許預調夫馬衙役不許出境迎接一學臣考試進黜之數不可太懸每考必確訪學霸數名按律究擬並下部議行十月巡視兩淮鹽政十六年六月海冦鄭成功犯瓜洲爾位出揚州城護解鹽課銀為總督亢得時所劾上諭髙爾位身為御史聞警即當率屬固守乃賊尚未至先借端出城致令百姓驚逃深為可惡令解任該督撫嚴察具奏十七年五月總漕蔡士英奏爾位于十六年六月十六日起解課銀十四萬兩次日賊陷瓜洲即出城送至髙郵于二十日回揚賊鋒甚熾恐致不虞于二十二日罄發庫項十一萬兩遣運判郭顯功押解進京舊例原無鹽院親送之條緣乏兵護親送至淮安至七月二十四日回揚下吏部會同都察院議尋議爾位雖無城守責但聞警當協守城池乃以送鹽課為詞兩次出城應議處事在赦前免議得旨俞允康熙三年三月內遷順天府府丞四年兼理崇文門稅務十七年遷通政使十九年正月授左僉都御史十二月遷奉天府府尹二十二年擢刑部右侍郎二十三年轉左二十五年丁母憂二十八年服闋補刑部左侍郎兼管右侍郎事二十九年三月授佐領三十年正月以疾乞休諭照舊供職六月擢工部尚書十月以疏濬城河浮估降補通政司參議命以所降級休致四十年十二月卒年七十七李蔭祖子鈵李蔭祖漢軍正黃旗人陜西提督李思忠次子順治五年由廕生授户部員外郎八年遷郎中九年擢都察院左僉都御史十一年二月命同尚書巴哈納等分賑保定諸府旋授直𨽻山東河南總督加兵部尚書銜疏請豁免被災州縣秋糧又以流民令歸原籍恐道殣者多請隨地安集即時散賑又疏言直𨽻瀕海汛地北塘澗河黑洋宜分兵駐守至禁止海船恐魚鹽米麥不能轉運請令官為列號稽察出入則商民俱便疏並下部議從之十三年四月疏劾河南管河道方大猷侵蝕工銀巨萬請逮治以除民害上切責河道總督楊方興不先舉發革大猷職下撫按鞫實論絞先是流賊髙鼎據五臺山有年由三岔口出擾正定諸府至是蔭祖遣井陘道陳安國撫降之黨盡散尋疏言太行據天下之險三岔適當其衝林密山深藏姦甚易自髙鼎降後餘黨多散民間雖遣兵往戍惟恐視營壘為傳舍仍致貽患飬癰請改設額兵六百統以逰擊一員専司守禦從之十二月上諭吏部曰三楚要地時方用兵總督職任綦重李蔭祖年力富強才猷精敏其加太子太保總督湖廣軍務兼理糧餉時大兵進剿貴州而湖廣未靖郝永忠袁宗第劉體純李來亨等擁衆十餘萬據鄖襄間侵擾糧運蔭祖疏言榖城地當四達賊騎出沒請移襄陽水師及均黃漢陽諸營兵二千令副將于大海率以駐守扼賊上流又言九溪界連巴蜀壤接容美永順桑植保靖四土司賊人窺伺肘腋請撥武昌洞庭營兵一千駐九溪屯備並下部如所請行十五年漢陽天門潛江沔陽水災蔭祖奏請賑恤諭曰漢陽安陸二府水勢漲溢窮民無食無居深軫朕懷其令督撫按速圖多方拯恤務令得所十六年經略大學士洪承疇奏調湖北提鎮標兵六千駐守雲南蔭祖以承疇已調湖廣兵萬三千五百有竒所留提鎮標兵未可再調請敕承疇就近召募其略曰緑旗兵抽調在外難保其不逃如承疇所擕長沙兵豢養數載其強壯者于額餉外加給優厚去嵗進征貴州逃遁尚多此可慮者一湖南嵗祲新收降衆不下數萬糊口維艱倘江西及兩粵土賊乘間蠢動何以制之此可慮者二流賊竄伏鄖陽諸郡向因我兵防禦多方不敢輕離巢穴若守兵盡調恐賊勢內訌雲貴餉道中梗此可慮者三滇中從賊兵丁多竄伏山谷今若募之入伍應時即至可省驛送之費其便一此輩生長賊營不習耕種一旦失業嘯聚堪憂有額餉分給亂萌自息其便二迤西𬗟甸地利惟滇人熟知敗逃賊將皆所素識遇有征戰可期奮往直前其便三疏下部議並如所請是年蔭祖疏言郝永忠等諸賊流毒全楚界連川陕河南非厚集兵力無以資撻伐請敕四川總督李國英駐兵重慶首扼巫峽旁塞達州門户以西安將軍富喀禪統兵趨興安會剿其河南協剿兵亦赴襄陽聽調扼賊去路臣請率緑營兵及駐防荆州徑旅一出彛陵一出襄陽一出鄖陽三路並進搗賊巢穴以期迅奏膚功疏既上會海賊鄭成功犯江南詔將軍明安達哩率荆州駐防兵赴援部議暫寢其事仍敕所在督撫鎮將相機撫𠞰十七年以疾乞罷命還京調治康熙三年六月卒年三十有六賜祭葬如例祀直𨽻河南山東湖廣名宦子鈵康熙六年任佐領八年授兵部督捕員外郎十三年以參領隨大兵剿逆藩吳三桂凱旋遷刑部郎中尋遷監察御史二十七年湖廣督標裁兵夏逄龍糾衆倡亂大兵往剿給事中談誼以湖北藩臬道府有已授而未之任者請嚴立限期上命未蒞任者並赴京候補另選員引見授鈵湖北按察使與布政使于養志糧道王道熙知府武廷適等馳驛赴任二十九年調廣西按察使尋遷福建布政使內升太常寺卿轉大理寺卿擢兵部侍郎三十五年上親征噶爾丹鈵同左都御史于成龍等督運中路軍糧出古北口至奎素沙深陷轂令士卒伐栁枝橫藉沙靣車得進至克嚕倫河復命轉餉赴西路大將軍費揚古軍凱旋敘功加四級三十七年二月授山東巡撫以有疾未能即往辭十一月改授安徽巡撫三十九年御史廖騰煃劾鈵抱疾不能理事下總督張鵬翮察實詔解任四十二年二月山東泰安等處飢上既命賑慮倉粟不繼許官民願助賑者酌豫議敘鈵請往效力四月卒于賑所年五十有六賜祭如例耿繼茂耿繼茂漢軍正黃旗人耿仲明長子順治初授子爵六年隨仲明征廣東仲明死繼茂代領部衆隨平南王尚可喜進征攻克南雄韶州廣州分兵平肇慶羅定髙州雷州八年四月世祖章皇帝命繼茂襲父靖南王爵九年明桂王朱由榔將李定國犯廣西連陷郡邑繼茂同可喜遣兵赴援恢復梧州南寧平樂潯州橫州十年潮州總兵郝尚久據城叛繼茂同靖南將軍喀喀木豐順總兵吳六竒進剿圍城逾月招降賊將王立功使為內應遂樹雲梯登城殱賊無算尚久投井死潮州及饒平揭陽澄海普寧諸邑悉平十一年李定國冦擾髙雷亷三府進圍新會繼茂同可喜及靖南將軍珠瑪喇擊走之定國遁據南寧復犯橫州繼茂統兵由梧州至橫州擊走賊衆進剿南寧定國逺竄十三年賜敕紀功嵗增藩俸千兩初繼茂與可喜攻下廣州怒其民久相抗凡丁壯輒誅戮即城中駐兵牧馬營造靖南平南兩藩府東西相望繼茂尤汰侈廣徴材木採巨石于髙要縣之七星巖工役無限制復創設市井私稅民苦之會布政使胡章自山東調廣東行至江西聞官廨為兵馬所占具疏劾繼茂可喜縱兵不戢狀繼茂奏辨曰前者我兵圍廣州九月被賊炮擊鋒傷不知凡幾城下之日即食肉寢皮未足泄憤俘縶實多至部衆初雖雜處旋即移駐北城未嘗久占官廨可喜辨亦同胡章坐誣罷任逾年髙要知縣楊雍建內擢給事中疏陳廣東採買濫役私稅諸大害謂一省不堪兩藩請移一藩於他省疏下所司察議時貴州雲南底定經略大學士洪承疇請分駐重兵於要地於是詔繼茂鎮四川尋改鎮廣西皆未及移十七年七月命移鎮福建時海賊鄭成功據金門島冦掠閩浙繼茂既移鎮與總督李率泰協謀征剿屢奏捷康熙元年繼茂偵知成功以狂疾死其子錦自襲偽延平王賊黨嫌隙漸生遵旨相機剿撫尋招降成功族兄偽總管鄭泰泰遣偽中軍楊來嘉吳蔭赴漳州獻其偽敕印成功弟鄭世襲偽都督鄭賡楊富陳宗率偽官數百兵衆數千降二年十月繼茂同率泰督兵渡海攻克厦門賊衆驚潰水師提督施琅以所募荷蘭國夾板船邀擊之斬級千餘乘勝取浯嶼金門二島錦與偽侯周全斌等遁走銅山復糾賊衆突犯雲霄陸鰲諸衛總兵王進功率兵與戰斬殺過半破賊巢於下蔡逸賊悉墮水死偽將張傑吳盛率兵民來歸三年三月繼茂復與率泰進功及海澄公黃梧統兵至八尺門由海道拔銅山賊巢鄭錦集艦數十遁台灣餘賊或斬或降獲戰艦軍器無算捷聞得旨嘉奬復加嵗俸千兩十年正月疏陳疾劇請以長子精忠代理藩務得旨俞允五月卒賜祭葬如例諡忠敏精忠襲爵後謀反伏誅次子昭忠三子聚忠别有傳李林盛李林盛漢軍正黃旗人父向舜以署佐領從豫親王多鐸南征督炮攻武岡寨克其城及攻揚州中炮沒於陳贈雲騎尉順治三年林盛襲父職七年恩詔加授騎都尉十五年隨信郡王多尼征雲南康熙元年授佐領十一年遷參領十八年擢山東登州總兵二十一年以舉首劣員郭盛春胡鼎通同行賄得旨嘉奬下部議敘加一級二十三年擢廣西提督三十六年諭奬其和輯兵民安靜謹守三十七年五月調陜西固原提督十一月陛見賜孔雀翎加右都督銜尋諭大學士等曰李林盛居官甚優前者陛見所奏絶無隱諱廣西武辨賢否皆從公敷陳其言朕皆書而志之矣三十八年七月御書明信敦義額賜之八月因湖南賊黃明等盤據廣西年久失於覺察奉旨降二級戴罪圖功四十年諭曰頃聞甘肅提督雷繼尊病故彼雖到任不久居官不下於孫思克今甘肅地方緊要固原提督李林盛雖已年邁其人材亦與孫思克等著調補甘肅提督四十三年以病免四十七年特授鑲紅旗漢軍都統五十二年以老乞罷得旨卿才品優長簡任都統正資料理覽奏求罷情詞懇切著以原官致仕五十三年卒賜祭葬如例周卜世周卜世漢軍正黃旗人父繼新管佐領任鎮江副都統順治八年二月卜世由監生授通政司副理事官五月遷大理寺副理事官十六年八月遷刑部郎中十八年十一月授長蘆鹽運使康熙六年巡視鹽政寧國珍奏卜世帶徴積年鹽課全完請豫議敘部臣以無例寢議聖祖仁皇帝諭曰原疏內稱道府等官完帶徴六萬兩以上者不論俸滿即升今周卜世自任事以來設法帶徴全完可嘉宜優敘內升以示奬勸尋定議依限全完鹽課三十萬以下即升及加級紀録有差卜世徴完三十五萬兩以上從優內升七年二月授右通政八年十月轉左十年四月遷太僕寺卿尋洊遷太常寺卿大理寺卿十二年四月擢倉場侍即十三年十月因逆藩吳三桂陷湖南四川詔設直𨽻山西山東河南等處援剿提督總兵招兵自隨以卜世為山東提督應設標下官員聽于武進士舉人內揀選給劄效用又自疏請兼用旗下舊人才能素著之參將祖朝選守備張所元等隨營十一月駐青州十二月調山西提督部議標設四營各官員兵丁及置買營馬盔甲器械聽其酌量行時陕西提督王輔臣叛賊將朱龍等四路侵掠陷延安卜世撥兵防河四月賊自石樓渡河卜世遣參將陳茂林擊走之十月疏言寧武一協管轄三關七路其兵馬錢糧盜案原係提督統轄嗣因提督奉裁歸大同鎮兼轄今臣既以提督統轄全省寧武文移由大同轉報往返稽遲請仍歸提督統轄為便疏下部議從之十五年九月疏劾山西巡撫達爾布令屬員派民出銀為己建立生祠請移蒲州守道駐平陽俾得規避衝要徇隱貪劣之平陽知府袁國梓臨汾知縣劉通濬不行糾劾以私怒拘禁無辜酷刑拷詢詔達爾布解任命侍郎果斯海往察審覆奏蒲州守道不應移駐平陽達爾布違禁建祠誣良濫刑屬實應革職杖流卜世所指袁國梓劉通濬贓欵屬虛應革職得旨免達爾布杖流卜世免革職十六年九月命率所轄官兵赴湖廣軍前標下參將祖朝選等各加銜一等兵丁加賞賚時賊帥吳應麒據嶽州十七年六月大將軍貝勒尚善令卜世統兵進洞庭湖駐君山規取嶽州賊乘鳥船出犯擊敗之復奉令防禦東湖卜世移駐扁山敗賊兵于西湖栁林嘴擊壞賊船四賊遁入城將軍鄂訥疏劾副都統德業立與卜世不截堵賊船詔大將軍貝勒察尼核覆奏卜世畏縮怯懦應革職得旨從寬留任戴罪圖功十一月移師九馬嘴等處絶賊糧道十八年嶽州賊遁卜世同輔國公溫齊等追剿至南靖港斬賊二千餘復由大井驛追殺賊衆至王家鋪太平川又同都統覺羅珠滿規復湘隂師至歸義河遇賊衆二千餘斬殺過半擒偽官四員進薄城下督兵竪雲梯登城殱賊三百餘入城撫集難民五千餘尋奉詔聽綏逺將軍蔡育榮調遣十九年三月進次大敷溪偵賊據麻一洑分兵水陸齊進扼據隘口斬二千餘人追奔數十里八月進征貴州攻克塘頭隘連克蔣溪鎮江閣小岩關大岩關太平關及鸚鵡渡殱賊六百餘乘勢恢復思南府二十年四月𠞰賊遵義城守偽總兵劉應昌等七人以城降賊帥馬寶遁據白蠟坎卜世乘勝追逐至鴨溪口殱賊一千五百餘撫降真安州仁懷綏陽桐梓等縣六月奉詔駐守遵義二十一年以雲南既平撤回時裁山西提督議政王大臣等奏卜世前經議敘功加十等因不截堵嶽州賊船抵罪嗣隨大軍剿滅各處賊衆應與開復或以文職用或候補提督得旨以本旗相當員缺補用二十四年管佐領二十九年授參領三十年擢正黃旗漢軍副都統三十二年擢都統三十五年二月上親征噶爾丹令卜世領正黃旗小營以從四十年正月以老疾乞休得旨原品休致四十四年四月卒賜祭葬如例欽定八旗通志卷一百九十四
