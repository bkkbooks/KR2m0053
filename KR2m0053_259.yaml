  text: 人物志一百二十五列女傳五八旗滿洲列女傳三正黄旗滿洲馬甲穆爾泰之妻胡耶氏正黄旗滿洲前鋒䕶軍武格之妻李佳氏正黄旗滿洲䕶軍校穆撓之妻圖色勒氏正黄旗滿洲䕶軍恩貴之妻鈕祜禄氏正黄旗滿洲䕶軍噶爾哈納之妻納喇氏正黄旗滿洲䕶軍保夀之妻薩克達氏正黄旗滿洲親軍穆可登之妻𤓰勒佳氏正黄旗滿洲前鋒䕶軍費揚古之妻雅爾胡氏正黄旗滿洲馬甲霍商之妻王氏正黄旗滿洲䕶軍伽藍保之妻馬佳氏正紅旗滿洲馬甲達偉之妻薩克達氏正紅旗滿洲親軍劉存柱之妻富察氏鑲白旗滿洲領催保格之妻余機勒氏鑲紅旗滿洲䕶軍徳山之妻蕭氏正藍旗滿洲三等䕶衛顔昌之妻裕瑚魯氏正藍旗滿洲中書常海之妻奚氏正藍旗滿洲官學生鄂撥諾之妻富察氏正藍旗滿洲䕶軍哈達之妻索竒勒氏正藍旗滿洲䕶軍杭州之妻劉佳氏正藍旗滿洲前鋒䕶軍巴秋之妻吳查氏正藍旗滿洲馬甲廣蘇之妻富察氏正藍旗滿洲筆帖式薩爾泰之妻孫查氏正藍旗滿洲親軍蘇林泰之妻舒穆禄氏正藍旗滿洲䕶軍鄂樂渾之妻白氏正藍旗滿洲筆帖式薩海之妻孫查氏正藍旗滿洲前鋒䕶軍葛徳之妻寜古塔氏正藍旗滿洲䕶軍海估之妻劉佳氏正藍旗滿洲領催花色之妻蘇佳氏正藍旗滿洲䕶軍杭周之妻張氏正藍旗滿洲筆帖式佟什圖之妻伊拉理氏正藍旗滿洲䕶軍那爾拜之妻李佳氏正藍旗滿洲䕶軍拉格之妻牛鄂托氏正藍旗滿洲三等䕶衛寳保之妻納喇氏正藍旗滿洲䕶軍二雅圖之妻李佳氏正藍旗滿洲親軍李九之妻馬佳氏正藍旗滿洲筆帖式常禄之妻邵佳氏正藍旗滿洲領催齊格之妻蘇佳氏以上俱於雍正元年旌表鑲黄旗滿洲生員陸格之妻牛佳氏鑲黄旗滿洲弓匠武實之妻黄佳氏鑲黄旗滿洲藍翎侍衛都普達哈之妻𤓰勒佳氏鑲黄旗滿洲前鋒䕶軍卜格實哈之妻托濶羅氏鑲黄旗滿洲䕶軍牛鈕之妻費莫氏鑲黄旗滿洲䕶軍馬奢之妻白約特氏鑲黄旗滿洲領催蘇爾納之妻費莫氏鑲黄旗滿洲䕶軍黒色之妻黄佳氏鑲黄旗滿洲䕶軍雅圖之妻𤓰勒佳氏鑲黄旗滿洲領催六十之妻趙氏鑲黄旗滿洲䕶軍鈎塞之妻伊爾根覺羅氏鑲黄旗滿洲馬甲遘色之妻郎氏鑲黄旗滿洲䕶軍校明珠之妻圗克坦氏鑲黄旗滿洲領催達里善之妻希布蘇氏鑲黄旗滿洲䕶軍敷喇之妻蘇拉喇氏鑲黄旗滿洲䕶軍武格之妻碧魯氏鑲黄旗滿洲䕶軍胡什寳之妻烏札拉氏鑲黄旗滿洲馬甲班塔哈之妻宗氏正黄旗滿洲馬甲捫珠之妻巴雅拉氏正黄旗滿洲䕶軍巴海之妻覺羅氏正黄旗滿洲䕶軍達蘭泰之妻汪佳氏正黄旗滿洲馬甲王格之妻𤓰勒佳氏正黄旗滿洲馬甲邁藍之妻𤓰勒佳氏正白旗滿洲馬甲李保柱之妻覺羅氏正白旗滿洲騎都尉色勒之妻𤓰勒佳氏正白旗滿洲䕶軍阿爾柱之妻白氏正白旗滿洲䕶軍碩塞之妻白氏正白旗滿洲䕶軍額爾納之妻𤓰勒佳氏正白旗滿洲䕶軍四格之妻鈕祜禄氏正白旗滿洲䕶軍索爾代之妻烏蘇氏正白旗滿洲䕶軍䕃珠之妻佟佳氏正白旗滿洲䕶軍伊喇器之妻張佳氏正白旗滿洲領催索倫之妻髙佳氏正白旗滿洲閒散胡什納之妻布雅木齊氏正白旗滿洲馬甲李保住之妻布雅木齊氏正白旗滿洲三等侍衛和克杜之妻白雅喇氏正白旗滿洲馬甲何雅圖之妻黄佳氏正白旗滿洲閒散胡什納之妻趙佳氏正白旗滿洲䕶軍白三之妻舒穆禄氏正白旗滿洲䕶軍碩爾戴之妻烏蘇氏正紅旗滿洲馬甲吉藍阿之妻黄佳氏正紅旗滿洲馬甲伊思哈之妻姜佳氏正紅旗滿洲䕶軍多托之妻富察氏正紅旗滿洲親軍校查克丹之妻黄佳氏正紅旗滿洲䕶軍安圖之妻任氏正紅旗滿洲監生常金之妻尚圖氏正紅旗滿洲䕶軍五格之妻𤓰勒佳氏鑲白旗滿洲䕶軍馬爾泰之妻他塔喇氏鑲白旗包衣䕶軍觀音保之妻陳氏鑲白旗滿洲䕶軍雙鼎之妻張金氏鑲白旗滿洲䕶軍赫達色之妻馮阿氏鑲白旗滿洲䕶軍馬禮之妻唐氏鑲白旗滿洲筆帖式常留珠之妻覺羅氏鑲白旗滿洲前鋒䕶軍常索住之妻伊特莫氏鑲白旗滿洲前鋒䕶軍五格之妻郭洛羅氏鑲白旗滿洲䕶軍校傳爾禪之妻卜賽氏鑲白旗滿洲䕶軍吳爾圖之妻黄佳氏鑲白旗滿洲䕶軍六兒之妻吳氏鑲白旗滿洲䕶軍薩爾泰之妻墨爾徳宜氏鑲白旗包衣閒散髙義徳之妻陳氏正藍旗包衣閒散趙雅圖之妻許氏正藍旗滿洲馬甲張武之妻劉佳氏正藍旗滿洲䕶軍海明之妻葉胡魯氏正藍旗包衣閒散達雅圖之妻張氏正藍旗滿洲親軍索林泰之妻舒穆禄氏正藍旗滿洲雲騎尉穆可敦之妻米佳氏正藍旗滿洲䕶軍阿雅哈圖之妻索齊禮氏鑲藍旗滿洲中書武世泰之妻富察氏鑲藍旗滿洲馬甲佛保之妻揚氏鑲藍旗滿洲䕶軍三格之妻馬佳氏以上俱於雍正二年旌表鑲黄旗滿洲馬甲班塔之妻崔佳氏鑲黄旗滿洲䕶軍圖納之妻覺羅氏鑲黄旗滿洲䕶軍雲楠之妻𤓰勒佳氏鑲黄旗滿洲䕶軍噶爾都之妻佟葉氏鑲黄旗滿洲筆帖式廣格之妻張佳氏鑲黄旗滿洲䕶軍都義格之妻和哲氏鑲黄旗滿洲䕶軍馬爾泰之妻伊爾根覺羅氏鑲黄旗滿洲䕶軍納齊哈之妻穆燕氏鑲黄旗滿洲馬甲雅爾泰之妻紇石烈氏鑲黄旗滿洲䕶軍蘇倫泰之妻𤓰勒佳氏鑲黄旗滿洲䕶軍額麟起之妻布格察氏鑲黄旗滿洲䕶軍長夀之妻伊拉理氏鑲黄旗滿洲馬甲常夀之妻吳佳氏鑲黄旗滿洲䕶軍蘇合徳之妻廣氏鑲黄旗滿洲䕶軍葛穆徳之妻朱氏鑲黄旗滿洲䕶軍常安之妻巴雅喇氏鑲黄旗滿洲馬甲碩色之妻索綽羅氏鑲黄旗滿洲馬甲沙特胡倫之妻𤓰勒佳氏鑲黄旗滿洲前鋒䕶軍陀邁之妻薩宻勒氏鑲黄旗滿洲馬甲四格之妻趙氏鑲黄旗滿洲䕶軍齊雅夀之妻劉佳氏鑲黄旗滿洲藍翎侍衛薩克慎之妻伊拉理氏鑲黄旗滿