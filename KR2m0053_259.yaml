  text: 人物志一百二十五列女傳五八旗滿洲列女傳三正黃旗滿洲馬甲穆爾泰之妻胡耶氏正黃旗滿洲前鋒護軍武格之妻李佳氏正黃旗滿洲護軍校穆撓之妻圖色勒氏正黃旗滿洲護軍恩貴之妻鈕祜祿氏正黃旗滿洲護軍噶爾哈納之妻納喇氏正黃旗滿洲護軍保夀之妻薩克達氏正黃旗滿洲親軍穆可登之妻瓜勒佳氏正黃旗滿洲前鋒護軍費揚古之妻雅爾胡氏正黃旗滿洲馬甲霍商之妻王氏正黃旗滿洲護軍伽藍保之妻馬佳氏正紅旗滿洲馬甲達偉之妻薩克達氏正紅旗滿洲親軍劉存柱之妻富察氏鑲白旗滿洲領催保格之妻余機勒氏鑲紅旗滿洲護軍德山之妻蕭氏正藍旗滿洲三等護衛顔昌之妻裕瑚魯氏正藍旗滿洲中書常海之妻奚氏正藍旗滿洲官學生鄂撥諾之妻富察氏正藍旗滿洲護軍哈達之妻索竒勒氏正藍旗滿洲護軍杭州之妻劉佳氏正藍旗滿洲前鋒護軍巴秋之妻吳查氏正藍旗滿洲馬甲廣蘇之妻富察氏正藍旗滿洲筆帖式薩爾泰之妻孫查氏正藍旗滿洲親軍蘇林泰之妻舒穆祿氏正藍旗滿洲護軍鄂樂渾之妻白氏正藍旗滿洲筆帖式薩海之妻孫查氏正藍旗滿洲前鋒護軍葛德之妻寧古塔氏正藍旗滿洲護軍海估之妻劉佳氏正藍旗滿洲領催花色之妻蘇佳氏正藍旗滿洲護軍杭周之妻張氏正藍旗滿洲筆帖式佟什圖之妻伊拉理氏正藍旗滿洲護軍那爾拜之妻李佳氏正藍旗滿洲護軍拉格之妻牛鄂托氏正藍旗滿洲三等護衛寶保之妻納喇氏正藍旗滿洲護軍二雅圖之妻李佳氏正藍旗滿洲親軍李九之妻馬佳氏正藍旗滿洲筆帖式常祿之妻邵佳氏正藍旗滿洲領催齊格之妻蘇佳氏以上俱於雍正元年旌表鑲黃旗滿洲生員陸格之妻牛佳氏鑲黃旗滿洲弓匠武實之妻黃佳氏鑲黃旗滿洲藍翎侍衛都普達哈之妻瓜勒佳氏鑲黃旗滿洲前鋒護軍卜格實哈之妻托濶羅氏鑲黃旗滿洲護軍牛鈕之妻費莫氏鑲黃旗滿洲護軍馬奢之妻白約特氏鑲黃旗滿洲領催蘇爾納之妻費莫氏鑲黃旗滿洲護軍黑色之妻黃佳氏鑲黃旗滿洲護軍雅圖之妻瓜勒佳氏鑲黃旗滿洲領催六十之妻趙氏鑲黃旗滿洲護軍鈎塞之妻伊爾根覺羅氏鑲黃旗滿洲馬甲遘色之妻郎氏鑲黃旗滿洲護軍校明珠之妻圗克坦氏鑲黃旗滿洲領催達里善之妻希布蘇氏鑲黃旗滿洲護軍敷喇之妻蘇拉喇氏鑲黃旗滿洲護軍武格之妻碧魯氏鑲黃旗滿洲護軍胡什寶之妻烏札拉氏鑲黃旗滿洲馬甲班塔哈之妻宗氏正黃旗滿洲馬甲捫珠之妻巴雅拉氏正黃旗滿洲護軍巴海之妻覺羅氏正黃旗滿洲護軍達蘭泰之妻汪佳氏正黃旗滿洲馬甲王格之妻瓜勒佳氏正黃旗滿洲馬甲邁藍之妻瓜勒佳氏正白旗滿洲馬甲李保柱之妻覺羅氏正白旗滿洲騎都尉色勒之妻瓜勒佳氏正白旗滿洲護軍阿爾柱之妻白氏正白旗滿洲護軍碩塞之妻白氏正白旗滿洲護軍額爾納之妻瓜勒佳氏正白旗滿洲護軍四格之妻鈕祜祿氏正白旗滿洲護軍索爾代之妻烏蘇氏正白旗滿洲護軍蔭珠之妻佟佳氏正白旗滿洲護軍伊喇器之妻張佳氏正白旗滿洲領催索倫之妻髙佳氏正白旗滿洲間散胡什納之妻布雅木齊氏正白旗滿洲馬甲李保住之妻布雅木齊氏正白旗滿洲三等侍衛和克杜之妻白雅喇氏正白旗滿洲馬甲何雅圖之妻黃佳氏正白旗滿洲間散胡什納之妻趙佳氏正白旗滿洲護軍白三之妻舒穆祿氏正白旗滿洲護軍碩爾戴之妻烏蘇氏正紅旗滿洲馬甲吉藍阿之妻黃佳氏正紅旗滿洲馬甲伊思哈之妻薑佳氏正紅旗滿洲護軍多托之妻富察氏正紅旗滿洲親軍校查克丹之妻黃佳氏正紅旗滿洲護軍安圖之妻任氏正紅旗滿洲監生常金之妻尚圖氏正紅旗滿洲護軍五格之妻瓜勒佳氏鑲白旗滿洲護軍馬爾泰之妻他塔喇氏鑲白旗包衣護軍觀音保之妻陳氏鑲白旗滿洲護軍雙鼎之妻張金氏鑲白旗滿洲護軍赫達色之妻馮阿氏鑲白旗滿洲護軍馬禮之妻唐氏鑲白旗滿洲筆帖式常留珠之妻覺羅氏鑲白旗滿洲前鋒護軍常索住之妻伊特莫氏鑲白旗滿洲前鋒護軍五格之妻郭洛羅氏鑲白旗滿洲護軍校傳爾禪之妻卜賽氏鑲白旗滿洲護軍吳爾圖之妻黃佳氏鑲白旗滿洲護軍六兒之妻吳氏鑲白旗滿洲護軍薩爾泰之妻墨爾德宜氏鑲白旗包衣間散髙義德之妻陳氏正藍旗包衣間散趙雅圖之妻許氏正藍旗滿洲馬甲張武之妻劉佳氏正藍旗滿洲護軍海明之妻葉胡魯氏正藍旗包衣間散達雅圖之妻張氏正藍旗滿洲親軍索林泰之妻舒穆祿氏正藍旗滿洲雲騎尉穆可敦之妻米佳氏正藍旗滿洲護軍阿雅哈圖之妻索齊禮氏鑲藍旗滿洲中書武世泰之妻富察氏鑲藍旗滿洲馬甲佛保之妻揚氏鑲藍旗滿洲護軍三格之妻馬佳氏以上俱於雍正二年旌表鑲黃旗滿洲馬甲班塔之妻崔佳氏鑲黃旗滿洲護軍圖納之妻覺羅氏鑲黃旗滿洲護軍雲楠之妻瓜勒佳氏鑲黃旗滿洲護軍噶爾都之妻佟葉氏鑲黃旗滿洲筆帖式廣格之妻張佳氏鑲黃旗滿洲護軍都義格之妻和哲氏鑲黃旗滿洲護軍馬爾泰之妻伊爾根覺羅氏鑲黃旗滿洲護軍納齊哈之妻穆燕氏鑲黃旗滿洲馬甲雅爾泰之妻紇石烈氏鑲黃旗滿洲護軍蘇倫泰之妻瓜勒佳氏鑲黃旗滿洲護軍額麟起之妻布格察氏鑲黃旗滿洲護軍長夀之妻伊拉理氏鑲黃旗滿洲馬甲常夀之妻吳佳氏鑲黃旗滿洲護軍蘇合德之妻廣氏鑲黃旗滿洲護軍葛穆德之妻朱氏鑲黃旗滿洲護軍常安之妻巴雅喇氏鑲黃旗滿洲馬甲碩色之妻索綽羅氏鑲黃旗滿洲馬甲沙特胡倫之妻瓜勒佳氏鑲黃旗滿洲前鋒護軍陀邁之妻薩密勒氏鑲黃旗滿洲馬甲四格之妻趙氏鑲黃旗滿洲護軍齊雅夀之妻劉佳氏鑲黃旗滿洲藍翎侍衛薩克慎之妻伊拉理氏鑲黃旗滿