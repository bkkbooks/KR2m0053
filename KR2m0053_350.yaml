body:
  text: 表三附載八旗大臣題名國謹按制有専設滿缺者循舊制也有並設一滿一朝官漢之缺者因明制而兼用者也是皆官有定員員有定額其除授嵗月可以鱗次而相接故皆列為年表至於督撫提鎮則或用滿洲䝉古或用漢軍漢人初不限以成格盖外省大臣權宜歸一不可一柄兩持故因材因地因事因時各随宜而器使之是為滿漢互用之缺或此或彼不能使旗員授帝心受相承嵗月相接故不可列為年表而皆係變通簡在股肱心膂之臣又不可不列於通志故其例以官分類而各以授官先後為次序備列其名使後來有考焉八旗大臣題名一各省總督各省總督楊方興漢軍鑲白旗人順治元年七月任河道總督十四年五月休王文奎漢軍鑲白旗人順治二年五月任漕運總督四年正月革八年五月復任十年復姓沈十一年九月降馬國柱漢軍正白旗人順治二年十月任宣大總督四年七月調兩江河南總督六年八月河南改屬直𨽻任兩江總督十一年九月休孟喬芳漢軍鑲紅旗人順治二年四月任陜西總督十年六月改為川陜總督十一年正月卒張存仁漢軍鑲藍旗人順治二年四月任浙江總督十一月改為浙閩總督四年十二月解六年八月任直𨽻山東河南總督八年九月休羅繡錦漢軍鑲紅旗人順治二年十一月任川湖總督九年五月卒馬鳴佩漢軍鑲紅旗人順治三年三月任總督江南各省糧儲八年裁缺十一年二月任宣大總督九月調兩江總督十三年閏五月解佟養甲漢軍正藍旗人順治四年五月任兩廣總督五年閏四月遇害申朝紀漢軍鑲藍旗人順治四年七月任宣大總督五年三月卒陳錦漢軍正藍旗人順治四年十二月任浙閩總督九年七月遇害耿焞漢軍正黄旗人順治五年三月任宣大總督十二月革佟養星漢軍正藍旗人順治五年十二月任宣大總督十一年二月解馬光輝漢軍鑲黄旗人順治八年十月任直𨽻山東河南總督十一年二月解劉清㤗漢軍正黄旗人順治九年七月任浙閩總督十一年七月解十八年九月任河南總督康熙四年五月解祖澤逺漢軍鑲黄旗人順治九年七月任川湖總督十年六月四川改屬陜西調任湖廣總督十三年九月降李率泰漢軍正藍旗人順治十年六月任兩廣總督十三年二月調任浙閩總督十五年七月浙閩分為兩督任福建總督康熙三年六月解李䕃祖漢軍正黄旗人順治十一年二月任直𨽻山東河南總督十三年十二月調任湖廣總督十七年二月解馬之先漢軍鑲藍旗人順治十一年三月任宣大總督十三年三月調任川陜總督十四年八月卒金礪漢軍鑲紅旗人順治十一年正月任川陜總督十三年二月休佟代漢軍正藍旗人順治十一年七月任浙閩總督十三年二月解吳庫禮滿洲鑲白旗人順治十二年十一月任漕運總督十三年五月休蔡士英漢軍正白旗人順治十三年五月任漕運總督十四年八月解十六年八月復任十八年七月休郎廷佐漢軍讓黄旗人順治十三年閏五月任兩江總督十八年九月兩江分為兩督任江南總督康熙四年五月兩江仍併為一缺任兩江總督七年十一月解十三年七月任福建總督十五年十二月卒盧崇峻漢軍鑲黄旗人順治十四年正月任宣大總督十五年七月裁缺十八年十二月任廣東總督康熈三年五月丁憂五年三月任河道總督十一月調山陜總督六年十二月丁憂李國英漢軍正紅旗人順治十四年九月任川陜總督十八年九月川陜分為兩督任四川總督康熙五年十一月卒王國光漢軍正紅旗人順治十三年二月任兩廣總督十六年六月陞都統趙國祚漢軍鑲白旗人順治十五年七月任浙江總督十八年九月調山東總督十月調山西總督康熙元年二月休李棲鳯漢軍鑲紅旗人順治十五年六月任兩廣總督十八年九月兩廣分為兩督任廣東總督十二月休楊茂勲漢軍鑲紅旗人順治十六年十二月署河道總督十七年六月卸事十八年十二月任貴州總督康熙五年十月復任河道總督八年九月解十八年四月任四川總督十九年十一月随大軍進取雲南趙廷臣漢軍鑲黄旗人順治十六年正月任雲貴總卒督十八年九月調浙江總督康熙八年三月張長庚漢軍鑲黄旗人順治十七年四月任湖廣總督康熙八年九月解苖澄漢軍鑲白旗人順治十八年十月任直𨽻總督康熙五年十一月任四川總督六年十一月解祖澤溥漢軍鑲黄旗人順治十八年九月任山西總督十月調山東總督康熙四年五月解九年三月任福建總督八年九月解張朝璘漢軍正藍旗人順治十八年九月任江西總督康熙五年正月任福建總督十二月休于時躍漢軍鑲黄旗人順治十八年九月任廣西總督康熙二年三月解佟延年漢軍正藍旗人順治十八年十月任貴州總督十二月解卞三元漢軍鑲紅旗人順治十八年九月任雲南總督康熙四年五月改為雲貴總督七年六月終養白如梅漢軍鑲白旗人順治十八年九月任陜西總督康熙四年五月改為山陜總督五年十月革屈盡美漢軍鑲白旗人康熙二年十二月任廣西總督六年五月任漕運總督八年四月解朱昌祚漢軍鑲白旗人康熙三年六月任福建總督四年六月調直𨽻山東河南總督五年十二月革盧興祖漢軍鑲白旗人康熙四年二月任兩廣總督六年十一月革白秉貞漢軍鑲白旗人康熙六年正月任直𨽻山東河南總督八年九月休周有徳漢軍鑲紅旗人康熙六年十二月任兩廣總督九年正月丁憂十三年二月任四川總督十八年二月調雲貴總督十九年三月殁於軍麻勒吉滿洲正黄旗人康熙七年十二月任兩江總督十二年五月降莫洛滿洲正紅旗人康熙七年正月任山陜總督八年九月革十月復任九年十二月陞刑部尚書劉兆麒漢軍鑲白旗人康熙七年正月任四川總督八年三月