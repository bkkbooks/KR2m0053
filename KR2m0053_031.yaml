  text: 旗分志十七八旗佐領十七鑲藍旗滿洲佐領佐領管領鑲藍旗包衣鑲藍旗滿洲佐領下四參領至五參領第四參領第一佐領係第五佐領內餘丁康熙二十三年滿色管佐領時分編一佐領以其兄之子索達色管理索達色因病告退以其子索爾敏管理索爾敏故以其弟二等侍衛索齡阿管理索齡阿故以其子明福管理明福故以其叔祖之二世孫何慶管理第四參領第二佐領係國初以通巖地方來歸人丁編立始以阿古理之子雅爾璧希管理雅爾璧希故以其弟查達哈管理查達哈故以其兄之子查理管理查理年老辭退以雅爾璧希之子宴代管理宴代緣事革退以英格納管理後宴代事白仍以宴代管理宴代故以其叔父之子富喀管理富喀故以其族兄鄂理喀管理鄂理喀年老辭退以富喀伯父之子和爾琿管理和爾琿故以其子庫爾禪管理庫爾禪故以其子保住管理保住緣事革退以其叔父馬爾西管理馬爾西致仕以其兄之子拜靈阿管理拜靈阿故以其子巴倫泰管理巴倫泰故以其子佟明管理佟明故以其子富明阿管理第四參領第三佐領係第十一佐領內餘丁康熙二十三年阿蘭管佐領時分編一佐領以其叔父之孫郎中色和臣管理色和臣緣事革退以其弟四十八管理四十八因病辭退以其弟三等侍衛石良管理石良故以其叔祖之孫福住管理福住故以其叔瑪布海管理瑪布海故以其子舒靈阿管理舒靈阿故以其叔祖之孫經文管理第四參領第四佐領係第五佐領內餘丁康熙七年色爾古德管佐領時分編一佐領以其叔父之子前鋒侍衛庫爾訥管理庫爾訥故以其弟王府長史庫爾臣管理庫爾臣故以其子親軍校達爾占管理達爾占緣事革退以其弟之子典儀佟海管理佟海故以其子郎圖管理郎圖故以其子圖敏管理第四參領第五佐領係國初以通巖地方來歸人丁編立始以努燕管理努燕故以其子一等阿思哈尼哈番兼副都統西特庫管理西特庫年老辭退以其子一等阿思哈尼哈番色爾古德管理色爾古德故以其子寶柱管理寶柱故以其弟滿色管理滿色故以其子副參領滿德管理滿德故以其子德克吉善管理德克吉善故以其子福英管理第四參領第六佐領係第四佐領內餘丁康熙二十三年庫爾臣管佐領時分編一佐領以其子圓明園營總吳爾禪管理吳爾禪故以其伯祖之三世孫阿哈達管理阿哈達故以其子明林管理明林故以庫爾臣之四世孫布章阿管理布章阿故以其子書敏管理第四參領第七佐領係國初以多爾吉畢喇地方來歸人丁編立始以查爾糾之子二等阿達哈哈番雅木布禮管理雅木布禮從征陳亡以其弟三等遊擊瑚什屯管理瑚什屯故以其兄之子二等阿達哈哈番葉勒深管理葉勒深緣事革退以其弟一等阿達哈哈番又一拖沙喇哈番兼刑部郎中護軍參領格爾特管理格爾特故以其叔父之子護軍參領希佛訥管理希佛訥故以格爾特之孫噶哈泰管理噶哈泰故以其父一等阿達哈哈番又一拖沙喇哈番兼護軍參領噶爾圖管理噶爾圖故以其孫參領洪海管理洪海緣事革退以其叔祖之孫星德管理星德故以其叔祖之孫舉人商阿那管理商阿那降調以其伯祖之三世孫三等阿達哈哈番馬什泰管理馬什泰從征陳亡以其子德楞額管理德楞額故以其叔祖和綳額管理和綳額故以其叔曾祖之四世孫特通額管理第四參領第八佐領係第二佐領內餘丁康熙二十三年保柱管佐領時分編一佐領以其伯父格達管理格達故以其叔祖之二世孫親軍校穆占管理穆占故以其子長勇管理長勇故以其伯曾祖之二世孫五十八管理五十八故以其弟依拉齊管理依拉齊故以其子興安管理第四參領第九佐領係國初以薩克達地方來歸人丁編立始以舒塞管理舒塞故以其長孫三等阿思哈尼哈番西特庫管理西特庫故以其叔父之子倭和臣管理倭和臣故以西特庫之子一等阿思哈尼哈番桑格管理桑格故以其叔祖三等侍衛薩爾泰管理薩爾泰降調以其子監生達布海管理達布海故以其弟拉布海管理拉布海升外任以其子博海管理博海降調以其伯父之子恩保管理恩保故以其叔父那邁管理那邁故以其兄之孫富太管理富太故以其子富勒赫管理第四參領第十佐領係第九佐領內餘丁康熙二十三年薩爾泰管佐領時分編一佐領以桑格之子一等阿思哈尼哈番馬哈禮管理馬哈禮升任陵寢副總管以其子二等阿思哈尼哈番兼護軍參領舒保管理舒保故以其子西靈阿管理西靈阿故以其叔舒德管理舒德故以其兄之子西蒙額管理西蒙額故以其子瑪興阿管理第四參領第十一佐領亦係第九佐領內人丁先於康熙八年桑格管佐領時分編此佐領以阿蘭管理阿蘭故以其子達哈泰管理達哈泰故以其弟代友管理代友故以其子三等阿達哈哈番七十三管理七十三故以其叔祖之孫三達色管理三達色故以其子舒代管理舒代故以其弟富代管理富代故以其子薩炳阿管理第四參領第十二佐領係第七佐領內餘丁康熙二十三年希佛訥管佐領時分編一佐領以其子索珠管理索珠因病告退以其子奚馨管理奚馨故以其族弟洋海管理洋海故以其伯髙祖之二世孫索太管理索太故以其子祥寧管理祥寧故以其伯父之子武德管理武德故以其子額圖琿管理第四參領第十三佐領係康熙十三年以本旗各佐領餘丁編立始以尚書介山管理介山年老休致以其子增壽管理增壽故以其弟寧古秦管理寧古秦因病辭退以其兄侍郎登德管理登德故以其弟之子富柱立管理富柱立故以其伯祖之子丹桂管理丹桂故以其伯祖之二世孫恭太管理恭太故以其叔祖之二世孫富倫管理富倫故以其子常保管理常保故以其子文德管理第四參領第十四佐領