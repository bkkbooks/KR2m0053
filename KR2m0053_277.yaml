body:
  text: 人物志一百四十三列女傳二十三八旗漢軍列女傳一正紅旗漢軍陳進忠之妻李氏鑲藍旗漢軍千總余效孔之妻陸氏以上俱于順治十五年旌表正紅旗漢軍王國英之妻周氏順治十六年旌表鑲藍旗漢軍驍騎校寧可得之妻髙氏順治十八年旌表正白旗漢軍張文禮之妻閔氏鑲藍旗漢軍俞曰昌之妻吕氏以上俱于康熙元年旌表正黃旗漢軍馬甲薑國眀之妻于氏正紅旗漢軍祝時永之妻李氏正藍旗漢軍馬甲阿代之妻詹珠鑲藍旗漢軍李國柱之妻劉氏以上俱于康熙二年旌表鑲藍旗漢軍馬甲陳達漢之妻王氏鑲藍旗漢軍馬甲劉光漢之妻李氏以上俱於康熙四年旌表正黃旗漢軍逰擊王恱逺之妻馬氏康熙五年旌表正黃旗漢軍領催趙應選之妻寧氏正紅旗漢軍壯丁曹得有之妻溫氏正紅旗漢軍領催李九功之妻王氏鑲白旗漢軍通事李國進之妻蕭氏鑲藍旗漢軍艾懷英之妻馮氏鑲藍旗漢軍劉光明之妻蕭氏以上俱于康熙六年旌表正黃旗漢軍籓下陳復顯之妻吕氏正黃旗漢軍籓下崔天泰之妻趙氏正黃旗漢軍籓下黃世英之妻佟氏正黃旗漢軍籓下金貴之妻何氏正黃旗漢軍劉顯名之妻范氏以上俱於康熙七年旌表鑲黃旗漢軍壯丁盧永祚之妻戴氏正白旗漢軍輕車都尉王國興之妻張氏鑲藍旗漢軍雲騎尉達自稅之妻喬氏以上俱于康熙八年旌表正黃旗漢軍籓下宋引昌之妻余氏正黃旗漢軍籓下曾養德之妻張氏正黃旗漢軍籓下護軍文運亨之妻吳氏正黃旗漢軍籓下馬甲遲彥達之妻張氏正黃旗漢軍籓下廖廷鑑之妻周氏正黃旗漢軍籓下步兵凌自美之妻鄭氏以上俱於康熙九年旌表鑲黃旗漢軍守備唐圻之妻柯氏正黃旗漢軍領催黃成義之妻熊氏正紅旗漢軍張應魁之妻王氏鑲藍旗漢軍驍騎校寧維詔之妻左氏鑲藍旗漢軍孔有時之妻頗氏以上俱於康熙十年旌表正黃旗漢軍護軍宋之龍之妻郭氏正黃旗漢軍護軍徐履升之妻蔡氏以上俱于康熙十一年旌表鑲白旗漢軍間散劉大受之妻張氏正紅旗漢軍間散馬賜之妻程氏鑲紅旗漢軍間散孔承恩之妻于氏正藍旗漢軍間散彭元勳之妻鄒氏以上俱于康熙十二年旌表鑲黃旗漢軍甘肅巡撫張文衡之妻馬佳氏正紅旗漢軍間散何進成之妻黃氏正紅旗漢軍間散于時化之妻張氏正藍旗漢軍趙宗舜之妻洪氏正藍旗漢軍楊貴之妻陳氏正藍旗漢軍謝有成之妻李氏正藍旗漢軍廖克愛之妻沙氏正藍旗漢軍吳茂元之妻梁氏以上俱於康熙十三年旌表鑲白旗漢軍間散孔永正之妻白氏康熙十四年旌表正藍旗漢軍馬甲張有良之妻趙氏正藍旗漢軍馬甲張國泰之妻陸氏正藍旗漢軍馬甲胡達之妻孫氏正藍旗漢軍馬甲薑興周之妻李氏以上俱於康熙十五年旌表正黃旗漢軍間散董得榮之妻趙氏康熙十六年旌表正黃旗漢軍滄州知州成其美之妻曹氏正紅旗漢軍間散李遇春之妻薑氏正紅旗漢軍馬甲孫起龍之妻蘇氏正藍旗漢軍間散鞠士安之妻金氏以上俱於康熙十七年旌表正黃旗漢軍間散班瑜之妻王氏正紅旗漢軍間散韓廷松之妻邵氏以上俱于康熙十八年旌表鑲黃旗漢軍間散丁彥福之妻何氏康熙十九年旌表正白旗漢軍壯丁劉世祿之妻鄧氏正白旗漢軍壯丁王延柱之妻田氏正紅旗漢軍間散夏世華之妻劉氏以上俱於康熙二十一年旌表正紅旗漢軍馬甲于守正之妻耿氏正紅旗漢軍間散陳竒才之妻王氏鑲藍旗漢軍間散張玉眀之妻佟氏以上俱於康熙二十二年旌表鑲藍旗漢軍間散張巴之妻于氏康熙二十三年旌表正紅旗漢軍四川武隆縣知縣張羽興之妻石氏正紅旗漢軍馬甲傅天貴之妻于氏以上俱於康熙二十四年旌表鑲白旗漢軍間散陳世瑚之妻楊氏康熙二十六年旌表正白旗漢軍候補知縣王業昌之妻彭氏正白旗漢軍壯丁路世華之妻吳氏正紅旗漢軍間散龎天祿之妻王氏正紅旗漢軍間散唐有德之妻白氏以上俱於康熙二十八年旌表正白旗漢軍壯丁沈國器之妻張氏正白旗漢軍間散李正眀之妻盧氏正紅旗漢軍鐵匠王采之妻馬氏以上俱於康熙二十九年旌表鑲黃旗漢軍間散門有祿之妻王氏正黃旗漢軍護軍焦一亮之妻朴氏以上俱於康熙三十年旌表正黃旗漢軍間散徐九思之妻范氏鑲紅旗漢軍間散周環之妻陳氏以上俱於康熙三十一年旌表正紅旗漢軍馬甲王世泰之妻馮氏正黃旗漢軍間散顧敏生之妻邢氏正紅旗漢軍馬甲林天祿之妻焦氏以上俱于康熙三十二年旌表正黃旗漢軍間散許可逹之妻施氏正紅旗漢軍馬甲陳應選之妻李氏以上俱於康熙三十三年旌表正黃旗漢軍間散王朝輔之妻王氏康熙三十四年旌表正紅旗漢軍馬甲劉宏祖之妻李氏康熙二十五年旌表鑲黃旗漢軍間散王僴之妻王氏鑲黃旗漢軍鐵匠韓有功之妻翟氏鑲白旗漢軍佐領鄭朝興之妻蔡氏以上俱於康熙三十七年旌表正紅旗漢軍間散于三德之妻薛氏正紅旗漢軍馬甲劉登仕之妻羅氏以上俱於康熙三十八年旌表正黃旗漢軍馬甲岑自眀之妻陳氏康熙三十九年旌表鑲白旗漢軍馬甲李國瞻之妻孟氏鑲紅旗漢軍間散張仲舒之妻李氏以上俱於康熙四十年旌表鑲黃旗漢軍候選知縣祁熊嘉之妻傅氏康熙四十二年旌表鑲紅旗漢軍廕生楊天羽之妻張氏康熙四十三年旌表鑲白旗漢軍河南開封府知府蔣煥之妻胡氏康熙四十五年旌表正黃旗漢軍馬甲陳芳之妻郭氏康熙四十六年旌表鑲紅旗漢軍候選州同紀振坤之妻陳氏康熙四十七年旌表正黃旗漢軍馬甲梁進智之妻陳氏正黃旗漢軍間散文起正之妻楊氏鑲紅旗漢軍馬甲陳三泰之妻宗氏鑲紅旗漢軍恭將喻文煥之妻何氏以上俱於康熙四十八年旌表正黃旗漢軍候選縣丞房國器之妻蕭氏正藍旗漢軍監生洪圖之妻劉氏正藍旗漢軍候選州同張國珍之妻胡氏以上俱於康熙四十九年旌表鑲黃旗漢軍間散巴圖賚之妻王氏正黃旗漢軍馬甲朱升之妻陳氏正黃旗漢軍河南密縣知縣成育祥之妻秦氏正黃旗漢軍間散鄒世鳯之妻王氏正白旗漢軍壯丁沈璜之妻張氏正白旗漢軍四川成都府威州知州張素智之妻丁氏鑲紅旗漢軍馬甲傅之越之妻金氏正藍旗漢軍馬甲吳洪聲之妻劉氏正藍旗漢軍炮手白廣之妻陳氏鑲藍旗漢軍間散李彤標之妻董氏以上俱于康熙五十年旌表鑲黃旗漢軍間散劉登科之妻董氏鑲黃旗漢軍間散劉雲鵬之妻董氏鑲黃旗漢軍馬甲劉國珍之妻劉氏鑲黃旗漢軍知縣程雲沖之妻楊氏鑲黃旗漢軍間散何天衢之妻張氏鑲黃旗漢軍間散張聖惠之妻汪氏鑲黃旗漢軍監生張聖時之妻劉氏鑲黃旗漢軍馬甲汪如淮之妻劉氏鑲黃旗漢軍間散張永祉之妻鄭氏鑲黃旗漢軍馬甲汪如洲之妻李氏正黃旗漢軍馬甲李景元之妻劉氏正黃旗漢軍間散王澤之妻曽氏正黃旗漢軍驍騎校陳可興之妻李氏正黃旗漢軍廕生閻瑛之妻鄭氏正黃旗漢軍馬甲曾進善之妻王氏正白旗漢軍馬甲于先登之妻齊氏正白旗漢軍馬甲徐應鳯之妻謝氏正白旗漢軍間散沈璜之妻張氏正白旗漢軍馬甲張明信之妻梁氏正紅旗漢軍間散李渤之妻楊氏正紅旗漢軍馬甲龔文茂之妻何氏正紅旗漢軍間散榮萬枝之妻劉氏正紅旗漢軍馬甲葛聨奎之妻王氏鑲白旗漢軍俊秀韓雲程之妻卜氏鑲白旗漢軍馬甲徐維臣之妻胡氏鑲白旗漢軍領催劉有功之妻王氏鑲白旗漢軍間散萬自龍之妻于氏鑲白旗漢軍間散鄒宗聖之妻崔氏鑲白旗漢軍鎗手周進孝之妻金氏鑲白旗漢軍馬甲董玉之妻宋氏鑲白旗漢軍馬甲于天柱之妻張氏鑲白旗漢軍領催劉養德之妻栁氏鑲白旗漢軍馬甲王希聖之妻笪氏鑲紅旗漢軍馬甲艾起龍之妻曹氏鑲紅旗漢軍間散艾天貴之妻梁氏鑲紅旗漢軍知縣王原獻之妻趙氏正藍旗漢軍間散周仰聖之妻周氏正藍旗漢軍間散鄒貢舉之妻于氏正藍旗漢軍間散王德寅之妻張氏鑲藍旗漢軍間散艾進朝之妻田氏鑲藍旗漢軍間散滕起鵬之妻王氏鑲藍旗漢軍鎗手白登雲之妻楊氏鑲藍旗漢軍廕生唐乾之妻亷氏以上俱於康熙五十一年旌表鑲黃旗漢軍間散髙應舉之妻王氏鑲黃旗漢軍間散史守仁之妻施氏鑲黃旗漢軍間散徐廷賓之妻王氏鑲黃旗漢軍馬甲于成功之妻段氏鑲黃旗漢軍馬甲陳維新之妻朱氏鑲黃旗漢軍馬甲于應選之妻張氏鑲黃旗漢軍間散于應登之妻張氏正黃旗漢軍間散門擎梁之妻洪氏正黃旗漢軍工部右侍郎奉天府府尹金世鑑之妻卜氏正黃旗漢軍馬甲楊顯文之妻朴氏正黃旗漢軍間散劉燦之妻韓氏正黃旗漢軍間散張行信之妻李氏正黃旗漢軍間散白元度之妻馬氏正黃旗漢軍間散何玉賔之妻李氏正黃旗漢軍間散文良棟之妻楊氏正黃旗漢軍馬甲單國英之妻胡氏正黃旗漢軍間散李文明之妻劉氏正黃旗漢軍馬甲馮大任之妻李氏正黃旗漢軍馬甲張起英之妻趙氏正黃旗漢軍弓匠朱萬庫之妻何氏正黃旗漢軍間散文良佐之妻劉氏正黃旗漢軍馬甲曾進善之妻王氏正白旗漢軍馬甲髙玉秀之妻汪氏正白旗漢軍間散獻輔廷之妻王氏正白旗漢軍直𨽻永平府同知崔宦之妻劉氏正白旗漢軍間散白進貴之妻李氏正白旗漢軍步兵趙進忠之妻張氏正白旗漢軍間散金國璽之妻傅氏正白旗漢軍間散孔文盛之妻牛氏正白旗漢軍間散韋應斗之妻蔣氏正白旗漢軍間散張起鳯之妻牛氏正白旗漢軍間散陳忠之妻張氏正白旗漢軍間散李芳升之妻劉氏正白旗漢軍間散劉巍之妻衡氏正白旗漢軍候選主簿金墩生之妻蔡氏正白旗漢軍馬甲李春元之妻徐氏鑲白旗漢軍馬甲陳自修之妻程氏鑲白旗漢軍馬甲金世英之妻劉氏鑲紅旗漢軍候選縣丞張仲友之妻李氏鑲紅旗漢軍馬甲秦兆龍之妻何氏鑲紅旗漢軍拜他喇布勒哈畨周承訓之妻馬氏鑲紅旗漢軍間散王天保之妻李氏鑲紅旗漢軍間散崔文廣之妻王氏正藍旗漢軍筆帖式董志成之妻劉氏鑲藍旗漢軍馬甲武安邦之妻盧氏以上俱于康熙五十三年旌表鑲黃旗漢軍貢生靳治魯之妻范氏鑲黃旗漢軍馬甲黃天寵之妻劉氏正黃旗漢軍間散許髙選之妻管氏正黃旗漢軍馬甲髙文選之妻程氏正黃旗漢軍間散楊福之妻劉氏正黃旗漢軍間散許名揚之妻張氏正黃旗漢軍俊秀趙之嶼之妻髙氏正黃旗漢軍間散劉進美之妻吳氏正黃旗漢軍間散龍廷佐之妻勾氏正白旗漢軍間散石文質之妻夏氏正白旗漢軍間散李世勳之妻關氏正白旗漢軍間散朱得榮之妻周氏正白旗漢軍馬甲王永吉之妻趙氏正白旗漢軍間散李思金之妻袁氏正白旗漢軍間散金成福之妻錢氏正白旗漢軍領催周國臣之妻葉氏正白旗漢軍馬甲張得功之妻邢氏正紅旗漢軍佐領閔士璋之妻鄒氏鑲白旗漢軍間散唐應魁之妻趙氏鑲白旗漢軍領催鄭廷福之妻毛氏鑲白旗漢軍馬甲董文元之妻馬氏鑲白旗漢軍馬甲陳宗盛之妻劉氏鑲白旗漢軍間散陳有能之妻王氏鑲白旗漢軍間散張巒之妻陳氏鑲白旗漢軍間散魏廷聘之妻陳氏鑲紅旗漢軍間散閻景龍之妻劉氏鑲紅旗漢軍候選州同安定宇之妻楊氏鑲紅旗漢軍候選知縣安之隆之妻李氏鑲紅旗漢軍間散楊克捷之妻凌氏鑲紅旗漢軍馬甲朱成孝之妻張氏正藍旗漢軍間散李芳之妻王氏正藍旗漢軍間散髙山之妻佟氏正藍旗漢軍間散陳國明之妻李氏正藍旗漢軍雲騎尉紀世忠之妻程氏鑲藍旗漢軍間散蔣應魁之妻張氏鑲藍旗漢軍領催陳國祥之妻龎氏鑲藍旗漢軍間散郭登科之妻栗氏鑲藍旗漢軍馬