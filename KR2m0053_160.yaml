body:
  text: 人物志二十六大臣傳十二滿洲鑲黃旗十二素納圖欽保海蘭察阿爾海蘭察海蘭察滿洲鑲黃旗人姓多拉爾世居黑龍江乾隆二十年以索倫馬甲從征凖噶爾先是輝特台吉巴雅爾來降既封為汗旋復與阿睦爾撒納為逆因大兵追急遁入塔爾巴哈台山中海蘭察奮力窮追射之墜馬遂生擒以歸敘功賞額爾克巴圖魯號擢二等侍衛尋遷頭等侍衛命在乾清門行走授職騎都尉加一雲騎尉繪像紫光閣上製贊曰烈風掃枯迅其奚難亦賴衆傑摧敵攻堅於塔巴台射巴雅爾是其偉績勇鮮倫比三十年記名以副都統用三十二年五月領隊赴雲南征緬甸十二月大兵出虎踞關海蘭察率輕騎行至罕塔遇賊數十射斃三人生擒七大兵遂薄老官屯賊乘船至與江岸土賊合力抗拒海蘭察迎擊殺二百餘人大兵暫撤誘賊出海蘭察殿後設伏果有千餘賊躡追伏發殺賊四百人後數日以五百兵據渡口列陳有騎象賊目率衆至敗之賊復從猛密出襲遊擊達桑阿營海蘭察赴援大呼衝入賊竄林莽中海蘭察入林捕殺賊奔新街三十三年十二月率三百騎出萬人關夜至戛鳩江遇火光知有築卡賊衆射殺數人生擒三疾馳至江岸見賊屋千間督兵迅擊兼拋火彈盡燬之三十四年授鑲藍旗蒙古副都統十月大兵復攻老官屯海蘭察偕侍衛奎林先據錫箔以南沿江兩岸賊來犯者再輒創之使不敢復至尋分率左翼兵直攻錫箔毁其木柵賊出欲掠左哨纛急擊郤之江路賊猝來追襲又戮其大半生捉二人歸眀年兵撤海蘭察留防邉隘三十六年調鑲白旗蒙古副都統會大兵征兩金川命由滇赴蜀備調遣三十七年六月參贊大臣豐升額自東瑪進攻美美寨賊抵禦甚力海蘭察適至協同奮擊遂克之美美寨下尚有十三寨與豐升額乘勝蕩毁後二日與遊擊李煦等合兵攻賊木城斬獲甚衆又占據其旁山岡築守卡三座七月同總兵牛天畀連破數碉遂各築炮臺晝夜轟賊貢噶山之左有賊千餘由策卜丹突下迎擊敗之賊旋擾侍衛阿爾蘇營海蘭察趨赴殺四十餘人八月于貢噶山設四伏賊出斬級百餘匆見山旁有新立賊卡偕副都統哈國興連撲五次而氣彌奮賊不能支遂據之十月進攻路頂宗沿山溝繞上山頂又潛行箐中奪取賊卡與副都統額森特兵合遂破路頂宗及喀木色爾獲大小卡寨五十碉房三百得旨嘉奬擢正紅旗蒙古都統十一月由格實迪進奪賊碉兼審南北兩山形勢乃渡河上南山直撲布喇克札喀爾二寨而額森特等亦分路克捷共得碉卡九十遂移大營近逼眀郭宗且圖美諾命交部議敘十二月攻眀郭宗時領隊大臣普爾普等已逼其南海蘭察與哈國興繼至直入寨門寨內轉經樓旁列小碉賊目督衆守我兵環𠞰之舉火焚其樓乘勝直􅐦美諾小金川平有旨授參贊大臣於是大兵分三路而海蘭察由功噶爾拉進三十八年二月己巳偕定邉將軍溫福奏言功噶爾拉髙峯賊恃險死守臣探得山後沿北越兩大溝東行為簇拉角克又沿山溝西行上山為昔嶺由昔嶺至噶拉依路小而近與其株守功噶爾拉耽延時日不若分攻昔嶺若得昔嶺則稍留士卒以綴功噶爾拉之賊而大兵合力趨噶拉依於事較捷現令額森特等越過功噶爾拉山梁向簇拉角克前進丙子又合奏言始臣與額森特等分赴昔嶺約期會合兹臣率兵入北山至蘇克乃地方奪卡二座殺賊二十餘已將木果木後山占據額森特等亦於固木卜爾山奪卡殺賊現在兩軍合力又得碉卡五殺賊甚多由此前望昔嶺步步險峻俟雪消人力可施即相機辦理辛巳又奏言固木卜爾山進抵木果木路險氷滑臣於二月初旬鑿氷開路一日而至其山前分三足由最北一條下即接昔嶺之麓是木果木軍營已迥在功噶爾拉之外據畨人指點噶拉依約不過四五十里三月丁酉奏言昔嶺碉卡雖多其厄要大碉有十臣等分兵六隊用夜半驀進額森特向其九十兩碉與臣隊伍近臣即一同攻取其七八兩碉居險而更大臣仍與額森特合攻自子迄申往來氷雪中及暮佯撤設伏有四五百賊下追我兵回擊伏起助截殪賊二百尋復取昔嶺第五碉得旨官兵不避鎗石盡力攻剿均屬可嘉其中海蘭察額森特尤為奮勇出力著交部優敘四月丁酉奏由達札克角山奪獲得斯東寨五月辛巳奏攻逹札克角及昔嶺之兵同時用力惟昔嶺左邉與右溝進者擊賊頗多六月後路賊陷底木逹擾及登春營海蘭察率兵還禦連日敗賊俄而前路大營報警海蘭察復赴木果木救援至則將軍令撤昔嶺兵次日木果木大營亦陷溫福歿於陳海蘭察見事已難支乃令領隊大臣福興整兵出而自殿其後夜半至功噶爾拉總兵牛天畀營次日并撤功噶爾拉兵令額森特海祿開路而自與福興普爾普牛天畀為殿日夕至崇德聞有賊梗路乃屯崇德次日至美諾與領隊博清額五岱和隆武合營時海蘭察探知南路僧格宗官兵無恙而副將軍阿桂方駐營當噶爾拉乃分兵千令額森特由南山往迎又令普爾普以三百兵邏巡鄂克什諸隘後二日美諾眀郭宗俱失海蘭察退保日隆八月阿桂扺日隆十月命以阿桂為定西將軍分道再舉十一月海蘭察偕領隊常青普爾普保寧等帶兵八千由達木巴宗北山取道阿噶爾布里壓下别斯滿所至皆捷繼復同富興等從帛噶爾角克底木達布朗郭宗諸處層疊奮攻皆勢如破竹時大兵已復美諾三十九年正月阿桂分兵三隊隊五千海蘭察額森特普爾普保寧等帶領第一隊自明郭宗進發至谷噶山下埋伏有賊哨五人方上山海蘭察鎗斃其一慮逸去者必通信於賊勢不容緩乃與保寧帶兵二千由喇穆喇穆橫梁繞道驀越而額森特普爾普從谷噶正面進攻乘勝至色依谷山與海蘭察兵對面接應先是海蘭察所繞道已七八十里至是又攻據最高之登古山山徑險滑賊以此自恃我兵手足並用四面同攀竟取之於是與色依谷聲息時通且望見宜喜山梁矣登古山對峙曰羅博瓦山亦賊中竒險處也二月普爾普扼其前海蘭察偕額森特抄其後兵由石罅中節節跳越賊鎗炮雨集我兵毫無畏憚直循山麓登有二三百賊憑高下壓海蘭察方酣戰額森特保寧等合力迎擊賊來而復却者兩次俄有賊兵三股冒死衝突我軍箭無虛發立殪數十餘皆帶箭遁然博羅瓦前山賊恃險猶守乃偕額森特復從正路仰攻取之又與侍衛達蘭泰繞攻第四第三兩峯而額森特攻其第二峯俱克之上以羅博瓦為賊酋緊要門户今全行攻得海蘭察最為出力特授為內大臣三月與額森特福康安等剿得斯東寨甫至寨前賊咆哮迎撲而寨內之賊亦放鎗助勢我兵鎗箭齊發殺賊數十額森特斫破寨門賊紛紛逃竄又追殺十餘人四月賊乘雨霧於山坡添建兩大碉海蘭察亦乘夜雨密率兵前往立毁其碉上聞深嘉焉五月攻喇穆喇穆山後額森特等奮上奪卡二鳥什哈達接築柵座賊拚死來奪相持久之海蘭察突然趨斫賊踉蹌遁六月攻羅博瓦峯下大岡曰色淜普賊人設六碉互相應援海蘭察克其中三碉額森特克其左兩碉烏什哈達克其右一碉賊殱斃殆盡附近平寨一時並得七月取喇穆喇穆以西大碉額森特望見亦趨色淜普之南崖賊方驚亂海蘭察先已伏兵遂起剿殺次日並克日則丫口後數日攻該布達什諾木城時領隊官達色在其前而海蘭察循左溝繞至其後初為夾攻狀忽奪路衝出與之合兵額森特遙見煙起知海蘭察業經繞出料色淜普右溝賊往救其寨必虛即與富興前後並撲海蘭察望其兵少遣兵往助勝之於是官達色海蘭察額森特三路乘勝聮絡進圍遜克爾宗諭曰海蘭察倡率官兵攻奪險要洵屬超衆前給額爾克巴圖魯名號令改賞綽爾和羅科巴圖魯並銀三百兩現大兵已圍遜克爾宗其益加奮勉迅奏膚功八月復偕額森特先除山前諸寨落賊所藉為屏蔽者又旁抄遜克爾宗西直逼賊寨我兵人人踴躍有豎梯攀上者有鑿牆穿進者有從坍缺處躍入者賊穴地匿臧不敢出上聞官兵如此奮勉嘉奬之九月取遜克爾宗水碉斷賊飲汲然後進攻官寨賊放鎗拋石勢如風雨各山賊咸來應援我兵兩次奮撲海蘭察左頰受傷居數日官兵攻遜克爾宗右取其第一寨海蘭察隨將第二寨占據上諭曰海蘭察傷甫平復仍帶兵攻奪堅碉尤堪嘉奬著阿桂記册俟攻得勒烏圍一併議敘十月賞貂帽猞猁猻馬褂時大兵議改攻日爾巴當噶于是海蘭察趨上默格爾山梁先從叢箐中繞過賊知覺競出迎敵海蘭察奮力殺敗即騰上山梁據之額森特將所得三碉交富興駐守亦踵至山梁合營時瑚尼爾圖已得日爾巴當噶西峯海蘭察額森特遂連據其西巔曰密拉噶拉木者乘高俯瞰克其大寨一石碉四其山之隂即凱立葉官寨也亦乘勢攻取十一月攻布拉克森及格思巴爾焚寨落數百所有凱立葉上下附近碉卡掃除殆盡諭曰海蘭察屢經奮勉超羣著在御前侍衛上行走十一月復乘黑夜下山溝向格魯克古丫口前進崖磡壁立手足扳援及天眀官兵登丫口者六百賊併力支拒我兵勇氣倍增克其二碉循梁壓至桑噶斯瑪特别遣兵由陡烏當噶趨下沙木拉渠什爾德諸寨皆攻克凡越嶺扳林轉戰一日夜次日自革什戎岡及作固頂以往皆勝之斯時五福由隔嶺望見煙熖交騰知海蘭察已皆得手亦率兵攻得瑪讓普籠籠各碉于是雨路會合是役也海蘭察掃清山溝四道山梁五道直逼河岸計獲賊碉五十寨落三百平碉不計其數凱立葉丹壩彼此接通凡東川一帶之賊略淨盡矣十二月甲辰同將軍阿桂等奏言桑噶斯瑪特山足下沿河寨落若能攻取即可隔河轟賊斷其往來之路臣從正路進攻而瑚尼爾圖福康安分兩翼旁進賊于堅碉前又設木城遮護竭力扺禦我兵從柵縫射入或即拔柵木擊打竟毁其城四十年正月乙卯奏於甲爾納寨旁設伏仍分兵三隊先上攻撲其逸出之賊俱行殱殪二月己卯奏攻克甲爾納沿河諸寨三月甲戌奏勒爾吉博山分為三腳各有賊碉臣與額森特等共取之五月甲寅奏攻克上巴木通下巴木通我兵奮勇爭先兼將色爾外安吉達佳布一帶悉行攻獲直至噶爾丹寺之前百餘處寨賊無敢有抗拒者戊辰奏攻克得思古席捲其西北寨落次日又克赤布寨分攻噶爾丹寺各將辨等破其南五岱隳其東賊夜遁天明焚其寺以絶奔布爾邪教上嘉將軍𠫭贊謂其調度有方六月壬戌奏從舍圖枉卡繞攻奪據昆色爾及果克多進克拉枯喇嘛寺及災則大海丁卯奏章噶上下十餘寨同時克捷而所得地面頗寬接聮非易謹撥額森特隊內千兵以供前進庚午奏福康安烏什哈達等攻得寨卡五十餘處五岱五福等亦得薩木喀爾特成額等併得各山峯皆與額森特兵合齊向冷角寺追殺直至河沿已壓勒烏圍之上臣海蘭察亦乘勝直赴勒烏圍賊巢分兵圍其兩面八月丁丑奏隆德斯寨落經普爾普等攻得賊之鉛子積地二尺火藥一百餘簍俱行收獲官兵所據地在勒烏圍轉經樓中間己亥奏勒烏圍碉寨髙堅前阻大河後負髙磡其南為轉經樓又過甲爾日磉橋而南為科布曲與賊寨互為犄角我兵攻之不遺餘力或頭頂柴捆手推轉而行十五日分𣲖埋伏夜半攻克上謂將軍𠫭贊實心宣力將領辨兵奮勇集事均交部優敘九月戊辰奏言達思里噶拉宇一帶本進兵正路因連旬隂雨賊乘隙增碉我兵又多費力不如改從達烏圍乘其防守未固可期得手而仍留兵舊路以綴賊勢兹豐升額所分三路兵一攻甘都瓦爾一攻德里雅克角一攻鄂羅木幸皆應手而臣兵已先至莫魯古噶拉宇之上與額森特上下接通十一月己丑奏克西里山梁甲寅奏攻上科布曲兵分三路丙寅奏科布曲三路俱捷時額森特别取格隆古海祿别取兜窩皆與海蘭察會集咸以索隆古山髙而險遂合勢仰攻賊棄碉遁於們都斯得木巴宗及安布魯木等凡賊巢唇齒槩豫鏟平四十一年正月甲戌奏攻克舍齊雍中兩寺因言噶拉依碉寨髙堅鞏固較勒烏圍更甚兹臣海蘭察已扼至河岸日內衆軍圍合水陸俱斷料賊人萬無逃竄之路既而烏什哈達等由山脊移柵而下據噶拉依上額森特等由喀爾巴掃寨落九處跨河截噶拉依左而海蘭察偕福康安普爾普額森特等斷噶拉依右其餘將領或駐守鄂覺碩十寨以南或聮絡河西營柵而阿桂豐升額更於拉爾古對岸屬之西河布設長圍時寨外旁近餘卡咸經洗蕩惟札木什克寨獨力拒守於是將軍使海蘭察耀兵而下賊人望見軍容壯盛皆出跪降二月四日逆酋索諾木同其衆頭目出寨就縳金川平有旨封海蘭察為一等超勇侯凱旋之日上幸良鄉城南行郊勞禮賜御用鞍轡馬一匹御紫光閣飲至賞縀二十端銀千兩遂於閣中繪像列前五十功臣上親製贊曰射巴雅爾超授侍衛洊至都統𠫭畫軍計堅碉險寨無不克登勇而有謀封侯實應四十三年授正黃旗領侍衛內大臣四十五年補公中佐領四十六年三月甘肅撒拉爾回人作亂穴據華林龍尾諸山甚猖獗時大學士阿桂由河工督兵赴𠞰首以海蘭察領隊為請而上於先數日已命其乘驛往矣四月至蘭州從龍尾山左右分翼上撲射斃多賊五月踰水磨溝猝上華林賊大駭傾穴出鬪殱戮甚衆於是賊望見其乘馬出陳輒先驚竄閏五月率阿拉山馬兵及四川屯練兵取賊四卡其大卡猶堅守乃單騎驍至五泉山審度賊勢還向華林溝暫伏偵知卡賊回巢所留無幾急起趨赴以鍬钁砌路一擁進卡餘賊不能禦遂據之是時上傳賞諸將荷囊以海蘭察相地進攻特加玉韘著殊異焉六月遂搗入賊營拋火彈焚其帳房板屋及積聚奪刀矛器械無算賊退保華林寺死拒我兵逼寺立柵賊出鬪兩次俱戮之割賊渠首級傳示各回民諭曰此次剿滅撤拉爾賊匪海蘭察甚為奮勉著將伊子安祿授三等侍衛以示鼓勵四十九年六月同尚書福康安勦甘肅逆回於靜寧縣之底店一舉殱之遂鋤石峯堡賊窟擒賊魁張文慶等七月詔擢其子安祿為二等侍衛在乾清門行走又賜騎都尉世職即以安祿承襲五十二年臺灣逆匪林爽文攻圍嘉義縣七月命海蘭察為參贊大臣偕將軍福康安渡海勦捕十月守風大擔門上念其隆冬滯海上賜元狐暖帽及順風抵岸復賜玉如意登岸後三日率巴圖魯二十人至彰化縣之八卦山審視地勢見賊於山上築卡豎旗駕炮即趨上迎殺而山下復有賊擁至乃發箭各殪其一餘警遁上以海蘭察甫抵臺灣即能用少擊衆俾士氣人心為之一振諭奬之十一月己巳同福康安直援嘉義分兵五隊以義民為兩翼開路進辛未殱賊崙仔頂及崙仔尾賊出沒竹圍蔗田中義民分路焚斫無脫漏者進鋤牛稠山暨台斗坑諸隘遂抵縣城城中踴躍出迎歡聲震地乃入城撫輯兼奬其守城義民上諭曰海蘭察前在金川軍營屢著勞績今復身先士卒攻透賊圍往來𠞰殺勇略過人應晉封公爵賞給紅寶石頂四團龍補褂用旌勳績於是為二等超勇公癸酉出城搜捕西自大崙莊迄海岸賊蹤既淨東自興化店至員林又自馬稠山至大排竹所有賊藪悉夷之癸未整兵先𠞰北路順途刈中林大埔等莊席捲至菴古坑遂收復斗六門要隘乙酉師抵水沙連賊已遁搜山見轍迹急追之有乘馬執旗賊目督千餘賊擁牛車行海蘭察欲生致執旗者飛箭中其股立時就獲其牛車驚炮賊衆相填壓皆自斃戌子抵大里􅍻賊巢搗之擒賊目賊黨惟賊首未獲於是遍索畨社十二月丁酉由內山平林仔搜至集集埔見賊寨前阻大溪海蘭察策馬徑渡軍士奮勇泅而從遂洗其寨追逐十餘里至浩淮角焚草藔千間聞匪黨尚據小半天山寨辛亥我兵往滌蕩之由是內山要隘皆官兵防守然海蘭察仍躬巡邉界從東勢角山峯轉出獅子頭打鐵藔及蝦骨合歡諸社至極北之炭窑皆險仄山徑穿林越箐僅容徒步者時時收獲其匿藏餘匪五十三年正月丁卯擒賊首林爽文於老衢﨑獻俘京師上眷念福康安海蘭察功勤親解佩囊二分賜之戊寅回兵至南路由灣裏社𠞰至極南之琅嶠執凶渠莊大田磔於市臺灣南北路俱平上諭曰海蘭察屢次督兵甚為奮勇而籌辦一切均能井井有條著再加賞紫韁并金黃辮珊瑚朝珠用示優異癸未師旋至郡城海蘭察仍從舊經之鹿仔港登舟內渡上命於臺灣郡城及嘉義兩處並建海蘭察等生祠塑立像貌俾民人望而生惕日久不忘又繪二十功臣於紫光閣上製贊曰勇弗知書謀勝智士匹馬彎弓賊不敢視欲致活口射令勿死進爵錫服言難盡美五十六年廓爾喀賊匪滋擾後藏十月上仍以福康安為將軍海蘭察為參贊率巴圖魯侍衛及索倫兵千由藏征𠞰十二月自西寧出口進至阿什罕五十七年正月抵多倫巴圖爾具奏途中雪候及遇水草安營之處以慰上懷三月行抵後藏四月自後藏偕福康安馳赴拉子催趲糧運閏四月自拉子前行抵第哩浪古合於成德軍營奏言沿途寨落被賊匪焚燬畨衆多逃避逺去皆各招徠令其復業是月與福康安分往絨轄聶拉木詳視地勢定計由濟嚨一路進兵於是兼程赴宗喀五月癸卯至轄布基距擦木數十里探知賊寨在山梁髙處必能瞭望我兵於是先遣四隊乘晦夜潛進或繞斷賊後或夾擊兩旁而海蘭察偕阿滿泰等由中路仰攻黎明踰前牆開碉門一擁而入賊匪見前碉已失左右四山皆我兵乃拒守後碉不出我兵聲東擊西隳旁垣而入短兵相接殺賊目三賊兵二百生擒十餘人將擦木據守上賜玉韘及大小荷囊奬之乙巳抵瑪噶爾轄爾甲山梁山下有紅旗賊目率三百賊蜂擁而上我兵暫伏俟賊至山半忽衝出奪旗殺賊賊且戰且退海蘭察疾馳下山繞至賊前截擊凡殺賊目七賊匪二百餘生擒三十是役也海蘭察馬足中鎗諭曰海蘭察與賊接戰馬匹受傷幸未顚蹶實賴上天護佑為之額手特賞給行幸常佩護身佛一尊以為諸事吉祥佳兆海蘭察臨陳勇往是其素性但身為𠫭贊所關甚重固當鼓鋭直前究宜加意持重也丁未進攻濟嚨官寨寨在崇岡上賊固圍疊石為壘其髙二丈四隅皆有大石碉以相犄角我兵四面分攻而海蘭察與台斐英阿率索倫騎兵往來衝擊自丑至亥克之賊被殱者自溺河外計級六百生擒二百上賜燧囊削刀煙壺荷佩以奬濟嚨之捷丁未由濟嚨前進懸崖夾峙中繞長河攀藤行側徑中次日至索喇拉山下有石卡我兵直前攻撲賊棄卡而逸追逐三里是為熱索橋隔岸賊急撤橋板我兵攻之不及因暫退次日仍向橋卡作欲擊狀密令阿滿泰等東越峩緑山從上流潛渡轉撲橋卡賊駭奔蹂躪墜河者甚衆我兵盡渡逐至色達木三十里乃駐上復賜洋表以奬熱索橋之捷甲寅至密哩頂次日抵旺噶爾山路彌陡並無札營之地官兵露宿岩下凡冞入百七十里不見賊旺噶爾西南長河橫亘處曰旺堆過河曰協布魯迤東村落為克堆寨居賊始多丁巳我兵至旺堆賊扼河抵禦不得渡乃留兵牽綴而從上遊縳木濟直薄克堆寨賊出不意大敗燬寨五遂趨協布魯殺賊百而旺堆牽綴之兵亦渡河助殺數十人上以官兵勤苦露宿設法潛渡連次克捷福康安海蘭察並賞四喜玉韘鑲嵌松石翎管用昭優眷自協布魯以往由噶多至束覺山為正路而噶多東南越山曰雅爾賽拉曰博爾束拉亦可出竒制賊六月庚午海蘭察用此路繞進晝夜遄行至博爾東拉前山見賊木城三石卡七頗據地勢料直撲未能得力乃轉從山巔繞壓卡上與阿滿泰髙下夾擊盡拔其城卡乘勝追至瑪木拉望見賊兵埋伏趨前邀擊又殺百餘人惟時東覺山正路兵乘勝亦至合力追捕多所斬獲上嘉之命部議敘丙子至雍鴉山札營賊具稟乞降斥之七月己亥進攻噶勒拉山三路並捷乘勝窮追復上堆補木山奪其卡由堆補木下山為怕朗古橫河賊扼橋拒守大兵奪橋直渡馳上甲爾古拉山别兵從上遊潛渡亦抵集木集山二山本相屬我兵遂合為一賊來擾者往來迎擊皆敗之凡接戰兩日夜越兩大山克木城四大小石卡十一奪據大橋一戮賊目十三人賊匪六百生擒十七於是賊酋畏懼求降情詞懇切有詔許納欵班師九月海蘭察晉封一等超勇公自藏凱旋五十八年三月卒於家賜諡武莊時十五功臣圖像方成上製贊曰勇而有謀侍衛洊公索倫巨擘黼衣錫龍圖形四畨福祿鮮比旋終於家矜惜無已又奉諭曰海蘭察由行伍出身在戎陳多年其接戰次數不可勝記實不愧宣力之臣兹病卒於家非陳亡者比例不入昭忠祠但念其軍營奮勉曽受多傷加恩著亦入昭忠祠以示朕軫念功臣之意子安祿於廓爾喀從征亦賜號哈錫巴圗魯阿爾素納阿爾素納吉林滿洲鑲黃旗人姓祿葉勒乾隆二十一年由前鋒隨征西路二十五年還京授藍翎侍衛二十七年授三等侍衛三十四年隨征緬甸十月大兵剿新街阿爾素納在事有功授二等侍衛賜額騰伊巴圖魯號三十五年赴金川軍營三十六年十二月大兵攻巴朗拉阿爾素納同侍衛額森特先登奪賊兩碉中山峯復隨攻山頂碉卡夜克之大兵遂越巴朗拉嶺三十七年正月分三路攻資哩阿爾素納同總兵牛天畀由瑪爾瓦爾濟進奪卡甚衆二月大兵破賊卡賊匿地溝者阿爾素納搜殺殆盡即駐守南山會𠫭贊大臣五岱分攻北山石卡南山阿喀木雅賊潛往援阿爾素納等邀擊之賊敗走三月移攻阿喀木雅賊夜遁阿爾素納從南山協𠞰奮勇進奪沿山數卡賊突來犯擊敗之尋復由喇卜楚克繞攻資哩南山同牛天畀分兵衝壓以牽賊勢六月大兵三路攻美美卡阿爾素納由南山溝繞出賊卡後與各隊兵合圍賊大木柵賊拒敵衝入賊陳短兵鏖戰斃賊數百尋同總兵李煦樹柵進攻賊二百餘來犯阿爾素納接戰殺賊甚衆旋同副都統海蘭察夾攻木城斬賊三百餘因立卡駐守七月擢頭等侍衛八月大兵至貢噶誘賊出戰阿爾素納等伏兵四路進攻殺賊百餘十一月進攻兜烏同總兵哈國興等克穆拉斯郭大寨據兜烏山頂與總兵馬彪合附近碉卡悉攻克諭曰此次在事奮勉之頭等侍衛阿爾索納著賞給副都統銜尋授領隊大臣三十八年三月大兵至木果木分六隊乘夜進剿阿爾素納與海蘭察等合攻賊碉自子迄申克兩大碉毁之諭奬阿爾素納等尤奮勉出力命優敘時阿爾素納駐守兩山間賊二百餘來擾阿爾素納等分兵夾攻多所斬獲追至山腳奪據石卡二復於溝底樹柵進逼賊窘極乘夜來犯我兵奮擊之賊俱受傷竄閏三月同副都統烏什哈達領兵五百由達札克角下攻木城賊百餘人出拒我兵殺三四十人即據其木城乘勝下壓連克碉樓一石卡二尋授鑲白旗蒙古副都統四月率兵攻逹扎克角山梁克木城碉卡五伏賊自箐出殱之隨攻克得斯東寨仍樹柵繼進賊三四百來犯阿爾素納等剿殺過半五月合攻昔嶺前山木柵阿爾素納等身冒鎗石殺賊甚衆賊從林後溝中出斷我歸路我兵力擊之斃賊數十復於達扎克角高阜築炮臺轟賊傷斃甚多六月木果木大營陷於賊阿爾素納率滿洲兵撤出行至大壩溝遇賊力戰歿於陳事聞上悼惜之命照扎拉豐阿例議恤贈都統銜入祀昭忠祠賜祭葬如例給騎都尉又一雲騎尉世職無子以從弟尼堪襲後兩金川平命圖形紫光閣儒臣擬贊曰攻巴朗拉絶巘先登三軍從之以是著稱資哩斯當鷙若鷹隼大壩殺賊名彰身殞圖欽保圖欽保滿洲鑲黃旗人姓爪勒佳由前鋒授前鋒校乾隆三十二年隨將軍眀瑞征緬甸屢著功績賞戴孔雀翎三十三年大兵剿蠻結賊匪大捷圖欽保在事有功授三等侍衛賜法福禮巴圖魯號三十五年遷健鋭營副前鋒𠫭領三十七年二月隨將軍阿桂征金川十一月大軍造皮船乘夜渡河分三隊襲烏達西山碉卡圖欽保同總兵王萬邦由東面進攻木城石碉同時克獲捷聞得旨嘉奬授額外參領復與侍衛三寶等合兵至邦甲山梁緣溝登山出賊後克石城大碉及各石卡乘勝下夾攻賊潰竄十二月扺納圍納扎木副將軍眀亮等分兵三路圖欽保與遊擊谷生炎等合攻山坡石卡克之時賊方悉力拒守石城圖欽保復偕侍衛德赫布千總劉世勳等三面合圍壘石卡逼之賊棄城夜遁大兵至僧格宗圖欽保由河西科多渡橋攻河東賊掘斷山路官兵奮勇進至喀咱木籠山梁扺奢壟賊潰奔美諾三十九年圖欽保同參領拉布棟阿率兵五百攻馬奈克之敘功擢湖南長沙協副將四十年大兵扺薩克薩谷其北曰茹寨麥方熟賊設戰碉扺死衛護圖欽保領兵由薩克薩谷力攻克之焚沿河各寨賊竄出前後受圍中箭被鎗及墜河斃者無算麥田十餘里皆為我兵所據事聞諭曰圖欽保攻剿茹寨尤為出力著交將軍等記名遇有軍營總兵缺出奏請補授七月大兵分二路攻石直噶山下木城圖欽保由左路繞過木城燬山下賊寨賊駭竄閏十月攻克扎烏古山梁圖欽保在事有功得旨功加一等十二月擢陕西固原總兵四十一年凱旋命圖形紫光閣御製贊曰承平日久敢恃內安永憶文子厥有名言嘉我諸臣遇兵則奮竭力敵愾世承家訓四十六年三月撒拉爾逆回因爭教倡亂蘭州圖欽保率兵五百助剿至則與總兵德寧等擊斃多賊旋偕總督勒爾謹提督仁和等守城頃之大兵四集賊退據八蠟廟及水磨溝掘濠築壘以固拒四月圖欽保同都統海蘭察率兵越水磨溝由山梁進逼賊巢賊衆從山坡撲上圖欽保持刀奮砍馬蹶墜山下被傷卒事聞有旨圖欽保奮勇剿賊臨陳捐軀殊堪憫惻著照陳亡例議恤尋賜銀七百加贈三級賜祭葬如例入祀昭忠祠授其子藍翎侍衛眀昌都司銜擢為三等侍衛欽定八旗通志卷一百四十六
