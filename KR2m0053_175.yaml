body:
  text: 欽定四庫全書欽定八旗通志卷一百六十一人物志四十一大臣傳二十七滿洲正白旗六勒布蘭泰瑪來保牛鈕齊蘓塔勒善鄂彌達布蘭泰布蘭泰滿洲正白旗人姓拜都初隸蒙古鑲白旗父克什圖由䕶軍校從征察哈爾布爾尼叙功給雲騎尉世職康熙三十七年布蘭泰襲五十七年授理藩院員外郎兼管副𠫭領五十九年赴北路軍營管理鄂勒齋圖郭勒臺站六十一年還京調戸部銀庫員外郎兼公中佐領雍正元年因前管理臺站節省錢糧議叙以應陞缺即用二年七月奉詔編布蘭泰及孫柱五十三石音四族丁為一佐領令布蘭泰掌之拔入滿洲正白旗八月遷太僕寺少卿仍兼銀庫行走十一月擢山東布政使三年七月因銀庫盈餘議叙加二級九月署山東巡撫十月授山西巡撫尋調湖南巡撫四年疏劾衡山縣知縣張翼飲酒觀劇不轉解人犯并不肯接詞狀請革職諭曰張翼各欵俱屬應𠫭之事但稱不肯接受詞狀此語甚屬錯悞民間詞狀虚妄者多一概接受必啟刁民誣告健訟之端此風斷不可長若以收受詞狀之多寡定屬員之賢否則必致以此相尚生事滋擾矣五年二月奏請復靖州州判增糧道庫大使改五寨司吏目為巡檢裁松栢市巡檢從之三月疏言湖南襟江帶湖港汊繁多每有不法船户糾匪肆竊或合資買舟假貿易為名沿途行刼皆因無可稽查請嗣後一切小船照沿海商船例地方官取船户鄰佑保結編號給照不時稽查至漁船奸良更為難辨請照陸地保甲例編十船為一甲一船犯盜竊許九船公首隠匿事發同甲一體治罪下部議行四月授户部右侍郎仍署湖南巡撫五月調江西巡撫十一月疏劾陞任蔚州㕘將裴魁前在撫標遊擊任内虚冐馬糧二分步糧三分守糧六分請革職究追諭曰武弁虚冐糧餉幾分較有司之貪贜枉法累及國計民生者似有分别該上司等應預行嚴飭令其悛改為國家愛惜人才若切加訓誨仍不遵奉則當㕘革治罪今布蘭泰到任伊始尚未教導屬員遽以空糧幾分將裴魁𠫭奏未免過刻若督撫等皆如此𠫭劾恐有用之才受微愆之累而不得改過自新者多矣朕念裴魁從前効力從寛免其究問着降三級留任六年正月請移貴溪縣縣丞駐江滸山從之三月疏言九江為數省孔道贛州為商賈雲集之區積貯宜預籌請各設常平倉自本年始将兩闗平餘銀及所裁冗役工食并公私雜項所減銀每年買榖二萬餘石分貯兩闗平糶秋收買糓增貯積十年可得二十餘萬石其建倉費即於兩闗節省項内動給詔如所請行七月疏劾清江縣知縣牛元弼不親身禱兩屠宰甫禁旋開筵演戲且不理政務知府呉恩景代為隠飾請一併革職諭曰牛元弼於屠宰開禁之後開筵唱戲不比祈禱之時若牛元弼性好聲歌躭於逸樂則布蘭泰何以不早行𠫭奏至所𠫭政務不理亦當實指其廢弛者何事今因一時意見遽将該縣嚴𠫭並知府一同革職定例内屬員犯貪贜重罪者知府徇庇及失於覺察其處分止降級調用今因屬員唱戲而遂将知府奏請革職似此越例之事幾有作福作威之意矣朕之待督撫大臣深加信任常有督撫𠫭劾尚輕而朕從重處分者總以揆情度理期於公當而已凡為督撫者當為國家愛惜人才而於㕘劾之間尤當加意慎重若誤去一幹員其過更在誤薦劣員之上葢薦一劣員而誤用之異日自然敗露若将幹員誤行罷斥則其人終身放廢不可復振天下人才幾何豈可因一時之喜怒而濫行摧折乎察吏之道公明二者缺一不可若存心本公而識見不到必致為屬員所欺瞞浮言所䝉蔽布蘭泰之存心雖無私徇而少知人之明且瑣屑不識大體地方雨𤾉之時若水旱之為災全係督撫大臣之感召若果能布徳行仁安民察吏自能上感天和豐亨有慶若政事有闕舉劾失宜以致雨澤不能應時而降此時徒恃祈禱之虚文已屬庸鄙之見而乃欲諉過於屬員以謝己之責不亦屈抑之甚乎牛元弼呉恩景不必革職若二人任内另有虧空劣蹟著布蘭泰查明續㕘再降諭㫖若别無欵蹟可𠫭著将牛元弼呉恩景送部引見候㫖另用八月以署江蘓巡撫張坦麟為江西巡撫命布蘭泰來京十一月諭閣臣曰江西布政使王承烈陞任來京奏稱布蘭泰在江西巡撫之任每事過於嚴刻朕因著令來京面加詢問布蘭泰本一微末之人朕因其居心謹慎操守尚好是以厯任擢用為湖南巡撫後見其居官辦事識見𥚹小已降㫖調回授為侍郎適江西巡撫未得其人復将伊調撫江西並諭伊云江西事務自邁柱整頓之後汝可遵守安静辦理乃伊到江西後復蹈故轍並無改悔之念伊兩任内所辦之事所奏之摺朕見其苛刻瑣細不知為政大體朕隨事切加訓誨所以批諭之者剴切詳明至再至三現在收貯俱發與大臣及王承烈看過原不待王承烈之陳奏而後知之也所以將伊調回者意欲面行詢問並加訓諭尚兾其或能悛改乃伊奏稱臣在江西所辦事件往往從重從嚴待皇上敕改使恩出自上朕一聞此語心中為之戰慄不覺汗流浹背夫辦事之道惟在秉公得理中正無偏今有意嚴刻先為過甚以待折中必朕留心體察方得更改而伊又未豫先奏明朕又安從逆料其有心過嚴而事事皆為駁正乎况巡撫所辦地方事務不陳奏於朕前者甚多安可豫存嚴厲之見乎布蘭泰深負朕恩溺職已甚著革職尋命留雲騎尉世職於本身赴多倫諾爾承修廟工十一年偕原任侍郎衆佛保赴北路軍營督理馬政乾隆二年六月署鑲紅旗䝉古副都統十一月授鑲黄旗滿洲副都統三年疏言各部院所存檔案一代章程所繫宜慎宻收貯逐一清查分别年分貯册庫専員典守如有應查事彼此行文咨查不許擅自調取亦不得私相傳閲至八旗檔案亦宜按年編號令印房筆帖式掌之筆帖式任滿及𠫭領等更替時出結交代下部議行尋命署馬蘭鎮總兵四年八月條奏行保甲州縣多虚應故事兵丁緝匪解送有司置之不問弭盜應委千把總同兵丁緝拏事主報盜應速結嚴究衙役需索倉榖糶借秋成買補不必輾轉累民勅下大學士九卿議奏議上諭曰大學士九卿議覆布蘭泰條奏各欵朕一一詳閲所議亦是但語多籠統尚少切實如布蘭泰奏稱州縣行保甲之法虚應故事即有匪類兵丁訪實解送有司置之不問等語爾等議覆即當詢布蘭泰伊現任總兵何處武弁訪實匪類交於何州縣如何置之不問之處令其據實陳奏如果有其事則州縣即當㕘劾而失察之總督亦應有處分倘毫無實據豈得妄以置之不問一語加之文員如此則真偽不難立辨今但以武弁何難通報上司按例查㕘等語引成例議覆以後弁員視為具文或竟不具報其弊不更甚耶此處殊未明晰至布蘭泰所稱督撫遇地方有盜即委千把同兵丁探拿盜自可弭等語夫盜案委武員躧緝惟李衛為總督時偶一行之其餘督撫從無如此辦理者葢武弁緝盜行之不善不但於地方無益且恐轉滋擾累弊端百出此則事之必不可行者又布蘭泰奏稱無論犯竊幾次贜數多寡重則治罪輕則解回原籍至事主報盜應作速完結毋令守候並嚴究衙役需索等語爾等議覆竊盜科罪輕重各有明條從無不論次數贜數混行問擬及外來匪類不行解回原籍之事並事主報盜止許到官聽審一次認贜一次不得拖累並不許衙役需索違者将承審官嚴加議處現在遵行等語此在成例則果然矣而州縣中或不實力拳行又或奉行不善豈能保其全無布蘭泰既為此奏必有所指亦當令其指名陳奏不應僅稱無庸議也又布蘭泰奏稱社倉常平倉之榖如有糶借秋成即可買補何必多此買榖輾轉累民囤積自官其價愈昻等語爾等既議稱如或市價增長及民間購買者衆官即暫行停糴是布蘭泰所奏廷議亦以為是何以又云布蘭泰並不深究其原遽思更變其法殊未允協此則幾有明駁暗准之意矣夫採買米榖亦原以備民食今前後詞意未符将來或須採辦又将如何料理此摺發還著另議具奏尋議令指名陳奏布蘭泰覆奏臣前任湖南巡撫時有余景福顔正黄鰲謝禄正等肆刼皆地方官不留意懲治致動擾官兵本年赴馬蘭鎮任詢訪軍民稱窮鄉遇竊事主恐守候多隠忍不報是以冒昧陳奏非别有所指諭曰布蘭泰摭拾舊事妄作空言冒昧具奏不合著交部議處部議降一級調用得㫖降一級從寛留任六年暫署三陵總理事務九年實授馬蘭鎮總兵十二年疏言八旗漢軍壯丁例得撥補馬蘭緑營兵缺且給擕眷車費往往視為畏途致缺久懸或隻身而來請嗣後撥補時先儘有眷丁定限啟行又壯丁子弟有堪充餘丁者遇缺出就近挑補可省撥送車費從之十一月丁憂回京十三年復署馬蘭鎮總兵十四年二月以守䕶園寝不嚴部議降一級調用得㫖降三級從寛留任十月擢古北口提督尋疏言緑營操演鎗礮原期施放有凖但轉身進退或左或右多不畫一因營員各持所見日更月改請照八旗式法自左而進自右而退畫一操演如所請行十七年卒諭曰布蘭泰厯任封疆宣力有年今患病溘逝深為軫惻應得䘏典該部察例具奏尋賜祭葬如例諡慤僖子永貴襲世職官至協辦大學士吏部尚書别有傳來保來保滿洲正白旗人姓喜塔臘康熙三十八年由庫使在批本處行走三十九年奏事處行走四十年授藍翎侍衛四十六年以失儀革職五十年授三等侍衛五十五年以奏事錯悞革職五十七年復授三等侍衛遞擢一等侍衛雍正元年正月管理南苑事二月授佐領四月授内務府總管三年二月兼理奉宸院事十一月内府披甲人等因議裁額聚閧亷親王府復刼總管李延禧家來保等奏不實革職四年五月授景陵掌印郎中八月授三陵總管九年還京遣往土爾扈特給二品頂帶十二年赴喀爾喀車臣汗部辦事十三年十月還京仍授内務府總管署工部尚書十二月奏言滿洲騎射較優于漢人沿邊古北口一帶提鎮副㕘遊守等官請兼用滿洲于控制為宜從之乾隆元年三月總管咸安宫學十二月大學士管浙江總督稽曽筠江蘇巡撫邵基疏請停辦戊午年銅運以清積欠下部議來保奏言積欠數盈五六百萬自應停辦一年以清舊項但已未以後仍招商採買行之數載積欠復多則停辦之請又難不允臣查户工銅儲積數十年方餘一嵗鼓鑄之用今既停辦一年合以從來所欠缺額約及二年目下市中錢價已覺稍昻停辦之説既行錢價之昻必甚請敕下該督撫等出示曉諭聴商人自携貲本出洋採買不必先給價值該道隨到即收毋拘多寡但不得尅扣抑勒重滋商累總理王大臣議覆允行二年六月上以運河水淺粮艘至臨清以北尤多阻滯由于衛水上游各渠口居民私洩過多敕直𨽻河南督撫等照前河臣靳輔題定例稽察嚴禁來保奏言水淺運阻查禁不得不嚴但衛水發源河南至臨清五百餘里沿河居民不知㡬千萬家需灌之地不知㡬千百頃現今秋成在望已非灌溉之期所慮者有司奉行過當後雖運河不至淺阻而一入五月渠口盡行堵塞坐使有用之利置之無用恐不無廢時失業者非我皇上仁育萬民之意也其如何使漕運不致淺阻民田亦得灌溉抑或暫禁于淺阻之年而不禁于深通之嵗應令督撫河道諸臣悉心調劑以期兩便疏入命侍郎趙殿最侍衛安寕㑹同各督撫查勘酌議事詳殿最傳十二月實授工部尚書兼議政大臣四年八月以病請觧任上不允十二月授内大臣賜紫禁城騎馬五年調刑部尚書充律例館總裁初來保世𨽻内府六年正月上以其奉職勤勞特命擡入正白旗所立佐領准世襲三月充繙譯鄉試正考官四月管右翼監督六月御史沈世楓疏奏來保誠慤有餘習練不足不勝刑部繁要之任諭曰來保人實可信然沈世楓所言頗中其病倘因此能自知省惕則心志虚公而才識亦将日進矣此聞過而喜所以稱賢也七年上以來保善相馬御製相馬歌賜之曰伯樂善相馬車下老驥出今豈無其人來保稱第一曩時有黄海親授相馬術謂不相其皮亦莫稱其力心端徳自優萬中無一失天閑雲錦羣一顧靡不悉為余辨驪黄六飛協安吉此術固云美相人亦可則况兹居八柱亮采汝所職勉此空冀心佐予敷九徳是年因審擬福海毆斃贖身家人焚屍滅跡一案擬罪乖錯詔革職從寛留任九年御史和其衷疏劾奉天將軍額洛圖尅扣軍餉勒派旗民并因建橋受賄状盛京工部侍郎留保奏請将瑚納瑚海等處所收木税令各監督遵例報部查核上年建橋時多伐木植請著落城守尉巴海率商折銀交納命來保偕祭酒鄂容安往㑹同侍郎兆恵查審議奏八月来保等覆奏額洛圖所犯属實應論罪如律留保所請二事皆可行從之十年三月調禮部尚書總理樂部兼管太常寺鴻臚寺事加太子太保四月授領侍衛内大臣十二月充玉牒館副總裁十二年三月管左翼監督是月授吏部尚書協辦大學士十二月晉武英殿大學士十三年六月教習庶吉士九月命為軍機大臣十一月充經筵講官十四年二月金川凱旋議叙晉太子太傅三月兼管兵部事四月觧兵部兼管刑部事充平定金川方略正總裁九月仍兼管兵部事十五年三月來保七十生辰賜之以歌曰七十古稀亦常有綸閣中人不多覯居然台衮臻黄耉平生誠謹獲福厚金門朝夕宣勤久鮐背精神尚抖擻漢萬石君今其友作歌春酒為卿夀詞取易達卿祇受勉力賛襄予左右十六年兼管吏部事充詩經館正總裁二十年七月充平定凖噶爾方略正總裁二十五年來保年人十復賜詩曰八㐮棃鮐茀禄増三朝禁近亮勤稱温城過闕毋忘下東海為閭知有興矍鑠齊眉叶琴瑟徘徊繞膝侍孫曽皤皤元老多黄髪自是明廷大吉徴二十六年五月兼管禮部事二十九年三月卒諭曰大學士來保老成端謹誠篤恪勤年躋大耋久任綸扉宣力三朝勤勞懋著前以患病特命御醫診視並賜参餌以兾速痊昨具摺陳情降㫖慰留但令不必兼理部務兹聞溘逝深為軫悼著加贈太保入祀賢良祠并賞銀三千兩辦理喪務朕親臨奠醊應得䘏典該部察例具奏御製詩悼之曰一世篤勤行三朝禁近臣老成惜多謝厚重有誰倫那問生由命因知夀底真且看市鄽上應有輟舂人尋賜祭葬如例諡文端四十四年御製懐舊詩列五閣臣中詩曰初供批本職後充侍衛䕶弓矢固所習慤勤更其素止進恒有常不失尺寸處洊陞掌内府亦久䝉恩遇因命長部曹旋賛絲綸布更踐既已深老成遂獨許雖無赫赫名却有休休度讀書通大義萬石猶後步牛鈕牛鈕滿洲正白旗人姓他塔喇由官學生補工部筆帖式康熙三十九年二月武清縣筐兒港水决工部尚書薩穆哈遵㫖派賢能司員筆帖式監修以牛鈕監築減水壩六月補本部主事五十年二月上自和韶屯乘舟閲工諭於引河前崖及减水壩前各増壩一於三里淺挑水壩下又增壩一俱長三四丈上至河西務登岸歩行二里許諭牛鈕曰濬河不礙村落方善復指示曰此沙地著濬河寛十丈長四百七十餘丈平坦處深四五尺髙阜處或七八九尺不等其河灣處著建小挑水壩二濬河之土即置兩邊對新河上口舊河下流著建挑水壩二髙與岸等於是取儀器置地親視方向命諸皇子大臣等分釘樁木紀丈量處交牛鈕監修三月遷本部郎中五十九年擢左副都御史尋命總管北運河事務六十年九月河南武陟縣馬營口河決上以牛鈕諳練河工面授方略偕侍講齊蘇勒等往堵築十月以巡撫楊宗義與河督趙世顯互諉不亟備料奏敕宗義専其事牛鈕恪遵聖訓在釘船幚興工十一月工竣奉㫖詳勘河工自孟津起至清口止以儀封縣白家摟虞城縣黄堌壩徐州以上碭山縣定國寺及胡家樓徐州以下長樊大壩五處應挑引河邳州董家塘宿遷縣大古城挑源縣七里溝三處應建挑水壩奏交署河督陳鵬年督辦六十一年二月直𨽻長垣縣常村集堤南水勢暴漲逼山東濮州等處遣牛鈕順道往勘㑹黄河積凌水發馬營口復决牛鈕馳還武陟同宗義於秦家厰堵築六月奏言秦家厰攔河壩自三月興工擇於本月初五日合龍初三日大雨水漲所留水口稍狹兩邊壩臺蟄陷二十七丈幸埽個未動已属楊宗義備料䟎修臣以大雨時行通州運河亦属𦂳要即遵㫖回京諭宗義速行堵修先是牛鈕議於黄河北岸自沁河堤至詹家店十八里無堤處接築遥堤以資捍禦宗義以沁黄並漲時水無所洩恐致衝决不若仍留空隙備宣洩雍正元年正月河督陳鵬年奏現在河勢北趋較前情形不同無堤攔束亦属可虞請如牛鈕議從之七月遷兵部右侍郎八月疏禁官民人等服用五爪龍下部議行二年七月疏言江寧杭州荆州京口廣州福州等處駐防兵請令習水師部議江寕等處俱係防守地方並無戰船未便學習惟京口現設戰船應如所請令将軍選兵二千操演得㫖允行十二月調禮部右侍郎三年二月因遲延應奏事件降三級調用七年三月覺羅巴哈布首牛鈕監修筐兒港堤工時索其金三百銀千四百兩宗人府傳詢牛鈕抗不赴諭曰牛鈕貪婪無恥其嚇詐之處甚著人所共知乃宗人府傳喚數次抗不前往甚属可惡著革職拿交刑部治罪尋議照枉法贓擬絞監候從之八年正月北運河青龍灣議築減水壩以侍郎何國宗督修諭曰原任侍郎牛鈕在北運河管工年久於地方情形甚為熟練爾等可㑹議料理牛鈕即偕何國宗抵海口溯引河而上估工條議以聞得㫖作速料理少有遲誤疎虞惟何國宗是問一應動用錢粮與牛鈕無涉著何國宗一人察核工竣回京乾隆二年七月卒齊蘇勒齊蘇勒滿洲正白旗人姓納喇初由官學選天文生為欽天監博士遷靈臺郎尋以内務府主事出任永定河分司康熙四十二年聖祖仁皇帝南巡閲河齊蘇勒隨至淮安奉諭曰朕觀黄河險要地方應下挑水埽壩現今永定河朕親指示挑水壩俱有禆益爾遵照朕指示式様前往烟墩九里岡龍窩三處築挑水壩數座於朕回鑾前完工齊蘇勒遵㫖如期竣事乃回任洊遷翰林院侍講國子監祭酒仍管永定河分司事務會奉命同副都御史牛鈕監修河南武陟等縣決口隄工奏自沁河隄頭至滎澤縣大隄十八里平衍處接築遥隄使全河之水盡歸一道専力刷深不致勞溢六十一年十二月世宗憲皇帝授為山東按察使兼理運河事命先往河南籌辦黄河隄工時河南巡撫楊宗義奏請於馬營口南舊有河形處修挑引河齊蘇勒同河道總督陳鵬年疏言河不兩行此洩則彼淤有必然之勢馬營口甫經築堤若開引河有旁洩侵隄之慮寢其事雍正元年正月命齊蘇勒署理河道總督尋寔授四月疏言陽武祥符封邱界黄河北岸有支流三逼隄繞行五十餘里南岸青佛寺邉有支流一逼隄繞行四十餘里不急為截斷恐刷損大隄已築壩堵絶並接築子隄九千二百八十八丈隔隄七百八十丈會奉詔豫籌山東諸湖蓄洩事宜以利漕運疏言汶上縣之南旺馬踏蜀山等湖東平州之安山湖濟寧州之馬場湖魚䑓縣之南陽昭陽獨山等湖滕嶧二縣之微山郗山等湖皆運道所資以蓄洩昔人名曰水櫃因土人乘涸佔種漸致狹小宜乘湖水稍落時除墾熟田畝外丈量立界嚴禁侵佔設法蓄水如遇運河水漲引注湖中相平即築堰截堵遇運河水淺則引之從髙下注其諸湖或應築隄栽樹或應建閘啟閉令各州縣循例辦理則湖水深廣運道流通漕艘無阻滯之虞矣八月奏言洪澤湖水微弱黄水有倒灌之勢臣率道㕔督築清口兩岸大壩各寛八丈東長二十六丈七尺西長二十四丈中留水門五十丈束髙清水以抵黄現在淮水暢流惟此壩在洪濤大溜中兩面受敵必湏加意修防因派工員協同汛弁率領河兵一百長夫三百常川住宿工所多備埽料樁䋲等項如遇湖漲壩工稍有蟄陷即用料加鑲下埽搶䕶遇黄漲即用混江龍鐵篦子諸噐駕小舟往來疏濬不令少停焉九月奏報秋汛已過河工平穩得㫖下部優叙加三級特賜戴孔雀翎二年四月廣西巡撫李紱将之任上諭及淮揚運河淤墊年久水髙于城危險可虞李紱奏言若于運河之西另挑新河一道以所挑之土另築西隄而以舊河之身作為東隄則東面永無潰决之患上即命李紱往㑹齊蘇勒商酌齊蘇勒奏言淮揚運河綿長三百餘里上接洪澤下通江口河之西岸逼臨白馬寶應界首諸湖水勢汪洋一望無際今若改挑新河築西隄于湖水之中畚鍤難施東岸之閘壩㴠洞皆湏另行創建不惟糜費千百萬帑金而且大工終難告就上是其言九月奏報秋汛得㫖齊蘇勒督率属員修築壩隄堅固雖河水泛漲而各工無虞甚属可嘉下部議敘特予騎都尉世職是時上知臣下有與尚書隆科多總督年羮堯夤縁結交者諭齊蘇勒曰爾之勤勞固不待言而一塵不染獨立不倚從未聞夤縁結交更属可嘉又諭曰近日隆科多年羮堯大露作威福攬權勢光景朕若不防微杜漸此二臣将来必至不能保全爾等皆當疎逺之隆科多止論爾操守平常而年羮堯前嵗數奏爾不學無術必不能料理河務朕以此知爾之獨立也三年二月副總河嵇曽筠奏請挑挖祥符縣回回寨引河詔與齊蘇勒商酌嵇曽筠復奏言亟宜乘汛水未發興工不及待㑹勘既而齊蘇勒至武陟奉詔同總督田文鏡察視引河有無禆益齊蘇勒奏言挑挖引河必湏上口正對頂衝而下口有建瓴之勢方可吸引大溜歸入新河借其水力滌刷寛深嵇曽筠所挖引河工已将竣臣往看上口之地勢與現在水向不甚相對改挖上首三十餘丈以對頂衝以迎大溜又往對岸指示建築挑水壩挑溜順行以對引河之口俟水漲時相機開放庶河勢得以直暢東注而南岸隄根可保無虞耳奏至諭曰朕慮嵇曽筠或料理未妥今覧奏方慰可謂得法矣七月命内閣學士何國宗偕測算官員攜儀器閲河遇齊蘇勒所駐近地㑹同勘視齊蘇勒尋奏言皇上頒發儀器測度地勢於河工髙下之宜甚有凖則今洪澤湖滾水石壩舊立門檻太髙不能随勢洩水請敕閲河諸臣于明春視海口後遶至湖隄用儀器測度地勢改落石壩門檻庶全湖宣防有賴又奏言治河物料葦栁為先毎年捲埽之葦輒千百萬束俱動帑購買仍湏以栁枝為骨在官園伐以濟用栁多則工堅而帑省栁少則用葦多而工不固臣於去冬勸令道㕔等官及標下營弁各扵空閒之地栽種栁秧陸續據報一百二十三萬二千餘株今通行察閲除枯損之外成活八十九萬二千餘株又臣往来看工見山東江南蓄水沮洳之地皆可種葦今春令㕔員買葦根試種近據報微山湖邉種葦八頃餘畝蔓延青葱此皆各官自願試種非邀議叙者今行之已有成效應請敕部酌定嗣後議叙之例以種栁八千種葦二頃各紀錄一次為率並責成専汛守備及千把總培飬柳枝遇枯損即為栽補違者分别議䖏如此三五年栁株䖏䖏成林湖葦叢生不費購買而工料充裕矣事並得㫖允行十二月奏言河臣薪水舊由各㕔供應毎年有一萬三千餘兩臣奏明禁止並裁革四季節禮又河標四營舊有坐粮四十分毎年一千一百餘兩臣到任後交中軍為修造墩䑓製換盔甲器械之用其塩商陋規銀二千兩為出操騐兵賞功犒勞等費而毎年往来勘估及伏秋兩汛駐劄三省適中之地隨役及卷案不可減省凡車馬舟楫日用米蔬之需逺者數百金近者一二百金前此尚可勉强支持今春由徐州赴武陟拮据寔甚現據河庫道張其仁言庫收額解錢粮向有随平餘銀四千兩除道衙日用及各項工食不過千金餘銀三千兩請支銷看工車船等費臣因未經奏明不敢擅便倘䝉恩賞給則看工之盤費弗缺益得殫竭心力辦理河務矣奏至得㫖此項通融取用甚好卿之清勤朕所深悉勉為之四年四月奏睢寕縣朱家口黄水驟長東岸壩臺大埽蟄䧟現在防守修築上諭大學士曰齊蘇勒在工年久歴練老成清慎勤三字均属無愧今年已望七見壩埽蟄陷必晝夜焦急朕甚憐之且此時勉強施工将來伏汛秋汛恐又不免衝决可令酌量情形不必急迫齊蘇勒尋奏水復大漲壩埽倐䧟水底凛遵聖諭俟過伏秋二汛并力儧修十二月奏報朱家口决口堵閉合龍黄河自豫省至海口西岸壩隄完整諭奨其悉心任事經理有方加太子太傳五年以衰病奏遣太醫齎葠診視尋入覲諭嗣後嵗支飬亷銀萬兩六年兩江總督范時繹江蘇巡撫陳時夏奉詔開濬呉淞江因於陳家渡築壩松江知府周中鋐率把總陸章乘船督工下埽值潮迴溜激壩陷船傾周中鋐陸章俱殁於水事聞予䘏贈齊蘇勒知濬工未竟即前往經理其事尋奏言吳淞江陳家渡舊有土梗三道未曾挑清致有停沙淤塞之患今築壩開濬適逢江水海潮並長刷浄土梗檻根毫無阻滯工程可期速竣上諭部曰呉淞江工程雖交與齊蘇勒一同料理寔則范時繹陳時夏應辦之事齊蘇勒一聞陳家渡壩工衝塌即親往踏看悉心經理仰賴神佑水勢湧長将泥沙徹底刷浄水無阻滯工可告成此即封疆大臣實心為國為民感召天和之明騐著從優議叙尋部議加三級七年正月以疾劇奏上命江蘇巡撫尹繼善署理河道總督復遣太醫診視齊蘇勒疾二月卒得㫖齊蘇勒忠誠為國志行端方操守潔清辦事明敏自簡任河道總督殫心竭力奉職勒勞邇年黄水安瀾運道通順隄工堅固河帑核寔厥功懋著今聞溘逝深為軫惻應得卹典照例議奏外著加恩晉三等輕車都尉照例承襲並賞給藩庫銀三千兩為歸襯之資起程日同城文武官齊集奠送沿途地方官親往奠醊並撥兵䕶送歴来河道總督如靳輔齊蘇勒二人寔能為國宣勞有功民社著尹繼善等就近擇地為靳輔齊蘇勒合建祠宇令有司春秋致祭以昭朕優奨功勲至意賜祭塟如典禮諡勤恪以其子華善襲三等輕車都尉世職八年詔建賢良祠於京師齊蘇勒與靳輔並入祀塔勒瑪善子伊柱塔勒瑪善滿洲正白旗人姓薩克達由拜唐阿授佐領雍正二年累遷至副都統九年大兵𠞰噶爾丹䇿凌塔勒瑪善領歸化城兵千備北路軍調遣十年二月将軍達爾濟駐伯格爾上以塔勒瑪善歴練命恭賛軍務尋署前鋒統領㑹凖噶爾賊為北路軍所敗竄額得爾河源塔勒瑪善以兵追之十三年駐防烏里雅蘇臺乾隆十一年定邉副将軍䇿凌入覲命塔勒瑪善署理十三年召回京二十年正月大兵進𠞰凖噶爾派赴額爾齊斯屯田九月阿睦爾撒納由烏隆古叛遁塔勒瑪善偕定邉左副将軍成衮扎布以兵偵之十一月至烏隆古之扎克鄂博擒斬賊党肯哲顔達什巴雅爾圖薩喀及其孥二十一年授北路参賛大臣尋以年老回京任䕶軍統領二十五年卒長子伊柱乾隆九年任佐領二十年授二等侍衛二十一年九月授索倫總管偕副都統濟福侍衛徳爾森保赴喀爾喀車臣汗部緝刼賊十一月俄羅斯奈瑪爾等越境肆竊伊柱以呼倫貝爾兵五百駐卡倫候調遣二十二年齊木齊格特賊什第等逃至呼倫貝爾游牧之西黙爾根哈瑪爾伊柱等盡擒之下部議敘二十四年正月偕副都統富景觧馬赴阿克蘇四月随将軍兆恵軍營行走七月逆酋霍集占棄葉爾羌走副将軍富徳等追至阿勒楚爾賊設伏兩山間我兵分三隊奮擊伊柱領右翼自辰至午賊大潰翌日至巴達克山界伊西洱庫爾淖爾賊據險守大兵分路攻剿樹四纛降賊萬餘伊柱偕巴圖濟爾噶勒等堵截山後䇿應有功九月富徳派侍衛賽音圖等往巴達克山勒獻霍集占伊柱駐兵卡倫張聲勢瓦罕伯克以户口降十一月巴達克山汗素勒坦沙函獻霍集占首回部平伊柱領兵千駐喀什噶爾十二月領駐防兵䕶回人於伊犁屯田二十五年正月命協捕嗎哈沁二月大軍凱旋上御豐澤園幄次宴賚将軍兆恵等及從征将士賜伊柱縀十二銀五百兩四月伊柱奏言臣分領屯田回人至海努克其地舊有廟宇營壘周圍俱可耕種即将官兵駐剳距回人二三里易為防䕶伊犂河南安臺瞭望共五處立村荘十五修葺溝渠引水灌田所携粟麥本月播種全完回人所分各荘均有墻垣基址暫搭窩舖俟農隙伐木作屋諭曰看来伊犂屯田俱有舊蹟将来漸次開拓更於軍食有禆著傳諭伊柱於一切應辦事宜先時相度加意奮勉十二月以屯田豐收議敘加一級二十六年哈薩克属人越境游牧伊柱以兵驅令遷移二十七年追叙平定凖噶爾及回部功給騎都尉世職二十八年授鑲藍旗䝉古副都統三十二年隨将軍明瑞征緬甸擊賊老官屯三十三年病卒敕照陣亡例議䘏賜祭塟又給一騎都尉併為三等輕車都尉子額爾登布襲官黒龍江副都統鄂彌達鄂彌達滿洲正白旗人姓鄂濟雍正元年由户部筆帖式授吏部主事累遷郎中五年命同廣東巡撫楊文乾等往福建清查倉庫六年授貴州布政使以妄請清丈軍田並令地方官管社倉定考成訓飭之八年擢廣東巡撫九年三月疏言鳥鎗向有嚴禁但廣東瓊州孤懸海外民藉鳥鎗為防禦未便照内地收繳請令户各蔵一多者治罪下部議行六月請移廣州府通判駐新城南海縣縣丞駐十三行從之九月又奏移設官弁事宜一新㑹開平兩縣界之大官田清逺英徳兩縣界之大埔坪均衝要請各設捕盗同知大官田同知就近歸肇羅道大埔坪同知歸廣南韶連道轄又大埔坪請撥駐右翼鎮標千總一兵三十令該同知轄一陽江縣之海陵島電白縣之沙􅀈墟距本縣逺請各増巡檢一廣州府理猺同知向兼連州連山陽山三州縣捕務後改理猺軍民同知専理猺事捕務停管年来猺馴事簡請将三州縣捕務仍歸理猺同知查察一移亷州府同知駐欽州瓊州府同知駐崖州髙州府通判駐府属之梅菉羅定州羅苛司巡檢駐州属東安縣之西山其原管地歸東安典史轄一崖州水土惡正雜各官俱列邉俸其移駐之海防撫黎同知三年内果撫綏有術黎民安堵請照例以應陞之缺即用一潮州肇慶二府通判請兼捕盗銜分地督緝潮州府同知現駐饒平縣之黄岡専理海防請将附近之饒平恵来海陽潮陽澄海普寕六縣捕務責令兼管其附近郡城之掲陽大埔程鄉鎮平平逺五縣捕務分與通判督緝肇慶府属之髙要髙明新興陽春陽江五縣捕務歸肇慶府同知兼管徳慶封川開建四㑹四州縣捕務歸通判兼管均如所請行十一月訪得廣西梧州奸民陳美倫曽合等糾黨散剳謀不軌盡捕擒之得㫖嘉奨十年二月請改廣東撫標中軍逰撃為恭将從之尋命署廣東總督四月疏言總督向駐肇慶所以控制兩粤今廣西已歸雲貴總督轄而廣東一省廣州為適中之地請移駐廣州詔如所請閏五月訪獲饒平縣糾衆謀逆之已革武舉余猊等六月疏言廣東山海交錯俗悍民貧查肇慶府新設鶴山縣及附近之恩平開平等縣有荒田數萬畝臣現飭属招墾俾無業貧民得此資生不流為匪諭奨其料理妥協八月請移合浦縣縣丞駐永安地方從之是月實授廣東總督九月奏臣前在巡撫任内有安南番民鄧文武等五十六人遭風飄入廣東銅鼓角海面臣給印文及路費送歸今伊國王寄到伽南沉香生絹棕竹胡椒燕窩魚翅海参諸物為謝臣却還不受諭曰辭讓不受甚是仍湏婉言覆之庶為得體十二月疏言廣州府省㑹有潭州及黄梁都諸海口寥濶無藩籬請於潭州罟草汛築土城移守備一兵百二十駐之黄梁都亦築土城移都司一兵百二十駐之凡附近省城險要各増墩䑓分布弁兵又言廣州商賈雲集本地産榖不敷民食向皆仰給廣西販運遇榖賤則西販觀望不前而東省價輒驟昻惟有買備平糶之法查距廣州百二十里之三水縣属有西南鎮為西販聚所請就彼建倉於西榖擁積時買貯數十萬石榖貴則開倉平糶所需銀於江西撥備項内動五萬兩分年扣還廣州粮捕通判事簡令専司其事管倉之員即以三水縣西南驛驛丞兼充詔均如所請十一年三月請改程鄉縣為直𨽻州轄興寕長樂平逺鎮平四縣教諭改學正典史改吏目部議從之定新改直𨽻州曰嘉應五月疏言米貴由囤户居竒一日間其價頻増一店長價諸店皆然名曰齊行深為民病臣倣京師設米局之法於廣東省城設米局三動廣州府及番禺南海二縣倉榖平糶倉斗毎石定價一兩以倉大使縣丞典史領之所得價携赴榖賤處採買源源轉運諭曰平糶不過暫濟一時設局即堪行之永久此奏殊属可嘉七月疏言各標協營及舖户行匠所用硝磺向由布政使給票買運據布政使甘汝来詳改由總督衙門給票稽查較嚴密請如所議辦理詔永為例八月請令韶州府粮捕通判兼理曲江樂昌乳源三縣猺務改給闗防並立猺甲猺目查察從之十二年三月請増設龍川縣巡檢及平逺縣壩頭司西寕縣懐鄉司夜䕶司巡檢各一裁都城司巡檢從之七月以保舉革職知縣王者輔考語失當訓飭之八月兼管粤海闗税務十二月疏言欽州属之東興街思勒峝地近安南民夷雜處且多私販請於龍門協酌撥千把總一兵五十防守新興街移本州州判駐之再於該協抽撥隊目一兵十七防守思勒峝令廣州府同知就近彈壓均如所請行十三年四月命兼轄廣西仍駐肇慶府閏四月疏言新寧縣属之廣海寨濵海距縣逺請移本縣望髙司巡檢往駐再上川之大蓢灣下川之大坦二處與縣寨俱隔大洋請増設陸路二汛從之五月貴州台拱逆苗不法鄂彌達奏派廣東督提標兵二千令左江總兵王無黨率赴古州援𠞰又調廣西撫標兵五百駐黔粤界軍機大臣奏其調度妥協諭奨之乾隆元年五月疏劾廣東按察使白映棠於奉㫖免緝私塩一事並未遵奉原文分别老㓜男婦擅發小票混稱貧難百姓挑負四十觔以下者不許緝捕致强壮奸徒無不藉口貧民公然成羣販私白映棠以刑名官攙越塩政率意妄行咎實難逭諭曰朕因各省塩務向来辦理未妥不肖官吏往往縱放大梟拘拏小販以致濵海近場之窮民藉肩販以度日餬口者胥受擾害是以諭令寛其禁約母許苛求原以恵養貧民並非縱容匪類聽其作奸犯科也豈知無賴之徒妄稱奉㫖肆行無忌若不速加嚴懲則各處聞風效尤将大為地方之害近日李衛之嚴密查拏鄂彌達之據實叅奏此二人辦理乃深知朕心而洞悉政體者若天下督撫皆似此居心不存觀望之念秉公執法則兇暴咸知歛跡必無長奸貽患之慮矣鄂彌達著交部議叙白映棠職司刑憲不能禁約私梟反出示給票縱民為匪甚属溺職著觧任來京候㫖十月疏言廣東塩向由各場配運至省河及潮州廣濟橋轉兑各埠例俟各埠商将引餉塩價全完方准運埠發賣但商貲㣲薄完餉後毎無餘力並完塩價勢必不能乗時全拆秋冬水淺運艱無塩接濟於民食未便請每年春夏運到鹽包如該埠額引三封者准其先拆一封多寡照此逓算運貯各埠倉備秋冬銷賣照例先完餉銀其塩價限開倉後兩月完繳商民兩便下部議行時御史薛馧條奏廣西團練鄉勇並設猺童義學疏下鄂爾達議二年三月奏言鄉勇原可以助官兵之不逮但今昔異勢未便輕議無論鄉農應募其坐作止齊非練總甲長所能操演即有司中曉暢戎務者亦難其人而終嵗簿書鞅掌又何暇循行村落為之訓練且良懦者必不肯應名願充者必多属强悍若輩藉有在官名籍保無滋釁生事若復議贍給費且不貲與増官兵異臣愚以為不若訓練土司兵於邊疆有益至猺童義學廣東韶連等属前已設立著有成效應如薛馧所奏得㫖如議尋疏言恵潮二府嘉應州属之民挈眷入川過多恐其中或有被川民煽誘者臣委員赴川粤界查票騐放如無票及人票不符即按名給與口粮路費令回籍仍飭各州縣不得濫給照票又言廣州府属之靖康歸徳二塩場毗連請裁靖康場大使併入歸徳場改為歸靖場香山場向無専員請増設大使髙州府属之博茂場亦増設大使改為電茂場均從之五月疏言貴州新闢苖疆督臣張廣泗奏設屯軍墾逆苖絶田臣以現今苖稀畏威安帖將来生齒漸繁地少人多必致怨生又恐屯軍虐苖激變請將屯軍撤於附近防守其田仍給苖民諭曰所奏識見甚正即朕意亦然但張廣泗持之甚力兼以首尾承辦此事不得不照彼所請然朕則以為終非長䇿也十二月疏言准部咨廣東開採銅礦查惠潮韶肇等府州礦山甚多若一時俱開不但需員料理即殷實之商亦難驟得請先開惠州府屬之歸善陽春韶州府屬之英徳曲江四處嵗可得銅三四百萬觔於京局鼓鑄有益迨積有餘銅廣東亦可開局鼓鑄銅價自平報聞四年二月調川陜總督四月疏言陜西榆林府沿邊貧民嵗往鄂爾多斯種地論牛納租其牛具籽種日用口食悉貸之鄂爾多斯秋收餘糧又向鄂爾多斯易牛羊皮携至内地變價然後重息還債層層剥削可憫為貧民計不若春間領票出口時酌所種多寡官借以銀不取其息秋收時即将所收粮照時價交抵嵗以為常不但貧民免借貸折耗之苦而倉儲亦可漸充諭曰如此辦理亦籌備積貯之一道六月又言陜省麥多榖少從前民借俱令還榖致積欠至百餘萬石上年奉㫖准以一麥抵還二穀閭閻踴躍完納倉貯不致虚懸請嗣後遇災賑動倉榖時儘小麥支放毎石抵榖二石諭曰此議甚為妥協七月又言臣前因陜甘倉儲未充請禁隣省商販並撥司庫銀採買奉㫖令臣與山西撫臣石麟妥議今議如晉省豐收陜省即禁販出境若晉省告糴即通販放行俾彼此緩急得濟再今嵗陜西並甘肅蘭鞏平慶等處夏季豐收乞允臣前奏於司庫内撥銀十萬兩酌量採買並於陜西附近晉省及甘肅附近寧夏之地多貯一有急需撥運便捷諭曰所議甚是如所議行十一月奏修寕夏府渠道資灌溉並加修沿河長堤一道上報可又奏安西鎮逺在口外鎮標三營額設馬歩兵三千除駐防哈密暨安塘逰巡差遣並承種屯田存城兵僅數百年來商民日増請照涼州栁林湖屯田之例募流寓民人及營兵子弟承種屯田将原派種之兵撒回存城差操以實營伍其屯田毎年所收民得六分官得四分按數輸偹兵粮籽種牛具官為借給秋收扣還交靖逆通判管理安西道督查部議從之五年三月命來京候㫖先是鄂彌達任兩廣總督時革職知府袁安煜逗遛廣州放債盤剥並串同鄂彌達家人蕭二霸佔煤山至是為接任總督馬爾泰所劾刑部鞫寔以聞諭曰鄂彌達身為封疆大臣一任家人交結属員霸佔民利婪贓盈萬招搖不法實属溺職鄂彌達著革職袁安煜借帑營私恣肆妄行似此貪劣之員鄂彌達曽在朕前奨以好語以致袁安煜肆無忌憚更属徇庇袁安煜應賠贓銀著鄂彌達照數另賠一倍以示罰懲十月授兵部侍郎六年授寕古塔将軍尋調荆州将軍九年二月署湖廣總督十月疏言武漢各属城郭民田逼臨水次全賴隄塍保䕶武昌城西南保安門之外蕎麥灣向有老隄臨江為金沙洲之隄防即武昌之保障江流衝激日漸坍缷應冄退入灣裏築大隄一道又安陸府属之沙洋大隄為漢口險工現議修築但漢水日趋南應増建月隄請借帑五萬兩交商營運生息備工用再襄陽府之老龍石隄舊有子隄漸坍嵗修銀僅三百餘兩請将庫貯軍需項下撥五千兩交商生息備用部議從之十二月疏言湖北有待撥直𨽻米二十萬石今嵗直𨽻湖北俱獲豐收而浙江間有被水應賑處請酌撥十萬石運浙備糶所得價歸楚買補上嘉允之十年實授湖廣總督十一年以疏恭驛塩道曹繩柱諭曰鄂彌達行止不檢久經廢棄朕復加擢用兾其痛改前非力圖報稱乃伊自任湖廣總督以来舊習未除於一切地方事務並不實心經理即今曹繩柱貪劣各欵亦係奉朕諭後始行查叅可見於察吏安民處並不留心且年已就衰不稱封疆之寄著来京候㫖十五年授吏部侍郎兼副都統十六年授鑲藍旗漢軍都統仍兼侍郎事十九年二月以察議侍郎張泰開徇私保舉事不寔議革職得㫖從寛留任十月署吏部尚書二十年五月兼管工部尚書六月授刑部尚書仍署吏部尚書兼議政大臣九月署直𨽻總督上巡幸畿甸賜詩曰㡬輔嵗巡省清塵勤且諳長民寕秖此適已率為慙嵗美人教儉男耕女拙蠶實心日戒五異政蹟宗三切以慈祥𨗳徐将禮樂涵休風自首善遐壤庶因覃二十一年四月兼吏部尚書十二月協辦大學士二十二年命紫禁城内騎馬加太子太保二十三年八月協辦歩軍統領衙門刑名事務十月充經筵講官二十六年五月以病賜人葠並遣醫診視七月卒遺疏入諭曰鄂彌達敭厯中外宣力有年今聞溘逝朕心深為軫惜著加恩賞銀二千兩辦理喪事仍派散秩大臣一員帶領侍衛十員往奠茶酒應得䘏典該部察例具奏尋賜祭塟如例諡文恭欽定八旗通志卷一百六十一
