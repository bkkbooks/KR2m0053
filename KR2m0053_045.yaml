body:
  text: 旗分志三十一八旗户籍編審丁册投充人戶另檔人戶漢軍出旗買賣奴婢編審丁册國初定制編審各旗壯丁時令各該佐領稽察已成丁者增入丁册其老弱幼丁不應入册係瀋陽者赴瀋陽勘驗係東京者赴鞍山勘驗有隱匿者壯丁入官伊主及該佐領領催各罰責有差又定置買人丁及新成幼丁許令編入本佐領誤編入别佐領下者退回又定八旗新添壯丁每旗編佐領三十有逃亡缺少者於諸王貝勒貝子等府壯丁內撥補足額仍將該佐領治罪嗣後每三年編審一次又定每佐領編壯丁二百名又定旗員子姪俟十八嵗登記部檔後方許分居如未及嵗數擅分居者議罰又定新滿洲壯丁令酌撥舊丁內編成佐領天聰四年十月上諭曰今時值編審壯丁凡總兵副將參將逰擊備禦等官俱宜自誓牛録額真各察其牛録壯丁其已成丁者即於各屯完結凡當沙汰老弱及新編幼丁係瀋陽者赴瀋陽勘驗係東京者赴鞍山勘驗此次編審時或有隱匿壯丁者將壯丁入官本主及牛録額真撥什庫等俱坐以應得之罪若牛録額真撥什庫知情隱匿者每丁罰銀五兩仍坐以應得之罪其牛録額真之革職與否應俟另議凡諸貝勒包衣牛録或係置買人口及新成丁者準與增入毋得以在外牛録下人入之如丙寅年九月初一日以後有將在外牛録下人編入者退還原牛録又固山額真牛録額真俱先令盟誓凡貝勒家每牛録止許四人供役有溢額者察出啓知貝勒退還如貝勒不從即赴告法司若不行赴告或本人告發或旁人舉首將所隱壯丁入官若固山諸貝勒俱屬知情即撥與别固山如諸貝勒中有不知情者即撥與不知情之貝勒九年七月分别管理漢人官員以各堡生聚多寡黜陟之一等甲喇章京李思忠原管壯丁六百一十五名凡七年增丁一百一十三名升為三等梅勒章京牛録章京楊於渭原管壯丁九百八十六名凡七年增丁一百六十一名升為三等甲喇章京廢官佟三原管壯丁九百二十三名凡五年增丁七十八名主聚雖少以其革職後能實心任事優升為三等甲喇章京牛録章京吳裕原管壯丁二百二十名凡三年增丁一百六十名生聚甚多升為三等甲喇章京三等梅勒章京李國翰原管壯丁三百六十名凡四年增丁二百四十三名又曽輸捐己糧米五十五石以食貧民雖值歉嵗仍主聚繁衍升為二等梅勒章京髙鴻中原管壯丁六百七名今減一百四十一名張士彥原管壯丁四百五十名今減一百二十八名金玉和原管壯丁八百四十四名凡八年減一百六十九名李時馨原管壯丁七百七十六名今減一百三名張大猷原管壯丁六百名今減一百八十一名祝世廕原管壯丁八百名今減二百六十名吳守進原管壯丁七百八十一名今減三百六十六名各罰銀百兩髙拱極原管壯丁二百六十八名今減一百五十一名蒲時雍原管壯丁一百九十九名今減一百一十二名俱革職為民楊興國原管壯丁八百名今減三百七十二名革職為民仍罰銀百兩馬如龍故金海塞接管壯丁減二百八十七名罰銀百兩革去旗鼓永與本貝勒為奴順治八年定原在盛京編審另分户人有告稱係伊奴僕者不準歸併係户籍內人有告稱非係伊家奴僕者亦不準九年議準內府及諸王府官員有勞績素著者特選數員令其開出府佐領各歸所屬佐領其父子兄弟間散者準其帶出現有職任者不準帶出其撥出官員不必頂替十七年題準凡官員子弟有職任者不拘定限嵗數準其分户康熙四年題準滿洲蒙古有一佐領餘丁多至百名以上願分作兩佐領者聼八年題準凡調補管别佐領者止準帶本家壯丁若將伊兄弟族中壯丁帶往者俱令償還十三年覆準八旗每佐領編壯丁一百三四十名餘丁彚集另編佐領或所餘丁僅百名以上不足定額者該旗王貝勒貝子公等併都統副都統佐領酌驗無誤披甲當差出結移送到部亦準編作佐領雍正五年二月八旗都統等議覆據副都統祖秉衡奏稱伏查定例八旗間散人丁三年編審一次凡身材至五尺者添注册內已故者分析裁汰但厯年久逺佐領等官均視為泛常隨意去留不無遺漏錯誤之處仰請嗣後遇編審人丁年分各佐領造具戶口册籍務令開寫眀白其外官家屬亦不許任意隱瞞交與該都統詳查造具清册二本一本送部一本收貯該旗以備查閲今年即係編審年分相應展限半年交與該旗各佐領逐一詳查造具清册保送戶部則既可以稽察間散人丁實數而屢年遺悮情弊亦可剔除等語應如所請嗣後造審丁户口册俱令開寫一户另户某人某人有官職者開眀官銜無官職者開寫間散人將伊父兄職名添注本人名下將伊子弟造入户口下俱作叧户分造滿洲蒙古旗下家奴及滿洲蒙古並漢軍家下壯丁等俱開列花名核明送部其各省駐防官兵以及地方文武各官子弟家屬俱令戶部行文各該將軍督撫查眀照此造具清册咨送俟各處檔册到齊之日各該旗附入佐領册內鈐印報部存案以後三年編審一次俱令照此造册俟命下之日通行八旗併包衣佐領琿托和一體遵行奏入奉旨依議七年九月户部兵部議覆據副都統髙應􅞪奏稱定例八旗壯丁三年一次編審請嗣後凡世管佐領公中佐領下之叧户壯丁無論在京在屯自十五嵗以上令該管官將花名與本人查對眀白注册其應裁者并聲明緣由送部稽查再原管佐領下家役甚多亦應與另户一體編審數增者應給紀録數減者照例治罪如有舛錯遺漏者將該管大臣官員等一併從重治罪等語查雍正四年十二月內正白旗漢軍副都統祖秉衡條奏各佐領下造送户口檔册時將一戶某人名下有官無官之處開眀並將伊父兄職名填注其子弟俱令分為另户一事經八旗大臣等議覆準行在案今應如副都統髙應􅞪所請嗣後凡世管佐領公中佐領下之家丁仍照例不議增減外其另户壯丁遇編審察考時無論在京在屯年至十五者令該管官詳查務將花名與本丁對看方行注册其應裁者亦必確查聲眀緣由注册送部以憑稽查再八旗漢軍原管佐領下挑選食糧人內家僕甚多此等雖非另戶但挑選食糧時如無另户即由家役內挑補嗣後亦應年至十五令該管官逐名編審注册以備挑補又奏稱數增之佐領酌給紀録數減之佐領照例治罪如有舛錯遺漏不實情弊將該管大臣官員一併從重治罪等語查壯丁三年一次編審應屬可行如果逐人查明新增之數加多亦係職分中易為之事酌給紀録不可致其妄希恩賞若仍照前草率辦理將頂名者任意妄報填寫以及遺漏數減將該佐領併該管各官酌量事故重輕分别議處俟命下之日行文八旗以及包衣佐領一體遵行奏入奉旨依議又是年十一月八旗大臣等議覆據副都統圖克善奏稱請嗣後八旗滿洲人等産生男女俱令于滿月之後即呈報佐領注册至十嵗時由佐領參領呈報都統如有隱匿者從重治罪併請傳知蒙古漢軍以及各省駐防處一體遵行等語應如圖克善所請嗣後自大臣官員以下至間散人等凡屬正身另户生有子女俱令于滿月時即告知族長呈報佐領注册每年一次令各佐領查眀已故之數銷案至十嵗時具結呈報參領鈐蓋關防保送至都統處注册已故者查眀銷案如有隱匿不報者查出將隱匿之人交部嚴加治罪外其失察之佐領以下及族長等俱交部察議再抱養之子女亦令照此呈報注册如非本身所生之子女妄行揑報注册將佐領以下及揑報人一併治罪其原出結注册之參領等亦交部察議如此凡開檔養子緣由既明而彼此首告之弊可除矣俟命下之日將嵗數已及記檔之男女俱行查眀著都統衙門注册奏入奉旨依議八年正月奉上諭京城佐領越旗移置者甚多因命大臣等均勻派定外省駐防八旗滿洲蒙古漢軍亦有隨京城佐領越旗移置者其移置之旗人丁既多則移出之旗人丁必少是以人丁數目不均如何令其不致移動之處著八旗大臣等會議具奏特諭八旗大臣等議覆從前因在京八旗漢軍佐領多寡不同特降諭旨酌量移置俾得均勻惟各省駐防兵丁已經八十餘年其間滋息不同又有隨京城佐領移置者是以人丁數目多寡不均應令各省將軍副都統等將各該處官辨入丁數目查明不論在京之本佐領惟視彼處之丁數均勻分派若四旗駐防之處即在四旗之內均派八旗駐防之處即在八旗之內均派將均定之户口另造清册以備查核補授官員挑取兵丁即在所均置之旗揀選再將京城之本旗本佐領仍記檔案每于編丁之年令其照常咨送各該旗報部至五年十年之後或有生齒多寡不同之處令各該將軍副都統等奏聞再行均置如此則人丁數目俱得均勻而升轉差役亦不致于壅滯矣奏入奉旨依議乾隆三年七月正黃旗漢軍都統奏臣旗耿姓公中三佐領奉旨改為世管佐領其佐領下人等應作為屬下或作為另户恭請欽定奉諭旨此佐領下人等俱實係另户著曉諭伊等知之四年二月戶部議覆鑲黃旗漢軍副都統王進泰條奏查三年一次編審八旗人丁關係清理户口整頓名分在部在旗均有稽查之責遇比丁之年將十八嵗以上者查眀造入壯丁册內分注另户開户户下填寫三代履厯鈐印咨部仍存旗一分以備稽考其各省駐防并外任官員户口由各該將軍督撫造報自應畫一一嗣後各省駐防將軍都統以及各該督撫凡遇比丁之年將駐防人員以及外任旗員户口俱照右衛等省駐防處造報丁册之例每旗各造丁册二分鈐印送部一分臣部存案一分咨旗辦理庶內外事歸畫一而册檔亦便于稽查六年十月户部奏盛京內務府未入旗檔人丁約有六七千人毫無管束請飭三旗佐領清查入册歸于現在納差人數內將納差數目均分交納嗣後比丁之年所入人丁亦即照分納數目添差則差輕易納自無隱漏之弊奉諭旨著照所請行八年十一月大學士伯鄂爾泰等議覆總理三陵事務公祿慶條奏在京八旗并外省駐防各處向例俱三年一次比丁今陵寢所有內務府總管及總管禮部等處所屬旗人俱係在京各旗佐領下人理應一例比丁相應交與總理陵寢事務大臣等俟比丁之年該處一應所屬旗人逐一查眀悉造入比丁册內移咨户部各旗詳查二十七年副都統富德條奏本旗大小官員兵丁户口不拘年嵗每年二月內造報都察院一次以上編審丁册另檔人戶雍正七年六月鑲藍旗滿洲都統綽竒等將伊該旗佐領富泰徇隱開檔之人及養子等令當護軍之處參奏奉上諭佐領下滿洲少者恐廢佐領將戶下滿洲及家生子開檔人載入另戶滿洲册內令當前鋒護軍者其情尚可原宥倘佐領下滿洲本多而佐領知而作弊或將養為子嗣之漢人載入滿洲册內令當前鋒護軍則理宜治罪爾等將富泰佐領下滿洲之數詳查具奏再八旗現今開檔人及養子當前鋒護軍者甚多輩即與滿洲等矣其中亦有人去得漢仗好效力行間得厯官階者或佐領等懼罪不報而伊等又恐黜退隱忍不首必且令刁惡之人致生訛詐控告等事著交八旗大臣等將朕此旨曉諭各旗佐領有將開檔及養子挑為前鋒護軍者各將緣由報明其開檔及養子亦令從實自首並不革退伊等之前鋒護軍如有人去得行走好者亦於應升之缺列名既經開檔即係另户惟另記檔案俾得明晰則可免後日控告之端矣倘於此時隱忍不吐實情日後查出或被旁人首告將伊等從重治罪特諭雍正十二年七月八旗都統等議覆據署副都統事護軍參領額爾圖奏稱除八旗所有開户過繼養子人等內有已至前鋒護軍領催者俱各另行記檔外伊等子弟及本身原係開戶養子已入另户檔內之人遵旨自行出首彼時因未至前鋒護軍領催不準另記檔案此等之人既經一例行查亦因準將伊等注入另記檔內仍分晰族支係何人之子孫編入支派照户口造檔鈐用印信收貯存記等語查開户養子人等內有已至前鋒護軍領催後遵旨將本身實情首出另行記檔人等之子弟以至從前詳查之時未至前鋒護軍領催已入另户檔內之開户養子均屬一體若不另行記檔恐有不肖之徒將來不無混行訛詐等弊應照額爾圖所奏遵旨自行首出實情另行記檔人等之子弟以及曽經詳查之時未至前鋒護軍領催已入另户檔內之開户養子俱令各該旗復行確查分晰族攴編次支派按其輩數注眀何人之子何人之孫每佐領下造具清册二本鈐用印信一本存貯該旗一本咨送户部永逺備查將總數交當月旗彚齊奏聞此次行查若不將實情首出有敢隱匿者或被查出或被旁人首告從重治罪如奉旨查眀後又復夤緣串通冒入滿洲檔內者除治罪外仍記入開户養子檔內再伊等挑選前鋒護軍併得恩賞銀兩等處俱照原奏定議給與另行記檔之人如伊等內有軍前行走出衆著有勞績或漢仗好人去得辦事好有品行之人著該旗大臣預將緣由聲眀奏聞帶領引見補授官職如遇比丁之年伊等有添裁之處亦于丁册一體造寫奏入奉旨依議乾隆二年七月兵部查奏出征開檔兵丁準作另戶內有家下披甲等兵不應作為另户北路大將軍等一併造送實屬朦混應將該處造送官員交部察議一摺奉諭旨此等家下披甲等兵既在軍營效力多年且該將軍等保送在一等二等之內俱著加恩照開檔兵丁例準作另户其造册朦混辦理踈忽之大臣官員等俱從寬免其交部十五年正月奉諭旨八旗另記檔案人等經朕屢次交查俱加恩仍留本任定以停其升轉之例乃辨名定分以杜不肖上司之索詐併伊等希圖僥幸妄行鑽營之弊也近據鑲黃旗蒙古都統查出另記檔案之主事巴達克圖等經該部察議具奏革職但念八旗此等人員自行首報後升任補用者自屬不少如不徹底清查現在查出之人既經治罪而未經查出之人竟爾僥幸於理未合若各旗將此等人員俱行查參革退朕心甚為不忍惟恐伊等失業深用惻然著傳諭八旗滿洲蒙古漢軍都統等將所管旗分叧記檔案人員徹底查眀具奏造册送吏户兵三部以備查對此內現任文武官員俱加恩免其革職各留本任至停其升轉并伊等子孫不準考試居官仍準挑補前鋒護軍馬甲之處俱照從前定例遵行所有另記檔案之現任文武官員朕既加恩免其革職其參革之鑲黃旗主事巴達克圖亦照此辦理嗣後如遇伊等升缺該部按册查眀停其升轉至此等人員內果有曽經效力人去得者各該處將伊等另記檔案之處聲眀請旨此朕格外特恩倘仍有隱匿不實妄圖僥幸併將另記檔案之處不行奏明含糊保題升轉者或經查出或被旁人告發定將保題之該管大臣等一併從重治罪斷不寬貸二十一年二月上諭八旗另記檔案之人原係開户家奴冒入另户後經自行首眀及旗人抱養民人為子者至開户家奴則均係旗下世僕因效力年久伊主情願令其出户現在各旗及外省駐防內似此者頗多凡遇一切差使必先儘另户正身挑選之後方準將伊等挑補而伊等欲自行謀生則又以身隸旗籍不能自由現今八旗户口日繁與其拘於成例致生計日益艱窘不若聽從其便俾得各自為謀著加恩將現今在京八旗在外駐防內另記檔案及養子開户人等俱準其出旗為民其情願入籍何處各聽其便所有本身田産並許其帶往此畨辦理之後隔數年似此查辦一次之處候朕酌量降旨此內不食錢糧者即令出旗外其食錢糧之人若一時遽行出旗於伊等生計不無拮據其如何定以年限裁汰出旗之處交與該部會同八旗都統等詳悉定議具奏二十六年十一月兵部議寧夏將軍達色奏披甲二達色打仗身亡與前鋒七爾圖吉勒通阿巴揚阿實係平定凖噶爾打仗陳亡得功牌之人應準其作為另户一疏奉諭旨二達色等準其作為另户以上另檔人戶買賣人口附贖身開户國初定旗下買賣人口赴各該旗市交易若越至他旗市被執者身價二分入官一分給拏獲之人又定滿洲壯丁越旗賣出被首者身價二分入官一分給首告之人買主無罪該管佐領知情者治罪壯丁撤回撥給本旗不知情者壯丁撤回撥給本佐領下貧人又定有將人父子兄弟夫婦分賣者所賣之族俱入官又題準陳獲人口有將夫婦分賣者仍令給還完聚賣主鞭責順治五年覆準投充人即係奴僕本主願賣者聽六年題準漢人不許帶出口外如口外人有來盛京購買馬匹乘機買人口者不準放出十年題準八旗買賣人口俱令該領催記册備查其民人令親鄰中證立契赴本管衙門挂號鈐印俱不必輸稅如不記册無印契者即治以私買私賣之罪十八年覆準旗下赴市買人記册時該翼查眀給以印照康熙二年題準八旗買賣人口兩家赴市納稅記册令領催保結列名若係漢人令五城司坊官查有該管官印票準買永著為例八年題準旗下買民令本管官用印若隔屬官用印照納解良民例議處所買之人釋放為民兩主各鞭責有差又議準有將定例後所買之人揑作定例前年月用印者事發用印官及買者賣者俱加等治罪又詔差遣官員並督撫提鎮大小各官不許買良民為奴及轉相餽送永行禁飭違者照略買良民例治罪十一年議準凡在順治十年以前買人未用印信審時中證眀白者斷與原主或無中證文契本人自稱賣身是實者亦斷與原主自順治十一年以後買人雖有中保未曽用印者斷出為民十二年題準旗下買民查係白契斷出為民者即遞解原籍令地方官具文報部并咨照該督撫十五年題準旗下買民令正印官用印準買若在地方犯罪逃出賣身者保人係民枷號三個月責四十板係旗人枷號三個月鞭一百原價追還給主賣身人遞解本地方官枷號三個月責四十板仍照所犯罪依律究治其旗人詭稱民人賣身者枷號三個月鞭一百保人係旗人枷號三個月鞭一百係民責四十板流徒尚陽堡若係逃人照常鞭刺又賣身人謊寫他人姓名者照光棍為首例保人照光棍為從例治罪又賣身人假揑籍貫名姓不從實開寫者枷號兩個月鞭一百仍斷與買主保人係民枷號一個月責四十板係旗人枷號一個月鞭一百十七年覆準滿洲蒙古人口不許賣與漢軍民人亦不許私贈違者將所賣人併價入官買主賣主係官革職係護軍領催披甲當差間散旗人枷號兩個月鞭一百係民枷號兩個月責四十板該管佐領驍騎校知情者革職領催鞭一百收稅官亦革職其喀爾喀厄魯特人亦不許賣與漢軍民人違者亦照此例治罪十八年題準凡旗人買民用印衙門呈送户部轉行該撫令地方官曉諭里甲如用印官十日內不將買人緣由報部者罰俸一年竟不報者降一級二十一年題準直省駐防各官及提鎮以下等官槩不許買本省之民違者降二級調用若縱令家人買者照本官買人例議處該管官失察降一級留任其駐防甲兵量許買人令賣身人親至地方官處取據口供存案立契寫情願字樣用印若未經取供文契雖有情願字樣實係勒買者買主枷號一個月鞭一百若本官囑記兵丁買者照本官買人例議處如本主在京家人披甲在外駐防者準買其在外駐防官之家人披甲者不準買又題準地方各官不遵定例妄用印信及非正印官擅用印信者降一級調用二十二年議準滿洲蒙古家人違禁賣與漢軍民人者買賣之人係官罰俸一年係旗下人鞭一百係民責四十板如佐領驍騎校內管領及收稅官知情者罰俸九個月領催鞭八十所買之人併價俱入官其喀爾喀厄魯特人不許漢軍民人買用違者係官降一級調用旗人鞭一百係民責四十板所買之人入官又題準本年十月以前有白契賣身之人審係情願中證眀白者仍斷與買主以上買賣人口凡贖取人口順治九年題準陳獲人口準令贖回凡有贖人者令嫡親家屬領歸其身價兩家各取其半康熙三年題準已撥給山海關外叛逆人犯妻子家僕有私行偷賣贖去者賣主係官革職係民杖一百流三千里係旗人枷號兩個月鞭一百専管各官俱降二級調用如偷賣贖軍流等犯妻子家僕者亦照此例議處七年覆準私贖叛逆家屬照例治罪人口身價俱入官十七年議準滿洲蒙古家人其主願令贖身在本佐領及本旗下者聽若違禁放出為漢軍民人者照買賣例治罪二十一年覆準旗下用印所買之人及舊奴僕內有年老疾病各主情願準贖者呈眀都統移送户部令其贖出為民若將年壯舊人借稱贖出者照買賣例治罪乾隆二年三月户部奏準嗣後旗下家奴果係伊主念其數輩出力勤勞年久情願準其贖身放出為民務照定例呈眀本旗報眀户部轉行地方官收入民籍如有私自放出並不呈旗咨部行知該地方官入籍為民者地方官即查眀呈報將本主照例治罪三年直隸總督以私自放出之户從前雖未呈報旗部但入籍年又若令歸旗究屬屈抑咨請為民經户部酌議具奏內開乾隆元年以前放出為民之户其有未經呈報旗部者該旗查眀果係數輩出力伊主念其勤勞情願放出編入民籍年久地方官有册可據者準其為民如係借民設法贖身私入民籍伊主既經得過身價銀兩應令歸旗作為開户壯丁四年十月議政王大臣八旗大臣會同户部議奏內稱各旗盛京帶來并帶地投充之奴僕以及乾隆元年以前白契作為印契家人之祖父籍貫飭令參佐領等自奉旨之日於一年限內令各本主據實開報該都統核明送部遇有開户為民之案以便查考其有逺年俘獲并印契置買家人伊等祖父姓名籍貫一體造册咨送户部查核至各省旗人自文到之日為始于一年限內造册送旗查眀送部查核嗣後凡遇比丁之年即照此次違報之例于編審册內注眀以便查考又是月議政大臣八旗大臣會議覆戶部摺奏內開查旗下奴僕家主情願放出乾隆元年以前已入民籍及借名設法贖身鑽營勢力欺壓贖身等欵節經怡賢親王暨戶部先後奏準定有成例應仍照舊例遵行外至乾隆元年以前未經入于民籍以及乾隆元年以後始入民籍者既係伊主念其勤勞情願放出之人與借名贖身并欺壓本主者原屬不同今借名贖身者尚準作為開戶壯丁而此等放出之人遽令歸還原主作為家奴似未平允臣等酌議此等放出為民未經入籍及入籍在元年以後之户應令歸旗作為原主名下開户壯丁至于設法贖身之戶例應作為開户壯丁者其已經議結之案毋庸置議外其未結之案或係自備身價贖身或親戚代為贖身者均應歸原主佐領下作為開戶若有實在用價契買隨又交價贖出者均應在買主佐領下作為開户如經開户壯丁給價買出者伊等原非另户正身其名下不便復有開户之人仍應歸原主佐領下作為開户十二年七月户部奏準查八旗户下家奴有借名設法贖身私入民籍以及旗民兩間者例應歸旗入于原主佐領下作為開户此等户口雖歸于原主佐領之下但係佐領下之開户而非原主名下之開戶既無本主拘管而披甲當差等事又有各佐領下另户伊等不能挑補差使間散無事必致漸成遊惰伏查先經議政王大臣等會同八旗大臣所定條欵內有乾隆元年以前放出為民之户果係伊主情願放出入籍年久者準其為民如乾隆元年以後始入民籍伊主念其勤勞情願放出者應令歸旗作為原主名下開户等語是勤勞願放之僕例應歸旗者尚入于原主戶下今借名設法為民之户查出反歸入于佐領下作為開户而不歸原主似屬輕重不均臣等酌議此項借名設法為民之僕除從前已經議結之案毋庸置議外嗣後凡此等案件或被首告或經察出查眀曽報部旗伊主得過身價者應令歸旗入于原主名下作為開户不準歸本佐領下如未經報眀部旗無論伊王曽否得過身價俱令歸旗仍作為原主户下家奴不準歸入佐領作為開户四十八年三月奉上諭向來滿漢官員人等家奴在本主家服役三代實在出力者原有準其放出之例此項人等既經伊主放出作為正身亦未便絶其上進之階但須明立章程于録用之中仍令有所限制嗣後此等旗民合例後該家主放出者滿洲則令該家主于本旗報眀咨部存案漢人則令該家主於本籍地方官報眀咨部存案經部覆準後方準其與平民一例應考出仕但京官不得至京堂外官不得至三品以示限制著為令以上贖身開户以上買賣人口併贖身開户投充人户順治元年定凡投充人口有父母兄弟妻子情願入旗同居者地方官給文赴部入册不許帶田地投獻二年題準近京地方管莊人等強壓愚民及工匠勒令投充者在內許赴户部五城御史順天府在外赴道府州縣告理審實釋放又題準有假借投充冒名奴僕混托厮養或悍奴欺壓故主部民凌厲本官及慢侮縉紳傾陷富室占騙人口財物者事發治以重罪三年題準自次年為始漢人投充旗下永行禁止七年題準投充人置買民間房地者房地並價銀入官買賣兩造從重治罪八年題準旗下探親回籍之投充漢人該佐領報部給票前往如無部票即係私逃許地方官執解又諭投充人生事害民本主該佐領知情者連坐前此有司責治旗人問罪以致投充人益加肆橫今後地方官遇投充人犯罪與屬民一體究治户部刋示曉諭十七年題準投充人誣稱不係投充者審出鞭一百如果不係投充欺壓良民者亦鞭一百又題準有將另户人告稱係伊奴僕者鞭八十其投充人先未在地方納糧後將房地納糧輒稱不係投充者審出枷號一個月鞭一百地方官混報者以抗違論經承責三十板其民人住種滿洲房地年久告稱係自已房地者責三十板又覆準各莊俱設屯領催責成清察如有指稱投充欺詐百姓者如實解部究審如係假冒地方官依律究擬康熙二年覆準凡投充人父兄伯叔住種滿洲房地子弟姪看守故土墳塋或子弟姪住種滿洲房地父兄伯叔看守故土墳塋者行地方官查其輸糧在先紅册載名者即斷為民如投充後輸糧者仍斷與滿洲八年詔投充人生事害民者本主及該管佐領連坐本犯正法妻孥家産入官罪不致死者本犯及妻孥入官嗣後地方有司遇投充人犯罪與屬民一體責治九年題準凡官員將投充人稱為納糧之民並改糧册年月移送者革職轉申上司降一級調用巡撫罰俸一年如先稱不係投充後報投充者地方官降一級調用該管上司罰俸一年巡撫罰俸六個月十五年題準嗣後有以投充滿洲之人稱為納糧之民者地方官降一級調用轉申上司罰俸一年巡撫罰俸六個月先稱不許投充後報投充者地方官罰俸一年該管上司罰俸六個月巡撫罰俸三個月以上投充人戶漢軍出旗乾隆七年四月奉上諭八旗漢軍自從龍定鼎以來國家休養生息户口日繁其出仕當差原有俸祿錢糧足資養贍苐間散人多生計未免窘迫又因限于成例外任人員既不能置産另居而間散之人外省既有親友可依及手藝工作可以别出營生者皆為定例所拘不得前往以致袖手坐食困守一隅深堪軫念朕思漢軍其初本係漢人有從龍入關者有定鼎後投誠入旗者亦有緣罪入旗與夫三藩户下歸入者內務府王公包衣撥出者以及召募之炮手過繼之異姓并隨母因親等類先後歸旗情節不一其中惟從龍人員子孫皆係舊有功勳厯世既久自毋庸另議更張其餘各項人等或有廬墓産業在本籍者或有族黨姻屬在他省者朕意欲稍為變通以廣其謀生之路如有欲改為原籍者準其與該處民人一例編入保甲有不願改入原籍者而外省可以居住者不拘道里逺近準其前往入籍居住此內如有世職仍許其帶往一體承襲其有原籍並無倚賴外省亦難寄居不願出旗仍舊當差者聽之所有願改歸民籍與願移居外省者毋論京外官兵間散俱限一年內具呈本管官查奏如此屏當原為漢軍人等生齒日多籌久逺安全計出自特恩後不為例此朕格外施恩原情體恤之意並非逐伊等使之出旗為民亦係為國家糧餉有所不給可令八旗漢軍都統等詳悉曉諭仍詢問伊等有無情願之處具摺奏聞八年四月奉旨朕因八旗漢軍户口日繁生計未免窘迫又限于成例不能外出營生特降諭旨除從龍人員子孫毋庸更張外其餘各項入旗人等有願改歸民籍與願移居外省者準其具呈本管官查奏原指未經出仕及微末之員而言至服官既久世受國恩之人在伊等本身及伊等子弟自不應呈請改籍而朕亦不忍令其出旗此奏內文職自同知等官以上武職自守備等官以上俱不必改歸民籍二十七年六月軍機大臣會同八旗大臣議覆順天府府尹錢汝誠等條奏出旗為民人等有情願入順天府屬州縣民籍者由該旗咨部外即行造册派員帶領為民人等家口一併交送順天府令該府尹查收隨派人轉送至伊等情願所入州縣查收編入村莊查管收訖之日咨覆該旗備查十月又奉上諭參革海州知州塢承顯之子塢圖麟等久未歸旗一案經該旗參奏降旨令陳宏謀眀白回奏今據覆奏塢承顯任內有應追贓項未完著落伊子等繳還是以未即回旗再塢德麟已入含山縣籍家口仍留福建舊任塢圖麟並請改入河南孟縣民籍等語似此逗遛規避實乃漢軍敝習不可不亟為整頓伊等既任外官罷職如有未完之項自應勒限速完實係無力追繳即當歸旗按律治罪何得任其遷延在外藉設措告貸之名任意遊蕩抽豐馴致滋生事端何所不有况該旗已經咨催飾詞延玩此在民人猶不可為訓何况身為旗人者乎即以情願改歸民籍而言現在著有定例並未稍為禁阻苐伊等或呈請於並無追項之前或聲眀于完欠回旗之後皆屬可行若借此巧為趨避懸帑項而廢官方此風斷不可長嗣後外省參革漢軍人員有應完欵項著于定限內催追為數過多酌量展限完納倘逾限不完即將該員等解旗治罪此案陳宏謀既未準其改籍並將塢德麟等押解回旗該旗可即遵旨辦理將來有似此者均照此例行二十八年二月奉上諭開泰奏達州知州郎炳之子郎世琳請改歸民籍一摺辦理甚為舛繆向來漢軍有願入民籍者原屬例所準行郎世琳果於該旗未催回籍之前自行呈請並無不可今以屢催不應轉藉此為名冀遂其自便狡延之計開泰稍揆事理即應據實參奏為歸旗逗遛者戒乃竟據以瀆請是其一意沽名豈封疆大臣辦公之道郎世琳著交開泰拏解來京交刑部治罪倘致兔脫則開泰當其罪二十九年十月奉諭旨鄂寧前奏所管漢軍本旗內有總兵吳應銓等俱身在旗籍而令伊子出旗為民應將伊等治罪一摺朕即交八旗大臣議奏原欲各旗一體畫一將有似吳應銓等違例之人通行查出治罪也今八旗大臣查出少卿秦炌等俱係職官曽經降旨不準出旗之人伊等竟設法鑽營令伊伯叔子弟出旗為民則伊等之不願在旗不問可知前次垂念伊等身為大員承受國恩日久不便遽行出旗是以特降諭旨逮至議覆鄂寧摺奏八旗大臣等理應議令伊等照舊在旗請旨議罪方為允協乃將伊等一槩出旗其名似以斥令出旗即為治罪之法其實直如伊等所願為之準行矣朕豈肯任其嘗試朦混于八旗大臣等倘暗受伊等干求故意巧為辦理即屬營私舞弊朕若由此深究恐伊等難以任受如實係不曉事理所致則其糊塗尤為可笑且八旗大臣中或有尚可將此自諉者至王進泰所司何事而亦可以不知自解乎現在查出秦炌之子秦廷璽等俱著撤歸本旗充當苦差行走秦炌等並著交部治罪其從前準令伊等出旗之該管都統及此次議令出旗之八旗漢軍都統一併交部嚴加議處三十二年五月奉旨陳時泰歸入民籍已經數年且該旗應襲佐領尚屬有人陳時泰不必歸旗至該旗從前並未奏請辦理殊屬不合著交部察議四十年十月軍機大臣會同正白旗查奏朱賔等呈請回旗一案朱賔朱寶原係正白旗間散於乾隆十八年入巡捕營食糧二十三年本旗將二人出旗編入大興民籍查乾隆八年户部議覆施純愷出旗案內曾奏眀襲職有分之人不準出旗在案該旗並未詳查輒將伊二人俱令出旗實屬錯悮再查延恩侯爵係雍正二年奉世宗憲皇帝特旨加恩賞賜明代子孫朱廷􅀈嫡孫朱之璉之職並非朱之璉得有功績所自立者凡朱廷􅀈子孫均屬有分朱賔朱寶二人係朱廷􅀈嫡派子孫自未便令其出旗請將二人仍令回旗照例當差但伊等於初辦出旗時並不聲明呈請乃相隔十八年之久直至出有侯爵始請回旗明係覬覦承襲希圖僥幸應請將朱賔朱寶遇有應襲時其本身概不準列名揀選以示炯戒奉旨朱賔朱寶二人準其回旗照例當差但遇應襲侯爵時伊二人本身及其子俱不準列名㨂選至所襲侯爵著軍機大臣會同該旗楝選帶領引見五十五年七月户部議奏正紅旗漢軍都統𢎞旿等參奏原任廣東新寧縣知縣夏永淳于五十二年計典參劾業經催令歸旗準廣東巡撫咨報該員貧病無力回京情願改歸江南丹徒民籍一案臣等查定例八旗漢軍京員主事以上旗員五品以上外官同知守備以上不準改入民籍六品以下現任職官并一應侯補侯選告休革退文武官員及兵丁間散人等情願改入民籍者在京準其呈眀本旗在外呈眀所在省分督撫核實報部改入民籍在外者參革漢軍人員應完欠項逾限不完者應將該員等解旗治罪不準為民今查夏永淳先據該撫咨報無力歸旗改入民籍嗣據正紅旗都統查報夏永淳祖墳現在京無人看守祭掃不便任其為民咨部轉行催令回旗經臣部以有無未完欠項一併咨查續據該撫查覆夏永淳並無未完欠項若照例辦理應準其改歸民籍今該都統奏稱夏永淳祖父俱係職官當伊父原任知州夏建寅病故之時伊兄弟六人原應歸旗當差而夏永譽等以身係間散均援例改入民籍惟夏永淳係屬捐納縣丞希圖子弟可以在旗考試仍留旗籍今厯外任多年復稱情願為民藉端規避旗差奏請停止漢軍六品以下職官為民之例臣等伏思八旗漢軍人等仰蒙國家教育深仁洊厯官階受恩優渥退官解任之後理宜歸旗當差圖報乃有厯外省之員初以身厯旗籍僥幸出身一經解任即耽安逸請改民籍似此藉詞規避殊屬狡詐不便仍令為民以遂其設法出旗之心應如所奏漢軍六品以下職官準其為民之例即行停止其兵丁間散人等仍照舊例辦理奉旨知道了以上漢軍出旗欽定八旗通志卷三十一
