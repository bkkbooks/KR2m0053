  text: 八旗大臣題名二各省巡撫各省巡撫王文奎漢軍鑲白旗人順治元年七月任保定巡撫二年四月陞漕運總督雷興漢軍正黄旗人順治元年十月任天冿巡撫二年四月調陜西巡撫四年正月解十年七月調河南巡撫未到任卒陳錦漢軍正藍旗人順治元年七月任登萊巡撫二年七月調操江巡撫四年十二月陞浙閩總督馬國柱漢軍正白旗人順治元年七月任山西巡撫二年十月陞宣大總督羅繡錦漢軍鑲紅旗人順治元年七月任河南巡撫二年十一月陞川湖總督趙福星漢軍鑲白旗人順治二年五月任鳯陽巡撫十月革五年五月復任八月降焦安民漢軍正黄旗人順治二年四月任寧夏巡撫三年四月遇害丁文盛漢軍鑲藍旗人順治二年六月任山東巡撫四年正月革申朝紀漢軍鑲藍旗人順治二年十月任山西巡撫四年七月陞宣大總督吴景道漢軍正黄旗人順治二年十一月任河南巡撫十年七月休蕭起元漢軍鑲白旗人順治二年十月任浙江巡撫十一年四月降李鳯翔漢軍鑲紅旗人順治二年十月任江西巡撫三年九月卒李棲鳯漢軍鑲紅旗人順治三年十月任安徽巡撫四年九月降六年五月任廣東巡撫十五年六月陞兩廣總督張尚漢軍正黄旗人順治三年四月任寧夏巡撫十月調甘肅巡撫四年八月降十三年十月任鄖陽撫治十七年三月降劉武元漢軍鑲紅旗人順治三年十二月任南贛巡撫十年閏六月休耿焞漢軍正黄旗人順治四年三月任順天巡撫五年三月陞宣大總督十一年二月任山東巡撫十五年十二月降李日芃漢軍正藍旗人順治四年十二月任浙江巡撫十二年十一月卒張儒秀漢軍鑲藍旗人順治四年二月任山東巡撫五年二月卒朱國柱漢軍鑲白旗人順治四年正月任登萊巡撫九年四月裁缺十年正月任鄖陽撫治十一年二月解祝世昌漢軍鑲紅旗人順治四年七月任山西巡撫七年二月解張文衡滿洲鑲黄旗人順治四年八月任甘肅巡撫五年五月休佟國鼐漢軍正藍旗人順治四月二月任福建巡撫五年五月解線晉漢軍正黄旗人順治四年十月任偏沅巡撫六年正月革楊興國漢軍鑲紅旗人順治五年四月任順天巡撫九年九月解夏玉漢軍正白旗人順治五年八月任天津巡撫六年九月任山東巡撫十一年二月降劉宏遇漢軍正藍旗人順治五年五月任安徽巡撫七年二月任山西巡撫十一年二月降王一品漢軍鑲黄旗人順冶五年八月任鳯陽巡撫六年五月裁缺七年二月任廣西巡撫八年十二月解張學璧漢軍鑲藍旗人順治五年八月任福建巡撫十年二月革朱延慶漢軍鑲藍旗人順治五年五月任江西巡撫七年九月卒遲日益漢軍正白旗人順治五年閏四月任湖廣巡撫十一年二月革李國英漢軍正紅旗人順治五年閏四月任四川巡撫十四年九月陞川陜總督金廷獻漢軍鑲藍旗人順治六年正月任偏沅巡撫十年十一月解郭肇基漢軍正白旗人順治六年五月任廣西巡撫七年二月解馬之先漢軍鑲藍旗人順治七年七月任陜西巡撫十一年四月陞宣大總督夏一鶚漢軍正白旗人順治八年正月任江西巡撫九年正月卒周國佐漢軍正黄旗人順治八年十二月任江寧巡撫十一年八月解孫茂蘭漢軍正紅旗人順治九年二月任寧夏巡撫十一年二月解蔡士英漢軍正白旗人順治九年四月任江西巡撫十二年二月降王來用漢軍正白旗人順治九年九月任順天巡撫十一年八月降佟國器漢軍正藍旗人順治十年四月任福建巡撫十二年三月調南贛巡撫十五年六月調浙江巡撫十七年二月卒宜永貴漢軍正白旗人順治十年七月任南贛巡撫十二年三月調福建巡撫十三年閏五月解十六年八月任安徽操江巡撫張中元漢軍正黄旗人順治十一年八月月任江寧巡撫十六年正月解陳應泰漢軍鑲紅旗人順治十一年二月任山西巡撫十二年十二月調浙江巡撫十五年五月解陳極新漢軍正藍旗人順治十一年四月任陜西巡撫十六年閏三月降秦世楨漢軍鑲藍旗人順治十一年四月任浙江巡撫十二年十二月調採江巡撫十三年九月降白如梅漢軍鑲白旗人順治十二年十二月任山西巡撫十八年九月陞陜西總督郎廷佐漢軍鑲黄旗人順治十二年二月任江西巡撫十三年閏五月陞兩江總督于時躍漢軍鑲黄旗人順治十二年正月任廣西巡撫十八年九月陞本省總督蔣國柱漢軍鑲白旗人順治十三年十月任操江巡撫十六年三月調江寧巡撫十二月革十八年十月任山東巡撫康熙二年三月丁憂三年六月任浙江巡撫七年八月卒佟延年漢軍正藍旗人順治十三年七月任甘肅巡撫十八年十月陞貴州總督劉漢祚漢軍鑲紅旗人順治十三年閏五月任福建巡撫十六年閏三月休張朝璘漢軍正藍旗人順治十三年閏五月任江西巡撫十八年九月陞本省總督張長康漢軍鑲黄旗人順治十三年十一月任湖廣巡撫十七年四月陞本省總督賈漢復漢軍正藍旗人順治十四年九月任河南巡撫十七年七月解康熙元年二月任陜西巡撫六年十二月解高民瞻漢軍鑲白旗人順治十四年九月任四川巡撫十七年七月革潘朝選漢軍正紅旗人順治十五年七月任保定巡撫十七年三月解周召興漢軍鑲藍旗人順治十五年正月任延綏巡撫十六年二月革十八年閏七月任偏沅巡撫康熙八年六月休蘓宏祖漢軍正紅旗人順治十五年六月任南贛巡撫康熙元年二月休董應魁漢軍鑲黄旗人順治十五年七月任廣東巡撫十八年三月休趙廷聖漢軍鑲黄旗人順治十五年六月任貴州巡撫十六年正月陞雲貴總督許文秀漢軍正黄旗人順治十六年二月任山東巡撫十八年十月革張自得漢軍正黄旗人順治十六年閏三月任陜西巡撫十七年三月革康熙元年二月任河南