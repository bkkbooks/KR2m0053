body:
  text: 欽定四庫全書欽定八旗通志卷一百六十五人物志四十五大臣傳三十一滿洲正紅旗二能圖果斯海道喇莫洛沃申希佛朋春華穆誠額覺羅顯噶爾漢傑殷吉勒塔布道喇道喇滿洲正紅旗人姓輝和葉克舒長子也以䕶軍從征伐積功授䕶軍恭領崇徳三年太宗文皇帝命貝勒岳託率師征明攻邊城道喇領兵先登克之五年從大軍圍錦州敵兵自松山來犯正黄旗營道喇䕶軍四十人擊敗其衆敵復來攻正紅旗汛又敗之會多羅特部蒙古蘓班代來歸道喇率兵取其家屬於杏山西五里臺遇明杏山騎兵復擊却之世祖章皇帝順治元年調前鋒恭領随大軍擊流賊李自成與前鋒統領鄂碩敗賊將唐通兵於一片石既入山海闗追賊至安肅又敗之復誘賊迎戰敗其兵於望都乘勝躡擊斬殺甚衆尋都統葉臣征山西師抵汾州同前鋒叅領圖爾賽破賊将白輝兵叙功授騎都尉世職三年賊將李錦集衆據荆州道喇随順承郡王勒克徳渾進勦賊衆潰走五年随都統譚㤗征江西叛鎮金聲桓五敗賊兵生擒偽縂兵及叅将逰擊三人七年随睿親王多爾衮畋於中後所以行列不整議罪輸罰鍰九年擢正紅旗副都統十年潮州縂兵郝尚乆叛道喇奉命同靖南将軍哈哈木率師討之復潮州尋統兵駐防荆州十四年授本旗䝉古都統十六年随信郡王多尼平雲南明桂王朱由榔奔緬甸沅江土司那嵩應由榔據城叛道喇與前鋒統領白爾赫圖等攻克其城屢遇恩詔復厯叙前功晉世職一等輕車都尉康熙二年以年老乞致仕徙居盛京詔許之十二年聖祖仁皇帝念其効力年久勤勞素著特加太子少傅二十一年駕幸盛京召見賜坐賜酒並優賚之明年九月卒年八十有一賜祭葬謚勤襄立碑墓道以弟之孫伊濟納襲沃申沃申滿洲正紅旗人姓鈕祜禄崇徳五年以前鋒從大兵征明圍錦州克松山順治元年随睿親王多爾衮入山海闗破賊李自成於保定復随都統葉臣徇下直𨽻諸郡進征山西四年隨将軍哈哈木征陕西擊賊帥王雲祥於蒲城縣先登九年以功授騎都尉世職賜號巴圖魯十二年補恭領十三年隨寧海大将軍伊爾徳征舟山累敗偽縂制陳六御等十四年叙功加一雲騎尉康熈元年授協領十三年六月擢杭州副都統以逆藩耿精忠叛浙東告警縂督李之芳令沃申同副都統雅達里石調聲固守衢州尋調守金華府七月耿逆偽都督閻標自温處來犯沃申擊其先鋒徐君羙敗之復逼府城迎擊大敗之生擒標斬獲無算十月偽都督葉鍾犯浦江縣沃申城守令都司陳夢陽由蘭谿迎擊追至石塘園斬偽将金春焚其壘而還時凌霞諸土㓂從賊受偽職聚衆滋擾沃申同調聲勦之斬千餘級潰其衆尋奉康親王傑書檄往會貝子傅拉塔勦台州賊行至義烏縣遇偽都督趙明卿迎戰擊走之十四年二月同副都統伯穆赫林攻取仙居縣經白水洋偽將林冲陳啓秀率萬餘衆連營十三來拒沃申分兵二隊隊各分左右翼令營縂薩木哈領頭隊當賊左六營令侍衛卦塔領二隊當賊右七營戰移時賊不退沃申直前擊之連破二營乘勢追斬三千餘時偽都督朱富屯太平縣聞我兵至復從叛鎮曾飬性乞兵守招之不降沃申伏兵城西而以雲梯攻其東南北三面賊果開西門遁伏兵起擒富盡𠞰城内餘黨進屯仙居縣會台州賊拒險我兵隔江不能攻聞仙居有路通黄岩可襲賊後傅拉塔令沃申鑿石伐木夜歩進八月師次半山嶺偽都督劉邦仁率賊分兩路來沃申身先士卒大破之進次梁蓬隘口復擊斬偽將王仲禄等降偽官二十餘兵民三萬六千餘飬性及偽將軍祖宏勲遁福建十五年三月養性等糾瑞安石塘賊分八路來犯沃申同副都統吉勒塔布先後擊敗之斬偽都督孫可得等殱賊二萬五月傅拉塔奉詔由處州進征福建沃申從八月耿逆遣其將連登雲據浦城縣之石塘阻我入閩兵沃申同副將陳世凱擊之連破九營進復雲和縣會康親王大兵已㧞江山常山等縣復建寕延平二府耿精忠詣軍門降招囬養性宏勲王令沃申同穆赫林守延平十二月海賊鄭錦遣偽都督吴淑取邵武尋犯延平營木城於新屯渡别遣其弟潜據浦塘隘口沃申率守兵擊敗潜乗勝渡河攻木城賊潰追之遇偽将楊徳來援又敗之小河岸斬首萬餘生擒偽總兵阮信降偽將彭世勲等邵武汀州相繼復海㓂聞風竄㤗寧建寜寕化長汀清流歸化連城諸偽官相率迎降會賊首朱寅㓂泉州為官兵所敗遁入海中石井寨十六年十月我兵分三路進剿沃申同副都統孟安由東路遇賊将何祐以舟屯清寺别營江西岸塔岡山拒我師沃申等擊破其營克清寺十七年九月沃申援漳州大敗賊於龍虎山斬偽將鄭英吴潜等賊棄寨登船據江東橋十一月復同浙江提督石調聲奪江東橋通漳泉路十八年十月賊遣偽都督林盛屯東石東石近泉州為金門厦門門户寕海將軍喇哈達令沃申取之沃申造雲梯進次靈水東石三面皆海賊嬰城固守沃申精選前鋒架雲梯候潮落齊進親薄濠指揮遂㧞之斬偽將林英生擒偽總兵陳深俘獲甚衆石井白沙諸賊皆望風遁燬其營十九年二月賊遣偽都督林深與我水師相拒復遣其將張志於大定小定募水手梗我船道適泉州無船沃申奉喇哈達令從店頭陸路進至大定海㟁乗潮退急擊奪賊中寨追至小定賊上船遁斬偽将陳飛龍等降其衆渡難民五千二百餘時官兵已復海澄沃申乗勝渡海取尾高溪與漳州兵夾攻厦門金門克之招降偽官三十餘賊遁出大洋六月康親王班師奏以沃申防守泉州二十一年追議沃申前在江山縣失守戰死者未収骸在金華違速取温州軍令在台州未能剿滅小梁山㓂功不敵罪盡奪其職三十年五月卒能圖能圖滿洲正紅旗人姓納喇世祖章皇帝順治元年任内院筆帖式譯遼金元三史書成賜銀馬加員外郎銜二年四月改授宏文院侍讀八年三月遷宏文院學士九年正月充太宗文皇帝實録副總裁官初能圖以考滿授雲騎尉兩遇恩詔晉職至三等輕車都尉至是上以原任吏部尚書譚㤗濫援恩詔優加諸臣世職命王大臣核議降能圖世職為騎都尉三月充殿試讀卷官七月川湖總督羅繡錦奏湖南守將於賊中搜獲偽刻平西王吴三桂通賊告諭上命能圖赴四川軍營傳㫖慰諭三桂且以偽刻告諭示之還命教習庶吉士十三年正月遷左副都御史加太子少保四月以考滿賜羊酒廕一子入監十四年七月能圖以八旗世職自武功議叙外其考滿所得及恩詔所加在順治七年以前概予承襲七年以後止及本身請勅部議畫一定例遵行與左副都御史魏裔介副都御史納都瑚等列銜入奏上諭吏刑二部曰都察院乃耳目要職當以政治得失民生利病據實上聞凡事可行不可行尤當熟思妥確然後奏請世職應襲與否久經定例何得輙請更改其中豈無受托市恩情弊此係何人倡議受誰囑托務湏訊明於是集院臣詰問能圖實首先倡議應盡革職任魏裔介等聴從列名降革有差得㫖能圖革去太子少保及騎都尉戴罪留副都御史任十五年九月擢左都御史十六年三月諭奬奉職勤勞諸臣加能圖太子太保六月上以雲南新闢發帑金三十萬兩分賑貧民命能圖同尚書伊圖學士麻勒吉往董其事尋奉命同麻勒吉察奏大軍取永昌後貝勒尚善等縦兵擾民狀為之辯釋十七年正月遷刑部尚書七月安親王岳樂等覆勘尚善等縱兵入永昌城掠民婦女事得實能圖麻勒吉並坐徇隐罷任尋卒於家果斯海果斯海姓訥勒世居葉赫父阿拜太祖髙皇帝時來歸𨽻滿洲正紅旗世祖章皇帝順治七年果斯海以工部筆帖式累遷員外郎尋擢工科給事中十八年疏請八旗於京城各門外設教場練習士馬得㫖允行又疏陳五事一輔政四大臣應定禄品與職任相稱一督撫大吏應遴才委任無分漢軍漢人一軍政之黜陟宜公平一文武官品級宜畫一一要地城守軍噐請停遣部臣廵察嚴責所司核報至歩兵虚額應即充補亦令各專轄大臣造冊送部得㫖所奏更定輔臣祿品一欵不必議餘下所司議行聖祖仁皇帝康熈七年果斯海疏言兵民服色僣濫及一切虚糜闗風化者請嚴行飭禁并請考核各佐領下戸口盈絀以定奨罰又請減省重複案牘以歸簡要皆下所司議行九年遷内閣侍讀學士充纂修玉牒官轉太常寺少卿預纂太祖太宗聖訓十一年遷内閣學士充重修太宗實録副總裁官十四年擢兵部右侍郎旋轉左充經筵講官十五年九月山東提督周卜世疏劾廵撫達爾布徇庇屬員侵漁百姓達爾布疏劾周卜世挟讐起釁請遣官質審果斯海奉命往勘達爾布違例脅衆建立生祠事實坐禠職十六年調倉場侍郎十七年正月擢左都御史疏請滿洲䝉古朝鮮人毋許賣與漢軍漢人八旗各佐領下出戸人毋許出本佐領外應著為禁令詔從所請尋遷兵部尚書特命兼理户部事二十年二月調禮部尚書七月詔曰刑部為民命所闗必精明幹練始克勝任果斯海向在兵部才能素著其以禮部尚書銜管刑部事二十一年十二月卒遣内大臣奠酒賜祭葬如典禮謚文敏莫洛莫洛姓伊爾根覺羅世居呼訥赫曾祖温察太祖髙皇帝時來歸後𨽻滿洲正紅旗世祖章皇帝順治七年莫洛任刑部理事官尋改工部主事累遷郎中聖祖仁皇帝康熈六年擢副都御史七年出為山西陜西總督時陜西災旱頻仍平凉臨洮鞏昌西安延安鳳翔漢中七府及興安一州荒地逃丁額賦無徴者有司率令現存之戸均輸民甚苦之莫洛既至疏請豁免上從所請八年輔政大臣鰲拜結黨専權獲罪法司以莫洛素附鰲拜請逮問諭曰莫洛為鰲拜黨羽應逮問念其任事封疆釐剔加派火耗等弊姑從寛免罪仍留原任九年遇計典吏部遵例甄别各督撫功過以莫洛向曾植黨行私奏聞得㫖革職西安士庶聞之相率哀籲懇留甘肅廵撫劉斗同提督張勇柏永馥總兵孫思克等奏言莫洛涖任以來清以持己正以率下如革耗羡整驛遞息詞訟練士卒清荒熟教樹畜興水利善政難以枚舉乞留任以慰民望上曰簡用督撫原欲綏輯地方愛養百姓莫洛既為民愛戴特順輿情免其處分供職如故未幾擢刑部尚書十三年二月上既分命王貝勒大臣等討逆藩吳三桂並諭部臣曰吴逆煽亂滇黔四川從逆陜西為邉陲要地西控畨回南通巴蜀幅員遼濶素號巖疆非特遣重臣假以便宜未易綏靖莫洛前任總督深得民心兹特授為經略駐劄西安軍事悉聽調遣復加銜武英殿大學士仍以刑部尚書管兵部尚書事賜之勅印莫洛至西安䇿遣諸軍進征五月詔諭莫洛曰朕聞叛鎮鄭蛟鱗乞降又聞克復朝天闗喜慰殊深頃賊蜂聚岳州值雨甚大兵難行稍俟晴霽即水陸並進吳三桂果在澧州宜乘虚徑襲其後如克復四川可取道汶水以定貴州或徑趨雲南其餘諸将集議尋奏逆賊堅據保寧川地未能猝復容俟奏㨗即行相機進取併奏防禦闗隘輓運軍食機宜諭曰朝天闗諸隘闗係要害可於滿洲漢軍緑旗官兵内酌撥防守相為犄角䕶送粮艘不為無助至漢中雖已駐兵猶恐力單且朝天闗之外尚有别路可通漢中倘我兵深入後奸宄竊發據守雞頭闗諸隘亦屬可虞一切機宜其酌行之又保寜未能即復則我師益致勞頓輓運粮饟實為要務其源源接濟毋令匱乏六月疏報偽副将姚孟龍等繳劄投誠時賊衆負固竊據廣元所屬百丈闗莫洛既遣都統馬一寳将軍席卜臣赴漢中副都統科爾寛赴廣元又慮廣元兵寡不敵賊衆令副都統吳國正俟馬一寳至即移師助之七月上命貝勒洞鄂偕貝子温齊輔國公綽克托率貝子凖逹所部驍騎赴四川莫洛疏陳大兵久駐保寜與賊相持秦民運餉勞苦臣今親赴漢中酌量分路進剿貝勒洞鄂若率衆盡行慮致遲滯請勅簡精鋭先發速至西安上念貝勒所部無多仍令貝子公等亦各率所部進發會西安将軍瓦爾喀奏川鎮王懐忠標兵因粮匱逃散請發餉增兵救援諭莫洛曰大兵或仍圍守保寜或因粮運艱難暫還廣元其與将軍等酌之並命寛王懐忠標兵罪速行撫納八月莫洛復疏述陜省兵單請增兵以資戰守上以增兵必湏增餉或不煩增兵或必議増兵或不必親行赴川令詳悉覆奏莫洛言增兵則秦中得以保固迨四川底定則粮餉有資而秦民亦得休息臣仍宜親統官兵進剿四川上從之九月莫洛将由秦赴蜀請勅總督周有徳廵撫張徳地暨科爾寛等固守朝天闗廣元諸路轉運糗粮並請勅将軍等拒守保寜以待兵至諭曰軍機緩急莫洛自有確見可與将軍席卜臣前往廣元進取昭化總督周有徳等於經略未到之先督趣粮米運送軍前又廣元兵少或令席卜臣先赴廣元秣馬以待或與經略同發俱令莫洛酌行十月偽将軍何徳成等糾合潰衆分路自川來犯寜𦍑先立營於文廟山官兵夜襲賊營賊衆大敗遁囬南山上諭莫洛曰寜𦍑為大兵後路爾其速援庶幾有濟莫洛因賊已敗遁令提督王輔臣遣兵駐守寜𦍑十一月貝勒貝子等大兵未至偽總兵彭時亨等復屯據七盤朝天諸闗刦奪略陽粮艘廣元兵缺餉者兩月賊衆旋復窺伺陽平上慮莫洛所統皆綠旗兵巴蜀山路險惡滿洲大兵若不相繼難于䇿應因勅貝勒洞鄂等兼程而進會同經略進川是月莫洛遂帥兵由漢中赴蜀令提督王輔臣随征先是莫洛甫至陜有詔調陜西兵征湖南輔臣自請率兵赴荆州上以調征湖南兵已有貝勒尚善貝子凖達等統領因命輔臣仍駐平凉聴莫洛調遣輔臣心怏怏至是莫洛調之随征輔臣遂懐叛志佯言部兵少請増撥莫洛給以騎兵二千輔臣少之又以所給馬疲瘠不任用為詞摇惑衆心遂謀作亂十二月莫洛行次寧𦍑州駐營王輔臣標兵猝亂襲刦經略營莫洛率兵射郤之甫定王輔臣忽率叛卒來犯礟矢齊發莫洛被重創歿于軍二十二年十月賜祭葬如典禮謚忠愍予世職騎都尉兼一雲騎尉以其子常安襲希佛弟漢初罕希佛滿洲正紅旗人姓他塔喇世居安楚拉庫路祖羅屯國初率八百戸来歸列五大臣編佐領父哈寜阿由䕶軍叅領随征錦州松山大軍入山海闗擊流賊追至望都縣總叙前功授騎都尉世職卒子漢初罕襲從征蘇尼特部騰機思等陣亡贈三等輕車都尉弟班初罕襲遇恩詔晋二等輕車都尉希佛班初罕兄初任二等䕶衛順治七年襲世職兩遇恩詔晉一等輕車都尉兼一雲騎尉授䕶軍叅領康熈七年擢正黄旗蒙古副都統十二年逆藩吴三桂叛希佛随大将軍順承郡王勒爾錦往湖廣剿禦十三年陜西提督王輔臣叛于寜𦍑據平凉秦州命希佛同雲南總督鄂善等率現駐襄陽䝉古兵移守興安漢中十四年三月貝勒洞鄂征隴州復闗山進兵秦州希佛攻克東西二闗十五年調守隴州十六年遷前鋒統領十七年閏三月詔赴湖南駐守茶陵十一月随簡親王喇布由衡州之安仁縣進征十八年正月希佛率兵攻衡州府夜半薄城下統署前鋒恭領戴屯等奪門入賊帥吳國貴夏國相等驚遁復其城得㫖嘉奨下部議叙六月遷正紅旗滿洲都統時偽将軍馬承䕃以南寜降上命希佛率所部兵赴廣西同鎮南将軍莽依圖自南寜進定雲南十九年五月馬承䕃復叛糾二萬衆迎戰于陶登希佛偕副都統馬世㤗進擊之賊大敗遁追殪甚衆閏八月奏南寜兵缺馬大軍深入塗險逺恐誤軍機上諭以栁州南寜桂林駐兵之馬通融給發並趣都綂瑪竒送馬赴南寕時莽伊圖卒于軍以都綂賚塔為征南大将軍十二月希佛随賚塔至西隆州偽将軍何繼祖等據石門坎築城以拒二十年正月希佛偕瑪竒等率前隊履險進攻後軍繼進夾擊大敗之盡奪隘口翼日乘勝馳安籠所復其城降偽總兵陳義魁繼祖遁新城復糾偽将詹養等據黄草壩列象拒戰希佛領前鋒進勦自夘至未破賊營二十二獲象馬器械無算二月抵曲靖復馬龍州等城並遣營總碩塔等馳勦嵩明州斬闗入賊遁殱其衆遂㑹大軍圍雲南省城吴世璠偽將胡國柄劉玘龍等犯我軍希佛率前鋒奮擊陣斬國柄玘龍及偽總兵九人賊将馬寳胡國柱等聞雲南圍急由四川還救六月希佛同提督桑格迎剿馬寳于烏木山敗其衆馬寳姚安䧏于軍九月躡國柱于鶴慶麗江復蹙之于雲龍州國柱勢窮自縊王緒李匡等自焚死餘賊悉降二十一年十一月擢西安将軍諭曰陜西地方𦂳要因爾練習軍務特簡此任湏加意操演毋騷擾百姓至漢中必選精兵戍守不得以疲弱者發往先是希佛随征長沙失利部議革将軍及世職上念希佛勞績甚多禠本身加級従寛留將軍任及伊父二等輕車都尉世職時川陜平定部議将西安撥守漢中之滿洲漢軍兵各一千名撤半仍留一千名輪戍二十五年希佛以棧道逓送勞苦䟽請併撤部議不准上曰蕩平以來漢中駐防無益朕不忍使兵民交困其輪班戍守及永逺駐防俱着停止二十七年復調正紅旗䝉古都統二十九年噶爾丹擾塞外諸蒙古上命裕親王福全征之希佛叅賛軍事破賊于烏蘭布通三十年以老乞休上慰留之三十一年四月調正紅旗滿洲都綂並授建威将軍綂師駐右衛三十三年噶爾丹師内向将侵根敦戴青命希佛率右衛兵同将軍費揚古赴圖拉禦賊尋疏請大同總兵康調元率緑旗兵三千同行並請派發察哈爾兵上以綠旗兵多則馬更少且滿洲兵有八千所向無敵希佛遇事疑阻令仍駐防右衛三十四年兵部疏劾不收八旗撥送馬致糜錢粮革職三十八年卒朋春朋春滿洲正紅旗人姓棟鄂何和哩之四世孫也順治九年六月襲其父哲爾本一等公聖祖仁皇帝康熈十五年恩加太子太保授正紅旗䝉古副都綂二十一年二月調本旗滿洲副都綂八月命同副都綂郎坦率兵赴黑龍江時俄羅斯人來邉境者咸稱為羅刹朋春奉諭曰羅刹犯我黑龍江邉境昔曽發兵進討未獲翦除近又侵入精竒哩江諸處恃雅克薩城為巢穴蔓延益甚爾等至達呼爾索倫遣人赴尼布楚諭以捕鹿之故因詳視陸路近逺沿黑龍江行圍徑薄雅克薩城下勘其居址形勢度羅刹斷不敢出戰如出戰姑勿交鋒但率衆引還朕别有區畫賜御用裘服及弓矢以行十二月還奏羅刹久據雅克薩恃有木城若發兵三千携紅衣礟二十具即可攻取陸行自興安嶺以往雖無險山而林木叢雜途徑窄隘冬雪之時沙結堅氷夏日遇雨泥深淤阻惟輕装可行水程自雅克薩還至愛滹城於黒龍江順流行船僅湏半月觀兩岸悉可縴挽若逆流行船約湏三月較從陸倍期運粮餉礟具為便現有大船四十小船二十六宜增造小船五十餘詔寜古塔将軍巴海副都綂薩布素建木城于黒龍江呼瑪爾二處調所部兵一千五百往駐造船運礟二十二年正月擢正紅旗䝉古都綂三月調本旗滿洲都綂二十四年正月詔選福建投誠善用籐牌兵在八旗及安挿山東山西河南者四百人付鑾儀使林興珠䑓灣投誠左都督何祐轄領赴盛京朋春綂之進勦以副都綂班達爾沙瑪拉䕶軍綂領佟寳等及林興珠叅賛軍務師既行上遣侍衛闗保往黒龍江傳諭曰兵凶器戰危事古人不得已而用之朕以仁治天下素不嗜殺爾其嚴諭将士毋違朕㫖以我兵馬精强噐械堅利羅刹勢不能敵必獻地歸誠爾時勿殺一人俾還故土宣朕柔逺至意五月師薄雅克薩遣人以書諭䧏不從軍其城南集戰船于城東南進紅衣礟于城北将夾攻之城下三面積柴為焚城状城中大驚其頭目額里克舍窮蹙乞降乃宣恩諭宥其罪額里克舍垂涕稽顙謝引六百餘人徙去毁其城以願來歸者附之巴什里等四十五户及前此掠往之索倫達呼爾百餘户移内地安輯師旋紀功二十九年七月上命裕親王福全為撫逺大将軍勦噶爾丹以朋春與都綂蘇努等叅賛軍務蘇努率左翼朋春率右翼八月朔至烏蘭布通噶爾丹依山列陣右翼兵為河岸泥淖所阻左翼兵由山腰衝入大破之日暮收兵次日噶爾丹遣使矢誓請和以緩我師乗夜由大磧山遁去十一月師旋部議王大臣調度乖方不追勦敗冦罪應革職任上以此舉既擊走噶爾丹概從寛處分朋春降四級留任三十一年三月解都綂任赴西路軍前管營隊三十五年正月仍復正紅旗蒙古都綂命為撫逺大將軍費揚古叅賛由西路勦噶爾丹五月破賊於昭莫多凱旋因本隊陣亡䕶軍驍騎十八人未収遺骸議罪以應叙昭莫多軍功抵免三十六年七月彚叙西路出師奮勇勞績增注所襲一等公勅書三十八年六月以疾解都綂任四十年四月疾卒子增夀循例銷去恩詔所加之爵改襲三等公四十一年九月授正紅旗漢軍副都綂四十三年三月調鑲藍旗滿洲副都綂五十一年罷任六十年卒子恒㤗襲爵授散秩大臣世宗憲皇帝雍正九年追封何和哩為勇勤公其世襲之三等公亦加號勇勤穆誠額孫阿斯海穆誠額滿洲正紅旗人姓薩哈爾察世居綏哈太祖高皇帝時烏拉有蘇庫努來歸其高祖也世祖章皇帝順治十三年穆誠額以前鋒叅領随寧海大将軍伊勒徳征浙江舟山時偽英毅伯阮思偽總制陳六御等列戰艦二百餘抗拒海島穆誠額率水師迎擊賊衆大敗旋署䕶軍統領随定逺大将軍世子濟度征福建至則海賊鄭成功竊據閩安鎮散布賊衆於汀泉漳福諸屬泉州大營村聚賊千餘穆誠額偕營總瑪拉擊敗之斬賊渠李樑及其衆七百餘級復随大兵擊敗偽提督黄常等於新湖澚福前所及魏陀白沙河等地十四年叙功予雲騎尉世職聖祖仁皇帝康熈十五年穆誠額随撫逺大将軍圖海至陜西討叛鎮王輔臣師至平凉城北之虎山墩賊衆萬餘迎戰穆誠額随前鋒統領穆占率兵奮擊大敗賊衆追殺十餘里収獲軍械馬匹無算二十三年擢授本旗䝉古副都統二十五年叙平凉戰功晉世職為騎都尉二十八年以老病致仕四十三年卒賜祭𦵏如例孫阿斯海襲世職雍正七年阿斯海以前鋒侍衛從征凖噶爾九年凖噶爾犯我北路軍營靖邉大將軍富爾丹遣前鋒統領定夀等迎戰於庫列圖嶺賊據險要富爾丹令移營至和通呼爾哈諾爾賊遽衝突我師阿斯海力戰歿於軍賜䘏加一雲騎尉以其子書敏襲噶爾漢噶爾漢滿洲正紅旗人姓納喇兵部尚書噶逺渾之子順治十四年襲父一等輕車都尉世職初為王府長史聖祖仁皇帝康熈元年授正紅旗滿洲副都統八年授本旗䝉古都綂十四年七月授鎮安将軍駐守河南十月奉詔移師襄陽禦勦叛鎮楊來嘉等十五年三月率兵擊敗賊衆於南漳縣之靈機寨焚毁賊營賊衆逺遁四月四川叛鎮譚宏糾衆由上津鄖西侵犯鄖陽以巨艦數十逼城復據城東之陡嶺阻我粮道噶爾漢同湖廣提督佟國瑶列營武陽洞前防禦復督師由江中並南北兩岸三路進勦水陸齊擊賊衆披靡獲鎗礟器械甚多得㫖下部議叙作三等軍功十八年四月偽總兵謝泗劉魁等刦掠竹山竹谿等處盤踞山險近逼鄖城與興安諸賊聲勢聮絡上命噶爾漢同總督楊茂勲等率兵撲滅乗機規復興安六月疏言鄖西山高路狹草木叢塞時多霪雨山水暴下師行阻滯前後不能相顧輓運亦難俟木落水涸進征十一月諭責噶爾漢不即規復興安下部嚴察銷去前功事定後議罪十九年十月疏報副都綂塞格恢復巫山又報自巫山進取䕫州賊奔潰並敗譚宏之兵於錯開峽二十年正月率兵敗賊衆於雲陽擒偽總兵向旭輝等恢復縣城譚宏已死其子譚天秘震懼焚巢遁萬縣開縣建始梁山忠州悉平得㫖嘉奨二十二年三月授荆州将軍四月議政大臣等議噶爾漢于十七年二月聞楊來嘉賊衆在房縣不能救援例應革職籍沒有功可抵請革将軍免籍沒上曰噶爾漢原因其人堪用簡授将軍着降五級仍留任二十七年六月湖廣裁兵夏逢龍作亂聚衆刦掠黄陂雲夢等縣噶爾漢自荆州赴安陸遣協領穆禮瑪等率兵進勦擒斬偽副将二偽守偹三偽把總一賊衆復逼應城噶爾漢領兵擊退賊衆賊趨武昌噶爾漢駐應城疏言粮餉不敷戰船未偹不能克期前進上命調囬為正紅旗蒙古都綂以都綂巴渾徳代之别遣振武将軍瓦岱統八旗兵往㑹提督徐治都等𠞰擒逢龍磔于市十一月部議噶爾漢于武昌兵變時率兵進剿不即行撲滅藉稱粮餉不敷戰船未偹退縮不前應革職鞭責籍沒家産詔從寛免其籍沒後卒于家傑殷弟傑都傑殷滿洲正紅旗人其先世居朝鮮有韓明璉者任龜城府使與昌城總兵李适謀逐其國王李倧為他将所殺子潤與姪義脱走來歸太祖高皇帝授官有差後並晋職一等輕車都尉傑殷義次子也初任一等侍衛順治十六年授䕶軍叅領聖祖仁皇帝康熈八年擢正紅旗滿洲副都綂十一年遷䕶軍統領十四年四月察哈爾布爾尼叛命同内大臣佟國綱率兵鎮宣府五月察哈爾平詔平逆将軍畢力克圖移師赴榆林㑹勦叛賊朱龍以傑殷叅賛軍務六月師次謝村分兵三隊傑殷乘夜先發黎明至河岸賊三千餘拒楊家店渡口我師鳴角渡河擊潰賊衆翌日克吴堡縣遂趨綏徳賊據虎爾岸山口傑殷率兵仰攻射殪偽逰擊黄文英餘賊敗竄追擒七十餘人獲馬匹器械進克卧牛城遂復米脂延川等縣與署副都綂覺和托分兵攻延安傑殷領隊前進擒賊諜二斬之敗偽總兵李士英于宜川復延安城及諸屬縣宜川所屬二十六寨悉平八月㑹大軍剿叛賊王輔臣于平凉貝勒洞鄂令傑殷領左翼兵為前隊距城八里許賊萬餘列陣迎戰傑殷督兵衝其中堅自已至未挫賊者三復分兵四路環擊殱賊甚衆十月掘壕南山城内馬歩賊兵出犯擊却之斬百餘級十二月賊黨蔡元自西山來犯傑殷同副都綂鄂克濟哈奮擊敗之破其壘十五年二月叛鎮吴之茂欲為王輔臣外援糾賊萬餘盤踞秦州城西南三十里舖及附近諸堡洞鄂令傑殷移師禦剿敗賊于谷口山崖斬級五十餘與将軍佛尼勒提督王進寳㑹師秦州議繞賊壘後絶其粮運三月傑殷同副都統翁愛率兵先行遇賊二千餘出羅家堡抗拒陣斬二十餘級進趨鹽闗擊斬䕶粮賊三百餘生擒偽官及兵三十餘人獲馬驘器械焚其餘粮又乗夜由賊壘左趨牡丹園賊以二千兵䕶粮趨三十里舖傑殷督兵捕剿斬獲甚衆四月賊揚言斷闗山道截臨鞏路傑殷移師伏𦍑遣兵敗賊于平頭山進圍馬塢攻破二寨斬賊千餘生擒四十三人焚賊粮三百餘袋偽總兵陳姓李姓等引賊萬餘陷通渭縣城傑殷率兵前進遇賊于十八盤山坡分左右翼擊敗之乗勝奪門復縣城賊四散奔逸追斬七百餘級獲駝馬噐械無算還守秦州截吴之茂通平凉路五月大将軍圖海下平凉檄諸将進兵吴之茂引賊遁傑殷同佛尼勒率兵乗夜追剿及之于牡丹園分兩翼夹擊自午至未屡破賊陣遂克祁山堡别有賊三千自西和縣北山迎戰敗之于紅山嘴及清陽峽又選輕騎躡追至石牙兒闗呉之茂率二十人越山遁餘賊潰散先後斬偽官及兵五千餘生擒五百餘人獲偽劄百五十有竒鎗礟馬驘器械無算禮縣西和俱復賊帥王屏藩遁走階州窮追至小川子單家河招撫偽逰擊等五員兵三百餘留兵防守西河傑殷還駐秦州圖海以聞得㫖嘉奨下部議叙十七年閏三月遣兵克扶風縣之潼闗堡及午井黎虎諸寨十九年正月㑹師進保寕同佛尼勒覺和託等領軍奮擊大敗賊衆追勦三十里陣斬偽将十員兵三百獲偽劄五百餘馬匹器械甚多進復順慶府所屬三州十一縣悉平尋卒于成都軍營賜祭𦵏如例追叙前功予騎都尉世職以其子花色襲弟傑都順治十六年由䕶軍叅領随安南将軍達素剿海賊鄭成功于厦門賊船六百餘倚踞澄浦㠗傑都領隊擊敗賊兵康熈十三年随前鋒綂領穆占剿四川叛賊吴之茂等由陜西進征擊敗偽總兵石存禮于朝天闗遂趨保寜駐營蟠龍山賊帥王屏藩引衆刦掠阻絶我餉運我軍退還傑都殿後力戰沒于陣賜䘏如例贈騎都尉加一雲騎尉無子以兄之子韓成襲世宗憲皇帝雍正二年以傑都入祀昭忠祠吉勒塔布吉勒塔布滿洲正紅旗人姓李佳副都綂覺善第三子也初任侍衛兼前鋒恭領聖祖仁皇帝康熙十一年擢正紅旗䝉古副都綂十三年逆藩耿精忠叛奉命同副都統拉哈駐守江寧尋命率師赴援浙江聴将軍拉哈達調遣及大将軍康親王傑書統兵駐金華吉勒嗒布隨寧海将軍貝子傅喇塔進師台州至嵊縣偽都督曾養性偽總兵陳理等屯衆於黄瑞山将犯天台以斷我粮道吉勒塔布遂乗夜馳進分兩翼衝擊又遣兵循山麓疾上以鳥鎗旁擊之賊大潰斬偽副将陳鵬偽恭将徐可先周標等進克仙居縣十四年曾養性與叛鎮祖宏勲犯台州依山結寨吉勒塔布同副都統沃申自仙居襲賊後疾馳至半山嶺偽都督劉邦仁擁衆萬餘拒戰我兵嚴隊以進賊堅持弗退吉勒塔布率歩兵奮擊賊大敗斬偽副将王仲禄恭将趙明殪賊四千餘進師梁蓬隘口賊衆掘壕塹以守我兵突進攻之奪其隘馳追道遇賊伏盡殱之直趨黄巖副都統穆赫林復自前路夾攻曽飬性乗夜突圍遁温州大軍遂定黄巖吉勒塔布率兵敗賊於上塘嶺進攻温州賊踞險死守我軍攻之弗下十五年三月曾養性糾合平陽瑞安賊衆并福建來援之賊四萬餘水陸來犯吉勒塔布分路迎擊賊以藥箭火礟焚我漢軍營又蟻聚山巔奪我紅衣礟吉勒塔布並率兵擊敗之時康親王綂師由衢州征閩傅喇塔亦留兵圍温州偕吉勒塔布勦處州諸賊以入閩六月過三角嶺循江岸進兵曽養性等聨百餘艘於江屯賊衆於得勝山下之古溪據險以扼我師吉勒塔布同總兵陳世凱分兩路斫賊營㧞之又以礟擊賊艘沉江中賊潰走道乃通進師温溪渡口偽都督馬成龍等率衆拒戰復督兵奮擊斬千餘級降賊将馬國維鄭雄等遂㑹康親王軍於衢州八月同都統賚塔等剿偽都督馬九玉攻賊大溪灘營偽縂兵林福拒戰吉勒塔布擊敗之踰三濠進焚木城擒偽縂兵副将等十二克江山縣馬九玉敗遁旋自江山進兵峽口擊敗偽兵部閔可孝等降偽副将牟年義遂過仙霞嶺整師将攻闗偽副将王明庫等降聞馬九玉遁浦城又率兵馳追殱賊甚衆抵浦城擊賊大敗奪門入遂復其城九月同前鋒綂領希佛等攻建陽縣賊堕水死者無算奪橋克城追賊至建寜府賊走延平十月随康親王招撫延平進抵福州耿精忠降賊黨悉解散十六年六月擊海賊鄭錦於同安縣敗賊黨朱寅于三保谿降偽副将黄邦漢十八年鄭錦偽總統劉國軒等由峪州太平寨來犯将斷江東橋以刦長㤗吉勒塔布擊賊於下坑歐溪頭追至郭坑三戰皆㨗斬首二千餘級是年調滿洲正紅旗副都統十九年二月随都統賚塔征海澄率陸路師先衆進勦屡敗賊衆遂抵海澄偽總兵蘇堪等降八月詔撤福建兵以吉勒塔布同副都統沃申駐守漳州二十一年隨拉哈達率師旋京二十二年授䕶軍統領尋擢正紅旗䝉古都統二十七年授兵部尚書列議政大臣時喀爾喀為噶爾丹侵擾以賊逼呼倫貝爾汛界來告上命吉勒塔布同都綂巴海等徴兵科爾沁防禦噶爾丹尋復遣往蘇尼特度水草佳處為喀爾喀遊牧地二十九年四月同尚書阿喇尼往歸化城北及圖拉等處安設臺站復與阿喇尼領兵㑹喀爾喀諸札薩克兵由洮瀨河進勦六月偵知噶爾丹刦掠烏珠穆沁至烏勒輝河遂分兵二隊乗夜迎戰因喀爾喀兵違令亂陣不勝而退部議吉勒塔布輕進失利應革職得㫖降四級調用革議政仍留佐領七月率兵駐呼魯固爾河命與内大臣阿宻達等㑹兵偕至克勒俟裕親王福全至分軍三隊進剿吉勒塔布領首隊大敗噶爾丹於烏闌布通三十年三月詔移喀爾喀土謝圖汗車臣汗歸附人衆於近邉先遣吉勒塔布同尚書馬齊班第等調至上都河額爾屯河地候上駕親臨撫綏七月上慮巴圖爾額爾克濟農侵掠喀爾喀諭派鄂爾多斯烏喇特喀爾喀兵各于其地偹禦遣吉勒塔布統率之偵探聲息便宜行事復授正紅旗滿洲副都統三十一年巴圖爾額爾克濟農降罷兵歸三十五年擢正紅旗滿洲都統明年正月卒子祭𦵏如例覺羅華顯覺羅華顯滿洲正紅旗人聖祖仁皇帝康熈十九年由七品旗員授宗人府主事累遷理事官往𣙜浙江南新闗税務嵗滿還京復監督張家口税務三十四年擢翰林院侍講學士充日講起居注官三十五年上親征噶爾丹至克嚕倫河華顯扈從尋奉使册封朝鮮國王李焞子昀為世子歸轉侍讀學士三十九年三月擢内閣學士五月授甘肅廵撫未􅊩任調陜西廵撫時陜西頻嵗歉收開輸粟例華顯疏言報捐人衆每就近購糴致時價騰涌西安倉貯易盈積久更虞霉爛若欲增建倉厫又多繁費請不拘西安甘肅及願在各州縣買交者並許収納又言褒城扶風武功諸邑自康熈三十六年至三十八年逋賦甚多若新舊兼徵未免拮据請于四十年後分作三年帶徴以寛民力䟽皆得㫖俞允四十年擢川陜總督明年二月䟽言平凉慶陽臨洮鞏昌四府地皆沙瘠粮少難徴州縣官往往虧帑黷貨請定揀選充補之例勅令九卿於候補人員内保舉才品端方家道殷實者任之三年俸滿即予遷擢得㫖甘肅所屬被灾民甚困苦所奏甚是下部詳議尋命吏部送員引見記名遇缺坐補先是蘭州隴西安定諸州縣被灾設厰賑粥至是将屆停止華顯以地土寒凉麥収尚俟秋月恐粥厰一停貧民仍復流移他處䟽請展俟麥熟後停止復疏言甘肅流民之就賑西安者計數千口臣與撫臣鄂海及司道各員議捐給口粮逓送歸籍但窮民久離鄉井雖歸亦難資生請每大口給米五斗小口給米三斗其原有地畝之人於種麥時給籽種三升無産業者撥與荒地耕種即給為業亦照數支給又言甘屬産米者少常平倉榖應以麥豆兼收若無米之區即以麥七豆三徴収疏皆下部議行四十二年十一月上幸西安閲兵以華顯與将軍博霽廵撫鄂海訓練有方並賚櫜鞬弓矢加一級賜御書宣猷逺邇及凝清堂匾額尋以有疾遣太醫診視十二月卒於官遺疏入得㫖華顯自簡任總督以來潔已率屬綏輯地方秦蜀兩省事務經理合宜才猷茂著朕西廵時滿漢文武官吏軍民無不稱譽其賢忽聞溘逝深為軫悼下所司議贈䘏加兵部尚書太子太保祭葬如例命加祭一次諡曰文襄四十四年入祀陜西名宦欽定八旗通志卷一百六十五
