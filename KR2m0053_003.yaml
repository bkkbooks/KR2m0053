body:
  text: 欽定四庫全書欽定八旗通志卷首之一天章一聖祖仁皇帝御製詩賜撫逺大將軍圖海二首兩朝密勿重元臣秉鉞登壇西定秦鐘鼎功名懸日月丹青事業畫麒麟其二威名萬里作長城壁壘旌旗壯逺征綏靖邉陲馳露布凱旋立奏泰階平賜寧古塔將軍巴海詩并序鎮守寧古塔等處將軍巴海豐沛舊臣疆場重寄宣威布德招徠逺人朕甚嘉焉爰賜篇章以旌乃績夙簡威名將略雄髙牙坐鎮海雲東旌麾到處銷兵氣壁壘開時壯武功盡使版圖歸化日逺教邉徼被皇風酬勳世錫丹書重勉爾長思報國忠賜奉命大將軍傑淑二首卷斾生風壯氣揚早持龍節定炎方秋毫無犯民心悅盡掃欃槍奏凱章其二旄鉞才臨父老迎樓船一舉海波清金甌已定千年業銅柱須標萬古名賜輔國將軍俄啓詩并序內大臣輔國將軍俄啓侍從帷幄勤勞茂著百步穿楊發矢如電因賜御章以旌其射觀德由來上古風手持滿月緑沈弓鷹揚虎視流星逺中鵠穿楊為世雄賜大將軍安親王嶽樂二首大開册府紀元功伐罪安民將略雄佇見天潢蒙上賞明光髙宴賦彤弓其二洞庭南嶽盡提封九代勳名勒景鐘眼底窮荒皆赤子早銷金甲勸三農賜護軍統領桑格百戰威名已早揚頻年秉鉞在巖疆素知果勇兼韜略應著𢎞圖肅鬼方大閲南苑風髙水潦收旋催羽隊肅貔貅九天鼓吹鳴金鐲萬乘旌旄擁翠虯馬足過時殘雪盡鑾聲回處朔雲浮宣威端在承平日自昔經邦有大猷賜施烺詩海氛之不靖䑸艟出沒波濤震驚濱海居民魚鹽蠶織耕穫之利咸失其業朕心恆憫惻焉邇者滇黔隴蜀湖湘百粵悉底敉寧蕞爾臺灣阻險負固爾施烺銜命徂征決策進取樓船所指將士一心遂克島門迫其營窟勇以奮其氣誠以致其歸捷書到闕時值中秋對此佳辰欣聞凱奏念瀛壖赤子獲登衽席用紓南顧之憂惟爾丕績即解是日所御之衣馳賜載褒以詩島嶼全軍入滄溟一戰收降帆來蜃市露布徹龍樓上將能宣力竒功本伐謀伏波名共美南紀盡安流命裕親王福全皇長子胤禔帥師征厄魯特錫之以詩萬國勤懷保三階願治平寰中皆赤子域外盡蒼生小蠢忘帡冒天心解鬬爭執迷思梗化伐罪事專征武略期無敵王師出有名親藩分鐵鉞長子擁麾旌貙虎資郎將貔貅壯禁營玉戈凝曉色金甲耀秋晴獲醜寧遺類籌邉重此行據鞍軍令肅橫槊凱書成煙火疆隅堠牛羊塞上耕遐荒安一體歸奏慰豫情賜總督佛倫東表聞風化西秦作雨霖揚清知疾苦激濁勉官針曠世孤芳節超倫千古心封疆資大吏撫育代憂深賜將軍孫思克天討恭行日軍威戰捷時列營張犄角扼吭有偏師立見窮追盡能承節制竒鷹揚資逺略宿望在西陲示大將軍伯費揚古仗鉞親驅冦分麾扼要先戰能遵指授動輒秉機權梟鳥巢全覆妖狐命茍延樓蘭須共滅功勝勒燕然候兄裕親王花萼樓前别已經春夏餘平明挂錦纜日暮傍樵漁吳越當年景江湖各自如留心民事重隔月信音疏閲浙江駐防將士射羽林舊將分防重吳越名區古要疆講武正宜清宴日人人自擅技穿楊詠桐老圖賜裕親王丹桂秋香飄碧虛青桐迎露葉扶疏願將花萼樓前老帝子王孫永結廬國舅佟國維六十夀詩以賜之領袖髙門稱退讓英華雅望冠椒房謙和不恃勳臣貴謹恪能承寵眷長鶴算天增籌國老松年仙授養生方齊眉共享團圓慶特賜流霞捧夀觴兄裕親王挽詩二律花萼空虛夢悲歌暮景傷淚同秋雨濕聲逐碧天長清頌連香桂心慈厭帝鄉徽章縱有秩寂寂歎時光其二少小同居處義深讀孝經賦詩明務本攜手問慈寧樂善從無息神襟物外停繁憂題舊日血淚染疏櫺河南巡撫趙𢎞燮陛見求訓旨故作截句一首賜之宣布撫安在已亷剛柔率屬要溫謙中州民俗多忠厚務使和平莫太嚴將軍潘育龍久任封疆故存問賜詩少年勇戰啓元戎久任三秦鐵石衷守土防邉資壯略披堅敵陳表彤弓升平當惜老臣在竹帛還酬舊日功白首怡神存碩果願期添算荷恩隆賜將軍吳英水陸封疆六十年曽經百戰駕輕船蓬臺逺涉鯨鯢浪島嶼全消烽火煙將老偏宜立志壯宸襟每注施恩延波濤有作須先靖黽勉防微計未然賜大學士溫達自少存心敦孝友中年芳譽畹蘭清樞垣華省看封事儲粟經邦著政聲三殿絲綸資作楫九霄雨露啓和羮君臣鬚髮蒼然矣時念虞廷進善旌浙閩總督范時崇陛見來京朕每念祖為開創宰輔父乃忠義名臣所以待之優重今因回任特書御詩餞送翼唐九佐開天命論道三台識國楨握管表章文學館持忠堅保嵗寒名棟梁祖幹家聲重蘭桂孫枝令譽清浙閩封疆慎撫育惟期寧靜勉精誠大西門升八旗官閲騎射作騎射為觀德從來舊制存久安惜將老長治厭兵繁訓練雖成法忠貞實本原先知親上意不必問私恩題朱倫瀚手指畫雪梅竹指端寫出犯寒梅老幹單枝雪裏培疑是江南春色晚紅芳遍野點青苔又雪覆石林竹時催臘盡梅間雲飄逺岫長對翠屏開兩廣總督趙𢎞燦陛見來京鎮撫封疆多厯年滇黔百粵凱歸韉當時馬革抒誠切近日龍光錫慶綿萬里宣風梅嶺表三台擁節桂江邉優隆主眷酬耆舊藝閣宸章賜綺筵賜松江提督趙珀憶昔雲間山水邦波流清潤抵松江春秋久未臨鑾輅時刻嘗懷擁節幢訓練多方嫺步伐撫循成俗重敦龎建牙好慰軍民望服衆投醪士氣降病中偶爾問及工部尚書翰林院掌院學士徐元夢乃同學舊翰林康熙十六年以前進士再無一人矣率賦一律以遣悶懷七旬彼此對堪憐病裏回思一慨然少小精神皆散盡老年嵗月任推遷常懷舊學窮經史更想餘間力簡編詩興不知何處至拈毫又覺韻難全挽總督趙𢎞燮四十餘年撫近京旗民稱善政和平保全終始君恩重奄逝悲涼衆涕盈不畏刁頑持法紀久司鎖鑰務精明官方仍在歸泉壤節鉞空懸攬轡情聖祖仁皇帝御製文賜一等公遏必隆家廟碑孝昭皇后壼德攸宣倫情肫篤念父母鞠育之勤思祠宇春秋之祀朕嘉其意遣官督理後二月皇后已崩十七年十二月工作告成因諭內閣詳考明代實録允符典例特賜碑文勒諸貞石粵稽往代臨御萬邦必敦九族宫闈化洽內輔惟賢眷佑之隆宜崇曠典以篤椒親道至備也孝昭皇后仁孝性成溫恭德著久存屺岵之思每深霜露之感爾一等公遏必隆同妻縣主敬慎齊家洽謙沖之令望肅雍秉訓誕淑慎之坤儀是當錫以丹堊享以蘋蘩爰命冬官董其興作事方行乎二月哀忽動於六宫未遂之志朕甚悼焉念爾勳戚大臣兼核厯朝典制落成之日用賜豐碑昭國家不遺故舊之恩示皇后永懷顧復之念光流泉壤堪為戚屬之羽儀名列丹青不愧綸言之奬賚凡爾子孫克保無斁欽哉賜廣西巡撫馬雄鎮墓碑朕惟臣子之誼大節為重然平居無事之時人人侈談忠義一旦臨事而為國捐軀確乎不奪者蓋寡則所稱成仁取義之士國家得之宜何如褒崇焉爾馬雄鎮洊厯禁近簡授節旄恪恭之譽有聞綏輯之功斯著豈意叛藩逆命怙惡弄兵急變起蕭牆之中孤城介桂嶺之外聲阻援絶形絀勢危爾則以死自持抗詞罵賊遂觸凶怒橫致幽囚然猶志切輸忠力圖滅冦間關遣子萬里來歸慷慨上書一心罔二丹誠既通於王室闔門咸殉於巖疆節挺冰霜厯四年而益厲操堅金石經百折而不撓可云烈矣嗚呼惟見危乃知授命之不易疾風徑草繄爾一身實荷綱常之巨朝廷養士數十年有臣如此庶無負焉朕用既憫且嘉特考彞憲賜諡文毅躋以崇階爰勒貞珉昭示來世凡屬臣僚聞風興起咸思自勵爾之為功世道豈淺歟賜福建總督范承謨墓碑朕惟朝廷簡畀重臣授以封疆之任平時則竭誠殫力以靖厥職猝逢事變則有凛乎不可犯確然不可奪之節舍生取義流光天壤古所謂不二心之臣如此而已爾范承謨名臣之子奮迹甲科入侍禁林出典節鉞咸有聲績著於當官洎閩疆蒞鎮之年值狂豎盜兵之日冦起門庭禍生肘腋智未及施勇不暇展而爾志恥幸生義無茍免奮身罵賦誓不共天遂致闔室幽囚三年拘繫阻敓其衣食迫脅以甲兵凶焰彌張貞操愈徑卒蹈白刃以作完人慷慨從容兼有其美兹者底定疆陲申明命討罪人斯得臣節益昭倍深軫悼之情特厚飾終之禮寵以隆秩諡曰忠貞嗚呼褒忠顯善帝王治世之大權恩命疊頒朕曷有私於爾以培正氣以植人倫庶使選愞之士覩盛典而知興慕義之夫聞休風而加勸勒諸貞石其永有譽於無窮哉開國佐運勳臣武勳王揚古里直義公蜚英東𢎞毅公額宜都碑朕惟我國家創建丕基開無疆之景運既篤生聖神英武之君以翦除亂逆啓闢疆宇戡定諸邦一統之烈肇於東土其時則有一德一心之佐殫忠戮力經營四方以翊鴻猷而成大業蓋天實挺生異才鍾山嶽之靈挾風霆之氣貞誠不二毅勇無倫名髙百戰之勳位超五等之爵垂聲竹帛配食廟廷以與國家共承休祉子孫世衍其澤是豈偶然者哉當我列祖之龍興也一時人材蔚起猛士如雲戰將如雨以藝勇稱以功名顯者不可勝數而功冠諸臣為一代元勳則有開國佐運忠勇王揚古里直義公蜚英東𢎞毅公額宜都尤為傑出焉朕嘗恭覽列聖實録考三臣行事折衝行間則戰必勝攻必克平居則矢忠直贊謀畫豐功偉績至今焜耀簡編未嘗不緬想英風興懷往迹昔人創造艱難枕戈擐甲櫛風沐雨之勞恆留連往復不能去於懷也嵗在戊寅朕巡行舊京展祀陵寢追維祖宗功德隆盛並及當時佐命之臣邱壠所在皆遣官致祭而於三臣之墓特親至奠醊以示優崇仍復專官祭享蓋功在社稷以死勤事古人爰有明禋之典朕篤念勳庸用申異數并為文勒諸貞石以昭示於無極焉賜一等公內大臣都統國舅諡忠勇佟國綱碑朕惟自昔勳舊之臣乃心王室平居恪勤職事左右宣勞一旦奉揚威命忠不辭難勇不避險鴻名駿烈焜耀無窮史册所書良足嘉歎爾佟國綱賦性貞純秉心淵塞親居元舅而敬以持身位列上公而謙能服物入則虔共宿衛出則管領禁軍偉量夙重於巖廊令聞允孚於寮寀乃者小醜搆爭近逼邉圉三軍聲討簡佐元戎爾乃慷慨厲兵赳桓敵愾屬賊鋒之既挫將棄壘以潛奔爾猶擐甲直前提戈獨進鋭志彌堅金石壯氣逾薄虹霓誓掃陸梁永清朔漠豈期上將遽殞師中夫爾以肺腑之親心膂之寄秩崇望峻勞久勳髙假令偕衆旋軍亦可從容奏凱而義存憤激甘陷艱危人盡如斯冦奚足殄易曰君子以致命遂志傳曰殺敵為果致果為毅惟忠生勇爾實兼之循行易名斯無愧矣嗚呼典禮加隆榮哀悉備英風震於邉徼徑節炳若丹青九原有知應無遺憾惟朕眷思懿戚篤念老成身後追褒久而益痛特命所司勒文墓石昭朕無已之懷亦俾後人知所激勸焉賜江南江西總督傅臘塔碑朕惟國家所以資封疆之大吏者固在乎操履潔清正己率物又必優幹濟之才具通明之識斯足以振肅下僚綜理繁劇綏靖兵民以無負乎簡任之重古人所謂有猷有為有守兼之者實難其人也爾傅臘塔秉性貞誠賦材敏達朕屢經拔擢出典屏藩入為卿二稔知其品行端亷謨猷恢裕念兩江幅􅊷遼濶事務殷繁彈壓保釐亟需偉略爰畀爾總制之任俾展其經理之才爾能精白一心坊表庶職風清弊絶輿論翕然更能寬嚴互用咸綱舉而目張教養兼修亦害除而利溥軍民輯睦里井乂安斯其才守兼優豈非國家之楨幹臣工之模楷者與倚任方殷遽爾徂逝吏民謳思至於流涕且籲請尸祝觀愛戴之弗諼知德施之未泯朕用是深軫於懷馳賜奠醊恤典加渥諡曰清端製文以褒美之嗚呼人臣能奉宣德意以嘉惠一方生膺顯秩殁有榮名勒之貞珉傳於奕世寧不休與清文鑑序朕惟自昔聖人易結繩以書契用使天下之義理悉歸文字天下之文字悉歸六書六書備而義理無不畢具茍不為講習修明則形聲點畫之制雖存其義幾乎息矣我太祖髙皇帝創業垂訓至仁合於天地肇造清書大文昺如日月太宗文皇帝上聖之資開天之運繼志紹聞丕宣文治世祖章皇帝神靈首出智勇天授秉英斷之資持以恭儉擴寬仁之量齊以憂勤朕以涼德膺祖宗之鴻圖即位多年未嘗晷刻不以法祖為念兢業自守宵旰靡遑萬幾之暇惟以讀書窮理盡吾之志凡五經四書已經翻譯之外如綱目講義等有關於治道者靡不譯盡近來老成耆舊漸就凋謝因而微文奧旨久而弗彰承訛襲舛習而不察字句偶有失落語音或有不正國書所關至巨政事文章皆由此出非詳加釐定何所折衷非編輯成書何以取法爰詔儒臣分類排纂日以繕稿進呈朕親御丹黃逐一審訂解詁之疑似者必晰同異於毫芒引據之闕遺者必援經史以互證或博咨於故老或參考於舊編大而天文地理小而名物象數十二字母五聲切音具載集中名曰清文鑑用探音聲之本原究字畫之詳盡為部三十有六為類二百八十為書二十一卷清文得此而無餘藴凡以明祖德之源流敬本之深意也易云觀乎人文以化成天下朕仰承列祖創造之𢎞模深惟國家同文之盛典嵗閲數周彚成全帙誦是編者尚其體朕厯載之勤劬因音聲以求字畫因字畫以求文章繼自今詔令之出納章奏之敷陳以及達於遐陬勒諸琰琬者大經大法咸有據依一話一言式循典則庶幾國書永貽於千百祀而與日星河漢長垂天壤也夫和碩裕憲親王碑文國家景運龎洪本支百世用惇秩敘懋建屏藩矧兹同氣之最親加以懿行之茂著恩無間於終始禮務盡夫榮哀紀述生平倍增愾歎惟王為皇考世祖章皇帝之長子朕之親兄也胄既屬尊齒復居長而秉性寬和持身謙牧虛受之量雖疏賤不遺矜慎之衷雖細微必飭而其大者則在因心展孝曲盡慈寧色養之誠視國如家克敦夙夜奉公之義入而預聞大政出而翊贊戎機佐致升平共享清宴豈期偶恙遽遘鞠凶當王之初疾也嘗遣醫審藥躬視再三王自謂漸瘳諄辭遜謝及朕時巡塞上哀訃忽聞遂觸冒炎蒸倍道遄返輟朝臨奠製誄抒懷厯喪禮之告竣常涕泗之橫集顧瞻華屋杳隔春暉嵗月不淹頓成陳迹能不悲夫迄今追維往事溯自髫齡或同侍寢門或偕遊禁苑或參稽圖史或陪扈鑾輿朕日篤家人昆弟之歡而王則益修臣職惟謹四十餘年曽無失德天懷樂善何日忘之經曰髙而不危所以長守貴也滿而不溢所以長守富也王服習斯訓美備厥躬按法旌行豫諡曰憲洵無忝矣兹王之寢園在黃華山麓川回巖抱既固且完朕親加相度乃襄大事嗣子保泰命紹舊封式纘王緒於戲惟王克忠克孝之節允樹為臣為子之型王之休德朕褒揚之王之後嗣朕佑芘之爰據實摛文勒之貞石用垂令聞於不朽俾後之覽者知所景仰焉和碩恭親王常寧碑文國家因親錫寵固莫重於宗支而自近推恩尤必先乎同氣故手足之誼既篤生前軫恤之仁復加沒後凡以道隆敦本禮備飾終典至渥也惟王朕之介弟幼受親藩久沐尊崇厯霑賜賚方期奉天倫之樂承日接之歡克保修齡茂膺多祉何圖春秋猶壯齒髮未衰疢疾忽侵溘焉凋謝緬維曩昔感悼良深特遣官以築幽宫復勒銘以垂貞碣嗚呼音容漸邈嗟朱邸之長辭嵗月旋移悵黃罏之永閟式頒寵命昭示來兹不其休歟太子太傅都統三等公議政大臣吏部尚書中和殿大學士佐領贈少保仍兼太子太傅諡文襄圖海碑文朕撫御方夏勤求治理維兹丞弼之臣協心毗贊綏靖邦家實倚賴焉爾圖海秉資忠慤砥行端謹密勿周旋厯有年所敬以事上誠以持躬淵鑒沈幾克膺大任自為都統時嘗平荆楚西山之亂還入綸扉贊襄匪懈乃逆賊吳三桂憑藉寵靈煽動南服一時羣不逞之徒囂然附和察哈爾孤負國恩造釁搆孽爾以將軍副信郡王祇承廟算出關征討膚功立奏東服底平繼以涇原騷動西土震驚命爾為大將軍以乘勝之師回戈西嚮賊方肆其狂蹶思與滇逆併力惟爾以重臣建牙遂得橫截秦隴扼亢搗虛逆勢窮蹙始帖耳垂尾復來效命邇年以來爾鎮撫三秦威略大著能使羣賊膽寒則凡天戈所指建耆定之成功者惟爾勞勩為多爵以上公俾之振旅方將復煩以機務與之講持盈保泰之理共享隆平至治詎圖勤瘁之餘溘焉殞逝腹心失倚深用衋傷雖恩恤有加錫之嘉諡而朕軫悼元老之心則未有己也爰命伐石樹之墓道使後有溯勳舊之烈者得以考焉武英殿大學士兼吏部尚書佐領加二級諡文清阿蘭泰碑文朕惟國家之務全賴平章簡我良臣得之匪易其有克副股肱之寄積抒夙夜之勤律己彌見小心佐政能持大體方切倚毗而不假年飾終之禮有加哀往之情恆篤用泐貞石永世有辭爾武英殿大學士兼吏部尚書佐領加二級諡文清阿蘭泰有容之德大受之材自厯百司御事以至為冢卿罔不慎乃在位朕甚嘉之用俾爾弼余一人以襄大政爾能和衷以協力推誠以布公遵國家蕩平正直之塗養人心清靜寧一之福十年之久一眚無聞豈惟朕心所素知抑亦羣情所悅服至於潔亷之操尤著美於朝端蕭然故居朕嘗書額示寵且性本謙沖義惟止足每一求退朕輒黯然欲斷來章溫言批答間有微疾賜問頻仍豈期近者卧病一旬遂爾不起輟朝深痛未解朕懷賵馬賻金恤爾身後臨喪祖奠如朕親行加祭易名悉從優異嗚呼緬生平不事聲名之迹惟密勿常多贊助之勞朕無溢辭務傳其實尚俾知我弼臣之遺徽茂烈足以光於邦家風於有位千秋不泯視此豐碑福建總督范承謨畫壁集序朕惟帝王教化首重名節所以維繫人心扶樹綱紀也古人臣以身事主守土膺疆或遇蝥賊潛生豺狼勃起則捐軀矢志取義成仁而其激烈慷慨之氣間發為文辭雖質直無華後世論録終有不可泯滅者以其出於忠義之誠本乎性情之正也福建總督范承謨名臣之子授節閩海方值逆竪盜兵偏隅煽熖籌略未展橫罹幽縶閲三寒暑貞操彌堅故其皭然不滓之志縈紆鬱屈無所攄露乃以牆壁為書箋以桴薪為筆墨題分甲乙字辨衡從日月既深篇章漸積名曰畫壁記實也卒能終始不撓歸於正命若承謨者可謂冒白刃而不疑守丹心而自信者矣夫以茹荼含檗之餘每念不忘君父故詩文不必盡合於古之作者而浩然之氣流行充溢當其胸填聲咽髮植風生土塊灰丸同於利劒秃毫斷梗等比霜矛寫忠孝之性靈奪姦凶之殘魄是又豈刻雕藻繢塗飾虛浮者之所能及乎自三逆殄滅寰宇謐寧恤典頻加恩綸屢降固己延賞後昆光賁泉壤矣兹特允其子時崇所請復為序其存稿蓋善善欲長春秋之義辨章特錫數出非常庶幾追妥忠魂亦以風厲臣節焉欽定八旗通志卷首之一
