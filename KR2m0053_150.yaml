body:
  text: 欽定四庫全書欽定八旗通志卷一百三十六人物志十六大臣傳二滿洲鑲黃旗二齊納爾察覺伊勒慎古爾布什鄂爾桑羅色勒阿哈尼堪山索海逹素巴哈什屯武賴阿喇善納爾察子瑚沙納爾察姓鈕祜祿世居蘇克素護河之安圖國初來歸授騎都尉世職𨽻滿洲鑲紅旗後改𨽻鑲黃旗戊申嵗從太祖髙皇帝征烏喇攻宜罕山城先登克之由參領擢副都統列十六大臣後攻沙嶺不待大軍獨進歿於陳以長子佛索里襲騎都尉順治十二年世祖章皇帝追念納爾察宣力行間著有勞績衝冒鋒鏑盡瘁捐軀特賜諡端壯視一品大臣例立碑墓道次子瑚沙初任佐領太宗文皇帝天聰六年從征明入大同與前鋒參領圖魯什等偵敵遇敵四百人瑚沙彎弓躍馬馳入陳敵皆披靡略地至崞縣又擊敗敵衆崇德三年隨貝勒嶽託征明同參領鰲拜先驅遇明騎兵三百突出搏戰以八騎擊郤之復率左翼前鋒兵過燕京略山東明總兵黃某及太監髙起潛率衆來拒瑚沙同佐領羅什等連戰皆捷追北數十里先是佛索里以不勝任革世職至是命瑚沙襲父騎都尉職任前鋒參領六年從征錦州轉戰松山杏山間屢有斬獲七年加一雲騎尉世職是年十月貝勒阿巴泰征明上命瑚沙隨右翼大軍行俟入邉還報軍事十一月大軍入界嶺口屢敗敵瑚沙還奏明年春同前鋒統領努山等率兵九十赴界嶺口偵迎大軍俘獲敵卒無算順治元年四月隨睿親王多爾衮征流賊李自成率夲旗前鋒敗賊將唐通於一片石追擊自成至望都復與前鋒統領席特庫誘賊來戰夾擊破之六月同都統葉臣征山西至汾州同參領道喇圖爾賽等破賊將白輝兵二年隨英親王阿濟格征陜西攻克綏德州及延安府有佐領哈爾漢俄班駐守南山為賊所襲戰沒瑚沙率數騎突入取尸以還會自成奔湖廣追𠞰至安陸府擊敗賊將邵章獲其船東至九江口與席特庫率前鋒二十人破賊營追敗之於九宫山復同參領蘇拜希爾根捕𠞰賊黨斬首二千餘級是年敘功晉世職三等輕車都尉三年隨肅親王豪格征流賊張獻忠過漢中擊敗叛鎮賀珍兵獻忠自西充引衆迎戰瑚沙奮擊敗之五年敘功晉二等輕車都尉六年隨鄭親王濟爾哈朗征湖南時明桂王朱由榔據廣西其總督何騰蛟守湘潭我兵既克長沙渡江攻之前鋒兵薄城敵分三門出戰瑚沙與席特庫破其城西兵生擒騰蛟敵潰散遂下湘潭於是衡州寶慶永州辰州諸郡縣皆以次攻克遇恩詔晉爵為二等男九年九月擢鑲黃旗蒙古副都統奉命同學士蘇納海往朝鮮鞫獄十一年兼任工部侍郎明年擢夲旗蒙古都統列議政大臣十五年隨信郡王多尼征雲南十六年追𠞰明桂王朱由榔於永昌十七年凱旋以永昌初下時弗留兵守門聽軍士入城擾民降爵為三等男康熙三年卒賜祭葬分世職為二以第五子瑚弼圖襲一等輕車都尉次子碩伯海襲騎都尉伊勒慎伊勒慎姓費莫世居薩齊庫烏喇攻薩齊庫降其衆伊勒慎遂率所屬六部來歸後𨽻滿洲鑲黃旗兄曰古蘇太祖髙皇帝戊申年征烏喇命古蘇招降斐悠城䇿穆特諸部烏喇惡之盡俘殺古蘇妻子太祖念其家以歸誠被害授伊勒慎騎都尉世職尋從征明有功加三等輕車都尉又以沙嶺戰功加二等輕車都尉天聰五年七月奉命統兵鎮海州時明邉將窺伺瀋陽屢縱士卒入遼河採捕伊勒慎既之鎮密為防禦嚴偵緝設遊哨率所部駕輕舟追斬逋逃先後收獲人户及舟艦器械無算七年九月敘功並以從征旅順口多斬馘加一等輕車都尉崇德元年四月晉三等男九月明將造巨艦百餘橫截遼河為戰禦計伊勒慎與合守將烈列渾寨薩等沿河分立營寨别遣兵遷移近邉居民仍率將士設伏河口執其諜者以獻明兵望風引遁由此不敢犯四年十一月同刑部承政索海等征瓦爾喀部陳獲噶凌阿及餘黨二百餘人既而伊勒慎監守俘囚疏防脫逃烏喇博穆博果爾復糾衆來攻伊勒慎先衆敗走索海等擊破賊衆伊勒慎又不于汛地邀擊坐視博穆博果爾及餘衆遁去論罪應死詔革職鞭百籍其家六年十二月鑲紅旗大臣哈哈納劾伊勒慎防守海口時託言祭天則多魚苛斂兵丁財物及私造浮圖諸劣迹勘實復論死仍奉旨鞭百八年六月復鎮海州順治元年八月命為牛莊城守官二年卒年七十有九子郎圖隨征薩哈連烏喇陳亡恤贈騎都尉世職古爾布什古爾布什姓博爾濟吉特世居西喇木楞夲蒙古喀爾喀台吉也太祖髙皇帝天命六年偕台吉莽果爾率所屬六百户驅牲畜來歸俱授爵三等子𨽻滿洲鑲黃旗豫古爾布什滿洲蒙古各三百人俾任佐領尚公主為額駙賜青卓理克圖號天聰五年太宗文皇帝親統師征明圍大凌河城明監軍道張春以兵赴援古爾布什與額駙恩格德爾等禦戰弗力論罪應削爵上念其自外藩歸順功免罪罰鞍馬一白金百兩尋擢兵部承政崇德元年隨征朝鮮明年朝鮮國王李倧降大軍征明皮島既凱旋以古爾布什於朝鮮王謁上時亂班釋甲又私㩦從役隨征論罰鍰繼以失察所管佐領下俄齊爾桑罪狀論罰奪所轄丁壯三年更定官制改兵部右參政有護軍洪科訐都統阿山之子塞赫隨征明昌平臨陳退避古爾布什奉命勘訊不令塞赫訴辨憑洪科所訐定讞法司以古爾布什與洪科為姻親徇情偏袒議降秩詔從寬罰鍰四年上命理事官星鼐傳集蒙古官之舊𨽻喀爾喀察哈爾者星鼐誤傳八旗都統及諸王貝勒下護衛法司議星鼐罪並論古爾布什知蒙古官未集不即奏明宣召論罰如例六年隨征明錦州敗敵於寧逺明年再圍錦州敵兵犯我壕塹古爾布什擊走之後因失察護軍功罪論罰得旨寬免敏惠恭和元妃之喪輔國公扎喀納以歌舞軍中獲罪部議古爾布什以和碩額駙之親不行訶禁又不奏聞應削爵籍家産半上復免之世祖章皇帝順治元年古爾布什隨睿親王多爾衮入山海關擊敗流賊李自成明年敘功晉爵二等子七年九年兩遇恩詔晉一等子世襲十八年正月卒年六十有五賜祭葬如典禮諡敏襄子色楞襲爵鄂齊爾桑鄂齊爾桑姓博爾濟吉特蒙古扎魯特部長巴克之子也太祖髙皇帝天命六年巴克為我師所擒鄂齊爾桑來請為質釋其父還上許之八年巴克來朝上遣鄂齊爾桑與俱還太宗文皇帝即位以扎魯特諸部背約附明命大貝勒代善統師征之斬倡叛者擒巴克及其族拉什希布等並以鄂齊爾桑至皆𨽻滿洲鑲黃旗賜衣服器用有差授鄂齊爾桑為佐領尋從征董夔有斬獲天聰三年從上征明遇薊州步兵同額駙揚古利率先破敵五年圍大凌河城擊敗明錦州援兵八年敘功授三等輕車都尉世職是年八月從上征明大同上命前鋒統領圖魯什參領吳拜分率左右軍而以額駙多爾濟與鄂齊爾桑並領中軍擊明總兵曹文詔大敗其衆追至城下獲馬百崇德二年同都統都類參領和託皆以出獵誤射他人馬繫兵部鄂齊爾桑先至與諸繫者共居一室參政穆爾泰以時方溽暑令都類獨留室中徙衆於庭下以避之鄂齊爾桑亦徙出自設布帳以處穆爾泰復令撤去為和託更設鄂齊爾桑坐炎日中良久往告啓心郎穆成格穆成格不言理事官鄂穆克圖曰爾徒自怨乎抑欲陳奏乎如徒自怨則已果欲入奏我等代陳之鄂齊爾桑曰縲紲之囚何敢復有陳奏耶事遂寢及鄂齊爾桑釋繫自奏聞穆爾泰穆成格皆坐罷任鄂齊爾桑尋擢內大臣六年從征松山明兵夜犯御營侍衛坤等擊郤之諸大臣未及禦敵者皆議罰上念鄂齊爾桑自外藩來歸著有勞績特豫免議順治二年正月子喇瑪思尚公主封固倫額駙二月世祖章皇帝以鄂齊爾桑素荷太宗眷顧晉爵三等男五年卒子楚祿襲覺羅色勒子額爾德覺羅色勒滿洲鑲黃旗人祖禮敦追封武功郡王景祖翼皇帝之長子也色勒初任佐領太宗文皇帝御極簡列十六大臣進八大臣任正藍旗都統天聰五年上統大軍征明圍大凌河城令八旗分布八隅掘壕以困之色勒率夲旗兵駐城南明兵出犯色勒麾軍舍騎步戰敵敗北追至城壕乃還會我軍以炮擊毁城西南隅一臺據之列巨炮攻城城內兵突出圍台將引梯登色勒同都統和碩圖等合兵夾擊敵大潰竄入城我師掩擊扺城壕殱敵無算八年上親統大軍征明宣府大同色勒奉命隨貝勒德格類進獨石口敗敵長安嶺攻赤城克其郛會大軍於應州九年正月詔免功臣徭役色勒與焉六月以同都統宗室篇古等董築城垣弗堅應罰鍰上貰之十二月降鑲黃旗副都統崇德元年十二月上親征朝鮮朝鮮國王李倧遣其妻子入江華島而已遁入南漢山城豫親王多鐸等以兵圍城敵將率兵五百來援色勒同參領阿爾津擊敗之明年正月進攻江華島敵列戰艦截海道飛矢雨集色勒率右翼兵渡海衝越敵艦同佐領阿哈尼堪先衆至奮躍登岸破其守島兵大軍繼進獲倧妻子倧被圍急又知妻子被俘遂降凱旋論功授騎都尉世職三年兼任吏部右參政世祖章皇帝順治元年擢內大臣仍任副都統四年録武功郡王諸孫各豫騎都尉世職色勒晉一等男遇恩詔晉二等子八年擢領侍衛內大臣十四年七月卒賜祭葬如典禮諡勤慤立碑墓道子額爾德初任佐領崇德七年從大兵圍錦州擊敗明總督洪承疇松山援兵八年隨貝勒阿巴泰征明明兵駐渾河岸進擊走之復敗明步騎數千於三河縣順治元年隨睿親王多爾衮擊流賊李自成追至望都敘功授騎都尉世職五年授參領八年兼任户部理事官九年遷本部侍郎遇恩詔晉世職至二等輕車都尉十三年以員外郎朱世德司𣙜河西務虧缺稅銀户部誤援恩詔免議並坐降黜額爾德降世職為騎都尉罷侍郎専任參領十五年擢鑲黃旗蒙古副都統後襲其父二等子爵康熙十年卒子喇祜塔襲阿哈尼堪阿哈尼堪姓富察世居葉赫天聰時曾祖椿布倫偕兄楚隆阿弟昻古里來歸𨽻滿洲鑲黃旗阿哈尼堪初任佐領同蒙古兩黃旗將領布哈塔布囊阿濟拜略明寧逺明兵千人追至還擊敗之崇德二年從征朝鮮先右翼衆兵突過朝鮮戰艦遂取江華島五年正月承政薩穆什喀索海征呼爾哈部阿哈尼堪同右翼兵助戰克雅克薩城時烏魯蘇屯之博果爾及烏喇合兵六千來襲正藍旗後隊右翼索海設伏擊之斬殺甚衆阿哈尼堪與焉又攻挂喇爾屯先入有功四月任禮部參政敘功授騎都尉世職六年四月隨鄭親王濟爾哈朗征明圍錦州同左右翼兵合擊松山又與都統宗室拜音圖敗明總督洪承疇兵松山守將乘夜來襲我營其步兵復犯正黃旗蒙古汛阿哈尼堪並擊却之八月管鑲黃旗副都統事順治元年五月隨睿親王多爾衮入山海關擊敗流賊李自成八月世祖章皇帝以將遷都燕京分命大臣統兵鎮守盛京各城阿哈尼堪統左翼駐防盛京十二月同都統阿山等率將士由蒲州濟河協征流冦二年正月晉三等輕車都尉二月奉命率兵會豫親王多鐸南征平定河南江南皆著勞績攻掦州府時擊敗城內拒戰兵尋福山餘孽二千衆來犯阿哈尼堪率參領速班代等連戰皆捷遂與都統馬喇希進攻常熟破之三年蘇尼特蒙古騰機思等叛聞豫親王率師進討先遁走阿哈尼堪同四旗將領勒兵追擊斬其黨百餘人俘獲無算以功晉一等輕車都尉四年擢兵部尚書六年八月鄭親王征湖廣阿哈尼堪同都統劉之源率兵别趨寶慶聞賊渠王進才馬進忠據城乘夜馳往平明賊衆迎戰急擊殱之遂克寶慶時偽總兵馬有志等九營在南山坡阿哈尼堪乘勝進𠞰陳斬有志等七人又擊破賊渠袁宗第等十營于洪江大軍入沅州留阿哈尼堪駐守十二月賊渠王強等復犯沅州阿哈尼堪遣署護軍統領都爾德等破之于沅水斬偽副將三人及賊兵七百餘級七年正月師旋賜白金三百兩三月調禮部尚書遇恩詔加一雲騎尉並豫世襲先是睿親王遣往迎朝鮮王弟阿哈尼堪啓巽親王滿達海等以參領恩格德代之事覺下諸王大臣會勘論死得旨革職罰贖留尚書任尋復原職遇恩詔晉一等男八年十二月卒子噶爾哈圖襲别有傳索海子多頗羅索海滿洲鑲黃旗人姓瓜勒佳費英東第六子也天聰五年七月初設六部官授刑部承政七年八月同兵部承政車爾格至錦州偵明邉隘斬獲有功命管佐領事崇德三年二月明石城島總兵沈志祥挈所屬來歸索海隨貝勒杜度等運米濟之七月更定部院官制改授都察院左參政統兵往大凌河兩岸十四屯堡略地還復任刑部承政明年十一月同工部承政薩穆什喀往征索倫部索海統右翼兵偵知挂喇爾屯有敵兵五百與理事官喀喀木等輕騎襲之奪其柵斬二百級擒百三十人及左翼薩穆什喀攻陷雅克薩城旋攻鐸陳城不下而還烏喇與兀魯蘇屯之博穆博果爾合兵六千襲其後索海率衆設伏衝擊之獲其輜重生擒四百人乘勝往攻博穆博果爾營馳馬直入敵衆大潰是役也先獲二千二百五十四人後自額蘇里屯以西額爾圖屯以東又獲男婦五千餘牛羊駝馬無算凱旋太宗親率諸王郊迎宴勞之敘功授二等輕車都尉世職部議索海出征索倫不堅立營寨嚴束士卒以致疏脫俘囚應罰贖追還賞賚上以索海功罪相抵特詔免之明年三月隨睿親王多爾衮等圍錦州坐阿附王貝勒私遣官兵歸家及離城逺駐罪論褫職籍沒復得旨寬免仍輸罰贖六月王貝勒等統軍再圍錦州索海以兵四百截敵山城路還遇錦州出畋小凌河兵三百邀擊之斬九十餘級又從攻松山兵克之墮馬乘厮卒騎而歸會敏惠恭和元妃喪索海坐召優人歌舞論罪免死削職分奴僕一半給其弟護軍統領圖賴且諭曰爾既耽於逸樂任爾家居可也順治二年署副都統從征四川卒于軍子多頗羅太宗文皇帝時授佐領順治元年以入關從破流賊功授騎都尉世職尋任都察院理事官九年八月加一等輕車都尉任蒙古副都統十四年十二月隨信郡王多尼進兵滇黔至雲南磨盤山爭先擊敵遂歿於陳賜祭葬子多禪襲職哈什屯哈什屯滿洲鑲黃旗人姓富察先世居沙濟城祖旺吉努當太祖髙皇帝時率族屬來歸授佐領既卒長子萬濟哈襲管佐領哈什屯為萬濟哈長子初任前鋒校𨽻正藍旗太宗文皇帝天聰時改𨽻鑲黃旗授侍衛尋襲管佐領擢禮部參政崇德二年同佐領喀愷等率兵分道征瓦爾喀俘獲甚衆三年太宗親統師征喀爾喀留守盛京禮親王代善聞明總兵沈志祥欲率石城島兵衆歸附遣哈什屯招之志祥遂來歸是年重定官制改哈什屯為禮部副理事官六年大軍圍明錦州明總督洪承疇率兵十三萬赴援據松山其總兵曹變蛟乘夜率衆犯御營哈什屯先衆扞禦手腕中創仍裹創力戰卻敵得優賚白金及蒙古二户世祖章皇帝順治元年擢內大臣二年以勞績久著豫騎都尉世職嗣以考滿並遇恩詔晉世職至一等輕車都尉加一雲騎尉七年五月列議政大臣七月睿親王多爾衮有疾哈什屯同議政貝子錫翰等往視睿親王曰豫有疾上宜臨視又曰爾等毋以豫言奏請既而駕幸視之睿親王罪大臣等違令擅請降世職為騎都尉八年世祖親政鑒哈什屯無罪降職命復之兩遇恩詔晉爵一等男初冷僧機與哈什屯同為內大臣冷僧機諂附睿親王及睿親王卒冷僧機諛揚其功績因誣奏昔日兩黃旗大臣謀立肅親王豪格事詔下法司鞫詢集哈什屯及議政大臣巴哈等質之盡得其阿諛誣陷罪狀肅親王之為睿親王所害也尚書鞏阿岱與都統和洛輝等議殺肅親王子富綬哈什屯言王無滅嗣之罪同巴哈立持不可事乃已至是世祖封富綬為顯親王和洛輝以黨附睿親王為議政大臣蘇克薩哈所劾磔死鞏阿岱與冷僧機朋比姦惡事覺詔逮勘哈什屯亦質之鞏阿岱與冷僧機並伏誅時鄭芝龍𨽻正黃旗授子爵其子成功踞海島冦掠福建哈什屯奉命同內大臣遏必隆鼇拜大學士范文程宣諭芝龍導其招降成功芝龍因請改𨽻鑲黃旗遣人往福建取其妻妾及幼子至京十年詔以哈什屯宣力年久加一雲騎尉十二年詔奬奉職恪勤諸大臣加太子太保十三年奉敕使朝鮮鞫獄還奏稱旨尋以年老致仕康熙二年卒年六十有六賜祭葬如典禮諡恪僖子米思翰襲爵别有傳乾隆元年孫大學士馬齊疏陳哈什屯勞績得旨入祀賢良祠十三年册諡孝賢皇后推恩先世追封哈什屯一等公十四年曽孫大學士忠勇公傅恆經略金川功成凱旋詔視勳臣額亦都佟國維之例賜建宗祠春秋致祭以奬忠勳祀自哈什屯始武賴武賴滿洲鑲黃旗人姓瓜勒佳費英東苐五弟吳爾漢子也天聰四年四月同參領布爾堪等率精兵百人略明邉境渡大凌河馳斬俘獲甚衆八年任佐領九年擢正藍旗都統崇德元年隨武英郡王阿濟格等征明值遵化三屯營守備率衆來窺盡殱之尋以不俟後隊先行出邉誑言王貝勒等逼脅先歸論罰如律奪其俘獲朝鮮之役隨豫親王多鐸擊敗其援兵復與都統談泰率雲梯兵攻城守陴者懾竄盡收其輜重牲畜以歸三年隨貝勒嶽託征明至山東破明內監馮永盛總兵侯世祿等兵過董家口敵兵千餘沿山列陳同副都統準塔連戰皆大捷搗其營時我軍輜重既行明將率衆衝截復同準塔擊却其衆遂乘勝略地克取二城先是武賴奉命鞫蒙古訟事坐受賄徇私論罪褫職至是敘功授騎都尉世職五年隨睿親王多爾衮往明義州屯田刈錦州田禾明兵爭拒武賴追擊至城濠而返遂進師松山敗其步兵八年隨貝勒阿巴泰征明至渾河明將率兵千餘迎戰同副都統訥爾特敗之師旋過密雲明兵列火炮以截歸路與都統鼇拜奮勇衝突明兵潰走大軍將出邉有敵兵來犯鑲藍旗武賴擊却之整軍以出復往略地克取一城録功加一雲騎尉順治元年入山海關從破流賊李自成兵進秩二等輕車都尉七年九年三遇恩詔加至二等男子世襲尋以老乞休病卒年六十有四賜諡康毅勒石紀功子固德襲爵阿喇善阿喇善姓博爾濟吉特先世居扎魯特太宗文皇帝時隨其祖喀喇巴拜來歸𨽻滿洲鑲黃旗尋授護軍參領崇德二年列議政大臣四年上征明錦州班師以阿喇善與參領鼇拜等董修道路有泥濘不治者罰所乘馬入官六年隨睿親王多爾衮圍明錦州王遣將士離營歸家阿喇善未奏聞論褫職籍家産半得旨從寬罰鍰八年擢鑲黃旗滿洲副都統隨征明寧逺攻克前屯衛中後所二城世祖章皇帝順治元年正月兼任刑部侍郎四月隨大軍入山海關擊敗流賊李自成追至望都二年隨英親王阿濟格西𠞰自成同參領路什敗賊于綏德州進克延安府追賊至湖廣七戰皆捷是年敘入關功授雲騎尉世職三年隨肅親王豪格征流賊張獻忠過陜西擊敗叛鎮賀珍於漢中偽副將武大定踞秦州之三寨山阿喇善同護軍統領哈寧阿等以兵六百由僻徑登山奪賊壘斬級無算進擊獻忠于西充大敗其衆獻忠既滅復分𠞰餘賊攻克遵義五年凱旋以在軍中時不勘決參領希爾根爭功狀議罰上貰之仍敘功晉世職二等輕車都尉六年隨英親王討大同叛鎮薑瓖攻渾源州及左衛並復其城七年擢刑部尚書兼鑲黃旗蒙古都統尋追論克左衛時違英親王令不以登城將士名啓王及王詰問反巧飾罰鍰罷尚書任八年奉命率兵征山東土賊至沂州攻圍蒼山賊寨斬賊首劉遜張齊及其黨百餘又搜𠞰附近山寨斬賊首王家臣王家盛張榮魏在斯等三百餘級俘獲甚衆是年敘征薑瓖功晉爵三等男嗣兩遇恩詔晉一等男兼一雲騎尉九年四月兼任都察院左都御史尋隨敬謹親王尼堪征湖南為參贊大臣擊賊衡州王殁於陳坐失援罪應褫革籍沒命革世職仍留都統任十二年卒賜祭葬如例達素達素滿洲鑲黃旗人姓章佳世居費雅郎阿由護軍授護軍校天聰五年從太宗文皇帝征明圍大凌河城明監軍道張春率兵四萬由小凌河來援達素同護軍校鼇拜擊郤之旋往略明地奪敵馬斬一人還尋擢護軍參領崇德五年大軍圍錦州達素率護軍敗明杏山兵六年復圍錦州明兵數十人據塔山列火器拒守達素出不意率六騎馳上盡斬之復率兵邀擊松山遁走敵衆追至海岸溺死者無算七年隨豫親王多鐸征明寧逺擊敗敵騎八年同護軍統領阿爾津等征虎爾哈部攻克博和理城又招降能吉爾屯及大噶爾達蘇屯世祖章皇帝順治元年從大軍入山海關擊敗流賊李自成尋同都統巴哈納等征山西敗賊兵於太原攻克絳州追賊至黃河賊得舟遁達素督兵射之賊多墮水死二年隨英親王阿濟格𠞰自成于湖廣攻克安陸武昌追至富池口賊列營對岸達素先諸將衝擊俘獲無算三年隨肅親王豪格征流賊張獻忠過漢中擊走叛鎮賀珍進師四川屢戰皆捷先是敘入關功豫世職騎都尉及獻忠滅加一雲騎尉六年隨英親王討大同叛鎮薑瓖敗賊於右衛已而賊大至達素奮前搏擊飛矢及其喉兩手足並中傷遂墮馬軍校欲負以退達素叱曰死則死耳何避賊為復裹創督衆力戰賊敗郤三遇恩詔並敘平薑瓖功晉世職至一等輕車都尉九年獻忠餘黨孫可望李定國等冦掠湖南廣西陷沅州武岡寶慶及全州桂林達素隨敬謹親王尼堪征之敗賊衡州貝勒屯齊令率邏卒往寶慶偵賊蹤迹還遇賊衆邀戰擊敗之尋率兵𠞰賊全州破賊三寨斬偽副將偽守道等九人及賊衆四千餘遣兵復興安灌陽斬賊將倪兆龍是年十一月敬謹親王擊賊衡州歿於陳將佐俱獲罪達素以調遣他往嗣復擊賊有功得免議十一年擢護軍統領十三年擢內大臣十六年海賊鄭成功陷鎮江犯江寧上命達素為安南將軍同都統索渾護軍統領賴塔等率師往𠞰至則賊已敗遁入海達素奏請進𠞰成功於厦門得旨俞允遂領所部兵由浙江赴福建十八年聖祖仁皇帝即位命達素率兵還京仍任內大臣康熙八年領侍衛內大臣鼇拜獲罪達素舊為鼇拜引用坐黜罷尋仍復世職及卒以其子達禧襲巴山子舒恕巴山滿洲鑲黃旗人姓瓜勒佳世居哈達祖巴岱國初率衆來歸授佐領再傳至巴山仍其任天聰五年從太宗文皇帝征明圍大凌河城明兵出城誘戰副都統屯布祿戰殁巴山衝入敵陳得其尸以出復擊退敵兵取佐領郎格等二人尸歸明年大兵征察哈爾其部衆有竄入明大同邉境者往索取之師旋明兵追襲巴山與承政圖爾格殿後設伏邀擊斬馘甚衆八年以克副任使授騎都尉世職尋任參領崇德元年從上征朝鮮同參領屯泰等先衆破敵陳三年七月兼任工部理事官八月隨貝勒嶽託征明自牆子嶺入邉薄燕京擊敗明太監馮永盛兵進攻巨鹿縣率所部樹雲梯先登克其城敘功加一雲騎尉五年同承政薩穆什喀索海等征呼爾哈部攻挂喇爾屯有斬獲七年奉命隨奉國將軍巴布泰率師駐防錦州世祖章皇帝順治元年睿親王多爾衮統大兵入山海關巴山率所部步戰擊敗流賊李自成尋擢工部侍郎敘功晉三等輕車都尉二年十一月授鎮守江寧副都統三年命總管江寧駐防滿洲兵時江北山寨賊冦未靖江寧城中姦徒謀為內應巴山詗得之捕斬逆黨三十人未幾偽潞安王朱誼石糾衆二萬餘分三路來犯巴山與副都統康喀賴等破走之賊復屯聚城北之攝山我軍進𠞰斬其渠數人餘黨悉潰竄四年明故官侯洞曽之子侯元瀞遣其黨謝堯文潛通明魯王朱以海於海島取偽敕及偽鎮黃斌卿致招撫大學士洪承疇書以歸為柘林遊擊陳可所獲有內仗承疇殺巴張二將語蓋指巴山與提督張大猷也事聞上以逆書所云乃反間計特宣諭慰承疇而諭奬巴山張大猷曰爾等嚴察亂萌具見公忠盡職六年江南總督馬國柱𠞰六安州山賊巴山以兵會之陳斬賊渠張福寰諸賊寨俱翦平兩遇恩詔晉爵三等男九年還京十一年以久鎮江寧平賊冦功晉二等男康熙十二年卒賜祭葬如例以其子舒恕襲爵十五年舒恕隨大學士圖海征叛鎮王輔臣師次平涼城北虎山墩輔臣以衆萬餘拒敵敗之是年復隨都統穆占征逆藩吳三桂破賊衆三千於湖北松滋縣二十年進圍雲南城擊敗賊將胡國柄劉圯龍黃明等又蹙賊將馬寶巴飬元等於烏木山二十五年敘功晉一等男後以年老乞休尋卒子長清改襲一等輕車都尉欽定八旗通志卷一百三十六
