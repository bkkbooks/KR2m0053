body:
  text: 欽定四庫全書欽定八旗通志卷一百四十九人物志二十九大臣傳十五滿洲正黃旗三坤遜逹哩費雅思哈根額參逹理善特卦喇默訥圖喇沃內喀蘭圖圖海覺羅武費雅思哈費雅思哈滿洲正黃旗人姓富察佐領本科里之第三子也初任護軍校天聰六年太宗文皇帝親征察哈爾分兵略明大同至朔州城中兵出戰費雅思哈與參領道喇等奮擊敗之崇德三年署護軍參領隨貝勒嶽託征明入牆子嶺敗密雲步兵五年大軍圍錦州明兵自松山杏山赴援費雅思哈禦戰皆捷六年復圍錦州同參領哈寧阿擊敵城下射殪二人明總督洪承疇以步隊自松山來犯費雅思哈力戰卻敵世祖章皇帝順治元年隨睿親王多爾衮入山海關敗流賊李自成又追敗之望都是年冬授護軍參領隨英親王阿濟格西𠞰自成明年春次榆林賊乘夜襲我營費雅思哈同護軍統領車爾布等擊之走窮追自成至武昌連破賊營復率舟師敗賊於富池口獲賊船三十三年隨肅親王豪格征流賊張獻忠過西安分兵剿賊邠州賊渠胡敬德率衆千餘踞三水縣西北山岡費雅思哈同護軍統領噶逹渾破賊寨復同都統巴哈納擊敗叛鎮賀珍于雞頭關進師四川屢與獻忠賊黨戰斬獲無算正藍旗官軍為賊所困同噶逹渾趨援賊敗遁先是敘入關功豫世職騎都尉及獻忠滅加一雲騎尉六年隨英親王討大同叛鎮薑瓖掘壕圍城偽總兵楊振威率步騎萬餘來犯費雅思哈先衆迎戰卻賊入城時賊黨分踞左衛復陷汾州窺太原費雅思哈先後率護軍𠞰賊所至克捷尋復會大軍圍大同賊勢蹙振威斬瓖首出降乃班師三遇恩詔晉世職至一等輕車都尉十三年擢護軍統領列議政大臣尋率兵赴湖南駐防時獻忠餘黨孫可望踞辰州費雅思哈同都統卓羅副都統泰什哈等由澧州常德進征賊棄城遁縱火焚其船以阻我軍費雅思哈取其未及焚者以濟師攻發賊伏躡擊至瀘溪殱賊甚衆十八年隨定西將軍愛星阿𠞰明桂王朱由榔於緬甸緬人執由榔以獻聖祖仁皇帝康熙元年凱旋敘功晉爵三等男十一年五月卒賜祭葬如典禮諡僖恪子蘇丹襲爵别有傳額參額參滿洲正黃旗人姓吳雅父額伯根國初來歸額參初授膳房總領歷任內大臣崇德元年十二月從太宗文皇帝征朝鮮適朝鮮遣人致書于明額參遇而射之立斃詔嘉其能即以其人所乘馬賜之二年正月同額駙公揚古利率兵大破朝鮮于南漢城追入山敗卒伏崖間竊發鳥鎗中揚古利歿尋有越山去者或言彼即傷揚額駙者也上命額參追之次日以其首來獻諭奬之三年隨睿親王多爾衮征明至山東克濟南臨清還攻大同均在事有功授世管佐領卒長子魏武官至護軍參領是為孝恭仁皇后之父雍正元年敕曰額柏根係本朝舊族創業名家在太祖髙皇帝時撫育禁庭視同子姪額參歷事三朝軍功懋著魏武天挺俊傑啓後承先厚德鍾靈篤生聖母宜加峻秩以協彞章俱著追封一等公即以魏武子博啓承襲並令世襲罔替乾隆十八年博啓卒子柏永襲一等公二十三年以病解任子西銘襲一等公乾隆四十三年奉旨向來后族承恩世襲俱係一等公此等特因椒房至戚恩澤加封以視佐命功臣櫛風沐雨拓土開疆者實難並論况宗室王公以近支恩封者尚以世次遞降而外戚轉得崇封延世未免過優著俱改為三等公世襲罔替于是西銘改三等公四十六年授蒙古正黃旗副都統四十八年授內大臣四十九年九月出使朝鮮五十年正月舉行千叟宴西銘未還京特命給賞七月授江寧將軍五十二年卒於任坤坤姓那木都魯先世居瓦爾喀之綏芬父伊訥克當太宗文皇帝征瓦爾喀時先衆迎降遂挈家來歸𨽻滿洲正黃旗天聰八年授雲騎尉世職尋卒坤襲之洊擢一等侍衛兼管佐領事崇德六年從上征明錦州圍松山城明總兵曹變蛟集衆乘夜犯御營突衝正黃旗營門諸侍衛及親軍等皆散列門左右坤獨立門中力戰郤敵上嘉其勇敢賜號巴圖魯賚白金四百兩超晉一等輕車都尉世職世祖章皇帝順治二年敘録太宗眷顧諸臣各豫世職加坤一雲騎尉嗣屢遇恩詔晉爵一等男兼一雲騎尉十年上以坤嘗奉遣祭昭陵辭不往扈蹕南臺不入直又擅娶賜配有屬之女子為妻下內大臣鰲拜等議罪應死籍沒詔從寬罷任仍留一等男爵尋復一等侍衛十一年隨靖南將軍珠瑪喇征廣東署都統事時流賊張獻忠餘黨李定國附明桂王朱由榔自廣西犯廣東據新會縣左之山峪坤率兵與諸軍合擊大破之追勦至橫州江岸斬賊無算敘功加一雲騎尉十五年授散秩大臣尋擢內大臣聖祖仁皇帝康熙十二年諭奬久著勞績諸大臣加坤太子太保是年冬逆藩吳三桂反明年九月詔以河南地廣兵少恐姦宄乘間竊發授坤振武將軍率兵駐防汝寧十二月陕西提督王輔臣叛于寧羌踞秦州詔坤移兵赴西安十四年正月詔同副都統翁愛等進守漢中先是定西大將軍貝勒洞鄂由漢中進征保寧聞王輔臣叛還西安令將軍席卜臣等率兵二千守漢中至是輔臣糾叛黨毁鳯縣之偏橋阻我鑲運復截踞棧道斷漢中聲援坤以疏聞諭趣開棧道以援漢中坤進次寶雞因道阻駐兵詔罷坤將軍任以內大臣留貝勒洞鄂軍供調遣六月大軍復秦州坤同將軍佛尼勒追𠞰賊衆連戰皆捷復禮縣清水伏羌西和等城時席卜臣等因漢中乏餉不能守率兵乘間還西安十七年詔趣大軍規復漢中以坤同副都統馬一豹等守潼關十八年因坤年老召還京二十二年議政王大臣等追論坤奉命援漢中頓兵不進雖有勞績未足扺罪應罷黜官爵及加銜並削巴圖魯號上曰巴圖魯號太宗文皇帝所賜其勿削並留一等輕車都尉世職二十四年上念坤宣力有年雖軍中獲罪事非由己起授散秩大臣並諭以年已衰邁如不能入朝聽其家居二十五年卒賜祭葬如例孫顯圖襲世職遜逹哩遜逹哩姓魯布哩世居葉赫太祖髙皇帝取葉赫籍其人户分𨽻八旗遜逹哩𨽻正黃旗滿洲尋選充驍騎每隨征輒奮勇爭先中創不退屢得優賚太宗文皇帝崇德三年隨睿親王多爾衮征明由青山口入邉越燕京轉戰至山東攻克濟南府城明年四月凱旋論先登功第一賜號巴圖魯豫二等輕車都尉世職兼管佐領世祖章皇帝順治七年授兵部理事官八年遷護軍參領三遇恩詔晉爵至二等男十二年擢正黃旗滿洲副都統十六年遷護軍統領先是流賊李自成竄死其黨散處楚蜀至是餘孽劉二虎郝搖旗李來亨袁宗第等猶聚匿歸州興山間聖祖仁皇帝康熙二年以都統穆哩瑪為靖西將軍都統圖海為定西將軍統八旗兵赴湖北會合陜西四川兵𠞰賊命遜逹哩領護軍以隨直抵茅麓山破賊巢二虎來亨自經死搖旗宗第就擒餘賊悉平乃班師十二年諭奬久著勞績諸大臣加遜逹哩太子少傳十四年四月卒年七十有三賜祭葬如典禮諡果壯子杭書襲爵改𨽻鑲白旗逹理善逹理善滿洲正黃旗人姓那木都魯國初有綏芬路長明安圖巴顔之族嶽蘇納者同族衆來歸逹理善其四世孫也崇德三年以間散𨽻驍騎營隨睿親王多爾衮征明越北京攻山東濟南府以雲梯先登第三克其城賜巴圖魯號授三等輕車都尉世職六年隨大軍圍錦州進擊明總督洪承疇援兵于松山杏山間連敗敵衆順治元年秋隨都統葉臣征山西攻克太原二年冬隨副都統珠瑪喇和託等駐防杭州先是明福王朱由嵩就擒其大學士馬士英竄杭州總兵方國安守嚴州及大兵定杭州馬士英走依方國安糾衆來犯逹理善偕衆擊走之又屢敗之朱橋范村及餘杭臨安富陽五年隨大將軍談泰赴江西𠞰叛鎮金聲桓復南昌七年九年三遇恩詔晉世職至一等輕車都尉又一雲騎尉十三年二月任參領十五年隨信郡王多尼征雲南十六年明桂王朱由榔竄緬甸其舊將髙應鳯結元江土司那嵩負固抗拒逹理善與都統卓羅前鋒統領白爾赫圖等攻克元江城那嵩自焚死擒髙應鳯斬于軍康熙二年敘功晉爵三等男尋以老乞休十三年十二月陜西提督王輔臣叛于寧羌逹理善請往軍前效力命署副都統率八旗每佐領下兵三名赴西安十四年二月由西安至隴州仙逸關時輔臣留賊黨踞秦州自引兵退舊駐之平涼偽總兵髙鼎蔡元率馬步賊四千自關山河岸迎戰逹理善同前鋒統領穆占將軍佛尼勒等率兵進攻賊潰走追擊五十餘里復關山關三月復同穆占等自清水縣進距渭河橋二十里遇賊哨擊敗之乘勝奪橋抵秦州立營秦州賊二千出城衝突逹理善揮軍夾擊賊敗入城四月分兵攻東關克之四川叛鎮吳之茂引賊萬餘援平涼逼秦州城結寨城內賊八千餘出應合犯我營逹理善時已病猶督兵力戰大破賊衆尋卒于軍賜祭葬如例諡曰武毅二十五年兵部彚敘陜西軍功以逹理善紀功二次例不晉職奏得旨逹理善巴圖魯係告老解任之員後願隨征盡心效力著有勞績又病故行間殊為可憫不拘定例給一世職于是豫雲騎尉合前三等男晉為二等男以其孫留占襲四十四年十二月留占任冠軍使兼一等侍衛因庸懦解退部議銷去恩詔所加職改一等輕車都尉另襲得旨逹理善巴圖魯本有成勞致仕後復從軍效力免其銷去原職仍以留占之弟岱竒里襲二等男根特根特滿洲正黃旗人姓納喇父逹雅理國初來歸以軍功授騎都尉遞加一等輕車都尉卒以其孫逹漢泰襲根特初以間散隨貝勒阿巴泰征明至山東攻泗水縣先登還攻定州先登敘功授騎都尉兼一雲騎尉世職賜巴圖魯號尋晉三等輕車都尉順治元年授刑部理事官五年三月隨征南大將軍談泰征叛鎮金聲桓于江西七月大兵薄南昌圍之未下根特由城南繼蒙古兵登城拔之聲桓中二矢死生擒其黨王得仁江西平師還擢副都統兼管佐領七年九年兩遇恩詔晉世職為一等輕車都尉康熙十二年十一月逆藩吳三桂叛十三年正月命都統尼雅翰為鎮南將軍與兖州副都統瑪哈逹同赴安慶根特代駐兖州二月上以江西界福建廣東湖南為三省要地命根特偕副都統席布率兵速赴南昌三月江西巡撫董衛國疏報湖南長沙失守江西袁州吉安二府與接壤請撥兵駐防得旨著根特率現駐南昌兵往相機𠞰禦尋命內大臣希爾根為定南將軍帥師赴江西根特參贊軍務四月平南王尚可喜疏言吳逆遣賊二萬屯黃沙河叛鎮孫延齡欲與合請就近撥兵會𠞰孫逆分賊勢諭曰根特候希爾根等兵至江西即率所部官兵速赴廣東是月授平寇將軍會逆藩耿精忠叛於福建詔根特由廣東仍返江西六月衛國疏報叛辨柯升勾閩賊竊據廣信諸處詔根特先定廣信冉偕前鋒統領舒恕由袁州進取長沙七月兩廣總督金光祖疏報廣西梧州失守諭曰根特等兵由袁州取長沙進廣西以襲賊後則取道廣東必致遲久其與平南王尚可喜總督金光祖提督馬雄會同酌議添發官兵規取橫州否則固守梧江諸處相機𠞰禦八月卒於軍二十二年賜祭葬如例子智宏襲世職卦喇卦喇滿洲正黃旗人姓伊爾根覺羅世居界藩國初來歸由前鋒校給世管佐領屢從征伐崇德三年授兵部副理事官尋署副都統七年大軍征明至黃崖口卦喇偕都統談泰從山右奪隘進圍薊州敗明總兵白廣恩等兵順治元年隨睿親王多爾衮入山海關破流賊李自成二年敘功給騎都尉世職三遇恩詔遞加二等輕車都尉授副都統六年四月命偕參領羅碩赴太原駐防時叛鎮薑瓖黨陷汾州諭固守太原卦喇于城南八十里立營偵賊攻清源縣偕羅碩分路奮擊斬首五千餘級餘衆潰走五月偽巡撫薑建勳擁衆犯太原卦喇等迎擊之斬級千餘賊立寨晉祠堡據險不退會端重親王博洛統兵至卦喇隨大軍破賊營斬萬餘級八月賊衆犯夀陽縣卦喇率兵援𠞰復大破之康熙十三年以老病乞休十五年卒子烏爾禪襲世職圖喇圖喇滿洲正黃旗人姓舒穆祿世居琿春初任兵部筆帖式太宗文皇帝崇德七年隨饒餘貝勒阿巴泰征明山東攻泗水縣流矢中目戰愈力攻新泰等城奮勇爭先世祖章皇帝順治元年隨豫親王多鐸征陜西二年復隨征江南七年擢兵部主事兩遇恩詔豫騎都尉世職十二年擢兵部郎中十三年隨都統伊勒德征舟山偽伯阮思率巨艦百餘拒戰圖喇與副都統根特擊敗之阮思復糾其黨陳六御張洪德等合兵三萬餘犯我舟師圖喇與副都統柯永蓁連敗其衆圖喇中炮傷手足舟山既平敘功加一雲騎尉十八年山東土賊于七倡亂聖祖仁皇帝命圖喇同郎中察竒至棲霞逮鞫賊黨時于七據棲霞之岠嵎山其黨假忠續林萬鵬龎應魁髙起英各擁衆數千分據鰲山潛結棲霞城中姦黨為內應圖喇邏獲賊諜二人詰之盡得賊情適靖東將軍濟什哈帥師抵萊陽圖喇遣使約濟什哈調緑旗兵七百疾馳至棲霞獲城中從賊者三百餘人遂趨鰲山忠續萬鵬等聞風遁擒賊黨六十餘獲牲畜以數百計尋偕察竒還京擢大理寺少卿康熙二年五月授駐防杭州副都統十月同總督趙廷臣至定海招降海賊鄭錦之偽靜波將軍阮美及偽官一百二十餘員兵二千九百餘七年擢杭州將軍十三年三月逆藩耿精忠叛圖喇奉詔與總督李之芳提督塞伯哩率滿漢官兵相機防𠞰尋以都統賚塔為平南將軍赴衢州禦賊命圖喇駐守杭州兼防海疆六月疏言杭州兵少請增兵協守詔移江南緑旗兵五千駐杭州又疏請杭州增設防禦每旗各一員下部議如所請尋以病還京十月卒賜祭葬如例子德明襲職沃內沃內滿洲正黃旗人姓性佳世居貝歡山沁地祖福瑚太祖髙皇帝時來歸太宗文皇帝崇德三年沃內隨睿親王多爾衮征明毁董家口邉墻進師越燕京攻定州沃內先登克城賜號巴圖魯豫騎都尉兼一雲騎尉世職尋授參領世祖章皇帝順治三年隨端重親王博洛征明唐王朱聿鍵師至福建其總兵薑正希率兵二萬迎戰沃內先衆擊敗之六年隨大軍討叛鎮薑瓖敗賊兵於寧武關賊據左衛城以馬步兵萬餘拒敵沃內率所部擊郤其衆復擊賊於遼州連戰皆捷還攻左衛城沃內乘頽垣先登克之敘功復遇恩詔晉世職至一等輕車都尉兼一雲騎尉聖祖仁皇帝康熙八年遷正黃旗滿洲副都統十二年擢盛京將軍奏請增設每旗防禦各一員得旨允行十四年察哈爾布爾尼叛沃內以其事疏報上命寧古塔將軍巴海同沃內固守盛京以信郡王鄂扎為撫逺大將軍統師往討平之十七年上以沃內當布爾尼叛時未立軍功命解將軍任三十年卒賜祭葬如例以其孫赫英襲世職喀蘭圖子察琿喀蘭圖姓博爾濟吉特先世居克嚕倫地太宗文皇帝時隨其兄額爾格勒珠爾率屬來歸𨽻正黃旗蒙古尋授一等侍衛順治二年世祖章皇帝以喀蘭圖素荷太宗眷顧豫騎都尉世職七年九年三遇恩詔晉世職至二等輕車都尉先是睿親王多爾衮請上幸其第喀蘭圖方退直聞扈從內大臣及侍衛等不及二十人即持弓矢趨至密為防衛及睿親王獲罪上嘉喀蘭圖忠誠賚金帛鞍馬及屯莊改𨽻正黃旗滿洲晉世職一等後以扈駕行圍遲誤仍降二等輕車都尉十五年授散秩大臣尋擢內大臣聖祖仁皇帝康熙八年擢理藩院尚書九年奉命往科爾沁烏珠穆沁等外藩盟會十年以老乞休上念其勞績素著允解任仍授為內大臣加太子太保十二年三月卒賜祭葬如例諡敏壯以其子察琿襲先是察琿已襲額爾格勒珠爾之騎都尉兼一雲騎尉世職至是合為三等男康熙十三年隨安親王嶽樂討逆藩吳三桂至江西袁州擊賊鈐山岡賊將馬寶領衆萬餘列炮拒敵察琿力戰歿於陳議恤追晉二等男賜祭葬如例無子以喀蘭圖弟之子恩克襲爵圖海圖海滿洲正黃旗人姓馬佳父穆哈逹世居綏芬圖海初由筆帖式加員外郎銜順治二年改國史院侍讀八年遷祕書院學士九年恩詔豫騎都尉世職越嵗授宏文院大學士列議政大臣十二年加太子太保命攝刑部尚書事明年考滿加少保十五年命同大學士巴哈納等校訂律例旋以承審江南鄉試作弊事遲延削加銜明年侍衛阿拉那與公額爾克戴青家奴毆於市刑部審理失實上詰問圖海不以實對下廷臣察議以其負恩溺職論死奉旨寬免削職十八年正月世祖龍馭上賔遺命起用聖祖仁皇帝御極即於是年授正黃旗滿洲都統康熙二年七月蜀流賊郝搖旗劉體純李來亨等嘯聚湖廣鄖襄山中命為定西將軍副靖西將軍都統穆里瑪率禁旅會楚蜀之師討之至則與總督李國英提督鄭蛟麟總兵俞奮起于大海署護軍統領根特等連營困之賊以兵三千犯奮起營圖海率兵邀擊敗之賊又連犯諸營各分兵夾擊咸潰敗未幾郝搖旗為副都統杜敏擒斬於黃草坪劉體純亦相繼破滅惟李來亨擁衆據茅麓山恃險負固圖海等率兵圍之絶其聲援外則搜𠞰餘寇略盡賊勢窮蹙來亨闔門自經死偽公侯將軍以下偽官五百八十餘員兵八千八百餘名降執斬偽新樂王及偽官七人兵六十一人俘其家口三千餘衆而還六年晉宏文院大學士加世職為一等輕車都尉會纂修世祖章皇帝實録充總裁官七年命測儀象八年命録刑部重囚並稱旨九年奏乞解機務専力戎行上慰留之十一年命清理刑獄十二年冬吳三桂叛十三年耿精忠亦叛聖祖以籌餉需才命攝户部尚書十四年三月疏請敕禁外省軍需不得私派夫役不得先期拘集錢糧不得額外科斂詞訟重者速審速結小者不得濫準滋纍衙蠧土豪不得魚肉善良奉旨允行是月察哈爾布爾尼劫其父阿布奈以叛圖海奉命為副將軍同撫逺大將軍信郡王鄂札率師往討四月師次逹祿布爾尼設伏山谷而以兵三千人來拒我師我師進攻伏發撓我土默特兵圖海分兵迎擊賊以四百騎繼至力戰殱之布爾尼乃悉衆出用火器拒戰圖海令嚴陳以待賊敗復聚連擊大破之招撫人户一千三百餘布爾尼僅以三十騎遁去時科爾沁額駙沙津以兵會𠞰遇布爾尼於扎魯特境追及斬之察哈爾平班師聖祖御南苑之大紅門迎勞之敘功晉一等男十五年二月聖祖以貝勒洞鄂攻叛將王輔臣於平涼未克命圖海為撫逺大將軍率護軍每佐領各二名赴陜總轄全省貝勒洞鄂以下咸聽節制三月至平涼明賞罰申約束軍威大振賊衆聞之懼諸將請乘勢攻城圖海曰仁義之師先招懷而後攻伐吾奉天威討兹凶豎無慮不克顧念城中數十萬生靈無非朝廷赤子遭賊劫持至此覆巢之下殺戮必多俟其向化歸誠以體聖主好生之德不更美乎城中軍民聞者莫不感泣咸思自拔以出賊勢由是日蹙五月奪虎山墩虎山墩者在平涼城北髙數十仭賊守以精兵通西北餉道圖海曰此平涼之咽喉也得此則餉道絶城不攻而下矣即率兵仰攻賊萬餘列火器以死拒戰圖海令兵畨休迭進自己至午戰益奮斬偽總兵二人賊被殺及墜崖死者無算遂奪其墩據之俯視城中如在掌握因發大炮擊其城中營城中洶懼輔臣乃乞降隨以其情上聞詔赦輔臣罪撫慰之六月圖海劄授七品官周昌為參議道賫詔入城翼日輔臣遣偽布政使龔榮遇等率士民獻軍民册又遣其子繼正等繳所受吳逆偽敕印劄然猶疑懼觀望圖海復令周昌同其兄子前鋒侍衛保定往諭輔臣乃率衆剃髮降圖海令副都統吳丹入城撫定秋毫無所犯平涼被圍日久城中食盡加以鋒鏑之餘死亡過半因令地方官賑窮乏掩胔骼其老弱之轉徙不能歸者遣將士分送安插逺近帖然初周昌往招輔臣時言昌母孫氏殉節死願以身報國為母請旌因請往至是奏旌其母又奏蠲秦省被兵及轉餉各州縣賦皆從之是月遣振武將軍佛尼勒敗賊將吳之茂于牡丹園又敗之于西和縣北山將軍穆占進攻樂門敗賊於紅崖復禮縣於是固原偽巡撫陳彭慶陽偽總兵周飬民嘉峪關偽總兵王好問關山偽副將孔蔭雄共率偽官九百餘員兵四萬八千餘名相繼降關隴悉平八月奉上諭圖海器識老成才猷練逹贊襄機務宣力纍朝以文武之長才兼忠愛之至性勞績茂著克副倚任朕心深為嘉悅於軍功議敘外應從優加恩以示朕眷注忠勤酬答勳庸至意遂晉封三等公世襲罔替時漢中興安賊猶據守平涼慶陽初定人心未寧奏請宜分兵防守諸隘緩攻漢興别遣一旅赴湖廣會𠞰吳逆奉旨令圖海親率精鋭以行圖海以陕西反側未安慮有變九月疏陳其狀聖祖因授穆占為都統佩征南將軍印率師赴楚留圖海鎮守陜西十二月議取漢中興安奏調緑旗兵檄提督孫思克赴秦州趙良棟赴鳯翔以將軍侯張勇將軍王進寶各引兵助之期以明年正月二十日如所約至下張勇等會議以聞勇等謂宜視夏秋收穫豐歉再圖進取圖海以漢興山路險峻夏秋多霪潦賊守益堅請如前奏十六年正月議上上慮克復漢興後宜設重兵轉餉不易若俟夏秋則頓師縻餉亦屬非計諭令守諸要隘分兵赴荆州會𠞰吳逆議遂寢三月招撫韓城等縣偽總兵喬斌以下官百有餘員四月遣兵進逼禮縣驛門先後敗賊於五盤山喬家山塘坊廟芭蕉園沙窩諸處復塔什堡是年九月賜服物並御製詩二章十七年二月奏請分兵兩路進取漢中興安旋奉密諭止之閏三月將軍佛尼勒等敗賊于牛頭山香泉四川總督周有德等敗賊於秦嶺復潼關堡五寨四月慶陽賊袁本秀受吳逆偽劄作亂圖海發慶陽宜君延安三營兵會王進寶兵討之斬本秀於衛逺溝餘衆潰散十二月疏請輕騎赴京面奏事宜許之十八年二月還陜五月賊犯棧道益門鎮各口奏請提督趙良棟進臨武寨相機而行俟擊破賊壘分道征進時湖廣廣西平聖祖諭亟殱寶雞之賊恢復漢興以平蜀地七月破益門鎮賊賊毁偏橋兵不得進疏其狀以聞聖祖以其怯懦易退嚴督之九月進取漢中興安分兵四路圖海親率將軍佛尼勒等由興安進總兵官程福亮為後援駐守舊縣關諸路將軍畢力克圖提督孫思克等由略陽進總兵官朱衣客為後援駐守西河諸路將軍王進寶總兵官費雅逹等由棧道進總兵官髙孟為後援駐守寶雞提督趙良棟由徽縣進尅日並發十月圖海師次鎮安縣分兵為二隊進攻偽總兵王遇隆于火神崖敗之渡乾玉河奪梁河關偽將軍韓晉卿遁入四川是月王進寶復漢中趙良棟復徽縣略陽畢力克圖復成縣又復階州降偽副將王光生以下官十九員兵三百六十名十一月復興安降偽將軍謝四偽總兵王永世以下官三百八十二員兵萬四千三百餘名平利紫陽石泉漢隂洵陽白河及湖廣竹山竹溪上津等縣皆下之是月畢力克圖遣參將康調元復文縣偽洮泯道王文衡降先是王進寶趙良棟捷奏先至聖祖以圖海畢力克圖等遲緩切責之至是捷聞得旨嘉奬下部議其功尋命率大軍之半駐守鳳翔十九年正月命赴漢中轉餉以濟蜀師九月陜西總督哈占由保寧江直上擊賊談宏命發兵為聲援以分賊勢是月獲姦民楊起隆初起隆於康熙十二年詐稱為朱三太子謀作亂於京師正黃旗周公直家奴陳益聚數十人於家將起應之公直首其事圖海即率兵圍之陳益等悉就縳至是并獲起隆送京師二十年正月賊犯四川敘州諸處調副都統翁愛率所部兵往援復奏請親行諭仍駐漢中防守秦蜀七月以疾還京尋具疏乞休聖祖慰留之十二月卒纍官至太子太傅中和殿大學士兼吏部尚書正黃旗都統封三等公世襲諡文襄賜祭葬如典禮明年太宗文皇帝實録告成以圖海曽充監修總裁官追贈少保仍兼太子太傅二十二年御製碑文立石墓道雍正二年加贈一等忠逹公配享太廟尋命建専祠復御製文刻石以旌之崇祀陜西名宦子諾敏襲爵見大臣表覺羅武默訥覺羅武默訥滿洲正黃旗人景祖翼皇帝第三兄索長阿之元孫也順治四年七月授雲騎尉職屢遇恩詔洊晉三等輕車都尉任二等侍衛康熙三年遷一等侍衛六年五月擢內大臣九年二月管佐領十六年四月命同侍衛費耀色塞護禮索鼐瞻視長白山諭曰長白山係本朝祖宗發祥之地爾等前赴吉林選取識路之人瞻視明白酌議行禮並巡視寧古塔等處可於大暑以前馳驛速往五月四日己卯武默訥發京師己丑至盛京辛卯東行戊戌抵吉林詢無知長白山路者得舊居額赫訥殷地獵户岱穆布魯言其父曽獵長白山麓負鹿歸道經三宿似離額赫訥殷不逺由吉林至額赫訥殷陸行十日舟行幾倍之於是寧古塔將軍巴海運米十七艘於額赫訥殷六月丁未武默訥等携三月糧與協領薩布素由陸行經溫德亨河庫哷訥嶺竒爾薩河布爾堪河納丹佛哷城輝發江法河卓隆鄂河抵訥殷江干米亦至乃乘小舟與薩布素分路行由訥殷江逆流上丙寅會於額赫訥殷一望深林無路薩布素領衆前行伐木開道遣人回告行三十里至一山頂緣木而望長白山乃在百餘里外片片白光見之甚明越二日戊辰武默訥前行次日遇薩布素於林中十七日壬申黎明雲霧迷漫莫辨山在何處忽聞鶴鳴六七聲尋聲前適遇鹿蹊循至山麓見一處周圍密林中平坦而圓有草無木前臨水林盡處有白樺木宛如栽植者於是移駐步林外仍迷霧無所見跪誦敕旨禮拜畢忽雲霧開散山歷厯分明有路可躋遙望山形長濶近觀則中圓平若臺基向所見白光積氷雪也山髙約百餘里頂有池五峯環繞臨水而立正南一峯稍低宛如門户池廣袤約三四十里上間處處有水由左流者為松花江右流者為大小訥殷河繞山皆平林武默訥等禮拜而下峯頭有鹿羣奔逸仆其七若有推墜者時上山七人方乏食乃謝山靈所賜退行二三十步倐然雲起癸酉回至前望處終不復見山光矣庚辰至恰庫河馬疲甚甲申自恰庫河乘舟回經色克騰圖伯赫噶爾漢噶逹渾薩滿薩克什法克什多琿諸河至松花江七月丁丑回吉林巡視寧古塔各地方八月乙丑還京疏聞諭曰長白山竒迹甚多山靈宜加封號永著祀典以昭國家茂膺神貺之意於是禮臣同內閣議上詔封長白山之神秩祀如五嶽十七年正月命武默訥齎敕往封嵗時望祭如典禮十九年召武默訥入養心殿命工繪其像以賜諭曰將此像給爾子孫世世供享以昭加恩之意二十九年卒賜祭葬如例欽定八旗通志卷一百四十九
