body:
  text: 欽定四庫全書欽定八旗通志卷一百四十九人物志二十九大臣傳十五滿洲正黄旗三坤遜逹哩費雅思哈根額參逹理善特卦喇黙訥圖喇沃内喀蘭圖圖海覺羅武費雅思哈費雅思哈滿洲正黄旗人姓富察佐領本科里之第三子也初任䕶軍校天聰六年太宗文皇帝親征察哈爾分兵略明大同至朔州城中兵出戰費雅思哈與㕘領道喇等奮擊敗之崇徳三年署䕶軍㕘領隨貝勒岳託征明入牆子嶺敗宻雲歩兵五年大軍圍錦州明兵自松山杏山赴援費雅思哈禦戰皆捷六年復圍錦州同㕘領哈寜阿擊敵城下射殪二人明總督洪承疇以歩隊自松山来犯費雅思哈力戰卻敵世祖章皇帝順治元年隨睿親王多爾衮入山海闗敗流賊李自成又追敗之望都是年冬授䕶軍叅領隨英親王阿濟格西𠞰自成明年春次榆林賊乗夜襲我營費雅思哈同䕶軍統領車爾布等擊之走窮追自成至武昌連破賊營復率舟師敗賊於富池口獲賊船三十三年隨肅親王豪格征流賊張獻忠過西安分兵剿賊邠州賊渠胡敬徳率衆千餘踞三水縣西北山岡費雅思哈同䕶軍統領噶逹渾破賊寨復同都統巴哈納擊敗叛鎮賀珍扵雞頭闗進師四川屢與獻忠賊黨戰斬獲無算正藍旗官軍為賊所困同噶逹渾趋援賊敗遁先是敘入闗功予世職騎都尉及獻忠滅加一雲騎尉六年隨英親王討大同叛鎮姜瓖掘壕圍城偽總兵楊振威率歩騎萬餘來犯費雅思哈先衆迎戰卻賊入城時賊黨分踞左衛復陷汾州窺太原費雅思哈先後率䕶軍𠞰賊所至克捷尋復㑹大軍圍大同賊勢蹙振威斬瓖首出降乃班師三遇恩詔晉世職至一等輕車都尉十三年擢䕶軍統領列議政大臣尋率兵赴湖南駐防時獻忠餘黨孫可望踞辰州費雅思哈同都統卓羅副都統泰什哈等由澧州常徳進征賊棄城遁縱火焚其船以阻我軍費雅思哈取其未及焚者以濟師攻發賊伏躡擊至瀘溪殱賊甚衆十八年隨定西将軍愛星阿𠞰明桂王朱由榔於緬甸緬人執由榔以獻聖祖仁皇帝康熙元年凱旋敘功晉爵三等男十一年五月卒賜祭𦵏如典禮謚僖恪子蘓丹襲爵别有傳額參額參滿洲正黄旗人姓吳雅父額伯根國初来歸額參初授膳房總領歴任内大臣崇德元年十二月從太宗文皇帝征朝鮮適朝鮮遣人致書于明額參遇而射之立斃詔嘉其能即以其人所乗馬賜之二年正月同額駙公揚古利率兵大破朝鮮于南漢城追入山敗卒伏崖間竊𤼵鳥鎗中揚古利歿尋有越山去者或言彼即傷揚額駙者也上命額參追之次日以其首来獻諭奨之三年隨睿親王多爾衮征明至山東克濟南臨清還攻大同均在事有功授世管佐領卒長子魏武官至䕶軍㕘領是為孝恭仁皇后之父雍正元年敕曰額栢根係本朝舊族創業名家在太祖髙皇帝時撫育禁庭視同子姪額參歴事三朝軍功懋著魏武天挺俊傑啟後承先厚德鍾靈篤生聖母宜加峻秩以協彞章俱著追封一等公即以魏武子博啟承襲並令世襲㒺替乾隆十八年博啟卒子栢永襲一等公二十三年以病解任子西銘襲一等公乾隆四十三年奉㫖向来后族承恩世襲俱係一等公此等特因椒房至戚恩澤加封以視佐命功臣櫛風沐雨拓土開疆者實難並論况宗室王公以近支恩封者尚以世次遞降而外戚轉得崇封延世未免過優着俱改為三等公世襲罔替于是西銘改三等公四十六年授䝉古正黄旗副都統四十八年授内大臣四十九年九月出使朝鮮五十年正月舉行千叟宴西銘未還京特命給賞七月授江寜将軍五十二年卒於任坤坤姓那木都魯先世居瓦爾喀之綏芬父伊訥克當太宗文皇帝征瓦爾喀時先衆迎降遂挈家来歸𨽻滿洲正黄旗天聰八年授雲騎尉世職尋卒坤襲之洊擢一等侍衛兼管佐領事崇徳六年從上征明錦州圍松山城明總兵曹變蛟集衆乗夜犯御營突衝正黄旗營門諸侍衛及親軍等皆散列門左右坤獨立門中力戰郤敵上嘉其勇敢賜號巴圖魯賚白金四百兩超晉一等輕車都尉世職世祖章皇帝順治二年敘錄太宗眷顧諸臣各予世職加坤一雲騎尉嗣屢遇恩詔晉爵一等男兼一雲騎尉十年上以坤嘗奉遣祭昭陵辭不徃扈蹕南臺不入直又擅娶賜配有屬之女子為妻下内大臣鰲拜等議罪應死籍沒詔從寛罷任仍留一等男爵尋復一等侍衛十一年隨靖南将軍珠瑪喇征廣東署都統事時流賊張獻忠餘黨李定國附明桂王朱由榔自廣西犯廣東㩀新㑹縣左之山峪坤率兵與諸軍合擊大破之追勦至横州江岸斬賊無算敘功加一雲騎尉十五年授散秩大臣尋擢内大臣聖祖仁皇帝康熙十二年諭奨乆著勞績諸大臣加坤太子太保是年冬逆藩吳三桂反明年九月詔以河南地廣兵少恐奸宄乗間竊發授坤振武将軍率兵駐防汝寜十二月陕西提督王輔臣叛扵寜羌踞秦州詔坤移兵赴西安十四年正月詔同副都統翁愛等進守漢中先是定西大将軍貝勒洞鄂由漢中進征保寧聞王輔臣叛還西安令将軍席卜臣等率兵二千守漢中至是輔臣糾叛黨毁鳯縣之偏橋阻我鑲運復截踞棧道斷漢中聲援坤以䟽聞諭趣開棧道以援漢中坤進次寳雞因道阻駐兵詔罷坤将軍任以内大臣留貝勒洞鄂軍供調遣六月大軍復秦州坤同将軍佛尼勒追𠞰賊衆連戰皆捷復禮縣清水伏羌西和等城時席卜臣等因漢中乏饟不能守率兵乗間還西安十七年詔趣大軍規復漢中以坤同副都統馬一豹等守潼闗十八年因坤年老召還京二十二年議政王大臣等追論坤奉命援漢中頓兵不進雖有勞績未足扺罪應罷黜官爵及加銜並削巴圖魯號上曰巴圖魯號太宗文皇帝所賜其勿削並留一等輕車都尉世職二十四年上念坤宣力有年雖軍中獲罪事非由己起授散秩大臣並諭以年已衰邁如不能入朝聴其家居二十五年卒賜祭𦵏如例孫顯圖襲世職遜逹哩遜逹哩姓魯布哩世居葉赫太祖髙皇帝取葉赫籍其人户分𨽻八旗遜逹哩𨽻正黄旗滿洲尋選充驍騎每隨征輒奮勇爭先中創不退屢得優賚太宗文皇帝崇徳三年隨睿親王多爾衮征明由青山口入邉越燕京轉戰至山東攻克濟南府城明年四月凱旋論先登功第一賜號巴圖魯予二等輕車都尉世職兼管佐領世祖章皇帝順治七年授兵部理事官八年遷䕶軍叅領三遇恩詔晉爵至二等男十二年擢正黄旗滿洲副都統十六年遷䕶軍統領先是流賊李自成竄死其黨散處楚蜀至是餘孽劉二虎郝摇旗李来亨袁宗第等猶聚匿歸州興山間聖祖仁皇帝康熙二年以都統穆哩瑪為靖西将軍都統圖海為定西将軍統八旗兵赴湖北㑹合陜西四川兵𠞰賊命遜逹哩領䕶軍以隨直抵茅麓山破賊巢二虎来亨自經死摇旗宗第就擒餘賊悉平乃班師十二年諭奨乆著勞績諸大臣加遜逹哩太子少傳十四年四月卒年七十有三賜祭𦵏如典禮謚果壮子杭書襲爵改𨽻鑲白旗逹理善逹理善滿洲正黄旗人姓那木都魯國初有綏芬路長明安圖巴顔之族岳蘇納者同族衆来歸逹理善其四世孫也崇徳三年以閒散𨽻驍騎營隨睿親王多爾衮征明越北京攻山東濟南府以雲梯先登第三克其城賜巴圖魯號授三等輕車都尉世職六年隨大軍圍錦州進擊明總督洪承疇援兵于松山杏山間連敗敵衆順治元年秋隨都統葉臣征山西攻克太原二年冬隨副都統珠瑪喇和託等駐防杭州先是明福王朱由崧就擒其大學士馬士英竄杭州總兵方國安守嚴州及大兵定杭州馬士英走依方國安糾衆来犯逹理善偕衆擊走之又屢敗之朱橋范村及餘杭臨安富陽五年隨大将軍譚泰赴江西𠞰叛鎮金聲桓復南昌七年九年三遇恩詔晉世職至一等輕車都尉又一雲騎尉十三年二月任叅領十五年隨信郡王多尼征雲南十六年明桂王朱由榔竄緬甸其舊将髙應鳯結元江土司那嵩負固抗拒逹理善與都統卓羅前鋒統領白爾赫圖等攻克元江城那嵩自焚死擒髙應鳯斬于軍康熙二年敘功晉爵三等男尋以老乞休十三年十二月陜西提督王輔臣叛于寧羌逹理善請徃軍前効力命署副都統率八旗每佐領下兵三名赴西安十四年二月由西安至隴州仙逸闗時輔臣留賊黨踞秦州自引兵退舊駐之平凉偽總兵髙鼎蔡元率馬歩賊四千自闗山河岸迎戰逹理善同前鋒統領穆占将軍佛尼勒等率兵進攻賊潰走追擊五十餘里復闗山闗三月復同穆占等自清水縣進距渭河橋二十里遇賊哨擊敗之乗勝奪橋抵秦州立營秦州賊二千出城衝突逹理善揮軍夹擊賊敗入城四月分兵攻東闗克之四川叛鎮吴之茂引賊萬餘援平凉逼秦州城結寨城内賊八千餘出應合犯我營逹理善時已病猶督兵力戰大破賊衆尋卒于軍賜祭𦵏如例謚曰武毅二十五年兵部彚敘陜西軍功以逹理善紀功二次例不晉職奏得㫖逹理善巴圖魯係告老解任之員後願隨征盡心効力著有勞績又病故行間殊為可憫不拘定例給一世職于是予雲騎尉合前三等男晉為二等男以其孫留占襲四十四年十二月留占任冠軍使兼一等侍衛因庸懦解退部議銷去恩詔所加職改一等輕車都尉另襲得㫖逹理善巴圖魯本有成勞致仕後復從軍効力免其銷去原職仍以留占之弟岱竒里襲二等男根特根特滿洲正黄旗人姓納喇父逹雅理國初来歸以軍功授騎都尉遞加一等輕車都尉卒以其孫逹漢泰襲根特初以閒散隨貝勒阿巴泰征明至山東攻泗水縣先登還攻定州先登敘功授騎都尉兼一雲騎尉世職賜巴圖魯號尋晉三等輕車都尉順治元年授刑部理事官五年三月隨征南大将軍譚泰征叛鎮金聲桓扵江西七月大兵薄南昌圍之未下根特由城南繼蒙古兵登城㧞之聲桓中二矢死生擒其黨王得仁江西平師還擢副都統兼管佐領七年九年兩遇恩詔晉世職為一等輕車都尉康熙十二年十一月逆藩吳三桂叛十三年正月命都統尼雅翰為鎮南将軍與兖州副都統瑪哈逹同赴安慶根特代駐兖州二月上以江西界福建廣東湖南為三省要地命根特偕副都統席布率兵速赴南昌三月江西廵撫董衛國䟽報湖南長沙失守江西袁州吉安二府與接壤請撥兵駐防得㫖著根特率現駐南昌兵徃相機𠞰禦尋命内大臣希爾根為定南将軍帥師赴江西根特叅賛軍務四月平南王尚可喜疏言吳逆遣賊二萬屯黄沙河叛鎮孫延齡欲與合請就近撥兵㑹𠞰孫逆分賊勢諭曰根特候希爾根等兵至江西即率所部官兵速赴廣東是月授平㓂将軍㑹逆藩耿精忠叛於福建詔根特由廣東仍返江西六月衛國䟽報叛弁柯昇勾閩賊竊㩀廣信諸處詔根特先定廣信冄偕前鋒統領舒恕由袁州進取長沙七月兩廣總督金光祖疏報廣西梧州失守諭曰根特等兵由袁州取長沙進廣西以襲賊後則取道廣東必致遲乆其與平南王尚可喜總督金光祖提督馬雄㑹同酌議添發官兵規取横州否則固守梧江諸處相機𠞰禦八月卒於軍二十二年賜祭𦵏如例子智宏襲世職卦喇卦喇滿洲正黄旗人姓伊爾根覺羅世居界藩國初来歸由前鋒校給世管佐領屢從征伐崇徳三年授兵部副理事官尋署副都統七年大軍征明至黄崖口卦喇偕都統譚泰從山右奪隘進圍薊州敗明總兵白廣恩等兵順治元年隨睿親王多爾衮入山海闗破流賊李自成二年敘功給騎都尉世職三遇恩詔遞加二等輕車都尉授副都統六年四月命偕叅領羅碩赴太原駐防時叛鎮姜瓖黨陷汾州諭固守太原卦喇于城南八十里立營偵賊攻清源縣偕羅碩分路奮擊斬首五千餘級餘衆潰走五月偽廵撫姜建勲擁衆犯太原卦喇等迎擊之斬級千餘賊立寨晉祠堡據險不退㑹端重親王博洛統兵至卦喇隨大軍破賊營斬萬餘級八月賊衆犯夀陽縣卦喇率兵援𠞰復大破之康熙十三年以老病乞休十五年卒子烏爾禪襲世職圖喇圖喇滿洲正黄旗人姓舒穆禄世居琿春初任兵部筆帖式太宗文皇帝崇徳七年隨饒餘貝勒阿巴泰征明山東攻泗水縣流矢中目戰愈力攻新泰等城奮勇争先世祖章皇帝順治元年隨豫親王多鐸征陜西二年復隨征江南七年擢兵部主事兩遇恩詔予騎都尉世職十二年擢兵部郎中十三年隨都統伊勒徳征舟山偽伯阮思率巨艦百餘拒戰圖喇與副都統根特撃敗之阮思復糾其黨陳六御張洪徳等合兵三萬餘犯我舟師圖喇與副都統柯永蓁連敗其衆圖喇中礮傷手足舟山既平敘功加一雲騎尉十八年山東土賊于七倡亂聖祖仁皇帝命圖喇同郎中察竒至棲霞逮鞫賊黨時于七㩀棲霞之岠嵎山其黨叚忠續林萬鵬龎應魁髙起英各擁衆數千分據鰲山潛結棲霞城中奸黨為内應圖喇邏獲賊諜二人詰之盡得賊情適靖東将軍濟什哈帥師抵莱陽圖喇遣使約濟什哈調緑旗兵七百疾馳至棲霞獲城中從賊者三百餘人遂趨鰲山忠續萬鵬等聞風遁擒賊黨六十餘獲牲畜以數百計尋偕察竒還京擢大理寺少卿康熙二年五月授駐防杭州副都統十月同總督趙廷臣至定海招降海賊鄭錦之偽静波将軍阮美及偽官一百二十餘員兵二千九百餘七年擢杭州将軍十三年三月逆藩耿精忠叛圖喇奉詔與總督李之芳提督塞伯哩率滿漢官兵相機防𠞰尋以都統賚塔為平南将軍赴衢州禦賊命圖喇駐守杭州兼防海疆六月䟽言杭州兵少請増兵協守詔移江南緑旗兵五千駐杭州又䟽請杭州増設防禦每旗各一員下部議如所請尋以病還京十月卒賜祭𦵏如例子德明襲職沃内沃内滿洲正黄旗人姓性佳世居貝歡山沁地祖福瑚太祖髙皇帝時来歸太宗文皇帝崇徳三年沃内隨睿親王多爾衮征明毁董家口邉墻進師越燕京攻定州沃内先登克城賜號巴圖魯予騎都尉兼一雲騎尉世職尋授叅領世祖章皇帝順治三年隨端重親王博洛征明唐王朱聿鍵師至福建其總兵姜正希率兵二萬迎戰沃内先衆擊敗之六年隨大軍討叛鎮姜瓖敗賊兵於寧武闗賊據左衛城以馬歩兵萬餘拒敵沃内率所部擊郤其衆復擊賊於遼州連戰皆捷還攻左衛城沃内乗頽垣先登克之敘功復遇恩詔晉世職至一等輕車都尉兼一雲騎尉聖祖仁皇帝康熙八年遷正黄旗滿洲副都統十二年擢盛京将軍奏請増設每旗防禦各一員得㫖允行十四年察哈爾布爾尼叛沃内以其事䟽報上命寜古塔将軍巴海同沃内固守盛京以信郡王鄂扎為撫逺大将軍統師徃討平之十七年上以沃内當布爾尼叛時未立軍功命解将軍任三十年卒賜祭𦵏如例以其孫赫英襲世職喀蘭圖子察琿喀蘭圖姓博爾濟吉特先世居克嚕倫地太宗文皇帝時隨其兄額爾格勒珠爾率屬来歸𨽻正黄旗䝉古尋授一等侍衛順治二年世祖章皇帝以喀蘭圖素荷太宗眷顧予騎都尉世職七年九年三遇恩詔晉世職至二等輕車都尉先是睿親王多爾衮請上幸其第喀蘭圖方退直聞扈從内大臣及侍衛等不及二十人即持弓矢趋至宻為防衛及睿親王獲罪上嘉喀蘭圖忠誠賚金帛鞍馬及屯荘改𨽻正黄旗滿洲晉世職一等後以扈駕行圍遲誤仍降二等輕車都尉十五年授散秩大臣尋擢内大臣聖祖仁皇帝康熙八年擢理藩院尚書九年奉命徃科爾沁烏珠穆沁等外藩盟㑹十年以老乞休上念其勞績素著允解任仍授為内大臣加太子太保十二年三月卒賜祭𦵏如例謚敏壮以其子察琿襲先是察琿已襲額爾格勒珠爾之騎都尉兼一雲騎尉世職至是合為三等男康熙十三年隨安親王岳樂討逆藩吳三桂至江西袁州擊賊鈐山岡賊将馬寳領衆萬餘列礮拒敵察琿力戰歿於陣議䘏追晉二等男賜祭𦵏如例無子以喀蘭圖弟之子恩克襲爵圖海圖海滿洲正黄旗人姓馬佳父穆哈逹世居綏芬圖海初由筆帖式加員外郎銜順治二年改國史院侍讀八年遷秘書院學士九年恩詔予騎都尉世職越嵗授宏文院大學士列議政大臣十二年加太子太保命攝刑部尚書事明年考滿加少保十五年命同大學士巴哈納等校訂律例旋以承審江南鄉試作弊事遲延削加銜明年侍衛阿拉那與公額爾克戴青家奴毆於市刑部審理失實上詰問圖海不以實對下廷臣察議以其負恩溺職論死奉㫖寛免削職十八年正月世祖龍馭上賔遺命起用聖祖仁皇帝御極即於是年授正黄旗滿洲都統康熙二年七月蜀流賊郝摇旗劉體純李来亨等嘯聚湖廣鄖襄山中命為定西将軍副靖西将軍都統穆里瑪率禁旅㑹楚蜀之師討之至則與總督李國英提督鄭蛟麟總兵俞奮起于大海署䕶軍統領根特等連營困之賊以兵三千犯奮起營圖海率兵邀擊敗之賊又連犯諸營各分兵夾擊咸潰敗未㡬郝摇旗為副都統杜敏擒斬於黄草坪劉體純亦相繼破滅惟李来亨擁衆據茅麓山恃險負固圖海等率兵圍之絶其聲援外則搜𠞰餘㓂畧盡賊勢窮蹙来亨闔門自經死偽公侯将軍以下偽官五百八十餘員兵八千八百餘名降執斬偽新樂王及偽官七人兵六十一人俘其家口三千餘衆而還六年晉宏文院大學士加世職為一等輕車都尉㑹纂修世祖章皇帝實錄充總裁官七年命測儀象八年命錄刑部重囚並稱㫖九年奏乞解機務専力戎行上慰留之十一年命清理刑獄十二年冬吳三桂叛十三年耿精忠亦叛聖祖以籌饟需才命攝户部尚書十四年三月䟽請勅禁外省軍需不得私派夫役不得先期拘集錢糧不得額外科歛詞訟重者速審速結小者不得濫准滋累衙蠧土豪不得魚肉善良奉㫖允行是月察哈爾布爾尼刼其父阿布奈以叛圖海奉命為副将軍同撫逺大将軍信郡王鄂札率師徃討四月師次逹祿布爾尼設伏山谷而以兵三千人来拒我師我師進攻伏發撓我土黙特兵圖海分兵迎擊賊以四百騎繼至力戰殱之布爾尼乃悉衆出用火噐拒戰圖海令嚴陣以待賊敗復聚連擊大破之招撫人户一千三百餘布爾尼僅以三十騎遁去時科爾沁額駙沙津以兵㑹𠞰遇布爾尼於扎魯特境追及斬之察哈爾平班師聖祖御南苑之大紅門迎勞之敘功晉一等男十五年二月聖祖以貝勒洞鄂攻叛将王輔臣於平凉未克命圖海為撫逺大将軍率䕶軍每佐領各二名赴陜總轄全省貝勒洞鄂以下咸聴節制三月至平凉明賞罰申約束軍威大振賊衆聞之懼諸将請乗勢攻城圖海曰仁義之師先招懐而後攻伐吾奉天威討兹凶豎無慮不克顧念城中數十萬生靈無非朝廷赤子遭賊刼持至此覆巢之下殺戮必多俟其向化歸誠以體聖主好生之徳不更美乎城中軍民聞者莫不感泣咸思自㧞以出賊勢由是日蹙五月奪虎山墩虎山墩者在平凉城北髙數十仭賊守以精兵通西北餉道圖海曰此平凉之咽喉也得此則餉道絶城不攻而下矣即率兵仰攻賊萬餘列火噐以死拒戰圖海令兵畨休迭進自己至午戰益奮斬偽總兵二人賊被殺及墜崖死者無算遂奪其墩據之俯視城中如在掌握因發大礮擊其城中營城中洶懼輔臣乃乞降隨以其情上聞詔赦輔臣罪撫慰之六月圖海劄授七品官周昌為叅議道賫詔入城翼日輔臣遣偽布政使龔榮遇等率士民獻軍民册又遣其子繼正等繳所受吳逆偽敕印劄然猶疑懼觀望圖海復令周昌同其兄子前鋒侍衛保定徃諭輔臣乃率衆薙髪降圖海令副都統吳丹入城撫定秋毫無所犯平凉被圍日乆城中食盡加以鋒鏑之餘死亡過半因令地方官賑窮乏掩胔骼其老弱之轉徙不能歸者遣将士分送安揷逺近帖然初周昌往招輔臣時言昌母孫氏殉節死願以身報國為母請旌因請往至是奏旌其母又奏蠲秦省被兵及轉饟各州縣賦皆從之是月遣振武将軍佛尼勒敗賊将吳之茂于牡丹園又敗之扵西和縣北山将軍穆占進攻樂門敗賊於紅崖復禮縣於是固原偽廵撫陳彭慶陽偽總兵周飬民嘉峪闗偽總兵王好問闗山偽副将孔䕃雄共率偽官九百餘員兵四萬八千餘名相繼降闗隴悉平八月奉上諭圖海器識老成才猷練逹賛襄機務宣力累朝以文武之長才兼忠愛之至性勞績茂著克副倚任朕心深為嘉悦於軍功議敘外應從優加恩以示朕眷注忠勤酬答勲庸至意遂晉封三等公世襲㒺替時漢中興安賊猶據守平凉慶陽初定人心未寜奏請宜分兵防守諸隘緩攻漢興别遣一旅赴湖廣㑹𠞰吳逆奉㫖令圖海親率精銳以行圖海以陕西反側未安慮有變九月䟽陳其狀聖祖因授穆占為都統佩征南将軍印率師赴楚留圖海鎮守陜西十二月議取漢中興安奏調緑旗兵檄提督孫思克赴秦州趙良棟赴鳯翔以将軍侯張勇将軍王進寳各引兵助之期以明年正月二十日如所約至下張勇等㑹議以聞勇等謂宜視夏秋收穫豐歉再圖進取圖海以漢興山路險峻夏秋多霪潦賊守益堅請如前奏十六年正月議上上慮克復漢興後宜設重兵轉饟不易若俟夏秋則頓師縻饟亦屬非計諭令守諸要隘分兵赴荆州㑹𠞰吳逆議遂寢三月招撫韓城等縣偽總兵喬斌以下官百有餘員四月遣兵進逼禮縣驛門先後敗賊於五盤山喬家山塘坊廟芭蕉園沙窩諸處復塔什堡是年九月賜服物並御製詩二章十七年二月奏請分兵兩路進取漢中興安旋奉宻諭止之閏三月将軍佛尼勒等敗賊扵牛頭山香泉四川總督周有徳等敗賊於秦嶺復潼闗堡五寨四月慶陽賊袁本秀受吳逆偽劄作亂圖海發慶陽宜君延安三營兵㑹王進寳兵討之斬本秀於衛逺溝餘衆潰散十二月䟽請輕騎赴京面奏事宜許之十八年二月還陜五月賊犯棧道益門鎮各口奏請提督趙良棟進臨武寨相機而行俟擊破賊壘分道征進時湖廣廣西平聖祖諭亟殱寳雞之賊恢復漢興以平蜀地七月破益門鎮賊賊毁偏橋兵不得進䟽其狀以聞聖祖以其怯懦易退嚴督之九月進取漢中興安分兵四路圖海親率将軍佛尼勒等由興安進總兵官程福亮為後援駐守舊縣闗諸路将軍畢力克圖提督孫思克等由畧陽進總兵官朱衣客為後援駐守西河諸路将軍王進寳總兵官費雅逹等由棧道進總兵官髙孟為後援駐守寳雞提督趙良棟由徽縣進尅日並發十月圖海師次鎮安縣分兵為二隊進攻偽總兵王遇隆扵火神崖敗之渡乾玉河奪梁河闗偽将軍韓晉卿遁入四川是月王進寳復漢中趙良棟復徽縣畧陽畢力克圖復成縣又復階州降偽副将王光生以下官十九員兵三百六十名十一月復興安降偽将軍謝四偽總兵王永世以下官三百八十二員兵萬四千三百餘名平利紫陽石泉漢隂洵陽白河及湖廣竹山竹溪上津等縣皆下之是月畢力克圖遣㕘将康調元復文縣偽洮泯道王文衡降先是王進寳趙良棟捷奏先至聖祖以圖海畢力克圖等遲緩切責之至是捷聞得㫖嘉奨下部議其功尋命率大軍之半駐守鳳翔十九年正月命赴漢中轉饟以濟蜀師九月陜西總督哈占由保寧江直上擊賊譚宏命發兵為聲援以分賊勢是月獲奸民楊起隆初起隆於康熙十二年詐稱為朱三太子謀作亂於京師正黄旗周公直家奴陳益聚數十人於家将起應之公直首其事圖海即率兵圍之陳益等悉就縳至是并獲起隆送京師二十年正月賊犯四川敘州諸處調副都統翁愛率所部兵往援復奏請親行諭仍駐漢中防守秦蜀七月以疾還京尋具䟽乞休聖祖慰留之十二月卒累官至太子太傅中和殿大學士兼吏部尚書正黄旗都統封三等公世襲諡文襄賜祭𦵏如典禮明年太宗文皇帝實錄告成以圖海曽充監修總裁官追贈少保仍兼太子太傅二十二年御製碑文立石墓道雍正二年加贈一等忠逹公配享太廟尋命建専祠復御製文刻石以旌之崇祀陜西名宦子諾敏襲爵見大臣表覺羅武黙訥覺羅武黙訥滿洲正黄旗人景祖翼皇帝第三兄索長阿之元孫也順治四年七月授雲騎尉職屢遇恩詔洊晉三等輕車都尉任二等侍衛康熙三年遷一等侍衛六年五月擢内大臣九年二月管佐領十六年四月命同侍衛費耀色塞䕶禮索鼐瞻視長白山諭曰長白山係本朝祖宗發祥之地爾等前赴吉林選取識路之人瞻視明白酌議行禮並廵視寜古塔等處可於大暑以前馳驛速往五月四日己夘武黙訥發京師己丑至盛京辛夘東行戊戌抵吉林詢無知長白山路者得舊居額赫訥殷地獵户岱穆布魯言其父曽獵長白山麓負鹿歸道經三宿似離額赫訥殷不逺由吉林至額赫訥殷陸行十日舟行㡬倍之於是寧古塔将軍巴海運米十七艘於額赫訥殷六月丁未武黙訥等携三月糧與協領薩布素由陸行經温徳亨河庫哷訥嶺竒爾薩河布爾堪河納丹佛哷城輝發江法河卓隆鄂河抵訥殷江干米亦至乃乗小舟與薩布素分路行由訥殷江逆流上丙寅㑹於額赫訥殷一望深林無路薩布素領衆前行伐木開道遣人回告行三十里至一山頂縁木而望長白山乃在百餘里外片片白光見之甚明越二日戊辰武黙訥前行次日遇薩布素於林中十七日壬申黎明雲霧迷漫莫辨山在何處忽聞鶴鳴六七聲尋聲前適遇鹿蹊循至山麓見一處周圍宻林中平坦而圓有草無木前臨水林盡處有白樺木宛如栽植者於是移駐歩林外仍迷霧無所見跪誦敕㫖禮拜畢忽雲霧開散山歴厯分明有路可躋遥望山形長濶近觀則中圓平若臺基向所見白光積氷雪也山髙約百餘里頂有池五峯環繞臨水而立正南一峯稍低宛如門户池廣袤約三四十里上間處處有水由左流者為松花江右流者為大小訥殷河繞山皆平林武黙訥等禮拜而下峯頭有鹿羣奔逸仆其七若有推墜者時上山七人方乏食乃謝山靈所賜退行二三十歩倐然雲起癸酉囬至前望處終不復見山光矣庚辰至恰庫河馬疲甚甲申自恰庫河乗舟回經色克騰圖伯赫噶爾漢噶逹渾薩滿薩克什法克什多琿諸河至松花江七月丁丑回吉林廵視寧古塔各地方八月乙丑還京䟽聞諭曰長白山竒蹟甚多山靈宜加封號永著祀典以昭國家茂膺神貺之意於是禮臣同内閣議上詔封長白山之神秩祀如五嶽十七年正月命武黙訥齎敕徃封嵗時望祭如典禮十九年召武黙訥入養心殿命工繪其像以賜諭曰将此像給爾子孫世世供享以昭加恩之意二十九年卒賜祭𦵏如例欽定八旗通志卷一百四十九
