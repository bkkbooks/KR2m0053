body:
  text: 人物志四十二大臣傳二十八滿洲正白旗七永貴烏爾登舒赫德烏爾登烏爾登滿洲正白旗人姓烏禮蘇父喀喇官至寧夏副都統雍正六年烏爾登由前鋒授藍翎侍衛洊授二等侍衛乾隆六年命御前行走五年授一等侍衛六年補公中佐領八年賞副都統銜赴北路軍營十一年還京授鑲黃旗蒙古副都統十二年遷護軍統領十三年四月派赴金川軍營七月由馬奈一路督戰奪賊卡四尋調赴卡撒攻克水碉三層碉雙碉等處及二道山梁十二月經略大學士傅恆抵軍營令烏爾登還馬奈駐守十四年金川平還京十六年奉旨督察平糶事宜十八年命赴北路軍營授恭贊大臣駐防烏里雅蘇台十九年正月以扎哈沁宰桑禡木特等闌入卡倫烏爾登偕喀爾喀副都統策登扎卜率兵五百與恭贊大臣努三等分路查緝總辦卡倫事務九月恭贊大臣薩喇爾往收烏梁海烏爾登由索郭克接應俘獲甚衆事聞奉旨優敘給一等功牌二十年二月隨大軍進𠞰凖噶爾先是上以烏爾登等查緝扎哈沁事竣並不往擒逃犯巴朗又匿所獲烏梁海牲畜諭班第訊問至是諭曰班第奏訊問烏爾登供詞一切推諉俱卸過於薩喇爾一人夫薩喇爾歸順未久前收獲烏梁海人衆即有搶虜以伊舊染凖夷習俗初降未知法度是以姑為寬容若烏爾登等乃滿洲世僕亦效凖夷之所為是尚可宥乎且烏爾登於收服烏梁海時未將逃人巴爾報出殊屬舛謬又將現有牲畜等物開單呈報伊在軍營已三四年何能將厯年所有一一登記顯係得信隱匿少開數目希圖卸罪著班第等徹底嚴查毋得任其狡飾四月鞫實擬斬監候得旨烏爾登前不往擒巴朗實屬貽誤軍機罪不可逭但念收服扎哈沁烏梁海時伊曾隨同效力著加恩免其治罪仍留軍營以間散效力贖罪五月授三等侍衛九月授二等侍衛命選厄魯特宰桑厄爾錐音等兵赴伊犁沿途𠞰賊授一等侍衛十二月諭曰此次烏爾登帶領厄魯特宰桑等往西路軍營行走奮勉著加恩賞給副都統銜在領隊大臣上行走現在進兵𠞰滅阿巴噶斯哈丹等遊牧即著領兵前往二十一年三月叛賊阿睦爾撒納竄哈薩克定西將軍䇿楞遣烏爾登以兵一千隨恭贊大臣玉保追之會玉保誤信布庫努特逃人言賊勢窮蹙無煩大軍深入遽引兵還烏爾登追至庫隴癸嶺獲賊黨額琳沁亦還阿睦爾撒納脫走上訓飭之七月逹爾黨阿代䇿楞為將軍偵哈薩克伏山谷中烏爾登以百騎誘之出大軍逆擊大敗之時議策楞玉保等疏縱阿睦爾撒納罪烏爾登以領隊大臣同在軍營革職鎖拿來京上面詰之烏爾登奏臣前聞逆賊逃信即請發兵五百追擒玉保策楞俱謂臣僥幸不允後隨玉保前進復請追拿玉保止發兵五十名至庫隴癸嶺僅餘二十八駝又疲乏逆賊已於臣起行日過嶺竄哈薩克上以其言詢原參贊大臣扎拉豐阿屬實詔授三等侍衛在乾清門行走尋命仍赴軍營二十二年六月叛賊扎那噶爾布尼瑪等自額林哈畢爾噶遁哈什河烏爾登偕侍衛瑪瑺襲擊敗之擒其黨美諾和什二十三年三月隨副將軍富德擒扎哈沁得木齊哈勒拜等五月定邉將軍兆惠招降布魯特部頭目圖魯啓拜烏爾登奉檄由株木罕至圖固斯塔老宣讀恩旨皆乞降禡木特呼里比因請遣弟舍爾伯克入覲許之烏爾登即伴送來京二十四年三月擢一等侍衛諭曰現在大軍搜捕嗎哈沁并堵截逆回霍集占逃路烏爾登著授恭贊大臣與喀爾喀郡王車木楚克扎布為一隊互相策應六月授正藍旗蒙古副都統十月以捕嗎哈沁不力革恭贊在領隊大臣上行走二十五年凱旋賚幣二十八年遷護軍統領三十年敘護送逹什逹瓦屬衆至伊犁及由烏里雅蘇台解送伊犁孳生牛羊俱辦理妥協加一級三十一年擢鑲黃旗蒙古都統三十三年授左翼前鋒統領兼管火器營三十五年二月管健鋭營尋授散秩大臣十二月卒舒赫德舒赫德滿洲正白旗人祖徐元夢禮部侍郎加尚書銜諡文定有傳雍正六年舒赫德由筆帖式授內閣中書十年遷侍讀十三年遷監察御史在軍機處行走乾隆元年七月四川巡撫王士俊密疏四事上閲疏內有近日條陳惟在翻駁前案語發王大臣等閲看舒赫德因劾士俊妄發狂論請明正其罪詔逮問治罪二年八月奏八旗生齒日繁盛京黑龍江寧古塔三省土沃可墾若將八旗間散分居三省則京城既多徑旅而根本重地更添丁壯請敕三省將軍勘所屬可墾若干畝可駐兵若干酌定人數按户攤給並請照舊例設公庫各省稅務歸併旗員旗地典於民者贖還現存公中收租地分賞無地之家以十年為期次第舉行部議如所請諭曰舒赫德條奏將各省稅務歸併旗員管理甚無識見彼意以為旗人生計艱難若管理稅務則可沾餘潤以資飬贍不知國家設立關隘原以稽察姦宄利益商民並非為收稅之員身家計也朕日以砥勵亷隅訓勉臣工尚恐其不能遵奉而可以謀利之見為之導乎况當日旗員管理關務者亦指不勝屈惟視此以為利藪故貪黷之風侵蝕之弊不一而足因而身罹重譴籍其家産纍及子孫是今日旗員之貧乏未必不由於當日收稅之所致也豈可使之復蹈前轍且各省委辦稅務率多道府等官並無滿漢之别如滿洲有任道府而亷潔自愛者何嘗不可派委而必定以為例乎總之為上者施逮下之仁惟勵以忠勤示以節儉固其根本之圖為下者當早作夜思宣力供職以永受國家惠飬之恩方可謂之計長久蓋厚其生計之道不可不思而長貪風以為惠下則利未見其為利且貽害於後日此理甚明非所以教旗員之道亦並非所以愛旗員之心也初雍正年間京師設官米局收買八旗兵米存貯平糶後議裁市民買米囤積弋利價日昻舒赫德奏請復設從之三年五月遷內閣侍讀學士四年七月擢副都御史十月奏請秋審緩決五次以上者分别減等發落從之十二月遷兵部侍郎六年三月兼辦步軍統領事務十月條奏八旗三營事宜一內城九門外城五門設銅鐵炮一千九百餘請令工部兵部擇可用者分置各城殘缺者修整八旗演炮時載往蘆溝橋驗放一步軍營向無帳房披甲等巡邏修道遇嚴寒雨雪侵膚請每旗滿洲給帳房二十蒙古漢軍各十一三營盔甲旗幟年久敝壞應酌留朋扣銀修整每營設鳥鎗百帳房八十一內外營馬草料俱有定價惟三營草豆每月由五城司坊官開時價報户部户部始行支放兵丁先期稱貸拮據應核實每馬月給銀二兩五錢户部按月支放七年六月奏言八旗捕盜步軍校滿洲三員蒙古漢軍各一員輪流值月遇盜案與本旗副尉一體議處一旗地方遼濶一人值月不能遍及雖有議處之條實無弭盜之益請分滿洲旗為三捕盜步軍校三員分管蒙古漢軍捕盜步軍校各一員各管本旗地方以専責成均下部議行十二年五月調户部侍郎十三年四月兼理兵部授正黃旗漢軍都統九月調鑲紅旗漢軍都統軍機處行走七月充會典館總裁授兵部尚書尋調户部管理三庫十二月赴四川軍營疏言沿途驛遞絡繹蒙聖諭酌設筆帖式領催兼司站務而正腰各站經管知縣仍委之書役恐多遲誤請再派筆帖式領催駐站親行遞送從之時大學士傅恆經略金川軍務十四年正月命舒赫德為恭贊加太子太保師旋留辦軍需奏言督撫咨商皆要務所設驛站應嚴考核請飭各督撫將省會相接之衝驛未設専員及逺近不接向無驛站之處如何接續抽設酌限日行里數定為章程報部存案其接連外國要隘亦酌設驛站俾重務不致稽阻下部議行軍需奏銷蕆事命往雲貴湖廣河南查閲營伍軍裝並勘雲南金沙江運銅水道六月奏勘金沙江自新開灘上至黃沙坪銅運無阻其上逰四十餘灘多險蜈蚣嶺等十五灘危險異常仍須陸運總督張允隨奏報一律開通請交部嚴議所糜帑八萬餘兩著原辦人賠補詔免察議上遊糜費銀準將下遊節省銀抵補其不足者令張允隨及承辦各員分賠時古州鎮總兵哈尚德因放水請移建城垣上以城工未便輕遷敕舒赫德相度議奏九月覆奏古州上通都勻下接黎平城西有山水三穿城逹江江水倒漾山水為所阻不能由㴠洞宣泄屢致水患擬於城外掘溝引水入溶江其傍南一水去江較逺仍由冰洞入城將城內行水溝掘寬建石閘隨時啓閉可免水患無庸移城得旨如所議行十月調兵部尚書十五年六月奏言定例額兵百名內扣名糧二分充營中公用奈繕治軍械巡防路費多不敷該管官每借支存公銀給兵於領餉時按名坐扣餘餉不敷飬贍似應酌給公費查東南山多馳驟難施馬兵可稍減西北馬兵十居八亦可酌裁藤牌兵全無實用請敕督撫提鎮各就營伍情形酌議將公費名糧於馬兵藤牌兵內扣出舊例每百名二分之外請加增數分以偹公用廷議允行十二月赴浙江會勘海塘十六年四月命會勘永定河七工下口十月會審杭州將軍覺羅額爾登婪賘案鞫實解宗人府治罪十七年正月偕侍郎玉保赴北路軍營防範凖噶爾十八年七月以逹瓦齊戕喇嘛逹爾扎自立凖夷內亂徹防守兵詔舒赫德回京九月命馳往銅山辦理黃河決口尋疏言正河斷溜淤墊俟水落挑河引溜進掃期冬末竣工至洪湖漲溢工多汕刷督官兵搶護將下遊之舊南關白家墩等壩王營減壩開放決范公堤數處以資暢泄奏入報聞又奏言洪湖磚工不能經久惟石工為有益查江南之洞庭龍潭等山場及山東嶧縣之花山産石料并近水次易運分咨兩省採辦於明嵗二月到工請簡熟諳工程大臣帶工員來江辦理上命侍郎嵇璜德爾敏往涖其事十二月奏張家馬路及二閘漫口合龍大溜復歸故道得旨下部優敘加二級時都爾伯特台吉策凌烏巴什等率衆投誠凖噶爾宰桑瑪木特追之闌入北路卡倫旋逸出上命舒赫德赴鄂爾昆軍營先是有旨令將軍大臣等與薩喇勒查拿瑚圖克等之便招諭凖噶爾烏梁海十九年正月舒赫德奏報恭贊達青阿誘擒瑪木特薩喇勒擒獲烏梁海得木齊扎木恭瑚圖克等疏至諭曰舒赫德等奏凖噶爾逹瓦齊復作台吉烏梁海不願歸順已令薩喇勒暫住卓克索地方宣揚兵勢另籌辦理等語竟未喻辦理此事之旨前令將烏梁海收降招服者非因達瓦齊訥默庫濟爾噶爾彼此搆釁乘亂而始辦也特因烏梁海追逐䇿凌直入我卡倫若不懲治必致肆意妄行是以令於此時或許歸降或行驅逐一經辦定於地方長久有益原與達瓦齊之復作台吉與否全無關涉朕曽降旨軍營將軍大臣毋得偏執己見致令薩喇勒辦理周章今觀此奏豈非故掣其肘乎若謂薩喇勒馬力疲乏即令其在駐劄處暫為休息未始不可達瓦齊復作台吉之處何必齒及此尤朕所不解也再瑪木特已經釋放伊若感恩自必來歸如不歸誠必將此事告知伊台吉其台吉豈肯晏然即已勢必遣使前來索取逃人策凌等彼時非發兵征討更無善策在舒赫德等以為既將瑪木特釋放若扎木恭等亦照此釋放便可無事獨不思堂堂天朝有如是辦理之法乎今凖夷正值力弱舒赫德尚如此畏怯若遇彼猖獗時伊等不過收入喀爾喀一籌莫展而已俟烏梁海辦竣之後瑪木特若不來歸亦必一律辦理今應如何防範瑪木特之處亦宜預為留心此時惟遵朕屢次所降諭旨飭諭薩喇勒悉心妥辦舒赫德倘再行從中阻撓決不寬恕其罪三月奏凖噶爾烏梁海已逺徙俄羅斯界投誠之策凌等暫在推河拜達里克庫爾竒勒等處種地遊牧詔回京面領諭旨仍赴軍營四月諭曰舒赫德此次差往軍營辦理一切舛謬從前行文凖噶爾達瓦齊一事自應奏聞請旨遵行乃一面具奏一面即行擅發甚屬錯誤曾將應行察議之處暫令存記今令舒赫德等查奏原任貝勒額林沁公格勒克巴木丕勒未至調遣地方一案伊等公然為之奏請寬免此等奉調遲誤之罪軍務攸關豈得因其曽效微勞即從寬宥乎况此原係伊等應行查恭之事乃並未恭奏已屬寬縱及朕諭令查奏復敢巧為開脫舛謬已極著交部將伊前次存記之案一併嚴察議奏部議革職得旨舒赫德著將從前所有加級紀録盡行銷去從寬免其革職七月輝特台吉阿睦爾撒納來歸舒赫德與定邉副將軍策楞疏將阿睦爾撒納等大台吉留軍營候旨眷屬移住蘇尼特上斥其辦理錯謬諭將阿睦爾撒納等妻子撤回令會集一處在烏里雅蘇台附近遊牧居住復諭曰舒赫德自去年命往北路軍營所辦諸事動輒乖張其查拿瑪木特擅入卡倫一案有凖噶爾扎那噶爾布差人投書詢問舒赫德並不奏聞請旨竟擅自致書達瓦齊其舉動冒昧實出意外朕彼時降旨嚴行申飭及來京時面加訓諭伊亦自知錯謬因末行治罪嗣因策凌烏巴什歸誠知凖噶爾篡奪相仍人心離散實有可乘之機特命策楞為定邉左副將軍並令舒赫德協同辦理舒赫德在熱河面領訓誨指授極為詳明伊二人自到軍營畏葸猜疑毫無籌畫凡所部署事事不合機宜即如阿睦爾撒納等窮蹙來歸尚未接見即議令將兵壯屯駐軍營同來眷屬悉移置於戈璧之南相距數千里使其父母妻子分析離居此豈在天理人情之內在阿睦爾撒納等甫經歸命焉知天朝將伊等分遣安插究屬何意斷不能不生疑畏且並不候旨竟稱一面奏聞一面辦理此何等重大事而率意妄行乃爾耶至阿睦爾撒納稱有德濟特台吉率衆一千户亦傾心向化因為水所阻又阿睦爾撒納胞兄及其親子為瑪木特所拘並求給與口糧馬匹前往救應接取成衮扎布薩喇勒努三俱以為可行而策楞舒赫德悉堅執不允薩喇勒係熟悉彼處情形之人既以為可行伊二人必欲執拗不知其出何肺腑方今凖夷疊遭內亂所屬部落叩關內附者接踵而至此正可以大示懷柔永綏邉境之時策楞舒赫德身膺重寄何顛倒舛謬至於此極蓋舒赫德因朕有十月間令伊進京之旨遂一切茍且辦理其不肯接濟阿睦爾撒納者恐致遷延不得歸家之故又自以同列大臣才具大率與彼相若而伊親信已久即辦事不當不過申飭議處未有可代其任者國家簡用大臣寄以専閫重任而乖張僨事如此實為深負朕恩舒赫德著革職以間散在參贊上效力贖罪家産俱著籍沒其子舒常著革職發往黑龍江披甲在京諸子著拿交刑部以為大員負恩者戒旋赴鄂爾昆塔米爾等處經理阿睦爾撒納等遊牧二十年正月命以章京銜協理烏里雅蘇台事務二十一年給副都統銜九月巡臺站至努克木倫沿途查拿掠馬之厄魯特護送運往軍營口糧牲隻至額爾齊斯有掠臺站之烏梁海竄俄羅斯向之索取奏至上嘉其辦理尚合機宜令來京補正紅旗漢軍副都統子舒常並授三等侍衛二十二年二月授兵部尚書兼鑲黃旗漢軍都統赴巴里坤恭贊軍務七月因奏防範沙喇斯遊牧內移上以舒赫德藉作歸計訓飭之十二月諭曰從前舒赫德在軍營時屢獲重譴朕皆曲為寬宥因今春西師兩路進𠞰不得其人將伊喚回加恩起用凡一切機宜朕俱詳晰面諭切囑不可復行退縮令其到軍營時傳諭將軍成衮扎布善為協同辦理詎意舒赫德到軍營進兵以來所辦諸事俱不奮勉將軍成衮扎布本係蒙古伊雖經厯戰陳之事然未面領訓諭則舒赫德理應盡心相助乃伊等此次所辦之事違失機宜甚多即如伊等進兵時既將克勒特烏魯特等遊牧招服即當將馬匹收取以益我兵力使賊無所施其叛逆伎倆方得制禦之道伊等方且諭彼避入山中以為恐被我軍作躪致使賊有餘力俟我兵既過即行叛去以此一端而論即可見其諸事全無成算及朕降旨責諭方且東遮西露往來道路以致疲馬力於無用之地此皆舒赫德並不將朕諭旨詳晰曉諭將軍成衮扎布之所致也蓋兵法忌怯弱而舒赫德選懦性成兵法忌諱飾而舒赫德最工文過合計伊前後罪譴即正以典刑亦不足蔽辜但西路進兵以來事雖未能就緒尚無挫軍威而損國體之處若即將伊正法伊反得諉過於將軍成衮扎布矣朕念成衮扎布去嵗擒叛賊青滚雜布之功看伊顔靣貰舒赫德以不死然其不足復用所為下愚不移亦屢試而知之矣舒赫德著加恩免死革職令為兵丁在軍營自偹資斧效力贖罪再伊子舒常亦因加恩舒赫德復授為侍衛遣往軍營今舒赫德既經革職舒常著仍革退侍衛發黑龍江二十三年諭給舒赫德頭等侍衛銜駐防阿克蘇十月將軍兆惠追𠞰逆回霍集占罙入被圍命定邉右副將軍富德往援授舒赫德恭贊大臣舒赫德以阿克蘇通葉爾羌喀什噶爾要隘設卡倫令回人辦納糧米上嘉之授副都統旋擢吏部侍郎遷工部尚書鑲紅旗滿洲都統賜戴孔雀翎十二月簡阿克蘇鋭卒并諸路兵先至者馳援兆惠軍二十四年正月與富德合軍至呼爾璊賊騎五千餘迎戰擊敗之轉戰五日四夜戮賊千餘會恭贊大臣公阿里衮督解馬亦至乘夜呼突斫陳賊大潰兆惠聞鎗炮聲知援至夾擊逆酋布拉呢敦脅中鎗舁入城遁喀什噶爾時恭贊大臣巴祿阿桂在巴爾楚克亦悉精鋭往軍營策應捷聞得旨嘉奬七月舒赫德移駐葉爾羌命阿桂駐阿克蘇辦事嗣以阿桂護送屯田回人赴伊犁巡查邉徼舒赫德仍駐阿克蘇先後奏定回城賦稅臺站酌設伯克阿克蘇鼓鑄騰格以四分存公六分散給回人阿克蘇庫車哈喇沙爾烏什和闐設筆帖式専理回務派陜甘同知通判管糧餉牧羣差務分駐侍衛三年更代均得旨議行二十六年命圖形紫光閣御製贊曰屢授重寄亦屢左遷厲厥意懦策厥材賢白衣白水聞黑水信安衆進援爵秩重晉二十七年十二月諭於戶部飯銀內每年賞銀五百兩二十八年五月充經筵講官兼署工部尚書步軍統領加太子太保二十九年命與侍郎裘曰修往訊福建提督黃仕簡恭奏厦門洋行陋規案因所辦未得領要奉諭旨指示覆審督撫無收受陋規事惟屬員代購物件屬實詔解總督楊廷璋任巡撫定長從寬留任道府同知落職治罪有差詳見楊廷璋傳三十年正月暫兼管户部事務充國史館副總裁三十一年二月署陜甘總督時議修西寧鞏昌所屬縣及嘉峪關外燉煌玉門巴里坤城舒赫德奏定章程四條一估計工假立標簽以便勘驗一舊坍卸料物分别應用一工員依限程工督辦總辦各員不時嚴催一在工佐雜分假經理聼督工大員稽察分别勸懲詔如所議又奏言甘肅賑務緊要部撥城工銀經過多係災區請令州縣就近截領給賑藩庫另撥項給辦城工免稽遲而省運費復撥兵先往穆壘耕作備次年送到民户口糧籽種之需其各省發遣新疆人犯奏準伊犁三人烏嚕木齊一人周流派撥七月署户部尚書三十二年二月充三通館副總裁十月命偕侍郎邁拉遜往審湖南桃源縣生員林鳳鳴控知縣狄如煥及湖北棗陽縣監生張舒控知縣永福藉差苛派二案均鞫虛抵罪如律因奏雲南大兵不日凱旋各站額設夫馬外應添若干請動司庫銀發給各屬専雇夫馬至站差竣核銷如有不敷按糧均派毋許私行攢湊銀錢以息浮言而杜姦弊三十三年正月暫署步軍統領二月授恭贊大臣命赴滇與阿里衮鄂寧籌辦軍務進𠞰緬匪旋以密奏籌辦情形有設法招致投誠語諭曰昨舒赫德鄂寧密陳籌辦情形一摺甚屬乖謬內如計算進兵馬匹一事拘泥成數每兵千名應給馬三千九百通計需馬十萬餘匹其説甚誕試問前者平定凖夷回部豈此么髍可比然用馬何嘗至如許之多即康熙年間征𠞰吳逆滇黔一帶未始不調集兵衆亦不聞辦馬竭蹶若此滇省籌辦糧馬原不無少有拮據朕新正閲鄂寧奏摺即已洞鑒所以密諭舒赫德往辦此事并屢諭該督撫從長計議乃舒赫德一到滇省即張皇其詞匆忙入告有似滇省之事朕總不知藉彼奏而朕始悉其端委者然有是理乎至摺內稱設法招致緬匪投誠所見尤屬荒唐無耻逈非情理所應有進𠞰緬匪一事朕初無必欲辦理之意屢降諭旨甚明因楊應琚措置乖張其勢難以中止遂令明瑞往蕆其事明瑞統兵罙入督率將士擊斬披靡獨以額勒登額逗遛僨事屢促赴援喪心不顧以致賊匪抄出前路窺伺大營明瑞自率扎拉豐阿觀音保等殿後擁護秉志堅貞預存不肯中道輕還之意是以親冒鋒鏑寧為臨陳捐軀陸續回營辨士所損不及十之一二此軍行實在情事莫不共見共聞至現在籌辦機宜原欲從長審慎並無急於為掃穴殱渠之計第將軍參贊既勤事效節誼難置之不問而國體所係應行應止亦當隨時制宜如機有可乘則整兵繕邉厚集繼進無妨稍需時日使將來果不必辦理朕即明降諭旨暫行撤兵中外聞之孰不以為光明正大若如舒赫德所奏乃漢唐宋明庸懦無能之君臣所為我堂堂大清勢當全盛簡卒偫糧殄此醜類於力有何不給而肯效掩耳盜鈴恬不為耻耶且緬甸每以詐降為狡獪長技楊應琚等已屢受其愚即此事賊衆自知得罪天朝懼干申討或有遣人乞降之信尚當嚴加拒斥責令凶酋束身歸命或遣大頭目賫表輸誠庶可允其代奏朕亦屢經諭及舒赫德在京早熟聞之即起程前朕慮其偏於將就完局曾面加訓誡伊亦自以更厯已久必不敢再致荒唐為對何一離朕前竟爾自相剌謬至是幸而當今綱紀肅清一切皆稟承朕旨伊等欲為此鄙謬之舉尚不敢不先行入告朕得及時飭駁急令停止朝廷一舉一動皆臣民耳目所屬何所庸其粉飾况軍國重務豈可自欺欺人設無知之徒聞有此奏疑朕授意舒赫德所為無論朕不肯受且朕何如主若如此等事稍有遊移則前此底定西陲何以克奏膚功於二萬餘里之外哉舒赫德向在左右承朕指示調度辦事尚能妥協一行奉差輒難専任此次所奏竟爾復蹈故轍著交部嚴加議處部議革職並革雲騎尉世職命給都統銜授恭贊大臣赴烏什辦事三十六年土爾扈特汗渥巴錫台吉策伯克多爾濟並各鄂拓克台吉烏巴什舍楞等全部歸順命往伊犁經理撫輯尋授伊犁將軍舒赫德遵旨籌辦安泛設偵飬贍撫綏應行入覲之台吉大頭目驛送入京查明部落户口安置伊犁其餘部衆俱量擇善地分編以居俾烏嚕木齊塔爾巴哈台兩處大臣就近統理事聞上嘉之十一月授户部尚書先是定議移西安滿洲兵二千駐防巴里坤居西城原任緑旗兵移東城三十七年五月舒赫德會同總督文綬奏言西北城地窪積水滿漢官兵商民同居城狹人衆勘於東門外半里許建滿城一座官署兵房四千八百間地近屯田泉甘土渥使兩城形勢聨絡廷議允行九月奏言沙拉博山鉛厰以廢員委辦而厰中所撥遣犯恐聚集滋事請令屯田官一員總理撥屯兵四十供驅策遣犯百名一半開礦一半輪流種地官給牛種耕具官員三年議敘遣犯分别減年即準為民從之是月授領侍衛內大臣三十八年二月子舒常責斃家人二名特諭改發伊犁交舒赫德嚴行管束三月御賜詩曰伊犁萬里撫軍民不比堂亷取旨頻此豈僅為保障寄因之特用老成人固思舊侣歡常聚其奈嚴疆倚獨諄食少事煩正何礙如斯我亦倍精神四月加太子太保七月晉武英殿大學士兼管刑部事務充國史館四庫全書館清字經館總裁正白旗滿洲都統十月賜黑狐端罩總理吏部及户部三庫事務仍兼刑部如初以原銜充經筵講官三十九年三月兼翰林院掌院學士九月命往江南籌辦黃河老壩口堤工因夀張姦民王倫假邪教紏衆據臨清舊城命先赴山東偕額駙拉旺多爾濟左都御史阿思哈及巡撫徐績擒𠞰分兵三路舒赫德與拉旺多爾濟自德州進阿思哈由髙唐州赴梁家淺會合巡撫徐績進直𨽻總督周元理由故城進會兵至臨清賊退踞廢城土岡阿思哈徐績率兵掩擊斬戮數十人賊竄入城副都統伍什布侍衛伊琳等入城殱戮侍衛音濟圖春寧擊賊於塔灣舒赫德拉旺多爾濟赴舊城東南隅與阿思哈徐績兵合令委署翼長保倫等進舊城搜𠞰薄暮列兵上城周圍巡警令侍衛納穆扎在北門衝要堵賊去路殱賊數百生擒百餘村民俱縛賊來獻王倫自焚死有名賊目孟燦梵偉等俱檻解伏誅舒赫德疏陳善後事宜一賊平示諭良民歸里酌給口糧資送一舊城民房被燬酌給貧民修費一難民回籍寒冬難傭工覔食照被災極貧例給四月口糧一城外村莊焚掠一空本年錢糧請緩至明秋起徴漕米及民借倉榖麥本等項緩至明秋分兩年帶徴附近州縣俱照此辦理一首逆及有名賊目房地入官變價入於本案動用一民間牛馬被掠請動帑買牛五百頭聼小民領用一年後將原價交官歸欵十一月敘功加三級賜御用貂尾冠黑狐褂諭曰大學士舒赫德辦理山東逆匪王倫一案迅速𠞰除安輯良善經理諸務俱能竭盡心力動合機宜深可嘉尚著加恩授為御前大臣賞戴雙眼孔雀翎其從前所得雲騎尉世職仍著賞給四十年五月教習庶吉士四十一年二月金川平命繪入前五十功臣御製贊曰土爾扈特安集邉城命入綸閣速定臨清金川之役未悉端委書旨承行時亦贊理三月奏山東民李承納呈控丁元明鑽通伊子舒寧奪開煤窑承納轉托贊善王燕緒關説現將舒寧拿交刑部諭曰舒寧先因獲罪發往交伊父舒赫德管束嗣復加恩準帶回京乃竟怙惡不悛敢與人交往圖利玷辱伊父顔面實屬敗類適王燕緒隨駕在此因命軍機大臣及侍郎和珅巡撫楊景素會同詢問舒寧與丁元明夥開煤窑竟屬實有其事舒寧係大學士之子本不應交涉外事即或丁元明原係山主應行開採之人亦非舒寧所當干預若其理曲情虛恃有舒寧之勢爭占他人窑座則舒寧之罪更重如審訊得實其人豈可復留今兩造具在一經研訊無難水落石出至舒赫德自請治罪之處尚可從寬舒寧之生事不法非伊意料所及且於接呈之後愧憤惶悚即將伊子拿送刑部據實具奏所辦尚是設舒赫德敢於容隱别經發覺則其首領亦不能保但不能管教伊子咎有應得著交都察院嚴加議處旋議革任詔免舒寧發伊犁充當苦差交舒赫德自加責處再行發往李承納圖占煤窑營謀架控罪亦如之七月充文淵閣領閣事四十二年充蒙古源流臨清紀略正總裁四月卒諭曰大學士舒赫德老成端重練逹有為朕御極之初即膺任使宣猷中外四十餘年前此平定回城懋著勞績嗣於西陲撫輯歸順逺藩東省𠞰捕悖逆匪衆悉心籌畫動合機宜實為國家得力大員自簡任綸扉日直內庭兼綜部務勤勞匪懈倚毗良深兹以聖母孝聖憲皇后山陵大禮扈從前來至期應恭點神主襄事乃於十九日忽遘時疾即𣲖太醫院堂官診視頻加存問以冀速痊兹遽聞溘逝深為震悼即賞給陀羅被遣額駙福隆安帶領侍衛十員往奠茶酒俟進京仍親臨賜奠加恩晉贈太保入祀賢良祠其任內革職降級之案概豫開復伊子舒常已諭令馳驛來京治喪應得恤典該部察例具奏御製賜酹詩曰扈蹕將襄事中途忽永辭失斯佐惜矣屬我命逄其中外力宣久絲綸心謹司老成漸凋喪觸緒總興悲五月上臨奠祭諭曰大學士舒赫德應得封典著加恩仍行給與諡文襄賜祭葬如例四十四年上製懷舊詩列入五功臣詩曰遇順饒有智逄艱或失算究以從政久經事實明練屢罷屢復用中心惜英彥踐厯更老成遂掌絲綸渙西師頻建功然職在恭贊土爾扈歸順經理實妥善六日靖臨清則信資偉幹燮理原未久勳伐誠可按懷舊不能忘凄然一染翰子舒常現官左都御史永貴永貴滿洲正白旗人姓拜都父布蘭泰官古北口提督世襲雲騎尉自有傳永貴於雍正十三年由筆帖式授户部主事乾隆四年遷本部員外郎十年遷郎中十一年三月授湖南辰沅永靖道十二年三月擢雲南布政使十一月調浙江布政使十四年七月署浙江巡撫十五年十二月疏言行銷浙鹽之溫州台州寧波等府及江南所屬松江府向以地近場竈私梟滋事經督臣李衛奏明發帑交地方文武官收買場竈餘鹽名為帑鹽嗣因武員領辦較多有浙江提標松江提標黃巖鎮樂清協平陽協寧海營等武職衙門經辦鹽務責以巡緝稽查由是商引疏消但從前立法未周致有奉行不善今條例八事一向來各武職請領帑本徑赴道庫支領差辨給竈收鹽文武不相統屬不能隨時稽察恐啓侵挪扣尅之弊嗣後除地方並無文職及不領帑本各營無庸置議外其溫州台州所屬之黃巖鎮樂清協寧海營均會同該縣具批由道詳準給領寄貯縣庫給竈時營員會同鹽大使移縣支領據實給發仍令各縣場將收發銀數報鹽政各衙門其帑商課程鹽本外輸等項亦令會同徴收起解支發一各營赴竈收鹽均令會同鹽大使遵照官稱收發仍按册報鹽政各衙門以杜私售浮收之弊一收發鹽銀各營俱係副恭承辦仍歸巡撫節制惟黃巖鎮係鎮臣經理應改委該鎮中軍辦理責成鎮臣督察其各處司厫巡緝收鹽之辨俱令詳巡撫給發委牌一辦帑銀鹽應於嵗底令各員會同盤查其黃巖縣帑鹽係黃巖鎮中營協辦寧海縣長亭場帑鹽係寧海營協辦均令台州府會同黃巖鎮盤查樂清縣長林場帑鹽係樂清協協辦令溫州府會同溫州鎮盤查其江浙提標中營所辦責成兩處提督率同寧波松江二府盤查其溫州台州二府令溫處道寧紹道盤查崇明場令太倉州盤查仁和場令杭州府盤查青村下砂袁浦三場令松江府盤查但有挪移虧缺將會辦盤查文武各官分别恭處著賠一各商請領鹽引每商以四百引為率務令全納課程方準領運完足全帑再領後鹽其給發竈價非實在無力窮户不得預行借給一黃巖鎮收發鹽斤照江浙提標例令該鎮委定辨目専司經理廣為銷售所賣引鹽餘利量給飯食公費外餘歸帑鹽盈餘項下報撥充餉有欺隱侵蝕者照侵盜錢糧例罪之一武職辦鹽地方有失察私鹽案副恭等照兼轄官議處委辦偹辨照専汛官議處其實力緝獲私鹽者按所獲分别議敘一各府協營所收經費現令據實開報其巡鹽兵役虛糜廪祿者逐一裁汰分别應留應革奏定章程有浮收侵扣者嚴參究處下部議行十六年閠五月實授浙江巡撫先是上年浙省溫台等屬偏災命照例蠲賑永貴奏以知府金洪銓専辦賑務嗣因洪銓辦理不善永貴奏請勒令休致總督喀爾吉善復奏洪銓玩視民瘼應革職留浙效力贖罪御史范廷楷亦以永貴徇庇洪銓劾奏諭曰金洪銓玩賑誤公非尋常闒茸之員可比該撫僅請休致實屬瞻徇是以朕見喀爾吉善之奏即將該知府革職留省效力而傳諭切責永貴者不啻至再至三矣且永貴辦理未妥之處不獨金洪銓一事其籌畫災賑諸務種種張皇竭蹶苐封疆重任一時難得其人且浙省現多被災之處驟易新任反於辦理賑恤之事無益若循例議以降罰使該撫與該督各存意見轉無補於救災濟民是以姑從寬貸惟於其果能實力妥協辦賑與否以定永貴之去留耳是年浙東各郡旱永貴先後奏入疊奉恩諭暫弛海禁以通商販截留本省及江蘇漕糧八十萬石又借撥江蘇湖廣福建江西米五十五萬石以資賑糶並令江浙二省就近報捐俊秀收納本色折色以補倉儲十二月諭曰浙省今年春旱成災本重巡撫永貴竟至張皇失措茫無定見於附近之江南江西福建湖廣山東等省既四處告糴不已甚至欲委員逺赴奉天採買米糧且稱賑糶所需必得三百萬石之數方足以資接濟從來辦理賑務斷無因一省被災遂𣣔竭數省之力以供其用者故朕降旨訓飭乃近聞永貴在浙竟至有心諱飾將來於賑糶諸務必𣣔多所撙節則是該撫從前并非為民總屬為己其意不過欲多得米石遂可有恃無恐縱事不竟行且得藉以謝災黎且以杜朕責防人彈封疆大臣豈宜如此存心耶然朕猶以為為百姓起見不妨姑留之以觀後效今乃一變而有諱災之意是其辦賑不妥矣朕子惠元元痌瘝在抱一切政務寬嚴時酌其中至於賑恤災黎每不惜加恩格外則十六年如一日此天下臣民所共知者若以永貴一人辦理不善竟至災民失所非朕勤求民瘼本懷且使各省督撫聞風效尤漸啓諱災之習所關於民主休息者甚巨實難再為寬容永貴著革職來京候旨十七年正月發往北路軍營效力贖罪四月命辦理糧餉二十年十一月上以其辦理奮勉賞按察使銜署臨洮道仍命速往巴里坤辦糧餉事務二十一年五月賞副都統銜兼恭贊大臣九月命籌辦西路臺站是年冬厄魯特宰桑逹什策凌等煽亂定邉右副將軍兆惠駐伊犁由濟爾哈朗赴特訥格爾沿途𠞰賊二十二年二月永貴抵巴里坤具以軍中狀聞諭嘉官兵同心奮勉賞永貴三等輕車都尉世職尋賜玉韘荷囊鼻煙壺三月偕兆惠等由額林哈畢爾罕路進𠞰五月領兵追賊扎那噶爾布尼瑪至孟克圖嶺未獲上訓飭之十月協辦軍務命署西安巡撫未任詔往魯克察克辦理屯田事務二十三年三月以侍郎銜留軍營辦事是月奏派兵三千六百在烏嚕木齊闢展托克三哈喇沙爾等處墾種可收三萬六百石諭朂其親往察勘董勸並較量收成分數酌籌來嵗次第增兵墾種事宜旋奏托克三增兵四百哈喇沙爾增兵二千又奏昌吉羅克倫各增兵千五百墾種從之八月授刑部侍郎十月奏闢展等處收穫較上年多六千餘石除備續墾各處籽種外餘穀三萬五千八百餘石足敷官兵口糧七月有竒仍俟次年早收小麥青稞接濟諭令悉心經畫時兆惠兵抵葉爾羌需用馬匹詔永貴巡查臺站前至阿克蘇即留駐辦理運送馬糧事務二十四年六月命回京九月行至庫車適布政使德舒解送回人為厄魯特嗎哈沁所戕永貴奏調率阿克蘇兵搜捕諭令與護軍統領努三協殱逆黨十月回部全平命來京二十五年六月調倉場侍郎十月疏言每嵗漕艘抵通必於石壩另換剝船由五閘轉運進京自大通橋下至通州通永關計四十餘里從未大加挑浚河身愈髙隄岸愈庳雨大則沖隄潰岸雨少則淺阻膠舟漕運因之遲滯雖每年嵗修終無實濟不如為一勞永逸計大挑一次嗣後嵗修可省過半詔如議速行十二月授左都御史二十六年正月命往哈什哈爾辦事六月奏回部三十一城阿竒木伯克請分别鑄給印信又奏擇伯克子弟及回人可造就者賞戴金頂學習辦事俱從之十一月授禮部尚書二十七年授鑲紅旗漢軍都統二十八年三月疏言回部地畝取溉溝渠有赫色勒托庸庫森提斯衮等河惟赫色勒布伊提斯衮汗阿里克三處分别圖巴里克河之水尚不足用請自赫色勒河東南浚渠四十餘里引水入赫色勒布伊村以資灌溉又托庸河水湍急衝刷地畝派伯克等添建上石隄壩並鑿山石以弱水勢報聞五月奏遣托木齊圖等向霍罕額爾德尼索所占阿濟北鄂斯等處地額爾德尼遵約歸還上嘉其辦理妥協下部議敘加一級八月還京二十九年六月充經筵講官三十年三月烏什回人滋事命往哈什哈爾辦事八月烏什平命駐劄烏什辦事三十三年十月署伊犁將軍十二月調吏部尚書三十四年十月調禮部尚書先是厄魯特有放馬兵盜哈薩克馬轉誣哈薩克一案辦事大臣巴爾品為人朦蔽任意審斷至是奏請治罪上以永貴既查出此案情節不即參奏根究飾詞缷罪殊屬取巧交部嚴議降三級調用三十五年四月理藩院尚書增海奏涼州莊浪滿洲兵丁應賠損傷馬匹銀兩永貴誤將熱河官兵俸餉坐扣詔切責仍交部嚴加查議五月諭曰永貴自署理伊犁將軍以來未能實心任事所辦哈薩克馬匹一案伊明知巴爾品被人朦蔽乃隱忍不奏經朕降旨訊問始行奏聞又涼州莊浪兵丁應賠倒馬銀兩將並無干涉之熱河官兵俸餉一併扣存亦未據聲明具奏是以令伊來京自應即豫革職但永貴平日尚屬勤慎不至竟當廢棄著加恩補授左都御史革職留任效力行走不準戴用翎頂閠五月授鑲黃旗漢軍都統八月授禮部尚書革職留任準用頂帶不戴花翎十月署鑲黃旗蒙古都統十一月充經筵講官三十六年五月充國史館副總裁三十八年正月署户部尚書四月署兵部尚書七月仍署户部十月命紫禁城騎馬四十一年正月兼署吏部事二月回禮部辦事仍署吏部四月上巡山東旋蹕在京王大臣迎駕未候召見而退敕交宗人府都察院議處議上上以宗人府議處王公等俱罰俸二年而都察院於程景伊永貴僅議降二級留任實屬徇情改程景伊永貴革職留任仍議處都察院堂官十二月充玉牒館副總裁四十二年四月恭逢孝聖憲皇后山陵禮成命永貴暫署大學士敬襄點主大典兼署吏部尚書五月補吏部尚書七月命在阿哥總諳逹處行走賞戴花翎九月管禮部事務四十三年二月禮部奏儀制司員外員缺主事內别無合例擬陪之員請以李潄芳題補引見諭曰李潄芳在給事中任內當山東逆賊王倫倡亂之初即奏稱係飢民聚處滋事朕以所言如果有據則地方官之諱災釀亂罪難輕逭因諭大學士舒赫德於𠞰捕賊匪時留心體訪嗣後舒赫德覆奏細查夀張等縣收成俱八九分且逆賊初時搶掠各鄉米豆糧食所在多有是飢民釀釁之説實係荒唐及賊黨要犯就獲解京命軍機大臣會同九卿科道在刑部公鞫各犯並無供有因災起事者朕集衆親鞫復令李潄芳自向各犯詢問亦無以對者是李潄芳前奏之妄衆皆曉然伊又曾奏直𨽻亦有飢民地方官在蘆溝橋堵截不令他往而給事中范宜賓尋襲其説入告因派侍郎髙朴袁守侗帶同李潄芳范宜賓前往良鄉及黃村東壩各處並未見成羣乞食流民皆李潄芳等所目擊實無人為之隱飾也是李潄芳肆行妄言悉屬毫無風影而造作無稽轉𣣔為賊揑詞卸過更不知其是何肺腸即治以袒惡惑衆之罪亦所應得但朕從不肯因言民隱事加罪科道然李潄芳心術如此豈宜復居言路為世道人心之害范宜賔已革職發往新疆效力而李潄芳從寬以主事改用已屬格外加恩且其時曾經明降諭旨中外共曉永貴豈轉未聞知李潄芳現為主事已邀寬典止宜令黽勉自效以贖前愆豈宜曲為寬徇復為升用昨永貴等奏將李潄芳充會試副提調朕以不過禮部應辦之事遂行點派孰意永貴等竟以此試朕見朕前日允其所請今即請將李潄芳升補員外郎並云無合例擬陪之員兾李潄芳之必得是永貴全不思李潄芳前此之罪由自取一味心存回護必欲令其遷官員外之不已勢必復以郎中保題郎中之不已勢必復行保送御史此乃明季惡習乃永貴竟敢以此等伎倆巧為嘗試其視朕為何如主乎朕披閲禮部奏摺以其事必係永貴主意及召見侍郎阿肅不待詢而伊即稱為永貴所誤朕因永貴厯任年久是以用為尚書乃伊見朕屢沛渥恩漸無忌憚惟以沽名取恱為事其居心尚可問乎永貴深負朕恩著將所有職任悉行革退並拔去花翎加恩賞給三品頂戴自備資斧前往烏什辦事永貴至烏什後若不痛改前非實心任事必將伊在彼正法以示炯戒三月詔永貴所有輕車都尉仍留其本身九月奏請烏什地方照阿克蘇例設立義倉從之先是葉爾羌辦事侍郎髙朴勒買回衆金珠寶石不發價值並私將玉石為阿竒木伯克色提巴勒底所控詳見髙朴傳永貴赴葉爾羌質訊屬實疏入諭曰髙朴貪婪無忌罔顧法紀實出情理之外已另降諭旨將髙朴革職嚴審即於該處正法矣吏部尚書員缺仍著永貴補授朕於臣工功罪一秉大公至正如髙朴貪黷負恩若此較伊父髙恆尤甚不能念係慧賢皇貴妃之侄髙斌之孫稍為矜宥也永貴原因市恩李潄芳身獲重譴之人今辦理此事公正可嘉復加恩擢用此諸臣所共知共見禍福惟視其人之自取朕不稍存成見於其間十月賞戴花翎十二月授恭贊大臣四十四年正月回京二月授鑲藍旗滿洲都統九月命紫禁城騎馬十月充經筵講官四十五年三月協辦大學士五月調鑲藍旗漢軍都統四十八年五月卒諭曰協辦大學士吏部尚書永貴老成端謹練逹精誠揚厯中外勤勞懋著雖近覺精神稍衰尚能照常辦事遽聞溘逝深為軫惜著派散秩大臣帶同侍衛十員前往奠醊其任內降革罰俸處分準豫開復尋賜祭葬如例諡文勤子伊江阿襲職現官副都統銜葉爾羌領隊大臣欽定八旗通志卷一百六十二
