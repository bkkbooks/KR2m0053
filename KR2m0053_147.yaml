body:
  text: 欽定四庫全書欽定八旗通志卷一百三十三人物志十三宗室王公傳十一原封和碩貝勒阿敏鎮溫簡固山貝子固爾瑪渾國公恭阿格原封和碩貝勒莽古爾泰德類原封多羅貝勒原封和碩貝勒阿敏阿敏追封莊親王舒爾哈齊第二子初授台吉歲戊申三月太祖命同長子禇英征烏拉宜罕山城克之斬千人獲甲三百俘其衆以歸癸丑正月從上征烏拉布占泰以三萬衆來拒諸將欲戰上止之阿敏與貝勒代善等議決進上從之克其城遂滅烏拉丙辰嵗太祖建元天命封和碩以齒序阿敏為二貝勒四年三月從上破明兵於薩爾滸山及尚間崖復奉命禦明總兵劉綎於棟鄂路代善等繼之陳斬綎阿敏偕大臣扈爾漢擊敗明逰擊喬一琦兵一琦奔固拉庫崖與朝鮮都元帥薑功烈合營阿敏同諸貝勒攻之功烈降一琦自縊八月從上征葉赫滅之六年三月從上取明瀋陽遼陽七月鎮江城中軍陳良䇿叛投明將毛文龍阿敏遷鎮江沿海居民於內地十一月文龍屯朝鮮阿敏渡鎮江夜入朝鮮境斬其守將及兵千五百文龍僅以身免十一年四月征喀爾喀巴林部取所屬屯寨十月征喀爾喀扎嚕特部俘其衆還天聰元年正月命同貝勒濟爾哈朗阿濟格杜度等征朝鮮瀕行諭之曰朝鮮屢世獲罪理宜聲討然此行非專伐朝鮮也明毛文龍近彼海島倚恃披猖納我叛民故整旅徂征如朝鮮可取則並取之因親授方略是月大兵薄義州拔其城分兵搗文龍所居鐵山文龍遁海島師克宣州連定三城次平壤朝鮮王李倧遣使請和阿敏書數其罪七次黃州倧復請和阿敏欲進攻諸貝勒議許盟事詳克勤郡王傳凱還上郊勞于武靖營賜御衣一襲五月從上征明錦州復圍寧逺擊斬千餘人四年正月大兵克永平灤州遷安三月命阿敏代貝勒濟爾哈朗等駐守師至合略迤西路並招降榛子鎮四月諭歸降漢文武官曰我國法度從來賄賂不行亷者舉之貪者弗録况皇上簡用者俱亷潔忠直之士爾等若有罪雖賂千金無益若無罪即衆貝勒何懼焉五月明監軍道張春等圍灤州阿敏怯不赴援灤州陷阿敏遽棄永平殺降者夜出冷口歸六月上御殿諸貝勒大臣議阿敏十六罪上命嶽託宣示於衆諸貝勒大臣合詞請誅阿敏詔特宥其死削爵幽禁崇德五年十一月卒於幽所爵除溫簡固山貝子固爾瑪渾子瓦二曽孫鄂齊固爾瑪渾貝勒阿敏第三子崇德三年九月隨睿親王多爾衮征明由北京至山西復東至濟南克城四十餘四年四月凱旋賜駝一馬一白金二千是年封輔國公先是內大臣多爾爾濟所屬蒙古及漢人盜馬自伊嚕逃命同鎮國公扎喀納等伺諸藩城間既望見以淖不追而還八月議削爵詔豫寬免五年六月以父阿敏獲罪坐削爵黜宗室順治五年四月復入宗室封輔國公六年正月隨鄭親王濟爾哈朗征湖廣擒何騰蛟於湘潭進師永興奪門入固爾瑪渾俱在事有功凱旋賜白金六百十月晉封固山貝子康熙二十年十月卒諡曰溫簡長子瑪爾圗封鎮國公先卒乃以第四子瓦三降襲輔國公瓦三初於康熙四年正月封三等輔國將軍十三年十月隨安親王嶽樂征江西進定湖廣十八年十一月還京二十年十二月降襲輔國公二十一年八月授宗人府右宗人二十二年三月議瓦三前在長沙退縮罪應削爵諭曰瓦三才具甚優况其公爵乃伊父貝子固爾瑪渾效力年久恩賜之爵著革去右宗人從寬留其公爵二十三年四月任鑲藍旗蒙古都統五月調鑲藍旗滿洲都統先是俄羅斯竊據雅克薩尼布楚二城上命黑龍江將軍薩布素收其田禾以困之薩布素以失機請罪是年命瓦三偕侍郎果丕會薩布素議雅克薩應否攻取嗣奏我兵於來年四月抵雅克薩招撫不就撫則攻其城萬一難取即遵前旨毁田禾以歸上命都統朋春等會𠞰十二月議政王大臣奏請黑龍江將士應遣大臣統轄得旨軍機關係緊要非熟練戎行者不可公瓦三素諳行師遣往必能勝任護軍統領佟寶佛可託皆堪效力之人可令公瓦三統轄之二十四年正月卒諡曰襄敏以瓦三之次子齊克塔哈襲封輔國公三十二年十二月任宗人府右宗人三十五年正月從上征噶爾丹護軍統領鄂克濟哈統領正紅旗營三十九年四月濬永定河命齊克塔哈分董其事四十年正月任正黃旗蒙古都統四十六月五月以鑽營削爵以固爾瑪渾之孫鄂斐襲輔國公鄂斐瑪爾圗第四子初於康熙六年三月封三等奉國將軍三十三年五月任鑲藍旗蒙古副都統三十五年正月從上征噶爾丹同康親王傑書統領鑲藍旗營三十八年調正紅旗蒙古副都統三十九年調正黃旗滿洲副都統四十二年擢正黃旗漢軍都統尋調正黃旗滿洲都統四十一年授領侍衛內大臣四十六年襲封輔國公四十七年任宗人府左宗人五十二年八月卒至雍正二年以鄂斐第五子鄂齊襲鄂齊初於康熙三十八年封奉恩將軍四十八年緣事削爵尋授散秩大臣雍正三年五月任正黃旗漢軍副都統十一月以陜甘總督嶽鍾琪奏請將羅隆宗諸部給達賴喇嘛管理遣大臣往諭命鄂齊偕學士班第會提督周瑛詳籌妥辦嗣鄂齊奏臣至西藏審視情形首領辦事者互不睦請降旨諭達賴喇嘛等和衷共事詔允之十二月諭曰鄂齊自委任以來竭力行走差往西藏辦事明白著將伊父鄂斐未襲之輔國公爵給與承襲四年十月擢鑲黃旗漢軍都統五年七月晉鎮國公十一月調天津水師營都統六年九月以兵丁滋事削爵授三等侍衛效力七年二月任正紅旗滿洲副都統十月奏請八旗訓練必弓箭相稱嫻熟中的為要除官射用披子箭外常箭俱用骲頭則指發與梅針箭同視製披子箭價亦省議從之九年八月署鑲紅旗蒙古都統十一年正月革任爵除鎮國公恭阿恭阿貝勒阿敏第四子阿敏既獲罪恭阿廢為庶人後復入宗室順治五年九月隨鄭親王濟爾哈朗征湖廣六年正月大軍抵長沙擒明桂王朱由榔之總督何騰蛟等進勦廣西合兵定道州及黎平府先後克六十餘城恭阿俱在事有功十月封鎮國公十一月卒於軍八年閏二月以恭阿之長子法塞降襲輔國公康熙四十九年正月卒十月以法塞長子原封三等奉國將軍阿裕爾仍降襲三等奉國將軍五十八年卒十二月以間散宗室德色勒之長子蘇赫訥降襲奉恩將軍阿裕爾之孫也雍正二年七月卒爵除原封和碩貝勒莽古爾泰莽古爾泰太祖高皇帝第五子嵗壬子九月從上征烏拉克城六莽古爾泰等請渡水進擊上止之曰我且削其外城無僕無以為主無民無以為君遂燬所得六城移駐富勒哈河越日於烏拉河建木城留兵千守之天命元年授和碩貝勒以齒為序莽古爾泰為三貝勒四年三月明總兵杜松等率師六萬出撫順關上親統師迎擊莽古爾泰從至界藩設伏薩爾滸谷口明兵過將半尾擊之我師據界藩之吉林崖明兵營薩爾滸山以二萬衆來攻吉林莽古爾泰同大貝勒代善等以兵千衛吉林復合力攻薩爾滸山破之又破明兵於尚間崖時明總兵劉綎出寬甸略棟鄂上命同代善等禦之至瓦爾哈什窩集擊敗明兵二萬陳斬綎事詳禮烈親王傳八月從上征葉赫圍其城其貝勒布揚古及弟布爾杭古降葉赫平五年八月上征明由懿路蒲河進明兵出瀋陽城者各引退諭莽古爾泰領本部追之莽古爾泰遂率健鋭百人追敗總兵李秉誠副將趙率教兵越瀋陽城東至渾河始返六年七月鎮江城降將陳良䇿叛投明總兵毛文龍莽古爾泰同代善遷金州民於復州十年正月明葺城守旅順口攻克之殱其衆十一月率師援科爾沁解其圍十一年四月上征喀爾喀巴林部命代善諸貝勒略西拉木倫諸貝勒以馬乏不能進莽古爾泰獨領兵夜渡擊之俘獲無算天聰元年五月攻明右屯衛又以偏師衛塔山糧運三年十月從上征明貝勒阿巴泰阿濟格先從龍井關入斬明漢兒莊副將易愛等莽古爾泰偕貝勒多爾衮多鐸至其守將遂以城降並招撫潘家口守偹金有光中軍范明良蔣進喬翌日上統師克洪山口趨遵化莽古爾泰自漢兒莊合營敗明山海關總兵趙率教兵擒其副將臧調元旋奉命赴通州視渡口是月大軍進薄京城明諸道兵入援屯廣渠門外莽古爾泰分遣護軍前行令阿巴泰阿濟格等攻之追殺至城壕莽古爾泰與貝勒多鐸留後值明潰卒來犯擊殱之十二月從上視薊州破明山海關援兵四年二月克永平遵化適與明兵遇敗之五年三月命諸貝勒直言時政莽古爾泰奏曰讞獄據供詞以定是非未敢明知枉斷惟恐日久怠生臣與諸貝勒大臣倍加䇿勵八月從上圍明大凌河城正藍旗兵圍其南莽古爾泰軍其中為䇿應九月敗明監軍道張春總兵吳襄等援兵事詳禮烈親王傳十月議莽古爾泰於御前露刃大不敬罰銀萬兩撤五佐領歸公六年五月從上征察哈爾林丹汗遁移師征明歸化城略大同宣府七月師還十二月薨年四十六上臨哭丙夜始還翌日設幄議祭奠焉是夜乃還宫九年十二月以所屬追首其罪削爵黜宗室詳德格類傳原封多羅貝勒德格類德格類太祖髙皇帝第十子初授台吉天命六年二月大軍略明奉集保將旋有小卒指明兵所在德格類同台吉嶽託碩託擊敗明兵二百追逼明總兵李秉誠營其衆二千潰遁三月同台吉寨桑古閲三岔河橋至海州城中官民張樂輿迎德格類令軍毋擾民奪財物士皆登城宿勿入民室次日安撫居民而還八年四月同台吉阿巴泰征喀爾喀扎嚕特部十一年十月復隨大貝勒代善征扎嚕特部是年封多羅貝勒天聰三年九月同貝勒濟爾哈朗等略明錦州焚其積聚俘獲無算五年六月命諸貝勒直言時政德格類奏曰國家要在慎選正直任以國事屏讒邪逺姦佞則賢不肖皆知取法臣等與諸貝勒皆以公正自持效忠竭力至讞獄或刑罰不中請即罷斥另選良臣任法司則政簡刑清國家何憂不太平七月初設六部命理户部事八月從上圍明大凌河城正藍旗兵圍其南德格類軍其中為䇿應九月敗明監軍道張春總兵吳襄等援兵事詳禮烈親王傳十月明總兵祖大夀降同貝勒阿巴泰夜襲錦州擊斬甚衆事詳饒餘敏郡王傳六年五月同貝勒濟爾哈朗等俘察哈爾部衆於歸化城及黃河諸路九月同貝勒嶽託等拓疆自耀州展至蓋州迤南七年六月攻旅順口克之八年五月從大軍征明六月招撫蒙古來歸户衆七月克獨石口進攻赤城未拔入保安州會大軍於應州師還九年十月薨年四十上臨哭丙夜乃還設幄而居撤饌三日諸貝勒大臣勸慰再三始還宫十二月同母兄莽古爾泰為屬下冷僧機所告以大逆削爵除籍德格類其母弟曽與謀亦追削貝勒黜宗室爵除順治九年冷僧機以姦惡伏誅欽定八旗通志卷一百三十三
