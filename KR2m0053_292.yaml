  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_292-1a, image: WYG0670/WYG0670-0196c.png}
body:
  text: 表二世職表五等之封皆積功而逓加者也其功不能及五等而勲勞亦不可湮沒者國家酬庸之典亦核其差等錫以世職其授職自雲騎尉始雲騎尉襲一次加一雲騎尉則合為騎都尉襲二次再加為騎都尉兼一雲騎尉襲三次再加為三等輕車都尉襲四次二等輕車都尉襲五次一等輕車都尉襲六次一等輕車都尉兼一雲騎尉襲七次其通例也至因陣亡賜爵者襲次雖盡仍授其後裔為恩騎尉世襲罔替則宏奬忠義培植綱常由我皇上格外鴻慈非舊制之所有矣考唐書百官志勲級凡十有二轉八轉為上輕車都尉視正四品七轉為輕車都尉視從四品六轉為上騎都尉視正五品五轉為騎都尉視從五品四轉為驍騎尉視正六品三轉為飛騎尉視從六品二轉為雲騎尉視正七品一轉為武騎尉視從七品今制無驍騎尉飛騎尉而輕車都尉騎都尉雲騎尉以次而升則階級仍與古制合武騎尉今制亦無然恩騎尉之品秩足以當之則相異亦無多惟是世爵之制莫大乎以功之多少為承襲之久近博攷前代惟五等世及而已其以軍功賜爵者類不及其子孫非褒錫勲閥之義也按前眀軍衛間有世襲然皆散職末弁如運丁之世𨽻軍籍非軍功封爵之比也我朝則自開國元功世襲罔替外其有忠勤懋著賜以榮封者雖不入五等之班自雲騎尉以上多者襲七世少者亦襲一世從無及身而止澤不逮其後昆者且有襲次已盡更加惠於雲仍者是則聖朝忠厚逺邁百王為亘古之所未有矣凡荷幬載之恩者其可不篤念先人勉承舊徳以仰酬髙厚也哉謹各詳其譜系作世職表世職表一鑲黄旗滿洲世職上一等輕車都尉三等輕車都尉二等輕車都尉一等輕車都尉欽定八旗通志卷二百七十八
