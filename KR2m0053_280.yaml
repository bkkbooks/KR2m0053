body:
  text: 人物志一百四十六列女傳二十六八旗漢軍列女傳四鑲黄旗漢軍砲手周鳴岐之妻于氏鑲黄旗漢軍閒散王朝棟之妻向氏鑲黄旗漢軍候選州同董繼立之妻何氏鑲黄旗漢軍馬甲劉起鸞之妻王氏正黄旗漢軍馬甲王廷瑞之妻劉氏正白旗漢軍壮丁洪培之妻康氏正紅旗漢軍馬甲張玉麟之妻吴氏正紅旗漢軍閒散孔永寧之妻顔氏正紅旗漢軍領催孫紹福之妻趙氏正藍旗漢軍監生甘士軫之妻耿氏以上俱于乾隆二十一年旌表鑲黄旗漢軍馬甲張鴻儒之妻夏氏鑲黄旗漢軍馬甲蔣明禮之妻王氏鑲黄旗漢軍通判管承祐之妻董氏正黄旗漢軍養育兵劉國祉之妻馬氏正黄旗漢軍閒散張玉麟之妻李氏正黄旗漢軍閒散劉茂徳之妻鄒氏正黄旗漢軍馬甲李祒之妻髙氏正白旗漢軍閒散西麟之妻老氏正紅旗漢軍官學生韓鑰之妻辛氏正紅旗漢軍馬甲鄧漢傑之妻楊氏鑲白旗漢軍同知張昌國之妻秦氏鑲白旗漢軍炮手閆得玉之妻翟氏鑲白旗漢軍筆帖式李世城之妻鈕氏鑲白旗漢軍馬甲傅華之妻夏氏以上俱於乾隆二十二年旌表鑲黄旗漢軍馬甲蔣國華之妻王氏鑲黄旗漢軍閒散五雅圖之妻徐氏鑲黄旗漢軍領催于文焜之妻線氏正黄旗漢軍馬甲李生卓之妻王氏正白旗漢軍領催于祖盛之妻賀氏正白旗漢軍筆帖式祖秉誠之妻董氏正白旗漢軍監生黄承澤之妻楊氏正白旗漢軍閒散門三元之妻唐氏正白旗漢軍董成樑之妻那氏鑲白旗漢軍馬甲皮文玉之妻張氏鑲白旗漢軍監生趙枚之妻王氏正藍旗漢軍官學生劉廷玉之妻白氏鑲藍旗漢軍馬甲梁承熹之妻王氏鑲藍旗漢軍馬甲張保之妻墨赫勒氏以上俱於乾隆二十三年旌表鑲黄旗漢軍馬甲盧䎁之妻王氏鑲黄旗漢軍馬甲陳文英之妻熊氏鑲黄旗漢軍馬甲王樞之妻興氏正黄旗漢軍馬甲劉上禮之妻大氏正黄旗漢軍閒散李景誠之妻張氏正白旗漢軍馬甲何思敏之妻劉氏正白旗漢軍閒散張毓瑶之妻許氏正紅旗漢軍馬甲梁正基之妻劉氏正紅旗漢軍馬甲楊上辛之妻王氏正紅旗漢軍馬甲王連傑之妻盧氏鑲白旗漢軍知府劉鶴齡之妻張氏鑲白旗漢軍馬甲永陞之妻尼氏鑲白旗漢軍領催徐志清之妻孔氏鑲白旗漢軍馬甲王僅之妻蒋氏鑲白旗漢軍養育兵王豫之妻王氏鑲白旗漢軍馬甲闗竒之妻許氏鑲紅旗漢軍閒散周朝勲之妻董氏鑲藍旗漢軍敖爾布邊之雄之妻夏氏鑲藍旗漢軍馬甲髙自榮之妻胡氏鑲藍旗漢軍敖爾布王紹雙之妻張氏鑲藍旗漢軍馬甲吴進忠之妻雷氏鑲藍旗漢軍閒散徐汝枚之妻張氏以上俱於乾隆二十四年旌表鑲黄旗漢軍閒散聶先興之妻孫氏鑲黄旗漢軍馬甲同夀之妻李氏鑲黄旗漢軍巡捕營百總李松齡之妻張氏鑲黄旗漢軍馬甲蒋玿之妻汪氏鑲黄旗漢軍監生髙統之妻蔡氏正黄旗漢軍馬甲于漢通之妻陳氏正黄旗漢軍馬甲木成格之妻張氏正白旗漢軍馬甲爾賽之妻舒穆魯氏正白旗漢軍馬甲烏巴里之妻莫爾徳里氏正白旗漢軍文生員康天叙之妻范氏正白旗漢軍馬甲伊爾色之妻王氏正白旗漢軍馬甲王奉之妻闗氏正紅旗漢軍馬甲趙世華之妻郭氏正紅旗漢軍水手李俊之妻張氏正紅旗漢軍壮丁李文瑞之妻陳氏正紅旗漢軍壮丁劉瑞林之妻姜氏正紅旗漢軍壮丁姜文相之妻吴氏正紅旗漢軍壮丁賈勲之妻馬氏正紅旗漢軍壮丁李環之妻王氏正紅旗漢軍壮丁王玉之妻范氏正紅旗漢軍壮丁任士浩之妻井氏正紅旗漢軍壮丁白文美之妻范氏正紅旗漢軍壮丁牛俊佐之妻張氏鑲白旗漢軍馬甲張文秀之妻龍氏鑲白旗漢軍武生張宗橒之妻唐氏鑲白旗漢軍馬甲王見仁之妻張氏鑲紅旗漢軍壮丁李傑之妻康氏鑲紅旗漢軍閒散七保之妻曹氏正藍旗漢軍佐領李佛保之妻西林覺羅氏正藍旗漢軍馬甲李景之妻孫氏正藍旗漢軍知縣甘國珖之妻蕭氏正藍旗漢軍馬甲侍美之妻陳氏鑲藍旗漢軍馬甲張士美之妻張氏鑲藍旗漢軍壮丁張興邦之妻鄭氏以上俱於乾隆二十五年旌表鑲黄旗漢軍監生盧照之妻于氏鑲黄旗漢軍馬甲羅格之妻李氏鑲黄旗漢軍馬甲井應湶之妻王氏鑲黄旗漢軍候選通判范宏佩之妻張氏鑲黄旗漢軍閒散劉寳夀之妻田氏鑲黄旗漢軍馬甲陳文徳之妻于氏正黄旗漢軍步甲唐儀之妻李氏正黄旗漢軍敖爾布任邦顯之妻葉氏正白旗漢軍馬甲蔣裕琦之妻劉氏正白旗漢軍領催王懋齡之妻楊氏正白旗漢軍隨印外郎張秉仁之妻王氏正紅旗漢軍弓匠木坤達李傑之妻王氏鑲紅旗漢軍步甲催生輝之妻夏氏鑲紅旗漢軍縣丞張鑑之妻趙氏正藍旗漢軍監生陳廷蘭之妻鄭氏正藍旗漢軍閒散趙士竒之妻楊氏鑲藍旗漢軍砲手鄭方坦之妻唐氏鑲藍旗漢軍閒散劉館之妻遲氏以上俱於乾隆二十六年旌表鑲黄旗漢軍敖爾布寗思敬之妻田氏鑲黄旗漢軍閒散盧良臣之妻任氏鑲黄旗漢軍試用知縣崔鴻訓之妻李氏鑲黄旗漢軍領催張玉鳳之妻李氏正黄旗漢軍馬甲盛謨之妻朱氏正黄旗漢軍馬甲侯連方之妻周氏正黄旗漢軍敖爾布羅渶之妻趙氏正白旗漢軍壮丁趙善之妻黄氏正白旗漢軍閒散牟澄之妻王氏正紅旗漢軍養育兵趙世選之妻李氏鑲白旗漢軍領催胡瑶之妻周氏鑲白旗漢軍馬甲宋彦茂之妻單氏鑲白旗漢軍閒散周渤之妻賈氏鑲藍旗漢軍馬甲王維林之妻張氏鑲白旗漢軍馬甲朱士傑之妻張氏鑲紅旗漢軍砲手白璧之妻唐氏鑲紅旗漢軍馬甲衡朝璽之妻李氏鑲藍旗漢軍外營把總石柱之妻郭氏鑲藍旗漢軍文生員馬㡬之妻吳氏鑲藍旗漢軍馬甲金以舉之妻髙氏鑲藍旗漢軍閒㪚楊文奎之妻姜氏鑲藍旗漢軍馬甲劉兆祥之妻張氏鑲藍旗漢軍閒散夏世霖之妻佟氏鑲藍旗漢軍馬甲戴雲鳯之