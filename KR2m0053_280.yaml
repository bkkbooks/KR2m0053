body:
  text: 人物志一百四十六列女傳二十六八旗漢軍列女傳四鑲黃旗漢軍炮手周鳴岐之妻于氏鑲黃旗漢軍間散王朝棟之妻向氏鑲黃旗漢軍候選州同董繼立之妻何氏鑲黃旗漢軍馬甲劉起鸞之妻王氏正黃旗漢軍馬甲王廷瑞之妻劉氏正白旗漢軍壯丁洪培之妻康氏正紅旗漢軍馬甲張玉麟之妻吳氏正紅旗漢軍間散孔永寧之妻顔氏正紅旗漢軍領催孫紹福之妻趙氏正藍旗漢軍監生甘士軫之妻耿氏以上俱于乾隆二十一年旌表鑲黃旗漢軍馬甲張鴻儒之妻夏氏鑲黃旗漢軍馬甲蔣明禮之妻王氏鑲黃旗漢軍通判管承祐之妻董氏正黃旗漢軍養育兵劉國祉之妻馬氏正黃旗漢軍間散張玉麟之妻李氏正黃旗漢軍間散劉茂德之妻鄒氏正黃旗漢軍馬甲李祒之妻髙氏正白旗漢軍間散西麟之妻老氏正紅旗漢軍官學生韓鑰之妻辛氏正紅旗漢軍馬甲鄧漢傑之妻楊氏鑲白旗漢軍同知張昌國之妻秦氏鑲白旗漢軍炮手閻得玉之妻翟氏鑲白旗漢軍筆帖式李世城之妻鈕氏鑲白旗漢軍馬甲傅華之妻夏氏以上俱於乾隆二十二年旌表鑲黃旗漢軍馬甲蔣國華之妻王氏鑲黃旗漢軍間散五雅圖之妻徐氏鑲黃旗漢軍領催于文焜之妻線氏正黃旗漢軍馬甲李生卓之妻王氏正白旗漢軍領催于祖盛之妻賀氏正白旗漢軍筆帖式祖秉誠之妻董氏正白旗漢軍監生黃承澤之妻楊氏正白旗漢軍間散門三元之妻唐氏正白旗漢軍董成梁之妻那氏鑲白旗漢軍馬甲皮文玉之妻張氏鑲白旗漢軍監生趙枚之妻王氏正藍旗漢軍官學生劉廷玉之妻白氏鑲藍旗漢軍馬甲梁承熹之妻王氏鑲藍旗漢軍馬甲張保之妻墨赫勒氏以上俱於乾隆二十三年旌表鑲黃旗漢軍馬甲盧䎁之妻王氏鑲黃旗漢軍馬甲陳文英之妻熊氏鑲黃旗漢軍馬甲王樞之妻興氏正黃旗漢軍馬甲劉上禮之妻大氏正黃旗漢軍間散李景誠之妻張氏正白旗漢軍馬甲何思敏之妻劉氏正白旗漢軍間散張育瑶之妻許氏正紅旗漢軍馬甲梁正基之妻劉氏正紅旗漢軍馬甲楊上辛之妻王氏正紅旗漢軍馬甲王連傑之妻盧氏鑲白旗漢軍知府劉鶴齡之妻張氏鑲白旗漢軍馬甲永升之妻尼氏鑲白旗漢軍領催徐志清之妻孔氏鑲白旗漢軍馬甲王僅之妻蔣氏鑲白旗漢軍養育兵王豫之妻王氏鑲白旗漢軍馬甲關竒之妻許氏鑲紅旗漢軍間散周朝勳之妻董氏鑲藍旗漢軍敖爾布邊之雄之妻夏氏鑲藍旗漢軍馬甲髙自榮之妻胡氏鑲藍旗漢軍敖爾布王紹雙之妻張氏鑲藍旗漢軍馬甲吳進忠之妻雷氏鑲藍旗漢軍間散徐汝枚之妻張氏以上俱於乾隆二十四年旌表鑲黃旗漢軍間散聶先興之妻孫氏鑲黃旗漢軍馬甲同夀之妻李氏鑲黃旗漢軍巡捕營百總李松齡之妻張氏鑲黃旗漢軍馬甲蔣玿之妻汪氏鑲黃旗漢軍監生髙統之妻蔡氏正黃旗漢軍馬甲于漢通之妻陳氏正黃旗漢軍馬甲木成格之妻張氏正白旗漢軍馬甲爾賽之妻舒穆魯氏正白旗漢軍馬甲烏巴里之妻莫爾德里氏正白旗漢軍文生員康天敘之妻范氏正白旗漢軍馬甲伊爾色之妻王氏正白旗漢軍馬甲王奉之妻關氏正紅旗漢軍馬甲趙世華之妻郭氏正紅旗漢軍水手李俊之妻張氏正紅旗漢軍壯丁李文瑞之妻陳氏正紅旗漢軍壯丁劉瑞林之妻薑氏正紅旗漢軍壯丁薑文相之妻吳氏正紅旗漢軍壯丁賈勳之妻馬氏正紅旗漢軍壯丁李環之妻王氏正紅旗漢軍壯丁王玉之妻范氏正紅旗漢軍壯丁任士浩之妻井氏正紅旗漢軍壯丁白文美之妻范氏正紅旗漢軍壯丁牛俊佐之妻張氏鑲白旗漢軍馬甲張文秀之妻龍氏鑲白旗漢軍武生張宗橒之妻唐氏鑲白旗漢軍馬甲王見仁之妻張氏鑲紅旗漢軍壯丁李傑之妻康氏鑲紅旗漢軍間散七保之妻曹氏正藍旗漢軍佐領李佛保之妻西林覺羅氏正藍旗漢軍馬甲李景之妻孫氏正藍旗漢軍知縣甘國珖之妻蕭氏正藍旗漢軍馬甲侍美之妻陳氏鑲藍旗漢軍馬甲張士美之妻張氏鑲藍旗漢軍壯丁張興邦之妻鄭氏以上俱於乾隆二十五年旌表鑲黃旗漢軍監生盧照之妻于氏鑲黃旗漢軍馬甲羅格之妻李氏鑲黃旗漢軍馬甲井應湶之妻王氏鑲黃旗漢軍候選通判范宏佩之妻張氏鑲黃旗漢軍間散劉寶夀之妻田氏鑲黃旗漢軍馬甲陳文德之妻于氏正黃旗漢軍步甲唐儀之妻李氏正黃旗漢軍敖爾布任邦顯之妻葉氏正白旗漢軍馬甲蔣裕琦之妻劉氏正白旗漢軍領催王懋齡之妻楊氏正白旗漢軍隨印外郎張秉仁之妻王氏正紅旗漢軍弓匠木坤達李傑之妻王氏鑲紅旗漢軍步甲催生輝之妻夏氏鑲紅旗漢軍縣丞張鑑之妻趙氏正藍旗漢軍監生陳廷蘭之妻鄭氏正藍旗漢軍間散趙士竒之妻楊氏鑲藍旗漢軍炮手鄭方坦之妻唐氏鑲藍旗漢軍間散劉館之妻遲氏以上俱於乾隆二十六年旌表鑲黃旗漢軍敖爾布寧思敬之妻田氏鑲黃旗漢軍間散盧良臣之妻任氏鑲黃旗漢軍試用知縣崔鴻訓之妻李氏鑲黃旗漢軍領催張玉鳳之妻李氏正黃旗漢軍馬甲盛謨之妻朱氏正黃旗漢軍馬甲侯連方之妻周氏正黃旗漢軍敖爾布羅渶之妻趙氏正白旗漢軍壯丁趙善之妻黃氏正白旗漢軍間散牟澄之妻王氏正紅旗漢軍養育兵趙世選之妻李氏鑲白旗漢軍領催胡瑶之妻周氏鑲白旗漢軍馬甲宋彥茂之妻單氏鑲白旗漢軍間散周渤之妻賈氏鑲藍旗漢軍馬甲王維林之妻張氏鑲白旗漢軍馬甲朱士傑之妻張氏鑲紅旗漢軍炮手白璧之妻唐氏鑲紅旗漢軍馬甲衡朝璽之妻李氏鑲藍旗漢軍外營把總石柱之妻郭氏鑲藍旗漢軍文生員馬幾之妻吳氏鑲藍旗漢軍馬甲金以舉之妻髙氏鑲藍旗漢軍間散楊文奎之妻薑氏鑲藍旗漢軍馬甲劉兆祥之妻張氏鑲藍旗漢軍間散夏世霖之妻佟氏鑲藍旗漢軍馬甲戴雲鳯之妻陳氏鑲藍旗漢軍馬甲劉兆之妻李氏鑲藍旗漢軍壯丁彭思俊之妻郭氏鑲藍旗漢軍壯丁鄭旺之妻李氏鑲藍旗漢軍壯丁李連方之妻趙氏鑲藍旗漢軍壯丁王登科之妻王氏以上俱於乾隆二十七年旌表鑲黃旗漢軍馬甲線承杰之妻白氏鑲黃旗漢軍馬甲福金太之妻胡氏鑲黃旗漢軍領催管繼柱之妻何氏鑲黃旗漢軍馬甲石相維之妻張氏正黃旗漢軍馬甲紀昌華之妻張氏正黃旗漢軍馬甲范世玉之妻孫氏正黃旗漢軍馬甲康慶年之妻陸氏正白旗漢軍馬甲劉學仁之妻牛氏正白旗漢軍馬甲劉永昌之妻黃氏正白旗漢軍七品官石崑之妻沈氏正白旗漢軍馬甲甘士選之妻夏氏正白旗漢軍馬甲王天保之妻方氏正紅旗漢軍馬甲趙文良之妻髙氏鑲白旗漢軍馬甲馬士榮之妻王氏鑲白旗漢軍間散汪注九之妻陳氏正藍旗漢軍五品官海圖之妻曺氏鑲藍旗漢軍監生劉鉽之妻彭氏鑲藍旗漢軍馬甲劉應詔之妻梁氏鑲藍旗漢軍文生員于鯤發之妻張氏以上俱於乾隆二十八年旌表鑲黃旗漢軍敖爾布李環之妻鄭氏鑲黃旗漢軍馬甲李廷芳之妻王氏鑲黃旗漢軍馬甲朱泊光之妻于氏正黃旗漢軍馬甲艾兆熊之妻王氏正黃旗漢軍間散金炳之妻孫氏正白旗漢軍馬甲黃成林之妻張氏正白旗漢軍文舉人歐靜之妻劉氏正白旗漢軍馬甲張雷之妻牛氏正白旗漢軍馬甲張晉堯之妻沈氏正白旗漢軍馬甲黃朝勳之妻靳氏正白旗漢軍馬甲李英之妻于氏正白旗漢軍敖爾布金鳯之妻聶氏正紅旗漢軍間散段得道之妻蔡氏正紅旗漢軍馬甲聶桃之妻趙氏正紅旗漢軍馬甲于殿璋之妻寧氏鑲白旗漢軍馬甲胡進仁之妻髙氏鑲白旗漢軍間散宋國良之妻于氏鑲紅旗漢軍馬甲髙士龍之妻姚氏鑲紅旗漢軍間散張舒之妻魏氏鑲紅旗漢軍壯丁王良俊之妻金氏鑲紅旗漢軍壯丁張宗表之妻李氏鑲紅旗漢軍壯丁蔡慎之妻周氏鑲紅旗漢軍壯丁徐世達之妻曺氏鑲紅旗漢軍壯丁白應魁之妻楊氏鑲紅旗漢軍知州楊錫之妻時氏鑲紅旗漢軍間散王邦隆之妻王氏鑲藍旗漢軍馬甲卞兆鰲之妻朝氏鑲藍旗漢軍馬甲張起功之妻徐氏鑲藍旗漢軍馬甲蘇國棟之妻陳氏以上俱於乾隆二十九年旌表鑲黃旗漢軍間散陳國禮之妻董氏鑲黃旗漢軍領催祖應辰之繼妻郎氏鑲黃旗漢軍馬甲盧光裔之妻陳氏鑲黃旗漢軍馬甲張國安之妻楊氏鑲黃旗漢軍馬甲滿丞丕之妻周氏鑲黃旗漢軍馬甲何殿斌之妻李氏鑲黃旗漢軍間散萬有傅之妻黃氏鑲黃旗漢軍間散李宗琳之妻馬氏鑲黃旗漢軍馬甲馬桂祥之妻崔氏鑲黃旗漢軍馬甲于瀾之妻孫氏鑲黃旗漢軍間散王律之妻吳氏鑲黃旗漢軍間散馬繽之妻孟氏鑲黃旗漢軍馬甲耿文仲之妻田氏鑲黃旗漢軍馬甲李萬雄之妻周氏鑲黃旗漢軍馬甲莭國雄之妻汪氏鑲黃旗漢軍馬甲郭清海之妻王氏鑲黃旗漢軍馬甲王永祚之妻李氏鑲黃旗漢軍馬甲馬忠佶之妻趙氏鑲黃旗漢軍間散馬崇恩之妻楊氏鑲黃旗漢軍領催吳琳之妻卜氏鑲黃旗漢軍馬甲徐文仲之妻胡氏鑲黃旗漢軍馬甲于始煥之妻徐氏鑲黃旗漢軍間散廖自智之妻萬氏鑲黃旗漢軍間散吳鳯鳴之妻蘇氏鑲黃旗漢軍間散愛金之妻范氏鑲黃旗漢軍水手黃從禮之妻梁氏正黃旗漢軍馬甲李桂林之妻龔氏正黃旗漢軍間散王侃之妻朴氏正黃旗漢軍馬甲楊鳯翔之妻尚氏正黃旗漢軍馬甲韓綱之妻趙氏正黃旗漢軍間散尚忠之妻王氏正黃旗漢軍馬甲姚普之妻景氏正黃旗漢軍四川渠縣縣丞李璋之妾蔡氏正黃旗漢軍馬甲崔敏報之妻樊氏正黃旗漢軍馬甲張成仁之妻魏氏正黃旗漢軍馬甲劉國正之妻沙氏正黃旗漢軍馬甲髙金德之妻曾氏正黃旗漢軍間散劉文祖之妻王氏正黃旗漢軍馬甲王日耀之妻田氏正黃旗漢軍馬甲施允中之妻李氏正黃旗漢軍馬甲施允恭之妻夏氏正黃旗漢軍馬甲張應元之妻劉氏正黃旗漢軍馬甲麟之妻梁氏正白旗漢軍領催于永達之妻吳氏正白旗漢軍馬甲楊瑞之妻曹氏正白旗漢軍馬甲韓義弼之妻龎氏正白旗漢軍馬甲劉士英之妻郭氏正白旗漢軍馬甲金雲彪之妻張氏正白旗漢軍馬甲王顯宗之妻張氏正白旗漢軍馬甲沈國梁之妻錢氏正白旗漢軍炮手王五達之妻汪氏正白旗漢軍馬甲聶國恆之妻閻氏正白旗漢軍領催方維印之妻劉氏正白旗漢軍馬甲劉秉璋之妻劉氏正白旗漢軍馬甲梁國棟之妻陳氏正白旗漢軍馬甲閻維朝之妻徐氏正白旗漢軍馬甲王國祥之妻嚴氏正紅旗漢軍營兵劉成玉之妻胡氏正紅旗漢軍馬甲明奎之妻張氏正紅旗漢軍馬甲尹廷秀之妻張氏正紅旗漢軍間散徐國竒之妻劉氏正紅旗漢軍馬甲徐夢魁之妻羅氏鑲白旗漢軍馬甲徐政綸之妻張氏鑲白旗漢軍台丁李義之妻郭氏鑲白旗漢軍壯丁徐德化之妻夏氏鑲白旗漢軍壯丁陳義之妻王氏鑲白旗漢軍監生佛喜之妻李氏鑲白旗漢軍馬甲胡進禮之妻張氏鑲白旗漢軍官學生馮茂之妻馬氏鑲白旗漢軍監生黃子鑑之妻髙氏鑲白旗漢軍馬甲陳紹玉之妻吳氏鑲白旗漢軍間散鍾廷臣之妻孫氏鑲白旗漢軍馬甲左璧之妻髙氏鑲白旗漢軍領催朱炯之妻陳氏鑲白旗漢軍馬甲史秉衡之妻馬氏鑲白旗漢軍馬甲卜文輝之妻傅氏鑲紅旗漢軍間散劉若淇之妻李氏鑲紅旗漢軍間散陳義之妻王氏鑲紅旗漢軍監生孟輔聖之妻陳氏鑲紅旗漢軍知府蔣尚思之妾倪氏鑲紅旗漢軍馬甲吕宏作之妻周氏鑲紅旗漢軍馬甲謝文龍之妻鎖氏鑲紅旗漢軍台丁李義之妻郭氏鑲紅旗漢軍炮手徐天祿之妻李氏鑲紅旗漢軍壯丁徐德代之妻夏氏鑲紅旗漢軍馬甲白上夔之妻王氏正藍旗漢軍驍騎校陳禧泰之繼妻張氏正藍旗漢軍間散韓永泰之妻張氏正藍旗漢軍馬甲郎世豪之妻楊氏正藍旗漢軍間散鍾廷彬之妻孟氏正藍旗漢軍間散鍾廷相之妻朱氏正藍旗漢軍馬甲王琚之妻李氏正藍旗漢軍馬甲張義璧之妻賈氏正藍旗漢軍馬甲周紹武之妻馬氏正藍旗漢軍馬甲髙鏞之妻穆氏鑲藍旗漢軍馬甲王泰之妻劉氏鑲藍旗漢軍水手黃從禮之妻梁氏鑲藍旗漢軍馬甲史玉崑之妻李氏鑲藍旗漢軍間散張江之妻胡氏鑲藍旗漢軍馬甲李源之妻周氏鑲藍旗漢軍馬甲李友松之妻孫氏鑲藍旗漢軍馬甲劉鈞之妻郎氏鑲藍旗漢軍領催張文俊之妻朱氏鑲藍旗漢軍間散沈鍾之妻張氏鑲藍旗漢軍馬甲趙洪韜之妻魏氏鑲藍旗漢軍馬甲武彬元之妻文氏以上俱於乾隆三十年旌表欽定八旗通志卷二百六十六
