body:
  text: 兵制志七軍政巡防附凡軍政五年一舉考察中外武職以定黜陟注上考者薦舉卓異注下考者糾劾該管官具疏以聞不入舉劾者以中平注考彚送兵部會都察院兵科京畿道察核題覆奉旨以卓異加一級注册候升其以軍政紏劾貪酷革職提問罷軟不謹革職老病休致才力不及降二級浮躁降一級皆調用前有卓異應升及加級紀録均不準抵銷考察八旗武職在京管旗大臣及各省將軍都統副都統等俱開列事實清册在京於九月內送部在外於十月內送部兵部彚齊繕具履厯清單進呈至在京文員兼旗下武職者仍於京察時聼該部院衙門考察不在軍政之列鑾儀衛滿洲各官八旗世職人員俱不行考察此外各衙門所屬武職各該管官詳核填注考語定以四格曰操守曰才能曰騎射曰年嵗紏以八法曰貪曰酷曰罷軟無為曰不謹曰年老曰有疾曰浮躁曰才力不及並將各該員履厯及有無在軍前行走受傷得功之處注明分别應去應留造册送部其堪膺薦舉官員必須行止端方弓馬􅈺熟管轄嚴肅當差勤慎不擾該屬給餉無虛考語併厯俸己滿三年任內並無事故並試問國語方準薦舉屆期兵部將管旗王貝勒等滿洲蒙古都統前鋒統領護軍統領滿洲蒙古副都統滿洲補授漢軍都統副都統兵部滿洲堂官職名開列請旨派出考察具奏其前鋒營護軍營官員軍政卓異由領侍衛內大臣會同前鋒護軍統領等揀選薦舉至各省駐防官員俱照在京官員之例該將軍都統副都統等考察河南太原二處駐防官員該巡撫考察其良鄉寶坻固安東安霸州采育里保定府雄縣滄州九處駐防官員三年一次派有護軍統領或副都統前往巡察管轄即令會同該管官考核具奏內外考選軍政册限於本年十月具題乾隆二十四年二月諭向來內外文武三品以上大員遇京察軍政之年援例自陳文具相沿無禆實政曽經降旨停罷第念伊等洊陟崇階並由特簡其人賢否優劣雖已均在洞鑒然其間亦不乏旅進旅退茍圖持祿戀棧之人若以平時既無大過足干例議又不按例甄核任其回翔日久必致職業不揚甚非澄敘官聨之道嗣後兵部於軍政時將在京之都統副都統在外之駐防將軍都統副都統各省之提督總兵官分别為三本繕具簡明履厯清單進呈候朕鑒裁以重考績大典著為令是年十月諭據伊勒圖奏稱本年係應軍政之年將伊犂二城滿洲錫伯官員等照例考試分别定議保題等語向來定例伊犁官員等遇軍政之年保舉卓異後不令特行送京引見者原因伊犂為極邉地方往來拮據是以停其特送引見但此等卓異人員軍政大典攸關未經引見而將軍大臣等閲看即為卓異亦不得合宜嗣後伊犂等處官員遇軍政之年將指為卓異者臨時奏聞注册俟伊等應升之缺保送引見時將卓異之處一併聲明具奏俟引見之日朕允準後再準其卓異其協領等內指稱為卓異者亦俟伊犂年滿送京引見之時一併聲明具奏引見之日朕允準後再準其卓異旋議定駐防旗員視地之大小官之多寡以定額黑龍江薦舉七人盛京六人吉林察哈爾各五人西安伊犁各四人江寧杭州荆州烏魯木齊各三人綏逺城寧夏廣州成都熱河密雲各二人山海關涼州青州福州河南太原巴里坤各一人餘無定額舉非其人者論如法入於計典官干六法者謂不謹以下六條五品以下應否引見由部疏請其應革職官罷任候旨曾出征效力以老疾休致者審其資格核其軍功量豫恩俸有差如有原兼世職及世襲佐領者分别降留又上諭京城兵丁三年一次軍政考驗其優者列頭等賞給銀兩劣者斥革所以示勸懲也獨健鋭營外火器營圓明園兵丁未入於考驗嗣後健鋭營外火器營圓明園兵丁亦照京城兵丁例著派出軍政之王大臣一體考驗辦理考察緑營武職鑾儀衛漢冠軍使至整儀尉由本營官注考逹部京營千總以上直省營守備以上以次聼察於其長册注考語定以四格曰才技曰年力曰馭兵曰給餉糾以八法與八旗考察同京營由步軍統領核實逹部直省緑營由總督巡撫提督核實具疏衛所千總由司道注考督撫核疏薦舉必以才技優長年力強壯馭兵有術給餉無虛又核其閲俸三年任內並無恭罰乃為合格其因公降罷而亷能過人者除盜案處分外亦準其卓異合格之逰擊以上引見未滿三年者具奏請旨已滿三年及都司以下均檄令送部引見奉旨準卓異注册候升其既膺薦舉後至下次軍政時或因較俸尚未升用如以考核列入平等者即將上次薦舉卓異加級注銷入於計典官如曽出征受傷著有勞績除犯貪酷外應革職休致者仍給原品其年老而精力未甚衰􅉵尚可辦事者或仍留原任或調補簡缺該督撫提鎮酌量辦理請旨遵行如果不堪録用或豫守糧一分或令子弟入伍以養餘年又以二年半為期甄别緑營將偹由督撫提鎮各簡其所管副將及守偹等官賢能合格者陕甘舉五人直𨽻江南福建浙江湖廣四川廣東各四人山東山西江西廣西雲南貴州各三人河南二人及應劾之將偹均具疏請旨薦舉者豫紀録紏恭者準八法議處如值軍政之年停其甄别三十七年八月諭旗員補用緑營原以滿洲風俗淳朴技藝優􅈺將伊等録用自能為緑營表率以挽漢人習氣而外任所得養亷較多伊等所得既多亦於生計有益此朕教養滿洲奴僕之至意也伊等到任後理應謹守滿洲舊習以技藝為要多方教導毋染漢人習氣不行糜廢守分安常即至回京時僅可度日乃竟有在外全忘滿洲舊習竟染漢人習氣凡事尚華不知撙節任意浮靡又甚至買妾置婢彼此效尤若年老無嗣置妾尚可無故為身體安逸倣效而行此何理乎殊不知朕愛養滿洲奴僕之意著交八旗大臣通行曉諭所管應升外省之侍衛章京官員等嗣後凡補放緑營人等到任後須謹守滿洲淳朴之舊習操演技藝毋效浮華靡費之惡習以作緑營人等之表率如不知悛改仍有似此者一經查出定行從重治罪著交各省總督提督巡撫等除嚴行曉諭各員外留心細查如有故違者即據實參奏母得姑息三十九年十一月諭據周元禮奏查閲營伍情形摺內稱遵化州遊擊佛爾清額墻子路都司福英馬箭均久純熟勒限半年學習再行考驗所辦非是旗員簡用外任原因緑營弓馬平常令其表率俾有所觀法咸成徑旅該員等自當感激朕恩並加奮勉身先倡率訓練兵丁學習弓馬方為無忝委任若徒虛穈亷俸貪逸養安其于滿洲體面盡失尚足為緑營標凖乎今佛爾清額福英馬箭均未純熟致被周元理看出則其生疏不堪可知即不稱將領之任至緑營勒限半年學習舊例在庸懦漢員偶一引用其知恥者尚當赧顔况滿洲弓馬本所嫺習初用時皆經朕引見發往何以甫至外任即盡行荒廢轉欲援緑營漢員之例學習稍有人心者尚不知羞惡若此耶昨因直𨽻副將瑪爾清阿逰擊武靈阿赴東省協勦賊匪頗能奮勉出力不愧滿洲勇敢之風當即加恩升擢用為總兵參將若佛爾清額福英之弓馬生疏豈可復為姑息佛爾清額福英俱著即解任回京引見再降諭旨嗣後各省緑營旗員如有弓馬生疏廢弛隊伍者均著照此例辦理巡防凡巡防之制外海巡防盛京以協領為總巡佐領防禦驍騎校為分巡直省以總兵官為總巡副將以下為分巡各於所治界內率舟師沿海上下更畨往來以詰姦禁暴兩界相交之所屆期會哨同時並聨名申報將軍總督提督察核委官稽查若因風汛阻滯或先或後各以到界之日申報其期約以二四五月為始至九月事竣回營其有引避不巡及巡有不周者論如軍律內河巡防長江自四川巫山而東出三江口至湖廣界過嶽州武昌興國至江西界下九江南昌至江南界經安慶江寧京口狼山東至於海由將軍督撫提鎮分委旗標辨兵沿泝江流上下遊巡及交界之處會巡申報互相考核與外海巡防同若巡海邅風受傷者在外洋官準軍功加級兵準一等傷給賞在內洋官準軍功紀録兵準二等傷給賞身故者在外洋官兵皆照陳亡之例在內洋官照陳亡例減一等兵減半各給恤典若在黃河大江及洞庭洪澤等湖邅風者視外洋賞恤各處墩臺營房國初定邉境設立墩臺營房以司偵瞭遇有緊急舉煙為號寇至百人者挂席一領放炮一聲至三百人者挂席二領放炮二聲至五百人者挂席三領放炮三聲至千人者挂席五領放炮五聲至萬餘人者挂席七領連放炮聲接遞傳逹康熙七年題準各省孔道均設墩臺營房撥兵看守如有緊急軍機接遞傳報乾隆三年奉旨各省水陸孔道之旁設立墩臺駐宿兵丁所以護衛行人稽查匪類朕聞外省情形種種不一其間兵卒成行器械成列於行李往來之時留心防護者有之防汛至二三人而不成行列器械不整者有之營房雖設而閴其無人一任偷竊潛行漫無知覺者亦有之大抵與督撫提鎮等駐劄大營相近者尚覺整齊其逺者即多廢弛夫防汛兵丁既無差操之勞専司稽察之事而乃怠惰縱逸至此則國家設立汛兵之意安在皆該管官辨約束不嚴董率不力有以致之其如何增設懲警之法令督撫提鎮等轉飭所屬將辨實心奉行俾各勤於執業不似從前之耽逸偷安任意曠誤著兵部定議具奏旋議定各省督撫提鎮將所屬地方詳細籌畫除汛兵已經足額者毋庸再行撥補外其有汛兵缺少之處各按地方衝僻情形即行撥補所有器械務須整齊仍令該管官不時察驗倘有離汛偷安曠誤汛防者將兵丁責革别補該管官稽查不力者照約束不嚴例議處欽定八旗通志卷三十八
