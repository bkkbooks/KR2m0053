body:
  text: 兵制志七軍政廵防附凡軍政五年一舉考察中外武職以定黜陟注上考者薦舉卓異注下考者糾劾該管官具疏以聞不入舉劾者以中平注考彚送兵部㑹都察院兵科京畿道察覈題覆奉㫖以卓異加一級注册候陞其以軍政紏劾貪酷革職提問罷軟不謹革職老病休致才力不及降二級浮躁降一級皆調用前有卓異應陞及加級紀錄均不准抵銷考察八旗武職在京管旗大臣及各省將軍都統副都統等俱開列事實清册在京於九月内送部在外於十月内送部兵部彚齊繕具履厯清单進呈至在京文員兼旗下武職者仍於京察時聼該部院衙門考察不在軍政之列鑾儀衛滿洲各官八旗世職人員俱不行考察此外各衙門所屬武職各該管官詳核填注考語定以四格曰操守曰才能曰騎射曰年嵗紏以八法曰貪曰酷曰罷軟無為曰不謹曰年老曰有疾曰浮躁曰才力不及並將各該員履厯及有無在軍前行走受傷得功之處注明分别應去應留造册送部其堪膺薦舉官員必須行止端方弓馬􅈺熟管轄嚴肅當差勤慎不擾該屬給餉無虚考語併厯俸己滿三年任内並無事故並試問國語方准薦舉届期兵部將管旗王貝勒等滿洲䝉古都統前鋒統領䕶軍統領滿洲䝉古副都統滿洲補授漢軍都統副都統兵部滿洲堂官職名開列請㫖派出考察具奏其前鋒營䕶軍營官員軍政卓異由領侍衛内大臣㑹同前鋒䕶軍統領等揀選薦舉至各省駐防官員俱照在京官員之例該將軍都統副都統等考察河南太原二處駐防官員該廵撫考察其良鄉寳坻固安東安覇州采育里保定府雄縣滄州九處駐防官員三年一次派有䕶軍統領或副都統前往廵察管轄即令㑹同該管官考核具奏内外考選軍政册限於本年十月具題乾隆二十四年二月諭向來内外文武三品以上大員遇京察軍政之年援例自陳文具相沿無禆實政曽經降㫖停罷第念伊等洊陟崇階並由特簡其人賢否優劣雖已均在洞鑒然其間亦不乏旅進旅退茍圖持禄戀棧之人若以平時既無大過足干例議又不按例甄核任其廻翔日久必致職業不揚甚非澄叙官聨之道嗣後兵部於軍政時將在京之都統副都統在外之駐防將軍都統副都統各省之提督總兵官分别為三本繕具簡明履厯清单進呈候朕鑒裁以重考績大典著為令是年十月諭㨿伊勒圖奏稱本年係應軍政之年將伊犂二城滿洲錫伯官員等照例考試分别定議保題等語向來定例伊犁官員等遇軍政之年保舉卓異後不令特行送京引見者原因伊犂為極邉地方往來拮据是以停其特送引見但此等卓異人員軍政大典攸闗未經引見而將軍大臣等閲看即為卓異亦不得合宜嗣後伊犂等處官員遇軍政之年將指為卓異者臨時奏聞註册俟伊等應陞之缺保送引見時將卓異之處一併聲明具奏俟引見之日朕允准後再准其卓異其協領等内指稱為卓異者亦俟伊犂年滿送京引見之時一併聲明具奏引見之日朕允准後再准其卓異旋議定駐防旗員視地之大小官之多寡以定額黑龍江薦舉七人盛京六人吉林察哈爾各五人西安伊犁各四人江寜杭州荆州烏魯木齊各三人綏逺城寜夏廣州成都熱河宻雲各二人山海闗凉州青州福州河南太原巴里坤各一人餘無定額舉非其人者論如法入於計典官干六法者謂不謹以下六條五品以下應否引見由部疏請其應革職官罷任候㫖曾出征効力以老疾休致者審其資格覈其軍功量予恩俸有差如有原兼世職及世襲佐領者分别降留又上諭京城兵丁三年一次軍政考騐其優者列頭等賞給銀兩劣者斥革所以示勸懲也獨健鋭營外火噐營圓明園兵丁未入於考騐嗣後健鋭營外火器營圓明園兵丁亦照京城兵丁例著派出軍政之王大臣一體考騐辦理考察緑營武職鑾儀衛漢冠軍使至整儀尉由本營官注考逹部京營千總以上直省營守備以上以次聼察於其長册注考語定以四格曰才技曰年力曰馭兵曰給餉糾以八法與八旗考察同京營由歩軍統領覈實逹部直省緑營由總督廵撫提督覈實具疏衛所千總由司道注考督撫覈疏薦舉必以才技優長年力强壯馭兵有術給餉無虚又覈其閲俸三年任内並無恭罰廼為合格其因公降罷而亷能過人者除盗案處分外亦准其卓異合格之逰擊以上引見未滿三年者具奏請㫖已滿三年及都司以下均檄令送部引見奉㫖准卓異注册候陞其既膺薦舉後至下次軍政時或因較俸尚未陞用如以考核列入平等者即将上次薦舉卓異加級注銷入於計典官如曽出征受傷著有勞績除犯貪酷外應革職休致者仍給原品其年老而精力未甚衰􅉵尚可辦事者或仍留原任或調補簡缺該督撫提鎮酌量辦理請㫖遵行如果不堪錄用或予守糧一分或令子弟入伍以養餘年又以二年半為期甄别緑營将偹由督撫提鎮各簡其所管副将及守偹等官賢能合格者陕甘舉五人直𨽻江南福建浙江湖廣四川廣東各四人山東山西江西廣西雲南貴州各三人河南二人及應劾之将偹均具疏請㫖薦舉者予紀錄紏恭者准八法議處如值軍政之年停其甄别三十七年八月諭旗員補用緑營原以滿洲風俗淳樸技藝優􅈺将伊等錄用自能為綠營表率以挽漢人習氣而外任所得養亷較多伊等所得既多亦於生計有益此朕教養滿洲奴僕之至意也伊等到任後理應謹守滿洲舊習以技藝為要多方教導毋染漢人習氣不行糜廢守分安常即至回京時僅可度日乃竟有在外全忘滿洲舊習竟染漢人習氣凡事尚華不知撙節任意浮靡又甚至買妾置婢彼此效尤若年老無嗣置妾尚可無故為身體安逸倣效而行此何理乎殊不知朕愛養滿洲奴僕之意著交八旗大臣通行曉諭所管應陞外省之侍衛章京官員等嗣後凡補放綠營人等到任後須謹守滿洲淳樸之舊習操演技藝毋效浮華靡費之惡習以作緑營人等之表率如不知悛改仍有似此者一經查出定行從重治罪著交各省總督提督廵撫等除嚴行曉諭各員外留心細查如有故違者即據實叅奏母得姑息三十九年十一月諭據周元禮奏查閲營伍情形摺内稱遵化州遊擊佛爾清額墻子路都司福英馬箭均久純熟勒限半年學習再行考騐所辦非是旗員簡用外任原因緑營弓馬平常令其表率俾有所觀法咸成勁旅該員等自當感激朕恩並加奮勉身先倡率訓練兵丁學習弓馬方為無忝委任若徒虚穈亷俸貪逸養安其于滿洲體面盡失尚足為緑營標凖乎今佛爾清額福英馬箭均未純熟致被周元理㸔出則其生疎不堪可知即不稱將領之任至緑營勒限半年學習舊例在庸懦漢員偶一引用其知恥者尚當赧顔况滿洲弓馬本所嫺習初用時皆經朕引見發往何以甫至外任即盡行荒廢轉欲援緑營漢員之例學習稍有人心者尚不知羞惡若此耶昨因直𨽻副將瑪爾清阿逰擊武靈阿赴東省協勦賊匪頗能奮勉出力不愧滿洲勇敢之風當即加恩陞擢用為總兵叅將若佛爾清額福英之弓馬生疎豈可復為姑息佛爾清額福英俱著即解任回京引見再降諭㫖嗣後各省緑營旗員如有弓馬生疎廢弛隊伍者均著照此例辦理廵防凡廵防之制外海廵防盛京以協領為總廵佐領防禦驍騎校為分廵直省以總兵官為總廵副将以下為分廵各於所治界内率舟師沿海上下更畨往來以詰姦禁暴兩界相交之所屆期㑹哨同時並聨名申報将軍總督提督察覈委官稽查若因風汛阻滯或先或後各以到界之日申報其期約以二四五月為始至九月事竣回營其有引避不廵及廵有不周者論如軍律内河廵防長江自四川巫山而東出三江口至湖廣界過岳州武昌興國至江西界下九江南昌至江南界經安慶江寜京口狼山東至於海由将軍督撫提鎮分委旗標弁兵沿泝江流上下遊廵及交界之處㑹廵申報互相考覈與外海廵防同若廵海邅風受傷者在外洋官准軍功加級兵准一等傷給賞在内洋官准軍功紀錄兵准二等傷給賞身故者在外洋官兵皆照陣亡之例在内洋官照陣亡例减一等兵减半各給卹典若在黄河大江及洞庭洪澤等湖邅風者視外洋賞卹各處墩䑓營房國初定邉境設立墩䑓營房以司偵瞭遇有𦂳急舉烟為號㓂至百人者挂席一領放礮一聲至三百人者挂席二領放礮二聲至五百人者挂席三領放礮三聲至千人者挂席五領放礮五聲至萬餘人者挂席七領連放礮聲接逓傳逹康熙七年題准各省孔道均設墩臺營房撥兵看守如有𦂳急軍機接逓傳報乾隆三年奉㫖各省水陸孔道之旁設立墩臺駐宿兵丁所以䕶衛行人稽查匪類朕聞外省情形種種不一其間兵卒成行器械成列於行李往來之時留心防䕶者有之防汛至二三人而不成行列器械不整者有之營房雖設而閴其無人一任偷竊潛行漫無知覺者亦有之大抵與督撫提鎮等駐劄大營相近者尚覺整齊其逺者即多廢弛夫防汛兵丁既無差操之勞専司稽察之事而乃怠惰縱逸至此則國家設立汛兵之意安在皆該管官弁約束不嚴董率不力有以致之其如何增設懲警之法令督撫提鎮等轉飭所屬將弁實心奉行俾各勤於執業不似從前之躭逸偷安任意曠誤著兵部定議具奏旋議定各省督撫提鎮將所屬地方詳細籌畫除汛兵已經足額者毋庸再行撥補外其有汛兵缺少之處各按地方衝僻情形即行撥補所有器械務須整齊仍令該管官不時察驗倘有離汛偷安曠誤汛防者將兵丁責革别補該管官稽查不力者照約束不嚴例議處欽定八旗通志卷三十八
