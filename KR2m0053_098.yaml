body:
  text: 典禮志七八旗冠服宗室王公冠服官員兵丁冠服公主王妃等冠服冠服通例宗室王公冠服親王吉服冠頂用紅寶石賜紅絨結頂者亦得用之冬用海龍薫貂紫貂夏織玉草或藤竹絲為之紅紗綢裏石青片金緣上綴朱緯下至貝勒皆同帶用金鑲玉板四片共嵌東珠四顆端罩青狐為之月白縀裏曽賜金黄色者亦得用之左右垂帶各二下至貝子固倫額駙皆同補服色用石青五爪四團龍補前後正龍兩肩行龍朝服蟒袍藍及石青諸色隨所用曽賜金黄者亦得用之坐褥冬用猞猁猻緣貂皮夏用五爪龍紅縀襯紅白氊親王世子朝冠頂金龍二層飾東珠九上啣紅寶石夏朝冠前綴舍林飾東珠五後綴金花飾東珠四帶金鑲用金黄色銜玉方版四每具飾東珠三左右佩縧如帶色補服朝服蟒袍與親王同坐褥冬用貂皮緣猞猁猻夏用四爪蟒紋藍縀郡王朝冠頂金龍二層飾東珠八上銜紅寶石夏朝冠前綴舍林飾東珠四後綴金花飾東珠三帶用金黄色金銜玉方版四每具飾東珠二貓睛石一補服色用石青繡五爪行龍兩肩前後各一餘皆如親王世子貝勒朝冠頂金龍二層飾東珠七上銜紅寶石夏朝冠前綴舍林飾東珠三後綴金花飾東珠二帶用金黄色金銜玉方版四每具飾東珠二補服色用石青前後繡四爪正蟒各一團朝服蟒袍均不得用金黄色朝服之制如郡王通繡蟒紋皆四爪蟒袍如之坐褥冬用猞猁猻皮夏用藍粧花縀餘如郡王貝子朝冠頂金龍二層飾東珠六上銜紅寶石戴三眼孔雀翎夏朝冠前綴舍林飾東珠二後綴金花飾東珠一帶用金黄色金銜玉方版四每具飾東珠一補服色用石青前後繡四爪行蟒各一團坐褥冬用豹皮夏用藍縀緣以粧緞鎮國公朝冠頂金龍二層飾東珠五上銜紅寶石戴雙眼孔雀翎夏朝冠前綴舍林飾東珠一後綴金花飾緑松石一端罩紫貂為之帶用金銜玉方版四每具飾貓睛石一補服色用石青前後繡四爪正蟒方補坐褥冬用紅豹皮夏用紅閃縀襯紅氊朝服藍及石青諸色隨用披領及袖俱石青片金緣冬加海龍緣兩肩前後正蟒各一要帷行蟒四中有襞積裳行蟒八十一月朔至上元披領及裳俱表以紫貂袖端薫貂兩肩前後正蟒各一襞積行蟒四皆四爪袍通繡九蟒皆四爪曾賜五爪蟒縀者亦得用之侯伯子男同輔國公朝冠頂金龍二層飾東珠四上銜紅寶石戴雙眼孔雀翎坐褥冬用紅豹皮去首尾夏用青閃縀餘與鎮國公同鎮國将軍朝冠頂鏤金花座上銜紅寶石中飾東珠一吉服冠用珊瑚頂帶用金銜方玉版每具嵌紅寶石一補服前後繡麒麟餘與鎮國公同輔國将軍朝冠頂鏤金花座上銜鏤花珊瑚中飾小紅寶石一帶用圓金版每具嵌紅寶石一補服前後繡獅餘與鎮國公同奉國将軍朝冠頂鏤花金座上銜藍寶石中飾紅寶石一吉服冠用藍寶石頂帶用起花金圓版補服前後繡豹朝服兩肩前後正蟒各一要帷行蟒四中有襞積裳行蟒八餘與鎮國公同奉恩将軍朝冠頂鏤花金座上銜青金石中飾藍寶石一吉服冠用青金石頂帶用起花金鑲銀圓版補服前後繡虎蟒袍通繡八蟒皆四爪餘與鎮國公同閑散宗室四品官頂准其穿用四品武職補服王貝勒貝子入八分公之子應封者親王之子給頭品官頂郡王貝勒之子給二品官頂貝子入八分公之子給三品官頂王貝勒貝子入八分公承繼之子例不應封者戴用三品官頂盛京宗室與在京宗室一體給與官頂親王以下宗室以上俱繫金黄帶覺羅繫紅帶公主王妃等冠服固倫公主冠頂金佛簪項圈用東珠十服色用翟鳥五爪四團龍補和碩公主冠頂金佛簪項圈用東珠九服色視和碩大福晉例郡主冠服崇徳元年定冠頂大簪舍林項圈各嵌東珠六顆和碩格格帽頂大簪金佛項圈各嵌東珠八顆耳墜項圈金佛大簪所用東珠重五分衣服不許繡鳳及用黄縀和碩格格即郡主和碩郡主冠頂金佛簪項圈用東珠八服色用翟鳥蟒縀帽頂大簪金佛項圈各嵌東珠七顆縣主冠頂金佛簪項圈用東珠七服色蟒縀粧縀各色縀俱許酌用帽頂大簪金佛項圈各嵌東珠六顆郡君冠頂金佛簪項圈用東珠六服色與縣主同縣君冠頂金佛簪項圈用東珠五服色與郡君同鄉君冠頂金佛簪項圈用東珠四服色與縣君同貝子公等側室女降等冠服王貝勒側室女封授比嫡女既降二等冠服各項俱照所降品級服用貝子鎮國公輔國公側室女雖降等食五品六品俸其冠頂服色與縣君同和碩親王大福晉冠頂金佛簪項圈用東珠十服五爪龍滿粧縀四補衣用翟鳥蟒縀粧縀補子等縀世子大福晉冠頂金佛簪項圈用東珠九服色俱視和碩大福晉例郡王大福晉冠頂金佛簪項圈用東珠八服色用翟鳥蟒縀粧縀補子等縀貝勒大福晉冠頂金佛簪項圈用東珠七服色蟒縀粧縀各色縀俱許酌用貝子大福晉冠頂金佛簪項圈用東珠六服色與貝勒福晉同鎮國公夫人冠頂金佛簪項圈用東珠五服色蟒縀粧縀各色縀俱許酌用輔國公夫人冠頂金佛簪項圈用東珠四服色與鎮國公夫人同婦女冠服命婦照伊夫品級服用皇后侍從婦女冠用金頂上銜紅寶石貴妃侍從婦女冠用金頂上銜藍寶石妃侍從婦女冠用金頂上銜水晶石親王妃郡王妃侍從婦女與妃侍從婦女同貝勒夫人侍從婦女冠用金頂貝子夫人侍從婦女冠不許用頂各樣首飾俱許嵌珍珠寶石緑松石品宦等冠服民公朝冠頂鏤金花座上銜紅寶石中飾嵌東珠四吉服冠用珊瑚頂端罩貂皮為之補服前後繡四爪正蟒朝服兩肩前後正蟒各一要帷行蟒四中有襞積裳行蟒八蟒袍通繡九蟒四爪帶用金鑲圓玉版四每片嵌貓睛一顆坐褥冬用虎皮夏用閃縀襯紅氊侯伯朝冠頂鏤金花座上銜紅寶石侯飾東珠三顆伯飾東珠二顆吉服冠用珊瑚頂帶用金鑲圓玉版四侯每具飾緑松石一伯飾紅寶石一坐褥冬用虎皮去首尾夏侯用青色緑花閃縀伯用藍雲縀餘與民公同子朝冠頂鏤金花座上銜紅寶石中飾東珠一吉服冠用珊瑚頂補服前後繡麒麟帶用金銜方玉版四每具飾紅寶石一餘皆視一品男朝冠頂鏤金花座上銜鏤花珊瑚中飾紅寶石一吉服冠用鏤花珊瑚頂補服前後繡獅帶用鏤金圓版四每具飾紅寶石一餘皆視二品固倫公主額駙冠服與貝子同若原係貝勒以上各照封爵服用吉服冠用珊瑚頂和碩公主額駙冠服與鎮國公同如封爵在公上者各照封爵服用郡主額駙冠服視武一品帶用金銜圓玉版四每具飾緑松石一餘與侯伯同縣主額駙冠服視武二品餘與輔國将軍同坐褥冬用獾皮夏用青布緣紅布襯紅氊郡君額駙冠服視武三品坐褥冬用貉皮夏用青布襯紅氊餘與奉國将軍同縣君額駙冠服視武四品帶用鍍金方鐵板四坐褥冬用青山羊皮夏用藍布襯白氊餘與奉恩将軍同鄉君額駙冠服視武五品帶用鍍金圓鐵板四坐褥冬用鹿皮夏用白氊官員頂帶都統尚書冠頂上銜紅寶石帶用金圓版四飾紅寶石四内大臣大學士副都統䕶軍統領前鋒統領侍郎冠頂上銜藍寶石帶用金圓版四一等侍衛䕶衛㕘領前鋒㕘領學士滿啟心郎郎中冠頂上銜水晶帶用鍍金鐵版四二等三等侍衛䕶衛佐領員外郎冠用金頂帶用鍍金圓鐵板四䕶軍校主事冠用金頂帶用鍍金圓鐵板二崇徳二年諭曰昔金熙宗及金主亮廢其祖宗時衣冠儀度循漢人之俗遂服漢人衣冠盡忘本國言語迨至世宗始復舊制衣冠凡言語及騎射之事時諭子孫勤加學習如元王馬大郭遇漢人訟事則以漢語訊之有女直人訟事則以女直語訊之世宗聞之以其未忘女直之言甚為嘉許此本國衣冠言語不可輕變也我國家以騎射為業今若不時親弓矢惟耽宴樂則田獵行陣之事必致疎曠武備何由而得習乎葢射獵者演武之法服制者立國之任朕欲爾等時時不忘騎射勤練士卒凡出師田獵許服便服其餘俱令遵照國初之制仍服朝衣且諄諄訓諭者非為目前起見也及朕之身豈有習於漢俗之理正欲爾等識之於心轉相告誡使後世子孫遵守毋變棄祖宗之制耳雍正元年五月奉上諭大小官員有一定之品級即有一定之服式所以重名器也近多不按品級輒帶數珠馬項懸纓前用導馬更有将綢為坐具者尤為僭越嗣後應各按品級遵奉定例而行着八旗大臣步軍統領衙門都察院衙門嚴行稽查如有此等之人即行指㕘若大臣官員等徇情疎忽經朕查出将伊等一併議處再舊例諸王等以數珠鞍轡賞伊屬下者許其服用此等人員難於稽查嗣後着将賞用之處行文該旗存案年底彚奏如此則等威有辨而僭越者少矣乾隆十七年三月二十日奉上諭朕恭閲太宗文皇帝實錄内載崇徳元年十一月癸丑日上御翔鳳樓集諸親王郡王貝勒固山額真都察院官命宏文院大臣讀大金世宗本紀上諭衆曰爾等審聴之世宗者蒙古漢人諸國聲名顯著之賢君也故當時後世咸稱為小堯舜朕批覽此書悉其梗槩殊覺心往神馳耳目倍加明快不勝嘆賞朕思金太祖太宗法度詳明可垂久逺至熙宗合喇及完顏亮之世盡廢之躭於酒色盤樂無度效漢人之陋習世宗即位奮圖法祖勤求治理惟恐子孫仍效漢俗預為禁約屢以無忘祖宗為訓衣服語言悉遵舊制時時練習騎射以備武功垂訓如此後世之君漸至懈廢忘其騎射至於哀宗社稷傾危國遂滅亡乃知凡為君者耽於酒色未有不亡者也先時儒臣巴充什達海庫爾纒屢勸朕改滿洲衣冠效漢人服飾制度朕不從輒以為朕不納諌朕試設為比喻如我等於此聚集寛衣大袖左佩矢右挾弓忽遇碩翁科羅巴圖魯勞薩挺身突入我等能禦之乎若廢騎射寛衣大袖待他人割肉而後食與尚左手之人何以異耶朕發此言實為子孫萬世之計也在朕身豈有更變之理恐日後子孫忘舊制廢騎射以效漢俗故常切此慮耳我國士卒初有幾何因嫻於騎射所以野戰則克攻城則取天下人稱我兵曰立則不動摇進則不回顧威名震懾莫與爭鋒此番往征燕兵出邊我之兵威竟為八大臣所累矣故諭爾等其謹識朕言欽此朕每敬讀聖謨不勝欽凜感慕深惟國家開創之時待我祖宗躬親勞瘁勤求治理矩䕶相傳㒺敢渝越以立萬世之丕基至於今咸受無疆之福者皆仰遵明訓所致也我朝滿洲光正遺風自當永逺遵循守而勿替是以朕常躬率八旗臣僕行圍較獵時時以學習國語熟練騎射操演技勇諄切訓誨無非率由舊章期以傳之奕䙫永緜福祚惟是我皇祖太宗聖訓所垂載在實録若非刋刻宣示則累朝相傳之家法外庭臣僕何由共悉且自古顯謨令典多勒之金石暁諭羣工我皇祖太宗之睿聖特申誥誡昭示來茲益當敬勒貞珉永垂法守著於紫禁箭亭御園引見樓及侍衛教場八旗教場各立碑刋刻以昭朕紹述推廣至意俾我後世子孫臣庶咸知滿洲舊制敬謹遵循學習騎射嫻熟國語敦崇淳樸屏去浮華毋忽稍有怠惰式克欽承彞訓冀億萬世子孫共享無疆之庥焉三十七年十月奉上諭朕閲三通館進呈所纂嘉禮考内于遼金元各代冠服之制敘次殊未明晰遼金元衣冠初未嘗不循其國俗後乃改用漢唐儀式其因革次第原非出于一時即如金代朝祭之服其先雖加文飾未至盡去其舊至章宗乃槩為更制自應詳考詮次以徵蔑棄舊典之由並酌入按語俾後人知所鑒戒于輯書闗鍵方為有當若遼及元可例推矣前因編訂皇朝禮器圖曽親製序文以衣冠必不可輕言改易及批通鑑輯覽又一一發明其義誠以衣冠為一代昭度夏收殷􅒐本不相沿襲凡一朝所用原各自有法程所謂不忘其本也自北魏始有易服之説至遼金元諸君浮慕好名一再世輒改衣冠盡失其淳樸素風傳之未久國勢寖弱洊及淪胥蓋變本忘先而隠患中之覆轍具在甚可畏也况揆其所以議改者不過云衮冕備章文物足觀耳殊不知潤色彰身即取其文亦何必僅沿其式如本朝所定朝祀之服山龍藻火燦然具列悉皆義本禮經更何通天絳紗之足云耶且祀莫尊於天祖禮莫隆於郊廟溯其昭格之本要在乎誠敬感通不在乎衣冠規製夫萬物本乎天人本乎祖推原其義實天逺而祖近設使輕言改服即已先忘祖宗将何以上祀天地經言仁人饗帝孝子饗親試問仁人孝子豈二人乎不能饗親顧能饗帝乎朕確然有見於此是以不憚諄復教戒俾後世子孫知所法守是創論實格論也所願奕葉子孫深維根本之計毋為流言所惑永永恪遵朕訓庶㡬不為𫉬罪祖宗之人方為能享上帝之主于以永綿國家億萬年無疆之景祚實有厚望焉其嘉禮考仍交館臣悉心確核遼金元改制時代先後逐一臚載再加擬按語證明改繕進呈候朕鑒定昭示來許並將此申諭中外仍録一通懸勒上書房國謹案我東土風尚樸淳衣冠服飾聿昭一代家肇興制度之宜世守㒺替我列聖相承家皇上恪遵漸洵足垂億萬年法守謹將法防微杜祖諭訓具載於八旗冠服之次聖欽定八旗通志卷八十四
