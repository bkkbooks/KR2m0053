body:
  text: 欽定四庫全書欽定八旗通志卷一百五十六人物志三十六大臣傳二十二滿洲正白旗一景扈爾漢堪康果禮固勒岱武理逹音布喀英俄爾岱篤蘇納蒙阿什達爾漢雅賴巴理阿圗薩穆什扈爾漢扈爾漢姓佟佳世居雅爾古寨後𨽻滿洲正白旗太祖髙皇帝戊子年從其父扈喇虎率所屬來歸恩遇之賜姓覺羅尋授一等大臣居五大臣之列扈爾漢感上撫育恩誓以戎行效死每出戰輒為前鋒瓦爾喀部蜚悠城長䇿穆特黑者苦烏喇貝勒布占泰之虐請內附上命扈爾漢隨貝勒舒爾哈齊往徙之扈爾漢以兵三百護五百户先行烏喇聞之遣萬人邀諸路扈爾漢結寨山巔分百人衛降者身率二百人與烏喇軍相持不下翼日敵悉衆來戰同揚古利擊却之丁未年從貝勒巴雅喇等征東海窩集部有功己酉年復率兵千人征窩集部所屬滹野路盡降其部落收二千户而還太祖嘉之賞甲胄駟馬賜號達爾漢辛亥年同何和里等征窩集部之呼爾哈路圍扎庫塔城三日攻克之癸丑年從征烏拉乘勢奪門遂克其城天命元年同安費揚古統兵二千征東海薩哈連部至兀爾簡河刳舟二百水陸並進收河南北三十六寨黑龍江北十一寨又招降使犬諾洛石拉欣諸部長四年明兵四道來侵扈爾漢從擊撫順開原二路大敗其衆明總兵劉綎復由寬奠口進棟鄂路扈爾漢先奉命率大兵千人伏山隘以扼其衝衆貝勒繼至引左右兩翼兵夾攻綎倉卒不及陳殱其兵五萬人綎戰死先是扈爾漢率兵往禦棟鄂路遇明逰擊喬一琦擊敗之一琦奔孤拉庫崖朝鮮營自縊死明年上復征明扈爾漢從又擊敗明總兵賀世賢等軍于瀋陽厯加世職至三等總兵官八年十月卒年四十八太祖親臨哭之以其子渾塔襲職武理堪子武拜武理堪姓瓜勒佳世居義屯父伊蘭柱徙居哈達之費德里太祖髙皇帝未滅哈達時武理堪來歸嵗癸巳葉赫貝勒布齋紏哈達烏拉輝發科爾沁席北卦爾察珠舍里訥殷諸路兵來侵武理堪奉命偵敵出東道百餘里將陟嶺羣鴉噪集馬前若阻其行武理堪心異之自度與敵左馳歸以告復奉命出扎喀路薄暮至渾河敵營河北方會食武理堪擒葉赫一卒訊之言敵衆三萬將乘夜渡沙濟嶺而進遂携以還報時夜方半傳諭諸將俟達旦出師我兵有謂敵兵衆者武理堪宣言曰敵雖衆心不一誰能禦我及戰諸路敵兵果潰布齋為我兵吳談所殺天命四年明分兵四路來侵太祖親統師擊之敗其三路兵明經略楊鎬􅊾總兵李如柏引兵還瀋陽武理堪率二十騎至呼蘭山見敵軍行山麓乃於山嶺駐馬大呼手弓四顧為指麾伏兵狀敵望見驚潰武理堪遂縱騎疾馳擊之斬四十人獲馬五十敵相蹂踐死者千餘初定滿洲旗制武理堪𨽻正白旗分轄人户為佐領每有征伐任前鋒統領既卒太祖追念曰武理堪從朕摧鋒陷陳幾死者數矣以其長子武拜襲管佐領事武拜年十六即隨大軍略明撫順所遇敵輒奮戰矢中顙不顧嘗從太祖出獵有熊突圍騰上峻嶺太祖遙見一人躍馬射熊貫胸而墮諭侍臣雅蓀曰是非武拜不能遣視之果然復諭諸皇子曰武拜之勇今共見之矣遂授侍衛天命四年從征葉赫負重創力戰不退師還賜良馬是時明總兵毛文龍誘我新附之衆往歸皮島武拜循徼三日擒八十餘人其來誘者乘騎遁追及射殪之還奏即以所獲賜之管轄六年從征明破敵於南夀山授騎都尉世職遼陽既下諸將分𨽻所俘有差太祖以武拜能繼父志年少建功命視一等大臣例𨽻千人十一年蒙古巴林部貝勒囊努克背盟劫掠武拜隨大軍征之我諜者為敵困援之出殱敵百人太宗文皇帝初即位擢列十六大臣佐理鑲白旗事奉命追捕叛逃蒙古至都爾弼有十五人拒戰武拜既被創仍奮擊盡殱之太宗諭諸大臣曰是固先帝數嘉許者特豫優賚天聰四年大軍取明永平灤州武拜隨貝勒阿敏守永平聞明兵圍灤州率護軍馳援乘夜破明步兵營會阿敏棄永平武拜隨歸逮繫論罪以其曽夜入敵營破敵命釋其縳尋授前鋒參領五年從征明圍大凌河城同參領蘇達喇赴錦州偵敵有斬獲六年從征察哈爾率精鋭先驅遇叛逃蒙古五人斬首以獻察哈爾林丹汗携其丁壯牲畜渡黃河西奔土默特部大軍還克歸化城武拜奉命撫輯降户八年征明大同額駙多爾濟將中軍前鋒統領圖魯什將左軍武拜將右軍明總兵曹文詔迎戰敗之復同恭領席特庫薩海設伏宣府擒明守備殱其遊騎尋與承政阿什達爾漢等招察哈爾汗之子額哲及其大臣來歸九年五月明屯兵大凌河西武拜與都統阿山石廷柱圗賴邀截其歸路陳斬副將劉應選殱步騎五百餘擒逰擊曹得功及守備三人攻克松山城南臺堡師還復設伏敗敵兵敘功晉三等輕車都尉世職是時上遣諸貝勒征明朔州代州欣州命武拜率兵駐上都城舊址偵軍事會軍中遣使奏捷遂與俱歸崇德元年同前鋒統領勞薩等齎書至喜峯口潘家口諭明守邉將吏斬其邏卒二十三人擒二人獲馬十是年冬上親征朝鮮命同承政馬福塔等率兵三百先行襲其國都敗拒戰兵國王李倧潛遁南漢山城大軍進圍之武拜與勞薩殱敵援兵二百餘二年授前鋒統領列議政大臣時參領丹岱阿爾津等往土默特貿易將還遣武拜率將校赴歸化城護之遇明哨卒十六人斬十五人獲馬十九擒一人以還三年四月略明寧逺逐敵墮壕塹斬殪甚衆八月率兵八十人至洪山口遇明兵斬其禆將二擊走羅文峪騎兵五百奪其纛獲馬四十又殱密雲步兵百餘五年與勞薩率兵過中後所略海濱斬級二百獲馬騾牲畜旋受上方略䇿應圍錦州大軍駐要隘屢擊敗敵兵明年春以大軍攻圍錦州弗力論統師王貝勒及諸將罪武拜坐罰鍰秋上親征松山明兵敗遁武拜未截擊命拘繫旋釋之七年隨貝勒阿巴泰入明邉敗敵於豐潤三河靜海及青州八年隨鄭親王濟爾哈朗取明中後所前屯衛是年十一月改任正白旗副都統世祖章皇帝順治元年隨睿親王多爾衮入山海關擊敗流賊李自成追至望都逾年解副都統任列內大臣三年蘇尼特部長騰機思叛武拜隨豫親王多鐸征之斬獲無算四年同輔國公鞏阿岱內大臣何洛會率兵駐防宣府先是兩敘軍功晉一等輕車都尉至是論征騰機思功晉爵一等子屢遇恩詔晉二等伯八年同內大臣洛什博爾輝等舉發英親王阿濟格謀干政事優敘三等侯未幾洛什博爾輝以諂媚諸王造言構釁伏誅武拜坐附和削職籍沒十五年世祖念武拜戰陳功命復一等子爵世襲罔替康熙四年四月卒年七十賜祭葬如例諡曰果壯子郎坦襲爵别有傳康果禮子邁色康果禮先世居那木都魯以地為氏嵗庚戌太祖髙皇帝命巴圗魯額亦都率兵千人征東海窩集部招降那木都魯寧古塔尼馬察諸路屯長昻古明安圗巴顔烏祿喀僧格尼喀里泰松阿等時康果禮為綏芬屯長與其弟喀克都哩哈哈納綽和納伊勒占蘇爾休率丁壯千餘來歸賜金幣宴勞授康果禮喀克都哩三等子哈哈納三等男綽和納三等輕車都尉伊勒占蘇爾休騎都尉分轄其衆為世管佐領六𨽻滿洲正白旗旋以貝勒穆爾哈齊女妻康果禮封和碩額駙天命三年大兵征明取撫順克撫安三岔等十一堡進雅鶻關破清河城康果禮並在事有功六年從大兵征明瀋陽樹雲梯先登遂克其城太宗文皇帝初即位以康果禮列十六大臣佐理正白旗事尋擢護軍統領天聰元年隨大貝勒阿敏征朝鮮凱旋分賜所俘獲三年從上征明入洪山口克遵化城薄燕京上親統大軍駐德勝門外明寧逺巡撫袁崇焕錦州總兵祖大夀率兵二萬赴援屯於城東南上命康果禮隨諸貝勒擊之諸貝勒擊敗敵兵俱追至城壕康果禮與恭領郎球漢岱等未至城壕而返並論罪削爵罰鍰奪俘獲五年卒子六人次子色琥德承管佐領第三子邁色任護軍恭領隨征明錦州禦敵塔山殁於陳第四子賴塔别有傳景固勒岱從弟崇阿景固勒岱姓扎庫塔初居呼爾哈部烏拉招之降不從太祖髙皇帝遣兵征東海窩集部景固勒岱聞風徒步來歸遂隨征呼爾哈部追獲叛逃降人偕衆攻取烏爾固辰路斬獲甚衆尋携其家室兄弟及所屬三十户俱至𨽻滿洲正白旗任佐領天命三年從上征明進鴉鶻關攻克清河城擢參領仍兼佐領後大軍取明瀋陽遼陽景固勒岱並在事有功太宗文皇帝天聰八年五月豫二等輕車都尉世職十二月命同參領武巴海統兵四百征瓦爾喀部招降屯長芬達哩及屯衆五百餘户俘阿庫里尼滿部千餘人獲貂虎狐貉舍利猻水獺青鼠等皮無算九年六月凱旋命禮部諸臣出迎宴勞即以所獲分賜敘功晉世職一等輕車都尉崇德二年隨武英郡王阿濟格攻明皮島克之賜裘服鞍馬銀布駝牛諸物世祖章皇帝時屢遇恩詔晉爵至二等男順治十一年八月卒賜祭葬如例諡曰忠直從弟崇阿任佐領天聰八年隨征明大同略回雁堡我兵三人為敵所圍崇阿奮勇援出之崇德元年隨征朝鮮破敵於桃山村六年隨鄭親王濟爾哈朗圍明錦州會蒙古烏巴什等遣人約降我軍克其外城敵猶巷戰崇阿偕衆擊敗之七年隨貝勒阿巴泰征明入邉敗敵兵於渾河岸進至山東克夀光縣城敘功豫雲騎尉世職順治元年隨豫親王多鐸追流賊李自成至潼關屢擊敗來犯賊衆二年隨大軍下浙江攻拔湖州城進取福建擊敗明唐王朱聿鍵兵衆於福寧晉世職騎都尉五年隨征南大將軍談泰征江西叛鎮金聲桓敗賊黨王得仁於南昌其冬廣東叛鎮李成棟犯贑州以應聲桓崇阿同副都統覺善往援會巡撫劉武元總兵胡有升等內外夾擊成棟大敗單騎遁走六年破賊兵二萬於南康進圍信豐克之成棟溺水死凱旋敘功晉世職三等輕車都尉屢遇恩詔晉一等輕車都尉景固勒岱之卒也無子以崇阿襲二等男爵别以其弟之子巴音布襲一等輕車都尉世職十三年十月以景固勒岱親弟之子富勒都襲二等男爵仍復崇阿一等輕車都尉聖祖仁皇帝康熙十八年崇阿乞休以其子采住襲達音布子岱衮達音布姓他塔喇世居扎庫木天命三年來歸𨽻滿洲正白旗任佐領隨太祖髙皇帝征伐輒為前鋒多所斬獲授騎都尉世職時諸部歸順者為蒙古所誘數逃去逹音布同副都統楞額禮率兵追至達岱塔敗蒙古步騎兵俘獲逃人無算六年太祖親統兵征明奉集堡達音布先驅擒斬諜卒擊敗敵衆纍功晉三等輕車都尉先是蒙古扎魯特貝勒昻安執我使臣送葉赫為所害又數遣兵要劫我使奪牲畜八年太祖命貝勒阿巴泰等統兵三千往征之時達音布任前鋒統領率精鋭五十人乘夜渡遼河縱兵疾趨先至厄爾格勒知為昻安所屬地遂馳百餘里與參領雅希禪侍衛博爾晉合兵進攻搗其巢昻安以二十餘人挽牛車載妻子遁達音布與雅希禪等引三十餘騎疾馳躡昻安及之騎士皆環立昻安直趨達音布達音布迎擊昻安敗走達音布彎弓注矢將射之昻安從者猝以小鎗迎剌達音布中口墮馬創甚而歿雅希禪等縱騎擊之斬昻安盡殱其衆師還命以所俘獲分賞從征將士恩恤陳亡者以達音布長子阿哈尼堪襲職卒無嗣天聰八年太宗文皇帝追録勳臣賜敕復以達音布次子阿濟格尼堪襲别有傳三子岱衮纍從征伐授一等侍衛崇德二年從圍錦州攻明總督洪承疇第三營力戰陳亡恤贈騎都尉世職子伊密遜襲英俄爾岱英俄爾岱姓他塔喇世居扎庫木太祖髙皇帝時從其祖岱圗庫哈理來歸授佐領𨽻滿洲正白旗會界藩人犯境英俄爾岱奮勇迎敵破之於薩爾滸天命四年隨大兵征明攻開原有蒙古巴圗魯阿布爾者素驍勇降明為邉將出戰英俄爾岱馳斬之六年克瀋陽授三等輕車都尉復進擊明鐵嶺兵斬蒙古二人克遼陽晉二等天聰三年從太宗文皇帝征明克遵化等十一城進攻明北京英俄爾岱與文臣范文程等留守遵化是年大兵所下石門驛馬蘭峪三屯營大安口及灤陽營等城俱叛明兵夜至遵化合攻英俄爾岱率兵擊却之平旦敵騎兵列陳以待我師將出戰敵縱兵突入我步軍營英俄爾岱麾其衆鼓勇奮擊敵兵退走斬殿後者五人擒一人敵宵遁我師躡其後復斬騎兵百步卒千餘遂以書諭降諸城五年授户部承政七年奉命使朝鮮遺書責其王李倧倧上書報謝八年五月晉一等輕車都尉六月察哈爾林丹漢遁走所屬皆降上命英俄爾岱同副都統布爾吉率師偵之道遇察哈爾來歸户口千餘因率其部長上謁進獻裘馬先是英俄爾岱與布爾吉遇察哈爾台吉布顔圗部衆招之降不從誅二百餘人俘獲其衆還奏得賞賜至是布顔圖餘衆三十人來奔告曰前者欲降不允遂見屠僇幸逃匿得餘生也上怒命盡追奪所賜物尋以考滿晉爵三等男崇德元年八旗及蒙古諸貝勒以太宗功德日盛宜正位號議令朝鮮王李倧亦具表啓請遣英俄爾岱及參政馬福塔尼堪率諸貝勒使者致書朝鮮比至倧不見亦不納所致書陽令國人延英俄爾岱等至議政府潛以兵環守英俄爾岱率諸使者奪民馬乘之突門出走倧遣騎以報書追及而别以書誡其邉臣令固守英俄爾岱等併奪之以聞道遇明皮島兵遮我歸路擊走之是年七月以額駙佟養性嫁女用六十人為媵僕英俄爾岱知之不行阻止論罰鍰二年正月上親征朝鮮克其國都圍李倧於南漢山城命英俄爾岱與馬福塔賫敇諭之倧感激稱臣以奏書至遂出降英俄爾岱復承旨送倧還國都七月都統鄂莫克圖為貝勒豪格脅娶蒙古台吉博洛女事下部議英俄爾岱實先見其女以告鄂莫克圖及鄂莫克圖往視英俄爾岱復以其言告貝勒坐諂媚論罰贖十月賫敕册封朝鮮朝鮮王敬謹無失禮三年以承政韓大勳盜取庫物事坐稽察疏忽議應革世職得旨寬免仍論罰四年復坐失察家人索借官商財物論革世職罰贖詔並免之尋授都統五年偕鄂莫克圖等往朝鮮義州詰李倧罪六年三月奉詔丈量地畝以道遇出征錦州軍離城逺駐不為阻還朝又不以奏論罰贖六月睿親王多爾衮復圍錦州英俄爾岱率師往濟其軍至則駐營髙橋與大軍會明兵望風引遁九月隨貝勒多鐸等圍守松山城七年七月有副都統布山者以隱匿姦宄下獄尋遇恩赦令睿親王多爾衮約束不許隨征從獵及私往莊屯英俄爾岱為之私請於睿親王令其往近邉牧馬處行走部議英俄爾岱應罰鍰復奉旨寬免八月往朝鮮鞫獄還奏稱旨八年考滿晉三等子順治元年從睿親王入山海關破流賊李自成是年改承政為尚書英俄爾岱仍任户部二年敘先後功超升三等公三年奏請禁民間私售馬騾軍械火器以杜盜源從之四年復以考滿晉二等公五年二月卒年五十三英俄爾岱以娶饒餘郡王女授多羅額駙任户部尚書十餘年既為都統仍攝部務太宗嘗諭六部諸臣曰英俄爾岱素性執拗而於本旗人亦間有徇庇朕思有全德者少彼能盡心部務辦事明決朕甚嘉之其餘各部大臣不如彼者多矣子伊圖襲爵仕至內大臣蘇納蘇納姓納喇葉赫貝勒錦台什同族太祖髙皇帝創業時蘇納棄兄弟來歸命尚主為額駙編所屬人户任佐領𨽻滿洲正白旗天命四年太祖既滅葉赫命蘇納收其親屬並領之十年授參領以其從征有功賜敕免死四次尋擢副都統天聰元年太宗文皇帝親征明錦州以大貝勒莽古爾泰等帥偏師衛塔山運糧軍命蘇納統八旗蒙古兵驍壯者截守塔山西路遇明兵二千來戰蘇納領纛前進擊敗之乘勝追擊俘斬無算獲馬百五十餘賜所俘獲以犒其軍三年春同都統武訥格率精兵八十人及蒙古軍征察哈爾降其邉境二千户比聞降者瞷我兵少謀害我兵以歸明於是盡殱其男子釋二台吉俘婦女八千有竒還以所獲頒賜出征將士有差旋奉諭責其殺降奪所給牲畜十月以蒙古人有自察哈爾逃入明國者命同武訥格率兵四百人追躡捕獲百人驅馬駝牛羊以歸五年授護軍統領擢兵部承政從征明圍大凌河城擊敗出戰敵衆及錦州援兵敘功授騎都尉世職八年考滿晉三等輕車都尉命免徭役専管佐領九年正月以隱匿丁壯削世職七月任鑲白旗蒙古都統崇德元年從武英郡王阿濟格征明北京攻雕鶚長安諸嶺及昌平等城敗敵五十六次復同步軍統領薩穆什喀合攻容城縣取之及還以先衆出邉致後隊為敵敗潰坐罰鍰奪所俘獲十二月從征朝鮮其寧邉城將率步騎兵千餘來援蘇納及副都統吳塔齊等奪勇邀擊大敗之生擒其將二年六月法司議蘇納於朝鮮國王朝謁時亂班釋甲又擅離大軍由捷徑歸坐罰鍰三年八月以都統阿山之子塞赫為正藍旗洪科訐告臨陳退避鞫訊不實蘇納徇洪科證其事坐罰鍰罷都統任仍專管佐領事順治五年以疾卒世祖章皇帝以其子蘇克薩哈有功授三等輕車都尉念蘇納為勞績舊臣追復原職令蘇克薩哈併襲之蘇克薩哈别有傳阿什達爾漢阿什達爾漢姓納喇葉赫貝勒錦台什從弟太宗文皇帝諸舅也太祖高皇帝初年滅葉赫阿什達爾漢率屬來歸授佐領𨽻滿洲正白旗天命六年二月從征明攻奉集堡圍其城時八旗並進諸將無出其先者三月攻遼陽城先登克之論功授一等輕車都尉賜敕免死一次太宗嗣位以阿什達爾漢典外藩蒙古事嘗奉使朝鮮並齎敇諭歸附諸蒙古部落天聰六年明遣使議和上命阿什達爾漢與文臣白格龍什等往報之既盟而歸白格以阿什達爾漢與龍什等私取明饋遺事奏聞詔追奪其所取財物七年六月隨貝勒濟爾哈朗薩哈璘鞫獄諸蒙古部齎敕諭二十道遺失其九所司奏劾論罰如律十月宣布欽定律令於諸蒙古部落八年五月奉命徴兵科爾沁會大兵於宣府左衛時上親征察哈爾其汗林丹遁走海上殂於道所部潰散其屬額爾德尼囊蘇等率衆來降上命阿什達爾漢與前鋒統領吳拜等及額爾德尼囊蘇往偵察哈爾汗子額哲九月携其台吉塞冷等還復命曰察哈爾大臣若祁他特等率千人而來者踵相接也旋奉命至春科爾大會蒙古諸部分畫牧地使各守封疆復與諸貝勒訊獄斷罪十一月還報稱旨令專轄一佐領事九年二月隨貝勒多爾衮等率兵萬人往收察哈爾汗子額哲四月師抵托里圖貝勒等遵上所授方略遣阿什達爾漢偕其族孫護軍統領南禇先詣額哲母營見之額哲之母南禇女兄阿什達爾漢族孫女也既見諭之降額哲遂從其母舉部來降當我軍未至時有鄂爾多斯濟農圖巴者來招額哲與盟而去阿什達爾漢察其有異志追及圖巴羈留之遂破其謀今悉還察哈爾之貨賄遺於鄂爾多斯者又領兵略明宣大界至山西多俘獲凱旋上親迎勞之崇德元年六月授都察院承政上御崇政殿侍臣巴圖魯詹額爾克戴青後至阿什達爾漢與承政多爾濟達爾漢靣責之曰汝扈從臣何擅離職守而後至乎叱出之十月偕文臣希福往察哈爾喀爾喀科爾沁諸部明刑申禁宣諭而還十二月從征朝鮮其國王李倧遁走南漢山豫親王多鐸率師追之圍其城朝鮮巡撫合兵萬八千來援分樹二柵悉衆出戰阿什達爾漢同貝子碩託帥驍鋭競進大破其軍其副將以兵五千營山麓遙為聲援别遣兵百人沿河而下阿什達爾漢馳擊殱之復攻拔其營餘衆皆潰明年正月李倧降七月論功晉三等男世襲會遣大臣往科爾沁巴林扎魯特喀喇沁土默特阿祿等部頒赦詔并會諸外藩清理刑獄阿什達爾漢為正使三年五月部議阿什達爾漢前往科爾沁部察審諸事徇庇失實且濫收諸藩貝勒財賄應削職得旨寬貰解部任追奪財物入官七月復任都察院承政五年與參政祖可法等疏奏時事略曰皇上欲恢張治道深思篤行之今諸國景附朝廷清明而諸王以下至都統彼此觀望顧念身家莫肯精白一心為國陳奏不知果無可言耶抑有所畏忌而不敢言耶夫刑法者所以防民之姦也骫於法則麗於刑此不可逭也今刑部斷獄不依本律或從重論輒削其職臣思諸臣經戰陳出死力恩授一官一旦有過豈可不論重輕而遽革之乎臣等竊思先時簡選議事十人此時皆不稱職宜罷斥又例職官陳亡者子孫襲兵士陳亡者妻子受賞今未盡行惟聖主裁察疏入上嘉納之六年大兵圍錦州明總督洪承疇率師來援陳師松山上親統大軍擊之明師宵遁分部諸將以追我偏將伊拜等駐兵杏山阿什逹爾漢按其營壘及斬獲多寡之數敵衆既潰上合衆圍松山明總兵曹變蛟營於乳峰山堅壁不敢戰乘夜棄山寨率部騎直犯中軍入御營時右翼大臣侍衛等俱未歸部伍軍中大驚將士以死禦之始退上以阿什達爾漢為故舊大臣受心膂寄常隨侍左右是夜乃安處帳中不至御前防護逐歸本旗七年論松山失律諸臣罪罷承政任降世職為騎都尉尋以疾卒年六十三子三長席達禮次阿爾畢敦次阿爾賔席達禮襲世職别有傳薩穆什喀薩穆什喀滿洲正白旗人姓佟佳扈爾漢第三弟也少從太祖髙皇帝征伐積功授三等輕車都尉世職征薰夔率十二人追敵至山下斬百人獲炮五十三人馬牛羊千計太宗文皇帝即位列十六大臣佐理鑲白旗事天聰四年從征明灤州率衆射敵獲勝七年隨貝勒嶽託等征旅順口由陸地運舟於水衆皆乘馬薩穆什喀建議曰兵既潛進何乘馬為於是率衆步行比臨水次鑲黃鑲紅鑲藍三旗所運舟俱未至貝勒嶽託謂薩穆什喀曰汝可努力曰如貝勒命此城誓必得不空返也遂與步軍統領巴竒蘭連舟先八旗進身被一創戰益厲大軍繼進遂破旅順口八月凱旋太宗郊勞之親酌金巵以賜先是薩穆什喀坐事削職至是復世職加一等輕車都尉八年任恭領同貝勒杜度防守海州十二月奉命副巴竒蘭往征黑龍江呼爾哈部明年四月降其衆盡取其地俘獲無算敘功加三等男世職授步軍統領崇德元年隨武英郡王阿濟格等征明入長城同額駙蘇納率兵攻容城縣先登克之二年授議政大臣復隨武英郡王攻皮島薩穆什喀督前鋒兵渡江先抵岸與都統阿山葉臣等攻克之斬其守將沈世奎七月敘功晉二等子是月任工部承政四年同刑部承政索海分統左右翼兵往征索倫部有達爾布尼阿哈爾都户白庫都漢必爾岱四人於伍庫爾城聚衆抗拒薩穆什喀帥左翼兵攻克之隨攻鐸陳不下會佐領薩必圖等引兵來助鐸陳阿撒津二城兵潛出截戰薩穆什喀設伏敗之斬七十人五年師還上郊勞賜宴旋因征索倫時所得三屯人民不加撫輯以致復叛及博穆博果爾兵攻掠正藍旗輜重坐視不救致士卒為敵所殺議應革職籍沒得旨削世職免籍家産罰贖以懲薩穆什喀復奏辨曰博穆博果爾攻掠時實率將士五十人擊敗其衆復追里許值右翼索海潭布伏兵衝擊二人遂冒吾功上命王貝勒及議政大臣等詳審會議以薩穆什喀巧辨欺誑應論死籍其家上念其舊著勞績從寬宥之部臣追論薩穆什喀駐防海州時明知義州山寨有敵兵不嚴誡士卒警偹以致左翼屯丁多被殺掠依律罰贖明年從睿親王多爾衮征明坐依附王貝勒私遣兵丁歸家及離城逺駐復論革職籍沒乃命以罰贖懲之七年復從大兵征明攻錦州敵兵來犯我寨柵勢甚鋭薩穆什喀力戰三敗敵兵錦州既克復授騎都尉世職八年以疾卒子羅什襲雅賴雅賴滿洲正白旗人姓佟佳扈爾漢第七弟也太祖髙皇帝時從征烏拉略地朝鮮數被創天命六年隨大兵攻遼東及破蒙古兵俱有功又征察哈爾先登殺敵俘獲甚衆天聰三年五月與恭領羅璧等率兵千人略明新城路遇其故將毛文龍部衆採參者斬六十人毁其船九月同額駙揚古利等躡捕逃人於雅爾古復遇文龍部衆殺九十六人擒其千總三員及從者十六人以歸十一月太宗文皇帝征明北京明巡撫袁崇煥來援圍我護軍營城中敵兵亦出應雅賴奮勇力戰郤之五年從圍大凌河城纍戰皆捷正白旗士卒有殁於陳者雅賴單騎入殺敵三人取尸而還七年征明旅順口與副都統薩穆什喀同舟進敵據岸列陳以拒雅賴超躍登岸大呼曰雅賴先登矣遂衝入敵陳黎明與敵兵戰於城門身被一創督戰愈厲我兵或少退輒手刃之大敗敵兵論功授騎都尉世職崇德二年授議政大臣六年以從圍錦州依附睿親王多爾衮私遣兵丁歸家及離城逺駐議革職籍其家之半得旨從寬罰贖明年兵部追論攻錦州時明兵出犯鑲黃旗汛我兵有未戰者雅賴坐徇隱應罰贖上以雅賴素著勞績特命免之八年敘征明錦州松山北京山東等戰功加一雲騎尉順治元年隨睿親王破流賊李自成於山海關定燕京二年復隨豫親王多鐸破流賊於潼關平定河南江南敘功晉三等男兼一雲騎尉兩遇恩詔晉一等男兼一雲騎尉八年三月擢户部尚書四月以尚書巴哈納給餉不均為駐防河間佐領碩爾對所控雅賴不行奏聞論罪罰贖尋罷尚書任康熙三年四月卒賜祭葬如例子花色襲巴篤理巴篤理世居佟佳以地為氏天命初與弟蒙阿圖等率衆來歸太祖髙皇帝命編所屬户為二佐領使巴篤理與蒙阿圖分領其衆𨽻滿洲正白旗巴篤理蒞事有能與十大臣之列積戰功授三等輕車都尉世職十年明發兵航海至旅順口葺城駐守巴篤理從貝勒莽古爾泰攻克之盡殱明兵十一年明將毛文龍遣兵夜襲薩爾滸城城中炮矢交發明兵退而結營巴篤理率兵從山而下大呼乘之敵潰走追斬二百餘人天聰三年從太宗文皇帝征明指揮本旗兵攻克遵化城有功晉二等輕車都尉太宗親酌金巵勞之四年正月大軍克永平巴篤理隨貝勒濟爾哈朗等統兵鎮守復赴遷安招撫明侍郎郭某比至已遁去執其孥至永平贍養之三月明副將張宏謨率兵來侵巴篤理與前鋒統領屯布祿以兵百人迎之遇伏兵截擊屯布祿敗北巴篤理殿後接戰其弟課約馬中矢巴篤理斬敵兵奪馬與課約連斬三十餘人敵遂遁五月明兵圍灤州時大貝勒阿敏鎮守永平不即赴援城垂破乃遣巴篤理率兵進擊乘夜突圍入城方議併力拒守敵發巨炮攻擊城樓焚守將納穆泰等度力不能支相率棄城依阿敏阿敏亦棄永平遂從歸事聞集廷臣議諸將棄城罪以巴篤理突圍赴援釋之五年任禮部承政六年奉命往朝鮮定職貢額數八年八月太宗親統師征明至應州命隨貝勒阿巴泰等往取靈邱縣之王家莊巴篤理督衆攻其堡既被創猶鼓勇奮擊中矢卒太宗聞之泣下曰此朕舊臣效力多年致命疆埸深可惜也恤贈三等男以其子卓羅襲爵順治十三年追諡敏壯蒙阿圖蒙阿圖姓佟佳巴篤理之弟也天命初偕其兄來歸授佐領以丈量地畝有功擢正白旗副都統為總理糧餉大臣克勤其職繼因多取田地又以餘地私給漢官及擇各處腴地别立莊屯為本旗大臣阿山所劾坐削職天聰三年太宗文皇帝命率官八員兵三百人往征瓦爾喀諭之曰爾等行軍宜嚴紀律毋妄殺毋劫掠歸附之衆皆編為民户擕還所産貂皮諸物毋纎毫私取蒙阿圖奉命往俘獲男婦三千餘口及牛馬等物五年二月自寧古塔奏捷凱旋太宗至十里外迎勞蒙阿圖遙見即拜近前復拜行抱見禮禮畢設宴太宗以蒙阿圖出征勞苦特撤御膳賜之敘功授騎都尉世職是年任工部承政駐天瑞山一載緝獲逃人無算從征明北京擊敗明兵於遵化又征呼爾哈並以俘獲多論功晉三等輕車都尉六年大兵征察哈爾太宗遣蒙阿圖還瀋陽命移餉貯遼河加意防護撤回阿巴泰等防禦兵守城及催督喀喇沁人於法庫山耕種者八年考滿晉二等輕車都尉崇德三年七月召見諭曰爾今年老且復有疾不必管理部務宜間居調養病痊之日朕當起用爾等舊臣朕見之輒為心喜仍不時朝見可也未幾卒於家子翁克任護軍參領兼佐領欽定八旗通志卷一百五十六
