body:
  text: 人物志三十二大臣傳十八滿洲正黃旗六羅圗理琛瑪貝和諾查克丹覺滿保拉素圗托特定夀拉布敦圗理琛圗理琛滿洲正黃旗人姓阿顔覺羅康熙二十五年由監生考授內閣中書三十六年轉中書科掌印中書尋遷內閣侍讀四十一年監督蕪湖關稅務四十二年充禮部牛羊羣總管四十四年以缺牲被控革職五十一年四月特命復職出使土爾扈特初土爾扈特汗阿玉竒從子阿喇布珠爾嘗假道凖噶爾赴西藏謁達賴喇嘛已而凖噶爾台吉策妄阿喇布坦與阿玉竒搆怨阿喇布珠爾不得歸請內屬詔封貝子賜牧嘉峪關外黨色爾騰嗣阿玉竒遣使薩穆坦入貢上憫阿喇布珠爾欲遣歸至是命圗理琛偕侍讀學士殷扎納即中納顔齎敇往諭假道俄羅斯五月圗理琛等自京起行七月達俄羅斯境駐楚庫柏興以假道故俟其國察罕汗信五十二年正月信至始行由烏的柏興越柏海爾湖而北抵厄爾庫其駐托波爾之噶噶林遺屬博爾科泥來迎噶噶林者彼國所稱總營也圗理琛等欲行博爾科泥言噶噶林令迎天使由水路行而昻噶拉河氷未泮請駐候之五月由昻噶拉河乘舟抵伊聶謝柏興登陸閏五月抵麻科斯科復乘舟由揭的河順流而行所經者曰那里穆柏興蘇爾呼特柏興薩瑪爾斯科狄穆演斯科七月至托波爾噶噶林名馬提飛費多里魚赤者迎至署留八日仍遣博爾科泥護之行抵鴉班沁登陸由費耶爾和土爾斯科越佛落克嶺抵索里喀穆斯科以路濘守凍十月始行所經者曰改郭羅多黑林諾付喀山西穆必爾斯科十一月至薩拉托付是為俄羅斯與土爾扈特界水自東北來折而南俄羅斯呼為佛爾格土爾扈特則呼為額濟勒阿玉竒汗駐牧地曰瑪努托海距此十日程以雪盛不能行五十三年四月阿玉竒遣台吉偉徴等來迎五月圗理琛等渡額濟勒河喇喇布珠爾之父納扎爾瑪穆特遣人獻馬却之六月朔至瑪努托海阿玉竒擇吉聽宣敇我使語之曰阿喇布珠爾已賜爵優飬欲遣歸爾牧以策妄阿喇布坦惡爾恐戕之爾若欲令阿喇布珠爾歸當自俄羅斯來迎阿玉竒曰我雖外夷然冠服與中國同俄羅斯乃嗜欲不同言語不通之國也天使歸經其國當察其情俄羅斯若以往來數故不假道則我無由入貢矣阿喇布珠爾荷厚恩與歸土爾扈特等復何疑慮於是阿玉竒及納扎爾瑪穆特等各贈馬及方物圗理琛等以越境無私交却不受阿玉竒待之有隆禮留十四日筵宴不絶復附表奏謝圗理琛等遂行由舊路歸俄羅斯遣護如初五十四年三月還京是役也往返三載餘經行數萬里蓋土爾扈特為俄羅斯所隔逺阻聲教而俄羅斯又故導我使紆道行圗理琛等自奉使及反命無辱焉既歸圗理琛撰異域録首冠輿圗次為行記一卷呈覽上嘉恱授兵部貟外郎阿喇布珠爾亦遂留牧黨色爾騰不復遣再傳至其子丹忠於雍正九年遷牧額濟內河四月圗理琛遷郎中雍正元年七月命赴廣東盤查藩庫九月即擢廣東布政使三年正月調陜西布政使四月署陜西巡撫七月實授九月疏言西安延安兩府地廣事繁請改商州同州華州乾州邠州耀州鄜州葭州綏德州俱為直𨽻州分西安府屬之鎮安雒南山陽商南四縣𨽻商州朝邑郃陽澄城韓城四縣𨽻同州華隂蒲城二縣𨽻華州武功永夀二縣𨽻乾州三水淳化長武三縣𨽻邠州同官白水二縣𨽻耀州延安府屬之雒川中部宜君三縣𨽻鄜州吳堡神木府谷三縣𨽻葭州米脂清澗二縣𨽻綏德州部議從之四年四月奏請支庫銀六萬兩採買芻豆為西安兵丁備用諭曰圗理琛向任廣東布政使時密奏不準官兵預支俸餉廣東及各省原有嵗暮預支兩月錢糧之例伊亦固執不行以致兵丁度嵗艱窘怨謗繁興撫臣年希堯強之而後給發隨經具摺奏聞比時朕恐圗理琛在廣東未必相安故改調西安旋有西安巡撫員缺遂爾擢用今圗理琛奏請預支銀兩採買豆草以備用是圗理琛為布政使時則但知有錢糧而不知有兵丁今為巡撫又但知邀兵辨之歡心而不復計錢糧之出納身為大臣乃偏執已私遂至前後大相矛盾况雍正元年題定兵馬豆草折銀之例悉照酌中之價若遇豐年價賤兵丁可得餘銀若遇歉年價貴許該管上司題請增給是兵丁原無歉年匱乏之慮今西安兵丁之豆草請預買以備用則他處兵丁之豆草獨不當預備乎圗理琛身在西安即欲加厚於西安旗標兵丁豈此外兵丁皆不當蒙惠乎西安總統滿洲兵馬乃將軍延信專責圗理琛即謂有益於兵丁亦當與延信同奏今妄憑臆見獨自敷陳顯欲侵將軍之職掌著傳旨申飭五月保送遊擊查爾扈諭曰嘗見滿洲為上司則以滿洲為可信任漢人為上司則以漢人為可信任漢軍為上司則以漢軍為可信任不思身為大臣管轄之人滿漢俱有一有偏向則諸事皆不得其平何以服人心而舉庶務前令陜西督撫提臣各保遊擊一員守備一員送京引見朕意以陜西武辨可用者甚多而征討桌子山等處又多效力有功之人地方大臣當從公保薦以副朕留心人材之意乃圗理琛于遊擊內將查爾扈保送前來查爾扈曽在乾清門侍衛行走用為陜西撫標遊擊滿洲在陜西為緑旗武官者只有查爾扈一人而圖理琛即將伊保舉豈此外遂無可保舉者乎且查爾扈係朕深知熟識之人又何必進京引見著即令回任又潼關修造滿兵房屋延信圖理琛特差旗員四人前往監造若云滿洲房屋漢官監造未必合宜何妨指示規模令其照式為之而必欲差委滿洲謂其不致侵蝕浮冒是明以漢人為不可信用而以滿洲為可信用即有意偏向之明驗矣著交與延信圖理琛不時稽查若所差旗員不善辦理或有侵蝕浮冒或在地方生事滋擾朕少有所聞定將延信圖理琛一併從重議處十月疏言靖邉定邉二所距保安安塞膚施三縣甚逺請將靖邊所地丁錢糧歸附近之鎮樂寧塞二堡令靖邊經厯司徵收定邊所地丁錢糧歸附近之磚井鹽埸二堡令定邉縣縣丞徴收下部議行尋遷兵部右侍郎五年四月轉左侍郎六月調吏部右侍郎八月偕喀爾喀郡王額駙䇿凌等往定喀爾喀與俄羅斯界十二月仍調兵部右侍即六年三月追議前定界時與俄羅斯使臣薩瓦鳴炮謝天私立木牌于定界所旋焚之擅納俄羅斯貿易人入界又前任陕西巡撫時將天下兵數繕摺私給延信命逮治鞫實擬斬十一月宥免十二月命往築扎克拜達里克城十三年九月今上御極授內閣學士十二月授工部侍郎乾隆元年諭曰圖理琛年老昏庸不勝工部侍郎之任著仍為內閣學士二年乞休允之五年卒貝和諾貝和諾滿洲正黃旗人姓冨察尚書濟席哈之孫聖祖仁皇帝康熙二十七年由工部筆帖式授户部主事洊遷兵部員外郎戶部郎中兼佐領三十四年十一月遷兵部督捕右理事官尋遷大理寺卿三十五年二月奉命往山東經理閘河五月總漕桑額奏漕船盡過濟寧較上年早月餘皆仰賴睿慮周詳豫遣卿臣貝和諾封閘蓄水啓閉以時六月貝和諾還奏漕船陸續抵通上曰遣官有益漕運自後可倣行之七月遷都察院左副都御史三十六年正月擢戶部侍郎十一月禮部奏朝鮮國王李焞以旱潦頻仍廩庾空乏八路流離請開市義州中江貿穀得旨覽奏朝鮮乞糴朕心深為憫惻可賞給米一萬石令侍郎陶岱督運前往再運二萬石令侍郎貝和諾往中江監視貿易三十七年五月事竣李焞表謝八路生靈賴得全活十二月授陕西巡撫二十八年六月疏言陜省兵民被恩撫恤無微不周準開捐事例原期積貯充實緩急足恃臣抵任後計原報捐納米麥撥支兵糧等項應存一百七十七萬八千九百一十九石今省倉及各州縣實存十七萬一千二百石有竒虧缺一百六十萬七千六百八十六石不敢不據實陳明上命尚書富拉塔張鵬翮往同貝和諾察核三十九年正月覆奏原捐米麥分貯長安永夀華隂等縣因防黴爛出糶三十八萬二千八百九十餘石現已糴補足數此外俱係報捐之官生挂欠今亦陸續完納尚少一百九萬九千八百餘石應開造報捐官生姓名及挂欠實數達部俟完納後方準升選考試仍勒限嚴催倘逾限不完并議處經手各官事下部議從之三月疏言漢興道所轄界連楚蜀幅􅊷遼濶最為緊要請以議裁之神木道李杰就近調補疏入諭部臣曰神木地方朕前統領大兵經過見田畝瘠薄人民稀少最為寒苦然逼近蒙古實屬要地前貝和諾奏裁神木道今又以現任道員李杰題補漢興道是為李杰規避寒苦希調善地其嚴加議處部議降三級調用得旨從寬留任五月調四川巡撫十一月命督理進𠞰爐蠻糧餉四十一年四月疏言打箭爐駐劄官兵需用􅀈餉宜豫為接濟請撥鄰省銀十萬兩來川應期給發扣捐本省知縣以上各官俸銀補項下部議如所請上曰四川極邉之地官員度日維艱免其扣捐俸銀補項六月疏言打箭爐木鴉等處畨民一萬九千餘戶歸順應添設安撫使五員副使五員土百户四十五員以專管轄又疏言邉末藉茶資生向來邉民造辦賞畨茶包之外聽其以所餘運爐貿易恐有營官撓阻請給天全土司官引四千道副土司官引一千六百道定額徴課閏六月疏言各省重犯招册久經達部其秋審時令造全招又摘造略節事屬繁復請嗣後秋審以原供及督撫看語敘入册內停止繁復造送十一月疏言化林松潘均屬邉地素不産米向來化林設兵尚少故照建昌各營例折給今兵衆餉多米價騰貴請照松潘之例增價給發四十二年正月疏言各省教職每學二員獨川省有五十七學各設一員請於威茂等州敘州等府會川等衛添設訓導一溫江等縣添設教諭一九姓司學添設教授一三月疏言前撫臣于養志題明松潘小河疊溪三處收捐米穀分貯備用自三十八年迄今松潘捐一千七百餘石其小河疊溪以道路險峻輸運維艱罕赴捐納請停止收貯例四十三年正月疏言川省行鹽潼川中江山路﨑嶇艱於陸運額引壅滯難銷惟氷江小溪水運可通請增給水引商民交便諸疏並下部議行二月內遷兵部侍郎四十四年五月擢雲貴總督四十五年六月疏言新升廣東布政使之雲南按察使劉蔭樞老成練逹清亷愛民今現署雲南布政使請即以留補得旨如所請九月擒獲逆匪李天極王枝葉等於富民縣之響哨山李天極者昆明人冒入廣通縣學與臨安府生員朱六非造為符讖以師宗州生員之子魏枝葉流蕩不歸誘之詭託明桂王之孫陽以王姓相呼遇開化府賣藥人楊春榮蒙自縣談相人張平山富民縣演伎人楊起鳳同謀不軌偽稱文興三年以鉛摹桂王之寶及諸偽印散播總制大將軍副總兵都督僉事等偽劄願入黨者改裝蓬頭僧或長髮道士潛期先掠廣南次掠開化由蒙自劫省城為督標辨兵首報先後擒獲李天極王枝葉楊春榮楊起鳯張平山朱六非請旨立斬餘黨流徙數人首報者奬賞如例四十六年十月疏陳金銀銅錫等礦厰嵗徵實數戶部以未較舊額加增議駁上曰雲南礦稅一年徴銀八萬兩零用撥兵餉數亦不少若又令加增有不致纍民乎著照原題議給四十九年九月內遷禮部尚書五十年十月以山西太原流匪陳四等六十餘人詭稱赴雲南開墾擕婦女乘馬騾由陜西湖廣至貴陽貝和諾前任總督得布政使張建績牒報不即察究僅令咨回原籍降一級調用十一月授盛京工部侍郎五十七年十月復禮部尚書五十九年正月以老乞休得旨慰留六十年二月卒於官年七十有五子瑪拉自有傳查克丹查克丹滿洲正黃旗人姓博爾濟吉特曽祖恩格德爾和碩額駙追封三等奉義公有傳祖索爾哈固倫額駙授三等輕車都尉父色楞頭等侍衛襲世職兼佐領康熙三十年查克丹由官學生襲三等輕車都尉三十八年選侍衛四十三年襲佐領尋授散秩大臣六十年授鑲藍旗蒙古副都統六十一年遷正黃旗護軍統領雍正元年授火器營大臣二年擢鑲藍旗蒙古都統三年命赴甘州署將軍事先是凖噶爾貢使至甘州左衛守備馬德仁右衛守備王三捷供應失時查克丹抵任知其事疏聞並陳由花馬池至甘州沿途驛馬疲瘦狀詔總督年羮堯等嚴飭所屬管驛官加意養馬罰德仁三捷俸四年旋京仍任正黃旗護軍統領五年正月擢正黃旗滿洲都統十月授議政大臣尋命率班兵赴北路軍營九年振武將軍順承親王錫保由北路討凖噶爾命查克丹參贊軍務授內大臣十年凖噶爾小策凌敦多卜謀掠喀爾喀查克丹偕喀爾喀親王丹津多爾濟額駙策凌等赴奔博圗山偵禦未至賊衆越察罕瘦爾軍營入掠杭愛山因反斾尾追至額爾德尼昭賊衆逼鄂爾坤河而陳為負嵎計查克丹等督兵奮擊大敗之餘賊負傷竄推河復追至察罕托輝斬馘幾盡捷聞敘功授雲騎尉併原襲世職為二等輕車都尉時順承親王代傅爾丹為靖邉大將軍仍命查克丹參贊軍務十二年調鑲藍旗滿洲都統十三年自軍營還調正紅旗蒙古都統乾隆四年五月以病乞休優詔弗允十月復籲請諭曰卿才品優長簡任都統內大臣正資料理前因患病告休朕降旨照舊供職今覽奏情詞懇切著以原品休致十一年九月卒賜祭葬如例諡敏恪子和爾敦官副都統襲二等輕車都尉三十一年卒停襲覺羅滿保覺羅滿保滿洲正黃旗人康熙三十三年進士改庶吉士授檢討三十八年充浙江鄉試副考官尋充日講起居注官四十年遷侍講四十一年充山東鄉試副考官四十五年授國子監祭酒四十八年擢內閣學士充經筵講官五十年十一月授福建巡撫五十二年正月疏言福州府屬之閩縣福清長樂連江羅源興化府屬之莆田泉州府屬之晉江惠安同安南安漳州府屬之龍溪漳浦海澄詔安福寧州與所屬之寧德共十六州縣皆瀕海要地必得諳練庶務素著才能者治之而後人地相宜嗣後遇缺請於直𨽻各省卓異官內特簡調授三年俸滿升用疏下吏部議御史璩廷祜疏言五方風土不齊秦晉燕趙之治未必可治閩越驟易其處官與民不相習安能遽展其才逮稍稍諳練已屆三年又升遷他往於地方無益且懸缺久待事多貽誤滿保所奏未可為例不如就本省擇員調補疏亦下吏部部議滿保所指十六州縣非海外煙瘴地應循例歸部選上諭大學士等曰督撫為地方得人起見懇切陳奏理所應然御史言其未可為例似皆由卓異官不願往海濵苦地囑其於未經部覆之先條奏自然部議不準如此則權歸科道是明季惡習漸不可長其閩省十六州縣當㨂選發往問九卿詹事科道再奏尋覆奏璩廷祜愚昧不逹事宜應如滿保奏即行㨂選卓異官引見補授發往五十四年十一月擢福建浙江總督五十六年十二月疏言鹿耳門為臺灣咽喉澎湖為厦門藩衛安平鎮為水師三營重地及海洋各口岸分别極衝次衝修築礅臺擇地建造營房巡防分守又言海船出入宜取船户澳甲保結限以人數並禁漁船私載米糧軍器其臺灣商船往來令毋徑趨大洋悉赴厦門給照驗行除泊港貿易貨物照例納稅外其往江南浙江貿易者仍在江浙海關納稅免其重徴五十七年四月疏言福建駐防兵孳生衆多有壯丁未得披甲者二千餘名請挑選撥補緑旗各標營缺食糧又言淡水雞籠山為臺灣北界三面濵海西南夷舶往琉球日本者皆望此山為凖的且澳港深濶可泊巨艦百餘內為肩豆門沃野百里畨社衆多請增置淡水營設官駐防以扼臺灣之尾五十九年五月同浙江巡撫朱軾疏陳修築海塘六事一海寧縣老鹽倉北岸石塘自蒲爾兜至姚家堰凡築隄一千三百四十丈一石塘髙二丈每丈纍石十層塘外聚漲沙擁護隄根一開中小亹淤沙使復江海故道一築上虞縣夏蓋山石塘一千七百九十丈防南岸潮患一調委經理各官以專責成一江海潮神加贈封號令有司春秋致祭諸疏俱下部議行六十年四月姦民朱一貴自稱明裔偽號中興王下大元帥聚衆倡亂於鳳山縣之薑薗地遂陷臺灣府治總兵歐陽凱副將許雲參將羅萬倉逰擊遊崇功等率兵𠞰賊並遇害五月丁卯滿保聞報檄調水陸兵俱赴澎湖撥運省倉及上遊州縣各倉穀數萬石濟軍食自率標兵至厦門六月丙午提督施世驃與南澳總兵藍廷珍進征鹿耳門敗賊安平鎮壬子克復臺灣府治乙卯滿保於厦門奉到上頒招撫臺灣衆民硃筆諭旨曰朕思爾等俱係內地之民非賊寇可比或為飢寒所迫或因不肖官員刻剝遂致一二匪類倡誘衆人殺害官兵情知罪不能免乃妄行強抗其實與衆何涉今若遽行征𠞰朕心大有不忍故諭總督滿保令其暫停進兵爾等若即就撫自原諒爾等之罪倘執迷不悟則遣大兵圍𠞰俱成灰燼矣臺灣只一海島四面貨物俱不能到本地所産不敷所用止賴閩省錢糧養生前海賊占據六十餘年猶且𠞰服不遺餘孽今匪類數人亦何能為耶諭旨到時即將困迫情由訴明改惡歸正仍皆朕之赤子朕知此事非爾等本願必有不得已苦情意謂與其坐以待斃不如茍且偷生因而肆行虜掠原其致此之罪俱在不肖官員爾等俱係朕厯年贍養良民朕不忍𠞰除故暫停進兵若總督提督總兵官統領大兵圍𠞰爾等安能支持此旨一到諒必就撫毋得執迷不悟妄自取死於是滿保令興泉道陶範率都司守備等官往臺灣傳宣上旨閠六月丙寅諸羅縣溝尾莊民人楊旭等密約壯丁六百餘人佯與賊附宰牲結盟誘朱一貴等夜飲逹旦俟醉臥收藏其鬬械四面合圍生擒朱一貴及其黨十二人獻施世驃軍前世驃與滿保先後入奏檻送朱一貴等至京磔誅于市滿保疏言賊匪蠢動時惟淡水營守偹陳策鼓勵兵民堅守汛地擒殺亂民苑景文等以待大兵進援協同𠞰撫實為奮力效忠上遂擢陳策為臺灣總兵官又疏言前者三月間鳯山縣民在檳榔林地方演劇羣飲知府王珍縱役需索妄拿多人朱一貴乘機倡亂于四月十九日樹旗聚衆臺厦道梁文煊及所屬官員一無備禦退回澎湖應革職提問其戴罪效力之逰擊張彥賢等應解任審擬得旨如所請行八月以臺灣颶風大作入奏諭曰臺灣地方官平日但知肥己刻剝小民激變人心及大兵進𠞰殺戮之氣上干天和颱颶陡發倒塌房屋淹沒船隻傷損人民此皆不肖有司貪殘所致也今宜速行賑恤以慰兆民世宗憲皇帝雍正元年八月兵部議臺灣陳亡總兵歐陽凱副將許雲等豫加贈廕恤征𠞰有功之提督施世驃總兵藍廷珍等豫世職敘録有差滿保為封疆大吏致匪類竊發失陷城池其聞變即赴厦門調度有方應以功抵罪得旨滿保雖有失陷地方之罪但一聞事發即親往厦門撫慰衆心遵依皇考指示調遣官兵七日之內克復臺灣著兼兵部尚書職銜先是上杭縣姦民溫上貴往臺灣從朱一貴得偽元帥劄付及木刻偽印仍還上杭將煽誘其鄉人從賊聞朱一貴伏誅遂竄江西潛結棚匪數百人謀掠萬載縣城知縣施昭庭調集鄉勇同營汛官兵𠞰捕擊斃三百餘人生擒溫上貴與其黨十數人並正法于是大學士白潢尚書張廷玉各條奏禁戢棚匪策敕所在督撫詳議滿保疏言閩浙兩省棚民以種麻種靛種煙造紙燒炭煽鐡等項為業姦民不一令地鄰出保結五棚長連環互結若有為匪不法事蹤迹可疑人而弗首報者依律連坐則自不敢容隱州縣官於農隙時遍履各棚稽查如始勤終怠約束不嚴即劾罷之浙江之鄞縣奉化等二十七縣福建之閩縣龍巖等四十州縣皆有棚民宜如沿海州縣例于通省內㨂選才守兼優之員題請調補則治法與治人咸收實效矣疏下部議以福建通計六十州縣無棚民而又非沿海者僅十三縣難供四十七州縣之選補其約束事宜及浙江二十七縣㨂調應如所奏行議上得旨嗣後凡有棚民之閩省州縣吏部將所出之缺于進呈月官履歷時具奏朕于月官內㨂補發往二年十一月上諭大學士等曰凡督撫大吏任封疆之寄其所陳奏皆有關國計民生故于本章之外準用奏摺以本章所不能盡者則奏摺可以詳陳而朕諭旨所不能盡者亦皆于奏摺中詳悉批示以定行止此皆機密緊要之事不可輕泄是以朕將內製皮匣發于諸臣令其封鎖奏逹蓋取堅固慎密他人不敢私開也去年初行時諸臣尚皆敬慎近聞浙閩總督滿保山西巡撫諾岷等皆有信託之人在京私看奏摺及朕所批密旨朕待諸臣推心置腹事事至誠言無不盡諸臣正當仰體朕懷謹慎周密凡有摺奏據理敷陳候朕裁奪何必委託其子弟親戚探聽消息以致泄露密摺藉生種種弊端此皆由諸臣不能自信又不能信朕其存心如此則密摺又何益乎嗣後停其摺奏有事只照例具本其餘督撫大吏奏摺若有子弟親朋在京私開者一經發覺朕必將私開之人正法督撫等照溺職例革職決不寬貸滿保尋疏言摺奏不能慎密臣罪實無可寬蒙恩不即罷斥仍任海疆重寄遇有緊要之事必得具摺奏請聖訓方可料理無誤得旨滿保既知過懇切奏請準照常摺奏三年九月卒於官遺疏言新任巡撫毛文銓未至總督印信不便逺送謹交福州將軍宜兆熊署理并留解任巡撫黃國材暫緩起程如舊辦理得旨滿保向來居官雖無廉介之稱然才幹優長盡心辦事整飭營伍經理海疆實為稱職昔年臺灣一事雖不能消弭於未然而能於七日之內即行克復功過足以相抵朕即位以來時加教誨滿保亦知奮勵矢志亷潔及至抱病沈篤之際尚能留心地方將黃國材留閩以待新任巡撫並將總督印務交與將軍宜兆熊其辦理俱屬得體今聞溘逝朕心深為軫惻下部察例議恤時尚書隆科多獲罪法司鞫訊其家人得滿保餽金三百兩狀及禮部議恤疏入上留中久之始發出諭曰滿保居官賢否衆論不一是以賜恤之典朕未即定今細加訪察知其居官甚屬平常於吏治民生毫無禆益但諂媚隆科多年羮堯而已不必賜恤與諡瑪拉瑪拉滿洲正黃旗人姓富察康熙三十六年襲佐領四十三年遷護軍參領雍正元年三月授鑲藍旗蒙古副都統十一月調本旗滿洲副都統二年二月擢刑部侍郎十一月以本內誤絞為斬降三等侍衛兼佐領四年授正紅旗滿洲副都統五年正月奉使西藏先是副都統宗室鄂齊疏報西藏情形言達賴喇嘛年幼總理藏務貝子康濟鼐恃其勳績輕視諸噶卜倫衆恨之固山貝子阿爾布巴乘隙與隆布鼐扎爾鼐為黨煽搆事端致達賴喇嘛與康濟鼐不和請豫隆布鼐扎爾鼐噶卜倫原銜罷其職掌以翦阿爾布巴羽翼上因命瑪拉偕侍讀學士僧格往諭達賴喇嘛康濟鼐和𠂻共事賞銀一千兩總理西藏事務十月阿爾布巴戕康濟鼐以兵圖後藏貝勒頗羅鼐至阿里頗羅鼐截殺其衆遂領兵往剿阿爾布巴上以瑪拉在藏恐為阿爾布巴所惑從中講和以致頗羅鼐受害遣學士班第密諭機宜六年七月頗羅鼐自藩玉口至喀巴先擊喀木卡倫與隆布鼐遇是夜斥候兵集遂抵西藏瑪拉等趨布達拉護達賴喇嘛還藏各廟喇嘛擒阿爾布巴隆布鼐扎爾鼐以獻頗羅鼐縶送瑪拉所瑪拉等鞫謀殺康濟鼐狀得實磔阿爾布巴斬隆布鼐扎爾鼐逆孥緣坐十月瑪拉等以達賴喇嘛入隊中率西安滿洲兵四百固原兵五百四川兵百駐察木多應援七年二月調鑲藍旗滿洲副都統留駐裏塘護逹賴喇嘛六月賞銀二千兩八年擢正黃旗護軍統領九年上念瑪拉在藏年久以副都統青保代之賞銀一千兩命將防衛兵丁酌量帶回十月瑪拉偕額外內閣學士僧格疏報班禪額爾德尼貝勒頗羅鼐遣使齎牛羊酥麵餉大軍諭曰瑪拉僧格將所送之物核價充裕給與銀兩並傳諭伊等朕遣兵在藏駐劄特為衆唐古忒防守使之寧謐豈有絲毫貽纍之理今所送諸物勢必在伊屬下攤取未免滋擾且我兵糧餉並不缺乏此畨給還銀兩並非外視爾等也可傳諭唐古忒咸悉朕意十一月瑪拉請給貝勒頗羅鼐印詔廷議如所請十二月擢工部尚書兼正紅旗滿洲都統十年三月由藏回京因言畨子等仰賴皇恩各安生理得爾格特部向皆恭順自𨽻內地差務勤慎上命給得爾格特宣慰司銜七月上以瑪拉不曉部務該旗事件亦多昏憒率意著革職以佐領在軍需處章京行走十一年正月諭曰原任都統瑪拉在藏辦事熟諳彼處情形著以副都統銜前往西藏辦事三月上諭軍機大臣曰西藏駐劄辨兵本為防護唐古忒以防凖噶爾賊夷侵犯邇來賊夷大敗徒步奔逃力蹙勢窮不能逺涉且頗羅鼐輸誠效力唐古忒兵亦較前氣壯今藏地無事兵丁多集米穀錢糧雖給自內地而唐古忒人等不免解送之勞朕意留兵數百餘盡撤回青保瑪拉苗壽著總理藏務應撤兵丁詳議具奏瑪拉等合疏言駐藏四川兵二千應留五百餘撤回三年後仍撥四川兵代之雲南兵一千本為援藏設今亦量撤五百三年更代如四川例上從之乾隆元年瑪拉等疏言統轄喀喇烏蘇兵扎薩克頭等台吉那顔和碩齊卒臣與貝勒頗羅鼐議請以其次子頭等台吉珠密納木扎爾兼轄以其弟塞臣哈什哈襲扎薩克頭等台吉廷議允行八月卒賜祭葬如例素圖素圖滿洲正黃旗人姓富察三等男斐雅思哈之孫都統素丹之子也聖祖仁皇帝康熙四十年素丹有疾所襲父爵減去恩詔晉加者改為二等輕車都尉以素圖襲初名福列既襲職改今名任護軍參領五十四年厄魯特策妄阿喇布坦侵掠哈密北境素圖率烏拉兵隨都統新泰屯傋阿爾台五十八年十二月詔於駐守阿爾台二萬兵內選一萬五千分道進征明年二月素圖隨征西將軍竒里德自布勒罕潛師深入擒斬山谷伏兵四百餘人七月抵鏗額爾河其宰桑色布騰等據山拒守我師奮擊賊大敗退駐山麓諭降之色布騰率二千餘人來歸明年移駐巴里坤尋赴土魯畨督視築城種地世宗憲皇帝雍正元年隨副將軍阿喇納駐布隆吉爾二年三月厄魯特部阿喇布坦及素巴泰等襲我臺站素圖偕總兵孫繼宗擊敗之賊遁去復追敗其衆乃築城布隆吉爾為駐防邉界十月復隨副都統達鼐追剿羅卜藏丹津至花海子擒丹津台吉及其妻索諾木子衮布并撫定噶斯台吉等三十三人上以口外水凍草枯之候官兵奮勇逺征特旨嘉奬十一月擢寧夏左翼副都統時其父素丹為寧夏將軍上念素丹年老命素圖協理將軍事務五年奉詔率西安滿洲兵二千赴靖邉大將軍傳爾丹軍營七年授參贊大臣八年召素圖隨傅爾丹入覲授方略時策妄阿喇布坦之子噶爾丹策凌與羅卜藏丹津同謀濟惡上命寧逺大將軍嶽鍾琪由西路𠞰擊而素圖同傅爾丹領兵攻其北路九年六月素圖偕副都統岱豪分兵三千與賊戰於庫列圖嶺殺賊四百餘翼日賊兵二萬從高阜來犯我大營素圖會傅爾丹軍夾擊多斬馘時賊據險要我軍議移營至和通呼爾哈諾爾素圖與前鋒統領定壽副都統常祿錫彌賚引兵據山梁東面騎突衝逼我軍分擊殺賊千餘尋為賊圍困素圖力戰殁於陳定夀常祿錫彌賚皆遇害傅爾丹以聞諭曰朕聞諸臣力戰陳亡痛惻難忍不覺淚下其敕議恤於是賜恤如例素圖得騎都尉又一雲騎尉世職合所襲之職為三等男以子素瑚濟襲托特托特滿洲正黃旗人姓佟佳康熙五十三年由筆帖式授理藩院主事纍遷工部郎中雍正元年三月遷內閣侍讀學士六月擢戶部右侍郎三年五月調倉場侍郎六月上念直𨽻被水災民乏食命托特等截留漕米二十萬石貯天津倉備賑托特奏地勢卑濕恐浥爛詔往勘建八月命撥通倉陳米十萬石運天津十一月以所撥米不堪用訓飭之四年十一月奏請於萬安倉開東門二增造船八水運入倉每年疏濬河道部議從之十二月奏言通州大西中南兩倉所儲稄粟米足敷數十年用致厫座不敷新糧露積請嗣後間年全放稄米一次待支用將完仍舊兼放又言向來押運旗丁每幫留一人住通州名曰守候需索分肥弊由斯起嗣後糧艘到通運官造本管旗丁花名册投坐糧廳交畢立押回南違者治官辨以疏縱之罪再各倉例有折價給丁三升八合之項往往勒索遲延希圖舞弊倉場侍郎察出題參其應行南追給者坐糧廳行各糧道照數追給取領狀申報如糧道有勒索情弊總漕查參又各漕幫非失風而挂欠者不得照失風之例止收平米應照當年起運數於次年搭運均下部議行是月命兼理户部侍郎事先是奉旨修京通各倉工竣五年上遣大臣等往查得損漏狀諭曰倉場米石乃國計民命所關顆粒皆當珍惜必厫座堅完米粟方不至於黴爛朕宵旰勤勞不惜數十萬帑金創造修整身任倉場之事者自當加意慎重仰副朕懷乃托特陳守創身任倉場全不實心料理以致倉厫損壞滲漏處至九百二十九座米粟竟有黴爛者並無一語奏聞甚為溺職扎特陳守創俱著革職七年賞侍郎銜出使俄羅斯八年襲其祖舜古邇岱所遺騎都尉世職十年使回補刑部右侍郎旋轉左兼理工部侍郎事務十一年調工部右侍郎又調戶部右侍郎十三年因左侍郎海望署尚書托特轉左協辦步軍統領事務乾隆三年正月奉天將軍傅第等劾知府傅賚與城守尉朝哈岱通判圗善會飲起釁角罵互毆命托特往審得實朝哈岱圗善俱革職傳賚論杖徒如律七月遷漕運總督九年奏言本年因濬運河開兑較遲至渡黃又因清口淤阻途次耽延辨兵等星夜儹行多費工力仰蒙恩命令臣加賞奬勞查漕白糧船一百二幫其先渡淮者並無阻滯兼閘水深通起剝甚少無需議給惟自江西吉安幫至浙江嘉興幫守候二十餘日雇船剝米用力獨多臣擬將依限抵通全完者正副旗丁賞銀一兩領運千總四兩協運隨幫二兩仰副皇上軫念優恤之至意疏入報可十一月奏浙江紹興前後二幫漕船因乾隆二年截漕濟閩減存在次旗丁等已領錢糧部議自乾隆四年始分三年扣還請將該幫本年應領減半糧銀抵充乾隆四年應扣之數餘自乾隆五年起分三年扣完庶運費從容各丁不至拮據從之又疏言漕運起運例用同知通判以總其成領運隨幫辨目以分其任立法詳盡逮回空之日丞倅則借詞引見任意推延千總則托故完呈有心留滯既不親押回南又不料理空船銀米以致副丁資斧不給棄船潛逃或遇淺閣沈溺即至脫幫遺棄弊端百出請於起米後令領運千總督同正丁料理回空各項齊備其應給糧席完呈限坐糧廳監督衙門於十日內給發仍照例給限單飛星趕幫總押丞倅引見後部臣亦給限單令速赴大幫統於到淮日詳核逾者即行參處允之十二月疏言不法旗丁錢糧到手任意銷糜偶不敷動輒逃竄即拏獲懲創一二年後更易姓名復僉管駕故智復萌其故由於已革逃丁無從辨識以致屢革屢僉誤運蠧漕莫此為甚請嗣後有犯除依律治罪外仍照旗逃竊盜例面刺逃丁二字察識既易不能復充似亦懲姦救弊之一法疏入報聞四年七月疏言湖廣漕船由水次抵通計四五千里較他省最遙而行月口糧拆銀四錢較他省獨少且該省米價漸昻非從前定價時可比以故丁力漸艱伏查行月口糧各省皆有本折二色應將湖廣省亦照此例其半仍作折色每石折銀四錢半改本色各照該省兵糧例湖北每石折銀七錢湖南每石六錢丁力既舒體例亦昭畫一經大學士等議行十月遷刑部右侍郎九年調補盛京刑部侍郎十一年以老病乞休許之二十五年卒子佟起襲世職定夀定壽滿洲正黃旗人姓赫舍哩父音達蘭襲其兄竒朗阿三等輕車都尉世職尋卒定夀襲初任三等侍衛授護軍參領康熙五十五年擢正黃旗蒙古副都統五十六年命振武將軍傅爾丹由阿爾台一路進剿策妄阿喇布坦定壽同副都統圗喇率盛京吉林兵一千赴阿爾台尋為軍營前鋒統領擊賊於博囉布爾哈蘇及烏嚕木齊等處屢有斬獲紀功俟事平議敘世宗憲皇帝雍正二年授鑲藍旗蒙古都統時策妄阿喇布坦遣使納欵部議阿爾台駐防兵應移巴里坤於是定夀率之移駐尋奉諭曰定壽在軍前年久朕欲調回另用其所率移駐之兵令交與將軍富寧安就近派大臣管轄即馳驛來京會部議阿爾台一路茂岱察罕搜勒諸處應仍派兵駐防遂授定夀為阿爾台駐防將軍特旨敘前軍功豫騎都尉世襲罔替合所襲之職為一等輕車都尉是年十二月命巴里坤軍營前鋒統領穆克登為阿爾台駐防將軍定夀以都統銜參贊軍務明年授軍營前鋒統領詔率兵駐守阿爾台山嶺四年振武將軍巴賽奏令定夀率兵往扎布罕駐防降雪後撤回六年詔隨穆克登還京定夀奏請仍留察罕搜勒軍營效力允之七年策妄阿喇布坦之子噶爾丹策凌率衆犯邉上授傅爾丹為靖邉大將軍由北路進剿命定夀以都統銜為軍營前鋒統領八年傅爾丹奏令定夀率兵二千往伊克斯諾爾附近駐防九年六月噶爾丹策凌糾賊三萬來犯傅爾丹偕定夀領兵至扎克賽河獲賊二十餘人訊之詭言賊兵不滿千在察罕哈達遊牧尚隔三日程傅爾丹信其言令定夀率兵一千五百先行而自統兵繼進定夀至庫列圗嶺遇賊數千接戰斬賊四百餘駐營以待傅爾丹既至令定夀移營和通呼爾哈諾爾賊兵二萬潛伏山谷伺我軍甫移突出分路阻截定夀擊之所向披靡乘勝深入忽大風驟起雨雹交加賊并力衝散我軍傷損將辨甚衆遂環逼定壽圍之數重時定壽已中鳥鎗傷與賊相持竟夜賊欲生致之乃自刎殁於陳傅爾丹以聞下部議恤晉世爵三等男賜祭葬如例入祀昭忠祠其子赫義襲因銷恩詔所加之職改二等輕車都尉孫扎拉豐阿别有傳拉布敦拉布敦滿洲正黃旗人父尚書錫勒達自有傳康熙五十五年拉布敦由間散襲其叔祖勒爾圗三等輕車都尉世職雍正七年赴北路軍營隨靖邉大將軍傅爾丹𠞰凖噶爾於和通呼爾哈諾爾拉布敦與賊連戰數晝夜斬獲甚衆十年八月隨額駙策凌敗賊於額爾德尼昭十二月授世管佐領十一年查敘軍營超勇人員賞戴孔雀翎十二年奉命率兵越阿爾台山偵探十三年保列一等引見以參領用乾隆元年補參領六年二月授鑲紅旗滿洲副都統三月調正紅旗八年授北路軍營參贊大臣九年署定邉左副將軍疏言偵得布爾吉推河有厄魯特宰桑額勒慎等十餘户駐牧布延圗河源有烏梁海得木齊扎木禪等十餘户駐牧布爾吉推河在阿爾台山梁外布延圗河源在阿爾台山梁內均距卡倫不逺現密劄坐卡侍衛等嚴防詔軍機大臣等議尋議伊等或因避雪來但日久未免生事凖噶爾夷使哈栁現在京應諭以守定界毋任意逰牧令還告台吉噶爾丹策凌即撤回從之十年疏言烏梁海得木齊烏爾巴齊等避雪駐牧黃加書魯克距卡倫甚近託爾和烏蘭及布延圗哈瑪爾沙扎海卡倫外皆有凖噶爾人嚴飭坐卡侍衛等小心防範報聞十一年還京補正白旗滿洲副都統十二年署古北口提督十三年四月駐藏副都統傅清期滿命拉布敦往代十月諭曰據拉布敦奏西藏新襲郡王珠爾默特那木扎勒寄知阿里克交易回人等告稱現在準夷內亂伊即嚴飭各卡緊密防守如有準夷來到即送至藏等語藏地關係緊要駐藏大臣凡事最宜查取確實權其輕重相機辦理毋得稍有滋事藏內不可容留凖夷一人可傳諭拉布敦知之十四年正月還京授工部左侍郎仍兼正白旗副都統六月兼正藍旗副都統並署鑲白旗漢軍都統十二月命仍赴藏辦事傅清亦復往十五年九月擢都察院左都御史時珠爾默特那木扎勒謀叛拉布敦與傅清決計先翦除十月十三日召至通司岡公署數其罪誅之逆黨羅卜藏扎什糾衆肆逆二人同時遇害事詳傅青傳總督策楞以聞上軫悼諭奬其奮不顧身忠誠卓越心甚苦而功甚大贈一等伯入祀賢良昭忠二祠恩授一等子爵世襲罔替初拉布敦族𨽻鑲紅旗至是命入正黃旗十六年命立祠通司岡柩至京上親臨奠醊賞治喪銀萬兩仍賜祭葬如例諡壯果并特建雙忠祠祀之嗣子隆保襲世爵欽定八旗通志卷一百五十二
