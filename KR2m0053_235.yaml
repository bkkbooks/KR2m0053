body:
  text: 人物志一百一忠義𫝊十三滿洲八旗十三至三十七年共六十七人乾隆三十二年雙保雙保滿洲鑲黄旗人姓李佳氏由前鋒授前鋒校乾隆三十年四月出兵烏什奮勇殺賊得頭等功牌四二等功牌二三等功牌三三十二年派往雲南征勦緬甸是年十一月隨将軍公明瑞擊賊於蠻結陣亡賞卹如例恩賜雲騎尉承襲詳見世職表烏爾登額烏爾登額滿洲鑲黄旗人姓瑚錫哈理氏乾隆二十九年由前鋒翎長陞授鳥鎗䕶軍校三十二年派往雲南征勦緬甸是年十二月擊賊於瓊乍里板陣亡賞卹如例恩賜雲騎尉承襲詳見世職表俊徳俊徳滿洲鑲黄旗人姓鈕祜禄氏由親軍於乾隆二十年承襲佐領二十六年揀發雲南以逰擊委用三十二年隨征緬甸擊賊於木邦陣亡賞䘏如例恩賜驍騎校子興義襲倭星額倭星額滿洲鑲黄旗人姓裕瑚魯氏乾隆二十七年由鳥鎗䕶軍隨将軍公明瑞駐防伊犂三十二年六月派往雲南征勦緬甸進至蠻結戰甚力三十三年正月奉㫖授藍翎侍衛賞噶克查巴圖魯號二月擊賊於小猛育陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表葉楞額葉楞額滿洲鑲黄旗人姓費莫氏乾隆三十二年由鳥鎗藍翎長派徃雲南征勦緬甸三十三年正月隨将軍公明瑞擊賊於小猛育陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表納禮穆納禮穆滿洲鑲黄旗人姓鄂羅氏乾隆三十一年由䕶軍陞䕶軍校三十三年派往雲南征勦緬甸是年十二月擊賊於老官屯陣亡賞䘏如例恩賜恩騎尉世職承襲詳見世職表阿第木保阿第木保滿洲鑲黄旗人姓多欣氏由馬甲於乾隆十九年襲佐領出兵凖噶爾奮勇殺賊屡列超等賞戴花翎加副都統銜恩給一等輕車都尉世職二十二年授協尉三十四年出兵雲南攻克猛拱猛飬等處以病殁於軍營得㫖照陣亡例議䘏恩賜騎都尉併前給世職為一等輕車都尉兼一雲騎尉世職承襲詳見世職表繖達色繖達色滿洲鑲黄旗人姓敖拉氏乾隆三十二年由䕶軍授䕶軍校三十四年陞藍翎侍衛三十五年隨征金川是年九月擊賊於得爾宻陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表伊爾素拉伊爾素拉滿洲鑲黄旗人姓納喀塔氏乾隆三十一年由䕶軍陞藍翎侍衛三十四年陞三等侍衛三十七年二月隨征金川六月擊賊於墨壟溝陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表徳禄徳禄滿洲鑲黄旗人姓𤓰勒佳氏由前鋒厯陞防禦乾隆十三年出征金川三十三年隨征緬甸三十六年復調征金川三十七年六月擊賊於䇿耳脚陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表和善和善滿洲鑲黄旗人姓𤓰勒佳氏乾隆二十五年由前鋒授前鋒校三十年擢三等侍衛三十六年隨征金川三十七年十月擊賊於墨壟溝陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表安陀保安陀保滿洲鑲黄旗人姓費莫氏乾隆二十年由健鋭營前鋒出征凖噶爾二十三年出征回部進攻喀什噶爾等處共得功牌八二十九年授驍騎校三十三年揀發貴州以守偹委用三十五年補郎洞營守偹三十六年隨征金川三十七年十月擊賊於路頂宗陣亡賞䘏如例恩賜其子吉祥為驍騎校錫埓敏錫埒敏滿洲鑲黄旗人姓馬佳氏乾隆三十四年由前鋒隨征緬甸三十五年三月回京六月仍派往雲南旋調征金川三十六年進攻巴朗山斯當安路頂宗等處共得功牌十二三十七年十一月授六品頂帶藍翎十二月擊賊於明郭宗陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表阿爾素納阿爾素納滿洲鑲黄旗人姓禄葉勒氏乾隆二十一年由黒龍江三姓地方前鋒出征回部擊賊奮勉共得功牌十二二十五年還京授藍翎侍衛二十七年陞三等侍衛三十四年出征緬甸陞二等侍衛賞額騰義巴圖魯號三十五年三月還京六月復派往雲南旋調赴金川三十六年十二月隨大軍進攻巴朗斯當安等處奮勇先登得功牌五三十七年三月進攻南北二山得功牌二七月陞頭等侍衛十月攻路頂宗得功牌二十一月攻豆烏授副都統銜三十八年閏三月授鑲白旗䝉古副都統六月擊賊於大壩溝陣亡贈都統銜賞䘏如例詔列次五十功臣圖像紫光閣賛曰攻巴朗拉絶巘先登三軍從之以是著稱資哩斯當鷙若鷹隼大壩殺賊名彰身殞恩賜騎都尉又一雲騎尉世職承襲詳見世職表色欽色欽滿洲正黄旗人姓納喇氏乾隆三十二年由前鋒派往雲南征剿緬甸三十三年正月署前鋒校二月隨将軍公明瑞擊賊於小猛育陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表五十四五十四滿洲正黄旗人姓富察氏由䕶軍補前鋒校尋授京營守備厯逰擊叅将累遷至貴州遵義恊副将乾隆三十二年五月派往雲南征剿緬甸三十三年二月隨将軍公明瑞擊賊於小猛育陣亡賞䘏如例恩賜其子佛保太為守備兆海兆海滿洲正黄旗人姓伊爾根覺羅氏由前鋒厯陞前鋒校三十三年隨征緬甸得鳥鎗傷旋調征金川行至褒縣傷𤼵殁賞䘏如例恩賜雲騎尉世職承襲詳見世職表雅爾太雅爾太滿洲正黄旗人姓納喇氏由䕶軍挑補健鋭營前鋒乾隆十九年出兵凖噶爾得功牌三二十二年陞前鋒校二十七年陞委署前鋒叅領三十三年派往雲南征剿緬甸擊賊於老官屯陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表扎爾住扎爾住滿洲正黄旗人姓伊拉里氏乾隆三十一年由健鋭營前鋒授藍翎長三十二年派往雲南征勦緬甸三十四年十二月擊賊於老官屯受傷尋殁賞䘏如陣亡例恩賜恩騎尉世職承襲詳見世職表普寧普寧滿洲正黄旗人姓伊爾根覺羅氏乾隆十九年由健鋭營前鋒出征伊犁得頭等三等功牌各一二十一年出征烏什授筆帖式厯陞䕶軍校佐領二十四年特㫖引見以副䕶軍叅領陞用二十五年補副䕶軍叅領尋調鳥鎗副䕶軍恭領三十一年授鑲藍旗鳥鎗䕶軍恭領三十五年隨征緬甸三十六年調征金川三十七年六月擊賊於墨壟溝陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表巴靈阿巴靈阿滿洲正黄旗人姓寧古塔氏乾隆二十七年由䕶軍派往伊犁三十年出征烏什三十二年補䕶軍校三十三年委署䕶軍恭領三十四年陞貴州大定營都司三十五年隨征金川十一月進勦䟎拉在事奮勇先後得功牌五三十七年七月擊賊於墨壟溝陣亡賞䘏如例恩賜其子烏爾衮為衛千總巴格巴格滿洲正黄旗人姓烏雅拉氏由健鋭營前鋒厯藍翎長副前鋒校乾隆二十年出征凖噶爾二十三年陞前鋒校擢行營委署叅領二十七年叙功恩給雲騎尉世職准襲一次二十九年補委署鳥鎗䕶軍恭領三十二年補鳥鎗副䕶軍恭領三十五年補鳥鎗䕶軍恭領三十六年以副将發往四川試用隨征金川前後得功牌十一三十七年七月擊賊於墨壟溝陣亡賞䘏如例恩賜其子哈番泰為守備拴珠拴珠滿洲正黄旗人姓富察氏乾隆十九年由䕶軍出征伊犁屡有斬獲得頭等三等功牌各一二十八年授藍翎長三十六年隨征金川三十七年十月擊賊於資哩陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表錫囒保錫囒保滿洲正黄旗人姓富察氏由䕶軍厯陞副䕶軍恭領乾隆三十七年隨征金川是年十月擊賊於墨壟溝陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表班第班第滿洲正白旗人姓佟佳氏乾隆十年授藍翎侍衛十二年陞三等侍衛二十二年承襲勲舊佐領二十四年陞副䕶軍叅領二十六年授雲南提標前營逰擊隨征緬甸三十一年十一月擊賊於蠻結陣亡賞䘏如例恩賜其子保旺為衛千總伊柱伊柱滿洲正白旗人姓薩克達氏乾隆二十六年由二等侍衛授頭等侍衛二十七年叙平定凖噶爾及回部功恩給騎都尉世職再襲二次二十八年擢副都統三十二年隨将軍公明瑞出兵雲南擊賊於老官屯尋病殁得㫖照陣亡例議䘏恩賜三等輕車都尉世職承襲詳見世職表専塔専塔滿洲正白旗人姓托和洛氏初由副前鋒校補授驍騎校乾隆二十二年隨将軍兆恵平定凖噶爾賞給雲騎尉世職二十九年委署前鋒章京三十二年三月授副前鋒章京派往雲南征勦緬甸十二月隨将軍公明瑞擊賊於蠻結陣亡賞䘏如例恩賜雲騎尉併前雲騎尉為騎都尉世職承襲詳見世職表景福景福滿洲正白旗人姓烏蘇氏乾隆二十九年由鳥鎗䕶軍授藍翎長三十二年派往雲南征勦緬甸三十三年正月隨将軍公明瑞擊賊於小猛育受傷尋病殁賞䘏如陣亡例恩廕其子錫拉布為七品監生托勒博托勒博滿洲正白旗人姓額蘇理氏乾隆二十七年由前鋒派往伊犁三十年隨将軍公明瑞出兵烏什得功牌五三十三年授藍翎長三十四年五月派往雲南征勦緬甸十月陞前鋒校隨經畧大學士公傅恒擊賊於老官屯陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表烏三太烏三太滿洲正白旗人姓庫雅拉氏由前鋒於乾隆九年授藍翎侍衛十一年陞三等侍衛乾清門行走二十五年授二等侍衛二十七年以平定凖噶爾回部軍功恩給雲騎尉二十九年授頭等侍衛三十三年授副都統尋擢䕶軍統領三十四年隨經畧大學士公傅恒征緬甸派令於旱塔監造船隻是年十一月病殁奏入諭曰烏三太在雲南軍營造船甚屬出力且每遇打仗奮往争先今病殁深堪憫惜着加恩交該部照吉福例議䘏恩賜騎都尉又一雲騎尉世職承襲詳見世職表額爾赫紳額爾赫紳滿洲正白旗人姓費摩氏乾隆三十年由前鋒藍翎長陞鳥鎗䕶軍校三十二年派往雲南征勦緬甸三十四年十二月擊賊於老官屯受傷尋殁賞䘏如例恩賜恩騎尉世職承襲詳見世職表哈爾赳哈爾赳滿洲正白旗人姓庫雅拉氏乾隆三十四年由前鋒授藍翎侍衛擢三等侍衛三十六年隨征金川三十七年三月擊賊於日耳寨陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表富勒琿富勒琿滿洲正白旗人姓他塔喇氏乾隆十三年由前鋒出征金川遇事奮勉凱旋授健鋭營前鋒翎長陞前鋒校二十年出征凖噶爾授委署前鋒章京二十三年出征回部屡有勞績厯陞前鋒章京二十七年叙功給雲騎尉世職三十一年派往伊犁三十二年擢正白旗漢軍副都統尋兼公中佐領三十七年隨征金川擊賊於木蘭壩熱爾塞等處六月攻木城得嘔血病尋殁諭曰富勒琿在四川軍營奪取賊人碉卡殺賊無算實屬奮勉染病身故殊為可惜着加恩照陣亡例議䘏恩賜騎都尉又一雲騎尉世職承襲詳見世職表額勒錦額勒錦滿洲正白旗人姓達瑚哩氏乾隆二十八年由䕶軍授藍翎侍衛三十年擢三等侍衛三十二年授副䕶軍叅領三十六年隨征金川三十七年六月擊賊於墨壟溝陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表雅平阿雅平阿滿洲正白旗人姓庫雅拉氏乾隆三十六年由䕶軍授空銜藍翎隨征金川三十七年十月擊賊於木爾古魯山陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表三格泰三格泰滿洲正紅旗人姓薩哈爾察氏乾隆三十二年由健鋭營前鋒派往雲南征勦緬甸委署前鋒校隨将軍公明瑞擊賊於蒲卡蠻結陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表觀音保觀音保滿洲正紅旗人姓巴約特氏由前鋒校派往雲南征勦緬甸乾隆三十二年十一月擊賊於老官屯陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表七十一七十一滿洲正紅旗人姓博和理氏由前鋒委署前鋒校乾隆三十二年派往雲南征勦緬甸是年十二月擊賊於蠻結陣亡賞䘏如例恩賜雲騎尉世職承襲詳見世職表拉罕保拉罕保滿洲正白旗人姓郭佳氏乾隆三十三年由䕶軍授藍翎侍衛三十七年三月隨征金川十月擊賊於墨壟溝陣亡