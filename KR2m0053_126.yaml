  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_126-1a, image: WYG0665/WYG0665-0916c.png}
body:
  text: 營建志一謹案易大𫝊曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨盖取諸大壯是營建亦帝王之大政利用之所必資也大雅篤公劉詩記公劉之剏業其五章曰度其夕陽豳居允荒其六章曰取厲取鍜止基迺理是卜居與徹田並重也又緜詩述太王之肇基其五章曰乃召司空乃召司徒俾立室家其䋲則直縮版以載作廟翼翼其六章曰捄之陾陾度之薨薨築之登登削屡馮馮百堵皆興鼛鼓弗勝其七章曰乃立臯門臯門有伉迺立應門應門將將乃立冢土戎醜攸行九章之中言土功者居其三亦叙述特詳厥後周公立制遂以司空偹六官古經亡佚其規制不盡可考而夏官量人之職所謂營國城郭營后宫量市朝道巷門渠及營軍之壘舍者考工記匠人之職所謂建國營國為溝洫者尚畧存其梗概聖人之於興作若是其鄭重不茍也歴代相沿皆以冬官為重任厥有由歟班馬以來史家以營建之大者散見紀𫝊不别為志郡邑志則率有是門於一樓一閣叙述亦詳盖著書各有體例也今纂八旗通志其書近乎郡邑志而其事則皆朝章國典又近乎史家謹酌乎二者之間凖諸輿記仍立此門而刪除一切流連玩賞冗𤨏無益之名勝以取合於史裁庶不遺不濫俾前事有徵凡八旗邸第宅舍曹署倉庫學舍營壘之屬内而京師外而諸處之駐防並核其廣狹多少之規模剏造修葺之年月具著於篇作營建志營建志一京城營建規制一諸王府第領八旗都統衙門步附前鋒統䕶軍統領軍統領諸王府第崇徳年間定親王府臺基髙一丈正房一座廂房二座内門盖於臺基外緑瓦硃漆兩層樓一座並其餘房屋及門俱在平地盖造樓房大門用平常筒瓦其餘用板瓦郡王府臺基髙八尺正房一座廂房二座内門盖於臺基上兩層樓一座正房及内門用緑瓦兩廂房用平常筒瓦俱硃漆餘與親王同貝勒府臺基髙六尺正房一座廂房二座内門盖於臺基上用平常筒瓦硃漆餘與郡王同貝子府正房廂房俱在平地盖造大門用硃漆板瓦崇徳元年五月命内院大學士范文程希福剛林學士羅碩宫詹羅錦繡至和碩親王多羅郡王多羅貝勒府門前立下馬樁凡王府不遵定制臺基過髙及多盖房屋者俱治罪順治元年定和碩親王以下屋基之制和碩親王多羅郡王多羅貝勒照例臺基上造屋五座固山貝子鎮國公輔國公屋䑓髙二尺十月又定諸王貝勒貝子公等脊瓦俱用緑色順治五年定王公府第制和碩親王繪金彩五爪龍柱施純色紅青不許雕龍首殿樓門基址髙與室基等多羅郡王繪金彩四爪龍多羅貝勒繪金彩各色花卉固山貝子鎮國公輔國公繪金彩細花卉餘與諸王制同九年題准親王府殿樓門基高與府臺基等座位髙八尺長一丈一尺濶九尺座基髙一尺五寸施以硃漆貼金彩畫五爪龍後屏繪五爪龍及五色雲止用繪漆不准雕刻殿前門首用石欄杆餘如舊制世子府臺基髙八尺殿樓房屋及門繪金彩四爪龍餘與親王同郡王府與世子同貝勒府貝子府堂門臺基俱髙與府臺基等鎮國公輔國公府俱與貝子同康熙六年建裕親王府大門一座五間正殿一座七間東西配樓二座每座九間左右順山房二座毎座八間後殿一座五間左右正房二座毎座三間左右門二座毎座三間牌房門一座寢殿一座七間抱厦五間東西配殿二座毎座五間南北廂房各二座毎座三間後樓一座七間隨樓轉角房二座毎座八間倉房二十三間圍房二十三間週圍墻一道長一百一十五丈三尺高一丈六尺厚五尺其正殿正門覆以緑色琉璃瓦又家廟正殿三間東西配殿六間大門三間週圍牆五十九丈花門一座燎爐一座十三年建恭親王府規制與裕親王府同其餘府第多係自造大略相同禮親王府正紅旗肅親王府鑲白旗豫親王府正藍旗鄭親王府鑲藍旗莊親王府鑲紅旗恒親王府鑲白旗怡親王府正藍旗果親王府正紅旗理親王府鑲藍旗睿親王府正藍旗諴恪親王府正藍旗定親王府正藍旗質親王府鑲藍旗成親王府正紅旗克勤郡王府鑲紅旗順承郡王府正紅旗淳郡王府鑲白旗恵郡王府鑲紅旗愉郡王府正紅旗履郡王府鑲白旗寧郡王府正藍旗儀郡王府鑲白旗理郡王府鑲黄旗和郡王府正藍旗謹案禮親王肅親王豫親王鄭親王克勤郡王皆崇徳年間封莊親王順承郡王皆順治年間封裕親王㳟親王恒親王怡親王淳郡王恵郡王皆康熙年間封果親王理親王愉郡王履郡王寧郡王皆雍正年間封其建府年月與封爵年月或先或後不等今不縷載謹載康熙年間裕親王府乾隆年間定親王府以行其規制云乾隆四十七年建定親王府在西四牌樓大門一座五間側門二座每座三間倒㕔一座五間随圍房四座計三十間大衙門一座五間翼樓二座毎座五間穿堂二座毎座一間轉角房二座毎座七間三門一座五間配房二座毎座三間神房一座五間配房二座每座五間順山房二座每座三間後樓一座七間轉角房二座毎座七間丁字房二座計二十二間水房浄房四座計六間東所阿哥正房二座毎座五間穿堂一座五間照房一座七間配房四座毎座三間浄房二座每座一間值房五座計三十一間西所佛堂一座三間穿堂一座三間抱厦房一座八間配房二座每座三間浄房二座每座一間茶飯房庫房值房十座計四十四間馬圈房五座計二十五間週圍墻一道長一百五十三丈正門三間頭停􅩘緑色琉璃减邊布瓦大衙門神房頭停滿􅩘緑色琉璃脊瓦其餘頭停俱􅩘布筒版瓦謹案貝勒貝子公等府舊志未載今仍其舊八旗都統衙門雍正元年九月十五日上諭和碩莊親王内務府來寶現今八旗並無公所衙門爾等將官房内㨂皇城附近選擇八處立為該管旗官公所房舍亦不用甚寛大特諭鑲黄旗滿洲蒙古漢軍都統衙門初設於拐棒衚衕雍正六年奏准将安定門内大街官房一所共五十七間作為三旗都統衙門雍正七年奏准將滿洲都統衙門移設於東直門内大街官房一所計七十五間乾隆二年奏准将安定門大街交道口東官米局一所三十六間作為滿洲都統衙門七年奏准増買衙後房三十一間三十五年添盖房二十三間半十九年奏准将䝉古都統衙門移設於新橋南計房四十一間漢軍都統衙門仍在安定門大街據本衙門來丹謹案各處房屋自雍正以前者皆存舊志于前自乾隆以後者皆據来冊各續於後其或彼此互異非舊志所書未核即年乆失其増損之故今悉以現存者為斷庶無參差矛盾之處至舊志失載並為補入餘皆倣此凡舊志及新據来冊字様不悉註云正黄旗滿洲䝉古漢軍都統衙門初設於石虎衚衕雍正六年奏准将徳勝門内帥府樓衚衕官房一所共六十四間作為三旗都統衙門七年又将漢軍都統衙門移設於西直門内丁家井官房一所計三十四間十三年奉㫖将滿洲䝉古衙房賞給愉恭郡王乾隆元年移設滿洲蒙古都統衙門於徳勝橋南大街滿洲計房七十一間半䝉古計房三十間正白旗滿洲蒙古漢軍都統衙門初設於煙桶衚衕雍正四年奏准将滿洲都統衙門移設於大佛寺西大街官房一所計二十四間七年奏准将䝉古漢軍都統衙門移設於東四牌樓報房衚衕官房一所共五十七間又二半間乾隆十八年因滿洲都統衙門坍塌又移於朝陽門内老君堂衚衕官房一所九十六間半䝉古漢軍衙門續増三十四間正紅旗滿洲蒙古都統衙門初設於錦什坊街官房一所共三十一間雍正七年奏准將䝉古都統衙門移設於巡捕㕔衚衕官房一所計二十間漢軍都統衙門原設於鷲峯寺街官房一所計二十八間乾隆元年以後滿洲衙門續増二十九間半漢軍衙門續増二十四間鑲白旗滿洲䝉古漢軍都統衙門初設於東單牌樓新開路衚衕雍正四年奏准将燈市口西口官房一所共一百零一間作為三旗都統衙門六年又将漢軍都統衙門移設於東四牌樓大街燈草衚衕官房一所計三十七間乾隆十八年将蒙古都統衙門移設於東安門外干雨衚衕官房一所五十四間漢軍都統衙門五十一年添盖房二間其滿洲都統衙門現存房七十一間謹案滿洲都統衙門舊志一百零一間今来冊七十一間又未聲眀減損之故難以臆斷後凡似此者仍兩存之鑲紅旗滿洲䝉古漢軍都統衙門初設於石駙馬街南雍正六年奏准將石駙馬街北官房一所共一百零四間作為三旗都統衙門乾隆元年増房二間正藍旗滿洲䝉古漢軍都統衙門初設於崇文門内大街西堂子衚衕雍正七年奏准将東四牌樓燈市口大街本司衚衕西口官房一所共五十三間作為三旗都統衙門乾隆二十二年漢軍都統衙門増置房十一間五十七年重盖漢軍衙門五十八年増房一間鑲藍旗滿洲蒙古漢軍都統衙門初設於宣武門内塘子衚衕東邉寛街地方官房一所共六十八間雍正七年奏准将䝉古都統衙門移設於太僕寺街路北官房一所計三十五間半乾隆三十五年奏准將滿洲都統衙門移設於阜城門内華嘉寺衚衕官房一所九十一間謹案八旗都統衙門各有馬圈房屋舊志既未别出又乾隆五十九年現奉諭㫖将馬匹分給文武官員及兵丁拴養其官房馬棚俟一二年後養馬果有禆益再行拆去另盖房屋給兵丁居住故今亦不用分載謹聲眀於此左翼前鋒統領衙門原在石槽衚衕共房十五間雍正十二年移設於東四牌樓本司衚衕共房十九間右翼前鋒統領衙門共二十間坐落巡捕㕔衚衕左翼䕶軍統領衙門共六十五間坐落崇文門内驢市衚衕右翼䕶軍統領衙門共五十三間坐落西四牌樓臭皮衚衕歩軍統領衙門原在安定門大街西草厰衚衕共六十七間雍正十二年奏准移設於京畿道衚衕官房一所九十餘間乾隆二十一年奏准又将西安門外㑹同舘官房一所作為歩軍統領衙門欽定八旗通志卷一百十二
