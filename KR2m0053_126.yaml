body:
  text: 營建志一謹案易大傳曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯是營建亦帝王之大政利用之所必資也大雅篤公劉詩記公劉之創業其五章曰度其夕陽豳居允荒其六章曰取厲取煆止基乃理是卜居與徹田並重也又綿詩述太王之肇基其五章曰乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼其六章曰救之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝其七章曰乃立臯門臯門有伉乃立應門應門將將乃立冢土戎醜攸行九章之中言土功者居其三亦敘述特詳厥後周公立制遂以司空偹六官古經亡佚其規制不盡可考而夏官量人之職所謂營國城郭營后宫量市朝道巷門渠及營軍之壘舍者考工記匠人之職所謂建國營國為溝洫者尚略存其梗概聖人之於興作若是其鄭重不茍也歷代相沿皆以冬官為重任厥有由歟班馬以來史家以營建之大者散見紀傳不别為志郡邑志則率有是門於一樓一閣敘述亦詳蓋著書各有體例也今纂八旗通志其書近乎郡邑志而其事則皆朝章國典又近乎史家謹酌乎二者之間凖諸輿記仍立此門而刪除一切流連玩賞冗瑣無益之名勝以取合於史裁庶不遺不濫俾前事有徵凡八旗邸第宅舍曹署倉庫學舍營壘之屬內而京師外而諸處之駐防並核其廣狹多少之規模創造修葺之年月具著於篇作營建志營建志一京城營建規制一諸王府第領八旗都統衙門步附前鋒統護軍統領軍統領諸王府第崇德年間定親王府臺基髙一丈正房一座廂房二座內門蓋於臺基外緑瓦硃漆兩層樓一座並其餘房屋及門俱在平地蓋造樓房大門用平常筒瓦其餘用板瓦郡王府臺基髙八尺正房一座廂房二座內門蓋於臺基上兩層樓一座正房及內門用緑瓦兩廂房用平常筒瓦俱硃漆餘與親王同貝勒府臺基髙六尺正房一座廂房二座內門蓋於臺基上用平常筒瓦硃漆餘與郡王同貝子府正房廂房俱在平地蓋造大門用硃漆板瓦崇德元年五月命內院大學士范文程希福剛林學士羅碩宫詹羅錦繡至和碩親王多羅郡王多羅貝勒府門前立下馬樁凡王府不遵定制臺基過髙及多蓋房屋者俱治罪順治元年定和碩親王以下屋基之制和碩親王多羅郡王多羅貝勒照例臺基上造屋五座固山貝子鎮國公輔國公屋臺髙二尺十月又定諸王貝勒貝子公等脊瓦俱用緑色順治五年定王公府第制和碩親王繪金彩五爪龍柱施純色紅青不許雕龍首殿樓門基址髙與室基等多羅郡王繪金彩四爪龍多羅貝勒繪金彩各色花卉固山貝子鎮國公輔國公繪金彩細花卉餘與諸王制同九年題準親王府殿樓門基高與府臺基等座位髙八尺長一丈一尺濶九尺座基髙一尺五寸施以硃漆貼金彩畫五爪龍後屏繪五爪龍及五色雲止用繪漆不準雕刻殿前門首用石欄杆餘如舊制世子府臺基髙八尺殿樓房屋及門繪金彩四爪龍餘與親王同郡王府與世子同貝勒府貝子府堂門臺基俱髙與府臺基等鎮國公輔國公府俱與貝子同康熙六年建裕親王府大門一座五間正殿一座七間東西配樓二座每座九間左右順山房二座每座八間後殿一座五間左右正房二座每座三間左右門二座每座三間牌房門一座寢殿一座七間抱厦五間東西配殿二座每座五間南北廂房各二座每座三間後樓一座七間隨樓轉角房二座每座八間倉房二十三間圍房二十三間周圍墻一道長一百一十五丈三尺高一丈六尺厚五尺其正殿正門覆以緑色琉璃瓦又家廟正殿三間東西配殿六間大門三間周圍牆五十九丈花門一座燎爐一座十三年建恭親王府規制與裕親王府同其餘府第多係自造大略相同禮親王府正紅旗肅親王府鑲白旗豫親王府正藍旗鄭親王府鑲藍旗莊親王府鑲紅旗恆親王府鑲白旗怡親王府正藍旗果親王府正紅旗理親王府鑲藍旗睿親王府正藍旗諴恪親王府正藍旗定親王府正藍旗質親王府鑲藍旗成親王府正紅旗克勤郡王府鑲紅旗順承郡王府正紅旗淳郡王府鑲白旗惠郡王府鑲紅旗愈郡王府正紅旗履郡王府鑲白旗寧郡王府正藍旗儀郡王府鑲白旗理郡王府鑲黃旗和郡王府正藍旗謹案禮親王肅親王豫親王鄭親王克勤郡王皆崇德年間封莊親王順承郡王皆順治年間封裕親王恭親王恆親王怡親王淳郡王惠郡王皆康熙年間封果親王理親王愈郡王履郡王寧郡王皆雍正年間封其建府年月與封爵年月或先或後不等今不縷載謹載康熙年間裕親王府乾隆年間定親王府以行其規制云乾隆四十七年建定親王府在西四牌樓大門一座五間側門二座每座三間倒廳一座五間隨圍房四座計三十間大衙門一座五間翼樓二座每座五間穿堂二座每座一間轉角房二座每座七間三門一座五間配房二座每座三間神房一座五間配房二座每座五間順山房二座每座三間後樓一座七間轉角房二座每座七間丁字房二座計二十二間水房淨房四座計六間東所阿哥正房二座每座五間穿堂一座五間照房一座七間配房四座每座三間淨房二座每座一間值房五座計三十一間西所佛堂一座三間穿堂一座三間抱厦房一座八間配房二座每座三間淨房二座每座一間茶飯房庫房值房十座計四十四間馬圈房五座計二十五間周圍墻一道長一百五十三丈正門三間頭停􅩘緑色琉璃減邊布瓦大衙門神房頭停滿􅩘緑色琉璃脊瓦其餘頭停俱􅩘布筒版瓦謹案貝勒貝子公等府舊志未載今仍其舊八旗都統衙門雍正元年九月十五日上諭和碩莊親王內務府來寶現今八旗並無公所衙門爾等將官房內㨂皇城附近選擇八處立為該管旗官公所房舍亦不用甚寬大特諭鑲黃旗滿洲蒙古漢軍都統衙門初設於拐棒胡同雍正六年奏準將安定門內大街官房一所共五十七間作為三旗都統衙門雍正七年奏準將滿洲都統衙門移設於東直門內大街官房一所計七十五間乾隆二年奏準將安定門大街交道口東官米局一所三十六間作為滿洲都統衙門七年奏準增買衙後房三十一間三十五年添蓋房二十三間半十九年奏準將蒙古都統衙門移設於新橋南計房四十一間漢軍都統衙門仍在安定門大街據本衙門來丹謹案各處房屋自雍正以前者皆存舊志于前自乾隆以後者皆據來册各續於後其或彼此互異非舊志所書未核即年久失其增損之故今悉以現存者為斷庶無參差矛盾之處至舊志失載並為補入餘皆倣此凡舊志及新據來册字樣不悉注云正黃旗滿洲蒙古漢軍都統衙門初設於石虎胡同雍正六年奏準將德勝門內帥府樓胡同官房一所共六十四間作為三旗都統衙門七年又將漢軍都統衙門移設於西直門內丁家井官房一所計三十四間十三年奉旨將滿洲蒙古衙房賞給愈恭郡王乾隆元年移設滿洲蒙古都統衙門於德勝橋南大街滿洲計房七十一間半蒙古計房三十間正白旗滿洲蒙古漢軍都統衙門初設於煙桶胡同雍正四年奏準將滿洲都統衙門移設於大佛寺西大街官房一所計二十四間七年奏準將蒙古漢軍都統衙門移設於東四牌樓報房胡同官房一所共五十七間又二半間乾隆十八年因滿洲都統衙門坍塌又移於朝陽門內老君堂胡同官房一所九十六間半蒙古漢軍衙門續增三十四間正紅旗滿洲蒙古都統衙門初設於錦什坊街官房一所共三十一間雍正七年奏準將蒙古都統衙門移設於巡捕廳胡同官房一所計二十間漢軍都統衙門原設於鷲峯寺街官房一所計二十八間乾隆元年以後滿洲衙門續增二十九間半漢軍衙門續增二十四間鑲白旗滿洲蒙古漢軍都統衙門初設於東單牌樓新開路胡同雍正四年奏準將燈市口西口官房一所共一百零一間作為三旗都統衙門六年又將漢軍都統衙門移設於東四牌樓大街燈草胡同官房一所計三十七間乾隆十八年將蒙古都統衙門移設於東安門外干雨胡同官房一所五十四間漢軍都統衙門五十一年添蓋房二間其滿洲都統衙門現存房七十一間謹案滿洲都統衙門舊志一百零一間今來册七十一間又未聲眀減損之故難以臆斷後凡似此者仍兩存之鑲紅旗滿洲蒙古漢軍都統衙門初設於石駙馬街南雍正六年奏準將石駙馬街北官房一所共一百零四間作為三旗都統衙門乾隆元年增房二間正藍旗滿洲蒙古漢軍都統衙門初設於崇文門內大街西堂子胡同雍正七年奏準將東四牌樓燈市口大街本司胡同西口官房一所共五十三間作為三旗都統衙門乾隆二十二年漢軍都統衙門增置房十一間五十七年重蓋漢軍衙門五十八年增房一間鑲藍旗滿洲蒙古漢軍都統衙門初設於宣武門內塘子胡同東邉寬街地方官房一所共六十八間雍正七年奏準將蒙古都統衙門移設於太僕寺街路北官房一所計三十五間半乾隆三十五年奏準將滿洲都統衙門移設於阜城門內華嘉寺胡同官房一所九十一間謹案八旗都統衙門各有馬圈房屋舊志既未别出又乾隆五十九年現奉諭旨將馬匹分給文武官員及兵丁拴養其官房馬棚俟一二年後養馬果有禆益再行拆去另蓋房屋給兵丁居住故今亦不用分載謹聲眀於此左翼前鋒統領衙門原在石槽胡同共房十五間雍正十二年移設於東四牌樓本司胡同共房十九間右翼前鋒統領衙門共二十間坐落巡捕廳胡同左翼護軍統領衙門共六十五間坐落崇文門內驢市胡同右翼護軍統領衙門共五十三間坐落西四牌樓臭皮胡同步軍統領衙門原在安定門大街西草厰胡同共六十七間雍正十二年奏準移設於京畿道胡同官房一所九十餘間乾隆二十一年奏準又將西安門外會同館官房一所作為步軍統領衙門欽定八旗通志卷一百十二
