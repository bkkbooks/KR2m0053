body:
  text: 欽定四庫全書欽定八旗通志卷一百九十人物志七十大臣傳五十六漢軍鑲黄旗二范李興元張盧崇峻佟國正承謨長庚靳輔李興元李興元遼陽人𨽻漢軍鑲黄旗順治五年由㧞貢生授直𨽻沙河縣知縣卓異遷祁州知州洊歴江西吉安府知府康熙五年改補直𨽻永平府知府查觧逃人六十名以上叙功即陞七年遷長蘆鹽運使八年轉陕西隴右道十一年擢雲南按察使時命察釋藩下佔民間子女為奴者興元力遵行十二年十一月逆藩呉三桂反集衆脅受偽職興元厲聲抗言曰汝内為國戚外封親王受恩最重何為叛我為丈夫可殺不可辱惟一死以報朝廷呉逆囚之纍繫其家屬閲六載終不稍屈十八年十月大兵恢復湖南時三桂已死逆孽世璠徙興元於䝉化十九年大兵入黔逆勢日蹙偽閣部郭壯圖棄黔回滇慮後患十月遣賊黨絞死興元家口仍覊候二十年十月大兵困滇城興元二子䕃秀竒秀俱被殺雲南平其第三子萃秀詣軍前申訴二十一年廵撫王繼文察核得實具疏請卹得㫖李興元贈太常寺卿廕一子入監讀書雍正七年入祀昭忠祠乾隆十六年特㫖李興元雖從前未賞世職但為國効忠情甚可憫著加賞恩騎尉世襲㒺替萃秀由廕生授四川廣安州知州累遷湖廣安陸府知府元孫肇祥襲恩騎尉由鑾儀衛治儀正授直𨽻懐柔都司調八溝都司四十一年遷廣東韶州逰擊盧崇峻盧崇峻漢軍鑲黄旗人祖國志明廣寜守備投誠授三等輕車都尉崇峻初由官監生考授户部副理事官順治五年三月襲世職兼任佐領閠四月遷禮部理事官三遇恩詔加世職至三等男十一年授叅領十二年駐防京口十三年擢吏部右侍即十四年總督宣大軍務十五年缺裁還京十八年授廣東總督康熙元年以肇慶總兵缺裁請將所屬諸營歸附近各副將轄允之時廣東多土㓂依險竊發二年七月崇峻遣兵赴東莞新安殱賊九百餘八月命同都統宜里布查勘邉海九月復捕斬香山賊首趙劈石興寜賊首李宗韜而廣西賊首陸明初譚國經譚化春韋太寜等流入廣東之亷州猶㓂掠為害三年八月崇峻檄遊擊安邦等擊斬之㑹海賊蘇利既降處碣石衛畏遷復叛九月崇峻與平南王尚可喜合兵搗剿擒利誅之得㫖嘉奬下部議叙十二月疏言化石一營額兵僅六百名向設恭將守備各一千總二把總四兵少官多不符營制請裁恭將及把總二又石城地處衝要守備應駐石城分千把總各一駐化州聼髙雷總兵轄部議如所請是月丁父憂命在任守制四年三月剿海賊楊二等餘孽追至安南外境殱千三百餘燬船四十六又剿平新㑹新寜増城土賊四月追斬蜑㓂李榮於海口降其衆四千餘並下部議叙尋疏言廣東邉界應各留一出海之口由水路者香山縣以順徳横石磯為口由陸路者廣南衛以城岡堡大鵬所以歸善淡水平海所以白雲墟海門所以潮陽南闗為口騐照放行便官軍糧道並嚴禁奸民出海部議從之是月崇峻以廣東連歳用兵請蠲康熙四年以前逋賦奉㫖順治十八年以前拖欠錢糧已頒赦盡行蠲免今盧崇峻復將康熙四年以前積欠請蠲狥情於下殊為不合著嚴飭行六月疏請勒無度牒僧道還俗開墾荒田允之尋命回京終制五年三月補河道總督五月疏言臣標三營専任防河兼備通漕遇事分遣四應康熙元年沂鎮總兵楊㨗派防金鄉鉅野魚臺東平單陽陽榖六州縣舊無此例臣標兵祇二千五百餘名即盡歸河干猶恐不敷調遣豈能兼頋懇將臣標官兵不許提鎮越管其分防者撤歸另於就近派撥再各省總督皆節制廵撫提鎮臣既専管河道各提督亦有防漕之責可否照例聼臣節制詔下其疏於部以崇峻不合請節制提督特㫖嚴飭部議允撤河標分防州縣兵八月追叙平蘇利功加一雲騎尉為二等男十一月授山陕總督六年八月丁祖母憂仍在任守制十月疏言前因西畨部落戀牧内地且布浮言臣親赴莊浪防禦現在畨衆俱歸原處駐牧其台吉等亦遣使服罪官兵應撤報聞十一月以捐銀助修通州城垣加兵部尚書銜十二月奏准回京終制以違例取勘合擅支夫馬經兵部劾奏敕部議處八年八月命吏部覆核各督撫功過部議以崇峻功少過多應降二級調用得㫖削尚書銜留三等男世職随旗行走十八年署副都統隨大軍擊逆孽呉世璠黨於松滋縣復其城二十年進取雲南二十一年還京二十二年授恊領管火器營事四十年卒子承祜降襲一等輕車都尉佟國正佟國正漢軍鑲黄旗人姓佟佳順治七年由㧞貢生授江南無為州知州十二年遷直𨽻大名府知府十六年遷廣東南韶道十七年調陕西延綏靖邉道十八年牒陳四事一靖邉道轄七保二所屯糧向由各保所將弁徴觧道臣督催今奉㫖兵馬全歸提鎮錢糧専任撫臣請將屯糧改歸西路管糧同知徴觧一營保兵缺祗應募充不得勾屯民妨農業一欠糧刁民往往投充營伍向來將弁猶屬撫道甄别今文武不相統攝難保無匿庇情弊請嗣後許移文將領追䆒若該管狥庇立即掲恭一靖邉道之設向以稽核兵馬整飭邉防今官兵既歸提鎮管攝錢糧請改同知徴觧道臣已屬冗員乞裁汰廵撫張中第據牒以聞下部議從之康熙二年改補江南淮海道三年遷安徽按察使十三年遷江西布政使時逆藩呉三桂耿精忠相繼叛賊兵分犯江西㑹廵撫白色純卒大將軍安親王岳樂奏國正甚得民心特擢江西廵撫十五年正月大將軍簡親王喇布言贑州為江西門戸投誠將士雜處弹壓需人詔國正赴贑州駐守十一月廣東從逆提督嚴自明總兵張星耀等紏衆偪南康國正遣副將許盛等剿賊於庫鎮舖破其營十七追七十餘里斬獲甚衆賊遁走南安逆黨黄士標王割耳等犯信豐國正遣守備楊以松與副將周球分三路擊之斬首二千餘賊潰竄南雄十二月遣許盛等𠞰上猶賊復其城又遣周球等擊敗偽將郭應輔于黄土闗斬賊五千復龍泉縣龍泉舊以守備駐防國正言地介邉鄙宻邇湖南桂東守備不足弹壓請改設逰擊從之是年遣隨征官馬贄招降偽副將羅復彪都司張元仁總兵劉永琪等國正聞大兵克復汀州恐賊竄入贑州宻飭營汛嚴守並分遣恭將劉體君及周球等由間道相機恢剿十六年正月大破賊於五里排復㑹昌縣偽總兵楊夢月降尋復瑞金縣先後招撫偽總兵賴鼎球等百五十二人兵萬六千五月復崇義縣招降偽總兵賴榮等十七人兵萬餘逆賊韓大任自寜都敗竄萬安國正慮逸入楚境宻調兵赴良口大王廟黄塘截其歸路别遣將繞出興國縣田村大江口斷賊糧道賊窘甚竄突復遣逰擊楊以松等四路追剿十二月擊賊於鸕鷀寨十七年正月追至老虎洞大敗之大任窮蹙走汀州詣康親王傑書軍門降江西平國正還省城八月叙功加兵部右侍即銜十月加兵部尚書銜授正一品階十八年正月左副都御史楊雍建以江右為衝繁要地國正蒞任數載治蹟無聞流移未能盡復田野未能盡闢分牧之有司未能奉法請勅令國正陛見詢以地方利弊民生休戚國正之庸碌無能難迯睿鍳詔國正明白回奏時舉行京察國正遵例自陳上以國正才力不及降二級調用覆疏入部議國正已降調母庸議四十七年正月卒於家范承謨范承謨漢軍鑲黄旗人大學士范文程第二子也初任侍衛順治八年更定八旗漢軍考試之例承謨中式舉人明年成進士選庶吉士授宏文院編修十二年遷秘書院侍讀學士十八年聖祖仁皇帝御極擢國史院學士康熙三年以疾乞假尋補秘書院學士教習庶吉士充纂修世祖章皇帝實錄副總裁官七年授浙江廵撫九年杭州嘉興湖州紹興諸府被水承謨奏貸藩庫銀八萬两糴米湖廣以平糶應徴漕米請每石折銀一两於明年麥熟後徴觧其白糧分三年帯徵被災重者如例蠲免並得㫖允行先是寜波金華衢台温處諸府屬荒田以前任總督趙廷臣請除額賦有㫖令承謨履勘至是承謨遍歴其地奏豁荒棄田地二十九萬四千六百餘畆水衝缺額田地二萬一千九百餘畆十年以疾請觧任命乘驛回京調理浙江總督劉兆麒提督塞白理各疏言浙省年來當荒敝時而民生不致重困者皆撫臣承謨之力今以病請告百姓投詞攀留積一百五十餘紙不敢壅於上聞給事中姜希轍柯聳御史何元英等亦言承謨受事三載愛民如子餽遺請謁不通劾奏貪墨亷治巨猾剔除加耗陋規私派積弊單騎勘荒悉心賑恤浙人愛戴深於饑渇今雖積勞致疾懇特勅勉留上諭吏部曰前因浙江廵撫范承謨以患病具奏准其回京調理今據督提等奏稱百姓愛戴號泣請留情詞懇切特順民情仍留原任十一年八月承謨疏言浙省徴輸白糧其加耗多寡不一湖州每石加五斗五升嘉興毎石加八斗為運丁㫪辦諸費請嗣後令糧戸以㫪白米輸納概限加耗四斗五升又請豁台温二衛康熙九年以前荒逋銀两及石門平陽未完輕齎月糧等項皆下户部議行十月擢福建總督承謨以海疆重任難副辭上弗允因疏請陛見十二年七月至京召對承謨奏舊疾未痊上遣御醫診視賜藥餌逾月疾稍愈命馳赴新任賜冠服鞍馬遣侍衛烏丹傳諭曰爾向有賢聲與他人不同且福建邉疆重地海氛未靖爾其益加勉勵副朕委任初福建總督駐漳州至是將撤靖南藩屬還京特命移駐福州承謨奏擕其家舊賜䝉古壯勇八十餘人以行甫抵任聞逆藩呉三桂反承謨察耿精忠有異志綜計督標兵少又與精忠所部習不足恃乃疏言閩省經制兵自康熙八年依部議裁汰已及三千餘名尚應裁汰二千五百餘名現在兵單汛廣請暫停裁汰遇缺以投誠人充補又請廵行海濵酌寛邉界令民開墾分遣鎮兵屯種隙地以裕軍餉疏上未及行精忠已叛先佯言海㓂至邀承謨議事廵撫劉秉政隂附精忠促承謨行承謨知有變左右盡擐甲以從承謨曰衆寡不敵備無益也乃坦然按轡至則逆衆蜂屯露刃承謨挺身前抗辭罵賊精忠困以桎梏閉之隘室晝夜防伺甚宻使毋死承謨罵不絶口一日精忠遣秉政説之降承謨奮足蹴秉政仆地叱左右掖出曰賊誅戮將不逺兹先褫其魄矣為賊困踰二年冠賜冠衣辭母時衣毎朔望奉時憲書一册懸之北靣跪拜間為詩文以桴炭畫壁上當承謨甫為賊困時部曲有張福建者手雙刀奮呼奪門連斃賊人力竭被執死又䝉古人嘛呢為偽㪚騎即精忠遣之守承謨感承謨忠義謀使出走事洩精忠將磔之嘛呢大言曰吾寜與忠臣俱死不願與爾逆賊同生及大兵破仙霞闗精忠將降飾辭兾免死忌承謨暴其罪惡夜遣逆黨逼承謨就縊幕賔無錫嵇永仁㑹嵇王龍光華亭沈天成從弟承譜及親屬家丁𨽻卒五十三人並遇害賊移屍焚諸野泰寜騎兵許鼎乗夜負承謨燼骸藏之明年櫬還京上遣内大臣侍衛奠酒福建廵撫楊熙疏列精忠叛後死事諸臣為承謨請優卹總督即廷相復専疏言承謨於康熙十三年三月精忠邀以㑹商公事脅之從逆承謨憤怒不屈遂遭覊縶至十五年九月十六日夜半精忠遣人縊之承謨猶言主恩未報整衣冠叩首然後就縊親屬幕賔及隨從諸人盡被賊縊死閩人追思其任總督時多愛民恵政聞遭慘變每酸心掩泣言之其純忠勁節久而愈堅富貴榮利不能動其心妻子昆弟不足縈其慮視倉卒遇變激烈捐軀者更未易多得乞勅部優加贈謚卹廕並於閩省立祠褒祀以慰人心詔所司優議贈兵部尚書加太子少保廕一子入監賜祭葬如典禮謚忠貞御書碑文賜其家三十四年福建廵撫卞永譽以士民籲建専祠於州入奏御書忠貞炳日以額其祠四十七年承謨子時崇官廣東廵撫復疏述前此福建督撫為嵇永仁等請贈部臣以生員無贈銜例寢議乞特敇追贈入祠於是贈嵇永仁王龍光沈天成范承譜國子監助教學正有差並從祀承謨祠世宗憲皇帝時以承謨與嵇永仁等入祀昭忠祠承謨所著有吾盧稿浙閩奏議百苦吟畫壁集聖祖仁皇帝又嘗允時崇請御製承謨畫壁集序曰朕惟帝王教化首重名節所以維繫人心扶樹綱紀也古人臣以身事主守土膺疆或遇蝥賊潜生豺狼勃起則捐軀矢志取義成仁而其激烈慷慨之氣間發為文辭雖質直無華後世論錄終有不可泯滅者以其出於忠義之誠本乎性情之正也福建總督范承謨名臣之子授節閩海方值逆𥪡盗兵偏隅煽㷔籌畧未展横罹幽縶閲三寒暑貞操彌堅故其皭然不滓之志縈紆鬱屈無所攄露乃以墻壁為書箋以桴薪為筆墨題分甲乙字辨衡從日月既深篇章漸積名曰畫壁記實也卒能終始不撓歸於正命若承謨者可謂冐白刃而不疑守丹心而自信者矣夫以茹荼含檗之餘每念不忘君父故詩文不必盡合於古之作者而浩然之氣流行充溢當其胷填聲咽髪植風生土塊灰丸同於利劍秃毫斷梗等比霜矛冩忠孝之性靈奪奸凶之殘魄是又豈刻雕藻繪塗餙虚浮者之所能及乎自三逆殄滅寰宇謐寜卹典頻加恩綸屢降固已延賞後昆光賁泉壤矣兹特允其子時崇所請復為序其存稿盖善善欲長春秋之義弁章特錫數出非常庶㡬追妥忠魂亦以風厲臣節焉張長庚張長庚漢軍鑲黄旗人由秘書院編修順治八年遷宏文院侍讀十年遷祕書院侍讀學士兼佐領十一年遷國史院學士十二年充殿試讀卷官十三年擢湖廣廵撫十四年疏報墾田八千三百七十五頃下部議叙十五年十二月以荆州安陸襄陽岳州等府水灾請蠲免十六年春復久雨成灾荆安襄岳等府灾民流至武昌漢陽長庚同廵按李廷松總督李廕祖倡議捐賑長庚捐米千二百五十石錢三百二十五千下部議叙加太子少保兵部尚書銜十七年四月授湖廣總督康熙元年八月疏請裁駐岳州之上江防道從之湖廣舊設廵撫二員又因川陕河南三省疆隅相接設撫治一員科臣姚啟聖請援江南陕西之例分湖北湖南两廵撫敇長庚詳確定議長庚議以湖北之武昌漢陽黄州安陸徳安荆州襄陽鄖陽八府屬湖北廵撫轄以湖南之長沙衡州永州寳慶辰州常徳岳州七府郴靖二州屬偏沅廵撫轄刑名錢榖各歸管理部議如所請並裁鄖陽撫治缺上允之二年長庚同靖西將軍穆里瑪定西將軍圖海等擒斬明桂王將郝摇旗劉汝魁其黨李來亨竄伏茅麓山官兵晝夜環攻來亨窮廹舉家焚縊長庚招撫餘黨并以書招降桂王之荆國公王光興等楚㓂悉平下部察叙先是湖廣設左右布政使二按察使一駐武昌三年三月移右布政司駐長沙上以湖廣刑名事繁應増設按察使一其駐地令督撫議奏長庚疏言増設臬司應照藩司例駐長沙専理湖南長沙等七府及郴靖二州刑名十一月又言房縣保康竹山竹溪與興山巴東歸州一帶皆楚省邉險地前逆㓂盤據今已蕩平新闢州縣宜設兵資保障請酌撥荆彛鄖襄四鎮額兵駐防要地俱奉㫖俞允四年五月疏給歸州巴東長陽興山房縣保康竹溪竹山等八州縣流民開墾牛種部議行十月疏報墾田六千頃有竒部議加一級六年四月上諭查各省大小船按兵定數長庚疏言湖廣各營戰馬礮船共四百七十五内除彛陵荆州城守襄陽均房辰沅常岳等鎮恊營戰馬礮船二百三十三應全留外其提督與武昌城守宜都洞庭等標恊營戰馬礮船二百四十二内應裁六十二又内有督提二標船三十三酌歸荆州武昌城守及漢陽守備就近管理如所請行八年九月甄别各省督撫奉㫖張長庚以原品隨旗行走十二年二月户部以長庚前揑報墾荒恭奏削太子少保銜十九年二月大兵進剿雲貴上以長庚於軍中著有能聲命署副都統領兵赴之㑹川東賊譚洪復叛命吏部即中范承勲追趣長庚兼程赴彛陵擊賊十一月洪犯䕫州掠取糧艘上以䕫州乃運糧要地令長庚同䕶軍統領佟佳速取䕫州㑹洪死餘黨就戮川東平將軍趙良棟請酌撤滿兵而以其半進取雲貴長庚在軍無功亦撤回未㡬卒靳輔靳輔漢軍鑲黄旗人父應選官通政使司叅議輔由官學生於順治九年考授國史院編修十五年改内閣中書尋遷兵部員外郎康熙元年遷即中七年遷通政使司右通政明年擢國史院學士充纂修世祖章皇帝實錄副總裁九年十月改内閣學士十年六月授安徽廵撫十一年四月奏臨淮靈璧二縣虚報開墾田四千六百餘頃請㫖豁免田糧從之十三年逆藩呉三桂耿精忠分㓂江西煽誘饒州弁兵從逆上詔輔増兵接攘防守輔尋遣兵㑹剿擒斬歙縣賊宋鑣等十五年二月疏言户兵二部因軍需浩繁令裁驛站經費臣以為欲省經費宜先除糜費在外諸臣非要務勿專差齎奏則火牌糜費節省十之八京差官員酌量併減即觧餉觧礮沿途自有官兵䕶送亦止需部差一員則勘合糜費節省十之三嚴禁各員役横索騷擾則節省無名之費更多安徽所屬馹站額銀二十六萬两有竒以十分之四科之嵗省十萬餘两通天下計之每嵗所節當不下百餘萬可以裕軍餉甦馹困得㫖馹逓繁苦皆由差員横索騷擾著嚴行飭禁下部詳議如所奏定為例是年疏報存留各屬摃脚等項銀十一萬七千餘两節省馹站銀十二萬九千餘两得㫖靳輔節省存留馹站各項錢糧為數甚多具見實心任事下部議叙加兵部尚書銜十六年三月授河道總督七月疏言黄河之水裹沙而行水合則流急而沙隨水去水分則流緩沙停河底日髙故全賴各處清水併力助刷始能奔趨歸海而無滯歸仁一隄原以障睢水及永堌邸家白鹿諸湖水不使侵淮且令由小河口白洋河入黄刷沙自順治十六年歸仁隄潰睢湖諸水侵淮不復入黄刷沙黄水從小河口白洋河二處逆灌積沙漸成陸地康熙六七年間王家營邢家口潰而黄水不由雲梯闗入海古溝翟家壩潰而淮水不赴清口㑹黄十五年髙家堰清水潭爛泥淺皆潰而運道益淤徐州以下黄流緩弱㪚漫而河底益髙矣謹以大修事宜分别八疏一曰取土築隄使河寛深清江浦歴雲梯闗至海口河身泥淤須於两旁離水三丈各挑引河一道靣濶八丈底濶二丈深一丈二尺即以掘取之土髙築隄岸隄底七丈靣濶三丈髙一丈二尺則黄淮下注中央既有舊存一二十丈河身左右又各有八丈新鑿之河所存舊隄薄僅三丈一經三靣夾攻自可盡行刷去新舊之河合而為一河身寛至四十丈深至二丈可以漸復舊觀其夫役請并令山東河南恊募二曰開清口及爛泥淺引河使得引淮刷黄三曰加築髙家堰隄岸盖欲堵決口不先修築殘隄恐水將尋隙奔潰而石工費甚浩繁板工不能耐久伏思水性至柔乘風則剛其板石諸工率皆陡峻故怒濤撞擊潰即隨之惟遇坦坡乃平漫而上順縮而下隄制水而不抗水雖經大水乗風高低不虞激潰今於隄外近湖之處挑土幇築坦坡每隄髙一丈築坦坡五丈即有舊存樁木亦聼其埋於土内以為隄骨夯杵堅實宻布草根草子於其上俟其茂長則土益堅隄益固四曰周橋閘至翟家壩共三十二里原衝支河九道及決口三十四處須次第堵塞臣騐各處埽工率用桞枝蘆草費大而不能經久伏思尅水者土也當求束土禦水之法改埽工為蒲包裹土䔉䋲捆紥而填之則費省而工亦堅固五曰深挑清口至清水潭二百三十里運道所挑之土俱傾於東西两隄外即以幇築西隄坦坡増培東隄堅厚六曰令淮揚田按上中下三則每畆納修河銀三錢至二分有差商舡來往淮揚两闗納剥淺銀一年以米豆每石二分貨物每斤四分為率七曰裁南河中河北河通恵四分司就近歸道員管理裁管河同知山清安海宿桃三缺改併山旴歸仁邳宿三員以重責成八曰按里設兵畫隄分守暇則栽桞蓄草添土幇隄每月乘濬船下鐡掃帚刷河底淤沙督以員弁嚴立課程用期久逺疏下王大臣議以軍務未竣大修募夫甚多宜暫停上命輔熟籌輔申前奏惟運土用夫請改為車運遂皆如所請詔發帑興工輔乃開通清口爛泥淺引河四道濬清江浦至雲梯闗外河身創築束水隄一萬八千餘丈塞于家岡武家墩髙家堰諸決口河隄外加築縷隄及格隄徐州宿遷築減水壩十三座其壩東西寛十二丈南北長十八丈六尺中立磯心六座两旁俱用石墻土内宻釘排樁灌以漿灰上鋪石板聨以鉄錠每壩一座共成七洞每洞各寛一丈八尺計其洩水之地共十二丈六尺清水潭舊隄衝潰輔為棄深就淺計築西隄九百二十餘丈東隄六百餘丈更挑新河長八百四十丈奏改名永安河又以甘羅城西運口黄流内灌易致停淤自新莊閘西南挑濬至太平壩又自文華寺挑濬至七里閘復轉而西南亦接至太平壩因達爛泥淺去淮黄交㑹之地十里計閲两月工竣先是漕船由駱馬湖行八十餘里始抵窰灣夏秋則盛漲冬春則水涸重運多阻輔於湖旁疏濬皁河故道上接泇河通運二十年三月以大修已越三年黄河未盡歸故道自請議處部議革職得㫖留任督修二十一年五月上遣尚書伊桑阿侍即宋文運等閲工並以候補布政使崔維雅隨往因其奏上河防芻議两河治畧二書及條列二十四事欲改更輔所行減水埧諸法也十月伊桑阿等還奏靳輔建議大修已用帑銀二百五十餘萬两今蕭家渡决口未堵宿遷沭陽等處田地淹沒黄河不歸故道其言固難盡信崔維雅改議修築亦未必成功輔疏言河工次第告竣海口大闢下流疏通腹心之患已除蕭家渡決口堵塞亦易不宜有所更張因詳辯維雅陳二十四事不可行並下廷議工部尚書薩穆哈等請令輔賠修決口上曰修治河工所需錢糧甚多靳輔果能賠修耶如必令賠修萬一貽誤漕運奈何朕思治淮尚易黄河身髙於岸施工甚難崔維雅條奏二十四欵朕初覧時似有可取及覧靳輔回奏崔維雅所奏誠無可行者因召輔來京十一月輔至奏蕭家渡決口明年正月可塞崔維雅所議挑河每日用夫四十萬築隄以十二丈為準斷不可行上是之特㫖寛免賠修決口仍給帑堵築二十二年四月疏報蕭家渡工成河歸故道請修七里溝險汛天妃壩王公隄等閘座又請増開封歸徳隄工以防上流壅滯諭曰河道闗係國計民生最為𦂳要今聞河流得歸故道深為可喜以後益宜嚴毖勿致疎防十二月詔復原職二十三年十月上南廵閲河諭輔曰朕觀髙家堰地勢髙於寳應髙郵數倍前人於此築石隄障水實為淮揚屏蔽且使洪澤湖與淮水并力敵黄衝刷淤沙闗係最重今髙堰舊口及周槁翟壩修築雖久仍湏嵗嵗防䕶不可輕視以隳前功又諭曰數年以來治河著有成效黽勉盡力朕已悉知此後當益加勉勵早告成功使百姓各安舊業庶不負朕委任至意因御書閲河隄詩賜之二十四年正月疏請添建黄河南岸毛城舖減水閘一王家山十八里屯減水閘三北岸大谷山減水閘二以保徐州上流隄工並扵歸仁隄添建石壩二欄馬河及清河運口各添建石閘一九月疏言勘閲河南隄岸考城儀封陽武三縣應幇築隄工七千九百八十九丈封邱縣荆隆口應築大月隄三百三十丈滎澤縣應修築埽工二百一十丈以防上流異漲並請増設蘭陽儀封滎澤河員免開封歸徳二府居民採辦青桞事下部議俱從之是時上念髙郵寳應諸州縣湖水泛溢民田被淹命安徽按察使于成龍經理海口及下河事宜仍聼輔節制輔疏言下河卑於海潮五尺疏海口則引潮内侵大不便請自髙郵城東車邏鎮築長隄二歴興化白駒埸至海口束所洩之水入海隄内涸出田畆丈量還民其餘田招民屯墾以抵經費廷議如所請召輔及于成龍至京成龍力主開濬海口故道輔仍議築長隄髙一丈五尺束水敵海潮大學士九卿俱從輔議通政使叅議成其範給事中王又旦御史錢珏從成龍議時寳應人侍讀喬菜奏輔議非是乃命尚書薩穆哈等勘視尋以開海口無益回奏㑹江寜廵撫湯斌入為尚書奏下河宜濬上命侍即孫在豐往董其事二十六年七月詔詢下河田疇何策可紓水患輔疏言宋元以前髙郵寳應諸湖原皆田疇臣前堵築清水潭深挑两隄中間河底有宋元舊錢及甎井石街其為民居可證盖黄河在宋元時雖南侵而尚未全徙至明代始絶北流南奪淮渠以入海致淮水壅不得下清河縣之洪澤村漫渰而為洪澤湖又從髙家堰翟家壩旁流東注為髙郵寳應諸湖自此永不復田疇之舊且為患於下河矣臣屢經測騐運河隄頂卑於髙堰隄頂一丈有竒故減水壩之建在堰隄可洩水一千方在運隄則使可洩水一千二百方所以歴七年之乆三遭大漲而運隄安然無恙運隄所洩之水以下河為壑下河之東即大海濬海口似可紓水患然自清江浦南行三百餘里至江都縣之茱萸灣折而東百餘里至泰州又百餘里至海安鎮折而北即范公隄沿隄而行歴安豐東臺河垜丁溪白駒劉莊等埸計二百餘里而抵鹽城縣又北行百餘里而至廟灣埸折而西百餘里為蘇家嘴又百餘里仍回清江浦計程千里有竒惟廟灣天妃石䃮三口向係洩水入海之處必登舟過渡餘皆可以馳馬之路其卑處於周圍馬路中者南北三百餘里東西二百餘里形如釡底止就釡底挑挖徒増釡底之深當淮流盛漲髙堰洩水洶湧而來仍不能救民田之淹沒臣與幕友陳潢反覆曲籌杜患於流不若杜患於源髙家堰之隄外直東為下河東北為清口當自翟家壩起歴唐埂古溝周橋閘髙良澗髙家堰築重隄一道約髙一丈七八尺至二丈不等長一萬六千丈需費七十九萬五千两此工一成東堰隄減下之水使北出清口則洪澤湖之水不復東渰下河其下河十餘萬頃之地可變成沃産而髙寳諸湖俱可涸出田畆數千頃招人屯墾可以裕河庫且髙堰原為最險之工増此隄則長年保䕶洪澤湖廣濶非常一遇風起多覆舟沉溺行人此隄内之河則避湖險而就安流有便於商民者甚大至臣幕友陳潢前􅑮聖駕閲工臣以姓名上逹宸聰其間興工之委曲及將來竣工非陳潢恊力區畫不可念臣垂老多病萬一即填溝壑或病卧不能馳驅則繼臣司河者仍必得陳潢在幕佐之庶不岐誤此臣十年以來之血誠欲吐而未敢者今豫為陳明非僅居功蔽賢之念不忍萌即引嫌避忌之私亦不敢計疏下廷議如所請並賜陳潢僉事道銜時于成龍任直𨽻廵撫詔以輔疏示詢成龍言下河宜開重隄不宜築上遣尚書佛倫侍即熊一瀟給事中逹竒納趙吉士與總督董訥總漕慕天顔㑹勘天顔在豐議與輔相左佛倫等以應從輔請還奏仍下九卿㑹議二十七年正月御史郭琇疏言海宇昇平萬邦底定宵旰殷憂時切如傷之念者止此一線黄河與淮揚等州縣昬墊之黎民耳皇上委任河臣靳輔靳輔則聼命於幕客陳潢如果洪水歸洋狂瀾永息猶得有辭乃今日議築隄明日議挑濬糜費帑金數百萬終無底止之期今日題河道明日題河㕔以朝廷爵位為私恩從未聞有得人之效又復攘奪民田妄稱屯墾横取米麥越境貨賣皇上以下河為必可開而靳輔百計阻撓欲令功埀成而終止且屯田一事皇上洞知其累民㑹勘諸臣亦知其累民則靳輔陳潢之罪瞭如指掌矣陳潢為靳輔營一家之謀於國計民生全無禆益忌功之念重圖利之心堅真國之蠧而民之讐也監司僉事何等尊貴豈容一介小人冐濫名器以快靳輔酬報私情宜即斥革勅部嚴加處分另簡大臣之清亷敏練者整理河務庶成功可奏生靈永利矣疏下九卿察議二月給事中劉楷疏言河工道㕔至雜職百十餘員題補之權總歸河臣使其虚己求才果能奏安瀾之效猶且不可久擅用人大權乃在在保舉及至任事漫無寸功惟見每嵗報衝決而已嗣後大小河官應仍由吏部選補御史陸祖修疏言皇上每遇𦂳要政事令九卿㑹議期於衆論僉同至當不易無奈河臣靳輔身雖在外而呼吸甚靈九卿中賛決異同者不過三四人皆左袒河臣不顧公議如屯田一事悉依户部尚書佛倫等所奏具稿箝衆人之口伏思民間地畆各處例有准折起科並無額外多餘之理直𨽻廵撫于成龍審事湖廣將還倘䝉親詢其間利病根由情弊始末可救東南七州縣昬墊之民命省内府㡬百萬糜費之金錢河臣積惡已盈中外人心總望睿斷罷斥萬無議勞使過以重遲回昔帝舜殛鯀以其逆水之性也今兼有屯田害民之事去一靳輔天下萬世仰頌聖明無踰此矣時慕天顔孫在豐亦疏論屯田累民及輔阻撓下河開濬事詔俟于成龍至㑹議一併嚴察輔尋得請入覲先疏論于成龍慕天顔孫在豐朋謀䧟害又自辯受命治河之日正當两河壊極之時自碭山以抵海口南北两岸決口七八十處髙家堰決口三十四處翟家壩成河九道清水潭久潰下河七州縣一望汪洋清口運河變為陸地臣晝夜奔馳先堵髙家堰淮水方出清口旋堵清水潭挑挖運河改移運口迄今永逺深通其向來行運之駱馬湖淤淺不能行舟臣創開皁河漕艘無阻久䝉聖鑒至濬築經費方臣未任之初曽特遣部臣履勘估計六百萬两臣任事後苦心節省自徐州起直抵海口两岸隄工并髙家堰清水潭及前所未估之新開皁河堵塞楊家莊修築歸仁隄改移運口止用帑二百五十一萬两又蕭家渡衝決時䝉賜帑一百二十萬两令一概加修竣工統計所用僅及前此部臣估計之半而臺臣郭琇則曰糜費帑金數百萬營一家之計不知何所見而誣臣至此極也其曰題道題㕔未聞得人則河員原因慎重河務必由河臣保題定例已久非自臣始其曰奪田屯墾則臣絶不以納糧之民田分釐入屯其曰越境賣麥則臣原以變價還部題明其曰陳潢小人冐濫名器則陳潢之䝉恩實出鼔勵人才之特典以言冐濫臣不知何所指且詆之為小人則固于成龍久與結拜弟兄慕天顔頻與宴好殷勤孫在豐亦與親宻異常者也自康熙二十二年两河歸故運道通行而郭琇必以洪水狂瀾罪臣科臣劉楷曰惟見每嵗報衝決臺臣陸祖修曰逆水之性又謂清丈隠佔非額外多餘地畆盖郭琇與孫在豐為庚戌科同年陸祖修為諸生時拜慕天顔為師又係孫在豐教習門生劉楷陸祖修己未科同年並江南人與隠佔田畆者無非桑梓親戚年譜之契故彼呼此應恊力䧟臣慕天顔與孫在豐結婚姻因于成龍倡開海口之議故必欲附成龍以攻臣而助在豐兼奪臣任夫河臣之職與督撫不同督撫統攝地方諸務稍一興利除弊易以見徳河臣頻年奔走河濵以挑築為務上費帑金下役民力最易招尤致謗而臣之負謗更因屯田之清丈隠佔隠佔地畆惟山陽最多有京田時田之分時田一畆納一畆之糧係小民之業京田四畆納一畆之糧皆勢豪之業臣清丈沭陽海州宿遷桃源清河五屬得三百萬畆至山陽則終不能丈以山陽鄉紳多也臣不顧衆怒致讐謗沸騰使中傷臣者更得以藉口然臣任事十餘年凢雇夫挑築買辦物料皆給發現銀雖淮揚各屬隠佔田畆諸人怨臣至深者亦不能指摘也伏念河工一事成之甚難壊之甚易自康熙六年两河潰决歴經數河臣治之十餘年終無一效臣受任之初羣議蜂起百計阻撓賴皇上不惜帑金兼授方畧而河得以復故正湏綢繆善後而諸臣合計交攻必欲䧟臣殺臣而後已全不顧運道民生大計當此衆口鑠金之際即皇上欲終始保全無如諸臣朋謀網䧟之宻布倘䝉聖駕再廵親閲隄工更命重臣清丈隠佔地畆則臣與諸臣之是非功罪立分臣身負重劾萬死一生幸得入覲恐天威咫尺不得盡吐所欲陳謹繕疏宻奏疏入上諭閣臣曰近因靳輔被劾議論其過者甚多靳輔若不陳辯朕前復何所控告耶此疏並下九卿察議三月上御乾清門命輔與于成龍郭琇各陳所見于成龍言海口必應開濬郭琇言屯田奪民産業上曰屯田之事因取民餘田小民實皆嗟怨靳輔當亦無可置辯輔奏向者河旁田畆盡被水淹臣任事後將決口堵閉两岸築隄河流故道無有衝決之患數年水淹之田盡皆涸出臣以民間原納租税之額田給與本主其餘出之田作為屯田抵補河工所用錢糧因屬吏奉行不善民怨是實臣無可辯惟候處分上曰各省民田未有不溢於納糧之額者若以餘田作屯豈不大擾民乎屯田不行無可復議至下河作何開濬重隄應否停築九卿等公同詳酌確議尋允九卿議停築重隄革輔職以福建總督王新命代之陳潢革僉事道銜初漕船出清口入黄河行二百里始抵張莊運口輔奏於清河縣西仲家莊建閘上自宿遷桃源清河三縣黄河北岸遥縷二隄内加挑中河一道俾漕船既出清口截流徑渡北岸避黄河一百八十里之險溜由仲家莊閘内進中河歴皁河泇河北上及工竣學士開音布侍衛馬武往勘還奏中河商賈舟行不絶漕運可通上諭廷臣曰前于成龍奏云靳輔開中河無益反為民累河道已大壊今開音布等徃勘則云數年以來河道未嘗衝决漕艘亦未有誤謂靳輔治河無禆益㣲獨靳輔不服朕亦不惬於心矣若王新命順從于成龍之説將原修工程盡行更改是各懐私忿必致貽悞河工乃命尚書張玉書圖納等往勘確議還奏河身漸次刷深黄水迅溜入海其已建閘壩隄埽及已濬引河並應如輔所定章程無庸更改十一月輔奏命同工部尚書蘇赫等往閲通州運河請於沙河建閘蓄水通州下流築隄束水以利漕運從之二十八年正月上南廵閲河輔從行諭詢中河逼近黄河水漲隄潰可虞輔奏前曽奉諭籌攔馬河減水壩所出之水毋致淹沒民田臣開中河以束水兼令漕船避黄河險溜今若加築遥隄當不至有患三月諭吏部曰朕南廵時江南淮安人民皆稱譽前任河道總督靳輔思念不忘且見靳輔濬河深通築隄堅固實心任事勞績昭然可復其原品二十九年三月漕運總督董納以北運河水淺請盡洩南旺湖之水北流倉埸侍即凱音布以挑濬北運河奏請上召問輔輔奏南旺湖水若使偏入北河必致南河水淺惟從北河两旁下埽束水則水深自可濟運詔即以輔同凱音布經理之三十年九月奉命與侍即博霽李光地等閲黄河險工三十一年正月還奏黄河南岸自徐州以上毛城舖起至海口北岸自大谷山起至雲梯闗以下六套所有減水閘壩現無衝損中河亦甚便漕船往來惟黄河南岸之楊横莊煙墩馬邏北岸之朱家莊安東縣便益門南東門六處險工有未設月隄及下埽單薄處應増築加培並繪圖呈覧下九卿議令河臣如所奏行二月王新命以勒取庫銀為運河同知陳良謨訐罷上諭大學士曰朕聼政以來以三藩及河務漕運為三大事夙夜厪念曽書而懸之宫中柱上至今尚存倘河務不得其人一時漕運有誤闗係匪輕靳輔熟練河務及其未甚老而用之亦得紆數年之慮其仍令為河道總督輔以衰病辭命順天府丞徐廷璽同往恊理六月疏言前奉詔截留江北漕糧二十萬石由黄河運至山西蒲州撥陕西賑濟臣因開封以西黄河深淺無定與漕臣董訥定議漕船三百八十四每船豫支下運行月銀六十两為増雇剥船夫役之用共銀二萬三千四十两二月初自淮安開行臣於五月初赴開封督飭催儧添雇民船隨淺隨剥撫臣閻興邦牒稱水路止可運至孟津由孟津陸運至蒲州六百三十里業經山陕两省議明分運臣今赴孟津料理得㫖嘉其實心任事十月疏言黄河自河南滎澤縣至江南清河縣兩岸各一千餘里其險工不可疎虞如南岸之在開封或疏虞則黄水入淮歸徳至宿遷或疏虞則黄水入睢桃源清河間或疏虞則黄水入洪澤湖以侵髙堰倘髙堰不固寳應髙郵運道必致淤墊故尚湏籌畫萬全欲加築前此停築之重隄為費甚大惟就運料小河之隄加築髙二丈廣三丈乃可無患北岸之在滎澤或疎虞則黄水上溢張秋下溢濟寜魚臺豐沛民田受淹宿遷清河或疎虞則一八十里之運道亦淤墊故中河遥隄必湏加築於西寜橋添建石閘二仲家莊陶家莊两閘左右各添一閘以備宣洩其張莊舊運口臣輔前挑中河時曽議設閘因觧任未舉行恐將來山東之水㣲弱至中河淺澁今宜竟行堵塞就駱馬湖之東中河之南建閘值東水大長開以洩之東水消落閉以蓄之庶無他慮又疏言黄河隄工莫重於既成之後隨時修補隄根積水易致汕刷惟於上流量挖一溝引沙直注使停再於下流量挖一溝引水分洩漸去其低窪處自然淤平臣輔前任時相度董家堂龍窝二處險工曽設涵洞引黄灌注於月隄裏使清流在月隄外窪地遂成平陸徐州長樊大壩險工亦引黄内灌淤髙窪地二三尺今邳州舊城迤西窪地周圍約有百里水無去路宜倣已騐之法行之或慮掘隄難以修防則建小閘以酌量引灌更為萬全疏下九卿議以黄河水勢湍迅引灌邳州窪地似屬危險令再審籌餘如所請行又疏言臣前任安徽廵撫當軍興之際陳潢助理恊宜及任總河值髙家堰决口甚多翟家壩未堵二十餘里成河九道因盡行築隄塞河以敵清口之黄創設減水壩以保髙堰之隄改清水潭隄工於湖内永保安瀾濬甘羅城運口至太平壩以避黄水内灌挑皁河二十餘里支河三十里使駱馬湖不復淤墊又挑中河使漕船免黄河逆流之險凢臣所經營皆潢之計議仰荷聖主如天之福次第成功恩授潢僉事道銜不意驟遭詆毁革去職銜旋即物故又奉命勘河之尚書熊一瀟給事中逹竒納趙吉士同時被指􅎥而去今臣已䝉恩起復則無辜受累者當一體均邀慈鍳疏下吏部陳潢已故寝議熊一瀟逹竒納趙吉士並請㫖錄用時輔再疏自陳疾劇乞解任命内大臣明珠往視傳諭留淮調理十一月卒於官年六十遺疏至得㫖靳輔簡督河務經理年久黄淮两河修築得宜運道民生俱有禆益患病溘逝深軫朕懐下部議卹賜祭葬謚曰文襄三十五年河道總督董安國以江南士民籲請捐資建祠河干入奏下部議行四十六年上南廵還諭吏部曰朕厪念河防屢行親閲凢自昔河道之源流治河之得失按圖考績靡不周知粤從明季㓂氛决黄灌汴而洪流横溢嵗久不治迄於本朝在河諸臣未能殚心修築以致康熙十四五年間黄淮交敝海口漸淤朕乃特命靳輔為河道總督靳輔自受事以後斟酌時宜相度形勢興建隄壩廣疏引河排衆議而不撓竭精勤以自効於是淮黄故道次第修復而糟運大通其一切經理之法具在雖嗣後河臣互有損益而規模措置不能易也至於創開中河避黄河一百八十里波濤之險因而漕輓安流商民利濟其有功於運道民生至大且逺朕每莅河干徧加諮訪沿淮居民感頌靳輔治績衆口如一久而不衰夫人臣有大建樹於國家者奬勲酬庸宜從優渥雖賜卹易名已循彛典尚應特與褒叙賁以殊恩其加贈太子太保予騎都尉世職用彰朝廷追羙勞臣之典為矢忠宣力者勸尋令其子治豫襲職准再襲二次世宗憲皇帝雍正三年以治豫向隨父任明晰河務由副恭領加工部侍即銜恊理江南河工事務五年諭閣臣曰朕覧治河方畧見原任河道總督靳輔昔年修理河工勞績茂著欲加恩澤以奬勲庸㨿吏部查奏康熙四十六年已贈宫保與世職今再追贈工部尚書予祭一次以示朕篤念前勞至意七年命江蘇廵撫尹繼善擇地建祠祀輔及河道總督齊蘇勒有司春秋致祭八年詔建賢良祠於京師以輔入祀欽定八旗通志卷一百九十
