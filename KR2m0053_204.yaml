body:
  text: 欽定四庫全書欽定八旗通志卷一百九十人物志七十大臣傳五十六漢軍鑲黃旗二范李興元張盧崇峻佟國正承謨長庚靳輔李興元李興元遼陽人𨽻漢軍鑲黃旗順治五年由拔貢生授直𨽻沙河縣知縣卓異遷祁州知州洊歷江西吉安府知府康熙五年改補直𨽻永平府知府查解逃人六十名以上敘功即升七年遷長蘆鹽運使八年轉陕西隴右道十一年擢雲南按察使時命察釋藩下占民間子女為奴者興元力遵行十二年十一月逆藩吳三桂反集衆脅受偽職興元厲聲抗言曰汝內為國戚外封親王受恩最重何為叛我為丈夫可殺不可辱惟一死以報朝廷吳逆囚之纍繫其家屬閲六載終不稍屈十八年十月大兵恢復湖南時三桂已死逆孽世璠徙興元於蒙化十九年大兵入黔逆勢日蹙偽閣部郭壯圖棄黔回滇慮後患十月遣賊黨絞死興元家口仍羈候二十年十月大兵困滇城興元二子蔭秀竒秀俱被殺雲南平其第三子萃秀詣軍前申訴二十一年巡撫王繼文察核得實具疏請恤得旨李興元贈太常寺卿廕一子入監讀書雍正七年入祀昭忠祠乾隆十六年特旨李興元雖從前未賞世職但為國效忠情甚可憫著加賞恩騎尉世襲罔替萃秀由廕生授四川廣安州知州纍遷湖廣安陸府知府元孫肇祥襲恩騎尉由鑾儀衛治儀正授直𨽻懷柔都司調八溝都司四十一年遷廣東韶州逰擊盧崇峻盧崇峻漢軍鑲黃旗人祖國志明廣寧守備投誠授三等輕車都尉崇峻初由官監生考授户部副理事官順治五年三月襲世職兼任佐領閠四月遷禮部理事官三遇恩詔加世職至三等男十一年授參領十二年駐防京口十三年擢吏部右侍即十四年總督宣大軍務十五年缺裁還京十八年授廣東總督康熙元年以肇慶總兵缺裁請將所屬諸營歸附近各副將轄允之時廣東多土寇依險竊發二年七月崇峻遣兵赴東莞新安殱賊九百餘八月命同都統宜里布查勘邉海九月復捕斬香山賊首趙劈石興寧賊首李宗韜而廣西賊首陸明初談國經談化春韋太寧等流入廣東之亷州猶寇掠為害三年八月崇峻檄遊擊安邦等擊斬之會海賊蘇利既降處碣石衛畏遷復叛九月崇峻與平南王尚可喜合兵搗剿擒利誅之得旨嘉奬下部議敘十二月疏言化石一營額兵僅六百名向設恭將守備各一千總二把總四兵少官多不符營制請裁恭將及把總二又石城地處衝要守備應駐石城分千把總各一駐化州聼髙雷總兵轄部議如所請是月丁父憂命在任守制四年三月剿海賊楊二等餘孽追至安南外境殱千三百餘燬船四十六又剿平新會新寧增城土賊四月追斬蛋寇李榮於海口降其衆四千餘並下部議敘尋疏言廣東邉界應各留一出海之口由水路者香山縣以順德橫石磯為口由陸路者廣南衛以城岡堡大鵬所以歸善淡水平海所以白雲墟海門所以潮陽南關為口驗照放行便官軍糧道並嚴禁姦民出海部議從之是月崇峻以廣東連歲用兵請蠲康熙四年以前逋賦奉旨順治十八年以前拖欠錢糧已頒赦盡行蠲免今盧崇峻復將康熙四年以前積欠請蠲徇情於下殊為不合著嚴飭行六月疏請勒無度牒僧道還俗開墾荒田允之尋命回京終制五年三月補河道總督五月疏言臣標三營専任防河兼備通漕遇事分遣四應康熙元年沂鎮總兵楊捷派防金鄉巨野魚臺東平單陽陽榖六州縣舊無此例臣標兵祇二千五百餘名即盡歸河干猶恐不敷調遣豈能兼顧懇將臣標官兵不許提鎮越管其分防者撤歸另於就近派撥再各省總督皆節制巡撫提鎮臣既専管河道各提督亦有防漕之責可否照例聼臣節制詔下其疏於部以崇峻不合請節制提督特旨嚴飭部議允撤河標分防州縣兵八月追敘平蘇利功加一雲騎尉為二等男十一月授山陕總督六年八月丁祖母憂仍在任守制十月疏言前因西畨部落戀牧內地且布浮言臣親赴莊浪防禦現在畨衆俱歸原處駐牧其台吉等亦遣使服罪官兵應撤報聞十一月以捐銀助修通州城垣加兵部尚書銜十二月奏準回京終制以違例取勘合擅支夫馬經兵部劾奏敕部議處八年八月命吏部覆核各督撫功過部議以崇峻功少過多應降二級調用得旨削尚書銜留三等男世職隨旗行走十八年署副都統隨大軍擊逆孽吳世璠黨於松滋縣復其城二十年進取雲南二十一年還京二十二年授協領管火器營事四十年卒子承祜降襲一等輕車都尉佟國正佟國正漢軍鑲黃旗人姓佟佳順治七年由拔貢生授江南無為州知州十二年遷直𨽻大名府知府十六年遷廣東南韶道十七年調陕西延綏靖邉道十八年牒陳四事一靖邉道轄七保二所屯糧向由各保所將辨徴解道臣督催今奉旨兵馬全歸提鎮錢糧専任撫臣請將屯糧改歸西路管糧同知徴解一營保兵缺祗應募充不得勾屯民妨農業一欠糧刁民往往投充營伍向來將辨猶屬撫道甄别今文武不相統攝難保無匿庇情弊請嗣後許移文將領追究若該管徇庇立即揭恭一靖邉道之設向以稽核兵馬整飭邉防今官兵既歸提鎮管攝錢糧請改同知徴解道臣已屬冗員乞裁汰巡撫張中第據牒以聞下部議從之康熙二年改補江南淮海道三年遷安徽按察使十三年遷江西布政使時逆藩吳三桂耿精忠相繼叛賊兵分犯江西會巡撫白色純卒大將軍安親王嶽樂奏國正甚得民心特擢江西巡撫十五年正月大將軍簡親王喇布言贑州為江西門戶投誠將士雜處彈壓需人詔國正赴贑州駐守十一月廣東從逆提督嚴自明總兵張星耀等紏衆逼南康國正遣副將許盛等剿賊於庫鎮鋪破其營十七追七十餘里斬獲甚衆賊遁走南安逆黨黃士標王割耳等犯信豐國正遣守備楊以松與副將周球分三路擊之斬首二千餘賊潰竄南雄十二月遣許盛等𠞰上猶賊復其城又遣周球等擊敗偽將郭應輔于黃土關斬賊五千復龍泉縣龍泉舊以守備駐防國正言地介邉鄙密邇湖南桂東守備不足彈壓請改設逰擊從之是年遣隨征官馬贄招降偽副將羅復彪都司張元仁總兵劉永琪等國正聞大兵克復汀州恐賊竄入贑州密飭營汛嚴守並分遣恭將劉體君及周球等由間道相機恢剿十六年正月大破賊於五里排復會昌縣偽總兵楊夢月降尋復瑞金縣先後招撫偽總兵賴鼎球等百五十二人兵萬六千五月復崇義縣招降偽總兵賴榮等十七人兵萬餘逆賊韓大任自寧都敗竄萬安國正慮逸入楚境密調兵赴良口大王廟黃塘截其歸路别遣將繞出興國縣田村大江口斷賊糧道賊窘甚竄突復遣逰擊楊以松等四路追剿十二月擊賊於鸕鷀寨十七年正月追至老虎洞大敗之大任窮蹙走汀州詣康親王傑書軍門降江西平國正還省城八月敘功加兵部右侍即銜十月加兵部尚書銜授正一品階十八年正月左副都御史楊雍建以江右為衝繁要地國正蒞任數載治迹無聞流移未能盡復田野未能盡闢分牧之有司未能奉法請敕令國正陛見詢以地方利弊民生休戚國正之庸碌無能難逃睿鑒詔國正明白回奏時舉行京察國正遵例自陳上以國正才力不及降二級調用覆疏入部議國正已降調母庸議四十七年正月卒於家范承謨范承謨漢軍鑲黃旗人大學士范文程第二子也初任侍衛順治八年更定八旗漢軍考試之例承謨中式舉人明年成進士選庶吉士授宏文院編修十二年遷祕書院侍讀學士十八年聖祖仁皇帝御極擢國史院學士康熙三年以疾乞假尋補祕書院學士教習庶吉士充纂修世祖章皇帝實録副總裁官七年授浙江巡撫九年杭州嘉興湖州紹興諸府被水承謨奏貸藩庫銀八萬兩糴米湖廣以平糶應徴漕米請每石折銀一兩於明年麥熟後徴解其白糧分三年帶徵被災重者如例蠲免並得旨允行先是寧波金華衢台溫處諸府屬荒田以前任總督趙廷臣請除額賦有旨令承謨履勘至是承謨遍歷其地奏豁荒棄田地二十九萬四千六百餘畝水衝缺額田地二萬一千九百餘畝十年以疾請解任命乘驛回京調理浙江總督劉兆麒提督塞白理各疏言浙省年來當荒敝時而民生不致重困者皆撫臣承謨之力今以病請告百姓投詞攀留積一百五十餘紙不敢壅於上聞給事中薑希轍柯聳御史何元英等亦言承謨受事三載愛民如子餽遺請謁不通劾奏貪墨亷治巨猾剔除加耗陋規私派積弊單騎勘荒悉心賑恤浙人愛戴深於飢渴今雖積勞致疾懇特敕勉留上諭吏部曰前因浙江巡撫范承謨以患病具奏準其回京調理今據督提等奏稱百姓愛戴號泣請留情詞懇切特順民情仍留原任十一年八月承謨疏言浙省徴輸白糧其加耗多寡不一湖州每石加五斗五升嘉興每石加八斗為運丁㫪辦諸費請嗣後令糧戶以㫪白米輸納概限加耗四斗五升又請豁台溫二衛康熙九年以前荒逋銀兩及石門平陽未完輕齎月糧等項皆下户部議行十月擢福建總督承謨以海疆重任難副辭上弗允因疏請陛見十二年七月至京召對承謨奏舊疾未痊上遣御醫診視賜藥餌逾月疾稍愈命馳赴新任賜冠服鞍馬遣侍衛烏丹傳諭曰爾向有賢聲與他人不同且福建邉疆重地海氛未靖爾其益加勉勵副朕委任初福建總督駐漳州至是將撤靖南藩屬還京特命移駐福州承謨奏擕其家舊賜蒙古壯勇八十餘人以行甫抵任聞逆藩吳三桂反承謨察耿精忠有異志綜計督標兵少又與精忠所部習不足恃乃疏言閩省經制兵自康熙八年依部議裁汰已及三千餘名尚應裁汰二千五百餘名現在兵單汛廣請暫停裁汰遇缺以投誠人充補又請巡行海濵酌寬邉界令民開墾分遣鎮兵屯種隙地以裕軍餉疏上未及行精忠已叛先佯言海寇至邀承謨議事巡撫劉秉政隂附精忠促承謨行承謨知有變左右盡擐甲以從承謨曰衆寡不敵備無益也乃坦然按轡至則逆衆蜂屯露刃承謨挺身前抗辭罵賊精忠困以桎梏閉之隘室晝夜防伺甚密使毋死承謨罵不絶口一日精忠遣秉政説之降承謨奮足蹴秉政仆地叱左右掖出曰賊誅戮將不逺兹先褫其魄矣為賊困踰二年冠賜冠衣辭母時衣每朔望奉時憲書一册懸之北靣跪拜間為詩文以桴炭畫壁上當承謨甫為賊困時部曲有張福建者手雙刀奮呼奪門連斃賊人力竭被執死又蒙古人嘛呢為偽散騎即精忠遣之守承謨感承謨忠義謀使出走事泄精忠將磔之嘛呢大言曰吾寧與忠臣俱死不願與爾逆賊同生及大兵破仙霞關精忠將降飾辭兾免死忌承謨暴其罪惡夜遣逆黨逼承謨就縊幕賔無錫嵇永仁會嵇王龍光華亭沈天成從弟承譜及親屬家丁𨽻卒五十三人並遇害賊移尸焚諸野泰寧騎兵許鼎乘夜負承謨燼骸藏之明年櫬還京上遣內大臣侍衛奠酒福建巡撫楊熙疏列精忠叛後死事諸臣為承謨請優恤總督即廷相復専疏言承謨於康熙十三年三月精忠邀以會商公事脅之從逆承謨憤怒不屈遂遭羈縶至十五年九月十六日夜半精忠遣人縊之承謨猶言主恩未報整衣冠叩首然後就縊親屬幕賔及隨從諸人盡被賊縊死閩人追思其任總督時多愛民惠政聞遭慘變每酸心掩泣言之其純忠徑節久而愈堅富貴榮利不能動其心妻子昆弟不足縈其慮視倉卒遇變激烈捐軀者更未易多得乞敕部優加贈諡恤廕並於閩省立祠褒祀以慰人心詔所司優議贈兵部尚書加太子少保廕一子入監賜祭葬如典禮諡忠貞御書碑文賜其家三十四年福建巡撫卞永譽以士民籲建専祠於州入奏御書忠貞炳日以額其祠四十七年承謨子時崇官廣東巡撫復疏述前此福建督撫為嵇永仁等請贈部臣以生員無贈銜例寢議乞特敇追贈入祠於是贈嵇永仁王龍光沈天成范承譜國子監助教學正有差並從祀承謨祠世宗憲皇帝時以承謨與嵇永仁等入祀昭忠祠承謨所著有吾盧稿浙閩奏議百苦吟畫壁集聖祖仁皇帝又嘗允時崇請御製承謨畫壁集序曰朕惟帝王教化首重名節所以維繫人心扶樹綱紀也古人臣以身事主守土膺疆或遇蝥賊潛生豺狼勃起則捐軀矢志取義成仁而其激烈慷慨之氣間發為文辭雖質直無華後世論録終有不可泯滅者以其出於忠義之誠本乎性情之正也福建總督范承謨名臣之子授節閩海方值逆𥪡盜兵偏隅煽焰籌略未展橫罹幽縶閲三寒暑貞操彌堅故其皭然不滓之志縈紆鬱屈無所攄露乃以墻壁為書箋以桴薪為筆墨題分甲乙字辨衡從日月既深篇章漸積名曰畫壁記實也卒能終始不撓歸於正命若承謨者可謂冒白刃而不疑守丹心而自信者矣夫以茹荼含檗之餘每念不忘君父故詩文不必盡合於古之作者而浩然之氣流行充溢當其胸填聲咽髮植風生土塊灰丸同於利劍秃毫斷梗等比霜矛寫忠孝之性靈奪姦凶之殘魄是又豈刻雕藻繪塗飾虛浮者之所能及乎自三逆殄滅寰宇謐寧恤典頻加恩綸屢降固已延賞後昆光賁泉壤矣兹特允其子時崇所請復為序其存稿蓋善善欲長春秋之義辨章特錫數出非常庶幾追妥忠魂亦以風厲臣節焉張長庚張長庚漢軍鑲黃旗人由祕書院編修順治八年遷宏文院侍讀十年遷祕書院侍讀學士兼佐領十一年遷國史院學士十二年充殿試讀卷官十三年擢湖廣巡撫十四年疏報墾田八千三百七十五頃下部議敘十五年十二月以荆州安陸襄陽嶽州等府水災請蠲免十六年春復久雨成災荆安襄嶽等府災民流至武昌漢陽長庚同巡按李廷松總督李廕祖倡議捐賑長庚捐米千二百五十石錢三百二十五千下部議敘加太子少保兵部尚書銜十七年四月授湖廣總督康熙元年八月疏請裁駐嶽州之上江防道從之湖廣舊設巡撫二員又因川陕河南三省疆隅相接設撫治一員科臣姚啓聖請援江南陕西之例分湖北湖南兩巡撫敇長庚詳確定議長庚議以湖北之武昌漢陽黃州安陸德安荆州襄陽鄖陽八府屬湖北巡撫轄以湖南之長沙衡州永州寶慶辰州常德嶽州七府郴靖二州屬偏沅巡撫轄刑名錢榖各歸管理部議如所請並裁鄖陽撫治缺上允之二年長庚同靖西將軍穆里瑪定西將軍圖海等擒斬明桂王將郝搖旗劉汝魁其黨李來亨竄伏茅麓山官兵晝夜環攻來亨窮迫舉家焚縊長庚招撫餘黨并以書招降桂王之荆國公王光興等楚寇悉平下部察敘先是湖廣設左右布政使二按察使一駐武昌三年三月移右布政司駐長沙上以湖廣刑名事繁應增設按察使一其駐地令督撫議奏長庚疏言增設臬司應照藩司例駐長沙専理湖南長沙等七府及郴靖二州刑名十一月又言房縣保康竹山竹溪與興山巴東歸州一帶皆楚省邉險地前逆寇盤據今已蕩平新闢州縣宜設兵資保障請酌撥荆彛鄖襄四鎮額兵駐防要地俱奉旨俞允四年五月疏給歸州巴東長陽興山房縣保康竹溪竹山等八州縣流民開墾牛種部議行十月疏報墾田六千頃有竒部議加一級六年四月上諭查各省大小船按兵定數長庚疏言湖廣各營戰馬炮船共四百七十五內除彛陵荆州城守襄陽均房辰沅常嶽等鎮協營戰馬炮船二百三十三應全留外其提督與武昌城守宜都洞庭等標協營戰馬炮船二百四十二內應裁六十二又內有督提二標船三十三酌歸荆州武昌城守及漢陽守備就近管理如所請行八年九月甄别各省督撫奉旨張長庚以原品隨旗行走十二年二月户部以長庚前揑報墾荒恭奏削太子少保銜十九年二月大兵進剿雲貴上以長庚於軍中著有能聲命署副都統領兵赴之會川東賊談洪復叛命吏部即中范承勳追趣長庚兼程赴彛陵擊賊十一月洪犯夔州掠取糧艘上以夔州乃運糧要地令長庚同護軍統領佟佳速取夔州會洪死餘黨就戮川東平將軍趙良棟請酌撤滿兵而以其半進取雲貴長庚在軍無功亦撤回未幾卒靳輔靳輔漢軍鑲黃旗人父應選官通政使司參議輔由官學生於順治九年考授國史院編修十五年改內閣中書尋遷兵部員外郎康熙元年遷即中七年遷通政使司右通政明年擢國史院學士充纂修世祖章皇帝實録副總裁九年十月改內閣學士十年六月授安徽巡撫十一年四月奏臨淮靈璧二縣虛報開墾田四千六百餘頃請旨豁免田糧從之十三年逆藩吳三桂耿精忠分寇江西煽誘饒州辨兵從逆上詔輔增兵接攘防守輔尋遣兵會剿擒斬歙縣賊宋鑣等十五年二月疏言户兵二部因軍需浩繁令裁驛站經費臣以為欲省經費宜先除糜費在外諸臣非要務勿專差齎奏則火牌糜費節省十之八京差官員酌量併減即解餉解炮沿途自有官兵護送亦止需部差一員則勘合糜費節省十之三嚴禁各員役橫索騷擾則節省無名之費更多安徽所屬馹站額銀二十六萬兩有竒以十分之四科之嵗省十萬餘兩通天下計之每嵗所節當不下百餘萬可以裕軍餉蘇馹困得旨馹遞繁苦皆由差員橫索騷擾著嚴行飭禁下部詳議如所奏定為例是年疏報存留各屬扛腳等項銀十一萬七千餘兩節省馹站銀十二萬九千餘兩得旨靳輔節省存留馹站各項錢糧為數甚多具見實心任事下部議敘加兵部尚書銜十六年三月授河道總督七月疏言黃河之水裹沙而行水合則流急而沙隨水去水分則流緩沙停河底日髙故全賴各處清水併力助刷始能奔趨歸海而無滯歸仁一隄原以障睢水及永堌邸家白鹿諸湖水不使侵淮且令由小河口白洋河入黃刷沙自順治十六年歸仁隄潰睢湖諸水侵淮不復入黃刷沙黃水從小河口白洋河二處逆灌積沙漸成陸地康熙六七年間王家營邢家口潰而黃水不由雲梯關入海古溝翟家壩潰而淮水不赴清口會黃十五年髙家堰清水潭爛泥淺皆潰而運道益淤徐州以下黃流緩弱散漫而河底益髙矣謹以大修事宜分别八疏一曰取土築隄使河寬深清江浦歷雲梯關至海口河身泥淤須於兩旁離水三丈各挑引河一道靣濶八丈底濶二丈深一丈二尺即以掘取之土髙築隄岸隄底七丈靣濶三丈髙一丈二尺則黃淮下注中央既有舊存一二十丈河身左右又各有八丈新鑿之河所存舊隄薄僅三丈一經三靣夾攻自可盡行刷去新舊之河合而為一河身寬至四十丈深至二丈可以漸復舊觀其夫役請并令山東河南協募二曰開清口及爛泥淺引河使得引淮刷黃三曰加築髙家堰隄岸蓋欲堵決口不先修築殘隄恐水將尋隙奔潰而石工費甚浩繁板工不能耐久伏思水性至柔乘風則剛其板石諸工率皆陡峻故怒濤撞擊潰即隨之惟遇坦坡乃平漫而上順縮而下隄制水而不抗水雖經大水乘風高低不虞激潰今於隄外近湖之處挑土幫築坦坡每隄髙一丈築坦坡五丈即有舊存樁木亦聼其埋於土內以為隄骨夯杵堅實密布草根草子於其上俟其茂長則土益堅隄益固四曰周橋閘至翟家壩共三十二里原衝支河九道及決口三十四處須次第堵塞臣驗各處掃工率用桞枝蘆草費大而不能經久伏思尅水者土也當求束土禦水之法改掃工為蒲包裹土蒜繩捆扎而填之則費省而工亦堅固五曰深挑清口至清水潭二百三十里運道所挑之土俱傾於東西兩隄外即以幫築西隄坦坡增培東隄堅厚六曰令淮揚田按上中下三則每畝納修河銀三錢至二分有差商船來往淮揚兩關納剝淺銀一年以米豆每石二分貨物每斤四分為率七曰裁南河中河北河通惠四分司就近歸道員管理裁管河同知山清安海宿桃三缺改併山旴歸仁邳宿三員以重責成八曰按里設兵畫隄分守暇則栽桞蓄草添土幫隄每月乘濬船下鐡掃帚刷河底淤沙督以員辨嚴立課程用期久逺疏下王大臣議以軍務未竣大修募夫甚多宜暫停上命輔熟籌輔申前奏惟運土用夫請改為車運遂皆如所請詔發帑興工輔乃開通清口爛泥淺引河四道濬清江浦至雲梯關外河身創築束水隄一萬八千餘丈塞于家岡武家墩髙家堰諸決口河隄外加築縷隄及格隄徐州宿遷築減水壩十三座其壩東西寬十二丈南北長十八丈六尺中立磯心六座兩旁俱用石墻土內密釘排樁灌以漿灰上鋪石板聨以鐵錠每壩一座共成七洞每洞各寬一丈八尺計其泄水之地共十二丈六尺清水潭舊隄衝潰輔為棄深就淺計築西隄九百二十餘丈東隄六百餘丈更挑新河長八百四十丈奏改名永安河又以甘羅城西運口黃流內灌易致停淤自新莊閘西南挑濬至太平壩又自文華寺挑濬至七里閘復轉而西南亦接至太平壩因達爛泥淺去淮黃交會之地十里計閲兩月工竣先是漕船由駱馬湖行八十餘里始抵窰灣夏秋則盛漲冬春則水涸重運多阻輔於湖旁疏濬皂河故道上接泇河通運二十年三月以大修已越三年黃河未盡歸故道自請議處部議革職得旨留任督修二十一年五月上遣尚書伊桑阿侍即宋文運等閲工並以候補布政使崔維雅隨往因其奏上河防芻議兩河治略二書及條列二十四事欲改更輔所行減水埧諸法也十月伊桑阿等還奏靳輔建議大修已用帑銀二百五十餘萬兩今蕭家渡決口未堵宿遷沭陽等處田地淹沒黃河不歸故道其言固難盡信崔維雅改議修築亦未必成功輔疏言河工次第告竣海口大闢下流疏通腹心之患已除蕭家渡決口堵塞亦易不宜有所更張因詳辨維雅陳二十四事不可行並下廷議工部尚書薩穆哈等請令輔賠修決口上曰修治河工所需錢糧甚多靳輔果能賠修耶如必令賠修萬一貽誤漕運奈何朕思治淮尚易黃河身髙於岸施工甚難崔維雅條奏二十四欵朕初覽時似有可取及覽靳輔回奏崔維雅所奏誠無可行者因召輔來京十一月輔至奏蕭家渡決口明年正月可塞崔維雅所議挑河每日用夫四十萬築隄以十二丈為準斷不可行上是之特旨寬免賠修決口仍給帑堵築二十二年四月疏報蕭家渡工成河歸故道請修七里溝險汛天妃壩王公隄等閘座又請增開封歸德隄工以防上流壅滯諭曰河道關係國計民生最為緊要今聞河流得歸故道深為可喜以後益宜嚴毖勿致疏防十二月詔復原職二十三年十月上南巡閲河諭輔曰朕觀髙家堰地勢髙於寶應髙郵數倍前人於此築石隄障水實為淮揚屏蔽且使洪澤湖與淮水并力敵黃衝刷淤沙關係最重今髙堰舊口及周稿翟壩修築雖久仍須嵗嵗防護不可輕視以隳前功又諭曰數年以來治河著有成效黽勉盡力朕已悉知此後當益加勉勵早告成功使百姓各安舊業庶不負朕委任至意因御書閲河隄詩賜之二十四年正月疏請添建黃河南岸毛城鋪減水閘一王家山十八里屯減水閘三北岸大谷山減水閘二以保徐州上流隄工並于歸仁隄添建石壩二欄馬河及清河運口各添建石閘一九月疏言勘閲河南隄岸考城儀封陽武三縣應幫築隄工七千九百八十九丈封邱縣荆隆口應築大月隄三百三十丈滎澤縣應修築掃工二百一十丈以防上流異漲並請增設蘭陽儀封滎澤河員免開封歸德二府居民採辦青桞事下部議俱從之是時上念髙郵寶應諸州縣湖水泛溢民田被淹命安徽按察使于成龍經理海口及下河事宜仍聼輔節制輔疏言下河卑於海潮五尺疏海口則引潮內侵大不便請自髙郵城東車邏鎮築長隄二歷興化白駒埸至海口束所泄之水入海隄內涸出田畝丈量還民其餘田招民屯墾以抵經費廷議如所請召輔及于成龍至京成龍力主開濬海口故道輔仍議築長隄髙一丈五尺束水敵海潮大學士九卿俱從輔議通政使參議成其範給事中王又旦御史錢珏從成龍議時寶應人侍讀喬菜奏輔議非是乃命尚書薩穆哈等勘視尋以開海口無益回奏會江寧巡撫湯斌入為尚書奏下河宜濬上命侍即孫在豐往董其事二十六年七月詔詢下河田疇何策可紓水患輔疏言宋元以前髙郵寶應諸湖原皆田疇臣前堵築清水潭深挑兩隄中間河底有宋元舊錢及甎井石街其為民居可證蓋黃河在宋元時雖南侵而尚未全徙至明代始絶北流南奪淮渠以入海致淮水壅不得下清河縣之洪澤村漫淹而為洪澤湖又從髙家堰翟家壩旁流東注為髙郵寶應諸湖自此永不復田疇之舊且為患於下河矣臣屢經測驗運河隄頂卑於髙堰隄頂一丈有竒故減水壩之建在堰隄可泄水一千方在運隄則使可泄水一千二百方所以歷七年之久三遭大漲而運隄安然無恙運隄所泄之水以下河為壑下河之東即大海濬海口似可紓水患然自清江浦南行三百餘里至江都縣之茱萸灣折而東百餘里至泰州又百餘里至海安鎮折而北即范公隄沿隄而行歷安豐東臺河垜丁溪白駒劉莊等埸計二百餘里而抵鹽城縣又北行百餘里而至廟灣埸折而西百餘里為蘇家嘴又百餘里仍回清江浦計程千里有竒惟廟灣天妃石䃮三口向係泄水入海之處必登舟過渡餘皆可以馳馬之路其卑處於周圍馬路中者南北三百餘里東西二百餘里形如釡底止就釡底挑挖徒增釡底之深當淮流盛漲髙堰泄水洶湧而來仍不能救民田之淹沒臣與幕友陳潢反覆曲籌杜患於流不若杜患於源髙家堰之隄外直東為下河東北為清口當自翟家壩起歷唐埂古溝周橋閘髙良澗髙家堰築重隄一道約髙一丈七八尺至二丈不等長一萬六千丈需費七十九萬五千兩此工一成東堰隄減下之水使北出清口則洪澤湖之水不復東淹下河其下河十餘萬頃之地可變成沃産而髙寶諸湖俱可涸出田畝數千頃招人屯墾可以裕河庫且髙堰原為最險之工增此隄則長年保護洪澤湖廣濶非常一遇風起多覆舟沉溺行人此隄內之河則避湖險而就安流有便於商民者甚大至臣幕友陳潢前􅑮聖駕閲工臣以姓名上逹宸聰其間興工之委曲及將來竣工非陳潢協力區畫不可念臣垂老多病萬一即填溝壑或病卧不能馳驅則繼臣司河者仍必得陳潢在幕佐之庶不岐誤此臣十年以來之血誠欲吐而未敢者今豫為陳明非僅居功蔽賢之念不忍萌即引嫌避忌之私亦不敢計疏下廷議如所請並賜陳潢僉事道銜時于成龍任直𨽻巡撫詔以輔疏示詢成龍言下河宜開重隄不宜築上遣尚書佛倫侍即熊一瀟給事中逹竒納趙吉士與總督董訥總漕慕天顔會勘天顔在豐議與輔相左佛倫等以應從輔請還奏仍下九卿會議二十七年正月御史郭琇疏言海宇升平萬邦底定宵旰殷憂時切如傷之念者止此一線黃河與淮揚等州縣昏墊之黎民耳皇上委任河臣靳輔靳輔則聼命於幕客陳潢如果洪水歸洋狂瀾永息猶得有辭乃今日議築隄明日議挑濬糜費帑金數百萬終無底止之期今日題河道明日題河廳以朝廷爵位為私恩從未聞有得人之效又復攘奪民田妄稱屯墾橫取米麥越境貨賣皇上以下河為必可開而靳輔百計阻撓欲令功埀成而終止且屯田一事皇上洞知其纍民會勘諸臣亦知其纍民則靳輔陳潢之罪瞭如指掌矣陳潢為靳輔營一家之謀於國計民生全無禆益忌功之念重圖利之心堅真國之蠧而民之讐也監司僉事何等尊貴豈容一介小人冒濫名器以快靳輔酬報私情宜即斥革敕部嚴加處分另簡大臣之清亷敏練者整理河務庶成功可奏生靈永利矣疏下九卿察議二月給事中劉楷疏言河工道廳至雜職百十餘員題補之權總歸河臣使其虛己求才果能奏安瀾之效猶且不可久擅用人大權乃在在保舉及至任事漫無寸功惟見每嵗報衝決而已嗣後大小河官應仍由吏部選補御史陸祖修疏言皇上每遇緊要政事令九卿會議期於衆論僉同至當不易無奈河臣靳輔身雖在外而呼吸甚靈九卿中贊決異同者不過三四人皆左袒河臣不顧公議如屯田一事悉依户部尚書佛倫等所奏具稿箝衆人之口伏思民間地畝各處例有準折起科並無額外多餘之理直𨽻巡撫于成龍審事湖廣將還倘蒙親詢其間利病根由情弊始末可救東南七州縣昏墊之民命省內府幾百萬糜費之金錢河臣積惡已盈中外人心總望睿斷罷斥萬無議勞使過以重遲回昔帝舜殛鯀以其逆水之性也今兼有屯田害民之事去一靳輔天下萬世仰頌聖明無踰此矣時慕天顔孫在豐亦疏論屯田纍民及輔阻撓下河開濬事詔俟于成龍至會議一併嚴察輔尋得請入覲先疏論于成龍慕天顔孫在豐朋謀陷害又自辨受命治河之日正當兩河壞極之時自碭山以抵海口南北兩岸決口七八十處髙家堰決口三十四處翟家壩成河九道清水潭久潰下河七州縣一望汪洋清口運河變為陸地臣晝夜奔馳先堵髙家堰淮水方出清口旋堵清水潭挑挖運河改移運口迄今永逺深通其向來行運之駱馬湖淤淺不能行舟臣創開皂河漕艘無阻久蒙聖鑒至濬築經費方臣未任之初曽特遣部臣履勘估計六百萬兩臣任事後苦心節省自徐州起直抵海口兩岸隄工并髙家堰清水潭及前所未估之新開皂河堵塞楊家莊修築歸仁隄改移運口止用帑二百五十一萬兩又蕭家渡衝決時蒙賜帑一百二十萬兩令一概加修竣工統計所用僅及前此部臣估計之半而臺臣郭琇則曰糜費帑金數百萬營一家之計不知何所見而誣臣至此極也其曰題道題廳未聞得人則河員原因慎重河務必由河臣保題定例已久非自臣始其曰奪田屯墾則臣絶不以納糧之民田分釐入屯其曰越境賣麥則臣原以變價還部題明其曰陳潢小人冒濫名器則陳潢之蒙恩實出鼓勵人才之特典以言冒濫臣不知何所指且詆之為小人則固于成龍久與結拜弟兄慕天顔頻與宴好殷勤孫在豐亦與親密異常者也自康熙二十二年兩河歸故運道通行而郭琇必以洪水狂瀾罪臣科臣劉楷曰惟見每嵗報衝決臺臣陸祖修曰逆水之性又謂清丈隱占非額外多餘地畝蓋郭琇與孫在豐為庚戌科同年陸祖修為諸生時拜慕天顔為師又係孫在豐教習門生劉楷陸祖修己未科同年並江南人與隱占田畝者無非桑梓親戚年譜之契故彼呼此應協力陷臣慕天顔與孫在豐結婚姻因于成龍倡開海口之議故必欲附成龍以攻臣而助在豐兼奪臣任夫河臣之職與督撫不同督撫統攝地方諸務稍一興利除弊易以見德河臣頻年奔走河濵以挑築為務上費帑金下役民力最易招尤致謗而臣之負謗更因屯田之清丈隱占隱占地畝惟山陽最多有京田時田之分時田一畝納一畝之糧係小民之業京田四畝納一畝之糧皆勢豪之業臣清丈沭陽海州宿遷桃源清河五屬得三百萬畝至山陽則終不能丈以山陽鄉紳多也臣不顧衆怒致讐謗沸騰使中傷臣者更得以藉口然臣任事十餘年凡雇夫挑築買辦物料皆給發現銀雖淮揚各屬隱占田畝諸人怨臣至深者亦不能指摘也伏念河工一事成之甚難壞之甚易自康熙六年兩河潰決歷經數河臣治之十餘年終無一效臣受任之初羣議蜂起百計阻撓賴皇上不惜帑金兼授方略而河得以復故正須綢繆善後而諸臣合計交攻必欲陷臣殺臣而後已全不顧運道民生大計當此衆口鑠金之際即皇上欲終始保全無如諸臣朋謀網陷之密布倘蒙聖駕再巡親閲隄工更命重臣清丈隱占地畝則臣與諸臣之是非功罪立分臣身負重劾萬死一生幸得入覲恐天威咫尺不得盡吐所欲陳謹繕疏密奏疏入上諭閣臣曰近因靳輔被劾議論其過者甚多靳輔若不陳辨朕前復何所控告耶此疏並下九卿察議三月上御乾清門命輔與于成龍郭琇各陳所見于成龍言海口必應開濬郭琇言屯田奪民産業上曰屯田之事因取民餘田小民實皆嗟怨靳輔當亦無可置辨輔奏向者河旁田畝盡被水淹臣任事後將決口堵閉兩岸築隄河流故道無有衝決之患數年水淹之田盡皆涸出臣以民間原納租稅之額田給與本主其餘出之田作為屯田抵補河工所用錢糧因屬吏奉行不善民怨是實臣無可辨惟候處分上曰各省民田未有不溢於納糧之額者若以餘田作屯豈不大擾民乎屯田不行無可復議至下河作何開濬重隄應否停築九卿等公同詳酌確議尋允九卿議停築重隄革輔職以福建總督王新命代之陳潢革僉事道銜初漕船出清口入黃河行二百里始抵張莊運口輔奏於清河縣西仲家莊建閘上自宿遷桃源清河三縣黃河北岸遙縷二隄內加挑中河一道俾漕船既出清口截流徑渡北岸避黃河一百八十里之險溜由仲家莊閘內進中河歷皂河泇河北上及工竣學士開音布侍衛馬武往勘還奏中河商賈舟行不絶漕運可通上諭廷臣曰前于成龍奏云靳輔開中河無益反為民纍河道已大壞今開音布等往勘則云數年以來河道未嘗衝決漕艘亦未有誤謂靳輔治河無禆益微獨靳輔不服朕亦不愜於心矣若王新命順從于成龍之説將原修工程盡行更改是各懷私忿必致貽誤河工乃命尚書張玉書圖納等往勘確議還奏河身漸次刷深黃水迅溜入海其已建閘壩隄掃及已濬引河並應如輔所定章程無庸更改十一月輔奏命同工部尚書蘇赫等往閲通州運河請於沙河建閘蓄水通州下流築隄束水以利漕運從之二十八年正月上南巡閲河輔從行諭詢中河逼近黃河水漲隄潰可虞輔奏前曽奉諭籌攔馬河減水壩所出之水毋致淹沒民田臣開中河以束水兼令漕船避黃河險溜今若加築遙隄當不至有患三月諭吏部曰朕南巡時江南淮安人民皆稱譽前任河道總督靳輔思念不忘且見靳輔濬河深通築隄堅固實心任事勞績昭然可復其原品二十九年三月漕運總督董納以北運河水淺請盡泄南旺湖之水北流倉埸侍即凱音布以挑濬北運河奏請上召問輔輔奏南旺湖水若使偏入北河必致南河水淺惟從北河兩旁下掃束水則水深自可濟運詔即以輔同凱音布經理之三十年九月奉命與侍即博霽李光地等閲黃河險工三十一年正月還奏黃河南岸自徐州以上毛城鋪起至海口北岸自大谷山起至雲梯關以下六套所有減水閘壩現無衝損中河亦甚便漕船往來惟黃河南岸之楊橫莊煙墩馬邏北岸之朱家莊安東縣便益門南東門六處險工有未設月隄及下掃單薄處應增築加培並繪圖呈覽下九卿議令河臣如所奏行二月王新命以勒取庫銀為運河同知陳良謨訐罷上諭大學士曰朕聼政以來以三藩及河務漕運為三大事夙夜厪念曽書而懸之宫中柱上至今尚存倘河務不得其人一時漕運有誤關係匪輕靳輔熟練河務及其未甚老而用之亦得紆數年之慮其仍令為河道總督輔以衰病辭命順天府丞徐廷璽同往協理六月疏言前奉詔截留江北漕糧二十萬石由黃河運至山西蒲州撥陕西賑濟臣因開封以西黃河深淺無定與漕臣董訥定議漕船三百八十四每船豫支下運行月銀六十兩為增雇剝船夫役之用共銀二萬三千四十兩二月初自淮安開行臣於五月初赴開封督飭催儧添雇民船隨淺隨剝撫臣閻興邦牒稱水路止可運至孟津由孟津陸運至蒲州六百三十里業經山陕兩省議明分運臣今赴孟津料理得旨嘉其實心任事十月疏言黃河自河南滎澤縣至江南清河縣兩岸各一千餘里其險工不可疏虞如南岸之在開封或疏虞則黃水入淮歸德至宿遷或疏虞則黃水入睢桃源清河間或疏虞則黃水入洪澤湖以侵髙堰倘髙堰不固寶應髙郵運道必致淤墊故尚須籌畫萬全欲加築前此停築之重隄為費甚大惟就運料小河之隄加築髙二丈廣三丈乃可無患北岸之在滎澤或疏虞則黃水上溢張秋下溢濟寧魚臺豐沛民田受淹宿遷清河或疏虞則一八十里之運道亦淤墊故中河遙隄必須加築於西寧橋添建石閘二仲家莊陶家莊兩閘左右各添一閘以備宣泄其張莊舊運口臣輔前挑中河時曽議設閘因解任未舉行恐將來山東之水微弱至中河淺澀今宜竟行堵塞就駱馬湖之東中河之南建閘值東水大長開以泄之東水消落閉以蓄之庶無他慮又疏言黃河隄工莫重於既成之後隨時修補隄根積水易致汕刷惟於上流量挖一溝引沙直注使停再於下流量挖一溝引水分泄漸去其低窪處自然淤平臣輔前任時相度董家堂龍窩二處險工曽設涵洞引黃灌注於月隄裏使清流在月隄外窪地遂成平陸徐州長樊大壩險工亦引黃內灌淤髙窪地二三尺今邳州舊城迤西窪地周圍約有百里水無去路宜倣已驗之法行之或慮掘隄難以修防則建小閘以酌量引灌更為萬全疏下九卿議以黃河水勢湍迅引灌邳州窪地似屬危險令再審籌餘如所請行又疏言臣前任安徽巡撫當軍興之際陳潢助理協宜及任總河值髙家堰決口甚多翟家壩未堵二十餘里成河九道因盡行築隄塞河以敵清口之黃創設減水壩以保髙堰之隄改清水潭隄工於湖內永保安瀾濬甘羅城運口至太平壩以避黃水內灌挑皂河二十餘里支河三十里使駱馬湖不復淤墊又挑中河使漕船免黃河逆流之險凡臣所經營皆潢之計議仰荷聖主如天之福次第成功恩授潢僉事道銜不意驟遭詆毁革去職銜旋即物故又奉命勘河之尚書熊一瀟給事中逹竒納趙吉士同時被指􅎥而去今臣已蒙恩起復則無辜受纍者當一體均邀慈鑒疏下吏部陳潢已故寢議熊一瀟逹竒納趙吉士並請旨録用時輔再疏自陳疾劇乞解任命內大臣明珠往視傳諭留淮調理十一月卒於官年六十遺疏至得旨靳輔簡督河務經理年久黃淮兩河修築得宜運道民生俱有禆益患病溘逝深軫朕懷下部議恤賜祭葬諡曰文襄三十五年河道總督董安國以江南士民籲請捐資建祠河干入奏下部議行四十六年上南巡還諭吏部曰朕厪念河防屢行親閲凡自昔河道之源流治河之得失按圖考績靡不周知粵從明季寇氛決黃灌汴而洪流橫溢嵗久不治迄於本朝在河諸臣未能殫心修築以致康熙十四五年間黃淮交敝海口漸淤朕乃特命靳輔為河道總督靳輔自受事以後斟酌時宜相度形勢興建隄壩廣疏引河排衆議而不撓竭精勤以自效於是淮黃故道次第修復而糟運大通其一切經理之法具在雖嗣後河臣互有損益而規模措置不能易也至於創開中河避黃河一百八十里波濤之險因而漕挽安流商民利濟其有功於運道民生至大且逺朕每蒞河干遍加咨訪沿淮居民感頌靳輔治績衆口如一久而不衰夫人臣有大建樹於國家者奬勳酬庸宜從優渥雖賜恤易名已循彛典尚應特與褒敘賁以殊恩其加贈太子太保豫騎都尉世職用彰朝廷追美勞臣之典為矢忠宣力者勸尋令其子治豫襲職準再襲二次世宗憲皇帝雍正三年以治豫向隨父任明晰河務由副恭領加工部侍即銜協理江南河工事務五年諭閣臣曰朕覽治河方略見原任河道總督靳輔昔年修理河工勞績茂著欲加恩澤以奬勳庸據吏部查奏康熙四十六年已贈宫保與世職今再追贈工部尚書豫祭一次以示朕篤念前勞至意七年命江蘇巡撫尹繼善擇地建祠祀輔及河道總督齊蘇勒有司春秋致祭八年詔建賢良祠於京師以輔入祀欽定八旗通志卷一百九十
