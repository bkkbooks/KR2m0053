  text: 人物志一百三十七列女傳十七八旗滿洲列女傳十五廂黃旗滿洲前鋒達啓之妻舒穆祿氏廂黃旗滿洲馬甲竒善之妻富察氏廂黃旗滿洲鳥鎗護軍吉祥之妻汪佳氏廂黃旗滿洲馬甲裕保之妻鈕祜祿氏廂黃旗滿洲鳥鎗護軍校台綳阿之妻鄂佳氏廂黃旗滿洲馬甲三保之妻杜氏廂黃旗滿洲鳥鎗護軍扎拉芬之妻婁氏廂黃旗滿洲護軍巴達之妻金氏廂黃旗滿洲鳥鎗護軍富桑阿之妻劉氏廂黃旗滿洲馬甲蘇興阿之妻楊氏廂黃旗滿洲前鋒永福之妻伊爾根覺羅氏廂黃旗滿洲鳥鎗護軍常泰之妻王氏廂黃旗滿洲筆帖式靈山之妻白玉爾氏廂黃旗滿洲馬甲富德之妻劉氏廂黃旗滿洲鳥鎗護軍德文之妻富察氏廂黃旗滿洲鳥鎗護軍舒敏之妻賀氏廂黃旗滿洲鳥鎗護軍永泰之妻富察氏廂黃旗滿洲前鋒明保之妻李氏廂黃旗滿洲鳥鎗護軍和升額之妻烏扎拉氏廂黃旗滿洲鳥鎗護軍拉親保之妻伊爾根覺羅氏廂黃旗滿洲馬甲納爾保之妻扎庫塔氏廂黃旗滿洲幼丁瑪三之妻伊爾根覺羅氏廂黃旗滿洲領催全德之妻烏色氏廂黃旗滿洲步甲七十一之妻王氏正黃旗滿洲馬甲佛爾泰之妻瓜勒佳氏正黃旗滿洲鳥鎗護軍達永阿之妻伊爾根覺羅氏正黃旗滿洲鳥鎗護軍年常阿之妻巴嶽特氏正黃旗滿洲鳥鎗護軍保全之妻白佳氏正黃旗滿洲鳥鎗護軍薩清阿之妻滿扎氏正黃旗滿洲鳥鎗護軍富升額之妻朱佳氏正黃旗滿洲鳥鎗護軍朱明阿之妻魏佳氏正黃旗滿洲前鋒窩升額之妻李氏正黃旗滿洲前鋒伊立布之妻莫爾德扎氏正黃旗滿洲馬甲三保之妻王氏正黃旗滿洲前鋒二達色之妻鄭氏正黃旗滿洲鳥鎗護軍馬常阿之妻劉氏正黃旗滿洲前鋒吉爾章阿之妻扎庫他氏正黃旗滿洲領催三音布之繼妻張氏正黃旗滿洲鳥鎗護軍保靈之妻巴林氏正黃旗滿洲鳥鎗護軍富昌之妻白俞特氏正黃旗滿洲護軍富明之妻蘇佳氏正黃旗滿洲鳥鎗護軍拴住之妻李佳氏正黃旗滿洲馬甲何林之妻楊氏正黃旗滿洲鳥鎗護軍佛爾卿額之妻李氏正黃旗滿洲馬甲五福之妻劉氏正黃旗滿洲前鋒伊善保之妻伊爾根覺羅氏正黃旗滿洲鳥鎗護軍和善之妻胡什哈里氏正黃旗滿洲護軍徹海之妻黃佳氏正黃旗滿洲前鋒葉布爾肯之妻張氏正黃旗滿洲鳥鎗護軍達崇阿之妻瓜勒佳氏正黃旗滿洲前鋒雲泰之妻瓜勒佳氏正黃旗滿洲護軍趙德之妻李氏正黃旗滿洲護軍校德克金額之妻納喇氏正黃旗滿洲鳥鎗護軍永福之妻和舍里氏正黃旗滿洲鳥鎗護軍得明之妻張氏正黃旗滿洲領催富森布之妻戴佳氏正黃旗滿洲前鋒定住之妻黃佳氏正黃旗滿洲前鋒阿那布之妻趙佳氏正黃旗滿洲前鋒吉爾章阿之妻伊爾根覺羅氏正黃旗滿洲領催常在之妻曹氏正黃旗滿洲鳥鎗護軍蘇倫布之妻富佳氏正黃旗滿洲委前鋒達宗阿之妻富察氏正黃旗滿洲前鋒蘇章阿之妻劉氏正黃旗滿洲護軍隆福之妻瓜勒佳氏正黃旗滿洲馬甲衣常阿之妻謝氏正黃旗滿洲馬甲六十一之妻張佳氏正黃旗滿洲馬甲倭西瑚勒德之妻墨勒德哩氏正黃旗滿洲馬甲哈伊木保之妻赫舍里氏正黃旗滿洲領催德機布之繼妻車木忒氏正黃旗滿洲鳥鎗護軍扎爾明阿之妻瓜勒佳氏正黃旗滿洲馬甲圖桑之妻哈爾吉氏正黃旗滿洲護軍增福之妻薩都氏正白旗滿洲前鋒八十七之妻楊氏正白旗滿洲鳥鎗護軍俄興之妻寇氏正白旗滿洲鳥鎗護軍廣德之妻杜佳氏正白旗滿洲鳥鎗護軍那莫杜禮之妻曹氏正白旗滿洲鳥鎗護軍廣太之妻李氏正白旗滿洲鳥鎗護軍八十五之妻胡氏正白旗滿洲鳥鎗護軍青雲之妻他塔喇氏正白旗滿洲鳥鎗護軍永貴之妻白雅爾氏正白旗滿洲鳥鎗護軍長六十八之妻索氏正白旗滿洲鳥鎗護軍烏爾興阿之妻陳氏正白旗滿洲馬甲蘇凌阿之妻郎氏正白旗滿洲鳥鎗護軍海林之妻伊爾根覺羅氏正白旗滿洲領催薩通阿之妻趙佳氏正白旗滿洲鳥鎗護軍常興之妻楊氏正白旗滿洲間散阿爾薩朗之妻楊氏正白旗滿洲鳥鎗護軍雙格之妻佟氏正白旗滿洲鳥鎗護軍和亮之妻舒穆祿氏正白旗滿洲鳥鎗護軍佛保之妻王氏正白旗滿洲鳥鎗護軍查録善之妻白氏正白旗滿洲馬甲廣福之妻張氏正白旗滿洲護軍格爾納之妻佟氏正白旗滿洲鳥鎗護軍塔那泰之妻寧氏正白旗滿洲鳥鎗護軍孫查布之妻馮氏正白旗滿洲鳥鎗護軍富玉之妻烏蘇氏正白旗滿洲鳥鎗護軍深保之妻李氏正白旗滿洲鳥鎗護軍存住之妻裕瑚魯氏正白旗滿洲茶尚人常春之妻尹氏正白旗滿洲馬甲菩薩保之妻徐氏正白旗滿洲馬甲那丹珠之妻郭氏正白旗滿洲前鋒雲郭之妻關氏正白旗滿洲防禦通保之妻瓜勒佳氏正白旗滿洲領催依克坦布之妻濤依氏正白旗滿洲馬甲官紳保之妻楚勒克氏正白旗滿洲馬甲百齡之妻郭爾本氏正白旗滿洲馬甲烏雲太之妻苖氏正白旗滿洲護軍德明之妻劉氏正白旗滿洲前鋒班太之妻髙氏正紅旗滿洲護軍海山寧之妻王氏正紅旗滿洲領催泰明之妻納喇氏正紅旗滿洲前鋒校實昌之妻紅額羅特氏正紅旗滿洲知府鏜宜祿之妻瓜勒佳氏正紅旗滿洲鳥鎗護軍五十一之妻張氏正紅旗滿洲護軍夥隆阿之妻吳佳氏正紅旗滿洲鳥鎗護軍阿林太之妻陳氏正紅旗滿洲前鋒東格之妻劉氏正紅旗滿洲鳥鎗護軍皂保之妻張氏正紅旗滿洲領催福祿之妻李氏正紅旗滿洲委前鋒官住之妻李佳氏正紅旗滿洲前鋒青柱之未婚妻陳佳氏正紅旗滿洲馬甲五達庫之妻伊拉里氏正紅旗滿洲馬甲玉得之妻楊氏正紅旗滿洲馬甲蘇木保住之妻瓜勒佳氏正紅旗滿洲前鋒元保之妻富察氏正紅旗滿洲馬甲富勒瑚訥之妻庫雅拉氏正紅旗滿洲馬甲富明阿之妻常佳氏正