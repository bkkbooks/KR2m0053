body:
  text: 欽定四庫全書欽定八旗通志卷一百六十人物志四十大臣傳二十六滿洲正白旗五達珠滿徐瑪哈達哲勒肯烏禪元夢法喇佛倫荆山開音布常鼐珠滿珠滿滿洲正白旗人姓瓜勒佳先世居烏拉祖多和倫國初來歸從征廣寧錦州有功授雲騎尉次子額赫瑪瑚以三等侍衛隨安南將軍宗室洛託征海賊鄭成功進攻厦門力戰陳亡聖祖仁皇帝康熙二年正月恤贈雲騎尉無子珠滿其兄子也襲其職十三年署參領隨大軍征江西時逆藩耿精忠叛應吳三桂遣賊黨犯南康珠滿隨鎮南將軍尼雅翰等擊敗之又敗偽總兵莊姓朱姓等於沔津十五年隨大軍規復吉安破賊衆於惶恐灘十六年三月隨鎮南將軍莽依圖征廣東入韶州吳逆遣偽將軍馬寶等渡河來犯大軍分隊拒之珠滿由右翼奮戰連破賊營馬寶等突圍宵遁十八年六月隨莽依圖進𠞰廣西由橫州至南寧擊賊將吳世琮於新村西山大破之遂解南寧之圍十九年六月隨莽依圖討叛賊馬承蔭於栁州路經陶登敗其黨范齊韓詹仰等援兵是冬隨征南大將軍賚塔征雲南二十年正月擊賊將何繼祖王宏勳等於石門坎奪其隘口賊退據黃草壩二月克之遂進圍雲南城陳斬偽將軍胡國柄等七月復隨都統希佛等追擊賊將馬寶巴養元於烏木山賊潰遁乞降是年雲南平凱旋二十五年七月敘功晉騎都尉兼一雲騎尉二十七年六月授三等侍衛二十九年三月授護軍參領三十年正月兼管火器營事六月調前鋒參領三十六年六月擢荆州副都統三十九年十二月奉命同副都統阿際禮率荆州兵二千會𠞰四川逆蠻比至都統滿丕提督唐希順等已復打箭爐遂駐師鴉隴江防守四十一年六月撤兵還荆州九月鎮筸紅苗作亂上命尚書錫勒達副都統圖斯海徐九如統師撫𠞰諭以珠滿久於用兵凡事與商酌而行十二月撫降三百一寨惟天星等寨仍負固錫勒達與提督俞益謨等分四路進𠞰珠滿領兵協應攻克葫蘆寨斬戮無算餘寨悉平敘功加一級四十五年二月擢江寧將軍四十六年三月上南巡至江寧賜紫貂冠服及良馬是年卒於官賜祭葬如例明年吏部請以其子徹木貝襲騎都尉兼一雲騎尉得旨珠滿人才壯健行間勞績茂著衆所共知簡用將軍正切委任未久奄逝深可憫惜所有世職著再加一雲騎尉授三等輕車都尉與伊子徹木貝承襲瑪哈達瑪哈達滿洲正白旗人姓佟佳禮部承政巴都哩之孫也康熙七年由參領擢正白旗滿洲副都統十二年冬吳三桂反上以兖州地當衝要命瑪哈達率兵駐防以備調遣十三年正月詔率所部兵及右翼察哈爾兵移駐安慶三月耿精忠叛詔瑪哈達移師杭州四月命恭贊平南將軍賚塔軍務七月精忠偽都督閻標等率賊萬餘自溫州處州犯金華瑪哈達率兵馳援同副都統雅塔哩等擊郤之遂奉命駐守金華九月偽都督陳重等犯金華瑪哈達同副都統石調聲等禦擊於山口村追逐至鄭店三戰皆捷斬賊四千餘俘獲甚衆十月偽都督葉鍾陳遙偽總兵周彪尹福等分犯浦江蘭溪義烏等縣瑪哈達俱遣兵擊敗之十一月偽都督徐尚朝率賊五萬犯金華距城十二里結寨瑪哈達與台吉察琿都統巴雅爾總兵李榮等分隊夾擊陳斬偽遊擊吳榮先等及賊兵萬餘時偽總兵張元兆率賊二萬據夀溪瑪哈達與巴雅爾李榮移兵進𠞰破賊營十有八斬元兆及賊兵三千餘十二月徐尚朝偕偽總兵馮公輔據積道山瑪哈達與總兵陳世凱等乘霧進𠞰破其木柵賊皆潰竄招撫偽官百餘暨脅從之衆數千十四年正月督兵擊敗偽總兵沙有祥等於桃花嶺復處州府城三月偽總兵連登雲偕徐尚朝沙有祥自溫州窺處州距城五里列寨瑪哈達與察琿李榮陳世凱分兵往𠞰賊敗潰復奮兵追擊斬偽恭將陳亮郭美才等獲旗幟軍械無算十五年八月擢杭州將軍是月康親王傑書統師進征福建瑪哈達與將軍賚塔由衢州率兵先驅敗偽將軍馬九玉等於大溪灘復江山縣遂趨仙霞關偽守將金應虎率衆降大軍進復建寧延平耿精忠歸順瑪哈達還駐杭州敘功豫三等輕車都尉世職二十三年召還京授正白旗滿洲都統二十六年以咨補旗員徇情滋弊罷任革世職遣往黑龍江效力贖罪二十八年九月卒哲勒肯哲勒肯滿洲正白旗人姓鄂濟初任內閣中書纍遷至侍讀學士聖祖仁皇帝康熙八年擢國史院學士九年改中和殿學士十年京口將軍李顯貴與鎮江知府劉元輔以扣尅軍餉為旗兵揭告哲勒肯奉命同侍郎覺羅勒德洪往江南察審尋奏言李顯貴等侵盜帑銀贓至六萬總督麻勒吉失察於前復不能劾奏於後請解任質審得旨允行於是顯貴元輔並坐斬麻勒吉訊非有心徇庇坐鎸級留任是年重修太祖太宗聖訓哲勒肯充副總裁官又充經筵講官遷刑部侍郎十二年三月調禮部八月逆藩吳三桂奏請移藩錦州上命哲勒肯同學士傅達哩赴雲南經理其事賜佩刀一良馬二哲勒肯至雲南三桂期以十一月啓行而隂與藩下都統吳應騏等謀亂遂發兵反哲勒肯與傅達哩皆被留十三年三桂復遣其護衛以自述功績疏付哲勒肯等齎奏還京明年哲勒肯調任吏部十六年河道總督王光裕以河工廢弛為侍郎冀如錫所劾哲勒肯與副都御史金俊奉命往訊得實光裕罷任先是麻勒吉與漕運總督素斡顔保先後陳奏海州雲臺山屏障海口為淮黃尾閭自廢為外洋壅沙日積致運道無所宣泄請復改為內地至是敕哲勒肯便道勘閲因奏言雲臺東距大洋西北毗連山東江南內地雖去運道較逺苐向設徐瀆鹽場及村莊一十八所田畝膏腴棄之可惜請招徠竈戶人民使復舊業其東海營原設守偹等官亦應復設下部議如所請十九年遷左都御史命赴武昌察審雲貴逃兵奏言湖廣標兵隨征嶽州辰州用命殺賊逮進征雲南改𨽻滇標提督桑額不恤士卒致逃兵一千餘人復隱匿不報請敕部嚴議上曰領兵官平時不能愛養軍士使軍士無以資生始有鼓譟逃散之事桑額其即議罪并傳諭各省統領將帥無得恣虐兵卒貽誤軍機尋議桑額降級留任二十年遷兵部尚書明年七月上以兵部議行間情罪多姑息輕縱由哲勒肯瞻徇訓責之時三逆平定兵部議裁各省增設官兵靖逆將軍張勇奏甘肅寧夏西寧三鎮請以增設兵五千改為經制詔哲勒肯赴陜西會同將軍督撫核議尋議西寧總兵所屬河州及寧夏中衛官兵雖自用兵時增設但地係邉疆請仍留駐守餘悉裁汰九月以病卒於西寧賜祭葬如例四十六年十月上與大學士馬齊衡論在廷諸學士為不及昔年因追憶哲勒肯為學士時批本最速且以其草書敏捷咸稱飛手為褒美云烏達禪烏達禪滿洲正白旗人姓那木都魯父喀爾圖世祖章皇帝時任工部副理事官以監修奉先殿工成豫雲騎尉世職聖祖仁皇帝御極洊擢詹事副都御史倉場侍郎左都御史刑部尚書康熙二十三年致仕二十五年四月卒賜祭葬如例以孫瑚里襲職烏達禪初任驍騎校於康熙十年授三等侍衛洊擢一等兼佐領二十七年喀爾喀土謝圖汗及哲卜尊丹巴胡土克圖率衆來降上既賜以牲畜糗糧明年春土謝圖汗等以食不繼為請命烏達禪同學士錫喇等馳發張家口倉米駝載兩月糧往遍給之二十九年六月喀爾喀部人殺牧長掠馬逃牧厰大臣瑪希追捕弗獲烏達禪奉命飭土謝圖汗執獻逃犯十餘人斬其首惡以馬還三十年五月上幸邉外安輯喀爾喀歸附人衆先期命烏達禪同內大臣索額圖傳諭土謝圖汗哲卜尊丹巴胡土克圖詰其同部自戕及諸妄為事咸具疏自請罪上駐蹕多倫諾爾召集喀爾喀兩翼諸部長諭宥其罪尋擢烏達禪正白旗滿洲副都統三十五年二月上親征噶爾丹命烏達禪率兵隨御營出中路既至克嚕倫河噶爾丹竄遁西路為大將軍費掦古擊敗五月扈駕班師時噶爾丹屬人丹巴哈什哈等先後來降以時值炎暑暫居張家口外八月上命烏達禪乘驛往遷之來京編𨽻八旗佐領九月上復巡邉經書軍務烏達禪扈駕駐歸化城頒賚出征凱旋右衛兵命同索額圖宣諭奬慰三十六年噶爾丹屬人額林沁哈什哈等來降上命烏達禪同學士喇錫詳詢之得噶爾丹與其台吉丹濟拉猜忌離散狀以聞三十七年三月命同尚書馬齊侍郎滿丕往視喀爾喀諸部會盟宣諭禁令七月上詣盛京詔馬齊等即由會盟處還京特召烏達禪馳赴行在三十八年正月奉命招降巴爾瑚三千餘人安駐察哈爾遊收地編𨽻佐領九月巴爾瑚佐領額克圖等自察哈爾殺牧厰副使阿必達及驍騎校班第等掠馬駝携其孥以遁烏達禪率兵馳追時喀爾喀公錫卜推哈坦等已奉詔領蒙古兵圍之烏達禪至斬一百三十八人收其孥四百餘還三十九年授前鋒統領四十年陕西嵗歉詔烏達禪往賑之尋列議政大臣明年遷鑲黃旗蒙古都統四十四年十月調正藍旗滿洲都統尋以有疾遣太醫診視四十八年乞休詔以原品致仕五十一年十月卒年六十有六賜銀千兩命貝勒允祹公富善等奠茶酒諭曰烏達禪隨朕收服喀爾喀厄魯特巴爾瑚等俱在事效力有功及簡任都統以來忠誠任事勒勉盡職偶以患病乞休朕不時存問方期頤養以享遐齡忽聞溘逝深為軫惻下所司議恤賜祭葬如典禮諡襄敏徐元夢徐元夢滿洲正白旗人姓舒穆祿康熙十二年進士由庶吉士散館改戶部主事二十二年遷中允充日講起居注官尋遷侍講二十六年四月同尚書陳廷敬湯斌侍郎徐乾學少詹事耿介侍講學士髙士竒德格勒等召試乾清宫聖祖仁皇帝諭曰人之學問有一定分量真偽易明如德格勒每評論時人學問朕心不以為然故召爾等面試也是年十二月翰林院掌院學士庫哷訥奏劾德格勒私抹記注事並言徐元夢素與德格勒互相標榜因革職逮訊得旨寬釋籍入內務府三十三年命入上書房課皇子讀書尋授內務府會計司員外郎四十一年充順天鄉試副考官五十年三月諭大學士等曰內閣翻譯通本事甚緊要如一二語不符漢文則於事之輕重大有關係內閣侍讀學士及侍讀俱按俸補授之人恐所翻本章不甚妥當在內廷行走之徐元夢現今學翻譯者無能過之可授為額外侍讀學士五十一年同左都御史趙申喬為會試考官五十二年擢內閣學士兼禮部侍郎免𨽻內務府歸原旗五十三年十月充經筵講官十二月授浙江巡撫諭之曰浙江有滿洲兵爾當與將軍協同訓練錢糧或有虧空爾宜清理無纍百姓至於用人宜隨材器使不可求全賜御製詩文集及鞍馬以行明年三月疏言上年杭州紹興台州金華衢州嚴州處州七府旱潦成災田畝邀恩分别蠲賑並截留漕米二十萬石以九萬石發各縣平糶貧民得資糊口而應完額賦尚有十三萬餘兩目下青黃不接輸納維艱請俟秋成後先徵一半來嵗徵完以紓民力得旨允行十月疏言杭州萬松嶺自明代建立書院本朝康熙十年巡撫范承謨興修後年久荒廢臣鳩工整理漸有規模因擇觀風考取諸生及學臣嵗科兩試前列者肄業其中捐資給以膏火無不踴躍樂從苐書院未有嘉名請御書扁額俾諸生出入瞻仰動其欽崇鼓舞之志並賜日講解義古文淵鑒諸書御書諸法帖以廣文教上悉允所請賜浙水敷文扁額因復奏以敷文二字為書院名五十六年正月左都御史及翰林院掌院學士缺員吏部兩疏入奏上曰是當以不畏人學問優者兼任之遂特命徐元夢為左都御史兼掌院學士充日講起居注官經筵講官並教習庶吉士五月諭以科場中鑽營積習未除主考同考官有聲名不好者宜紏劾之俾知警戒於是劾罷編修儲在文張起麟徐用錫沈宗敬宫鴻厯叢澍等又劾罷聲名平常之任滿學政王雲錦林之濬車鼎晉萬經鄭晃魚鸞翔等五十七年五月遷工部尚書仍兼翰林院掌院學士教習庶吉士六年十月上曰徐元夢乃同學舊翰林康熙十六年以前進士止此一人矣因賜以詩有常懷舊學窮經史更想餘間力簡編之句世宗憲皇帝雍正元年正月命入上書房課皇子讀書二月同大學士張鵬翮尚書田從典左都御史朱軾侍郎張伯行李紱掌院學士阿克敦勵廷儀奉詔甄别翰詹各官不安本分有玷官針者勒令解退回籍五月因大學士富寧安留辦西路軍營事特命署理內閣大學士兼署左都御史充明史總裁官十月調戶部尚書辦大學士事賜御製詩有報國訏謨切銜恩翊贊勞之句二年充翻譯鄉試正考官四年八月以翻譯本章錯誤吏部議革去署大學士戶部尚書請交刑部得旨徐元夢在內廷行走多年從寬免其交部著革職在內閣學士之列辦理票簽本章一切翻譯事務效力行走八年以前任浙江巡撫失察吕留良逆書應革任命同翻譯中書行走十三年二月充翻譯鄉試副考官是年八月今上御極命南書房行走尋諭曰徐元夢年逾八旬效力甚久兹當皇考龍馭上賔翻譯祭文甚屬敬慎著即補授內閣學士十月授刑部右侍郎自以年老衰邁不能辦理刑名事件疏辭得旨調禮部右侍郎會纂修世宗憲皇帝實録充副總裁官又詔編輯八旗滿洲氏族通譜同大學士鄂爾泰尚書福敏董其事十二月轉左侍郎命入上書房課皇子讀書乾隆元年二月同尚書徐本福敏侍郎姚三辰奉命閲取會試回避卷五月同尚書楊名時教習庶吉士奏言滿洲庶吉士宜熟習翻譯上命是科滿洲庶吉士來年以清書散館七月充三禮義疏副總裁官八月以年老乞休上曰徐元夢耆碩舊臣今以年逾八旬精力衰邁請解侍郎之任朕念其情辭懇切允從其請特加尚書職銜照現任食俸仍在史館內廷等處行走九月上親撰世宗憲皇帝聖德神功碑文特敇翻譯二年二月疏言恭遇皇上隆禮先師特命國學文廟易蓋黃瓦肇舉臨雍大典於廟學配享之制宜豫釐定四科十哲之目雖始自論語後既以顔子特配先師因升子張於殿以補其數聖祖仁皇帝復以朱子昌明聖教有益斯文命禮臣升躋神位於十哲之次是殿享不盡沿舊制也如有子之言行氣象與聖人相似最為遊夏諸賢所推尊允宜升堂配享至宰我冉求一因短喪有不仁之責一因聚斂有非徒之斥向來論者謂宜移祀兩廡其舊在兩廡之南宫適宓不齊俱以君子見稱於孔子亦宜並豫升配用明聖朝崇尚德行也疏下大學士九卿議以有子升祀子夏之下移祀朱子於子張之下國子監及直省府州縣學均遵行九月復乞休上曰徐元夢老成望重雖年逾八旬未甚衰憊可照舊供職量力行走不必引退其翻譯日講春秋等書暨一切碑文祭文並姓氏館咸安宫事務另𣲖員代管以便頤養四年正月二日召同諸王大臣賦柏梁體詩以扶鳩朝序嵗月延賡分韻五月諭奬抒誠宣力諸大臣加太子少保六年九月遘疾遣太醫診視賜參藥十一月疾劇上諭大學士等曰尚書徐元夢人品端方學問優裕踐履篤實言行相符厯事三朝出入禁近小心謹慎數十年如一日謂之完人洵可無愧且夀踰大耋亦廷臣中之所罕見者前因年老乞休特加尚書銜復加太子少保照現任食俸俾得優遊頤養以享遐齡今冬在家患病即命太醫調治並賜參藥近聞病勢日漸沉重朕本欲親行看視因舉行慶典在即不便前往著皇長子永璜往視其疾冀其痊可倘至不起著賞銀二千兩辦理後事令和親王皇長子往奠茶酒再加贈太傅準入京師賢良祠以示朕優禮耆舊格外加恩之至意翼日卒年八十有七遺疏入諭部議恤賜祭葬如典禮諡文定法喇法喇滿洲正白旗人姓那木都魯父敦泰順治十七年隨安南將軍達素征海賊鄭成功於福建為前鋒沒於陳母喜塔臘氏守節撫孤得旌表法喇初由官學生任筆帖式聖祖仁皇帝康熙十三年充護軍隨征逆藩吳三桂自湖廣至雲南得功牌二還京授護軍校三十五年署驍騎參領隨征噶爾丹尋授護軍參領五十三年遷正白旗蒙古副都統五十五年調正藍旗滿洲副都統明年十月擢鑲白旗蒙古都統時凖噶爾䇿旺喇布坦遣其族兄策凌敦多卜等擾西藏與拉藏汗搆兵四川提督康泰率標兵千餘往松潘鎮備征𠞰至黃勝關標兵譟回成都上命法喇往成都會同巡撫年羮堯經理軍務即察訊其事覆奏康泰素不撫恤標兵偏信守備汪文藻任其扣剋給兵銀米請斬汪文藻及倡譟兵五人以徇遣解隨譟九人編插陕西餘兵仍留營效力詔如議行革康泰職五十七年正月法喇疏言打箭爐道狹糧運維艱自荆州調至成都之滿洲兵一千馬匹疲瘦請俟牧養稍肥先遣五百兵往駐得旨俞允會策凌敦多卜戕拉藏汗侵據其地拘達賴喇嘛于扎克布哩廟法喇疏言打箭爐之外曰裏塘又其外曰巴塘舊為拉藏汗所轄近聞䇿凌敦多卜誘裏塘喇嘛營官往歸恐竟被搖惑已令員外郎巴特瑪等往宣聖主威德並令護軍統領溫普于打箭爐選滿洲兵一百以前鋒恭領伍林葩領之選緑旗馬兵一百鳥鎗兵三百以化林協副將趙宏基領之同往裏塘彈壓相機撫𠞰又聞自裏塘以外抵西藏其人敬瑚必勒罕如神今瑚必勒罕之父現居西寧宗喀巴寺應令其遣人遍曉裏塘營官等俾知朝廷欲保護瑚必勒罕是以發兵往駐則羣畨輯服矣又疏言西藏資茶養生賊人雖據藏地非茶斷難久居今松潘一路茶價甚賤應暫禁出口令裏塘巴塘營官開造畨寨户口清册酌量定數許其買運自皆相率就撫事並下所司議行五十八年二月疏言打箭爐以外畨人尚多觀望不即就撫若於草長時以兵臨之彼必不敢抗應選成都滿洲兵五百緑旗提標兵一千化林永寧兵五百會期由裏塘深入雖巴塘以外亦可傳檄而定上命如議調遣即以法喇率赴打箭爐相機撫𠞰四月法喇率滿洲兵駐打箭爐令副將嶽鍾琪率緑旗兵至裏塘曉諭投獻戶口册畨酋達瓦喇木扎木巴弗從縳之偕其屬五人械送法喇營斬以徇撫定人戶六千四百餘遂進師巴塘其酋喀木布第巴等亦率屬迎降詔法喇率兵駐守巴塘時年羮堯為四川總督上允廷議令其撥兵二千赴法喇軍於來年由巴爾喀木進定藏地五十九年二月年羮堯奏授護軍統領噶爾弼為定西將軍統兵進藏撤法喇回打箭爐駐防六十年正月年羮堯奏撤打箭爐駐防兵還成都尋奏法喇宜與諸間員並回京于是法喇還仍任都統兼署護軍統領十月因護軍自戕不以實奏革任六十一年逢上七旬萬夀慶典宴滿漢諸臣六十五以上者千餘人於乾清宫前名千叟宴法喇預焉賜復原銜雍正十三年卒子拉薩哩官至正黃旗蒙古都統見大臣表佛倫佛倫滿洲正白旗人姓舒穆祿初由筆帖式遷兵部主事聖祖仁皇帝康熙十五年遷詹事府中允尋遷工部郎中厯少詹事洊陟大理寺卿十八年擢內閣學士充經筵講官時逆孽吳世璠尚據黔滇是年六月佛倫奉命同侍郎金鋐赴湖廣總理糧餉九月疏言進黔兵餉自至鎮逺後皆資陸運因量設塘站數處集夫遞送惟是黔民遭亂稀少請飭將軍督撫招徠土民貿易以禆糧運從之十九年兼理四川糧餉及賊平還京二十二年遷刑部侍郎二十三年命同吏部侍郎陳廷敬兵部侍郎阿蘭泰副都御史馬世濟管理錢法疏請令各省有蘆課關稅之所辦銅齎解寶源局以廣鼓鑄下工部議行二十四年調兵部侍郎尋擢左都御史疏言科道各官有受囑陳奏結黨誣陷及給假終養丁憂不在家靜守遍遊各省挾詐督撫諸弊請嚴定處分下吏部議行二十五年遷工部尚書二十六年二月調刑部九月調户部先是河道總督靳輔言髙郵寶應諸州縣下河冝築隄束水入海按察使于成龍以隄工難成請疏濬下河及海口上遣侍郎孫在豐往董疏濬事靳輔又言冝自髙家堰起加築重隄束各壩減泄之水出清口歸黃河而停濬下河並請於隄外涸出田畝設官清文以為屯田可增錢糧百餘萬上曰朕從利益民生起見非為錢糧著佛倫與侍郎熊一瀟給事中達竒納趙吉士會同江南總督總漕確勘議奏尋議應如靳輔所請二十七年漕運總督慕天顔疏劾佛倫勘議河工皆從靳輔臆説不顧興屯之占田厲民孫在豐疏言前佛倫與臣等會勘河工時原議海口應濬擬有疏稿後忽改為加築重隄停濬海口之疏雖係佛倫主稿實靳輔隂謀御史陸祖修復劾佛倫往勘河工屯田二事左袒河臣不顧公議嗣奉命九卿會議而主議者不過佛倫及尚書科爾坤左都御史格斯特等三四人即如屯田一節尚書張玉書左都御史徐乾學力言屯田所占民田應還業主而科爾坤等置若罔聞悉依佛倫所奏具稿其餘九卿有不見議稿隻字者疏入下部嚴察議奏會御史郭琇疏劾靳輔偏聼幕友陳潢阻撓下河開濬又劾大學士明珠余國柱與佛倫結黨營私諸欵上諭責佛倫往勘河工屯田所議偏徇且凡會議時挾私好勝命解户部尚書任召靳輔于成龍同郭琇及佛倫熊一瀟達竒納趙吉士入對佛倫乃奏停屯田有丈出民田槩還業主其暫設同知縣丞等官並裁汰於是部議佛倫應革職上曰佛倫任工部時極力勤勞凡奉差遣亦能勝任但議此事舛錯殊甚著留其佐領以原品隨旗行走逾月授內務府總管二十八年山東巡撫缺諭大學士等曰山東紳襟最稱桀驁且好結朋黨冝簡用風力之人為巡撫著以佛倫補授二十九年正月疏言沂州等州縣衛所未完康熙二十八年錢糧請於麥收後開徵上曰山東本年地丁錢糧全行蠲免原欲使小民終年休息若帶徵未完舊欠必至借端滋弊著於三十年帶徵六月疏言東省賦役不均凡紳襟貢監戶下悉免雜差遂有姦民詭寄田畝規避徭役請通限兩月之內許其自首改正嗣後紳襟等田畝令與民人一例應役以釐剔積弊得旨徭役不均偏纍小民所奏改正釐剔具見實心任事並不瞻徇直省應一體行七月疏言東省本年蠲免正賦臣仰體皇仁勸諭大戶酌減佃租一分至五分不等請嗣後直省凡遇恩免賦糧七分蠲免業戶三分蠲免佃種之民又言東省本年豐收紳民願每石捐輸三合以為積貯合計得榖二十五萬餘石用偹荒歉疏並下部議行三十年革職縣丞談明命訐吏部主事朱敦厚任濰縣知縣時婪贓事下佛倫鞫勘佛倫言敦厚加𣲖婪贓經前撫臣錢珏審實敦厚因凂求原任刑部尚書徐乾學貽書錢珏徇情銷案請敕部議處乾學等皆禠職三十一年擢川陕總督明年西安鳯翔飢佛倫請暫減二府額銷鹽引之半又言西安駐防官兵糧草州縣苦於逺解請於距省四十里可通水路之曹店設倉收兑事俱下部議行三十二年冬入覲賜冠服遣回任加禮部尚書銜三十三年授禮部尚書三十五年上親征噶爾丹命與大學士阿蘭泰尚書馬齊分班值宿禁城三十八年授文淵閣大學士初佛倫任山東巡撫時疏劾左都御史郭琇前任吳江知縣虧帑事且言琇父郭景昌原名爾標係明季御史黃宗昌家僕曽入賊黨伏誅琇私改父名濫請封典應豫追奪部議如所請三十九年二月郭琇以湖廣總督入覲具疏訟佛倫誣衊其父上詰問佛倫以訪聞舛錯對下部察議應革職援赦得免三月以前任總督時散給陕西籽種銀兩不確察各官侵扣挪用諸弊應降四級調用上命以原官休致明年卒四十四年上諭大學士馬齊曰佛倫為總督時密奏涼州總兵師帝賓騎射不堪朕諭以師帝賔為三屯營副將時騎射之佳大臣侍衛皆知乃佛倫終劾之而佛倫亦于此壞名又密奏趙良棟不可居寧夏乞召赴京師後良棟來朝朕命之歸良棟奏曰有人言臣不宜居寧夏臣不便歸朕問何人良棟言佛倫以告索額圖而索額圖語臣以此觀之人之無耻未有如佛倫者凡密奏之事皆朕親手封發即左右人亦不得見此皆體密奏者之心而重其事也佛倫自行密奏而反以告人猶可比之人數乎四十九年户部虧空積年承辦草豆銀兩事覺上命從寬就現在得贓人員於未審之前以所得之銀歸欵免其革職拏問因諭諸大臣曰戶部弊端始自尚書科爾坤佛倫後來諸臣因循成習以至於此凡為大臣者理應亷潔自守黽勉從事方為無忝厥職也荆山荆山滿洲正白旗人姓費莫康熙二十五年由監生補禮部筆帖式尋任本部讀祝官二十八年遷太常寺寺丞三十九年遷戶部員外郎四十四年擢太常寺少卿四十六年晉本寺卿五十年轉大理寺卿五十二年授禮部右侍郎五十三年充纂修玉牒副總裁官五十四年四月署倉場侍郎事務七月疏言泗洲等衛糧艘在通州張家灣遭風損十一隻沉米五千二百餘石內河向無題豁例但今嵗北河水發風大溜急無異江河請賜豁免上允之十一月疏陳漕運倉糧事冝一漕艘至濟寧臨清等處河水淺阻請交山東撫臣𣲖司道督催出境一水次兑糧向有樣米及船到起卸逈不相符皆運丁偷米攙粳所致請令該糧道將各倉兑米一袋鈐封到淮漕督折驗加封抵通日臣等率坐糧廳對驗起卸一漕糧挂欠例將辨丁留通勒限賠補逾限不完者發回本省陸續追取搭運甚為繁滯請即於本年發回令速賠補一京通厫座號房多坍或以席囤收米何堪久貯請𣲖滿漢堂官各一揀選賢能司官料占修造限內倒壞原辦賠修九卿會議如所請奉旨依議五十五年閠三月順天永平二府飢奉命監視散賑六月授禮部尚書五十六年三月卒賜祭葬如例諡端簡子德音由內閣中書遷侍讀康熙五十二年擢內閣學士六十年授山西巡撫雍正元年四月以匿報平定州夀陽徐溝等縣旱災又不停徵部議革職尋授內閣學士因巡撫任內州縣虧欠錢糧逾限未完降一級調用七年卒開音布開音布滿洲正白旗人姓西林覺羅初由筆帖式授內閣中書纍遷兵部主事內閣侍讀工部郎中詹事府少詹事聖祖仁皇帝康熙二十六年八月授光祿寺卿十月遷都察院左副都御史會湖廣巡撫張汧為御史陳紫芝劾奏劣欵命開音布同直𨽻巡撫于成龍山西巡撫馬齊往訊得實論罪如律二十七年二月擢戶部右侍郎三月命監理髙郵寶應下河工程十一月疏言工所需用夫役甚衆應於髙郵等十一州縣內各𣲖夫千名即有添設不得過二萬之數前在河工官員有諳練河務者請選用五十員以供臂指又請濬串場河並丁溪草堰白駒石䃮及河垜場車兒埠滔子竈至苦水洋諸處事俱下部議行二十八年正月上南巡過淮安命侍郎徐廷璽巡撫于成龍閲視下河還奏自丁溪至白駒有通海口之三處及丁溪上流之馮家壩河道應仍挑濬其串埸河石䃮諸工可悉停部議下河工程減停應歸河道總督王新命管理上因命開音布還京授正白旗滿洲副都統先是髙郵州民以車邏鎮三壩放水致淹田麥控訴開音布疏劾州同茹兆相千總馬崇貴私開壩閘詔尚書張玉書等察審以三壩各閘例於四月朔開放開音布誤劾覆奏下部議開音布降一級留任罰俸一年尋擢提督九門步軍統領三十年二月上以京師外城巡捕三營舊為兵部督捕侍郎所轄與內城不相聨屬命改𨽻步軍統領下九卿等詳議改鑄提督九門步軍巡捕三營統領印總司內外城捕務所獲逃盜等犯移送刑部完結三十三年五月天壇外新修道路工竣開音布奏言新修之路聽人照常行走不久又壞應沠緑旗兵看守令往來之人止走兩旁勿行中路上曰如此禁約殊於朕意不合蓋修葺道路専以便民也若派兵看守不許行走則修之何用且云禁行中路看守之人必并禁及兩旁不便於民應仍聽人照常行走後若毁壞令步兵稍稍葺治三十五年八月擢兵部尚書仍兼步軍統領九月疏言巡捕事務繁要請添設郎中主事各一員下吏部議行三十六年九月授鑲白旗滿洲都統解尚書任三十八年九月以年老命解都統任専管步軍統領事四十一年五月卒於官賜祭葬如典禮諡肅敏常鼐常鼐滿洲正白旗人姓赫舍哩由筆帖式考授內閣中書康熙三十年遷侍讀三十四年遷慎刑司員外郎三十九年授江南海關稅務監督四十年補盛京戶部員外郎四十三年授翰林院侍講學士充日講起居注官四十六年改內閣侍讀學士五十二年遷內閣學士充經筵講官五十六年四月擢兩江總督六月疏言松江府上海縣距海口五十餘里洋船水手良頑不一更有居民漁戶貿物採魚小船往來不絶或偷運米送洋船查上海惟守偹一千總一把總二兵二百七十五分防外無幾請將提標右營兵移駐上海其原駐上海之黃浦營改為水師增大沙船三哨船四巡查海口五十七年疏言江南濵海要區額設大小船皆巡海必需一日不冝空缺今營船同時修造恐誤巡防請屆期先修一半仍留一半在汛以俟續修並責成布政使確查不許尅減工料如船不合式及揑報當修冒領工價將承辦各官參處並下部議行五十八年疏恭頴州知州王承勳訐安徽布政使年希堯鳯陽府知府蔣國正勒索規禮因蠲民欠錢糧國正將伊應賠所屬虧空帑銀三千餘兩揑報民欠冒蠲侵蝕請離任質審上命左都御史田從典副都御史汪沂往審嗣從典等訊國正受承勳規禮八百餘兩又將應賠銀混入民欠册內屬實希堯失察俱論如律五十九年三月疏言商船出洋例禁大炮許携鳥鎗腰刀近每見沿海州縣鬭毆抄搶等案多鳥鎗傷人應將洋船鳥鎗盡繳官私藏者按律治罪從之七月上以直省錢糧虧空甚多應立法清釐命各督撫議奏常鼐疏言州縣虧空錢糧或知府有扶同徇隱情弊别經發覺者將知府參革獨賠又州縣官恃有上司分賠之例將庫銀藏匿假揑虧空應令督撫核實題參嚴加議處其假匿虧空銀兩獨於該州縣名下著追下部議如所請六十一年卒於官先是常鼐劾兩淮巡鹽御史張應詔科𣲖商人請交部嚴加議處商人程庭等治罪上命工部尚書李先復等察審先復覆奏應詔科𣲖屬虛部議以衆商已供應詔科𣲖今常鼐身故遂改前供所審未協雍正元年諭曰朕聞常鼐居官本無令名皇考亦曽向朕言之其所奏豈可為凖且皇考當日不肯據常鼐所奏定案故遣大臣察審今既已審明不必冉行駁詰况張應詔本無科派之事真實難掩衆商安得不改易前供乎其恭奏不實之常鼐已故免議欽定八旗通志卷一百六十
