body:
  text: 土田志九土田數目直𨽻各處八旗地畝數目二保定府永平府易州府河間天津府定州宣化府保定府清苑縣正黄旗順治三年至康熙二十四年原撥給旗人地共三千六百十四頃六畝二分零順治三年至康熙元年投充旗地共五百四十七頃六十六畝順治八年至雍正二年退出地共五百十三頃三十二畝六分零康熙二十三年至雍正二年復撥給旗人退地共四百四十七頃八畆七分零正白旗順治三年至七年投充旗地共三百八十十九頃六十五畝六分順治八年至康熙三十九年退出地共三百四頃六十三畝二分正紅旗順治十六年退出地九十六頃康熙四年至五十年撥給旗人地共一百九十二頃四十八畝康熙四年至雍正五年退出地共十九頃四十三畝鑲紅旗順治十四年原撥給旗人地二十九頃四十畝順治十六年至雍正三年退出地共三十頃三十畝康熙五年至四十一年復撥給旗人退地共二十二頃五十畝鑲藍旗康熙四十八年退出地一頃五十畝滿城縣正黄旗順治三年至六年原撥給旗人地共二千一百二十一頃三十三畝二分零順治七年投充旗地共二十一頃五十一畝康熙二十一年至二十三年續撥給旗人地共一百四十三頃四十畝順治十年至康熙四十三年退出地共一百四十八頃七十五畝順治十五年至康熙二十一年復撥給旗人地共九十三頃十三畝四分零正白旗順治四年投充旗地三十五頃康熙七年撥給旗人地三頃六十畝康熙五十二年退出地一頃四十七畝鑲白旗康熙七年撥給旗人地六十畝康熙四十年至四十七年退出地共四頃五十畆又康熙三十二年退出地五畝康熙五十五年撥給荘頭地十一頃七十九畝又右衛地九頃三十畝雍正三年復退出地六頃九畝安肅縣鑲黄旗順治十年退出地三十七頃二十六畝正黄旗順治三年至康熙二十二年原撥給旗人地共四千七百三頃五十四畝九分零順治六年七年投充旗地共三百三十三頃七畝五分零順治十年至康熙六十年退出地共三百三十四頃二十八畝三分零順治十五年至康熙二十三年復撥給旗人地共三百二十六頃六十七畝八分零正白旗順治六年投充旗地七十畝八分康熙五十二年退出地二頃鑲白旗康熙三十五年退出地一頃二十二畝五分鑲藍旗康熙四十五年退出地九十畝又康熙二十年投充旗地共十二頃三十一畝九分康熙三十三年至五十三年各旗退出地共七十一頃七十九畝九分零又雍正三年至五年退出地六頃四十六畝零康熙三十九年至五十七年復撥給荘頭及各旗地共四十六頃一十七畝八分零定興縣正黄旗康熙四十三年至五十九年撥給旗人退地共三十頃四畝九分零正紅旗順治二年至四年原撥給旗人地共五千四百十三頃八十二畝九分零康熙四十七年四十八年復撥給旗人退地共六頃七十九畝一分康熙四十八年至五十七年續撥給旗人地共七頃五十畝鑲紅旗雍正五年撥給旗人退地二頃四十七畝又康熙八年至雍正五年各項退地共九十七頃四畝四分零康熙八年至四十四年復撥退地給各旗筆帖式等共十九頃六十四畝康熙五年至五十五年續撥給各旗地共七十八頃九十畝一分零新城縣鑲黄旗順治三年四年投充旗地共六頃六十四畝三分零康熙元年退出地四頃五十五畝八分正黄旗順治元年至四年投充旗地共三十二頃五十五畝六分零康熙元年至二十四年退出地共七十五頃四十四畝八分康熙三十二年至五十三年復退出地共九十二頃二十三畝八分零正白旗順治二年至四年投充旗地共七十四頃五十畝三分零順治九年退出地共六十三頃五十七畝五分零正紅旗順治三年四年投充旗地共四十七畝康熙二年退出地一頃六十畝鑲白旗順治三年投充旗地五頃鑲紅旗順治四年至康熙元年原撥給旗人地共八千六十七頃九十九畝二分零順治三年四年投充旗地共四十一頃三十七畝四分零順治十三年至康熙二十一年退出地共一千六百五十七頃二十二畝七分零康熙五年至二十一年復撥給旗人地共一百四十五頃十六畝五分順治二年三年原撥給旗人額外地一千五百二十一頃三十畝五分零康熙二十六年至五十一年退出額外地共三十八頃六十六畝鑲藍旗康熙三十四年退出地六十畝又康熙二十三年撥給各旗地共二百十頃九十畝康熙二十三年退出地三頃六十六畝康熙二十三年復撥給各旗地共一百九十四頃八畝康熙二十六年至雍正元年撥給各旗地共一百三十三頃一分零康熙四十八年退出地一頃五十畝唐縣正黄旗順治四年撥給旗人地八百一頃八畝順治七年投充旗地一頃四十九畝九分零謹案唐縣之後望都之前有博野縣乃舊志未載此縣地畝今謹仍之後有缺者倣此望都縣正黄旗順治四年原撥給旗人地四百二十七頃九十一畝零康熙二十三年續撥給旗人開荒等地共二十二頃八十畝順治五年至七年投充旗地共四頃五十五畝八分零順治八年至康熙六十年退出地共二十頃九十六畝一分零康熙二十三年至五十五年復撥給旗人開荒及退出地共四十頃十九畝三分正藍旗順治八年至康熙七年退出地共四頃九十畝容城縣鑲黄旗順治三年四年撥給旗人地共一千八百三十一頃三十五畝四分零康熙三年至九年撥給旗人地共二頃七十六畝八分零順治四年至康熙三十六年退出地共九十四頃八十五畝四分零順治十四年至康熙七年復撥給旗人退地共五頃一畝六分零正黄旗康熙五年撥給旗人地三十二頃五十二畝零順治五年至七年投充旗地共一百十八頃六十六畝順治十一年至康熙五十年退出地共五十三頃三十六畝九分康熙二十二