body:
  text: 典禮志九八旗鄉飲酒禮養老附一京師及直省府州縣每嵗正月十五日及十月初一日舉行鄉飲酒禮擇鄉之年髙徳劭允符衆望者一人為賔其次為介又次為衆賔京師府尹為主直省各府州縣官為主一鄉飲酒禮立一人為司正主揚觶以罰失儀者以教官充二人司爵二人贊禮二人引禮一人讀律並以生員充其京師鄉飲酒禮由禮部堂官一員前往監禮康熈九年十一月順天府府丞髙爾位題稱竊照鄉飲酒禮朝廷敬老尊賢之大典盖民知敬老然後不悖於孝弟民知尚徳然後日趨於忠信自古迄今甚盛典也臣跪誦聖諭諄諄以教化為首務仰見我國家化民成俗之至意逺軼前代矣苐鄉飲酒禮一節臣府每嵗舉行兩次照例将漢人中年髙有徳者選擇敦請恪遵無異臣思八旗下滿洲䝉古漢軍其中豈無年髙有徳堪為賔介者似宜并示優崇以昭奨勸伏祈勅下部議鄉飲酒禮定例滿漢一體舉行則大典光而禮制備矣奉㫖這本説得是著議奏該部知道尋禮部覆稱鄉飲酒禮乃敬老尊賢之大典自當滿漢均霑以昭奨勸應如該府丞所請查照定例滿漢一體舉行奉㫖依議儀注京師鄉飲酒禮順天府尹為主人前一日執事者於府學講堂陳設坐次監禮席於庭東北向賔席於堂西北南向主人席於堂東南西向介席於堂西南東向衆賔之長三人席於賔西南向東上皆專席不屬衆賔席於西序東向僚佐席於東序西向皆北上司正席於主人之東北向設律令案於主介間正中又設尊案一於東序端司正豫率執事習禮樂部和聲署設樂於西階下至日黎明執事者宰牲具饌監禮主人及僚屬司正先詣學遣人速賔介以下比至主人率僚屬出迎於庠門之外揖賔介衆賔皆答揖賔入介衆賔從入主居東賔居西贊禮者立階前贊揖主及賔三揖三讓而後升堂東西相向立贊兩拜交拜畢賔即席乃延介一讓升介升拜如賔禮介即席乃延衆賔以次皆升主人揖皆答揖即席主人率僚佐皆即席咸坐贊司正揚觶執事者引司正由西階升詣堂中北向立贊起立賔介以下皆立贊揖司正賔介以下皆揖執事者以觶酌酒授司正司正舉酒曰㳟惟朝廷率由舊章敦崇禮教舉行鄉飲非為飲食凡我長幼各相勸勉為臣盡忠為子盡孝長幼有序兄友弟㳟内睦宗族外和鄉黨無或廢墜以忝所生讀畢贊司正飲酒飲畢以觶授執事贊揖司正揖賔介以下皆揖司正復位賔介以下皆坐贊讀律令執事者舉律令案於堂之中引禮引讀律令者詣案前北面立賔介以下皆立行揖禮如前讀畢復位贊供饌執事者舉饌案至賔前次介次主三賔以下各以次設贊獻賔主起北面立執事者斟酒以授主主受爵詣賔前置於席少退贊兩拜賔答拜訖主退復位贊賔酢酒賔起介從執事者斟酒授賔賔受爵詣主前置於席少退贊兩拜賔主交拜訖賔退復位主人起獻介介酢主人如前儀乃各就位坐執事者詣三賔衆賔以下以次斟酒於席訖贊飲酒酒三行贊奏樂工升歌周詩鹿鳴之章卒歌笙奏御製補南陔詩間歌周詩魚麗之章笙奏御製補由庚詩乃合樂歌周詩闗睢之章卒歌工告備出執事者行酒主賔以下飲無算爵贊徹饌徹饌訖賔介主以下皆興主僚屬居東賔介三賔衆賔居西贊兩拜賔主介拜訖贊送賔賔介衆賔主人以次下堂分東西行出庠門一揖退監禮者出主人送禮畢乃皆退謹按八旗鄉飲酒禮於康熈九年舉行起至乾隆十九年停止謹将舊行儀注查載以識舊制養老順治十年恩詔年老退甲兵丁照例一體賞賜十八年議准八旗年老致仕官有奉㫖支原俸者仍照原品支給其餘年至六十致仕者給與半俸康熈五十二年三月諭大學士等今嵗天下老人為朕六十大慶皆從數千里而來賜伊等筵宴遣回著查八旗滿洲蒙古漢軍漢人大學士以下民以上年逾六十五嵗以上者奏聞擇日賜宴有不能来者朕另行按分頒給再查八旗蒙古漢軍以至内府佐領不論官員閑散人等年七十以上老婦亦著奏聞俟老人賜宴後再定一日送皇太后宫賜宴有貧乏不能來者著各屬協助車馬使之前來再敇宗人府諸王以下宗室子孫内二十嵗以下十嵗以上選擇聰眀堪供使任者六七十人令於耆老前執爵即朕子孫皆令之出宗室外不用他人也是月二十七日禮部等衙門引八旗滿洲䝉古漢軍六十五嵗以上老人大學士以下閑散人等以上至暢春園正門前東西嚮列坐東坐西嚮内大臣和碩額駙尚之隆内大臣公舅舅佟國維領侍衛内大臣公海金領侍衛内大臣侯巴渾特大學士温達蕭永藻户部尚書穆和倫禮部尚書赫碩色刑部尚書哈山吏部侍郎傅紳户部侍郎塔進泰兵部侍郎巴顔柱理藩院侍郎諾木齊代副都御史舒蘭大理寺卿孟世泰儀度額真佛保賽音厰都統善丹馬爾賽朱瑪喇敖三寜古塔將軍孟俄洛䕶軍統領騰額特副都統毛竒他特石如璧偏圖薩爾禪道福色閒散大臣伯四格圖拉等一百餘人次列耆老二千餘人西坐東嚮原任領侍衛内大臣公阿爾泰原任尚書馬爾漢凱音布安布禄范承勲阿山郭世隆原任縂督石文晟于成龍原任侍郎常書敦多禮巴錫戴都里多竒牛黒納努黒鄂竒楊舒原任總漕馬世濟原任廵撫王國昌劉光美許嗣興原任學士瓦爾達黄茂原任都統圖世希魯白合車福納查拉克圖齊式班第原任䕶軍統領洪海蘇黒原任副都統禪布安圖艾有仕黄象坤等三百餘人次列耆老二千餘人有司陳設几席簠簋之儀膳羞燔炙之品諸皇子率諸皇孫及宗室子弟執爵授飲東西前後各十餘行次第以徧頃之上出御幄陞座衆耆老進前跪獻萬夀觴上命扶掖八十嵗以上者至御座前親賜酒一巵於時瑞靄絪緼恵風披拂太和翕聚懽若家人内大臣臣尚之隆等跪奏曰臣等生逄聖世身受殊恩如天之福懼不能勝未知何以仰答髙厚於萬一也駕起還宫隨傳㫖賜内大臣尚之隆等大學士温達等致仕尚書馬爾漢等袍帽有差又賜八旗耆老人等銀兩有差諸臣及耆老各謝恩而退是日宴賚八旗官員八十嵗以上鑲黄旗滿洲三品官鄧光乾一人漢軍原任知縣蒲敏政等五人正黄旗滿洲六品官達巴納等三人漢軍五品章京孫應麟等二人正白旗滿洲原任䕶軍統領蘇黒等十九人漢軍原任知縣員養純等二人正紅旗滿洲原任侍郎敦多禮等八人䝉古佐領古穆一人鑲白旗滿洲前鋒校賽龍阿等五人蒙古驍騎校毛什喇一人鑲紅旗滿洲章京三泰等三人漢軍原任員外郎陳懐徳等二人正藍旗滿洲原任雲騎尉蘇黒等八人蒙古原任䕶軍校厄楞特等二人漢軍雅鼐一人鑲藍旗滿洲原任侍郎戴都里等九人蒙古原任雲騎尉厄爾色等三人七十嵗以上鑲黄旗滿洲内大臣公舅舅佟國維等六人蒙古都統朱瑪喇等六人漢軍原任尚書范承勲等十七人正黄旗滿洲原任尚書凱音布等四十二人蒙古䕶軍統領騰額特等八人漢軍原任副都統黄象坤等二十人正白旗滿洲原任尚書馬爾漢等六十一人蒙古佐領梯弟等三人漢軍原任總督石文晟等十六人正紅旗滿洲原任都統查拉克圖等四十一人蒙古原任雲騎尉滿達希等三人漢軍歩軍校鍾世孝等七人鑲白旗滿洲都統圖世希等五十二人蒙古䕶軍校馬巴朝等二人漢軍大學士蕭永藻等四人鑲紅旗滿洲大學士温達等四十一人蒙古原任雲騎尉葛穆徳等三人漢軍大理寺卿孟世泰等十人正藍旗滿洲原任學士瓦爾達等五十人蒙古歩軍校特古思等二人漢軍騎都尉郭凾臣等十人鑲藍旗滿洲户部尚書穆和倫等五十五人蒙古原任䕶軍㕘領查木素等六人漢軍原任巡撫許嗣興等五人六十五嵗以上鑲黄旗滿洲寜古塔將軍孟俄洛等六人蒙古原任佐領波第等七人漢軍内大臣尚之隆等十人正黄旗滿洲内大臣侯巴渾特等三十人蒙古原任副都統艾有仕等五人漢軍原任府丞李法祖等九人正白旗滿洲都統敖三等三十九人漢軍佐領張國柱等十二人正紅旗滿洲原任副都統安圖等三十人蒙古雲騎尉花色等二人漢軍歩軍校王雙全等六人鑲白旗滿洲原任侍郎鄂竒等三十四人蒙古原任雲騎尉莽鼐等二人漢軍原任守備魏士英一人鑲紅旗滿洲一等侍衛朱常鳳等六十九人䝉古步軍校托泰等四人漢軍原任總漕馬世濟等十人正藍旗滿洲原任副都統禪布等六人䝉古騎都尉耨楞等四人漢軍驍騎校朱國璽等六人鑲藍旗滿洲原任二等侍衛色克巴等二十六人䝉古理藩院侍郎諾木齊代等二人漢軍歩軍校徐全周等七人右各員内賜内大臣和碩額駙尚之隆舅舅佟國維侯巴渾特大學士温達蕭永藻尚書穆和倫哈山寜古塔將軍孟俄洛原任尚書馬爾漢凱音布范承勲原任都統查拉克圖煖帽各一項團龍縀袍褂各二件鞾韈各二雙副都御史岳蘭原任尚書安布禄原任侍郎郭多禮涼帽各一項團龍縀袍褂各二件鞾韈各二雙原任䕶軍統領洪海原任都統班第原任副都統黄象坤六品官達巴納于地都袍褂各二件其餘八十以上銀各十五兩七十以上銀各十兩六十五以上銀各一兩凡現任大臣官員與宴不與賞原任官員未與宴者領半賞是日宴賚八旗披甲閒散人等九十嵗以上鑲黄旗滿洲碩吉輝等二人正黄旗滿洲孫朝福等二人正白旗滿洲花鳳彩等二人正紅旗滿洲哈世泰一人鑲白旗滿洲靈印等二人漢軍王國敬一人鑲紅旗滿洲王達等二人以上各賞銀二十兩未與宴者領半賞八十嵗以上鑲黄旗滿洲烏納布等二十六人䝉古托克托和等二人漢軍何豹等十二人正黄旗滿洲張進忠等三十一人漢軍張起雲等二十九人正白旗滿洲富哈納等三十四人䝉古四兒等三人漢軍張汝秀等三十二人正紅旗滿洲趙之英等四十二人蒙古巴顔等二人漢軍劉光表等七人鑲白旗滿洲根泰等二十二人蒙古博恃羅等二人漢軍李雲元等十人鑲紅旗滿洲甘楚喀等二十八人蒙古桃色等五人漢軍張福等十六人正藍旗滿洲勒色禮等三十人蒙古里格等四人漢軍張百禄等十二人鑲藍旗滿洲葉庫納等五十七人蒙古薩爾圖等八人漢軍孟猷粲等五人以上各賞銀十五兩未與宴者領半賞七十嵗以上鑲黄旗滿洲黨大等二百十一人蒙古巴拜等四十一人漢軍王成等六十二人正黄旗滿洲黒色等二百十九人蒙古黨色等十六人漢軍張義振等二百零一人正白旗滿洲光柱等一百八十五人蒙古造經等二十七人漢軍董竒等一百七十八人正紅旗滿洲張治宇等二百零七人蒙古保住等八人漢軍陸登朝等二十四人鑲白旗滿洲長夀等一百九十六人蒙古巴木布什等十八人漢軍顧邦懐等五十五人鑲紅旗滿洲吴大禪等一百七十五人蒙古柯士徳等十二人漢軍辛喜等七十三人正藍旗滿洲沈陽等一百六十一人蒙古六兒等三十人漢軍陳秉治等三十六人鑲藍旗滿洲費雅達等三百五十三人蒙古哈希泰等三十人漢軍金夀等三十七人以上各賞銀十兩未與宴者領半賞六十五嵗以上鑲黄旗滿洲二黒等四十人蒙古南超等二十八人漢軍張魁等四十人正黄旗滿洲三竒等一百四十二人蒙古阿玉璽等七人漢軍朱治國等一百五十四人正白旗滿洲舒爾黒等一百四十九人蒙古歪拉海等九人漢軍周文方等十三人正紅旗滿洲多爾濟等四十二人蒙古二哥等十一人漢軍張進忠等二十四人鑲白旗滿洲朝什喜等八十二人蒙古趕年爾等十三人漢軍郭有功等四十八人鑲紅旗滿洲色勒等一百八十三人蒙古三圖等八人漢軍羅竒生等二十六人正藍旗滿洲哈頼等四十九人蒙古艾都等十五人漢軍李大韓等四十二人鑲藍旗滿洲古圖器等八十七人蒙古阿穆呼朗等二人