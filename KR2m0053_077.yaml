body:
  text: 欽定四庫全書欽定八旗通志卷六十三土田志二土田規制畿輔規制二雍正元年至十三年雍正元年諭曰口外地方遼濶開墾田地甚多將京城無産業兵丁移駐於彼殊為有益著古北口提督定議再著總理事務王大臣等會同該部詳議具奏尋議準將在京八旗滿洲蒙古驍騎內選熟諳農務者八百名前往熱河喀喇河屯樺榆溝三處開墾六年十月巡察順天永平宣化三府監察御史苗夀等奏稱直屬近畿州縣不論旗民均編保甲奉行在案惟是旗莊圈賞投充地畝册貯內府及户部凡各州縣查閲原檔例應申請咨部轉行知照往返需時臣等歷據民人控告旗莊強霸不結之由總因檔案未易清查州縣官雖知隱占情弊不便懸斷以致旗莊益得恣行兼併仰懇皇上敕下內務府宗人府八旗都統其內府大糧莊頭及內府官兵投充當差人等現在實有地畝由內務府查明實數并坐落州縣鄉村名下地段四至造具清册咨送户部其親王以下間散宗室以上莊頭及包衣官兵投充當差人等地畝由各府屬管領佐領查造清册其覺羅八旗莊頭及官兵投充人等地畝由該旗查造清册此册務須一樣二夲一留户部存案一由部轉咨直督發布政司照造清册鈐發州縣與民糧地清册一同存貯嗣後有旗民互爭之案檢册查對不難勘丈訊斷再此內帶地投充人户有隱地數頃或數十頃者亦應徹底清晰難容遺漏請照民人之例勒限一年準其據實首明該管處除本身現在當差地畝之數記檔咨送外餘地另册報部題明仍著輸租當差以正賦額其有隱匿不報及不實指坐落四至等弊一經查出所隱餘地照例入官仍嚴加議罪將查送之官一併交部議處至此項檔册頒發以後每年不無移換應于嵗底由兩翼稅課司彚報户部咨行各屬知照記檔户部議覆應如苗夀等所請得旨允行七年諭曰八旗地畝原係旗人産業不準典賣與民向有定例今竟有典賣與民者但相沿已久著從寬免其私相授受之罪各旗務將典賣與民之地一一清出奏請動支內庫銀照原價贖出留在各該旗給限一年令原業主取贖如逾限不贖不論本旗及别旗人準其照原價承買八年諭曰近畿各府有八旗莊屯雜處其間有司難于清查且八旗罷黜之廢員及不能上進之子弟與多事不法之家人往往潛住其中結交逰手好間之輩妄行生事或好勇鬥狠或酗酒賭博或與百姓爭訟告訐輾轉不休以致風俗日漸澆凌難以整理雖有理事同知一員亦相隔甚逺不過詞訟到案一為判斷而已平時則無稽查約束之功也朕意欲于旗員及司官內遴選賢能者八員派往各府有莊屯之地方専辦旗人之事時加教誨申明禁約導其善念革其邪心小則分别懲戒大則據實糾參其有旗民互相爭訟之事仍聽該管衙門審理此差往之員以一年為期更換一次果能實心辦理化導有方一年內所管之處無旗人犯法之案將該員與以議敘倘或怠忽廢弛因循瞻顧或擅作威福多生事端著直𨽻總督與巡察御史即行參奏從重議處其如何分晰管理及如何定例之處著該部詳悉妥議具奏户部議覆直𨽻九府內除廣平大名二府逺處京南均無旗莊坐落毋庸置議外其餘七府所轄有旗莊坐落者共計七十七州縣衛廣袤約二千餘里其間旗民雜處賢愚不等地方有司既無約束旗人之責而理事同知一員又難稽查周遍皇上特頒諭旨差遣官員専辦旗人之事仰見聖慮周詳籌畫至當臣等伏查八旗册報旗莊坐落處所一州一縣之內有一二處以至百餘處者即一村一莊有二三旗分之人居住者亦有祇地畝坐落而無旗人居住者又有此州縣旗莊雖多而界址實與别府州縣地相輻輳者若分旗分府則該管之員難以辦理臣等酌量旗莊之多寡復計地方之逺近約以三百里內外分作一路共為八路以順天府屬之通州武清香河寶坻及天津州與所屬之靜海永平府屬之玉田七州縣為京東路順天府屬之宛平良鄉房山淶水易州涿州新城雄縣容城定興安肅十一州縣為京西路順天府屬之大興順義三河薊州平谷密雲懷柔昌平延慶九州縣衛為京北路順天府屬之固安東安永清霸州保定文安大城河間府屬之任邱保定府屬之新安安州髙陽十一州縣為京南路順天府屬之遵化州永平府屬之豐潤遷安灤州盧龍樂亭昌黎撫寧山海衛九州縣衛為京北東路宣化府屬之宣化懷來萬全保安赤城延慶六州縣為京北西路河間府屬之河間肅寧獻縣交河景州南皮滄州青縣故城正定府屬之衡水武強深州十二州縣為京南東路保定府屬之清苑蠡縣博野滿城完縣唐縣望都定州祁州正定府屬之無極獲鹿順德府屬之沙河十二州縣為京南西路每路派官一員到彼専管莊屯旗人之事臣部行文各部院并八旗揀選賢能司官旗員保送帶領引見恭候欽點八員分路前往辦理并將應行事宜臣等詳議六欵一各路所轄莊屯有內務府及各王公莊頭并八旗廢員以及旗員之子弟家人其中賢愚固屬不等然設官分職原以奬善而疸惡官斯職者當仰體皇仁教誨禁約使之開導洗革以化其澆凌之積習今此八路所派之員應令蒞任後即將所屬地方居住旗人查明住址户口行業如有來厯不明多事不法之人潛匿旗莊者即行驅逐其餘莊屯力作之家有安分循良各務本業者奬之翼之以使其益勵或有遊手好間不務夲業者懲之戒之以期其必改更于農隙之時宣揚聖諭廣訓發其彛良漸歸淳朴小事則按法究治大事則據實揭報他如户婚田産以及命盜案件有關民事者仍聽地方有司辦理并將所屬地方居住旗人村莊户口行業造具清册報部查核此派往之員如果能于一年任內實力奉行無忝厥職令直𨽻總督并巡察御史出結保題交部議敘倘有多生事端擾害旗民者亦令直𨽻總督并巡察御史查參交部議處一各員所轄旗莊大約廣袤三百餘里而旗人雜處各村若不按屯計户設立屯目鄉長分任防間糾舉勢難稽查管轄臣等伏查直省州縣原設有保正甲長分任防間今既設官専辦旗人之事似應倣佛保甲之例不計旗分佐領苐以屯住之旗人酌量以若干户口設立屯目一名再合附近各莊村更設鄉長一名統轄各令其于屯鄉之內互相防間遇有不務恆業酗酒賭博夜聚曉散及來歷不明蹤迹可疑者目長立即糾舉以聽該管官員分别處置其目長作何分别設立揀選充補并各目長如何分别奬賞懲罰之處俟各員蒞任後詳議到日再議一所派各員既責以董率旗人必須給與關防以資文移往來之用應咨禮部按照以上八路鑄給管理某路某莊事務官員關防字樣關防至年滿更換之期接受掌管仍將伊任內經手案卷交代明白報部查核一查各員所轄地方或係莊屯稠密或係地方遼濶必須設立書役以資文移驅策臣等酌量每員設立書吏二名差役八名其所需工食銀兩照直屬額設夫役工食數目在于司庫按季支給仍造入奏銷册內報部查核一派往各員除伊夲身品級應得俸銀外其於任所亦須量給養亷之項查雍正四年十二月內奉上諭欽差各處一年更換之員令其馳驛其一年內如何使其不至拮據之處交部查議具奏經兵部議覆照依該員品級按日支給廪給口糧等因奉旨依議欽遵在案今八路派往各員自京城起身蒞任路不甚逺毋庸馳驛其一年內食用似應照例按各員品級日支廪給口糧總於司庫照數撥給仍造入奏銷册內報部查核一各員俱係新設之員必須設立衙署令其駐劄應令直𨽻總督酌量各路所轄適中地方查有入官房屋酌計應需間數咨報撥用如所轄適中之地方並無入官房屋其作何賃房居住之處應令直𨽻總督妥議到日再議奏入奉旨依議旗莊等處設立官員乃立法之始必得賢能之人實心辦理訓導有方始有益于人心風俗兹所差往之員著該管大臣于所屬內揀選保舉差往之後仍著保舉之大臣留心訪察倘差往之員或不能稱職或在地方生事而保舉之大臣據實參奏者免其誤保之處分若不參奏經朕訪聞發覺者將保舉之大臣一併嚴加議處十一年直𨽻總督李衛疏報直屬文安大城香河通州三河武清寶坻寧河薊州玉田豐潤任邱青縣靜海滄州南皮等十六州縣秋禾被水所有入官地畝據布政使王謨查明應蠲租銀請照民地錢糧一例蠲免奉旨該部議奏尋户部議覆以佃種官地者向無減免租銀之例况民業官地原有分别而納糧交租亦有不同是入官地租未便與民糧一例蠲免臣等酌議請將入官地畝租銀比照民地蠲免錢糧分數遞減以應納之租銀作為十分如被災十分者準免租銀五分被災九分者準免租銀四分被災八分者準免租銀二分被災七分者準免租銀一分其六分以下者不作被災分數應令直督將被災官地應蠲租銀另行確查造具妥册題報奉旨依議十二年題準八旗地畝坐落直屬州縣為數浩繁片段錯落非逐細勘丈無由知其確數而該佐領下領催人等貪圗私取租銀勾連地户將餘出地及絶户地隱匿不報亦有佃戶因無業户取租乘機隱漏認為已業者更有隱匿年久竟認為懇荒首報納糧者此非經管人員不能悉其界址底裏令八旗都統各委參領一人于農隙時會同州縣清丈所有餘地及絶户地案照肥瘠酌定租數交地方官徴租彚解户部倘有恃強阻撓勘丈者理事同知會同地方官審理嗣後凡有報出絶户之地一面報部一面委官勘明交地方官徴租十三年奏準園頭牲丁壯丁人等所有賞給當差養家房地本不應違例典賣苐彼此授受相沿已久倘不勘明撤回在園頭人等固當差乏資若概行撤回又恐鄉愚失業今令逐細詳勘如係紅册內所開載之地即屬官物此不論紅契白契或典或賣均係應行撤回如非紅册內所開載之地則夲為私業不應強撤其典賣在册房地如用紅契即係經官授受之項應追給全價免其治罪如用白契則為私相授受應治其罪此項交易其在康熙三十九年清撤以前者應給半價亦免治罪其在康熙三十九年清撤以後者與受同罪并不應給價矣以上典賣房地有册內册外應撤不應撤之分有典契賣契紅契白契之别撤時又有應追價不應追價應治罪不應治罪之殊應遣京堂官內務府總管率賢能司員直督再委道員會同前往徹底清釐其應行追價給還民人者分别追償仍將地畝數目四至村莊造具印册四本一存夲州縣其三本呈夲部內府並該督以備稽考欽定八旗通志卷六十三
