body:
  text: 欽定四庫全書欽定八旗通志卷六十三土田志二土田規制畿輔規制二雍正元年至十三年雍正元年諭曰口外地方遼濶開墾田地甚多将京城無産業兵丁移駐於彼殊為有益著古北口提督定議再著總理事務王大臣等㑹同該部詳議具奏尋議准将在京八旗滿洲䝉古驍騎内選熟諳農務者八百名前往熱河喀喇河屯樺榆溝三處開墾六年十月巡察順天永平宣化三府監察御史苗夀等奏稱直属近畿州縣不論旗民均編保甲奉行在案惟是旗荘圈賞投充地畝冊貯内府及户部凡各州縣查閲原檔例應申請咨部轉行知照往返需時臣等歴據民人控告旗荘強霸不結之由總因檔案未易清查州縣官雖知隠佔情弊不便懸斷以致旗荘益得恣行兼併仰懇皇上敕下内務府宗人府八旗都統其内府大糧荘頭及内府官兵投充當差人等現在實有地畆由内務府查明實數并坐落州縣鄉村名下地段四至造具清冊咨送户部其親王以下閑散宗室以上荘頭及包衣官兵投充當差人等地畆由各府属管領佐領查造清冊其覺羅八旗荘頭及官兵投充人等地畆由該旗查造清冊此冊務湏一様二夲一留户部存案一由部轉咨直督發布政司照造清冊鈐發州縣與民糧地清冊一同存貯嗣後有旗民互争之案檢冊查對不難勘丈訊㫁再此内帯地投充人户有隠地數頃或數十頃者亦應徹底清晰難容遺漏請照民人之例勒限一年准其據實首明該管處除本身現在當差地畝之數記檔咨送外餘地另冊報部題明仍著輸租當差以正賦額其有隠匿不報及不實指坐落四至等弊一經查出所隠餘地照例入官仍嚴加議罪將查送之官一併交部議處至此項檔冊頒發以後每年不無移換應扵嵗底由两翼税課司彚報户部咨行各属知照記檔户部議覆應如苗夀等所請得㫖允行七年諭曰八旗地畆原係旗人産業不准典賣與民向有定例今竟有典賣與民者但相沿已久著從寛免其私相授受之罪各旗務将典賣與民之地一一清出奏請動支内庫銀照原價贖出留在各該旗給限一年令原業主取贖如逾限不贖不論本旗及别旗人准其照原價承買八年諭曰近畿各府有八旗荘屯雜處其間有司難扵清查且八旗罷黜之廢員及不能上進之子弟與多事不法之家人往往潜住其中結交逰手好閒之軰妄行生事或好勇鬦狠或酗酒賭博或與百姓争訟告訐輾轉不休以致風俗日漸澆凌難以整理雖有理事同知一員亦相隔甚逺不過詞訟到案一為判斷而已平時則無稽查約束之功也朕意欲扵旗員及司官内遴選賢能者八員派往各府有荘屯之地方専辦旗人之事時加教誨申明禁約導其善念革其邪心小則分别懲戒大則據實糾㕘其有旗民互相争訟之事仍聴該管衙門審理此差往之員以一年為期更換一次果能實心辦理化導有方一年内所管之處無旗人犯法之案将該員與以議叙倘或怠忽廢弛因循瞻頋或擅作威福多生事端著直𨽻總督與巡察御史即行㕘奏從重議處其如何分晰管理及如何定例之處著該部詳悉妥議具奏户部議覆直𨽻九府内除廣平大名二府逺處京南均無旗荘坐落毋庸置議外其餘七府所轄有旗荘坐落者共計七十七州縣衛廣袤約二千餘里其間旗民雜處賢愚不等地方有司既無約束旗人之責而理事同知一員又難稽查周遍皇上特頒諭㫖差遣官員専辦旗人之事仰見聖慮周詳籌畫至當臣等伏查八旗冊報旗荘坐落處所一州一縣之内有一二處以至百餘處者即一村一荘有二三旗分之人居住者亦有祇地畝坐落而無旗人居住者又有此州縣旗荘雖多而界址實與别府州縣地相輻輳者若分旗分府則該管之員難以辦理臣等酌量旗荘之多寡復計地方之逺近約以三百里内外分作一路共為八路以順天府属之通州武清香河寳坻及天津州與所属之静海永平府属之玉田七州縣為京東路順天府属之宛平良鄉房山涞水易州涿州新城雄縣容城定興安肅十一州縣為京西路順天府属之大興順義三河薊州平谷宻雲懐柔昌平延慶九州縣衛為京北路順天府属之固安東安永清霸州保定文安大城河間府属之任邱保定府属之新安安州髙陽十一州縣為京南路順天府属之遵化州永平府属之豐潤遷安灤州盧龍樂亭昌黎撫寧山海衛九州縣衛為京北東路宣化府属之宣化懐来萬全保安赤城延慶六州縣為京北西路河間府属之河間肅寧獻縣交河景州南皮滄州青縣故城正定府属之衡水武強深州十二州縣為京南東路保定府属之清苑蠡縣博野滿城完縣唐縣望都定州祁州正定府属之無極獲鹿順徳府属之沙河十二州縣為京南西路每路派官一員到彼専管荘屯旗人之事臣部行文各部院并八旗揀選賢能司官旗員保送帯領引見恭候欽㸃八員分路前往辦理并将應行事宜臣等詳議六欵一各路所轄荘屯有内務府及各王公荘頭并八旗廢員以及旗員之子弟家人其中賢愚固属不等然設官分職原以奨善而癉惡官斯職者當仰體皇仁教誨禁約使之開導洗革以化其澆凌之積習今此八路所派之員應令蒞任後即将所属地方居住旗人查明住址户口行業如有来厯不明多事不法之人潜匿旗荘者即行驅逐其餘荘屯力作之家有安分循良各務本業者奨之翼之以使其益勵或有㳺手好閒不務夲業者懲之戒之以期其必改更扵農隙之時宣揚聖諭廣訓發其彛良漸歸淳樸小事則按法究治大事則據實揭報他如户婚田産以及命盗案件有闗民事者仍聴地方有司辦理并将所属地方居住旗人村荘户口行業造具清冊報部查核此派往之員如果能扵一年任内實力奉行無忝厥職令直𨽻總督并巡察御史出結保題交部議叙倘有多生事端擾害旗民者亦令直𨽻總督并巡察御史查㕘交部議處一各員所轄旗荘大約廣袤三百餘里而旗人雜處各村若不按屯計户設立屯目鄉長分任防閑糾舉勢難稽查管轄臣等伏查直省州縣原設有保正甲長分任防閑今既設官専辦旗人之事似應彷彿保甲之例不計旗分佐領苐以屯住之旗人酌量以若干户口設立屯目一名再合附近各荘村更設鄉長一名統轄各令其扵屯鄉之内互相防閑遇有不務恒業酗酒賭博夜聚曉散及来歴不明踪跡可疑者目長立即糾舉以聴該管官員分别䖏置其目長作何分别設立揀選充補并各目長如何分别奨賞懲罰之處俟各員蒞任後詳議到日再議一所派各員既責以董率旗人必湏給與闗防以資文移往来之用應咨禮部按照以上八路鑄給管理某路某荘事務官員闗防字様闗防至年滿更換之期接受掌管仍将伊任内經手案卷交代明白報部查核一查各員所轄地方或係荘屯稠宻或係地方遼濶必湏設立書役以資文移驅策臣等酌量每員設立書吏二名差役八名其所需工食銀兩照直属額設夫役工食數目在扵司庫按季支給仍造入奏銷冊内報部查核一派往各員除伊夲身品級應得俸銀外其於任所亦湏量給養亷之項查雍正四年十二月内奉上諭欽差各處一年更換之員令其馳驛其一年内如何使其不至拮据之處交部查議具奏經兵部議覆照依該員品級按日支給廪給口糧等因奉㫖依議欽遵在案今八路派往各員自京城起身蒞任路不甚逺毋庸馳驛其一年内食用似應照例按各員品級日支廪給口糧總於司庫照數撥給仍造入奏銷冊内報部查核一各員俱係新設之員必湏設立衙署令其駐劄應令直𨽻總督酌量各路所轄適中地方查有入官房屋酌計應需間數咨報撥用如所轄適中之地方並無入官房屋其作何賃房居住之䖏應令直𨽻總督妥議到日再議奏入奉㫖依議旗荘等䖏設立官員乃立法之始必得賢能之人實心辦理訓導有方始有益于人心風俗兹所差往之員著該管大臣扵所属内揀選保舉差往之後仍著保舉之大臣留心訪察倘差往之員或不能稱職或在地方生事而保舉之大臣據實㕘奏者免其誤保之處分若不㕘奏經朕訪聞𤼵覺者将保舉之大臣一併嚴加議處十一年直𨽻總督李衛䟽報直属文安大城香河通州三河武清寳坻寧河薊州玉田豐潤任邱青縣静海滄州南皮等十六州縣秋禾被水所有入官地畝據布政使王謨查明應蠲租銀請照民地錢糧一例蠲免奉㫖該部議奏尋户部議覆以佃種官地者向無減免租銀之例况民業官地原有分别而納糧交租亦有不同是入官地租未便與民糧一例蠲免臣等酌議請将入官地畝租銀比照民地蠲免錢糧分數逓減以應納之租銀作為十分如被災十分者准免租銀五分被災九分者准免租銀四分被災八分者准免租銀二分被災七分者准免租銀一分其六分以下者不作被災分數應令直督将被災官地應蠲租銀另行確查造具妥冊題報奉㫖依議十二年題准八旗地畆坐落直属州縣為數浩繁片段錯落非逐細勘丈無由知其確數而該佐領下領催人等貪圗私取租銀勾連地户将餘出地及絶户地隠匿不報亦有佃戸因無業户取租乗機隠漏認為已業者更有隠匿年久竟認為懇荒首報納糧者此非經管人員不能悉其界址底裏令八旗都統各委㕘領一人扵農隙時㑹同州縣清丈所有餘地及絶户地案照肥瘠酌定租數交地方官徴租彚解户部倘有恃強阻撓勘丈者理事同知㑹同地方官審理嗣後凡有報出絶户之地一面報部一面委官勘明交地方官徴租十三年奏准園頭牲丁壮丁人等所有賞給當差養家房地本不應違例典賣苐彼此授受相沿已久倘不勘明撤回在園頭人等固當差乏資若概行撤回又恐鄉愚失業今令逐細詳勘如係紅冊内所開載之地即属官物此不論紅契白契或典或賣均係應行撤回如非紅冊内所開載之地則夲為私業不應強撤其典賣在冊房地如用紅契即係經官授受之項應追給全價免其治罪如用白契則為私相授受應治其罪此項交易其在康熙三十九年清撤以前者應給半價亦免治罪其在康熙三十九年清撤以後者與受同罪并不應給價矣以上典賣房地有冊内冊外應撤不應撤之分有典契賣契紅契白契之别撤時又有應追價不應追價應治罪不應治罪之殊應遣京堂官内務府總管率賢能司員直督再委道員㑹同前往澈底清釐其應行追價給還民人者分别追償仍将地畆數目四至村荘造具印冊四本一存夲州縣其三本呈夲部内府並該督以備稽考欽定八旗通志卷六十三
