body:
  text: 土田志四土田規制畿輔規制四乾隆二十八年至五十六年二十八年八月奉上諭上年因八旗回贖旗地積至一萬餘頃之多降旨令户部會同內務府及八旗大臣定議以三四千頃安設莊頭餘俱賞給八旗作為恆産苐念此項田畝雖係旗人世産現在貧民耕種日久藉以資生若改歸莊頭於傭佃農民未免失業所有分設莊頭管理之處不必行其如何按則交租並酌定章程著交軍機大臣會同方觀承詳悉妥議具奏是月大學士公傅恆等議奏此項贖回地畝向係農佃承種交租相沿已久若撥出三四千頃安設莊頭農佃未免失業今奉恩旨停其分設莊頭不特為八旗籌久逺之謀并為小民資食力之計睿慮所及至周且偹惟是已經贖回田畝一萬餘頃并現在據臣方觀承已辦未贖者尚有一千餘頃此項地畝原屬旗人收租世産其租數目本有舊額非官租地畝可比今經官收贖並不安設莊頭仍令原佃耕種已屬我皇上格外天恩若歲入過薄將來賞給八旗作為恆産既不足以資生計况減其租額在小民亦未必能沾實惠徒使不法吏胥因緣牟利適以滋其侵漁中飽之弊臣思地土本有髙下其嵗入租數之多寡自有一定舊額現在贖回地畝向來各該業主每畝所收若干雖無從一一查核而各該處田畝之前後左右自必有現在旗民執業取租地畝應即按照各鄰近田畝租數一體徴收以復舊額但佃户輸租業主往往有因循拖欠或銀色低潮未必能按期清楚既經地方官徴收報解例應年清年欵而庫平庫色亦較諸業主所收不無少異臣等公同商酌應於額租內量為酌減核計佃户所出添平補色之數仍與原租相仿在佃户適符其向來應交之額有減無增而吏役亦無從借端滋弊如此辦理庶為允協然使悉委諸各州縣地方官查辦恐仍有頑佃串通書役掩飾租數抵換地畝情事相應請旨特派大臣前往會同臣方觀承督率道府大員逐一履畝查勘按其地址繪造魚鱗清册並將租額分别上中下則實數填注册內造為二分一送總督衙門一送户部以憑查核所有每年租銀應如何解交及偶遇水旱不齊如何酌量分數分别蠲緩之處統令會同熟籌妥議至此項地畝查辦已經數年既欲徹底清釐勢不能刻期竣事應令隨時隨地陸續經理總以租額悉符其舊吏役不致中飽而承佃小民均能共安耕作以仰副我皇上豢養八旗恩恤小民之至意至於將來歸清帑項之後應如何分賞八旗屆期户部奏明請旨會同八旗大臣再行詳悉定議可也奉旨依議著派英亷錢汝誠會同方觀承查辦二十九年三月英亷等奏先辦順屬西路暨保定府易州一帶臣等于未經起程之先即商令各州縣另造租册咨到八旗查詢原業原租取結送部以憑核對臣現由涿州辦起以原收租數之多寡與所勘地畝之厚薄並參以鄰地之數三面酌定其中茍有租與地不相稱者即摘出詳查以免弊混總俟八旗原業出結到時仍逐細核對其大概相符者毋庸置議其參差懸絶者即就實在情形據册酌量更定再查地土肥瘠今昔屢有不同有從前薄瘠從經培植灌溉遂成膏腴者有地本肥饒後經河水衝壓轉成瘠薄者此種地畝似應就現在之肥瘠酌定不得執原租之數過於拘泥致農佃互有偏枯奉旨知道了四月英亷等又奏臣等謹就此次二十一州縣所勘實在情形互相比較大約容城蠡縣土沃民稠四鄉平衍種植棉花者十之七八獲利尤倍完縣安肅定興易州淶水五處土質腴潤約略相等亦有種棉花者此七邑均可稱為上産清苑滿城雄縣唐縣髙陽新安房山七處雖間有低窪鹻薄之區而大段仍屬肥澤新城亦屬豐沃偶有沙地尚宜種桞頗資器用此八邑地居其次至於涿州良鄉大興宛平四州縣肥瘠各相參雜望都率多鹻地安州則近河者低窪鹻薄稍髙者土性緊燥此六邑又其次也非特各州縣地畝不侔即一鄉一村之中農佃勤惰滋培厚薄及土壤之肥磽種植之良楛亦種種不同臣等每到一處即檢閲圖册逐一履畝對勘相其土宜訪之輿論以酌復租數務期旗民均霑渥澤胥吏無從髙下其手此外别有一種地土甚沃租數甚輕詢其原委又非先瘠後肥之故蓋緣官贖旗地係按照契載年限減價其在十年以內者仍照原價給與十年以外者即減十分之一以次遞算至五十年外者止給半價取贖逮既贖之後率以贖價之多寡擬租數之輕重如贖價一兩即定租一錢大約以十分之一取租自有回贖以來俱照此辦理所有地本腴而租數甚輕至隴陌相連肥瘠毫無區别而租數則多寡懸殊以有減價與不減價之分遂至判然迥别若不量為更定未免畸輕畸重臣等查明原典價值之多寡詳細酌定使租與地相稱庶足垂為凖則今西路二十一州縣地畝共五千一百二十二頃零俱查辦已竣計此路從前所徴租數九萬二千餘兩今臣等酌復租銀約四萬兩統計十三萬餘兩另單進呈奉旨依議七月英亷等又奏臣等會勘順屬南路并河間天津兩府屬二十州縣大約寶坻武清東安三河土壤腴潤任邱雖北靣近淀而地多平沃頗宜禾稼此五邑居上霸州河間交河肅寧南皮雖間有低窪鹻薄之處大段仍多膏澤通州香河地亦相等此七邑為次至於固安永清濵河多沙保定大城大半瘠薄文安地勢卑如釡底受水最多滄州青縣靜海較文安雖覺稍勝亦緣河水環周積成薄鹻此八邑又其次也此十二州縣共地四千六百三十八頃三十五畝零臣查與西路情形稍遜是以原徴租數亦較西路為輕統計原租五萬五千一百餘兩今臣等酌復租銀約三萬五千餘兩統計共九萬餘兩再查直屬六十五州縣所有回贖旗地已勘三分之二其餘州縣計本年開徴前均可勘畢即照酌定租數徴收奉旨知道了九月英亷等又奏臣等會勘順屬北路並宣化永平遵化四旗喀喇河屯等府廳州屬二十四州縣除宣化縣續回旗地三十七畝零本年被水衝去二十畝零下剩十七畝零亦逼近洋河現被沙水衝刷不堪耕種應暫行除租外所有二十三州縣大約玉田豐潤樂亭土壤腴厚萬全地勢髙衍保安得河水灌溉地多肥沃此五邑最上薊州遵化平谷懷來延慶間有山坡及沙窪之地而大段仍屬肥潤灤州盧龍遷安撫寧臨榆昌黎地方相等四旗喀喇河屯巖谷環周肥瘠參半此十三處為次至於昌平赤城順義懷柔密雲多有沙窪大半瘠薄此五邑又其次也此次所勘二十三州縣共地四千七百七十四頃十畝零原徴租銀五萬四千八百四十一兩零臣等酌復租銀三萬六千二十九兩零統共徴銀九萬八百七十兩零臣等合計前兩次所有六十五州縣共地一萬四千五百三十四頃六十二畝每年應徴租銀三十一萬五千四百九十二兩零於本年秋成後一體徴收解交藩庫彚總解部再查口外多山田有平地山坡之分平地較肥腴惟山坡片段偏斜所得雨澤不能存潤遇大雨則又土隨水溜閲數嵗後土盡沙留多至磽瘠不可耕佃民往往棄置名為拋荒請嗣後官地有似此者地方官詳報道員親勘加結由總督咨報除租不致日久有佃户包賠之弊又查民人承領官地納租有名者曰佃户承種官地交租於佃户者曰花户花户實出租銀而官册則無名佃户不必親耕而彚租交官仍可嵗食其餘潤向來情形大率如此臣等悉為徹底清釐凡一人名下實種若干仍令耕種其分給各花户地畝俱按名確查逐細填明更正不使稍有含糊從此花户得自納租于官永不為佃户所侵漁而佃户亦惟自食其力斷不能以花户為囊槖不特弊端釐剔凡屬貧民皆得普沾皇上惠養黎元之大德矣奉旨依議英亷等又奏此次二十四州縣凡有分佃之花户姓名一一填注册中從前含混影射之户已一概刪除應令地方官照册抄録按名分給執照每人照內將村名地數及每畝徴租若干共銀若干細數總數開寫明白俾愚民易曉而􅠕胥蠧役亦無所施其增減移灑之術各佃遇有事故實在不能耕種者準其呈明地官官另行召佃承種不得私相授受致滋弊端其有私行典賣者照盜賣官田律將售主與典賣之人均嚴加治罪仍將地畝撤回以上情節俱詳載照中立法周密共知共曉至前二次所勘亦照此一體給照永逺遵奉再此項租銀應如何蠲緩之處查旗地租息向無寬免之例嗣於雍正十二年督臣李衛題請比照民地蠲免經户部議以旗租與民糧不同應照民地遞減如被災十分者準免租銀五分被災九分者準免租銀四分被災八分者準免租銀二分被災七分者準免租銀一分其六分以下者不作被災分數今此項租銀應照舊例辦理倘遇有勘不成災應暫行緩徴并分年帶徴之處俟臨時酌量情形分别奏請奉旨依議三十四年十月奉上諭此後入官地畝停止旗員查丈定租之例著照所議行至於舊案令地方官于一年限內自行詳查酌復原租由府道藩司轉詳該督覆核咨部之處尚未妥協此等入官旗地厯年久逺地方官原定租額時大率不能詳核者多若仍令伊等自行查改難保無回護徇情朦混草率諸弊或僅將不能掩飾者舉出更正一二處仍屬有名無實自應特派幹員通行履畝會勘確核方為徹底清釐之道著户刑二部㨂選明幹滿漢司官各四員其餘各部揀選滿漢司官各二員交户部帶領引見候朕簡派前往會同府尹及各該府秉分悉心查辦三十五年六月奉上諭據竇光鼐奏請嗣後撲打蝗蟲凡民人佃種旗地之户令理事同知飭諭各莊頭一體撥夫應用一摺所奏近理已交該部照所請速行矣地方遇有捕蝗之事凡屬旗地皆當與民佃通力合作共相佽助即內務府所屬大糧莊頭亦應一體派撥若自以旗莊遽欲免差則如江浙紳襟田畝亦將倚恃宦户規避一切役使可乎且按地派夫捕蝗仍以護其田地豈有聼其置身事外獨任民夫代為撲捕之理此事向來直𨽻作何辦理著交總督即速詳查據實覆奏又奉上諭前據竇光鼐奏民人佃種旗地之户請一體撥夫撲蝗一摺因其所奏近理即批交部照所請行並諭地方偶遇捕蝗不獨旗佃與民田通力合作即大糧莊頭亦應一體派撥其直𨽻向來作何辦理著楊廷璋查明具奏及派往捕蝗之侍衛索諾木䇿凌等回京詢其實在情形據稱所到之處不獨旗佃出夫辦公即王公所屬旗人亦悉力協捕等語旋據該督奏覆自方觀承任內設立護田夫一項不拘旗民均令出夫現仍照舊辦理近京旗民交涉事件在國家初定鼎時或有旗人強占民地及將各項差派専委居民承辦者今閲百數十餘年屢經整飭政紀肅清無論旗莊各户不敢不安分守法即王公大臣亦不敢怙勢庇佃欺壓平民自圖詭避差役而國家法在必行又豈肯聼其縱越禮法稍為曲徇乎朕辦理庶務一秉大公至正中外臣民宜無不共見共知即此事之是非曲直適就前後事理為衡斷並未嘗預設成心而竇光鼐偏謬邀名之隱微亦不能逃朕洞鑒特為明白宣示十二月户部疏言內務府管理三旗銀兩莊頭處所屬投充莊頭現在三百六十五名伊等名下地畝自數十畝至一百餘頃不等定例每畝徵銀三分草一束折銀三分每畝共交銀六分其錢糧莊頭現在一百四十八名領地多寡不一定例每畝交銀一錢一分一釐一毫但錢糧莊頭與投充莊頭並無定額其地畝如有存退餘絶薄鹻沙壓者該莊頭呈報到日派員會同地方官查勘確實準其退交州縣收存徴租解交廣儲司銀庫遇有莊頭子弟情願充當者仍行文户部轉行地方官取回應用奏準在案但查各莊頭所退之地多係薄鹻沙壓既已退交地方官招民承種徴租解部已與莊頭無涉小民開墾三五年或有淤成上地者而又被莊頭弟男子侄指稱承領揆之情理實有未當應請嗣後所有退圈地畝概不準撤回安放莊頭永逺交地方官招民承種徴租解部此內如有淤成膏腴之處交地方官查明量增租銀徴解如此立定章程莊與民兩無干涉庶爭訟之端不禁自息矣奉上諭向來內務府所屬莊頭每有因地畝薄鹻沙壓呈請退交另換者此等地畝莊頭等久經撥定當差伊等承充有年沾被恩惠不少設或地有肥磽年有豐歉即加功墾闢亦分所當然乃因有退交之例動輒藉口瘠淤紛紛呈請殊屬非理使其地果不可耕治何以交官後一招民種復為沃壤若在莊頭則漸成蕪廢在小民則馴致膏腴其勤惰已可慨見而以農氓墾荒為熟之地仍得任莊頭等換回奪民之業而坐收其利于情亦未平允且伊等恃有此例或與佃户等交好即退出交官藉減租數或覬覦上産而以所授之田揑報求換貪得無厭因而滋生事端種種情弊皆所不免嗣後各莊頭所種地畝概不準其退交其中果有誤差不能充當莊頭者即著內務府大臣查勘確實另與能承種者承當莊頭三十六年七月大學士劉統勳等議覆裘曰修查奏宛平縣流石莊左近荒地情形臣等伏查該處拋荒之地頃畝頗寬沙壓鹻耗之餘遂成間廢然或因惰農怠於力作或係業户習為因循以致耕墾久虛漸同曠土此皆八旗恆産棄之既為可惜而蕪蔓不治蝻孽易滋其貽害於農田者尤甚自不可不設法經理但如裘曰修原奏令各業户量減租額並借給牛力耔具誠如聖諭恐啓刁佃藉端勒掯及熟後復行逃棄之事而原奏所議一年後若仍復拋荒查出即官為辦理不許田主復行管業之處復蒙聖諭以伊等産業何必輕令入官其或實係磽瘠低窪毋寧讓地於水仰見我皇上體恤下情無微不到而因勢籌度期無流弊之至意臣等公同酌議該處田畝髙下厚薄形勢既屬不同且自王公而外兼有旗員旗人産業多寡亦復不一應請交八旗都統及順天府會同查明地畝細數令各業户酌量地土情形或可施工耕熟仍種麥禾或應開溝撤去鹻氣復成沃壤或栽種菜蔬及雜樹苜蓿總期地不拋荒永杜生蝻之患令其各赴該都統處報明知照順天府存案聼其自行經理其果係沮洳低下之區人力難施者業户雖有分田而墾藝實無善䇿本屬無可如何且地勢既窪當夏秋漲盛潦行往往艱于瀦泄與其荒棄生蝻水無所納莫若事歸核實因地制宜應令該業户即將不能承辦情形赴該旗具結呈明仍行知照順天府勘明該處地形繪圖呈覽酌量開挖泡子俾水有所歸地無虛棄既杜蝻孽之萌兼淂宣畜之利實為一舉兩得其開挖泡子應交何處辦理臨時再行請旨遵行所有順天府屬各州縣及他府州所屬有旗地與此相似者並交八旗會同地方官查明照辦奉旨依議此項開挖泡子低窪田畝雖荒蕪已久在業户原不能收藝穫之利但伊等究未免少此産業殊堪軫念著加恩將應行開挖之地查明畝數交户部于官贖旗地及入官地畝內酌量減半抵給俾得耕種取租足資永業以示體恤再此項地畝僅交八旗都統及順天府承辦不足以専責成著派裘曰修英亷武納璽専司其事前往該處查勘實在情形詳悉分别辦理具奏又議準留京當差之新滿洲官兵按其差使等第撥給地畝由畝給租頭等二等侍衛各應得十名壯丁地三等侍衛藍翎侍衛護軍校驍騎校各應得八名壯丁地護軍前鋒親軍司鞍司轡各應得六名壯丁地披甲拜唐阿馬上人各應得五名壯丁地俱按原定每畝租銀一錢五分之數減半折給其乾隆三十六年定例以前舊撥地畝係照地管業者仍聼自行收租係退地折領租銀者亦照伊等次減半折給其折租地數如留京一年內升轉者以升銜計一年外升轉者仍以原銜計此後再有升降不另增減每嵗十二月為支放租銀之期令該旗預行造册咨部屆期派員赴領户部於直𨽻省徴解旗租內動欵發交該旗散給三十八年十月奉上諭所有八旗應追各種賠欠之項有查家産變抵者有於本身及子弟等俸餉減半坐扣者其間情節不同若係侵虧貪黷及案情較重者自應勒限嚴追若係分賠代賠攤賠之項其事屬因公情莭亦輕原可量為寬減且有應追之數甚多而所得俸餉有限扣至百十年不能完清者更屬有名無實著軍機大臣會同該部詳晰確查分别妥議具奏三十九年五月户部議奏從前八旗人等遇有拖欠公項願將本身地畝報抵入官者照認買公産之例按租作等按等定價伏查乾隆四年召買公産時所定等則原屬租重價輕每畝取租三錢以上者價銀一兩六錢作為頭等取租二錢以上者價銀一兩二錢零作為二等取租五錢以上者價銀九錢零作為三等取租五分以下者價銀六錢作為四等所以副皇上惠養八旗之意至旗人未完官帑將地畝議價入官抵項與認買在官地畝情莭本不相同似應租價相當辦理方為允協且地畝情形今昔逈異今户口蕃滋人多田少地價頓增數倍若亦照從前按租作等之例實有原買千金之産以之抵帑不及十之五六者既令竭力完帑之人倍形拮據而帑項亦仍有抵無完應請嗣後八旗官兵人等凡有將地畝報抵入官者無論典買均有原置契據應令將原契原價并原佃原租各數逐一據實呈報由旗查詢確實造册送部臣部一面行文該旗寬其追限一面行文直𨽻總督委員履勘咨覆臣部為計租定價統以一分三釐之息為斷如所報地畝其租銀得一百三十兩者準其抵帑一千兩租銀得二百六十兩者準其抵帑二千兩以次增加除算毋庸按租作等按等作價以致輾轉牽掣致多偏畸奉旨所奏是依議四十四年正月奉上諭近以八旗贖回入官老圈地畝從前俱準八旗官員兵丁認買後不肖之徒有偷行典賣與民人等弊始改為不準官員兵丁認買俱官為取租今旗人生齒較前有加此項地畝倘仍官為取租必致旗人産業漸少于伊等生計大無禆益是以降旨將官為贖出入官老圈地畝加恩仍準官員兵丁分買交户部八旗詳悉定議具奏今復詳為籌畫八旗人丁浩繁此內有家奴者固多而無家奴者亦復不少其認買地畝若離京稍近尚易於取租倘或在數百里之外必又紛紛告假取租不惟徒費資斧又起民人勒掯之端其地租能否全得尚在未定而每月反將所得錢糧先行坐扣地價於伊等生計反無禆益實不能仰副朕愛養旗人之至意朕意不如將此項地畝仍官為取租將每年所得之租解送户部分給八旗賞賚兵丁如此辦理既不費伊等之力而錢糧又毫無坐扣且年終多得租銀數兩於伊等生計更為有益著交户部八旗將如何均勻分給當差勤謹生計貧乏兵丁之處務須仰體朕愛養旗人至意熟籌詳議具奏是月户部等議伏查户部現存八旗回贖入官等項地畝共三萬八百餘頃內除解交內務府圓明園太常寺等處公用租銀並滄州兵餉祭祀各地畝及莊頭一項地租留支新滿洲官兵人等之用共地二千一百餘頃又恩賞屯户網户等項地一千六百七十四頃四十餘畝均應照舊存留外計共應賞租銀地二萬七千餘頃應行遵旨分賞八旗者計租銀三十九萬七千五百餘兩查八旗滿洲蒙古漢軍及內務府上三旗各旗應領餉銀自四千一百餘兩至一萬七千三百五十餘兩不等以三十九萬七千五百餘兩租銀按照各旗所領餉銀核計每旗應分銀數自六千二百五十餘兩至二萬六千四百餘兩不等所有應行領賞兵丁內除田地在二頃以上及住房之外現有取租鋪面房産者均以有産論概不得濫給外其貧乏兵丁都統等嚴飭各參佐領管領驍騎校領催族長等秉公確查實在應行領賞者開造花名細册出具印甘各結保送該都統總管內務府大臣等會同查旗御史一併查核其在京如護軍前鋒火器等營貧乏兵丁應行領賞者應由該都統等辦理其在圓明園健鋭營等處當差兵丁雖分駐各處其有無産業該旗俱有檔案可稽亦應由該都統等一並確查造具清册咨送各該營辦理至兵丁內有勤謹當差者無論有無産業俱準領賞在旗則由該都統等查辦在營則由該管大臣查辦其勤謹與貧乏仍不得互相重復以致冒濫其所賞銀數應按兵丁本身現食錢糧數目加一倍賞給如有辦理不公徇情冒濫等弊該管大臣都統御史等即行嚴恭領催族長等照例治罪至每年額徴租銀如有應行蠲免者即於分賞銀內按數開除其有緩徴并民欠應令總督將本年實徴若干解部分賞其緩徴民欠租銀入于下年一併分賞如此辦理則八旗兵丁普沾實惠永沐皇仁實於生計大有禆益奉旨依議謹案前項官地二萬七千餘頃每年共徴租銀四十九萬七千五百餘兩內應扣銀十萬兩作為地價奏內租銀三十九萬七千五百餘兩係應行賞給兵丁之數經户部夾片聲明二月奉上諭內務府莊頭因拖欠錢糧革退本係獲罪之人轉因接辦之莊頭以人多不能養贍內務府大臣請將伊等之兄弟子孫放出為民令其自謀生計雖係照例議準日久不能保無流弊莊頭等或因圖出旗自便故意拖欠錢糧罪止革退而其子孫轉得為民仍可倚以自贍日後并可考試幸登仕籍皆情理所必有不可不防其漸嗣後凡獲罪革退之莊頭其家屬有呈請為民者除疏逺族户準仍照舊例辦理外其本身及子孫俱應發往打牲烏喇充當苦差以示懲警四十五年十一月遵旨查得官贖收典旗地自乾隆二十二年起至二十七年共贖回地一萬八千餘頃共用過地價銀二百三十八萬自二十三年徴租起至四十三年止每年租銀不等共徴過租銀六百七萬八千七百七十餘兩除歸還贖地原價銀二百三十八萬兩零外多餘銀三百六十九萬兩零經直𨽻總督陸續奏用修理城垣普蠲經費被災賑濟等項動用外實存司庫用剩旗租銀八十九萬兩零是月奉上諭朕從前有旨將直𨽻旗租銀仍賞給八旗兵丁經部議挑選兵丁中差使勤慎者賞給兩月錢糧以示鼓勵今思一人得兩月錢糧亦不能立家産不過隨手花費而不得賞者未免向隅且分别挑選該管官員不無瞻徇出入之弊殊非朕普惠八旗之意此後著將直𨽻解到銀兩足敷普行賞給八旗兵丁一月錢糧時該部即奏聞普賞一次是月户部議四十四年分應徴租銀四十九萬四千八百餘兩現據該督除民欠未解銀十萬五千八百餘兩實解到三十八萬八千三百餘兩足敷普賞一月錢糧之數俟命下之日臣部行文各旗赴部支領此後每年應令該督於徴存候解時將徴收實數先行報部臣部核明足敷普賞之敷即行具奏報聞四十八年二月奉上諭據順天府奏稱圓明園正白旗滿洲護軍八十三成泰德泰因爭控地畝私寫呈詞封交莊頭劉希賢擲與香河縣知縣轎內等語護軍八十三等身係旗人遇有爭控地畝之事自應在該佐領處具呈察辦否則在該管大臣或提督衙門及部院具呈無不可者乃任意寫呈交給莊頭擲與知縣有是理乎旗人地畝俱在州縣所管界內似此互相效尤紛紛在各州縣具呈於旗人體制殊有關繫八十三等著革退護軍交刑部定擬具奏嗣後旗人如有控告地畝事件在各該佐領處具呈察辦倘該旗不行辦理即在該部提督衙門具呈若案內有牽連之民人由部行文嚴察辦理自能查辦明白如此曉諭之後仍有在地方官處控告者除將具呈之人從重治罪外該管大臣官員等嚴行議處斷不輕貸又尚書額駙福隆安等議奏據尚書德福疏稱八旗官兵人等置買房地向例俱在兩翼監督衙門納稅注册給與印契執照其民人置産則在大宛二縣納稅發給司頒契尾近年因旗下家奴有置買房地恐家長知覺潛赴大宛二縣納稅請領契尾以致旗員中互相效尤竟有隱瞞旗籍在縣投稅之事請嗣後無論官員及間散家奴置買房地者概令呈明該管佐領在左右兩翼監督衙門納稅過契倘仍有取巧赴大宛二縣私稅民契者以違制論官員交部議處間散家奴鞭責發落仍令在兩翼監督衙門補稅换照如大宛二縣知情私準納稅者亦交部議處等語應如該尚書所奏嗣後旗人買地概令呈明該佐領在兩翼監督衙門納稅過契並令步軍統領衙門會同順天府府尹不時稽查如有隱匿旗籍私向大宛二縣納稅者立即參究如此示禁不特旗民房地不致混淆而詐冒之弊亦可杜絶矣奉旨依議五十年二月奉上諭直𨽻所屬各州縣厯年報荒旗民各項地畝共一萬二千餘頃今據該督勘明可墾地僅八百餘頃而難墾者竟有一萬一千二百餘頃此內大抵旗地居多蓋由旗人不能自行出資幫貼墾種而民人又以本非己産不肯多出工本開墾成熟輸納租息以致荒廢甚多殊於地利可惜户部議令該督將查明可墾難墾一切旗民地畝分晰造册并取具該道府親勘印結送部查核在地方官不過具文塞責仍屬空言無補著交部派賢能滿漢司員數人劉峩亦宜派出賢能道員數人專司其事詳悉履勘通盤籌畫此項地畝如果有人墾復或酌計所費工本約值幾年租息俟所入足與工本相抵後再令輸租或竟將所得租息令與旗人按畝均分過幾年工本足後再令交租本主俾農民有利可圖自必踴躍從事盡力開墾則荒地積漸成熟庶旗人益多恆産而地畝不致拋荒民人亦得有地可耕方為妥善其應如何設法籌辦之處並著該部會同劉峩詳議具奏户部議奏直屬原報官荒地一千二百三十六頃旗荒地五百五十三頃除民房占用地基與有主墳地俱應徴租外實淨存難墾官旗荒地共一千七百八十七頃內查出可墾官荒地三百四十三頃旗荒地一百四十二頃俱于難墾中擇其尚可試墾者召民認墾按照八年限滿交租但土性有髙低不齊所需工本又多寡不一若概以八年限滿即令輸租農民終觀望不前臣等公同商酌有近年偶被沙壓與老荒之地不同者毋庸定以年限有稍帶鹽鹻沙磧然施工較易者仍照八年限滿成例徴收租息其有鹽鹻沙壓略重及傍山瀕河草根蟠結施工較難所費倍多恐民力未免竭蹶應于八年外加展二年俟正展限滿今地方官勘明情形酌定租數將官租分别徴收旗地給還原主並令墾地之佃民永逺承種使有力之徒不得從中覬覦以開增租奪佃之弊再查天津靜海二縣可徴草地一百七十二頃地近海濵鹽鹻較重不能播種五榖雜糧而長生蘆草皆屬有用之物自當照水草科則以收自然之利又交河縣有減租地六十八頃委因地瘠租重以致佃民無力承種應令該地方官酌減租數報部其餘各項荒地除官占道占廟占與堤桞所占及無主荒墳各地共十二頃零應令各州縣竟行開除報部存案奏入奉旨依議所有各州縣厯年報荒官旗各項地畝經此次派員履勘查辦即查出可墾地八百餘頃分别年限名墾輸租於旗民均有禆益足見從前荒廢地利地方官不實力查辦所致但恐此後地方官日久因循又復視為具文日漸廢弛仍屬有名無實著交該督董率所屬認真辦理愷切勸諭務令小民踴躍從事以期沃壤日增至地利轉移無定有此時可耕而日後或至水沖沙壓者或此時難墾而日後漸成膏腴者並著該督隨時察勘於此次查辦後續有可耕者若干續行報荒者若干於每屆年終彚奏一次以專責成是年奉上諭據山海關副都統寶琳奏從前原賞山海關旗員地畝內餘地三十八頃有餘每年差兵收取糧石多有遲延不給者向交該處地方官轉催嗣後請將此項糧石竟交地方官催齊變價暫存本署由副都統處按季出結支領所有口外冷口喜峰口二處地畝亦請一律辦理等語所奏是此項地畝原為旗人養贍之資若遲延不給於旗人生計有礙與其該處副都統差兵收取自不若即令地方官催交完納但直省於旗人地畝租息之事漠不關心多不肯實力辦理已成積習著傳諭劉峩所有此項地畝應照寶琳所請竟交地方官催繳變價按季解交山海關副都統收貯仍嚴飭承催之員如有姦民托故遲延不行完納者即嚴行查辦毋得稍存回護將此傳諭劉峩并寶琳知之五十四年五月奉上諭前因直𨽻各州縣應徴旗租舊欠未完新欠又有二十餘萬之多其中保無官吏挪移情弊降旨令劉峩留心密訪據實具奏兹據該督奏稱緣佃種旗地之户家本貧寒收成豐稔尚可按期完納一遇水旱不齊動致拖欠不清而地畝鹽鹻拋荒佃户逃亡亦所時有此數年積欠之故實由於此等語各州縣應徴旗租或因水旱不齊致有拖欠自當分别緩帶以紓民力而清欵項若果田畝鹽鹻拋荒則其地已不能耕種租從何出至佃户逃亡如實因地不能種逃至他所者即應奏請豁免如係無力承種出外營生亦應另行召墾何以並不確查妥辦惟事按年經徴試思地已拋荒小民何能交納若如該督奏請著落地方官依數賠繳似此年復一年伊于何底各省應徴地丁正項錢糧如係實欠在民朕尚加恩豁免從不令地方官賠繳焉有因積欠旗租轉令代為賠納耶各州縣給豫廉俸尚動稱不敷辦公借端侵缺若復令賠繳旗租將伊等更得有所藉口殊屬不成事體且朕軫念黎元凡遇旱潦偏災無不立豫蠲賑雖千百萬帑金從不稍存靳惜豈有地畝既荒尚令小民賠納租銀更非朕體恤閭閻之意但地方大吏從前何以未經奏明恐各州縣有影射虗揑延宕侵挪等弊不可不徹底清查著派侍郎伊齡阿管幹珍于朕啓鸞後前往詳細履勘如係實在田畝鹽鹻拋荒佃户逃亡因而拖欠者即據實奏明候朕降旨酌豫豁免如查係地方官謊詞揑飾希圖影混侵蝕者即當恭奏治罪此等丈量地畝之事朕向來不肯輕易派員前往查辦以免擾纍今直𨽻各州縣積欠旗租如果佃户逃亡所有應徴租銀自無從追納並非地方官徴催不力之咎豈有令常年賠繳之理朕此次特派大員前往查辦者係為愛民起見朕既不忍纍民又豈肯纍官伊齡阿等務宜秉公辦理以副朕曲加體恤核實清釐至意伊齡阿等遵旨履勘覆奏臣蒙聖恩派往直省清查回贖地畝是否鹽鹻拋荒以致佃户逃亡各確情臣當將已經查過州縣及有荒地之交河青縣滄州三州縣地畝並非鹽鹻情形先行具奏後即將未經查辦之安肅清苑蠡縣滿城完縣定興涿州良鄉昌平順義密雲等州縣次第查核俱照前次辦理章程弔集各該縣經徴紅簿逐欵核對抽傳佃户隔别詢問除已經徴收外尚有未完銀兩均係實欠在民並無侵蝕情弊至各州縣除武清淶水二縣係偶被水沖已堪耕種照額交租毋庸查辦外其交河青縣滄州南皮等四州縣惟南皮縣有堤占沙壓地四頃三十五畝實係不堪耕種先經户部議準應令除租扣算至交河滄州青縣荒地前經奏明其土性稍為瘠薄實非鹽鹻查其拋荒之故因包攬交租之人於豐收之年貪圖餘潤一遇荒歉種地小户輒以交租有人逃避他處包租之人無從取租即以逃亡具報欲更招他户則以現有官欠又復相率觀望不敢承認積年既久遂至拋荒臣已靣飭各該州縣務於附近居民確實招認並將從前無著租銀已經官為賠補不致貽纍承認佃户即偶遇災歉一經奏聞無不仰邀聖主深仁隨時恩緩明切張告家諭户曉俾小民咸知踴躍承認至包租之人永逺除禁倘再有偷竊包攬無論有無拖欠即行嚴拿究處以杜流弊種佃小民自行交納既免包租剝削而逐鄉逐戶地方官亦易確查如此則地畝不致無故拋荒該州縣亦不能藉端影射請交該督嚴飭各屬一體遵照辦理庶錢糧可以年清年欵不復有積欠之弊矣奉旨依議五十六年十二月户部疏言乾隆五年原任直𨽻總督孫嘉淦奏明八旗地畝無論何旗之人承買仍令原佃承種其租銀照舊收取不得分外需索如本佃抗租及業主實欲自種許其呈官查辦若無欠租情事揑稱自種撤地另佃增租者審實治罪等語臣部遵辦在案惟查圈占之初地廣人稀租種者少是以每畝議租三五分至一二錢不等亦有每年僅交柴草牲畜等物不復議給租銀者近年以來生齒日繁每畝現值租銀五六錢至七八錢不等若仍舊概照原議收租則佃户反得以輕租承攬而以重租私自轉佃與散户鄉民旗人雖明知此種情弊因礙於成例不敢增租而無地可種之户又不敢奪佃且旗人收取租銀在旗告假不過一月又必咨明兵部請給路引勢難違限久待每遇惡佃知有限期設法支延及屆假滿略為給與而於往返盤費反多賠纍以致業主情急將地畝出售逮另易買主各佃恃有不許奪佃成例仍前掯勒竟將旗人世受之産轉為佃户霸占漁利之資既未足以昭平允且易起爭訟之端應請嗣後凡民人佃種旗地如租額平允業佃相安仍聽照舊承種交租若因當日原佃交租本輕現有别佃情願增租及情願自種者均由業主自便所有從前不許增租奪佃之例即行停止倘有刁佃把持妄控者即照例治罪如此則旗民各得其安而爭端庶可漸息矣再查帶地投充各户其初既免完糧又得種地且服役有年本與户下家奴無異今伊等種地日久緣無定例多有不服本主傳喚抗不交租者及其主將地轉售又復藉稱投充掯地不交殊與情理未協嗣後凡投充人丁地畝請照旗下圈地家奴典賣悉由本主自便則辦理更可畫一奉旨知道了以上畿輔規制欽定八旗通志卷六十五
