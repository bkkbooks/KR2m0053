body:
  text: 欽定四庫全書欽定八旗通志卷一百五十人物志三十大臣傳十六滿洲正黄旗四勒愛星阿珠布舒庫沙納哈麻吉安瑚伊桑阿喀齊蘭穆占巴琿岱愛星阿子富善愛星阿滿洲正黄旗人姓舒穆禄額駙揚古利孫也順治四年襲父塔瞻一等公八年世祖章皇帝追念揚古利功加給愛星阿三等輕車都尉俸尋授領侍衛内大臣十六年大軍征雲南明桂王朱由榔與其黔國公沐天波等奔緬甸其晉王李定國奔孟艮鞏昌王白文選奔木邦世祖命呉三桂移平西藩屬鎮雲南十七年三桂疏請發兵入緬滅由榔以除邊患愛星阿奉勅為定西將軍與都統卓羅果爾欽遜塔䕶軍統領畢力克圖費雅思哈前鋒統領白爾赫圖等率禁旅㑹同三桂進征十八年九月督兵次大理秣馬逾月出騰越州取道南甸隴川猛夘十一月至木邦擒白文選所遣之副將馮國恩訊知李定國走景線文選與定國不睦屯兵錫箔江濵愛星阿令白爾赫圖費雅思哈果爾欽遜塔畢力克圖等先簡精鋭疾馳三百餘里至江濵文選已毁橋遁走茶山大軍繼至結筏以濟别遣總兵馬寧沈應時追剿文選愛星阿同三桂領兵趨緬先是三桂屢檄諭緬人令擒獻由榔緬酋莽猛白盡殺由榔從官沐天波王維恭馬吉翔魏豹等數十人宻使人防守由榔謀生擒以獻十二月大軍次舊挽坡離緬城六十里緬使人詣軍門請遣兵百人薄城愛星阿遣白爾赫圖率前鋒百人進次蘭鳩江濵復令畢力克圖等率䕶軍二百居後䇿應緬人聞大兵將薄城以船載由榔與其親屬及故從官妻女獻之軍前時文選為馬寧等追及於猛養度不能脱率衆數千降定國竄死猛臘康熈元年奏㨗聖祖仁皇帝優㫖嘉奬諭以所俘獲委三桂區處愛星阿振旅還京仍為内大臣加少保兼太子太保増紀軍功於世襲一等公勅書三年二月卒恩䘏其家白金三千兩賜祭𦵏如典禮諡敬康子富善襲一等公爵十九年授領侍衛内大臣三十五年二月聖祖以噶爾丹背約肆逞分路進討命撫逺大將軍費揚古出西路親統大軍出中路富善領鑲紅旗兵隨御營駕駐沙河諭富善曰古北口一路兵衆以爾統率所過城池村舍遵朕法令毋絲毫擾累其有以捕獸馳騁竭馬力者並飭禁之四月駕駐西巴爾臺離噶爾丹所居之克魯倫河計程五日議者謂宜俟西路兵㑹剿富善奏言西路兵至尚遲恐賊聞風逃竄即以中路兵剿賊未為不足宜乘其不備速擊之奏入稱㫖命仍進征克魯倫河㑹噶爾丹知上親征盡棄其廬帳器械潰竄上已宻諭費揚古等絶其歸路先整兵特勒爾濟口以待陣斬二千餘級噶爾丹僅以身免厄魯特部衆千餘來降上乃命班師每行營閲選駝馬徵輸芻粟富善承㫖以行咸當上意叙功加太子太保嘗扈蹕至㑹岐口有疾上親臨視賜醫藥四十七年卒賚白金二千兩遣官經紀其喪予祭𦵏如典禮以其子海金襲一等公雍正八年勅建賢良祠愛星阿富善並入祀乾隆元年追諡富善曰恭懿布舒庫父納爾泰布舒庫滿洲正黄旗人姓呉魯父納爾泰任佐領世祖章皇帝順治六年隨征大同叛鎮姜瓖率其子噶爾琿納什庫力戰殁於陣恩䘏如例布舒庫其長子也於順治五年任䕶軍校隨征南大將軍譚泰征江西叛鎮金聲桓攻饒州府先登克其城十五年隨征南將軍卓卜特征明桂王朱由榔由廣西進貴州濟師盤江敗之於梁瑞津其餘衆屯踞山隘我兵環山圍攻布舒庫首衝敵陣奮擊斬殪甚衆師至雙河口其晉王李定國以數萬衆列柵山巔布舒庫先衆踰險而上遂奪其寨定國復列象陣來犯布舒庫率衆力戰逐北四十里雲南平凱旋予雲騎尉世職聖祖仁皇帝康熈二年授㕘領十六年二月擢正黄旗䝉古副都統列議政大臣時逆藩呉三桂賊黨韓大任等據吉安簡親王喇布奉詔剿賊日久未下特命布舒庫同都統勒貝䕶軍統領哈克三㕘賛軍務韓大任等尋自吉安潰圍遁據寕都布舒庫率兵至永豐與提督趙賴合師計以三路進攻值大任等來犯布舒庫同趙賴發礟擊之賊退據山寨布舒庫督兵圍攻賊衆由山徑下衝我兵兩路截擊賊敗歸山寨布舒庫緩師以誘之賊弗敢出相持月餘賊夜遁布舒庫率歩兵追及之斬賊千餘級擒其偽㕘將王朝斌偽軍師萬象羅等賊走泰和萬安竄入福建十七年正月布舒庫同哈克三追剿大任擊賊於福建老虎洞鞍子嶺斬賊六千餘級分遣𠫭將李天柱等由七嶺隘口奪闗而進斬偽官五追擊至天花山大陂嶺賊窮蹙適康親王傑書遣布政使姚啟聖招撫大任乞降布舒庫同哈克三旋師隨簡親王與征南將軍穆占㑹師於湖南互詳哈克三傳七月呉逆犯永興水陸道阻穆占奏遣布舒庫率兵携礮同署副都統尼雅翰駐守永興河岸以禦之賊黨胡國柱馬寳等以衆三萬來犯布舒庫擊郤之及賊潰圍解布舒庫同穆占進攻耒陽偽將軍呉國貴夏國相等敗遁十八年二月進定常寧布舒庫同前鋒侍衛塔勒岱屢擊賊於白水市蔡家店大春橋桂山斬馘甚衆進追至翟里橋賊擁衆拒敵我兵衝擊之擒其偽㕘將守備各二距永州四十里與穆占合師進攻永州城賊夜渡湘江燒桴橋而遁乃分遣總兵蔡元等收復新田寧逺道州永明江華東安各城先後招降偽總兵李魁李福管世雄陳邦賢等偽官三百餘旋令陳邦賢率所屬兵與㕘將王因俊攻廣西全州擊賊於飛鸞橋克其城進定興安又分遣别將收復灌陽恭城富川招撫萬陽山偽總兵郭世隆呉漢興等還定新寧與簡親王合軍於武岡九月鎮南將軍莽依圖規取雲南疏請調兵防守廣西詔簡親王率師駐守桂林仍以布舒庫㕘賛十九年正月調正黄旗滿洲副都統三月降鎮馬承廕復叛布舒庫隨簡親王與將軍莽依圖總督金光祖分路進剿六月克雒容縣合攻桞州府馬承廕降七月布舒庫以疾卒於軍櫬還上遣大臣迎奠茶酒賜祭𦵏如典禮諡剛壯沙納哈沙納哈滿洲正黄旗人姓伊爾根覺羅世祖章皇帝順治六年由閒散隨敬謹親王尼堪討大同叛鎮姜瓖攻克左衛城先登第一賜號巴圖魯予騎都尉世職九年遇恩詔加一雲騎尉十三年署㕘領隨寧海大將軍伊爾徳征浙江舟山至定海縣同副都統根特擊敗偽英毅伯阮思等偽總制陳六御率衆來犯沙納哈同副都統柯永蓁擊郤之追至衡水洋斬六御等遂取舟山十四年九月叙功晉世職三等輕車都尉十六年海賊鄭成功犯江寧沙納哈隨安南將軍逹素等往征比至賊已遁移師福建十七年由同安剿賊於厦門沙納哈仍署㕘領率兵為前隊乘船進戰失利面項中二矢退回尋還京聖祖仁皇帝康熈元年論厦門水戰捨舟登陸罪應革巴圖魯號及三等輕車都尉以受傷重免籍沒鞭責得㫖給還騎都尉四年授駐防西安佐領九年三月尚書科爾擴岱侍郎逹哈塔等奉命閲大草灘邊界至西安沙納哈呈告自十六嵗披甲十九嵗從征大同得功後屢署㕘領因獲罪降職不得照原品補用乞代請回京遇出征之處効力科爾擴岱等以奏下部議准令還京十年二月授㕘領十三年三月逆藩耿精忠叛應呉三桂沙納哈時隨大軍駐防兗州詔移軍江西沙納哈兼署前鋒㕘領七月耿逆偽都督易明引賊四萬餘犯撫州沙納哈領右翼前鋒兵合諸軍擊之斬賊二千有竒九月賊由建昌府來犯定南將軍希爾根令率前鋒兵百㑹兩藍旗兵擊賊斬獲甚多十月叛鎮楊富之弟偽將軍楊三盤據許灣之偽總兵李茂著合賊萬餘掠撫州平㓂將軍哈爾噶齊令沙納哈領八旗前鋒兵同䕶軍統領瓦岱等進攻斬級四千餘楊三李茂著俱中箭溺水死十四年正月隨安親王岳樂進兵瑞州時賊陷上高賊衆萬五千據瑞州之㑹浦沙納哈率頭隊兵同䕶軍統領桑額奮擊之追奔二十餘里生擒偽官十餘賊兵百餘斬偽總兵朱一典謝以泰及偽軍師李姓滕姓等恢復上高偽都督阮國棟聚二萬餘賊據新昌縣北山沙納哈同諸將進剿斬賊四千擒偽副將㕘將各一千總三及賊兵五十餘新昌亦平十五年二月安親王剿呉三桂之偽將軍夏國相李良棟等於袁州之萍鄉縣賊據城東来龍山髙阜立寨十二掘壕築壘以待大兵分四隊環攻賊敗潰沙納哈率前鋒兵截殺之賊兵一萬三千得脱者僅四百國相等尋棄印劄軍械而遁十八年二月進兵湖南湘潭縣賊望風郤走復其城三月遷正黄旗蒙古副都統七月擢前鋒統領八月夏國相偕賊黨呉國貴王永清王宏勲等據武岡州之雙井堡偽將軍馬寳張祖法等擁賊二萬四千與大軍相拒沙納哈領前鋒兵三百進擊賊勢披靡追剿至楓木嶺賊皆逺竄二十年擊走偽將軍線緎於盤江西坡進征雲南駐營歸化寺逆孽呉世璠遣偽將軍劉圯龍胡國柄等驅賊兵列象陣相抗沙納哈偕諸軍擊敗之追至城下陣斬胡國柄劉圯龍及偽總兵九員生擒六百餘人是年雲南平隨大軍凱旋二十三年五月調䕶軍統領十二月擢正黄旗䝉古都統尋列議政大臣二十六年正月因病解任四月卒賜祭𦵏如例子尚徳襲騎都尉麻勒吉麻勒吉滿洲正黄旗人姓𤓰勒佳先世居蘇完有逹邦阿者當太祖高皇帝時來歸麻勒吉其曽孫也世祖章皇帝順治八年定滿洲䝉古與漢軍漢人分試之制麻勒吉以繙譯取中舉人明年㑹試第一名殿試一甲一名授修撰十年五月上諭吏部曰修撰麻勒吉同庶吉士教習有志向學兼通滿漢文義其氣度亦老成遇侍讀學士缺即行推補於是遂授宏文院侍讀學士十二月擢宏文院學士十二年始設日講官以麻勒吉同學士胡兆龍等充之旋同學士禪岱胡兆龍李霨教習庶吉士時編纂太祖太宗聖訓又詔刪訂歴代通鑑並充副總裁十四年九月充經筵講官時偽秦王孫可望赴經畧洪承疇軍納欵詔封為義王麻勒吉充正使偕副使胡兆龍竒徹伯齎勅印至湖南遂擕可望入覲初麻勒吉與直𨽻總督張元錫同官學士有年及使還遇於順徳呵辱之元錫憤懣是夕引佩刀自刎不殊巡撫董天機取其手疏入奏有上官過客苛索凌虐語上遣學士哲庫訥侍郎霍逹等往察其事元錫復疏言正使麻勒吉於候迎時面斥失儀又責以前此南行不一出迎且云在南方時洪經略日有饋遺何等盡禮臣當使臣啟行時方往閲登萊海汛勢難舍未竟之事來而復往其苛求已可槩見又副使竒徹伯索臣駝驘臣因賄賂干禁不與其蓄怒自難解釋此臣所以引佩倉皇也疏入得㫖張元錫以總督大臣輕生自刎必有逼廹情由朕早鑒及故特行詳察覽奏具悉實情麻勒吉等奉命出使敢於逼廹大臣任意妄行深負委任之恩九卿科道㑹勘從重議處元錫尋以集質至京讞未竟宿於僧寺自縊死九卿等以麻勒吉胡兆龍竒徹伯沿途受饋復借端苛索逼總督自盡均應革職籍沒議奏詔從寛削加級追奪誥敕降二級留任十六年六月上以雲南新闢發帑金三十萬兩分賑貧民命麻勒吉同尚書伊圖左都御史能圖往董其事尋奉命同能圖察奏大軍取永昌後貝勒尚善等縱兵擾民狀為之辯釋十七年四月又奉命同學士石圖往雲南㑹商進剿明桂王朱由榔機宜還奏七月安親王岳樂等覆勘兵入永昌城掠民婦女事得實麻勒吉與能圖並坐徇隠罷任罰鍰十八年正月命以原銜入直七月授秘書院學士康熈三年同學士章雲鷺教習庶吉士五年擢刑部侍郎七年十二月授江南江西總督九年疏言淮揚二府屬丈量虧缺田地有坍沒已久者請永行蠲免嵗賦有新被水淹者暫予停徵又言五月間淮黄暴漲湖水泛溢田畆廬舍被淹者多請以正項錢糧賑濟災民時蘇州松江二府頻遭水患布政使慕天顔議濬劉河淤道二十九里濬呉淞江使復舊規建閘以時蓄洩麻勒吉與巡撫瑪祜疏請以漕折銀十四萬兩充費並得㫖俞允十年四月京口將軍李顯貴鎮江府知府劉元輔為駐防兵丁訐告侵冒錢糧上遣侍郎勒徳洪往勘得實麻勒吉以不先舉發逮問江南百姓赴京籲留給事中姚文然疏述以聞並言麻勒吉情罪輕重尚待確訊宜釋鎖繫得㫖俞允部議應䧏二級調用復得㫖仍回原任八月疏言州縣繁簡不同人才短長各異或才具有餘諳逹吏事而適當簡僻其精神力量無所施展或撫字為懐亷潔自守而驟膺繁劇拮据不逮終於顛蹶請酌行調繁調簡之法俾人地相宜以盡器使之道疏下部議以州縣改調恐開趨避之端寢其事十二年遇計典部院察議麻勒吉復任總督後未見勤勉應降二級調用尋降補兵部督捕理事官十六年命赴簡親王喇布軍招撫叛附呉三桂之孫延齡馬雄等十八年奉詔率兵鎮守桂林先是孫延齡為廣西將軍所轄將士皆舊𨽻定南王孔有徳者及孫延齡為呉三桂從孫世琮所殺其部將劉彦明徐洪鎮徐上逹等率部衆歸順至是詔麻勒吉統轄之麻勒吉奏授彦明洪鎮等都統副都統有差尋以巡撫傅宏烈率兵討賊詔麻勒吉攝巡撫事十九年大兵由廣西進征雲南麻勒吉奉詔籌運軍餉時呉逆偽將軍黄明來降麻勒吉奏請録用詔授援剿總兵黄明仍叛遁詔麻勒吉與偏沅巡撫韓世琦㑹剿麻勒吉尋以黄明為苗人所殺疏報二十一年撤定南藩屬分𨽻八旗漢軍麻勒吉率之還京二十三年授提督九門歩軍統領二十八年三月卒三十七年黄明為貴州㕘將官斌廣西遊擊田國璽等擒獲於大樂山苗峝伏誅部議麻勒吉前此妄報追革原官安珠瑚安珠瑚滿洲正黄旗人姓𤓰勒佳先世居蘇完父阿喇穆任佐領世祖章皇帝順治元年隨睿親王多爾衮入山海闗擊流賊李自成力戰陣亡恩䘏如例予雲騎尉世職以其兄之子錫特庫襲尋卒安珠瑚襲三遇恩詔晉世職至三等輕車都尉任㕘領兼刑部郎中九年隨敬謹親王尼堪征湖南王至衡州率輕騎先進遇賊伏殁於陣安珠瑚時隨貝勒屯齊軍後至聞王戰殁突入敵陣得王屍以還十三年隨寧海大將軍伊勒徳剿海賊於舟山賊敗遁叙功晉二等輕車都尉十八年隨靖東將軍濟什哈剿山東土賊于七擒斬賊黨甚衆聖祖仁皇帝康熈六年擢寧古塔副都統十年増設吉林烏拉副都統調安珠瑚任之時安珠瑚與寧古塔將軍巴海奏遷松花江新滿洲札努喀布克托等各姓户口於所屬境内編四十佐領令札努喀等分轄其衆十七年諭奬巴海暨安珠瑚實心任事撫輯新滿洲户口咸令得所下部議叙晉世職為一等輕車都尉兼一雲騎尉旋擢盛京將軍十九年疏請裁金州巡檢改為金州營設守備千總等官以招徠民户五百餘丁選兵百分習騎射標鎗鳥鎗又請於沿邊展界二十餘里設柵隘口移兵防守疏並下部議行二十一年上詣盛京巡行邊地見立界處枯骨多暴露者諭安珠瑚徧察瘞之二十二年以疾乞休奉㫖安珠瑚自擢用將軍以來惟務邀譽沽名於職掌毫無補益大負委任聞其每向人言願來京師作部院文官為人臣者苟能盡力報稱文武本属一體有何分别且去嵗在圍場與新任副都統通寳角口殊失官箴著革退發往吉林烏拉効力二十四年授索倫總管三十三年卒部臣請以其子安什布襲世職諭曰安珠瑚因素有虚名用為將軍前朕東巡之時安珠瑚奏言臣所管官員兵丁皆藐視臣朕雖知其庸懦無能止革去將軍仍授為索倫總管終不改故轍不能約束所屬之人且自服官以來並無宣力之處所行専務沽名其世職著革去不准承襲伊桑阿伊桑阿滿洲正黄旗人先世居瓦爾喀姓伊爾根覺羅順治九年進士由禮部六品筆帖式授主事聖祖仁皇帝康熈三年授票本員外郎七年授刑部郎中十二年八月遷内閣侍讀學士十月擢内閣學士明年十二月充經筵講官十四年十一月擢禮部右侍郎尋調户部右侍郎十五年十月命同工部尚書冀如錫往視淮揚等處河工十六年四月轉户部左侍郎尋擢工部尚書八月調户部尚書時逆藩呉三桂據湖南詔製鳥船沙船由岳江入洞庭以斷賊糧道因勅伊桑阿赴江南督造明年復偕刑部侍郎禪塔海赴茶陵督造戰艦二十一年淮黄潰決勅伊桑阿往勘兼籌海運事宜伊桑阿疏言黄河運道非獨輸輓天庾即商賈百貨賴以通逹國家在所必治若海運先需造船所費不貲且膠萊諸河淤塞已久開通匪易似屬難行上是其言是年冬俄羅斯犯邊伊桑阿奉命往寧古塔督修戰船明年六月調吏部尚書二十三年四月旱命同大學士王熙等清理刑部繫囚九月扈蹕南巡奉諭閲視海口伊桑阿疏言車路串場諸河及白駒丁溪草堰諸口宜勅河臣靳輔詳閲地勢挑濬深濶使高郵諸州縣减水壩運河水口引流入海上以靳輔督理黄河隄岸勢難兼顧海口命安徽按察使于成龍分董其事二十四年五月調兵部尚書明年轉禮部尚書二十七年授文華殿大學士兼吏部尚書尋充纂修三朝國史總裁官三十五年三月命兼管兵部尚書事六月以臺站馬匹多斃部臣不預嚴飭又不劾奏部議伊桑阿應革職得㫖從寛降三級留任三十六年上親征噶爾丹命伊桑阿往寧夏安設驛站尋同大學士阿蘭泰王熙充平定朔漠方略總裁官三十七年以年老乞休上諭阿蘭泰曰伊桑阿厚重老成宣力年久爾二人自任閣務以來凡事推誠布公不惟朕知之天下無不知者伊桑阿雖以年老求罷朕不忍令去也四十一年復以疾乞休得㫖卿品行端凝才識敏練勤勞嵗久倚毗正殷今以老病乞休情詞懇切准以原官致仕仍著加意調攝以副朕篤念老臣至意四十二年七月卒年六十有六遺疏上得㫖伊桑阿歴練老成効力年久簡任機務鎮静和平實心任職自請告以來尚期優游頤養長享昇平用副眷注忽聞溘逝朕心深為軫悼下部議䘏賜祭𦵏如典禮諡文端今上乾隆十二年同大學士馬齊入祀賢良祠喀齊蘭喀齊蘭滿洲正黄旗人姓伊爾根覺羅先世居瓦爾喀地祖赫臣當太祖高皇帝創業時率族屬來歸即俾轄之為佐領從征烏拉有功奉使葉赫抗節不屈葉赫貝勒錦台什使人害之太祖旋滅葉赫令其子克宜福刃讐人以祭父襲管佐領事天聰四年太宗文皇帝征克明永平以克宜福為捉生將擊敗敵兵生擒二人獲馬十七又為前哨將斬明兵二獲馬一望見敵踞山結營馳還以告太祖遣大臣率兵破之八年彚叙開創以來諸臣功次予騎都尉職世襲㒺替崇徳三年授吏部副理事官六年隨鄭親王濟爾哈朗圍明錦州其城東闗廂之蒙古諾木齊等謀内應為明將所覺圍困之克宜福衝入破敵陣援以出並䕶其家口來歸得優賚世祖章皇帝順治二年授福陵總管兩遇恩詔晉世職三等輕車都尉尋卒喀齊蘭其次子也初由前鋒校襲管佐領授吏部理事官十三年署㕘領隨寧海大將軍伊爾徳剿明魯王朱以海遺黨於舟山屢戰皆㨗凱旋紀功授䕶軍㕘領聖祖仁皇帝康熈十三年任前鋒㕘領隨順承郡王勒爾錦討逆藩呉三桂十八年大軍自荆州渡江克復松滋縣都統根特副都統瑪爾齊哈令喀齊蘭率前鋒兵征澧州將薄城賊衆迎拒喀齊蘭擊潰之轉戰追逐至江岸生擒三人獲纛幟軍械無算城中偽文武官以城降凱旋紀功擢正黄旗䝉古副都統二十一年六月調本旗滿洲副都統二十四年二月以疾乞罷命原品致仕三十八年十月卒賜祭𦵏如例子凱音布初襲克宜福三等輕車都尉世職仕至禮部尚書别有傳穆占穆占滿洲正黄旗人姓納喇先世為葉赫部長天命四年太祖高皇帝征葉赫招降其貝勒錦台什之子徳勒格爾授佐領予三等男爵及卒子南楚襲任䕶軍統領以罪削爵弟索勒和襲穆占為南楚之子初任侍衛兼佐領順治十六年署前鋒㕘領隨都統卓洛前鋒統領伯勒赫圖駐防雲南時沅江土司那嵩作亂大軍剿滅之穆占預有功予三等輕車都尉世職擢正黄旗滿洲副都統康熈十二年冬逆藩呉三桂反聖祖仁皇帝命安西將軍赫葉副將軍瑚哩布由陜西四川進討以穆占署前鋒統領㕘賛軍務十三年二月至陜西聞四川郡邑皆附賊叛鎮譚宏據陽平闗穆占同西安將軍瓦爾喀率兵先驅擊潰賊衆於野狐嶺攻克陽平闗及七盤闗又敗偽總兵石存禮於朝天闗陣擒偽遊擊王道成斬獲無算六月進征保寧叛鎮呉之茂率賊數萬迎拒我軍鑿壕列營與賊相持賊數來犯穆占輙擊敗之十月賊刦我糧艘於略陽又阻截運道於槐樹驛及郿嶺穆占率兵通道屢擊敗賊衆以餉不繼同諸將還駐漢中值陜西提督王輔臣叛於寧羗據秦州平凉與呉之茂譚宏等聯結為㓂穆占隨大將軍貝勒洞鄂還西安十四年二月詔洞鄂征秦州平凉以穆占代赫葉為安西將軍率兵並進偽總兵高鼎聚賊四千於隴州河岸立寨拒守穆占整陣搏戰殱賊甚衆連破賊寨遂趨秦州薄城攻圍賊屢出城抗拒皆督兵戰敗之復擊郤平凉赴援賊衆城中困蹙偽總兵陳萬䇿以城降穆占率兵往助提督張勇圍鞏昌遣陳萬䇿入城曉諭偽總兵陳科亦率衆降乃還㑹大軍征平凉十五年二月上以洞鄂統師圍平凉日久未下遣撫逺大將軍圖海代之六月王輔臣降穆占分剿餘賊於西和清水成縣禮縣收復城邑偽總兵周養民王好問等以慶陽府降九月召入覲授都統品級佩征南將軍印率兵征湖南十六年正月至荆州時順承郡王勒克徳渾守荆州貝勒尚善圍岳州安親王岳樂圍長沙簡親王喇布守吉安穆占奉詔由岳州助攻長沙疏請移江南沙船百餘為水陸夾攻之用詔如所請七月詔移兵㑹簡親王規取衡州永州值呉三桂分遣賊將掠江西穆占移兵袁州秣馬逾月擊郤賊衆之由永新犯吉安者遂進征茶陵逐賊至攸縣陣斬四千餘級生擒百餘人茶陵攸縣安仁􅌕縣永寧俱復十七年閏三月攻克郴州桂陽招降桂東興寧宜章臨武藍山嘉禾永興穆占自駐郴州以都統宜里布守永興四月賊犯永興穆占遣䕶軍統領哈克三前鋒統領碩岱等援之時簡親王尚駐吉安穆占請㫖趣其進征簡親王奏言穆占撤茶陵攸縣安仁之兵還郴州恐賊由永興占據要路江西可虞請勒穆占先滅永興之賊穆占疏辯茶陵等處之兵未撤永興遣兵赴援郴州實為要地請勅簡親王遣將來守臣乃可擊賊永興上命穆占仍守郴州諭趨簡親王進征簡親王乃移駐茶陵穆占疏請調江西提督趙賴隨簡親王部下將軍華善等率兵分守攸縣安仁等處得㫖自穆占至荆州後所奏調遣守禦事宜無不允行今破賊收疆穆占是賴其俱如所請六月賊將馬寳胡國柱并力犯永興我兵戰失利宜理布哈克三皆殁於陣賊遂連刦我營碩岱退入城副都統托岱等引兵還郴州上以穆占分兵防守閒地致永興兵单諭責厚集兵力立功贖罪時簡親王遣前鋒統領薩克察由安仁援永興既入城以賊勢猖獗牒請益兵穆占辭以永興軍事簡親王主之薩克察遣人馳告簡親王遂以入奏上諭責穆占曰凡因茶陵永興諸處軍事所降諭㫖皆署穆占名於簡親王之前今穆占牒稱永興為簡親王之地謬戾實甚自今以往毋分彼此合力剿滅逆賊八月賊將馬寳等聞呉三桂死焚永興賊壘引賊衆還衡州穆占自郴州遣兵敗賊於耒陽十八年二月率兵擊敗賊將郭應甫於常寧招降偽總兵李魁等追擊賊將呉國貴於永州俘斬甚衆復永州道州常寧新田永明江華東安進定廣西復全州灌陽興安恭城時桂林平樂南寧等府已為將軍莽依圖傅宏烈等收復穆占奉詔還定湖南八月攻復新寧十一月上命貝子彰泰為定逺平㓂大將軍以穆占㕘賛軍務十九年二月督兵擊敗賊將呉應麒等復沅州進征貴州十月至鎮逺賊將張足法楊應選宵遁復府城追剿逸賊復偏橋興隆二衛進定平越貴陽並遣兵收復安順石阡都匀等府二十年正月賊將高起隆夏國相王㑹王永清張足法楊應選等擁衆二萬餘於平逺西南倚山立寨穆占同提督趙賴率兵衝擊高起隆等敗竄王㑹率所部降遂復平逺分遣副都統莽奕禄遊擊王成功等追剿逸賊擒斬偽巡撫張繼堅復大定府楊應選率衆降穆占隨彰泰進征雲南上以貴州苖蠻雜處疆土新復命穆占旋師鎮守尋因彰泰請仍命隨征雲南十月合廣西四川兩路兵攻雲南城三桂孫世璠自殺偽將軍線域等出降彰泰令穆占同都統馬齊入城籍賊黨屬擒偽大學士方光琛等磔於軍門雲南平凱旋授正黄旗䝉古都統列議政大臣二十二年三月議政王大臣等追論穆占征保寧時奏軍事不實征平凉時不臨陣指揮後在郴州推諉不救永興應處絞籍沒奏入得㫖穆占雖有罪其勞績亦多罷任革世職餘罪寛免是年疾卒年五十有六巴琿岱巴琿岱滿洲正黄旗人一等侯伊爾徳孫父托和齊任三等侍衛早卒順治十八年巴琿岱襲一等侯授散秩大臣康熈十九年擢正黄旗䝉古都統二十一年調正黄旗滿洲都統二十七年湖廣裁兵夏逢龍等作亂據武昌攻漢陽上命巴琿岱為荆州將軍與振武將軍瓦岱等率師進討師至武昌逢龍棄城遁追至黄州降偽總兵趙得等擒逢龍於黄岡磔之三十年五月疏請於駐防滿兵内每旗派百名學習鳥鎗得㫖允行十一月復任正黄旗滿洲都統三十五年三月上親征噶爾丹増設每旗火器營大臣以巴琿岱管領正黄旗授議政大臣尋定中路營制命隨皇五子允祺率正黄旗兵以行五月駕至克勒和朔以噶爾丹遁班師命平北大將軍馬斯喀選輕騎追襲巴琿岱與都統齊世武等㕘賛軍務㑹西路撫逺大將軍費揚古已破噶爾丹撤兵還九月扈蹕巡北塞巴琿岱領右翼兵三十六年正月命與都統蘇努等偵噶爾丹諭以整肅戎行勤恤馬力閏三月遣大臣往擒伊拉古克三呼圖克圖分兩路進命㕘賛馬斯喀軍務十二月廷議以巴琿岱不急追伊拉古克三呼圖克圖應革議政大臣及都統仍留侯爵得㫖從寛留任四十年擢領侍衛内大臣四十五年命往内扎薩克㑹盟四十八年正月上以廷臣舉奏皇八子允䙫召見諸大臣詰先舉者為誰其時領侍衛内大臣阿靈阿散秩大臣鄂倫岱侍郎揆叙尚書王鴻緒私議保舉廷臣不即舉出巴琿岱言是日宣㫖後臣等奏立皇太子事闗係重大臣等何敢舉奉諭爾等在行間俱能効命今正効命之日不可稍有隠諱於是臣等班坐㑹議衆欲舉允䙫遂同入奏並無首先發言之人上曰爾等所舉皆同大可疑矣必有倡首之人着作速詳查舉奏巴琿岱復奏臣等集坐一處並無倡首之人上問領侍衛内大臣坡爾盆坡爾盆奏言臣等内巴琿岱先發言額駙尚之隆亦奏巴琿岱發言在先是實上曰朕知之矣此事必佟國維馬齊以當舉允䙫示意于衆衆乃依阿立議耳馬齊奏實不知上復命詳究巴琿岱等奏曰是日奉諭此事着漢大臣盡所欲言臣等見漢大臣舉出允䙫遂同舉是實上復問大學士張玉書玉書奏云㑹議日大學士馬齊先臣到班臣問所舉為誰馬齊曽答云衆意欲舉允䙫上命革馬齊職並詰責佟國維事詳馬齊傳五十一年巴琿岱扈蹕謁孝陵賜銀二千兩雍正元年卒賜祭𦵏如例諡恪恭以第四子馬哈逹降襲二等伯分一雲騎尉與長子巴隆襲欽定八旗通志卷一百五十
