body:
  text: 人物志一百十八循吏𫝊三漢軍鑲白旗漢軍廂白旗外任官白登明白登明字林九漢軍廂白旂人世居遼東葢平順治二年方弱冠以廷試㧞貢生授河南柘城令時鼎革之初疆圉甫定盗賊尚多登明偵擒其魁悉按以法羣盗屏息設條教勸耕讀考最陞江南太倉州知州才益練達剔弊懲奸清糧除耗問疾苦察寃抑尊賢禮士敦孝重節杜滛侈訓儉朴嚴逐優娼禁止師巫善政無不舉海壖民居因亂蕩析登明召沙民開墾遂成村落十年九月海㓂犯劉河堡䦨入内地居民驚沸登明偹禦有方㓂宵遁十六年夏海㓂破鎮江勢猖獗太倉為海隅要衝征剿之師四集雲擾登明鎮静應之民恃以無虞迨㓂由江寕敗回急攻崇明火礮聲連三晝夜城埀破廵撫蒋國柱治丘䇿應無可使渡海先達信者登明乃自駕一艘夜半飛渡叩城攀絙以入衆始知援兵将至守益堅㓂力窮遂遁州水之下流曰劉河歳乆湮塞上江低窪者困於潦本州高亢者復困於旱蓄洩無所資登明相視劉河北支有宋范仲淹新塘遺跡名曰朱涇請於院司開鑿五十里於是蓄洩有濟廵按李森先知其能檄開大劉河六十里復故跡於是震澤東北諸水並得入海為一郡利所属崇明縣民田舊額正課外有蘆課銀一萬三千餘兩一田兩賦力請於院司題請免之州有大蠧吏設法擒而斃之蠧習遂息明於聴㫁鄰邑有疑獄院司恒委令審讞逺邇頌神明焉性骨鯁不媚人有大帥求婚請再三登明薄其人終弗許未幾大帥果以事敗又有大吏按州恣索私賄弗從拂其意欲甘心焉先是㓂棘時廵撫􅊾索剿餉許别項抵補因以雲南恊餉應之大吏即以擅那恊餉紏恭遂至落職未幾大吏以事敗州人以登明在任正薦五紀錄五卓異一保舉要郡太守一又有疏河定亂諸功皆未題敘列治状籲請院司湔洗詿誤復任終弗能得坐廢二十餘年㑹福建有事例許入貲贖詿誤登明貧不能贖縂督姚啟聖廵撫吴興祚素知登明以良吏負屈代為捐贖依例開復補任高郵州甫抵任值諸湖水漲决清水潭堤役繁苦登明設法授食禁吏胥侵尅役夫踴躍堤成名曰永安歳荒請蠲賑勸富民分食全活萬衆明年再荒四野大潦再請蠲賑艤舟救溺饑者予粥病者予藥憂勞盡瘁竟卒於官宦槖蕭然高郵人助資以殮哀聲震野如䘮怙恃太倉士民聞訃亦巷哭設祭於生祠咸謂宜祀於名宦因列名公請於學臣以康熈二十六年四月奉主入祠州人顧士璉嘗佐登明開二河又為著開江書以良法貽後云去太倉任三十餘年民思念不已茜涇鎮民肖其像於三官廟又州城西郊及夀菴沙溪諸處民並建祠祀之白允明白允明字正純登明仲弟少與兄及弟啟明並就傅學舉子業比壮兄以㧞貢得官弟亦補弟子員乃慨然曰國家肇基東土從入関者多以武功翼運今天下雖大定然西南尚有逋㓂依託明藩竊據雲貴侵擾川湖兩廣兵革不息正志士効命之秋也乃習韜鈐精武事允明固長身善射意氣慷慨識者以大器期之順治十二年朝廷以比歳南征失利連損大帥日乆未能奏績勅下八旗簡㧞武畧人材本旗首以允明應詔即授雲騎尉品級章京十五年從安南将軍明安達禮率兵駐防貴州明年移駐荆州十六年七月海賊鄭成功入㓂䧟鎮江𤓰州直犯江寕樓櫓甚盛連八十三營又於上江下江及江北等處分布賊艘阻截要路允明隨明安達禮自荆州赴援八月至江南時鄭成功已為滿漢大兵所破逺颺入海而分布江南北兩岸賊衆猶焚掠蔓延允明随明安達禮以初八日至荻港聞賊船千餘隻越江寕泊三山峽随分兵前進至舊縣地方擊偽都督楊文英等於揚子江口大敗之擒斬偽副将一員獲船隻器械無算㨗疏入告下所司議敘時京口新設駐防将軍石廷柱等竒允明材畧留於京口以防守官補用康熈十年将軍柯永蓁題補本旂叅領十三年逆藩吴三桂耿精忠叛亂海㓂亦乗機窺伺江南京口為重鎮控制江海時三等伯王之鼎來為鎮海将軍蒞官甫数月念中軍副将為全標節制縂㑹甚難其人訪於部曲共推允明遂特疏題補允明感知遇首列状白於将軍言逆藩叛亂人心惶惑江海之防在於戢兵安民以定人心南方初設駐防軍紀未肅兵丁縱營馬踐食田禾甚或放牧學宫士民苦之墓木為民間最珍䕶者營兵貪樵蘇微利髠伐不忌民尤傷心汛守廵江本以譏察非常而兵弁籍以騷擾沿江村鎮塩課上関國計營兵結私梟掗賣引壅不行又私放印子錢剥算貧民追索酷暴至於攘奪並當嚴行禁止而伐民墓木尤重請以軍法從事之鼎悉如所請於是號令一新猶恐属員奉行不力時時親出訪緝又遣親信兵弁四出採捉於是全標凛凜奉法士民歡呼鼓舞以為自設駐防以來未之有也是時南方九省雲擾所在亡命哨聚響應惟鎮江一帶無枹鼓之警允明之力為多至於扣尅餉銀及虛冐籍伍差操累衆諸弊革除必盡故馭衆甚嚴而兵弁仍悦服焉十八年崇明協鎮闕員崇明為縣孤縣海中三沙洄合為海賊入㓂咽喉要地特㫖加允明為都督僉事徃鎮其地二十五年廷議三藩既定海宇乂安旂員任營鎮者並令還京師允明以廣東駐防營員恭領需人特令改補尋以乆居炎方水土不習乞病北歸四十二年卒於家子四人潢仕至大學士洵仕至廣西按察使雍正元年二月子潢遇恩詔贈允明光禄大夫文華殿大學士兼兵部尚書是嵗鎮江士民追念允明駐防時功徳羣請於江南江西縂督查弼納等崇祀名宦祠白啟明白啟明登明季弟康熈十六年由舉人累遷至南安府知府時當三藩變亂田地荒蕪百姓乏食啟明設立義倉借貸救濟捐給牛種俾失業者開墾力耕萬民得甦其男婦之被掠者捐俸取贖使室家完聚兵燹之後家廢絃誦啟明創立義學捐俸延師教習貧士皆得肄業飬教兼舉二十八年陞分廵南贛道詰奸除暴訟簡獄清革除陋規属吏畏威守法贛郡界連閩粤奸宄出没無常啟明嚴飭捕緝民頼以安癸酉甲戌連歳荒歉米價騰貴首倡捐賑請發倉榖平價糶賣民皆頼之贛南兩郡城垣倒塌率属員捐貲修理兼表彰理學修葺道源陽明兩書院諸生肄業其中給以膏火文教聿興五十七年崇祀名宦祠王秉忠王秉忠漢軍廂白旂人順治十八年任南康知府葺白鹿洞書院振起人文賑恤饑民修治橋道在任八年惠政甚多康熈五十年崇祀南康府名宦祠同旂有蕭永芃者康熈三年任四川温江縣知縣甫下車即咨訪地方利弊勸墾荒田掩埋枯骨招集流移期年民盡復業至今稱良吏焉亦崇祀本縣名宦祠李徳耀李徳耀漢軍廂白旂人康熈四年任四川卬州大邑縣知縣自奉儉薄以簡約為政嘗單騎遍閲原野相視水利俾民開濬功不勞而事集無旱澇之患凡先賢祠宇必重加修葺立碑以誌之民思其惠乆而不忘五十年崇祀本邑名宦祠王國泰王國泰漢軍廂白旂人世居奉天葢平縣康熈十二年任福建福州府同知時逆藩耿精忠潜蓄異謀國泰每偵其隂事聞於縂督范承謨尋改泉州同知就遷驛𫝊道㑹耿逆甫平海氛尚熾軍需旁午國泰籌畫有方民以無擾俄泉州告警國泰募壮勇得数千人授以衣糧甲仗率先奮擊賊衆大潰泉圍以觧敘功増秩擢安徽按察使閩人祀之名宦祠張翼鵬張翼鵬漢軍廂白旂人初任筆帖式陞部曹康熈十七年外補福建廵海僉事道時逆藩耿精忠變亂之後兵民雜處翼鵬請於督撫運濟糧糈給房以住兵民得安初永定縣䧟賊男婦離散翼鵬力為安集復五千餘家而龍巖民苦轉輸奸民謀為亂翼鵬單騎曉諭反側始安尋遷廣東分廵副使道閩人思之崇祀名宦祠徐崇禮徐崇禮漢軍廂白旂人由兵部筆帖式知湖廣徳安府應城縣康熈十八年陞許州知州許州地多荒蕪崇禮多方勸墾二三年間盡成熟地又設立義學訓民間子弟月課嚴於論文人材成就者甚多學宫傾坍已乆捐俸修葺焕然一新地有積水所淹者民不得耕種開溝渠使通大河歳大旱露禱日中三日而甘雨降嚴保甲稽察盗賊許有四保一保之民有散處数保者錢糧難於催辦崇禮釐正其籍使保有定處民不散居州人至今感之三十一年卒於官崇祀本州名宦祠同旂黄極者任四川江油縣知縣康熈十九年委署綦江縣印務有惠政未幾離任民咸惜之崇祀綦江縣名宦祠鄢翼明鄢翼明漢軍廂白旂人順治乙未進士康熈二十年以禮部郎中出知汀州府賦性仁慈聴㫁詞訟片言立决囹圄為之空虚時學宫傾圮翼明率僚属及紳士修之後崇祀汀州名宦祠同旂有遲熇者康熈二十一年知四川蘆山縣縣分三鄉明制照里甲定役康熈二十三年編審熇按畝均丁民甚便之遂為成例崇祀本縣名宦祠董守義董守義漢軍廂白旂人康熈二十三年由廕監生任四川達州知州在任期年有兇人手賊叔母假以盗殺訴於州守義察其有異片言摘發其人不能隐竟伏罪州人稱神焉督撫以才能薦居官所至皆有聲崇祀達州名宦祠同旂有胡頊者康熈三十一年任四川瀘州知州清查田賦酌劑維均民利頼之亦崇祀名宦祠楊朝正楊朝正漢軍廂白旂人由侍衛出為東昌府知府到任後每月朔望親率僚属宣講聖諭傳集士民環聴仰體朝廷飬老至意歳暮擇年高者䘏賞之行文各學教官課試生童觧卷親閲奨勵偹至每年春秋遍廵四野勸課農桑見田苖茂盛者賞荒蕪者罰於是家無惰民野無曠土訪知臨清有臨米臨銀二項奸弊叢集即詳請廵撫題准歸併正賦項下民䝉其利二十四年三春無雨民不得耕種乃齋戒沐浴同妻親自㨂麥磨麺作供具焚香告於天曰若知府有罪願干天譴乞無降灾百姓自亥時跪禱至子時沛然下雨是年大有時盗賊未靖民不安居因親查里甲按戸編牌令地方人等嚴驅奸宄盗遂屏跡東昌府向有挑淺水夫名色甚累民即行文聊城令其申請布政司均役至今士民稱便凡理詞訟概不批委属員大事執法小事准息数十年間訟獄衰少東阿縣教諭王璜事繼母盡孝值歳荒救饑民数百人朝正詳請布政司旌其署監生崔允璧於通濟閘設大橋一座橋之南北各施義渡一艘亦旌其門王士傑捐資補東関石街親置酒勞之由是郡人争先向善郡城西南低窪每逢大雨泛溢五六十里民遭淹溺者甚多朝正捐俸銀三百兩属武進士何泌等監工創建大石橋三座砌路六十丈又慮水大衝堤復捐俸銀五百兩修築堅固府城始無水患二十五年春夏不雨二麥無成朝正自捐俸煑粥且勸紳衿恊助於是教諭王璜監生崔允璧展一鵬等各捐米数百石又開倉發粟减價出賣民頼以活者甚多臨清鈔関廵攔不時擅到東昌擾害地方啇人執從前碑文合詞公籲朝正詳明督撫題請遵照舊例勒碑以垂不朽行旅永頼焉今祀本府名宦祠子宗仁仕至湖廣縂督宗義仕至河南廵撫宗仁見世職大臣𫝊蒋毓英蒋毓英漢軍廂白旂人初以官生任浙江温州府同知時海氛未靖三軍駐衢征剿毓英悉心籌畫輸運糧餉仍加意撫綏嚴行保甲闔郡帖然康熈二十九年陞任江西按察使到任見學宫年乆傾頺即捐資修葺并檄行各属查學宫凡有傾頺者悉估價報明公同捐俸修理一時學校無不聿新南昌北城有飛沙擁積上接城雉盗賊乘垣出入難於守禦毓英為捐資募夫剔除積沙并建竪木柵居民得以安枕三藩甫定河道尚多剽刼者州縣官隐匿不報毓英廉察得情檄令各縣查明船户編立字號各給用印腰牌飭令未晚停泊守汛兵目以五船為一伍十船為一甲輪流支更守宿天明放行由是河盗屏息常親理監獄寒冬製棉衣分給囚犯尋陞浙江布政使赴任後衆囚聞之號泣數日康熙四十六年崇祀名宦祠高起龍高起龍漢軍鑲白旗人康熙四十年任四川布政使檄州縣徵收國課令民自封投櫃嚴禁陋規每遇編審年分俾里甲均平胥吏不敢為奸士民徳之四十八年公請崇祀名宦祠高蔭爵高䕃爵字澹菴漢軍廂白旗人雍正元年改入廂黄旗初由廕生任直𨽻正定府蠡縣知縣遷湖廣安陸府同知康熈四十五年陞四川松茂道僉事疏濬都江堰水灌田民食其利督運黄勝關糧儲累署布政使按察使事凡所措置動合機宜後轉直𨽻口北道四川人至今思之崇祀名宦祠董紹美董紹美漢軍廂白旗人由監生授山東沂州州同以卓異陞知州康熈五十九年任欽州正直亷明申明倫理屏絶苞苴雍正三年卒欽州紳士感徳設神主位奉祀天涯亭崇祀名宦祠孫芳孫芳漢軍廂白旗人初以正四品職銜任河南陳州知州首革編審陋規㑹撥置閩兵至中州開墾安揷營房各得其所民不擾害立社學置學田又釐正商水所侵故地疆界民頌其功尋陞雲南鶴慶府知府崇祀河南名宦同旂有朱廷梅者任江南徽州府知府清白自矢潔己愛民善政甚多士民徳之亦崇祀名宦祠萬蕭裕萬蕭裕漢軍廂白旂人由監生任桃源縣知縣操守潔清聴斷明决减火耗禁私派重農恤刑加意學校士民頼之崇祀名宦祠以上二十二人並舊志所載欽定八旗通志卷二百三十八
