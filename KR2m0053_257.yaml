body:
  text: 人物志一百二十三列女傳三八旗滿洲列女傳一鑲黄旗滿洲代素之妻瑚圖尼鑲黄旗滿洲卜爾績之妻雅圖鑲黄旗滿洲髙明合之妻徐氏正黄旗滿洲䕶軍㕘領莫泰之妻𤓰勒佳氏正黄旗滿洲王國泰之妻卜氏正黄旗滿洲周書之妻徐氏正黄旗滿洲薩哈連之妻瓦爾達正黄旗滿洲國星額之妻梅和妮正黄旗滿洲馬鈕之妻綽顧美正黄旗滿洲三等侍衛色爾特之妻寗瑪奈正黄旗滿洲騎都尉杭樹之妻瑚石理正黄旗滿洲徐我振之妻張氏正白旗滿洲石天柱之妻龎氏正白旗滿洲繆時宏之妻蘇班正白旗滿洲凖太之妻四姬正白旗滿洲領催查靈阿之妻瑪沙正白旗滿洲筆帖式馬富塔之妻本姐鑲白旗滿洲多兑之妻範哲鑲白旗滿洲楊嘉祥之妻張氏鑲白旗滿洲壯大何託之妻布雲珠鑲紅旗滿洲陳善道之妻馮氏鑲紅旗滿洲劉可仕之妻扈氏鑲紅旗滿洲輕車都尉揚古里之妻安姐鑲紅旗滿洲滿平之妻湯氏正藍旗滿洲都雷之妻談績利正藍旗滿洲王國威之妻李氏正藍旗滿洲䝉古爾代之妻馬格占鑲藍旗滿洲阿哈碩塞之妻賈格鑲藍旗滿洲愛塔之妻查奈鑲藍旗滿洲三等侍衛阿喇宻之妻杜碩麗鑲藍旗滿洲阿虎善之妻錫賚以上俱於順治十年旌表鑲黄旗滿洲馬甲多爾虎之妻滿姐鑲黄旗滿洲馬甲占大海之妻博竒和鑲黄旗滿洲馬甲察穆布之妻衛和姬鑲黄旗滿洲馬甲巴郎阿之妻本哲鑲黄旗滿洲領催巴洛之妻蘇美鑲黄旗滿洲領催吴業齊之妻哈哈齊正黄旗滿洲額勒錦之妻濟賚正黄旗滿洲馬大胡之妻顧他穆正黄旗滿洲努三之妻哲塞里正黄旗滿洲胡式屯之妻娃業正黄旗滿洲馬甲伊特痕之妻唐姬禄正黄旗滿洲綽根巴圖魯之妻白哥正白旗滿洲達爾布之妻吴大客正白旗滿洲泰因泰之妻篇古正白旗滿洲温禪之妻傅塔正白旗滿洲恩特赫之妻圖拜正白旗滿洲羅畢之妻臘八正紅旗滿洲董世榮之妻蕭氏正紅旗包衣陳官之妻李氏正紅旗包衣黄玉之妻趙姬鑲白旗滿洲透庫勒之妻楊西麗鑲白旗滿洲尤當阿之妻賽古希鑲白旗滿洲布賽之妻查穆哈鑲白旗滿洲額伊圗之妻恩庫鑲白旗滿洲烏林吴喀之妻芳姑鑲紅旗滿洲齊國治之妻俞氏鑲紅旗滿洲領催塔海之妻書姬鑲紅旗滿洲騎都尉查布海之妻伊瑪三鑲紅旗滿洲哈寧阿之妻濟納鑲紅旗滿洲烏黒之妻南姐鑲紅旗滿洲䕶軍薩喇圖之妻阿姬翰鑲紅旗滿洲䕶軍滿都之妻瑪格正藍旗滿洲阿朱瑚之妻阿姐正藍旗滿洲杜尼之妻太因濟麗正藍旗滿洲䕶軍西喇巴之妻瑚沙麗正藍旗滿洲馬甲圖海之妻哲因庫正藍旗滿洲馬甲鄭世選之妻王氏正藍旗滿洲劉永榮之妻畢氏正藍旗滿洲馬甲郗圖之妻娃爾達鑲藍旗滿洲三等侍衛堪啟哈之妻詹姐鑲藍旗滿洲䕶軍薄鎖之妻納克琳鑲藍旗滿洲紅愛之妻毘薩格鑲藍旗滿洲馬甲傅爾嘉圖之妻詹姐鑲藍旗滿洲邁圖之妻愛垠姐鑲藍旗滿洲筆帖式勒拜之妻温姐鑲藍旗滿洲博士尼堪之妻布倫珠鑲藍旗滿洲領催達哈納之妻琿姐鑲藍旗滿洲阿愷之妻邁姐鑲藍旗滿洲馬甲托實之妻薩穆哈鑲藍旗滿洲馬甲竒嗒禮之妻蘇哲鑲藍旗滿洲博合禮之妻魏納克鑲藍旗滿洲馬甲遂頒之妻畢喇克鑲藍旗滿洲䕶軍新達禮之妻令色鑲藍旗滿洲張岱甫之妻張氏以上俱於順治十三年旌表鑲黄旗滿洲馬甲塞黒之妻福和琳鑲黄旗滿洲䕶軍㕘領嵩鄂托之妻納喇氏鑲黄旗滿洲騎都尉烏爾格之妻納喇氏鑲黄旗滿洲盧爾班特之妻齊姐克鑲黄旗滿洲驍騎校鄂柰之妻阿布鑲黄旗滿洲孫學曽之妻金氏鑲黄旗滿洲造起元之妻裴氏鑲黄旗包衣校尉郭衛都之妻朱氏正黄旗滿洲驍騎校阿當阿之妻色處禮正黄旗包衣成戴仁之妻晋氏正黄旗滿洲都爾遜之妻富柰正黄旗滿洲主事滿都布之妻穆姐正黄旗滿洲敦端之妻滿姐正黄旗滿洲察罕之妻珠瑪喇正黄旗滿洲齊蒲渾之妻西白姐正黄旗滿洲白雅爾圖之妻費揚古正黄旗滿洲阿林之妻阿濟格正黄旗滿洲阿際泰之妻薩爾帕正黄旗滿洲布扎海之妻察哈禮正白旗滿洲馬甲衛喇之妻戴布克正白旗滿洲䕶軍明安圖之妻發哈正白旗滿洲䕶軍充庫得之妻詹姊克鑲白旗滿洲馬甲薩呼禮之妻阿濟格鑲白旗包衣䕶軍阿思哈之妻李徹哲鑲紅旗滿洲驍騎校喀蘭納之妻薩賚鑲紅旗滿洲朱克什之妻塞博識鑲紅旗滿洲䕶軍達因布魯之妻和察禮鑲紅旗滿洲驍騎校馬喀尼之妻伊玳正藍旗滿洲司庫杜達海之妻蘇鼐正藍旗滿洲領催胡米色之妻雅琳姐鑲藍旗滿洲䕶軍楊三之妻珠倫鑲藍旗滿洲戴諸庫之妻卜喇哈鑲藍旗包衣領催張泰之妻納音姐鑲藍旗滿洲馬甲馬泰之妻對識禮鑲藍旗滿洲驍騎校鄂佛和諾之妻宜和姐鑲藍旗滿洲布雅禮墨爾根之妻沙慕姐鑲藍旗滿洲筆帖式雅齊布之妻蘇和姐鑲藍旗滿洲領催布才之妻辛姐鑲藍旗滿洲喀倫達阿世克之妻對齊克鑲藍旗滿洲前鋒哈爾賽之妻本姐鑲藍旗滿洲銀匠孫查禮之妻鼐姐鑲藍旗滿洲馬甲碩博㑹之妻雅圖鑲藍旗滿洲領催吴靈額之妻魏和鑲藍旗滿洲領催碩色之妻玻達鑲藍旗滿洲馬甲巴杜哈之妻蘇蘭珠鑲藍旗滿洲馬甲額靈額之妻吴賚鑲藍旗滿洲馬甲何通機之妻費揚古鑲藍旗包衣䕶軍巴延圖之妻和托以上俱於順治十五年旌表鑲黄旗滿洲薩海之妻綽格鑲黄旗滿洲䕶軍額痕之妻阿濟格正黄旗滿洲努赫勒之妻愷蘭珠正黄旗包衣向由誠之妻李氏正黄旗包衣王忠直之妻鮑氏正白旗滿洲領催艾蘇之妻齊鼐正白旗滿洲馬甲胡業禄之妻格騰珠正白旗滿洲馬甲雅三巴之妻多羅琿正白旗包衣努三之妻莫濟尼正白旗包衣噶布喇之妻三濟海正紅旗滿洲詹古之妻珠鼐鑲白旗滿洲前鋒竒圖里之妻穆和琳鑲白旗滿洲前鋒多拜之妻門濟正藍旗滿洲威赫納之妻鳳資正藍旗滿洲䕶軍朱爾哈達之妻伊黙齊正藍旗滿洲馬甲達揚阿之妻西岱鑲藍旗滿洲馬甲雅哈納之妻海音濟鑲藍旗滿洲馬甲莫爾格慎之妻三節鑲藍旗滿洲倭赫之妻歡哲鑲藍旗滿洲馬甲西漢之妻額西禮鑲藍旗滿洲馬甲能德樂之妻福哲鑲藍旗滿洲馬甲精格禄之妻鼐塞鑲藍旗包衣領催塔巴海之妻費揚古鑲藍旗包衣馬甲圖雅禄之妻海哲以上俱於順治十六年旌表鑲黄旗滿洲馬甲納穆泰之妻威和妮鑲黄旗滿洲馬甲沙喇之妻恩齊鑲黄旗包衣領催好善之妻舒淑鑲黄旗滿洲馬甲吴邁之妻色謨鑲黄旗滿洲馬甲布舒庫之妻魏和姐鑲黄旗滿洲馬甲威赫納之妻徳慕薩正黄旗滿洲費揚古之妻斐揚姑正黄旗滿洲馬甲科爾昆之妻威亨正黄旗包衣馬甲翁季之妻根陳正黄旗滿洲領催察哈他之妻威妮正白旗滿洲䕶軍蘇勒之妻敖色正白旗滿洲馬甲郭邦之妻恩季正白旗滿洲領催尹泰之妻娃爾達正白旗滿洲碩色之妻和托正紅旗滿洲馬甲布思泰之妻愛穆正紅旗滿洲馬甲代諸户之妻根季正紅旗滿洲馬甲薩哈泰之妻孫哲正紅旗滿洲都謨爾錦之妻哈禮納敦正紅旗包衣䕶軍索博禮之妻根哲鑲紅旗滿洲㕘領納爾賽之妻費揚古鑲紅旗滿洲科布察之妻古倫珠鑲紅旗滿洲筆帖式哈穆佳之妻妞妞正藍旗滿洲馬甲蘇班之妻蘇班岱正藍旗滿洲馬甲孟堪之妻瑪邁正藍旗滿洲馬甲聶色之妻昂哥正藍旗滿洲䕶軍額黒之妻伍喇姐正藍旗滿洲䕶軍校穆齊爾之妻姜氏正藍旗滿洲䕶軍余闢之妻阿季格正藍旗包衣馬甲薩海之妻愛姐正藍旗包衣馬甲納爾圖之妻格齊禮正藍旗包衣佟永成之妻周氏正藍旗包衣校尉髙尚恵之妻張氏正藍旗包衣馬甲托克泰之妻馬姬正藍旗包衣賴達之妻徳姐正藍旗包衣邵先春之妻王氏正藍旗包衣南徳之妻孟古姬正藍旗包衣䕶軍李佳之妻顔葉正藍旗包衣馬甲阿什庫之妻伍蘭珠正藍旗包衣領催羅洛琿之妻費揚古鑲藍旗滿洲馬甲郭和尼堪之妻吴鼐鑲藍旗滿洲赫紐之妻白哈妮鑲藍旗包衣䕶軍朱和納之妻費葉冷鑲藍旗包衣馬甲富達禮之妻金泰鑲藍旗包衣馬甲蘇巴海之妻雅姐鑲藍旗包衣馬甲杭色之妻岳姐鑲藍旗包衣馬甲常都海之妻托爾琿鑲藍旗包衣馬甲伊柰之妻魏和鑲藍旗包衣馬甲他克之妻門姬以上俱於順治十八年旌表鑲黄旗滿洲馬甲那桑阿之妻滿哲鑲黄旗滿洲雲騎尉阿拉宻之妻英洛鑲黄旗滿洲馬甲格徳琿之妻戴格正黄旗滿洲䕶軍武赫之妻愛尼正白旗滿洲馬甲索納之妻娃爾達正白旗包衣馬甲和善之妻髙氏正紅旗包衣領催額畢西納之妻拜思哈鑲白旗滿洲馬甲温達理之妻雅蘭珠鑲白旗滿洲䕶軍雍愛之妻五姐正藍旗滿洲馬甲博博坤之妻登氏正藍旗包衣䕶軍賈哈之妻班姞鑲藍旗滿洲馬甲博達禮之妻費揚斌鑲藍旗滿洲馬甲張三之妻海蘭珠鑲藍旗包衣馬甲席特庫之妻賁結鑲藍旗包衣馬甲哈什之妻留姞鑲藍旗包衣馬甲塞楞之妻滿姞鑲藍旗包衣揚滿貳之妻大節鑲藍旗包衣汪暇塞之妻畢氏以上俱於康熈元年旌表鑲黄旗滿洲馬甲濟瑪瑚之妻徳爾衡珠鑲黄旗滿洲馬甲索扎之妻葉親鑲黄旗滿洲前鋒校介塞之妻節喇鑲黄旗滿洲前鋒留柱之妻那蘭珠鑲黄旗包衣馬甲費揚古之妻吴嚴珠正黄旗滿洲䕶軍羅琿之妻濟賴正黄旗滿洲筆帖式敦多恵之妻阿濟根正白旗滿洲馬甲明愛之妻席柰正白旗滿洲䕶軍額克速尼之妻穆克錫正白旗滿洲馬甲陶代之妻伍姐正白旗滿洲馬甲烏札喇之妻滿姐正白旗滿洲䕶軍殷布倫之妻艾因姐正白旗滿洲領催孫拜之妻賽珠正白旗滿洲䕶軍滿都禮之妻蘇白琳正白旗滿洲馬甲博林之妻邸王匹正紅旗滿洲䕶軍恭領雅行安之妻鈕鈕克鑲紅旗滿洲馬甲馬喇之妻席鼐鑲紅旗滿洲馬甲車克之妻布雲珠正藍旗滿洲䕶軍卓納依之妻布因珠正藍旗滿洲馬甲宜喇秦之妻豸正正藍旗包衣馬甲馬喇之妻大姐鑲藍旗滿洲前鋒侍衛綽爾門之妻班布鑲藍旗滿洲馬甲達爾堪之妻沙蘭珠鑲藍旗滿洲馬甲屯泰之妻殷姐鑲藍旗包衣馬甲楊希之妻賁姐鑲藍旗包衣馬甲朱木布魯之妻薩克薩哈以上俱於康熈二年旌表鑲黄旗滿洲䕶軍校阿爾丹之妻吴三珠鑲黄旗滿洲馬甲葉素之妻泰必智鑲黄旗滿洲領催瓦洪之妻能各柰鑲黄旗滿洲䕃生阿爾蘇捺之妻納倫珠鑲黄旗滿洲馬甲胡蘭泰之妻尼雅禮正黄旗滿洲馬甲西雅喇之妻傅喇喀正黄旗滿洲馬甲吴爾舉之妻捺蘭珠正黄旗滿洲䕶軍泰蘭之妻吴倫珠正黄旗滿洲䕶軍傅喇塔之妻塞本徳正黄旗滿洲馬甲圖理之妻阿班珠正黄旗滿洲䕶軍努赫齊之妻滿姐正黄旗滿洲弓匠達理虎之妻恩姐正黄旗包衣領催孟格之妻英愛正紅旗滿洲䕶軍㕘領伊篤實之妻薩布姐正紅旗滿洲馬甲阿爾巴善之妻塞尼鑲白旗滿洲䕶軍圖爾海之妻阿納謹鑲白旗滿洲親軍馬喇之妻尼什哈鑲白旗滿洲克爾庫英之妻開音哲鑲紅旗滿洲䕶軍瓦濟納之妻薩木哈正藍旗滿洲領催吴爾圖瑚之妻拜哈珠正藍旗滿洲馬甲青禇之妻徳姐鑲藍旗滿洲前鋒多恩托㑹之妻鄂綸鑲藍旗滿洲瓦爾達之妻扎菁以上俱於康熈三年旌表鑲黄旗包衣領催貴亷之妻温濟正黄旗滿洲驍騎校滿代之妻三濟正黄旗滿洲䕶軍赫勒之妻鈕鈕正黄旗滿洲䕶軍塞赫之妻穆舒正紅旗滿洲馬甲烏勇格之妻羅梭正紅旗滿洲領催栢英額之妻大因吉理鑲白旗滿洲匠烏哈塔之妻貴姐鑲白旗滿洲䕶軍圖巴海之妻塔克鑲白旗滿洲拜音達理之妻貴倫鑲白旗滿洲領催薩庫之妻吴爾榜克鑲白旗滿洲馬甲慶艾之妻唐塞鑲紅旗滿洲馬甲索爾和之妻翩舞鑲紅旗