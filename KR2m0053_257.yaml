body:
  text: 人物志一百二十三列女傳三八旗滿洲列女傳一鑲黃旗滿洲代素之妻瑚圖尼鑲黃旗滿洲卜爾績之妻雅圖鑲黃旗滿洲髙明合之妻徐氏正黃旗滿洲護軍參領莫泰之妻瓜勒佳氏正黃旗滿洲王國泰之妻卜氏正黃旗滿洲周書之妻徐氏正黃旗滿洲薩哈連之妻瓦爾達正黃旗滿洲國星額之妻梅和妮正黃旗滿洲馬鈕之妻綽顧美正黃旗滿洲三等侍衛色爾特之妻寧瑪奈正黃旗滿洲騎都尉杭樹之妻瑚石理正黃旗滿洲徐我振之妻張氏正白旗滿洲石天柱之妻龎氏正白旗滿洲繆時宏之妻蘇班正白旗滿洲凖太之妻四姬正白旗滿洲領催查靈阿之妻瑪沙正白旗滿洲筆帖式馬富塔之妻本姐鑲白旗滿洲多兑之妻範哲鑲白旗滿洲楊嘉祥之妻張氏鑲白旗滿洲壯大何託之妻布雲珠鑲紅旗滿洲陳善道之妻馮氏鑲紅旗滿洲劉可仕之妻扈氏鑲紅旗滿洲輕車都尉揚古里之妻安姐鑲紅旗滿洲滿平之妻湯氏正藍旗滿洲都雷之妻談績利正藍旗滿洲王國威之妻李氏正藍旗滿洲蒙古爾代之妻馬格占鑲藍旗滿洲阿哈碩塞之妻賈格鑲藍旗滿洲愛塔之妻查奈鑲藍旗滿洲三等侍衛阿喇密之妻杜碩麗鑲藍旗滿洲阿虎善之妻錫賚以上俱於順治十年旌表鑲黃旗滿洲馬甲多爾虎之妻滿姐鑲黃旗滿洲馬甲占大海之妻博竒和鑲黃旗滿洲馬甲察穆布之妻衛和姬鑲黃旗滿洲馬甲巴郎阿之妻本哲鑲黃旗滿洲領催巴洛之妻蘇美鑲黃旗滿洲領催吳業齊之妻哈哈齊正黃旗滿洲額勒錦之妻濟賚正黃旗滿洲馬大胡之妻顧他穆正黃旗滿洲努三之妻哲塞里正黃旗滿洲胡式屯之妻娃業正黃旗滿洲馬甲伊特痕之妻唐姬祿正黃旗滿洲綽根巴圖魯之妻白哥正白旗滿洲達爾布之妻吳大客正白旗滿洲泰因泰之妻篇古正白旗滿洲溫禪之妻傅塔正白旗滿洲恩特赫之妻圖拜正白旗滿洲羅畢之妻臘八正紅旗滿洲董世榮之妻蕭氏正紅旗包衣陳官之妻李氏正紅旗包衣黃玉之妻趙姬鑲白旗滿洲透庫勒之妻楊西麗鑲白旗滿洲尤當阿之妻賽古希鑲白旗滿洲布賽之妻查穆哈鑲白旗滿洲額伊圗之妻恩庫鑲白旗滿洲烏林吳喀之妻芳姑鑲紅旗滿洲齊國治之妻俞氏鑲紅旗滿洲領催塔海之妻書姬鑲紅旗滿洲騎都尉查布海之妻伊瑪三鑲紅旗滿洲哈寧阿之妻濟納鑲紅旗滿洲烏黑之妻南姐鑲紅旗滿洲護軍薩喇圖之妻阿姬翰鑲紅旗滿洲護軍滿都之妻瑪格正藍旗滿洲阿朱瑚之妻阿姐正藍旗滿洲杜尼之妻太因濟麗正藍旗滿洲護軍西喇巴之妻瑚沙麗正藍旗滿洲馬甲圖海之妻哲因庫正藍旗滿洲馬甲鄭世選之妻王氏正藍旗滿洲劉永榮之妻畢氏正藍旗滿洲馬甲郗圖之妻娃爾達鑲藍旗滿洲三等侍衛堪啓哈之妻詹姐鑲藍旗滿洲護軍薄鎖之妻納克琳鑲藍旗滿洲紅愛之妻毗薩格鑲藍旗滿洲馬甲傅爾嘉圖之妻詹姐鑲藍旗滿洲邁圖之妻愛垠姐鑲藍旗滿洲筆帖式勒拜之妻溫姐鑲藍旗滿洲博士尼堪之妻布倫珠鑲藍旗滿洲領催達哈納之妻琿姐鑲藍旗滿洲阿愷之妻邁姐鑲藍旗滿洲馬甲托實之妻薩穆哈鑲藍旗滿洲馬甲竒嗒禮之妻蘇哲鑲藍旗滿洲博合禮之妻魏納克鑲藍旗滿洲馬甲遂頒之妻畢喇克鑲藍旗滿洲護軍新達禮之妻令色鑲藍旗滿洲張岱甫之妻張氏以上俱於順治十三年旌表鑲黃旗滿洲馬甲塞黑之妻福和琳鑲黃旗滿洲護軍參領嵩鄂托之妻納喇氏鑲黃旗滿洲騎都尉烏爾格之妻納喇氏鑲黃旗滿洲盧爾班特之妻齊姐克鑲黃旗滿洲驍騎校鄂奈之妻阿布鑲黃旗滿洲孫學曽之妻金氏鑲黃旗滿洲造起元之妻裴氏鑲黃旗包衣校尉郭衛都之妻朱氏正黃旗滿洲驍騎校阿當阿之妻色處禮正黃旗包衣成戴仁之妻晉氏正黃旗滿洲都爾遜之妻富奈正黃旗滿洲主事滿都布之妻穆姐正黃旗滿洲敦端之妻滿姐正黃旗滿洲察罕之妻珠瑪喇正黃旗滿洲齊蒲渾之妻西白姐正黃旗滿洲白雅爾圖之妻費揚古正黃旗滿洲阿林之妻阿濟格正黃旗滿洲阿際泰之妻薩爾帕正黃旗滿洲布扎海之妻察哈禮正白旗滿洲馬甲衛喇之妻戴布克正白旗滿洲護軍明安圖之妻發哈正白旗滿洲護軍充庫得之妻詹姊克鑲白旗滿洲馬甲薩呼禮之妻阿濟格鑲白旗包衣護軍阿思哈之妻李徹哲鑲紅旗滿洲驍騎校喀蘭納之妻薩賚鑲紅旗滿洲朱克什之妻塞博識鑲紅旗滿洲護軍達因布魯之妻和察禮鑲紅旗滿洲驍騎校馬喀尼之妻伊玳正藍旗滿洲司庫杜達海之妻蘇鼐正藍旗滿洲領催胡米色之妻雅琳姐鑲藍旗滿洲護軍楊三之妻珠倫鑲藍旗滿洲戴諸庫之妻卜喇哈鑲藍旗包衣領催張泰之妻納音姐鑲藍旗滿洲馬甲馬泰之妻對識禮鑲藍旗滿洲驍騎校鄂佛和諾之妻宜和姐鑲藍旗滿洲布雅禮墨爾根之妻沙慕姐鑲藍旗滿洲筆帖式雅齊布之妻蘇和姐鑲藍旗滿洲領催布才之妻辛姐鑲藍旗滿洲喀倫達阿世克之妻對齊克鑲藍旗滿洲前鋒哈爾賽之妻本姐鑲藍旗滿洲銀匠孫查禮之妻鼐姐鑲藍旗滿洲馬甲碩博會之妻雅圖鑲藍旗滿洲領催吳靈額之妻魏和鑲藍旗滿洲領催碩色之妻玻達鑲藍旗滿洲馬甲巴杜哈之妻蘇蘭珠鑲藍旗滿洲馬甲額靈額之妻吳賚鑲藍旗滿洲馬甲何通機之妻費揚古鑲藍旗包衣護軍巴延圖之妻和托以上俱於順治十五年旌表鑲黃旗滿洲薩海之妻綽格鑲黃旗滿洲護軍額痕之妻阿濟格正黃旗滿洲努赫勒之妻愷蘭珠正黃旗包衣向由誠之妻李氏正黃旗包衣王忠直之妻鮑氏正白旗滿洲領催艾蘇之妻齊鼐正白旗滿洲馬甲胡業祿之妻格騰珠正白旗滿洲馬甲雅三巴之妻多羅琿正白旗包衣努三之妻莫濟尼正白旗包衣噶布喇之妻三濟海正紅旗滿洲詹古之妻珠鼐鑲白旗滿洲前鋒竒圖里之妻穆和琳鑲白旗滿洲前鋒多拜之妻門濟正藍旗滿洲威赫納之妻鳳資正藍旗滿洲護軍朱爾哈達之妻伊默齊正藍旗滿洲馬甲達揚阿之妻西岱鑲藍旗滿洲馬甲雅哈納之妻海音濟鑲藍旗滿洲馬甲莫爾格慎之妻三節鑲藍旗滿洲倭赫之妻歡哲鑲藍旗滿洲馬甲西漢之妻額西禮鑲藍旗滿洲馬甲能德樂之妻福哲鑲藍旗滿洲馬甲精格祿之妻鼐塞鑲藍旗包衣領催塔巴海之妻費揚古鑲藍旗包衣馬甲圖雅祿之妻海哲以上俱於順治十六年旌表鑲黃旗滿洲馬甲納穆泰之妻威和妮鑲黃旗滿洲馬甲沙喇之妻恩齊鑲黃旗包衣領催好善之妻舒淑鑲黃旗滿洲馬甲吳邁之妻色謨鑲黃旗滿洲馬甲布舒庫之妻魏和姐鑲黃旗滿洲馬甲威赫納之妻德慕薩正黃旗滿洲費揚古之妻斐揚姑正黃旗滿洲馬甲科爾昆之妻威亨正黃旗包衣馬甲翁季之妻根陳正黃旗滿洲領催察哈他之妻威妮正白旗滿洲護軍蘇勒之妻敖色正白旗滿洲馬甲郭邦之妻恩季正白旗滿洲領催尹泰之妻娃爾達正白旗滿洲碩色之妻和托正紅旗滿洲馬甲布思泰之妻愛穆正紅旗滿洲馬甲代諸户之妻根季正紅旗滿洲馬甲薩哈泰之妻孫哲正紅旗滿洲都謨爾錦之妻哈禮納敦正紅旗包衣護軍索博禮之妻根哲鑲紅旗滿洲參領納爾賽之妻費揚古鑲紅旗滿洲科布察之妻古倫珠鑲紅旗滿洲筆帖式哈穆佳之妻妞妞正藍旗滿洲馬甲蘇班之妻蘇班岱正藍旗滿洲馬甲孟堪之妻瑪邁正藍旗滿洲馬甲聶色之妻昂哥正藍旗滿洲護軍額黑之妻伍喇姐正藍旗滿洲護軍校穆齊爾之妻薑氏正藍旗滿洲護軍余闢之妻阿季格正藍旗包衣馬甲薩海之妻愛姐正藍旗包衣馬甲納爾圖之妻格齊禮正藍旗包衣佟永成之妻周氏正藍旗包衣校尉髙尚惠之妻張氏正藍旗包衣馬甲托克泰之妻馬姬正藍旗包衣賴達之妻德姐正藍旗包衣邵先春之妻王氏正藍旗包衣南德之妻孟古姬正藍旗包衣護軍李佳之妻顔葉正藍旗包衣馬甲阿什庫之妻伍蘭珠正藍旗包衣領催羅洛琿之妻費揚古鑲藍旗滿洲馬甲郭和尼堪之妻吳鼐鑲藍旗滿洲赫紐之妻白哈妮鑲藍旗包衣護軍朱和納之妻費葉冷鑲藍旗包衣馬甲富達禮之妻金泰鑲藍旗包衣馬甲蘇巴海之妻雅姐鑲藍旗包衣馬甲杭色之妻嶽姐鑲藍旗包衣馬甲常都海之妻托爾琿鑲藍旗包衣馬甲伊奈之妻魏和鑲藍旗包衣馬甲他克之妻門姬以上俱於順治十八年旌表鑲黃旗滿洲馬甲那桑阿之妻滿哲鑲黃旗滿洲雲騎尉阿拉密之妻英洛鑲黃旗滿洲馬甲格德琿之妻戴格正黃旗滿洲護軍武赫之妻愛尼正白旗滿洲馬甲索納之妻娃爾達正白旗包衣馬甲和善之妻髙氏正紅旗包衣領催額畢西納之妻拜思哈鑲白旗滿洲馬甲溫達理之妻雅蘭珠鑲白旗滿洲護軍雍愛之妻五姐正藍旗滿洲馬甲博博坤之妻登氏正藍旗包衣護軍賈哈之妻班姞鑲藍旗滿洲馬甲博達禮之妻費揚斌鑲藍旗滿洲馬甲張三之妻海蘭珠鑲藍旗包衣馬甲席特庫之妻賁結鑲藍旗包衣馬甲哈什之妻留姞鑲藍旗包衣馬甲塞楞之妻滿姞鑲藍旗包衣揚滿二之妻大節鑲藍旗包衣汪暇塞之妻畢氏以上俱於康熙元年旌表鑲黃旗滿洲馬甲濟瑪瑚之妻德爾衡珠鑲黃旗滿洲馬甲索扎之妻葉親鑲黃旗滿洲前鋒校介塞之妻節喇鑲黃旗滿洲前鋒留柱之妻那蘭珠鑲黃旗包衣馬甲費揚古之妻吳嚴珠正黃旗滿洲護軍羅琿之妻濟賴正黃旗滿洲筆帖式敦多惠之妻阿濟根正白旗滿洲馬甲明愛之妻席奈正白旗滿洲護軍額克速尼之妻穆克錫正白旗滿洲馬甲陶代之妻伍姐正白旗滿洲馬甲烏札喇之妻滿姐正白旗滿洲護軍殷布倫之妻艾因姐正白旗滿洲領催孫拜之妻賽珠正白旗滿洲護軍滿都禮之妻蘇白琳正白旗滿洲馬甲博林之妻邸王匹正紅旗滿洲護軍恭領雅行安之妻鈕鈕克鑲紅旗滿洲馬甲馬喇之妻席鼐鑲紅旗滿洲馬甲車克之妻布雲珠正藍旗滿洲護軍卓納依之妻布因珠正藍旗滿洲馬甲宜喇秦之妻豸正正藍旗包衣馬甲馬喇之妻大姐鑲藍旗滿洲前鋒侍衛綽爾門之妻班布鑲藍旗滿洲馬甲達爾堪之妻沙蘭珠鑲藍旗滿洲馬甲屯泰之妻殷姐鑲藍旗包衣馬甲楊希之妻賁姐鑲藍旗包衣馬甲朱木布魯之妻薩克薩哈以上俱於康熙二年旌表鑲黃旗滿洲護軍校阿爾丹之妻吳三珠鑲黃旗滿洲馬甲葉素之妻泰必智鑲黃旗滿洲領催瓦洪之妻能各奈鑲黃旗滿洲蔭生阿爾蘇捺之妻納倫珠鑲黃旗滿洲馬甲胡蘭泰之妻尼雅禮正黃旗滿洲馬甲西雅喇之妻傅喇喀正黃旗滿洲馬甲吳爾舉之妻捺蘭珠正黃旗滿洲護軍泰蘭之妻吳倫珠正黃旗滿洲護軍傅喇塔之妻塞本德正黃旗滿洲馬甲圖理之妻阿班珠正黃旗滿洲護軍努赫齊之妻滿姐正黃旗滿洲弓匠達理虎之妻恩姐正黃旗包衣領催孟格之妻英愛正紅旗滿洲護軍參領伊篤實之妻薩布姐正紅旗滿洲馬甲阿爾巴善之妻塞尼鑲白旗滿洲護軍圖爾海之妻阿納謹鑲白旗滿洲親軍馬喇之妻尼什哈鑲白旗滿洲克爾庫英之妻開音哲鑲紅旗滿洲護軍瓦濟納之妻薩木哈正藍旗滿洲領催吳爾圖瑚之妻拜哈珠正藍旗滿洲馬甲青禇之妻德姐鑲藍旗滿洲前鋒多恩托會之妻鄂綸鑲藍旗滿洲瓦爾達之妻扎菁以上俱於康熙三年旌表鑲黃旗包衣領催貴亷之妻溫濟正黃旗滿洲驍騎校滿代之妻三濟正黃旗滿洲護軍赫勒之妻鈕鈕正黃旗滿洲護軍塞赫之妻穆舒正紅旗滿洲馬甲烏勇格之妻羅梭正紅旗滿洲領催柏英額之妻大因吉理鑲白旗滿洲匠烏哈塔之妻貴姐鑲白旗滿洲護軍圖巴海之妻塔克鑲白旗滿洲拜音達理之妻貴倫鑲白旗滿洲領催薩庫之妻吳爾榜克鑲白旗滿洲馬甲慶艾之妻唐塞鑲紅旗滿洲馬甲索爾和之妻翩舞鑲紅旗