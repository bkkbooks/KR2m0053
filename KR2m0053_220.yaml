body:
  text: 欽定四庫全書欽定八旗通志卷二百六人物志八十六大臣傳七十二漢軍正藍旗一剛佟養性巴劉宏遇李率泰阿泰顔佟岱瑶佟國印甲馬如璧芄劉仲錦楨張朝璘佟國佟養李日秦世佟養性佟養性遼東人先世為滿洲居佟佳以地為氏因業商遷撫順天命初見太祖髙皇帝功德日盛傾心輸欵為明所覺置之獄潛出來歸賜尚宗室女號曰西屋裏額駙授三等男六年從克遼陽晉二等子天聰五年正月太宗文皇帝命督造紅衣炮初軍營未備火器至是炮成鐫曰天祐助威大將軍征行則載以從養性掌焉時漢軍未分旗敕養性總理官民俱受節制額駙李永芳及明副將石廷柱鮑承先等先後來降者與佟氏族人皆為所屬上以漢官漸多慮養性無以服衆志特諭養性曰凡漢人事務付爾總理各官分别賢否以聞爾亦當殫厥忠忱簡善絀惡恤兵撫民竭力供職勿私庇親戚故舊陵轢疏逺仇讐致負朕委任之意昔廉頗藺相如一將一相以爭班位幾成嫌釁幸相如重視國事不念私讐是以令名垂於千祀願爾效之又諭諸漢官曰爾衆官如能恪遵約束非僅敬養性是重國體而欽法令也八月從上征明大軍圍明總兵祖大夀於大凌河養性秉方略率漢軍載紅衣炮立營於錦州通衢擊敵城西隅臺降守臺兵又擊城南隅壞樓堞翼日擊東一臺臺圯守者宵遁進殱之九月明關內兵援錦州上遣親軍擊敵養性勒漢軍五百從敵望風遁明監軍道張春與總兵吳襄等赴援大凌河乘夜向城上督騎兵破之方追奔明潰卒復陳養性承旨屯敵營東舉炮攻燬敵營十月攻克子章臺炮擊臺垜臺內兵死者無算十一月祖大夀以大凌河城降上命城中所得鎗炮鉛藥悉付養性尋率兵攻克馬家湖臺自大凌河至廣寧明所置臺墩悉毁之六年正月上幸演武場閲兵養性率所轄漢軍試炮擐甲列陳上嘉其軍容整肅且以出兵大凌河時能遵方略有克敵功賜雕鞍良馬一白金百兩設宴勞之四月上親征察哈爾命隨貝勒阿巴泰等留守瀋陽七月奉敕宣諭大凌河投誠各官察哈爾之役上命𠫭領延布祿佐領董山移哈爾占所貯糧於烏蘭哈達延布祿調遣失人遲久不至下廷臣會議罪當死有旨覆勘諭曰倘情有可矜則釋之衆皆言法不當宥養性奏曰延布祿等不留賢員協助而用不更事之人誤也罪固應死或懲責而曲貸之實惟聖恩前鋒𠫭領圖魯什亦以懲之而全其生為請上允二人議延布祿等遂從末減未幾養性卒於官詔以其子普漢襲爵普漢卒弟六十襲崇德七年𨽻漢軍正藍旗順治初六十屢遇恩詔晉三等伯仕至本旗都統十三年世祖章皇帝追録舊勳賜養性諡曰勤惠六十卒子國瑶襲爵自有傳劉宏遇劉宏遇遼東人初與其弟竒遇並以諸生隨明總兵祖大夀幕下為參謀天命七年太祖髙皇帝征明次三岔河宏遇同竒遇挈家來歸並以明邉境兵馬數目及戰守事宜陳奏上遣鄂克兑諭之曰得廣寧城後當授爾官嗣以明將士來降者衆宏遇間居遼陽太宗文皇帝崇德元年宏遇上書自陳乞録用命大學士范文程等試之謂可任文職遂授宏文院副理事官後分漢軍為八旗宏遇𨽻正藍旗順治元年三月以翻譯遼金元三史告成賚白金鞍馬尋任工部理事官十月授山西朔州道二年四月偕副將侯大節等督兵𠞰蔣家峪黑草嘴諸賊擒斬甚衆五月擢陜西布政使四月考績稱最五年擢安徽巡撫值叛鎮金聲桓騷擾江右江北土賊蜂起宏遇駐池州飭兵守禦分遣鎮將授策搜𠞰渠寇王二甫等次第就擒復自池州移駐安慶與總督馬國柱會𠞰英山霍山潛山諸賊連破賊巢擒斬渠魁孔文燦等餘黨悉平六年五月裁安徽巡撫召還七年二月授山西巡撫先是叛鎮薑瓖踞大同其黨分據平陽保德寧武代州五臺連結榆林靖邉府谷諸邑土賊四出寇掠至是瓖伏誅餘黨竄匿山谷宏遇奏請免逋賦蘇驛困矜恤諸死事家又言郡邑甫遭兵燹民田荒蕪殆盡前此大兵征伐大同徴輸芻糧竭蹶以供今尚有保德五臺府谷餘賊未滅日需輸挽復值二麥未收秋禾遇蝗災耕種失望臣承撫字之責仰體皇上視民如傷之意不敢不以實陳得旨下所司蠲賑尋與總督佟養量總兵剛阿泰協𠞰五臺山賊劉永忠髙鼎等於曹家寨攻毁賊巢俘斬略盡十年陜西賊楊茂等竄入平陽遣兵招降之宏遇撫山西四年建忠烈祠以祀守土諸臣死薑瓖之亂者葺太原府陽曲縣學宫修築汾河諸堤會以逮捕土賊王眼張義國孔朝貴閻守福等未入奏即籍沒解部有旨下所司察核宏遇坐罰俸給事中張璿劾宏遇不請旨徑行籍沒罪在専擅疏復下所司議再罰俸尋奉詔甄别督撫吏部以宏遇功少過多請旨降調旋授福建督糧道十八年九月卒於官祀山西名宦李率泰李率泰漢軍正藍旗人李永芳次子也初名延齡年十二即入侍禁廷太祖髙皇帝賜今名年十六以宗室女妻之太宗文皇帝親征察哈爾朝鮮及明錦州率泰俱從崇德八年隨貝勒阿巴泰征明至山東有勞績洊擢副都統順治元年正月授刑部參政兼副都統率兵駐防錦州四月隨睿親王多爾衮入山海關破流賊李自成尋同都統金礪招撫天津又率寧逺駐防兵平定山東河南擒斬滿家洞賊將趙應元降其衆萬人二年隨豫親王多鐸破流賊於潼關移師南征克揚州下江寧分領精兵三百徇蘇州松江所過城邑悉撫定惟江隂閉城抗拒督兵攻破之三年隨端重親王博洛下杭州定福建敘功授世職為二等輕車都尉復以考滿兼一雲騎尉五年海賊犯福州漳泉諸郡詔率泰與靖南將軍辰泰同心協謀前往誅𠞰至則擒斬賊渠曾慶等及餘黨數萬賊鄭彩連䑸數千盤踞長樂連江城邑率泰會辰泰分兵夾擊盡驅出海恢復二縣又統師直入興化生擒偽總督顧世臣等十一人斬之興化平先是福州為賊困十四月城中民相食江西賊郭天才偽稱援兵自杉關長驅抵福州駐兵洪塘載米麥江上誘郡民出就食會率泰提師抵建寧聞之間道飛檄巡撫使偵備賊乃夜焚洪山橋掠就食者千人以遁率泰至命有司收賊遺粟以蘇餘民巡按御史周世科大治舂杵釘鉸之刑拷掠士民恣取財賄巨萬率泰白之巡撫會劾之世科伏誅六年從征大同叛鎮薑瓖下保德州擒斬賊黨牛化麟等敘功加一雲騎尉先是順治元年更定官制名參政曰侍郎率泰仍以刑部侍郎兼任副都統事八年閏二月調吏部侍郎三月授宏文院大學士六月條奏三事一懲貪酷官吏一給滿洲兵丁馬匹草料一酌量營造工程次第上從之七月坐與大學士辰泰誤增恩詔赦欵復巧飾誑奏罷任降世職為騎都尉尋遇恩詔加一雲騎尉九年正月以吏部奉恩詔豫襲太濫命削雲騎尉十一月奉特旨晉三等男十年六月以大學士洪承疇薦授兩廣總督諭曰率泰當永不敘用經略輔臣既保為總督特允所舉著改過自新以圖報稱時明桂王朱由榔居安隆其帥李定國擁兵粵西十一年土賊廖篤增等結連定國為寇率泰遣兵分道進𠞰陳斬篤增於玉版巢十二年定國犯粵東率泰領兵禦之敗其將髙文貴會靖南將軍珠瑪喇率禁旅至合兵夾擊破之於新會城下乘勝追逐克復髙州雷州諸郡所至軫恤民賴以安方新會被圍時城中糧盡且食人兵衆掠婦女千餘口率泰言於諸將盡釋之十三年詔加太子太保調浙閩總督諭以浙閩重地軍務方殷敕到即兼程赴任時逆賊鄭成功招集亡命嘯聚海濵為江南浙江福建寇害率泰既蒞任相度形勢以賊揚帆鼓楫來往無常倘不急整舟師慮難擒𠞰特疏增設水軍三千復與撫臣劉漢祚動帑遴員刻期伐木增造唬哨各船百餘為戰禦計十四年招降海寇陳德容並疏言捕𠞰鄭逆宜離其黨與散其羽翼以撫佐𠞰又言鄭成功之父芝龍不宜流徙寧古塔恐其地近海由此而遁為患滋大上悉是其言併飭所司嚴守芝龍是年敘前破李定國功晉一等男考滿加少保十五年正月招降賊黨偽都督唐邦杰偽副將林翀葉祿等三月奏允調直𨽻山東河南山西江西步兵萬人赴浙防守海汛會鄭成功犯溫郡平陽瑞安俱陷浙東告警率泰請調江寧滿洲兵助𠞰賊退走七月詔分浙閩總督為二以都統趙國祚為浙江總督駐溫州而以率泰總督福建駐福州九月賊據南安嶺窺福州賊黨陳斌既降復叛率千餘人據羅星塔率泰馳檄會師焚其巨艦千餘賊遁因以舟師圍之斌降率泰奏斌屢叛狀誅於福州城南十六年以會審羅源縣敗逃事不詳究供詞部議瞻徇應革職得旨革去世職仍留總督任兵部又追論率泰總督浙閩時不能保固封疆應革任復得旨寬免罰俸一年仍戴罪圖功自贖康熙元年正月率泰以漳州為全閩門户奏增設水師二千及副將逰擊等官時定海小埕賊衆盤踞率泰密會靖南王耿繼茂遣兵擊走之又萬安所先經遷毁偽總兵楊宣等復於其地壘新城率泰會提臣馬得功調兵夾𠞰賊不能支揚帆逺遁六月招降偽總兵林俊竒等六十一員兵千餘人二年九月降偽忠靖伯陳輝等一百三十餘員兵一千六百及家屬八百餘人十月招降賊將何義魏明等復統建寧延平邵武將辨三路進𠞰山賊獲逆渠王鐵佛斬之未幾海賊五百餘人由梁山突犯內地率泰遣總兵王進功𠫭將折光秋夾擊大敗之俘斬甚衆復與耿繼茂統率大兵航海攻克厦門乘勝取浯嶼金門二島逆賊鄭錦周全斌等勢窮宵遁三年二月擒斬寧化山賊錢禾四月招降偽總兵林國梁五月大兵至八尺門偽威逺將軍翁求多率兵民六萬餘人納欵率泰夜半渡海進拔銅山焚毁賊巢斬首三千三百餘級偽永安侯王廷等率家屬兵民等三萬餘人出降獲船艦軍械無算鄭錦僅以數十艘遁走臺灣聖祖仁皇帝優旨嘉奬下部議敘加秩正一品六月率泰以疾求罷諭曰覽奏知病是實當即允所請但閩省投誠官員兵民最為繁衆著親行安插務使得所事竣日然後來京閏六月遣總兵李長榮等出洋𠞰賊擒偽總兵張賢時閩海厦門各島悉已蕩平惟南山鎮海佛潭橋猶為餘孽盤踞九月率泰飭總兵官劉進忠等進𠞰陳斬賊黨七千有竒招撫男婦萬餘人十月别遣兵會𠞰茶仔畬山寇生擒賊首余角俘斬餘黨無算四年三月再以疾求罷上慰留之六月以漳汀二府地甚遼濶奏定守漳道仍駐漳州巡建道仍兼轄延平守建道自建寧改駐汀州兼轄邵武五年正月卒於官遺疏言閩海餘氛逺竄臺灣奉旨撤兵與民休息洵為至計惟是將衆兵繁若撤之太驟則易致驚疑太遲又恐貽患目下當安反側之心日久務防難制之勢紅毛夾板船雖已回國然往來頻仍異時恐生釁端閩省兵馬錢糧專望協餉倘若外解不周則有意外之虞至數年以來令濵海居民遷移內地咸苦失其故業宜略寬界限俾獲耕漁稍蘇殘喘疏上得旨李率泰原以才能蒙世祖章皇帝特簡浙閩總督自任總督以來克副簡任之意殫力報效𠞰撫賊寇多建功績且忠清素著正資調度今以久任巖疆積勞病殞深可憫惻下所司議恤加兵部尚書豫祭葬如典禮諡忠襄明年敘功追贈一等男子正宗襲剛阿泰剛阿泰漢軍正藍旗人李永芳第三子也幼隨父自撫順所來歸及長屢從征伐順治五年十一月授九江總兵未任值叛鎮薑瓖作亂改授宣府總兵明年三月至鎮時山西至宣化山賊並起懷來所屬之礬山狼窩蔚州所屬之三澗辛莊黑山所在屯聚剛阿泰甫蒞任即率兵赴懷來逼礬山而營遣𠫭將頗重耀等分兵攻狼窩殪賊甚多礬山賊首王海等懼悉衆來歸會辛莊賊劫桃花堡剛阿泰移兵疾馳抵蔚州率兵搜山賊糾衆三百拒戰我軍奮擊斬馘七十餘賊敗竄追𠞰至黑山設伏山隘攜炮具進攻賊潰伏發悉殱之獲其牲畜器械三澗等賊聞風就撫五月奉命𠞰易州土寇遣𠫭將羅映台等進兵麻黃谷以巨炮燬其巢復統兵自紫荆關循邉牆搜𠞰至昌平屬鎮邉城撫定其衆乃還鎮六月疏言臣任宣鎮兩月三𠞰山寇共招撫賊首王海等二十三人餘賊一千三百餘人或隨營收伍或安插歸農尚恐猜疑未化請發恩諭免死以安反側又言宣鎮營制近議裁併臣思經制有昔設而今可裁者有今宜設而昔未立者道在因時變通鎮標舊有鎗炮分𨽻各營本難畫一今盡調赴山西協𠞰臣思火器一營必須専設以資援𠞰請於宣屬四營內每營抽撥戰守步兵各七十五名演習施放别成一營領以遊擊使之朝夕訓練庶幾緩急足恃疏並下兵部議行六年九月大軍既平薑瓖餘孽張五桂髙鼎劉永忠等竄代州定襄繁峙五臺山中糾衆犯五臺縣城宣大山西總督佟養量檄剛阿泰率兵援𠞰十月至代州偵賊屯聚竇村我軍悉鋭乘夜襲擊斬偽副將張賔偽守道張秀等十餘人賊驚潰追擊大獲城下賊聞之懼解圍去我兵躡賊蹤凡再敗之髙鼎劉永忠遁入靈邱之曹岩寨據岩險拒守其黨分布五臺之窰頭柏寨定襄之滹沱七角諸寨七年正月我軍分路圍𠞰剛阿泰與右衛副將徐長春由東北間道進逼窰頭寨破之斬偽副將一賊退守柏寨塞山隘以自衛張五桂復糾賊赴援我軍攀崖以上賊失隘驚竄我軍力擊并敗援兵擒五桂獲偽總兵印餘衆皆降八月滹沱七角諸賊糧盡亦降我軍進逼賊寨寨髙數百丈四面峭削不可上乃募勇健數十夜半從别徑絙綴援手而登繼以衆軍發炮直轟寨門賊駭逸偽總兵董景誼等自焚其巢而死髙鼎妻及其父髙來貢就俘山寨悉平八年二月師旋三月敘功加都督同知先是剛阿泰𠞰賊時以山西省應解宣鎮兵餉截留散給移咨督餉主事奏銷户部以援𠞰兵內有已經部議裁汰者駁令宣大總督佟養量核奏尋以調𠞰在先議汰在後奏奉諭旨準銷及銷册上數復不符為户科給事中髙辛允所劾下養量察審剛阿泰疏劾已升督標副將之舊任鎮標參將張世忠冒領侵欺得旨革世忠職勘擬治罪十年九月養量疏言宣鎮餉銀六萬七千兩有竒侵沒非止一人且恐朦混支銷為數尚多張世忠出入必由自無所逃其罪前任餉司徐兆舉陸元龍扶同銷算罪亦難辭今奉旨嚴察須直窮到底臣調審領銀之員役剛阿泰身為主帥俱抗庇不發侵吞之弊顯然請旨一併裭革赴省質訊奉旨數萬餉銀任意侵剋大干法紀及奉諭察審經手人員又抗匿不出殊可痛恨張世忠已經拏問追擬其餘干涉員役俱令分别嚴行察議議未上剛阿泰劾養量袒護世忠據其委罪妄扳之詞誣指侵吞抗庇養量復劾剛阿泰驕悍欺罔疏並下部察議給事中王廷諫許作梅並以宣府重鎮文武互訐恐致貽誤封疆交章論劾請敕三法司拘犯會鞫上命户部侍郎覺羅額爾德等赴宣化察審十一年正月以世忠未曾冒領剛阿泰未曾侵吞督鎮逞忿互劾覆奏下部議處會甄别督撫大臣解養量任部議剛阿泰逞忿乖張應革職其餉銀支銷有無情弊令新任總督馬鳴珮再審尋奏張世忠具印領支餉即時散給兵丁並無侵欺值剛阿泰赴陽和閲兵未及申報及回又未面啓即赴督標新任剛阿泰未見領餉底册致銷册不符因劾其冒領罪在張世忠目無主帥不申不報應豫杖懲疏仍下部核議從之以剛阿泰已經革職毋庸再議尋回旗卒於家巴顔巴顔漢軍正藍旗人李永芳第五子也天聰八年襲父三等子爵崇德六年任𠫭領從太宗文皇帝征科爾沁有功復從圍錦州時明總督洪承疇領兵十三萬來援聞太宗親征遂退守松山我兵四出追擊巴顔與都統石廷柱等運巨炮以從大敗承疇於松山城下七年三月明副將夏承德獻松山城巴顔與石廷柱等奉旨收藏所獲鎗炮火藥以備用六月增漢軍四旗為八旗巴顔任正藍旗都統八年九月隨鄭親王濟爾哈朗等征寧逺拔中後所及前屯衛順治元年二月敘寧逺功晉二等子五月同石廷柱統兵𠞰昌平州寇尋同都統葉臣徇直𨽻饒陽河南懷慶山西澤州潞安諸郡邑皆下之凱旋賜白金五百兩二年十一月奉命帥左翼兵與右翼都統李國翰會定西大將軍和洛輝於陜西進𠞰四川三年正月流寇孫守法賀珍等犯西安府巴顔與和洛輝夾擊之殱其衆殆盡賀珍復并力拒戰巴顔與副都統齊默克圖擊破之珍收合餘燼馬步兵約五千列陳山上巴顔登山奮擊賊衆未戰而走遂追敗之於濠泗河三月收𠞰黑水峪斬守法降賊衆二千進𠞰流寇一隻虎於商州賊兵二萬據山為陳巴顔與和洛輝督戰斬萬餘級復率兵偕副將王平等擊敗延安諸路流寇追賊至張果老崖賊入山寨我兵掘濠圍之夜潛攻克其寨擒斬賊渠獲馬騾無算五年六月敘功晉一等子十一月帥左翼兵載紅衣炮赴大同討叛鎮薑瓖六年隨睿親王多爾衮復渾源州又隨英親王阿濟格復左衛隨巽親王滿達海復朔州汾州及太谷諸縣巴顔在軍中每指麾左翼兵發巨炮以攻所向皆克八年敘平薑瓖功晉三等伯兩遇恩詔加至一等伯九年正月卒年三十有三賜祭葬如例子釋迦保襲爵佟岱佟岱漢軍正藍旗人先世居佟佳父佟三太祖髙皇帝時來歸任副都統佟岱其第三子也初任佐領崇德元年從太宗文皇帝征朝鮮師還以縱掠降民巧言掩飾論罪應死命從寬罰贖革佐領奪俘獲三年授吏部副理事官兼任𠫭領六年隨大兵圍明錦州明援兵自城出戰佟岱率兵擊敗追至城壕始還其夜明兵犯我營欲奪紅衣炮佟岱與副都統金維城奮擊郤之七年四月隨鄭親王濟爾哈朗攻克塔山杏山及附近諸臺堡六月擢正藍旗漢軍副都統八年隨鄭親王征明寧逺拔前屯衛及中後所二城敘功豫騎都尉世職順治元年同都統葉臣等征山西以炮攻克太原城二年隨英親王阿濟格𠞰流賊李自成於陜西敗之延安追至湖廣獲賊船於富池口英親王征江西至九江班師佟岱與投誠總兵金聲桓駐守九江府旋遣兵與聲桓平定南康南昌建昌撫州袁州等府以所俘獲奏聞因疏言故明鍾祥王朱慈𥒪等皆衰殘廢棄或姑存餘喘以彰我朝浩蕩之仁得旨故明諸王俱令赴京朝見時湖廣總督羅繡錦未之任佟岱暫署湖廣總督三年率兵還京授兵部左侍郎是年秋隨恭順王孔有德征湖南四年自嶽州進長沙偽總兵王進才等聞風遁師次湘潭偽伯黃朝宣擁衆數萬屯燕子窩佟岱與有德及副都統藍拜等由水道進據瀘口擊破北岸營追擒朝宣於衡州進攻寶慶克之聞明桂王朱由榔據武岡夜發兵疾進敗其衆并焚木城又敗其國公劉承允於夕陽橋遂克武岡由榔遁廣西五年十月凱旋得優賚敘功加一雲騎尉六年隨睿親王多爾衮討大同叛鎮薑瓖敗賊兵於傅家嶺又同都統左夢庚擊敗賊兵進拔渾源州及左衛朔州汾州太谷等城敘功並三遇恩詔晉世職至一等輕車都尉兼一雲騎尉纍遷户部吏部侍郎十一年擢浙江福建總督十二年冬海賊鄭成功陷舟山十三年正月復陷台州時佟岱與巡撫秦世楨不協劾世楨運餉不繼致舟山士卒叛降世楨亦劾佟岱不巡閲海疆且不循例駐衢州欲以巡撫廨署自居忿戾相爭逞私詆誣狀上調世楨為操江巡撫詔佟岱解任還京佟岱不即行且上疏自敘𠞰撫功上切責其冒功戀祿命新任總督李率泰巡撫陳應泰會同巡按御史王元曦察核佟岱與秦世楨挾忿相爭貽誤封疆情罪率泰等覆奏舟山失陷世楨不能先事密防咎亦難辭佟岱忿爭失體久駐杭州不一至海濵實貽誤封疆疏下部院確議世楨應降一級調用佟岱應降世職一等上以所議尚輕飭再議革去恩詔所加世職留其軍功所得三等輕車都尉康熙二年卒子佟徽年襲佟國印子世德佟國印漢軍正藍旗人父佟恆年以驍騎校隨其從父佟養正守朝鮮界之鎮江城太祖髙皇帝天命六年守城中軍陳良策叛執養正投明總兵毛文龍恆年亦被執不屈死贈騎都尉世職以弟成年襲尋卒國印襲職太宗文皇帝崇德三年授工部副理事官六年隨睿親王多爾衮征明圍錦州與都統石廷柱擊敗吕洪山步兵上親統大軍進征圍明總督洪承疇於松山敵兵有逸入髙橋南三臺者國印與都統劉之源以炮攻克之盡殱其衆七年四月鄭親王濟爾哈朗等圍杏山塔山國印俱以炮擊其城下之敘功加一雲騎尉尋遷工部理事官奉命同副都統馬光輝等赴錦州督鑄神威炮十月隨饒餘貝勒阿巴泰征明由黃崖口入邉時明將於沿邉設臺駐兵防守甚密國印同都統李國翰屢擊敗敵衆克邉臺七又擊敗牆子嶺守兵八年鄭親王征明寧逺既克中後所進取前屯衛國印以紅衣炮擊其城風回炮火傷頷下創甚攻城益力卒克之順治元年敘功晉二等輕車都尉三年擢工部右侍郎六年任都察院參政七年九年三遇恩詔晉爵三等男十二年以疾解任康熙十一年四月卒賜祭葬如例子世德初因國印乞休襲爵尋授參領康熙十三年擢正藍旗漢軍副都統十四年八月隨貝勒洞鄂征叛鎮王輔臣於平涼賊衆迎拒世德同都統海爾圖率兵擊郤之賊復倚山據險列陳世德率兵直前衝擊破賊陳追斬甚衆十五年同前鋒統領穆占設伏於平涼之南山擒賊偵卒擊敗賊騎百餘賊將屢糾衆來犯世德率兵五戰皆捷復以紅衣炮擊毁賊壘殱賊無算尋招降王輔臣及其叛黨陳彭等並在事有功十七年命隨撫逺大將軍圖海規復漢中興安十九年五月卒於軍賜祭葬如例子銓襲爵馬如璧馬如璧遼陽東寧衛人𨽻正藍旗漢軍太宗文皇帝崇德五年任驍騎校隨睿親王多爾衮圍明錦州敵以千餘騎出城迎犯如璧隨侍衛李國翰戰卻之復擊敗松山步兵及杏山騎兵尋進攻杏山松山兩路臺堡並隨都統石廷柱以紅衣炮破之六年隨鄭親王濟爾哈朗圍明錦州攻克駱駝山寨敵兵自十三站乘夜來襲營佐領禧福率甲士出戰如璧同參政碩詹馳馬陷陳殺敵甚力會明總督洪承疇等合步騎十三萬來援錦州上親統大軍駐營松山指授方略如璧隨都統巴顔石廷柱等徇塔山路以紅衣炮攻下附近諸臺七年授佐領隨鄭親王取塔山杏山二城八年復隨鄭親王取中後所及前屯衛皆以紅衣炮攻城有功順治元年敘功豫騎都尉世職兼任參領二年隨英親王阿濟格𠞰流賊李自成於陜西追至湖廣屢戰皆捷與𠫭領劉仲錦等擊走偽總兵馬進忠於武昌獲賊船十有一六年隨鄭親王征湖南時明桂王朱由榔據武岡自成遺黨李錦劉體純王進才皆附之分據寶慶衡州如璧由嶽州進長沙趨衡州屢擊敗其兵復同副都統金維城破之於靖州其衆皆潰奔如璧奮力窮追遇伏步戰力竭殁於陳七年遇恩詔於騎都尉加一雲騎尉尋議恤晉三等輕車都尉子純德襲世宗憲皇帝時以如璧入祀昭忠祠劉仲錦劉仲錦遼陽東寧衛人後𨽻正藍旗漢軍太宗文皇帝崇德五年任佐領隨睿親王多爾衮圍明錦州敵騎兵千餘自城中出戰仲錦隨左翼兵迎擊追至城下始還尋復擊敗松山步兵杏山騎兵及吕洪山口步兵七年鄭親王濟爾哈朗攻塔山發紅衣炮擊其城西城圯二十餘丈仲錦率所部兵先登克之進攻杏山城復以炮擊毁城垣二十五丈城中窘迫遂降敘功豫雲騎尉世職八年三月隨護軍統領阿爾津哈寧阿等征黑龍江呼爾哈部克其博和哩諾爾噶勒都里三屯俘獲甚衆招降小噶勒達蘇大噶勒達蘇綽庫禪能吉勒四屯凱旋賜貂皮白金九月隨大兵征明寧逺以紅衣炮攻克中後所前屯衛二城敘功晉世職為騎都尉順治元年大兵既定燕京仲錦任户部理事官兼參領隨都統葉臣征山西取太原府旋隨英親王阿濟格𠞰流賊李自成於陜西追至湖廣屢擊敗賊衆偽總兵馬進忠遁獲其戰艦十有一五年擢兵部侍郎六年隨睿親王討大同叛鎮薑瓖復渾源州左衛及汾州皆以紅衣炮攻城有功七年授山東臨清總兵官加都督同知先是仲錦以征流賊平薑瓖功晉三等輕車都尉世襲罔替復以考滿並三遇恩詔洊晉一等輕車都尉兼一雲騎尉十年改福建右路總兵官加左都督鎮守泉州十一年八月上以仲錦有疾不能任事詔解任還京調治尋卒賜祭如例子芳聲襲張朝璘張朝璘漢軍正藍旗人父士彥明廣寧巡撫中軍守備天命七年太祖髙皇帝征廣寧明巡撫王化貞遁去士彥來降天聰八年授三等輕車都尉旋乞休朝璘襲職崇德七年任佐領隨貝勒阿巴泰征明過北京往攻登州府師次膠州遇敵兵擊敗之八年隨鄭親王濟爾哈朗征明攻克中後所前屯衛二城晉世職二等輕車都尉任兵部理事官順治二年隨豫親王多鐸征江南以紅衣炮攻克揚州府城及江隂縣城尋率兵駐防蘇州遇明總兵黃蜚等擁衆來犯同副都統吉山擊卻之復同前鋒統領努三率兵追𠞰黃蜚等敗退旋合兵從水路來犯朝璘同𠫭領索爾敏進兵擊之潰獲其船四年隨恭順王孔有德平湖南時明桂王朱由榔據武岡州朝璘與協領烏赫訥率兵疾進夜遇明總兵曹志建扼於路朝璘督兵擊之敵敗奔入木城朝璘進攻擲火毬木城中城焚敵衆大潰其國公劉承允率衆拒戰朝璘偕諸將擊敗之夕陽橋遂克武岡州承允降明桂王走靖州其將張先璧據沅州别部衆據黔陽縣列五營朝璘同副都統蘭拜等敗之進克沅州府六年隨睿親王多爾衮討叛鎮薑瓖於大同復渾源左衛及朔州汾州太谷等城是年以考滿稱職晉一等輕車都尉八年敘江南湖南山西功晉三等男旋授正藍旗漢軍副都統九年兩遇恩詔晉一等男十年授都察院左副都御史十三年遷户部侍郎尋奉命巡撫江西時南昌瑞州當金聲桓叛亂後農田荒蕪賦額多虛巡按御史笪重光請豁免部臣恐有以熟作荒情弊請下督撫議朝璘覆奏荒蕪田畝惟循序勸墾則熟者常熟荒者不致久荒若編派起科則始焉包荒於熟漸至熟者仍荒非足國恤民計今南昌瑞州二府新墾荒田四千餘頃應三年後起科其未墾者二千餘頃請槩與豁除以勸墾耕而資生聚得旨允行十五年以解廣西協餉功加兵部尚書銜十八年擢江西總督康熙二年江西右布政使王庭奏減南昌府屬浮糧下朝璘議朝璘疏言江西自陳友諒橫行徴派明代相沿未改前巡按御史吳贊元切陳其事部議令確核志牘旋遭金聲桓叛亂志牘散亡是以前撫臣蔡士英僅據右布政使莊應會所得故牘請減袁瑞二府額徴而未及南昌今志牘復出惟武寧縣因陳友諒生身之地未浮宋元舊額其餘六縣一州浮糧請敕部察核志書減免尋部臣覆奏浮銀十九萬五千餘兩米十四萬九千餘石上命悉與豁除三年朝璘疏言吉安府向食粵鹽相隔千餘里且有十八灘之險請改食淮鹽俾商民交便事下所司從之四年以江西總督裁併江南解任五年正月補福建總督六年以老疾乞休還京越十餘年卒子聖鐸襲一等男爵佟國瑶佟國瑶漢軍正藍旗人二等子佟養性之孫也養性卒子普漢六十遞襲六十於順治初年三遇恩詔晉三等伯授副都統子國瑶順治十七年襲伯爵康熙九年擢正藍旗漢軍副都統十二年十二月逆藩吳三桂反上以湖南鄖陽地界三省山谷厄塞姦民易嘯聚且恐賊乘間侵犯特授國瑶為鄖陽提督往駐防十三年三月襄陽總兵楊來嘉通吳逆據榖城叛鄖陽副將洪福應之劫所部兵千餘反攻國瑶署國瑶率逰擊杜英佟大年以健丁三百名奮勇衝擊賊退復來連日格鬬十餘陳斬首二百餘級賊遁走疏聞得旨嘉奬下部優敘加左都督十四年四月洪福及叛將等分五路犯鄖西復大敗之追𠞰至泥河口板橋河陳斬偽副將林躍等七人殺賊兵數百十五年三月四川叛鎮談洪犯鄖江北岸洪福等出掠鄖江南相聲援國瑶分兵𠞰禦敗賊於坪溝黃畈九里岡又渡江擊賊於南岸連敗之焚其舟械擒斬無算九月洪復遣衆伏鄖江兩岸以三十餘舟順流下泊琵琶灘進逼鄖陽運道塞國瑶與將軍噶爾漢撫治楊茂勳等率水陸兵大破之於沿江及陡嶺糧運始通敘功加一等十六年七月以捐賞兵丁難民功加太子少保十七年二月進𠞰楊來嘉洪福諸逆於房縣擒偽副將以下五十二人獲偽印十二劄牌二十四房縣保康相繼復十八年五月偕噶爾漢等𠞰賊於興安以日久未下部議盡削前功詔止削陡嶺所敘一等功二十一年六月授福建將軍諭曰國家設立督撫提鎮原以為民孟喬芳總督陜西李率泰總督福建能潔已奉公愛民恤士秦閩人至今思之爾到地方宜恪遵國憲安輯兵民二十二年四月疏言京口將軍所統每旗協領參領防禦驍騎校共十七員今福建駐防每旗止四五員邉海重地軍務不可乏員料理請增協領以下驍騎校以上等官下部議駐防四旗應各設協領一員參領一員防禦五員驍騎校五員二十八年八月卒於任賜祭葬如例諡忠慤其伯爵以子海福襲佟養甲佟養甲遼東人先世為滿洲居佟佳繼遷撫順父佟拱隨族人養正等來歸後𨽻漢軍正藍旗太宗文皇帝時養甲入直內院理事順治元年從世祖章皇帝定鼎燕京二年授總兵官銜隨貝勒博洛率師南征越明年下杭州平福建十月加巡撫廣東銜署兩廣總督事與署提督李成棟率兵定廣東是時明唐王朱聿鍵弟聿􅟽據廣州擁兵聚寇僭號紹武養甲與成棟定惠潮二府亟趨廣州令前鋒軍悉用紅帕裹首偽為廣州援兵狀以惠潮道印為文書紿守者奪門入擒其諸王世子十三人復與成棟議以南雄韶州兩郡連控江楚肇慶為兩粵咽喉梧州為粵西門户宜先撫南韶以通江右之援定肇慶以扼兩粵之吭取梧州以固肇慶之籓乃檄總兵葉承恩及副將李仰臣兵進南韶成棟兵進肇慶皆授策𠞰撫三郡悉平會明閣部丁魁楚擁明桂王朱由榔自肇慶竄梧州養甲復令成棟移兵進𠞰魁楚等皆遁走遂下梧州分遣總兵徐國棟取髙雷廉瓊四府養甲自駐廣州招降海上四姓賊首鄭昌四年加兵部尚書銜實授總督兼任廣東巡撫時標營將士調遣四出廣州駐兵僅存百餘人海賊馬元生石璧徐貴相及白旗賊黃信林芳等窺伺兵力單弱集聚數萬突犯廣州養甲督令官兵守陴躬冒矢石扼太平門關外橋梁鼓勵鄉勇力戰殺賊陳斬數百級生擒百餘人餘賊遁入海尋偕成棟率兵徇增城順德東莞三水新寧諸邑皆就𠞰撫明總兵李承志李明忠以平樂潯州二郡兵來降即令收定左江右江諸路六月招降明趙王裔朱由棪及其將李士璉七月明閣部陳子壯尚書張家玉率賊萬餘寇廣州指揮楊可觀將以城為內應養甲伺其謀擒斬之督兵守禦成棟亦以兵赴𠞰焚賊舟賊遁越六日復來犯又敗之是時廣州初定監司守令未及銓授養甲疏請廣東布政使耿獻忠為廣西巡撫復慎簡廉吏請旨酌用又請移大同兵五千至兩廣資防𠞰其頻年隨征士卒增給資糧以示優恤凡新降將卒才勇者或留營訓練或分駐要隘餘令歸農會部議徴順治三年額銀四分之一以給餉養甲言粵省連遭寇掠請緩至順治四年為始諸疏並下部議行先是雷廉二郡珠池每嵗例遣官開採養甲以地險費繁恐傷民力請罷其役得旨俞允時明桂王朱由榔據桂林兩廣人心觀望有潛附由榔黨屬孫可望入滇黔為寇者養甲策遣將士進攻由榔疏請造弓矢火器備戰具分遣禁旅進𠞰雲南貴州上以廣西未定而恭順王孔有德已奉詔軍湖南防𠞰孫可望特諭養甲悉心安輯兩廣所請俟有德疏報再議養甲之署兩廣總督也成棟以總兵署兩廣提督率師偕往既而養甲奏平定粵嶠成棟功多請實授成棟為廣東提督成棟自負功績以養甲奏授官職不兼兩廣意殊不平又素與養甲部將郝尚久爭功有隙遷怒養甲五年閏四月成棟據南雄叛受由榔封爵與江西叛鎮金聲桓互為聲援養甲移書贛州守將策應書為成棟所獲益恨之乃以兵四百人劫養甲擁至肇慶養甲詈賊不屈成棟密使其黨張祥賊殺之事聞贈太子少保廕一子入監豫祭葬入祀昭忠祠及廣東名宦李日芄李日芄遼東人太宗文皇帝時日芄以生員入內院理事賜人五户𨽻漢軍正藍旗順治元年定鼎燕京授日芄直𨽻永平府知府三年遷霸州兵備道既之任授策州牧張儒秀諭降土賊李振宇等數百人尋擢左僉都御史四年加右副都御史銜任操江巡撫會叛鎮金聲桓蹂躪江西上遊告警日芄親督官兵於小孤山磨盤洲扼𠞰檄江防同知趙廷臣與𠫭將汪義逰擊袁誠等迎擊賊艘五年敗賊於彭澤賊兵中炮及溺死者無算獲戰艦二十餘六年五月裁安徽巡撫命日芄攝其事先是安慶府之桐城潛山太湖三縣有賊渠余尚鑑者以擁立明宗室朱統錡為名糾金聲桓餘黨據險為巢凡二十餘寨時出侵掠十月日芄遣副將梁大用等攻皖澗寨克之進圍飛旗寨凡七日斷賊水道賊兵四出衝突日芄分兵為四路合擊之賊衆大潰連拔飛旗桃園等寨獲朱統錡及余尚鑑斬之大和山小和山等十八寨相繼歸順七年加兵部右侍郎十年發兵𠞰徽州府之赤嶺土賊斬賊首張惟良諭降其衆十一年二月特旨甄别直省督撫詔加日芄兵部尚書是時明魯王舊將張名振屢犯鎮江瓜洲截劫漕艘日芄於鎮江城外檀家洲水淺處植木樁深處編木筏環以鐵索大江南北岸及金山俱列大炮南岸自鎮江至圌山北岸自瓜洲至三江口更築新隄造木橋以通巡兵往來令圌山瓜洲等四營守備率哨船水師更畨防禦羣賊潛匿江中謀寇掠輒為標營偵擊俘斬略盡十二年八月加太子太保十一月卒賜祭葬如例諡忠敏立碑墓道秦世楨秦世楨廣寧人𨽻正藍旗漢軍順治二年由貢生除直𨽻文安縣知縣三年行取考選授四川道監察御史疏言各省賦役有恩詔裁免而奉行未畫一者請令州縣具册呈部核定發刋俾知遵守得旨允行四年巡按浙江以審擬叛案輕重兩請部議降一級調用世楨疏辨以巡撫蕭起元不先咨議徑列其名入奏無由駮正命復原官六年巡視北城八年以六等甄别臺員世楨列一等尋命巡按江南是年八月疏言臣自淮揚至蘇州察知蠧役害民有勘鞫得實者嚴治其罪而揚州蠧役聚黨百五十人宰牲盟誓欲并力合攻訴告之人臣已執為首者數人繫獄待訊因思懲積蠧於事後不若立法使不為蠧請敇督撫司道及府廳州縣毋於經制外濫設胥役一人並定以年限勿容久充上是其言如所請時當兵燹之後田畝界址混淆者多官為丈量胥役乘以舞弊世楨令里長編列魚鱗册新舊互核使業户自相丈量贏縮胥復其舊荒坍並區别之又前此州縣徴賦民有逾額輸納者世楨限夏稅五月秋糧九月先給易知單示以科則定數然後開徴又每甲彚列賦額及輸户為滚單使里長按户遞傳既輸則填注之違則送縣追比以省追呼三者皆先行之蘇州人以為便遂條列以聞通行諸郡又以徴銀設匱之制有司奉行不實請增司府印封日收簿亦鈐司府印輸户自封投匱驗數書之簿别與印單執之將啓匱封先申牒院司候稽核復請革僉點糧長民兑漕運之例改為官收官兑疏並下部議行著為令十月劾巡撫王國寶貪婪狀詔革國寶職下總督馬國柱會同世楨訊治世楨復言江南素稱澤國民之無田里樹畜者以捕魚資生蘇常鎮三府舊有漁户嵗輸公用銀不列正課自國寶為巡撫加徴十倍漁户力不給終年敲撲苦纍日深請概行禁革得旨下部核議飭禁十年還京遷大理寺寺丞十一年授浙江巡撫時海賊鄭成功侵據福建窺伺浙江世楨條列移兵防守增造戰艦精選水師諸要務又以沿海漁船往往容匿賊匪宜以時稽核請籍其姓名按保甲法以二十五船為一隊責成鎮道譏察無事聽其採捕有事則助守禦疏並議行十二年海賊掠溫州台州寧波復聨結賊衆數萬犯舟山副將巴成功從賊賊遂據舟山先是賊陷漳州總督佟岱移浙江各營步騎三千率以赴援至是佟岱還杭州以戰艦巨炮不速造漁船採捕弗禁止咎世楨連章入告上命部臣核議部臣以炮艦造未逾期漁船採捕一年以來世楨奏獲越境私市者三十餘人未嘗疏縱豫免議佟岱復劾世楨不給餉舟山致士卒叛降且薦庸懦之巴成功為副將貽誤重地世楨訴給餉循例無缺薦擢由提督田雄主議因述佟岱忿戾逞私狀疏並下巡按御史察奏給事中王紀謂浙閩方用兵督撫嫌隙已成恐悮事機請即豫更調上乃調世楨為操江巡撫代以山西巡撫陳應泰及巡按御史葉舟察奏世楨無罪佟岱忿戾逞私有據詔佟岱解任以兩廣總督李率泰代之命世楨暫管總督事俟李率泰既至赴新任十三年七月世楨赴任操江會佟岱已還京上復命李率泰陳應泰會同巡按御史王元曦確核仍如葉舟所奏下部議以舟山失陷未及恢復世楨亦不能辭咎應並與處分十四年三月革佟岱世職世楨先以京察才力不及議降一級調用至是革職時世楨年已老尋卒於家欽定八旗通志卷二百六
