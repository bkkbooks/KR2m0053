body:
  text: 欽定四庫全書欽定八旗通志卷七十三土田志十二各處駐防地畝設立規制給地數目設立規制順治二年九月諭戶兵二部曰近來土賊竊發民不聊生如直隸順德府山東濟南府德州臨清州江北徐州山西潞安府平陽府蒲州八處著滿洲統兵駐劄務期𠞰撫得宜以安百姓以上八處駐劄滿兵者給以無主房地其故明公侯伯駙馬太監地察明量給原主外餘給滿洲兵丁四年題準江寧駐防旗員給園地三十晌至十晌不等西安駐防旗員給園地四十晌至十五晌不等又題準浙江駐防官兵不給田俸餉照經制支領五年題準各省駐防官兵家口半携去者其在京園地半撤全携去者全撤又題準直省駐防官應給潦地米所留家口在京支給隨帶家口在駐防所支給六年題準外省駐防官員初任未經發給園地者準令撥給其加級升任者不復添給凡應給地十晌以下者户部撥給十晌以上者奏請撥給七年題準駐防官員量給園地甲兵壯丁每名給地五晌臨清太原以無主地並官地撥給保定河間滄州以八旗退出地撥給八年題準由太原府移駐滄州兩白旗馬甲三十七名移駐臨清兩黃旗馬甲三十一名移駐河間府原册不言何旗謹闕之馬甲二十八名共九十六名所有遺下營房地畝交太原城守尉收貯其由滄州移駐太原府之正藍旗馬甲三百一十七名即以此項撥給如不及數著地方官籌措間地添補每馬甲一名房一間每一壯丁務足五晌之地其馬甲等錢糧亦每月照常給領再移駐河間臨清滄州之馬甲等其耕種糧草該地方官取彼與此亦將伊等留下之項逐件開明咨覆京城以便行咨移駐處照數還給如有未留者其移駐處亦無庸給領康熙二十一年奉旨盛京山海關等處官員年老病故之寡婦孤兒仍在原任處居住給原官房屋地土三十一年題準將山西陽曲太原二邑所屬享堂等六屯地畝撥給駐防滿洲官兵又覆準陽曲地畝被圈將太榆清欣四州縣屯地撥補但屯頭佃户倚恃隔屬不肯完租被圈之民賠纍照直隸之例令州縣官代徴解給被圈之民倘有拖欠照例處分三十二年議準各省駐防旗兵均在所住之處給與地畝五十七年覆準山西右衛苧麻口外西至十家鋪三十里東至彌陀山十五里共有荒地四千五百餘晌差官丈量安設莊頭十五名五十八年題準滿洲官兵駐劄河南南陽府揚河地方所有墾荒地畝給與耕種為業又户部例載八旗人員不許在外省置買産業違者産業入官其駐防兵丁準其在外置立産業謹案此例乃乾隆二十一年所定詳見塋地一門乾隆三十一年十一月綏逺城將軍嵩椿奏請將右衛牧厰餘地招民墾種並於此內撥地二十頃給阿貴廟喇嘛養贍三十二年五月覆準牧厰餘地分段丈量正藍旗為一段正黃正紅鑲紅三旗為一段鑲藍旗為一段其中堪以墾種者共計一千六百餘頃應於歸綏道所屬五廳及大同朔平二府屬沿途州縣招募佃民每地五頃作為一分資本有餘者準給一分力量不足者數人合認一分俟入册翻犁後給以印照管業準其當年自收籽粒以償工本定限次年起科其餘遞年墾熟陸續升報其地隸和林格爾及清水河二廳所有應徴租銀即交與該通判經徴就近解綏逺同知衙門撥充旗營兵餉至開墾一千六百餘頃外尚有八百餘頃係砂磧山溝不成片段俟將好地墾成後飭令零星開種升科以盡地利其所募佃民約需千有餘户即令兩通判度地酌設村莊俾其聚集一處以便稽查彈壓無須另設員辨此外編記定號刨挖溝濠及一切應行事宜照察哈爾牧厰成例辦理並奉旨依議三十六年十一月軍機處議準江寧滿城間空教場開墾地三千四百畝每年所收租銀一千五百六十四兩賞為八旗官學紙張弓箭及兵丁運柴腳費之用三十八年閏三月户部議山西巡撫三寶所奏豐鎮廳屬二道溝等村旗地五百六十頃二十畝被水沖汕難以耕種所有租額銀七百八十四兩有竒準其豁除奉旨依議四十七年八月户兵二部議覆杭州將軍奏請杭州駐防牧厰地畝內劃出九千畝召民墾種於乾隆五十年起租每年所收租錢五千八百貫賞為養贍八旗孤寡并幫貼兵丁差使之用五十七年山西巡撫長麟奏言太原滿營額設駐防兵六百名匠役四名養育兵四十名從前奉派出京時準將在京地畝報明交部即於太原府地內照數撥給俾得就近取租以資養贍遇有絶嗣兵丁扣留三分作為祭掃之用其餘七分報明入官凡在兵丁叨沐皇仁至優極渥惟閲年既久生齒日繁其孀婦孤男孤女等項漸積衆多向來議有養贍臣逐一詳查現在滿營有孤男三十七名孤女三十七口均無父兄經理臣分飭四旗章京等將孤男孤女年嵗相當者一體定為婚配將來遇有兵丁匠役缺出陸續頂補即可敷其養贍毋庸另行籌議其孀婦一項共查有二百零二口內有四十口並無子姪可依者即有逺房户族未必力能兼顧難免不周之慮伏惟皇上愛養旗民曲賜矜恤臣與城守尉等再四商酌仰懇皇上格外天恩俯準將前項入官地畝仍賞滿營以為養贍孀孤之用計現有入官地九頃六十六畝六分五釐每年官收租銀二百一十二兩此項地畝若令自行招佃夥同耕種可得銀四百餘兩現在無依孀婦四十口均勻散給每口每年可得銀十兩有竒太原風氣儉朴儘可藉資養贍請自本年為始即行酌撥分賞並請嗣後遇有絶嗣地畝亦俱仍歸滿營添補分用年終報部核銷奉硃批好即賞給以上設立規制給地總數直隸保定府駐防城守尉一員防守禦四員驍騎校四員筆帖式二員領催四十名披甲四百六十名弓鐵匠四名內給官員地共六頃一十畝撥什庫披甲弓匠一百三十七名間散寡婦九名共地一百二十六頃五十畝撤回京城兵丁已故者一百二十四名共地一百十六頃二十二畝本駐防來册滄州駐防城守尉隨衙門五壯丁地在王家莊正白旗滿洲旗分章京隨衙門一壯丁地在孟家莊蒙古旗分章京隨衙門二壯丁地在孟家莊又本身十六壯丁地在孟村等四莊鑲白旗滿洲旗分章京隨衙門六壯丁地在王御史莊蒙古旗分章京隨衙門一壯丁地在齊家莊正白旗滿洲領催披甲間散人等共九十七壯丁地在孟村程家林孟家莊穆家莊等處蒙古領催披甲等共八十一壯丁地在孟村程家林新店趙官屯王家寨西莊曹家莊宋家莊等處鑲白旗滿洲領催披甲等共一百零八壯丁地零二十畝在程家林許村新店王家莊穆家莊孟村三十五里鋪白楊橋李三橋新莊等處蒙古領催披甲間散人等共六十壯丁地零十八畝在新店捷地禇村程家林高家莊孟村齊家莊秋家莊蠻西莊等處本駐防來册康熙元年滄州駐防退出南皮縣地六十六畝六分零本縣來册雄縣駐防鑲紅旗披甲地共三頃六十畝鑲藍旗披甲地共一頃八十畝蒙古披甲地共二頃七十畝康熙四十五年撥給駐防章京地六十八畝又七十四畝本駐防來册宣化府萬全縣市口駐防康熙二十三年撥給地六頃八十二畝五分順治四年至康熙四十八年退出地共八頃六十四畝本府來册山海關駐防順治二年初設雲騎尉品級章京四員每員俸米地五十晌筆帖式二員每員俸米地四十晌甲兵四十六名每名口糧地十晌康熙十四年添設城守尉一員俸米地八十晌八旗佐領八員俸米地照前章京驍騎校八員俸米地同筆帖式筆帖式三員俸米地照前甲兵八百名口糧地照前二十年撤去甲兵四百名官員照舊俸米地口糧地每員每名俱照舊二十七年改城守尉為總管除總管筆帖式存留甲兵六十六名外其餘官員甲兵俱撤在盛京沿途駐防從京補授雲騎尉品級章京八員添甲兵九十四名共一百六十名其俸米地口糧地俱照前本駐防來册康熙三十一年換給駐防總管撫寧縣地三頃八十四畝在髙兒莊本縣來册三十四年添設驍騎校八員甲兵四十名共甲兵二百名俸米地口糧地俱照前三十五年户部議準山海關駐防甲兵照冷口喜峰口之例每年每名給米四十四斛其地畝交還自是年以後甲兵俱在山海關通判倉領米其各官員俸米地仍照前本駐防來册喜峰口駐防防守禦一員地十六頃六十七畝零章京二員共地十三頃五十九畝零筆帖式二員共地十一頃三十三畝零共官員地四十一頃五十九畝零八旗披甲地共四十四頃零十畝鑲白鑲紅正藍三旗下間散地共十五頃七十一畝零雍正十一年將鐵門關外餘地并園地續行撥給鑲黃旗披甲地十五頃十畝三分零在大屯正黃旗披甲地十五頃十畝三分零在前峪崕正白旗披甲地十五頃十畝三分零在碾子峪正紅旗披甲地十五頃十畝三分零在大屯鑲白旗披甲地十三頃九十四畝一分零在後峪兒崖鑲紅旗披甲地十三頃九十四畝一分零在網户灣正藍旗披甲地十三頃九十四畝一分零在碾子峪鑲藍旗披甲地十三頃九十四畝一分零在禾子溝本駐防來册獨石口駐防康熙三十二年撥宣化府地給正紅旗領催披甲共一頃五十畝在樣田堡鑲黃旗披甲地共二頃八十五畝在樣田堡正白旗撥什庫披甲地共五頃三十六畝在破堡子張家窑鎮安樣墩等處鑲白旗披甲地共一頃五十八畝五分在青泉堡鑲紅旗披甲地二頃六十四畝在鎮安樣墩正藍旗披甲地六十畝在樣田堡鑲藍旗披甲地共六頃三十一畝在樣田堡赤城破堡子張家窑興仁堡等處俱本駐防來册又是年交存赤城縣地二頃二十畝在樣田堡破堡子地方本縣來册千家店駐防康熙三十二年赤城縣撥給正白鑲紅兩旗下披甲地共四頃在樣田堡鎮安堡本縣來册康熙五十年六月延慶州撥給章京一員地三頃兵丁四十名共地二十四頃俱鑲黃旗各佐領家人莊頭地雍正七年閏四月自獨石口續添給千家店章京一員十一年撥給延慶州地三頃本駐防來册古北口駐防守尉開墾地四頃八十八畝一分章京開墾地五頃十二畝七分筆帖式開墾地二頃零四十二畝二分鑲黃旗披甲開墾地共六頃零一畝二分正黃旗領催披甲開墾地共四頃九十六畝七分正白旗領催披甲間散開墾地共十頃零十一畝四分正紅旗領催披甲併護軍前鋒開墾地共十頃零三十一畝一分鑲白旗領催披甲間散開墾地共二十四頃二十六畝六分鑲紅旗領催披甲開墾地共三頃八十六畝七分正藍旗領催披甲開墾地共九頃七十五畝三分鑲藍旗領催披甲開墾地共二頃四十七畝六分本駐防來册右衛駐防雍正二年七月賞給察哈爾地鑲黃旗滿洲官十六員兵丁一百九十一名鐵匠十名共賞地一百九十五頃六十一畝六分零每員名分得地九十畝一分零正黃旗滿洲官十八員兵丁一百九十九名鐵匠十名共賞地二百四頃六十三畝一分零每員名分得地九十畝一分零正白旗滿洲官十七員兵丁一百八十六名鐵匠十名共賞地一百九十二頃一畝零每員名分得地九十畝一分零正紅旗滿洲官十六員兵丁一百八十五名鐵匠十名共賞地一百九十頃二十畝八分零每員名分得地九十畝一分零鑲白旗滿洲官十八員兵丁九十三名鐵匠十名共賞地一百九十九頃二十二畝二分零每員名分得地九十畝一分零鑲紅旗滿洲官十八員兵丁一百九十八名鐵匠十名共賞地二百三頃七十二畝九分零每員名分得地九十畝一分零正藍旗滿洲官十九員兵丁一百七十九名鐵匠十名共賞地一百八十七頃五十畝三分零每員名分得地九十畝一分零鑲藍旗滿洲官十七員兵丁一百九十一名鐵匠十名共賞地一百九十六頃五十一畝八分零每員名分得地九十畝一分零東翼蒙古官二十九員兵丁二百五十八名鐵匠十六名共賞