body:
  text: 職官志九月選按缺補用順治初年定凡官員𨽻滿洲旗者以滿洲額缺用𨽻蒙古旗者以蒙古額缺用𨽻漢軍旗者以漢軍額缺用不得互相調補公額康熙十年題準各部郎中堂主事定為公額八旗通行升用又題準蒙古員外郎以下官員亦改為公額八旗通行升選雍正六年奏準科道郎中員外郎堂司主事及小京官等員缺均定為公額八旗通行升選至鑾儀衛主事一員為上三旗公額仍照定例升選乾隆十四年奏準內閣中書清字本房七員漢字本房七員作為公額八旗輪用科甲除授乾隆四年諭今年翻譯會試取中二十二人雖從前有照例殿試之議但此科人數甚少不必舉行殿試皆著賜進士出身吏部引見候朕酌量録用其優者以六部主事即用次者在主事上學習行走該堂官照例題補又次者照滿洲進士例選用內有現任者即在任候升不必出缺欽此又奏準內務府旗鼓佐領下間散文舉人與八旗漢軍間散文舉人一例選用知縣其內務府旗鼓佐領下文舉人出身之內務府筆帖式等仍不準其與外旗一例較俸升用主事等缺其內務府間散翻譯舉人並翻譯舉人出身內務府筆帖式等內務府均有應升應選之缺不準其與外旗人員一例升選六年諭滿漢進士原屬一體嗣後滿洲進士亦著照依甲第名次選用知縣俾其漸悉民瘼學習外任之事欽此又奏準蒙古進士一例照依甲第名次選用知縣其翻譯進士係分闈中式應付於本科之後挨名選用又議準嗣後翰林院典簿詹事府主簿光祿寺署丞國子監監丞博士典簿等員缺不論雙單月除滿洲蒙古進士翻譯進士不行銓補外悉歸滿洲蒙古舉人挨科分名次擬定正陪補用其有由舉人筆帖式中式進士情願具呈留本衙門行走者準其在本衙門行走遇應選知縣之時仍照甲第名次選用知縣未選知縣之前若俸次已深應升漢字堂主事者亦準升補至如單月有缺遇科甲出身之降調人員其品級應用小京官者亦準其一例補用七年奏準滿洲蒙古文舉人出身之筆帖式與間散文舉人一例按科分名次準以知縣銓補又奏準滿洲蒙古進士翻譯進士及文舉人於未用之先定期考試其考試之處由部彚齊人數奏請欽點大臣考試試卷進呈後引見其奉旨外用者進士與漢進士照甲第名次選用舉人歸於雙月知縣兩班之後照科分名次選用知縣不準外用者以國子監監丞等小京官十三缺用國子監監丞一缺博士一缺典簿一缺翰林院典簿一缺詹事府主簿一缺光祿寺署丞八缺十六年奏準現任筆帖式中式翻譯進士奉旨以知縣歸班選用者令其在任候升不行開缺嗣後如各項候補筆帖式中式進士奉旨歸部銓選者遇伊等應補筆帖式時亦應準其一例選用得缺後仍照現任之例在任候升十九年奏準八旗翻譯會試之設原欲令滿洲人等學習國書並非専以科名為重乃近年以來八旗應試之人多事鏤刻字句希圖中式於實在翻譯文義轉覺相去逾逺况八旗通曉漢文者既可専就文闈以博科第而曉習翻譯之人原皆可考取內閣中書及筆帖式庫使等項亦不必藉鄉會試以為進身之階請嗣後除翻譯生員應仍照舊考試留為伊等考取中書筆帖式之地其鄉會二試請永行停止四十四年奉上諭翻譯鄉會試停止已久著加恩於戊戌己亥兩年舉行鄉會試嗣後每屆三年由部具奏其準考與否候旨定奪欽此留館開缺雍正十三年議準在館辦事各部司員筆帖式員缺俱歸部另選各照原銜食俸升轉俟該館告成時各回原衙門於額外辦事遇有原衙門應補之缺即行坐補如有奉特旨升用人員該管官仍留在館行走在吏部奏明請旨清漢字分缺順治初年定滿洲員外郎以上及司主事小京官等員缺升選各官均不分清漢字樣通行補用堂主事翰林院典簿等員缺均按清漢字樣分别補用雍正十二年奏準六部漢字堂主事不論雙單月將由科甲出身人員升用五人後將翻譯舉人出身之小京官筆帖式論俸升用一人單月有缺其科甲出身之降調人員亦準一例補用科甲出身知縣改補乾隆八年議準滿洲科目人員已就知縣各官有自揣不勝民牧之任情願補用小京官者準其於臨選之時呈明改補不論雙單月遇有國子監監丞等十三缺通照改補日期先儘補用官員終飬乾隆九年遵旨議準旗員補用外任如陵寢及東三省官員筆帖式各省駐防將軍城守尉督撫隨印筆帖式雖係外任究非地方有司可比有告請歸旗終養者應仍照舊辦理無庸再議外其滿洲蒙古現任藩臬道府同知通判州縣及滿洲蒙古理事同知通判等官如遇祖父母父母年老例得終養者照例準其具呈該管上司出具切實考語題奏到日由部咨察該旗出具確實印結報部令其回京各該處引見請旨遵行至漢軍外任官員從前告請終飬者均照漢人例辦理但漢軍滿洲蒙古均係旗人在旗在部均可補用原與漢人不同嗣後漢軍外任各官告請終飬者亦照此例令其回京各該處引見請旨凡滿洲蒙古漢軍告終飬外任各官引見時除奉旨以旗員補用者應聼各該旗辦理並奉旨指明以何部何官即用者照例補用外如奉旨以部員改補者自應按照品級改補又四十九年諭嗣後各旗文武官員如有父母年七十五嵗以上者均不準保送外任庶旗員共知祿飬承歡克敦內行亦移孝作忠之一道也欽此又五十四年議奏凡在京親老旗員均停其升用外任其外任各員有父母年逾七十五嵗以上情願以京職改補者按照品級以京員對品補用均係按班銓選並無分部行走之條但查此等人員俱係現任親老改補京員候缺需時在本身既無以遂其及時報效之心即伊父母亦未免有捧檄為榮之羡請先令掣簽分派各衙門行走仍照例按班銓選再此等人員向來因陵寢各缺在五百里以內仍令一同掣補但究於侍養未便殊失立法本意請嗣後専以在京各衙門選補俾得就近奉養更足以資奬勵而遂烏私奉硃批此奏是依議又五十六年奉諭奏定八旗現任京職人員無論滿洲蒙古漢軍自郎中以下筆帖式以上有父母年至七十五嵗者停其升選保送外缺外官自藩臬以下州縣以下如遇祖父母父母年逾七十五嵗情願回京者準其具呈督撫奏明送部引見除奉旨以旗員補用者聽各該旗遵照辦理奉旨以何部何員即用吏部照例即用外如奉旨照例改補俱按照品級補用布政使按察使例應改補京堂與應升人員開列具題請旨道員以郎中用知府以員外郎用直𨽻州知州同知知州以主事用通判統以小京官用毋庸分别品級州同知縣不論何項出身専以七品筆帖式用知縣以下雜職等官按其出身以八九品筆帖式用未經得缺以前先令掣簽分派各衙門行走毋庸給與俸祿仍照例按班銓選至候補候選人員除漢軍選用教職係在直𨽻奉天毋庸辦理外其候選知縣之間散進士舉人係應用科甲小京官照科分名次補用餘者到班時各按品級以京員改補改補人員均歸入月分専以在京衙門員缺先儘補用改補之員如遇殺盛京牛馬稅陵寢等缺山海關張家口虎口差及筆帖式應用之各督撫衙門直𨽻防守尉衙門俱不準其保送升選俟飬親事畢應外任時仍照例歸於原班銓選改補各員俱於現任內停其升選外缺如遇在京應升缺出仍準其與京員一體較俸升轉將來飬親事畢應補之日停其補用外缺如未經升任仍歸原班銓選其有改補之後升選到班時適值外缺扣除歸入即用班內以京缺坐補仍先儘丁憂服滿之人至筆帖式係按旗補用親老之員遇外缺扣除其次者亦係親老另將其次無親老之人銓補毋庸過班仍令其在原班候補京缺以上親老各官如有揑飾規避將本員及出結官一併議處其指缺捐納外任告請親老者不準以京缺改補俟應補之日仍歸原班銓選終飬服滿起補乾隆五年奏準以各省之終飬旗員至應補之日如未滿年分一年以外者仍以外任用在一年以內者再扣一年半年以內者再扣半年均以京官用病痊起補人員已經起補得任又因服制扣除服滿後如京缺官員準其以京官通補如盛京陵寢等處官員準其以盛京陵寢等處員缺通補如係有年限之缺準其以有年限之缺通補內有年限未滿者照旗員終飬之例扣限補用如奉旨指定何衙門者服滿時仍以指定衙門補用丁憂借署乾隆十五年遵旨奏準丁憂道府人員其借署應照改補之例道員以郎中借署知府以員外郎借署同知知州以主事借署通判以七品小京官行走知縣以八品小京官行走遇有七八九品小京官員缺均準借署至由小京官筆帖式外用以次升至道府等官丁憂回旗百日孝滿原衙門有相當員缺仍在原衙門行走者不必待至三年服闋於每年十月吏部查明帶領引見一次恭候欽定其原衙門並無品級相當應行奏署之缺及由間散舉人進士升任並無原衙門可以行走者即傳令該員等赴部掣簽分發部院衙門額外行走遇有相當缺出令該堂官奏請署理至丁憂回旗引見奉旨不宜外任同知通判州縣等官亦照以上借署之例辦理俟服滿之日題請實授官員回避乾隆十六年題準滿洲聚處京城而支分派逺旗分各異者亦與漢人之散居各處者無異嗣後滿員雖係同住京城而旗分各别又出五服之外毋庸回避十八年奏準翻書房筆帖式十員由户刑二部各撥五人令専在翻書房行走一應京察保送由翻書房大臣甄别與户刑二部原無關礙毋庸回避先後記名人員論俸乾隆十三年奏準嗣後記名以道府用之滿洲郎中以同知通判用之滿洲小京官止於同日記名人員內論俸升用其後次記名者俟前次人員用完再將後次記名人員論俸升用廕生録用康熙十年題準滿洲一品官廕生以員外郎用二品官廕生以部院司主事都察院經歷大理寺寺丞光祿寺署正用三品官廕生以通政使司經厯太常寺典簿部寺司庫光祿寺典簿用四品官廕生以鴻臚寺主簿用如學習期滿該部院奏留以本衙門筆帖式補用者遇本衙門本旗員缺準其坐補蒙古一品官廕生以員外郎用二品官廕生以司主事用三四品官廕生以部院筆帖式用均俟學習期滿奏眀留部歸班分别敘用乾隆元年奏準文武官員廕生廕監生至十八嵗有情願在武職行走者該旗咨部準其隨旗行走其年二十以上者咨部引見如奉旨以旗員用者令其隨旗行走分部學習者令其掣簽分發各部院衙門試看學習照品級食俸二年期滿該堂官出具考語據實奏聞移咨到部按伊品級照例銓補三年議準各部院年滿廕生仍遵照奏準之例令該堂官甄别如果有才識出衆之人即指名保題留部以該員應得之官題補其行走勤謹堪辦部務者奏明咨部歸於月分照期滿日期先後選用其未得官之先仍在本衙門學習行走食俸候補不準濫行題補其行走平常不能辦理部務者咨回該旗隨旗行走雙月升選原定郎中以下等官先儘即用之人如無即用之人宗人府理事官各部院郎中將應升官員論俸擬正陪升補宗人府副理事官各部院員外郎一升一選應升官與一品廕生分缺間用各部院衙門司主事大理寺寺丞都察院經厯光祿寺署正等員缺用應升二人二品廕生一人學習期滿進士一人散館庶吉士一人年滿大使並三庫司庫較年滿日期先後用一人宗人府經厯各部院清字堂主事都察院都事太常寺寺丞等員缺用應升二人二品廕生例不選用清字堂主事等缺仍將應升之人抵補學習期滿進士一人散館庶吉士一人年滿大使並三庫司庫一人如進士庶吉士二項皆無人將應升之人抵補一人漢軍大理寺寺正用應升一人二品廕生一人通政使司經