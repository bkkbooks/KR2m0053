筆帖式員缺補用雍正九年奏準委署筆帖式如效力行走好者俟本旗理藩院蒙古字語筆帖式員缺該院出具考語咨部引見授為八品三庫大使筆帖式庫使調補乾隆九年奏準三庫筆帖式並三庫掌籍筆帖式共十有五人不論旗分作為遴選調補户部行文各部院衙門保送六部各保送二人其餘衙門各保送一人由該庫堂官每一缺遴選二人引見調補三年滿日照例更代其更代之筆帖式即補所調員缺俟有本旗分員缺仍按調庫人員旗分銓補步軍統領衙門筆帖式雍正十二年奏準遇有員缺由該衙門移咨到部轉行各部院衙門於現任筆帖式內遴選老成諳練之人出具考語保送由部會同步軍統領再行遴選三四人引見補授如有奉旨記名者即行注册俟有員缺引見補授三旗領侍衛府筆帖式乾隆四年奏準領侍衛府筆帖式十有二人由領侍衛內大臣於親軍內考試翻譯擬定正陪咨部再行考試擬補三年期滿遇有本旗部院筆帖式員缺與外任年滿調補人員較年滿日期先後調補遇考試現任時一同考試至升轉時將伊等得補侍衛筆帖式之日所食親軍錢糧準其接算盛京刑部蒙古筆帖式乾隆四年議準蒙古筆帖式二人將盛京考取蒙古翻譯之人補用如盛京無應考之人即將在京考取蒙古翻譯之人掣籖補用六年期滿照例調補督撫衙門筆帖式乾隆四年奏準各省督撫衙門筆帖式例由部院衙門保送過部引見之處照步軍統領衙門筆帖式之例出具考語保送到部再行遴選每一缺遴選二三人引見補授十四年奏準各省督撫衙門筆帖式內有已滿六年者令各督撫出具考語送部遇有本旗各部院衙門筆帖式員缺補授未經得補之前到部照現任各處調京之例令其掣簽分在各衙門額外行走其未經年滿者俟年滿之日亦照此例辦理遴選協辦同知筆帖式雍正八年奏準歸化城協辦同知筆帖式員缺交與理藩院將八旗蒙古筆帖式內人明白通曉漢文者選取以筆帖式原品令往歸化城協理同知辦事十二年奏準和林格爾崑都崙托克托城薩拉齊各增設筆帖式一人於各部理藩院筆帖式內遴選引見發往乾隆元年議準歸化城清水河善岱增設筆帖式二人均由部行文內閣各部院將滿洲蒙古中書筆帖式內通曉蒙古語清漢字好能辦事者各遴選一人出具考語保送到部引見補授其筆帖式員缺别行開選五年奏準歸化城等處協辦筆帖式任事已滿三年果能勤勞供職廉謹自持地方旗民事務實堪勝任者令該管上司據實保舉送部引見後仍回原任其奉旨記名者遇有應升由部於在京記名人員引見之時將該員記名之處一并繕録名單進呈候旨簡用其歸化城和林格爾協辦筆帖式二人均係兼三要員如有人地不相宜之處準該督撫於各協理筆帖式內酌量題請調補八旗隨印筆帖式雍正十一年奏準嗣後隨印筆帖式員缺其生監官學生間散人等內有願就考試者亦準其咨部取中者準其補授其由前鋒護軍領催驍騎補授者仍食伊等原錢糧由生監官學生間散補授者給與九品筆帖式三年期滿咨部注册考試仍留隨印效力俟得補後再行開選乾隆十八年奏準見在景運門行走之上三旗每旗辦事筆帖式四人內按旗分掌稿筆帖式三人著隨關防一同辦事不論旗分遴選人員明白辦事好者補授咨部注册三年無過年滿後兩翼大臣會同詳察出具考語咨部照領侍衛府筆帖式之例以各部院衙門筆帖式用如有過犯即革退掌稿筆帖式咨部再行遴選補授吉林寧古塔將軍等處筆帖式康熙五十三年題準由將軍副都統選取本處應用之人坐名補授咨部注册乾隆五年奏準吉林黑龍江捕牲烏喇等處筆帖式其由領催及驍騎選補者仍食原錢糧由間散選補者給與九品筆帖式錢糧不準與在京筆帖式一同升轉仍由該將軍等照向例升用又奏準吉林將軍衙門理刑司增設筆帖式一人黑龍江將軍衙門增設銀庫筆帖式二人令該將軍於本處應補人員內遴選通曉漢文能翻譯者送部引見補授又奏準吉林黑龍江理刑司銀庫增設之筆帖式準其與在京各處筆帖式一例升轉由本處考試選補如本處無考試翻譯之人令該將軍行文盛京兵部將考試翻譯人員內挨名指補送部引見補授遊牧筆帖式雍正元年議準八旗遊牧總管隨印筆帖式員缺由該總管於本處蒙古兵丁內每員缺選取二名擬定正陪咨部考試補用授為八品食俸補用庫使乾隆四年奏準部寺庫使員缺由部行文國子監將本旗應補庫使之官學生詳加考試翻譯每員缺取中四人將考卷一并咨部由本部堂官覆行考試擇其佳者指名坐補三年期滿免其考試入於各部繕本班內較期滿先後以筆帖式補用九年奏準各部寺庫使調補三庫庫使之人如從前有經該衙門奏準守候本衙門本旗筆帖式員缺者仍準其候補原衙門本旗之缺十六年議準庫使員缺行文國子監將本旗官學生每員缺咨送三人宗人府將覺羅學生每員缺咨送二人彚齊考試擇其佳者指補盛京各部庫使乾隆十七年覆準盛京各部庫使員缺分為左右兩翼如遇員缺仍照例令盛京兵部會同盛京禮部不拘旗分在本翼四旗官學生內考取翻譯擇其佳者指補咨部注册教習期滿補用筆帖式乾隆五年奏準圓眀園八旗營房教習四年期滿列為一等及八旗義學教習三年期滿為人勤慎教導有成者咨送到部均入於議敘班內較日期先後以筆帖式補用各處補用外郎雍正十一年奏準八旗滿洲蒙古漢軍外郎員缺該旗咨部行文本旗於生監官學生兵丁間散人等內將滿漢文藝好者選取二名擬定正陪咨部考試翻譯補授乾隆三年奏準盛京外郎由盛京兵部於考試翻譯候補筆帖式之漢軍生監官學生人等遇有外郎員缺挨名補用咨部注册六年期滿出具考語咨部考職録用如願補用筆帖式具呈盛京兵部準其以筆帖式即行補用將考定職銜注銷以補筆帖式之日算俸至在京各旗外郎年滿考職後有情願就筆帖式者亦照盛京之例準其與候補筆帖式取中者按考定名次選用兵部武選司架閣科增設外郎雍正三年奏準由兵部於領催內遴選咨部補授乾隆五年奏準架閣科外郎五年期滿歸於繕本班內遇有本旗筆帖式員缺即行充補不積算本班之缺福州將軍衙門增設外郎水師營增設外郎雍正八年奏準由該將軍於學習清書已成漢軍子弟內選補八年期滿照例注册補用若止曉清文弓馬可觀者遇有領催缺準其拔補乾隆二年奏準廣州駐防照福州駐防之例八旗增設外郎各一名由該將軍於現在國語明晰之官學生內選取八年期滿咨部照例注册補用若止曉清文弓馬可觀者遇有領催缺準其拔補三年奏準京口將軍八旗各設外郎一名選熟悉國語者充補八年期滿咨部照例補用若止曉清文弓馬可觀者如馬步兵丁照間散之例如係領催照記名領催之例以驍騎校題補遺缺仍照例拔補各處年滿筆帖式調京康熙九年題準陵寢筆帖式及各省城守尉駐防協領筆帖式六年期滿由各該處出具考語咨送到部由部察核相符以本旗月分所出之在京各部院衙門筆帖式員缺論期滿之前後先行調補乾隆三年奏準盛京等處有年滿回京候補之筆帖式其未補之先到京時由部傳令掣籖在各部院學習行走仍令食伊原俸盛京驛站筆帖式停調補雍正十一年議準盛京三陵總管及驛站等處筆帖式無年滿之例停其調補盛京五部止與在京部院筆帖式一同論俸升轉筆帖式病痊起補康熙元年議準筆帖式有不願在伊本衙門行走因而告病解退希圗别補好衙門此等人員起補時仍俟本衙門有缺補用乾隆四年奏準各省衙門筆帖式六年期滿例應調補來京之人其有因病解退者起補時由部察明該員除在任已滿六年照例先行補用如從前在任未及五年起補時仍俟該員原衙門有缺坐補接算扣滿年限再行調補如在任已五年以上起補者以赴補之文到日再扣限一年至在任已五年半以上者再扣限半年準照調補之例先行補用補用天文生雍正五年議準欽天監滿洲漢軍天文生缺除舉人貢生並原任筆帖式不行補用外於考試翻譯取中之監生生員官學生義學生內各按旗分名次歸入月選與所出筆帖式員缺一例掣籖補用不算筆帖式班次如有缺本旗無應擬之人則扣留俟考取有人之日再行補授不準借補别旗之人八年奏準欽天監天文生其由監生生員補用者授為八品由官學生義學生等補用者授為九品各按品級食俸遴選貼寫中書乾隆五年議準內閣貼寫中書八旗共四十人內滿本房二十四人每旗定為三人漢本房十二人每旗定為二人員缺由內閣知會到部行文各部院各該旗各按旗分將現在候補筆帖式內除坐補原部及先用即用人員外其餘無論已未考取注册各部院繕本筆帖式及文舉人翻譯舉人貢監生員官學生義學生等移咨過部轉送內閣會同考試選取補授照筆帖式給俸三四品官廕生補用筆帖式乾隆五年奏準漢軍三品四品官廕生分部者學習期滿準其入於議敘班內以學習期滿日期較先後補用各部院衙門筆帖式三品官廕生授為七品四品官廕生授為九品翻書房筆帖式十人乾隆十五年奏準將户部刑部筆帖式額內各撥給五人遇缺不論旗分亦不分滿洲蒙古漢軍員缺於翻書房行走人員內遴選咨部引見補授如有應補之人於每月截限以前咨部即行坐補附於月選筆帖式內引見補授俟有本項旗缺翼缺即行補還欽定八旗通志卷五十
