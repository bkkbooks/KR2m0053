body:
  text: 欽定四庫全書欽定八旗通志卷一百六十六人物志四十六大臣傳三十二滿洲正紅旗三逹舒蘭三覺羅石麟明德吳善寶武靈阿農起舒蘭舒蘭滿洲正紅旗人姓納喇父敦多哩官至刑部侍郎兼佐領康熙二十六年二月以審理盜案失實革侍郎任復以審理革職總督蔡育榮罪案附和尚書希福從輕擬罪由佐領降二級發黑龍江效力舒蘭初任理藩院筆帖式三十四年遷主事三十八年三月隨侍郎滿丕及都統烏逹禪等招降巴爾瑚三千餘人安駐察哈爾遊牧地編𨽻佐領九月巴爾瑚佐領額克圖叛害察哈爾副總管阿必達驍騎校班第掠馬駝以遁聖祖仁皇帝命喀爾喀公錫卜推哈坦等領蒙古兵追𠞰舒蘭率諳察哈爾路徑者四人持檄傳示蒙古諸貝勒台吉并派撥察哈爾厄魯特兵隨烏逹禪會諸蒙古兵剿獲賊渠三十九年遷內閣侍讀四十三年四月命同侍衛拉錫往窮黃河源諭曰河源雖名古爾班索理瑪勒其實發源之處人迹罕到爾等務直窮其源察視河流從何處入雪山邉內凡經流諸處宜詳閲之九月還奏臣等於四月初四日就道五月十三日抵青海十四日至庫庫布拉克有貝勒色卜騰扎勒同行六月七日至鄂稜諾爾周二百餘里明日西行至扎稜諾爾周三百餘里二諾爾相去可三十里許明日至星宿海蒙古名鄂敦塔拉星宿海之源小泉萬億厯厯如星衆山環之南有山曰古爾班圖勒哈西南有山曰布瑚珠勒赫西有山曰巴爾布哈北有山曰阿克塔齊勤東北有山曰烏蘭都什蒙古總名曰庫爾坤即崑崙也山泉出自古爾班圖勒哈者西畨名為噶爾瑪瑭出自巴爾布哈者名噶爾瑪楚木朗出自阿克塔齊勤者名噶爾瑪沁尼三山之泉溢為三支河即古爾班索里瑪勒也三河東流入札稜諾爾扎稜一支入鄂凌諾爾黃河自鄂稜出其他山泉與平地水泉淵淪瀠繞不可勝數悉歸黃河東下臣等於六月十一日自星宿海回程舍故道尋河流東南行二日登哈爾吉山見黃河折而東至庫庫陀羅海山又南繞薩楚克山復北流經巴爾陀羅海山之南明日逹阿木尼瑪勒占穆遜山其山最髙雲霧蔽之不可端倪蒙古人言長三百餘里有九髙峯積氷終古不消常雨雪一月得晴僅三四日臣等自此回行又二日至錫喇庫特勒又南過僧庫爾髙嶺更百餘里至黃河岸見黃河自巴爾陀羅海山東北流經歸德堡之北逹喀山之南兩山峽中流入蘭州自京至星宿海計七千六百餘里寧夏之西由松山至星宿海天氣漸低地勢漸髙人氣閉塞故多喘息謹繪圖復命疏入報聞是年擢內閣侍讀學士尋諭大學士九卿等曰朕於古今山川名號雖在邉徼遐荒必詳考圖籍廣詢方言務得其正故遣使至崑崙諸處目擊詳求載入輿圖即如黃河之源出西塞外庫爾坤山之東衆泉渙散不可勝數望之燦如列星蒙古謂之鄂敦塔拉西畨謂之索里瑪勒中華謂之星宿海是為河源滙為扎稜鄂稜二澤東南行折北復東行由歸德堡積石關入蘭州其原委可得而縷析也四十四年擢舒蘭內閣學士眀年命往西藏封拉藏為翊法恭順汗回京得風疾賜醫診視并賜藥飲兩閲月始痊四十七年閏三月疾復發乞休命解任調理五十二年正月病痊補原官三月遇萬夀慶典復其父敦多哩侍郎原品十一月命舒蘭兼管光祿寺卿十二月遷工部侍郎明年諭責舒蘭人甚糊塗事多差錯降三級調用五十九年卒年六十有八覺羅石麟覺羅石麟滿洲正紅旗人康熙五十年授工部筆帖式雍正二年在奏事處行走三年擢員外郎四年二月授江寧布政使五月奏上江各州縣向有虧空銀二十三萬九千四百兩有竒經前撫臣李成龍準前布政使董永芠據各府州公議將上司節禮及官役俸工等銀從雍正二年起按季解藩庫抵補至四年三月已解銀六萬一千三百餘兩乃升任通政使前布政使博爾多於此項內動用三萬三千七百餘兩自欠京餉一萬七千有竒疏入得旨博爾多虛懸之項一一秉公查揭甚是似此辜負朕恩之人豈容絲毫姑寬且爾亦豈便代他人任過耶八月奏言泗州被水命臣動庫銀二萬兩親往散給臣即馳往料理無絲毫假手胥吏內有被災三四分者雖不蠲免錢糧向有賑粥之例酌減散給又有無田代耕窮民止有草房被水沖倒棲息無所其苦更甚亦照成災例行散賑日自辰至午恐飢民守候捐買餅餌使食得旨料理甚屬妥協可嘉之至非實心任事何能有此賑過情形已悉爾其勉之十二月疏言外省虧空等案入官田屋例應估變乃遷延日久地乏人耕遂至荒蕪屋無人居日漸坍塌甚至州縣屢易其人漫無稽查或官役侵收肥已應查田地荒蕪者招佃耕種房屋分别賃租收息造册送部存案民間有願買者照時價變估又言江安十府糧道每年收放漕糧約四十餘萬與小省藩庫無異請照司庫例每年春秋二季分别應存應解登册報部聼候撥解糧道例應押運過淮抵通在署日少凡各屬解道錢糧及支放糧船行月并修船等項未便概任佐雜胥役請添設庫大使一員均下部議行五年六月遷山西巡撫十一月奏言大同府大有倉朔平府常豐倉所貯糧原備軍需四月準部咨將二倉米六萬石發給范育馪秋後買補還倉現飭催買補第大朔二府地連直省今嵗來晉販糴者多價難平減且有關民食採買未便急迫查各屬貯倉穀不下百萬石請先動十五萬石運至二處碾米貯倉以備軍需各屬倉穀請動存公銀陸續補買上是之乾隆元年四月疏言晉省汛鋪墩臺向來建設未為齊整今擬省南省北及鄰界僻路等處添設墩臺七十八座營房六百七十三間汛兵三百三十一名就近撥補其煙墩牌坊如數制造又有應裁塘汛二十二處變價完公兵六十八名撤歸伍七月疏言户部覆準侍講學士楊椿條奏山西佐雜等官宜給養亷查教職已按品給全俸藩庫鹽場各官已有養亷者毋庸議給所有司府經厯照磨及州判縣丞等官每員每年應給養亷銀八十兩吏目巡檢司獄驛丞六十兩在耗羡下支其兼署之員因有本任養亷向無兼支例但念本任養亷除贍家外僅可充本任公用而兼署之任亦有幕賔束修與應辦公務之費請準支養亷一半餘仍扣歸缺官項下充公均得議行十二月奏稱蒲州平坦潞澤澤州等營汛廣兵單撫標原設二營兵數獨少請添蒲州協一百二名平坦營八十六名潞澤營一百八十八名澤州營七十五名撫標二百二十四名守兵一百名共七百七十五名即在裁兵內撥給太原營與撫標左右二營同城兵數足敷防守惟守糧過多拔補未免壅滯無以鼓勵勤勞今擬改步戰兵百充給撫標左右二營又言曩者設額外營官兵時在省城建營房四千間衙署十四座今兵汰宜估賣但撫標并太原營本城兵多租民房而額外營兵又議添撫標請將此營房撥給其備辨房屋仍為公署均從之四年二月奏綏逺城副都統甘國壁條奏撥銀買糧貯歸化城綏逺城托克托城三處命臣議奏查此三處自移駐官兵招民種地以來生聚日繁需糧益多應如所請但行之貴乎可久比項倉貯既無撥用原額而隨時平糶不盡出陳易新若照原奏貯至二十萬石之多恐致紅朽請動支藩庫耗羡存公銀在歸化綏逺二城各買貯榖五萬石托克托城十萬石碾運協濟請自乾隆四年始每於秋收前遇稔即買價貴即止其領收平糶出納等事委本處理事同知及協理通判管理仍令朔平府雁平道盤查嵗底由布政使考成奏銷得旨著照所請行五月疏言左都御史陳世倌條奏山東濟南等處及山西潞安以西各府屬久未得雨民望甚殷宜及時籌備查晉省山多水少不通舟楫米糧仰賴外來者無幾但民儉多有蓋藏且上年豐收民情甚安倘至下月尚無透雨致成偏災則宜請動倉榖按被災輕重定賑多寡又思以工代賑實為良法晉省各屬城已估計應修報部者共三十四州縣此內有成災處即動項發州縣備料興工俾貧民得傭工度日報可五年閏六月丁父憂回旗十月授內閣學士六年七月以山西巡撫任內失察布政使薩哈亮貪黷禠職九月特授鑲藍旗漢軍副都統先是山西平陽府知府章廷圭有婪贓事石麟曽經保薦至是事發議降五級調用十二年卒明德明德滿洲正紅旗人姓輝和雍正十二年由筆帖式補太常寺博士乾隆元年授寺丞二年遷步軍統領衙門員外郎三年調户部縀匹庫五年遷山東糧道七年授湖南按察使八年疏言督撫等遇刁民糾衆搶劫之案應查明是否地方官激變嚴拏究辦以示懲創不得藉此輒劾有司徒長刁風防汛辨兵亦宜協力查拿不得推諉觀望諭曰國家愛養斯民惟恐一夫失所偶遇地方歉收未嘗不籌畫接濟而刁頑之民遂乘機搶奪不可不重懲以警乃督撫欲自諱其化導不力禁約無方止將州縣推尋别故參劾而於搶奪案朦混歸結又如汛辨兵丁類皆觀望不前亦豈設兵衛民本意著各督撫提鎮嚴飭所屬一同實力查拿如推諉即嚴參議處九年四月巡撫蔣溥劾明德剛愎自用於巴陵縣生員方宣點家被盜一案意存諱飾下部議革職七月授盛京禮部郎中九月授山東兖州府知府十二年調濟南府十三年遷山東鹽運使十四年七月上以川省用兵山西軍務絡繹必得幹練之員任使命明德調補雁平道九月調甘肅安西道十六年遷湖北按察使十九年擢四川布政使二十年調甘肅布政使隨總督黃廷桂往肅州辦軍務二十一年二月授山西巡撫六月奏言陽曲太原榆次太谷祈縣徐溝清源文水交城興縣等十縣四季徴糧貯太原府理事通判倉即供季支兵餉例不停緩今該廳已徴之數及從前節次買存米豆足敷本年支放現令暫緩俟秋後催徴猶恐下年徴支不繼仍難緩至秋成查晉省溢額榖共五十餘萬石各屬現俱平糶於此項榖價內酌撥買米三千石黑豆六千石以備墊支嗣後定於秋收後開徴下年供支則兵糈既屬有備輸將亦得從容矣十二月奏言新疆派調察哈爾吉林等兵奉旨將陕西糧運巴里坤山西歸化城糧運陕西接濟竊計陕西若動撥榆林延綏等處糧由歸化城存貯軍需內運往歸欵實屬近便如動撥西安同州等處糧應於連界之平蒲解澤四府州屬溢額榖內撥補較為路近省費二十二年五月奏言太平縣史村驛明季因汾水阻隔改設曲沃縣蒙城鎮其人夫仍留史村汾河久西徙無礙而一驛夫馬分設未便應仍併歸史村驛諸疏俱如所請六月調補陕西巡撫十月前任山西布政使蔣洲虧空勒派為巡撫塔永寧所劾上以明德前與蔣洲共事毫無覺察並著革職拏問命尚書劉統勳前往鞫實洲正法明德擬絞特免明德罪發甘肅交黃廷桂差委二十三年補甘肅涼莊道二十四年正月授甘肅巡撫二月疏言甘省辦理軍需錢價甚昻四川銅盛錢多懇敕該督撥運三十萬串來甘搭放兵餉其餘設厰平賣市價自平從之四月丁母憂諭賞銀千兩辦喪先是明德在山西巡撫任濫舉屬員楊文龍部議降二級調用又湖北按察使任盜案遲延補官日降三級調用至是上以其連年承辦軍需尚屬出力命署甘肅按察使二十五年八月授甘肅布政使十一月復任甘肅巡撫二十六年二月奏言嘉峪關左右邉墻舊係土築年久殘缺新疆遣犯逃越稽查未密請用莭省運糧銀萬餘兩修固嗣後遣犯由關逃回將逰擊交部嚴加議處又奏獲巴里坤逃犯即於該地正法上俱從之四月疏言各省發遣巴里坤哈密安西三處之犯甚多安西哈密無屯係賞兵為奴現在兵數裁減巴里坤有屯田而糧少遣犯俱難再發應將續到者發闢展烏魯木齊屯所二處上年豐收非但有禆屯務即各犯亦可得所又疏言甘省地方遼闊遣犯沿途投宿坊店難以防範應將各驛間房修二三間為監房並責分防文武官辨稽查疏脫恭處俱如所奏行二十七年五月復調山西巡撫九月奏歸化城五廳地方除托克托城已設倉貯榖外其歸化城和林格爾薩拉齊清水河四通判應請每處增設常平倉榖三萬石動用司庫耗羡銀買貯又與河東鹽政薩哈岱合疏言夏縣白沙河居民舊築堰以護田廬並為城垣保障但土工不堅應改石工恐民力難勝請動充公銀七千餘兩及修浚姚暹渠存項銀四千兩令運司督州縣修固嗣後殘缺除北岸仍聼民修外南岸民少應歸河東渠堰嵗修案內辦理二十八年六月奏大同鎮所屬各臺從前因係邉境設兵過重今久成內地宜量裁改水泉營地方褊小左有老營右有偏關均設大員重兵相距甚近請裁該營逰擊並兵百將老營守偹移駐管理即𨽻老營恭將轄又裁靈邱路參將以所屬渾源營都司改補靈邱路都司歸北樓營恭將轄靈邱路守備改補渾源營守偹歸新平路恭將轄俱下部議從之是月調補江西巡撫十月奏豫章書院公費不敷九江贑州兩關平餘銀及各屬城濠地租銀每年共三千餘兩除作巡撫衙門書役工食一切辦公賞兵外尚餘銀千餘兩請歸書院佐士子膏火得旨允行十一月復調補陜西巡撫三十年正月調江蘇巡撫未蒞任命署江西巡撫五月奏凶殺多命之案請提至省城承審官扣限兩個月速結下部議載入例册十一月赴江蘇任三十一年七月奏言江南糧不敷食常仰給於楚蜀蘇州一帶商民每閉糴居竒臣屢加勸諭不使復蹈前轍各屬辦案疲玩成習督催不使堆積佐雜不得擅受民詞私作威福該省襟帶江海太湖界連兩省劫盜尤多臣飭屬查拏立破多案崇明漁船出洋後輒肆強劫今於口岸增兵役嚴察上嘉其留心時南滙山陽兩縣民有傷父兄致死者承審官誤照過失殺問擬明德親提駁改奏革原審各員職並劾按察使李永書不勝任請交部嚴議諭曰向來督撫每於臬司審轉案件往往曲為徇隱若明德之秉公持正何患讞獄之不平允吏治之不整飭乎明德辦理此事甚屬可嘉賞荷包六個以示優奬又奏常熟縣福山塘一河為蘇州等處入海要津支港甚多灌民田數萬頃乾隆二十六年濬後迄今又淤借撥司庫銀九千七百餘兩乘時再濬於所灌民田分兩年徴收歸欵從之三十三年二月調補雲南巡撫時大兵討𬗟甸七月與署總督阿里衮合疏言省城至永昌邉界路險運艱請撥藩庫間欵銀三萬兩分假儧修兩月可竣庶軍糈不致遲誤又合疏言各隘口俱設兵如姦民私販出口兵丁得財賣放一并正法失察官辨恭革治罪能拏獲者重賞八月又合疏言永昌普洱沿邉土司以𬗟匪滋擾田土多荒有乏籽種牛具者請量借給於明秋交米還項九月又合疏言滇省銅厰三十餘向係糧道専管金銀鉛厰二十九係布政使専管而本地道府無稽查責耳目未周請將各處厰務係州縣管理者責成本府専管道員稽查係廳員管理者責成本道専管統歸布政使總理糧道既不管銅厰事務太簡將驛鹽道所轄之雲南武定二府改歸管理均如所請行三十四年三月擢雲貴總督奏請牧養戰馬分派武職大員管理其棚槽草料等仍令地方官偹支上嚴飭其推諉卸責會副將軍阿里衮奏將領等所用馬行至南底壩地方即已疲乏詔責明德漠視軍務漫不經心下部議革職從寬留任尋諭曰明德自擢任總督以來辦理諸務皆不及從前實力奮勉於養馬一事尤漫無經理因循誤公豈宜令仍為總督即留滇省亦於公事無益念伊從前在江蘇於地方情形尚屬熟悉著即降補江蘇巡撫時永昌府知府趙珮以病告歸明德為代請上以趙珮規避革職自偹資斧效力明德遽為代奏交部嚴加議處又以明德不能催辦糧餉再下部嚴議應革任均得旨寬免注册七月經略大學士傅恆等奏留明德協辦軍務俟凱旋後再赴新任尋命署雲南巡撫専管臺站事十月諭曰明德辦理軍需糧馬是其専責屢經飭諭始終不能實心出力今經略大學士傅恆奏十月初一日已抵新街會兵尅期深入而後隊繼進之兵尚未到齊前屢諭明德令其設法催儧官兵迅赴蠻暮何以至今尚未全抵軍營即所運糧石亦不能源源按濟辦馬一項亦自安於無能希圖置身事外可見其平日専事空言塞責竟成疲玩痼習著革去翎頂加恩仍署雲南巡撫以觀後效三十五年卒吳逹善吳逹善滿洲正紅旗人姓瓜勒佳乾隆元年進士授户部主事六年遷員外郎十三年遷國子監祭酒十五年六月遷光祿寺卿十二月擢內閣學士十七年授盛京禮部侍郎尋調刑部十八年調兵部侍郎十九年調工部侍郎兼廂藍旗滿洲副都統二十年五月授甘肅巡撫七月以查辦軍臺無誤軍功加一級二十一年諭奬其宣力軍營賞戴孔雀翎二十二年議敘軍功加一級二十三年六月疏言軍糧由肅州運至哈密轉運軍營每石需費十二三兩向來凱旋官兵鹽菜口糧長支者按口抵扣少領者按日補給兵丁藉以糶賣製辦衣履請嗣後酌以二成本色八成折價支給既得隨時支用亦可稍省運費下部議行七月加太子少保二十四年正月授陕甘總督四月命以總督銜管甘肅巡撫事十一月奏言寧夏府屬橫城堡濱河漲塌西南角樓墻垣請於東岸築草壩以禦河流城下堆碎石六十四丈護城垣接修草防風三十餘丈切西岸遊嘴俾大溜北行庶可化險為平詔如所議行十二月調河南巡撫二十六年四月奏改營制四條一延津縣向設千總一𨽻開封營封邱縣駐衛輝營外委把總一查延津現屬衛輝府封邱現屬開封府請撤協防封邱之外委把總回衛輝營移原駐延津之開封營千總駐封邱兼防陽武縣為専汛歸開封營都司轄移衛輝營千總一駐延津為専汛歸衛輝營參將轄一胙城係新鄉縣専汛今延津既撥衛輝營千總移駐巡防請仍將胙城外委為協防以延津千總為延胙専汛一王祿營駐劄