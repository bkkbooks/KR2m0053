上南巡賜詩曰海疆浙閩重幕府簡猶難必也知大體寧惟期小安暴除艱廢猛衆得允於寬節相權資理徐歸黃閣端五月疏言浙江海塘老鹽倉一帶柴塘四千二百餘丈蒙聖主親臨閲視諭令改築石塘實為萬年經久之至意臣親往覆勘此時正遇大汛現在柴塘實資抵禦沿塘各工俱屬穩固惟潮神廟前大盤頭西藏字號起柴塘朽腐將盡潮水臨塘殊關緊要現在石工採料興建尚需時日應將此處趕緊鑲修築塘百丈至柴塘四千二百餘丈改建石工自應籌度萬全現今柴塘既臨大汛未便更動而退後多係田廬臣與司道等面加籌酌似應緊靠柴塘內下樁築砌石工以柴塘為外護捍衛更為得力居民亦屬相安俟秋汛後擇吉興工又諭旨指示應修繞海寧城之石塘內有工二十九丈地勢較髙兩旁魚鱗舊塘原十六層其城東八里文字號至陳文港密字號百五十餘丈地勢稍低兩旁魚鱗舊塘原十八層今應各照舊層數以期一律築固諭曰前因浙江海塘改建石工恐該處居民或視柴塘為可廢任意拆毁竊用致損城郭田廬曽明降諭旨令該督撫嚴飭地方文武各官將現有草塘照前加意防護以為重關保障將來石工告竣之時亦可留為外衛此旨尚未據三寶奏到兹據三寶摺內乃稱與司道等面加籌酌緊靠柴塘之內下樁築砌石工既可以柴塘為外衛則捍衛更為得力等語三寶此摺與朕降諭旨相符其是否曽經接奉前旨著據實覆奏三寶尋奏前因石塘工巨曽飭該管廳備悉心籌畫先據稟稱從柴塘退後數丈建築石工須拆去民房八百餘間殊非仰體聖恩保護田廬至意臣逐一履勘似應於緊靠柴塘內築砌石工嗣於五月間恭讀諭旨杭州老鹽倉一帶改築石塘仍留柴塘以資保障臣當即欽遵飭地方文武將柴塘加意保固報聞六月命來京入閣辦事八月兼管正藍旗滿洲都統十月充經筵講官四十六年正月因王亶望在浙江巡撫任內聲名狼籍未行參奏議革職得旨從寬留任四十七年四月繕寫清字雩壇祝版糢糊部議革任詔寬免十一月在尚書房總師傅上行走四十八年調鑲藍旗漢軍都統四十九年五月隨駕熱河以疾歸六月卒諭曰大學士三寶厯任督撫宣力有年簡擢綸扉勤慎供職方資倚任此次扈從熱河因其遘疾即遣太醫診視並令回京調養兹聞溘逝殊為軫恤其任內降革處分均豫開復所有應得恤典著該部查例具奏尋賜祭葬如例諡文敬武靈阿武靈阿滿洲正紅旗人姓瓜勒佳由前鋒翎長於乾隆十九年授前鋒校二十三年八月署前鋒章京從征凖噶爾回部有功給雲騎尉世職三十年授直𨽻居庸路都司三十五年授督標後營逰擊三十九年九月山東逆匪王倫擾臨清直𨽻總督周元理恐賊竄入境令武靈阿等赴王家淺察探行至塔灣西南距臨清三里遇賊百餘縱火劫掠武靈阿直前奮擊賊驚走翌日官兵屯西岸賊三千餘兩路來犯發鎗炮擊之賊散而復合武靈阿射中偽總兵楊壘左肩兵穆維殪之奏入諭曰直𨽻官兵此次堵殺賊匪使其不能西逸將領辨兵俱奮勇出力甚為可嘉武靈阿著交部遇有參將缺出即行升補又諭曰周元理奏逰擊武靈阿射中賊目頗為奮勇著舒赫德看其人材如果可用即補授德州城守尉倘不能勝任亦即據實具奏是月即奏補德州城守尉十月得旨逰擊武靈阿已奏補德州城守尉但城守營所得官項較逰擊轉少是明升其官而暗減其祿非所以示體恤著舒赫德再將武靈阿才具心地與臨清城守之德州恭將烏大經秉公比較若烏大經勝於武靈阿即著烏大經升補臨清副將其所遺德州恭將員缺令武靈阿升補俱著舒赫德妥酌具奏旋奏補德州營參將舒赫德尋以武靈阿明敏勇幹訓練有方請調補撫標中軍參將詔如所請四十一年二月上巡幸山東親涖臨清州舊城詢及官兵剿捕情形諭內閣曰參將武靈阿係在事出力之人雖已加恩擢用仍著賞戴花翎示奬十月遷陕西慶陽協副將四十四年擢甘肅寧夏鎮總兵四十六年六月從剿蘭州逆回蘇四十三於華林山四十七年三月署陜西固原提督七月回寧夏鎮任四十八年六月卒農起農起滿洲正紅旗人姓索佳父彰萊官副都統乾隆二十五年農起由筆帖式授工部主事纍遷員外即中三十四年授湖南驛鹽長寶道三十八年遷湖南按察使三十九年調任湖北四十年二月以湖南任內率轉命案錯誤部議降二級調用上念其才尚可用五月授山西按察使十月調任安徽四十二年遷安徽布政使四十三年鳳陽泗州潁州太平和州六安州各屬旱豫省黃河潰隄下注亳州蒙城漸及鳳陽泗州所屬州縣詔撥川米十萬石以賑農起遍至各屬察勘督辦飭屬捐設粥厰並奏支社倉榖煮粥助賑疏入報聞四十四年以失察天長縣貢生程樹留所刻詩文狂悖復失察鳳陽縣吏侵蝕賑銀兩經部議革任詔免四十五年五月調河南布政使八月擢安徽巡撫四十六年三月諭曰農起審擬巡檢潘振宗藉端婪索致斃人命一案僅擬發往伊犂殊為好名輕縱部議革任本屬咎所應得念其辦理上年賑務於撫恤事宜尚能認真著加恩從寬免其革任注册十年無過方準開復四十七年正月調山西巡撫三月奏言向例大同朔平府屬州縣食口鹽平陽蒲州澤州潞安絳州等屬四十四州縣食河東引鹽太原汾州寧武代州欣州等屬四十四州縣引課歸入地丁就近刮食土鹽聼民販運蒙古鹽入內地接濟乾隆四十五年皇上軫念河東商乏禁販運蒙古鹽積存口外七百餘萬斤致土鹽價昻臣思以蒙古鹽之有餘補內地土鹽之不足於民食生計有益請令地方官給以印票聼向食土鹽居民赴口外買運下部議行並議該省招富户充商五年輪換一次最易滋弊請敕該撫妥籌議奏十月奏覆池鹽陸運成本較重查鹽價原視年之豐嗇酌定自前鹽政衆神保以價分貴賤易起爭端就彼時賤價奏為定額後鹽畦被水商力愈乏前撫臣巴延三是以有招富戶五年輪換之請新商不善經營虧折愈多臣訪輿論均以鹽課歸地丁為便查池鹽商運民銷法行已久長商既力不能支短商又形竭蹶揆其受病之由實因澆晒工本運費較前倍增而鹽價依舊商運拮據民多食淡是病商即以病民懇恩俯念河東池鹽為三省民食攸關於定額外每斤量加價銀二釐停五年輪換之例選現商殷實者定為長商將引地分三等勻配􅍐分以資調濟廷議現增二釐之價試行三年後商力充裕再請酌減又奏浚榆次縣塗河棘針渠貫入永康渠灌溉瀕河地畝疏入報聞是年晉省秋審册九卿改擬情實者二十二起部議革任詔留任四十八年九卿核議晉省秋審招册改入情實者三十一起諭令明白回奏尋回奏疏至諭曰秋讞大典由各省督撫分别情實緩決核準具題其中或稍有出入經九卿核改未有如今年之甚者至農起經朕降旨詢問令其明白回奏乃竟於朕前強為陳辨一似九卿核改各案盡屬非是並稱核之連年秋審擬入情實數目適為相凖等語此何言耶定擬案罪祗論其情罪確當豈有較論上年人數多寡之理使必執人數而論設遇案犯較少之年豈竟將無罪之人有心羅織以足其數耶農起此奏不是尤大著革去翎頂並停止三年巡撫養亷仍留山西巡撫之任以觀後效四十九年七月因辦理赴甘肅勦逆回兵差妥協詔復翎頂仍準支巡撫養廉十二月入覲與千叟宴五十年四月副都御史梁敦書山西香差旋京召見奏汾州一帶二麥多未種民情艱苦諭農起據實陳奏農起覆奏現在不致成災諭曰地方雨水短缺致成偏災於閭閻生計大有關係農起接奉前旨自應迅速親赴汾州一帶實力查勘乃竟安坐省城惟以臆度之見一奏塞責朕厪念民依無時或釋農起為封疆大吏寧不之知所奏各屬得雨止據地方官稟報未必盡皆確實且其中有三四寸者不得謂之霑足看來汾州一帶仍未得有透雨而該撫遽稱不致成災含混具奏竟屬有心諱飾著交部嚴加議處即親往汾州一帶確勘據實奏聞尋奏各屬現已得雨二麥可望有收秋糧漸次播種無庸先行撫恤現飭藩司往勘前梁敦書奉使所至係榮河一帶僻處山陬民婦聚集邀賞正值青黃不接藉端申訴諭曰地方旱災民瘼攸關朕宵旰勤求無時或釋凡遇奉使回京復命之員召見時無不詢以沿途地方情形如有奏及雨澤愆期及民生拮據者即諭該督撫籌辦撫恤即所奏不實從不肯以為百姓之故加以處分蓋朕之意總以民依為重惟恐閭閻艱苦壅於上聞農起寧不知之乃接奉前旨僅令藩司前往又以地方官稟報虛詞支飾陳奏且謂梁敦書因吝惜賞賚藉端入奏更不免吹毛求疵豈朕簡用委任之本意耶農起由司道用至巡撫並非由人保薦因其在藩司任內辦理安徽偏災尚能留心民事經朕特加拔擢復由安徽調任山西今該省地方缺雨乃復回護諱飾巧言陳奏殊不類其平日所為業已交部議處並令親往確勘即未至成災亦應妥為撫恤或借口糧或緩征以資接濟五月農起親往太汾沁遼隰平等處確勘連得透雨麥秋並未成災惟秋收尚早奏請酌糶常平榖借給口糧本年錢糧緩至秋後徴收諭曰平陽蒲州等處麥收既歉著即賞兩月口糧餘照所請速行分别平糶酌借緩徴以資接濟而紓民力至晉省迤南各屬雨澤短缺農起從前奏報各摺並未剴切陳明本屬含混是以朕未能深悉該省被旱實情梁敦書回京奏及節經傳旨將該撫交部嚴加議處並加恩從寬留任矣今據將查勘實在情形詳悉覆奏並稱如果成災該道府州縣七十餘員何盡隱匿不報且詢之村莊小民僉稱實未成災倘地方官隱匿不報何難至上司衙門呈控等語農起既經親往查勘所奏自屬實在情形地方雨水收成朕亦不能不以督撫之言為據農赽尚不至有心諱飾但即該撫所奏平糶緩徴酌借口糧之處何以不早行籌辦耶朕厪念民依如傷在抱似此拯救災黎之事一經督撫奏聞立時降旨俾小民生計有資早霑一日之惠即早得一日之益乃晉省缺雨已久直待朕降旨詢問該撫始親往查勘奏聞辦理以致小民遲霑渥澤此即農起從前含糊具奏之咎封疆大吏當仰體朕懷留心民瘼豈應延緩含混若此耶農起已經部議從寬留任此次姑寬之後倘仍有心回護虛詞支飾將來一經小民告發及籍𨽻山西之科道等官恭奏查出實情朕必從重治罪不能再為寬貸也八月卒諭曰山西巡撫農起自簡任封疆以來辦理地方事宜頗能實心整頓今聞溘逝殊屬可惜所有任內降革處分準其開復應得恤典該部察例具奏尋賜祭葬如例欽定八旗通志卷一百六十六
