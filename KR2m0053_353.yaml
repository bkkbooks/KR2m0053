body:
  text: 八旗大臣題名四各省總兵梁武漢軍正藍旗人順治七年任直𨽻天津鎮總兵管効忠漢軍鑲黄旗人順治八年四月任直𨽻天津鎮總兵九年三月革甘應祥漢軍正藍旗人順治九年三月任直𨽻天津鎮總兵十五年八月觧克徳滿洲正藍旗人順治十五年九月任直𨽻天津鎮總兵康熈五年六月調佟輔聖漢軍正紅旗人康熈五年六月任直𨽻天津鎮總兵六年七月休徐治都漢軍正白旗人康熈七年正月任直𨽻天津鎮總兵八年十二月調劉國軒漢軍正紅旗人康熈二十三年三月任直𨽻天津鎮總兵徐仁漢軍鑲黄旗人雍正元年六月任直𨽻天津鎮總兵四年三月陞副都統管承澤漢軍鑲黄旗人雍正六年三月任直𨽻天津鎮總兵九年四月署山西大同鎮總兵崔世禄漢軍鑲黄旗人順治十一年四月任直𨽻正定鎮總兵康熈十一年十二月調張和善漢軍正黄旗人康熈十一年十二月任直𨽻正定鎮總兵十五年六月觧任唐鈺漢軍鑲黄旗人順治元年正月任直𨽻宣化鎮總兵三月調天津鎮總兵十八年五月故佟學文漢軍正藍旗人順治十一年四月任直𨽻宣化鎮總兵十六年閏三月休拜音達禮漢軍正白旗人康熈九年三月任直𨽻宣化鎮總兵十三年七月調閻可權漢軍正黄旗人康熈十三年七月任直𨽻宣化鎮總兵許廷桂漢軍正黄旗人雍正元年十一月任直𨽻宣化鎮總兵三年十二月陞副都統黄廷桂漢軍鑲紅旗人雍正三年十二月任直𨽻宣化鎮總兵五年二月陞四川提督乾隆三年降直𨽻天津鎮總兵十一月陞古北口提督覺羅保住正紅旗人康熙五十四年十二月任直𨽻古北口總兵五十九年三月降董象緯漢軍鑲黄旗人康熈五十九年十一月任直𨽻古北口總兵雍正元年九月陞廣東提督四年十月任馬蘭鎮總兵范時繹漢軍鑲黄旗人雍正元年二月任直𨽻馬蘭鎮總兵郭拱辰漢軍正白旗人康熈十三年正月任山西太原鎮總兵十八年正月休呉啟爵漢軍正黄旗人康熈二十三年八月任山西太原鎮總兵二十四年九月調瓊州鎮總兵三十二年四月調天津鎮總兵九月休姚宏信漢軍鑲藍旗人康熈三十二年五月任山西太原鎮總兵三十四年五月卒毛來鳯漢軍正藍旗人康熈三十四年七月任山西太原鎮總兵三十七年五月休彭有徳漢軍正黄旗人順治十一年三月任山西大同鎮總兵十七年五月卒李應魁漢軍正紅旗人康熈十一年十二月任山西大同鎮總兵十二年六月觧祖秉衡漢軍正白旗人雍正五年八月任山西大同鎮總兵六年八月陞鎮海将軍沈朝華漢軍鑲白旗人順治三年十月任陜西延綏鎮總兵李哈喇庫漢軍正白旗人順治七年三月任陜西延綏鎮總兵康熈二年七月陞浙江提督陳竒䇿漢軍鑲藍旗人康熈二年七月任陜西延綏鎮總兵三年六月卒韓應琦漢軍正藍旗人康熈三年十月任陜西延綏鎮總兵九年三月休馬三竒漢軍鑲黄旗人康熈十六年八月任陜西平陽鎮總兵三十二年六月調廣東潮州鎮總兵三十八年二月陞貴州提督喻明簡漢軍正藍旗人康熈三年十月任陜西興漢鎮總兵二十三年六月卒萬永祺漢軍鑲白旗人康熈三十一年正月任陜西興漢鎮總兵三十六年四月陞副都統金鍾漢軍正黄旗人康熈四十九年七月任陜西興漢鎮總兵述明滿洲鑲黄旗人康熈六十年四月任陜西興漢鎮總兵六十一年四月調凉州鎮總兵董玉祥漢軍正黄旗人康熈六十一年四月任陜西興漢鎮總兵雍正元年十月調江西南贛鎮總兵三年七月調河南南汝鎮總兵四年三月卒武正安漢軍正藍旗人雍正元年三月任陜西興漢鎮總兵三年三月革董紹祖漢軍鑲白旗人雍正五年八月任陜西興漢鎮總兵孫思克漢軍正白旗人康熈二年五月任甘肅鎮總兵二十三年五月陞甘肅提督楊長泰漢軍鑲黄旗人康熈五十七年六月任甘肅鎮總兵雍正六年正月陞副都統周國正漢軍鑲紅旗人順治十六年十月甘肅寕夏鎮總兵十八年四月革桑格漢軍鑲藍旗人康熈三年十月任甘肅寕夏鎮總兵十二年十月陞雲南提督李嗣興漢軍正黄旗人康熈二十六年三月任甘肅寕夏鎮總兵三十年七月卒李繩武漢軍正白旗人雍正八年七月任甘肅寕夏鎮總兵王可臣漢軍正白旗人康熈三年十月任甘肅西寕鎮總兵十二年十一月陞阿蘭泰滿洲鑲藍旗人康熈三十七年五月任甘肅西寕鎮總兵三十八年三月休殷泰滿洲鑲紅旗人康熈四十四年六月任甘肅西寕鎮總兵王以謙漢軍正白旗人康熈五十年八月任甘肅西寕鎮總兵雍正三年五月調山西大同鎮總兵五年三月休畢科滿洲正黄旗人順治十六年二月任甘肅凉州鎮總兵朱衣容漢軍正藍旗人康熙十四年三月任甘肅固原鎮總兵十五年三月調西寧鎮總兵十八年十二月觧栢永馥漢軍正黄旗人順治十三年二月任甘肅臨鞏鎮總兵十五年十月移鎮西寕康熈三年陞呉洪漢軍鑲紅旗人康熈三十七年二月任四川鎮守鎮總兵四十年正月調建昌鎮總兵四十一年九月陞副都統任國榮漢軍鑲黄旗人雍正五年二月任四川重慶鎮總兵九年正月回京佟浩年漢軍正藍旗人康熈三年十月任四川建昌鎮總兵十年八月休郝宏勲漢軍正白旗人康熈四十八年三月任四川建昌鎮總兵雍正三年十月調廣東髙雷鎮總兵五年二月回京楊琳漢軍鑲紅旗人康熈三十八年十月任雲南臨安鎮總兵孫宏本漢軍正白旗人雍正四年八月任雲南臨安鎮總兵李懋功漢軍正白旗人康熈二年十月任雲南曲尋鎮總兵馬天寵漢軍鑲黄旗人康熈四十八年三月任雲南曲尋鎮總兵五十四年十一月陞副都統髙必盛漢軍鑲紅旗人康熈二十年十二月任雲南開化鎮總兵二十五年六月陞副都統朱廷桂漢軍鑲白旗人康熈三十九年六月任雲南開化鎮總兵四十三年六月陞副都統黄秉鉞漢軍正黄旗人康熈四十三年十月任雲南開化鎮總兵五十年三月陞都統閻光煒漢軍正黄旗人康熈五十六年六月任雲南開化鎮總兵雍正二年七月革牛鳯翔漢軍正白旗人康熈二十年十二月任雲南楚雄鎮總兵劉俊傑漢軍鑲黄旗人康熈五十九年十二月任雲南楚雄鎮總兵雍正元年八月陞副都統線惟明漢軍正白旗人康熈六年二月任雲南永順鎮總兵偏圖漢軍正白旗人康熈二十年正月任雲南永順鎮總兵二十三年二月陞雲南提督郝玉麟漢軍鑲白旗人雍正元年正月任雲南鶴麗鎮總兵九月陞雲南提督線玉元漢軍正紅旗人康熈五十七年十二月任貴州安籠鎮總兵四十六漢軍鑲藍旗人康熈十年九月任貴州大定鎮總兵二十一年二月調鶴麗鎮總兵盧崇耀漢軍鑲黄旗人康熈十八年六月任永州鎮總兵三十年十月任貴州大定鎮總兵三十四年六月陞副都統郭朝振漢軍正黄旗人康熈三十九年九月任貴州威寕鎮總兵石禮哈漢軍正白旗人雍正二年六月任貴州威寕鎮總兵三年四月署貴州廵撫王永清漢軍正紅旗人康熈九年十月任貴州黔西鎮總兵梁永禧漢軍正白旗人雍正三年五月任廣西左江鎮總兵劉成龍漢軍正紅旗人康熈十三年五月任湖廣㐮陽鎮總兵二十年十二月調廣東瓊州鎮總兵二十四年九月陞副都統張永祥漢軍鑲黄旗人康熈二十一年二月任湖廣襄陽鎮總兵二十二年二月調貴州大定鎮總兵髙其位漢軍鑲黄旗人康熈四十六年十二月任湖廣㐮陽鎮總兵五十二年五月陞湖廣提督佟國弼漢軍鑲紅旗人康熈五十二年五月任湖廣㐮陽鎮總兵雍正元年陞副都統阿爾泰漢軍正紅旗人康熈三年十月任湖廣辰常鎮總兵七年六月調浙江黄巖鎮總兵十四年正月遇害金宏鎮漢軍正白旗人改名金鐸康熈四十一年二月任廣東左翼鎮總兵五十三年八月陞副都統汪鋐漢軍正紅旗人康熈五十三年十月任廣東左翼鎮總兵雍正元年六月革髙登科漢軍鑲紅旗人康熈二十年十二月任廣東右翼鎮總兵三十六年十一月陞副都統范時㨗漢軍鑲黄旗人康熈四十一年六月任廣東右翼鎮總兵四十二年十二月調瓊州鎮總兵四十七年正月調寕夏鎮總兵五十七年六月署甘肅提督雍正九年八月調大同鎮總兵十年十月署臨鞏鎮總兵羅聫芳漢軍鑲藍旗人康熈四十六年八月任廣東右翼鎮總兵雅思哈滿洲正藍旗人雍正元年八月任廣東右翼鎮總兵五年二月陞都統韓佐周漢軍鑲藍旗人康熈三十二年六月任廣東碣石鎮總兵三十三年六月陞副都統劉顯芳漢軍鑲藍旗人康熈十八年五月任廣東潮州水師鎮總兵二十一年五月調左翼鎮總兵二十八年十二月陞副都統祖澤清漢軍鑲黄旗人康熈六年十二月任廣東髙雷亷鎮總兵左世永漢軍正黄旗人康熈五十年十二月任廣東髙雷亷鎮總兵五十一年十二月陞副都統藺佳進漢軍鑲黄旗人康熈五十七年十月任廣東髙雷亷鎮總兵雍正三年四月革崔世榮漢軍鑲黄旗人康熈六年十一月任廣東瓊州鎮總兵佟國卿漢軍正藍旗人康熈十年十一月任廣東瓊州鎮總兵施廷専漢軍鑲黄旗人雍正五年八月任廣東瓊州鎮總兵七年閏七月調左翼鎮總兵乾隆二年三月調湖北宜昌鎮總兵六年十月丁憂九年十月任甘肅寕夏鎮總兵十四年八月調浙江温州鎮總兵二十年十一月調江南蘓松鎮總兵二十一年三月觧二十二年十月復任二十四年正月觧唐光堯漢軍鑲黄旗人康熈二十三年四月任廣東瓊州鎮總兵三十二年八月調廣西左江鎮總兵四十年二月陞副都統張大治漢軍鑲黄旗人順治十七年九月任江南蘓松水師鎮總兵康熈十年二月休甯維國漢軍鑲藍旗人康熈四十年三月任江南蘓松水師鎮總兵四十二年四月調髙雷亷鎮總兵魏經國漢軍正白旗人康熈五十七年二月任江南蘓松水師鎮總兵五十八年正月調天津鎮總兵趙宗科漢軍鑲黄旗人順治十八年十月任江南江寕鎮總兵康熈十年二月故蔣登雷漢軍鑲紅旗人康熈七年正月任江南狼山鎮總兵八年九月革諾邁漢軍鑲藍旗人康熙八年九月任江南狼山鎮總兵十九年九月陞金世榮漢軍正黄旗人康熈十九年九月任江南狼山鎮總兵二十三年八月調福建鎮總兵二十八年十二月陞浙江提督姚儀漢軍鑲紅旗人康熙二十一年正月任江南狼山鎮總兵二十三年二月丁憂二十四年任沅州鎮總兵三十一年六月任雲南鶴麗鎮總兵三十四年九月陞副都統徐九如漢軍正白旗人康熈三十六年四月任浙江黄巖鎮總兵四十一年九月陞副都統許國桂漢軍鑲藍旗人康熈四十三年十月任浙江黄巖鎮總兵施世驃漢軍鑲黄旗人康熈四十年三月任浙江定海鎮總兵金宏聲漢軍正黄旗人康熈六十一年十一月任浙江定海鎮總兵雍正二年閏四月故張溥漢軍正黄旗人雍正二年閏四月任浙江定海鎮總兵四年十月調㐮陽鎮總兵七年四月陞廣西提督尚好仁漢軍鑲白旗人順治十三年四月任浙江温州鎮總兵十七年四月觧任祖宏勲漢軍正黄旗人康熈八年二月任浙江温州鎮總兵十二年二月觧任石如璜漢軍正白旗人康熈三十七年五月任江西南瑞鎮總兵三十九年六月陞副都統管源忠漢軍鑲黄旗人康熈二十九年七月任江西南瑞鎮總兵四十一年九月陞廣州将軍甘國培漢軍正藍旗人康熈五十三年五月任江西南瑞鎮總兵五十五年十月陞副都統楊長春漢軍鑲黄旗人康熈五十九年十月任江西南瑞鎮總兵陳圭璋漢軍正藍旗人雍正五年二月任江西南瑞鎮總兵胡有陞漢軍鑲黄旗人順治四年三月任江西南贛鎮總兵康熈六年四月休哲爾肯漢軍鑲紅旗人康熈十