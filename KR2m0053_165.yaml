body:
  text: 欽定四庫全書欽定八旗通志卷一百五十一人物志三十一大臣傳十七滿洲正黃旗五傅逹禮烏丹帥顔保鄂明珠哈素丹克濟查弼納赫夀帥顔保帥顔保滿洲正黃旗人姓赫舍里大學士希福之次子也聖祖仁皇帝康熙元年正月以希福自太宗文皇帝時贊理機務勤勞素著諭吏部視大學士范文程額色赫例擢用其子為學士遂授國史院學士六年四月教習庶吉士九月充纂修世祖章皇帝實録副總裁八年六月擢吏部右侍郎七月授漕運總督九月疏言淮安為水陸孔道乃十五里內連設三關其板閘鈔關與淮安倉之稅户部差員徴收清江厰船料等稅工部差員徴收胥役繁多啇人耗費多端稽遲時日請以三關額課歸併一關徴收則胥役減而商民俱便疏下部議户部言淮安倉稅應歸併淮安關工部言清江厰之稅為修造漕船經費宜分徴如舊上以厰稅歸併一關亦不致虧課命九卿科道再議如帥顔保所請九年正月疏言淮揚二府屬州縣上年夏季被水已奉旨令督撫察勘災傷分數蠲免額賦其漕糧漕項例不蠲免而髙郵州宿遷桃源鹽城贛榆等縣連嵗歉收所有上年應徴及帶徴舊欠萬難併徴請敕部議疏下部議令改折帶徴得旨髙郵等處災傷與他處不同其未完未徴漕米仍令帶徴恐小民不能完納以致困苦下部再議蠲免未完康熙六七兩年漕米三萬一千餘石閏二月疏言户部行令漕項錢糧俱以制錢收放伏思漕項錢糧非解部交納即給丁濟運以及修造漕船之需與本地支銷者不同且漕船行月白糧經費領運長途遇淺起剝遇溜添䉡所費不資勢難負錢逺涉應仍準徴銀支給疏下部議從之十二年正月同河道總督王光裕疏言舊例每年漕運全完河工嵗修告竣舉劾所屬文武各官以示勸懲至康熙四年部議停止伏思漕糧徴兑匪易運解維艱且需多方催儹使如期抵通至黃河頂衝危險運河旱潦疏濬惟賴經管各官竭力殫心不辭勞瘁庶河流循軌而漕艘得以飛挽若勤惰罔分恐因循貽誤請仍遵舊例每年分别舉劾疏下部議行於是疏薦山東糧道遲日巽河南糧道范周無錫知縣吳興祚等又劾罷溧陽知縣王錫琯等十三年十月以逆藩吳三桂窺犯江西需兵勦禦詔率所部往駐十二月因安親王嶽樂已統師抵南昌撤回十七年六月安親王進征湖南仍率兵鎮守南昌九月移鎮吉安十八年三月疏言吉安各屬衆山連接逆賊􅌉踞出沒不時臣令副將色勒許壯猷逰擊章紘等率兵分堵緊要隘口斷賊糧道相機勦撫别令知府蔣維藩會同遣官入賊巢宣布敕諭招降偽總兵副將以下五十餘員兵萬餘十九年八月平南王尚之信為其護衛張永祥等首告跋扈怨望諸罪逮繫勘鞫詔將軍賴塔以罪不株連諭慰藩屬命帥顔保率兵至南雄韶州酌駐要地十月命回漕運總督任二十年五月內升工部尚書十二月調禮部尚書二十二年正月以疾解任二十三年十二月卒年四十有四賜祭葬如例子赫奕由侍衛授內務府總管遷工部尚書見大臣表明珠明珠滿洲正黃旗人姓納喇葉赫貝勒錦台什之孫也父尼雅哈當太祖髙皇帝滅葉赫時隨其兄德勒格爾來降授佐領屢從征有功世祖章皇帝定鼎燕京豫騎都尉世職順治三年卒長子振庫襲明珠其次子也由侍衛授鑾儀衛治儀正遷內務府即中聖祖仁皇帝康熙三年擢內務府總管五年授宏文院學士六年充纂修世祖章皇帝實録副總裁七年奉命與工部尚書瑪爾賽閲淮揚河工定議修復興化縣之白駒場舊閘增鑿黃河北岸引河以偹蓄泄是年刑部尚書對喀納遷大學士明珠授刑部尚書八年以對喀納兼刑部尚書改明珠都察院左都御史十年二月充經筵講官八月奏停巡鹽御史遍厯州縣之例十一月遷兵部尚書十二年正月上幸南苑閲八旗甲兵於晾鷹臺明珠先期布條教俾衆演習及期軍容整肅上諭之曰今日陳列甚善可著為令是年平南王尚可喜請撤藩移遼東吳三桂耿精忠亦以是請下議政王大臣會議時有謂三桂當久鎮雲南不可撤者明珠與户部尚書米思翰刑部尚書莫洛等堅持宜撤遂以兩議上詔從明珠等議十四年調吏部尚書十六年授武英殿大學士先是吳三桂反大學士索額圖謂因撤藩激變宜罪議撤諸臣上弗許及耿精忠降尚之信賜死吳逆殄滅上宣諭廷臣以前議撤藩惟明珠與米思翰莫洛等為能稱旨云二十一年議政王大臣等勘論耿精忠及其黨曽飬性等二十餘人罪狀擬奏如律上召詢廷臣欲量豫寬減明珠奏耿精忠罪浮於尚之信尚之信縱酒行凶口出妄言耿精忠負恩謀反悖逆尤甚法在不赦上又諭以逆黨多人尚宜矜釋明珠奏此中惟陳夢雷金鏡田起蛟李學詩可寬上仍命王大臣集議俱如明珠言於是陳夢雷等四人免死入旗為奴耿精忠曽飬性等咸伏誅時詔重修太祖太宗實録及編纂三朝聖訓政治典訓平定三逆方略大清會典一統志明史皆以明珠為總裁官兩遇實録告成加太子太傅晉太子太師二十七年二月御史郭琇疏劾明珠與大學士余國柱背公營私諸欵一凡閣中票擬俱由明珠指揮輕重任意余國柱承其風旨即有舛錯同官不敢駁正聖明時有詰責漫無省改即如陳紫芝參劾張汧疏內并請議處保舉之員上面諭九卿應一體嚴處票擬竟不之及一眀珠凡奉諭旨或稱其賢則向彼云由我力薦或稱其不善則向彼云上意不喜吾當從容挽救且任意增添以市恩立威因而要結羣心挾取貨賄至每日奏畢出中左門滿漢部院諸臣及其腹心拱立以待皆密語移時上意無不宣露部院衙門稍有關係之事必請命而行一明珠連結黨羽滿洲則佛倫格思特及其族姪富拉塔錫珠等漢人之總攬者則余國柱結為死黨寄以腹心凡會議會推皆佛倫格斯特等把持而國柱更為之囊槖惟命是聼一督撫藩臬缺出余國柱等無不展轉販鬻必索及滿欲而後止是以督撫等官愈事剝削小民重困今天下遭遇聖主愛民如子而民間猶有未給足者皆債官搜索以奉私門之所致也一康熙二十三年學道報滿之後應升學道之人率往論價九卿選擇時公然承風缺皆預定由是學道皆多端取賄士風文教因之大壞一靳輔與明珠余國柱交相固結每年糜費河銀大半分肥所題用河官多出指授是以極力庇護當下河初議開時彼以為必委任靳輔欣然欲行九卿亦無異詞及上欲另委人則以于成龍方沐聖眷舉出必當上旨而成龍官止臬司可以統攝於是議題奏仍屬靳輔此時未有阻撓意也及靳輔張大其事與成龍議不合始一力阻撓皆由倚託大臣故敢如此一科道官有內升出差者眀珠余國柱率皆居功要索至於考選科道即與之訂約凡有本章必須先行請問由是言官多受其牽制一明珠自知罪戾見人輒用柔顔甘語百計欵曲而隂行鷙害意毒謀險最忌者言官恐發其姦狀當佛倫為總憲時見御史李時謙纍奏稱旨御史吳震方頗有參劾即令借事排陷聞者駭懼以上各欵俱約略指參總之明珠一人其智術足以彌縫罪惡又有余國柱姦謀附和負恩之罪罄竹難盡伏祈霆威立加嚴譴天下人情無不欣暢奏入上諭吏部曰國家建官分職經理庶政必須矢志精白大法小亷各守職業實心任事庶無負拔擢簡用之意朕親理萬幾厯有年所於爾部院大小官員行事無不深知為臣子者既儋爵受祿榮及父母庇及子孫家能自給便當知足無致隕越前已屢頒諭旨嚴行申誡又復諄諄靣諭訓誨再三今在廷諸臣自大學士以下有職掌官員以上全不恪勤乃職惟知早出衙署偷安自便三五成羣互相交結同年門生相為援引傾陷商謀私事徇庇同黨圖取貨賂作弊營私種種情狀確知已久九卿詹事科道皆朕委任之員凡遇會議自當各出已見公同商酌乃一二欲行倡率之人持議于前衆遂附和於後雷同草率一意詭隨又其甚者雖在會議之班茫無知識隨衆畫題希圖完結廷議如此國是何憑又有當集議時緘默自容及至僨事巧於推卸朕深惡此等推諉苟容之輩亦屢加嚴飭至於用人關係重大羣臣賢否難以周知故遇緊要員缺特令會同推舉原期為國得人實有禆益亦欲令被舉者警心易慮恐致溺職纍及舉者因而勉自刻勵九卿諸臣宜體朕心從公選舉方為不負委任乃厯來所舉官員稱職者固有而貪黷匪類往往敗露此皆瞻徇情面植黨納賄所致凡兹情弊朕非不知前者班布爾善阿斯哈等身為大臣所行悖亂致干憲典遂行正法至今猶耿於懷是以比來大小官員背公𧾱私交通貨賄朕雖洞見而不即指發冀其自知罪戾痛加省改庶可終始保全詎意積習深錮漫無悛悔如審擬蔡育榮一案庇護挽救瞻徇黨類百計營求因朕具悉其姦私謀未遂近差塞楞額往審張汧被參事情朕面諭塞楞額張汧居官貪穢爾宜嚴行審出逮差回時詢問塞楞額奏稱臣於此案盡心嚴鞫若有失實甘受誅戮及覽其奏案惟是纍及保舉張汧之人竟為庇護朕知內閣原擬票簽將保舉張汧官員并未議及業行折出又念張汧審結定罪之後自然發露因仍用原簽票發又靳輔下河工程屯田之案朕早已察其情弊特遣佛倫等前往勘議今所議殊屬偏私且凡會議之時科爾坤佛倫等務執己見持論好勝茍非懷挾私情何以力排衆議朕亦曽面加誡諭未見畏悔如此積弊愈久愈深物議沸騰輿情憤激以致言官列欵參奏本應發明其事以肅官方因不忍遽行加罪大臣且用兵之時有曽效勞績者故免其發覺勒德洪明珠著革去大學士交與領侍衛內大臣酌用李之芳著休致回籍余國柱著革職科爾坤著以原品解任佛倫熊一瀟等著解任於河工案內完結嗣後大小臣工各以洗滌肺腸痛改陋習潔己奉公勉盡職掌以副朕寬大矜全咸與維新之至意尋授明珠為內大臣二十九年上命裕親王福全統兵征噶爾丹明珠與領侍衛內大臣索額圖等參贊軍務尋以噶爾丹敗遁不行追剿議罪降四級留任三十五年四月上親征噶爾丹遣明珠與左都御史于成龍督運西路軍餉五月以噶爾丹敗遁班師明年上復親征明珠扈從至寧夏奉命撥駝運餉又偕學士黃茂齎白金頒賚鄂爾多斯隨征兵衆師還敘功復原級四十三年奉命與內大臣阿密達等賑山東河南流民之就食京師者四十七年四月卒年七十有四上遣皇子奠茶酒賜祭葬如例今上乾隆三十七年十月諭曰國史館進呈新纂明珠列傳內所列郭琇糾參各欵臚採不全於核實紀載之義未合明珠在康熙年間身為大學士柄用有年乃竟不克自終漸至植黨營私市恩通賂勢𦦨熏灼物議沸騰皇祖疊申誡諭期得以恩禮保全而明珠不知省改致為郭琇參奏復念其於平定三藩時曽有贊理軍務微勞不即暴示罪狀然亦立豫罷斥並未嘗廢法姑容後雖量為録用僅授內大臣之職距其身沒二十餘年不復再加委任此實皇祖恩威並用權衡纎毫不爽逈非三代以後所可幾及而確核明珠罪案祇在徇利太深結交太廣不能恪守官針要不致如前代之嚴嵩溫體仁輩竊㺯威福竟敢隂排異己潛害忠良舉朝側目而莫可誰何也即如眀珠以現任閣臣而郭琇即以露章臚欵抨擊甚力使明珠果能如眀季諸姦箝制言路則郭琇矢口之間早已禍不旋踵即或深謀修隙亦必多方狙伺假手擠排乃郭琇因此一疏遂以鯁直受知不及二年即由僉都御史洊擢都御史不聞明珠之黨有能為之抑沮者雖其間亦曽因事論黜而我皇祖鑒其政績風力由間廢中擢為湖廣總督後因紅苖搶奪隱慝不報削籍歸里其罪實由自致亦非明珠之黨藉事以為報復今郭琇列傳具在可考而知也至於明珠生平是非功過原不相掩我皇祖慎持豫奪之柄至公至明因物付物恭繹聖諭仁至義盡一一適如其人之所自取即此可以窺見萬一兹館臣裒輯明珠事迹因檢閣庫未獲郭琇劾章似由當日留中不下遂據館中所存郭琇疏稿刋本撮載大凡但其間刪削過多恐傳之既久或疑修史者有意曲為隱諱於據事直書之旨無當也因命於明珠傳中全列郭琇參本俾天下後世得喻此事本末共知我國家立綱陳紀朝寧肅清從無有宵小僉壬如前代之得以怙權千政而我皇祖聖明英斷刑賞持平實為執兩用中之極則朕稟承祖訓凡一切用人行政無不本此意為折衷用是剖悉原委宣諭中外仍命録載傳後使定論昭然永以示傳信而垂法戒焉傅達禮傅達禮滿洲正黃旗人姓吳雅由主事洊升員外即即中康熙六年授內祕書院侍讀學士十年正月改翰林院侍讀學士二月充經筵講官尋又充日講起居注官十二月擢掌院學士兼禮部侍郎諭曰翰林院起居注職任重大關係機密朕以爾才品優卓實可信任故行簡用爾其黽勉以副朕意十一年正月教習庶吉士先是上命儒臣翻譯大學衍義是年七月告成傅達禮奏請刋頒得旨允行十二年四月諭曰滿漢文義照字翻譯可通用者甚多後生子弟漸至差謬爾任翰林院可將滿語照漢文字彚發明某字應如何用某字當某處用集成一書使有益於後學此書不必太急宜詳慎為之務期永逺可傳方為善也書成賜名清文鑑五月教習庶吉士七月重修太宗文皇帝實録充副總裁八月命同禮部侍郎哲爾肯往雲南經理吳三桂撤藩起行事宜諭曰因爾等逺往雲南料理遷移事務特賜朕所佩刀各一口良馬各二匹十一月三桂反被留十三年大兵由湖廣進𠞰三桂釋傅達禮等還上嘉其不屈於賊仍以原官用十四年以經筵講章不稱旨罷尋卒烏丹烏丹滿洲正黃旗人姓納喇葉赫貝勒錦台什之曽孫也聖祖仁皇帝康熙十一年以一等侍衛同學士郭廷祚往視淮安河工決口繪圖還奏詔河臣於宿遷至清河舊堤外增築遙隄以防衝溢十三年順承郡王勒爾錦統師湖廣討逆藩吳三桂烏丹奉使軍中宣諭機宜旋以陜西提督王輔臣叛附三桂上命烏丹署副都統領兵駐守太原旋命署建威將軍移兵潼關至即遣兵𠞰平華州商州諸賊十五年隨大將軍圖海征平涼賊據城北虎山墩聫聲援通餉運烏丹督兵奮擊大創賊衆遂奪虎山墩俯攻平涼城輔臣惶懼乞降烏丹率數騎入城安撫降衆十七年授護軍統領時漢中興安尚為三桂賊黨所據詔圖海進征以烏丹參贊軍務尋分兵擊敗賊衆於牛頭山及香泉等處是年十二月圖海入覲烏丹奉命仍佩建威將軍印暫統大兵十八年九月諭烏丹曰爾在朕左右有年稔知朕意應勇果任事參贊大將軍機宜以立功勳十月圖海統師至鎮安縣偵知賊在梁河關烏丹繼將軍佛尼埓後進擊與偽總兵王遇隆戰於火神崖敗之渡乾玊河奪梁河關乘勝追𠞰恢復興安上命圖海還駐鳯翔烏丹仍以建威將軍分統大兵繼將軍王進寶之後征四川烏丹疏請敕西安甘肅兩巡撫速趣運餉至略陽俾克乘時進取詔如所請十九年正月烏丹先遣兵斷賊餉道自與王進寶擊賊於蟠龍山錦屏山諸處大破之遂趨保寧奪浮橋斬關入城生擒偽將軍吳之茂張起龍偽總兵郭天春等保寧平時勇略將軍趙良棟亦復成都烏丹與王進寶佛尼埓議分兵取順慶重慶佛尼埓先行招降順慶偽知府彭天夀等烏丹率兵至重慶偽將軍楊來嘉彭時亨偽總兵路之嵩江有倉等迎降於是達州東鄉太平新寧南江安嶽諸州縣悉定旋奉詔取瀘州與趙良楝會兵進雲南七月良棟疏請敕烏丹速滅永寧賊寇乘勝趨雲南上諭曰烏丹往取瀘州行及一月何故猶未渡江其速令取瀘州𠞰除犯永寧諸處賊寇八月烏丹同佛尼埓領兵攻豹子山瀘州賊渡江遁令前鋒𠫭領博鼎等追擊之擒斬及溺死者無算十月良棟劾烏丹擁重兵二萬不急赴援致永寧再陷仁懷失守得旨成都去永寧不過七八百里烏丹不急赴援遲至六十餘日貽誤殊甚以宣威將軍鄂克濟哈統其兵進征烏丹解將軍任還漢中隨大將軍圖海鎮守二十一年還京議政王大臣等追論遲援永寧罪革護軍統領及佐領尋授為三等侍衛兼佐領二十九年七月喀爾喀扎薩克台吉額爾克阿海等率千餘人作亂而噶爾丹亦犯邉掠烏珠穆沁上命裕親王福全征噶爾丹以烏丹隨師至烏蘭布通擊敗賊衆噶爾丹竄遁裕親王遣烏丹同𠫭領色爾濟博爾和岱往偵噶爾丹所在行數日知已逺去乃還途遇喀爾喀賊衆劫掠烏丹與色爾濟博爾和岱並遇害議恤有差烏丹賜祭葬如散秩大臣又視陳亡例豫雲騎尉世職以其子巴什襲並命巴什兼襲其叔父噶納海二等男爵世宗憲皇帝雍正二年以烏丹入祀昭忠祠素丹素丹滿洲正黃旗人姓富察三等男斐雅斯哈之子也聖祖仁皇帝康熙十一年素丹襲父爵授護軍恭領二十九年隨裕親王福全擊敗噶爾丹於烏闌布通中箭傷三十一年奉命隨安北將軍郎坦勘視寧夏延綏西寧邉界明年擢護軍統領詔同都統希佛統師駐大同預偹征調三十二年郎坦擒獲哈密回人之輸稅厄魯特者訊知噶爾丹所在請發兵進剿上命素丹赴軍前會議尋奏言噶爾丹自烏闌布通敗遁馬畜亡失部衆貧乏遷徙靡常以得所逰牧為幸必不敢復擾我邉疆可暫緩進剿其納稅厄魯特之哈密回人并請釋歸曉諭其酋以示畏懷意尋又以甘涼二府乏糧請移駐防兵於寧夏蘭州奏入皆從之三十五年二月上親征噶爾丹由中路進師詔素丹率增發兵赴西路與撫逺大將軍費揚古刻期並進尋召赴行在統前鋒兵為嚮𨗳視沿途所鑿井五月上至克嚕倫河素丹上言噶爾丹懾我軍威勢將奔竄請上稍緩進征俟西路軍夾擊上從之噶爾丹果遁走為西路軍擊敗師還以扈從勞賜內廄馬一三十七年改授前鋒統領四十年以疾解任世宗憲皇帝雍正元年六月賞銀一千兩命以原銜往甘肅軍營效力時青海羅卜藏丹津逞逆詔撫逺大將軍年羮堯帥師討之素丹恭贊軍事二年正月西寧東北郭隆寺喇嘛為羅卜藏丹津所誘聚衆叛素丹與提督嶽鍾琪統兵進剿賊聚哈拉濟溝我軍奮擊斬馘三千燬寨十乘夜追擊發賊山谷伏兵三千盡殪之四月授正黃旗蒙古都統兼署固原提督十一月授寧夏將軍三年改正紅旗滿洲都統列議政大臣駐守陜西七年四月大軍征準噶爾素丹奉詔率西安滿洲兵一千赴涼州䇿應七月卒於軍年七十有二賜祭葬如典禮諡勤僖先是康熙四十年素丹有疾所襲父爵以長子素圖襲及雍正五年敘平青海功授素丹三等輕車都尉世職以次子素章阿襲素圖自有傳鄂克濟哈鄂克濟哈滿洲正黃旗人姓納喇由侍衛署副都統兼佐領康熙十二年逆藩吳三桂叛分擾陜西湖廣十三年十月上以河南府乃四逹之地距潼關鄖襄皆近駐師其地所在有警可䇿應命鄂克濟哈偕副都統色格率每佐領驍騎三人往駐十二月逆鎮王輔臣叛於寧羌命鄂克濟哈偕將軍阿密逹率所部兵赴西安剿禦十四年正月上以蘭州為近邉要地應遣兵駐守命鄂克濟哈參贊阿密逹軍務移師蘭州剿禦并防階州文縣諸處三月鄂克濟哈擊賊於涇州城南擒斬偽總兵衛民譽等復涇州五月復敗賊衆於寧州近城東山斬偽副將張三偽參將王廷譽及賊衆八百餘復寧州得旨嘉奬下部議敘十六年隨撫逺大將軍圖海進逼禮縣驛門等處敗賊於芭蕉園斬獲無算復塔什堡十七年九月議取漢中興安提督王進寶趙良棟將軍畢力克圖分路進鄂克濟哈隨圖海由興安進漢中興安相繼復十八年十二月圖海以漢中要地請撥滿兵千令鄂克濟哈領振武將軍印同副都統恰塔駐守從之十九年正月進取四川諭鄂克濟哈率漢中滿兵合將軍烏丹為良棟進寶後繼二月大兵分路進剿成都保寧相繼復上以四川已定諭鄂克濟哈同烏丹即精簡士卒馳赴重慶為進取雲貴計三月諭曰四川與雲貴接壤賊必乘間來犯其檄趙良棟同鄂克濟哈等於各要路立營深溝高壘堅為守禦八月諭曰四川漢中滿兵雖為數不少今當進取雲貴著於滿洲蒙古漢軍每佐領下各派護軍二人驍騎四人共帶兵千人令護軍統領佟佳率赴四川既至鄂克濟哈同將軍烏丹酌量分為二路時湖廣提督徐治都疏報瀘州永寧諸處失守逆賊談宏既降復叛閏八月鄂克濟哈以兵復瀘州九月擊賊於托川雅自午至酉奮勇大敗賊賊棄營宵遁捷聞下部議敘十月良棟疏報賊犯仁懷烏丹擁兵不急援致永寧失守得旨成都距永寧不過七八百里烏丹不急赴援貽誤已甚著速解將軍任還漢中鎮守其四川官兵俱付鄂克濟哈統領與趙良棟會商進剿十一月鄂克濟哈疏言烏丹解將軍任後兩路官兵俱臣統領建昌永寧相距千餘里不能兼顧請分路進取命署西安將軍佛尼勒為建威將軍領永寧一路兵與總督哈占會剿二十年三月鄂克濟哈等以建昌軍棄城出自劾失援請嚴加處分諭曰鄂克濟哈久駐成都既不能退敘州諸處來犯之賊復不馳援建昌以致失陷著解將軍印還漢中同將軍圖海守漢中諸處七月召還尋授二等侍衛三十年授正黃旗副都統三十三年遷護軍統領三十四年八月命偕副都統扎喇克圖巡邉十月噶爾丹擾喀爾喀逰牧上命調蒙古各扎薩克兵以鄂克濟哈現赴汛界所有蘇尼特阿巴噶阿巴哈納爾各部兵命領侍衛內大臣索額圖偕鄂克濟哈前往收集各駐要地偵禦三十五年隨征噶爾丹凱旋命駐守寧夏三十八年卒查弼納查弼納滿洲正黃旗人姓完顔祖愛音布任户部理事官世祖章皇帝順治四年以考滿稱職豫雲騎尉職世襲罔替卒查弼納兄觀音保襲三遇恩詔晉至三等輕車都尉從征雲南卒聖祖仁皇帝康熙二十二年查弼納襲世職二十八年管佐領四十四年署護軍參領四十七年授吏部郎中五十年遷內閣侍讀學士五十三年擢內閣學士充玉牒副總裁官五十五年遷兵部侍郎明年充經筵講官六十一年十月授江南江西總督世宗憲皇帝雍正元年有流匪溫上貴結江西棚民藉閉糴為名樹旗謀掠萬載知縣施昭庭新昌知縣李玥調集鄉勇擊殺三百餘人擒溫上貴等十數人獲偽劄偽印鞫得上貴為臺灣逆匪朱一貴遺黨與十數人並伏誅於是大學士白潢尚書張廷玉並陳奏安戢棚民之䇿得旨下查弼納詳議尋奏言江西界連福建湖廣廣東諸省地曠山深土人無力開墾率多招徠流民搭棚居住種藝麻靛名曰棚民但安業日久驅令回籍誠恐别生事端應編入保甲千户以上添駐官辨稽察至編册以後續到流移不得容隱其有膂力可用及讀書向學者準一體入籍應試疏下部議行二年閏四月奏請停止駐防兵巡拏私鹽専責所在州縣嚴緝九月奏言太湖跨連數郡盜匪易藏洞庭東山地當緊要請令新設恭將駐守其簡村周鐵橋鮎魚口馬迹山黿山東山鳯川吳樓各令偹辨分駐又言江南財賦重地知府稽察難周請改六安太倉頴泗廬邳海通等州為直𨽻而蘇松常三府增設元和震澤昭文新陽寶山鎮洋奉賢金山福泉南滙陽湖金匱荆溪等縣分任繁劇皆從之明年以保奏恭將等官六員同一考語傳旨申飭又因疏奏盜案諭曰查弼納條奏弭盜之法極似周詳乃一月之內盜案多至一百九件可見所奏盡屬欺飾耳總督統轄文武弭盜是其專責其務實心嚴察以副朕意四年四月召回京先是有旨以尚書隆科多與貝勒蘇努及公鄂倫岱尚書阿爾松阿等黨附交結事詢問查弼納不以實奏至是上親詢之語多支吾及革職勘問乃舉出王大臣等議請正法上曰朕昨降旨時言及聖祖仁皇帝查弼納痛哭不止尚有良心且在兩江總督任內居官尚好今既舉出實情可寬免其罪尋授內務府總管兼鑲紅旗漢軍都統七月擢吏部尚書十月協理兵部尚書五年三月以濫保兵部郎中舒伸赴直𨽻水利效力部議革職得旨降五級署兵部尚書十月豫實授七年上命發兵進剿凖噶爾授內大臣傅爾丹為靖邊大將軍由北路入總督嶽鍾琪為寧逺大將軍由西路入查弼納奉命赴肅州總理西路軍需明年十月詔入覲授靖邊副將軍改赴北路九年六月噶爾丹䇿凌遣賊三萬來犯北路我軍獲其偵卒詭稱賊酋大䇿凌敦多卜道病留駐和博克山小䇿凌敦多卜逰牧在察罕哈逹兵不滿千距我軍三日程查弼納與傅爾丹信之令參贊大臣素圖副都統岱豪率兵三千先發尋遣前鋒統領定夀率兵一千五百應援而自統軍繼之至庫列圖嶺與賊戰斬馘四百餘又賊兵二萬伏山谷從間道奄至衝突我營我軍力拒殺賊千餘時賊據險要我軍議移營至和通呼爾哈諾爾素圖定夀等引兵突圍多戰殁賊衆環逼我土默特兵潰散查弼納與傅爾丹及副將軍巴賽率兵四千設方營保護輜重且戰且行渡哈爾哈納河查弼納與傅爾丹相失力戰殁于陳巴賽亦被害事聞諭曰準噶爾賊衆侵犯北路將辨兵丁急欲滅此朝食忿激迎擊倉猝失利念此疆場效命之人皆國家養育多年朕特加選用冀其大樹功勳重邀爵賞伊等亦以世受國恩誓圖報效爭先恐後竭力捐軀雖誤墮狡計而矢死效忠情殊可憫其下部議恤賜祭葬如例入祀昭忠祠豫騎都尉加一雲騎尉世職其舊襲之職例銷恩詔所加止襲雲騎尉因合併為三等輕車都尉以其子那清阿襲赫夀赫夀滿洲正黃旗人姓舒穆祿初由筆帖式授內閣中書遷內閣侍讀康熙二十四年遷工科給事中尋轉刑科兼管廣善庫四十三年遷內閣侍讀學士旋擢內閣學士四十五年四月兼管太僕寺十二月授禮部右侍郎仍兼內閣行走明年充經筵講官四十七年遷户部左侍郎尋調吏部左侍郎四十八年正月命往西藏協同內閣學士拉都琿辦事四十九年十二月擢漕運總督五十年八月疏言江西湖廣兩省漕糧給軍副米經御史王謙言條奏應如江南浙江兩省例部議令臣會同各督撫定議按舊制江西浙江湖廣正兑漕米每石加耗米四斗改兑漕米每石加耗米自四斗遞減至二斗二升不等以為運丁盤淺起剝蒸折晒揚之費皆因程途有逺近所以徴給有多寡因地制宜軍民相安已久未可輕事更張從之十月疏言江浙漕船抵通積年挂欠甚多皆由水次出兑時以銀折米運丁沿途既乏副米輒侵用正米致抵通交倉虧缺宜于兑米水次令監兑官坐守糧道親歷稽察務須正耗行月并搭運各米槩行兑足上船如有折銀情弊州縣官照私自改折漕糧例革職仍追米歸欵失察之監兑官及糧道分别議處又江南省糧船三千五百餘浙江省糧船一千三百餘前後開行相去千有餘里每省派通判一員首尾不能兼顧請嗣後江南派七員浙江派三員押船抵通以有無挂欠分别加級降級積至三次實升實降其兑次開行時即令監兑官督押抵淮如在淮盤驗短少懲責旗丁留其子弟一人令於産米處購買足數雇船趕交押運官如仍短少將監兑官題恭其押運千總定例每幫二員輪押實止一員領運或有事故勢必以一員領兩幫恐難兼顧請揀發在部候選千總三四十員遇缺派署向來千總押運全完例止加銜偶有挂欠即行革職人心未免隳阻嗣後有押運積年挂欠之幫而二運全完押運其次挂欠之幫而三運全完押運舊無挂欠之幫而五運全完者請豫即升其駕運旗丁向來每船開報一名或挂欠留通追比則回空無正丁請嗣後每船於本丁兄弟子姪內增報副丁令十船正副丁連環保結能舉首折乾盜賣等弊者酌量給賞如隱匿不舉一丁治罪九丁責懲其旗丁向由衛守偹報充嗣後應令千總先具保結加以府廳等官察驗方準充當其糧船過淮本定限三月以內而從前並無按限過淮者或遲至六月致回空守凍一年阻滯年年遲延請嗣後違限一二月者仍照例處分二月以上者計日不計月分别議處疏下户部會同九卿詹事科道議皆如所請行五十一年巡撫張伯行疏劾總督噶禮會審科場作弊一案有通同賄賣隱情弗研究確供尚書張鵬翮因其子為噶禮屬員瞻顧掣肘噶禮亦疏劾張伯行翻駁命盜案件不能清理各欵並得旨解任質訊諭九卿等曰此案察審實難若令滿大臣審則以為徇庇滿洲若令漢大臣審則以為徇庇漢人張伯行劾噶禮連及張鵬翮意欲使之回避今可令張鵬翮會同赫夀從公審理尋會奏張伯行誣劾噶禮賄賣舉人應革職贖徒噶禮劾張伯行不能清理案件是實餘以會銜題咨舊事苛劾應降一級留任上切責張鵬翮赫夀掩飾和解瞻徇率結遣尚書穆和倫張廷樞前往再􅀈詳見噶禮張伯行傳下九卿核議以噶禮張伯行不和𠂻任事互相訐恭玷大臣職均議禠革詔張伯行仍留原任噶禮依議革職九月以赫夀代噶禮為江南江西總督五十三年張伯行劾奏布政使牟欽元以交通海賊之上海縣人張令濤為幕友得旨革欽元職下赫夀察審赫夀以搜捕弗獲且海中無賊入奏詔張鵬翮同副都御史阿錫鼐往勘五十四年五月覆奏張伯行虗揑誣陷請革職質訊詔從之以赫夀暫署江寧巡撫十月丁母憂上以江寧安徽兩巡撫俱新授未蒞事命赫夀在任守制五十六年四月內遷理藩院尚書七月靖逆將軍富寧安奏拿獲䇿妄阿喇布坦哨卒二人問之云䇿妄阿喇布坦與俄羅斯哈薩克布嚕特皆為仇敵拉藏汗之子娶䇿旺阿喇布坦之女三年已經生子逹賴喇嘛班禪及拉藏之使俱在䇿旺阿喇布坦處聞布木之子䇿凌敦多卜託卜齊都噶爾三都克等率兵六千去年往阿里克處助拉藏汗征布嚕克巴至今未回上命赫夀以富寧安所奏宣諭拉藏汗赫夀遵上指致書拉藏汗言䇿妄阿布坦狡詐多端甚不可信我蒙皇上恩授理藩院尚書念昔時曽到爾處汗甚愛敬我故作書相告拉藏汗得書尋奏䇿妄阿喇布坦遣兵據喀木衛藏地請敕發大兵即為䇿應詔西安將軍額倫特等集兵救援詳見額倫特傳五十八年九月赫夀卒賜祭葬如例欽定八旗通志卷一百五十一
