寧軍政及青海三十六旗之會盟如喀爾喀四部之制西藏辦事大臣二人司員一人筆帖式一人掌西藏之政令凡噶卜倫代賁苐巴堪布皆屬焉有事則與達賴喇嘛定其賞罰謹案喀爾喀青海西藏其駐防之將軍參贊大臣皆由特簡掌其軍政會盟類敘於此所以昭闕云天憲而重王臣具見邉防軍實舉無遺乾隆三年上諭凡滿洲兵丁駐防省分俱蒙世宗憲皇帝加恩賞給滋生銀兩以利濟兵丁今涼州莊浪亦駐有滿洲兵丁此二處乃邉疆要地兵力應使強盛著賞涼州滿洲兵丁滋生銀一萬五千兩莊浪滿洲兵丁滋生銀八千兩令該將軍大臣等設法營運以為利濟此所賞銀兩就近著甘肅巡撫撥正項錢糧運送前去又上諭昨據參領金珩奏稱八旗滿洲蒙古漢軍各省駐防官辨子弟離京稍逺應試維艱請嗣後科嵗兩試令該將軍考試馬步箭即送附近府院考試酌量人數多寡以定去取等語朕思此事斷不可行雍正十年間曽奉皇考諭旨國家之設駐防辨兵原令其持戈荷戟以備干城之選非令其攻習文墨與文人學士爭名於場屋也在辨兵之子弟有能讀書向學通曉文義者原聽其來京應試以廣伊等進取之途並未嘗禁其從事文學今若悉準其在外考試則伊等各從其便競尚虛名而輕視武事必致騎射生疏操演怠忽將來更有何人充駐防之用乎况我聖祖仁皇帝臨御六十一年所有教養辨兵者至周至渥如果應行早已著為令典又何待今日之喋喋敷陳乎數年以來陳奏朕前者重見疊出不下百餘次其識見甚為庸鄙朕悉置之不論未曽降旨申飭乃近日仍有不知而妄瀆者是以特行宣諭以覺愚蒙欽此仰見我皇考睿慮周詳聖諭至為明晰朕臨御以來亦有以此陳奏者槩未準行蓋以滿洲蒙古漢軍在京者人數衆多就近考試原無礙於操演至各省駐防官辨子弟為數無幾若科嵗考時不必來京就近在外應試不但事有難行且必至競尚虛名荒廢騎射殊失設立駐防之本意背謬已極金珩身為參領乃煌煌聖諭豈竟毫無見聞而復混行瀆奏著嚴行申飭並將此旨宣諭中外臣工嗣後不得以此謬論再行妄瀆又上諭各省駐防兵丁生息銀兩皆係咨部轉交八旗查核摺奏而督撫提鎮則皆具本報銷事不畫一此項生息銀兩乃國家嘉惠兵丁之特恩非正項錢糧可比嗣後著各省督撫提鎮每年咨達兵部兵部逐一查核一省彚為一摺陸續奏聞又上諭從前學士雅爾呼達條奏沿邉內外添駐滿兵經議政王大臣議令該督提查看地方形勢朕聞古北口外巴溝地方廣濶可以添兵駐劄但離邉稍逺未必在查看之內其可否添駐滿兵之處著該督提一併相度具奏六年上諭據該副都統保善以獨石口驍騎校二員皆持服未滿二十七個月千家店驍騎校一員有别案未結行令該旗補授等因具奏朕思外省官員升缺甚少本處官員所守者本處升缺若因持服未滿將員缺行令京城該旗補授則本處應升人員必至壅滯千家店防禦員缺仍著該副都統揀選應行題補人員其擬補人員持服未滿之處行令該旗轉奏著暫行署理俟服滿時將該員移送該旗帶領引見奏請實授將此交與各邉口及小八城駐防滿兵處之該管大臣等嗣後各該處官員缺出俱照此辦理如此庶員缺不致久懸而人員升路亦不致壅滯矣十三年上諭從前臣工條奏涼莊駐防滿兵有請遷移他處亦有奏請不必移駐者屢準屢駁迄無定見嗣經慶復查奏軍機大臣定議涼州兵丁不必移駐惟莊浪滿兵請添駐寧夏據該撫黃廷桂奏稱現在撥估營建尚未辦理朕思前此駐兵莊浪屢經詳酌始行定議移駐之時又大費經營十餘年來甚屬安貼今若復令遷徙在寧夏重鎮原可不必添兵而莊浪要地轉無以資彈壓且徒費帑項而兵丁又安土重遷其舊城兵房别無應用亦不應拋棄成功是移駐則在官在兵兩有未便如仍舊貫則官無建置之勞兵免遷移之纍均有禆益所議莊浪滿兵移駐寧夏之處著停止該部即遵諭行令該將軍督撫知之十五年上諭近聞外省駐防旗人等數世同居一城或有協領佐領等官與其所屬兵丁內因係親友以致諸凡掣肘不免有瞻徇偏護情弊等語果如此可乎從前派滿洲官兵駐防外省者原因我滿洲習氣純朴技藝精強行走便捷俾緑營官兵視為表率之意先以各該城之協領參領等大員之缺往往由京城補放遣往後因伊等駐防各該省年久人數衆多其應升員缺仍由京補放遣往恐礙伊等升路是以皆由本城應升人員內揀選補授者甚多此皆朕體恤省城官兵之深恩尤當體副朕擢用深心遵守滿洲舊習將所屬人等勤加演習技藝秉公訓導管轄將此著傳諭駐防旗員兵丁各省城將軍大臣等均各嚴飭該管協領參佐領等知悉將此等惡習著令痛改至本省以旗分佐領互相調放亦無不可大臣等亦當留心查核經朕降此旨後若仍不悛改其協領等大員之缺朕必以别省官員調補將此通行曉諭知悉特諭又上諭據江寧將軍保德等奏稱駐防滿洲蒙古官員請與在京滿洲蒙古官員一體補用緑營等語各省設立駐防官兵原以彈壓地方該將軍大臣等當思設立駐防本意不時訓練務使騎射嫻熟武備整飭乃從前有以各省駐防官兵子弟奏請於駐防省分考試者曽蒙皇考降旨訓飭是駐防人丁子弟尚不準歸駐防省分考試其官員又何得補用緑營乎况在京旗員準補緑營者特因人數衆多升途較少且漢仗弓馬原可以表率緑營是以通融辦理各省駐防人等皆為數無幾既不比京師之多且設有協領佐領防禦等缺升途並無壅滯伊等果能奮勉自可洊厯升途又何必照京師之例以致多占緑營武辨升用之階乎看來保德等此奏非為彼處官員升途起見明係沽名釣譽未悉設立駐防本意甚屬冒昧保德等著交部嚴察議奏又上諭朕巡幸中州該省官民俱經行慶施惠所有分駐旗人亦應一體加恩著該撫將河南省駐防官兵年七十八十以上者查明分别賞賚十六年上諭杭州駐防兵丁較少於江寧二千有餘而額設副都統轉多一員且漢軍兵丁止一千六百名亦不必設兩副都統著將杭州漢軍副都統裁去一員現任副都統齊斌著調補福州副都統其福州副都統范宜謙著回京另補又上諭江寧駐防兵丁每年應支兵米例支本色四個月折色八個月其折色內惟二三五六八九等月每石折銀一兩二錢至十一十二兩月遇有閏月每石則折銀七錢五分多寡既未畫一且偶值時價昻貴兵丁未免拮據嗣後江寧駐防兵丁十一十二兩月並閏月折色俱著加恩照二三等月之例一槩給銀一兩二錢該部即遵諭行二十一年二月上諭各省駐防兵丁不準在外私置田産有物故者其骸骨及寡妻仍令各回本旗此定例也朕思國家承平日久在內外俱已相安一體若仍照例辦理則在外當差者轉以駐防為傳舍未免心懷瞻顧不圖久逺之計而咨送絡繹亦覺紛煩地方官頗以為纍嗣後駐防兵丁著加恩準其在外置立産業病故後即著在各該處所埋葬其寡婦停其送京但該處情形不同兵丁內有無力置地營葬者亦未可定著該將軍都統等酌動公項置買地畝以為無力置地窮兵公葬之用再向來此等駐防兵丁有患病事故呈請回京到京後復挑選差使者甚屬無謂今既準其在外置産安葬所有呈請回京之例著停止著為例二十二年上諭户部議覆江寧駐防兵米於京口本色內改撥一案前因京口駐防兵米折色不敷買食是以特準改給本色今若更擬改撥令江寧京口彼此適均雖亦持平之道但兵民生計增之固覺有餘而已增復減則彌形不足且京口多留此數月本色俾兵丁不與閭閻爭購其民間米價不亦有益乎然在江寧僅支四月本色折色亦不敷市價未免拮據著加恩給與八月本色於江寧府屬漕糧內酌留兩月其餘兩月及遇閏米石令該督按照時價採買支給不必於京口本色改撥至其餘四月仍給折色部議毋庸增價之處著加恩照該督所奏每石準增銀一錢以示惠養防兵之意二十五年上諭鑲黃旗護軍統領伊爾圖奏護軍校蘇朗阿前在軍前腰腿染受濕潮成疾去嵗舉發不能行動請將蘇朗阿以護軍校原品休致給與全俸等語旗僕在軍前行走自屬分內之事軍前行走之人因年邁殘疾休致者量其勞績給與全俸或給與半俸此國家之殊恩亦實屬應行查奏者八旗人等如果年嵗衰老不能當差自應照例辦理但伊等呈請休致必指稱在軍營染受濕潮舊病復發夫潮氣何處不有豈必專在軍營如果在軍營得傷愈後因年邁傷口復發其勞績具有明徵據實陳出尚可若並未打仗得傷務指稱在軍營染受潮濕此不過欲藉口得俸祿耳甚屬惡習伊惟希圖僥幸不知國家給與曽經出兵因年老殘疾致仕人員俸祿者具有成例與彼身在軍營得疾與否之處毫無關涉也滿洲世僕在軍前出力分內之事以此為竒挾制邀俸可乎殊屬甚惡習氣蘇朗阿不準給俸將此著通行曉諭八旗及各省駐防二十七年上諭朕稽古省方推恩錫福其江寧京口杭州乍浦等駐防旗人男婦年七十以上者亦著照從前恩詔例一體賞賚以敷慶澤又上諭直𨽻保定等處駐防兵丁本年夏秋冬三季兵米例應給發折色但念各該地方上年俱有被水之處米價未免稍昻兵丁買食維艱去嵗直𨽻截留東省漕糧五萬三千餘石今除賑糶之外尚存米一萬七千餘石著加恩將保定雄縣及東安采育霸州良鄉順義七處駐防兵丁應領乾隆二十七年夏秋冬三季兵米一萬四千二百餘石即於此項餘剩粟米內全數動撥在兵丁可以不與閭閻爭糴市集糧價亦可不致翔湧於民食兵糈均有禆益該部遵諭速行二十八年上諭涼莊滿兵二千二百餘户現今移駐伊犁涼莊雖屬內地無可守禦之處但該處係西陲通衢且城垣房屋建立未久若因官兵移駐伊犁將城垣房屋空間必致倒壞即行人往來亦不足以肅觀瞻西安官兵駐防年久生齒日繁若將西安官兵內酌量移駐涼莊居住則現有之城垣房屋既不致空廢於西安兵丁生計亦大有禆益可將西安滿兵內撥二千名移駐涼莊兵數既以無多毋庸設立將軍涼州留副都統一員莊浪設城守尉一員以資管轄其如何移駐之處著交楊應琚嵩椿定議具奏三十六年二月上諭朕巡幸山東車駕所經引年布惠其駐防旗人亦應一體推恩所有德州青州駐防旗人男婦年七十以上者著查明照例分别賞賚五十年上諭據鑲黃旗蒙古都統奏請騎都尉伊禮布所出之缺查伊禮布並無子嗣承襲伊族內承襲有分之人惟伊禮布親伯達黑子曽孫現在𣲖往駐防西安之養育兵豐安間散慶安僅此二人豐安甚屬年幼俟承襲後請旨將豐安之母暨弟留京等語八旗世職人員內因絶嗣駐防外省有分之人承襲後若佐領員缺應來京辦事似此等世職務必拘泥亦令來京居住伊等家口在外久已安居偶而承襲世職紛紜來京途次不無耗費而到京安家立業亦必多艱反於滿洲等無益况各省駐防亦有防禦佐領員缺伊等襲職後果有長進留於本省對品補用佐領防禦之缺有何不可伊禮布之缺現經擬正之豐安交該將軍酌量年終照例送京承襲後仍將豐安遣往西安交該將軍教導俟其年壯或遇有防禦佐領缺出酌量對品補用外將此交八旗嗣後承襲世職除佐領員缺外似此世職缺出若駐防外省人等承襲者俱照此辦理五十七年上諭前據梁肯堂奏請修雄縣駐防兵房一摺恐係從前承修之員未能堅固如式當經降旨飭查兹據該督覆奏此項兵房均係於康熙十二年建蓋乾隆二十六年續修今已坍塌􅀈壞其續修工程自不及初建之堅固如式前經防守尉阿爾景阿移會委員驗看屬實所有估需銀一千八百兩零請先在司庫動撥趕修其二十六年動用之項著落前任雄縣知縣李晟家屬名下照數追賠等語駐防兵丁官為建蓋房屋俾資棲止免其自行租賃已屬格外恩施該兵丁等即當視同己業加意愛護或遇有水火之災力無從防護如從前荆州滿營被沖及本年熱河沙堤一帶猝被山水者原不惜帑金為之另行建葺若不過每嵗風雨飄搖稍有滲漏殘損該兵丁自應隨時粘補免致欹傾豈得視為傳舍任其年久塌壞逮難以棲止又請官為辦理似此屢圯屢修帑項虛縻伊於何底况即如京城滿兵惟健鋭火器二營並八旗之新舊營房及圓明園之八旗營房俱係官為建蓋此乃特恩其餘八旗親軍護軍馬甲步軍等俱無官給房屋伊等亦止藉錢糧各行租賃並未見其露處是各省駐防得有官房居住較之八旗兵丁等已屬從優何得不知愛護致令坍壞率請官修除雄縣兵房即照該督所請著落前任知縣李晟家屬名下如數賠修外防守尉阿爾景阿平時不能留心查察一任兵丁等將房屋殘損且不報所管大臣即行文地方官甚屬乖張著罰俸三年以示懲警嗣後京中各營及各省駐防如該營原有生息銀兩可以動用者所居房屋實在年久欹傾尚可準其各自動項修葺若並無存公銀兩之營分不得擅動官項率請興修以歸核實梁肯堂所辦差錯著該部察議欽定八旗通志卷三十五
