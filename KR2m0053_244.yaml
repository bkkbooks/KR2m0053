任一等輕車都尉康熙十五年從寧海將軍喇哈達平南將軍賴塔等征福建擊海賊偽將軍劉國軒於海澄祖山頭力戰陳亡加恩賜雲騎尉世職承襲詳見世職表佟世功佟世功漢軍正藍旗人康熙十五年以佐領隨撫逺大將軍大學士圖海征從逆提督王輔臣至髙長坡與偽將李黃英力戰陳亡恩賜雲騎尉世職承襲詳見世職表馬龍馬龍漢軍正藍旗人康熙十三年以佐領從順承郡王勒爾錦征湖廣調補雲南提標前營恭將十四年五月隨提督李胡拜擊叛鎮楊來嘉於榖城戰歿恩贈都督僉事廕子耀祖四品官郭有忠郭有忠漢軍正藍旗人任驍騎校駐防杭州康熙十五年總督李之芳平南將軍賴塔調隨副都統倭申巴圖魯會剿衢州賊馬九玉等於大溪灘連敗乘勝進攻江山縣賊悉衆拒戰有忠歿於陳賞恤如例劉養元劉養元漢軍正藍旗人世居遼陽任驍騎校駐防杭州康熙十五年從寧海將軍喇哈逹平南將軍賴塔征福建至海澄擊賊於祖山頭力戰陳亡恩賜雲騎尉世職承襲詳見世職表李成貴李成貴漢軍正藍旗人初以固山額駙管恭領事康熙十三年從征海寇十六年六月隨都統喇哈逹至海澄祖山頭與偽提督何堪之戰歿於陳恩賜雲騎尉世職承襲詳見世職表李景梅李景梅漢軍正藍旗人世居奉天地方以驍騎校隨平南將軍賴塔征逆藩耿精忠時海寇相繼煽亂康熙十六年師至海澄偽將軍劉國軒來犯被圍陳亡二十五年恩賜雲騎尉世職承襲詳見世職表陳正逺陳正逺漢軍正藍旗人順治十五年襲父節孝騎都尉職康熙十三年隨奉命大將軍康親王傑書征逆藩耿精忠至浙江賊首朱印蟻聚硝黃山擊敗之又敗馬鞍山賊衆萬餘十六年海寇劉國軒犯海澄又隨副都統伯穆和林禦於灣腰樹力戰陳亡恩賜雲騎尉世職承襲詳見世職表佟有明佟有明漢軍正藍旗人任驍騎校駐防福州康熙十六年六月進剿海寇與偽將軍劉國軒戰於海澄陳亡賞恤如例宋煜宋煜漢軍正藍旗人世居奉天任福建泉州府南安縣知縣康熙十七年海寇劉國軒圍城城陷率家衆力戰於鼓樓街死之恩賜按察使僉事賜祭葬廕一子知縣李敬實李敬實漢軍正藍旗人世居奉天地方康熙十三年以佐領隨征福建十七年隨平南將軍賴塔在海澄與賊帥劉國軒力戰陳亡賞恤如例劉之玉劉之玉漢軍正藍旗人由領催委署驍騎校駐防西安康熙三十五年九月隨副都統祖良弼征噶爾丹至甕金遇賊力戰陳亡賞恤如例張瑞午張瑞午漢軍鑲藍旗人父存義伯父存仁皆以勳舊為大臣順治十五年瑞午由恩廕知直𨽻磁州事擢江南池州守以事降調歷山東沂州直𨽻易州皆有治聲康熙十二年復由浙江杭州守遷福建卲武郡潔已率屬人稱賢守焉明年耿逆叛草偽檄傳詢閩屬各郡邑所至從風而下惟瑞午誓死不少屈與同官謀討逆事泄賊將執之罵賊而死子六人玘瑛珍珖玳瑜媳王氏李氏同日遇難賊平恩賜太僕寺卿賜祭葬廕一子入監白顯正白顯正漢軍鑲藍旗人初襲父仲文雲騎尉世職順治七年九月間三遇恩詔加至一等輕車都尉十四年隨定逺大將軍世子濟度征福建海賊自泉州進兵沿海剿滅賊衆偽都督黃常在遮古嶴地方乘三百餘艘來犯奮擊敗之又在新湖嶴嶴頭港劉武店各地方乘船進剿顯正並在行間屢戰皆捷康熙十三年從征逆藩吳三桂至湖廣南漳縣與偽將軍張義臣王惠等戰於西二郎岡賊率衆萬餘拒戰顯正奮擊歿於陳二十五年恩賜雲騎尉世職承襲詳見世職表髙永運髙永運漢軍鑲藍旗人任二等輕車都尉康熙十三年隨寧南靖寇大將軍順承郡王勒爾錦征逆藩吳三桂至長沙府遇賊力戰陳亡加恩賜一等輕車都尉世職承襲詳見世職表崔成嵐崔成嵐漢軍鑲藍旗人任鬱林州州判康熙十三年署藤縣知縣賊帥孫延齡率衆攻城成嵐與賊連戰七晝夜力竭陳亡賞恤如例王應魁王應魁漢軍鑲藍旗人任江西南昌縣知縣康熙十三年六月初三日逆藩耿精忠據福建叛逼南昌應魁挺身往禦遇賊力戰陳亡恩賜按察司僉事廕子王鎬以知縣職熊天福熊天福漢軍鑲藍旗人任江寧守備康熙十三年隨四川總督周有德往征逆藩吳三桂至廣元縣遇賊力戰歿於陳恩給五品廕李進忠李進忠漢軍鑲藍旗人任陕西固原逰擊康熙十四年從逆提督王輔臣分兵圍固原進忠守土弗屈率所部力戰死之恩賜土田并建坊旌其忠談有祿談有祿漢軍鑲藍旗人任驍騎校康熙十三年隨寧南靖寇大將軍順承郡王勒爾錦征吳逆至湖廣補固城逰擊十四年賊將楊來嘉率衆來攻力戰歿於陳恩賜七品廕髙攀龍髙攀龍漢軍鑲藍旗人康熙十四年以佐領隨鎮西將軍席卜臣征逆藩吳三桂有功授協領復擊偽將吳之茂於漢中力戰陳亡恩賜雲騎尉世職承襲詳見世職表董魁董魁漢軍鑲藍旗人康熙十四年以守備從大兵征吳三桂至湖廣之榖城縣與賊將楊來嘉力戰歿於陳恩賜五品廕胡從聖胡從聖漢軍鑲藍旗人父廷聘以投誠授雲騎尉卒從聖襲職康熙十五年從定逺平寇大將軍安親王嶽樂征逆藩吳三桂至江西擊偽將軍夏國相李良棟於萍鄉來龍山力戰有功尋由江西進取長沙歿於陳恩賜雲騎尉世職承襲詳見世職表何獻圖何獻圖漢軍鑲藍旗人任騎都尉康熙十三年正月隨寧南靖寇大將軍多羅順承郡王勒爾錦征逆藩吳三桂十六年三月隨征南將軍穆占至長沙與賊將吳國貴戰中炮陳亡恩賜雲騎尉世職承襲詳見世職表張燧張燧漢軍鑲藍旗人任佐領康熙十五年二月隨大兵征逆藩耿精忠至福建十六年六月隨副都統伯穆和林至海澄與賊將劉國軒力戰陳亡恩賜雲騎尉世職承襲詳見世職表馬象坤馬象坤漢軍鑲藍旗人康熙十七年以八品官從征福建海寇偽將軍劉國軒率賊七千餘於駝