body:
  text: 欽定四庫全書欽定八旗通志卷二百三十人物志一百十忠義傳二十二漢軍八旗二一百八人康熙年中共祁熊嘉祁熊嘉漢軍鑲黃旗人原籍廣寧康熙十三年以監生隨四川總督周有德征叛鎮談洪熊嘉督餉軍前至保寧廣元縣遇賊劫糧力戰歿於陳賞恤如例范承譜范承譜漢軍鑲黃旗人閩督承謨族弟也康熙十三年耿逆叛羈承謨時承譜在署中並繫於獄誘之降承譜厲聲罵曰汝輩皆反賊吾寧死誓不從賊生也幽困凡三載抗節益堅及聞承謨死遂捐軀以殉恩賜國子監學正楊廷瑜楊廷瑜漢軍鑲黃旗人順治十五年以佐領從征雲南圍沅江府賊悉衆拒戰連擊敗之康熙十二年以恭領駐防杭州十三年奉命大將軍和碩康親王傑書調隨副都統倭申巴圖魯征台州耿逆偽將軍曽養性以萬衆拒戰於小梁山廷瑜力戰陳亡恩賜雲騎尉世職承襲詳見世職表何九章何九章漢軍鑲黃旗人任驍騎校康熙十三年隨副都統巴爾堪征耿逆敗賊於績溪至饒州雲峰山及石頭街並連敗之進抵饒州城偽參將陳鳯拒敵力戰歿恩賜雲騎尉世職承襲詳見世職表髙爾瞻髙爾瞻漢軍鑲黃旗人康熙十三年以佐領從征逆藩耿精忠至江西十四年七月隨副都統雅賴與賊戰於石峽新口被創歿於陳恩賜雲騎尉世職承襲詳見世職表阿什圖阿什圖漢軍鑲黃旗人原籍遼東姓周氏天聰五年從征大凌河錦州等處有功崇德七年任驍騎校八年隨大將軍多羅貝勒阿巴泰征明至山東取東平州首先登城是年攻前屯衛中後所率挨牌軍克之順治元年管佐領事隨都統墨爾根侍衛李國翰等往征流寇率本恭領兵渡河擊敗偽總兵張某獲馬五十六匹船十五隻二年從征山西攻太原城督紅衣炮克之又從大兵南征攻拔武岡寨又以本恭領紅衣炮敗鄭芝龍於揚子江進攻江隂縣下之三年從征杭州擊敗偽國公方國安渡江取金華府五年隨兵部尚書阿尼喀在寶慶等處擊敗賊首二虎劉照馬盡忠等八年隨平南將軍金礪征浙江舟山克之九年從征福建攻海澄縣賊首鄭成功引賊十萬衆來奪紅衣炮隨大兵擊却之以功授雲騎尉準襲二次十年任杭州駐防佐領十一年隨寧海大將軍宜爾德征舟山偽英毅伯阮思列舟百餘隻於海面拒戰隨副都統柯永蓁等擊敗之以功加世職為騎都尉十八年升恭領康熙元年授協領尋升副都統十四年逆藩耿精忠叛率兵擊之與賊將曾養性祖宏勳等戰於台州陳亡二十五年敘功加世職為三等輕車都尉世職承襲詳見世職表王宣王宣漢軍鑲黃旗人任陕西固原逰擊康熙十四年提督王輔臣叛宣不屈遂被縊死恩賜雲騎尉世職承襲詳見世職表李留李留漢軍鑲黃旗人康熙十四年以佐領從定西大將軍多羅貝勒董額征逆藩吳三桂至陕西洋縣接運糧餉遇賊青山關力戰陳亡恩賜雲騎尉世職承襲詳見世職表王承恩王承恩漢軍鑲黃旗人父登甲任二等輕車都尉順治十六年襲父職康熙十四年授杭州駐防恭領十五年隨康親王傑書征逆藩耿精忠十六年隨副都統伯穆和林征海寇偽將軍劉國軒至海澄力戰歿賞恤如例李有功李有功漢軍鑲黃旗人原籍海澄以驍騎校駐防杭州康熙十五年隨杭州副都統倭申巴圖魯會剿偽將軍馬九玉等於衢州至江山縣力戰歿於陳賞恤如例寶成傑寶成傑漢軍鑲黃旗人康熙十三年以騎都尉從征逆藩耿精忠至福建所在有功十六年閏三月海寇偽將軍劉國軒率賊萬衆來犯海澄成傑隨寧海將軍喇哈逹力戰陳亡恩賜祭葬立碑於墓裴應虎裴應虎漢軍鑲黃旗人原任二等輕車都尉登寬之子也康熙十三年隨征西將軍席卜臣往陕西漢中府征叛提督王輔臣賊將王屏藩談洪率衆數千屯鹿角拒戰於猴子嶺應虎擊敗之又敗偽將軍劉慶成精騎數千偽總兵陳奉煥迎戰於張前湖營談洪擁衆自中家營來援應虎率兵奮擊大破之又敗偽總兵楊應芳於溝家營十八年四月回至擂鼓臺山下王談二賊率衆萬餘來犯力戰陳亡恩賜世職為一等輕車都尉承襲詳見世職表張璉張璉漢軍鑲黃旗人康熙十三年以守備從征逆藩吳三桂十八年二月隨總兵陳溥在貴州臘雞坡地方遇賊力戰陳亡恩賜祭一壇銀五百兩恩賜五品官李興元李興元漢軍鑲黃旗人拔貢生初為直𨽻沙河縣知縣升祁州知州任滿升江西吉安府知府調直𨽻永平府升長蘆鹽法道轉陕西隴右道升雲南按察使亷得豪橫數人治之羣小側目復理沉寃數事名振邉境時有旨察藩下霸占民子女為奴者概與釋放各還其家時逆藩吳三桂勢焰方熾興元秉公而行不畏強禦民間子女得完聚者約千餘人十二年冬三桂謀叛傳省府官會議遂脅授職興元厲聲叱曰汝內結骨肉之戚分封親王受朝廷洪恩至矣乃忍作此事耶我執法官可殺不可辱惟一死以報朝廷耳詈罵不絶三桂杻械之併家屬入於獄厯六載三桂知其志堅送蒙化充軍十九年王師將至雲南諸從逆者忌其口嗾逆孫世璠使偽遊擊劉創基至蒙化縊殺之沒其家屬九十六人囚於貢院二十年大兵困雲南急賊復取興元子蔭秀蔭竒榜殺之先是季子萃秀匿民間得免大兵入城家屬始得釋萃秀號赴定逺平寇大將軍固山貝子章泰軍欣其父死事以聞恤贈太常卿廕一子入監賜立碑銀三百兩遣官諭祭萃秀由蔭生厯官湖廣安陸府知府朱國治朱國治正黃旗人包衣漢軍順治四年由拔貢授順天府固安縣知縣升開州知州有治績超升按察司僉事分守霸昌道歷任大理少卿江蘇巡撫丁憂解任康熙十年授雲南巡撫十二年十一月二十一日逆藩吳三桂叛為其所執罵賊不屈遂被害賜祭葬恩贈戶部右侍郎雍正七年命查其子孫出包衣歸於正黃旗趙繼善趙繼善漢軍正黃旗人由佐領征雲南有功授參領康熙十三年隨副都統吳國正征陕西經略大學士莫洛遣往略陽縣值提督王輔臣叛勒降不從遂被害恩賜雲騎尉世職承襲詳見世職表完文元完文元漢軍正黃旗人由八品官纍升至陕西固原鎮標都司管守備事康熙十三年提督王輔臣叛抗節死之恩賜子奉璋為五品官馬珥馬珥漢軍正黃旗人康熙十四年隨揚威將軍內大臣阿密逹征從逆提督王輔臣於平涼與偽總兵王繼正力戰陳亡恩賜雲騎尉世職承襲詳見世職表李向日李向日漢軍正黃旗人任步軍校康熙十三年擢雲南曲靖府逰擊十四年隨提督李湖拜出征湖廣在固城被圍向日竭力守城至五月初七日城陷被執罵賊不屈死賞恤如例恩賜恭將廕其子李林祥為四品官張大選張大選漢軍正黃旗人康熙十四年以撫標逰擊隨揚威將軍內大臣阿密逹征從逆提督王輔臣於平涼與偽總兵王繼正力戰歿於陳恩賜雲騎尉世職承襲詳見世職表王世祿王世祿漢軍正黃旗人康熙十四年以八品官隨定西大將軍多羅貝勒董額征從逆提督王輔臣至漢中遇賊將王屏藩於猴子嶺力戰陳亡恩賜雲騎尉世職承襲詳見世職表祁仁傑祁仁傑漢軍正黃旗人任逰擊康熙十六年從討逆將軍卾內總督蔡育榮等征逆藩吳三桂至湖廣洞庭湖與賊將杜輝等力戰仁傑身先士卒中炮陳亡恩賜雲騎尉世職承襲詳見世職表張應鰲張應鰲漢軍正黃旗人父天宇國初來歸授騎都尉應鰲襲職康熙十七年從都統喇哈逹征福建海賊偽將軍劉國軒率衆賊七千餘陳於駝頭嶺應鰲奪擊敗之又敗之於窑頭尋至灣腰樹賊增衆萬餘來戰應鰲力戰陳亡恩賜雲騎尉世職承襲詳見世職表金世礪金世礪漢軍正黃旗人原任總兵金玉和之孫也由生員任佐領康熙十三年升恭領值逆藩耿精忠叛隨奉命大將軍康親王傑書平之十八年正月海寇劉國軒等率賊萬餘列陳於竒頭山郭塘等處併力來犯世礪隨平南將軍賴塔進戰中箭而卒恩賜雲騎尉世職承襲詳見世職表樊朝彥樊朝彥漢軍正黃旗人康熙三十五年以馬甲隨撫逺大將軍伯費揚古由西路進征厄魯特噶爾丹至昭莫多與賊力戰陳亡恩賜八品官賈國良賈國良漢軍正黃旗人領催部委驍騎校駐防西安康熙五十七年七月隨侍郎色楞進剿西藏於喀拉烏蘇與賊力戰陳亡賞恤如例郝爾德郝爾德漢軍正白旗人襲父三等輕車都尉職晉逰擊康熙元年隨湖廣總督張長庚剿九溪西山賊有功二年七月從定西將軍圖海征湖廣流賊李來亨等力戰陳亡子宏勳襲賞恤如例于國璉于國璉漢軍正白旗人世居遼東任佐領駐防潮州𨽻續順公標下康熙十三年與李成功謀誅叛鎮劉進忠事泄賊率兵捕國璉國璉隨副都統鄧光明拒戰三晝夜射中進忠臂尋以援絶被執不屈罵賊遇害詔祀名宦祠髙可進髙可進漢軍正白旗人任騎都尉兼一雲騎尉康熙十四年耿逆偽將馬九玉與偽副將李廷魁屯踞衢州截我兵糧道總督李之芳平南將軍賴塔會遣副都統喇哈塔總兵王廷梅等敗賊於坑石可進力戰歿於陳恩賜三等輕車都尉世職承襲詳見世職表滕天成滕天成漢軍正白旗人任二等輕車都尉康熙十五年隨寧海將軍喇哈逹平南將軍賴塔征福建至海澄擊海寇偽將劉國軒於祖山頭力戰歿於陳恩賜雲騎尉世職承襲詳見世職表韓登元韓登元漢軍正白旗人初任七品官康熙十四年隨將軍伯穆和林征逆藩耿精忠至福建海寇乘機煽亂十六年六月偽將軍劉國軒等擁兵萬餘犯海澄登元遇賊力戰歿於陳恩賜雲騎尉世職承襲詳見世職表沈瑞沈瑞漢軍正白旗人初隨叔父續順公永興駐防潮州康熙九年永興卒以瑞襲爵十三年逆賊劉進忠叛瑞被虜臺灣逆首給以偽印官爵時瑞年甫十三雖陽受之而隂謀內應以待大兵二十年為偽鎮朱友所覺首告瑞及其弟雲騎尉珽及祖母庶母妻姊等八人同日遇害事聞下部議恤沈珽沈珽漢軍正白旗人隨其兄續順公沈瑞鎮守臺灣康熙二十年十一月與海賊戰歿於陳全家八口皆殉恩賜雲騎尉世職承襲詳見世職表王國泰王國泰漢軍正紅旗人世居奉天開元縣初任三等護衛康熙十三年八月授恭將職銜隨經略大學士莫洛征逆藩吳三桂十二月至寧羌州適提督王輔臣叛攻經略營國泰督兵力戰尋遣檄西安會兵進剿國泰突圍出以援未至復衝圍入射殺賊甚衆矢盡揮刀復砍殺多人被重傷墜馬輔臣使其黨中軍蔡元招降不從詈不絶口仍拾遺箭射賊賊怒遂遇害僕劉虎等僅得血衫以歸贈副將銜賜祭葬子臣以廕官歷升至副都統遇萬夀覃恩晉贈資政大夫阿爾泰阿爾泰漢軍正紅旗人姓劉氏世居奉天鐡領縣父郎賽官都統阿爾泰由廕生授吏部員外進郎中康熙三年擢湖廣辰常鎮總兵官七年調黃巖鎮十三年逆藩耿精忠據福建反遣偽都督曽養性率兵來犯浙江阿爾泰拒戰二次多有斬獲既而黃巖城守恭將武灝潛通賊約為內應城遂陷阿爾泰被執至福建耿逆遣其帥曽養性百計誘降阿爾泰堅執不屈歷數其罪罵不絶口遂於十四年正月與總督范承謨同遇害事聞賜祭葬諡忠武並廕一子以旌其節王國柱王國柱漢軍正紅旗人世居奉天開元地方初任五品官康熙十三年逆藩耿精忠叛國柱以委署恭領隨副都統馬哈逹駐防兖州十四年六月協征江西擊賊於石峽村陳亡恩賜騎都尉世職承襲詳見世職表葛永旺葛永旺漢軍正紅旗人康熙十三年二月以領催隨副都統吳國珍出征陕西有功委署參領十四年七月至擂鼓台山下擊偽將王屏藩力戰陳亡賞恤如例馬九經馬九經漢軍正紅旗人康熙十四年授都司從征逆藩吳三桂至湖廣賊陷榖城戰歿於陳賞恤如例門可貴門可貴漢軍正紅旗人世居遼東海州初襲兄世職騎都尉兼一雲騎尉任浙江撫標