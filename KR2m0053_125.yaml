front:
  text: 欽定四庫全書欽定八旗通志卷一百十一
  hash: sha256:14d13db687258311db3b89c40f787473ca255a3fedcae4666b701764edfbe5f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_125-1a, image: WYG0665/WYG0665-0911c.png}
body:
  text: 選舉志十各項考試則例考試滿洲帖寫中書一內閣帖寫中書八旗共四十缺滿本房二十四缺每旗定為三缺漢本房十六缺每旗定為二缺滿本房學習八缺每旗定為一缺漢本房學習八缺每旗定為一缺缺出由內閣知會吏部各按旗缺行文部院各該旗將現在候補筆帖式內除坐補原部及即用先用人員外其餘無論己未考取將各部繕本筆帖式并文舉人貢監生員官學生義學生等移咨吏部轉送內閣會同考取注册由內閣行取名次在前學習行走者遇有缺出先用議敘一人次用學習一人相間輪用如議敘無人俱用學習之員至學習人員內有由别項效力議敘者無論何項班次先到即按其先到之班補用照筆帖式例給以品級俸祿其考試人員內有兼前鋒護軍領催披甲拜唐阿者俱準其一體考試考試蒙古帖寫中書一內閣蒙古帖寫中書六缺由內閣移咨吏部行文八旗蒙古將舉貢生監官學生等項能蒙古翻譯繕寫竹筆字之人造册咨送吏部查明合例應考人員彚册移送內閣會同理藩院在內廷彌封試卷秉公考試擇其佳者取中十餘名注册遇有缺出不論旗分按考取名次移送頂補照筆帖式例給以品級俸祿其應考之舉貢生監內有兼前鋒護軍領催披甲拜唐阿者俱準其一體考試考試唐古忒筆帖式一唐古忒官學生由理藩院考試翻譯蒙古唐古忒字話挑取好者遇唐古忒學分內筆帖式缺出由理藩院擬定正陪咨送吏部引見補授此唐古忒筆帖式升用中書仍兼唐古忒學行走俟升至主事令其離學再喇嘛隨印筆帖式缺出由喇嘛處行文唐古忒學挑取官學生擬定正陪咨送喇嘛處考試補授仍咨理藩院轉咨吏部注册給以空銜八品不準食俸一各部繕本筆帖式員缺將應行考試之八旗滿洲蒙古漢軍間散舉人副榜貢生監生文生員翻譯生員武生員官學生漢軍義學生覺羅學生情願考試者各該旗造册咨送吏部將合例應考人員查明奏請欽點閲卷大臣監試御史照考試候補筆帖式之例在貢院內擬題考試其應考之舉貢生監內有兼前鋒護軍領催披甲拜唐阿者俱準其一體考試擇其清字端楷者酌量録取遇有缺出按考取名次先後挨名頂補考試盛京筆帖式一盛京滿洲漢軍筆帖式缺出由盛京兵部移咨吏部請題將本處應用人員考試等第試卷進呈吏部咨取各部院滿堂官職名開列奏請欽點閲卷大臣覆加校閲擬定等第進呈後吏部造册咨送盛京兵部遇有缺出不論旗分較缺出先後挨名擬補咨送吏部帶領引見補授考取人員補用五缺之後將習清漢書之覺羅學生按名次補用一人其考取人員內若係漢軍於未補筆帖式之先遇有外郎缺出即準挨次補用咨部注册一各館翻譯謄録員缺由吏部行文八旗將舉人副榜貢生監生生員官學生漢軍義學生有情願考試者造册送部吏部查明人數恭請欽點考試大臣稽察御史在貢院內照考試候補筆帖式之例擬題考試翻譯清字好者多取數十員注册遇有各館缺出知照吏部按考定名次咨送補用將次用完之時再行考取補用一各部等庫使員缺吏部行文宗人府國子監將應考之覺羅學生官學生造册咨送吏部奏請欽點閲卷大臣監試御史在貢院內擬題考試酌量録取遇有缺出各按旗分補用三年年滿免其考試入於繕本班內較日期先後以筆帖式補用一盛京各部庫使缺出分為左右兩翼由盛京兵部會同盛京禮部不拘旗分在本翼四旗官學生內考取擇其佳者指補行文吏部注册三年年滿與生監一同考試翻譯取中者以筆帖式用未經考中者仍留庫使效力行走下次考試時仍令入考如再不能考中應行解退庫使將員缺另行考取指補考試現任筆帖式一現任筆帖式行走三年考試一次遇應考之年吏部行文各衙門將應考之員造册咨送吏部奏請欽點閲卷大臣監試御史請題考試取中者留任其不能中式者解退開缺不算廢員如能學習翻譯下次仍準考試如仍不能中式即行革退不準與考至考退人員內如有得過功牌者令該堂官查明奏請交與該旗以武職對品用倘有出差患病不能赴考者令該堂官即於册內注明俟差滿病痊時補行考試如無故臨考不到者交部議處考補駐防筆帖式一江寧京口青州綏逺城西安寧夏涼州杭州福州荆州廣州熱河右衛山海關乍浦莊浪成都太原河南德州張家口等處筆帖式員缺由各該處於各本處駐防之另户兵丁以及舉貢生監內考試翻譯將試卷封固送部吏部奏請欽點閲卷大臣覆加較閲量取數卷擬定名次注册遇有缺出挨名擬補咨送吏部帶領引見補授將次用完該處自行咨請試題考試其升轉之處與在京筆帖式一體較俸升轉此內有不能移産來京情願就補本處武職者六年滿後在該處具呈咨明吏部準其以武職改補俟得缺後再將筆帖式員缺開選考試盛京現任筆帖式外郎候補筆帖式一現任筆帖式外郎候補筆帖式俱照京城現任筆帖式之例三年考試一次遇應考之年盛京兵部咨報吏部移揭內閣擇新到通本一道密封交與吏部轉送兵部由馬上飛遞盛京兵部會同四部堂官將軍副都統等公同派撥官員兵丁看守考試除外郎毋庸分别等第外其筆帖式試卷分别等次一併具題進呈吏部行文各部院取滿堂官職名開列奏請欽點閲卷大臣覆加校閲擬定等第進呈御覽取中者筆帖式外郎仍留原任候補筆帖式仍照原考名次挨補其不能中式之現任筆帖式行文該堂官詢問居官如何如果行走年久辦事去得者該堂官具題保留不稱保留者解退盛京原定不合式者毋庸詢問居官即行解退俱不算廢官如能學習翻譯下次仍準考試如有曾經效力行間得傷及得過功牌者準其具奏請旨以武職對品用考試不堪入選之外郎即行革退如有行走年久可以辦事者亦準與現任筆帖式一體保留其候補筆帖式翻譯荒踈者即行除名不準補用三項應考人員倘有出差患病不能赴考者該堂官即於册內注明俟差滿病痊時補行考試考試恩監生一三年一次將八旗官學生算學生漢算學生算學肄業生奏請考試乾隆三年尚書兼管監務孫嘉淦等奏稱官學舊例其學翻譯者考筆帖式而已間有粗通文義者考文武生員而已原以明經治事之實學非旦夕可致之功修是以未敢専定章程查國子監拔貢人等現蒙皇上天恩月給廪餼講求明經治事之學頗有端緒臣等請將八旗官學生之歸漢文班者不必専讀四書亦使之講求經史為有用之學每三年一次臣等録其可以應考者奏請欽點大臣來監考驗取其明通者授為監生由官學而升之太學使與拔貢人等明經治事期滿之日擇其尤異者一體保舉考選録用奉旨著照所請行嗣經管理算學太僕寺少卿成德等奏準滿洲蒙古漢軍算學生俱與八旗官學生一體考試欽定八旗通志卷一百十一
