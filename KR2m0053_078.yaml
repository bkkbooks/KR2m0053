body:
  text: 土田志三土田規制畿輔規制三乾隆元年至二十七年乾隆元年六月奉上諭據阿山等查奏張家口外東四旗地畝應照西四旗之例每畝徵銀一分四釐於乾隆元年起科朕思該處地畝甫經查明若即令於本年起科未免輸納維艱著緩至乾隆三年起科又據奏稱西四旗地畝內從前有徵多報少之弊請交直督李衛查審明確定擬等語此項開墾地畝今既查明嗣後該管官自應據實徵報其從前隱匿朦混徵多報少之處事在恩赦以前著從寬免其查究餘著該部查議具奏是月奉上諭從前八旗虧空著追人員荷蒙皇考格外隆恩屢頒諭令各旗查明奏請豁免嗣經臣工條奏請將欠帑人員之家産等項已經開報者不準寬免而八旗大臣及參領佐領等又復辦理不善種種紛擾以致恩施不能下逮此朕所深知者即位以來旗人生計時厪朕懷者將八旗應入官之房産地畝雖經報部而尚未估價及八旗已經估價而尚未交部者照前所降諭旨分别情罪令各該處查明給還本人俾其執業十二月王大臣議奏八旗入官地畝九千五十餘頃入官房屋八千三百餘間請將地畝立為公産以每年所得租息分給旗人並令八旗都統於參領內揀選數員經管招種取租報部查核至入官房屋請照前準人認買其未認買之前仍留各該處取租以資賞給奉旨依議是年覆準口外熱河地方設立驛站營汛官兵皆有恩賞額地後因滋生日久遂於額地之外各自開墾今悉行丈出除原額外所有餘地應令按畝納糧至古北口乃邉關重鎮駐防兵丁挈家戍守沿邉瘠地皆係自力逐漸開墾出息無多丈出之地應悉賞給免其輸糧又各蒙古丈出餘地若令納糧恐不敷飬贍又內務府當差鷹手捕牲人鞍匠等散處口外皆有開荒地畝伊等原在內務府當差不便令其一例納糧均將現在丈出餘地注册亦免其納糧嗣後如再有開墾即照例按畝徴輸二年二月和碩恆親王𢎞晊議覆王大臣等所議收取地租以為貧乏兵丁恆産一摺上召八旗都統等諭曰從前入官旗地理應賞還旗人俾得生路但旗地與民地不同不便交部是以特交爾八旗大臣辦理今爾等議稱入官地畝從前所定租額本輕徒致州縣吏胥中飽請派員前往秉公更定等語現在入官地畝之租較之民人佃種旗地之租為數實少而此項入官之地原屬旗地與民人納糧之地不同雖經官定租額而百姓不知仍納重租以致吏胥中飽今因地定租固為允協但愚民不明事理或妄生疑意謂增添租額亦未可定夫旗人民人均吾赤子朕一視同仁並無岐待著交與直督出示曉諭若無從前弊端即令該督保題停止增添又議稱似此一定之後交與地方官按年照數收租解部等語夫年嵗之豐歉不齊如遇歉收仍照定數徴租則百姓未免受纍其旱潦之年作何減收豐稔之年作何補納著州縣官隨年嵗豐歉酌量辦理報明該旗仍報部存案倘有藉端朦混不據實辦理者即著該旗該督查恭又爾等稱京城空間之地可以蓋造房屋即將所得租息蓋造賞給無業貧人居住等語所議甚是朕為八旗無業之人不得房屋居住時為籌畫但未知京城有空間之地今既有空地爾等可查勘明白議奏但蓋造房屋若只動用今年之租則所得房屋無幾若俟積年之租始行蓋造則又至遲延現在圎明園原有優劣二營官兵居住之房爾等於查明空地議定蓋造房屋之時即將此二營房屋拆用其運京腳價及蓋造之費於今年租內動用至賞給貧人居住之處詳悉籌議俟行之數年所有空地蓋造已遍再將續得地租作何賞給或另用於旗人有益之地臨期議奏至爾等八旗選派前往查看之參領等著帶領引見並傳諭總督李衛於伊所屬之同知等官內揀選八員派定旗分會同旗員與該地方官公同辦理餘依議是年奏準官用旗地向在入官地內動撥今入官地畝已經分給各旗作為公産未便再行動用按直屬有駐防旗人交出在京所受之地及各莊頭退出之地又有八旗丈出餘地並户絶無人承受之地嗣後莊園人等當差官地及奏免給還並各項官用應行補還者統於前項地內動撥至旗人來京當差應得地畝亦在此內撥給又奏準凡興工修築動用旗人地畝地方官於興工日將畝數及姓名旗分造册咨部撥補倘無故遲延以致旗民失業該管上司即行參劾三年二月奉上諭朕前以旗人生計貧乏者多令將八旗入官地畝立為公産取租解部按旗分給以資飬贍但思此等入官地畝內有我朝定鼎之初圈給八旗官兵將錢糧悉行豁免者亦有旗人與百姓自相交易出銀置買仍在州縣納糧者兩種原屬不同祗因旗産入官有糧無糧未經分析一併交官收租是以部册并造入公産此項民地當契買之時旗人執業民人得價原係彼此樂從之事若以入官之後一概定為公産不準民贖殊非朕軫恤畿輔黎赤之本懷用是特頒諭旨除原圈官地為旗人世業自不容民間置買其旗人自置有糧之民地現在入官者如有欲售之人不論旗民一體準照原估價值變買將銀兩解交司庫陸續咨解户部交各旗料理生息分給旗人俾沾惠澤至於民買官地該地方官務須經理得冝毋致中飽壟斷等弊以昭朕一視同仁欲旗民兩便之至意是月奉上諭雍正十三年九月間朕以八旗入官地畝房屋從前該管大臣等辦理不妥有將已經豁免之項因該旗查報在先仍行勒逼交官者其間弊端種種曽降諭旨飭部確查辦理又於乾隆元年六月內降旨將八旗應入官之地畝房屋雖經報部尚未估價已經估價尚未交部者分别情罪令各該處查明給還本人以上二次諭旨屈指已厯三年今朕訪聞仍有稽延遲滯未曽清楚者大約因該管大員從前辦理不善未免回護前非或貧寒孤苦之家無力控訴又或胥吏借端需索有意遲回有此數端以致膏澤不能下逮用是再頒諭旨凡入官田房有與前次旨意相符者許本身及其適屬在各該管衙門據實呈明如果情有可原該管大臣即行具奏請旨毋許仍蹈前轍倘有應奏不奏者經朕訪聞或别經發覺定行從重議處若本人揑詞妄控亦照誣告例治罪三月奉上諭朕前因八旗人員生計艱難曽降諭旨將應入官之房産地畝有雖經報部尚未估價及已經估價而尚未交部者令各該處查明給還本人執業又念欠帑人員那移之項與侵貪不同著該部查明各案內有家産已報未估并報估而尚未變交者如實係因公確有憑據準其具題請旨乃降旨已久而户刑兩部奏請給還者不過數案推求其故蓋因承辦衙門泥於前旨內估價而尚未變交之語以為凡抵帑之産一經開報即為交官既係交官即不應在給還之列矣又因户部覆奏房地等項作為已還數內者不應給還毋庸查奏以為凡抵帑之産一經交官即俱扣作完數皆不應在查奏之列矣是以厯數年之久而奏請者仍寥寥無幾朕思雍正十三年九月以前抵帑入官之房産現存者不過十之一二久留官所徒滋荒圯於事無益用是再頒諭旨凡從前各案有情罪稍輕如那移分賠代賠著賠開欠指欠等項入官之産除已經變價已指俸勒限有人認買者不必查奏外其現存未變價者毋論己未交官未扣作完數一概查明原案情節將應否給還之處具奏請旨可傳諭户刑二部行文八旗各省一體辦理是月奉上諭八旗入官之産朕屢降諭旨將情節稍輕者分别給還因其中有己未交官之不同以致承辦未能速竣是以又降旨令該管各衙門查辦今思八旗此等案件有由户刑工等部令追變房産者該旗自應照例造册移送各部聽其核定亦有各旗自行承辦入官者若聽該旗自行查辦未免彼此互異不能畫一可令各旗都統等一體造册移送刑部查明具奏庶事有總滙易於歸結至於造册送部向無定例率多稽遲今著定限兩月逾限者將該管及承查之員交部議處四年奉上諭從前降旨令將入官地畝仍賞與八旗以為恆産隨經八旗大臣議稱借支庫銀於京城空地蓋屋賞無房人居住將公産地租陸續補庫其續收地租作何賞給永逺接濟别議具奏等語朕思此項地畝均係旗人舊業有因拖欠錢糧入官者有貪婪官吏抵應賠欵項入官者既賞還八旗人等仍留公官辦不但所得地租分散之時勢難均齊而地畝租銀官收之數亦必少於私收分賞衆人則人多數少無濟於事勢必隨手花費此項地畝仍令八旗官兵或指俸餉或交現銀承買為業則八旗人等各得立産於生計自有禆益承買價銀即交部以補蓋房之項其餘餘銀作何辦理及現有地畝作何視其肥瘠酌量等第别定價值令其認買該部會同八旗大臣詳晰議奏户部遵議第一等地每三十畝作價銀四十八兩二等地三十八兩三等地二十八兩四等地十八兩荒地十二兩領買者無論銀數多寡分作五次限五年交完其指俸餉抵買者坐扣五年完結如俸餉不敷準先交不敷銀其餘按季按月坐扣有合力共買者買後聽其分割十一月奉上諭八旗議奏公産地價除抵補蓋造官房外其餘剩銀兩請給發地方官將從前典賣與民人之旗地贖回報部先儘原主取贖如原主不贖即準各旗官兵人等認買等語朕思我朝定鼎之初將近京地畝圈給旗人在當日為八旗生計有不得不然之勢其時旗人所得地畝原足以資飬贍而無缺乏嗣因八旗生齒日繁恆産漸少旗人又或因事急需必不得已將地畝漸次典與民人為業雖民人不許私行典買旗地向有成例但厯年久逺輾轉相售已成民産今欲將從前典出旗地陸續贖回必須於民人全無擾纍辦理始為妥協再此項地畝爾等議令原主取贖及官兵認買殊不知官員內間有一二人尚可扣俸認買而貧乏兵丁食餉有限無從措價勢必至盡歸富戶富户或肯周濟親族亦豈能多為分給其所周濟能有幾何則贖地一事恐未必於貧乏之旗人有益可將此旨行文直𨽻總督孫嘉淦詳悉妥議務令於旗人有益民人不擾方為兩便之道餘著照所議行五年遵旨議準民典旗地動公取贖在百姓不苦於得價還地實懼其奪田别佃應令地方官於贖地時詢明現在佃種人姓名及現出之租數造册送直月旗轉傳八旗備案嗣後無論何人承買仍令原佃承種其租銀照册收取不得分外需索至民有在旗地內造房立墳者如已退地其從前蓋造房屋並墳墓所占地基只令丈明畝數照上等地交租不許勒令遷移再民典旗地不下數百萬畝典地民人不下數十萬户若一時概令首報未免滋擾按老圈旗地界址甚明老圈之內但有民産即係私典無法可以隱匿應勘明地畝界址旗色佐領及原業主姓名將承買公産餘銀先交地方官取贖至圈外旗地或係民人帶地投充或係旗人自置其有出典與民者應俟圈地贖畢公産尚有餘銀再訪原典之家陸續辦理不必豫期行文稽察又取贖民典旗地貧乏兵丁既無從措價亦不能多買按八旗公産及旗退餘存入官等地並此項贖回民田不下數千萬畝應詳察八旗間散人內有正身情願下鄊種地者上地給與百畝中地給與百五十畝下地給與二百畝令擕家口居鄊耕種初種之年量給牛種房屋之資如此則貧乏旗人永無飢寒之憂其利賴實屬無窮矣又覆準八旗都統於間散正户中選人安靜居家勤儉者善為開𨗳令下鄊耕種不必指定人數亦不必拘定年限陸續發往下鄉之後仍準簡選當差初下鄉屯每户給房四間每間折銀十兩令地方官蓋造每名給牛具耔種口糧等銀百兩如承買公産人等有願令子弟下鄉耕種者亦照此辦理於公産項下給發又覆準如有旗民互相典賣公産地畝者將賣地人等嚴行治罪出給圗記售賣之該佐領等交部議處領催莊頭典買旗地之民概行治罪地畝價銀一併入官六年二月奉上諭聞八旗兵丁在部具呈置買官地及到該地方領地之時往往移甲換乙將瘠薄更易膏腴非復原指之産業而歸旗之限又迫不得不回京師及向部中具呈部中據呈行查該地方官又復支吾塞責不能為之清理大失公平之義著該部定議稽查以清弊竇户部遵議交與直𨽻總督遴委道員同知通判等官専司督率稽察倘有仍前串通更換等弊州縣官不為清理致旗人羈延守候者即將該地方官嚴加議處如承委之該管官失於覺察一併恭劾議處七年議準清撤莊頭典賣田畝照雍正十三年原議辦理如應撤地內民人已經立墳蓋屋即令秉公定租存案又奏準凡旗人地畝有無私行典給民人之處於每嵗底交各該佐領出結呈報都統備案民人交里長甲長亦於年終將有無私典旗地之處察明出結稟報該州縣轉詳直督存案如有私典情弊一經察出係旗人該佐領即行呈報都統民人州縣官即行詳報直督皆照例治罪地畝及地價一併入官如該管各官失於覺察或經發覺或被首告一併交部議處八年議準清撤莊頭私典官地內有白契典賣一項其在雍正十三年以前交易若代莊頭納糧者嵗有輸納之費所獲地租未足抵其原本酌議給與半價如並未代莊頭納糧者承種既久穫租已足抵其原價將地畝撤交莊頭當差不追還價銀其在雍正十三年以後交易者租息實不足抵其原本地既撤交莊頭應在莊頭名下追給民人半價又有立契雖在雍正十三年而種地在乾隆元年者亦照雍正十三年以後辦理及出典在雍正十三年以前而乾隆元年以後復有找價者止追所找之半價如莊頭名下應追之全價半價不能當時交出家有地畝則撥民承種以租抵償償滿退還莊頭管業家無地畝則民價亦不應虗懸即以所撤地給民承種抵價價滿退交若嗣後莊頭仍將官地私相售典及小民明知官地擅行典買者察出照盜買盜賣例一併治罪又奏準八旗承買公産地畝人等有情願赴屯自種者均給與印信執照令其呈報該地方官驗看回旗之日銷燬如有從前赴屯種地者各該旗詳細察明按名補給印信執照九年覆準民典旗地不論契載年限總以十年為率在十年以內者照原典之價十年以外者減原價十分之一五十年以外者以半價取贖於承買公産案內撥銀二十萬兩交直𨽻總督驗明原契按年定價隨清隨贖行文八旗令原業主照贖價交官領回原産倘原主不願回贖準令官兵承買未經贖買之前交直督徴收官租既經贖買之後將地價作陸續贖地之需又覆準各旗人情願下屯耕種人丁造具清册飭交直督並令都統遴委賢員於九月開圈之日給咨前往會同地方官將地畝之肥瘠逺近按照旗分及坐落州縣均勻搭配毋致此盈彼絀稍有偏枯仍將某人某地造册送部以備考核至應需房屋令該督飭查有隨地間房則酌給居住無隨地間房則興工蓋造其應需之銀在公産項下支領十一年題準回贖旗地原議十年以外者減原價十分之一取贖然如十一二年或十八九年皆減十分之一則給價未免偏枯應令十年以外者每年遞減至五十年外則仍以半價取贖其原價較時價過重者地方官隨時體察地畝價值兩得其平至原典之外又有轉典者仍以原典定價其轉典價重即著落原典主補還至于找價每多不經中保其中誠偽難分應以乾隆五年四月奉到議準回贖部咨之日為斷在此前者準將找價并算在此後者概不準給找價以杜虗冒若民于原典旗地內自蓋房屋及已立墳塋者飭令丈明畝數照例聽其租賃不得居竒病民又奏準八旗官兵承買公産房地乃惠育旗人之至意若令原業主減價取贖而官兵照原價呈買則贖買有減價原價之不齊今準令各旗官兵亦照減價具呈認買其扣交地價均照公産五限之例辦理又奏準八旗公産地內有未經承買以及存退餘絶地畝共六千四百餘頃於乾隆七年酌留千頃以為各案撥補之用每年官收租息為數既輕土豪胥役包攬侵漁之弊在所不免應令户部及內務府各選賢能司官會同直督委員履畝詳勘地之肥瘠參照鄰畝秉公定議租數如地好租多者整分莊頭仍照例給地十八頃半分莊頭給地九頃不準多加如土薄租少者比照所辦差務酌量加增其新設莊頭照例免差一年又議準贖回民典旗地如原業主無存者準令原業主之子孫及同胞兄弟嫡親伯叔及嫡親兄弟之子等回贖該恭佐領等出具實屬親屬並無揑飾印結送部辦理如原業主並無應贖之人方準逺族人並異姓人等具呈認買倘有藉原業及原業之嫡屬姓名代贖者察出將出結之參佐領等恭處仍將冒名代贖之人嚴行治罪十二年奏準八旗滿洲蒙古漢軍間散人及情願告退錢糧下屯種地者該旗即行保送下屯後本人不準來京當差其下屯種地之旗人子弟內有情願來京考試當差者仍照原議辦理認買公産地畝人等子弟有願下屯種地者一例準令前往除給與房地外其應給牛具耔種銀各該旗委該參佐領等會同察旗御史每户先給銀十分之三以為料理車腳搬移之費下存七分該旗委參佐領等赴該州縣會同地方官將牛具耔種估需價值即行購備按戶支給餘剩銀給與各該户以資生計又奏準贖回民典旗地內往往有丈出餘地者如係原業主自行取贖及其子孫或親伯叔兄弟姪取贖將丈出餘地不論多寡一併指交管業無庸别行作價倘原業主無力取贖及無應贖之人應循例召買即照原典地畝所減價值計畝作價承買又奏準八旗間散人等下屯種地尚需時日現在東作方興各佃已照舊耕種恐旗人到屯收地佃户未及收穫工本無償應按照月分以定成規麥秋以三月為率如旗人三月以前到屯者議還工本交出地畝若四月到屯則麥之收穫主佃各半其粟榖等項以五月為率五月前到屯者議給籽種將地交還六月前到屯並償工本若七月到屯則收成已屇亦令主佃各半分收至九月後到屯者本年租銀仍令官徴官解十三年奏準開濬河道占用旗地各該屬于興工以前先行丈明占用地畝數目詳開原業姓名旗色佐領村莊假落造具清册送部咨行各該旗定限半年察明取結送部核對相符者準其撥補如逾限不行咨覆及咨覆不符者概不準撥補倘原業內有升遷外任或撥往外省駐防者該旗一面行文該處一面報户部扣限辦理十四年題準贖回民典旗地一千八百六十九頃五十八畝並場園房屋地基各項用銀十有九萬八千一百五十五兩有竒餘剩銀應歸續發接贖地價銀內為將來贖地之需十五年十二月奉上諭民人私典旗地定例綦嚴屢經飭禁但念郎世寧等係西洋逺人內地禁例原未經通飭遵行且伊等寄寓京師亦藉此以資生計所有定例後價典旗地著加恩免其撤回如原典之人自行用價取贖仍聽其贖回此係朕加恩逺人恩施格外今禁例既經申明嗣後西洋人於此項地畝之外再有私行典賣旗地者與受之人定行照例治罪並將此次恩免撤回之處從重究治郎世寧等既經寬免所有出典之蔡永福等並失察之該管各官均從寬免其治罪議處至河淤地畝亦係郎世寧等價典之地俱免圈撤但蔡永福于認買公産之外所有多得河淤地畝典價並非伊分內應得之項著該部照例查辦十六年奏準八旗正户原準其下屯耕種今有不肖之徒冒領房屋牛具等銀任意花消逃回京城者不一而足應令直督察緝逃户依律治罪嗣後旗人停其下屯種地十八年九月議準旗下奴僕及開戶人典買旗地請定限一年令其自行首報官為回贖如係其主地畝應比民典旗地之例量為加重將十年以內者即照原價減給十分之一十年以外減給十分之二以次按年遞減俟官為回贖後聽其業主交價認領或典價本多一時不能湊交準其照民典旗地之例於俸餉內分五限扣交若將地畝賣給家奴是其主原不知自顧生計反得將已棄之産分限扣俸減價認贖未免太優應令交足現銀方準認領至旗人將地畝典賣與别姓奴僕則與奴占主産有乖名分者不同應照民典旗地之例減給原價十分之一仍按年分遞減但必係典出者方準原業主於俸餉內照例分五限扣價認領其賣出者即將地贖回入官不準認領亦不準他人承買此等入官地及確準認領而原業主無力並無俸餉可扣不能認贖者均交八旗內務府作為旗人公産官為收租每於嵗終將收過租息數目彚奏請旨賞給貧乏旗人以資飬贍仍令該旗及地方官不時嚴行稽察倘有逾限不行首報或經清釐之後復違例典賣者一經發覺即撤地入官將業主售主照例治罪並將失察徇隱之該參佐領及地方官交部分别議處其民典旗地嗣後一并停其召買交與該旗作為公産將所收租息歸入此案於嵗終彚奏增給貧乏旗人俾飬贍益得充裕是月副都統滿泰奏言今贖得地畝人等并預先買得地畝人等內或有人當時希圗得利巧避規條指稱地無租價銀無利息名色立契與民取銀使用不肖之徒從而效法此等弊竇如不盡除日久淹沒仍與私典民人無異現今屢動公項贖出歸還旗人而伊等但圗日前之利將地畝任其私給與民則地畝無贖完之期矣似此者如本身報出免其治罪將應扣地價仍然坐扣即將扣過銀兩贖出之地照現今之例辦理并查原業子嗣果係為人淳朴善于居家能永逺保守者準令回贖尋大學士傅恆等議應交八旗大臣將各旗原有地畝贖回地畝數目徹底清查此內旗人認買坐扣俸餉完結者若干尚未坐扣完結者若干此等旗人原有地畝及後認買地畝現今有無仍在本人名下并有無私行偷典與民之處一面嚴查一面通行曉諭旗人令伊等據實自行首報如自行報出者免其治罪俸餉坐扣完結者無庸議外尚有未經扣完者仍在伊名下坐扣完結將地畝即行撤出歸入八旗公産辦理所查地畝如果俱在原人之手令該旗大臣出具保結將所查地畝數目分晰造册一併咨送户部如所報不實及嗣後私給民人并私典者發覺之日將原人加倍治罪該旗大臣恭佐領等一併嚴加議處領催等從重治罪再查八旗公産地畝此數年辦理不甚有益應另行籌畫令其實得禆益請交户部將存旗公産每年所得租銀查明數目並作何辦理與旗人生計有益之處會同八旗大臣議奏奉旨著交與八旗都統限三個月查明會同軍機大臣該部議奏十九年二月軍機大臣等奏言臣等現查以俸餉坐扣贖出地畝及買得公産地畝共九千八百十三頃八十二畝除租佃與民及典賣在旗外其餘典賣與民入地畝共七百二十五頃二十八畝臣等伏思此項地畝係皇上憐憫旗人特恩動帑向民贖回將伊等俸餉坐扣俾各得原業不許私行典賣與民之處例禁甚嚴乃竟有不肖旗人惟圖眼前得利暗自與民私立文約將地畝復典與民實屬不合民人惟圖得地違例私典亦屬不合臣等仰懇將此項七百二十五頃有零地畝盡行撤出照户部原奏收取租銀年終彚奏賞給旗人之例辦理再查旗人原圈地畝及自置地畝內從前清查時未報此次清查報出典賣與民共一萬四千七百五十九項零補行報出者雖屬違例但此次清查既據實自行報出遵照原議免其治罪應交與合恭佐領清查原業主如果能交銀回贖者令其回贖如不能回贖者將此項地畝官贖所得租息亦照此辦理再臣等雖于三月限內遍查但事經年久有原業主病故子孫年幼者其地畝數目坐落村莊典地民人名姓不能記憶是以未經報出查直𨽻各屬地畝除現納錢糧民地外俱係旗人原圈地畝若將現納錢糧民地開除挨村清查則遺漏沉沒之旗地俱得清楚請將八旗地畝册檔咨送户部轉行直𨽻總督勒限一年令各州縣照册挨村清查將遺漏及沉沒地畝俱行查出據實造册咨報户部辦理户部即令各該旗抄録造册鈐蓋旗印收貯備查如有再行違例私典與民及民人私自典買或被查出或被首告從重治罪外將地畝價銀盡行撤出交與該旗照定例辦理并將該管大臣地方官嚴加議處二十一年議準新滿洲官兵人等來京當差免行撥給地畝於地方官徴解租銀內折給銀兩每畝折租銀一錢五分如應得三百畝則給銀四十五兩頭二等侍衛每年給銀四十五兩三等藍翎侍衛給銀三十六兩前鋒護軍給銀二十七兩拜唐阿給銀二十二兩五錢案此例於三十六年改為減半折給詳見後卷二十二年十一月户部議奏臣等將該旗送到清册咨發直𨽻總督飭屬查辦但其間有出典年久原業之子孫記憶不清或僅開州縣名目而無坐落村莊或訛開典人名姓及地畝銀數不符者又有民人將原典地畝復行轉典或貿易外出難以尅期查報者更有民人將原契更易私添找價故為混淆希圖久種旗産者是以輾轉咨查至今十有餘年屢經臣部嚴催仍未全行清楚似此遷延即再遲數載亦不能辦理完結近據直𨽻總督方觀承將都統滿泰所奏案內查清候贖地一萬三百九十五畝零共典找價銀一百六十四萬六千八百四兩零又將御史耀成所奏案內查清候贖地四千一百二十三頃零共典找價銀七十萬五千八百九十四兩零分案造册先行具題其餘地畝俟查清冉行續報臣等伏查此項地畝若照旗地之例取租每畝市平租銀一二錢至三四錢不等而現在民人承種每畝官租銀最多者不過錢餘少者僅收二三分不等是此項地畝與其由地方官召民承種收租無幾徒使胥役中飽如何按旗人自行收租之數每年約可得租銀數十萬兩臣等詳加酌議請將此二案候贖地畝行令直督會同順天府府尹等將應減應給銀數詳細核明造具簡明清册送部臣等仰體皇上惠養旗人之意恭懇聖恩先行發帑照數贖回並從前三次贖回現存地畝一并分交八旗都統等遴委賢員照旗地旗租之例收取租銀按年解交臣部歸還帑項俟還清之日應將作何辦理租銀之處會同八旗都統詳細妥議請旨遵行奉旨依議十二月奉上諭户部議入官地畝交該旗查明原收租數行令地方官照數徴收之處此等地畝以加惠小民而論即租額冉為輕減亦無不可但向來官地租額雖輕而民佃多不沾實惠蓋地租一項既不在官又不在民則不肖官吏轉得視為利藪該部請照原納租數徴收自為杜絶弊端所奏是但旗人原收租數或係市平市斛而官為收納勢必用庫平官斛則租數雖屬相符而貧民所加已屬不少嗣後入官地畝地方官照原數徴收著即照原收平斛令其輸納庶俾承佃各户交租不致畸重而官吏亦不致中飽矣二十七年六月奉上諭户部所有八旗存積地畝一項摺內酌議分設莊頭之處著照所請行但安設莊頭需地不過三四千頃所餘尚有一萬餘頃之多此等皆係老圈旗地且發帑贖回者十居七八原係應行入官地畝徒交地方官徴解適滋胥吏侵肥旗與民兩無裨益著將此項交內務府派員經理徴收俟原帑按數歸清之後即將地畝賞給八旗作為恆産其將來如何酌定章程妥協辦理之處臨時著該部會同內務府八旗大臣悉心詳議具奏現在內務府查辦時并著八旗各𣲖幹員會同經理將來該員等亦俱熟練即可接手承辦矣欽定八旗通志卷六十四
