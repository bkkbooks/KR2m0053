body:
  text: 土田志三土田規制畿輔規制三乾隆元年至二十七年乾隆元年六月奉上諭據阿山等查奏張家口外東四旗地畝應照西四旗之例毎畝徵銀一分四釐於乾隆元年起科朕思該處地畝甫經查明若即令於本年起科未免輸納維艱著緩至乾隆三年起科又據奏稱西四旗地畝内從前有徵多報少之弊請交直督李衞查審明確定擬等語此項開墾地畝今既查明嗣後該管官自應據實徵報其從前隐匿朦混徵多報少之處事在恩赦以前著從寛免其查究餘著該部查議具奏是月奉上諭從前八旗虧空著追人員荷䝉皇考格外隆恩屢頒諭令各旗查明奏請豁免嗣經臣工條奏請將欠帑人員之家産等項已經開報者不准寛免而八旗大臣及㕘領佐領等又復辦理不善種種紛擾以致恩施不能下逮此朕所深知者即位以来旗人生計時厪朕懐者將八旗應入官之房産地畝雖經報部而尚未估價及八旗已經估價而尚未交部者照前所降諭㫖分别情罪令各該處查明給還本人俾其執業十二月王大臣議奏八旗入官地畝九千五十餘頃入官房屋八千三百餘間請將地畝立為公産以每年所得租息分給旗人並令八旗都統於㕘領内揀選數員經管招種取租報部查核至入官房屋請照前准人認買其未認買之前仍留各該處取租以資賞給奉㫖依議是年覆准口外熱河地方設立驛站營汛官兵皆有恩賞額地後因滋生日乆遂於額地之外各自開墾今悉行丈出除原額外所有餘地應令按畆納糧至古北口乃邉關重鎮駐防兵丁挈家戍守沿邉瘠地皆係自力逐漸開墾出息無多丈出之地應悉賞給免其輸糧又各蒙古丈出餘地若令納糧恐不敷飬贍又内務府當差鷹手捕牲人鞍匠等散處口外皆有開荒地畆伊等原在内務府當差不便令其一例納糧均将現在丈出餘地註册亦免其納糧嗣後如再有開墾即照例按畆徴輸二年二月和碩恒親王𢎞晊議覆王大臣等所議収取地租以為貧乏兵丁恒産一摺上召八旗都統等諭曰從前入官旗地理應賞還旗人俾得生路但旗地與民地不同不便交部是以特交爾八旗大臣辦理今爾等議稱入官地畆從前所定租額本輕徒致州縣吏胥中飽請派員前徃秉公更定等語現在入官地畆之租較之民人佃種旗地之租為數實少而此項入官之地原屬旗地與民人納糧之地不同雖經官定租額而百姓不知仍納重租以致吏胥中飽今因地定租固為允協但愚民不明事理或妄生疑意謂増添租額亦未可定夫旗人民人均吾赤子朕一視同仁並無岐待著交與直督出示曉諭若無從前弊端即令該督保題停止増添又議稱似此一定之後交與地方官按年照數収租解部等語夫年嵗之豐歉不齊如遇歉収仍照定數徴租則百姓未免受累其旱澇之年作何减収豐稔之年作何補納著州縣官隨年嵗豐歉酌量辦理報明該旗仍報部存案倘有藉端䑃混不據實辦理者即著該旗該督查恭又爾等稱京城空閒之地可以盖造房屋即将所得租息盖造賞給無業貧人居住等語所議甚是朕為八旗無業之人不得房屋居住時為籌畫但未知京城有空閒之地今既有空地爾等可查勘明白議奏但盖造房屋若只動用今年之租則所得房屋無㡬若俟積年之租始行盖造則又至遲延現在圎明園原有優劣二營官兵居住之房爾等於查明空地議定盖造房屋之時即将此二營房屋拆用其運京脚價及盖造之費於今年租内動用至賞給貧人居住之處詳悉籌議俟行之數年所有空地盖造已遍再将續得地租作何賞給或另用於旗人有益之地臨期議奏至爾等八旗選派前徃查㸔之叅領等著帶領引見並傳諭總督李衛於伊所屬之同知等官内揀選八員派定旗分㑹同旗員與該地方官公同辦理餘依議是年奏准官用旗地向在入官地内動撥今入官地畆已經分給各旗作為公産未便再行動用按直屬有駐防旗人交出在京所受之地及各荘頭退出之地又有八旗丈出餘地並户絶無人承受之地嗣後荘園人等當差官地及奏免給還並各項官用應行補還者統於前項地内動撥至旗人来京當差應得地畆亦在此内撥給又奏准凡興工修築動用旗人地畆地方官於興工日将畆數及姓名旗分造册咨部撥補倘無故遲延以致旗民失業該管上司即行叅劾三年二月奉上諭朕前以旗人生計貧乏者多令将八旗入官地畆立為公産取租觧部按旗分給以資飬贍但思此等入官地畆内有我朝定鼎之初圈給八旗官兵将錢糧悉行豁免者亦有旗人與百姓自相交易出銀置買仍在州縣納糧者兩種原屬不同祗因旗産入官有糧無糧未經分析一併交官収租是以部册并造入公産此項民地當契買之時旗人執業民人得價原係彼此樂從之事若以入官之後一概定為公産不准民贖殊非朕軫恤畿輔黎赤之本懐用是特頒諭㫖除原圈官地為旗人世業自不容民間置買其旗人自置有糧之民地現在入官者如有欲售之人不論旗民一體准照原估價值變買将銀兩解交司庫陸續咨觧户部交各旗料理生息分給旗人俾沾惠澤至於民買官地該地方官務湏經理得冝毋致中飽壟㫁等弊以昭朕一視同仁欲旗民兩便之至意是月奉上諭雍正十三年九月間朕以八旗入官地畆房屋從前該管大臣等辦理不妥有將已經豁免之項因該旗查報在先仍行勒逼交官者其間弊端種種曽降諭㫖飭部確查辦理又於乾隆元年六月内降㫖将八旗應入官之地畆房屋雖經報部尚未估價已經估價尚未交部者分别情罪令各該處查明給還本人以上二次諭㫖屈指已厯三年今朕訪聞仍有稽延遲滯未曽清楚者大約因該管大員從前辦理不善未免回䕶前非或貧寒孤苦之家無力控訴又或胥吏借端需索有意遲回有此數端以致膏澤不能下逮用是再頒諭㫖凡入官田房有與前次㫖意相符者許本身及其適屬在各該管衙門據實呈明如果情有可原該管大臣即行具奏請㫖毋許仍蹈前轍倘有應奏不奏者經朕訪聞或别經發覺定行從重議處若本人揑詞妄控亦照誣告例治罪三月奉上諭朕前因八旗人員生計艱難曽降諭㫖将應入官之房産地畆有雖經報部尚未估價及已經估價而尚未交部者令各該處查明給還本人執業又念欠帑人員那移之項與侵貪不同著該部查明各案内有家産已報未估并報估而尚未變交者如實係因公確有憑據准其具題請㫖乃降㫖已乆而户刑兩部奏請給還者不過數案推求其故盖因承辦衙門泥於前㫖内估價而尚未變交之語以為凡抵帑之産一經開報即為交官既係交官即不應在給還之列矣又因户部覆奏房地等項作為已還數内者不應給還毋庸查奏以為凡抵帑之産一經交官即俱扣作完數皆不應在查奏之列矣是以厯數年之乆而奏請者仍寥寥無㡬朕思雍正十三年九月以前抵帑入官之房産現存者不過十之一二乆留官所徒滋荒圯於事無益用是再頒諭㫖凡從前各案有情罪稍輕如那移分賠代賠著賠開欠指欠等項入官之産除已經變價已指俸勒限有人認買者不必查奏外其現存未變價者毋論己未交官未扣作完數一概查明原案情節将應否給還之處具奏請㫖可傳諭户刑二部行文八旗各省一體辦理是月奉上諭八旗入官之産朕屢降諭㫖将情節稍輕者分别給還因其中有己未交官之不同以致承辦未能速竣是以又降㫖令該管各衙門查辦今思八旗此等案件有由户刑工等部令追變房産者該旗自應照例造册移送各部聽其核定亦有各旗自行承辦入官者若聽該旗自行查辦未免彼此互異不能畫一可令各旗都統等一體造册移送刑部查明具奏庶事有總滙易於歸結至於造册送部向無定例率多稽遲今著定限兩月逾限者将該管及承查之員交部議處四年奉上諭從前降㫖令将入官地畆仍賞與八旗以為恒産隨經八旗大臣議稱借支庫銀於京城空地盖屋賞無房人居住将公産地租陸續補庫其續収地租作何賞給永逺接濟别議具奏等語朕思此項地畆均係旗人舊業有因拖欠錢糧入官者有貪婪官吏抵應賠欵項入官者既賞還八旗人等仍留公官辦不但所得地租分散之時勢難均齊而地畆租銀官収之數亦必少於私収分賞衆人則人多數少無濟於事勢必隨手花費此項地畆仍令八旗官兵或指俸餉或交現銀承買為業則八旗人等各得立産於生計自有禆益承買價銀即交部以補盖房之項其餘餘銀作何辦理及現有地畆作何視其肥瘠酌量等第别定價值令其認買該部㑹同八旗大臣詳晰議奏户部遵議第一等地每三十畆作價銀四十八兩二等地三十八兩三等地二十八兩四等地十八兩荒地十二兩領買者無論銀數多寡分作五次限五年交完其指俸餉抵買者坐扣五年完結如俸餉不敷准先交不敷銀其餘按季按月坐扣有合力共買者買後聽其分割十一月奉上諭八旗議奏公産地價除抵補盖造官房外其餘剰銀兩請給發地方官将從前典賣與民人之旗地贖回報部先儘原主取贖如原主不贖即准各旗官兵人等認買等語朕思我朝定鼎之初将近京地畆圈給旗人在當日為八旗生計有不得不然之勢其時旗人所得地畆原足以資飬贍而無缺乏嗣因八旗生齒日繁恒産漸少旗人又或因事急需必不得已将地畆漸次典與民人為業雖民人不許私行典買旗地向有成例但厯年乆逺輾轉相售已成民産今欲將從前典出旗地陸續贖回必須於民人全無擾累辦理始為妥協再此項地畆爾等議令原主取贖及官兵認買殊不知官員内間有一二人尚可扣俸認買而貧乏兵丁食餉有限無從措價勢必至盡歸富戶富户或肯周濟親族亦豈能多為分給其所周濟能有㡬何則贖地一事恐未必於貧乏之旗人有益可将此㫖行文直𨽻總督孫嘉淦詳悉妥議務令於旗人有益民人不擾方為兩便之道餘著照所議行五年遵㫖議准民典旗地動公取贖在百姓不苦於得價還地實懼其奪田别佃應令地方官於贖地時詢明現在佃種人姓名及現出之租數造册送直月旗轉傳八旗備案嗣後無論何人承買仍令原佃承種其租銀照册収取不得分外需索至民有在旗地内造房立墳者如已退地其從前盖造房屋並墳墓所占地基只令丈明畆數照上等地交租不許勒令遷移再民典旗地不下數百萬畆典地民人不下數十萬户若一時概令首報未免滋擾按老圈旗地界址甚明老圈之内但有民産即係私典無法可以隠匿應勘明地畆界址旗色佐領及原業主姓名將承買公産餘銀先交地方官取贖至圈外旗地或係民人帶地投充或係旗人自置其有出典與民者應俟圈地贖畢公産尚有餘銀再訪原典之家陸續辦理不必豫期行文稽察又取贖民典旗地貧乏兵丁既無從措價亦不能多買按八旗公産及旗退餘存入官等地並此項贖回民田不下數千萬畆應詳察八旗閑散人内有正身情願下鄊種地者上地給與百畆中地給與百五十畆下地給與二百畆令擕家口居鄊耕種初種之年量給牛種房屋之資如此則貧乏旗人永無饑寒之憂其利賴實屬無窮矣又覆准八旗都統於閑散正户中選人安静居家勤儉者善為開𨗳令下鄊耕種不必指定人數亦不必拘定年限陸續發徃下鄉之後仍准簡選當差初下鄉屯每户給房四間每間折銀十兩令地方官盖造毎名給牛具耔種口糧等銀百兩如承買公産人等有願令子弟下鄉耕種者亦照此辦理於公産項下給𤼵又覆准如有旗民互相典賣公産地畆者将賣地人等嚴行治罪出給圗記售賣之該佐領等交部議處領催荘頭典買旗地之民概行治罪地畆價銀一併入官六年二月奉上諭聞八旗兵丁在部具呈置買官地及到該地方領地之時徃徃移甲換乙将瘠薄更易膏腴非復原指之産業而歸旗之限又廹不得不囘京師及向部中具呈部中據呈行查該地方官又復支吾塞責不能為之清理大失公平之義著該部定議稽查以清弊竇户部遵議交與直𨽻總督遴委道員同知通判等官専司督率稽察倘有仍前串通更換等弊州縣官不為清理致旗人羈延守候者即将該地方官嚴加議處如承委之該管官失於覺察一併恭劾議處七年議准清撤莊頭典賣田畆照雍正十三年原議辦理如應撤地内民人已經立墳盖屋即令秉公定租存案又奏准凡旗人地畆有無私行典給民人之處於每嵗底交各該佐領出結呈報都統備案民人交里長甲長亦於年終將有無私典旗地之處察明出結禀報該州縣轉詳直督存案如有私典情弊一經察出係旗人該佐領即行呈報都統民人州縣官即行詳報直督皆照例治罪地畆及地價一併入官如該管各官失於覺察或經發覺或被首告一併交部議處八年議准清撤莊頭私典官地内有白契典賣一項其在雍正十三年以前交易若代荘頭納糧者嵗有輸納之費所獲地租未足抵其原本酌議給與半價如並未代莊頭納糧者承種既乆穫租已足抵其原價將地畆撤交荘頭當差不追還價銀其在雍正十三年以後交易者租息實不足抵其原本地既撤交莊頭應在莊頭名下追給民人半價又有立契雖在雍正十三年而種地在乾隆元年者亦照雍正十三年以後辦理及出典在雍正十三年以前而乾隆元年以後復有找價者止追所找之半價如荘頭名下應追之全價半價不能當時交出家有地畆則撥民承種以租抵償償滿退還莊頭管業家無地畆則民價亦不應虗懸即以所撤地給民承種抵價價滿退交若嗣後荘頭仍将官地私相售典及小民明知官地擅行典買者察出照盗買盗賣例一併治罪又奏准八旗承買公産地畆人等有情願赴屯自種者均給與印信執照令其呈報該地方官騐看囘旗之日銷燬如有從前赴屯種地者各該旗詳細察明按名補給印信執照九年覆准民典旗地不論契載年限總以十年為率在十年以内者照原典之價十年以外者減原價十分之一五十年以外者以半價取贖於承買公産案内撥銀二十萬兩交直𨽻總督騐明原契按年定價隨清隨贖行文八旗令原業主照贖價交官領回原産倘原主不願回贖准令官兵承買未經贖買之前交直督徴収官租既經贖買之後將地價作陸續贖地之需又覆准各旗人情願下屯耕種人丁造具清冊飭交直督並令都統遴委賢員於九月開圈之日給咨前徃㑹同地方官将地畆之肥瘠逺近按照旗分及坐落州縣均匀撘配毋致此盈彼絀稍有偏枯仍将某人某地造冊送部以備考覈至應需房屋令該督飭查有隨地閑房則酌給居住無隨地閑房則興工盖造其應需之銀在公産項下支領十一年題准回贖旗地原議十年以外者減原價十分之一取贖然如十一二年或十八九年皆減十分之一則給價未免偏枯應令十年以外者每年逓減至五十年外則仍以半價取贖其原價較時價過重者地方官隨時體察地畆價值兩得其平至原典之外又有轉典者仍以原典定價其轉典價重即著落原典主補還至于找價每多不經中保其中誠偽難分應以乾隆五年四月奉到議准回贖部咨之日為㫁在此前者准将找價并筭在此後者概不准給找價以杜虗冐若民于原典旗地内自盖房屋及已立墳塋者飭令丈明畆數照例聽其租賃不得居竒病民又奏准八旗官兵承買公産房地乃恵育旗人之至意若令原業主減價取贖而官兵照原價呈買則贖買有減價原價之不齊今准令各旗官兵亦照減價具呈認買其扣交地價均照公産五限之例辦理又奏准八旗公産地内有未經承買以及存退餘絶地畆共六千四百餘頃於乾隆七年酌留千頃以為各案撥補之用每年官収租息為數既輕土豪胥役包攬侵漁之弊在所不免應令户部及内務府各選賢能司官㑹同直督委員履畆詳勘地之肥瘠叅照鄰畆秉公定議租數如地好租多者整分莊頭仍照例給地十八頃半分荘頭給地九頃不准多加如土薄租少者比照所辦差務酌量加増其新設荘頭照例免差一年又議准贖回民典旗地如原業主無存者准令原業主之子孫及同胞兄弟嫡親伯叔及嫡親兄弟之子等回贖該恭佐領等出具實屬親屬並無揑飾印結送部辦理如原業主並無應贖之人方准逺族人並異姓人等具呈認買倘有藉原業及原業之嫡屬姓名代贖者察出将出結之叅佐領等恭處仍将冐名代贖之人嚴行治罪十二年奏准八旗滿洲蒙古漢軍閑散人及情願告退錢糧下屯種地者該旗即行保送下屯後本人不准来京當差其下屯種地之旗人子弟内有情願来京考試當差者仍照原議辦理認買公産地畆人等子弟有願下屯種地者一例准令前徃除給與房地外其應給牛具耔種銀各該旗委該叅佐領等㑹同察旗御史每户先給銀十分之三以為料理車脚搬移之費下存七分該旗委叅佐領等赴該州縣㑹同地方官将牛具耔種估需價值即行購備按戶支給餘剰銀給與各該户以資生計又奏准贖回民典旗地内徃徃有丈出餘地者如係原業主自行取贖及其子孫或親伯叔兄弟姪取贖将丈出餘地不論多寡一併指交管業無庸别行作價倘原業主無力取贖及無應贖之人應循例召買即照原典地畝所減價值計畆作價承買又奏准八旗閑散人等下屯種地尚需時日現在東作方興各佃已照舊耕種恐旗人到屯収地佃户未及収穫工本無償應按照月分以定成規麥秋以三月為率如旗人三月以前到屯者議還工本交出地畆若四月到屯則麥之収穫主佃各半其粟榖等項以五月為率五月前到屯者議給籽種将地交還六月前到屯並償工本若七月到屯則収成已屇亦令主佃各半分収至九月後到屯者本年租銀仍令官徴官觧十三年奏准開濬河道占用旗地各該屬于興工以前先行丈明占用地畆數目詳開原業姓名旗色佐領村荘叚落造具清冊送部咨行各該旗定限半年察明取結送部覈對相符者准其撥補如逾限不行咨覆及咨覆不符者概不准撥補倘原業内有陞遷外任或撥徃外省駐防者該旗一面行文該處一面報户部扣限辦理十四年題准贖回民典旗地一千八百六十九頃五十八畆並場園房屋地基各項用銀十有九萬八千一百五十五兩有竒餘剰銀應歸續發接贖地價銀内為将来贖地之需十五年十二月奉上諭民人私典旗地定例綦嚴屢經飭禁但念郎世寧等係西洋逺人内地禁例原未經通飭遵行且伊等寄寓京師亦藉此以資生計所有定例後價典旗地著加恩免其撤回如原典之人自行用價取贖仍聽其贖回此係朕加恩逺人恩施格外今禁例既經申明嗣後西洋人於此項地畆之外再有私行典賣旗地者與受之人定行照例治罪並将此次恩免撤回之處從重究治郎世寕等既經寛免所有出典之蔡永福等並失察之該管各官均從寛免其治罪議處至河淤地畆亦係郎世寕等價典之地俱免圈撤但蔡永福于認買公産之外所有多得河淤地畆典價並非伊分内應得之項著該部照例查辦十六年奏准八旗正户原准其下屯耕種今有不肖之徒冐領房屋牛具等銀任意花消逃回京城者不一而足應令直督察緝逃户依律治罪嗣後旗人停其下屯種地十八年九月議准旗下奴僕及開戶人典買旗地請定限一年令其自行首報官為回贖如係其主地畆應比民典旗地之例量為加重将十年以内者即照原價减給十分之一十年以外减給十分之二以次按年逓减俟官為回贖後聴其業主交價認領或典價本多一時不能凑交准其照民典旗地之例於俸餉内分五限扣交若将地畆賣給家奴是其主原不知自顧生計反得将已棄之産分限扣俸减價認贖未免太優應令交足現銀方准認領至旗人将地畆典賣與别姓奴僕則與奴占主産有乖名分者不同應照民典旗地之例减給原價十分之一仍按年分逓减但必係典出者方准原業主於俸餉内照例分五限扣價認領其賣出者即将地贖回入官不准認領亦不准他人承買此等入官地及確准認領而原業主無力並無俸餉可扣不能認贖者均交八旗内務府作為旗人公産官為収租每於嵗終将収過租息數目彚奏請㫖賞給貧乏旗人以資飬贍仍令該旗及地方官不時嚴行稽察倘有逾限不行首報或經清釐之後復違例典賣者一經發覺即撤地入官将業主售主照例治罪並将失察狥隠之該叅佐領及地方官交部分别議處其民典旗地嗣後一并停其召買交與該旗作為公産将所収租息歸入此案於嵗終彚奏増給貧乏旗人俾飬贍益得充裕是月副都統滿泰奏言今贖得地畆人等并預先買得地畆人等内或有人當時希圗得利巧避規條指稱地無租價銀無利息名色立契與民取銀使用不肖之徒從而效法此等弊竇如不盡除日乆淹没仍與私典民人無異現今屡動公項贖出歸還旗人而伊等但圗日前之利将地畆任其私給與民則地畆無贖完之期矣似此者如本身報出免其治罪将應扣地價仍然坐扣即将扣過銀兩贖出之地照現今之例辦理并查原業子嗣果係為人淳朴善于居家能永逺保守者准令回贖尋大學士傅恒等議應交八旗大臣将各旗原有地畆贖回地畆數目澈底清查此内旗人認買坐扣俸餉完結者若干尚未坐扣完結者若干此等旗人原有地畆及後認買地畆現今有無仍在本人名下并有無私行偷典與民之處一面嚴查一面通行曉諭旗人令伊等㨿實自行首報如自行報出者免其治罪俸餉坐扣完結者無庸議外尚有未經扣完者仍在伊名下坐扣完結将地畆即行撤出歸入八旗公産辦理所查地畆如果俱在原人之手令該旗大臣出具保結将所查地畆數目分晰造册一併咨送户部如所報不實及嗣後私給民人并私典者發覺之日将原人加倍治罪該旗大臣恭佐領等一併嚴加議處領催等從重治罪再查八旗公産地畆此數年辦理不甚有益應另行籌畫令其實得禆益請交户部将存旗公産每年所得租銀查明數目並作何辦理與旗人生計有益之處㑹同八旗大臣議奏奉㫖著交與八旗都統限三個月查明㑹同軍機大臣該部議奏十九年二月軍機大臣等奏言臣等現查以俸餉坐扣贖出地畝及買得公産地畝共九千八百十三頃八十二畆除租佃與民及典賣在旗外其餘典賣與民入地畆共七百二十五頃二十八畆臣等伏思此項地畆係皇上憐憫旗人特恩動帑向民贖回將伊等俸餉坐扣俾各得原業不許私行典賣與民之處例禁甚嚴乃竟有不肖旗人惟圖眼前得利暗自與民私立文約将地畆復典與民實屬不合民人惟圖得地違例私典亦屬不合臣等仰懇將此項七百二十五頃有零地畆盡行撤出照户部原奏収取租銀年終彚奏賞給旗人之例辦理再查旗人原圈地畆及自置地畆内從前清查時未報此次清查報出典賣與民共一萬四千七百五十九項零補行報出者雖屬違例但此次清查既據實自行報出遵照原議免其治罪應交與合恭佐領清查原業主如果能交銀回贖者令其回贖如不能回贖者将此項地畝官贖所得租息亦照此辦理再臣等雖于三月限内遍查但事經年乆有原業主病故子孫年㓜者其地畆數目坐落村庄典地民人名姓不能記憶是以未經報出查直𨽻各屬地畆除現納錢糧民地外俱係旗人原圈地畆若將現納錢糧民地開除挨村清查則遺漏沉沒之旗地俱得清楚請將八旗地畆冊檔咨送户部轉行直𨽻總督勒限一年令各州縣照冊挨村清查将遺漏及沉没地畆俱行查出據實造冊咨報户部辦理户部即令各該旗抄錄造冊鈐盖旗印収貯備查如有再行違例私典與民及民人私自典買或被查出或被首告從重治罪外将地畆價銀盡行撤出交與該旗照定例辦理并将該管大臣地方官嚴加議處二十一年議准新滿洲官兵人等來京當差免行撥給地畆於地方官徴觧租銀内折給銀兩每畆折租銀一錢五分如應得三百畆則給銀四十五兩頭二等侍衛每年給銀四十五兩三等藍翎侍衛給銀三十六兩前鋒䕶軍給銀二十七兩拜唐阿給銀二十二兩五錢案此例於三十六年改為减半折給詳見後卷二十二年十一月户部議奏臣等将該旗送到清冊咨發直𨽻總督飭屬查辦但其間有出典年乆原業之子孫記憶不清或僅開州縣名目而無坐落村庄或訛開典人名姓及地畆銀數不符者又有民人将原典地畆復行轉典或貿易外出難以尅期查報者更有民人将原契更易私添找價故為混淆希圖乆種旗産者是以輾轉咨查至今十有餘年屢經臣部嚴催仍未全行清楚似此遷延即再遲數載亦不能辦理完結近據直𨽻總督方觀承将都統滿㤗所奏案内查清候贖地一萬三百九十五畆零共典找價銀一百六十四萬六千八百四兩零又将御史耀成所奏案内查清候贖地四千一百二十三頃零共典找價銀七十萬五千八百九十四兩零分案造冊先行具題其餘地畆俟查清冄行續報臣等㐲查此項地畆若照旗地之例取租每畆市平租銀一二錢至三四錢不等而現在民人承種每畆官租銀最多者不過錢餘少者僅収二三分不等是此項地畆與其由地方官召民承種収租無幾徒使胥役中飽如何按旗人自行収租之數每年約可得租銀數十萬両臣等詳加酌議請将此二案候贖地畆行令直督㑹同順天府府尹等将應减應給銀數詳細核明造具簡明清冊送部臣等仰體皇上恵養旗人之意恭懇聖恩先行發帑照數贖回並從前三次贖回現存地畆一并分交八旗都統等遴委賢員照旗地旗租之例収取租銀按年觧交臣部歸還帑項俟還清之日應將作何辦理租銀之處㑹同八旗都統詳細妥議請㫖遵行奉㫖依議十二月奉上諭户部議入官地畝交該旗查明原收租數行令地方官照數徴収之處此等地畆以加恵小民而論即租額冄為輕减亦無不可但向來官地租額雖輕而民佃多不沾實恵盖地租一項既不在官又不在民則不肖官吏轉得視為利藪該部請照原納租數徴収自為杜絶弊端所奏是但旗人原収租數或係市平市斛而官為収納勢必用庫平官斛則租數雖屬相符而貧民所加已屬不少嗣後入官地畆地方官照原數徴収著即照原収平斛令其輸納庻俾承佃各户交租不致畸重而官吏亦不致中飽矣二十七年六月奉上諭户部所有八旗存積地畆一項摺内酌議分設莊頭之處著照所請行但安設荘頭需地不過三四千頃所餘尚有一萬餘頃之多此等皆係老圈旗地且發帑贖回者十居七八原係應行入官地畆徒交地方官徴觧適滋胥吏侵肥旗與民兩無裨益着将此項交内務府派員經理徴収俟原帑按數歸清之後即将地畆賞給八旗作為恒産其将来如何酌定章程妥協辦理之處臨時著該部㑹同内務府八旗大臣悉心詳議具奏現在内務府查辦時并著八旗各𣲖幹員㑹同經理将来該員等亦俱熟練即可接手承辦矣欽定八旗通志卷六十四
