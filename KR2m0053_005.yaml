  text: 欽定四庫全書欽定八旗通志卷首之三天章三皇上御製詩一
  hash: sha256:0e037e2f9798deeecafdba8de1d1929fec9605395069fc1e25eb9dcbab2b62eb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0053_WYG_005-1a, image: WYG0664/WYG0664-0049a.png}
body:
  text: 大閲時狩由來武備修特臨南苑肅貔貅龍驤選将頗兼牧天駟掄材驥共騮組練光生殘雪映旌旗影動朔雲浮承平詎敢忘戎事經國應知有大猷大學士福敏久未入直為賦長句賜之為憶傳經開絳帳還教贊化入黄扉精神秋水原無滓氣象光風却久違武相只今勞杖履文丞應即整裳衣喜逢長至晴和候待步金門暖日暉四月九日為怡親王誕辰作此賜之朱邸恩暉永銀潢瑞靄浮舊勲存柱石遺緒屬弓裘詩禮崇芳範公誠勵逺猷喜逢添算日花滿鳳麟洲題唐岱山水幅天際新螺翠欲浮坐來九夏似深秋巖腰古寺開青障渡口欹橋鎖碧流清籟吟空金氣肅寒鴉歸樹暮烟收丹青妙處誇生動每對溪山一為留賜大學士鄂爾泰早年勲績振南蠻黄閣論思久任艱五載憂勤肩燮理兩朝寅亮首清班允期舟楫川同濟何啻門庭水一灣申甫蕃宣周碩輔敷予恵澤滿人寰賜大學士福敏元老由來衆所儀巖巖班列帝王師每當咨治披香日恰似談經絳帳時入贊經綸常補闕退朝劔佩自委蛇兒行學始循佔畢啟導重勞下講帷賜内大臣常明禁籞宣勞久恩隆志愈虚潔身正羣僕扈蹕典周廬每以嘉謨告因知丹悃攄清時無折檻不用叩階除賜和親王桐圭傳錫慶棣蕚喜連芳樂善輝編簡維城佐廟廊允堪稱玉葉不愧表銀潢嘉爾抒丹悃承恩並日長賜怡親王屏藩重寄賴宗臣夾輔宣猷翼紫宸盡職從知忠藎切好書猶見性情醇銀潢派裏圭璋器花蕚樓前雨露春善體貽謀湏黽勉永承惠澤篤親親賜大學士查郎阿玉陛資調燮西陲運計籌持鈞惟舊徳補衮著嘉猷可繼蕭曺業還同韓范儔江湖與廊廟莫釋一心憂賜工部尚書來保卿月光華燦廟廊分曺布理賴匡襄訓垂虞典天工亮職列周官地利詳誠慤允堪昭倡率訏謨時切贊平康老成自合叨榮澤常領清班鴛鷺行命婦索綽羅氏年一百三嵗矣其子孫皆多夀五世一堂信人瑞也萬夀節扶掖入見喜而有作淑範能修四徳賢飲和猶占萬民先百齡瑞慶傳都下五代孫曾繞膝前天上拜恩霑雨露人間不老即神仙更期夀世多黄耋共樂昇平大有年題唐岱倣各家山水畫册萬柳含烟宿雨朝煙二月時輕黄嫩緑一然絲却教少婦愁添乍無奈王孫歸意遲窣地欲迷芳草路因風時弄小腰支扁舟刺處春何許蘸影如油上下宜萬頃恩波浩𣺌含太虚一色琉璃影畫師創新格恩波圖萬頃故知寓意深筆諫吾湏領惟予牧萬民馭朽恒自警或理有壅蔽或政過寛猛或民怨飢寒或時有災眚慮澤不下逮中心常耿耿披圖鑑己切愈以發深省萬笏朝天逺山插笏曾無數黛色㕘天正近秋最愛茅菴坐清晝琤琮常聴瀑泉流萬松曡翠王䝉真蹟無半紙妙處何人得神髓尺圖重寫萬松真生面蒼蒼喻非指勁榦蟠拏偃盖髙虬龍深夜因風號緬想山中髙卧客柴扉静掩聴寒濤萬㸃青荷清和風景别桂棹漫開舩傍岸試新屐沿波曡小錢因風時泛泛映日故田田極目蒼茫外琉璃破曉煙萬林秋色黄葉紅葉綺錯山色樹色霜匀不必詩誇小杜恍疑人在三春萬壑祥雲萬壑祥雲滿千林瑞色籠可堪廊廟見只合畫圖中萬水朝宗君不見廬山瀑布三千尺萬古銀河倚天碧又不見龍門初闢神禹功九曲滔滔終向東是知觀乎海者難為水披圖更悟其中理琤琮萬派皆朝宗澗壑淵渟清且泚我獨悠然吟興豪㑹心在此原非此萬竿烟雨有猗者竹在彼渭川乃含宿雨乃帶朝煙其色維何非媸非妍其音維何非管非絃有客坐對羌民之先其屋何有四壁蕭然其手何持道徳一編逸民也歟吾何得而致焉萬峰瑞雪漫空飛玉屑插漢列瓊瑶寒澁溪流斷氷凌楓葉凋石磯閒釣艇古寺閉僧寮有鳥巢枯樹無人過小橋皚皚迷萬壑宻宻布三霄滕六分明在雲深不可招賜總河髙斌禹功萬古仰平成疏濬隨時賴俊英淮浦建牙資保障黄流奏績久澄清息機早是無穿鑿順性猶然矢樸誠潘靳嘉猷編簡在明潘季馴本朝靳輔皆能治河者千秋惟爾繼賢聲過水東邨怡賢親王塋有感而作一徳叨恩寵宗臣事業恢敬誠天語定明達性根來長想功垂册徒傾酒滿杯依遲傷物化况復謁陵迴賜尚書那蘇圖分署列西曹明刑重任操體予欽恤意嘉爾匪躬勞劔佩環宸極綱維領俊髦好生前訓在師法是皋陶吾弟和親王誕辰詩以夀之華蕚同枝氣本親鴒原分豈隔君臣顧予作后多乾惕知爾維城亦苦辛緬想飛觴桃李下已看流駛嵗時頻喜逢綵縷添長算立字毋忘望汝純弟亦三十嵗故云唐岱倣郭熙山水丹巒翠㟧萬重深古寺疎鐘度逺林最愛河陽瀟灑處濛濛雲氣濕衣襟聴唐侃彈琴蕭森梧竹含秋清銀猊吐篆縈風輕虚堂萬籟俱閴寂唐侃琴操鏘鏘鳴一彈再撫餘音杳松風水月襟懐𣺌孤鶴横空唳一聲緐絲弱竹喧羣鳥将軍塔爾岱久著勤勞養年私第今聞朕出口行圍不辭勞瘁而來詩以賜之百戰歸來矍鑠身凌烟姓氏竟誰倫養閒合適林中趣憐爾仍隨輦後塵赫奕虎符叨寵舊輝煌竹簡紀功新為詢閲厯疆場事㡬度聞之厪念頻賜總督髙斌之任淮揚底定早垂勲節鉞新開紫氣分自是經綸方藉展可知魚水正需殷人言久慶江南雨物望應歸冀北雲保障繭絲湏識取編氓一路頌聲聞相馬歌賜來保伯樂善相馬車下老驥出今豈無其人來保稱第一曩時有黄海國朝善相馬者親授相馬術謂不相其皮亦莫稱其力心端徳自優萬中無一失天閑雲錦羣一顧靡不悉為余辨驪黄六飛協安吉此術固云美相人亦可則况兹居八柱亮采汝所職勉此空冀心佐予敷九徳致仕禮部侍郎銜内務府總管丁皂保年九十矣朕每進宫必入朝請安矍鑠如昔詩以賜之舊日春卿貳清時萬石君目光猶奕奕𠂻赤尚勤勤樂易故應爾忠良衆所聞泰平無戰伐馬援漫從軍未解彭佺術曽將灌絳齊林泉應樂齒珂馬尚聞雞菊水無湏井丹霞自有梯所期職植衆難老摠眉梨大學士福敏七十夀辰詩以賜之前世文昌宿當朝王者師典型鵷鷺序標凖鳳凰池有問鳴鐘應方瞻霽月披耆年縁令徳初度值良時堂敞槐陰茂筵開日影遲春風坐綺席仙酒介厖眉允賴經綸手猶踈弟子儀夀身兼夀世長佐太平基唐岱谿山雪霽圖薫風釀暑吹楹欄黄沉緑浮堆氷盤揮扇那能却炎氣淋漓梅潤蒸齊紈忽展谿山雪霽圖文筵六月三冬寒玉屏瓊樹數千里中有村舍非人間凍峽掛珠流不得漁磯彷彿富春灘唐岱筆法老尤勁鼻祖摩詰追范寛試供病渴人清覽何須熱惱愁長安賜定邊左副将軍超勇親王額駙䇿楞舊日殊勲定月支維藩今復寄邊陲每因章奏知忠懇却為賢勞費解推土拓不誇戎馬績烽銷常慰廟堂思漢家定逺何湏道方識前猷萬載垂淮揚一帶連嵗被水黎民阽危用遣髙斌前往賑恤兼求疏濬之方瀕行詩以賜之負扆奉三無垂衣御四陲殷殷何所念所念惟蒼黎祈年厪宵旰惟願晴雨時安得海宇間比户足食衣百姓敦親睦農桑樂雍熙圓盖䕃仁恩邇來無征鼙若獲嵗屢豐教化或可期乃者淮揚郡澤國古若斯年來多水災黎民困阻饑旬宣勑大吏補救賴有司瘡痍尚未起賑恤宜早施蠲租並截漕疏流兼䕶隄凢百區畫方實藉衆力為吾恩汝其布吾民汝之兒何以瀹異漲化為秔稻畦何以拯蒼黔免彼溝壑危予憂爾其釋爾勞予應知免爾經綸策慰予饑溺思賜江南總督尹繼善之任淮沛今何似災餘不忍言邇來闕二鬴誰與辨三飱敢靳司農帑還祈大造恩當春應舉趾積潦尚留痕民瘼遐觀在心憂夢想存勉伊經畫䇿為我活黎元賜河南巡撫雅爾圖回任鳴珂辭魏闕迴轡指中州借爾丹誠罄俾予愷澤流農桑圖治本保障為民謀敷政何居要端惟不競絿春日同諴親王和親王逰宴御園作偶乘芳候遣㡬閒樂事天倫禮法刪春半園葩開笑靨雨餘山翠濯烟鬟風經錦埭香猶細鶴步蘭皋篆欲斑却喜緑塍千頃潤稍紓雲漢賦民艱雨歇芳林萬綺紛縁溪紅映碧波文欣浮桂舫同追景何異芸齋共樂羣百和濃香薰豔卉數峰輕縷帶歸雲今年膏澤叨靈貺敢懈祈年夙夜勤聴唐侃彈琴仙籟琴名平張梧几横澄心試聴指絃聲古風猶見巢兮燧哇律都刪琶與筝蟠葢㡬株吟韻謖垂虹百尺掛川晴愧予未解南薰愠領取春風和且平朱倫瀚指頭畫松隂横琴圖抱琴松下來獨坐聴流水聲不在絲桐却在心與指轇轕蒼龍枝清泉流其下無為調適人横琴一為寫康親王七旬夀辰詩以賜之佳辰欣降嶽伊古重維城寳籙緜遐算宗潢尚老成琱弧懸夏令夀酒介春觥難老期臣庶深情况父兄河間曾有獻柱下不徒彭帶礪河山永千秋與國榮題唐岱山水便面嘗聞名山有旦評可覽不如可逰妙可逰復不如可居繪林想亦同兹道唐岱筆法老尤健雲烟澹染秋山照縛茅蝸舍據佳勝寒江堪㺯嚴公釣峰容樹態總天真碧蘿蒼石歸詩料猶疑谷口籟作時翏翏于喁號萬竅是中應有肥遯人召以蒲輪頭屢掉豈似北山隐仕流移文徒惹稚圭誚工部侍郎徳齡有賢母詩以賜之治身勤四徳教子朂三遷樂易斯長夀令聞乃大年封坩曾著潔畫荻舊稱賢彤管芳規在千秋耀簡編題唐岱秋林讀易圖窓含平楚千章翠户對疎峰萬笏青風散日暄秋色好由來大地是羲經賜塔爾岱奔走戎臣職憐伊老更慇旌門仍扈蹕册府久書勲但識旗堪奪那知筆可耘成詩還譯告兩字表忠勤賜奉天将軍額洛圖留都開幕府撫鎮更旬宣古重維桑地今成秉禮㕓扈陪依豹尾晉謁領鵷聨大樹甘棠並芳聲莫讓前酹克勤郡王園寢開國承家日于藩夾輔資一時扶王業四海定丕基懿徳書金匱佳城奠玉巵銀潢天共逺百世篤宗支酹功臣額亦都墓坐享八紘泰寧忘百戰功佐周曾有望興漢不徒馮金簡香生緑椒漿玉瀉紅蓋臣陪祀事式紹乃家風開國佐運勲臣武勲王揚古里直義公費英東𢎞毅公額亦都墓在二陵之間松楸相望猶見當日君臣相得之概感而賦此虖池麥飯共艱辛想像當年魚水親何必大風思猛士林林扈蹕有宗臣題唐岱山莊春曉圖水淨碧溪天淨空逺峰濕翠尚濛濛柴扉不啟窓帷捲桃柳一川烟雨中大學士鄂爾泰去冬有手足不仁之症入春尚未痊可昨具疏乞休既不允其請詩以慰之黄閣絲綸寄明廷鵷鷺儀長期與夀國偶爾用求醫彌月心頻繫方春候漸宜股肱人有藉參术效偏遲玉蕋爭輝夜銀牋賡韻詩新春與大學士張廷玉及内廷翰林等小宴重華宫有聨句思賢輔之句當歡勞耿耿簮紱漫先辭命慎郡王寫盤山山色口占詩以贈吾叔詩才素所知於今學畫畫尤竒同來勝地寧無意為寫山容更詠之題慎郡王山水即用其韻好山欲斷雲與連見在天成古寺邊今日坐㕘相應處底湏蠟屐破蘿烟想是白蓮社裏迴裙腰緑潤步蒼苔柴扉半掩雙桐静畢竟應㕘孰去來臨故大學士鄂爾泰第酹酒青宫徳義傅黄閣股肱臣永頼調元化何期作古人百僚失矩範十載憶忠純適去空騎尾悲來底忌辰嘉猷人盡識昆命我湏遵雍正十三年學士配享太皇考遺詔以大廟朕弗敢忘國有旌賢典欽哉步後塵聴唐侃彈琴虚堂赤夏清風生炎官逺徙秋爽凝松濤竹籟禁不語惟有唐侃琴韻鏘鏘鳴愧我曾無撫琴指不解琴音㑹琴理宫商之外太古心成連伯牙乃所以題慎郡王水閣叢篁圖飛流界青山散作鳴琴澗虚軒架其上烟雲朝夕變洞口鎖箖箊案頭陳筆研擕客䇿短笻指㸃喬松畔縱賞固已佳忘言良復善題唐岱倣王䝉山水圖形似休論刻楮工誰能牛目辨顛翁臨平秋色知何許王䝉粉本蓋圖臨平秋色也只在楓丹荔白中賜直隸總督那蘇圖滹水松山六御臨觀豐稍覺慰予心王畿千里民惟止保障一方汝尚欽要識天庥承處幸應湏農事静中尋連塍二麥芃芃緑漫使馳驅恣羽林五弟稽古齋全集刻成進覽即事書懐華編成秩秩謙度出遲遲余與弟皆以雍正八年薈萃所為詩文定稿而樂善堂全集刻於乾隆丙辰弟至今嵗始刻全集即此謙沖朕實愧賞弗置稽古得精粹由中不蔓枝清辭淡以逺豪筆爽而竒恍憶晴窻永塤箎唱和時集中諸作舊時日課同題者居大半善琴者唐侃村居西山下是日過其廬因題百戰歸來志未磨唐侃旗人也隨大將軍費揚古出征昭木多頗有功在軍中猶以琴自隨至雍正年間始賜副都統銜予告家居郤耽小隠意如何臨泉興寄猗蘭操築室情同安樂窩幽賞漫隨孤鶴去劇談常喜野人過一揮應令四山響覿面真師黈益多香山聴唐侃彈琴聴琴盖如對髙士必有其地與其時金風玉露新秋序時七月朔日谷深林静香山陲我知妙處不能寫其能寫者舍侃誰村居隔五里以近抱琴而來何不宜為我作髙山噫吁嘻巍乎髙哉􅋂且﨑為我作流水徒觀其状也則湯湯蕩蕩𣺌復瀰忽然觸景貌秋鴻是日彈此三曲遵渚遵陸羽可用為儀平生不識宫與角其理或可推而知弭節沉吟以搆思乃如絳州才子覆被無語尋新詩鏗然奮發千鈞弩又如重瞳喑嗚叱咤千軍之中能搴上将旗神來候也非人力我欲贊之乃不得其辭幼讀孔子書記其說闗雎曰樂而不淫哀而不傷善琴者當有㑹於斯是為太始正音堪味道世間筝琵笛筑徒爾為題慎郡王山水小景十二幅梅溪幽夢到羅浮春風入蓓蕾虚舟本無繫泛此香雪海桃塢白屋㡬家靜紺霞萬樹春不教花逐水恐引問津人春泛前溪新水生後溪烟柳横來往東風裏心隨一葉輕觀瀑飛流落危峽凭欄俯平楚天地不藏機色聲無著處雲嵐千章樹影濛萬曡山容活妙領米南宫此間得衣鉢賞荷朗開徵士牖閒對君子花霞標徼瑞露鏡裏吐天葩山寺棒喝臨濟宗幽寂雲門寺青鞵布韈來知復誰家子梧月古月不速客髙梧有脚秋鶴夢清宵冷幽人正倚樓霜鴻攜得塞垣霜書空三兩行蘆花眠不穏却為憶衡陽紅葉錦樹經秋絢如燃不著枝相對停車客司勲字牧之雲棧劔闗天外矗磴棧雲中繞誰復嗣青蓮抽毫吟蜀道雪溪天沉玉峰外蘆重凍溪邊破冷方蘭棹惟應訪戴船賜尹繼善回江南總督任熙績匪獨能亮工資羣彦詞林擅卓犖封疆推老練簡畀淮海區奏成佇底奠保障財賦地繭絲非所羡去嵗吳淞災波臣勢方扇每念幸活民玉食不能嚥賑濟救燃眉其何籌久宴安民首察吏癉惡亦彰善設誠物乃孚逞明終必眩安㣲巡撫納敏陛見入京兹以東巡扈駕便道遣赴𤾂任并賜以詩屬車扈從轡如琴敬慎還同在羽林賡和底多誇藻采納敏頗能詩是行凡令隨駕諸臣賡和之作彼亦和之要湏識我愛民心賜傅恒經畧金川壮齡承廟畧一矢靖天狼畨部蕞爾蠢王師武必揚慰予西顧久嘉汝赤心良撻伐敉么㓂撫循集衆長斯能成偉績用榦不庭方佇看銷兵氣敷天日月光孟冬上旬於瀛臺賜經畧大學士傅恒及命往蜀西諸将士食并成是什大清聲教暨遐陬豈有来王稽蜀酋黷武開邊非我志安良禁暴藉卿謀行軍吉值初陽復賜食恩同湛露流轉瞬明年擒娑虜還教凱宴侑封侯南苑行宫晚坐憶經畧大學士傅恒依然庭宇静朅爾研甌閒一室澄心處兩年睫眼間南苑未至盖二年矣衝寒懐碩輔此際厯重闗所願明天討成功指日還經畧大學士傅恒舟渡蜀江賦詩呈覽用其韻荅之若濟常殷擬巨川平羌今復率師前行旌冬發真勤瘁露布春傳此佇延遥度應臨滴博壘底教稍遲去聲蜀江船四川驛站所辦不協故稍遲行程數千里外寧暌隔心在丹楓玉馬邊大學士傅恒經畧西川效忠宣力誅渠魁破堅壘申明紀律大振軍威畨酋窮蹙乞命經畧大學士鋭意蕩平未允其請朕宏解網之仁下詔班師召大學士還朝襄贊勞績茂著詩以賜之安邊底績本丹忠請命畨酋勢已窮上将有心期利執大君無物不包䝉那湏一月聞三捷早覺千忻達兩宫晉國勤勞予厪念速歸黄閣贊元功敺鳥何庸盡覆巢好生天地徳含包歌成宵雅八章句蓍得同人九四爻兵洗蓬婆春淡蕩首稽玁狁面顤䫜蜀民安撫勤籌畫心契元良泰陛交經畧大學士忠勇公傅恒率師進𠞰畨酋忠誠奮發志期殄冦執奏再三朕揆勢度理以允降班師休兵息民為經國逺計彼匈奴未滅何以家為者乃票姚貮師輩武人銳往立功之槩大學士輔弼元臣抒誠贊化名耀旂常正不必與兜鍪閫帥爭汗馬一日之績詩以示之三面姑開格蜀夷來調說鼎佇期之集思廣益卿誠踐勤逺勞民我不為武豈佳兵應戒彼績惟和衆孰同斯功成萬骨枯何益壮志無湏效貮師經畧大學士忠勇公傅恒賜第在東安門内迤北朕命将作為之經理今奏凱還朝適屆落成為紀一律賜之票姚賜第落成新歌凱歸來得意春上将鷹揚今奏績諸軍鳬藻久懐仁攸芋君子熊羆夢畢駭酋涂匍匐臣從此坐調熙世鼎敷予教澤萬方均二月十四日經畧大學士忠勇公傅恒奏報金川畨酋莎羅奔狼卡擕其徒醜相率隨提督岳鍾琪以二月初五日親詣軍門築壇納欵匍匐稽顙永矢歸誠經畧大學士升帳受降開誠撫諭逺近畨漢官兵觀者數萬衆靡不歡呼忭舞膚功克奏邊境敉寧露布驛聞喜而有作止戈為武信其然我澤如春經畧宣共喜㨗音來玉闕何殊俘虜自金川畨酋路左心傾服軍士行間氣倍鮮單騎汾陽休比擬都因忠赤格穹天經畧大學士忠勇公傅恒奏凱金川率領諸将士還朝錫宴豐澤園用昭飲至之典即席得長律一首卡撒功成振旅歸昇平凱宴麗晴暉兩階干羽欽虞典六律宫商奏采薇湛露應教頒幕殿甘膏更慶遍春畿持盈保泰咨同徳偃武脩文凜勅幾香山聼唐侃弹琴經年唐侃琴音寂好是山深過雨初欲借散懷先屬付撫絃切莫奏闗雎二十一叔慎郡王生辰詩以夀之聖祖含飴恩並天追隨與叔正齊肩詠歌尚憶相酬日向在書窻與叔和韻之作獨多彼此同交不惑年叔今年亦四十好學好文光譜牒為屏為翰效英賢三陽發嵗韶華富介夀還欣福似川大學士來保七十夀為是歌以賜之七十古稀亦常有綸閣中人不多覯叶居然台衮臻黄耉平生誠謹獲福厚金門朝夕宣勤久鮐背精神尚抖擻漢萬石君今其友作歌春酒為卿夀詞取易達卿祗受勉力贊襄予左右固倫額駙超勇親王䇿楞夀終詩以惜之有序額駙在皇祖時以名藩選尚公主宣力邊陲茂著勞績皇考授為定邊左副将軍晉爵親王額爾徳尼招之役血戰先登萬衆披靡狡冦為之歛跡朕眷待優隆額駙彌篤忠藎始終一節允惟懿戚中傑出之良為王國屏翰於其薨也錫之優䘏且命配享太廟崇祀賢良祠以報殊勲俾衆䝉古知勸復成長律用誌悼懷丁年尚主令名聞絶塞宣猷建偉勲不必讀書知大義每於臨陣冠三軍老成凋謝予憂爾要寄疇咨子克云命世子成衮札布嗣為札薩克盟長将來亦克勝定邊左副将軍之任云重惜賢藩教侑廟報功兼以勸忠勤往清河奠超勇襄親王固倫額駙策楞靈輿肅肅駐河濆歸殯佳城别塞雲即此始終懷大義額駙在日曾奏聞今其皇考願於身歿後仍歸京師㕣𦵏大長公主園寝子奏請朕既允奏并命一切喪儀皆如宗室親王之例官為經理云果然卓犖軼前聞中年自是傷哀樂此日何堪哭戚勲見說漠陲将發引猶教血淚灑三軍賜健鋭雲梯營軍士食即席得句有序朕於實勝寺旁造室廬以居雲梯軍士命之曰健鋭雲梯營室成居定兹臨香山之便因賜以食是營皆去嵗金川成功之旅適金川降虜及臨陣俘畨習工築者數人令附居營側是日并列衆末俾預惠焉猶憶前冬月雲梯始習諸戊辰冬月有香山閲雲梯兵之作功成事師古戈止衆寧居實勝招提側華筵快霽初餕餘何必惜可以逮豚魚夀五弟和親王四十夀辰灰飛緹室應書雲遐算添同刺繡紋邸第良辰欣有慶天倫至樂貴無文樽持北斗傾紅友詩擬東坡夀夘君從此毎逢開袠嵗棣華歌繼九如聞示山東巡撫準泰山左前巡憶洊饑吾民疾苦日思之三年休息今何若莫飾虚觀進頌詞賜河東總河顧琮堤遥工簡息洪濤無事常經智不勞泉閘湖垸善瀦洩永期轉漕濟千艘賜兩江總督黄廷桂迎鑾衛警蹕建節久旬宣體我勤民徳嘉卿率屬賢何須張錦帳惟喜閲鱗田細騐剛柔俗周諮豐歉年咸中方有慶虚已自無偏此地人文盛還淳尚勉旃閲河示總督髙斌澤國民生庶金隄祖制垂來巡期善守底績貴無為持正裁浮議開誠集衆思問予何訓示志在五言詩賜浙閩總督喀爾吉善巡呉於越便中過恐悞農桑候正和完賦自縁民俗美不須重勉善催科今年南巡元江南積逋二百餘萬而浙省向無逋欠特加恩蠲免本年正賦三十萬兩以示奨勵閲杭州旗兵承平世恐軍容弛文物邦應武備明已向㑹稽陟禹蹟便教浙水詰戎兵羽林舊将今誰是州閲皇祖駐蹕杭武詩有羽林舊将分防重之句七萃材官古莫衡四十年重逢盛典行間踴躍倍常情雙忠祠有序乾隆十五年駐藏都統傅清左都御史拉布敦誅叛臣朱爾墨特那木札爾其黨羅藏札什率兵助逆二臣死焉贈以伯爵優䘏而歸其喪於京師親臨奠醊建專祠祀之命曰雙忠並紀以詩衛藏西南夷極邊入我王化百餘年始猶羈縻後執賮置兵為守防呼韓雍正年間始命大臣駐彼率緑旗兵防守凖噶爾䝉古習俗尚黄教得失視此為轉旋其何小醜背厚澤夜郎自大輕王臣託詞承平勞物力示之大信休兵屯戕兄虐下遂無忌更與外賊為牽援血人於牙攫財賄中梗驛路軍書傳朱爾墨特那木札爾乃頗羅奈之子朕以其父勤勞頗能安輯疆土封為郡王後頗羅奈故伊襲其父王爵即詭詞請撤駐藏官兵因念彼既以撤兵為請即不從適足以致其疑故如其請自此肆無顧忌戕其兄弟姪荼毒所部遣使通凖夷求援旋㫁絶郵置軍書不達者旬日二臣覘其逆謀已露遂决計先事誅之惟時奉命監彼土曰傅清暨拉布敦目覩逆勢日猖獗炎炎不息將燎原戰守不可兵力弱官軍萬里阻蜀門國事為重餘度外二人同心利斷金叶知無一生有九死但期濟事酬深恩朱爾墨特那木札汝來示汝大義存天無二日爾二日爾忘爾父叨藩翰兇渠稔祻力已張去聲藐視二人何有焉籠中之鳥砧上魚西藏指日據有全挺身來見忽疑慮潛呼羣醜施戈鋋傅卿直前扼其臂逆王命者誅無延拉卿㧞刀剚其脰罪在魁首無牽連羅藏札什其羽翼走險呌詉豕突然桀犬吠堯各為主蜂屯蟻聚來獽狿吁噫二臣力不逮如歸視死雙軀捐小醜烏合旋就縛駢首就戮長竿懸逆誅順撫妖氛靖衛藏萬衆如一言忠臣報主有如此智勇兼濟誠通天昔每椎心今吐氣如披雲霧瞻蒼旻不勞一旅翦渠冦豈止萬命免沉淪尸祝社祭衆夙志䖍伸絶域千秋傳靈輿肅肅歸故里建祠臨奠恩頻宣錫爵賜封延後世志予哀悼旌勲賢雙忠之氣浩千古雙忠之力敵萬軍駡賊有似奮常山誘致大異斬樓蘭雙忠蹟畧傳斯篇他年以待信史編大學士髙斌七十夀辰詩以賜之早㕘黄閣侍金鑾晚覺扶鳩步履難卧理藉卿為保障成功告我永安瀾讀書未懈平生志益夀何須九轉丹黄髪皤皤在朝衆勤勞軫念久河干夀原任大學士龍翰傅先生八十初度光霽由來衆式觀絳帷黄閣領儒冠身名應擬濟南伏年徳原同沛下桓松鶴作朋還侑酒孫曾繞膝合加餐還丹益算何須藉兩字𫝊經永不刋賜盛京将軍阿蘭泰出寄干城入侍宸阿蘭泰在御前侍衛裡行據鞍矍鑠尚精神東都留守分眀是應令耆英㑹裏人阿蘭泰年六十餘而鬚鬢皆白故戲及之賜吉林将軍傅森數處開牙盡有名大東坐鎮翼陪京將軍底事無勲勣累洽重熙值太平過功臣費英東揚古里等墓題句誌感槗山柏里欝相望開國同心想杜房一二藎臣兹扈蹕逸勤胥及爾寧忘躬臨酹酒當年事癸亥初至盛京凡功臣墓皆親臨賜奠遣奠依然表舊勞兹以重來各遣大臣致酹動我愴然翹望處山陵氣接朔雲髙賜河東河道總督兼署山東巡撫白鍾山治河以衛民表裏本相因況萃一身鉅其厪萬姓辛寧當營供奉匪為事遊巡立位官須業名言昔可循雙烈詩雙烈詩者例雙忠詩而作也昔駐藏都統傅清左都御史拉布敦誅叛臣朱爾墨特納木札爾以人少力㣲二臣死事然究能鋤元兇而安絶域故臨奠建祠並有雙忠之詩以揚其勲去嵗命定北将軍班第議政大臣鄂容安駐伊犁時二臣既奏阿睦爾撒納有反志朕命便宜從事庶幾消患未然乃二臣觀望疑慮以致兎脱而賊黨反得結連赴約襲我軍營二臣力不能敵捐軀沙塲猶之死王事也一以勇决建績一以徘徊僨事然而臨難致命奮不顧身有足哀者今大兵既靖伊犁逆賊窮蹙逃竄不日獻俘二臣靈轝至京之日朕亦親臨醊奠並成是作雙烈云者盖不如雙忠之盡善矣昔有傅介子手斬樓蘭頭通權建殊績芳名播千秋況乎統三軍既悉彼逆酋一武夫之力何事仍夷猶逡巡大軍徹偏師五百留彼梟有密約入覲中逗遛八月廿五日三處共一謀阿睦爾撒納來阿爾台陬将合其部衆挈妻孥以逃叶是則預有㫖其妻孥盡收厥阿巴噶斯斷我軍書郵克什木巴朗伊犁逞刼偷兩路如期發猖狂肆呌詉叶蜂屯更蟻雜不可爬與梳叶二臣知不敵全軍将内投而彼截歸路加以聚蚍蜉巴朗諜致辭權假為我逑徐當備馬駞送之返皇州二臣怒唾罵天朝無此媮効死視如歸背義生肯求奮旅更前進氣髪衝兠鍪終知事不濟畢命飲屬鏤叶問罪重整師豈辭雪載途叶阿睦爾撒納叛後向謂事難成者皆以為不出所料伊犁卒不能平朕料叛賊隂險多詐其得在此其失亦在此伊犁之衆不過一時附和終不能人盡從彼若少延緩則叛賊又将别生變詐反失事機因正永常恇怯退師之罰急趣西路軍帥尅期進勦旋於今春直達伊犁逆賊失據奔竄旋復定伊犁脅從寛厥尤一二助惡者謂阿巴噶斯克什木之流繫虜皆䖍劉渠魁竄異域玉師奮遐搜亦聞哈薩克縛獻深同讐命求二臣骨靈輿返首邱臨奠例雙忠惜哉涙湧流初若聼我言寧有今日不忠於國有濟烈為已不渝叶究匪貪生比使我悲心悠朱門歌舞輩青史文章儔我豈為彼哉長歌旌乃休舒布圖鎧巴圖魯竒徹布歌千人萬人敵昔有亦惟能将資衆力一人奮勇敵二千昔未前聞今始岀其人曰惟竒徹布向為侍衛備宿直叶去嵗從軍監包沁包沁之人乃通賊厄魯特呼礮為包包沁其司礮人也上年正月其宰桑阿克諸爾率衆二千餘人來附逆賊阿睦爾撒納之亂包沁煽動闌出卡倫為官軍所殱來圍其帳欲肆害竒徹布曾無懼色徐腰櫜鞬手弓箭出帳跨馬聲霹靂蟻聚呌讙羣近前應弦覆倒賊辟易辟易復前恃其衆長槍火銃競相逼竒徹布且戰且走得一栁林為障翼賊人圍之凡數重恐自傷無施銃隙持槍人亦弗敢進進被箭死屍横骼二千人各二千心一人氣奪二千魄侵尋天暮衆西奔竒徹布歸奏殊績賜金賜爵酬勤勞復請從師肯宴息舒布圖鎧巴圖魯神勇之名汝應得荆軻孟賁匹夫豪日月爝火光應息我歌嘉爾豈徒然朂我八旗永為式三巴圖魯歌巴圖魯者勇冠軍昔我旗人頗恒有近世以來殊不聞盖因太平日已乆嵗寒松柏見後凋當春何以殊榆栁邇者西鄙屬用軍折衝咸欲効奔走舒布圖鎧已超羣三巴圖魯亦赳赳其一額納伸去嵗伊犁從将軍将軍使彼詢事因單騎逕入衆賊羣左支右屈箭斃數人知事不濟㧞刀自刎期報君其一巴寧阿讀作麻韻倉卒亂時将軍前後䕶衛相蔽遮發無不中中無不死殺人如麻将軍遣之出巴寧阿曰朝廷命官偷生安往耶力敵視将軍盡節然後伏劍義烈真堪嘉二人既死還復甦宰桑巴磉得之壮其志養之數月我師再入方得歸軍牙其一曰富錫爾将軍命之携印以出歸帝里其奈賊人擁蜂更屯蟻料不能出将印沉之水力戰受創命垂盡伊犁喇嘛救之得不死故賜額納伸曰卓禮克圖巴圖魯卓禮克圖者節義卓爾永不渝賜巴寧阿曰昆都爾巴圖魯昆都爾者力敵萬人暇有餘賜富錫爾曰哈布台巴圖魯哈布台者穿楊貫石技不殊迴思去嵗迅功成亡矢遺鏃夫何曾不期小醜逆志萌未能除蔓我二卿乃致沙塲雙捐生亦我坐謀遥未精嘉我旗人多忠誠舊風未逺垂儀型愉以為戚留定評乃至西海揚芳聲原大學士傅龍翰先生輓詩拖紳避省視前冬先生抱恙時朕親臨視比于病中恐朕軫念戒家人勿以聞及聞喪往哭尚未大歛易簀慎初終自昔賜場歎從今融帳空儀型失老宿啟迪憶童䝉未及詢楹奠於斯恨莫窮賜山東巡撫鶴年粤海旬宣久青齊治平聲撫掄嘉伊品犖犖為我牧元元坐鎮青油幕扈隨紫氣軒驅馳何足貴善政勉徐源賜河南巡撫圖爾炳阿連疆迎蹕路重穡問農田所幸嵗非歉還欣雪被駢安民惟擇吏樂後每憂先中土風猶樸斯宜正直宣賜江南總督尹繼善幕府山邊開幕府風規得似茂宏無保釐務佈兆民福清蹕寧求一已娯静柝久曾厯數省建牙今復鎮全呉吏民相習休云易朂爾思艱莫漫圖賜總河白鍾山司河稱最久自是悉防修慎莫幸無事勉惟建逺謀況經益新淤上年河决孫家集致荆山橋淤淺上游積水入春未涸恐妨耕作亟命疏導此實厪深憂朂爾平成績紓予宵旰籌賜蘇州巡撫愛必達青齊障宿保呉下節新移民隠芻蕘達官方砥礪期允當知有要寧止貴無私此地灾傷後惠鮮莫漫遲賜閩浙總督喀爾吉善海疆澤國久聲騰坐鎮宣風嘉汝能連率威儀今陶侃一家父子昔韓宏喀爾吉善之子定長為貴州巡撫行春惠化吾方攬作雨平章民久稱供頓何須事華飾山川韶秀此邦勝賜浙江巡撫楊廷璋監司經久任自是悉民情要以能倡率寧惟貴潔清艱難九年蓄生聚五方盈饑溺吾心切勤哉撫恤誠賜貴州巡撫定長迎鑾當入覲述職並寧親此意原嘉爾定長奏請入覲適當南巡欲因迎鑾便中省其父喀爾吉善故許其來也推恩詎一人京中諸臣隨來者給假省親省墓者多亦不止定長一人也西南門户固禮樂獞苗新撫逺惟安靜庶因福及民欽定八旗通志卷首之三
