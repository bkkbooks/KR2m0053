body:
  text: 欽定四庫全書欽定八旗通志卷三十旗分志三十八旗方位圖説八旗方位緣起八旗地界圖八旗方位總圖附八旗聚集之處出城禁令八旗方位緣起太祖高皇帝創設八旗分為兩翼左翼則鑲黃正白鑲白正藍右翼則正黃正紅鑲紅鑲藍其次序皆自北而南以五行相勝為用兩黃旗位正北取土勝水兩白旗位正東取金勝木兩紅旗位正西取火勝金兩藍旗位正南取水勝火謹按天地之道不過隂陽之消息隂陽之化不過五行之生剋明王奉若天道莫或越也五運之説起於纎緯相生相剋遂無定説至於行師戡亂則斷斷以相勝為義凡九宫六壬遁甲演禽之法事關軍旅無不以相制為用者風后握機諸葛聚石不能外是理也顧禨祥小數類不足憑惟聖人與天地合德於造化之本原不待推求自然暗合故創制之初於兩翼寓二氣之循生於八旗寓五行之制化睿謙廣運垂裕無疆厥後宅中定鼎卜祚萬年辨方正位仍謹遵開國之規制良有以也謹恭録舊制冠諸京師八旗方位之首見作述之克承與覲揚之有自焉世祖章皇帝定鼎燕京分列八旗拱衛皇居鑲黃居安定門內正黃居德勝門內並在北方正白居東直門內鑲白居朝陽門內並在東方正紅居西直門內鑲紅居阜城門內並在西方正藍居崇文門內鑲藍居宣武門內並在南方一從祖制以八旗分左右二翼亦凖前規謹案八旗次序以上三旗居前至方位則以左右翼為次序因乎地也謹附識於此鑲黃滿洲蒙古漢軍三旗各按參領自鼓樓向東至新橋自新橋大街北口城根向南至府學胡同東口係與正白旗接界滿洲官兵自鼓樓向東循大街至經厰為頭𠫭領之十八佐領居址自經厰循交道口轉南至棉花胡同東口為二參領之十七佐領居址自南鑼鼓巷北口至南口南鑼鼓巷兩邊之鼓樓院方磚厰真武廟魚兒胡同福祥寺帽兒胡同炒豆胡同棉花胡同兵馬司前圓恩寺後圓恩寺局兒胡同為三參領之十八佐領居址自交道口大街向東循新橋轉南至香兒胡同東口為四參領之十八佐領居址自香兒胡同東口向南至府學胡同馬將軍胡同大興縣騷達子胡同土兒胡同香兒胡同錢局周圍為五參領之十七佐領居址蒙古官兵自交道口大街向北至安定門為右參領之十四佐領居址自北鑼鼓巷南口至北口北鑼鼓巷兩邊所有之倒抄胡同經厰分司廳謝家胡同伽藍殿法通寺淨土寺豆腐池兒胡同高古菴郎家胡同碾兒胡同為左𠫭領之十四佐領居址漢軍官兵自新橋大街向北至方家胡同為頭參領之九佐領居址自方家胡同向北至城根為二參領之九佐領居址國子監前後頭條胡同二條胡同三條胡同方家胡同國子監大溝巷蕭家胡同此七胡同為三參領之八佐領居址柏林寺前所有之鼓哨胡同草厰王大人胡同柏林寺此四胡同為四參領之八佐領居址自北小街南口至城根胡椒圈之周圍手帕胡同羊館胡同針線胡同寬街此四胡同為五參領之八佐領居址正白滿洲蒙古漢軍三旗與鑲黃旗接界之處係自府學胡同東口向南各按參領至四牌樓豹房胡同東口與鑲白旗接界之處由皇城根至東大城根滿洲官兵自鑲黃旗接界處之棉花胡同東口循大街向南至大佛寺西北角為頭參領之十八佐領居址自大佛寺西北角向南至豹房胡同西口為二參領之十七佐領居址皇城東邊所有之寬街草厰胡同取燈胡同晾榖厰弓弦胡同雙塔胡同此六胡同為三參領之十七佐領居址兩大街所有之鐵獅子胡同賈家胡同汪芝麻胡同魏家胡同十景花園馬大人胡同墻兒胡同大佛寺胡同羊尾巴胡同山老兒胡同喇嘛營此十一胡同為四參領之十七佐領居址自馬市口向東至四牌樓隆福寺周圍所有之細小胡同為五參領之十七佐領居址蒙古官兵自府學胡同東口循大街至五條胡同為右參領之十五佐領居址自五條胡同至四牌樓為左參領之十四佐領居址漢軍官兵自新橋大街至東直門為頭參領之八佐領居址北新倉海運倉興平倉南新倉舊泰倉富新倉此六倉門相近為二參領之八佐領居址自東直門南小街北口宋姑娘胡同口袋胡同慧照寺王家胡同船板胡同板橋胡同此六胡同為三參領之八佐領居址北新橋大街六條胡同七條胡同八條胡同九條胡同十條胡同此五胡同為四參領之八佐領居址北小街頭條胡同二條胡同三條胡同四條胡同五條胡同此五胡同為五參領之八佐領居址鑲白滿洲蒙古漢軍三旗與正白旗接界之處係自豹房胡同向南至單牌樓與正藍旗接界之處由皇城根向東至大城根滿洲官兵自正白旗接界處由東長胡同東口循大街向南至院府胡同東口為頭參領之十六佐領居址自院府胡同東口至長安街牌樓為二參領之十七佐領居址東安大街兩邊所有之翠花胡同東長胡同奶子府胡同燒酒胡同錫爉胡同菜厰胡同院府胡同梯子胡同口袋胡同理藩院後胡同此十胡同為三參領之十七佐領居址自長安街牌樓向東至單牌樓為四參領之十七佐領居址自燈市口大街西口至東四牌樓大街向南兩大街之間所有之椿樹胡同乾魚胡同西堂子胡同金銀胡同煤炸胡同帥府胡同頭條胡同二條胡同此八胡同為五參領之十七佐領居址蒙古官兵自四牌樓向東循大街至堂子胡同為右參領之十二佐領居址自堂子胡同向南至單牌樓為左參領之十二佐領居址漢軍官兵自四牌樓向東至小街為頭參領之六佐領居址自小街至朝陽門為二參領之六佐領居址祿米倉周圍之啞巴胡同方家胡同為三參領之六佐領居址小街子史家胡同乾麵胡同小啞巴胡同此四胡同為四參領之六佐領居址羊尾巴胡同堂子胡同史大人胡同羊乙賓胡同總把胡同此五胡同為五參領之六佐領居址正藍滿洲蒙古漢軍三旗與鑲白旗接界之處係自單牌樓至崇文門由金水橋向東至大城根滿洲官兵自鑲白旗接界處由長安街牌樓向西進東長安門至金水橋為頭參領之十六佐領居址自新街口南口至北口為二參領之十七佐領居址自宗人府向南户部周圍至中御河橋為三參領之十七佐領居址自中御河橋至洪厰胡同北口為四參領之十七佐領居址自洪厰胡同口向北至長安街牌樓為五參領之十七佐領居址蒙古官兵自單牌樓至崇文門為右參領之十五佐領居址自江米巷東口至洪厰胡同為左參領之十五佐領居址漢軍官兵自單牌樓觀音寺胡同向東至舉場西門為頭參領之六佐領居址自羊肉胡同西口向東至水磨胡同為二參領之六佐領居址自表背胡同西口至東口為三參領之六佐領居址自蘇州胡同西口向東至馬皮厰北口為四參領之六佐領居址自船板胡同西口向東至馬皮厰南口為五參領之六佐領居址正黃滿洲蒙古漢軍三旗自鼓樓向西至新街口大街北口城根向南至馬狀元胡同西口與正紅旗接界滿洲官兵自鼓樓大街向西北藥王廟南口至大城根為頭參領之十九佐領居址自北藥王廟街南口向西循大街至八調灣南口為二參領之十八佐領居址自八調灣南口循大街至德勝門轉南至德勝橋為三參領之十九佐領居址自鼓樓斜街循銀錠橋向西李廣橋至德勝橋大街為四參領之十八佐領居址自松樹街北口至南藥王廟為五參領之十八佐領居址蒙古官兵自松樹街南口向西至德勝橋轉北至宏善寺胡同西口為右參領之十二佐領居址自宏善寺胡同西口至德勝橋為左參領之十二佐領居址漢軍官兵自護國寺街至棉花胡同南口羅圈胡同西口為頭參領之八佐領居址自西口連棉花胡同廊房胡同草厰胡同為二參領之八佐領居址自蔣家房東口至西口為三參領之八佐領居址自新街口向北至四條胡同東口為四參領之八佐領居址自四條胡同東口至城根及銅井為五參領之八佐領居址正紅滿洲蒙古漢軍三旗與正黃旗接界之處係自馬狀元胡同東口與鑲紅旗接界之處由皇城根向西至大城根滿洲官兵自西直門大街曹公觀之東至新街口轉南至石老娘胡同東口為頭參領之十五佐領居址自石老娘胡同東口向南至四牌樓轉東至馬市東口為二參領之十四佐領居址皇城兩邊所有之馬狀元胡同太平倉胡同毛家灣胡同紅羅厰胡同拐棒胡同此五胡同為三參領之十五佐領居址自四牌樓大街西邊所有之驢肉胡同帥府胡同報子胡同臭皮胡同石老娘胡同此五胡同為四參領之十五佐領居址四牌樓大街西邊所有之衛衣胡同太平侯胡同五王侯胡同車兒胡同石碑胡同寶禪寺帽兒胡同宫衣庫胡同此八胡同為五參領之十五佐領居址蒙古官兵自西直門大街南邊所有之草厰胡同柳巷胡同觀音寺胡同陳線胡同大覺寺胡同此五胡同為右參領之十一佐領居址自大覺寺胡同向南堅厰翊教寺祖家街柵欄胡同東觀音寺胡同椿樹胡同苦水井此七胡同為左參領之十一佐領居址漢軍官兵自阜城門循大街至宫門口為頭參領之六佐領居址自宫門口向東至馬石橋為二參領之六佐領居址馬石橋北邊所有之蘇羅卜胡同回子營為三參領之六佐領居址自回子營向北至茶葉胡同翠花街為四參領之五佐領居址自宫門口向北至葡萄園東口為五參領之五佐領居址鑲紅滿洲蒙古漢軍三旗與正紅旗接界之處係自羊肉胡同向南至單牌樓與鑲藍旗接界之處由皇城根向西至大城根滿洲官兵自與正紅旗接界處之四牌樓大街向南至單牌樓轉東至長安街牌樓為頭參領之十八佐領居址西安門大街南邊所有之板場胡同廊房胡同醬房胡同小醬房胡同東斜街細米胡同此六胡同為二參領之十七佐領居址自細米胡同向南饊子胡同狗尾巴胡同背隂胡同太僕寺街李閣老胡同此五胡同為三參領之十七佐領居址自李閣老胡同向南東夾道東嶽廟岱北寺小東嶽廟演象所官磨房此六胡同為四參領之十八佐領居址饊子胡同向南堂子胡同石虎胡同蜈蚣衛胡同油房胡同茶葉胡同西夾道正溝胡同此七胡同為五參領之十七佐領居址蒙古官兵以四牌樓大街西邊所有之粉子胡同後泥窪十八半截豐盛胡同此四胡同為右參領之十一佐領居址自豐盛胡同向北之兵馬司胡同燕兒胡同磚塔胡同羊肉胡同此四胡同為左參領之十一佐領居址漢軍官兵以四牌樓大街西邊所有之白廟胡同半璧街此二胡同為頭參領之六佐領居址自白廟胡同向北車子胡同魚錢胡同沈箆子胡同千張胡同此四胡同為二參領之六佐領居址自千張胡同南打磨厰半圈高井口袋胡同此四胡同為三參領之四佐領居址自口袋胡同向南施飯寺皮褲子胡同東夾道胡同此三胡同為四參領之六佐領居址自東夾道胡同向南白廟胡同刑部街此二胡同為五參領之四佐領居址鑲藍滿洲蒙古漢軍三旗與鑲紅旗接界之處係自單牌樓至宣武門金水橋向西至大城根滿洲官兵自與鑲紅旗接界處之長安街牌樓向東進西長安門至金水橋為頭參領之十八佐領居址自江米巷向北至長安門大街中府左府四眼井周圍為二參領之十八佐領居址自河漕沿向東至石碑胡同文昌閣拴馬莊馬神廟胡同此四胡同為三參領之十八佐領居址自獅子口向東由皮市南口轉北至掃帚胡同西口為四參領之十八佐領居址自西單牌樓向南由絨線胡同轉東至河漕沿六部口抽屜胡同關帝廟胡同牛肉灣此六胡同為五參領之十七佐領居址蒙古官兵自宣武門至絨線胡同西口油房胡同南拴馬莊翠花胡同棗樹街此四胡同為右參領之十三佐領居址中街半璧街前細瓦厰新簾子胡同舊簾子胡同此五胡同為左參領之十二佐領居址漢軍官兵自西單牌樓西邊之抱子街東口至西口為頭參領之六佐領居址自手帕胡同東口至西口為二參領之六佐領居址自鐵匠胡同東口至西口為三參領之六佐領居址自石駙馬大街東口向西至棕毛胡同為四參領之六佐領居址自頭髮胡同東口向西至臭水河為五參領之六佐領居址附載八旗會集之處謹按八旗會集之處係雍正十三年六月八旗都統護軍統領前鋒統領等同奏定鑲黃正黃二旗之前鋒參領侍衛前鋒校前鋒等以地安門為會集之處正白鑲白二旗之前鋒參領侍衛前鋒校前鋒等以東安門為會集之處正紅鑲紅二旗之前鋒參領侍衛前鋒校前鋒等以西安門為會集之處正藍鑲藍二旗之前鋒參領侍衛前鋒校前鋒等以天安門為會集之處鑲黃旗滿洲五參領蒙古二參領之護軍參領護軍校護軍等各按參領自地安門向東至皇城東北角草厰胡同西口為會集之處正白旗滿洲五參領蒙古二參領之護軍參領護軍校護軍等各按參領自草厰胡同至東長胡同西口為會集之處鑲白旗滿洲五參領蒙古二參領之護軍參領護軍校護軍等各按參領自東長胡同西口向南循皇城墻至口袋胡同西口為會集之處正藍旗滿洲五參領蒙古二參領之護軍參領護軍校護軍等各按參領自口袋胡同西口向南進長安門金水橋為會集之處正黃旗滿洲五參領蒙古二參領之護軍參領護軍校護軍等各按參領自地安門向西至皇城西北角為會集之處正紅旗滿洲五參領蒙古二參領之護軍參領護軍校護軍等各按參領自皇城西北角向南循皇城墻至西安門為會集之處鑲紅旗滿洲五參領蒙古二參領之護軍參領護軍校護軍等各按參領自西安門循皇城墻至灰厰東口為會集之處鑲藍旗滿洲五參領蒙古二參領之護軍參領護軍校護軍等各按參領自灰厰東口向南進長安門金水橋為會集之處以上八旗會集之處出城禁令國初定凡旗下人逺離本佐領居住者人口財物入官該佐領領催各罰責有差開國時謹按此為而言事關紀律故立法不得不嚴然今軍屯隊伍祖宗整制旗人不得居外城猶舊制以昭緣起焉齊戎政之遺意故恭録乾隆十八年七月奉上諭哈達哈等查奏居住正陽等三門城外之滿洲官員兵丁竟至四百餘家此等年老退休及間散無職事之人在僻逺間曠之地尚可至現任職官每日應入署辦事護軍近列羽林各有差使倘遇暮夜傳喚隔城殊為未便且內城自有各旗分地尤當恪遵定制其離親族而旋往者徒以近市喧囂闤闠龎雜非溺於酒食遊戲即私與胥吏往還便易耳著將現任官員交該部察議兵丁人等交該管大臣責處至宗室更屬不合交宗人府嚴加議處其管理宗人府王公八旗都統並護軍統領等平時漫無約束稽察著一併交部察議所有現在居住南城外間散人等著軍機大臣會同步軍統領酌量分别除間曠處所仍聽其居住外其餘官員護軍等並勒限令其陸續入城居住嗣後八旗都統嚴行禁飭凡滿洲人等毋得復在南城外居住年老退官者仍聽四十六年七月奉旨京城八旗滿蒙漢軍兵丁內或有在城內租房居住指稱房租價貴移往各自墳塋居住或稱移往城外居住房租價賤而在城外居住似此移往城外居住者漢軍人等尤多理宜將此人等即行催令搬進城內但伊等在外居住而今內城房屋一時不能多得轉與旗人生計無益著施恩似此者不必深究除寬免催令急速盡皆搬進城內外交八旗滿蒙漢軍都統等將朕施恩之處各旗通行曉諭傳知各佐領下人等務須各遵憲典守分安居仍令飭各該參領不時稽查不惟斷不可致妄生事端此內或在前三門外歌唱曲戲地方附近居住任意花費銀錢流連取樂或搬在汚穢地方居住貪戀娼妓妄行無忌者俱嚴行禁止如移往自己墳塋居住者尚屬可矜何也與其伊等在城內租房居住現有墳塋間房移往居住每月亦可以省房租似此者必然安分生理惟移往城外居住者竟屬陋習如城內外租房居住俱屬一體需用房租銀錢若以城內價貴盡皆移往城外城外租房豈不價貴乎此皆不肖旗人指故在城外居住顯係妄費遊蕩在閙市地方聽戲曲與娼妓耍閙以為近便任意恣行似此惡習若不嚴行禁止整飭旗人流為不肖不知何所底止滿洲蒙古漢軍都統等細詳閲看朕旨除已經在外安居者嗣後再若致有指故任意移往城外居住者一人斷斷不可朕為養育旗奴如是降旨後各該都統等惟感朕已往不究之恩各將旗人加謹約束自此仍將有無漸漸潛移城外居住或有無改過遷善復搬進城內居住之處查明滿洲蒙古漢軍於年終各造清册咨送值年旗值年旗彚總奏聞以副朕養育旗奴至意以上出城禁令欽定八旗通志卷三十
