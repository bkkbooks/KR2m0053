body:
  text: 欽定四庫全書欽定八旗通志卷一百八十人物志六十大臣傳四十六滿洲鑲藍旗三阿格爾古徳寧庫哷訥阿山蘭泰富安穆和倫新柱格爾古徳格爾古徳滿洲鑲藍旗人姓鈕祜禄初由筆帖式為内院副理事官聖祖仁皇帝康熙三年隨定西将軍圗海征湖廣茅麓山流賊凱旋陞𢎞文院侍讀九年充玉牒纂修官尋遷翰林院侍讀學士充日講起居注官十三年隨安親王岳樂征逆藩呉三桂自江西進湖南十七年偽将軍林興珠率衆降安親王軍前格爾古徳自長沙馳報並奏聞興珠所言困賊䇿分岳州水師為二一泊君山以斷常徳之道一泊香爐峽扁山以斷長沙衡州之道則賊不戰自潰上以宻諭駐軍岳州之貝勒大臣核議行十九年隨安親王還京擢詹事府詹事尋諭吏部議叙勤勞奉職諸講官加格爾古徳一級二十年遷内閣學士明年正月授直𨽻廵撫諭曰旗下荘頭與民雜處倚恃其主聲勢每為民害爾其嚴察懲創勿事姑息金世徳于成龍為廵撫亷潔有聲爾繼其後得名甚難若急於求名或致僨事爾其凛諸二十二年四月䟽言自鬻投旗之人或有作奸犯科冀逃法網者或有逰手好閒規避差徭者本主聴其仍居本籍放債牟利則諱旗而稱民遇官長訪聞窩逃搆訟等事又舍民而稱旗抗避不出甚或招摇鄉里魚肉小民應責令本主止留務農人户於屯庄餘俱收回服役嚴定縱狥處分得㫖下部詳議飭禁並特諭部凡鬻身之人或曽經犯罪冀投旗倖免者與知情之本主俱從重治罪二十三年三月䟽言順天永平保定河間等府民田圈作旗産者向以别州縣之地撥換仍聴彼處民人佃種令業户收租供賦遇佃租不償則額賦無出其佃地所属州縣因錢糧考成無渉不為催租致受撥之地多有積逋官民俱累請自後令佃地所属州縣代為徵解仍按未完分數與奏銷一例處分䟽下部議行先是保定連嵗歉收米粟騰貴格爾古徳請截留山東漕糧撥給駐防兵部議不准格爾古徳復疏言駐防兵米不下萬石若就近採買民間益苦直昻或逺購隣境則運費不貲仍請截留為便得㫖允行時大學士明珠佐領下人户指圈民間塜地墾種有訴於户部者牒巡撫察勘宛平知縣王飬濓以無礙塜塋餙辯格爾古徳劾養濓引圈塋地属實得㫖下部議處並諭曰民間田地乆經有㫖永停圈占止以部存地畝分撥新户口何得借端擾害百姓嗣後有似此者從重治罪六月䟽薦井陘道李基和靈夀知縣陸隴其盧龍知縣衛立鼎亷能素著得㫖下部陞用格爾古徳尋以疾請解任温㫖慰留遣太醫診治㑹詔九卿等公舉清亷官首以格爾古徳列奏上曰格爾古徳居官素優近聞患病羸弱深軫朕懐七月卒於官年四十有四遣内大臣侍衛於櫬至日奠茶酒部臣以格爾古徳曽失察知縣諱盗降一級其任巡撫未滿三年應减半予祭𦵏銀上曰格爾古徳自簡任以來清亷自持勤勞素著復其所降之級從優再議賜祭𦵏如典禮諡文清上嘗諭責漕運總督碩幹居官無善狀碩幹奏曰臣為衆所忌故未能自致聲譽上曰格爾古徳為廵撫殁後人猶思慕稱頌居官茍善豈有不致聲譽者乎二十六年祀直𨽻名宦庫哷訥庫哷訥滿洲鑲藍旗人姓𤓰勒佳康熈五年由監生任吏部筆帖式八年授本部主事尋遷員外郎十年改授翰林院侍講轉侍讀十三年充日講起居注官十五年遷侍講學士充經筵講官十八年遷詹事府詹事十九年正月擢翰林院掌院學士四月上御懋勤殿講官進講畢上曰堯舜禹湯以來心法治法具在尚書爾等每日悉心進講朕孜孜典學雖不能嫓古帝王而此心朝夕懋勉未嘗稍懈也庫哷訥奏曰書經應講者畢自今當以易經進講上曰經史俱闗治理自明日始進講易經可每晚進講通鑑五月諭奨奉職勤勞諸講官庫哷訥得加一級二十一年五月授刑部左侍郎未㡬調兵部二十二年三月命赴貴州酌議土司事宜上諭之曰曩時逆賊呉三桂見土司富厚因收服之今既歸順議者或云設立土官或云設立流官衆論互異朕思土司地方只有大定黔西平逺威寧四府錢糧亦不甚多爾往務善為經畫使可永逺遵行毋得㳺移兩可十二月庫哷訥㑹同雲貴總督蔡毓榮䟽言平逺大定黔西舊為水西宣慰司安坤所属威寧係安坤子安勝祖所属自康熙四年設立流官相安已乆粮課差徭悉無違悞不便更設土官安勝祖應去其土知府銜不得擅預軍民事所有宣慰司仍予承襲至土州同龍天佑向因殺賊著有勞績奉㫖授以左都督總兵銜今宜仍以總兵銜管州同事若及身遽行削去恐不足鼓勵土人之心又言土官子弟俱世襲相承不由選舉㒺知誦讀嗣後應令有志向上者於就近各府一體應試酌定若干名必諳習經書通達文義者方如數録取疏下部俱議行二十三年轉督捕左侍郎二十五年四月吏部請補掌院學士缺上曰學士闗係最重庫哷納任此職時較他人為優遂調禮部侍郎仍管翰林院掌院學士尋充明史總裁及三朝國史副總裁官三十年擢户部尚書三十一年二月調吏部尚書命同禮部尚書熊賜履往江南勘訊運河同知陳良謨訐告河道總督王新命勒取庫銀事鞫新命及良謨並挪移庫銀論罪如律六月命同内閣學士温保往貴州勘訊苗人拒捕事尋劾奏貴州廵撫衛既齊未經審察苗人實情擅行用兵又妄報陣殺多人得㫖逮問衛既齊論罪如律三十三年九卿㑹推兩江總督以吏部侍郎布彦圗等十二人列奏先是布彦圗由理藩院郎中洊遷内閣學士刑部侍郎調任吏部至是上察知其任吏部後聲名甚穢命大學士詢問何人保舉布彦圗時熊賜履亦為吏部尚書遂以賜履保舉覆奏上召庫哷訥諭詰之曰布彦圗與爾同旗同部其人果可保舉耶庫哷訥奏曰布彦圗品行穢劣非可保舉之人上曰如是爾何不阻之爾為尚書當矢志忠誠勉圗効力如布彦圗之貪穢舉國共知何得聴人妄行保舉自古漢人結為黨類各援引同黨之人以欺其上滿洲舊習樸誠忠實今亦各自結黨惟兵部尚書索諾和並無黨類亦不來往大臣之家愿慤安分此外孰無黨者焉能欺朕朕因布彦圗在理藩院時塞外効力漸陞至侍郎不思圗報朕恩所行貪穢朕甚惡之著革去侍郎仍為理藩院員外主事爾等不奮勉以副任用之恩朕亦必加處分斷不寛貸也三十五年三月上親征噶爾丹次瑚什穆克召庫哷訥往察沿途驛站留牧疲瘦馬匹及停運米糧七月御史龔翔麟劾奏吏部擬補擬選先後互異得㫖吏部回奏復下都察院察議以回奏含糊矛盾庫哷訥與尚書熊賜履侍郎趙士麟彭孫遹並應降三級調用上命從寛留任互詳熊賜履傳三十九年十月上以庫哷訥與吏部侍郎阿爾拜俱不稱職命解任在佐領處行走四十七年以疾卒阿山阿山滿洲鑲藍旗人姓伊拉哩初由吏部筆帖式累陞刑部主事户部員外郎康熈十八年授翰林院侍講轉侍讀充日講起居注官二十一年遷侍講學士二十三年轉侍讀學士二十四年十月充經筵講官尋轉光禄寺卿太常寺卿至通政使二十六年遷都察院左副都御史二十八年遷户部右侍郎二十九年奉命察視畿輔賑務三十年四月駕幸多倫諾爾撫綏來歸喀爾喀部長命阿山與内大臣明珠等㑹同頒賞閏七月轉左侍郎十二月詔發帑二十萬兩賑西安鳯翔二府遣阿山同内閣學士徳珠前往騐給明年二月回京上曰聞被灾之民有流於㐮陽者今情状何如阿山奏曰未曽至㐮陽聞有至河南者自賑濟後人民安輯且正月兩次得雪不致流散失所上曰正月雖雪二三月雨水不調麥田亦未可望人民流於㐮陽者甚多爾未知之耳尋諭大學士等曰阿山為人庸劣奉差之事不能盡心凡事啟奏多涉兩可著觧任以郎中品級隨旗行走三十三年六月復用為左副都御史九月命往宣化府監督喂飬軍需馬匹三十五年二月上親征噶爾丹阿山從五月師次克嚕倫河噶爾丹望見御營驚竄克哷河碩計程一百三十餘里上親統前鋒兵追擊期兩日至命内大臣阿宻達為將軍轄衆兵分四日程繼進以阿山及副都統瑚什巴沙濟為叅贊噶爾丹復自克哷河碩遁往特哷勒濟口遇大将軍費揚古軍邀擊大破之噶爾丹僅率數騎逺竄上追勦至托諾山班師擢阿山盛京禮部侍郎三十六年授翰林院掌院學士充日講起居注官及平定朔漠方畧副總裁官又充經筵講官教習庶吉士三十九年五月授江南江西總督四十年三月上與大學士等論各省督撫諭及阿山雖任事未乆居官亦甚善㑹安徽布政使張四教丁憂離任巡撫髙承爵劾其在任時加派火耗挪移庫銀事下阿山察勘覆奏所加火耗及挪借帑銀皆充公用請免審擬上命詳晰再訊實情四十一年七月阿山奏言康熙三十八年皇上南巡不用民間一草一粒皆動正項錢粮豫備而大小各官惟恐供辦遲誤督撫等公議将司庫銀暫用張四教先後給發十一萬餘兩皆公議扣俸抵補者今訊問各官俱自承認臣不敢隠匿寔情奏入上諭大學士等曰朕三次南巡所過地方蠲免錢粮稅課發出倉榖賑濟凡食用俱自京城備辦並未動用地方絲毫恐地方官借端妄行科派累民如有供給跟隨大臣官員者照軍法處斬諭㫖甚明前阿山曽将張四教之案屢請停其審擬朕不允駁回今復奏稱虧空庫銀因南巡時動用張四教以庫銀私給各官阿山開釋其罪又不確䆒各官以何事支用殊為狥情沽譽交部嚴加察議尋命漕運總督桑額鞫訊張四教罪欵得寔擬罪如律部議阿山應革職得㫖從寛留任四十三年二月疏劾江西巡撫張志棟計薦不公舎清亷素著之九江知府朱儼品行素優之彭澤知縣呉士宏而舉居官平常之袁州府同知馬斌貪縱不法之南昌令王廷對擅自定稿且致書嘱勿改易事下部議張志棟與布政使李興祖按察使劉廷璣及道府等官俱革職阿山尋疏言李興祖劉廷璣等呈辯大計舉劾皆係張志棟隨其喜怒任意增刪並非司道附和請與開復於是給事中許志進疏劾之曰阿山與張志棟意見乖違具䟽題叅部議以薦舉不公将兩司以下一同革職阿山復為藩司李興祖臬司劉廷機道員韓象起等題請開復竊以徼倖之端不可開欺詐之風不可長張志棟傲慢自恣其計冊舉劾司道等當時瞻狥不言事後違例置辯謂無賄賂請託誰其信之若倖邀開復則勸懲之重典止属虛文賞罰之大權不難假借督臣操縱自如恩威已出将來人盡效尤顛倒是非變亂黒白弊端百出其害難言乞敕嚴究情弊以昭法紀疏下部察議議未上阿山疏辯許志進所劾誣㒺且訐許志進係淮安漕標營卒之子素行不端誓為張志棟報仇許志進又追論阿山狗庇張四教及收属員賄賂盗賣倉榖弗問貪滛惡蹟審虚縱妾父招摇生事諸欵並下部察議部議許志進因訐奏逞忿臚欵應革職阿山妄請開復司道等官被言官糾劾不静聴處分瑣屑訐奏應革任上命阿山仍從寛留任四十四年六月疏劾江寧知府陳鵬年以妓樓改建講堂䙝凟聖諭及貪酷二欵命㑹同漕運總督桑額河道總督張鵬翮審擬鵬年論斬詔鵬年來京在修書處効力十一月同桑額張鵬翮奏泗州西溜淮套開河築隄洩淮水至黄家堰入張福口㑹出清口事宜請駕臨閲視四十五年十一月授刑部尚書四十六年上臨視溜淮套諭從臣曰前阿山桑額等奏稱溜淮套另開一河出張福口可分洩淮水免洪澤湖之異漲保髙家堰之危險繪圗進呈今朕乘騎從清口至曺家廟見地勢甚髙雖開鑿成河亦不能直達清口與所進圗様迥乎不同且所立標竿多有在墳塚上者朕何忍發此無數枯骨耶即飭張鵬翮罷其工及回鑾九卿議阿山與張鵬翮等均溺職諭大學士等曰聞騐視溜淮套之時張鵬翮桑額皆謂不可開因阿山主議乃列名奏請命革阿山尚書任五十一年革職江蘇布政使宜思恭因虧帑訐告總督噶禮等頻向索銀下張鵬翮察審奏阿山任總督時亦收取節禮應議處上以阿山年老免之五十二年三月遇萬夀慶典復原品逾年卒阿蘭㤗阿蘭泰滿洲鑲藍旗人姓富察初任兵部筆帖式累遷職方司郎中聖祖仁皇帝康熙十九年議政王大臣等疏薦阿蘭㤗練習部務自呉三桂叛後專司軍機文檄日夕勤勞詳慎無誤請予議叙以昭奨勵得㫖以三品卿用二十年三月擢光禄寺卿五月遷内閣學士明年充平定三逆方畧副總裁官兼充明史總裁官教習庶吉士二十二年擢兵部侍郎兼管佐領明年三月上欲釐定户部鼓鑄章程察除積弊特命阿蘭㤗同吏部侍郎陳廷敬刑部侍郎佛倫副都御史馬世濟管理錢法二十五年六月擢左都御史十二月上閲平定三逆方畧摘論賛舛錯諭大學士曰平逆始末阿蘭㤗知之甚詳爾等可與酌改務令記事得寔二十六年二月遷工部尚書十月以商人採輸楠木工部監收遲延部臣並應降調上念阿蘭泰任事未乆貸之二十七年二月調兵部尚書五月調吏部二十八年閏三月上以雨澤愆期命阿蘭泰同尚書徐元文覆審刑部獄囚奏减罪可矜疑者四十五人四月充三朝國史總裁官五月擢武英殿大學士三十一年陕西飢阿蘭泰遵諭同河道總督靳輔議運江淮粮石自黄河泝西安以備積貯明年噶爾丹侵擾哈宻上命飭兵預備阿蘭泰與領侍衛内大臣索額圗等議增撥京兵一千及陕西督標兵三千付甘肅提督孫思克相機勦禦三十三年復議噶爾丹逼近圗拉請遣右衛駐守大臣費揚古郎坦等往勦尋以逆首逺遁奏撤塞外新增驛站詔費揚古還軍歸化城郎坦兵亦旋罷明年上出古北口巡厯塞外命阿蘭泰留京總理章奏三十五年二月上親征噶爾丹於克嚕倫河阿蘭泰仍留京與尚書馬齊佛倫直宿禁城九月隨駕出歸化城駐蹕黄河西界經理軍務十月以扈從勞賜内廐馬一奉命赴右衛䘏賞隨征官兵奏免大同及滿洲蒙古漢軍借支銀兩俱稱㫖三十六年六月充平定朔漠方畧總裁官八月噶爾丹之台吉丹濟拉來降上駐蹕翰特穆爾嶺御氊幄屏左右召丹濟拉入見阿蘭泰引郎中阿爾法隨入侍上命之出及丹濟拉退召阿蘭泰諭曰爾偕降人入以防不測此意甚善朕令爾出欲推誠以示不疑耳三十七年阿蘭泰同大學士伊桑阿以年老善忘奏請簡員協理閣務上曰大學士最為重任必平坦雍和任事謹慎者方為稱職至於記事學士可分任之三十八年五月因伊桑阿乞休諭阿蘭泰曰爾與伊桑阿自任閣務以來凡事推誠布公不惟朕知之天下無不知者雖以年老求罷朕不忍令去也九月阿蘭泰病劇上欲臨視遣皇子先往而阿蘭泰已卒為輟朝一日賜銀二千兩命皇子及内大臣侍衛等奠茶酒諭廷臣曰阿蘭泰宣力年乆懋著勤勞存心端誠持守亷潔應贈少保兼太子太保予祭𦵏如典禮諡文清四十六年十月上與大學士馬齊評論内閣舊臣猶稱阿蘭泰能强記且善於辦事云世宗憲皇帝雍正十年入祀賢良祠子富寧安亦仕至大學士别有傳富寧安富寧安滿洲鑲藍旗人姓富察大學士阿蘭泰子也其從祖尼喀納以隨征逆藩呉三桂有功得騎都尉世職康熙二十五年卒無子以富寧安襲尋授侍衛任佐領遷驍騎叅領兼管火噐營事四十一年授鑲紅旗滿洲副都統四十四年擢正黄旗漢軍都統四十六年改授都察院左副都御史先是富寧安以副都統署倉場侍郎至是仍兼任䟽言大通橋舊設滿漢監督四十一年裁併坐粮㕔兼管今會清河粮務改歸坐粮㕔經理勢難兼顧大通橋請復設監督部議從之四十七年五月遷禮部尚書仍兼管倉場事四十八年二月聖祖仁皇帝諭廷臣曰朕觀部院官員辦事優而又極謹慎如富寧安者未可多得能始終不易則善矣三月調吏部尚書又諭廷臣曰富寧安從武員擢用人皆稱其操守亷善是以授為吏部尚書今部院中欲求清官甚難當於初為筆帖式時即念日後擢用可為國家大臣自立品行也五十四年四月上以策妄阿喇布坦侵掠哈宻敕西安将軍席柱甘肅提督師懿徳等領兵援勦命富寧安率侍衛等前往總統調度諭之曰朕以爾堪信任故命爾前往軍機大事不宜遲緩爾至彼有急應調遣之事不必請㫖即與将軍席柱商酌而行時賊兵二千餘逼哈宻駐防遊擊潘至善率緑旗兵二百擊斬賊兵九十人生擒三人賊觧圍潰走五月富寧安至甘州同席柱奏言吐魯畨與哈宻接壌係凖噶爾咽喉要地當先取之大兵秣馬五旬應齊赴巴里坤從哈宻之北大山後烏蘭烏蘇路進兵闢展越山取吐魯番相機進勦上命富寧安至巴里坤擇水草佳處駐兵俟明年前進尋詔還駐肅州經理粮馬五十五年奏言自嘉峪闗運粮至哈宻應設十二臺用山西陜西小車三千輛每車用三人每臺分車二百五十輛陸續轉運哈宻至巴里坤雖近中有科舍圗嶺間之自哈宻至嶺之南設三臺令駐哈宻兵牽駝運送自嶺北至巴里坤亦設三臺令駐巴里坤兵接運又言哈宻所属布魯爾圗古哩克接壌處並巴里坤都爾博勒津喀喇烏蘇及西吉木達哩圗布隆吉爾附近之上浦下浦皆可開墾以禆軍食又言布隆吉爾諸處田禾豊收人民漸集請遣官建倉厫及收貯農器房屋並於西吉木設赤金衛達哩圗設靖逆衛西喇郭勒設柳溝所分置守備千總同知通判兼管廷議並如所請行五十六年三月授靖逆将軍駐巴里坤命同振武将軍傅爾丹副将軍祁里徳分界覘賊六月富寧安率兵赴烏嚕木齊擒回人一百六十有九獲駝馬牛羊無算七月至畢留圗厄魯特兵三百餘尾我後我兵還撃擒斬數人餘賊越山遁乃還師五十九年七月進兵烏蘭烏蘇令侍衛哲爾徳克什圗阿玉錫等分道襲撃擒阿克塔斯哨卒餘賊望風竄遁復於伊勒布爾和碩奪賊谷中馬百餘破其所據山險獲台吉垂木珀爾斬賊三十餘生擒二十四人别遣散秩大臣阿喇納等率兵諭降闢展城回人進擊吐魯番降其酋長獲馬駝甚多十月䟽言我兵襲擊賊境大振軍威賊人窮促遣使乞降不過為緩兵計耳奸詭之性不足深信請乘勝直擣賊穴臣所統巴里坤固原甘肅兵萬有七千請選八千人由額稜哈畢爾漢路進六千人由吐魯番阿勒輝路進各持三月粮應令廵撫綽竒設置臺站先期運米及馬駝至巴里坤草厰豫備進勦疏下𫝊爾丹祁里徳㑹議議入復下九卿詹事科道詳議如富寧安請命選傅爾丹軍前三千人益其軍明年四月以烏蘭烏蘇地狹移兵駐伊勒布爾和碩尋奉諭暫停進勦時策妄阿喇布坦遷其所属吐魯番回人西行回人多不願往中道遁回駐魯克齊木衆萬餘擊敗賊所遣宰桑和勒博斯額木齊兵推托克托瑪木特為首赴我軍乞降富寧安以聞且以屯兵守䕶粮運維艱入奏上諭議政大臣曰䇿妄阿喇布坦既不能遷移吐魯番回人又不能䕶衛凖噶爾之人其萬不能敵我兵明矣回人歸降即係吾民其令富寧安派緑旗兵一千察哈爾厄魯特䝉古兵一千赴吐魯番駐劄收撫安挿如遇賊衆侵擾速行救援無使失所富寧安乃遣阿喇納率兵二千駐吐魯番收撫回人九月聞賊衆来犯又遣副都統壮圗穆克登各率兵二千援勦而自率兵四千進駐伊勒布爾和碩調遣策應㑹阿喇納自吐魯番與賊迎戰屢敗賊衆賊逺遁乃還駐巴里坤六十一年四月疏言嘉峪闗外布隆吉爾之西為古𤓰沙燉煌地昔曽建城屯種遺址尚存且濱河土肥若駐兵屯牧設總兵官一人統之可扼黨色爾騰之路六月又請専遣大臣領屯田諸處儲粮事又言駐守官兵月粮及進勦大軍裹帯隨運粮若一時並輓費多而人亦不給今巴里坤牧駝悉臕壮又於喀爾喀買駝至八月皆肥以駝運粮甚便乘炎熱草盛時分起領運南路至哈宻北路至圗古哩克軍營收貯免使臨事張皇上並可其奏是年冬世宗憲皇帝御極授武英殿大學士仍駐巴里坤管理軍務雍正三年二月上以富寧安在軍營久謹慎小心賜敇奨諭并賜帑銀二萬兩四年十一月還京賜御用冠服並䨇眼孔雀翎黄轡鞍馬及朝珠銀縀諭王大臣曰富寧安自任将軍一心肫篤為國宣力再三奏請進兵皇考憐念凖噶爾生靈不忍剪除是以未允其請倘如所奏富寧安定能滅賊矣軍中約束兵丁辦理諸務井井有條且行止端方亷潔年來領兵将軍聲名未有出其右者實心奮勉不負任使益彰皇考用人之明朕實嘉愛其錫世襲侯爵以示旌異於是由騎都尉晉一等侯五年四月諭奨其公忠誠實加太子太傅七月管鑲白正紅二旗漢軍都統事十月命往西安署駐防将軍六年五月諭兵部曰富寧安署理将軍為時已久所属武職並未題補一次省城管兵之員闗係甚重在富寧安之意以為可俟新授将軍常色禮到日題補曽不計常色禮於今冬自軍中至京明春方到西安如許員缺安可經年虚懸富寧安曾為巴里坤将軍西安官員認識過半何難量才授任况現任大學士尤不宜茍且推卸若此朕向日聞其操守好辦事誠篤自授大學士以來恩賜頻仍錫封侯爵寵眷優渥理應屏除一切奮不顧身乃惟自圖保全膜視國事深負朕恩其交部嚴行察議部議革大學士及一等侯得㫖削恩賞世爵免革大學士六月卒於西安諭曰富寧安人品端方操守亷潔敭厯中外懋著勤勞謹慎小心始終一致簡任綸扉正資倚毗忽聞溘逝朕心深為軫悼其喪櫬起程及歸途之費令陜西督撫料理所過地方官員於櫬前奠醊仍下部議䘏櫬至京遣郡王及内大臣侍衛奠茶酒賜祭𦵏如典禮諡文恭十年九月入祀賢良祠其原襲尼喀納之騎都尉世職以嗣子烏魯理襲穆和倫穆和倫滿洲鑲藍旗人姓喜塔臘由兵部筆帖式選内閣中書遷侍讀康熙三十二年授刑部郎中三十三年遷御史三十九年轉禮科給事中四十一年十一月遷内閣侍讀學士十二月擢内閣學士四十二年五月兼攝光祿寺卿七月山東水災詔截漕五十萬石貯沿河州縣備賑濟發庫銀三千兩派八旗官員往賑以大臣廵察自泰安至郯城為中路濟南至登州為東路徳州至濟寧為西路命穆和倫廵察中路四十三年三月遷工部右侍郎五月穆和倫奏山東麥秋成熟請撤回賑濟官諭奨其勤勞命俟秋成後回京四十四年轉左四十七年四月調吏部左侍郎五月遷左都御史四十八年授禮部尚書明年調户部尚書五十年上諭八旗及部院大臣各将灼知確見篤行孝義者署名保奏如大學士温達尚書穆和倫富寧安之孝朕深知之孝者百行之原果有篤行孝義之人不可謂無由得知也時穆和倫母年九十御書北堂眉夀額賜之五十一年四月因户部吏包攬索銀穆和倫家人亦受賄部議降三級調用得㫖從寛留任時江蘇廵撫張伯行劾總督噶禮攬賣舉人多索賄賂噶禮亦劾伯行誣䧟船埠張元隆通盗及不能清理案件等事上命俱觧任遣尚書張鵬翮㑹同總漕赫夀察審尋奏噶禮攬賣事全虛伯行不能清案属實上切責鵬翮赫夀掩餙命穆和倫往鞫如前議噶禮無罪伯行誣劾督臣應革職得㫖張伯行居官清正但才不如守噶禮雖才有餘未聞清正之名此所議是非顛倒著革噶禮職廵撫張伯行復任五十三年穆和倫以老病乞休上慰留之五十四年再乞休詔允所請五十五年仍授户部尚書五十七年四月因收平餘銀未奏降五級調用十月卒新柱新柱滿洲鑲藍旗人姓富察康熈四十六年襲其祖羅多理所遺騎都尉世職六十一年補藍翎侍衛洊授頭等侍衛乾隆四年授鄭家荘城守尉五年授鑲白旗滿洲副都統六年遷都統八年擢福州将軍十一年疏言臺灣南北港汊有小船不從汛地出入輙由小港私運米榖至内地又厦門往臺之横洋船雖無貨物但額配水手過多往往頂冐私渡應整飭以清積弊又言閩俗剽悍民間私藏鳥鎗現經漳浦縣設法勸繳已五百餘桿請通行全省均下廷臣議行十二年七月䟽言前任撫臣周學健據福州神寕二府紳士呈請開墾上下竿塘各島一案現在督撫委員丈勘臣聞筸塘等十島僅丈得水旱田三十三頃與原報萬一千六百畝之數太懸殊良由認墾者駕詞聳聴意不在山而在海海洋之利名色種種如白水者可採捕魚鮮海島左右水深處也網地者水淺處張網以待潮湧魚至潮落而取也魚􅀈則就山脚巉石開鑿成圈潮來魚入潮去魚留所也紫菜磹乃山脚下燒取紫菜地也此皆海利大者向無專主沿海貧民輸納漁課於各島附近分收其利與其使紳衿富户壟斷不若仍公諸貧民俾資衣食上是之嗣經總督喀爾吉善巡撫陳大受覆奏如新柱言事遂停止九月疏言海闗零税向准銀錢兩收乾隆五年奏禁用錢近交易用錢者多小本經商易銀納税啟包攬需索之弊海船因設措停留恐誤潮信至濱海小口如白石司沙埕等處城市遙逺無處易銀更属不便請嗣後零星納税銀錢聴商便并酌中定價不使滋弊得㫖俞允十四年正月署湖廣總督三月疏言楚省素稱澤國民間田廬全賴堤堘保障荆州属之江陵松滋公安石首監利武昌属之嘉魚江夏等縣俱有堤堤外有䕶灘自十數丈至百餘丈不等遇漲不致屢潰襄陽府城外老龍石堤闗係城池當不時修築安陸府之鍾祥荆門京山潜江沔陽天門漢陽府属之漢川等州縣俱濵漢水有堤而無外灘且土性不堅遇漲輙潰荆門州属之河洋大堤地當頂衝堤内田廬與潜江沔陽及荆州属之江陵監利等縣交錯設有疎虞俱不可保查老龍堤係石工上年動帑興修現在稳固河洋廖家窪外堤坍損難修内挽月堤宜速修務令堤脚上窄下寛堤身加髙厚此皆官修之堤工也其各州縣堤工向皆民修惟令地方官勸諭業民於嵗修時擬費存公備用或是嵗無需動工仍留存下届倘一時工大民力不勝官借榖帮補食用於收成時還項奏入報聞四月命同尚書舒赫徳往雲南查勘金沙江工程十二月調吉林将軍十五年仍調福州将軍奏言福州旗員駐閩年久清書清語日就生疎所立官學難資教𨗳請發精通繙譯筆帖式一人來閩專司教習俟有成效另請議叙從之十六年署兩廣總督十七年回福州任十九年七月同總督喀爾吉善遵㫖議奏駐防漢軍出旗為民及轉補緑營以京城滿洲兵往補甲缺各事宜一情愿為民之漢軍聴指定所往省分呈明入籍一仍愿食粮者分派緑營補缺一漢軍儘馬甲先補緑營一半以便滿洲兵坐補一漢軍原住房屋應留給滿洲兵官房外有自盖者給還屋價一漢軍水師甲兵暫留令滿洲兵學習熟諳後再改補别處一京城滿洲兵分次分路進閩以免壅滯又奏駐防既換請挑在京滿洲官帯兵前來毎兵百派防禦一驍騎校一兵三百派叅領一兵五百派協領一與漢軍人員交代至現在漢軍各員逐加考騐其强壮可用者候送部引見改用緑旗營員經軍機大臣議行二十四年丁憂回旗尋補鑲藍旗䝉古都統二十五年命往葉爾羗辦事二十六年奏言和闐回人所交乾隆二十四五等年粮石除官兵支領外照時價糶仍有萬餘石存倉據阿竒木伯克阿什黙特等呈稱每年交正項普爾二萬四千騰格每月復以普爾三千騰格換易新錢故官粮難售若准以紬布牲隻及所屬克勒底雅每年入貢餘金作價愿認糶粮石一千八百帕特瑪查回人紬布較粮石頗賤牲隻價雖稍昻仍減於内地辦送金亦通行之物且伊犂布價甚貴若由臺站轉運於兵丁衣服有益得㫖如所請行又言葉爾羗鑄錢一年共得八萬餘騰格阿克蘇又開局鼓鑄與舊普爾参雜行使回人貧富逺近不同不能全收舊錢以足十萬騰格之數查新舊錢㕘雜自可流通若新錢鑄至十萬騰格時舊錢收盡自當停鑄若尚有舊錢則仍行增鑄以盡收舊錢為度每月不限定數至錢局所鑄無多工役量減一半以節糜費從之先是巴達克山部與博洛爾部接壌屢起釁抄掠二十八年新柱奏言臣等前遣伯克薩里等往巴達克山諭索所掠齊特喇爾户口什物素勒坦沙即凛遵約束将其弟沙卜多爾噶達爾撤回該地方户口什物派所属伯克等逐一交還博洛爾得㫖新柱辦理妥協著交部議叙是年回京授理藩院尚書兼鑲紅旗漢軍都統二十九年授西安将軍三十年仍任理藩院尚書兼正紅旗䝉古都統三十二年署理熱河副都統尋授盛京将軍三十三年卒賜祭𦵏諡勤肅欽定八旗通志卷一百八十
