body:
  text: 人物志一百十五忠義傳二十七駐防八旗四七十六人乾隆年中共德勒克布德勒克布黑龍江正黃旗人由護軍校任佐領乾隆二十一年正月初九日隨恭贊大臣富德於烏塔莫庫爾擊賊戰殁賞恤如例德勒克布德勒克布黑龍江正黃旗人由領催委署驍騎校乾隆二十一年二月隨恭贊大臣富德收剿凖夷餘黨在索郭魯克戰殁賞恤如例老格老格黑龍江正黃旗人姓鄂羅氏由護軍署散騎郎乾隆三十四年隨征緬甸三十八年調征金川得頭等三等功牌各二三十九年七月擊賊於空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表莫托和爾莫托和爾黑龍江正白旗人由頭等侍衛委署營總乾隆二十二年隨都統滿福追剿沙拉斯嗎唬斯二鄂柘克賊詭就降撫滿福墮計被害莫托和爾偕死之賞恤如例努固德努固德黑龍江鑲白旗人授巴圖魯三等侍衛乾隆二十二年出師西路八月十二日隨副都統額爾登額征剿克勒特賊衆于博羅齊地方戰殁賞恤如例恩賜雲騎尉世職承襲詳見世職表特太特太黑龍江正藍旗人姓徹默特氏任委署驍騎校乾隆十九年出征回部三十四年隨征緬甸三十八年調征金川屢著勞績得功牌頭等者六二等者二三等者一三十九年十二月擊賊於空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表圗爾色圗爾色黑龍江正藍旗人姓達延氏由領催授空銜藍翎乾隆三十八年隨征金川四十年十一月擊賊于西里陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表五林保五林保三姓鑲黃旗人委署驍騎校雍正九年隨征阿爾泰乾隆十三年隨征金川二十一年隨征巴里坤厯著勞績二十二年六月初六日隨恭贊大臣明瑞在額卜特嶺遇賊力戰創重身死賞恤如例薩克西納薩克西納三姓正黃旗人姓格克拉氏任奬賞藍翎乾隆二十一年出師巴里坤隨副都統愛隆阿隊先後得頭等功牌三二等三等功牌五二十三年十月十三日奉定邉將軍兆惠令偵視波羅泥都霍集占蹤迹遇賊戰殁賞恤如例二達色二達色三姓正紅旗人姓瑚圗哩氏由前鋒委署驍騎校乾隆二十一年出征巴里坤所至奮勉得功牌頭等者五二等者三三等者二三十八年隨征金川進攻阿克木雅美諾等處得頭等功牌一三十九年七月擊賊于色淜普陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表富紹富紹三姓鑲白旗人姓徹葉爾氏由前鋒委署驍騎校乾隆三十八年隨征金川進攻阿克木雅美諾等處得功牌一三十九年七月擊賊于色淜普陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表舒嚨阿舒嚨阿齊齊哈爾鑲黃旗人姓尼瑪齊氏乾隆三十四年由委署筆帖式隨征緬甸進攻新街得功牌三三十八年調征金川三十九年三月擊賊于遜克爾宗陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表阿爾賽阿爾賽齊齊哈爾正黃旗人姓舒穆祿氏任夲旗佐領乾隆十九年出征凖噶爾二十七年派戍伊犁三十四年隨征緬甸三十八年調征金川進攻馬奈巴旺等處所至奮勇共得功牌頭等者四二等者三四十年正月擊賊于空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表阿里保阿里保齊齊哈爾正黃旗人姓巴哩氏由驍騎校署恭領乾隆十九年出征回部三十四年隨征緬甸三十八年調征金川屢著勞績得功牌頭等二等者各三三等者二四十年六月擊賊於榮噶爾博陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表森保森保齊齊哈爾正黃旗人姓沃色氏乾隆二十七年由委署恭領出征烏什列超等一次得功牌五三十四年隨征緬甸三十八年調征金川賞衮濟珠穆巴圗魯號戴花翎四十年八月擊賊于勒烏圍陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表薩爾吉岱薩爾吉岱齊齊哈爾鑲紅旗人姓博和爾氏乾隆三十四年由二等侍衛隨征緬甸三十八年調征金川攻克馬奈日旁等處得功牌五賞善巴巴圗魯號四十年閏十月擊賊于阿穰陳亡賞恤如例詔圗像紫光閣御製贊曰賊之長技在於善守反而用之拿柵進取滴博蓬婆威名逺服惜哉陳亡於阿穰曲恩賜雲騎尉世職承襲詳見世職表烏爾古勒濟烏爾古勒濟齊齊哈爾正藍旗人姓齊布齊努特氏乾隆三十八年由領催委署驍騎校隨征金川得功牌三三十九年三月擊賊于喇穆喇穆受傷尋殁賞恤如例恩賜雲騎尉世職承襲詳見世職表呼實呼實齊齊哈爾正藍旗人姓瓜勒佳氏乾隆三十八年由領催委署七品官隨征金川三十九年八月擊賊于遜克爾宗陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表六十七六十七齊齊哈爾正藍旗人姓烏扎拉氏乾隆十九年由委署驍騎校出兵凖噶爾三十四年隨征緬甸三十八年調征金川四十年四月擊賊于木斯功噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表圗爾璽圗爾璽齊齊哈爾鑲藍旗人姓瓜勒佳氏乾隆三十八年由藍翎長隨征金川四十年十一月擊賊於西里陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表斐松阿斐松阿琿春鑲黃旗人姓鈕祜祿氏任藍翎侍衛乾隆二十一年隨征巴里坤在圗呼里克等處戰賊五次厯著勞績先後所得功牌凡頭等者四三等者一後隨定邉將軍兆惠追剿波羅泥都霍集占於二十三年十月十三日在喀拉烏蘇河戰殁賞恤如例哈勒彀哈勒彀琿春鑲黃旗人姓博爾卓克氏任三等侍衛乾隆三十七年隨征金川三十八年六月擊賊於木果木陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表雅秉阿雅秉阿琿春鑲黃旗人姓溫特赫氏由領催授空銜藍翎乾隆三十七年隨征金川三十八年六月擊賊于木果木陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表邁隆阿邁隆阿渾春正白旗人姓布查氏任奬賞藍翎乾隆二十一年出師巴里坤隨副都統愛隆阿隊在圗呼里克等處戰賊九次斬賊首二級保列頭等軍功先後凡得頭等功牌五二等三等功牌三嗣於二十三年十月十三日在巴圗魯侍衛璊綽爾圗隊隨定邉將軍兆惠征剿逆回於喀拉烏蘇河戰殁賞恤如例昌保昌保伊通鑲黃旗人姓伯爾卓克氏由領催委署七品官乾隆三十八年隨征金川進攻喇嘛寺山梁得頭等功牌一三十九年十月擊賊于日旁陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表伯祿伯祿白都訥正黃旗人姓吳蘇氏委署前鋒恭領乾隆二十一年出師巴里坤隨副都統愛隆阿隊在阿巴噶斯等處擊賊九次保列出衆軍功先後賞給功牌凡頭等者七三等者六嗣於二十四年正月初六日隨副將軍富德追剿霍集占至呼爾璊戰殁賞恤如例卞德卞德白都訥正紅旗人姓扎思呼里氏署防禦乾隆二十一年出師巴里坤於喀拉烏蘇等處五戰賊人均得頭等功牌二十三年十月十三日在巴圗魯侍衛璊綽爾圗隊隨定邉將軍兆惠進剿逆回於喀拉烏蘇河戰殁賞恤如例巴彥達巴彥達白都訥正紅旗人由領催署防禦乾隆二十三年十月十三日於璊綽爾圗隊隨定邉將軍兆惠追剿波羅泥都霍集占進攻沙拉斯逰牧途遇回衆截戰與璊綽爾圗等偕死之賞恤如例恩賜雲騎尉世職承襲詳見世職表雅哈哩雅哈哩白都訥鑲白旗人姓瑚嚕氏由領催委署驍騎校乾隆三十八年隨征金川四十年正月擊賊于空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表烏善保烏善保白都訥鑲紅旗人姓哈蘇哩氏乾隆三十八年由藍翎前鋒隨征金川四十年十一月擊賊於碾占陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表巴爾呼巴爾呼拉林鑲黃旗人姓博爾濟氏乾隆三十八年由領催隨征金川委署驍騎校進攻阿克木雅美諾卡色淜普等處得功牌頭等二等各一三十九年八月擊賊于遜克爾宗陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表明柱明柱拉林正黃旗人姓格爾齊氏乾隆三十八年由領催隨征金川委署驍騎校進攻阿克木雅等處得功牌一三十九年七月擊賊于色淜普陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表阿津泰阿津泰拉林正白旗人姓巴哩氏乾隆三十八年由領催委署驍騎校授藍翎隨征金川得功牌二四十年正月擊賊于空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表法泰法泰寧古塔鑲黃旗人姓巴魯特氏乾隆三十八年由空銜藍翎隨征金川進攻阿克木雅美諾等處得頭等三等功牌各一三十九年七月擊賊于達爾圗身受重傷九月傷發殁賞恤如例恩賜雲騎尉世職承襲詳見世職表哈布青阿哈布青阿寧古塔正黃旗人姓朱爾格特氏乾隆三十八年由前鋒隨征金川進攻美諾色淜普等處在事奮勉授空銜藍翎四十年三月擊賊于遜克爾宗身受重傷尋殁賞恤如例恩賜雲騎尉世職承襲詳見世職表伊保伊保寧古塔正黃旗人姓格爾齊氏由領催厯升防禦乾隆三十八年隨征金川進攻阿克木雅美諾等處得頭等功牌一四十年四月擊賊于榮噶爾博陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表巴延泰巴延泰寧古塔正白旗人姓巴林氏乾隆三十八年由委署七品官隨征金川三十九年三月擊賊于思底陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表福廕保福廕保寧古塔正白旗人姓鈕祜祿氏乾隆三十四年由領催隨征緬甸得三等功牌一三十八年調征金川所至奮勉賞戴藍翎三十九年七月擊賊於達爾圗陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表福木保福木保寧古塔正白旗人姓伊拉哩氏由領催授空銜藍翎乾隆三十四年隨征緬甸三十八年調征金川四十年七月擊賊於蚌噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表德保德保寧古塔正紅旗人姓墨爾迪勒氏由領催委署驍騎校乾隆三十四年隨征緬甸新街之戰左手中鎗傷得頭等功牌一三十八年調征金川四十年四月擊賊于下巴木通身受重傷尋殁賞恤如例恩賜雲騎尉世職承襲詳見世職表額爾錦保額爾錦保寧古塔正紅旗人姓喀勒佳氏由領催委署七品官乾隆三十八年隨征金川進攻喇穆喇穆美諾等處得頭等功牌一四十年五月擊賊於基木斯當噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表常夀常夀寧古塔鑲白旗人姓博和理氏由驍騎校厯升防禦乾隆二十一年出征巴里坤得功牌頭等二等各二三等者一三十四年隨征緬甸得二等三等功牌各一三十八年調征金川進攻阿克木雅美諾等處得頭等三等功牌各一四十年五月擊賊於赤爾丹噶陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表觀泰觀泰寧古塔正藍旗人姓烏蘇氏由驍騎校厯升防禦乾隆二十一年出征巴里坤得功牌頭等者五二等三等各二三十四年隨征緬甸三十八年調征金川屢著勞績得頭二三等功牌各一三十九年十二月擊賊于空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表巴彥布巴彥布寧古塔鑲藍旗人姓巴雅喇氏由前鋒委署驍騎校乾隆三十四年隨征緬甸得功牌一三十八年調征金川進攻得里日寨色淜普等處以奮勉列超等得功牌二三十九年八月擊賊於遜克爾宗陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表德隆德隆寧古塔鑲藍旗人姓喀爾拉氏由前鋒委署驍騎校乾隆三十八年隨征金川進攻阿克木雅美諾遜克爾宗等處奮勉受傷列功超等得功牌二三十九年十二月擊賊於空薩爾陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表善泰善泰寧古塔鑲藍旗人姓索齊爾氏由領催委署驍騎校乾隆三十八年隨征金川進攻阿克木雅美諾等處以奮勉列超等得功牌二四十年四月擊賊於榮噶爾博陳亡賞恤如例恩賜雲騎尉世職承襲詳見世職表查巴