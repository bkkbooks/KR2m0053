body:
  text: 人物志八十四大臣𫝊七十漢軍鑲紅旗二聖侯襲爵龍楊茂勲馬雄鎮姚啟于成侯襲爵侯襲爵漢軍鑲紅旗人順治六年七月管佐領八年閏二月授刑部理事官十年十二月擢廣東肇慶總兵官十二年正月總督李率泰以襲爵青年勇敢約兵愛民疏請移駐德慶州要地兼轄羅定東安西寧三州縣十三年六月襲爵疏言鎮標左右兩營馬步兵原備征𠞰之用刀鎗弓箭皆各營自備日乆腐朽且所轄羅定東安西寧等州縣并肇慶城守水師營兵馬俱缺盔甲器械粤中山冦海氛不時竊發請一律製造以禆戰守又言向來各城守將備與有司官徃徃因小嫌互訐激成事端請勅下撫按嚴加申飭並得㫖允行九月遣守備蔡忠光㑹𠞰懐集縣克松岡寨生擒八人招撫其崇陽王朱藴鈐及渠帥李盛功等十一月羅定州賊羅成基與其黨蕭鼎李仲倫等據州屬之雲致峒襲爵率標兵三千抵其巢連破三柵五寨成基創斃擒其偽中軍頼洪恩等鼎仲倫相繼就撫餘黨悉平十二月因病觧任康熙四年七月補京口左路水師總兵官十六年十二月調廣東髙雷總兵官十七年四月擢廣東提督七月海逆鄭錦犯泉州上命靖南王耿精忠督餉侍郎達都等自潮州率兵赴閩觧泉州圍襲爵與副都統尚之璋總兵馬三竒固守潮州十月疏言潮州宻邇閩疆逼臨大海自經變亂水師船隻燬失兼以達濠南澳井洲諸島逆賊停泊為巢與潮陽等處相隔帶水窺伺已非一日邇來冦犯福泉各島勾連耽耽思逞潮屬營汛多環山枕海道路寥濶鎮標額設两營除派防要汛外在城兵僅三百餘名汛險兵單請復設潮州鎮標中營官兵五百大埔營官兵六百潮州水師總兵一員左右二營官兵二千以資彈壓上允其請十二月海賊百餘艘突犯潮州之鋪前礮臺襲爵遣逰擊秦可京等水陸夾攻陣斬偽㕘將都司等五人賊級二百生擒三十四燬賊船二十十八年二月海賊楊金目等犯山頭仔海岸襲爵遣副將蔡茂植迎擊斬級千餘燬賊船三十賊奔潰茂植躍舟逼攻斬偽翼將頼武楊雄及賊黨三百餘生擒偽副將郭鳳杜開等九月疏報井洲島逆恃海為險臣與鎮臣馬三竒議水陸夾𠞰秦可京等由東路登井洲海岸分兵直衝賊寨破賊城二斬級五百餘焚賊巢七蔡茂植等率水師由西路抵井洲海面賊截港拒戰官兵奮擊沉賊船十二陣斬偽副將季棟林雄偽㕘將周武斬級五百餘乘勝登岸連燬賊營九賊敗遁適南澳海山等賊擁衆來援遂與秦可京等合師截殺焚賊船十四溺死者甚衆餘賊悉遁十月疏言臣標官兵原設馬二步八康熙十四年改為馬一步九粤省幅􅊷遼濶枕臨西粤宻邇閩漳標兵有援𠞰四應之責况值海逆流冦互相出没分頭䇿應非藉馬力曷克星馳撲𠞰請照督標例復為馬二步八俟事平日議減下部議行時平南將軍賚塔奏調廣東潮州碣石兩鎮舟師㑹𠞰海逆恢取厦門已得請十二月襲爵疏言舟師㑹𠞰厦門其不便有四閩省大船三百餘配兵三萬餘以當一路潮碣两鎮額船共止舶艚赶􅊻十五可以出洋其餘皆係䑩艚每船僅可配兵二十餘名均非駕駛大洋之船水軍又係新募未經操演何能獨當一路船小兵单勢難遠出閩海一也閩粤東西相距風信不同非比陸路可計日㑹合倘風濤阻滯彼此懸隔難以訂期夾𠞰二也且達濠南澳諸逆宻邇潮疆時竊窺伺門庭之冦未盡根株難以逺出㑹𠞰三也即如達濠諸逆可期一鼓蕩平而沿海逆賊尚有謝昌李積鳳等狂逞於廣肇髙雷諸處連䑸飄忽與鄭逆聲氣聨絡倘乘虛突犯何慿堵禦難保必無他虞四也但今奉有成命除已咨催两鎮整理船兵外臣目睹形勢若不據實披陳恐致貽誤得㫖侯襲爵既言潮碣戰船難以出洋汛守尚患不足宜停其調發可仍撥舟師作進攻狀以分賊勢十九年四月疏報將軍賚塔統兵駐潮與臣㑹商進𠞰達濠海冦分撥滿漢官兵前至馬窖夾擊臣與賚塔親臨海口水陸齊進徑奔達濠海面賊首江欽邱輝等率船百餘出磊石門拒敵我舟師奮勇直前礮石如雨賊死命拒戰我陸路兵自後山衝下夾擊左右翼滿漢官兵飛馳接應擊敗逆賊沉賊船八奪賊船五生擒偽宣尉使洪磊及賊徒三十二名陣斬偽副將二賊勢披靡我兵奪取磊石門賊復糾船二百餘拒敵我兵轉戰愈力賊且戰且退將至馬窖海面水師總兵劉顯芳督兵放礮夾攻又擊沉賊船五淹死賊徒甚衆奪賊船三并器械等物餘賊遁出外洋救獲難民一千三百餘名五月疏報達濠既平南澳逰魂膽落臣與副都統張夢吉總兵劉顯芳領各標官兵水陸並進直抵南澳島口偽將軍李榮等賊艘六十餘自深澳出蜂擁迎敵我兵鼓勇直前矢石交下逰擊周琬身先士卒斬偽副將一奪賊船官兵前後夾擊又斬偽副將二翼將一逆徒五百餘奪船四賊衆燒死及落水者無數追擊至海山口餘賊四散我兵回搗山巢拆毁礮臺三焚賊巢五計屋二千七百餘間積冦巢穴掃除净盡並得㫖嘉奬二十一年十二月調貴州提督先是滇黔厎定廷議裁兵雲貴總督蔡毓榮以恢復未乆請俟三年後裁汰並大定鎮缺兵急需募補两疏皆經部駁至是襲爵疏言裁兵之議已乆但貴州東粤西蜀南滇北楚為四省咽喉且在萬山中苗蠻繁多性嗜刦殺又向被呉逆佔據今恢復未乆人懐疑懼非重兵不足弹壓計通省經制兵二萬六千有竒防隘䕶糧各營每以汛廣兵单告今留兵二萬外裁兵六千六百有餘併家口不下萬人一旦驟減兵非土著無家可歸兼之旱災頻仍資生乏䇿勢必相聚為匪乞將各鎮應裁之兵酌撥撫標及大定鎮充補缺額無容另募其餘俟三年後照數裁完下部議從之二十七年十二月卒於官年六十有三子居廣由廕生官山東布政使楊茂勲楊茂勲漢軍鑲紅旗人父麒祥仕至鑲白旗都統順治七年選通滿漢文藝者茂勲以廕生應選授太僕寺副理事官十三年調兵部督捕右理事官明年遷吏部右侍郎十六年五月給事中楊雍建胡爾愷等疏糾吏部擬選擬陞先後互異下都察院察議削銜降革有差茂勲降二級留任十二月署河道總督十七年六月授湖廣巡撫十八年聖祖仁皇帝御極擢貴州總督康熙元年十一月疏言金筑土司王應兆以偽晉王李定國招兵為名煽誘逺近苗寨抗欠官糧合謀叛逆當亟𠞰除以示懲創十二月遣副將冶秉忠領兵由廣順州進𠞰應兆聚衆三千餘出拒敗潰退據紅巖石寨秉忠與逰擊白成功席登雲分兵攀陟山箐冐矢石攻破賊寨斬應兆并賊黨數百人其餘衆及定畨都勻各苗寨悉自訴為賊廹脇悔罪乞宥願納糧應役二年正月茂勲奏㨗下部叙功加兵部尚書銜四年六月疏言苗蠻㒺識禮義以睚眦相讐殺故黔記有曰苗家讐九世休又曰土苗連和國家之害土苗讐殺國家之利盖言以苗弱苗也治之之道與中土異凡有嘯聚刦殺自當發兵𠞰除其餘匿山箐中自相讐害者苐令頭目分辯曲直或願抵命或願賠償處置得宜俾咸帖服創懲既立亦必悔悟自新漸革舊習此坐安邉境之策也下部議行尋以裁缺召還五年授河道總督七年三月疏言昨嵗河決烟墩大溜南徙河身淤成平陸計二十里臣相度形勢先挑引河分刷水勢然後下埽堵塞決口今已全河歸道舟楫遄行疏入得㫖據奏黄河烟墩決口閉塞黄淮歸正重運無誤深慰朕懐楊茂勲赴工督率速竣黽勉可嘉下部議叙加太子少保五月疏言黄河南徙由東安入海元明以來藉為運道沙水沸騰常苦淤決每年伏秋於危險處集夫搶捄名曰嵗修此外近河則築縷隄稍近則築月隄稍逺又築遥隄附郭則築䕶城隄猶恐水勢暴横又築格隄及減水石壩以洩水勢前人良法具載紀志今沿河隄壩年乆圮壊十不存一請於農隙責成沿河州縣量雇民夫按隄修築庻免臨事張皇又清口為淮黄交㑹之所近因黄水盛漲越淮二十餘里清淮返退洪澤湖内河沙逆上倒灌運河必於天妃閘外添築長壩逼黄東行引全淮之水出清口淮黄相抵沙逐水流歸海自順又董口既被黄河倒灌似難復舊稍右為駱馬湖向因内無縴道置之今若築長隄於湖内則重運無阻而黄漲稍逺亦弗患直灌停淤矣疏下工部皆議行惟駱馬湖隄以工險費繁寢其事八月河決桃源黄家嘴諭令確勘估築八年二月工成以病乞休仍命供職六月副都御史馬紹曽疏言自黄家嘴衝決漕運稽遲特命遣官相視雖經修築而勞民傷財為累滋大皆楊茂勲不職所致豈可藉口天行况其自陳積病至云手足痿痺總河奔走河干必需精明强幹豈可令此病軀優㳺廢事是月巡䀋御史李棠亦言臣三月間經厯河壖聞河臣楊茂勲怨聲載道皇上嵗發帑金數十萬而一夫一桞仍派民間縱有發價之名究竟十不得一又德州以北河水淺涸輕舟尚不能行糧運必致遲滯乞罷斥茂勲更易幹員庻於河務有益並命茂勲明白囘奏尋奏言嵗修工程佑計發價俱遵定例從未私派累民下部免議九月詔甄别督撫大臣吏部列茂勲名以有疾上命茂勲原品致仕十四年四月察哈爾布爾尼叛勅信郡王鄂扎等率師討之授茂勲都統銜率漢軍隨征七月凱旋十五年五月王大臣請復設鄖陽撫治防禦賊冦上命茂勲任之時叛鎮譚洪等糾賊三千以巨艦據琵琶灘背山負險進逼鄖陽阻絶餉道茂勲與鎮安將軍噶爾漢副都統李林隆等議分兵兩道由江南北岸並進而以小舟運紅衣礮潛伏江汊撃毁賊船其屯據山麓賊衆陸路兵擊之敗潰追𠞰至均州斬偽總兵三擒偽副將二獲賊艦及甲馬甚多餉道復通十七年二月與提督佟國瑶㑹兵進𠞰叛鎮楊來嘉於房縣來嘉及其黨謝泗等擁衆萬餘列陣以拒我兵三路並進屢敗之復房縣追躡至香耳山斬馘及墮崖死者無算復保康縣十八年四月擢四川總督仍駐鄖陽疏言均房鎮額兵四千其餉米向由安陸鄖陽德安襄陽四府協濟而道路險阻運費浩繁莫若折價給兵較市價量為昻貴則米販雲集不煩民力而兵食可足又八旗勁旅衝鋒破敵所向無前惟山澗陡絶之處弓馬難施請多用緑旗步兵俾之攀藤附葛為大兵前驅不難直搗賊穴部議如所請行十一月諭責茂勲懦怯退縮不即規復四川十九年正月偕提督徐治都率師至巫山偽將軍王鳳岐等以萬餘衆負險自固我師奮勇奪隘大敗賊衆生擒鳳岐斬賊三千餘級復巫山復分兵復大昌大寧乘勝取䕫州譚洪率衆降八月偽將軍胡國柱等䧟納溪瀘州譚洪等復叛䕫州震動上以茂勲及領兵將軍提鎮等防禦疏怠飭令分途進𠞰十一月允兵部尚書宋德宜奏以陜西轉餉入蜀宜歸一人統理命哈占為川陜總督茂勲管四川提督事隨大軍進征雲南平還京三十二年卒馬雄鎮馬雄鎮漢軍鑲紅旗人總督鳴珮子也順治十三年由廕生授工部副理事官累遷宗人府啟心郎都察院左僉都御史國史院學士康熙八年授山西巡撫未之任改廣西巡撫時左江奸民楊其清等妖言煽衆謀不軌右江妖僧假明宗室為亂羣盗莫扶化等結獞蠻掠梧州平樂二府雄鎮悉討平之疏請定邉俸陞遷之例除兵糧運費之徵皆得㫖允行十二年逆藩呉三桂反明年二月廣西駐防將軍孫延齡叛應之殺都統王永年等刧巡撫廨署時巡撫無標兵雄鎮督家人拒戰移檄梧州趣提督馬雄率兵赴援雄遷延不至而延齡脅降甚急雄鎮自經為家人救免即以蠟丸馳疏請兵延齡詗知縶雄鎮及家屬四十餘人於别室絶食數日不死呉三桂遣使招之雄鎮麾其使誓不屈先是慶陽知府傅宏烈以豫發呉三桂逆謀坐誣謫戍蒼梧至是勸延齡反正延齡躊躇未决雄鎮遣其子世濟世永孫國楨先後由間道歸京師復疏言廣西人心不甘從逆若大軍速至可圖恢復廣西既復則三桂腹背受敵矣十六年十月三桂遣從孫世琮殺延齡擁雄鎮至賊壘誘降雄鎮大呼曰吾奉命巡撫廣西義守封疆恨不能斬汝首以報國今討賊不遂死吾分也賊戕其㓜子世洪世泰以懼之雄鎮罵益厲遂遇害從者馬雲臯唐進寳等九人咸引頸受刃時雄鎮年四十有四妻李氏妾顧氏劉氏女二及世濟妻董氏妾苗氏同日自經死幕客孫成陳文煥乘間脱走由平樂達蒼梧以雄鎮所著擊笏樓遺稿及彚草辨疑歸之世濟明年傅宏烈為廣西巡撫疏述其事聖祖仁皇帝嘉雄鎮忠烈下所司議䘏方雄鎮之遣世濟行也全州人易友亮實導之出及世永國楨之行年俱㓜賊伺之甚宻友亮復與州人唐守道唐正發謀穴垣出之雄鎮既遇害友亮收其骸骨藁葬焉至是世濟恩授大理寺少卿易友亮唐守道唐正發授遊擊守偹孫成陳文煥授同知知縣有差十八年世濟請赴廣西取父骸骨得㫖馬雄鎮當逆賊叛亂之時克篤忠貞捐軀殉難其骸骨令馬世濟馳驛徃取明年雄鎮喪至京師贈太子太保兵部尚書賜祭葬如典禮諡文毅廕一子入監李氏董氏各以夫品級予誥贈又允廣西巡撫郝浴請建雙忠祠於桂林祀雄鎮及後為逆孽呉世璠所害之巡撫傅宏烈二十一年正月宴羣臣於乾清宫以世濟為殉難撫臣子特命至御座前賜酒時世濟官光禄寺卿旋擢副都御史累遷吏部侍郎貴州巡撫漕運總督世宗憲皇帝時以雄鎮入祀昭忠祠乾隆十六年上念雄鎮為國効忠前此未有世職特予恩騎尉世襲㒺替以其四世孫陞基襲姚啟聖子儀姚啟聖浙江㑹稽人順治十六年附族人籍𨽻鑲紅旗漢軍由康熙二年舉人授廣東香山知縣八年以擅開海禁罷任十三年逆藩耿精忠據福建叛遣賊衆䧟浙江温州府城及台處二府屬縣聖祖仁皇帝命康親王傑書統師進討啟聖捐資募兵赴軍前効力委署諸暨縣同守偹何清𠞰平紫瑯山土賊十四年正月康親王疏陳啟聖勞績得㫖授浙江温處道隨都統拉哈達𠞰平松陽宣平二縣十五年八月同副都統沃申總兵陳世凱等𠞰賊石塘焚其木城斬獲甚衆乘勝復雲和縣十月康親王進征福建耿精忠降尋以啟聖為福建布政使時海賊鄭錦據漳泉興化大軍進𠞰啟聖籌偹甲胄弓矢及戰馬以供軍用十七年五月總督郎廷佐奏啟聖自擕兵千餘令其子姚儀統領隨大軍𠞰賊屢著㨗功其贍兵購馬製械先後用銀五萬餘兩皆出已貲得㫖嘉奬尋擢福建總督值賊䧟海澄長泰同安惠安平和等縣啟聖條上十疏一請調福寧鎮兵㑹同八旗兵及浙江提標兵𠞰賊泉州調衢州贛州潮州三路兵𠞰賊漳州一酌給投誠官兵俸餉以安反側一願自捐糧米增募督標兵五千一薦舉浙江賢能文武官二十員請令赴閩調遣一增價糴榖一萬石米五千石貯偹軍食一分兵防守要路設站運餉一請復設漳浦同安兩鎮總兵官一閩省經制兵舊有五萬一千七百餘名請增設一萬八百名俟賊平裁撤一嚴禁管兵官以厮役冐佔兵額一申明臨陣勝敗賞罰格以振軍心疏下議政王大臣等詳議惟衢贛潮三路兵皆在要地未便調閩又既增督標兵毋庸再廣通省經制額餘並如所請行七月啟聖同海澄公黄芳泰遣兵由永福進復平和及漳平二縣九月賊帥劉國軒等犯漳州啟聖同將軍賚塔都統沃申等率兵進𠞰大破賊於蜈蚣山復長泰縣叙功晉正一品九月遣其子儀率兵抵同安賊棄城遁追斬偽副將林欽等十月啟聖同副都統吉勒塔布提督楊㨗等敗劉國軒於江東橋又敗之於潮溝十八年正月劉國軒糾黨呉淑何佑等據郭塘歐溪頭欲斷江東橋以犯長泰啟聖同賚塔楊㨗及巡撫呉興祚遣兵邀擊大破之先後招降偽官四百餘員賊兵一萬四千餘名五月劉國軒呉淑等率賊萬餘謀奪江東橋榴山寨啟聖同賚塔石調聲擊敗之至太平橋潮溝殺賊千餘十九年二月同賚塔楊㨗石調聲督兵攻復海澄縣時提督萬正色先克海壇啟聖同賚塔及總兵趙得夀黄大來等分兵七路並進破賊十九寨又别遣將弁乘潮渡海克取金門厦門招降偽將軍朱天貴楊彪等是年叙恢復長泰等縣功晉兵部尚書太子太保二十年四月左都御史徐元文疏劾之曰啟聖自為香山知縣穢蹟彰聞革職提問永不叙用祗以逆孽變亂孑身戎行遂冐軍功驟致節鉞正當殫力竭忠以報恩遇不謂素性乖張舉措輕妄以虛詞為實事以乾沒為己貲其言欺㒺無據其心險側不平臣請畧舉數端有大可駭者大臣官員侵佔民利煌煌嚴禁而啟聖前者妄請借司庫銀十二萬两經營取利可駭者一啟聖自陳疏稱家無片瓦而以臣所聞啟聖揮霍金錢不異泥沙題報軍前捐銀十五萬两有竒此銀不從天降地出謂非尅軍餉脧民膏臣不信也可駭者二閩省民困已極啟聖不能加意存撫乃拆毁民居築園亭水閣日役千人舞女歌兒充牣房闥又強娶長泰縣鄉紳戴璣孫女為妾委其兄戴法署教官物議沸騰可駭者三海壇進師啟聖力為阻撓一則曰不敢輕舉喪師辱國一則曰不敢以封疆為兒戯及恢復海壇繼取金門厦門又言當直取臺灣其始則欲養冦其繼又欲窮兵可駭者四啟聖有卒數萬與海壇萬餘之賊相持三載不能成功乃欲令水師提督統新降之衆逺涉波濤以圖萬一之僥倖繼因詞窮理屈即自請出師漫無布置始為是語以塞人言可駭者五呉興祚萬正色平海奏功啟聖心懐慚妬跪向侍郎温岱云正色宻遣人與偽都督朱天貴約定投誠隨讓海壇而去其言尤為不根海壇賊遁之後朱天貴尚爾狂逞啟聖疏云厦門雖恢復而朱天貴實為後患則所云讓去者顯係妄造臣不知啟聖何心與驅除海逆者作難如此可駭者六總督封疆大吏乃因欲行䜛譛長跪部臣之前失大臣體可駭者七兵部據啟聖之言以為興祚等冐濫軍功頼皇上聖明洞見萬里令即行議叙自此勞臣吐氣人心莫不鼔舞克海賊者既有功則妬功者自應有罪總之啟聖恣睢放誕險詐欺誣委以巖疆甚非八閩蒼生之福乞勅部確察嚴議以為人臣譎詐行私者戒疏入命啟聖回奏尋奏言臣於康熙十七年十月進兵至鳳皇山因一時投誠者甚多犒賞不繼與撫臣呉興祚議及外省貿易頗有微息前督臣李率泰經畧臣洪承疇曾借帑為之遂冐昧上疏未蒙俞允臣等雖因公起見然不應以細事上凟宸聰臣自入任京中未有産業而軍前捐銀十五萬有竒者香山革職後貿易七年頗積微貲并臣浙江祖業變價及親朋借貸經年累月而後有此數臣視師漳南於康熙十七年七月巡邉至省見總督衙門被耿精忠屯兵居住以致拆毁倒塌臣因捐貲修整每日所用匠夫不過數十名各給口糧工價柵外有員役搭葢小房令其自行拆去至臣妾數人俱有子女年已老大並無歌兒舞女强娶戴璣孫女更無其事教官戴法乃前督臣郎廷佐批委者臣到任時戴法已署事八月矣康熙十八年十一月臣有宻陳進𠞰機宜清字一疏請水陸各分五路進兵内稱轉盼來春南風一起船隻難行又須坐守一年徒費錢糧臣彼時尚爾踴躍豈至次年輙肯遲滯且撫臣一經拜疏出師臣即㑹同將軍楊㨗親領官兵進攻烏嶼海倉併十九寨上下夾攻以分賊勢至得厦門之後即攻臺灣臣先於十八年九月有宻陳一統規模清字一疏云前得厦門棄而不守亦不再攻臺灣將船隻盡燬以致海賊復起我兵無船可用今托皇上洪福如得厦門之後即進𠞰臺灣不難破卯覆巢是臣欲攻臺灣始終如一非既得厦門方請直取臺灣也又十七年九月臣等大敗海賊於蜈蚣山實因兵單不能分取海澄觀音山等處至十月中催各路官兵到漳而賊已深溝高壘矣平南將軍臣賚塔撫臣呉興祚提臣楊㨗及臣等㑹商若止於陸路進兵斷難必勝决須水陸夾攻臣百端籌畫不敢輕舉遺誤封疆審有可取之機方敢上疏自請督師非姑為是言也侍郎臣温岱入奏之言臣得之朱天貴天貴六月到漳招撫投誠之説天貴言之而後臣知之總之撫臣提臣拜疏出師則平賊之首功已定臣何所容其慚妬乎温岱曽云總督提督俱要和𠂻臣因望闕跪誓不肯負恩豈跪部臣乎總之臣任閩三載雖無妬功之心實有溺職之罪伏祈勅部嚴加議處另簡賢能庻臣心安而臣心白矣疏入報聞下部知之二十一年二月叙恢復海澄克取金門厦門功予騎都尉世職加一雲騎尉時鄭錦已死子克塽仍其偽爵稱延平王凡事皆决之劉國軒等遣人齎書願稱臣入貢不薙髮登岸如琉球髙麗例啟聖以奏上不許諭趣水師提督施琅進征二十二年六月施琅擊敗賊衆取澎湖八月啟聖至澎湖經理糧餉是月施琅定臺灣鄭克塽劉國軒等皆降啟聖還福州十一月卒年六十明年九月部議啟聖修理船隻軍械浮冐帑金四萬七千两有竒應追繳上以啟聖素著勞績免之長子儀初以捐納知縣從征福建康親王以遊擊委用同安之㨗啟聖奏其督戰有功下部議叙以員外郎用遷郎中應出為知府命仍以京官用部議應授五品京堂上以儀才幹素優且願以武職自効改都督僉事以總兵官用二十二年正月授江南狼山鎮總兵官至是襲職歴杭州沅州鶴麗諸鎮總兵三十四年十月擢鑲紅旗漢軍副都統明年卒賜祭葬如例子法祖襲職于成龍于成龍漢軍鑲紅旗人康熙七年由廕生授直𨽻樂亭知縣八年署灤州知州以罪囚脱逃降調樂亭民列其善政叩閽籲留部議保留叠經飭禁械為首者繫獄九年二月縣民再叩閽下巡撫金世德察奏所列善政皆實復縣任十三年六月以緝盗逾限未全獲應降調金世德疏言樂亭舊號疲邑成龍撫綏調劑與民相宜可否留任部議不准得㫖于成龍撫綏疲邑與民相宜准其留任十八年擢通州知州二十一年直𨽻巡撫于成龍遷两江總督疏薦其可大用尋又請敕廷推清操乆著與相類者為江寧知府上即擢成龍任之二十三年十月上南巡至江寧傳諭曰朕在京師聞爾居官亷潔今臨幸此地確加咨訪與所聞無異用賜親書手卷以嘉爾清操十一月擢安徽按察使駕還京賜其父原任㕘領于得水貂裘奬其教子有方又諭八旗都統侍郎諸臣有子弟官外者各貽書訓勉效成龍之潔己愛民二十五年三月擢直𨽻巡撫瀕行賜銀千两表裏二十端諭詢畿輔重地利弊應興革者宜何先成龍奏弭盜為先奸惡之徒倚仗旗下名色窩藏匪類有司明知而莫敢深究嗣後有如此者臣當執法治之既抵任疏言弭盜之方在力行保甲今民間己申飭遵行惟旗下莊屯向不屬州縣管轄本旗統領官逺在京城僅有撥什庫在屯未能約束今應令旗人與民戸同編保甲以撥什庫與鄉長互相稽察無論盜所刦之家是旗是民俱協力救䕶能擒獲者給賞如窩盗縱盗許州縣官詰訊申報又疏言燕山六衛所轄遼濶與州縣不相統屬遇有賊盜止責汛弁緝拏而衛員漠不闗心此賊盜所以充斥也請嗣後以衛地近州者歸州近縣者歸縣則保甲易編匪類易察京東之通州西之蘆溝橋南之黄村北之沙河宜設捕盜同知四員分駐其地自守偹以下分汛各官徼巡燉臺諸務及旗下莊屯悉歸稽察則武弁有所顧忌旗下亦受約束矣疏並下部議行先後察究武清易州等處怙惡不悛之旗人請㫖寘諸法又疏言順德廣平大名等府額觧狐皮花絨芝蔴運送費多恐借端苛派請改觧折色又言河工嵗修派夫應令旗地與民地一體計畝均役下部議格於例並得㫖如所請行二十六年四月上以成龍亷能稱職誠心愛民特㫖嘉奬加太子少保十月巡行畿甸賜鞍馬並銀千两十二月奉詔同山西巡撫馬齊徃鞫湖廣巡撫張汧貪欵得實論罪如律二十七年三月囘任初成龍任安徽按察使靳輔為河道總督大治淮黄隄壩上以其未能兼顧下河敕成龍督理之遇事得自陳奏成龍請濬海口故道靳輔請於下河築長隄束水注海上召詢籍𨽻淮楊諸臣奏宜從成龍請工部尚書薩穆哈奉命徃問居民還奏百姓僉謂濬海口無益大學士九卿議未决成龍遷巡撫以侍郎孫在豐督理下河靳輔奏開中河以便漕運又請於髙家堰外増築重隄束水北出清口則下河不濬自治上以疏示成龍成龍奏下河宜濬重隄不宜築開中河無益反為民累上允靳輔開中河遣尚書佛倫侍郎熊一瀟同總督董訥總漕慕天顔㑹勘增築重隄事佛倫等還奏宜從靳輔請慕天顔孫在豐御史郭琇相繼劾靳輔興屯累民靳輔亦劾慕天顔孫在豐附和成龍朋謀阻撓至是成龍自湖廣還召同靳輔入對靳輔言開濬海口有海水倒灌之患成龍奏若築髙家堰重隄縱上流之水不來而秋霖暴漲天長六合等處之水洩歸何處故海口仍應開濬上罷靳輔任以福建總督王新命代之别遣部臣代孫在豐五月學士開音布侍衛馬武閲中河還奏商賈舟行不絶漕運可通又劾慕天顔前次禁止堵塞支河勒令已進中河漕船退囘有意阻撓命逮慕天顔鞫問得成龍寄書令勿順從靳輔狀議削成龍太子少保降二級調用得㫖留巡撫任二十八年正月從上閲河同侍郎徐廷璽徃視下河還奏串塲河已興工挑濬自丁溪場至白駒場有通海之處三滔子竈上又有歸入丁溪之馮家壩小河宜加挑濬俾河垜之水由丁溪入苦水洋從之是年畿輔旱詔𤼵帑金三十萬兩賑濟成龍疏言兵丁仰藉月糧今歳米豆騰貴請加給折色之半又言旗下莊屯貧户及未成灾州縣貧民請酌議賑䘏又言長蘆鹽引前以軍興需餉加増有壅積未銷者請豁免徵課並得㫖俞允二十九年正月以部推井陘道甘文煐乆不赴任奏薦湖廣知府武廷适戴夢熊王輔請簡補諭責以收羅别省官員之心破壊定例不准行七月疏請增設通州昌平順義及榆林土木各驛馬匹大名府通判舊二員移一員駐古北口管理驛務移宻雲縣丞駐石匣腰站並下部議從之是年内陞左都御史兼鑲紅旗漢軍都統三十一年二月王新命為山東巡撫佛倫所劾罷靳輔仍復任十二月靳輔卒成龍任河道總督三十二年五月疏言靳輔令河員領帑購買桞束工部駁減銀一萬八千两令覆核並無虛冐又言靳輔興築髙家堰重隄豫給夫役銀四萬四千餘两王新命一再題銷工部以非例飭追實因向來募夫逺方悉給安家路費工完扣抵故無豫給之名此重隄工作中止未經扣抵今訪察豫給是真無從追繳詔並予豁免三十三年正月奉召至京疏言運河自通州天津至山東嶧縣卑薄各隄宜加築髙厚武清八百户等處宜増建月隄黄河自滎澤縣至江南碭山縣卑薄各隄均宜加築髙堰六壩周橋大壩永安西隄均宜改建石工其毛城鋪等處舊有引河宜疏濬深通檀度寺東隄及茆家圍等處挑挖引河即以所挖之土増築两岸束水子隄徐州城石岸急應大修清江浦迤下至黄浦東西两隄寳應至江都東隄髙郵西隄俱需加築並修葺閘壩㴠洞又疏言河防各設専員庻無顧此失彼之虞天津道有地方職掌應增設两道一駐河西務一駐滄州分管北自通州南至德州河務江南河工錢糧向分㕔庫收支不屬淮徐淮揚两道職掌應増設河庫道桃源同知現駐南岸應增北岸同知一邳睢同知宿虹同知現皆駐北岸應增南岸通判各一山陽清河舊設同知一應增一員分管两縣毛城鋪閘壩𦂳要徐屬同知難以兼顧應增通判一駐碭山縣又疏言河工所費繁多非開捐例不可但銀數太多則無力者裹足不前徒有開例之名仍無濟工之實今仿陜西賑饑事例酌量增減另行條例庻㡬援納者衆工程得及時興舉尋命同九卿科道入諭詢捐納無累百姓否成龍奏可保無累上曰前所行捐納事例或因軍需孔急或因拯救災民銀米不能即至其地為一時權宜之計至修理河工錢糧並非難於措處豈可遽行捐納捐納之人豈盡殷實大約稱貸者多不脧削百姓則逋負何由而償且居要津者不給銀而虛冐捐納亦復不少陜西所捐銀两現今多有虧空朕從寛未究是皆有司不能擯絶情面囑託所致若不取償於百姓何以補其缺額如此而云無累百姓可乎成龍奏皇上憂勞百姓屢𤼵帑金百餘萬賑濟陜西且次第蠲免各省錢糧動至數百萬臣愚拙無知因河工費用浩繁請開捐納兹䝉聖諭切指情弊臣冐昧陳奏之罪奚辭上曰爾向日議河工事曾面奏減水壩宜塞不宜開今果可塞乎成龍奏曰臣彼時妄言今亦照靳輔而行上命大學士以成龍所奏令九卿詳議尚書薩穆哈等議河道大修歳修理應陸續題請今以數千里工程欲一時盡行興舉因請添設道員同知通判等官又條列捐例凡革職年老患病休致之人及布政使大員概許捐復俱未協事宜懐私妄奏應革職得㫖從寛留任仍興舉𦂳要各工七月疏言洪澤一湖宻近淮城為淮睢二凟所滙歸伏秋水𤼵波濤澎湃僅恃髙堰土隄雖加築堅固仍須歳修搶修急宜改建石工所有六壩及自小黄莊起至古溝東涵洞止共估工料銀五十萬两有竒疏下部議從之三十四年八月以督理河務勤勞復原職旋丁父憂囘京奏山陽縣龍王閘修造尚遲五空橋及檀度寺應建閘通運髙堰石工應開武家墩及楊家廟等壩運料事並下新任總河董安國即行三十五年二月上親征噶爾丹統師由中路進先期以侍郎王國昌督運撫遠大將軍費揚古西路軍糧成龍以左都御史銜同侍郎李鈵左通政喀拜督運中路軍糧兵丁各裹糧八十日八十日外給以成龍所運四月成龍詣格德一爾庫御營奏運正項米一萬九千石多齎八千石遵㫖酌留各驛五月丙辰朔駕次拖稜成龍奏直𨽻第一運至第六運已過第十五站格德爾庫地山東省第一運已過第十二站蘓勒圖地詔以後運之六七千石留拖稜偹旋師之用癸亥駕至克嚕倫河噶爾丹驚竄上率前鋒軍追之五日至拖諾山計軍糧日期將滿而成龍所運未至乃以内大臣馬思喀為平北大將軍率輕騎褁二十日糧追𠞰止留扈從御營兵糧七日戊辰西路軍大破噶爾丹於昭莫多上旋師至拖稜成龍始至命留駐散給諸路軍糧六月遵㫖移駐察罕諾爾收貯科圖等處餘糧八月事竣還京九月上巡行北塞察視軍情命成龍偕李鈵喀拜先赴歸化城督理糧務十月駕至歸化城諭曰爾等前此遲悮罪在不赦今許爾等効力自贖成龍因與李鈵喀拜王國昌等各自偹駞數十以供挽運又自偹駞馬車輛運呼坦和朔倉米一千五百石至喀喇穆倫復助馬塘站十一月駕過鄂爾多斯之哲固斯臺將旋蹕命成龍與李鈵等分駐各站辦事十二月還京三十六年正月詔再親征噶爾丹成龍請從征効力命同王國昌李鈵等先徃寧夏督運軍糧奏請以旗員及情願効力人分管押運派鄂爾多斯兵牽駞負載並以理籓院司員隨行上皆允所請召問何日起行成龍奏俟効力人員同行諭戒前者因待衆遲誤毋再瞻顧他人致已獲罪閏三月自寧夏用船起運牽馬駞至第十站白塔接運從陸駕過白塔二十五里駐營七日大將軍費揚古偵報噶爾丹竄死上旋蹕成龍奉詔督運三之一赴費揚古軍餘留貯所至各站尋又運囘諸路餘糧於船站貯用乃還詔免議遲運前罪仍議叙如部議加四級復特予騎都尉世職三十七年二月命以總督銜管直𨽻巡撫事三月興修永清固安至張協七十里舊隄挑濬渾河淤沙十旬竣工詔錫名永定河建廟以祀奏設南北两岸分司各一以重責成視黄運两河之例敕部擇諳練河務之候補候選人員赴工効用七月疏言賛皇縣地處重山界連三省乆為賊藪近遵恩諭勸導自新已相率歸誠而防緝不可無兵應設馬兵四百以守偹千總各一把總二轄之又言固闗舊設馬步兵七百餘名叠經裁汰抽調止存三之一應移王家坪裁存馬兵九十名𨽻固闗㕘將増設千總把總各一疏下部並從之十一月疏言駐防滄州滿洲官兵三百二十六員名歳需粟米七千二百八十餘石從前截漕支給近因部議不准截漕以本州額徵粟米撥給僅得其半餘皆採買隣封市價低昻無定運費贏縮無常每誤二八两月支放之期請自明年仍循舊例截漕支給為便疏下户部不准特㫖如所請行是月董安國以不諳河務罷任仍授成龍河道總督諭大學士九卿曰于成龍屢委以事尚克勉効河工須相機料理所與敕書可入各部不得掣肘語三十八年三月上巡閲髙家堰歸仁隄等處以增築疏濬事宜諭令籌辦五月疏言黄運两河舊派徐州屬邑民夫六千九百餘名助河兵供役率以老弱充數且多逃曠請按派夫舊額改令每名徵銀五两為添設河兵月糧又疏言皇上親視河工指授方畧大為修治臣以需帑浩繁請許急公人員捐修䝉諭如果修築堅固疏濬深通告成之日自有議叙仰見聖心寸功必酬現在應修之處不一若不酌定成例恐効力人員觀望不前謹條列計丈議叙各欵疏並下九卿議行九月以疾乞假命在任調理三十九年三月卒遺疏至得㫖于成龍才品優長服官勤慎屢經簡任實心辦事不辭勞瘁宣力有年歴著成效前因患病遣醫前徃診視方期痊可兹聞溘逝深為軫悼下部優䘏賜祭葬諡曰襄勤子永世襲騎都尉世宗憲皇帝雍正八年以成龍入賢良祠欽定八旗通志卷二百四
