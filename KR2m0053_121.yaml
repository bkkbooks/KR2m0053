body:
  text: 選舉志六八旗科第題名四厯科編譯進士乾隆四年己未科滿洲三寶世泰佐領名正紅旗一德爾泰竒格佐領海齡保成佐領索祿保住佐領旗三名以上鑲白富森布滿福佐領名鑲紅旗一錫爾璊增祿佐領阿華阿福佐領旗二名以上正藍增福隆德佐領雙圖永恆佐領武倫布色勒明阿佐領卓麟文德佐領旗四名以上鑲藍蒙古端朱克善福佐領名鑲黃旗一和著阿延泰佐領依升阿阿延泰佐領二名以上正黃旗乾隆十年乙丑科滿洲五諾璽德惠佐領名正紅旗一圖拉雙德佐領勒爾謹那善佐領舒寧安白達色佐領博文五雅圖佐領四名以上鑲白旗四達德生佐領依蘭泰德隆佐領旗二名以上鑲紅七達色阿福佐領薩哈産海慶佐領旗二名以上正藍格圖懇朝克托佐領玉林滿祥佐領旗二名以上鑲藍蒙古額爾清額色欽佐領佛爾清額色欽佐領旗二名以上正黃乾隆十三年戊辰科滿洲德賢覺羅岱成佐領國鼐覺羅岱成佐領名以上鑲黃旗二孝順阿蘇隆阿佐領正黃旗一名永安伊里布佐領永泰珠爾杭阿佐領西通額珠爾杭阿佐領名以上正白旗三成善額爾成額佐領赫齡查哈立佐領傅爾瑚納巴什佐領佟豫成方佐領旗四名以上鑲白武敬海福佐領九格海慶佐領官福多善佐領旗三名以上正藍蒙古明福萬舒保佐領正黃旗一名舒明穆通阿佐領鑲藍旗一名漢軍李吉人柯藩佐領名鑲紅旗一乾隆十六年辛未科滿洲文敏吉勒通阿佐領正黃旗一名武霖布德儀佐領辛昌瑪隆阿佐領二名以上鑲紅旗寧舞立禧住佐領傅勒赫五十九佐領兆坊成德佐領旗三名以上正藍蒙古明安圖常舒保佐領鑲白旗一名漢軍王承基趙玉衝佐領正黃旗一名乾隆十七年壬申科滿洲清額鄂通務佐領額爾景額圖必赫佐領德義常亮佐領關倫富爾敦佐領四名以上鑲黃旗富德常寧佐領名正黃旗一伊琳雅呼爾達佐領鑲白旗一名揆格富海佐領名鑲紅旗一琮玉海慶佐領佟國河達郎阿佐領覺羅永會覺羅育昌佐領諾穆親巴克坦布佐領名以上正藍旗四蒙古萬福祿雅滿泰佐領正黃旗一名漢軍張烈馬煋佐領名正黃旗一薑凰趙永麒佐領鑲紅旗一名乾隆四十四年己亥科滿洲文英福爾敏佐領鑲黃旗一名木通阿富常保佐領正黃旗一名存住恆安佐領名正藍旗一蒙古富俊萬舒保佐領正黃旗一名八旗科第題名五厯科翻譯舉人雍正二年甲辰科滿洲瑪興阿馬爾屯佐領常海馬爾屯佐領二名以上正黃旗覺羅雅爾哈善覺羅伊頓佐領正紅旗一名胡德平珠佐領伊通阿伊克坦佐領多泰包衣老哥佐領名以上鑲白旗三雅爾布卑鼐佐領赫慶豐愛佐領旗二名以上正藍蘇納海增夀佐領名鑲藍旗一雍正四年丙午科滿洲來成德吉當阿佐領傅爾漢吉當阿佐領索祿喀爾吉佐領三名以上正黃旗楊阿布那延泰佐領德成德音佐領永安特痕佐領旗三名以上正白成貴圖克善佐領六格包衣李宏勳佐領以上鑲白旗二名常鈞碩麟佐領名鑲紅旗一僧保那敏佐領名正藍旗一蘇章阿法三佐領名鑲藍旗一雍正七年己酉科滿洲常德岱豪佐領名鑲黃旗一安翼覺羅永福佐領正黃旗一名傅起覺羅圖爾德赫佐領正紅旗一名傅夀德爾圖佐領竒爾薩朱海佐領旗二名以上鑲白布蘭泰尼出赫佐領鑲紅旗一名玉璋包衣必立哥圖佐領正藍旗一名台敏富彌善佐領薩寧阿哈脫佐領台柱富彌善佐領三名以上鑲藍旗蒙古小格勒圖佐領名鑲黃旗一漢軍郭士璽王璽佐領名正白旗一曹瑞柯明竒佐領鑲紅旗一名雍正十年壬子科滿洲覺羅查進泰覺羅九海佐領李之琳包衣三格佐領名以上正黃旗二僧保住鄂里善佐領永善金圖佐領德明何德佐領永寧覺羅和麟佐領名以上正紅旗四來瞻雙德佐領七十八富德佐領瞻泰德爾弼佐領託恩多包衣色享額佐領色爾分包衣色亨額佐領以上鑲紅旗玉名輔格福寧佐領福基朝岱佐領旗二名以上鑲藍蒙古多爾技徒薩圖佐領鑲黃旗一名漢軍張世爵馮瀚佐領名鑲白旗一金璜金芝洪佐領鑲紅旗一名雍正十三年乙卯科滿洲胡爾鼐摩岱佐領傅傑賽弼漢佐領賽音布賽弼漢佐領常遜德新佐領旗四名以上鑲黃蘇赫臣布占佐領菴誠覺羅永福佐領福泰索柱佐領福成包衣賽克圖管領何昞忠包衣六格管領名以上正黃旗五那啓泰權寶佐領名正白旗一寶寧依蘭泰佐領孫琦包衣鈎勒分佐領以上正紅旗二名阿克敦江柱佐領誠格齊龍佐領旗二名以上鑲白溫福增夀保佐領良格富爾遜佐領輔德色里佐領輔鼐色里佐領富躬富爾遜佐領五十九增福佐領旗六名以上鑲紅善福哈哈佐領錫爾璊希柱佐領旗二名以上正藍辨塔哈明福佐領積行明圖佐領覺羅懷玉覺羅德進佐領增福額增額佐領卓林丹桂佐領旗五名以上鑲藍蒙古専圖那爾賽佐領正黃旗一名巴彥圖明祿佐領名鑲白旗一六十五索諾穆拉什佐領正藍旗一名漢軍曹珵陳柱佐領名正黃旗一魏象乾孟經祖佐領張育靈孫元起佐領二名以上鑲紅旗乾隆二年丁巳科滿洲富起福泰佐領名正紅旗一富森布滿福佐領名鑲紅旗一蒙古成憲兆臨佐領名正白旗一安泰舒明阿佐領正藍旗一名漢軍劉錕張履廷佐領祖德彛假如彬佐領二名以上正黃旗金坤趙永恆佐領孫法祖孫孝亷佐領金培趙永恆佐領三名以上鑲紅旗乾隆三年戊午科滿洲三寶世泰佐領名正紅旗一懷玉復興佐領志信覺羅永祿佐領伊立布客山佐領蘭昌常在佐領木奚岱祁車布佐領鄂賚舒禮布佐領霍龍鄂巴希納佐領靈圖包衣畢立克圖佐領以上正藍旗七名增祿隆德佐領名鑲藍旗一蒙古端珠克善清佐領名鑲黃旗一富昌常舒保佐領明泰穆爾太佐領二名以上鑲白旗漢軍靳光謙郎萱佐領名鑲黃旗一沈鎧慶長佐領名正白旗一趙宗源鮑桂佐領盛國琳邉從禮佐領二名以上正紅旗郭世俊祖守忠佐領鑲白旗一名柯仁董魁佐領羅綱髙顯祖佐領二名以上鑲藍旗乾隆六年辛酉科滿洲興泰覺羅舒寧佐領正紅旗一名伊蘭太德隆保佐領覺羅德忠覺羅伊勒圖佐領以上鑲紅旗二名照貴扎布喜佐領諾穆親永常佐領九格蘇昌佐領七達色三哥佐領三常永常佐領常雲巴彥布佐領六名以上正藍旗蒙古達色噶爾圖佐領常明明保佐領旗二名以上正黃漢軍范宜定范建中佐領鑲黃旗一名石綸明德佐領張宏渶殷世林佐領二名以上正白旗李致和崔浩佐領名鑲白旗一員景文張東聰佐領鑲藍旗一名乾隆九年甲子科滿洲臣福覺羅保寧佐領正黃旗一名諾璽德惠佐領名正紅旗一勒爾謹德文佐領名鑲白旗一武霖布德儀佐領名鑲紅旗一薩哈産蘇昌佐領查士林親佐領奉和覺羅永祿佐領穆特布索柱佐領阿必達薩克薩哈佐領寧古立禧住佐領佟國河佟世屏佐領達哈練永太佐領旗八名以上正藍玉麟滿祥佐領明圖福伸佐領格圖懇朝克托佐領三名以上鑲藍旗蒙古明全明志佐領名鑲黃旗一和珊明保佐領名正黃旗一同古布扎納佐領正白旗一名漢軍髙而恭劉承鑄佐領正紅旗一名張應楷薑廷元佐領額爾謹盧榮佐領旗二名以上鑲藍乾隆十二年丁卯科滿洲彰保多永武佐領鑲黃旗一名孝順阿蘇隆阿佐領文敏吉勒通阿佐領英德蘇隆阿佐領薩載德明佐領保太覺羅保寧佐領富德常寧佐領旗六名以上正黃永安伊里布佐領永泰珠爾杭阿佐領西通額珠爾杭阿佐領佟昌克蒙阿佐領四名以上正白旗哦爾登布德慶佐領名正紅旗一英明寧住佐領齊格勒福佐領穆特布來泰佐領明善覺羅六十保佐領寧泰吳明額佐領法雲那善佐領吳爾勒阿克敦佐領愛星阿德文佐領僧特包衣白子管領名以上鑲白旗九達爾吉善武臣佐領瑚雅善保林保領旗二名以上鑲紅兆坊咸寧佐領邏庚宗室亷祿佐領琮玉海慶佐領富克禪國昌佐領文爣全起佐領傅勒格阿木昌阿佐領官福多善佐領旗七名以上正藍達蘇圖敏佐領名鑲藍旗一蒙古明福萬舒保佐領正黃旗一名富成順德佐領名正紅旗一伊爾敦扎隆阿佐領鑲白旗一名賈祿巴梁佐領伍明阿哈豐阿佐領二名以上鑲紅旗舒明穆通阿佐領鑲藍旗一名漢軍馬昌言郎思亷佐領盧岱得麟佐領旗二名以上鑲黃王承基趙玉衡佐領正黃旗一名王進亨王東忠佐領邱岱竒車布佐領二名以上鑲白旗李吉人柯藩佐領薑凰趙永麒佐領二名以上鑲紅旗佟世衡官祿佐領張永烈楊明佐領旗二名以上正藍乾隆十五年庚午科滿洲富德常福佐領色明阿隆福佐領薩欣德明佐領呈格伊吉素佐領四名以上正黃旗胡保瑪興阿佐領鑲白旗一名辛昌馬隆阿佐領鑲紅旗一名蒙古七郎阿富沖阿佐領蘇朱克圖富沖阿佐領二名以上正黃旗色楞富森布佐領正藍旗一名漢軍張烈馬煋佐領趙鍈陳元瑛佐領二名以上正黃旗乾隆十七年壬申科滿洲覺羅得福聖保佐領白清額鄂通務佐領噶爾必善常玉佐領覺羅阿爾賽聖保佐領董翰阿彌爾圖佐領名以上鑲黃旗五薩敏德明佐領巴尼渾覺羅奉泰佐領名以上正黃旗二佛尼音富克吉善佐領西蒙額瑪興阿佐領百嵗包衣德敏佐領名以上鑲藍旗三蒙古濟綬伍郎塔布佐領正藍旗一名漢軍伊爾登額正藍旗一名乾隆十八年癸酉科滿洲富昌德寧佐領蘇楞厄果興阿佐領富勒琿賽炳阿佐領達靈阿朱隆阿佐領四名以上正黃旗照玉德山佐領名正紅旗一寧安索青佐領名鑲白旗一得倫克升阿佐領西拉布阿拉密佐領富隆常百佐領額爾謹海存佐領旗四名以上正藍圖永明禧佐領布勒庫安慶佐領旗二名以上鑲藍蒙古特克慎關誠保佐領堆器長泰佐領旗二名以上鑲黃額爾克圖富山佐領名鑲白旗一關住舒明阿佐領正藍旗一名漢軍陳元玫德寧佐領名正黃旗一乾隆四十三年戊戌科滿洲文英福爾敏佐領鑲黃旗一名木通阿富常保佐領達桑阿永德佐領志善志福佐領經文覺羅奉泰佐領佛爾清額額爾登保佐領名以上正黃旗五德慶雙慶佐領德象雙慶佐領佟保希智佐領旗三名以上正黃􅌢光開昌阿佐領鑲白旗一名塔青阿塔明阿佐領鑲紅旗一名國布亨和升額佐領吉齡達郎阿佐領都隆阿固寧阿佐領福炳伊林泰佐領存住海慶佐領岱明阿風林佐領豐伸富爾松阿佐領寧順包衣七達色佐領以上正藍旗八名嵩年達春佐領常興富明阿佐領式奎衡山佐領恆麟隆德佐領德太滿祥佐領旗五名以上鑲藍蒙古台斐音景文佐領和柱文恆佐領旗二名以上正黃法克進伍格佐領名正紅旗一阿萬大史那爾松阿佐領鑲白旗一名德通常春佐領名正藍旗漢軍孫良貴那彛佐領名鑲黃旗一薑斌左濤佐領名正黃旗一乾隆五十二年丁未科滿洲那蘇泰哈豐阿佐領宗山嵩山佐領明福德明佐領旗三名以上正黃玉慶安福佐領盛泰扎爾漢布佐領名以上正黃旗二文亮阿巴德佐領寧靜伊昌阿佐領二名以上鑲白旗同麟福慶佐領富來定成佐領廣善恩全佐領祥明保林佐領富忠文林佐領富祥文林佐領旗六名以上鑲紅官德永德佐領阿祿鄂爾必圖佐領名以上正藍旗二兆麟隆德佐領名鑲藍旗一蒙古明昌明福佐領菩薩保興德佐領旗二名以上鑲黃文善保富寧佐領名鑲白旗一德山巴金泰佐領永祥多隆武佐領吉爾格圖伍郎塔布佐領名以上正藍旗三漢軍張掞張持佐領名正紅旗一玉慶郎永德佐領鑲紅旗一名乾隆五十七年壬子科滿洲尚霖德義佐領名鑲黃旗一安永貴書佐領名正白旗一厄忒布覺羅金良佐領烏爾棍布舒敏泰佐領伊爾洪阿保成佐領旗三名以上正紅興祿覺羅托永武佐領松山愛隆阿佐領舒常安卓充遜佐領三名以上鑲白旗七郎阿嶽喜佐領廷璧包衣孫榮佐領名以上鑲紅旗二松長包衣商安佐領正藍旗一名蒙古占柱果興阿佐領正黃旗一名克什布佛保住佐領正黃旗一名萬舒常春佐領名正藍旗一漢軍韓清張永照佐領正藍旗一名翻譯蒙古舉人題名雍正十年壬子科蒙古福德六十佐領名鑲白旗一花亷泰黑達色佐領鑲紅旗一名雍正十三年乙卯科蒙古達爾扎色爾布佐領鑲黃旗一名烏龍阿福夀佐領伊升阿諾爾賽佐領永魁永德佐領旗三名以上正黃常有阿林佐領星格布存住佐領旗二名以上正紅乾隆五十七年壬子科蒙古雙善富爾松阿佐領阿昌阿額爾德呢佐領名以上正藍旗二欽定八旗通志卷一百七
