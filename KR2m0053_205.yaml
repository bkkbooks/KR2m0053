body:
  text: 欽定四庫全書欽定八旗通志卷一百九十一人物志七十一大臣傳五十七漢軍鑲黄旗三范郎廷相閻石調聲王繼文承勲興邦祖良璧興永朝髙其位年遐齡郎廷相郎廷相漢軍鑲黄旗人父熙載以軍功授三等輕車都尉崇徳元年卒長子廷輔襲次子廷佐仕至江南江西福建總督自有傳廷相其三子也由監生授欽天監筆帖式順治十一年遷宗人府副理事官十二年補佐領十三年閏五月遷刑部理事官十一月擢河南右布政使康熙二年調四川左布政使八年命為河南巡撫九年疏言宋儒程顥程頤裔有世襲五經博士二員流冦亂後絶襲查有程顥嫡裔程宗昌程頤嫡裔程延祀應請襲從之十一年丁母憂回旗守制十四年服闋授江西巡撫尋定逺大将軍安親王岳樂軍前奏以江西布政使佟國正授巡撫上諭廷相候補是時逆藩耿精忠據福建反廷相兄廷佐奉命總督福建道梗駐浙江金華隨康親王傑書督理軍務十五年六月卒於軍上即擢廷相為福建總督㑹精忠降餘黨已平而海㓂鄭成功山賊朱寅屢犯郡縣十六年八月同提督段應舉副都統瑚圖𠞰朱寅偽将軍李復貴於同安大破之生擒復貴九月同總兵魏茂等𠞰賊長泰縣天柱山戮三百餘擒成功偽副将孫宫其偽總督林鳯等俱竄進勦東埭塔潭等處戮偽将軍吳田賊逺遁十月朱寅勾海㓂刼掠勢甚張廷相遣海澄鎮總兵官黄藍等㑹大兵分三路進𠞰至灌口揚坑大敗賊衆奪營七陣斬千餘擒寅偽将謝良楊徳等六十餘人十七年三月疏言海澄為漳泉門户今海逆登岸竊據玉州等寨復分路犯石瑪江東橋諸處臣同副都統瑚圖海澄公黄芳世議發滿漢兵往援但漳属地廣兵單防禦難周請𠡠康親王發兵援𠞰得㫖海賊分路侵犯宜亟發援師大将軍康親王速増遣大兵與郎廷相黄芳世協力固守漳州海澄諸處𠞰滅海㓂閏三月朱寅復擁衆數萬據天寶山㫁我餉道廷相遣兵同芳世進𠞰連敗賊衆斬偽提督楊寕等三十六人擒賊弁百二十餘陣斬二千九百餘級奪營二十四四月疏奏海冦勢日熾結聨山賊互相應援臣標兵止二千五百所在告警不敷調用請増兵二千五百設五營統轄以資𠞰禦從之時賊黨尚衆出沒不常屡敗復至五月上以廷相庸懦無才不能速殄逆㓂有負簡用著觧任二十五年命管理船厰事務二十七年卒石調聲石調聲漢軍鑲黄旗人初任佐領順治十一年隨靖南将軍珠瑪喇征廣東破李定國兵于珊洲以功授雲騎尉遷恭領駐防福建尋調蘇州協領康熙四年撤蘇州駐防回京仍補恭領十年七月授杭州副都統十三年四月逆藩耿精忠叛時調聲同副都統沃申守江山縣為賊将馬九玉所䧟退保衢州康親王傑書檄守金華九月賊将陳重結土㓂據金華之鄭店調聲同副都統瑪哈達副将陳世凱擊賊乘賊渡水夾擊之大獲燬賊巢二十餘十月凌霞渚奸民朱毛頭聚衆叛受偽職調聲同沃申擊散賊衆斬首千餘賊将葉鍾蒋魁陳遙等分據浦江義烏肆掠調聲同世凱及總兵李榮先後剿擒其黨凌汝經又同瑪哈達擊賊于朱磯頭斬賊将朱陳梅和尚擒獲無筭十一月同台吉察渾敗賊将申時尚趙大玉于竹園村擒其黨徐瑞十四年十一月擢浙江提督十五年五月賊犯定闗守備方俊密獻城約賊三路來攻謀洩調聲擒斬之同水師提督常進功固守定闗六月賊䧟象山縣據石門西溪二嶺調聲進敗賊于缸窑追至黄墩分兵奪石門西溪復象山十月遣遊擊桞星沿海設伏破賊于太清澳斬偽官楊家益㑹康親王大兵已㧞江山常山進攻福建精忠詣軍門降調聲招撫沿海偽官張鴻翼林衝楊四等百餘人浙江平十七年五月海賊鄭錦遣其将劉國軒吳淑急犯海澄康親王疏令調聲選兵三千往援詔趣之未至而海澄䧟康親王令調聲守恵安七月賊圍同安副都統雅大力棄城走賊遂圍泉州調聲退兵興化恵安亦䧟八月調聲同恭賛大臣副都統禪布援泉州由楓亭大路攻賊巢復恵安追敗賊于洛陽橋賊遁泉州圍觧十一月同沃申攻江東橋破賊寨賊敗走調聲因督修浮橋通漳泉路十八年五月劉國軒等復奪江東橋桞山寨㫁我粮道将軍賚塔􅊾調聲等逆擊于太平寨敗之十一月賊復自鰲頭山窺江東橋調聲同福建提督楊捷迎擊賊遁十九年大軍復海澄賚塔令調聲同楊捷乘勢復厦門金門賊遁出大洋康親王班師調聲回浙江任二十一年追議調聲前失䧟江山恵安未收官兵骸骨罪革提督及雲騎尉二十七年卒王繼文王繼文漢軍鑲黄旗人由官學生考授宏文院編修順治十一年遷兵部督捕副理事官十二年考選御史巡按陜西初入境即恭布政使黄紀興屯道白士麟貪汚不法詔革職逮問十四年回京都察院考覈繼文任内共糾劾文武官四十餘員督開荒田七千頃有竒招徠流移民五千八百餘察出虚冒錢粮七千七百餘兩寔心任事善政最多允為稱職得㫖照例陞用授户部郎中十八年出為江西饒九南道康熙三年調浙江寕紹台道六年裁缺十三年以候補道隨左都御史多諾等往湖北荆州督大兵粮餉十月授雲南布政使隨軍進征二十年六月擢雲南巡撫經理新復地方八月疏言滇省迤東西相距遼逺向設守巡道八員康熙六年裁併今大兵雲屯軍糈𦂳要請復設臨元道一員駐臨安兼轄澂江廣西廣南元江開化等府洱海道一員駐楚雄兼轄姚安武定景東等府下部議行十月上以中甸要地逺在金沙江外並無専汛命繼文同大将軍彰泰等酌撥緑旗官兵鎮守十一月雲南平二十一年十一月疏言雲南省城東南舊有金汁等河從松華壩借水於盤龍江逕嵩明州流入昆明縣境繞城北而東而南過雲津土橋入昆明池兩岸築堤高二三丈水流其中蜿蜒六十餘里有壩有閘有過水涵洞盖以積水漑田城中數十萬頃皆藉此河之利上年大兵圍困逆孽週圍壕塹不得不毁以致水利阻塞灌漑不通田畆荒蕪居民失業昆明額賦莫可催征自克城至今臣多方招徠而流離之衆見此附郭膏腴咸成棄土未免趦趄不返臣愚以為河壩不脩殘黎勢難歸業荒田不墾額賦何徵已檄官勘估需工料銀萬餘兩際此財用艱難何可輕用正項請於通省官員及各屬土司酌行捐助苐新定之區人力拮据非有以鼓勵之恐難必其樂輸今捐納各例停止惟紀錄一欵無礙名器懇勅部酌議捐銀若干准予紀録以此捐項修築河壩水利既通殘氓樂業糧賦可以復舊下部議如所請照廣東戰船例捐銀百兩紀録一次二十五年左都御史陳廷敬疏劾繼文將滇省厯年捐納米五十餘萬石草千萬餘束存留不發反支帑貴買至大兵盡撤後始將所存米草折給官俸驛遞銀兩照市價扣歸與採買原價前後懸殊顯係侵沒在先濛混入告詔繼文回奏繼文奏滇省自二十一年春大兵凱旋三月中即照原議停止捐納是時駐防各兵需用米草尚多經理餉學士佛倫公議採買及奉文復開事例已在二十一年冬此後按季具題候部文撥放即如二十年秋季報捐至二十三年四月方准支給支給無㡬大兵即於十月盡撤是以多有存貯厯年收存冊籍具存至採買價值因滇省盡屬山箐不通舟楫人多歲歉則立昂歲豐食少則漸減全省軍民耳目可質難以朦隠折給官役營驛之用不便照採買貴價致有虧累未免相懸但續奉開捐米草原以供給大兵臣止知謹守定例候部撥支不能變通預籌應請處分下部議以收支年月相符且在赦前免議十月丁母憂回旗二十八年復任雲南巡撫二十九年正月疏言雲南黒井鹽課當呉逆駐滇時家口部衆人多請加鹽額月増課銀二千兩今新經恢復民多流散户口寥寥課額虧欠經臣于二十一年具題将嵗増課銀二萬四千兩遵奉諭㫖暫除今部議復徴而逆属家口盡行遣發投誠人員已經安挿各省現今户口所増無㡬食鹽甚少請将此項加増課銀照前豁免則井竈商民均安樂利十月疏言滇省屯田一畝之科㡬納民田十倍之賦拖欠迯荒年甚一年臣自再蒞此土訪求民隠惟此屯田一項最為滇民苦累惟有将老荒重額田地减則貼墾尚有藉補虧懸今議見納軍粮人承墾者将屯田地上中二則六年後悉改為民田地下則起科屯田地下則十年後改為民田地下則起科其不係見納軍粮人承墾者六年後将屯田地上中下則悉改為民田地上中下則起科仍令地方官量借牛種務使力耕有成至民間荒廢田地原主逃亡及不願開墾者不論何人承墾即為已業其上中二則倣豫省例六年後係中則者照下則納三年再歸中則係上則者照下則納五年再歸上則起科其下則田地請於六年後減半又三年再照本則起科三年内一應雜差均予豁免庶民累少甦民情思奮正額可充新賦亦可少増三十年疏言滇省土知府知州等官向来遲誤表箋奏銷等案題恭者因不給俸禄無處分之例無由知儆嗣後如有罰俸降俸降職等事應比照流官定例按其品級計俸罰米每俸一兩罰米一石檄令移貯鄰近常平各倉以備荒賑三十三年以雲南省積錢壅滯疏請暫停鼓鑄諸疏均得㫖允行九月擢雲貴總督三十七年三月魯魁山賊首擦揑等刼掠彛村弩傷新嶍營守備張廷柱繼文㑹同臨元總兵王洪仁遣發流土官兵勦撫追斬賊首擦揑疏聞下部議山林小賊例不敘功特㫖魯魁賊衆盤據有年官兵勦殺可嘉仍予議叙五月疏言魯魁一山與哀牢相接綿亘千餘里今賊首擦揑雖滅餘黨猶存新嶍一營孤懸賊窟請設汛増兵彈壓要害查江内慢干壩乃新平縣境適中之地應撥千總一員帶兵二百名駐防江外増設四汛舊哈跨果二處各増兵一百名大口増兵五十名哀牢山後之三家坡将元江協所管兵内抽調一百名撥把總一員防守仍歸該協管轄臨元鎮原設陽武壩一汛就近歸入新嶍營添設恭將員原設守備改作中軍又野賊非往新元即奔楚景楚姚一鎮最為𦂳要查援𠞰兩協乃䇿應之師各撥千總一員各帶兵二百名一駐南安州界牌一駐景東府福都責令防守八月復疏言貴州水西宣慰使安勝祖大為彛民之患今已病故請将土司停襲所属地方改歸大定平逺黔西三州流官管轄均如所請是年冬入覲以老病乞休詔令原官致仕尋命修理子牙河工賜御書煙霞耆舊額四十年十月特加兵部尚書銜四十二年五月卒賜祭塟如例子用霖官山東布政使范承勲范承勲漢軍鑲黄旗人大學士文程第三子福建總督承謨弟由廕生入國子監讀書康熙三年授工部員外郎七年遷刑部郎中十二月充大清㑹典纂修官十六年授江南道監察御史巡視西城疏請勒監生生員南籍冒北者歸籍從之十八年協理河南道事疏言定例降調官果清亷許督撫題留懲勸兼用革職與降調同一罣誤而去留不同請嗣後革職官果清亷愛民者許一例題留督撫濫舉嚴定處分又言八法以貪為首貪吏僅罹薄譴何憚不為請嚴飭承審官執法訊追按律究擬毋徇庇塞責俱下部議行十九年閏八月奉㫖甄别滿洲漢軍科道不稱職者對品調用承勲議留特㫖著去任改補吏部郎中九月川東賊譚洪叛據巫山上命承勲同户部郎中額爾赫圖馳赴彛陵趣将軍噶爾漢進兵十一月督湖廣進蜀粮餉二十年三月洪死其子天秘遁提督徐治都進剿以轉餉艱自萬縣還駐䕫州諭承勲乘川峽未漲速運粮濟軍四月大軍進定雲南復命趣噶爾漢軍仍兼理粮務二十二年回任監崇文門税務二十三年五月九卿詹事科道遵㫖舉清㢘官承勲與焉八月擢内閣學士二十四年二月授廣西巡撫陛辭上曰爾父兄皆曽宣力於國爾今為巡撫錢榖刑名雖係職任其最要者在潔己愛民若聴信幕客沽名妄作强不知以為知欺人欺己大為不可爾宜戒之八月奏免廣西容縣鬱林州追賠陷賊後無徴銀米十一月疏言廣西舊存倉米二十餘萬石前慮朽蠧議令全省暫折徴恐餘粮銷盡遇歉兵食不足請桂林平樂二府徴半折半栁州府之賔州山險艱運永行折徴餘仍徴本色部議從之二十五年閏四月擢雲貴總督十二月疏言雲南舊有援勦兩協左駐尋甸右駐省城用供迤東䇿應請以右協移駐羅平州而以原駐羅平之廣羅協移駐廣西府與廣南營犄角既聨黔滇兼扼粤隘其左協分駐之曲尋鎮兵酌撥川黔要地防守議如所請二十六年六月疏裁貴州十五衛十所以偏橋衛併入施秉縣興隆衛併入黄平州移州治於衛治新添衛併入貴定縣移縣治於衛治安南所併入普定縣普安衛併入普安州安籠所併入安籠㕔烏撤衛併入威寕府以貴州貴前二衛改設貴筑縣鎮西威清二衛赫聲威武二所改設清鎮縣平壩衛柔逺所改設安平縣安南衛改設安南縣敷勇衛修文濯靈息烽于襄四所改設修文縣永寧衛普市所改設永寧縣畢節赤水二衛改設畢節縣俱照所請行十月劾提督萬正色婪賄侵餉上命侍郎多竒富拉塔往鞫得寔論絞奉㫖萬正色從寛免死革提督任二十七年七月湖廣裁兵譁變訛言四起承勲嚴禁密緝已而尋甸協兵於是月十六夜脅衆譟變與營将格鬬潰走承勲擒叛首任二等八名而省城營兵復謀于二十一日倡亂承勲先期密擒叛首唐金等十三名寘之法事聞得㫖嘉奨八月疏言雲南産銅鉛先後設爐四十八鑄錢供軍餉向給全銀後因錢積以銀七錢三搭放每千文抵銀一兩鼓鑄日増錢價日減千錢值銀不三四錢又苦山險赴領艱運費請仍康熙二十一二年間例全給銀並停鼓鑄議准給銀減爐座之半二十八年正月番彛阿所殺土目魯姐及其母弟妹九人欲據其地有僕曰者克以魯姐妻瞿氏㓜子魯聚走免諸彛人扶為目阿所投匿東川結土婦安氏孫禄世豪掠錢匠村苦竹壩彛民牲畜犯姜州堡事聞上命兵部郎中温保㑹同承勲等往東川檄安氏獻阿所至則諸彛與安氏擒阿所以獻斬之初雲南經兵革後屯賦錢粮自康熙二十一年至二十七年壓欠未完十二月承勲疏請分年帶徴奉恩㫖全行蠲免二十九年三月疏言雲南額徵米麥經前撫臣石琳題定夏税米石仍徴本色康熙二十七年秋糧半本半折二十八九兩年全折三十年以後半本半折查各府州縣駐劄與分防兵多寡有無不同而存貯與額編之米亦長短廣隘各異今若以二十九三十兩年一概夏税徵本秋粮全折半折是使有餘之倉得夏税本色來秋半本而米愈盈不足之倉因今秋全折来秋半折而米愈絀計莫若分别徴收使不需粮處變米為銀免滋朽蠧需粮處即取給本地不致病民病兵議從之先是提督馬三竒以貴州山路峻險撥運兵米脚費浮于正項奏請折給部議以有米兵少之處米價必賤有兵米少之處米價必貴殊難定例令承勲㑹撫提查議至是承勲奏言毎嵗折徴米二萬石若照有米處折給則價賤不敷兵丁轉買其若在兵照米少處折給則價貴而徴輸必倍其苦又在民惟斟酌損益於秋成令各府照時價估算本折均搭給兵自買從之三十一年三月奏改雲南永北協為永北鎮裁副将設總兵並設中左右三營逰擊各一其原設守備千把總等官改𨽻中營再設左右兩營守備各一千把總各六四月奏添大理府城守遊擊一守備一千總二把總四均特㫖俞允七月奏請裁洱海營經制兵千名并抽撥鶴麗鎮尋霑營兵各二百名歸永北鎮並裁洱海營叅将守備等官議如所請三十二年十一月上謁孝陵承勲迎覲米峪口諭曰爾係盛京舊人爾父兄累朝効力爾兄又為國盡節朕因見爾思及爾兄心為慘切不見爾八九年矣爾鬚髮遂皓白如此今因郊外寒冷将朕貂帽貂褂白狐腋袍賜爾此時更換恐受風寒明日可服之來謝恩賜御書世濟其美匾額三十三年三月内遷都察院左都御史六月江南江西總督傅臘塔卒上諭曰兩江地方闗係𦂳要范承勲行事堅定為人平易著補授江南江西總督十一月奏移江南鳯陽関監督駐正陽闗三十四年二月疏言江西有漕粮四十八州縣除南昌新建二縣外餘皆地處山僻湏小船載米至省交兑粮艘向係民貼脚價官為觧運嗣因州縣恐涉私𣲖将此載入賦役全書康熙二十六年經漕臣題恭各省並無支給脚價以違例照數扣追今十載無一報完者若官賠則已數更民賠又原係民貼豈可再令賠補若将脚價停給則僻處州縣之漕更慮遅誤請免追賠以後仍聴支給部議不准得㫖如承勲所請三月疏言江南下溼倉谷易腐請将江蘇安徽等州縣捐積倉谷於毎嵗青黄不接時以七分貯倉備賑三分平糶秋收以糶銀買榖還倉逓年出陳易新又言江南財賦甲天下州縣催徴不易舊例接徴接催官照原叅分數處分請嗣後計續完多寡為輕重如原恭欠二分今已徴完一分即改照未完一分例議處原恭欠一分今已徴完七八釐即改照未完不及一分例議處又言江寧駐防滿漢官兵嵗需粮十六萬四千餘石於南屯米内撥觧不敷照時價折給但各属徴觧南米在秋收後而月粮自正月起支急之則民苦預輸緩之則兵虞乏食至改折之銀亦須二月開徴俟觧到採買已在四五月間而正二月粮無措請将安徽所属捐積倉米提觧十六萬石充江寧現年兵餉其秋徴南米留作下年之用自此得先徴後給遞年相因庶無應接不敷之患更請將捐積倉米提十萬石存貯省倉值米貴時减價發糶又言江蘇額徴銀米嵗三百餘萬今各年未完多者二十餘萬少者十萬有竒按額計算毎嵗所完已在九分以上逋欠多係貧瘠下户再漕項錢粮自康熙十八年後積欠甚多新舊同徴民力難應請将蘇属州縣及安属六安夀州合肥靈壁虹縣積欠地丁漕粮分年帶徴以紓民力諸疏均下部議行三十五年六月疏言官兵遇閏添支之粮江寧駐防於上下兩江協觧京口八旗二營并水師三營於鎮属漕粮截留不敷者照例折給查江安蘇松兩道漕項現有減存米足敷支給可免採買截留之煩議從之七月請以省倉米十萬石賑淮揚徐災民復請借京口留漕鳯倉存麥接賑俱得㫖允行三十八年十一月授兵部尚書三十九年三月命同工部尚書王鴻緒監修髙家堰堤工尋以與河道總督張鵬翮議不協撤回四十三年四月以老乞休允之十二月河工告成加太子太保晉五級五十三年二月卒遺疏入上曰范承勲効力年乆敬慎自持勤勞素著予告以來尚期優游頤養以副眷懐忽聞病逝朕心深為軫惻予祭塟如例子時繹累官至工部尚書閻興邦閻興邦漢軍鑲黄旗人康熙五年由舉人授廣西馬平知縣丁憂九年補直𨽻新城知縣十年遷通州知州十六年入為工部員外郎二十一年遷御史洊遷鴻臚光禄寺卿二十七年五月遷順天府尹六月擢河南巡撫二十九年八月疏言豫省本年漕粮部議定徴本色數月来開歸彰衛懐河六府並汝州各属雨澤愆期二麥薄收秋榖鮮穫民赴隣郡購買米價騰貴往返盤費㡬倍正供若使旱後未甦之民與各處歉收之地依期轉運不惟力有不能亦勢所難辦請俟三十年徴觧以紓民力次年又以旱蝗請再停運俟三十一年仍徴本色均下部議行三十年二月疏報二十九年分墾荒田六萬四千餘頃下所司知之初總河王新命議引小丹河濟運詔下河南撫臣議至是興邦奏丹河發源晉省入沁合黄並無大小之名因河東西百姓開渠引水灌田澆竹小渠外復開大渠由河内武陟修武獲嘉等縣直達衛河歸臨清濟漕始有小丹河之名河臣請於三月用竹絡装石横塞各渠口洩細流以溉田餘水盡歸小丹河濟運誠恐亢旱之年渠深田髙焉能灌溉欲灌田則誤運欲濟運則誤田查現今重運俱由中河北上較昔甚早如雨水勻足即照河臣所議如遇亢旱請於毎年三月初一日起至五月十五日止令三日放水濟漕一日下板塞口灌田周而復始五月望後漕艘過完聴民灌溉庶田漕並濟下部議從之三十一年十二月調貴州巡撫三十二年三月疏言各省常平倉貯捐納米石部議糶米易榖黔省自康熙二十八年冬至三十一年年終止共收過官員生俊捐貯米榖各五萬餘石民少苗多商販寥寥一時未能盡數出易應就現糶米買數還倉餘俟次年再糶二三年間米皆易榖不致紅腐備荒有賴從之四月疏言黔省康熙三十一年編審人丁部駁查明加増黔地𥚹小苗狆什居六七向不編徴漢民更多寄寓並無恒産去来靡定難編入籍黔省賦役舊止徴一萬六千六百七十餘丁今已増多四千二百有竒若再編増恐不肖之員奉行不善将未成丁及老廢亡故寄寓者一槩編入徴銀苦累小民乞俟下届清編時提督陳竒舉出提督衙門安順等府官荘嵗收料榖一千三百餘石歸入編審丈得熟田一千五百餘畝照例編徴銀米部以不符原數下興邦覆勘興邦疏言提督官荘向因叛逆提督李本深占據收租牧馬有與民均分者有給牛種而全收其租者亦有十收其六七者悉属苛歛黔地恢復後民以提荘得免差役勉强供輸厯任提督相沿未改今若求符原數勢必另立科則田少粮多民苗不堪苦累乞照所丈編按民田一例征輸均奉特㫖允行三十四年二月奏黔南人文繁盛請依廣西鄉試觧額取中三十名又疏言黔省蕞爾㑹城附郭新貴貴筑二縣雖各有職掌至如編甲捕盗通行案緝等件奉文轉發不得不兩縣互行一事而受兩番約束民多未便毎以勢逼權分推委貽悮請裁新貴縣併入貴筑縣再黔處萬山中名為一站險實千盤各属途隔二三日或三四日不等一遇缺員附近州縣在衝衢者既難舍已從人其偏僻之區深箐窮谷苗蠻出沒刻難乏員又虞鞭長莫及請於貴陽首府添設通判一員差委可以迅行署缺亦無憂兼頋寔於吏治有禆均下部議行三十七年正月卒於官賜祭塟如例祖良璧祖良璧漢軍鑲黄旗人父澤洪官吏部侍郎以軍功授三等子逓加至一等子爵康熙九年良璧繼其兄良棟襲世職十九年授恭領兼佐領二十九年從裕親王福全征噶爾丹諜賊伏烏䦨布通阻阿據林阜結駝陣自障良璧隨左翼兵由山腰奮擊大敗賊衆覆其巢三十年擢西安副都統三十五年二月撫逺大将軍費揚古由西路𠞰噶爾丹良璧請從軍上以西路軍糧屯翁吉命偕副都統席爾哈達留兵督運六月由巴罕厄里根赴納喇特遇風雨牲畜道斃不能前以狀聞時噶爾丹已為費揚古所敗携其從子丹濟拉由昭莫多西遁上慮其刼翁吉糧詔良璧速歸翁吉以所運米支給運丁餘悉焚之良璧得㫖馳還九月将䕶糧赴寧夏丹濟拉果率賊數千伏翁吉山谷中偵我軍半度突出良璧麾殿後兵力戰前軍還擊賊大敗逐北二十餘里上方聞丹濟拉驟至慮良璧勢孤及奏捷優詔嘉奨四十二年十一月上西巡閲西安兵諭大學士馬齊曰滿洲兵丁整肅俱係将軍副都統訓練所致著各加一級十二月調正藍旗漢軍副都統四十四年上追念良璧翁吉破賊功且人材亦優擢福州将軍賜孔雀翎及蟒服鞍馬四十六年上南巡良璧至清江浦迎駕御書兵民協輯額及四時常喜戈船静千里湏教璧壘新聨賜之並衣一襲四十九年三月疏言康熙二十二年撥耿精忠藩下兵一千歸上三旗因閩省無正黄旗駐防将應歸正黄旗人改撥正藍鑲白二旗查駐防驍騎校等缺出各旗藩下人皆得㨂補惟此項因係改撥從未咨放其中不無弓馬可觀之人登進無階情殊可憫請嗣後正藍鑲白旗缺出将改撥兵丁一體㧞補部議從之八月以泉州漳州等處旱歉奏命侍郎塔進泰李旭升㑹同江浙兩省督撫截留本年鎮江漕米十萬石運至狼山松江湖州漕米各十萬石運至乍浦令福建督撫等以戰船轉運賑灾㑹總督梁鼐丁憂特㫖以良璧署理五十二年至京恭慶萬夀賜冠服尋遣還任五十七年卒改世職為一等男兼一雲騎尉子應樞襲興永朝興永朝漢軍鑲黄旗人初由筆帖式授吏部主事遷本部員外郎康熙十三年逆藩吴三桂反上命刑部尚書莫洛經畧陜西莫洛察永朝有才擕以行嗣奏興安距漢中遼逺請復設闗南守道駐劄以資彈壓即以永朝補授詔允所請十四年興安遊撃王可成叛永朝偕總兵黨塞出走西安事聞下部議黨塞不能安輯士卒應觧總兵官以副将用永朝免議仍以道員用二十一年補廣西蒼梧塩法道二十六年遷四川按察使明年擢偏沅巡撫二十八年三月疏言湖南額田二十八萬餘頃徴地丁銀一百二十四萬有竒今熟田十七萬餘頃徴銀七十二萬有竒較原額不及十之六盖自明季兵火荒熟混淆豪黠者隐田漏課愚懦者業失糧懸以致訐訟日繁包賠滋累今計非丈量不能清釐其法惟見田量田不遺尺寸熟者定為實徵荒者漸俟招墾糧隨田辦丁照糧編更以弓口田形造魚鱗細册存之公府藉為左劵屬吏行私剥民臣必糾之奉公守法臣必舉之至豪强侵隠多年當寛其旣徃許自首免罪又其事繁而且瑣勢必逾年完結難拘常限衛所屯田原與民地相錯應同時舉文以杜閃爍疏入敕部議行並諭丈地各官實心任事勿藉端科派有滋擾者照貪官治罪五月遷閩浙總督六月疏言湖南有三事未竟一清丈荒熟地畆方舉行也清丈之事行之善利國十居四利民十居六不善有司不難抑勒聚歛以病民恐臣赴閩後官吏泄玩舞弊後之人必將以開端咎臣一城下避風河不及興浚也長沙城西濱湘江中多暗石舟舶猝遇風濤觸裂覆溺近擬於江岸掘口遶城北挖土成渠直接城東蓄水廢塘引入江水此渠一成所全實多且挑浚之地離城不逺亦可恃作金湯臣與僚屬措費鳩工而今忽中止深為可惜一月課諸生之規恐有偏廢也湖南文風不振士習多乖臣通行各學月舉一課供其格卷食饌以守令為之主長沙臣自主之數月以來諸生旣以誦習為功武斷把持之事亦覺漸減儻從此一暴十寒依然徃昔所為中懷多疚者也伏祈天語告誡逐一遵行期收實効下所司知之三十一年調漕運總督三十二年七月疏言淮揚鳳廬等屬地處大江以北所藝禾種或紅或白各就土宜毎有磽瘠之區雨暘不若種本純而忽變雜或遇歉歲缺種春種之際得種即下不辨色類厯任漕臣帥顔保慕天顔並准紅白兼收自康熙三十年漕臣董訥請永著為例部臣恐有不肖之徒借此攙和議駁臣思漕糧止期乾圓潔淨原不拘於種色今嵗根苗即是去年籽粒必欲分析於磨礲簸揚之後殊多未便請不論紅白一體兼收部議不准行特㫖俞允先是松江白糧旗丁掛欠米石部議嚴追懲究並請敕漕督詳議經乆杜弊之法八月永朝上言從前欠糧旗丁止議革運未嘗另立嚴條奸頑蔑視無忌請嗣後白糧船運回之日如有掛欠除革運追賠外仍倣監守自盗律治罪從之三十三年二月調鑲黄旗漢軍副都統閏五月因病罷尋以迎駕失儀革職賞給藍翎侍衛三十五年從征噶爾丹命署副都統在火噐營行走三十六年授鑲白旗漢軍副都統四十年正月自陳老病乞觧職得㫖興永朝前任督撫初無禆益兵民之事乃稱硜硜自守不合著觧退副都統五月卒年七十髙其位髙其位漢軍鑲黄旗人父天爵已有傳其位初𨽻鑲白旗由筆帖式管佐領康熙十三年逆藩吳三桂䧟湖南順承郡王勒爾錦統師討之其位隨征署㕘領駐防襄陽時叛鎮楊來嘉王會等頻掠鄖西穀城南漳等縣其位嘗率二十騎往偵遇賊土地嶺知将犯南漳馳越賊隊中創不退直入南漳城告守者為備賊逼城三日不能䧟而遁十五年正月叛鎮譚洪引賊三萬水陸合犯鄖陽其位率百人扼之楊谿餔據崖射賊相持七十餘日糧盡煮馬韉以食及副都統李林隆率兵來援乃擊潰賊衆十九年追論賊犯榖城南漳禦戰失利諸将罪革其位職任二十七年授火器營操練尉二十八年襲二等輕車都尉初其位弟其仕襲其祖尚義所遺世職至是其仕卒以其位襲二十九年七月隨大将軍裕親王福全征噶爾丹擊之烏蘭布通破其駱駝營三十三年擢𠫭領三十五年從上征噶爾丹凱旋加一級復管佐領三十九年四月授甘肅永昌副將四十七年正月遷湖廣襄陽總兵五十二年四月擢湖廣提督賜孔雀翎櫜鞬鞍馬五十六年九月自陳乞罷諭嘉其和輯兵民聲名素優令供職如舊六十年六月調江南提督六十一年七月兩江總督常鼐病劇以印齎巡撫吳存禮暫管上特命其位署理十二月受代赴京雍正元年二月命仍回提督任四月奏請保䕶聖躬得㫖此奏字句之外實有一片愛君之心發乎至誠非泛泛虚文可比二年三月奏言松江之泖湖澱湖澄湖港汊叢雜江浙錯壤與太湖毘連經兩省督撫與臣委官勘議防奸法計松江所屬通船要口一百十三處釘椿立栅以時啟閉官捐工料百姓樂趨事將次告成諭以權宜措施必無礙商民乃善七月賜詩有禆益軍民資偉畧劑調文武在和衷之句十月奏進黄浦漁船所網得雙䕫龍紐未刻玉印諭曰此事若出自他人非卿奏聞朕不信也卿乃忠信老成封疆大臣斷不至有揑造虚誕之舉以阿諛取容今賜卿數物以示嘉悦三年五月諭廷臣曰提督高其位前署總督印務時年羹堯奏其年老衰憊兩耳重聼貪位隱飾貽誤地方不應畀以重任是以聖祖仁皇帝降㫖罷其署理及朕即位猶記年羮堯之言特召髙其位來京陛見朕視其為人老成忠厚善氣迎人雖已年老精力猶可任用適值年羹堯在京遂令伊詢問髙其位觀汝筋力尚可為朕効力數年不得固辭目下現有鑾儀使一缺旗下都統一缺著量其力之所能自行陳奏彼時髙其位奏都統事務向來不甚熟練鑾儀衛又無可効力之處朕遂降㫖令回松江此乃出自朕意加恩老臣並非年羹堯賛助之力在年羮堯必隠其從前之𠫭劾反市徳于髙其位而髙其位不知亦以為出于年羹堯賛助之力也去年高其位奏進松江漁船所獲玉寳朕賞以四團龍補服等物又適值年羮堯在京必又向高其位居功冀其感激聞年羹堯将一無頼小人薦與髙其位髙其位即授以把總未㡬又特㧞為千總此事在曏時督撫提鎮中皆所不免年羹堯尤視為常事但髙其位曏被年羹堯㕘劾及朕加種種之恩皆特出朕意與年羹堯毫無干渉而年羹堯竊君恩為己功髙其位奉私嘱如公令即此見年羹堯之巧詐營私随處要結而内外臣工之為所愚者不少矣九月授文淵閣大學士兼禮部尚書加太子少傅其位以衰老不勝機務奏辭詔俟受代後即来京供職四年五月至京改𨽻鑲黄旗尋乞休諭以跪拜艱難高年常有之事不必遽行求退十月以八十生辰賜扁聯及服食等物銀千兩十一月復乞休得㫖卿宣力年久恪慎奉職老成練達茂著賢聲是以簡預機務用昭優眷前以老病乞休朕未忍俞允特命供職數時以示眷念耆舊大臣之至意今復行奏請情詞懇切准以原官致仕五年正月卒命王大臣侍衛奠茶酒賜祭葬如例諡文恪十二年十月入祠賢良祠原襲之二等輕車都尉循例改騎都尉以其次子纘勲襲長子起由廕生授四川茂州知州累官至兵部尚書雍正十三年罷尚書任以都統銜在雍和宫行走尋獲罪革職逮問乾隆元年命發徃軍臺効力贖罪七年回旗十三年卒年遐齡子希堯年遐齡漢軍鑲黄旗人由筆帖式授兵部主事累遷刑部郎中康熙二十二年授河南道御史巡視中城尋遷内閣侍讀學士二十七年遷宗人府府丞二十九年晉内閣學士三十年授工部右侍郎三十一年二月轉左十月授湖廣巡撫三十八年奏言湖北武昌漢陽黄州安陸徳安荆州襄陽等七府應徵匠役班價等銀千餘兩自明季迄今年代久逺子孫遷徙亡絶闕額無徵有司或代為捐解或派累小民官民交困查江浙二省因匠班無徵歸地丁帶徵湖北事同一例請自康熙三十九年為始亦歸地丁徵收每畆加増絲毫而賦無闕額官民俱免賠累部議從之四十年二月給事中馬士芳劾遐齡徇庇老病廢弛之布政司任風厚不入大計詔令明白回奏風厚來京引見嗣遐齡奏風厚辦事老成並無遺誤風厚抵京引見諭曰任風厚尚未衰老可以辦事著仍赴原任馬士芳㕘奏不實以言官免其議處七月遐齡疏㕘黄梅縣知縣李錦虧空地丁銀三千餘兩請革職究追從之尋黄梅縣民㑹集萬人閉城留錦不容去任命總督郭琇嚴審速奏八月琇奏言黄梅縣未解銀三千餘兩實係民欠隨于七月徴完知縣李錦並無虧空百姓因錦平日清亷聞其解任一時圍聚生員吳士光等許為糾人赴省保留乆始解散亦無違抗情形請令錦仍留原任士光等革去衣頂應請復還得㫖凡官員去留之權豈可令百姓干預聚衆肆行之風亦漸不可長該督撫庸懦無能平時不能約束軍民及至事出専務遮飾茍且議結殊属不合李錦居官雖優不可仍留黄梅之任著令來京於直𨽻附近補用吳士光等著解部發往奉天郭琇年遐齡俱降一級留任四十三年遐齡以疾乞休允之雍正元年以次子羹堯平西藏功加尚書銜二年復以羹堯平青海功加太傅一等公賜雙眼孔雀翎三年羮堯獲罪遐齡及長子希堯俱應縁坐諭曰年羮堯剛愎殘逆之性朕所素知其父兄之教不但素不聽從向來視如草芥年遐齡年希堯皆忠厚安分之人著革職免罪五年遐齡卒特恩還原職致祭一次希堯由筆帖式補授雲南景東府同知康熙四十五年遷直𨽻廣平府知府五十年遷大名道五十二年晉廣東按察使五十五年晉安徽布政使五十九年潁州知州王承勲訐告希堯需索規禮徇庇鳳陽府知府蔣國正將虧空捏民欠冒蠲侵蝕等欵經總督常鼐𠫭奏命左都御史田從典等徃鞫俱無証據失察國正冒蠲希堯應革職從之六十一年以布政使銜署廣東巡撫雍正元年實授疏報欽州澄海南海東莞等二十九州縣衛所開墾六十一年分田地一百四十二頃下部知之三年七月擢工部右侍郎十一月因弟羮堯獲罪革職四年正月授内務府總管七月命管理淮關税務十二年加都察院左都御史銜十三年江蘇巡撫高其倬疏奏希堯庇惡縱貪鞫實削職乾隆三年卒欽定八旗通志卷一百九十一
