body:
  text: 職官志七職官直𨽻駐防江陜西駐防北甘肅駐防東江蘇駐防浙駐防湖駐防廣駐防防福建駐防防四川駐防政山東駐防河南駐各省鹽關稅附山西駐直𨽻保定府城守尉一人正三品防禦四人正五品驍騎校四人正六品委驍騎校八人委筆帖式四人滄州城守尉一人防禦四人驍騎校四人委署驍騎校八人委署筆帖式一人寶坻縣防守尉一人正四品防禦滿洲蒙古各一人驍騎校一人東安縣防守尉一人防禦二人驍騎校一人采育防守尉一人防禦二人驍騎校一人委驍騎校二人霸州防守尉一人防禦二人驍騎校一人固安縣防守尉一人防禦二人驍騎校一人委署副驍騎校二人雄縣防守尉一人防禦二人驍騎校一人良鄉縣防守尉一人防禦二人驍騎校一人謹案以上俱稽察九處駐防旗務大臣所屬故列於熱河密雲山海關三處副都統之前熱河副都統一人從二品協領兼佐領五人正三品佐領十五人正四品防禦二十人驍騎校二十人前鋒校十人筆帖式二人密雲縣副都統一人協領四人佐領十六人防禦十六人驍騎校十六人委署筆帖式二人分駐古北口防守尉一人防禦二人驍騎校四人委署筆帖式一人昌平州防守尉一人防禦二人驍騎校一人玉田縣防守尉一人防禦二人驍騎校二人委署筆帖式一人三河縣防守尉一人防禦二人驍騎校二人順義縣防守尉一人防禦二人驍騎校一人山海關副都統一人協領兼佐領二人佐領六人防禦八人驍騎校八人委署驍騎校十六人委署前鋒校二人筆帖式三人分駐喜峰口防守尉一人防禦二人驍騎校四人冷口防守尉一人防禦二人驍騎校三人永平府防守尉一人防禦二人驍騎校二人羅文峪防禦一人驍騎校二人獨石口防守尉一人防禦二人驍騎校二人千家店防禦二人驍騎校一人謹案以上三處副都統皆自率所屬専鎮一方别無將軍都統以節制之其張家口都統惟轄察哈爾八旗别見各處辧事大臣後兹不復載陜西西安將軍一人從一品副都統二人協領兼佐領八人佐領三十二人防禦四十人驍騎校四十人將軍衙門筆帖式三人甘肅寧夏將軍一人副都統一人協領兼佐領五人佐領十九人防禦二十四人步營防禦二人驍騎校二十四人筆帖式三人涼州副都統一人協領兼佐領二人佐領八人防禦十人驍騎校十人筆帖式二人莊浪城守尉一人佐領五人防禦五人驍騎校五人筆帖式一人謹案各省副都統皆統於將軍惟涼州副都統不屬寧夏將軍節制江蘇江寧將軍一人副都統一人協領兼佐領八人佐領三十二人防禦四十人驍騎校四十人筆帖式三人分駐京口副都統一人協領兼佐領蒙古二人佐領十四人防禦十六人驍騎校十六人筆帖式二人浙江杭州將軍一人副都統一人協領兼佐領滿洲八人蒙古一人佐領滿洲十六人蒙古七人防禦滿洲十六人蒙古四人驍騎校滿洲二十四人蒙古八人筆帖式二人分駐乍浦副都統一人協領兼佐領五人佐領十一人防禦八人驍騎校十六人筆帖式二人湖北荆州將軍一人副都統二人協領兼佐領十人佐領四十六人防禦五十六人驍騎校五十六人筆帖式三人廣東廣州將軍滿洲一人副都統滿洲一人漢軍一人協領兼佐領滿洲四人漢軍四人佐領滿洲八人漢軍八人防禦滿洲十六人漢軍十六人驍騎校滿洲十六人漢軍十六人筆帖式滿洲漢軍各一人清字外郎漢軍四人水師營協領滿洲一人佐領滿洲一人漢軍一人防禦滿洲一人漢軍一人驍騎校滿洲三人漢軍三人福建福州將軍一人副都統一人協領兼佐領八人佐領八人防禦八人驍騎校十六人水師營協領一人佐領二人防禦二人驍騎校六人筆帖式三人四川成都將軍一人乾隆四十一年添設副都統一人協領兼佐領滿洲四人蒙古一人佐領滿洲十二人蒙古八人防禦滿洲十六人蒙古八人驍騎校滿洲十六人蒙古八人隨副都統印筆帖式二人山東青州副都統一人協領兼佐領四人佐領十二人防禦十六人驍騎校十六人筆帖式二人兼轄分駐德州城守尉一人防禦四人驍騎校四人筆帖式二人謹案山東駐防原設青州將軍尋省惟以副都統管領與熱河密雲山海關諸處同例山西太原城守尉一人防禦四人驍騎校四人筆帖式一人謹案山西城守尉乾隆二十五年定歸巡撫節制河南河南城守尉一人佐領十人防禦十人驍騎校十人謹案河南城守尉乾隆二十五年定歸巡撫節制各省理事同知滿洲二十一人正五品康熙二十五年三月奉旨旗兵駐防江寧杭州俱設理事廳官其西安荆州鎮江福州等處均有旗兵駐防應將本省事簡地方官員內酌量改設理事廳官一員餘各處員缺俱先後改設直𨽻永平府保定府天津府熱河宣化府江南江寧府山東青州府山西朔平府歸化城河南開封府陜西西安府潼關撫民甘肅寧夏府浙江杭州府嘉興府乍浦湖廣荆州府四川成都府理事同知各一人俱係滿缺惟直𨽻宣化府山西歸化城係理藩院㨂選與蒙古參放理事通判滿洲六人正六品奉天省奉天府岫巖各一缺興京一缺直𨽻省通州易州各一缺山西省太原府一缺謹案駐防各官胥有防護地方之責至於封疆重寄則總其成於督撫分其職於司道牧令今制總督直𨽻一人兼管巡撫江南江西一人福建浙江一人湖北湖南一人四川一人兼管巡撫陜西甘肅一人兼管甘肅巡撫廣東廣西一人雲南貴州一人總漕一人總河江南一人山東河南一人巡撫山東一人山西一人河南一人江蘇一人安徽一人江西一人福建一人浙江一人湖北一人湖南一人陜西一人廣東一人廣西一人雲南一人貴州一人布政使共十九人按察使共十八人俱不拘滿漢仰邀睿簡以重慎憲保釐之任鹽運使共五人糧儲道共十三人鹽法道共九人河道共十一人分巡道共五十九人以及知府直𨽻州知州參用滿洲漢人或由部銓或由特簡因材造就俾方面専城咸知奮勵各州知州以及知縣並滿漢互用吏部按月銓授與夫計典薦剡者皆得瞻仰天顔量材移轉民社所關誠重乎其選也自司道暨州縣各有所屬佐二之官今制以漢軍漢人參用裁成甄録之廣倍見其不遺一善焉又案各省駐防専轄旗兵至於緑營兵丁以提督總兵統之而分其職於參遊諸職提督直𨽻一人江南一人浙江一人福建二人湖廣一人陜西一人甘肅二人廣東一人廣西一人雲南一人貴州一人四川一人山東山西河南江西各一人俱以巡撫兼領之總兵直𨽻馬蘭鎮泰寧鎮宣化鎮天津鎮正定鎮各一人山東兖州鎮登州鎮各一人山西太原鎮大同鎮各一人河南河北鎮南陽鎮各一人江南蘇松鎮狼山鎮夀春鎮各一人江西南昌鎮南贛鎮各一人福建金門鎮海壇鎮臺灣鎮福寧鎮汀洲鎮建寧鎮漳州鎮閩粵南澳鎮各一人浙江黃巖鎮定海鎮溫州鎮處州鎮衢州鎮各一人湖廣襄陽鎮宜昌鎮鎮算鎮永州鎮各一人四川川北鎮重慶鎮建昌鎮松潘鎮各一人陜西延綏鎮興漢鎮河州鎮各一人甘肅西寧鎮寧夏鎮肅州鎮涼州鎮巴里坤鎮伊犁鎮各一人廣東左翼鎮右翼鎮碣石鎮潮州鎮髙亷鎮雷瓊鎮各一人廣西左江鎮右江鎮各一人雲南臨元鎮開化鎮騰越鎮鶴麗鎮昭通鎮普洱鎮各一人貴州安籠鎮古州鎮鎮逺鎮威寧鎮各一人俱滿洲漢人並用特旨簡授副將共一百十八人參將共一百六十六人以及遊擊都司營衛守備俱互用滿漢實惟八旗徑旅懷豢養之恩技勇騎射所向無前化及緑營同知感奮所由式廓閎圖昭武成之屢告也凡直省文武官滿漢無定員者俱不復臚列其目焉又案直省奉使之官有巡視鹽政及關稅監督其為大員兼理者不拘滿漢其専差者近制皆係滿缺兹分載於後鹽政兩淮一人長蘆一人浙江一人兼織造事務特國初承明制各省置巡鹽御史後定為鹽政或由旨簡用或由都察院奏請簡差各帶原銜品級均係滿漢兼放近制多由內務府官員簡充仍帶御史銜其福建甘肅兩廣以總督兼理雲南貴州均以巡撫管理河東以山西巡撫管理皆因地制宜永為恆式焉關稅各差京師崇文門正監督滿洲一人簡充以大臣副監督滿洲一人由總管內務府大臣掄選奏充左翼右翼各一人簡充以大臣山海關一人以四五品滿京堂及各部院內務府司員差充張家口殺虎口各一人以部院司員差充三座塔八溝烏蘭哈達各一人以理藩院司員差充奉天牛馬稅一人以部院司員差充淮安宿遷關一人以內務府官員差充廣東粵海關一人以內務府官員兼充初制關稅各差皆以户工二部司員充之尋改差六部司員又改歸地方官管特簡理嗣後隨時斟酌改定或引京員或由部院司員掄選見除授或歸地方官兼理皆因地制宜永為恆式焉其歸地方官兼理者直𨽻天津關長蘆鹽政兼管通州坐糧廳兼管潘桃口以多倫諾爾同知管理龍泉紫荆竒峰五虎固關白石倒馬茨溝插箭嶺馬水口各一人以提督兼管委參將都司守備把總監收中江以盛京將軍衙門章京及五部司員差充山西武元城以巡撫兼管委交城縣知縣監收歸化城以巡撫兼管委道員兼收山東臨清關以巡撫兼管委臨清州知州監收江南上海關以江蘇巡撫兼管委蘇松道監收滸墅關以蘇州織造兼管揚關以江蘇巡撫兼管委常鎮道監收龍江西新關以江寧織造兼管鳳陽關以廬鳳道兼管蕪湖關以安徽巡撫兼管委寧池太道監收江西九江關以廣饒南九道管理贛關以江西巡撫兼管委吉南贛道監收福建海關以福州將軍兼管閩安關以巡撫兼管委福州府知府監收浙江海關以巡撫兼管委寧紹台道監收南北新關以巡撫兼管湖北武昌厰荆關以巡撫兼管委員監收湖南辰關以巡撫兼管委辰州府知府監收四川夔關以總督兼管委夔州府知府監收打箭爐一處同知兼管廣東太平關以巡撫兼管委南韶連道監收廣西梧厰潯厰以巡撫兼管委梧州潯州知府監收謹案直省奉使之臣又有學政由特旨簡任三年而代滿漢無定員其屬有教授學正教諭訓導惟順天有滿洲定缺今附見於後順天府教授滿洲一人正七品雍正四年定順天府學滿洲教授由進士舉人考取引見補用訓導滿洲一人從八品雍正四年定順天府學滿洲訓導由恩拔嵗副貢生考取引見補用欽定八旗通志卷四十八
