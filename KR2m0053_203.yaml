body:
  text: 欽定四庫全書欽定八旗通志卷一百八十九人物志六十九大臣傳五十五漢軍鑲黃旗一馬范文程張丁文盛張大猷光輝文衡劉之源爵胡有升髙天楊名髙郭廷佐趙廷臣范文程范文程瀋陽人曽祖鏓明嘉靖時官兵部尚書祖沉瀋陽衛指揮同知父楠未仕文程少好讀書頴敏沉毅與兄文寀並為生員天命三年大兵克撫順文程年二十有一太祖髙皇帝見而器之召與語知其熟於當世之務使隨行及取遼陽度三岔攻西平下廣寧皆參謀帷幄天聰三年以文館官從太宗文皇帝伐明入薊門克遵化招服潘家口馬蘭峪三屯營馬欄關大安口五城會我師在太安為敵所圍文程以火器進攻圍解太宗自將臨永平令守遵化敵兵掩至文程率先力戰敵敗走論功授三等輕車都尉世職五年八月師圍大凌河城文程招降西山一臺命即統其衆六年六月太宗詢廷臣伐明之策文程與寧完我等言我軍如欲深入當乘其無備直抵北京訊其和否毁山海關水門而歸以壯軍威計所從入惟雁門關為便並諭沿路軍民俟版圖歸我酌免賦稅示愛養意太宗嘉納之崇德元年五月授祕書院大學士初八旗置都統衆議首推文程太宗曰此職一軍耳朕方資為心膂其别議之時文程所領皆樞密事每入對必漏下數十刻始出或未及食息復奉召入凡宣諭各國敕書率撰擬以進至是改文館為內三院遂有是命八年八月世祖章皇帝嗣位命以其族屬𨽻鑲黃旗順治元年睿親王多爾衮將統兵伐明文程上議曰乃者明之流冦煽亂其君若臣不能相保雖天數使然良由我先皇帝憂勤肇造諸王大臣夾輔沖主忠格蒼穹上帝潛為啓佑也竊惟承丕業以垂休萬䙫者此時失機會而貽悔將來者亦此時何以言之中原荼苦已極黔首無依思歸令主以圖樂業明之受病已不可治其土地人民不患不得患得而不為我有耳曩者棄遵化屠永平一再深入而返彼以我為無大志縱來歸附未必撫恤因懷㩦二今日有已服者有未服宜撫者是當申嚴紀律秋毫勿犯復宣諭以昔日不守內地之由及今進取中原之意官仍其職民復其業録賢能恤無告大河以北可傳檄而定也此行或直趨北京或相機攻取必於山海長城以西擇一堅城頓兵而守以為門户惟諸王察之大軍遂發文程從師渡遼河明山海關總兵吳三桂以闖賊陷北京來乞師文程曰自闖冦猖狂中原塗炭近且傾覆京師戕厥君后此必討之賊也我國家上下同心兵甲選練誠聲罪以臨之恤其士夫拯厥黎庶兵以義動何功不成乎復言好生者天之德也兵者聖人不得已而用之自古未有嗜殺而得天下者國家欲統一區夏非乂安百姓不可於是申嚴紀律妄殺者有罪既敗流賊二十萬於山海關我兵長驅而西民多逃匿文程草檄宣諭曰義兵之來為爾等復君父仇所誅者惟闖賊師律素嚴必不汝害民心遂安師入北京建議備禮葬明崇禎帝時宫闕灰燼百度廢弛文程收集諸曹册籍布文告給軍需事無巨細咸與議焉明季賦額屢增籍皆燬于寇惟萬厯時故籍存或欲于直省求新册文程不可曰即此為額猶恐病民豈可更求哉自是天下田賦悉照萬厯年間則例徵收除天啓崇禎時諸加派民獲蘇息二年正月敘功晉三等男十月江南既平上疏言治天下在得民心士為秀民士心得則民心得矣宜廣其途以搜之請於丙戌會試後八月再行鄉試丁亥二月再行會試從之三年四年兩充會試主考官五年十一月晉一等男賜巴克什號六年正月充纂修太宗實録總裁官二月復為會試主考官七年遇恩詔加一雲騎尉世職八年正月進二等子閏二月大學士剛林以黨附睿親王多爾衮獲罪其刪改太祖實録辭連文程並議罪先是三年二月睿親王誡大學士等宜時具條奏文程以凡有聞見即面啓無庸具本對王曰爾素有疾毋過勞自後可早出休沐逾數月甘肅巡撫黃圖安請終養部議借端規避應革職文程白鄭親王濟爾哈朗曰終養乃人子至情不宜如部議睿親王怒其不先白已也下法司論罪既而釋之後文程因不合睿親王意時稱疾家居至是世祖以文程在盛京時不附貝勒碩托後亦不附睿親王衆所共知免其罪革職留任未幾復原職九年遇恩詔晉一等子尋任議政大臣疏曰臣見直省土地荒蕪賦虧餉絀國家大害在此然軍屯可興國家大利亦在此昔明太祖嘗言養兵百萬不費民間一粒亦當元季亂後地曠行屯故耳今湖廣江西河南山東陜西五省冦亂日久人民稀少請設興屯道綜理之同知分理之地之無主者即為官屯其有主而拋棄者多方招徠過期不至乃為官屯凡土著流户願來耕者均給以地量助牛種官分子粒三之一三年後為永業編行保甲使守望相助其無本者官給雇直則逺近飢民聞風踵至亦救荒之術也初屯之時所收糧草皆道廳留貯出陳易新為次年加墾計其難久存者就近撥供兵馬雇舟車起運勿僉點屯民動用屯牛則屯事得永久矣又興屯之處府縣有司聽屯道提調理屯同知惟屯道管轄如開墾日增撫按特薦倣邉俸例三年升二級以酬其勞其不職者嚴紏之所當信賞必罰也疏上命諸王大臣會議舉行十一月以科道官當睿親王攝政時劾大學士馮銓降革者彚原疏進呈御覽世祖曰諸臣所劾誠當何為以此罷耶文程曰諸臣疏劾大臣無非為君為國皇上當思所以愛惜之世祖遂諭吏部俱以原官起用十年正月請令部院三品以上大臣各舉所知不論滿漢不拘資格不計親疏取正直才守之人堪任何官列疏奏聞一官可舉數官數官可舉一官將姓名彚置御前不時召對察其議論核其行事遇缺請旨簡用若用後稱職保舉官加以優典否則量罪連坐詔允所議十一年八月加少保兼太子太保時遣官赴直省恤刑因疏言前此遣滿漢大臣巡方慮有擾民是以停止今四方水旱災傷紛紛見告亦應請停止其見禁重囚敕各巡撫詳勘以可矜可疑者奏聞裁定從之九月以疾乞休奉諭曰大學士范文程任事多年忠誠練達朕所倚賴乃近以積勞成病仍夙夜在公未得専事藥餌深繫朕懷暫令解任安心調攝俟病痊召用特晉太傅兼太子太師頻賜藥餌存問十四年詔晉秩一級圖其象藏之內府聖祖仁皇帝嗣位奉命祭告太宗山陵康熙五年八月卒年七十賜祭立碑諡文肅五十二年御書元輔髙風以額其祠文程經事四朝寵錫優異在盛京時列聖皆呼其官而不名以其形貌頎偉所賜衣冠皆特制居恆言治天下惟在得賢庶官有才者不以一眚掩湔除拔擢時為奏請焉謝政後居别墅中以詩書騎射教子弟性亷慎樂施與器量淵深人莫窺其喜怒子六人承斌襲一等子爵承謨承勳别有傳丁文盛子思孔丁文盛廣寧人初為明諸生太祖髙皇帝天命六年來歸𨽻鑲旗漢軍太宗文皇帝崇德三年任兵部啓心郎順治元年大兵定山東授文盛登萊兵備道二年六月擢山東巡撫閏六月濰縣土賊張廣糾衆數千犯萊州文盛檄遊擊馮武卿等分勦敗賊於三埠及紅山斬賊黨尼思齊趙朋春張廣奔平度遊擊楊遇明率兵追及徐里疃四面環攻廣中鏃死擒斬餘黨無算十二月文盛疏言明季馬政廢弛郵傳缺用輒索之閭閻致滋擾纍自今各驛缺馬宜即以餘存驛站額銀隨時買補又言東省當兵燹之後村落多墟市集皆廢明季所增牙雜二稅請盡行除免舊制臨清東昌平山諸衛設兵五千餘至是虛額過半文盛請裁留二千以節軍餉令州縣各募壯丁暇則聽其自謀生理遇盜賊竊發協力捍禦又請敕有司清理刑獄嚴禁獄卒非法凌虐疏皆下部議行三年冬茌平髙唐禹城武城新城等縣為土賊劫掠文盛請兵上遣副都統覺善率兵往勦四年正月給事中林起龍御史金元禎交章劾文盛才庸不勝重任部議革職命降一級調用九月授河南按察使六年遷福建布政使七年三月卒於官子思孔順治九年進士改庶吉士授祕書院檢討十四年擢國史院侍讀十八年授陜西漢羌道康熙二年巡撫賈漢復劾思孔承追胥役侵欺糧草逾限部議降二級調用五年補河南開封府同知思孔詣通政司辨前在漢羌曽以侵欺糧草之胥役斃獄産絶等情屢牒巡撫賈漢復漢復遲久乃入告思孔無承追逾限罪事下總督白如梅察奏咎在漢復援恩詔免議復思孔所降級補直𨽻通薊道時直𨽻未設布政使八年增設直𨽻總管錢穀守道與巡撫同駐保定調思孔任之十四年遷江南按察使十五年授湖北布政使未之任即調江南二十一年遇計典兩江總督于成龍疏薦思孔任布政使數年籌江西湖廣軍需應期無誤大軍征勦海賊往來絡繹料理裕如且有修造蘇州府學創設育嬰堂養濟院諸善政其介性清操亦矯然特立因有督催錢糧未完各案不得與卓異之列専疏薦舉請破格擢用得旨丁思孔供職勤慎著準為卓異二十二年擢偏沅巡撫既蒞事倡率司道等官修造嶽麓書院置田三百畝資諸生膏火二十四年五月疏言嶽麓書院創自宋開寶時為四大書院之一乾道時張栻教授於此朱子自閩至與講學數旬後朱子知潭州增廣學舍學者益衆今修造已復舊規乞御書匾額並賜日講解義諸書上允所請御書學達性天四字俾懸書院二十七年二月調河南巡撫時裁湖廣總督標下將辨胥令候缺酌補五月裁兵夏逢龍作亂結中軍副將傅爾學參將李廷秀遊擊金竒功守備林德千總胡耀乾馬兵周凱萬金鎰等叛據武昌巡撫柯永升糧道葉映榴並遇害賊分掠黃州德安上命振武將軍瓦岱率師討之調思孔湖北巡撫詔速赴荆州防守専理兵餉思孔以武昌倉庫被賊劫掠各營兵餉俱缺先借撥河南布政使庫銀委員齎隨至襄陽即散給將士鄖陽諸營應於荆州支領者亦令就襄陽發給俾免稽遲疏報稱旨七月瓦岱師至黃州夏逢龍就擒伏誅其黨偽總兵胡耀乾李廷秀萬金鎰周凱偽副將林德偽巡撫傅爾學偽布政婁方順偽驛道金竒功等皆降思孔至武昌察獲賊黨掠匿庫銀九萬餘兩還貯諸庫數耀乾等八人罪並斬以徇九月復設湖廣總督即擢思孔任之二十八年請增設武昌荆州嶽州常德水師並移辰沅宜都諸處戰艦以供訓練疏下部議行三十三年四月調雲貴總督八月卒于官賜祭葬如例四十四年御書績著南邦額表思孔家祠張大猷張大猷遼陽人後𨽻漢軍鑲黃旗太祖髙皇帝天命六年大兵克遼陽大猷時為明千總自廣寧來降授佐領逾年明邉將誘我新附之衆往歸遣人為間諜匿遊擊郎某所大猷發其事太宗文皇帝嘉之豫三等輕車都尉世職天聰九年以所管丁壯缺額論罰鍰崇德三年任刑部理事官尋擢右翼漢軍副都統四年正月大兵征明錦州以炮擊破城旁一臺臺中敵兵尚拒守既而乘間遁去大猷坐防範不嚴部議革職罷任得旨從寬罰鍰六月更定漢軍旗制授鑲黃旗副都統五年隨睿親王多爾衮圍錦州率本旗兵攻取五里臺及涼馬山馬家湖諸處又克金塔口臺六年隨鄭親王濟爾哈朗圍錦州會松山騎兵突出奪我紅衣炮大猷擊郤之復同都統劉之源等攻克塔山杏山及附近諸臺論功晉二等輕車都尉七年六月擢兵部參政十月隨貝勒阿巴泰征明師至渾河築橋以濟明總督范志完集兵拒戰大猷與副都統祖澤洪擊敗之八年隨鄭親王征明寧逺取前屯衛中後所二城晉一等輕車都尉順治元年同都統葉臣劉之源等征山西追逐流賊李自成之將郭某擒斬之合兵攻克太原府城復同都統李國翰招撫郡邑賊衆據黃河濵立柵大猷攻毁之賊潰遁獲船十有五二年隨大軍定江南同都統吳守進率兵征浙江至石門縣明兵自錢塘乘夜來襲營大猷奮擊郤之進取嘉興府同都統格恩圖擊敗城中出戰兵遂克其城先後取揚州崑山常熟江陰諸郡縣皆督兵以炮克城有功三年二月命同侍郎巴山率兵鎮守江寧總管漢軍及緑旗兵旋授為提督江南總兵官五月敘元年以來軍功晉爵三等男四年明故官侯洞曽之子侯元瀞等潛遣人通明魯王朱以海於海島取偽鎮黃斌卿書以歸為柘林遊擊陳可所獲大猷與巴山以其書入奏得旨嘉奬曰爾等嚴察亂萌具見公忠盡職六年率兵勦六安州山賊賊渠張福寰自明季結黨倡亂聯據英山霍山倚險立寨負固有年至是江南總督馬國柱以兵進勦大猷與巴山率兵會之陳斬福寰諸賊寨俱剪平國柱奏捷謂大猷身先士卒履險摧鋒功居第一屢遇恩詔晉爵至三等子世襲罔替九年正月卒於官以其子應庚襲爵馬光輝馬光輝大興人後𨽻鑲黃旗漢軍初為明武舉太宗文皇帝天聰四年隨其兄光逺光先來降授備禦七年豫三等輕車都尉世職崇德三年任户部理事官四年正月以貸官啇貨物三年不償罷任革世職六月增設漢軍官員授光輝鑲黃旗副都統五年隨大軍圍明錦州擊敗松山杏山敵兵六年兼任吏部參政七年隨鄭親王濟爾哈朗攻克塔山城及附近諸臺復攻克杏山城敘功復三等輕車都尉世職時大軍既取錦州光輝奉命同都統孟喬芳率八旗漢軍參領各一往錦州督鑄神威大將軍炮功竣還奏稱旨八年隨鄭親王征明寧逺以炮攻克中後所前屯衛二城晉世職為一等輕車都尉順治元年世祖章皇帝定鼎燕京六部𠫭政改稱侍郎光輝仍任吏部四年考滿加雲騎尉世職五年隨征南大將軍談泰討江西叛鎮金聲桓聲桓既伏誅談泰承制得便宜除授欲以光輝為江西提督光輝辭不就既而談泰欲以都察院理事官紀國先為掌印都司國先謂文職不應授武官且云不善者以善置之善者以不善置之天下反亂職是故耳談泰奏劾國先因以光輝辭提督事入告部議國先應棄市籍沒光輝應罷任革世職得旨免國先死籍家産半光輝罷副都統及侍郎任降世職為騎都尉七年復任副都統八年上以光輝素著軍功仍豫世職為一等輕車都尉加一雲騎尉遇恩詔晉爵三等男是年閏二月兼任刑部侍郎五月調户部侍郎十月授直𨽻山東河南總督十年九月膠州總兵海時行叛脅鎮標官兵從逆肆掠萊沂間光輝統兵進勦至沂州時行引賊走宿遷結浮橋渡河我兵乘其半渡擊之賊多墜水死時行走河南永城光輝同漕運總督沈文奎自靈璧縣趨永城賊據洪河集西拒戰光輝分兵左右夾擊自午至酉殺賊無算時行窮蹙乞降光輝縳之並逮繫其子弟妻孥及從逆禆將數人以聞得旨嘉奬下部議敘加一級廕一子入監十一月以疾乞罷上以其才猷練達慰留之十一年二月甄别督撫諸臣加光輝太子少保尋再疏乞罷詔還京調治十二年七月卒賜祭葬如例諡忠靖子爾泰襲爵張文衡張文衡遼東開平衛人初為明諸生天聰八年太宗文皇帝親統大兵由宣化府入明邊文衡自大同走謁言在明為代王府參謀見明國諸臣結黨貪財専意罔上嚴刑厚斂民不堪命臣審時度勢知天命有歸成大事者必在聖主故徒步來歸又疏陳進取之䇿以收服人心為本上嘉納之授祕書院副理事官賜田宅銀幣以大臣雅希禪女妻之𨽻鑲黃旗漢軍順治元年七月授山東青州府知府甫之任總兵柯永盛率青州駐防兵征髙密招撫侍郎王鰲永至青州籌備軍餉流賊李自成禆將趙應元由長山縣結土賊數千掠民馬數百瞷青州兵少佯就鰲永招撫請置其家屬於城中而自率衆助征髙密既入城以乏糧鼓噪執鰲永殺之文衡分遣官吏告急於永盛及登萊巡撫陳錦自往見應元許以保奏留鎮青州即草疏佯詆鰲永激變謂應元殺鰲永由部衆所逼願立功自效遣人齎奏應元信悅攫庫金與羣賊縱飲會自京出征登萊之副都統和托李率泰統師至駐營於城之西北文衡誘應元至軍營通欵和托等慰勞遣還密令我兵隨文衡入城分布防守乘夜擒斬應元及其黨數十人遍諭脅從者弗罪賊遂平二年調淮安府知府時豫親王多鐸統師征揚州過淮安文衡請禁兵卒入城市俾居民安堵軍糧戰艦及芻秣皆應期立辦三年總督洪承疇奏擢徽寧道淮安士民籲留漕運總督王文奎疏聞不允時徽州土賊汪張飛劉時劉祥等猖獗蔓延文衡協助諸將勦平之四年四月擢江南按察使八月授甘肅巡撫五年二月至蘭州受事三月陜西總督孟喬芳調蘭州鎮兵征四川逆回米喇印丁國棟既降復叛窺鎮兵憚於逺征隂結中軍參將蔣國泰等詭言會議邀文衡至米喇印家文衡將至賊集矢射之遂遇害時年四十有七總兵劉良臣西寧巡道林維造守道張鵬翼副將毛鑌潘雲騰遊擊黃得成都司王之俊守備胡大年等皆同時殉節事聞並賜恤有差文衡贈都察院右副都御史廕一子入監康熙二十一年入開平衛鄉賢祠雍正十二年入祀昭忠祠劉之源劉之源漢軍鑲黃旗人太宗文皇帝天聰十年三月授參領崇德五年五月從上征明錦州距城東五里以紅衣炮攻克其臺復列炮城北攻克晾馬臺擊斃六人降其卒十三人是年兩黃旗漢軍都統馬光逺因疾解任以之源代之六年八月隨睿親王多爾衮圍松山以炮攻克近城四臺斬守備二都司一擒副將王希賢參將崔定國都司楊重鎮等明兵尋自松山遁髙橋迤南三臺之源率前隊兵攻克之多斬馘七年四月隨鄭親王濟爾哈朗圍塔山列炮城西擊毁城垣二十餘丈殲其守城兵衆進克杏山城北一臺復擊毁杏山城城中人驚懼悉降敘功豫二等輕車都尉世職時分設八旗漢軍都統授之源鑲黃旗漢軍都統八年十月隨鄭親王攻明中後所拔其城斬遊擊吳良弼都司王國安等進征前屯衛復以炮攻克其城敘功晉一等輕車都尉世職順治元年大兵定燕京命之源同都統李國翰勦平畿南餘賊時流賊李自成遁陜西偽伯陳永福等竊據太原之源同都統葉臣等攻克其城又同都統巴哈納自汾州勦賊至平陽斬賊四千餘山西州縣悉就招撫師還得優賚二年隨順承郡王勒克德渾征流賊至湖廣同李國翰殲賊應山縣時偽總兵馬進忠降而復叛之源同都統金礪擊敗之武昌奪賊艘六十餘復追敗餘黨於湖泊明年敘功加一雲騎尉五年命為㝎南將軍率左翼漢軍隨鄭親王征湖廣六年進功攻湘潭明總督何騰蛟分兵三隊出城拒戰我軍分擊大敗之克其城生擒騰蛟乘夜率兵追𠞰馬進忠平明薄其營奮力衝擊遂克寶慶并破南山坡九營陳斬其總兵馬有志胡進玉等進忠僅以身免又破袁宗第營於洪江駐師沅州其總兵玉強來犯之源敗之於便水驛斬級七百及副將三人纍遇恩詔晉世職至一等男又一雲騎尉八年同都統金礪駐防杭州時明大學士張肯堂蕩湖侯阮進定西侯張名振等擁魯王朱以海據舟山之源與總督陳錦總兵田雄會師進𠞰由寧波之定關出海阮進集戰艦以拒我師敗之於橫洋生擒進復分兵擊𠞰三戰皆捷遂至舟山之螺頭門肯堂集城中兵六千堅守十餘日我兵用雲梯破城肯堂及尚書李向中吳鍾巒侍郎朱永佑等縱火自焚死名振擁魯王遁三盤島之源遣總兵馬進寶等率兵追克之焚其積聚復敗之沙埕收各嶴户口八千五百餘悉令歸農因與陳錦金礪奏設陸兵一千為中營水兵二千為左右營駐守舟山增設辨備統以副將敘功晉三等子世襲罔替十六年八月授鎮海大將軍駐防鎮江疏言京口要地百川滙流所以通京南半壁之財賦挽運北輸近因海賊鄭成功狡逞糾逆黨連䑸入江來犯幾至橫截運道臣思賊之所長在水宜先練習水師以資防禦夫防海之策有三出海會哨勿使入江上策也循塘拒敵勿使登陸中策也列陳備兵勿使近城策斯下矣顧水師必先儧造船隻今炮火器具水手舵工百無一備何以禦賊乞敕總督郎廷佐速為製備下兵部速議行之十七年七月疏陳三事一沿海居民向有雙桅沙船一名捕魚亦名立功自明時因引倭入冦久經飭禁至今未盡革除姦民多夤緣汛官買口私出因臣申嚴海禁始開報船户花名投營效用此等船隻造作堅固其人皆熟於洋靣水道若徒許令投營不為安插得所日久必仍販載禁貨出洋或且為海賊耳目今令京口水師造船二百招募水手舵工八千餘名一時正難精當莫若悉將兩項船隻查驗堪用者量給價值各船户照例給以糧餉既可省鳩庀製造之費亦可杜私通海逆之弊一汛防向設戰船分散各營船式低小猝遇海賊大艘勢難相抵臣思京口水師既造船隻旌旗舳艫煥然改色江寧亦有沙唬各船備用則此等小舟除狼山福山吳淞各口酌留數號以備傳遞哨探之用其餘不必槩行修補以省無益之費一邉海汛地緊要凡炮臺烽墩橋路宜修葺髙廣豫備不虞臣已屢飭沿海州縣至今玩誤不行請敇督撫嚴行申飭疏下兵部並從其言詔江南督撫提鎮實心奉行無得因循怠玩是年緝獲海逆鄭成功所遣偽兵部黃徴明得交結蘇松提督馬逄知及逄知受賄關通狀入奏特命刑部侍郎尼滿赴江南會同之源審擬事俱實逄知伏誅康熙元年十二月招降偽肇敏將軍陳文達偽總兵羅永德等三年四月乞休召還京仍任都統四年七月復乞休得旨劉之源自太宗時委任勤勞年久著以原銜加太子太保致仕旋以其子副都統劉光代為都統八年內大臣鰲拜獲罪拘禁之源與光並坐黨附革職任擬立斬籍沒上命從寬俱免死之源尋卒二十年妻胡氏叩閽欣之源功可抵罪詔復原銜並豫三等子爵以光襲胡有升胡有升錦州人太宗文皇帝崇德元年睿親王多爾衮豫親王多鐸征明錦州道人崔應時與民人張紹楨門世文門世科秦永福等五十人謀以城降使有升持書詣我軍期為內應豫親王與書齎還明將覺之執應時等數十人置諸獄有升同紹楨世文世科永福乘間脫走來歸各賜冠服鞍馬妻室奴僕授世職有差有升得授三等男𨽻鑲黃旗漢軍七年隨貝勒阿巴泰征明薊州越燕京趨山東敗明總督范志完兵於渾河八年隨鄭親王濟爾哈朗征明寧逺攻克前屯衛中後所二城敘功晉二等男順治四年授南贛總兵五年總兵金聲桓偕副將王得仁據南昌叛糾衆犯贛州先以書招左協副將髙進庫進庫不從勒兵出戰為賊先鋒劉一鵬所敗乃收兵為固守計巡撫劉武元巡道張鳯儀分守城東西有升率健卒沿城策應賊穴城將置火具仰攻有升以石塞所穴竇賊計遂沮閲三月城中糧匱有升督兵出戰賊敗却數里聲桓聞大軍由九江直搗南昌倉皇引衆北走有升追擊之斬馘無算未幾廣東叛鎮李成棟犯贛州有升率諸將乘賊方鑿壕分兵東西南三門出擊大破賊成棟僅以數騎遁先是南贛總兵柯永盛遷湖廣總督請以南贛鎮兵二千自隨部議如所請有升疏言贛地當江湖關鍵風尚好武輕生姦宄易作控馭宜嚴且金逆未平正資勦援以固疆圉廣東賊冦尚多鎮兵久習水土熟知地利便於征勦不宜移去奏入乃詔前所議移兵仍留贛鎮而令永盛另募新兵明年聲桓成棟等相繼剪滅大軍凱旋土賊仍未靖上猶劉飛龍南葉芝南石城鄒華雩都彭順慶瑞金陳其綸皆負固抗逆有升同武元檄將分剿先後蕩平敘功加左都督賜紫貂冠服甲胄佩刀鞍馬三遇恩詔晉爵至三等子十年四月平南王尚可喜靖南王耿繼茂疏述有升深算老謀同巡撫劉武元堅守南贛與粵東唇齒相依功宜録敘部臣以有升業已晉銜都督寢議上特詔曰胡有升同劉武元堅守岩城屢挫金王二逆及廣東叛鎮李成棟犯贛又能出竒制勝以寡擊衆大敗賊兵四省咽喉遂得安堵忠誠可嘉勞績茂著雖已晉銜未足酬功朕加意封疆不吝爵賞其再議優敘於是加太子少保十三年二月入覲賜冠服鞍馬十七年以年老解任回旗康熙三年劉武元之子瀇疏請追敘守贛功既加騎都尉世職有升援例以請部臣議加雲騎尉得旨胡有升守贛州全城敗賊之功不下於巡撫劉武元亦豫騎都尉世職遂合所有世職為一等子八年九月卒祀江西名宦祠子啓泰襲爵後改𨽻鑲白旗楊名髙楊名髙遼東人太宗文皇帝時率族屬百餘人來歸𨽻鑲黃旗漢軍授佐領尋兼任兵部理事官崇德七年四月隨鄭親王濟爾哈朗征明攻克塔山杏山城及附近諸臺論功豫雲騎尉世職八月同副都統馬光輝等往錦州督鑄神威大將軍炮十月隨饒餘貝勒阿巴泰征明擊敗明總督范志完兵於渾河橋明年師旋至牆子嶺復敗敵於南山其年冬隨鄭親王取明前屯衛中後所二城順治元年敘功晉騎都尉二年任參領三年擢都察院參政六年授福建漳州提督時福建大田一邑為偽新建王朱由模所據並連結延平髙峯諸寨賊衆為聲援七年春名髙率師進剿破賊石磯嶺由模聞風遁走永安延平副將王愛臣追獲之賊渠陳光等據髙峯寨密遣人往德化約賊黨鄭文薦來援名髙令副將韓尚亮率兵截擊圍其寨賊被圍急從東門突出我兵奮勇衝擊賊陷壕死者過半師至大田賊衆四潰進擊之龍門橋俘馘甚衆擒偽都督郭竒偽總兵廖明正諸寨悉受撫是年冬又率兵剿賊邵武賊衆自建寧遁入江西新城縣名髙分兵為中左右三路而進自與總兵王之綱殿後直抵賊營追剿三十餘里擒偽寧洪伯洪國玉偽總兵李安民王恆美等獲牛馬鎗炮無算得旨下部議敘豫紀録三遇恩詔晉世職二等輕車都尉九年海賊鄭成功偕其黨鄭森等由厦門出掠連陷長泰漳浦海澄南靖諸邑旋糾衆二十餘萬冦漳州屯於鳯巢山名髙督兵衝擊破之賊退據海澄所陷長泰諸邑以次克復會成功之父芝龍疏請以書招降成功詔允罷兵議撫成功不遵詔仍紏賊肆掠突陷漳州府及惠安同安安溪永春德化仙逰諸州縣十二年給事中魏裔介劾奏名髙禦剿怠玩貽誤封疆請敕處分疏下總督佟岱察核十二年佟岱以名高調度無方馳援不力覆奏於是革任尋卒子天福襲世職郭廷佐部廷佐漢軍鑲黃旗人先世居廣寧父熙載為明生員太祖高皇帝天命七年征明廣寧熙載率遼河西四堡兵民來歸授備禦分轄降衆守其地嘗擒獲逃卒五十人論功豫三等輕車都尉世職崇德元年卒長子廷輔襲世職廷佐其次子也由官學生授內院筆帖式順治二年擢國史院侍讀三年隨肅親王豪格征四川流賊張獻忠六年隨英親王阿濟格征大同叛鎮薑瓖是年遷祕書院學士十一年授江西巡撫江西自明末洊遭兵亂水旱頻仍逋賦甚多廷佐再疏請蠲緩以蘇民困並得旨俞允時土賊洪國柱繆我章等剽掠饒州廣信間廷佐遣將往剿降之十二年擢江南江西總督十四年疏言江南逋賦多至四百餘萬兩宜分核官侵吏蝕民欠各為一册専責右布政使按籍督催其新徵嵗賦以左布政使稽其收納則新舊牽混之弊可除至徵收之州縣衛各官舊例未完者輒豫降調官屢更易吏民益輕玩催科反無實效宜令戴罪留任催完又江南襟控數省啇賈所聚前者大軍經行以船載兵估舶因觀望不至宜如江西例官為造船備用以蘇啇困上嘉其言深切時弊下所司議行十六年以巡按衛貞元劾按察使盧慎言婪贓不職廷佐不先劾奏及奉旨詰問復巧言支飾部議黜罷得旨革職留任是年二月廷佐因巡閲江海密陳海防機宜言海賊鄭成功擁衆屯聚海島將侵犯江南而江省各汛兵數無多且水師舟楫未備請調發鄰省徑兵防禦疏下部議以鄰省亦需兵防守寢其事五月海賊陷鎮江襲據瓜洲遂犯江寧時城中守禦單弱會副都統噶楚哈等從貴州凱旋率兵沿江而下廷佐與駐防總管喀喀穆邀入城共議擊賊挫其前鋒獲舟二十餘偽印二賊酋鄭成功旋率賊衆逼城連營八十有三賊艘蔽江分截要路廷佐與喀喀穆等晝夜堅守檄調各路步騎及水師俱至同諸將定計以滿洲兵禦擊賊營而令緑旗兵從儀鳯鍾阜二門出戰擒偽總統余新及偽總兵二次日廷佐居守議以提督管效忠總兵梁化鳯等分水陸進擊大敗賊衆擒偽提督甘輝偽總兵張祿郭良玉焚毁賊艘五百餘賊之在鎮江瓜洲者皆遁入海捷聞得旨嘉奬下部議敘尋兵部請議前此失陷所屬城邑罪上以廷佐於失事後能固守江寧擊敗逆賊命免議祇停敘功嗣復以失糾巡按王秉衡劣迹部議降調得旨寬免十八年聖祖仁皇帝即位分江南江西總督為二以廷佐任江南總督康熙四年復舊制廷佐仍兼督江西七年十一月以疾解任先是致仕大學士金之俊家居得匿名書於門詆其在明居顯秩曽降流賊李自成之俊以訴廷佐令有司窮治之旋以書有悖逆語疏聞上以廷佐窮治匿名書帖將株連無辜並諭責之俊違例妄訴俱下部察議八年正月命削之俊加銜廷佐於病痊起用日鐫二級十三年逆藩耿精忠反福建總督范承謨遇害上特起廷佐為福建總督廷佐受命即奏言臣孫雖為精忠胞弟之壻然臣誓不與逆賊俱生願力疾前驅殱除叛冦上嘉之賜鞍馬甲胄以寵其行時福建俱陷賊廷佐至浙江隨康親王傑書駐金華十五年六月卒賜祭葬如典禮祀江西名宦趙廷臣趙廷臣漢軍鑲黃旗人順治二年由貢生授江南山陽縣知縣遷江寧府江防同知因催徵逾限罷職十年大學士洪承疇赴湖廣經略軍務奏薦廷臣清幹素著請以隨往軍營委用得旨俞允十一年授湖廣分巡下湖南道十三年調本省督糧道十五年隨大兵定貴州遂授貴州巡撫明年擢雲貴總督先是土賊馮天裕等竄伏山寨勾結亡命陷湄潭犯甕安至是廷臣調思南平越遵義偏橋諸路兵擊破賊營斬天裕及偽總兵冉宗孝等疏言貴州古稱鬼方自城市而外四顧皆苗雖種數不同要皆専事鬬殺故馭之為難臣以為教化無不可施之地風俗無不可移之鄉請今後應襲土官年十三以上者令入學習禮由儒學起送承襲其族屬子弟願入學讀書者亦許其仕進則儒教日興而悍俗漸變又每遇嵗終土官各上其世次之籍於布政司布政司上其籍於部遇承襲時有爭論者按籍立辨斯釁端預杜矣又奏改馬乃曹滴諸土司為流官復言黔省曩為冦踞改衛為府改所為縣紛更法令民苦重役今底定之後應仍舊制滇省田土荒蕪當亟招民開墾其衝路各州縣請以順治十七年本省秋糧貸為春種之需會吳三桂以五象進獻上命停止送京廷臣因疏請概停邊貢以省解送之勞疏俱下部議行尋以剿平土酋龍吉兆功加兵部尚書聖祖仁皇帝御極調廷臣浙江總督彚敘督墾雲南荒田功加太子少保康熙二年廷臣疏言浙江逋賦不清由徵解繁雜請以一條鞭徵收之法即用為一條鞭起解之法令各州縣隨徵隨解布政司察明注册至為簡便又請移海島投誠官兵分插內地杜賊人煽誘定水師提鎮各營設兵之制以備水戰杭嘉湖三府毗連太湖􅍩湖易於藏姦請增造快唬船撥兵巡哨部議俱從其請時海賊鄭成功死廷臣招其黨偽將軍阮美偽都督鄭殷偽侍郎蔡昌登等皆相繼降獨偽兵部張煌言率衆逺遁廷臣馳赴定海與提督哈爾庫張杰定議檄水師由寧台溫三府出洋搜剿斬賊六百餘降其偽副將陳棟知煌言披緇竄伏海島廷臣選驍將徐元張公午飾為僧人服率健丁潛伏普陀山朱家尖蘆花澳三路以伺得賊船急擊之擒賊林生陳滿等誘使言煌言竄處即駕所獲賊船乘夜至懸山范澳自山後潛入賊帳擒煌言獲其偽敇印奏入得旨嘉奬煌言伏誅四年疏請崇節儉以維風俗又言用人宜寬小眚請敕部分别罣誤降革人員量才録用以收得人之效又言駐防滿洲收買民人宜令地方官給與印契並曉諭居鄰俾知某人賣身旗下後或逃歸有容留者乃可坐其窩逃之罪事並下部議行會部檄各省流寓人責令回籍廷臣疏言革職解任之員應即令回籍其身故而子孫願留及流寓士民有丁口田土已附版圖者宜聽其自便得旨漢軍速催回旗餘如所請五年招降海賊鄭錦之偽都督李順等六年閏四月以病求罷上慰留之八年二月卒於官賜祭葬如典禮諡清獻廕一子入監髙天爵子其佩髙天爵漢軍鑲白旗人後改𨽻鑲黃旗先世居鐵嶺父尚義以隨征松山杏山及太原功豫二等輕車都尉世職任杭州駐防協領天爵於順治四年由蔭生任山東髙苑縣知縣考滿邉河南信陽州知州十一年以經略洪承疇薦擢湖廣長沙知府大兵進剿明桂王朱由榔天爵理餉濟軍十三年因父病假歸十六年補江西建昌知府先是廣昌縣山賊王昻傅勝辛連升周由義陳太宇蕭來信夏登選等聚黨數千時出劫掠據羊石滴水二寨為老巢形勢險峻官軍仰攻輒為賊滚木礧石所損傷因罷攻招之降王昻傅勝佯就撫仍伺隙煽亂官軍擒之斃於獄餘賊益負固抗拒十八年五月天爵與巡道張永祺參將王之任議乘風雨交作漂流樹木衝斷橋梁賊俱歸巢後分布官軍絶賊去路直搗滴水寨進攻羊石寨斬賊千餘盡毁賊巢賊傷斃及墮崖死者無算生擒辛連升周由義陳太宇蕭來信夏登選及王昻之父王尚智並斬於軍賊所掠丁口悉遣還其家巡撫張朝璘疏報十年寨賊一旦掃除由道府區畫周詳捐資懸賞鼓勵士卒冒險奏功詔下部察敘天爵得軍功加級康熙十三年逆藩耿精忠據福建叛縱黨入江西犯建昌時天爵已遷兩淮鹽運使或勸之速行天爵曰吾守此王十六年雖受代豈可遽離遂率家丁數十人禦賊萬年橋城守副將趙印已降賊乘天爵力戰從後縳之以獻賊載送入閩再四誘降終不屈賊拘繫之越嵗餘天爵與副將王進武舉胡守謙將材楊起鵬薑山等同謀遣千總徐德功出仙霞嶺請大兵入關隂結死士為內應賊將王廷彥訐之耿精忠遂以十五年九月四日遇害十九年福建巡撫楊熙疏列同日殉節諸人部議恤廕有差天爵得旨贈太僕寺卿廕一子三十五年福建巡撫卞永譽請以天爵與原任福寧總兵吳萬福福州知府王之儀邵武知府張瑞午建寧同知喻三畏邵武同知高舉侯官知縣劉嘉猷尤溪知縣李塤福州城守千總廖有功等合建一祠於省城西門外春秋致祭得旨允行四十四年子其佩官工部員外郎為父請賜扁御書藎忱義烈以額其家祠四十六年其佩官浙江溫處道復為父請諡賜諡忠烈雍正四年長子其位官大學士其佩官都統同奏請諭祭得旨髙天爵捐軀盡忠大節可嘉高其位髙其佩乃現任大學士都統大臣為父請恤甚是著加禮部尚書銜追賜恤典七年入祀昭忠祠其佩天爵第五子康熙二十一年以父廕授江南宿州知州二十五年丁母憂歸三十二年補雲南姚州知州三十六年內遷工部員外郎四十四年授浙江溫處道五十一年六月以署運使虧空鹽課革職尋開復五十四年補四川永寧道五十九年九月遷四川按察使雍正元年三月內遷光祿寺卿協理刑部侍郎事九月擢刑部右侍郎二年正月擢正紅旗漢軍都統仍兼刑部侍郎三年四月命其佩同侍郎史貽直往四川審理年羹堯誣罰茶商私占鹽窩各欵又陜西郃陽縣因私鹽致死無辜八百餘人事皆得實十二月因年羮堯冒銷四川鋪司銀兩係其佩按察使任內事特旨詢問以鋪司未設乾沒屬實覆奏下部議追繳五年七月刑部審擬主事菩薩保藏匿隆科多應追入官銀聼其詭稱祖遺給還故入首告者誣罪其佩與尚書賽爾圖侍郎海夀等並坐黨惡徇私肆行欺罔論斬詔從寬免死革侍郎仍留都統任七年二月因追繳四川任內冒銷帑銀逾限不完革任十二年九月卒其位别有傳欽定八旗通志卷一百八十九
