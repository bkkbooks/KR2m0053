  text: 職官志八職官各處駐劄大臣新疆各官王府各官各處駐劄大臣謹案舊志載八旗大臣外省分防之任而於邊疆駐劄大臣俱未及載仰惟聖朝聲教覃敷懷柔朔漠西藏青海諸地並入版圖畫疆置吏有如內地我皇上德威逺播式廓鴻圖蕩平凖部回部自天山南北數萬里而遙皆列戍開屯分設郡縣屹然重鎮鞏固萬年所設駐防及辦事諸職胥由特簡以親信大臣膺其任增書於册具見閎綱備舉周於輪廣之盛焉喀爾喀軍營定邊左副將軍一人參贊大臣二人凡四部會盟參贊大臣間嵗分往會核稽其邉防軍實之事統聽左副將軍裁決具疏以聞侍讀一人司員三人筆帖式五人卡倫侍衛七人佐領一人驍騎校一人唐努烏梁海總管五人佐領二十六人驍騎校二十六人阿爾泰烏梁海散秩大臣二人副都統一人總管四人佐領二十七人驍騎校二十七人庫倫辦事大臣一人司員一人旨增謹案乾隆四十九年正月奉係出派大臣二人同辦庫倫事務特簡不在定制之內故不列為額缺分駐恰克圖辦事司員一人聽庫倫大臣節制綏逺城將軍一人協領滿洲四人蒙古一人協領兼佐領滿洲四人蒙古一人佐領滿洲十二人蒙古三人防禦滿洲十六人蒙古四人驍騎校滿洲十六人蒙古四人隨印筆帖式滿洲二人蒙古一人歸化城土默特副都統一人參領十人佐領四十九人右衛城守尉一人防禦四人驍騎校四人遊牧察哈爾都統一人副都統一人八旗遊牧滿洲理事官九人八旗蒙古理事官八人護理都統關防筆帖式滿洲二人蒙古二人護理軍站印務筆帖式一人八旗總管八人參領八人副參領八人佐領一百一十一人驍騎校一百一十九人護軍校一百一十八人捕盜六品官四人親軍校四人察哈爾東西各分四旗西四旗在山西多倫諾爾境東四旗則熱河道屬境也西寧辦事大臣一人司員一人筆帖式三人凡青海三十六旗之會盟一如喀爾喀四部之制間嵗舉行聽簡命大臣裁決具疏以聞西藏辦事大臣二人司員一人筆帖式一人特旨由派三年更代簡新疆各官總統伊犁等處將軍一人參贊大臣一人裁設無定領隊大臣五人印務章京二人筆帖式二人糧餉章京二人筆帖式一人駝馬處章京一人筆帖式一人卡倫侍衛十二人將軍參贊大臣駐伊犂領隊大臣一駐惠寧城四駐惠逺城總管六人副總管七人協領十二人佐領一百有八人防禦五十六人驍騎校一百有八人署理營務筆帖式十人總管錫伯一副一索倫逹呼爾一察哈爾二副二額魯特二副三協領駐惠寧城四惠逺城八佐領惠寧城十六惠逺城十四錫伯八索倫逹呼爾八察哈爾十六額魯特二十防禦惠寧城十六惠逺城四十驍騎校各如其佐領之數筆帖式滿洲蒙古二錫伯二索倫逹呼爾二察哈爾二額魯特二俱經制之缺由伊犂所屬諸旗揀補又有領催委署前鋒校或給七品頂帶或給六品頂帶在卡倫侍衛上行走者舊無定額又總理回務有頭等台吉三品阿竒木伯克一人四品伊什罕伯克一人五品噶匝納齊伯克二人五品商伯克二人六品哈子伯克一人六品都官伯克一人七品密喇布伯克六人七品明伯克六人七品什和勒伯克一人七品帕察沙伯克一人七品玉資伯克一人烏魯木齊都統一人副都統一人舊惟設安西提標緑旗五營乾隆三十六年始以滿洲兵駐防設參贊大臣一人三十八年又設領隊大臣二人四十二年始定為今制協領六人佐領二十四人防禦二十四人驍騎校二十四人筆帖式二人卡倫侍衛三人乾隆三十七年設管理額魯特官兵總管一人副總管一人佐領四人驍騎校四人四十二年移駐塔爾巴哈台又有管理台站屯政厰務各員或由陜西甘肅二省除派或由伊犂調撥無定額庫爾喀喇烏蘇領隊大臣一人管理糧餉官一人筆帖式一人又有管理臺站屯政文武各員或由陜西甘肅二省除派或由伊犂烏魯木齊調撥無常員塔爾巴哈臺參贊大臣一人領隊大臣二人乾隆三十年設初駐雅爾後移駐今治總管一人副總管一人協領一人防禦三人佐領七人驍騎校十人卡倫侍衛十二人印房章京三人筆帖式二人管理糧餉官一人總管舊駐烏魯木齊乾隆四十二年移駐巴理坤領隊大臣一人協領二人佐領八人防禦八人驍騎校八人印房筆帖式一人乾隆三十七年原設參贊大臣一人領隊大臣一人協領四人佐領防禦驍騎校各十六人筆帖式二人後改參贊大臣為領隊大臣而以領隊大臣一人移駐古城協領以下等官亦分其半隨駐雲騎尉乾隆五十三年五十六年添設古城領隊大臣一人協領二人佐領八人防禦八人驍騎校八人印房筆帖式一人並乾隆三十九年自巴里坤移駐總理烏什等處協理大臣一人裁設無定初置烏什參贊大臣一員乾隆五十一年移駐喀什噶爾阿克蘇領隊大臣一人阿克蘇城舊制設辦事大臣乾隆三十一年併𨽻烏什裁舊副都統一人改設參贊大臣以阿克蘇大臣移駐其領隊大臣則自喀什噶爾移駐印房章京二人筆帖式三人管理糧餉官一人印房章京乾隆三十一年設筆帖式舊設一員是年增二員協領一人佐領二人防禦二人驍騎校二人護送伯克侍衛一人卡倫侍衛十一人軍臺委署筆帖式十人佐領防禦驍騎校俱乾隆三十一年由烏魯木齊巴里坤調撥移駐卡倫侍衛則舊所設也又管理回民有五品阿竒木伯克一人六品哈子伯克一人七品明伯克一人七品密喇布伯克一人分理阿克蘇有三品阿竒木伯克一人四品伊什罕伯克一人五品噶匝納齊伯克一人五品商伯克一人六品哈子伯克一人六品巴濟吉爾伯克一人六品伯克二人七品訥克布伯克一人七品都官伯克三人七品莫提色布伯克一人七品木特幹里伯克一人七品明伯克二人七品阿爾巴布伯克一人七品帕察