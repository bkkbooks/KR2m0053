body:
  text: 欽定四庫全書欽定八旗通志卷一百五十三人物志三十三大臣傳十九滿洲正黃旗七海望碩色喀爾吉善嵩夀喀爾吉善子定長喀爾吉善滿洲正黃旗人姓伊爾根覺羅祖喀齊蘭官副都統有傳父凱音布初襲其祖克宜福所遺三等輕車都尉世職康熙十年授御史兼世管佐領二十六年擢光祿寺卿纍遷吏部侍郎三十一年改漢軍正黃旗副都統三十三年調滿洲正黃旗副都統三十九年授禮部侍郎命偕學士碩穆布赴廣東查審雷瓊道成泰慎遊擊詹伯豸擾黎激變事得實論罪如律四十年擢户部尚書四十五年調禮部尚書四十七年以老病致仕雍正元年卒賜祭葬如例喀爾吉善降襲騎都尉授上駟院員外郎充滸墅關監督雍正九年正月遷郎中三月調工部仍兼上駟院行走五年襲世管佐領七年以前偕通政使留保會鞫廣東署知州楊以寧勒索耗穀案誤擬罪部議革職得旨從寬留任尋豫開復八年擢兵部額外侍郎九年授左侍郎十年充八旗通志館副總裁十三年三月以驗馬不實議革職留任六月詔革任九月命往盛京收糧乾隆元年三月奉旨仍留佐領五月以廢員引見命管理圓明園八旗兵丁九月復往盛京收糧十二月奏言向來八旗臺站兵二八月於中江與朝鮮人貿易每減價勒買牛或藉索海參請嚴禁諭曰朕思八旗臺站官兵有看守巡查之責原無暇貿易且亦不諳貿易之事嗣後著改令內地商民與朝鮮貿易中江稅官實力稽查務均平交易毋得勒掯滋擾三年五月擢內閣學士七月遷户部左侍郎協辦步軍統領衙門刑名事務十二月調吏部左侍郎四年兼管三庫事務五年閏六月授山西巡撫六年正月疏言晉省各屬自理贓贖銀向來有詳報上司者亦有因公動用無案可稽者請令按季册報二月又言汾水經太原府城西舊有土堤卑薄每夏山水驟發城郭堪虞應培堅厚並於頂衝處隨時搶護詔均如所請三月疏劾布政使薩哈諒貪婪及學政喀爾欽納賄營私各欵命侍郎楊嗣璟往會鞫得實論罪如律諭曰此二案朕先有訪聞降旨詢問喀爾吉善不能隱匿始行參奏著該部嚴議尋議革職上念其到任未久詔從寬留任八月疏言晉省偶遇水旱米價輒騰貴請令各屬照時價及時平買從之九月疏劾河東鹽政白起圖貪鄙婪索白起圖亦以喀爾吉善挾私誣參奏辨命副都統塞楞額往鞫論白起圖罪如律十二月疏言煤為兵民日用必需口外更資禦寒歸化城等處駐滿洲兵商民輳集附近無薪可採請多開煤窑仍禁內地煤出口杜帶禁物之弊下部議行七年三月疏言歸化城土默特蒙古不諳耕種以地典給民人生計窘迫請將民人所輸銀徴解將軍分給蒙古用度如尚有可耕地一體招民墾種大學士等議行十二月調安徽巡撫八年三月調山東巡撫六月疏言本年東省雨澤愆期秋成失望民人多外出謀生而鄰省貧民亦有轉入東省覔食者請飭地方官勸令各回故土以待本處自有之恩諭曰所見甚為得體各省督撫須當留心於平居無事之時委曲開導使知敦本務實力田逢年若輕棄其鄉則本業拋荒失所依倚即國家收飬資送亦不得已之計非可恃為長䇿也七月又言濟武東三府屬遇旱濟東有漕運又有府倉及臨德二倉存穀緩急可相通惟武定無倉請於登萊二府倉撥運接濟九月又言倉糧買補貴有權衡濟武東三府屬現辦災賑倉穀請暫停買還其豐收價平處令及時買補上是之九年二月疏言春月糧價騰貴貧民艱食請酌量減糶三月又言東省兵米例係按季本折兼支春季青黃不接米價昻兵支折色秋收米價平減轉支本色請以春秋二季本折互換又德州海豐惠民樂陵各州縣應修城以工代賑及時舉行四月又言濟武二屬麥秋復被旱災現雖賑借糶三者兼行而繼此亦宜廣籌請飭各州縣於豐收之曹沂等府採買接濟並請於豫省沿河州縣麥收豐稔處量為採買運貯五月請於司庫借支一季餉銀給濟武營兵於冬季為始分四季扣還以紓兵困均得旨嘉允先是有直𨽻藁城縣知縣高葑者山東人請試開臨淄即墨平隂泰安沂費滕嶧等縣山場銀銅鉛鐡各礦事下山東巡撫勘奏至是喀爾吉善奏言神京拱衛礦洞久經封禁東省其地跨四府八縣形勢逺近聫屬開採殊多未便且利之所在衆必共趨恐濟武災區沂曹盜藪别生事端應照舊封禁上韙其言十年二月諭曰前因外省兵糧缺出帷馬糧係督撫提鎮親行拔補至步糧則由營員驗放往往徇情市惠濫行收録虛糜糧餉曽降旨令直省督撫提鎮親自驗放今據喀爾吉善奏稱東省各營碁布星羅散處十郡若概送提鎮衙門考拔不惟道路跋涉且恐久懸名缺請嗣後將臣標所屬二營登州鎮屬濟南城守一營及附近省城之大小營汛遇有兵丁缺出臣俱親加考拔其登兖鎮臣均照此辦理至副將乃武職大員其同城本營及附近營汛之兵丁亦即飭令該將慎重選拔秉公驗放仍造册呈報提鎮於按年巡視各營時照册查對此奏亦屬有見著照所請行並通諭各省督撫提鎮知之十二月以幕友吳芳猷掣選廣東縣丞疏請留東補用為御史張孝挰所糾諭曰張孝挰奏稱喀爾吉善身為大臣嫌疑俱不必避則當咨部銓選何必竟以留東奏請而於吳芳猷掣選廣東逺省始起辦公需人之見難免規避此奏亦是吳芳猷著仍補廣東原缺十一年九月遷閩浙總督十一月命開復前革職留任案十二年五月疏言臺灣漢民流寓日衆匪類肆竊更有闖棍惡徒恣行不法請嗣後竊案計贓在徒罪以下並眷屬在臺者初犯刺臂責懲交屬收管再犯則刺面按律治罪并眷屬逐回內地安置其闖棍擾害地方者審明治罪無論有無眷屬概行逐回仍行知原籍地方官交保鄰族正管束不許私渡過臺六月又言臺灣地狹民稠姦偽百出請自本年五月為始定限一年在臺民人迎取家眷及的屬欲往就飬者確查給照過臺仍飭內外汛口員辨詳察愈限不準給照詔均如所請尋偕巡撫陳大受合疏言閩省倉穀出陳易新不難於出糶而難於買補春夏碾米給兵秋冬民間碾米完納官又易穀補倉事多周折不若即令糧户交穀官民兩便從之七月議覆浙江處州總兵苖國琮儲材備用一疏言閩浙戰船桅木非巨材不可若如國琮所奏於無稅官山種樹令地方官培養則須先發工本未免糜帑且必百十餘年始中繩墨恐日久稽查匪易不若許民自種納課種樹之初得收花息成材之後仍給價值民視為已業培護自勤在官不費經營而良材可獲實用下部議行九月疏劾浙江巡撫常安貪婪各欵命大學士訥親往鞫得實論罪如律十三年四月諭曰閩浙總督喀爾吉善鎮靜和平練習吏治其參奏常安一事不以同官稍為隱護公直可嘉乃督撫中所少者斯實不負朕倚任之意著加太子少保十四年二月偕巡撫潘思矩條奏海防三事一內地民往來外洋勾結滋事應令保甲族長於編查門牌時將户內所有往販外洋之人或為舵水或為客商逐一登明倘久客不歸及倐來倐去形迹可疑並外畨人往來其家即報明詳究一洋船舵水人等給照時應逐名親驗即客商跟役亦親驗取結至出口如有更易許船户呈明守口各員於總照內填注不能逺赴原籍取結者即取具行保及同船客商切結俟入口時驗明原照方準回籍一洋船回棹之六七八九等月及出行之十二正二三等月責沿海汛辨兵丁晝夜巡查渡載外洋人貨者以私越論諭實力行之又言福寧府屬之寧德縣舊有東湖地勢平衍與海通宋元洎明失修臣諭守令等察形勢土性導士民輸資合築撥世業以出資輕重定分地多寡堤成酌定年限照例分别升科雖國家增賦無多民食實有攸賴諭曰勸課農桑興修水利正務本之圖也欣悅覽之十五年加兵部尚書銜十六年三月上南巡恩免江南積逋二百餘萬而浙省向無逋欠亦特蠲本年正賦三十萬兩奬賜喀爾吉善詩曰巡吳於越便中過恐誤農桑候正和完賦自緣民俗美不須重勉善催科七月疏言浙省溫台一帶被旱儲積空虛應自閩撥運臺穀接濟但重洋往返需日一面先撥厦門廳及莆田縣倉由厦門乘南風運往所撥臺灣穀至厦門就近歸還至臺灣備貯穀亦應及時買補無俟溫台解還糶價即先借欵於秋成收買得旨嘉允十七年二月以浙江巡撫永貴辦賑乖謬喀爾吉善不能匡正且附和部議革職詔從寬留任七月又以失察司庫吏侵冒帑項議革任仍詔免十月奏年老懇回京供職溫諭慰留又奏閩省産米穀少向來採買俱預先公平給價與各省買自市集徒昻市價者不同本年豐收宜收買儲備請將現存倉穀不足五分者買足即已足五分而本地穀價平減亦動支原存糶價買補又閩省山險就本省通融撥運無庸赴鄰省採買上是之十八年正月以督擒福建漳州姦民蔡榮祖等迅合機宜諭部議敘加一級十九年四月加太子太保閏四月條奏更改浙省海塘六事一南北兩岸工程各不相及海防道員宜裁北岸仁和海寧海鹽平湖四縣塘工歸杭嘉湖道轄南岸蕭山山陰會稽三縣塘工歸寧紹台道轄各增養亷銀五百兩一海防同知通判宜更定分管之界北岸土石柴塘鞏固無事興築八仙石至戴家石橋歸西防同知戴家石橋至談仙嶺歸東防同知談仙嶺至江南金山界歸乍浦同知統聽杭嘉湖道轄南岸塘工向係紹興府通判兼管究非専員應將壯岸通判改為南塘移駐紹興府之三江城聽寧紹台道轄一塘兵宜改堡夫海防營額兵一千內有僅諳修防不習技藝者應挑出四百名作為堡夫照南河例在堡看守堡房其錢糧於裁撤兵餉內動撥一裁撤之兵宜分撥杭乍兩營海防額兵一千內既改堡夫四百再將諳曉技藝者撥入杭協城守營二百諳曉水務者撥入乍浦水師營一百餘均裁汰或歸農或補附近各營缺額一杭乍兩營宜增設備辨杭協城守營僅一都司應將海防左營守備改為杭協城守營中軍守備乍浦水師應分左右兩營將原設守備改為左營海防右營守備改為乍浦右營其千把總外委各員分别酌撥一官兵裁剩經費宜歸併塘工備用海塘每年額設引費萬餘兩備嵗修不敷仍題動正項今官兵既撤節省各項銀應歸入海塘經費項下遇有工程無須復動正項部議從之先是上以八旗生齒日繁恩許京城漢軍人等改歸民籍各謀生計各省駐防漢軍一體推行所遺缺即派京城滿洲兵往補命喀爾吉善會同福州將軍新柱籌議七月會奏應辦事宜六條一願為民之漢軍無論世族間散準入民籍一願為民而别無生計惟藉糧餉贍飬者分派近省緑營坐補糧缺一漢軍甲兵儘馬甲先改一半以便滿洲兵坐補一漢軍原住房屋均留給新派滿洲兵一暫留漢軍水師兵令滿洲兵漸次學習頂補一派出京城滿洲兵應分次分路行走又言福州駐防兵既改滿洲則協參防校等缺應改用滿洲人員請於八旗滿洲現任佐領以下等官及隨旗世職內揀發來閩與漢軍人員交代任事大學士等議行二十一年以查審前任浙江巡撫鄂樂舜勒派鹽商銀一案論擬失實部議革任詔寬免尋奏浙江省海塘為杭嘉紹三府田廬攸關年來水勢南趨北塘鞏固南岸紹興所屬尤險請於宋家樓楊樹下一帶照海寧魚鱗條石等塘建石塘四百丈其平穩處接築土塘二十丈塘後幫築土創以護塘身其原有之土塘及鑲修之柴塘留資外護不致頻修糜費如所請行二十二年二月上南巡時喀爾吉善子定長任貴州巡撫賜喀爾吉善詩曰海疆澤國久聲騰坐鎮宣風嘉汝能連率威儀今陶侃一家父子昔韓宏行春惠化吾方覽作雨平章民久稱供頓何須事華飾山川韶秀此邦勝七月諭曰喀爾吉善奏現患疽疾不能視事將關防暫交將軍新柱護理披閲之下深為軫念著太醫院𣲖外科一員令其子員外郎定敏帶同馳驛前往診視並加賞人參一斤以為藥餌之用仍傳諭喀爾吉善伊年老被病不妨寬以時日從容調理全愈後再行視事不必遽請解任副朕優眷至意是月喀爾吉善卒遺疏入諭曰閩浙總督喀爾吉善品行端重練達老成久任封疆勤勞懋著前聞偶患熱疽特命伊子定敏同御醫馳驛前往診視並賜參餌以兾速痊乃計程尚未到閩遽爾溘逝朕心深切軫悼喀爾吉善著入祀賢良祠以昭眷念賢臣之意應得恤典該部察例具奏尋賜祭葬如例諡莊恪長子定長由監生於雍正十三年授內閣中書乾隆三年遷侍讀五年襲世管佐領九年授江南徐州府知府十二年遷淮徐道十三年遷山東按察使十四年遷陜西布政使十五年擢安徽巡撫十六年調廣西巡撫十七年調山西巡撫十八年三月調署貴州巡撫九月實授十一月條奏武科不許本省文武官員子弟頂食名糧應試又奏現經調任湖廣總督永常條奏鄰省會哨事宜奉旨籌議臣查貴州與鄰省聫界幽僻之地苖夷環處從前未加兵威若與鄰省酌辦會哨雖不必張皇其事而苖性多猜保無别生事端應請停止大學士等均議如所請十二月疏劾提督丁士傑以書囑調知縣馬中驥上嘉定長據實陳奏持正得體降士傑為廣西左江鎮總兵十九年九月請以節省棚馬公費銀交地方官平價買穀借給撫標兩營兵以資接濟又言黎平府屬之古州城東北江水泛漲為患乾隆九年城北已築石隄而城東未及興舉請接築報聞二十年四月題請原任黔西州知州黃秉忠入祀名宦諭曰定長此本甚屬錯謬黃秉忠乃黃廷桂之父計其宦黔以來六十餘載該州士民身親見之者尚餘幾人今日之合詞呈請豈出輿情公論且果有遺愛在人何以久未題達明係因黃廷桂現任總督且又與伊貴州連界瞻徇市惠耳定長著嚴加議處尋議降二級調用詔革職從寬留任二十一年疏言本年雲南厰運銅愆期黔省積銅現足供鑄應通融籌辦請將上年所買滇銅五十萬斤停運來黔先儘解京偹用得旨嘉允二十二年二月上南巡定長請入覲命便道至浙省其父喀爾吉善賜詩曰迎鑾當入覲述職並寧親此意原嘉爾推恩詎一人西南門户固禮樂獞苗新撫逺惟安靜庶因福及民五月諭偕尚書劉統勳往鞫雲貴總督恆文勒屬買金短價及縱容家人收門禮一案得實論罪如律即署雲貴總督六月調山西巡撫未赴尋丁父憂十一月授副都統銜命赴西路軍營督辦屯田二十三年以委員擒賊未獲部議革任命以現在品級仍留屯所辦事二十五年補兵部右侍郎二十六年授福建巡撫二十七年疏言常平額穀例原借糶兼行應於青黃不接時先儘積貯最久之穀定價出糶秋成買補農民願借者聼詔如所請二十九年三月請移泉州府西倉同知駐就近之石獅街又言新例禁絲出洋絲價低昻總視蠶事豐嗇徒禁出洋無益請照舊弛禁從之七月以提督黃仕簡參奏總督巡撫收受厦門洋行陋規事解任尋諭曰前以此案關係督撫婪索多贓因命舒赫德等前往查辦今所奏既無確據定長發價購物亦沿習舊例初無不可輕貸之處著從寬仍留原任十月疏言閩省常平倉榖較他省數本充裕而遞年收捐監榖額貯益增現值平糶時請以積存溢穀遇應行買補各邑一水可達者通融抵補不必糶價解司上嘉允之三十一年二月遷湖廣總督十月疏言緝匪惟在地方文武員辨認真留意申明賞罰楚省各屬現𣲖眼目不下七十餘名徒多無益應概撤上是其言先是湖南桂陽州民侯七郎毆斃大功服兄侯嶽添知州張宏燧誤以七郎之親兄學添為正凶按察使宫兆麟駁審宏燧護原招稟辦布政使赫升額力庇宏燧讞久不決至是事發命侍郎期成額往會定長嚴鞫得宏燧及赫升額執拗黨庇狀均請革職上以赫升額身任藩司命案非其専責何以偏袒宏燧必别有結交情弊諭再研鞫三十二年正月究出前任巡撫李因培與赫升額曽授意宏燧為已革武陵縣馮其柘彌補虧缺事因培赫升額宏燧其柘均擬斬如律二月部議定長失察應革任詔免四月疏言雲南現在用兵需人造船廷議於湖南水師營內選送查向來水師營船係雇工成造今雲南需船孔亟若僅於水師營內選送恐有貽誤現飛飭洞庭協及嶽州營儘數發往仍於巴陵覔諳練工匠續送六月以濫用竹兜送過境兵役議革任仍詔免三十三年卒諭部議恤三十四年署總督髙晉奏荆州副都統石亮老病請勒休諭曰石亮衰庸戀棧已非一日定長在任時豈竟毫無聞見而一味姑容徇庇其膜視公務不問可知前此朕念其平日尚屬勤慎降旨加恩豫恤今觀其闒茸若此恤典應即敕部停止使封強大臣知不實心奉公之咎雖身後已邀寬典亦當亟行追止以示懲創定長長子台布襲騎都尉曽任乾清門侍衛次子台斐音現官山海關副都統嵩夀嵩夀滿洲正黃旗人大學士希福曽孫由雍正元年進士改庶吉士散館授編修十二年充日講起居注官遷侍講十三年十月命在尚書房行走乾隆元年六月轉侍讀七月充山西鄉試副考官十月同正考官侍講鄒升恆疏言京闈鄉會試向設內簾監試稽察一切并點放水菜外省則皆主考兼理請照京闈例增設監試又墨卷違式例應貼出但如抬頭點畫草藁偶有錯落小誤無關弊竇請嗣後免貼下部議行二年四月册封安南國王黎維褘嵩夀充正使賜一品服三年四月還京授陜西學政九月擢詹事留學政任四年疏言向例嵗科兩試摘士子所習本經令默寫於四書經藝之後恐士子徒事記誦不究經義請於四書經藝外令作經義一假其不能講解及背經旨者生員不列優等童生入學不列前茅再童生有背誦五經兼能講解者書藝平通亦量取以示鼓勵詔如所請五年遷大理寺卿六年十二月授安徽學政八年六月調陜西學政十二月疏言府州考試童生本署向無考棚號舍無從編號諸弊易生查學政考棚多設府州本城且考試必在學臣未按臨之先號舍卓凳俱偹請府州即就學棚編號扄試間有學棚設於屬縣者赴屬縣考試倘因公事不能往亦就近擇緊密公所編號嚴防部議從之是月丁父憂十三年授左副都御史尋遷內閣學士十四年頒詔朝鮮還擢禮部右侍郎尚書房行走十五年兼漢軍鑲白旗副都統調鑲黃旗充順天鄉試副考官及武鄉試正考官十七年命為經筵講官尋充會試副考官十八年復典順天文武鄉試先是希福所立三等子爵長子竒塔特孫費揚古曽孫來仙雯蔚相繼襲十九年雯蔚卒嵩夀襲之二十年卒賜祭一次孫增保襲子爵任頭等侍衛海望海望滿洲正黃旗人姓烏雅雍正元年由護軍校授內務府主事尋遷員外郎二年賜戴孔雀翎四年遷郎中八年六月擢總管內務府大臣九月管理户部三庫賜二品頂戴尋偕兩江總督髙其倬相度太平峪萬年吉地得旨嘉奬議敘加二級九年七月遷户部左侍郎仍兼管內務府事八月授內大臣十一年正月命偕直𨽻總督李衛勘浙江海塘先是總督程元章奏海寧縣潮勢自東而西侵仁和縣界石草各塘坍卸勢甚危險大學士等請特簡大臣通盤籌畫以垂久逺故有是命四月海望等疏言浙省江海情形門户有三省城東南龕赭兩山間曰南大亹禪機河莊兩山間曰中小亹河莊山北海寧塘南曰北大亹謂之三亹南大亹久淤成陸數十年前水由中小亹出入後漸徙北大亹年來桑田廬舍已成滄海若欲遏江海之狂瀾仍歸中道恐非人力能為查海寧東南有尖山聳峙鎮鎖海口其西有小山俗名塌山相去百餘丈今江水大溜緊貼北塘直趨尖山塌山之間而海潮激塘護沙日刷若俟冬初水落建石壩堵塞使江水海潮仍向外行則北岸護沙可望復漲至仁和海寧海塘自華家弄以東尖山以西有草塘條石塘塊石塘各工草塘易朽塊石塘亦易坍應改建大石塘並於海塘內增築土偹塘一道庶可衛護民生咸成樂土諭曰所議俱屬妥協著交部照所奏行朕思尖塌兩山之間建立石壩以堵水勢似類挑水壩之意所見固是若再於中小亹開引河一道分江流入海以減水勢似更有益從前雖經開挑旋復壅塞者皆因惜費省工之故今若加工開濬兩工並舉更覺妥備石壩建後即有漲沙而石塘亦可漸次改建以為永久之利著程元章等相度遵辦是月海望等又奏海塘四事一管工人員工竣日分别議敘一工價銀米兼發於米賤之地買運搭放一增設海防兵偹道一總轄塘工同知一與舊設二員分轄守偹二兵一千偹調遣一新設道員駐海寧同知駐仁和守偹分駐海寧東西分防塘汛部議如所請八月又言從前塘工未固由監修之員每多草率所致請敕浙江駐防將軍副都統就近選𣲖旗員協同監修從之十三年振武將軍傅爾丹虐兵婪索事發命海望赴北路軍營拿解來京治罪八月今上御極命在總理處協同辦事署户部尚書九月諭曰海望前自北路軍營回京時奏稱鄂爾坤發遣人犯在彼種地並無實濟且恐日久之後人數漸多致生事端似應改發他處彼時皇考以鄂爾坤現有大兵駐劄豈有不能彈壓之理此奏不合曽經降旨教導今總理事務王大臣及辦理軍機大臣等議覆此事並無定議之語殊有觀望之心及朕降旨諭令再議而王大臣等仍復遊移其説介在兩岐是王大臣等尚未知皇考聖意也朕伏思皇考之意蓋以此等發遣之犯原係身獲重罪之人今發往軍前種地者乃保全之大恩令其效力贖罪耳若其中果有情罪寃抑不應發往者乃辦理刑名大臣之錯誤自應聲明具奏寬釋其罪方於情理允協若本無寃抑之情只因其不善開墾遂爾改發內地以兵丁代之是獲罪重犯又不肯急公趨事轉得遂其僥幸之心且兵丁等平時職業惟在騎射當差耕種之事非其所素習若以不能力田為辭則將遷移內地之民往耕邊塞之地乎此事之斷不可行者若以此地不應聚積多人則將嗣後發遣之犯改發他處尚屬可行似此已發之犯豈有更改他處之理且無論大軍在彼儘足彈壓即彼處無兵亦毫無可慮者若以伊等不能耕種則自應令該將軍大臣等嚴加督率定為賞罰之條以示懲勸况耕種本非難事非工作技藝之可比若肯用力人人能之其所以茍且因循未收實效者皆該管官員疏忽怠玩之所致也海望心地純良但識見平常且有固執己見之處伊所陳奏豈可盡以為是爾等之意想以朕降特旨將海望署理户部尚書且不時召見遂起觀望之心將伊陳奏之事向奉皇考申飭仍復含糊議覆甚屬不合向後當以此為戒十月授户部尚書兼議政大臣疏言大兵現駐防鄂爾坤官駝數萬若以給臺站蒙古等令其運米則運價大省於蒙古生計亦有裨益王大臣等議如所請乾隆二年四月泰陵工竣奉旨優敘給雲騎尉世職十二月因總理事務議敘復給一雲騎尉四年晉太子少保六年二月請停各省捐穀例諭曰從前停止各項捐納之時在廷諸臣及翰詹科道等議留捐監一條俾各處積榖以備民間荒歉之需且使士子廣其應試之路洵為兩便並非捐官可比朕已允行昨據御史趙青藜請停止捐監又經大學士九卿會議以為事屬難行應仍其舊朕已降依議之旨矣今據海望奏稱外省收捐繁難赴捐之人甚少原議各省捐貯榖數共應三千餘萬石今報部者僅二百五十餘萬石合計尚不足十分之一不若停止各省之捐穀仍照九卿原議在部交銀將所收之銀扣抵各省買穀銀欵俟倉貯充盈之後將應停止之處再行請旨朕思納粟貯倉原為備荒發賑預為籌畫之計外省捐穀繁難且有弊竇不若在部投捐之易誠如海望所奏朕亦知之嗣後仍準在部收捐折色至於外省收捐本色之例亦不必停在內在外悉聽士民之便地方積榖不厭其多賑恤加恩亦所時有正未易言倉貯充盈也先是海望為郎中時充崇文門監督洎擢尚書每任滿命管理如初至是御史胡定疏陳關稅浮徴事言崇文門貨物上稅有挂錘頂稱名目每百斤必作百四五十斤稅額雖未明增實已加至半倍其零星貨物由各門入者任意需索更有數倍於稅額者至外省各關如杭州北新關自南而北不過十餘里盤查共有七處雖無貨客商必索飯錢多方留難有貨者應納之稅不過數分而入口給票出口繳票之費七次苛索竟什百於零星貨物所值之數推原其故蓋由管關之員務欲所解稅課盈餘浮於舊額以免部駁而見已長吏胥巡攔藉得恣睢無忌請嚴禁諭曰關差一項從前司稅之人歸之私槖者後令報出即為盈餘耳並非現徴之外有所增加也雖管關之人賢愚不一或有奉行不善欲增課以見長因而需索纍民者然此十之二三耳較之未經澄清以前已覺減少者蓋多矣朕臨御以來又復核減稅課不下數十萬兩且不時嚴飭該管諸臣剔除諸弊至再至三今條奏關稅者尚屬紛紛如海望係皇考及朕簡用之大臣豈不知國體而但知言利者比其管理崇文門稅務不過儘收儘解盡行報官不似先前之入私槖因而見其獨多耳朕即另派大臣管理想亦如其數也若如胡定所奏苛索種種朕可以信其必無何為如此過甚之詞耶崇文門稅務不必另議至外省關課皆久經該督撫就近稽查除現設口岸報部有案者照舊設立外其有私增口岸逐一詳查題報應留者留應革者革此畨清查之後司𣙜之員若再有違例苛索者胥役嚴處官吏嚴參該督撫不行查察經朕訪聞必於該督撫是問至滸墅北新二處係江浙大關尤為緊要著交兩江總督楊超曽浙閩總督德沛照此稽查辦理十二月海望調禮部尚書兼管樂部太常寺鴻臚寺事十三年署户部尚書十四年調户部尚書十七年四月與侍郎三和等遵旨查奏兩郊壇宇工程所發物料銀過多自請嚴議六月議革職詔從寬留任十九年以前在侍郎任內承審鹽商王惠民匿課行私一案誤以未完作完議革職詔留任二十年卒諭曰户部尚書海望老成敬慎辦事實心宣力有年勤勞懋著昨患痰症亟賜醫藥尚冀痊可遽聞溘逝朕心深為悼惜著賞銀二千兩治喪遣散秩大臣博爾本查帶領侍衛往奠茶酒應得恤典該部察例具奏尋賜祭葬如例諡勤恪碩色碩色滿洲正黃旗人姓烏雅雍正元年由候補小京官授户部主事尋遷員外郎五年擢西安按察使兼河東鹽政六年疏言河東鹽池向例撥額引羡餘銀五千兩嵗修渠堰而池牆不入嵗修請於添設餘引羡餘內嵗撥六千兩以三千兩嵗修池牆以三千兩貯運庫為五年大修用此等工程運同不能兼理請㨂附近州縣五六員監修疏入下部議行七年上命偕提督嶽鍾琪巡撫西林鞫逆犯曽靜之徒張熙詭名投書案得實九卿擬罪如律八年遷西安布政使十一年擢陜西巡撫乾隆二年調四川巡撫九月碩色疏報川省陋例相沿火耗羡餘外銀百兩提解六錢名曰平餘充各衙門公用諭曰川省耗羡向因公用不敷每兩完銀二錢五分朕御極以來加惠閭閻減去一錢止存一五之數欲使民力寬餘受國家休養之澤也今據碩色奏不勝駭異火耗報官原以杜貪官汙吏之風若耗外仍聽其提解非小民又添一交納之項乎一項如此别項可知一省如此他省可知朕思此等浮多之費取之商民層層剝削其數必不止此難免地方擾纍著碩色永行革除以杜官吏借端需索之弊倘公用有必不可少之項著於存公耗羡內支給報銷三年碩色同川陜總督查郎阿提督王進昌合疏言郭羅克番人數年來結隊行劫向設把總一兵二十不能防範請於附近標協酌委都司守備一員領千把總各一兵二百按年輪班駐劄彈壓廷議如所請又條奏駐防郭羅克事宜一運郭羅克軍糈道路﨑嶇腳價不敷請一夫負米五斗每站給價一錢口糧按季運交營員支放每石耗米三升作正報銷一松潘至郭羅克二十二站皆屬畨地軍糈委於佐雜不無可慮應派千把總一輪班押運一出口馬步兵二給馱馬一例折銀八兩每鞍屜折銀六錢五分均於松潘廳庫支給一郭羅克霜雪不時自守備以下須製皮衣請守備一員借銀一百兩千把總二每員四十兩外委千把總二每員十二兩馬兵十八每名六兩步兵一百八十每名四兩亦於松潘廳庫動支部議皆如所請四年調山東巡撫五年六月諭曰朕五月間聞山東郯城至蒙隂俱成赤地上年被災地方官不實心辦理民人逃往鄰省者甚多以致拋荒故土未曽耕種兩月來碩色未將雨水情形奏聞巡撫身任封疆應辦之事孰有大於此者特降旨詢問之據碩色奏郯城蘭山蒙隂三縣連嵗歉收是以流移獨多經臣奏明招徠回籍者二千二百餘口而郯城一縣共收貧民一百七十户大小五百八十口俱已安插接濟並未拋荒故土至收成分數郯城髙阜地畝確有七分低窪地畝確有八九分蒙隂髙阜地畝確有七分低窪地畝確有九分今時雨疊降秋禾遍野並徴赤地之説毫無確據等語朕覽奏稍慰厪念今據左都御史陳世倌奏稱山東沂州府一帶數百里上年先旱後水二麥俱未播種流民散至湖廣江西者將及萬人湖廣送回飢民經過江寧揚州竟有搶奪之事及到山東碩色並不賑恤且以上年開報收成六分本年尚在徴比錢糧等語陳世倌此奏與碩色前奏迥然不同地方水旱災荒撫綏安輯乃封疆大吏之責碩色稍有人心何致粉飾蒙蔽至此著兵部侍郎阿里衮僉都御史朱必階馳馹詳勘務期秉公據實不必絲毫瞻顧有災荒應辦事宜一面辦理一面奏聞閏六月阿里衮疏稱臣等查勘沂州一帶雖非赤地二麥收成不過二三分至四五分而止六月前並未停征碩色奏殊失實七月上以碩色才識不能開闊不宜大省前任四川地方情形尚係熟習調四川巡撫七年疏言重慶渝關木稅水漲則木筏順流而下一嵗可得數年之木涸則已伐者積於深溝淺壑不能到渝自乾隆二年部臣議以五千兩為嵗額三年四年缺額三百餘兩經收各員屢以無力賠補為請五年水漲木多原額外贏餘至三千八百餘兩議全解贏餘請免額缺而部臣終格於行懇恩豁免疏入詔如所請八年調河南巡撫九月碩色子穆克德官光祿寺署正以民人爭地事寄字家奴囑其照應事覺碩色奏請革審諭曰碩色因伊子干預外事據實參奏甚屬可嘉此事尚在未行碩色自必嚴束其子不致滋事穆克德著革職交與伊父收管其餘人等亦著碩色就近外結下部議敘尋加一級十一月疏言前撫臣雅爾圖以豫民不知樽節酌為寄糧法與社倉一體出借每石亦收息一斗以五升為修倉鋪墊用以五升給原寄之人遇水旱聽領本回行未久有空報寄數穀不入倉者有呈報數多交倉無幾者有旋寄旋領勉強輸納者有名無實請停勸寄専行社倉之法疏入上是之又言豫省存留漕穀勸捐社穀自乾隆元年至七年借出未還者二十三萬四千四百餘石向以災歉分年帶徴仰懇聖恩免息止徴本穀詔如所請先是户部尚書訥親侍郎梁詩正請裁雍正二年後續添新兵碩色議南陽鎮屬右營兵五十汝寧營兵五十二歸德營兵四十二陜州營兵五十二信陽營兵三十五應裁汰餘新兵一百七十名留資保衛河北鎮屬募新兵五百一十三已裁四百五十二僅存開封營六十一名差繁兵少應留供差防下部議行時河南按察使王丕烈疏稱河南地産小鹽四十斤以下照肩挑背負易米度日之例不必禁四十斤以上許本地籮筐挑賣外販者禁碩色議豫省鹽土煎淋即成土鹽磏土硝土之底亦成土鹽名曰小鹽弛其禁則官鹽壅滯姦商轉借引行私且産無定所出無定時未便招商辦課若必稽查老少分别本境外境則巡緝者非誣即縱請嗣後小鹽止許食用不得煎販照例禁為便部議如所請十二月疏言豫省社穀責成正副社長請於息穀十升內酌留一升以為正副社長雜項之用疏入上是之十一年碩色疏參河南學政汪士鍠試文童拔取縉紳子弟試武童不較馬箭止射步箭一士論不服上命户部侍郎雅爾圖會審禠士鍠職十三年三月山東巡撫方觀承疏請北五省勸輸義倉命碩色議因言社倉外更立義倉分捐穀石仍止此數若儘捐義倉則社倉虛設且社倉散於春斂於秋緩急可貸民猶樂從義倉止以備賑取甲散乙小民心存爾我不能奉行轉滋勒掯仍行社倉便得旨如議十月擢兩廣總督十四年八月碩色疏恭左江鎮總兵楊剛交結田州土官岑宜棟違例放債上命褫剛職擬罪如律十五年正月調雲貴總督七月廣東總督陳大受恭奏碩色任廣東總督時徇庇驛糧道明福婪贓各欵上以碩色素性柔懦諸事含糊屬員劣迹一無覺察殊屬徇縱交部嚴加議處尋鐫三級留任十六年閏五月碩色疏報刑訊布政使宫爾勸多收銅斤案上申諭曰碩色等奏到辦理宫爾勸一案甚屬舛謬前此傳諭令其嚴行查辦者因該督等奏宫爾勸先於出署之日暗行寄頓夫藩臬大員而懷狡詐鬼蜮伎倆則其侵欺屬實是以有即加刑訊亦不足惜之諭並非論實與不實必當夾訊也宫爾勸如果在厰多收銅斤婪贓肥已則有厰內嵗入可以徹底清查而其囊篋亦必甚豐如不過沿習陋規及家人私收加稱則漁利甚微與郭振儀案等耳今據供只收歸公養亷路耗銅斤俱已報解充公而其任所原籍資産僅止此數已大概可知何用加之夾訊乎其奏內稱嚴加刑訊又稱刑訊再三茹刑不承徒辦成刻酷之形意謂奉旨刑訊無論虛實不敢不加之三木究之外省辦事祗應虛名雖滿紙張皇焉知非以套夾塞責轉使無知之輩謂將布政使用刑嚴訊乃因查追家産滋傳聞竊議之端碩色等如此辦理甚屬不知輕重著嚴行申飭此案宫爾勸究屬有無入已著再秉公詳晰分别另行定擬具奏尋宫爾勸以故縱侵盜錢糧杖流如律六月疏言隆茂厰工丁聚至二三萬人勢必流而為匪宜籌漸次解散之法其出入隘口即在騰越雲州等處從此許入不許出禁其續往則厰民漸少邊防得以寧謐疏入廷議如所請七月疏言滇省各標鎮協營內設管隊頭目為一隊之長向例本名糧外多食步守糧半分名曰火糧并有占全分者雍正十一年督臣尹繼善請仍給隊目火糧半分所食空糧改養餘丁以充營伍部議以名糧不宜虛占概令招補餘丁尹繼善復以隊長當差需費令給餘丁糧一分即其子弟年未及嵗亦準充補逮後日久弊生兵目成丁子弟不願充補餘丁其充補餘丁者自八九嵗至十二三嵗不等不能執械差操委屬有名無實請將滇省餘丁三千二百餘名裁汰仍按原請火糧額數先儘隊目精壯子弟充補如隊目無子弟親屬即挑選招募補及原額於營伍汛防大有裨益疏入廷議如所請二十一年調湖廣總督二十四年九月卒於任賜祭葬如例諡恭勤欽定八旗通志卷一百五十三
