body:
  text: 欽定四庫全書欽定八旗通志卷一旗分志一國家朱果發祥肇居長白靈符神契與元鳥生民之詩炳耀後先敻哉源逺而流長矣逮公劉過澗亶父翦商王迹所基艱難締造年祀綿邈舊制蓋無徵焉至太祖髙皇帝顯庸創制始立四旗復廣為八丕應徯志兆姓歸往烏丸白霫盡入版圖楚材晉用鱗集遝至正號紀元遂成帝業凡蒙古漢人輸誠先服者亦各編為八旗列在親信逮定鼎燕京統一四海有明舊臣率先慕義者皆得編在旗籍於是定兩翼之位列八旗之方拱衛皇居星羅碁置又以鑲黃正黃正白為上三旗餘五旗統以宗室王公居重馭輕大宗維翰蓋皆創前古所未有而建諸天地考諸三王若合符節粵稽史記天官書正義河鼓兩旗左旗九星在河鼓左右旗九星在河鼓右皆天之旗鼓以為旌表又九斿九星在玉井西南則天子之兵旗也周禮司常掌九旗之物名田之日司馬建旗於後表之中遂人起野役以遂之大旗致之蓋仰觀圓象惟聖憲天軍統於旗實符斯義至畫井之制以八家環公田握竒之法以四正四竒生變化數取於八尤三五之遺軌焉我世宗憲皇帝宣明祖制特修八旗志書將使謨訓功烈垂示萬世我皇上御極以來已六十年加惠八旗恩膏稠疊凡有續定章程更改條例其各旗佐領分晰增添編立之處及一切襲補世次特命詳查續輯美善益增永昭成憲敬稽國初以來創立八旗緣起列居簡端而臚列各佐領於其後沿革規制載在舊章亦分類並著焉旗分志一八旗佐領一滿洲佐領緣起滿洲佐領緣起太祖髙皇帝辛丑年以諸國徠服人衆編三百人為一牛録每牛録各設額真一按之國初舊制凡一軍一隊長皆稱曰額真故當時固山牛録皆有此名後以額真之稱太尊乃改固山額真曰都統改牛録額真曰牛録章京漢文則牛録曰佐領云先是我國凡出兵較獵不計人之多寡各隨族黨屯寨而行獵時每人各取一矢凡十人設長一領之各分隊伍其長稱為牛録額真至是遂以名官乙卯年以削平諸國每三百人設一牛録額真五牛録設一甲喇額真漢文稱參領五甲喇設一固山額真漢文稱都統每固山額真左右設兩梅勒額真漢文稱副都統初設有四旗旗以純色為别曰黃曰白曰紅曰藍至是鑲之添設四旗參用其色共為八旗行軍時地廣則八旗並列分八路地狹則八旗合一路而行天聰九年正月免功臣徭役並命専管各牛録拜尹圖三牛録有半額駙楊古利南褚各兩牛録巴布海察喀尼衛齊各一牛録公衮半牛録圖魯什原係內牛録因善於攻戰效力陳亡追贈為碩翁科羅巴圖魯叧給其子巴世泰壯丁百名使之管轄正紅旗和爾本董鄂公主格巴庫各兩牛録額駙達爾漢一牛録有半伊蓀察木布星鼐布爾海阿山布爾堪馬喇希董世祿各一牛録巴哈納何洛會穆爾察蘭泰傅夸蟾各半牛録别給固山額真葉臣壯丁百名使之専管勞薩原係內牛録因戰功賜號碩翁科羅巴圖魯叧給壯丁百名使之専管額駙顧三台諾木琿各一牛録孟坦原係內牛録因陳亡給其子艾音塔木壯丁五十名使之専管克什訥兩牛録喇瑪塞勒昻阿喇奧塔額爾克遏必隆超哈爾敖對額駙蘇納巴彥毛墨爾根達爾泰各一牛彔扈什布吳賴各半牛録英俄爾岱原係內牛録因勤於職事著有成勞叧給壯丁五十名使之専管阿什達爾漢準塔阿喇密各一牛録阿山原係半牛録因戰功益以虎爾哈人為一牛録使之専管巴都禮原係內牛録因陳亡給其子卓羅一牛録使之専管阿拜一牛録有半巴特瑪姚塔韓岱各一牛録吳達海鄂碩各半牛録吳訥格原係內牛録因戰功給一牛録使之専管星鼐察木布喇瑪扈什布阿什達爾漢準塔阿喇密此七牛録未定或令専管或為內牛録命仍舊暫留之是年十二月賜豪格八牛録屬人阿巴泰三牛録屬人其餘莊田資財牲畜等物量給衆人以正藍旗附入皇上旗分編為二旗崇德五年七月以索海薩穆什喀所獲新滿洲壯丁二千七百九人婦女幼小二千九百六十四口共五千六百七十三人均𨽻八旗編為牛録以薩爾紏英古往征庫爾喀部落時所獲新滿洲壯丁四十二人充補各旗披甲之缺額者又從前庫爾喀歸降進貢一百四十九人並新獲二百九十二人俱留置鄢朱屯中令每年進貢貂皮海豹等物又以多濟里喀柱所獲四十三人亦補各旗披甲之缺額者順治五年十二月編盛京守墩壯丁為十牛録康熙十四年十一月上諭恭親王常寧著在正藍旗純親王隆禧著在鑲白旗於恭親王將鑲黃旗滿洲旗分津布佐領噶布喇佐領正黃旗噶布喇佐領霍爾鈍佐領正白旗覺羅夸代佐領覺羅布魯佐領蒙古旗分墨赫德佐領恩克佐領鑲黃旗蒙古旗分額卜根佐領正白旗漢軍李廷霖佐領李育正佐領佟文玉佐領包衣正白旗滿洲阿那岱佐領正黃旗漢軍姚質義佐領正黃旗噶布喇所屬撥給於純親王將正黃旗滿洲旗分鄂莫克圖佐領阿世圖佐領蘇爾泰佐領正白旗穆舒琿佐領託進佐領鑲黃旗鍾內佐領鑲黃旗蒙古旗分哈喇爾代佐領白貝佐領阿畢達佐領正白旗漢軍旗分蕭養元佐領霍世榮佐領李世靜佐領包衣鑲黃旗滿洲薩畢漢佐領漢軍劉格佐領正黃旗得希圖所屬撥給三十一年四月議政王大臣等覆準寧古塔將軍佟保等疏言圖世屯地方四十里外有白都訥地方係水陸通衢可以開墾田土應於此地修造木城一座錫伯卦勒察等所住鄉村於此處甚近俟城工完日由水路搬移查前議科爾沁之王台吉等進獻伊等所屬錫伯卦勒察達呼爾等一萬四千四百五十八丁內可以披甲當差者一萬一千八百五十餘名分於上三旗安置今議齊齊哈爾最為緊要形勢之地應於錫伯卦勒察達呼爾內揀選強壯者一千名令其披甲與附丁二千名一同鎮守齊齊哈爾地方令副都統品級馬補岱管轄兩翼各設一防守尉每旗各設防禦一員俱屬將軍薩布素統領管攝白都訥地方修造木城將錫伯卦勒察達呼爾內揀選強壯者二千名令其披甲即住所造新城令副都統巴爾達到彼教訓管轄兩翼各設一防守尉每旗各設防禦一員俱屬將軍佟保統領管攝再將錫伯卦勒察內與烏喇相近居住者揀選三千名移住烏喇地方令一千名披甲二千名為附丁是年八月兵部覆準黑龍江將軍薩布素疏言白都訥等處駐劄兵丁四千八百有竒可編佐領八十入上三旗應如所請三十五年九月議政大臣議得厄魯特降人編入上三旗佐領先是理藩院奏陸續來降之厄魯特大小人口共一千五百餘人向暫在張家口安插應令伊等赴京上諭領侍衛內大臣等著取丹巴哈什汗等來京令副都統吳達禪乘驛而往同納喇善滿都遷來倘厄魯特有不願來內地者即從彼處送赴大將軍伯費揚古軍前著各給馬一匹遣回令彼往諭噶爾丹言彼若來降亦待以顯榮其看守厄魯特之察哈爾兵各歸本地至解厄魯特降人來京著邊關官兵緑旗官兵轉遞押解并令户部理藩院賢能官各一員前往沿途給口糧食物既取伊等來京應令議政諸臣會議編入派旗分佐領具奏至是議厄魯特降人應編入鑲黃正黃正白三旗滿洲佐領其內有父兄子弟不可離者如編入一佐領為數浮多則扣算一佐領人口其餘編入本參領內之佐領內有年老孤身附入人口少者之家給米贍養詔從所議雍正元年九月鑲藍旗都統貝勒阿布蘭等議將內務府員外郎常夀族中人等及伊堂叔額爾竒所管佐領下人盡移於正黃旗并將常夀帶領引見謹按是年七月因諸王所屬下五旗多遭擾纍奉有諭旨戒飭故有是議奉上諭此等佐領若屢行移於上三旗則下五旗必致虧少矣著將額爾竒佐領從伊該王屬下撤出改為該旗公中佐領額爾竒佐領下所有一等護衛圖巴海二等護衛永住暫留王處其餘官兵俱著於上三旗當差行走王府親軍二人著交內大臣令在上三旗親軍內當差若有缺出內大臣照例挑取其官員俸祿兵丁錢糧仍由本旗行文支領嗣後下五旗諸王屬下有應移佐領及統轄佐領之人無嗣者俱照此例從該屬下撤出改為該旗公中佐領按左右翼令在鑲黃旗正黃旗當差行走將此著總理事務王大臣會同八旗都統等議奏總理事務王大臣會同八旗都統等議覆臣等欽遵上諭議得嗣後下五旗王貝勒貝子公及宗室等之屬下所有滿洲蒙古漢軍佐領內有應移入上三旗及獲罪應撤佐領統轄佐領之人無嗣者俱照此例由該屬撤出以為本旗公中佐領此公中佐領內文武大臣官員等止令本身按翼在鑲黃旗正黃旗行走如參領佐領驍騎校等係在該旗供職辦事之人仍應留於本旗其前鋒護軍等令在上三旗當差併照例挑取親軍官兵俸餉仍由該旗行文支取至馬甲步軍人等仍留本旗當差奏入奉旨補放外省駐防官及前鋒參領前鋒侍衛等公中缺分仍由本旗揀選餘依議二年十二月奉上諭諸王將包衣佐領下人開出編為佐領令其兄弟子姪管理尚可將旗下人等湊集編為佐領令兄弟子姪管理朕意以為不然雖係兄弟子姪亦各有定分宗室等豈可將人之定分占據乎凡此等處應行區别宗室之為護國將軍等乃伊等分所宜然若以為佐領即成諸王之屬下矣其宗室覺羅之佐領惟朕可以役使耳令在王等門下以供役使王等既難自安又多掣肘之處理宜置之公中令在上三旗行走且間散宗室內亦有専轄旗下佐領者若係王公理宜専轄豈可令宗室等専行統轄乎將此亦應撤出置之公中王等果能為國宣力著有嘉行朕自將佐領添增賜給至於公等其宗室中長輩往往欺凌伊等擾纍伊等屬下人竟習以為常公等亦不能相抗也縱令任意妄為其屬下人念係本公宗族亦不便於首告或千百之中僅有一二發覺耳其餘無辜而受纍者甚衆也雖係卑幼亦専管一門之人以尊長而欺凌之可乎擾纍其屬下之人又可乎爾等將此併行詳議具奏特諭裕親王保泰等尋議覆皇上軫念宗室召入臣等面加諭訓周詳備至臣等欽遵上諭查得宗室內鑲黃旗德融正黃旗受元寶山尚建寶正白旗增盛普瑞正藍旗巴進泰滿朱席禮小格卓賚達里祐巴世山汝福諾穆珠格爾賔及佐領下黑夀所管佐領俱係専管之佐領令其宗室等照常管理外鑲白旗宗室圖納阿禮納等所管之公中佐領原係該王奏請將包衣佐領下之滿洲開出添給伊等管理者應將兩佐領所添之包衣滿洲等撤出併為一佐領令圖納阿禮納等互相管理所餘之兩佐領原係全分佐領仍照常為兩佐領置之公中令該旗大臣官員等管理鑲藍旗宗室鄧柱所管者原係合併佐領應令鄧柱回原佐領將此佐領交與該旗置之公中令該旗大臣官員等管理再五旗所有正藍旗之宗室汝福滿朱席禮巴進泰達里祜巴世山卓賚小格格爾賓諾穆珠等之九佐領鑲白旗之宗室圖納阿禮納之互管佐領正紅旗之覺羅杜葉理齊祿談都伊敦德成錫德琿瑪喇希等之七佐領鑲白旗之覺羅納海里柱薩爾泰海蘭穆漢等之五佐領鑲紅旗之覺羅外敦增夀額禮赫常泰等之四佐領正藍旗之覺羅伯竒圖尹柱等之兩佐領鑲藍旗之覺羅哈克秦佟保柱等之兩佐領皆係宗室覺羅佐領不便留在王等屬下相應撤出移置該旗公中令在上三旗行走伊等佐領及黑夀佐領亦係宗室等之佐領俱移置該旗公中令在上三旗行走正紅旗之唐喀七十九兩佐領內所有之覺羅等交該旗都統等俱移於覺羅佐領若將覺羅等移出其佐領至於缺人即將移給覺羅之覺羅佐領下人補還其缺鑲白旗之覺羅常堯鑲藍旗之覺羅傅格俱係管理公中佐領之人應暫留管理止將其本身移於覺羅佐領下令在上三旗行走又查定例內未入八分公等以下並無専管旗下佐領之例鎮國將軍敬順楊桑阿輔國將軍法布蘭奉國將軍鄂齊禮奉恩將軍華玢間散宗室宏昉富元明俊海長鄂齊伊等有因其父革職或不準承襲將原管之佐領未經撤出者亦有族中子姪承繼産業因而仍據其所管佐領者今俱查出不應仍留於伊等將敬順所有之滿洲佐領一法布蘭所有之滿洲佐領二漢軍佐領一鄂齊禮所有之滿洲佐領六蒙古佐領二漢軍佐領二華玢所有之滿洲佐領三宏昉所有之滿洲佐領二蒙古佐領二漢軍佐領二明俊所有之滿洲佐領一蒙古佐領二富元所有之滿洲佐領五海長所有之滿洲佐領二鄂齊所有之滿洲佐領一俱行撤出置之該旗公中又查宗室公等以上俱係掌管門第之人族中長輩肆意欺凌并擾纍其屬下人殊屬不合嗣後有恃其長輩欺凌公等者照屬員與上司相爭例治罪如擾纍公等屬下之人照平人相爭例審訊議處奏入奉旨將此關係佐領人等俱傳於初十日齊集箭亭候朕申降諭旨至期上御箭亭諭曰宗室俱係太祖皇帝太宗皇帝之嫡孫覺羅等雖世系稍隔亦未甚踈逺今宗室覺羅各在該王所屬佐領下其中輩數居長之人該王有念係尊長不便動色相誡至於掣肘者又有不論輩數肆行辱詈者又有挑取護衛官員成就教導以禮優待者又有全不顧慮挑為哈哈珠子執事人詆及祖父待如奴𨽻以致太監等俱得恣行詬詈者此皆朕所深知如此無所底止則宗室覺羅竟等於奴僕揆諸禮制亦屬不合國家惟仰戴一主該王等各將宗室覺羅視為奴僕妄自尊大於理不大相悖謬耶從前太宗皇帝時欲阿拜阿哥等各依附其兄故令附於豫通郡王等此特以其切近而令其依附耳並非以為王等屬下之宗室佐領也朕因念及此處特降諭旨交與宗人府兹據宗人府議奏將王等屬下之宗室覺羅佐領俱移置於公中今爾等或以祖父世居王等屬下情願仍在王屬下或以附於王等屬下厯年久逺竟成奴𨽻情願移於該旗公中在上三旗行走之處務各據實陳奏今王等果執大義將役使宗室覺羅無異奴𨽻之處於心實覺不安且知非分咸各恱服爾宗室覺羅等知朕惇敘宗族之意誠心感戴實係情願朕始準行此事且宗室等雖在王等屬下亦係朕之臣子朕豈不得録用不得役使耶今王等倘以厯年既久世為我等屬下而役使之無故將宗室覺羅佐領撤出心懷怨望宗室覺羅等又以世在王等屬下荷蒙教養撫恤頓將我等分析令在上三旗當差行走殊非我等本意是非兩皆歸怨於朕何必準行此事爾等其各抒誠陳奏朕今詢問爾等不奏若退有後言恣意怨望者不但朕不寬釋即上天列祖之靈亦必鑒察矣今爾宗室覺羅內雖有一二人陳奏不過此一二人之意念耳不可謂衆志皆同也著宗人府之王等將朕所降諭旨逐一問明具奏倘有心志不同者叧行繕摺具奏毋得隱匿欽此宗人府王等尋覆稱我皇上特念宗室出自天潢訓諭諄切區畫周詳臣等恭將上諭宣讀諸王及宗室覺羅等咸各歡欣感戴情願謹依諭旨遵行合詞陳奏出於至誠仰請皇上睿鑒施行奏入奉旨宗人府議將宗室覺羅之佐領由王等屬下撤出置於該旗公中令在上三旗行走但將伊等佐領內護衛官員置於該旗公中如何録用及在上三旗如何當差行走之處並未議及此等佐領內護衛官員並無罪愆豈可悉行斥革此處亦應議及著交與八旗文武大臣等每旗各抒所見議訖著馬齊嵩祝徐元夢及領侍衛內大臣等公同詳悉定議具奏尋大學士馬齊嵩祝徐元夢及領侍衛內大臣等議覆臣等據各旗所議詳加參酌將宗室圖納阿禮納所互管之一佐領宗室汝福滿朱席禮巴進泰達里祜巴世山卓賚小格格爾賓諾穆珠所管佐領并黑夀所管之宗室佐領共十一佐領歸併於鑲黃旗覺羅杜業理齊祿談都伊敦德成鍚德琿瑪喇希增夀額禮赫常泰等之十佐領歸併於正黃旗覺羅納海里柱薩爾泰海蘭穆漢外敦白竒圖尹柱哈克秦佟保住等之十佐領歸併於正白旗伊等佐領內所有長史護衛典儀等官俱交內大臣帶領引見應令如何行走之處恭候諭旨遵行其前鋒參領前鋒侍衛護軍參領副參領署參領護軍校前鋒護軍人等俱令於上三旗當差行走其旗員部員及馬甲執事人等俱令在各本處行走伊等升轉挑取之處仍俟本旗缺出頂補一應派兵派圍訓練等事俱隨本旗其俸餉米石亦於本旗支領凡遇朝會與上三旗官員一體行走其餘俱照宗人府原議施行奏入奉旨依議七年九月五旗王大臣等議覆據都統查爾泰奏稱五旗諸王所屬之包衣佐領琿托和漢文稱管領管轄宜歸畫一均分𨽻於各甲喇一事奉旨著五旗諸王大臣等會議但會議此事不便同在一處會議著各旗諸王與本旗大臣會議具奏欽此五旗諸王公大臣等議得查各旗王等包衣佐領琿托和管轄向未均勻分派以致各甲喇多少不等甚不畫一臣等欽遵諭旨將各旗所有之包衣佐領琿托和管轄各按甲喇均勻分派謹將五旗諸王大臣等議定原摺一併呈覽如蒙皇上照依允行則各甲喇所有之包衣佐領琿托和管轄俱得均勻而一切會集稽查之事亦可整齊不致繁擾矣奏入奉旨依議乾隆元年三月奉旨八旗株林佐領下人等互相爭訟不息皇考降旨內閣查眀實録定為舊管世管曉諭八旗此內倘有别故不服者將其原由指出雍正九年已降旨曉諭今已數年鑲黃旗滿洲始行查奏則别旗亦有似此者亦未可定今若不斷定日後爭訟不息著總理事務王大臣等查辦永著為例定議具奏是年十二月總理事務莊親王允祿等奏臣等遵旨交八旗將雍正九年由內閣所定舊管世管佐領具奏後奉旨問該佐領及其佐領下人其意遵從與否如有爭控者該旗如何辦理完結或未曽完結若衆意俱從並無爭端該佐領併佐領下人等俱書押具結造檔用佐領圖記參領關防都統印信送赴查對在案今陸續查送有鑲黃旗滿洲哈祿馬楞泰兩個佐領下人意不遵從尚有爭端該旗業經查奏鑲黃旗滿洲哲爾進佐領下候補筆帖式鈕詹等五人鑲白旗滿洲覺羅立柱六十保兩個佐領下筆帖式碩隆武鑲藍旗漢軍尚崇弼等五個佐領下人等不書押不具結而遞訟呈該旗將佐領根源所訟原由查送前來鑲黃旗滿洲和興等三個佐領下人正黃旗滿洲馬獻納青阿兩個佐領下人正白旗滿洲色楞額喜祿兩個佐領下人正紅旗滿洲都望武等七個佐領護軍參領七林四個佐領下人鑲白旗蒙古額爾德本圖多爾濟兩個佐領下郎中玉柱鑲紅旗漢軍金官佐領下原任輕車都尉李官等四人正藍旗漢軍佟連等六個佐領下驍騎校平喜思等雖係户下之人各遞爭呈該旗將部檔查對旗檔尚未查明除此二十七個佐領外其餘俱遵奉並無爭端俱具結書押造檔咨送前來臣等查得從前八旗人等為佐領爭訟不息因世宗憲皇帝降旨交八旗大臣等會議派出都統鄂善等四人將實録與部檔查對旗檔將八旗三百餘佐領分析定為舊管世管具奏後奉旨交大學士尹泰等復查實録無圈點檔內情由俱合或有株林字樣或曽經得賞者奉旨作為舊管一百四十八個佐領作為舊管佐領其餘一百五十七個佐領情由雖亦俱合並無得賞字樣者俱定為世管佐領具奏世宗憲皇帝猶恐衆心或未愜服降旨詢問是時或有該旗將佐領下人等齊集詢問者或亦有該旗惟將佐領甲喇所出之結給看俱各順從者並未按名親視詢問該佐領下人等是以伊等未能仰喻聖意至今爭訟不息今特降諭旨查八旗人等姓名原造入根由作書永垂臣等擬交八旗大臣等將舊管世管佐領原立根由詳細臚列所有佐領下人等俱聲明係何處之人如何入此佐領併將姓氏開寫該旗大臣親按佐領將所有官兵以至幼丁全行曉諭若俱遵從不起爭端各於名下書押具結後該旗會總具奏其押結檔案一分存貯旗庫一分咨送兵部存貯查核此後如有爭訟者該旗即查明作速辦理具奏定議其鑲黃旗滿洲具奏所交哈祿馬楞泰等兩個佐領事哲爾進佐領下候補筆帖式鈕詹等不書押事鑲白旗滿洲覺羅立柱等佐領筆帖式碩隆武爭訟事鑲藍旗漢軍尚崇弼等五個佐領下控告事各該旗既俱查送前來臣等叧摺具奏外鑲黃旗滿洲二十七個佐領下人等爭告之事該旗既尚未查送前來應交該旗大臣等將控告佐領情由根源詳查再開導佐領下人等若遵從即會書押具結如仍不能明曉再行爭告將所告佐領根源之事查核實録定議具奏此次查定之後如再有爭訟之人將該都統併佐領所存之結與佐領根源檔案持出為證照例治罪如此則八旗佐領之事可以確定而爭訟之事亦可永息謹此具奏請旨奉旨此議盡矣著交八旗給限一年務明正辦理餘照所議三年十一月奉旨從前八旗承襲世職官員佐領時並無家譜皆由管旗大臣揀選奏放嗣恐管旗大臣辦理偏私雖添家譜而或有將不應與挑之人挑選而於應挑之人反為裁減且於佐領根源亦多不明晰八旗佐領根源若不詳查酌定日後必致爭訟不息因屢降諭旨交王大臣等詳細查辦今覽八旗議定進呈家譜其勳舊佐領係功臣等帶來奴僕或因奮勉賞豫奴僕作為佐領故惟將始立佐領人員之子孫挑選無論曽否管過佐領概豫有分其始立佐領人員之親弟兄雖曽管過佐領而其子孫亦不應有分其世管佐領或因其將所屬一處之人𢃄來作為佐領令其管理或初立佐領時即管佐領後因陸續管理數世遂作為世管佐領又有叧色佐領者今惟將始管佐領人員之子孫作為應得之正分其續管佐領人員之子孫視其佐領根源分其支派之逺近量其管領數次之多寡有定為正分應得者有定為擬陪擬備者又有始管佐領人員之子孫念其祖先雖無分别支之人均係一祖之後裔亦準例入承襲有分之內或因本支原有佐領其他佐領讓與别房無佐領之人又有準其所請將有數佐領者每支各分占一佐領以均承襲之分再補放佐領世職官員將出缺人之子孫擬正將原立佐領世職人員之長房之子孫分别擬陪如出缺人無嗣有將原立世職佐領之長房之子孫擬正帶領引見者亦有將次房行輩居長之人因與原立世職人員支派較近者擬正長房之子孫擬陪帶領引見者再所繪家譜只將有分人員繪入無分人員裁減或無論有分與否概行繪入家譜將其事故注寫於旁所辦均未詳細再閲八旗所進家譜有從原立佐領內分出一二佐領者亦有分出數佐領者其奏放所分出佐領時有於原佐領上粘貼黃簽者亦有於分出佐領上粘貼黃簽者八旗所辦並不畫一今既清查佐領根源永垂律例若不詳細查明定為畫一章程則日後致起爭端而管旗大臣亦礙難遵行辦理所有佐領根源除令原派出王大臣詳細議奏外著派慎郡王公訥親都統都賚副都統永興李元亮等將王大臣所議奏之佐領詳細斟酌分别定為應擬正擬陪擬備之分其應入家譜與不應入家譜粘貼簽子何以分别明白等處詳為畫一辦理其八旗世襲官員襲職家譜亦著一併詳查定擬具奏是月王大臣等議覆恭惟聖主辦理旗務無微不至今因八旗辦理世襲官員佐領未能均勻定為應得之分特降諭旨令臣等妥協辦理以垂久逺此皆垂念昔日戎行出力人員之子孫或有不肖之徒借端干求世職官爵因而爭訟恐傷和睦之誼以致管旗大臣恐有辦理偏僻之至意臣等查得八旗陸續查來世管佐領五百九十缺遞管世管佐領十四缺共世管佐領六百有四缺詳查此等佐領根源當日始立佐領時或係將所屬之人帶來者或係將其親戚與同處之人合併帶來者或係只就一户之人立為佐領者或因始立佐領時即令伊等祖先管理續管雖曽有異姓之人而後仍歸本家管理者遂作為世管佐領等情既經查辦佐領根源令八旗王大臣定議具奏應如原議辦理伏查雍正七年八月內鑲紅旗漢軍將紀達禮所管之佐領可否作為世管佐領之處請旨具奏奉旨此等佐領其始係伊家管理後經異姓之人管理數次後復令伊家管理者令伊等户中如有可以補放之人即於伊等户中揀選補放如不得人即於公中補放倘日後伊等户中復能得人仍在於伊等户中揀選補放如此始合情理著將此通諭八旗永為令欽此又鑲白旗漢軍秦世祥所管同左夢庚一齊投降之人所編立佐領雍正三年正月內八旗王大臣議奏奉旨秦世祥所管佐領即依所議作為世管佐領其他同左夢庚一齊投降之人所編立佐領內有異姓管理者皆作為公中佐領此缺即著於秦世祥之子孫內挑放後如獲罪革職即著為公中佐領如因公株連者仍舊承襲欽此又原立佐領人員之子孫內特旨分别應有分無分之處八旗大臣欽遵上諭辦理再有分人員內有獲罪者其罪之輕重雖不相同今八旗既現有可遵之例無庸另議外詳查從前補放佐領所議入家譜有分之例或有將原立佐領人員之子孫無論曽否管過佐領均豫有分者或有將未管佐領之人在於原立佐領人員子孫之後豫以列名之分者或有原立佐領人員之子孫內有叧立佐領者只就本身所立佐領豫以承襲之分或有將原立佐領人員之子孫內未曽管過佐領之人不豫承襲之分者或原立佐領人員之親弟兄伯叔伯叔祖伯叔曽祖之子孫內所管理何佐領只就所管理佐領內豫以同分擬陪之分列名之分者或有視其所立佐領自其髙祖以下無論曽否管過之人均豫以同分或自原管佐領髙祖以上不能敘入家譜之逺支派之子孫管理佐領者均豫以同分列名之分或原立佐領之人無嗣其親弟兄之子孫無論曽否管過佐領均豫以同分又未管過佐領之親弟兄之子孫不豫應得之分等故辦理不同以致應得之分不能均平今若不將其家譜內人員之多寡行輩之逺近詳細斟酌定為應得之分日後伊等干求佐領以行輩之逺近借端干求之處斷乎難免查得八旗查來原立佐領人員之親子孫管理如鑲黃旗滿洲多羅岱等世管佐領二百九十四缺再奏明分開應得之分如正黃旗蒙古伍隆安鑲紅旗滿洲馬廣等世管佐領十缺遵依所奏量其伊等支派分開應得之分補放佐領此等均係始管佐領人員之親子孫查從前補放勳舊佐領議定應得之分具奏之處原立佐領人員之子孫管理佐領之人內其長房管理佐領出缺時將出缺人之子孫擬正次房之子孫挑選擬陪列名若出缺人或無子嗣或獲罪革職補放佐領時其子孫不應入挑仍於出缺之長房內視其人材普律挑選擬正其二房子孫管理佐領出缺時將出缺人之子孫擬正將長房之子孫普律挑選擬陪將次房之子孫挑選列名若出缺人或無子嗣或因獲罪革職補放佐領時其子孫不應入挑其本支派內雖有親弟兄伯叔之子孫不豫擬正之分仍於長房子孫內普律挑選擬正若長房內現有管理佐領之人停其挑選將未管佐領支派之子孫內挑選擬正出缺人之支派其餘支派之人按户挑選擬陪列名其二三佐領在於一支派管理出缺時若仍將出缺人之子孫擬正則定分未能均平合於無佐領支派之子孫內擇其善者擬正出缺人之支派其餘支派之子孫挑選擬陪列名等因具奏為例辦理在案其世管佐領均係原立佐領人員之親子孫管理與補放勳舊佐領之例相同復詳加查辦並無可酌之例即遵依此例辦理再弟兄一同𢃄來之人編立佐領如鑲白旗滿洲西成額等世管佐領二十六缺二三姓遞管佐領如正白旗蒙古富森泰等世管佐領十二缺查從前補放勳舊佐領議定應得之分具奏之處其弟兄一同帶來之人所立勳舊佐領二三姓所遞管勳舊佐領人員之子孫既均承襲有分如此一支派管理佐領出缺時將出缺人之子孫挑選擬正將彼一支派之內挑選擬陪其餘之人普律挑選列名其二佐領在於一支派管理出缺時如將出缺人之子孫挑選擬正則定分未能均平合於無佐領支派之子孫內擇其善者擬正出缺人之子孫擬陪其餘之人普律挑選列名等因具奏為例辦理在案今弟兄一同帶來之人所編立勳舊佐領二三姓遞管之勳舊佐領補放之例相合即遵依此例辦理再世管佐領內原立佐領人員之子孫無嗣將近支派之人或將異姓之人作為子嗣內有管理佐領者有未曽管理佐領者又有將原立佐領人員之子孫過與無分支派之人作為子嗣者查從前補放勳舊佐領議定應得之分具奏之處勳舊佐領人員之子孫內因無子嗣將逺近支派之人作為子嗣有管理佐領者有未曽管理佐領者若不將伊等應有分應無分之處議定日後爭訟之端斷乎難免過養之子雖非親生子但無子嗣之人自幼將伊過養有年而又繼續無子嗣人之祭祀即與親生之子相同理應子以有分合依伊等養父應得之分豫以有分若將異姓之人作為子嗣者不豫以承襲之分等因具奏為例辦理在案今世管佐領內原立佐領人員之子孫無嗣將逺近支派之人與異姓之人過為子嗣者均照此例辦理外惟原立佐領人員之親子孫過與無分支派之人作為子嗣之處未曽議及原立佐領人員之子孫過與無分之支派之人作為子嗣者雖係原立佐領人員之親子孫似應有分但伊等自幼過與他支派之人繼續他支派人之祭祀即與未管理佐領支派之人無異合依伊等養父管理佐領無分之處不豫承襲之分再原立佐領人員無嗣將其逺近支派之人管理如鑲紅旗滿洲特克慎等世管佐領五十九缺查得從前補放勳舊佐領議定應得之分具奏之處原立勳舊佐領人員無嗣因不將他支派之人過養為子故將其親弟兄伯叔之子孫管理伏查襲職之例除世管官員有子孫者仍舊承襲外如無親子孫者將其親祖父與親伯叔弟兄之子孫內補放等語今管理佐領之人均係原立佐領人員之親弟兄伯叔之子孫與承襲有分之例相合如出缺時將無嗣人之親弟兄之子孫無論曽否管過佐領均豫以同分如因無親弟兄親伯叔之子孫管理佐領者即於親伯叔之子孫內無論曽否管過佐領均豫以同分其親伯叔之子孫內雖有曽管過者例應無分不豫以承襲之分管理佐領無嗣人之親弟兄伯叔之子孫內其於一支派內出缺時照臣等現議之親子孫管理佐領之例辦理如係二支派所出者將出缺人之子孫擬正將彼支派之子孫擬陪其餘支派之子孫普律挑選列名等因具奏雖為例在案但原立世管佐領人員無嗣其佐領有其親弟兄伯叔之子孫管理者亦有雖有親弟兄親伯叔之子孫其親伯叔祖伯叔曽祖之子孫不能敘入家譜逺支派人之子孫管理者此等世管佐領非勳舊佐領可比查補放世管佐領之例管理佐領人員之子孫有分未管理佐領之親弟兄之子孫無分管理佐領之人均有分臣等酌其情理量其支派之逺近將應得之分分别定議此等無嗣佐領出缺時將無嗣人之親弟兄之子孫無論曽否管過佐領均豫以同分若親弟兄伯叔之子孫皆無嗣其近支派之子孫照此豫以承襲之分若一支派出缺者將其親子孫照管理佐領之例辦理若二三支派出缺者將出缺人之子孫擬正餘支派之人普律揀選擬陪列名若原立佐領無嗣人員雖有親弟兄之子孫而親伯叔之子孫內管理者豫以同分若親伯叔祖伯叔曽祖之子孫內管理者豫以擬陪之分若髙祖以上不能敘入家譜之逺支派之人管理者豫以列名之分雖曽管過佐領永不豫以擬正之分此辦理承襲之分視其管理何佐領只就所管佐領內豫以承襲之分其所未管之佐領內不豫承襲之分再原立佐領人員之子孫有情願不管佐領讓與逺近支派之人同分擬陪之分列名之分者又有管理佐領有分人員之子孫情願不要承襲之分之世管佐領十七缺查得補放世管佐領之例管理佐領人員之子孫有分未管理佐領人員之親弟兄之子孫無分今情願讓分情願不要分之佐領其情由甚多臣等逐條詳議原立佐領人員管理佐領人員之子孫所應得之分均經臣等議奏為例豫以應得之分外其未管佐領人員之子孫理合照補放世管佐領之例不應豫以分但立佐領人員之子孫均係一祖之後裔念和睦友愛之誼情願讓與未管佐領人員之子孫之處經辦理佐領根源王大臣八旗王大臣不泯其和睦照依讓分之處議奏臣等酌其情理詳議為例之處原立佐領人員之親子孫外其親弟兄伯叔之子孫所管理佐領者豫以同分其親伯叔祖伯叔曽祖之子孫管理佐領者豫以擬陪之分其髙祖以上不能敘入家譜之逺支派之子孫管理佐領豫以列名之分等語補放世管佐領之例未管佐領之人雖無分但原立佐領人員之子孫情願讓分與伊等即與管理佐領人員一體有分查得伊等讓分之處其同分擬陪之分列名之分所讓者不同今既將一切補放佐領之處均畫一辦理若不將此畫一辦定則礙難遵行辦理請將伊等讓分之處照臣等議定之例準其讓分此等情願讓分之佐領既均照依伊等應得之分例豫以分其情願不要分之人應不豫以分又有將一户之人編立世管佐領如正紅旗滿洲剛専等七缺伏查補放世管佐領之例管理佐領人員之子孫有分未管佐領之親弟兄之子孫無分此等佐領當其分出佐領時係因伊等户中人已滿百名編立佐領於伊等户中管者無論曽否管過家譜內有名之人均有分臣等酌其情理議得此等佐領出缺時將出缺人之子孫擬正將伊等户中一切有分人員普律挑選擬陪列名以上世管佐領共六百四缺補放佐領之家譜仍照前奏將有分人寫入其無分人均裁減謹將臣等議定之十九條叧摺繕寫並繪畫每樣家譜恭呈御覽俟奉旨後交八旗大臣遵例辦理奉旨知道了九年五月鑲黃旗滿洲都統奏臣旗頭等侍衛烏達禪三等侍衛仲秋呈稱伊等原在黑龍江吉林烏拉居住於康熙年間奉旨移居京城附於常雲世管佐領內並非常雲原編佐領時所屬之人可否援例改𨽻旗下人少之公中佐領奉諭旨從前因伊著有勞績故令移居京城宜皆附於公中佐領不宜附於世管佐領此事毋庸交部烏達禪仲秋著即移於公中佐領此外有未經查出者交與八旗都統查明移於公中佐領嗣後有似此關東𢃄來之人俱照此辦理四十四年四月內務府奏乾隆二十五年正月內由葉爾羌等處送到回人共男婦大小一百二十六名口賞柏和卓為佐領令其管理續經內務府奏準照各佐領之例額設驍騎校一人領催四人謹按八旗佐領分併不常改𨽻亦復不一各詳具於本條兹特溯其沿革大端以著淵源所自始至皇上厄魯特佐領回部佐領數十年來我繁兹特各據威懾德涵歸誠者日衆生齒亦復日平定其得𨽻旗籍之初著所自來其詳具載於録焉凖噶爾回部方略以無關於旗分故不備以上滿洲佐領緣起欽定八旗通志卷一
