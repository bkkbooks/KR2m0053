body:
  text: 欽定八旗通志卷八十九典禮志十二滿洲祭神祭天典禮一祭神祭天議滿薦鮮背鐙祭議彚記洲祭祀故事禮坤寧宫元旦行禮儀注祀堂子亭式殿元旦行儀注堂子亭式殿祭儀注堂子亭式殿祭祀祝辭恭尚錫神亭祭祀儀注注尚錫神亭祭祀祝辭請神位祭于堂子儀恭請神位入宮儀注祭神祭天議每日坤寧宫朝祭夕祭每月祭天毎嵗春秋二季大祭四季獻神每月於堂子亭式殿尚錫神亭内掛獻浄紙春秋二季堂子立杆大祭一切禮儀俱行之已久燦然美備無可置議惟昔日司祝之人國語嫻熟遇有喜慶之事均能應時編纂禱祝厥後司祝之清語不及前人復無典冊記載惟口相授受於字句音韻之間不無差異即如祭天之贊辭掛獻浄紙之禱辭掌儀司俱載有冊檔是以無稍差遺所有司祝之祝禱辭章若不及時擬定載在冊檔誠如聖諭音韻字句漸至訛舛今謹將内廷司祝之一切祭神背鐙禱祝賛祈等辭録出詳閲不惟字句多有差謬即左右兩翼承充内廷司祝之賛辭亦彼此互異是以臣等令五旗王公等將各家祭神辭章録送並令從前司祝家内將伊等舊有祝禱辭章悉行錄呈彚寫一帙臣等公同敬謹覆核訂悞補闕刪複去冗又各就所見粘籖恭呈御覽伏候欽定再恭查坤寧宫每日祭神至祭馬神之時復於祭馬神室内另祭所有禱祝之辭亦應更正臣等逐條繕寫恭呈御覽如蒙皇上訓示謹遵繕成全部永逺奉行請自王以下宗室覺羅以及奉祭覺羅神之滿洲人等有情願抄録者俱准其抄録庻為臣僕者仰沐皇仁滿洲舊俗不致湮沒而永逺奉行矣謹此議奏獻鮮背鐙祭議我滿洲之禮凡祭神祭天犧牲俱用整齊全備者稍有殘缺即斥而不用是以祭祀之犧牲供獻神位不稍留剩即膽與蹄甲亦取置碟内陳於旁案初我滿洲在本處圍場既近所獲之獸可乘其鮮好背鐙以祭迨入京師圍場既逺或所獲之獸已越晝夜或係多傷或已取去腑臓因其不全不敢祭獻今臣等欽遵上諭公同詳議如盛京等處畋獵皇上親射之獸既難送京祭獻請仍照從前不獻外現在大内凡新得鮮果鮮蔬既恭獻神位而舊例曽以雛雞鮮魚等物背鐙以祭王等以及各滿洲等亦仍有以雛雞鮮魚之類背鐙以祭者請嗣後南苑等處附近畋獵皇上親射麅鹿等獸内傷止一處尾蹄臟腑齊全者如有㫖令背鐙以祭則所司恭賫交司爼人等敬謹修整祭獻若傷多殘缺不全者仍請勿用至時新鮮物臣等按其時令請每嵗春季以雛雞各二夏季以子鵞各一秋季以魚各一冬季以雉各二背鐙以祭其應獻之雛雞子鵞交㑹計司令莊頭擇肥美者交納魚雉交都虞司令網户獵户擇鮮整者交納均以生者由掌儀司官員詳視交司爼官敬謹修整於神位前背鐙以祭等因議准施行彚記滿洲祭祀故事我滿洲國自昔敬天與佛與神出於至誠故創基盛京即恭建堂子以祀天又於寢宫正殿恭建神位以祀佛菩薩神及諸祀位嗣雖建立壇廟分祀天佛暨神而舊俗未敢或改與祭祀之禮並行至我列聖定鼎中原遷都京師祭祀仍遵昔日之制由来久矣而滿洲各姓亦均以祭神為至重雖各姓祭祀皆隨土俗微有差異大端亦不甚相逺若大内及王貝勒貝子公等均於堂子内向南祭祀至若滿洲人等均於各家院内向南以祭又有建立神杆以祭者此皆祭天也凡朝祭之神皆係恭祀佛菩薩闗帝惟夕祭之神則各姓微有不同原其祭祀所由蓋以各盡誠敬以溯本源或受土地山川神靈顯祐黙相之思而報祭之也大内每嵗春秋二季於堂子内立杆祭祀復於宫内報祭除齋戒並禁止屠宰日期外每日祭神每月初二日祭天一次四季則有獻神之祭分府之皇子與宫内居住之皇子如奉㫖在坤寧宫祭神每月於皇上祭神祭天後各按次序祭神一日祭天一日其未分府在紫禁城内居住之皇子每月各於所居之處祭神祭天王貝勒貝子公等每嵗春秋二季挨次在堂子内立杆祭祀並各於本家報祭每月祭神祭天公侯伯大臣官員以下至閑散滿洲或毎月或毎嵗或四季二季一季於本家内祭神先是每嵗春秋二季大内立杆祭神過二三日後親王以下入八分公以上各按班次由坤寧宫内恭請朝祭夕祭神位至於各家屆立杆祭祀之日恭請朝祭神位在堂子内祭畢仍請至家内夕間大祭於是挨次恭請神位祭祀俱照此至於月終大内司爼官司爼等恭請神位進宫是時坤寧宫每日祭祀朝則於供佛金亭幔帳之前夕則於架幔神位前祭祀康熙五十七年奉聖祖仁皇帝諭㫖停止王等恭請神位雍正元年世宗憲皇帝特命莊親王怡親王恭請神位於其府内各祭一次凡滿洲各姓祭神或用女司祝亦有用男司祝者自大内以下閑散宗室覺羅以至伊爾根覺羅錫林覺羅姓之滿洲人等俱用女司祝以祭從前内廷主位及王等福晉皆有為司祝者今大内祭祀仍揀擇覺羅大臣官員之命婦為司祝以承祭事凡宫内居住之皇子有㫖令在坤寧宫祭神仍用覺羅司祝祭祀外若紫禁城内居住之皇子祭神則於上三旗包衣佐領管領下之覺羅或異姓大臣官員閑散滿洲人等妻室内選擇為司祝令其承祭其已分府之皇子及王貝勒貝子公等俱於各該旗屬包衣佐領管領下之覺羅或異姓大臣官員閑散滿洲人等妻室内選擇為司祝令其承祭如屬下並無為司祝之人或於各屬下包衣佐領管領下之滿洲婦人内選擇令其為司祝以祭或另請司祝以祭自公侯伯大臣官員以下以至閑散滿洲用女司祝祭祀者俱於本族中選擇以承祭事如實不能得人即於家内仿照司祝祭神之例整理祭物焚香獻酒本家家長叩頭省牲供肉叩頭以祭其用男司祝祭祀之家各由本家請男司祝以祭自大内以下閑散宗室覺羅以至伊爾根覺羅錫林覺羅姓之滿洲人等祭祀均用猪大内每日朝夕各用猪二祭天用猪一王以下入八分公以上立杆大祭日朝夕各用猪二至閑散宗室覺羅等常祭並報祭之日朝夕各用猪一祭天用猪一大内春秋立杆祭神後祭馬神二日各用猪二王公等祭馬神一日各用猪一求福祭祀用鯉魚二其餘各姓滿洲内有惟求福者亦有惟祭天者祭神祭天止用猪一或用羊一或用猪羊各一或用猪數口羊數牽或用小猪鵞魚不等至於灌油熟胙供獻則大畧相同大内則主位或以初次所獲禽獸或以新得鵞魚之類背鐙以祭其王等以及滿洲家亦有以鵞雞與魚並新穫米榖等物背鐙以祭者除祭神祭天樹栁枝祭求福以及祭馬神外滿洲人等又有因子女出痘因避以猪餻祭天者謂之痘祭以餻祭天者謂之餻祭昏夜於室西山牆外以小猪祭天者謂之去祟田苖正長因生蟊或遇旱前往田間懸掛紙條如斿以細木夾之蒸餻與飯捧至田間以祭謂之祭田苖神至於秋收後蒸餻捧至場院以祭者謂之祭場院復有夜祭七星者謂之禳祭再滿洲人等久居屯莊有欲祭神者於卧室内以繩貫於新衣飾如神幔照平日祭神之禮以酒餻與猪祭之是以聖祖仁皇帝幸暢春園熱河駐蹕日久即在暢春園熱河張掛神幔設佛亭神位以祭今聖主法祖懿行於乾隆八年駐蹕盛京時亦曽懸掛神幔設佛亭神位以祭焉至於祭天之禮滿洲人等於所至之地皆可舉行但尋潔浄之木以為神杆或置祭斗或縛草把購猪灑米以祭自王貝勒貝子公等以至宗室覺羅滿洲各姓大臣官員閑散滿洲凡遇喜慶之事各以財物獻神如有應禱祝之事亦以財物獻神求福再大臣官員滿洲人等聘女先期取壻家財物獻於神位以之獻神祭天而滿洲内亦有神位前不設抽屉桌僅在神板上供獻香碟者凡祭祀行禮時主祭之人皆免冠以至誠敬至於供餻之禮大内每嵗春秋二季立杆大祭則以打餻搓條餑餑供獻正月以饊子供獻五月以椵葉餑餑供獻六月以蘇葉餑餑供獻七月以新黍蒸淋漿餻供獻八月以新稷蒸飯用木榔頭打熟作為餃子煠油供獻餘月俱以灑餻供獻除淋漿餻搓條餑餑外俱用稷米王府亦如之至各姓滿洲人家有同此供獻者或有供獻豆麫餑餑者或以稷米蒸飯供獻者或以新麥煮飯供獻者復有以新穫荍磨麫作餅甚薄謂之煎餅以供獻於神位者至若江南各省駐防滿洲人等因其地不産稷米即以江米代之在京之滿洲人等或無莊頭者其醸酒灑餻打餻即以所領俸米内江米代稷米用之其醸酒之法大内春秋二季立杆大祭則於四十日前設缸蒸稷米飯和麴醸之謂之清酒每月常祭則三日前亦蒸稷米飯和麫醸之謂之醴酒王府亦如之若滿洲人等醸酒或以稷米或以江米又有滿洲人家或以粟米或以稷米或以蒼耳燒酒以祭者凡滿洲人等祭祀所用之酒與餻皆自醸告並不沽之於市是以大内特立神厨每月祭祀醸醴酒製麴磨麴蒸米煮豆炒菽作搓條餑餑饊子蘇油俱於神厨造作其碓磨蒸籠􅀈缸木槽栁斗簸籮桶擔篩籮簸箕之類皆専設一分以上器皿他處不准使用王府及勲舊滿洲人家均各専設一分若单姓寒門並無另室之家於祭期之前整理祭品後洗滌鍋缸封閉以備祭祀之用是以舊俗當此時或比鄰或戚眷以整理祭品之家已封閉鍋竈各備飯殽送往至祭神祭天之期凡送飯之人俱邀請共食祭肉再從前在本處祭祀時不得上好浄紙是以各家或以夏布或以麻苧擣至熟爛入水浸泡拌以糠粃掛於簾幔以造紙焉至於滿洲人等自昔遵行祭祀諱忌規條凡神位必供於正室背鐙祭祀之肉例得出門其朝祭之肉除皮骨外一概不准出戸凡食祭肉雖奴僕經家長使役亦不得口舍嚼咀以踰户閾必下咽方准出祭室之門亦有人家祭肉俱准出門者又有人家即背鐙祭肉亦不准出門者其祭祀用猪之滿洲人家如遇墓祭䘮祭皆不用猪是以世祖章皇帝特命於陵寝祭獻所用之生牛羊猪内將猪易以牛一羊二凡滿洲豢養牲畜人家不令猪入祭室院内倘有走入者即省其猪以祭之省者避宰割之辭猪死則謂之氣息凡祭祀背鐙所用之猪皆謂之犧牲祭祀時焚掛獻之紙錢曰化之燒燎猪之頭蹄削去其毛則不曰刮之而曰燖之若已整理祭品又已醸酒則不入有服之家倘遇不得已之事必須往者已汚其目則不即入祭室必俟新更月建後始入焉或易其衣冠沐浴過三日後亦可入滿洲人等如本家遇有孝服者必請出神位暫安於潔浄之室若族中孝服則在大門外釋去孝衣始入院内如無另室之家則浄面洗目焚草越火而過之始入供神位之板或以紅紬方幅或以紅氊或以紅紙掩蔽之祭神之室及院不准持鞭以入祭室之内不准露置財帛不准妄行垂淚不綴纓緯者不准其入不責處人不語傷心事不言忌諱惡語務擇嘉祥吉慶事言之聖祖仁皇帝屢降諭㫖於故老所謂諱忌之事訓戒嚴切仰惟聖祖仁皇帝家訓所載故舊滿洲人等諱忌一事皆與古昔載籍相符今夫同一諱忌之事家有尊長者子孫則為尊長諱忌之若子孫衆多之家尊長亦為子孫諱忌之此皆恤下敬上之意爾等當知之而奉行之也坤寧宫元旦行禮儀注正月初一日三更司香於坤寧宫朝祭夕祭神位前俱㸃香皇帝皇后行禮司香鋪氊如遇皇帝率王貝勒貝子等於坤寧宫朝祭夕祭神位前行禮則司香照常㸃香鋪皇帝行禮之氊堂子亭式殿元旦行禮儀注毎嵗正月初一日皇帝恭謁堂子行禮武備院卿於甬路中間鋪拜褥皇帝至亭式殿前向上立鴻臚寺鳴贊贊行禮皇帝三跪九叩行禮畢還宫預派内務府總管一員於堂子亭式殿内髙案下所立杉木柱上掛净紙錢二十七張自是諸王䕶衛等挨次各掛浄紙錢二十七張司爼官㸃香堂子亭式殿祭祀儀注正月初三日每月初一日於堂子亭式殿祭祀是日司爼官一員司爼一人於亭式殿内高案下所立杉木柱上掛紙錢二十七張案上供時食一盤醴酒一琖又於所設小桌上供椀二一盛酒一空設司香㸃香奏三絃琵琶之内監二人於亭式殿外甬路上西首向東鳴拍板拊掌之㸔守堂子人東面向西俱坐司祝進跪司香舉臺琖授司祝司祝接授臺琖獻酒六次司爼官一員於亭式殿外階下東首立贊鳴拍板即奏三絃琵琶鳴拍板拊掌司爼每一獻將所獻之酒注於空椀内復自盛醴酒椀内挹新酒注於二琖中獻之每一獻司爼官贊歌鄂囉羅㸔守堂子人歌鄂囉羅六次獻畢以臺琖授於司香司祝一叩頭興合掌致敬司爼官贊停拍板其三絃琵琶拍板暫止司香舉神刀授司祝司祝接受神刀進司爼官贊鳴拍板即奏三絃琵琶鳴拍板拊掌司祝一叩頭興司爼官贊歌鄂囉羅衆歌鄂囉羅司祝擎神刀禱祝時則歌鄂囉羅誦神歌祝禱三次如前儀如是九次畢司祝一叩頭興復禱祝三次以神刀授於司香司爼官贊停拍板其三絃琵琶拍板皆止司祝跪祝一叩頭興合掌致敬退所供酒食分給看守堂子之人正月初三日每月初一日堂子亭式殿祭祀祝辭上天之子紐歡台吉武篤本貝子某年生小子某年生小子為某人祭則呼某人本生年今敬祭者豐於首而仔於肩衛於後而䕶於前畀以嘉祥兮齒其兒而髮其黄兮年其増而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮尚錫神亭祭祀儀注每月初一日於堂子内東南隅尚錫神亭祭祀獻時食一盤醴酒一琖於髙案上司爼㸃香司爼滿洲掛净紙於髙案下所立杉木柱上自是諸王䕶衛等挨次掛净紙滿洲管領一名掛齋戒數珠免冠脱褂解帶入跪祝叩頭叩頭畢出司爼入將供獻之酒注於桌前地上所設大椀内撤所供時食分給管領每月初一日祭尚錫神亭管領祝辭上天之子尚錫之神月已更矣建始惟新某年生小子為某人祭則呼某人本生年敬備粢盛兮潔楮並陳恵我某年生小子為某人祭則呼某人本生年貺以嘉祥兮畀以康寧恭請神位供於堂子儀注毎嵗十二月二十六日恭請神位供於堂子是日屆時衣金黄緞衣内監十六人舁二黄緞神輿進内左門近光左門景和門預備於坤寧宫門外衣黄緞衣司爼滿洲二人恭請朝祭神位夕祭神位各安奉輿内衣金黄緞衣内監十六人舁二輿由宫殿正門出前引杖四對羊角燈二對亦用衣金黄緞衣太監執之司爼官二員司爼二人司爼滿洲二人由宫内前引至乾清門外侍衛十員前導掌儀司官一員扈行出東長安門至堂子於饗殿内並輿奉安朝祭神位於東夕祭神位於西輿前各設大低桌一桌上各供香碟一㸔守堂子人員每日朝夕㸃香二次恭請神位入宫儀注每嵗正月初二日自堂子恭請神位入宫是日屆時衣金黄緞衣内監十六人入饗殿内恭舁二黄緞神輿前引杖四對羊角燈二對俱用衣金黄緞衣内監執之侍衛十員前導掌儀司官一員在後扈行仍入東長安門由宫殿正門至乾清門止司爼官二員司爼二人司爼滿洲二人前導進乾清門至坤寧宫門外衣黄緞衣司爼滿洲二人由輿内恭請神位至坤寧宫各安奉於原位欽定八旗通志卷八十九
