body:
  text: 欽定八旗通志卷八十九典禮志十二滿洲祭神祭天典禮一祭神祭天議滿薦鮮背鐙祭議彚記洲祭祀故事禮坤寧宫元旦行禮儀注祀堂子亭式殿元旦行儀注堂子亭式殿祭儀注堂子亭式殿祭祀祝辭恭尚錫神亭祭祀儀注注尚錫神亭祭祀祝辭請神位祭于堂子儀恭請神位入宮儀注祭神祭天議每日坤寧宫朝祭夕祭每月祭天每嵗春秋二季大祭四季獻神每月於堂子亭式殿尚錫神亭內挂獻淨紙春秋二季堂子立杆大祭一切禮儀俱行之已久燦然美備無可置議惟昔日司祝之人國語嫻熟遇有喜慶之事均能應時編纂禱祝厥後司祝之清語不及前人復無典册記載惟口相授受於字句音韻之間不無差異即如祭天之贊辭挂獻淨紙之禱辭掌儀司俱載有册檔是以無稍差遺所有司祝之祝禱辭章若不及時擬定載在册檔誠如聖諭音韻字句漸至訛舛今謹將內廷司祝之一切祭神背鐙禱祝贊祈等辭録出詳閲不惟字句多有差謬即左右兩翼承充內廷司祝之贊辭亦彼此互異是以臣等令五旗王公等將各家祭神辭章録送並令從前司祝家內將伊等舊有祝禱辭章悉行録呈彚寫一帙臣等公同敬謹覆核訂誤補闕刪復去冗又各就所見粘籖恭呈御覽伏候欽定再恭查坤寧宫每日祭神至祭馬神之時復於祭馬神室內另祭所有禱祝之辭亦應更正臣等逐條繕寫恭呈御覽如蒙皇上訓示謹遵繕成全部永逺奉行請自王以下宗室覺羅以及奉祭覺羅神之滿洲人等有情願抄録者俱準其抄録庶為臣僕者仰沐皇仁滿洲舊俗不致湮沒而永逺奉行矣謹此議奏獻鮮背鐙祭議我滿洲之禮凡祭神祭天犧牲俱用整齊全備者稍有殘缺即斥而不用是以祭祀之犧牲供獻神位不稍留剩即膽與蹄甲亦取置碟內陳於旁案初我滿洲在本處圍場既近所獲之獸可乘其鮮好背鐙以祭逮入京師圍場既逺或所獲之獸已越晝夜或係多傷或已取去腑臟因其不全不敢祭獻今臣等欽遵上諭公同詳議如盛京等處畋獵皇上親射之獸既難送京祭獻請仍照從前不獻外現在大內凡新得鮮果鮮蔬既恭獻神位而舊例曽以雛雞鮮魚等物背鐙以祭王等以及各滿洲等亦仍有以雛雞鮮魚之類背鐙以祭者請嗣後南苑等處附近畋獵皇上親射麅鹿等獸內傷止一處尾蹄臟腑齊全者如有旨令背鐙以祭則所司恭賫交司爼人等敬謹修整祭獻若傷多殘缺不全者仍請勿用至時新鮮物臣等按其時令請每嵗春季以雛雞各二夏季以子鵝各一秋季以魚各一冬季以雉各二背鐙以祭其應獻之雛雞子鵝交會計司令莊頭擇肥美者交納魚雉交都虞司令網户獵户擇鮮整者交納均以生者由掌儀司官員詳視交司爼官敬謹修整於神位前背鐙以祭等因議準施行彚記滿洲祭祀故事我滿洲國自昔敬天與佛與神出於至誠故創基盛京即恭建堂子以祀天又於寢宫正殿恭建神位以祀佛菩薩神及諸祀位嗣雖建立壇廟分祀天佛暨神而舊俗未敢或改與祭祀之禮並行至我列聖定鼎中原遷都京師祭祀仍遵昔日之制由來久矣而滿洲各姓亦均以祭神為至重雖各姓祭祀皆隨土俗微有差異大端亦不甚相逺若大內及王貝勒貝子公等均於堂子內向南祭祀至若滿洲人等均於各家院內向南以祭又有建立神杆以祭者此皆祭天也凡朝祭之神皆係恭祀佛菩薩關帝惟夕祭之神則各姓微有不同原其祭祀所由蓋以各盡誠敬以溯本源或受土地山川神靈顯祐默相之思而報祭之也大內每嵗春秋二季於堂子內立杆祭祀復於宫內報祭除齋戒並禁止屠宰日期外每日祭神每月初二日祭天一次四季則有獻神之祭分府之皇子與宫內居住之皇子如奉旨在坤寧宫祭神每月於皇上祭神祭天後各按次序祭神一日祭天一日其未分府在紫禁城內居住之皇子每月各於所居之處祭神祭天王貝勒貝子公等每嵗春秋二季挨次在堂子內立杆祭祀並各於本家報祭每月祭神祭天公侯伯大臣官員以下至間散滿洲或每月或每嵗或四季二季一季於本家內祭神先是每嵗春秋二季大內立杆祭神過二三日後親王以下入八分公以上各按班次由坤寧宫內恭請朝祭夕祭神位至於各家屆立杆祭祀之日恭請朝祭神位在堂子內祭畢仍請至家內夕間大祭於是挨次恭請神位祭祀俱照此至於月終大內司爼官司爼等恭請神位進宫是時坤寧宫每日祭祀朝則於供佛金亭幔帳之前夕則於架幔神位前祭祀康熙五十七年奉聖祖仁皇帝諭旨停止王等恭請神位雍正元年世宗憲皇帝特命莊親王怡親王恭請神位於其府內各祭一次凡滿洲各姓祭神或用女司祝亦有用男司祝者自大內以下間散宗室覺羅以至伊爾根覺羅錫林覺羅姓之滿洲人等俱用女司祝以祭從前內廷主位及王等福晉皆有為司祝者今大內祭祀仍揀擇覺羅大臣官員之命婦為司祝以承祭事凡宫內居住之皇子有旨令在坤寧宫祭神仍用覺羅司祝祭祀外若紫禁城內居住之皇子祭神則於上三旗包衣佐領管領下之覺羅或異姓大臣官員間散滿洲人等妻室內選擇為司祝令其承祭其已分府之皇子及王貝勒貝子公等俱於各該旗屬包衣佐領管領下之覺羅或異姓大臣官員間散滿洲人等妻室內選擇為司祝令其承祭如屬下並無為司祝之人或於各屬下包衣佐領管領下之滿洲婦人內選擇令其為司祝以祭或另請司祝以祭自公侯伯大臣官員以下以至間散滿洲用女司祝祭祀者俱於本族中選擇以承祭事如實不能得人即於家內仿照司祝祭神之例整理祭物焚香獻酒本家家長叩頭省牲供肉叩頭以祭其用男司祝祭祀之家各由本家請男司祝以祭自大內以下間散宗室覺羅以至伊爾根覺羅錫林覺羅姓之滿洲人等祭祀均用豬大內每日朝夕各用豬二祭天用豬一王以下入八分公以上立杆大祭日朝夕各用豬二至間散宗室覺羅等常祭並報祭之日朝夕各用豬一祭天用豬一大內春秋立杆祭神後祭馬神二日各用豬二王公等祭馬神一日各用豬一求福祭祀用鯉魚二其餘各姓滿洲內有惟求福者亦有惟祭天者祭神祭天止用豬一或用羊一或用豬羊各一或用豬數口羊數牽或用小豬鵝魚不等至於灌油熟胙供獻則大略相同大內則主位或以初次所獲禽獸或以新得鵝魚之類背鐙以祭其王等以及滿洲家亦有以鵝雞與魚並新穫米榖等物背鐙以祭者除祭神祭天樹栁枝祭求福以及祭馬神外滿洲人等又有因子女出痘因避以豬糕祭天者謂之痘祭以糕祭天者謂之糕祭昏夜於室西山牆外以小豬祭天者謂之去祟田苖正長因生蟊或遇旱前往田間懸挂紙條如斿以細木夾之蒸糕與飯捧至田間以祭謂之祭田苖神至於秋收後蒸糕捧至場院以祭者謂之祭場院復有夜祭七星者謂之禳祭再滿洲人等久居屯莊有欲祭神者於卧室內以繩貫於新衣飾如神幔照平日祭神之禮以酒糕與豬祭之是以聖祖仁皇帝幸暢春園熱河駐蹕日久即在暢春園熱河張挂神幔設佛亭神位以祭今聖主法祖懿行於乾隆八年駐蹕盛京時亦曽懸挂神幔設佛亭神位以祭焉至於祭天之禮滿洲人等於所至之地皆可舉行但尋潔淨之木以為神杆或置祭斗或縛草把購豬灑米以祭自王貝勒貝子公等以至宗室覺羅滿洲各姓大臣官員間散滿洲凡遇喜慶之事各以財物獻神如有應禱祝之事亦以財物獻神求福再大臣官員滿洲人等聘女先期取壻家財物獻於神位以之獻神祭天而滿洲內亦有神位前不設抽屉桌僅在神板上供獻香碟者凡祭祀行禮時主祭之人皆免冠以至誠敬至於供糕之禮大內每嵗春秋二季立杆大祭則以打糕搓條餑餑供獻正月以饊子供獻五月以椵葉餑餑供獻六月以蘇葉餑餑供獻七月以新黍蒸淋漿糕供獻八月以新稷蒸飯用木榔頭打熟作為餃子煠油供獻餘月俱以灑糕供獻除淋漿糕搓條餑餑外俱用稷米王府亦如之至各姓滿洲人家有同此供獻者或有供獻豆麵餑餑者或以稷米蒸飯供獻者或以新麥煮飯供獻者復有以新穫荍磨麵作餅甚薄謂之煎餅以供獻於神位者至若江南各省駐防滿洲人等因其地不産稷米即以江米代之在京之滿洲人等或無莊頭者其釀酒灑糕打糕即以所領俸米內江米代稷米用之其釀酒之法大內春秋二季立杆大祭則於四十日前設缸蒸稷米飯和麴釀之謂之清酒每月常祭則三日前亦蒸稷米飯和麵釀之謂之醴酒王府亦如之若滿洲人等釀酒或以稷米或以江米又有滿洲人家或以粟米或以稷米或以蒼耳燒酒以祭者凡滿洲人等祭祀所用之酒與糕皆自釀告並不沽之於市是以大內特立神厨每月祭祀釀醴酒製麴磨麴蒸米煮豆炒菽作搓條餑餑饊子蘇油俱於神厨造作其碓磨蒸籠􅀈缸木槽栁斗簸籮桶擔篩籮簸箕之類皆専設一分以上器皿他處不準使用王府及勳舊滿洲人家均各専設一分若單姓寒門並無另室之家於祭期之前整理祭品後洗滌鍋缸封閉以備祭祀之用是以舊俗當此時或比鄰或戚眷以整理祭品之家已封閉鍋竈各備飯殽送往至祭神祭天之期凡送飯之人俱邀請共食祭肉再從前在本處祭祀時不得上好淨紙是以各家或以夏布或以麻苧搗至熟爛入水浸泡拌以粳粃挂於簾幔以造紙焉至於滿洲人等自昔遵行祭祀諱忌規條凡神位必供於正室背鐙祭祀之肉例得出門其朝祭之肉除皮骨外一概不準出戶凡食祭肉雖奴僕經家長使役亦不得口舍嚼咀以踰户閾必下咽方準出祭室之門亦有人家祭肉俱準出門者又有人家即背鐙祭肉亦不準出門者其祭祀用豬之滿洲人家如遇墓祭喪祭皆不用豬是以世祖章皇帝特命於陵寢祭獻所用之生牛羊豬內將豬易以牛一羊二凡滿洲豢養牲畜人家不令豬入祭室院內倘有走入者即省其豬以祭之省者避宰割之辭豬死則謂之氣息凡祭祀背鐙所用之豬皆謂之犧牲祭祀時焚挂獻之紙錢曰化之燒燎豬之頭蹄削去其毛則不曰刮之而曰燖之若已整理祭品又已釀酒則不入有服之家倘遇不得已之事必須往者已汚其目則不即入祭室必俟新更月建後始入焉或易其衣冠沐浴過三日後亦可入滿洲人等如本家遇有孝服者必請出神位暫安於潔淨之室若族中孝服則在大門外釋去孝衣始入院內如無另室之家則淨面洗目焚草越火而過之始入供神位之板或以紅紬方幅或以紅氊或以紅紙掩蔽之祭神之室及院不準持鞭以入祭室之內不準露置財帛不準妄行垂淚不綴纓緯者不準其入不責處人不語傷心事不言忌諱惡語務擇嘉祥吉慶事言之聖祖仁皇帝屢降諭旨於故老所謂諱忌之事訓戒嚴切仰惟聖祖仁皇帝家訓所載故舊滿洲人等諱忌一事皆與古昔載籍相符今夫同一諱忌之事家有尊長者子孫則為尊長諱忌之若子孫衆多之家尊長亦為子孫諱忌之此皆恤下敬上之意爾等當知之而奉行之也坤寧宫元旦行禮儀注正月初一日三更司香於坤寧宫朝祭夕祭神位前俱點香皇帝皇后行禮司香鋪氊如遇皇帝率王貝勒貝子等於坤寧宫朝祭夕祭神位前行禮則司香照常點香鋪皇帝行禮之氊堂子亭式殿元旦行禮儀注每嵗正月初一日皇帝恭謁堂子行禮武備院卿於甬路中間鋪拜褥皇帝至亭式殿前向上立鴻臚寺鳴贊贊行禮皇帝三跪九叩行禮畢還宫預派內務府總管一員於堂子亭式殿內髙案下所立杉木柱上挂淨紙錢二十七張自是諸王護衛等挨次各挂淨紙錢二十七張司爼官點香堂子亭式殿祭祀儀注正月初三日每月初一日於堂子亭式殿祭祀是日司爼官一員司爼一人於亭式殿內高案下所立杉木柱上挂紙錢二十七張案上供時食一盤醴酒一盞又於所設小桌上供碗二一盛酒一空設司香點香奏三絃琵琶之內監二人於亭式殿外甬路上西首向東鳴拍板拊掌之看守堂子人東面向西俱坐司祝進跪司香舉臺盞授司祝司祝接授臺盞獻酒六次司爼官一員於亭式殿外階下東首立贊鳴拍板即奏三絃琵琶鳴拍板拊掌司爼每一獻將所獻之酒注於空碗內復自盛醴酒碗內挹新酒注於二盞中獻之每一獻司爼官贊歌鄂囉羅看守堂子人歌鄂囉羅六次獻畢以臺盞授於司香司祝一叩頭興合掌致敬司爼官贊停拍板其三絃琵琶拍板暫止司香舉神刀授司祝司祝接受神刀進司爼官贊鳴拍板即奏三絃琵琶鳴拍板拊掌司祝一叩頭興司爼官贊歌鄂囉羅衆歌鄂囉羅司祝擎神刀禱祝時則歌鄂囉羅誦神歌祝禱三次如前儀如是九次畢司祝一叩頭興復禱祝三次以神刀授於司香司爼官贊停拍板其三絃琵琶拍板皆止司祝跪祝一叩頭興合掌致敬退所供酒食分給看守堂子之人正月初三日每月初一日堂子亭式殿祭祀祝辭上天之子紐歡台吉武篤本貝子某年生小子某年生小子為某人祭則呼某人本生年今敬祭者豐於首而仔於肩衛於後而護於前畀以嘉祥兮齒其兒而髮其黃兮年其增而嵗其長兮根其固而身其康兮神兮貺我神兮佑我永我年而夀我兮尚錫神亭祭祀儀注每月初一日於堂子內東南隅尚錫神亭祭祀獻時食一盤醴酒一盞於髙案上司爼點香司爼滿洲挂淨紙於髙案下所立杉木柱上自是諸王護衛等挨次挂淨紙滿洲管領一名挂齋戒數珠免冠脫褂解帶入跪祝叩頭叩頭畢出司爼入將供獻之酒注於桌前地上所設大碗內撤所供時食分給管領每月初一日祭尚錫神亭管領祝辭上天之子尚錫之神月已更矣建始惟新某年生小子為某人祭則呼某人本生年敬備粢盛兮潔楮並陳惠我某年生小子為某人祭則呼某人本生年貺以嘉祥兮畀以康寧恭請神位供於堂子儀注每嵗十二月二十六日恭請神位供於堂子是日屆時衣金黃緞衣內監十六人舁二黃緞神輿進內左門近光左門景和門預備於坤寧宫門外衣黃緞衣司爼滿洲二人恭請朝祭神位夕祭神位各安奉輿內衣金黃緞衣內監十六人舁二輿由宫殿正門出前引杖四對羊角燈二對亦用衣金黃緞衣太監執之司爼官二員司爼二人司爼滿洲二人由宫內前引至乾清門外侍衛十員前導掌儀司官一員扈行出東長安門至堂子於饗殿內並輿奉安朝祭神位於東夕祭神位於西輿前各設大低桌一桌上各供香碟一看守堂子人員每日朝夕點香二次恭請神位入宫儀注每嵗正月初二日自堂子恭請神位入宫是日屆時衣金黃緞衣內監十六人入饗殿內恭舁二黃緞神輿前引杖四對羊角燈二對俱用衣金黃緞衣內監執之侍衛十員前導掌儀司官一員在後扈行仍入東長安門由宫殿正門至乾清門止司爼官二員司爼二人司爼滿洲二人前導進乾清門至坤寧宫門外衣黃緞衣司爼滿洲二人由輿內恭請神位至坤寧宫各安奉於原位欽定八旗通志卷八十九
