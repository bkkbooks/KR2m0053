body:
  text: 欽定四庫全書欽定八旗通志卷一百二十七人物志七宗室王公傳五和碩肅武親王豪格和碩肅武親王豪格豪格太宗文皇帝長子初從征䝉古棟䕫察哈爾鄂爾多斯諸部屢立軍功封貝勒天命十一年十月奉命同大貝勒代善等率精兵萬人徃征蒙古喀爾喀札嚕特部落所向皆捷斬其貝勒鄂爾齋圖擒巴克父子三人及拉什希布岱青多爾濟桑阿爾齋等十四貝勒以俘獲還天聰元年五月上親征明至廣寧舊邊分兵三隊豪格同貝勒德格類等敗明兵於錦州復率偏師衛塔山糧運豪格以精騎八十人先行遇明兵二萬擊却之二年同貝勒濟爾哈朗征䝉古固特塔布囊誅之收其衆三年九月復從上征明命同三貝勒莽古爾泰等赴通州視渡口捕哨卒大兵由通州薄京師明寧逺廵撫袁崇煥錦州總兵祖大夀等以兵二萬來援屯廣渠門外右偏伏重兵莽古爾泰令諸貝勒擊其右避敵者罪之豪格直趨右偏敗其伏衝殺至城壕敵大潰十二月同貝勒岳託薩哈璘率兵四千圍永平府攻克香河縣四年正月奉命同岳託徃瀋陽代留守兵五年七月上率諸貝勒將帥及大軍攻明大凌河城豪格奉命與貝勒杜度薩哈璘等居守都城六年五月從上征察哈爾林丹汗遁移師略歸化城六月晉封和碩貝勒七年六月詔問征明與察哈爾朝鮮孰先豪格奏言錦州寧逺攻之無益盖我國攻城之法彼盡知之况我兵先曽攻之而未得若復令攻之必有畏難之意雖得錦州此外七城尚煩攻取若徒得一城其餘亦未必歸服當思不勞而得之法今盡率我兵及邊外新舊䝉古兵從舊道入焚畧各處為書頒各屯寨告以我願和而彼不肯和之意則彼處人民必自怨其主於我無尤我軍馬匹或斃即以所獲貲財買補餘用製衣則嗣後進兵人人願徃誰肯安坐如此去而速返俟秣馬肥壯稍益以漢軍携紅衣礟分兵兩路一從寧逺入一從舊路入夾攻山海闗得之則已不得則屯兵彼地遣人徃招流賊不然進攻通州久駐其地如流賊仍在則遣師乗夜襲之至朝鮮宜暫撫慰俟我勝負既定再議察哈爾若離興安嶺二三日程雖追無及若近可相機行也八月命與阿巴泰貝勒等率額駙楊古利統兵二千略明山海闗俘獲户口性畜四千有竒八年七月上將由尚方保入明邊攻宣府朔州一帶命豪格率額駙楊古利等先徃拆毁邊墻大兵遂入尚方保分道進閏八月命同貝勒多爾衮略朔州及五臺山還從視大同攻其城明兵來援擊敗之追及城壕還獲馬百九年二月命與多爾衮岳託薩哈璘統兵萬徃收察哈爾林丹汗之子額哲四月大兵至錫喇珠爾格察哈爾汗妻及台吉索諾木率所屬千五百户降仍率兵前進造船渡黄河抵托里圗天霧晦額哲無備豪格與諸貝勒等恐其驚潰按兵不動遣葉赫貝勒錦台什之弟南楚及其族叔祖阿什達爾漢併哈爾松阿代衮先徃宣諭慰撫額哲遂奉其母率衆宰桑台吉出迎降時鄂爾多斯部濟農誘額哲徃附與之盟且行矣我前軍阿什達爾漢等追濟農還諭令盡返所携察哈爾人户遺物不然即移兵徃討濟農懼盡送於軍遂携降民渡黄河至歸化城時岳託以疾留駐豪格同諸貝勒率額哲等略明山西自平魯衛入遇明右衛兵二百敗之進至朔州有寧武闗㕘將以兵來拒殺十餘人㕘將被創遁我兵直抵長城下遣前鋒統領勞薩毁闗入略代州忻州至忻口明總督遣兵七百來偵我軍左翼兵擊走之追至崞縣乃還出長城自應州赴平魯衛明兵五百出城陣我右翼兵破之追至城壕斬級百餘遂率大兵出邊計俘獲人畜七萬六千二百至歸化城與岳託㑹班師事互詳睿忠親王傳崇徳元年四月晉封和碩肅親王兼理户部事尋以黨岳託且漏上言有怨心降貝勒解部任罰鍰八月同睿親王多爾衮攻明錦州降胡有陞等十一月仍命攝户部事務十二月上親征朝鮮豪格與睿親王分統滿洲蒙古及外藩䝉古各左翼兵别從寛甸路入二年正月入長山口昌州軍民棄城奔山寨克之又敗安州黄州援兵寧邊守將以兵千來戰豪格遣䝉古都統蘇納等敗之擒其帥師至宣屯村村民言黄州總兵聞其王被圍率兵萬五千徃援行三日矣豪格選兵夜疾馳旦至陶山襲擊敗之九月以都統鄂莫克圗欲脅取蒙古台吉博洛女以媚豪格豪格不治其罪議罷部任罰鍰三年十月復同睿親王等征明自董家口毁邊墻入敗明兵於豐潤縣遂下山東降髙唐州略地至曹州明兵毁橋拒我師列陣誘敵渡遶其後敗之還下東光縣又遣騎二千敗郭太監兵於滹沱河破獻縣四年四月凱旋獻所獲於篤恭殿上酌納之賜豪格馬二銀萬兩八月仍命管户部事九月復封肅親王十一月偕貝勒多鐸征錦州明寧逺兵出北山岡來拒遣右翼兵擊敗之陣斬總兵金國鳳及其二子五年六月同睿親王等屯田義州刈其禾稼屢敗明兵克其臺郤其總督洪承疇援兵十二月同睿親王多爾衮圍錦州以我軍離城逺駐又遣弁兵私囘罪與睿親王並降郡王六年六月命同睿郡王多爾衮往代鄭親王濟爾哈朗等圍錦州屢擊松山及山海闗援兵有斬獲明總督洪承疇以兵十三萬來援我兵敗其三營獲馬五百餘以敵兵多請濟師上遂統大兵親征自盛京疾馳六日至戚家保遣内國史院大學士剛林等諭多爾衮豪格等駐營髙橋俟大兵至合圍松山杏山豪格與多爾衮等奏請上駐營松山杏山間上允之明兵屢犯我營汛皆敗見大兵環松山而營大懼明總兵吳三桂等沿海夜奔寧逺九月命與睿郡王多爾衮等還守盛京十一月同輔國公滿達海等圍明松山敗敵兵七年二月明松山副將夏承徳宻約内應以其子夏舒為質遂於城南䜿梯夜登生擒承疇及廵撫邱民仰總兵王廷臣曹變蛟祖大樂總兵白廣恩之子白良弼等斬兵備道副將逰擊都司守備等官百餘人兵三千有竒俘獲人口器械無算事詳豫通親王傳三月駐松山斬明兵出樵採者三十餘人又遣前鋒努山擊敗明兵之欲入寧逺者五百餘人四月復同鄭親王濟爾哈朗睿郡王多爾衮攻塔山以巨礟轟擊之城陷二十餘丈我兵由陷處先登克其城殱其官兵七千七月叙功復封肅親王賜鞍馬一蟒縀百順治元年四月以語侵睿親王為都統和洛輝所訐削爵十月復封肅親王是年冬命勦山東土冦至則定濟寧破滿家洞等賊巢堙二百五十一洞土冦平三年正月奉命為靖逺大将軍率同衍禧郡王羅洛渾貝勒尼堪等征四川流冦三月抵西安遣尚書星訥等勦賊於邠州降宋大傑賀洪器齊勲張國棟等復遣都統都類勦賊於慶陽五月賊渠劉文炳康千總郭天星等迎拒擊之斬千總時賊渠賀珍二隻虎孫守法據漢中興安武大定髙如礪蔣登雷石國璽王可成周克德據徽縣階州大軍自西安進分兵奮擊降登雷國璽可成克德餘潰遁復所陷州縣陜西平十一月入蜀至南部偵賊張獻忠列營西充縣境令䕶軍統領鰲拜等分領八旗兵先發親統大軍星夜繼進詰旦抵西充獻忠悉衆拒戰我兵奮擊大破之斬獻忠於陣復分兵四出破賊營一百三十餘斬數萬級獲馬臝一萬二千二百有竒捷聞諭曰王等指授方畧克奏膚功獻忠伏誅四川平定深可嘉恱有功官兵察明議叙四年分兵征勦遵義䕫州茂州榮昌隆昌富順内江資陽等處斬偽王及廵撫總兵副將以下官千餘人兵丁無算獲馬臝萬二千四百餘川冦平五年正月凱還遣内大臣達爾漢諾延徃迎二月至京上御太和殿宴勞之三月睿親王以豪格徇隠隨征䕶軍㕘領希爾根冒功事又欲擢用罪人揚善之弟吉賽議罪削爵繫獄尋卒八年上親政念其枉復和碩肅親王爵立碑表之以其子富綬襲十三年九月追諡曰武再立碑紀功乾隆四十三年正月上追念肅親王忠勛命配享太廟其現襲之顯親王復封號曰肅八月命入祀盛京賢王祠豪格第四子富綬於順治八年二月襲封和碩親王改號曰顯尋預議政康熙八年十二月薨諡曰懿九年六月以富綬第四子丹臻襲封和碩顯親王三十五年二月從上征噶爾丹同副都統禪穆布統領正藍旗營四十一年五月薨諡曰密丹臻第六子衍璜襲乾隆元年二月總理鑲白旗覺羅學三十六年十二月薨諡曰謹三十七年以富綬孫輔國將軍拜察禮之子藴著襲藴著初於康熙四十七年封三等奉國將軍乾隆七年六月授内閣侍讀學士十年二月遷通政使十一月遷盛京户部侍郎十二年五月調兵部侍郎尋任鑲黄旗滿洲副都統九月授漕運總督十四年四月以受商人程志仁等餽遺又稱奉㫖嚴查鹽政吉慶私産狡詐乖張擬絞監候嗣恩釋二十年授鑲白旗漢軍副都統二十一年調右衛副都統二十三年授凉州將軍二十七年調綏逺城將軍二十八年攝歸化城都統事三十年授工部部尚書三十一年正月預議政尋充經筵講官二月管㑹同四譯館三十二年因工部派辦溝渠工程不公降二級調用三十七年襲封和碩顯親王五月授鑲藍旗滿洲都統三十八年總理鑲藍旗覺羅學四十三年正月命復肅武親王始封之號仍為肅親王是年四月薨諡曰勤以丹臻孫奉國將軍成信之子永錫襲永錫初於乾隆三十三年授三等侍衛四十三年襲封和碩肅親王四十九年六月總理正黄旗覺羅學欽定八旗通志卷一百二十七
