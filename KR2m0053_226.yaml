body:
  text: 欽定四庫全書欽定八旗通志卷二百十二人物志九十二忠義傳四滿洲八旗四十八年共一百九人順治九年至巴什泰巴什泰滿洲鑲黃旗人姓伊爾根覺羅氏圗魯什碩翁科洛巴圗魯次子也天聰八年襲父三等子世職任一等侍衛順治七年九年連遇恩詔超加為一等伯是年蒙古侍衛索尼謀逆忌巴什泰忠勇乃刺殺之世祖章皇帝特恩超授一等侯世職承襲詳見封爵表達海達海滿洲鑲黃旗人姓富察氏世居唐五包明安木地方順治九年以護軍參領隨征湖南擊賊將孫可望中傷歿於陳恩賜騎都尉兼一雲騎尉世職承襲詳見世職表吾庫吾庫滿洲鑲黃旗人姓寧古塔氏世居寧古塔地方初襲雲騎尉順治十一年隨寧海大將軍宜爾德征浙江敗偽英毅伯阮思偽總制陳六御等有功本年十二月隨定逺大將軍世子濟度征福建海賊鄭成功十四年遇賊船艘環列福州之髙齊境烏龍江吾庫率水師衝戰中傷歿恩賜三等輕車都尉世職承襲詳見世職表吳沙吳沙滿洲人原籍鑲紅旗改𨽻鑲黃旗姓鈕祜祿氏世居蘇克蘇滸河之安圗地方追號開國功臣納爾察第三子也任護軍𠫭領順治元年從大兵破流賊二年隨豫親王多鐸攻潼關與鼐格巴圗魯穆成格噶爾哈圗等趨賊于山上連敗之大兵下江南追明福王至蕪湖又同碩兑克髙淳縣俱有功五年從征南大將軍談泰征江西叛鎮金聲桓敗其馬步兵七萬金聲桓王得仁率衆二萬來犯濠塹吳沙偕護軍統領宜爾德等三戰皆敗之賊大蹙其餘護軍統領敦拜往定袁州也賊兵千餘依山為營吳沙同副都統吳喇禪擊敗其衆七年敘功授雲騎尉世職九年正月恩詔晉騎都尉十五年署前鋒統領從𠞰海賊攻厦門鄭成功列船于城堡嶴拒戰吳沙率頭隊前鋒奮擊敗之奪其一艘斬賊兵甚衆進逼厦門中傷陳亡康熙二年追加恩賜一等輕車都尉世職承襲詳見世職表色勒色勒滿洲鑲黃旗人姓瓜勒佳氏世居蘇完地方順治十四年以委署護軍校隨大兵征偽桂王時荆州偽總兵田國欽黃世桂等欲降而憚賊衆不敢發色勒隨護軍統領鄂諾等擊敗之遂降十五年進攻雲南偽侯李成蛟率四總兵迎戰于涼水井破之至雙河口偽晉王李定國率四侯二伯兵萬餘來犯力戰陳亡恩賜雲騎尉世職承襲詳見世職表猛格猛格滿洲鑲黃旗人順治十六年以馬甲隨征羅剎國賊六月賊拒戰江濵猛格率同十人奮奪賊船被創身歿恩賜雲騎尉世職承襲詳見世職表巴哈里巴哈里滿洲鑲黃旗人姓費莫氏世居馬佳地方初以驍騎校駐防江寧順治十六年于瓜州擊賊鄭成功力戰陳亡恩賜雲騎尉世職承襲詳見世職表庫爾庫德庫爾庫德滿洲鑲黃旗人姓兀扎喇氏世居薩哈爾察任護軍校順治十六年從征雲南擊賊李定國于陸噶歿于陳恩賜雲騎尉世職承襲詳見世職表額色額色滿洲鑲黃旗人駐防江寧順治十六年以佐領隨正藍旗協領胡伸布祿出征海冦鄭成功在瓜州力戰陳亡賞恤如例綏哈綏哈包衣鑲黃旗人姓完顔氏世居完顔地方委署護軍校初從護軍統領扯布副都統祖澤舜攻浙江舟山偽總制陳六御偽英毅伯阮思叛賊張洪德等率衆舟兵列海上拒戰時綏哈船在第二隊繼頭隊之後隨副都統永清根忒等擊敗之順治十六年隨平南將軍賴塔征福建海冦鄭成功十七年五月攻厦門陳亡恩賜雲騎尉世職承襲詳見世職表納海納海滿洲鑲黃旗人初任佐領順治十六年委署參領隨平南將軍賴塔等征福建海冦鄭成功十七年五月攻厦門力戰陳亡恩賜騎都尉世職承襲詳見世職表濟三濟三滿洲正黃旗人姓札庫塔氏初任佐領崇德六年從大兵圍錦州破明經略洪承疇兵順治元年從和碩豫親王多鐸破流賊平定河南至潼關賊據山與我兵戰濟三率所屬兵敗之收兵時隨都統恩格圗殿後賊突犯我軍者三皆敗之又同李率泰吳巴海等招撫餘黨定二州五縣二年從多羅貝勒博洛征浙江至杭州府招撫一府一州七縣尋擢副都統率兵駐防蘇州賊黃蜚等潛約城內賊夾擊我師濟三率夲翼兵同吳巴海進擊四戰俱敗之後敵兵復大至奮勇進擊遂中炮歿於陳恩賜騎都尉世職承襲詳見世職表珠轍珠轍滿洲正黃旗人姓舒穆祿氏世居庫爾喀地方揚古利額駙同族順治十年十二月以驍騎校隨寧南靖冦大將軍陳泰征湖廣十一年進擊木城賊中炮陳亡恩賜雲騎尉世職承襲詳見世職表費揚武費揚武滿洲正黃旗人姓瓜勒佳氏世居蘇完地方崇德七年以八品官從征明錦州松山北京山東等處並有功順治十一年從征廣東偽安西王李定國至電白縣賊將馬元董仲民王宏勛等來犯率衆拒敵力戰陳亡恩賜雲騎尉世職承襲詳見世職表宣爾格德宣爾格德滿洲正黃旗人姓查庫塔氏世居噶哈爾弼漢英厄地方初管佐領事崇德五年太宗文皇帝命薩穆曺海等征虎爾哈部落宣爾格德率九十人助之攻克鐸陳河撒津二城斬五十餘人順治元年授騎都尉世職擢工部理事官四年考績加一雲騎尉五年江西總兵金聲桓叛隨征南大將軍談泰往討賊率兵七萬來拒同大軍奮擊大敗之賊復連犯我正紅旗鑲黃旗汛地俱擊却之至信豐縣敗偽兖國公兵二萬于山嶺論功加二等輕車都尉七年九年三遇恩詔加至一等輕車都尉又一雲騎尉十二年從征偽秦王孫可望于岔路口對敵陳亡恩贈三等男世職承襲詳見封爵表博爾和圗博爾和圗滿洲正黃旗人姓瓜勒佳氏世居蘇完地方初為親軍順治十一年十二月隨定逺大將軍世子濟度征福建海賊鄭成功十二年兵至福建海賊逺揚十三年攻海澄縣博爾和圗越衆先登力戰歿于陳恩賜護軍校賞銀二百兩永貴永貴滿洲正黃旗人姓瓜勒佳氏世居蘇完地方初襲二等輕車都尉順治十一年十二月從定逺大將軍世子濟度征福建海冦鄭成功十四年正月至福州聞賊船二百餘隻泊髙齊境烏龍江永貴率本旗舟師擊敗之旋聞賊圍羅源縣率師往援力戰歿于陳恩賜一等輕車都尉世職承襲詳見世職表索丹索丹滿洲正黃旗人姓納喇氏世居哈達地方於順治十五年纍官至前鋒侍衛隨征雲南貴州于涼水井雙河口等處屢敗偽侯李成蛟賊李定國等兵積戰功加雲騎尉旋即創發身故恩賜騎都尉世職承襲詳見世職表屯代屯代滿洲正黃旗人姓查庫塔氏世居阿里村順治十五年隨安逺靖冦將軍多羅信郡王多尼征偽桂王于雲南十六年至騰越州遇敵戰歿恩賜雲騎尉世職承襲詳見世職表曹丹曹丹滿洲正黃旗人順治十五年以參領從安逺靖冦將軍多羅信郡王多尼征偽桂王擊敗偽侯李成蛟于貴州之涼水井又敗偽晉王李定國于雙河口十六年進征雲南奪取鐡索橋復擊李定國于磨盤山鏖戰負重傷尋歿于軍依陳亡例議敘恩賜雲騎尉世職承襲詳見世職表滿丕滿丕滿洲正黃旗人姓覺羅氏世居葉赫順治六年以佐領隨征山西叛鎮薑瓖敗蔣都司於沁源十七年從征福建時賊首鄭成功統兵十萬餘犯洪義壩連敗之進至海澄中炮陳亡恩賜雲騎尉世職承襲詳見世職表機達禮機達禮滿洲正黃旗人姓金氏世居朝鮮義州天聰元年從兄新達理來歸𨽻包衣初任護軍校順治十八年從安南將軍內大臣達素征福建海冦至厦門涉水逆戰敗之又登岸擊陸路賊兵力戰陳亡恩賜雲騎尉世職承襲詳見世職表代牧代牧滿洲正黃旗人順治十八年從安南將軍內大臣達素征福建海冦鄭成功戰歿恩賜雲騎尉世職承襲詳見世職表海住海住滿洲正白旗人姓孟氏世居葉赫地方任前鋒校順治九年七月隨定逺大將軍敬謹親王尼堪征湖南流冦張獻忠餘孽偽秦王孫可望十一月至衡州府力戰陳亡賞恤如例達爾布達爾布滿洲正白旗人任護軍參領順治九年七月從定逺大將軍敬謹親王尼堪征流賊張獻忠餘孽偽秦王孫可望十一月至湖南衡州府遇賊奮勇拒戰中炮歿于陳賞恤如例瑪祿瑪祿滿洲正白旗人姓納喇氏世居葉赫地方順治九年七月隨定逺大將軍和碩敬謹親王尼堪征湖南流賊張獻忠餘孽偽秦王孫可望十一月在衡州府遇敵力戰歿于陳恩賜騎都尉世職承襲詳見世職表法克法克滿洲正白旗人姓舒舒覺羅氏世居胡魯村順治九年十一月以間散隨定逺大將軍和碩敬謹親王尼堪征湖廣攻偽秦王孫可望于衡州陳亡恩賜雲騎尉世職承襲詳見世職表尼堪尼堪滿洲正白旗人姓張佳氏世居瓜勒察地方初以雲騎尉世職管參領事順治十二年隨征貴州在魯噶地方與偽晉王李定國戰被重傷卒賞銀七百兩傳納傳納滿洲正白旗人任驍騎校順治十二年隨寧海將軍宜爾德征浙江擊偽英毅伯阮思偽將陳六御等于舟山力戰陳亡恩賜雲騎尉世職承襲詳見世職表哈爾巴哈爾巴滿洲正白旗人姓伊爾根覺羅氏世居雅爾虎地方順治三年以護軍校從和碩豫親王多鐸往追騰機思同巴顔擊碩羅汗兵敗之五年從征南大將軍談泰征江西叛鎮金聲桓以雲梯攻九江府首先登城克之賜名巴圗魯授三等輕車都尉三遇恩詔晉一等輕車都尉十一年十二月從定逺大將軍世子濟度征福建海賊鄭成功統兵十萬餘奪我紅衣炮奮擊連敗之十三年攻海澄縣歿于陳加恩賜一雲騎尉世職承襲詳見世職表海魯渾海魯渾滿洲正白旗人姓佟佳氏世居馬察地方任護軍校順治十一年從寧海大將軍宜爾德征浙江舟山擊偽英毅伯阮思偽總制陳六御並敗之授雲騎尉從定逺大將軍世子濟度征福建海冦鄭成功十四年進取漳浦海島內銅山所值風作難渡賊衆突犯海魯渾力戰陳亡康熙二年議恤加恩賜騎都尉仍兼一雲騎尉世職承襲詳見世職表圖納圗納滿洲正白旗人姓托活洛氏世居虎爾哈地方順治元年隨和碩豫親王多鐸南征追流賊至潼關賊自山上迎戰同雅賴破之又從都統公圗賴攻賊于山上賊衆乘夜來犯我營復擊敗之二年同雅賴等攻克揚州府城五月隨多羅貝勒博洛趨杭州同鄂碩費揚古敗偽大學士馬士英兵于城外又同勞罕擊偽楊軍門于蘇州府生獲十二人攻松江府城不下用雲梯先登克之三年敘功授騎都尉任護軍統領七年九年遇恩詔加為二等輕車都尉十六年從安逺靖冦大將軍多羅信郡王多尼征偽桂王至雲南鎮南州敗偽將軍白文選兵于玉龍關二月十六日同前鋒統領白爾黑圗于磨盤山擊李定國伏兵陳亡賞葬銀八百兩齋三齋三滿洲正白旗人姓瓜勒佳氏世居訥殷地方初襲父嘉秦二等輕車都尉順治十六年從安南將軍內大臣達素征福建海賊鄭成功十七年至厦門蓋峙山賊列水師六百餘艘拒敵齋三力戰陳亡加恩賜一等輕車都尉世職承襲詳見世職表索博多索博多滿洲正白旗人姓富察氏世居蜚悠城地方初任佐領復以功授雲騎尉三遇恩詔加騎都尉順治十五年隨將軍巴三𠞰海冦至松江距崑山城二十里生擒賊將一人十六年海賊鄭成功親統其衆犯瓜州索博多奮勇力戰陳亡加恩賜一雲騎尉世職承襲詳見世職表達度護達度護滿洲正白旗人初任護軍校駐防湖廣荆州時瀘溪縣賊王嘉郭甲作亂同前鋒參領濟哈里等擊敗之順治十六年從安南將軍內大臣達素征福建海賊鄭成功十七年攻厦門同前鋒侍衛阿思哈等擊敗賊衆旋攻蓋峙山力戰陳亡恩賜雲騎尉世職承襲詳見世職表瑚星阿瑚星阿滿洲正白旗人姓他塔喇氏世居扎庫木地方順治十六年由前鋒校隨安南將軍內大臣達素都統索渾征福建海冦鄭成功十七年至厦門與前鋒參領噶布喇擊敗賊船六百艘旋至蓋峙山遇賊力戰陳亡恩賜雲騎尉世職承襲詳見世職表穆雅納穆