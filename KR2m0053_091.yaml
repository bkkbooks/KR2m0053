body:
  text: 欽定四庫全書欽定八旗通志卷七十七土田志十六土田蠲恤蠲賑銀米優免徭役蠲賑銀米天聰元年六月諭八旗大臣曰各旗所屬之人勤惰不齊貧富亦異夫務農積貯為足食之夲而有無相恤實弭盜之原爾諸大臣務加詳察若力不能耕種而無糧贍養者有兄弟則令與兄弟相依無兄弟則令殷實有糧者養之其為諸貝勒素知才能之人有不能耕種而無糧贍養者須詳察其情告知諸貝勒設法贍養毋俾失所時方大飢諸物騰貴大臣等以嚴懲盜賊入奏上惻然曰今嵗國中因年飢乏食致民不得已而行竊耳詔是嵗讞獄姑從寬典仍大發帑金散賑飢民順治二年題準八旗潦地每晌給米一石又題準邉外八旗蒙古地畝被災按飢民名口折給米銀許沿邊糴米毋令進邊又題準遊牧地方被災人户每名月給米一斗在張家口者給米古北口者給銀又題準王貝勒貝子公等府內人役潦地賑米照例支給其投充人帶來地不準給是年六月免近畿三百里內已圈地土二年分額賦三分之二六年定八旗每嵗倚恃賑給不務農桑嗣後停其踏勘如遇嵗荒王以下有俸官員以上每嵗照俸米倍給十年題準八旗貧人滿洲蒙古每佐領下給布六十匹棉花六百斤米一百石漢軍每佐領下給布三十匹棉花三百斤米五十石十一年覆準八旗潦地令即賑給到通漕米滿洲蒙古每佐領下給倉米二百石漢軍每佐領下給倉米一百石不論有無俸糧該旗員酌量散給又覆準看守南苑海户災地每晌給米一斛十二年詔八旗災地官員以上停其勘驗甲兵以下勘驗得實仍行賑賜十三年題準滿洲蒙古每佐領給米三百石漢軍每佐領給米一百石著該佐領領催親驗貧户給發其官員家人披甲者不準給又題準八旗被災地畝每晌給米一斛十四年諭發內帑銀十萬兩分給八旗兵丁及賑濟畿輔飢民十八年覆準八旗旱潦地畝遣各部侍郎以下該旗副都統以上大臣率户部司官筆帖式至被災地方該佐領領催指明勘驗若造册舛錯責在部員筆帖式冒指地畝責在領催其災傷輕重地勢髙下不詳加踏勘責在差往大臣事發照例查議是年三月諭户部曰八旗水淹田地每田二晌給米一斛近聞食用不敷殊堪憫念著每田一晌給米一斛應給之米候糧船抵通即於船上支給不必等候入倉既省搬運腳價之費又杜倉中插和粳粃且船隻早得回空其支兑時該管官務嚴加稽察不得疏忽滋弊擾害船丁康熙元年覆準八旗被水災地每晌給米二斛蝗雹災地每晌一斛二年十月給八旗被水淹沒地方米二百五十八萬石三年覆準賑給八旗災地米京通各倉挨給駐防在外者行文該地方官支給四年定八旗遇災地畝停遣都統等勘驗止令驍騎校領催等詳勘保結送部具題六年題準各旗報災不得過七月二十日七年題準各旗災地逺近不一難以遍驗準寬至八月初十日逾期不準九年題準八旗災地各該佐領具結報都統差旗員查勘赴部呈告部委官員驗實具題十一年覆準八旗旱災地每晌給米二斛本折各半其折色照時價支給十八年定各旗壯丁差徭糧草布匹永停輸納二十四年四月大學士會同户部遵旨議覆直𨽻順永保河等處圈撥地方應徴康熙二十一年地丁錢糧已經奉詔蠲免所有直𨽻八府康熙二十三年未完地丁錢糧應盡豁除其順永保河未經圈撥地方及真順廣大等處康熙二十四年地丁各項正賦俱免三分之一二十八年大學士等會議今嵗亢旱奉特旨軫念八旗護軍兵丁已增與一倍錢糧伊等莊屯人口足以養贍應將護軍兵丁莊屯人口不議外或窮寡婦及屯居倚田為生者又或家無披甲人止食一鐡匠之糧此等窮人應察明酌量賜恤奉旨兵丁雖已增添錢糧其窮困之人現在家口尚不能養何能養及莊屯人口可將此等人察明再議是年九月諭户部曰今嵗畿內亢㿩田畝鮮穫朕所深悉被災人民已加恩蠲賑八旗田莊俱在畿輔重地同屬災傷滿洲蒙古漢軍甲兵皆須養馬原資禾稼以供飼秣今榖既不登芻豆必致湧貴雖給有月餉銀米可以贍育家口貧乏兵丁經營草料恐滋困纍朕殊用軫念著詳察實係窮兵無力養馬者開列名數送部自本年十月起至來年秋成時止其馬匹所需錢糧應加給賜以昭朕一體愛恤兵民之意作何恩給爾部確議具奏十月户部議覆盛京遼陽興京屯莊所種田地因亢旱及霜隕米榖不收應免其納租移咨盛京户部詳計所需米榖發銀採買賑濟奉旨盛京地方今年亢旱米糧不收聞兵丁現在買米而食朕心深切軫念其令户部侍郎阿山乘驛速往與盛京各部大臣公同察明量其度嵗所需令內務府官往取莊上所有米糧散給俾得均沾實惠二十九年二月户部遵諭議奏八旗不能贍養之莊屯人口及窮官護軍撥什庫兵等之莊屯人口共二萬二千四百二十八人每人給米一石至於孑身寡婦退甲護軍撥什庫及無馬甲止給一兩錢糧者其家口莊屯人口共六萬三千七百一十九人每人亦給米一石得旨此等人口俱應給米糧可令速給之九月諭户部曰盛京兵丁全恃南畝耕穫及月給糧餉以為資生之計昨嵗盛京禾稼不登貧困兵丁艱於粒食曽以所有屯糧頒發賑救頃值軍興遣一等侍衛齊蘭布往調盛京兵丁隨發諭旨令無馬匹者給以官厰馬匹無行糧者給以莊屯糧米而官兵因踴躍遄往倉卒之際置辦一切軍裝遂支領明年二月分應給俸餉又預支五個月錢糧刻期進發比厄魯特噶爾丹敗遁盛京官兵雖未接戰而奮勇敵愾深可嘉恱今若將預支俸餉復行抵扣則窮乏兵丁必致生計艱窘朕心殊切憫惻所預給明年二月分應給俸餉及增給五個月錢糧著免抵扣仍照常支給俸餉以示朕愛養將士軫恤疾苦至意爾部即遵諭行三十三年七月諭户部曰盛京等處去嵗禾稼不登粒食艱窘聞今年收穫亦未豐稔米穀仍貴倘價值日漸翔湧則兵民生計恐致匱乏盛京等處地方關係緊要朕心時切軫念宜預加籌畫作何恩給俾各資生著遣部院堂上官一員前往自甲兵以及匠役當差人等有力不能糊口者將人户數目察明造册具奏爾部即遵諭行三十四年五月諭大學士伊桑阿侍郎朱都納學士宋柱户部郎中鄂竒曰副都統齊蘭布等自盛京還奏言今嵗盛京亢旱麥禾不成米價翔貴雖市有鬻粟而窮民力不能糴遂致重困夫盛京者根本之地令朱都納宋柱鄂竒等馳驛迅往會同盛京將軍副都統諸臣詳察果窮乏者於去嵗海運米二萬石中動支一萬石計會散給令可食至秋成此一萬石散給而有餘者平價糶之若此則兵民均有利益又諸地有告糧乏者遣城守尉部貟之賢能者併散給以賑之如一萬石不足散給發糶速具題請旨八月諭户部曰盛京地方比嵗荒歉粒食艱難朕心深切軫念原欲躬親巡省詢問疾苦情形遍敷恩澤今嵗停止東行而所在貧窶兵丁尚冀朕之臨幸是宜仍加賑恤用俾資生應作如何加恩爾部議奏又盛京兵丁錢糧兩季支領兵丁於未支領之際每致有稱貸逋負嗣後著按月支給至今嵗秋禾聞亦不甚豐茂恐生計漸艱困乏滋甚自今冬以至來秋應作何賑給不致失所共計需糧若干著盛京將軍副都統會同盛京户部侍郎查明詳加籌畫具奏爾部即遵諭行雍正五年十二月奉上諭聞得兵丁等於京通二倉支領米石時每因腳價之費賣米充用致有不善謀生之人並不計其米之接續輒以賤價糶賣及至缺乏又以貴價糴買此甚無益於兵丁者也現今旗下俱有官房或按八旗設立八局或按滿洲蒙古漢軍旗分設立二十四局將兵丁欲賣之米以時價買貯及其欲買則以平價賣給如此似於兵丁大有禆益至於應派何等人員管理需銀若干萬兩及所得利息作何利濟兵丁之處著管理旗務王大臣等公同詳議具奏六年二月管理旗務王大臣會議請八旗設立二十四處米局通州左右二翼設立二局京師每局給銀五千兩通州每局給銀八千兩京師各局用旗下官房如本旗無房以别旗相近者取用其通州各局則以入內務府之官房擇兩處近倉者用之京局揀選賢能官二員領催四名令其辦理通局則每翼委官四員領催八名其各局應用寫算之人臣等擇兵丁之能者派委其量米之人亦於旗人內雇用通州所有二局每翼挨旗各承查一年設立米局以後將他處私行糶賣者嚴行禁止每旗派參領一員稽查如有違禁買賣者從重治罪或被旁人拿獲將稽查之參領及都統等一併議處管米局官員如有作弊侵漁之處令該管大臣嚴參治罪如怠玩不以為事至於虧缺本銀將所虧銀兩著落賠補不能敷數該管大臣賠補俟及一年將用過銀兩及所得利銀奏請指示辦理至此項銀兩從何處支領俟命下之日臣等欽遵施行奉旨依議銀兩由户部領取乾隆元年二月和碩莊親王允祿等奏言據八旗文稱自設立米局以來有益旗人者半無益旗人者亦半蓋旗人不來買徒致局中積纍過多故臣等議裁米局蒙皇上睿鑒以米局裁後恐米價復昂於旗人生計有礙因降旨八旗尚應留幾座或三旗共留一座之處令臣等覆議臣查八旗現有之米局共草四座其局太多請將滿蒙漢三旗共留八座其餘俱行裁汰但米局既裁即不能如前堆積或應暫行照舊辦理俟一二年後再議裁留其現定三旗共立一座如何辦理之處請交八旗都統查辦再包衣三旗每旗米局各一座亦屬過多請裁去二座三旗共留一座至五城米局原以接濟民人請仍其舊奉旨依議是月又奏言草四座設立之時每座各領本銀五千兩續因清辦利息其本銀有全行交納者亦有未行全交者現在每旗既經裁汰二座各留一座應請仍照前例每座給銀五千兩辦理俟一二年後再將裁留之處核議此項銀兩即將現有之三座米局內銀米核計五千兩之數支給其餘銀兩交納部庫外將米散給兵丁即將伊等應得項下留倉抵補其三旗米局擇其寬敞者留之其管理米局之大臣交當月旗開單請旨各𣲖一員其現有之滿蒙漢三旗章京內各留一員其領催馬甲人等即交派出之大臣酌量去留再查現在米局尚賣細米但買者甚少而每月舂米多用人工妄費錢糧實屬無益亦應裁汰其米局事務仍照從前三年一次報銷奉旨此米局內既有滿蒙漢章京兵丁即著前派之大臣管理不必另派餘依議二年閏九月户部奏言八旗米局現無存貯米石足供糶賣計與放甲米之期尚隔半月有餘請每旗米局各撥粳稄米一二千石平價糶賣以濟兵食從之是年十月步軍統領鄂善等奏言八旗米局出糶米石或有一旗取具佐領圖記為憑然後出賣者或有一旗並無佐領圖記直行出糶者是八旗所辦不一且旗人買者少而姦商買者多與米價實無禆益奉旨此事交爾與管理八旗米局大臣等會議具奏十一月鄂善等又奏言米局之設原為兵丁等於關米後賤賣貴買恐失生計故特立此官局俾願賣者賣在官局有不能接續者仍在官局買用期於旗人大有禆益無如兵丁只圖省便所關米石若由倉賣至米局車腳浩繁是以就近賣與商人實得便益再官局之米俱係未舂碓房所售乃多細米關倉後來買米接濟者皆便於碓房買用此官局之米所以徒見堆積無濟於旗人欲令民人買之則又屬姦商射利者陸續買去私行囤積難於稽查此一向米局之情形也本年近京歉收米價昂貴蒙聖主厪念兵民生計特將倉中之米每局給與四千石恩意至為優渥乃姦商射利者猶衆臣等伏思兵丁所賴者錢糧每一馬甲所關米石僅可養七八口未免不足如伊等能自為謀存留養贍之外以其餘賣與小民糊口是兵民兩得其益如其不能自謀濫行出賣則雖有官局終歸射利姦商之手究與兵民無益臣等以為宜將八旗及包衣三旗現有米局全行裁除任其兵民賣買惟於關米之時將摟買之人嚴加查拿如此則姦商不得堆積米價亦可平減矣奉旨所議不準堆積嚴加禁止之處著依議其米局可否裁除之處王大臣提督八旗大臣等會議覆奏十二月和碩莊親王允祿等覆奏臣等思米局買賣米石皆係兵丁每季應關額數非比交五城所賣之米其關米兵丁憚運局腳價之費趂便賣與商人實難禁止縱使賣與官局而又有姦商買去堆積實與兵民無禆合照提督鄂善所奏將八旗包衣三旗現在所有九局俱行裁除其局內餘米交承辦大臣辦理交部奉旨依議三年三月奉上諭現在八旗復設米局原議於應行買米之時動支庫銀收買目今米價昂貴旗民糴買不免拮據必須及早平糶方有禆益朕意欲於每厰給發銀米各半令其即行開糶酌量辦理其應如何給發銀米之處著大學士議奏大學士鄂爾泰等奏言八旗米局今既照舊開設但現在米價昂貴若每厰給銀五千兩一齊收買恐轉致騰涌若給與米石平糶又恐一時糶盡仍不能平減時價是以令於應買米石時由庫支領銀兩收買今奉諭旨令每局給與銀米各半以資平糶實屬允當查原議給銀每局為數五千臣等酌議每局給銀二千五百兩稄米二千石令其照市肆數目量為降減糶賣以平市價其所領銀兩及賣米銀兩應如何陸續收買接濟之處應交管米局之大臣酌量辦理至所領米石遇有豐收之年作何還倉抵項亦俱令管米局大臣臨期妥辦具奏奉旨依議四月奉上諭八旗設立米局原以惠濟貧人從前請裁米局者係八旗大臣現在議覆米局者亦是八旗大臣從來朝廷立政有治人無治法必須辦理得宜方為有利無弊若米局既設而奉行不善有失初設之美意則雖屬良法終何益之有著傳諭八旗管理米局之大臣務期悉心籌畫隨時調劑毋得稍有疏忽致生弊端現今管米局之大臣有止派副都統者該都統亦當留心查察不可謂身無責成膜視公事七月户部議覆正藍旗蒙古恭領七十八奏米局剩米無多請照上年每局給稄米二千石平糶所賣錢文即令米局換銀交部以平錢價等語查上年內務府并八旗共計九局共發米一萬八千石本年添設共二十七局若仍照上年每局給米二千石須發米五萬四千石為數太多臣等酌量每局應各撥稄米一千石及時糶賣以濟民食所賣錢文即交米局換銀解部仍將價值報部查核奉旨依議速行九月奉上諭今年畿輔地方收成有歉薄之處而口外年榖順成頗稱豐稔昨已降旨準商人出口往來販運以資接濟今思京城米價現在不能平減來春青黃不接之時恐益加騰貴著派出户部司官赫赫那爾善內務府官員王常保王慎德於張家口古北口二處每處各二員擕帶內庫帑銀前往會同地方官將米豆雜糧等項照時價採買運送來京交八旗米局平糶使都門兵民得資外來之米以供饔飱而口外有餘之糧亦不致耗費於燒鍋等項無用之地實屬兩有禆益其應齎銀若干并作何挽運之法著該部速行詳悉妥議具奏户部議奏有商人范育馪自言口外買米係伊熟練之事張家口外現有伊之夥計人等斷無貽誤請令范育馪自行採買回京較之官買自然節省其派出司官四員應前往古北口喜峯口熱河一帶分頭採辦不拘何項米榖照市價購買陸續運京分給八旗米局臣伏查口外今嵗雖屬豐稔而彼地需用之外其所餘之多寡與市價之長落亦難預定且採買需用價值並運腳等費必須較之五城米價有減無增方可廣行採買運京平糶臣等酌議請先動內庫銀六萬兩交與派出之員齎赴彼處相度情形如果較京城平減可以多行收買即將應需銀數報明臣部臣部即奏請動撥派員送往以資採辦至如何挽運之處查邊口地方山路﨑嶇較內地挽運未免繁難或用附近莊頭車輛或雇覔駝隻車腳應令派往之員酌量如何便易即會同地方官辦理其腳價等費俟事竣日報部核奏至所買米糧陸續運送到京若在京無接辦之員恐交收遲滯車輛人夫不無羈候之虞應奏派內務府司官一員户部司官一員令其將張家口古北口等處運來米糧在京接領轉交八旗內務府米局並預令籌備堆積之處以便隨到隨收統俟到齊之日再將作何定價何時發糶之處請旨遵行奉旨依議速行十一月户部奏言派往古北口等處人員陸續運到米豆二千餘石據該員赫赫等呈稱先帶銀六萬兩採買米糧四萬六千餘石尚可買米一萬餘石加運腳尚不敷銀三萬兩請撥庫項派員送至以資及時採辦等語又據商人范育馪呈稱買得雜糧二萬六千石現今運交官局小米四千餘石請領銀三萬兩再行陸續儧運等語以上二處請領銀六萬兩仍於臣部庫貯銀兩照數給發統於事竣核銷惟是八旗兵丁仰給天庾均係計口授食按月關糧非如五城居民専賴糴食市米可比且查旗人平日多食老米民人平日多食雜糧今若將口外採買之糧全數交八旗米局糶賣微論現今大檔關放兵丁尚有應領甲米可資食用竊恐髙粱等項旗人尚未食慣來買者亦屬無幾若令外城居民赴內城糴糧未免旗民雜沓不無擁擠守候之虞臣等酌議所有黑豆一項應全數運交八旗官局糶賣以為飼喂馬駝之用其已經交局髙粱小米亦即存貯各米局在內城發糶外至嗣後運到雜糧俱交五城於城外關廂收貯以待來春平糶如此則厰座既多流通自廣於乏食貧民似有禆益再查五城向無貯米倉厫應飭各城御史尋覔間房暫行收貯俟明年青黃不接之時再行定價發糶奉旨這所議甚好著照所請行十二月鑲紅旗漢軍都統恆親王等議覆和親王所奏收糴事據稱嗣後每季開倉時若遇米價少貴請令八旗官局暫停收糴任從軍民私相買賣彼鋪户雖衆必不能將兵丁所賣米石盡行收買官局既不收糴則賣米者少而米價或不致昂貴矣如果米價既平令官局亦照市價每日數十石至百石陸續糴貯官局以為米價昂貴之備等語查每季開倉八旗及內務府兵丁應關之米計數十萬石除伊等存留食用外其糶賣者亦不過三分之一若官局暫停收買先儘鋪户糴買則射利姦商貪心無已勢必盡行收買堆積以待關倉之後髙擡時價維時欲平其價而官局並無積米何所藉以為平之之具且開倉之際米價低昂前後不一既先儘鋪户糴買俟米價平易再準官局糴買彼時不惟八旗及內務府各局一時齊買而姦商富户又必乘賤爭買米價必又復昂貴矣再查八旗米局每季所買不過八九萬石而兵丁所賣之米尚屬有餘其中雖有鋪户兼買亦未必致昂市價應請嗣後開倉時八旗內務府米局準其酌量多寡陸續糴買而鋪户民人雖準糴買不得過五十石之數倘有不法之徒堆積過數者嚴行查拿治罪至所稱每日只準出糶一二十石不許肆行糶賣等語查官局收買米石原以接濟兵民若一時遽行出糶一遇貴價則接濟無由米價勢必難平臣等現將上季所買之米陸續漸糶務期得接下季開倉之時不使間斷以備均平其肆行出糶之處實所當禁奉旨依議八年九月奉上諭盛京户部莊頭每年交納糧石預備陵寢祭祀各項公應外其餘交收入倉以為撥給各處匠役口糧之用今朕恭謁祖陵親詣盛京軫念各莊頭終嵗勤苦輸將無誤著將乾隆八年分應交倉糧一萬餘石加恩寬免其各處匠役口糧著於舊存倉糧內撥給再各莊尚有乾隆七年分未完米豆草束俱著該部查明一併豁免以示朕優恤旗莊至意十五年十一月奉上諭現在京師米價雖不甚貴然較之常價未免加增八旗設立米局收買米石原視市價之低昂以備平糶之用今米價既不無稍昂若再行收買恐目下未受平糶之益轉滋食貴之虞著再行停止如明春應需平糶之時令管理米局大臣酌量需用米數定議奏聞由倉支領是月奉上諭近來京師米價較上年冬月稍昂已降旨八旗米局停其收買但市價一時尚未平減時屆隆冬小民艱於糊口著將八旗米局現在收買存貯米石照時價酌減發糶如有不敷著於京倉支領五城由京倉各領米一千石照八旗定價一體設厰平糶交該御史等嚴行稽查毋令囤户乘機射利察出從重治罪該部即遵諭行二十一年正月奉上諭據署黑龍江將軍綽爾多奏齊齊哈爾黑龍江默爾根呼蘭等處八旗水師營驛站官兵人等各年未完糧石並本年借給口糧共十五萬五千餘石請分年完交等語齊齊哈爾等處連年被災歉收兵力自多拮據兼之調派隨征甚為出力朕心深為軫念著將齊齊哈爾黑龍江默爾根呼蘭等處節年未完借欠糧石並本年借給口糧十五萬五千餘石俱著加恩免其完納以示優恤該部即遵諭行二十七年四月奉上諭朕巡省江浙畿輔所過地方應徴賦額前已特頒恩旨分别蠲免但念各屬尚有節年民欠未完之項分年緩帶錢糧尚應按數徴收兹回鑾沿途體察民懷宜敷恩澤著再加恩將乾隆十二年至二十五年大興靜海龍門宣化懷安萬全西寧懷來蔚州四旗等十州縣廳未完地糧銀七千一百餘兩改折銀六千六百餘兩屯糧一萬六千餘石概豫豁免其自十九年至二十五年各屬因災緩帶地糧銀八萬六千七百餘兩改折銀九千一百餘兩屯糧一萬三千餘石並著加恩於本年起限再分作三年帶徴俾民力益紓得資耕耨用稱愛養黎元至意該部遵諭速行三十四年二月户部議盛京户部侍郎瓦爾達奏乾隆三十三年承德遼陽海城廣寧等四州縣夏秋被水其户部所屬被災官莊七十五座準其照例賑恤應交本年糧石鹽斤亦準其照數蠲免務使被災丁莊均沾實惠如有冒銷剋扣等弊即行恭究奉旨依議速行三十八年正月奉上諭各直省秋成普慶豐收即奉天各屬亦臻大有始和之布毋庸更沛恩膏惟念盛京各城旗人節欠餘地租銀自乾隆三十一年至三十七年計六萬餘兩原係該旗人等節年拖欠至此年豐力裕自應踴躍輸將苐積欠一時並徴恐不免稍形拮據著加恩分作六年帶徴俾完公更得從容而生計益臻饒裕以副朕體恤嘉惠至意該部即遵諭行四十三年八月奉上諭朕恭謁祖陵禮成現降旨將奉天所屬府州縣乾隆四十四年地丁正項錢糧通行蠲免所有各莊頭及旗地應納糧石草束等項自應一體加恩以敷渥澤著將盛京户部各莊頭本年應交倉糧一萬餘石免其交納所有各處匠役應需口糧著於舊存倉糧內撥給其盛京興京遼陽牛莊蓋州熊嶽復州金州岫巖鳳凰城開原錦州寧逺廣寧義州等十五處旗地本年應納米豆草束亦著免徴一半俾旗莊均沾嘉惠該部即遵諭行以上蠲賑銀米優免徭役天聰四年七月戊子上與諸貝勒議太祖庶福金所生之子阿拜塔拜巴布泰巴布海賴慕布又弟之子吳達海塔津拜尹圖鞏阿岱舒爾赫哈木加族叔吳霸席庫撒哈席庫機爾塔席庫又姑母瑚雷與姨母之子柏爾肯卜賴吳把泰吳齊勘分岱席爾談發庫又勒克舒子孫及顔布魯等俱免徭役八年正月癸己先是興祖真皇帝子六人是為六祖其子孫有官職者免其徭役無官職者不免至是上命分别優免之長祖德世庫之裔吳山卓爾會德倍羅托禮卓班凱穆布薩岱察翰勞岱扎齊喀拉漢岱塔漢岱內立鄂爾輝孫泰溫泰談布瓦爾喀布山席翰席圖伊圖伊爾門喜福吳丹除本身外仍各免三丁二祖劉闡之裔塔哈布塔哈納特思護塔爾布額布格席賴薩璧翰科爾坤葉思護富喀公阿除本身外仍各免三丁以朱滿無甲除本身外仍免二丁三祖索長阿之裔勞察布達禮恭格特鐘特阿克善握赫佛爾赫顧爾哈來穆布蘇拉圖他爾圖克德庫爾蟾黃代拜尹達禮寧淡雍科穆成格郭科嶽科格特布泰布爾山阿爾山邁圖巴漢昂阿喇巴哈塔額進祜邁龍什祿赫圖蘭圖祿外庫碩里藍泰喀喇孟特穆布岱布爾哈哈世覃富喀碩塞錫爾門格禮商鑑牛旺堅杜什薩穆哈圖喇塞郎邱索尼和尼鄂嶽要覽碩博會碩羅碩里喀哈思祜妥鈕邱蘭姚塔羅得格阿哈尼堪碩塔顔諸鄂謨諾富克他喇金塔喇穆臣圖陳達布篤禮鐸郎阿溫泰諸西伯圖克錫圖額伯圖克布圖朱孔格塔他布赫塞巴蘭色翰普爾噴海蘭雅布蘭馬星阿鄂星阿薩哈爾察布爾吉阿爾海巴布賴喀喇班布羅碩握赫羅薩乖達布克達庫阿度魯得奧哈花善貴和鐸瑙得索得吳班吳喇納克春莽吉圖除本身外仍各免三丁景祖翼皇帝之裔噶布喇伊賴脫穆多理額爾德額塞阿拉密阿塞阿濟賴習賴脫特托業穆濟穆成格何特莽嘉噶思哈席漢除本身外仍各免三丁以瑪爾漢瑪福塔二人無甲除本身外仍各免二丁五祖包朗阿之裔撒哈席庫機爾塔席庫吳霸席庫蘇達喇吳習談薩哈璉郭河齊蘇達喇之子穆成格機爾塔席庫之子穆成格除本身外仍各免三丁六祖寶實之裔瑪克達屯布祿代尹柱喀蒙愛阿爾布昂古蚌愛羅托理除本身外仍各免三丁凡與父同居者止免本身是月癸卯衆漢官赴管户部事貝勒德格類前訴稱我等向蒙聖恩每一備禦免丁八名止免其應輸官糧其餘雜差仍與各牛録下堡民三百十五丁一例應付竊思我等本身照官例贍養新人較民例更重所免八丁復與民例一體當差本身又任部務所有差徭從何措辦徭役似覺重科况生員外郎尚有免丁望上垂憐將所免八丁準照官例當差餘丁與民同例德格類奏聞上遣巴克什龍什希福察訊差役重科之由奏稱所訴皆虛惟前此買婦女配給新人衆皆一體出價未經給還衆遂藉以為辭耳上命將原價發還諭管禮部事貝勒薩哈亷曰此輩皆忘却得遼東時所受苦纍而為此誑言耳若不申諭使之豁然曉暢則此些少之費動為口實矣於是薩哈亷奉上命傳集衆官於內廷傳諭曰爾衆漢官所訴差徭繁重可謂直言無隱若非實不得已豈肯迫切陳訴然朕意亦不可隱而不言當從公論之朕意以為爾等苦纍較前亦少休息矣初爾等俱分𨽻滿洲大臣所有馬匹爾等不得乘而滿洲官乘之所有牲畜爾等不得用滿洲官強與價而買之凡官員病故其妻子皆給貝勒家為奴既為滿官所屬雖有腴田不獲耕種終嵗勤劬米榖仍不足食每至鬻僕典衣以自給是以爾等濳通明國書信往來幾蹈赤族之禍自楊文明被訐事覺以來朕姑宥爾等之罪將爾等拔出滿洲大臣之家另編為固山從此爾等得乘所有之馬得用所畜之牲妻子得免為奴擇腴地而耕之米榖得以自給當不似從前之典衣鬻僕矣爾等以小事來訴無不聼理所控雖虛亦不重處是皆朕格外加恩甚於待滿洲者也至於困苦之事間或有之然試取滿洲之功與爾等較之果孰難孰易乎滿洲竭力為國有經百戰者有經四五十戰者爾等曽經幾戰乎朕遇爾等稍有微勞即因而擢用加恩過於滿洲若與滿洲一例較傷論功以為升遷則爾今之為總兵者未知尚居何職也爾漢官皆謂滿洲官員雖嫻攻戰貪得茍安不知憂國急公我等戰攻雖不及滿洲而憂國急公則過之及覽爾等章奏豈皆憂國急公者耶爾等另編固山之時咸云拯我等於陷溺之中不受滿洲大臣欺凌雖肝腦塗地不能仰答上恩於萬一今覽爾等所訴之詞何頓忘前言乎爾等訴稱苦纍甚於滿洲盍向熟諳差役者問之若以滿洲相較輕則有之甚則未也古語有云有家者能養賢則取國而國可得有國者能養賢則取天下而天下可得此爾等所素知也是以朕及貝勒之家各量所有均出之以養上天畀我之民此即古聖人所謂養賢以及萬民之義也今爾等所輸不過大凌河數人贍養之資遂出怨言何其言行不相顧耶朕謂爾等博知典故雖非聖賢必有通達事理者由今觀之殆不然矣使爾等果能達於事理必謂朕及貝勒尚散財無吝我等隨衆輸納豈為苦耶他國之主皆斂民間財賦以供一己之用有餘方以養人我國賦稅朕與諸貝勒曽有所私用乎我國民力朕與諸貝勒曽有所私役乎取國賦而糜費於家役民力以修治其室不以國事為念止圖一己便安爾等自當諫朕今朕為國家朝夕憂勤荷天眷佑殊方君長頭目接踵來歸猶恐不能招致故解衣衣之推食食之然一切賞賚之需皆自八家均出何曽多取一物於爾等乎禮部亦有漢官試往問之八家每年出羊若干貂裘野獸酒米筵宴若干禮部官員豈不明告於爾乎至國中年嵗偶歉八家即均出米粟賑濟貧民朕與諸貝勒又散給各固山滿洲蒙古漢人贍養之其新附之蒙古漢人瓦爾喀呼爾哈卦爾察以及舊滿洲漢人蒙古等凡貧窮者則又給與妻室奴僕莊田牛馬衣食贍養何可勝數此皆爾等所明知者爾等果憂國急公其間縱有愚昧無知自言其苦者爾等猶當勸諭之且熟計經費所需有若干孰多孰寡何不細思之朕思我國雖貧爾等如此亦足矣欲令爾等與滿洲一例應差尚恐致纍今爾等反言苦纍過於滿洲滿漢官民雖有新舊皆我臣庶豈有厚薄之分乎滿洲出兵三丁抽一今令爾等亦與滿洲同例三丁抽一為兵爾等以為何如乎且滿洲之偏苦於漢人者不但三丁抽一也每牛録下守臺淘鐡及一切工匠牧馬人固山下聼事人役等所出不下三十人而當差者凡十有四家又每年耕種以給新附之人每牛録又出婦人三口又耀州燒鹽獵取禽獸供應朝鮮使臣驛馬修築邊境四城出征行獵後巡視邉墻守貝勒門及派兵防守巨流河即句驪河在在需人皆惟每牛録是問又每牛録設哨馬二匹遇有倒斃則均攤買補遇征瓦爾喀時又各喂馬二三匹從征每牛録復派護軍十名兵丁二三名往來馳使差回又令喂養所乘馬匹遇各國投誠人至撥給滿洲現住屯堡房屋令滿洲展界移居又分給糧榖令其舂米釀酒解納每年獵取獸肉分給新附之人又發帑金於朝鮮貿易布匹仍令滿洲負戴運送邊城滿洲又有窖氷之役每年接新附之呼爾哈於教場看守皮張運送薪水朝鮮蒙古使至駐瀋陽護軍章京各出一人運給水草若夏月至更有採給青草之役又每年採參併負往朝鮮貨賣每固山以一户駐英格地方巡緝蹤迹又以一户駐瀋陽渡口看守船隻此皆滿洲偏苦之處若不向爾等詳切言之爾等亦未必深信今滿漢均屬一國人民爾等竟不知差徭之少倍減於滿洲而滿洲差徭之多實踰爾等三十餘項也爾等試將朕言與爾等所言從公忖量果爾等偏苦乎抑滿洲偏苦乎有所欲言直切言之可也諭畢總兵官石廷柱馬光逺王世選及副將恭將遊擊各官奏曰控訴之事我等不知皆衆備禦所為遂將為首八人執之薩哈亷曰爾等既云不知當貝勒德格類遣布丹往問時何云知之又何為將苦纍之事備呈於部耶衆官對曰各備禦向我等不曽言差役重科但言欲訴幫丁八人之事故布丹來訊我等答曰知之至具呈之事乃龍什希福令我等將所有差徭備細開寫我等無知故爾開送奏聞薩哈亷具以奏上上曰諸臣既云不知所執備禦八員可並釋之倘治其罪後有苦纍亦更無敢言者矣各官及所執備禦皆勿令謝恩若謝恩則是欲罪而復赦之也各官復奏曰臣等雖未同訴然不能開諭於先復不能禁止於後此心懵然如醉如夢臣等罪無可逭伏念上及八家貝勒尚爾恤養外國珍賜無吝凡遇迎送宰牲設宴曽無虛日臣等更有何言臣等以瀕死之身蒙上生全另立固山得叨寵遇凡此衣食奴僕馬匹孰非上之恩賜果計功之大小頒行爵賞撥給人丁不特官爵非所敢望更有何物是臣等所應有者今臣等上等之家不下千丁下等之家不下二十餘丁似此豢養之恩雖肝腦塗地實難報稱萬一也是月遊擊祝邦成天聰三年十二月攻明薊州歿於陳之妻請免其家數丁差徭管吏部貝勒多爾衮以奏太宗諭曰此功臣之妻準免八丁以後凡功臣已故無兄弟子嗣承襲而其妻尚存者準照官職免其丁之半著為令崇德三年八月優免舉人丁役先是天聰三年諭曰朕今欲振興文教以昭作人之典諸貝勒及滿漢蒙古之家所有儒生俱令考試取中者則以丁償之遂命諸臣校録得二百人各免二丁差徭八年四月又合滿洲蒙古試之取中舉人十六名各免四丁至是復取中十名各授牛録章京品級免四丁其生員授護軍校品級已入部者免二丁未入部者免一丁九月定優免人丁例無世職固山額真承政準免十丁梅勒章京內大臣恭政準免八丁甲喇章京一等轄理事官準免五丁牛録章京二等轄副理事官準免四丁三等轄準免三丁多羅貝勒三等轄準免二丁以上優免徭役欽定八旗通志卷七十七
