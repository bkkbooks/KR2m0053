body:
  text: 欽定四庫全書欽定八旗通志卷一百四十一人物志二十一大臣傳七滿洲鑲黃旗七德齡哈達哈法海顧琮海清德明達福法海法海滿洲鑲黃旗人姓佟佳祖佟圖賴父佟國綱均有傳法海國綱次子也康熙三十三年進士改庶吉士命在南書房行走三十七年授檢討尚書房行走三十九年三月充日講起居注官四十四年五月遷侍讀學士五十五年十月擢廣東巡撫五十七年正月疏言沿海官員向有遊巡之例請輕裝減從由粵東至浙江江南等處查勘海道上特允所請四月疏言雷州府屬遂溪海康二縣近海洋田萬頃設堤岸包圍因年久未修致潮溢侵田海康人現任福建巡撫陳璸奏請修築敕臣查明臣查二縣東洋塘堤岸十七處水閘十三處向用土築今請改木石工免隨時修築之勞從之先是廣東巡鹽御史常保奏撤鹽政交督撫専管至是法海奏廣東鹽務緊要不可無専轄之員請仍遣御史會撫臣督徴下部議行八月上覽法海請安奏摺語意似病癲命九卿詢明議奏尋議法海患噎膈不勝封疆重寄請革職詔赴西寧軍營效力雍正元年召還命提督江南學政二年十一月授浙江巡撫時兵部侍郎牛鈕請酌裁驛馬變價充餉敕下各省督撫詳查議奏三年四月法海奏言浙省驛站從前酌定衝僻議留差馬百匹分隸嘉興秀水石門仁和錢塘五縣所屬西水皂林吳山浙江四驛無可再減惟查仁錢二縣各馬十八匹吳山浙江二驛各十二匹應差相同馬數稍有多寡應將仁錢二縣各撥三匹入吳山浙江兩驛縣驛各設十五匹其嘉秀二縣共一西水驛每縣各十五匹石門縣之皂林驛祇十匹應將嘉秀二縣各撥五匹入皂林驛則西水皂林各二十匹多寡適均至養馬募夫嵗需銀二千九百餘兩今以仁錢二縣每匹日支銀六分每夫日支銀三分適中之數為準一例支放實減充餉銀二百三十兩有竒下部議行六月疏言吳上大夫伍員唐武肅王錢鏐宋安濟公張夏實為浙江江海保障之神明紹興府知府湯紹恩創建三江閘有功其地請各加封修廟嵗春秋致祭得旨伍員封英衛公錢鏐封誠應武肅王張夏封靜安王湯紹恩封寧江伯八月諭曰法海操守頗好但為人性情偏執於外任不相宜著調來京是月署兵部尚書十二月授左都御史四年二月授兵部尚書充翻譯鄉試正考官七月命協理禮部事兼內務府總管十二月諭曰法海本無能之人聖祖仁皇帝加恩擢用嗣因獲罪革職發往軍營效力伊至西寧遂與允禵私相交結允禵貪縱不法之事法海並不勸阻朕即位後令允禵來京法海乃效力廢員未奉朕旨即潛至京師且諂附年羮堯稱為天下豪傑其所言之狂悖如此朕近命法海往西寧搬塞思黑家口伊竟不請訓旨冒昧前往及至保定又不候朕旨擅將塞思黑家口帶領來京強交內務府收管種種不法悖亂妄行著革職拿問五年閏三月王大臣等議照大不敬律擬斬決特旨從寬免死發往察罕托輝在水利處效力九年十二月命回京乾隆元年五月給副都統銜協理咸安宫事務二年五月卒海清子岱豪海清滿洲鑲黃旗人姓戴佳父噶祿順治五年襲其叔色赫騎都尉世職三遇恩詔加至三等輕車都尉十三年色赫之子塞勒年長改令襲職噶祿初由侍衛兼內務府主事纍遷內務府總管聖祖仁皇帝特授世管佐領卒後以海清襲管海清甫十餘嵗即任侍衛入直御前洊擢一等侍衛康熙三十四年因征噶爾丹增造制勝炮命海清於景山內董其事凡鑄炮四十有八工既竣敕八旗都統每旗選炮手一人各齎炮一由驛馳送大將軍費揚古軍中三十五年二月上親征噶爾丹海清從三月辛未由青城駐蹕滚諾爾遇雪從官及軍士服物由車運者及暮不至上命海清以駝載既至之內府帳房及食物柴炭分賜令棲息舉火海清尋復命奏言軍士因衣服沾濕寒冽殊甚且未得爨食者多得蒙頒結帳房食物柴炭衆皆歡躍如慶更生上又諭曰馬亦畏寒其瘦者猶可無恙肥者或致凍斃宜順風馳二三里許令人圍繞之使氣息漸溫則無妨矣可諭衆知之四十一年正月奉命同侍衛五格往西安校閲駐防騎射四十二年二月上南巡駐蹕山東長清縣界首鋪夜大風南村失火延燒民舍海清率侍衛等撲滅之翌日諭巡撫王國昌率司道等察火燬房屋賜銀散給命海清監視四十九年七月疾劇遣誠親王允祉同侍衛常夀視之諭曰海清自幼侍直內廷扈從巡幸甚為出力現今不及伊之人已得為副都統爾等往其家視疾即宣述朕旨授為副都統未幾卒賞銀一千兩賜祭葬如典禮諡曰果毅世宗憲皇帝御極贈一品大臣今上乾隆元年加贈太子太保長子來文襲管佐領洊擢副都統護軍統領江寧將軍見大臣表次子佛倫官至領侍衛內大臣第三子岱豪初任侍衛雍正五年三月授鑲白旗漢軍副都統兼佐領六月調鑲白旗蒙古副都統七月調正白旗滿洲副都統六年五月署正藍旗護軍統領兼署鑲白旗滿洲都統七年三月命靖邊大將軍傅爾丹征噶爾丹策凌以岱豪為參贊大臣八年十月罷參贊仍以副都統留軍營九年六月傅爾丹令前鋒統領定夀副都統蘇圖同岱豪率兵擊賊於庫列圖嶺斬賊四百餘越一日賊兵二萬從高阜來犯我營衆軍戰郤之傅爾丹令移營和通呼爾哈諾爾賊兵潛伏山谷伺我軍甫移突出列陳阻截忽大風驟起雨雹交加賊并力衝散我軍定夀蘇圖分路𠞰賊為賊所困副都統錫賚遣索倫兵援定夀索倫兵潰走賊勢猖甚晝夜環逼我營岱豪遂在營自縊死明年五月靖邉大將軍順承親王錫保以岱豪列陳亡册入奏部議豫祭葬祀昭忠祠授騎都尉世職子倭克精額襲今上乾隆二十年六月諭廷臣曰昔年和通呼爾哈諾爾進兵時岱豪等既不能殱賊立功又不能奮身拒敵束手受困徒以自盡了事夫果有捐軀之志何不死于矢石間為此婦人女子之所為乎對敵之際而領兵之人相率自盡豈不先折士氣似此怯懦無能之人損威失重即自行引決猶當將子孫議罰尚何功之可録乎所有和通呼爾哈諾爾等處用兵所得世職人員著軍機大臣及該部詳悉查明如有冒濫應行裁革者奏明請旨用副核實奬勵之道尋允廷臣議定夀蘇圖衝鋒陷陳矢盡力竭效忠自盡其世職準襲岱豪錫蜜賚永國覺羅海蘭赫達色在營中自行引決與奮身拒敵親冒矢石者不同並裁革世職德明德明滿洲鑲黃旗人姓卦爾察康熙三十七年由間散考授兵部督捕司司務三十九年遷光祿寺署正五十五年遷户部主事雍正元年晉本部員外郎三年晉郎中四年二月遷直𨽻布政使十一月擢山西巡撫賜孔雀翎五年六月遷刑部尚書充律例館總裁八年二月疏言外任官交代錢糧皆户部専司查核以杜侵虧惟驛道交盤錢糧動撥欵項雖案存户部而交盤向不報核因各省驛站供應夫馬糧料兵牌勘合均在兵部每年奏銷例由兵部核覆止將餘銀數知照户部不無兩相影射請嗣後各省奏銷仍在兵部核銷外其升轉離任交盤錢糧造具四柱清册送户部核對不符者即行駁查則錢糧得以歸一不肖官吏不得乘機舞弊又疏言臣部為刑名總滙設立南北監羈禁罪犯司獄係微員責成綦重今雖設滿漢司獄八員僅供收發管束誠難一日虛懸凡司獄缺出部選逺省人員到任需時以致員缺久懸請嗣後漢司獄缺出俱以人文到部之員掣補命下之日即可到任至升遷之法滿司獄舊經臣部題定三年無過即升惟漢司獄必俸滿方準應升請漢司獄亦照滿司獄例三年無過以應升之缺用俱下部議行五月調户部尚書十年六月卒遺疏入得旨德明老成練達謹慎和平簡任司農正資倚任忽聞溘逝深為憫惻著加太子少保銜應得恤典察例具奏尋賜祭葬如例諡端勤德齡子書山德齡滿洲鑲黃旗人姓鈕祜祿康熙五十四年進士改庶吉士散館授檢討五十九年充山東鄉試副考官初德齡曽祖鄂德以軍功授騎都尉世職三遇恩詔加至二等輕車都尉卒子莫洛渾襲卒子佛隆峩襲即德齡父六十年卒德齡降襲騎都尉雍正元年正月充廣西鄉試副考官四月充日講起居注官六月遷侍講十二月遷侍講學士充湖北鄉試正考官三年轉侍讀學士八年擢內閣學士十年二月充翻譯鄉試副考官四月兼公中佐領閏五月充經筵講官一統志館八旗通志館總裁七月命赴西安同左都御史史貽直辦理軍需十一月貽直署陕西巡撫德齡仍協理軍需尋授湖北巡撫十一年六月疏言州縣審理刑名案件各有限期逾限不結該管道府直𨽻州未揭請照徇庇例議處知府直𨽻州自審之案逾限亦將督催之道議處更有並非難結之案該管府州揑報緣由展限者臬司未參亦照徇庇例議處部議如所請九月疏報武昌等六府墾田千六百頃有竒下部知之十二年二月疏言京山縣多寶灣鎮俗悍並有隄工縣令鞭長莫及請將水利縣丞移駐並將宜都營外委千總撥防又言向例以財行求無祿人照有祿人減一等或照本律遞減二等不畫一嗣後以財行求請照例與受財人同科有祿人槩不減等無祿人各減一等倘承審官不依例擬斷將無祿人仍減二等者照故出人罪例議處再行求説事宜分首從為首者照例科斷為從者各照有祿無祿聽減一等倘所許財物立議封貯官吏雖未收受亦應向許財人追入官並將聽許官吏議處俱下部議行五月命赴肅州同署陜西總督劉於義辦理軍需八月赴西寧總理青海畨人事務十三年疏言哈爾垓圖所駐緑旗兵現遵旨撤回但噶斯一路為防護青海遊牧最要之區請撥青海蒙古兵二千防守再選精兵二百及緑旗兵百派員率赴得卜特爾伊克柴達木等要地更畨防駐詔允所請乾隆元年疏言西寧府屬之大通衛向設守偹稽查彈壓但山徑歧出外連青海內逼棋子卓子等山畨族聚處為蒙古逃人潛匿之藪不早清理久必益多請敕該督撫會同臣衙門派員赴該衛詳查如係有主令本主領回收管無主者立有家産準入籍聽該衛轄嗣後外來蒙古潛匿照失察逃人例定以處分疏下大學士陜甘總督查郎阿議以夷漢雜處不便不準入籍餘如所議行是年還京二年七月授鑲紅旗漢軍副都統八月仍充一統志館總裁三年授鑲紅旗護軍統領四年九月補盛京工部侍郎五年調工部右侍郎七年教習庶吉士充經筵講官八年上聞德齡母賢年八十御製詩賜之有治身勤四德教子朂三遷之句九年三月充翻譯鄉試副考官疏言翻譯應試童生多至千人順天府員役稽察難周請敕左右翼於臣等入場前一日各派參領一領催二馬甲十聽臣等分派巡察如有越號換卷代倩等弊即將該參領指參至場外傳遞蹤迹詭祕請令步軍統領派幹役密訪獲則重懲如所請行十年子書山任安徽廬鳯道德齡以母念孫情切乞調補京職特命書山來京授御史十一年德齡調吏部右侍郎十四年諭曰德齡不勝吏部侍郎之任著以內閣學士用十六年授盛京禮部侍郎十七年請終養回京三十五年卒書山初由內閣中書授侍讀遷御史乾隆六年轉刑科給事中巡視台灣八年轉吏科掌印給事中九年授安徽廬鳯道十年還京補山西道御史十一年二月轉工科給事中五月遷太僕寺卿十一月擢內閣學士十二年以巡台灣時派州縣輪值供應多設胥役為福建巡撫陳大受所劾詔革職留任十三年四月署倉場侍郎閏七月實授十五年調刑部右侍郎正黃旗滿洲副都統十八年充翻譯鄉試正考官二十年署工部左侍郎尋充經筵講官二十三年命以侍郎銜往哈喇沙爾辦理屯田二十四年七月多倫回人降參贊舒赫德請移往哈喇沙爾課以耕種交書山就近辦理允之十一月疏言自庫車以東哈喇沙爾以西玉古爾台至碩爾舒克台皆可引水溉田降衆五千餘分布安置臣同吐魯畨公素賚璊等相度妥辦又羅卜卓爾有伯克托克托屬三百餘户懇請屯田應給其弟阿卜都賚轄報聞二十六年還京署兵部侍郎仍兼副都統尋命駐防京口調錦州三十五年丁父憂三十六年襲騎都尉世職授福州副都統以病解任四十年卒姪文慧現襲世職哈達哈哈達哈滿洲鑲黃旗人黑龍江將軍傅爾丹次子康熙五十九年授藍翎侍衛六十一年改治儀正纍遷冠軍使兼公中佐領雍正九年遷頭等侍衛十年二月授蒙古鑲藍旗副都統閏五月調漢軍正藍旗副都統十一月遷蒙古正藍旗都統十一年命率兵千往駐洪郭爾鄂隆十二年授領侍衛內大臣留軍營十三年北路軍撤調赴呼倫貝爾駐防乾隆元年九月還京授勳舊佐領十二月襲其髙祖費英東所遺信勇公爵四年五月授漢軍鑲白旗都統十月調滿洲鑲紅旗都統五年授工部尚書議政大臣兼都統如故六年署步軍統領七年命為御前大臣尋晉太子少保十年兼鑾儀衛掌衛事十一年以後護誤班詔解領侍衛內大臣御前大臣十三年四月兼管光祿寺事五月因辦理孝賢皇后册寶不慎議革職得旨從寬留任十二月署兵部尚書及步軍統領十四年奏訪獲糾竊積匪及窩家七十餘名分别枷責發遣報聞十八年疏劾鄭家莊城守尉長春保侵扣兵餉官租鞫實論罪如律十九年命赴北路軍營授參贊大臣二十年二月將軍班第統大軍勦達瓦齊哈達哈奏以喀爾喀扎薩克台吉根敦等留防各汛並管理新舊烏梁海牧接收降衆而自統兵繼進六月達瓦齊就擒軍還阿睦爾撒納叛遁命哈達哈遣員往諭哈薩克汗阿布賚擒獻九月復授參贊大臣同定邊左副將軍達勒黨阿進𠞰十月請率索倫喀爾喀兵千餘先進上奬其奮勉尋詔定西將軍策楞由西路進𠞰以達勒黨阿為參贊哈達哈授定邊左副將軍留屯北路形勝地為聲援十二月奏言臣現駐兵布延圖派滿洲察哈爾兵各五百還駐烏里雅蘇台察哈爾兵二千駐扎卜堪其索倫喀爾喀和托輝特兵七千餘南自伊克斯淖爾北至烏哈爾和碩分布防守又布延圖科布多庫卜克爾齋拉罕距烏里雅蘇台各千餘里兵丁往領錢糧馬力易疲請將直𨽻山西所運米徑送各處酌加運價毋庸貯烏里雅蘇台上報可二十一年正月詔由阿爾台進兵四月達勒黨阿代策楞為將軍諭曰策楞等領兵擒拿阿睦爾撒納事事舛謬全無籌畫今西路専任達勒黨阿北路専任哈達哈伊二人尚屬勇往著即領兵前赴哈薩克務期擒獻時北路烏梁海叛遁諭查緝事竣馳會西路兵毋觀望五月申諭趣之六月特楞古特宰桑敦多克及固爾班和卓和克沁等各擕屬潛約烏梁海同遁途遇北路大軍詭乞降哈達哈察其詐斬敦多克擒固爾班和卓等盡戮賊衆諭奬其奮勇授領侍衛內大臣賜戴雙眼孔雀翎七月大軍至蒿哈薩拉克山偵哈薩克賊千餘由巴顔山西行擊敗之復遣副都統銜瑚爾起總管鄂博什侍衛竒徹布等往追斬百餘級獲馬二百餘是役也哈薩克汗阿布賚實親領隊至既敗乃遁去而阿睦爾撒納亦為達勒黨阿軍擊敗潛遁去兩路軍合九月遵旨撤兵閏九月上以哈達哈既遇阿布賚不勒兵窮追致脫走飭繳還前所賞雙眼翎不準戴用十月軍還在參贊大臣上行走十一月召來京二十二年正月命往駐科布多仍授參贊二月論疏縱阿布賚罪詔革公爵及領侍衛內大臣降補兵部侍郎留駐科布多三月還烏里雅蘇台辦事會副都統扎爾杭阿訐哈達哈前擒固爾班和卓時獲珍珠等物匿不奏事下參贊大臣舒赫德查訊屬虛諭曰此事明係扎爾杭阿與哈達哈素不相能為此傾陷之計朕辦理庶務一本至公豈肯以一空言而即治人之罪且哈達哈之罪並不在此伊身為將軍帶領大兵任意遲延以致阿布賚脫逃是其罪有應得扎爾杭阿不以此具奏而反以全無影響之事有意傾軋此風斷不可長著革職八月諭曰去嵗擒𠞰逆賊阿睦爾撒納進兵至哈薩克西路以達勒黨阿為將軍北路以哈達哈為將軍既未能擒獲阿睦爾撒納又致阿布賚脫逃本應治罪朕意伊等未必有心僨事不過為賊所愚路逺遲誤之所致是以從寬免其處分後經詢問自軍營回之侍衛官員則咸稱達勒黨阿追阿睦爾撒納時相距僅一二里逆賊不及馱載反遣人托為哈薩克言本欲擒獻阿睦爾撒納惟待其汗阿布賚至即便送來達勒黨阿墮其計中専候擒獻並不督兵追捕且下令不許衆兵前進直至逆賊捆載脫逃後方遣兵追逐哈達哈則路遇阿布賚既經後隊官兵呈報並不勒兵追捕至阿布賚逃去始尾追一次以塞其責衆奏僉同是達勒黨阿哈達哈之怠玩僨事顯然可見因將伊等公爵革去降秩示譴今訊問拿獲阿逆之姪達什策凌等供稱阿睦爾撒納於去嵗九月下旬自敗走地方潛回又據尼瑪供稱去嵗大兵追及阿睦爾撒納我催促進𠞰將軍等候阿布賚擒獻以致脫逃再阿布賚對面安營我兵亦並不迎敵直至逃去始行追逐旋即撒兵等語與侍衛等所奏吻合觀此則伊二人不能用朕奮勇之官兵且為逆賊等所輕視矣達勒黨阿哈達哈俱勳舊子孫受恩襲爵乃身為將軍専任討賊而因循觀望坐失事機若此實出情理之外且去嵗撤兵時伊等奏稱我兵距逆賊逃竄之地速行亦需月餘今於九月初撤兵自葉什勒樁集行五十餘日至巴顔鄂拉南之哈薩拉克地方今據達什策凌等所供阿睦爾撒納聞大兵既撤於九月下旬回至葉什勒樁集行二十餘日至巴顔鄂拉又十五日抵哈薩拉克東之額布根塔爾琿地方共五十餘日設果如伊等所奏有月餘程途則阿逆復回必須兩三月且逆賊必確知撤兵之信方敢起程果與我兵相去月餘往返探聽又必三四月矣乃我兵則於九月初撤回行五十餘日始至哈薩拉克而逆賊即自九月盡起程至額布根塔爾琿亦祗五十餘日何以如此之速耶則其被賊所欺愈為顯著觀阿逆今春即到額琳哈畢爾噶此即伊等因循推諉之眀證也况今嵗阿布賚遇我兵三十餘人一戰即降則去嵗若稍肯奮勉阿布賚早已投誠將逆賊擒獻矣又伊等擁兵觀望之明證也再兩路官兵會合後自應聨為一體乃伊等竟於相見之次日即分營行走第三日即議及撤兵有是理乎伊等即協力追𠞰尚未知獲賊與否况復自分彼此安能集事且如逆賊兔脫時伊等俱係將軍若肯親行豈不勝於參贊大臣乃伊二人並不前往止遣阿里衮一人領兵追逐不知將軍所司何事達勒黨阿哈達哈如此種種貽誤若不加罪譴則國家之賞罰何在本當以軍法從事但達勒黨阿本一糊塗無能之人為賊所愚而哈達哈每圖安逸遇事因循尚非出於有心且係勳舊子孫似此坐失機宜玷辱滿洲更何顔靦列班聨達勒黨阿哈達哈俱著革職發往熱河披甲效力二十三年十一月詔宥前罪授三等侍衛十二月率西安駐防兵千赴西路軍營二十四年正月搜捕沙喇斯瑪呼斯逸賊二月大軍𠞰回酋霍集占上以哈達哈及達勒黨阿厯練諭由巴里坤送馬至阿克蘇八月定邊右副將軍富德等大敗霍集占於阿爾楚爾及伊西洱庫爾淖爾哈達哈均在事有功詔授二等侍衛十月卒於軍營子哈寧阿官至都統以軍行失律賜自盡顧琮顧琮滿洲鑲黃旗人姓伊爾根覺羅祖顧八代禮部尚書贈太師諡文端有傳父顧儼厯官副都統顧琮由監生修算法議敘康熙六十一年授吏部員外郎雍正三年七月授户部郎中十二月遷監察御史四年五月巡視長蘆鹽政九月奏稱州縣於私鹽案每監斃人命請嗣後除大夥興販照例審結餘易結之案延至四月外一案監斃三人一年監斃三案者照司獄監斃例議處下部議從之十一月授坐糧廳八年遷太僕寺卿九年授霸州營田觀察使十一年正月協理直𨽻總河二月遷太常寺卿七月署直𨽻總督八月授直𨽻總河十二年四月奏報永定河口深通上流始得暢注入淀近因淤正議挑濬仰蒙天賜引河二十餘里顯著嘉祥諭曰朕因畿輔河渠關係重大時時軫念今於河臣籌議疏通之地仰蒙天賜引河自然開刷不勞民力順軌安流河神福佑羣生功用顯著應虔誠展祀以答靈貺十月疏言直𨽻向無額設囚糧多致飢斃請一體準設以廣皇仁得旨俞允十二月疏言直𨽻河道煩多廳員應改撥就近管轄再於要處酌增河員通永道屬增糧河通判一駐薊州管京東諸河儧薊運船清河道屬滹沱河經正定保定河間三府順德府同知難以防範撥歸正定府通判兼管束鹿縣有滹沱新工增主簿一瀦龍河滙滋河等水入白洋淀增管河通判一駐祁州蠡縣增縣丞一祁州增州同一分管本州及博野兩處民工大名道屬魏縣增縣丞一分防漳河順天府屬牤牛新河與永定河南岸咫尺撥歸永定道轄霸州係牤牛下口仍令清河道轄涿州以北房山等處山水小河並無隄防就近歸霸昌道兼理天津道屬三角淀長淀等河增通判一駐王慶坨武清縣增縣丞一東安縣增主簿一歸通判轄泊河通判所管清河縣運河二十里故城縣河道十六里撥河間府同知轄天津同知所管南皮縣運河撥歸通判管理靜海縣唐官屯千總所管運河堤岸錯入靜海青縣南皮滄州境內改分𨽻州縣管理其千總令督河兵淺夫毋庸裁汰至天津清河二道向無搶修物料請照永定通永二道例酌工程險易預採大名道無嵗修銀應於清河道庫撥用臣標左營崔黃汛右營西儀汛俱距河逺並無河務應改𨽻天津鎮標轄南運沿河一帶營汛非臣標所轄汛報稽遲應將天津鎮標安陵汛歸臣標轄並於永定北運河兵內選熟練樁掃者數名教習南運河淺夫歸唐官屯千總轄潮河上遊增外委把總一駐古北口白河上遊增外委把總一駐石塘路永定河上遊增外委把總一駐水關下部議行乾隆元年正月署江蘇巡撫六月奏海塘善後事宜一松江土塘自上海迤西連寶山縣境甚屬單弱其舊寶山一段更為頂衝宜加幫迅築一寶山對江墩急宜接築土塘現在塘形陡削者俱加高寬一寶山護城墟係民自築併入嵗修估培一塘岸壓占民田免額徴錢糧一塘路綿長請增海防道一駐松太適中地専管一通潮小港泥沙易積令道員以時修浚下九卿議行九月疏言常平倉榖例存七糶三從前糶價現未買補又被水偏災須賑若穀賤方買恐來嵗青黃不接無穀可糶請令各州縣遵新例於鄰近産穀州縣買補倘鄰近亦係歉收即委員赴江西湖廣採買下部議行十月丁父憂回旗二年三月協辦吏部尚書事七月永定河堤決命顧琮往同總督李衛等搶修八月署河道總督三年正月授朱藻為總河顧琮仍同辦理時畿輔西南諸水滙於東西兩淀淤墊漫溢為患顧琮奏設垈船撈泥並委三角淀通判清河同知司其事經大學士鄂爾泰並李衛朱藻等詳酌議行十月授顧琮河道總督五年四月疏陳青縣之興濟滄州之捷地兩減河善後事宜一兩減河均以岐口海河為歸宿連年河尾淤高不能驟達應疏尾閭均於李連賓家口會通直接岐口俾無阻塞一上半截堤逼近河身單薄可危應各就南北岸展築遙堤再擇堤身單薄險要處幫築坦坡即於河底取土開挖深寬一下半截堤宜相地勢截成拉沙壩使河水由此漫入以緩水勢兼肥地畝一兩處閘口俟河水歸槽設板下閉使下遊窪地涸出可種麥一多設涵洞減河水落時將兩岸積水放入掘開中間土埂流通歸海一壓占地已給價除糧將堤內灘地令民佃種收租作搶修費六年六月疏言河間縣縣丞跨管子牙河東西兩堤百二十里巡防維艱請將東岸堤歸駐河東之景和鎮巡檢兼管老漳等河亦就近歸杜林鎮巡檢兼管祁河通判改設於子牙河將青縣靜海子牙河主簿文安大城兩縣縣丞主簿霸州州判所管堤工均𨽻該通判其祁河通判原管堤工改𨽻清河同知俱議行八月題銷永定河修築銀諭曰前顧琮題報漫工疏內稱専管官並不加謹搶護及請開銷竟不著落各員分賠眀係有心徇庇此項銀俱著顧琮賠補尋裁直𨽻總河缺命回京候旨十二月授漕運總督七年十月奏漕務十條一嚴禁胥役掯勒並受兑辨兵刁索一各幫旗丁俱令長運不得仍前逐年僉換一江西湖廣等幫由長江至儀徴例不定限浙江幫在大江之南每藉風色遲延應咨督撫嚴催出境一各幫頭次過淮即委桑園遊擊儹行二次過淮糧道儹行通幫告竣臣循例督催北上一江南山東河道淺阻處預為挑挖一漕丁遇閘壩即停泊至兩省交界因辨兵不能越催更多逗遛委標員催儹毋許遲誤一黃河北至臺莊臨清與直𨽻交界處汛逺兵稀酌添浮汛接催一飭各閘啓閉得宜閘員不得托詞蓄水稽留一江廣幫船逺涉長江多帶木植護船至內河船重難行今酌定水大至臺莊南水小至揚州卸賣一漕船抵通卸完查飯米缺乏之幫將副丁應得餘米銀存三給七俾回空不致拮據上是之下部議行十二月奏獲劫鹽船匪徒並於安東山陽各汛逺處暫增浮汛六撥兵防察上嘉其留心經理十年六月疏請於貓兒窩以下馬莊集宿遷皂河以上曹家店各建石閘一束上遊之水不致直㵼無餘並將駱馬湖入運處改從皂河以上之䡐車頭地方建閘挑渠引水濟運又十字河之竹絡壩當開放後黃水湍激橫截運河糧船提溜頗難應於竹絡壩下之束黃壩迤東接堤堵截别開河頭接入舊有蘇家閘閘河閘南濬越河一導黃入運從之十一年閏三月署江南河道總督九月回本任十二年九月浙閩總督喀爾吉善劾浙江巡撫常安貪婪各欵命同大學士高斌往訊即授顧琮浙江巡撫嗣又命大學士訥親前往會審論如律十三年部議顧琮承審常安案不能按欵窮究擬革職奉旨從寬留任尋調河東總河十七年正月疏言運堤向無堡房兵夫巡防雨夜難以棲止有名無實請照黃河例每二里建堡房一共四百座撥司庫充公耗羡項興造每年酌給嵗修銀十八年四月同巡撫蔣炳合疏言陽武五堡民埝並十三堡大堤因雨沁黃並漲以致漫溢現在搶築斷流上遊進水地方亦趕築攔河土小壩又五堡外地勢極窪灘水滙聚急應疏通去路現於壩東開引渠灘水至此循民埝東去漫入灘地以分水勢奏入俱報聞十九年二月因江南總河任內浮費河工銀部議革職諭來京候旨十二月卒達福達福滿洲鑲黃旗人姓瓜爾佳一等超武公鰲拜之孫父納穆福襲二等公後鰲拜獲罪爵除康熙五十二年聖祖仁皇帝追念鰲拜功賜一等男以其從孫蘇赫襲蘇赫卒以達福襲雍正三年兼管佐領四年補護軍參領五年九月補護軍統領印務章京十一月授正藍旗滿洲副都統諭曰朕數十年來唯聞鰲拜僭妄無禮擅權作威之罪未深知伊功勳併子孫現在者何人昨引見達福方知又恭閲實録鰲拜有超衆功是以聖祖特恩賞給一等男世職皇考既恩免鰲拜之罪應賜還一等公爵即令達福承襲世襲罔替仍授為散秩大臣十二月授左翼前鋒統領六年授議政大臣七年三月大軍征準噶爾命達福為參贊大臣十二月準噶爾擾喀爾喀遊牧靖邊大將軍傅爾丹令前鋒統領定夀以兵護阿濟必濟卡倫令達福率兵二千駐庫卜克爾為應援九年六月傅爾丹探知準噶爾賊人在察罕哈達遊牧乘其不備襲之分兵三隊以達福偕定夀領第一隊夜擊戰纍日賊據山扼險遂移營和通呼爾哈諾爾晝夜力戰殺賊千餘賊益兵逼營我軍步設方營以退達福殿後賊三萬環攻之力戰殺賊千餘歿於陳賜祭葬如例贈騎都尉子岱屯襲一等公長孫德成襲騎都尉德成卒弟德生襲尋因岱屯卒德生襲公爵其騎都尉以弟德明襲乾隆四十五年十二月奉旨德生所襲公爵俟出缺時停襲仍豫一等男世襲罔替詳見鰲拜傳欽定八旗通志卷一百四十一
