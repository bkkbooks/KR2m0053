body:
  text: 欽定四庫全書欽定八旗通志卷一百二十二人物志二宗室王公傳一之中和碩頴毅親王薩哈璘徳多羅順承恭恵郡王勒克渾多羅謙襄郡王瓦克達輔國公瑪瞻和碩頴毅親王薩哈璘薩哈璘禮烈親王代善第三子天命十年十一月察哈爾林丹汗圍科爾沁薩哈璘以精騎五千援之林丹汗遁十一年四月討喀爾喀巴林部十月隨征喀爾喀扎嚕特部俱有功是年封貝勒天聰元年五月上親征明薩哈璘與貝勒徳格類等率精騎為前隊至錦州明兵遁薩哈璘邀殱之復與三貝勒莽古爾泰等率偏師徃衛塔山糧運有明兵二萬與我前軍八十人遇撃敗之獲其馬匹甲胄大兵進圍寧逺明總兵滿桂率宻雲兵出城東二里列陣我兵撃敗之追至城下薩哈璘同諸貝勒分兵勦殺大殪之薩哈璘被創戰彌厲三年十月上征明次波羅河屯大貝勒代善等宻請班師上不懌薩哈璘同貝勒岳託等力勸决進取遂由洪山口克遵化進逼明北京至徳勝門敗明兵之來援者十二月同諸貝勒畧通州焚其船克張家灣圍永平克香河縣又殱沙河驛䝉古兵之出奔山海闗者五百人四年正月克永平同貝勒濟爾哈朗奉命統兵萬駐守永平有李春旺者訛言將屠城以惑衆擒斬之别遣人招諭所属之臺頭營遷安灤州建昌營鞍山保皆降事具鄭獻親王傳三月遣軍敗明副將張宏謨兵四月明兵自樂亭撫寧來攻灤州薩哈璘率兵援撃之敵兵遁二貝勒阿敏來代乃擕所俘還五年七月初設六部命薩哈璘掌禮部事是月上征明與貝勒杜度豪格留守六年五月同濟爾哈朗等率右翼兵畧歸化城黄河諸路俘蒙古千餘復指授歸順䝉古諸貝勒牧地申約法十月師還七年六月詔問征明及察哈爾朝鮮三者何先奏言當寛朝鮮拒察哈爾而専征明察哈爾雖不加征如蟲食穴中勢必自盡不煩急圖至於明若我兵少緩一年彼守禦益固臣意謂當視今嵗秋成乘彼禾稼方熟即徃攻之因糧於敵為再進計量留兵防察哈爾上與諸貝勒先率精騎直入徃來襲擊略其所属即還再數遣人説祖大夀並命貝勒率精兵自一片石入山海闗則彼寧逺錦州為無用或仍從故道入斷北京四路度地形奪其糧餉充足之地據守勿歸乘機伺便二三年中大勲克集矣八月同諸貝勒略明山海闗師還上以不乘勝入内地責之八年二月同貝勒多爾衮徃迎明將尚可喜招撫廣鹿長山二島獲户口三千八百有竒五月從大兵征明薩哈璘同諸貝勒奉命由喀喇鄂博入邊攻克得勝保殱其兵明城守恭將李全自縊復進兵大同攻懐仁八月略代州偵崞縣城頽壊夜半徃襲㧞之王東板鎮二保居民皆潛遁復撃敗代州騎兵百歩兵三百追薄其城乃還率兵謁上於大同獻俘獲九年同多爾衮岳託豪格等統兵徃收察哈爾林丹汗子額哲途遇察哈爾汗之妻及台吉索諾木率所属千五百户來降進抵托里圖盡取額哲全部時岳託駐軍歸化城薩哈璘同多爾衮豪格進略山西各府縣仍自歸化城旋事詳睿忠親王傳崇徳元年正月薩哈璘有疾上臨視再三見其羸瘠愀然淚下五月薨年三十有三薩哈璘明達聰敏通曉滿漢䝉古文義掌禮部事賛謨猷上深嘉之及其薨不勝震悼入哭者四自辰至午乃還宫仍於庭中設幄座不御飲食至戌乃入輟朝三日祭時上親奠酒慟哭追封和碩頴親王讀冊畢復痛哭三奠諸王文武大臣皆泣下六月上御翔鳳閣偶假寐夢人請曰頴親王乞賜牛一如是者再寤以問希福等皆奏言皇上悼念甚切故有此夢上曰不然此夢最真切當别有故於是希福等檢閲㑹典凡親王薨初祭時例賜一牛頴親王初祭未用牛上命致祭如禮康熈十年五月追諡曰毅乾隆十九年九月入祀盛京賢王祠薩哈璘長子阿達禮初襲封多羅郡王崇徳三年二月從征喀爾喀至博碩堆偵扎薩克圖汗逺遁乃還五年正月同鄭親王濟爾哈朗等駐義州迎來歸蒙古多羅特部於杏山西五里臺敗明追兵賜御廐良馬一六年三月同鄭親王圍錦州降城中䝉古台吉諾木齊吳巴什等四月敗明援兵於錦州南山西岡六月敗明松山援兵九月圍松山明兵犯我鑲黄正紅正黄三旗營汛撃敗之斬級千四百餘七年二月克松山城俘明總督洪承疇廵撫邱民仰等事俱詳鄭獻親王傳七月叙功賜鞍馬一蟒緞九十尋命管禮部事預議政先是上御篤恭殿王以下衆官皆立侍九月王請更定儀制上御殿及賜宴親王以下皆跪迎上升陛方起駕興亦如之十月貝勒阿巴泰征明薊州同豫郡王多鐸屯寧逺牽制援兵八年八月世祖章皇帝嗣位以阿達禮與貝子碩託謀立睿親王伏誅爵除多羅順承恭恵郡王勒克徳渾子勒爾錦錫保孫勒克徳渾頴毅親王薩哈璘次子兄阿達禮原襲郡王爵順治元年以謀立睿親王伏誅勒克徳渾縁坐黜宗室順治元年十一月上念勒克徳渾時年㓜未與謀命復入宗室封多羅貝勒二年七月命為平南大將軍代豫親王多鐸駐江寧分兵平定閩浙是時明魯王朱以海竊據浙東稱監國其大學士馬士英等率兵渡錢塘江距杭州城十里立五營勒克徳渾遣官兵撃却之九月遣左翼副都統珠瑪喇等敗士英於餘杭遣右翼副都統和託等敗其總兵方國安於富陽斬其副將二恭將遊撃五及兩翼合營杭州三十里外敵來突復大敗之士英國安復渡江窺杭州守杭州副都統濟席哈總督張存仁總兵田雄等撃敗之溺死者無算時明唐王之總督何騰蛟合流賊一隻虎等竊據湖南州郡十一月勒克徳渾奉命同鎮國將軍鞏阿岱都統葉臣征之三年正月自江寧抵武昌偵知叛賊總兵馬進忠王進才等應騰蛟於長沙遣䕶軍統領博爾輝等率兵進撃賊千餘掠臨湘殱之至岳州進才等俱聞風遁降其副將黒運昌至石首聞賊渡江犯荆州遣尚書覺羅郎球等以偏師赴南岸伺賊渡江撃之大兵去荆州百里渡江夜疾馳詰旦抵荆州分兩翼直入賊營大破之斬獲甚衆薄暮郎球等亦奪賊船千餘以歸翌日遣奉國將軍巴布泰等分追賊兵於安逺南漳喜峯山闗王嶺㐮陽府等處勦殺殆盡大兵遂進彛陵流賊李自成弟孜偽磁侯田見秀偽義侯張耐偽武陽伯李佑偽太平伯吳汝義及偽將三十九人馬歩賊兵五千餘詣軍前降獲械畜無算㨗聞得詔優奬七月班師賜黄金百白金二千五年九月晉封多羅順承郡王尋同鄭親王濟爾哈朗都統阿濟格尼堪統八旗前鋒䕶軍兵拔湘潭擒騰蛟事具鄭獻親王傳移師征廣西賊渠趙亷犯全州王率前鋒統領席特庫等擊敗之獲馬四十餘聞賊渠曹槓子在道州據永安闗潜襲之破其營斬闗而入九月賊復聚黨萬餘㓂道州又擊敗之七年正月凱旋賜黄金五十白金五千五月預議政八年三月特命管理刑部事九年三月薨年三十有四賜祭𦵏如典禮康熈十年六月追諡恭恵第四子勒爾錦於順治九年八月襲多羅順承郡王康熈十一年八月掌宗人府事十二年十二月逆藩呉三桂反於雲南由貴州犯湖廣上命王為寧南靖㓂大將軍由湖廣進征十三年三月師次荆州時沅州常徳繼䧟賊兵自蜀道抵巴東㐮陽勢甚急遣都統鄂内率官兵馳守是月偽將劉之復陶繼智等率舟師犯彛陵夾江立五營遣䕶軍統領額司泰等水陸並擊賊大敗遁回宜都是月㐮陽總兵官楊來嘉副將洪福叛降三桂四月陶繼智復自宜都來犯敗之七月敗偽將軍吴應麒等十四年五月賊犯均州遣都統伊里布等屢敗之斬馘無算六月來嘉列陣山頂自山溝下斷我歸路我師分擊之陣斬三千餘級是月疏言逆賊逼彛陵兵衆船多又於虎渡口諸處轉運糧餉火噐宜急斷其運道請益戰艦備用上命安逺靖㓂大將軍貝勒尚善發岳州戰船四十艘赴荆州七月偽將軍張以誠王㑹等連來嘉犯南漳遣都統伊里布副都統根特㑹總督蔡毓榮兵援之旋報榖城失守復遣貝勒察尼前徃奮擊陣斬三千餘復榖城九月疏言湖廣逆賊堅立營壘掘壕塹設鹿角挨牌騎兵不能衝突須簡緑旗歩兵七千名造輕箭簾車二百礮車熟鐡礮各百量配兵丁駕進填其壕燒其鹿角挨牌用礮轟擊滿兵繼進則逆賊可滅詔如所請十二月復疏請撥禁旅進勦上以其遷延時日切責之十五年三月統兵自荆州渡江遣前鋒叅領卦爾察敗賊文村又敗之石首尋以擊賊大平街失利退荆州具疏請罪上復切責之九月奏副都統塞格勦賊鄖西復其城十七年十一月奏先後偽官投誠及房縣來歸之偽總兵何以敬等雖授劄示鼓舞而止食兵糧生計難給上以何以敬等慕化來歸悉予半俸十八年正月疏言新増兵萬二千請設隨征前後左右四營總兵官分轄從之遂渡江諸賊悉潰遁分路追勦松滋枝江宜都及澧州以次恢復守百里洲偽將軍洪福率舟師降二月大兵抵澧州進取常徳賊先期縱火焚廬舍戰艦遁偽按察使陳寳鑰等迎降又招撫偽總兵黄志功副將楊達武廵撫李益陽知縣張文明等又遣遊撃許嘉謨兵至青石渡賊首潘龍等迎敵我兵左右夾擊追至平峪鋪斬馘及落崖死者無算復衡山縣進攻歸州敗賊廖進忠於馬黄山賊向巴東遁追至西壤大敗之復歸州巴東十九年二月命進取重慶尋奏留將軍噶爾漢之兵防禦荆州七月王率兵赴重慶半途返具疏自劾請觧大將軍任徃沅州軍前効力上責令擕勅印率所属官兵還京十一月議以老師糜餉坐失事機削爵以其第三子勒爾貝襲多羅順承郡王二十一年薨以第四子揚竒襲二十六年薨以第七子充保襲三十七年薨以第五子布穆巴襲布穆巴於五十四年五月以罪削爵以勒爾錦之弟諾羅布襲諾羅布初於康熈三十七年授頭等侍衛三十八年二月擢鑲黄旗漢軍副都統十二月調鑲藍旗滿洲副都統四十年攝右翼前鋒統領四十二年授杭州將軍五十四年襲封多羅順承郡王五十六年二月薨年六十有八諡曰忠以其第四子錫保襲雍正三年三月掌宗人府事命在内廷行走四年五月諭曰順承郡王錫保才品優長乃國家實心効力之賢王今在内廷行走差遣甚多王之費用亦多著給親王俸䕶衛官員俱視親王例九月授鑲藍旗滿洲都統五年九月調正黄旗漢軍都統先是錫保狥庇貝勒延信罪状不奏又將不能騎馬之章京派拿延信以致遲悮十一月議削爵得㫖寛免其特恩賞給之親王俸及䕶衛官員俱撤回尋降任左宗正七年三月大軍征噶爾丹䇿凌命王署振武将軍印赴阿爾台軍營八年十一月奏八旗駐防官兵軍營効力兩年廵牧均已習練請仍留俟大兵凱旋不必如例三年更代詔如所請行初王奏喀爾喀㳺牧處措置妥協其三路副将軍各思効力已将禦賊守城之䇿商酌預偹九年七月上以錫保防範有方傳諭慎籌喀爾喀戰守機宜八月諭宗人府曰錫保自派徃軍營以來辦理事務克殫誠心勤勞宣力甚属可嘉王之祖多羅頴郡王亦係國家懋著勞績之賢王着将鍚保晉封順承親王九月命嚴守察罕廋爾十月疏言凖噶爾賊大䇿凌敦多卜小䇿凌敦多卜多爾濟丹巴等自華額爾齊斯至索勒畢烏拉克沁留兵四千應援率兵二萬六千犯科布多等處見我軍强盛不敢進遂抵克嚕倫令賊將海倫鄂勒錐等掠喀爾喀逰牧大䇿凌敦多卜兵向蘇克阿勒達呼屯劄小䇿凌敦多卜子曼濟掠鄂爾海西喇烏蘇臣令王丹津多爾濟等合兵邀擊至鄂登楚勒遣台吉巴海夜入大䇿凌敦多卜營擒其衆賊將衮楚克扎卜喀喇巴圖魯復率兵三千來禦我兵誘斬喀喇巴圖魯衮楚克扎卜傷遁擒殺數百大䇿凌敦多卜移營台什哩山曼濟兵亦敗歸俱由哈布塔克拜達克遁疏入詔嘉奨之十一月授靖逺大將軍先是上以軍前大臣甚少命錫保於軍營衆官中擇可勝副都統䕶軍統領之任者宻封陳奏十二年二月疏言新調吉林佐領委署前鋒翼領阿思哈黒龍江協領委署前鋒翼領布爾沙均属効力請賞給副都統職銜詔允之七月偵知賊赴額徳爾河源遣王丹津多爾濟等率兵邀之於奔博圖山嶺八月師至額爾徳尼昭遇賊兵鏖擊十餘次賊且戰且却日暮抵大山梁一面偪水戰益酣殺賊萬餘餘賊負傷奔獲械畜無算十一年四月奏言察罕廋爾當阿爾台諸路要道建城駐兵歴有年所嗣以薪芻不足移駐阿勒達爾托羅海去年又移駐烏里雅蘇台此外尚有額徳爾齊徳爾特爾唘塔宻爾地各寛濶然並在杭愛山陽與内地近至特斯等處僻在迤北若賊由南路來犯要撃堵禦呼應不靈並不便駐大兵今已於烏里雅蘇台山頂分建礮臺就近令滿洲蒙古兵駐劄且特斯台什哩各駐萬人賊不敢逼應請即於烏里雅蘇台内外植木中實土為城設倉庫明春以察罕廋爾所貯銀米軍装火藥等物陸續解運上從之七月議賊越克爾森齊老時不速發援失機罪罷大將軍任削爵以其長子熈良襲熈良初於雍正三年封輔國公尋授散秩大臣五年晉封鎮國公十年正月封世子三月署鑲紅旗漢軍都統十一年七月以父罪革世子十二月襲封多羅順承郡王乾隆元年二月管鑲藍旗覺羅學九年四月薨諡曰恪九月以其長子泰斐英阿襲十三年授宗人府右宗正十五年管鑲紅旗覺羅學十九年四月任左翼前鋒統領十月遷正黄旗漢軍都統二十一年六月轉左宗正七月薨諡曰恭以其第七子恒昌襲四十三年薨諡曰慎五十一年以其長子倫柱襲封多羅順承郡王多羅謙襄郡王瓦克達瓦克達禮烈親王代善第四子天聰元年五月上親征明寧逺明總兵滿桂拒戰大敗之追至寧逺城下殺其士卒甚衆瓦克達亦以力戰被創崇徳五年七月隨睿親王多爾衮圍明錦州見敵兵出樵者瓦克達率十餘人越前鋒統領布顔軍撃斬之六年八月我兵圍錦州明總督洪承疇集兵十三萬來援次松山大軍進撃之敵騎兵來奪我紅衣礮瓦克達同輔國公滿達海奮撃却敵㑹天雨接戰復敗之進撃承疇三營歩兵瓦克達驟馬而前敵衆辟易前鋒什長費雅思哈失馬瓦克達援之累騎出叅領哈寧阿被創墜馬瓦克達返戰入敵陣挈以歸順治元年四月隨睿親王入山海闗破流㓂李自成追勦至望都十月隨英親王阿濟格由邊外趨綏徳二年五月自成南遁瓦克達隨英親王阿濟格追至湖廣安陸府與䕶軍統領鰲拜進戰賊衆乘船竄瓦克達率師渉水登岸射殪賊衆無算取其船以濟大軍先是瓦克達以兄子阿達禮謀立睿親王事縁坐黜宗室至三年正月叙功授三等鎮國將軍復入宗室五月蘇尼特部騰機思等叛奔喀爾喀瓦克達隨豫親王多鐸徃討至圖拉河同吴拜領兵千擊之殺喀爾喀布顔圖台吉等十一人進至布爾哈圖山與貝子博和託合軍斬千餘級擒八百餘人獲駝馬牛羊無算又擊敗喀爾喀土謝圖汗碩雷汗兵十月凱還四年三月議叙封鎮國公五年十一月晉封多羅郡王十二月以喀爾喀擾我邊界命隨英親王阿濟格駐防大同適總兵姜瓖叛據大同附近郡邑應之王隨英親王圍渾源州六年三月睿親王統師拔渾源州令還京七月命同親王滿達海勦賊朔州寧武八月以巨礮克朔州城偽總兵姜之芬偽兵道孫承乾髙奎等遁王與輔國公薩弼撃敗其還戰兵移師攻寧武闗偽總兵劉偉偽兵道趙夢龍焚城西遁王追之時大同偽總兵楊振威通欵英親王軍斬瓖首以降偉夢龍等亦率偽將五十餘人兵五千四百餘降於軍平静樂縣及寧化所八角保諸寨十月詔滿達海還京以瓦克達為征西大將軍勦撫山西餘賊七年二月疏報平定潞安平陽澤州偽總兵申亥郭中傑魏閔各率餘黨歸順明大學士李建泰初已投誠至是復同姜瓖叛據太平縣我兵圍之二旬餘窮蹙出降上命誅建泰及其兄弟子姪籍家産入官三月疏報平陽府属三十六州縣皆平四月班師八年二月特加封號曰謙郡王三月命管理工部事六月隨駕幸南苑賜鞍馬一十月任議政九年正月醫人何大福出入部署招揺嚇詐事覺伏誅王坐徇縱罰鍰罷部任四月罷議政八月薨年四十七康熈十年五月追諡曰襄先是王征山西時嘗駐平陽府平陽民感其戢軍安民徳建祠致祭牓曰多羅謙郡王廟順治十年議政王等以瓦克達曽獲罪其爵不應承襲上憫其子留雍哈爾薩命食奉國將軍品級俸康熈六年四月哈爾薩等訴其父軍功輔政大臣鰲拜尚書馬爾賽為哈爾薩姻戚議封哈爾薩為鎮國公留雍鎮國將軍八年七月留雍以已不得與弟一例晉爵訴不平議政王奏留雍等俱夤縁得封應革哈爾薩鎮國公並原有之奉國將軍品級留雍應革鎮國將軍仍食奉國將軍品級俸得㫖哈爾薩奉國將軍品級俸乃世祖章皇帝恩給仍如舊二十一年五月哈爾薩復訴父爵係軍功所得例得襲宗人府以奏命襲封鎮國公並封其子海青為輔國公二十二年八月授宗人府左宗人二十四年九月遷右宗正二十五年十月諭責哈爾薩鑚營不安分罷右宗正任削鎮國公及海青輔國公爵以其兄留雍襲封鎮國公三十七年四月詔宗人府㑹同領侍衛内大臣察劾行走懶惰者削留雍爵停襲乾隆四十三年三月上追念謙襄郡王瓦克達著有功績現無承龍之人恩賞瓦克達子孫一等鎮國將軍爵世襲㒺替以留雍之曽孫洞福襲初留雍第三子原封三等輔國將軍台渾生忠端為閒散宗室洞福忠端第二子也至是襲封一等鎮國將軍四十九年十月授䕶軍統領輔國公瑪瞻瑪瞻禮烈親王代善第六子天聰九年五月大兵征明山西瑪瞻奉命隨貝勒多鐸從廣寧入明寧逺錦州界以牽制明兵俾毋援山西敗明兵於大凌河陣斬副將劉應選追奔及松山克一臺瑪瞻並在事有功崇徳元年封輔國公隨武英郡王阿濟格饒餘貝勒阿巴㤗徃征明至安州連克十二城九月凱還上行郊勞禮賜宴瑪瞻與賜金巵酒三年八月隨貝勒岳託征明由墻子嶺毁邊城入敗明總督吴阿衡兵連克臺保越京師至山東十一月卒於軍年二十七四年四月與兄岳託櫬俱至盛京上哭之慟遣貝子及大臣等奠酒賜銀二千两馬駝各一無嗣爵除欽定八旗通志卷一百二十二
