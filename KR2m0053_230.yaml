body:
  text: 人物志九十六忠義傳八滿洲八旗八至二十七年共七十五人康熙十七年五穆都五穆都滿洲鑲黃旗人姓富察氏世居葉赫地方順治十五年以護軍參領從信郡王多尼征貴州敗偽侯李成蛟等於涼水井至雙河口敗偽王李定國進至魯噶復大敗其衆追至磨盤山又敗之十八年授雲騎尉世職是年從征山東土賊于七至鋸齒崖敗賊俞三吕四竒等康熙十三年署前鋒統領同貝子富拉塔征逆藩耿精忠至浙江敗賊於黃水山至蒲塘敗偽總兵吳臣又敗偽將軍楊德十四年十月至上蒲塘偽將軍曾養性率賊三萬餘衆乘船二百餘艘水陸來戰五穆都同貝子富拉塔奮擊敗之復太平樂清青田三縣及大荆盤石二衛以力戰身被數創十七年七月三十日傷發卒十九年議功加世職恩賜雲騎尉併為騎都尉世職承襲詳見世職表賜祭葬豫諡立碑哈寧阿哈寧阿滿洲鑲黃旗人姓瓜勒佳氏初署護軍校康熙十五年隨揚威大將軍簡親王喇布征吳三桂于江西十六年十二月擊賊于吉安獐坑嶺十七年進勦老虎洞青龍嶺諸處所至克敵尋署護軍參領升護軍統領六月至永順縣擊偽將馬寶胡國柱等力戰中炮殁於陳賞恤如例覺羅莫洛渾覺羅莫洛渾滿洲鑲黃旗人祖拜三天聰中從大兵攻寧逺陳亡父顧納岱順治初從征南昌府中炮陳亡纍贈一等子並自有傳莫洛渾初襲父世職任事勤慎康熙十七年從征福建海賊進攻厦門禦敵衝鋒奮勇力戰陳亡加贈騎都尉授三等伯諡剛勇賜祭葬立碑墓道敦達禮敦達禮滿洲鑲黃旗人康熙十八年二月以七品官從安親王嶽樂征逆孽吳世璠至湖廣長沙府偽將軍吳國貴等來拒敦達禮身先士卒力戰陳亡二十五年恩賜雲騎尉世職承襲詳見世職表五塞五塞滿洲鑲黃旗人署護軍校康熙十三年隨內大臣阿密達往河南擒叛鎮蔡祿有功十八年隨順承郡王勒爾錦征湖廣至武岡州雙井鋪擊賊陳亡賞恤如例覺羅努赫勒覺羅努赫勒滿洲鑲黃旗人康熙十四年以一等侍衛從征逆藩吳三桂至湖廣十七年六月有偽將軍杜輝巴養元江義等率二萬餘賊乘船二百餘隻來犯栁林嘴努赫勒隨討逆將軍鄂內率舟師敗之杜輝等又率賊來犯君山仍以舟師連敗其衆進至湘隂距縣城五里敗賊衆二千餘十九年隨固山貝子章泰進征貴州擊吳逆偽將軍髙起龍等中傷陳亡恩賜雲騎尉世職承襲詳見世職表博洛博洛滿洲鑲黃旗人康熙十五年以一等侍衛兼護軍參領隨㝎逺平寇大將軍安親王嶽樂征逆藩吳三桂屢立戰功十九年從固山貝子章泰勦賊至平越府以本旗驍騎校二十餘人擊賊陳亡恩賜雲騎尉世職承襲詳見世職表董重民董重民包衣鑲黃旗人康熙十九年六月以四品官奉命往雲南招撫逆孽吳世璠世璠抗命不從重民切責之被害賜祭一次恩賜都司僉書廕子董髙巴五品官阿爾賽阿爾賽滿洲鑲黃旗人姓康儀爾氏世居費爾塔哈村地方康熙十四年從㝎逺平寇大將軍安親王嶽樂征逆藩吳三桂為左翼前鋒統領率領前鋒兵擊賊嘗十戰皆克之二十年正月擊賊于貴州平越府水西之蘆柴坑力戰歿于陳恩賜雲騎尉世職承襲詳見世職表尼馬達尼馬達滿洲鑲黃旗人駐防江寧官佐領部委參領于康熙二十四年四月初十日隨參謀大臣刑部尚書齋三在福州府拒敵陳亡賞恤如例鄂爾吉虎鄂爾吉虎滿洲鑲黃旗人由親軍委署護軍校隨順承郡王勒爾錦征逆藩吳三桂康熙二十年二月初八日至山西平陽府之髙槗擊賊中鎗歿賞恤如例登庫登庫滿洲鑲黃旗人姓鈕祜祿氏世居柏山哈達任驍騎校從征雲南江西有功康熙二十五年從征廣東至韶州府東山遇賊戰亡賞恤如例古魯錫古魯錫滿洲正黃旗人姓巴嶽特氏世居蒙古他拉西拉穆蘭地方任護軍參領康熙十三年隨奉命大將軍康親王傑書征逆藩耿精忠十七年閏三月扺漳州與海賊偽將軍劉國軒力戰死之恩賜雲騎尉世職承襲詳見世職表噶爾都噶爾都滿洲正黃旗人姓西克特禮氏世居松阿禮烏拉之庫爾喀和羅懇布祿村地方襲父賈能阿一等輕車都尉又一雲騎尉康熙十四年噶爾都從征陕西擊叛賊王輔臣子王繼正敗之十七年從征南將軍穆占往湖廣征逆藩吳三桂至沿山嶺賊將馬寶等率三萬餘衆來戰噶爾都力戰陳亡恩賜三等男世職承襲詳見封爵表巴圖巴圖滿洲正黃旗人姓他塔喇氏其先係察哈爾蒙古襲父索寧三等輕車都尉職隨貝勒尚善征逆藩吳三桂康熙十七年在湖廣洞庭湖擊偽帥杜輝巴養元江義等歿于陳恩賜二等輕車都尉世職承襲詳見世職表黑色黑色滿洲正黃旗人任一等輕車都尉康熙十七年隨將軍貝勒尚善征逆藩吳三桂至湖廣長沙府陳亡賞恤如例傅岱傅岱滿洲正黃旗人姓舒舒覺羅氏世居烏英額地方康熙十三年以驍騎校從征逆藩吳三桂至陕西隨振武將軍佛尼勒敗賊于滴水涯進次平涼賊三千餘衆斷路立寨復擊敗之尋從征四川賊將石存禮黑邦俊楊天保徐宗炳等率猓猓七千出棧道益門鎮立七營于西山傅岱隨大兵攻破之又敗賊衆四千于陽山池又敗益門鎮賊兵于黃兒山十七年隨討逆將軍鄂內湖廣總督蔡育榮至嶽州賊將杜輝巴養元江義等率船二百艘賊二萬衆由湖庭湖至栁林嘴來犯傅岱隨大兵以舟師力戰陳亡恩賜雲騎尉世職承襲詳見世職表海什尼海什尼滿洲正黃旗人康熙十三年以委署護軍校隨奉命大將軍康親王傑書征逆藩耿精忠至浙江破賊帥王宗仁于諸暨河岸又敗偽都督於義烏又敗偽總兵于臨善村又隨平南將軍賴達敗偽將軍李廷貴于衢州府北原口破其四營又敗偽林總兵于大溪灘十五年隨賴塔破海冦于小門山鎮風嶺諸處十六年進擊偽總督興眀伯趙得盛偽將軍何猷等于太平山破其十六營柏木山賊衆來援敗之時賊勢甚盛海什尼于四騎前鋒中首先進擊奮勇力戰追破賊于城下十八年福建泉州府被圍隨賴塔往援阻洛陽槗奪其稿泉州之圍遂解海什尼亦受傷陳亡恩賜騎都尉世職承襲詳見世職表觀音保觀音保滿洲正黃旗人康熙十八年以從征福建海冦鄭成功於侯官縣戰歿恩賜雲騎尉世職承襲詳見世職表邁圖邁圖滿洲正黃旗人姓瓜勒佳氏世居蘇完地方康熙十三年征逆藩耿精忠以署驍騎校隨㝎國將軍希爾根至江西南昌總兵官楊富叛隨將軍執之于省城又隨希爾根及平冦將軍哈爾哈齊等敗偽都督易天錫於建昌易天錫自建昌趨撫州復追敗之又隨希爾根敗賊於塘阜及宜黃十四年四月隨㝎逺平寇大將軍安親王嶽樂擊耿逆偽將軍邵連登於長興連破之復建昌乘勝攻新城並有功乃隨副都統額赫納等駐守建昌十二月賊首李茂珠等率賊萬餘列陳於城南之鐘鼓山𣣔攻城邁圖隨額赫納等率衆出城奮擊敗之追殺數百里十五年九月隨額赫納敗賊於芝坪時以署參領第一隊前進三敗賊於府城之北關斬偽副將楊六曾國珍偽守備朱世龍趙虎錢松夏椿許大詔等十七年隨江寧將軍額椘進廣西征逆藩吳三桂敗偽將軍吳世琮於藤縣二十年隨征南大將軍賴塔征逆孽吳世璠兩敗賊於石門坎進至雲南城下力戰陳亡恩賜雲騎尉世職承襲詳見世職表彰保住彰保住滿洲正黃旗人姓薩克達氏世居寧古塔地方康熙十五年以七品官從征逆藩吳三桂至湖廣破賊萬餘于攸縣賊收衆復戰又敗之十六年與賊戰于永興城下二十年至雲南破賊並有功旋從都統希佛等追偽將軍馬寶巴養元于馬木山力戰陳亡恩賜雲騎尉世職承襲詳見世職表噶思海噶思海滿洲正白旗人姓瓜勒佳氏世居虎爾哈地方任騎都尉兼一雲騎尉順治十一年從寧海大將軍宜爾德征偽魯王至浙江舟山擊偽總兵陳六御偽英毅伯阮思等于海上同委署護軍統領尼雅達等敗其衆獲船隻以功加世職為三等輕車都尉十四年從㝎逺大將軍簡親王濟度征福建海冦鄭成功破賊船六百餘于厦門康熙十六年隨將軍穆占征逆藩吳三桂至湖廣與偽將軍馬寶胡國柱等戰於永興陳亡弟之子富海襲職二十五年敘噶思海功追加為二等輕車都尉世職承襲詳見世職表尚志立尚志立包衣滿洲正白旗人世居瀋陽地方國初來歸任逰擊康熙十三年從征逆藩吳三桂至湖廣十七年隨總督蔡育榮擊賊帥杜輝巴養元等于洞庭湖力戰陳亡恩賜雲騎尉世職承襲詳見世職表巴查爾巴查爾滿洲正白旗人姓博爾濟錦氏世居克祿倫地方康熙十七年以三等男隨征南將軍穆占征逆藩吳三桂至湖廣永興縣擊偽將軍胡國柱馬寶等力戰陳亡賞恤如例尼麻喇尼麻喇滿洲正白旗人任護軍校康熙十七年從征福建攻海冦于厦門力戰陳亡恩賜雲騎尉世職承襲詳見世職表瓦濟馬瓦濟馬滿洲正白旗人姓瓜勒佳氏世居雅爾瑚地方任護軍校康熙十七年從征逆藩吳三桂至湖廣偽將軍吳應麒廖進忠馬寶等率衆七萬據嶽州隨討逆將軍鄂內擊賊陳亡恩賜雲騎尉世職承襲詳見世職表彥拜彥拜包衣滿洲正白旗人姓瓜勒佳氏世居烏喇地方康熙十三年以六品官委署護軍校從征逆藩耿精忠至浙江賊帥王宗仁率衆二千餘拒于諸暨河岸彥拜隨副都統馬哈達敗之至義烏敗偽龔都督等于山坑嶺偽都督周烈偽總兵桑眀等自衢州府蕉園率衆二萬餘來戰彥拜隨平南將軍賴塔敗之于紅槗又敗偽將軍馬九玉等十七年敗海冦偽總督徐堯于烏龍江之小門山鎮又敗賊于鎮風山破偽總督趙得勝于太平山敗其二十餘營又敗偽將軍何猷徐堯吳順等于泉州克其城旋追逆賊于祖頭山力戰陳亡恩賜雲騎尉世職承襲詳見世職表倭詩倭詩滿洲正白旗人姓托活洛氏世居虎爾哈地方康熙十七年由七品官從討逆將軍鄂內征逆藩吳三桂至湖廣洞庭湖遇賊將杜輝等力戰陳亡恩賜雲騎尉世職承襲詳見世職表色克圖色克圖滿洲正白旗人姓納喇氏世居哈達任七品官康熙十七年從征逆藩吳三桂至廣東遇偽將馬䧸董仲民王宏勳等率衆拒敵戰歿於陳賞恤如例瓦爾達瓦爾達滿洲正白旗人姓湯務氏世居哈達地方康熙十四年以委署護軍校從征逆藩耿精忠三月至江西敗偽都督易天錫於建昌府又於千金坡敗偽總兵楊三李茂珠等至會浦擊偽總兵朱一典尋抵新昌擊偽帥算國棟兵連戰皆捷五月隨㝎南將軍希爾根敗偽將軍邵連登於建昌府之長興十五年二月隨安親王嶽樂至萍鄉破偽將軍夏國相李良棟等於來龍山十八年至長沙府用雲梯攻城同黑圖先登被傷而歿恩賜騎都尉世職承襲詳見世職表西特庫西特庫滿洲正白旗人姓瓜勒佳氏世居蘇完地方康熙十三年以委署佐領從征逆藩耿精忠至浙江敗其偽千總兵又隨平南將軍賴塔敗偽都督周烈于衢州十二月偽總兵桑眀等又犯衢州復敗之於蕉園河岸十四年敗偽將馬九玉于繆村十五年從賴塔進攻福建破偽總兵閔可孝守備趙申等于夏口海寇鄭錦遣偽帥許耀聚衆三萬于小門山又隨賴塔進擊敗之又敗之于真鳯山十八年海冦偽將軍劉國軒統衆萬餘來犯海澄力戰陳亡恩賜雲騎尉世職承襲詳見世職表阿蘭阿蘭滿洲正白旗人任前鋒校康熙十八年隨征南將軍穆占征湖廣至永興沿山嶺與吳逆偽將胡國柱等力戰殁于陳恩賜雲騎尉世職承襲詳見世職表費雅達費雅達包衣正白旗人姓馬氏世居盛京任總兵官初隨將軍王進寶征漢中有功後從將軍趙良棟由雲南至四川康熙十八年九月抵永寧衛遇逆賊夏國相吳國柱等率兵拒戰身被重傷遂亡于陳其隨丁四十名俱死焉特加太子少保左都督諡