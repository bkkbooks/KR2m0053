body:
  text: 欽定四庫全書欽定八旗通志卷一百二十藝文志謹案儒林列傳始自馬遷所錄皆傳經之士也范蔚宗作後漢書増立文苑一傳於是訓詁之學與詞賦之學歧為兩家諸史相沿雖稱名互異而大㫖不殊元托克托等案托克托原作脱脱今改正作宋史又於儒林之外増立道學一傳而道學之中又分新安金谿之兩宗於是門户益堅朋黨競作而是非囂然蠭起矣沿及明季東林復社之禍蔓延遂及於宗社殷鑒不逺可不愼乎我世祖章皇帝定鼎中原撫有函夏朝政修於上而士習正於下羲璘照耀海宇澄明邪説詖行漸以澌滅我聖祖仁皇帝表章經籍培植儒風正學昌明炳焉争光於三代我世宗憲皇帝肅振紀綱芟除蕭艾邪偽之徒如屈大均吕留良輩並示顯戮於身後以正人心我皇上聖學髙深鑒周萬象凡古今之學術無一不辨其純駁古今之撰述無一不究其得失聖諭煌煌釐正文體者至再至三而御製詩文品隲四庫諸書者尤深以聚徒講學為前代致亂之本斷非盛世所宜有是以百餘年來天下之學術翕然一歸於正天下之撰述粹然一返於醇所謂上行下效騐如影響者也况乎八旗人士風尚原淳又加以聖朝之教育故能以篤實之心研乎學問以雄直之氣發為文章雖所造深淺不同而均不博講壇虚偽之名不涉詩社浮華之習凡所著述具有古人之典型雖天性敦樸不屑屑與文士争名而子孫藏於家刋刻行於世傳寫於親戚朋友之手者班班具在可以指名而數也舊志規仿前史立有文苑儒林二傳然紀載寥寥較以今日之見聞殊多疎畧且分𨽻不根於國史甄别未禀於睿裁率爾區分未足傳信又從輿記之例立藝文一門篇章寥寥挂一漏萬尤未足盡其所長均難依據今以四庫所著録存目為主而益以通行之刋本與諸家之蔵本以經史子集分𨽻每書各敘其大凡用崇文總目例案書目觧題始於劉歆之七畧然其書不傳今據古書之存者言之撰人已入人物志者註見人物志或人物志所未載者則詳敘仕履因書以存其人用新唐書藝文志例至其孰為儒林孰為文苑孰為道學原書具在讀者自有定評今不復臆為分别以杜門户之漸焉藝文志經部史部子部集部經部繙繹五經五十八卷四書二十九卷武英殿官本謹案繙繹五經四書清文鑑三合切音清文鑑諸書均由館臣纂輯進呈御覽斷自辦之總裁纂修銜名年逺雖無可考然要皆睿裁其原八旗精繙繹者所成與别館官書叅用滿漢人員者有别故今並列之八旗藝文志中乾隆二十年初欽定繙繹四書續繙繹易書詩三經續又繙繹春秋禮記二經至乾隆四十七年而聖賢典籍釋以國書者燦然備焉案鄭樵通志七音畧曰宣尼之書自中國而東則朝鮮西則凉夏南則交趾北則朔易皆吾故封也故封之外其書不通何瞿曇之書能入諸夏而宣尼之書不能至跋提河聲音之道有障礙耳其説良是然文字之聲音越數郡而或不同文字之義理則縱而引之千古上下無所異横而推之四海内外無所異茍能宣其意㫖通以語言自有契若符節者又何聲音之能障礙乎哉考隋書載魏氏遷洛未達華語孝文帝命侯伏侯可悉以其言譯孝經之㫖教於國人謂之國語孝經經籍志載其書作一卷是古人已有行之者特其學其識均未窺六藝之閫奥故所能譯者僅文句淺顯之孝經而諸經則未之及耳我國家肇興東土剏作十二字頭貫以切音復御定清文鑑聨字成語括一切義精㣲巧妙實小學家所未有故六書之形聲訓詁皆可比類以通之而列聖以來表章經學天下從風莫不研究㣲言講求古義尤非前代之所及故先譯四書示初學之津梁至於五經易則畧象數之迹示其吉凶書則疏詰屈之詞歸於顯易詩則曲摹其詠嘆而句外之寄託可思春秋則細核其異同而一字之勸懲畢見禮記則名物度數考訂必詳精理名言推求必當尤足破講家之聚訟盖先儒之詁經多株守其文故拘泥而鮮通此編之詁經則疏通其意故明白而無誤不立箋傳之名不用註疏之體而脣吻輕重之間自然契刪述之㣲㫖厥有由矣學者守是一編或因經義以通國書而同文之聖化被於四方或因國書以通經義而明道之遺編彰於萬世其有禆於文教均為至大雖堯帝之文章尼山之刪定又何以加於兹哉合訂刪補大易集義粹言八十卷納喇性徳編相傳謂其稿本出陸元輔性徳殁後徐乾學刻入九經觧始署性徳之名莫之詳也性徳原作成徳滿洲正黄旗人康熙丙辰進士官至乾清門侍衛是書乃取宋陳友文大易集義方聞一大易粹言案此書原本誤作曽穜今考正二書而合輯之友文書本六十四卷所集諸儒之説凡十八家又失姓名兩家聞一書本七十卷所集諸儒之説凡七家以二書校除重複外集義視粹言實多得十一家惟粹言有繫辭説卦序卦雜卦而集義止於上下經故所引未能賅備性徳因於十一家書中擇其論繫辭諸傳者以補其闕與粹言合為一編又刪其繁蕪勒成此本今粹言尚有傳本已著於録集義流播較稀尚藉此以見梗槩其中理數兼陳不主一説宋儒㣲義實已畧備於斯李衡刪房審權之書俞炎鈔李心傳之説並以取精擷要有勝原編此書之作其功亦約畧相亞矣陳氏禮記集説補正三十八卷納喇性徳撰是編因陳澔禮記集説疎舛太甚乃為條析而辨之凡澔所遺者謂之補澔所悞者謂之正皆先列經文次列澔説而援引考証以著其失其無所補正者則經文與澔説並不載焉頗採宋元明人之論於鄭註孔疏亦時立異同大抵考訓詁名物者十之三四辨義理是非者十之六七以澔註多主義理故隨文駁詰者亦多也凡澔之説皆一一溯其本自何人頗為詳核而愛博嗜竒亦往往泛採異説如曲禮席間函丈澔以兩席併中間為一丈性徳引文王世子席之制三尺三寸三分寸之一駁之是也而又引王肅本文作杖謂可容執杖以指揮則更謬於集説矣月令羣鳥養羞性徳既云集説未為不是而又引夏小正丹鳥羞白鳥及項安世人以鳥為羞之説云足廣異聞則明知集説之不誤而强綴此二條矣曾子問魯昭公慈母一條既用鄭註孔疏以補澔註又引陸佃之謬觧蔓延於集説之外是正陸氏非正集説矣凡斯之類皆徵引繁富愛不能割之故然綜核衆論原委分明凡所指摘切中者十之八九即其據理推求者如曲禮狠毋求勝分毋求多澔註稱况求勝者未必能勝求多者未必能多性徳則謂此乃不忮不求懲忿窒慾之事陳氏所云不免計較得失若是則可以必勝可以必多將不難於為之矣是雖立澔於旁恐亦無以復應也然則讀澔註者又何可廢是編與黄鐘通韻二卷都四徳撰都四徳滿洲鑲紅旗人是書凡十篇日律度量衡第一五音位次第二六律第三七均第四五音六律相生第五律吕名義第六律本第七循環為宫第八聲字第九律數第十末又附以琴圖共為上下二卷多本蔡元定律吕新書而附益以己意如聲字一篇於國書十二字頭獨取第一第二第四第五第十二章之字而其餘皆不之及而五章中又雜取第四章之安恩二字以配宫第五章之昂鞥二字以配商第一章之阿額二字以配角第十章之敖歐二字以配徵第二章之愛平聲額依二字以配羽以上十字分之配十干又取首章之依烏兩字共為十二字分配十二律作為横直方圓之圖且謂人之言語聲音止此數字殊不知我國家十二字頭整齊肅括無音不備無韻不該非可偏舉其五字頭以為分配也據其所論盖以此五章可用漢字對音其餘七章雙聲疊韻為漢文所無故不用耳然國書有二合三合切音之不同推其原本則自首句六字而外其餘何一非雙聲疊韻而謂止於七章而已乎今以漢文字有無為國音之區别漢文之有者則取配五音十二律而漢文所無者概置弗論是未究國書制作之本也且字頭十二雖曰平列其實十一章皆以第一章為綱領而第一章又以第一句為綱領觀國語中並無以他字加於阿額依鄂烏之上者其偶遇此音亦以他字代之盖此數字總貫十二章如臣之有君子之有母其體統實為最尊不宜與衆音並列又所列阿愛平聲安昂敖等字反居額額依恩鞥歐等字之下亦多未安伏稽欽定國書新語即以阿為陽以額為隂以此可見阿之類皆陽位也額之類皆隂位也隂不可以先陽乃國書之義例不可以隨章布列矣至其以五章字頭統詩韻三十部雖亦近似然限以前所拈之數字亦不足以盡清文之藴惟所論清字切音之法皆中窾要為有益於學者耳御製清文鑑三十二卷補編四卷總綱八卷補總綱二卷乾隆三十六年奉勅撰我國家發祥長白實金源之舊疆金史章宗本紀載明昌五年以葉魯谷神始制國字詔依倉頡立廟例祀於上京又選舉志稱進士科以䇿論試國人用國字為程文陶宗儀書史㑹要則稱金太祖命完顔希尹撰國字其後熙宗亦製字並行希尹所製謂之大字熙宗所製謂之小字其字波磔繁宻頗類籀文當時必有字書今已無考惟趙崡石墨鐫華所載天㑹十二年都統經畧郎君行記一篇僅存其形製而已盖有元一統之後其法漸不傳也我太祖髙皇帝肇建丕基命巴克什額爾徳尼以䝉古字聫綴國語成句尚未别為書體太宗文皇帝始命巴克什庫爾纒剏造國書以十二字頭貫一切音因音而立字合字而成語今内閣所貯舊籍今謂之老檔即其初體厥後増加圈㸃音義益詳亦如籀變小篆𨽻變八分踵事而増以日趍於精宻我聖祖仁皇帝慮口傳筆授或有異同乃命别類分門一一排纂勒為清文鑑一書以昭法守惟未及音譯其文皇上復指授館臣詳加増定為部三十有五子目二百九十有二毎條皆左為國書右為漢語國書之左譯以漢音用三合切韻漢書之右譯以國書惟取對音以國書之聲多漢字所無故三合以取之漢字之聲則國書所具故惟用直音也至於欽定新語一一載入尤為詳備盖字者孳也許愼説文九千餘字楊雄方言已増至一萬一千九百餘字陸法言切韻一萬二千五十六字陳彭年等重修廣韻已増至二萬六千一百九十四字吕忱字林丁度集韻以下更莫能殫記是由名物日繁記載遂不能不備聖人制作亦因乎勢之自然為事之當然而已伏而讀之因漢文可以通國書因國書可以通漢文形聲訓詁無所不具亦可云包羅巨細辨别精㣲者矣書中體例兼列字體字音宜入訓詁類中然譯語得音駢音為字與訓詁之但觧音以義者不同故仍列諸字書類焉御定滿洲䝉古漢字三合切音清文鑑三十三卷乾隆四十四年奉勅撰初聖祖仁皇帝勅撰清文鑑皇上既命補注漢字各具翻切釋文嗣以蒙古字尚未備列因再命詳加考校續定是編以國書為主而貫通於䝉古書漢書每國書一句必兼列蒙古語一句漢語一句以明其義又以䝉古字漢字各對國語之音以定其聲漢字之音不具則三合以取之䝉古字之音不具則分各種讀法寫法收法以取之經緯貫穿至精宻而至明顯循文伏讀無不一覽了然考遼史太祖本紀稱神冊五年始製契丹大事天贊三年詔礲闢遏可汗故碑以契丹突厥漢字紀其功云云然則三體互通使彼此共喻實本古義許慎作説文小篆之下兼列籀文古文以互證其字揚雄作方言每一語一物亦具載某地謂之某以互證其語則三體彚為一編使彼此相釋亦因古例用達書名於四方雖成周大同之盛亦無以踰於斯矣篆字彚十二卷佟世男編世男滿洲鑲黄旗人康熙中官知縣其書本梅膺祚字彚各繫以篆文篆文所無之字則依楷書字畫以意造之不可以為典據也史部欽定遼金元三史國語觧四十六卷乾隆四十六年奉勅撰考譯語對音自古已然公羊傳所稱地物從中國邑人名從主人是也譯語兼釋其名義亦自古已然左傳所稱楚人謂乳穀謂虎於菟榖梁傳所稱吳謂善伊謂稻緩號從中國名從主人是也間有音同字異者如天竺之為捐篤身毒印度烏桓之為烏丸正如中國文字偶然假借如歐陽漢碑作歐羊包胥戰國䇿作勃蘇耳初非以字之美惡分别愛憎也自魏書改柔然為蠕蠕比諸蠕動已屬不經唐書謂回紇改稱回鶻取輕健如鶻之意更為附㑹至宋人武備不修鄰敵交侮力不能報乃區區修隙於文字之間又不通譯語竟以中國之言求外邦之義如趙元昊自稱兀卒轉為吾祖遂謂吾祖為我翁蕭鷓巴本屬蕃名乃以與曽淳甫作對以鷓巴鶉脯為惡謔積習相沿不一而足元托克托等修宋遼金三史多襲舊文不加刋正考其編輯成書已當元末是時如台哈布哈號為文士今所傳納新案納新原本誤作廼賢今改正金臺集首有所題篆字亦自署曰泰不華居然訛異盖舊俗已漓併色目諸人亦不甚通其國語宜諸史之訛謬百出矣迨及明初宋濓等纂修元史以八月告成事迹挂漏尚難殫數前代譯語更非所諳三史所附國語觧顛舛支離如出一轍固其宜也我皇上聖明天縱邁古涵今洞悉諸國之文灼見舊編之誤特命館臣詳加釐定併一一親加指示務得其真以索倫語正遼史凡十卷首君名附以后妃皇子公主次宫衛附以軍名次部族附以屬國次地理次職官次人名次名物共七門以滿洲語正金史凡十二卷首君名附以后妃皇子次部族次地理次職官附以軍名次姓氏次人名附以名物共六門以蒙古語正元史凡二十四卷首帝名附以后妃皇子公主次宫衛附以軍名次部族附以國名次地理次職官次人名次名物共七門各一一著其名義詳其字音字音為漢文所無者則兩合三合以取之分晰㣲茫窮極要窅即不諳繙譯之人繹訓釋之明悟語聲之轉亦覺釐然有當於心而恍然於舊史之誤也盖自欽定三合切音清文鑑出而國語之精奥明至此書出而前史之異同得失亦明不但宋明二史可據此以刋其訛即四庫之書凡人名地名官名物名涉於三朝者均得援以改正使音訓皆得其真聖朝考文之典洵超軼乎萬禩矣尚史一百七卷李鍇撰鍇鑲白旗漢軍卷首自署曰襄平考襄平為漢遼東郡治今為盛京遼陽州地盖其祖籍也康熙中鄒平馬驌作繹史採摭百家襍説上起鴻荒下迄秦代仿袁樞紀事本末之體各立標題以類編次凡所徵引悉録原文雖若不相屬而實有端緒鍇是編以驌書為藁本而離析其文為之翦裁連絡改為紀傳之體作世系圖一卷本紀六卷世家十五卷列傳五十八卷繫傳六卷表六卷志十四卷序傳一卷仍於每段之下各註所出書名其遺文瑣事不入正文者則以類附註於句下盖體例準諸史記而排纂之法則仿路史而小變之自序謂始事於雍正庚戌卒業於乾隆乙丑閲十六載而後就其用力頗勤考古來漁獵百家勒為一史實始於司馬遷今觀史記諸篇其出遷自撰者率經緯分明疎宻得當操縱變化惟意所如而其雜採諸書以成文者非惟事迹異同時相牴牾亦往往㸃竄補綴不能隱斧鑿之痕知鎔鑄衆説之難也且排比鱗次一用舊文體如詩家之集句求其翦裁諸説使聫貫如出一手比吕東萊之讀詩記尤難之又難今觀其書於殘膏賸馥掇拾成文時露輳合之迹者固在所不免而聫絡融貫位置天然如百衲之琴不乖音律如千狐之腋不露裁縫者亦往往而有不可謂非因難見巧為史家特出之創格存之亦足備一體也若晉逸民傳中列杜蕢狼瞫鉏麑提彌明靈輒逆臣傳中列趙穿而不列趙盾亂臣傳中列郤芮吕飴甥嬖臣傳中列頭湏魯列女傳中列施氏婦予奪多所未允又諸國公子皆别立傳而魯宋蔡曹莒邾六國則襍列諸臣中叛臣傳中如巫狐庸叛楚入吳吳楚兩見公山不狃叛魯入吳吳魯兩見己為重出而屈巫見於楚不見於晉苗賁皇見於晉不見於楚又復自亂其例如斯之類不一而足均不能不謂之瑕類然史漢且不免駁文司馬光作資治通鑑亦稱其中牴牾不能自保固亦不能獨為鍇咎矣治河奏績書四卷附河防述言一卷靳輔撰輔已有傳是書卷一為川澤考漕運考河決考河道考卷二為職官考堤河考及修防汛地埽規河夫額數閘壩修規舡料工值皆附焉卷三為輔所上章疏及部議卷四為各河疏濬事宜及施工緩急先後之處其川澤考所載於黄河自龍門以下至淮徐注海凡分滙各流悉考古証今頗為詳盡於注河各水及河所瀦蓄各水亦縷陳最悉其漕運考亦然河道考於臨河要地及距河逺近分條序載較志乘加詳至於堤工修築事宜則皆輔所親騐立為條制者矣輔自康熙十六年至三十一年凡三膺總河之任故疏議獨多其專以治上河為治下河之䇿雖據一時所見與後來形勢稍疎然所載修築事宜亦尚有足資採擇者與張伯行居濟一得均尚非紙上之空談也又河防述言一卷為張靄生所撰皆追述其友陳潢之論故曰述言潢字天一號省齋錢塘人為輔之幕客輔治河多資其經畫康熙甲子聖駕南巡輔以潢功上聞特賜叅贊河務按察司僉事銜其書凡十二篇一曰河性主於順而利𨗳之二曰審勢謂凡有所患當推其致患之所以然三曰估計謂省工省料其壊必速所費較所省為更大四曰任人主於愼選擇明賞罰而歸本於正己以率屬五曰源流謂河水本清其淤漲皆由挾中國之水六曰隄防主潘季馴以堤束水以水刷沙之説而尤以減水壩為要務七曰疏濬主於潰决之處先固其兩旁不使日擴乃修復故道而借引河以注之八曰工料工主於覈實料主於豫備九曰因革言今昔形勢之不同十曰善守謂黄河無一勞永逸之䇿在時時謹小慎微而歸重於河員之久任十一曰雜誌述治河之委曲十二曰辨惑則駁當時之異議也其言往往中理與靳輔書足相發明今錄附輔書之末以資參考書前冠以黄河全圖乃靄生所自作雖不及欽定河源紀畧之明確而逺勝篤什等之所記又靳輔奏疏一篇雖專為潢而發然頗足見當日治河之始末今亦併存之焉撫豫宣化録四卷田文鏡撰文鏡正黄旗漢軍官至河東總督諡端肅是編乃文鏡官河南巡撫時奏疏一卷條奏一卷文移一卷告示一卷内文移又分一子卷均始於雍正二年七月迄五年九月惟告示迄於五年正月前有河南布政司費金按察使彭惟新分守開歸河道楊夢炎河務兵備道祝兆鵬分守河北兵備道朱藻分巡南汝光道孫蘭芬㑹請刋刻詳文一道及文鏡批詞平閩記十三卷楊捷撰㨗鑲黄旗漢軍官至昭武將軍江南提督是編皆其康熙十七年征剿鄭成功時奏疏及箋啟文牌檄告示諸藁馮溥王廣心序葉暎榴跋皆稱平閩紀事前有張玉書序則又稱平閩記蓋初名紀事復改今名也文襄奏疏八卷靳輔撰是編皆前後治河奏疏其子治豫彚刋之輔自安徽巡撫擢授河道總督時值河患方棘洪流逆溢髙堰横潰合淮水而東注故道反湮輔疏言河水挾沙而行易於壅閼惟賴清水助刷始能無滯當審其全局徹首尾而合治之不可漫為施工使東築西决終歸無益因條具八事入告聖祖仁皇帝悉俞其請於是疏濬運河及清口以至海口河道又開白洋清河以東引水河而黄流始暢開清口瀾汛淺諸引河而淮水始出敵黄築河崖遥堤縷堤修髙堰堵翟壩置減水六壩而宣洩咸有所恃至開中河皂河諸役尤其設施之大者其持論以築堤崖疏下流塞决口有先後而無緩急數語為綱領故在事十年具著成績諸疏並在集中無不指陳原委言之鑿鑿至今論治河者猶稱輔焉末附輔官巡撫時奏疏三篇其極論騷擾驛站亦具見風力云使琉球記一卷張學禮撰學禮鑲藍旗漢軍官至廣西道監察御史是編乃康熙元年學禮以兵科副理事官與行人司行人王垓奉使冊封琉球國王時所記前敘請封遣使始末及往來道路之險後為中山紀畧則載其土風也是時琉球國王尚質繳故明勅印舉國内附故學禮等有是役蓋國家遣使東瀛此為始事云行水金鑑一百七十五卷傅澤洪撰澤洪鑲紅旗漢軍官至分巡淮揚道按察司副使是書成於雍正乙巳全祖望作鄭元慶墓誌以為出元慶之手疑其客遊澤洪之幕或預編摹然别無顯證未之詳也敘水道者禹貢以下司馬遷作河渠書班固作溝洫志皆全史之一篇其自為一書者則剏始於水經然標舉源流疏證支派而已未及於疏濬隄防之事也單鍔沙克什王喜所撰始詳言治水之法有明以後著作漸繁亦大抵偏舉一隅專言一水其綜括古今臚陳利病統前代以至國朝四瀆分合運道沿革之故彚輯以成一編者則莫若是書之最詳卷首冠以諸圗次河水六十卷次淮水十卷次漢水江水十卷次濟水五卷次運河水七十卷次兩河總説八卷次官司夫役漕運漕規凡十二卷其例皆摘錄諸書原文而以時代類次俾各條互相證明首尾貫串其有原文所未備者亦間以己意考核附注其下上下數千年間地形之變遷人事之得失絲牽繩貫始末犁然至我國家敷土翕河百川受職仰䝉聖祖仁皇帝翠華親莅指授機宜睿算周詳永昭順軌實足垂法於萬年澤洪於康熙六十一年以前所奉諭㫖皆恭錄於編以昭謨訓尤為疏瀹之指南談水道者觀此一編宏綱巨目亦見其大凡矣七星巖志十六卷韓作棟撰作棟鑲藍旗漢軍順治中官分巡肇髙㢘羅道按察司僉事七星巖在肇慶府髙要縣城北一名崧臺一名定山故此書又名定山石室志也志本明王泮所撰作棟因而重修吳綺又為之潤色然有闗考核者寥寥無多如石刻門於唐李邕石堂記後乾道己丑秋一條以後人題名之年月誤為摹石之年月又載元符改元端午日眉山蘇軾挈家來遊不思元符元年蘇軾正在儋州安得有挈家至七星巖之事此盖據曹學佺名勝志所載而不知為傳訛之文也鷄足山志十卷范承勲撰承勲鑲黄旗漢軍大學士文程之子浙閩總督承謨之弟官至雲貴總督鷄足山在雲南賓川州東一百里一頂三支儼如鷄距在蒼山洱海之間相傳為迦葉尊者入定處佛寺最多故志山者多述佛門之事是編乃康熙三十一年承勲因舊本増修分圗記考証星野形勢山水寺院人物靈跡物産藝文凡十門而以迦葉像讃冠於卷端焉在園雜志四卷劉廷璣撰廷璣鑲紅旗漢軍由廕生官至江西按察使後降補分巡淮徐道是編雜記見聞亦間有考證頗好譽已詩似張表臣珊瑚鉤詩話四卷録乩仙詩至十五六頁亦太近夷堅諸志所記邉大綬伐李自成祖墓事甚詳然與大綬自序不甚合疑傳聞異詞也異域録一卷圖理琛撰圗理琛姓阿顔覺羅氏先世葉赫人由考取内閣中書官至兵部職方司郎中是編乃康熙五十一年五月圗理琛以原任内閣侍讀奉命出師土爾扈特由喀爾喀越俄羅斯國至其地五十四年三月回京師復命因述其道路山川民風物産以及應對禮儀恭呈御覽冠以輿圗次隨日記載見聞其體例畧如宋人行記但宋人行記以月日為綱而地理附見此則以地理為綱而月日附見所厯俄羅斯境曰楚庫柏興曰烏的柏興曰柏海爾湖曰尼爾庫城曰昻噶拉河曰伊聶謝柏興曰麻科斯科曰掲的河曰那里木柏興曰蘇爾呼忒柏興曰薩瑪爾斯科曰狄木演斯科曰托波爾曰鴉班沁曰費耶爾和土爾斯科城曰費耶爾和土爾斯科佛落克顔嶺曰索里喀穆斯科曰改果羅多曰黒林諾付曰喀山曰西穆必爾斯科曰薩拉托付曰嗒喇斯科曰托穆斯科曰伊里木城皆其大聚落也其地為自古輿記所不載亦自古使節所未經如史記述匈奴北海頗作疑詞故儒者類言無北海今據圗理琛所記知伊聶謝柏興距北海大洋一月程又唐書稱薛延陀夜不甚暗猶可博奕僅得之於傳聞圗理琛以五月至其地知夏至前後確有是事皆我聖祖仁皇帝徳化覃敷威稜震曡故軺車所至莫不具驛傳供芻糒涉越三四萬里如行閨闥故得以從容游覽見所未見聞所未聞纂述成編以補亘古黄圗所未悉今備錄其文使天下萬世知聖化彌綸迥出於章亥所步之外且所記俄羅斯土爾扈特畏懐恭順之忱尤足見堯天丕冒砥屬無垠凡在方趾圎顱無不鱗集仰流效誠恐後為三五以來所未有今土爾扈特已全部内附而所記俄羅斯南路十四國乾隆乙亥以後又以盡入版圗併以見武烈文謨顯承啟佑所由拓億禩之丕基者非偶然也欽定武英殿聚珍板程式一卷乾隆四十一年户部侍郎金簡恭撰進呈初乾隆三十八年詔纂修四庫全書復命擇其繕本校正剞劂以嘉恵藝林金簡實司其事因棗棃繁重乃奏請以活字排印力省功多得㫖俞允併錫以嘉名紀以睿藻行之三載印本衣被於天下金簡因述其程式以為此書考沈括夢溪筆談稱慶歴中有布衣畢昇始為活板其法用膠泥刻字薄如錢脣每字為一印火燒令堅先設一鐵板其上以松脂蠟和紙灰之類冒之欲印則以一鐵範置鐵板上乃密布字印滿鐵範為一板持就火煬之藥稍鎔以一平板按其面則字平如砥若止印二三本未為簡易若印數十百本則極為神速云云活字之法斯其權輿然泥字既不精整又易破碎松脂諸物亦繁重周章故王楨農書所載活字之法易以木板其貯字之盤則設以轉輪較為徑㨗而亦未詳備至陸深金臺紀聞所云鉛字之法則質柔易損更為費日損工矣是編參酌舊制而變通以新意首載諸臣奏議次載取材雕字之次第以及庋置排類之法凡為圖十有六為説十有九皆一一得諸試騐故一一可見諸施行乃知前明無錫人以活字印太平御覽自隆慶元年至五年僅得十之一二者案事見黄正色太平御覽序由於不得其法此亦足見聖朝制器利用事事皆超前代也子部潛索録四卷范宏禧撰宏禧鑲黄旗漢軍大學士文程曽孫也幼以苦學致嬴疾遂不求仕進惟躭玩宋儒之書是編多推尋易理皆其病中所劄記歿後其子建幟為刋板前有乾隆壬申孫嘉淦序其學即數以求理宗派在邵陳程朱之間文廟從祀先賢先儒考一卷郎廷極撰廷極鑲黄旗漢軍此本題曰廣寜其原籍也官至江西總督是編歴考從祀先賢先儒名字之同異如辨顔幸之作辛而不知通典之作柳咸淳臨安志之作韋辨南宫适之作韜而不知一作縚一作括辨司馬耕之作黎耕而不知一作子耕未免考訂之疎惟所辨文翁之圖較家語多五人家語較文翁之圖多九人及正殿配享東西兩廡位數引据頗為典核繪事備考八卷王毓賢撰毓賢鑲紅旗漢軍官至湖廣按察使陳鼎留溪外傳記獄吏汪金章事稱毓賢勤於吏治案無留牘則其人本以吏才見然是編即康熙辛未官按察使時所作乃又能留心於賞鑒第一卷為總論皆撮録諸家畫法二卷至八卷則取古來畫家姓名事跡以時代分序自軒轅至隋共為一卷遼金元共為一卷唐五代南宋明俱各為一卷惟北宋家數繁多析為三子卷故總目雖分八卷其實乃十卷也其例每人各立小傳而以諸書所載傳世名蹟附於其人之後大扺以張彦逺歴代名畫記夏文彦圖繪寳鑑為藍本増廣其所未備蒐輯頗為詳贍其中如穆天子傳封膜晝於河水之陽郭璞注明云膜晝人名張彦逺誤以晝字作畫字遂稱封膜為畫家之祖并妄造璞注以實之毓賢乃沿襲其訛殊失於訂覈又遼常思言人品畫品並髙附見郭若虚圖畫見聞志中諸書並佚其名此亦闕載至於明之畫家僅據韓昻圖繪寳鑑續編所載迄正徳而止嘉靖以後竟不為採摭續添亦殊傷缺畧然前代如李嗣真釋彦悰劉道醇之流往往分别品第時代混淆難於檢核是書仿張夏二家舊例因時類叙一覽可知又芟汰繁冗易於尋討雖多用舊文固不以遞相祖述為病矣居常飲饌録一卷曹寅撰寅鑲藍旗漢軍康熙中巡視兩淮鹽政加通政使銜是編以前代所傳飲膳之法彚成一編一曰宋王灼糖霜譜二三曰宋東谿遯叟粥品及粉麵品四曰元倪瓚泉史五曰元海濱逸叟製脯鮓法六曰明王叔承釀録七曰明釋智舷茗箋八九曰明灌畦老叟蔬香譜及製蔬品法中間糖霜譜寅巳别刻入所輯棟亭十種其他亦頗散見於説郛諸書云勝飲編一卷郎廷極撰是書雜採經史中以酒為喻之語彚輯成編自序謂不飲而勝於飲故名之曰勝飲然所録僅數十條簡畧太甚如引祭酒挈壺之類亦多牽率式古堂書畫彚考六十卷卞永譽撰永譽鑲紅旗漢軍官至刑部左侍郎王士禎居易録云卞中丞永譽貽書畫彚考六十卷凡詩文題跋悉載上溯魏晉下迄元明所收最為詳博朱彜尊論畫詩亦有妙鑒誰能别苗髪一時難得兩中丞之句盖永譽及宋犖皆精於賞鑑犖時為江西巡撫永譽時為福建巡撫故云兩中丞也是書書畫各三十卷先綱後目先總後分先本文而後題跋先本卷題跋而後引據他書條理秩然且視從來著録家徵引特詳惟所載書畫不盡屬所藏亦非盡得之目見大扺多從汪砢玉珊瑚網張丑清河書畫舫諸家採摭裒輯故不能如寳章待訪録以目見的聞灼然分别又所載本文如禇遂良書陸機文賦吳通㣲書隂符經劉敞書南華秋水篇趙孟頫書過秦論等皆與今本無大異同而具載全篇殊為疣贅至於陸機平復帖虞世南枕卧帖其文為世所未睹者乃畧而不書至如趙孟堅水仙圖卷珊瑚網載有二本不能無前後錯出之疑永譽於後一條下注明其一恐出臨摹並存以俟考其例是也而所載定武蘭亭落水本與郁逢慶書畫題跋記所載前後題跋互有不同所載神龍蘭亭本與鐵網珊瑚所録定武本題跋反多重複又黄庭堅書隂長生詩卷與鐵網珊瑚書畫舫所載參錯岐出竟有三本王詵烟江叠嶂圖蘇軾所為賦詩者竟有四本皆未能辨析真偽又王士禎居易録所記於永譽齋中觀其所藏書畫有司馬光資治通鑑手稿永譽云曽見一冊極端楷為好事者分去永譽得其二三紙耳今是書載此蹟但云史草亦不著所存頁數反不及士禎所載之可據士禎又見所藏趙孟頫冩杜詩天育驃騎歌上有孟頫小篆延祐四年九月既朢字是書亦併不載均為漏畧至於雁門乃郡名茂苑即長洲地名而以為文彭文嘉之别號居節字士貞貞字印章古篆與鼎字相類而以為居節一字士鼎又以秋巖為吾衍之别號盖因衍書古文篆韻後有至元丙戌秋巖記一條也不思前至元丙戌吾衍年甫二十不應云老且其跋内之丁夘若是宋末咸淳丁夘則正吾衍始生之時不當有自征建昌之語今以陶九成跋核之則至元乃至正之訛實為至正七年丙戌距吾衍之殁已三十七年其秋巖當即陳秋巖非吾衍别號也凡若此類疎舛尤多然登載既繁引述又富足資談藝家檢閲者無過是編固不以一二小疵累其全體之宏博焉琴譜合璧十八卷和素撰和素姓完顔氏滿洲鑲黄旗人官至内閣侍讀學士是編取明楊掄太古遺音譯以國書案古來譯經之法於有意義者譯其意義於無意義者則譯其音聲故諸經皆譯以華言而諸咒則仍存梵語國書之制於語言文字則譯意義於人名地名則譯音聲同一理也琴譜諸曲雖有意義而所重則在於音聲楊掄所載普庵咒即據其音聲譜以指法和素因即所載諸曲一一譜以音聲或對以單字或切以兩合分刌㣲茫不失毫髪抑揚輕重宫羽均調使明人舊笈轉賴此帙以永傳是亦操縵家特剏之製為古所未有者矣集部明善堂詩集怡親王𢎞曉撰王别字秀亭又自號氷玉怡賢親王允祥之子雍正八年十二月襲怡親王爵乾隆四十三年四月薨諡曰僖是集分十二卷録自乾隆三年戊午至十四年乙巳之作以一年為一卷大都近體多而古體少明善堂者乾隆五年皇上所賜堂匾既額其居而遂以名其集首有慎郡王序稱兄子氷玉少頴悟長好學不倦其言語文章自能發揮所得彬彬乎有法度可觀云花間堂詩鈔一卷紫瓊巖詩鈔三卷紫瓊巖詩鈔續刻一卷慎郡王允禧撰王於雍正八年封固山貝子尋晉多羅貝勒十三年封多羅慎郡王乾隆二十三年五月薨諡曰靖初集名花間堂詩鈔王自編自序合古今體詩二百六十六首花間堂者王所居西園十二景之一其題咏俱見集中次集曰紫瓊巖詩鈔則其幕客顧元揆所定元揆復承王命書而刻之盖比於王士禎門人書精華録之例也鈔分上中下三卷上卷五言古十七首七言古十九首中卷五言律三十六首七言律四十二首下卷五言長律二首五言絶句十六首六言絶句二首七言絶句五十一首先是王嘗得端溪岩石寳愛特甚鐫之曰紫瓊巖既自號紫瓊遂以名是集前有果親王及皇四子序後有顧元揆跋其詩多與花間堂複出者盖元揆合己刻未刻統行登選原非以接續前鈔也王既薨無子上命皇六子質郡王為王後乾隆四十八年質郡王又裒其餘稿加以選擇為紫瓊巖詩鈔續刻實得詩一百七十二首而序云百六十九目錄又稱百七十者盖數之偶有未審云稽古齋全集八卷和親王𢎞晝撰王世宗憲皇帝第五子雍正十一年正月封為和碩和親王乾隆三十五年七月薨諡曰恭是集王所自編釐為八卷卷一經論其發明四子書者十篇易經者五篇詩經者三篇書經者六篇春秋者四篇禮記者六篇周禮者七篇又發明前賢格言者五篇共為論四十六篇卷二三皆史論其卷二之四十二篇盖自夏迄北周卷三之三十四篇則自唐訖明也卷四説九篇序七篇記四篇跋四篇書後八篇卷五雜著九篇頌一篇贊十二篇銘一篇辨六篇祭文二篇卷六制藝八篇賦四十一篇卷七古體詩八十四首近體詩五十七首卷八今體詩一百八十五首稽古者王書齋名也集初成於雍正八年皇上在潛邸已為之序乾隆十一年重訂鏤板皇上復為序而御筆親書之今二序皆冠編首其餘序者自莊王果王諴王諸懿親外如大學士張廷玉朱軾蔣廷錫侍郎福敏蔡世逺胡煦祭酒卲基等皆嘗入侍内廷講席者亦足見一時英賢之盛也皇上御製序言與王幼同學同課習為詩古文詞當是時侍奉皇考膝下優游書府日寝饋於經史文字中天倫之樂無過於是集中所載大都至性所呈流溢豪素之表讀其辭可想見其為人臣等伏讀煌煌天語仰見聖人友愛之篤而斯集之美已櫽括於御序之數言云鳴盛集四卷果親王𢎞曕撰王世宗憲皇帝第六子乾隆三年奉㫖繼果毅親王允禮後十五年封和碩果親王二十八年坐事降為多羅貝勒三十年復封多羅果郡王是年三月薨諡曰恭是集王所自編合古近體詩共為四卷卷一詩一百十八首卷二詩二百四十九首卷三詩二百十一首卷四詩一百九十六首其樂府十八篇琴操二篇别編於前以為卷首其題曰經畬主人者王所自號也首有王自序謂托體天家何必以騁妍抽秘與書生競其短長惟是不忍玩愒時光荒棄舊業以自附於盛化和鳴之美故顔曰鳴盛集云友竹軒遺稿一卷敬謹齋初稿六卷蘭亭詩餘一卷鶴唳長吟一卷是編惟友竹軒詩文六首為康修親王崇安遺稿其餘八卷則皆其子禮親王永恩所撰也初禮烈親王孫傑書於順治年間襲爵改號曰康傳子椿泰孫崇安至崇安子永恩皆仍康親王之號乾隆四十三年皇上念禮烈開國元勲壯猷茂著其子孫繼緒應永紹始封之號不宜有所改易特命康親王永恩復號曰禮今編中兩代皆題康號者書成於乾隆十八年其時尚未奉復號之㫖也康修親王於康熙四十八年襲爵雍正十一年薨修其諡也卷中有禮王跋謂父王為議政大臣少暇日雅好講學形諸歌詠然不欲以此擅長故多所棄置未甞成卷云禮王初封多羅貝勒乾隆十八年襲康親王爵今復稱禮親王所作古近體詩已刻者名敬謹齋初稿卷一五言古七十二首卷二七言古二十六首卷三五言律百三十三首卷四七言律百四十三首卷五排律六十二首卷六絶句百四十六首其蘭亭詩餘惟詞十六闋鶴唳長吟皆悼亡之作故以為别集而附於末云誠正堂稿八卷誠正堂詞稿一卷誠正堂文稿一卷誠正堂時藝一卷禮親王永恩撰王有敬謹齋初稿六卷已著録是編標題王號曰禮則乾隆四十三年奉㫖復號後所重訂也首卷五言古次卷七言古三卷五言律四卷七言律五卷五言截句六卷七言截句七卷五言排律八卷七言排律末為詞稿文稿時藝各一卷其詞稿即前編所附之蘭亭詩餘十六闋増之為二十四闋又加以三言四言六言及騷體長短句名為衆體附録其文稿凡賦九篇諸體文十三篇像贊三十七首其時藝凡四十四篇則平時窻下所擬闈作刻於乾隆戊戌王自為之序白山詩鈔八卷伊福訥撰伊福訥字兼五號抑堂所著有農曹集蜕山詩稿是編盖選擷諸家之詩總為一集分金石絲竹匏土革木八卷首卷為慎郡王允禧宗室國鼒宗室岳端宗室博爾都次卷為宗室文昭宗室塞爾赫宗室伊都禮宗室永年覺羅滿保覺羅成桂三卷為費揚古性徳文明索泰西庫吳麟四卷為僖同格明鼐闗竒方䝉額圖傅伸伊麟賽音布關舒觀寳拉歆五卷為柏格髙述明髙斌王敏峻徳法海夸岱長海石芳何溥官保何貫曽車柏常安六卷為保禄西泰西成卓音圖佟應常裕諾岷諾穆泰趙玉永寜胡星阿塞爾登額爾登萼羅泰塞蘭泰七卷為方泰徳齡闗寜明泰薩哈岱舒瞻素禄夢麟那霖傅澤布福増格英亷八卷為蘇章阿兆勲陸世琦那穆齊禮繩武凡所搜羅共七十二家可謂勤矣然伊福訥所作農曹蜕山二集亦自列焉既乖選家體例而名編鉅集率多遺漏討尋未廣實為此書深惜之薌嬰居士集八卷宗室文昭撰文昭字子晉自號薌嬰居士是編為古瓻續集二卷龍鐘集一卷飛騰集二卷知田集一卷雍正集二卷共八卷其所與酬唱諸詩亦各附於篇後如王玉生謝雙村楊晚雷諸人是也曉亭詩鈔四卷鶴鳴集一卷曉亭詩鈔宗室塞爾赫撰鶴鳴集則其長子伊都禮詩也塞爾赫字慄菴號曉亭誠毅勇壯貝勒穆爾哈齊曽孫康熙三十六年授奉國將軍雍正二年補宗學正教長五年授監察御史累遷至工部侍郎充議政大臣尋降補内閣學士復授倉場侍郎乾隆十二年晉兵部侍郎未及任而卒伊都禮字立齋是編為曉亭次子鄂洛順所刻合古近體詩釐為四集以一集為一卷卷一曰春雪集卷二曰三餘集卷三曰懐音集卷四曰秋塞集其詩氣格清曠風度諧婉而不傷纎弱長洲沈徳潛嘗序薩哈岱集言於北地得晤三詩人首數塞爾赫次乃及於英亷薩哈岱則是編之見重當時久矣鄂洛順既刻其父集復以亡兄之鶴鳴集附焉䟦謂殘鱗片甲可想見生平故不忍棄去亦孝友之志也月山草堂詩四卷宗室恒仁撰恒仁系出太祖髙皇帝初襲輔國公後以不應襲失爵遂閉户讀書專意吟咏閒居以終其身年僅三十有五仁和沈延芳為誌其墓稱其清㣲樸老克具古人風格盖由其蕭散恬適故語多澄澹也是集為其子宜興所編凡古今體詩二百九十二首詩餘二首冠以墓誌殿以宜興所作䟦凡句下夾註無註字者皆恒仁所自識有註字者皆宜興所續加也存舊集一卷宗室福喜撰福喜别字損亭輔國公常舒之孫也由朝考賜進士乾隆九年襲世職為奉恩將軍二十三年五月卒無子有詩稿一卷其友人趙天馥為之選而録之名曰存舊集忠貞集十卷范承謨撰承謨事迹已詳見人物志是編乃其全集為清苑劉可書所編首諭祭文御製碑文御題詞額附以家傳及祠堂記共為一卷次撫浙奏疏一卷次督閩奏議一卷次吾廬存稿一卷次百苦吟一卷次畫壁遺稿一卷次雜著一卷次附錄題跋哀挽詩文三卷康熙五十七年其子時崇以畫壁遺稿進呈聖祖仁皇帝親製序文宸章下賁光逮幽泉今敬謹錄冠集端用示我國家扶植綱常風勵臣節之至意至承謨所上奏議大都明白敷暢多有闗國計之言詩文直抒胸臆慷慨激昻嚼齦裂眥之状至今猶可想見文以人重承謨之謂矣畫壁遺稿一卷范承謨撰康熙壬子承謨總督閩浙值逆藩耿精忠謀反巡撫劉秉政輸情於賊紿承謨入見脅令從逆承謨詆罵不屈遂為所拘繫被幽者三載備受窘毒時作為詩歌以自抒忠憤守者屏絶筆墨乃以桴炭畫字壁上其尤激烈者輒為賊黨墁去僅存四十七首承謨自為之序已彚載入忠貞集中此乃石門吳震方録入説鈴之本也睫巢集六卷後集一卷李鍇撰鍇卜居盤山優游泉石以終故其詩意思蕭散挺然㧞俗大都有古松竒石之態而刻意求髙務思擺脱亦往往有劖削骨立斧鑿留痕較王世貞所謂髙叔嗣詩如空山鼓琴沉思忽往木葉盡脱石氣自青者則猶有一間之未達盖可以著力之處精思者得之不容著力之處精思者反失之也第一卷皆擬古樂府古人音節既不可得乃詰屈其詞以意為之題下所注如朱礴下注曰建鼓殷所作棲翔鷺於上或曰露鼓精此吳競觧題本説也臨髙臺下注曰趨帝鄉而㑹瑶臺也借寓㳺仙已非原觧雉子班下注曰闗睢之類則純非古題之意又不知其寓意所在卷中大抵類此殊不可觧也通志堂集十八卷附録二卷納喇性徳撰性徳生長華閥頗喜文翰鄉試出徐乾學之門遂受業焉九經觧即其所刻而徐乾學延顧湄校正之以書成於性徳歿後板藏徐氏世遂稱徐氏九經觧並通志堂而移之徐氏實相傳之誤也是編乾學所裒輯凡詩五卷詞四卷文五卷淥水亭雜識四卷又附録碑誌哀輓之作為二卷棟亭詩鈔五卷附詞鈔一卷曹寅撰其詩一刻於揚州計盈千首再刻於儀徵則寅自汰其舊刻而吳尚中開雕于東園者此本即儀徴刻也其詩出入於白居易蘇軾之間石閭詩一卷陳景元撰景元鑲紅旗漢軍生平作字效晉作詩效漢務欲自拔於流俗之上是集乃其手書擬古詩六十餘首以貽雷鋐者前有短札亦其手書鋐並鉤摹筆迹刻之紙板頗為精好景元詩雖以漢為宗而性既孤僻思復刻峭結習所近乃在孟郊賈島之間如米摹晉帖矩度不失二王波勒鉤剔乃時時露其本法於漢人不雕不琢之意未能全似也此本以篇頁較少不能成帙舊附於李鍇睫巢集以行然二人同時倡和名亦相齊未可列諸附綴故仍各著於録焉與梅堂遺集十二卷佟世思撰世思正藍旗漢軍以䕃生官思恩縣知縣是集凡詩十卷詞一卷雜文一卷其弟世集裒而刻之末附耳書一卷皆記所聞見荒怪之事分人物神異四部鮓話一卷則以公事至恩平而記其風土也章江集五卷内府藏本安世鼎撰世鼎鑲紅旗漢軍由保徳州知州官至江西巡撫此集乃世鼎自輯歴官奏疏以及文移條告諸篇編為一集後附以書記序二十一篇皆在江西所作也倚松閣詩稿七卷徳齡撰徳齡字松如號樝村滿洲鑲黄旗人康熙戊子科舉人乙未科進士改庶吉士歴官至湖南巡撫吏部左侍郎致仕是編刻於乾隆丙戌其自序謂賦性懶漫故詩稿少所存留年届八旬始取餘稿略為釐定僅得若干首云云今觀伊福訥白山詩鈔所載徳齡詩有送范九池侍御巡臺灣七古一首而是編轉無之知其遺佚多矣七卷中計五七古共九十四首五七律共百三十九首長律七首五言絶句十七首六言三首七言絶句百八十首盖暮年收集而其子書山為之校勘云冷月山堂詩一卷珠亮撰珠亮姓棟鄂氏滿洲正紅旗人是集前有康熙戊子卲泰衢序又有庚寅金鉞序其詩風懐澄澹得韋栁之遺音故泰衢序稱其心貫古今而發之於聲隨所遇而寄其心鉞序亦稱其霏霏元觧無聲色臭味之可尋云餘亷堂詩稿六卷嵩山撰嵩山珠亮之子也承其家學詩頗有清拔之致自序稱五十餘年身經殘廢於閒佚之中每逢烟水雲山則不無興感有所興感則不能無詩實非有意為詩亦不知人知我之有詩云云盖外縁既淡意境自殊亦所遇使之然也其詩本三千餘首分守拙望恩遂閒慰志四集後屢經刋削乃定為此本焉柏翠山房詩稿一卷峒山撰峒山珠亮之子嵩山之弟也父母兄嫂一門詞賦峒山耳濡目染年過七旬尚不廢吟詠雖所造未邃而亦時有間澹之思醉紅亭詩鈔一卷詩餘一卷文集二卷班餘剪燭集十四卷常安撰常安姓納蘭字履坦滿洲鑲紅旗人康熙中以諸生補山西巡撫掾吏尋擢理事同知雍正初授山西冀寕道累遷至貴州布政使擢江西巡撫丁艱服闋補盛京兵部侍郎轉刑部侍郎出為漕運總督遷浙江巡撫坐事罷尋卒伊福訥白山詩鈔言其所著受宜堂集數十卷而是編所題醉紅亭者詩文詞乃僅五卷盖其宦黔所刻初稿也其班餘剪燭集則其為少司㓂時所編卷一為論卷二為序記卷三為書卷四五六皆史評卷七為辨及題跋卷八題跋卷九賦卷十以下皆詩較初稿又逺勝矣閒青堂詩集十卷附錄一卷朱倫瀚撰倫瀚正紅旗漢軍康熙壬辰武進士選三等侍衛後改刑部郎中官至正黄旗漢軍副都統倫瀚以善畫得名聖祖仁皇帝集與皇上御製詩集均有題倫瀚畫詩傳為藝苑之至榮其詩亦與當代作者相馳驟是集為其子兩淮鹽運使孝純所刋不分體裁以編年為次始於康熙丙子訖於乾隆戊寅凡六十三年之所作大扺根柢宋人而畫意詩情互相觸發每有蕭散不羣之致據姚鼐序倫瀚尚有疏稿二卷今未之見盖未刻也固哉草詩集四卷文集二卷髙斌撰斌已有傳是集曽進呈御覽謹案事貝髙晉所作李宏詩集序中詩文皆不分體以編年為次詩始於康熙壬午訖於乾隆甲戌文始於雍正庚戌訖於乾隆甲戌大旨皆根據理義務切實用之言不以詞華争勝也雷溪草堂詩長海撰長海姓那蘭氏字滙川先世為烏拉部長太祖髙皇帝時來歸父馬期官都統從征雲南有功授鎮安将軍長海初肄舉子業後以鎮安功䕃宜補户部庫使未補以布衣終愛易水之雷溪築室居之自號雷溪居士是編五言古十八首七言古十一首五言律二十八首七言律三十二首五言排律二首五言絶句七首七言絶句九十五首前有寕郡王及大學士鄂爾泰二序後有宗室塞爾赫跋樗亭詩稿三十二卷薩哈岱撰薩哈岱滿洲正黄旗人姓伊爾根覺羅氏兩江總督薩載父也由恩䕃授内務府郎中坐事革職尋起復原官直宫門奏事處生平吟詠最富故伊福訥白山詩鈔所選亦頗多是編盖其全稿也計古樂府一卷五言古三卷七言古二卷五言律九卷七言律十卷五言排律四卷七言排律一卷五言絶句一卷七言絶句一卷共三十二卷分體而不編年仍注甲子於題目之下使有年代可稽薩哈岱字曰魯望樗亭盖其别號云葛莊分類詩鈔十四卷劉廷璣撰廷璣字玉衡號在園葛莊其别號也漢軍鑲紅旗人由䕃生出為浙江台州府通判遷處州府知府擢江西按察使縁事鐫級降為江南淮徐道又為按察使僉事是編十四卷首樂府次五言古次七言古次五言律次六言律次七言律分上下二卷次五言排律次七言排律次五言絶句次六言絶句次七言絶句次補遺一卷廷璣著作頗富先是編年成帙者凡五種曰種天齋近集曰使草曰辰巳小集曰刈存草曰省齋草至康熙五十三年乃合其己刻未刻總為是編不分年而分體故自題曰葛荘分類詩鈔云桐軒集一卷夸岱撰夸岱姓佟佳字桐軒滿洲鑲黄旗人兵部尚書法海弟也初為侍衛雍正間襲公爵官至工部尚書此古近體詩一卷盖瑞園合選中之第二種云通介堂詩稿一卷徐湛恩撰湛恩已有傳是集為其孫工部侍郎績所編不以古今體為類而以五言七言為類凡五言二十四首七言一百七首集中賦得春水滿四澤隴麥恭和御製隴麥元韻山荘四季賦得静裡清聲别舟中觀獵六里橋鐵柱諸篇皆聖祖時應制所作盖亦以仰蒙知遇屢預拜賡云斯文精萃不分卷家兵部尚書慶桂刋本尹繼善編尹繼善事迹見人物志是集選錄歴代詩文上起西漢下迄南宋但有圈㸃而無評註亦不分卷帙惟文分三類一為散文一為賦一為襍體詩分六類一為五言古體一為七言古體一為五言律體一為七言律體一為五言絶句一為七言絶句大㫖皆取有闗風教之言與真徳秀文章正宗用意相近而不似徳秀之過拘前有乾隆甲申自序稱初刻於雲南再刻於陜西皆以遐陬僻壤罕有師承故簿領餘閒手定一編示之模範後總制三江以諸生才質頴異者平時講習多尚浮華不復求諸根柢爰取滇秦舊刻再為増刪一切體裁均歸醇正盖書凡三刻此其晚年之定本也尹文端詩集十卷兵部尚書慶桂家刋本尹繼善撰尹繼善事迹見人物志是集乃其子慶桂所編凡古今體詩一千七百五十首大扺沿溯中唐而以劍南石湖為圭臬不為歴下太倉之偽體亦不為公安竟陵之側調婉約恬雅而切近事情深有思致可以位置於南施北宋之間盖承籍舊䕃練習典章早入詞林多與前軰勝流相倡和故議論體格具有淵源又遭遇殊知敡歴中外數十年時承聖訓得以明達政體洞悉物情故無寒儒蔬筍之詞亦無迂士拘墟之見所謂和聲以鳴國家之盛者殆不愧焉紀恩詩一卷尹繼善撰繼善有文端詩集已著録是卷純是七言截句並無别體首為辛未嵗入覲時作凡十首次己夘歳入覲時作凡二十四首次甲申歳奉召為大學士時作十六首次丙戌歳扈駕山莊時作十六首次木蘭隨圍時作十六首共八十二首皆前集所未登故其子慶霖彚而刻之云味和堂詩集六卷高其倬撰其倬事迹已詳見人物志是編卷一名白蘋紅杏集為詩一百二首卷二名懶後憂餘集為詩一百一首卷三名灤陽消夏集為詩六十二首卷四名塞上集為詩五十九首卷五詩一百二十四首卷六詩一百十四首則並為知非集云白蘋紅杏集者其自序謂少年作詩未嘗存稿存稿始於萬栁塘篇有白蘋風細魚蒲長紅杏花深燕子飛之句為友人所賞適居卷首遂以名其集也懶後憂餘集者其自序謂生平吟咏多縁友朋自舊游雲謝懶不作詩丁外艱三年又無詩可作通括前後篇什寥寥故名集云云其灤陽消夏集則乙未歳扈蹕山莊起四月訖十月之作也塞上集則丙申秋隨恒邸於熱河起七月迄九月之作盖其倬𨽻屬恒王旗下故也其知非集二卷殆敡歴封疆時所作以上五集皆其倬卒後子恪等為之校刻合而題曰味和堂詩集云恪又名書勲有石堂詩鈔别著録石堂詩鈔二卷髙書勲撰書勲户部尚書其倬之子字芸功石堂其號也年十七中式乾隆戊午科舉人中年病足不仕早卒是編合古近體詩為上下二卷共五百餘首首有張裕犖熊為霖二序為霖其受業師也西林遺稿六卷鄂爾泰撰鄂爾泰事迹已詳人物志是編為其門人楊潮觀所刻潮觀於乾隆甲子歳即任校讐之役事未竣而其師已卒嵗己巳潮觀急為鐫板于吳然僅居是編之半也辛卯潮觀入都盡得餘稿甲午春與其表弟顧光旭共編而刻之於是西林之詩集始全即此六卷是也卷一為古體詩三十一首卷二為五言律七十四首卷三為五言律七十三首卷四為七言律一百首卷五為七言律九十四首卷六則五七排律五七絶句合九十五首共為詩四百六十七首首有乾隆甲午大學士阿桂序而潮觀光旭並為之跋太谷山房集六卷夢麟撰夢麟字文子號耦堂䝉古正白旗人乾隆乙丑科進士改庻吉士累遷至内閣學士常督河南及江蘇學政夢麟詩初編時曰夢廬詩集是編乃其重訂之本也卷首皆樂府餘則合古近體共成六卷其詩才氣魁卓筆意峭厲盖生平沈浸古籍故用筆不落恒蹊云鄂虚亭詩草一卷鄂容安撰鄂容安大學士鄂爾泰之長子乾隆十九年以出兵西路殉難諡剛烈事蹟已詳人物志生平吟咏頗多未嘗授梓是編草本盖有心者為之掇拾也按楊潮觀西林遺稿後序云剛烈公伯仲敡歴未幾相繼死節所存全稿無從起忠魂而問之據此則西林之詩尚属不絶如綫况虚亭乎掇拾者之功信匪淺矣顧文端公詩節鈔一卷顧八代撰八代事蹟已詳人物志此編顔曰節鈔盖非八代全詩據標題為桐城方苞選本云首為五言古三首次七言古八首次五言律六首次七言律十四首次五言排律七首次七言排律九首其詩多咏平定吳逆時滇南用兵之事頗足以資考証云博虚宥詩草三卷博清額撰博清額字虚宥滿洲人乾隆壬申科進士改庶吉士累遷至翰林院侍講學士奉天府府尹是編首卷為乾隆庚辰典試四川時作次卷為壬午視學四川時作皆名使蜀草三卷為戊子典試浙江時作寥寥篇什近體多而古體少亦未見其全集也戢思堂詩鈔二卷李宏撰宏已有傳乾隆辛卯宏以河道總督卒於官其子奉瀚輯其遺稿三百餘首而髙晉為序晉時方總督兩江與同官也序稱其賦性恬淡不邇聲色公餘焚香宴坐手書不去或賦詩以自娛詞㫖濃深多見道之語寄素堂詩草二卷雜著二卷李永標撰永標字純九漢軍人由筆帖式授内務府郎中兼佐領乾隆三年出管張家口税務五年任滿部推為廣東雷州府知府引見之日特擢為安徽分巡道兼管蕪湖闗税是集永標自訂而篇什寥寥卷一僅詩四十六首卷二僅詩四十二首皆近體無古作其雜著上卷有文十篇率皆隨筆直書未恊古法下卷雜書格言三十六條而已海愚詩鈔十二卷朱孝純撰孝純字子頴漢軍正紅旗人由壬午科舉人授四川簡縣知縣遷敘永㕔同知擢山東泰安府知府又擢兩淮鹽運使以病觧官歸是集盖孝純卒後其友人桐城姚鼐丹徒王文治編次卷一為五言古詩六十首卷二為七言古詩三十八首卷三為七言古詩四十五首卷四為五言近體百十六首卷五為五言近體七十六首卷六為七言近體七十五首卷七為七言近體八十四首卷八為七言近體百二首卷九為五言絶句六十七首卷十為七言絶句八十八首卷十一為七言絶句百四十八首卷十二為七言絶句百三十三首首有其師桐城劉大櫆序而鼐與文治于乾隆甲寅年編成授梓復從而序之補亭詩稿觀保撰保字補亭正白旗滿洲人姓索綽羅氏乾隆丁巳進士官至左都御史詩有鈔本藏伊子内務府郎中觀豫家督運草一卷樂賢堂詩鈔三卷徳保撰徳保已有傳督運草徳保所自編皆其乾隆丙申代楊錫紱為漕運總督時作樂賢堂集則自萃其一生之詩欲刋未果己酉徳保歿其子英和乃編為三卷而刻之督運草雖併於集内以先有單行之帙且為徳保所自編自序故兩著録焉徳保與其從兄觀保並以乾隆丁巳進士入翰林出入禁闥三四十年又均以文章受知遇屢典貢舉為詞林耆舊迄今館閣舊臣尚多二人門下士云澄悦堂詩集國梁撰國梁滿洲人姓納拉氏乾隆丁巳進士官至貴州糧驛道遺稿甚富尚未付梓其兄國棟字天峯官總兵亦能詩稿多散失不傳蘭藻堂集六卷舒瞻撰舒瞻字堃畝號雲亭滿洲正白旗人乾隆丙辰科舉人己未科進士出為浙江桐鄉縣知縣歴調平湖山隂海鹽三縣是編古今體詩計首卷四十八首次卷五十二首三卷一百一首四卷九十二首五卷九十首六卷九十三首乾隆壬申長洲沈徳潛為之序晚香堂詩四卷永亮撰永亮字蘋洲滿洲正白旗人乾隆甲子科舉人是編首卷曰團瓢吟合古近體為詩三十八首次卷曰别軒存稿為詩三十四首三卷曰勾留草為詩五十四首四卷曰一草亭吟為詩二十二首每卷皆有弁言統題曰晚香堂詩其同年周毓崙為之序枝巢詩草四卷圖􅀈布撰圖􅀈布號裕軒又號漫圃滿洲鑲紅旗人乾隆戊辰科進士改庶吉士累遷至翰林院侍講學士充日講起居注官是編首卷曰從獵集乃其在翰林時歴年扈蹕熱河及隨圍木蘭所作次曰静居集亦官翰林時所作三曰于役集則其奉使吉林典試四川山東及歴遊塞外淮徐時作四曰歸田集則致仕後所作晚年卜居於阜城門外玉河鄉之池水邨有園圃竹木之勝春秋佳日逍遥其間故得詩最多而詩境亦愈進也四集共詩五百十四首枝巢云者盖取鷦鷯巢林不過一枝之意因以顔其集卒之明年乾隆丙午其門人御史劉湄為授梓而大興朱珪為之序乘槎集二卷全魁撰魁姓尼吉哩氏滿洲鑲白旗人乾隆辛未進士官至盛京户部侍郎降補翰林院侍讀學士是集乃乾隆丙子全魁奉使冊封琉球國王時作故以乘槎為名諸體合編始于奉使紀恩訖於丙子除夕皆由京至福建由福建至琉球之作故除夕詩中有歸期應不逺引領杏花初之句全魁渡海之時頗厯鯨波之險具見集中其歸程則風利遄行復命甚速故罕所題詠云來鶴堂詩鈔四卷于宗瑛撰宗瑛鑲紅旗漢軍乾隆甲戌進士改庶吉士授檢討官至監察御史宗瑛為于成龍之孫家風清素宗瑛尤恬澹無營雖性好吟咏而亦無意於争名故多不自存稿是集乃其子鰲圖收拾於殘剩之餘者也牧子詩録一卷不堪持贈吟一卷兆勲撰兆勲字佑啟先世居長白山之棟鄂故自號棟鄂牧子是編詩録一卷盖其舊友福増格為之編次乾隆戊寅福増格復序而刻之末附以諸家評語及所贈詩其不堪持贈吟一卷則兆勲晚年所續刻也卧雲堂詩稿一卷傅顯撰傅顯已有傳是集傅顯所自編刻于乾隆辛巳據其自序及其子傅尼善跋盖自官中書舍人以後始為詩後隨征金川歴任中外至官岳州知府時始編為此集而岳州以後則散佚不存盖非完帙也詩雅好清省而吐屬婉約其瓣香殆在劍南陶人心語五卷續選十四卷補遺一卷唐英撰英内務府正白旗漢軍官至内務府造辦處郎中是集英所自編一卷至四卷以古今體詩分類又各分五言七言五卷為襍文續選一卷二卷為詩附襍文一篇排纂殊無體例三卷至十卷皆詩題曰潯江著又入覲草一卷亦題卷十亦頗重複十一卷亦題潯江著而别題子目曰望洋集十二卷前半題潯江著後半題粤東著十三卷前半題粤東著後半及十四卷又題曰潯陽著大抵一官一集以編年為次而限於篇帙遂割裂如斯其詩則綽有清思不失雅則其曰陶人心語者以久司官窰於江西而吟咏則直抒胸臆故立是名云竹園詩集一卷張廷弼撰廷弼字秉衡竹園其號也漢軍正白旗人官直隸魏縣知縣後復補江南吳縣知縣是編前題曰竹園詩集後又識曰竹園編年詩集卷之一然觀其詩止属癸巳一年之作夫既曰編年不應僅係癸巳亦必不止於一卷知此為不全之本矣酌雅齋詩餘一卷福増格撰福増格字贊咸號松巖大學士伊桑阿孫山西總督伊都立子也以怡王府儀賔擢散秩大臣出為山西總兵官旋遷步軍總尉兼副都統轉盛京兵部侍郎所著有酌雅集是卷僅詞十九首前有中州任果駢體序一篇静㢘堂詩一卷顧琮撰琮字用方是編首曰練要書屋集次曰冷泉山房集三曰蕉桐書屋集皆五言古詩下繼以七言古詩五七絶句五七律詩未見全集瞻園詩鈔一卷託庸撰託庸事蹟已詳人物志其所居曰瞻園中有十八景具池􅜲竹木之勝暇則觴咏於此故因以顔其集玉華堂詩稿一卷趙宏恩撰宏恩字芸書漢軍人官至湖南巡撫有全集是卷盖鈔本僅得詩三十八篇時齋偶存詩鈔一卷國棟撰國棟字雲浦時齋其號也是編前為蜀遊草盖其出宰西蜀時所作後為淮南小草則其司𣙜淮安時所作也然前僅詩四十九首後僅詩三十五首亦甚寥寥矣友蓮堂集一卷佛喜撰佛喜字怡仙是卷又名一鶴軒草抄本而多塗乙盖未定之稿云早閒軒詩汪松撰松别字蒼嵓又自號髯道人是集首卷五言古二十七首次卷七言古二十首三卷五言律百五十四首四卷五言排律九首五卷七言律七十六首六卷五言絶句二十四首七卷七言絶句五十八首以上皆分體八卷曰哀鴈集盖哭妹之詩九卷曰悲鸞草則悼亡之作十卷以冷巢殘藁終焉盖又其晚年所賦短什是以此三卷獨不分體春暉堂詩鈔張廷枚撰廷枚字卜臣以世襲佐領兼領鑾儀衛遷内務府㑹計司員外郎補叅領出管蘇州滸墅闗税務廷枚嘗奉命出使朝鮮國賫所賜空青石于其國王故卷後有紀行諸作所敘外國景物事實頗足資博覽焉墨卿堂集恒裕撰裕字惇夫正黄旗滿洲人姓完顔氏乾隆庚寅舉人官中允有集四卷首列散體文復存古近體詩其友人侍郎玉保編次養易齋集一卷原本題養易齋主人撰宗室女也滿洲正紅旗珠亮之妻詩多忠孝節義之詞蘭軒詩一卷原本題蘭軒主人撰覺羅女也系出太祖髙皇帝之弟莊親王適嵩山性多藝能而尤躭吟咏而不自收拾年甫五十卒其子能泰收録遺藁編為此集嵩山自為之序紅雪軒稿六卷髙氏景芳撰氏盖漢軍人侍衛髙欽之姊己卯科舉人内閣中書世襲一等侯張宗仁妻也自編所作詩詞文賦分為六卷卷一賦三十六篇文一篇卷二四言詩十六首五言古四十七首七言古三十首卷三五言排律二十七首七言排律十二首卷四五言律一百五首七言律六十七首卷五七言絶句九十七首五言絶句四十三首卷六詞一百七十五首編端復有駢體自序一首其每篇皆有評㸃倣才調集之例則其弟髙欽為之也希光詩鈔一卷烈婦希光撰光鈕瑚魯氏正白旗滿洲員外郎伊嵩阿室夫病割股以療不騐矢以死從因女弱無依勉守志茹荼十年女嫁之次日賦七言律二章見志自縊死氏翁恊辦大學士吏部尚書永貴録其詩奏上憫之賜旌焉詩多凄楚之音其烈婦嘆一篇盖為大學士舒赫徳子婦棟鄂氏作亦自傷同志也欽定八旗通志卷一百二十
