body:
  text: 欽定四庫全書欽定八旗通志卷一百九十三人物志七十三大臣傳五十九漢軍鑲黃旗五張允隨英范時繹楊廷璋范時綬亷范時紀張允隨張允隨漢軍鑲黃旗人祖一魁福建邵武府知府有政績祀名宦祠允隨由監生捐光祿寺典簿康熙五十三年授江南寧國府同知五十七年擢雲南楚雄府知府雍正元年六月調廣南府旋丁憂二年十一月特用曲靖府知府十二月擢雲南糧儲道五年六月遷雲南按察使十一月擢布政使八年五月調貴州布政使八月授雲南巡撫十年十月疏言鎮沅府恩樂縣新改土為流請設鎮沅府教授一員恩樂縣教諭一員二學取進童生各八名下部議行十二月疏言滇省各府州或兵少米多或兵多米少米少則挽運維艱米多則紅朽足慮請將廣南廣西鶴慶永昌曲靖永北尋甸羅平南寧太和南安鎮雄保山新平支山會澤等處額徴條銀每兩折收米一石阿迷寧州雲龍雲州鎮南通海蒙自姚州元謀等處額徵秋米每石折銀一兩其普洱攸樂威縣鎮沅等處以一兩折給兵丁不敷買食請酌增以癸丑年為始停止採買十二年九月疏請於廣西府開罏鼓鑄均議行十三年八月疏報蒙化府墾田二十六頃有竒乾隆元年疏請昭通府屬之永善縣增設縣丞一員駐劄副官村其副官村巡檢移駐古寨歸魯甸通判轄二年署雲南總督十月疏言滇省水利與别省不同非有長川巨浸可分疏引注其水多由山出勢若建瓴水髙田低自上而下宜疏濬溝渠使盤旋曲折加以木梘石槽引令飛渡間有田髙水低處則宜車戽遇雨水漲迅流直下不能停瀦則宜濬塘築壩蓄泄得宜使兩岸均沾灌溉至低窪之處下流多係小港水發未能暢流恐致淹漫則當疏水口以資宣泄如遇山多沙磧又當築堤以護田畝滇省水利情形大概如此歷年已興之水利內有官民協修者有借公項修分年還欵者有動帑興工造册報銷者現在勘修水利若不酌定章程難保無推諉之弊請分晰定例如田間溝洫及一二村寨閘壩與應修之舊有溝堤工小費輕者令地方官查明於農隙按田出夫督率興修如工程稍大出夫外尚有應須工料者令地方官率士民公議需費多寡於有田用水各户照田分派先借與司庫公項興修工竣後分年還欵倘有工大費繁非民力能勝者則勘定情形估詳結報即於雍正九年官莊變價項下動給工竣另委確勘取具册結題銷則已興之水利既得永逺保固未興乏水利亦可次第查修報聞三年三月疏請停鑄運京錢五年三月疏言滇鹽不敷民食查安寧州有洪源鹽井試煎一年獲鹽二十一萬六千斤運至省城行銷麗江府有老姆鹽井試煎一年獲鹽一十八萬四千一百二十一斤分撥鄧州劍川浪穹三州縣行銷俱定為年額得旨此事若能妥辦實有益之事也六月署貴州總督六年三月報獲鄰省妖言結夥之要犯黃順等諭曰汝不以五日京兆而於此等事無不盡心辦理實屬可嘉是月疏劾台拱營參將趙國儀縱兵搶火盜帑誣良上奬其不避嫌怨四月署雲南總督七年三月奏請木欺古地方設汛兵一百駐劄文職一千總一外委一並於川江兩岸設六塘每塘兵十名所設辨兵於昭通鎮標四營抽撥一百東川本營抽撥六十遴選千總外委各一文職將就近巡檢移駐下部議行六月疏言準部咨各省標營增設兵量加裁減查雲南惟昭通鎮普洱鎮有增設兵額均屬極邉衝要未可議裁惟有通核合省之標鎮營協按兵額多寡均勻攤減庶於通省營制無畸輕畸重之患請將督提二標各裁兵一百撫標裁四十臨元等九鎮各裁五十廣羅等十五協營各裁三十順雲營裁二十共應裁一千一百六十名先裁餘丁四百四十八名遇缺出漸次開除停補於營制並無更張從之先是允隨請開通金沙江水道上命都統新柱四川總督尹繼善會勘十一月疏言臣與新柱尹繼善和衷查勘金沙江發源西域入滇經麗江鶴慶永北姚安武定東川昭通七府至敘州府滙入川江源逺流長實為西南大川自東川府以下南岸係滇省北岸係川省夾岸營汛分布田廬相望至大井壩以上南岸尚有田廬北岸俱髙山峻嶺山後即沙馬阿都兩上司地從前棄在蕃境舟楫不至自烏蒙改流設鎮滇省每年赴川採買兵糧均由敘州新開灘至永善縣黃草坪五百八十里泝運其黃草坪至金沙厰六十里亦商賈販運之川路內有大漢漕凹崖三腔鑼鍋耳等灘水勢險急冬春之際商船難行應興工修理俾下遊無險上遊自金沙厰至濫田壩二百二十七里共十二灘而濫田壩最險次則小溜筒臣親至灘頭相度小溜筒係於山根石嘴鑿出石􅨇雖因江水未退石􅨇尚未露而江流汛急斷無沙石淤塞之患濫田壩灘長四里現在水長丈餘南岸所開子河亦未露出詢之水手俟江水再退數尺即可通舟至開鑿子河之處離山甚逺下係稻田無俟防其沖塞自雙佛灘至蜈蚣嶺險灘鱗接石巨工艱縱加疏鑿下水仍屬堪虞臣業令改修陸路以避十五灘之險滇南僻處極邉設遇水旱米價騰貴今以次開通川道可以有偹無患諭曰既可開通妥協為之以成此善舉十二月疏言普洱府係新闢苗疆所屬寧洱縣管轄苗寨逺者五六百里每年納秋米供普洱鎮兵糧沿途髙山密箐牛馬不能馱運肩負往返十餘日其地有刀耕火種産米無多者又有祗堪種荍不能植稻者完納本色甚為艱苦請照攸樂縣例每石折徴銀一兩地方官採買給兵部議從之八年五月疏言大理府洱海發源鶴慶府之瀰沮河至大理合蒼山之十八溪滙而成海下合趙州蒙化之水由波羅甸出天生橋入合江鋪而總會於瀾滄江實迤西巨浸但海身長百二十里廣二十餘里而出水之天生橋一帶海口濶不及一丈每當大雨水漲海口子河輒致砂石衝塞河旁各溝沖沙成埂水溢倒流致太和趙州鄧川及浪寧賔川之沿海田畝不免淹浸而鄧川之東湖西湖低田時被水患臣飭令太和等州縣調集民夫於正月興工築壩將海口子河開寬二丈濬深五尺餘自波羅甸劉家園打魚村清風橋黑龍橋子河橋三道子河直逹天生橋逐節開濬或施人力或用牛犂壘石砌堤外栽桞樹其最要之趙家園拱沙龍則用犂木為樁傍溝亦俱修石壩外栽茨桞沙去流暢不特近水州縣無漫溢之患且涸出海田約一萬餘畝即令附近民認墾照民堤民修之例責成墾户五年大修一次按田出夫合力疏濬報聞是月授雲南總督兼管巡撫事務九年四月疏報東川府阿壩租地方開採銅礦試煎一月獲銅四萬餘斤上奬為甚善之舉十年三月加太子少保十二年三月授雲貴總督七月奏言貴州在在苗疆簽設土辨原為綏輯苗民豈容私收濫𣲖甚至串通蠧役藉端嚇詐查苗猓雖種類各殊皆具人心如果撫馭得宜自不至激成事變臣嚴飭苗疆文武毋許滋優至苗人滋事率由漢姦勾結臣飭令地方稽查倘有外來姦匪入寨煽惑者立即擒拏究治奏入諭曰此所謂中肯綮之論也實力為之十月疏言黔省思州等府與湖南接壤今辰沅一帶飢民百餘人赴滇挖蕨度日彼地秋收既薄被災諒不止此百餘人恐交冬以後乏食貧民來者益衆採蕨不足資生臣仰體皇上愛養黎元至意即飛飭貴州布政使糧驛道於偹公銀內動銀三百兩差員星往思州會同地方官按大小口每名酌給三個月口糧銀兩以資接濟並飭查明續到人口即一體散給安置上嘉之十五年正月授東閣大學士兼禮部尚書三月加太子太保十六年三月卒遺疏上諭曰張允隨簡任中外宣力有年忽聞溘逝朕心深為軫惻應得恤典察例具奏旋賜祭葬諡文和范時繹范時繹漢軍鑲黃旗人大學士文程孫兵部尚書承勳子初授佐領遷參領雍正元年正月授馬蘭口副將二月擢總兵四年四月詔署兩江總督八月遷正藍旗漢軍都統五年六月調鑲白旗漢軍都統皆仍署總督疏言江南通州地勢西髙東下河水由江入海以通州為咽喉必水口深通蓄泄得宜則泰州如臯均受其益通州運河入海之口凡三處觀音壩逼近大江地屬浮沙鹽倉壩之水髙於江水俱難建閘惟唐家壩舊存閘基距江二十里中間稍淤請行修復旁有兩小閘一律開通改為石涵洞於農田水利有益十二月奏將江蘇安徽各州縣應徵丁銀勻入地畝內徵收以雍正六年為始均從之先是給事中許承宣條奏揚州水利敕下時繹等定議六年二月覆奏五塘久淤成陸民墾為田難以改挑惟塘內溝汊築土壩截水塘外帶子溝烏塔溝槐子河可以挑通接運河之水以灌兩岸民田至串場河為髙郵寶應江都泰州興化鹽城如臯等州縣湖河入海尾閭年久未挑海口浮沙仰靣河身淺窄急宜挑浚而下河七邑興化地最窪諸水匯歸分流東注又梓新車路白塗海溝界河等俱應疏深俾直逹場河其場河自泰屬富安場至鹽屬伍佑場王家港牛灣等處並宜深挑又泰州城北鮑家壩之運鹽河應築土堤劉莊之青龍橋鹽城之石䃮口天妃口廖家港草堰口如臯之苴洋黃沙洋宜增建石閘董家溝徐家涵等處應設涵洞以資宣泄三月疏言江屬蘆洲坍漲不常丈勘之年以漲補坍致彼此混淆請將兩江蘆洲田地遴員清丈分劃疆界錢糧案件酌歸附近州縣管理均下部議行是月擢户部尚書仍署總督六月條奏兩淮鹽務七事一各竈燒鹽處令商人舉幹練殷實者按場酌用數人設竈長巡役查核鹽斤多寡盡入商垣以杜竈丁私賣一各場大使將入垣鹽斤按月册報巡鹽御史衙門察核一州縣場司設十家保甲遇私販據實首明治罪私鹽變價分别賞給誣者反坐徇隱州縣場司官照例議處一兩淮所轄隔省鹽務案件請飭湖廣江西河南各馹鹽道督緝就近審結一兩淮地方遼濶私梟易於盤據飭官辨兵役巡查緝拏一場員雜職賢愚不等請令督撫將所屬場官甄别留任餘請揀發家道殷實之候選同知等員管理場務一貧民許負鹽四十斤於不銷官引地方易米度日如有假託運送窩囤嚴拏治罪又言漕標廟灣鹽城二營沿海汛逺兵少稽察難周請於射陽湖口窈子港增守偹把總各一兵二百沙船八分撥遊巡部議從之七月上以蘇松等處盜風不息巡撫陳時夏不以時嚴拏懲治范時繹戢盜之才亦覺不足詔將江蘇所屬七府五州盜案俱令浙江總督李衛管理七年詔發帑銀交各督撫提督營運濟兵江南督標兵千一百七十應領銀六千時繹慮標員有侵擾弊奏請將應領銀承買入官變價房産交坐落州縣官招租解總督衙門發中軍以偹惠濟上嘉其妥協時李衛訪得江寧有張雲如者以符咒惑人謀不軌遣遊擊馬空北齎文提拏而時繹及按察使馬世烆回護失察咎又曽與雲如往來輾轉關查不解八年二月衛疏劾之命尚書李永升會鞫得實解時繹任論世烆罪雲如等伏誅五月命時繹協理河東河務七月河東總督田文鏡參時繹於伏汛時安坐誤工請革職嚴審諭曰范時繹乃一旗員朕念其為勳臣之後加恩擢用諄諄訓誨望其克紹家聲乃在江南總督任內玩愒廢弛因循茍且無一察吏安民詰姦禁暴之善政且其居心行事詐偽不誠巧令朱鴻緒在朕前奏其操守廉潔至於日食不敷朕聞之惻然動念急令江南江西巡撫等為伊籌畫飬廉之道及查明之後始知伊於應得之項原係收受並不至於艱窘而朕猶欲俾其用度寬餘仍令加增以與之無非成就其操守使之専心殫力於封疆也乃浙江地方漸藏匪類生事不法蠱惑人心朕令李衛悉心查拏又密諭范時繹務必慎密拏解勿使漏網豈料范時繹袒護私交縱容匪類竟有與馬世烆通同作弊之事各犯供據鑿鑿不能掩飾朕又密諭李衛於審訊定案之時留意保全勿使罹於重罪蓋猶諒其交結黨逆之心不過贍徇情靣之所致且范氏一門現今為大員者止范時繹范時捷兩人耳勳臣後裔漸至零落朕心不忍所以委曲成全之者至矣范時繹到京朕不肯令其罷斥廢棄特命料理大平峪吉地工程以為效力自新之路適因北河總督不得其人於是命伊前往膺兹重任伊出京之時朕靣加訓勉伊自陳感恩悔過願圖後效情詞懇切豈料范時繹下愚不移以本身専司之務又當伏汛危急之時田文鏡所委各員俱上緊搶護而范時繹安坐於旁竟同陌路視國事如辨髦視民命如草芥此等負恩溺職之愆在他人尚且不可况范時繹之身乎著革職將一切工程交伊加緊防護俟伏汛過後拏送來京將伊從前所犯罪案悉行查出從重定擬具奏部議歸於張雲如案內論斬十一月奉旨釋放授鑲藍旗漢軍副都統十年四月授工部尚書兼鑲黃旗漢軍都統七月兼管刑部事尋命兼管兵部事不必再兼刑部十一年兼內務府總管十二年上以時繹玩愒性成革尚書任十三年四月侍衛保柱又以時繹行賄銷事恭奏詔交部治罪尋遇赦釋放乾隆六年卒楊廷璋楊廷璋漢軍鑲黃旗人世襲佐領雍正七年由筆帖式授工部主事遷員外郎中十一年遷廣西桂林府知府乾隆二年遷左江道十五年擢按察使二十年遷湖南布政使二十一年擢浙江巡撫二十二年上南巡賜以詩曰監司經久任自是悉民情要以能倡率寧惟貴潔清艱難九年蓄生聚五方盈飢溺吾心切勤哉撫恤誠諭曰西湖之水海寧一帶田畝藉以灌溉今聞沿湖多有占墾將來湖身日漸壅塞海邑田畝有涸竭之虞於水利民田均有未便除已經開墾成熟者免其清出外嗣後不許再行侵占廷璋尋奏此項田地多礙水道若仍準存留恐日漸淤塞請概令開挖歸湖照蘇堤式沿岸栽桞以防侵占根株盤結亦可固堤上嘉之二十三年三月奏請仁和錢塘蕭山三縣江塘照海塘例以二十丈為凖按假編號立石仁錢二縣江塘除民房堤岸外餘二十餘里照海塘例每二里設堡夫一建堡分防從之九月諭曰户部據楊廷璋咨梁詩正現在丁憂應否仍在家食俸因為具奏請旨甚屬非體現任官員遇有事故尚即停俸其在家食俸者自不待言此非為節用乃教孝之大經也國家優眷臣工特昭異數梁詩正曽以尚書協辦大學士豈每嵗必需較此俸入者料梁詩正身為大臣且現處苫塊中必不至鄙陋見小若此楊廷璋或據地方官之請輒為咨部則不惟不知大臣養廉之義且獨不為梁詩正稍留地步耶楊廷璋不免有心徇情著交部察議尋議降二級留任二十四年三月奏言台州府屬太平縣黃巖場沿海未墾沙塗徹底清查於適中地立界迤南者歸竈迤北者歸民築塘試種户以百畝為率分限起科可得腴産十萬畝得旨嘉奬四月授閩浙總督十一月奏言內地洋船赴畨貿易每冒混請照臣飭屬查明换給的實姓名年貌執照查對相符方準放洋回棹時人數缺少即嚴究勒限追回以杜越販偷漏諭朂其實力整頓十二月奏言臺灣榖賤妨農內地歉收民人每偷渡就食查禁終難盡絶不若酌寬米禁內地米增價必平減應請往來臺厦之橫洋船每船準販米二百石榖倍之糖船照例準帶食米六十石米船自臺灣鹿耳門出口收入泉州厦門編號給照開報米數令商及船户呈驗繳銷如所議行二十五年奏請水師副將參將照陸路例不準以本省人補本省缺遊擊都司守偹等官照陸路守備例以隔府别營缺題補部議允行先是督臣楊應琚因臺灣地近畨飭查勘按界挑溝築土牛以杜私墾至是廷璋奏請酌定章程一彰化縣沿山畨界車路旱溝外各有溪溝水圳山根為界其無溪圳處則挑溝築土牛為界淡水廳一帶前僅於隘口立石今酌依山傍溪並挑溝堆土分界一彰化縣沿邉定例畨地聽畨自墾如新截入彰化界內廣福藔等十四處並舊界內廣福新莊等五處及新舊界內兼有之萬斗六一處應照例還畨耕管但畨黎少諳耕鑿佃民又遷移失業今酌議除畨民自耕田均照産管業升科外至桞樹浦一處該畨得價賣出應入官其廣福藔等處以各社通事土目為管事以各墾户為佃人照臺例分别納租餘粟勻給衆畨一彰化沿邉設隘藔十處淡水設十八處其守隘兵糧彰化於該畨社租粟內撥給淡水向無租粟各社曠埔未墾者尚多應查出報墾以資隘丁口糧疏入報聞二十六年三月奏言鳳山縣屬阿里港諸羅縣屬斗六門地扼要請將鳳山縣萬丹縣丞移駐阿里港臺灣縣新港司巡檢移駐斗六門從之五月廷璋同福建巡撫吳士功參奏提督馬龍圖借用公項銀聞臣等察知往盤將銀數歸補應照知人欲告而自首例減等定擬上責其辦理錯謬於馬龍圖舞文掩飾置之不問究係先出何人之意著據實明白回奏廷璋覆奏定案時係臣主稿而審辦則吳士功為政敕革士功職發巴里坤效力廷璋革職從寬留任又參奏黃巖鎮總兵林洛受網户贓𣲖兵代為守網致淹沒兵丁並揑報匪船掠劫命革林洛職定罪如例二十七年上南巡賜以詩曰西粵昔開府南閩今建牙兼知亦舊制勝任得卿嘉政有羣黎感身無大耋嗟老成方倚賴調攝意須加十二月奏言湖州府藉太湖為尾閭今烏程長興所屬漊港淤淺請開濬寬深俾歸太湖港口詔如所請行二十八年十月加太子太保十二月授體仁閣大學士仍留總督任二十九年三月奏言晉江縣屬之西倉地處海濵乾隆五年移駐同知一員距縣窵逺請將同知移駐石獅街較西倉更為適中從之時廷璋來京陛見福建水師提督黃仕簡奏厦門索出入船隻陋規文武衙門朋分收受請簡大員清查上命尚書舒赫德侍即裘曰修前往尋查得廷璋令歷任同知代購物未經發價狀諭曰舒赫德等查訊道府廳縣供有與總督楊廷璋墊買物件銀兩此項並非黃仕簡前奏溫泰所開總督一萬巡撫八千之本文係屬案外支節但既經訊出自不應置之不問舒赫德等應向溫泰究詰一切收受實據如果該督一萬之數實無指證而現在墊買之項特係府廳以陋規為之墊辦在該督原有應得之咎朕亦不能為之回護即審擬之大臣亦安得謂之吹求督撫等以上司而派委屬員即已自干不合况價值更有賠墊情事既確安得復貸其處分現令該督回閩舒赫德等可就近詳悉核對不難立見分曉即楊廷璋亦不能稍存諱飾也六月舒赫德等奏仕簡所開一萬八千之單屬虛洋行所開督撫衙門八千圓係行户年例貼費其各員代廷璋買物貼價亦係各員名下陋規不在八千圓數內諭交部嚴加議處解任來京候旨尋議革任奉旨從寬授散秩大臣諭曰楊廷璋令屬員代買人參珊瑚珍珠等物衆供僉同固已毫無疑義若不加之懲創則他省或致效尤滋甚豈可為訓朕特念楊廷璋年齒就衰平時尚能實心任事不忍遽加擯棄此朕格外加恩薄懲示警十月授正紅旗漢軍都統十二月授工部尚書三十年六月署兩廣總督三十一年四月小鎮安土司怕懷隘外有被交址攻散之沙匪竄入官兵緝獲廷璋奏俟審明押赴隘上照會該國王遣頭人公同正法未幾交址夷目報該國隘口聚匪搶掠現督兵擒捕懇內地堵截廷璋復奏聞派將辨嚴守卡隘不使外匪竄入諭曰楊廷璋此論似是而實非交址素屬恭順謹守藩服原不宜無故加兵即其現在勦捕夷匪並未干涉內地亦不過攔其竄逸而止設夷匪竄入隘口自當協力擒捕付彼處分以示懷逺之道或交址兵目藉緝匪為名擅至邉境滋擾豈可輕縱不究僅以驅逐出口了事又或內地人犯逃匿彼境即應向其索取倘索而不豫即當聲其罪而追攝之又豈可置之不問乎此等邉地夷情惟應審度事理之當辦與否因時制宜若務為持重鎮靜之説則飬癰貽患其弊有不可勝言者將此通諭各督撫知之五月崖州定安岐黎紏衆滋擾客民廷璋檄鎮道擒捕治罪奏杜後患事宜一客民久居黎地有田園廬墓者自為一村編保甲立甲長稽查約束一錢債非違例取息令欠户清還重利盤剝者追餘息充公禁客民入黎放債一民黎交易飭附近州縣汛地設墟場定期交易一令黎洞總管曉諭熟黎普行剃髮一貢木貢香𣲖總管黎頭運聽地方官選買給價一凡出入黎洞之人盤詰明白放行遇催徵錢糧公事票差黎頭飭令交出禁差役入黎滋擾得旨允行七月奏言鎮安府屬小鎮安土司原設土巡檢職微難以控制應與歸順州湖潤寨州同一併裁汰改設鎮安府通判駐劄小鎮安整飭化導宣化縣那南寨與金城寨相近併歸金城巡檢管理即以那南巡檢改為湖潤寨巡檢小鎮安之南隴連山地險僻請於界連安南及土富州之那波者賴者欣等三村各建卡撥兵怕懷大隘近安南為小鎮安門户應撥兵巡緝添設把總一打靣梁壤接滇省應將南燕山一卡移建以資扼要部議允行十二月命赴永昌助理軍務三十二年二月奏言總督楊應琚疾已愈臣遵旨仍回粵東三月授刑部尚書三十三年正月命紫禁城內騎馬廷璋時年八十御書協中延慶額賜之八月授直𨽻總督加太子少保十月奏言正定縣城西南近河向築堤壩今秋滹沱驟長逼城應於斜角堤頭增築新堤五百七十六丈至柏棠閘止環抱禦水並拆修護堤掃壩斜角堤東接築挑水壩五座河神祠前築魚鱗壩俾河流仍復舊軌又奏言藁城縣東北滹水汕刷應自西北城角起順岸築掃工三百六十丈用排樁葦掃鑲築堅厚掃後加築土埝保護城垣又奏勘任邱沿淀情形楊各莊等處極窪水漲難泄請改種稻田文安大窪東靣界連大城縣舊有堤埝滹滏盛漲注子牙河水髙堤頂宜加倍修築文安積水未涸應於龍潭灣等處開堤泄放並從之三十四年正月請撥通倉米十二萬石運各災屬平糶詔加恩撥二十萬石以為加賑糶借之用四月奏言滹沱河故道由晉州之東張岔口東流經束鹿之木邱傾井等村入深州歸衡水縣入滏陽河合流岔河由束鹿之小王村至冀州亦會入滏河乾隆二十四年南徙由束鹿西南之曹家莊至寧晉縣之營上村歸滏河以至舊河淤墊束鹿向距河逺上年滹水盛漲河行故道木邱傾井等村復成巨浸河靣寬深間有應裁灣取直處已開挑完竣惟束鹿護城堤埝年久坍塌亟應修築奏入報聞十二月奏言四旗廳現存米萬九千餘石久貯虞致黴朽熱河廳應購米萬三千餘石定價每石一兩九錢九分不敷採買查四旗原買米價每石八錢四分請將四旗現存米撥給熱河既無需增價而四旗又可照原價稍盈於兵糈帑項有益詔如所請行三十五年春上巡天津賜以詩曰總督而兼巡撫事歷來保定此掄賢八閩威望原騰舊三輔循聲俾繼前練士安民惟要矣疏河導淀尚勤旃春巡本務兹殷示供帳寧當謂力宣閏五月以北運河一帶淺阻請將運通船糧酌留天津北倉命截留二十萬石七月奏言武清東安寶坻寧河永清香河六縣雨多被淹貧民待哺甚殷復請將被災六分以上者八月內先普賑一月俟冬初加賑並請照例兼用銀米其米即於天津截留漕糧內動撥從之詔再撥通倉米二十萬石部庫銀五十萬兩以資分給尋奏言各屬常平榖尚未買足今嵗天津舊欠復經蠲免各州縣倉厫所存尚恐不敷得旨加恩撥通倉米二十萬石俾得寬裕賑給貧民口食益資接濟九月奏言唐三營官倉向貯米萬二千石乾隆四年熱河總管巴圖奏定五年一次運至熱河喀喇河屯貯倉搭放兵餉仍將熱河同知添買兵米撥萬二千石運赴唐三營倉歸欵五年後仍照前運至熱河喀喇河屯倉往返徒滋糜費請將唐三營米於此次運喀喇河屯後毋庸再為撥抵將唐三營空倉歸熱河四旗二廳分貯採買米穀唐三營原設千總一兵三十移駐布逹拉廟又奏言古北口為畿輔重鎮兵糈向藉口外販運應請撥熱河廳穀六千石四旗廳榖四萬石喀喇河屯榖一萬四千石運古北口建倉存貯并移駐滿缺同知一員經理停密雲縣採買兵米即於古北口倉內動支並允行十月奏直𨽻各屬需賑銀約八十餘萬兩前所撥不敷得旨著加恩於部庫內撥銀三十萬兩又奏滹沱河向設嵗修之項因河流南徙停止今河又北徙請仍撥項購料隨時修防奏入報聞十二月奏言熱河應買明嵗兵米時價稍昂請撥八溝米運熱河偹用俟來年價平買補還倉從之三十六年八月奏言蒙古遊牧地方向禁民墾而克什克騰隙地無礙遊牧蒙古兼可得租飬贍請照土默特佃種收租例除礙遊牧者不準私墾餘聼自便廷議允行十月授刑部尚書十一月恭遇孝聖憲皇后八旬萬夀廷璋與九老之列賜遊香山十二月卒三十七年正月諭曰楊廷璋久任封疆老成歷練前因年逾八旬畿輔事繁恐未能巨細周到是以用為刑部尚書見其精力尚未頽邁於部務自可從容經理乃去冬偶感風痰遽聞溘逝深堪軫惜著加恩晉贈太子太保應得恤典察例具奏尋賜祭葬如例諡勤慤范時綬范時綬漢軍鑲黃旗人大學士文程孫雍正十年由筆帖式補户部主事纍遷即中乾隆十三年授山東濟東泰武道十五年遷安徽按察使十六年五月遷湖北布政使十月署湖南巡撫十七年九月疏言湖南常平倉榖廷議照雍正年間除額存七十萬二千餘石尚溢五十五萬餘石前撫臣開泰奏準以三十萬石另案存貯偹鄰省及本省賑恤以草五萬石糶價存公上年撥榖十萬石協濟安徽應俟解還糶價日買補惟是湖南上年歉收平糶之穀及本年減價糶濟之穀均應籌補若再將撥運安省榖同時買補民貯必少查湖南應糶溢榖尚存二十萬石請以十萬石撥補協濟安省原額餘穀十萬石一併歸入另案存貯其安省解到糶價歸藩庫報部撥用上嘉之十月疏言城步江華綏寧三縣苗疆要缺沅江縣瀕洞庭湖臨湘地當孔道向給飬廉六百兩辦公不敷請於地僻事簡之醴陵平江二縣各酌減飬廉二百兩武岡州安仁新化石門慈利永定等縣各酌減一百兩分增城步等五縣養廉疏入報聞十八年九月疏言鳳凰廳舊貯榖萬石建倉石羊哨地方兵民借糶以山路維艱又倉厫不敷現貯榖七千石缺額三千石未經買補而鎮筸鎮土苗雜處並無貯積請將應買額穀三千石於鎮筸鎮建倉存貯支領較便得旨俞允又疏言長沙等處未報升科田畝已委員丈量照例起徴湘隂益陽等縣續查出私墾千餘頃均瀕洞庭旱嵗間獲收成一遇水漲呼賑籲免無補正供請照峯頂湖澤之隙聽民耕種例暫免升科俟成膄壤日起徴至洞庭為受水之區私垸日增則水口日逼上流受害已飭將垸田礙水道者勸諭拆毁存案嚴禁添築俾水得暢流報聞是月調江西巡撫十九年以病疏請解任諭留任調理二十年二月上以巡撫任重事繁恐時綬精力未充致滋貽誤命來京陛見旋以病免二十一年十一月起授户部侍郎二十二年授正黃旗漢軍副都統二十三年七月署正白旗滿洲都統十月奏請赴西路屯田效力賞戴花翎馳馹前往二十四年八月副都統定長劾奏副都統滿泰貪婪敗檢及時綬役兵漁利狀命御前侍衛安泰往會審訊滿泰貪婪屬實時綬家人藉端營利時綬不知情所開店房用官匠一餘皆自雇並未役兵諭曰滿泰情罪確實已命於該處正法范時綬係特差辦事之人理應潔已奉公乃營私求利即治以重罪亦所應得但較之滿泰尚可少從末減著革職交與定長令其效力贖罪二十五年由闢展運羊至阿克蘇賞參領銜二十六年六月由烏魯木齊運羊至伊犁並懇辦送回空駝隻後仍赴伊犂效力諭曰范時綬前因解送阿克蘇羊隻妥協曾賞𠫭領職銜此次更屬奮勉著加恩授頭等侍衛烏魯木齊亦有應辦事務仍在原處行走不必又往伊犂二十八年詔回京二十九年授鑲藍旗漢軍副都統三十年閏二月授吏部侍郎六月往哈爾沙爾辦事三十一年正月授左都御史仍留辦哈爾沙爾事三十二年五月授湖北巡撫十一月召見上以時綬奏對時神氣短弱恐於封疆重寄難任煩勞命留京另用三十三年三月授正白旗漢軍都統六月授左都御史三十四年補公中佐領三十五年閏五月授工部尚書三十六年二月調刑部尚書十月命專辦正白旗漢軍都統事務四十七年卒子宜恆現官正藍旗漢軍副都統署工部侍郎英廉英廉內府漢軍鑲黃旗人姓馮雍正十年舉人由筆帖式授內務府主事乾隆二年命往江南河工學習補淮安府外河同知六年丁母憂服闋補直𨽻天津河捕同知十年遷大名府知府十四年總督陳大受委查民典蒙古地畝十五年三月擢永定河道六月總督方觀承參奏五月三十日南岸三工大堤淤溝掃鑲被沖水泛月堤英廉匿不報聞六月初二日猶稟稱各工保護平穩及淤口刷寬復稟稱淤溝於初三初四日形勢漸變汕刷堤頭揑飾回護貽悮要工請旨革審英廉以南岸三工於五月三十日淤溝漲滿月堤漫開本日即行稟報六月初二日水漲開放十壩加築子堰復稟報各工保護平穩係指上下兩岸各工而言並未指南岸三工而言至十六年五月讞久未定觀承復以英廉輾轉遷延疏請特遣大臣查審命尚書舒赫德往鞫尋奏英廉供稱上年五月三十日到工大堤淤溝汕刷月堤衝開因思大堤淤口堵築尚易所以祇報月堤漫溢非有心揑飾至從前供詞支吾實因畏罪非圖狡賴查英廉與廳汛各員上年汛前並未將淤溝先事預防致水漲掃鑲衝刷溝頭坍卸已屬疏忽其原稟內不言正壩已開轉稱鞏固無恙不言月堤衝刷由於正堤先開轉稱月堤因風雨衝漫咎實難辭應將堵築漫口銀著落英廉勒限分賠諭曰據尚書舒赫德會同總督方觀承查審永定河道英廉揑飾悮公一案英廉身任河道隄工乃其専責遇有衝決實無所辭咎但其初報月堤漫口而諱言大堤衝刷或係希冀潛行堵修以圖完局該督據稟即應一靣查明一靣具奏乃方觀承上年六月初二日奏摺內祗稱一應工程平穩並不將月堤漫口之處據稟入告亦未必不思以無事為福是以英廉得輾轉翻變日久延挨朕彼時早鑒於此即以報災不可存粉飾之意批示方觀承亦應服朕之洞燭隱情自知引咎矣至摺內稱英廉未將淤溝先事豫防以致大溜直注此語殊未足服英廉之心伊到任未及兩月淤溝即有疏忽亦係僧保住任內之事未可以此為英廉罪案朕辦事一秉虗公既確見情形如此不可不明白宣示然以督臣劾一道員自恭自審何難任意輕重竟行入罪定案仍懸案經年未敢回護已見遽為審結俟特遣大臣前往會同查辦是其心尚知所警畏亦朕辦理庶政務求至當不容稍存含混之明驗也英廉等已經革職所有糜費工程銀兩自應照例分賠還項未幾命在髙梁橋迤西稻田厰效力尋授筆帖式十七年授內務府主事歷遷戶部員外郎吏部郎中二十年兼佐領二十一年調戶部銀庫郎中二十二年兼辦提督衙門事尋調户部郎中二十五年擢內務府正黃旗護軍統領二十六年二月授江寧布政使兼管織造事英廉以父年老懇留京命賜二品銜十一月授內務府大臣二十七年三月署户部左侍郎兼管三庫事務九月實授左侍郎二十八年丁父憂八月命會勘順天府屬及宣化永平遵化旗地核定租額二十九年諭曰英廉奏確查佃戶一摺甚為得理即著英廉錢汝誠會同該督詳悉妥辦務俾農民均霑實惠三十年兼署錢法堂事三十一年疏奏丈出盛京旗民餘地請旨飭辦命將軍府尹定議三十三年管崇文門稅務及武英殿事務三十四年二月諭同尚書記庸等總理津送出征𬗟甸兵事宜十二月充經筵講官三十七年以鞫實雄縣知縣胡錫瑛劣欵擬罪寬縱降一級留任三十八年三月充四庫全書館副總裁四月署步軍統領九月諭奬其辦理送兵妥協議加一級是月遷刑部尚書兼辦户部侍郎正黃旗滿洲都統事務十月授議政大臣賜紫禁城內騎馬三十九年七月太監髙雲從向左都御史觀保侍郎申保倪承寬吳壇泄漏道府記載侍郎高朴奏聞諭曰英廉係內務府大臣於內廷諸事最為熟悉此等情事豈有不知乃髙朴尚有見聞豈英廉竟得諉為不知朕開誠布公以待諸臣而諸臣轉不能竭誠盡力以圖報效清夜自思良心安在英廉著革職從寬留任復以審觀保等四人交結髙雲從罪刑部擬斬候過當諭責英廉另議九月留京辦事四十年諭曰日前總管內務府衙門奏商人義和泰呈請展限交銀一案是日召見金簡詢係何人收呈奏稱不知何人數日後復召見邁拉遜詢及此事奏係六阿哥收呈交衙門公辦又數日復詢之英廉則稱忘係何人所收衙門中同辦一事豈有不知呈所從來及遺忘何人收呈之理不過邁拉遜據實覆奏而英廉金簡不免含糊隱諱耳蓋英廉金簡在內廷年久心靈曉事明知阿哥不應收呈恐言之於阿哥有礙故不肯明言殊屬非是英廉金簡著交部嚴議尋部議革任命寬免仍注册四十一年正月署戶部尚書兼署協辦大學士十一月時英廉年七十賜斗南介景額四十二年三月署步軍統領充纂修日下舊聞考總裁五月充翰林院掌院學士四庫全書館總裁尋命協辦大學士十月調户部尚書仍兼管刑部事務疏請將內務府筆帖式照吏部例三年考試一次分優劣升黜下內務府議行四十三年疏言直省督撫提鎮等標額設馬步守兵遇有軍流遣犯銅銀餉鞘過境均須護解盤費及修補軍裝器械各費向於兵餉攤扣營辨藉端扣派請將各省朋扣銀暫停一二年入撥分標營生息永作差費下軍機大臣議交直𨽻督撫約計該省每年差費若干於間欵奏給得旨允行四十四年暫署直𨽻總督四十五年三月諭曰英廉係內務府漢軍人協辦有年著補授漢大學士缺仍管理户部事務四月以失察書吏作弊革職留任四十六年正月暫署戶部尚書及步軍統領事十一月暫署直𨽻總督疏稱直𨽻大州大縣多虧空俱非近年所積若及時籌辦限以四年尚可彌補命新任總督鄭大進會同軍機大臣核辦四十七年二月以審擬甘肅鎮迪道巴彥岱受賄罪扶同率結議革任詔寬免三月署步軍統領四月以恭祀雩壇祝版筆畫糢糊下部議革任命免其革任降級仍注册八月加太子太保十月復署直𨽻總督疏言直𨽻各倉賑恤後儲穀未能足額請將天津北倉截存漕米九萬餘石撥補如議行四十八年正月奏直𨽻未完耗羡尚有實欠在民銀三萬餘兩詔加恩蠲免七月以病疏請開缺諭在家專心調養不必開缺八月卒諭曰太子太保大學士英廉老成練逹奉職恪勤翊贊綸扉總司讞典實心宣力倚毗方殷春間偶聞患病即遣醫診視並屢經降旨諭令加意調攝以冀就痊近因病勢轉增懇請開缺復降旨令以大學士在家專心養病尚冀痊愈後仍照舊入閣辦事今聞溘逝深為悼惜著派散秩大臣一員帶侍衛十人前往奠醊並加恩入祀賢良祠仍賞銀五千兩俾治喪事其任內降革罰俸處分均豫開復應得恤典察例具奏賜祭葬如例諡文肅范時紀范時紀漢軍鑲黃旗人大學士文程孫乾隆八年由廕生分工部學習補員外郎十三年管理街道廳尋升兵部郎中十五年授廣東糧驛道十六年署廣東鹽運使未幾實授十七年署按察使二十五年引見諭曰范時紀以俸滿送部引見念該員為漢軍世族現在伊家並無大員范時紀著留京以副都統用六月署鑲紅旗漢軍副都統十月實授二十六年三月授工部侍郎十月疏言工部各項工程掌印同各員一體派辦但掌印有稽查稿案之責兼派工程既難留心稿案且遇工程緊迫差分兩地責無專成請嗣後但於散走司員內揀派四司兩庫掌印不必兼派如該員辦事實心稿案無誤凡遇保題保送先儘揀選又尚書秦蕙田奏準派委工程宜分别銀數多寡以郎中等官籖派到任未及一年者扣除伏思一年中既未經歷練則一年外豈即能熟諳請嗣後到任未及一年者除緊要大工不派外其滿郎中員外在一百兩以內主事五十兩以內筆帖式三十兩以內估驗承修各工均令簽派俾隨時學習漸次諳練俟一年期滿後一體𣲖辦詔如議行二十七年奏京南霸州文安固安寶坻天津靜海滄州青縣等處地低遇水多之年即廣種秧稻水小仍可布種秋禾黍稷即不能皆成稻田或行於數縣數村亦不無禆益應增隄埝處所一體添築以護民田資宣泄務使溝洫深通如有急公捐築者豫以議敘并即以工代賑諭曰此不過以近來一二年間雨水稍多竟似此等地畝素成積潦之區殊不知現在情形乃北省所偶遇設遇冬春之交晴霽日久便成陸壤蓋物土易宜南北燥濕不能不從其性倘將窪地盡令改作稻田當雨水過多即可藉以瀦用而雨澤一歉又將何以救旱從前近京議修水利營田未嘗不再三經畫乃始終未收實濟可見地利不能強同亦其明驗但范時紀既有此奏著將原摺抄寄方觀承閲看或有可以隨宜酌採者該督細心籌議具奏尋觀承議京南惟霸州東北煎茶鋪等數村及文安之畢家房朱家莊等十數村保定府屬安州之壘頭村新安縣之馬家寨近濱窪地俱宜稻遇水歉仍聽種黍粟固安寶坻等處未便概施從之三十年調倉場侍郎三十二年調户部侍即三十四年兼佐領三十六年六月以恩賞八旗兵丁鰥寡孤獨錢糧時紀未經詳核含糊入奏議降三級調用詔從寬留任十二月奉命祭告太昊伏羲氏陵三十九年兼署禮部侍郎尋仍調倉場侍郎四十一年三月疏奏臣前赴通惠河查看沿河縴道修艌船隻閲各閘所换閘版儘可改作橋梁之用不堪改作亦應變價歸公隨檢舊案向無回殘且未定更换限期除慶豐平上平下過水關等四閘舊板向俱改作大通橋朝陽門東直門三閘閘板照舊辦理外至通流普濟並下遊之南浦減水等四閘每年更换新板舊板並不改用亦不變價殊屬糜費請將通流等四閘舊板即作為本年應换橋梁之用不準另開工價實在不堪改作者亦令坐糧廳驗明變價為添置新板之需并將各閘閘板定限五年外令坐糧廳驗明結報更换下部議行四十二年調禮部侍郎四十三年正月諭曰范時紀年力漸衰不勝侍郎之任著以副都統用尋卒欽定八旗通志卷一百九十三
