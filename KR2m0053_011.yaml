body:
  text: 欽定四庫全書欽定八旗通志卷首之九敕諭三雍正年間雍正元年三月十八日上諭下五旗旗下官員兵丁原不在諸王阿哥門下看守行走朕與大阿哥曾經奏請始令看守其餘並未具奏亦盡皆倣效今不得復行如此且旗下官員亦不敷用著撥回旗下當差行走三阿哥門上者亦著撥回若即行撤去或有不便之處亦未可知著都統等詳議令諸王具奏特諭雍正元年三月三十日上諭八旗各佐領下私行科派殊非善事貧乏兵丁所恃以為生者惟在錢糧嗣後凡佐領下一應公中事務概不許私自派取若有擅行私派者即以作弊治罪將此著八旗都統等知之特諭雍正元年七月二十八日上諭八旗蒙古人等仍遵守蒙古本務為善朕今給限三年令其學習蒙古語如學至三年有不能者一槩應升之處俱不準録用將此傳諭八旗蒙古人等知之特諭雍正元年八月十六日上諭凡奏章內稱臣稱奴才俱是臣下之詞不宜兩樣書寫嗣後著一槩書寫臣字特諭雍正元年九月十五日上諭八旗事務甚屬緊要都統副都統內有在皇考時因其宣力行間擢用之大臣者看來伊等於旗務並不辦理惟以曾經效力為足倚恃殊屬不合伊等雖出征著有勞績然得功牌者已登簿册得傷者已加賞賚應授官職者已經議授官職且擢用伊等原為辦事豈徒以其宣力行間之所致耶伊等不可不知也嗣後都統有奉差四五日者著即題請署理之人或命本旗副都統或另派人令其署理特諭雍正元年九月十八日上諭嗣後八旗著各當值一月每月將應當值之旗下大臣等職名開列具奏俟朕派出一人承管八旗公辦事件及傳集立稿等事若於齊集之時有不到者於會議摺內不必列其職名特諭雍正元年十月初七日上諭比見護軍等仍然競尚服飾朕閲兵丁並不在於衣服嗣後禁止兵丁等毋得以服飾相爭尚特諭雍正元年十月十五日上諭嗣後凡查富户將從外任丁憂及無罪致仕回京者永逺免其行查如一並行查徒令不肖都統參領等借端取利於事甚屬無益且將伊等俱派富户則人如何能做好官自降旨之後若仍有詐索等情定行治罪特諭雍正元年十一月二十七日上諭凡旗人內有借貸籍沒家産人之銀兩者如已定有限期於限內作速完結如未有定限著勒限完結至於兵丁內果有無力償還者恐或濫行扣其錢糧若遇有此等無力償還之人著各該旗詳查據實保送內務府總管傳集伊等當面查訊奏明特諭雍正二年二月初二日上諭八旗文武官員人等國家念爾等祖父皆屬從龍舊臣著有勳績故加恩後裔量材授官冀收心膂驅策之效爾等自當恪守官針勤勞王事建股肱之盛烈垂清白之家聲庶幾上以仰報君恩下以顯揚世美乃每見旗員居官賢否雜出不能悉體朕意由筮仕之初輒謂旗人與漢人不同漢人無纍可以硜硜自守旗人則本旗官屬需索多端親族往來責望甚衆萬一任滿又不免有當差之纍自此念一起百弊叢生不以忠君體國為心不以曠職殃民為懼潛通賄賂恣意苞苴惟期囊槖之充盡喪亷隅之守殊不知國家察吏亷者奬貪者懲滿與漢無二法也爾等果能潔已奉公始終一節休聲丕著惠政日開朕自當從優擢用以示奬勵凡所過慮皆可不必如其不然則法網難寬縱家擁厚資安能坐享乎至於爾等家世武功業在騎射近多慕為文職漸至武備廢弛而由文途進身者又祗徼幸成名不能苦心向學玩日愒時迄無所就平居積習尤以奢侈相尚居家器用衣服飲饌無不備極紛華爭誇靡麗甚至沉湎梨園遨遊博肆不念從前積纍之維艱不顧向後日用之難繼任意糜費取快目前彼此效尤其害莫甚朕特加諄諭自兹以後出仕者各宜精白乃心靖共爾位人人以亷能自矢不得藉漢人無纍旗人有纍之説以遂其罔上行私之術八旗子弟各習其業文則潛心制義博覽詩書務求用世之實學武則嫻習弓馬講究韜略預儲閫外之良材苟謀一業必思一業之成則人無廢業將授一官自獲一官之用而國無曠官矣且各崇儉戒奢安分循禮父以戒其子兄以誡其弟與其恣情縱意博一日之豪華何如量入為出謀百年之生計與其蕩檢踰間作無藉之匪類何如謹身寡過勉有用之事功以報朝廷以綿世澤以敦風俗以保身家顧不美歟大雅之詩云凡周之士不顯亦世蓋欲疏附先後之子孫亦世世修德與周匹休也爾八旗皆佐命後昆深願克紹前修榮名悠逺國家亦重有賴焉其各欽承毋忽特諭雍正二年三月十八日上諭朕因八旗拖欠庫銀前曾降有諭旨其後朕御乾清門又向八旗都統面降諭旨大臣等俱已知其式樣乃遲之既久並未查明具奏正白旗都統拉錫甫授伊為都統於兩月之內即將該旗庫銀徹底清查所奏甚詳朕但令一二人償還其餘盡行寬免此即將朕之滿洲成就之功也賞伊拜他喇布勒哈畨尚為過薄且將正白旗式樣已經交與大臣等並未照依具奏只鑲藍旗多羅貝勒阿布蘭曾將減半償還之處奏聞今朕之所以降此旨者欲令知悉並非欲令多償銀兩豈獨正白旗之人係朕之臣下他旗之人皆非朕之臣下耶伊等専於巧飾隱瞞借貸庫帑仍領俸銀乃猶推諉不還此等人豈可寬免若不懲治則從前償還之人轉屬不合矣將此一二人責令償還以愧之者欲以為後人鑒戒使不敢仍然作弊故也且朕將數百萬銀兩俱已豁免豈有惜此數萬銀兩之理將朕此旨詳諭八旗都統等知之特諭雍正二年三月二十一日上諭鑲藍旗所有親王二郡王二世子一貝勒一鎮國公一輔國公三所開伊等領過俸銀只一萬餘兩或伊等有罰俸扣俸之處應將情由注明不然將未領俸銀之人不開其名亦可今既併開未領俸銀之人其所領俸銀之數又甚少參雜並列甚不明白難於查閲因王等皆係朕所知者是以看出若官員兵丁所領之銀亦似此參雜書寫如何查閲嗣後八旗有以此等事件具奏者俱著明白開録特諭雍正二年三月二十八日都統富爾丹等以拖欠新舊公庫銀兩事件具奏奉上諭據爾等奏稱原任察哈爾副總管阿思哈尼哈番碩塞名下所借銀兩僅扣俸銀一季遂因罪住俸未曾清還所欠銀一千四百三十兩碩塞故後伊子襲職因年幼未曾當差無俸可扣於是奏請寬免此即不明白之處朕之所以施恩但可寬免指俸借銀無罪人內之不能償還者若將因罪住俸之人槩行寬免則有罪之人轉得徼幸是乃斷然不可寬免者也此外若仍有因罪住俸未經償還者其住俸幾年之處俱著查明務令畢償不準寬免再拖欠公庫銀兩未清之旗分內有似此因罪住俸者亦俱查明將令其償還之處議奏爾等如此瞻顧希圖徼幸之人所奏事件朕必詳悉查明斷無輕易閲過之理特諭雍正二年四月初五日上諭朕以八旗滿洲等生計時廑於懷疊沛恩施其妄行過費飲酒賭博於歌場戲館以覔醉飽等事屢經降旨訓誡即諸臣條奏所請應行禁止之處亦已施行令其禁止凡朕所降諭旨及各項禁約務須將其利弊詳行剖析明白書寫於旗下每佐領各頒一張嚴示衆人各都統亦宜時加訓誡謂主上廑念八旗滿洲等生計種種恩施不一而足各宜安分謹守儉朴之道力改妄費賭博醉飽於園館等事洗滌惡習求副主上降旨訓諭仁愛之至意倘不實心感戴不學為善不遵法度必且一生徒自暴棄不但終於下賤且無益於生計而有害於其身任主上作何恩施何益之有况主上頻勞心慮諄諄訓飭者係為誰哉爾等誠宜省悟日夜仰戴歡然遵行凡滿洲儉朴之道及清語騎射當差行走操演技藝嫻習禮儀等事皆當盡心努力學之或有不改前愆不遵法度之人一經查出務必從重治罪以警衆人并將此語書寫不時傳示稽察始為有益不然但於朕降旨時暫申禁令久而遂輟亦何益哉將此傳諭八旗都統等知之特諭雍正二年四月三十日八旗漢軍都統副都統等奉上諭爾等議奏公庫及一切虧空錢糧事件朕俱閲訖夫懲勸之道甚為緊要頃者朕所賞賜寬免銀兩不下數百萬豈有惜此無多銀兩之理朕亦為法律計耳此等之人若不定其處分則不肖之徒何由知所戒懼爾等所議有令入辛者庫之語其中有係五旗王等包衣佐領辛者庫之人伊等之人既在辛者庫似此又以何罪治之爾等將此公同會議或應發遣黑龍江或應發遣船厰如議令入辛者庫將此等人之子孫永不敘用不許為官一切考試捐納等處俱行禁止登記檔案其巧於隱瞞産業之人至入辛者庫雖悔亦無及矣若實係産業俱盡不能聊生者令入辛者庫俾得錢糧反為有益於彼再此所議之處內有應於他旗互相催追者亦明白查核即如爾等漢軍旗分所應催追等事大臣等父與參領參領又交與佐領徒有其名於事無益希圖朦混塞責如此則事何由得結誠如馮國相明白辦理理宜議敘官職以為旌奬如本身亡故即加恩及其子嗣再石文英馬三哥等俱係瞻徇情面將不能償還者即著令伊等賠補伊等若再不能賠補之時即將伊等妻子亦入辛者庫爾等將此逐一明白分析議奏如此則一二年間此等事件俱得明晰而嗣後亦斷無此等事件矣特諭雍正二年六月十二日刑部將毆斃家人之護軍九哥照例定擬具題奉上諭覽九哥毆斃家人達子一案達子並無凶惡别情只緣酒醉之故伊主即行毆斃殊屬暴戾九哥著枷號三箇月鞭一百達子之母與伊妻所供之詞甚屬可憫俱著從伊主家開放嗣後遇毆斃家人事件詳其情罪分作三等定例議奏刑法者上關天和下係民命實為治之要也朕御極以來讞斷必加詳慎務期當罪而得其平惟明克允所以體天心而重民生也向來八旗官軍人等待家人過嚴微小之失必加毆責甚至傷體斃命以致奴僕畏懼逃遁者頗多奴僕至於背主而逃即緝拏追獲亦難信任使令夫奴僕雖賤彼亦人子况性命攸關何得任意荼毒致其無容身之地耶朕於刑部成獄除強盜故殺謀殺等犯不得不依律正法其餘罪犯略有可恕者俱行寬免從未降旨特殺一人朕大君也於有罪者尚不忍輕殺一人臣下乃可毆死無辜之奴僕乎且奴僕奔走服役勞苦殊甚兼其質本愚昧易獲過愆全賴上之人矜恤原宥即有酗酒為非之人雖應加懲治亦不宜過重致於死地以逞一時之憤暴該部即行文曉諭八旗嗣後務宜待下以寬不得擅自毆死家人以副朕仁愛生人之至意特諭雍正二年七月二十三日辦理船厰事務給事中趙殿最請於船厰地方建造文廟設立學校令滿漢子弟讀書考試等語具奏奉上諭文武學業俱屬一體不得謂孰重孰輕文武二者兼通世鮮其人我滿洲人等因居漢地不得已與本習日以相逺惟賴烏喇寧古塔等處兵丁不改易滿洲本習今若於此崇尚文藝則子弟之稍頴悟者俱専意於讀書不留心於武備矣即使百方力學豈能及江南漢人何必舍已所能出人之技而習其不能及人之事乎我滿洲人等篤於事上一意竭誠孝於父母不好貨財雖極貧困窘迫不行無恥卑鄙之事此我滿洲人之善行也讀書者亦欲知此而行之耳徒讀書而不能行轉不如不讀書而能行之人也本朝龍興混一區宇惟恃實行與武略耳並未嘗恃虛文之粉飾而凡厥政務悉吻合於古來聖帝明王之徽猷並無稍差不及之處觀此可知實行之勝於空文矣我滿洲人等純一篤實忠孝亷節之行豈不勝於漢人之文藝蒙古之經典歟今若崇尚文藝一槩令其習學勢必至一二十年始有端緒以至武事既廢文藝又未能通徒於其間成兩無所用之人耳爾等理宜遵朕從前所降毋棄滿洲本習之旨専令兵丁人等各務實行勤學武略以敦儉朴之習何必留意於此等無有實效之處以二兵丁之心強其所不能徒事於虛名也此皆妄聽發遣罪人內稍能識字之匪類不顧大體肆言搖惑之所致耳豈但建立文廟考試生童即立學亦屬多事果能盡心鼓勵有成得材勇卓越者數人備朕之用俾為侍衛大臣保障國家收股肱之效較之成就一二駑劣無能貽笑於衆之生員以備朕用者逺勝也將朕所降諭旨及此奏請之處曉諭烏喇寧古塔等處人等知悉並行知黑龍江將軍共相勉勵但務守滿洲本習不可稍有疑二再通行京城八旗人員知之在京滿洲人等與盛京烏喇等處之滿洲不同文武二藝俱為不得不學之事如果二者兼優之人朕必重用但人之能精一藝者尚少二者俱優自必更少矣倘不能造詣是徒於其間成一無用之人也滿洲子弟雖教以讀書亦不可棄置本習果有可學之子弟務須加意教訓俾其精詣優通或雖令學習不能望其精詣者仍應令其學習滿洲之武略騎射勿但崇尚文藝以致二者俱無成就而以滿洲之武略為可鄙也惟我滿洲本習純一篤實忠孝亷節之行所宜敦勉特諭雍正二年八月二十二日都統拉錫以二等侍衛武爾登額越分妄用引馬之處參奏奉上諭這所奏甚屬可嘉舉國大臣悉宜如此留心整飭國法竭誠以輔助朕躬此事豈可謂伊妄行告訐發人細事不能推廣主上寬仁専引君於刻薄耶凡此賦性卑鄙諂媚畏縮市賣國法欺瞞君父専私其身全不為國姦偽險惡罪不容誅之小人等妄行議論無理之言何足顧慮大臣等悉能仰副朕旨遵奉國家法度隨在整飭何患事無成效倘有不應禁止事件國家大臣悉有陳奏之職理宜奏請罷其禁止且其禁止事件皆係大臣等所議行者乃視之如戲仍有恣意違禁妄行之人大臣等雖目覩其事竟佯作不知笑而置之是何道理朕實為大臣等羞之大臣等如各引大義遵奉朕旨勤勞公務亦聽爾等如存心甘為卑鄙姦偽欺君賣法罪不容誅之小人則朕亦無可奈何二者任大臣等自擇而行可也將朕此旨通行曉諭八旗文武大臣官員特諭雍正二年九月十三日上諭凡驍騎校之兼在執事人處行走者因該佐領下事務緊要由執事人處退回在各該佐領下辦理事務此事曾經有人條奏其中或有營求請託之人亦未可定都統等不可以其由執事人處退回遂不審其賢否遇署參領缺出濫行保舉夫參領之職甚屬緊要必試之以辦事劣則糾參果係賢員於升遷列名之時務將從前在執事人處行走因兼驍騎校奏明退回緣由聲明具奏著將此旨通示八旗特諭雍正二年十月初五日上諭凡祭祀之時或朕躬親祭或遣大臣致祭著將兵丁習射演放鎗炮暫且停止俟過祭祀之時再行操演將此傳諭八旗特諭雍正二年十一月十五日上諭八旗人等人君撫馭羣下如父母之於子保惠愛恤之心無所不至然必為之計其長久如不為長久之計雖疊沛恩施未有不終至於匱乏者朕自即位以來凡加恩於爾八旗者不為不多如恩詔內凡披甲炮手步軍及京城之當差效力者屢次賞給一月錢糧上三旗內務府佐領下執事人俱賞給一月錢糧其出征大小官員則賞給半年之俸出征塘汛兵丁則賞給一月錢糧盡免其所借銀兩八旗舉人生員則賞給銀米資令讀書又特頒諭旨八旗所欠公庫銀兩槩行豁免每旗添設養育兵丁錢糧四百六十分八旗鰥寡孤獨每月給銀一兩米一斛又發帑金八十萬兩交諸王大臣生息以賞給八旗喜喪之用凡曽出兵而年老殘疾無倚靠者給與俸祿錢糧贍其終身盔甲弓箭俱賞給銀兩製備上三旗侍衛窮苦者每月賞給馬錢每旗一百分護軍校驍騎校令在京倉支米省其腳價九門門軍皆以滿洲兵丁充補又於南郊則有賞祭厯代帝王廟則有賞祭陵則有賞又軫念八旗人等生齒日繁令分居圓明園鄭家莊熱河寧夏等處俾遂生養又特開井田以為八旗養贍之地而八旗之因公詿誤革職者則免當苦差八旗之另户領催馬步兵間散無升路者則試其翻譯繕寫以八品筆帖式用各部院無品級筆帖式無力捐級者亦以考試量給品級又特開翻譯科考取生員舉人進士又令滿洲得與武科生員舉人進士以取人材又設立義學以廣教育蓋所以憫爾等之勞苦恤爾等之窮困資給爾等之衣食成就爾等之功名者亦既委曲周詳靡不備至然亦須爾等謹身節用克儉克勤以副朕懷朕在藩邸四十年凡爾等艱苦之處纎悉曲折無不周知惟其念爾等之切愛爾等之深故必為爾等計其久逺若一時漫為非分之施國用既不能繼而爾等輕易妄費立見其盡終屬無益朕之諄諄訓誨者非欲以恩澤示惠以結爾等之心使樂於驅使也誠欲爾等體朕保惠愛恤之苦心庶幾人人自愛朕方將次第經理務期生養安全俾爾等家給人足子孫安享太平爾等宜咸知朕意特諭雍正二年十二月初十日八旗大臣等將奉特旨施行及條奏準行事件內有無成效之處公同會議具奏奉上諭爾等所奏甚是但內有兩事無益一事尚未著有成效等語凡條奏事件所以交與爾等議者特欲爾等據理詳議爾等彼時不加詳究遽議施行兹又徒云無益並不將原奏事件情由與爾等如何議行及現今如何無益之處申明如此則不知之人必謂朕遇有條奏輒交爾等施行矣今將爾等所奏無益之事明白分析另摺具奏嗣後凡交與大臣等一應事件著各該旗詳究擬議再與八旗會議某旗所議當理即照某旗而行如不便畫一即兩議具奏或一二旗有另議處各將另議之處奏聞俟朕閲定特諭雍正三年三月初二日兵部帶領左翼軍政卓異官員引見奉上諭爾等宣旨與八旗大臣保舉卓異乃伊等一生大事並非升進官階之可比也果將漢仗好曾經效力應保之人薦舉方為合宜如平常稍覺去得不至應保者伊等或受請託入於其間朕必將徇情薦舉之人治罪特諭雍正三年三月初三日兵部帶領右翼軍政卓異之侍讀學士兼副參領桑格等引見奉上諭部院官之兼武職者必多優員但由該旗將伊保舉其在部院衙門行走如何之處該旗大臣並不得知似此等兼武職之文員入於各部院衙門分內遇京察時令其察核再昨日引見之監察御史嶽爾岱等亦著照此例行特諭本日八旗都統等又奉上諭爾等八旗將雍正元年以來朕所辦理旗務及降旨指示改定一應事件俱另立册籍著為定例遵行以備查考於事殊為有益嗣後八旗內有一旗奏請事件應將朕所辦理之處一併知會八旗著為定例照依遵行如此則八旗一應事件庶不致有參差而可以畫一矣特諭雍正三年三月初十日正紅旗漢軍都統髙其佩將該旗舉人王文明監生丁士鴻等補授驍騎校之處請旨具奏奉上諭凡驍騎校缺出定例俱於本佐領下揀選補授嗣後遇有缺出若本佐領下無可補之人著請旨於該旗揀選引見補授將此旨宣示八旗滿洲蒙古漢軍都統等令其一體遵行特諭雍正三年三月十三日署理正白旗漢軍都統希爾根因奏事入見奉旨佐領于珩年逾七十為何故將伊發遣奏稱于珩原當庫官多用庫銀為此題參發遣奉上諭嗣後年逾七十之人若罪應發遣者著另行具奏爾即轉交該部將于珩速行取回併將此旨傳諭八旗大臣等特諭雍正三年三月二十八日總理事務王大臣等奉上諭大臣等之家人互相黨比結為兄弟鑽營請託之處甚多大臣等彼此和洽其請託固不待言如彼此不睦家人從中或為調停或為激怒千態萬狀各欺其主以圖己利伊主為其所惑不能辨别是非反為家人所用而忘己之利害大臣等誰無任使之人往往聽信家人之言行事獲罪敗名不可勝數此朕數年來所深知亦衆人所共知也此等事大有關係不可不嚴行禁止著交與步軍統領五城官員凡大臣等之家人如有嫁娶筵席延請親友等事令各稟明家主然後舉行倘有私結黨與約為兄弟彼此會飲請託事件者即行嚴拏具奏朕必重治其罪再諸大臣之妻互相筵請宴會為樗蒲之戲借此夤緣請託大臣中現有為伊妻所制凡事依允者甚屬可恥大臣等宜加防範茍以此為小事漫不加察遂致敗名獲罪慚愧豈有大於此者且國家大臣若不能約束妻奴如何辦理國家之事將此通行八旗曉諭諸大臣各宜加意嚴行約束特諭雍正三年四月初八日上諭看來新滿洲蒙古等艱於子息者大都為出痘所傷此亦無力種痘之故耳新滿洲蒙古侍衛官員等有未經出豆之子弟欲行種痘者著告知太醫院交劉聲芳看好時候派種痘之醫生令其診視若痘疹科醫生不敷用著奏請添取特諭雍正三年四月十八日八旗滿洲蒙古大臣將各項虧欠錢糧不能賠補之人議罪具奏奉上諭此內或係現任或係廢官若本身虧欠者係欠何項錢糧併如何議罪之處開明另奏其餘因祖父虧欠錢糧將子孫治罪者槩行寬免將寬免伊等緣由登記檔案一應升遷引見之處俱將緣由申寫其將家産抵補永行坐扣俸祿錢糧與限年坐扣之處依議將房屋交與旗下酌量辦理以備該旗公用地畝交與户部查明給八旗之貧乏人等耕種井田將來亦即賞給八旗之人耳其賣家人銀兩報明户部存貯該旗另行請旨朕將此旨令其查明應治罪者治罪應寬免者寬免並非為此數萬銀兩也量此無多房屋地畝能值幾何今亦俱賞給旗人矣但從前居官之人不守官針肆將國帑侵克隱瞞以益私囊既各虧欠任內錢糧積有年嵗並不交納又全無畏懼者皆仰恃我皇考之寬仁乃敢如此朕若再加寬容聽其流而不止不但有傷禮體且有關於國家之政教也朕但欲整飭國紀俾匪人知所懲戒故自即位以來憐念八旗滿洲實為根本屢沛恩施不一而足若但恤之以恩不治之以法度使歸於正必不可也國家垂統萬年之道我皇考之治理俱關於朕之一身朕所以屢朂諸臣者亦特為政治之故耳且八旗人等朕加賞一次輒用數十萬銀兩再各省人民欠錢糧數百萬朕俱豁免豈惜此數萬虧欠之銀此等虧空侵蝕之輩與拖欠錢糧無罪之民得邀豁免者不同特欲整飭法紀懲創不肖作後人警戒也朕仰體皇考至仁之心將此次治罪之處暫行寬免嗣後大臣官員等若仍怙前行勿復希冀如皇考之仁愛寬容矣朕必按其罪犯據法處分特諭雍正三年六月初七日上諭目今天氣炎熱紫禁城內凡該班處之領侍衛內大臣前鋒統領護軍統領護軍參領侍衛班領侍衛以至護軍校等有年逾六十五嵗者俱著停其直宿之班伊等所該之班令年少人代為直宿有應行奏請派出者即著奏請派出紫禁城內凡守門看堆子之護軍等有年逾六十嵗者亦著停其直宿之班伊等之班令年少護軍等代為直宿俟過三伏至秋涼時再令各赴該直宿之班天氣炎熱早晨大臣等奏事出入之際看門之護軍等令其照常穿衣至午後脫袍繫帶稍為納涼亦可特諭雍正三年七月初八日上諭支放八旗兵丁米石原有定限現今雨水稍多恐車輛難行著展限一月嗣後支放兵丁米石如遇雨水多時即令展限一月將此永著為例傳知八旗及倉場衙門特諭雍正三年七月初十日上諭近聞八旗不肖兵丁有妄造重設公庫之言宣揚議論者此等妄造語言搖惑衆人之匪類爾等務應留意嚴緝以除此惡習前知公庫之無益故令停止至今公庫之事繁冗混亂尚未完結豈可重行設立大臣等誠謂重設公庫大有益於兵丁可保其立産業朕即令設立從前滿洲人等雖不能咸各饒裕凡遇出征行走俱係自備並無遺誤之處此皆由其平日節儉勤於生計故其家資皆足自給今兵丁等錢糧較前加增一兩又有馬銀計其所得已多於七八品官之俸祿即此有能謀生之人儘足其用矣看來兵丁等妄行過費衣服無制不念生理如此奢靡何所底止今雖加以賞賜又妄行糜費不過數月罄盡無餘依然如故有何益處當以兵丁等之永逺生計為念也大臣等俱有教育旗人之責兵丁等即如諸臣之子弟所當奬善懲惡有蹈於惡習者挽之使回今大臣等欲令兵丁節儉永逺不致匱乏或禁止服色或作何辦理之處不必急迫各抒謀畫務須盡善會議之時詳悉籌度擬令允協具奏特諭雍正三年七月三十日正藍旗滿洲都統等以宗室汝福佐領員缺將補授佐領之處具奏奉上諭此佐領雖屬阿拜専管然原管之人已經子孫纍世管理若以為阿拜所管之佐領一任宗室等擇令佐領下之人管理則一人之子孫得纍世管理乎所謂専管者惟管轄其人耳取其纍世承襲之佐領可乎將此佐領若不究明即令宗室管理朕意有所不忍日後亦致紛紜不止此一佐領凡類於此之宗室佐領朕於王內派出二人會同爾等明白辦理令宗室等亦得明悉伊等之原由其屬於宗室之佐領下人理宜敬重伊等如妄行藐視宗室即可參劾治罪宗室之待佐領下人亦不可妄有所為如宗室等有王公鎮國將軍等職皆其分內所當效力之處乃與佐領下人爭其佐領轉卑鄙矣將此遍諭伊等爾等不可袒護宗室亦不可遽以佐領下人為是須據理辦之特諭雍正三年八月二十四日上諭鑲紅旗察哈爾地方之拖沙喇哈畨阿敏道懇請在京效力行走因令阿敏道在京居住既令在此居住並無産業何以為生將阿敏道於三等侍衛分內照依新滿洲例房地奴僕及一切應用等項俱行給與嗣後似此自各處來京準其效力居住之人皆照此給與特諭雍正三年九月初八日鑲紅旗都統多羅果郡王允禮等將誤火班之官兵查參具奏奉上諭嗣後八旗大臣查出該旗一切應行參奏事件即行參奏其奏過之大臣等將職名與事件緣由併奏過幾次之處於嵗底彚奏以聞至於未經查奏一次者亦著陳明既為大臣各將所司之事不時稽察嚴加參劾乃分所當為不然諸凡俱不以為事但作好人則法度蔑如矣或以此為苛刻發人細事而議論者亦有之皆朕所深悉也將此傳示八旗特諭雍正三年九月十三日領侍衛內大臣公馬爾賽等奉上諭宣旨與大學士八旗大臣等嗣後或奏事來圓明園或奉朕宣召若遇雨雪大風嚴寒即不必來與其至此將預備引見等事奏請停止不若自家中不來之為善若已到有一半即將到來者奏聞其未及到者令其回去於次日帶來亦可若次日仍然雨雪不止大風嚴寒尚有他日亦何誤事之有衝冒寒冷徒令人勞耳特諭雍正三年十月初五日多羅果郡王允禮多羅順承郡王錫保奉上諭八旗漢軍內有平居孝友守分讀書之人考試既不獲中式而捐納又無資力者爾二人查明分别挑選其上三旗包衣旗鼓佐領下人令內務府總管保奏其王等包衣旗鼓佐領下人令各該王保舉如此即人不至於壅滯而亦可得才能之人矣特諭雍正三年十二月二十日大學士馬齊尚書法海奉上諭朕前曾降諭旨著八旗將嵗底所奏黃册於十二月初間具奏八旗畫一繕寫今既遲於具奏而八旗之册又書寫各異有照依他旗式樣書寫者亦有任意自行書寫者彼此並不畫一爾等同裕親王廣寧傳集稽察旗務御史將此八旗奏册令其閲看有無錯謬之處俟其看畢爾等再行詳看於其中擇一式樣善者呈覽嗣後即照此式樣於每年嵗底繕寫具奏再前令八旗輪班當月者蓋欲事件速行完結不令堆積之意其當月大臣但圖茍且過去至下月交代自謂其責已塞所行如此因而事件益至堆積遲誤矣從前朕於八旗派御史八員令查旗務其當月旗之事件不曾交與是以伊等未行稽察今交稽察旗務御史將以前當月旗之事件於限內已完結未完結之處一併稽察其一月所承接事件若干已完事件若干未完事件若干俱著查明如有逾限堆積等事一經查出即行參奏特諭雍正四年二月初四日八旗大臣等奉上諭今年直𨽻地方雨水過多以致禾稼歉收所恃者河南山東之榖今值種麥之時其收穫與否尚未可知河南山東雖有榖米亦暫且存貯不肯糶賣因此京師米價騰貴是以朕將三月應領米石令其於二月支放現今已經開倉但因米價騰貴八旗兵丁冀得髙價將米不行留餘盡皆糶賣於第三季領米之前必至乏食其時又行倍價糴買兵丁人等何以為生現今麥之收穫與否尚未可知而秋糧之必得安可恃乎此等之處俱係爾八旗大臣等之専責理宜留心爾等將此公同曉示兵丁嚴加禁約計抵腳價之費許其糶賣於第三季領米之前每日所需之米令其存留始為妥協但如許兵丁豈能按户稽察爾等可交所屬參領佐領驍騎校等令其嚴禁如有將米盡賣復買米而食者查出定行懲責事無有要於此者大臣等務須永行禁約再八旗大臣等宜將各旗兵丁嚴示法紀申明禁令從前朕屢降諭旨令緝拏坐地虎光棍等惟拉錫將坐地虎拏獲奏聞此外更無人矣今聞坐地虎仍然如故兵丁等於看守之處不行看守轉將看守物件肆行偷盜殊干法紀即如籍沒年羮堯家物件看守之人已經盜去似此可乎爾等嚴行查拏務令剔除爾等若不嚴加查拏今朕亦交與步軍統領令其緝捕彼時若係某旗地方定行處分朕不能為旗下大臣等寬也再參領者係次爾等辦事之人甚屬緊要現今部院司官朕俱分别閲看爾等將八旗參領副參領俟朕回宫時一日著一旗預備引見朕亦照閲看部院官例詢問伊等令其互相保舉優員將劣者革退其革退員缺大臣等惟當抒誠秉公將人舉奏朕即照伊所請補授年少副都統等並無所事亦可兼辦參領之事特諭雍正四年三月二十二日上諭人臣事君須明大義固不可矯情立異尤不可挾私黨同習氣陷人流而不返每至乖於大義皆由察之不早挽之不力也八旗漢軍向來惡習好通聲氣凡內外文武官員無論平素識與不識一登仕籍必信息相通互相袒護雖其初意不過矜名圖利然積久不改種種偏私固結害正誤公漸成大惡矣夫立身事主豈有二理若果能孤介一秉至公自然能獲乎上否雖竭盡心力徒然敗品喪名而且犯義攖法况此輩邀結原非至誠利則同爭害則各避究何益乎夫同此固結之心也於君則為忠於友則為黨忠則為君子且賞亦必及之黨則為小人而罰亦必及之雖至愚之人亦未有不欲為忠良之君子而甘為匪黨之小人以避賞就罰者也毫釐之差天淵之判可不慎歟或有云人非聖人誰能無私又云瞞上不瞞下此等陋諺不知出自何典爾等既登仕籍奈何為此市井無賴之談以自絶於聖人而願為有私瞞上之人耶况朕之才識未必不及爾等從前局外旁觀三四十年矣一切情態知之甚悉汝欲瞞上而上究不能瞞汝不瞞下而下實互相瞞也深可憫歎漢軍中公正不阿之人朕皆委任信用深荷恩榮如楊宗仁一生持身剛介雖既沒之後尚屢邀朕恩亦未見受孤立之害也爾等若咸能實心遵朕訓諭效法正人必寵渥厥身慶流後裔若面是心非不能悛改惡習不但身遭黜罰此風不息後人效尤必且貽害子孫嗣後各宜公忠自立共絶攀依官無論崇卑惟盡已職事無論大小惟盡已心人人皆能孤介則衆孤介和合而成一德同風之盛矣勉之勵之特諭雍正四年四月初四日都統拉錫等以所奏事件內字樣錯誤請旨交部議處具奏奉上諭爾等認罪具奏極是蓋自知其過即可無過尚屬可嘉此係小事著從寬免爾等傳諭八旗都統大凡人之錯誤遺漏亦常事耳將錯誤遺漏之處奏明朕閲其事件應寬宥者即行寬宥若掩匿其非思欲潛行消釋勢必至僨厥事嗣後凡具奏事件內有錯誤遺漏之處著即聲明具奏特諭雍正四年五月十八日領侍衛內大臣等奉上諭朕思教育三旗之記名功臣子孫若令伊等在一處讀書則教授之人必不加勉而衆幼童聚於一處亦不得實在肄業將此內二十嵗以上曾習清漢書者爾等查明各與二兩錢糧米石令在部院為貼寫筆帖式果好令該管大臣保奏以筆帖式補用若二十嵗以上之不曾讀書者照護軍與四兩錢糧米石令在捕牲執事人處行走併給養馬錢至於伊等優劣自可得知果有優者即可用為侍衛或補授官職其十九嵗以下者如在家能延師教訓無庸併及其餘每月與四兩錢糧以為延師肄業之費此次恩施爾等不必將大臣之子孫又行分别務令一體均沾併交伊等父兄令將子弟之文武學業加意教訓俟伊等至二十嵗時奏聞朕所以如此施恩者凡欲成就功臣之子孫也伊等父兄理宜仰體朕意各自諄切教其子弟庶伊等之文武學業俱得漸進於成就矣朕若不加恩伊等何由得上進行走之處特諭雍正四年六月十三日八旗都統護軍統領副都統等奉上諭從前八旗護軍俱由京城往暢春園換班行走朕念其往返之間稍覺費力特發帑金數十萬兩於圓明園附近蓋造房屋派護軍三千名居住以供圓明園之差役既有益於貧乏無房之人而在京之護軍又得免於往來行走之纍又念此三千護軍差役甚多是以疊沛恩施不一而足可見大君之賞賚皆非無故而漫加也聞得在京之護軍遂乃妄生怨望謂此三千護軍不啻登天自悔從前為何不懇告前往夫圓明園一應差役俱専責此三千護軍衆皆不與是則伊等既代衆人當差行走况又莫非衆人之兄弟親戚朋友也縱受朕恩較多衆人亦當歡然同於身受乃岐而二之致生怨望可乎今若將八旗護軍漫無分别一槩照依圓明園之護軍遍加恩養則國家帑項豈容濫施再圓明圓之護軍俱在一處居住閭里相接與在京之護軍各自散居者不同該管官員便於稽察約束俾得謹身上進莫善於此乃此內不肖之徒因不得肆意妄為又輒生誹議謂該管官員併管及其私務又謂早知如此何故告懇前來設使圓明園護軍缺出再由京城護軍內挑補則在京之護軍又必以管束太嚴皆懷畏憚不願前往矣我朝滿洲人等性情習尚從來質直凡關君上公務不計得失一意向前隨在矢誠效力若得則歡欣踊躍失則規避怨望此種惡習不特無之而且視為極鄙極可恥之事從未聞有似漢人等羣相聚處違抗長官憤怨誹謗者近來滿洲兵丁稍漸流入漢人之惡習矣爾大臣官員等宜將兵丁不時教訓曉諭其耆宿先進人等亦宜嚴訓子孫善導從輩將我朝滿洲廉善忠純之性情習尚斷不可令其日漓而日逺也夫習俗所關最為緊要即以此事論之其實由於愛恤兵丁方加恩養乃在京之護軍以不得一體遍霑致生怨望而圓明園之護軍又以管束太嚴思欲規避由是觀之滿洲兵丁之習氣大改於前矣爾大臣等所宜加意整飭者也不然則朕所以愛養兵丁之心轉於衆人無禆益矣衆人既不知感戴則朕之此舉為誤嗣後朕再加察看若在京護軍仍以朕加恩於圓明園之護軍為過厚朕即令回京照前由京城換班行走爾等可將此旨遍諭護軍俾各曉悟知朕加恩於圓明園護軍之處並非無故漫加則彼此歡洽無有怨言而朕亦樂於加惠矣特諭雍正四年十月十二日八旗大臣等奉上諭爾滿洲大臣官員等家中有延師教訓子弟者切不可為其所欺爾等未曾讀書知識淺鮮以不知之事詢問於彼伊等係讀書之人自然所知較多將其所知者稱説爾等輒驚異而優視之因此遂行欺誑爾等或以事夤緣或妄論人之優劣爾等必須留心詳察其言行之間稍露此迹即應逺之若果係讀書之人何不出仕乃在各處教書為業使所學果優亦必不能掩也且現今教書之人俱係毫無所能希圖糊口之輩必有藉此營謀射利而妄為者爾等甚宜留心將伊逺之諸事防間勿為所欺將朕此旨遍告大臣官員等咸使知之特諭雍正四年十月十六日八旗滿洲蒙古都統等奉上諭爾等會同九卿奏稱滿洲蒙古漢軍並包衣佐領下人等有犯軍流罪者皆應與民人一體治罪之處甚屬得宜夫王公犯法與庶民同罪何况滿洲間散人等但滿洲蒙古漢軍等生理迥别念其發往漢人地方較之漢人更苦是以暫不準行以觀衆人之情狀滿洲蒙古之性情從來質直犯法者少今素習漸漓伊等不知軍流為何罪仍以枷責等常刑視之而輕犯者居多爾等將朕愛惜滿洲蒙古之意詳為曉示嗣後如各守分修身不但不罹軍流之罪雖犯枷責亦可獲免如仍不改惡習不顧顔面與頑民一體頻干罪譴不能遵守朕之訓誡恩綸不愛身命致犯軍流之罪彼時朕亦無可如何與民人一體治罪爾等詳為曉示不時開導特諭雍正四年十二月二十七日上諭滿洲本性原以淳朴儉約為尚今漸染漢人習俗互相倣效以致諸凡用度皆涉侈靡不識樽節之道罔顧生計因酌定品次禁止服色勒限一年令其各按品次服用降有諭旨甚是明悉此特軫念八旗滿洲官兵如同保赤關係尤切故曲為籌畫定其品次以禁服色欲令日用充足非無故而禁止也或有無知之徒猥稱民人奴僕且並不禁止聽其任意服用何以禁止我輩等語又不識朕矜恤之意於禁止限內製作新衣誑稱是禁前所製若儘教如此製用則終無底止時矣夫民人奴僕有何關係安得與官兵比並即使伊等衣服華美豈遂較官兵榮顯乎須知並非為官兵等不及若輩爰有是禁亦為官兵等之生計而禁止耳人之尊榮不在衣服惟在各人行止蓋富足之人少而家本貧乏互相倣效之人多既已貧乏而又勉強倣效則生計愈窘矣衆人與其如此拮據於衣服豈若安守本分砥礪於學藝品行果能奮發黽勉得厯官階以至大僚自然得服用矣凡官員兵丁所恃以為生者惟在俸餉且各有應當之差若因製一衣服即耗費數月之錢糧其日用尚能饒裕乎夫儉約為持家根本不能節省於衣服等項焉能有益於生理若能謹遵朕之諭旨儉約自持不事奢靡濫用至比户漸臻充盈之時方感戴朕教養之深恩矣著交與各該管處再行曉諭八旗滿洲蒙古漢軍內府佐領官兵等務使咸知朕心各求儉約以副朕矜恤優待旗人之至意特諭雍正五年正月二十日上諭將軍乃邊境大臣一應動用之處甚多别省將軍俱已量給養廉銀兩惟奉天黑龍江船厰三處將軍並無養廉之項著將長蘆鹽課餘銀內動用六千兩分給三處將軍朕思旗下大臣及有職掌之官員亦宜量給養亷銀兩著動用兩浙鹽課餘銀一萬兩分給兩翼前鋒統領護軍統領前鋒參領護軍參領前鋒侍衛等冉動用兩淮鹽課餘銀二萬四千兩分給八旗都統以下至參領等特諭雍正五年二月三十日步軍統領阿齊圖摺奏拏獲大盜史五奉上諭此賊於三日之內拏獲甚屬可嘉似此等事件爾衙門應行記檔嗣後凡十日內將賊犯拏獲者爾衙門將所存之銀賞給以示鼓勵其官員紀録雖由兵部按例議給爾衙門亦應設立册籍嗣後凡有紀録一次紀録二次者存記明白以便稽察又聞夜間行走之人手執一紙口稱傳事即許其行走如此則不肖之徒詐偽朦混亦未可定著即傳諭八旗都統大臣若有夜間傳喚之事或用印文或用參領佐領鈐記關防方許行走如無憑據即以犯夜拏問治罪將此遍行曉諭斷不可輕易放過如此則夜行之人自然禁止矣特諭雍正五年三月初六日上諭兵丁等喜喪之事俱已加恩賞給銀兩看來大臣官員內有家資饒裕者亦有家計艱窘者其於喜事尚可若遇喪事倉猝之間必致窘迫無措嗣後八旗大臣官員內若遇喪事有情願借銀者著户部借給四個月俸祿至下季扣除若於未及扣除之前有緣事革職者除世襲官員外仍令其賠補如病故者著即賞給免行賠補其行取户部庫銀恐一時不能即得先將旗下恩賞兵丁銀兩給與再行取户部庫銀墊補特諭雍正五年三月二十六日上諭八旗都統奏事所奉諭旨有應鈐印傳示者有應口傳曉諭者有泛論者亦有並非朕旨而諸臣誤記者似此不論其應否登記檔案而概行登記者亦必有之著管理旗務之諸王都統等會同將記檔之諭旨查看其記載謬妄者是何意見嗣後八旗大臣所奉諭旨內有應傳示者俱各呈覽過再行鈐印傳示特諭雍正五年四月初六日辦理旗務王大臣等奉上諭驍騎校赫倫泰將行賄一事首出甚屬可嘉朕特示鼓舞賞銀一百兩紀録一次如此等賞罰之處爾八旗大臣宜遍行傳諭官兵等夫施以恩賞與加以處分並非為此一人而設蓋欲衆人知其為善皆倣效而行之知其為惡皆懲創而不行也若不明白曉示則人亦何因而以善相勉以惡為戒耶嗣後凡恩賞與處分事件俱著該旗咨送當月旗令其遍傳八旗再部院已結案內其恩賞處分有關於旗務者亦著咨送當月旗由當月旗傳諭八旗交該參領佐領等將施以恩賞與加以處分及一應禁約之情由詳行宣示俾皆曉然於何等事件即得何等賞罰之處庶人各知勉於為善亦可無誣妄揑造之論議矣若爾等奉行不留心加勉不遍諭兵丁朕將爾等該管旗內或官員或兵丁詢以傳諭事件若有不知者即可知爾等之不盡心矣特諭雍正五年四月十三日管理旗務諸王及滿洲文武大臣等奉上諭自古人生以節儉為本蓋節儉則不至於困窮糜費則必至於凍餒此理所必然者也本朝滿洲素性淳朴凡遇出兵行圍俱係自備並無違誤而生計各足近來滿洲等不善謀生惟恃主上錢糧度日不知節儉妄事奢靡朕將滿洲等生計時廑於懷從前屢曾降旨諄諄訓諭但兵丁等相染成風仍未改其糜費之習看來滿洲等不知節儉多有以口腹之故而鬻賣房産者即如兵丁等每飯必欲食肉市肉一斤其價可抵數日之蔬食以貴價市肉而食則一月所得之錢糧不過多食肉數次即行罄盡矣且口腹有何饜足其每日食肉之人豬肉既厭必更思别味如此每月不計出入隨得隨費以致失其生計且又將每季米石不思存貯備用但圖數日之肉食違背禁令以賤價盡行糶賣沽酒市肉飲食至於無餘則闔家匱乏彼時欲食無糧欲服無衣凍餒交迫仍自誇張謂我從前曾食美物曾服鮮衣並不悔悟所以致此困窮者乃以美食鮮衣之故也况飲食俱由習慣而成綴食美物不過一飽而已其他並無善處也現今肉價每斤值錢百文而貧乏之人仍復勉強買食若使衆人稍知儉約不每日買食則肉價自平可以賤價而得且兵丁等豈能每日皆得美食至食空飯之時不能下咽必又不免於蹙額咨嗟夫以上天所賜之飯食乃不欣然食之反以無肉為怨必致孽及其身而減其福祿今漢人謀生尚知節儉雖殷實之家而每日食肉者甚少其貧乏之人逐日謀食僅堪糊口若滿洲等果能節儉各視其分節於肉食每飯惟用蔬菜將每月所得錢糧少使留餘則日久習成生計自裕産業可立矣或有不肖之輩不守本分妄行糜費既至貧乏惟希恩賞從前皇考之時軫念兵丁效力行間致有債負曽發帑金五百四十一萬五千餘兩一家獲賞俱至數百如此賞賚未聞兵丁等置有産業生計滋益者悉由妄用於衣食徒令貿易之人得利一二年間蕩然無餘心愈奢侈而生計較前反加窘乏其後又發帑金六百五十五萬四千餘兩賞賜兵丁人等亦如從前立時費盡朕自即位以來除特行賞賜外賞給兵丁一月錢糧者數次每次所賞需銀三十五六萬兩此銀一入兵丁之手亦不過妄用於飲食不及十日悉成烏有亦何禆益且庫帑俱係國家之正項天下百姓之脂膏豈可無故濫行賞賚以纍百萬之帑項徒供伊等數日口腹之費乎若不將滿洲等不論多寡隨得隨盡之惡習令其改除朕即有施恩之意亦不可舉行爾豈不知之兵丁等果將朕訓諭之意曉然明晰實心遵行痛改妄行糜費之習咸各崇尚滿洲儉約之風節用以謀生則生計自遂朕加恩賞賜衆亦可得永逺均沾優然樂業矣若邀天眷佑衆皆勉遵朕諭感戴歡欣常加淬勵至生計各遂之時始知朕所以愛養滿洲之恩為至深且切也至於人之榮辱俱係於行止並不在於衣服飲食乃習俗既侈人不以妄用過費者為非反以節儉謀生者為鄙吝而譏誚之斯皆由平時之惡習既成以至難於更改也今使衆人如夢初覺如醉初醒惕然省悟將至越分妄費之人衆人皆鄙薄之則奢侈者亦必自止矣即王大臣等亦宜各從儉約以為下人之表率蓋在上該管之人如此行之則在下兵丁人等必皆效法知改即一時不能盡改而彼此交相勸勉行之既久自可挽此惡習兵丁等果能各知儉約節用錢糧預計將來思立産業則風俗漸成而生計饒裕不至有窮困之憂矣朕視滿洲最為關切乃國家之根本非其他所可比朕知之既深豈有不教之理且朕自即位以來衆人皆論朕為大嚴者斯亦由朕欲衆人痛改惡習進於善良止其奢糜使知儉約教育衆人俾得生計凡朕意慮所及之處悉申禁令而不肖匪類不得肆行其意故妄加議論即如朕曾降旨禁止飲酒酒者甚非善物飲之過多則能亂性因醉後鬬毆而遭罪譴者往往有之酗酒之惡無人不知將此禁止可以謂之嚴乎又曾降旨禁止賭博因賭博而破産者非止一人從未聞有以賭博致富者即使賭博能勝其損人利己之物亦斷無滋益之理且例有治罪之條此誠欲使衆人不失生計不干罪譴而禁之也又可謂之嚴乎又曾降旨禁赴園館行走奢侈之人延請賓客往赴園館一次即費數金兵丁人等有何産業如此過費何所恃以為生若惜此銀兩以養妻孥足支一二月之用此特欲止其妄費以裕其生計而禁之也又可謂之嚴乎又曾降旨禁止鬬雞䳺鶉蟋蟀之戲此等皆係無用之物一耽此戲則荒廢正務徒費心思雖家道殷實間散之人亦應學習文武技藝若耽於此戲以身為鬬雞䳺鶉等物所役使有何禆益以此戲為賭具致有破壞家産者其害更甚於賭博此特欲滿洲等罷無益之戲習於為善而禁止也又可謂之嚴乎又曾降旨禁止訛詐盜竊者夫訛詐盜竊之事良善之人斷不肯為俱係妄亂之輩所行之事此特欲使惡人知警良善獲安而禁之又可謂之嚴乎又曾降旨禁止雇人當差兵丁人等身既為兵領受錢糧則當差行走習學勞苦俱伊等分所當然理宜遇事向前勉力當差諸事習練乃有不肖之徒安於懶惰將銀雇人代為服役致誤差使罹於罪戾習成懶惰耗費錢糧毫無禆益之處將此禁止又可謂之嚴乎又曾降旨禁止兵丁不許妄行賣米給與兵丁人等米石者原欲其養贍一家老幼也乃有不肖兵丁但思食用貴價好物將所得米石賤價糶賣以至下月即有缺米者此特欲使旗人舉家不至乏食而禁之也又可謂之嚴乎又曾降旨禁放印子銀兩坐扣錢糧此等借放印子銀兩之人既經借給兵丁將每月錢糧盡行坐扣一任兵丁之家有何急務並不一月放寬徒令放銀之惡棍得計於兵丁毫無益處此禁止借放印子銀兩特欲使兵丁人等得其利益也又可謂之嚴乎又曾降旨禁典錢糧米石夫錢糧米石亦係兵丁終嵗所恃以為生者乃有不肖之人賭博妄費以致拖欠債負無力償還將錢糧米石賤價典當與人若行禁止則兵丁每季得米每月得銀足以養贍其妻子此特欲使滿洲等不致於飢寒而禁之也又可謂之嚴乎又曾降旨禁令喜喪等事不許妄費衣服各按品級夫貴賤有等服用有制越分服用不徒無益而家産亦盡耗於無用之地如奢侈者既經禁止則守分者自不強相效倣此特欲衆人罷糜費之習俾生計從容而禁之也又可謂之嚴乎又曾降旨禁用黃銅器皿夫制錢乃係國寶因其價昻於衆無益故行禁止今錢價既平衆人皆獲利益此特欲使兵丁用銀兑錢可以多得而禁之也又可謂之嚴乎又曾降旨禁止因公科派夫兵丁人等惟恃每月所得錢糧養贍妻子乃有無恥之該管官員假託公事科斂錢糧則兵丁必受其纍此特欲使兵丁等皆得全分錢糧而禁之也又可謂之嚴乎又曾降旨禁止鑽營請託夫請託鑽營之事必致背理犯法不惟是非顛倒而不肖之人不過徼幸於一時亦終不能免於罪戾此特欲剔除弊端使諸事就理而禁之也又可謂之嚴乎又曾降旨禁止臣工不可貪黷蓋官員既肆其貪婪則下人必至於窮蹙豈惟有玷官針亦且干冒國法如臣工果能亷潔則所屬多獲其益此特欲使各守官針而禁之也又可謂之嚴乎又曾降旨禁止要結朋黨夫結黨之人乃國家之亂臣賊子若不嚴加禁止一經事發必致多所殺戮若衆人知懼果能悛改非惟可保其身亦得全其家産此特欲曉諭衆人使罷朋黨之習以免於誅戮而禁之也又可謂之嚴乎凡係朕所禁止諸事悉為兵丁等身家計也此內何事不宜禁止且於朕躬有何關礙之處乃衆人雖生怨論而猶如此諄諄訓誨不已衆人咸應體朕苦𠂻何得更有怨言此皆係不肖妄亂之人不得肆行其意妄謂法令過嚴耳其守分畏法方正之人法令雖嚴於伊何礙且凡禁止之條咸係皇考從前禁止之事並非創始於朕但當時之臣工未能實意奉行開導訓諭所屬之人是以一應惡習未得盡改今朕特為兵丁生計不時令王大臣等教以節儉禁其奢靡訓誡諄諄而王大臣官員內仰體朕旨加意奉行者不過十居其五其餘大半尚未愜朕懷而無知之人遂論以為過嚴設使大臣等咸各遵照朕旨竭力嚴加訓飭則姦惡之徒又不知作何妄論矣如欲使若輩稱為寬仁之主何難之有但不加管教任其酗酒賭博出入園館以及種種糜費妄亂之事俱令得行則若輩必稱為寬仁之主矣然此不但朕不能遂其不肖之念如坐視滿洲等漸流至於不得衣食毫無顔面之時即以國家全力養贍伊等亦且不能給足朕意實有所不忍勢亦必不可也朕今因兵丁食肉之故降旨訓誡想無知之徒必又云既已禁止我等不穿紗帛不飲酒醴不入園館不用銅器不賣米石今又禁至於食肉矣如此妄言者勢所必有然朕亦笑而聽之耳要不過頑劣無知之人肆行怨謗若稍有知識者必以朕廑念伊等生計訓諭至於飲食微細之事而生感也斷不至有怨言且此等無知愚昧之言與孩童怨其父師管教之嚴相類及至成人為官之時始知父師嚴加教育之恩也今豈因一二愚蒙妄論之故朕即不加教訓聽其底於窘迫之理乎即此等奢糜頑劣之徒雖懷怨望之念今見朕為伊等生計再三開導訓諭倘能反復思之亦可回其不肖之心而進於良善爾等其仰副朕廑念滿洲等生計之至意各將所屬官兵及間散人等剖析情理不時詳加訓誡特諭雍正五年四月二十三日上諭治天下之道在於用人今日刑部堂官塞爾圖等保舉筆帖式一人升補主事朕問其在部辦事幾年則對曰在部三月又問其所以保舉之由則曰因伊坐臺十二年是以舉之朕令內外各衙門遴選人員者原期官得其人人稱其職使吏治民生均收實效也况刑部為民命所關朕尤加意慎重惟恐用人不當使刑部偶失其平干天和而枉國法此意乃舉朝所共知者若大臣等能體朕意秉公去私則所舉之人各稱其職不但國家之事皆辦理得宜且衆人觀感鼓勵盡心職守而貽誤曠官之患與鑽營徼幸之弊俱可除矣今塞爾圖等以朝廷量能授職之典視為用情市恩之地此等事不過身受者一人感激而已而欲有益國家之事生衆人鼓勵之心豈可得乎朕嘗為吏治延攬人材而諸臣之薦人也或稱其文學優長或稱其居家孝友夫優於文學者僅可以膺翰墨之司而居家孝友者國家自有旌揚之典倘因其所長而用其所短不幾因其所短而並纍其所長乎天下之人無不誦法孔子試思孔子為政三月而魯大治則孔子豈無實政及於民生哉朕治天下用賞用罰悉秉至公夫賞所當賞則在朕並非加恩而受之者亦不必存私感之念罰所當罰則在朕並非用威而受之者亦不當懷怨望之心凡受恩而生感者即受罰而生怨者也施恩而喜人之感激者即用罰而懼人之怨望者也然則喜人感激則將日日施恩而懼人怨望則將置法度於無用乎孔子為政之初尚有麛裘之謗愛憎之口何足為憑在大聖人且不免况其他乎孔子曰不如鄉人之善者好之其不善者惡之然則天下之大不能無不善之人即不能無怨望之人得不善者之惡豈不愈足以彰吾之善見吾用法之公乎且古人云任勞任怨則不但不避人之怨且以一身直任之而不推諉於他人夫以朕之才智而又居至尊之位若潤色粉飾使天下人人感頌乃至易之事然虛假以沽名優柔以貽患朕不肯為亦不忍為也夫父母之於子未有養而不教者亦未有不教而可謂之愛其子者朕視天下臣民皆吾赤子安忍茍且姑容之意而不教之以正乎塞爾圖等身為大臣乃庶官之表率今存卑鄙狹小之見既欲市賣私恩則必回避嫌怨似此市恩避怨之念全是私心即作威作福之所由來也此風斷不可長是以特行宣諭令內外臣工咸以為戒特諭雍正五年七月初四日上諭今日旗下大臣奏稱馬武家人普大藏匿隆科多銀兩擬以枷號鞭責等語隆科多銀兩與馬武家人何涉乃公然敢為隱匿該旗止擬以枷責完結明係瞻徇情面朕已諭令改擬具奏矣伊等倘謂馬武生前效力有年欲為原諒亦祗可施之馬武本身何得並免其家人之罪耶從前屢降諭旨令文武大臣各將家人嚴行約束無得聽其朋謀結黨串通生事反覆訓誡至再至三無如漸染既久積習尚未盡除凡屬旗人一入大臣之列即有一出名之管家內外傳播諸大臣之管家即於同類中輾轉紏合彼此相邀飲酒唱戲結黨營私各將主人百般引誘黨與之結大槩多由此起入伊等之黨者則於伊主之前將入伊黨之主人稱揚贊美令其主人亦互相交好成黨不入伊等之黨者則於伊主之前將非伊黨之主人離間陷害令其主人亦互相傾軋成讐夫家主果念家僕出力欲加撫育之恩亦祗宜於家門之內加意恩養何必縱容結成黨與以伊等之好惡為從違乎如此則大臣等非驅使奴僕直為奴僕輩所驅使耳况縱僕在外招搖生事實為可恥何得轉以為榮及至劣敗迹露爾等為其所纍誠何苦乃爾耶家僕結黨雖屬細事此風關係匪輕嗣後文武大臣等嚴行約束家僕實力稽查務使各安本分勿得縱容結黨倘仍前玩忽不加嚴禁致復有結黨生事妄為者經朕聞知必將此等惡僕即行正法著通行傳諭八旗以及內府佐領咸使知之特諭雍正五年十一月二十五日上諭厯來滿洲人材壯健弓馬技勇自古罕與比倫此天下所共知者前令八旗查得親軍護軍內能開八力以上硬弓者現有一萬八千餘人昨朕在瀛臺考試天下武舉騎射之後令八旗硬弓百人當衆人之前校射伊等所用之弓有十八個力者有十六七個力者其餘則皆十三個力以上至十五個力不等舉重若輕從容合度衆武舉等見之咸驚異以為實係從來目中之所未覩朕心甚為喜悅其開十八箇力者著賞銀一百兩十七個力者賞銀九十兩十六箇力者賞銀八十兩十五箇力者賞銀七十兩十四箇力者賞銀六十兩十三箇力者賞銀五十兩伊等藝勇超羣是其盡心學習之所致而朕之深加嘉奬者則以伊等鼓舞振興専心向上竭誠勉勵之故衆人不可因此次加恩遂皆以弓力相爭尚嗣後以十五箇力為止不許再加總以誠心演習精詣熟練為要將此通諭八旗知之特諭雍正五年十一月二十八日上諭恩賞銀兩乃朕特施之恩典喜事尚可稍緩喪事則不可遲誤若有冒領之人既治以罪仍可扣其數月錢糧再聞得有將官馬駕車者官馬俱有火印爾等宜加嚴禁朕亦派人稽察特諭雍正五年十二月初二日上諭紫禁城內該班之章京兵丁等俱係飯後換班著每日賞給一次飯食將此飯食務令潔淨溫暖豐盛適口於一次飯食之分例再加半分置辦其監管及造飯人等如有從中侵蝕者著嚴行稽察重加懲治特諭雍正五年十二月二十日前鋒統領達福等奉上諭稽察兵丁係甚善之事都統拉錫管正白旗時特派二三十人稽察匪類大有成效其後補授鑲白旗都統仍派二三十人令其稽察亦覺有益爾八旗都統前鋒統領護軍統領等亦應將各該旗可信之章京兵丁派出令其不時稽察若伊該班之人有於他處被人拏獲者伊等亦必罹罪將爾等派出之官員等嚴加曉示則不肖之匪類有所畏懼亦知悛改矣再著旗下大臣一員輪班總理稽察將此諭各大臣等知之特諭欽定八旗通志卷首之九
