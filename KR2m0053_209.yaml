body:
  text: 欽定四庫全書欽定八旗通志卷一百九十五人物志七十五大臣傳六十一漢軍正黄旗二李金世徳楊耿昭忠李林隆輝祖琳田文鏡李繩武楊魁金世徳金世徳遼東鐵領衛人𨽻正黄旗漢軍兵部侍郎維城子順治九年由廕生補内院博士十二年遷侍讀十四年改吏部員外郎十八年遷兵部郎中康熙四年授通政司右通政六年轉左七年正月晉都察院左僉都御史四月授左副都御史五月疏言近例督撫處分惟貪墨欠賦及違限錯擬等其百姓失所地方未治並無處分請敕議如百姓困苦流離田地抛棄地方毫無治理者督撫革職治罪部議從之十二月擢直𨽻巡撫八年四月疏言各省設布政按察二使總理錢粮刑名直𨽻以京畿獨不設惟八道員各管一府其圈地州縣以隣縣地撥補退出者分還各州縣不盡係一道管属彼此牽混難稽至提觧犯人隔界推諉㑹審参差臣查各省道員有屯田督粮驛𫝊全管通省例請于直𨽻八道中改設粮道巡道各一駐省城總理事歸畫一不致舛悮部議改直隸通薊道為總理錢榖守道霸昌道為總理刑名巡道駐保定府先是正定饑上命賑濟至是期滿世徳以各属尚有饑民請再賑得㫖如所請十二年疏言直𨽻事務殷繁長蘆塩政巡撫勢難兼顧請仍差御史専理下部議行十四年請調分防吴橋縣安陵東汛東光縣大龍灣汛千把搃各一馬兵四十歩兵百十三防緝嚴鎮羊兒庄等處私塩從之十八年地震通州三河平谷香河武清永清寳坻薊州固安等處世徳分别被灾輕重請照分數蠲免錢粮如所請行十九年二月以疾求罷允之五月卒遺疏言直属圈撥之餘民多貧乏災傷叠見旗民雜處易有推避凡在外旗丁宜照屯村編定名冊地方官稽查不使容留匪人口北各衛舊有沙壓水衝地畝毎嵗額徴錢粮不多貧民實難賠累望特恩蠲免得㫖金世徳簡任廵撫素以清慎實心任事著有勞續畿輔重地正資料理溘焉病逝朕心深為憫惻應得䘏典著察例具奏餘令該部知之尋賜祭葬如例諡清恵耿昭忠弟聚忠耿昭忠漢軍正黄旗人耿繼茂次子幼隨父於鎮所順治十一年繼茂奏遣長子精忠偕昭忠入侍並授爵一等子命以饒餘親王阿巴㤗女孫妻昭忠封多羅額駙復晋秩視和碩額駙加太子太保康熙十三年精忠等㩀福建反詔拘禁昭忠及其弟聚忠十四年上念昭忠聚忠未與精忠同謀貰之復秩如舊十五年精忠歸順隨大軍剿海賊詔授昭忠鎮平将軍駐福州代精忠理藩務十六年藩下叅領徐鴻弼等首精忠歸順後尚蓄逆謀昭忠據以聞並指劾助逆曽養性等十餘人上留疏於中十七年精忠還福州昭忠遵㫖携其祖父骸骨歸葬葢平十九年八月昭忠疏劾精忠謂前此徐鴻弼等首告罪状皆實乞敕法司勘治疏下廷議如所請逮訊精忠磔死籍沒昭忠聚忠應連坐以其曽疏劾精忠予免議二十五年正月昭忠卒諭部議䘏賜祭葬如内大臣例諡曰勤僖聚忠者繼茂第三子順治十三年繼茂奏遣入侍尚公主封和碩額駙加太子太保康熙十四年奉命招精忠降精忠拒不納仍齎敕以歸後與昭忠同時疏劾精忠其畧曰逆賊耿精忠背恩反叛臣等同氣法應連坐䝉念及臣祖仲明臣父繼茂两世微勞特予寛貰遣臣齎敕招撫精忠豈知冥頑負固抗逆不悛臣等疾首痛心恨弗食其肉幸天威赫濯大兵入閩精忠力竭勢窮復戕害總督范承謨暨其親属數十人委積屍骸道路慘目當此魂逰釡底猶然肆毒不休若使一隙可為更不知若何螳逞尚邀皇仁矜宥復爵如初顧蒙面偷生擁兵觀望泣思臣祖臣父及精忠荷三朝厚恩世授王爵雖捐糜頂踵難酬萬一乃精忠逆倫肆志糾衆反戈臣母周氏哭阻不從逼致殞命且誣臣祖與逆賊吴三桂在山海闗時曽有成約是不獨貽祸手足所弗顧即祖父亦視若仇讐忍心賊䧟臣念及此義不俱生今精忠将至闕下乞賜顯戮播告中外以為亂臣賊子戒疏入下法司議行尋命聚忠赴福州宻籌遷移藩兵事聚忠至福州以藩兵皆可遷移覆奏稱㫖遂奉詔携精忠家属還京二十年同昭忠奏言家属衆多艱于飬贍請如漢軍例披甲食粮部議如所請編為五佐領歸𨽻正黄旗漢軍二十六年二月聚忠卒諭部議䘏與昭忠同諡曰慤敏李林隆李林隆漢軍正黄旗人父色稜授三等男順治十四年林隆襲康熙八年授鑲黄旗漢軍副都統尋兼佐領十三年逆藩吴三桂叛林隆隨大軍赴湖廣剿禦十五年川賊譚洪糾黨犯鄖陽順流而下泊陡嶺之琶琶灘陸路賊聨絡䇿應自鄖陽至均州糧道梗林隆偕提督楊茂勲佟國瑶分路夾攻擒賊将斬二百餘級焚其船獲偽劄器械無筭粮道始通得㫖嘉奨十七年署河南提督二十九年大軍防禦噶爾丹八旗漢軍都統等請毎旗増火礟一於都統副都統内遣一二人率将領軍校礟手送赴圖喇備用奉㫖李林隆人材勇健練習軍務著搃管火礟與副都統阿南達偕往三十一年授陕西提督三十三年命偕振武将軍孫思克㑹勘黄城兒增設官兵事三十四年諭曰聞噶爾丹将從嘉峪闗外過哈宻之南昆都倫及額濟内河往投達頼喇嘛果爾此機斷不可失著副都統阿南達㑹同将軍博霽孫思克提督李林隆公議確探擇便以行李林隆可選本標兵二百名速徃甘州啇酌行事三十五年噶爾丹敗遁林隆奏請赴布隆吉爾偵緝奉㫖仍同阿南達往三十七年還京授鑲紅旗漢軍都統四十七年卒賜祭葬如例李輝祖李輝祖漢軍正黄旗人父恒忠初以侍衛事太宗文皇帝賜名宜哈納授佐領尋陞恭領崇徳八年随鄭親王濟爾哈朗征明克中後所前屯衛二城予雲騎尉世職順治元年同都統葉臣征山西攻克太原汾州府城及文水縣城三年隨肅親王豪格征四川敗流賊楊薦兵於馬湖府五年擢夲旗副都統六年同都統巴顔駐師西安屢破流賊孫可望劉文炳康薦宗等十一年同靖南将軍珠瑪喇征廣東敗李定國兵於新㑹縣之山峪晉世職至一等輕車都尉康熙十年卒第三子儀祖襲世職輝祖其長子也初任佐領尋授兵部員外郎康熙十三年遷郎中奉命督理淮安闗十九年遷貴州按察使二十一年陞湖北布政使丁繼母憂歸服闋補四川布政使川賦舊額九十餘萬張獻忠亂後田多荒蕪吴逆繼亂民益寥寥輝祖勸諭流民開墾按地起徴生聚漸盛舊例令州縣嵗支帑銀採買白蠟解部輝祖以蜀道險逺宜請户部就近採買言於廵撫姚締虞遂入奏得㫖停止三十一年陞太常寺卿尋遷大理寺卿三十四年授河南巡撫三十五年上親征噶爾丹輝祖奉命辦理軍需尋擢湖廣總督三十七年軍需事竣始赴任時湖南田賦不均輝祖奏請清釐改正令民自丈而以官間為覆驗有不實者懲之以期事覈而民不擾因疏劾偏沅巡撫楊鳯起于藩司任内承辦賦冊令各属出具並無不均印結草率造報鳯起坐革職三十八年六月上諭閣臣曰朕南廵浙江詢問地方米貴之由百姓皆謂数年来湖廣米不至以致價值騰貴然椘省官吏並未奏報水旱又聞湖南百姓甚苦皆由巡撫興永朝王樑楊鳯起三人相繼擾害所致總督李輝祖為人誠實辦事頗優但欲其不徇情面将從前廢弛整理斷㫁不能可召進京以侍郎用七月授刑部右侍郎先是呉逆偽将軍黄明自康熙十九年大兵取桞州時竄入苖峒至三十七年七月糾黨為亂茶陵州民陳丹書譚廷玉等因知州趙國瑄私派銀两擁衆入州城刦奪印信倉庫與黄明糾結刦掠衡州官兵捕剿先後就擒上命户部郎中剛五達等往鞫黄明等伏法知州趙國瑄因私派激變陳丹書等擬罪如律輝祖以不據實劾奏革職發徃永定河工効力事竣給四品頂帯四十一年卒祀四川名宦楊琳楊琳奉天鐵嶺衛人𨽻正黄旗漢軍康熙十八年大軍征逆孽吴世璠琳以守備從征有功擢京營逰擊旋遷叅将三十七年遷江南漕標副将三十八年擢雲南臨安鎮總兵四十六年授鑲紅旗漢軍副都統五十年擢福建陸路提督尋命署福建将軍五十四年授廣東巡撫五十五年三月疏言直𨽻各省俱有額設衛學獨廣東衛所未設請廣州等處八衛二所文武童生各取進二名餘三十六衛所各一名撥入各府學從之十月擢两廣總督五十七年碣石鎮總兵陳昴以西洋有和蘭西一族兇狠異常且與澳門一種同派熟悉廣省情形請令督撫闗差諸臣設法防偹輪流貿易不許多船並集上命琳詳查議奏琳疏言外國夷啇利與中國貿易而慴服有素數十年相安應聼如常請于夷船到後令沿海文武官弁晝夜防衛從之又言廣東沿海地方東界福建西界交趾諸畨羅列素稱險要請於沿海泊岸修築礟臺城垣設汛地營房分撥官兵以靖海洋又言两廣米資湖南販米必由永州府經過奸民毎借禁糶阻啇不行請敕湖南督撫查拿遏糴奸民治罪又條陳巡緝廣恵潮三府沿海要地事宜一南澳為閩粤交界宜分路巡查自南澳而西平海營而東為東路自大鵬營而西廣海寨而東為中路自春江協而西龍門協而東為西路令各總兵副将為統巡標員營員為分巡毎年輪班巡查一外洋戰船宜増撥巡哨請於澄海協裁􅀈漕船六増趕繒大船二於大鵬營内撥艍船二歸澄海協春江協増赶繒大船二碣石協改造艍船二庻巡船不缺一内河哨船宜酌量匀設請裁順徳等營内河哨船十八移設左翼鎮標左右二營及新安營一水師要汛宜増兵守巡請於督撫将軍提鎮等標二十營毎營裁兵丁四新㑹營裁把總二臣標右營裁把總一増入海門達濠两營以備守巡再海門營無額馬請裁達濠營馬移海門營一濵海要地宜移駐文職潮州府饒平縣屬之黄岡副将不便理民事請以潮州海防同知移駐海陽縣属之菴埠距縣逺以海陽縣丞移駐一逺地協将宜属鎮轄請以瓊州水師副将歸瓊州總兵轄龍門水師副将歸髙州總兵轄諸疏俱下部議行五十八年上以各省錢粮虧空多應設法清釐命各督撫詳查議奏琳疏言州縣錢粮虧空由於侵隠挪移二弊今惟責成知府調取州縣流水比簿不時稽查随収随觧毋存留縣庫一遇徴多觧少立即掲報數少押令補解數多即行題恭虧空之弊可除部議從之又疏言廣東沿海險要修造礟臺城垣汛地百二十六處營房千三百八十間撥守官兵三千九百九十一名安礟位八百七請責成州縣不時查閲一有損壊捐俸修整下部議行五十九年两廣巡塩御史昌保疏請将塩課積欠交督撫兼管上命琳兼两廣塩務六十年正月疏言廣西太平府思明土知州黄而芸貪殘不法恭革治罪請改土歸流所轄地方歸入太平府原設吏目一員仍留司捕務七月疏請两廣啇籍子弟照两浙河東例嵗科二試額進二十名均下部議行雍正元年三月奉㫖入正黄旗四月疏言開平新㑹地方有盗首張祖珠等糾衆掠開平之焦園村新㑹之禮歩村瓦窑村已遣兵役捕獲查向例盗案由州縣府司審觧具題或經部駁覆毎二三年不結奸民得稽顯戮此案請於臣等審明後即請王命梟示再行具奏得㫖所奏甚是似此當行者一面奏聞一面即可舉行七月疏陳稽察奸徒嚴禁海米完葺城郭三事命與浙閩總督滿保酌行八月改两廣總督為廣東總督廣西總督命琳為廣東總督二年正月諭曰楊琳辦理塩務以来錢粮雖然完納聞将窮民生理盡行霸佔百姓怨憤夫錢糧雖属緊要當為百姓存留微利飬生若既為錢粮起見又圖自己取利使窮民失所成羣竊盗其害較缺欠錢糧為大務須謹慎亷潔從公辦理方属稱職不可祗為錢粮不顧百姓二月卒于官賜祭葬如例田文鏡田文鏡漢軍正黄旗人由監生於康熙二十二年任福建長樂縣縣丞三十一年遷山西寜鄉縣知縣四十四年遷直省易州知州四十五年内遷吏部員外郎四十八