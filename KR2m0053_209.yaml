body:
  text: 欽定四庫全書欽定八旗通志卷一百九十五人物志七十五大臣傳六十一漢軍正黃旗二李金世德楊耿昭忠李林隆輝祖琳田文鏡李繩武楊魁金世德金世德遼東鐵領衛人𨽻正黃旗漢軍兵部侍郎維城子順治九年由廕生補內院博士十二年遷侍讀十四年改吏部員外郎十八年遷兵部郎中康熙四年授通政司右通政六年轉左七年正月晉都察院左僉都御史四月授左副都御史五月疏言近例督撫處分惟貪墨欠賦及違限錯擬等其百姓失所地方未治並無處分請敕議如百姓困苦流離田地拋棄地方毫無治理者督撫革職治罪部議從之十二月擢直𨽻巡撫八年四月疏言各省設布政按察二使總理錢糧刑名直𨽻以京畿獨不設惟八道員各管一府其圈地州縣以鄰縣地撥補退出者分還各州縣不盡係一道管屬彼此牽混難稽至提解犯人隔界推諉會審參差臣查各省道員有屯田督糧驛傳全管通省例請于直𨽻八道中改設糧道巡道各一駐省城總理事歸畫一不致舛悮部議改直隸通薊道為總理錢榖守道霸昌道為總理刑名巡道駐保定府先是正定飢上命賑濟至是期滿世德以各屬尚有飢民請再賑得旨如所請十二年疏言直𨽻事務殷繁長蘆鹽政巡撫勢難兼顧請仍差御史専理下部議行十四年請調分防吳橋縣安陵東汛東光縣大龍灣汛千把總各一馬兵四十步兵百十三防緝嚴鎮羊兒莊等處私鹽從之十八年地震通州三河平谷香河武清永清寶坻薊州固安等處世德分别被災輕重請照分數蠲免錢糧如所請行十九年二月以疾求罷允之五月卒遺疏言直屬圈撥之餘民多貧乏災傷疊見旗民雜處易有推避凡在外旗丁宜照屯村編定名册地方官稽查不使容留匪人口北各衛舊有沙壓水衝地畝每嵗額徴錢糧不多貧民實難賠纍望特恩蠲免得旨金世德簡任巡撫素以清慎實心任事著有勞續畿輔重地正資料理溘焉病逝朕心深為憫惻應得恤典著察例具奏餘令該部知之尋賜祭葬如例諡清惠耿昭忠弟聚忠耿昭忠漢軍正黃旗人耿繼茂次子幼隨父於鎮所順治十一年繼茂奏遣長子精忠偕昭忠入侍並授爵一等子命以饒餘親王阿巴泰女孫妻昭忠封多羅額駙復晉秩視和碩額駙加太子太保康熙十三年精忠等據福建反詔拘禁昭忠及其弟聚忠十四年上念昭忠聚忠未與精忠同謀貰之復秩如舊十五年精忠歸順隨大軍剿海賊詔授昭忠鎮平將軍駐福州代精忠理藩務十六年藩下參領徐鴻弼等首精忠歸順後尚蓄逆謀昭忠據以聞並指劾助逆曽養性等十餘人上留疏於中十七年精忠還福州昭忠遵旨携其祖父骸骨歸葬蓋平十九年八月昭忠疏劾精忠謂前此徐鴻弼等首告罪狀皆實乞敕法司勘治疏下廷議如所請逮訊精忠磔死籍沒昭忠聚忠應連坐以其曽疏劾精忠豫免議二十五年正月昭忠卒諭部議恤賜祭葬如內大臣例諡曰勤僖聚忠者繼茂第三子順治十三年繼茂奏遣入侍尚公主封和碩額駙加太子太保康熙十四年奉命招精忠降精忠拒不納仍齎敕以歸後與昭忠同時疏劾精忠其略曰逆賊耿精忠背恩反叛臣等同氣法應連坐蒙念及臣祖仲明臣父繼茂兩世微勞特豫寬貰遣臣齎敕招撫精忠豈知冥頑負固抗逆不悛臣等疾首痛心恨弗食其肉幸天威赫濯大兵入閩精忠力竭勢窮復戕害總督范承謨暨其親屬數十人委積尸骸道路慘目當此魂逰釡底猶然肆毒不休若使一隙可為更不知若何螳逞尚邀皇仁矜宥復爵如初顧蒙面偷生擁兵觀望泣思臣祖臣父及精忠荷三朝厚恩世授王爵雖捐糜頂踵難酬萬一乃精忠逆倫肆志糾衆反戈臣母周氏哭阻不從逼致殞命且誣臣祖與逆賊吳三桂在山海關時曽有成約是不獨貽禍手足所弗顧即祖父亦視若仇讐忍心賊陷臣念及此義不俱生今精忠將至闕下乞賜顯戮播告中外以為亂臣賊子戒疏入下法司議行尋命聚忠赴福州密籌遷移藩兵事聚忠至福州以藩兵皆可遷移覆奏稱旨遂奉詔携精忠家屬還京二十年同昭忠奏言家屬衆多艱于飬贍請如漢軍例披甲食糧部議如所請編為五佐領歸𨽻正黃旗漢軍二十六年二月聚忠卒諭部議恤與昭忠同諡曰慤敏李林隆李林隆漢軍正黃旗人父色稜授三等男順治十四年林隆襲康熙八年授鑲黃旗漢軍副都統尋兼佐領十三年逆藩吳三桂叛林隆隨大軍赴湖廣剿禦十五年川賊談洪糾黨犯鄖陽順流而下泊陡嶺之琶琶灘陸路賊聨絡䇿應自鄖陽至均州糧道梗林隆偕提督楊茂勳佟國瑶分路夾攻擒賊將斬二百餘級焚其船獲偽劄器械無算糧道始通得旨嘉奬十七年署河南提督二十九年大軍防禦噶爾丹八旗漢軍都統等請每旗增火炮一於都統副都統內遣一二人率將領軍校炮手送赴圖喇備用奉旨李林隆人材勇健練習軍務著總管火炮與副都統阿南達偕往三十一年授陕西提督三十三年命偕振武將軍孫思克會勘黃城兒增設官兵事三十四年諭曰聞噶爾丹將從嘉峪關外過哈密之南昆都倫及額濟內河往投達賴喇嘛果爾此機斷不可失著副都統阿南達會同將軍博霽孫思克提督李林隆公議確探擇便以行李林隆可選本標兵二百名速往甘州啇酌行事三十五年噶爾丹敗遁林隆奏請赴布隆吉爾偵緝奉旨仍同阿南達往三十七年還京授鑲紅旗漢軍都統四十七年卒賜祭葬如例李輝祖李輝祖漢軍正黃旗人父恆忠初以侍衛事太宗文皇帝賜名宜哈納授佐領尋升恭領崇德八年隨鄭親王濟爾哈朗征明克中後所前屯衛二城豫雲騎尉世職順治元年同都統葉臣征山西攻克太原汾州府城及文水縣城三年隨肅親王豪格征四川敗流賊楊薦兵於馬湖府五年擢夲旗副都統六年同都統巴顔駐師西安屢破流賊孫可望劉文炳康薦宗等十一年同靖南將軍珠瑪喇征廣東敗李定國兵於新會縣之山峪晉世職至一等輕車都尉康熙十年卒第三子儀祖襲世職輝祖其長子也初任佐領尋授兵部員外郎康熙十三年遷郎中奉命督理淮安關十九年遷貴州按察使二十一年升湖北布政使丁繼母憂歸服闋補四川布政使川賦舊額九十餘萬張獻忠亂後田多荒蕪吳逆繼亂民益寥寥輝祖勸諭流民開墾按地起徴生聚漸盛舊例令州縣嵗支帑銀採買白蠟解部輝祖以蜀道險逺宜請户部就近採買言於巡撫姚締虞遂入奏得旨停止三十一年升太常寺卿尋遷大理寺卿三十四年授河南巡撫三十五年上親征噶爾丹輝祖奉命辦理軍需尋擢湖廣總督三十七年軍需事竣始赴任時湖南田賦不均輝祖奏請清釐改正令民自丈而以官間為覆驗有不實者懲之以期事核而民不擾因疏劾偏沅巡撫楊鳯起于藩司任內承辦賦册令各屬出具並無不均印結草率造報鳯起坐革職三十八年六月上諭閣臣曰朕南巡浙江詢問地方米貴之由百姓皆謂數年來湖廣米不至以致價值騰貴然椘省官吏並未奏報水旱又聞湖南百姓甚苦皆由巡撫興永朝王梁楊鳯起三人相繼擾害所致總督李輝祖為人誠實辦事頗優但欲其不徇情面將從前廢弛整理斷斷不能可召進京以侍郎用七月授刑部右侍郎先是吳逆偽將軍黃明自康熙十九年大兵取桞州時竄入苖洞至三十七年七月糾黨為亂茶陵州民陳丹書談廷玉等因知州趙國瑄私派銀兩擁衆入州城劫奪印信倉庫與黃明糾結劫掠衡州官兵捕剿先後就擒上命户部郎中剛五達等往鞫黃明等伏法知州趙國瑄因私派激變陳丹書等擬罪如律輝祖以不據實劾奏革職發往永定河工效力事竣給四品頂帶四十一年卒祀四川名宦楊琳楊琳奉天鐵嶺衛人𨽻正黃旗漢軍康熙十八年大軍征逆孽吳世璠琳以守備從征有功擢京營逰擊旋遷參將三十七年遷江南漕標副將三十八年擢雲南臨安鎮總兵四十六年授鑲紅旗漢軍副都統五十年擢福建陸路提督尋命署福建將軍五十四年授廣東巡撫五十五年三月疏言直𨽻各省俱有額設衛學獨廣東衛所未設請廣州等處八衛二所文武童生各取進二名餘三十六衛所各一名撥入各府學從之十月擢兩廣總督五十七年碣石鎮總兵陳昴以西洋有和蘭西一族凶狠異常且與澳門一種同派熟悉廣省情形請令督撫關差諸臣設法防偹輪流貿易不許多船並集上命琳詳查議奏琳疏言外國夷啇利與中國貿易而懾服有素數十年相安應聼如常請于夷船到後令沿海文武官辨晝夜防衛從之又言廣東沿海地方東界福建西界交趾諸畨羅列素稱險要請於沿海泊岸修築炮臺城垣設汛地營房分撥官兵以靖海洋又言兩廣米資湖南販米必由永州府經過姦民每借禁糶阻啇不行請敕湖南督撫查拿遏糴姦民治罪又條陳巡緝廣惠潮三府沿海要地事宜一南澳為閩粵交界宜分路巡查自南澳而西平海營而東為東路自大鵬營而西廣海寨而東為中路自春江協而西龍門協而東為西路令各總兵副將為統巡標員營員為分巡每年輪班巡查一外洋戰船宜增撥巡哨請於澄海協裁􅀈漕船六增趕繒大船二於大鵬營內撥艍船二歸澄海協春江協增趕繒大船二碣石協改造艍船二庶巡船不缺一內河哨船宜酌量勻設請裁順德等營內河哨船十八移設左翼鎮標左右二營及新安營一水師要汛宜增兵守巡請於督撫將軍提鎮等標二十營每營裁兵丁四新會營裁把總二臣標右營裁把總一增入海門達濠兩營以備守巡再海門營無額馬請裁達濠營馬移海門營一濵海要地宜移駐文職潮州府饒平縣屬之黃岡副將不便理民事請以潮州海防同知移駐海陽縣屬之菴埠距縣逺以海陽縣丞移駐一逺地協將宜屬鎮轄請以瓊州水師副將歸瓊州總兵轄龍門水師副將歸髙州總兵轄諸疏俱下部議行五十八年上以各省錢糧虧空多應設法清釐命各督撫詳查議奏琳疏言州縣錢糧虧空由於侵隱挪移二弊今惟責成知府調取州縣流水比簿不時稽查隨收隨解毋存留縣庫一遇徴多解少立即揭報數少押令補解數多即行題恭虧空之弊可除部議從之又疏言廣東沿海險要修造炮臺城垣汛地百二十六處營房千三百八十間撥守官兵三千九百九十一名安炮位八百七請責成州縣不時查閲一有損壞捐俸修整下部議行五十九年兩廣巡鹽御史昌保疏請將鹽課積欠交督撫兼管上命琳兼兩廣鹽務六十年正月疏言廣西太平府思明土知州黃而藝貪殘不法恭革治罪請改土歸流所轄地方歸入太平府原設吏目一員仍留司捕務七月疏請兩廣啇籍子弟照兩浙河東例嵗科二試額進二十名均下部議行雍正元年三月奉旨入正黃旗四月疏言開平新會地方有盜首張祖珠等糾衆掠開平之焦園村新會之禮步村瓦窑村已遣兵役捕獲查向例盜案由州縣府司審解具題或經部駁覆每二三年不結姦民得稽顯戮此案請於臣等審明後即請王命梟示再行具奏得旨所奏甚是似此當行者一面奏聞一面即可舉行七月疏陳稽察姦徒嚴禁海米完葺城郭三事命與浙閩總督滿保酌行八月改兩廣總督為廣東總督廣西總督命琳為廣東總督二年正月諭曰楊琳辦理鹽務以來錢糧雖然完納聞將窮民生理盡行霸占百姓怨憤夫錢糧雖屬緊要當為百姓存留微利飬生若既為錢糧起見又圖自己取利使窮民失所成羣竊盜其害較缺欠錢糧為大務須謹慎亷潔從公辦理方屬稱職不可祗為錢糧不顧百姓二月卒于官賜祭葬如例田文鏡田文鏡漢軍正黃旗人由監生於康熙二十二年任福建長樂縣縣丞三十一年遷山西寧鄉縣知縣四十四年遷直省易州知州四十五年內遷吏部員外郎四十八年遷刑部郎中五十一年改授監察御史五十五年巡視長蘆鹽政疏言山東鹽引節次請復尚缺額引五萬七千五百五十六道今商人願先輸課增復原引自五十六年為始在長清等縣運行奉旨加引雖可增課恐于商人無益下九卿議奏行山東巡撫定議具題如所請行五十六年擢內閣侍讀學士雍正元年上命告祭華嶽尋又命往山西賑濟平定等四州縣九月署山西布政使二年正月授河南布政使八月署河南巡撫奏言開封府轄四州三十縣地方遼逺請照晉省改設直𨽻州分轄開封府屬之西華商水項城沈邱四縣分𨽻陳州臨頴襄城郾城長葛四縣分𨽻許州蜜新鄭二縣分𨽻禹州滎澤滎陽河隂汜水四縣分𨽻鄭州原武縣就近歸懷慶府轄延津縣歸衛輝府轄又河南府屬之靈寶閿鄉二縣分𨽻陕州汝寧府屬之光山息縣固始商城四縣分𨽻光州各縣錢糧知州查核督催照知府例處分直𨽻各州錢糧光州歸南汝道陳許禹鄭陜五州歸開歸道盤查徇隱亦照知府例議處部議如所請行十二月授河南巡撫三年正月奏言豫省河工向設堡夫九百餘名修防嗣因連年水漲撥江南河兵千名協力防護是河兵原以濟堡夫之不足河臣齊蘇勒請過秋汛裁堡夫竊思每年俱有水發時大堤新築更須巡防新設河兵雖諳鑲墊釘樁捲掃下掃而搜索狼窩鼠穴及風防雨守瞭望水勢不若堡夫熟悉所有原設堡夫斷難裁汰六月又言堡夫學習樁掃須責河員董率堡夫諳練即可拔河兵河兵雖有千把統轄應令管河道稽查并責各河同知教習庶可約束疏入俱下部議行是月又言豫省漕船向於衛輝水次受兑道經直𨽻大名府屬之濬滑內黃三縣隔省呼應不靈請將三縣改𨽻彰德衛輝統屬既専漕不致悮奉旨允行四年九月奏言賦役法丁隨糧派請將豫省各邑丁糧均𣲖地糧內紳襟富户不分等則一例輸將於雍正五年為始部議從之十二月浙江道御史謝濟世恭奏文鏡貪虐不法諭責謝濟世自恃言官胸懷詭詐令大學士九卿等嚴訊具奏訊得濟世自認風聞無據顯係受人指使要結朋黨擾亂是非擬斬決疏入諭大學士九卿等曰田文鏡於雍正元年告祭華山復命時偹言山西荒歉情形朕以其直言無隱令往山西賑濟即授為山西布政使剔除未清案件吏治一新嗣因河南諸事廢弛調為河南布政使旋即用為巡撫整飭河工每事秉公潔己實巡撫中第一今大學士九卿等究訊謝濟世所參田文鏡各欵皆虛則謝濟世受人指使情弊顯然謝濟世著即革職發往軍前效力贖罪姑免深究五年二月奏言黃河汛水長發素平易者忽成險工宜暫用民力每嵗夏至後將距堤一二里村莊照佃户數認夫有急赴工搶護工完立散若非計日可竣者按名給工食河印汛辨各員不得擾民閏三月又言河北彰德衛輝懷慶三府向設守道一員康熙二十五年裁但三府共轄二十二縣幅員甚廣請復設河北守道統轄加兵備職銜河北堤工掃壩廳汛各員河兵堡夫一應錢糧令就近督率并巡防小丹河等水利再衛輝府屬之胙城縣地狹且離延津僅三十五里請裁併延津其學額仍準附延津照舊考取部議均如所請行七月特授河南總督加兵部尚書䘖先是文鏡係正藍旗漢軍是年奉旨擡入正黃旗六年正月諭曰田文鏡自到河南忠誠體國公正亷明豫省吏畏民懷稱為樂土山東吏治民風宜加整飭著授田文鏡為河東總督管理兩省事務此因人設立之曠典不為定例七月奏言交界地方易藏匪類伏讀上諭交界地方失事探實贓盜處一面差役密拏一面移文關會拏獲後報該管地方添差移解洵捕盜良法也但捕役畏姦徒奪犯不敢越界密拏每因拒劫致成人命逮鄰境關拏彼處仍復徇庇是以盜賊潛聚請嗣後如隔屬密拏贓盜彼處有縱奪徇庇者許拏盜之地方官詳本省督撫移咨會參奉旨允行時豫省漕糧惟附近水次之河北三府運本色其不近水次之河以南州縣均徵折色仍在河北三府採買三府偏纍文鏡奏準各徴各漕將距水稍逺州縣照舊徵本色臨水之儀封考城暨新改歸豫省之濬滑內黃均增辦本色距水最逺之靈寶減辦米二千石閿鄉減三千石歸臨水五縣徵輸南陽汝寧二府光汝二州永寧嵩盧氏三縣皆路逺難運勉其辦解即分撥五縣協辦程逺近每加價銀五分至二錢三錢不等九月奏言東省倉庫俱有虧空且多挪新掩舊請嗣後知府直𨽻州知州離任時將所轄州縣倉庫錢糧照豫省交代例限三個月令接任官查明出結如有虧空知府知州均半賠結方許赴新任接任官徇情出結即令分賠冉府及直𨽻州倉庫向係該管道盤查嗣後道員離任照此例交代又言東省錢糧舊欠二百餘萬之多雍正六年錢糧將屆全完之期完不及五分由於火耗太重私𣲖太多其向民加派加耗由於上司需索雖有自愛州縣不淂不改亷易節今欲禁加派加耗必先嚴禁收受陋規請旨嚴諭山東撫藩二臣於半年內協同臣徹底查清分别請恭應追應禁應革毋得瞻徇容隱諸疏入皆蒙俞允七年七月遵旨議奏山東青州府為適中要地內聫陸路各營外與沿海營汛呼吸相通設立滿洲駐防兵可以資彈壓而重保障府北城外舊有廢東陽古城址建城署營房可駐兵數千議政王大臣議如所請行十月加太子太保十二月奏請分東昌府屬之髙唐州為直𨽻州轄濟南府屬之禹城平原陵縣臨邑四縣濮州為直𨽻州轄觀城范縣朝城三縣兖州府屬之東平州為直𨽻州轄東阿平隂夀張陽穀四縣青州府屬之莒州為直𨽻州轄日照沂水蒙隂三縣從前所改之直𨽻濟寧州仍歸兖州府轄其濟寧原轄之巨野嘉祥縣改𨽻曺州鄆城縣仍𨽻兖州下部議行八年二月奏言武辨養贍家口僕從名糧外别無所資但給步糧不敷用請給提督至守備馬步各半千總馬一步四把總馬一步三作為定額一體遵行從之五月特命兼任北河總督十一月奏言今年豫省被水州縣收成雖不等實未成災士民踴躍輸將所有特恩蠲免之錢糧請仍照額完兑部議應如所請得旨士民急公奉上固屬可嘉著該督確查歉收分數仍照例蠲免即將現兊正糧作下年正供九年二月上諭上年山東有水患河南亦有數縣被水朕以田文鏡自能經理未另遣員查賑今聞祥符封邱等州縣有賣男女於山陜客商者田文鏡近來年老多病精神不及為屬員欺誑不能撫綏安插而但禁其賣鬻子女以避離散之名是絶其生路也豈為民父母者所忍言乎著刑部侍郎王國棟前往賑濟四月以病乞休命解任來京調理七月病痊回任十年八月疏言登州鎮新增兵一千其中右二營請增千總一員把總一員約束下部議行十二月以病奏請解任允之四月卒于河南遺疏上得旨田文鏡老成厯練才守兼優自簡任督撫以來府庫不虧倉儲充足察吏安民懲貪除暴不避嫌怨庶務具舉封疆重寄正資料理前以衰病請解任調理勉從其請今聞溘逝深為憫惜應得恤典察例具奏尋賜祭葬諡端肅特命河南省城立専祠祀之並準入祀豫省賢良祠十三年十一月尚書史貽直奏稱河南開墾捐輸纍民甚宜速罷請特簡亷明公正大臣往撫綏查核廷議如所請奉旨河南地方自田文鏡為巡撫總督以來苛刻搜求以嚴厲相尚而屬員又復承其意旨剝削成風豫民重受其困即如前年匿災不報百姓至於流離蒙皇考嚴飭遣官賑恤始得安全此中外所共知者乃王士俊接任河東不能加意惠飬且擾亂紛更以為幹濟借開墾之虛名而成纍民之弊政彼地方民風淳朴竭蹶以從罔敢或後甚屬可嘉然先後遭督臣之苛政其情亦可憫矣王士俊著解任來京候旨並將此旨宣示豫民咸使知之乾隆五年四月河南巡撫雅爾圖奏言文鏡在豫百姓至今怨恨不應入豫省賢良祠奉上諭朕觀雅爾圖此奏係見朕降旨令李衛入祀賢良意謂李衛與鄂爾泰素不相合特借田文鏡之應撤以見李衛之不應入耳當日王士俊將田文鏡奏請入祀賢良係奉皇考允行今若撤出是翻前案矣鄂爾泰田文鏡李衛皆皇考所最稱許者其實田文鏡不及李衛李衛又不及鄂爾泰而彼時三人素不相合亦衆所共知也于是文鏡仍得入豫省賢良祠李繩武李繩武漢軍正黃旗人祖鐸隨明南寧侯左夢庚投誠授騎都尉世職父起龍襲隨征噶爾丹有功加一雲騎尉康熙四十四年繩武襲雍正元年四月授佐領十一月補恭領五年遷湖廣黃州副將八年擢甘肅寧夏總兵十年署固原提督乾隆元年調河南河北鎮總兵五月擢甘肅提督三年二月命駐防哈密賞治行裝銀五千兩三月調固原提督仍駐哈密先是雍正十三年皇上御極噶爾丹䇿凌遣使乞和詔撤北路兵乾隆三年以噶爾丹䇿凌遵旨議定分界地方允其遣使赴藏熬茶四年夷使至哈密軍營繩武撥兵五百遣官協同理藩院章京由扁都口至東科爾貿易畢護送至藏六年調甘肅提督七年以揑報屯田濫邀議敘鐫二級詔留任十年調西安提督十一年閏三月疏言啇夷賚木瑚里等帶牲畜乞在哈密貿易肅州鎮臣請於嘉峪關外花海子牧放查花海子逼近赤靖等處營汛南通青海北接北路卡倫留牧未便臣飭將馬駝貨物赴肅州牛羊暫牧哈密卡外俟價議定差員率商出口迎牧疏入報聞六月疏言哈密西南西喇淖爾地通魯克察克闢展等處向設卡倫旋以水草不便議裁準夷多由是潛行應𣲖兵守望又巴逹什為貝子玉富素牧厰西北為烏拉臺卡倫北五十里有畢栁大板溝應設卡與烏拉臺巴逹什聲息相通可以嚴密防範廷議允行十三年七月調甘肅提督十月調固原提督十四年二月調直𨽻古北口提督四月調福建陸路提督以病未赴十月調浙江提督十二月調固原提督十五年授鎮海將軍十六年署安西提督印務七月授甘肅提督十月調安西提督十七年五月諭曰李繩武奏此次準噶爾夷目額倫瑚里貿易牲畜貨物較十三年之數不無浮多再每次到哈密必有乏弱牲口求售應查明確數以理責問如果恭順懇求再行照例辦理等語此番交易係初次定例必當示之以信不可稍有遷就該夷貪狡無厭不過得尺進尺得寸進寸向來承辦員辨惟恐生事一味委曲周旋將就了事朝廷體制尊嚴邉疆奏事有不能盡實而外藩小國其上下之情轉相聮貫交易一事未必不早為窺破一次踰例後次又復加增厚利所在彼何樂而不為耶今該夷內亂又與哈薩克搆釁其交易較前所增有限已可得其情形此正辦理機會總當悉遵前旨在十三年定數之內者許其截長補短通融折算逾數者雖少亦槩駁回至奏報來使言語情形務須一一據實倘稍有粉飾將來查出惟該提督是問尋將夷目情形具奏諭曰李繩武所奏竟似毫無主見姑為遊移兩可之詞以俟朕之批示如所稱該夷等似覺失望又不敢違背章程其詞色深為作難止求轉奏等語又將夷人伴送北山暫住牧放是已明示以據情入奏矣貿易既定有章程自當永逺遵行若因其恭順畏懼而曲為遷就將來勢必逐漸加增何所底止至疲弱馬駝從前準其變售原屬辦理錯誤今既立定限制何得因循故轍視為常例乎李繩武具摺奏請夷人必無不知之理著即將入奏奉旨之處明白宣諭以哈密貿易原屬非例今既新定規條當照十三年肅州貿易之例永逺遵守其疲乏牲畜不妨在哈密牧放回巢後携回必須如此辦理方可杜無厭之請在李繩武本非辦事果斷之才身為提督於此等重務一味周章觀望何以承受恩典著嚴行申飭六月上以繩武於夷人貿易一事周章觀望毫無擔當詔革職來京候旨十月署山東登州總兵十九年調陕西河州總兵二十一年擢安西提督閏九月授鎮海將軍初和碩特汗沙克都爾曼濟率其部來降駐牧巴里坤是年十二月參贊大臣雅爾哈善疑其有異志與繩武合疏言沙克都爾曼濟向內地增卡倫偵探巴里坤布隆吉爾安西兵數與綽羅斯叛黨扎納噶爾布通移遊牧四十餘里迹可疑臣等調滿洲緑旗兵分二隊抵賊遊牧斬之復分兵殱𠞰南山奎蘇博爾和津之厄魯特四千餘人疏入下部議敘二十二年六月赴鎮海將軍任九月卒楊魁楊魁漢軍正黃旗人曽祖廷耀山東巡撫祖馝四川巡撫緣事降光祿寺少卿魁由監生捐通判補福建泉州府通判以病回旗尋發江蘇以通判用乾隆十九年借補昭文知縣調江寧縣二十四年遷江寧府管糧同知三十年擢鎮江知府尋調揚州府三十三年七月調常州府先是兩淮鹽政尤拔世奏兩淮預行提引商人交息前任鹽政營私侵蝕等弊命江蘇巡撫彰寶嚴訊並以髙恆普福久任鹽務肆行染指宜將高恆任內辦事之顧蓼懷分晰查究彰寶等奏訊顧蓼懷代購貸物銀兩自認交高恆收尋解京軍機大臣訊出蓼懷經手銀十五萬餘兩俱係代商辦物知府楊魁等承審勒供繳高恆收諭曰承審各官固不容代為掩飾亦豈容妄事深文楊魁等必欲受意勒供致實事反成虛揑是誠何心楊魁著解任質訊九月軍機大臣奏高恆令顧蓼懷向各商陸續支銀製物並非高恆盡行侵用亦非商人託辦顧蓼懷妄供已併案問擬楊魁訊無逼勒但不細詰殊屬疏忽應交部察議上以楊魁等承審此案既無刑逼情事不復論其小過免議尋遷松太道三十六年遷安徽按察使三十七年擢布政使四十年調江西布政使四十一年擢江蘇巡撫四十三年四月奏言江南營兵共千四百九十七名遇護送遣犯餉鞘及粘補軍裝器械均有必需之費向來朋扣銀兩除買補馬匹等項動用外餘俱報部酌撥並無需賞公項遇僉差事每於月領餉銀攤扣不免拮據查江陰縣有入官灘田三百二十三畝水草灘二千六百九十五畝現勘募民佃種升科請將此項給兵承佃按則輸科收息以供僉差各費疏入報聞九月葉爾羌辦事侍郎高朴家人赴蘇私賣玉石事發詔楊魁嚴拿並諭曰高朴家人在蘇半載有餘肆行牟利衆所共知楊魁身任巡撫近在蘇州豈得委之毫無聞見乃竟任其骫法無忌一至于此實不知其是何肺腑深負朕委任之恩封疆大臣遇此等重案尚敢徇私容隱將何事不可隱匿朕復何以用人乎況楊魁係漢軍世僕由縣令用至巡撫乃敢昧良若此自揣當得何罪著楊魁並將案內張名逺迅速嚴拿解京尋奏高朴家人李福熊濂及張名逺即張鑾並于淮關蘇州先後獲解上以魁奉旨後始將張鑾拿獲尚自稱嚴查確訪諭嚴飭之尋以失察私玉過境及徐述夔悖逆詩案不能實心查辦先後經部議革任得旨均寬免仍注册十月奏言上元等三十四州縣並鎮江六衛幫被災分别輕重給賑酌借所需賑糧請概給折色於司庫正項撥給又各處災田應徵本年漕項銀米請分年帶徵其勘不成災地畝應徵新舊漕項銀米請緩至來秋徵收各屬應徵新舊漕糧明冬帶辦下部議行十一月奏贛榆縣民韋昭首伊姪韋玉振為父刋行述語涉狂悖又寶山縣職員范起鳯控堂弟范起鎬串竊書籍並委員赴查提究上以所辦過當諭曰徐述夔逆詞狂悖顯然是以提犯解京命廷臣集訊定以大逆不道之罪今楊魁因前案之失意存惶惑遇有控首逆詞之案不論其事之輕重紛紛提訊株纍多人自以為辦理認真而不知其過當以飾其前此不能查察徐述夔之罪夫韋玉振于伊父行述內敘其自免佃户之租擅用赦字于理固不宜用但此外並無悖逆之迹豈可因一赦字遂坐以大逆重罪乎至各處違礙書籍但經繳出其遲早原所不計若始終隱匿不交後經發覺即不能復為寬貸并當視其所藏之書係何等違礙以定罪名耳至此等控首之人不過挾制以快其私非實心尊君親上也設此後有首告逆案之人該督撫應悉心研鞫辨其真偽如虛仍當治以反坐之罪使姦頑知警不敢妄行若如楊魁所辦則怨家欲圖傾陷者片紙一投而被告之身家已破拖纍無辜成何政體且告訐之風伊于何底乎朕綜理庶務從不預存成見其情真罪當必不稍事姑容其事屬虛誣者更不肯略使屈抑楊魁經朕簡用有年豈尚不能仰體朕意乎楊魁著交部議處尋議降二級留任四十五年二月上南巡賞戴花翎賜以詩曰久曽為府道上下習嫻知必不許趨奉更當體溺飢於奢儉應示既養教毋遺勗爾勤本務周忱有往規四月調河南巡撫七月偕河道總督李奉翰奏言黃河上遊盛漲漫水墊陷考城五堡大堤幸未掣動大溜現于溝西築挑水壩溝口築攔水壩重重堵截並于五堡大堤兩頭趕築壩臺諭令設有淹浸田廬妥為撫恤尋奏考城五堡外灘芝麻莊壩工挂纜合龍敕交部議敘十月丁憂四十六年正月署工部侍郎二月命往浙江海塘辦工七月同署巡撫陳輝祖奏言老鹽倉迤東柴工千七百丈潮汐衝激難資捍禦請改為石塘于正項外賞銀二十萬兩以濟工需詔如所議八月署福建巡撫十二月海澄縣民周鏗聲控在籍知縣葉廷推纂輯縣志語涉狂悖魁訊係鏗聲挾嫌妄控仍請革廷推職審辦諭曰葉廷推所載碑志𠞰用腐爛舊句原無悖逆之處該撫自應將周鏗聲照誣告例問擬示懲又何必將葉廷推革去職銜是欲兩敗俱傷轉使挾嫌妄控者得長刁風而無辜良善致滋擾纍楊魁並非不曉事之人何茫無定見若此周鏗聲著即按律定擬葉廷推等即行省釋無容究問四十七年三月奏言前督臣三寶奏請臺灣照例報捐監穀偹儲今兩年餘報捐甚少而臺灣漳泉府屬倉貯充足無藉收捐請停臺灣捐監例從之尋以病解任回京五月道卒諭曰楊魁厯任巡撫有年頗著勤勞前聞患病即降旨令其回旗調理方冀速痊以資倚任今聞在途溘逝深為軫恤所有應得恤典著該部察例具奏尋賜祭葬如例十月大學士公阿桂等訊陳輝祖籍沒王亶望資財抽換案魁曽協同辦理請併籍其家産諭曰楊魁係差往查勘海塘查抄王亶望一案非其専辦陳輝祖抽換等弊自在楊魁前往閩省之後且伊現已身故若將伊一併查抄未免過當朕不為此已甚也欽定八旗通志卷一百九十五
