額一體遵行從之五月特命兼任北河總督十一月奏言今年豫省被水州縣收成雖不等實未成灾士民踴躍輸将所有特恩蠲免之錢粮請仍照額完兑部議應如所請得㫖士民急公奉上固屬可嘉著該督確查歉收分數仍照例蠲免即将現兊正粮作下年正供九年二月上諭上年山東有水患河南亦有數縣被水朕以田文鏡自能經理未另遣員查賑今聞祥符封邱等州縣有賣男女於山陜客商者田文鏡近來年老多病精神不及為属員欺誑不能撫綏安挿而但禁其賣鬻子女以避離散之名是絶其生路也豈為民父母者所忍言乎著刑部侍郎王國棟前往賑濟四月以病乞休命觧任来京調理七月病痊回任十年八月疏言登州鎮新増兵一千其中右二營請増千總一員把搃一員約束下部議行十二月以病奏請觧任允之四月卒于河南遺疏上得㫖田文鏡老成厯練才守兼優自簡任督撫以来府庫不虧倉儲充足察吏安民懲貪除暴不避嫌怨庻務具舉封疆重寄正資料理前以衰病請觧任調理勉従其請今聞溘逝深為憫惜應得䘏典察例具奏尋賜祭葬諡端肅特命河南省城立専祠祀之並准入祀豫省賢良祠十三年十一月尚書史貽直奏稱河南開墾捐輸累民甚宜速罷請特簡亷明公正大臣往撫綏查核廷議如所請奉㫖河南地方自田文鏡為廵撫總督以来苛刻搜求以嚴厲相尚而属員又復承其意㫖剥削成風豫民重受其困即如前年匿灾不報百姓至於流離䝉皇考嚴飭遣官賑恤始得安全此中外所共知者乃王士俊接任河東不能加意恵飬且擾亂紛更以為幹濟借開墾之虚名而成累民之弊政彼地方民風淳樸竭蹶以從㒺敢或後甚属可嘉然先後遭督臣之苛政其情亦可憫矣王士俊著解任來京候㫖並將此㫖宣示豫民咸使知之乾隆五年四月河南巡撫雅爾圖奏言文鏡在豫百姓至今怨恨不應入豫省賢良祠奉上諭朕觀雅爾圖此奏係見朕降㫖令李衛入祀賢良意謂李衛與鄂爾㤗素不相合特借田文鏡之應撤以見李衛之不應入耳當日王士俊将田文鏡奏請入祀賢良係奉皇考允行今若撤出是翻前案矣鄂爾㤗田文鏡李衛皆皇考所㝡稱許者其實田文鏡不及李衛李衛又不及鄂爾㤗而彼時三人素不相合亦衆所共知也于是文鏡仍得入豫省賢良祠李䋲武李䋲武漢軍正黄旂人祖鐸隨明南寧侯左夢庚投誠授騎都尉世職父起龍襲隨征噶爾丹有功加一雲騎尉康熙四十四年䋲武襲雍正元年四月授佐領十一月補恭領五年遷湖廣黄州副将八年擢甘肅寜夏搃兵十年署固原提督乾隆元年調河南河北鎮搃兵五月擢甘肅提督三年二月命駐防哈宻賞治行装銀五千两三月調固原提督仍駐哈宻先是雍正十三年皇上御極噶爾丹䇿凌遣使乞和詔撤北路兵乾隆三年以噶爾丹䇿凌遵㫖議定分界地方允其遣使赴蔵熬茶四年夷使至哈宻軍營䋲武撥兵五百遣官協同理藩院章京由扁都口至東科爾貿易畢䕶送至蔵六年調甘肅提督七年以揑報屯田濫邀議叙鐫二級詔留任十年調西安提督十一年閏三月疏言啇夷賚木瑚里等帶牲畜乞在哈宻貿易肅州鎮臣請於嘉峪闗外花海子牧放查花海子逼近赤靖等處營汛南通青海北接北路卡倫留牧未便臣飭將馬駝貨物赴肅州牛羊暫牧哈宻卡外俟價議定差員率商出口迎牧疏入報聞六月疏言哈宻西南西喇淖爾地通魯克察克闢展等處向設卡倫旋以水草不便議裁準夷多由是潛行應𣲖兵守望又巴逹什為貝子玉富素牧厰西北為烏拉臺卡倫北五十里有畢栁大板溝應設卡與烏拉臺巴逹什聲息相通可以嚴宻防範廷議允行十三年七月調甘肅提督十月調固原提督十四年二月調直𨽻古北口提督四月調福建陸路提督以病未赴十月調浙江提督十二月調固原提督十五年授鎮海將軍十六年署安西提督印務七月授甘肅提督十月調安西提督十七年五月諭曰李繩武奏此次準噶爾夷目額倫瑚里貿易牲畜貨物較十三年之數不無浮多再毎次到哈宻必有乏弱牲口求售應查明確數以理責問如果恭順懇求再行照例辦理等語此番交易係初次定例必當示之以信不可稍有遷就該夷貪狡無厭不過得尺進尺得寸進寸向来承辦員弁惟恐生事一味委曲周旋將就了事朝廷體制尊嚴邉疆奏事有不能盡實而外藩小國其上下之情轉相聮貫交易一事未必不早為窺破一次踰例後次又復加増厚利所在彼何樂而不為耶今該夷内亂又與哈薩克搆釁其交易較前所増有限已可得其情形此正辦理機㑹總當悉遵前㫖在十三年定數之内者許其截長補短通融折算逾數者雖少亦槩駁囘至奏報来使言語情形務湏一一據寔倘稍有粉飾將来查出惟該提督是問尋將夷目情形具奏諭曰李繩武所奏竟似毫無主見姑為游移兩可之詞以俟朕之批示如所稱該夷等似覺失望又不敢違背章程其詞色深為作難止求轉奏等語又將夷人伴送北山暫住牧放是已明示以據情入奏矣貿易既定有章程自當永逺遵行若因其恭順畏懼而曲為遷就將来勢必逐漸加増何所底止至疲弱馬駝從前准其變售原属辦理錯誤今既立定限制何得因循故轍視為常例乎李繩武具摺奏請夷人必無不知之理著即將入奏奉旨之處明白宣諭以哈宻貿易原属非例今既新定規條當照十三年肅州貿易之例永逺遵守其疲乏牲畜不妨在哈宻牧放囘巢後携囘必湏如此辦理方可杜無厭之請在李繩武本非辦事果斷之才身為提督於此等重務一味周章觀望何以承受恩典著嚴行申飭六月上以繩武於夷人貿易一事周章觀望毫無擔當詔革職来京候旨十月署山東登州總兵十九年調陕西河州總兵二十一年擢安西提督閏九月授鎮海將軍初和碩特汗沙克都爾曼濟率其部来降駐牧巴里坤是年十二月㕘賛大臣雅爾哈善疑其有異志與繩武合疏言沙克都爾曼濟向内地増卡倫偵探巴里坤布隆吉爾安西兵數與綽羅斯叛黨扎納噶爾布通移游牧四十餘里迹可疑臣等調滿洲緑旗兵分二隊抵賊游牧斬之復分兵殱𠞰南山奎蘇博爾和津之厄魯特四千餘人䟽入下部議叙二十二年六月赴鎮海將軍任九月卒楊魁楊魁漢軍正黄旗人曽祖廷耀山東巡撫祖馝四川巡撫緣事降光禄寺少卿魁由監生捐通判補福建泉州府通判以病囘旗尋發江蘇以通判用乾隆十九年借補昭文知縣調江寧縣二十四年遷江寧府管糧同知三十年擢鎮江知府尋調揚州府三十三年七月調常州府先是兩淮鹽政尤拔世奏兩淮預行提引商人交息前任鹽政營私侵蝕等弊命江蘓巡撫彰寳嚴訊並以髙恒普福久任塩務肆行染指宜将高恒任内辦事之顧蓼懐分晰查究彰寶等奏訊顧蓼懐代購貸物銀兩自認交高恒収尋解京軍機大臣訊出蓼懐經手銀十五萬餘兩俱係代商辦物知府楊魁等承審勒供繳高恒収諭曰承審各官固不容代為掩飾亦豈容妄事深文楊魁等必欲受意勒供致寔事反成虚揑是誠何心楊魁着解任質訊九月軍機大臣奏高恒令顧蓼懐向各商陸續支銀製物並非高恒盡行侵用亦非商人託辦顧蓼懐妄供已併案問擬楊魁訊無逼勒但不細詰殊属疎忽應交部察議上以楊魁等承審此案既無刑逼情事不復論其小過免議尋遷松太道三十六年遷安徽按察使三十七年擢布政使四十年調江西布政使四十一年擢江蘇巡撫四十三年四月奏言江南營兵共千四百九十七名遇䕶送遣犯餉鞘及粘補軍装器械均有必需之費向来朋扣銀兩除買補馬匹等項動用外餘俱報部酌撥並無需賞公項遇僉差事毎於月領餉銀攤扣不免拮据查江陰縣有入官灘田三百二十三畆水草灘二千六百九十五畆現勘募民佃種陞科請將此項給兵承佃按則輸科収息以供僉差各費疏入報聞九月葉爾𦍑辦事侍郎高樸家人赴蘇私賣玉石事發詔楊魁嚴拿並諭曰高樸家人在蘇半載有餘肆行牟利衆所共知楊魁身任巡撫近在蘇州豈得委之毫無聞見乃竟任其骫法無忌一至于此寔不知其是何肺腑深負朕委任之恩封疆大臣遇此等重案尚敢狥私容隠将何事不可隠匿朕復何以用人乎況楊魁係漢軍世僕由縣令用至巡撫乃敢昧良若此自揣當得何罪著楊魁並将案内張名逺迅速嚴拿解京尋奏高樸家人李福熊濂及張名逺即張鑾並于淮闗蘇州先後獲解上以魁奉㫖後始将張鑾拿獲尚自稱嚴查確訪諭嚴飭之尋以失察私玉過境及徐述䕫悖逆詩案不能寔心查辦先後經部議革任得㫖均寛免仍註冊十月奏言上元等三十四州縣並鎮江六衛帮被灾分别輕重給賑酌借所需賑糧請概給折色於司庫正項撥給又各處灾田應徵本年漕項銀米請分年帶徵其勘不成灾地畆應徵新舊漕項銀米請緩至来秋徵収各属應徵新舊漕糧明冬帶辦下部議行十一月奏贛榆縣民韋昭首伊姪韋玉振為父刋行述語涉狂悖又寶山縣職員范起鳯控堂弟范起鎬串竊書籍並委員赴查提究上以所辦過當諭曰徐述夔逆詞狂悖顯然是以提犯解京命廷臣集訊定以大逆不道之罪今楊魁因前案之失意存惶惑遇有控首逆詞之案不論其事之輕重紛紛提訊株累多人自以為辦理認真而不知其過當以飾其前此不能查察徐述䕫之罪夫韋玉振于伊父行述内叙其自免佃户之租擅用赦字于理固不宜用但此外並無悖逆之跡豈可因一赦字遂坐以大逆重罪乎至各處違碍書籍但經繳出其遲早原所不計若始終隠匿不交後經發覺即不能復為寛貸并當視其所藏之書係何等違碍以定罪名耳至此等控首之人不過挟制以快其私非實心尊君親上也設此後有首告逆案之人該督撫應悉心研鞫辨其真偽如虚仍當治以反坐之罪使奸頑知警不敢妄行若如楊魁所辦則怨家欲圖傾䧟者片紙一投而被告之身家已破拖累無辜成何政體且告訐之風伊于何底乎朕綜理庶務從不預存成見其情真罪當必不稍事姑容其事属虚誣者更不肯畧使屈抑楊魁經朕簡用有年豈尚不能仰體朕意乎楊魁著交部議處尋議降二級留任四十五年二月上南巡賞戴花翎賜以詩曰久曽為府道上下習嫻知必不許趨奉更當體溺饑於奢儉應示既養教毋遺勗爾勤本務周忱有往規四月調河南巡撫七月偕河道總督李奉翰奏言黄河上游盛漲漫水墊䧟考城五堡大堤幸未掣動大溜現于溝西築挑水壩溝口築攔水壩重重堵截並于五堡大堤兩頭趕築壩臺諭令設有淹浸田廬妥為撫恤尋奏考城五堡外灘芝麻庄壩工挂纜合龍勅交部議叙十月丁憂四十六年正月署工部侍郎二月命往浙江海塘辦工七月同署巡撫陳輝祖奏言老鹽倉迤東柴工千七百丈潮汐衝激難資捍禦請改為石塘于正項外賞銀二十萬兩以濟工需詔如所議八月署福建巡撫十二月海澄縣民周鏗聲控在籍知縣葉廷推纂輯縣誌語渉狂悖魁訊係鏗聲挟嫌妄控仍請革廷推職審辦諭曰葉廷推所載碑志𠞰用腐爛舊句原無悖逆之處該撫自應將周鏗聲照誣告例問擬示懲又何必將葉廷推革去職銜是欲兩敗俱傷轉使挟嫌妄控者得長刁風而無辜良善致滋擾累楊魁並非不曉事之人何茫無定見若此周鏗聲著即按律定擬葉廷推等即行省釋無容究問四十七年三月奏言前督臣三寶奏請臺灣照例報捐監穀偹儲今兩年餘報捐甚少而臺灣漳泉府属倉貯充足無藉収捐請停臺灣捐監例從之尋以病解任囘京五月道卒諭曰楊魁厯任巡撫有年頗著勤勞前聞患病即降㫖令其囘旗調理方冀速痊以資倚任今聞在途溘逝深為軫恤所有應得䘏典著該部察例具奏尋賜祭塟如例十月大學士公阿桂等訊陳輝祖籍沒王亶望貲財抽換案魁曽協同辦理請併籍其家産諭曰楊魁係差往查勘海塘查抄王亶望一案非其専辦陳輝祖抽換等弊自在楊魁前往閩省之後且伊現已身故若將伊一併查抄未免過當朕不為此已甚也欽定八旗通志卷一百九十五
