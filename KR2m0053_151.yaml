body:
  text: 欽定四庫全書欽定八旗通志卷一百三十七人物志十七大臣傳三滿洲鑲黃旗三喀木卓布泰辰泰鰲拜布克沙遏必隆喀巴哈尼滿路什沃赫辰泰辰泰滿洲鑲黃旗人姓鈕祜祿額亦都孫也父曰車爾格辰泰初以護軍參領從攻明錦州遇寧逺援兵先衆直入斬執纛者獲其纛馬天聰三年從太宗文皇帝征明北京駐軍德勝門外分兵攻巡撫袁崇煥營遇伏奮擊有斬獲五年大軍圍大凌河城眀監軍道張春率衆赴援辰泰設伏擒其偵卒復以步戰殱敵衆崇德元年從征朝鮮與副都統薩木什喀乘夜襲破黃州守將營三年隨睿親王多爾衮率師征眀敗眀兵於豐潤縣攻內監馮永盛總兵侯世祿營皆拔之又以護軍三十敗總兵祖大夀騎卒百餘俘獲紀功五年隨征明錦州有降明蒙古蘇班代來歸辰泰率之進攻杏山敗敵兵獲牲畜六年圍錦州敗松山兵我樵採者為敵兵所困辰泰率兵六人援之出又敗敵兵之來襲我後隊者連戰皆捷遂克其郛是年由騎都尉世職晉三等輕車都尉七年從圍錦州掘濠困松山明兵夜犯正黃旗蒙古營辰泰往援擊敗之八年隨貝勒阿巴泰等征明敗總兵馬科於渾河築梁以濟眀總兵范志完以兵來拒復擊走之至山東攻克東阿汶上寧陽三城晉二等輕車都尉順治元年從入山海關破走流賊李自成眀年世祖章皇帝詔敘勳臣晉一等輕車都尉四年授禮部侍郎從征湖廣敗流賊一隻虎於荆州尋奉命為靖南將軍同副都統棟阿賴征福建至則擊賊渠曹大鎬敗之又於建寧敗賊張耀星步兵四千克同安平和二城五年破海逆鄭彩兵彩遁入海復長樂連江二縣擒偽總督顧世臣等十一人於興化斬之以次克復郡縣全閩底定奉旨嘉奬六年授護軍統領七年論功晉二等男擢刑部尚書八年二月遷吏部尚書三月授國史院大學士七月以加上皇太后尊號誤增恩詔赦欵奉上詢問以有例對下廷議坐巧飾誑奏罷任降世職為一等輕車都尉九年正月起為禮部尚書二月充會試主考官三月授鑲黃旗都統先是兩遇恩詔晉三等子兼一雲騎尉旋以吏部奉覃恩升襲過濫命改為一等輕車都尉兼一雲騎尉至是奉特旨晉二等子十年授寧南靖冦大將軍征湖廣十一年改吏部尚書兼都統仍任大將軍十二年孫可望劉文秀盧明臣馮雙禮等帥衆六萬樓櫓千餘分犯嶽州武昌而文秀以精兵攻常德辰泰遣護軍統領蘇克薩哈設伏以待參領呼尼牙羅和先與之遇擊敗其衆復令參領蘇拜希福等並以舟師迎擊八旗繼進三戰三捷敵復列艦拒戰發伏兵擊之焚其船别遣兵破其餘衆於德山下師抵龍陽縣敵又集兵二千來犯我兵𠞰之皆潰奔明臣赴水死雙禮被創遁文秀走貴州降其副將等四十餘員兵三千餘敘功晉世襲一等子兼一雲騎尉未幾以疾卒於軍明年正月世祖召凱旋諸臣勞之以酒諭曰大將軍辰泰南征效力卒於戎行朕甚傷悼因揮淚不已復諭學士麻勒吉等曰若大將軍班師生入國門朕將親酌宴勞不意中道棄捐不復相見爾等以此一觴奠大將軍靈次少抒朕追悼之懷諸臣及左右侍從無不感涕賜祭葬如典禮諡忠襄以其子尼滿襲爵旋卒無嗣以弟喇哈達之子白啓為後襲焉布克沙子貴復布克沙滿洲鑲黃旗人姓瓜勒佳天聰時以護軍校駐防牛莊出偵敵擊敗明兵崇德二年從征明皮島同參領鰲拜乘舟先登島岸取之得優賚旋授護軍參領五年大軍圍錦州刈其田木明兵拒戰布克沙率護軍十人擊郤敵衆復擊敗杏山松山步騎兵又同都統圖爾格等設伏敗敵追擊至河濵搴敵纛并獲其馬敘功豫雲騎尉世職六年復圍錦州明總督洪承疇自松山遣騎來犯戰郤之復破其三營步兵七年隨貝勒阿巴泰征明擊敗明總兵馬科於渾河岸其别將率三千餘人拒守渡口又擊敗之遂趨山東略萊州攻克蒙隂沂水二城八年五月凱旋賚銀幣晉世爵為騎都尉順治二年隨英親王阿濟格征流賊李自成於陕西由綏德進延安屢敗賊衆自成走湖廣復躡擊之敗賊衆於安陸武昌又同都統都類追至九江口獲賊船會奉詔班師過池州擊走明總兵黃蜚部衆獲其船十有二三年隨豫親王多鐸征蘇尼特部騰機斯偵知布爾噶圖山有賊隨貝勒博和託追斬二十餘人又擊敗土謝圖汗及碩洛汗兵八年二月擢鑲黃旗蒙古副都統九月兼任户部侍郎九年四月以有疾解侍郎任八月並罷副都統先是敘平流賊暨征騰機斯功由騎都尉加一雲騎尉及三遇恩詔洊晉一等輕車都尉十四年卒長子哈楚罕襲第三子貴復任侍衛兼佐領順治十六年大軍既定雲南沅江土司那嵩復叛貴復隨都統卓洛討平之康熙十四年隨安親王嶽樂討逆藩耿精忠至江西敗賊于苻潭浦賊將李茂珠等率萬餘人相拒于建昌府城南鐘鼓山貴復力戰被創尋以創發卒豫雲騎尉世職以其子璫色襲喀喀木喀喀木滿洲鑲黃旗人姓薩哈爾察先世居烏喇部父瑭阿禮當太祖髙皇帝時率百人來歸授佐領使轄之從征遼東有功豫三等輕車都尉世職後從征瓦爾喀為熊傷而卒喀喀木襲職太宗文皇帝崇德三年授吏部理事官五年隨承政索海征呼爾哈部敵據柵拒戰喀喀木率衆攻破其柵擊斬二百人生擒索倫兵一百三十以歸七年隨征眀松山以本旗將領失律未察舉降世職為騎都尉八年二月擢吏部參政世祖章皇帝順治元年署副都統隨大軍入山海關督後隊兵擊敗流賊李自成敘功加一雲騎尉時改參政曰侍郎喀喀木仍任吏部四年考滿復三等輕車都尉世職尋奉命率兵征鄖陽先是大兵定湖廣明鄖陽總兵王光恩迎降即與原官留鎮至是以罪逮繫其弟王光泰遂叛紏衆據鄖陽自稱明鎮武伯聫結叛賊賀珍武大定等為應援提督孫定遼戰歿賊勢猖獗喀喀木自河南進征將薄鄖陽光泰乃遁喀喀木偕副將王平率兵渡河追𠞰至房縣斬級千餘光泰及偽總兵李世英等竄四川喀喀木還駐鄖陽五年春總督羅繡錦以叛鎮金聲桓自江西窺湖廣請留喀喀木駐防荆州六年還京七年兼任鑲黃旗副都統三遇恩詔晉爵三等男初鄂爾多斯部扎穆素多爾濟屯牧神木邉外害我使臣叛逃既而扎穆素悔罪來歸多爾濟竄匿賀蘭山屢犯邉界肆劫掠八年九月喀喀木奉命同都統噶達渾等率兵討之九年正月自寧夏出水驛口至賀蘭山後分兵搜𠞰斬多爾濟及其弟二人並部衆悉殱之俘幼弱及婦女以歸獲馬駝各數百牛千餘羊萬餘是年五月授鎮守江寧總管十年命為靖南將軍𠞰廣東賊寇時李定國自廣西掠廣東潮州總兵郝尚久應之踞城以叛喀喀木至廣州同靖南王耿繼茂進征潮州攻圍逾月以雲梯兵克城尚久投井死潮州及附近州縣悉平仍還駐江寧十六年六月海賊鄭成功陷鎮江襲踞瓜洲遂犯江寧喀喀木與總督郎廷佐提督管效忠協謀禦擊檄調蘇松總兵梁化鳳等赴援會貴州凱旋之副都統噶褚哈瑪爾賽率兵由長江東下亦使人邀之駐守喀喀木與密議曰賊勢盛宜乘其未集先擊之乃簡兵逆擊賊衆之先至者賊敗郤獲舟二十餘七月成功悉衆薄城連營八十有三賊艘蔽江喀喀木與文武官晝夜防守俟援兵既集議以緑旗兵先擊賊營於儀鳳鍾阜門外梁化鳳出儀鳳管效忠出鍾阜夾攻截擊殱賊甚衆陳擒偽總統余新及偽總兵二賊氣奪次日喀喀木同噶褚哈瑪爾賽率兵出神䇿門見賊據山列陳乃先分兵左右仰攻而自率精鋭搗其中堅陳擒偽提督甘輝及偽總兵數人斬馘無算成功收潰衆乘船遁我水師復截擊之淹斃過半焚其船五百餘又分水陸追剿賊之在鎮江瓜洲者皆遁捷聞下部優敘尋兵部請議前此失陷鎮江瓜洲罪上念其固守江寧功可抵罪豫免議聖祖仁皇帝康熙元年改江寧總管為將軍仍以喀喀木任之七年八月卒以其子喇揚阿襲一等輕車都尉兼一雲騎尉卓布泰卓布泰滿洲鑲黃旗人姓瓜勒佳偉齊次子也太宗文皇帝時任佐領崇德四年隨承政薩木什喀索海征呼爾哈部有鐸陳阿薩津二城以兵四百逆戰卓布泰與佐領薩弼圖率甲士九十人擊敗之斬級五十敵復與索倫部長博穆博果爾合兵來拒卓布泰率先邀擊挫敵獲丁壯六十有竒敘功授雲騎尉世職五年任參領隨大軍征明錦州於松山杏山間連敗敵兵六年鄭親王濟爾哈朗復圍錦州明總督洪承疇以重兵列營山口拒守卓布泰同副都統翁阿岱迎戰明兵敗遁大軍合左右翼擊敵于松山復與翁阿岱率兵破之還軍敵躡襲我後翁阿岱中創仆卓布泰力戰殺賊掖翁阿岱乘馬以歸七年十月隨貝勒阿巴泰征明至青州屢敗敵軍明總兵張登科和應薦等合八鎮兵來拒卓布泰率師奮擊大敗之又乘夜襲破其餘衆八年五月凱旋賚白金兼任兵部理事官世祖章皇帝順治元年同參領沙爾瑚達征黑龍江攻克圖瑚勒禪城獲丁壯二百餘是年冬隨豫親王多鐸追剿流賊李自成師次潼關同都督恩格圖等連敗賊衆二年進克西安自成遁湖廣卓布泰與護軍統領敦拜阿爾津等追擊殱賊騎三百移師下江南隨端重親王博洛征浙江敗敵衆於杭州松江海寧平湖諸郡邑斬級數百獲戰艦百餘三年復隨端重親王征福建署副都統師次延平明唐王朱聿鍵走汀州大軍追𠞰之卓布泰别率兵直趨福州攻克其城是年敘功晉世職騎都尉兼一雲騎尉明年考滿晉三等輕車都尉五年隨鄭親王濟爾哈朗征湖南時衡州寶慶諸郡為明桂王朱由榔之將所踞六年四月卓布泰復署副都統同都統佟圖賴等自湘潭進征連破敵寨斬其總兵陶養用遂復衡州桂王將胡一青以步騎萬餘踞城南山岡列七營卓布泰與佟圖賴合攻之皆潰走又擊敗其總兵王進才方世勇周進唐等於道州靖州七年凱旋得優賚八年擢刑部侍郎九年改授鑲黃旗副都統尋遷護軍統領列議政大臣敘湖南功並先後遇恩詔晉爵至二等男世襲罔替十一年擢內大臣十三年任鑲黃旗都統十四年命為征南將軍率兵至廣西與湖南四川兩路大兵會期規取黔滇時朱由榔竄雲南其將李定國白文選李成爵等分據黔西要隘十五年九月卓布泰次獨山州與信郡王多尼等約師期遂率兵由都勻進盤江賊聞大兵至悉沉船潛伏山谷卓布泰用土司岑繼魯言從下流十里取所沉船中夜濟師李成爵以衆萬餘屯據涼水井大破之進攻雙河口山寨李定國列象陳拒戰擊之俱潰定國又悉衆為三十營列柵固守卓布泰分軍三隊張左右翼進擊再戰皆捷追斬四十餘里獲其象馬嗣聞賊衆尚堅守鐡索橋乃從晉安間道進羅平州會信郡王等軍攻克雲南城由榔奔永昌十六年二月同貝勒尚善等進鎮南州破白文選於玉龍關渡瀾滄江取永昌由榔奔騰越復進𠞰之渡潞江定國以兵六千伏磨盤山卓布泰分兵八隊以鎗炮發其伏掩擊之斬殺過半遂取騰越州由榔奔緬甸卓布泰乘勝追逐越南甸至孟村而還捷聞賚蟒服鞍馬明年二月還京命內大臣迎勞之仍任都統兼佐領尋追論在軍營時鞫勘將士功罪不實應革爵罷任議政王貝勒等召卓布泰告之卓布泰厲聲爭辨王貝勒等劾其出言怨望請處絞籍沒上命從寬革爵罷任聖祖仁皇帝康熙三年復原爵八年以弟鰲拜獲罪連坐革爵十六年聖祖念其征雲南有功仍復二等男世爵十七年卒賜祭葬如典禮諡武襄子增夀襲爵鰲拜鰲拜滿洲鑲黃旗人姓瓜勒佳衛齊第三子也初以護軍校從征屢立戰功天聰八年授騎都尉世職任參領從太宗文皇帝征察哈爾收其散亡部衆旋奉命與護軍統領談泰等由上方堡入明邉設伏以越界出略又不至期會地詔奪其所俘獲崇德二年隨征明皮島武英郡王阿濟格集諸將問進取之䇿鰲拜與參領準塔願為前驅與王約曰不得此島勿復見王遂與準塔連舟渡海敵嚴陳拒堡上我兵莫能登鰲拜大呼超躍而上冒矢石直前搏戰準塔繼之明軍披靡遂克其島太宗以此島可比大城命優敘晉三等男賜巴圖魯號四年率護軍略地錦州有斬獲六年隨鄭親王濟爾哈朗圍錦州以步戰敗明步軍營功最得優賚晉爵一等方大兵之圍錦州也明援兵踵至城內兵復乘間衝突夾擊我軍鰲拜往來接戰每不待軍令輒當先陷陳五戰皆捷時明總督洪承疇等率兵十三萬赴援太宗親統大兵環松山而營敵兵出犯屢擊却之還營度眀師必宵遁命鰲拜移駐右翼汛地協力追𠞰夜一鼓明兵果遁鰲拜與護軍統領阿濟格尼堪等相繼躡擊擒斬過半七年擢護軍統領八年隨貝勒阿巴泰等征眀攻邉城指揮本旗兵先登克之長驅入邉敗明守將進薄燕京略地至山東三敗明兵斬殺甚衆攻兖州府及臨清汶上諸邑並麾軍前進有功别遣將士略取四城凱還師次密雲擊走敵兵三千復破明總兵吳三桂總督范志完諸軍是嵗十月敘功晉三等子賚金幣甚厚順治元年隨大兵定燕京二年世祖章皇帝命考核羣臣功績鰲拜以忠勤戮力晉一等子隨英親王阿濟格征湖廣至安陸破流賊李自成兵睿親王多爾衮以英親王有罪令鰲拜與都統談泰於軍中集衆暴其狀鰲拜談泰匿之不以示衆論罪罰鍰明年隨肅親王豪格征四川敗叛將賀珍兵於楚湖師抵西充賊渠張獻忠列營拒戰鰲拜奮擊大破之斬獻忠於陳賊衆收合餘燼復犯我師鰲拜遣軍士連擊敗之旋偕侍衛李國翰等分𠞰賊黨俘斬無算下遵義夔州茂州諸郡邑五年二月部臣論隨征參領希爾根冒功爭賞罪鰲拜坐軍中詳勘不實論革世職又以貝子屯齊等訐告鰲拜於崇德八年與護軍統領圖賴等六人謀立肅親王私結盟誓廷議應死並得旨罰贖四月侍衛科普索訐告鰲拜擅撥護軍為侍衛遏必隆守門仍論死上復宥之十一月統兵駐防大同時總兵薑瓖叛鰲拜率七騎敗賊兵三百餘明年端重親王博洛率師至與鰲拜合攻大同鰲拜遣部將敗賊兵之奪我炮者賊將楊振威率兵萬餘犯正藍旗營鰲拜以右翼三旗兵大破其衆賊兵五千餘由大同北山至立兩營逼我軍鰲拜率精鋭進𠞰破其一營乘勝逐北瓖聞北山援兵至亦盡發城中出拒我師鰲拜縱擊斬獲殆盡賊將復以兵截戰敗之於欣口再敗之於晉祠鎮攻汾州關克孝義縣皆以捷聞七年睿親王有疾貝子錫翰等請駕臨幸王以錫翰違令瀆請鰲拜目擊其非不即執訊降爵為一等男并罰贖世祖親政晉三等侯八年任議政大臣敘功晉一等侯兼一雲騎尉九年自陳勞績且以忤睿親王意致屈抑戰功訟於上詔部議晉二等公賜敕豫世襲免死二次尋授領侍衛內大臣十三年奏請三年一次舉行大閲以講武事傳令大臣侍衛等御前較射著為令是年十二月創發卧疾上親臨視明年以恩詔加少保兼太子太保尋加少傅兼太子太傅教習武進士十八年受顧命奉聖祖仁皇帝嗣統與內大臣索尼蘇克薩哈遏必隆為輔政大臣既受事與內大臣飛揚古有隙又飛揚古子侍衛倭赫及侍衛西住折克圖覺羅塞爾弼同直御前不加禮輔臣鰲拜惡之遂論倭赫等擅乘御馬及取御用弓矢射鹿罪並棄市坐飛揚古怨望亦棄市并殺其子尼侃薩哈連籍其家以與弟都統穆里瑪先是鑲黃旗屯莊畫給保定河間涿州之地已二十年蘇克薩哈鰲拜姻婭也論事多齟齬積而成讐鰲拜因蘇克薩哈籍隸正白旗欲以薊州遵化遷安諸莊改撥鑲黃旗而别圈民地給正白旗康熙五年使旗人訴請以牒部大學士蘇納海管戶部議阻之貝子溫齊等以履勘鑲黃旗地不堪耕種疏聞遣蘇納海與直隸總督朱昌祚巡撫王登聫丈量酌易時則兩旗人較量肥瘠相持久不決而旗地待換民地侍圈所在荒廢不耕百姓環訴失業昌祚等交疏請停止圈換之令鰲拜怒坐蘇納海撥地遲悮昌祚等紛更妄奏悉逮治棄市且以蘇納海族人已故額駙英俄爾岱為睿親王私黨令部臣盡削世襲以泄其忿明年議蘇克薩哈罪慮大學士巴泰逆己意不使與聞坐蘇克薩哈以大臣觖望蓄異志論應磔上鑒其枉鰲拜攘臂強爭卒豫絞并誅其族屬鰲拜之受顧命也名列遏必隆後至是索尼死矣班行章奏鰲拜皆前列日與弟穆里瑪侄侍衛塞本特訥莫大學士公班布爾善尚書阿思哈噶褚哈馬爾賽都統濟世侍郎泰璧圖學士吳格塞等黨比營私是時侍讀熊賜履遵旨條奏時政有曰內臣者外臣之表也又曰急功喜事但知趨目前尺寸之利以便其私圖鰲拜聞而惡之曰是劾我也入對時輒請申禁言官不得上書陳奏聖祖既躬親大政冀其感恩悔罪克保功名特命鰲拜於二等公外加賜一等公以其子那摩佛襲二等公爵七年世祖配天覃恩加鰲拜太師加那摩佛太子少師時有竊其馬者鰲拜捕斬之併殺御馬羣牧長怒蒙古都統俄訥喇哈達宜理布于議政時不附已即令蒙古都統不與會議馬爾賽故部臣請諡上不允鰲拜令仍給與諡八年五月上以鰲拜結黨専擅勿思悛改命議政王等逮治鰲拜罪諭曰前工部尚書員缺鰲拜以朕素不知之濟世妄稱才能推補通同結黨以欺朕躬又奏稱戶部尚書應授二員將馬爾賽徇情補用又鰲拜於朕前辦事不求當理稍有拂意即將部臣叱喝引見時在朕前施威震衆科道官條奏鰲拜屢請禁止恐身干物議閉塞言路凡用人行政欺朕専權恣意妄為文武各官欲盡出伊門下與穆里瑪等結成同黨凡事在家定議然後施行且倚仗凶惡棄毁國典與伊相合者薦拔之不合者陷害之朕念鰲拜舊臣望其改惡悔過今乃貪聚賄賂姦黨日甚上違君父重托下則殘害生民種種惡迹難以枚舉其嚴拿勘審于是康親王傑書等列其攬權欺罔諸罪狀請革職立斬籍沒那摩佛亦論死上親加鞫訊情罪俱實諭曰鰲拜以勳舊大臣受恩皇考遺詔輔佐政務理宜精白乃心盡忠圗報不意結黨専權紊亂國政紛更成憲罔上行私朕久已悉知尚望其改行從善克保功名以全終始乃近觀其罪惡日多命諸王大臣公同究審俱已得實以所犯重大擬以正法本當依擬處分但念鰲拜在纍朝效力年久且皇考曽經倚任朕不忍加誅姑從寬革職籍沒仍行拘禁那摩佛亦免死革職拘禁鰲拜死乃出那摩佛于獄而釋之卒於家五十二年上復念鰲拜戰陳功多特追賜一等男以其弟巴哈之孫蘇赫襲蘇赫卒仍以鰲拜孫達福襲世宗憲皇帝時賜鰲拜祭葬復一等公世襲罔替加封號曰超武遏必隆遏必隆滿洲鑲黃旗人姓鈕祜祿額亦都第十六子也母和碩公主天聰八年太宗文皇帝賜敕命遏必隆襲其父一等子爵任侍衛九年詔免功臣徭役遏必隆與焉並給人戶使管佐領事貝勒尼堪福晉遏必隆兄都統圖爾格之女也無子詐取僕婦女為己生尼堪入奏命刑部承政索海等會鞫之遏必隆告於鄭親王濟爾哈朗曰索海與尼堪為姻戚恐左袒宜勿與訊及會勘福晉謀詐事實遏必隆坐徇庇欺誑削爵崇德六年從上征明移營松山浚濠環守明總兵曹變蛟率乳峰山步騎欲棄寨突圍出屢犯兩黃旗營遏必隆連擊敗之夜三鼓變蛟集敗兵突犯御營遏必隆與侍衛坤巴圖魯巴什塔及大臣錫翰等堅守後營門壘力戰殪十餘人變蛟負創以其衆遁走詔守衛不嚴諸臣輸罰鍰分賚禦敵將士遏必隆得優賞七年隨饒餘貝勒阿巴泰等征明入長城克薊州進兵山東抵兖州攻夏津先登克其城授騎都尉世職順治二年流賊李自成遺孽李錦與賊黨郝搖旗等竄聚湖廣為亂荆襄武漢道路多梗遏必隆隨順承郡王勒克德渾往討之師次武昌賊據守要隘遏必隆先衆攻擊大軍繼進斬殺無算遂拔鐡門關敘功晉二等輕車都尉五年兄子侍衛科普索訐其與白旗諸王有隙設兵護門事論死籍沒得旨免死革世職及佐領籍家産之半八年世祖章皇帝既親政遏必隆訟削職寃詔復職明年科普索獲罪以所襲圖爾格之二等公爵令遏必隆併襲為一等公有護軍擺思哈喇者當太宗上賔時托疾不守門至是已授騎都尉又一雲騎尉遏必隆舉劾其前罪下部鞫實置之法籍其家以與遏必隆旋任議政大臣三月掌鑾儀衛事十月擢領侍衛內大臣十四年加少保兼太子太保尋加少傅兼太子太傅十八年受遺詔與索尼蘇克薩哈鰲拜同為輔政大臣康熙六年三月御史張惟赤疏請聖祖仁皇帝親政於是索尼等以歸政請遏必隆亦懇請再三是嵗七月上躬親大政諭部加恩輔臣以示酬庸之典詔從部議加賜遏必隆一等公爵復以其長子法喀襲原授之一等公遏必隆奏辭不允賜戴雙眼孔雀翎眀年加太師尋乞罷輔政溫諭慰留又眀年再請乃許先是輔政時索尼老病鰲拜多専政與蘇克薩哈不相能遏必隆不能自異及鰲拜倡圈易旗地之令中外大臣皆謂為不便遏必隆欲停止窺鰲拜意在必行遂弗與爭既而鰲拜矯旨誅大學士蘇納海等復族誅蘇克薩哈遏必隆皆不為阻亦不入奏八年鰲拜獲罪上以遏必隆同列輔政明知其惡而緘口不語詔法司併逮問論死上復念其結黨無實宥之削太師銜及後賜之一等公九年諭兵部曰前以輔政大臣遏必隆知鰲拜樹黨亂政不豫行紏劾故坐之罪今念其為皇考顧命大臣且勳臣子其咎止於因循瞻顧未嘗躬負重愆特為寬宥仍以公爵宿衛內廷遏必隆遂以一等公品級入朝侍直十二年十二月疾篤上臨視慰問及卒賜祭葬諡恪僖勒石墓道碑文稱其賦性敬慎制行端方慤誠報國著有勤勞云尋以册立孝昭仁皇后推恩所生特旨令立家廟賜御製碑文復御書䇿名金石四字以額其祠五十一年上念遏必隆曽襲其父世爵緣事削除未襲特命以其第四子音德襲一等子世爵子五人音德别有傳巴哈巴哈滿洲鑲黃旗人姓瓜勒佳衛齊第四子也初任一等侍衛太宗文皇帝崇德二年設議政大臣二十有四巴哈與焉七年從征明錦州凱旋上幸牧馬所命內大臣侍衛與新降之明總兵祖大夀等校射奬賞有差巴哈得賜駝一世祖章皇帝順治元年隨大軍入山海關定燕京二年以巴哈在太宗朝扈從著勞授騎都尉世職時睿親王多爾衮攝政都統談泰訐內大臣索尼詆誹睿親王及捕魚牧馬鼓琴演戲諸欵法司鞫訊以巴哈曽與索尼同觀偶戲議革世職罷任詔貰之三年隨肅親王豪格征陜西四川尋以考滿並敘隨征功晉世職至一等輕車都尉六年睿親王帥師討大同叛鎮薑瓖巴哈請從征自效王弗許復再三請王使人諭以或隨明甲隊或隨暗甲隊惟所自便巴哈知王終弗用也拂衣起遽歸翼日議罪應斬改罰贖七年睿親王有疾貝子錫翰等奏請上駕臨視睿親王罪以擅請並責巴哈弗執問復罰鍰八年上親政命為議政大臣三遇恩詔晉爵至一等男初肅親王為睿親王搆陷卒於獄子富綬尚幼尚書宗室鞏阿岱議殺之巴哈同內大臣哈什屯持不可乃止鞏阿岱因與其弟錫翰及侍衛冷僧機勸睿親王疏逺巴哈及其兄鰲拜既而錫翰復以巴哈入直御前太數及內大臣西訥布庫等議其罪聞有旨嘉巴哈勤勞議乃寢至是上以鞏阿岱錫翰冷僧機西訥布庫朋比妄行命諸王大臣鞫訊巴哈證其狀咸伏誅十二年以巴哈恪供職業加少保兼太子太保十四年晉少傅兼太子太傅十五年授領侍衛內太臣聖祖仁皇帝康熙六年以其子訥爾都尚公主封和碩額駙八年上以察哈爾阿布奈久缺朝請無藩臣禮命巴哈往察其狀及還會鰲拜以結黨擅權獲罪同父兄弟並褫革論斬籍沒上念巴哈宣力年久貸其罪並免籍沒後以疾卒子九人次子蘇爾達别有傳尼滿尼滿滿洲鑲黃旗人姓富察崇德六年考授筆帖式順治二年授編修八年晉內祕書院侍讀十年遷侍讀學士十三年考滿恩廕一子入監讀書尋擢內宏文院學士十五年遷保和殿學士兼禮部左侍郎十七年六月晉刑部右侍郎給事中孫光祀成肇毅及鎮海將軍劉之源江南總督郎廷佐疏劾蘇松提督馬逢知隂附海賊鄭成功命廷臣會鞫僉以逢知交通海逆罪重擬并其子駢誅上以逢知叛逆未得實情命尼滿往江南同之源廷佐確審尋以賊犯江寧逢知託言招撫隂相比附不誅賊黨交通書信入奏逢知抵罪如律康熙二年授本部尚書五年遷都察院左都御史六年四月疏言流徙寧古塔尚陽堡各犯許認修城樓及部院衙門贖罪該犯家産籍沒工費數萬何自而得一經奉旨回籍視稍贍之家挾詐逼勒致良民受害請嗣後認工贖罪者概停從之八年七月疏言民所賴以生者惟農與商大臣不宜與小民爭利今在外藩王等不能仰體皇上愛民至意凡商貨輳集多獲利益之所占據貿易縱屬放債牟利州縣官莫敢誰何此輩遂肆行無忌逼民變産償債甚至釀命案請敕禁藩王等商人除本城貿易外如仍貿易各處地方官不即查拿被人舉首者以徇庇論本主以縱屬治罪貨物債銀入官又疏言百姓固苦於不肖官員脧削更苦於差役繁劇如差遣官員船隻夫馬一切供應雖額設錢糧而貪官汙吏藉端徴派侵漁請嗣後除軍國大事仍由內差其他責成各督撫如隱匿徇庇重治其罪俱下部議行是年九月甄别部院堂官議以尼滿歷任年久辦事雖勤重大事未見指參應降二級留任得旨尼滿著以原品隨旗行走未幾卒路什子布納海路什姓納喇世居章嘉城父克恩太祖髙皇帝時來歸隸滿洲鑲黃旗太宗文皇帝崇德七年路什隨貝勒阿巴泰征明至山東兖州府我軍以雲梯攻城路什先登克之賜號巴圖魯授三等輕車都尉世職世祖章皇帝順治元年睿親王多爾衮統大兵入山海關路什任參領與佐領衮泰以步兵擊敗流賊李自成復同副都統阿哈尼堪追至望都縣敗之二年隨英親王阿濟格赴陜西征勦李自成斷其歸路與副都統阿喇善敗賊於綏德州遂圍延安府自成兄子錦踞城抗拒路什隨大軍七戰皆捷錦遁去自成為豫親王多鐸所敗棄西安南走商州遁入湖南英親王統大兵躡其後至武昌自成賊巢在焉偽侯劉宗敏等率衆拒戰路什同前鋒統領蘇拜擊敗其衆并俘獲自成妻孥是年敘入關敗流賊功晉二等輕車都尉明年肅親王豪格奉命西征路什率兵隨時叛將賀珍犯陜西漢中以賊兵二千踞守雞頭關路什同護軍統領鰲拜力戰克之追破珍于楚湖遂入四川與護軍統領希爾根擊敗流賊張獻忠及獻忠滅路什分兵𠞰餘賊俘斬甚衆七年九年兩遇恩詔晉爵三等男十五年隨信郡王多尼征貴州明桂王朱由榔使其將羅大順拒戰於黔西州十萬溪箐路什同前鋒統領鄂訥副都統噶褚哈分兵三隊奮擊連敗賊衆十七年敘功並録前此陜西湖廣四川戰績晉爵二等男世襲罔替聖祖仁皇帝康熙十七年貝勒尚善等進師湖南𠞰逆藩吳三桂路什率所部兵扼嶽陽湖之九馬嘴值賊舟卒來犯路什奮戰力竭沒於陳事聞豫恤晉一等男兼一雲騎尉子布納海襲三十六年上親征厄魯特噶爾丹布納海隨領侍衛內大臣伯費揚古由西路進兵敗賊于昭莫多師旋敘功晉爵三等子四十六年以年老乞休子瑚什屯改襲二等男沃赫沃赫滿洲鑲黃旗人費英東之孫也崇德八年襲父察喀尼三等子爵順治七年九年兩遇恩詔洊晉一等子十五年授散秩大臣十六年世祖章皇帝追念費英東為開創功臣豫三等公世襲罔替旋擢內大臣康熙八年內大臣鰲拜獲罪拘禁沃赫因與同族部議革官職聖祖仁皇帝命留三等公爵在驍騎營行走十三年六月逆藩吳三桂耿精忠遣賊黨分路寇掠江西沃赫同三等子穆成額俱奉命署副都統領兖州駐防兵赴定南將軍希爾根軍協力防𠞰十月沃赫同副都統幹都海總兵官趙應奎等破耿逆偽總兵左宗邦之兵於分宜擒斬甚衆十一月吳逆偽將軍朱君聘偽總兵黃乃忠合兵數萬自萍鄉來犯袁州沃赫同幹都海穆成額趙應奎等擊敗之西村又登山斬賊五千餘級時賊黨踞安福沃赫防守分宜議令穆成額分兵先往而遣護軍一半繼之大破賊衆用雲梯攻城復安福縣十四年四月𠞰賊鸞石嶺白水口等處擒斬無算十五年正月遇恩詔加太子太保二月隨大將軍安親王嶽樂進征萍鄉破賊十二寨偽將軍夏國相等敗遁遂復萍鄉縣三月隨安親王至長沙吳逆賊黨五千餘人迎戰沃赫同副都統阿進泰擊郤之十六年安親王令沃赫率兵赴茶陵駐守十七年將軍穆占疏言茶陵攸縣等處與賊逼近且吳三桂盤踞衡州江之東岸有偽將軍馬寶等立營獨令沃赫駐守兵力單弱上因命趙應奎率標兵赴茶陵又諭簡親王喇布分兵付定南將軍華善率赴茶陵與沃赫協力鎮守既簡親王由江西進湖南駐師茶陵沃赫分守攸縣十八年湖南既平沃赫隨大將軍貝子彰泰進征雲貴十九年十二月授鑲黃旗蒙古副都統旋調滿洲副都統二十年十月雲南平凱旋二十一年六月擢鑲黃旗蒙古都統二十二年三月議政大臣等追論沃赫於十六年三月在長沙擊賊時既抵鹿角挨牌仍退回罪應革職籍家産其江西𠞰賊復城屢奉旨優敘又隨大軍平定雲南功罪相抵請革去世爵免其籍沒上曰沃赫為人尚優所襲公爵原係其祖之職即革去亦應子弟承襲著從寬留其都統公爵革去太子太保二十三年遷領侍衛內大臣二十八年仍改授鑲黃旗蒙古都統三十年六月卒年五十有二賜祭葬如例子傅爾丹襲爵官至都統將軍别有傳欽定八旗通志卷一百三十七
