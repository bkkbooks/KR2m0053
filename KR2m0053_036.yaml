  text: 旗分志二十二八旗佐領二十二漢軍佐領緣起佐領鑲黃旗漢軍漢軍佐領緣起崇德二年七月分烏真超哈漢文稱漢軍一旗為兩旗以昂邦章京漢文稱總管石廷柱為左翼一旗固山額真以昻邦章京馬光逺為右翼一旗固山額真照滿洲例編壯丁為牛録四年六月分烏真超哈二固山官屬兵丁為四固山每固山設牛録十八員固山額真一員梅勒章京二員甲喇章京四員正黃鑲黃兩旗以馬光逺為固山額真馬光輝張大猷為梅勒章京戴都崔應泰楊名逺張承德為甲勒章京正白鑲白兩旗以石廷柱為固山額真達爾漢金維城為梅勒章京金玉和佟國蔭佟代為甲喇章京正紅鑲紅兩旗以王世選為固山額真吳守進孟喬芳為梅勒章京金礪郎紹貞王國光臧國祚為甲喇章京正藍鑲藍兩旗以巴顔為固山額真李國翰土賴為梅勒章京張良弼曹光弼劉仲錦李眀時為甲喇章京初兩固山纛色皆用元青至是改馬光逺纛以元青鑲黃石廷柱纛以元青鑲白王世選纛以元青鑲紅巴顔纛純用元青七年六月初烏真超哈止設四旗至是編為八旗以祖澤潤劉之源吳守進金礪佟圖賴石廷柱巴顔墨爾根轄李國翰八人為固山額真祖可法張大猷馬光輝祖澤洪王國光郭朝忠孟喬芳郎紹貞裴國珍佟代何濟吉爾金維城祖澤逺劉仲錦張存仁曹光弼為梅勒章京是年七月以錦州松山杏山新降官屬兵丁分給八旗之缺額者其餘男子婦女幼稚共二千有竒編發蓋州為民又蒙古男子婦女幼稚共四百二十有竒又漢人八名分賜恭順王孔有德男子十名婦女幼稚十六口懷順王耿仲眀男子十名婦女幼稚十二口智順王尚可喜男子十名漢人一名婦女幼稚十二口續順公沈智祥男子五名婦女十六口察汗喇嘛男子三名婦女幼稚三口其餘分賜公以下梅勒章京以上養之順治二年十一月以和碩德豫親王多鐸等招降公侯伯總兵副將參遊等官三百七十四員撥入八旗三年四月分𨽻投誠官於八旗編為牛録十八年十月戶部請將新投誠官員分旗安置現到偽漢陽王馬進忠之子都督僉事馬自德準入正黃旗偽國公沐天波之子沐忠顯準入正白旗未到偽延安王艾能竒之子原鎮國將軍今左都督艾承業準入鑲黃旗康熙元年三月允義王孫徵淳所請令屬下投誠各官均撥三旗二十年九月兵部題準耿昭忠等呈稱家口甚多難以養贍照漢軍例披甲食糧既可當差效力又可均贍老幼家口編為五佐領令在京佐領管轄每佐領下設驍騎校一員小撥什庫漢文稱領催各四名馬甲各五十四名步軍撥什庫兵各十三名此五佐領俱係耿昭忠耿聚忠等屬下不便分晰應將伊等本身一併俱歸入正黃旗漢軍旗下二十一年十二月戶部議準建義將軍林興珠既歸併鑲黃旗漢軍令該都統歸與缺少壯丁其佐領下應給地畝籽粒口糧照例支給俟支俸後裁去所居房屋工部給發二十二年十二月命尚之孝尚之隆等家下所有壯丁分為五佐領𨽻鑲黃旗漢軍旗下乾隆五十五年五月安南黎維祁及屬下人等奉恩旨令其來京歸入漢軍旗分編一佐領以上漢軍佐領緣起鑲黃旗漢軍佐領鑲黃旗漢軍都統所屬參領五第一參領下佐領九第二參領下佐領九第三參領下佐領八第四參領下佐領八第五參領下佐領八第一參領第一佐領係天聰八年將長灘堡小馬頭堡二處壯丁編為牛録初以三等甲喇章京後改阿逹哈哈番漢文稱輕車都尉張大猷管理張大猷升任江南提督以分得撥什庫漢文稱驍騎校莫四管理續以張大猷子張長庚管理張長庚升任湖廣巡撫以張大猷之孫廕生張昌國管理張昌國因病辭退以其叔父張綿庚管理張綿庚升任湖南參將以其族叔廕生張大德管理張大德緣事革退仍以張綿庚管理張綿庚故以張大猷二世孫張正英管理張正英故以其弟張正興管理張正興緣事革退以阿思哈尼哈番漢文稱男張正文管理張正文升任西安副都統以張正德管理張正德降調以三等男張崑管理張崑革職以步軍校張峻管理張峻故以雲麾使張玉龍管理張玉龍升任遊擊以領催張岣管理第一參領第二佐領係崇德元年編設初以世職牛録章京嚴國卿管理嚴國卿年老辭退以其子嚴朝綱管理嚴朝綱駐防廣西因孫延齡叛被執遇害以李國棟管理李國棟故以董國英管理董國英故以蘇喇章京漢文稱防禦錢文彪管理錢文彪故以二等阿達哈哈畨郎文煥管理郎文煥升任蔚州參將以御史年熙管理年熙故以正紅旗都統髙其佩管理髙其佩緣事革退以承恩公慶復管理續以輕車都尉馬元慶管理馬元慶故以騎都尉藥師保管理藥師保因病告休以騎都尉揚潮管理揚潮調補世管佐領以吉林佐領劉延璧管理劉延璧故以一等子馬肇永管理第一參領第三佐領係崇德七年編設初以大凌河都司方得勝管理方得勝故以趙宗科管理趙宗科升任江寧總兵官以趙雲琦管理趙雲琦故以趙雲錦管理趙雲錦故以趙光先管理趙光先故以一等侯田象坤管理田象坤故以一等阿達哈哈畨盧承恭管理盧承恭緣事革退以方得勝之曽孫方天相管理方天相因病告退以其子德蔭管理德蔭故以趙宗科之元孫趙楷管理謹案此佐領乾隆四十三年因方趙二姓管過五次作為二姓族中互管佐領第一參領第四佐領原係定南王孔有德所屬佐領康熙二十二年進京撥𨽻本旗以阿思哈尼哈番徐鴻振管理徐鴻振故以拖沙喇哈畨漢文稱雲騎尉李廣管理李廣故以火器營協領臧世元管理臧世元故以吏部員外郎王仕管理王仕升任永平副將以三等侍衛慶垣管理慶垣緣事革退以參領髙應翽管理髙應翽因病告休以印務章京艾肇昌管理艾肇昌故以三等侍衛育秀管理第一𠫭領第五佐領係崇德七年編設初以藺